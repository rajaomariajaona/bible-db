document_id: EXO.35,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sabbath Emphasized
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses gathered all the congregation of the sons of Israel together, and said to them, “These are the things which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded you to do:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Let every skilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' talented man among you come, and make everything that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the tabernacle (sacred dwelling of God), its tent and its covering, its hooks, its boards, its bars, its pillars, and its sockets; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the ark [of the covenant] and its carrying poles, with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 25:17.
      marker-yv: yv-n
    - type: text
      text: 'mercy seat and the veil (partition curtain) of the screen [to hang between the Holy Place and the Holy of Holies]; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the table and its carrying poles, and all its utensils, and the bread of the [divine] Presence (showbread); '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the lampstand also for the light and its utensils and its lamps, and the oil for the light; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the altar of incense and its carrying poles, the anointing oil and the fragrant incense, the screen (curtain) for the doorway at the entrance of the tabernacle; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the altar of burnt offering with its bronze grating, its carrying poles, and all its utensils, the wash basin and its base (stand); '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the court’s curtains, its support poles and their sockets, and the curtain for the gate of the courtyard; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the pegs of the tabernacle and the pegs of the court and their cords; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the finely-woven garments for ministering in the Holy Place, the holy garments for Aaron the priest and the garments for his sons, to minister as priests.’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gifts Received
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For six days work may be done, but the seventh day shall be a holy day for you, a Sabbath of complete rest to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; whoever does any kind of work on that day shall be put to death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the congregation of the Israelites left Moses’ presence. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone whose heart stirred him and everyone whose spirit moved him came and brought the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offering to be used for the Tent of Meeting, for all its service, and for the holy garments. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all whose hearts moved them, both men and women, came and brought brooches, earrings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' nose rings, signet rings, and necklaces, all jewels of gold; everyone bringing an offering of gold to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every man who had in his possession blue or purple or scarlet fabric, and fine linen, and goats’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hair
    - type: text
      text: ', and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Similar to morocco leather.
      marker-yv: yv-n
    - type: text
      text: 'rams’ skins dyed red and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hebrew uncertain.
      marker-yv: yv-n
    - type: text
      text: 'porpoise skins, brought them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone who could make an offering of silver or bronze brought it as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offering; every man who had in his possession acacia wood for any work of the service brought it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the skilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' talented women spun thread with their hands, and brought what they had spun, blue and purple and scarlet fabric and fine linen. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the women whose heart stirred with a skill spun the goats’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hair.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leaders brought onyx stones and other stones to be put in settings for the ephod and for the breastpiece, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and spice and [olive] oil for the light and for the anointing oil and for the fragrant incense. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Israelites, all the men and women whose heart moved them to bring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: material
    - type: text
      text: ' for all the work which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded through Moses to be done, brought a freewill (voluntary) offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall not kindle a fire in any of your dwellings on the Sabbath day.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said to the Israelites, “See, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' called by name Bezalel son of Uri, the son of Hur, of the tribe of Judah; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and He has filled him with the Spirit of God, with wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' skill, with intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding, and with knowledge in all [areas of] craftsmanship, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to devise artistic designs to work in gold, silver, and bronze, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the cutting of stones for setting and in the carving of wood, for work in every skilled craft. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He has also put in Bezalel’s heart [the willingness] to teach [others the same skills], both he and Oholiab, son of Ahisamach, of the tribe of Dan. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He has filled them with skill to do the work of an engraver, of a designer, and of an embroiderer, in blue, purple, and scarlet fabric, and in fine linen, and of a weaver; makers of every work and embroiderers of [excellent] designs.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Moses said to all the congregation of the sons of Israel, “This is the thing which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Take from among you an offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . Whoever has a willing heart, let him bring it as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offering: gold, silver, and bronze, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'blue, purple, and scarlet fabric, fine linen, goats’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hair,
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Similar to morocco leather.
      marker-yv: yv-n
    - type: text
      text: 'rams’ skins dyed red, and skins of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hebrew uncertain.
      marker-yv: yv-n
    - type: text
      text: 'porpoises, and acacia wood, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and [olive] oil for the lighting, and balsam for the anointing oil, and for the fragrant incense, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 25:7.
      marker-yv: yv-n
    - type: text
      text: onyx stones and other stones to be set for the ephod and the breastpiece.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tabernacle Workmen
    marker-yv: yv-h
