document_id: 1KI.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: War with Aram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ben-hadad king of Aram (Syria) gathered all his army together; thirty-two kings were [allied] with him, with horses and chariots. And he went up and besieged Samaria [Israel’s capital], and fought against it. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then he sent messengers to the city to Ahab king of Israel; and he said to him, “Thus says Ben-hadad: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '‘Your silver and your gold are mine; your wives and your children, even the fairest, also are mine [as conditions of peace].’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The king of Israel [conceded his defeat and] answered, “By your word, my lord, O king, I am yours, and all that I have.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The messengers returned and said, “Thus says Ben-hadad: ‘I indeed sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to you, saying, “You shall give me your silver, your gold, your wives, and your children,” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: but about this time tomorrow I will send my servants to you, and they will search your house and the houses of your servants; and they will take with their hands (confiscate) whatever is desirable in your eyes and carry it away.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the king of Israel summoned all the elders of the land and said, “Please observe and see how this man is seeking our destruction. For he sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: messengers
  - type: text
    text: ' to me for my wives, my children, my silver, and my gold, and I did not refuse him.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All the elders and all the people said to him, “Do not listen or consent [to this additional demand].” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So he said to Ben-hadad’s messengers, “Tell my lord the king, ‘Every '
  - type: usfm
    marker: it
    children:
    - type: text
      text: demand
  - type: text
    text: ' you first sent to your servant I will do, but I cannot do this [additional] thing [as a condition of peace].’ ” And the messengers left; then they brought him word again. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ben-hadad sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to him and said, “May the gods do so to me, and more also, if there is enough dust left of Samaria for handfuls for all the [armed] people who follow me.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The king of Israel answered, “Tell him, ‘A man who puts on [his armor to go to battle] should not boast like the man who takes it off [after the battle has been won].’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Ben-hadad heard this message, as he and the kings were drinking in the temporary shelters, he said to his servants, “Station '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yourselves
  - type: text
    text: '.” So they stationed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: themselves
  - type: text
    text: ' against the city [of Samaria].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahab Victorious
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then a prophet approached Ahab king of Israel and said, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘Have you seen all this great army? Behold, I will hand them over to you, and you shall know [without any doubt] that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ahab said, “By whom?” And he said, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘By the young men [the attendants or bodyguards] of the governors of the districts.’ ” Then Ahab said, “Who shall begin the battle?” And he answered, “You.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Ahab assembled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counted the young men of the governors of the districts, and there were 232. After them he assembled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counted all the people, all the sons of Israel, 7,000. [1 Kin 19:18]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They went out at noon, while Ben-hadad was getting drunk in the temporary shelters, he and the thirty-two kings who were helping him. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The young men of the governors of the districts went out first; and Ben-hadad sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' out and they told him, saying, “Men have come out of Samaria.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And he said, “Whether they have come out for peace or for war, take them alive.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So these young men of the governors of the districts went out of the city, and the army followed them. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And each one killed his man; and the Arameans (Syrians) fled and Israel pursued them. Ben-hadad king of Aram escaped on a horse with horsemen. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The king of Israel went out and struck [the riders of] the horses and chariots, and killed the Arameans in a great slaughter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the prophet approached the king of Israel and said to him, “Go, strengthen yourself and observe and see what you have to do; for at the first of next year the king of Aram (Syria) will come up against you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now the servants of the king of Aram said to him, “Israel’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gods are gods
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'god is a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In polytheistic religions it was common for gods to be associated with particular topological regions or natural events (like rain or lightning). The thinking evidently was that supernatural beings must control the many aspects of nature, and that man could gain some control over nature by acknowledging and appeasing these beings. The Arameans (Syrians) may have associated the God of Israel with Mt. Sinai; and instead of realizing that they needed to appeal to the one true God who favored Israel, they imagined that God did not control the plains and valleys (cf v 28), and that Israel could be defeated there by superior numbers.
    marker-yv: yv-n
  - type: text
    text: 'god of the hills; that is why they were stronger than we. But let us fight against them in the plain, and surely we will be stronger than they. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Do this: remove the [thirty-two allied] kings, each from his place, and put captains in their place, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and assemble an army like the army that you have lost '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in battle
  - type: text
    text: ', horse for horse and chariot for chariot. Then we will fight against them in the plain, and surely we shall be stronger than they.” And he listened to their words and did so.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Another Aramean War
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'At the first of the year [in spring], Ben-hadad assembled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counted the Arameans (Syrians) and went up to Aphek [east of the Sea of Galilee] to fight against Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Israel were counted and given provisions, and they went to meet them. The Israelites camped before the enemy like two '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. small, compact fighting units.
    marker-yv: yv-n
  - type: text
    text: 'little flocks of goats [with everything against them, except God], and the Arameans filled the country. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A man of God approached and said to the king of Israel, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘Because the Arameans have said, “The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is a god of the hills, but He is not a god of the valleys,” I will give this great army into your hand, and you shall know [by experience] that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.’ ” [Phil 4:13] '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So they camped opposite each other for seven days. Then on the seventh day the battle began, and the sons of Israel killed 100,000 of the Aramean foot soldiers in a single day. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But the rest ran to the city of Aphek, and the [city] wall fell on 27,000 of the men who were left. Ben-hadad escaped and came into the city, going into an inner chamber [to hide].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But his servants said to him, “We have heard that the kings of the house (royal line) of Israel are merciful kings. Please let us put sackcloth around our '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the midsection of the body between the lower ribs and the hips.
    marker-yv: yv-n
  - type: text
    text: 'loins and ropes on our necks [as symbols of submission], and go out to the king of Israel; perhaps he will spare your life.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they put sackcloth around their loins and ropes on their necks, and came to the king of Israel and said, “Your servant Ben-hadad says, ‘Please let me live.’ ” And Ahab asked, “Is he still alive? He is my brother.” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now the men took it as a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: good
  - type: text
    text: ' omen, and quickly understanding his meaning said, “Yes, your brother Ben-hadad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lives
  - type: text
    text: '.” Then the king said, “Go, bring him.” Then Ben-hadad came out to him, and Ahab had him come up into the chariot. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ben-hadad [tempting him] said to him, “I will restore the cities which my father took from your father; and you may set up bazaars (shops) of your own in Damascus, as my father did in Samaria.” Then, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahab replied,
  - type: text
    text: ' “I will let you go with this covenant (treaty).” So he made a covenant with him and let him go.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Now a certain man of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a band or association of prophets.
    marker-yv: yv-n
  - type: text
    text: the sons of the prophets said to another by the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Please strike me.” But the man refused to strike him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then the prophet said to him, “Because you have not obeyed the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', behold, as soon as you leave me, a lion will kill you.” And as soon as he left him, a lion found him and killed him. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then the prophet found another man and said, “Please strike me.” So the man struck him hard, wounding him. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So the prophet left and waited for King Ahab by the road, and disguised himself [as a wounded soldier] with a bandage over his eyes. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'As the king passed by, the prophet called out to the king and said, “Your servant went out into the middle of the battle, and behold, a man turned aside and brought a man to me and said, ‘Guard this man; if for any reason he is missing, then your life shall be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: required
  - type: text
    text: ' for his life, or else you shall pay a talent of silver.’ '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But while your servant was busy here and there, he [escaped and] was gone.” And the king of Israel said to him, “Such is your own judgment (verdict); you have determined it.” '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then the prophet quickly removed the bandage from his eyes, and [Ahab] the king of Israel recognized him as one of the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: He said to the king, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘Because you have released from your hand the man [Ben-hadad] whom I had devoted to destruction, your life shall be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: required
  - type: text
    text: ' for his life, and your people for his people.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: So the king of Israel went to his house resentful and sullen, and came to Samaria. [1 Kin 22:34-36]
