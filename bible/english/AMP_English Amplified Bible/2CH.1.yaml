document_id: 2CH.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Worships at Gibeon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Solomon the son of David established himself securely over his kingdom, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God was with him and made him exceedingly great.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Solomon spoke to all Israel, to the commanders of thousands and of hundreds and to the judges and to every leader in all Israel, the heads of the fathers’ (ancestors’) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Solomon and all the assembly went to the high place at Gibeon [to offer sacrifices, where the Canaanites had habitually worshiped], for God’s Tent of Meeting was there, which Moses the servant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had made in the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But David had brought up the ark of God from Kiriath-jearim to the place he had prepared for it, because he had pitched a tent for it in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Now the bronze altar, which Bezalel the son of Uri, the son of Hur, had made was there before the tabernacle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and Solomon and the assembly sought it out. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And Solomon went up to the bronze altar before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at the Tent of Meeting, and offered a thousand burnt offerings on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That night God appeared to Solomon and said to him, “Ask what I shall give to you.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon’s Prayer for Wisdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Solomon said to God, “You have shown great lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy to my father David, and have made me king in his place. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Now, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, Your promise to my father David is fulfilled, for You have made me king over a people as numerous as the dust of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Give me wisdom and knowledge, so that I may go out and come in [performing my duties] before this people, for [otherwise] who can rule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' administer justice to this great people of Yours?” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'God replied to Solomon, “Because this was in your heart and you did not ask for riches, possessions or honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' personal glory, or the life of those who hate you, nor have you even asked for long life, but you have asked for wisdom and knowledge for yourself so that you may rule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' administer justice to My people over whom I have made you king, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'wisdom and knowledge have been granted you. I will also give you riches, possessions, and honor, such as none of the kings who were before you has possessed nor will those who will come after you.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So Solomon went from the high place at Gibeon, from the Tent of Meeting, to Jerusalem. And he reigned over Israel.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon’s Wealth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Solomon acquired chariots and horsemen; he had 1,400 chariots and 12,000 horsemen, and he stationed them in the cities [suited for the use] of chariots and with the king at Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The king made silver and gold as plentiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' common in Jerusalem as stones, and he made cedar as plentiful as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This tree, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ficus sycomorus,
      - type: text
        text: ' is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.'
    marker-yv: yv-n
  - type: text
    text: 'sycamore-fig trees in the lowland. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Solomon’s horses were imported from Egypt and from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was an area which, in NT times, was called Cilicia, the home province of the apostle Paul.
    marker-yv: yv-n
  - type: text
    text: 'Kue. The king’s merchants purchased them [in large numbers] from Kue '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solomon’s actions were in violation of the commandments given through Moses in Deut 17:16, 17 (see also 1 Kin 4:26; 10:26; 11:1-4).
    marker-yv: yv-n
  - type: text
    text: 'at a price. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they imported chariots from Egypt for 600 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver apiece, and horses for 150 apiece; and in the same way they exported horses to all the kings of the Hittites and the kings of the Arameans (Syrians).'
