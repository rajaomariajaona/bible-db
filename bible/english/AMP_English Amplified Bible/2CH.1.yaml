type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Worships at Gibeon
  - type: text
    content: Solomon the son of David established himself securely over his kingdom, and the L
  - type: heading
    content: ord
  - type: text
    content: ' his God was with him and made him exceedingly great.'
  '10':
  - type: text
    content: 'Give me wisdom and knowledge, so that I may go out and come in [performing my duties] before this people, for [otherwise] who can rule '
  - type: text
    content: and
  - type: text
    content: ' administer justice to this great people of Yours?” '
  '11':
  - type: text
    content: 'God replied to Solomon, “Because this was in your heart and you did not ask for riches, possessions or honor '
  - type: text
    content: and
  - type: text
    content: ' personal glory, or the life of those who hate you, nor have you even asked for long life, but you have asked for wisdom and knowledge for yourself so that you may rule '
  - type: text
    content: and
  - type: text
    content: ' administer justice to My people over whom I have made you king, '
  '12':
  - type: text
    content: 'wisdom and knowledge have been granted you. I will also give you riches, possessions, and honor, such as none of the kings who were before you has possessed nor will those who will come after you.” '
  '13':
  - type: text
    content: So Solomon went from the high place at Gibeon, from the Tent of Meeting, to Jerusalem. And he reigned over Israel.
  - type: heading
    content: Solomon’s Wealth
  '14':
  - type: text
    content: 'Solomon acquired chariots and horsemen; he had 1,400 chariots and 12,000 horsemen, and he stationed them in the cities [suited for the use] of chariots and with the king at Jerusalem. '
  '15':
  - type: text
    content: 'The king made silver and gold as plentiful '
  - type: text
    content: and
  - type: text
    content: ' common in Jerusalem as stones, and he made cedar as plentiful as the '
  - type: note
    content: This tree, ficus sycomorus, is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.
  - type: text
    content: 'sycamore-fig trees in the lowland. '
  '16':
  - type: text
    content: 'Solomon’s horses were imported from Egypt and from '
  - type: note
    content: This was an area which, in NT times, was called Cilicia, the home province of the apostle Paul.
  - type: text
    content: 'Kue. The king’s merchants purchased them [in large numbers] from Kue '
  - type: note
    content: Solomon’s actions were in violation of the commandments given through Moses in Deut 17:16, 17 (see also 1 Kin 4:26; 10:26; 11:1-4).
  - type: text
    content: 'at a price. '
  '17':
  - type: text
    content: 'And they imported chariots from Egypt for 600 '
  - type: text
    content: shekels
  - type: text
    content: ' of silver apiece, and horses for 150 apiece; and in the same way they exported horses to all the kings of the Hittites and the kings of the Arameans (Syrians).'
  '2':
  - type: text
    content: 'Solomon spoke to all Israel, to the commanders of thousands and of hundreds and to the judges and to every leader in all Israel, the heads of the fathers’ (ancestors’) '
  - type: text
    content: households
  - type: text
    content: '. '
  '3':
  - type: text
    content: Then Solomon and all the assembly went to the high place at Gibeon [to offer sacrifices, where the Canaanites had habitually worshiped], for God’s Tent of Meeting was there, which Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' had made in the wilderness. '
  '4':
  - type: text
    content: 'But David had brought up the ark of God from Kiriath-jearim to the place he had prepared for it, because he had pitched a tent for it in Jerusalem. '
  '5':
  - type: text
    content: Now the bronze altar, which Bezalel the son of Uri, the son of Hur, had made was there before the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: ', and Solomon and the assembly sought it out. '
  '6':
  - type: text
    content: And Solomon went up to the bronze altar before the L
  - type: heading
    content: ord
  - type: text
    content: ' at the Tent of Meeting, and offered a thousand burnt offerings on it.'
  '7':
  - type: text
    content: That night God appeared to Solomon and said to him, “Ask what I shall give to you.”
  - type: heading
    content: Solomon’s Prayer for Wisdom
  '8':
  - type: text
    content: 'Then Solomon said to God, “You have shown great lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' mercy to my father David, and have made me king in his place. '
  '9':
  - type: text
    content: Now, O L
  - type: heading
    content: ord
  - type: text
    content: ' God, Your promise to my father David is fulfilled, for You have made me king over a people as numerous as the dust of the earth. '
