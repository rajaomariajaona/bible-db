- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from the heavens;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise Him in the heights!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Praise Him, all His angels;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise Him, all His hosts (armies)!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Praise Him, sun and moon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise Him, all stars of light!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Praise Him, highest heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the waters above the heavens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let them praise the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: For He commanded and they were created.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He has also established them forever and ever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has made a decree which shall not pass away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from the earth,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sea monsters and all deeps;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lightning and hail, snow and fog;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stormy wind, fulfilling His orders;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mountains and all hills;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fruitful trees and all cedars;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Beasts and all cattle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Creeping things and winged birds;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kings of the earth and all people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Princes and all judges of the earth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Both young men and virgins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Old men and children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Let them praise the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For His name alone is exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supreme;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majesty are above earth and heaven.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He has lifted up a horn for His people [giving them strength, prosperity, dignity, and preeminence],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise for all His godly ones;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the people of Israel, a people near to Him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!) [Ps 75:10; Eph 2:17]'
