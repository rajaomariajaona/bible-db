verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 148
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Whole Creation Invoked to Praise the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: .
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from the heavens;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise Him in the heights!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beasts and all cattle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Creeping things and winged birds;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings of the earth and all people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Princes and all judges of the earth;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both young men and virgins;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Old men and children.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Let them praise the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For His name alone is exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supreme;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty are above earth and heaven.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has lifted up a horn for His people [giving them strength, prosperity, dignity, and preeminence],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise for all His godly ones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the people of Israel, a people near to Him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!) [Ps 75:10; Eph 2:17]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise Him, all His angels;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise Him, all His hosts (armies)!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise Him, sun and moon:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise Him, all stars of light!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise Him, highest heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the waters above the heavens!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them praise the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He commanded and they were created.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has also established them forever and ever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has made a decree which shall not pass away.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from the earth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sea monsters and all deeps;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lightning and hail, snow and fog;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stormy wind, fulfilling His orders;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountains and all hills;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fruitful trees and all cedars;
