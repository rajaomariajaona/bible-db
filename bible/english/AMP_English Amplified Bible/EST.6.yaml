document_id: EST.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Plans to Honor Mordecai
  - type: text
    content: 'On that night '
  - type: note
    content: Lit the king’s sleep fled.
  - type: text
    content: 'the king could not sleep; so he ordered that the book of records '
  - type: text
    content: and
  - type: text
    content: ' memorable deeds, the chronicles, be brought, and they were read before the king. '
  '10':
  - type: text
    content: 'Then the king said to Haman, “Quickly take the royal robe and the horse, as you have said, and do this for Mordecai the Jew, who is sitting at the king’s gate. Leave out nothing of all that you have said.” '
  '11':
  - type: text
    content: 'So Haman took the royal robe and the horse and dressed Mordecai, and led him '
  - type: text
    content: on horseback
  - type: text
    content: ' through the open square of the city, proclaiming before him, “This is what shall be done for the man whom the king desires to honor.”'
  '12':
  - type: text
    content: 'Then Mordecai returned to the king’s gate. But Haman hurried to his [own] house, mourning and with his head covered [in sorrow]. '
  '13':
  - type: text
    content: 'Then Haman told Zeresh his wife and all his friends everything that had happened to him. Then his wise counselors and his wife Zeresh said to him, “If Mordecai, before whom you have begun to fall '
  - type: text
    content: in status,
  - type: text
    content: ' is of Jewish heritage, you will not overcome him, but will certainly fall before him.”'
  '14':
  - type: text
    content: While they were still speaking with him, the king’s eunuchs (attendants) arrived and hurriedly brought Haman to the banquet which Esther had prepared.
  '2':
  - type: text
    content: 'It was found written there how Mordecai had reported that Bigthana and Teresh, two of the king’s eunuchs who were doorkeepers, had planned to '
  - type: note
    content: Lit lay hands on.
  - type: text
    content: 'attack King Ahasuerus (Xerxes). '
  '3':
  - type: text
    content: 'The king said, “What honor or distinction has been given Mordecai for this?” Then the king’s servants who attended him said, “Nothing has been done for him.” '
  '4':
  - type: text
    content: 'So the king said, “Who is in the court?” Now Haman had just entered the outer court of the king’s palace to ask the king about '
  - type: note
    content: Or impaling…on the stake; see note 5:14.
  - type: text
    content: 'hanging Mordecai on the gallows which he had prepared for him. '
  '5':
  - type: text
    content: 'The king’s servants said to him, “Look, Haman is standing in the court.” And the king said, “Let him come in.” '
  '6':
  - type: text
    content: 'So Haman came in and the king said to him, “What is to be done for the man whom the king desires to honor?” Now Haman thought '
  - type: note
    content: Lit in his heart.
  - type: text
    content: 'to himself, “Whom would the king desire to honor more than me?” '
  '7':
  - type: text
    content: 'So Haman said to the king, “For the man whom the king desires to honor, '
  '8':
  - type: text
    content: 'let a royal robe be brought which the king has worn, and the horse on which the king has ridden, and on whose head a royal crown has been placed; '
  '9':
  - type: text
    content: and let the robe and the horse be handed over to one of the king’s most noble officials. Let him dress the man whom the king delights to honor [in the royal robe] and lead him on horseback through the open square of the city, and proclaim before him, ‘This is what shall be done for the man whom the king desires to honor.’ ”
  - type: heading
    content: Haman Must Honor Mordecai
