    - type: text
      text: The King Plans to Honor Mordecai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On that night '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the king’s sleep fled
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the king could not sleep; so he ordered that the book of records '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' memorable deeds, the chronicles, be brought, and they were read before the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'It was found written there how Mordecai had reported that Bigthana and Teresh, two of the king’s eunuchs who were doorkeepers, had planned to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: lay hands on
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'attack King Ahasuerus (Xerxes). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The king said, “What honor or distinction has been given Mordecai for this?” Then the king’s servants who attended him said, “Nothing has been done for him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So the king said, “Who is in the court?” Now Haman had just entered the outer court of the king’s palace to ask the king about '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: impaling…on the stake;
      - type: text
        text: ' see note 5:14.'
    marker-yv: yv-n
  - type: text
    text: 'hanging Mordecai on the gallows which he had prepared for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The king’s servants said to him, “Look, Haman is standing in the court.” And the king said, “Let him come in.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Haman came in and the king said to him, “What is to be done for the man whom the king desires to honor?” Now Haman thought '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in his heart
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to himself, “Whom would the king desire to honor more than me?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Haman said to the king, “For the man whom the king desires to honor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'let a royal robe be brought which the king has worn, and the horse on which the king has ridden, and on whose head a royal crown has been placed; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: and let the robe and the horse be handed over to one of the king’s most noble officials. Let him dress the man whom the king delights to honor [in the royal robe] and lead him on horseback through the open square of the city, and proclaim before him, ‘This is what shall be done for the man whom the king desires to honor.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Haman Must Honor Mordecai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the king said to Haman, “Quickly take the royal robe and the horse, as you have said, and do this for Mordecai the Jew, who is sitting at the king’s gate. Leave out nothing of all that you have said.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Haman took the royal robe and the horse and dressed Mordecai, and led him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on horseback
  - type: text
    text: ' through the open square of the city, proclaiming before him, “This is what shall be done for the man whom the king desires to honor.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Mordecai returned to the king’s gate. But Haman hurried to his [own] house, mourning and with his head covered [in sorrow]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Haman told Zeresh his wife and all his friends everything that had happened to him. Then his wise counselors and his wife Zeresh said to him, “If Mordecai, before whom you have begun to fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in status,
  - type: text
    text: ' is of Jewish heritage, you will not overcome him, but will certainly fall before him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: While they were still speaking with him, the king’s eunuchs (attendants) arrived and hurriedly brought Haman to the banquet which Esther had prepared.
