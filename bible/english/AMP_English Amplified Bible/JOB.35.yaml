document_id: JOB.35,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elihu Sharply Reproves Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Elihu continued speaking [to Job] and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “But no one says, ‘Where is God my Maker,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who gives songs [of rejoicing] in the night, [Acts 16:25]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Who teaches us more than the beasts of the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes us wiser than the birds of the heavens?’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “The people cry out, but He does not answer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the pride of evil men.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Surely God will not listen to an empty cry [which lacks trust],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will the Almighty regard it.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Even though you say that you do not see Him [when missing His righteous judgment on earth],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet your case is before Him, and you must wait for Him!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “And now, because He has not [quickly] punished in His anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor has He acknowledged transgression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogance well [and seems unaware of the wrong of which a person is guilty],'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Job uselessly opens his mouth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And multiplies words without knowledge [drawing the worthless conclusion that the righteous have no more advantage than the wicked].”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Do you think this is according to [your] justice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you say, ‘My righteousness is more than God’s’?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “For you say, ‘What advantage have you [by living a righteous life]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What profit will I have, more [by being righteous] than if I had sinned?’
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I will answer you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your companions with you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Look to the heavens and see;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And behold the skies which are [much] higher than you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “If you have sinned, what do you accomplish against Him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if your transgressions are multiplied, what have you done to Him?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “If you are righteous, what do you give God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or what does He receive from your hand?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Your wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: affects only
    - type: text
      text: ' a man such as you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: affects only
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a human being.
      marker-yv: yv-n
    - type: text
      text: a son of man [but it cannot affect God, who is sovereign].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '¶“Because of the multitudes of oppressions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the people
    - type: text
      text: ' cry out;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cry for help because of the [violent] arm of the mighty.
