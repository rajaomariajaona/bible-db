document_id: JOB.35,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Sharply Reproves Job
  - type: text
    content: Elihu continued speaking [to Job] and said,
  '10':
  - type: text
    content: “But no one says, ‘Where is God my Maker,
  - type: text
    content: Who gives songs [of rejoicing] in the night, [Acts 16:25]
  '11':
  - type: text
    content: Who teaches us more than the beasts of the earth
  - type: text
    content: And makes us wiser than the birds of the heavens?’
  '12':
  - type: text
    content: “The people cry out, but He does not answer
  - type: text
    content: Because of the pride of evil men.
  '13':
  - type: text
    content: “Surely God will not listen to an empty cry [which lacks trust],
  - type: text
    content: Nor will the Almighty regard it.
  '14':
  - type: text
    content: “Even though you say that you do not see Him [when missing His righteous judgment on earth],
  - type: text
    content: Yet your case is before Him, and you must wait for Him!
  '15':
  - type: text
    content: “And now, because He has not [quickly] punished in His anger,
  - type: text
    content: 'Nor has He acknowledged transgression '
  - type: text
    content: and
  - type: text
    content: ' arrogance well [and seems unaware of the wrong of which a person is guilty],'
  '16':
  - type: text
    content: Job uselessly opens his mouth
  - type: text
    content: And multiplies words without knowledge [drawing the worthless conclusion that the righteous have no more advantage than the wicked].”
  '2':
  - type: text
    content: “Do you think this is according to [your] justice?
  - type: text
    content: Do you say, ‘My righteousness is more than God’s’?
  '3':
  - type: text
    content: “For you say, ‘What advantage have you [by living a righteous life]?
  - type: text
    content: What profit will I have, more [by being righteous] than if I had sinned?’
  '4':
  - type: text
    content: “I will answer you,
  - type: text
    content: And your companions with you.
  '5':
  - type: text
    content: “Look to the heavens and see;
  - type: text
    content: And behold the skies which are [much] higher than you.
  '6':
  - type: text
    content: “If you have sinned, what do you accomplish against Him?
  - type: text
    content: And if your transgressions are multiplied, what have you done to Him?
  '7':
  - type: text
    content: “If you are righteous, what do you give God,
  - type: text
    content: Or what does He receive from your hand?
  '8':
  - type: text
    content: '“Your wickedness '
  - type: text
    content: affects only
  - type: text
    content: ' a man such as you,'
  - type: text
    content: 'And your righteousness '
  - type: text
    content: affects only
  - type: text
    content: ' '
  - type: note
    content: I.e. a human being.
  - type: text
    content: a son of man [but it cannot affect God, who is sovereign].
  '9':
  - type: text
    content: '¶“Because of the multitudes of oppressions '
  - type: text
    content: the people
  - type: text
    content: ' cry out;'
  - type: text
    content: They cry for help because of the [violent] arm of the mighty.
