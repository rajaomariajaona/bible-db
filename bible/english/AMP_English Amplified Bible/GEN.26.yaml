verses:
  '1':
  - type: heading
    content: Isaac Settles in Gerar
  - type: text
    content: 'Now there was a famine in the land [of Canaan], besides the previous famine that had occurred in the days of Abraham. So Isaac went to Gerar, to '
  - type: note
    content: This is not the Abimelech of ch 20. Abimelech may actually be a dynastic title, like Caesar or Pharaoh, instead of a proper name. The events recounted in chapters 20 and 26 are separated by almost a hundred years.
  - type: text
    content: 'Abimelech king of the Philistines. '
  '10':
  - type: text
    content: 'Abimelech said, “What is this that you have done to us? One of the men [among our people] might easily have been intimate with your wife, and you would have brought guilt on us [before God].” '
  '11':
  - type: text
    content: Then Abimelech commanded all his people, “Whoever touches this man [Isaac] or his wife [Rebekah] shall without exception be put to death.”
  '12':
  - type: text
    content: Then Isaac planted [seed] in that land [as a farmer] and reaped in the same year a hundred times [as much as he had planted], and the L
  - type: heading
    content: ord
  - type: text
    content: ' blessed '
  - type: text
    content: and
  - type: text
    content: ' favored him. '
  '13':
  - type: text
    content: 'And the man [Isaac] became great and gained more and more until he became very wealthy '
  - type: text
    content: and
  - type: text
    content: ' extremely distinguished; '
  '14':
  - type: text
    content: 'he owned flocks and herds and a great household [with a number of servants], and the Philistines envied him. '
  '15':
  - type: text
    content: 'Now all the wells which his father’s servants had dug in the days of Abraham his father, the Philistines stopped up by filling them with dirt. '
  '16':
  - type: text
    content: 'Then Abimelech said to Isaac, “Go away from here, because you are far too powerful for us.” '
  '17':
  - type: text
    content: So Isaac left that region and camped in the Valley of Gerar, and settled there.
  - type: heading
    content: Quarrel over the Wells
  '18':
  - type: text
    content: 'Now Isaac again dug [and reopened] the wells of water which had been dug in the days of Abraham his father, because the Philistines had filled them up [with dirt] after the death of Abraham; and he gave the wells the same names that his father had given them. '
  '19':
  - type: text
    content: 'But when Isaac’s servants dug in the valley and found there a well of flowing [spring] water, '
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to him and said, “Do not go down to Egypt; stay in the land of which I will tell you. '
  '20':
  - type: text
    content: 'the herdsmen of Gerar quarreled with Isaac’s herdsmen, saying, “The water is ours!” So Isaac named the well Esek (quarreling), because they quarreled with him. '
  '21':
  - type: text
    content: 'Then his servants dug another well, and they quarreled over that also, so Isaac named it Sitnah (enmity). '
  '22':
  - type: text
    content: He moved away from there and dug another well, and they did not quarrel over that one; so he named it Rehoboth (broad places), saying, “For now the L
  - type: heading
    content: ord
  - type: text
    content: ' has made '
  - type: note
    content: I.e. broad places.
  - type: text
    content: 'room for us, and we shall be '
  - type: note
    content: Lit fruitful.
  - type: text
    content: prosperous in the land.”
  '23':
  - type: text
    content: 'Then he went up from there to Beersheba. '
  '24':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to him the same night and said,'
  - type: text
    content: “I am the God of Abraham your father;
  - type: text
    content: Do not be afraid, for I am with you.
  - type: text
    content: 'I will bless '
  - type: text
    content: and
  - type: text
    content: ' favor you, and multiply your descendants,'
  - type: text
    content: For the sake of My servant Abraham.”
  '25':
  - type: text
    content: So Isaac built an altar there and called on the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' [in prayer]. He pitched his tent there; and there Isaac’s servants dug a well.'
  - type: heading
    content: Covenant with Abimelech
  '26':
  - type: text
    content: 'Then Abimelech came to him from Gerar with Ahuzzath, his [close friend and confidential] adviser, and Phicol, the commander of his army. '
  '27':
  - type: text
    content: 'Isaac said to them, “Why have you [people] come to me, since you hate me and have sent me away from you?” '
  '28':
  - type: text
    content: They said, “We see clearly that the L
  - type: heading
    content: ord
  - type: text
    content: ' has been with you; so we said, ‘There should now be an oath between us [with a curse for the one who breaks it], that is, between you and us, and let us make a covenant (binding agreement, solemn promise) with you, '
  '29':
  - type: text
    content: 'that you will not harm us, just as we have not touched you and have done nothing but good to you and have sent you away in peace. You are now the blessed '
  - type: text
    content: and
  - type: text
    content: ' favored of the L'
  - type: heading
    content: ord
  - type: text
    content: '!’ ” '
  '3':
  - type: text
    content: 'Live temporarily [as a resident] in this land and I will be with you and will bless '
  - type: text
    content: and
  - type: text
    content: ' favor you, for I will give all these lands to you and to your descendants, and I will establish '
  - type: text
    content: and
  - type: text
    content: ' carry out the oath which I swore to Abraham your father. [Gen 22:16-18; Ps 105:9] '
  '30':
  - type: text
    content: 'Then Isaac held a [formal] banquet (covenant feast) for them, and they ate and drank. '
  '31':
  - type: text
    content: 'They got up early in the morning and swore oaths [pledging to do nothing but good to each other]; and Isaac sent them on their way and they left him in peace. '
  '32':
  - type: text
    content: 'Now on the same day, Isaac’s servants came and told him about the well they had dug, saying, “We have found water.” '
  '33':
  - type: text
    content: 'So he named the well '
  - type: note
    content: This could mean “oath” or “overflow, abundance.” Likewise, the name Beersheba could mean “well of abundance,” or “well of the oath,” or “seven wells.”
  - type: text
    content: Shibah; therefore the name of the city is Beersheba to this day. [Gen 21:31]
  '34':
  - type: text
    content: 'When Esau was forty years old he married Judith the daughter of Beeri the Hittite, and Basemath the daughter of Elon the Hittite as his wives; '
  '35':
  - type: text
    content: 'and they were a '
  - type: note
    content: Lit bitterness of spirit.
  - type: text
    content: source of grief to [Esau’s parents] Isaac and Rebekah.
  '4':
  - type: text
    content: 'I will make your descendants multiply as the stars of the heavens, and will give to your descendants all these lands; and by your descendants shall all the nations of the earth be blessed, [Gen 22:18; Acts 3:25, 26; Gal 3:16] '
  '5':
  - type: text
    content: 'because Abraham listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed My voice and [consistently] kept My charge, My commandments, My statutes, and My laws.”'
  '6':
  - type: text
    content: 'So Isaac stayed in Gerar. '
  '7':
  - type: text
    content: 'The men of the place asked him about his wife, and he said, “She is my '
  - type: note
    content: When Abraham used this ploy, it was a half-truth; when Isaac said this it was a complete lie. At this time Isaac was at least seventy-five years old; Rebekah’s age at this time is not known.
  - type: text
    content: 'sister,” for he was afraid to say, “my wife”—thinking, “the men of the place might kill me on account of Rebekah, since she is very beautiful.” '
  '8':
  - type: text
    content: 'It happened when he had been there a long time, that Abimelech king of the Philistines looked out of a window and saw Isaac '
  - type: note
    content: The name “Isaac” is based on the Hebrew verb translated “caressing,” whose primary meaning is “to laugh” (cf 17:19).
  - type: text
    content: 'caressing Rebekah his wife. '
  '9':
  - type: text
    content: 'Then Abimelech called Isaac and said, “See here, Rebekah is in fact your wife! How did you [dare to] say to me, ‘She is my sister’?” And Isaac said to him, “Because I thought I might be killed because of her [desirability].” '
