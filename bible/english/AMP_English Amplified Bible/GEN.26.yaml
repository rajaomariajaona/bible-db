document_id: GEN.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaac Settles in Gerar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now there was a famine in the land [of Canaan], besides the previous famine that had occurred in the days of Abraham. So Isaac went to Gerar, to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not the Abimelech of ch 20. Abimelech may actually be a dynastic title, like Caesar or Pharaoh, instead of a proper name. The events recounted in chapters 20 and 26 are separated by almost a hundred years.
    marker-yv: yv-n
  - type: text
    text: 'Abimelech king of the Philistines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared to him and said, “Do not go down to Egypt; stay in the land of which I will tell you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Live temporarily [as a resident] in this land and I will be with you and will bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor you, for I will give all these lands to you and to your descendants, and I will establish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' carry out the oath which I swore to Abraham your father. [Gen 22:16-18; Ps 105:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I will make your descendants multiply as the stars of the heavens, and will give to your descendants all these lands; and by your descendants shall all the nations of the earth be blessed, [Gen 22:18; Acts 3:25, 26; Gal 3:16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'because Abraham listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed My voice and [consistently] kept My charge, My commandments, My statutes, and My laws.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Isaac stayed in Gerar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The men of the place asked him about his wife, and he said, “She is my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When Abraham used this ploy, it was a half-truth; when Isaac said this it was a complete lie. At this time Isaac was at least seventy-five years old; Rebekah’s age at this time is not known.
    marker-yv: yv-n
  - type: text
    text: 'sister,” for he was afraid to say, “my wife”—thinking, “the men of the place might kill me on account of Rebekah, since she is very beautiful.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It happened when he had been there a long time, that Abimelech king of the Philistines looked out of a window and saw Isaac '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name “Isaac” is based on the Hebrew verb translated “caressing,” whose primary meaning is “to laugh” (cf 17:19).
    marker-yv: yv-n
  - type: text
    text: 'caressing Rebekah his wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Abimelech called Isaac and said, “See here, Rebekah is in fact your wife! How did you [dare to] say to me, ‘She is my sister’?” And Isaac said to him, “Because I thought I might be killed because of her [desirability].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Abimelech said, “What is this that you have done to us? One of the men [among our people] might easily have been intimate with your wife, and you would have brought guilt on us [before God].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then Abimelech commanded all his people, “Whoever touches this man [Isaac] or his wife [Rebekah] shall without exception be put to death.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Isaac planted [seed] in that land [as a farmer] and reaped in the same year a hundred times [as much as he had planted], and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the man [Isaac] became great and gained more and more until he became very wealthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extremely distinguished; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'he owned flocks and herds and a great household [with a number of servants], and the Philistines envied him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now all the wells which his father’s servants had dug in the days of Abraham his father, the Philistines stopped up by filling them with dirt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Abimelech said to Isaac, “Go away from here, because you are far too powerful for us.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So Isaac left that region and camped in the Valley of Gerar, and settled there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Quarrel over the Wells
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now Isaac again dug [and reopened] the wells of water which had been dug in the days of Abraham his father, because the Philistines had filled them up [with dirt] after the death of Abraham; and he gave the wells the same names that his father had given them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But when Isaac’s servants dug in the valley and found there a well of flowing [spring] water, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'the herdsmen of Gerar quarreled with Isaac’s herdsmen, saying, “The water is ours!” So Isaac named the well Esek (quarreling), because they quarreled with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then his servants dug another well, and they quarreled over that also, so Isaac named it Sitnah (enmity). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He moved away from there and dug another well, and they did not quarrel over that one; so he named it Rehoboth (broad places), saying, “For now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has made '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. broad places.
    marker-yv: yv-n
  - type: text
    text: 'room for us, and we shall be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fruitful
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: prosperous in the land.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he went up from there to Beersheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared to him the same night and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am the God of Abraham your father;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be afraid, for I am with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor you, and multiply your descendants,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the sake of My servant Abraham.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So Isaac built an altar there and called on the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [in prayer]. He pitched his tent there; and there Isaac’s servants dug a well.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Covenant with Abimelech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Abimelech came to him from Gerar with Ahuzzath, his [close friend and confidential] adviser, and Phicol, the commander of his army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Isaac said to them, “Why have you [people] come to me, since you hate me and have sent me away from you?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They said, “We see clearly that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has been with you; so we said, ‘There should now be an oath between us [with a curse for the one who breaks it], that is, between you and us, and let us make a covenant (binding agreement, solemn promise) with you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'that you will not harm us, just as we have not touched you and have done nothing but good to you and have sent you away in peace. You are now the blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Isaac held a [formal] banquet (covenant feast) for them, and they ate and drank. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'They got up early in the morning and swore oaths [pledging to do nothing but good to each other]; and Isaac sent them on their way and they left him in peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now on the same day, Isaac’s servants came and told him about the well they had dug, saying, “We have found water.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So he named the well '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This could mean “oath” or “overflow, abundance.” Likewise, the name Beersheba could mean “well of abundance,” or “well of the oath,” or “seven wells.”
    marker-yv: yv-n
  - type: text
    text: Shibah; therefore the name of the city is Beersheba to this day. [Gen 21:31]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When Esau was forty years old he married Judith the daughter of Beeri the Hittite, and Basemath the daughter of Elon the Hittite as his wives; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'and they were a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bitterness of spirit
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: source of grief to [Esau’s parents] Isaac and Rebekah.
