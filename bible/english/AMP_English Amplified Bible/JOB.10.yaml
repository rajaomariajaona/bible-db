document_id: JOB.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Despairs of God’s Dealings
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“I am disgusted with my life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' loathe it!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give free expression to my complaint;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will speak in the bitterness of my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I will say to God, ‘Do not condemn me [and declare me guilty]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Show me why You contend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' argue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' struggle with me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ‘Does it indeed seem right to You to oppress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject the work of Your hands,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to look with favor on the schemes of the wicked?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ‘Do You have eyes of flesh?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do You see as a man sees?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘Are Your days as the days of a mortal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are Your years as man’s years,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: That You seek my guilt
- type: usfm
  marker: q1
  children:
  - type: text
    text: And search for my sin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '‘Although You know that I am not guilty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wicked,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet there is no one who can rescue me from Your hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶‘Your hands have formed and made me altogether.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Would You [turn around and] destroy me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘Remember now, that You have made me as clay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So will You turn me into dust again?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ‘Have You not poured me out like milk
- type: usfm
  marker: q1
  children:
  - type: text
    text: And curdled me like cheese?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘[You have] clothed me with skin and flesh,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And knit me together with bones and sinews.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ‘You have granted me life and lovingkindness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your providence (divine care, supervision) has preserved my spirit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '‘Yet these [present evils] You have hidden in Your heart [since my creation]:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know that this was within You [in Your purpose and thought].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '‘If I sin, then You would take note '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' observe me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You would not acquit me of my guilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ‘If I am wicked, woe to me [for judgment comes]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if I am righteous, I dare not lift up my head.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For I am sated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' filled with disgrace and the sight of my misery.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘Should I lift my head up, You would hunt me like a lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And again You would show Your marvelous power against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘You renew Your witnesses against me
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And increase Your indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anger toward me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hardship after hardship is with me [attacking me time after time].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶‘Why then did You bring me out of the womb?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Would that I had perished and no eye had seen me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ‘I should have been as though I had not existed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[I should have been] carried from the womb to the grave.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Would He not let my few days alone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Withdraw from me that I may have a little cheer
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Before I go—and I shall not return—
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the land of darkness and the deep shadow [of death],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The [sunless] land of utter gloom as darkness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: itself
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[The land] of the shadow of death, without order,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [where] it shines as [thick] darkness.”
