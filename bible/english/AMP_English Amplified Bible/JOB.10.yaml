document_id: JOB.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Despairs of God’s Dealings
  - type: text
    content: '“I am disgusted with my life '
  - type: text
    content: and
  - type: text
    content: ' loathe it!'
  - type: text
    content: I will give free expression to my complaint;
  - type: text
    content: I will speak in the bitterness of my soul.
  '10':
  - type: text
    content: ‘Have You not poured me out like milk
  - type: text
    content: And curdled me like cheese?
  '11':
  - type: text
    content: ‘[You have] clothed me with skin and flesh,
  - type: text
    content: And knit me together with bones and sinews.
  '12':
  - type: text
    content: ‘You have granted me life and lovingkindness;
  - type: text
    content: And Your providence (divine care, supervision) has preserved my spirit.
  '13':
  - type: text
    content: '‘Yet these [present evils] You have hidden in Your heart [since my creation]:'
  - type: text
    content: I know that this was within You [in Your purpose and thought].
  '14':
  - type: text
    content: '‘If I sin, then You would take note '
  - type: text
    content: and
  - type: text
    content: ' observe me,'
  - type: text
    content: And You would not acquit me of my guilt.
  '15':
  - type: text
    content: ‘If I am wicked, woe to me [for judgment comes]!
  - type: text
    content: And if I am righteous, I dare not lift up my head.
  - type: text
    content: 'For I am sated '
  - type: text
    content: and
  - type: text
    content: ' filled with disgrace and the sight of my misery.'
  '16':
  - type: text
    content: ‘Should I lift my head up, You would hunt me like a lion;
  - type: text
    content: And again You would show Your marvelous power against me.
  '17':
  - type: text
    content: ‘You renew Your witnesses against me
  - type: text
    content: 'And increase Your indignation '
  - type: text
    content: and
  - type: text
    content: ' anger toward me;'
  - type: text
    content: Hardship after hardship is with me [attacking me time after time].
  '18':
  - type: text
    content: ¶‘Why then did You bring me out of the womb?
  - type: text
    content: Would that I had perished and no eye had seen me!
  '19':
  - type: text
    content: ‘I should have been as though I had not existed;
  - type: text
    content: '[I should have been] carried from the womb to the grave.’'
  '2':
  - type: text
    content: “I will say to God, ‘Do not condemn me [and declare me guilty]!
  - type: text
    content: 'Show me why You contend '
  - type: text
    content: and
  - type: text
    content: ' argue '
  - type: text
    content: and
  - type: text
    content: ' struggle with me.'
  '20':
  - type: text
    content: “Would He not let my few days alone,
  - type: text
    content: Withdraw from me that I may have a little cheer
  '21':
  - type: text
    content: Before I go—and I shall not return—
  - type: text
    content: To the land of darkness and the deep shadow [of death],
  '22':
  - type: text
    content: 'The [sunless] land of utter gloom as darkness '
  - type: text
    content: itself
  - type: text
    content: ','
  - type: text
    content: '[The land] of the shadow of death, without order,'
  - type: text
    content: And [where] it shines as [thick] darkness.”
  '3':
  - type: text
    content: ‘Does it indeed seem right to You to oppress,
  - type: text
    content: 'To despise '
  - type: text
    content: and
  - type: text
    content: ' reject the work of Your hands,'
  - type: text
    content: And to look with favor on the schemes of the wicked?
  '4':
  - type: text
    content: ‘Do You have eyes of flesh?
  - type: text
    content: Do You see as a man sees?
  '5':
  - type: text
    content: ‘Are Your days as the days of a mortal,
  - type: text
    content: Are Your years as man’s years,
  '6':
  - type: text
    content: That You seek my guilt
  - type: text
    content: And search for my sin?
  '7':
  - type: text
    content: '‘Although You know that I am not guilty '
  - type: text
    content: or
  - type: text
    content: ' wicked,'
  - type: text
    content: Yet there is no one who can rescue me from Your hand.
  '8':
  - type: text
    content: ¶‘Your hands have formed and made me altogether.
  - type: text
    content: Would You [turn around and] destroy me?
  '9':
  - type: text
    content: ‘Remember now, that You have made me as clay;
  - type: text
    content: So will You turn me into dust again?
