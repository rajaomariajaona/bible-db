document_id: PSA.91,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 91
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Security of the One Who Trusts in the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: .
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'He who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '91:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The wonderful promises of this chapter are dependent upon one’s meeting the conditions stated in these first two verses (see Ex 15:26).
      marker-yv: yv-n
    - type: text
      text: dwells in the shelter of the Most High
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will remain secure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest in the shadow of the Almighty [whose power no enemy can withstand].'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: No evil will befall you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will any plague come near your tent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶For He will command His angels in regard to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To protect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guard you in all your ways [of obedience and service].'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They will lift you up in their hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you do not [even] strike your foot against a stone. [Luke 4:10, 11; Heb 1:14]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You will tread upon the lion and cobra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young lion and the serpent you will trample underfoot. [Luke 10:19]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ¶“Because he set his love on Me, therefore I will save him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will set him [securely] on high, because he knows My name [he confidently trusts and relies on Me, knowing I will never abandon him, no, never].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “He will call upon Me, and I will answer him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be with him in trouble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will rescue him and honor him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “With a long life I will satisfy him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will let him see My salvation.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will say of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “He is my refuge and my fortress,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God, in whom I trust [with great confidence, and on whom I rely]!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For He will save you from the trap of the fowler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from the deadly pestilence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He will cover you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely protect you with His pinions,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And under His wings you will find refuge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His faithfulness is a shield and a wall.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶You will not be afraid of the terror of night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor of the arrow that flies by day,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nor of the pestilence that stalks in darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor of the destruction (sudden death) that lays waste at noon.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A thousand may fall at your side
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And ten thousand at your right hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But danger will not come near you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You will only [be a spectator as you] look on with your eyes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And witness the [divine] repayment of the wicked [as you watch safely from the shelter of the Most High].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Because you have made the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', [who is] my refuge,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the Most High, your dwelling place, [Ps 91:1, 14]
