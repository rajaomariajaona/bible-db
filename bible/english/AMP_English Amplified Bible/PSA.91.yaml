verses:
  '1':
  - type: heading
    content: Psalm 91
  - type: heading
    content: Security of the One Who Trusts in the Lord.
  - type: text
    content: 'He who '
  - type: note
    content: The wonderful promises of this chapter are dependent upon one’s meeting the conditions stated in these first two verses (see Ex 15:26).
  - type: text
    content: dwells in the shelter of the Most High
  - type: text
    content: 'Will remain secure '
  - type: text
    content: and
  - type: text
    content: ' rest in the shadow of the Almighty [whose power no enemy can withstand].'
  '10':
  - type: text
    content: No evil will befall you,
  - type: text
    content: Nor will any plague come near your tent.
  '11':
  - type: text
    content: ¶For He will command His angels in regard to you,
  - type: text
    content: 'To protect '
  - type: text
    content: and
  - type: text
    content: ' defend '
  - type: text
    content: and
  - type: text
    content: ' guard you in all your ways [of obedience and service].'
  '12':
  - type: text
    content: They will lift you up in their hands,
  - type: text
    content: So that you do not [even] strike your foot against a stone. [Luke 4:10, 11; Heb 1:14]
  '13':
  - type: text
    content: You will tread upon the lion and cobra;
  - type: text
    content: The young lion and the serpent you will trample underfoot. [Luke 10:19]
  '14':
  - type: text
    content: ¶“Because he set his love on Me, therefore I will save him;
  - type: text
    content: I will set him [securely] on high, because he knows My name [he confidently trusts and relies on Me, knowing I will never abandon him, no, never].
  '15':
  - type: text
    content: “He will call upon Me, and I will answer him;
  - type: text
    content: I will be with him in trouble;
  - type: text
    content: I will rescue him and honor him.
  '16':
  - type: text
    content: “With a long life I will satisfy him
  - type: text
    content: And I will let him see My salvation.”
  '2':
  - type: text
    content: I will say of the L
  - type: heading
    content: ord
  - type: text
    content: ', “He is my refuge and my fortress,'
  - type: text
    content: My God, in whom I trust [with great confidence, and on whom I rely]!”
  '3':
  - type: text
    content: For He will save you from the trap of the fowler,
  - type: text
    content: And from the deadly pestilence.
  '4':
  - type: text
    content: 'He will cover you '
  - type: text
    content: and
  - type: text
    content: ' completely protect you with His pinions,'
  - type: text
    content: And under His wings you will find refuge;
  - type: text
    content: His faithfulness is a shield and a wall.
  '5':
  - type: text
    content: ¶You will not be afraid of the terror of night,
  - type: text
    content: Nor of the arrow that flies by day,
  '6':
  - type: text
    content: Nor of the pestilence that stalks in darkness,
  - type: text
    content: Nor of the destruction (sudden death) that lays waste at noon.
  '7':
  - type: text
    content: A thousand may fall at your side
  - type: text
    content: And ten thousand at your right hand,
  - type: text
    content: But danger will not come near you.
  '8':
  - type: text
    content: You will only [be a spectator as you] look on with your eyes
  - type: text
    content: And witness the [divine] repayment of the wicked [as you watch safely from the shelter of the Most High].
  '9':
  - type: text
    content: Because you have made the L
  - type: heading
    content: ord
  - type: text
    content: ', [who is] my refuge,'
  - type: text
    content: Even the Most High, your dwelling place, [Ps 91:1, 14]
