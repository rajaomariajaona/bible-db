document_id: 2CH.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Young Joash Influenced by Jehoiada
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Joash was seven years old when he became king, and he reigned for forty years in Jerusalem. His mother’s name was Zibiah from Beersheba. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All the officers and all the people rejoiced and brought their tax and dropped it into the chest until they had finished [and the chest was full]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'It came about that whenever the Levites brought the chest to the king’s official, and whenever they saw that there was a large amount of money, the king’s secretary and the chief priest’s representative would come and empty the chest, and take it, and return it to its place. They did this day after day and collected a large amount of money. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The king and Jehoiada gave it to those who did the work of the service of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; and they would hire masons and carpenters (craftsmen) and also those who worked in iron and bronze to repair '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restore the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So the workmen labored, and the repair work progressed in their hands; and they restored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' organized the house of God in accordance with its specifications and strengthened it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: When they had finished, they brought the rest of the money before the king and Jehoiada; and it was [melted down and] made into utensils for the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', utensils for ministering and for burnt offerings, and bowls and utensils of gold and silver. And they offered burnt offerings in the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' continually all the days of Jehoiada.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now when Jehoiada grew old and was full of days, he died. He was a hundred and thirty years old at his death. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They buried him in the City of David among the kings, because he had done good [things] in Israel and toward God and His house.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now after the death of Jehoiada [the priest, who had hidden Joash], the officials of Judah came and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The sudden transition to idolatry under Joash in v 18 was attributed by the ancient rabbis to this meeting. They claimed that when the officials '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bowed down
        - type: text
          text: ' to Joash, they were acknowledging him as a god, on the ground that it was actually in the Holy of Holies that he had been hidden for a number of years (see 22:12), and he would not have emerged from this sacred chamber alive if he were not a god. The rabbis said that Joash agreed with the officials and even allowed an idol to be made of himself (one of the idols in v 18), thereby ensuring his own destruction.'
      marker-yv: yv-n
    - type: text
      text: 'bowed down to King Joash; then the king listened to them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They abandoned the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of their fathers, and served the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Wooden symbols of a female deity.
      marker-yv: yv-n
    - type: text
      text: 'Asherim and the idols; so [God’s] wrath came on Judah and Jerusalem for their sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Yet God sent prophets among them to bring them back to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; these prophets testified against them, but they would not listen.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joash Murders Son of Jehoiada
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Joash did what was right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all the days of Jehoiada the priest [his uncle]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then the Spirit of God came over Zechariah the son of Jehoiada the priest, and he stood above the people and said to them, “This is what God has said: ‘Why do you transgress the commandments of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' so that you cannot prosper? Because you have abandoned (turned away from) the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', He has also abandoned (turned away from) you.’ ” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: So they conspired against Zechariah and stoned him [to death] at the command of the king, in the courtyard of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Thus Joash the king did not remember the kindness which Jehoiada, Zechariah’s father, had shown him, but he murdered his son. And when Zechariah was dying, he said, “May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' see this and require an accounting!”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aram Invades and Defeats Judah
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now it happened at the end of the year, that the army of Aram (Syria) went up against Joash. They came to Judah and Jerusalem and killed all the leaders among the people and sent all their spoil to the king of Damascus. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Though the army of the Arameans came with a small company of men, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' handed over a very large army into their hands, because Joash and Judah had abandoned (turned away from) the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of their fathers. So the Arameans executed judgment against Joash.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'When they left Joash (for they left him very ill), his own servants conspired against him because of the blood of the son of Jehoiada the priest, and they murdered him on his bed. So he died, and they buried him in the City of David, but they did not bury him in the tombs of the kings. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The conspirators against Joash were Zabad the son of Shimeath the Ammonitess, and Jehozabad the son of Shimrith the Moabitess. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Now as to his sons and the many prophecies uttered against him and the rebuilding of the house of God, they are written in the commentary on the Book of Kings. Then his son Amaziah became king in his place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jehoiada took two wives for him, and he fathered sons and daughters.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Faithless Priests
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Now it came about after this that Joash decided to restore the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He gathered the priests and the Levites and said to them, “Go out to the cities of Judah and collect money from all Israel to repair the house of your God from year to year; and see that you do it quickly.” But the Levites did not act quickly. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the king called for Jehoiada the high '
    - type: usfm
      marker: it
      children:
      - type: text
        text: priest
    - type: text
      text: ' and said to him, “Why have you not required the Levites to bring in from Judah and Jerusalem the tax for the tent of the testimony which was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: authorized by
    - type: text
      text: ' Moses, the servant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the servant
    - type: text
      text: ' of the assembly of Israel?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the sons of Athaliah, that wicked woman, had broken into the house of God and also had used all the holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dedicated things of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for the Baals.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Temple Repaired
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So at the king’s command they made a chest and set it outside by the gate of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then they made a proclamation in Judah and Jerusalem to bring in for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' the tax that Moses the servant of God imposed on Israel in the wilderness. '
