      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amos was from the Southern Kingdom, Judah, but his message of divine judgment was primarily directed to the Northern Kingdom, Israel.
      marker-yv: yv-n
    - type: text
      text: Israel in the days of Uzziah king of Judah, and in the days of Jeroboam the son of Joash, king of Israel, two years before the earthquake. [Zech 14:5]
