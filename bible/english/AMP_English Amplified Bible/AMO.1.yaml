        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tekoa was a small town in Judah about 10 miles south of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Tekoa, which he saw [in a divine revelation] concerning '
    - type: usfm
