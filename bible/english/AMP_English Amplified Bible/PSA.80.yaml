document_id: PSA.80,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 80
  - type: heading
    content: God Implored to Rescue His People from Their Calamities.
  - type: text
    content: To the Chief Musician; set to [the tune of] “Lilies, a Testimony.” A Psalm of Asaph.
  - type: text
    content: Hear us O Shepherd of Israel,
  - type: text
    content: You who lead Joseph like a flock;
  - type: text
    content: You who sit enthroned above the cherubim [of the ark of the covenant], shine forth!
  '10':
  - type: text
    content: The mountains were covered with its shadow,
  - type: text
    content: And its branches were like the cedars of God.
  '11':
  - type: text
    content: Israel sent out its branches to the [Mediterranean] Sea,
  - type: text
    content: And its branches to the [Euphrates] River. [1 Kin 4:21]
  '12':
  - type: text
    content: 'Why have You broken down its '
  - type: note
    content: I.e. dry-stone walls, built without mortar from loose stones in the fields.
  - type: text
    content: 'walls '
  - type: text
    content: and
  - type: text
    content: ' hedges,'
  - type: text
    content: So that all who pass by pick its fruit?
  '13':
  - type: text
    content: A boar from the woods eats it away,
  - type: text
    content: And the insects of the field feed on it.
  '14':
  - type: text
    content: ¶Turn again [in favor to us], O God of hosts;
  - type: text
    content: Look down from heaven and see, and take care of this vine,
  '15':
  - type: text
    content: Even the stock which Your right hand has planted,
  - type: text
    content: 'And [look down on] the son that You have reared '
  - type: text
    content: and
  - type: text
    content: ' strengthened for Yourself.'
  '16':
  - type: text
    content: It is burned with fire, it is cut down;
  - type: text
    content: They perish at the rebuke of Your [angry] appearance.
  '17':
  - type: text
    content: Let Your hand be upon the man of Your right hand,
  - type: text
    content: Upon the son of man whom You have made strong for Yourself.
  '18':
  - type: text
    content: Then we shall not turn back from You;
  - type: text
    content: Revive us and we will call on Your name.
  '19':
  - type: text
    content: Restore us, O L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts;'
  - type: text
    content: Cause Your face to shine on us [in favor and approval], and we shall be saved.
  '2':
  - type: text
    content: 'Before '
  - type: note
    content: It is believed that these three tribes represented all twelve tribes of Israel, Benjamin being incorporated into Judah, Manasseh inhabiting the country beyond the Jordan, and Ephraim the remainder of the land. It was natural for the Israelites to think of the three in one group, for they had camped together on the west side of the tabernacle during the years in the wilderness, and they were also the only descendants of Jacob’s wife Rachel.
  - type: text
    content: Ephraim and Benjamin and Manasseh, stir up Your power
  - type: text
    content: And come to save us!
  '3':
  - type: text
    content: Restore us, O God;
  - type: text
    content: Cause Your face to shine on us [with favor and approval], and we will be saved.
  '4':
  - type: text
    content: ¶O L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts,'
  - type: text
    content: How long will You be angry with the prayers of Your people?
  '5':
  - type: text
    content: You have fed them the bread of tears,
  - type: text
    content: And You have made them drink [bitter] tears in abundance.
  '6':
  - type: text
    content: You make us an object of contention to our neighbors,
  - type: text
    content: And our enemies laugh [at our suffering] among themselves.
  '7':
  - type: text
    content: Restore us, O God of hosts;
  - type: text
    content: And cause Your face to shine on us [with favor and approval], and we will be saved.
  '8':
  - type: text
    content: ¶You uprooted a vine (Israel) from Egypt;
  - type: text
    content: You drove out the [Canaanite] nations and planted the vine [in Canaan].
  '9':
  - type: text
    content: 'You cleared away '
  - type: text
    content: the ground
  - type: text
    content: ' before it,'
  - type: text
    content: And it took deep root and filled the land.
