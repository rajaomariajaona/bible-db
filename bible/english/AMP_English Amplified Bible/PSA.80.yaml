document_id: PSA.80,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 80
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Implored to Rescue His People from Their Calamities.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] “Lilies, a Testimony.” A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hear us O Shepherd of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who lead Joseph like a flock;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who sit enthroned above the cherubim [of the ark of the covenant], shine forth!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The mountains were covered with its shadow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its branches were like the cedars of God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Israel sent out its branches to the [Mediterranean] Sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its branches to the [Euphrates] River. [1 Kin 4:21]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Why have You broken down its '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '80:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. dry-stone walls, built without mortar from loose stones in the fields.
      marker-yv: yv-n
    - type: text
      text: 'walls '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hedges,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that all who pass by pick its fruit?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A boar from the woods eats it away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the insects of the field feed on it.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ¶Turn again [in favor to us], O God of hosts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look down from heaven and see, and take care of this vine,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Even the stock which Your right hand has planted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [look down on] the son that You have reared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strengthened for Yourself.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: It is burned with fire, it is cut down;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They perish at the rebuke of Your [angry] appearance.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Let Your hand be upon the man of Your right hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Upon the son of man whom You have made strong for Yourself.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then we shall not turn back from You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revive us and we will call on Your name.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Restore us, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cause Your face to shine on us [in favor and approval], and we shall be saved.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Before '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '80:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is believed that these three tribes represented all twelve tribes of Israel, Benjamin being incorporated into Judah, Manasseh inhabiting the country beyond the Jordan, and Ephraim the remainder of the land. It was natural for the Israelites to think of the three in one group, for they had camped together on the west side of the tabernacle during the years in the wilderness, and they were also the only descendants of Jacob’s wife Rachel.
      marker-yv: yv-n
    - type: text
      text: Ephraim and Benjamin and Manasseh, stir up Your power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And come to save us!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Restore us, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cause Your face to shine on us [with favor and approval], and we will be saved.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will You be angry with the prayers of Your people?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have fed them the bread of tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You have made them drink [bitter] tears in abundance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You make us an object of contention to our neighbors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And our enemies laugh [at our suffering] among themselves.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Restore us, O God of hosts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cause Your face to shine on us [with favor and approval], and we will be saved.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶You uprooted a vine (Israel) from Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You drove out the [Canaanite] nations and planted the vine [in Canaan].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'You cleared away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the ground
    - type: text
      text: ' before it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it took deep root and filled the land.
