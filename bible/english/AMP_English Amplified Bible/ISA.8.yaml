document_id: ISA.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Damascus and Samaria Fall
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Take for yourself a large tablet [for public display] and write on it in ordinary characters: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Belonging
    - type: text
      text: ' to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. swift is the plunder, speedy is the prey.
      marker-yv: yv-n
    - type: text
      text: 'Maher-shalal-hash-baz. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Take counsel together [against Judah], but it will come to nothing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Speak the word, but it will not stand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God is with us (Immanuel).”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For in this way the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to me with His strong hand [upon me] and instructed me not to walk in the way of this people [behaving as they do], saying,'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “You are not to say, ‘It is a conspiracy!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In regard to all that this people call a conspiracy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you are not to fear what they fear nor be in dread of it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “It is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts whom you are to regard as holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awesome.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall be your [source of] fear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shall be your [source of] dread [not man].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Then He shall be a sanctuary [a sacred, indestructible shelter for those who fear and trust Him];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But to both the houses of Israel [both the northern and southern kingdoms—Israel and Judah, He will be] a stone on which to stumble and a rock on which to trip,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A trap and a snare for the inhabitants of Jerusalem. [Is 28:6; Rom 9:33; 1 Pet 2:6-8]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Many [among them] will stumble over them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will fall and be broken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will even be snared and trapped.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Bind up the testimony, seal the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the teaching among my (Isaiah’s) disciples. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And I will wait for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who is hiding His face from the house of Jacob; and I will look eagerly for Him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Listen carefully, I and the children whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has given me are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah’s own name means “Salvation of the Lord.” His two children’s names were “signs” as well, the one (see note v 1) pointing to the coming military crisis and the other (see note 7:3) to the future restoration.
      marker-yv: yv-n
    - type: text
      text: for signs and wonders [that will occur] in Israel from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, who dwells on Mount Zion.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When the people [instead of trusting God] say to you, “Consult the mediums [who try to talk to the dead] and the soothsayers who chirp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' whisper and mutter,” should not a people consult their God? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Should they consult
    - type: text
      text: ' the dead on behalf of the living? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And I will get faithful witnesses to attest [to this prophecy] for me, Uriah the priest and Zechariah the son of Jeberechiah.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '[Direct those people] to the law and to the testimony! If their teachings are not in accord with this word, it is because they have no dawn. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'They [who consult mediums and soothsayers] will pass through the land deeply distressed and hungry, and when they are hungry, they will become enraged and will curse their king and their God as they look upward. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then they will look to the earth, they will see only distress and darkness, the gloom of anguish; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they will be
    - type: text
      text: ' driven away into darkness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overwhelming night.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So I approached [my wife] the prophetess, and she conceived and gave birth to a son. Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Name him Maher-shalal-hash-baz [to remind the people of the prophecy]; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'for before the boy knows how to say, ‘My father’ or ‘My mother,’ the riches of Damascus (Aram’s capital) and the spoil of Samaria (Israel’s capital) '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Samaria was overthrown by Assyria in 722 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: ., ten years after the downfall of Damascus, fulfilling this prophecy.
      marker-yv: yv-n
    - type: text
      text: will be carried away by the king of Assyria.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Again the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to me, saying,'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Because these people (Judah) have refused the gently flowing waters of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The perennial spring outside Jerusalem that flowed to the Pool of Siloam, Jerusalem’s water supply. The spring was a symbol of God’s protection and sustaining power.
      marker-yv: yv-n
    - type: text
      text: Shiloah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rejoice in Rezin [the king of Aram] and Remaliah’s son [Pekah the king of Israel],
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now therefore, listen carefully, the Lord is about to bring on them the waters of the [Euphrates] River, strong and abundant—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king of Assyria and all his glory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it will rise over all its channels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' canals and go far beyond its banks. [Is 7:17]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Then it will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was literally fulfilled, and although Aram and Israel were conquered and led into captivity, the kingdom of Judah was spared and continued for over 130 years.
      marker-yv: yv-n
    - type: text
      text: sweep on into Judah; it will overflow and pass through [the hills],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reaching even to the neck [of which Jerusalem is the head],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its outstretched wings (the armies of Assyria) will fill the width of Your land, O Immanuel. [Num 14:9; Ps 46:7]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Believing Remnant
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶“Be broken [in pieces], O peoples, and be shattered!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, all you [our enemies from the] far countries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare yourselves [for war], and be shattered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare yourselves [for war], and be shattered.
