document_id: ISA.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Damascus and Samaria Fall
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Take for yourself a large tablet [for public display] and write on it in ordinary characters: '
  - type: text
    content: Belonging
  - type: text
    content: ' to '
  - type: note
    content: I.e. swift is the plunder, speedy is the prey.
  - type: text
    content: 'Maher-shalal-hash-baz. '
  '10':
  - type: text
    content: “Take counsel together [against Judah], but it will come to nothing;
  - type: text
    content: Speak the word, but it will not stand,
  - type: text
    content: For God is with us (Immanuel).”
  '11':
  - type: text
    content: For in this way the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to me with His strong hand [upon me] and instructed me not to walk in the way of this people [behaving as they do], saying,'
  '12':
  - type: text
    content: “You are not to say, ‘It is a conspiracy!’
  - type: text
    content: In regard to all that this people call a conspiracy,
  - type: text
    content: And you are not to fear what they fear nor be in dread of it.
  '13':
  - type: text
    content: “It is the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts whom you are to regard as holy '
  - type: text
    content: and
  - type: text
    content: ' awesome.'
  - type: text
    content: He shall be your [source of] fear,
  - type: text
    content: He shall be your [source of] dread [not man].
  '14':
  - type: text
    content: “Then He shall be a sanctuary [a sacred, indestructible shelter for those who fear and trust Him];
  - type: text
    content: But to both the houses of Israel [both the northern and southern kingdoms—Israel and Judah, He will be] a stone on which to stumble and a rock on which to trip,
  - type: text
    content: A trap and a snare for the inhabitants of Jerusalem. [Is 28:6; Rom 9:33; 1 Pet 2:6-8]
  '15':
  - type: text
    content: “Many [among them] will stumble over them;
  - type: text
    content: Then they will fall and be broken,
  - type: text
    content: They will even be snared and trapped.”
  '16':
  - type: text
    content: 'Bind up the testimony, seal the law '
  - type: text
    content: and
  - type: text
    content: ' the teaching among my (Isaiah’s) disciples. '
  '17':
  - type: text
    content: And I will wait for the L
  - type: heading
    content: ord
  - type: text
    content: ' who is hiding His face from the house of Jacob; and I will look eagerly for Him. '
  '18':
  - type: text
    content: Listen carefully, I and the children whom the L
  - type: heading
    content: ord
  - type: text
    content: ' has given me are '
  - type: note
    content: Isaiah’s own name means “Salvation of the Lord.” His two children’s names were “signs” as well, the one (see note v 1) pointing to the coming military crisis and the other (see note 7:3) to the future restoration.
  - type: text
    content: for signs and wonders [that will occur] in Israel from the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, who dwells on Mount Zion.'
  '19':
  - type: text
    content: 'When the people [instead of trusting God] say to you, “Consult the mediums [who try to talk to the dead] and the soothsayers who chirp '
  - type: text
    content: and
  - type: text
    content: ' whisper and mutter,” should not a people consult their God? '
  - type: text
    content: Should they consult
  - type: text
    content: ' the dead on behalf of the living? '
  '2':
  - type: text
    content: 'And I will get faithful witnesses to attest [to this prophecy] for me, Uriah the priest and Zechariah the son of Jeberechiah.” '
  '20':
  - type: text
    content: '[Direct those people] to the law and to the testimony! If their teachings are not in accord with this word, it is because they have no dawn. '
  '21':
  - type: text
    content: 'They [who consult mediums and soothsayers] will pass through the land deeply distressed and hungry, and when they are hungry, they will become enraged and will curse their king and their God as they look upward. '
  '22':
  - type: text
    content: 'Then they will look to the earth, they will see only distress and darkness, the gloom of anguish; and '
  - type: text
    content: they will be
  - type: text
    content: ' driven away into darkness '
  - type: text
    content: and
  - type: text
    content: ' overwhelming night.'
  '3':
  - type: text
    content: So I approached [my wife] the prophetess, and she conceived and gave birth to a son. Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Name him Maher-shalal-hash-baz [to remind the people of the prophecy]; '
  '4':
  - type: text
    content: 'for before the boy knows how to say, ‘My father’ or ‘My mother,’ the riches of Damascus (Aram’s capital) and the spoil of Samaria (Israel’s capital) '
  - type: note
    content: Samaria was overthrown by Assyria in 722 b.c., ten years after the downfall of Damascus, fulfilling this prophecy.
  - type: text
    content: will be carried away by the king of Assyria.”
  '5':
  - type: text
    content: Again the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to me, saying,'
  '6':
  - type: text
    content: '“Because these people (Judah) have refused the gently flowing waters of '
  - type: note
    content: The perennial spring outside Jerusalem that flowed to the Pool of Siloam, Jerusalem’s water supply. The spring was a symbol of God’s protection and sustaining power.
  - type: text
    content: Shiloah
  - type: text
    content: And rejoice in Rezin [the king of Aram] and Remaliah’s son [Pekah the king of Israel],
  '7':
  - type: text
    content: Now therefore, listen carefully, the Lord is about to bring on them the waters of the [Euphrates] River, strong and abundant—
  - type: text
    content: The king of Assyria and all his glory;
  - type: text
    content: 'And it will rise over all its channels '
  - type: text
    content: and
  - type: text
    content: ' canals and go far beyond its banks. [Is 7:17]'
  '8':
  - type: text
    content: '“Then it will '
  - type: note
    content: This prophecy was literally fulfilled, and although Aram and Israel were conquered and led into captivity, the kingdom of Judah was spared and continued for over 130 years.
  - type: text
    content: sweep on into Judah; it will overflow and pass through [the hills],
  - type: text
    content: Reaching even to the neck [of which Jerusalem is the head],
  - type: text
    content: And its outstretched wings (the armies of Assyria) will fill the width of Your land, O Immanuel. [Num 14:9; Ps 46:7]
  - type: heading
    content: A Believing Remnant
  '9':
  - type: text
    content: ¶“Be broken [in pieces], O peoples, and be shattered!
  - type: text
    content: Listen, all you [our enemies from the] far countries.
  - type: text
    content: Prepare yourselves [for war], and be shattered;
  - type: text
    content: Prepare yourselves [for war], and be shattered.
