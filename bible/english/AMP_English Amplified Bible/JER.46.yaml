- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Why have I seen it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are terrified
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have turned back,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their warriors are beaten down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They take flight in haste
- type: usfm
  marker: q1
  children:
  - type: text
    text: Without looking back;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terror is on every side!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Ps 31:13; Jer 6:25; 20:3, 10; 49:29]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not let the swift man run,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor the mighty man escape;
- type: usfm
  marker: q1
  children:
