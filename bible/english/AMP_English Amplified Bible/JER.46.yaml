- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This may be viewed as an ironic declaration by God: the Nile rises and floods Egypt providing irrigation, and God says He will do the same thing, but in a sense destroying Egypt (see v 10).'
    marker-yv: yv-n
  - type: text
    text: He has said, “I will rise, I will cover that land;
- type: usfm
  marker: q1
  children:
