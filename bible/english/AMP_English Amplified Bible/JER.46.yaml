  '26':
  - type: text
    content: 'I will put them into the hand of those who seek their lives, and into the hand of Nebuchadnezzar king of Babylon and into the hand of his servants. Afterward Egypt will be '
  - type: note
    content: God, through His prophets, accurately foretold the future of the prominent nations of Old Testament times, often specifying the fate of particular rulers and major cities as well. The fulfillment of these prophecies is usually indicated in the textual references or the notes. The prophecies are specific; what was said of Babylon, for instance, would not have been applicable to Egypt or Ammon or Sidon. History records their fulfillment. If there was no other evidence that there is a God and that the Bible is inspired by Him, the fulfillment of prophecy in history should be sufficient proof for anyone capable of thinking it through. Nor are the prophecies against some nations recorded by only one writer, but a number of them, widely separated by time and circumstances.
