    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, says, “Behold, I am going to punish Amon [chief god of the sacred city] of Thebes [the capital of Upper Egypt], and Pharaoh, and Egypt along with her gods and her kings—even Pharaoh and those who put their trust in him [as a shield against Babylon]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I will put them into the hand of those who seek their lives, and into the hand of Nebuchadnezzar king of Babylon and into the hand of his servants. Afterward Egypt will be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God, through His prophets, accurately foretold the future of the prominent nations of Old Testament times, often specifying the fate of particular rulers and major cities as well. The fulfillment of these prophecies is usually indicated in the textual references or the notes. The prophecies are specific; what was said of Babylon, for instance, would not have been applicable to Egypt or Ammon or Sidon. History records their fulfillment. If there was no other evidence that there is a God and that the Bible is inspired by Him, the fulfillment of prophecy in history should be sufficient proof for anyone capable of thinking it through. Nor are the prophecies against some nations recorded by only one writer, but a number of them, widely separated by time and circumstances.
    marker-yv: yv-n
  - type: text
    text: inhabited as in the days of old,” says the L
