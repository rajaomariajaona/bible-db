- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who is this that rises up like the Nile [River],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like the rivers [in the delta of Egypt] whose waters surge about?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Egypt rises like the Nile,
- type: usfm
  marker: q1
  children:
  - type: text
