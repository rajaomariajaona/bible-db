  - type: text
    text: Charge, you horses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And drive like madmen, you chariots!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let the warriors go forward:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ethiopia and Put (Libya) who handle the shield,
- type: usfm
  marker: q1
  children:
  - type: text
