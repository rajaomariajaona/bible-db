document_id: DEU.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Administration of Justice
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You shall not sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God an ox or sheep with a blemish or any defect, for that is a detestable thing to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall act in accordance with the terms of the verdict which they declare to you from that place which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' chooses. You shall be careful to act in accordance with all of their instructions. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall act in accordance with the law which they teach you and the judgment which they tell you. You shall not turn aside from their verdict, to the right or to the left. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man who acts presumptuously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolently by not listening to the priest who stands there to serve the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, nor to the judge, that man shall die; so you shall remove the evil from Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all the people will hear and be afraid, and will not act presumptuously again.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When you enter the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving you, and you take possession of it and live there, and you say, ‘I will set a king over me like all the nations who are around me,’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: you shall most certainly set a king over you whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God chooses. You shall set a king over you from among your countrymen (brothers); you may not choose a foreigner [to rule] over you who is not your countryman. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Further, he shall not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: multiply for himself
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: acquire many [war] horses for himself, nor make the people return to Egypt in order to acquire horses [to expand his military power], since the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to you, ‘You shall never return that way again.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He shall not acquire multiple wives for himself, or else his heart will turn away [from God]; nor [for the same reason] shall he acquire great amounts of silver and gold.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now it shall come about when he sits on the throne of his kingdom, he shall write for himself a copy of this law on a scroll in the presence of the Levitical priests. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it shall be with him and he shall read it all the days of his life, so that he may learn to fear [and worship] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God [with awe-filled reverence and profound respect], by carefully obeying (keeping foremost in his thoughts and actively doing) all the words of this law and these statutes, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If there is discovered among you, within any of your cities, which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is giving you, a man or a woman who does evil in the sight of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, by transgressing (violating) His covenant, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that his heart will not be lifted up above his countrymen [by a false sense of self-importance and self-reliance] and that he will not turn away (deviate) from the commandment, to the right or to the left, so that he and his sons may continue [to reign] for a long time in his kingdom in Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and has gone and served other gods and worshiped them, or the sun or the moon or any of the heavenly host, [doing these things] which I have commanded not to do, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if it is told to you and you hear about it, then you shall investigate thoroughly [all the charges]. If it is confirmed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the word is certain
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'beyond doubt that this detestable thing has been done in Israel, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall bring that man or that woman who has done this evil thing to the gates [of your city] and you shall stone the man or the woman to death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: By the mouth of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On the evidence of two or three witnesses, he who is to die shall be put to death; he shall not be put to death on the evidence of [only] one witness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The hand of the witnesses shall be the first against him to put him to death, and afterward the hand of all the people. So you shall remove the evil from among you.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If any case is too difficult for you to judge—between one kind of homicide and another, between one kind of lawsuit and another, between one kind of assault and another, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: any words of judgment
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'being controversial issues in your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: gates
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: courts—then you shall arise and go to the place which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God chooses. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So you shall come to the Levitical priests or to the judge who is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in office
    - type: text
      text: ' at that time, and you shall consult them and they will declare to you the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the word of judgment
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'verdict in the case. '
