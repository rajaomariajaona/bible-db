document_id: DEU.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Administration of Justice
  - type: text
    content: “You shall not sacrifice to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God an ox or sheep with a blemish or any defect, for that is a detestable thing to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '10':
  - type: text
    content: You shall act in accordance with the terms of the verdict which they declare to you from that place which the L
  - type: heading
    content: ord
  - type: text
    content: ' chooses. You shall be careful to act in accordance with all of their instructions. '
  '11':
  - type: text
    content: 'You shall act in accordance with the law which they teach you and the judgment which they tell you. You shall not turn aside from their verdict, to the right or to the left. '
  '12':
  - type: text
    content: 'The man who acts presumptuously '
  - type: text
    content: and
  - type: text
    content: ' insolently by not listening to the priest who stands there to serve the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, nor to the judge, that man shall die; so you shall remove the evil from Israel. '
  '13':
  - type: text
    content: Then all the people will hear and be afraid, and will not act presumptuously again.
  '14':
  - type: text
    content: “When you enter the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you, and you take possession of it and live there, and you say, ‘I will set a king over me like all the nations who are around me,’ '
  '15':
  - type: text
    content: you shall most certainly set a king over you whom the L
  - type: heading
    content: ord
  - type: text
    content: ' your God chooses. You shall set a king over you from among your countrymen (brothers); you may not choose a foreigner [to rule] over you who is not your countryman. '
  '16':
  - type: text
    content: 'Further, he shall not '
  - type: note
    content: Lit multiply for himself and so throughout.
  - type: text
    content: acquire many [war] horses for himself, nor make the people return to Egypt in order to acquire horses [to expand his military power], since the L
  - type: heading
    content: ord
  - type: text
    content: ' said to you, ‘You shall never return that way again.’ '
  '17':
  - type: text
    content: He shall not acquire multiple wives for himself, or else his heart will turn away [from God]; nor [for the same reason] shall he acquire great amounts of silver and gold.
  '18':
  - type: text
    content: '“Now it shall come about when he sits on the throne of his kingdom, he shall write for himself a copy of this law on a scroll in the presence of the Levitical priests. '
  '19':
  - type: text
    content: And it shall be with him and he shall read it all the days of his life, so that he may learn to fear [and worship] the L
  - type: heading
    content: ord
  - type: text
    content: ' his God [with awe-filled reverence and profound respect], by carefully obeying (keeping foremost in his thoughts and actively doing) all the words of this law and these statutes, '
  '2':
  - type: text
    content: “If there is discovered among you, within any of your cities, which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you, a man or a woman who does evil in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, by transgressing (violating) His covenant, '
  '20':
  - type: text
    content: so that his heart will not be lifted up above his countrymen [by a false sense of self-importance and self-reliance] and that he will not turn away (deviate) from the commandment, to the right or to the left, so that he and his sons may continue [to reign] for a long time in his kingdom in Israel.
  '3':
  - type: text
    content: 'and has gone and served other gods and worshiped them, or the sun or the moon or any of the heavenly host, [doing these things] which I have commanded not to do, '
  '4':
  - type: text
    content: 'and if it is told to you and you hear about it, then you shall investigate thoroughly [all the charges]. If it is confirmed '
  - type: note
    content: Lit the word is certain.
  - type: text
    content: 'beyond doubt that this detestable thing has been done in Israel, '
  '5':
  - type: text
    content: 'then you shall bring that man or that woman who has done this evil thing to the gates [of your city] and you shall stone the man or the woman to death. '
  '6':
  - type: note
    content: Lit By the mouth of.
  - type: text
    content: 'On the evidence of two or three witnesses, he who is to die shall be put to death; he shall not be put to death on the evidence of [only] one witness. '
  '7':
  - type: text
    content: The hand of the witnesses shall be the first against him to put him to death, and afterward the hand of all the people. So you shall remove the evil from among you.
  '8':
  - type: text
    content: '“If any case is too difficult for you to judge—between one kind of homicide and another, between one kind of lawsuit and another, between one kind of assault and another, '
  - type: note
    content: Lit any words of judgment.
  - type: text
    content: 'being controversial issues in your '
  - type: note
    content: Lit gates.
  - type: text
    content: courts—then you shall arise and go to the place which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God chooses. '
  '9':
  - type: text
    content: 'So you shall come to the Levitical priests or to the judge who is '
  - type: text
    content: in office
  - type: text
    content: ' at that time, and you shall consult them and they will declare to you the '
  - type: note
    content: Lit the word of judgment.
  - type: text
    content: 'verdict in the case. '
