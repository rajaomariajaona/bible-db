document_id: EZK.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Mountains of Israel to Be Blessed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “And you, son of man, prophesy to the mountains of Israel and say, ‘You mountains of Israel, hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Because the enemy has said of you, ‘Aha!’ and, ‘The ancient heights have become our property,’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: therefore prophesy and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “For good reason they have made you a desolation, and they crushed you from every side so that you would become a possession of the rest of the nations and you have become the talk and the whispering of the people.” ’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Therefore, O mountains of Israel, hear the word of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: . Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' to the mountains and to the hills, to the ravines and to the valleys, to the desolate ruins and to the deserted cities which have become prey and a mockery to the rest of the nations which surround you, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: therefore thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Most certainly in the fire of My jealousy (love for that which is Mine) I have spoken against the rest of the nations and against all Edom, who appropriated My land for themselves as a possession with wholehearted joy and with uttermost contempt, so that they might empty it out [and possess it] as prey.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore prophesy concerning the land of Israel and say to the mountains and to the hills, to the ravines and to the valleys, “Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Behold, I have spoken in My jealousy (love for that which is Mine) and in My wrath because you have endured the [shameful] insults of the nations.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘I have lifted up My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sworn [an oath] that the nations that are around you will themselves endure their [shameful] insults. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But you, O mountains of Israel, will put out your branches and bear your fruit to My people Israel; for they will soon come [home]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For, behold, I am for you, and I will turn to you [in favor], and you shall be cultivated and sown. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I will multiply people on you, all the house of Israel, [indeed] all of it; the cities shall be inhabited and the ruins will be rebuilt. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I will multiply on you man and animal; and they will increase and be fruitful. And I will cause you to be inhabited as you were formerly, and I will do better [things] for you than at your beginning. Then you will know [with great confidence] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Yes, [O mountains of Israel] I will cause men—My people Israel—to walk on you and take possession of you, so that you will become their inheritance and never again bereave them of children.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Because they say to you, “You [O land] are a devourer of people and have bereaved your nation of children,” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: therefore you will no longer devour people, and no longer bereave your nation of children,’ says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will not let you hear insults from the nations anymore, nor will you bear disgrace from the peoples any longer, nor will you cause your nation to stumble [through idolatry] any longer,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moreover, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Son of man, when the house of Israel was living in their own land, they defiled it by their [own] behavior and by their [idolatrous] actions. Their conduct before Me was like the uncleanness of a woman during her [physical] impurity. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So I poured out My wrath on them for the blood which they had shed on the land and because they had defiled it with their idols. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also I scattered them among the nations and they were dispersed throughout the countries. I judged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished them in accordance with their conduct and their [idolatrous] behavior. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When they came to the nations wherever they went, they profaned My holy name, because it was said of them, ‘These are the people of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; yet they have come out of His land.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But I had concern for My holy name, which the house of Israel had profaned among the nations where they went.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel to Be Renewed for His Name’s Sake
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Therefore say to the house of Israel, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “It is not for your sake, O house of Israel, that I am about to act, but for My holy name, which you have profaned among the nations where you went. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I will vindicate the holiness of My great name which has been profaned among the nations, which you have profaned among them. Then the nations will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ',” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “when I prove Myself holy among you in their sight. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For I will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This prophecy has been in the process of fulfillment since World War II. The Jews have for centuries been dispersed among all the nations with only a few remaining in the homeland. But by '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 1960 one-sixth of the Jewish population of the world was in Israel. Already they had been made “one nation” (37:22a)—between sunrise of one day and sunset of the next—“a nation born in one day” (Is 66:8). But the greatest event of all is yet to come (Ezek 37:22b-25). This prophecy will be fulfilled in its entirety.
    marker-yv: yv-n
  - type: text
    text: 'take you from the nations and gather you from all the countries and bring you into your own land. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then I will sprinkle clean water on you, and you will be clean; I will cleanse you from all your uncleanness and from all your idols. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moreover, I will give you a new heart and put a new spirit within you, and I will remove the heart of stone from your flesh and give you a heart of flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'I will put my Spirit within you and cause you to walk in My statutes, and you will keep My ordinances and do them. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You will live in the land that I gave to your fathers; and you will be My people, and I will be your God. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I will also save you from all your uncleanness, and I will call for the grain and make it abundant, and I will not bring famine on you. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I will multiply the fruit of the tree and the produce of the field, so that you will not suffer again the disgrace of famine among the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then you will remember [clearly] your [own] evil ways and your deeds that were not good, and you will loathe yourselves in your own sight for your sins and for your outrageous atrocities. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: I am not doing this for your sake,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: . “Let that be known to you. Be ashamed and humiliated for your [wicked] ways, O house of Israel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “On the day that I cleanse you from all your sins I will also cause the cities [of Israel] to be inhabited, and the ruins will be rebuilt. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The desolate land will be cultivated instead of being a desolation in the sight of everyone who passes by. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then they will say, ‘This land that was deserted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desolate has become like the garden of Eden; and the waste, desolate, and ruined cities are fortified and inhabited.’ '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then the nations that are left around you will know that I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' have rebuilt the ruined places and planted that which was desolate. I the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' have spoken, and will do it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “This too I will let the house of Israel ask Me to do for them: I will increase their people like a flock. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Like the flock for sacrifices, like the flock at Jerusalem during her appointed feasts, so will the desolate cities be filled with flocks of people. Then they will know [with confident assurance] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” ’ ”
