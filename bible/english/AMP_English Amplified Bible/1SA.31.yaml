document_id: 1SA.31,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul and His Sons Slain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Philistines fought against Israel, and the men of Israel fled before them and fell slain on Mount Gilboa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they put Saul’s weapons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' armor in the temple of the Ashtaroth (female goddesses), and they fastened his body to the wall of Beth-shan. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saul had rescued Jabesh-gilead from the attack led by Nahash the Ammonite (ch 11). This act of kindness was a thoughtful expression of their profound gratitude.
      marker-yv: yv-n
    - type: text
      text: 'inhabitants of Jabesh-gilead heard what the Philistines had done to Saul, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'all the brave men stood and walked all night, and they took the bodies of Saul and his sons from the wall of Beth-shan, and they came to Jabesh and cremated them there. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They took their bones and buried them under the tamarisk tree at Jabesh, and fasted [as a sign of mourning and respect] for seven days.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines overtook Saul and his sons; and they killed Jonathan and Abinadab and Malchi-shua, Saul’s sons. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The battle went heavily against Saul, and the archers hit him; and he was severely wounded by the archers. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said to his armor bearer, “Draw your sword and pierce me through with it, otherwise these uncircumcised [Philistines] will come and pierce me through and abuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mock me.” But his armor bearer would not, because he was terrified [of doing such a thing]. So '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In 2 Sam 1:10, an Amalekite claims to have killed Saul.
      marker-yv: yv-n
    - type: text
      text: 'Saul took his sword and fell on it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When his armor bearer saw that Saul was dead, he also fell on his sword and died with him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Saul, his three sons, his armor bearer, and all his men died together on that day.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the men of Israel who were on the other side of the valley [of Jezreel], and those who were beyond the Jordan, saw that the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' men of Israel had fled and that Saul and his sons were dead, they abandoned the cities and fled; then the Philistines came and lived in them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day, when the Philistines came to plunder the dead, they found Saul and his three sons fallen on Mount Gilboa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they cut off Saul’s head and stripped off his weapons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' armor and sent them throughout the land of the Philistines, to bring the good news to the house of their idols and to the people. '
