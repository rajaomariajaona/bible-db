document_id: 1SA.31,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul and His Sons Slain
  - type: text
    content: 'Now the Philistines fought against Israel, and the men of Israel fled before them and fell slain on Mount Gilboa. '
  '10':
  - type: text
    content: 'And they put Saul’s weapons '
  - type: text
    content: and
  - type: text
    content: ' armor in the temple of the Ashtaroth (female goddesses), and they fastened his body to the wall of Beth-shan. '
  '11':
  - type: text
    content: 'When the '
  - type: note
    content: Saul had rescued Jabesh-gilead from the attack led by Nahash the Ammonite (ch 11). This act of kindness was a thoughtful expression of their profound gratitude.
  - type: text
    content: 'inhabitants of Jabesh-gilead heard what the Philistines had done to Saul, '
  '12':
  - type: text
    content: 'all the brave men stood and walked all night, and they took the bodies of Saul and his sons from the wall of Beth-shan, and they came to Jabesh and cremated them there. '
  '13':
  - type: text
    content: They took their bones and buried them under the tamarisk tree at Jabesh, and fasted [as a sign of mourning and respect] for seven days.
  '2':
  - type: text
    content: 'The Philistines overtook Saul and his sons; and they killed Jonathan and Abinadab and Malchi-shua, Saul’s sons. '
  '3':
  - type: text
    content: 'The battle went heavily against Saul, and the archers hit him; and he was severely wounded by the archers. '
  '4':
  - type: text
    content: 'Saul said to his armor bearer, “Draw your sword and pierce me through with it, otherwise these uncircumcised [Philistines] will come and pierce me through and abuse '
  - type: text
    content: and
  - type: text
    content: ' mock me.” But his armor bearer would not, because he was terrified [of doing such a thing]. So '
  - type: note
    content: In 2 Sam 1:10, an Amalekite claims to have killed Saul.
  - type: text
    content: 'Saul took his sword and fell on it. '
  '5':
  - type: text
    content: 'When his armor bearer saw that Saul was dead, he also fell on his sword and died with him. '
  '6':
  - type: text
    content: So Saul, his three sons, his armor bearer, and all his men died together on that day.
  '7':
  - type: text
    content: 'When the men of Israel who were on the other side of the valley [of Jezreel], and those who were beyond the Jordan, saw that the '
  - type: text
    content: other
  - type: text
    content: ' men of Israel had fled and that Saul and his sons were dead, they abandoned the cities and fled; then the Philistines came and lived in them.'
  '8':
  - type: text
    content: 'The next day, when the Philistines came to plunder the dead, they found Saul and his three sons fallen on Mount Gilboa. '
  '9':
  - type: text
    content: 'So they cut off Saul’s head and stripped off his weapons '
  - type: text
    content: and
  - type: text
    content: ' armor and sent them throughout the land of the Philistines, to bring the good news to the house of their idols and to the people. '
