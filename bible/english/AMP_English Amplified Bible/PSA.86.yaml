document_id: PSA.86
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 86
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm of Supplication and Trust.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Prayer of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Incline Your ear, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and answer me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am distressed and needy [I long for Your help].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Protect my life (soul), for I am godly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O You my God, save Your servant, who trusts in You [believing in You and relying on You, confidently committing everything to You].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Be gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' merciful to me, O Lord,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For to You I cry out all the day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Make Your servant rejoice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For to You, O Lord, I lift up my soul [all that I am—in prayer].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For You, O Lord, are good, and ready to forgive [our sins, sending them away, completely letting them go forever and ever];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And abundant in lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflowing in mercy to all those who call upon You.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hear, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', my prayer;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And listen attentively to the voice of my supplications (specific requests)!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In the day of my trouble I will call upon You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You will answer me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: There is no one like You among the gods, O Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor are there any works [of wonder and majesty] like Yours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All nations whom You have made shall come and kneel down in worship before You, O Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they shall glorify Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For You are great and do wondrous works!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You alone are God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶Teach me Your way, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' live in Your truth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Direct my heart to fear Your name [with awe-inspired reverence and submissive wonder]. [Ps 5:11; 69:36]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will give thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You, O Lord my God, with all my heart;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will glorify Your name forevermore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For great is Your lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' graciousness toward me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You have rescued my life from the depths of Sheol [from death].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '¶O God, arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent men have risen up against me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A band of violent men have sought my life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have not set You before them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But You, O Lord, are a God [who protects and is] merciful and gracious,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Slow to anger and abounding in lovingkindness and truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Turn to me, and be gracious to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grant Your strength [Your might and the power to resist temptation] to Your servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And save the son of Your handmaid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Show me a sign of [Your] goodwill,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That those who hate me may see it and be ashamed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', helped and comforted me.'
