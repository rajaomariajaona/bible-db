document_id: PSA.86,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 86
  - type: heading
    content: A Psalm of Supplication and Trust.
  - type: text
    content: A Prayer of David.
  - type: text
    content: Incline Your ear, O L
  - type: heading
    content: ord
  - type: text
    content: ', and answer me,'
  - type: text
    content: For I am distressed and needy [I long for Your help].
  '10':
  - type: text
    content: For You are great and do wondrous works!
  - type: text
    content: You alone are God.
  '11':
  - type: text
    content: ¶Teach me Your way, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'I will walk '
  - type: text
    content: and
  - type: text
    content: ' live in Your truth;'
  - type: text
    content: Direct my heart to fear Your name [with awe-inspired reverence and submissive wonder]. [Ps 5:11; 69:36]
  '12':
  - type: text
    content: 'I will give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise You, O Lord my God, with all my heart;'
  - type: text
    content: And will glorify Your name forevermore.
  '13':
  - type: text
    content: 'For great is Your lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' graciousness toward me;'
  - type: text
    content: And You have rescued my life from the depths of Sheol [from death].
  '14':
  - type: text
    content: '¶O God, arrogant '
  - type: text
    content: and
  - type: text
    content: ' insolent men have risen up against me;'
  - type: text
    content: A band of violent men have sought my life,
  - type: text
    content: And they have not set You before them.
  '15':
  - type: text
    content: But You, O Lord, are a God [who protects and is] merciful and gracious,
  - type: text
    content: Slow to anger and abounding in lovingkindness and truth.
  '16':
  - type: text
    content: Turn to me, and be gracious to me;
  - type: text
    content: Grant Your strength [Your might and the power to resist temptation] to Your servant,
  - type: text
    content: And save the son of Your handmaid.
  '17':
  - type: text
    content: Show me a sign of [Your] goodwill,
  - type: text
    content: That those who hate me may see it and be ashamed,
  - type: text
    content: Because You, O L
  - type: heading
    content: ord
  - type: text
    content: ', helped and comforted me.'
  '2':
  - type: text
    content: 'Protect my life (soul), for I am godly '
  - type: text
    content: and
  - type: text
    content: ' faithful;'
  - type: text
    content: O You my God, save Your servant, who trusts in You [believing in You and relying on You, confidently committing everything to You].
  '3':
  - type: text
    content: 'Be gracious '
  - type: text
    content: and
  - type: text
    content: ' merciful to me, O Lord,'
  - type: text
    content: For to You I cry out all the day long.
  '4':
  - type: text
    content: Make Your servant rejoice,
  - type: text
    content: For to You, O Lord, I lift up my soul [all that I am—in prayer].
  '5':
  - type: text
    content: For You, O Lord, are good, and ready to forgive [our sins, sending them away, completely letting them go forever and ever];
  - type: text
    content: 'And abundant in lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' overflowing in mercy to all those who call upon You.'
  '6':
  - type: text
    content: Hear, O L
  - type: heading
    content: ord
  - type: text
    content: ', my prayer;'
  - type: text
    content: And listen attentively to the voice of my supplications (specific requests)!
  '7':
  - type: text
    content: In the day of my trouble I will call upon You,
  - type: text
    content: For You will answer me.
  '8':
  - type: text
    content: There is no one like You among the gods, O Lord,
  - type: text
    content: Nor are there any works [of wonder and majesty] like Yours.
  '9':
  - type: text
    content: All nations whom You have made shall come and kneel down in worship before You, O Lord,
  - type: text
    content: And they shall glorify Your name.
