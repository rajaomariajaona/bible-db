document_id: PSA.143,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 143
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Help and Guidance.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hear my prayer, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my supplications!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer me in Your faithfulness, and in Your righteousness.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶Teach me to do Your will [so that I may please You],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You are my God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Your good Spirit lead me on level ground.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Save my life, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for Your name’s sake;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In Your righteousness bring my life out of trouble.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In your lovingkindness, silence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy my enemies'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And destroy all those who afflict my life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am Your servant.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And do not enter into judgment with Your servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For in Your sight no man living is righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' justified. [Ps 130:3; Rom 3:20-26; Gal 2:16]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For the enemy has persecuted me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has crushed my life down to the ground;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has made me dwell in dark places, like those who have been long dead.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Therefore my spirit is overwhelmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weak within me [wrapped in darkness];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart grows numb within me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶I remember the days of old;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I meditate on all that You have done;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I ponder the work of Your hands.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I reach out my hands to You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My throat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thirsts
    - type: text
      text: ' for You, as a parched land [thirsts for water]. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶Answer me quickly, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', my spirit fails;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hide Your face from me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or I will become like those who go down into the pit (grave).
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let me hear Your lovingkindness in the morning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I trust in You.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach me the way in which I should walk,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I lift up my soul to You.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rescue me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from my enemies;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I take refuge in You.
