document_id: PSA.143,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 143
  - type: heading
    content: Prayer for Help and Guidance.
  - type: text
    content: A Psalm of David.
  - type: text
    content: Hear my prayer, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Listen to my supplications!
  - type: text
    content: Answer me in Your faithfulness, and in Your righteousness.
  '10':
  - type: text
    content: ¶Teach me to do Your will [so that I may please You],
  - type: text
    content: For You are my God;
  - type: text
    content: Let Your good Spirit lead me on level ground.
  '11':
  - type: text
    content: Save my life, O L
  - type: heading
    content: ord
  - type: text
    content: ', for Your name’s sake;'
  - type: text
    content: In Your righteousness bring my life out of trouble.
  '12':
  - type: text
    content: 'In your lovingkindness, silence '
  - type: text
    content: and
  - type: text
    content: ' destroy my enemies'
  - type: text
    content: And destroy all those who afflict my life,
  - type: text
    content: For I am Your servant.
  '2':
  - type: text
    content: And do not enter into judgment with Your servant,
  - type: text
    content: 'For in Your sight no man living is righteous '
  - type: text
    content: or
  - type: text
    content: ' justified. [Ps 130:3; Rom 3:20-26; Gal 2:16]'
  '3':
  - type: text
    content: For the enemy has persecuted me,
  - type: text
    content: He has crushed my life down to the ground;
  - type: text
    content: He has made me dwell in dark places, like those who have been long dead.
  '4':
  - type: text
    content: 'Therefore my spirit is overwhelmed '
  - type: text
    content: and
  - type: text
    content: ' weak within me [wrapped in darkness];'
  - type: text
    content: My heart grows numb within me.
  '5':
  - type: text
    content: ¶I remember the days of old;
  - type: text
    content: I meditate on all that You have done;
  - type: text
    content: I ponder the work of Your hands.
  '6':
  - type: text
    content: I reach out my hands to You;
  - type: text
    content: 'My throat '
  - type: text
    content: thirsts
  - type: text
    content: ' for You, as a parched land [thirsts for water]. '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: ¶Answer me quickly, O L
  - type: heading
    content: ord
  - type: text
    content: ', my spirit fails;'
  - type: text
    content: Do not hide Your face from me,
  - type: text
    content: Or I will become like those who go down into the pit (grave).
  '8':
  - type: text
    content: Let me hear Your lovingkindness in the morning,
  - type: text
    content: For I trust in You.
  - type: text
    content: Teach me the way in which I should walk,
  - type: text
    content: For I lift up my soul to You.
  '9':
  - type: text
    content: Rescue me, O L
  - type: heading
    content: ord
  - type: text
    content: ', from my enemies;'
  - type: text
    content: I take refuge in You.
