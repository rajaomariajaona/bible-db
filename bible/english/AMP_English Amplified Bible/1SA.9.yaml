  - type: text
    content: .
  '5':
  - type: text
    content: 'When they came to the land of Zuph, Saul said to his servant who was with him, “Come, let us return, otherwise my father will stop '
  - type: text
    content: worrying
  - type: text
    content: ' about the donkeys and become anxious about us.” '
  '6':
  - type: text
    content: 'The servant said to him, “Look here, in this city there is a man of God, and the man is held in honor; everything that he says comes true. Now let us go there; perhaps he can advise us about our journey [and tell us where we should go].” '
  '7':
  - type: text
    content: 'Then Saul said to his servant, “But look, if we go [to see him], what shall we bring to the man? For the bread from our sacks is gone and there is no gift to bring to the man of God. What do we have [to offer]?” '
  '8':
  - type: text
    content: 'The servant replied again to Saul, “Here in my hand I have a quarter of a shekel of silver; I will give that to the man of God, and he will advise us as to [where we should go on] our journey [to find the donkeys].” '
  '9':
  - type: text
    content: '(Formerly in Israel, when a man went to inquire of God, he would say, “Come, let us go to the seer”; for '
  - type: text
    content: he who is called
  - type: text
    content: ' a prophet today was formerly called a seer.) '
