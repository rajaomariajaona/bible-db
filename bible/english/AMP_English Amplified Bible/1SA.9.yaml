document_id: 1SA.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul’s Search
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'There was a man of [the tribe of] Benjamin whose name was Kish the son of Abiel, the son of Zeror, the son of Becorath, the son of Aphiah, a Benjamite, a mighty man of influence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wealth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Saul said to his servant, “Well said; come, let us go.” So they went to the city where the man of God was living.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'As they went up the hill to the city, they met some young women going out to draw water, and said to them, “Is the seer (prophet) here?” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They answered them, “He is; look, he is ahead of you. Hurry now, for he has come into the city today because the people have a sacrifice on the high place today. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As you enter the city you will find him before he goes up to the high place to eat, for the people will not eat until he comes, because he must ask the blessing on the sacrifice; afterward, those who are invited will eat. So go up now, for about now you will find him.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So they went up to the city. And as they came into the city, there was Samuel coming out toward them to go up to the high place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Choice for King
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Now a day before Saul came, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: opened Samuel’s ear
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'informed Samuel [of this], saying, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“About this time tomorrow I will send you a man from the land of Benjamin, and you shall anoint him as leader over My people Israel; and he will save My people from the hand of the Philistines. For I have looked upon [the distress of] My people, because their cry [for help] has come to Me.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When Samuel saw Saul, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “There is the man of whom I spoke to you. This one shall rule over My people [as their king].” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Saul approached Samuel in the [city] gate and said, “Please tell me where the seer’s house is.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Samuel answered Saul, “I am the seer. Go on ahead of me to the high place, for you shall eat with me today; and in the morning I will let you go, and will tell you all that is on your mind. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Kish had a son named Saul, a choice and handsome man; among the sons of Israel there was not a man more handsome than he. From his shoulders and up he was [a head] taller than any of the people.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'As for your donkeys which were lost three days ago, do not be concerned about them, for they have been found. And for whom are all things that are desirable in Israel? Are they not for you and for all your father’s household (family)?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Saul replied, “Am I not a Benjamite, of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The tribe of Benjamin had fallen into disrepute and had been nearly annihilated during the time of the judges (Judg 20:46-48).
      marker-yv: yv-n
    - type: text
      text: the smallest of the tribes of Israel? And is not my family the smallest of all the families of the tribe of Benjamin? Why then have you spoken this way to me [as if I were very important]?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then Samuel took Saul and his servant and brought them into the hall [at the high place] and gave them a place [to sit] at the head of the persons—about thirty men—who were invited [while the rest ate outside]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Samuel said to the cook, “Bring the [priests’] portion that I gave you, regarding which I told you, ‘Set it aside.’ ” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then the cook lifted up the leg (thigh) with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the meat
    - type: text
      text: ' that was on it [indicating that it was the priest’s honored portion] and placed it before Saul. Samuel said, “Here is what has been reserved [for you]. Set it before you and eat, because it has been kept for you until the appointed time, ever since I invited the people.” So Saul ate with Samuel that day.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'When they came down from the high place into the city, Samuel spoke with Saul on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was an ancient custom, and the roofs were flat and designed in part for this purpose. Verse 26 also indicates that Saul was given the roof as a place to sleep.
      marker-yv: yv-n
    - type: text
      text: 'roof [of his house]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'They got up early [the next day]; and at dawn Samuel called Saul [who was sleeping] on the roof, saying, “Get up, so that I may send you on your way.” Saul got up, and both he and Samuel went outside. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: As they were going down to the outskirts of the city, Samuel said to Saul, “Tell the servant to go on ahead of us so that he may pass by but you stand still now so that I may proclaim the word of God to you.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now the donkeys of Kish, Saul’s father, had wandered off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were lost. Kish said to his son Saul, “Please take one of the servants with you and arise, go look for the donkeys.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And they passed through the hill country of Ephraim and the land of Shalishah, but did not find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: '. Then they passed through the land of Shaalim, but they were not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' and the land of the Benjamites, but they [still] did not find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When they came to the land of Zuph, Saul said to his servant who was with him, “Come, let us return, otherwise my father will stop '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worrying
    - type: text
      text: ' about the donkeys and become anxious about us.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The servant said to him, “Look here, in this city there is a man of God, and the man is held in honor; everything that he says comes true. Now let us go there; perhaps he can advise us about our journey [and tell us where we should go].” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then Saul said to his servant, “But look, if we go [to see him], what shall we bring to the man? For the bread from our sacks is gone and there is no gift to bring to the man of God. What do we have [to offer]?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The servant replied again to Saul, “Here in my hand I have a quarter of a shekel of silver; I will give that to the man of God, and he will advise us as to [where we should go on] our journey [to find the donkeys].” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '(Formerly in Israel, when a man went to inquire of God, he would say, “Come, let us go to the seer”; for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he who is called
    - type: text
      text: ' a prophet today was formerly called a seer.) '
