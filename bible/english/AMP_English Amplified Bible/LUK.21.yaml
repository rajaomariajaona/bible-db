  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There will be signs (attesting miracles) in the sun and moon and stars; and on the earth
  - type: text
    text: ' [there will be] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish among nations, in perplexity at the roaring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tossing of the sea and the waves,'
  - type: text
    text: ' [Is 13:10; Joel 2:10; Zeph 1:15] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: people fainting from fear and expectation of the
  - type: text
    text: ' [dreadful] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: things coming on the world; for the
  - type: text
    text: ' [very] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: powers of the heavens will be shaken.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then they will see '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: the
    - type: text
      text: ' S'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: on of
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: an coming in a cloud
    - type: text
      text: ' with'
  - type: text
    text: ' [transcendent, overwhelming] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: power
  - type: text
    text: ' [subduing the nations] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and with great glory.
  - type: text
    text: ' [Dan 7:13, 14] '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now when these things begin to occur, stand tall and lift up your heads
  - type: text
    text: ' [in joy], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because
  - type: text
    text: ' [suffering ends as] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: your redemption is drawing near.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then He told them a parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Look at the fig tree and all the trees;
  - type: text
    text: ' [Matt 24:32, 33; Mark 13:28, 29] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as soon as they put out leaves, you see it and know for yourselves that summer is near.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So you too, when you see these things happening, know
  - type: text
    text: ' [without any doubt] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that the kingdom of God is near.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, this generation'
  - type: text
    text: ' [those living at that definite period of time preceding the second coming] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'will not pass away until '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the establishment of God’s kingdom.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: everything takes place.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heaven and earth will pass away, but My words will not pass away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“But be on guard, so that your hearts are not weighed down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' depressed with the giddiness of debauchery and the nausea of self-indulgence and the worldly worries of life, and then that day'
  - type: text
    text: ' [when the Messiah returns] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will not come on you suddenly like a trap;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for it will come upon all those who live on the face of all the earth.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But keep alert at all times
  - type: text
    text: ' [be attentive and ready], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'praying that you may have the strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ability'
  - type: text
    text: ' [to be found worthy and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to escape all these things that are going to take place, and to stand in the presence of the Son of Man
  - type: text
    text: ' [at His coming].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
