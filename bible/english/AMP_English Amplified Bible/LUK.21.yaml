  - type: text
    text: 'They asked Him, “Teacher, when will these things happen? And what will be the sign when these things are about to happen?” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Be careful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' see to it that you are not misled; for many will come in My name'
  - type: text
    text: ' [appropriating for themselves the name Messiah which belongs to Me alone], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'saying, ‘I am '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He,’
    - type: text
      text: ' and, ‘The time is near!’ Do not follow them.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When you hear of wars and disturbances
  - type: text
    text: ' [civil unrest, revolts, uprisings], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'do not panic; for these things must take place first, but the end will not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come
    - type: text
      text: ' immediately.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Things to Come
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Nation will rise against nation and kingdom against kingdom.
  - type: text
    text: ' [2 Chr 15:6; Is 19:2] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: There will be violent earthquakes, and in various places famines and
  - type: text
    text: ' [deadly and devastating] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pestilences (plagues, epidemics); and there will be terrible sights and great signs from heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But before all these things, they will lay their hands on you and will persecute you, turning you over to the synagogues and prisons, and bringing you before kings and governors for My name’s sake.
  - type: text
    text: ' [Matt 10:19-22; Mark 13:11-13] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'This will be a time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an opportunity for you to testify'
  - type: text
    text: ' [about Me]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So make up your minds not to prepare beforehand to defend yourselves;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I will give you
  - type: text
    text: ' [skillful] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: words and wisdom which none of your opponents will be able to resist or refute.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But you will be betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handed over even by parents and brothers and relatives and friends, and they will put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of you to death,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and you will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' hated by everyone because of'
  - type: text
    text: ' [your association with] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My name.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But not a hair of your head will perish.
  - type: text
    text: ' [1 Sam 14:45] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: By your
  - type: text
    text: ' [patient] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: endurance
  - type: text
    text: ' [empowered by the Holy Spirit] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you will gain your souls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But when you see Jerusalem surrounded by
  - type: text
    text: ' [hostile] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: armies, then understand
  - type: text
    text: ' [with confident assurance] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that her complete destruction is near.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: At that time, those who are in Judea must flee to the mountains, and those who are inside the city (Jerusalem) must get out, and those who are
  - type: text
    text: ' [out] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the country must not enter the city;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for these are days of vengeance
  - type: text
    text: ' [of rendering full justice or satisfaction], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that all things which are written will be fulfilled.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Woe to those women who are pregnant and to those who are nursing babies in those days! For great trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish will be on the land, and wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' retribution on this people'
  - type: text
    text: ' [Israel]. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And they will fall by the edge of the sword, and will be led captive into all nations; and Jerusalem will be trampled underfoot by the Gentiles until the times of the Gentiles are fulfilled (completed).
  - type: text
    text: ' [Is 63:18; Dan 8:13]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
