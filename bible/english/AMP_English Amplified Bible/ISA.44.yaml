  - type: text
    content: Counteracting the wise
  - type: text
    content: And making their knowledge ridiculous, [1 Cor 1:20]
  '26':
  - type: text
    content: Confirming the word of His servant
  - type: text
    content: And carrying out the plan of His messengers.
  - type: text
    content: It is I
  - type: text
    content: ' who says of Jerusalem, ‘She shall [again] be inhabited!’'
  - type: text
    content: And of the cities of Judah, ‘They shall [again] be built.’
  - type: text
    content: 'And I will raise up '
  - type: text
