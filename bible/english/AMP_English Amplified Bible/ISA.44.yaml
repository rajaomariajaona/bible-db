verses:
  '1':
  - type: heading
    content: The Blessings of Israel
  - type: text
    content: “But now listen, O Jacob, My servant,
  - type: text
    content: 'And Israel, whom I have chosen:'
  '10':
  - type: text
    content: 'Who has made a god or cast an idol which is profitable for nothing? '
  '11':
  - type: text
    content: In fact, all his companions will be put to shame, for the craftsmen themselves are mere men. Let them all assemble, let them stand up, let them be terrified, let them together be put to shame.
  '12':
  - type: text
    content: 'The ironsmith shapes iron '
  - type: text
    content: and
  - type: text
    content: ' uses a chisel and works it over the coals. He forms the [idol’s] core with hammers and works it with his strong arm. He also becomes hungry and his strength fails; he drinks no water and grows tired. '
  '13':
  - type: text
    content: 'The carpenter stretches out a measuring line, he marks out the shape [of the idol] with red chalk; he works it with planes and outlines it with the compass; and he makes it like the form of a man, like the beauty of man, that it may sit in a house. '
  '14':
  - type: text
    content: 'He cuts cedars for himself, and takes a cypress or an oak and lets it grow strong for himself among the trees of the forest. He plants a fir, and the rain nourishes it. '
  '15':
  - type: text
    content: 'Then it becomes '
  - type: text
    content: fuel
  - type: text
    content: ' for a man to burn, so he takes one of them and warms himself; he also kindles a fire to bake bread. He also makes a god [from the same wood] and worships it. He makes it into a carved idol [with his own hands] and falls down and worships it! '
  '16':
  - type: text
    content: 'He burns half of the wood in the fire; over this half he [cooks and] eats meat, he roasts meat and is satisfied. Also he warms himself and says, “Aha! I am warm, I have seen the fire.” '
  '17':
  - type: text
    content: But from what is left of the wood he makes a god, his carved idol. He falls down before it, he worships it and prays to it and says, “Save me, for you are my god.”
  '18':
  - type: text
    content: 'They do not know, nor do they understand, for God has muddied their eyes so that they cannot see, and their hearts (minds) '
  - type: text
    content: as well
  - type: text
    content: ' so that they cannot understand. '
  '19':
  - type: text
    content: 'No one remembers, nor has knowledge and understanding [enough] to say [to himself], “I have burned half of this log in the fire, and also baked bread on its coals and have roasted meat and eaten it. Then I make the rest of it into a repulsive thing [to God]; I bow down [to worship] before a block of wood!” '
  '2':
  - type: text
    content: This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' who made you'
  - type: text
    content: And formed you from the womb, who will help you says,
  - type: text
    content: ‘Fear not, O Jacob My servant;
  - type: text
    content: And Jeshurun (Israel, the upright one) whom I have chosen. [Deut 32:15; 33:5, 26]
  '20':
  - type: text
    content: That kind of man (the idolater) feeds on ashes [and is satisfied with ashes]! A deceived mind has led him astray, so that he cannot save himself, or ask, “Is this thing [that I am holding] in my right hand not a lie?”
  - type: heading
    content: God Forgives and Redeems
  '21':
  - type: text
    content: ¶“Remember [the foolishness of] these things, O Jacob
  - type: text
    content: And Israel, for you are My servant!
  - type: text
    content: I formed you, you are My servant;
  - type: text
    content: O Israel, you will not be forgotten by Me.
  '22':
  - type: text
    content: “I have wiped out your transgressions like a thick cloud
  - type: text
    content: And your sins like a heavy mist.
  - type: text
    content: Return to Me, for I have redeemed you.”
  '23':
  - type: text
    content: Shout for joy, O heavens, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has done it!'
  - type: text
    content: Shout in triumph, you depths of the earth;
  - type: text
    content: Break forth into jubilant rejoicing, you mountains,
  - type: text
    content: O forest, and every tree in it!
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has redeemed Jacob,'
  - type: text
    content: And He shows His glory in Israel.
  '24':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ', your Redeemer, and He who formed you from the womb says this,'
  - type: text
