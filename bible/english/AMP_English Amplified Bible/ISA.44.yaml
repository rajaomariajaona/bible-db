document_id: ISA.44,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Blessings of Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But now listen, O Jacob, My servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Israel, whom I have chosen:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who has made a god or cast an idol which is profitable for nothing? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In fact, all his companions will be put to shame, for the craftsmen themselves are mere men. Let them all assemble, let them stand up, let them be terrified, let them together be put to shame.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The ironsmith shapes iron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uses a chisel and works it over the coals. He forms the [idol’s] core with hammers and works it with his strong arm. He also becomes hungry and his strength fails; he drinks no water and grows tired. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The carpenter stretches out a measuring line, he marks out the shape [of the idol] with red chalk; he works it with planes and outlines it with the compass; and he makes it like the form of a man, like the beauty of man, that it may sit in a house. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He cuts cedars for himself, and takes a cypress or an oak and lets it grow strong for himself among the trees of the forest. He plants a fir, and the rain nourishes it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it becomes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fuel
    - type: text
      text: ' for a man to burn, so he takes one of them and warms himself; he also kindles a fire to bake bread. He also makes a god [from the same wood] and worships it. He makes it into a carved idol [with his own hands] and falls down and worships it! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He burns half of the wood in the fire; over this half he [cooks and] eats meat, he roasts meat and is satisfied. Also he warms himself and says, “Aha! I am warm, I have seen the fire.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But from what is left of the wood he makes a god, his carved idol. He falls down before it, he worships it and prays to it and says, “Save me, for you are my god.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They do not know, nor do they understand, for God has muddied their eyes so that they cannot see, and their hearts (minds) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as well
    - type: text
      text: ' so that they cannot understand. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one remembers, nor has knowledge and understanding [enough] to say [to himself], “I have burned half of this log in the fire, and also baked bread on its coals and have roasted meat and eaten it. Then I make the rest of it into a repulsive thing [to God]; I bow down [to worship] before a block of wood!” '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who made you'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And formed you from the womb, who will help you says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Fear not, O Jacob My servant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Jeshurun (Israel, the upright one) whom I have chosen. [Deut 32:15; 33:5, 26]
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That kind of man (the idolater) feeds on ashes [and is satisfied with ashes]! A deceived mind has led him astray, so that he cannot save himself, or ask, “Is this thing [that I am holding] in my right hand not a lie?”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Forgives and Redeems
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Remember [the foolishness of] these things, O Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Israel, for you are My servant!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I formed you, you are My servant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Israel, you will not be forgotten by Me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have wiped out your transgressions like a thick cloud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your sins like a heavy mist.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Return to Me, for I have redeemed you.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout for joy, O heavens, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has done it!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout in triumph, you depths of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break forth into jubilant rejoicing, you mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O forest, and every tree in it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has redeemed Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He shows His glory in Israel.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', your Redeemer, and He who formed you from the womb says this,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', Maker of all things,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who alone stretches out the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who spreads out the earth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: who was with Me?
      marker-yv: yv-n
    - type: text
      text: by Myself,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Frustrating the signs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confounding the omens of boasters (false prophets),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Making fools out of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew is a synonym of '
        - type: usfm
          marker: it
          children:
          - type: text
            text: diviner,
        - type: text
          text: ' referring to people who claimed to tell the future by such methods as casting lots and examining the livers of certain animals.'
      marker-yv: yv-n
    - type: text
      text: fortune-tellers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Counteracting the wise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And making their knowledge ridiculous, [1 Cor 1:20]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confirming the word of His servant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And carrying out the plan of His messengers.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is I
    - type: text
      text: ' who says of Jerusalem, ‘She shall [again] be inhabited!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of the cities of Judah, ‘They shall [again] be built.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will raise up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restore her ruins.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is I
    - type: text
      text: ' who says to the deep, ‘Be dried up!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make your rivers dry.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is I
    - type: text
      text: ' who says of Cyrus, ‘He is My shepherd (ruler),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will carry out all that I desire—’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saying of Jerusalem, ‘She shall [again] be built,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of the temple, ‘Your foundation shall [again] be laid.’ ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘For I will pour out water on him who is thirsty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And streams on the dry ground;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pour out My Spirit on your offspring
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My blessing on your descendants; [Is 32:15; 35:6, 7; Joel 2:28; John 7:37-39]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will spring up among the grass
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like willows by the streams of water.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “One will say, ‘I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ’;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And another will name himself after Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And another will write on his hand, ‘I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ',’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And be called by the [honorable] name of Israel.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the King of Israel and his Redeemer, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts says this,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I am the First and I am the Last;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no God besides Me. [Rev 1:17; 2:8; 22:13]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Who is like Me? Let him proclaim it and declare it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, let him confront Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since I established the people of antiquity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let them [those supposed gods] tell those people [who foolishly follow them] the things to come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the events that are going to take place.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Do not tremble nor be afraid [of the violent upheavals to come];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have I not long ago proclaimed it to you and declared it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you are My witnesses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there a God besides Me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' Rock;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know of none.’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Folly of Idolatry
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All who make carved idols are nothing. Their precious objects are worthless [to them], and their own witnesses (worshipers) fail to see or know, so that they will be put to shame. '
