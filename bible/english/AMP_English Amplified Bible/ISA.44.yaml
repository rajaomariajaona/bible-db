  - type: text
    content: by Myself,
  '25':
  - type: text
    content: 'Frustrating the signs '
  - type: text
    content: and
  - type: text
    content: ' confounding the omens of boasters (false prophets),'
  - type: text
    content: 'Making fools out of '
  - type: note
    content: The Hebrew is a synonym of diviner, referring to people who claimed to tell the future by such methods as casting lots and examining the livers of certain animals.
  - type: text
