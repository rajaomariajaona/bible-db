  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ',’'
  - type: text
    content: And be called by the [honorable] name of Israel.
  '6':
  - type: text
    content: “For the L
  - type: heading
    content: ord
  - type: text
    content: ', the King of Israel and his Redeemer, the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts says this,'
  - type: text
    content: ‘I am the First and I am the Last;
  - type: text
    content: And there is no God besides Me. [Rev 1:17; 2:8; 22:13]
  '7':
  - type: text
    content: ‘Who is like Me? Let him proclaim it and declare it;
  - type: text
    content: Yes, let him confront Me,
  - type: text
    content: Since I established the people of antiquity.
  - type: text
    content: And let them [those supposed gods] tell those people [who foolishly follow them] the things to come
  - type: text
    content: And the events that are going to take place.
  '8':
  - type: text
    content: ‘Do not tremble nor be afraid [of the violent upheavals to come];
  - type: text
    content: Have I not long ago proclaimed it to you and declared it?
  - type: text
    content: And you are My witnesses.
  - type: text
    content: Is there a God besides Me?
  - type: text
    content: 'There is no '
  - type: text
    content: other
  - type: text
    content: ' Rock;'
  - type: text
    content: I know of none.’ ”
  - type: heading
    content: The Folly of Idolatry
  '9':
  - type: text
    content: 'All who make carved idols are nothing. Their precious objects are worthless [to them], and their own witnesses (worshipers) fail to see or know, so that they will be put to shame. '
