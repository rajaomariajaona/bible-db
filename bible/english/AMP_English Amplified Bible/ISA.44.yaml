  - type: text
    content: ' restore her ruins.'
  '27':
  - type: text
    content: “
  - type: text
    content: It is I
  - type: text
    content: ' who says to the deep, ‘Be dried up!’'
  - type: text
    content: And I will make your rivers dry.
  '28':
  - type: text
    content: “
  - type: text
    content: It is I
  - type: text
    content: ' who says of Cyrus, ‘He is My shepherd (ruler),'
  - type: text
    content: And he will carry out all that I desire—’
  - type: text
    content: Saying of Jerusalem, ‘She shall [again] be built,’
  - type: text
    content: And of the temple, ‘Your foundation shall [again] be laid.’ ”
  '3':
  - type: text
    content: ‘For I will pour out water on him who is thirsty,
  - type: text
    content: And streams on the dry ground;
  - type: text
    content: I will pour out My Spirit on your offspring
  - type: text
    content: And My blessing on your descendants; [Is 32:15; 35:6, 7; Joel 2:28; John 7:37-39]
  '4':
  - type: text
    content: And they will spring up among the grass
  - type: text
    content: Like willows by the streams of water.’
  '5':
  - type: text
    content: “One will say, ‘I am the L
  - type: heading
