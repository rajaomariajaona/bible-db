  '4':
  - type: text
    content: 'So they went away [to the village] and found a colt tied outside at a gate in the street, and they untied it. '
  '5':
  - type: text
    content: 'Some of the people who were standing there said to them, “What are you doing, untying the colt?” '
  '6':
  - type: text
    content: 'They replied to them just as Jesus had directed, and they allowed them to go. '
  '7':
  - type: text
    content: 'They brought the colt to Jesus and put their coats on it, and He sat on it. '
  '8':
  - type: text
    content: 'And many [of the people] spread their coats on the road [as an act of tribute and homage before a new king], and others [scattered a layer of] leafy branches which they had cut from the fields [honoring Him as Messiah]. [2 Kin 9:13] '
