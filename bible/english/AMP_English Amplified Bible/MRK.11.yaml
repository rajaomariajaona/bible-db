    content: The Triumphal Entry
  - type: text
    content: 'When they were nearing Jerusalem, at Bethphage and Bethany near the Mount of Olives, Jesus sent two of His disciples, [Matt 21:1-9; Luke 19:29-38; John 12:12-15] '
  '10':
  - type: text
    content: “Blessed is the coming kingdom of our father David!
  - type: text
    content: Hosanna in the highest [heaven]!”
  '11':
  - type: text
    content: Jesus entered Jerusalem and went to the temple [enclosure]; and after looking around at everything, He left for Bethany with the twelve [disciples], because it was already late [in the day].
  '12':
  - type: text
    content: 'On the next day, when they had left Bethany, He was hungry. [Matt 21:18-22] '
  '13':
  - type: text
    content: 'Seeing at a distance a fig tree in leaf, He went to see if He would find anything on it. But He found nothing but leaves, for it was not the season for figs. '
  '14':
  - type: text
    content: 'He said to it, '
  - type: text
    content: “No one will ever eat fruit from you again!”
  - type: text
    content: ' And His disciples were listening [to what He said].'
  - type: heading
    content: Jesus Drives Moneychangers from the Temple
  '15':
  - type: text
    content: 'Then they came to Jerusalem. And He entered the temple [grounds] and began driving out [with force] the people who were '
  - type: note
    content: These vendors could charge pilgrims inflated prices for animals designated for sacrifice because OT law forbade the use of animals with blemishes or defects (Deut 17:1 etc.), and the religious leaders had dictated even more stringent requirements. For example, they ruled that a blemish on an eyelid disqualified an animal for sacrifice (according to the Talmud).
  - type: text
    content: 'selling and buying [animals for sacrifice] in the temple area, and overturned the tables of the moneychangers [who made a profit exchanging foreign money for temple coinage] and the seats of those who were selling doves; [Matt 21:12-16; Luke 19:45-47; John 2:13-16] '
  '16':
  - type: text
    content: 'and He would not permit anyone to carry '
  - type: note
    content: Lit a vessel. The Mishnah declared that one should not enter the temple mount with his staff (walking stick) or wallet, or with his shoes on, or with dust on his feet (according to the Talmud). Carrying merchandise through the temple showed even greater disrespect.
  - type: text
    content: 'merchandise '
  - type: text
    content: or
  - type: text
    content: ' household wares through the temple [grounds, using the temple area irreverently as a shortcut]. '
