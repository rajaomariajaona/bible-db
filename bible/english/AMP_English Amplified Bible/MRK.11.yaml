      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably Bethphage.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: village in front of you, and immediately as you enter it, you will find a
    - type: text
      text: ' [donkey’s] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A colt that had not been used was considered holy by the Jews and was fit to carry a king.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: colt tied, which has never been ridden by anyone; untie it and bring it here.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In the morning, as they were passing by, the disciples saw that the fig tree had withered away from the roots up. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And remembering, Peter said to Him, “Rabbi (Master), look! The fig tree which You cursed has withered!” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have faith in God
    - type: text
      text: ' [constantly]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, whoever says to this mountain, ‘Be lifted up and thrown into the sea!’ and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus used this moment to emphasize to the disciples that a person’s confident, abiding faith combined with God’s power can produce absolutely amazing results, if the request is in harmony with God’s will. God is fully capable of doing that which man regards as impossible (cf 14:36; James 4:3).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: does not doubt in his heart
    - type: text
      text: ' [in God’s unlimited power], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but believes that what he says is going to take place, it will be done for him
    - type: text
      text: ' [in accordance with God’s will]. [Matt 17:20; Luke 17:6; 1 John 5:14] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For this reason I am telling you, whatever things you ask for in prayer
    - type: text
      text: ' [in accordance with God’s will], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: believe
    - type: text
      text: ' [with confident trust] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that you have received them, and they will be '
      - type: usfm
        marker: it
        children:
        - type: text
          text: given
      - type: text
        text: ' to you.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Whenever you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Standing was a common posture for prayer among the Jews (see Matt 6:5).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: stand praying, if you have anything against anyone, forgive him
    - type: text
      text: ' [drop the issue, let it go], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'so that your Father who is in heaven will also forgive you your transgressions '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' wrongdoings'
    - type: text
      text: ' [against Him and others]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Early mss do not contain this verse.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[But if you do not forgive, neither will your Father in heaven forgive your transgressions.”]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
