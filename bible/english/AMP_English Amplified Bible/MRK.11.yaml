      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These three groups composed the Sanhedrin, the Jewish High Court.
      marker-yv: yv-n
    - type: text
      text: 'chief priests, the scribes, and the elders came to Him, [Matt 21:23-27; Luke 20:1-8] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' saying to Him, “By what authority are You doing these things, or who gave You this authority to do these things?” '
  '29':
  - type: usfm
