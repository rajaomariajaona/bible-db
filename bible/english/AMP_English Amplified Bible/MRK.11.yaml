verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Triumphal Entry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When they were nearing Jerusalem, at Bethphage and Bethany near the Mount of Olives, Jesus sent two of His disciples, [Matt 21:1-9; Luke 19:29-38; John 12:12-15] '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Blessed is the coming kingdom of our father David!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hosanna in the highest [heaven]!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Jesus entered Jerusalem and went to the temple [enclosure]; and after looking around at everything, He left for Bethany with the twelve [disciples], because it was already late [in the day].
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On the next day, when they had left Bethany, He was hungry. [Matt 21:18-22] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Seeing at a distance a fig tree in leaf, He went to see if He would find anything on it. But He found nothing but leaves, for it was not the season for figs. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He said to it, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one will ever eat fruit from you again!”
    - type: text
      text: ' And His disciples were listening [to what He said].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Drives Moneychangers from the Temple
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then they came to Jerusalem. And He entered the temple [grounds] and began driving out [with force] the people who were '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These vendors could charge pilgrims inflated prices for animals designated for sacrifice because OT law forbade the use of animals with blemishes or defects (Deut 17:1 etc.), and the religious leaders had dictated even more stringent requirements. For example, they ruled that a blemish on an eyelid disqualified an animal for sacrifice (according to the Talmud).
      marker-yv: yv-n
    - type: text
      text: 'selling and buying [animals for sacrifice] in the temple area, and overturned the tables of the moneychangers [who made a profit exchanging foreign money for temple coinage] and the seats of those who were selling doves; [Matt 21:12-16; Luke 19:45-47; John 2:13-16] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and He would not permit anyone to carry '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a vessel.
        - type: text
          text: ' The Mishnah declared that one should not enter the temple mount with his staff (walking stick) or wallet, or with his shoes on, or with dust on his feet (according to the Talmud). Carrying merchandise through the temple showed even greater disrespect.'
      marker-yv: yv-n
    - type: text
      text: 'merchandise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' household wares through the temple [grounds, using the temple area irreverently as a shortcut]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to teach and say to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Is it not written, ‘M
      - type: usfm
        marker: sc
        children:
        - type: text
          text: y house shall be called a house of prayer for all the nations
      - type: text
        text: '’? But you have made it a '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: robbers’ den
      - type: text
        text: .”
    - type: text
      text: ' [Is 56:7; Jer 7:11] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The chief priests and the scribes heard this and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' searching for a way to destroy Him; for they were afraid of Him, since the entire crowd was struck with astonishment at His teaching.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: When evening came, Jesus and His disciples would leave the city.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'saying to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go into the '
    - type: usfm
