  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So they replied to Jesus, “We do not know.” And Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Neither will I tell you by what authority I do these things.”
  '4':
  - type: usfm
