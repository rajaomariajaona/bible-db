  '1':
  - type: heading
    content: Ministering Women
  - type: text
    content: 'Soon afterward, Jesus '
  - type: text
    content: began
  - type: text
    content: ' going around from one city and village to another, preaching and proclaiming '
  - type: text
    content: the good news of
  - type: text
    content: ' the kingdom of God. The twelve [disciples] were with Him, '
  '10':
  - type: text
    content: 'And He said, '
  - type: text
    content: “To you
  - type: text
    content: ' [who have been chosen] '
  - type: text
    content: 'it has been granted to know '
  - type: text
    content: and
  - type: text
    content: ' recognize the '
  - type: note
    content: Spiritual truths hidden throughout the ages, but now revealed through the teaching of Christ.
  - type: text
    content: 'mysteries of the kingdom of God, but to the rest it is in parables, so that '
  - type: text
    content: though
  - type: text
    content: ' '
  - type: heading
    content: seeing they may not see
  - type: text
    content: ', '
  - type: heading
    content: and hearing they may not understand
  - type: text
    content: .
  - type: text
    content: ' [Is 6:9, 10; Jer 5:21; Ezek 12:2]'
  '11':
  - type: text
    content: ' '
  - type: text
    content: “Now
  - type: text
    content: ' [the meaning of] '
  - type: text
    content: 'the parable is this: The seed is the word of God'
  - type: text
    content: ' [concerning eternal salvation]. '
  '12':
  - type: text
    content: Those beside the road are the people who have heard; then the devil comes and takes the message
  - type: text
    content: ' [of God] '
  - type: text
    content: away from their hearts, so that they will not believe
  - type: text
    content: ' [in Me as the Messiah] '
  - type: text
    content: and be saved.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Those on the rocky '
  - type: text
    content: soil are
  - type: text
    content: ' the people who, when they hear, receive '
  - type: text
    content: and
  - type: text
    content: ' welcome the word with joy; but these have no '
  - type: text
    content: firmly grounded
  - type: text
    content: ' root. They believe for a while, and in time of trial '
  - type: text
    content: and
  - type: text
    content: ' temptation they fall away'
  - type: text
    content: ' [from Me and abandon their faith]. '
  '14':
  - type: text
    content: 'The '
  - type: text
    content: seed
  - type: text
    content: ' which fell among the thorns, these are the ones who have heard, but as they go on their way they are suffocated with the anxieties and riches and pleasures of this life, and they bring no fruit to maturity.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But as for that '
  - type: text
    content: seed
  - type: text
    content: ' in the good soil, these are the ones who have heard the word with a good and noble heart, and hold on to it tightly, and bear fruit with patience.'
  - type: heading
    content: Parable of the Lamp
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Now no one lights a lamp and then covers it with a container
  - type: text
    content: ' [to hide it], '
  - type: text
    content: or puts it under a bed; instead, he puts it on a lampstand, so that those who come in may see the light.
  - type: text
    content: ' [Matt 5:15; Mark 4:21; Luke 11:33] '
  '17':
  - type: text
    content: 'For there is nothing hidden that will not become evident, nor '
  - type: text
    content: anything
  - type: text
    content: ' secret that will not be known and come out into the open.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: So be careful how you listen; for whoever has
  - type: text
    content: ' [a teachable heart], '
  - type: text
    content: 'to him '
  - type: text
    content: more
  - type: text
    content: ' [understanding] '
  - type: text
    content: will be given; and whoever does not have
  - type: text
    content: ' [a longing for truth], '
  - type: text
    content: even what he thinks he has will be taken away from him.”
  - type: text
    content: ' [Matt 13:12; 25:29; Mark 4:25]'
  '19':
  - type: text
    content: 'Then Jesus’ mother and His brothers came up toward Him, but they could not reach Him because of the crowd. [Matt 12:46-50; Mark 3:31-35] '
  '2':
  - type: text
    content: 'and '
  - type: text
    content: also
  - type: text
    content: ' some women who had been healed of evil spirits and diseases: Mary, called Magdalene [from the city of Magdala in Galilee], from whom seven demons had come out, '
  '20':
  - type: text
    content: 'And He was told, “Your mother and Your brothers are standing outside, asking to see You.” '
  '21':
  - type: text
    content: 'But He answered, '
  - type: text
    content: “My mother and My brothers are these who listen to the word of God and do it!”
  - type: heading
    content: Jesus Calms the Sea
  '22':
  - type: text
    content: 'Now on one of '
  - type: text
    content: those
  - type: text
    content: ' days Jesus and His disciples got into a boat, and He said to them, '
  - type: text
    content: “Let us cross over to the other side of the lake (Sea of Galilee).”
  - type: text
    content: ' So they set out. [Matt 8:23-27; Mark 4:36-41] '
  '23':
  - type: text
    content: 'But as they were sailing, He fell asleep. And a fierce gale of wind swept down [as if through a wind tunnel] on the lake, and they '
  - type: text
    content: began
  - type: text
    content: ' to be swamped, and were in great danger. '
  '24':
  - type: text
    content: 'They came to Jesus and woke Him, saying, “Master, Master, we are about to die!” He got up and rebuked the wind and the raging, violent waves, and they ceased, and it became calm [a perfect peacefulness]. '
  '25':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Where is your faith
  - type: text
    content: ' [your confidence in Me]?” They were afraid and astonished, saying to one another, “Who then is this, that He commands even the winds and the sea, and they obey Him?”'
  - type: heading
    content: The Demoniac Cured
  '26':
  - type: text
    content: 'Then they sailed to the '
  - type: note
    content: The southeastern region of the Sea of Galilee.
  - type: text
    content: 'country of the Gerasenes, which is east of Galilee. [Matt 8:28-34; Mark 5:1-17] '
  '27':
  - type: text
    content: 'Now when Jesus stepped out on land, He was met by a man from the city [of Gerasa] who was possessed with demons. For a long time he had worn no clothes, and was not living in a house, but among the '
  - type: note
    content: These probably were burial places built above the ground, or natural caves in the hillside. Cave tombs often had two chambers, one of which remained empty as long as relatives were still alive. Such tombs frequently were used as shelter by lepers, demoniacs, and the poor.
  - type: text
    content: 'tombs. '
  '28':
  - type: text
    content: Seeing Jesus, he cried out [with a terrible voice from the depths of his throat] and fell down before Him [in dread and terror], and shouted loudly, “
  - type: note
    content: See note 4:34.
  - type: text
    content: 'What business do we have [in common] with each other, Jesus, Son of the Most High God? I beg You, do not torment me [before the appointed time of judgment]!” '
  '29':
  - type: text
    content: 'Now He was [already] commanding the unclean spirit to come out of the man. For it had seized him [violently] many times; and he was kept under guard and bound with chains and shackles, but he would break the bonds and be driven by the demon into the desert. '
  '3':
  - type: text
    content: and Joanna, the wife of Chuza, Herod’s household steward, and Susanna, and many others who were contributing to their support out of their private means [as was the custom for a rabbi’s disciples].
  - type: heading
    content: Parable of the Sower
  '30':
  - type: text
    content: 'Then Jesus asked him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: ' And he answered, “Legion”; because many demons had entered him. '
  '31':
  - type: text
    content: 'They '
  - type: text
    content: continually
  - type: text
    content: ' begged Him not to command them to go into the abyss. [Rev 9:1]'
  '32':
  - type: text
    content: 'Now a large herd of pigs was feeding there on the mountain. '
  - type: text
    content: The demons
  - type: text
    content: ' begged Jesus to allow them to enter the pigs, and He gave them permission. '
  '33':
  - type: text
    content: Then the demons came out of the man and entered the pigs; and the herd rushed down the steep bank into the lake and was drowned.
  '34':
  - type: text
    content: 'When the herdsmen saw what had happened, they ran away and told it in the city and out in the country. '
  '35':
  - type: text
    content: And people
  - type: text
    content: ' came out to see what had happened. They came to Jesus, and found the man from whom the demons had gone out, sitting at Jesus’ feet, clothed and in his right mind (mentally healthy); and they were frightened. '
  '36':
  - type: text
    content: 'Those who had seen it told them how the man who had been demon-possessed had been healed. '
  '37':
  - type: text
    content: 'Then all the people of the country of the Gerasenes and the surrounding district asked Him to leave them, because they were overwhelmed with fear. So Jesus got into the boat and returned [to the west side of the Sea of Galilee]. '
  '38':
  - type: text
    content: 'But the man from whom the demons had gone out kept begging Him, pleading to go with Him; but Jesus sent him away, saying, '
  '39':
  - type: text
    content: “Return home and tell
  - type: text
    content: ' [about] '
  - type: text
    content: all the great things God has done for you.”
  - type: text
    content: ' So the man went away, proclaiming throughout the whole city what great things Jesus had done for him.'
  - type: heading
    content: Miracles of Healing
  '4':
  - type: text
    content: 'When a large crowd was gathering together, and people from city after city were coming to Him, He spoke [to them] using a parable: [Matt 13:2-9; Mark 4:1-9] '
  '40':
  - type: text
    content: 'Now as Jesus was returning [to Galilee], the people welcomed Him, for they had all been expecting Him. '
  '41':
  - type: text
    content: 'Now a man named Jairus, a synagogue official, came [to Him]; and he fell at Jesus’ feet and '
  - type: text
    content: began
  - type: text
    content: ' begging Him to come to his house; [Matt 9:18-26; Mark 5:22-43] '
  '42':
  - type: text
    content: for he had an only daughter, about twelve years old, and she was dying. But as Jesus went, the people were crowding against Him [almost crushing Him].
  '43':
  - type: text
    content: 'And a woman who had [suffered from] a hemorrhage for twelve years '
  - type: note
    content: One early ms and many late ones add this clause.
  - type: text
    content: '[and had spent all her money on physicians], and could not be healed by anyone, '
  '44':
  - type: text
    content: 'came up behind Him and touched the fringe of His outer robe, and immediately her bleeding stopped. '
  '45':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Who touched Me?”
  - type: text
    content: ' While they all were denying it, Peter '
  - type: note
    content: One early ms and many late ones add this clause.
  - type: text
    content: '[and those who were with him] said, “Master, the people are crowding and pushing against You!” '
  '46':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Someone did touch Me, because I was aware that power
  - type: text
    content: ' [to heal] '
  - type: text
    content: had gone out of Me.”
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'When the woman saw that she had not escaped notice, she came up trembling and fell down before Him. She declared in the presence of all the people the reason why she had touched Him, and how she had been immediately healed. '
  '48':
  - type: text
    content: 'He said to her, '
  - type: text
    content: “Daughter, your faith
  - type: text
    content: ' [your personal trust and confidence in Me] '
  - type: text
    content: has made you well. Go in peace (untroubled, undisturbed well-being).”
  '49':
  - type: text
    content: 'While He was still speaking, someone from the synagogue official’s house came and said [to Jairus], “Your daughter is dead; do not inconvenience the Teacher any further.” '
  '5':
  - type: text
    content: “The sower went out to sow his seed; and as he sowed, some fell beside the road and it was trampled underfoot, and the birds of the sky ate it up.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'But Jesus, hearing this, answered him, '
  - type: text
    content: '“Do not be afraid '
  - type: text
    content: any longer;
  - type: text
    content: ' only believe '
  - type: text
    content: and
  - type: text
    content: ' trust'
  - type: text
    content: ' [in Me and have faith in My ability to do this], '
  - type: text
    content: and she will be made well.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'When He came to the house, He allowed no one to enter with Him, except Peter and John and James, and the girl’s father and mother. '
  '52':
  - type: text
    content: 'Now they were all weeping loudly and mourning for her; but He said, '
  - type: text
    content: “Do not weep, for she is not dead, but is sleeping.”
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Then they '
  - type: text
    content: began
  - type: text
    content: ' laughing scornfully at Him '
  - type: text
    content: and
  - type: text
    content: ' ridiculing Him, knowing [without any doubt] that she was dead. '
  '54':
  - type: text
    content: 'But Jesus took hold of her hand and spoke, saying, '
  - type: text
    content: “Child, arise!”
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'And her spirit returned, and she got up immediately; and He ordered that she be given '
  - type: text
    content: something
  - type: text
    content: ' to eat. '
  '56':
  - type: text
    content: Her parents were greatly astonished [by the miracle]; but He instructed them to tell no one what had happened.
  '6':
  - type: text
    content: 'And some '
  - type: text
    content: seed
  - type: text
    content: ' fell on'
  - type: text
    content: ' [shallow soil covering] '
  - type: text
    content: the rocks, and as soon as it sprouted, it withered away, because it had no moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Other '
  - type: text
    content: seed
  - type: text
    content: ' fell among the thorns, and the thorns grew up with it and choked it out.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: And some fell into good soil, and grew up and produced a crop a hundred times as great.”
  - type: text
    content: ' As He said these things, He called out, '
  - type: text
    content: '“He who has ears to hear, let him hear '
  - type: text
    content: and
  - type: text
    content: ' heed My words.”'
  '9':
  - type: text
    content: 'Now His disciples '
  - type: text
    content: began
  - type: text
    content: ' asking Him what this parable meant. '
