document_id: LUK.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ministering Women
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Soon afterward, Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' going around from one city and village to another, preaching and proclaiming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the good news of
  - type: text
    text: ' the kingdom of God. The twelve [disciples] were with Him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: also
  - type: text
    text: ' some women who had been healed of evil spirits and diseases: Mary, called Magdalene [from the city of Magdala in Galilee], from whom seven demons had come out, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and Joanna, the wife of Chuza, Herod’s household steward, and Susanna, and many others who were contributing to their support out of their private means [as was the custom for a rabbi’s disciples].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Sower
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When a large crowd was gathering together, and people from city after city were coming to Him, He spoke [to them] using a parable: [Matt 13:2-9; Mark 4:1-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The sower went out to sow his seed; and as he sowed, some fell beside the road and it was trampled underfoot, and the birds of the sky ate it up.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And some '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' fell on'
  - type: text
    text: ' [shallow soil covering] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the rocks, and as soon as it sprouted, it withered away, because it had no moisture.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' fell among the thorns, and the thorns grew up with it and choked it out.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And some fell into good soil, and grew up and produced a crop a hundred times as great.”
  - type: text
    text: ' As He said these things, He called out, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“He who has ears to hear, let him hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed My words.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now His disciples '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' asking Him what this parable meant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “To you
  - type: text
    text: ' [who have been chosen] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'it has been granted to know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Spiritual truths hidden throughout the ages, but now revealed through the teaching of Christ.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'mysteries of the kingdom of God, but to the rest it is in parables, so that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: seeing they may not see
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and hearing they may not understand
    - type: text
      text: .
  - type: text
    text: ' [Is 6:9, 10; Jer 5:21; Ezek 12:2]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now
  - type: text
    text: ' [the meaning of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'the parable is this: The seed is the word of God'
  - type: text
    text: ' [concerning eternal salvation]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Those beside the road are the people who have heard; then the devil comes and takes the message
  - type: text
    text: ' [of God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: away from their hearts, so that they will not believe
  - type: text
    text: ' [in Me as the Messiah] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and be saved.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Those on the rocky '
    - type: usfm
      marker: it
      children:
      - type: text
        text: soil are
    - type: text
      text: ' the people who, when they hear, receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome the word with joy; but these have no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: firmly grounded
    - type: text
      text: ' root. They believe for a while, and in time of trial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' temptation they fall away'
  - type: text
    text: ' [from Me and abandon their faith]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' which fell among the thorns, these are the ones who have heard, but as they go on their way they are suffocated with the anxieties and riches and pleasures of this life, and they bring no fruit to maturity.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But as for that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seed
    - type: text
      text: ' in the good soil, these are the ones who have heard the word with a good and noble heart, and hold on to it tightly, and bear fruit with patience.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Lamp
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now no one lights a lamp and then covers it with a container
  - type: text
    text: ' [to hide it], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: or puts it under a bed; instead, he puts it on a lampstand, so that those who come in may see the light.
  - type: text
    text: ' [Matt 5:15; Mark 4:21; Luke 11:33] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For there is nothing hidden that will not become evident, nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything
    - type: text
      text: ' secret that will not be known and come out into the open.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So be careful how you listen; for whoever has
  - type: text
    text: ' [a teachable heart], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more
  - type: text
    text: ' [understanding] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be given; and whoever does not have
  - type: text
    text: ' [a longing for truth], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even what he thinks he has will be taken away from him.”
  - type: text
    text: ' [Matt 13:12; 25:29; Mark 4:25]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Jesus’ mother and His brothers came up toward Him, but they could not reach Him because of the crowd. [Matt 12:46-50; Mark 3:31-35] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And He was told, “Your mother and Your brothers are standing outside, asking to see You.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My mother and My brothers are these who listen to the word of God and do it!”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Calms the Sea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Now on one of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' days Jesus and His disciples got into a boat, and He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let us cross over to the other side of the lake (Sea of Galilee).”
  - type: text
    text: ' So they set out. [Matt 8:23-27; Mark 4:36-41] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But as they were sailing, He fell asleep. And a fierce gale of wind swept down [as if through a wind tunnel] on the lake, and they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to be swamped, and were in great danger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They came to Jesus and woke Him, saying, “Master, Master, we are about to die!” He got up and rebuked the wind and the raging, violent waves, and they ceased, and it became calm [a perfect peacefulness]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Where is your faith
  - type: text
    text: ' [your confidence in Me]?” They were afraid and astonished, saying to one another, “Who then is this, that He commands even the winds and the sea, and they obey Him?”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Demoniac Cured
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then they sailed to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The southeastern region of the Sea of Galilee.
    marker-yv: yv-n
  - type: text
    text: 'country of the Gerasenes, which is east of Galilee. [Matt 8:28-34; Mark 5:1-17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now when Jesus stepped out on land, He was met by a man from the city [of Gerasa] who was possessed with demons. For a long time he had worn no clothes, and was not living in a house, but among the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These probably were burial places built above the ground, or natural caves in the hillside. Cave tombs often had two chambers, one of which remained empty as long as relatives were still alive. Such tombs frequently were used as shelter by lepers, demoniacs, and the poor.
    marker-yv: yv-n
  - type: text
    text: 'tombs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Seeing Jesus, he cried out [with a terrible voice from the depths of his throat] and fell down before Him [in dread and terror], and shouted loudly, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 4:34.
    marker-yv: yv-n
  - type: text
    text: 'What business do we have [in common] with each other, Jesus, Son of the Most High God? I beg You, do not torment me [before the appointed time of judgment]!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now He was [already] commanding the unclean spirit to come out of the man. For it had seized him [violently] many times; and he was kept under guard and bound with chains and shackles, but he would break the bonds and be driven by the demon into the desert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Jesus asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is your name?”
  - type: text
    text: ' And he answered, “Legion”; because many demons had entered him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' begged Him not to command them to go into the abyss. [Rev 9:1]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now a large herd of pigs was feeding there on the mountain. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The demons
  - type: text
    text: ' begged Jesus to allow them to enter the pigs, and He gave them permission. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then the demons came out of the man and entered the pigs; and the herd rushed down the steep bank into the lake and was drowned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When the herdsmen saw what had happened, they ran away and told it in the city and out in the country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: it
    children:
    - type: text
      text: And people
  - type: text
    text: ' came out to see what had happened. They came to Jesus, and found the man from whom the demons had gone out, sitting at Jesus’ feet, clothed and in his right mind (mentally healthy); and they were frightened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Those who had seen it told them how the man who had been demon-possessed had been healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then all the people of the country of the Gerasenes and the surrounding district asked Him to leave them, because they were overwhelmed with fear. So Jesus got into the boat and returned [to the west side of the Sea of Galilee]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But the man from whom the demons had gone out kept begging Him, pleading to go with Him; but Jesus sent him away, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Return home and tell
  - type: text
    text: ' [about] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: all the great things God has done for you.”
  - type: text
    text: ' So the man went away, proclaiming throughout the whole city what great things Jesus had done for him.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Miracles of Healing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Now as Jesus was returning [to Galilee], the people welcomed Him, for they had all been expecting Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now a man named Jairus, a synagogue official, came [to Him]; and he fell at Jesus’ feet and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' begging Him to come to his house; [Matt 9:18-26; Mark 5:22-43] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: for he had an only daughter, about twelve years old, and she was dying. But as Jesus went, the people were crowding against Him [almost crushing Him].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And a woman who had [suffered from] a hemorrhage for twelve years '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One early ms and many late ones add this clause.
    marker-yv: yv-n
  - type: text
    text: '[and had spent all her money on physicians], and could not be healed by anyone, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'came up behind Him and touched the fringe of His outer robe, and immediately her bleeding stopped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who touched Me?”
  - type: text
    text: ' While they all were denying it, Peter '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One early ms and many late ones add this clause.
    marker-yv: yv-n
  - type: text
    text: '[and those who were with him] said, “Master, the people are crowding and pushing against You!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Someone did touch Me, because I was aware that power
  - type: text
    text: ' [to heal] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: had gone out of Me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'When the woman saw that she had not escaped notice, she came up trembling and fell down before Him. She declared in the presence of all the people the reason why she had touched Him, and how she had been immediately healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'He said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Daughter, your faith
  - type: text
    text: ' [your personal trust and confidence in Me] '
  - type: usfm
    marker: wj
    children:
    - type: text
