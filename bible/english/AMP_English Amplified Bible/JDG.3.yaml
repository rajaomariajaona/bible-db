document_id: JDG.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Idolatry Leads to Servitude
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now these are the nations which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' left [in order] to test Israel by them ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is,
  - type: text
    text: ' all [the people of Israel] who had not [previously] experienced any of the wars in Canaan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'only in order that the generations of the sons of Israel might be taught war, at least those who had not experienced it previously). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'The remaining nations are:'
  - type: text
    text: ' the five lords (governors) of the Philistines, all the Canaanites, the Sidonians, and the Hivites who lived on Mount Lebanon from Mount Baal-hermon to the entrance of Hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They were [allowed to remain] for the testing of Israel, to determine whether Israel would listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey the commandments of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which He had commanded their fathers (ancestors) through Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the Israelites lived among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and they took their daughters for themselves as wives and gave their own daughters to their sons, and served their [pagan] gods. [Ex 34:12-16]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the Israelites did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and they forgot the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God and served the Baals and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Various Canaanite goddesses of fertility and warfare.
    marker-yv: yv-n
  - type: text
    text: 'Asheroth. [Judg 2:13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled against Israel, and He sold them into the hand of Cushan-rishathaim king of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Aram-naharaim;
      - type: text
        text: ' Aram of Two Rivers.'
    marker-yv: yv-n
  - type: text
    text: Mesopotamia; and the Israelites served Cushan-rishathaim eight years.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The First Judge Rescues Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But when the Israelites cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [for help], the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' raised up a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: deliverer
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'man to rescue the people of Israel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Othniel was the first of the twelve people God appointed to rescue and lead Israel. In addition to specific judicial duties, the judges served as both civil and military leaders.
    marker-yv: yv-n
  - type: text
    text: 'Othniel the son of Kenaz, Caleb’s younger brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came upon him, and he judged Israel. He went out to war, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave Cushan-rishathaim king of Mesopotamia into his hand, and he prevailed over Cushan-rishathaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And the land was at rest [from oppression for] forty years. Then Othniel the son of Kenaz died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now the Israelites again did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' strengthened Eglon king of Moab against Israel, since they had done what was evil in the sight of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Eglon gathered to him the sons of Ammon and Amalek, and went and struck down Israel [in defeat], and they took possession of the City of Palm Trees (Jericho). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the Israelites served Eglon king of Moab eighteen years.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ehud Rescues Israel from Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But when the Israelites cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [for help], the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' raised up a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: deliverer
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'man to rescue them, Ehud the son of Gera, a Benjamite, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bound in his right hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a left-handed man. And the Israelites sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a gift
  - type: text
    text: ' of tribute by him to Eglon king of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now Ehud made for himself a sword a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. about eighteen inches.
    marker-yv: yv-n
  - type: text
    text: 'cubit long, which had two edges, and he bound it on his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: If a bodyguard searched Ehud he would have focused on his left side, where a right-handed man would hide a sword.
    marker-yv: yv-n
  - type: text
    text: 'right thigh under his robe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And he brought the tribute to Eglon king of Moab. Now Eglon was a very fat man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when Ehud had finished presenting the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The tribute apparently required a company of people to transport and may have consisted of such things as valuable commodities, precious metals, and domestic animals.
    marker-yv: yv-n
  - type: text
    text: 'tribute, he sent away the people who had carried it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Ehud himself turned back from the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These stones may have been either boundary markers or idols.
    marker-yv: yv-n
  - type: text
    text: 'sculptured stones at Gilgal, [and he returned to Eglon] and said [to him], “I have a secret message for you, O king.” Eglon said “Keep silence.” And all who attended him left him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ehud came to him as he was sitting alone in his [private] cool upper chamber, and Ehud said, “I have a message from God for you.” And the king got up from his seat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Ehud reached out with his left hand and took the sword from his right thigh, and plunged it into Eglon’s belly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the hilt also went in after the blade, and the fat closed over the blade, because Ehud did not draw the sword out of his belly; and the refuse came out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Ehud went out into the vestibule and shut the doors of the upper chamber behind him, and locked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Ehud departed, Eglon’s servants came. And when they saw that the doors of the upper room were locked, they said, “He is only '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: covering his feet
      - type: text
        text: ' (with his garment)—a euphemism for defecating, probably because of the squatting position taken.'
    marker-yv: yv-n
  - type: text
    text: 'relieving himself in the cool room.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They waited [a very long time] until they became embarrassed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uneasy, but he still did not open the doors of the upper room. So [finally] they took the key and opened them, and behold, their master had fallen to the floor, dead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now Ehud escaped while they lingered, and he passed beyond the sculptured stones and escaped to Seirah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When he had arrived, he blew a trumpet in the hill country of Ephraim; and the sons of Israel went down with him from the hill country, and he was in front of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he said to them, “Pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has handed over your enemies the Moabites to you.” So they went down after him and seized the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. narrow or shallow places where a river may be crossed by wading.
    marker-yv: yv-n
  - type: text
    text: 'fords of the Jordan opposite Moab and did not allow anyone to cross. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They struck down at that time about ten thousand Moabite men, all strong, courageous men; not a man escaped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So Moab was subdued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humbled that day under the hand of Israel, and the land was at rest for eighty years.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shamgar Rescues from Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'After Ehud came Shamgar the son of Anath, who struck down six hundred Philistine men with an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a rod with a pointed end or fitted with a spike.
    marker-yv: yv-n
  - type: text
    text: oxgoad. He too saved Israel.
