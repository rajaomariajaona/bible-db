document_id: JDG.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolatry Leads to Servitude
  - type: text
    content: Now these are the nations which the L
  - type: heading
    content: ord
  - type: text
    content: ' left [in order] to test Israel by them ('
  - type: text
    content: that is,
  - type: text
    content: ' all [the people of Israel] who had not [previously] experienced any of the wars in Canaan; '
  '10':
  - type: text
    content: The Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' came upon him, and he judged Israel. He went out to war, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave Cushan-rishathaim king of Mesopotamia into his hand, and he prevailed over Cushan-rishathaim. '
  '11':
  - type: text
    content: And the land was at rest [from oppression for] forty years. Then Othniel the son of Kenaz died.
  '12':
  - type: text
    content: Now the Israelites again did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', and the L'
  - type: heading
    content: ord
  - type: text
    content: ' strengthened Eglon king of Moab against Israel, since they had done what was evil in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And Eglon gathered to him the sons of Ammon and Amalek, and went and struck down Israel [in defeat], and they took possession of the City of Palm Trees (Jericho). '
  '14':
  - type: text
    content: And the Israelites served Eglon king of Moab eighteen years.
  - type: heading
    content: Ehud Rescues Israel from Moab
  '15':
  - type: text
    content: But when the Israelites cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [for help], the L'
  - type: heading
    content: ord
  - type: text
    content: ' raised up a '
  - type: note
    content: Lit deliverer.
  - type: text
    content: 'man to rescue them, Ehud the son of Gera, a Benjamite, '
  - type: note
    content: Lit bound in his right hand.
  - type: text
    content: 'a left-handed man. And the Israelites sent '
  - type: text
    content: a gift
  - type: text
    content: ' of tribute by him to Eglon king of Moab. '
  '16':
  - type: text
    content: 'Now Ehud made for himself a sword a '
  - type: note
    content: I.e. about eighteen inches.
  - type: text
    content: 'cubit long, which had two edges, and he bound it on his '
  - type: note
    content: If a bodyguard searched Ehud he would have focused on his left side, where a right-handed man would hide a sword.
  - type: text
    content: 'right thigh under his robe. '
  '17':
  - type: text
    content: 'And he brought the tribute to Eglon king of Moab. Now Eglon was a very fat man. '
  '18':
  - type: text
    content: 'And when Ehud had finished presenting the '
  - type: note
    content: The tribute apparently required a company of people to transport and may have consisted of such things as valuable commodities, precious metals, and domestic animals.
  - type: text
    content: 'tribute, he sent away the people who had carried it. '
  '19':
  - type: text
    content: 'But Ehud himself turned back from the '
  - type: note
    content: These stones may have been either boundary markers or idols.
  - type: text
    content: 'sculptured stones at Gilgal, [and he returned to Eglon] and said [to him], “I have a secret message for you, O king.” Eglon said “Keep silence.” And all who attended him left him. '
  '2':
  - type: text
    content: 'only in order that the generations of the sons of Israel might be taught war, at least those who had not experienced it previously). '
  '20':
  - type: text
    content: 'Ehud came to him as he was sitting alone in his [private] cool upper chamber, and Ehud said, “I have a message from God for you.” And the king got up from his seat. '
  '21':
  - type: text
    content: 'Then Ehud reached out with his left hand and took the sword from his right thigh, and plunged it into Eglon’s belly. '
  '22':
  - type: text
    content: 'And the hilt also went in after the blade, and the fat closed over the blade, because Ehud did not draw the sword out of his belly; and the refuse came out. '
  '23':
  - type: text
    content: 'Then Ehud went out into the vestibule and shut the doors of the upper chamber behind him, and locked '
  - type: text
    content: them.
  '24':
  - type: text
    content: 'When Ehud departed, Eglon’s servants came. And when they saw that the doors of the upper room were locked, they said, “He is only '
  - type: note
    content: Lit covering his feet (with his garment)—a euphemism for defecating, probably because of the squatting position taken.
  - type: text
    content: 'relieving himself in the cool room.” '
  '25':
  - type: text
    content: 'They waited [a very long time] until they became embarrassed '
  - type: text
    content: and
  - type: text
    content: ' uneasy, but he still did not open the doors of the upper room. So [finally] they took the key and opened them, and behold, their master had fallen to the floor, dead.'
  '26':
  - type: text
    content: 'Now Ehud escaped while they lingered, and he passed beyond the sculptured stones and escaped to Seirah. '
  '27':
  - type: text
    content: 'When he had arrived, he blew a trumpet in the hill country of Ephraim; and the sons of Israel went down with him from the hill country, and he was in front of them. '
  '28':
  - type: text
    content: 'And he said to them, “Pursue '
  - type: text
    content: them,
  - type: text
    content: ' for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has handed over your enemies the Moabites to you.” So they went down after him and seized the '
  - type: note
    content: I.e. narrow or shallow places where a river may be crossed by wading.
  - type: text
    content: 'fords of the Jordan opposite Moab and did not allow anyone to cross. '
  '29':
  - type: text
    content: 'They struck down at that time about ten thousand Moabite men, all strong, courageous men; not a man escaped. '
  '3':
  - type: text
    content: 'The remaining nations are:'
  - type: text
    content: ' the five lords (governors) of the Philistines, all the Canaanites, the Sidonians, and the Hivites who lived on Mount Lebanon from Mount Baal-hermon to the entrance of Hamath. '
  '30':
  - type: text
    content: 'So Moab was subdued '
  - type: text
    content: and
  - type: text
    content: ' humbled that day under the hand of Israel, and the land was at rest for eighty years.'
  - type: heading
    content: Shamgar Rescues from Philistines
  '31':
  - type: text
    content: 'After Ehud came Shamgar the son of Anath, who struck down six hundred Philistine men with an '
  - type: note
    content: I.e. a rod with a pointed end or fitted with a spike.
  - type: text
    content: oxgoad. He too saved Israel.
  '4':
  - type: text
    content: 'They were [allowed to remain] for the testing of Israel, to determine whether Israel would listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ', which He had commanded their fathers (ancestors) through Moses. '
  '5':
  - type: text
    content: 'And the Israelites lived among the Canaanites, Hittites, Amorites, Perizzites, Hivites, and Jebusites; '
  '6':
  - type: text
    content: and they took their daughters for themselves as wives and gave their own daughters to their sons, and served their [pagan] gods. [Ex 34:12-16]
  '7':
  - type: text
    content: And the Israelites did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', and they forgot the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God and served the Baals and the '
  - type: note
    content: Various Canaanite goddesses of fertility and warfare.
  - type: text
    content: 'Asheroth. [Judg 2:13] '
  '8':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' was kindled against Israel, and He sold them into the hand of Cushan-rishathaim king of '
  - type: note
    content: Heb Aram-naharaim; Aram of Two Rivers.
  - type: text
    content: Mesopotamia; and the Israelites served Cushan-rishathaim eight years.
  - type: heading
    content: The First Judge Rescues Israel
  '9':
  - type: text
    content: But when the Israelites cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [for help], the L'
  - type: heading
    content: ord
  - type: text
    content: ' raised up a '
  - type: note
    content: Lit deliverer.
  - type: text
    content: 'man to rescue the people of Israel, '
  - type: note
    content: Othniel was the first of the twelve people God appointed to rescue and lead Israel. In addition to specific judicial duties, the judges served as both civil and military leaders.
  - type: text
    content: 'Othniel the son of Kenaz, Caleb’s younger brother. '
