      children:
      - type: text
        text: Water in the Rock
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all the congregation of the children of Israel moved on from the Wilderness of Sin by stages, according to the commandment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and camped at Rephidim, but there was no water for the people to drink. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua did as Moses said, and fought with Amalek; and Moses, Aaron, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: According to Josephus, Hur was the husband of Miriam, the sister of Moses and Aaron.
      marker-yv: yv-n
    - type: text
      text: 'Hur went up to the hilltop. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Moses held up his hand, Israel prevailed, and when he lowered his hand [due to fatigue], Amalek prevailed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses’ hands were heavy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' he grew tired. So they took a stone and put it under him, and he sat on it. Then Aaron and Hur held up his hands, one on one side and one on the other side; so it was that his hands were steady until the sun set. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua overwhelmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defeated '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These nomadic people were the descendants of Esau.
      marker-yv: yv-n
    - type: text
      text: Amalek and his people with the edge of the sword.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Write this in the book as a memorial and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: put in the ears of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'recite it to Joshua, that I will utterly wipe out the memory of Amalek [and his people] from under heaven.” [1 Sam 15:2-8] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses built an altar and named it '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH (Yahweh)-Nissi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' Is My Banner; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: saying, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has sworn [an oath]; the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will have war against [the people of] Amalek from generation to generation.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore the people quarreled with Moses and said, “Give us water so we may [have something to] drink.” And Moses said to them, “Why do you quarrel with me? Why do you tempt the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' try His patience?” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people were thirsty for water; and the people murmured against Moses and said, “Why did you bring us up from Egypt to kill us and our children and our livestock with thirst?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses cried out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for help, saying, “What shall I do with this people? They are almost ready to stone me.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Pass before the people and take with you some of the elders of Israel; and take in your hand the staff with which you struck the Nile, and go. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will stand before you there on the rock at '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Horeb may refer to the mountain range of which Sinai is an individual mountain.
      marker-yv: yv-n
    - type: text
      text: 'Horeb; there you shall strike the rock, and water will come out of it, so that the people may [have something to] drink.” And Moses did so in the sight of the elders of Israel. [1 Cor 10:4] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He named the place [where this miracle occurred] Massah (test) and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A similar incident occurred when the Israelites were in the Wilderness of Zin at Meribah-kadesh (Num 20:8-13; Deut 32:50-52). On that occasion Moses disobeyed God’s specific instruction and paid a terrible price for his action.
      marker-yv: yv-n
    - type: text
      text: Meribah (contention) because of the quarreling of the sons of Israel, and because they tested the [patience of the] L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, “Is the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' among us, or not?”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amalek Fought
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These were a group of nomads descended from Amalek, a grandson of Esau, Jacob’s twin brother.
      marker-yv: yv-n
    - type: text
      text: 'Amalek [and his people] came and fought with Israel at Rephidim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses said to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joshua, leader of the tribe of Ephraim, was one of the great warriors of the OT and was an attendant to and the successor of Moses.
      marker-yv: yv-n
    - type: text
      text: 'Joshua, “Choose men for us and go out, fight against Amalek [and his people]. Tomorrow I will stand on the top of the hill with the staff of God in my hand.” '
