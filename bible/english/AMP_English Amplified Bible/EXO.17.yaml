  - type: text
    content: 'recite it to Joshua, that I will utterly wipe out the memory of Amalek [and his people] from under heaven.” [1 Sam 15:2-8] '
  '15':
  - type: text
    content: 'And Moses built an altar and named it '
  - type: note
