    content: ', and camped at Rephidim, but there was no water for the people to drink. '
  '10':
  - type: text
    content: 'So Joshua did as Moses said, and fought with Amalek; and Moses, Aaron, and '
  - type: note
    content: According to Josephus, Hur was the husband of Miriam, the sister of Moses and Aaron.
  - type: text
    content: 'Hur went up to the hilltop. '
  '11':
  - type: text
    content: 'Now when Moses held up his hand, Israel prevailed, and when he lowered his hand [due to fatigue], Amalek prevailed. '
  '12':
  - type: text
    content: 'But Moses’ hands were heavy '
  - type: text
    content: and
  - type: text
    content: ' he grew tired. So they took a stone and put it under him, and he sat on it. Then Aaron and Hur held up his hands, one on one side and one on the other side; so it was that his hands were steady until the sun set. '
  '13':
  - type: text
    content: 'So Joshua overwhelmed '
  - type: text
