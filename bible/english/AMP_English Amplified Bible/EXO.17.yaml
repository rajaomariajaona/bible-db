  '2':
  - type: text
    content: Therefore the people quarreled with Moses and said, “Give us water so we may [have something to] drink.” And Moses said to them, “Why do you quarrel with me? Why do you tempt the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: text
    content: and
  - type: text
    content: ' try His patience?” '
  '3':
  - type: text
    content: 'But the people were thirsty for water; and the people murmured against Moses and said, “Why did you bring us up from Egypt to kill us and our children and our livestock with thirst?” '
  '4':
  - type: text
    content: So Moses cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' for help, saying, “What shall I do with this people? They are almost ready to stone me.” '
  '5':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Pass before the people and take with you some of the elders of Israel; and take in your hand the staff with which you struck the Nile, and go. '
  '6':
  - type: text
    content: 'Behold, I will stand before you there on the rock at '
  - type: note
    content: Horeb may refer to the mountain range of which Sinai is an individual mountain.
  - type: text
    content: 'Horeb; there you shall strike the rock, and water will come out of it, so that the people may [have something to] drink.” And Moses did so in the sight of the elders of Israel. [1 Cor 10:4] '
  '7':
  - type: text
    content: 'He named the place [where this miracle occurred] Massah (test) and '
  - type: note
    content: A similar incident occurred when the Israelites were in the Wilderness of Zin at Meribah-kadesh (Num 20:8-13; Deut 32:50-52). On that occasion Moses disobeyed God’s specific instruction and paid a terrible price for his action.
  - type: text
    content: Meribah (contention) because of the quarreling of the sons of Israel, and because they tested the [patience of the] L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “Is the L'
  - type: heading
    content: ord
  - type: text
    content: ' among us, or not?”'
  - type: heading
    content: Amalek Fought
  '8':
  - type: text
    content: 'Then '
  - type: note
    content: These were a group of nomads descended from Amalek, a grandson of Esau, Jacob’s twin brother.
  - type: text
    content: 'Amalek [and his people] came and fought with Israel at Rephidim. '
  '9':
  - type: text
    content: 'So Moses said to '
  - type: note
    content: Joshua, leader of the tribe of Ephraim, was one of the great warriors of the OT and was an attendant to and the successor of Moses.
  - type: text
    content: 'Joshua, “Choose men for us and go out, fight against Amalek [and his people]. Tomorrow I will stand on the top of the hill with the staff of God in my hand.” '
