document_id: NUM.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ordinance of the Red Heifer
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: The one who gathers the ashes of the heifer shall wash his clothes, and be unclean until evening. This shall be a perpetual statute to the Israelites and to the stranger who lives as a resident alien among them.
  '11':
  - type: text
    content: '‘The one who touches the dead body of any person shall be unclean for seven days. '
  '12':
  - type: text
    content: 'That one shall purify himself from uncleanness with the water [made with the ashes of the burned heifer] on the third day and on the seventh day, and then he will be clean; but if he does not purify himself on the third day and on the seventh day, he will not be clean. '
  '13':
  - type: text
    content: Whoever touches a corpse, the body of anyone who has died, and does not purify himself, defiles the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: ; and that person shall be cut off from Israel [that is, excluded from the atonement made for them]. Because the water for impurity was not sprinkled on him, he shall be unclean; his uncleanness is still on him.
  '14':
  - type: text
    content: '‘This is the law when a man dies in a tent: everyone who comes into the tent and everyone who is in the tent shall be [ceremonially] unclean for seven days. '
  '15':
  - type: text
    content: 'Every open container [in the tent], which has no covering tied down on it, is unclean. '
  '16':
  - type: text
    content: 'Also, anyone in the open field who touches one who has been killed with a sword or who has died [of natural causes], or a human bone or a grave, shall be unclean for seven days. '
  '17':
  - type: text
    content: 'Then for the unclean person they shall take some of the ashes of the heifer burnt for the purification from sin, and running water shall be added to them in a container. '
  '18':
  - type: text
    content: 'A clean person shall take '
  - type: note
    content: I.e. an aromatic plant used in bunches for sprinkling rites.
  - type: text
    content: 'hyssop and dip it in the water and sprinkle it on the tent and on all the furnishings and on the people who were there, and on the one who touched the bone or the one who was killed or the one who died [naturally] or the grave. '
  '19':
  - type: text
    content: Then the clean person shall sprinkle [the water for purification] on the unclean person on the third day and on the seventh day, and on the seventh day the unclean man shall purify himself, and wash his clothes and bathe himself in water, and shall be [ceremonially] clean at evening.
  '2':
  - type: text
    content: “This is the statute of the law which the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded: ‘Tell the Israelites to bring you an unblemished red heifer in which there is no defect and on which a yoke has never been placed. '
  '20':
  - type: text
    content: ‘But the man who is unclean and does not purify himself, that person shall be cut off from among the assembly, because he has defiled the sanctuary of the L
  - type: heading
    content: ord
  - type: text
    content: '. The water for purification has not been sprinkled on him; he is unclean. '
  '21':
  - type: text
    content: 'So it shall be a perpetual statute to them. He who sprinkles the water for impurity [on another] shall wash his clothes, and he who touches the water for impurity shall be unclean until evening. '
  '22':
  - type: text
    content: Furthermore, anything the unclean person touches shall be unclean, and anyone who touches it shall be [ceremonially] unclean until evening.’ ”
  '3':
  - type: text
    content: 'You shall give it to Eleazar the priest, and it shall be brought outside the camp and be slaughtered in his presence. '
  '4':
  - type: text
    content: 'Next Eleazar the priest shall take some of its blood with his finger and sprinkle some of it toward the front of the Tent of Meeting (tabernacle) seven times. '
  '5':
  - type: text
    content: 'Then the heifer shall be burned in his sight; its skin, its flesh, its blood, and its waste, shall be burned (reduced to ash). '
  '6':
  - type: text
    content: 'The priest shall take cedar wood and '
  - type: note
    content: I.e. an aromatic plant.
  - type: text
    content: 'hyssop and scarlet [material] and cast them into the midst of the burning heifer. '
  '7':
  - type: text
    content: 'Then the priest shall wash his clothes and bathe his body in water; and afterward come into the camp, but he shall be [ceremonially] unclean until evening. '
  '8':
  - type: text
    content: 'The one who burns the heifer shall wash his clothes and bathe his body in water, and shall be unclean until evening. '
  '9':
  - type: text
    content: 'Now a man who is [ceremonially] clean shall collect the ashes of the heifer and deposit them outside the camp in a clean place, and the congregation of the Israelites shall keep it for '
  - type: note
    content: The purpose of the ash mixed with water was to remove the contamination from those defiled because of contact with a dead body.
  - type: text
    content: 'water to remove impurity; it is [to be used for] purification from sin. '
