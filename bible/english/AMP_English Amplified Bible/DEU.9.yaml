document_id: DEU.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Provoked God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Hear, O Israel! You are crossing the Jordan today to go in to dispossess nations greater and more powerful than you, great cities fortified to heaven, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave me the two tablets of stone written with the finger of God; and on them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were written
    - type: text
      text: ' all the words which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had spoken to you at the mountain from the midst of the fire on the day of the assembly. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: It came about at the end of forty days and forty nights that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave me the two tablets of stone, the tablets of the covenant. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, ‘Arise, go down from here quickly, for your people whom you brought from Egypt have acted corruptly. They have quickly turned aside from the way which I commanded them; they have made (cast) a molten image for themselves.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Furthermore, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, ‘I have seen this people, and indeed, they are stiff-necked (stubborn, obstinate) people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Let Me alone, so that I may destroy them and wipe out their name from under heaven; and I will make of you a nation mightier and greater than they.’
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“So I turned and came down from the mountain while the mountain was burning with fire, and the two tablets of the covenant were in my two hands. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And I saw that you had indeed sinned against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God. You had made for yourselves a molten '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The selection of a calf-god was probably inspired by the Egyptian bull-god Apis (Hapis), believed to be a living manifestation of the Egyptian god, Ptah. In ancient Egypt, a bull-calf with specific markings was selected from the herd and designated and worshiped as Apis. The Apis was the most important of the sacred animals of Egypt. At the age of twenty-eight the Apis bull was sacrificed and buried in a highly structured ritual and a new bull-calf was selected to take his place. Numerous elaborate burial sites containing the Apis bulls have been discovered in Egypt. Both the Greeks and Romans adopted the cultic worship of Apis and it continued until about '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 400.
      marker-yv: yv-n
    - type: text
      text: calf (idol). You had turned aside quickly from the way which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded you. [Ex 32:1-10] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So I took hold of the two tablets and threw them from my two hands and smashed them before your very eyes! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then, as before, I fell down before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for [another] forty days and forty nights; I did not eat food or drink water, because of all the sin you had committed by doing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the evil,
        - type: text
          text: ' when the word “evil” (or other such word) is used with the definite article (“the evil”) without any contextual explanation, it refers to the evil of seeking salvation by some other way than that which is offered by God.'
      marker-yv: yv-n
    - type: text
      text: what was evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to provoke Him to anger. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For I was afraid of the anger and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: hot displeasure
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: absolute fury which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' held against you, [enough divine fury] to destroy you, but the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' listened to me that time also. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'a people great and tall, sons of Anakim, whom you know and of whom you have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it said,
    - type: text
      text: ' ‘Who can stand before the sons of Anak?’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was very angry with Aaron, angry [enough] to destroy him, so I also prayed for Aaron at the same time. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I took your sinful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thing,
    - type: text
      text: ' the calf which you had made, and burned it in the fire and thoroughly crushed it, grinding the metal thoroughly until it was as fine as dust; and I threw its dust into the brook that came down from the mountain.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “At Taberah also and at Massah and at Kibroth-hattaavah you provoked the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to wrath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent you from Kadesh-barnea, saying, ‘Go up and take possession of the land which I have given you,’ then you rebelled against the command of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, and you did not believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rely on Him, nor did you obey His voice. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You have been rebellious against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from the [first] day that I knew you.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“So I fell down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lay face down before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forty days and nights because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said He would destroy you. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then I prayed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and said, ‘O Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', do not destroy Your people, even Your inheritance, whom You have redeemed through Your greatness, whom You have brought from Egypt with a mighty hand. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Remember [with compassion] Your servants, Abraham, Isaac, and Jacob; do not look at the stubbornness of this people or at their wickedness or at their sin, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: so that the [people of the] land from which You brought us will not say, “Because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was not capable of bringing them into the land which He had promised them and because He hated them He has brought them out to the wilderness [in order] to kill them.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Yet they are Your people and Your inheritance, whom You have brought out by Your great power and by Your outstretched arm.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So know today [with confident assurance] that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is crossing [the Jordan] before you like a devouring fire. He will destroy them and He will subdue them before you, and you shall drive them out and destroy them quickly, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has promised you.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Do not say in your heart when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has driven them out before you, ‘Because of my righteousness the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has brought me in to possess this land,’ but because of the wickedness of these nations the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is dispossessing them before you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: It is not for your righteousness or for the uprightness of your heart that you are going to possess their land, but because of the wickedness of these nations the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is driving them out before you, and to confirm the oath which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore to your fathers, to Abraham, Isaac, and Jacob.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Know [without any doubt], that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is not giving you this good land to possess because of your righteousness, for you are a stiff-necked (stubborn, obstinate) people. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Remember [with remorse] and do not forget how you provoked the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God to wrath in the wilderness; from the day you left the land of Egypt until you arrived in this place, you have been rebellious against the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And at Horeb (Sinai) you provoked the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to wrath, and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was so angry with you that He would have destroyed you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: When I went up the mountain to receive the tablets of stone, the tablets of the covenant which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' made with you, I remained on the mountain forty days and forty nights; I did not eat food or drink water. '
