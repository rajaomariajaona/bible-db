document_id: ISA.45,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Uses Cyrus
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says to His anointed, to Cyrus [king of Persia],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose right hand I have held
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To subdue nations before him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will ungird the loins of kings [disarming them];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To open doors before him so that gates will not be shut:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Woe (judgment is coming) to him who says to a father, ‘What are you fathering?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or to a woman, ‘With what are you in labor?’ ”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the Holy One of Israel, and its Maker says this,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ask Me about the things to come concerning My sons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And give Me orders concerning the work of My hands.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “I made the earth and created man upon it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My hands, stretched out the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I commanded all their host.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“I have stirred up Cyrus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put him into action in righteousness [to accomplish My purpose]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make all his ways smooth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will build My city and let My exiles go,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without any payment or reward,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For this is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The products of Egypt and the merchandise of Cush (ancient Ethiopia)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the Sabeans, men of stature,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will come over to you and they will be yours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will walk behind you, in chains [of subjection to you] they will come over,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will bow down before you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will make supplication to you, [humbly and earnestly] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These words foretell the fact that salvation will be available to believing Gentiles, as well as Jews.
      marker-yv: yv-n
    - type: text
      text: ‘Most certainly God is with you, and there is no other,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No other God [besides Him].’ ” [1 Cor 14:25]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Truly, You are a God who hides Himself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God of Israel, Savior!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They will be put to shame and also humiliated, all of them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They who make idols will go away together in humiliation.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Israel has been saved by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With an everlasting salvation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will not be put to shame or humiliated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for all eternity. [Heb 5:9]
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who created the heavens '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Longer parenthetical passages such as this one are in the Hebrew text, and should not be confused with the general use of parentheses as a way to define or modify the previous word or group of words.
      marker-yv: yv-n
    - type: text
      text: (He is God, who formed the earth and made it; He established it and did not create it to be a wasteland, but formed it to be inhabited) says this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and there is no one else.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “I have not spoken in secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a corner of a land of darkness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I did not say to the descendants of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Seek Me in vain [with no benefit for yourselves].’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', speak righteousness [the truth—trustworthy, a straightforward correlation between deeds and words],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declaring things that are upright. [John 18:20]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “I will go before you and level the mountains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will shatter the doors of bronze and cut through the bars of iron.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ¶“Assemble yourselves and come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come together, you survivors of the nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are ignorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who carry around their wooden idols [in religious processions or into battle]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And keep on praying to a god that cannot save them.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Declare and present '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your defense of idols;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, let them consult together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who announced this [rise of Cyrus and his conquests] long before '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it happened?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who declared it long ago?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was it not I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no other God besides Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A [consistently and uncompromisingly] just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous God and a Savior;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is none except Me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Turn to Me and be saved, all the ends of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am God, and there is no other.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “I have sworn [an oath] by Myself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The word is gone out of My mouth in righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall not return,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That to Me every knee shall bow, every tongue shall swear [allegiance]. [Rom 14:11; Phil 2:10, 11; Heb 6:13]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “It shall be said of Me, ‘Only in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are righteousness and strength.’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him people will come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all who were angry at Him will be put to shame. [1 Cor 1:30, 31]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “In the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all the offspring of Israel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will be justified (declared free of guilt) and will glory [in God].”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I will give you the treasures of darkness [the hoarded treasures]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the hidden riches of secret places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you may know that it is I,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, who calls you (Cyrus the Great) by your name.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “For the sake of Jacob My servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And of Israel My chosen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have also called you by your name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have given you an honorable name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you have not known Me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and there is no one else;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no God except Me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will embrace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arm you, though you have not known Me,'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: That people may know from the rising to the setting of the sun [the world over]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That there is no one except Me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and there is no other,'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The One forming light and creating darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Causing peace and creating disaster;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who does all these things.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Supreme Power
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶“Rain down, O heavens, from above,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the clouds pour down righteousness [all the blessings of God];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the earth open up, let salvation bear fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And righteousness spring up with it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', have created it.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶“Woe (judgment is coming) to him who quarrels with his Maker—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A [worthless] piece of broken pottery among other broken pieces [equally worthless]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall the clay say to the potter, ‘What are you doing?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or does the thing say, ‘He has no hands’? [Rom 9:20]
