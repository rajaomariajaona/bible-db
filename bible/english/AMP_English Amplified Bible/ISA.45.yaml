document_id: ISA.45,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God Uses Cyrus
  - type: text
    content: This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' says to His anointed, to Cyrus [king of Persia],'
  - type: text
    content: Whose right hand I have held
  - type: text
    content: To subdue nations before him,
  - type: text
    content: And I will ungird the loins of kings [disarming them];
  - type: text
    content: 'To open doors before him so that gates will not be shut:'
  '10':
  - type: text
    content: “Woe (judgment is coming) to him who says to a father, ‘What are you fathering?’
  - type: text
    content: Or to a woman, ‘With what are you in labor?’ ”
  '11':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ', the Holy One of Israel, and its Maker says this,'
  - type: text
    content: “Ask Me about the things to come concerning My sons,
  - type: text
    content: And give Me orders concerning the work of My hands.
  '12':
  - type: text
    content: “I made the earth and created man upon it.
  - type: text
    content: My hands, stretched out the heavens,
  - type: text
    content: And I commanded all their host.
  '13':
  - type: text
    content: '“I have stirred up Cyrus '
  - type: text
    content: and
  - type: text
    content: ' put him into action in righteousness [to accomplish My purpose]'
  - type: text
    content: And I will make all his ways smooth;
  - type: text
    content: He will build My city and let My exiles go,
  - type: text
    content: Without any payment or reward,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts.'
  '14':
  - type: text
    content: For this is what the L
  - type: heading
    content: ord
  - type: text
    content: ' says,'
  - type: text
    content: “The products of Egypt and the merchandise of Cush (ancient Ethiopia)
  - type: text
    content: And the Sabeans, men of stature,
  - type: text
    content: Will come over to you and they will be yours;
  - type: text
    content: They will walk behind you, in chains [of subjection to you] they will come over,
  - type: text
    content: And they will bow down before you;
  - type: text
    content: 'They will make supplication to you, [humbly and earnestly] '
  - type: text
    content: saying,
  - type: note
    content: These words foretell the fact that salvation will be available to believing Gentiles, as well as Jews.
  - type: text
    content: ‘Most certainly God is with you, and there is no other,
  - type: text
    content: No other God [besides Him].’ ” [1 Cor 14:25]
  '15':
  - type: text
    content: Truly, You are a God who hides Himself,
  - type: text
    content: O God of Israel, Savior!
  '16':
  - type: text
    content: They will be put to shame and also humiliated, all of them;
  - type: text
    content: They who make idols will go away together in humiliation.
  '17':
  - type: text
    content: Israel has been saved by the L
  - type: heading
    content: ord
  - type: text
    content: With an everlasting salvation;
  - type: text
    content: You will not be put to shame or humiliated
  - type: text
    content: for all eternity. [Heb 5:9]
  '18':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ', who created the heavens '
  - type: note
    content: Longer parenthetical passages such as this one are in the Hebrew text, and should not be confused with the general use of parentheses as a way to define or modify the previous word or group of words.
  - type: text
    content: (He is God, who formed the earth and made it; He established it and did not create it to be a wasteland, but formed it to be inhabited) says this,
  - type: text
    content: “I am the L
  - type: heading
    content: ord
  - type: text
    content: ', and there is no one else.'
  '19':
  - type: text
    content: “I have not spoken in secret,
  - type: text
    content: In a corner of a land of darkness;
  - type: text
    content: I did not say to the descendants of Jacob,
  - type: text
    content: ‘Seek Me in vain [with no benefit for yourselves].’
  - type: text
    content: I, the L
  - type: heading
    content: ord
  - type: text
    content: ', speak righteousness [the truth—trustworthy, a straightforward correlation between deeds and words],'
  - type: text
    content: Declaring things that are upright. [John 18:20]
  '2':
  - type: text
    content: “I will go before you and level the mountains;
  - type: text
    content: I will shatter the doors of bronze and cut through the bars of iron.
  '20':
  - type: text
    content: ¶“Assemble yourselves and come;
  - type: text
    content: Come together, you survivors of the nations!
  - type: text
    content: They are ignorant,
  - type: text
    content: Who carry around their wooden idols [in religious processions or into battle]
  - type: text
    content: And keep on praying to a god that cannot save them.
  '21':
  - type: text
    content: '“Declare and present '
  - type: text
    content: your defense of idols;
  - type: text
    content: Indeed, let them consult together.
  - type: text
    content: 'Who announced this [rise of Cyrus and his conquests] long before '
  - type: text
    content: it happened?
  - type: text
    content: Who declared it long ago?
  - type: text
    content: Was it not I, the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: And there is no other God besides Me,
  - type: text
    content: 'A [consistently and uncompromisingly] just '
  - type: text
    content: and
  - type: text
    content: ' righteous God and a Savior;'
  - type: text
    content: There is none except Me.
  '22':
  - type: text
    content: “Turn to Me and be saved, all the ends of the earth;
  - type: text
    content: For I am God, and there is no other.
  '23':
  - type: text
    content: “I have sworn [an oath] by Myself,
  - type: text
    content: The word is gone out of My mouth in righteousness
  - type: text
    content: And shall not return,
  - type: text
    content: That to Me every knee shall bow, every tongue shall swear [allegiance]. [Rom 14:11; Phil 2:10, 11; Heb 6:13]
  '24':
  - type: text
    content: “It shall be said of Me, ‘Only in the L
  - type: heading
    content: ord
  - type: text
    content: ' are righteousness and strength.’'
  - type: text
    content: To Him people will come,
  - type: text
    content: And all who were angry at Him will be put to shame. [1 Cor 1:30, 31]
  '25':
  - type: text
    content: “In the L
  - type: heading
    content: ord
  - type: text
    content: ' all the offspring of Israel'
  - type: text
    content: Will be justified (declared free of guilt) and will glory [in God].”
  '3':
  - type: text
    content: “I will give you the treasures of darkness [the hoarded treasures]
  - type: text
    content: And the hidden riches of secret places,
  - type: text
    content: So that you may know that it is I,
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, who calls you (Cyrus the Great) by your name.'
  '4':
  - type: text
    content: “For the sake of Jacob My servant,
  - type: text
    content: And of Israel My chosen,
  - type: text
    content: I have also called you by your name;
  - type: text
    content: I have given you an honorable name
  - type: text
    content: Though you have not known Me.
  '5':
  - type: text
    content: “I am the L
  - type: heading
    content: ord
  - type: text
    content: ', and there is no one else;'
  - type: text
    content: There is no God except Me.
  - type: text
    content: 'I will embrace '
  - type: text
    content: and
  - type: text
    content: ' arm you, though you have not known Me,'
  '6':
  - type: text
    content: That people may know from the rising to the setting of the sun [the world over]
  - type: text
    content: That there is no one except Me.
  - type: text
    content: I am the L
  - type: heading
    content: ord
  - type: text
    content: ', and there is no other,'
  '7':
  - type: text
    content: The One forming light and creating darkness,
  - type: text
    content: Causing peace and creating disaster;
  - type: text
    content: I am the L
  - type: heading
    content: ord
  - type: text
    content: ' who does all these things.'
  - type: heading
    content: God’s Supreme Power
  '8':
  - type: text
    content: ¶“Rain down, O heavens, from above,
  - type: text
    content: Let the clouds pour down righteousness [all the blessings of God];
  - type: text
    content: Let the earth open up, let salvation bear fruit,
  - type: text
    content: And righteousness spring up with it;
  - type: text
    content: I, the L
  - type: heading
    content: ord
  - type: text
    content: ', have created it.'
  '9':
  - type: text
    content: ¶“Woe (judgment is coming) to him who quarrels with his Maker—
  - type: text
    content: A [worthless] piece of broken pottery among other broken pieces [equally worthless]!
  - type: text
    content: Shall the clay say to the potter, ‘What are you doing?’
  - type: text
    content: Or does the thing say, ‘He has no hands’? [Rom 9:20]
