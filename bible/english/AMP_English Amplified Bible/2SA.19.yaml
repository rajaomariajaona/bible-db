document_id: 2SA.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joab Reproves David’s Lament
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It was told to Joab, “Behold, the king is weeping and mourning for Absalom.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the victory on that day was turned into mourning for all the people, for the people heard it said on that day, “The king grieves for his son.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The people stole into the city [of Mahanaim] that day, as people who are humiliated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ashamed steal away when they retreat in battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the king covered his face and cried out with a loud voice, “O my son Absalom, O Absalom, my son, my son!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Joab came into the house to the king and said, “Today you have put all your servants to shame who this day have saved your life and the lives of your sons and your daughters, and the lives of your wives and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For you love those who hate you and hate those who love you. For you have shown today that commanders and servants are nothing to you; for today I know that if Absalom had lived and all the rest of us had died today, then you would be pleased. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So now stand up, go out and speak kindly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouragingly to your servants; for I swear by the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that if you do not go out, not a man will stay with you tonight. And this will be worse for you than all the evil that has come upon you from your youth until now.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Restored as King
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the king stood and sat at the gate [of Mahanaim]. And they told all the people, “The king is sitting at the gate,” and all the people came before the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: B
  - type: text
    text: 'ut Israel [Absalom’s troops] had fled, every man to his tent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All the people were quarreling throughout the tribes of Israel, saying, “The king rescued us from the hands of our enemies, and he saved us from the hands of the Philistines, but now he has fled out of the land from Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And Absalom, whom we anointed over us, has died in battle. So now, why are you [leaders] doing nothing about bringing back the king?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then King David sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Zadok and to Abiathar the priests, saying, “Say to the elders of Judah, ‘Why are you the last to bring the king back to his house [in Jerusalem], since the word of all Israel has come to the king, and to his house? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You are my brothers (relatives, relations); you are my bone and my flesh. Why then are you the last to bring back the king?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Say to Amasa [the commander of Absalom’s troops], ‘Are you not my bone and my flesh? May God do so to me, and more also, if you will not be commander of my army from now on in place of Joab.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In this way he changed the hearts of all the men of Judah as one man, so they sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to the king, “Return, you and all your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 15:14.
    marker-yv: yv-n
  - type: text
    text: 'servants.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So David returned and came to the Jordan. And [supporters from] Judah came to Gilgal to meet the king, to escort him across the Jordan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Shimei the son of Gera, a Benjamite of Bahurim, hurried and came down with the men [from the tribe] of Judah to meet King David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and a thousand men [from the tribe] of Benjamin with him. And Ziba, the servant of the house of Saul, and his fifteen sons and twenty servants with him, rushed down to the Jordan before the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then they [repeatedly] crossed the ford to bring over the king’s household (family), and to do what pleased him. And Shimei the son of Gera fell down before the king as he was about to cross the Jordan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and said to the king, “Let not my lord consider me guilty, nor remember what your servant did '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Shimei’s insulting behavior is recorded in 16:5-8.
    marker-yv: yv-n
  - type: text
    text: 'wrong on the day my lord the king left Jerusalem, so that the king would take it to heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For your servant knows that I have sinned; therefore, behold, I have come today, the first of all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A general reference to the ten northern tribes. The most important tribes in the north descended from Ephraim and Manasseh, Joseph’s sons.
    marker-yv: yv-n
  - type: text
    text: 'house of Joseph to come down to meet my lord the king.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But Abishai the son of Zeruiah said, “Should not Shimei be put to death for this, because he cursed the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' anointed?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David said, “What '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to me and to you
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'business is this of yours, you sons of Zeruiah, that you should be an adversary to me today? Should anyone be put to death in Israel today? For do I not know that today I am king over Israel?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Therefore the king said to Shimei, “You shall not be put to death.” And so the king gave him his promise. [1 Kin 2:44-46]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Mephibosheth the [grand]son of Saul came down to meet the king, but he had not cared for his feet, nor trimmed his mustache, nor washed his clothes from the day the king left until the day he returned in peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' safety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And when he came to Jerusalem to meet the king, the king said to him, “Why did you not go with me, Mephibosheth?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He said, “My lord the king, my servant [Ziba] betrayed me; for I said, ‘Saddle a donkey for me so that I may ride on it and go with the king,’ for your servant is lame [but he took the donkeys and left without me]. [2 Sam 16:1-4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Further, he has slandered your servant to my lord the king; but my lord the king is like the angel of God; so do what is good in your eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For were not all of my father’s household (family) nothing but dead men before my lord the king; yet you set your servant among those who ate at your own table. So what right do I still have to cry out anymore to the king [for help]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The king said to him, “Why speak anymore of your affairs? I have said, ‘You and Ziba shall divide the land.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mephibosheth said to the king, “Let him even take it all, since my lord the king has returned to his own house in safety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peace.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now Barzillai the Gileadite came down from Rogelim and went on to the Jordan with the king to escort him over the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Barzillai was a very old man, eighty years old; and he had provided the king with food while he stayed at Mahanaim, for he was a very great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wealthy man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The king said to Barzillai, “Cross over with me and I will provide for you in Jerusalem with me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But Barzillai said to the king, “How much longer have I to live, that I should go up with the king to Jerusalem? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'I am this day eighty years old. Can I [be useful to advise you to] discern between good and bad? Can your servant taste what I eat or drink? Can I still hear the voices of singing men and women? Why then should your servant be an added burden to my lord the king? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Your servant would merely cross over the Jordan with the king. Why should the king compensate me with this reward? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Please let your servant return, so that I may die in my own city [and be buried] by the grave of my father and mother. But here is your servant Chimham [my son]; let him cross over with my lord the king, and do for him what seems good to you.” [1 Kin 2:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The king answered, “Chimham shall cross over with me, and I will do for him what seems good to you; and whatever you ask of me, I will do for you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: So all the people crossed over the Jordan. When the king had crossed over, he kissed Barzillai and blessed him, and he returned to his place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then the king went on to Gilgal, and Chimham went on with him; and all the people of Judah and also half the people of Israel accompanied the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And all the men of Israel came to the king and said to him, “Why have our brothers (relatives), the men [from the tribe] of Judah, stolen you away and brought the king and his household and all David’s men with him over the Jordan [instead of waiting for us to arrive]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Then all the men of Judah answered the men of Israel, “Because the king is a close relative to us. So why then are you angry about this matter? Have we eaten at all at the king’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: expense?
  - type: text
    text: ' Or has anything been taken for us?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Then the men of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the ten tribes of the north.
    marker-yv: yv-n
  - type: text
    text: 'Israel answered the men of Judah, “We have ten [tribes’] shares in the king, and we have more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: claim
  - type: text
    text: ' on David than you. Why then did you treat us with contempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignore us [by rushing ahead]? Were we not the first to speak of bringing back our king?” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This tribal dispute led to the revolt of Sheba.
    marker-yv: yv-n
  - type: text
    text: But the words of the men of Judah were harsher than those of the men of Israel.
