  '1':
  - type: heading
    content: Various Laws
  - type: text
    content: '“You shall not give a false report; you shall not join hands with the wicked to be a malicious witness [promoting wrong and violence]. '
  '10':
  - type: text
    content: '“You shall sow your land six years and harvest its yield, '
  '11':
  - type: text
    content: but the seventh year you shall let it rest and lie uncultivated, so that the poor among your people may eat [what the land grows naturally]; whatever they leave the animals of the field may eat. You shall do the same with your vineyard and olive grove.
  '12':
  - type: text
    content: '“Six days [each week] you shall do your work, but on the seventh day you shall stop [working] so that your ox and your donkey may settle down '
  - type: text
    content: and
  - type: text
    content: ' rest, and the son of your female servant, as well as your stranger, may be refreshed. '
  '13':
  - type: text
    content: Now concerning everything which I have said to you, be on your guard; do not mention the name of other gods [either in a blessing or in a curse]; do not let such speech be heard [coming] from your mouth.
  - type: heading
    content: Three National Feasts
  '14':
  - type: text
    content: '“Three times a year you shall celebrate a feast [dedicated] to Me. '
  '15':
  - type: text
    content: 'You shall observe the Feast of Unleavened Bread; for seven days you shall eat unleavened bread, as I commanded you, at the appointed time in the month of Abib, for in it you came out of Egypt. No one shall appear before Me empty-handed [but you shall bring sacrificial offerings]. '
  '16':
  - type: text
    content: 'Also [you shall observe] the Feast of Harvest (Weeks, Pentecost, or First Fruits), acknowledging the first fruits of your labor, of what you sow in the field. And [third] the Feast of Ingathering (Booths or Tabernacles) at the end of the year when you gather in [the fruit of] your labors from the field. '
  '17':
  - type: text
    content: 'Three times a year all your males shall appear before the '
  - type: note
