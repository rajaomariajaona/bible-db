document_id: EXO.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Various Laws
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“You shall not give a false report; you shall not join hands with the wicked to be a malicious witness [promoting wrong and violence]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“You shall sow your land six years and harvest its yield, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: but the seventh year you shall let it rest and lie uncultivated, so that the poor among your people may eat [what the land grows naturally]; whatever they leave the animals of the field may eat. You shall do the same with your vineyard and olive grove.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Six days [each week] you shall do your work, but on the seventh day you shall stop [working] so that your ox and your donkey may settle down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest, and the son of your female servant, as well as your stranger, may be refreshed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Now concerning everything which I have said to you, be on your guard; do not mention the name of other gods [either in a blessing or in a curse]; do not let such speech be heard [coming] from your mouth.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Three National Feasts
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Three times a year you shall celebrate a feast [dedicated] to Me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'You shall observe the Feast of Unleavened Bread; for seven days you shall eat unleavened bread, as I commanded you, at the appointed time in the month of Abib, for in it you came out of Egypt. No one shall appear before Me empty-handed [but you shall bring sacrificial offerings]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Also [you shall observe] the Feast of Harvest (Weeks, Pentecost, or First Fruits), acknowledging the first fruits of your labor, of what you sow in the field. And [third] the Feast of Ingathering (Booths or Tabernacles) at the end of the year when you gather in [the fruit of] your labors from the field. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Three times a year all your males shall appear before the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '“Lord” with only an initial capital is Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Adonai
        - type: text
          text: ' (Master); “G'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: od
        - type: text
          text: ” (all caps) represents YHWH (Yahweh) and is usually rendered “L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ” (all caps).
      marker-yv: yv-n
    - type: text
      text: Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“You shall not offer the blood of My sacrifice with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because leaven is a kind of fungus, it became a symbol of corruption and sin. But in some contexts it had positive connotations (e.g. Lev 23:17; Matt 13:33).
      marker-yv: yv-n
    - type: text
      text: leavened bread; and the fat of My feast is not to be left overnight until morning.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “You shall bring the choice first fruits of your ground into the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Y
    - type: text
      text: 'ou shall not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may have been a pagan practice, perhaps a fertility rite.
      marker-yv: yv-n
    - type: text
      text: boil a young goat in its mother’s milk.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Conquest of the Land
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'You shall not follow a crowd to do [something] evil, nor shall you testify at a trial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' in a dispute so as to side with a crowd in order to pervert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: justice;
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“Behold, I am going to send an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
      marker-yv: yv-n
    - type: text
      text: 'Angel before you to keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guard you on the way and to bring you to the place I have prepared. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Be on your guard before Him, listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey His voice; do not be rebellious toward Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' provoke Him, for He will not pardon your transgression, since My Name (authority) is in Him. [Ex 32:34; 33:14; Is 63:9] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But if you will indeed listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' truly obey His voice and do everything that I say, then I will be an enemy to your enemies and an adversary to your adversaries. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When My Angel goes before you and brings you to [the land of] the Amorite, the Hittite, the Perizzite, the Canaanite, the Hivite, and the Jebusite, I will reject them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' completely destroy them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'You shall not bow down to worship their gods, nor serve them, nor do [anything] in accordance with their practices. You shall completely overthrow them and break down their [sacred] pillars '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' images [of pagan worship]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: You shall serve [only] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, and He shall bless your bread and water. I will also remove sickness from among you. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'No one shall suffer miscarriage or be barren in your land; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. grant you long life.
      marker-yv: yv-n
    - type: text
      text: 'I will fulfill the number of your days. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'I will send My terror ahead of you, and I will throw into confusion all the people among whom you come, and I will make all your enemies turn their backs to you [in flight]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'I will send hornets ahead of you which shall drive out the Hivite, the Canaanite, and the Hittite before you. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'I will not drive them out before you in a single year, so that the land does not become desolate [due to lack of attention] and the [wild] animals of the field do not become too numerous for you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'nor shall you favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be partial to a poor man in his dispute [simply because he is poor].'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'I will drive them out before you little by little, until you have increased and are strong enough to take possession of the land. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'I will establish your borders from the Red Sea to the Sea of the Philistines (the Mediterranean), and from the wilderness to the River '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Euphrates;
    - type: text
      text: ' for I will hand over the residents of the land to you, and you shall drive them out before you. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'You shall not make a covenant with them or with their gods. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: They shall not live in your land, because they will make you sin against Me; for if you serve their gods, it is certain to be a trap for you [resulting in judgment].”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“If you meet your enemy’s ox or his donkey wandering off, you must bring it back to him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: If you see the donkey of one who hates you lying helpless under its load, you shall not leave the man to deal with it [alone]; you must help him release the animal [from its burden].
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“You shall not pervert (bend) the justice due to your poor in his dispute. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Keep far away from a false charge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' action, and do not condemn to death the innocent or the righteous, for I will not justify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acquit the guilty.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“You shall not accept a bribe, for a bribe blinds the clear-sighted and subverts the testimony '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the cause of the righteous.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “You shall not oppress a stranger, for you know the soul [the feelings, thoughts, and concerns] of a stranger, for you were strangers in Egypt.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sabbath and Land
    marker-yv: yv-h
