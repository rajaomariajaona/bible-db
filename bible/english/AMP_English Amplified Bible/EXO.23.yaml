  - type: text
    content: ' provoke Him, for He will not pardon your transgression, since My Name (authority) is in Him. [Ex 32:34; 33:14; Is 63:9] '
  '22':
  - type: text
    content: 'But if you will indeed listen to '
  - type: text
    content: and
  - type: text
    content: ' truly obey His voice and do everything that I say, then I will be an enemy to your enemies and an adversary to your adversaries. '
  '23':
  - type: text
    content: 'When My Angel goes before you and brings you to [the land of] the Amorite, the Hittite, the Perizzite, the Canaanite, the Hivite, and the Jebusite, I will reject them '
  - type: text
    content: and
  - type: text
    content: ' completely destroy them. '
  '24':
  - type: text
    content: 'You shall not bow down to worship their gods, nor serve them, nor do [anything] in accordance with their practices. You shall completely overthrow them and break down their [sacred] pillars '
  - type: text
    content: and
  - type: text
    content: ' images [of pagan worship]. '
  '25':
  - type: text
    content: You shall serve [only] the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and He shall bless your bread and water. I will also remove sickness from among you. '
  '26':
  - type: text
    content: 'No one shall suffer miscarriage or be barren in your land; '
  - type: note
    content: I.e. grant you long life.
  - type: text
    content: 'I will fulfill the number of your days. '
  '27':
  - type: text
    content: 'I will send My terror ahead of you, and I will throw into confusion all the people among whom you come, and I will make all your enemies turn their backs to you [in flight]. '
  '28':
  - type: text
    content: 'I will send hornets ahead of you which shall drive out the Hivite, the Canaanite, and the Hittite before you. '
  '29':
  - type: text
    content: 'I will not drive them out before you in a single year, so that the land does not become desolate [due to lack of attention] and the [wild] animals of the field do not become too numerous for you. '
  '3':
  - type: text
    content: 'nor shall you favor '
  - type: text
    content: or
  - type: text
    content: ' be partial to a poor man in his dispute [simply because he is poor].'
  '30':
  - type: text
    content: 'I will drive them out before you little by little, until you have increased and are strong enough to take possession of the land. '
  '31':
  - type: text
    content: 'I will establish your borders from the Red Sea to the Sea of the Philistines (the Mediterranean), and from the wilderness to the River '
  - type: text
    content: Euphrates;
  - type: text
    content: ' for I will hand over the residents of the land to you, and you shall drive them out before you. '
  '32':
  - type: text
    content: 'You shall not make a covenant with them or with their gods. '
  '33':
  - type: text
    content: They shall not live in your land, because they will make you sin against Me; for if you serve their gods, it is certain to be a trap for you [resulting in judgment].”
  '4':
  - type: text
    content: '“If you meet your enemy’s ox or his donkey wandering off, you must bring it back to him. '
  '5':
  - type: text
    content: If you see the donkey of one who hates you lying helpless under its load, you shall not leave the man to deal with it [alone]; you must help him release the animal [from its burden].
  '6':
  - type: text
    content: '“You shall not pervert (bend) the justice due to your poor in his dispute. '
  '7':
  - type: text
    content: 'Keep far away from a false charge '
  - type: text
    content: or
  - type: text
    content: ' action, and do not condemn to death the innocent or the righteous, for I will not justify '
  - type: text
    content: and
  - type: text
    content: ' acquit the guilty.'
  '8':
  - type: text
    content: '“You shall not accept a bribe, for a bribe blinds the clear-sighted and subverts the testimony '
  - type: text
    content: and
  - type: text
    content: ' the cause of the righteous.'
  '9':
  - type: text
    content: “You shall not oppress a stranger, for you know the soul [the feelings, thoughts, and concerns] of a stranger, for you were strangers in Egypt.
  - type: heading
    content: The Sabbath and Land
