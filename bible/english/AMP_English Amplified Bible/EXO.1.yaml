verses:
  '1':
  - type: heading
    content: Israel Multiplies in Egypt
  - type: text
    content: 'Now these are the names of the sons of Israel who came to Egypt with Jacob; each came with his household: '
  '10':
  - type: text
    content: 'Come, let us deal shrewdly with them, so that they will not multiply and in the event of war, join our enemies, and fight against us and escape from the land.” '
  '11':
  - type: text
    content: 'So they set taskmasters over them to oppress them with hard labor. And the sons of Israel built Pithom and Raamses as storage cities for Pharaoh. '
  '12':
  - type: text
    content: 'But the more the Egyptians oppressed them, the more they multiplied and expanded, so that the Egyptians dreaded '
  - type: text
    content: and
  - type: text
    content: ' were exasperated by the Israelites. '
  '13':
  - type: text
    content: 'And the Egyptians made the Israelites serve rigorously [forcing them into severe slavery]. '
  '14':
  - type: text
    content: 'They made their lives bitter with hard labor in mortar, brick, and all kinds of field work. All their labor was harsh '
  - type: text
    content: and
  - type: text
    content: ' severe.'
  '15':
  - type: text
    content: 'Then the king of Egypt said to the Hebrew midwives, one of whom was named Shiphrah (beauty) and the other named Puah (splendor), '
  '16':
  - type: text
    content: '“When you act as midwives to the Hebrew women and see them on the birthstool, if it is a son, you shall kill him; but if it is a daughter, she shall live.” '
  '17':
  - type: text
    content: 'But the midwives feared God [with profound reverence] and did not do as the king of Egypt commanded, but they let the boy babies live. '
  '18':
  - type: text
    content: 'So the king of Egypt called for the midwives and said to them, “Why have you done this thing, and allowed the boy babies to live?” '
  '19':
  - type: text
    content: 'The midwives answered Pharaoh, “Because the Hebrew women are not like the Egyptian women; they are vigorous and give birth quickly and their babies are born before the midwife can get to them.” '
  '2':
  - type: text
    content: 'Reuben, Simeon, Levi, and Judah; '
  '20':
  - type: text
    content: 'So God was good to the midwives, and the people [of Israel] multiplied and became very strong. '
  '21':
  - type: text
    content: 'And because the midwives feared God [with profound reverence], '
  - type: note
    content: Lit made them houses.
  - type: text
    content: 'He established families '
  - type: text
    content: and
  - type: text
    content: ' households for them. '
  '22':
  - type: text
    content: 'Then '
  - type: note
    content: If the early date of the exodus (1446 b.c.) is acknowledged, as most conservative scholars hold, then this pharaoh is likely Thutmose I (1525-1512 b.c.).
  - type: text
    content: Pharaoh commanded all his people, saying, “Every son who is born [to the Hebrews] must be thrown into the Nile, but every daughter you shall keep alive.”
  '3':
  - type: text
    content: 'Issachar, Zebulun, and Benjamin; '
  '4':
  - type: text
    content: 'Dan and Naphtali, Gad, and Asher. '
  '5':
  - type: text
    content: 'All the descendants of Jacob were seventy people; Joseph was [already] in Egypt. '
  '6':
  - type: text
    content: 'Then Joseph died, and all his brothers and all that generation, '
  '7':
  - type: text
    content: 'but the '
  - type: note
    content: In general, sons (children, descendants) of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
    content: 'Israelites were prolific and increased greatly; '
  - type: note
    content: Over two hundred years have passed since the death of Joseph.
  - type: text
    content: they multiplied and became extremely strong, so that the land was filled with them.
  '8':
  - type: text
    content: ' '
  - type: note
    content: The political attitude toward the Israelites living in Egypt changed from friendly and welcoming to suspicious and hostile, and Israel’s struggle for existence led to one of the most dramatic and memorable interventions that God would make in human history.
  - type: text
    content: 'Now a new '
  - type: note
    content: The identity of this pharaoh is uncertain. Some scholars think he was Ahmose I (1570-1546 b.c.), founder of the 18th dynasty of Egypt’s New Kingdom or Ahmose’s successor, Amenhotep I (1546-1525 b.c.). Others believe that this Pharaoh was one of the first of the Hyksos rulers; the Hyksos were foreign invaders.
  - type: text
    content: 'king arose over Egypt, who did not know Joseph [nor the history of his accomplishments]. '
  '9':
  - type: text
    content: 'He said to his people, “Behold, the '
  - type: note
    content: This is the first record of the descendants of Israel (Jacob) being regarded as a separate nation (also see Gen 34:7 and note).
  - type: text
    content: 'people of the sons of Israel are too many and too mighty for us [they greatly outnumber us]. '
