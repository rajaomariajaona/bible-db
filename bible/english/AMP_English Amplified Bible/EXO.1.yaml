document_id: EXO.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Multiplies in Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these are the names of the sons of Israel who came to Egypt with Jacob; each came with his household: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reuben, Simeon, Levi, and Judah; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issachar, Zebulun, and Benjamin; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan and Naphtali, Gad, and Asher. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All the descendants of Jacob were seventy people; Joseph was [already] in Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Joseph died, and all his brothers and all that generation, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In general, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons (children, descendants) of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Reuben, Reuben, Reubenites
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'Israelites were prolific and increased greatly; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Over two hundred years have passed since the death of Joseph.
    marker-yv: yv-n
  - type: text
    text: they multiplied and became extremely strong, so that the land was filled with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The political attitude toward the Israelites living in Egypt changed from friendly and welcoming to suspicious and hostile, and Israel’s struggle for existence led to one of the most dramatic and memorable interventions that God would make in human history.
    marker-yv: yv-n
  - type: text
    text: 'Now a new '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The identity of this pharaoh is uncertain. Some scholars think he was Ahmose I (1570-1546 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '.), founder of the 18th dynasty of Egypt’s New Kingdom or Ahmose’s successor, Amenhotep I (1546-1525 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .). Others believe that this Pharaoh was one of the first of the Hyksos rulers; the Hyksos were foreign invaders.
    marker-yv: yv-n
  - type: text
    text: 'king arose over Egypt, who did not know Joseph [nor the history of his accomplishments]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He said to his people, “Behold, the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first record of the descendants of Israel (Jacob) being regarded as a separate nation (also see Gen 34:7 and note).
    marker-yv: yv-n
  - type: text
    text: 'people of the sons of Israel are too many and too mighty for us [they greatly outnumber us]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Come, let us deal shrewdly with them, so that they will not multiply and in the event of war, join our enemies, and fight against us and escape from the land.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So they set taskmasters over them to oppress them with hard labor. And the sons of Israel built Pithom and Raamses as storage cities for Pharaoh. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the more the Egyptians oppressed them, the more they multiplied and expanded, so that the Egyptians dreaded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were exasperated by the Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And the Egyptians made the Israelites serve rigorously [forcing them into severe slavery]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They made their lives bitter with hard labor in mortar, brick, and all kinds of field work. All their labor was harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the king of Egypt said to the Hebrew midwives, one of whom was named Shiphrah (beauty) and the other named Puah (splendor), '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“When you act as midwives to the Hebrew women and see them on the birthstool, if it is a son, you shall kill him; but if it is a daughter, she shall live.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the midwives feared God [with profound reverence] and did not do as the king of Egypt commanded, but they let the boy babies live. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So the king of Egypt called for the midwives and said to them, “Why have you done this thing, and allowed the boy babies to live?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The midwives answered Pharaoh, “Because the Hebrew women are not like the Egyptian women; they are vigorous and give birth quickly and their babies are born before the midwife can get to them.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So God was good to the midwives, and the people [of Israel] multiplied and became very strong. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And because the midwives feared God [with profound reverence], '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: made them houses.
    marker-yv: yv-n
  - type: text
    text: 'He established families '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' households for them. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'If the early date of the exodus (1446 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '.) is acknowledged, as most conservative scholars hold, then this pharaoh is likely Thutmose I (1525-1512 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .).
    marker-yv: yv-n
  - type: text
    text: Pharaoh commanded all his people, saying, “Every son who is born [to the Hebrews] must be thrown into the Nile, but every daughter you shall keep alive.”
