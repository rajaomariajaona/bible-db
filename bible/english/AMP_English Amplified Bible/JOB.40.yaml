    content: “He lies down under the lotus plants,
  - type: text
    content: In the hidden shelter of the reeds in the marsh.
  '22':
  - type: text
    content: “The lotus plants cover him with their shade;
  - type: text
    content: The willows of the brook surround him.
  '23':
  - type: text
    content: '“If a river rages '
  - type: text
    content: and
  - type: text
    content: ' overflows, he does not tremble;'
  - type: text
    content: He is confident, though the Jordan [River] swells and rushes against his mouth.
  '24':
  - type: text
    content: “Can anyone capture him when he is on watch,
  - type: text
    content: Or pierce his nose with barbs [to trap him]?
