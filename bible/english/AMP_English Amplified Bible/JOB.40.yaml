  - type: text
    content: gird up your loins (prepare yourself) like a man,
  - type: text
    content: And I will ask you, and you instruct Me.
  '8':
  - type: text
    content: '“Will you really annul My judgment '
  - type: text
    content: and
  - type: text
    content: ' set it aside as void?'
  - type: text
