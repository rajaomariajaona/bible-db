    - type: text
      text: 'Job: What Can I Say?'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Job,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Will the faultfinder contend with the Almighty?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him who disputes with God answer it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Job replied to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Behold, I am of little importance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contemptible; what can I reply to You?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I lay my hand on my mouth. [Ezra 9:6; Ps 51:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I have spoken once, but I will not reply again—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, twice [I have answered], and I will add nothing further.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Questions Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered Job out of the whirlwind, saying,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 38:3.
    marker-yv: yv-n
  - type: text
    text: gird up your loins (prepare yourself) like a man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will ask you, and you instruct Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Will you really annul My judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set it aside as void?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will you condemn Me [your God] that you may [appear to] be righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justified?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Have you an arm like God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And can you thunder with a voice like His?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶“Adorn yourself with eminence and dignity [since you question the Almighty],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And array yourself with honor and majesty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Pour out the overflowings of your wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And look at everyone who is proud and make him low.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Look at everyone who is proud, and humble him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [if you are so able] tread down the wicked where they stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “[Crush and] hide them in the dust together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shut them up in the hidden place [the house of death].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“[If you can do all this, Job, proving your divine power] then I [God] will also praise you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That your own right hand can save you.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Power Shown in Creatures
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '¶“Behold now, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the hippopotamus
      - type: text
        text: . Although Behemoth cannot be identified with certainty, the biblical description seems most like the hippopotamus. In ancient times it may have been even more formidable than today. In Job’s day the hippopotamus was the largest known creature, was commonly found in the lower Nile River, and may also have existed in the Jordan.
    marker-yv: yv-n
  - type: text
    text: Behemoth, which I created as well as you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He eats grass like an ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “See now, his strength is in his loins
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his power is in the muscles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sinews of his belly.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “He sways his tail like a cedar;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The tendons of his thighs are twisted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knit together [like a rope].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “His bones are tubes of bronze;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bones
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: limbs are like bars of iron.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶“He is the first [in magnitude and power] of the works of God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Only] He who made him can bring near His sword [to master him].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Surely the mountains bring him food,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the wild animals play there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “He lies down under the lotus plants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the hidden shelter of the reeds in the marsh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “The lotus plants cover him with their shade;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The willows of the brook surround him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“If a river rages '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflows, he does not tremble;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is confident, though the Jordan [River] swells and rushes against his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Can anyone capture him when he is on watch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or pierce his nose with barbs [to trap him]?
