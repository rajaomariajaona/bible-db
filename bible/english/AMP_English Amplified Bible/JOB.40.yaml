  '15':
  - type: text
    content: '¶“Behold now, '
  - type: note
    content: Or the hippopotamus. Although Behemoth cannot be identified with certainty, the biblical description seems most like the hippopotamus. In ancient times it may have been even more formidable than today. In Job’s day the hippopotamus was the largest known creature, was commonly found in the lower Nile River, and may also have existed in the Jordan.
  - type: text
    content: Behemoth, which I created as well as you;
  - type: text
    content: He eats grass like an ox.
  '16':
  - type: text
    content: “See now, his strength is in his loins
  - type: text
    content: 'And his power is in the muscles '
  - type: text
    content: and
  - type: text
    content: ' sinews of his belly.'
  '17':
  - type: text
