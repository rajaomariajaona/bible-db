document_id: PSA.87,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 87
  - type: heading
    content: The Privileges of Citizenship in Zion.
  - type: text
    content: A Psalm of the sons of Korah. A Song.
  - type: text
    content: His foundation is on the holy mountain.
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' loves the gates of Zion'
  - type: text
    content: More than all the dwellings of Jacob (Israel).
  '3':
  - type: text
    content: Glorious things are spoken of you,
  - type: text
    content: 'O city of God [Jerusalem]. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: “I will mention Rahab (Egypt) and Babylon among those who know Me—
  - type: text
    content: Behold, Philistia and Tyre with Ethiopia (Cush)—
  - type: text
    content: ‘This one was born there.’ ”
  '5':
  - type: text
    content: But of Zion it will be said, “This one and that one were born in her,”
  - type: text
    content: And the Most High Himself will establish her.
  '6':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will count, when He registers the peoples,'
  - type: text
    content: '“This one was born there.” '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: 'The singers as well as the players of flutes '
  - type: text
    content: will say,
  - type: text
    content: '“All my springs '
  - type: text
    content: and
  - type: text
    content: ' sources of joy are in you [Jerusalem, city of God].”'
