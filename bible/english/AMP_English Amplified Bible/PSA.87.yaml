document_id: PSA.87,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 87
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Privileges of Citizenship in Zion.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of the sons of Korah. A Song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His foundation is on the holy mountain.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' loves the gates of Zion'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: More than all the dwellings of Jacob (Israel).
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Glorious things are spoken of you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O city of God [Jerusalem]. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will mention Rahab (Egypt) and Babylon among those who know Me—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, Philistia and Tyre with Ethiopia (Cush)—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘This one was born there.’ ”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But of Zion it will be said, “This one and that one were born in her,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the Most High Himself will establish her.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will count, when He registers the peoples,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“This one was born there.” '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The singers as well as the players of flutes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“All my springs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sources of joy are in you [Jerusalem, city of God].”'
