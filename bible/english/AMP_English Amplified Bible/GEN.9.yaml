    content: Covenant of the Rainbow
  - type: text
    content: 'And God blessed Noah and his sons and said to them, “Be fruitful and multiply, and fill the earth. '
  '10':
  - type: text
    content: 'and with every living creature that is with you—the birds, the livestock, and the wild animals of the earth along with you, of everything that comes out of the ark—every living creature of the earth. '
  '11':
  - type: text
    content: 'I will establish My covenant with you: Never again shall all flesh be cut off by the water of a flood, nor shall there ever again be a flood to destroy '
  - type: text
    content: and
  - type: text
    content: ' ruin the earth.” '
  '12':
  - type: text
    content: 'And God said, “This is the token (visible symbol, memorial) of the [solemn] covenant which I am making between Me and you and every living creature that is with you, for all future generations; '
  '13':
  - type: text
    content: 'I set My rainbow in the clouds, and it shall be a sign of a covenant between Me and the earth. '
  '14':
  - type: text
    content: 'It shall come about, when I bring clouds over the earth, that the rainbow shall be seen in the clouds, '
  '15':
  - type: text
    content: 'and I will [compassionately] remember My covenant, which is between Me and you and every living creature of all flesh; and never again will the water become a flood to destroy all flesh. '
  '16':
  - type: text
    content: 'When the rainbow is in the clouds and I look at it, I will [solemnly] remember the everlasting covenant between God and every living creature of all flesh that is on the earth.” '
  '17':
  - type: text
    content: And God said to Noah, “This [rainbow] is the sign of the covenant (solemn pledge, binding agreement) which I have established between Me and all living things on the earth.”
  '18':
  - type: text
    content: 'The sons of Noah who came out of the ark were Shem and Ham and Japheth. Ham would become the father of Canaan. '
  '19':
  - type: text
    content: 'These are the three sons of Noah, and from these [men] the whole earth was populated '
  - type: text
    content: and
  - type: text
    content: ' scattered with inhabitants.'
