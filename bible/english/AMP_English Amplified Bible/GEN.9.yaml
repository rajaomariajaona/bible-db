    content: 'Ham, the father of Canaan, saw [by accident] the nakedness of his father, and [to his father’s shame] told his two brothers outside. '
  '23':
  - type: text
    content: 'So Shem and Japheth took a robe and put it on both their shoulders, and walked backwards and covered the nakedness of their father; their faces were turned away so that they did not see their father’s nakedness. '
  '24':
