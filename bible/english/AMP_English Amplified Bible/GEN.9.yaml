document_id: GEN.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Covenant of the Rainbow
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And God blessed Noah and his sons and said to them, “Be fruitful and multiply, and fill the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The fear and the terror of you shall be [instinctive] in every animal of the land and in every bird of the air; and together with everything that moves on the ground, and with all the fish of the sea; they are given into your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Every moving thing that lives shall be food for you; I give you everything, as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I gave
  - type: text
    text: ' you the green plants '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vegetables. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But you shall not eat meat along with its life, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is,
  - type: text
    text: ' its blood. [Lev 7:26; Acts 15:20; 21:25] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For your lifeblood I will most certainly require an accounting; from every animal [that kills a person] I will require it. And from man, from every man’s brother [that is, anyone who murders] I will require the life of man. [Ex 21:28, 29]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Whoever sheds man’s blood [unlawfully],
- type: usfm
  marker: q1
  children:
  - type: text
    text: By man (judicial government) shall his blood be shed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For in the image of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: He made man. [Rom 13:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “As for you, be fruitful and multiply;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Populate the earth abundantly and multiply in it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then God spoke to Noah and to his sons with him, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Now behold, I am establishing My covenant (binding agreement, solemn promise) with you and with your descendants after you '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and with every living creature that is with you—the birds, the livestock, and the wild animals of the earth along with you, of everything that comes out of the ark—every living creature of the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will establish My covenant with you: Never again shall all flesh be cut off by the water of a flood, nor shall there ever again be a flood to destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruin the earth.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And God said, “This is the token (visible symbol, memorial) of the [solemn] covenant which I am making between Me and you and every living creature that is with you, for all future generations; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I set My rainbow in the clouds, and it shall be a sign of a covenant between Me and the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'It shall come about, when I bring clouds over the earth, that the rainbow shall be seen in the clouds, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and I will [compassionately] remember My covenant, which is between Me and you and every living creature of all flesh; and never again will the water become a flood to destroy all flesh. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the rainbow is in the clouds and I look at it, I will [solemnly] remember the everlasting covenant between God and every living creature of all flesh that is on the earth.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And God said to Noah, “This [rainbow] is the sign of the covenant (solemn pledge, binding agreement) which I have established between Me and all living things on the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Noah who came out of the ark were Shem and Ham and Japheth. Ham would become the father of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These are the three sons of Noah, and from these [men] the whole earth was populated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scattered with inhabitants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And Noah began to farm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cultivate the ground and he planted a vineyard. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He drank some of the wine and became drunk, and he was uncovered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lay exposed inside his tent. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ham, the father of Canaan, saw [by accident] the nakedness of his father, and [to his father’s shame] told his two brothers outside. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So Shem and Japheth took a robe and put it on both their shoulders, and walked backwards and covered the nakedness of their father; their faces were turned away so that they did not see their father’s nakedness. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Noah awoke from his wine [induced stupor], he knew what his younger son [Ham] had done to him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cursed be Canaan [the son of Ham];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The words of Noah are prophetic. God later found the disobedience of the Canaanites to be repulsive and replaced them with the descendants of Shem.
    marker-yv: yv-n
  - type: text
    text: A servant of servants
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shall be to his brothers.” [Deut 27:16]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He also said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The God of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jewish people are the descendants of Shem. Through Shem’s lineage came the Messiah and salvation.
    marker-yv: yv-n
  - type: text
    text: Shem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let Canaan be his servant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “May God enlarge [the land of] Japheth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Note that “let” in this verse represents a command, as in “Let there be light” (1:3).
    marker-yv: yv-n
  - type: text
    text: 'let '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The antecedent of the word “him” could be Japheth, but it could also be “God,” thus making Him (the Messiah) dwell in the tents of Shem indicating the incarnation in the Semitic line.
    marker-yv: yv-n
  - type: text
    text: him dwell in the tents of Shem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let Canaan be his servant.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Noah lived three hundred and fifty years after the flood. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So all the days of Noah were nine hundred and fifty years, and he died.
