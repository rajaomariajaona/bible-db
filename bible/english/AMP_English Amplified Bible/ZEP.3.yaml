document_id: ZEP.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Woe to Jerusalem and the Nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe (judgment is coming) to her who is rebellious and defiled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The tyrannical city [Jerusalem]!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'She did not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed the voice [of God];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: She accepted no correction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She did not trust in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [but trusted her own power];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: She did not draw near to her God [but to the pagan gods of Baal or Molech].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Her officials within her are roaring lions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her judges are [as hungry as] the wolves at evening,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They leave nothing for the morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Her prophets are reckless and treacherous men;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her priests have profaned the sanctuary;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have done violence to the law [by pretending their word is God’s word]. [Jer 23:11; Ezek 22:26; Hos 9:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is righteous within her;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will do no injustice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every morning He brings His justice to light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He does not fail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the unjust person knows no shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] have cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed nations [as a warning to Judah];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their corner towers (battlements) are in ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have made their streets desolate
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that no one passes by;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their cities are destroyed
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that there is no man, there is no inhabitant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I said, ‘Most certainly you will [reverently] fear Me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accept correction.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: So Jerusalem’s dwelling will not be cut off
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: In accordance with
  - type: text
    text: ' all that I have appointed concerning her [punishment],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they were eager [even rising early] to make all their deeds corrupt. [Jer 7:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Therefore [you of the godly remnant of Judah, patiently] wait for Me,” declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “[Wait] for the day when I rise up as a witness [against the nations].
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For it is My decision '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' My right to gather the nations,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To assemble kingdoms,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To pour out on them My indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All [the heat of] My burning anger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For [in that day] all the earth shall be consumed
- type: usfm
  marker: q1
  children:
  - type: text
    text: By the fire of My zeal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Then I will give to the peoples [clear and pure speech from] purified lips [which reflect their purified hearts],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That all of them may call on the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: To serve Him shoulder to shoulder (united).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “From beyond the rivers of Ethiopia
- type: usfm
  marker: q1
  children:
  - type: text
    text: My worshipers, [the descendants of] My dispersed ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will bring My offerings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “On that day you [Israel] will feel no shame
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of all your acts
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'By which you have rebelled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sinned against Me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I will remove from among you
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your rejoicing ones who delight in their pride;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will never again behave arrogantly
- type: usfm
  marker: q1
  children:
  - type: text
    text: On My holy mountain [Mount Zion].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Remnant of Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “But I will leave among you
- type: usfm
  marker: q1
  children:
  - type: text
    text: A humble and lowly people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they will take refuge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust confidently in the name of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The remnant of Israel will do no wrong
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor speak lies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will a deceitful tongue
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be found in their mouths;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they will eat and lie down
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With no one to make them tremble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feel afraid.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶Shout for joy, O Daughter of Zion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Shout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in triumph,
  - type: text
    text: ' O Israel!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Rejoice, be in high spirits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory with all your heart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Daughter of Jerusalem [in that day]!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has taken away the judgments against you;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has cleared away your enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The King of Israel, even the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [Himself], is in your midst;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will no longer fear disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'In that day it will be said to Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not be afraid, O Zion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not let your hands fall limp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is in your midst,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A Warrior who saves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will rejoice over you with joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will be quiet in His love [making no mention of your past sins],
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will rejoice over you with shouts of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “I will gather those [Israelites in captivity] who grieve about the appointed feasts—
- type: usfm
  marker: q1
  children:
  - type: text
    text: They came from you, [O Zion];
- type: usfm
  marker: q1
  children:
  - type: text
    text: On whom the reproach [of exile] is a burden.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Behold, at that time I am going to deal
- type: usfm
  marker: q1
  children:
  - type: text
    text: With all your oppressors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will save the lame
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gather the scattered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will turn their shame into praise and renown
- type: usfm
  marker: q1
  children:
  - type: text
    text: In every land [where they have suffered]. [Mic 4:6, 7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “At that time I will bring you in,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, at the time I gather you together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will make you a name and a praise
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among all the peoples of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I restore your fortunes [and freedom] before your eyes,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
