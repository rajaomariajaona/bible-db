document_id: ZEP.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to Jerusalem and the Nations
  - type: text
    content: Woe (judgment is coming) to her who is rebellious and defiled,
  - type: text
    content: The tyrannical city [Jerusalem]!
  '10':
  - type: text
    content: “From beyond the rivers of Ethiopia
  - type: text
    content: My worshipers, [the descendants of] My dispersed ones,
  - type: text
    content: Will bring My offerings.
  '11':
  - type: text
    content: “On that day you [Israel] will feel no shame
  - type: text
    content: Because of all your acts
  - type: text
    content: 'By which you have rebelled '
  - type: text
    content: and
  - type: text
    content: ' sinned against Me;'
  - type: text
    content: Then I will remove from among you
  - type: text
    content: Your rejoicing ones who delight in their pride;
  - type: text
    content: And you will never again behave arrogantly
  - type: text
    content: On My holy mountain [Mount Zion].
  - type: heading
    content: A Remnant of Israel
  '12':
  - type: text
    content: “But I will leave among you
  - type: text
    content: A humble and lowly people,
  - type: text
    content: 'And they will take refuge '
  - type: text
    content: and
  - type: text
    content: ' trust confidently in the name of the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '13':
  - type: text
    content: “The remnant of Israel will do no wrong
  - type: text
    content: Nor speak lies,
  - type: text
    content: Nor will a deceitful tongue
  - type: text
    content: Be found in their mouths;
  - type: text
    content: For they will eat and lie down
  - type: text
    content: 'With no one to make them tremble '
  - type: text
    content: and
  - type: text
    content: ' feel afraid.”'
  '14':
  - type: text
    content: ¶Shout for joy, O Daughter of Zion!
  - type: text
    content: 'Shout '
  - type: text
    content: in triumph,
  - type: text
    content: ' O Israel!'
  - type: text
    content: 'Rejoice, be in high spirits '
  - type: text
    content: and
  - type: text
    content: ' glory with all your heart,'
  - type: text
    content: O Daughter of Jerusalem [in that day]!
  '15':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has taken away the judgments against you;'
  - type: text
    content: He has cleared away your enemies.
  - type: text
    content: The King of Israel, even the L
  - type: heading
    content: ord
  - type: text
    content: ' [Himself], is in your midst;'
  - type: text
    content: You will no longer fear disaster.
  '16':
  - type: text
    content: 'In that day it will be said to Jerusalem:'
  - type: text
    content: “Do not be afraid, O Zion;
  - type: text
    content: Do not let your hands fall limp.
  '17':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' your God is in your midst,'
  - type: text
    content: A Warrior who saves.
  - type: text
    content: He will rejoice over you with joy;
  - type: text
    content: He will be quiet in His love [making no mention of your past sins],
  - type: text
    content: He will rejoice over you with shouts of joy.
  '18':
  - type: text
    content: “I will gather those [Israelites in captivity] who grieve about the appointed feasts—
  - type: text
    content: They came from you, [O Zion];
  - type: text
    content: On whom the reproach [of exile] is a burden.
  '19':
  - type: text
    content: “Behold, at that time I am going to deal
  - type: text
    content: With all your oppressors;
  - type: text
    content: I will save the lame
  - type: text
    content: And gather the scattered,
  - type: text
    content: And I will turn their shame into praise and renown
  - type: text
    content: In every land [where they have suffered]. [Mic 4:6, 7]
  '2':
  - type: text
    content: 'She did not listen '
  - type: text
    content: and
  - type: text
    content: ' heed the voice [of God];'
  - type: text
    content: She accepted no correction.
  - type: text
    content: She did not trust in the L
  - type: heading
    content: ord
  - type: text
    content: ' [but trusted her own power];'
  - type: text
    content: She did not draw near to her God [but to the pagan gods of Baal or Molech].
  '20':
  - type: text
    content: “At that time I will bring you in,
  - type: text
    content: Yes, at the time I gather you together;
  - type: text
    content: For I will make you a name and a praise
  - type: text
    content: Among all the peoples of the earth
  - type: text
    content: When I restore your fortunes [and freedom] before your eyes,”
  - type: text
    content: Says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '3':
  - type: text
    content: Her officials within her are roaring lions;
  - type: text
    content: Her judges are [as hungry as] the wolves at evening,
  - type: text
    content: They leave nothing for the morning.
  '4':
  - type: text
    content: Her prophets are reckless and treacherous men;
  - type: text
    content: Her priests have profaned the sanctuary;
  - type: text
    content: They have done violence to the law [by pretending their word is God’s word]. [Jer 23:11; Ezek 22:26; Hos 9:7]
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is righteous within her;'
  - type: text
    content: He will do no injustice.
  - type: text
    content: Every morning He brings His justice to light;
  - type: text
    content: He does not fail.
  - type: text
    content: But the unjust person knows no shame.
  '6':
  - type: text
    content: “I [the L
  - type: heading
    content: ord
  - type: text
    content: '] have cut off '
  - type: text
    content: and
  - type: text
    content: ' destroyed nations [as a warning to Judah];'
  - type: text
    content: Their corner towers (battlements) are in ruins.
  - type: text
    content: I have made their streets desolate
  - type: text
    content: So that no one passes by;
  - type: text
    content: Their cities are destroyed
  - type: text
    content: So that there is no man, there is no inhabitant.
  '7':
  - type: text
    content: “I said, ‘Most certainly you will [reverently] fear Me;
  - type: text
    content: Accept correction.’
  - type: text
    content: So Jerusalem’s dwelling will not be cut off
  - type: text
    content: In accordance with
  - type: text
    content: ' all that I have appointed concerning her [punishment],'
  - type: text
    content: But they were eager [even rising early] to make all their deeds corrupt. [Jer 7:13]
  '8':
  - type: text
    content: ¶“Therefore [you of the godly remnant of Judah, patiently] wait for Me,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “[Wait] for the day when I rise up as a witness [against the nations].
  - type: text
    content: 'For it is My decision '
  - type: text
    content: and
  - type: text
    content: ' My right to gather the nations,'
  - type: text
    content: To assemble kingdoms,
  - type: text
    content: To pour out on them My indignation,
  - type: text
    content: All [the heat of] My burning anger;
  - type: text
    content: For [in that day] all the earth shall be consumed
  - type: text
    content: By the fire of My zeal.
  '9':
  - type: text
    content: “Then I will give to the peoples [clear and pure speech from] purified lips [which reflect their purified hearts],
  - type: text
    content: That all of them may call on the name of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: To serve Him shoulder to shoulder (united).
