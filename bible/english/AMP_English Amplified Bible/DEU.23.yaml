  - type: text
    content: ', '
  '4':
  - type: text
    content: 'because they did not meet you with bread (food) and water on the road as you came out of Egypt, and because they hired [to act] against you Balaam the son of Beor from Pethor of Mesopotamia, to curse you. '
  '5':
  - type: text
    content: Nevertheless, the L
  - type: heading
