document_id: DEU.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Persons Excluded from the Assembly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“He who has been castrated by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: having his testicles
    - type: text
      text: ' crushed or his male organ cut off shall not enter the congregation of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“If there is any man among you who is [ceremonially] unclean because of nocturnal emission, then he must go outside the camp; he shall not come back to the camp. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But when evening comes, he shall bathe in water, and at sundown he may return to the camp.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“You shall also have a place outside the camp to which you may go, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and you shall have a spade among your tools, and when you [prepare to] sit down outside [to relieve yourself], you shall dig '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a hole
    - type: text
      text: ' with it and shall turn and cover up your waste. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Since the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God walks in the midst of your camp to rescue you and to defeat your enemies before you, therefore your camp must be holy (undefiled); and He must not see anything indecent among you or He will turn away from you.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“You shall not hand over to his master a slave who has escaped from his master to you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He shall live among you, in the place he chooses in one of your cities where it pleases him; you shall not mistreat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' oppress him.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“There shall be no cult prostitute among the daughters of Israel, nor shall there be a cult prostitute (a sodomite) among the sons of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: You shall not bring the wages of a prostitute or the price of a dog [that is, a male prostitute] into the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as payment
    - type: text
      text: ' for any vow, for both of these [the gift and the giver] are utterly repulsive to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“You shall not charge interest to your fellow Israelite—interest on money, food or anything that may be loaned for interest. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'A person of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, one who was born from incest, an adulterous relationship, or a mixed marriage (a Jew or a Jewess and a Gentile).
      marker-yv: yv-n
    - type: text
      text: illegitimate birth shall not enter the assembly of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; none of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: descendants,
    - type: text
      text: ' even to the tenth generation. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You may charge interest to a foreigner, but to your fellow Israelite you shall not charge interest, so that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God may bless you in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: all to which your hand is put
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: all that you undertake in the land which you are about to enter to possess.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“When you make a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The abuse of vows was a practice for which Jesus sternly rebuked the Pharisees. There were at least two kinds of abuse for which they were rightly held responsible: 1) their approval of vows which should have been overruled and rejected because they violated even more important commandments (see Matt 15:3-6); and 2) inappropriate or hair-splitting criteria for determining the validity of a vow (Matt 23:16-22).'
      marker-yv: yv-n
    - type: text
      text: vow to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, you shall not delay to pay it, for He will most certainly require it of you, and a delay would cause you to sin. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But if you refrain from making a vow, that would not be [counted as] sin in you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: You shall be careful to perform that [vow] which passes your lips, just as you have made a voluntary vow to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, just as you have promised with your own words (mouth).'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“When you enter your neighbor’s vineyard, you may eat your fill of grapes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: according to your soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: as many as you please, but you shall not put any in your basket [to take with you].
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“When you come into the standing grain of your neighbor, you may '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When Jesus and His disciples picked some grain in this manner, they were not charged with theft by the Pharisees, but of doing work on the Sabbath, which was clearly not the case (Matt 12:1-6).
      marker-yv: yv-n
    - type: text
      text: pluck the ears of grain with your hand, but you shall not wield a sickle in your neighbor’s standing grain [to harvest it].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'An Ammonite or '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ruth, one of the ancestors of Jesus, was a Moabitess, but she essentially became an Israelite (Ruth 1:16) and married an Israelite (Boaz). Moreover, the rabbis taught that Deut 23:3 applied only to Ammonite and Moabite men. This teaching was summarized by what became a common saying: “An Ammonite [is forbidden], but not an Ammonitess; a Moabite, but not a Moabitess!” (as quoted from the Talmud).'
      marker-yv: yv-n
    - type: text
      text: Moabite shall not enter the assembly of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; none of their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: descendants,
    - type: text
      text: ' even to the tenth generation, shall ever enter the assembly of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'because they did not meet you with bread (food) and water on the road as you came out of Egypt, and because they hired [to act] against you Balaam the son of Beor from Pethor of Mesopotamia, to curse you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nevertheless, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God was not willing to listen to Balaam, but the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God turned the curse into a blessing for you because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has loved you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You shall never seek their peace nor their prosperity all your days.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“You shall not detest an Edomite, for he is your brother [Esau’s descendant]. You shall not detest an Egyptian, because you were a stranger (resident alien, foreigner) in his land. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Their children of the third generation who are born to them may enter the assembly of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “When you go out as an army [to fight] against your enemies, you shall keep yourselves from every evil [thing].
