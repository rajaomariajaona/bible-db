  '21':
  - type: text
    content: '“When you make a '
  - type: note
    content: 'The abuse of vows was a practice for which Jesus sternly rebuked the Pharisees. There were at least two kinds of abuse for which they were rightly held responsible: 1) their approval of vows which should have been overruled and rejected because they violated even more important commandments (see Matt 15:3-6); and 2) inappropriate or hair-splitting criteria for determining the validity of a vow (Matt 23:16-22).'
  - type: text
    content: vow to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, you shall not delay to pay it, for He will most certainly require it of you, and a delay would cause you to sin. '
  '22':
  - type: text
    content: 'But if you refrain from making a vow, that would not be [counted as] sin in you. '
  '23':
  - type: text
    content: You shall be careful to perform that [vow] which passes your lips, just as you have made a voluntary vow to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, just as you have promised with your own words (mouth).'
  '24':
  - type: text
    content: '“When you enter your neighbor’s vineyard, you may eat your fill of grapes, '
  - type: note
    content: Lit according to your soul.
  - type: text
    content: as many as you please, but you shall not put any in your basket [to take with you].
  '25':
  - type: text
    content: '“When you come into the standing grain of your neighbor, you may '
  - type: note
    content: When Jesus and His disciples picked some grain in this manner, they were not charged with theft by the Pharisees, but of doing work on the Sabbath, which was clearly not the case (Matt 12:1-6).
  - type: text
    content: pluck the ears of grain with your hand, but you shall not wield a sickle in your neighbor’s standing grain [to harvest it].
  '3':
  - type: text
    content: 'An Ammonite or '
  - type: note
    content: 'Ruth, one of the ancestors of Jesus, was a Moabitess, but she essentially became an Israelite (Ruth 1:16) and married an Israelite (Boaz). Moreover, the rabbis taught that Deut 23:3 applied only to Ammonite and Moabite men. This teaching was summarized by what became a common saying: “An Ammonite [is forbidden], but not an Ammonitess; a Moabite, but not a Moabitess!” (as quoted from the Talmud).'
  - type: text
