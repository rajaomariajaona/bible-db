  - type: heading
    content: ord
  - type: text
    content: ' your God has loved you. '
  '6':
  - type: text
    content: You shall never seek their peace nor their prosperity all your days.
  '7':
  - type: text
    content: '“You shall not detest an Edomite, for he is your brother [Esau’s descendant]. You shall not detest an Egyptian, because you were a stranger (resident alien, foreigner) in his land. '
  '8':
