  '10':
  - type: text
    content: '“If there is any man among you who is [ceremonially] unclean because of nocturnal emission, then he must go outside the camp; he shall not come back to the camp. '
  '11':
  - type: text
    content: But when evening comes, he shall bathe in water, and at sundown he may return to the camp.
  '12':
  - type: text
    content: '“You shall also have a place outside the camp to which you may go, '
  '13':
  - type: text
    content: 'and you shall have a spade among your tools, and when you [prepare to] sit down outside [to relieve yourself], you shall dig '
  - type: text
    content: a hole
  - type: text
    content: ' with it and shall turn and cover up your waste. '
  '14':
  - type: text
    content: Since the L
  - type: heading
    content: ord
  - type: text
    content: ' your God walks in the midst of your camp to rescue you and to defeat your enemies before you, therefore your camp must be holy (undefiled); and He must not see anything indecent among you or He will turn away from you.'
  '15':
  - type: text
    content: '“You shall not hand over to his master a slave who has escaped from his master to you. '
  '16':
  - type: text
    content: 'He shall live among you, in the place he chooses in one of your cities where it pleases him; you shall not mistreat '
  - type: text
    content: or
  - type: text
    content: ' oppress him.'
  '17':
  - type: text
    content: '“There shall be no cult prostitute among the daughters of Israel, nor shall there be a cult prostitute (a sodomite) among the sons of Israel. '
  '18':
  - type: text
    content: You shall not bring the wages of a prostitute or the price of a dog [that is, a male prostitute] into the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God '
  - type: text
    content: as payment
  - type: text
    content: ' for any vow, for both of these [the gift and the giver] are utterly repulsive to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: '“You shall not charge interest to your fellow Israelite—interest on money, food or anything that may be loaned for interest. '
  '2':
  - type: text
    content: 'A person of '
