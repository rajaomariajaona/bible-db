document_id: JOB.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Tells of Earth’s Treasures
  - type: text
    content: “Surely there is a mine for silver,
  - type: text
    content: And a place where they refine gold.
  '10':
  - type: text
    content: '“He cuts out channels '
  - type: text
    content: and
  - type: text
    content: ' passages among the rocks;'
  - type: text
    content: And his eye sees every precious thing.
  '11':
  - type: text
    content: “Man dams up the streams from flowing [so that they do not trickle into the mine],
  - type: text
    content: And what is hidden he brings out to the light.
  - type: heading
    content: The Search for Wisdom Is Harder
  '12':
  - type: text
    content: ¶“But where can wisdom be found?
  - type: text
    content: And where is the place of understanding?
  '13':
  - type: text
    content: “Man does not know the value of it;
  - type: text
    content: Nor is it found in the land of the living.
  '14':
  - type: text
    content: “The deep says, ‘It is not in me’;
  - type: text
    content: And the sea says, ‘It is not with me.’
  '15':
  - type: text
    content: “It cannot be obtained for pure gold,
  - type: text
    content: Nor can silver be weighed as its price.
  '16':
  - type: text
    content: “It cannot be valued in [terms of] the gold of Ophir,
  - type: text
    content: 'In the precious onyx '
  - type: text
    content: or
  - type: text
    content: ' beryl, or the sapphire.'
  '17':
  - type: text
    content: “Gold and glass cannot equal wisdom,
  - type: text
    content: Nor can it be exchanged for articles of fine gold.
  '18':
  - type: text
    content: “No mention of coral and crystal can be made;
  - type: text
    content: 'For the possession of wisdom is even above [that of] rubies '
  - type: text
    content: or
  - type: text
    content: ' pearls.'
  '19':
  - type: text
    content: “The topaz of Ethiopia cannot compare with it,
  - type: text
    content: Nor can it be valued in pure gold.
  '2':
  - type: text
    content: “Iron is taken out of the earth,
  - type: text
    content: And copper is smelted from the stone ore.
  '20':
  - type: text
    content: “From where then does wisdom come?
  - type: text
    content: And where is the place of understanding?
  '21':
  - type: text
    content: “It is hidden from the eyes of all the living
  - type: text
    content: And concealed from the birds of the heavens.
  '22':
  - type: text
    content: “Abaddon (the place of destruction) and Death say,
  - type: text
    content: ‘We have [only] heard a report of it with our ears.’
  '23':
  - type: text
    content: ¶“God understands the way [to wisdom]
  - type: text
    content: And He knows its place [for wisdom is with God alone].
  '24':
  - type: text
    content: “For He looks to the ends of the earth
  - type: text
    content: And sees everything under the heavens.
  '25':
  - type: text
    content: '“When He gave weight '
  - type: text
    content: and
  - type: text
    content: ' pressure to the wind'
  - type: text
    content: And allotted the waters by measure,
  '26':
  - type: text
    content: When He made a limit for the rain
  - type: text
    content: And a way for the thunderbolt,
  '27':
  - type: text
    content: Then He saw wisdom and declared it;
  - type: text
    content: He established it and searched it out.
  '28':
  - type: text
    content: '“But to man He said, ‘Behold, the reverential '
  - type: text
    content: and
  - type: text
    content: ' worshipful fear of the Lord—that is wisdom;'
  - type: text
    content: And to depart from evil is understanding.’ ”
  '3':
  - type: text
    content: “
  - type: text
    content: Man
  - type: text
    content: ' puts an end to darkness [by bringing in a light],'
  - type: text
    content: And to the farthest bounds he searches out
  - type: text
    content: The rock buried in gloom and deep shadow.
  '4':
  - type: text
    content: “He breaks open (mine) shafts far away from where people live,
  - type: text
    content: '[In places] forgotten by the [human] foot;'
  - type: text
    content: They dangle [in the mines] and hang away from men.
  '5':
  - type: text
    content: “[As for] the earth, out of it comes food,
  - type: text
    content: But underneath [its surface, down deep] it is turned over as fire.
  '6':
  - type: text
    content: “Its stones are the bed of sapphires;
  - type: text
    content: It holds dust of gold.
  '7':
  - type: text
    content: “The path [deep within] no bird of prey knows,
  - type: text
    content: And the falcon’s eye has not caught sight of it.
  '8':
  - type: text
    content: “The proud beasts [and their young] have not walked on it,
  - type: text
    content: 'Nor has the '
  - type: text
    content: fierce
  - type: text
    content: ' lion passed over it.'
  '9':
  - type: text
    content: “Man puts his hand on [and tears apart] the flinty rock;
  - type: text
    content: He overturns the mountains at the base [looking for treasure].
