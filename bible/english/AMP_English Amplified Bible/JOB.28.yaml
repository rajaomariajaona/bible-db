document_id: JOB.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Tells of Earth’s Treasures
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Surely there is a mine for silver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a place where they refine gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Iron is taken out of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And copper is smelted from the stone ore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Man
  - type: text
    text: ' puts an end to darkness [by bringing in a light],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the farthest bounds he searches out
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rock buried in gloom and deep shadow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “He breaks open (mine) shafts far away from where people live,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[In places] forgotten by the [human] foot;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They dangle [in the mines] and hang away from men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “[As for] the earth, out of it comes food,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But underneath [its surface, down deep] it is turned over as fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Its stones are the bed of sapphires;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It holds dust of gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “The path [deep within] no bird of prey knows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the falcon’s eye has not caught sight of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “The proud beasts [and their young] have not walked on it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor has the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fierce
  - type: text
    text: ' lion passed over it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Man puts his hand on [and tears apart] the flinty rock;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He overturns the mountains at the base [looking for treasure].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“He cuts out channels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' passages among the rocks;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his eye sees every precious thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Man dams up the streams from flowing [so that they do not trickle into the mine],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what is hidden he brings out to the light.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Search for Wisdom Is Harder
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“But where can wisdom be found?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where is the place of understanding?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Man does not know the value of it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor is it found in the land of the living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “The deep says, ‘It is not in me’;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the sea says, ‘It is not with me.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “It cannot be obtained for pure gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor can silver be weighed as its price.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “It cannot be valued in [terms of] the gold of Ophir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the precious onyx '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' beryl, or the sapphire.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Gold and glass cannot equal wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor can it be exchanged for articles of fine gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “No mention of coral and crystal can be made;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the possession of wisdom is even above [that of] rubies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' pearls.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “The topaz of Ethiopia cannot compare with it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor can it be valued in pure gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “From where then does wisdom come?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where is the place of understanding?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “It is hidden from the eyes of all the living
- type: usfm
  marker: q1
  children:
  - type: text
    text: And concealed from the birds of the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Abaddon (the place of destruction) and Death say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘We have [only] heard a report of it with our ears.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶“God understands the way [to wisdom]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He knows its place [for wisdom is with God alone].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “For He looks to the ends of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sees everything under the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“When He gave weight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pressure to the wind'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And allotted the waters by measure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When He made a limit for the rain
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a way for the thunderbolt,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then He saw wisdom and declared it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He established it and searched it out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“But to man He said, ‘Behold, the reverential '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshipful fear of the Lord—that is wisdom;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to depart from evil is understanding.’ ”
