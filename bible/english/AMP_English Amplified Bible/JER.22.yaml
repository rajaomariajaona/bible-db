document_id: JER.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning of Jerusalem’s Fall
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Go down to the house of the king of Judah and speak this word there: '
  '10':
  - type: text
    content: ¶Do not weep for the dead or mourn for him;
  - type: text
    content: But weep bitterly for the one who goes away [into exile],
  - type: text
    content: For he will never return
  - type: text
    content: And see his native country [again].
  '11':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' in regard to Shallum (Jehoahaz) the [third] son of Josiah, king of Judah, who reigned instead of Josiah his father and who went from this place, “Shallum will not return here anymore; '
  '12':
  - type: text
    content: he will die in the place where they led him captive and not see this land again.
  - type: heading
    content: Messages about the Kings
  '13':
  - type: text
    content: ¶“Woe (judgment is coming) to him who builds his house by [acts of] unrighteousness
  - type: text
    content: And his upper chambers by injustice,
  - type: text
    content: Who uses his neighbor’s service without pay
  - type: text
    content: And does not give him wages [for his work],
  '14':
  - type: text
    content: Who says, ‘I will build myself a spacious house
  - type: text
    content: With large upper rooms,
  - type: text
    content: And cut out its [wide] windows,
  - type: text
    content: And panel it with cedar and paint it vermilion.’
  '15':
  - type: text
    content: “Do you think that you become a king because you have much more cedar [in your palace than Solomon]?
  - type: text
    content: Did not your father [Josiah], as he ate and drank,
  - type: text
    content: Do just and righteous acts [being upright and in right standing with God]?
  - type: text
    content: Then all was well with him.
  '16':
  - type: text
    content: “He defended the cause of the afflicted and needy;
  - type: text
    content: Then all was well.
  - type: text
    content: Is that not what it means to know Me?”
  - type: text
    content: Says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '17':
  - type: text
    content: “But your eyes and your heart
  - type: text
    content: Are only intent on your own dishonest gain,
  - type: text
    content: On shedding innocent blood,
  - type: text
    content: 'On oppression and extortion '
  - type: text
    content: and
  - type: text
    content: ' violence.”'
  '18':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' in regard to '
  - type: note
    content: Originally named Eliakim, he was renamed Jehoiakim by Pharaoh Neco of Egypt and placed on the throne of Judah after Neco deposed and imprisoned Jehoiakim’s younger brother, King Jehoahaz (also called Shallum), because Jehoahaz was allied with Babylon instead of Egypt.
  - type: text
    content: Jehoiakim the [second] son of Josiah, king of Judah,
  - type: text
    content: '“The relatives will not lament (mourn over with expressions of grief) for him:'
  - type: text
    content: ‘Alas, my brother!’ or, ‘Alas, sister,’ [how great our loss]!
  - type: text
    content: 'The subjects will not lament for him:'
  - type: text
    content: ‘Alas, master!’ or ‘Alas, majesty [how great was his glory]!’
  '19':
  - type: text
    content: “
  - type: note
    content: Jehoiakim was killed during Babylon’s second attack. His body was desecrated and thrown out as food for scavengers.
  - type: text
    content: He shall be buried with the burial of a donkey—
  - type: text
    content: Dragged off and thrown out beyond the gates of Jerusalem.
  '2':
  - type: text
    content: ‘Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', O king of Judah, you who sit on the throne of David—you and your servants and your people who enter by these gates. '
  '20':
  - type: text
    content: “Go up [north] to Lebanon and cry out,
  - type: text
    content: And raise your voice in [the hills of] Bashan [across the Jordan];
  - type: text
    content: 'Cry out also from '
  - type: note
    content: A range of mountains southeast of Palestine.
  - type: text
    content: Abarim,
  - type: text
    content: For all your lovers (allies) have been destroyed. [Jer 27:6, 7]
  '21':
  - type: text
    content: “I spoke to you in your [times of] prosperity,
  - type: text
    content: But you said, ‘I will not listen!’
  - type: text
    content: 'This has been your attitude '
  - type: text
    content: and
  - type: text
    content: ' practice from your youth;'
  - type: text
    content: You have not obeyed My voice.
  '22':
  - type: text
    content: “The wind [of adversity] will carry away all your shepherds (rulers, statesmen),
  - type: text
    content: And your lovers (allies) will go into exile.
  - type: text
    content: 'Surely then you will be ashamed and humiliated '
  - type: text
    content: and
  - type: text
    content: ' disgraced'
  - type: text
    content: Because of all your wickedness.
  '23':
  - type: text
    content: “O inhabitant of [Jerusalem, whose palaces are made from the cedars of] Lebanon,
  - type: text
    content: You who nest in the cedars,
  - type: text
    content: 'How you will groan '
  - type: text
    content: and
  - type: text
    content: ' how miserable you will be when pains come on you,'
  - type: text
    content: Pain like a woman in childbirth! [1 Kin 7:2]
  '24':
  - type: text
    content: “As I live,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “though '
  - type: note
    content: Also known as Jeconiah and Jehoiachin.
  - type: text
    content: 'Coniah the son of Jehoiakim king of Judah were the signet [ring] on My right hand, yet would I pull you (Coniah) off. '
  '25':
  - type: text
    content: 'And I will place you in the hand of those who seek your life and in the hand of those whom you fear, even into the hand of Nebuchadnezzar king of Babylon and into the hand of the '
  - type: note
    content: The ruling tribe of Babylonia whose capital city was Babylon.
  - type: text
    content: 'Chaldeans. '
  '26':
  - type: text
    content: 'I will hurl you and the mother who gave you birth into another country where you were not born, and there you will die. '
  '27':
  - type: text
    content: But as for the land to which they long to return, they will not return to it.
  '28':
  - type: text
    content: “Is this man [King] Coniah a despised, broken jar?
  - type: text
    content: Is he a vessel in which no one takes pleasure?
  - type: text
    content: Why are he and his [royal] descendants hurled out
  - type: text
    content: 'And cast into a land which they do not know '
  - type: text
    content: or
  - type: text
    content: ' understand?'
  '29':
  - type: text
    content: “O land, land, land,
  - type: text
    content: Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: '!'
  '3':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Execute justice and righteousness, and rescue the one who has been robbed from the hand of his oppressor. And do no wrong; do no violence to the stranger, the fatherless, or the widow, nor shed innocent blood in this place. '
  '30':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: ‘Write this man [Coniah] down as childless,
  - type: text
    content: A man who will not prosper (succeed) in his lifetime;
  - type: text
    content: For not one of his descendants will succeed
  - type: text
    content: In sitting on the throne of David
  - type: text
    content: Or ruling again in Judah.’ ”
  '4':
  - type: text
    content: 'For if you will indeed obey this word, then kings will enter through the gates of this palace, sitting in David’s place on his throne, riding in chariots and on horses, '
  - type: text
    content: even the king
  - type: text
    content: ' himself and his servants and his people. '
  '5':
  - type: text
    content: 'But if you will not hear '
  - type: text
    content: and
  - type: text
    content: ' obey these words, I swear [an oath] by Myself,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “that this house will become a desolation.” ’ ” '
  '6':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' in regard to the house of the king of Judah:'
  - type: text
    content: “You are [as valuable] to Me as [the green pastures of] Gilead [east of the Jordan]
  - type: text
    content: Or as the [plentiful] summit of Lebanon [west of the Jordan],
  - type: text
    content: Yet most certainly [if you will not listen to Me] I will make you a wilderness,
  - type: text
    content: And uninhabited cities.
  '7':
  - type: text
    content: '“For I will prepare '
  - type: text
    content: and
  - type: text
    content: ' appoint destroyers [to execute My judgments] against you,'
  - type: text
    content: Each with his weapons;
  - type: text
    content: And they will cut down your [palaces built of] choicest cedars
  - type: text
    content: And throw them in the fire.
  '8':
  - type: text
    content: “Many nations will pass by this city; and each man will say to another, ‘Why has the L
  - type: heading
    content: ord
  - type: text
    content: ' done this to this great city?’ '
  '9':
  - type: text
    content: 'Then they will answer, ‘Because the people ignored '
  - type: text
    content: and
  - type: text
    content: ' abandoned the [solemn] covenant with the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God and worshiped other gods and served them.’ ”'
