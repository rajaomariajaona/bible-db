document_id: JER.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Warning of Jerusalem’s Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Go down to the house of the king of Judah and speak this word there: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ‘Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O king of Judah, you who sit on the throne of David—you and your servants and your people who enter by these gates. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Execute justice and righteousness, and rescue the one who has been robbed from the hand of his oppressor. And do no wrong; do no violence to the stranger, the fatherless, or the widow, nor shed innocent blood in this place. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For if you will indeed obey this word, then kings will enter through the gates of this palace, sitting in David’s place on his throne, riding in chariots and on horses, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even the king
  - type: text
    text: ' himself and his servants and his people. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if you will not hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey these words, I swear [an oath] by Myself,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “that this house will become a desolation.” ’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in regard to the house of the king of Judah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are [as valuable] to Me as [the green pastures of] Gilead [east of the Jordan]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or as the [plentiful] summit of Lebanon [west of the Jordan],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet most certainly [if you will not listen to Me] I will make you a wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And uninhabited cities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“For I will prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appoint destroyers [to execute My judgments] against you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each with his weapons;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will cut down your [palaces built of] choicest cedars
- type: usfm
  marker: q1
  children:
  - type: text
    text: And throw them in the fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Many nations will pass by this city; and each man will say to another, ‘Why has the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' done this to this great city?’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then they will answer, ‘Because the people ignored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abandoned the [solemn] covenant with the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God and worshiped other gods and served them.’ ”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Do not weep for the dead or mourn for him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But weep bitterly for the one who goes away [into exile],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he will never return
- type: usfm
  marker: q1
  children:
  - type: text
    text: And see his native country [again].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in regard to Shallum (Jehoahaz) the [third] son of Josiah, king of Judah, who reigned instead of Josiah his father and who went from this place, “Shallum will not return here anymore; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: he will die in the place where they led him captive and not see this land again.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Messages about the Kings
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“Woe (judgment is coming) to him who builds his house by [acts of] unrighteousness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his upper chambers by injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who uses his neighbor’s service without pay
- type: usfm
  marker: q1
  children:
  - type: text
    text: And does not give him wages [for his work],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Who says, ‘I will build myself a spacious house
- type: usfm
  marker: q1
  children:
  - type: text
    text: With large upper rooms,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cut out its [wide] windows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And panel it with cedar and paint it vermilion.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Do you think that you become a king because you have much more cedar [in your palace than Solomon]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Did not your father [Josiah], as he ate and drank,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do just and righteous acts [being upright and in right standing with God]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then all was well with him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “He defended the cause of the afflicted and needy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then all was well.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is that not what it means to know Me?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “But your eyes and your heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are only intent on your own dishonest gain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On shedding innocent blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On oppression and extortion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violence.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in regard to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Originally named Eliakim, he was renamed Jehoiakim by Pharaoh Neco of Egypt and placed on the throne of Judah after Neco deposed and imprisoned Jehoiakim’s younger brother, King Jehoahaz (also called Shallum), because Jehoahaz was allied with Babylon instead of Egypt.
    marker-yv: yv-n
  - type: text
    text: Jehoiakim the [second] son of Josiah, king of Judah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The relatives will not lament (mourn over with expressions of grief) for him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Alas, my brother!’ or, ‘Alas, sister,’ [how great our loss]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The subjects will not lament for him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Alas, master!’ or ‘Alas, majesty [how great was his glory]!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jehoiakim was killed during Babylon’s second attack. His body was desecrated and thrown out as food for scavengers.
    marker-yv: yv-n
  - type: text
    text: He shall be buried with the burial of a donkey—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dragged off and thrown out beyond the gates of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Go up [north] to Lebanon and cry out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And raise your voice in [the hills of] Bashan [across the Jordan];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Cry out also from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A range of mountains southeast of Palestine.
    marker-yv: yv-n
  - type: text
    text: Abarim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For all your lovers (allies) have been destroyed. [Jer 27:6, 7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “I spoke to you in your [times of] prosperity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you said, ‘I will not listen!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This has been your attitude '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' practice from your youth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have not obeyed My voice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “The wind [of adversity] will carry away all your shepherds (rulers, statesmen),
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your lovers (allies) will go into exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Surely then you will be ashamed and humiliated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgraced'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of all your wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “O inhabitant of [Jerusalem, whose palaces are made from the cedars of] Lebanon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who nest in the cedars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How you will groan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' how miserable you will be when pains come on you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pain like a woman in childbirth! [1 Kin 7:2]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “As I live,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “though '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Also known as Jeconiah and Jehoiachin.
    marker-yv: yv-n
  - type: text
    text: 'Coniah the son of Jehoiakim king of Judah were the signet [ring] on My right hand, yet would I pull you (Coniah) off. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And I will place you in the hand of those who seek your life and in the hand of those whom you fear, even into the hand of Nebuchadnezzar king of Babylon and into the hand of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ruling tribe of Babylonia whose capital city was Babylon.
    marker-yv: yv-n
  - type: text
    text: 'Chaldeans. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I will hurl you and the mother who gave you birth into another country where you were not born, and there you will die. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But as for the land to which they long to return, they will not return to it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Is this man [King] Coniah a despised, broken jar?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is he a vessel in which no one takes pleasure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why are he and his [royal] descendants hurled out
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And cast into a land which they do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' understand?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “O land, land, land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Write this man [Coniah] down as childless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A man who will not prosper (succeed) in his lifetime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For not one of his descendants will succeed
- type: usfm
  marker: q1
  children:
  - type: text
    text: In sitting on the throne of David
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or ruling again in Judah.’ ”
