document_id: 2CH.36,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoahaz, Jehoiakim, then Jehoiachin Rule
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of the land took Joahaz the son of Josiah, and made him king in Jerusalem in place of his father. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now at the turn of the year [in the spring], King Nebuchadnezzar sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and had him brought to Babylon with the valuable articles of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and made his brother Zedekiah king over Judah and Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zedekiah Rules in Judah
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king, and he reigned for eleven years in Jerusalem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God; he did not humble himself before Jeremiah the prophet, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who spoke
    - type: text
      text: ' for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also rebelled against King Nebuchadnezzar who had made him swear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allegiance
    - type: text
      text: ' by God. He stiffened his neck and hardened his heart against turning to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, all the officials of the priests and the people were very unfaithful, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: following
    - type: text
      text: ' all the repulsive acts of the [pagan] nations; and they defiled the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He had sanctified in Jerusalem.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of their fathers, sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to them again and again by His messengers, because He had compassion on His people and on His dwelling place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they kept mocking the messengers of God and despising His words and scoffing at His prophets until the wrath of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' arose against His people, until there was no remedy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' healing. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore He brought the king of the Chaldeans against them, who killed their young men with the sword in the house of their sanctuary, and had no compassion on young man or virgin, old man or infirm; He gave them all into his hand. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And as for all the articles of the house of God, great and small, and the treasures of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the treasures of the king and of his officials, he brought them all to Babylon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they burned the house of God and tore down the wall of Jerusalem, and burned all its fortified buildings with fire, and destroyed all its valuable articles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joahaz was twenty-three years old when he became king, and he reigned [only] three months in Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He deported to Babylon those who had escaped from the sword; and they were servants to him and to his sons until the kingdom of Persia was established there, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to fulfill the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by the mouth of Jeremiah, until the land had restored its Sabbaths; for as long as the land lay desolate it kept Sabbath until seventy years were complete. [Lev 25:4; 26:43; Jer 25:11; 29:10]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cyrus Permits Return
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now in the first year of Cyrus king of Persia—in order to fulfill the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by the mouth of Jeremiah—the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' stirred up the spirit of Cyrus king of Persia, so that he sent a proclamation throughout his kingdom, and also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: put it
    - type: text
      text: ' in writing, saying, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says Cyrus king of Persia: ‘The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of heaven, has given me all the kingdoms of the earth, and He has appointed me to build Him a house in Jerusalem, which is in Judah. Whoever there is among you of all His people, may the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God be with him, and let him go up [to Jerusalem]!’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king of Egypt deposed him at Jerusalem, and imposed a fine on the land of a hundred talents of silver and one talent of gold. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Egypt made Eliakim, the brother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Joahaz,
    - type: text
      text: ' king over Judah and Jerusalem, and changed his name to Jehoiakim. But Neco took Joahaz his brother, and brought him to Egypt.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoiakim was twenty-five years old when he became king, and he reigned for eleven years in Jerusalem; and he did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuchadnezzar king of Babylon came up against him and bound him with bronze [chains] to take him to Babylon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nebuchadnezzar also brought some of the articles of the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Babylon and put them in his temple there. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of the acts of Jehoiakim and the repulsive acts which he committed, and what was found against him, behold, they are written in the Book of the Kings of Israel and Judah. And his son Jehoiachin became king in his place.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoiachin was eight[teen] years old when he became king, and he reigned for three months and ten days in Jerusalem, and he did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [2 Kin 24:8]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Captivity in Babylon Begun
    marker-yv: yv-h
