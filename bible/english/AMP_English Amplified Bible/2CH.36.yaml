document_id: 2CH.36,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoahaz, Jehoiakim, then Jehoiachin Rule
  - type: text
    content: 'Then the people of the land took Joahaz the son of Josiah, and made him king in Jerusalem in place of his father. '
  '10':
  - type: text
    content: 'Now at the turn of the year [in the spring], King Nebuchadnezzar sent '
  - type: text
    content: word
  - type: text
    content: ' and had him brought to Babylon with the valuable articles of the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and made his brother Zedekiah king over Judah and Jerusalem.'
  - type: heading
    content: Zedekiah Rules in Judah
  '11':
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned for eleven years in Jerusalem. '
  '12':
  - type: text
    content: He did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' his God; he did not humble himself before Jeremiah the prophet, '
  - type: text
    content: who spoke
  - type: text
    content: ' for the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'He also rebelled against King Nebuchadnezzar who had made him swear '
  - type: text
    content: allegiance
  - type: text
    content: ' by God. He stiffened his neck and hardened his heart against turning to the L'
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel. '
  '14':
  - type: text
    content: 'Also, all the officials of the priests and the people were very unfaithful, '
  - type: text
    content: following
  - type: text
    content: ' all the repulsive acts of the [pagan] nations; and they defiled the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' which He had sanctified in Jerusalem.'
  '15':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers, sent '
  - type: text
    content: word
  - type: text
    content: ' to them again and again by His messengers, because He had compassion on His people and on His dwelling place. '
  '16':
  - type: text
    content: But they kept mocking the messengers of God and despising His words and scoffing at His prophets until the wrath of the L
  - type: heading
    content: ord
  - type: text
    content: ' arose against His people, until there was no remedy '
  - type: text
    content: or
  - type: text
    content: ' healing. '
  '17':
  - type: text
    content: 'Therefore He brought the king of the Chaldeans against them, who killed their young men with the sword in the house of their sanctuary, and had no compassion on young man or virgin, old man or infirm; He gave them all into his hand. '
  '18':
  - type: text
    content: And as for all the articles of the house of God, great and small, and the treasures of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', and the treasures of the king and of his officials, he brought them all to Babylon. '
  '19':
  - type: text
    content: 'Then they burned the house of God and tore down the wall of Jerusalem, and burned all its fortified buildings with fire, and destroyed all its valuable articles. '
  '2':
  - type: text
    content: 'Joahaz was twenty-three years old when he became king, and he reigned [only] three months in Jerusalem. '
  '20':
  - type: text
    content: 'He deported to Babylon those who had escaped from the sword; and they were servants to him and to his sons until the kingdom of Persia was established there, '
  '21':
  - type: text
    content: to fulfill the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' by the mouth of Jeremiah, until the land had restored its Sabbaths; for as long as the land lay desolate it kept Sabbath until seventy years were complete. [Lev 25:4; 26:43; Jer 25:11; 29:10]'
  - type: heading
    content: Cyrus Permits Return
  '22':
  - type: text
    content: Now in the first year of Cyrus king of Persia—in order to fulfill the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' by the mouth of Jeremiah—the L'
  - type: heading
    content: ord
  - type: text
    content: ' stirred up the spirit of Cyrus king of Persia, so that he sent a proclamation throughout his kingdom, and also '
  - type: text
    content: put it
  - type: text
    content: ' in writing, saying, '
  '23':
  - type: text
    content: '“Thus says Cyrus king of Persia: ‘The L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth, and He has appointed me to build Him a house in Jerusalem, which is in Judah. Whoever there is among you of all His people, may the L'
  - type: heading
    content: ord
  - type: text
    content: ' his God be with him, and let him go up [to Jerusalem]!’ ”'
  '3':
  - type: text
    content: 'Then the king of Egypt deposed him at Jerusalem, and imposed a fine on the land of a hundred talents of silver and one talent of gold. '
  '4':
  - type: text
    content: 'The king of Egypt made Eliakim, the brother '
  - type: text
    content: of Joahaz,
  - type: text
    content: ' king over Judah and Jerusalem, and changed his name to Jehoiakim. But Neco took Joahaz his brother, and brought him to Egypt.'
  '5':
  - type: text
    content: Jehoiakim was twenty-five years old when he became king, and he reigned for eleven years in Jerusalem; and he did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' his God. '
  '6':
  - type: text
    content: 'Nebuchadnezzar king of Babylon came up against him and bound him with bronze [chains] to take him to Babylon. '
  '7':
  - type: text
    content: Nebuchadnezzar also brought some of the articles of the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Babylon and put them in his temple there. '
  '8':
  - type: text
    content: Now the rest of the acts of Jehoiakim and the repulsive acts which he committed, and what was found against him, behold, they are written in the Book of the Kings of Israel and Judah. And his son Jehoiachin became king in his place.
  '9':
  - type: text
    content: Jehoiachin was eight[teen] years old when he became king, and he reigned for three months and ten days in Jerusalem, and he did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: . [2 Kin 24:8]
  - type: heading
    content: Captivity in Babylon Begun
