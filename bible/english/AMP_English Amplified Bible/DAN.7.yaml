verses:
  '1':
  - type: heading
    content: Vision of the Four Beasts
  - type: text
    content: 'In the '
  - type: note
    content: The events recorded in ch 7 precede the feast recorded in ch 5.
  - type: text
    content: 'first year of Belshazzar king of Babylon Daniel had a dream and visions appeared in his mind '
  - type: text
    content: as he lay
  - type: text
    content: ' on his bed; then he wrote the dream down and related a summary of it. '
  '10':
  - type: text
    content: “A river of fire was flowing
  - type: text
    content: And coming out from before Him;
  - type: text
    content: A thousand thousands were attending Him,
  - type: text
    content: And ten thousand times ten thousand were standing before Him;
  - type: text
    content: The court was seated,
  - type: text
    content: And the books were opened.
  '11':
  - type: text
    content: 'Then I kept looking because of the sound of the great '
  - type: text
    content: and
  - type: text
    content: ' boastful words which the horn was speaking. I kept looking until the beast was slain, and its body destroyed and given to be burned with fire. '
  '12':
  - type: text
    content: As for the rest of the beasts, their power was taken away; yet their lives were prolonged [for the length of their lives was fixed] for a predetermined time.
  - type: heading
    content: The Son of Man Presented
  '13':
  - type: text
    content: ¶“I kept looking in the night visions,
  - type: text
    content: 'And behold, '
  - type: note
    content: As a matter of discussion, one of the ancient rabbis noted an apparent contradiction between the Messiah’s majestic return with clouds in this verse and His humble return on a donkey in Zech 9:9. The solution given was that if Israel is worthy of Him, the Messiah will return with the clouds; if not, He will return on a donkey.
  - type: text
    content: on the clouds of heaven
  - type: text
    content: One like a Son of Man was coming,
  - type: text
    content: And He came up to the Ancient of Days
  - type: text
    content: And was presented before Him.
  '14':
  - type: text
    content: “And to Him (the Messiah) was given dominion (supreme authority),
  - type: text
    content: Glory and a kingdom,
  - type: text
    content: 'That all the peoples, nations, and '
  - type: text
    content: speakers of every
  - type: text
    content: ' language'
  - type: text
    content: 'Should serve '
  - type: text
    content: and
  - type: text
    content: ' worship Him.'
  - type: text
    content: His dominion is an everlasting dominion
  - type: text
    content: Which will not pass away;
  - type: text
    content: And His kingdom is one
  - type: text
    content: Which will not be destroyed. [Rev 5:1-10]
  - type: heading
    content: The Vision Interpreted
  '15':
  - type: text
    content: '“As for me, Daniel, my spirit was distressed '
  - type: text
    content: and
  - type: text
    content: ' anxious within me, and the visions [that appeared] in my mind kept alarming (agitating) me. '
  '16':
  - type: text
    content: 'I approached one of those who stood by and began asking him the exact meaning of all this. So he told me and explained to me the interpretation of the things: '
  '17':
  - type: text
    content: '‘These four great beasts are four kings who will arise from the earth. '
  '18':
  - type: text
    content: 'But the '
  - type: note
    content: Some scholars believe the word “saints” in this chapter refers only to Jewish believers; others view “saints” as inclusive.
  - type: text
    content: saints (believers) of the Most High [God] will receive the kingdom and possess the kingdom forever, for all ages to come.’ [Rom 8:17; 1 Pet 2:9; Rev 3:21]
  '19':
  - type: text
    content: '“Then I wished to know the exact meaning of the fourth beast, which was different from all the others, extremely dreadful, with teeth of iron and claws of bronze, which devoured, crushed and trampled down what was left with its feet, '
  '2':
  - type: text
    content: 'Daniel said, “I saw in my vision by night, and behold, the four winds of heaven were stirring up the great sea (the nations). '
  '20':
  - type: text
    content: 'and '
  - type: text
    content: the meaning
  - type: text
    content: ' of the ten horns (kings) that were on its head and the other '
  - type: text
    content: horn
  - type: text
    content: ' which came up later, and before which three of the horns fell, specifically, that horn which had eyes and a mouth that boasted great '
  - type: text
    content: things
  - type: text
    content: ' and which looked larger than the others. '
  '21':
  - type: text
    content: 'As I kept looking, that horn was making war with the saints (believers) and overpowering them [Rev 13:7-9] '
  '22':
  - type: text
    content: until the Ancient of Days came and judgment was passed in favor of the saints of the Most High [God], and the time arrived when the saints (believers) took possession of the kingdom.
  '23':
  - type: text
    content: '“Thus the angel said, ‘The fourth beast shall be a fourth kingdom on earth, which will be different from all other kingdoms and will devour the whole earth and tread it down, and crush it. '
  '24':
  - type: text
    content: 'As for the ten horns, out of this kingdom ten kings will arise; and another will arise after them, and he will be different from the former ones, and he will subdue three kings. '
  '25':
  - type: text
    content: 'He will speak words against the Most High [God] and wear down the saints of the Most High, and he will intend to change the times and the law; and they will be given into his hand for a time, [two] times, and half a time [three and one-half years]. [Rev 13:1-6] '
  '26':
  - type: text
    content: 'But the court [of the Most High] will sit '
  - type: text
    content: in judgment,
  - type: text
    content: ' and his dominion will be taken away, [first to be] consumed [gradually] and [then] to be destroyed forever. '
  '27':
  - type: text
    content: Then the kingdom and the dominion and the greatness of all the kingdoms under the whole heaven will be given to the people of the saints (believers) of the Most High; His kingdom will be an everlasting kingdom, and all the dominions will serve and obey Him.’
  '28':
  - type: text
    content: “This is the end of the matter. As for me, Daniel, my [waking] thoughts were extremely troubling and alarming and my face grew pale; but I kept the matter [of the vision and the angel’s explanation] to myself.”
  '3':
  - type: text
    content: 'And four great beasts, each different from the other, were coming up out of the sea [in succession]. '
  '4':
  - type: text
    content: 'The first (the Babylonian Empire under Nebuchadnezzar) was like a lion and had the wings of an eagle. I kept looking until its wings were plucked, and it was lifted up from the ground and made to stand on two feet like a man; a human mind was given to it. [Dan 2:37, 38] '
  '5':
  - type: text
    content: 'And behold, another beast, a second one (the Medo-Persian Empire), was like a bear, and it was raised up on one side (domain), and three ribs were in its mouth between its teeth; and it was told, ‘Arise, devour much meat.’ '
  '6':
  - type: text
    content: 'After this I kept looking, and behold, another one (the Greek Empire of Alexander the Great), like a leopard, which had on its back four wings like those of a bird; the beast also had four heads (Alexander’s generals, his successors), and power to rule was given to it. [Dan 2:39; 8:20-22] '
  '7':
  - type: text
    content: 'After this I kept looking in the night visions, and behold, [I saw] a fourth beast (the Roman Empire), terrible and extremely strong; and it had huge iron teeth. It devoured and crushed and trampled down what was left with its feet. It was different from all the beasts that came before it, and it had ten horns (ten kings). [Dan 2:40-43; 7:23] '
  '8':
  - type: text
    content: 'While I was considering the horns, behold, there came up among them '
  - type: note
    content: I.e. the Antichrist.
  - type: text
    content: another horn, a little one, and three of the first horns were pulled up by the roots before it; and behold, in this horn were eyes like the eyes of a man and a mouth boasting of great things.
  - type: heading
    content: The Ancient of Days Reigns
  '9':
  - type: text
    content: ¶“I kept looking
  - type: text
    content: Until thrones were set up,
  - type: text
    content: And the Ancient of Days (God) took His seat;
  - type: text
    content: His garment was white as snow
  - type: text
    content: And the hair of His head like pure wool.
  - type: text
    content: His throne was flames of fire;
  - type: text
    content: Its wheels were a burning fire. [1 Kin 22:19; Ps 90:2; Ezek 1:26-28; Dan 7:13, 22; Matt 19:28; Rev 20:4]
