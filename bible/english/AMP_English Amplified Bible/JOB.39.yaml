document_id: JOB.39,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God Speaks of Nature and Its Beings
  - type: text
    content: “Do you know the time when the wild goats of the rock give birth [to their young]?
  - type: text
    content: Do you observe the calving of the deer?
  '10':
  - type: text
    content: “Can you bind the wild ox with a harness [to the plow] in the furrow?
  - type: text
    content: Or will he plow the valleys for you?
  '11':
  - type: text
    content: “Will you trust him because his strength is great
  - type: text
    content: And leave your labor to him?
  '12':
  - type: text
    content: '“Will you have faith '
  - type: text
    content: and
  - type: text
    content: ' depend on him to return your grain'
  - type: text
    content: And gather it from your threshing floor?
  '13':
  - type: text
    content: ¶“The [flightless] wings of the ostrich wave joyously;
  - type: text
    content: With the pinion (shackles, fetters) and plumage of love,
  '14':
  - type: text
    content: For she leaves her eggs on the ground
  - type: text
    content: And warms them in the dust,
  '15':
  - type: text
    content: Forgetting that a foot may crush them,
  - type: text
    content: Or that the wild beast may trample them.
  '16':
  - type: text
    content: “She treats her young cruelly, as if they were not hers;
  - type: text
    content: Though her labor is in vain because she is unconcerned [for the safety of her brood],
  '17':
  - type: text
    content: For God has made her forget wisdom,
  - type: text
    content: And has not given her a share of understanding.
  '18':
  - type: text
    content: '“Yet when she lifts herself '
  - type: note
    content: Or to flee.
  - type: text
    content: on high,
  - type: text
    content: '[So swift is she that] she laughs at the horse and his rider.'
  '19':
  - type: text
    content: ¶“Have you given the horse his might?
  - type: text
    content: 'Have you clothed his neck with quivering '
  - type: text
    content: and
  - type: text
    content: ' a shaking mane?'
  '2':
  - type: text
    content: '“Can you count the months that they '
  - type: note
    content: Lit fulfill.
  - type: text
    content: carry offspring,
  - type: text
    content: Or do you know the time when they give birth?
  '20':
  - type: text
    content: “Have you [Job] made him leap like a locust?
  - type: text
    content: The majesty of his snorting [nostrils] is terrible.
  '21':
  - type: text
    content: “He paws in the valley and rejoices in his strength;
  - type: text
    content: He goes out to meet the weapons [of armed men].
  '22':
  - type: text
    content: “He laughs at fear and is not dismayed;
  - type: text
    content: And [in battle] he does not turn back from the sword.
  '23':
  - type: text
    content: “The quiver rattles against him,
  - type: text
    content: '[As do] the flashing spear and the lance [of his rider].'
  '24':
  - type: text
    content: “With fierceness and rage he races to devour the ground,
  - type: text
    content: And he does not stand still at the sound of the [war] trumpet.
  '25':
  - type: text
    content: “As often as the trumpet sounds he says, ‘Aha!’
  - type: text
    content: And he smells the battle from far away,
  - type: text
    content: 'And '
  - type: text
    content: senses
  - type: text
    content: ' the thunder of the captains and the war cry.'
  '26':
  - type: text
    content: ¶“Is it by your understanding that the hawk soars,
  - type: text
    content: Stretching his wings toward the south [as winter approaches]?
  '27':
  - type: text
    content: “Is it at your command that the eagle mounts up
  - type: text
    content: And makes his nest on high [in an inaccessible place]?
  '28':
  - type: text
    content: “On the cliff he dwells and remains [securely],
  - type: text
    content: Upon the point of the rock and the inaccessible stronghold.
  '29':
  - type: text
    content: “From there he spies out the prey;
  - type: text
    content: His eyes see it from far away.
  '3':
  - type: text
    content: “They kneel down, they bring forth their young,
  - type: text
    content: They cast out their labor pains.
  '30':
  - type: text
    content: “His young ones suck up blood;
  - type: text
    content: And where the slain are, there is he.”
  '4':
  - type: text
    content: “Their young ones become strong, they grow up in the open field;
  - type: text
    content: They leave and do not return to them.
  '5':
  - type: text
    content: ¶“Who sent out the wild donkey free [from dependence on man]?
  - type: text
    content: And who has loosed the bonds of the wild donkey [to survive in the wild],
  '6':
  - type: text
    content: To whom I gave the wilderness as his home
  - type: text
    content: And the salt land as his dwelling place?
  '7':
  - type: text
    content: “He scorns the tumult of the city,
  - type: text
    content: And does not hear the shouting of the taskmaster.
  '8':
  - type: text
    content: “He explores the mountains as his pasture
  - type: text
    content: And searches after every green thing.
  '9':
  - type: text
    content: “Will the wild ox be willing to serve you,
  - type: text
    content: Or remain beside your manger at night?
