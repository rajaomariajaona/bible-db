document_id: JOB.39
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Speaks of Nature and Its Beings
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Do you know the time when the wild goats of the rock give birth [to their young]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you observe the calving of the deer?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Can you count the months that they '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fulfill
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: carry offspring,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or do you know the time when they give birth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “They kneel down, they bring forth their young,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cast out their labor pains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Their young ones become strong, they grow up in the open field;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They leave and do not return to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶“Who sent out the wild donkey free [from dependence on man]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And who has loosed the bonds of the wild donkey [to survive in the wild],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: To whom I gave the wilderness as his home
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the salt land as his dwelling place?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “He scorns the tumult of the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And does not hear the shouting of the taskmaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “He explores the mountains as his pasture
- type: usfm
  marker: q1
  children:
  - type: text
    text: And searches after every green thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Will the wild ox be willing to serve you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or remain beside your manger at night?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Can you bind the wild ox with a harness [to the plow] in the furrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or will he plow the valleys for you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Will you trust him because his strength is great
- type: usfm
  marker: q1
  children:
  - type: text
    text: And leave your labor to him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Will you have faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' depend on him to return your grain'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gather it from your threshing floor?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“The [flightless] wings of the ostrich wave joyously;
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the pinion (shackles, fetters) and plumage of love,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For she leaves her eggs on the ground
- type: usfm
  marker: q1
  children:
  - type: text
    text: And warms them in the dust,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Forgetting that a foot may crush them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or that the wild beast may trample them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “She treats her young cruelly, as if they were not hers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though her labor is in vain because she is unconcerned [for the safety of her brood],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For God has made her forget wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And has not given her a share of understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Yet when she lifts herself '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to flee
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: on high,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[So swift is she that] she laughs at the horse and his rider.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶“Have you given the horse his might?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Have you clothed his neck with quivering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a shaking mane?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Have you [Job] made him leap like a locust?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The majesty of his snorting [nostrils] is terrible.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “He paws in the valley and rejoices in his strength;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He goes out to meet the weapons [of armed men].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “He laughs at fear and is not dismayed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [in battle] he does not turn back from the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “The quiver rattles against him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[As do] the flashing spear and the lance [of his rider].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “With fierceness and rage he races to devour the ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he does not stand still at the sound of the [war] trumpet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “As often as the trumpet sounds he says, ‘Aha!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he smells the battle from far away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: senses
  - type: text
    text: ' the thunder of the captains and the war cry.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶“Is it by your understanding that the hawk soars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stretching his wings toward the south [as winter approaches]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Is it at your command that the eagle mounts up
- type: usfm
  marker: q1
  children:
  - type: text
    text: And makes his nest on high [in an inaccessible place]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “On the cliff he dwells and remains [securely],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon the point of the rock and the inaccessible stronghold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “From there he spies out the prey;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His eyes see it from far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “His young ones suck up blood;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where the slain are, there is he.”
