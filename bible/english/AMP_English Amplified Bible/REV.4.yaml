  - type: text
    content: or
  - type: text
    content: ' large expanse of glass, like [the clearest] crystal. In the center and around the throne were four living '
  - type: note
    content: Some scholars identify these creatures as cherubim glorifying God and guarding the throne of heaven; others suggest the creatures represent God’s attributes (especially His omniscience and omnipresence).
  - type: text
    content: 'creatures who were full of eyes in front and behind [seeing everything and knowing everything that is around them]. [Ps 99:1; Is 6:2, 3; Ezek 1:5, 18] '
  '7':
  - type: note
    content: 'Jewish tradition suggests that during the exodus the four standards of the tribal triads depicted these images: the triad led by Judah, the lion; the triad led by Reuben, the man; the triad led by Ephraim, the ox; the triad led by Dan, the eagle.'
  - type: text
    content: 'The first living creature was like a lion, the second creature like a calf (ox), the third creature had the face of a man, and the fourth creature was like a flying eagle. [Ezek 1:10] '
