document_id: REV.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Scene in Heaven
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this I looked, and behold, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This chapter begins the revelation to John of future events.
      marker-yv: yv-n
    - type: text
      text: 'a door standing open in heaven! And the first voice which I had heard, like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the sound
    - type: text
      text: ' of a [war] trumpet speaking with me, said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come up here, and I will show you what must take place after these things.”
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: the twenty-four elders fall down before Him who sits on the throne, and they worship Him who lives forever and ever; and they throw down their crowns before the throne, saying,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Worthy are You, our Lord and God, to receive the glory and the honor and the power; for You created all things, and because of Your will they exist, and were created '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought into being.” [Ps 19:1]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'At once I was in [special communication with] the Spirit; and behold, a throne stood in heaven, with One seated on the throne. [Ezek 1:26] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And He who sat there appeared like [the crystalline sparkle of] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In antiquity this name was given to various kinds and colors of precious stones, while the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sardius
        - type: text
          text: ' was a reddish stone. The gems are indicative of royalty.'
      marker-yv: yv-n
    - type: text
      text: 'a jasper stone and [the fiery redness of] a sardius stone, and encircling the throne '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' a rainbow that looked like [the color of an] emerald. [Ezek 1:28; Rev 21:11, 19] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Twenty-four [other] thrones surrounded the throne; and seated on these thrones were '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The twenty-four elders may indicate the twelve tribes of Israel together with the twelve apostles, representing redeemed humanity. Others say the twenty-four may be an angelic order of worship akin to the Aaronic priests.
      marker-yv: yv-n
    - type: text
      text: twenty-four elders dressed in white clothing, with crowns of gold on their heads.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Throne and Worship of the Creator
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'From the throne came flashes of lightning and [rumbling] sounds and peals of thunder. Seven lamps of fire were burning in front of the throne, which are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:4.
      marker-yv: yv-n
    - type: text
      text: 'the seven Spirits of God; [Ex 19:16-20a] '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and in front of the throne '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was something
    - type: text
      text: ' like a sea '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' large expanse of glass, like [the clearest] crystal. In the center and around the throne were four living '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars identify these creatures as cherubim glorifying God and guarding the throne of heaven; others suggest the creatures represent God’s attributes (especially His omniscience and omnipresence).
      marker-yv: yv-n
    - type: text
      text: 'creatures who were full of eyes in front and behind [seeing everything and knowing everything that is around them]. [Ps 99:1; Is 6:2, 3; Ezek 1:5, 18] '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jewish tradition suggests that during the exodus the four standards of the tribal triads depicted these images: the triad led by Judah, the lion; the triad led by Reuben, the man; the triad led by Ephraim, the ox; the triad led by Dan, the eagle.'
      marker-yv: yv-n
    - type: text
      text: 'The first living creature was like a lion, the second creature like a calf (ox), the third creature had the face of a man, and the fourth creature was like a flying eagle. [Ezek 1:10] '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And the four living creatures, each one of them having six wings, are full of eyes all over and within [underneath their wings]; and day and night they never stop saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: oly
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: holy
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: holy
    - type: text
      text: ' [is the] L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: the
    - type: text
      text: ' A'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: lmighty
    - type: text
      text: ' [the Omnipotent, the Ruler of all], '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who was and who is and who is to come
    - type: text
      text: ' [the unchanging, eternal God].” [Is 6:1-3; Rev 1:4]'
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Whenever the living creatures give glory and honor and thanksgiving to Him who sits on the throne, to Him who lives forever and ever, [Ps 47:8] '
