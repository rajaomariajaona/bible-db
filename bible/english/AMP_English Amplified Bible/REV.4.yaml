  - type: text
    content: the twenty-four elders fall down before Him who sits on the throne, and they worship Him who lives forever and ever; and they throw down their crowns before the throne, saying,
  '11':
  - type: text
    content: '“Worthy are You, our Lord and God, to receive the glory and the honor and the power; for You created all things, and because of Your will they exist, and were created '
  - type: text
    content: and
  - type: text
    content: ' brought into being.” [Ps 19:1]'
  '2':
  - type: text
    content: 'At once I was in [special communication with] the Spirit; and behold, a throne stood in heaven, with One seated on the throne. [Ezek 1:26] '
  '3':
  - type: text
    content: 'And He who sat there appeared like [the crystalline sparkle of] '
  - type: note
    content: In antiquity this name was given to various kinds and colors of precious stones, while the sardius was a reddish stone. The gems are indicative of royalty.
  - type: text
    content: 'a jasper stone and [the fiery redness of] a sardius stone, and encircling the throne '
  - type: text
    content: there was
  - type: text
    content: ' a rainbow that looked like [the color of an] emerald. [Ezek 1:28; Rev 21:11, 19] '
  '4':
  - type: text
    content: 'Twenty-four [other] thrones surrounded the throne; and seated on these thrones were '
  - type: note
    content: The twenty-four elders may indicate the twelve tribes of Israel together with the twelve apostles, representing redeemed humanity. Others say the twenty-four may be an angelic order of worship akin to the Aaronic priests.
  - type: text
    content: twenty-four elders dressed in white clothing, with crowns of gold on their heads.
  - type: heading
    content: The Throne and Worship of the Creator
  '5':
  - type: text
    content: 'From the throne came flashes of lightning and [rumbling] sounds and peals of thunder. Seven lamps of fire were burning in front of the throne, which are '
  - type: note
    content: See note 1:4.
  - type: text
    content: 'the seven Spirits of God; [Ex 19:16-20a] '
