document_id: 2KI.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Elisha Promises Food
  - type: text
    content: Then Elisha said, “Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: . Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Tomorrow about this time a '
  - type: note
    content: Heb seah.
  - type: text
    content: 'measure of finely-milled flour will sell for a shekel, and two measures of barley for a shekel, at the gate of Samaria.’ ” '
  '10':
  - type: text
    content: 'So they came and called to the gatekeepers of the city. They told them, “We went to the camp of the Arameans (Syrians), and behold, there was no one there, nor the sound of man there—only the horses and donkeys tied up, and the tents [had been left] just as they were.” '
  '11':
  - type: text
    content: 'Then the gatekeepers called out and it was reported to the king’s household inside [the city]. '
  '12':
  - type: text
    content: 'Then the king got up in the night and said to his servants, “I will tell you what the Arameans have done to us. They know that we are hungry; so they have left the camp to hide themselves in the open country, thinking, ‘When they come out of the city, we shall take them alive and get into the city.’ ” '
  '13':
  - type: text
    content: 'One of his servants replied, “Please let some '
  - type: text
    content: men
  - type: text
    content: ' take five of the horses which remain inside the city. Consider this: [if they are caught then at worst] they will be like all the people of Israel who are left in the city; [even if they are killed then] they will be like all the people of Israel who have already died. So let us send [them] and see [what happens].” '
  '14':
  - type: text
    content: So they took two chariots with horses, and the king sent them after the Aramean army, saying, “Go and see.”
  - type: heading
    content: The Promise Fulfilled
  '15':
  - type: text
    content: They went after them to the Jordan, and all the road was entirely littered with clothing and equipment which the Arameans (Syrians) had thrown away when they hurriedly fled. And the messengers returned and told the king.
  '16':
  - type: text
    content: Then the people [of Israel] went out and plundered the camp of the Arameans. So [goods were so plentiful that] a measure of finely-milled flour [was sold] for a shekel, and two measures of barley for a shekel, in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' [as spoken through Elisha]. [2 Kin 7:1] '
  '17':
  - type: text
    content: 'Now the king had appointed the royal officer on whose arm he leaned to be in charge of the [city] gate; and the [starving] people trampled him at the gate [as they struggled to get through for food], and he died, just as the man of God had foretold when the king came down to him. '
  '18':
  - type: text
    content: 'It happened just as [Elisha] the man of God had spoken to the king, saying, “Two measures of barley will be sold for a shekel and a measure of finely-milled flour for a shekel tomorrow about this time at the gate of Samaria.” '
  '19':
  - type: text
    content: The royal officer had answered the man of God and said, “Now behold, [even] if the L
  - type: heading
    content: ord
  - type: text
    content: ' should make windows in heaven, could such a thing happen?” And Elisha had answered, “You will see it with your own eyes, but [because of your doubt] you will not eat it.” [2 Kin 7:2] '
  '2':
  - type: text
    content: Then the royal officer on whose arm the king leaned answered the man of God and said, “If the L
  - type: heading
    content: ord
  - type: text
    content: ' should make windows in heaven [for the rain], could this thing take place?” Elisha said, “Behold, you will see it with your own eyes, but [because you doubt] you will not eat of it.”'
  - type: heading
    content: Four Lepers Relate Arameans’ Flight
  '20':
  - type: text
    content: And so it happened to him; for the people trampled him at the gate, and he died.
  '3':
  - type: text
    content: 'Now four men who were '
  - type: note
    content: See note 5:1.
  - type: text
    content: 'lepers were at the entrance of the [city’s] gate; and they said to one another, “Why should we sit here until we die? '
  '4':
  - type: text
    content: 'If we say, ‘We will enter the city’—then the famine is in the city and we will die there; and if we sit still here, we will also die. So now come, let us go over to the camp of the Arameans (Syrians). If they let us live, we will live; and if they kill us, we will only die.” '
  '5':
  - type: text
    content: 'So they got up at twilight to go to the Aramean camp. But when they came to the edge of the camp, there was no one there. '
  '6':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' had caused the Aramean army to hear the sound of chariots, and the sound of horses, the sound of a great army. They had said to one another, “The king of Israel has hired against us the kings of the Hittites, and the kings of the Egyptians, to come [and fight] against us.” '
  '7':
  - type: text
    content: 'So the Arameans set out and fled during the twilight, and left their tents, horses, and donkeys, '
  - type: text
    content: even left
  - type: text
    content: ' the camp just as it was, and fled for their lives. '
  '8':
  - type: text
    content: 'When these lepers came to the edge of the camp, they went into one tent and ate and drank, and carried away from there silver, gold, and clothing, and went and hid them. Then they went back and entered another tent and carried [some valuable things] from there '
  - type: text
    content: also
  - type: text
    content: ', and went and hid them.'
  '9':
  - type: text
    content: 'Then they said one to another, “We are not doing the right thing. This is a day of good news, yet we are keeping silent. If we wait until the morning light, some punishment [for not reporting this now] will come on us. So now come, let us go and tell the king’s household.” '
