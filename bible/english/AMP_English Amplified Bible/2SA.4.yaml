- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ish-bosheth Murdered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Saul’s son Ish-bosheth [king of Israel], heard that Abner had died in Hebron, he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his hands went slack
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'lost courage, and all Israel was horrified. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saul’s son had two men who were commanders of [raiding] bands [of soldiers]. One was named Baanah and the other Rechab, the sons of Rimmon the Beerothite of the sons (tribe) of Benjamin (for Beeroth is also considered part of [the tribe of] Benjamin, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and the Beerothites fled to Gittaim, and have been resident aliens there to this day).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jonathan, Saul’s son, had a son whose feet were crippled. He was five years old when the news [of the deaths] of Saul and Jonathan came from Jezreel. And the boy’s nurse picked him up and fled; but it happened that while she was hurrying to flee, he fell and became lame. His name was Mephibosheth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the sons of Rimmon the Beerothite, Rechab and Baanah, left and came to the house of Ish-bosheth in the heat of the day while he was taking his midday rest. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They came into the interior of the house as if to get wheat [for the soldiers], and they struck him in the stomach. Then Rechab and Baanah his brother escaped [unnoticed]. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when they entered the house he was lying on his bed in his bedroom. They [not only] struck and killed him, [but] they also beheaded him. Then they took his head and traveled all night by way of the Arabah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They brought the head of Ish-bosheth to David at Hebron, and said to the king, “Look, the head of Ish-bosheth the son of Saul, your enemy, who sought your life; thus the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has granted my lord the king vengeance this day on Saul and on his descendants.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: David replied to Rechab and Baanah his brother, the sons of Rimmon the Beerothite, and said to them, “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, who has redeemed my life from every adversity, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'when a man told me, ‘Behold, Saul is dead,’ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: as one who brings good news in his own eyes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'thinking that he was bringing good news, I seized and killed him in Ziklag, to reward him for his news. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'How much more, when wicked men have killed a righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just man in his own house on his bed, shall I not require his blood from your hand and remove you from the earth?” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So David commanded his young men, and they killed them and cut off their hands and feet and hung them beside the pool in Hebron. But they took Ish-bosheth’s head and buried it in Hebron in the tomb of Abner [his relative].
