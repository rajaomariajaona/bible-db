  - type: heading
    content: Obligations of the Document
  '28':
  - type: text
    content: 'Now the rest of the people—the priests, the Levites, the gatekeepers, the singers, the temple servants, and all those who had separated themselves from the peoples of the lands to the Law of God, their wives, their sons, their daughters, all those who had knowledge and understanding— '
  '29':
  - type: text
    content: 'are joining with their fellow Israelites, their nobles, and are taking on themselves a curse and an oath to walk in God’s Law, which was given through Moses the servant of God, and to keep and to observe all the commandments of '
  - type: note
    content: Heb YHWH, usually rendered Lord.
  - type: text
    content: G
  - type: heading
    content: od
  - type: text
    content: ' our Lord, and His ordinances and statutes: '
  '3':
  - type: text
    content: 'Pashhur, Amariah, Malchijah, '
  '30':
  - type: text
    content: 'and that we will not give our daughters [as wives] to the peoples of the land or take their daughters for our sons. '
  '31':
  - type: text
    content: 'As for the peoples of the land who bring merchandise or any grain on the Sabbath day to sell, we will not buy from them on the Sabbath or on a holy day; and we will give up '
  - type: text
    content: raising crops during
  - type: text
    content: ' the seventh year [leaving the land uncultivated], and '
  - type: text
    content: forgive
  - type: text
    content: ' every '
  - type: note
    content: Lit hand.
  - type: text
    content: debt. [Ex 23:10, 11; Deut 15:1, 2]
  '32':
  - type: text
    content: 'Also we pledge ourselves to contribute yearly one third of a shekel for the service [expenses] of the house of our God: '
  '33':
  - type: text
    content: for the showbread; for the continual grain offerings and the continual burnt offerings; [for the offerings on] the Sabbaths, the New Moons, the [feasts at] appointed times; for the holy things, for the sin offerings to make atonement for Israel; and for all the work of the house of our God.
  '34':
  - type: text
    content: 'We have also cast lots—the priests, the Levites, and the people—for [contributing] '
  - type: note
    content: Lit the wood of the offering.
  - type: text
    content: the supply of wood, to bring it to the house of our God, according to our fathers’ households, at set times annually, to burn on the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God, as it is written in the Law; '
  '35':
  - type: text
    content: and [we obligate ourselves] to bring the first fruits of our ground and the first fruits of all the fruit of every tree to the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' annually, '
  '36':
  - type: text
    content: 'as well as the firstborn of our sons and of our cattle, as is written in the Law, and the firstborn of our herds and flocks, to bring to the house of our God, for the priests who minister in the house of our God. '
  '37':
  - type: text
    content: 'We will bring the first [and best] of our dough, our contributions, the fruit of every tree, the new wine and the [olive] oil to the priests, to the chambers of the house of our God, and the tithe of our ground to the Levites, for the Levites are the ones who receive the tithes in all the '
  - type: note
    content: Lit towns of service.
  - type: text
    content: 'rural towns. '
  '38':
  - type: text
    content: 'The priest, the son of Aaron, shall be with the Levites when they receive tithes, and they shall bring one-tenth of the tithes up to the house of our God, to the chambers of the storehouse. '
  '39':
  - type: text
    content: For the Israelites and the sons of Levi shall bring the offering of the grain, the new wine, and the oil to the chambers; the utensils of the sanctuary, the priests who are ministering, the gatekeepers, and the singers are there. In this manner, we will not neglect the house of our God.
  '4':
  - type: text
    content: 'Hattush, Shebaniah, Malluch, '
  '5':
  - type: text
    content: 'Harim, Meremoth, Obadiah, '
  '6':
  - type: text
    content: 'Daniel, Ginnethon, Baruch, '
  '7':
  - type: text
    content: 'Meshullam, Abijah, Mijamin, '
  '8':
  - type: text
    content: 'Maaziah, Bilgai, Shemaiah—these were the priests. '
  '9':
  - type: text
    content: 'And the Levites: Jeshua the son of Azaniah, Binnui of the sons of Henadad, Kadmiel, '
