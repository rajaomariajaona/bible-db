- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Obligations of the Document
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now the rest of the people—the priests, the Levites, the gatekeepers, the singers, the temple servants, and all those who had separated themselves from the peoples of the lands to the Law of God, their wives, their sons, their daughters, all those who had knowledge and understanding— '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'are joining with their fellow Israelites, their nobles, and are taking on themselves a curse and an oath to walk in God’s Law, which was given through Moses the servant of God, and to keep and to observe all the commandments of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH
      - type: text
        text: ', usually rendered L'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' our Lord, and His ordinances and statutes: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and that we will not give our daughters [as wives] to the peoples of the land or take their daughters for our sons. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'As for the peoples of the land who bring merchandise or any grain on the Sabbath day to sell, we will not buy from them on the Sabbath or on a holy day; and we will give up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: raising crops during
  - type: text
    text: ' the seventh year [leaving the land uncultivated], and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: forgive
  - type: text
    text: ' every '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: debt. [Ex 23:10, 11; Deut 15:1, 2]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Also we pledge ourselves to contribute yearly one third of a shekel for the service [expenses] of the house of our God: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: for the showbread; for the continual grain offerings and the continual burnt offerings; [for the offerings on] the Sabbaths, the New Moons, the [feasts at] appointed times; for the holy things, for the sin offerings to make atonement for Israel; and for all the work of the house of our God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'We have also cast lots—the priests, the Levites, and the people—for [contributing] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the wood of the offering
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the supply of wood, to bring it to the house of our God, according to our fathers’ households, at set times annually, to burn on the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, as it is written in the Law; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: and [we obligate ourselves] to bring the first fruits of our ground and the first fruits of all the fruit of every tree to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' annually, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'as well as the firstborn of our sons and of our cattle, as is written in the Law, and the firstborn of our herds and flocks, to bring to the house of our God, for the priests who minister in the house of our God. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'We will bring the first [and best] of our dough, our contributions, the fruit of every tree, the new wine and the [olive] oil to the priests, to the chambers of the house of our God, and the tithe of our ground to the Levites, for the Levites are the ones who receive the tithes in all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: towns of service
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'rural towns. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The priest, the son of Aaron, shall be with the Levites when they receive tithes, and they shall bring one-tenth of the tithes up to the house of our God, to the chambers of the storehouse. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: For the Israelites and the sons of Levi shall bring the offering of the grain, the new wine, and the oil to the chambers; the utensils of the sanctuary, the priests who are ministering, the gatekeepers, and the singers are there. In this manner, we will not neglect the house of our God.
