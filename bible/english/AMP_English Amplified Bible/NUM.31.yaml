document_id: NUM.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Slaughter of Midian
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Take vengeance for the Israelites on the Midianites; afterward you will be gathered to your people [in death].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moses spoke to the people, saying, “Arm men from among you for war, so that they may go against Midian to execute the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' vengeance on Midian [for seducing Israel to participate in idolatry]. [Num 25:16-18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A thousand [fighting men] from each tribe of all the tribes of Israel you shall send to the war.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So out of the thousands of Israel, a thousand from each tribe were selected, twelve thousand armed for war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moses sent them, a thousand from each tribe, to the war, and Phinehas the son of Eleazar the priest, to war with them, and the sacred vessels [of the sanctuary] and the trumpets to blow the alarm in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They made war against Midian, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses, and they killed every male. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They killed the kings of Midian along with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the rest of
  - type: text
    text: ' their slain: Evi and Rekem and Zur [the father of Cozbi] and Hur and Reba, the five kings of Midian; also Balaam the son of Beor they killed with the sword. [Num 22:31-35; Neh 13:1, 2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Israel captured the women of Midian and their children; and all their cattle, all their livestock, and all their property they took as spoil [of war]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They burned all the cities where they lived, and all their encampments with fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They took all the plunder and all the spoils of war, both people and livestock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then they brought the captives, the spoils, and the plunder to Moses and to Eleazar the priest and to the congregation of the Israelites at the camp on the plains of Moab by the Jordan [River] across from Jericho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moses and Eleazar the priest and all the leaders of the congregation went out to meet them outside the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Moses was angry with the officers of the army, the commanders of thousands and of hundreds, who served in the war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Moses said to them, “Have you let all the women live? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Look, these [are the women who] caused the Israelites, by the counsel of Balaam, to trespass against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the matter of Peor, and so a plague came among the congregation of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Num 25:1-9; 31:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now therefore, kill every male among the children, and kill every woman who is not a virgin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But all the young girls who have not known a man intimately, keep alive for yourselves [to marry]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Camp outside the camp for seven days; whoever has killed any person and whoever has touched any dead body, purify yourselves and your captives, on the third day and on the seventh day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You shall purify every garment and every article made of leather and all the things made of goats’ hair, and every article made of wood.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Eleazar the priest said to the men of war who had gone to battle, “This is the statute of the law which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has commanded Moses: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'only the gold, the silver, the bronze, the iron, the tin, and the lead, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'everything that can stand fire, you shall pass through fire, and it shall be clean. Nevertheless, it shall also be purified with the water of purification [to remove its impurity]; and all that cannot stand fire [such as fabrics] you shall pass through water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And you shall wash your clothes on the seventh day and be clean, and afterward you may come into the camp.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Division of the Spoil of War
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“You and Eleazar the priest and the leaders of the fathers’ households of the congregation are to take a count of the spoil of war that was captured, both people and livestock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Divide the spoil into two [equal] parts between those who were involved in the war, that is, those who went out to battle and all [the rest of] the congregation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Levy a tax for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from the warriors who went to battle, one in five hundred of the persons, the oxen, the donkeys, and the flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Take this tribute from the warriors’ half and give it to Eleazar the priest as an offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: From the Israelites’ half [of the spoil] you shall take one out of every fifty of the persons, the oxen, the donkeys, the flocks, and of all the livestock, and give them to the Levites who are in charge of the tabernacle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Moses and Eleazar the priest did just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The plunder that remained from the spoil of war which the warriors had taken, was 675,000 sheep, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and 72,000 cattle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and 61,000 donkeys, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: and 32,000 persons in all, of the [Midianite] women who were virgins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The half share, the portion of those who went to war, was 337,500 sheep in number, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' levy (tax) of the sheep was 675; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: the cattle were 36,000, from which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' levy was 72; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: the donkeys were 30,500, from which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' levy was 61; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: the persons were 16,000, from whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' levy was 32 persons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Moses gave the levy which was the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' offering to Eleazar the priest, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'As for the Israelites’ half, which Moses separated from that of the warriors— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'now the congregation’s half was 337,500 sheep, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and 36,000 cattle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'and 30,500 donkeys, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and 16,000 people— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: and from the Israelites’ half, Moses took one out of every fifty, both of persons and animals, and gave them to the Levites, who were in charge of the tabernacle of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Then the officers who were over the thousands of the army, the commanders of thousands and hundreds, approached Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'and they said to him, “Your servants have counted the warriors under our command, and not one man of us is missing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: So we have brought as an offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' what each man obtained—articles of gold, armlets, bracelets, signet rings, earrings, necklaces—to make atonement for ourselves before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Moses and Eleazar the priest took the gold from them, all the handmade articles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: All the gold of the offering which they presented to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from the commanders of thousands and of hundreds was 16,750 shekels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'For the men of war had taken plunder, every man for himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: So Moses and Eleazar the priest received the gold from the commanders of thousands and of hundreds, and brought it into the Tent of Meeting (tabernacle) as a memorial for the sons of Israel before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
