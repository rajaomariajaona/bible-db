document_id: NUM.31,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Slaughter of Midian
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'They burned all the cities where they lived, and all their encampments with fire. '
  '11':
  - type: text
    content: 'They took all the plunder and all the spoils of war, both people and livestock. '
  '12':
  - type: text
    content: Then they brought the captives, the spoils, and the plunder to Moses and to Eleazar the priest and to the congregation of the Israelites at the camp on the plains of Moab by the Jordan [River] across from Jericho.
  '13':
  - type: text
    content: 'Moses and Eleazar the priest and all the leaders of the congregation went out to meet them outside the camp. '
  '14':
  - type: text
    content: 'But Moses was angry with the officers of the army, the commanders of thousands and of hundreds, who served in the war. '
  '15':
  - type: text
    content: 'And Moses said to them, “Have you let all the women live? '
  '16':
  - type: text
    content: Look, these [are the women who] caused the Israelites, by the counsel of Balaam, to trespass against the L
  - type: heading
    content: ord
  - type: text
    content: ' in the matter of Peor, and so a plague came among the congregation of the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Num 25:1-9; 31:8] '
  '17':
  - type: text
    content: 'Now therefore, kill every male among the children, and kill every woman who is not a virgin. '
  '18':
  - type: text
    content: 'But all the young girls who have not known a man intimately, keep alive for yourselves [to marry]. '
  '19':
  - type: text
    content: 'Camp outside the camp for seven days; whoever has killed any person and whoever has touched any dead body, purify yourselves and your captives, on the third day and on the seventh day. '
  '2':
  - type: text
    content: '“Take vengeance for the Israelites on the Midianites; afterward you will be gathered to your people [in death].” '
  '20':
  - type: text
    content: You shall purify every garment and every article made of leather and all the things made of goats’ hair, and every article made of wood.”
  '21':
  - type: text
    content: Then Eleazar the priest said to the men of war who had gone to battle, “This is the statute of the law which the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded Moses: '
  '22':
  - type: text
    content: 'only the gold, the silver, the bronze, the iron, the tin, and the lead, '
  '23':
  - type: text
    content: 'everything that can stand fire, you shall pass through fire, and it shall be clean. Nevertheless, it shall also be purified with the water of purification [to remove its impurity]; and all that cannot stand fire [such as fabrics] you shall pass through water. '
  '24':
  - type: text
    content: And you shall wash your clothes on the seventh day and be clean, and afterward you may come into the camp.”
  - type: heading
    content: Division of the Spoil of War
  '25':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '26':
  - type: text
    content: '“You and Eleazar the priest and the leaders of the fathers’ households of the congregation are to take a count of the spoil of war that was captured, both people and livestock. '
  '27':
  - type: text
    content: 'Divide the spoil into two [equal] parts between those who were involved in the war, that is, those who went out to battle and all [the rest of] the congregation. '
  '28':
  - type: text
    content: Levy a tax for the L
  - type: heading
    content: ord
  - type: text
    content: ' from the warriors who went to battle, one in five hundred of the persons, the oxen, the donkeys, and the flocks. '
  '29':
  - type: text
    content: Take this tribute from the warriors’ half and give it to Eleazar the priest as an offering to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '3':
  - type: text
    content: Moses spoke to the people, saying, “Arm men from among you for war, so that they may go against Midian to execute the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' vengeance on Midian [for seducing Israel to participate in idolatry]. [Num 25:16-18] '
  '30':
  - type: text
    content: From the Israelites’ half [of the spoil] you shall take one out of every fifty of the persons, the oxen, the donkeys, the flocks, and of all the livestock, and give them to the Levites who are in charge of the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '31':
  - type: text
    content: Moses and Eleazar the priest did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '32':
  - type: text
    content: 'The plunder that remained from the spoil of war which the warriors had taken, was 675,000 sheep, '
  '33':
  - type: text
    content: 'and 72,000 cattle, '
  '34':
  - type: text
    content: 'and 61,000 donkeys, '
  '35':
  - type: text
    content: and 32,000 persons in all, of the [Midianite] women who were virgins.
  '36':
  - type: text
    content: 'The half share, the portion of those who went to war, was 337,500 sheep in number, '
  '37':
  - type: text
    content: and the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' levy (tax) of the sheep was 675; '
  '38':
  - type: text
    content: the cattle were 36,000, from which the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' levy was 72; '
  '39':
  - type: text
    content: the donkeys were 30,500, from which the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' levy was 61; '
  '4':
  - type: text
    content: 'A thousand [fighting men] from each tribe of all the tribes of Israel you shall send to the war.” '
  '40':
  - type: text
    content: the persons were 16,000, from whom the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' levy was 32 persons. '
  '41':
  - type: text
    content: Moses gave the levy which was the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' offering to Eleazar the priest, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '42':
  - type: text
    content: 'As for the Israelites’ half, which Moses separated from that of the warriors— '
  '43':
  - type: text
    content: 'now the congregation’s half was 337,500 sheep, '
  '44':
  - type: text
    content: 'and 36,000 cattle, '
  '45':
  - type: text
    content: 'and 30,500 donkeys, '
  '46':
  - type: text
    content: 'and 16,000 people— '
  '47':
  - type: text
    content: and from the Israelites’ half, Moses took one out of every fifty, both of persons and animals, and gave them to the Levites, who were in charge of the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: ', just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '48':
  - type: text
    content: 'Then the officers who were over the thousands of the army, the commanders of thousands and hundreds, approached Moses, '
  '49':
  - type: text
    content: 'and they said to him, “Your servants have counted the warriors under our command, and not one man of us is missing. '
  '5':
  - type: text
    content: 'So out of the thousands of Israel, a thousand from each tribe were selected, twelve thousand armed for war. '
  '50':
  - type: text
    content: So we have brought as an offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' what each man obtained—articles of gold, armlets, bracelets, signet rings, earrings, necklaces—to make atonement for ourselves before the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '51':
  - type: text
    content: 'Moses and Eleazar the priest took the gold from them, all the handmade articles. '
  '52':
  - type: text
    content: All the gold of the offering which they presented to the L
  - type: heading
    content: ord
  - type: text
    content: ' from the commanders of thousands and of hundreds was 16,750 shekels. '
  '53':
  - type: text
    content: 'For the men of war had taken plunder, every man for himself. '
  '54':
  - type: text
    content: So Moses and Eleazar the priest received the gold from the commanders of thousands and of hundreds, and brought it into the Tent of Meeting (tabernacle) as a memorial for the sons of Israel before the L
  - type: heading
    content: ord
  - type: text
    content: .
  '6':
  - type: text
    content: 'Moses sent them, a thousand from each tribe, to the war, and Phinehas the son of Eleazar the priest, to war with them, and the sacred vessels [of the sanctuary] and the trumpets to blow the alarm in his hand. '
  '7':
  - type: text
    content: They made war against Midian, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses, and they killed every male. '
  '8':
  - type: text
    content: 'They killed the kings of Midian along with '
  - type: text
    content: the rest of
  - type: text
    content: ' their slain: Evi and Rekem and Zur [the father of Cozbi] and Hur and Reba, the five kings of Midian; also Balaam the son of Beor they killed with the sword. [Num 22:31-35; Neh 13:1, 2] '
  '9':
  - type: text
    content: 'The sons of Israel captured the women of Midian and their children; and all their cattle, all their livestock, and all their property they took as spoil [of war]. '
