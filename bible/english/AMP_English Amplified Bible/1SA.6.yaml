document_id: 1SA.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Ark Returned to Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had been in the country of the Philistines for seven months. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And the Philistines called for the priests and the diviners (seers), saying, “What shall we do with the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '? Let us know how we can send it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: back
  - type: text
    text: ' to its place.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They said, “If you send away the ark of the God of Israel, do not send it empty [without a gift]; but be sure to return [it] to Him [together with] a guilt offering. Then you will be healed, and it will be known to you why His hand is not removed from you.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then they said, “What shall the guilt offering be which we shall return to Him?” They answered, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was customary in some ancient cultures to make replicas of injured or diseased body parts as offerings to gods for healing. These were called votive offerings. Moreover, worshipers of pagan gods often were not adverse to acknowledging the existence of other, powerful gods outside their own cultures, and in this case the exploits of the God who was inflicting their punishment were already well known (v 6).
    marker-yv: yv-n
  - type: text
    text: 'Five golden tumors and five golden mice, according to the number of the lords (governors) of the Philistines, for one plague was on all of you and on your lords. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So you shall make replicas of your tumors and of your mice that ravage the land, and give glory to the God of Israel; perhaps He will lighten His hand [of judgment] on you and your gods and your land. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Why then do you harden your hearts [allowing pride to cause your downfall] just as the Egyptians and Pharaoh hardened their hearts? When He had severely dealt with them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mocked them, did they not allow the people [of Israel] to go, and they departed? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now then, make a new cart and prepare two '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Here this refers to cows still nursing their calves.
    marker-yv: yv-n
  - type: text
    text: 'milk cows on which a yoke has never been placed; and hitch the cows to the cart and take their calves back home, away from them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then take the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and put it on the cart; and put the articles of gold which you are returning to Him as a guilt offering in a box beside it. Then send it away [without a driver]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But watch, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The nature of the milk cows would be to turn back toward their calves, not proceed forward, as they did, toward Beth-shemesh.
    marker-yv: yv-n
  - type: text
    text: 'if it goes up by the way of its own territory to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A town belonging to the tribe of the sons of Judah.
    marker-yv: yv-n
  - type: text
    text: Beth-shemesh, then [you will know that] He has done us this great evil. But if not, then we will know that it was not His hand that struck us; this disaster happened to us by chance.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the men did so, and took two milk cows and hitched them to the cart, and corralled their calves at home. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They put the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on the cart, and the box containing the golden mice and the replicas of their tumors. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And the cows went straight toward Beth-shemesh along the highway, lowing as they went, and did not turn away to the right or the left. And the Philistine lords (governors) followed them to the border of Beth-shemesh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the men of
  - type: text
    text: ' Beth-shemesh were gathering their wheat harvest in the valley, and they looked up and saw the ark and rejoiced to see it. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The cart came into the field of Joshua of Beth-shemesh and stopped there. A large stone was there; and the men split up the wood of the cart [for firewood] and offered the cows as a burnt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The Levites had taken down the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the box beside it, in which were the articles of gold, and put them on the large stone. And the men of Beth-shemesh offered burnt offerings and made sacrifices that day to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the five lords of the Philistines saw what happened, they returned to Ekron that day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: These are the golden tumors which the Philistines returned as a guilt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': one for Ashdod, one for Gaza, one for Ashkelon, one for Gath and one for Ekron [the five chief cities of the Philistines]; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'also the golden mice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: according
  - type: text
    text: ' to the number of all the cities of the Philistines belonging to the five lords, both fortified cities and [unwalled] country villages. The large stone on which the Levites set the ark of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remains a witness
  - type: text
    text: ' to this day in the field of Joshua of Beth-shemesh.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck down some of the men of Beth-shemesh because they had looked into the ark of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . He struck down 50,070 men among the people, and the people mourned because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had struck the people with a great slaughter. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The men of Beth-shemesh said, “Who is able to stand before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', this holy God? And to whom shall He go up from us?” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So they sent messengers to the residents of Kiriath-jearim, saying, “The Philistines have returned the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . Come down and take it up to you.”
