  '33':
  - type: text
    content: 'And His [legal] father and His mother were amazed at what was said about Him. '
  '34':
  - type: text
    content: 'Simeon blessed them and said to Mary His mother, “Listen carefully: this '
  - type: text
    content: Child
  - type: text
    content: ' is appointed '
  - type: text
    content: and
  - type: text
    content: ' destined for the fall and rise of many in Israel, and for '
  - type: note
    content: The rejecting of the Messiah, culminating in the crucifixion.
  - type: text
    content: 'a sign that is to be opposed— [Is 8:14, 15] '
  '35':
  - type: text
    content: and a sword [of deep sorrow] will pierce through your own soul—so that the thoughts of many hearts may be revealed.”
  '36':
  - type: text
    content: 'There was a prophetess, Anna, the daughter of Phanuel, of the tribe of Asher. She was very old, and had lived with her husband for seven years after her marriage, [Josh 19:24] '
  '37':
  - type: text
    content: 'and then as a widow to the age of eighty-four. She did not leave the [area of the] temple, but was serving '
  - type: text
    content: and
  - type: text
    content: ' worshiping night and day with fastings and prayers. '
  '38':
  - type: text
    content: 'She, too, came up at that very moment and '
  - type: text
    content: began
  - type: text
    content: ' praising '
  - type: text
    content: and
  - type: text
    content: ' giving thanks to God, and continued to speak of Him to all who were looking for the redemption '
  - type: text
    content: and
  - type: text
    content: ' deliverance of Jerusalem.'
  - type: heading
    content: Return to Nazareth
  '39':
  - type: text
    content: 'And when they had done everything [in connection with Jesus’ birth] according to the Law of the Lord, they went back to Galilee, to their own city, Nazareth. '
  '4':
  - type: text
    content: 'So Joseph also went up from Galilee, from the city of Nazareth, to Judea, to the city of David which is called Bethlehem, because he was of the house and family of David, '
  '40':
  - type: text
    content: And the Child continued to grow and become strong [in spirit], filled with wisdom; and the grace (favor, spiritual blessing) of God was upon Him. [Judg 13:24]
  - type: heading
    content: Visit to Jerusalem
  '41':
  - type: text
    content: 'Now His parents went to Jerusalem every year for the Passover Feast. [Deut 16:1-8; Ex 23:15] '
  '42':
  - type: text
    content: 'And when He was twelve years old, they went up '
  - type: text
    content: to Jerusalem,
  - type: text
    content: ' according to the custom of the Feast; '
  '43':
  - type: text
    content: 'and as they were returning [to '
  - type: note
    content: Nazareth of Galilee was about 65 miles north of Jerusalem.
  - type: text
    content: 'Nazareth], after spending the required number of days [at the Feast], the boy Jesus remained behind in Jerusalem. Now His parents did not know this, '
  '44':
  - type: text
    content: 'but supposed Him to be in the caravan, and traveled a day’s journey; and [then] they '
  - type: text
    content: began
  - type: text
    content: ' searching [anxiously] for Him among their relatives and acquaintances. '
  '45':
  - type: text
    content: 'When they did not find Him, they went back to Jerusalem looking for Him [everywhere]. '
  '46':
  - type: text
    content: 'Three days later they found Him in the [court of the] temple, sitting among the teachers, both listening to them and asking them questions. '
  '47':
  - type: text
    content: 'All who heard Him were amazed by His intelligence '
  - type: text
    content: and
  - type: text
    content: ' His understanding and His answers. '
  '48':
  - type: text
    content: 'When they saw Him, they were overwhelmed; and His mother said to Him, “Son, why have You treated us like this? Listen, Your '
  - type: note
    content: Joseph was recognized as the legal father of Jesus.
  - type: text
    content: 'father and I have been [greatly distressed and] anxiously looking for You.” '
  '49':
  - type: text
    content: 'And He answered, '
  - type: text
    content: '“Why did you have to look for Me? Did you not know that I had to be '
  - type: note
    content: Or occupied with My Father’s business.
  - type: text
    content: 'in My Father’s '
  - type: text
    content: house?
  - type: text
    content: ”
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'in order to register with Mary, who was '
  - type: note
    content: See note 1:27.
  - type: text
    content: 'betrothed to him, and was with child. [Matt 1:18-25] '
  '50':
  - type: text
    content: 'But they did not understand what He had said to them. '
  '51':
  - type: text
    content: 'He went down to Nazareth with them, and was continually submissive '
  - type: text
    content: and
  - type: text
    content: ' obedient to them; and His mother treasured all these things in her heart.'
  '52':
  - type: text
    content: And Jesus kept increasing in wisdom and in stature, and in favor with God and men. [1 Sam 2:26]
  '6':
  - type: text
    content: 'While they were there [in Bethlehem], the time came for her to give birth, '
  '7':
  - type: text
    content: and she gave birth to her Son, her firstborn; and she wrapped Him in [
  - type: note
    content: This was customary among the Jews, and quite comfortable and protective for the baby. Wrapping the baby in strips of cloth was intended to strengthen the back and bones for good growth.
  - type: text
    content: 'swaddling] cloths and laid Him in a '
  - type: note
    content: I.e. feeding trough for animals.
  - type: text
    content: manger, because there was no [private] room for them in the inn.
  '8':
  - type: text
    content: 'In the same region there were shepherds staying out in the fields, keeping watch over their flock by night. '
  '9':
  - type: text
    content: 'And an angel of the Lord suddenly stood before them, and the glory of the Lord flashed '
  - type: text
    content: and
  - type: text
    content: ' shone around them, and they were terribly frightened. '
