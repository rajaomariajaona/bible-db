  - type: heading
    content: Jesus’ Birth in Bethlehem
  - type: text
    content: 'Now in those days a decree went out from [the emperor] '
  - type: note
    content: Augustus, Rome’s first and possibly greatest emperor was born Gaius Octavius in 63 b.c. He was the great-nephew, adopted son and heir of the dictator, Julius Caesar. Under Augustus’ intelligent leadership (27 b.c.-a.d. 14) Rome entered the period of peace and prosperity known as the Pax Romana.
  - type: text
    content: 'Caesar Augustus, that all the inhabited world (the Roman Empire) should be '
  - type: note
    content: This was the first general census conducted outside Rome that included the people of the Roman provinces.
  - type: text
    content: 'registered [in a census]. '
  '10':
  - type: text
    content: 'But the angel said to them, “Do not be afraid; for behold, I bring you good news of great joy which will be for '
  - type: note
    content: I.e. Gentiles as well as Jews.
  - type: text
    content: 'all the people. '
  '11':
  - type: text
    content: 'For this day in the city of David there has been born for you a Savior, who is Christ the Lord (the Messiah). [Mic 5:2] '
  '12':
  - type: text
    content: 'And this will be a sign for you [by which you will recognize Him]: you will find a Baby wrapped in [swaddling] cloths and lying in a manger.” [1 Sam 2:34; 2 Kin 19:29; Is 7:14] '
  '13':
  - type: text
    content: Then suddenly there appeared with the angel a multitude of the heavenly host (angelic army) praising God and saying,
  '14':
  - type: text
    content: “Glory to God in the highest [heaven],
  - type: text
    content: And on earth peace among men with whom He is well-pleased.”
  '15':
  - type: text
    content: 'When the angels had gone away from them into heaven, the shepherds '
  - type: text
    content: began
  - type: text
    content: ' saying one to another, “Let us go straight to Bethlehem, and see this [wonderful] thing that has happened which the Lord has made known to us.” '
  '16':
  - type: text
    content: 'So they went in a hurry and found their way to Mary and Joseph, and the Baby as He lay in the manger. '
  '17':
  - type: text
    content: 'And when they had seen this, they made known what had been told them about this Child, '
  '18':
  - type: text
    content: 'and all who heard it were astounded '
  - type: text
    content: and
  - type: text
    content: ' wondered at what the shepherds told them. '
  '19':
  - type: text
    content: 'But Mary treasured all these things, giving careful thought to them '
  - type: text
    content: and
  - type: text
    content: ' pondering them in her heart. '
  '2':
  - type: text
    content: 'This was the first census taken while Quirinius was governor of Syria. '
  '20':
  - type: text
    content: The shepherds returned, glorifying and praising God for all that they had heard and seen, just as it had been told them.
  - type: heading
    content: Jesus Presented at the Temple
  '21':
  - type: text
    content: At the end of eight days, when He was to be circumcised, He was named Jesus, the name given [to Him] by the angel [Gabriel] before He was conceived in the womb.
  '22':
  - type: text
    content: 'And when the time for their purification came [that is, the mother’s purification and the baby’s dedication] according to the Law of Moses, they brought Him up to Jerusalem to present Him to the Lord [set apart as the Firstborn] [Lev 12:1-4] '
