      - type: text
        text: .-
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: '. 14) Rome entered the period of peace and prosperity known as the '
      - type: usfm
