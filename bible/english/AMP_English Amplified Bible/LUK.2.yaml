        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. He was the great-nephew, adopted son and heir of the dictator, Julius Caesar. Under Augustus’ intelligent leadership (27 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .-
        - type: usfm
