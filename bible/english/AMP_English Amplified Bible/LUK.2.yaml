  '25':
  - type: text
    content: 'Now there was a man in Jerusalem whose name was Simeon; and this man was righteous and devout [carefully observing the divine Law], and looking for the '
  - type: note
    content: A Messianic title.
  - type: text
    content: 'Consolation of Israel; and the Holy Spirit was upon him. '
  '26':
  - type: text
    content: 'It had been revealed to him by the Holy Spirit that he would not die before he had seen the Lord’s Christ (the Messiah, the Anointed). '
  '27':
  - type: text
    content: 'Prompted by the Spirit, he came into the temple [enclosure]; and when the parents brought in the child Jesus, '
  - type: note
    content: I.e. offer the turtledoves as a sacrifice.
  - type: text
    content: 'to do for Him the custom required by the Law, '
  '28':
  - type: text
    content: 'Simeon took Him into his arms, and blessed '
  - type: text
    content: and
  - type: text
