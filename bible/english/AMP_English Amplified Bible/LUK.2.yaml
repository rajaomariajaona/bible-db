      marker: sc
      children:
      - type: text
        text: to the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ')” [Ex 13:1, 2, 12; Num 8:17] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and [they came also] to offer a sacrifice according to what is said in the Law of the Lord [to be appropriate for a family of modest means], “
    - type: usfm
      marker: sc
      children:
      - type: text
        text: a pair of turtledoves or two young pigeons
    - type: text
      text: .” [Lev 12:6-8]
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was a man in Jerusalem whose name was Simeon; and this man was righteous and devout [carefully observing the divine Law], and looking for the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Messianic title.
      marker-yv: yv-n
    - type: text
      text: 'Consolation of Israel; and the Holy Spirit was upon him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It had been revealed to him by the Holy Spirit that he would not die before he had seen the Lord’s Christ (the Messiah, the Anointed). '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prompted by the Spirit, he came into the temple [enclosure]; and when the parents brought in the child Jesus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. offer the turtledoves as a sacrifice.
      marker-yv: yv-n
    - type: text
      text: 'to do for Him the custom required by the Law, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simeon took Him into his arms, and blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanked God, and said,'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now, Lord, You are releasing Your bond-servant to leave [this world] in peace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to Your word;
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And everyone went to register for the census, each to his own city. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my eyes have seen Your Salvation, [Is 52:10]
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which You have prepared in the presence of all peoples,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ight for revelation to the
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: entiles
    - type: text
      text: ' [to disclose what was previously unknown],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [to bring] the praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory of Your people Israel.” [Is 42:6; 49:6]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And His [legal] father and His mother were amazed at what was said about Him. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simeon blessed them and said to Mary His mother, “Listen carefully: this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Child
    - type: text
      text: ' is appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destined for the fall and rise of many in Israel, and for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The rejecting of the Messiah, culminating in the crucifixion.
      marker-yv: yv-n
    - type: text
      text: 'a sign that is to be opposed— [Is 8:14, 15] '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and a sword [of deep sorrow] will pierce through your own soul—so that the thoughts of many hearts may be revealed.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was a prophetess, Anna, the daughter of Phanuel, of the tribe of Asher. She was very old, and had lived with her husband for seven years after her marriage, [Josh 19:24] '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and then as a widow to the age of eighty-four. She did not leave the [area of the] temple, but was serving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshiping night and day with fastings and prayers. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She, too, came up at that very moment and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' praising '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' giving thanks to God, and continued to speak of Him to all who were looking for the redemption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance of Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Return to Nazareth
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had done everything [in connection with Jesus’ birth] according to the Law of the Lord, they went back to Galilee, to their own city, Nazareth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph also went up from Galilee, from the city of Nazareth, to Judea, to the city of David which is called Bethlehem, because he was of the house and family of David, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the Child continued to grow and become strong [in spirit], filled with wisdom; and the grace (favor, spiritual blessing) of God was upon Him. [Judg 13:24]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Visit to Jerusalem
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now His parents went to Jerusalem every year for the Passover Feast. [Deut 16:1-8; Ex 23:15] '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when He was twelve years old, they went up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Jerusalem,
    - type: text
      text: ' according to the custom of the Feast; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and as they were returning [to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nazareth of Galilee was about 65 miles north of Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Nazareth], after spending the required number of days [at the Feast], the boy Jesus remained behind in Jerusalem. Now His parents did not know this, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but supposed Him to be in the caravan, and traveled a day’s journey; and [then] they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' searching [anxiously] for Him among their relatives and acquaintances. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they did not find Him, they went back to Jerusalem looking for Him [everywhere]. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three days later they found Him in the [court of the] temple, sitting among the teachers, both listening to them and asking them questions. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All who heard Him were amazed by His intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His understanding and His answers. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they saw Him, they were overwhelmed; and His mother said to Him, “Son, why have You treated us like this? Listen, Your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph was recognized as the legal father of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'father and I have been [greatly distressed and] anxiously looking for You.” '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Why did you have to look for Me? Did you not know that I had to be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: occupied with My Father’s business
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'in My Father’s '
      - type: usfm
        marker: it
        children:
        - type: text
          text: house?
      - type: text
        text: ”
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in order to register with Mary, who was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:27.
      marker-yv: yv-n
    - type: text
      text: 'betrothed to him, and was with child. [Matt 1:18-25] '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they did not understand what He had said to them. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went down to Nazareth with them, and was continually submissive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obedient to them; and His mother treasured all these things in her heart.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jesus kept increasing in wisdom and in stature, and in favor with God and men. [1 Sam 2:26]
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were there [in Bethlehem], the time came for her to give birth, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and she gave birth to her Son, her firstborn; and she wrapped Him in [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was customary among the Jews, and quite comfortable and protective for the baby. Wrapping the baby in strips of cloth was intended to strengthen the back and bones for good growth.
      marker-yv: yv-n
    - type: text
      text: 'swaddling] cloths and laid Him in a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I.e. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: feeding trough for animals
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: manger, because there was no [private] room for them in the inn.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same region there were shepherds staying out in the fields, keeping watch over their flock by night. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And an angel of the Lord suddenly stood before them, and the glory of the Lord flashed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shone around them, and they were terribly frightened. '
