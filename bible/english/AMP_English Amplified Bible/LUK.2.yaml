  - type: text
    content: and
  - type: text
    content: ' thanked God, and said,'
  '29':
  - type: text
    content: “Now, Lord, You are releasing Your bond-servant to leave [this world] in peace,
  - type: text
    content: According to Your word;
  '3':
  - type: text
    content: 'And everyone went to register for the census, each to his own city. '
  '30':
  - type: text
    content: For my eyes have seen Your Salvation, [Is 52:10]
  '31':
  - type: text
    content: Which You have prepared in the presence of all peoples,
  '32':
