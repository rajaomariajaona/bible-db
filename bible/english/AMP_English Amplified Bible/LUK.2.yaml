          children:
          - type: text
            text: d
        - type: text
          text: '. 14) Rome entered the period of peace and prosperity known as the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Pax Romana
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Caesar Augustus, that all the inhabited world (the Roman Empire) should be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the first general census conducted outside Rome that included the people of the Roman provinces.
      marker-yv: yv-n
    - type: text
      text: 'registered [in a census]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the angel said to them, “Do not be afraid; for behold, I bring you good news of great joy which will be for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Gentiles as well as Jews.
      marker-yv: yv-n
    - type: text
      text: 'all the people. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this day in the city of David there has been born for you a Savior, who is Christ the Lord (the Messiah). [Mic 5:2] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this will be a sign for you [by which you will recognize Him]: you will find a Baby wrapped in [swaddling] cloths and lying in a manger.” [1 Sam 2:34; 2 Kin 19:29; Is 7:14] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then suddenly there appeared with the angel a multitude of the heavenly host (angelic army) praising God and saying,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Glory to God in the highest [heaven],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on earth peace among men with whom He is well-pleased.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the angels had gone away from them into heaven, the shepherds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' saying one to another, “Let us go straight to Bethlehem, and see this [wonderful] thing that has happened which the Lord has made known to us.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went in a hurry and found their way to Mary and Joseph, and the Baby as He lay in the manger. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had seen this, they made known what had been told them about this Child, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all who heard it were astounded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wondered at what the shepherds told them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Mary treasured all these things, giving careful thought to them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pondering them in her heart. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was the first census taken while Quirinius was governor of Syria. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The shepherds returned, glorifying and praising God for all that they had heard and seen, just as it had been told them.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Presented at the Temple
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the end of eight days, when He was to be circumcised, He was named Jesus, the name given [to Him] by the angel [Gabriel] before He was conceived in the womb.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the time for their purification came [that is, the mother’s purification and the baby’s dedication] according to the Law of Moses, they brought Him up to Jerusalem to present Him to the Lord [set apart as the Firstborn] [Lev 12:1-4] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (as it is written in the Law of the Lord, “E
    - type: usfm
