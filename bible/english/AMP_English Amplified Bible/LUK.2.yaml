  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in those days a decree went out from [the emperor] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Augustus, Rome’s first and possibly greatest emperor was born Gaius Octavius in 63 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. He was the great-nephew, adopted son and heir of the dictator, Julius Caesar. Under Augustus’ intelligent leadership (27 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
