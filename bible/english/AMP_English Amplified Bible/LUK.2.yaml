        children:
        - type: text
          text: Pax Romana
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Caesar Augustus, that all the inhabited world (the Roman Empire) should be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the first general census conducted outside Rome that included the people of the Roman provinces.
    marker-yv: yv-n
  - type: text
    text: 'registered [in a census]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This was the first census taken while Quirinius was governor of Syria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And everyone went to register for the census, each to his own city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Joseph also went up from Galilee, from the city of Nazareth, to Judea, to the city of David which is called Bethlehem, because he was of the house and family of David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'in order to register with Mary, who was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 1:27.
    marker-yv: yv-n
  - type: text
    text: 'betrothed to him, and was with child. [Matt 1:18-25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'While they were there [in Bethlehem], the time came for her to give birth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and she gave birth to her Son, her firstborn; and she wrapped Him in [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was customary among the Jews, and quite comfortable and protective for the baby. Wrapping the baby in strips of cloth was intended to strengthen the back and bones for good growth.
    marker-yv: yv-n
  - type: text
    text: 'swaddling] cloths and laid Him in a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I.e. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: feeding trough for animals
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: manger, because there was no [private] room for them in the inn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In the same region there were shepherds staying out in the fields, keeping watch over their flock by night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And an angel of the Lord suddenly stood before them, and the glory of the Lord flashed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shone around them, and they were terribly frightened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the angel said to them, “Do not be afraid; for behold, I bring you good news of great joy which will be for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Gentiles as well as Jews.
    marker-yv: yv-n
  - type: text
    text: 'all the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For this day in the city of David there has been born for you a Savior, who is Christ the Lord (the Messiah). [Mic 5:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And this will be a sign for you [by which you will recognize Him]: you will find a Baby wrapped in [swaddling] cloths and lying in a manger.” [1 Sam 2:34; 2 Kin 19:29; Is 7:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then suddenly there appeared with the angel a multitude of the heavenly host (angelic army) praising God and saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Glory to God in the highest [heaven],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on earth peace among men with whom He is well-pleased.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When the angels had gone away from them into heaven, the shepherds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' saying one to another, “Let us go straight to Bethlehem, and see this [wonderful] thing that has happened which the Lord has made known to us.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they went in a hurry and found their way to Mary and Joseph, and the Baby as He lay in the manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when they had seen this, they made known what had been told them about this Child, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and all who heard it were astounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wondered at what the shepherds told them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But Mary treasured all these things, giving careful thought to them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pondering them in her heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The shepherds returned, glorifying and praising God for all that they had heard and seen, just as it had been told them.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Presented at the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: At the end of eight days, when He was to be circumcised, He was named Jesus, the name given [to Him] by the angel [Gabriel] before He was conceived in the womb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And when the time for their purification came [that is, the mother’s purification and the baby’s dedication] according to the Law of Moses, they brought Him up to Jerusalem to present Him to the Lord [set apart as the Firstborn] [Lev 12:1-4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: (as it is written in the Law of the Lord, “E
  - type: usfm
    marker: sc
    children:
    - type: text
      text: very
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: firstborn
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: male that opens the womb shall be called holy
  - type: text
    text: ' [set apart and dedicated] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: to the
  - type: text
    text: ' L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ')” [Ex 13:1, 2, 12; Num 8:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and [they came also] to offer a sacrifice according to what is said in the Law of the Lord [to be appropriate for a family of modest means], “
  - type: usfm
    marker: sc
    children:
    - type: text
      text: a pair of turtledoves or two young pigeons
  - type: text
    text: .” [Lev 12:6-8]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now there was a man in Jerusalem whose name was Simeon; and this man was righteous and devout [carefully observing the divine Law], and looking for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A Messianic title.
    marker-yv: yv-n
  - type: text
    text: 'Consolation of Israel; and the Holy Spirit was upon him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'It had been revealed to him by the Holy Spirit that he would not die before he had seen the Lord’s Christ (the Messiah, the Anointed). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Prompted by the Spirit, he came into the temple [enclosure]; and when the parents brought in the child Jesus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. offer the turtledoves as a sacrifice.
    marker-yv: yv-n
  - type: text
    text: 'to do for Him the custom required by the Law, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Simeon took Him into his arms, and blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanked God, and said,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Now, Lord, You are releasing Your bond-servant to leave [this world] in peace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to Your word;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: For my eyes have seen Your Salvation, [Is 52:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Which You have prepared in the presence of all peoples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: A L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ight for revelation to the
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: entiles
  - type: text
    text: ' [to disclose what was previously unknown],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [to bring] the praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory of Your people Israel.” [Is 42:6; 49:6]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And His [legal] father and His mother were amazed at what was said about Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Simeon blessed them and said to Mary His mother, “Listen carefully: this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Child
  - type: text
    text: ' is appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destined for the fall and rise of many in Israel, and for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The rejecting of the Messiah, culminating in the crucifixion.
    marker-yv: yv-n
  - type: text
    text: 'a sign that is to be opposed— [Is 8:14, 15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: and a sword [of deep sorrow] will pierce through your own soul—so that the thoughts of many hearts may be revealed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'There was a prophetess, Anna, the daughter of Phanuel, of the tribe of Asher. She was very old, and had lived with her husband for seven years after her marriage, [Josh 19:24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and then as a widow to the age of eighty-four. She did not leave the [area of the] temple, but was serving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worshiping night and day with fastings and prayers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'She, too, came up at that very moment and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' praising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' giving thanks to God, and continued to speak of Him to all who were looking for the redemption '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliverance of Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Return to Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And when they had done everything [in connection with Jesus’ birth] according to the Law of the Lord, they went back to Galilee, to their own city, Nazareth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And the Child continued to grow and become strong [in spirit], filled with wisdom; and the grace (favor, spiritual blessing) of God was upon Him. [Judg 13:24]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Visit to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now His parents went to Jerusalem every year for the Passover Feast. [Deut 16:1-8; Ex 23:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And when He was twelve years old, they went up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Jerusalem,
  - type: text
    text: ' according to the custom of the Feast; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'and as they were returning [to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nazareth of Galilee was about 65 miles north of Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'Nazareth], after spending the required number of days [at the Feast], the boy Jesus remained behind in Jerusalem. Now His parents did not know this, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'but supposed Him to be in the caravan, and traveled a day’s journey; and [then] they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' searching [anxiously] for Him among their relatives and acquaintances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'When they did not find Him, they went back to Jerusalem looking for Him [everywhere]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Three days later they found Him in the [court of the] temple, sitting among the teachers, both listening to them and asking them questions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'All who heard Him were amazed by His intelligence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His understanding and His answers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'When they saw Him, they were overwhelmed; and His mother said to Him, “Son, why have You treated us like this? Listen, Your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph was recognized as the legal father of Jesus.
    marker-yv: yv-n
  - type: text
    text: 'father and I have been [greatly distressed and] anxiously looking for You.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why did you have to look for Me? Did you not know that I had to be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:49 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: occupied with My Father’s business
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'in My Father’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house?
    - type: text
      text: ”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'But they did not understand what He had said to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'He went down to Nazareth with them, and was continually submissive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obedient to them; and His mother treasured all these things in her heart.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: And Jesus kept increasing in wisdom and in stature, and in favor with God and men. [1 Sam 2:26]
