    content: 'Then the king removed his signet ring from his hand [that is, the special ring which was used to seal his letters] and gave it to Haman, the son of Hammedatha the Agagite, the enemy of the Jews. '
  '11':
  - type: text
    content: 'The king said to Haman, “The silver is given to you, and the people '
  - type: text
