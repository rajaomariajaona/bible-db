  - type: text
    content: ' to do with them as you please.”'
  '12':
  - type: text
    content: 'Then the king’s scribes (secretaries) were summoned on the thirteenth day of the first month, and it was written just as Haman commanded to the king’s satraps (chief rulers), and to the governors who were over each province and to the officials of each people, each province according to its script (writing), each people according to their own language; being written in the name of King Ahasuerus and sealed with the king’s signet ring. '
  '13':
  - type: text
    content: 'Letters were sent by couriers to all the king’s provinces to destroy, to kill and to annihilate all the Jews, both young and old, women and children, in one day, the thirteenth [day] of the twelfth month, which is the month of Adar (March 7, 473 '
  - type: heading
    content: b
  - type: text
    content: .
  - type: heading
    content: c
  - type: text
    content: '.), and to seize their belongings as plunder. '
  '14':
  - type: text
    content: 'A copy of the edict to be decreed as law in every province was published to all the peoples, so that they would be ready for this day. '
  '15':
  - type: text
    content: The couriers went out hurriedly by order of the king, and the decree was issued at the citadel in Susa. And while the king and Haman sat down to drink, the city of Susa was perplexed [by the unusual and alarming decree].
  '2':
  - type: text
    content: 'All the king’s servants who were at the king’s gate [in royal service] bowed down and honored '
  - type: text
    content: and
  - type: text
    content: ' paid homage to Haman; for this is what the king had commanded in regard to him. But Mordecai [a Jew of the tribe of Benjamin] neither bowed down nor paid homage [to him]. '
  '3':
  - type: text
    content: 'Then the king’s servants who were at the king’s gate said to Mordecai, “Why are you disregarding the king’s command?” '
  '4':
  - type: text
    content: 'Now it happened when they had spoken to him day after day and he would not listen to them, that they told Haman to see whether Mordecai’s reason [for his behavior] would stand [as valid]; for he had told them that he was a Jew. '
  '5':
  - type: text
    content: 'When Haman saw that Mordecai neither bowed down nor paid homage to him, he was furious. '
  '6':
  - type: text
    content: 'But he disdained laying hands on Mordecai alone, for they had told him '
