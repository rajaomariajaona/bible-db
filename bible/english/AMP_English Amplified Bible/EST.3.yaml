  - type: usfm
    marker: it
    children:
    - type: text
      text: Haman’s Plot against the Jews
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things King Ahasuerus (Xerxes) promoted Haman, the son of Hammedatha the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The origin of this ethnic term is unclear. It probably refers to descendants of King Agag of the Amalekites, who were longstanding tribal enemies of the Jews. If so, it would explain the natural animosity between Haman and Mordecai.
    marker-yv: yv-n
  - type: text
    text: 'Agagite, and advanced him and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: set his seat
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'established his authority over all the officials who were with him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'All the king’s servants who were at the king’s gate [in royal service] bowed down and honored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' paid homage to Haman; for this is what the king had commanded in regard to him. But Mordecai [a Jew of the tribe of Benjamin] neither bowed down nor paid homage [to him]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the king’s servants who were at the king’s gate said to Mordecai, “Why are you disregarding the king’s command?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now it happened when they had spoken to him day after day and he would not listen to them, that they told Haman to see whether Mordecai’s reason [for his behavior] would stand [as valid]; for he had told them that he was a Jew. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Haman saw that Mordecai neither bowed down nor paid homage to him, he was furious. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But he disdained laying hands on Mordecai alone, for they had told him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' the people of Mordecai were (his nationality); so Haman determined to destroy all the Jews, the people of Mordecai, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lived
  - type: text
    text: ' throughout the kingdom of Ahasuerus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In the first month, the month of Nisan (Mar-Apr), in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At this time Esther had been queen about four or five years.
    marker-yv: yv-n
  - type: text
    text: 'twelfth year of King Ahasuerus, Haman cast Pur, that is, the lot, cast before him day after day [to find a lucky day to approach the king], month after month, until the twelfth month, the month of Adar (Feb-Mar). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Haman said to King Ahasuerus, “There is a certain people scattered [abroad] and dispersed among the peoples in all the provinces of your kingdom; their laws are different from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' of all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' people, and they do not observe the king’s laws. Therefore it is not in the king’s interest to [tolerate them and] let them stay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: here
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If it pleases the king, let it be decreed that they be destroyed, and I will pay ten thousand talents of silver into the hands of those who carry out the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: king’s
  - type: text
    text: ' business, to put into the king’s treasuries.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the king removed his signet ring from his hand [that is, the special ring which was used to seal his letters] and gave it to Haman, the son of Hammedatha the Agagite, the enemy of the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The king said to Haman, “The silver is given to you, and the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: also,
  - type: text
    text: ' to do with them as you please.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the king’s scribes (secretaries) were summoned on the thirteenth day of the first month, and it was written just as Haman commanded to the king’s satraps (chief rulers), and to the governors who were over each province and to the officials of each people, each province according to its script (writing), each people according to their own language; being written in the name of King Ahasuerus and sealed with the king’s signet ring. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Letters were sent by couriers to all the king’s provinces to destroy, to kill and to annihilate all the Jews, both young and old, women and children, in one day, the thirteenth [day] of the twelfth month, which is the month of Adar (March 7, 473 '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: b
  - type: text
    text: .
  - type: usfm
    marker: sc
    children:
    - type: text
      text: c
  - type: text
    text: '.), and to seize their belongings as plunder. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A copy of the edict to be decreed as law in every province was published to all the peoples, so that they would be ready for this day. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The couriers went out hurriedly by order of the king, and the decree was issued at the citadel in Susa. And while the king and Haman sat down to drink, the city of Susa was perplexed [by the unusual and alarming decree].
