  - type: note
    content: The overwhelming flood may be understood as a metaphor describing a conquering army as well as a literal reference to a flood of water. Diodorus of Sicily refers to a legend that Nineveh could never be taken until the river became its enemy. Arbaces the Scythian had besieged the city in vain for two years, but in the third year the Khoser River washed away a considerable section of the very great wall and the invaders pushed through this opening. Nahum 2:6 refers to the devastating flood and 3:13, 15 probably to the destruction of Nineveh by fire. The vivid descriptions of ch 3 are historically accurate.
  - type: text
    content: overwhelming flood [of judgment through invading armies]
  - type: text
    content: 'He will make a complete destruction of '
  - type: note
    content: The city of Nineveh was the magnificent capital of the Assyrian Empire. The great palace of Sennacherib was without rival and contained at least seventy or more rooms. The city was home to more than 120,000 residents (at least twice the size of Babylon) and had no less than fifteen gates in the wall surrounding the city. During its glory days it was probably the largest city in the known world. Built near the juncture of the Tigris River and its tributary the Khoser, it was served by an elaborate water system of eighteen canals. Nineveh had many suburbs, three of which are mentioned along with Nineveh in Gen 10:11, 12. Nineveh’s extensive ruins are located near the modern city of Mosul, Iraq.
  - type: text
    content: its site
