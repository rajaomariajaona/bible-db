    content: 'Already the reaper is receiving '
  - type: text
    content: his
  - type: text
    content: ' wages and he is gathering fruit for eternal life; so that he who plants and he who reaps may rejoice together.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For in this '
  - type: text
    content: case
  - type: text
