  - type: text
    content: and He would have given you living water (eternal life).”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'She said to Him, “Sir, '
  - type: note
    content: The woman’s response is due to the fact that “living water” was the normal description for running water. She probably thought that Jesus was referring to the underground water source that fed the well.
  - type: text
    content: 'You have nothing to draw with [no bucket and rope] and the well is deep. Where then do You get that living water? '
  '12':
  - type: text
    content: 'Are You greater than our father '
  - type: note
    content: Jacob (renamed Israel in Gen 32:28) was the son of Isaac, grandson of Abraham and father of the twelve sons who established the twelve tribes of Israel.
  - type: text
    content: 'Jacob, who gave us the well, and who used to drink from it himself, and his sons and his cattle also?” '
  '13':
  - type: text
    content: 'Jesus answered her, '
  - type: text
    content: “Everyone who drinks this water will be thirsty again.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But whoever drinks the water that I give him will never be thirsty again. But the water that I give him will become in him a spring of water
  - type: text
    content: ' [satisfying his thirst for God] '
  - type: text
    content: welling up
  - type: text
    content: ' [continually flowing, bubbling within him] '
  - type: text
    content: to eternal life.”
  '15':
  - type: text
    content: 'The woman said to Him, “Sir, give me this water, so that I will not get thirsty nor [have to continually] come all the way here to draw.” '
  '16':
  - type: text
    content: 'At this, Jesus said, '
  - type: text
    content: “Go, call your husband and come back.”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'The woman answered, “I do not have a husband.” Jesus said to her, '
  - type: text
    content: “You have correctly said, ‘I do not have a husband’;
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'for you have had five husbands, and the man you are now living with is not your '
  - type: note
    content: God does not regard cohabitation as marriage. Marriage is a binding, legal covenant between a man and a woman.
  - type: text
    content: husband. You have said this truthfully.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'The woman said to Him, “Sir, I see that You are a prophet. '
  '2':
  - type: text
    content: '(although Jesus Himself was not baptizing, but His disciples were), '
