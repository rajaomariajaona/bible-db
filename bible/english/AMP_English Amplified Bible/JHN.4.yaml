  - type: text
    content: “My food is to do the will of Him who sent Me and to completely finish His work.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Do you not say, ‘It is still four months until the harvest comes?’ Look, I say to you, raise your eyes and look at the fields '
  - type: text
    content: and
  - type: text
    content: ' see, they are white for harvest.'
  - type: text
    content: ' '
