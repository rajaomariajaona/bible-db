  - type: heading
    content: The Samaritans
  '39':
  - type: text
    content: 'Now many Samaritans from that city believed in Him '
  - type: text
    content: and
  - type: text
    content: ' trusted Him [as Savior] because of what the woman said when she testified, “He told me all the things that I have done.” '
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: Jesus went through Samaria to show that He is the Savior of all people.
  - type: text
    content: 'He had to go through '
  - type: note
    content: Samaria was centrally located between Judea (south) and Galilee (north). The Jews despised Samaritans because they were Jews who had intermarried with non-Jews and followed a heretical religion. Most Jews traveled out of their way to avoid Samaria.
  - type: text
    content: 'Samaria. '
  '40':
  - type: text
    content: 'So when the Samaritans came to Jesus, they asked Him to remain with them; and He stayed there two days. '
  '41':
  - type: text
    content: 'Many more believed in Him [with a deep, abiding trust] because of His word [His personal message to them]; '
  '42':
  - type: text
    content: 'and they told the woman, “We no longer believe '
  - type: text
    content: just
  - type: text
    content: ' because of what you said; for [now] we have heard '
  - type: text
    content: Him
  - type: text
    content: ' for ourselves and know [with confident assurance] that this One is truly the Savior of [all] the world.”'
  '43':
  - type: text
    content: 'After the two days He went on from there into Galilee. '
  '44':
  - type: text
    content: 'For Jesus Himself declared that a prophet has no honor in his own country. '
  '45':
  - type: text
    content: 'So when He arrived in Galilee, the Galileans '
  - type: note
    content: In view of John’s wording in v 44 (For Jesus Himself declared…), the Galileans evidently were very interested in His miracles, but did not recognize or regard Jesus as their source of salvation.
  - type: text
    content: welcomed Him, since they had seen all the things that He did in Jerusalem at the feast; for they too came to the feast.
  - type: heading
    content: Healing a Nobleman’s Son
  '46':
  - type: text
    content: 'So Jesus came again to Cana of Galilee, where He had turned the water into wine. And there was a '
  - type: note
    content: Probably an official of Herod Antipas.
  - type: text
    content: 'certain royal official whose son was sick in Capernaum. '
  '47':
  - type: text
    content: 'Having heard that Jesus had come back from Judea to Galilee, he '
  - type: note
    content: Capernaum to Cana was about eighteen miles.
  - type: text
    content: 'went to '
  - type: text
    content: meet
  - type: text
    content: ' Him and began asking Him to come down and heal his son; for he was at the point of death. '
  '48':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: “Unless you
  - type: text
