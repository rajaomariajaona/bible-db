document_id: JHN.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Goes to Galilee
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when the Lord learned that the Pharisees had been told that Jesus was making and baptizing more disciples than John '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you knew
    - type: text
      text: ' [about] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: God’s gift
    - type: text
      text: ' [of eternal life], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and who it is who says, ‘Give Me a drink,’ you would have asked Him
    - type: text
      text: ' [instead], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and He would have given you living water (eternal life).”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She said to Him, “Sir, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The woman’s response is due to the fact that “living water” was the normal description for running water. She probably thought that Jesus was referring to the underground water source that fed the well.
      marker-yv: yv-n
    - type: text
      text: 'You have nothing to draw with [no bucket and rope] and the well is deep. Where then do You get that living water? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are You greater than our father '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob (renamed Israel in Gen 32:28) was the son of Isaac, grandson of Abraham and father of the twelve sons who established the twelve tribes of Israel.
      marker-yv: yv-n
    - type: text
      text: 'Jacob, who gave us the well, and who used to drink from it himself, and his sons and his cattle also?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Everyone who drinks this water will be thirsty again.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But whoever drinks the water that I give him will never be thirsty again. But the water that I give him will become in him a spring of water
    - type: text
      text: ' [satisfying his thirst for God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: welling up
    - type: text
      text: ' [continually flowing, bubbling within him] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to eternal life.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woman said to Him, “Sir, give me this water, so that I will not get thirsty nor [have to continually] come all the way here to draw.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At this, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go, call your husband and come back.”
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woman answered, “I do not have a husband.” Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have correctly said, ‘I do not have a husband’;
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for you have had five husbands, and the man you are now living with is not your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God does not regard cohabitation as marriage. Marriage is a binding, legal covenant between a man and a woman.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: husband. You have said this truthfully.”
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woman said to Him, “Sir, I see that You are a prophet. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(although Jesus Himself was not baptizing, but His disciples were), '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our fathers worshiped on this mountain, but you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jews
    - type: text
      text: ' say that the place where one ought to worship is in Jerusalem [at the temple].” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman, believe Me, a time is coming
    - type: text
      text: ' [when God’s kingdom comes] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: when you will worship the Father neither on this mountain nor in Jerusalem.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You
    - type: text
      text: ' [Samaritans] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: do not know what you worship; we
    - type: text
      text: ' [Jews] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: do know what we worship, for salvation is from the Jews.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But a time is coming and is already here when the true worshipers will worship the Father in spirit
    - type: text
      text: ' [from the heart, the inner self] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and in truth; for the Father seeks such people to be His worshipers.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: God is spirit
    - type: text
      text: ' [the Source of life, yet invisible to mankind], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and those who worship Him must worship in spirit and truth.”
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woman said to Him, “I know that Messiah is coming (He who is called Christ—the Anointed); when that One comes, He will tell us everything [we need to know].” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I who speak to you, am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He
      - type: text
        text: ' (the Messiah).”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then His disciples came, and they were surprised to find Him talking with a woman. However, no one said, “What are You asking about?” or, “Why are You talking to her?” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the woman left her water jar, and went into the city and began telling the people, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Come, see a man who told me all the things that I have done! Can this be the Christ (the Messiah, the Anointed)?” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He left Judea and returned again to Galilee. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the people left the city and were coming to Him.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the disciples were urging Jesus [to have a meal], saying, “Rabbi (Teacher), eat.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have food to eat that you do not know about.”
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the disciples said to one another, “Has anyone brought Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' to eat?” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My food is to do the will of Him who sent Me and to completely finish His work.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Do you not say, ‘It is still four months until the harvest comes?’ Look, I say to you, raise your eyes and look at the fields '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' see, they are white for harvest.'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Already the reaper is receiving '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his
      - type: text
        text: ' wages and he is gathering fruit for eternal life; so that he who plants and he who reaps may rejoice together.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For in this '
      - type: usfm
        marker: it
        children:
        - type: text
          text: case
      - type: text
        text: ' the saying is true, ‘One'
    - type: text
      text: ' [person] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sows and another reaps.’
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I sent you to reap
    - type: text
      text: ' [a crop] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for which you have not worked. Others have worked and you have been privileged to reap the results of their work.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Samaritans
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now many Samaritans from that city believed in Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted Him [as Savior] because of what the woman said when she testified, “He told me all the things that I have done.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus went through Samaria to show that He is the Savior of all people.
      marker-yv: yv-n
    - type: text
      text: 'He had to go through '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Samaria was centrally located between Judea (south) and Galilee (north). The Jews despised Samaritans because they were Jews who had intermarried with non-Jews and followed a heretical religion. Most Jews traveled out of their way to avoid Samaria.
      marker-yv: yv-n
    - type: text
      text: 'Samaria. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when the Samaritans came to Jesus, they asked Him to remain with them; and He stayed there two days. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many more believed in Him [with a deep, abiding trust] because of His word [His personal message to them]; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they told the woman, “We no longer believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: just
    - type: text
      text: ' because of what you said; for [now] we have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' for ourselves and know [with confident assurance] that this One is truly the Savior of [all] the world.”'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the two days He went on from there into Galilee. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Jesus Himself declared that a prophet has no honor in his own country. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when He arrived in Galilee, the Galileans '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In view of John’s wording in v 44 '
        - type: usfm
          marker: it
          children:
          - type: text
            text: (For Jesus Himself declared…),
        - type: text
          text: ' the Galileans evidently were very interested in His miracles, but did not recognize or regard Jesus as their source of salvation.'
      marker-yv: yv-n
    - type: text
      text: welcomed Him, since they had seen all the things that He did in Jerusalem at the feast; for they too came to the feast.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Healing a Nobleman’s Son
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus came again to Cana of Galilee, where He had turned the water into wine. And there was a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably an official of Herod Antipas.
      marker-yv: yv-n
    - type: text
      text: 'certain royal official whose son was sick in Capernaum. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Having heard that Jesus had come back from Judea to Galilee, he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Capernaum to Cana was about eighteen miles.
      marker-yv: yv-n
    - type: text
      text: 'went to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: meet
    - type: text
      text: ' Him and began asking Him to come down and heal his son; for he was at the point of death. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Unless you
    - type: text
      text: ' [people] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: see
    - type: text
      text: ' [miraculous] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: signs and wonders, you
    - type: text
      text: ' [simply] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will not believe.”
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The royal official pleaded with Him, “Sir, do come down [at once] before my child dies!” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So He arrived at a Samaritan town called Sychar, near the tract of land that Jacob gave to his son Joseph; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go; your son lives!”
    - type: text
      text: ' The man believed what Jesus said to him and started home. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he was already going down [the road], his servants met him and reported that his son was living [and was healthy]. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he asked them at what time he began to get better. They said, “Yesterday during the seventh hour (1 p.m.) the fever left him.” '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the father realized that it was at that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' hour when Jesus had said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your son lives”;
    - type: text
      text: ' and he and his entire household believed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently trusted [in Him as Savior]. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the second sign (attesting miracle) that Jesus performed [in Cana] after He had come from Judea to Galilee [revealing that He is the Messiah].
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Jacob’s well was there. So Jesus, tired as He was from His journey, sat down by the well. It was then about the sixth hour (noon).
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Samaritan Woman
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a woman from Samaria came to draw water. Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Give Me a drink”—
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For His disciples had gone off into the city to buy food— '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Samaritan woman asked Him, “How is it that You, being a Jew, ask me, a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jews considered Samaritan women ceremonially unclean.
      marker-yv: yv-n
    - type: text
      text: 'Samaritan woman, for a drink?” (For Jews have nothing to do with Samaritans.) '
