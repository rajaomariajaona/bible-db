  - type: text
    content: will not believe.”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'The royal official pleaded with Him, “Sir, do come down [at once] before my child dies!” '
  '5':
  - type: text
    content: 'So He arrived at a Samaritan town called Sychar, near the tract of land that Jacob gave to his son Joseph; '
  '50':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Go; your son lives!”
  - type: text
    content: ' The man believed what Jesus said to him and started home. '
  '51':
  - type: text
    content: 'As he was already going down [the road], his servants met him and reported that his son was living [and was healthy]. '
  '52':
  - type: text
    content: 'So he asked them at what time he began to get better. They said, “Yesterday during the seventh hour (1 p.m.) the fever left him.” '
  '53':
  - type: text
    content: 'Then the father realized that it was at that '
  - type: text
    content: very
  - type: text
    content: ' hour when Jesus had said to him, '
  - type: text
    content: “Your son lives”;
  - type: text
    content: ' and he and his entire household believed '
  - type: text
    content: and
  - type: text
    content: ' confidently trusted [in Him as Savior]. '
  '54':
  - type: text
    content: This is the second sign (attesting miracle) that Jesus performed [in Cana] after He had come from Judea to Galilee [revealing that He is the Messiah].
  '6':
  - type: text
    content: and Jacob’s well was there. So Jesus, tired as He was from His journey, sat down by the well. It was then about the sixth hour (noon).
  - type: heading
    content: The Samaritan Woman
  '7':
  - type: text
    content: 'Then a woman from Samaria came to draw water. Jesus said to her, '
  - type: text
    content: “Give Me a drink”—
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For His disciples had gone off into the city to buy food— '
  '9':
  - type: text
    content: 'The Samaritan woman asked Him, “How is it that You, being a Jew, ask me, a '
  - type: note
    content: The Jews considered Samaritan women ceremonially unclean.
  - type: text
