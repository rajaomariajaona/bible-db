  - type: text
    content: ' '
  '25':
  - type: text
    content: 'The woman said to Him, “I know that Messiah is coming (He who is called Christ—the Anointed); when that One comes, He will tell us everything [we need to know].” '
  '26':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: '“I who speak to you, am '
  - type: text
    content: He
  - type: text
    content: ' (the Messiah).”'
  '27':
  - type: text
    content: 'Just then His disciples came, and they were surprised to find Him talking with a woman. However, no one said, “What are You asking about?” or, “Why are You talking to her?” '
  '28':
  - type: text
    content: 'Then the woman left her water jar, and went into the city and began telling the people, '
  '29':
  - type: text
    content: '“Come, see a man who told me all the things that I have done! Can this be the Christ (the Messiah, the Anointed)?” '
  '3':
  - type: text
    content: 'He left Judea and returned again to Galilee. '
  '30':
  - type: text
    content: So the people left the city and were coming to Him.
  '31':
  - type: text
    content: 'Meanwhile, the disciples were urging Jesus [to have a meal], saying, “Rabbi (Teacher), eat.” '
  '32':
  - type: text
    content: 'But He told them, '
  - type: text
    content: “I have food to eat that you do not know about.”
  - type: text
    content: ' '
  '33':
