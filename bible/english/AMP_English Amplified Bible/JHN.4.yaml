    content: Jesus Goes to Galilee
  - type: text
    content: 'So when the Lord learned that the Pharisees had been told that Jesus was making and baptizing more disciples than John '
  '10':
  - type: text
    content: 'Jesus answered her, '
  - type: text
    content: “If you knew
  - type: text
    content: ' [about] '
  - type: text
    content: God’s gift
  - type: text
    content: ' [of eternal life], '
  - type: text
    content: and who it is who says, ‘Give Me a drink,’ you would have asked Him
  - type: text
