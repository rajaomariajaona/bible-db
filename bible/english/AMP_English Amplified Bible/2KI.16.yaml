document_id: 2KI.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahaz Reigns over Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the seventeenth year of Pekah the son of Remaliah, Ahaz the son of Jotham, king of Judah, became king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ahaz was twenty years old when he became king, and he reigned sixteen years in Jerusalem. He did not do what was right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God, as his father (ancestor) David had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Instead he walked in the way of the [idolatrous] kings of Israel, and even made his son pass through the fire [as a human sacrifice], in accordance with the repulsive [and idolatrous] practices of the [pagan] nations whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' drove out before the Israelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He also sacrificed and burned incense on the high places and on the hills and under every green tree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Rezin the king of Aram (Syria) and Pekah the son of Remaliah, king of Israel, came up to Jerusalem to wage war. They besieged Ahaz, but could not overcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conquer him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'At that time Rezin king of Aram recovered '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Elath was located on the Gulf of Aqaba, the southernmost port city of Judah.
    marker-yv: yv-n
  - type: text
    text: Elath [in Edom] for Aram, and drove the Jews away from it. The Arameans came to Elath, and live there to this day.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahaz Seeks Help of Assyria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Ahaz sent messengers to Tiglath-pileser king of Assyria, saying, “I am your servant and son. Come up and rescue me from the hand of the kings of Aram and of Israel, who are rising up against me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And Ahaz took the silver and gold that was found in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and in the treasuries of the king’s house, and sent a gift to the king of Assyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the king of Assyria listened to him; and he went up against Damascus and captured it, and carried '
  - type: usfm
    marker: it
    children:
    - type: text
      text: its people
  - type: text
    text: ' away into exile to Kir, and put Rezin [king of Aram] to death.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Damascus Falls
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now King Ahaz went to Damascus to meet Tiglath-pileser the king of Assyria, and saw the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pagan
  - type: text
    text: ' altar which was at Damascus. Then King Ahaz sent a model of the altar to Urijah the priest along with a [detailed] pattern for all its construction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Urijah the priest built an altar; in accordance with everything that King Ahaz had sent from Damascus, that is how Urijah the priest made it before King Ahaz returned from Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the king came from Damascus, he saw the altar; then the king approached the altar and offered [sacrifices] on it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and burned his burnt offering and his grain offering, and poured out his drink offering, and sprinkled the blood of his peace offerings on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He brought the bronze altar, which was before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', from the front of the house (temple), from between the [new] altar and the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and put it on the north side of the [new] altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then King Ahaz commanded Urijah the priest, saying, “Upon the great [new] altar, burn the morning burnt offering and the evening grain offering, and the king’s burnt offering and his grain offering, with the burnt offering of all the people of the land and their grain offering and their drink offerings; and sprinkle on the new altar all the blood of the burnt offering and all the blood of the sacrifice. But the [old] bronze altar shall be kept for me to use to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew here is not certain, but Ahaz was probably referring to the pagan practice of examining the entrails of sacrifices as omens for deciding whether to go to war or for other major decisions.
    marker-yv: yv-n
  - type: text
    text: 'examine the sacrifices.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Urijah the priest acted in accordance with everything that King Ahaz commanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then King Ahaz cut away the frames of the basin stands [in the temple], and removed the basin from [each of] them; and he took down the [large] Sea from the bronze oxen which were under it, and put it on a plastered stone floor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He removed from the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' the covered way for the Sabbath which they had built in the house, and the outer entrance of the king, because of the king of Assyria [who might confiscate them].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Reigns over Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the rest of the acts of Ahaz, are they not written in the Book of the Chronicles of the Kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Ahaz slept with his fathers [in death] and was buried with his fathers in the City of David; and his son Hezekiah became king in his place.
