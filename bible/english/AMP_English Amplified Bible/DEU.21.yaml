document_id: DEU.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Expiation of a Crime
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “If someone is found slain, lying in the field, in the land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God gives you to possess, and it is not known who has killed him, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “When you go out to battle against your enemies, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God hands them over to you and you lead them away captive, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and you see a beautiful woman among the captives, and desire her and would take her as your wife, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'then you shall bring her [home] to your house, and she shall shave her head and trim her nails [in preparation for mourning]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'She shall take off the clothes of her captivity and remain in your house, and weep (mourn) for her father and her mother a full month. After that you may go in to her and be her husband and she shall be your wife. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But it shall be that if you have no delight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take no pleasure in her, then you shall let her go '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to her soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'wherever she wishes. You certainly shall not sell her for money; you shall not deal with her as a slave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' mistreat her, because you have humbled her [by forced marriage].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“If a man has two wives, one loved and the other '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: hated,
        - type: text
          text: ' the Hebrew word does not seem always to indicate a hostile attitude, but sometimes more of a sense of rejection.'
      marker-yv: yv-n
    - type: text
      text: 'unloved, and both the loved and the unloved have born him sons, and the firstborn son belongs to the unloved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wife,
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'then on the day when he wills his possessions to his sons, he cannot treat the son of his loved wife as firstborn in place of the son of the unloved wife—the [actual] firstborn. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Instead he shall acknowledge the son of the unloved as the firstborn, by giving him a double portion of all that he has, for he was the beginning of his strength (generative power); to him belongs the right of the firstborn.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“If any man has a stubborn and rebellious son who will not obey the voice of his father or of his mother, and when they reprimand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline him, he will not listen to them, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'then his father and mother shall take hold of him, and bring him out to the elders of his city at the gateway of his hometown. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'then your elders and judges shall go out and measure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the distance
    - type: text
      text: ' to the cities which are around the dead person. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They shall say to the elders of his city, ‘This son of ours is stubborn and rebellious; he will not obey us, he is a glutton and a drunkard.’ [Prov 23:20-22] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then all the men of his city shall stone him to death; so you shall remove the evil from among you, and all Israel will hear of it and be afraid.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “And if a man has committed a sin worthy of death, and he is put to death and [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the time of the Roman Empire, the rabbis insisted that the Jews were more humane than the Romans because Jews did not use crucifixion as a means of execution. They maintained that only the corpse was hanged.
      marker-yv: yv-n
    - type: text
      text: 'afterward] you hang him on a tree [as a public example], [Josh 10:26, 27] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: his body shall not hang all night on the tree, but you shall most certainly bury him on the same day (for he who is hanged is cursed by God), so that you do not defile your land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God gives you as an inheritance. [Gal 3:13]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'It shall be that the elders of the city which is nearest to the dead man shall take a heifer of the herd, one which has not been worked and which has not pulled in a yoke; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and the elders of that city shall bring the heifer down to a [river] valley with running water, which has not been plowed or planted, and shall break the heifer’s neck there in the valley. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then the priests, the sons of Levi, shall approach, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has chosen them to serve Him and to bless in the Name (Presence) of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; and every dispute and every assault (violent crime) shall be settled by them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'All the elders of that city nearest to the dead man shall wash their hands over the heifer whose neck was broken in the valley; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and they shall respond, and say, ‘Our hands did not shed this blood, nor did our eyes see it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Forgive Your people Israel whom You have redeemed, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and do not put the guilt of innocent blood among Your people Israel.’ And the guilt of blood shall be forgiven them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So shall you remove the guilt of innocent blood from among you, when you do what is right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Domestic Relations
    marker-yv: yv-h
