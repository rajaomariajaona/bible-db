document_id: DEU.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Blessings at Gerizim
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now it shall be, if you diligently listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey the voice of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, being careful to do all of His commandments which I am commanding you today, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God will set you high above all the nations of the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the peoples of the earth will see that you are called by the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and they will be afraid of you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will give you great prosperity, in the offspring of your body and in the offspring of your livestock and the produce of your ground, in the land which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore to your fathers to give you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will open for you His good treasure house, the heavens, to give rain to your land in its season and to bless all the work of your hand; and you will lend to many nations, but you will not borrow. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will make you the head (leader) and not the tail (follower); and you will be above only, and you will not be beneath, if you listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to the commandments of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, which I am commanding you today, to observe them carefully. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do not turn aside from any of the words which I am commanding you today, to the right or to the left, to follow and serve other gods.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Consequences of Disobedience
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But it shall come about, if you do not listen to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey the voice of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, being careful to do all His commandments and His statutes which I am commanding you today, then all these curses will come upon you and overtake you:'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' cursed in the city and cursed in the field.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Your basket and your kneading bowl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' cursed.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The offspring of your body and the produce of your land, the offspring of your herd and the young of your flock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' cursed.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' cursed when you come in and you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' cursed when you go out.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these blessings will come upon you and overtake you if you pay attention to the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will send upon you curses, confusion, and rebuke in everything that you undertake to do, until you are destroyed, perishing quickly because of the evil of your deeds, because you have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsaken
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'turned away from Me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will make the pestilence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plague cling to you until He has consumed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eliminated you from the land which you are entering to possess. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will strike you with consumption [causing you to waste away] and with fever and with inflammation and with fiery heat and with the sword and with blight and with mildew [on your crops]; and they will pursue you until you perish. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The heaven which is over your head shall be bronze [giving no rain and blocking all prayers], and the earth which is under you, iron [hard to plow and yielding no produce]. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will make the rain of your land powder and dust; from heaven it will come down on you until you are destroyed.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will cause you to be defeated before your enemies; you will go out against them one way, but flee before them seven ways, and you will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an example of
    - type: text
      text: ' terror to all the kingdoms of the earth [when they see your destruction]. [2 Chr 29:8] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your carcasses will be food for all the birds of the sky and the beasts of the earth, and there will be no one to frighten them away.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will strike you with the boils of Egypt and with tumors and with the scab and the itch that you cannot heal. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will strike you with madness and with blindness and with bewilderment of heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you will be groping at noon [in broad daylight], just as the blind grope in the darkness, and nothing you do will prosper; but you will only be oppressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exploited and robbed continually, with no one to save you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' blessed in the city, and you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' blessed in the field.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be pledged to marry a wife, but another man will be intimate with her [before you]; you will build a house, but you will not live in it; you will plant a vineyard, but you will not use its fruit. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your ox will be slaughtered before your eyes, but you will not eat any of it; your donkey will be torn away from you, and it will not be returned to you; your sheep will be given to your enemies, and you will have no one to save you. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your sons and daughters will be given to another people, while your eyes look on and long for them continually; but there will be nothing you can do. [2 Chr 29:9] '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A people whom you do not know will eat the produce of your land and all the products of your labors, and you will never be anything but oppressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exploited and crushed continually. [Judg 6:1-6; 13:1] '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall be driven mad by the sight of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: your eyes which you
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the things you see. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will strike you on the knees and on the legs with sore boils that you cannot heal, from the sole of your foot to the crown of your head. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will bring you and your king, whom you appoint over you, to a nation which you and your fathers have never known; there you will [be forced to] serve other gods, [lifeless gods of] wood and stone. [2 Kin 17:4, 6; 24:12, 14; 25:7, 11; Dan 6:11, 12] '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you will become a horror, a proverb [a mere object lesson], and a taunt [a derisive joke] among all the people to which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' drives you.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You will bring out a great quantity of seed to the field, but you will gather in little, because the locusts will consume it. [Hag 1:6] '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will plant vineyards and cultivate them, but you will not drink the wine or gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the grapes,
    - type: text
      text: ' because the worm will eat them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fruit
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'offspring of your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: womb
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'body and the produce of your ground and the offspring of your animals, the offspring of your herd and the young of your flock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' blessed.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will have olive trees throughout your territory but you will not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Olive oil was commonly used like a cosmetic to soften the skin, and as a hair dressing.
      marker-yv: yv-n
    - type: text
      text: 'anoint yourselves with the oil, because your olives will drop off. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will have sons and daughters, but they will not be yours [for long], because they will go into captivity. [Lam 1:5] '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cricket will take possession of all your trees and the produce of your ground. [Joel 1:4] '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The stranger who lives among you will rise above you higher and higher, and you will go down lower and lower. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will lend to you [out of his affluence], but you will not lend to him [because of your poverty]; he will be the head, and you the tail.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “So all these curses will come on you and pursue you and overtake you until you are destroyed, because you would not obey the voice of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God by keeping His commandments and His statutes which He has commanded you. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will be a sign and a wonder to you and your descendants forever.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Because you did not serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God with a heart full of joy and gladness for the abundance of all things [with which He blessed you], '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: you will therefore serve your enemies whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sends against you, in hunger and in thirst, in nakedness and in lack of all things; and He will put an iron yoke [of slavery] on your neck until He has destroyed you.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will bring a nation against you from far away, from the end of the earth, [as swift] as the eagle swoops down [to attack], a nation whose language you will not understand, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Your basket and your kneading bowl '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' blessed.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: strong of face.
        - type: text
          text: ' Assyria and Babylonia have been suggested as prophetic fulfillments for this '
        - type: usfm
          marker: it
          children:
          - type: text
            text: nation,
        - type: text
          text: ' and prophecy often has more than one fulfillment.'
      marker-yv: yv-n
    - type: text
      text: 'defiant nation who will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: not lift up the face of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'have no respect for the old, nor show favor to the young, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and it will eat the offspring of your herd and the produce of your ground until you are destroyed, who will leave you no grain, new wine, or oil, nor the offspring of your herd or the young of your flock until they have caused you to perish. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will besiege you in all your cities until your high and fortified walls in which you trusted come down throughout your land; and they will besiege you in all your cities throughout your land which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has given you. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then you will eat the offspring of your own body [to avoid starvation], the flesh of your sons and daughters whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has given you, during the siege and the misery by which your enemy will oppress you. [2 Kin 6:24-29] '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man who is most refined and well-bred among you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: his eye will be evil toward
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'will be cruel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hostile toward his brother and toward '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the wife of his bosom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the wife he cherishes and toward the rest of his children who remain, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that he will not give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' one of them any of the flesh of his children '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The horror of the situation is understated: this self-absorbed father begins killing some of his children to feed himself. The rest of the family, also starving under the brutal conditions, probably want some of the macabre meal but the father keeps it all for himself.'
      marker-yv: yv-n
    - type: text
      text: 'which he will eat, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication is that under ordinary conditions, such a person would undoubtedly gag at eating perfectly good food that might be slightly stale or otherwise unappealing to him.
      marker-yv: yv-n
    - type: text
      text: 'because he has nothing else left, during the siege and the misery by which your enemy will oppress you in all your cities. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The most refined and well-bred woman among you, who would not venture to set the sole of her foot on the ground because she is so delicate and pampered, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:56 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: her eye will be evil toward
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
