verses:
  '1':
  - type: heading
    content: Blessings at Gerizim
  - type: text
    content: '“Now it shall be, if you diligently listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, being careful to do all of His commandments which I am commanding you today, the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will set you high above all the nations of the earth. '
  '10':
  - type: text
    content: So all the peoples of the earth will see that you are called by the name of the L
  - type: heading
    content: ord
  - type: text
    content: ', and they will be afraid of you. '
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will give you great prosperity, in the offspring of your body and in the offspring of your livestock and the produce of your ground, in the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' swore to your fathers to give you. '
  '12':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will open for you His good treasure house, the heavens, to give rain to your land in its season and to bless all the work of your hand; and you will lend to many nations, but you will not borrow. '
  '13':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will make you the head (leader) and not the tail (follower); and you will be above only, and you will not be beneath, if you listen '
  - type: text
    content: and
  - type: text
    content: ' pay attention to the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, which I am commanding you today, to observe them carefully. '
  '14':
  - type: text
    content: Do not turn aside from any of the words which I am commanding you today, to the right or to the left, to follow and serve other gods.
  - type: heading
    content: Consequences of Disobedience
  '15':
  - type: text
    content: '“But it shall come about, if you do not listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, being careful to do all His commandments and His statutes which I am commanding you today, then all these curses will come upon you and overtake you:'
  '16':
  - type: text
    content: '“You '
  - type: text
    content: will be
  - type: text
    content: ' cursed in the city and cursed in the field.'
  '17':
  - type: text
    content: '“Your basket and your kneading bowl '
  - type: text
    content: will be
  - type: text
    content: ' cursed.'
  '18':
  - type: text
    content: '“The offspring of your body and the produce of your land, the offspring of your herd and the young of your flock '
  - type: text
    content: will be
  - type: text
    content: ' cursed.'
  '19':
  - type: text
    content: '“You '
  - type: text
    content: will be
  - type: text
    content: ' cursed when you come in and you '
  - type: text
    content: will be
  - type: text
    content: ' cursed when you go out.'
  '2':
  - type: text
    content: All these blessings will come upon you and overtake you if you pay attention to the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '20':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' will send upon you curses, confusion, and rebuke in everything that you undertake to do, until you are destroyed, perishing quickly because of the evil of your deeds, because you have '
  - type: note
    content: Lit forsaken.
  - type: text
    content: 'turned away from Me. '
  '21':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will make the pestilence '
  - type: text
    content: and
  - type: text
    content: ' plague cling to you until He has consumed '
  - type: text
    content: and
  - type: text
    content: ' eliminated you from the land which you are entering to possess. '
  '22':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will strike you with consumption [causing you to waste away] and with fever and with inflammation and with fiery heat and with the sword and with blight and with mildew [on your crops]; and they will pursue you until you perish. '
  '23':
  - type: text
    content: 'The heaven which is over your head shall be bronze [giving no rain and blocking all prayers], and the earth which is under you, iron [hard to plow and yielding no produce]. '
  '24':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will make the rain of your land powder and dust; from heaven it will come down on you until you are destroyed.'
  '25':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' will cause you to be defeated before your enemies; you will go out against them one way, but flee before them seven ways, and you will be '
  - type: text
    content: an example of
  - type: text
    content: ' terror to all the kingdoms of the earth [when they see your destruction]. [2 Chr 29:8] '
  '26':
  - type: text
    content: Your carcasses will be food for all the birds of the sky and the beasts of the earth, and there will be no one to frighten them away.
  '27':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' will strike you with the boils of Egypt and with tumors and with the scab and the itch that you cannot heal. '
  '28':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will strike you with madness and with blindness and with bewilderment of heart '
  - type: text
    content: and
  - type: text
    content: ' mind; '
  '29':
  - type: text
    content: 'and you will be groping at noon [in broad daylight], just as the blind grope in the darkness, and nothing you do will prosper; but you will only be oppressed '
  - type: text
    content: and
  - type: text
    content: ' exploited and robbed continually, with no one to save you. '
  '3':
  - type: text
    content: '“You '
  - type: text
    content: will be
  - type: text
    content: ' blessed in the city, and you '
  - type: text
    content: will be
  - type: text
    content: ' blessed in the field.'
  '30':
  - type: text
    content: 'You will be pledged to marry a wife, but another man will be intimate with her [before you]; you will build a house, but you will not live in it; you will plant a vineyard, but you will not use its fruit. '
  '31':
  - type: text
    content: 'Your ox will be slaughtered before your eyes, but you will not eat any of it; your donkey will be torn away from you, and it will not be returned to you; your sheep will be given to your enemies, and you will have no one to save you. '
  '32':
  - type: text
    content: 'Your sons and daughters will be given to another people, while your eyes look on and long for them continually; but there will be nothing you can do. [2 Chr 29:9] '
  '33':
  - type: text
    content: 'A people whom you do not know will eat the produce of your land and all the products of your labors, and you will never be anything but oppressed '
  - type: text
    content: and
  - type: text
    content: ' exploited and crushed continually. [Judg 6:1-6; 13:1] '
  '34':
  - type: text
    content: 'You shall be driven mad by the sight of '
  - type: note
    content: Lit your eyes which you.
  - type: text
    content: 'the things you see. '
  '35':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will strike you on the knees and on the legs with sore boils that you cannot heal, from the sole of your foot to the crown of your head. '
  '36':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will bring you and your king, whom you appoint over you, to a nation which you and your fathers have never known; there you will [be forced to] serve other gods, [lifeless gods of] wood and stone. [2 Kin 17:4, 6; 24:12, 14; 25:7, 11; Dan 6:11, 12] '
  '37':
  - type: text
    content: And you will become a horror, a proverb [a mere object lesson], and a taunt [a derisive joke] among all the people to which the L
  - type: heading
    content: ord
  - type: text
    content: ' drives you.'
  '38':
  - type: text
    content: '“You will bring out a great quantity of seed to the field, but you will gather in little, because the locusts will consume it. [Hag 1:6] '
  '39':
  - type: text
    content: 'You will plant vineyards and cultivate them, but you will not drink the wine or gather '
  - type: text
    content: the grapes,
  - type: text
    content: ' because the worm will eat them. '
  '4':
  - type: text
    content: '“The '
  - type: note
    content: Lit fruit and so throughout.
  - type: text
    content: 'offspring of your '
  - type: note
    content: Lit womb.
  - type: text
    content: 'body and the produce of your ground and the offspring of your animals, the offspring of your herd and the young of your flock '
  - type: text
    content: will be
  - type: text
    content: ' blessed.'
  '40':
  - type: text
    content: 'You will have olive trees throughout your territory but you will not '
  - type: note
    content: Olive oil was commonly used like a cosmetic to soften the skin, and as a hair dressing.
  - type: text
    content: 'anoint yourselves with the oil, because your olives will drop off. '
  '41':
  - type: text
    content: 'You will have sons and daughters, but they will not be yours [for long], because they will go into captivity. [Lam 1:5] '
  '42':
  - type: text
    content: 'The cricket will take possession of all your trees and the produce of your ground. [Joel 1:4] '
  '43':
  - type: text
    content: 'The stranger who lives among you will rise above you higher and higher, and you will go down lower and lower. '
  '44':
  - type: text
    content: He will lend to you [out of his affluence], but you will not lend to him [because of your poverty]; he will be the head, and you the tail.
  '45':
  - type: text
    content: “So all these curses will come on you and pursue you and overtake you until you are destroyed, because you would not obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God by keeping His commandments and His statutes which He has commanded you. '
  '46':
  - type: text
    content: They will be a sign and a wonder to you and your descendants forever.
  '47':
  - type: text
    content: “Because you did not serve the L
  - type: heading
    content: ord
  - type: text
    content: ' your God with a heart full of joy and gladness for the abundance of all things [with which He blessed you], '
  '48':
  - type: text
    content: you will therefore serve your enemies whom the L
  - type: heading
    content: ord
  - type: text
    content: ' sends against you, in hunger and in thirst, in nakedness and in lack of all things; and He will put an iron yoke [of slavery] on your neck until He has destroyed you.'
  '49':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' will bring a nation against you from far away, from the end of the earth, [as swift] as the eagle swoops down [to attack], a nation whose language you will not understand, '
  '5':
  - type: text
    content: '“Your basket and your kneading bowl '
  - type: text
    content: will be
  - type: text
    content: ' blessed.'
  '50':
  - type: text
    content: 'a '
  - type: note
    content: Lit strong of face. Assyria and Babylonia have been suggested as prophetic fulfillments for this nation, and prophecy often has more than one fulfillment.
  - type: text
    content: 'defiant nation who will '
  - type: note
    content: Lit not lift up the face of.
  - type: text
    content: 'have no respect for the old, nor show favor to the young, '
  '51':
  - type: text
    content: 'and it will eat the offspring of your herd and the produce of your ground until you are destroyed, who will leave you no grain, new wine, or oil, nor the offspring of your herd or the young of your flock until they have caused you to perish. '
  '52':
  - type: text
    content: They will besiege you in all your cities until your high and fortified walls in which you trusted come down throughout your land; and they will besiege you in all your cities throughout your land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has given you. '
  '53':
  - type: text
    content: Then you will eat the offspring of your own body [to avoid starvation], the flesh of your sons and daughters whom the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has given you, during the siege and the misery by which your enemy will oppress you. [2 Kin 6:24-29] '
  '54':
  - type: text
    content: 'The man who is most refined and well-bred among you '
  - type: note
    content: Lit his eye will be evil toward.
  - type: text
    content: 'will be cruel '
  - type: text
    content: and
  - type: text
    content: ' hostile toward his brother and toward '
  - type: note
    content: Lit the wife of his bosom.
  - type: text
    content: 'the wife he cherishes and toward the rest of his children who remain, '
  '55':
  - type: text
    content: 'so that he will not give '
  - type: text
    content: even
  - type: text
    content: ' one of them any of the flesh of his children '
  - type: note
    content: 'The horror of the situation is understated: this self-absorbed father begins killing some of his children to feed himself. The rest of the family, also starving under the brutal conditions, probably want some of the macabre meal but the father keeps it all for himself.'
  - type: text
    content: 'which he will eat, '
  - type: note
    content: The implication is that under ordinary conditions, such a person would undoubtedly gag at eating perfectly good food that might be slightly stale or otherwise unappealing to him.
  - type: text
    content: 'because he has nothing else left, during the siege and the misery by which your enemy will oppress you in all your cities. '
  '56':
  - type: text
    content: 'The most refined and well-bred woman among you, who would not venture to set the sole of her foot on the ground because she is so delicate and pampered, '
  - type: note
    content: Lit her eye will be evil toward.
  - type: text
    content: 'will be cruel '
  - type: text
    content: and
  - type: text
    content: ' hostile toward '
  - type: note
    content: Lit the husband of her bosom.
  - type: text
    content: 'the husband she cherishes and toward her son and daughter, '
  '57':
  - type: text
    content: and toward her afterbirth that comes from between her legs and toward the children whom she bears; for she will eat them secretly for lack of anything else, during the siege and the misery by which your enemy will oppress you in your cities.
  '58':
  - type: text
    content: '“If you are not careful to do all the words of this law that are written in this book, to fear '
  - type: text
    content: and
  - type: text
    content: ' honor with reverence this glorious and awesome name, the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, '
  '59':
  - type: text
    content: then the L
  - type: heading
    content: ord
  - type: text
    content: ' will bring extraordinary plagues on you and your descendants, even severe and lasting plagues, and miserable and chronic sicknesses. '
  '6':
  - type: text
    content: '“You '
  - type: text
    content: will be
  - type: text
    content: ' blessed when you come in and you '
  - type: text
    content: will be
  - type: text
    content: ' blessed when you go out.'
  '60':
  - type: text
    content: 'Moreover, He will bring on you all the diseases of Egypt of which you were afraid, and they will cling to you. '
  '61':
  - type: text
    content: Also the L
  - type: heading
    content: ord
  - type: text
    content: ' will bring on you every sickness and every plague which is not written in this book of this law, until you are destroyed. '
  '62':
  - type: text
    content: Because you did not obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, you who were as numerous as the stars of heaven shall be left few in number. '
  '63':
  - type: text
    content: It shall come about that just as the L
  - type: heading
    content: ord
  - type: text
    content: ' delighted over you to make you prosper and multiply, so the L'
  - type: heading
    content: ord
  - type: text
    content: ' will delight over you to bring you to ruin and destruction; and you will be '
  - type: note
    content: There have been many “uprootings” from the land, notably those by Nebuchadnezzar (605, 587, 586 b.c.), Titus (a.d. 70), and later by the Emperor Hadrian (a.d. 135) who issued a proclamation forbidding Jews to live in Judea, or even to approach its border. In his attempt to eradicate Judaism, among other things, Hadrian renamed the Roman province of Syria Palaestina (after the Philistines).
  - type: text
    content: 'uprooted [violently] from the land which you are entering to possess. '
  '64':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' will scatter you among all the nations, from one end of the earth to the other; and there you will [be forced to] serve other gods, [lifeless gods of] wood and stone, which neither you nor your fathers have known. [Dan 3:6] '
  '65':
  - type: text
    content: Among those nations you will find no peace (rest), and there will be no resting place for the sole of your foot; but there the L
  - type: heading
    content: ord
  - type: text
    content: ' will give you a trembling heart, failing eyes, and a despairing soul. '
  '66':
  - type: text
    content: 'Your life will hang in doubt before you; night and day you will be filled with anxiety and have no assurance of living. '
  '67':
  - type: text
    content: 'In the morning you will say, ‘I wish it were evening!’ and in the evening you will say, ‘I wish it were morning!’—because of the dread in your heart with which you tremble, and because of the sight of your eyes which you will see. '
  '68':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will bring you back to Egypt in ships, by the way about which I said to you, ‘You will never see it again!’ And there you will offer yourselves for sale to your enemies as male and female slaves, but there will be no one to buy you.” [Hos 8:13]'
  '7':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' will cause the enemies who rise up against you to be defeated before you; they will come out against you one way, but flee before you seven ways. '
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will command the blessing upon you in your storehouses and in '
  - type: note
    content: Lit all to which you set your hand.
  - type: text
    content: all that you undertake, and He will bless you in the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you. '
  '9':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will establish you as a people holy [and set apart] to Himself, just as He has sworn to you, if you keep the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God and walk [that is, live your life each and every day] in His ways. '
