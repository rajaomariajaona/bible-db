    content: Paul Is Sent to Rome
  - type: text
    content: 'Now when it was determined that '
  - type: note
    content: Luke apparently stayed nearby, so that he could visit and assist Paul during the two years of his imprisonment.
  - type: text
    content: 'we (including Luke) would sail for Italy, they turned Paul and some other prisoners over to a centurion of the Augustan Regiment named Julius. '
  '10':
  - type: text
    content: 'saying, “Men, I sense [after careful thought and observation] that this voyage will certainly be a disaster and with great loss, not only of the cargo and the ship, but also of our lives.” '
  '11':
  - type: text
    content: 'However, the centurion [Julius, ranking officer on board] was persuaded by the pilot and the owner of the ship rather than by what Paul said. '
  '12':
  - type: text
    content: 'Because the harbor was not well situated for wintering, the majority [of the sailors] decided to put to sea from there, hoping somehow to reach Phoenix, a harbor of Crete facing southwest and northwest, and spend the winter '
  - type: text
    content: there
  - type: text
    content: .
  '13':
  - type: text
    content: So when the south wind blew softly, thinking that they had obtained their goal, they weighed anchor and sailed along Crete, hugging the coast.
  - type: heading
    content: Shipwreck
  '14':
  - type: text
    content: 'But soon afterward a violent wind, called Euraquilo [a northeaster, a tempestuous windstorm like a typhoon], came rushing down from the island; '
  '15':
  - type: text
    content: 'and when the ship was caught in it and could not head against the wind [to gain stability], we gave up and [letting her drift] were driven along. '
  '16':
  - type: text
    content: 'We ran under the shelter of a small island [twenty-five miles south of Crete] called Clauda, and with great difficulty we were able to get the '
