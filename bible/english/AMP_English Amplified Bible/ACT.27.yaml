  - type: note
    content: A sea anchor (para-anchor) is a sturdy fabric parachute set at the end of an anchor rode (designed for use with a rope/chain windlass) or other long line and sometimes weighted so it rides deep. A sea anchor is placed off the bow (front) so that the boat’s bow would be held into the wind while drifting or being blown downwind. One danger of this is that the rudder may be damaged and that is what happened later—the rudder was lost (see v 40). A drogue is set off the stern (back) when sailing downwind to slow the boat and provide more control. The sea anchor held the bow into the wind and slowed the drift. The Annapolis Book of Seamanship, Third Edition.
  - type: text
