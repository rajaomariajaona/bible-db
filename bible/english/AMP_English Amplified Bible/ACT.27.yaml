  - type: text
    content: '. '
  '42':
  - type: text
    content: 'The soldiers’ plan was to kill the prisoners, so that none of them would dive overboard '
  - type: text
    content: and
  - type: text
    content: ' swim [to land] and escape; '
  '43':
  - type: text
    content: 'but the centurion, wanting to save Paul, kept them from [carrying out] their plan. He commanded those who could swim to jump overboard first and get to the shore; '
  '44':
  - type: text
    content: 'and [he commanded] the rest '
  - type: text
    content: to follow
  - type: text
    content: ', some on [floating] planks, and others on various things from the ship. And so it was that all of them were brought safely to land.'
  '5':
  - type: text
    content: 'When we had sailed across the sea along the coasts of Cilicia and Pamphylia, we landed at Myra in Lycia [on the south coast of Asia Minor]. '
  '6':
  - type: text
    content: 'There the centurion [Julius] found an Alexandrian ship [a grain ship of the Roman fleet] sailing for Italy, and he put us aboard it. '
  '7':
  - type: text
    content: 'For a number of days we sailed slowly and arrived with difficulty off Cnidus; then, because the wind did not allow us to go farther, we sailed under the leeward (sheltered) side of Crete, off Salmone; '
  '8':
  - type: text
    content: and hugging the shore with difficulty, we came to a place called Fair Havens, near the city of Lasea [on the south side of Crete].
  '9':
  - type: text
    content: 'Now much time had been lost, and '
  - type: note
    content: Sailing in the Mediterranean was dangerous for ancient ships after the second week of September, and virtually impossible after Nov 11, so now there was no hope of reaching Italy before winter.
  - type: text
    content: 'navigation was dangerous, because even [the time for] the fast (Day of Atonement) was already over, so Paul '
  - type: text
