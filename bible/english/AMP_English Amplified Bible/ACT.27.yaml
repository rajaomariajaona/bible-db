  - type: text
    content: and
  - type: text
    content: ' lowered the sails and were driven along [backwards with the bow into the wind]. '
  '18':
  - type: text
    content: 'On the next day, as we were being violently tossed about by the storm [and taking on water], they began to jettison the cargo; '
  '19':
  - type: text
    content: 'and on the third day they threw the ship’s tackle (spare lines, blocks, miscellaneous equipment) overboard with their own hands [to further reduce the weight]. '
  '2':
  - type: text
    content: 'And going aboard a ship from Adramyttian which was about to sail for the ports along the [west] coast [province] of Asia [Minor], we put out to sea; and Aristarchus, a Macedonian from Thessalonica, accompanied us. '
  '20':
  - type: text
    content: Since neither sun nor stars appeared for many days, and no small storm kept raging about us, from then on all hope of our being saved was [growing worse and worse and] gradually abandoned.
  '21':
  - type: text
    content: 'After '
  - type: note
    content: Lit there was much loss of appetite.
  - type: text
    content: 'they had gone a long time without food [because of seasickness and stress], Paul stood up before them and said, “Men, you should have followed my advice and should not have set sail from Crete, and brought on this damage and loss. '
  '22':
  - type: text
    content: 'But '
  - type: text
    content: even
  - type: text
    content: ' now I urge you to keep up your courage '
  - type: text
    content: and
  - type: text
    content: ' be in good spirits, because there will be no loss of life among you, but '
  - type: text
    content: only loss
  - type: text
    content: ' of the ship. '
  '23':
  - type: text
    content: 'For this very night an angel of the God to whom I belong and whom I serve stood before me, '
  '24':
  - type: text
    content: 'and said, ‘Stop being afraid, Paul. You must stand before Caesar; and behold, God has given you [the lives of] all those who are sailing with you.’ '
  '25':
  - type: text
    content: 'So keep up your courage, men, for I believe God '
  - type: text
    content: and
  - type: text
    content: ' have complete confidence in Him that it will turn out exactly as I have been told; '
  '26':
  - type: text
    content: but we must run [the ship] aground on some island.”
  '27':
  - type: text
    content: 'The fourteenth night had come and we were drifting '
  - type: text
    content: and
  - type: text
    content: ' being driven about in the '
  - type: note
    content: The Ionian Sea was then considered part of the Adriatic (Adrian Gulf) which, in ancient times, extended much farther south than today’s Adriatic Sea.
  - type: text
    content: 'Adriatic Sea, when about midnight the sailors '
  - type: text
    content: began
  - type: text
    content: ' to suspect that they were approaching some land. '
  '28':
  - type: text
    content: 'So they took soundings [using a weighted line] and found [the depth to be] twenty fathoms (120 feet); and a little farther on they sounded again and found [the depth to be] fifteen fathoms (90 feet). '
  '29':
  - type: text
    content: 'Then fearing that we might run aground somewhere on the rocks, they dropped four anchors from the stern [to slow the ship] and kept wishing for daybreak to come. '
  '3':
  - type: text
    content: 'The next day we landed at Sidon; and Julius, treating Paul with [thoughtful] consideration, allowed him to go to his friends '
  - type: text
    content: there
  - type: text
    content: ' and be cared for '
  - type: text
    content: and
  - type: text
    content: ' refreshed. '
  '30':
  - type: text
    content: 'But as the sailors were trying to escape [secretly] from the ship and had let down the skiff into the sea, pretending that they were going to lay out anchors from the bow, '
  '31':
  - type: text
    content: 'Paul said to the centurion and the soldiers, “Unless these men remain on the ship, you cannot be saved.” '
  '32':
  - type: text
    content: 'Then the soldiers cut away the ropes that held the skiff and let it fall '
  - type: text
    content: and
  - type: text
    content: ' drift away.'
  '33':
  - type: text
    content: 'While they waited for the day to dawn, Paul encouraged them all [and told them] to have some food, saying, “This is the fourteenth day that you have been constantly on watch and going without food, having eaten nothing. '
  '34':
  - type: text
    content: 'So I urge you to eat some food, for this is for your survival; for not a hair from the head of any of you will perish.” '
  '35':
  - type: text
    content: 'Having said this, he took bread and gave thanks to God in front of them all, and he broke it and began to eat. '
  '36':
  - type: text
    content: 'Then all of them were encouraged '
  - type: text
    content: and
  - type: text
    content: ' their spirits improved, and they also ate some food. '
  '37':
  - type: text
    content: 'All told there were two hundred and seventy-six of us aboard the ship. '
  '38':
  - type: text
    content: 'After they had eaten enough, they '
  - type: text
    content: began
  - type: text
    content: ' to lighten the ship by throwing the '
  - type: note
    content: Wheat was a major Egyptian export.
  - type: text
    content: wheat [from Egypt] overboard into the sea.
  '39':
  - type: text
    content: 'When day came, they did not recognize the land, but they noticed a bay with a beach, and they decided to run the ship ashore there if they could. '
  '4':
  - type: text
    content: 'From there we put out to sea and sailed to the leeward (sheltered) side of Cyprus [for protection from weather] because the winds were against us. '
  '40':
  - type: text
    content: 'So they cut the cables '
  - type: text
    content: and
  - type: text
    content: ' severed the anchors and left them in the sea while at the same time '
  - type: note
    content: Ships of this period and region often had two large paddles on either side of the stern for steering, and when not in use they would be secured with ropes. This was particularly necessary in foul weather, where the sea might dislodge a rudder. Now that they were casting off, the rudders had to be freed and lowered into the water for use.
  - type: text
    content: 'unlashing the ropes of the rudders; and after hoisting the foresail to the wind, they headed steadily for the beach. '
  '41':
  - type: text
    content: 'But striking a '
  - type: note
    content: Lit place with water on both sides. This may have been a strip of land extending from the beach, but most of it evidently was awash by the waves at the time, since the centurion commanded everyone to swim or paddle on debris to land (vv 43f).
  - type: text
    content: 'reef with waves breaking in on either side, they ran the ship aground. The prow (forward point) stuck fast and remained immovable, while the stern '
  - type: text
