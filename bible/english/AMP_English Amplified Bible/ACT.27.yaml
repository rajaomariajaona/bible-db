document_id: ACT.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Is Sent to Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when it was determined that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Luke apparently stayed nearby, so that he could visit and assist Paul during the two years of his imprisonment.
    marker-yv: yv-n
  - type: text
    text: 'we (including Luke) would sail for Italy, they turned Paul and some other prisoners over to a centurion of the Augustan Regiment named Julius. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And going aboard a ship from Adramyttian which was about to sail for the ports along the [west] coast [province] of Asia [Minor], we put out to sea; and Aristarchus, a Macedonian from Thessalonica, accompanied us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The next day we landed at Sidon; and Julius, treating Paul with [thoughtful] consideration, allowed him to go to his friends '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' and be cared for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refreshed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'From there we put out to sea and sailed to the leeward (sheltered) side of Cyprus [for protection from weather] because the winds were against us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When we had sailed across the sea along the coasts of Cilicia and Pamphylia, we landed at Myra in Lycia [on the south coast of Asia Minor]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'There the centurion [Julius] found an Alexandrian ship [a grain ship of the Roman fleet] sailing for Italy, and he put us aboard it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For a number of days we sailed slowly and arrived with difficulty off Cnidus; then, because the wind did not allow us to go farther, we sailed under the leeward (sheltered) side of Crete, off Salmone; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and hugging the shore with difficulty, we came to a place called Fair Havens, near the city of Lasea [on the south side of Crete].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now much time had been lost, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sailing in the Mediterranean was dangerous for ancient ships after the second week of September, and virtually impossible after Nov 11, so now there was no hope of reaching Italy before winter.
    marker-yv: yv-n
  - type: text
    text: 'navigation was dangerous, because even [the time for] the fast (Day of Atonement) was already over, so Paul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to strongly warn them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'saying, “Men, I sense [after careful thought and observation] that this voyage will certainly be a disaster and with great loss, not only of the cargo and the ship, but also of our lives.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'However, the centurion [Julius, ranking officer on board] was persuaded by the pilot and the owner of the ship rather than by what Paul said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Because the harbor was not well situated for wintering, the majority [of the sailors] decided to put to sea from there, hoping somehow to reach Phoenix, a harbor of Crete facing southwest and northwest, and spend the winter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So when the south wind blew softly, thinking that they had obtained their goal, they weighed anchor and sailed along Crete, hugging the coast.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shipwreck
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But soon afterward a violent wind, called Euraquilo [a northeaster, a tempestuous windstorm like a typhoon], came rushing down from the island; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and when the ship was caught in it and could not head against the wind [to gain stability], we gave up and [letting her drift] were driven along. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'We ran under the shelter of a small island [twenty-five miles south of Crete] called Clauda, and with great difficulty we were able to get the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ship’s
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a small boat towed behind the ship for transportation to and from shore or as a lifeboat for emergencies. In a violent sea it might collide repeatedly with the ship and cause major damage.
    marker-yv: yv-n
  - type: text
    text: 'skiff on the deck '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secure it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After hoisting the skiff [on board], they used '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were ropes that were tightly wrapped around (and sometimes under) the hull of an ancient ship to firm and strengthen it in heavy seas.
    marker-yv: yv-n
  - type: text
    text: 'support lines [for frapping] to undergird '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brace the ship’s hull; and fearing that they might run aground on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the shallows of
  - type: text
    text: ' Syrtis [off the north coast of Africa], they let down the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A sea anchor (para-anchor) is a sturdy fabric parachute set at the end of an anchor rode (designed for use with a rope/chain windlass) or other long line and sometimes weighted so it rides deep. A sea anchor is placed off the bow (front) so that the boat’s bow would be held into the wind while drifting or being blown downwind. One danger of this is that the rudder may be damaged and that is what happened later—the rudder was lost (see v 40). A drogue is set off the stern (back) when sailing downwind to slow the boat and provide more control. The sea anchor held the bow into the wind and slowed the drift. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Annapolis Book of Seamanship,
      - type: text
        text: ' Third Edition.'
    marker-yv: yv-n
  - type: text
    text: 'sea anchor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lowered the sails and were driven along [backwards with the bow into the wind]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On the next day, as we were being violently tossed about by the storm [and taking on water], they began to jettison the cargo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and on the third day they threw the ship’s tackle (spare lines, blocks, miscellaneous equipment) overboard with their own hands [to further reduce the weight]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Since neither sun nor stars appeared for many days, and no small storm kept raging about us, from then on all hope of our being saved was [growing worse and worse and] gradually abandoned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: there was much loss of appetite
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'they had gone a long time without food [because of seasickness and stress], Paul stood up before them and said, “Men, you should have followed my advice and should not have set sail from Crete, and brought on this damage and loss. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' now I urge you to keep up your courage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be in good spirits, because there will be no loss of life among you, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only loss
  - type: text
    text: ' of the ship. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For this very night an angel of the God to whom I belong and whom I serve stood before me, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and said, ‘Stop being afraid, Paul. You must stand before Caesar; and behold, God has given you [the lives of] all those who are sailing with you.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So keep up your courage, men, for I believe God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have complete confidence in Him that it will turn out exactly as I have been told; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: but we must run [the ship] aground on some island.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The fourteenth night had come and we were drifting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' being driven about in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Ionian Sea was then considered part of the Adriatic (Adrian Gulf) which, in ancient times, extended much farther south than today’s Adriatic Sea.
    marker-yv: yv-n
  - type: text
    text: 'Adriatic Sea, when about midnight the sailors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to suspect that they were approaching some land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So they took soundings [using a weighted line] and found [the depth to be] twenty fathoms (120 feet); and a little farther on they sounded again and found [the depth to be] fifteen fathoms (90 feet). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then fearing that we might run aground somewhere on the rocks, they dropped four anchors from the stern [to slow the ship] and kept wishing for daybreak to come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But as the sailors were trying to escape [secretly] from the ship and had let down the skiff into the sea, pretending that they were going to lay out anchors from the bow, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Paul said to the centurion and the soldiers, “Unless these men remain on the ship, you cannot be saved.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then the soldiers cut away the ropes that held the skiff and let it fall '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drift away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'While they waited for the day to dawn, Paul encouraged them all [and told them] to have some food, saying, “This is the fourteenth day that you have been constantly on watch and going without food, having eaten nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So I urge you to eat some food, for this is for your survival; for not a hair from the head of any of you will perish.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Having said this, he took bread and gave thanks to God in front of them all, and he broke it and began to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then all of them were encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their spirits improved, and they also ate some food. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'All told there were two hundred and seventy-six of us aboard the ship. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'After they had eaten enough, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to lighten the ship by throwing the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Wheat was a major Egyptian export.
    marker-yv: yv-n
  - type: text
    text: wheat [from Egypt] overboard into the sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'When day came, they did not recognize the land, but they noticed a bay with a beach, and they decided to run the ship ashore there if they could. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So they cut the cables '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severed the anchors and left them in the sea while at the same time '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ships of this period and region often had two large paddles on either side of the stern for steering, and when not in use they would be secured with ropes. This was particularly necessary in foul weather, where the sea might dislodge a rudder. Now that they were casting off, the rudders had to be freed and lowered into the water for use.
    marker-yv: yv-n
  - type: text
    text: 'unlashing the ropes of the rudders; and after hoisting the foresail to the wind, they headed steadily for the beach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'But striking a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: place with water on both sides
      - type: text
        text: . This may have been a strip of land extending from the beach, but most of it evidently was awash by the waves at the time, since the centurion commanded everyone to swim or paddle on debris to land (vv 43f).
    marker-yv: yv-n
  - type: text
    text: 'reef with waves breaking in on either side, they ran the ship aground. The prow (forward point) stuck fast and remained immovable, while the stern '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to break up under the [violent] force '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the waves
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The soldiers’ plan was to kill the prisoners, so that none of them would dive overboard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swim [to land] and escape; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'but the centurion, wanting to save Paul, kept them from [carrying out] their plan. He commanded those who could swim to jump overboard first and get to the shore; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and [he commanded] the rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to follow
  - type: text
    text: ', some on [floating] planks, and others on various things from the ship. And so it was that all of them were brought safely to land.'
