document_id: 1KI.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon’s Palace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Solomon built his own house (palace) '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solomon built God’s house first, then his own. That his took much longer is no reflection on Solomon, because David had made every possible preparation for building the temple, greatly reducing the time needed to finish it (1 Chr 22:2-5). David even left plans and patterns for the temple and loyal friends eager to help (1 Kin 5:1; 1 Chr 28:14-19).
    marker-yv: yv-n
  - type: text
    text: 'in thirteen years, and he finished all of his house [in that time]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He also built the House of the Forest of Lebanon; its length was a hundred '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. one cubit is about 18 in.
    marker-yv: yv-n
  - type: text
    text: 'cubits (150 ft.), its width fifty cubits (75 ft.), and its height thirty cubits (45 ft.), upon four rows of cedar pillars, with cedar beams upon the pillars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And it was covered with cedar [as a roof] on the supporting beams that were upon the forty-five pillars, fifteen in each row. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There were artistic window
  - type: text
    text: ' frames in three rows, and window was opposite window in three tiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: All the doorways and doorposts [and windows] had squared [artistic] frames, and window was opposite window in three tiers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He also made the Hall of Pillars; its length was fifty cubits (75 ft.) and its width thirty cubits (45 ft.). There was a porch in front, and pillars and a threshold in front of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He made the hall for the throne where he was to judge, the Hall of Judgment; it was paneled with cedar from [one] floor to [another] floor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: His house where he was to live, the other courtyard behind the hall, was of similar workmanship. Solomon also made a house like this hall for Pharaoh’s daughter, whom he had married.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All these were of expensive stones, of stone cut according to measure, sawed with saws, inside and outside; even from the foundation to the coping, and from the outside to the great courtyard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The foundation was of expensive stones, large stones, stones of ten cubits and stones of eight cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And above [the foundation] were expensive stones, stones cut according to measure, and cedar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So the great courtyard all around had three rows of cut stone and a row of cedar beams like the inner courtyard of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the porch of the house.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hiram’s Work in the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now King Solomon sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and brought '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Huram
      - type: text
        text: ' in 2 Chr 2:3.'
    marker-yv: yv-n
  - type: text
    text: 'Hiram [a skilled craftsman] from Tyre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He was the son of a widow from the tribe of Naphtali, and his father was a man of Tyre, a craftsman in bronze. Hiram was filled with wisdom, understanding, and skill for doing any [kind of] work in bronze. So he came to King Solomon and did all his [bronze] work.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He cast the two pillars of bronze; the one pillar was eighteen cubits high, and a [measuring] line of twelve cubits measured the circumference of both. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He also made two capitals (crowns) of cast bronze to put on the tops of the pillars; the height of one capital was five cubits, and the height of the other capital was five cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There were
  - type: text
    text: ' nets of network (lattice-work) and twisted threads (wreaths) of chainwork for the capitals which were on the tops of the pillars, seven for one capital and seven for the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Hiram made the pillars [in this manner], and two rows around on the one network to cover the capitals which were on the top of the pomegranates; and he did the same for the other capital. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The capitals which were upon the top of the pillars in the porch were of lily work (design), four cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The capitals were on the two pillars and also above and close to the rounded projection which was beside the network. There were two hundred pomegranates in rows around both capitals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hiram set up the pillars at the porch of the temple; he set up the right pillar and named it Jachin (may he establish), and he set up the left pillar and named it Boaz (in it is strength). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: On the tops of the pillars was lily work (design). So the work of the pillars was finished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now he made the Sea (basin) of cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: metal,
  - type: text
    text: ' ten cubits from brim to brim, circular in form, five cubits high and thirty cubits in circumference. [Ex 30:17-21; 2 Chr 4:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Under its brim were gourds encircling it ten to a cubit, completely surrounding the Sea; the gourds were in two rows, cast in one piece with it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It stood on twelve oxen, three facing north, three west, three south, and three east; the Sea '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was set
  - type: text
    text: ' on top of them, and all their rear parts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pointed
  - type: text
    text: ' inward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'It was a hand width thick, and its brim was made like the brim of a cup, like a lily blossom. It held two thousand '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a Hebrew liquid measurement, about twenty-two liters per bath.
    marker-yv: yv-n
  - type: text
    text: baths.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Hiram made ten bronze stands [for smaller basins]; the length of each stand was four cubits, its width was four cubits and its height was three cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This was the design of the stands: they had borders between the frames. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'On the borders between the frames were lions, oxen, and cherubim; and on the frames there was a pedestal above. Beneath the lions and oxen were borders of hanging work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now each stand had four bronze wheels with bronze axles, and its four feet had supports [for a basin]. Beneath the basin were cast supports with borders at each side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Its opening inside the crown at the top '
  - type: usfm
    marker: it
    children:
    - type: text
      text: measured
  - type: text
    text: ' a cubit, and its opening was round like the design of a pedestal, a cubit and a half. Also on its opening were carvings, and their borders were square, not round. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Underneath the borders were four wheels, and the axles of the wheels were on the stand. And the height of a wheel was a cubit and a half. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The wheels were made like a chariot wheel: their axles, their rims, their spokes, and their hubs were all cast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now there were four supports at the four corners of each stand; the supports were part of the stand itself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'On the top of the stand there was a circular piece half a cubit high, and on the top of the stand its supports and borders were part of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And on the surface of its supports and its borders Hiram engraved cherubim, lions, and palm-shaped decorations, according to the [available] space for each, with borders all around. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He made the ten stands like this: they all had one casting, one measure, and one form.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then he made ten basins of bronze; each basin held forty baths and was four cubits, and there was one basin on each of the ten stands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Then he placed the bases, five on the right [or south] side of the house and five on the left [or north] side; and he set the Sea [of cast metal] on the right side of the house toward the southeast.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Now Hiram made the basins and the shovels and the bowls. So Hiram finished all the work which he did for King Solomon on the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the two pillars and the [two] bowls of the capitals which were on the top of the two pillars, and the two networks to cover the two bowls of the capitals which were on top of the pillars; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'and the four hundred pomegranates for the two networks, two rows of pomegranates for each network to cover the two bowls of the capitals that were on the tops of the pillars; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'the ten stands and the ten basins on the stands; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'one Sea (basin), and the twelve oxen under the Sea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: the pails, the shovels, and the bowls; all these utensils which Hiram made for King Solomon in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' were of polished bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'In the plain of the Jordan [River] the king cast them, in the clay ground between Succoth and Zarethan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Solomon left all the utensils '
  - type: usfm
    marker: it
    children:
    - type: text
      text: unweighed
  - type: text
    text: ', because there were so many; the weight of the bronze could not be determined.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Solomon made all the [other] furniture which was in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': the [incense] altar of gold; the table of gold on which was the bread of the Presence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'the lampstands of pure gold, five on the right side and five on the left, in front of the Holy of Holies (inner sanctuary); with the flowers, the lamps, and the tongs of gold; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: the cups, snuffers, bowls, spoons, firepans—of pure gold; and the hinges of gold [both] for the doors of the inner house, the Holy of Holies, and for the doors of the house, the main room [the Holy Place].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: So all the work that King Solomon did on the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was completed. Solomon brought in the things which David his father had dedicated—the silver, the gold, and the utensils—and he put them in the treasuries of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house.'
