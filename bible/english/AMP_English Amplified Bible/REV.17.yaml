        children:
        - type: text
          text: having a common purpose
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'agreeing together to surrender their kingdom to the beast, until the [prophetic] words of God will be fulfilled. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The woman whom you saw is the '
