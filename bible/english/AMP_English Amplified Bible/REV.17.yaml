  '3':
  - type: text
    content: 'And the angel carried me away in the Spirit into a wilderness; and I saw a woman sitting on a scarlet beast that was '
  - type: note
    content: Lit full of.
  - type: text
    content: 'entirely covered with blasphemous names, having seven heads and ten horns. [Acts 10:10, 11] '
  '4':
  - type: text
    content: 'The woman was dressed in purple and scarlet, and adorned with gold, precious stones and pearls, [and she was] holding in her hand a gold cup full of the abominations and the filth of her [sexual] immorality. [Jer 51:7] '
  '5':
  - type: text
    content: 'And on her forehead a name was written, a mystery: “BABYLON THE GREAT, THE MOTHER OF PROSTITUTES (false religions, heresies) AND OF THE ABOMINATIONS OF THE EARTH.” '
  '6':
  - type: text
    content: 'I saw that the woman was drunk with the blood of the saints (God’s people), and with the blood of the witnesses of Jesus [who were martyred]. When I saw her, I wondered in amazement. '
  '7':
  - type: text
    content: But the angel said to me, “Why do you wonder? I will explain to you the mystery of the woman and of the beast that carries her, which has the seven heads and ten horns.
  '8':
  - type: text
    content: '“The beast that you saw was [once], but [now] is not, and he is about to come up out of the abyss (the bottomless pit, the dwelling place of demons) and go to destruction (perdition). And the inhabitants of the earth, whose names have not been written in the Book of Life from the foundation of the world, will be astonished when they see the beast, because he was and is not and is yet to come [to earth]. [Dan 7:3] '
  '9':
  - type: text
    content: 'Here is the mind which has wisdom [and this is what it knows about the vision]. The seven heads are seven hills on which the woman sits; '
