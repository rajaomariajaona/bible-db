  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the angel said to me, “The waters which you saw, where the prostitute is seated, are peoples and multitudes and nations and languages. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the ten horns which you saw, and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Antichrist, the final world ruler.
    marker-yv: yv-n
  - type: text
    text: 'beast, these will hate the prostitute and will make her desolate and naked [stripped of her power and influence], and will eat her flesh and completely consume her with fire. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For God has put it in their hearts to carry out His purpose by '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
