          text: full of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'entirely covered with blasphemous names, having seven heads and ten horns. [Acts 10:10, 11] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The woman was dressed in purple and scarlet, and adorned with gold, precious stones and pearls, [and she was] holding in her hand a gold cup full of the abominations and the filth of her [sexual] immorality. [Jer 51:7] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And on her forehead a name was written, a mystery: “BABYLON THE GREAT, THE MOTHER OF PROSTITUTES (false religions, heresies) AND OF THE ABOMINATIONS OF THE EARTH.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I saw that the woman was drunk with the blood of the saints (God’s people), and with the blood of the witnesses of Jesus [who were martyred]. When I saw her, I wondered in amazement. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But the angel said to me, “Why do you wonder? I will explain to you the mystery of the woman and of the beast that carries her, which has the seven heads and ten horns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“The beast that you saw was [once], but [now] is not, and he is about to come up out of the abyss (the bottomless pit, the dwelling place of demons) and go to destruction (perdition). And the inhabitants of the earth, whose names have not been written in the Book of Life from the foundation of the world, will be astonished when they see the beast, because he was and is not and is yet to come [to earth]. [Dan 7:3] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Here is the mind which has wisdom [and this is what it knows about the vision]. The seven heads are seven hills on which the woman sits; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and they are seven kings: five of whom have fallen, one exists '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is reigning; the other [the seventh] has not yet come, and when he does come, he must remain a little while. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And the beast that [once] was but is not, is himself also an eighth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: king
  - type: text
    text: ' and is one of the seven, and he goes to destruction (perdition). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The ten horns that you saw are ten kings who have not yet received a kingdom, but [together] they receive authority as kings for a single hour [for a common purpose] along with the beast. [Dan 7:20-24] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: These [kings] have one purpose [one mind, one common goal], and they give their power and authority to the beast.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Victory for the Lamb
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They will wage war against the Lamb (Christ), and the Lamb will triumph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conquer them, because He is Lord of lords and King of kings, and those who are with Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on His side are the called and chosen (elect) and faithful.” [Dan 2:47; 1 Tim 6:15; Rev 19:16]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
