  - type: text
    content: descendants I will set upon your throne. [Ps 89:3, 4; Luke 1:69; Acts 2:30, 31]
  '12':
  - type: text
    content: “If your children will keep My covenant
  - type: text
    content: And My testimony which I will teach them,
  - type: text
    content: Their children also shall sit upon your throne forever.”
  '13':
  - type: text
    content: ¶For the L
  - type: heading
    content: ord
  - type: text
    content: ' has chosen Zion;'
  - type: text
    content: 'He has desired it for His dwelling place:'
  '14':
  - type: text
    content: “This is My resting place forever” [says the L
  - type: heading
    content: ord
  - type: text
    content: '];'
  - type: text
    content: “Here will I dwell, for I have desired it.
  '15':
  - type: text
    content: “I will abundantly bless her provisions;
  - type: text
    content: I will satisfy her poor with bread.
  '16':
  - type: text
    content: “Her priests also I will clothe with salvation,
  - type: text
    content: And her godly ones will shout aloud for joy.
  '17':
  - type: text
    content: “There I will make the horn (strength) of David grow;
  - type: text
