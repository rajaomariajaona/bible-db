  '18':
  - type: text
    content: “His enemies I will clothe with shame,
  - type: text
    content: But upon himself shall his crown shine.”
  '2':
  - type: text
    content: How he swore to the L
  - type: heading
    content: ord
  - type: text
    content: 'And vowed to the Mighty One of Jacob:'
  '3':
  - type: text
    content: “I absolutely will not enter my house,
  - type: text
    content: Nor get into my bed—
  '4':
  - type: text
    content: I certainly will not permit my eyes to sleep
  - type: text
    content: Nor my eyelids to slumber,
  '5':
  - type: text
    content: Until I find a place for the L
  - type: heading
