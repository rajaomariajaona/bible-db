          children:
          - type: text
            text: s
      - type: text
        text: ' Blessing Upon the Sanctuary.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Psalm 120 title note.
      marker-yv: yv-n
    - type: text
      text: Ascents.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', remember on David’s behalf'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All his hardship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' affliction;'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶For the sake of Your servant David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not turn away the face of Your anointed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore to David'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A truth from which He will not turn back:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“One of your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the fruit of your body
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: descendants I will set upon your throne. [Ps 89:3, 4; Luke 1:69; Acts 2:30, 31]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “If your children will keep My covenant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My testimony which I will teach them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children also shall sit upon your throne forever.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ¶For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has chosen Zion;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has desired it for His dwelling place:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “This is My resting place forever” [says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here will I dwell, for I have desired it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “I will abundantly bless her provisions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will satisfy her poor with bread.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Her priests also I will clothe with salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her godly ones will shout aloud for joy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “There I will make the horn (strength) of David grow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have prepared a lamp for My anointed [fulfilling the promises]. [1 Kin 11:36; 15:4; 2 Chr 21:7; Luke 1:69]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “His enemies I will clothe with shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But upon himself shall his crown shine.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: How he swore to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And vowed to the Mighty One of Jacob:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I absolutely will not enter my house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor get into my bed—
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I certainly will not permit my eyes to sleep
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor my eyelids to slumber,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Until I find a place for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A dwelling place for the Mighty One of Jacob (Israel).” [Acts 7:46]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶Behold, we heard of it at Ephrathah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We found it in the field of Jaar. [1 Sam 6:21]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let us go into His tabernacle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us worship at His footstool.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Arise, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to Your resting place,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You and the ark [the symbol] of Your strength.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Let Your priests be clothed with righteousness (right living),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let Your godly ones shout for joy.
