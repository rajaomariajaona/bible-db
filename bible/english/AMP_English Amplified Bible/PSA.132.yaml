  - type: text
    content: A dwelling place for the Mighty One of Jacob (Israel).” [Acts 7:46]
  '6':
  - type: text
    content: ¶Behold, we heard of it at Ephrathah;
  - type: text
    content: We found it in the field of Jaar. [1 Sam 6:21]
  '7':
  - type: text
    content: Let us go into His tabernacle;
  - type: text
    content: Let us worship at His footstool.
  '8':
  - type: text
    content: Arise, O L
  - type: heading
    content: ord
  - type: text
    content: ', to Your resting place,'
  - type: text
