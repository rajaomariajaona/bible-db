      text: Psalm 120
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Breaking Away from the Treacherous.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '120:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is possible that the fifteen psalms (chs 120-134) known as the “Songs of Degrees or Ascents” were sung by the caravans of pilgrims going up to attend the annual feasts at Jerusalem. But it is equally possible that the title has reference to some peculiarity in connection with the music or the manner of using it.
      marker-yv: yv-n
    - type: text
      text: Ascents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my trouble I cried to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He answered me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue my soul, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from lying lips,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from a deceitful tongue.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What shall be given to you, and what more shall be done to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You deceitful tongue?—
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sharp arrows of the warrior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '120:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The ancient rabbis explained that coals from a broom tree are unusual in that they continue burning on the inside even after they are extinguished on the outside. They compared this to a person who listens to slander: even if you try to persuade him otherwise and he seems to be convinced, he is still “burning” on the inside, i.e. still unconvinced.'
      marker-yv: yv-n
    - type: text
      text: burning coals of the broom tree.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Woe to me, for I sojourn in Meshech,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I live among the tents of Kedar [among hostile people]! [Gen 10:2; 25:13; Jer 49:28, 29]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Too long my soul has had its dwelling
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With those who hate peace.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am for peace, but when I speak,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are for war.
