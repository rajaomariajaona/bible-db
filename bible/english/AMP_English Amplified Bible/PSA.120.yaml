  - type: note
    content: It is possible that the fifteen psalms (chs 120-134) known as the “Songs of Degrees or Ascents” were sung by the caravans of pilgrims going up to attend the annual feasts at Jerusalem. But it is equally possible that the title has reference to some peculiarity in connection with the music or the manner of using it.
