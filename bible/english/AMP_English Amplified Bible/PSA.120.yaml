  - type: text
    content: 'With the '
  - type: note
    content: 'The ancient rabbis explained that coals from a broom tree are unusual in that they continue burning on the inside even after they are extinguished on the outside. They compared this to a person who listens to slander: even if you try to persuade him otherwise and he seems to be convinced, he is still “burning” on the inside, i.e. still unconvinced.'
  - type: text
    content: burning coals of the broom tree.
  '5':
  - type: text
    content: ¶Woe to me, for I sojourn in Meshech,
  - type: text
    content: and I live among the tents of Kedar [among hostile people]! [Gen 10:2; 25:13; Jer 49:28, 29]
  '6':
  - type: text
    content: Too long my soul has had its dwelling
  - type: text
    content: With those who hate peace.
  '7':
