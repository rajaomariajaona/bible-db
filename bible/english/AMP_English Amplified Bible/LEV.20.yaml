document_id: LEV.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: On Human Sacrifice and Immoralities
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '‘The man who commits adultery with another’s wife, even his neighbor’s wife, the adulterer and the adulteress shall most certainly be put to death. [John 8:4-11] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The man who lies [intimately] with his father’s wife has '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 18:7.
      marker-yv: yv-n
    - type: text
      text: 'uncovered his father’s nakedness; both of them shall most certainly be put to death; their blood is on them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'If a man lies [intimately] with his daughter-in-law, both of them shall most certainly be put to death; they have committed incest; their blood is on them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'If a man lies [intimately] with a male as if he were a woman, both men have committed a detestable (perverse, unnatural) act; they shall most certainly be put to death; their blood is on them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'It is immoral '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shameful if a man marries a woman and her mother; all three shall be burned in fire, so that there will be no immorality among you. [Josh 7:15, 25] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'If a man has intimate relations with an animal, he shall most certainly be put to death; you shall kill the animal also. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: If a woman approaches any animal to mate with it, you shall kill the woman and the animal; they shall most certainly be put to death; their blood is on them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '‘If a man takes his sister, his father’s daughter or his mother’s daughter, so that he sees her nakedness and she sees his nakedness, it is a disgrace; and they shall be cut off in the sight of the sons of their people. He has uncovered his sister’s nakedness; he bears [responsibility for] his guilt. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'If a man lies [intimately] with a woman during her menstrual cycle and uncovers her nakedness, he has exposed her flow, and she has uncovered the flow of her blood; both of them shall be cut off from their people [excluding them from the atonement made for them]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You shall not uncover the nakedness of (have intimate relations with) your mother’s sister or your father’s sister, for such a one has uncovered his blood relative; they will bear their guilt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Moreover, you shall say to the children of Israel,
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘
    - type: usfm
      marker: bd
      children:
      - type: text
        text: A
    - type: text
      text: 'ny Israelite or any stranger residing in Israel who gives any of his children to Molech (the god of the Ammonites) [as a human sacrifice] shall most certainly be put to death; the people of the land shall stone him with stones. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there is
    - type: text
      text: ' a man who lies [intimately] with his uncle’s wife, he has uncovered his uncle’s nakedness; they will bear their sin. They will die childless. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'If a man takes his brother’s wife, it is a hated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unclean thing; he has uncovered his brother’s nakedness. They will be childless.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘Therefore keep all My statutes and all My ordinances and do them, so that the land where I am bringing you to live may not vomit you out [as it did those before you]. [Lev 18:28] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'You shall not follow the statutes (laws, practices, customs) of the nation which I am driving out before you; for they did all these things, and therefore I have loathed them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But I have said to you, “You are to inherit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take possession of their land, and I will give it to you to possess, a land [of plenty] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: flowing with milk and honey.” I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, who has separated you from the peoples (pagan nations). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'You are therefore to make a distinction between the [ceremonially] clean animal and the unclean, and between the unclean bird and the clean; and you shall not make yourselves detestable by animal or by bird or by anything that crawls on the ground, which I have set apart from you as unclean. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: You are to be holy to Me; for I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' am holy, and have set you apart from the peoples (nations) to be Mine.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ‘A man or woman who is a medium [who pretends to consult the dead] or who is a spiritist shall most certainly be put to death, and be stoned with stones; their blood is on them.’ ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I will also set My face against that man [opposing him, withdrawing My protection from him] and will cut him off from his people [excluding him from the atonement made for them], because he has given some of his children to Molech, so as to defile My sanctuary and profane My holy name. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'If the people of the land should ever tolerate that man when he gives any of his children [as a burnt offering] to Molech, and fail to put him to death [as My law requires], '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'then I shall set My face against that man and against his [extended] family, and I will cut off from their people both him and all who follow him in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. abandon the true God for an idol.
      marker-yv: yv-n
    - type: text
      text: playing the prostitute (commit apostasy) with Molech.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '‘As for the person who turns to mediums [who consult the dead] or to spiritists, to play the prostitute after them, I shall set My face against that person and will cut him off from his people [excluding him from the atonement made for them]. [Is 54:5] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You shall consecrate yourselves therefore, and be holy; for I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You shall keep My statutes and do them. I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who sanctifies you.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ‘If anyone curses his father or mother, he shall most certainly be put to death; he has cursed his father or mother; his blood is on him [that is, he bears full responsibility for the consequences].
