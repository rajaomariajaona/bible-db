document_id: MIC.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rulers Denounced
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: And I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear now, heads of Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rulers of the house of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is it not for you to know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' administer justice?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Who build Zion with blood [and extortion and murder]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Jerusalem with violent injustice.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Her leaders pronounce judgment for a bribe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her priests teach for a fee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her prophets foretell for money;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they lean on the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is not the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' among us?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No tragedy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' distress will come on us.” [Is 1:10-15]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Therefore, on account of you
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zion (City of David) was the elevated area between the Tyropoeon and Kidron valleys (southeastern area of Jerusalem during the time of Jesus). The city was the capital of Israel (the united kingdom) during the reigns of David and Solomon, and the site of Solomon’s temple.
      marker-yv: yv-n
    - type: text
      text: Zion shall be plowed like a field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jerusalem shall become '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In 586 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . Jerusalem (including Solomon’s temple) was destroyed by Nebuchadnezzar ruler of Babylon (Chaldean Dynasty).
      marker-yv: yv-n
    - type: text
      text: a heap of ruins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the mountain of the house [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall become
    - type: text
      text: ' like a densely wooded hill. [Jer 26:17-19]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “You who hate good and love evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who tear the skin off my people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their flesh from their bones;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You who eat the flesh of my people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strip off their skin from them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break their bones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And chop them in pieces as for the pot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like meat in a kettle.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then they will cry to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He will not answer them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, He will even hide His face from them at that time [withholding His mercy]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because they have practiced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tolerated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ignored evil acts. [Is 1:15]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' concerning the [false] prophets who lead my people astray;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When they have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something good
    - type: text
      text: ' to bite with their teeth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They call out, “Peace,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But against the one who gives them nothing to eat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They declare a holy war.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it will
    - type: text
      text: ' be night (tragedy) for you—without vision,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And darkness (cataclysm) for you—without foresight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun shall go down on the [false] prophets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the day shall become dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' black over them.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The seers shall be ashamed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the diviners discredited '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' embarrassed;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, they shall all cover their mouths [in shame]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because there is no answer from God.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But in fact, I am filled with power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with justice and might,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To declare to Jacob his transgression
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to Israel his sin.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now hear this, you heads of the house of Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rulers of the house of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who hate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reject justice'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And twist everything that is straight,
