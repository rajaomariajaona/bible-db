  '7':
  - type: text
    content: 'Remember your leaders [for it was they] who brought you the word of God; and consider the result of their conduct [the outcome of their godly lives], and imitate their faith [their conviction that God exists and is the Creator and Ruler of all things, the Provider of eternal salvation through Christ, and imitate their reliance on God with absolute trust and confidence in His power, wisdom, and goodness]. '
  '8':
  - type: text
    content: 'Jesus Christ is [eternally changeless, always] the same yesterday and today and forever. '
  '9':
  - type: text
    content: 'Do not be carried away by diverse and strange teachings; for it is good for the heart to be established '
  - type: text
