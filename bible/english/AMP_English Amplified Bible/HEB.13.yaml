document_id: HEB.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Changeless Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let love of your fellow believers continue. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Do not neglect to extend hospitality to strangers [especially among the family of believers—being friendly, cordial, and gracious, sharing the comforts of your home and doing your part generously], for by this some have entertained angels without knowing it. [Gen 18:1-8; 19:1-3; Judg 6:11-24; 13:6-20] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Remember those who are in prison, as if you were their fellow prisoner, and those who are mistreated, since you also are in the body [and subject to physical suffering]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Marriage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is to be held
  - type: text
    text: ' in honor among all [that is, regarded as something of great value], and the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: marriage
  - type: text
    text: ' bed undefiled [by immorality or by any sexual sin]; for God will judge the sexually immoral and adulterous. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Let your character [your moral essence, your inner nature] be free from the love of money [shun greed—be financially ethical], being content with what you have; for He has said, “I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: will never
  - type: text
    text: ' [under any circumstances] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: desert you
  - type: text
    text: ' [nor give you up nor leave you without support, nor will I in any degree leave you helpless], '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nor will
  - type: text
    text: ' I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: forsake
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: let you down
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: relax
  - type: text
    text: ' M'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: y hold on you
  - type: text
    text: ' [assuredly not]!” [Josh 1:5] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So we take comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently say,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “T
  - type: usfm
    marker: sc
    children:
    - type: text
      text: he
  - type: text
    text: ' L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord is my
  - type: text
    text: ' H'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: elper
  - type: text
    text: ' [in time of need], I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: will not be afraid
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: W
  - type: usfm
    marker: sc
    children:
    - type: text
      text: hat will man do to me
  - type: text
    text: ?” [Ps 27:1; 118:6]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Remember your leaders [for it was they] who brought you the word of God; and consider the result of their conduct [the outcome of their godly lives], and imitate their faith [their conviction that God exists and is the Creator and Ruler of all things, the Provider of eternal salvation through Christ, and imitate their reliance on God with absolute trust and confidence in His power, wisdom, and goodness]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus Christ is [eternally changeless, always] the same yesterday and today and forever. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do not be carried away by diverse and strange teachings; for it is good for the heart to be established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthened by grace and not by foods [rules of diet and ritualistic meals], which bring no benefit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' spiritual growth to those who observe them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We have an altar from which those who serve the tabernacle (sacred tent) have no right to eat. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the bodies of those animals whose blood is brought into the sanctuary by the high priest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as an offering
  - type: text
    text: ' for sin, are burned outside the camp. [Lev 16:27] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore Jesus also suffered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' died outside the [city] gate so that He might sanctify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set apart for God as holy the people [who believe] through [the shedding of] His own blood. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So, let us go out to Him outside the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. leaving the ways and traditions of Judaism (the Levitical system, the old covenant) and adhering to the teaching (new covenant) of the Christ.
    marker-yv: yv-n
  - type: text
    text: 'camp, bearing His contempt [the disgrace and shame that He had to suffer]. [Lev 16:27] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For here we have no lasting city, but we are seeking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the city
  - type: text
    text: ' which is to come.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God-pleasing Sacrifices
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Through Him, therefore, let us at all times offer up to God a sacrifice of praise, which is the fruit of lips that thankfully acknowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify His name. [Lev 7:12; Is 57:19; Hos 14:2] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Do not neglect to do good, to contribute [to the needy of the church as an expression of fellowship], for such sacrifices are always pleasing to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Obey your [spiritual] leaders and submit to them [recognizing their authority over you], for they are keeping watch over your souls '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' continually guarding your spiritual welfare as those who will give an account [of their stewardship of you]. Let them do this with joy and not with grief '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groans, for this would be of no benefit to you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Keep praying for us, for we are convinced that we have a good conscience, seeking to conduct ourselves honorably [that is, with moral courage and personal integrity] in all things. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And I urge all of you to pray earnestly, so that I may be restored to you soon.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Benediction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now may the God of peace [the source of serenity and spiritual well-being] who brought up from the dead our Lord Jesus, the great Shepherd of the sheep, through the blood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that sealed and ratified
  - type: text
    text: ' the eternal covenant, [Is 55:3; 63:11; Ezek 37:26; Zech 9:11] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'equip you with every good thing to carry out His will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen you [making you complete and perfect as you ought to be], accomplishing in us that which is pleasing in His sight, through Jesus Christ, to whom be the glory forever and ever. Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I call on you, brothers and sisters, listen [patiently] to this message of exhortation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouragement, for I have written to you briefly. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Notice that our brother Timothy has been released [from prison]. If he comes soon, I will see you [along with him]. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Give our greetings to all of your [spiritual] leaders and to all of the saints (God’s people). Those [Christians] from Italy send you their greetings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Grace be with you all.
