  '1':
  - type: heading
    content: The Changeless Christ
  - type: text
    content: 'Let love of your fellow believers continue. '
  '10':
  - type: text
    content: 'We have an altar from which those who serve the tabernacle (sacred tent) have no right to eat. '
  '11':
  - type: text
    content: 'For the bodies of those animals whose blood is brought into the sanctuary by the high priest '
  - type: text
    content: as an offering
  - type: text
    content: ' for sin, are burned outside the camp. [Lev 16:27] '
  '12':
  - type: text
    content: 'Therefore Jesus also suffered '
  - type: text
    content: and
  - type: text
    content: ' died outside the [city] gate so that He might sanctify '
  - type: text
    content: and
  - type: text
    content: ' set apart for God as holy the people [who believe] through [the shedding of] His own blood. '
  '13':
  - type: text
    content: 'So, let us go out to Him outside the '
  - type: note
    content: I.e. leaving the ways and traditions of Judaism (the Levitical system, the old covenant) and adhering to the teaching (new covenant) of the Christ.
  - type: text
    content: 'camp, bearing His contempt [the disgrace and shame that He had to suffer]. [Lev 16:27] '
  '14':
  - type: text
    content: 'For here we have no lasting city, but we are seeking '
  - type: text
    content: the city
  - type: text
    content: ' which is to come.'
  - type: heading
    content: God-pleasing Sacrifices
  '15':
  - type: text
    content: 'Through Him, therefore, let us at all times offer up to God a sacrifice of praise, which is the fruit of lips that thankfully acknowledge '
  - type: text
    content: and
  - type: text
    content: ' confess '
  - type: text
    content: and
  - type: text
    content: ' glorify His name. [Lev 7:12; Is 57:19; Hos 14:2] '
  '16':
  - type: text
    content: Do not neglect to do good, to contribute [to the needy of the church as an expression of fellowship], for such sacrifices are always pleasing to God.
  '17':
  - type: text
    content: 'Obey your [spiritual] leaders and submit to them [recognizing their authority over you], for they are keeping watch over your souls '
  - type: text
    content: and
  - type: text
    content: ' continually guarding your spiritual welfare as those who will give an account [of their stewardship of you]. Let them do this with joy and not with grief '
  - type: text
    content: and
  - type: text
    content: ' groans, for this would be of no benefit to you.'
  '18':
  - type: text
    content: 'Keep praying for us, for we are convinced that we have a good conscience, seeking to conduct ourselves honorably [that is, with moral courage and personal integrity] in all things. '
  '19':
  - type: text
    content: And I urge all of you to pray earnestly, so that I may be restored to you soon.
  - type: heading
    content: Benediction
  '2':
  - type: text
    content: 'Do not neglect to extend hospitality to strangers [especially among the family of believers—being friendly, cordial, and gracious, sharing the comforts of your home and doing your part generously], for by this some have entertained angels without knowing it. [Gen 18:1-8; 19:1-3; Judg 6:11-24; 13:6-20] '
  '20':
  - type: text
    content: 'Now may the God of peace [the source of serenity and spiritual well-being] who brought up from the dead our Lord Jesus, the great Shepherd of the sheep, through the blood '
  - type: text
    content: that sealed and ratified
  - type: text
    content: ' the eternal covenant, [Is 55:3; 63:11; Ezek 37:26; Zech 9:11] '
  '21':
  - type: text
    content: 'equip you with every good thing to carry out His will '
  - type: text
    content: and
  - type: text
    content: ' strengthen you [making you complete and perfect as you ought to be], accomplishing in us that which is pleasing in His sight, through Jesus Christ, to whom be the glory forever and ever. Amen.'
  '22':
  - type: text
    content: 'I call on you, brothers and sisters, listen [patiently] to this message of exhortation '
  - type: text
    content: and
  - type: text
    content: ' encouragement, for I have written to you briefly. '
  '23':
  - type: text
    content: 'Notice that our brother Timothy has been released [from prison]. If he comes soon, I will see you [along with him]. '
  '24':
  - type: text
    content: Give our greetings to all of your [spiritual] leaders and to all of the saints (God’s people). Those [Christians] from Italy send you their greetings.
  '25':
  - type: text
    content: Grace be with you all.
  '3':
  - type: text
    content: 'Remember those who are in prison, as if you were their fellow prisoner, and those who are mistreated, since you also are in the body [and subject to physical suffering]. '
