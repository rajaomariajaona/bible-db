document_id: LAM.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Distress of the Siege Described
  - type: text
    content: 'How dark '
  - type: text
    content: and
  - type: text
    content: ' dim the gold has become,'
  - type: text
    content: How the pure gold has changed!
  - type: text
    content: 'The sacred stones [of the temple] are poured out '
  - type: text
    content: and
  - type: text
    content: ' scattered'
  - type: text
    content: At the head of every street.
  '10':
  - type: text
    content: The hands of compassionate women
  - type: text
    content: Boiled their own children;
  - type: text
    content: They became food for them
  - type: text
    content: Because of the destruction of the daughter of my people [Judah].
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has fulfilled His wrath;'
  - type: text
    content: He has poured out His fierce anger
  - type: text
    content: And has kindled a fire in Zion
  - type: text
    content: That has consumed her foundations.
  '12':
  - type: text
    content: The kings of the earth did not believe,
  - type: text
    content: Nor did any of the inhabitants of the earth,
  - type: text
    content: That the adversary (oppressor) and enemy
  - type: text
    content: Could enter the gates of Jerusalem.
  '13':
  - type: text
    content: Because of the sins of her [counterfeit] prophets
  - type: text
    content: And the wickedness of her [unfaithful] priests,
  - type: text
    content: Who have shed in her midst
  - type: text
    content: 'The blood of the just '
  - type: text
    content: and
  - type: text
    content: ' righteous;'
  '14':
  - type: text
    content: They wandered, blind, in the streets;
  - type: text
    content: They were defiled with blood
  - type: text
    content: So that no one could touch their garments.
  '15':
  - type: text
    content: People cried to them, “Go away! Unclean!
  - type: text
    content: Depart! Depart! Do not touch!”
  - type: text
    content: So they fled, then they wandered [as fugitives];
  - type: text
    content: People among the nations said,
  - type: text
    content: '“They shall not stay here any longer '
  - type: text
    content: with us
  - type: text
    content: .”
  '16':
  - type: text
    content: The presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' scattered them [among the nations];'
  - type: text
    content: He will not continue to look after them.
  - type: text
    content: They did not honor the priests;
  - type: text
    content: They did not favor the elders.
  '17':
  - type: text
    content: '[And as for us,] yet our eyes failed,'
  - type: text
    content: Looking in vain for help.
  - type: text
    content: Watching [from the towers] we watched
  - type: text
    content: For a nation that could not save. [Ezek 29:16]
  '18':
  - type: text
    content: The enemy hunted our steps,
  - type: text
    content: So that we could not walk in our streets;
  - type: text
    content: Our end drew near,
  - type: text
    content: Our days were finished
  - type: text
    content: For our end had come.
  '19':
  - type: text
    content: Our pursuers were swifter
  - type: text
    content: Than the eagles of the sky;
  - type: text
    content: They pursued us on the mountains,
  - type: text
    content: They waited in ambush for us in the wilderness.
  '2':
  - type: text
    content: The [noble and] precious sons of Zion,
  - type: text
    content: '[Once] worth their weight in fine gold,'
  - type: text
    content: How they are regarded [merely] as earthen jars,
  - type: text
    content: The work of a potter’s hands! [Is 30:14; Jer 19:11; 2 Cor 4:7]
  '20':
  - type: text
    content: The breath of our nostrils, the anointed of the L
  - type: heading
    content: ord
  - type: text
    content: ' [our king],'
  - type: text
    content: Was captured in their snares,
  - type: text
    content: He of whom we had said, “Under his shadow
  - type: text
    content: We shall live among the nations.”
  '21':
  - type: text
    content: Rejoice and be glad, O Daughter of Edom,
  - type: text
    content: Who lives in the land of Uz.
  - type: text
    content: But the cup [of the wine of God’s wrath] will pass to you as well;
  - type: text
    content: You will become drunk and make yourself naked. [Jer 25:17]
  '22':
  - type: text
    content: ' '
  - type: text
    content: The punishment
  - type: text
    content: ' of your sin has been completed, O Daughter of Zion;'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will no longer send you into exile.'
  - type: text
    content: But He will punish your sin, O Daughter of Edom;
  - type: text
    content: He will expose your sins. [Ps 137:7]
  '3':
  - type: text
    content: Even the jackals offer the breast,
  - type: text
    content: They nurse their young;
  - type: text
    content: But the daughter of my people has become cruel
  - type: text
    content: Like ostriches in the wilderness [that desert their young].
  '4':
  - type: text
    content: The tongue of the infant clings
  - type: text
    content: To the roof of its mouth because of thirst;
  - type: text
    content: The little ones ask for food,
  - type: text
    content: But no one gives it to them.
  '5':
  - type: text
    content: Those who feasted on delicacies
  - type: text
    content: Are perishing in the streets;
  - type: text
    content: Those reared in purple [as nobles]
  - type: text
    content: Embrace ash heaps.
  '6':
  - type: text
    content: For the [punishment of the] wickedness of the daughter of my people [Jerusalem]
  - type: text
    content: Is greater than the [punishment for the] sin of Sodom,
  - type: text
    content: Which was overthrown in a moment,
  - type: text
    content: And no hands were turned toward her [to offer help]. [Gen 19:25]
  '7':
  - type: text
    content: Her princes were purer than snow,
  - type: text
    content: They were whiter than milk [in appearance];
  - type: text
    content: They were more ruddy in body than rubies,
  - type: text
    content: Their polishing was like lapis lazuli (sapphire).
  '8':
  - type: text
    content: Their appearance is [now] blacker than soot [because of the prolonged famine];
  - type: text
    content: They are not recognized in the streets;
  - type: text
    content: Their skin clings to their bones;
  - type: text
    content: It is withered, and it has become [dry] like wood.
  '9':
  - type: text
    content: Those killed with the sword
  - type: text
    content: Are more fortunate than those killed with hunger;
  - type: text
    content: 'For the hungry pine '
  - type: text
    content: and
  - type: text
    content: ' ebb away,'
  - type: text
    content: For the lack of the fruits of the field.
