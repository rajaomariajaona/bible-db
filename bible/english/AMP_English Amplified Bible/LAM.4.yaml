document_id: LAM.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Distress of the Siege Described
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'How dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dim the gold has become,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How the pure gold has changed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The sacred stones [of the temple] are poured out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scattered'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the head of every street.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The hands of compassionate women
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Boiled their own children;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They became food for them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the destruction of the daughter of my people [Judah].
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has fulfilled His wrath;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has poured out His fierce anger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And has kindled a fire in Zion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That has consumed her foundations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The kings of the earth did not believe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor did any of the inhabitants of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the adversary (oppressor) and enemy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Could enter the gates of Jerusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Because of the sins of her [counterfeit] prophets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the wickedness of her [unfaithful] priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who have shed in her midst
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The blood of the just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteous;'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They wandered, blind, in the streets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were defiled with blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that no one could touch their garments.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: People cried to them, “Go away! Unclean!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depart! Depart! Do not touch!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they fled, then they wandered [as fugitives];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People among the nations said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They shall not stay here any longer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with us
    - type: text
      text: .”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The presence of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' scattered them [among the nations];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not continue to look after them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not honor the priests;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not favor the elders.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '[And as for us,] yet our eyes failed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Looking in vain for help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watching [from the towers] we watched
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a nation that could not save. [Ezek 29:16]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The enemy hunted our steps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that we could not walk in our streets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our end drew near,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our days were finished
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For our end had come.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Our pursuers were swifter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than the eagles of the sky;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pursued us on the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They waited in ambush for us in the wilderness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The [noble and] precious sons of Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Once] worth their weight in fine gold,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How they are regarded [merely] as earthen jars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The work of a potter’s hands! [Is 30:14; Jer 19:11; 2 Cor 4:7]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The breath of our nostrils, the anointed of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [our king],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was captured in their snares,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He of whom we had said, “Under his shadow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We shall live among the nations.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Rejoice and be glad, O Daughter of Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who lives in the land of Uz.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the cup [of the wine of God’s wrath] will pass to you as well;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will become drunk and make yourself naked. [Jer 25:17]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The punishment
    - type: text
      text: ' of your sin has been completed, O Daughter of Zion;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will no longer send you into exile.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He will punish your sin, O Daughter of Edom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will expose your sins. [Ps 137:7]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even the jackals offer the breast,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They nurse their young;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the daughter of my people has become cruel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like ostriches in the wilderness [that desert their young].
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The tongue of the infant clings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the roof of its mouth because of thirst;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The little ones ask for food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But no one gives it to them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who feasted on delicacies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are perishing in the streets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those reared in purple [as nobles]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Embrace ash heaps.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For the [punishment of the] wickedness of the daughter of my people [Jerusalem]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is greater than the [punishment for the] sin of Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which was overthrown in a moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no hands were turned toward her [to offer help]. [Gen 19:25]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Her princes were purer than snow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were whiter than milk [in appearance];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were more ruddy in body than rubies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their polishing was like lapis lazuli (sapphire).
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Their appearance is [now] blacker than soot [because of the prolonged famine];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are not recognized in the streets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their skin clings to their bones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is withered, and it has become [dry] like wood.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Those killed with the sword
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are more fortunate than those killed with hunger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the hungry pine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ebb away,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the lack of the fruits of the field.
