document_id: 1CH.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Reuben
  - type: text
    content: 'Now [we come to] the sons of Reuben the firstborn of Israel—for Reuben was the eldest, but because he defiled his father’s bed [with Bilhah his father’s '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubine], his birthright was given to [Manasseh and Ephraim] the sons of Joseph [the favorite] son of Israel, so that he is not enrolled in the genealogy according to the birthright. [Gen 35:22; 48:15-22; 49:3, 4] '
  '10':
  - type: text
    content: 'In the days of King Saul they made war with the '
  - type: note
    content: A tribal people believed to be related to Hagar, the mother of Ishmael.
  - type: text
    content: Hagrites, who fell by their hands; and they lived in their tents throughout all the land east of Gilead.
  - type: heading
    content: Descendants of Gad
  '11':
  - type: text
    content: 'The sons of Gad lived opposite them in the land of Bashan, as far as Salecah: '
  '12':
  - type: text
    content: 'Joel was the chief, Shapham the second, then Janai and Shaphat in Bashan. '
  '13':
  - type: text
    content: 'Their relatives from the households of their fathers: Michael, Meshullam, Sheba, Jorai, Jacan, Zia, and Eber—seven '
  - type: text
    content: in all
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'These were the sons of Abihail the son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz; '
  '15':
  - type: text
    content: 'Ahi the son of Abdiel, the son of Guni, was chief in their fathers’ households. '
  '16':
  - type: text
    content: 'They lived in Gilead, in Bashan and in its towns, and in all the [surrounding] pasture lands of Sharon, as far as their borders. '
  '17':
  - type: text
    content: All these were enrolled in the genealogies in the days of Jotham king of Judah and in the days of Jeroboam [II] king of Israel.
  '18':
  - type: text
    content: 'The sons of Reuben, the Gadites, and the half-tribe of Manasseh—valiant men able to bear shield and sword, and to shoot with the bow, and skillful in war—were 44,760 who went to war. '
  '19':
  - type: text
    content: 'And these Israelites, [on the east side of the Jordan River] made war with the Hagrites [a tribe of northern Arabia], Jetur, Naphish, and Nodab. '
  '2':
  - type: text
    content: 'Though Judah prevailed over his brothers, and from him came [David] the leader [and eventually the Messiah], yet the birthright was Joseph’s— [Gen 49:10; Mic 5:2] '
  '20':
  - type: text
    content: 'They were given help against them, and the Hagrites were handed over to them, and all who were '
  - type: text
    content: allied
  - type: text
    content: ' with them; for they cried out to God [for help] in the battle; and He granted their entreaty because they relied on '
  - type: text
    content: and
  - type: text
    content: ' trusted in Him. '
  '21':
  - type: text
    content: 'These Israelites took away their livestock: their 50,000 camels, and 250,000 sheep, and 2,000 donkeys; and 100,000 '
  - type: note
    content: Lit souls of men.
  - type: text
    content: 'people. '
  '22':
  - type: text
    content: For a great number fell mortally wounded, because the battle was of God. And these Israelites settled in their territory until the exile [by Assyria more than five centuries later]. [2 Kin 15:29]
  - type: heading
    content: Descendants of Manasseh
  '23':
  - type: text
    content: 'Now the sons (people) of the half-tribe of Manasseh lived in the land; their settlements spread from Bashan to Baal-hermon and Senir and Mount Hermon. '
  '24':
  - type: text
    content: 'These were the heads of their fathers’ households: Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel, warriors of valor [willing and able to encounter danger], famous men, and heads of the households of their fathers.'
  '25':
  - type: text
    content: 'But they acted treacherously against the God of their fathers and played the prostitute with the gods of the peoples of the land, whom God had destroyed before them. '
  '26':
  - type: text
    content: So the God of Israel stirred up the spirit of Pul, king of Assyria, [that is,] the spirit of Tilgath-pilneser king of Assyria, and he carried them away into exile—the Reubenites, the Gadites, and the half-tribe of Manasseh—and brought them to Halah, Habor, Hara, and the river Gozan, [where they remain] to this day.
  '3':
  - type: text
    content: 'the sons of Reuben the firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi. '
  '4':
  - type: text
    content: 'The sons of Joel: Shemaiah his son, Gog his son, Shimei his son, '
  '5':
  - type: text
    content: 'Micah his son, Reaiah his son, Baal his son, '
  '6':
  - type: text
    content: 'Beerah his son, whom Tilgath-pilneser king of Assyria carried away into exile; he was a leader of the tribe of Reuben. '
  '7':
  - type: text
    content: 'And his brothers (relatives) by their families, in the genealogy of their generations, were the chief Jeiel, and Zechariah, '
  '8':
  - type: text
    content: 'Bela the son of Azaz, the son of Shema, the son of Joel, who lived in Aroer as far as Nebo and Baal-meon. '
  '9':
  - type: text
    content: 'To the east Bela settled as far as the entrance into the desert from the river Euphrates, because their cattle had multiplied in the land of Gilead. '
