document_id: 1CH.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Reuben
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now [we come to] the sons of Reuben the firstborn of Israel—for Reuben was the eldest, but because he defiled his father’s bed [with Bilhah his father’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubine], his birthright was given to [Manasseh and Ephraim] the sons of Joseph [the favorite] son of Israel, so that he is not enrolled in the genealogy according to the birthright. [Gen 35:22; 48:15-22; 49:3, 4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Though Judah prevailed over his brothers, and from him came [David] the leader [and eventually the Messiah], yet the birthright was Joseph’s— [Gen 49:10; Mic 5:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the sons of Reuben the firstborn of Israel: Hanoch, Pallu, Hezron, and Carmi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The sons of Joel: Shemaiah his son, Gog his son, Shimei his son, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Micah his son, Reaiah his son, Baal his son, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beerah his son, whom Tilgath-pilneser king of Assyria carried away into exile; he was a leader of the tribe of Reuben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And his brothers (relatives) by their families, in the genealogy of their generations, were the chief Jeiel, and Zechariah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Bela the son of Azaz, the son of Shema, the son of Joel, who lived in Aroer as far as Nebo and Baal-meon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'To the east Bela settled as far as the entrance into the desert from the river Euphrates, because their cattle had multiplied in the land of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In the days of King Saul they made war with the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A tribal people believed to be related to Hagar, the mother of Ishmael.
    marker-yv: yv-n
  - type: text
    text: Hagrites, who fell by their hands; and they lived in their tents throughout all the land east of Gilead.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Gad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The sons of Gad lived opposite them in the land of Bashan, as far as Salecah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joel was the chief, Shapham the second, then Janai and Shaphat in Bashan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Their relatives from the households of their fathers: Michael, Meshullam, Sheba, Jorai, Jacan, Zia, and Eber—seven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in all
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These were the sons of Abihail the son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ahi the son of Abdiel, the son of Guni, was chief in their fathers’ households. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They lived in Gilead, in Bashan and in its towns, and in all the [surrounding] pasture lands of Sharon, as far as their borders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All these were enrolled in the genealogies in the days of Jotham king of Judah and in the days of Jeroboam [II] king of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Reuben, the Gadites, and the half-tribe of Manasseh—valiant men able to bear shield and sword, and to shoot with the bow, and skillful in war—were 44,760 who went to war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And these Israelites, [on the east side of the Jordan River] made war with the Hagrites [a tribe of northern Arabia], Jetur, Naphish, and Nodab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They were given help against them, and the Hagrites were handed over to them, and all who were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: allied
  - type: text
    text: ' with them; for they cried out to God [for help] in the battle; and He granted their entreaty because they relied on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted in Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'These Israelites took away their livestock: their 50,000 camels, and 250,000 sheep, and 2,000 donkeys; and 100,000 '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: souls of men
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For a great number fell mortally wounded, because the battle was of God. And these Israelites settled in their territory until the exile [by Assyria more than five centuries later]. [2 Kin 15:29]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Descendants of Manasseh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now the sons (people) of the half-tribe of Manasseh lived in the land; their settlements spread from Bashan to Baal-hermon and Senir and Mount Hermon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These were the heads of their fathers’ households: Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah, and Jahdiel, warriors of valor [willing and able to encounter danger], famous men, and heads of the households of their fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But they acted treacherously against the God of their fathers and played the prostitute with the gods of the peoples of the land, whom God had destroyed before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So the God of Israel stirred up the spirit of Pul, king of Assyria, [that is,] the spirit of Tilgath-pilneser king of Assyria, and he carried them away into exile—the Reubenites, the Gadites, and the half-tribe of Manasseh—and brought them to Halah, Habor, Hara, and the river Gozan, [where they remain] to this day.
