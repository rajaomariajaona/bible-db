document_id: 1KI.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Turns from God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now king Solomon [defiantly] loved '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was a common practice among pagan rulers in the Near East to ratify treaties with other kingdoms by marriage to foreign wives. In Deut 17:17 the kings of Israel were strictly forbidden from participating in such alliances. Solomon’s defiance of God’s command led him into sin and the loss of his kingdom.
    marker-yv: yv-n
  - type: text
    text: 'many foreign women along with the daughter of Pharaoh: Moabite, Ammonite, Edomite, Sidonian, and Hittite women, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: from the very nations of whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to the Israelites, “You shall not associate with them, nor shall they associate with you, for the result will be that they will turn away your hearts to follow their gods.” Yet Solomon clung to these in love. [Deut 17:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He had seven hundred wives, princesses, and three hundred '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubines, and his wives turned his heart away [from God]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For when Solomon was old, his wives turned his heart away after other gods; and his heart was not completely devoted to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God, as was the heart of his father David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For Solomon went after Ashtoreth, the [fertility] goddess of the Sidonians, and after Milcom the horror (detestable idol) of the Ammonites. [1 Kin 9:6-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Solomon did evil [things] in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and did not follow the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' fully, as his father David '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had done
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Solomon built a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an altar on the top of a hill, which was customary for pagan worship. The only proper place for worship was the temple.
    marker-yv: yv-n
  - type: text
    text: 'high place for [worshiping] Chemosh the horror (detestable idol) of Moab, on the hill which is east of Jerusalem, and for Molech the horror (detestable idol) of the sons of Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And he did the same for all of his foreign wives, who burned incense and sacrificed to their gods.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' became angry with Solomon because his heart was turned away from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who had appeared to him twice, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and had commanded him concerning this thing, that he should not follow other gods; but he did not observe (remember, obey) what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Solomon, “Because you have done this and have not kept My covenant and My statutes, which I have commanded you, I will certainly tear the kingdom away from you and give it to your servant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'However, I will not do it in your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: days
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'lifetime, for the sake of your father David, but I will tear it out of the hand of your son (Rehoboam). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: However, I will not tear away all the kingdom; I will give one tribe (Judah) to your son for the sake of My servant David and for the sake of Jerusalem which I have chosen.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Raises Adversaries
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' stirred up an adversary against Solomon, Hadad the Edomite; he was of royal descent in Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For it came about, when David was in Edom, and Joab the commander of the army had gone up to bury those killed [in battle] and had struck down every male in Edom '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(for Joab and all [the army of] Israel stayed there six months, until he had killed every male in Edom), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'that Hadad escaped to Egypt, he and some Edomites from his father’s servants with him, while Hadad was [still] a little boy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They set out from Midian [south of Edom] and came to Paran, and took men with them from Paran and came to Egypt, to Pharaoh king of Egypt, who gave [young] Hadad a house and ordered food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provisions for him and gave him land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hadad found great favor with Pharaoh, so that he gave Hadad in marriage the sister of his own wife, the sister of Tahpenes the queen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The sister of Tahpenes gave birth to Genubath, Hadad’s son, whom Tahpenes weaned in Pharaoh’s house; and Genubath was in Pharaoh’s household among the sons of Pharaoh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But when Hadad heard in Egypt that David '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: slept with his fathers
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'had died and that Joab the commander of the army was dead, Hadad said to Pharaoh, “Let me leave, so that I may go to my own country.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then Pharaoh said to him, “But what have you lacked with me that now you ask to go to your own country?” He replied, “Nothing; nevertheless you must let me go.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'God also stirred up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' adversary for Solomon, Rezon the son of Eliada, who had fled from his master, Hadadezer king of Zobah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Rezon gathered men to himself and became leader of a marauding band, after David killed those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in Zobah
  - type: text
    text: '. They went to Damascus and stayed there and they reigned in Damascus. [2 Sam 10:8, 18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So Rezon was an adversary to Israel all the days of Solomon, along with the evil that Hadad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: inflicted
  - type: text
    text: . Rezon hated Israel and reigned over Aram (Syria).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jeroboam, Solomon’s servant, the son of Nebat, an Ephrathite of Zeredah whose mother’s name was Zeruah, a widow, also rebelled against the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now this is the reason why he rebelled against the king: Solomon built the Millo (fortification) and he repaired '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' closed the breach of the city of his father David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The man Jeroboam was a brave warrior and when Solomon saw that the young man was industrious, he put him in charge of all the forced labor of the house of Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'It came about at that time, when Jeroboam left Jerusalem, that the prophet Ahijah the Shilonite met him on the road. Now Ahijah had covered himself with a new cloak; and the two of them were alone in the field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Ahijah took hold of the new cloak which he was wearing and tore it into twelve pieces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He said to Jeroboam, “Take ten pieces for yourself; for thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, ‘Behold, I am going to tear the kingdom from the hand of Solomon and give you ten tribes— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'but he [and his descendants] shall have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'It is evident from v 30 and later from 12:21 that two tribes are in view here: Judah and Benjamin. The Greek OT (the LXX) actually reads “two” here and in v 36, indicating that its translators rejected the Hebrew reading in both verses as an error. Other explanations are possible, however. Some have suggested that the tribe of Benjamin was often regarded as one with Judah. Another possibility is that Benjamin is not counted or mentioned because of the despicable sin committed by certain men of Gibeah (Judg 19:21 ff; Gibeah was a city in Benjamin), and the refusal by the tribe of Benjamin to turn the offenders over to justice (Judg 20:13). In fact, the tribe almost faced extinction as a result of their refusal and the war that followed between Israel and Benjamin (Judg 20:14-21:24).'
    marker-yv: yv-n
  - type: text
    text: 'one tribe (Benjamin was annexed to Judah), for the sake of My servant David and for the sake of Jerusalem, the city which I have chosen out of all the tribes of Israel— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'because '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the people of Israel under the leadership of Solomon.
    marker-yv: yv-n
  - type: text
    text: 'they have abandoned Me and have worshiped Ashtoreth the goddess of the Sidonians, Chemosh the god of the Moabites, and Milcom the god of the sons of Ammon; and they have not walked in My ways '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' followed My commandments, doing what is right in My sight and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: keeping
  - type: text
    text: ' My statutes and My ordinances as did his father David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'However, I will not take the entire kingdom out of his hand; but I will make him ruler all the days of his life for the sake of My servant David, whom I chose because he kept My commandments and My statutes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'But I will take the kingdom out of his son’s hand and give it to you: ten tribes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Yet to his son I will give '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 32.
    marker-yv: yv-n
  - type: text
    text: 'one tribe, so that My servant David may have a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a descendant on the throne.
    marker-yv: yv-n
  - type: text
    text: 'lamp always before Me in Jerusalem, the city where I have chosen to put My Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Presence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'I will take you [Jeroboam], and you shall reign over whatever your soul desires; and you shall be king over Israel (the ten northern tribes). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then it shall be, that if you listen to all that I command you and walk in My ways, and do what is right in My sight, keeping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' observing My statutes and My commandments, as My servant David did, then I will be with you and build you an enduring house, as I built for David, and I will give Israel to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And in this way I will afflict the descendants of David for this (their sin), but not forever.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: So Solomon attempted to kill Jeroboam; but Jeroboam set out and escaped to Egypt, to Shishak king of Egypt, and stayed in Egypt until Solomon died.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Death of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'The rest of the acts of Solomon—and all that he did, and his wisdom—are they not written in the book of the acts of Solomon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The time Solomon reigned in Jerusalem over all Israel was forty years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And Solomon slept [in death] with his fathers and was buried in the city of his father David. Rehoboam his son reigned in his place.
