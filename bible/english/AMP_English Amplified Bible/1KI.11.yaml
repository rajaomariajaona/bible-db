document_id: 1KI.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Turns from God
  - type: text
    content: 'Now king Solomon [defiantly] loved '
  - type: note
    content: It was a common practice among pagan rulers in the Near East to ratify treaties with other kingdoms by marriage to foreign wives. In Deut 17:17 the kings of Israel were strictly forbidden from participating in such alliances. Solomon’s defiance of God’s command led him into sin and the loss of his kingdom.
  - type: text
    content: 'many foreign women along with the daughter of Pharaoh: Moabite, Ammonite, Edomite, Sidonian, and Hittite women, '
  '10':
  - type: text
    content: and had commanded him concerning this thing, that he should not follow other gods; but he did not observe (remember, obey) what the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded. '
  '11':
  - type: text
    content: Therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Solomon, “Because you have done this and have not kept My covenant and My statutes, which I have commanded you, I will certainly tear the kingdom away from you and give it to your servant. '
  '12':
  - type: text
    content: 'However, I will not do it in your '
  - type: note
    content: Lit days.
  - type: text
    content: 'lifetime, for the sake of your father David, but I will tear it out of the hand of your son (Rehoboam). '
  '13':
  - type: text
    content: However, I will not tear away all the kingdom; I will give one tribe (Judah) to your son for the sake of My servant David and for the sake of Jerusalem which I have chosen.”
  - type: heading
    content: God Raises Adversaries
  '14':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' stirred up an adversary against Solomon, Hadad the Edomite; he was of royal descent in Edom. '
  '15':
  - type: text
    content: 'For it came about, when David was in Edom, and Joab the commander of the army had gone up to bury those killed [in battle] and had struck down every male in Edom '
  '16':
  - type: text
    content: '(for Joab and all [the army of] Israel stayed there six months, until he had killed every male in Edom), '
  '17':
  - type: text
    content: 'that Hadad escaped to Egypt, he and some Edomites from his father’s servants with him, while Hadad was [still] a little boy. '
  '18':
  - type: text
    content: 'They set out from Midian [south of Edom] and came to Paran, and took men with them from Paran and came to Egypt, to Pharaoh king of Egypt, who gave [young] Hadad a house and ordered food '
  - type: text
    content: and
  - type: text
    content: ' provisions for him and gave him land. '
  '19':
  - type: text
    content: 'Hadad found great favor with Pharaoh, so that he gave Hadad in marriage the sister of his own wife, the sister of Tahpenes the queen. '
  '2':
  - type: text
    content: from the very nations of whom the L
  - type: heading
    content: ord
  - type: text
    content: ' said to the Israelites, “You shall not associate with them, nor shall they associate with you, for the result will be that they will turn away your hearts to follow their gods.” Yet Solomon clung to these in love. [Deut 17:17] '
  '20':
  - type: text
    content: 'The sister of Tahpenes gave birth to Genubath, Hadad’s son, whom Tahpenes weaned in Pharaoh’s house; and Genubath was in Pharaoh’s household among the sons of Pharaoh. '
  '21':
  - type: text
    content: 'But when Hadad heard in Egypt that David '
  - type: note
    content: Lit slept with his fathers and so throughout.
  - type: text
    content: 'had died and that Joab the commander of the army was dead, Hadad said to Pharaoh, “Let me leave, so that I may go to my own country.” '
  '22':
  - type: text
    content: Then Pharaoh said to him, “But what have you lacked with me that now you ask to go to your own country?” He replied, “Nothing; nevertheless you must let me go.”
  '23':
  - type: text
    content: 'God also stirred up '
  - type: text
    content: another
  - type: text
    content: ' adversary for Solomon, Rezon the son of Eliada, who had fled from his master, Hadadezer king of Zobah. '
  '24':
  - type: text
    content: 'Rezon gathered men to himself and became leader of a marauding band, after David killed those '
  - type: text
    content: in Zobah
  - type: text
    content: '. They went to Damascus and stayed there and they reigned in Damascus. [2 Sam 10:8, 18] '
  '25':
  - type: text
    content: 'So Rezon was an adversary to Israel all the days of Solomon, along with the evil that Hadad '
  - type: text
    content: inflicted
  - type: text
    content: . Rezon hated Israel and reigned over Aram (Syria).
  '26':
  - type: text
    content: 'Jeroboam, Solomon’s servant, the son of Nebat, an Ephrathite of Zeredah whose mother’s name was Zeruah, a widow, also rebelled against the king. '
  '27':
  - type: text
    content: 'Now this is the reason why he rebelled against the king: Solomon built the Millo (fortification) and he repaired '
  - type: text
    content: and
  - type: text
    content: ' closed the breach of the city of his father David. '
  '28':
  - type: text
    content: 'The man Jeroboam was a brave warrior and when Solomon saw that the young man was industrious, he put him in charge of all the forced labor of the house of Joseph. '
  '29':
  - type: text
    content: 'It came about at that time, when Jeroboam left Jerusalem, that the prophet Ahijah the Shilonite met him on the road. Now Ahijah had covered himself with a new cloak; and the two of them were alone in the field. '
  '3':
  - type: text
    content: 'He had seven hundred wives, princesses, and three hundred '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubines, and his wives turned his heart away [from God]. '
  '30':
  - type: text
    content: 'Then Ahijah took hold of the new cloak which he was wearing and tore it into twelve pieces. '
  '31':
  - type: text
    content: He said to Jeroboam, “Take ten pieces for yourself; for thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, ‘Behold, I am going to tear the kingdom from the hand of Solomon and give you ten tribes— '
  '32':
  - type: text
    content: 'but he [and his descendants] shall have '
  - type: note
    content: 'It is evident from v 30 and later from 12:21 that two tribes are in view here: Judah and Benjamin. The Greek OT (the LXX) actually reads “two” here and in v 36, indicating that its translators rejected the Hebrew reading in both verses as an error. Other explanations are possible, however. Some have suggested that the tribe of Benjamin was often regarded as one with Judah. Another possibility is that Benjamin is not counted or mentioned because of the despicable sin committed by certain men of Gibeah (Judg 19:21 ff; Gibeah was a city in Benjamin), and the refusal by the tribe of Benjamin to turn the offenders over to justice (Judg 20:13). In fact, the tribe almost faced extinction as a result of their refusal and the war that followed between Israel and Benjamin (Judg 20:14-21:24).'
  - type: text
    content: 'one tribe (Benjamin was annexed to Judah), for the sake of My servant David and for the sake of Jerusalem, the city which I have chosen out of all the tribes of Israel— '
  '33':
  - type: text
    content: 'because '
  - type: note
    content: I.e. the people of Israel under the leadership of Solomon.
  - type: text
    content: 'they have abandoned Me and have worshiped Ashtoreth the goddess of the Sidonians, Chemosh the god of the Moabites, and Milcom the god of the sons of Ammon; and they have not walked in My ways '
  - type: text
    content: and
  - type: text
    content: ' followed My commandments, doing what is right in My sight and '
  - type: text
    content: keeping
  - type: text
    content: ' My statutes and My ordinances as did his father David. '
  '34':
  - type: text
    content: 'However, I will not take the entire kingdom out of his hand; but I will make him ruler all the days of his life for the sake of My servant David, whom I chose because he kept My commandments and My statutes. '
  '35':
  - type: text
    content: 'But I will take the kingdom out of his son’s hand and give it to you: ten tribes. '
  '36':
  - type: text
    content: 'Yet to his son I will give '
  - type: note
    content: See note v 32.
  - type: text
    content: 'one tribe, so that My servant David may have a '
  - type: note
    content: I.e. a descendant on the throne.
  - type: text
    content: 'lamp always before Me in Jerusalem, the city where I have chosen to put My Name '
  - type: text
    content: and
  - type: text
    content: ' Presence. '
  '37':
  - type: text
    content: 'I will take you [Jeroboam], and you shall reign over whatever your soul desires; and you shall be king over Israel (the ten northern tribes). '
  '38':
  - type: text
    content: 'Then it shall be, that if you listen to all that I command you and walk in My ways, and do what is right in My sight, keeping '
  - type: text
    content: and
  - type: text
    content: ' observing My statutes and My commandments, as My servant David did, then I will be with you and build you an enduring house, as I built for David, and I will give Israel to you. '
  '39':
  - type: text
    content: 'And in this way I will afflict the descendants of David for this (their sin), but not forever.’ ” '
  '4':
  - type: text
    content: For when Solomon was old, his wives turned his heart away after other gods; and his heart was not completely devoted to the L
  - type: heading
    content: ord
  - type: text
    content: ' his God, as was the heart of his father David. '
  '40':
  - type: text
    content: So Solomon attempted to kill Jeroboam; but Jeroboam set out and escaped to Egypt, to Shishak king of Egypt, and stayed in Egypt until Solomon died.
  - type: heading
    content: The Death of Solomon
  '41':
  - type: text
    content: 'The rest of the acts of Solomon—and all that he did, and his wisdom—are they not written in the book of the acts of Solomon? '
  '42':
  - type: text
    content: 'The time Solomon reigned in Jerusalem over all Israel was forty years. '
  '43':
  - type: text
    content: And Solomon slept [in death] with his fathers and was buried in the city of his father David. Rehoboam his son reigned in his place.
  '5':
  - type: text
    content: 'For Solomon went after Ashtoreth, the [fertility] goddess of the Sidonians, and after Milcom the horror (detestable idol) of the Ammonites. [1 Kin 9:6-9] '
  '6':
  - type: text
    content: Solomon did evil [things] in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', and did not follow the L'
  - type: heading
    content: ord
  - type: text
    content: ' fully, as his father David '
  - type: text
    content: had done
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Then Solomon built a '
  - type: note
    content: I.e. an altar on the top of a hill, which was customary for pagan worship. The only proper place for worship was the temple.
  - type: text
    content: 'high place for [worshiping] Chemosh the horror (detestable idol) of Moab, on the hill which is east of Jerusalem, and for Molech the horror (detestable idol) of the sons of Ammon. '
  '8':
  - type: text
    content: And he did the same for all of his foreign wives, who burned incense and sacrificed to their gods.
  '9':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' became angry with Solomon because his heart was turned away from the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, who had appeared to him twice, '
