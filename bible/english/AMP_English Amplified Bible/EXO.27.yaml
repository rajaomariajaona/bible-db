document_id: EXO.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Bronze Altar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“And you shall make the altar [for burnt offerings] of acacia wood, five cubits long and five cubits wide; the altar shall be square, and its height shall be three cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Make horns (horn-shaped projections) for it on its four corners; the horns shall be of one piece with it, and you shall overlay it with bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You shall make pots to remove its ashes, and shovels, basins [to catch the blood of the sacrificed animal], meat-forks, and firepans [to store live coals]. You shall make all its utensils of bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Also make a grate for it, a network of bronze; and on the grid you are to make four bronze rings at its four corners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And you shall put it under the ledge of the altar, so that the grid will extend halfway up the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You shall make [carrying] poles for the altar, poles of acacia wood, overlaid with bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The poles shall be inserted through the rings on the two sides of the altar so that it may be carried. [Num 4:14, 15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You are to make the altar hollow with planks; as you were shown on the mountain [of Sinai], so shall it be made.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Court of the Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“You shall make the court of the tabernacle. The south side of the court is to have curtains of fine twisted linen, a hundred cubits long for one side; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'it shall have twenty pillars and twenty bronze sockets; but the hooks of the pillars and their fasteners shall be silver; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'likewise for the north side there shall be curtains, a hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cubits
  - type: text
    text: ' long, and its twenty pillars and twenty bronze sockets; but the hooks of the pillars and their fasteners shall be silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For the width of the court on the west side there shall be curtains of fifty cubits, with ten pillars (support poles) and ten sockets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The width of the court [to the front], on the east side shall be fifty cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The curtains for one side [of the gate] shall be fifteen cubits with three pillars and three sockets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On the other side [of the gate] the curtains shall be fifteen cubits with three pillars and three sockets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the gate of the court there shall be a screen [to provide a covering] of twenty cubits, of blue, purple, and scarlet fabric and finely woven [embroidered] linen, the work of an embroiderer, with four pillars and four [base] sockets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All the pillars (support poles) around the court shall be joined together with silver rods; their hooks shall be of silver and their sockets of bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The length of the court shall be a hundred cubits, and the width fifty [cubits] throughout, and the height five cubits of fine twisted linen, and their sockets of bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'All the tabernacle’s utensils '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instruments used in all its service, and all its stakes, and all the stakes for the court, shall be of bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“You shall command the Israelites to provide you with clear oil of beaten olives for the light, to make a lamp burn continually [every night]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: In the Tent of Meeting [of God with His people], outside the veil which is in front of the [ark of the] Testimony [and sets it apart], Aaron [the high priest] and his sons shall keep the lamp burning from evening to morning before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . It shall be a perpetual statute [to be observed] throughout their generations on behalf of the Israelites.
