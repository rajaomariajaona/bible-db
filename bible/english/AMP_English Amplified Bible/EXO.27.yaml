document_id: EXO.27,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Bronze Altar
  - type: text
    content: '“And you shall make the altar [for burnt offerings] of acacia wood, five cubits long and five cubits wide; the altar shall be square, and its height shall be three cubits. '
  '10':
  - type: text
    content: 'it shall have twenty pillars and twenty bronze sockets; but the hooks of the pillars and their fasteners shall be silver; '
  '11':
  - type: text
    content: 'likewise for the north side there shall be curtains, a hundred '
  - type: text
    content: cubits
  - type: text
    content: ' long, and its twenty pillars and twenty bronze sockets; but the hooks of the pillars and their fasteners shall be silver. '
  '12':
  - type: text
    content: 'For the width of the court on the west side there shall be curtains of fifty cubits, with ten pillars (support poles) and ten sockets. '
  '13':
  - type: text
    content: 'The width of the court [to the front], on the east side shall be fifty cubits. '
  '14':
  - type: text
    content: 'The curtains for one side [of the gate] shall be fifteen cubits with three pillars and three sockets. '
  '15':
  - type: text
    content: 'On the other side [of the gate] the curtains shall be fifteen cubits with three pillars and three sockets. '
  '16':
  - type: text
    content: 'For the gate of the court there shall be a screen [to provide a covering] of twenty cubits, of blue, purple, and scarlet fabric and finely woven [embroidered] linen, the work of an embroiderer, with four pillars and four [base] sockets. '
  '17':
  - type: text
    content: 'All the pillars (support poles) around the court shall be joined together with silver rods; their hooks shall be of silver and their sockets of bronze. '
  '18':
  - type: text
    content: 'The length of the court shall be a hundred cubits, and the width fifty [cubits] throughout, and the height five cubits of fine twisted linen, and their sockets of bronze. '
  '19':
  - type: text
    content: 'All the tabernacle’s utensils '
  - type: text
    content: and
  - type: text
    content: ' instruments used in all its service, and all its stakes, and all the stakes for the court, shall be of bronze.'
  '2':
  - type: text
    content: 'Make horns (horn-shaped projections) for it on its four corners; the horns shall be of one piece with it, and you shall overlay it with bronze. '
  '20':
  - type: text
    content: '“You shall command the Israelites to provide you with clear oil of beaten olives for the light, to make a lamp burn continually [every night]. '
  '21':
  - type: text
    content: In the Tent of Meeting [of God with His people], outside the veil which is in front of the [ark of the] Testimony [and sets it apart], Aaron [the high priest] and his sons shall keep the lamp burning from evening to morning before the L
  - type: heading
    content: ord
  - type: text
    content: . It shall be a perpetual statute [to be observed] throughout their generations on behalf of the Israelites.
  '3':
  - type: text
    content: 'You shall make pots to remove its ashes, and shovels, basins [to catch the blood of the sacrificed animal], meat-forks, and firepans [to store live coals]. You shall make all its utensils of bronze. '
  '4':
  - type: text
    content: 'Also make a grate for it, a network of bronze; and on the grid you are to make four bronze rings at its four corners. '
  '5':
  - type: text
    content: 'And you shall put it under the ledge of the altar, so that the grid will extend halfway up the altar. '
  '6':
  - type: text
    content: 'You shall make [carrying] poles for the altar, poles of acacia wood, overlaid with bronze. '
  '7':
  - type: text
    content: 'The poles shall be inserted through the rings on the two sides of the altar so that it may be carried. [Num 4:14, 15] '
  '8':
  - type: text
    content: You are to make the altar hollow with planks; as you were shown on the mountain [of Sinai], so shall it be made.
  - type: heading
    content: Court of the Tabernacle
  '9':
  - type: text
    content: '“You shall make the court of the tabernacle. The south side of the court is to have curtains of fine twisted linen, a hundred cubits long for one side; '
