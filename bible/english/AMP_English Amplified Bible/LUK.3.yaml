  - type: note
    content: Served as high priest from a.d. 18-36, although Annas kept de facto authority.
  - type: text
    content: 'Caiaphas [his son-in-law], the word of God came to John, the son of Zacharias, in the wilderness. '
  '20':
  - type: text
    content: 'he also added this to them all: he locked up John in prison.'
  - type: heading
    content: Jesus’ Baptism
  '21':
  - type: text
    content: 'Now when all the people were baptized, Jesus was also baptized, and while He was praying, the [visible] heaven was opened, [Matt 3:13-17; Mark 1:9-11; John 1:32] '
