    marker-yv: yv-n
  - type: text
    text: 'with water; but One who is mightier [more powerful, more noble] than I is coming, and I am not fit to untie the strap of His sandals [even as His slave]. He will baptize you [who truly repent] with the Holy Spirit and [you who remain unrepentant] with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars view “fire” as judgment; however, another view of “fire” purports that the text refers to the fiery baptism of the Holy Spirit, not judgment. The Holy Spirit promised here has been associated with Pentecost, purification, testing, and judgment. Each person who accepts Jesus is filled with the Holy Spirit (Acts 1:5-8). According to this view the fire indicates that the believer is purified as in the refining of gold. Fire burns up the impurities and the gold (the believer) survives (cf 1 Cor 3:12, 13; James 1:3).
    marker-yv: yv-n
  - type: text
    text: 'fire. [Matt 3:11] '
