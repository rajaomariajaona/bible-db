    content: John the Baptist Preaches
  - type: text
    content: 'Now in the fifteenth year of [Emperor] '
  - type: note
    content: See note Matt 22:21.
  - type: text
    content: 'Tiberius Caesar’s reign—when Pontius Pilate was governor of Judea, and Herod [Antipas] was tetrarch of Galilee, and his brother Philip was tetrarch of the region of Ituraea and Trachonitis, and Lysanias was tetrarch of Abilene— '
  '10':
  - type: text
    content: 'The crowds asked him, “Then what are we to do?” '
  '11':
  - type: text
    content: 'And John replied, “The man who has two tunics is to share with him who has none; and he who has food is to do the same.” '
