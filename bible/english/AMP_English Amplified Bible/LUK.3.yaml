    children:
    - type: text
      text: even
  - type: text
    text: ' begin to say to yourselves [as a defense], ‘We have Abraham for our father [and so our heritage assures us of salvation]’; for I say to you that from these stones God is able to raise up children (descendants) for Abraham [for God can replace the unrepentant, regardless of their heritage, with those who are obedient]. [Matt 3:9] '
  - type: usfm
