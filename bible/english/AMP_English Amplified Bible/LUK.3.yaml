    children:
    - type: text
      text: '16'
  - type: text
    text: 'John answered them all by saying, “As for me, I baptize you [only] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
