  '2':
  - type: text
    content: 'in the high '
  - type: note
    content: Annas served from a.d. 6-15, before being deposed by Roman authorities; however, the Jews continued to recognize him as high priest de facto even though others, including his sons and son-in-law, held the official title and publicly appeared to serve as high priest.
  - type: text
