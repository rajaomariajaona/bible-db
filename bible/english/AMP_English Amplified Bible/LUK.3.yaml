        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A tool roughly resembling a pitchfork, used to separate grains of wheat from the chaff by throwing the wheat into the air, and allowing the wind to blow away the lighter chaff.
    marker-yv: yv-n
  - type: text
    text: winnowing fork is in His hand to thoroughly clear His threshing floor, and to gather the wheat (believers) into His barn (kingdom); but He will burn up the chaff (the unrepentant) with unquenchable fire.”
