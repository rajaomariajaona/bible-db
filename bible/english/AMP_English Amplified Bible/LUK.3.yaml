  '15':
  - type: text
    content: 'Now the people were in a state of expectation, and all were wondering in their hearts about John, as to whether he was the Christ (the Messiah, the Anointed). '
  '16':
  - type: text
    content: 'John answered them all by saying, “As for me, I baptize you [only] '
  - type: note
    content: The Greek here can be translated in, with, or by.
  - type: text
    content: 'with water; but One who is mightier [more powerful, more noble] than I is coming, and I am not fit to untie the strap of His sandals [even as His slave]. He will baptize you [who truly repent] with the Holy Spirit and [you who remain unrepentant] with '
  - type: note
    content: Some scholars view “fire” as judgment; however, another view of “fire” purports that the text refers to the fiery baptism of the Holy Spirit, not judgment. The Holy Spirit promised here has been associated with Pentecost, purification, testing, and judgment. Each person who accepts Jesus is filled with the Holy Spirit (Acts 1:5-8). According to this view the fire indicates that the believer is purified as in the refining of gold. Fire burns up the impurities and the gold (the believer) survives (cf 1 Cor 3:12, 13; James 1:3).
  - type: text
    content: 'fire. [Matt 3:11] '
  '17':
  - type: text
    content: 'His '
  - type: note
    content: A tool roughly resembling a pitchfork, used to separate grains of wheat from the chaff by throwing the wheat into the air, and allowing the wind to blow away the lighter chaff.
  - type: text
    content: winnowing fork is in His hand to thoroughly clear His threshing floor, and to gather the wheat (believers) into His barn (kingdom); but He will burn up the chaff (the unrepentant) with unquenchable fire.”
