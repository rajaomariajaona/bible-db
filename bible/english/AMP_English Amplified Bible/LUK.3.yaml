  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Even now the axe [of God’s judgment] is swinging toward the root of the trees; so every tree that does not produce good fruit is being cut down and thrown into the fire.”
