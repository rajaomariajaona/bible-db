      - type: text
        text: David’s Victory over the Amalekites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened when David and his men came [home] to Ziklag on the third day, [they found] that the Amalekites had made a raid on the Negev (the South country) and on Ziklag, and had overthrown Ziklag and burned it with fire; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David pursued [the Amalekites], he and four hundred men, for two hundred who were too exhausted to cross the brook Besor stayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: behind
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They found an Egyptian [who had collapsed] in the field and brought him to David, and gave him bread and he ate, and they gave him water to drink, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they gave him a piece of a fig cake and two clusters of raisins; and when he had eaten, his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: spirit
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'energy returned, for he had not eaten bread or had any water to drink for three days and three nights. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to him, “To whom do you belong, and where are you from?” He said, “I am a young man from Egypt, a servant of an Amalekite; and my master abandoned me [as useless] when I fell sick three days ago. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We made a raid on the Negev of the Cherethites, and on that which belongs to Judah, and on the Negev of Caleb, and we burned Ziklag with fire.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David said to him, “Will you take me down to this band [of raiders]?” And he said, “Swear to me by God that you will not kill me or turn me over to the hand of my master, and I will bring you down to this band.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he brought David down, the Amalekites had disbanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spread over all the land, eating and drinking and dancing because of all the great spoil they had taken from the land of the Philistines and from the land of Judah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David [and his men] struck them down [in battle] from twilight until the evening of the next day; and not a man of them escaped, except four hundred young men who rode camels and fled. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David recovered all that the Amalekites had taken, and rescued his two wives. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nothing of theirs was missing whether small or great, sons or daughters, spoil or anything that had been taken; David recovered it all. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they had taken captive the women [and all] who were there, both small and great. They killed no one, but carried them off [to be used as slaves] and went on their way. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David captured all the flocks and herds [which the enemy had], and [the people] drove those animals before him and said, “This is David’s spoil.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Spoils Are Divided
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David came to the two hundred men who were so exhausted that they could not follow him and had been left at the brook Besor [with the provisions]. They went out to meet David and the people with him, and when he approached the people, he greeted them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the wicked and worthless men among those who went with David said, “Because they did not go with us, we will give them none of the spoil that we have recovered, except that each man may take his wife and children away and leave.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said, “You must not do so, my brothers, with what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has given us. He has kept us safe and has handed over to us the band [of Amalekites] that came against us. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And who will listen to you in regard to this matter? For as is the share of him who goes down into the battle, so shall his share be who stays by the provisions and supplies; they shall share alike.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So from that day forward he made it a statute and an ordinance for Israel to this day.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When David came to Ziklag, he sent part of the spoil to the elders of Judah, his friends, saying, “Here is a blessing (gift) for you from the spoil of the enemies of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For those in Bethel, Ramoth of the Negev, Jattir, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aroer, Siphmoth, Eshtemoa, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Racal, the cities of the Jerahmeelites, the cities of the Kenites, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David and his men came to the town, it was burned, and their wives and their sons and their daughters had been taken captive. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hormah, Bor-ashan, Athach, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hebron, and for [those elders in] all the places where David himself and his men were accustomed to go.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David and the people who were with him raised their voices and wept until '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: there was no strength in them
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'they were too exhausted to weep [any longer]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now David’s two wives had been captured, Ahinoam the Jezreelitess and Abigail the widow of Nabal the Carmelite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Further, David was greatly distressed because the people spoke of stoning him, for all of them were embittered, each man for his sons and daughters. But David felt strengthened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouraged in the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Abiathar the priest, Ahimelech’s son, “Please bring me the ephod.” So Abiathar brought him the ephod. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David inquired of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, “Shall I pursue this band [of raiders]? Will I overtake them?” And He answered him, “Pursue, for you will certainly overtake them, and you will certainly rescue [the captives].” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David went, he and the six hundred men who were with him, and came to the brook Besor; there those [who could not continue] remained behind. '
