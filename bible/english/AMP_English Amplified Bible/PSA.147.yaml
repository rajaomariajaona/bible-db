document_id: PSA.147,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 147
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Praise for Jerusalem’s Restoration and Prosperity.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is good to sing praises to our [gracious and majestic] God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise is becoming '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appropriate.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not delight in the strength (military power) of the horse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor does He take pleasure in the legs (strength) of a man.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' favors those who fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him [with awe-inspired reverence and obedience],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who wait for His mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness. [Ps 145:20]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O Jerusalem!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise your God, O Zion!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has strengthened the bars of your gates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has blessed your children within you.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes peace in your borders;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He satisfies you with the finest of the wheat.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends His command to the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His word runs very swiftly.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives [to the earth] snow like [a blanket of] wool;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He scatters the frost like ashes.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He casts out His ice like fragments;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can stand before His cold?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends out His word and melts the ice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He causes His wind to blow and the waters to flow.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He declares His word to Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His statutes and His ordinances to Israel. [Mal 4:4]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is building up Jerusalem;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is gathering [together] the exiles of Israel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has not dealt this way with any [other] nation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have not known [understood, appreciated, heeded, or cherished] His ordinances.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!) [Ps 79:6; Jer 10:25]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He heals the brokenhearted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And binds up their wounds [healing their pain and comforting their sorrow]. [Ps 34:18; Is 57:15; 61:1; Luke 4:18]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He counts the number of the stars;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He calls them all by their names.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Great is our [majestic and mighty] Lord and abundant in strength;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His understanding is inexhaustible [infinite, boundless].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lifts up the humble;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He casts the wicked down to the ground.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Sing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with thanksgiving;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing praises to our God with the lyre,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who covers the heavens with clouds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who provides rain for the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who makes grass grow on the mountains.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives to the beast its food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the young ravens that for which they cry.
