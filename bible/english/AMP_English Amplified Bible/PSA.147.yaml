document_id: PSA.147
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 147
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Praise for Jerusalem’s Restoration and Prosperity.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it is good to sing praises to our [gracious and majestic] God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise is becoming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is building up Jerusalem;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is gathering [together] the exiles of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He heals the brokenhearted
- type: usfm
  marker: q1
  children:
  - type: text
    text: And binds up their wounds [healing their pain and comforting their sorrow]. [Ps 34:18; Is 57:15; 61:1; Luke 4:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He counts the number of the stars;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He calls them all by their names.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Great is our [majestic and mighty] Lord and abundant in strength;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His understanding is inexhaustible [infinite, boundless].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lifts up the humble;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He casts the wicked down to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with thanksgiving;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing praises to our God with the lyre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who covers the heavens with clouds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who provides rain for the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who makes grass grow on the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He gives to the beast its food,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the young ravens that for which they cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He does not delight in the strength (military power) of the horse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor does He take pleasure in the legs (strength) of a man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' favors those who fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship Him [with awe-inspired reverence and obedience],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Those who wait for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness. [Ps 145:20]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O Jerusalem!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise your God, O Zion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For He has strengthened the bars of your gates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has blessed your children within you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He makes peace in your borders;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He satisfies you with the finest of the wheat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He sends His command to the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His word runs very swiftly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He gives [to the earth] snow like [a blanket of] wool;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He scatters the frost like ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He casts out His ice like fragments;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can stand before His cold?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He sends out His word and melts the ice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He causes His wind to blow and the waters to flow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He declares His word to Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His statutes and His ordinances to Israel. [Mal 4:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He has not dealt this way with any [other] nation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have not known [understood, appreciated, heeded, or cherished] His ordinances.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!) [Ps 79:6; Jer 10:25]'
