document_id: PSA.147,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 147
  - type: heading
    content: Praise for Jerusalem’s Restoration and Prosperity.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '!'
  - type: text
    content: For it is good to sing praises to our [gracious and majestic] God;
  - type: text
    content: 'Praise is becoming '
  - type: text
    content: and
  - type: text
    content: ' appropriate.'
  '10':
  - type: text
    content: He does not delight in the strength (military power) of the horse,
  - type: text
    content: Nor does He take pleasure in the legs (strength) of a man.
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' favors those who fear '
  - type: text
    content: and
  - type: text
    content: ' worship Him [with awe-inspired reverence and obedience],'
  - type: text
    content: 'Those who wait for His mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness. [Ps 145:20]'
  '12':
  - type: text
    content: ¶Praise the L
  - type: heading
    content: ord
  - type: text
    content: ', O Jerusalem!'
  - type: text
    content: Praise your God, O Zion!
  '13':
  - type: text
    content: For He has strengthened the bars of your gates,
  - type: text
    content: He has blessed your children within you.
  '14':
  - type: text
    content: He makes peace in your borders;
  - type: text
    content: He satisfies you with the finest of the wheat.
  '15':
  - type: text
    content: He sends His command to the earth;
  - type: text
    content: His word runs very swiftly.
  '16':
  - type: text
    content: He gives [to the earth] snow like [a blanket of] wool;
  - type: text
    content: He scatters the frost like ashes.
  '17':
  - type: text
    content: He casts out His ice like fragments;
  - type: text
    content: Who can stand before His cold?
  '18':
  - type: text
    content: He sends out His word and melts the ice;
  - type: text
    content: He causes His wind to blow and the waters to flow.
  '19':
  - type: text
    content: He declares His word to Jacob,
  - type: text
    content: His statutes and His ordinances to Israel. [Mal 4:4]
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is building up Jerusalem;'
  - type: text
    content: He is gathering [together] the exiles of Israel.
  '20':
  - type: text
    content: He has not dealt this way with any [other] nation;
  - type: text
    content: They have not known [understood, appreciated, heeded, or cherished] His ordinances.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!) [Ps 79:6; Jer 10:25]'
  '3':
  - type: text
    content: He heals the brokenhearted
  - type: text
    content: And binds up their wounds [healing their pain and comforting their sorrow]. [Ps 34:18; Is 57:15; 61:1; Luke 4:18]
  '4':
  - type: text
    content: He counts the number of the stars;
  - type: text
    content: He calls them all by their names.
  '5':
  - type: text
    content: Great is our [majestic and mighty] Lord and abundant in strength;
  - type: text
    content: His understanding is inexhaustible [infinite, boundless].
  '6':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' lifts up the humble;'
  - type: text
    content: He casts the wicked down to the ground.
  '7':
  - type: text
    content: ¶Sing to the L
  - type: heading
    content: ord
  - type: text
    content: ' with thanksgiving;'
  - type: text
    content: Sing praises to our God with the lyre,
  '8':
  - type: text
    content: Who covers the heavens with clouds,
  - type: text
    content: Who provides rain for the earth,
  - type: text
    content: Who makes grass grow on the mountains.
  '9':
  - type: text
    content: He gives to the beast its food,
  - type: text
    content: And to the young ravens that for which they cry.
