document_id: MIC.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prophet Acknowledges Injustice
  - type: text
    content: Woe is me (judgment is coming)! For I am
  - type: text
    content: Like one who gathers the summer fruits, like one who gleans the vintage grapes.
  - type: text
    content: There is not a cluster of grapes to eat,
  - type: text
    content: No first-ripe fig which my appetite craves.
  '10':
  - type: text
    content: Then my enemy [all the pagan nations] shall see it,
  - type: text
    content: And shame [for despising the L
  - type: heading
    content: ord
  - type: text
    content: '] will cover her who said to me,'
  - type: text
    content: “Where is the L
  - type: heading
    content: ord
  - type: text
    content: ' your God?”'
  - type: text
    content: My eyes will look on her [with satisfaction at her judgment];
  - type: text
    content: Now she (unbelievers) will be trampled down
  - type: text
    content: Like mud of the streets.
  '11':
  - type: text
    content: ' '
  - type: text
    content: It shall be
  - type: text
    content: ' a day for building your walls,'
  - type: text
    content: On that day the boundary [of Israel] shall be [greatly] extended. [Is 33:17; Amos 9:11]
  '12':
  - type: text
    content: 'It '
  - type: text
    content: shall be
  - type: text
    content: ' a day when '
  - type: note
    content: Lit he.
  - type: text
    content: the Gentiles will come to you
  - type: text
    content: From Assyria and from the cities of Egypt,
  - type: text
    content: And from Egypt even to the river Euphrates,
  - type: text
    content: From sea to sea and from mountain to mountain.
  '13':
  - type: text
    content: Yet the earth [beyond the land of Israel] shall become desolate because of those who dwell in it,
  - type: text
    content: Because of the fruit of their deeds.
  '14':
  - type: text
    content: '¶Shepherd '
  - type: text
    content: and
  - type: text
    content: ' rule Your people with Your scepter [of blessing],'
  - type: text
    content: 'The flock of Your inheritance '
  - type: text
    content: and
  - type: text
    content: ' Your possession'
  - type: text
    content: Which dwells alone [separate and secure from attack] in the forest,
  - type: text
    content: In the midst of a garden land.
  - type: text
    content: Let them feed in Bashan and Gilead
  - type: text
    content: As in the days of old [the days of Moses and Elijah].
  '15':
  - type: text
    content: “As in the days when you came out from the land of Egypt,
  - type: text
    content: 'I shall show you marvelous '
  - type: text
    content: and
  - type: text
    content: ' miraculous things.”'
  '16':
  - type: text
    content: The [pagan] nations shall see [God’s omnipotence in delivering Israel] and be ashamed
  - type: text
    content: Of all their might [which cannot be compared to His].
  - type: text
    content: They shall put their hand on their mouth [in silent astonishment];
  - type: text
    content: Their ears shall be deaf.
  '17':
  - type: text
    content: They shall lick the dust like a serpent;
  - type: text
    content: Like crawling things of the earth
  - type: text
    content: 'They shall come trembling out of their fortresses '
  - type: text
    content: and
  - type: text
    content: ' hiding places.'
  - type: text
    content: 'They shall turn '
  - type: text
    content: and
  - type: text
    content: ' come with fear '
  - type: text
    content: and
  - type: text
    content: ' dread to the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God'
  - type: text
    content: 'And they shall be afraid '
  - type: text
    content: and
  - type: text
    content: ' stand in awe before You [O L'
  - type: heading
    content: ord
  - type: text
    content: ']. [Jer 33:9]'
  '18':
  - type: text
    content: Who is a God like You, who forgives wickedness
  - type: text
    content: And passes over the rebellious acts of the remnant of His possession?
  - type: text
    content: He does not retain His anger forever,
  - type: text
    content: 'Because He [constantly] delights in mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness.'
  '19':
  - type: text
    content: He shall again have compassion on us;
  - type: text
    content: 'He will subdue '
  - type: text
    content: and
  - type: text
    content: ' tread underfoot our wickedness [destroying sin’s power].'
  - type: text
    content: Yes, You will cast all our sins
  - type: text
    content: Into the depths of the sea. [Ps 103:12]
  '2':
  - type: text
    content: The godly person [who is faithful and loyal to God] has perished from the earth,
  - type: text
    content: 'And there is no upright '
  - type: text
    content: person
  - type: text
    content: ' [one with good character and moral integrity] among men.'
  - type: text
    content: They all lie in wait to shed blood;
  - type: text
    content: Each hunts the other with a net.
  '20':
  - type: text
    content: You shall give truth to Jacob
  - type: text
    content: 'And lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' mercy to Abraham,'
  - type: text
    content: As You have sworn to our forefathers
  - type: text
    content: From the days of old. [Luke 1:54, 55]
  '3':
  - type: text
    content: 'Concerning evil, both of their hands pursue it and do it diligently '
  - type: text
    content: and
  - type: text
    content: ' thoroughly;'
  - type: text
    content: The prince asks, also the judge, for a bribe,
  - type: text
    content: And a great man speaks the [evil] desire of his soul.
  - type: text
    content: So they twist the course of justice between them.
  '4':
  - type: text
    content: The best of them is [injurious] like a briar;
  - type: text
    content: The most upright is [prickly] like a thorn hedge.
  - type: text
    content: The day of your watchmen [that is, the time predicted by the prophets]
  - type: text
    content: And your punishment comes;
  - type: text
    content: Now shall be their confusion.
  '5':
  - type: text
    content: Do not trust in a neighbor [because of the moral corruption in the land];
  - type: text
    content: Do not have confidence in a friend.
  - type: text
    content: Guard the doors of your mouth
  - type: text
    content: From her who lies in your bosom. [Luke 12:51-53]
  '6':
  - type: text
    content: 'For the son dishonors the father '
  - type: text
    content: and
  - type: text
    content: ' treats him contemptuously,'
  - type: text
    content: The daughter rises up [in hostility] against her mother,
  - type: text
    content: The daughter-in-law against her mother-in-law—
  - type: text
    content: A man’s enemies are the men (members) of his own household. [Matt 10:21, 35, 36; Mark 13:12, 13]
  - type: heading
    content: God Is the Source of Salvation and Light
  '7':
  - type: text
    content: ¶But as for me, I will look expectantly for the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: text
    content: and
  - type: text
    content: ' with confidence in Him I will keep watch;'
  - type: text
    content: I will wait [with confident expectation] for the God of my salvation.
  - type: text
    content: My God will hear me.
  '8':
  - type: text
    content: Do not rejoice over me [amid my tragedies], O my enemy!
  - type: text
    content: Though I fall, I will rise;
  - type: text
    content: Though I sit in the darkness [of distress], the L
  - type: heading
    content: ord
  - type: text
    content: ' is a light for me.'
  '9':
  - type: text
    content: '¶I will bear the indignation '
  - type: text
    content: and
  - type: text
    content: ' wrath of the L'
  - type: heading
    content: ord
  - type: text
    content: Because I have sinned against Him,
  - type: text
    content: Until He pleads my case and executes judgment for me.
  - type: text
    content: He will bring me out to the light,
  - type: text
    content: 'And I will behold His [amazing] righteousness '
  - type: text
    content: and
  - type: text
    content: ' His remarkable deliverance. [Rom 10:1-4; 11:23-27]'
