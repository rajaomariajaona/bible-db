document_id: MIC.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Prophet Acknowledges Injustice
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe is me (judgment is coming)! For I am
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like one who gathers the summer fruits, like one who gleans the vintage grapes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is not a cluster of grapes to eat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: No first-ripe fig which my appetite craves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The godly person [who is faithful and loyal to God] has perished from the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And there is no upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: person
  - type: text
    text: ' [one with good character and moral integrity] among men.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They all lie in wait to shed blood;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each hunts the other with a net.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Concerning evil, both of their hands pursue it and do it diligently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The prince asks, also the judge, for a bribe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a great man speaks the [evil] desire of his soul.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they twist the course of justice between them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The best of them is [injurious] like a briar;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The most upright is [prickly] like a thorn hedge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The day of your watchmen [that is, the time predicted by the prophets]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your punishment comes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now shall be their confusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do not trust in a neighbor [because of the moral corruption in the land];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not have confidence in a friend.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Guard the doors of your mouth
- type: usfm
  marker: q1
  children:
  - type: text
    text: From her who lies in your bosom. [Luke 12:51-53]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the son dishonors the father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treats him contemptuously,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The daughter rises up [in hostility] against her mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The daughter-in-law against her mother-in-law—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A man’s enemies are the men (members) of his own household. [Matt 10:21, 35, 36; Mark 13:12, 13]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Is the Source of Salvation and Light
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶But as for me, I will look expectantly for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with confidence in Him I will keep watch;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will wait [with confident expectation] for the God of my salvation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My God will hear me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do not rejoice over me [amid my tragedies], O my enemy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though I fall, I will rise;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though I sit in the darkness [of distress], the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is a light for me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '¶I will bear the indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wrath of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I have sinned against Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until He pleads my case and executes judgment for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will bring me out to the light,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will behold His [amazing] righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His remarkable deliverance. [Rom 10:1-4; 11:23-27]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then my enemy [all the pagan nations] shall see it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shame [for despising the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] will cover her who said to me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God?”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My eyes will look on her [with satisfaction at her judgment];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now she (unbelievers) will be trampled down
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like mud of the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: It shall be
  - type: text
    text: ' a day for building your walls,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On that day the boundary [of Israel] shall be [greatly] extended. [Is 33:17; Amos 9:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall be
  - type: text
    text: ' a day when '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: he
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the Gentiles will come to you
- type: usfm
  marker: q1
  children:
  - type: text
    text: From Assyria and from the cities of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from Egypt even to the river Euphrates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From sea to sea and from mountain to mountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yet the earth [beyond the land of Israel] shall become desolate because of those who dwell in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the fruit of their deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '¶Shepherd '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rule Your people with Your scepter [of blessing],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The flock of Your inheritance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your possession'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which dwells alone [separate and secure from attack] in the forest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the midst of a garden land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them feed in Bashan and Gilead
- type: usfm
  marker: q1
  children:
  - type: text
    text: As in the days of old [the days of Moses and Elijah].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “As in the days when you came out from the land of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I shall show you marvelous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miraculous things.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The [pagan] nations shall see [God’s omnipotence in delivering Israel] and be ashamed
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of all their might [which cannot be compared to His].
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shall put their hand on their mouth [in silent astonishment];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their ears shall be deaf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They shall lick the dust like a serpent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like crawling things of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They shall come trembling out of their fortresses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hiding places.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They shall turn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come with fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dread to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they shall be afraid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stand in awe before You [O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ']. [Jer 33:9]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Who is a God like You, who forgives wickedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And passes over the rebellious acts of the remnant of His possession?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He does not retain His anger forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because He [constantly] delights in mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He shall again have compassion on us;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will subdue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' tread underfoot our wickedness [destroying sin’s power].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, You will cast all our sins
- type: usfm
  marker: q1
  children:
  - type: text
    text: Into the depths of the sea. [Ps 103:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You shall give truth to Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy to Abraham,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As You have sworn to our forefathers
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the days of old. [Luke 1:54, 55]
