type_code: eng
verses:
  '1':
  - type: heading
    content: Mixed Marriages
  - type: text
    content: 'When these things were completed, the officials came to me and said, “The people of Israel and the priests and Levites have not separated themselves from the peoples of the lands, but have committed the repulsive acts of the Canaanites, Hittites, Perizzites, Jebusites, Ammonites, Moabites, Egyptians, and Amorites. '
  '10':
  - type: text
    content: '“Now, O our God, what shall we say after this? For we have abandoned (turned away from) Your commandments, '
  '11':
  - type: text
    content: 'which You have commanded by Your servants the prophets, saying, ‘The land which you are entering to possess is a defiled land with the uncleanness of the peoples of the lands, through their repulsive acts which have filled it from one end to the other '
  - type: text
    content: along
  - type: text
    content: ' with their impurity. '
  '12':
  - type: text
    content: 'So now do not give your daughters to their sons or take their daughters for your sons; and never seek their peace or their prosperity, so that you may be strong and eat the good '
  - type: text
    content: things
  - type: text
    content: ' of the land and leave it as an inheritance to your children forever.’ '
  '13':
  - type: text
    content: 'And after everything that has come upon us for our evil deeds and for our great guilt, since You our God have punished us less than our wrongdoings '
  - type: text
    content: deserve,
  - type: text
    content: ' and have given us survivors like these, '
  '14':
  - type: text
    content: 'shall we again break Your commandments and intermarry with the peoples who practice these repulsive acts? Would You not be angry with us to the point of total destruction, so that there would be no remnant nor survivor? [Deut 7:2-4] '
  '15':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, You are [uncompromisingly] just (righteous), for we have been left as survivors, as it is this day. Behold, we are before You in our guilt, for no one can stand before You because of this.”'
  '2':
  - type: text
    content: 'For they have taken some of their daughters '
  - type: text
    content: as wives
  - type: text
    content: ' for themselves and for their sons, so that the holy '
  - type: note
    content: Lit seed.
  - type: text
    content: 'race has '
  - type: note
    content: Historically, intermarriage with other nations led the Jews into pagan practices which brought God’s wrath and judgment upon all the people.
  - type: text
    content: 'intermingled with the peoples of the lands. Indeed, the officials and chief men have been foremost in this unfaithful act '
  - type: text
    content: and
  - type: text
    content: ' direct violation [of God’s will].” [Deut 7:3, 4] '
  '3':
  - type: text
    content: 'When I heard this, I tore my clothing and my robe [in grief], I pulled out some of the hair from my head and my beard, and sat down appalled [at the shame of it]. '
  '4':
  - type: text
    content: Then everyone who trembled at the words of the God of Israel because of the unfaithfulness of the exiles gathered to me as I sat appalled until the evening offering.
  - type: heading
    content: Prayer of Confession
  '5':
  - type: text
    content: 'At the evening offering I arose from my [time of] humiliation '
  - type: text
    content: and
  - type: text
    content: ' penitence and having torn my clothing and my robe, I fell on my knees and stretched out my hands to the L'
  - type: heading
    content: ord
  - type: text
    content: ' my God, '
  '6':
  - type: text
    content: 'and I said, “O my God, I am ashamed and embarrassed to lift up my face to You, my God, for our wrongdoings have risen higher than our heads and our guilt has grown to the heavens. '
  '7':
  - type: text
    content: 'Since the days of our fathers to this day we have been exceedingly guilty; and on account of our wrongdoings we, our kings, and our priests have been handed over to the kings of the lands, to the sword, to captivity, to plundering, and to complete shame, as it is today. '
  '8':
  - type: text
    content: But now for a brief moment grace has been [shown to us] from the L
  - type: heading
    content: ord
  - type: text
    content: ' our God, who has left us a surviving remnant and has given us a peg (secure hold) in His holy place, that our God may enlighten our eyes and give us a little reviving in our bondage. '
  '9':
  - type: text
    content: For we are slaves; yet our God has not abandoned us in our bondage, but has extended lovingkindness to us before the kings of Persia, to revive us to rebuild the house of our God, to repair the site of its ruins and to give us a wall [of protection] in Judah and Jerusalem.
