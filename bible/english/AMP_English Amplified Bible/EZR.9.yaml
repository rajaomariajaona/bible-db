segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mixed Marriages
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When these things were completed, the officials came to me and said, “The people of Israel and the priests and Levites have not separated themselves from the peoples of the lands, but have committed the repulsive acts of the Canaanites, Hittites, Perizzites, Jebusites, Ammonites, Moabites, Egyptians, and Amorites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For they have taken some of their daughters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as wives
  - type: text
    text: ' for themselves and for their sons, so that the holy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: seed.
    marker-yv: yv-n
  - type: text
    text: 'race has '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Historically, intermarriage with other nations led the Jews into pagan practices which brought God’s wrath and judgment upon all the people.
    marker-yv: yv-n
  - type: text
    text: 'intermingled with the peoples of the lands. Indeed, the officials and chief men have been foremost in this unfaithful act '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' direct violation [of God’s will].” [Deut 7:3, 4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When I heard this, I tore my clothing and my robe [in grief], I pulled out some of the hair from my head and my beard, and sat down appalled [at the shame of it]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then everyone who trembled at the words of the God of Israel because of the unfaithfulness of the exiles gathered to me as I sat appalled until the evening offering.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer of Confession
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'At the evening offering I arose from my [time of] humiliation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' penitence and having torn my clothing and my robe, I fell on my knees and stretched out my hands to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and I said, “O my God, I am ashamed and embarrassed to lift up my face to You, my God, for our wrongdoings have risen higher than our heads and our guilt has grown to the heavens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Since the days of our fathers to this day we have been exceedingly guilty; and on account of our wrongdoings we, our kings, and our priests have been handed over to the kings of the lands, to the sword, to captivity, to plundering, and to complete shame, as it is today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But now for a brief moment grace has been [shown to us] from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, who has left us a surviving remnant and has given us a peg (secure hold) in His holy place, that our God may enlighten our eyes and give us a little reviving in our bondage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For we are slaves; yet our God has not abandoned us in our bondage, but has extended lovingkindness to us before the kings of Persia, to revive us to rebuild the house of our God, to repair the site of its ruins and to give us a wall [of protection] in Judah and Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Now, O our God, what shall we say after this? For we have abandoned (turned away from) Your commandments, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'which You have commanded by Your servants the prophets, saying, ‘The land which you are entering to possess is a defiled land with the uncleanness of the peoples of the lands, through their repulsive acts which have filled it from one end to the other '
  - type: usfm
    marker: it
    children:
    - type: text
      text: along
  - type: text
    text: ' with their impurity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So now do not give your daughters to their sons or take their daughters for your sons; and never seek their peace or their prosperity, so that you may be strong and eat the good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things
  - type: text
    text: ' of the land and leave it as an inheritance to your children forever.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And after everything that has come upon us for our evil deeds and for our great guilt, since You our God have punished us less than our wrongdoings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: deserve,
  - type: text
    text: ' and have given us survivors like these, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'shall we again break Your commandments and intermarry with the peoples who practice these repulsive acts? Would You not be angry with us to the point of total destruction, so that there would be no remnant nor survivor? [Deut 7:2-4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, You are [uncompromisingly] just (righteous), for we have been left as survivors, as it is this day. Behold, we are before You in our guilt, for no one can stand before You because of this.”'
