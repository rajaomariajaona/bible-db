document_id: JHN.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of the Good Shepherd
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, he who does not enter by the door into the sheepfold, but climbs up from some other place'
    - type: text
      text: ' [on the stone wall], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that one is a thief and a robber.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The thief comes only in order to steal and kill and destroy. I came that they may have life, and have it in abundance
    - type: text
      text: ' [to the full, till it overflows].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fourth of the memorable “I am” statements. See note 6:35.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I am the Good Shepherd. The Good Shepherd '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A reference to the atoning sacrifice Jesus was going to make to provide the way for sinners to be saved and reconciled with God.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lays down His
    - type: text
      text: ' [own] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: life for the sheep.
    - type: text
      text: ' [Ps 23; Is 40:11] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the hired man
    - type: text
      text: ' [who merely serves for wages], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'who is neither the shepherd nor the owner of the sheep, when he sees the wolf coming, deserts the flock and runs away; and the wolf snatches the sheep and scatters '
      - type: usfm
        marker: it
        children:
        - type: text
          text: them.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: it
        children:
        - type: text
          text: man runs
      - type: text
        text: ' because he is a hired hand'
    - type: text
      text: ' [who serves only for wages] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and is not concerned about the
    - type: text
      text: ' [safety of the] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sheep.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the Good Shepherd, and I know
    - type: text
      text: ' [without any doubt those who are] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My own and My own know Me
    - type: text
      text: ' [and have a deep, personal relationship with Me]— '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: even as the Father knows Me and I know the Father—and I lay down My
    - type: text
      text: ' [very own] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: life
    - type: text
      text: ' [sacrificing it] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the benefit of
      - type: text
        text: ' the sheep.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the Gentiles.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: other sheep
    - type: text
      text: ' [beside these] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that are not of this fold. I must bring those also, and they will listen to My voice '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' pay attention to My call, and they will become '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jews and Gentiles will be joined through their personal belief in Jesus. The revelation that God intended to unite the Jews and Gentiles into one body of believers was a difficult concept to accept for many in the early church.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: one flock with one Shepherd.
    - type: text
      text: ' [Ezek 34:23; Eph 2:13-18] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For this reason the Father loves Me, because I lay down My
    - type: text
      text: ' [own] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: life so that I may take it back.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'No one takes it away from Me, but I lay it down voluntarily. I am authorized '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' have power to lay it down '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' to give it up, and I am authorized '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' have power to take it back. This command I have received from My Father.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A division [of opinion] occurred again among the Jews because of these words [of His]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But he who enters by the door is the shepherd of the sheep
    - type: text
      text: ' [the protector and provider]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Many of them said, “He has a demon and He is mad [insane—He raves and rambles]. Why listen to Him?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Others were saying, “These are not the words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughts of one possessed by a demon. Can a demon open the eyes of the blind?”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Asserts His Deity
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'At that time the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Now known as Hanukkah or the Feast of Lights.
      marker-yv: yv-n
    - type: text
      text: 'Feast of Dedication took place at Jerusalem. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'It was winter, and Jesus was walking in the temple [area] in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Located on the east side of the temple, this was a sheltered area consisting of a long, covered portico or colonnade. It later became a meeting place for Christians (Acts 3:11; 5:12).
      marker-yv: yv-n
    - type: text
      text: 'Solomon’s portico. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So the Jews surrounded Him and began saying to Him, “How long are You going to keep us in suspense? If You are [really] the Christ (the Messiah, the Anointed), tell us so plainly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' openly.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have told you so, yet you do not believe. The works that I do in My Father’s name testify concerning Me
    - type: text
      text: ' [they are My credentials and the evidence declaring who I am]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you do not believe Me
    - type: text
      text: ' [so you do not trust and follow Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because you are not My sheep.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The sheep that are My own hear My voice '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' listen to Me; I know them, and they follow Me.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I give them eternal life, and they will never, ever
    - type: text
      text: ' [by any means] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: perish; and no one will ever snatch them out of My hand.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One early ms reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: What My Father has given Me is greater than all.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'My Father, who has given '
      - type: usfm
        marker: it
        children:
        - type: text
          text: them
      - type: text
        text: ' to Me, is greater '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' mightier than all; and no one is able to snatch '
      - type: usfm
        marker: it
        children:
        - type: text
          text: them
      - type: text
        text: ' out of the Father’s hand.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The shepherd’s hired assistant who guarded the sheep at night when they were inside the stone enclosure.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: doorkeeper opens
    - type: text
      text: ' [the gate] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for this man, and the sheep hear his voice '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' pay attention to it. And'
    - type: text
      text: ' [knowing that they listen] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he calls his own sheep by name and leads them out
    - type: text
      text: ' [to pasture]. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I and the Father are One
    - type: text
      text: ' [in essence and nature].”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Again the Jews picked up stones to stone Him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I showed you many good works
    - type: text
      text: ' [and many acts of mercy] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: from the Father; for which of them are you stoning Me?”
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The Jews answered Him, “We are not going to stone You for a good work, but for blasphemy, because You, a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mere
    - type: text
      text: ' man, make Yourself out to be God.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Is it not written in your Law, ‘I '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: said
      - type: text
        text: ', '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: you are gods
    - type: text
      text: ' [human judges representing God, not divine beings]’? [Ps 82:6] '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If He '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This statement in Ps 82:6 is addressed to the ruling judges of Israel, who were supposed to serve as God’s representatives on earth. Jesus’ argument (v 36) is that since He is in fact proving Himself to be the Father’s representative on earth, He is entitled to be recognized as the Son of God.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'called them gods, men to whom the word of God came (and the Scripture cannot be undone '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' annulled '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' broken),'
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '[if that is true] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'then do you say of Him whom the Father sanctified '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' set apart '
      - type: usfm
        marker: it
        children:
        - type: text
          text: for Himself
      - type: text
        text: ' and sent into the world, ‘You are blaspheming,’ because I said, ‘I am the Son of God’?'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I do not do the works of My Father
    - type: text
      text: ' [that is, the miracles that only God could perform], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: then do not believe Me.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But if I am doing them, even if you do not believe Me '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' have faith in Me,'
    - type: text
      text: ' [at least] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: believe the works
    - type: text
      text: ' [that I do—admit that they are the works of God], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that you may know and keep on knowing
    - type: text
      text: ' [clearly—without any doubt] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that the Father is in Me, and I am in the Father
    - type: text
      text: ' [that is, I am One with Him].” '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: So they tried again to seize Him, but He eluded their grasp.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When he has brought all his own '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sheep
      - type: text
        text: ' outside, he walks on ahead of them, and the sheep follow him because they know his voice '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' recognize his call.'
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
