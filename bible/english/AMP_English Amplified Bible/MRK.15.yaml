  '35':
  - type: text
    content: 'Some of the bystanders heard Him and said, “Look! He is calling for '
  - type: note
    content: The Jews believed that the prophet Elijah would return before the Messiah appeared.
  - type: text
    content: 'Elijah!” '
  '36':
  - type: text
    content: 'Someone ran and filled a sponge with sour wine, put it on a reed and gave Him a drink, saying, “Let us see whether Elijah is coming to take Him down.” [Ps 69:21; Matt 27:48, 50; Luke 23:36; John 19:29, 30] '
  '37':
  - type: text
    content: 'But Jesus uttered a loud cry, and breathed out His last [voluntarily, sovereignly dismissing and releasing His spirit from His body in submission to His Father’s plan]. '
  '38':
  - type: text
    content: 'And the veil [of the Holy of Holies] of the temple was torn in two from '
  - type: note
    content: This act of God signified that the death of Jesus ended the need for temple sacrifices and intermediaries, and opened the way for free and direct access to God.
  - type: text
    content: 'top to bottom. '
  '39':
  - type: text
    content: When the centurion, who was standing opposite Him, saw the way He breathed His last [being fully in control], he said, “Truly this man was the Son of God!”
  '4':
  - type: text
    content: 'Then Pilate again asked Him, “Have You no answer [to give]? See how many charges they are bringing against You!” '
  '40':
  - type: text
    content: 'Now some women also were watching from a distance, among whom were Mary Magdalene, and '
  - type: note
    content: Gr Maria. She is believed to be a sister or sister-in-law of Jesus’ mother, Mary (Gr Mariam).
  - type: text
    content: 'Mary the mother of James the Less and of Joses, and '
  - type: note
    content: Matt 27:56 indicates that Salome was the mother of James and John, the sons of Zebedee. Salome is believed to be one of the sisters of Jesus’ mother, Mary.
  - type: text
    content: 'Salome. [John 19:25] '
  '41':
  - type: text
    content: 'When Jesus was in Galilee, they used to accompany him and minister to Him; and '
  - type: text
    content: there were
  - type: text
    content: ' also many other women who came up with Him to Jerusalem.'
  - type: heading
    content: Jesus Is Buried
  '42':
  - type: text
    content: 'When evening had already come, because it was the preparation day, that is, the day before the Sabbath, [Deut 21:22, 23; Matt 27:57-61; Luke 23:50-56; John 19:38-42] '
  '43':
  - type: text
    content: 'Joseph of Arimathea came, a prominent '
  - type: text
    content: and
  - type: text
    content: ' respected member of the Council (Sanhedrin, Jewish High Court), who was himself waiting for the kingdom of God—and he courageously dared to go in before Pilate, and asked for the body of Jesus. '
  '44':
  - type: text
    content: 'Pilate '
  - type: note
    content: Death by crucifixion was usually a slow process, sometimes lasting two or three days.
  - type: text
    content: 'wondered if He was dead by this time [only six hours after being crucified], and he summoned the centurion and asked him whether He was already dead. '
  '45':
  - type: text
    content: 'And when he learned from the centurion [that Jesus was in fact dead], he gave the body to Joseph [by granting him permission to remove it]. '
  '46':
  - type: text
    content: 'So Joseph purchased a [fine] linen cloth [for '
  - type: note
    content: It was Jewish custom to wash the body of a deceased person, then wrap it tightly in linen, placing spices or pouring aromatic perfumes between the successive layers of cloth to mitigate the stench of decay (see John 19:39, 40).
  - type: text
    content: 'wrapping the body], and after taking Jesus down [from the cross], he wrapped Him in the linen cloth and placed Him in a tomb which had been cut out of rock. Then he rolled a [large, wheel-shaped] stone against the entrance of the tomb. [Is 53:9] '
  '47':
  - type: text
    content: 'Mary Magdalene and Mary the '
  - type: text
    content: mother
  - type: text
    content: ' of Joses were [carefully] watching to see where He was laid.'
  '5':
  - type: text
    content: But Jesus gave no further answer; so Pilate was perplexed. [Is 53:7]
  '6':
  - type: text
    content: 'Now at the [Passover] feast Pilate used to set free for them any one prisoner whom they requested. [Matt 27:15-26; Luke 23:18-25; John 18:39-19:16] '
  '7':
  - type: text
    content: 'The man called Barabbas was imprisoned with the insurrectionists (revolutionaries) who had committed murder in the civil rebellion. '
  '8':
  - type: text
    content: 'The crowd came up and began asking Pilate to do as he usually did for them. '
  '9':
  - type: text
    content: 'Pilate answered them, saying, “Do you want me to set free for you the King of the Jews?” '
