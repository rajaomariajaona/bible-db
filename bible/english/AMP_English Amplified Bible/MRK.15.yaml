    children:
    - type: text
      text: Jesus Is Buried
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'When evening had already come, because it was the preparation day, that is, the day before the Sabbath, [Deut 21:22, 23; Matt 27:57-61; Luke 23:50-56; John 19:38-42] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Joseph of Arimathea came, a prominent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' respected member of the Council (Sanhedrin, Jewish High Court), who was himself waiting for the kingdom of God—and he courageously dared to go in before Pilate, and asked for the body of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Pilate '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Death by crucifixion was usually a slow process, sometimes lasting two or three days.
    marker-yv: yv-n
  - type: text
    text: 'wondered if He was dead by this time [only six hours after being crucified], and he summoned the centurion and asked him whether He was already dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And when he learned from the centurion [that Jesus was in fact dead], he gave the body to Joseph [by granting him permission to remove it]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'So Joseph purchased a [fine] linen cloth [for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was Jewish custom to wash the body of a deceased person, then wrap it tightly in linen, placing spices or pouring aromatic perfumes between the successive layers of cloth to mitigate the stench of decay (see John 19:39, 40).
    marker-yv: yv-n
  - type: text
    text: 'wrapping the body], and after taking Jesus down [from the cross], he wrapped Him in the linen cloth and placed Him in a tomb which had been cut out of rock. Then he rolled a [large, wheel-shaped] stone against the entrance of the tomb. [Is 53:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Mary Magdalene and Mary the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mother
  - type: text
    text: ' of Joses were [carefully] watching to see where He was laid.'
