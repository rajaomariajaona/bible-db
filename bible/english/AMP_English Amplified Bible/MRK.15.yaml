    marker-yv: yv-n
  - type: text
    text: 'Salome. [John 19:25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'When Jesus was in Galilee, they used to accompany him and minister to Him; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there were
  - type: text
    text: ' also many other women who came up with Him to Jerusalem.'
- type: usfm
