        text: The myrrh had a narcotic effect and was added to dull the senses.
    marker-yv: yv-n
  - type: text
    text: 'wine mixed with myrrh [to dull the pain], but He would not take it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And they crucified Him, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 27:35.
    marker-yv: yv-n
  - type: text
    text: 'divided up His clothes among themselves, casting lots for them to see who should take what. [Ps 22:18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It was the third hour (9:00 a.m.) when they crucified Him. [Ps 22:14-16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The inscription of the accusation against Him had been written [above Him]: “THE KING OF THE JEWS.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They crucified two robbers with Him, one on His right and one on His left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Early mss do not contain this verse.
    marker-yv: yv-n
  - type: text
    text: '[And the Scripture was fulfilled which says, “He was counted with the transgressors.”] [Is 53:12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Those who were passing by were insulting Him with abusive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent language, wagging their heads [as a sign of contempt], and saying, “Ha! You who would destroy the temple and rebuild it in [only] three days, [John 2:19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'save Yourself by coming down from the cross!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'In the same way the chief priests also, along with the scribes, were ridiculing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mocking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: ' among themselves and saying, “He saved others [from death]; He cannot save Himself! [Ps 22:7, 8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Let the Christ (the Messiah, the Anointed), the King of Israel, now come down from the cross, so that we may see and believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust [in Him]!” Those who were crucified with Him were also insulting Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When the sixth hour (noon) came, darkness covered the whole land until the ninth hour (3:00 p.m.). [Matt 27:45-56; Luke 23:44-49] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And at the ninth hour Jesus cried out with a loud voice, '
