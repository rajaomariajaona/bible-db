  - type: text
    text: ' [Ps 22:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Some of the bystanders heard Him and said, “Look! He is calling for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jews believed that the prophet Elijah would return before the Messiah appeared.
    marker-yv: yv-n
  - type: text
    text: 'Elijah!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Someone ran and filled a sponge with sour wine, put it on a reed and gave Him a drink, saying, “Let us see whether Elijah is coming to take Him down.” [Ps 69:21; Matt 27:48, 50; Luke 23:36; John 19:29, 30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But Jesus uttered a loud cry, and breathed out His last [voluntarily, sovereignly dismissing and releasing His spirit from His body in submission to His Father’s plan]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And the veil [of the Holy of Holies] of the temple was torn in two from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This act of God signified that the death of Jesus ended the need for temple sacrifices and intermediaries, and opened the way for free and direct access to God.
    marker-yv: yv-n
  - type: text
    text: 'top to bottom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: When the centurion, who was standing opposite Him, saw the way He breathed His last [being fully in control], he said, “Truly this man was the Son of God!”
- type: usfm
