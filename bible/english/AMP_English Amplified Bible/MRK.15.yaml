    - type: text
      text: Jesus before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Early in the morning the chief priests, with the elders and scribes and the whole Council (Sanhedrin, Jewish High Court), immediately consulted together; and they bound Jesus, they took Him away [violently] and handed Him over to Pilate. [Is 53:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pilate questioned Him, “Are You the King of the Jews?” And He replied to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is as you say.”
  - type: text
    text: ' [Matt 27:11-14; Luke 23:2, 3; John 18:29-37] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The chief priests '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' accusing Him of many things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Pilate again asked Him, “Have You no answer [to give]? See how many charges they are bringing against You!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But Jesus gave no further answer; so Pilate was perplexed. [Is 53:7]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now at the [Passover] feast Pilate used to set free for them any one prisoner whom they requested. [Matt 27:15-26; Luke 23:18-25; John 18:39-19:16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The man called Barabbas was imprisoned with the insurrectionists (revolutionaries) who had committed murder in the civil rebellion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The crowd came up and began asking Pilate to do as he usually did for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pilate answered them, saying, “Do you want me to set free for you the King of the Jews?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For he was aware that the chief priests had turned Jesus over to him because of envy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resentment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the chief priests stirred up the crowd to get him to release Barabbas for them instead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Again Pilate answered, “Then what shall I do with Him whom you call the King of the Jews?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They screamed back, “Crucify Him!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Pilate asked them, “Why, what has He done that is evil?” But they screamed all the more, “Crucify Him!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Pilate, wishing to satisfy the crowd, set Barabbas free for them; and after having Jesus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. whipped with a short whip of metal-tipped leather thongs. There was no limit to the number of lashings. Frequently, the body was so lacerated that the intestines gushed out. It was not uncommon for a prisoner to die from scourging.
    marker-yv: yv-n
  - type: text
    text: scourged, he handed Him over [to his soldiers] to be crucified. [Is 53:5]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Is Mocked
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The soldiers led Him away into the palace (that is, the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The residence of the Roman provincial governor.
    marker-yv: yv-n
  - type: text
    text: 'Praetorium), and they called together the entire [Roman] battalion [of 600 soldiers]. [Matt 27:27-31] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They dressed Him up in [a ranking Roman officer’s robe of] purple, and after twisting [together] a crown of thorns, they placed it on Him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and they began saluting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mocking Him: “Hail, King of the Jews!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They kept beating Him on the head with a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a long bamboo-like stick.
    marker-yv: yv-n
  - type: text
    text: 'reed and spitting on Him, and kneeling and bowing in [mock] homage to Him. [Is 50:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: After they had mocked Him, they took off the purple robe and put His own clothes on Him. And they led Him out [of the city] to crucify Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They forced into service a passer-by coming in from the countryside, Simon of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A port city in north Africa.
    marker-yv: yv-n
  - type: text
    text: 'Cyrene (the father of Alexander and Rufus), '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The crossbeam was usually placed on the nape of the neck like a yoke.
    marker-yv: yv-n
  - type: text
    text: to carry His cross. [Matt 27:32; Luke 23:26]
- type: usfm
