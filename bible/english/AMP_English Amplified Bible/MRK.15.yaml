type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus before Pilate
  - type: text
    content: 'Early in the morning the chief priests, with the elders and scribes and the whole Council (Sanhedrin, Jewish High Court), immediately consulted together; and they bound Jesus, they took Him away [violently] and handed Him over to Pilate. [Is 53:8] '
  '10':
  - type: text
    content: 'For he was aware that the chief priests had turned Jesus over to him because of envy '
  - type: text
    content: and
  - type: text
    content: ' resentment. '
  '11':
  - type: text
    content: 'But the chief priests stirred up the crowd to get him to release Barabbas for them instead. '
  '12':
  - type: text
    content: 'Again Pilate answered, “Then what shall I do with Him whom you call the King of the Jews?” '
  '13':
  - type: text
    content: 'They screamed back, “Crucify Him!” '
  '14':
  - type: text
    content: 'But Pilate asked them, “Why, what has He done that is evil?” But they screamed all the more, “Crucify Him!” '
  '15':
  - type: text
    content: 'So Pilate, wishing to satisfy the crowd, set Barabbas free for them; and after having Jesus '
  - type: note
    content: I.e. whipped with a short whip of metal-tipped leather thongs. There was no limit to the number of lashings. Frequently, the body was so lacerated that the intestines gushed out. It was not uncommon for a prisoner to die from scourging.
  - type: text
    content: scourged, he handed Him over [to his soldiers] to be crucified. [Is 53:5]
  - type: heading
    content: Jesus Is Mocked
  '16':
  - type: text
    content: 'The soldiers led Him away into the palace (that is, the '
  - type: note
    content: The residence of the Roman provincial governor.
  - type: text
    content: 'Praetorium), and they called together the entire [Roman] battalion [of 600 soldiers]. [Matt 27:27-31] '
  '17':
  - type: text
    content: 'They dressed Him up in [a ranking Roman officer’s robe of] purple, and after twisting [together] a crown of thorns, they placed it on Him; '
  '18':
  - type: text
    content: 'and they began saluting '
  - type: text
    content: and
  - type: text
    content: ' mocking Him: “Hail, King of the Jews!” '
  '19':
  - type: text
    content: 'They kept beating Him on the head with a '
  - type: note
    content: I.e. a long bamboo-like stick.
  - type: text
    content: 'reed and spitting on Him, and kneeling and bowing in [mock] homage to Him. [Is 50:6] '
  '2':
  - type: text
    content: 'Pilate questioned Him, “Are You the King of the Jews?” And He replied to him, '
  - type: text
    content: “It is as you say.”
  - type: text
    content: ' [Matt 27:11-14; Luke 23:2, 3; John 18:29-37] '
  '20':
  - type: text
    content: After they had mocked Him, they took off the purple robe and put His own clothes on Him. And they led Him out [of the city] to crucify Him.
  '21':
  - type: text
    content: 'They forced into service a passer-by coming in from the countryside, Simon of '
  - type: note
    content: A port city in north Africa.
  - type: text
    content: 'Cyrene (the father of Alexander and Rufus), '
  - type: note
    content: The crossbeam was usually placed on the nape of the neck like a yoke.
  - type: text
    content: to carry His cross. [Matt 27:32; Luke 23:26]
  - type: heading
    content: The Crucifixion
  '22':
  - type: text
    content: 'Then they brought Him to the place [called] Golgotha, which is translated, Place of a '
  - type: note
    content: 'Latin: Calvaria; or Calvary; Aram: Golgotha; Greek: Kranion.'
  - type: text
    content: 'Skull. [Matt 27:33-44; Luke 23:33-43; John 19:17-24] '
  '23':
  - type: text
    content: 'They tried to give Him '
  - type: note
    content: The myrrh had a narcotic effect and was added to dull the senses.
  - type: text
    content: 'wine mixed with myrrh [to dull the pain], but He would not take it. '
  '24':
  - type: text
    content: 'And they crucified Him, and '
  - type: note
    content: See note Matt 27:35.
  - type: text
    content: 'divided up His clothes among themselves, casting lots for them to see who should take what. [Ps 22:18] '
  '25':
  - type: text
    content: 'It was the third hour (9:00 a.m.) when they crucified Him. [Ps 22:14-16] '
  '26':
  - type: text
    content: 'The inscription of the accusation against Him had been written [above Him]: “THE KING OF THE JEWS.”'
  '27':
  - type: text
    content: 'They crucified two robbers with Him, one on His right and one on His left. '
  '28':
  - type: note
    content: Early mss do not contain this verse.
  - type: text
    content: '[And the Scripture was fulfilled which says, “He was counted with the transgressors.”] [Is 53:12] '
  '29':
  - type: text
    content: 'Those who were passing by were insulting Him with abusive '
  - type: text
    content: and
  - type: text
    content: ' insolent language, wagging their heads [as a sign of contempt], and saying, “Ha! You who would destroy the temple and rebuild it in [only] three days, [John 2:19] '
  '3':
  - type: text
    content: 'The chief priests '
  - type: text
    content: began
  - type: text
    content: ' accusing Him of many things. '
  '30':
  - type: text
    content: 'save Yourself by coming down from the cross!” '
  '31':
  - type: text
    content: 'In the same way the chief priests also, along with the scribes, were ridiculing '
  - type: text
    content: and
  - type: text
    content: ' mocking '
  - type: text
    content: Him
  - type: text
    content: ' among themselves and saying, “He saved others [from death]; He cannot save Himself! [Ps 22:7, 8] '
  '32':
  - type: text
    content: 'Let the Christ (the Messiah, the Anointed), the King of Israel, now come down from the cross, so that we may see and believe '
  - type: text
    content: and
  - type: text
    content: ' trust [in Him]!” Those who were crucified with Him were also insulting Him.'
  '33':
  - type: text
    content: 'When the sixth hour (noon) came, darkness covered the whole land until the ninth hour (3:00 p.m.). [Matt 27:45-56; Luke 23:44-49] '
  '34':
  - type: text
    content: 'And at the ninth hour Jesus cried out with a loud voice, '
  - type: text
    content: “E
