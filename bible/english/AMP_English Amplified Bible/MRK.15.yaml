      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Skull. [Matt 27:33-44; Luke 23:33-43; John 19:17-24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They tried to give Him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:23 '
    - type: usfm
