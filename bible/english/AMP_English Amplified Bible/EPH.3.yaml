document_id: EPH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul’s Stewardship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For this reason [because I preach that you and believing Jews are joint heirs] I, Paul, am the prisoner of Christ Jesus on behalf of you Gentiles— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'assuming that you have heard of the stewardship of God’s grace that was entrusted to me [to share with you] for your benefit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and that by [divine] revelation the mystery was made known to me, as I have already written in brief. [Eph 1:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'By referring to this, when you read it you can understand my insight into the mystery of Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'which in other generations was not disclosed to mankind, as it has now been revealed to His holy apostles and prophets by the [Holy] Spirit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '[it is this:] that the Gentiles are now joint heirs [with the Jews] and members of the same body, and joint partakers [sharing] in the [same divine] promise in Christ Jesus through [their faith in] the good news [of salvation]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Of this [gospel] I was made a minister by the gift of God’s grace given me through the working of His power. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'To me, [though I am] the very least of all the saints (God’s people), this grace [which is undeserved] was graciously given, to proclaim to the Gentiles the good news of the incomprehensible riches of Christ [that spiritual wealth which no one can fully understand], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and to make plain [to everyone] the plan of the mystery [regarding the uniting of believing Jews and Gentiles into one body] which [until now] was kept hidden through the ages in [the mind of] God who created all things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So now through the church the multifaceted wisdom of God [in all its countless aspects] might now be made known [revealing the mystery] to the [angelic] rulers and authorities in the heavenly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: places
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This is
  - type: text
    text: ' in accordance with [the terms of] the eternal purpose which He carried out in Christ Jesus our Lord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'in whom we have boldness and confident access through faith in Him [that is, our faith gives us sufficient courage to freely and openly approach God through Christ]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So I ask you not to lose heart at my sufferings on your behalf, for they are your glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For this reason [grasping the greatness of this plan by which Jews and Gentiles are joined together in Christ] I bow my knees [in reverence] before the Father [of our Lord Jesus Christ], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'from whom every family in heaven and on earth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In Greek, the word for family is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: patria,
      - type: text
        text: ' which is derived from '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pater,
      - type: text
        text: ' the word for “father.” The concept of family originates with God.'
    marker-yv: yv-n
  - type: text
    text: 'derives its name [God—the first and ultimate Father]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'May He grant you out of the riches of His glory, to be strengthened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritually energized with power through His Spirit in your inner self, [indwelling your innermost being and personality], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'so that Christ may dwell in your hearts through your faith. And may you, having been [deeply] rooted and [securely] grounded in love, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'be fully capable of comprehending with all the saints (God’s people) the width and length and height and depth of His love [fully experiencing that amazing, endless love]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and [that you may come] to know [practically, through personal experience] the love of Christ which far surpasses [mere] knowledge [without experience], that you may be filled up [throughout your being] to all the fullness of God [so that you may have the richest experience of God’s presence in your lives, completely filled and flooded with God Himself].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now to Him who is able to [carry out His purpose and] do superabundantly more than all that we dare ask or think [infinitely beyond our greatest prayers, hopes, or dreams], according to His power that is at work within us, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: to Him be the glory in the church and in Christ Jesus throughout all generations forever and ever. Amen.
