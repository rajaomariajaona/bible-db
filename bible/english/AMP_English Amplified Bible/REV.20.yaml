document_id: REV.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Satan Bound
  - type: text
    content: ' '
  - type: note
    content: The Greek words for “And I saw” are used seven times in chs 19 through 21 to indicate a progression at the end of time from the marriage supper of the Lamb to the millennium to the new heaven and new earth.
  - type: text
    content: 'And then I saw an angel descending from heaven, holding the key of the abyss (the bottomless pit) and a great chain was in his hand. '
  '10':
  - type: text
    content: And the devil who had deceived them was hurled into the lake of fire and burning brimstone (sulfur), where the beast (Antichrist) and false prophet are also; and they will be tormented day and night, forever and ever.
  - type: heading
    content: The Final Judgment
  '11':
  - type: text
    content: 'And I saw a great white throne and Him who was seated upon it, from whose presence earth and heaven fled away, and no place was found for them [for this heaven and earth are passing away]. [Is 51:6; Matt 24:35; 2 Pet 3:10-12] '
  '12':
  - type: text
    content: 'And I saw the dead, the great and the small, standing before the throne, and books were opened. Then another book was opened, which is '
  - type: text
    content: the Book
  - type: text
    content: ' of Life; and the dead were judged according to what they had done as written in the books [that is, everything done while on earth]. [Jer 17:10; Rom 2:6] '
  '13':
  - type: text
    content: 'And the sea gave up the dead who were in it, and death and Hades (the realm of the dead) surrendered the dead who were in them; and they were judged '
  - type: text
    content: and
  - type: text
    content: ' sentenced, every one according to their deeds. '
  '14':
  - type: text
    content: 'Then death and Hades [the realm of the dead] were thrown into the lake of fire. This is the second death, the lake of fire [the eternal separation from God]. [Matt 25:41; 1 Cor 15:26] '
  '15':
  - type: text
    content: 'And if '
  - type: note
    content: Lit anyone was.
  - type: text
    content: 'anyone’s name was not found '
  - type: note
    content: Since everyone who goes before the great white throne is to be tried and sentenced for his deeds, and no one is sinless, the only way to escape condemnation and the “lake of fire” is to have one’s name in the “Book of Life” through authentic faith in Jesus as Lord (see Ps 69:28; Phil 4:3; Rev 3:5).
  - type: text
    content: written in the Book of Life, he was hurled into the lake of fire.
  '2':
  - type: text
    content: 'And he overpowered '
  - type: text
    content: and
  - type: text
    content: ' laid hold of the dragon, that old serpent [of primeval times], who is the devil and Satan, and bound him [securely] for a thousand years (a millennium); [Rev 12:7-9, 12, 15] '
  '3':
  - type: text
    content: 'and the angel hurled him into the abyss, and closed it and sealed it above him [preventing his escape or rescue], so that he would no longer deceive '
  - type: text
    content: and
  - type: text
    content: ' seduce the nations, until the thousand years were at an end. After these things he must be liberated for a short time.'
  - type: heading
    content: The Millennial Reign
  '4':
  - type: text
    content: 'And then I saw thrones, and sitting on them were those to whom judgment [that is, the authority to act as judges] was given. And '
  - type: text
    content: I saw
  - type: text
    content: ' the souls of those who had been beheaded because of their testimony of Jesus and because of the word of God, and those who had refused to worship the beast or his image, and had not accepted his mark on their forehead and on their hand; and they came to life and reigned with Christ for a thousand years. [Dan 7:9, 22, 27] '
  '5':
  - type: text
    content: 'The rest of the dead [the non-believers] did not come to life again until the thousand years were completed. This is the first resurrection. '
  '6':
  - type: note
    content: This is the fifth of the seven promised blessings. See note 1:3.
  - type: text
    content: 'Blessed (happy, prosperous, to be admired) and holy is the person who takes part in the first resurrection; over these the second death [which is eternal separation from God, the lake of fire] has no power '
  - type: text
    content: or
  - type: text
    content: ' authority, but they will be priests of God and of Christ and they will reign with Him a thousand years. [Ex 19:6; 1 Pet 2:5, 9; Rev 1:6; 5:10]'
  - type: heading
    content: The Final Rebellion
  '7':
  - type: text
    content: 'And when the thousand years are completed, Satan will be released from his prison (the abyss), '
  '8':
  - type: text
    content: 'and will come out to deceive '
  - type: text
    content: and
  - type: text
    content: ' mislead the '
  - type: note
    content: Non-believing descendants of the survivors of the Tribulation.
  - type: text
    content: 'nations which are in the four corners of the earth—[including] Gog and Magog—to gather them together for the war; their number is like the sand of the seashore. [Ezek 38:2; 39:1, 6] '
  '9':
  - type: text
    content: And they swarmed up over the broad plain of the earth and surrounded the camp of the saints (God’s people) and the beloved city [
  - type: note
    content: I.e. the world capital of Christ’s reign during the millennial kingdom.
  - type: text
    content: 'Jerusalem]; but fire came down from heaven and consumed them. [2 Kin 1:10-12; Ezek 38:2, 22] '
