    - type: text
      text: '61'
  - type: text
    text: 'Of the sons of the priests: the sons of Hobaiah, of Hakkoz, and of Barzillai, who took a wife from the daughters of Barzillai the Gileadite, and he was known by their name. [2 Sam 17:27, 28; 19:31-39] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'These searched [for their names] among those registered in the genealogies, but they were not found; so they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were excluded
  - type: text
    text: ' from the priesthood as [ceremonially] unclean. '
  - type: usfm
    marker: vlbl
    children:
