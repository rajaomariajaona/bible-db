        text: '2:63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tirshatha,
      - type: text
        text: ' a Persian title. Probably either Sheshbazzar or Zerubbabel.'
    marker-yv: yv-n
  - type: text
    text: 'governor told them that they should not eat of the most holy things [the priests’ food] until a priest stood up with Urim and Thummim [who by consulting these articles in his breastplate could '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: But the effort doubtless would have been in vain. Long-standing disobedience had apparently caused Israel’s priests to forfeit the divine gift of guidance through Urim and Thummim, and it was never recovered. Except for a similar incident in Neh 7:65, Urim and Thummim are not again mentioned in the Scriptures. The higher revelation by the prophets superseded them as interpreters of the will of God (see also Ex 28:30; Amos 3:7).
    marker-yv: yv-n
  - type: text
    text: determine God’s will in the matter].
