        text: ord
    - type: text
      text: ' in Jerusalem, made voluntary contributions for the house of God to rebuild it on its [old] foundation. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They gave according to their ability to the treasury for the work, 61,000 drachmas of gold, 5,000 minas of silver, and 100 priestly [linen] garments.
