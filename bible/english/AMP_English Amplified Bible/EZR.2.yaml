  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these are the ones who came up from Tel-melah, Tel-harsha, Cherub, Addan, and Immer, but they could not provide evidence of their fathers’ households and their descendants, whether they were of Israel: '
  '6':
