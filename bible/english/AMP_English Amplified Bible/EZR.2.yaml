  - type: heading
    content: Priests Removed
  '61':
  - type: text
    content: 'Of the sons of the priests: the sons of Hobaiah, of Hakkoz, and of Barzillai, who took a wife from the daughters of Barzillai the Gileadite, and he was known by their name. [2 Sam 17:27, 28; 19:31-39] '
  '62':
  - type: text
    content: 'These searched [for their names] among those registered in the genealogies, but they were not found; so they '
  - type: text
    content: were excluded
  - type: text
    content: ' from the priesthood as [ceremonially] unclean. '
  '63':
  - type: text
    content: 'The '
  - type: note
    content: Heb Tirshatha, a Persian title. Probably either Sheshbazzar or Zerubbabel.
  - type: text
    content: 'governor told them that they should not eat of the most holy things [the priests’ food] until a priest stood up with Urim and Thummim [who by consulting these articles in his breastplate could '
  - type: note
    content: But the effort doubtless would have been in vain. Long-standing disobedience had apparently caused Israel’s priests to forfeit the divine gift of guidance through Urim and Thummim, and it was never recovered. Except for a similar incident in Neh 7:65, Urim and Thummim are not again mentioned in the Scriptures. The higher revelation by the prophets superseded them as interpreters of the will of God (see also Ex 28:30; Amos 3:7).
  - type: text
    content: determine God’s will in the matter].
  '64':
  - type: text
    content: 'The whole assembly totaled 42,360, '
  '65':
