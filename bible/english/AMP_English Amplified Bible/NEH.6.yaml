document_id: NEH.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Enemy’s Plot
  - type: text
    content: 'Now when Sanballat, Tobiah, Geshem the Arab, and the rest of our enemies heard that I had rebuilt the wall, and that there was no breach left in it, although at that time I had not set up doors in the gates, '
  '10':
  - type: text
    content: 'When I went into the house of Shemaiah the son of Delaiah, the son of Mehetabel, who was '
  - type: note
    content: The reason for the confinement is not given and is a matter of speculation. One possibility is that Shemaiah had become ceremonially defiled, in which case the Hebrew probably should be understood as “had been confined” because the purification process would have to be completed before he could enter the temple.
  - type: text
    content: 'confined at home, he said, “Let us meet [and take refuge] together in the house of God, '
  - type: note
    content: Only the priests were allowed to enter the sanctuary.
  - type: text
    content: 'within the temple, and let us shut the doors of the temple, because they are coming to kill you, and they are coming to kill you at night.” '
  '11':
  - type: text
    content: 'But I said, “Should a man like me flee [in fear and hide]? Should '
  - type: note
    content: I.e. a man who is not a priest.
  - type: text
    content: 'someone like me enter the temple [for sanctuary] to save his life? I will not go.” '
  '12':
  - type: text
    content: 'Then I realized that God had not sent him, but he spoke this prophecy against me because Tobiah and Sanballat had hired him. '
  '13':
  - type: text
    content: 'He was hired for this reason, that I would be frightened and do as he said and sin, so that they would have [grounds to make] a malicious report in order to censure '
  - type: text
    content: and
  - type: text
    content: ' disgrace me. '
  '14':
  - type: text
    content: 'Remember, O My God, Tobiah and Sanballat in regard to these actions of theirs, and also [remember] the prophetess Noadiah and the rest of the prophets who were '
  - type: text
    content: trying to
  - type: text
    content: ' frighten me.'
  - type: heading
    content: The Wall Is Finished
  '15':
  - type: text
    content: 'So the wall was finished on the twenty-fifth [day] of [the month] Elul, in fifty-two days. '
  '16':
  - type: text
    content: 'When all our enemies heard '
  - type: text
    content: about it,
  - type: text
    content: ' and all the [Gentile] nations around us saw it, '
  - type: note
    content: Lit they fell greatly in their own eyes.
  - type: text
    content: 'they lost their confidence; for they recognized that this work had been accomplished with the help of our God. '
  '17':
  - type: text
    content: 'Moreover, in those days many letters went from the nobles of Judah to Tobiah, and Tobiah’s '
  - type: text
    content: letters
  - type: text
    content: ' came to them. '
  '18':
  - type: text
    content: 'For '
  - type: note
    content: Tobiah was related by marriage to various influential Jewish leaders (Ezra 2:5; Neh 3:4, 30; 7:10).
  - type: text
    content: 'many in Judah were bound by oath to him because he was the son-in-law of Shecaniah the son of Arah, and his son Jehohanan had married the daughter of Meshullam the son of Berechiah. '
  '19':
  - type: text
    content: Also, they were speaking about Tobiah’s good deeds in my presence, and reporting to him what I said. Then Tobiah sent letters to frighten me.
  '2':
  - type: text
    content: 'Sanballat and Geshem sent '
  - type: text
    content: word
  - type: text
    content: ' to me, saying, “Come, let us meet together at Chephirim in the plain of Ono.” But they were planning to harm me. '
  '3':
  - type: text
    content: 'So I sent messengers to them, saying, “I am doing a great work and cannot come down. Why should the work stop while I leave to come down to [meet with] you?” '
  '4':
  - type: text
    content: 'They sent '
  - type: text
    content: word
  - type: text
    content: ' to me four times in this way, and I answered them in the same way. '
  '5':
  - type: text
    content: 'Then Sanballat sent his servant to me in the same way the fifth time, with an open letter in his hand. '
  '6':
  - type: text
    content: 'In it was written, “It is reported among the [neighboring] nations, and Gashmu is saying that you and the Jews are planning to revolt, and that is the reason you are rebuilding the wall. And according to these reports, you are to be their king. '
  '7':
  - type: text
    content: 'Also [it is reported that] you have appointed prophets to make a proclamation concerning you in Jerusalem, saying, ‘There is a king in Judah!’ And now these things will be reported to the [Persian] king. So come now, and let us consult together.” '
  '8':
  - type: text
    content: 'I sent '
  - type: text
    content: a message
  - type: text
    content: ' to him, saying, “Such things as you are saying have not been done; you are inventing them in your own mind.” '
  '9':
  - type: text
    content: For they all wanted to frighten us, thinking, “They will become discouraged with the work and it will not be done.” But now, [O God,] strengthen my hands.
