document_id: NEH.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Enemy’s Plot
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now when Sanballat, Tobiah, Geshem the Arab, and the rest of our enemies heard that I had rebuilt the wall, and that there was no breach left in it, although at that time I had not set up doors in the gates, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When I went into the house of Shemaiah the son of Delaiah, the son of Mehetabel, who was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The reason for the confinement is not given and is a matter of speculation. One possibility is that Shemaiah had become ceremonially defiled, in which case the Hebrew probably should be understood as “had been confined” because the purification process would have to be completed before he could enter the temple.
      marker-yv: yv-n
    - type: text
      text: 'confined at home, he said, “Let us meet [and take refuge] together in the house of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Only the priests were allowed to enter the sanctuary.
      marker-yv: yv-n
    - type: text
      text: 'within the temple, and let us shut the doors of the temple, because they are coming to kill you, and they are coming to kill you at night.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But I said, “Should a man like me flee [in fear and hide]? Should '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a man who is not a priest.
      marker-yv: yv-n
    - type: text
      text: 'someone like me enter the temple [for sanctuary] to save his life? I will not go.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then I realized that God had not sent him, but he spoke this prophecy against me because Tobiah and Sanballat had hired him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He was hired for this reason, that I would be frightened and do as he said and sin, so that they would have [grounds to make] a malicious report in order to censure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Remember, O My God, Tobiah and Sanballat in regard to these actions of theirs, and also [remember] the prophetess Noadiah and the rest of the prophets who were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trying to
    - type: text
      text: ' frighten me.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Wall Is Finished
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So the wall was finished on the twenty-fifth [day] of [the month] Elul, in fifty-two days. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When all our enemies heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about it,
    - type: text
      text: ' and all the [Gentile] nations around us saw it, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: they fell greatly in their own eyes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'they lost their confidence; for they recognized that this work had been accomplished with the help of our God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moreover, in those days many letters went from the nobles of Judah to Tobiah, and Tobiah’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: letters
    - type: text
      text: ' came to them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tobiah was related by marriage to various influential Jewish leaders (Ezra 2:5; Neh 3:4, 30; 7:10).
      marker-yv: yv-n
    - type: text
      text: 'many in Judah were bound by oath to him because he was the son-in-law of Shecaniah the son of Arah, and his son Jehohanan had married the daughter of Meshullam the son of Berechiah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Also, they were speaking about Tobiah’s good deeds in my presence, and reporting to him what I said. Then Tobiah sent letters to frighten me.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sanballat and Geshem sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to me, saying, “Come, let us meet together at Chephirim in the plain of Ono.” But they were planning to harm me. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So I sent messengers to them, saying, “I am doing a great work and cannot come down. Why should the work stop while I leave to come down to [meet with] you?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to me four times in this way, and I answered them in the same way. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Sanballat sent his servant to me in the same way the fifth time, with an open letter in his hand. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In it was written, “It is reported among the [neighboring] nations, and Gashmu is saying that you and the Jews are planning to revolt, and that is the reason you are rebuilding the wall. And according to these reports, you are to be their king. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Also [it is reported that] you have appointed prophets to make a proclamation concerning you in Jerusalem, saying, ‘There is a king in Judah!’ And now these things will be reported to the [Persian] king. So come now, and let us consult together.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a message
    - type: text
      text: ' to him, saying, “Such things as you are saying have not been done; you are inventing them in your own mind.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For they all wanted to frighten us, thinking, “They will become discouraged with the work and it will not be done.” But now, [O God,] strengthen my hands.
