document_id: 1PE.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Keep Fervent in Your Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, since '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See 3:18.
    marker-yv: yv-n
  - type: text
    text: 'Christ suffered in the flesh [and died for us], arm yourselves [like warriors] with the same purpose [being willing to suffer for doing what is right and pleasing God], because whoever has suffered in the flesh [being like-minded with Christ] is done with [intentional] sin [having stopped pleasing the world], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'so that he can no longer spend the rest of his natural life living for human appetites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' desires, but [lives] for the will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the time already past is [more than] enough for doing what the [unsaved] Gentiles like to do—
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: having gone
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'living [unrestrained as you have done] in a course of [shameless] sensuality, lusts, drunkenness, carousing, drinking parties, and wanton idolatries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In [connection with] all this, they [the unbelievers] are resentful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' surprised that you do not [think like them, value their values and] run [hand in hand] with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' into the same excesses of dissipation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' immoral freedom, and they criticize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ridicule you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make fun of your values. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But they will [have to] give an account to Him who is ready to judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pass sentence on the living and the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For this is why the good news [of salvation] was preached [in their lifetimes] even to those who are dead, that though they were judged in the flesh as men are, they may live in the spirit according to [the will and purpose of] God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' culmination of all things is near. Therefore, be sound-minded and self-controlled for the purpose of prayer [staying balanced and focused on the things of God so that your communication will be clear, reasonable, specific and pleasing to Him.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Above all, have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Greek word was used to describe the taut, stretched muscles of a runner winning his race.
    marker-yv: yv-n
  - type: text
    text: 'fervent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfailing love for one another, because love covers a multitude of sins [it overlooks unkindness and unselfishly seeks the best for others]. [Prov 10:12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: During times of persecution of the early church mutual support was often critical for the survival of fellow believers.
    marker-yv: yv-n
  - type: text
    text: 'hospitable to one another without complaint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Just as each one of you has received a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: special
  - type: text
    text: ' gift [a spiritual talent, an ability graciously given by God], employ it in serving one another as [is appropriate for] good stewards of God’s multi-faceted grace [faithfully using the diverse, varied gifts and abilities granted to Christians by God’s unmerited favor]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Whoever speaks [to the congregation], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is to do so
  - type: text
    text: ' as one who speaks the oracles (utterances, the very words) of God. Whoever serves [the congregation] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is to do so
  - type: text
    text: ' as one who serves by the strength which God [abundantly] supplies, so that in all things God may be glorified [honored and magnified] through Jesus Christ, to whom belongs the glory and dominion forever and ever. Amen.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Share the Sufferings of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Beloved, do not be surprised at the fiery ordeal which is taking place to test you [that is, to test the quality of your faith], as though something strange '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unusual were happening to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But insofar as you are sharing Christ’s sufferings, keep on rejoicing, so that when His glory [filled with His radiance and splendor] is revealed, you may rejoice with great joy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If you are insulted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reviled for [bearing] the name of Christ, you are blessed [happy, with life-joy and comfort in God’s salvation regardless of your circumstances], because the Spirit of glory and of God is resting on you [and indwelling you—He whom they curse, you glorify]. [Is 11:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Make sure that none of you suffers as a murderer, or a thief, or any sort of criminal [in response to persecution], or as a troublesome meddler interfering in the affairs of others; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'but if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anyone suffers
  - type: text
    text: ' [ill-treatment] as a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Christian” occurs only here and in Acts 11:26; 26:28. It was first used as a derogatory word to describe believers.
    marker-yv: yv-n
  - type: text
    text: 'Christian [because of his belief], he is not to be ashamed, but is to glorify God [because he is considered worthy to suffer] in this name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For it is the time [destined] for judgment to begin with the household of God; and if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it begins
  - type: text
    text: ' with us, what will the outcome be for those who do not respect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' obey the gospel of God? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd if it is difficult for the righteous to be saved
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: what will become of the godless and the sinner
  - type: text
    text: '? [Prov 11:31] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore, those who are ill-treated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffer in accordance with the will of God must [continue to] do right and commit their souls [for safe-keeping] to the faithful Creator.'
