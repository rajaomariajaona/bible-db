document_id: GEN.42,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joseph’s Brothers Sent to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Jacob (Israel) learned that there was grain in Egypt, he said to his sons, “Why are you staring at one another [in bewilderment and not taking action]?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they said to him, “No, my lord, for your servants have [only] come to buy food. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We are all the sons of one man; we are honest men, your servants are not spies.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet he said to them, “No, you have come to see the undefended parts of our land.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they said, “Your servants are twelve brothers [in all], the sons of one man in the land of Canaan; please listen: the youngest is with our father today, and one is no longer alive.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph said to them, “It is as I said to you, you are spies. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this way you shall be tested: by the life of Pharaoh, you shall not leave this place unless your youngest brother comes here! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send one of you [back home], and let him bring your brother [here], while [the rest of] you remain confined, so that your words may be tested, [to see] whether there is any truth in you [and your story]; or else, by the life of Pharaoh, certainly you are spies.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joseph put them all in prison for three days.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph said to them on the third day, “Do this and [you may] live, for I fear God: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if you are honest men, let one of your brothers be confined in your [place here in] prison; but as for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' you, go, carry grain for the famine in your households, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “I have heard that there is grain in Egypt; go down there and buy [some] grain for us, so that we may live and not die [of starvation].” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but bring your youngest brother to me, so your words will be verified and you will not die.” And they did so. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to one another, “Truly we are guilty regarding our brother [Joseph], because we saw the distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish of his soul when he pleaded with us [to let him go], yet we would not listen [to his cry]; so this distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguish has come on us.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Reuben answered them, “Did I not tell you, ‘Do not sin against the boy’; and you would not listen? Now the accounting for his blood is required [of us for we are guilty of his death].” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did not know that Joseph understood [their conversation], because he spoke to them through an interpreter. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He turned away from his brothers and [left the room and] wept; then he returned and talked with them, and took Simeon from them and bound him in front of them [to be kept as a hostage in Egypt]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joseph gave orders [privately] that their bags be filled with grain, and that every man’s money [used to pay for the grain] be put back in his sack, and that provisions be given to them for the journey. And so this was done for them.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They loaded their donkeys with grain and left from there. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at the lodging place, as one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of them
    - type: text
      text: ' opened his sack to feed his donkey, he saw his money in the opening of his sack. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to his brothers, “My money has been returned! Here it is in my sack!” And their hearts sank, and they were afraid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turned trembling to one another, saying, “What is this that God has done to us?”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Return to Canaan
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to Jacob their father in the land of Canaan, they told him everything that had happened to them, saying, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So ten of Joseph’s brothers went down to buy grain in Egypt. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The man who is the lord of the land spoke harshly to us, and took us for spies of the land. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we told him, ‘We are honest men; we are not spies. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We are twelve brothers, sons of our father; one is no longer alive, and the youngest is with our father today in the land of Canaan.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the man, the lord of the country, said to us, ‘By this [test] I will know that you are honest men: leave one of your brothers here with me and take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: grain for
    - type: text
      text: ' your starving households and go. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring your youngest brother to me; then I will know that you are not spies, but that you are honest men. Then I will return your [imprisoned] brother [back] to you, and you may trade '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do business in the land.’ ”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when they emptied their sacks, every man’s bundle of money [paid to buy grain] was in his sack. When they and their father saw the bundles of money, they were afraid. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob their father said to them, “You have bereaved me [by causing the loss] of my children. Joseph is no more, and Simeon is no more, and you would take Benjamin [from me]. All these things are [working] against me.” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Reuben spoke to his father, “You may put my two sons to death if I do not bring Benjamin back to you; put him in my care, and I will return him to you.” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jacob said, “My son shall not go down [to Egypt] with you; for his brother is dead, and he alone is left [of Rachel’s children]. If any harm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' accident should happen to him on the journey you are taking, then you will bring my gray hair down to Sheol (the place of the dead) in sorrow.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jacob did not send Benjamin, Joseph’s [younger] brother, with his brothers, for he said, “I am afraid that some harm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' injury may come to him.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the sons of Israel came [to Egypt] to buy grain along with the others who were coming, for famine was in the land of Canaan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph was the ruler over the land, and he was the one who sold [grain] to all the people of the land; and Joseph’s [half-] brothers came and bowed down before him with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' faces to the ground. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joseph saw his brothers he recognized them, but [hiding his identity] he treated them as strangers and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph was conversing with his brothers through an interpreter (v 23).
      marker-yv: yv-n
    - type: text
      text: spoke harshly to them. He said to them, “Where have you come from?” And they said, “From the land of Canaan, to buy food.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph recognized his brothers, but '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps as many as twenty years had passed since his brothers last saw Joseph. They never would have suspected that the powerful Egyptian ruler standing before them was their brother.
      marker-yv: yv-n
    - type: text
      text: 'they did not recognize him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph remembered the dreams he had dreamed about them, and said to them, “You are spies; you have come [with a malicious purpose] to observe the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: nakedness
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'undefended parts of our land.” '
