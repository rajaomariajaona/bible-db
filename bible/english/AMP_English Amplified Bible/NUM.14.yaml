document_id: NUM.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Rebel
  - type: text
    content: 'Then all the congregation [of Israel] raised their voices and cried out, and the people wept that night. '
  '10':
  - type: text
    content: 'But all the congregation said to stone Joshua and Caleb with stones. But the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' appeared at the Tent of Meeting (tabernacle) before all the sons of Israel.'
  - type: heading
    content: Moses Pleads for the People
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “How long will these people treat me disrespectfully '
  - type: text
    content: and
  - type: text
    content: ' reject Me? And how long will they not believe in Me, despite all the [miraculous] signs which I have performed among them? '
  '12':
  - type: text
    content: I will strike them with the pestilence (plague) and dispossess them, and will make you into a nation greater and mightier than they.”
  '13':
  - type: text
    content: But Moses said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “Then the Egyptians will hear of it, for by Your strength You brought up these people from among them, '
  '14':
  - type: text
    content: and they will tell it to the inhabitants of this land. They have heard that You, L
  - type: heading
    content: ord
  - type: text
    content: ', are among these people [of Israel], that You, L'
  - type: heading
    content: ord
  - type: text
    content: ', are seen face to face, while Your cloud stands over them; and that You go before them in a pillar of cloud by day and in a pillar of fire by night. '
  '15':
  - type: text
    content: 'Now if You kill these people as one man, then the nations (Gentiles) that have heard of Your fame will say, '
  '16':
  - type: text
    content: ‘Because the L
  - type: heading
    content: ord
  - type: text
    content: ' was not able to bring these people into the land which He promised to give them, therefore He slaughtered them in the wilderness.’ '
  '17':
  - type: text
    content: 'But now, please, let the power of the Lord be great, just as You have declared, saying, '
  '18':
  - type: text
    content: ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' is slow to anger, and abundant in lovingkindness, forgiving wickedness and transgression; but He will by no means clear '
  - type: text
    content: the guilty
  - type: text
    content: ', visiting (avenging) the wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt of the fathers on the children, to the third and fourth '
  - type: text
    content: generations
  - type: text
    content: ' [that is, calling the children to account for the sins of their fathers].’ [Ex 34:6, 7] '
  '19':
  - type: text
    content: 'Please pardon the wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt of these people according to the greatness of Your lovingkindness, just as You have forgiven these people, from Egypt even until now.”'
  - type: heading
    content: The Lord Pardons and Rebukes
  '2':
  - type: text
    content: 'All the Israelites murmured [in discontent] against Moses and Aaron; and the whole congregation said to them, “Oh that we had died in the land of Egypt! Or that we had died in this wilderness! '
  '20':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “I have pardoned '
  - type: text
    content: them
  - type: text
    content: ' according to your word; '
  '21':
  - type: text
    content: but indeed as I live, all the earth will be filled with the glory of the L
  - type: heading
    content: ord
  - type: text
    content: '. [Is 6:3; 11:9] '
  '22':
  - type: text
    content: 'Surely all the men who have seen My glory and My [miraculous] signs which I performed in Egypt and in the wilderness, yet have put Me to the test these ten times and have not listened to My voice, '
  '23':
  - type: text
    content: 'will by no means see the land which I swore to [give to] their fathers; nor will any who treated me disrespectfully '
  - type: text
    content: and
  - type: text
    content: ' rejected Me see it. [Heb 6:4-11] '
  '24':
  - type: text
    content: 'But My servant Caleb, because he has a different spirit and has followed Me fully, I will bring into the land into which he entered, and his descendants shall take possession of it. '
  '25':
  - type: text
    content: Now the Amalekites and the Canaanites live in the valley; tomorrow turn and set out for the wilderness by way of the Red Sea.”
  '26':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '27':
  - type: text
    content: '“How long '
  - type: text
    content: shall I put up with
  - type: text
    content: ' this evil congregation who murmur [in discontent] against Me? I have heard the complaints of the Israelites, which they are making against Me. '
  '28':
  - type: text
    content: Say to them, ‘As I live,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘just what you have spoken in My hearing I will most certainly do to you; '
  '29':
  - type: text
    content: 'your dead bodies will fall in this wilderness, even all who were numbered of you, your entire number from twenty years old and upward, who have murmured against Me. [Heb 3:17-19] '
  '3':
  - type: text
    content: Why is the L
  - type: heading
    content: ord
  - type: text
    content: ' bringing us to this land [of Canaan], to fall by the sword? Our wives and '
  - type: note
    content: Lit little ones.
  - type: text
    content: 'children will become plunder. Would it not be better for us to return to Egypt?” [Acts 7:37-39] '
  '30':
  - type: text
    content: 'Except for Caleb the son of Jephunneh and Joshua the son of Nun, not one of you shall enter the land in which I swore [an oath] to settle you. '
  '31':
  - type: text
    content: 'But your children whom you said would become plunder, I will bring in, and they will know the land which you have despised '
  - type: text
    content: and
  - type: text
    content: ' rejected. '
  '32':
  - type: text
    content: 'But as for you, your dead bodies will fall in this wilderness. '
  '33':
  - type: text
    content: 'Your sons shall be wanderers '
  - type: text
    content: and
  - type: text
    content: ' shepherds in the wilderness for forty years, and they will suffer for your unfaithfulness (spiritual infidelity), until your corpses are consumed in the wilderness. '
  '34':
  - type: text
    content: 'According to the number of days in which you spied out the land [of Canaan], forty days, for each day, you shall bear '
  - type: text
    content: and
  - type: text
    content: ' suffer a year for your sins '
  - type: text
    content: and
  - type: text
    content: ' guilt, for forty years, and you shall know My displeasure [the revoking of My promise and My estrangement because of your sin]. '
  '35':
  - type: text
    content: I, the L
  - type: heading
    content: ord
  - type: text
    content: ', have spoken. I will most certainly do this to all this evil congregation who are gathered together against Me. In this wilderness they shall be consumed [by war, disease, and plagues], and here they shall die.’ ” [1 Cor 10:10, 11]'
  '36':
  - type: text
    content: 'As for the men whom Moses sent to spy out the land, and who returned and made all the congregation murmur '
  - type: text
    content: and
  - type: text
    content: ' complain against him by bringing back a bad report concerning the land, '
  '37':
  - type: text
    content: even those [ten] men who brought back the very bad report of the land died by a plague before the L
  - type: heading
    content: ord
  - type: text
    content: '. [Heb 3:17-19; Jude 5-7] '
  '38':
  - type: text
    content: But Joshua the son of Nun and Caleb the son of Jephunneh remained alive out of those men who went to spy out the land.
  - type: heading
    content: Israel Repulsed
  '39':
  - type: text
    content: 'Moses spoke the Lord’s words to all the Israelites, and the people mourned greatly. '
  '4':
  - type: text
    content: So they said one to another, “Let us appoint a [new] leader and return to Egypt.”
  '40':
  - type: text
    content: They got up early in the morning and went up to the ridge of the hill country, saying, “Look, here we are; we have indeed sinned, but we will go up to the place which the L
  - type: heading
    content: ord
  - type: text
    content: ' has promised.” '
  '41':
  - type: text
    content: But Moses said, “Why then are you transgressing the commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ', when it will not succeed? '
  '42':
  - type: text
    content: Do not go up, or you will be struck down before your enemies, for the L
  - type: heading
    content: ord
  - type: text
    content: ' is not among you. '
  '43':
  - type: text
    content: For the Amalekites and the Canaanites will be there in front of you, and you will fall by the sword, because you have turned away from following the L
  - type: heading
    content: ord
  - type: text
    content: ; therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' will not be with you.” '
  '44':
  - type: text
    content: But [in their arrogance] they dared to go up to the ridge of the hill country; however, neither the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' nor Moses left the camp. '
  '45':
  - type: text
    content: Then the Amalekites and the Canaanites who lived in that hill country came down and struck the Israelites and scattered them as far as Hormah.
  '5':
  - type: text
    content: 'Then Moses and Aaron fell on their faces before all the assembly of the congregation of the Israelites. '
  '6':
  - type: text
    content: 'Joshua the son of Nun and Caleb the son of Jephunneh, who were among those who had spied out the land, tore their clothes [as a sign of grief], '
  '7':
  - type: text
    content: 'and they spoke to all the congregation of the sons of Israel, saying, “The land through which we passed as spies is an exceedingly good land. '
  '8':
  - type: text
    content: If the L
  - type: heading
    content: ord
  - type: text
    content: ' delights in us, then He will bring us into this land and give it to us, a land which '
  - type: note
    content: See note 13:27.
  - type: text
    content: 'flows with milk and honey. '
  '9':
  - type: text
    content: Only do not rebel against the L
  - type: heading
    content: ord
  - type: text
    content: ; and do not fear the people of the land, for they will be our prey. Their protection has been removed from them, and the L
  - type: heading
    content: ord
  - type: text
    content: ' is with us. Do not fear them.” '
