document_id: NUM.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The People Rebel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then all the congregation [of Israel] raised their voices and cried out, and the people wept that night. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But all the congregation said to stone Joshua and Caleb with stones. But the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' appeared at the Tent of Meeting (tabernacle) before all the sons of Israel.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moses Pleads for the People
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “How long will these people treat me disrespectfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reject Me? And how long will they not believe in Me, despite all the [miraculous] signs which I have performed among them? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will strike them with the pestilence (plague) and dispossess them, and will make you into a nation greater and mightier than they.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But Moses said to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Then the Egyptians will hear of it, for by Your strength You brought up these people from among them, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: and they will tell it to the inhabitants of this land. They have heard that You, L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', are among these people [of Israel], that You, L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', are seen face to face, while Your cloud stands over them; and that You go before them in a pillar of cloud by day and in a pillar of fire by night. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now if You kill these people as one man, then the nations (Gentiles) that have heard of Your fame will say, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ‘Because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was not able to bring these people into the land which He promised to give them, therefore He slaughtered them in the wilderness.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But now, please, let the power of the Lord be great, just as You have declared, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is slow to anger, and abundant in lovingkindness, forgiving wickedness and transgression; but He will by no means clear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the guilty
    - type: text
      text: ', visiting (avenging) the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of the fathers on the children, to the third and fourth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: generations
    - type: text
      text: ' [that is, calling the children to account for the sins of their fathers].’ [Ex 34:6, 7] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Please pardon the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of these people according to the greatness of Your lovingkindness, just as You have forgiven these people, from Egypt even until now.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' Pardons and Rebukes'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'All the Israelites murmured [in discontent] against Moses and Aaron; and the whole congregation said to them, “Oh that we had died in the land of Egypt! Or that we had died in this wilderness! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “I have pardoned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' according to your word; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: but indeed as I live, all the earth will be filled with the glory of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Is 6:3; 11:9] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Surely all the men who have seen My glory and My [miraculous] signs which I performed in Egypt and in the wilderness, yet have put Me to the test these ten times and have not listened to My voice, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'will by no means see the land which I swore to [give to] their fathers; nor will any who treated me disrespectfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected Me see it. [Heb 6:4-11] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But My servant Caleb, because he has a different spirit and has followed Me fully, I will bring into the land into which he entered, and his descendants shall take possession of it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Now the Amalekites and the Canaanites live in the valley; tomorrow turn and set out for the wilderness by way of the Red Sea.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“How long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall I put up with
    - type: text
      text: ' this evil congregation who murmur [in discontent] against Me? I have heard the complaints of the Israelites, which they are making against Me. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Say to them, ‘As I live,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘just what you have spoken in My hearing I will most certainly do to you; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'your dead bodies will fall in this wilderness, even all who were numbered of you, your entire number from twenty years old and upward, who have murmured against Me. [Heb 3:17-19] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Why is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' bringing us to this land [of Canaan], to fall by the sword? Our wives and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: little ones
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'children will become plunder. Would it not be better for us to return to Egypt?” [Acts 7:37-39] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Except for Caleb the son of Jephunneh and Joshua the son of Nun, not one of you shall enter the land in which I swore [an oath] to settle you. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But your children whom you said would become plunder, I will bring in, and they will know the land which you have despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'But as for you, your dead bodies will fall in this wilderness. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Your sons shall be wanderers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shepherds in the wilderness for forty years, and they will suffer for your unfaithfulness (spiritual infidelity), until your corpses are consumed in the wilderness. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'According to the number of days in which you spied out the land [of Canaan], forty days, for each day, you shall bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffer a year for your sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt, for forty years, and you shall know My displeasure [the revoking of My promise and My estrangement because of your sin]. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', have spoken. I will most certainly do this to all this evil congregation who are gathered together against Me. In this wilderness they shall be consumed [by war, disease, and plagues], and here they shall die.’ ” [1 Cor 10:10, 11]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'As for the men whom Moses sent to spy out the land, and who returned and made all the congregation murmur '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complain against him by bringing back a bad report concerning the land, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: even those [ten] men who brought back the very bad report of the land died by a plague before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Heb 3:17-19; Jude 5-7] '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: But Joshua the son of Nun and Caleb the son of Jephunneh remained alive out of those men who went to spy out the land.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Repulsed
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Moses spoke the Lord’s words to all the Israelites, and the people mourned greatly. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So they said one to another, “Let us appoint a [new] leader and return to Egypt.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: They got up early in the morning and went up to the ridge of the hill country, saying, “Look, here we are; we have indeed sinned, but we will go up to the place which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has promised.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: But Moses said, “Why then are you transgressing the commandment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when it will not succeed? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Do not go up, or you will be struck down before your enemies, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is not among you. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: For the Amalekites and the Canaanites will be there in front of you, and you will fall by the sword, because you have turned away from following the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not be with you.” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: But [in their arrogance] they dared to go up to the ridge of the hill country; however, neither the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' nor Moses left the camp. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Then the Amalekites and the Canaanites who lived in that hill country came down and struck the Israelites and scattered them as far as Hormah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Moses and Aaron fell on their faces before all the assembly of the congregation of the Israelites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Joshua the son of Nun and Caleb the son of Jephunneh, who were among those who had spied out the land, tore their clothes [as a sign of grief], '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and they spoke to all the congregation of the sons of Israel, saying, “The land through which we passed as spies is an exceedingly good land. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' delights in us, then He will bring us into this land and give it to us, a land which '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 13:27.
      marker-yv: yv-n
    - type: text
      text: 'flows with milk and honey. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Only do not rebel against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; and do not fear the people of the land, for they will be our prey. Their protection has been removed from them, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is with us. Do not fear them.” '
