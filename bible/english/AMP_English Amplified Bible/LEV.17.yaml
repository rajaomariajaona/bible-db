document_id: LEV.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Blood for Atonement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Speak to Aaron and his sons and all the children of Israel, and say to them, ‘This is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has commanded, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Any man from the house of Israel who kills an ox or lamb or goat in the camp, or kills it outside the camp '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and has not brought it to the doorway of the Tent of Meeting to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At this point the Israelites were not permitted to eat meat at will. But, after the animal was offered as a burnt offering, most of it was returned to the owner as a gift from God.
    marker-yv: yv-n
  - type: text
    text: offer it as an offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' before the tabernacle of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that man shall be guilty of bloodshed. He has shed blood and shall be cut off from his people [excluding him from the atonement made for them]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This is so that the sons of Israel may bring their sacrifices which they were sacrificing [to idols] in the open field [where they killed them], that they may bring them in to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', at the doorway of the Tent of Meeting to the priest, and sacrifice them as sacrifices of peace offerings to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The priest shall sprinkle the blood on the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at the doorway of the Tent of Meeting and offer the fat up in smoke as a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing aroma to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So they shall no longer offer their sacrifices to goat-idols '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' demons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' field spirits with which they have played the prostitute. This shall be a permanent statute for them throughout their generations.” ’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Then you shall say to them, ‘Any man from the house of Israel or any of the strangers living temporarily among you, who offers a burnt offering or sacrifice '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: and does not bring it to the doorway of the Tent of Meeting to offer it to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall be cut off from his people [excluding him from the atonement made for them].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '‘Any man from the house of Israel, or any stranger living temporarily among you, who eats any blood, against that person I shall set My face and I will cut him off from his people [excluding him from the atonement made for them]. [Ezek 33:25] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soul
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'life of the flesh is in the blood, and I have given it to you on the altar to make atonement for your souls; for it is the blood that makes atonement, by reason of the life [which it represents].’ [Rom 3:24-26] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Therefore I have said to the sons of Israel, ‘No person among you may eat blood, nor may any stranger living temporarily among you eat blood.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So when any Israelite or any stranger living temporarily among them, catches '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: an animal or bird which may be eaten
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: any ceremonially clean animal or bird when hunting, he shall pour out its blood and cover it with earth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“For in regard to the life of all flesh, its blood is [the same] as its life; therefore I said to the Israelites, ‘You are not to eat the blood of any flesh, for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: soul
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'life of all flesh is its blood. Whoever eats it shall be cut off [excluding him from the atonement made for them].’ '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Every person who eats an animal which dies [of natural causes] or was torn by a predator, whether he is native-born or a stranger, he shall wash his clothes and bathe in water, and be [ceremonially] unclean until evening; then he will become clean. [Acts 15:20] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But if he does not wash '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his clothes
  - type: text
    text: ' or bathe his body, he shall bear his guilt [for it will not be borne by the sacrifice of atonement].”'
