document_id: LEV.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Blood for Atonement
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '‘Any man from the house of Israel, or any stranger living temporarily among you, who eats any blood, against that person I shall set My face and I will cut him off from his people [excluding him from the atonement made for them]. [Ezek 33:25] '
  '11':
  - type: text
    content: 'For the '
  - type: note
    content: Lit soul.
  - type: text
    content: 'life of the flesh is in the blood, and I have given it to you on the altar to make atonement for your souls; for it is the blood that makes atonement, by reason of the life [which it represents].’ [Rom 3:24-26] '
  '12':
  - type: text
    content: 'Therefore I have said to the sons of Israel, ‘No person among you may eat blood, nor may any stranger living temporarily among you eat blood.’ '
  '13':
  - type: text
    content: 'So when any Israelite or any stranger living temporarily among them, catches '
  - type: note
    content: Lit an animal or bird which may be eaten.
  - type: text
    content: any ceremonially clean animal or bird when hunting, he shall pour out its blood and cover it with earth.
  '14':
  - type: text
    content: '“For in regard to the life of all flesh, its blood is [the same] as its life; therefore I said to the Israelites, ‘You are not to eat the blood of any flesh, for the '
  - type: note
    content: Lit soul.
  - type: text
    content: 'life of all flesh is its blood. Whoever eats it shall be cut off [excluding him from the atonement made for them].’ '
  '15':
  - type: text
    content: 'Every person who eats an animal which dies [of natural causes] or was torn by a predator, whether he is native-born or a stranger, he shall wash his clothes and bathe in water, and be [ceremonially] unclean until evening; then he will become clean. [Acts 15:20] '
  '16':
  - type: text
    content: 'But if he does not wash '
  - type: text
    content: his clothes
  - type: text
    content: ' or bathe his body, he shall bear his guilt [for it will not be borne by the sacrifice of atonement].”'
  '2':
  - type: text
    content: “Speak to Aaron and his sons and all the children of Israel, and say to them, ‘This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded, saying, '
  '3':
  - type: text
    content: '“Any man from the house of Israel who kills an ox or lamb or goat in the camp, or kills it outside the camp '
  '4':
  - type: text
    content: 'and has not brought it to the doorway of the Tent of Meeting to '
  - type: note
    content: At this point the Israelites were not permitted to eat meat at will. But, after the animal was offered as a burnt offering, most of it was returned to the owner as a gift from God.
  - type: text
    content: offer it as an offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' before the tabernacle of the L'
  - type: heading
    content: ord
  - type: text
    content: ', that man shall be guilty of bloodshed. He has shed blood and shall be cut off from his people [excluding him from the atonement made for them]. '
  '5':
  - type: text
    content: This is so that the sons of Israel may bring their sacrifices which they were sacrificing [to idols] in the open field [where they killed them], that they may bring them in to the L
  - type: heading
    content: ord
  - type: text
    content: ', at the doorway of the Tent of Meeting to the priest, and sacrifice them as sacrifices of peace offerings to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: The priest shall sprinkle the blood on the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' at the doorway of the Tent of Meeting and offer the fat up in smoke as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'So they shall no longer offer their sacrifices to goat-idols '
  - type: text
    content: or
  - type: text
    content: ' demons '
  - type: text
    content: or
  - type: text
    content: ' field spirits with which they have played the prostitute. This shall be a permanent statute for them throughout their generations.” ’'
  '8':
  - type: text
    content: '“Then you shall say to them, ‘Any man from the house of Israel or any of the strangers living temporarily among you, who offers a burnt offering or sacrifice '
  '9':
  - type: text
    content: and does not bring it to the doorway of the Tent of Meeting to offer it to the L
  - type: heading
    content: ord
  - type: text
    content: ' shall be cut off from his people [excluding him from the atonement made for them].'
