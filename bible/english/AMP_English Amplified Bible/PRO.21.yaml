  '1':
  - type: heading
    content: On Life and Conduct
  - type: text
    content: The king’s heart is like channels of water in the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: He turns it whichever way He wishes. [Ex 10:1, 2; Ezra 6:22]
  '10':
  - type: text
    content: The soul of the wicked desires evil [like an addictive substance];
  - type: text
    content: His neighbor finds no compassion in his eyes. [James 2:16]
  '11':
  - type: text
    content: When the scoffer is punished, the naive [observes the lesson and] becomes wise;
  - type: text
    content: 'But when the wise '
  - type: text
    content: and
  - type: text
    content: ' teachable person is instructed, he receives knowledge. [Prov 19:25]'
  '12':
  - type: text
    content: The righteous one keeps an eye on the house of the wicked—
  - type: text
    content: How the wicked are cast down to ruin.
  '13':
  - type: text
    content: Whoever shuts his ears at the cry of the poor
  - type: text
    content: Will cry out himself and not be answered. [Matt 18:30-34; James 2:13]
  '14':
  - type: text
    content: A gift in secret subdues anger,
  - type: text
    content: And a bribe [hidden] in the pocket, strong wrath.
  '15':
  - type: text
    content: When justice is done, it is a joy to the righteous (the upright, the one in right standing with God),
  - type: text
    content: But to the evildoers it is disaster.
  '16':
  - type: text
    content: A man who wanders from the way of understanding (godly wisdom)
  - type: text
    content: Will remain in the assembly of the dead.
  '17':
  - type: text
    content: 'He who loves [only selfish] pleasure '
  - type: text
    content: will become
  - type: text
    content: ' a poor man;'
  - type: text
    content: 'He who loves '
  - type: text
    content: and
  - type: text
    content: ' is devoted to '
  - type: note
    content: I.e. items associated with lavish feasting and excessive luxury.
  - type: text
    content: wine and [olive] oil will not become rich.
  '18':
  - type: text
    content: The wicked become a ransom for the righteous,
  - type: text
    content: And the treacherous in the place of the upright [for they fall into their own traps].
  '19':
  - type: text
    content: It is better to dwell in a desert land
  - type: text
    content: Than with a contentious and troublesome woman.
  '2':
  - type: text
    content: Every man’s way is right in his own eyes,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' weighs '
  - type: text
    content: and
  - type: text
    content: ' examines the hearts [of people and their motives]. [Prov 24:12; Luke 16:15]'
  '20':
  - type: text
    content: There is precious treasure and oil in the house of the wise [who prepare for the future],
  - type: text
    content: 'But a short-sighted '
  - type: text
    content: and
  - type: text
    content: ' foolish man swallows it up '
  - type: text
    content: and
  - type: text
    content: ' wastes it.'
  '21':
  - type: text
    content: He who earnestly seeks righteousness and loyalty
  - type: text
    content: Finds life, righteousness, and honor. [Prov 15:9; Matt 5:6]
  '22':
  - type: text
    content: A wise man scales the city [walls] of the mighty
  - type: text
    content: And brings down the stronghold in which they trust.
  '23':
  - type: text
    content: He who guards his mouth and his tongue
  - type: text
    content: Guards himself from troubles. [Prov 12:13; 13:3; 18:21; James 3:2]
  '24':
  - type: text
    content: “Proud,” “Haughty,” “Scoffer,” are his names
  - type: text
    content: 'Who acts with overbearing '
  - type: text
    content: and
  - type: text
    content: ' insolent pride.'
  '25':
  - type: text
    content: The desire of the lazy kills him,
  - type: text
    content: For his hands refuse to labor;
  '26':
  - type: text
    content: He craves all the day long [and does no work],
  - type: text
    content: But the righteous [willingly] gives and does not withhold [what he has]. [2 Cor 9:6-10]
  '27':
  - type: text
    content: 'The sacrifice of the wicked is detestable '
  - type: text
    content: and
  - type: text
    content: ' offensive [to the L'
  - type: heading
    content: ord
  - type: text
    content: '].'
  - type: text
    content: How much more [unacceptable and insulting can it be] when he brings it with evil intention?
  '28':
  - type: text
    content: A false witness will perish,
  - type: text
    content: 'But a man who listens '
  - type: text
    content: to the truth
  - type: text
    content: ' will speak forever '
  - type: text
    content: and
  - type: text
    content: ' go unchallenged.'
  '29':
  - type: text
    content: A wicked man puts on a bold face,
  - type: text
    content: 'But as for the upright, he considers, directs, '
  - type: text
    content: and
  - type: text
    content: ' establishes his way [with the confidence of integrity].'
  '3':
  - type: text
    content: To do righteousness and justice
  - type: text
    content: Is more acceptable to the L
  - type: heading
    content: ord
  - type: text
    content: ' than sacrifice [for wrongs repeatedly committed]. [1 Sam 15:22; Prov 15:8; Is 1:11; Hos 6:6; Mic 6:7, 8]'
  '30':
  - type: text
    content: There is no [human] wisdom or understanding
  - type: text
    content: Or counsel [that can prevail] against the L
  - type: heading
    content: ord
  - type: text
    content: .
  '31':
  - type: text
    content: The horse is prepared for the day of battle,
  - type: text
    content: 'But deliverance '
  - type: text
    content: and
  - type: text
    content: ' victory belong to the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: 'Haughty '
  - type: text
    content: and
  - type: text
    content: ' arrogant eyes and a proud heart,'
  - type: text
    content: The lamp of the wicked [their self-centered pride], is sin [in the eyes of God].
  '5':
  - type: text
    content: 'The plans of the diligent lead surely to abundance '
  - type: text
    content: and
  - type: text
    content: ' advantage,'
  - type: text
    content: But everyone who acts in haste comes surely to poverty.
  '6':
  - type: text
    content: Acquiring treasures by a lying tongue
  - type: text
    content: 'Is a fleeting vapor, the seeking '
  - type: text
    content: and
  - type: text
    content: ' pursuit of death.'
  '7':
  - type: text
    content: The violence of the wicked will [return to them and] drag them away [like fish caught in a net],
  - type: text
    content: Because they refuse to act with justice.
  '8':
  - type: text
    content: The way of the guilty is [exceedingly] crooked,
  - type: text
    content: But as for the pure, his conduct is upright.
  '9':
  - type: text
    content: It is better to live in a corner of the housetop [on the flat roof, exposed to the weather]
  - type: text
    content: Than in a house shared with a quarrelsome (contentious) woman.
