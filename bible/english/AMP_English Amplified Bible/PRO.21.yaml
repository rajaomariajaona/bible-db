document_id: PRO.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: On Life and Conduct
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The king’s heart is like channels of water in the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turns it whichever way He wishes. [Ex 10:1, 2; Ezra 6:22]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The soul of the wicked desires evil [like an addictive substance];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His neighbor finds no compassion in his eyes. [James 2:16]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When the scoffer is punished, the naive [observes the lesson and] becomes wise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But when the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' teachable person is instructed, he receives knowledge. [Prov 19:25]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The righteous one keeps an eye on the house of the wicked—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How the wicked are cast down to ruin.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Whoever shuts his ears at the cry of the poor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will cry out himself and not be answered. [Matt 18:30-34; James 2:13]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: A gift in secret subdues anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a bribe [hidden] in the pocket, strong wrath.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When justice is done, it is a joy to the righteous (the upright, the one in right standing with God),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But to the evildoers it is disaster.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: A man who wanders from the way of understanding (godly wisdom)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will remain in the assembly of the dead.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He who loves [only selfish] pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will become
    - type: text
      text: ' a poor man;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He who loves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is devoted to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. items associated with lavish feasting and excessive luxury.
      marker-yv: yv-n
    - type: text
      text: wine and [olive] oil will not become rich.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The wicked become a ransom for the righteous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the treacherous in the place of the upright [for they fall into their own traps].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It is better to dwell in a desert land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than with a contentious and troublesome woman.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Every man’s way is right in his own eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' weighs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' examines the hearts [of people and their motives]. [Prov 24:12; Luke 16:15]'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: There is precious treasure and oil in the house of the wise [who prepare for the future],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But a short-sighted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foolish man swallows it up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wastes it.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He who earnestly seeks righteousness and loyalty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Finds life, righteousness, and honor. [Prov 15:9; Matt 5:6]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: A wise man scales the city [walls] of the mighty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brings down the stronghold in which they trust.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He who guards his mouth and his tongue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guards himself from troubles. [Prov 12:13; 13:3; 18:21; James 3:2]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Proud,” “Haughty,” “Scoffer,” are his names
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who acts with overbearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolent pride.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The desire of the lazy kills him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For his hands refuse to labor;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He craves all the day long [and does no work],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the righteous [willingly] gives and does not withhold [what he has]. [2 Cor 9:6-10]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The sacrifice of the wicked is detestable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offensive [to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '].'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much more [unacceptable and insulting can it be] when he brings it with evil intention?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A false witness will perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But a man who listens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the truth
    - type: text
      text: ' will speak forever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go unchallenged.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: A wicked man puts on a bold face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But as for the upright, he considers, directs, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establishes his way [with the confidence of integrity].'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: To do righteousness and justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is more acceptable to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' than sacrifice [for wrongs repeatedly committed]. [1 Sam 15:22; Prov 15:8; Is 1:11; Hos 6:6; Mic 6:7, 8]'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: There is no [human] wisdom or understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or counsel [that can prevail] against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The horse is prepared for the day of battle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But deliverance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' victory belong to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Haughty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant eyes and a proud heart,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lamp of the wicked [their self-centered pride], is sin [in the eyes of God].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The plans of the diligent lead surely to abundance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' advantage,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But everyone who acts in haste comes surely to poverty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Acquiring treasures by a lying tongue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is a fleeting vapor, the seeking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pursuit of death.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The violence of the wicked will [return to them and] drag them away [like fish caught in a net],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they refuse to act with justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The way of the guilty is [exceedingly] crooked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for the pure, his conduct is upright.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: It is better to live in a corner of the housetop [on the flat roof, exposed to the weather]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than in a house shared with a quarrelsome (contentious) woman.
