document_id: PRO.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast the Upright and the Wicked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: He who [willfully] separates himself [from God and man] seeks his own desire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He quarrels against all sound wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A [closed-minded] fool does not delight in understanding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But only in revealing his personal opinions [unwittingly displaying his self-indulgence and his stupidity].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When the wicked man comes [to the depth of evil], contempt [of all that is pure and good] also comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with inner baseness (dishonor) comes outer shame (scorn).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The words of a man’s mouth are like deep waters [copious and difficult to fathom];
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fountain of [mature, godly] wisdom is like a bubbling stream [sparkling, fresh, pure, and life-giving].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: To show respect to the wicked person is not good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor to push aside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deprive the righteous of justice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A fool’s lips bring contention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strife,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his mouth invites a beating.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A fool’s mouth is his ruin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his lips are the snare of his soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The words of a whisperer (gossip) are like dainty morsels [to be greedily eaten];
- type: usfm
  marker: q1
  children:
  - type: text
    text: They go down into the innermost chambers of the body [to be remembered and mused upon].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He who is careless in his work
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is a brother to him who destroys.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is a strong tower;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The righteous runs to it and is safe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set on high [far above evil].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The rich man’s wealth is his strong city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And like a high wall [of protection] in his own imagination '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conceit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Before disaster the heart of a man is haughty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' filled with self-importance,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But humility comes before honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He who answers before he hears [the facts]—
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is folly and shame to him. [John 7:51]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The spirit of a man sustains him in sickness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But as for a broken spirit, who can bear it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The mind of the prudent [always] acquires knowledge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the ear of the wise [always] seeks knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A man’s gift [given in love or courtesy] makes room for him
- type: usfm
  marker: q1
  children:
  - type: text
    text: And brings him before great men. [Gen 32:20; 1 Sam 25:27; Prov 17:8; 21:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The first one to plead his case seems right,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Until
  - type: text
    text: ' another comes and cross-examines him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 16:33.
    marker-yv: yv-n
  - type: text
    text: To cast lots puts an end to quarrels
- type: usfm
  marker: q1
  children:
  - type: text
    text: And decides between powerful contenders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'A brother offended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is harder to win
  - type: text
    text: ' over than a fortified city,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And contentions [separating families] are like the bars of a castle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A man’s stomach will be satisfied with the fruit of his mouth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will be satisfied with the consequence of his words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Death and life are in the power of the tongue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And those who love it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indulge it will eat its fruit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bear the consequences of their words. [Matt 12:37]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He who finds a [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Jewish tradition it is said that in Israel, they used to ask a man who had married, “Matsa or motse?” “Matsa” is the Hebrew for “finds” here, where a good wife is in view, and “motse” is the word for “found” (NASB “discovered”) in Eccl 7:26.
    marker-yv: yv-n
  - type: text
    text: true and faithful] wife finds a good thing
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And obtains favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' approval from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Prov 19:14; 31:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The poor man pleads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the rich man answers roughly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The man of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: too many
  - type: text
    text: ' friends [chosen indiscriminately] will be broken in pieces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come to ruin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But there is a [true, loving] friend who [is reliable and] sticks closer than a brother.
