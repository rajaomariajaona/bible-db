document_id: PRO.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Contrast the Upright and the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who [willfully] separates himself [from God and man] seeks his own desire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He quarrels against all sound wisdom.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is a strong tower;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The righteous runs to it and is safe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set on high [far above evil].'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rich man’s wealth is his strong city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And like a high wall [of protection] in his own imagination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conceit.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Before disaster the heart of a man is haughty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' filled with self-importance,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But humility comes before honor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who answers before he hears [the facts]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is folly and shame to him. [John 7:51]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The spirit of a man sustains him in sickness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for a broken spirit, who can bear it?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mind of the prudent [always] acquires knowledge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the ear of the wise [always] seeks knowledge.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man’s gift [given in love or courtesy] makes room for him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brings him before great men. [Gen 32:20; 1 Sam 25:27; Prov 17:8; 21:14]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The first one to plead his case seems right,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Until
    - type: text
      text: ' another comes and cross-examines him.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 16:33.
      marker-yv: yv-n
    - type: text
      text: To cast lots puts an end to quarrels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And decides between powerful contenders.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A brother offended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is harder to win
    - type: text
      text: ' over than a fortified city,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And contentions [separating families] are like the bars of a castle.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A [closed-minded] fool does not delight in understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But only in revealing his personal opinions [unwittingly displaying his self-indulgence and his stupidity].
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man’s stomach will be satisfied with the fruit of his mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be satisfied with the consequence of his words.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Death and life are in the power of the tongue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And those who love it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indulge it will eat its fruit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bear the consequences of their words. [Matt 12:37]'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who finds a [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Jewish tradition it is said that in Israel, they used to ask a man who had married, “Matsa or motse?” “Matsa” is the Hebrew for “finds” here, where a good wife is in view, and “motse” is the word for “found” (NASB “discovered”) in Eccl 7:26.
      marker-yv: yv-n
    - type: text
      text: true and faithful] wife finds a good thing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And obtains favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' approval from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Prov 19:14; 31:10]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor man pleads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the rich man answers roughly.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The man of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: too many
    - type: text
      text: ' friends [chosen indiscriminately] will be broken in pieces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' come to ruin,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But there is a [true, loving] friend who [is reliable and] sticks closer than a brother.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the wicked man comes [to the depth of evil], contempt [of all that is pure and good] also comes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with inner baseness (dishonor) comes outer shame (scorn).
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of a man’s mouth are like deep waters [copious and difficult to fathom];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fountain of [mature, godly] wisdom is like a bubbling stream [sparkling, fresh, pure, and life-giving].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To show respect to the wicked person is not good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor to push aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deprive the righteous of justice.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A fool’s lips bring contention '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strife,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his mouth invites a beating.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fool’s mouth is his ruin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his lips are the snare of his soul.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of a whisperer (gossip) are like dainty morsels [to be greedily eaten];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They go down into the innermost chambers of the body [to be remembered and mused upon].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who is careless in his work
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a brother to him who destroys.
