  '2':
  - type: text
    content: A [closed-minded] fool does not delight in understanding,
  - type: text
    content: But only in revealing his personal opinions [unwittingly displaying his self-indulgence and his stupidity].
  '20':
  - type: text
    content: A man’s stomach will be satisfied with the fruit of his mouth;
  - type: text
    content: He will be satisfied with the consequence of his words.
  '21':
