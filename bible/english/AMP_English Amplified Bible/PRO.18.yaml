    content: He who answers before he hears [the facts]—
  - type: text
    content: It is folly and shame to him. [John 7:51]
  '14':
  - type: text
    content: The spirit of a man sustains him in sickness,
  - type: text
    content: But as for a broken spirit, who can bear it?
  '15':
  - type: text
    content: The mind of the prudent [always] acquires knowledge,
  - type: text
    content: And the ear of the wise [always] seeks knowledge.
  '16':
  - type: text
    content: A man’s gift [given in love or courtesy] makes room for him
  - type: text
    content: And brings him before great men. [Gen 32:20; 1 Sam 25:27; Prov 17:8; 21:14]
  '17':
  - type: text
    content: The first one to plead his case seems right,
  - type: text
