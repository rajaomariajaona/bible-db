  '3':
  - type: text
    content: When the wicked man comes [to the depth of evil], contempt [of all that is pure and good] also comes,
  - type: text
    content: And with inner baseness (dishonor) comes outer shame (scorn).
  '4':
  - type: text
    content: The words of a man’s mouth are like deep waters [copious and difficult to fathom];
  - type: text
    content: The fountain of [mature, godly] wisdom is like a bubbling stream [sparkling, fresh, pure, and life-giving].
  '5':
  - type: text
    content: To show respect to the wicked person is not good,
  - type: text
    content: 'Nor to push aside '
  - type: text
    content: and
  - type: text
    content: ' deprive the righteous of justice.'
  '6':
  - type: text
    content: 'A fool’s lips bring contention '
  - type: text
    content: and
  - type: text
    content: ' strife,'
  - type: text
    content: And his mouth invites a beating.
  '7':
  - type: text
    content: A fool’s mouth is his ruin,
  - type: text
    content: And his lips are the snare of his soul.
  '8':
  - type: text
    content: The words of a whisperer (gossip) are like dainty morsels [to be greedily eaten];
  - type: text
    content: They go down into the innermost chambers of the body [to be remembered and mused upon].
  '9':
  - type: text
    content: He who is careless in his work
  - type: text
    content: Is a brother to him who destroys.
