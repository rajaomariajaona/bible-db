document_id: JOB.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Elihu Claims to Speak for God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “However, Job, please listen to my words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And pay attention to everything I say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Behold, I have opened my mouth [to begin my speech];
- type: usfm
  marker: q1
  children:
  - type: text
    text: My tongue in my mouth is going to speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “My words will express the uprightness of my heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my lips will speak what they know with utter sincerity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “The Spirit of God has made me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the breath of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the Almighty gives me life [which inspires me].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Answer me, if you can;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set yourselves before me, take your stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Behold, I belong to God like you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I too was formed out of the clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Behold, I will not make you afraid or terrified of me [for I am only mortal and not God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor should any pressure from me weigh heavily upon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Surely you have spoken in my hearing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I have heard the sound of your words, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘I am pure, without transgression;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am innocent and there is no guilt in me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ‘Behold, God finds pretexts against me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He counts me as His enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘He puts my feet in the stocks [to hinder and humiliate me];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He [suspiciously] watches all my paths,’ [you say].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Look, let me answer you, in this you are not right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' just;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For God is greater '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' far superior to man.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“Why do you complain against Him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He does not answer [you with] all His doings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “For God speaks once,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' twice, yet no one notices it [including you, Job].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “In a dream, a vision of the night [one may hear God’s voice],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When deep sleep falls on men
- type: usfm
  marker: q1
  children:
  - type: text
    text: While slumbering upon the bed,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then He opens the ears of men
- type: usfm
  marker: q1
  children:
  - type: text
    text: And seals their instruction,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'That He may turn man aside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from his
  - type: text
    text: ' conduct,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And keep him from pride;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He holds back his soul from the pit [of destruction],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his life from passing over into Sheol (the nether world, the place of the dead).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶“Man is also disciplined with pain on his bed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with unceasing complaint in his bones,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So that his life makes him loathe food,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his soul [loathe] even his favorite dishes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “His flesh is so wasted away that it cannot be seen,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his bones which were not seen now stick out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Then his soul draws near to the pit [of destruction],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his life to those who bring death (the destroyers).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶“If there is an angel as a mediator for him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: One out of a thousand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To explain to a man what is right for him [that is, how to be in right standing with God],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: he
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the angel is gracious to him, and says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Spare him from going down to the pit [of destruction];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have found a ransom [a consideration, or reason for redemption, an atonement]!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“Let his flesh be restored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become fresher than in youth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him return to the days of his youthful strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “He will pray to God, and He shall be favorable to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that he looks at His face with joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For God restores to man His righteousness [that is, his right standing with God—with its joys].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “He sings out to other men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I have sinned and perverted that which was right,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it was not proper for me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ‘God has redeemed my life from going to the pit [of destruction],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my life shall see the light.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '¶[Elihu comments,] “Behold, God does all these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: often
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: twice, yes, three times, with a man,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: To bring his life back from the pit [of destruction],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That he may be enlightened with the light of the living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Pay attention, Job, listen to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep silent, and I will speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “If you have anything to say, answer me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Speak, for I desire to justify you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “If not [and you have nothing to say], listen to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep silent, and I will teach you wisdom.”
