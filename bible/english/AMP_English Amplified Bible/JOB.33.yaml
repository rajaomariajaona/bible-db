document_id: JOB.33,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Claims to Speak for God
  - type: text
    content: “However, Job, please listen to my words,
  - type: text
    content: And pay attention to everything I say.
  '10':
  - type: text
    content: ‘Behold, God finds pretexts against me;
  - type: text
    content: He counts me as His enemy.
  '11':
  - type: text
    content: ‘He puts my feet in the stocks [to hinder and humiliate me];
  - type: text
    content: He [suspiciously] watches all my paths,’ [you say].
  '12':
  - type: text
    content: '“Look, let me answer you, in this you are not right '
  - type: text
    content: or
  - type: text
    content: ' just;'
  - type: text
    content: 'For God is greater '
  - type: text
    content: and
  - type: text
    content: ' far superior to man.'
  '13':
  - type: text
    content: ¶“Why do you complain against Him?
  - type: text
    content: That He does not answer [you with] all His doings.
  '14':
  - type: text
    content: “For God speaks once,
  - type: text
    content: 'And '
  - type: text
    content: even
  - type: text
    content: ' twice, yet no one notices it [including you, Job].'
  '15':
  - type: text
    content: “In a dream, a vision of the night [one may hear God’s voice],
  - type: text
    content: When deep sleep falls on men
  - type: text
    content: While slumbering upon the bed,
  '16':
  - type: text
    content: Then He opens the ears of men
  - type: text
    content: And seals their instruction,
  '17':
  - type: text
    content: 'That He may turn man aside '
  - type: text
    content: from his
  - type: text
    content: ' conduct,'
  - type: text
    content: And keep him from pride;
  '18':
  - type: text
    content: He holds back his soul from the pit [of destruction],
  - type: text
    content: And his life from passing over into Sheol (the nether world, the place of the dead).
  '19':
  - type: text
    content: ¶“Man is also disciplined with pain on his bed,
  - type: text
    content: And with unceasing complaint in his bones,
  '2':
  - type: text
    content: “Behold, I have opened my mouth [to begin my speech];
  - type: text
    content: My tongue in my mouth is going to speak.
  '20':
  - type: text
    content: So that his life makes him loathe food,
  - type: text
    content: And his soul [loathe] even his favorite dishes.
  '21':
  - type: text
    content: “His flesh is so wasted away that it cannot be seen,
  - type: text
    content: And his bones which were not seen now stick out.
  '22':
  - type: text
    content: “Then his soul draws near to the pit [of destruction],
  - type: text
    content: And his life to those who bring death (the destroyers).
  '23':
  - type: text
    content: ¶“If there is an angel as a mediator for him,
  - type: text
    content: One out of a thousand,
  - type: text
    content: To explain to a man what is right for him [that is, how to be in right standing with God],
  '24':
  - type: text
    content: 'Then '
  - type: note
    content: Lit he.
  - type: text
    content: the angel is gracious to him, and says,
  - type: text
    content: ‘Spare him from going down to the pit [of destruction];
  - type: text
    content: I have found a ransom [a consideration, or reason for redemption, an atonement]!’
  '25':
  - type: text
    content: '“Let his flesh be restored '
  - type: text
    content: and
  - type: text
    content: ' become fresher than in youth;'
  - type: text
    content: Let him return to the days of his youthful strength.
  '26':
  - type: text
    content: “He will pray to God, and He shall be favorable to him,
  - type: text
    content: So that he looks at His face with joy;
  - type: text
    content: For God restores to man His righteousness [that is, his right standing with God—with its joys].
  '27':
  - type: text
    content: “He sings out to other men,
  - type: text
    content: ‘I have sinned and perverted that which was right,
  - type: text
    content: And it was not proper for me!
  '28':
  - type: text
    content: ‘God has redeemed my life from going to the pit [of destruction],
  - type: text
    content: And my life shall see the light.’ ”
  '29':
  - type: text
    content: '¶[Elihu comments,] “Behold, God does all these '
  - type: text
    content: things
  - type: text
    content: ' '
  - type: note
    content: Or often.
  - type: text
    content: twice, yes, three times, with a man,
  '3':
  - type: text
    content: “My words will express the uprightness of my heart,
  - type: text
    content: And my lips will speak what they know with utter sincerity.
  '30':
  - type: text
    content: To bring his life back from the pit [of destruction],
  - type: text
    content: That he may be enlightened with the light of the living.
  '31':
  - type: text
    content: “Pay attention, Job, listen to me;
  - type: text
    content: Keep silent, and I will speak.
  '32':
  - type: text
    content: “If you have anything to say, answer me;
  - type: text
    content: Speak, for I desire to justify you.
  '33':
  - type: text
    content: “If not [and you have nothing to say], listen to me;
  - type: text
    content: Keep silent, and I will teach you wisdom.”
  '4':
  - type: text
    content: “The Spirit of God has made me,
  - type: text
    content: 'And the breath of '
  - type: note
    content: Heb Shaddai.
  - type: text
    content: the Almighty gives me life [which inspires me].
  '5':
  - type: text
    content: “Answer me, if you can;
  - type: text
    content: Set yourselves before me, take your stand.
  '6':
  - type: text
    content: “Behold, I belong to God like you;
  - type: text
    content: I too was formed out of the clay.
  '7':
  - type: text
    content: “Behold, I will not make you afraid or terrified of me [for I am only mortal and not God],
  - type: text
    content: Nor should any pressure from me weigh heavily upon you.
  '8':
  - type: text
    content: ¶“Surely you have spoken in my hearing,
  - type: text
    content: 'And I have heard the sound of your words, saying:'
  '9':
  - type: text
    content: ‘I am pure, without transgression;
  - type: text
    content: I am innocent and there is no guilt in me.
