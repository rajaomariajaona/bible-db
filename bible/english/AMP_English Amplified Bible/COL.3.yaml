document_id: COL.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Put On the New Self
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore if you have been raised with Christ [to a new life, sharing in His resurrection from the dead], keep seeking the things that are above, where Christ is, seated at the right hand of God. [Ps 110:1] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and have put on the new [spiritual] self who is being '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' renewed in true knowledge in the image of Him who created the new self— [Gen 1:26] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: a renewal
    - type: text
      text: ' in which there is no [distinction between] Greek and Jew, circumcised and uncircumcised, [nor between nations whether] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A derogatory term used to describe uneducated, uncultured people who were not fluent in the Greek language.
      marker-yv: yv-n
    - type: text
      text: 'barbarian or '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Scythians were savage equestrian herdsmen who were skilled archers and often worked as mercenaries and/or slave traders. The Scythian women were known to dress as warriors and fight alongside the men.
      marker-yv: yv-n
    - type: text
      text: Scythian, [nor in status whether] slave or free, but Christ is all, and in all [so believers are equal in Christ, without distinction].
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, as God’s own chosen people, who are holy [set apart, sanctified for His purpose] and well-beloved [by God Himself], put on a heart of compassion, kindness, humility, gentleness, and patience [which has the power to endure whatever injustice or unpleasantness comes, with good temper]; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'bearing graciously with one another, and willingly forgiving each other if one has a cause for complaint against another; just as the Lord has forgiven you, so should you forgive. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beyond all these things put on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wrap yourselves in [unselfish] love, which is the perfect bond of unity [for everything is bound together in agreement when each one seeks the best for others]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the peace of Christ [the inner calm of one who walks daily with Him] be the controlling factor in your hearts [deciding and settling questions that arise]. To this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: peace
    - type: text
      text: ' indeed you were called as members in one body [of believers]. And be thankful [to God always]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the [spoken] word of Christ have its home within you [dwelling in your heart and mind—permeating every aspect of your being] as you teach [spiritual things] and admonish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' train one another with all wisdom, singing psalms and hymns and spiritual songs with thankfulness in your hearts to God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whatever you do [no matter what it is] in word or deed, do everything in the name of the Lord Jesus [and in dependence on Him], giving thanks to God the Father through Him.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Family Relations
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wives, be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The wife is to submit voluntarily to her husband (not to men in general); not as inferior to him, nor in violation of her Christian ethics, but honoring her husband’s responsibilities and authority as head of the household.
      marker-yv: yv-n
    - type: text
      text: 'subject to your husbands [out of respect for their position as protector, and their accountability to God], as is proper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. not in conflict with Scripture.
      marker-yv: yv-n
    - type: text
      text: 'fitting in the Lord. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Husbands, love your wives [with an affectionate, sympathetic, selfless love that always seeks the best for them] and do not be embittered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' resentful toward them [because of the responsibilities of marriage]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Set your mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep focused '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' on the things above [the heavenly things], not on things that are on the earth [which have only temporal value]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Children, obey your parents [as God’s representatives] in all things, for this [attitude of respect and obedience] is well-pleasing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in,
        - type: text
          text: ' as “in the Lord’s presence.”'
      marker-yv: yv-n
    - type: text
      text: 'to the Lord [and will bring you God’s promised blessings]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fathers, do not provoke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' irritate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' exasperate your children [with demands that are trivial or unreasonable or humiliating or abusive; nor by favoritism or indifference; treat them tenderly with lovingkindness], so they will not lose heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become discouraged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' unmotivated [with their spirits broken].'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Servants, in everything obey those who are your masters on earth, not only with external service, as those who merely please people, but with sincerity of heart because of your fear of the Lord. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whatever you do [whatever your task may be], work from the soul [that is, put in your very best effort], as [something done] for the Lord and not for men, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'knowing [with all certainty] that it is from the Lord [not from men] that you will receive the inheritance which is your [greatest] reward. It is the Lord Christ whom you [actually] serve. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he who does wrong will be punished for his wrongdoing, and [with God] there is no partiality [no special treatment based on a person’s position in life].
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you died [to this world], and your [new, real] life is hidden with Christ in God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Christ, who is our life, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A reference to His second coming.
      marker-yv: yv-n
    - type: text
      text: appears, then you also will appear with Him in glory.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So put to death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deprive of power the evil longings of your earthly body [with its sensual, self-centered instincts] immorality, impurity, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sinful
    - type: text
      text: ' passion, evil desire, and greed, which is [a kind of] idolatry [because it replaces your devotion to God]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of these [sinful] things the [divine] wrath of God is coming '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Two early mss do not contain this phrase.
      marker-yv: yv-n
    - type: text
      text: 'on the sons of disobedience [those who fail to listen and who routinely and obstinately disregard God’s precepts], '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in these [sinful things] you also once walked, when you were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' living in them [without the knowledge of Christ]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now rid yourselves [completely] of all these things: anger, rage, malice, slander, and obscene (abusive, filthy, vulgar) language from your mouth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not lie to one another, for you have stripped off the old self with its '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evil
    - type: text
      text: ' practices, '
