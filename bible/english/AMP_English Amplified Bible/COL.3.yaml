document_id: COL.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Put On the New Self
  - type: text
    content: 'Therefore if you have been raised with Christ [to a new life, sharing in His resurrection from the dead], keep seeking the things that are above, where Christ is, seated at the right hand of God. [Ps 110:1] '
  '10':
  - type: text
    content: 'and have put on the new [spiritual] self who is being '
  - type: text
    content: continually
  - type: text
    content: ' renewed in true knowledge in the image of Him who created the new self— [Gen 1:26] '
  '11':
  - type: text
    content: a renewal
  - type: text
    content: ' in which there is no [distinction between] Greek and Jew, circumcised and uncircumcised, [nor between nations whether] '
  - type: note
    content: A derogatory term used to describe uneducated, uncultured people who were not fluent in the Greek language.
  - type: text
    content: 'barbarian or '
  - type: note
    content: The Scythians were savage equestrian herdsmen who were skilled archers and often worked as mercenaries and/or slave traders. The Scythian women were known to dress as warriors and fight alongside the men.
  - type: text
    content: Scythian, [nor in status whether] slave or free, but Christ is all, and in all [so believers are equal in Christ, without distinction].
  '12':
  - type: text
    content: 'So, as God’s own chosen people, who are holy [set apart, sanctified for His purpose] and well-beloved [by God Himself], put on a heart of compassion, kindness, humility, gentleness, and patience [which has the power to endure whatever injustice or unpleasantness comes, with good temper]; '
  '13':
  - type: text
    content: 'bearing graciously with one another, and willingly forgiving each other if one has a cause for complaint against another; just as the Lord has forgiven you, so should you forgive. '
  '14':
  - type: text
    content: 'Beyond all these things put on '
  - type: text
    content: and
  - type: text
    content: ' wrap yourselves in [unselfish] love, which is the perfect bond of unity [for everything is bound together in agreement when each one seeks the best for others]. '
  '15':
  - type: text
    content: 'Let the peace of Christ [the inner calm of one who walks daily with Him] be the controlling factor in your hearts [deciding and settling questions that arise]. To this '
  - type: text
    content: peace
  - type: text
    content: ' indeed you were called as members in one body [of believers]. And be thankful [to God always]. '
  '16':
  - type: text
    content: 'Let the [spoken] word of Christ have its home within you [dwelling in your heart and mind—permeating every aspect of your being] as you teach [spiritual things] and admonish '
  - type: text
    content: and
  - type: text
    content: ' train one another with all wisdom, singing psalms and hymns and spiritual songs with thankfulness in your hearts to God. '
  '17':
  - type: text
    content: Whatever you do [no matter what it is] in word or deed, do everything in the name of the Lord Jesus [and in dependence on Him], giving thanks to God the Father through Him.
  - type: heading
    content: Family Relations
  '18':
  - type: text
    content: 'Wives, be '
  - type: note
    content: The wife is to submit voluntarily to her husband (not to men in general); not as inferior to him, nor in violation of her Christian ethics, but honoring her husband’s responsibilities and authority as head of the household.
  - type: text
    content: 'subject to your husbands [out of respect for their position as protector, and their accountability to God], as is proper '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: I.e. not in conflict with Scripture.
  - type: text
    content: 'fitting in the Lord. '
  '19':
  - type: text
    content: 'Husbands, love your wives [with an affectionate, sympathetic, selfless love that always seeks the best for them] and do not be embittered '
  - type: text
    content: or
  - type: text
    content: ' resentful toward them [because of the responsibilities of marriage]. '
  '2':
  - type: text
    content: 'Set your mind '
  - type: text
    content: and
  - type: text
    content: ' keep focused '
  - type: text
    content: habitually
  - type: text
    content: ' on the things above [the heavenly things], not on things that are on the earth [which have only temporal value]. '
  '20':
  - type: text
    content: 'Children, obey your parents [as God’s representatives] in all things, for this [attitude of respect and obedience] is well-pleasing '
  - type: note
    content: Lit in, as “in the Lord’s presence.”
  - type: text
    content: 'to the Lord [and will bring you God’s promised blessings]. '
  '21':
  - type: text
    content: 'Fathers, do not provoke '
  - type: text
    content: or
  - type: text
    content: ' irritate '
  - type: text
    content: or
  - type: text
    content: ' exasperate your children [with demands that are trivial or unreasonable or humiliating or abusive; nor by favoritism or indifference; treat them tenderly with lovingkindness], so they will not lose heart '
  - type: text
    content: and
  - type: text
    content: ' become discouraged '
  - type: text
    content: or
  - type: text
    content: ' unmotivated [with their spirits broken].'
  '22':
  - type: text
    content: 'Servants, in everything obey those who are your masters on earth, not only with external service, as those who merely please people, but with sincerity of heart because of your fear of the Lord. '
  '23':
  - type: text
    content: 'Whatever you do [whatever your task may be], work from the soul [that is, put in your very best effort], as [something done] for the Lord and not for men, '
  '24':
  - type: text
    content: 'knowing [with all certainty] that it is from the Lord [not from men] that you will receive the inheritance which is your [greatest] reward. It is the Lord Christ whom you [actually] serve. '
  '25':
  - type: text
    content: For he who does wrong will be punished for his wrongdoing, and [with God] there is no partiality [no special treatment based on a person’s position in life].
  '3':
  - type: text
    content: 'For you died [to this world], and your [new, real] life is hidden with Christ in God. '
  '4':
  - type: text
    content: 'When Christ, who is our life, '
  - type: note
    content: A reference to His second coming.
  - type: text
    content: appears, then you also will appear with Him in glory.
  '5':
  - type: text
    content: 'So put to death '
  - type: text
    content: and
  - type: text
    content: ' deprive of power the evil longings of your earthly body [with its sensual, self-centered instincts] immorality, impurity, '
  - type: text
    content: sinful
  - type: text
    content: ' passion, evil desire, and greed, which is [a kind of] idolatry [because it replaces your devotion to God]. '
  '6':
  - type: text
    content: 'Because of these [sinful] things the [divine] wrath of God is coming '
  - type: note
    content: Two early mss do not contain this phrase.
  - type: text
    content: 'on the sons of disobedience [those who fail to listen and who routinely and obstinately disregard God’s precepts], '
  '7':
  - type: text
    content: 'and in these [sinful things] you also once walked, when you were '
  - type: text
    content: habitually
  - type: text
    content: ' living in them [without the knowledge of Christ]. '
  '8':
  - type: text
    content: 'But now rid yourselves [completely] of all these things: anger, rage, malice, slander, and obscene (abusive, filthy, vulgar) language from your mouth. '
  '9':
  - type: text
    content: 'Do not lie to one another, for you have stripped off the old self with its '
  - type: text
    content: evil
  - type: text
    content: ' practices, '
