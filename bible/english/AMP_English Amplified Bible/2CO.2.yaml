document_id: 2CO.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Reaffirm Your Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But I made up my mind not to grieve you with another painful visit. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if I cause you grief [by a well-deserved rebuke], who then provides me enjoyment but the very one whom I have made sad? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many scholars believe the contents of the communication to which Paul refers in this verse are implied within vv 5-11, and again in 7:5-12.
    marker-yv: yv-n
  - type: text
    text: 'wrote this same thing to you, so that when I came, I would not be filled with sorrow by those who ought to make me glad, for I trusted in you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' felt confident that my joy would be shared by all of you. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For I wrote to you out of great distress and with an anguished heart, and with many tears, not to cause you sorrow but to make you realize the [overflowing] love which I have especially for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The incident and offender to which Paul is referring is unclear, but it may have involved some affront or challenge to Paul’s position or authority during his visit to Corinth.
    marker-yv: yv-n
  - type: text
    text: 'someone has caused [all this] sorrow, he has caused it not to me, but in some degree—not to put it too severely—[he has distressed and grieved] all of you. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For such a one this punishment by the majority is sufficient, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'so instead [of further rebuke, now] you should rather [graciously] forgive and comfort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourage him, to keep him from being overwhelmed by excessive sorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore I urge you to reinstate him in your affections '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reaffirm your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape)
      - type: text
        text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for other believers.'
    marker-yv: yv-n
  - type: text
    text: 'love for him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For this was my purpose in writing, to see if you would stand the test, whether you are obedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' committed to following my instruction in all things. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If you forgive anyone anything, I too forgive [that one]; and what I have forgiven, if I have forgiven anything, has been for your sake in the presence of [and with the approval of] Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: to keep Satan from taking advantage of us; for we are not ignorant of his schemes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when I arrived at Troas to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: preach
  - type: text
    text: ' the good news of Christ, even though a door [of opportunity] opened for me in the Lord, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'my spirit could not rest because I did not find my brother Titus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there;
  - type: text
    text: ' so saying goodbye to them, I left for Macedonia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But thanks be to God, who always leads us in triumph in Christ, and through us spreads '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' makes evident everywhere the sweet fragrance of the knowledge of Him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For we are the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sweet
  - type: text
    text: ' fragrance of Christ [which ascends] to God, [discernible both] among those who are being saved and among those who are perishing; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: latter
  - type: text
    text: ' one an aroma from death to death [a fatal, offensive odor], but to the other an aroma from life to life [a vital fragrance, living and fresh]. And who is adequate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sufficiently qualified for these things? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For we are not like many, [acting like merchants] peddling God’s word [shortchanging and adulterating God’s message]; but from pure [uncompromised] motives, as [commissioned and sent] from God, we speak [His message] in Christ in the sight of God.
