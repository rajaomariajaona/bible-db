verses:
  '1':
  - type: heading
    content: Reaffirm Your Love
  - type: text
    content: 'But I made up my mind not to grieve you with another painful visit. '
  '10':
  - type: text
    content: 'If you forgive anyone anything, I too forgive [that one]; and what I have forgiven, if I have forgiven anything, has been for your sake in the presence of [and with the approval of] Christ, '
  '11':
  - type: text
    content: to keep Satan from taking advantage of us; for we are not ignorant of his schemes.
  '12':
  - type: text
    content: 'Now when I arrived at Troas to '
  - type: text
    content: preach
  - type: text
    content: ' the good news of Christ, even though a door [of opportunity] opened for me in the Lord, '
  '13':
  - type: text
    content: 'my spirit could not rest because I did not find my brother Titus '
  - type: text
    content: there;
  - type: text
    content: ' so saying goodbye to them, I left for Macedonia.'
  '14':
  - type: text
    content: 'But thanks be to God, who always leads us in triumph in Christ, and through us spreads '
  - type: text
    content: and
  - type: text
    content: ' makes evident everywhere the sweet fragrance of the knowledge of Him. '
  '15':
  - type: text
    content: 'For we are the '
  - type: text
    content: sweet
  - type: text
    content: ' fragrance of Christ [which ascends] to God, [discernible both] among those who are being saved and among those who are perishing; '
  '16':
  - type: text
    content: 'to the '
  - type: text
    content: latter
  - type: text
    content: ' one an aroma from death to death [a fatal, offensive odor], but to the other an aroma from life to life [a vital fragrance, living and fresh]. And who is adequate '
  - type: text
    content: and
  - type: text
    content: ' sufficiently qualified for these things? '
  '17':
  - type: text
    content: For we are not like many, [acting like merchants] peddling God’s word [shortchanging and adulterating God’s message]; but from pure [uncompromised] motives, as [commissioned and sent] from God, we speak [His message] in Christ in the sight of God.
  '2':
  - type: text
    content: 'For if I cause you grief [by a well-deserved rebuke], who then provides me enjoyment but the very one whom I have made sad? '
  '3':
  - type: text
    content: 'And I '
  - type: note
    content: Many scholars believe the contents of the communication to which Paul refers in this verse are implied within vv 5-11, and again in 7:5-12.
  - type: text
    content: 'wrote this same thing to you, so that when I came, I would not be filled with sorrow by those who ought to make me glad, for I trusted in you '
  - type: text
    content: and
  - type: text
    content: ' felt confident that my joy would be shared by all of you. '
  '4':
  - type: text
    content: For I wrote to you out of great distress and with an anguished heart, and with many tears, not to cause you sorrow but to make you realize the [overflowing] love which I have especially for you.
  '5':
  - type: text
    content: 'But if '
  - type: note
    content: The incident and offender to which Paul is referring is unclear, but it may have involved some affront or challenge to Paul’s position or authority during his visit to Corinth.
  - type: text
    content: 'someone has caused [all this] sorrow, he has caused it not to me, but in some degree—not to put it too severely—[he has distressed and grieved] all of you. '
  '6':
  - type: text
    content: 'For such a one this punishment by the majority is sufficient, '
  '7':
  - type: text
    content: 'so instead [of further rebuke, now] you should rather [graciously] forgive and comfort '
  - type: text
    content: and
  - type: text
    content: ' encourage him, to keep him from being overwhelmed by excessive sorrow. '
  '8':
  - type: text
    content: 'Therefore I urge you to reinstate him in your affections '
  - type: text
    content: and
  - type: text
    content: ' reaffirm your '
  - type: note
    content: The key to understanding this and other statements about love is to know that this love (the Greek word agape) is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for other believers.
  - type: text
    content: 'love for him. '
  '9':
  - type: text
    content: 'For this was my purpose in writing, to see if you would stand the test, whether you are obedient '
  - type: text
    content: and
  - type: text
    content: ' committed to following my instruction in all things. '
