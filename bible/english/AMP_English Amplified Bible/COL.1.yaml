verses:
  '1':
  - type: heading
    content: Thankfulness for Spiritual Attainments
  - type: text
    content: Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus (the Messiah, the Anointed) by the will of God, and Timothy our brother,
  '10':
  - type: text
    content: 'so that you will walk in a manner worthy of the Lord [displaying admirable character, moral courage, and personal integrity], to [fully] please '
  - type: text
    content: Him
  - type: text
    content: ' in all things, bearing fruit in every good work and steadily growing in the knowledge of God [with deeper faith, clearer insight and fervent love for His precepts]; '
  '11':
  - type: text
    content: '[we pray that you may be] strengthened '
  - type: text
    content: and
  - type: text
    content: ' invigorated with all power, according to His glorious might, to attain every kind of endurance and patience with joy; '
  '12':
  - type: text
    content: giving thanks to the Father, who has qualified us to share in the inheritance of the saints (God’s people) in the Light.
  - type: heading
    content: The Incomparable Christ
  '13':
  - type: text
    content: 'For He has rescued us '
  - type: text
    content: and
  - type: text
    content: ' has drawn us to Himself from the dominion of darkness, and has transferred us to the kingdom of His beloved Son, '
  '14':
  - type: text
    content: in whom we have redemption [because of His sacrifice, resulting in] the forgiveness of our sins [and the cancellation of sins’ penalty].
  '15':
  - type: text
    content: 'He is the exact living image [the essential manifestation] of the unseen God [the visible representation of the invisible], the firstborn [the preeminent one, the sovereign, and the originator] of all creation. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Or in.
  - type: text
    content: 'by Him all things were created in heaven and on earth, [things] visible and invisible, whether thrones or dominions or rulers or authorities; all things were created '
  - type: text
    content: and
  - type: text
    content: ' exist through Him [that is, by His activity] and for Him. '
  '17':
  - type: text
    content: 'And He Himself existed '
  - type: text
    content: and
  - type: text
    content: ' is before all things, and in Him all things hold together. [His is the controlling, cohesive force of the universe.] [Prov 8:22-31] '
  '18':
  - type: text
    content: 'He is also the head [the life-source and leader] of the body, the '
  - type: note
    content: This refers to the entire body of born-again believers (whether past, present, or future), not a local congregation.
  - type: text
    content: 'church; and He is the beginning, '
  - type: note
    content: Christ is the first to be resurrected with an incorruptible, immortal body. Others who were raised had to die again.
  - type: text
    content: 'the firstborn from the dead, so that He Himself will occupy the first place [He will stand supreme and be preeminent] in everything. [1 Cor 15:20] '
  '19':
  - type: text
    content: 'For it pleased the '
  - type: text
    content: Father
  - type: text
    content: ' for all the fullness [of deity—the sum total of His essence, all His perfection, powers, and attributes] to dwell [permanently] in Him (the Son), '
  '2':
  - type: text
    content: 'To the '
  - type: note
    content: Every born-again believer (saint) has been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
  - type: text
    content: 'saints and faithful '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers in Christ [who are] at Colossae: Grace to you and peace [inner calm and spiritual well-being] from God our Father.'
  '20':
  - type: text
    content: and through [the intervention of] the Son to reconcile all things to Himself, making peace [with believers] through the blood of His cross; through Him, [I say,] whether things on earth or things in heaven.
  '21':
  - type: text
    content: 'And although you were at one time estranged '
  - type: text
    content: and
  - type: text
    content: ' alienated and hostile-minded [toward Him], '
  - type: text
    content: participating
  - type: text
    content: ' in evil things, '
  '22':
  - type: text
    content: 'yet Christ has now reconciled you [to God] in His '
  - type: note
    content: Lit body of flesh.
  - type: text
    content: 'physical body through death, in order to present you before the Father holy and blameless and beyond reproach— '
  '23':
  - type: text
    content: '[and He will do this] if you continue in the faith, well-grounded and steadfast, and not shifting away from the [confident] hope [that is a result] of the gospel that you have heard, which was proclaimed '
  - type: note
    content: Paul may be referring to the fact that the created world displays proof of the existence of an omnipotent, benevolent God (cf Rom 1:20), without whom there would be no possibility of salvation. Such a God is the foundation of the “good news.”
  - type: text
    content: in all creation under heaven, and of which [gospel] I, Paul, was made a minister.
  '24':
  - type: text
    content: 'Now I rejoice in my sufferings on your behalf. And with my own body I '
  - type: note
    content: I.e. since the church is Christ’s body, figuratively speaking, whatever the church suffers can be considered additional sufferings by Christ Himself, and all such suffering was ordained and destined by God; what is left to suffer in God’s plan is what is “lacking of Christ’s afflictions.” Paul, as a member of the church, was destined to suffer through persecution etc., thereby taking his share of the church body’s divinely-ordained suffering.
  - type: text
    content: 'supplement whatever is lacking [on our part] of Christ’s afflictions, on behalf of His body, which is the church. '
  '25':
  - type: text
    content: 'In '
  - type: text
    content: this church
  - type: text
    content: ' I was made a minister according to the stewardship which God entrusted to me for your sake, so that I might make the word of God fully known [among you]— '
  '26':
  - type: text
    content: that is,
  - type: text
    content: ' '
  - type: note
    content: I.e. that believing Gentiles would be united with believing Jews into one body of believers.
  - type: text
    content: 'the mystery which was hidden [from angels and mankind] for ages and generations, but has now been revealed to His saints (God’s people). '
  '27':
  - type: text
    content: 'God [in His eternal plan] chose to make known to them how great for the Gentiles are the riches of the glory of this mystery, which is Christ in '
  - type: text
    content: and
  - type: text
    content: ' among you, the hope '
  - type: text
    content: and
  - type: text
    content: ' guarantee of [realizing the] glory. '
  '28':
  - type: text
    content: 'We proclaim Him, warning and instructing everyone in all wisdom [that is, with comprehensive insight into the word and purposes of God], so that we may present every person complete in Christ [mature, fully trained, and perfect in Him—the Anointed]. '
  '29':
  - type: text
    content: 'For this I labor [often to the point of exhaustion], striving with His power '
  - type: text
    content: and
  - type: text
    content: ' energy, which so greatly works within me.'
  '3':
  - type: text
    content: 'We give thanks to God, the Father of our Lord Jesus Christ, as we pray always for you, '
  '4':
  - type: text
    content: 'for we have heard of your faith in Christ Jesus [how you lean on Him with absolute confidence in His power, wisdom, and goodness], and of the [unselfish] '
  - type: note
    content: The key to understanding this and other statements about love is to know that this love (the Greek word agape) is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.
  - type: text
    content: 'love which you have for all the saints (God’s people); '
  '5':
  - type: text
    content: 'because of the [confident] hope [of experiencing that] which is reserved '
  - type: text
    content: and
  - type: text
    content: ' waiting for you in heaven. You previously heard of this '
  - type: text
    content: hope
  - type: text
    content: ' in the message of truth, the gospel [regarding salvation] '
  '6':
  - type: text
    content: 'which has come to you. Indeed, just as in the whole world '
  - type: text
    content: the gospel
  - type: text
    content: ' is constantly bearing fruit and spreading [by God’s power], just as '
  - type: text
    content: it has been doing
  - type: text
    content: ' among you ever since the day you first heard '
  - type: text
    content: of it
  - type: text
    content: ' and understood the grace of God in truth [becoming thoroughly and deeply acquainted with it]. '
  '7':
  - type: text
    content: 'You learned it from [our representative] Epaphras, our beloved fellow bond-servant, who is a faithful minister of Christ on our behalf '
  '8':
  - type: text
    content: and he also has told us of your love [well-grounded and nurtured] in the [Holy] Spirit.
  '9':
  - type: text
    content: 'For this reason, since the day we heard about it, we have not stopped praying for you, asking [specifically] that you may be filled with the knowledge of His will in all spiritual wisdom [with insight into His purposes], and in understanding [of spiritual things], '
