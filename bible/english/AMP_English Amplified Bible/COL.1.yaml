document_id: COL.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thankfulness for Spiritual Attainments
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus (the Messiah, the Anointed) by the will of God, and Timothy our brother,
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that you will walk in a manner worthy of the Lord [displaying admirable character, moral courage, and personal integrity], to [fully] please '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' in all things, bearing fruit in every good work and steadily growing in the knowledge of God [with deeper faith, clearer insight and fervent love for His precepts]; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[we pray that you may be] strengthened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' invigorated with all power, according to His glorious might, to attain every kind of endurance and patience with joy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: giving thanks to the Father, who has qualified us to share in the inheritance of the saints (God’s people) in the Light.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Incomparable Christ
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For He has rescued us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has drawn us to Himself from the dominion of darkness, and has transferred us to the kingdom of His beloved Son, '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: in whom we have redemption [because of His sacrifice, resulting in] the forgiveness of our sins [and the cancellation of sins’ penalty].
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is the exact living image [the essential manifestation] of the unseen God [the visible representation of the invisible], the firstborn [the preeminent one, the sovereign, and the originator] of all creation. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'by Him all things were created in heaven and on earth, [things] visible and invisible, whether thrones or dominions or rulers or authorities; all things were created '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exist through Him [that is, by His activity] and for Him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He Himself existed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is before all things, and in Him all things hold together. [His is the controlling, cohesive force of the universe.] [Prov 8:22-31] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is also the head [the life-source and leader] of the body, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This refers to the entire body of born-again believers (whether past, present, or future), not a local congregation.
      marker-yv: yv-n
    - type: text
      text: 'church; and He is the beginning, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Christ is the first to be resurrected with an incorruptible, immortal body. Others who were raised had to die again.
      marker-yv: yv-n
    - type: text
      text: 'the firstborn from the dead, so that He Himself will occupy the first place [He will stand supreme and be preeminent] in everything. [1 Cor 15:20] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it pleased the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Father
    - type: text
      text: ' for all the fullness [of deity—the sum total of His essence, all His perfection, powers, and attributes] to dwell [permanently] in Him (the Son), '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Every born-again believer (saint) has been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
      marker-yv: yv-n
    - type: text
      text: 'saints and faithful '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers in Christ [who are] at Colossae: Grace to you and peace [inner calm and spiritual well-being] from God our Father.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and through [the intervention of] the Son to reconcile all things to Himself, making peace [with believers] through the blood of His cross; through Him, [I say,] whether things on earth or things in heaven.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And although you were at one time estranged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' alienated and hostile-minded [toward Him], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: participating
    - type: text
      text: ' in evil things, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet Christ has now reconciled you [to God] in His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: body of flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'physical body through death, in order to present you before the Father holy and blameless and beyond reproach— '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[and He will do this] if you continue in the faith, well-grounded and steadfast, and not shifting away from the [confident] hope [that is a result] of the gospel that you have heard, which was proclaimed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul may be referring to the fact that the created world displays proof of the existence of an omnipotent, benevolent God (cf Rom 1:20), without whom there would be no possibility of salvation. Such a God is the foundation of the “good news.”
      marker-yv: yv-n
    - type: text
      text: in all creation under heaven, and of which [gospel] I, Paul, was made a minister.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I rejoice in my sufferings on your behalf. And with my own body I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. since the church is Christ’s body, figuratively speaking, whatever the church suffers can be considered additional sufferings by Christ Himself, and all such suffering was ordained and destined by God; what is left to suffer in God’s plan is what is “lacking of Christ’s afflictions.” Paul, as a member of the church, was destined to suffer through persecution etc., thereby taking his share of the church body’s divinely-ordained suffering.
      marker-yv: yv-n
    - type: text
      text: 'supplement whatever is lacking [on our part] of Christ’s afflictions, on behalf of His body, which is the church. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this church
    - type: text
      text: ' I was made a minister according to the stewardship which God entrusted to me for your sake, so that I might make the word of God fully known [among you]— '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. that believing Gentiles would be united with believing Jews into one body of believers.
      marker-yv: yv-n
    - type: text
      text: 'the mystery which was hidden [from angels and mankind] for ages and generations, but has now been revealed to His saints (God’s people). '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God [in His eternal plan] chose to make known to them how great for the Gentiles are the riches of the glory of this mystery, which is Christ in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' among you, the hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guarantee of [realizing the] glory. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We proclaim Him, warning and instructing everyone in all wisdom [that is, with comprehensive insight into the word and purposes of God], so that we may present every person complete in Christ [mature, fully trained, and perfect in Him—the Anointed]. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this I labor [often to the point of exhaustion], striving with His power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' energy, which so greatly works within me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We give thanks to God, the Father of our Lord Jesus Christ, as we pray always for you, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for we have heard of your faith in Christ Jesus [how you lean on Him with absolute confidence in His power, wisdom, and goodness], and of the [unselfish] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: agape)
        - type: text
          text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
      marker-yv: yv-n
    - type: text
      text: 'love which you have for all the saints (God’s people); '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because of the [confident] hope [of experiencing that] which is reserved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' waiting for you in heaven. You previously heard of this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hope
    - type: text
      text: ' in the message of truth, the gospel [regarding salvation] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which has come to you. Indeed, just as in the whole world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the gospel
    - type: text
      text: ' is constantly bearing fruit and spreading [by God’s power], just as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it has been doing
    - type: text
      text: ' among you ever since the day you first heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of it
    - type: text
      text: ' and understood the grace of God in truth [becoming thoroughly and deeply acquainted with it]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You learned it from [our representative] Epaphras, our beloved fellow bond-servant, who is a faithful minister of Christ on our behalf '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he also has told us of your love [well-grounded and nurtured] in the [Holy] Spirit.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason, since the day we heard about it, we have not stopped praying for you, asking [specifically] that you may be filled with the knowledge of His will in all spiritual wisdom [with insight into His purposes], and in understanding [of spiritual things], '
