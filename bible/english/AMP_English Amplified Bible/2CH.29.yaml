document_id: 2CH.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Succeeds Ahaz in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hezekiah became king when he was twenty-five years old, and he reigned twenty-nine years in Jerusalem. His mother’s name was Abijah the daughter of Zechariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in accordance with everything that David his father (forefather) had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In the first year of his reign, in the first month, he opened the doors of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [which his father had closed] and repaired them [and replaced the gold overlay]. [2 Kin 18:16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He brought in the priests and Levites and gathered them into the square on the east.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Reforms Begun
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he said to them, “Levites, listen to me! Now consecrate (dedicate) yourselves and consecrate the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of your fathers, and get the filth [of idol worship] out of the Holy Place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For our fathers have been unfaithful and have done evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, and they have abandoned Him and have turned their faces away from the dwelling place of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and have turned their backs [toward Him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They have also closed the doors of the [temple] porch and put out the lamps, and they have not burned incense nor offered burnt offerings in the Holy Place to the God of Israel. [2 Kin 16:10-16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Therefore the wrath of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has been against Judah and Jerusalem, and He has made them an object of terror, of horror, and of hissing, just as you see with your own eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For behold, our fathers have fallen by the sword, and our sons and our daughters and our wives are in captivity because of this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now it is in my heart to make a covenant (solemn agreement) with the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, so that His burning anger will turn away from us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My sons, do not be negligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' careless now, for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has chosen you to stand in His presence, to attend to His service, and to be His ministers and burn incense.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then the Levites arose: Mahath the son of Amasai and Joel the son of Azariah, from the sons of the Kohathites; from the sons of Merari: Kish the son of Abdi, Azariah the son of Jehallelel; from the Gershonites: Joah the son of Zimmah and Eden the son of Joah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'from the sons of Elizaphan: Shimri and Jeiel; from the sons of Asaph: Zechariah, and Mattaniah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'from the sons of Heman: Jehiel and Shimei; and from the sons of Jeduthun: Shemaiah and Uzziel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They gathered their brothers (fellow Levites) together, consecrated themselves, and went in to cleanse the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', as the king had commanded by the words of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The priests went into the inner part of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to cleanse it, and every unclean thing they found in the temple of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' they brought out to the courtyard of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house. Then the Levites received it to take out to the Kidron Valley [for disposal]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now they began the consecration on the first [day] of the first month, and on the eighth day of the month they came to the porch of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. Then for eight days they '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. dedicated it as sacred, declared it separated from secular use.
    marker-yv: yv-n
  - type: text
    text: consecrated the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and on the sixteenth day of the first month they finished. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then they went inside to King Hezekiah and said, “We have cleansed the entire house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the altar of burnt offering with all of its utensils, and the table of showbread with all its utensils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moreover, we have prepared and consecrated all the utensils which King Ahaz had discarded during his reign in his unfaithfulness; and behold, they are in front of the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Restores Temple Worship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then King Hezekiah arose early and assembled the officials of the city, and went up to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They brought seven bulls, seven rams, seven lambs, and seven male goats for a sin offering for the kingdom, the sanctuary, and Judah. He commanded the priests, the sons of Aaron, to offer them on the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So they slaughtered the bulls, and the priests took the blood and sprinkled it on the altar. They also slaughtered the rams and sprinkled the blood on the altar; then they slaughtered the lambs and sprinkled the blood on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then they brought the male goats for the sin offering before the king and the assembly, and they laid their hands on them [to symbolize the transference of their sin]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The priests slaughtered them and cleansed the altar from sin with their blood to atone for all Israel, because the king commanded that the burnt offering and the sin offering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be made
  - type: text
    text: ' for all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hezekiah stationed the Levites in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with cymbals, with harps, and with lyres, in accordance with the command of David [his ancestor] and of Gad the king’s seer, and of Nathan the prophet; for the command was from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' through His prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The Levites stood with the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: musical
  - type: text
    text: ' instruments of David, and the priests with the trumpets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then Hezekiah gave the order to offer the burnt offering on the altar. And when the burnt offering began, the song to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' also began with the trumpets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: accompanied
  - type: text
    text: ' by the instruments of David, king of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The entire congregation worshiped, the singers also sang, and the trumpets sounded; all this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continued
  - type: text
    text: ' until the burnt offering was finished.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'When the burnt offerings were completed, the king and all who were present with him bowed down and worshiped [God]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Also King Hezekiah and the officials ordered the Levites to exclaim praises to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with the words of David and of Asaph the seer. And they exclaimed praises with joy, and bowed down and worshiped.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then Hezekiah said, “Now you have consecrated yourselves to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; approach and bring sacrifices and thank offerings into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” And the assembly brought in sacrifices and thank offerings, and all those who were willing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: brought
  - type: text
    text: ' burnt offerings. [Ex 35:5, 22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The number of the burnt offerings which the assembly brought was 70 bulls, 100 rams, and 200 lambs. All these were for a burnt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The consecrated things were 600 bulls and 3,000 sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But there were too few priests and they were unable to skin all the burnt offerings; so until the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' priests had consecrated themselves, their brothers, the Levites, helped them until the work was done. For the Levites were more upright in heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more conscientious than the priests in consecrating themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: There were also many burnt offerings with the fat of the peace offerings and with the drink offerings for the burnt offerings. So the service of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was established again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then Hezekiah and all the people rejoiced because of what God had prepared for the people, for the thing came about suddenly.
