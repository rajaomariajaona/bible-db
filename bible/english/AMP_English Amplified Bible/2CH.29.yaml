document_id: 2CH.29,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Succeeds Ahaz in Judah
  - type: text
    content: 'Hezekiah became king when he was twenty-five years old, and he reigned twenty-nine years in Jerusalem. His mother’s name was Abijah the daughter of Zechariah. '
  '10':
  - type: text
    content: Now it is in my heart to make a covenant (solemn agreement) with the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, so that His burning anger will turn away from us. '
  '11':
  - type: text
    content: 'My sons, do not be negligent '
  - type: text
    content: and
  - type: text
    content: ' careless now, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has chosen you to stand in His presence, to attend to His service, and to be His ministers and burn incense.”'
  '12':
  - type: text
    content: 'Then the Levites arose: Mahath the son of Amasai and Joel the son of Azariah, from the sons of the Kohathites; from the sons of Merari: Kish the son of Abdi, Azariah the son of Jehallelel; from the Gershonites: Joah the son of Zimmah and Eden the son of Joah; '
  '13':
  - type: text
    content: 'from the sons of Elizaphan: Shimri and Jeiel; from the sons of Asaph: Zechariah, and Mattaniah; '
  '14':
  - type: text
    content: 'from the sons of Heman: Jehiel and Shimei; and from the sons of Jeduthun: Shemaiah and Uzziel. '
  '15':
  - type: text
    content: They gathered their brothers (fellow Levites) together, consecrated themselves, and went in to cleanse the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', as the king had commanded by the words of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '16':
  - type: text
    content: The priests went into the inner part of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' to cleanse it, and every unclean thing they found in the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ' they brought out to the courtyard of the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house. Then the Levites received it to take out to the Kidron Valley [for disposal]. '
  '17':
  - type: text
    content: Now they began the consecration on the first [day] of the first month, and on the eighth day of the month they came to the porch of the L
  - type: heading
    content: ord
  - type: text
    content: '. Then for eight days they '
  - type: note
    content: I.e. dedicated it as sacred, declared it separated from secular use.
  - type: text
    content: consecrated the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', and on the sixteenth day of the first month they finished. '
  '18':
  - type: text
    content: Then they went inside to King Hezekiah and said, “We have cleansed the entire house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ', the altar of burnt offering with all of its utensils, and the table of showbread with all its utensils. '
  '19':
  - type: text
    content: Moreover, we have prepared and consecrated all the utensils which King Ahaz had discarded during his reign in his unfaithfulness; and behold, they are in front of the altar of the L
  - type: heading
    content: ord
  - type: text
    content: .”
  - type: heading
    content: Hezekiah Restores Temple Worship
  '2':
  - type: text
    content: He did right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with everything that David his father (forefather) had done.'
  '20':
  - type: text
    content: Then King Hezekiah arose early and assembled the officials of the city, and went up to the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '21':
  - type: text
    content: They brought seven bulls, seven rams, seven lambs, and seven male goats for a sin offering for the kingdom, the sanctuary, and Judah. He commanded the priests, the sons of Aaron, to offer them on the altar of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'So they slaughtered the bulls, and the priests took the blood and sprinkled it on the altar. They also slaughtered the rams and sprinkled the blood on the altar; then they slaughtered the lambs and sprinkled the blood on the altar. '
  '23':
  - type: text
    content: 'Then they brought the male goats for the sin offering before the king and the assembly, and they laid their hands on them [to symbolize the transference of their sin]. '
  '24':
  - type: text
    content: 'The priests slaughtered them and cleansed the altar from sin with their blood to atone for all Israel, because the king commanded that the burnt offering and the sin offering '
  - type: text
    content: be made
  - type: text
    content: ' for all Israel.'
  '25':
  - type: text
    content: Hezekiah stationed the Levites in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' with cymbals, with harps, and with lyres, in accordance with the command of David [his ancestor] and of Gad the king’s seer, and of Nathan the prophet; for the command was from the L'
  - type: heading
    content: ord
  - type: text
    content: ' through His prophets. '
  '26':
  - type: text
    content: 'The Levites stood with the '
  - type: text
    content: musical
  - type: text
    content: ' instruments of David, and the priests with the trumpets. '
  '27':
  - type: text
    content: Then Hezekiah gave the order to offer the burnt offering on the altar. And when the burnt offering began, the song to the L
  - type: heading
    content: ord
  - type: text
    content: ' also began with the trumpets '
  - type: text
    content: accompanied
  - type: text
    content: ' by the instruments of David, king of Israel. '
  '28':
  - type: text
    content: 'The entire congregation worshiped, the singers also sang, and the trumpets sounded; all this '
  - type: text
    content: continued
  - type: text
    content: ' until the burnt offering was finished.'
  '29':
  - type: text
    content: 'When the burnt offerings were completed, the king and all who were present with him bowed down and worshiped [God]. '
  '3':
  - type: text
    content: In the first year of his reign, in the first month, he opened the doors of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' [which his father had closed] and repaired them [and replaced the gold overlay]. [2 Kin 18:16] '
  '30':
  - type: text
    content: Also King Hezekiah and the officials ordered the Levites to exclaim praises to the L
  - type: heading
    content: ord
  - type: text
    content: ' with the words of David and of Asaph the seer. And they exclaimed praises with joy, and bowed down and worshiped.'
  '31':
  - type: text
    content: Then Hezekiah said, “Now you have consecrated yourselves to the L
  - type: heading
    content: ord
  - type: text
    content: ; approach and bring sacrifices and thank offerings into the house of the L
  - type: heading
    content: ord
  - type: text
    content: '.” And the assembly brought in sacrifices and thank offerings, and all those who were willing '
  - type: text
    content: brought
  - type: text
    content: ' burnt offerings. [Ex 35:5, 22] '
  '32':
  - type: text
    content: The number of the burnt offerings which the assembly brought was 70 bulls, 100 rams, and 200 lambs. All these were for a burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'The consecrated things were 600 bulls and 3,000 sheep. '
  '34':
  - type: text
    content: 'But there were too few priests and they were unable to skin all the burnt offerings; so until the '
  - type: text
    content: other
  - type: text
    content: ' priests had consecrated themselves, their brothers, the Levites, helped them until the work was done. For the Levites were more upright in heart '
  - type: text
    content: and
  - type: text
    content: ' more conscientious than the priests in consecrating themselves. '
  '35':
  - type: text
    content: There were also many burnt offerings with the fat of the peace offerings and with the drink offerings for the burnt offerings. So the service of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' was established again. '
  '36':
  - type: text
    content: Then Hezekiah and all the people rejoiced because of what God had prepared for the people, for the thing came about suddenly.
  '4':
  - type: text
    content: He brought in the priests and Levites and gathered them into the square on the east.
  - type: heading
    content: Reforms Begun
  '5':
  - type: text
    content: Then he said to them, “Levites, listen to me! Now consecrate (dedicate) yourselves and consecrate the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of your fathers, and get the filth [of idol worship] out of the Holy Place. '
  '6':
  - type: text
    content: For our fathers have been unfaithful and have done evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God, and they have abandoned Him and have turned their faces away from the dwelling place of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and have turned their backs [toward Him]. '
  '7':
  - type: text
    content: 'They have also closed the doors of the [temple] porch and put out the lamps, and they have not burned incense nor offered burnt offerings in the Holy Place to the God of Israel. [2 Kin 16:10-16] '
  '8':
  - type: text
    content: Therefore the wrath of the L
  - type: heading
    content: ord
  - type: text
    content: ' has been against Judah and Jerusalem, and He has made them an object of terror, of horror, and of hissing, just as you see with your own eyes. '
  '9':
  - type: text
    content: 'For behold, our fathers have fallen by the sword, and our sons and our daughters and our wives are in captivity because of this. '
