document_id: 1CH.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Address about the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David assembled at Jerusalem all the leaders (officials) of Israel, the leaders of the tribes, and the commanders of the divisions that served the king, and the commanders of thousands, and the commanders of hundreds, and the overseers of all the property and livestock of the king and his sons, with the palace officers and the mighty men, and all the brave warriors. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Consider this carefully, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has chosen you to build a house for the sanctuary. Be courageous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong and do it.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David gave to his son Solomon the plan for the porch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the temple,
    - type: text
      text: ' its buildings, its treasuries, its upper chambers, its inner rooms, and for the place for the [ark and its] mercy seat; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the plan of all that he had in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the spirit with him
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: mind, for the courts of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and for all the surrounding rooms, for the storerooms of the house of God and for the storerooms for the dedicated gifts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offerings; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: the plan
    - type: text
      text: ' for the divisions of the priests and the Levites and for all the work of the service in the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and for all the utensils for service in the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the golden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: utensils,
    - type: text
      text: ' the weight of gold and silver for all the gold and silver articles for every kind of service; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the weight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of gold
    - type: text
      text: ' for the golden lampstands and their golden lamps, with the weight of each lampstand and its lamps; and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: weight of silver
    - type: text
      text: ' for the silver lampstands, with the weight of each lampstand and its lamps according to the use of each lampstand; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the gold by weight for each table of showbread, and the silver for the tables of silver; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the forks, the basins, and the pitchers of pure gold; and for the golden bowls with the weight for each bowl; and for the silver bowls with the weight for each bowl; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and for the altar of incense refined gold by weight; and gold for the model of the chariot of the cherubim that spread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their wings
    - type: text
      text: ' and covered the ark of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' covenant.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,” said David,
    - type: text
      text: ' “the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' made me understand in writing by His hand upon me, all the work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' details [to be done] according to this plan.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David the king rose to his feet and said, “Hear me, my brothers [in arms] and my people. I had intended to build a permanent home for the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and as a footstool for our God, and I prepared materials for the building. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David said to his son Solomon, “Be strong and courageous, and take action; do not fear nor be dismayed, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God, my God, is with you. He will not fail you nor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsake
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: abandon you [but will guide you in the construction] until you have finished all the work for the service of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And see, [you have] the divisions of the priests and Levites for all the service of God’s house, and every willing, skillful man will be with you in all the kinds of work for any kind of service. Also the officers and all the people will be entirely at your command.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God said to me, ‘You shall not build a house for My Name (Presence), because you are a man of war and have shed blood.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, chose me from all in my father’s house to be king over Israel forever. For He has chosen Judah to be the leader; and in the house (tribe) of Judah he chose the house of my father; and among the sons of my father He was pleased to make me king over all Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Of all my sons (for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has given me many sons) He has chosen my son Solomon to sit on the throne of the kingdom of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' over Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to me, ‘Solomon your son shall build My house and My courts; for I have chosen him to be a son to Me, and I will be a father to him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 17:14.
      marker-yv: yv-n
    - type: text
      text: 'I will establish his kingdom forever if he loyally '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continually obeys My commandments and My ordinances, as is done today.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now therefore, in the sight of all Israel, the assembly of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and in the hearing of our God, observe and seek after all the commandments of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God so that you may possess the good land and leave it as an inheritance to your sons after you forever.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “As for you, Solomon my son, know the God of your father [have personal knowledge of Him, be acquainted with, and understand Him; appreciate, heed, and cherish Him] and serve Him with a blameless heart and a willing mind; for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' searches all hearts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' minds, and understands every intent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inclination of the thoughts. If you seek Him [inquiring for and of Him and requiring Him as your first and vital necessity] He will let you find Him; but '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In 1 Chr 28:7 God promises to establish Solomon’s kingdom forever; however, in 1 Kin 11:9-11 God becomes angry with Solomon for his degenerate conduct and tolerance of paganism and declares that the kingdom will be torn from him. By disregarding God’s word Solomon nullified his covenant with God. His wisdom was overcome by his love of power, his lack of ethics, his arrogance, his personal aggrandizement, and his distorted sense of privilege.
      marker-yv: yv-n
    - type: text
      text: 'if you abandon (turn away from) Him, He will reject you forever. '
