verses:
  '1':
  - type: heading
    content: David’s Address about the Temple
  - type: text
    content: 'David assembled at Jerusalem all the leaders (officials) of Israel, the leaders of the tribes, and the commanders of the divisions that served the king, and the commanders of thousands, and the commanders of hundreds, and the overseers of all the property and livestock of the king and his sons, with the palace officers and the mighty men, and all the brave warriors. '
  '10':
  - type: text
    content: Consider this carefully, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has chosen you to build a house for the sanctuary. Be courageous '
  - type: text
    content: and
  - type: text
    content: ' strong and do it.”'
  '11':
  - type: text
    content: 'Then David gave to his son Solomon the plan for the porch '
  - type: text
    content: of the temple,
  - type: text
    content: ' its buildings, its treasuries, its upper chambers, its inner rooms, and for the place for the [ark and its] mercy seat; '
  '12':
  - type: text
    content: 'and the plan of all that he had in '
  - type: note
    content: Lit the spirit with him.
  - type: text
    content: mind, for the courts of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', and for all the surrounding rooms, for the storerooms of the house of God and for the storerooms for the dedicated gifts '
  - type: text
    content: and
  - type: text
    content: ' offerings; '
  '13':
  - type: text
    content: the plan
  - type: text
    content: ' for the divisions of the priests and the Levites and for all the work of the service in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and for all the utensils for service in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '; '
  '14':
  - type: text
    content: 'for the golden '
  - type: text
    content: utensils,
  - type: text
    content: ' the weight of gold and silver for all the gold and silver articles for every kind of service; '
  '15':
  - type: text
    content: 'and the weight '
  - type: text
    content: of gold
  - type: text
    content: ' for the golden lampstands and their golden lamps, with the weight of each lampstand and its lamps; and the '
  - type: text
    content: weight of silver
  - type: text
    content: ' for the silver lampstands, with the weight of each lampstand and its lamps according to the use of each lampstand; '
  '16':
  - type: text
    content: 'the gold by weight for each table of showbread, and the silver for the tables of silver; '
  '17':
  - type: text
    content: 'and the forks, the basins, and the pitchers of pure gold; and for the golden bowls with the weight for each bowl; and for the silver bowls with the weight for each bowl; '
  '18':
  - type: text
    content: 'and for the altar of incense refined gold by weight; and gold for the model of the chariot of the cherubim that spread '
  - type: text
    content: their wings
  - type: text
    content: ' and covered the ark of the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' covenant.'
  '19':
  - type: text
    content: '“All '
  - type: text
    content: this,” said David,
  - type: text
    content: ' “the L'
  - type: heading
    content: ord
  - type: text
    content: ' made me understand in writing by His hand upon me, all the work '
  - type: text
    content: and
  - type: text
    content: ' details [to be done] according to this plan.”'
  '2':
  - type: text
    content: Then David the king rose to his feet and said, “Hear me, my brothers [in arms] and my people. I had intended to build a permanent home for the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' and as a footstool for our God, and I prepared materials for the building. '
  '20':
  - type: text
    content: Then David said to his son Solomon, “Be strong and courageous, and take action; do not fear nor be dismayed, for the L
  - type: heading
    content: ord
  - type: text
    content: ' God, my God, is with you. He will not fail you nor '
  - type: note
    content: Lit forsake.
  - type: text
    content: abandon you [but will guide you in the construction] until you have finished all the work for the service of the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '21':
  - type: text
    content: And see, [you have] the divisions of the priests and Levites for all the service of God’s house, and every willing, skillful man will be with you in all the kinds of work for any kind of service. Also the officers and all the people will be entirely at your command.”
  '3':
  - type: text
    content: 'But God said to me, ‘You shall not build a house for My Name (Presence), because you are a man of war and have shed blood.’ '
  '4':
  - type: text
    content: However, the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, chose me from all in my father’s house to be king over Israel forever. For He has chosen Judah to be the leader; and in the house (tribe) of Judah he chose the house of my father; and among the sons of my father He was pleased to make me king over all Israel. '
  '5':
  - type: text
    content: Of all my sons (for the L
  - type: heading
    content: ord
  - type: text
    content: ' has given me many sons) He has chosen my son Solomon to sit on the throne of the kingdom of the L'
  - type: heading
    content: ord
  - type: text
    content: ' over Israel. '
  '6':
  - type: text
    content: 'He said to me, ‘Solomon your son shall build My house and My courts; for I have chosen him to be a son to Me, and I will be a father to him. '
  '7':
  - type: note
    content: See note 17:14.
  - type: text
    content: 'I will establish his kingdom forever if he loyally '
  - type: text
    content: and
  - type: text
    content: ' continually obeys My commandments and My ordinances, as is done today.’ '
  '8':
  - type: text
    content: Now therefore, in the sight of all Israel, the assembly of the L
  - type: heading
    content: ord
  - type: text
    content: ', and in the hearing of our God, observe and seek after all the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God so that you may possess the good land and leave it as an inheritance to your sons after you forever.'
  '9':
  - type: text
    content: “As for you, Solomon my son, know the God of your father [have personal knowledge of Him, be acquainted with, and understand Him; appreciate, heed, and cherish Him] and serve Him with a blameless heart and a willing mind; for the L
  - type: heading
    content: ord
  - type: text
    content: ' searches all hearts '
  - type: text
    content: and
  - type: text
    content: ' minds, and understands every intent '
  - type: text
    content: and
  - type: text
    content: ' inclination of the thoughts. If you seek Him [inquiring for and of Him and requiring Him as your first and vital necessity] He will let you find Him; but '
  - type: note
    content: In 1 Chr 28:7 God promises to establish Solomon’s kingdom forever; however, in 1 Kin 11:9-11 God becomes angry with Solomon for his degenerate conduct and tolerance of paganism and declares that the kingdom will be torn from him. By disregarding God’s word Solomon nullified his covenant with God. His wisdom was overcome by his love of power, his lack of ethics, his arrogance, his personal aggrandizement, and his distorted sense of privilege.
  - type: text
    content: 'if you abandon (turn away from) Him, He will reject you forever. '
