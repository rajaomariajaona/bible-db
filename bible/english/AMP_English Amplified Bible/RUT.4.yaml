      text: The Marriage of Ruth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Boaz went up to the city gate [where business and legal matters were settled] and sat down, and then the close relative (redeemer) of whom Boaz had spoken came by. He said to him, “Come over here, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew for this word is a little peculiar, in that it means something like “a certain one” or “so-and-so.” It is used when the name of the person addressed cannot or should not be mentioned for some reason. No ill will or insult is implied.
    marker-yv: yv-n
  - type: text
    text: 'friend, and sit down.” So he came and sat down. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Boaz took ten men from the elders of the city and said, “Sit down here.” And they sat down. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He said to the closest relative (redeemer), “Naomi, who has returned from the country of Moab, must sell the plot of land which belonged to our brother Elimelech. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So I thought to let you hear of it, saying, ‘Buy it in the presence of those sitting here, and before the elders of my people. If you will redeem it, redeem it; but if not, then tell me, so that I may know; for there is no one besides you to redeem it, and I am [next of kin] after you.’ ” And he said, “I will redeem it.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Boaz said, “The day that you buy the field from Naomi, you must also acquire Ruth the Moabitess, the widow of the deceased, to restore the name of the deceased to his inheritance.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The closest relative (redeemer) said, “I cannot redeem it for myself, because [by marrying a Moabitess] I would '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: damage
      - type: text
        text: . The excuse given was probably made up on the spot by this relative-redeemer to avoid the obligation of marrying Ruth and raising a son in her deceased husband’s name (see note 2:20). He may very well not have wanted to raise a son under such circumstances, or to be married to a Moabite woman.
    marker-yv: yv-n
  - type: text
    text: jeopardize my own inheritance. Take my right of redemption (purchase) yourself, because I cannot redeem it.” [Deut 23:3, 4]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now formerly in Israel this was the custom concerning redeeming and exchanging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: property
  - type: text
    text: '. To confirm a transaction, a man pulled off his sandal and gave it to the other. This was the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: way of
  - type: text
    text: ' confirming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' attesting in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So, when the closest relative (redeemer) said to Boaz, “Buy it for yourself,” he pulled off his sandal [and gave it to Boaz to confirm the agreement]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Boaz said to the elders and to all the people, “You are witnesses this day that I have bought everything that was Elimelech’s and everything that was Chilion’s and Mahlon’s from the hand of Naomi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I have also acquired Ruth the Moabitess, the widow of Mahlon, to be my wife to restore the name of the deceased to his inheritance, so that the name of the deceased will not be cut off from his brothers or from the gate of his birthplace. You are witnesses today.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All the people at the gate and the elders said, “We are witnesses. May the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' make the woman who is coming into your house like Rachel and Leah, the two who built the household of Israel. May you achieve wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power in Ephrathah and become famous in Bethlehem. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Further, may your house be like the house of Perez whom Tamar bore to Judah, because of the offspring which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will give you by this young woman.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So Boaz took Ruth, and she became his wife. And he went in to her, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' enabled her to conceive, and she gave birth to a son. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the women said to Naomi, “Blessed is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who has not left you without a redeemer (grandson, as heir) today, and may his name become famous in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: May he also be to you one who restores life and sustains your old age; for your daughter-in-law, who loves you and is better to you than seven sons, has given birth to him.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Line of David Began Here
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Naomi took the child and placed him in her lap, and she became his nurse. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The neighbor women gave him a name, saying, “A son (grandson) has been born to Naomi.” They named him Obed (worshiper). He is the father of Jesse, the father of David [the ancestor of Jesus Christ].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now these are the descendants of Perez: Perez was the father of Hezron, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hezron was the father of Ram, Ram the father of Amminadab, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amminadab the father of Nahshon, Nahshon the father of Salmon, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Salmon the father of Boaz, Boaz the father of Obed, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Obed the father of Jesse, and Jesse the father of David [the king of Israel and the ancestor of Jesus Christ].
