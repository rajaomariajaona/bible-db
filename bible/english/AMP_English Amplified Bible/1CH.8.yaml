verses:
  '1':
  - type: heading
    content: Genealogy from Benjamin
  - type: text
    content: 'Benjamin became the father of Bela his firstborn, Ashbel the second, Aharah the third, '
  '10':
  - type: text
    content: 'Jeuz, Sachia, and Mirmah. These were his sons, heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'By Hushim he became the father of Abitub and Elpaal. '
  '12':
  - type: text
    content: 'The sons of Elpaal: Eber, Misham, and Shemed, who built Ono and Lod, with its towns; '
  '13':
  - type: text
    content: 'and Beriah and Shema, who were heads of fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the inhabitants of Aijalon, who drove out the inhabitants of Gath; '
  '14':
  - type: text
    content: 'and Ahio, Shashak, and Jeremoth. '
  '15':
  - type: text
    content: 'Zebadiah, Arad, Eder, '
  '16':
  - type: text
    content: 'Michael, Ishpah, and Joha '
  - type: text
    content: were
  - type: text
    content: ' the sons of Beriah. '
  '17':
  - type: text
    content: 'Zebadiah, Meshullam, Hizki, Heber, '
  '18':
  - type: text
    content: 'Ishmerai, Izliah, and Jobab were the sons of Elpaal. '
  '19':
  - type: text
    content: 'Jakim, Zichri, Zabdi, '
  '2':
  - type: text
    content: 'Nohah the fourth and Rapha the fifth. '
  '20':
  - type: text
    content: 'Elienai, Zillethai, Eliel, '
  '21':
  - type: text
    content: 'Adaiah, Beraiah, and Shimrath were the sons of Shimei. '
  '22':
  - type: text
    content: 'Ishpan, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdon, Zichri, Hanan, '
  '24':
  - type: text
    content: 'Hananiah, Elam, Anthothijah, '
  '25':
  - type: text
    content: 'Iphdeiah and Penuel were the sons of Shashak. '
  '26':
  - type: text
    content: 'Shamsherai, Shehariah, Athaliah, '
  '27':
  - type: text
    content: 'Jaareshiah, Elijah, and Zichri were the sons of Jeroham. '
  '28':
  - type: text
    content: 'These [men] were heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ', according to their generations, chief men who lived in Jerusalem.'
  '29':
  - type: text
    content: 'Now in Gibeon, '
  - type: text
    content: Jeiel,
  - type: text
    content: ' the father of Gibeon lived, and his wife’s name was Maacah; '
  '3':
  - type: text
    content: 'Bela had sons: Addar, Gera, Abihud, '
  '30':
  - type: text
    content: 'and his firstborn son was Abdon, then Zur, Kish, Baal, Nadab, '
  '31':
  - type: text
    content: 'Gedor, Ahio, and Zecher. '
  '32':
  - type: text
    content: Mikloth became the father of Shimeah. They also lived with their relatives in Jerusalem opposite their other relatives.
  - type: heading
    content: Genealogy from King Saul
  '33':
  - type: text
    content: 'Ner became the father of Kish, and Kish became the father of [King] Saul, and Saul became the father of Jonathan, Malchi-shua, Abinadab and Eshbaal (Ish-bosheth). '
  '34':
  - type: text
    content: 'The son of Jonathan was Merib-baal (Mephibosheth), and Merib-baal became the father of Micah. '
  '35':
  - type: text
    content: 'The sons of Micah: Pithon, Melech, Tarea, and Ahaz. '
  '36':
  - type: text
    content: 'Ahaz became the father of Jehoaddah, and Jehoaddah became the father of Alemeth, Azmaveth, and Zimri; and Zimri became the father of Moza. '
  '37':
  - type: text
    content: 'Moza became the father of Binea; Raphah was his son, Eleasah his son, Azel his son. '
  '38':
  - type: text
    content: 'Azel had six sons, and these were their names: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan. All these were the sons of Azel. '
  '39':
  - type: text
    content: 'The sons of Eshek his brother: Ulam his firstborn, Jeush the second, and Eliphelet the third. '
  '4':
  - type: text
    content: 'Abishua, Naaman, Ahoah, '
  '40':
  - type: text
    content: 'The sons of Ulam were courageous men, archers, and had many sons and grandsons—150 '
  - type: text
    content: in all
  - type: text
    content: . All these were of the sons (descendants) of Benjamin.
  '5':
  - type: text
    content: 'Gera, Shephuphan, and Huram. '
  '6':
  - type: text
    content: 'These are the sons of Ehud: These are the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the inhabitants of Geba; they were exiled to Manahath: '
  '7':
  - type: text
    content: 'Naaman, Ahijah, and Gera—he forced them into exile; he became the father of Uzza and Ahihud. '
  '8':
  - type: text
    content: 'Shaharaim became the father of children in the country of Moab after he had sent away (divorced) Hushim and Baara his wives. '
  '9':
  - type: text
    content: 'By Hodesh his wife he became the father of Jobab, Zibia, Mesha, Malcam, '
