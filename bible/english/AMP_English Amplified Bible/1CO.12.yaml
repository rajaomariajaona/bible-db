document_id: 1CO.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Use of Spiritual Gifts
  - type: text
    content: 'Now about the spiritual '
  - type: text
    content: gifts
  - type: text
    content: ' [the special endowments given by the Holy Spirit], brothers and sisters, I do not want you to be uninformed. '
  '10':
  - type: text
    content: 'and to another the working of '
  - type: note
    content: I.e. wonderful events or occurrences beyond human capability which manifest the supernatural power of God and fulfill His purpose.
  - type: text
    content: 'miracles, and to another prophecy [foretelling the future, speaking a new message from God to the people], and to another discernment of spirits [the ability to distinguish sound, godly doctrine from the deceptive doctrine of man-made religions and cults], to another '
  - type: text
    content: various
  - type: text
    content: ' kinds of [unknown] tongues, and to another interpretation of tongues. '
  '11':
  - type: text
    content: All these things [the gifts, the achievements, the abilities, the empowering] are brought about by one and the same [Holy] Spirit, distributing to each one individually just as He chooses.
  '12':
  - type: text
    content: 'For just as the body is one and yet has many parts, and all the parts, though many, form [only] one body, so '
  - type: note
    content: Lit is Christ.
  - type: text
    content: 'it is with Christ. '
  '13':
  - type: text
    content: For by one [Holy] Spirit we were all baptized into one body, [spiritually transformed—united together] whether Jews or Greeks (Gentiles), slaves or free, and we were all made to drink of one [Holy] Spirit [since the same Holy Spirit fills each life]. [Rom 3:22; Gal 3:28]
  '14':
  - type: text
    content: 'For the [human] body does not consist of one part, but of many [limbs and organs]. '
  '15':
  - type: text
    content: 'If the foot says, “Because I am not a hand, I am not '
  - type: text
    content: a part
  - type: text
    content: ' of the body,” is it not on the contrary still '
  - type: text
    content: a part
  - type: text
    content: ' of the body? '
  '16':
  - type: text
    content: 'If the ear says, “Because I am not an eye, I am not '
  - type: text
    content: a part
  - type: text
    content: ' of the body,” is it not on the contrary still '
  - type: text
    content: a part
  - type: text
    content: ' of the body? '
  '17':
  - type: text
    content: 'If the whole body were an eye, where would the hearing be? If the whole [body] were an ear, where would the sense of smell be? '
  '18':
  - type: text
    content: 'But now [as things really are], God has placed '
  - type: text
    content: and
  - type: text
    content: ' arranged the parts in the body, each one of them, just as He willed '
  - type: text
    content: and
  - type: text
    content: ' saw fit [with the best balance of function]. '
  '19':
  - type: text
    content: 'If they all were a single '
  - type: text
    content: organ,
  - type: text
    content: ' where would [the rest of] the body be? '
  '2':
  - type: text
    content: 'You know that when you were pagans, '
  - type: text
    content: you were
  - type: text
    content: ' led off after speechless idols; however you were led off [whether by impulse or habit]. '
  '20':
  - type: text
    content: 'But now [as things really are] there are many parts [different limbs and organs], but a single body. '
  '21':
  - type: text
    content: 'The eye cannot say to the hand, “I have no need of you,” nor again the head to the feet, “I have no need of you.” '
  '22':
  - type: text
    content: 'But quite the contrary, the parts of the body that seem to be weaker are [absolutely] necessary; '
  '23':
  - type: text
    content: 'and as for those '
  - type: text
    content: parts
  - type: text
    content: ' of the body which we consider less honorable, these we treat with greater honor; and our less presentable parts are treated with greater modesty, '
  '24':
  - type: text
    content: 'while our more presentable parts do not require it. But God has combined the [whole] body, giving greater honor to that part which lacks it, '
  '25':
  - type: text
    content: 'so that there would be no division '
  - type: text
    content: or
  - type: text
    content: ' discord in the body [that is, lack of adaptation of the parts to each other], but that the parts may have the same concern for one another. '
  '26':
  - type: text
    content: And if one member suffers, all the parts share the suffering; if one member is honored, all rejoice with it.
  '27':
  - type: text
    content: 'Now you [collectively] are Christ’s body, and individually [you are] members of it [each with his own special purpose and function]. '
  '28':
  - type: text
    content: 'So God has appointed '
  - type: text
    content: and
  - type: text
    content: ' placed in the church [for His own use]: first apostles [chosen by Christ], second prophets [those who foretell the future, those who speak a new message from God to the people], third teachers, then those who work miracles, then those with the gifts of healings, the helpers, the administrators, and speakers in '
  - type: text
    content: various
  - type: text
    content: ' kinds of [unknown] tongues. '
  '29':
  - type: text
    content: 'Are all apostles? Are all prophets? Are all teachers? Are all workers of miracles? '
  '3':
  - type: text
    content: Therefore I want you to know that no one speaking by the [power and influence of the] Spirit of God can say, “Jesus be cursed,” and no one can say, “Jesus is [my] Lord,” except by [the power and influence of] the Holy Spirit.
  '30':
  - type: text
    content: 'Do all have gifts of healing? Do all speak with tongues? Do all interpret? '
  '31':
  - type: text
    content: 'But earnestly desire '
  - type: text
    content: and
  - type: text
    content: ' strive for the greater gifts [if acquiring them is going to be your goal].'
  - type: text
    content: A
  - type: text
    content: 'nd yet I will show you a still more excellent way [one of the choicest graces and the highest of them all: unselfish love].'
  '4':
  - type: text
    content: 'Now there are [distinctive] varieties of '
  - type: text
    content: spiritual
  - type: text
    content: ' gifts [special abilities given by the grace and extraordinary power of the Holy Spirit operating in believers], but it is the same Spirit [who grants them and empowers believers]. '
  '5':
  - type: text
    content: 'And there are [distinctive] varieties of ministries '
  - type: text
    content: and
  - type: text
    content: ' service, but it is the same Lord [who is served]. '
  '6':
  - type: text
    content: 'And there are [distinctive] ways of working [to accomplish things], but it is the same God who produces all things in all '
  - type: text
    content: believers
  - type: text
    content: ' [inspiring, energizing, and empowering them]. '
  '7':
  - type: text
    content: 'But to each one is given the manifestation of the Spirit [the spiritual illumination and the enabling of the Holy Spirit] for the common good. '
  '8':
  - type: text
    content: 'To one is given through the [Holy] Spirit [the power to speak] the message of wisdom, and to another [the power to express] the word of knowledge '
  - type: text
    content: and
  - type: text
    content: ' understanding according to the same Spirit; '
  '9':
  - type: text
    content: 'to another [wonder-working] faith [is given] by the same [Holy] Spirit, and to another the [extraordinary] gifts of healings by the one Spirit; '
