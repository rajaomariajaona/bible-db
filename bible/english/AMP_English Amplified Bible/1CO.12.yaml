document_id: 1CO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Use of Spiritual Gifts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now about the spiritual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gifts
  - type: text
    text: ' [the special endowments given by the Holy Spirit], brothers and sisters, I do not want you to be uninformed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'You know that when you were pagans, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you were
  - type: text
    text: ' led off after speechless idols; however you were led off [whether by impulse or habit]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore I want you to know that no one speaking by the [power and influence of the] Spirit of God can say, “Jesus be cursed,” and no one can say, “Jesus is [my] Lord,” except by [the power and influence of] the Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now there are [distinctive] varieties of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spiritual
  - type: text
    text: ' gifts [special abilities given by the grace and extraordinary power of the Holy Spirit operating in believers], but it is the same Spirit [who grants them and empowers believers]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And there are [distinctive] varieties of ministries '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' service, but it is the same Lord [who is served]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there are [distinctive] ways of working [to accomplish things], but it is the same God who produces all things in all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: believers
  - type: text
    text: ' [inspiring, energizing, and empowering them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But to each one is given the manifestation of the Spirit [the spiritual illumination and the enabling of the Holy Spirit] for the common good. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'To one is given through the [Holy] Spirit [the power to speak] the message of wisdom, and to another [the power to express] the word of knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understanding according to the same Spirit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'to another [wonder-working] faith [is given] by the same [Holy] Spirit, and to another the [extraordinary] gifts of healings by the one Spirit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and to another the working of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. wonderful events or occurrences beyond human capability which manifest the supernatural power of God and fulfill His purpose.
    marker-yv: yv-n
  - type: text
    text: 'miracles, and to another prophecy [foretelling the future, speaking a new message from God to the people], and to another discernment of spirits [the ability to distinguish sound, godly doctrine from the deceptive doctrine of man-made religions and cults], to another '
  - type: usfm
    marker: it
    children:
    - type: text
      text: various
  - type: text
    text: ' kinds of [unknown] tongues, and to another interpretation of tongues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All these things [the gifts, the achievements, the abilities, the empowering] are brought about by one and the same [Holy] Spirit, distributing to each one individually just as He chooses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For just as the body is one and yet has many parts, and all the parts, though many, form [only] one body, so '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: is Christ
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'it is with Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For by one [Holy] Spirit we were all baptized into one body, [spiritually transformed—united together] whether Jews or Greeks (Gentiles), slaves or free, and we were all made to drink of one [Holy] Spirit [since the same Holy Spirit fills each life]. [Rom 3:22; Gal 3:28]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the [human] body does not consist of one part, but of many [limbs and organs]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If the foot says, “Because I am not a hand, I am not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a part
  - type: text
    text: ' of the body,” is it not on the contrary still '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a part
  - type: text
    text: ' of the body? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'If the ear says, “Because I am not an eye, I am not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a part
  - type: text
    text: ' of the body,” is it not on the contrary still '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a part
  - type: text
    text: ' of the body? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If the whole body were an eye, where would the hearing be? If the whole [body] were an ear, where would the sense of smell be? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But now [as things really are], God has placed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arranged the parts in the body, each one of them, just as He willed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saw fit [with the best balance of function]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If they all were a single '
  - type: usfm
    marker: it
    children:
    - type: text
      text: organ,
  - type: text
    text: ' where would [the rest of] the body be? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But now [as things really are] there are many parts [different limbs and organs], but a single body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The eye cannot say to the hand, “I have no need of you,” nor again the head to the feet, “I have no need of you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But quite the contrary, the parts of the body that seem to be weaker are [absolutely] necessary; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and as for those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: parts
  - type: text
    text: ' of the body which we consider less honorable, these we treat with greater honor; and our less presentable parts are treated with greater modesty, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'while our more presentable parts do not require it. But God has combined the [whole] body, giving greater honor to that part which lacks it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'so that there would be no division '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' discord in the body [that is, lack of adaptation of the parts to each other], but that the parts may have the same concern for one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And if one member suffers, all the parts share the suffering; if one member is honored, all rejoice with it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now you [collectively] are Christ’s body, and individually [you are] members of it [each with his own special purpose and function]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So God has appointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' placed in the church [for His own use]: first apostles [chosen by Christ], second prophets [those who foretell the future, those who speak a new message from God to the people], third teachers, then those who work miracles, then those with the gifts of healings, the helpers, the administrators, and speakers in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: various
  - type: text
    text: ' kinds of [unknown] tongues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Are all apostles? Are all prophets? Are all teachers? Are all workers of miracles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Do all have gifts of healing? Do all speak with tongues? Do all interpret? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But earnestly desire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strive for the greater gifts [if acquiring them is going to be your goal].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: A
  - type: text
    text: 'nd yet I will show you a still more excellent way [one of the choicest graces and the highest of them all: unselfish love].'
