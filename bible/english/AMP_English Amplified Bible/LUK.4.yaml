    content: 'and they got up and drove Him out of the city, and led Him to the crest of the hill on which their city had been built, in order to hurl Him down the cliff. '
  '3':
  - type: text
    content: 'Then the devil said to Him, “If You are the Son of God, command this stone to turn into bread.” '
  '30':
  - type: text
    content: But passing [miraculously] through the crowd, He went on His way.
  '31':
  - type: text
    content: 'Then He came down [from the hills of Nazareth] to Capernaum, a city of Galilee [on the shore of the sea], and He was teaching them on the Sabbath; [Mark 1:21-28] '
  '32':
