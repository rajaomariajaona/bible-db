      text: '1'
  - type: text
    text: 'Now Jesus, full of [and in perfect communication with] the Holy Spirit, returned from the Jordan and was led by the Spirit in the wilderness [Matt 4:1-11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'for forty days, being tempted by the devil. And He ate nothing during those days, and when they ended, He was hungry. [Deut 9:9; 1 Kin 19:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the devil said to Him, “If You are the Son of God, command this stone to turn into bread.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus replied to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“It is written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
