  - type: text
    text: ' [the day when salvation and the favor of God abound greatly].” [Is 61:1, 2]'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then He rolled up the scroll [having stopped in the middle of the verse], gave it back to the attendant and sat down [to teach]; and the eyes of all those in the synagogue were [attentively] fixed on Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He began speaking to them: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Today this Scripture has been fulfilled in your hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in your presence.”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And [as He continued on] they all were speaking well of Him, and were in awe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were wondering about the words of grace which were coming from His lips; and they were saying, “Is this not Joseph’s son?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You will no doubt quote this proverb to Me, ‘Physician, heal Yourself! Whatever
  - type: text
    text: ' [miracles] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that we heard were done
  - type: text
    text: ' [by You] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in Capernaum, do here in Your hometown as well.’ ”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, no prophet is welcome in his hometown.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But in truth I say to you, there were many widows in Israel in the days of Elijah, when the sky was closed up for three years and six months, when a great famine came over all the land;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and yet Elijah was not sent
  - type: text
    text: ' [by the Lord] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to a single one of them, but only to Zarephath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the land
    - type: text
      text: ' of Sidon, to a woman who was a widow.'
  - type: text
    text: ' [1 Kin 17:1, 8-16; 18:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And there were many lepers in Israel in the time of Elisha the prophet; and not one of them was cleansed
  - type: text
    text: ' [by being healed] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: except Naaman the Syrian.”
  - type: text
    text: ' [2 Kin 5:1-14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'As they heard these things [about God’s grace to these two Gentiles], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the people
  - type: text
    text: ' in the synagogue were filled with a great rage; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and they got up and drove Him out of the city, and led Him to the crest of the hill on which their city had been built, in order to hurl Him down the cliff. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But passing [miraculously] through the crowd, He went on His way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then He came down [from the hills of Nazareth] to Capernaum, a city of Galilee [on the shore of the sea], and He was teaching them on the Sabbath; [Mark 1:21-28] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and they were surprised [almost overwhelmed] at His teaching, because His message was [given] with authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' great ability. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'There was a man in the synagogue who was possessed by the spirit of an unclean demon; and he cried out with a loud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrible voice, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“Let us alone! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: What to me and to you;
      - type: text
        text: ' cf note Matt 8:29.'
    marker-yv: yv-n
  - type: text
    text: 'What business do we have [in common] with each other, Jesus of Nazareth? Have You come to destroy us? I know who You are—the Holy One of God!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'But Jesus rebuked him, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be silent (muzzled, gagged) and come out of him!”
  - type: text
    text: ' And when the demon had thrown the man down among them, he came out of him without injuring him in any way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'They were all astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in awe, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' saying to one another, “What is this message? For with authority and power He commands the unclean spirits and they come out!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: And the news about Him spread into every place in the surrounding district (Galilee).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Many Are Healed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then Jesus got up and left the synagogue and went to Simon’s (Peter’s) house. Now Simon’s mother-in-law was suffering from a high fever, and they asked Him to help her. [Matt 8:14-17; Mark 1:29-34] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Standing over her, He rebuked the fever, and it left her; and immediately she got up and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' serving them [as her guests].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'While the sun was setting [marking the end of the Sabbath day], all those who had any '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who were
  - type: text
    text: ' sick with various diseases brought them to Jesus; and laying His hands on each one of them, He was healing them [exhibiting His authority as Messiah]. [Matt 8:16, 17; Mark 1:32-34] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Demons also were coming out of many people, shouting, “You are the Son of God!” But He rebuked them and would not allow them to speak, because they knew that He was the Christ (the Messiah, the Anointed).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'When daybreak came, Jesus left [Simon Peter’s house] and went to a secluded place; and the crowds were searching for Him, and [they] came to Him and tried to keep Him from leaving them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I must preach
  - type: text
    text: ' [the good news of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the kingdom of God to the other cities also, because I was sent for this purpose.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: So He continued preaching in the synagogues of Judea [the country of the Jews, including Galilee].
