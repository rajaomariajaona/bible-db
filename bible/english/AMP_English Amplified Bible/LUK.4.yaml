      text: Jesus’ Public Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Jesus went back to Galilee in the power of the Spirit, and the news about Him spread through the entire region. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' teaching in their synagogues and was praised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored by all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So He came to Nazareth, where He had been brought up; and as was His custom, He entered the synagogue on the Sabbath, and stood up to read. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The scroll of the prophet Isaiah was handed to Him. He unrolled the scroll and found the place where it was written, [Is 61:1, 2]
