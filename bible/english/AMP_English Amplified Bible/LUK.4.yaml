- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then he led Jesus up [to a high mountain] and displayed before Him all the kingdoms of the inhabited earth [and their magnificence] in the twinkling of an eye. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the devil said to Him, “I will give You all this realm and its glory [its power, its renown]; because it has been handed over to me, and I give it to whomever I wish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore if You worship before me, it will all be Yours.” '
  - type: usfm
