  '33':
  - type: text
    content: 'There was a man in the synagogue who was possessed by the spirit of an unclean demon; and he cried out with a loud '
  - type: text
    content: and
  - type: text
    content: ' terrible voice, '
  '34':
  - type: text
    content: '“Let us alone! '
  - type: note
    content: Lit What to me and to you; cf note Matt 8:29.
  - type: text
    content: 'What business do we have [in common] with each other, Jesus of Nazareth? Have You come to destroy us? I know who You are—the Holy One of God!” '
  '35':
  - type: text
    content: 'But Jesus rebuked him, saying, '
  - type: text
    content: “Be silent (muzzled, gagged) and come out of him!”
  - type: text
    content: ' And when the demon had thrown the man down among them, he came out of him without injuring him in any way. '
  '36':
  - type: text
    content: 'They were all astonished '
  - type: text
