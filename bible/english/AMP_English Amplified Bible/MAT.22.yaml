      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he said, ‘Friend, how did you come in here without wearing the wedding clothes
    - type: text
      text: ' [that were provided for you]?’ '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the man was speechless '
      - type: usfm
        marker: it
        children:
        - type: text
