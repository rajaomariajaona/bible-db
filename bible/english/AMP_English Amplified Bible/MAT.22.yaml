    content: They said, “[
  - type: note
    content: Tiberius Caesar came to the throne after the death of his stepfather, Augustus, in a.d. 14 and ruled the Roman Empire until his death in a.d. 37. He was a brilliant military general, but an incompetent, irresponsible ruler. Most biblical references to “Caesar” refer to Tiberius.
  - type: text
    content: 'The Emperor Tiberius] Caesar’s.” Then He said to them, '
  - type: text
    content: “Then pay to Caesar the things that are Caesar’s; and to God the things that are God’s.”
  - type: text
    content: ' '
