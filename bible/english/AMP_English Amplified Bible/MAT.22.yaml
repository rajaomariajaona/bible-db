          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 37. He was a brilliant military general, but an incompetent, irresponsible ruler. Most biblical references to “Caesar” refer to Tiberius.
      marker-yv: yv-n
    - type: text
      text: 'The Emperor Tiberius] Caesar’s.” Then He said to them, '
    - type: usfm
