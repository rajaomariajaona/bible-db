  '15':
  - type: text
    content: 'Then the Pharisees went and conspired together plotting how to trap Him by [distorting] what He said. [Mark 12:13-17; Luke 20:20-26] '
  '16':
  - type: text
    content: 'They sent their disciples to Him, along with the '
  - type: note
    content: A Jewish political party loyal to Herod. The Pharisees, who strongly opposed Herod and Roman rule, and the Herodians, who were strong allies of Herod and Rome, set aside their political differences in order to conspire together against Jesus.
  - type: text
    content: 'Herodians, saying, “Teacher, we know that You are sincere and that You teach the way of God truthfully, without concerning Yourself about [what] anyone [thinks or says of Your teachings]; for You are impartial '
  - type: text
