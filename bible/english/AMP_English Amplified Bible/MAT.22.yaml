        text: Tribute to Caesar
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the Pharisees went and conspired together plotting how to trap Him by [distorting] what He said. [Mark 12:13-17; Luke 20:20-26] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They sent their disciples to Him, along with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Jewish political party loyal to Herod. The Pharisees, who strongly opposed Herod and Roman rule, and the Herodians, who were strong allies of Herod and Rome, set aside their political differences in order to conspire together against Jesus.
      marker-yv: yv-n
    - type: text
      text: 'Herodians, saying, “Teacher, we know that You are sincere and that You teach the way of God truthfully, without concerning Yourself about [what] anyone [thinks or says of Your teachings]; for You are impartial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do not seek anyone’s favor [and You treat all people alike, regardless of status]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tell us then, what do You think? Is it permissible [according to Jewish law and tradition] to pay a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Every Jew was required to pay the poll-tax. It was considered a sign of subservience to Rome.
      marker-yv: yv-n
    - type: text
      text: 'poll-tax to Caesar, or not?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But Jesus, aware of their malice, asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you testing Me, you hypocrites?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Show me the coin used for the poll-tax.”
    - type: text
      text: ' And they brought Him a denarius [a day’s wage]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
