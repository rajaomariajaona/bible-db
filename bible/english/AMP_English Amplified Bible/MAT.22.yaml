  - type: text
    content: ' do not seek anyone’s favor [and You treat all people alike, regardless of status]. '
  '17':
  - type: text
    content: 'Tell us then, what do You think? Is it permissible [according to Jewish law and tradition] to pay a '
  - type: note
    content: Every Jew was required to pay the poll-tax. It was considered a sign of subservience to Rome.
  - type: text
