      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But when the king came in to see the dinner guests, he saw a man there who was not dressed
    - type: text
      text: ' [appropriately] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in wedding clothes,
    - type: text
