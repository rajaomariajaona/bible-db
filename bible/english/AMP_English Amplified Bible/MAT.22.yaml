      - type: text
        text: ' without excuse.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then the king said to the attendants, ‘Tie him hand and foot, and throw him into the darkness outside; in that place there will be weeping
    - type: text
      text: ' [over sorrow and pain] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and grinding of teeth
    - type: text
      text: ' [over distress and anger].’ '
  '14':
  - type: usfm
