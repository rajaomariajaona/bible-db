document_id: PSA.37,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 37
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Security of Those Who Trust in the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ', and Insecurity of the Wicked.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the longer psalms, Ps 37 also has the distinction of having every other verse (sometimes succeeding verses) begin with a letter of the Hebrew in alphabetical order. This technique served as a memory aid.
      marker-yv: yv-n
    - type: text
      text: Do not worry because of evildoers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor be envious toward wrongdoers;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For yet a little while and the wicked one will be gone [forever];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you look carefully where he used to be, he will not be [found]. [Heb 10:36, 37; Rev 21:7, 8]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the humble will [at last] inherit the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And will delight themselves in abundant prosperity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peace. [Ps 37:29; Matt 5:5]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The wicked plots against the righteous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gnashes at him with his teeth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord laughs at him [the wicked one—the one who oppresses the righteous],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He sees that his day [of defeat] is coming.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked have drawn the sword and bent their bow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To cast down the afflicted and the needy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To slaughter those who are upright in conduct [those with personal integrity and godly character].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword [of the ungodly] will enter their own heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their bow will be broken.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Better is the little of the righteous [who seek the will of God]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than the abundance (riches) of many wicked (godless). [1 Tim 6:6, 7]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the arms of the wicked will be broken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' upholds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sustains the righteous [who seek Him].'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' knows the days of the blameless,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their inheritance will continue forever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will not be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. have their expectations in Your goodness be disappointed.
      marker-yv: yv-n
    - type: text
      text: ashamed in the time of evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in the days of famine they will have plenty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be satisfied.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they will wither quickly like the grass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fade like the green herb.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked (ungodly) will perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the enemies of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be like the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. flowers.
      marker-yv: yv-n
    - type: text
      text: 'glory of the pastures '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' like the fat of lambs [that is consumed in smoke],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They vanish—like smoke they vanish away.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked borrows and does not pay back,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the righteous is gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kind and gives.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For those blessed by God will [at last] inherit the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those cursed by Him will be cut off. [Is 57:13c]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶The steps of a [good and righteous] man are directed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established by the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He delights in his way [and blesses his path].
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he falls, he will not be hurled down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is the One who holds his hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sustains him.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have been young and now I am old,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I have not seen the righteous (those in right standing with God) abandoned
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or his descendants pleading for bread.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day long he is gracious and lends,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his descendants are a blessing.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Depart from evil and do good;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will dwell [securely in the land] forever.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' delights in justice'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And does not abandon His saints (faithful ones);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are preserved forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the descendants of the wicked will [in time] be cut off.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous will inherit the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And live in it forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trust [rely on and have confidence] in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and do good;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dwell in the land and feed [securely] on His faithfulness.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mouth of the righteous proclaims wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his tongue speaks justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' truth.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The law of his God is in his heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one of his steps will slip.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked lies in wait for the righteous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And seeks to kill him.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not leave him in his hand'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or let him be condemned when he is judged.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wait for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expect the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and keep His way,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He will exalt you to inherit the land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[In the end] when the wicked are cut off, you will see it.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I have seen a wicked, violent man [with great power]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Spreading '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' flaunting himself like a cedar in its native soil,'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he passed away, and lo, he was no more;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sought him, but he could not be found.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mark the blameless man [who is spiritually complete], and behold the upright [who walks in moral integrity];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a [good] future for the man of peace [because a life of honor blesses one’s descendants].
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for transgressors, they will be completely destroyed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The future of the wicked will be cut off.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the salvation of the righteous is from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is their refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stronghold in the time of trouble.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Delight yourself in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He will give you the desires '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' petitions of your heart.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' helps them and rescues them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rescues them from the wicked and saves them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they take refuge in Him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Commit your way to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trust in Him also and He will do it.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will make your righteousness [your pursuit of right standing with God] like the light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your judgment like [the shining of] the noonday [sun].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Be still before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; wait patiently for Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' entrust yourself to Him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not fret (whine, agonize) because of him who prospers in his way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the man who carries out wicked schemes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cease from anger and abandon wrath;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not fret; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it leads
    - type: text
      text: ' only to evil.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For those who do evil will be cut off,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who wait for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', they will inherit the land. [Is 57:13c]'
