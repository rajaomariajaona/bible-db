document_id: PSA.37,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 37
  - type: heading
    content: Security of Those Who Trust in the Lord, and Insecurity of the Wicked.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David.'
  - type: text
    content: ' '
  - type: note
    content: One of the longer psalms, Ps 37 also has the distinction of having every other verse (sometimes succeeding verses) begin with a letter of the Hebrew in alphabetical order. This technique served as a memory aid.
  - type: text
    content: Do not worry because of evildoers,
  - type: text
    content: Nor be envious toward wrongdoers;
  '10':
  - type: text
    content: For yet a little while and the wicked one will be gone [forever];
  - type: text
    content: Though you look carefully where he used to be, he will not be [found]. [Heb 10:36, 37; Rev 21:7, 8]
  '11':
  - type: text
    content: But the humble will [at last] inherit the land
  - type: text
    content: 'And will delight themselves in abundant prosperity '
  - type: text
    content: and
  - type: text
    content: ' peace. [Ps 37:29; Matt 5:5]'
  '12':
  - type: text
    content: ¶The wicked plots against the righteous
  - type: text
    content: And gnashes at him with his teeth.
  '13':
  - type: text
    content: The Lord laughs at him [the wicked one—the one who oppresses the righteous],
  - type: text
    content: For He sees that his day [of defeat] is coming.
  '14':
  - type: text
    content: The wicked have drawn the sword and bent their bow
  - type: text
    content: To cast down the afflicted and the needy,
  - type: text
    content: To slaughter those who are upright in conduct [those with personal integrity and godly character].
  '15':
  - type: text
    content: The sword [of the ungodly] will enter their own heart,
  - type: text
    content: And their bow will be broken.
  '16':
  - type: text
    content: ¶Better is the little of the righteous [who seek the will of God]
  - type: text
    content: Than the abundance (riches) of many wicked (godless). [1 Tim 6:6, 7]
  '17':
  - type: text
    content: For the arms of the wicked will be broken,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' upholds '
  - type: text
    content: and
  - type: text
    content: ' sustains the righteous [who seek Him].'
  '18':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' knows the days of the blameless,'
  - type: text
    content: And their inheritance will continue forever.
  '19':
  - type: text
    content: 'They will not be '
  - type: note
    content: I.e. have their expectations in Your goodness be disappointed.
  - type: text
    content: ashamed in the time of evil,
  - type: text
    content: 'And in the days of famine they will have plenty '
  - type: text
    content: and
  - type: text
    content: ' be satisfied.'
  '2':
  - type: text
    content: For they will wither quickly like the grass,
  - type: text
    content: And fade like the green herb.
  '20':
  - type: text
    content: But the wicked (ungodly) will perish,
  - type: text
    content: And the enemies of the L
  - type: heading
    content: ord
  - type: text
    content: ' will be like the '
  - type: note
    content: I.e. flowers.
  - type: text
    content: 'glory of the pastures '
  - type: text
    content: and
  - type: text
    content: ' like the fat of lambs [that is consumed in smoke],'
  - type: text
    content: They vanish—like smoke they vanish away.
  '21':
  - type: text
    content: The wicked borrows and does not pay back,
  - type: text
    content: 'But the righteous is gracious '
  - type: text
    content: and
  - type: text
    content: ' kind and gives.'
  '22':
  - type: text
    content: For those blessed by God will [at last] inherit the land,
  - type: text
    content: But those cursed by Him will be cut off. [Is 57:13c]
  '23':
  - type: text
    content: '¶The steps of a [good and righteous] man are directed '
  - type: text
    content: and
  - type: text
    content: ' established by the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And He delights in his way [and blesses his path].
  '24':
  - type: text
    content: When he falls, he will not be hurled down,
  - type: text
    content: Because the L
  - type: heading
    content: ord
  - type: text
    content: ' is the One who holds his hand '
  - type: text
    content: and
  - type: text
    content: ' sustains him.'
  '25':
  - type: text
    content: I have been young and now I am old,
  - type: text
    content: Yet I have not seen the righteous (those in right standing with God) abandoned
  - type: text
    content: Or his descendants pleading for bread.
  '26':
  - type: text
    content: All day long he is gracious and lends,
  - type: text
    content: And his descendants are a blessing.
  '27':
  - type: text
    content: ¶Depart from evil and do good;
  - type: text
    content: And you will dwell [securely in the land] forever.
  '28':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' delights in justice'
  - type: text
    content: And does not abandon His saints (faithful ones);
  - type: text
    content: They are preserved forever,
  - type: text
    content: But the descendants of the wicked will [in time] be cut off.
  '29':
  - type: text
    content: The righteous will inherit the land
  - type: text
    content: And live in it forever.
  '3':
  - type: text
    content: Trust [rely on and have confidence] in the L
  - type: heading
    content: ord
  - type: text
    content: ' and do good;'
  - type: text
    content: Dwell in the land and feed [securely] on His faithfulness.
  '30':
  - type: text
    content: The mouth of the righteous proclaims wisdom,
  - type: text
    content: 'And his tongue speaks justice '
  - type: text
    content: and
  - type: text
    content: ' truth.'
  '31':
  - type: text
    content: The law of his God is in his heart;
  - type: text
    content: Not one of his steps will slip.
  '32':
  - type: text
    content: The wicked lies in wait for the righteous
  - type: text
    content: And seeks to kill him.
  '33':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will not leave him in his hand'
  - type: text
    content: Or let him be condemned when he is judged.
  '34':
  - type: text
    content: 'Wait for '
  - type: text
    content: and
  - type: text
    content: ' expect the L'
  - type: heading
    content: ord
  - type: text
    content: ' and keep His way,'
  - type: text
    content: And He will exalt you to inherit the land;
  - type: text
    content: '[In the end] when the wicked are cut off, you will see it.'
  '35':
  - type: text
    content: ¶I have seen a wicked, violent man [with great power]
  - type: text
    content: 'Spreading '
  - type: text
    content: and
  - type: text
    content: ' flaunting himself like a cedar in its native soil,'
  '36':
  - type: text
    content: Yet he passed away, and lo, he was no more;
  - type: text
    content: I sought him, but he could not be found.
  '37':
  - type: text
    content: Mark the blameless man [who is spiritually complete], and behold the upright [who walks in moral integrity];
  - type: text
    content: There is a [good] future for the man of peace [because a life of honor blesses one’s descendants].
  '38':
  - type: text
    content: As for transgressors, they will be completely destroyed;
  - type: text
    content: The future of the wicked will be cut off.
  '39':
  - type: text
    content: But the salvation of the righteous is from the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: 'He is their refuge '
  - type: text
    content: and
  - type: text
    content: ' stronghold in the time of trouble.'
  '4':
  - type: text
    content: Delight yourself in the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And He will give you the desires '
  - type: text
    content: and
  - type: text
    content: ' petitions of your heart.'
  '40':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' helps them and rescues them;'
  - type: text
    content: He rescues them from the wicked and saves them,
  - type: text
    content: Because they take refuge in Him.
  '5':
  - type: text
    content: Commit your way to the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Trust in Him also and He will do it.
  '6':
  - type: text
    content: He will make your righteousness [your pursuit of right standing with God] like the light,
  - type: text
    content: And your judgment like [the shining of] the noonday [sun].
  '7':
  - type: text
    content: ¶Be still before the L
  - type: heading
    content: ord
  - type: text
    content: '; wait patiently for Him '
  - type: text
    content: and
  - type: text
    content: ' entrust yourself to Him;'
  - type: text
    content: Do not fret (whine, agonize) because of him who prospers in his way,
  - type: text
    content: Because of the man who carries out wicked schemes.
  '8':
  - type: text
    content: Cease from anger and abandon wrath;
  - type: text
    content: 'Do not fret; '
  - type: text
    content: it leads
  - type: text
    content: ' only to evil.'
  '9':
  - type: text
    content: For those who do evil will be cut off,
  - type: text
    content: But those who wait for the L
  - type: heading
    content: ord
  - type: text
    content: ', they will inherit the land. [Is 57:13c]'
