document_id: NUM.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Silver Trumpets
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke further to Moses, saying, '
  '10':
  - type: text
    content: Also in the day of rejoicing, and in your appointed feasts, and at the beginnings of your months, you shall sound the trumpets over your burnt offerings, and over the sacrifice of your peace offerings; and they shall be as a reminder of you before your God. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.”'
  - type: heading
    content: The Tribes Leave Sinai
  '11':
  - type: text
    content: 'On the twentieth day of the second month in the second year [since leaving Egypt], the cloud [of the Lord’s presence] was lifted from over the tabernacle of the Testimony, '
  '12':
  - type: text
    content: and the Israelites set out on their journey from the Wilderness of Sinai, and the cloud [of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' guiding presence] settled down in the Wilderness of Paran. '
  '13':
  - type: text
    content: So they moved out for the first time in accordance with the command of the L
  - type: heading
    content: ord
  - type: text
    content: ' through Moses. '
  '14':
  - type: text
    content: 'The '
  - type: note
    content: The three tribes under this standard were Judah, Issachar, and Zebulun.
  - type: text
    content: 'standard of the camp of the sons of Judah, according to their armies, moved out first, Nahshon the son of Amminadab was [commander] over its army, '
  '15':
  - type: text
    content: 'and Nethanel the son of Zuar was [commander] over the tribal army of the sons of Issachar; '
  '16':
  - type: text
    content: and Eliab the son of Helon was [commander] over the tribal army of the sons of Zebulun.
  '17':
  - type: text
    content: 'Then the tabernacle was taken down; and the sons of Gershon and the sons of Merari, who were carrying the tabernacle, moved out. '
  '18':
  - type: text
    content: 'Next the '
  - type: note
    content: The three tribes under this standard were Reuben, Simeon, and Gad.
  - type: text
    content: 'standard of the camp of the sons of Reuben, according to their armies, moved out, with Elizur the son of Shedeur [commander] over its army, '
  '19':
  - type: text
    content: 'and Shelumiel the son of Zurishaddai was [commander] over the tribal army of the sons of Simeon, '
  '2':
  - type: text
    content: '“Make two trumpets of silver; you shall make them of hammered work. You shall use them to summon the congregation and to have the camps move out. '
  '20':
  - type: text
    content: and Eliasaph the son of Deuel was [commander] over the tribal army of the sons of Gad.
  '21':
  - type: text
    content: 'Then the Kohathites moved out, carrying the holy things, and the tabernacle was set up before they arrived. '
  '22':
  - type: text
    content: 'Next the '
  - type: note
    content: The three tribes under this standard were Ephraim, Manasseh, and Benjamin.
  - type: text
    content: 'standard of the camp of the sons of Ephraim moved out, according to their armies, with Elishama the son of Ammihud [commander] over its army, '
  '23':
  - type: text
    content: 'and Gamaliel the son of Pedahzur was [commander] over the tribal army of the sons of Manasseh, '
  '24':
  - type: text
    content: and Abidan the son of Gideoni was [commander] over the tribal army of the sons of Benjamin.
  '25':
  - type: text
    content: 'Then the '
  - type: note
    content: The three tribes under this standard were Dan, Asher, and Naphtali.
  - type: text
    content: 'standard of the camp of the sons of Dan, according to their armies, which formed the rear guard for all the camps, moved out, with Ahiezer the son of Ammishaddai [commander] over its army, '
  '26':
  - type: text
    content: 'and Pagiel the son of Ochran was [commander] over the tribal army of the sons of Asher, '
  '27':
  - type: text
    content: 'and Ahira the son of Enan was [commander] over the tribal army of the sons of Naphtali. '
  '28':
  - type: text
    content: This was the order of march of the sons of Israel by their armies as they moved out.
  '29':
  - type: text
    content: Then Moses said to Hobab the son of Reuel the Midianite, Moses’ father-in-law, “We are going to the place of which the L
  - type: heading
    content: ord
  - type: text
    content: ' said, ‘I will give it to you.’ Come with us, and we will be good to you, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has promised good [things] concerning Israel.” '
  '3':
  - type: text
    content: 'When both are blown, all the congregation [that is, all adult males] shall gather before you at the doorway of the Tent of Meeting (tabernacle). '
  '30':
  - type: text
    content: 'But Hobab [Moses’ brother-in-law] said to him, “I will not go; I will return to my own land and to my family.” '
  '31':
  - type: text
    content: Then Moses said, “
  - type: note
    content: The text does not say so, but Hobab seems to have remained with the Israelites, for later history shows that his descendants lived in Canaan (Judg 1:16; 1 Sam 15:6).
  - type: text
    content: 'Please do not leave us, for you know how we are to camp in the wilderness, and you will serve as eyes for us [as we make our trek through the desert]. '
  '32':
  - type: text
    content: 'So if you will go with us, it shall be that '
  - type: note
    content: Lit that good which.
  - type: text
    content: whatever good the L
  - type: heading
    content: ord
  - type: text
    content: ' does for us, we will do '
  - type: text
    content: the same
  - type: text
    content: ' for you.”'
  '33':
  - type: text
    content: So they set out from the mountain of the L
  - type: heading
    content: ord
  - type: text
    content: ' (Sinai) three days’ journey; and the ark of the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' went in front of them during the three days’ journey to seek out a resting place for them. '
  '34':
  - type: text
    content: The cloud of the L
  - type: heading
    content: ord
  - type: text
    content: ' was over them by day when they set out from the camp.'
  '35':
  - type: text
    content: Whenever the ark set out, Moses said,
  - type: text
    content: “Rise up, O L
  - type: heading
    content: ord
  - type: text
    content: '!'
  - type: text
    content: Let Your enemies be scattered;
  - type: text
    content: And let those who hate You flee before You.” [Ps 68:1, 2]
  '36':
  - type: text
    content: And when the ark rested, Moses said,
  - type: text
    content: “Return, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: To the myriad (many) thousands of Israel.”
  '4':
  - type: text
    content: 'However, if a single trumpet is blown, then the leaders, heads of the tribes of Israel, shall gather themselves to you. '
  '5':
  - type: text
    content: 'When you blow an alarm, the camps on the east side [of the tabernacle] shall set out. '
  '6':
  - type: text
    content: 'When you blow an alarm the second time, then the camps on the south side [of the tabernacle] shall set out. They shall blow an alarm whenever they are to move out [on their journeys]. '
  '7':
  - type: text
    content: 'When the assembly is to be gathered, you shall blow [the trumpets in short, sharp tones], but without sounding an alarm. '
  '8':
  - type: text
    content: 'The sons of Aaron, the priests, shall blow the trumpets; and the trumpets shall be for you a perpetual statute throughout your generations. '
  '9':
  - type: text
    content: When you go to war in your land against the enemy that attacks you, then sound an alarm with the trumpets, so that you may be remembered before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and you shall be saved from your enemies. '
