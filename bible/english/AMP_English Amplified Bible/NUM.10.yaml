document_id: NUM.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Silver Trumpets
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke further to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also in the day of rejoicing, and in your appointed feasts, and at the beginnings of your months, you shall sound the trumpets over your burnt offerings, and over the sacrifice of your peace offerings; and they shall be as a reminder of you before your God. I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Tribes Leave Sinai
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the twentieth day of the second month in the second year [since leaving Egypt], the cloud [of the Lord’s presence] was lifted from over the tabernacle of the Testimony, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the Israelites set out on their journey from the Wilderness of Sinai, and the cloud [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' guiding presence] settled down in the Wilderness of Paran. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they moved out for the first time in accordance with the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' through Moses. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The three tribes under this standard were Judah, Issachar, and Zebulun.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of the sons of Judah, according to their armies, moved out first, Nahshon the son of Amminadab was [commander] over its army, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Nethanel the son of Zuar was [commander] over the tribal army of the sons of Issachar; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Eliab the son of Helon was [commander] over the tribal army of the sons of Zebulun.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the tabernacle was taken down; and the sons of Gershon and the sons of Merari, who were carrying the tabernacle, moved out. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The three tribes under this standard were Reuben, Simeon, and Gad.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of the sons of Reuben, according to their armies, moved out, with Elizur the son of Shedeur [commander] over its army, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Shelumiel the son of Zurishaddai was [commander] over the tribal army of the sons of Simeon, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Make two trumpets of silver; you shall make them of hammered work. You shall use them to summon the congregation and to have the camps move out. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Eliasaph the son of Deuel was [commander] over the tribal army of the sons of Gad.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Kohathites moved out, carrying the holy things, and the tabernacle was set up before they arrived. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The three tribes under this standard were Ephraim, Manasseh, and Benjamin.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of the sons of Ephraim moved out, according to their armies, with Elishama the son of Ammihud [commander] over its army, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Gamaliel the son of Pedahzur was [commander] over the tribal army of the sons of Manasseh, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Abidan the son of Gideoni was [commander] over the tribal army of the sons of Benjamin.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The three tribes under this standard were Dan, Asher, and Naphtali.
      marker-yv: yv-n
    - type: text
      text: 'standard of the camp of the sons of Dan, according to their armies, which formed the rear guard for all the camps, moved out, with Ahiezer the son of Ammishaddai [commander] over its army, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Pagiel the son of Ochran was [commander] over the tribal army of the sons of Asher, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Ahira the son of Enan was [commander] over the tribal army of the sons of Naphtali. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This was the order of march of the sons of Israel by their armies as they moved out.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said to Hobab the son of Reuel the Midianite, Moses’ father-in-law, “We are going to the place of which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, ‘I will give it to you.’ Come with us, and we will be good to you, for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has promised good [things] concerning Israel.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When both are blown, all the congregation [that is, all adult males] shall gather before you at the doorway of the Tent of Meeting (tabernacle). '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hobab [Moses’ brother-in-law] said to him, “I will not go; I will return to my own land and to my family.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text does not say so, but Hobab seems to have remained with the Israelites, for later history shows that his descendants lived in Canaan (Judg 1:16; 1 Sam 15:6).
      marker-yv: yv-n
    - type: text
      text: 'Please do not leave us, for you know how we are to camp in the wilderness, and you will serve as eyes for us [as we make our trek through the desert]. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you will go with us, it shall be that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: that good which
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: whatever good the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does for us, we will do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the same
    - type: text
      text: ' for you.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they set out from the mountain of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' (Sinai) three days’ journey; and the ark of the covenant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' went in front of them during the three days’ journey to seek out a resting place for them. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The cloud of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was over them by day when they set out from the camp.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whenever the ark set out, Moses said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rise up, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Your enemies be scattered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let those who hate You flee before You.” [Ps 68:1, 2]
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And when the ark rested, Moses said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Return, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the myriad (many) thousands of Israel.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, if a single trumpet is blown, then the leaders, heads of the tribes of Israel, shall gather themselves to you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you blow an alarm, the camps on the east side [of the tabernacle] shall set out. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you blow an alarm the second time, then the camps on the south side [of the tabernacle] shall set out. They shall blow an alarm whenever they are to move out [on their journeys]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the assembly is to be gathered, you shall blow [the trumpets in short, sharp tones], but without sounding an alarm. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Aaron, the priests, shall blow the trumpets; and the trumpets shall be for you a perpetual statute throughout your generations. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you go to war in your land against the enemy that attacks you, then sound an alarm with the trumpets, so that you may be remembered before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, and you shall be saved from your enemies. '
