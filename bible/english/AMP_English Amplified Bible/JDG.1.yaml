document_id: JDG.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem Is Captured
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came about after the death of Joshua, that the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israel
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Israelites
        - type: text
          text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of Reuben, Reuben, Reubenites
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: sons (descendants) of Israel (Jacob) asked the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Who shall go up first for us against the Canaanites, to fight against them?” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Judah went against the Canaanites who lived in Hebron (the name of Hebron formerly was Kiriath-arba); and they defeated Sheshai and Ahiman and Talmai.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Capture of Other Cities
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there [the tribe of] Judah went against the inhabitants of Debir (the name of Debir formerly was Kiriath-sepher [city of books and scribes]). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Caleb said, “Whoever attacks Kiriath-sepher and captures it, I will even give him my daughter Achsah as a wife.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Othniel the son of Kenaz, Caleb’s younger brother, captured it; so he gave him his daughter Achsah as a wife. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Othniel,
    - type: text
      text: ' she persuaded him to [allow her to] ask her father [Caleb] for a field. Then she [rode up to Caleb and] dismounted from her donkey, and Caleb said to her, “What do you want?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said to him, “Give me a blessing; since you have given me the land of the Negev (South country), give me springs of water, too.” So Caleb gave her the upper springs and the lower springs.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The sons of [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also called Reuel (Ex 2:18).
      marker-yv: yv-n
    - type: text
      text: 'Jethro] the Kenite, Moses’ father-in-law, went up from the City of Palms (Jericho) with the sons of Judah, to the wilderness of Judah which is in the Negev (South country) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: near
    - type: text
      text: ' Arad; and they went and lived with the people. [Ex 3:1] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then [the warriors of the tribe of] Judah went with [the warriors of the tribe of] Simeon his brother, and they struck the Canaanites living in Zephath and utterly destroyed it. So the city was called Hormah (destruction). '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also [the warriors of] Judah captured Gaza with its territory and Ashkelon with its territory and Ekron with its territory. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with Judah, and [the tribe of] Judah took possession of the hill country, but they could not dispossess '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' drive out those inhabiting the valley because they had iron chariots. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Judah shall go up [first]; behold, I have given the land into his hand.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they gave Hebron to Caleb, as Moses had said, and he drove out from there the three sons of Anak. [Josh 14:6, 9] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the sons of Benjamin did not drive out the Jebusites who inhabited Jerusalem; so the Jebusites have lived with the sons of Benjamin in Jerusalem to this day.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the tribes of the descendants of Manasseh and Ephraim.
      marker-yv: yv-n
    - type: text
      text: house of Joseph also went up against Bethel, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The house of Joseph spied out Bethel (now the name of the city was formerly Luz). '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The spies saw a man coming out of the city and they said to him, “Please show us the entrance to the city and we will treat you kindly.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he showed them the entrance to the city, and they struck the city with the edge of the sword, but they let the man and all his family go free. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man went into the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Aram (northern Syria).
      marker-yv: yv-n
    - type: text
      text: land of the Hittites and built a city and named it Luz, which is its name to this day.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Places Not Conquered
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But [the tribe of] Manasseh did not take possession of Beth-shean and its villages, or Taanach and its villages, or the inhabitants of Dor and its villages, or the inhabitants of Ibleam and its villages, or the inhabitants of Megiddo and its villages; so the Canaanites remained in that land. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It happened when Israel became strong, that they put the Canaanites to forced labor, but they did not drive them out completely.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neither did [the warriors of] Ephraim drive out the Canaanites who were living in Gezer; so the Canaanites lived in Gezer among them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And [the tribe of the sons of] Judah said to [the tribe of the sons of] Simeon his brother, “Come up with me into my allotted territory, so that we may fight against the Canaanites; and I likewise will go with you into your allotted territory.” So Simeon went with him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[The warriors of the tribe of] Zebulun did not drive out the inhabitants of Kitron or of Nahalol; so the Canaanites lived among them and were put to forced labor.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[The warriors of the tribe of] Asher did not drive out the inhabitants of Acco, or the inhabitants of Sidon, or of Ahlab, or of Achzib, or of Helbah, or of Aphik, or of Rehob. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the Asherites lived among the Canaanites, the inhabitants of the land, because they did not drive them out.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neither did [the warriors of] Naphtali drive out the inhabitants of Beth-shemesh, or the inhabitants of Beth-anath, but they lived among the Canaanites, the inhabitants of the land; and the inhabitants of Beth-shemesh and of Beth-anath became forced labor for them.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Like the other Canaanites, the Amorites probably had iron chariots with which they controlled the valley.
      marker-yv: yv-n
    - type: text
      text: 'Amorites forced the sons of Dan [back] into the hill country, for they would not allow them to come down into the valley; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet the Amorites persisted in living on Mount Heres (the mountain of the sun), in Aijalon, and in Shaalbim; but when the power of the house (descendants) of Joseph became strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prevailed, they became forced labor. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The border of the Amorites ran from the ascent of Akrabbim, from '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars identify Sela with Petra in modern day Jordan.
      marker-yv: yv-n
    - type: text
      text: Sela (rock) and upward.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Judah went up, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave the Canaanites and the Perizzites into their hand, and they struck down in defeat ten thousand men at Bezek. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they found Adoni-bezek in Bezek and fought against him, and they struck down in defeat the Canaanites and the Perizzites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Adoni-bezek fled; and they pursued him and caught him and cut off his thumbs and his big toes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoni-bezek said, “Seventy kings with their thumbs and big toes cut off used to gather up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: scraps of food
    - type: text
      text: ' under my table; as I have done [to others], so God has repaid me.” So they brought him to Jerusalem, and he died there.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the sons of Judah fought against [Jebusite] Jerusalem and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Judah briefly captured Jerusalem, but could not hold and occupy it.
      marker-yv: yv-n
    - type: text
      text: 'captured it and struck it with the edge of the sword and set the city on fire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward the sons of Judah went down to fight against the Canaanites who lived in the hill country, in the Negev (South country) and in the lowland. '
