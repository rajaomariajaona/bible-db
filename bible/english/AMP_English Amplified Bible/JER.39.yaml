document_id: JER.39,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem Captured
  - type: text
    content: 'Now regarding the capture of Jerusalem: In the ninth year of [the reign of] Zedekiah king of Judah, in the tenth month, Nebuchadnezzar king of Babylon and all his army came against Jerusalem and besieged it; [Jer 52:4-27] '
  '10':
  - type: text
    content: But Nebuzaradan the [Babylonian] captain of the bodyguard left behind in the land of Judah some of the poor people who had nothing, and gave them vineyards and fields at that time.
  - type: heading
    content: Jeremiah Spared
  '11':
  - type: text
    content: 'Now Nebuchadnezzar king of Babylon gave orders concerning Jeremiah through Nebuzaradan the captain of the bodyguard, saying, '
  '12':
  - type: text
    content: '“Take him and look after him; do nothing to harm him, but rather deal with him just as he asks of you.” '
  '13':
  - type: text
    content: 'So Nebuzaradan the captain of the bodyguard sent '
  - type: text
    content: word,
  - type: text
    content: ' along with Nebushazban the Rab-saris (chief of the high officials), and Nergal-sar-ezer the Rab-mag (chief of the magicians), and all the leading officers of the king of Babylon; '
  '14':
  - type: text
    content: they even sent and took Jeremiah out of the court of the guardhouse and entrusted him to Gedaliah [a prominent citizen], the son of Ahikam [who had once saved Jeremiah’s life], the son of Shaphan, to take him home [with him to Mizpah]. So Jeremiah [was released and] lived among the people. [Jer 26:24]
  '15':
  - type: text
    content: Now the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' had come to Jeremiah while he was [still] confined in the court of the guardhouse, saying, '
  '16':
  - type: text
    content: “Go and speak to Ebed-melech the Ethiopian, saying, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Behold, I am about to bring My words [of judgment] against this city through disaster and not for good; and they will take place before you on that day. '
  '17':
  - type: text
    content: 'But I will '
  - type: note
    content: Lit deliver.
  - type: text
    content: protect you [Ebed-melech] on that day,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “and you will not be handed over to the men of whom you are afraid. [Jer 38:7-13] '
  '18':
  - type: text
    content: For I will certainly rescue you; and you will not fall by the sword, but you will have your [own] life as a reward of battle, because you have placed your trust in Me,” says the L
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: 'and in the eleventh year of Zedekiah, in the fourth month, on the ninth day of the month, they breached the wall '
  - type: text
    content: and
  - type: text
    content: ' broke into the city. '
  '3':
  - type: text
    content: 'Then all the officials of the king of Babylon came in and sat in the Middle Gate [establishing both military control of the city and their authority to judge the captives]: Nergal-sar-ezer, Samgar-nebu, Sar-sekim the Rab-saris (chief of the eunuchs), and '
  - type: note
    content: Nergal-sar-ezer the Rab-mag, the son-in-law of Nebuchadnezzar, ascended to the Babylonian throne in 560 b.c. after causing the death of Nebuchadnezzar’s son, Evil-merodach. Nergal-sar-ezer then ruled the Babylonian Empire until 556 b.c.
  - type: text
    content: 'Nergal-sar-ezer the Rab-mag (chief of the magicians), with all the rest of the officials of the king of Babylon. '
  '4':
  - type: text
    content: 'When Zedekiah the king of Judah and all the men of war saw them, they fled and escaped from the city at night by way of the king’s garden, through the gate between the two walls; and the king went out toward the Arabah (Jordan Valley). '
  '5':
  - type: text
    content: 'But the Chaldean (Babylonian) army pursued them and overtook Zedekiah in the plains of Jericho. When they had seized him, they brought him up to Nebuchadnezzar king of Babylon at Riblah in the [Aramean] land of Hamath, where he passed sentence on him. '
  '6':
  - type: text
    content: 'Then at Riblah the king of Babylon killed the sons of Zedekiah before his eyes; the king of Babylon also killed all the nobles of Judah. '
  '7':
  - type: text
    content: 'Moreover, he blinded Zedekiah and bound him with bronze shackles to take him to Babylon. [Ezek 12:13] '
  '8':
  - type: text
    content: 'The Chaldeans also burned down the king’s palace and the houses of the people, and they broke down the walls of Jerusalem. '
  '9':
  - type: text
    content: 'Then Nebuzaradan the [chief executioner and] captain of the bodyguard took the rest of the people who remained in the city, along with those who had deserted '
  - type: text
    content: and
  - type: text
    content: ' surrendered to him, and the rest of the [so-called better class of] people who were left and carried them into exile in Babylon. '
