document_id: JER.39,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem Captured
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now regarding the capture of Jerusalem: In the ninth year of [the reign of] Zedekiah king of Judah, in the tenth month, Nebuchadnezzar king of Babylon and all his army came against Jerusalem and besieged it; [Jer 52:4-27] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Nebuzaradan the [Babylonian] captain of the bodyguard left behind in the land of Judah some of the poor people who had nothing, and gave them vineyards and fields at that time.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah Spared
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Nebuchadnezzar king of Babylon gave orders concerning Jeremiah through Nebuzaradan the captain of the bodyguard, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take him and look after him; do nothing to harm him, but rather deal with him just as he asks of you.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Nebuzaradan the captain of the bodyguard sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word,
    - type: text
      text: ' along with Nebushazban the Rab-saris (chief of the high officials), and Nergal-sar-ezer the Rab-mag (chief of the magicians), and all the leading officers of the king of Babylon; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: they even sent and took Jeremiah out of the court of the guardhouse and entrusted him to Gedaliah [a prominent citizen], the son of Ahikam [who had once saved Jeremiah’s life], the son of Shaphan, to take him home [with him to Mizpah]. So Jeremiah [was released and] lived among the people. [Jer 26:24]
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had come to Jeremiah while he was [still] confined in the court of the guardhouse, saying, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go and speak to Ebed-melech the Ethiopian, saying, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Behold, I am about to bring My words [of judgment] against this city through disaster and not for good; and they will take place before you on that day. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: deliver
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: protect you [Ebed-melech] on that day,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “and you will not be handed over to the men of whom you are afraid. [Jer 38:7-13] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I will certainly rescue you; and you will not fall by the sword, but you will have your [own] life as a reward of battle, because you have placed your trust in Me,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the eleventh year of Zedekiah, in the fourth month, on the ninth day of the month, they breached the wall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broke into the city. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the officials of the king of Babylon came in and sat in the Middle Gate [establishing both military control of the city and their authority to judge the captives]: Nergal-sar-ezer, Samgar-nebu, Sar-sekim the Rab-saris (chief of the eunuchs), and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nergal-sar-ezer the Rab-mag, the son-in-law of Nebuchadnezzar, ascended to the Babylonian throne in 560 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. after causing the death of Nebuchadnezzar’s son, Evil-merodach. Nergal-sar-ezer then ruled the Babylonian Empire until 556 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nergal-sar-ezer the Rab-mag (chief of the magicians), with all the rest of the officials of the king of Babylon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Zedekiah the king of Judah and all the men of war saw them, they fled and escaped from the city at night by way of the king’s garden, through the gate between the two walls; and the king went out toward the Arabah (Jordan Valley). '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Chaldean (Babylonian) army pursued them and overtook Zedekiah in the plains of Jericho. When they had seized him, they brought him up to Nebuchadnezzar king of Babylon at Riblah in the [Aramean] land of Hamath, where he passed sentence on him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then at Riblah the king of Babylon killed the sons of Zedekiah before his eyes; the king of Babylon also killed all the nobles of Judah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, he blinded Zedekiah and bound him with bronze shackles to take him to Babylon. [Ezek 12:13] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Chaldeans also burned down the king’s palace and the houses of the people, and they broke down the walls of Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Nebuzaradan the [chief executioner and] captain of the bodyguard took the rest of the people who remained in the city, along with those who had deserted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' surrendered to him, and the rest of the [so-called better class of] people who were left and carried them into exile in Babylon. '
