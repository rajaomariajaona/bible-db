document_id: 2CO.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God Gives Most
  - type: text
    content: 'Now it is unnecessary for me to write to you about the offering [that is to be made] for the saints [in Jerusalem]; '
  '10':
  - type: text
    content: 'Now He who provides seed for the sower and bread for food will provide and multiply your seed for sowing [that is, your resources] and increase the harvest of your righteousness [which shows itself in active goodness, kindness, and love]. [Is 55:10; Hos 10:12] '
  '11':
  - type: text
    content: 'You will be enriched in every way so that you may be generous, and this [generosity, administered] through us is producing thanksgiving to God [from those who benefit]. '
  '12':
  - type: text
    content: 'For the ministry of this service (offering) is not only supplying the needs of the saints (God’s people), but is also overflowing through many expressions of thanksgiving to God. '
  '13':
  - type: text
    content: 'Because of this act of ministry, '
  - type: note
    content: I.e. believers in Jerusalem.
  - type: text
    content: 'they will glorify God for your obedience to the gospel of Christ which you confess, as well as for your generous participation [in this gift] for them and for all [the other believers in need], '
  '14':
  - type: text
    content: 'and they also long for you while they pray on your behalf, because of the surpassing measure of God’s grace [His undeserved favor, mercy, and blessing which is revealed] in you. '
  '15':
  - type: text
    content: Now thanks be to God for His indescribable gift [which is precious beyond words]!
  '2':
  - type: text
    content: 'for I know your eagerness [to promote this cause], and I have [proudly] boasted to the people of Macedonia about it, telling them that '
  - type: note
    content: Corinth, the capital city of the Roman province of Achaia, was located in the NW part of the Peloponnesus (southern Greece), about 50 miles from Athens. Paul mentions their positive response to this request in Rom 15:26.
  - type: text
    content: 'Achaia has been prepared since last year [for this contribution], and your enthusiasm has inspired the majority of them [to respond]. '
  '3':
  - type: text
    content: 'Still, I am sending the brothers [on to you], so that our pride in you may not be an empty boast in this case, and so that you may be prepared, just as I told them you would be; '
  '4':
  - type: text
    content: 'otherwise, if any Macedonians come with me and find you unprepared, we—to say nothing of yourselves—will be humiliated for being so confident. '
  '5':
  - type: text
    content: That is why I thought it necessary to urge these brothers to go to you [before I come] and make arrangements in advance for this generous, previously promised gift of yours, so that it would be ready, not as something extorted [or wrung out of you], but as a [voluntary and] generous gift.
  '6':
  - type: text
    content: 'Now [remember] this: he who sows sparingly will also reap sparingly, and he who sows '
  - type: note
    content: Lit in blessings.
  - type: text
    content: 'generously [that blessings may come to others] will also reap '
  - type: note
    content: Lit in blessings.
  - type: text
    content: 'generously [and be blessed]. '
  '7':
  - type: text
    content: 'Let each one give [thoughtfully and with purpose] just as he has decided in his heart, not grudgingly or under compulsion, for God loves a cheerful giver [and delights in the one whose heart is in his gift]. [Prov 22:9] '
  '8':
  - type: text
    content: 'And God is able to make all grace [every favor and earthly blessing] come in abundance to you, so that you may always [under all circumstances, regardless of the need] have complete sufficiency in everything [being completely self-sufficient in Him], and have an abundance for every good work '
  - type: text
    content: and
  - type: text
    content: ' act of charity. '
  '9':
  - type: text
    content: 'As it is written '
  - type: text
    content: and
  - type: text
    content: ' forever remains written,'
  - type: text
    content: “H
  - type: heading
    content: e
  - type: text
    content: ' [the benevolent and generous person] '
  - type: heading
    content: scattered abroad
  - type: text
    content: ', '
  - type: heading
    content: he gave to the poor
  - type: text
    content: ','
  - type: text
    content: H
  - type: heading
    content: is righteousness endures forever
  - type: text
    content: '!” [Ps 112:9]'
