document_id: 2CO.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Gives Most
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it is unnecessary for me to write to you about the offering [that is to be made] for the saints [in Jerusalem]; '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now He who provides seed for the sower and bread for food will provide and multiply your seed for sowing [that is, your resources] and increase the harvest of your righteousness [which shows itself in active goodness, kindness, and love]. [Is 55:10; Hos 10:12] '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'You will be enriched in every way so that you may be generous, and this [generosity, administered] through us is producing thanksgiving to God [from those who benefit]. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For the ministry of this service (offering) is not only supplying the needs of the saints (God’s people), but is also overflowing through many expressions of thanksgiving to God. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Because of this act of ministry, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. believers in Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'they will glorify God for your obedience to the gospel of Christ which you confess, as well as for your generous participation [in this gift] for them and for all [the other believers in need], '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and they also long for you while they pray on your behalf, because of the surpassing measure of God’s grace [His undeserved favor, mercy, and blessing which is revealed] in you. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now thanks be to God for His indescribable gift [which is precious beyond words]!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for I know your eagerness [to promote this cause], and I have [proudly] boasted to the people of Macedonia about it, telling them that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Corinth, the capital city of the Roman province of Achaia, was located in the NW part of the Peloponnesus (southern Greece), about 50 miles from Athens. Paul mentions their positive response to this request in Rom 15:26.
      marker-yv: yv-n
    - type: text
      text: 'Achaia has been prepared since last year [for this contribution], and your enthusiasm has inspired the majority of them [to respond]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Still, I am sending the brothers [on to you], so that our pride in you may not be an empty boast in this case, and so that you may be prepared, just as I told them you would be; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'otherwise, if any Macedonians come with me and find you unprepared, we—to say nothing of yourselves—will be humiliated for being so confident. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why I thought it necessary to urge these brothers to go to you [before I come] and make arrangements in advance for this generous, previously promised gift of yours, so that it would be ready, not as something extorted [or wrung out of you], but as a [voluntary and] generous gift.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now [remember] this: he who sows sparingly will also reap sparingly, and he who sows '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in blessings
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'generously [that blessings may come to others] will also reap '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in blessings
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'generously [and be blessed]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let each one give [thoughtfully and with purpose] just as he has decided in his heart, not grudgingly or under compulsion, for God loves a cheerful giver [and delights in the one whose heart is in his gift]. [Prov 22:9] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God is able to make all grace [every favor and earthly blessing] come in abundance to you, so that you may always [under all circumstances, regardless of the need] have complete sufficiency in everything [being completely self-sufficient in Him], and have an abundance for every good work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' act of charity. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forever remains written,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e
    - type: text
      text: ' [the benevolent and generous person] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: scattered abroad
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he gave to the poor
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is righteousness endures forever
    - type: text
      text: '!” [Ps 112:9]'
