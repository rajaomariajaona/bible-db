verses:
  '1':
  - type: heading
    content: Shishak of Egypt Invades Judah
  - type: text
    content: When the kingdom of Rehoboam was established and strong, he and all Israel with him abandoned the law of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'In their place King Rehoboam made shields of bronze and entrusted them to the care of the officers of the guard who guarded the door of the king’s house. '
  '11':
  - type: text
    content: And whenever the king entered the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', the guards came and carried the shields and '
  - type: text
    content: then
  - type: text
    content: ' brought them back into the guards’ room. '
  '12':
  - type: text
    content: When Rehoboam humbled himself, the wrath of the L
  - type: heading
    content: ord
  - type: text
    content: ' turned away from him, so as not to destroy him completely; and also conditions were good in Judah.'
  '13':
  - type: text
    content: So King Rehoboam established himself in Jerusalem and reigned. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city in which the L
  - type: heading
    content: ord
  - type: text
    content: ' had chosen from all the tribes of Israel to put His Name. And his mother was Naamah the Ammonitess. '
  '14':
  - type: text
    content: 'He did evil because he did not set his heart to seek '
  - type: text
    content: and
  - type: text
    content: ' worship '
  - type: text
    content: and
  - type: text
    content: ' honor the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '15':
  - type: text
    content: 'Now the acts of Rehoboam, from the first to the last, are they not written in the records of Shemaiah the prophet and of Iddo the seer, according to genealogical enrollment? '
  - type: text
    content: There were
  - type: text
    content: ' wars between Rehoboam [of Judah] and Jeroboam [of Israel] continually. '
  '16':
  - type: text
    content: And Rehoboam slept with his fathers [in death] and was buried in the City of David; and Abijah his son became king in his place.
  '2':
  - type: text
    content: And it came about in King Rehoboam’s fifth year, because they had been unfaithful to the L
  - type: heading
    content: ord
  - type: text
    content: ', that '
  - type: note
    content: Shishak established the 22nd dynasty and ruled Egypt from 945-924 b.c. His invasion of the kingdom of Judah is recorded at the temple complex of Karnak (Thebes), near Luxor, Egypt. Shishak was the pharaoh who had given refuge to Jeroboam during the final years of Solomon’s reign.
  - type: text
    content: 'Shishak king of Egypt came up against Jerusalem '
  '3':
  - type: text
    content: 'with 1,200 chariots and 60,000 horsemen. The people who came with him from Egypt were beyond counting—the Lubim, the Sukkiim, and the '
  - type: note
    content: Ancient Ethiopia was south of Egypt and included portions of modern Egypt, Sudan, and Ethiopia.
  - type: text
    content: 'Ethiopians. '
  '4':
  - type: text
    content: 'Shishak took the fortified cities of Judah and came as far as Jerusalem. '
  '5':
  - type: text
    content: Then Shemaiah the prophet came to Rehoboam and the leaders of Judah who had gathered at Jerusalem because of Shishak, and said to them, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': ‘You have abandoned (turned away from) Me, so I have abandoned you into the hands of Shishak.’ ” '
  '6':
  - type: text
    content: Then the leaders of Israel and the king humbled themselves and said, “The L
  - type: heading
    content: ord
  - type: text
    content: ' is righteous.”'
  '7':
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' saw that they humbled themselves, the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' came to Shemaiah, saying, “They have humbled themselves so I will not destroy them, but I will grant them some '
  - type: text
    content: measure
  - type: text
    content: ' of a remnant [that escapes]; and My wrath shall not be poured out on Jerusalem by means of Shishak. '
  '8':
  - type: text
    content: Nevertheless they will become his slaves, so that they may know [the difference between] My service and the service of the kingdoms of the countries.”
  - type: heading
    content: Plunder Impoverishes Judah
  '9':
  - type: text
    content: So Shishak king of Egypt went up against Jerusalem; he took the treasures of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the treasures of the king’s house (palace). He took everything. He even took the shields of gold which Solomon had made. '
