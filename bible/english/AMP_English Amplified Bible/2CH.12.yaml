document_id: 2CH.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shishak of Egypt Invades Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the kingdom of Rehoboam was established and strong, he and all Israel with him abandoned the law of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In their place King Rehoboam made shields of bronze and entrusted them to the care of the officers of the guard who guarded the door of the king’s house. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And whenever the king entered the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the guards came and carried the shields and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' brought them back into the guards’ room. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Rehoboam humbled himself, the wrath of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' turned away from him, so as not to destroy him completely; and also conditions were good in Judah.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So King Rehoboam established himself in Jerusalem and reigned. Rehoboam was forty-one years old when he began to reign, and he reigned seventeen years in Jerusalem, the city in which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had chosen from all the tribes of Israel to put His Name. And his mother was Naamah the Ammonitess. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil because he did not set his heart to seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the acts of Rehoboam, from the first to the last, are they not written in the records of Shemaiah the prophet and of Iddo the seer, according to genealogical enrollment? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: There were
    - type: text
      text: ' wars between Rehoboam [of Judah] and Jeroboam [of Israel] continually. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Rehoboam slept with his fathers [in death] and was buried in the City of David; and Abijah his son became king in his place.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And it came about in King Rehoboam’s fifth year, because they had been unfaithful to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Shishak established the 22nd dynasty and ruled Egypt from 945-924 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . His invasion of the kingdom of Judah is recorded at the temple complex of Karnak (Thebes), near Luxor, Egypt. Shishak was the pharaoh who had given refuge to Jeroboam during the final years of Solomon’s reign.
      marker-yv: yv-n
    - type: text
      text: 'Shishak king of Egypt came up against Jerusalem '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with 1,200 chariots and 60,000 horsemen. The people who came with him from Egypt were beyond counting—the Lubim, the Sukkiim, and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ancient Ethiopia was south of Egypt and included portions of modern Egypt, Sudan, and Ethiopia.
      marker-yv: yv-n
    - type: text
      text: 'Ethiopians. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shishak took the fortified cities of Judah and came as far as Jerusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Shemaiah the prophet came to Rehoboam and the leaders of Judah who had gathered at Jerusalem because of Shishak, and said to them, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': ‘You have abandoned (turned away from) Me, so I have abandoned you into the hands of Shishak.’ ” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the leaders of Israel and the king humbled themselves and said, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is righteous.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' saw that they humbled themselves, the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Shemaiah, saying, “They have humbled themselves so I will not destroy them, but I will grant them some '
    - type: usfm
      marker: it
      children:
      - type: text
        text: measure
    - type: text
      text: ' of a remnant [that escapes]; and My wrath shall not be poured out on Jerusalem by means of Shishak. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nevertheless they will become his slaves, so that they may know [the difference between] My service and the service of the kingdoms of the countries.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Plunder Impoverishes Judah
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Shishak king of Egypt went up against Jerusalem; he took the treasures of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and the treasures of the king’s house (palace). He took everything. He even took the shields of gold which Solomon had made. '
