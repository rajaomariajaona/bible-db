verses:
  '1':
  - type: heading
    content: Psalm 46
  - type: heading
    content: God the Refuge of His People.
  - type: text
    content: 'To the Chief Musician. '
  - type: text
    content: A Psalm
  - type: text
    content: ' of the sons of Korah, set to soprano voices. A Song.'
  - type: text
    content: God is our refuge and strength [mighty and impenetrable],
  - type: text
    content: 'A very present '
  - type: text
    content: and
  - type: text
    content: ' well-proved help in trouble.'
  '10':
  - type: text
    content: “Be still and know (recognize, understand) that I am God.
  - type: text
    content: I will be exalted among the nations! I will be exalted in the earth.”
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is with us;'
  - type: text
    content: 'The God of Jacob is our stronghold [our refuge, our high tower]. '
  - type: text
    content: Selah.
  '2':
  - type: text
    content: Therefore we will not fear, though the earth should change
  - type: text
    content: 'And though the mountains be shaken '
  - type: text
    content: and
  - type: text
    content: ' slip into the heart of the seas,'
  '3':
  - type: text
    content: Though its waters roar and foam,
  - type: text
    content: 'Though the mountains tremble at its roaring. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: ¶There is a river whose streams make glad the city of God,
  - type: text
    content: The holy dwelling places of the Most High.
  '5':
  - type: text
    content: God is in the midst of her [His city], she will not be moved;
  - type: text
    content: God will help her when the morning dawns.
  '6':
  - type: text
    content: 'The nations made an uproar, the kingdoms tottered '
  - type: text
    content: and
  - type: text
    content: ' were moved;'
  - type: text
    content: He raised His voice, the earth melted.
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is with us;'
  - type: text
    content: 'The God of Jacob is our stronghold [our refuge, our high tower]. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: ¶Come, behold the works of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'Who has brought desolations '
  - type: text
    content: and
  - type: text
    content: ' wonders on the earth.'
  '9':
  - type: text
    content: He makes wars to cease to the end of the earth;
  - type: text
    content: He breaks the bow into pieces and snaps the spear in two;
  - type: text
    content: He burns the chariots with fire.
