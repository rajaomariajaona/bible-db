document_id: PSA.46,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 46
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God the Refuge of His People.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of the sons of Korah, set to soprano voices. A Song.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God is our refuge and strength [mighty and impenetrable],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A very present '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well-proved help in trouble.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Be still and know (recognize, understand) that I am God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be exalted among the nations! I will be exalted in the earth.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is with us;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The God of Jacob is our stronghold [our refuge, our high tower]. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Therefore we will not fear, though the earth should change
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And though the mountains be shaken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' slip into the heart of the seas,'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Though its waters roar and foam,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though the mountains tremble at its roaring. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶There is a river whose streams make glad the city of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The holy dwelling places of the Most High.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: God is in the midst of her [His city], she will not be moved;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will help her when the morning dawns.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The nations made an uproar, the kingdoms tottered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were moved;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He raised His voice, the earth melted.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is with us;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The God of Jacob is our stronghold [our refuge, our high tower]. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶Come, behold the works of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who has brought desolations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonders on the earth.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He makes wars to cease to the end of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He breaks the bow into pieces and snaps the spear in two;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He burns the chariots with fire.
