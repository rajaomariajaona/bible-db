document_id: ISA.43,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Redeemed
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: But now, this is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', your Creator says, O Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He who formed you, O Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not fear, for I have redeemed you [from captivity];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have called you by name; you are Mine!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “You are My witnesses,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And My servant whom I have chosen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you may know and believe Me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And understand that I am He.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before Me there was no God formed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there will be none after Me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “I, [only] I, am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no Savior besides Me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “I have declared [the future] and saved [the nation] and proclaimed [that I am God],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there was no strange (alien) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: god
    - type: text
      text: ' among you;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore you are My witnesses [among the pagans],” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “That I am God.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Even from eternity I am He,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no one who can rescue from My hand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I act, and who can revoke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reverse it?”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylon to Be Destroyed
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your Redeemer, the Holy One of Israel says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For your sake I have sent [one] to Babylon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will bring down all of them as fugitives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even the Chaldeans [who reign in Babylon], into the ships '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: of their rejoicing
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: over which they rejoiced.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', your Holy One,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Creator of Israel, your King.”
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who makes a way through the sea
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a path through the mighty waters,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He who brings out the chariot and the horse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The army and the mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: warrior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (They will lie down together, they will not rise again;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have been extinguished, they have been put out like a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lamp’s
    - type: text
      text: ' wick):'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Do not remember the former things,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or ponder the things of the past.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Listen carefully, I am about to do a new thing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now it will spring forth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you not be aware of it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will even put a road in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rivers in the desert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “When you pass through the waters, I will be with you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And through the rivers, they will not overwhelm you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you walk through fire, you will not be scorched,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will the flame burn you.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “The beasts of the field will honor Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jackals and ostriches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I have given waters in the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rivers in the desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To give drink to My people, My chosen. [Is 41:17, 18; 48:21]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “The people whom I formed for Myself
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will make known My praise.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Shortcomings of Israel
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ¶“Yet you have not called on Me [in prayer and worship], O Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you have grown weary of Me, O Israel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“You have not brought Me your sheep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' goats for your burnt offerings,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor honored Me with your sacrifices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not burdened you with offerings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor wearied you with [demands for offerings of] incense.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “You have not bought Me sweet cane with money,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor have you filled Me with the fat of your sacrifices;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you have burdened Me with your sins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have wearied Me with your wickedness.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '¶“I, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' I, am He who wipes out your transgressions for My own sake,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will not remember your sins.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Report to Me
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Remind Me [of your merits with a thorough report], let us plead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' argue our case together;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'State your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: position,
    - type: text
      text: ' that you may be proved right.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Your first father [Jacob] sinned,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your spokesmen [the priests and the prophets—your mediators] have transgressed against Me.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“So I will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: pierce
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: profane the officials of the sanctuary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will consign Jacob to destruction and [I will subject] Israel to defamation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abuse.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “For I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Holy One of Israel, your Savior;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have given Egypt [to the Babylonians] as your ransom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cush (ancient Ethiopia) and Seba [its province] in exchange for you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Because you are precious in My sight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are honored and I love you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' men in return for you and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' peoples in exchange for your life.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Do not fear, for I am with you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring your offspring from the east [where they are scattered],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gather you from the west. [Acts 18:10]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “I will say to the north, ‘Give them up!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the south, ‘Do not hold them back.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring My sons from far way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My daughters from the ends of the earth,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Everyone who is called by My Name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom I have created for My glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom I have formed, even whom I have made.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Is God’s Witness
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶Bring out the people who are blind, even though they have eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the deaf, even though they have ears.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: All the nations have gathered together
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that the peoples may be assembled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who among them (the idolaters) can '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: announce
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: predict this [that Judah would return from captivity]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And proclaim to us the former events?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them provide their witnesses so that they may be justified,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or let them hear and say [in acknowledgement], “It is the truth.” [Ps 123:3, 4]
