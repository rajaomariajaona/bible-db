document_id: EZK.40,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Vision of the Man with a Measuring Rod
  - type: text
    content: In the twenty-fifth year of our exile [in Babylon], in the beginning of the year, on the tenth [day] of the month, in the fourteenth year after the city [of Jerusalem] was taken, on that [very] same day the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' was upon me and He brought me there. '
  '10':
  - type: text
    content: 'There were three guardrooms on each side of the gate toward the east; the three were the same size, and the side pillars on each side measured the same. '
  '11':
  - type: text
    content: 'And he measured the width of the '
  - type: note
    content: Lit entrance of the gate.
  - type: text
    content: 'gateway, ten cubits, and the length of the gate, thirteen cubits. '
  '12':
  - type: text
    content: 'On each side a border (barrier wall) one cubit wide stood in front of the guardrooms on each side; and the guardrooms were six cubits '
  - type: text
    content: square
  - type: text
    content: ' on each side. '
  '13':
  - type: text
    content: 'He measured the gate from the roof of one guardroom to the roof of the other, a width of twenty-five cubits from one door to the opposite door. '
  '14':
  - type: text
    content: 'He made [the measurement of] the side pillars sixty cubits '
  - type: text
    content: high;
  - type: text
    content: ' the gate '
  - type: text
    content: extended
  - type: text
    content: ' all around to the side pillar of the courtyard. '
  '15':
  - type: text
    content: 'From the front of the entrance gate [on the outside] to the front of the inner porch (portico) of the gate [the distance] was fifty cubits. '
  '16':
  - type: text
    content: There were
  - type: text
    content: ' shuttered windows '
  - type: text
    content: looking
  - type: text
    content: ' toward the guardrooms, and toward their side pillars within the gate all around, and likewise for the porches. And windows were all around inside; and palm tree decorations were on each side pillar.'
  '17':
  - type: text
    content: 'Then he brought me into the outer courtyard, and behold, '
  - type: text
    content: there were
  - type: text
    content: ' chambers and a pavement made for the courtyard all around; thirty chambers faced the pavement. '
  '18':
  - type: text
    content: The pavement (
  - type: text
    content: that is,
  - type: text
    content: ' the lower pavement) was by the '
  - type: note
    content: Lit shoulder.
  - type: text
    content: 'side of the gates, corresponding to the length of the gates. '
  '19':
  - type: text
    content: Then he measured the width from the front of the lower gate to the front of the exterior of the inner court, a hundred cubits [both] on the east and on the north.
  '2':
  - type: text
    content: 'In the visions of God He brought me to the land of Israel and set me down on a very high mountain, on the south side of which '
  - type: text
    content: there was
  - type: text
    content: ' what seemed to be a structure of a city. '
  '20':
  - type: text
    content: 'And as for the gate of the outer courtyard which faced the north he measured [both] its length and its width. '
  '21':
  - type: text
    content: 'Its guardrooms, three on each side, and its side pillars and its porches had the same measurement as the first gate. Its length was fifty cubits and the width was twenty-five cubits. '
  '22':
  - type: text
    content: 'Its windows and its porches and its palm tree decorations had the same measurements as the gate that faced toward the east. It was reached by going up seven steps, and its porch was in front of them. '
  '23':
  - type: text
    content: 'The inner courtyard had a gate opposite the gate on the north as well as '
  - type: text
    content: the gate
  - type: text
    content: ' on the east; and he measured a hundred cubits from gate to gate.'
  '24':
  - type: text
    content: 'Then he led me toward the south, and behold, there was a gate toward the south; and he measured its side pillars and its porches, '
  - type: note
    content: Lit according to these measurements.
  - type: text
    content: 'and they measured the same as the others. '
  '25':
  - type: text
    content: 'The gate and its porches had windows all around like those windows [in the other gateways]; the length was fifty cubits and the width was twenty-five cubits. '
  '26':
  - type: text
    content: There were
  - type: text
    content: ' seven steps going up to the gate, and its porches were in front of them; and it had palm tree decorations [carved] on its side pillars, one on each side. '
  '27':
  - type: text
    content: The inner courtyard had a gate toward the south; and he measured from gate to gate toward the south, a hundred cubits.
  '28':
  - type: text
    content: 'Then the man (angel) brought me to the inner courtyard by the south gate; and he measured the south gate according to those same measurements. '
  '29':
  - type: text
    content: 'Its guardrooms also, its side pillars and its porches '
  - type: note
    content: Lit were according to these measurements, and so throughout.
  - type: text
    content: 'measured the same as the others. And the gate and its porches had windows all around; the length was fifty cubits and the width was twenty-five cubits. '
  '3':
  - type: text
    content: 'So He brought me there; and behold, there was a man [an angel] whose appearance was like bronze, with a line of flax and a measuring '
  - type: note
    content: Lit reed, and so throughout the chapter.
  - type: text
    content: 'rod in his hand; and he was standing in the gateway. '
  '30':
  - type: text
    content: There were
  - type: text
    content: ' porches all around, twenty-five cubits long and five cubits wide. '
  '31':
  - type: text
    content: Its porches faced the outer courtyard; and palm tree decorations were [carved] on its side pillars, and its stairway had eight steps.
  '32':
  - type: text
    content: 'He brought me into the inner courtyard toward the east, and he measured the gate; it measured the same as the others. '
  '33':
  - type: text
    content: 'Its guardrooms also, its side pillars and its porches measured the same as the others. The gate and its porches had windows all around; it was fifty cubits long and twenty-five cubits wide. '
  '34':
  - type: text
    content: Its porches faced the outer courtyard; and palm tree decorations were [carved] on either side of its side pillars, and its stairway had eight steps.
  '35':
  - type: text
    content: 'Then he brought me to the north gate and he measured it; the measurements were the same as those of the other gates, '
  '36':
  - type: text
    content: 'with its guardrooms, its side pillars, its porches; and the gate had windows all around. The length was fifty cubits and the width was twenty-five cubits. '
  '37':
  - type: text
    content: Its side pillars faced the outer courtyard, and palm tree decorations were [carved] on them on either side. And its stairway had eight steps.
  '38':
  - type: text
    content: 'A chamber with its doorway was by the side pillars of the gates; there the burnt offering was to be washed. '
  '39':
  - type: text
    content: 'In the porch (portico) of the gate were two tables on each side, on which to slaughter the burnt offering, the sin offering and the guilt offering. '
  '4':
  - type: text
    content: The man said to me, “Son of man, look with your eyes and hear with your ears and set your heart on all that I am going to show you; for you have been brought here that I may show it to you. Declare to the house of Israel all that you see.”
  - type: heading
    content: Measurements Relating to the Temple
  '40':
  - type: text
    content: 'On the outer '
  - type: note
    content: Lit shoulder.
  - type: text
    content: 'side, as one went up to the '
  - type: note
    content: Lit the entrance of the gate.
  - type: text
    content: 'gateway toward the north, were two tables; and on the other '
  - type: note
    content: Lit shoulder.
  - type: text
    content: 'side of the porch of the gate were two tables. '
  '41':
  - type: text
    content: 'Four tables were on each '
  - type: note
    content: Lit shoulder.
  - type: text
    content: 'side next to the gate; [a total of] eight tables on which they slaughter '
  - type: text
    content: sacrifices
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Moreover, '
  - type: text
    content: there were
  - type: text
    content: ' four tables of hewn stone (ashlar) for the burnt offering, a cubit and a half long, a cubit and a half wide, and one cubit high, on which they lay the instruments with which they slaughter the burnt offering and the sacrifice. '
  '43':
  - type: text
    content: 'The double hooks, one hand width in length were installed in the '
  - type: note
    content: Possibly the kitchen area.
  - type: text
    content: house all around. The meat of the offering was [to be placed] on the tables.
  '44':
  - type: text
    content: 'From the outside to the inner gate were chambers for the singers in the inner courtyard, '
  - type: text
    content: one of
  - type: text
    content: ' which was '
  - type: note
    content: Lit at the shoulder of.
  - type: text
    content: 'beside the north gate, with its front toward the south, and one '
  - type: note
    content: Lit at the shoulder of.
  - type: text
    content: 'beside the '
  - type: note
    content: So Greek; Hebrew reads east.
  - type: text
    content: 'south gate facing toward the north. '
  '45':
  - type: text
    content: 'He [who was guiding me] said to me, “This is the chamber which faces toward the south; it is for the priests who have the responsibility '
  - type: text
    content: and
  - type: text
    content: ' take care of the temple; '
  '46':
  - type: text
    content: 'but the chamber which faces toward the north is for the priests who have the responsibility '
  - type: text
    content: and
  - type: text
    content: ' take care of the altar. These are the sons of Zadok, who [alone] from the sons of Levi come near to the L'
  - type: heading
    content: ord
  - type: text
    content: ' to minister to Him.” '
  '47':
  - type: text
    content: 'He measured the courtyard, a hundred cubits long and a hundred cubits wide, a '
  - type: text
    content: perfect
  - type: text
    content: ' square; and the altar was in front of the temple.'
  '48':
  - type: text
    content: 'Then he brought me to the porch of the temple, and he measured each side pillar of the porch, five cubits on each side; and the width of the gate was three cubits on each side. '
  '49':
  - type: text
    content: The length of the porch was twenty cubits and the width eleven cubits; and at the stairway by which it was ascended, there were [two] columns beside the side pillars, one on each side [of the entrance].
  '5':
  - type: text
    content: And behold, there was a wall all around the outside [area] of the temple (house) [of the L
  - type: heading
    content: ord
  - type: text
    content: '], and in the man’s hand a measuring rod six cubits long (10.2 ft.), '
  - type: note
    content: Lit by a cubit and a handbreadth.
  - type: text
    content: 'each '
  - type: note
    content: 20.4 inches in length or longer.
  - type: text
    content: 'cubit being longer than the '
  - type: note
    content: The “standard” Hebrew cubit was about 18 inches in length.
  - type: text
    content: 'standard one by a hand width. So he measured the thickness of the wall, one rod; and the height, one rod. '
  '6':
  - type: text
    content: 'Then he went to the gate which faced the east and went up its [seven] steps and measured the threshold of the gate, one rod in width; and the other threshold [of the gate inside the thick wall] was one rod in width. '
  '7':
  - type: text
    content: 'The guardroom was one rod long and one rod wide, and [the space] between the guardrooms was five cubits. And the threshold of the gate by the porch (portico) of the gate facing inward was one rod. '
  '8':
  - type: text
    content: He also measured the porch of the gate facing inward [toward the temple of the L
  - type: heading
    content: ord
  - type: text
    content: '], one rod. '
  '9':
  - type: text
    content: Then he measured the porch of the gate, eight cubits, and its side pillars, two cubits. The porch of the gate faced inward [toward the temple of the L
  - type: heading
    content: ord
  - type: text
    content: ']. '
