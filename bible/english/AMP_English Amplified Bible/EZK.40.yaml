document_id: EZK.40,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vision of the Man with a Measuring Rod
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the twenty-fifth year of our exile [in Babylon], in the beginning of the year, on the tenth [day] of the month, in the fourteenth year after the city [of Jerusalem] was taken, on that [very] same day the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was upon me and He brought me there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'There were three guardrooms on each side of the gate toward the east; the three were the same size, and the side pillars on each side measured the same. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he measured the width of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: entrance of the gate
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'gateway, ten cubits, and the length of the gate, thirteen cubits. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On each side a border (barrier wall) one cubit wide stood in front of the guardrooms on each side; and the guardrooms were six cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: square
    - type: text
      text: ' on each side. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He measured the gate from the roof of one guardroom to the roof of the other, a width of twenty-five cubits from one door to the opposite door. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He made [the measurement of] the side pillars sixty cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: high;
    - type: text
      text: ' the gate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: extended
    - type: text
      text: ' all around to the side pillar of the courtyard. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'From the front of the entrance gate [on the outside] to the front of the inner porch (portico) of the gate [the distance] was fifty cubits. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: it
      children:
      - type: text
        text: There were
    - type: text
      text: ' shuttered windows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: looking
    - type: text
      text: ' toward the guardrooms, and toward their side pillars within the gate all around, and likewise for the porches. And windows were all around inside; and palm tree decorations were on each side pillar.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then he brought me into the outer courtyard, and behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there were
    - type: text
      text: ' chambers and a pavement made for the courtyard all around; thirty chambers faced the pavement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The pavement (
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' the lower pavement) was by the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shoulder
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'side of the gates, corresponding to the length of the gates. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then he measured the width from the front of the lower gate to the front of the exterior of the inner court, a hundred cubits [both] on the east and on the north.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In the visions of God He brought me to the land of Israel and set me down on a very high mountain, on the south side of which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' what seemed to be a structure of a city. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And as for the gate of the outer courtyard which faced the north he measured [both] its length and its width. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Its guardrooms, three on each side, and its side pillars and its porches had the same measurement as the first gate. Its length was fifty cubits and the width was twenty-five cubits. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Its windows and its porches and its palm tree decorations had the same measurements as the gate that faced toward the east. It was reached by going up seven steps, and its porch was in front of them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The inner courtyard had a gate opposite the gate on the north as well as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the gate
    - type: text
      text: ' on the east; and he measured a hundred cubits from gate to gate.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then he led me toward the south, and behold, there was a gate toward the south; and he measured its side pillars and its porches, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: according to these measurements
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and they measured the same as the others. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The gate and its porches had windows all around like those windows [in the other gateways]; the length was fifty cubits and the width was twenty-five cubits. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: it
      children:
      - type: text
        text: There were
    - type: text
      text: ' seven steps going up to the gate, and its porches were in front of them; and it had palm tree decorations [carved] on its side pillars, one on each side. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The inner courtyard had a gate toward the south; and he measured from gate to gate toward the south, a hundred cubits.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then the man (angel) brought me to the inner courtyard by the south gate; and he measured the south gate according to those same measurements. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Its guardrooms also, its side pillars and its porches '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: were according to these measurements,
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'measured the same as the others. And the gate and its porches had windows all around; the length was fifty cubits and the width was twenty-five cubits. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So He brought me there; and behold, there was a man [an angel] whose appearance was like bronze, with a line of flax and a measuring '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: reed
        - type: text
          text: ', and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: 'rod in his hand; and he was standing in the gateway. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: it
      children:
      - type: text
        text: There were
    - type: text
      text: ' porches all around, twenty-five cubits long and five cubits wide. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Its porches faced the outer courtyard; and palm tree decorations were [carved] on its side pillars, and its stairway had eight steps.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'He brought me into the inner courtyard toward the east, and he measured the gate; it measured the same as the others. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Its guardrooms also, its side pillars and its porches measured the same as the others. The gate and its porches had windows all around; it was fifty cubits long and twenty-five cubits wide. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Its porches faced the outer courtyard; and palm tree decorations were [carved] on either side of its side pillars, and its stairway had eight steps.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then he brought me to the north gate and he measured it; the measurements were the same as those of the other gates, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'with its guardrooms, its side pillars, its porches; and the gate had windows all around. The length was fifty cubits and the width was twenty-five cubits. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Its side pillars faced the outer courtyard, and palm tree decorations were [carved] on them on either side. And its stairway had eight steps.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'A chamber with its doorway was by the side pillars of the gates; there the burnt offering was to be washed. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'In the porch (portico) of the gate were two tables on each side, on which to slaughter the burnt offering, the sin offering and the guilt offering. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The man said to me, “Son of man, look with your eyes and hear with your ears and set your heart on all that I am going to show you; for you have been brought here that I may show it to you. Declare to the house of Israel all that you see.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Measurements Relating to the Temple
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'On the outer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shoulder
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'side, as one went up to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the entrance of the gate
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'gateway toward the north, were two tables; and on the other '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shoulder
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'side of the porch of the gate were two tables. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Four tables were on each '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: shoulder
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'side next to the gate; [a total of] eight tables on which they slaughter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacrifices
    - type: text
      text: '. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Moreover, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there were
    - type: text
      text: ' four tables of hewn stone (ashlar) for the burnt offering, a cubit and a half long, a cubit and a half wide, and one cubit high, on which they lay the instruments with which they slaughter the burnt offering and the sacrifice. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'The double hooks, one hand width in length were installed in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly the kitchen area.
      marker-yv: yv-n
    - type: text
      text: house all around. The meat of the offering was [to be placed] on the tables.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'From the outside to the inner gate were chambers for the singers in the inner courtyard, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one of
    - type: text
      text: ' which was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: at the shoulder of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'beside the north gate, with its front toward the south, and one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: at the shoulder of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'beside the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So Greek; Hebrew reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: east
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'south gate facing toward the north. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'He [who was guiding me] said to me, “This is the chamber which faces toward the south; it is for the priests who have the responsibility '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take care of the temple; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'but the chamber which faces toward the north is for the priests who have the responsibility '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take care of the altar. These are the sons of Zadok, who [alone] from the sons of Levi come near to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to minister to Him.” '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'He measured the courtyard, a hundred cubits long and a hundred cubits wide, a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: perfect
    - type: text
      text: ' square; and the altar was in front of the temple.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Then he brought me to the porch of the temple, and he measured each side pillar of the porch, five cubits on each side; and the width of the gate was three cubits on each side. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: The length of the porch was twenty cubits and the width eleven cubits; and at the stairway by which it was ascended, there were [two] columns beside the side pillars, one on each side [of the entrance].
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And behold, there was a wall all around the outside [area] of the temple (house) [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '], and in the man’s hand a measuring rod six cubits long (10.2 ft.), '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:5 '
      - type: usfm
        marker: ft
