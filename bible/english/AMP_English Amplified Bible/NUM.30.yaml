document_id: NUM.30,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law of Vows
  - type: text
    content: Then Moses spoke to the leaders of the tribes of the Israelites, saying, “This is the thing which the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded: '
  '10':
  - type: text
    content: 'However, if she vowed in her husband’s house or bound herself by a pledge with an oath, '
  '11':
  - type: text
    content: 'and her husband heard it, but said nothing to her and did not disapprove of her [making the vow], then all her vows and every pledge by which she bound herself shall stand. '
  '12':
  - type: text
    content: But if her husband absolutely annuls them on the day he heard them, then whatever proceeds from her lips concerning her vows or concerning her pledge shall not stand. Her husband has annulled them, and the L
  - type: heading
    content: ord
  - type: text
    content: ' will forgive her.'
  '13':
  - type: text
    content: '“Every vow and every binding oath to humble herself, her husband may confirm it or her husband may annul it. '
  '14':
  - type: text
    content: 'But if her husband says nothing to her [concerning the matter] from day to day, then he confirms all her vows or all her pledges which are on her. He has confirmed them because he said nothing to her on the day he heard them. '
  '15':
  - type: text
    content: 'But if he indeed nullifies them after he hears of them, then he shall be responsible for '
  - type: text
    content: and
  - type: text
    content: ' bear her guilt [for breaking her promise].”'
  '16':
  - type: text
    content: These are the statutes which the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses, between a man and his wife, and between a father and his daughter while she is a youth in her father’s house.'
  '2':
  - type: text
    content: If a man makes a vow to the L
  - type: heading
    content: ord
  - type: text
    content: ' or swears an oath to bind himself with a pledge [of abstinence], he shall not break (violate, profane) his word; he shall do according to all that proceeds out of his mouth.'
  '3':
  - type: text
    content: “Also if a woman makes a vow to the L
  - type: heading
    content: ord
  - type: text
    content: ' and binds herself by a pledge [of abstinence], while '
  - type: text
    content: living
  - type: text
    content: ' in her father’s house in her youth, '
  '4':
  - type: text
    content: 'and her father hears her vow and her pledge by which she has bound herself, and he offers no objection, then all her vows shall stand and every pledge by which she has bound herself shall stand. '
  '5':
  - type: text
    content: But if her father disapproves of her [making her vow] on the day that he hears about it, none of her vows or her pledges by which she has bound herself shall stand; and the L
  - type: heading
    content: ord
  - type: text
    content: ' will forgive her because her father has disapproved of her [making the vow].'
  '6':
  - type: text
    content: '“But if she marries while under her vows or if she has bound herself by a rash statement, '
  '7':
  - type: text
    content: 'and her husband hears of it and says nothing about it on the day he hears it, then her vows shall stand and her pledge by which she bound herself shall stand. '
  '8':
  - type: text
    content: But if her husband disapproves of her [making her vow or pledge] on the day that he hears of it, then he shall annul her vow which she is under and the rash statement of her lips by which she bound herself; and the L
  - type: heading
    content: ord
  - type: text
    content: ' will forgive her.'
  '9':
  - type: text
    content: '“But the vow of a widow or of a divorced woman, everything by which she has bound herself, shall stand against her. '
