document_id: NUM.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Law of Vows
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Moses spoke to the leaders of the tribes of the Israelites, saying, “This is the thing which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has commanded: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If a man makes a vow to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' or swears an oath to bind himself with a pledge [of abstinence], he shall not break (violate, profane) his word; he shall do according to all that proceeds out of his mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Also if a woman makes a vow to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and binds herself by a pledge [of abstinence], while '
  - type: usfm
    marker: it
    children:
    - type: text
      text: living
  - type: text
    text: ' in her father’s house in her youth, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and her father hears her vow and her pledge by which she has bound herself, and he offers no objection, then all her vows shall stand and every pledge by which she has bound herself shall stand. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But if her father disapproves of her [making her vow] on the day that he hears about it, none of her vows or her pledges by which she has bound herself shall stand; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will forgive her because her father has disapproved of her [making the vow].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“But if she marries while under her vows or if she has bound herself by a rash statement, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and her husband hears of it and says nothing about it on the day he hears it, then her vows shall stand and her pledge by which she bound herself shall stand. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But if her husband disapproves of her [making her vow or pledge] on the day that he hears of it, then he shall annul her vow which she is under and the rash statement of her lips by which she bound herself; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will forgive her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“But the vow of a widow or of a divorced woman, everything by which she has bound herself, shall stand against her. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'However, if she vowed in her husband’s house or bound herself by a pledge with an oath, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and her husband heard it, but said nothing to her and did not disapprove of her [making the vow], then all her vows and every pledge by which she bound herself shall stand. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But if her husband absolutely annuls them on the day he heard them, then whatever proceeds from her lips concerning her vows or concerning her pledge shall not stand. Her husband has annulled them, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will forgive her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Every vow and every binding oath to humble herself, her husband may confirm it or her husband may annul it. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But if her husband says nothing to her [concerning the matter] from day to day, then he confirms all her vows or all her pledges which are on her. He has confirmed them because he said nothing to her on the day he heard them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if he indeed nullifies them after he hears of them, then he shall be responsible for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bear her guilt [for breaking her promise].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: These are the statutes which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses, between a man and his wife, and between a father and his daughter while she is a youth in her father’s house.'
