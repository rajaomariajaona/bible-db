document_id: PSA.109,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 109
  - type: heading
    content: Vengeance Invoked upon Adversaries.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: O God of my praise!
  - type: text
    content: Do not keep silent,
  '10':
  - type: text
    content: Let his children wander and beg;
  - type: text
    content: 'Let them seek their food '
  - type: text
    content: and
  - type: text
    content: ' be driven far from their ruined homes. [Gen 4:12]'
  '11':
  - type: text
    content: Let the creditor seize all that he has,
  - type: text
    content: And let strangers plunder the product of his labor.
  '12':
  - type: text
    content: Let there be no one to extend kindness to him,
  - type: text
    content: Nor let anyone be gracious to his fatherless children.
  '13':
  - type: text
    content: Let his descendants be cut off,
  - type: text
    content: And in the following generation let their name be blotted out.
  '14':
  - type: text
    content: ¶Let the wickedness of his fathers be remembered by the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: And do not let the sin of his mother be blotted out.
  '15':
  - type: text
    content: Let them be before the L
  - type: heading
    content: ord
  - type: text
    content: ' continually,'
  - type: text
    content: That He may cut off their memory from the earth;
  '16':
  - type: text
    content: Because the man did not remember to show kindness,
  - type: text
    content: But persecuted the suffering and needy man,
  - type: text
    content: And the brokenhearted, to put them to death.
  '17':
  - type: text
    content: He also loved cursing, and it came [back] to him;
  - type: text
    content: He did not delight in blessing, so it was far from him.
  '18':
  - type: text
    content: He clothed himself with cursing as with his garment,
  - type: text
    content: And it seeped into his inner self like water
  - type: text
    content: And like [anointing] oil into his bones.
  '19':
  - type: text
    content: Let it be to him as a robe with which he covers himself,
  - type: text
    content: And as a sash with which he is constantly bound.
  '2':
  - type: text
    content: For the mouth of the wicked and the mouth of the deceitful are opened against me;
  - type: text
    content: They have spoken against me with a lying tongue.
  '20':
  - type: text
    content: Let this be the reward of my attackers from the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And of those who speak evil against my life.
  '21':
  - type: text
    content: ¶But You, O G
  - type: heading
    content: od
  - type: text
    content: ', the Lord, show '
  - type: text
    content: kindness
  - type: text
    content: ' to me, for Your name’s sake;'
  - type: text
    content: Because Your lovingkindness (faithfulness, compassion) is good, O rescue me;
  '22':
  - type: text
    content: For I am suffering and needy,
  - type: text
    content: And my heart is wounded within me.
  '23':
  - type: text
    content: 'I am vanishing like a shadow when it lengthens '
  - type: text
    content: and
  - type: text
    content: ' fades;'
  - type: text
    content: I am shaken off like the locust.
  '24':
  - type: text
    content: My knees are unsteady from fasting;
  - type: text
    content: And my flesh is gaunt and without fatness.
  '25':
  - type: text
    content: 'I also have become a reproach '
  - type: text
    content: and
  - type: text
    content: ' an object of taunting to others;'
  - type: text
    content: When they see me, they shake their heads [in derision]. [Matt 27:39]
  '26':
  - type: text
    content: ¶Help me, O L
  - type: heading
    content: ord
  - type: text
    content: ' my God;'
  - type: text
    content: Save me according to Your lovingkindness—
  '27':
  - type: text
    content: And let them know that this is Your hand;
  - type: text
    content: You, L
  - type: heading
    content: ord
  - type: text
    content: ', have done it.'
  '28':
  - type: text
    content: Let them curse, but You bless.
  - type: text
    content: When adversaries arise, let them be ashamed,
  - type: text
    content: But let Your servant rejoice.
  '29':
  - type: text
    content: Let my attackers be clothed with dishonor,
  - type: text
    content: And let them cover themselves with their own shame as with a robe.
  '3':
  - type: text
    content: They have also surrounded me with words of hatred,
  - type: text
    content: And have fought against me without a cause.
  '30':
  - type: text
    content: '¶I will give great praise '
  - type: text
    content: and
  - type: text
    content: ' thanks to the L'
  - type: heading
    content: ord
  - type: text
    content: ' with my mouth;'
  - type: text
    content: And in the midst of many I will praise Him.
  '31':
  - type: text
    content: For He will stand at the right hand of the needy,
  - type: text
    content: To save him from those who judge his soul.
  '4':
  - type: text
    content: In return for my love, they attack me,
  - type: text
    content: But I am in prayer.
  '5':
  - type: text
    content: They have repaid me evil for good,
  - type: text
    content: And hatred for my love.
  '6':
  - type: text
    content: ¶Appoint a wicked man against him,
  - type: text
    content: And let an attacker stand at his right hand [to kill him].
  '7':
  - type: text
    content: When he enters into dispute, let wickedness come about.
  - type: text
    content: Let his prayer [for help] result [only] in sin.
  '8':
  - type: text
    content: Let his days be few;
  - type: text
    content: And let another take his office. [Acts 1:20]
  '9':
  - type: text
    content: Let his children be fatherless
  - type: text
    content: And his wife a widow.
