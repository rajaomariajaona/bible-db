document_id: PSA.109
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 109
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vengeance Invoked upon Adversaries.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God of my praise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not keep silent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For the mouth of the wicked and the mouth of the deceitful are opened against me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have spoken against me with a lying tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They have also surrounded me with words of hatred,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have fought against me without a cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In return for my love, they attack me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I am in prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They have repaid me evil for good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hatred for my love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶Appoint a wicked man against him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let an attacker stand at his right hand [to kill him].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When he enters into dispute, let wickedness come about.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let his prayer [for help] result [only] in sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let his days be few;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let another take his office. [Acts 1:20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Let his children be fatherless
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his wife a widow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let his children wander and beg;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let them seek their food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be driven far from their ruined homes. [Gen 4:12]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let the creditor seize all that he has,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let strangers plunder the product of his labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let there be no one to extend kindness to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor let anyone be gracious to his fatherless children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Let his descendants be cut off,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the following generation let their name be blotted out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶Let the wickedness of his fathers be remembered by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not let the sin of his mother be blotted out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let them be before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' continually,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He may cut off their memory from the earth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Because the man did not remember to show kindness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But persecuted the suffering and needy man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the brokenhearted, to put them to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He also loved cursing, and it came [back] to him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He did not delight in blessing, so it was far from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He clothed himself with cursing as with his garment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it seeped into his inner self like water
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like [anointing] oil into his bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Let it be to him as a robe with which he covers himself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as a sash with which he is constantly bound.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Let this be the reward of my attackers from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of those who speak evil against my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ¶But You, O G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', the Lord, show '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kindness
  - type: text
    text: ' to me, for Your name’s sake;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because Your lovingkindness (faithfulness, compassion) is good, O rescue me;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For I am suffering and needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my heart is wounded within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I am vanishing like a shadow when it lengthens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fades;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am shaken off like the locust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: My knees are unsteady from fasting;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my flesh is gaunt and without fatness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I also have become a reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an object of taunting to others;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they see me, they shake their heads [in derision]. [Matt 27:39]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶Help me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me according to Your lovingkindness—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And let them know that this is Your hand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You, L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', have done it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Let them curse, but You bless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When adversaries arise, let them be ashamed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But let Your servant rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Let my attackers be clothed with dishonor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let them cover themselves with their own shame as with a robe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '¶I will give great praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanks to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with my mouth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the midst of many I will praise Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For He will stand at the right hand of the needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To save him from those who judge his soul.
