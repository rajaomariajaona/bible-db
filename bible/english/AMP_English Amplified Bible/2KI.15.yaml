document_id: 2KI.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Series of Kings: Azariah (Uzziah) over Judah'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the twenty-seventh year of Jeroboam [II] king of Israel, Azariah (Uzziah) the son of Amaziah king of Judah became king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Shallum the son of Jabesh conspired against Zechariah and struck and killed him in the presence of the people and reigned in his place. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Zechariah, behold, they are written in the Book of the Chronicles of the Kings of Israel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is [the fulfillment of] the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He spoke to Jehu, saying, “Your sons (descendants) shall sit on the throne of Israel to the fourth generation.” And so it came to pass. [2 Kin 10:30]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum the son of Jabesh became king in the thirty-ninth year of Uzziah (Azariah) king of Judah, and he reigned one month in Samaria. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Menahem the son of Gadi went up from Tirzah and came to Samaria, and struck and killed Shallum the son of Jabesh in Samaria and became king in his place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of Shallum’s acts, and his conspiracy which he made, they are written in the Book of the Chronicles of the Kings of Israel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Menahem struck [the town of] Tiphsah and all who were in it and its borders from Tirzah; [he attacked it] because they did not surrender '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to him;
    - type: text
      text: ' so he struck it and ripped up all '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This type of barbarous act was more common among the pagan rulers than the Hebrews. See 8:12.
      marker-yv: yv-n
    - type: text
      text: the women there who were pregnant.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Menahem over Israel
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the thirty-ninth year of Azariah king of Judah, Menahem the son of Gadi became king over Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and reigned
    - type: text
      text: ' ten years in Samaria. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; for all his days he did not turn from the sins of Jeroboam the son of Nebat, who caused Israel to sin.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pul, [Tiglath-pileser III] king of Assyria, came against the land [of Israel], and Menahem gave Pul a thousand talents of silver [as a bribe], so that he might help him to strengthen his control of the kingdom. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was sixteen years old when he became king, and he reigned fifty-two years in Jerusalem. His mother’s name was Jecoliah of Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Menahem exacted the money from Israel, from all the wealthy, influential men, fifty shekels of silver from each man to give to the king of Assyria. So the king of Assyria turned back and did not stay there in the land. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of Menahem’s acts, and everything that he did, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Menahem slept with his fathers [in death]; his son Pekahiah became king in his place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pekahiah over Israel
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fiftieth year of Azariah king of Judah, Pekahiah the son of Menahem became king over Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and reigned
    - type: text
      text: ' two years in Samaria. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; he did not turn from the [idolatrous] sins of Jeroboam [I] the son of Nebat, who made Israel sin. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Pekah the son of Remaliah, his officer, conspired against Pekahiah and struck him in Samaria, in the citadel of the king’s house, with Argob and Arieh; and with Pekah were fifty Gileadites. So he killed Pekahiah and became king in his place. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of the acts of Pekahiah, all that he did, they are written in the Book of the Chronicles of the Kings of Israel.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pekah over Israel
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fifty-second year of Azariah king of Judah, Pekah the son of Remaliah became king over Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and reigned
    - type: text
      text: ' twenty years in Samaria. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; he did not turn from the [idolatrous] sins of Jeroboam [I] the son of Nebat, who made Israel sin.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the days of Pekah king of Israel, Tiglath-pileser king of Assyria came and took Ijon, Abel-beth-maacah, Janoah, Kedesh, Hazor, Gilead, and Galilee, all the land of [the tribe of] Naphtali, and he carried the people captive to Assyria. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with all that his father Amaziah had done. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoshea the son of Elah conspired against Pekah the son of Remaliah [of Israel]; he struck and killed him, and became king in his place in the twentieth year of Jotham the son of Uzziah [king of Judah]. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of Pekah’s acts, and everything that he did, they are written in the Book of the Chronicles of Israel’s Kings.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jotham over Judah
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the second year of Pekah the son of Remaliah king of Israel, Jotham the son of Uzziah king of Judah became king. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he was twenty-five years old, he became king [over Judah], and he reigned sixteen years in Jerusalem. His mother’s name was Jerusha daughter of Zadok. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did what was right in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with everything that his father Uzziah had done. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Only [the altars on] the high places were not removed; the people still sacrificed and burned incense on the high places [rather than in the temple]. He built the upper gate of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the acts of Jotham, and all that he did, are they not written in the Book of the Chronicles of Judah’s Kings? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In those days the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' began sending Rezin the king of Aram (Syria) and [Israel’s king] Pekah the son of Remaliah against Judah. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jotham slept with his fathers [in death], and was buried with them in the City of David his father (ancestor). Ahaz his son became king in his place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only [the altars on] the high places were not removed; the people still sacrificed and burned incense on the high places [instead of worshiping God at the temple]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' struck (afflicted) the king, and he was a leper until the day of his death, and lived in a separate house. Jotham the king’s son was in charge of the household, judging the people of the land. [2 Chr 26:16-21] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of Azariah’s acts, and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Azariah slept with his fathers [in death], and they buried him with his fathers in the City of David. His son Jotham became king in his place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zechariah over Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the thirty-eighth year of Azariah king of Judah, Zechariah the son of Jeroboam [II] became king over Israel in Samaria for six months. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', just as his fathers had done; he did not turn from the sins of Jeroboam [I] the son of Nebat, who made Israel sin. '
