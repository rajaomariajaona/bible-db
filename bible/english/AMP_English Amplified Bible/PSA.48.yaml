document_id: PSA.48,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 48
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Beauty and Glory of Zion.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song; a Psalm of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Great is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and greatly to be praised,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the city of our God, His holy mountain.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As is Your name, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is Your praise to the ends of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your right hand is full of righteousness (rightness, justice).
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Mount Zion be glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the daughters of Judah rejoice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of Your [righteous] judgments.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Walk about Zion, go all around her;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Count her towers,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consider her ramparts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go through her palaces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you may tell the next generation [about her glory].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For this is God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our God forever and ever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be our guide even until death.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fair '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beautiful in elevation, the joy of all the earth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is Mount Zion [the City of David] in the far north,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city of the great King. [Matt 5:35]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, in her palaces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has made Himself known as a stronghold.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶For, lo, the kings assembled themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They [came and] passed by together.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They saw it, then they were amazed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were stricken with terror, they fled in alarm.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Panic seized them there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And pain, as that of a woman in childbirth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the east wind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shattered the ships of Tarshish.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As we have heard, so have we seen
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the city of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, in the city of our God:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God will establish her forever. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶We have thought of Your lovingkindness, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the midst of Your temple.
