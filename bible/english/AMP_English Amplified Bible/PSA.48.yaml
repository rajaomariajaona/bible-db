document_id: PSA.48,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 48
  - type: heading
    content: The Beauty and Glory of Zion.
  - type: text
    content: A Song; a Psalm of the sons of Korah.
  - type: text
    content: Great is the L
  - type: heading
    content: ord
  - type: text
    content: ', and greatly to be praised,'
  - type: text
    content: In the city of our God, His holy mountain.
  '10':
  - type: text
    content: As is Your name, O God,
  - type: text
    content: So is Your praise to the ends of the earth;
  - type: text
    content: Your right hand is full of righteousness (rightness, justice).
  '11':
  - type: text
    content: Let Mount Zion be glad,
  - type: text
    content: Let the daughters of Judah rejoice
  - type: text
    content: Because of Your [righteous] judgments.
  '12':
  - type: text
    content: Walk about Zion, go all around her;
  - type: text
    content: Count her towers,
  '13':
  - type: text
    content: Consider her ramparts,
  - type: text
    content: Go through her palaces,
  - type: text
    content: That you may tell the next generation [about her glory].
  '14':
  - type: text
    content: For this is God,
  - type: text
    content: Our God forever and ever;
  - type: text
    content: He will be our guide even until death.
  '2':
  - type: text
    content: 'Fair '
  - type: text
    content: and
  - type: text
    content: ' beautiful in elevation, the joy of all the earth,'
  - type: text
    content: Is Mount Zion [the City of David] in the far north,
  - type: text
    content: The city of the great King. [Matt 5:35]
  '3':
  - type: text
    content: God, in her palaces,
  - type: text
    content: Has made Himself known as a stronghold.
  '4':
  - type: text
    content: ¶For, lo, the kings assembled themselves,
  - type: text
    content: They [came and] passed by together.
  '5':
  - type: text
    content: They saw it, then they were amazed;
  - type: text
    content: They were stricken with terror, they fled in alarm.
  '6':
  - type: text
    content: Panic seized them there,
  - type: text
    content: And pain, as that of a woman in childbirth.
  '7':
  - type: text
    content: With the east wind
  - type: text
    content: You shattered the ships of Tarshish.
  '8':
  - type: text
    content: As we have heard, so have we seen
  - type: text
    content: In the city of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, in the city of our God:'
  - type: text
    content: 'God will establish her forever. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: ¶We have thought of Your lovingkindness, O God,
  - type: text
    content: In the midst of Your temple.
