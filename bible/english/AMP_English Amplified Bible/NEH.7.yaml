document_id: NEH.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Census of First Returned Exiles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the wall had been rebuilt and I had set up the doors, and the gatekeepers, singers, and Levites had been appointed, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Arah, 652; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Pahath-moab of the sons of Jeshua and Joab, 2,818; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Elam, 1,254; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Zattu, 845; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Zaccai, 760; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Binnui, 648; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Bebai, 628; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Azgad, 2,322; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Adonikam, 667; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Bigvai, 2,067; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I put my brother Hanani, with Hananiah the commander of the fortress, in charge of Jerusalem, for Hananiah was a more faithful and God-fearing man than many [of the others]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Adin, 655; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Ater, of Hezekiah, 98; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Hashum, 328; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Bezai, 324; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Hariph, 112; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Gibeon, 95; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Bethlehem and Netophah, 188; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Anathoth, 128; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Beth-azmaveth, 42; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Kiriath-jearim, Chephirah and Beeroth, 743; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I said to them, “Do not let the gates of Jerusalem be opened until the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Under normal conditions the city gates were open from sunrise to sunset. Because of security concerns the hours these gates were open was limited.
      marker-yv: yv-n
    - type: text
      text: 'sun is hot; and while the watchmen are still standing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: guard,
    - type: text
      text: ' have them shut and bar the doors. Appoint guards from the residents of Jerusalem, each at his post [on the wall], and each in front of his own house.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Ramah and Geba, 621; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Michmas, 122; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of Bethel and Ai, 123; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the men of the other Nebo, 52; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of the other Elam, 1,254; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Harim, 320; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Jericho, 345; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Lod, Hadid and Ono, 721; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the sons of Senaah, 3,930.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: These are
    - type: text
      text: ' the priests: the sons of Jedaiah of the house of Jeshua, 973; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the city was spacious and large, but there were few people in it and the houses had not [yet] been built.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Immer, 1,052; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Pashhur, 1,247; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the sons of Harim, 1,017.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: These are
    - type: text
      text: ' the Levites: the sons of Jeshua, of Kadmiel, of the sons of Hodevah, 74. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The singers: the sons of Asaph, 148. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The gatekeepers: the sons of Shallum, the sons of Ater, the sons of Talmon, the sons of Akkub, the sons of Hatita, and the sons of Shobai, 138.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The temple servants: the sons of Ziha, the sons of Hasupha, the sons of Tabbaoth, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Keros, the sons of Sia, the sons of Padon, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Lebana, the sons of Hagaba, the sons of Shalmai, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Hanan, the sons of Giddel, the sons of Gahar, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then my God put it into my heart to assemble the nobles, the officials, and the people to be registered by genealogy. Then I found the register of the genealogy of those who came [from Babylon] first, and I found the following record:'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Reaiah, the sons of Rezin, the sons of Nekoda, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Gazzam, the sons of Uzza, the sons of Paseah, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Besai, the sons of Meunim, the sons of Nephushesim, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Bakbuk, the sons of Hakupha, the sons of Harhur, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Bazlith, the sons of Mehida, the sons of Harsha, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Barkos, the sons of Sisera, the sons of Temah, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the sons of Neziah, the sons of Hatipha.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Solomon’s servants: the sons of Sotai, the sons of Sophereth, the sons of Perida, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Jaala, the sons of Darkon, the sons of Giddel, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the sons of Shephatiah, the sons of Hattil, the sons of Pochereth-hazzebaim, the sons of Amon.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons (descendants, people) of the province who came up from the captivity of the exiles whom Nebuchadnezzar the king of Babylon had deported [to Babylon]; they returned to Jerusalem and to Judah, each to his city, '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the temple servants and the sons of Solomon’s servants, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: totaled
    - type: text
      text: ' 392.'
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these were the ones who came up from Tel-melah, Tel-harsha, Cherub, Addon and Immer; but they [had no birth records and] could not prove their fathers’ houses or their descent, whether they were of Israel: '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Delaiah, the sons of Tobiah, the sons of Nekoda, 642. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the priests: the sons of Hobaiah, the sons of Hakkoz, and the sons of Barzillai, who [was so named because he had] married one of the daughters of Barzillai, the [well-known] Gileadite, and was named after them. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men searched for their ancestral registration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: among
    - type: text
      text: ' those recorded in the genealogies, but it was not located; so they were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: excluded
    - type: text
      text: ' from the priesthood as [ceremonially] unclean. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The governor told them that they should not eat any of the most holy food until a priest arose with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:65 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Special objects placed in the sacred breastplate (ephod) of the high priest. What they were and how they were used to determine the divine will is unknown.
      marker-yv: yv-n
    - type: text
      text: Urim and Thummim [to determine God’s will in the matter].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Total of People and Gifts
    marker-yv: yv-h
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The entire assembly together was 42,360, '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'besides their male and their female servants, of whom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there were
    - type: text
      text: ' 7,337; and they had 245 male and female singers. '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:68 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse is not found in the Masoretic Hebrew text. It was included in the Greek and other mss, probably to match Ezra 2:66.
      marker-yv: yv-n
    - type: text
      text: 'Their horses were 736; their mules, 245; '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:69 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V 68 in Hebrew.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' camels, 435; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' donkeys, 6,720.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the ones who came with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Book of Ezra contains the same list using purer Hebrew names.
      marker-yv: yv-n
    - type: text
      text: 'Zerubbabel, Jeshua, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Not the author of this book.
      marker-yv: yv-n
    - type: text
      text: Nehemiah, Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum, and Baanah.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'he men of the people of Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are slight, unexplained variations between numbers in a few entries in this list and the list given in Ezra.
      marker-yv: yv-n
    - type: text
      text: 'numbered: '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some from among the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' gave to the work. The governor gave to the treasury 1,000 gold drachmas, 50 basins, 530 priests’ garments. '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' gave to the treasury for the work 20,000 gold drachmas and 2,200 silver minas. '
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And what the rest of the people gave was 20,000 gold drachmas, 2,000 silver minas, and 67 priests’ garments.
  '73':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the priests, the Levites, the gatekeepers, the singers, some of the people, the temple servants, along with all Israel, lived in their cities.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: A
    - type: text
      text: nd when the seventh month came, the sons (descendants) of Israel (Jacob) were in their cities.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Parosh, 2,172; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sons of Shephatiah, 372; '
