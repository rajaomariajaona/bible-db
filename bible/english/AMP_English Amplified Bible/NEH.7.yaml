  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'the men of the other Nebo, 52; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'the sons of the other Elam, 1,254; '
  - type: usfm
    marker: vlbl
