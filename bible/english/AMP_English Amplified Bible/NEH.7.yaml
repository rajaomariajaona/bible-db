    - type: text
      text: '35'
  - type: text
    text: 'the sons of Harim, 320; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the sons of Jericho, 345; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'the sons of Lod, Hadid and Ono, 721; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: the sons of Senaah, 3,930.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: These are
  - type: text
    text: ' the priests: the sons of Jedaiah of the house of Jeshua, 973; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'the sons of Immer, 1,052; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'the sons of Pashhur, 1,247; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: the sons of Harim, 1,017.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: These are
  - type: text
    text: ' the Levites: the sons of Jeshua, of Kadmiel, of the sons of Hodevah, 74. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'The singers: the sons of Asaph, 148. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'The gatekeepers: the sons of Shallum, the sons of Ater, the sons of Talmon, the sons of Akkub, the sons of Hatita, and the sons of Shobai, 138.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The temple servants: the sons of Ziha, the sons of Hasupha, the sons of Tabbaoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'the sons of Keros, the sons of Sia, the sons of Padon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'the sons of Lebana, the sons of Hagaba, the sons of Shalmai, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'the sons of Hanan, the sons of Giddel, the sons of Gahar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'the sons of Reaiah, the sons of Rezin, the sons of Nekoda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'the sons of Gazzam, the sons of Uzza, the sons of Paseah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'the sons of Besai, the sons of Meunim, the sons of Nephushesim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'the sons of Bakbuk, the sons of Hakupha, the sons of Harhur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'the sons of Bazlith, the sons of Mehida, the sons of Harsha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'the sons of Barkos, the sons of Sisera, the sons of Temah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: the sons of Neziah, the sons of Hatipha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'The sons of Solomon’s servants: the sons of Sotai, the sons of Sophereth, the sons of Perida, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'the sons of Jaala, the sons of Darkon, the sons of Giddel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: the sons of Shephatiah, the sons of Hattil, the sons of Pochereth-hazzebaim, the sons of Amon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'All the temple servants and the sons of Solomon’s servants, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: totaled
  - type: text
    text: ' 392.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'And these were the ones who came up from Tel-melah, Tel-harsha, Cherub, Addon and Immer; but they [had no birth records and] could not prove their fathers’ houses or their descent, whether they were of Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'the sons of Delaiah, the sons of Tobiah, the sons of Nekoda, 642. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Of the priests: the sons of Hobaiah, the sons of Hakkoz, and the sons of Barzillai, who [was so named because he had] married one of the daughters of Barzillai, the [well-known] Gileadite, and was named after them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'These men searched for their ancestral registration '
  - type: usfm
    marker: it
    children:
    - type: text
      text: among
  - type: text
    text: ' those recorded in the genealogies, but it was not located; so they were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: excluded
  - type: text
    text: ' from the priesthood as [ceremonially] unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'The governor told them that they should not eat any of the most holy food until a priest arose with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:65 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Special objects placed in the sacred breastplate (ephod) of the high priest. What they were and how they were used to determine the divine will is unknown.
    marker-yv: yv-n
  - type: text
    text: Urim and Thummim [to determine God’s will in the matter].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Total of People and Gifts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'The entire assembly together was 42,360, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'besides their male and their female servants, of whom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there were
  - type: text
    text: ' 7,337; and they had 245 male and female singers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:68 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse is not found in the Masoretic Hebrew text. It was included in the Greek and other mss, probably to match Ezra 2:66.
    marker-yv: yv-n
  - type: text
    text: 'Their horses were 736; their mules, 245; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:69 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V 68 in Hebrew.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' camels, 435; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' donkeys, 6,720.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Some from among the heads of fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' gave to the work. The governor gave to the treasury 1,000 gold drachmas, 50 basins, 530 priests’ garments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Some of the heads of fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' gave to the treasury for the work 20,000 gold drachmas and 2,200 silver minas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: And what the rest of the people gave was 20,000 gold drachmas, 2,000 silver minas, and 67 priests’ garments.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: So the priests, the Levites, the gatekeepers, the singers, some of the people, the temple servants, along with all Israel, lived in their cities.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: A
  - type: text
    text: nd when the seventh month came, the sons (descendants) of Israel (Jacob) were in their cities.
