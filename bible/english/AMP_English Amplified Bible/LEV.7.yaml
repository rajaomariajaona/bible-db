document_id: LEV.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Priest’s Part in the Offerings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '‘This is the law of the guilt offering; it is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In the place where they kill the burnt offering they are to kill the guilt offering, and he shall sprinkle its blood around on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then he shall offer all its fat, the fat tail and the fat that covers the entrails, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the two kidneys with the fat that is on them at the loins, and the lobe of the liver, which he shall remove with the kidneys. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The priest shall offer them up in smoke on the altar as an offering by fire to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; it is a guilt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Every male among the priests may eat it; it shall be eaten in a holy place; it is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The guilt offering is like the sin offering, there is one law for [both of] them: the priest who makes atonement with it shall have it for himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The priest who presents any man’s burnt offering shall have for himself the hide of the burnt offering which he has presented. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Likewise, every grain offering that is baked in the oven and everything that is prepared in a pan or on a griddle shall belong to the priest who presents it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Every grain offering, mixed with [olive] oil or dry, all the sons of Aaron may have, one as well as another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘Now this is the law of the sacrifice of peace offerings which shall be presented to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'If one offers it as a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrificial meal of
  - type: text
    text: ' thanksgiving, then along with the sacrifice of thanksgiving he shall offer unleavened cakes mixed with oil, and unleavened wafers spread with oil, and cakes of fine flour mixed with oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'With the sacrifice of his peace offerings for thanksgiving, he shall present his offering with cakes of leavened bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Of this he shall present one [cake] from each offering as a contribution to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; it shall belong to the priest who sprinkles the blood of the peace offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '‘The meat of the sacrifice of thanksgiving presented as a peace offering shall be eaten on the day that it is offered; none of it shall be left until morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But if the sacrifice of his offering is a vow or a freewill offering, it shall be eaten on the day that he offers his sacrifice, and on the next day that which remains of it may be eaten; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but what is left over from the meat of the sacrifice on the third day shall be [completely] burned in the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If any of the meat of the sacrifice of his peace offerings is ever eaten on the third day, then it will not be accepted, and the one who brought it will not be credited with it. It shall be an abhorred (offensive) thing; the one who eats it shall bear his own guilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '‘The meat that comes in contact with anything that is unclean shall not be eaten; it shall be burned in the fire. As for other meat, everyone who is [ceremonially] clean may eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But the one who eats meat from the sacrifice of peace offerings which belong to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in his uncleanness, that person shall be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may involve banishment or execution.
    marker-yv: yv-n
  - type: text
    text: 'cut off from his people [excluding him from the atonement made for them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When anyone touches any unclean thing—human uncleanness, or an unclean animal, or any unclean '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some mss read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: swarming thing
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: detestable thing—and then eats the meat of the sacrifice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' peace offerings, that person shall be cut off from his people [excluding him from the atonement made for them].’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Speak to the children of Israel, saying, ‘You shall not eat any fat from an ox, a sheep, or a goat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The fat of an animal which dies [of natural causes] and the fat of one which is torn [to pieces by a predator] may be put to any other use, but under no circumstances are you to eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: For whoever eats the fat of the animal from which an offering by fire is presented to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that person who eats shall be cut off from his people [excluding him from the atonement made for them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moreover, you are not to eat any blood [of any kind], whether of bird or animal, in any of your dwelling places. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Whoever eats any blood, that person shall be cut off from his people.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Speak to the children of Israel, saying, ‘He who offers the sacrifice of his peace offerings to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall bring his offering to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from the sacrifice of his peace offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: With his own hands he is to bring offerings by fire to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; he shall bring the fat with the breast, so that the breast may be presented as a wave offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The priest shall offer up the fat in smoke on the altar, but the breast shall be for Aaron and his sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'You shall give the right thigh to the priest as a contribution from the sacrifices of your peace offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The son of Aaron who offers the blood of the peace offerings and the fat shall have the right thigh as his portion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For I have taken the breast of the wave offering and the thigh of the heave offering from the Israelites, from the sacrifices of their peace offerings, and I have given them to Aaron the priest and to his sons as their perpetual portion from the Israelites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '‘This is the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: consecrated
  - type: text
    text: ' portion from the offerings by fire to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that was designated for Aaron and his sons on the day he presented them to serve as priests to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded this to be given to the priests by the Israelites on the day that He anointed them. It is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' portion perpetually throughout their generations.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'This is the law of the burnt offering, the grain offering, the sin offering, the guilt offering, the consecration (ordination) offering, and the sacrifice of peace offerings, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses at Mount Sinai on the day He commanded the Israelites to present their offerings to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in the Wilderness of Sinai.'
