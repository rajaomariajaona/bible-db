document_id: PSA.44
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 44
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Former Times of Help and Present Troubles.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of the sons of Korah. A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We have heard with our ears, O God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our fathers have told us
- type: usfm
  marker: q1
  children:
  - type: text
    text: The work You did in their days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the days of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You drove out the [pagan] nations with Your own hand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you planted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established them (Israel);'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[It was by Your power that] You uprooted the [pagan] peoples,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then You spread them abroad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For our fathers did not possess the land [of Canaan] by their own sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor did their own arm save them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Your right hand and Your arm and the light of Your presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because You favored '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delighted in them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶You are my King, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Command victories '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deliverance for Jacob (Israel).'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Through You we will gore our enemies [like a bull];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through Your name we will trample down those who rise up against us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For I will not trust in my bow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will my sword save me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But You have saved us from our enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And You have put them to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliated those who hate us.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In God we have boasted all the day long,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And we will praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to Your name forever. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶But now You have rejected us and brought us to dishonor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You do not go out with our armies [to lead us to victory].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You make us turn back from the enemy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who hate us have taken spoil for themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You have made us like sheep to be eaten [as mutton]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have scattered us [in exile] among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You sell Your people cheaply,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have not increased Your wealth by their sale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You have made us the reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taunt of our neighbors,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A scoffing and a derision to those around us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You make us a byword among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shaking of the head
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: laughingstock among the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My dishonor is before me all day long,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And humiliation has covered my face,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Because of the voice of the taunter and reviler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the presence of the enemy and the avenger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶All this has come upon us, yet we have not forgotten You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor have we been false to Your covenant [which You made with our fathers].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Our heart has not turned back,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor have our steps wandered from Your path,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Yet You have [distressingly] crushed us in the place of jackals
- type: usfm
  marker: q1
  children:
  - type: text
    text: And covered us with [the deep darkness of] the shadow of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ¶If we had forgotten the name of our God
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or stretched out our hands to a strange god,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Would not God discover this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For He knows the secrets of the heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis applied this verse to Israel under persecution, especially to those who suffered under the reign of Hadrian following the Bar Cochba revolt (
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 132-135). One rabbi said that he was ready to die for God provided that he be killed immediately, because he could not endure the tortures of what was called “the great persecution.” The tortures included placing red-hot iron discs under the victim’s armpits or sticking needles under the nails until the victim died from the pain (shock).
    marker-yv: yv-n
  - type: text
    text: But for Your sake we are killed all the day long;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We are considered as sheep to be slaughtered. [Rom 8:35-39]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Awake! Why do You sleep, O Lord?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awaken, do not reject us forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Why do You hide Your face
- type: usfm
  marker: q1
  children:
  - type: text
    text: And forget our affliction and our oppression?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: For our life has melted away into the dust;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our body clings to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Rise up! Come be our help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And ransom us for the sake of Your steadfast love.
