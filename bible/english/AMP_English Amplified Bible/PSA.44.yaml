document_id: PSA.44,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 44
  - type: heading
    content: Former Times of Help and Present Troubles.
  - type: text
    content: 'To the Chief Musician. '
  - type: text
    content: A Psalm
  - type: text
    content: ' of the sons of Korah. A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem.'
  - type: text
    content: We have heard with our ears, O God,
  - type: text
    content: Our fathers have told us
  - type: text
    content: The work You did in their days,
  - type: text
    content: In the days of old.
  '10':
  - type: text
    content: You make us turn back from the enemy,
  - type: text
    content: And those who hate us have taken spoil for themselves.
  '11':
  - type: text
    content: You have made us like sheep to be eaten [as mutton]
  - type: text
    content: And have scattered us [in exile] among the nations.
  '12':
  - type: text
    content: You sell Your people cheaply,
  - type: text
    content: And have not increased Your wealth by their sale.
  '13':
  - type: text
    content: 'You have made us the reproach '
  - type: text
    content: and
  - type: text
    content: ' taunt of our neighbors,'
  - type: text
    content: A scoffing and a derision to those around us.
  '14':
  - type: text
    content: You make us a byword among the nations,
  - type: text
    content: 'A '
  - type: note
    content: Lit shaking of the head.
  - type: text
    content: laughingstock among the people.
  '15':
  - type: text
    content: My dishonor is before me all day long,
  - type: text
    content: And humiliation has covered my face,
  '16':
  - type: text
    content: Because of the voice of the taunter and reviler,
  - type: text
    content: Because of the presence of the enemy and the avenger.
  '17':
  - type: text
    content: ¶All this has come upon us, yet we have not forgotten You,
  - type: text
    content: Nor have we been false to Your covenant [which You made with our fathers].
  '18':
  - type: text
    content: Our heart has not turned back,
  - type: text
    content: Nor have our steps wandered from Your path,
  '19':
  - type: text
    content: Yet You have [distressingly] crushed us in the place of jackals
  - type: text
    content: And covered us with [the deep darkness of] the shadow of death.
  '2':
  - type: text
    content: You drove out the [pagan] nations with Your own hand;
  - type: text
    content: 'Then you planted '
  - type: text
    content: and
  - type: text
    content: ' established them (Israel);'
  - type: text
    content: '[It was by Your power that] You uprooted the [pagan] peoples,'
  - type: text
    content: Then You spread them abroad.
  '20':
  - type: text
    content: ¶If we had forgotten the name of our God
  - type: text
    content: Or stretched out our hands to a strange god,
  '21':
  - type: text
    content: Would not God discover this?
  - type: text
    content: For He knows the secrets of the heart.
  '22':
  - type: text
    content: ' '
  - type: note
    content: The ancient rabbis applied this verse to Israel under persecution, especially to those who suffered under the reign of Hadrian following the Bar Cochba revolt (a.d. 132-135). One rabbi said that he was ready to die for God provided that he be killed immediately, because he could not endure the tortures of what was called “the great persecution.” The tortures included placing red-hot iron discs under the victim’s armpits or sticking needles under the nails until the victim died from the pain (shock).
  - type: text
    content: But for Your sake we are killed all the day long;
  - type: text
    content: We are considered as sheep to be slaughtered. [Rom 8:35-39]
  '23':
  - type: text
    content: Awake! Why do You sleep, O Lord?
  - type: text
    content: Awaken, do not reject us forever.
  '24':
  - type: text
    content: Why do You hide Your face
  - type: text
    content: And forget our affliction and our oppression?
  '25':
  - type: text
    content: For our life has melted away into the dust;
  - type: text
    content: Our body clings to the ground.
  '26':
  - type: text
    content: Rise up! Come be our help,
  - type: text
    content: And ransom us for the sake of Your steadfast love.
  '3':
  - type: text
    content: For our fathers did not possess the land [of Canaan] by their own sword,
  - type: text
    content: Nor did their own arm save them,
  - type: text
    content: But Your right hand and Your arm and the light of Your presence,
  - type: text
    content: 'Because You favored '
  - type: text
    content: and
  - type: text
    content: ' delighted in them.'
  '4':
  - type: text
    content: ¶You are my King, O God;
  - type: text
    content: 'Command victories '
  - type: text
    content: and
  - type: text
    content: ' deliverance for Jacob (Israel).'
  '5':
  - type: text
    content: Through You we will gore our enemies [like a bull];
  - type: text
    content: Through Your name we will trample down those who rise up against us.
  '6':
  - type: text
    content: For I will not trust in my bow,
  - type: text
    content: Nor will my sword save me.
  '7':
  - type: text
    content: But You have saved us from our enemies,
  - type: text
    content: 'And You have put them to shame '
  - type: text
    content: and
  - type: text
    content: ' humiliated those who hate us.'
  '8':
  - type: text
    content: In God we have boasted all the day long,
  - type: text
    content: 'And we will praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to Your name forever. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: ¶But now You have rejected us and brought us to dishonor,
  - type: text
    content: And You do not go out with our armies [to lead us to victory].
