document_id: 2CO.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul Describes Himself
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I, Paul, urge you by the gentleness and graciousness of Christ—I who am meek [so they say] when with you face to face, but bold [outspoken and fearless] toward you when absent! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for they say, “His letters are weighty and forceful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' impressive, but his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Among the Greeks, a speaker’s presence and delivery were as important as his message, as the orator Demosthenes made clear when he said that the three most important elements of a speech are delivery, delivery, and delivery. However, Paul did not follow these rules because the message of salvation does not need to be presented with fanfare in order to reach the hearts of the audience.
      marker-yv: yv-n
    - type: text
      text: 'personal presence is unimpressive and his speech contemptible [of no account].” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let such people realize that what we say by word in letters when we are absent, is the same as what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we are
    - type: text
      text: ' in action when present.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We do not have the audacity to put ourselves in the same class or compare ourselves with some who [supply testimonials to] commend themselves. When they measure themselves by themselves and compare themselves with themselves, they lack wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' behave like fools. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We, on the other hand, will not boast beyond our proper limit, but [will keep] within the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. ministry to the Gentiles.
      marker-yv: yv-n
    - type: text
      text: 'limits of our commission (territory, authority) which God has granted to us as a measure, which reaches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' includes even you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We are not overstepping the limits of our province, as if we did not [legitimately] reach to you, for we were the [very] first to come even as far as you with the good news of Christ. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We do not go beyond our proper limit, boasting in the work of other men, but we have the hope that as your faith [in Christ and His divine power] continues to grow, our field among you may be greatly expanded [but still within the limits of our commission], '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we may
    - type: text
      text: ' preach the gospel even in the lands beyond you, but not to boast in work already accomplished in another one’s field of activity. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, “L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: et him who boasts boast in the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” [Jer 9:24] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is not he who commends '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praises himself who is approved [by God], but it is the one whom the Lord commends '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praises.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I ask that when I do come I will not be driven to the boldness that I intend to show toward those few who regard us as if we walked according to the flesh [like men without the Spirit]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For though we walk in the flesh [as mortal men], we are not carrying on our [spiritual] warfare according to the flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' using the weapons of man. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The weapons of our warfare are not physical [weapons of flesh and blood]. Our weapons are divinely powerful for the destruction of fortresses. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: We are
    - type: text
      text: ' destroying sophisticated arguments and every exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' proud thing that sets itself up against the [true] knowledge of God, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we are
    - type: text
      text: ' taking every thought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' purpose captive to the obedience of Christ, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: being ready to punish every act of disobedience, when your own obedience [as a church] is complete.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are looking [only] at the outward appearance of things. If anyone is confident that he is Christ’s, he should reflect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consider this, that just as he is Christ’s, so too are we. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For even though I boast rather freely about the authority the Lord gave us for building you up and not for destroying you, I will not be ashamed [of the truth], '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor do I want to seem to be trying to frighten you with my letters; '
