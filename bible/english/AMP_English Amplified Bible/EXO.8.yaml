  '1':
  - type: heading
    content: Frogs over the Land
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Go to Pharaoh and say to him, ‘Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “Let My people go, so that they may serve Me. '
  '10':
  - type: text
    content: Then Pharaoh said, “
  - type: note
    content: Pharaoh’s answer suggests that he still did not have an understanding of God’s power, since he could have requested the immediate removal of the frogs.
  - type: text
    content: Tomorrow.” Moses replied, “
  - type: text
    content: May it be
  - type: text
    content: ' as you say, so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that there is no one like the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God. '
  '11':
  - type: text
    content: 'The frogs will leave you and your houses and leave your servants and your people; they will remain only in the Nile.” '
  '12':
  - type: text
    content: So Moses and Aaron left Pharaoh, and Moses cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [as he had agreed to do] concerning the frogs which God had inflicted on Pharaoh. '
  '13':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' did as Moses asked, and the frogs died out of the houses, out of the courtyards '
  - type: text
    content: and
  - type: text
    content: ' villages, and out of the fields. '
  '14':
  - type: text
    content: 'So they piled them up in heaps, and the land was detestable '
  - type: text
    content: and
  - type: text
    content: ' stank. '
  '15':
  - type: text
    content: 'But when Pharaoh saw that there was [temporary] relief, he hardened his heart and would not listen '
  - type: text
    content: or
  - type: text
    content: ' pay attention to them, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had said.'
  - type: heading
    content: The Plagues of Gnats and Insects
  '16':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Say to Aaron, ‘Stretch out your staff and strike the dust of the ground, and it will become [biting] gnats (lice) throughout the land of Egypt.’ ” '
  '17':
  - type: text
    content: 'They did so; Aaron stretched out his hand with his staff and struck the dust of the earth, and there were [biting] gnats on man and animal. All the dust of the land became gnats through all the land of Egypt. '
  '18':
  - type: text
    content: 'The magicians (soothsayer-priests) tried by their secret arts '
  - type: text
    content: and
  - type: text
    content: ' enchantments to create gnats, but they could not; and there were gnats on man and animal. '
  '19':
  - type: text
    content: Then the magicians said to Pharaoh, “This is the [supernatural] finger of God.” But Pharaoh’s heart was hardened and he would not listen to them, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had said.'
  '2':
  - type: text
    content: 'However, if you refuse to let them go, hear this: I am going to strike your entire land with frogs. '
  '20':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Get up early in the morning and stand before Pharaoh as he is coming out to the water [of the Nile], and say to him, ‘Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “Let My people go, so that they may serve Me. '
  '21':
  - type: text
    content: 'For if you do not let My people go, hear this: I will send swarms of [bloodsucking] insects on you and on your servants and on your people and into your houses; and the houses of the Egyptians will be full of swarms of insects, as well as the ground on which they stand. '
  '22':
  - type: text
    content: 'But on that day I will separate '
  - type: text
    content: and
  - type: text
    content: ' set apart the land of Goshen, where My people are living, so that no swarms of insects will be there, so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I, the L'
  - type: heading
    content: ord
  - type: text
    content: ', am in the midst of the earth. '
  '23':
  - type: text
    content: 'I will '
  - type: note
    content: Lit set a ransom.
  - type: text
    content: 'put a division (distinction) between My people and your people. By tomorrow this sign shall be in evidence.” ’ ” '
  '24':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' did so. And there came heavy '
  - type: text
    content: and
  - type: text
    content: ' oppressive swarms of [bloodsucking] insects into the house of Pharaoh and his servants’ houses; in all the land of Egypt the land was corrupted '
  - type: text
    content: and
  - type: text
    content: ' ruined because of the [great invasion of] insects.'
  '25':
  - type: text
    content: 'Then Pharaoh called for Moses and Aaron and said, “Go, sacrifice to your God [here] in the land [of Egypt].” '
  '26':
  - type: text
    content: But Moses said, “It is not right [or even possible] to do that, for we will sacrifice to the L
  - type: heading
    content: ord
  - type: text
    content: ' our God what is repulsive '
  - type: text
    content: and
  - type: text
    content: ' unacceptable to the Egyptians [that is, animals that the Egyptians consider sacred]. If we sacrifice what is repulsive '
  - type: text
    content: and
  - type: text
    content: ' unacceptable to the Egyptians, will they not riot '
  - type: text
    content: and
  - type: text
    content: ' stone us? '
  '27':
  - type: text
    content: We must go a three days’ journey into the wilderness and sacrifice to the L
  - type: heading
    content: ord
  - type: text
    content: ' our God as He commands us.” '
  '28':
  - type: text
    content: So Pharaoh said, “I will let you go, so that you may sacrifice to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in the wilderness; only you shall not go very far away. Plead [with your God] for me.” '
  '29':
  - type: text
    content: Moses said, “I am going to leave you, and I will urgently petition (pray, entreat) the L
  - type: heading
    content: ord
  - type: text
    content: ' that the swarms of insects may leave Pharaoh, his servants, and his people tomorrow; only do not let Pharaoh act deceitfully again by not letting the people go to sacrifice to the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'The Nile will swarm with frogs, which will come up and go into your home, into your bedroom and on to your bed, and into the houses of your servants and on your people, and into your ovens and your kneading bowls. '
  '30':
  - type: text
    content: So Moses left Pharaoh and prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ' [on behalf of Pharaoh]. '
  '31':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' did as Moses asked, and removed the swarms of [bloodsucking] insects from Pharaoh, from his servants and from his people; not one remained. '
  '32':
  - type: text
    content: But Pharaoh hardened his heart this time also, and he did not let the people go.
  '4':
  - type: text
    content: 'So the frogs will come up on you and on your people and all your servants.” ’ ” '
  '5':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Say to Aaron, ‘Stretch out your hand with your staff over the rivers, over the streams '
  - type: text
    content: and
  - type: text
    content: ' canals, over the pools [among the reeds], and make frogs come up on the land of Egypt.’ ” '
  '6':
  - type: text
    content: 'So Aaron stretched out his hand [with his staff] over the waters of Egypt, and the frogs came up and covered the land of Egypt. '
  '7':
  - type: text
    content: 'But the magicians (soothsayer-priests) did the same thing with their secret arts '
  - type: text
    content: and
  - type: text
    content: ' enchantments, and '
  - type: note
    content: If the magicians had possessed true power they would have halted the plagues, not exacerbated them.
  - type: text
    content: brought up [more] frogs on the land of Egypt.
  '8':
  - type: text
    content: Then Pharaoh called for Moses and Aaron and said, “Plead with the L
  - type: heading
    content: ord
  - type: text
    content: ' that He may take away the frogs from me and my people; and I will let the people go, so that they may sacrifice to the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '9':
  - type: text
    content: 'And Moses said to Pharaoh, “I am entirely at your service: when shall I plead [with the Lord] for you and your servants and your people, so that the frogs may leave you and your houses and remain only in the Nile?”'
