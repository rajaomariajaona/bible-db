document_id: EXO.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Frogs over the Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Go to Pharaoh and say to him, ‘Thus says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Let My people go, so that they may serve Me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Pharaoh said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pharaoh’s answer suggests that he still did not have an understanding of God’s power, since he could have requested the immediate removal of the frogs.
      marker-yv: yv-n
    - type: text
      text: Tomorrow.” Moses replied, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: May it be
    - type: text
      text: ' as you say, so that you may know [without any doubt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge that there is no one like the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The frogs will leave you and your houses and leave your servants and your people; they will remain only in the Nile.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses and Aaron left Pharaoh, and Moses cried out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [as he had agreed to do] concerning the frogs which God had inflicted on Pharaoh. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did as Moses asked, and the frogs died out of the houses, out of the courtyards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' villages, and out of the fields. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they piled them up in heaps, and the land was detestable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stank. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Pharaoh saw that there was [temporary] relief, he hardened his heart and would not listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pay attention to them, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Plagues of Gnats and Insects
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Say to Aaron, ‘Stretch out your staff and strike the dust of the ground, and it will become [biting] gnats (lice) throughout the land of Egypt.’ ” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did so; Aaron stretched out his hand with his staff and struck the dust of the earth, and there were [biting] gnats on man and animal. All the dust of the land became gnats through all the land of Egypt. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The magicians (soothsayer-priests) tried by their secret arts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enchantments to create gnats, but they could not; and there were gnats on man and animal. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the magicians said to Pharaoh, “This is the [supernatural] finger of God.” But Pharaoh’s heart was hardened and he would not listen to them, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, if you refuse to let them go, hear this: I am going to strike your entire land with frogs. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Get up early in the morning and stand before Pharaoh as he is coming out to the water [of the Nile], and say to him, ‘Thus says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Let My people go, so that they may serve Me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you do not let My people go, hear this: I will send swarms of [bloodsucking] insects on you and on your servants and on your people and into your houses; and the houses of the Egyptians will be full of swarms of insects, as well as the ground on which they stand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But on that day I will separate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set apart the land of Goshen, where My people are living, so that no swarms of insects will be there, so that you may know [without any doubt] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge that I, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', am in the midst of the earth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: set a ransom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'put a division (distinction) between My people and your people. By tomorrow this sign shall be in evidence.” ’ ” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did so. And there came heavy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppressive swarms of [bloodsucking] insects into the house of Pharaoh and his servants’ houses; in all the land of Egypt the land was corrupted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruined because of the [great invasion of] insects.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pharaoh called for Moses and Aaron and said, “Go, sacrifice to your God [here] in the land [of Egypt].” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Moses said, “It is not right [or even possible] to do that, for we will sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God what is repulsive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unacceptable to the Egyptians [that is, animals that the Egyptians consider sacred]. If we sacrifice what is repulsive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unacceptable to the Egyptians, will they not riot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stone us? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We must go a three days’ journey into the wilderness and sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God as He commands us.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Pharaoh said, “I will let you go, so that you may sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God in the wilderness; only you shall not go very far away. Plead [with your God] for me.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said, “I am going to leave you, and I will urgently petition (pray, entreat) the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that the swarms of insects may leave Pharaoh, his servants, and his people tomorrow; only do not let Pharaoh act deceitfully again by not letting the people go to sacrifice to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Nile will swarm with frogs, which will come up and go into your home, into your bedroom and on to your bed, and into the houses of your servants and on your people, and into your ovens and your kneading bowls. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses left Pharaoh and prayed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [on behalf of Pharaoh]. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did as Moses asked, and removed the swarms of [bloodsucking] insects from Pharaoh, from his servants and from his people; not one remained. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Pharaoh hardened his heart this time also, and he did not let the people go.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the frogs will come up on you and on your people and all your servants.” ’ ” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Say to Aaron, ‘Stretch out your hand with your staff over the rivers, over the streams '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' canals, over the pools [among the reeds], and make frogs come up on the land of Egypt.’ ” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Aaron stretched out his hand [with his staff] over the waters of Egypt, and the frogs came up and covered the land of Egypt. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the magicians (soothsayer-priests) did the same thing with their secret arts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enchantments, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: If the magicians had possessed true power they would have halted the plagues, not exacerbated them.
      marker-yv: yv-n
    - type: text
      text: brought up [more] frogs on the land of Egypt.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Pharaoh called for Moses and Aaron and said, “Plead with the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that He may take away the frogs from me and my people; and I will let the people go, so that they may sacrifice to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said to Pharaoh, “I am entirely at your service: when shall I plead [with the Lord] for you and your servants and your people, so that the frogs may leave you and your houses and remain only in the Nile?”'
