      children:
      - type: text
        text: The Philistines Mistrust David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Philistines gathered all their forces at Aphek, while Israel camped by the spring in Jezreel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now, get up early in the morning with your master’s servants who have come with you, and as soon as you are up in the morning and have light, leave.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David and his men got up early to leave in the morning, to return to the land of the Philistines. But the Philistines went up to Jezreel [to fight against Israel].
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the Philistine lords (governors) were proceeding on [marching] by hundreds and by thousands, and David and his men were proceeding on in the rear with Achish [the king of Gath], '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Philistine commanders [having noticed David] said, “What are these Hebrews '
    - type: usfm
      marker: it
      children:
      - type: text
        text: doing here?
    - type: text
      text: '” Achish said to the Philistine commanders, “Is this not David, the servant of Saul king of Israel, who has been with me these days and years, and I have found no fault in him from the day he deserted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to me
    - type: text
      text: ' to this day?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Philistine commanders were angry with Achish and they said to him, “Make this man return, so that he may go back to his place where you have assigned him, and do not let him go down to battle with us, or in the battle he may [turn and] become our adversary. For how could David reconcile himself to his lord [Saul]? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Would it
    - type: text
      text: ' not be with the heads of these [Philistine] men? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Is this not David, of whom they used to sing in dances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Saul killed his thousands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And David his ten thousands’?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Achish called David and said to him, “As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have been
    - type: text
      text: ' upright (righteous), and your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: going out and your coming in
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'behavior in the army is pleasing in my sight. For from the day you came to me to this day I have found no evil in you. Nevertheless, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the eyes of the lords you are not good.
      marker-yv: yv-n
    - type: text
      text: 'the [Philistine] lords do not approve of you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So return now and go in peace [to your place], so that you do not displease the Philistine lords.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Achish, “But what have I done? What have you found in your servant from the day when I [first] came before you to this day, that I may not go and fight against the enemies of my lord the king?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achish answered David, “I know that you are blameless in my sight, like an angel of God; nevertheless the commanders of the Philistines have said, ‘He must not go up with us to the battle.’ '
