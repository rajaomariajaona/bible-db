verses:
  '1':
  - type: heading
    content: The Philistines Mistrust David
  - type: text
    content: 'Now the Philistines gathered all their forces at Aphek, while Israel camped by the spring in Jezreel. '
  '10':
  - type: text
    content: 'So now, get up early in the morning with your master’s servants who have come with you, and as soon as you are up in the morning and have light, leave.” '
  '11':
  - type: text
    content: So David and his men got up early to leave in the morning, to return to the land of the Philistines. But the Philistines went up to Jezreel [to fight against Israel].
  '2':
  - type: text
    content: 'As the Philistine lords (governors) were proceeding on [marching] by hundreds and by thousands, and David and his men were proceeding on in the rear with Achish [the king of Gath], '
  '3':
  - type: text
    content: 'the Philistine commanders [having noticed David] said, “What are these Hebrews '
  - type: text
    content: doing here?
  - type: text
    content: '” Achish said to the Philistine commanders, “Is this not David, the servant of Saul king of Israel, who has been with me these days and years, and I have found no fault in him from the day he deserted '
  - type: text
    content: to me
  - type: text
    content: ' to this day?” '
  '4':
  - type: text
    content: 'But the Philistine commanders were angry with Achish and they said to him, “Make this man return, so that he may go back to his place where you have assigned him, and do not let him go down to battle with us, or in the battle he may [turn and] become our adversary. For how could David reconcile himself to his lord [Saul]? '
  - type: text
    content: Would it
  - type: text
    content: ' not be with the heads of these [Philistine] men? '
  '5':
  - type: text
    content: Is this not David, of whom they used to sing in dances,
  - type: text
    content: ‘Saul killed his thousands,
  - type: text
    content: And David his ten thousands’?”
  '6':
  - type: text
    content: Then Achish called David and said to him, “As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, you '
  - type: text
    content: have been
  - type: text
    content: ' upright (righteous), and your '
  - type: note
    content: Lit going out and your coming in.
  - type: text
    content: 'behavior in the army is pleasing in my sight. For from the day you came to me to this day I have found no evil in you. Nevertheless, '
  - type: note
    content: Lit in the eyes of the lords you are not good.
  - type: text
    content: 'the [Philistine] lords do not approve of you. '
  '7':
  - type: text
    content: 'So return now and go in peace [to your place], so that you do not displease the Philistine lords.” '
  '8':
  - type: text
    content: 'David said to Achish, “But what have I done? What have you found in your servant from the day when I [first] came before you to this day, that I may not go and fight against the enemies of my lord the king?” '
  '9':
  - type: text
    content: 'Achish answered David, “I know that you are blameless in my sight, like an angel of God; nevertheless the commanders of the Philistines have said, ‘He must not go up with us to the battle.’ '
