document_id: DEU.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Obey God and Prosper
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Now this is the command; the statutes and the judgments (precepts) which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has commanded me to teach you, so that you might do (follow, obey) them in the land which you are crossing over [the Jordan] to possess, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Then it shall come about when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God brings you into the land which He swore (solemnly promised) to [give] your fathers—to Abraham, Isaac, and Jacob—to give you, [a land with] great and splendid cities which you did not build, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and houses full of all good things which you did not fill, and hewn (excavated) cisterns (wells) which you did not dig out, and vineyards and olive trees which you did not plant, and you eat and are full '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfied, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'then '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: take heed to yourself
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: beware that you do not forget the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who brought you out of the land of Egypt, out of the house of slavery. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You shall fear [only] the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God; and you shall serve Him [with awe-filled reverence and profound respect] and swear [oaths] by His name [alone]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'You shall not follow other gods, any of the gods of the peoples who surround you, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God who is among you is a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 4:24.
      marker-yv: yv-n
    - type: text
      text: jealous (impassioned) God [demanding what is rightfully and uniquely His]—otherwise the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God will be kindled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' burn against you, and He will destroy you from the face of the earth.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “You shall not put the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God to the test, as you tested Him at Massah. [Ex 17:7] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You shall diligently keep [foremost in your thoughts and actively do] the commandments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, and His testimonies and His statutes which He has commanded you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: You shall do what is right and good in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', so that it may be well with you and that you may go in and possess the good land which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' swore to [give] your fathers, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: by driving out all your enemies from before you, as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'so that you and your son and your grandson may fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God [with awe-filled reverence and profound respect], to keep [and actively do] all His statutes and His commandments which I am commanding you, all the days of your life, so that your days may be prolonged. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“When your son asks you in time to come, saying, ‘What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is the meaning
    - type: text
      text: ' of the testimonies and statutes and judgments (precepts) which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God has commanded you?’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: then you shall say to your son, ‘We were Pharaoh’s slaves in Egypt, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' brought us out of Egypt with a mighty hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moreover, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' showed great and terrible signs and wonders before our eyes against Egypt, Pharaoh and all his household; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He brought us out from there in order to bring us in, to give us the land which He had sworn to [give] our fathers.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded us to do all these statutes, to fear [and worship] the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God [with awe-filled reverence and profound respect] for our good always and so that He might preserve us alive, as it is today. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: It will be [considered] righteousness for us [that is, right standing with God] if we are careful to observe all this commandment before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God—just as He has commanded us.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore listen, O Israel, and be careful to do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ', that it may go well with you and that you may increase greatly [in numbers], as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of your fathers, has promised you, in a land '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: flowing with milk and honey.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Hear, O Israel! The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is our God, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is one [the only God]! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You shall love the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God with all your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind and with all your soul and with all your strength [your entire being]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'These words, which I am commanding you today, shall be [written] on your heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mind. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You shall teach them diligently to your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons.
      marker-yv: yv-n
    - type: text
      text: 'children [impressing God’s precepts on their minds and penetrating their hearts with His truths] and shall speak of them when you sit in your house and when you walk on the road and when you lie down and when you get up. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And you shall bind them as a sign on your hand (forearm), and they shall be used as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: phylacteries
        - type: text
          text: '. This is originally a Greek word meaning “safeguard.” In Jewish tradition these are also called '
        - type: usfm
          marker: it
          children:
          - type: text
            text: tefillin,
        - type: text
          text: ' and are understood to be small leather boxes tied to the forearm and to the top of the head with leather straps. The boxes contain small parchment copies of the passage found here and three others.'
      marker-yv: yv-n
    - type: text
      text: 'bands (frontals, frontlets) on your forehead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'You shall write them on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mezuzoth,
        - type: text
          text: ' which—like tefillin (v 8)—also have special significance in Jewish tradition. The (singular) '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mezuzah
        - type: text
          text: ' is a piece of parchment on which is written this passage (6:4-9) and 11:13-21. The parchment is encased to protect it, and is attached to the right doorpost. By Jewish law, all rooms where people live or sleep (excluding bathrooms) are required to have '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mezuzoth
        - type: text
          text: ' on the doorposts.'
      marker-yv: yv-n
    - type: text
      text: doorposts of your house and on your gates.
