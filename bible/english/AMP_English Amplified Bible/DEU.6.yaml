  '8':
  - type: text
    content: 'And you shall bind them as a sign on your hand (forearm), and they shall be used as '
  - type: note
    content: Or phylacteries. This is originally a Greek word meaning “safeguard.” In Jewish tradition these are also called tefillin, and are understood to be small leather boxes tied to the forearm and to the top of the head with leather straps. The boxes contain small parchment copies of the passage found here and three others.
  - type: text
    content: 'bands (frontals, frontlets) on your forehead. '
  '9':
  - type: text
    content: 'You shall write them on the '
  - type: note
    content: Heb mezuzoth, which—like tefillin (v 8)—also have special significance in Jewish tradition. The (singular) mezuzah is a piece of parchment on which is written this passage (6:4-9) and 11:13-21. The parchment is encased to protect it, and is attached to the right doorpost. By Jewish law, all rooms where people live or sleep (excluding bathrooms) are required to have mezuzoth on the doorposts.
  - type: text
    content: doorposts of your house and on your gates.
