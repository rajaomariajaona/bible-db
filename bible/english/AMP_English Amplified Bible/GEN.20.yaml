document_id: GEN.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abraham’s Deception
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abraham journeyed from there toward the Negev (the South country), and settled between Kadesh and Shur; then he lived temporarily in Gerar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abimelech said to Abraham, “What have you encountered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' seen [in us or our customs], that you have done this [unjust] thing?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham said, “Because I thought, ‘Surely there is no fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reverence of God in this place, and they will kill me because of my wife.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Besides, she actually is my [half-] sister; she is the daughter of my father [Terah], but not of my mother; and she became my wife. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When God caused me to wander from my father’s house, I said to her, ‘This kindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loyalty you can show me: at every place we stop, say of me, “He is my brother.” ’ ” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abimelech took sheep and oxen and male and female slaves, and gave them to Abraham, and returned Sarah his wife to him [as God commanded]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abimelech said, “Behold, my land is before you; settle wherever you please.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then to Sarah he said, “Look, I have given this brother of yours a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps about three years’ or a thousand days’ wages.
      marker-yv: yv-n
    - type: text
      text: 'thousand pieces of silver; it is to compensate you [for all that has happened] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to vindicate your honor before all who are with you; before all men you are cleared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compensated.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abraham prayed to God, and God healed Abimelech and his wife and his maids, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again
    - type: text
      text: ' gave birth to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children,
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had securely closed the wombs of all [the women] in Abimelech’s household because of Sarah, Abraham’s wife. [1 Pet 3:1-6]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 12:11-13.
      marker-yv: yv-n
    - type: text
      text: 'said [again] of Sarah his wife, “She is my sister.” So '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word “Abimelech” may be a royal title instead of a proper name. In either case this man is probably the father or grandfather of Abimelech king of the Philistines encountered later by Isaac (26:1).
      marker-yv: yv-n
    - type: text
      text: 'Abimelech king of Gerar sent and took '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sarah was about ninety years old at this time.
      marker-yv: yv-n
    - type: text
      text: 'Sarah [into his harem]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God came to Abimelech in a dream during the night, and said, “Behold, you are a dead man because of the woman whom you have taken [as your wife], for she is another man’s wife.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abimelech had not yet come near her; so he said, “Lord, will you kill a people who are righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innocent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blameless [regarding Sarah]? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Did Abraham not tell me, ‘She is my sister?’ And she herself said, ‘He is my brother.’ In the integrity of my heart and innocence of my hands I have done this.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God said to him in the dream, “Yes, I know you did this in the integrity of your heart, for it was I who kept you back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spared you from sinning against Me; therefore I did not give you an opportunity to touch her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now return the man’s wife, for he is a prophet, and he will pray for you and you will live. But if you do not return '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' [to him], know that you shall die, you and all who are yours (your household).”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abimelech got up early in the morning and called all his servants and told them all these things; and the men were terrified. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abimelech called Abraham and said to him, “What have you done to us? And how have I offended you that you have brought on me and my kingdom a great sin? You have done to me what ought not to be done [to anyone].” '
