    content: Abraham’s Deception
  - type: text
    content: 'Now Abraham journeyed from there toward the Negev (the South country), and settled between Kadesh and Shur; then he lived temporarily in Gerar. '
  '10':
  - type: text
    content: 'And Abimelech said to Abraham, “What have you encountered '
  - type: text
    content: or
  - type: text
    content: ' seen [in us or our customs], that you have done this [unjust] thing?” '
  '11':
  - type: text
    content: 'Abraham said, “Because I thought, ‘Surely there is no fear '
  - type: text
    content: or
  - type: text
    content: ' reverence of God in this place, and they will kill me because of my wife.’ '
  '12':
  - type: text
    content: 'Besides, she actually is my [half-] sister; she is the daughter of my father [Terah], but not of my mother; and she became my wife. '
  '13':
  - type: text
    content: 'When God caused me to wander from my father’s house, I said to her, ‘This kindness '
  - type: text
    content: and
  - type: text
    content: ' loyalty you can show me: at every place we stop, say of me, “He is my brother.” ’ ” '
  '14':
  - type: text
    content: 'Then Abimelech took sheep and oxen and male and female slaves, and gave them to Abraham, and returned Sarah his wife to him [as God commanded]. '
  '15':
  - type: text
    content: 'So Abimelech said, “Behold, my land is before you; settle wherever you please.” '
  '16':
  - type: text
    content: 'Then to Sarah he said, “Look, I have given this brother of yours a '
  - type: note
    content: Perhaps about three years’ or a thousand days’ wages.
  - type: text
    content: 'thousand pieces of silver; it is to compensate you [for all that has happened] '
  - type: text
    content: and
  - type: text
    content: ' to vindicate your honor before all who are with you; before all men you are cleared '
  - type: text
    content: and
  - type: text
    content: ' compensated.” '
  '17':
  - type: text
    content: 'So Abraham prayed to God, and God healed Abimelech and his wife and his maids, and they '
  - type: text
    content: again
  - type: text
    content: ' gave birth to '
  - type: text
    content: children,
  - type: text
    content: ' '
  '18':
  - type: text
    content: for the L
  - type: heading
    content: ord
  - type: text
    content: ' had securely closed the wombs of all [the women] in Abimelech’s household because of Sarah, Abraham’s wife. [1 Pet 3:1-6]'
  '2':
  - type: text
    content: 'Abraham '
  - type: note
    content: See 12:11-13.
  - type: text
    content: 'said [again] of Sarah his wife, “She is my sister.” So '
  - type: note
    content: The word “Abimelech” may be a royal title instead of a proper name. In either case this man is probably the father or grandfather of Abimelech king of the Philistines encountered later by Isaac (26:1).
  - type: text
    content: 'Abimelech king of Gerar sent and took '
  - type: note
    content: Sarah was about ninety years old at this time.
  - type: text
    content: 'Sarah [into his harem]. '
  '3':
  - type: text
    content: 'But God came to Abimelech in a dream during the night, and said, “Behold, you are a dead man because of the woman whom you have taken [as your wife], for she is another man’s wife.” '
  '4':
  - type: text
    content: 'Now Abimelech had not yet come near her; so he said, “Lord, will you kill a people who are righteous '
  - type: text
    content: and
  - type: text
    content: ' innocent '
  - type: text
    content: and
  - type: text
    content: ' blameless [regarding Sarah]? '
  '5':
  - type: text
    content: 'Did Abraham not tell me, ‘She is my sister?’ And she herself said, ‘He is my brother.’ In the integrity of my heart and innocence of my hands I have done this.” '
  '6':
  - type: text
    content: 'Then God said to him in the dream, “Yes, I know you did this in the integrity of your heart, for it was I who kept you back '
  - type: text
    content: and
  - type: text
    content: ' spared you from sinning against Me; therefore I did not give you an opportunity to touch her. '
  '7':
  - type: text
    content: 'So now return the man’s wife, for he is a prophet, and he will pray for you and you will live. But if you do not return '
  - type: text
    content: her
  - type: text
    content: ' [to him], know that you shall die, you and all who are yours (your household).”'
  '8':
  - type: text
    content: 'So Abimelech got up early in the morning and called all his servants and told them all these things; and the men were terrified. '
  '9':
  - type: text
    content: 'Then Abimelech called Abraham and said to him, “What have you done to us? And how have I offended you that you have brought on me and my kingdom a great sin? You have done to me what ought not to be done [to anyone].” '
