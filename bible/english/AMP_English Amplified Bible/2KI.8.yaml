document_id: 2KI.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Restores the Shunammite’s Land
  - type: text
    content: 'Now Elisha had said to the [Shunammite] woman whose son he had restored to life, “Prepare and go, you and your household, and '
  - type: note
    content: Lit sojourn.
  - type: text
    content: stay temporarily wherever you can; for the L
  - type: heading
    content: ord
  - type: text
    content: ' has called for a famine, and moreover, it will come on the land [and continue] for seven years.” '
  '10':
  - type: text
    content: And Elisha said to him, “Go, say to him, ‘You will certainly recover,’ but the L
  - type: heading
    content: ord
  - type: text
    content: ' has shown me that he will certainly die.” '
  '11':
  - type: text
    content: 'Elisha stared steadily at Hazael until he was embarrassed, and then the man of God wept. '
  '12':
  - type: text
    content: 'Hazael said, “Why are you weeping, my lord?” He answered, “Because I know the evil that you will do to the sons (descendants) of Israel. You will set their strongholds on fire, kill their young men with the sword, smash their children to pieces, and rip up their pregnant women.” '
  '13':
  - type: text
    content: Then Hazael said, “
  - type: text
    content: Surely not!
  - type: text
    content: ' For what is your servant, '
  - type: text
    content: who is nothing more than
  - type: text
    content: ' a dog, that he would do this monstrous thing?” And Elisha answered, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' has shown me that you will be king over Aram.” '
  '14':
  - type: text
    content: 'Then Hazael departed from Elisha and came to his master, who said to him, “What did Elisha say to you?” And he answered, “He told me you would certainly recover.” '
  '15':
  - type: text
    content: But the next day Hazael took the bedspread and dipped it in water and covered the king’s face, so that he died. And Hazael became king in his place.
  - type: heading
    content: Another Jehoram Reigns in Judah
  '16':
  - type: text
    content: 'Now in the fifth year of '
  - type: note
    content: Jehoram, king of Israel is sometimes referred to as Joram in the Hebrew.
  - type: text
    content: 'Joram (Jehoram) the son of Ahab king of Israel, when Jehoshaphat was king of Judah, Jehoram the son of Jehoshaphat king of Judah became king. '
  '17':
  - type: text
    content: 'He was thirty-two years old when he became king, and he reigned for eight years in Jerusalem. '
  '18':
  - type: text
    content: 'He walked in the ways of the kings of Israel, just as the house of Ahab had done, for [Athaliah] the daughter of Ahab became his wife. He did '
  - type: note
    content: King Jehoram of Judah introduced and encouraged the worship of Baal in Judah.
  - type: text
    content: evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '19':
  - type: text
    content: Yet for the sake of His servant David the L
  - type: heading
    content: ord
  - type: text
    content: ' was not willing to destroy Judah, since He had promised to give him a lamp (enthroned descendant) through his sons always.'
  '2':
  - type: text
    content: 'So the woman set out and did everything in accordance with the word of the man of God. She and her household went and '
  - type: note
    content: Lit sojourned.
  - type: text
    content: 'stayed temporarily as foreigners in the land of the Philistines for seven years. '
  '20':
  - type: text
    content: 'In his days Edom revolted from the rule of Judah, and set up a king over themselves. '
  '21':
  - type: text
    content: 'So Jehoram [king of Judah] went over to Zair [in Edom] with all his chariots. He set out by night and struck down the Edomites who had surrounded him and the captains of his chariots; but the people [of his army] fled to their tents. '
  '22':
  - type: text
    content: 'So Edom revolted '
  - type: note
    content: Lit from under the hand of.
  - type: text
    content: 'against Judah to this day. Then Libnah revolted at the same time. '
  '23':
  - type: text
    content: The rest of the acts of Jehoram and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah?
  - type: heading
    content: Ahaziah Succeeds Jehoram in Judah
  '24':
  - type: text
    content: Jehoram slept with his fathers [in death] and was buried with them in the City of David. Ahaziah his son became king in his place.
  '25':
  - type: text
    content: 'In the twelfth year of Joram (Jehoram) the son of Ahab king of Israel, Ahaziah the son of Jehoram king of Judah began to reign. '
  '26':
  - type: text
    content: 'Ahaziah was twenty-two years old when he became king, and he reigned one year in Jerusalem. His mother’s name was Athaliah, the granddaughter of Omri king of Israel. '
  '27':
  - type: text
    content: He walked in the ways of the house of Ahab and did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', as '
  - type: text
    content: did
  - type: text
    content: ' the house of Ahab, for he was a son-in-law of the house of Ahab.'
  '28':
  - type: text
    content: 'Ahaziah went with Joram the son of Ahab to battle against Hazael king of Aram (Syria) in Ramoth-gilead; and the Arameans wounded Joram. '
  '29':
  - type: text
    content: King Joram returned to Jezreel to be healed of the wounds which the Arameans had inflicted on him at Ramah when he fought against Hazael king of Aram. And Ahaziah the son of Jehoram king of Judah went down to see Joram the son of Ahab in Jezreel, because he was sick.
  '3':
  - type: text
    content: 'At the end of the seven years the woman returned from the land of the Philistines; and she went to appeal to the king [of Israel] for her house and for her land. '
  '4':
  - type: text
    content: 'Now the king was talking with '
  - type: note
    content: This discussion occurred before Gehazi was afflicted with leprosy (5:27).
  - type: text
    content: 'Gehazi, the servant of the man of God, saying, “Tell me all the great things that Elisha has done.” '
  '5':
  - type: text
    content: 'And [just] as Gehazi was telling the king how Elisha had restored the dead to life, behold, the woman whose son he had restored to life appealed to the king for her house and for her land. And Gehazi said, “My lord, O king, this is the woman and this is her son, whom Elisha restored to life.” '
  '6':
  - type: text
    content: When the king asked the woman, she told him [everything]. So the king appointed for her a certain high official, saying, “Restore everything that was hers, including all the produce of the field since the day that she left the land until now.”
  - type: heading
    content: Elisha Predicts Evil from Hazael
  '7':
  - type: text
    content: 'Now Elisha came to Damascus, and Ben-hadad king of Aram (Syria) was sick; and he was told, “The man of God has come here.” '
  '8':
  - type: text
    content: And the king said to Hazael, “Take a gift with you and go to meet the man of God, and inquire of the L
  - type: heading
    content: ord
  - type: text
    content: ' by him, saying, ‘Will I recover from this illness?’ ” '
  '9':
  - type: text
    content: 'So Hazael went to meet Elisha and took a gift with him of every good thing of Damascus, forty camels’ loads; and he came and stood before him and said, “Your son Ben-hadad king of Aram has sent me to you, asking, ‘Will I recover from this illness?’ ” '
