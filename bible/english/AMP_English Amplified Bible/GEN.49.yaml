document_id: GEN.49,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel’s Prophecy concerning His Sons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob called for his sons and said, “Assemble yourselves [around me] that I may tell you what will happen to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' your descendants '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Deut 33, where Moses blesses the same tribes in a similar prophetic way.
      marker-yv: yv-n
    - type: text
      text: in the days to come.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The scepter [of royalty] shall not depart from Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the ruler’s staff from between his feet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until Shiloh [the Messiah, the Peaceful One] comes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And to Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' the obedience of the peoples. [Num 24:17; Ps 60:7; Ezek 21:27]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Tying '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the tribe of Judah.
      marker-yv: yv-n
    - type: text
      text: his foal to the [strong] vine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his donkey’s colt to the choice vine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He washes his clothing in wine [because the grapevine produces abundantly],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his robes in the blood of grapes. [Is 63:1-3; Zech 9:9; Rev 19:11-16]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“His eyes are darker '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sparkle more than wine,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his teeth whiter than milk.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Zebulun shall dwell at the seashore;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he shall be a haven (landing place) for ships,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his flank shall be toward Sidon.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Issachar is [like] a strong-boned donkey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crouching down between the sheepfolds.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When he saw that the resting place was good
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that the land was pleasant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He bowed his shoulder to bear [burdens],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And became a servant at forced labor.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Dan shall judge his people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As one of the tribes of Israel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Dan shall be a [venomous] serpent in the way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fanged snake in the path,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That bites the horse’s heels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that his rider falls backward.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I wait for Your salvation, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“As for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word from which the name “Gad” is derived has two meanings. In this verse the Hebrew meaning is associated with a “raiding troop” but in 30:11 it is associated with “good fortune.”
      marker-yv: yv-n
    - type: text
      text: Gad—a raiding troop shall raid him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he shall raid at their heels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' assault them [victoriously].'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Gather together and hear, O sons of Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And listen to Israel (Jacob) your father.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“Asher’s food [supply] shall be rich '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bountiful,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he shall yield '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliver royal delights.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Naphtali is a doe let loose, [a swift warrior,]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which yields branched antlers (eloquent words).
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Joseph is a fruitful bough (a main branch of the vine),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fruitful bough by a spring (a well, a fountain);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its branches run over the wall [influencing others].
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The [skilled] archers have bitterly attacked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoked him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have shot [at him] and harassed him.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But his bow remained firm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steady [in the Strength that does not fail],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For his arms were made strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' agile'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the hands of the Mighty One of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (By the name of the Shepherd, the Stone of Israel), [Gen 48:15; Deut 32:4; Is 9:6; 49:26]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the God of your father who will help you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And by the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Almighty who blesses you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With blessings of the heavens above,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessings lying in the deep that couches beneath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessings of the [nursing] breasts and of the [fertile] womb.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The blessings of your father
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are greater than the blessings of my ancestors [Abraham and Isaac]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Up to the utmost bound of the everlasting hills;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall be on the head of Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even on the crown of the head of him who was the distinguished one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the one who is prince among (separate from) his brothers.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“Benjamin is a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The tribe of Benjamin invariably displayed courage and ferocity, particularly in their war with the other tribes. The tribe of Benjamin was absorbed by the tribe of Judah and is not mentioned after the return from the Babylonian captivity, except in connection with its former land or as the source of some individual person. Ehud, Saul, Jonathan, and the apostle Paul were Benjamites.
      marker-yv: yv-n
    - type: text
      text: ravenous wolf;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning he devours the prey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And at night he divides the spoil.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these are the [beginnings of the] twelve tribes of Israel, and this is what their father said to them as he blessed them, blessing each one according to the blessing appropriate to him. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He charged them and said to them, “I am to be gathered to my people; bury me with my fathers in the cave that is in the field of Ephron the Hittite, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“Reuben, you are my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Reuben was the eldest of Jacob’s twelve sons and therefore entitled to the birthright, which would make him successor to his father as head of the family or tribe, and inheritor of a double portion of his father’s estate. But Reuben forfeited all this by his conduct with Bilhah, his father’s concubine (35:22). By adopting Joseph’s two sons, Ephraim and Manasseh, and giving each of them a portion of the inheritance, Jacob virtually gave Joseph the extra portion of the land that would have gone to Reuben. Judah became the tribal leader in Reuben’s place (49:8-10).
      marker-yv: yv-n
    - type: text
      text: firstborn;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My might, the beginning of my strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vigor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Preeminent in dignity and preeminent in power [that should have been your birthright].
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in the cave in the field at Machpelah, east of Mamre, in the land of Canaan, that Abraham bought, along with the field from Ephron the Hittite, to possess as a burial site. [Gen 23:17-20] '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There they buried Abraham and Sarah his wife, there they buried Isaac and Rebekah his wife, and there I buried Leah— '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the field and the cave that is in it was purchased from the sons of Heth.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jacob (Israel) had finished commanding his sons, he drew his feet into the bed and breathed his last, and was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 25:8.
      marker-yv: yv-n
    - type: text
      text: gathered to his people [who had preceded him in death].
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But unstable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reckless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boiling over like water [in sinful lust], you shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fertile land once occupied by the tribe of Reuben was deserted by its settled inhabitants and given over to the tribal nomads of the desert. Because of his behavior, Reuben had forfeited his rights as the firstborn even before Jacob’s prophecy.
      marker-yv: yv-n
    - type: text
      text: 'not excel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' have the preeminence [of the firstborn],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you went up to your father’s bed [with Bilhah];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You defiled it—he went up to my couch. [Gen 35:22]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Simeon and Levi are brothers [equally headstrong, deceitful, vindictive, and cruel];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their swords are weapons of violence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revenge. [Gen 34:25-30]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O my soul, do not come into their secret council;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let not my glory (honor) be united with their assembly [for I knew nothing of their plot];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because in their anger they killed men [an honored man, Shechem, and the Shechemites],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in their self-will they lamed oxen.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cursed be their anger, for it was fierce;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their wrath, for it was cruel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will divide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disperse them in Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was fulfilled when the tribe of Levi received no inheritance except forty-eight towns scattered throughout different parts of Canaan. The tribe of Simeon was originally given only a few towns and villages in the midst of the inheritance of the tribe of Judah (Josh 19:1).
      marker-yv: yv-n
    - type: text
      text: scatter them in [the midst of the land of] Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Judah, you are the one whom your brothers shall praise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hand will be on the neck of your enemies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your father’s sons shall bow down to you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Judah, a lion’s cub;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the prey, my son, you have gone high up [the mountain].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stooped down, he crouched like a lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like a lion—who dares rouse him? [Rev 5:5]
