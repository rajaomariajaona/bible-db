    content: 'He charged them and said to them, “I am to be gathered to my people; bury me with my fathers in the cave that is in the field of Ephron the Hittite, '
  '3':
  - type: text
    content: '¶“Reuben, you are my '
  - type: note
    content: Reuben was the eldest of Jacob’s twelve sons and therefore entitled to the birthright, which would make him successor to his father as head of the family or tribe, and inheritor of a double portion of his father’s estate. But Reuben forfeited all this by his conduct with Bilhah, his father’s concubine (35:22). By adopting Joseph’s two sons, Ephraim and Manasseh, and giving each of them a portion of the inheritance, Jacob virtually gave Joseph the extra portion of the land that would have gone to Reuben. Judah became the tribal leader in Reuben’s place (49:8-10).
  - type: text
