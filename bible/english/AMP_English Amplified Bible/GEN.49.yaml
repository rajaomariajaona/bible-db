    content: '¶“Benjamin is a '
  - type: note
    content: The tribe of Benjamin invariably displayed courage and ferocity, particularly in their war with the other tribes. The tribe of Benjamin was absorbed by the tribe of Judah and is not mentioned after the return from the Babylonian captivity, except in connection with its former land or as the source of some individual person. Ehud, Saul, Jonathan, and the apostle Paul were Benjamites.
