document_id: PRO.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: On Life and Conduct
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A '
  - type: usfm
    marker: it
    children:
    - type: text
      text: good
  - type: text
    text: ' name [earned by honorable behavior, godly wisdom, moral courage, and personal integrity] is more desirable than great riches;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And favor is better than silver and gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The rich and poor have a common bond;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is the Maker of them all. [Job 31:15; Prov 14:31]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A prudent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' far-sighted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: person
  - type: text
    text: ' sees the evil [of sin] and hides himself [from it],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the naive continue on and are punished [by suffering the consequences of sin].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The reward of humility [that is, having a realistic view of one’s importance] and the [reverent, worshipful] fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is riches, honor, and life. [Prov 21:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Thorns and snares are in the way of the obstinate [for their lack of honor and their wrong-doing traps them];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He who guards himself [with godly wisdom] will be far from them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' avoid the consequences they suffer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Train up a child in the way he should go [teaching him to seek God’s wisdom and will for his abilities and talents],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even when he is old he will not depart from it. [Eph 6:4; 2 Tim 3:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The rich rules over the poor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the borrower is servant to the lender.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He who sows injustice will reap [a harvest of] trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the rod of his wrath [with which he oppresses others] will fail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He who is generous will be blessed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he gives some of his food to the poor. [2 Cor 9:6-10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Drive out the scoffer, and contention will go away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even strife and dishonor will cease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He who loves purity of heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whose speech is gracious will have the king as his friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' keep guard over knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the one who has it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But He overthrows the words of the treacherous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The lazy one [manufactures excuses and] says, “There is a lion outside!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will be killed in the streets [if I go out to work]!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The mouth of an immoral woman is a deep pit [deep and inescapable];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who is cursed by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [because of his adulterous sin] will fall into it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Foolishness is bound up in the heart of a child;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rod of discipline [correction administered with godly wisdom and lovingkindness] will remove it far from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He who oppresses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' exploits the poor to get more for himself'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or who gives to the rich [to gain influence and favor], will only come to poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '¶Listen carefully and hear the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These verses (17-21) introduce a special collection of wisdom sayings compiled by Solomon.
    marker-yv: yv-n
  - type: text
    text: words of the wise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And apply your mind to my knowledge;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For it will be pleasant if you keep them in mind [incorporating them as guiding principles];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be ready on your lips [to guide and strengthen yourself and others].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So that your trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reliance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidence may be in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have taught these things to you today, even to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Have I not written to you excellent things
- type: usfm
  marker: q1
  children:
  - type: text
    text: In counsels and knowledge,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: To let you know the certainty of the words of truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you may give a correct answer to him who sent you? [Luke 1:3, 4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶Do not rob the poor because he is poor [and defenseless],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor crush the afflicted [by legal proceedings] at the gate [where the city court is held], [Ex 23:6; Job 31:16, 21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will plead their case'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And take the life of those who rob them. [Zech 7:10; Mal 3:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ¶Do not even associate with a man given to angry outbursts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or go [along] with a hot-tempered man,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Or you will learn his [undisciplined] ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: And get yourself trapped [in a situation from which it is hard to escape].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶Do not be among those who give pledges [involving themselves in others’ finances],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or among those who become guarantors for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: others’
  - type: text
    text: ' debts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If you have nothing with which to pay [another’s debt when he defaults],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why should his creditor take your bed from under you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ¶Do not move the ancient landmark [at the boundary of the property]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which your fathers have set.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '¶Do you see a man skillful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' experienced in his work?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will stand [in honor] before kings;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not stand before obscure men.
