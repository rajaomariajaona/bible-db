verses:
  '1':
  - type: heading
    content: On Life and Conduct
  - type: text
    content: 'A '
  - type: text
    content: good
  - type: text
    content: ' name [earned by honorable behavior, godly wisdom, moral courage, and personal integrity] is more desirable than great riches;'
  - type: text
    content: And favor is better than silver and gold.
  '10':
  - type: text
    content: Drive out the scoffer, and contention will go away;
  - type: text
    content: Even strife and dishonor will cease.
  '11':
  - type: text
    content: He who loves purity of heart
  - type: text
    content: And whose speech is gracious will have the king as his friend.
  '12':
  - type: text
    content: The eyes of the L
  - type: heading
    content: ord
  - type: text
    content: ' keep guard over knowledge '
  - type: text
    content: and
  - type: text
    content: ' the one who has it,'
  - type: text
    content: But He overthrows the words of the treacherous.
  '13':
  - type: text
    content: The lazy one [manufactures excuses and] says, “There is a lion outside!
  - type: text
    content: I will be killed in the streets [if I go out to work]!”
  '14':
  - type: text
    content: The mouth of an immoral woman is a deep pit [deep and inescapable];
  - type: text
    content: He who is cursed by the L
  - type: heading
    content: ord
  - type: text
    content: ' [because of his adulterous sin] will fall into it.'
  '15':
  - type: text
    content: Foolishness is bound up in the heart of a child;
  - type: text
    content: The rod of discipline [correction administered with godly wisdom and lovingkindness] will remove it far from him.
  '16':
  - type: text
    content: 'He who oppresses '
  - type: text
    content: or
  - type: text
    content: ' exploits the poor to get more for himself'
  - type: text
    content: Or who gives to the rich [to gain influence and favor], will only come to poverty.
  '17':
  - type: text
    content: '¶Listen carefully and hear the '
  - type: note
    content: These verses (17-21) introduce a special collection of wisdom sayings compiled by Solomon.
  - type: text
    content: words of the wise,
  - type: text
    content: And apply your mind to my knowledge;
  '18':
  - type: text
    content: For it will be pleasant if you keep them in mind [incorporating them as guiding principles];
  - type: text
    content: Let them be ready on your lips [to guide and strengthen yourself and others].
  '19':
  - type: text
    content: 'So that your trust '
  - type: text
    content: and
  - type: text
    content: ' reliance '
  - type: text
    content: and
  - type: text
    content: ' confidence may be in the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: I have taught these things to you today, even to you.
  '2':
  - type: text
    content: The rich and poor have a common bond;
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is the Maker of them all. [Job 31:15; Prov 14:31]'
  '20':
  - type: text
    content: Have I not written to you excellent things
  - type: text
    content: In counsels and knowledge,
  '21':
  - type: text
    content: To let you know the certainty of the words of truth,
  - type: text
    content: That you may give a correct answer to him who sent you? [Luke 1:3, 4]
  '22':
  - type: text
    content: ¶Do not rob the poor because he is poor [and defenseless],
  - type: text
    content: Nor crush the afflicted [by legal proceedings] at the gate [where the city court is held], [Ex 23:6; Job 31:16, 21]
  '23':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will plead their case'
  - type: text
    content: And take the life of those who rob them. [Zech 7:10; Mal 3:5]
  '24':
  - type: text
    content: ¶Do not even associate with a man given to angry outbursts;
  - type: text
    content: Or go [along] with a hot-tempered man,
  '25':
  - type: text
    content: Or you will learn his [undisciplined] ways
  - type: text
    content: And get yourself trapped [in a situation from which it is hard to escape].
  '26':
  - type: text
    content: ¶Do not be among those who give pledges [involving themselves in others’ finances],
  - type: text
    content: 'Or among those who become guarantors for '
  - type: text
    content: others’
  - type: text
    content: ' debts.'
  '27':
  - type: text
    content: If you have nothing with which to pay [another’s debt when he defaults],
  - type: text
    content: Why should his creditor take your bed from under you?
  '28':
  - type: text
    content: ¶Do not move the ancient landmark [at the boundary of the property]
  - type: text
    content: Which your fathers have set.
  '29':
  - type: text
    content: '¶Do you see a man skillful '
  - type: text
    content: and
  - type: text
    content: ' experienced in his work?'
  - type: text
    content: He will stand [in honor] before kings;
  - type: text
    content: He will not stand before obscure men.
  '3':
  - type: text
    content: 'A prudent '
  - type: text
    content: and
  - type: text
    content: ' far-sighted '
  - type: text
    content: person
  - type: text
    content: ' sees the evil [of sin] and hides himself [from it],'
  - type: text
    content: But the naive continue on and are punished [by suffering the consequences of sin].
  '4':
  - type: text
    content: The reward of humility [that is, having a realistic view of one’s importance] and the [reverent, worshipful] fear of the L
  - type: heading
    content: ord
  - type: text
    content: Is riches, honor, and life. [Prov 21:21]
  '5':
  - type: text
    content: Thorns and snares are in the way of the obstinate [for their lack of honor and their wrong-doing traps them];
  - type: text
    content: 'He who guards himself [with godly wisdom] will be far from them '
  - type: text
    content: and
  - type: text
    content: ' avoid the consequences they suffer.'
  '6':
  - type: text
    content: Train up a child in the way he should go [teaching him to seek God’s wisdom and will for his abilities and talents],
  - type: text
    content: Even when he is old he will not depart from it. [Eph 6:4; 2 Tim 3:15]
  '7':
  - type: text
    content: The rich rules over the poor,
  - type: text
    content: And the borrower is servant to the lender.
  '8':
  - type: text
    content: He who sows injustice will reap [a harvest of] trouble,
  - type: text
    content: And the rod of his wrath [with which he oppresses others] will fail.
  '9':
  - type: text
    content: He who is generous will be blessed,
  - type: text
    content: For he gives some of his food to the poor. [2 Cor 9:6-10]
