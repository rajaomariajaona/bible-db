document_id: JDG.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Micah’s Idolatry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a man of the hill country of Ephraim whose name was Micah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said to his mother, “The eleven hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver which were taken from you, about which you cursed [the thief] and also spoke about in my hearing, behold, the silver is with me; I took it.” And his mother said, “Blessed be my son before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He returned the eleven hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver to his mother, and she said, “I had truly dedicated the silver from my hand to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for my son (in his name) to make an image [carved from wood and plated with silver] and a cast image [of solid silver]; so now, I will return it to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So when he returned the silver to his mother, she took two hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver and gave them to the silversmith who made of it an image [of silver-plated wood] and a cast image [of solid silver]; and they were in the house of Micah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the man Micah had a house of gods (shrine), and he made an ephod and teraphim and dedicated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' installed one of his sons, who became his [personal] priest. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In those days there was no king in Israel; every man did what was right in his own eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now there was a young man from Bethlehem in Judah, from the family [of the tribe] of Judah, who was a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. not one of the descendants of Judah, but living among them.
    marker-yv: yv-n
  - type: text
    text: 'Levite; and he was staying there [temporarily]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the man left the town of Bethlehem in Judah, to stay wherever he could find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a place;
  - type: text
    text: ' and as he journeyed, he came to the hill country of Ephraim, to the house of Micah. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Micah said to him, “Where do you come from?” And he said to him, “I am a Levite from Bethlehem in Judah, and I am going to stay wherever I can find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a place.
  - type: text
    text: '” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Micah said to him, “Live here with me and be a father and a [personal] priest to me, and I will give you ten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver each year, a supply of clothing, and your sustenance (room and board).” So the Levite went in. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The Levite agreed to live with the man, and the young man became to Micah like one of his sons. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So Micah dedicated (installed) the Levite, and the young man became his priest and lived in the house of Micah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Micah said, “Now I know that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will favor me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make me prosper because I have a Levite as my priest.”'
