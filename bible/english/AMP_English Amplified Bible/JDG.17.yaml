document_id: JDG.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Micah’s Idolatry
  - type: text
    content: 'There was a man of the hill country of Ephraim whose name was Micah. '
  '10':
  - type: text
    content: 'And Micah said to him, “Live here with me and be a father and a [personal] priest to me, and I will give you ten '
  - type: text
    content: pieces
  - type: text
    content: ' of silver each year, a supply of clothing, and your sustenance (room and board).” So the Levite went in. '
  '11':
  - type: text
    content: 'The Levite agreed to live with the man, and the young man became to Micah like one of his sons. '
  '12':
  - type: text
    content: 'So Micah dedicated (installed) the Levite, and the young man became his priest and lived in the house of Micah. '
  '13':
  - type: text
    content: Then Micah said, “Now I know that the L
  - type: heading
    content: ord
  - type: text
    content: ' will favor me '
  - type: text
    content: and
  - type: text
    content: ' make me prosper because I have a Levite as my priest.”'
  '2':
  - type: text
    content: 'And he said to his mother, “The eleven hundred '
  - type: text
    content: pieces
  - type: text
    content: ' of silver which were taken from you, about which you cursed [the thief] and also spoke about in my hearing, behold, the silver is with me; I took it.” And his mother said, “Blessed be my son before the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: 'He returned the eleven hundred '
  - type: text
    content: pieces
  - type: text
    content: ' of silver to his mother, and she said, “I had truly dedicated the silver from my hand to the L'
  - type: heading
    content: ord
  - type: text
    content: ' for my son (in his name) to make an image [carved from wood and plated with silver] and a cast image [of solid silver]; so now, I will return it to you.” '
  '4':
  - type: text
    content: 'So when he returned the silver to his mother, she took two hundred '
  - type: text
    content: pieces
  - type: text
    content: ' of silver and gave them to the silversmith who made of it an image [of silver-plated wood] and a cast image [of solid silver]; and they were in the house of Micah. '
  '5':
  - type: text
    content: 'Now the man Micah had a house of gods (shrine), and he made an ephod and teraphim and dedicated '
  - type: text
    content: and
  - type: text
    content: ' installed one of his sons, who became his [personal] priest. '
  '6':
  - type: text
    content: In those days there was no king in Israel; every man did what was right in his own eyes.
  '7':
  - type: text
    content: 'Now there was a young man from Bethlehem in Judah, from the family [of the tribe] of Judah, who was a '
  - type: note
    content: I.e. not one of the descendants of Judah, but living among them.
  - type: text
    content: 'Levite; and he was staying there [temporarily]. '
  '8':
  - type: text
    content: 'Then the man left the town of Bethlehem in Judah, to stay wherever he could find '
  - type: text
    content: a place;
  - type: text
    content: ' and as he journeyed, he came to the hill country of Ephraim, to the house of Micah. '
  '9':
  - type: text
    content: 'Micah said to him, “Where do you come from?” And he said to him, “I am a Levite from Bethlehem in Judah, and I am going to stay wherever I can find '
  - type: text
    content: a place.
  - type: text
    content: '” '
