document_id: TIT.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Godly Living
  - type: text
    content: 'Remind people to be subject to rulers and authorities, to be obedient, to be ready '
  - type: text
    content: and
  - type: text
    content: ' willing to do good, '
  '10':
  - type: text
    content: 'After a first and second warning reject a divisive man [who promotes heresy and causes dissension—ban him from your fellowship and have nothing more to do with him], '
  '11':
  - type: text
    content: 'well aware that such a person is twisted and is sinning; he is convicted '
  - type: text
    content: and
  - type: text
    content: ' self-condemned [and is gratified by causing confusion among believers].'
  - type: heading
    content: Personal Concerns
  '12':
  - type: text
    content: 'When I send Artemas or [perhaps] Tychicus to you, make every effort to come to me at Nicopolis, for I have decided to spend the winter there. '
  '13':
  - type: text
    content: 'Do your best to help Zenas the lawyer and Apollos on their way; see that they are supplied '
  - type: text
    content: and
  - type: text
    content: ' lack nothing. '
  '14':
  - type: text
    content: Our people must learn to do good deeds to meet necessary demands [whatever the occasion may require], so that they will not be unproductive.
  '15':
  - type: text
    content: All who are with me greet you. Greet those who love us in the faith.
  - type: text
    content: G
  - type: text
    content: race be with all of you.
  '2':
  - type: text
    content: 'to slander '
  - type: text
    content: or
  - type: text
    content: ' abuse no one, to be kind '
  - type: text
    content: and
  - type: text
    content: ' conciliatory and gentle, showing unqualified consideration '
  - type: text
    content: and
  - type: text
    content: ' courtesy toward everyone. '
  '3':
  - type: text
    content: 'For we too once were foolish, disobedient, deceived, enslaved to various '
  - type: text
    content: sinful
  - type: text
    content: ' desires and pleasures, spending '
  - type: text
    content: and
  - type: text
    content: ' wasting our life in malice and envy, hateful, hating one another. '
  '4':
  - type: text
    content: 'But when the goodness '
  - type: text
    content: and
  - type: text
    content: ' kindness of God our Savior and '
  - type: text
    content: His
  - type: text
    content: ' love for mankind appeared [in human form as the Man, Jesus Christ], '
  '5':
  - type: text
    content: 'He saved us, not because of any works of righteousness that we have done, but because of His own compassion '
  - type: text
    content: and
  - type: text
    content: ' mercy, by the cleansing of the new birth (spiritual transformation, regeneration) and renewing by the Holy Spirit, '
  '6':
  - type: text
    content: 'whom He poured out richly upon us through Jesus Christ our Savior, '
  '7':
  - type: text
    content: 'so that we would be justified [made free of the guilt of sin] by His [compassionate, undeserved] grace, and that we would be [acknowledged as acceptable to Him and] made heirs of eternal life [actually experiencing it] according to our hope (His guarantee). '
  '8':
  - type: text
    content: 'This is a faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy saying; and concerning these things I want you to speak with great confidence, so that those who have believed God [that is, those who have trusted in, relied on, and accepted Christ Jesus as Savior,] will be careful to participate in doing good '
  - type: text
    content: and
  - type: text
    content: ' honorable things. These things are excellent [in themselves] and profitable for the people. '
  '9':
  - type: text
    content: 'But avoid foolish '
  - type: text
    content: and
  - type: text
    content: ' ill-informed '
  - type: text
    content: and
  - type: text
    content: ' stupid controversies and genealogies and dissensions and quarrels about the Law, for they are unprofitable and useless. '
