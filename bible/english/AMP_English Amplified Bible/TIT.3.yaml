document_id: TIT.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Godly Living
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Remind people to be subject to rulers and authorities, to be obedient, to be ready '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' willing to do good, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'to slander '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' abuse no one, to be kind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conciliatory and gentle, showing unqualified consideration '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' courtesy toward everyone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For we too once were foolish, disobedient, deceived, enslaved to various '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sinful
  - type: text
    text: ' desires and pleasures, spending '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wasting our life in malice and envy, hateful, hating one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But when the goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kindness of God our Savior and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' love for mankind appeared [in human form as the Man, Jesus Christ], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He saved us, not because of any works of righteousness that we have done, but because of His own compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy, by the cleansing of the new birth (spiritual transformation, regeneration) and renewing by the Holy Spirit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'whom He poured out richly upon us through Jesus Christ our Savior, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'so that we would be justified [made free of the guilt of sin] by His [compassionate, undeserved] grace, and that we would be [acknowledged as acceptable to Him and] made heirs of eternal life [actually experiencing it] according to our hope (His guarantee). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This is a faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy saying; and concerning these things I want you to speak with great confidence, so that those who have believed God [that is, those who have trusted in, relied on, and accepted Christ Jesus as Savior,] will be careful to participate in doing good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honorable things. These things are excellent [in themselves] and profitable for the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But avoid foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ill-informed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stupid controversies and genealogies and dissensions and quarrels about the Law, for they are unprofitable and useless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'After a first and second warning reject a divisive man [who promotes heresy and causes dissension—ban him from your fellowship and have nothing more to do with him], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'well aware that such a person is twisted and is sinning; he is convicted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-condemned [and is gratified by causing confusion among believers].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Personal Concerns
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When I send Artemas or [perhaps] Tychicus to you, make every effort to come to me at Nicopolis, for I have decided to spend the winter there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Do your best to help Zenas the lawyer and Apollos on their way; see that they are supplied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lack nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Our people must learn to do good deeds to meet necessary demands [whatever the occasion may require], so that they will not be unproductive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: All who are with me greet you. Greet those who love us in the faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: G
  - type: text
    text: race be with all of you.
