document_id: 1CH.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Defeat and Death of Saul and His Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Philistines fought against Israel; and the men of Israel fled from them and fell slain on Mount Gilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Philistines followed closely after Saul and his sons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overtook them, and the Philistines killed Jonathan, Abinadab, and Malchi-shua, the sons of Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The battle became heavy against Saul, and the archers found him; and he was [mortally] wounded by the archers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Saul said to his armor bearer, “Draw your sword and run me through with it, otherwise these uncircumcised [Philistines] will come and abuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliate me.” But his armor bearer would not, for he was terrified. So Saul took his own sword and fell on it. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When his armor bearer saw that Saul was dead, he also fell on his sword and died. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Saul died with his three sons and all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' of his house died together.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When all the men of Israel who were in the valley saw that the army had fled, and that Saul and his sons were dead, they abandoned their cities and fled; and the Philistines came and lived in them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It came about the next day, when the Philistines came to strip (plunder) the slain, that they found Saul and his sons fallen on Mount Gilboa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So they stripped Saul and took his head and his armor and sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: messengers
  - type: text
    text: ' around the land of the Philistines to bring the good news to their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is ironic that they felt the need to inform their false gods of what had happened.
    marker-yv: yv-n
  - type: text
    text: 'idols and to the people. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They put Saul’s armor in the house of their gods and nailed up his head in the house (temple) of Dagon.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jabesh-gilead’s Tribute to Saul
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When all Jabesh-gilead heard about everything that the Philistines had done to Saul, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: all the brave men arose, took away the body of Saul and the bodies of his sons and brought them to Jabesh, and they buried their bones under the oak in Jabesh; then they fasted seven days. [1 Sam 31:12]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Saul died for his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Saul’s failure to obey God and to destroy King Agag and the Amalekites is told in 1 Sam 15.
    marker-yv: yv-n
  - type: text
    text: trespass which he committed against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for his failure to keep the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; and also because he consulted a medium [regarding a spirit of the dead], to inquire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of her
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and did not inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [instead]. Therefore the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' killed him and turned the kingdom over to David the son of Jesse. [1 Sam 28:6]'
