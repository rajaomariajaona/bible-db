  '2':
  - type: text
    content: 'The Philistines followed closely after Saul and his sons '
  - type: text
    content: and
  - type: text
    content: ' overtook them, and the Philistines killed Jonathan, Abinadab, and Malchi-shua, the sons of Saul. '
  '3':
  - type: text
    content: 'The battle became heavy against Saul, and the archers found him; and he was [mortally] wounded by the archers. '
  '4':
  - type: text
    content: 'Then Saul said to his armor bearer, “Draw your sword and run me through with it, otherwise these uncircumcised [Philistines] will come and abuse '
  - type: text
    content: and
  - type: text
    content: ' humiliate me.” But his armor bearer would not, for he was terrified. So Saul took his own sword and fell on it. '
  '5':
  - type: text
    content: 'When his armor bearer saw that Saul was dead, he also fell on his sword and died. '
  '6':
  - type: text
    content: 'So Saul died with his three sons and all '
  - type: text
    content: those
  - type: text
    content: ' of his house died together.'
  '7':
  - type: text
    content: When all the men of Israel who were in the valley saw that the army had fled, and that Saul and his sons were dead, they abandoned their cities and fled; and the Philistines came and lived in them.
  '8':
  - type: text
    content: 'It came about the next day, when the Philistines came to strip (plunder) the slain, that they found Saul and his sons fallen on Mount Gilboa. '
  '9':
  - type: text
    content: 'So they stripped Saul and took his head and his armor and sent '
  - type: text
    content: messengers
  - type: text
    content: ' around the land of the Philistines to bring the good news to their '
  - type: note
    content: It is ironic that they felt the need to inform their false gods of what had happened.
  - type: text
