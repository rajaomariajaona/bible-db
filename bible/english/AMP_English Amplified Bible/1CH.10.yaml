verses:
  '1':
  - type: heading
    content: Defeat and Death of Saul and His Sons
  - type: text
    content: 'Now the Philistines fought against Israel; and the men of Israel fled from them and fell slain on Mount Gilboa. '
  '10':
  - type: text
    content: They put Saul’s armor in the house of their gods and nailed up his head in the house (temple) of Dagon.
  - type: heading
    content: Jabesh-gilead’s Tribute to Saul
  '11':
  - type: text
    content: 'When all Jabesh-gilead heard about everything that the Philistines had done to Saul, '
  '12':
  - type: text
    content: all the brave men arose, took away the body of Saul and the bodies of his sons and brought them to Jabesh, and they buried their bones under the oak in Jabesh; then they fasted seven days. [1 Sam 31:12]
  '13':
  - type: text
    content: 'So Saul died for his '
  - type: note
