  '1':
  - type: heading
    content: Psalm 137
  - type: heading
    content: An Experience of the Captivity.
  - type: text
    content: By the rivers of Babylon,
  - type: text
    content: There we [captives] sat down and wept,
  - type: text
    content: When we remembered Zion [the city God imprinted on our hearts].
  '2':
  - type: text
    content: On the willow trees in the midst of Babylon
  - type: text
    content: We hung our harps.
  '3':
  - type: text
    content: For there they who took us captive demanded of us a song with words,
  - type: text
    content: 'And our tormentors [who made a mockery of us demanded] amusement, '
  - type: text
    content: saying,
  - type: text
    content: “Sing us one of the songs of Zion.”
  '4':
  - type: text
    content: ¶How can we sing the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' song'
  - type: text
    content: 'In a strange '
  - type: text
    content: and
  - type: text
    content: ' foreign land?'
  '5':
  - type: text
    content: If I forget you, O Jerusalem,
  - type: text
    content: Let my right hand forget [her skill with the harp].
  '6':
  - type: text
    content: Let my tongue cling to the roof of my mouth
  - type: text
    content: If I do not remember you,
  - type: text
    content: If I do not prefer Jerusalem
  - type: text
    content: Above my chief joy. [Ezek 3:26]
  '7':
  - type: text
    content: ¶Remember, O L
  - type: heading
    content: ord
  - type: text
    content: ', against the sons of Edom,'
  - type: text
    content: The day of [the fall of] Jerusalem,
  - type: text
    content: Who said “Down, down [with her]
  - type: text
    content: To her very foundation.”
  '8':
  - type: text
    content: O daughter of Babylon, you devastator,
  - type: text
    content: How blessed will be the one
  - type: text
    content: Who repays you [with destruction] as you have repaid us. [Is 13:1-22; Jer 25:12, 13]
  '9':
  - type: text
    content: How blessed will be the one who seizes and dashes your little ones
  - type: text
    content: Against the rock.
