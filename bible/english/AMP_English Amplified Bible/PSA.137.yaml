document_id: PSA.137,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 137
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: An Experience of the Captivity.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: By the rivers of Babylon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There we [captives] sat down and wept,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When we remembered Zion [the city God imprinted on our hearts].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: On the willow trees in the midst of Babylon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We hung our harps.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For there they who took us captive demanded of us a song with words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And our tormentors [who made a mockery of us demanded] amusement, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sing us one of the songs of Zion.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶How can we sing the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' song'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In a strange '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foreign land?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: If I forget you, O Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my right hand forget [her skill with the harp].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Let my tongue cling to the roof of my mouth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I do not remember you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I do not prefer Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Above my chief joy. [Ezek 3:26]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶Remember, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', against the sons of Edom,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day of [the fall of] Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who said “Down, down [with her]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To her very foundation.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: O daughter of Babylon, you devastator,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How blessed will be the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who repays you [with destruction] as you have repaid us. [Is 13:1-22; Jer 25:12, 13]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: How blessed will be the one who seizes and dashes your little ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against the rock.
