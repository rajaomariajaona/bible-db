document_id: EXO.33,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Journey Resumed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, “Depart, go up from here, you and the people whom you have brought from the land of Egypt, to the land which I swore to Abraham, Isaac, and Jacob (Israel), saying, ‘To your descendants I will give it.’ '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the people saw the pillar of cloud standing at the tent door, all the people would rise and worship, each at his tent door. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' used to speak to Moses face to face, just as a man speaks to his friend. When Moses returned to the camp, his attendant Joshua, the son of Nun, a young man, would not depart from the tent.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moses Intercedes
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “See, You say to me, ‘Bring up this people,’ but You have not let me know whom You will send with me. Yet You have said, ‘I know you by name, and you have also found favor in My sight.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, I pray you, if I have found favor in Your sight, let me know Your ways so that I may know You [becoming more deeply and intimately acquainted with You, recognizing and understanding Your ways more clearly] and that I may find grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor in Your sight. And consider also, that this nation is Your people.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “My presence shall go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with you,
    - type: text
      text: ' and I will give you rest [by bringing you and the people into the promised land].” [Deut 3:20] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses said to Him, “If Your presence does not go [with me], do not lead us up from here. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For how then can it be known that Your people and I have found favor in Your sight? Is it not by Your going with us, so that we are distinguished, Your people and I, from all the [other] people on the face of the earth?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “I will also do this thing that you have asked; for you have found favor (lovingkindness, mercy) in My sight and I have known you [personally] by name.” [Rev 2:17] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said, “Please, show me Your glory!” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And God said, “I will make all My goodness pass before you, and I will proclaim the Name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' before you; for I will be gracious to whom I will be gracious, and will show compassion (lovingkindness) on whom I will show compassion.” [Rom 9:15, 16] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will send an Angel before you and I will drive out the Canaanite, the Amorite, the Hittite, the Perizzite, the Hivite, and the Jebusite. [Ex 23:23; 34:11] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He said, “You cannot see My face, for no man shall see Me and live!” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Behold, there is a place beside Me, and you shall stand there on the rock; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and while My glory is passing by, I will put you in a cleft of the rock and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: protectively
    - type: text
      text: ' cover you with My hand until I have passed by. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I will take away My hand and you shall see My back; but My face shall not be seen.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go up to a land [of abundance] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: flowing with milk and honey; for I will not go up in your midst, because you are a stiff-necked (stubborn, rebellious) people, and I might destroy you on the way.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the people heard this sad word, they mourned, and none of them put on his ornaments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said to Moses, “Say to the sons of Israel, ‘You are a stiff-necked (stubborn, rebellious) people! If I should come among you for one moment, I would destroy you. Now therefore, [penitently] take off your ornaments, so that I may know what to do with you.’ ” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Israelites left off all their ornaments [in repentance], from Mount Horeb (Sinai) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: onward
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Moses used to take his own tent and pitch it outside the camp, far away from the camp, and he called it the tent of meeting [of God with His own people]. And everyone who sought the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' would go out to the [temporary] tent of meeting which was outside the camp. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever Moses went out to the tent, all the people would rise and stand, each at his tent door, and look at Moses until he entered the tent. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whenever Moses entered the tent, the pillar of cloud would descend and stand at the doorway of the tent; and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' would speak with Moses. '
