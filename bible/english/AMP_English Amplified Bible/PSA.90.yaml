  - type: heading
    content: God’s Eternity and Man’s Transitoriness.
  - type: text
    content: A Prayer of Moses the man of God.
  - type: text
    content: Lord, You have been our dwelling place [our refuge, our sanctuary, our stability] in all generations.
  '10':
  - type: text
    content: 'The days of our life are '
  - type: note
    content: This psalm is credited to Moses, who is interceding with God to remove the curse which made it necessary for every Israelite over twenty years of age (when they rebelled against God at Kadesh-barnea) to die before reaching the promised land of Canaan (Num 14:26-35). Moses himself lived to be 120 years old, Aaron 123, Miriam several years older, and Joshua 110 years of age; but it is conceivable that Moses considered such longevity the exception. The ancient rabbis taught that by the time of David, 70 was the age of death for an old man and 80 for a vigorous old man.
  - type: text
    content: seventy years—
  - type: text
    content: Or even, if because of strength, eighty years;
  - type: text
    content: Yet their pride [in additional years] is only labor and sorrow,
  - type: text
    content: For it is soon gone and we fly away.
  '11':
  - type: text
    content: Who understands the power of Your anger? [Who connects this brevity of life among us with Your judgment of sin?]
  - type: text
    content: And Your wrath, [who connects it] with the [reverent] fear that is due You?
