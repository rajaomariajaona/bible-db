  children:
  - type: text
    text: Psalm 90
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Eternity and Man’s Transitoriness.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Prayer of Moses the man of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, You have been our dwelling place [our refuge, our sanctuary, our stability] in all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Before the mountains were born
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or before You had given birth to the earth and the world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even from everlasting to everlasting, You are [the eternal] God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶You turn man back to dust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And say, “Return [to the earth], O children of [mortal] men!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was understood by the ancient rabbis to mean that a “thousand years” are literally only one day in God’s reckoning, and Peter seems to confirm the idea in 2 Pet 3:8.
    marker-yv: yv-n
  - type: text
    text: thousand years in Your sight
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are like yesterday when it is past,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or as a watch in the night. [2 Pet 3:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You have swept them away like a flood, they fall asleep [forgotten as soon as they are gone];
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the morning they are like grass which grows anew—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: In the morning it flourishes and springs up;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the evening it wilts and withers away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶For we have been consumed by Your anger
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by Your wrath we have been terrified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have placed our wickedness before you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Our secret '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sins
  - type: text
    text: ' [which we tried to conceal, You have placed] in the [revealing] light of Your presence.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For all our days pass away in Your wrath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have finished our years like a whispered sigh. [Num 14:26-35]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The days of our life are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '90:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is credited to Moses, who is interceding with God to remove the curse which made it necessary for every Israelite over twenty years of age (when they rebelled against God at Kadesh-barnea) to die before reaching the promised land of Canaan (Num 14:26-35). Moses himself lived to be 120 years old, Aaron 123, Miriam several years older, and Joshua 110 years of age; but it is conceivable that Moses considered such longevity the exception. The ancient rabbis taught that by the time of David, 70 was the age of death for an old man and 80 for a vigorous old man.
    marker-yv: yv-n
  - type: text
    text: seventy years—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or even, if because of strength, eighty years;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet their pride [in additional years] is only labor and sorrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it is soon gone and we fly away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Who understands the power of Your anger? [Who connects this brevity of life among us with Your judgment of sin?]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your wrath, [who connects it] with the [reverent] fear that is due You?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So teach us to number our days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That we may cultivate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring to You a heart of wisdom.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Turn, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [from Your fierce anger]; how long will it be?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be compassionate toward Your servants—revoke Your sentence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O satisfy us with Your lovingkindness in the morning [now, before we grow older],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That we may rejoice and be glad all our days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Make us glad in proportion to the days You have afflicted us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the years we have suffered evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Let Your work [the signs of Your power] be revealed to Your servants
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your [glorious] majesty to their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And let the [gracious] favor of the Lord our God be on us;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Confirm for us the work of our hands—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, confirm the work of our hands.
