document_id: ACT.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Acceptance and Opposition
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in Iconium Paul and Barnabas went into the Jewish synagogue together and spoke in such a way [with such power and boldness] that a large number of Jews as well as Greeks believed [and confidently accepted Jesus as Savior]; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said with a loud voice, “Stand up on your feet.” And he jumped up and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to walk. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the crowds, when they saw what Paul had done, raised their voices, shouting in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An ancient dialect no longer known.
      marker-yv: yv-n
    - type: text
      text: 'Lycaonian language, “The gods have come down to us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: having become like humans
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in human form!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They began calling Barnabas, Zeus [chief of the Greek gods], and Paul, Hermes [messenger of the Greek gods], since he took the lead in speaking. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest of Zeus, whose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: ' was at the entrance of the city, brought bulls and garlands to the city gates, and wanted to offer sacrifices with the crowds. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the apostles Barnabas and Paul heard about it, they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the customary Jewish response to blasphemy, which in this case was appropriate because the apostles were wrongly being identified as gods.
      marker-yv: yv-n
    - type: text
      text: 'tore their robes and rushed out into the crowd, shouting, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Men, why are you doing these things? We too are only men of the same nature as you, bringing the good news to you, so that you turn from these useless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' meaningless things to the living God, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who made the heaven and the earth and the sea and everything that is in them
    - type: text
      text: '. [Ex 20:11; Ps 146:6] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In generations past He permitted all the nations to go their own ways; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet He did not leave Himself without some witness [as evidence of Himself], in that He kept constantly doing good things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' showing you kindness, and giving you rains from heaven and productive seasons, filling your hearts with food and happiness.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even saying these words, with difficulty they prevented the people from offering sacrifices to them.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jews arrived from Antioch and Iconium, and having won over the crowds, they stoned Paul and dragged him out of the city, thinking he was dead. [2 Cor 11:25; 2 Tim 3:11] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the unbelieving Jews [who rejected Jesus as Messiah] stirred up and embittered the minds of the Gentiles against the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the disciples formed a circle around him, and he got up and went back into the city; and the next day he went on with Barnabas to Derbe. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They preached the good news to that city and made many disciples, then they returned to Lystra and to Iconium and to Antioch, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'strengthening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' establishing the hearts of the disciples; encouraging them to remain firm in the faith, saying, “It is through many tribulations '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hardships that we must enter the kingdom of God.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they had appointed elders for them in every church, having prayed with fasting, they entrusted them to the Lord in whom they believed [and joyfully accepted as the Messiah].
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they passed through Pisidia and came to Pamphylia. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had spoken the word [of salvation through faith in Christ] in Perga, they went down to Attalia. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there they sailed back to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the third largest city in the Roman Empire and was part of the province of Galatia.
      marker-yv: yv-n
    - type: text
      text: 'Antioch, where they had been entrusted to the grace of God for the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The first missionary journey lasted about eighteen months.
      marker-yv: yv-n
    - type: text
      text: 'work which they had now completed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arriving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there,
    - type: text
      text: ' they gathered the church together and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to report [in great detail] everything that God had done with them and how He had opened to the Gentiles a door of faith [in Jesus as the Messiah and Savior]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they stayed there a long time with the disciples.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Paul and Barnabas stayed for a long time, speaking boldly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently for the Lord, who continued to testify to the word of His grace, granting that signs and wonders (attesting miracles) be done by them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people of the city were divided; some were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: siding
    - type: text
      text: ' with the Jews, and some with the apostles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When there was an attempt by both the Gentiles and the Jews, together with their rulers, to shamefully mistreat and to stone them, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they, aware of the situation, escaped to Lystra and Derbe, [taking refuge in the] cities of Lycaonia, and the neighboring region; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and there they continued to preach the good news.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now at Lystra a man sat who was unable to use his feet, for he was crippled from birth and had never walked. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This man was listening to Paul as he spoke, and Paul looked intently at him and saw that he had faith to be healed, '
