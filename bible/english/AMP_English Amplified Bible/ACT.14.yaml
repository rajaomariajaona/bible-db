document_id: ACT.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Acceptance and Opposition
  - type: text
    content: 'Now in Iconium Paul and Barnabas went into the Jewish synagogue together and spoke in such a way [with such power and boldness] that a large number of Jews as well as Greeks believed [and confidently accepted Jesus as Savior]; '
  '10':
  - type: text
    content: 'and said with a loud voice, “Stand up on your feet.” And he jumped up and '
  - type: text
    content: began
  - type: text
    content: ' to walk. '
  '11':
  - type: text
    content: 'And the crowds, when they saw what Paul had done, raised their voices, shouting in the '
  - type: note
    content: An ancient dialect no longer known.
  - type: text
    content: 'Lycaonian language, “The gods have come down to us '
  - type: note
    content: Lit having become like humans.
  - type: text
    content: 'in human form!” '
  '12':
  - type: text
    content: 'They began calling Barnabas, Zeus [chief of the Greek gods], and Paul, Hermes [messenger of the Greek gods], since he took the lead in speaking. '
  '13':
  - type: text
    content: 'The priest of Zeus, whose '
  - type: text
    content: temple
  - type: text
    content: ' was at the entrance of the city, brought bulls and garlands to the city gates, and wanted to offer sacrifices with the crowds. '
  '14':
  - type: text
    content: 'But when the apostles Barnabas and Paul heard about it, they '
  - type: note
    content: This was the customary Jewish response to blasphemy, which in this case was appropriate because the apostles were wrongly being identified as gods.
  - type: text
    content: 'tore their robes and rushed out into the crowd, shouting, '
  '15':
  - type: text
    content: '“Men, why are you doing these things? We too are only men of the same nature as you, bringing the good news to you, so that you turn from these useless '
  - type: text
    content: and
  - type: text
    content: ' meaningless things to the living God, '
  - type: heading
    content: who made the heaven and the earth and the sea and everything that is in them
  - type: text
    content: '. [Ex 20:11; Ps 146:6] '
  '16':
  - type: text
    content: 'In generations past He permitted all the nations to go their own ways; '
  '17':
  - type: text
    content: 'yet He did not leave Himself without some witness [as evidence of Himself], in that He kept constantly doing good things '
  - type: text
    content: and
  - type: text
    content: ' showing you kindness, and giving you rains from heaven and productive seasons, filling your hearts with food and happiness.” '
  '18':
  - type: text
    content: Even saying these words, with difficulty they prevented the people from offering sacrifices to them.
  '19':
  - type: text
    content: 'But Jews arrived from Antioch and Iconium, and having won over the crowds, they stoned Paul and dragged him out of the city, thinking he was dead. [2 Cor 11:25; 2 Tim 3:11] '
  '2':
  - type: text
    content: 'but the unbelieving Jews [who rejected Jesus as Messiah] stirred up and embittered the minds of the Gentiles against the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers. '
  '20':
  - type: text
    content: 'But the disciples formed a circle around him, and he got up and went back into the city; and the next day he went on with Barnabas to Derbe. '
  '21':
  - type: text
    content: 'They preached the good news to that city and made many disciples, then they returned to Lystra and to Iconium and to Antioch, '
  '22':
  - type: text
    content: 'strengthening '
  - type: text
    content: and
  - type: text
    content: ' establishing the hearts of the disciples; encouraging them to remain firm in the faith, saying, “It is through many tribulations '
  - type: text
    content: and
  - type: text
    content: ' hardships that we must enter the kingdom of God.” '
  '23':
  - type: text
    content: When they had appointed elders for them in every church, having prayed with fasting, they entrusted them to the Lord in whom they believed [and joyfully accepted as the Messiah].
  '24':
  - type: text
    content: 'Then they passed through Pisidia and came to Pamphylia. '
  '25':
  - type: text
    content: 'When they had spoken the word [of salvation through faith in Christ] in Perga, they went down to Attalia. '
  '26':
  - type: text
    content: 'From there they sailed back to '
  - type: note
    content: This was the third largest city in the Roman Empire and was part of the province of Galatia.
  - type: text
    content: 'Antioch, where they had been entrusted to the grace of God for the '
  - type: note
    content: The first missionary journey lasted about eighteen months.
  - type: text
    content: 'work which they had now completed. '
  '27':
  - type: text
    content: 'Arriving '
  - type: text
    content: there,
  - type: text
    content: ' they gathered the church together and '
  - type: text
    content: began
  - type: text
    content: ' to report [in great detail] everything that God had done with them and how He had opened to the Gentiles a door of faith [in Jesus as the Messiah and Savior]. '
  '28':
  - type: text
    content: And they stayed there a long time with the disciples.
  '3':
  - type: text
    content: 'So Paul and Barnabas stayed for a long time, speaking boldly '
  - type: text
    content: and
  - type: text
    content: ' confidently for the Lord, who continued to testify to the word of His grace, granting that signs and wonders (attesting miracles) be done by them. '
  '4':
  - type: text
    content: 'But the people of the city were divided; some were '
  - type: text
    content: siding
  - type: text
    content: ' with the Jews, and some with the apostles. '
  '5':
  - type: text
    content: 'When there was an attempt by both the Gentiles and the Jews, together with their rulers, to shamefully mistreat and to stone them, '
  '6':
  - type: text
    content: 'they, aware of the situation, escaped to Lystra and Derbe, [taking refuge in the] cities of Lycaonia, and the neighboring region; '
  '7':
  - type: text
    content: and there they continued to preach the good news.
  '8':
  - type: text
    content: 'Now at Lystra a man sat who was unable to use his feet, for he was crippled from birth and had never walked. '
  '9':
  - type: text
    content: 'This man was listening to Paul as he spoke, and Paul looked intently at him and saw that he had faith to be healed, '
