    content: The Vision of Slaughter
  - type: text
    content: 'Then [in my vision] I heard Him cry out with a thunderous voice, saying, “Approach now, executioners of the city, each with his weapon of destruction in his hand.” '
  '10':
  - type: text
    content: But as for Me, My eye will have no pity, nor will I spare, but I will bring their [wicked] conduct upon their [own] heads.”
  '11':
