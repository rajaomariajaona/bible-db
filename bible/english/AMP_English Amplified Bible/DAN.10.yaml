document_id: DAN.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel Is Terrified by a Vision
  - type: text
    content: In the third year of Cyrus king of Persia a message was revealed to Daniel, who was named Belteshazzar; and the message was true and it referred to great conflict (warfare, misery). And he understood the message and had an understanding of the vision. [Dan 8:26; Rev 19:9]
  '10':
  - type: text
    content: 'Then behold, a hand touched me and set me unsteadily on my '
  - type: note
    content: Lit knees and on the palms of my hands.
  - type: text
    content: 'hands and knees. '
  '11':
  - type: text
    content: 'So he said to me, “O Daniel, you highly regarded '
  - type: text
    content: and
  - type: text
    content: ' greatly beloved man, understand the words that I am about to say to you and stand upright, for I have now been sent to you.” And while he was saying this word to me, I stood up trembling. '
  '12':
  - type: text
    content: 'Then he said to me, “Do not be afraid, Daniel, for from the first day that you set your heart on understanding this and on humbling yourself before your God, your words were heard, and I have come in response to your words. '
  '13':
  - type: text
    content: 'But the '
  - type: note
    content: I.e. an evil angel representing the interests of Satan in Persia.
  - type: text
    content: 'prince of the kingdom of Persia was standing in opposition to me for twenty-one days. Then, behold, Michael, one of the chief [of the celestial] princes, came to help me, for I had been left there with the kings of Persia. '
  '14':
  - type: text
    content: Now I have come to make you understand what will happen to your people in the latter days, for the vision is in regard to the days yet to come.”
  '15':
  - type: text
    content: 'When he had spoken to me according to these words, I turned my face toward the ground and was speechless. '
  '16':
  - type: text
    content: 'And behold, one who resembled the sons of men touched my lips. Then I opened my mouth and spoke and said to him who was standing before me, “O my lord, because of the vision anguish has come upon me, and I have retained no strength. '
  '17':
  - type: text
    content: For how can such a [weakened] servant of my lord talk with such [a being] as my lord? For now there remains no strength in me, nor has any breath been left in me.”
  '18':
  - type: text
    content: 'Then the one (Gabriel) whose appearance was like that of a man touched me again, and he strengthened me. '
  '19':
  - type: text
    content: 'He said, “O man, highly regarded '
  - type: text
    content: and
  - type: text
    content: ' greatly beloved, do not be afraid. Peace be to you; take courage and be strong.” Now when he had spoken to me, I was strengthened and said, “Let my lord speak, for you have strengthened me.” '
  '2':
  - type: text
    content: 'In those days I, Daniel, had been mourning for three entire weeks. '
  '20':
  - type: text
    content: 'Then he said, “Do you understand [fully] why I came to you? Now I shall return to fight against the [hostile] '
  - type: note
    content: See v 13.
  - type: text
    content: 'prince of Persia; and when I have gone, behold, the '
  - type: note
    content: I.e. an evil angel representing the interests of Satan in Greece.
  - type: text
    content: 'prince of Greece is about to come. '
  '21':
  - type: text
    content: 'But I (Gabriel) will tell you what is inscribed in the '
  - type: note
    content: Perhaps a reference to the book of the living (Ex 32:32, 33; Ps 69:28).
  - type: text
    content: 'writing of truth. There is no one who stands firmly with me '
  - type: text
    content: and
  - type: text
    content: ' strengthens himself against these [hostile spirit forces] except Michael, your prince [the guardian of your nation].'
  '3':
  - type: text
    content: 'I ate no tasty food, nor did any meat or wine enter my mouth; and I did not '
  - type: note
    content: I.e. apply perfumed oils or herbal ointments to refresh the body. As the ancient rabbis indicated, this may also imply that Daniel did not bathe, unless he was referring only to oiling his hair.
  - type: text
    content: 'anoint (refresh, groom) myself at all for the full three weeks. '
  '4':
  - type: text
    content: 'On the twenty-fourth day of the first month, as I was on the bank of the great river Hiddekel [which is the Tigris], '
  '5':
  - type: text
    content: 'I raised my eyes and looked, and behold, there was a '
  - type: note
    content: This is most likely the angel Gabriel since he was the heavenly being sent by God to Daniel on the previous occasions.
  - type: text
    content: 'certain man dressed in linen, whose loins were girded with [a '
  - type: note
    content: Over a man’s outer garment a type of belt or girdle was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things.
  - type: text
    content: 'belt of] pure gold of Uphaz. '
  '6':
  - type: text
    content: 'His body also was like beryl [with a golden luster], his face had the appearance of lightning, his eyes were like flaming torches, his arms and his feet like the gleam of burnished bronze, and the sound of his words was like the noise of a multitude [of people or the roaring of the sea]. [Rev 1:12-16; 19:6] '
  '7':
  - type: text
    content: 'And I, Daniel, alone saw the vision [of this heavenly being], for the men who were with me did not see the vision; nevertheless, a great panic overwhelmed them, so they ran away to hide themselves. '
  '8':
  - type: text
    content: 'So I was left alone and saw this great vision; yet no strength was left in me, for my normal appearance turned to a deathly pale, and I grew weak '
  - type: text
    content: and
  - type: text
    content: ' faint [with fright]. '
  '9':
  - type: text
    content: Then I heard the sound of his words; and when I heard the sound of his words, I fell on my face in a deep sleep, with my face toward the ground.
  - type: heading
    content: Daniel Comforted
