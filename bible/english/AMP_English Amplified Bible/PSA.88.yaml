document_id: PSA.88,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 88
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Petition to Be Saved from Death.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song. A Psalm of the sons of Korah. To the Chief Musician; set to chant mournfully. A didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem of Heman the Ezrahite.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of my salvation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have cried out [for help] by day and in the night before You. [Luke 18:7]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Will You perform wonders for the dead?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shall the departed spirits arise and praise You? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will Your lovingkindness be declared in the grave
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or Your faithfulness in Abaddon (the underworld)?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will Your wonders be known in the darkness?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your righteousness in the land of forgetfulness [where the dead forget and are forgotten]?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But I have cried out to You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for help;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in the morning my prayer will come to You.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', why do You reject me?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do You hide Your face from me? [Matt 27:46]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was afflicted and close to death from my youth on;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I suffer Your terrors; I am overcome.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your fierce wrath has swept over me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your terrors have destroyed me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have surrounded me like flood waters all day long;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have completely encompassed me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lover and friend You have placed far from me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My familiar friends are in darkness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let my prayer come before You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enter into Your presence;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incline Your ear to my cry!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my soul is full of troubles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my life draws near the grave (Sheol, the place of the dead).
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am counted among those who go down to the pit (grave);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a man who has no strength [a mere shadow],
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Set free
        - type: text
          text: . The ancient rabbis understood this to mean that once a man is dead, he is free from all religious duties.
      marker-yv: yv-n
    - type: text
      text: 'Cast away [from the living] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abandoned among the dead,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the slain who lie in a [nameless] grave,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom You no longer remember,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they are cut off from Your hand.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have laid me in the lowest pit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In dark places, in the depths.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wrath has rested heavily upon me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And You have afflicted me with all Your waves. [Ps 42:7] '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have put my friends far from me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have made me an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: abomination to them
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: object of loathing to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am shut up and I cannot go out.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eye grows dim with sorrow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I have called on You every day;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have spread out my hands to You [in prayer].
