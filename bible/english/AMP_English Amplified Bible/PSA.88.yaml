document_id: PSA.88,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 88
  - type: heading
    content: A Petition to Be Saved from Death.
  - type: text
    content: 'A Song. A Psalm of the sons of Korah. To the Chief Musician; set to chant mournfully. A didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem of Heman the Ezrahite.'
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', the God of my salvation,'
  - type: text
    content: I have cried out [for help] by day and in the night before You. [Luke 18:7]
  '10':
  - type: text
    content: ¶Will You perform wonders for the dead?
  - type: text
    content: 'Shall the departed spirits arise and praise You? '
  - type: text
    content: Selah.
  '11':
  - type: text
    content: Will Your lovingkindness be declared in the grave
  - type: text
    content: Or Your faithfulness in Abaddon (the underworld)?
  '12':
  - type: text
    content: Will Your wonders be known in the darkness?
  - type: text
    content: And Your righteousness in the land of forgetfulness [where the dead forget and are forgotten]?
  '13':
  - type: text
    content: ¶But I have cried out to You, O L
  - type: heading
    content: ord
  - type: text
    content: ', for help;'
  - type: text
    content: And in the morning my prayer will come to You.
  '14':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', why do You reject me?'
  - type: text
    content: Why do You hide Your face from me? [Matt 27:46]
  '15':
  - type: text
    content: I was afflicted and close to death from my youth on;
  - type: text
    content: I suffer Your terrors; I am overcome.
  '16':
  - type: text
    content: Your fierce wrath has swept over me;
  - type: text
    content: Your terrors have destroyed me.
  '17':
  - type: text
    content: They have surrounded me like flood waters all day long;
  - type: text
    content: They have completely encompassed me.
  '18':
  - type: text
    content: Lover and friend You have placed far from me;
  - type: text
    content: My familiar friends are in darkness.
  '2':
  - type: text
    content: 'Let my prayer come before You '
  - type: text
    content: and
  - type: text
    content: ' enter into Your presence;'
  - type: text
    content: Incline Your ear to my cry!
  '3':
  - type: text
    content: For my soul is full of troubles,
  - type: text
    content: And my life draws near the grave (Sheol, the place of the dead).
  '4':
  - type: text
    content: I am counted among those who go down to the pit (grave);
  - type: text
    content: I am like a man who has no strength [a mere shadow],
  '5':
  - type: text
    content: ' '
  - type: note
    content: Lit Set free. The ancient rabbis understood this to mean that once a man is dead, he is free from all religious duties.
  - type: text
    content: 'Cast away [from the living] '
  - type: text
    content: and
  - type: text
    content: ' abandoned among the dead,'
  - type: text
    content: Like the slain who lie in a [nameless] grave,
  - type: text
    content: Whom You no longer remember,
  - type: text
    content: And they are cut off from Your hand.
  '6':
  - type: text
    content: You have laid me in the lowest pit,
  - type: text
    content: In dark places, in the depths.
  '7':
  - type: text
    content: Your wrath has rested heavily upon me,
  - type: text
    content: 'And You have afflicted me with all Your waves. [Ps 42:7] '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: You have put my friends far from me;
  - type: text
    content: 'You have made me an '
  - type: note
    content: Lit abomination to them.
  - type: text
    content: object of loathing to them.
  - type: text
    content: I am shut up and I cannot go out.
  '9':
  - type: text
    content: My eye grows dim with sorrow.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', I have called on You every day;'
  - type: text
    content: I have spread out my hands to You [in prayer].
