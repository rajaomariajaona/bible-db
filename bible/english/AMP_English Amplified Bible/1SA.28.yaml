document_id: 1SA.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul and the Spirit Medium
  - type: text
    content: 'In those days the Philistines gathered their forces for war to fight against Israel. Achish said to David, “Understand for certain that you and your men will go out with me to battle.” '
  '10':
  - type: text
    content: Then Saul swore [an oath] to her by the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives, no punishment shall come upon you for this.” '
  '11':
  - type: text
    content: 'So the woman said, “Whom shall I bring up for you?” He said, “Bring up Samuel for me.” '
  '12':
  - type: text
    content: 'When the woman saw Samuel, she screamed with a loud voice; and she said to Saul, “Why have you deceived me? You are Saul!” '
  '13':
  - type: text
    content: 'The king said to her, “Do not be afraid; but [tell me] what do you see?” The woman said to Saul, “I see a '
  - type: note
    content: Or god.
  - type: text
    content: 'divine [superhuman] being coming up from the earth.” '
  '14':
  - type: text
    content: He said to her, “What is his appearance?” And she said, “An old man is coming up, wrapped in a robe.” Then Saul knew that it was Samuel, and he bowed with his face to the ground and paid respect [to him].
  '15':
  - type: text
    content: 'Then Samuel said to Saul, “Why have you disturbed me by bringing me up?” Saul answered, “I am greatly distressed; for the Philistines are making war against me, and God has left me and no longer answers me, either through prophets or by dreams; therefore I have called you to make known to me what I should do.” '
  '16':
  - type: text
    content: Samuel said, “Why then do you ask me, since the L
  - type: heading
    content: ord
  - type: text
    content: ' has left you and has become your enemy? '
  '17':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has done [to you] just as He said through me [when I was with you]; for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has torn the kingdom out of your hand and given it to your neighbor, to David. [1 Sam 15:22-28] '
  '18':
  - type: text
    content: Because you did not obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' and did not execute His fierce wrath on Amalek, therefore the L'
  - type: heading
    content: ord
  - type: text
    content: ' has done this thing to you this day. '
  '19':
  - type: text
    content: Moreover, the L
  - type: heading
    content: ord
  - type: text
    content: ' will also put Israel along with you into the hands of the Philistines, and tomorrow you and your sons will be with me [among the dead]. Indeed, the L'
  - type: heading
    content: ord
  - type: text
    content: ' will put the army of Israel into the hands of the Philistines.”'
  '2':
  - type: text
    content: David said to Achish, “All right, you shall know what your servant can do.” So Achish said to David, “Therefore I will make you my bodyguard for life.”
  '20':
  - type: text
    content: 'Then Saul immediately fell full length on the earth [floor of the medium’s house], and was very afraid because of Samuel’s words; '
  - type: note
    content: Lit there was no strength in him.
  - type: text
    content: 'and he was thoroughly exhausted because he had not eaten all day and all night. '
  '21':
  - type: text
    content: 'The woman came to Saul and saw that he was greatly troubled, and she said to him, “Look, your maidservant has obeyed you, and I have taken my life in my hand and have listened to everything you said to me. '
  '22':
  - type: text
    content: 'So now, please listen to the voice of your maidservant, and let me set a piece of bread before you, and eat, so that you may have strength when you go on your way.” '
  '23':
  - type: text
    content: 'But he refused and said, “I will not eat.” But his servants together with the woman urged him, and he [finally] listened to them. So he got up from the ground and sat on the bed. '
  '24':
  - type: text
    content: 'The woman had a fattened calf in the house; she quickly killed it, and took flour, kneaded it and baked unleavened bread. '
  '25':
  - type: text
    content: She brought it before Saul and his servants, and they ate. Then they got up and went away that night.
  '3':
  - type: text
    content: 'Now Samuel had died, and all Israel had mourned for him and buried him in Ramah, his own city. And Saul had removed the mediums and the spiritists (soothsayers) from the land. '
  '4':
  - type: text
    content: 'The Philistines assembled and came and camped at Shunem; and Saul gathered all the Israelites and they camped at Gilboa. '
  '5':
  - type: text
    content: 'When Saul saw the Philistine army, he was afraid and '
  - type: note
    content: Lit his heart trembled greatly.
  - type: text
    content: 'badly shaken. '
  '6':
  - type: text
    content: So Saul inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ', but the L'
  - type: heading
    content: ord
  - type: text
    content: ' did not answer him, either by dreams or by Urim [used like lots by the priest to determine the will of God] or by prophets. [Prov 1:24-30] '
  '7':
  - type: text
    content: Then Saul said to his servants, “Find for me a woman who is a medium [between the living and the dead], so that I may go to her and ask her advice.” His servants said to him, “There is a woman who is a medium at En-dor.”
  '8':
  - type: text
    content: 'So Saul disguised himself by wearing different clothes, and he left with two men, and they came to the woman at night. He said '
  - type: text
    content: to her,
  - type: text
    content: ' “Conjure up for me, please, and bring up [from the dead] for me [the spirit] whom I shall name to you.” '
  '9':
  - type: text
    content: 'But the woman said to him, “See here, you know what Saul has done, how he has cut off (eliminated) those who are mediums and spiritists from the land. So why are you laying a trap for my life, to cause my death?” '
