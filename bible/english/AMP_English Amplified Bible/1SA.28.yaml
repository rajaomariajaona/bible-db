document_id: 1SA.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Saul and the Spirit Medium
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days the Philistines gathered their forces for war to fight against Israel. Achish said to David, “Understand for certain that you and your men will go out with me to battle.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David said to Achish, “All right, you shall know what your servant can do.” So Achish said to David, “Therefore I will make you my bodyguard for life.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now Samuel had died, and all Israel had mourned for him and buried him in Ramah, his own city. And Saul had removed the mediums and the spiritists (soothsayers) from the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The Philistines assembled and came and camped at Shunem; and Saul gathered all the Israelites and they camped at Gilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Saul saw the Philistine army, he was afraid and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his heart trembled greatly
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'badly shaken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Saul inquired of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', but the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' did not answer him, either by dreams or by Urim [used like lots by the priest to determine the will of God] or by prophets. [Prov 1:24-30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then Saul said to his servants, “Find for me a woman who is a medium [between the living and the dead], so that I may go to her and ask her advice.” His servants said to him, “There is a woman who is a medium at En-dor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Saul disguised himself by wearing different clothes, and he left with two men, and they came to the woman at night. He said '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to her,
  - type: text
    text: ' “Conjure up for me, please, and bring up [from the dead] for me [the spirit] whom I shall name to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But the woman said to him, “See here, you know what Saul has done, how he has cut off (eliminated) those who are mediums and spiritists from the land. So why are you laying a trap for my life, to cause my death?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then Saul swore [an oath] to her by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “As the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, no punishment shall come upon you for this.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So the woman said, “Whom shall I bring up for you?” He said, “Bring up Samuel for me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the woman saw Samuel, she screamed with a loud voice; and she said to Saul, “Why have you deceived me? You are Saul!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The king said to her, “Do not be afraid; but [tell me] what do you see?” The woman said to Saul, “I see a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: god
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'divine [superhuman] being coming up from the earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He said to her, “What is his appearance?” And she said, “An old man is coming up, wrapped in a robe.” Then Saul knew that it was Samuel, and he bowed with his face to the ground and paid respect [to him].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Samuel said to Saul, “Why have you disturbed me by bringing me up?” Saul answered, “I am greatly distressed; for the Philistines are making war against me, and God has left me and no longer answers me, either through prophets or by dreams; therefore I have called you to make known to me what I should do.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Samuel said, “Why then do you ask me, since the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has left you and has become your enemy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has done [to you] just as He said through me [when I was with you]; for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has torn the kingdom out of your hand and given it to your neighbor, to David. [1 Sam 15:22-28] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Because you did not obey the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and did not execute His fierce wrath on Amalek, therefore the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has done this thing to you this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moreover, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will also put Israel along with you into the hands of the Philistines, and tomorrow you and your sons will be with me [among the dead]. Indeed, the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will put the army of Israel into the hands of the Philistines.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Saul immediately fell full length on the earth [floor of the medium’s house], and was very afraid because of Samuel’s words; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: there was no strength in him
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and he was thoroughly exhausted because he had not eaten all day and all night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The woman came to Saul and saw that he was greatly troubled, and she said to him, “Look, your maidservant has obeyed you, and I have taken my life in my hand and have listened to everything you said to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So now, please listen to the voice of your maidservant, and let me set a piece of bread before you, and eat, so that you may have strength when you go on your way.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But he refused and said, “I will not eat.” But his servants together with the woman urged him, and he [finally] listened to them. So he got up from the ground and sat on the bed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The woman had a fattened calf in the house; she quickly killed it, and took flour, kneaded it and baked unleavened bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: She brought it before Saul and his servants, and they ate. Then they got up and went away that night.
