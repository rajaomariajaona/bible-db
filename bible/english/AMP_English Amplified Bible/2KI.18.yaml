document_id: 2KI.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Reigns over Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came about in the third year of Hoshea the son of Elah king of Israel, Hezekiah the son of Ahaz king of Judah became king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He was twenty-five years old when he became king, and he reigned twenty-nine years in Jerusalem. His mother’s name was Abi the daughter of Zechariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Hezekiah did right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in accordance with everything that David his father (ancestor) had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He removed the high places [of pagan worship], broke down the images (memorial stones) and cut down the Asherim. He also crushed to pieces the bronze serpent that Moses had made, for until those days the Israelites had burned incense to it; and it was called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The bronze serpent had served God’s purpose for it, and Hezekiah observed correctly that it was nothing more than a piece of art. Unfortunately, the Israelites had forgotten that the serpent had been nothing more than a tool of God, and they had been worshiping the sculpture itself as if it were a god.
    marker-yv: yv-n
  - type: text
    text: 'Nehushtan [a bronze sculpture]. [Num 21:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hezekiah trusted in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied confidently on the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel; so that after him there was no one like him among all the kings of Judah, nor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: among those
  - type: text
    text: ' who were before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For he clung to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; he did not turn away from [faithfully] following Him, but he kept His commandments, which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah Victorious
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was with Hezekiah; he was successful wherever he went. And he rebelled against the king of Assyria and refused to serve him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He defeated the Philistines as far as Gaza [the most distant city] and its borders, from the [isolated] lookout tower to the [populous] fortified city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now in the fourth year of King Hezekiah, which was the seventh of Hoshea the son of Elah king of Israel, Shalmaneser the king of Assyria went up against Samaria and besieged it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'At the end of three years they captured it; in the sixth year of Hezekiah, which was the ninth year of Hoshea the king of Israel, Samaria was taken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the king of Assyria sent Israel into exile to Assyria, and put them in Halah, and on the Habor, the river of [the city of] Gozan, and in the cities of the Medes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: because they did not obey the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God, but broke His covenant, everything that Moses the servant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded; and they would not listen nor do it.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Invasion of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In the fourteenth year of King Hezekiah, Sennacherib king of Assyria went up against all the fortified cities of Judah [except Jerusalem] and captured them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Hezekiah king of Judah sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to the king of Assyria at Lachish, saying, “I have done wrong. Withdraw from me; whatever you impose on me I will bear.” So the king of Assyria imposed on Hezekiah king of Judah [a tribute tax of] three hundred talents of silver and thirty talents of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hezekiah gave him all the silver that was found in the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and in the treasuries of the king’s house (palace). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'At that time Hezekiah cut away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the gold framework from
  - type: text
    text: ' the doors of the temple of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and from the doorposts which '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hezekiah king of Judah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: he had overlaid, and gave it to the king of Assyria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the king of Assyria sent '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably Assyrian titles instead of proper names.
    marker-yv: yv-n
  - type: text
    text: 'the Tartan and the Rab-saris and the Rabshakeh [his highest officials] with a large army, from Lachish to King Hezekiah at Jerusalem. They went up and came to Jerusalem, and when they went up and arrived, they stood by the aqueduct of the upper pool, which is on the road of the Fuller’s Field. [2 Chr 32:9-19; Is 36:1-22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When they called for the king, Eliakim the son of Hilkiah, who was in charge of the [king’s] household, and Shebna the scribe, and Joah the son of Asaph the secretary went out to [meet] them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the Rabshakeh said to them, “Say to Hezekiah, ‘Thus says the great king, the king of Assyria, “What is [the reason for] this confidence that you have? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You say (but they are only empty words) ‘
  - type: usfm
    marker: it
    children:
    - type: text
      text: I have
  - type: text
    text: ' counsel and strength for the war.’ Now on whom do you rely, that you have rebelled against me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now pay attention: you are relying on Egypt, on that staff of crushed reed; if a man leans on it, it will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' go into his hand and pierce it. So is Pharaoh king of Egypt to all who trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if you tell me, ‘We trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God,’ is it not He whose high places and altars Hezekiah has removed, and has said to Judah and Jerusalem, ‘You shall worship [only] before this altar in Jerusalem’? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now then, make a bargain with my lord the king of Assyria, and I will give you two thousand horses, if on your part you can put riders on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'How then can you drive back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' one official of the least of my master’s servants, when you rely on Egypt for chariots and horsemen? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Now have I come up against this place to destroy it without the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' approval? The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘Go up against this land and destroy it.’ ” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Eliakim the son of Hilkiah, and Shebna and Joah, said to the Rabshakeh, “Please speak to your servants in the Aramaic (Syrian) language, because we understand it; and do not speak with us in the Judean (Hebrew) language in the hearing of the people who are on the wall.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But the Rabshakeh said to them, “Has my master sent me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' to your master and to you to say these things? Has he not sent me to the men who sit on the wall, [who are doomed by the siege] to eat their own excrement and drink their own urine along with you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the Rabshakeh stood and shouted out with a loud voice in Judean (Hebrew), “Hear the word of the great king, the king of Assyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Thus says the king, ‘Do not let Hezekiah deceive you, for he will not be able to rescue you from my hand; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'nor let Hezekiah make you trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will certainly rescue us, and this city [of Jerusalem] will not be given into the hand of the king of Assyria.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Do not listen to Hezekiah, for thus says the king of Assyria: “Surrender to me and come out to [meet] me, and every man may eat from his own vine and fig tree, and every man may drink the waters of his own well, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'until I come and take you away to a land like your own land, a land of grain and new wine, a land of bread and vineyards, a land of olive trees and honey, so that you may live and not die.” Do not listen to Hezekiah when he misleads '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incites you, saying, “The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will rescue us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Has any one of the gods of the nations ever rescued his land from the hand of the king of Assyria? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Where are the gods of Hamath and Arpad [in Aram]? Where are the gods of Sepharvaim, Hena, and Ivvah [in the valley of the Euphrates]? Have they rescued Samaria (Israel’s capital) from my hand? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Who among all the gods of the lands have rescued their lands from my hand, that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' would rescue Jerusalem from my hand?’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'But the people kept silent and did not answer him, for the king had commanded, “Do not answer him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Then Eliakim the son of Hilkiah, who was in charge of the [royal] household, and Shebna the scribe and Joah the son of Asaph the secretary, came to Hezekiah with their clothes torn [in grief and despair] and told him what the Rabshakeh had said.
