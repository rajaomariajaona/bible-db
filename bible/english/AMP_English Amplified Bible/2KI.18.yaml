document_id: 2KI.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Reigns over Judah
  - type: text
    content: 'Now it came about in the third year of Hoshea the son of Elah king of Israel, Hezekiah the son of Ahaz king of Judah became king. '
  '10':
  - type: text
    content: 'At the end of three years they captured it; in the sixth year of Hezekiah, which was the ninth year of Hoshea the king of Israel, Samaria was taken. '
  '11':
  - type: text
    content: 'Then the king of Assyria sent Israel into exile to Assyria, and put them in Halah, and on the Habor, the river of [the city of] Gozan, and in the cities of the Medes, '
  '12':
  - type: text
    content: because they did not obey the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' their God, but broke His covenant, everything that Moses the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded; and they would not listen nor do it.'
  - type: heading
    content: Invasion of Judah
  '13':
  - type: text
    content: 'In the fourteenth year of King Hezekiah, Sennacherib king of Assyria went up against all the fortified cities of Judah [except Jerusalem] and captured them. '
  '14':
  - type: text
    content: 'Then Hezekiah king of Judah sent '
  - type: text
    content: word
  - type: text
    content: ' to the king of Assyria at Lachish, saying, “I have done wrong. Withdraw from me; whatever you impose on me I will bear.” So the king of Assyria imposed on Hezekiah king of Judah [a tribute tax of] three hundred talents of silver and thirty talents of gold. '
  '15':
  - type: text
    content: Hezekiah gave him all the silver that was found in the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ', and in the treasuries of the king’s house (palace). '
  '16':
  - type: text
    content: 'At that time Hezekiah cut away '
  - type: text
    content: the gold framework from
  - type: text
    content: ' the doors of the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and from the doorposts which '
  - type: note
    content: Lit Hezekiah king of Judah.
  - type: text
    content: he had overlaid, and gave it to the king of Assyria.
  '17':
  - type: text
    content: 'Then the king of Assyria sent '
  - type: note
    content: Probably Assyrian titles instead of proper names.
  - type: text
    content: 'the Tartan and the Rab-saris and the Rabshakeh [his highest officials] with a large army, from Lachish to King Hezekiah at Jerusalem. They went up and came to Jerusalem, and when they went up and arrived, they stood by the aqueduct of the upper pool, which is on the road of the Fuller’s Field. [2 Chr 32:9-19; Is 36:1-22] '
  '18':
  - type: text
    content: When they called for the king, Eliakim the son of Hilkiah, who was in charge of the [king’s] household, and Shebna the scribe, and Joah the son of Asaph the secretary went out to [meet] them.
  '19':
  - type: text
    content: 'Then the Rabshakeh said to them, “Say to Hezekiah, ‘Thus says the great king, the king of Assyria, “What is [the reason for] this confidence that you have? '
  '2':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned twenty-nine years in Jerusalem. His mother’s name was Abi the daughter of Zechariah. '
  '20':
  - type: text
    content: You say (but they are only empty words) ‘
  - type: text
    content: I have
  - type: text
    content: ' counsel and strength for the war.’ Now on whom do you rely, that you have rebelled against me? '
  '21':
  - type: text
    content: 'Now pay attention: you are relying on Egypt, on that staff of crushed reed; if a man leans on it, it will '
  - type: text
    content: only
  - type: text
    content: ' go into his hand and pierce it. So is Pharaoh king of Egypt to all who trust '
  - type: text
    content: and
  - type: text
    content: ' rely on him. '
  '22':
  - type: text
    content: 'But if you tell me, ‘We trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God,’ is it not He whose high places and altars Hezekiah has removed, and has said to Judah and Jerusalem, ‘You shall worship [only] before this altar in Jerusalem’? '
  '23':
  - type: text
    content: 'Now then, make a bargain with my lord the king of Assyria, and I will give you two thousand horses, if on your part you can put riders on them. '
  '24':
  - type: text
    content: 'How then can you drive back '
  - type: text
    content: even
  - type: text
    content: ' one official of the least of my master’s servants, when you rely on Egypt for chariots and horsemen? '
  '25':
  - type: text
    content: Now have I come up against this place to destroy it without the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' approval? The L'
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘Go up against this land and destroy it.’ ” ’ ”'
  '26':
  - type: text
    content: 'Then Eliakim the son of Hilkiah, and Shebna and Joah, said to the Rabshakeh, “Please speak to your servants in the Aramaic (Syrian) language, because we understand it; and do not speak with us in the Judean (Hebrew) language in the hearing of the people who are on the wall.” '
  '27':
  - type: text
    content: 'But the Rabshakeh said to them, “Has my master sent me '
  - type: text
    content: only
  - type: text
    content: ' to your master and to you to say these things? Has he not sent me to the men who sit on the wall, [who are doomed by the siege] to eat their own excrement and drink their own urine along with you?”'
  '28':
  - type: text
    content: 'Then the Rabshakeh stood and shouted out with a loud voice in Judean (Hebrew), “Hear the word of the great king, the king of Assyria. '
  '29':
  - type: text
    content: 'Thus says the king, ‘Do not let Hezekiah deceive you, for he will not be able to rescue you from my hand; '
  '3':
  - type: text
    content: Hezekiah did right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with everything that David his father (ancestor) had done. '
  '30':
  - type: text
    content: 'nor let Hezekiah make you trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on the L'
  - type: heading
    content: ord
  - type: text
    content: ', saying, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' will certainly rescue us, and this city [of Jerusalem] will not be given into the hand of the king of Assyria.” '
  '31':
  - type: text
    content: 'Do not listen to Hezekiah, for thus says the king of Assyria: “Surrender to me and come out to [meet] me, and every man may eat from his own vine and fig tree, and every man may drink the waters of his own well, '
  '32':
  - type: text
    content: 'until I come and take you away to a land like your own land, a land of grain and new wine, a land of bread and vineyards, a land of olive trees and honey, so that you may live and not die.” Do not listen to Hezekiah when he misleads '
  - type: text
    content: and
  - type: text
    content: ' incites you, saying, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' will rescue us!” '
  '33':
  - type: text
    content: 'Has any one of the gods of the nations ever rescued his land from the hand of the king of Assyria? '
  '34':
  - type: text
    content: 'Where are the gods of Hamath and Arpad [in Aram]? Where are the gods of Sepharvaim, Hena, and Ivvah [in the valley of the Euphrates]? Have they rescued Samaria (Israel’s capital) from my hand? '
  '35':
  - type: text
    content: Who among all the gods of the lands have rescued their lands from my hand, that the L
  - type: heading
    content: ord
  - type: text
    content: ' would rescue Jerusalem from my hand?’ ”'
  '36':
  - type: text
    content: 'But the people kept silent and did not answer him, for the king had commanded, “Do not answer him.” '
  '37':
  - type: text
    content: Then Eliakim the son of Hilkiah, who was in charge of the [royal] household, and Shebna the scribe and Joah the son of Asaph the secretary, came to Hezekiah with their clothes torn [in grief and despair] and told him what the Rabshakeh had said.
  '4':
  - type: text
    content: 'He removed the high places [of pagan worship], broke down the images (memorial stones) and cut down the Asherim. He also crushed to pieces the bronze serpent that Moses had made, for until those days the Israelites had burned incense to it; and it was called '
  - type: note
    content: The bronze serpent had served God’s purpose for it, and Hezekiah observed correctly that it was nothing more than a piece of art. Unfortunately, the Israelites had forgotten that the serpent had been nothing more than a tool of God, and they had been worshiping the sculpture itself as if it were a god.
  - type: text
    content: 'Nehushtan [a bronze sculpture]. [Num 21:8] '
  '5':
  - type: text
    content: 'Hezekiah trusted in '
  - type: text
    content: and
  - type: text
    content: ' relied confidently on the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel; so that after him there was no one like him among all the kings of Judah, nor '
  - type: text
    content: among those
  - type: text
    content: ' who were before him. '
  '6':
  - type: text
    content: For he clung to the L
  - type: heading
    content: ord
  - type: text
    content: ; he did not turn away from [faithfully] following Him, but he kept His commandments, which the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  - type: heading
    content: Hezekiah Victorious
  '7':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' was with Hezekiah; he was successful wherever he went. And he rebelled against the king of Assyria and refused to serve him. '
  '8':
  - type: text
    content: He defeated the Philistines as far as Gaza [the most distant city] and its borders, from the [isolated] lookout tower to the [populous] fortified city.
  '9':
  - type: text
    content: 'Now in the fourth year of King Hezekiah, which was the seventh of Hoshea the son of Elah king of Israel, Shalmaneser the king of Assyria went up against Samaria and besieged it. '
