    - type: usfm
      marker: it
      children:
      - type: text
        text: The Pharisees Rebuked
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a demon-possessed man who was blind and mute was brought to Jesus, and He healed him, so that the mute man both spoke and saw. [Mark 3:22-27; Luke 11:14, 15] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the people wondered in amazement, and said, “Could this be the Son of David (the Messiah)?” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Pharisees heard it and said, “This man '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A statement of blasphemy against the Holy Spirit. See vv 31, 32.
      marker-yv: yv-n
    - type: text
      text: casts out demons only by [the help of] Beelzebul (Satan) the prince of the demons.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Knowing their thoughts Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Any kingdom that is divided against itself is being laid waste; and no city or house divided against itself will
    - type: text
      text: ' [continue to] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: stand.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If Satan casts out Satan
    - type: text
      text: ' [that is, his demons], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'he has become divided against himself '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' disunited; how then will his kingdom stand?'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I cast out the demons by
    - type: text
      text: ' [the help of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Beelzebul (Satan), by whom do your sons drive them out? For this reason they will be your judges.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if it is by the Spirit of God that I cast out the demons, then the kingdom of God has come upon you
    - type: text
      text: ' [before you expected it]. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Or how can anyone go into a strong man’s house and steal his property unless he first overpowers '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' ties up the strong man? Then he will ransack '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' rob his house.'
    - type: text
      text: ' [Is 49:24, 25; Mark 3:27]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Unpardonable Sin
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have you not read
    - type: text
      text: ' [in the Scriptures] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: what David did when he was hungry, he and those who accompanied him—
    - type: text
      text: ' [Lev 24:9; 1 Sam 21:1-6] '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He who is not with Me
    - type: text
      text: ' [once and for all on My side] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is against Me; and he who does not
    - type: text
      text: ' [unequivocally] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: gather with Me scatters.
    - type: text
      text: ' [Luke 9:50; 11:23]'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Therefore I say to you, every sin and blasphemy
    - type: text
      text: ' [every evil, abusive, injurious speaking, or indignity against sacred things] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'will be forgiven people, but '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Blasphemy of the Holy Spirit is denying all the work of the Holy Spirit. This leads ultimately to rejecting the deity of Christ.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: blasphemy against the
    - type: text
      text: ' [Holy] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Spirit will not be forgiven.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever speaks a word against the Son of Man will be forgiven; but whoever speaks against the Holy Spirit
    - type: text
      text: ' [by attributing the miracles done by Me to Satan] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'will not be forgiven, either in this age or in the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: age
      - type: text
        text: ' to come.'
    - type: text
      text: ' [Mark 3:29; Luke 12:10]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Words Reveal Character
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Either make the tree good and its fruit good, or make the tree bad and its fruit bad; for the tree is recognized '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' judged by its fruit.'
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You brood of vipers, how can you speak good things when you are evil? For the mouth speaks out of that which fills the heart.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The good man, from his
    - type: text
      text: ' [inner] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: good treasure, brings out good things; and the evil man, from his
    - type: text
      text: ' [inner] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: evil treasure, brings out evil things.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But I tell you, on the day of judgment people will have to give an accounting for every careless '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' useless word they speak.'
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For by your words
    - type: text
      text: ' [reflecting your spiritual condition] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'you will be justified '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' acquitted of the guilt of sin; and by your words'
    - type: text
      text: ' [rejecting Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'you will be condemned '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' sentenced.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Desire for Signs
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then some of the scribes and Pharisees said to Him, “Teacher, we want to see a sign (attesting miracle) from You [proving that You are what You claim to be].” '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He replied and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “An evil and adulterous generation
    - type: text
      text: ' [that is morally unfaithful to God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'craves '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' demands a'
    - type: text
      text: ' [miraculous] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sign; but no sign will be given to it except the sign of the prophet Jonah;
    - type: text
      text: ' [Luke 11:29-32] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'how he went into the house of God, and they ate the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The bread of the Presence, the twelve fresh loaves presented each Sabbath to the Lord in the Holy Place.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: consecrated bread, which was not lawful for him to eat nor for those with him, but for the priests only?
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for just as J
      - type: usfm
        marker: sc
        children:
        - type: text
          text: onah was three days and three nights in the belly of the sea monster
      - type: text
        text: ', so will the Son of Man be three days and three nights in the heart of the earth.'
    - type: text
      text: ' [Jon 1:17] '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The men of Nineveh will stand up
    - type: text
      text: ' [as witnesses] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: at the judgment against this generation, and will condemn it because they repented at the preaching of Jonah; and now, something greater than Jonah is here.
    - type: text
      text: ' [Jon 3:5] '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Queen of the South (Sheba) will stand up
    - type: text
      text: ' [as a witness] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: at the judgment against this generation, and will condemn it because she came from the ends of the earth to listen to the wisdom of Solomon; and now, something greater than Solomon is here.
    - type: text
      text: ' [1 Kin 10:1; 2 Chr 9:1]'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now when the unclean spirit has gone out of a man, it roams through waterless (dry, arid) places in search of rest, but it does not find it.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then it says, ‘I will return to my house from which I came.’ And when it arrives, it finds '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the place
      - type: text
        text: ' unoccupied, swept, and put in order.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then it goes and brings with it seven other spirits more wicked than itself, and they go in and make their home there. And the last condition of that man becomes worse than the first. So will it also be with this wicked generation.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
