  '22':
  - type: text
    content: 'Then a demon-possessed man who was blind and mute was brought to Jesus, and He healed him, so that the mute man both spoke and saw. [Mark 3:22-27; Luke 11:14, 15] '
  '23':
  - type: text
    content: 'All the people wondered in amazement, and said, “Could this be the Son of David (the Messiah)?” '
  '24':
  - type: text
    content: 'But the Pharisees heard it and said, “This man '
  - type: note
    content: A statement of blasphemy against the Holy Spirit. See vv 31, 32.
  - type: text
    content: casts out demons only by [the help of] Beelzebul (Satan) the prince of the demons.”
  '25':
  - type: text
    content: 'Knowing their thoughts Jesus said to them, '
  - type: text
    content: “Any kingdom that is divided against itself is being laid waste; and no city or house divided against itself will
  - type: text
    content: ' [continue to] '
  - type: text
    content: stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: If Satan casts out Satan
  - type: text
    content: ' [that is, his demons], '
  - type: text
    content: 'he has become divided against himself '
  - type: text
    content: and
  - type: text
    content: ' disunited; how then will his kingdom stand?'
  - type: text
    content: ' '
  '27':
  - type: text
    content: If I cast out the demons by
  - type: text
    content: ' [the help of] '
  - type: text
    content: Beelzebul (Satan), by whom do your sons drive them out? For this reason they will be your judges.
  - type: text
    content: ' '
  '28':
  - type: text
    content: But if it is by the Spirit of God that I cast out the demons, then the kingdom of God has come upon you
  - type: text
    content: ' [before you expected it]. '
  '29':
  - type: text
    content: 'Or how can anyone go into a strong man’s house and steal his property unless he first overpowers '
  - type: text
    content: and
  - type: text
    content: ' ties up the strong man? Then he will ransack '
  - type: text
    content: and
  - type: text
    content: ' rob his house.'
  - type: text
    content: ' [Is 49:24, 25; Mark 3:27]'
  - type: heading
    content: The Unpardonable Sin
  '3':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Have you not read
  - type: text
    content: ' [in the Scriptures] '
  - type: text
    content: what David did when he was hungry, he and those who accompanied him—
  - type: text
    content: ' [Lev 24:9; 1 Sam 21:1-6] '
  '30':
  - type: text
    content: ' '
  - type: text
    content: He who is not with Me
  - type: text
    content: ' [once and for all on My side] '
  - type: text
    content: is against Me; and he who does not
  - type: text
    content: ' [unequivocally] '
  - type: text
    content: gather with Me scatters.
  - type: text
    content: ' [Luke 9:50; 11:23]'
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Therefore I say to you, every sin and blasphemy
  - type: text
    content: ' [every evil, abusive, injurious speaking, or indignity against sacred things] '
  - type: text
    content: 'will be forgiven people, but '
  - type: note
    content: Blasphemy of the Holy Spirit is denying all the work of the Holy Spirit. This leads ultimately to rejecting the deity of Christ.
  - type: text
    content: blasphemy against the
  - type: text
    content: ' [Holy] '
  - type: text
    content: Spirit will not be forgiven.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Whoever speaks a word against the Son of Man will be forgiven; but whoever speaks against the Holy Spirit
  - type: text
    content: ' [by attributing the miracles done by Me to Satan] '
  - type: text
    content: 'will not be forgiven, either in this age or in the '
  - type: text
    content: age
  - type: text
    content: ' to come.'
  - type: text
    content: ' [Mark 3:29; Luke 12:10]'
  - type: heading
    content: Words Reveal Character
  '33':
  - type: text
    content: ' '
  - type: text
    content: '“Either make the tree good and its fruit good, or make the tree bad and its fruit bad; for the tree is recognized '
  - type: text
    content: and
  - type: text
    content: ' judged by its fruit.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: You brood of vipers, how can you speak good things when you are evil? For the mouth speaks out of that which fills the heart.
  - type: text
    content: ' '
  '35':
  - type: text
    content: The good man, from his
  - type: text
    content: ' [inner] '
  - type: text
    content: good treasure, brings out good things; and the evil man, from his
  - type: text
    content: ' [inner] '
  - type: text
    content: evil treasure, brings out evil things.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'But I tell you, on the day of judgment people will have to give an accounting for every careless '
  - type: text
    content: or
  - type: text
    content: ' useless word they speak.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: For by your words
  - type: text
    content: ' [reflecting your spiritual condition] '
  - type: text
    content: 'you will be justified '
  - type: text
    content: and
  - type: text
    content: ' acquitted of the guilt of sin; and by your words'
  - type: text
    content: ' [rejecting Me] '
  - type: text
    content: 'you will be condemned '
  - type: text
    content: and
  - type: text
    content: ' sentenced.”'
  - type: heading
    content: The Desire for Signs
  '38':
  - type: text
    content: 'Then some of the scribes and Pharisees said to Him, “Teacher, we want to see a sign (attesting miracle) from You [proving that You are what You claim to be].” '
  '39':
  - type: text
    content: 'But He replied and said to them, '
  - type: text
    content: “An evil and adulterous generation
  - type: text
    content: ' [that is morally unfaithful to God] '
  - type: text
    content: 'craves '
  - type: text
    content: and
  - type: text
    content: ' demands a'
  - type: text
    content: ' [miraculous] '
  - type: text
    content: sign; but no sign will be given to it except the sign of the prophet Jonah;
  - type: text
    content: ' [Luke 11:29-32] '
  '4':
  - type: text
    content: 'how he went into the house of God, and they ate the '
  - type: note
    content: The bread of the Presence, the twelve fresh loaves presented each Sabbath to the Lord in the Holy Place.
  - type: text
    content: consecrated bread, which was not lawful for him to eat nor for those with him, but for the priests only?
  - type: text
    content: ' '
  '40':
  - type: text
    content: for just as J
  - type: heading
    content: onah was three days and three nights in the belly of the sea monster
  - type: text
    content: ', so will the Son of Man be three days and three nights in the heart of the earth.'
  - type: text
    content: ' [Jon 1:17] '
  '41':
  - type: text
    content: The men of Nineveh will stand up
  - type: text
    content: ' [as witnesses] '
  - type: text
    content: at the judgment against this generation, and will condemn it because they repented at the preaching of Jonah; and now, something greater than Jonah is here.
  - type: text
    content: ' [Jon 3:5] '
  '42':
  - type: text
    content: The Queen of the South (Sheba) will stand up
  - type: text
    content: ' [as a witness] '
  - type: text
    content: at the judgment against this generation, and will condemn it because she came from the ends of the earth to listen to the wisdom of Solomon; and now, something greater than Solomon is here.
  - type: text
    content: ' [1 Kin 10:1; 2 Chr 9:1]'
  '43':
  - type: text
    content: ' '
  - type: text
    content: “Now when the unclean spirit has gone out of a man, it roams through waterless (dry, arid) places in search of rest, but it does not find it.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Then it says, ‘I will return to my house from which I came.’ And when it arrives, it finds '
  - type: text
    content: the place
  - type: text
    content: ' unoccupied, swept, and put in order.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: Then it goes and brings with it seven other spirits more wicked than itself, and they go in and make their home there. And the last condition of that man becomes worse than the first. So will it also be with this wicked generation.”
  - type: heading
    content: Changed Relationships
  '46':
  - type: text
    content: 'While He was still talking to the crowds, it happened that His mother and brothers stood outside, asking to speak to Him. [Mark 3:31-35; Luke 8:19-21] '
  '47':
  - type: text
    content: 'Someone said to Him, “Look! Your mother and Your brothers are standing outside asking to speak to You.” '
  '48':
  - type: text
    content: 'But Jesus replied to the one who told Him, '
  - type: text
    content: “Who is My mother and who are My brothers?”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'And stretching out His hand toward His disciples [and all His other followers], He said, '
  - type: text
    content: “Here are My mother and My brothers!
  - type: text
    content: ' '
  '5':
  - type: text
    content: Or have you not read in the Law, that on the Sabbath the priests in the temple break
  - type: text
    content: ' [the sanctity of] '
  - type: text
    content: the Sabbath and yet are innocent?
  - type: text
    content: ' [Num 28:9, 10] '
  '50':
  - type: text
    content: 'For '
  - type: note
    content: A universal offer without restriction.
  - type: text
    content: whoever does the will of My Father who is in heaven
  - type: text
    content: ' [by believing in Me, and following Me] '
  - type: text
    content: is My brother and sister and mother.”
  '6':
  - type: text
    content: But I tell you that something greater than the temple is here.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And if you had only known what this statement means, ‘I '
  - type: heading
    content: desire compassion
  - type: text
    content: ' [for those in distress], '
  - type: note
    content: I.e. more than.
  - type: heading
    content: and not
  - type: text
    content: ' [animal] '
  - type: heading
    content: sacrifice
  - type: text
    content: ',’ you would not have condemned the innocent.'
  - type: text
    content: ' [Hos 6:6; Matt 9:13]'
  - type: heading
    content: Lord of the Sabbath
  '8':
  - type: text
    content: ' '
  - type: text
    content: For the Son of Man is Lord of the Sabbath.”
  '9':
  - type: text
    content: 'Leaving there, He went into their synagogue. [Mark 3:1-6; Luke 6:6-11] '
