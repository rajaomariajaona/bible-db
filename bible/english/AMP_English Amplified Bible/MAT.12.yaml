  '2':
  - type: text
    content: 'But when the Pharisees saw this, they said to Him, “Look! Your disciples are doing what '
  - type: note
    content: Picking grain to eat was not forbidden on the Sabbath. It was ridiculous for the Pharisees to try to equate gleaning for food with reaping a harvest (which was forbidden on the Sabbath).
  - type: text
