  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Pharisees saw this, they said to Him, “Look! Your disciples are doing what '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Picking grain to eat was not forbidden on the Sabbath. It was ridiculous for the Pharisees to try to equate gleaning for food with reaping a harvest (which was forbidden on the Sabbath).
      marker-yv: yv-n
    - type: text
      text: 'is unlawful on the Sabbath.” [Ex 20:10; 23:12; Deut 5:14] '
  '20':
