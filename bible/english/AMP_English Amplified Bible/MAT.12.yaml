  '1':
  - type: heading
    content: Sabbath Questions
  - type: text
    content: 'At that particular time Jesus went through the grainfields on the '
  - type: note
    content: The seventh day of the week, the day of worship.
  - type: text
    content: 'Sabbath, and His disciples were hungry and began to pick the heads of grain and eat them. [Deut 23:25; Mark 2:23-28; Luke 6:1-5] '
  '10':
  - type: text
    content: 'A man '
  - type: text
    content: was there
  - type: text
    content: ' whose hand was withered. And they asked Jesus, “Is it lawful '
  - type: text
    content: and
  - type: text
    content: ' permissible to heal on the Sabbath?”—'
  - type: text
    content: they asked this
  - type: text
    content: ' so that they might accuse Him '
  - type: text
    content: and
  - type: text
    content: ' bring charges into court. '
  '11':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: “What man is there among you who, if he has only one sheep and it falls into a pit on the Sabbath, will not take hold of it and lift it out?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'How much more valuable then is a man than a sheep! So it is lawful '
  - type: text
    content: and
  - type: text
    content: ' permissible to do good on the Sabbath.”'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then He said to the man, '
  - type: text
    content: “Reach out your hand!”
  - type: text
    content: ' The man reached out and it was restored, as normal '
  - type: text
    content: and
  - type: text
    content: ' healthy as the other. '
  '14':
  - type: text
    content: 'But the Pharisees went out and conspired against Him, '
  - type: text
    content: discussing
  - type: text
    content: ' how they could destroy Him.'
  '15':
  - type: text
    content: 'Being aware of this, Jesus left there. Many followed Him, and He healed all of them [who were sick], '
