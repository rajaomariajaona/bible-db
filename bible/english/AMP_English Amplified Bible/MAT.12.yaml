        text: Sabbath Questions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that particular time Jesus went through the grainfields on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The seventh day of the week, the day of worship.
      marker-yv: yv-n
    - type: text
      text: 'Sabbath, and His disciples were hungry and began to pick the heads of grain and eat them. [Deut 23:25; Mark 2:23-28; Luke 6:1-5] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was there
    - type: text
      text: ' whose hand was withered. And they asked Jesus, “Is it lawful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' permissible to heal on the Sabbath?”—'
    - type: usfm
      marker: it
      children:
      - type: text
        text: they asked this
    - type: text
      text: ' so that they might accuse Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bring charges into court. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What man is there among you who, if he has only one sheep and it falls into a pit on the Sabbath, will not take hold of it and lift it out?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'How much more valuable then is a man than a sheep! So it is lawful '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' permissible to do good on the Sabbath.”'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Reach out your hand!”
    - type: text
      text: ' The man reached out and it was restored, as normal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' healthy as the other. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Pharisees went out and conspired against Him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: discussing
    - type: text
      text: ' how they could destroy Him.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Being aware of this, Jesus left there. Many followed Him, and He healed all of them [who were sick], '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and warned them not to tell [publicly] who He was. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
