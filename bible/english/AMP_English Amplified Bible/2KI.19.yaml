document_id: 2KI.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah Encourages Hezekiah
  - type: text
    content: When king Hezekiah heard it, he tore his clothes and he covered himself with sackcloth and went into the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: '. [Is 37:1-13] '
  '10':
  - type: text
    content: '“Say this to Hezekiah king of Judah, ‘Do not let your God on whom you rely deceive you by saying, “Jerusalem shall not be handed over to the king of Assyria.” '
  '11':
  - type: text
    content: 'Listen, you have heard what the Assyrian kings have done to all the lands, destroying them completely. So will you be spared? '
  '12':
  - type: text
    content: 'Did the gods of the nations whom my forefathers destroyed rescue them—Gozan and Haran [of Mesopotamia] and Rezeph and the people of Eden who were in Telassar? '
  '13':
  - type: text
    content: Where is the king of Hamath, the king of Arpad [of northern Syria], the king of the city of Sepharvaim, and of Hena and Ivvah?’ ”
  - type: heading
    content: Hezekiah’s Prayer
  '14':
  - type: text
    content: Hezekiah received the letter from the hand of the messengers and read it. Then he went up to the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ' and spread it out before the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Is 37:14-20] '
  '15':
  - type: text
    content: Hezekiah prayed before the L
  - type: heading
    content: ord
  - type: text
    content: ' and said, “O L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, who is enthroned '
  - type: text
    content: above
  - type: text
    content: ' the cherubim [of the '
  - type: note
    content: I.e. God’s symbolic throne.
  - type: text
    content: 'ark in the temple], You are the God, You alone, of all the kingdoms of the earth. You have made the heavens and the earth. '
  '16':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', bend down Your ear and hear; L'
  - type: heading
    content: ord
  - type: text
    content: ', open Your eyes and see; hear the [taunting] words of Sennacherib, which he has sent to taunt '
  - type: text
    content: and
  - type: text
    content: ' defy the living God. '
  '17':
  - type: text
    content: It is true, L
  - type: heading
    content: ord
  - type: text
    content: ', that the Assyrian kings have devastated the nations and their lands '
  '18':
  - type: text
    content: 'and have thrown their gods into the fire, for they were not [real] gods but [only] the work of men’s hands, wood and stone. So they [could destroy them and] have destroyed them. '
  '19':
  - type: text
    content: Now, O L
  - type: heading
    content: ord
  - type: text
    content: ' our God, please, save us from his hand so that all the kingdoms of the earth may know [without any doubt] that You alone, O L'
  - type: heading
    content: ord
  - type: text
    content: ', are God.”'
  - type: heading
    content: God’s Answer through Isaiah
  '2':
  - type: text
    content: 'Then he sent Eliakim who was in charge of his household, Shebna the scribe, and the elders of the priests, covered with sackcloth, to Isaiah the prophet the son of Amoz. '
  '20':
  - type: text
    content: 'Then Isaiah the son of Amoz sent '
  - type: text
    content: word
  - type: text
    content: ' to Hezekiah, saying, “Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel: ‘I have heard your prayer to Me regarding Sennacherib king of Assyria.’ [Is 37:21-38] '
  '21':
  - type: text
    content: This is the word that the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken against him:'
  - type: text
    content: ‘The virgin daughter of Zion
  - type: text
    content: Has despised you and mocked you;
  - type: text
    content: The daughter of Jerusalem
  - type: text
    content: Has shaken her head behind you!
  '22':
  - type: text
    content: ‘Whom have you taunted and blasphemed?
  - type: text
    content: Against whom have you raised your voice,
  - type: text
    content: And haughtily lifted up your eyes?
  - type: text
    content: Against the Holy One of Israel!
  '23':
  - type: text
    content: '‘Through your messengers you have taunted '
  - type: text
    content: and
  - type: text
    content: ' defied the Lord,'
  - type: text
    content: And have said [boastfully], “With my many chariots
  - type: text
    content: I came up to the heights of the mountains,
  - type: text
    content: To the remotest parts of Lebanon;
  - type: text
    content: I cut down its tall cedar trees and its choicest cypress trees.
  - type: text
    content: I entered its most distant lodging, its densest forest.
  '24':
  - type: text
    content: '“I dug '
  - type: text
    content: wells
  - type: text
    content: ' and drank foreign waters,'
  - type: text
    content: And with the sole of my feet I dried up
  - type: text
    content: All the rivers of [the Lower Nile of] Egypt.”
  '25':
  - type: text
    content: ¶‘Have you not heard [asks the God of Israel]?
  - type: text
    content: Long ago I did it;
  - type: text
    content: From ancient times I planned it.
  - type: text
    content: Now I have brought it to pass,
  - type: text
    content: That you [king of Assyria] should [be My instrument to] turn fortified cities into ruinous heaps.
  '26':
  - type: text
    content: ‘Therefore their inhabitants were powerless,
  - type: text
    content: They were shattered [in spirit] and put to shame;
  - type: text
    content: They were like plants of the field, the green herb,
  - type: text
    content: As grass on the housetops is scorched before it is grown up.
  '27':
  - type: text
    content: ‘But I [the L
  - type: heading
    content: ord
  - type: text
    content: '] know your sitting down [O Sennacherib],'
  - type: text
    content: Your going out, your coming in,
  - type: text
    content: And your raging against Me.
  '28':
  - type: text
    content: ‘Because of your raging against Me,
  - type: text
    content: 'And because your arrogance '
  - type: text
    content: and
  - type: text
    content: ' complacency have come up to My ears,'
  - type: text
    content: I will put My hook in your nose,
  - type: text
    content: And My bridle in your lips,
  - type: text
    content: And I will turn you back [to Assyria] by the way that you came.
  '29':
  - type: text
    content: '‘Then this shall be the sign [of these things] to you [Hezekiah]: this year you will eat what grows of itself, in the second year what springs up voluntarily, and in the third year sow and reap, plant vineyards, and eat their fruit. '
  '3':
  - type: text
    content: 'They said to him, “Thus says Hezekiah, ‘This is a day of distress '
  - type: text
    content: and
  - type: text
    content: ' anxiety, of punishment and humiliation; for children have come to [the time of their] birth and there is no strength to rescue them. '
  '30':
  - type: text
    content: 'The survivors who remain of the house of Judah will again take root downward and bear fruit upward. '
  '31':
  - type: text
    content: For a remnant will go forth from Jerusalem, and [a band of] survivors from Mount Zion. The zeal of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts shall perform this.'
  '32':
  - type: text
    content: ‘Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning the king of Assyria: “He will not come to this city [Jerusalem] nor shoot an arrow there; nor will he come before it with a shield nor throw up a siege ramp against it. '
  '33':
  - type: text
    content: By the way that he came, by the same way he will return, and he will not come into this city,” ’ declares the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '34':
  - type: text
    content: ‘For I will protect this city to save it, for My own sake and for My servant David’s sake.’ ”
  '35':
  - type: text
    content: 'Then it came to pass that night, that the '
  - type: note
    content: See note Gen 16:7.
  - type: text
    content: angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' went forth and struck down 185,000 [men] in the camp of the Assyrians; when '
  - type: text
    content: the survivors
  - type: text
    content: ' got up early in the morning, behold, all [185,000] of them were dead. '
  '36':
  - type: text
    content: 'So Sennacherib king of Assyria '
  - type: note
    content: An account of his military campaign against Judah in 701 b.c. was recorded by Sennacherib on a hexagonal baked clay prism found in the ruins of his palace in Nineveh, in northern Iraq.
  - type: text
    content: 'left and returned '
  - type: text
    content: home,
  - type: text
    content: ' and lived at '
  - type: note
    content: I.e. the capital city of Assyria.
  - type: text
    content: 'Nineveh. '
  '37':
  - type: text
    content: It came about as he was worshiping in the house of Nisroch his god, that his sons Adrammelech and Sharezer killed him with a sword; and they escaped to the land of Ararat. And Esarhaddon his son became king in his place.
  '4':
  - type: text
    content: It may be that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will hear all the words of the Rabshakeh, whom his master the king of Assyria has sent to taunt '
  - type: text
    content: and
  - type: text
    content: ' defy the living God, and will rebuke the words which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has heard. So offer a prayer for the remnant [of His people] that is left [in Judah].’ ” '
  '5':
  - type: text
    content: 'So the servants of King Hezekiah came to Isaiah. '
  '6':
  - type: text
    content: 'Isaiah said to them, “Say this to your master: ‘Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ', “Do not be afraid because of the words that you have heard, with which the servants of the king of Assyria have reviled (blasphemed) Me. '
  '7':
  - type: text
    content: Behold, I will put a spirit in him so that he will hear a rumor and return to his own land. And I will make him fall by the sword in his own land.” ’ ”
  - type: heading
    content: Sennacherib Defies God
  '8':
  - type: text
    content: 'So the Rabshakeh returned and found the king of Assyria fighting against Libnah [a fortified city of Judah]; for he had heard that the king had left Lachish. '
  '9':
  - type: text
    content: 'When the king heard them say concerning Tirhakah king of '
  - type: note
    content: Heb Cush.
  - type: text
    content: 'Ethiopia, “Behold, he has come out to make war against you,” he sent messengers again to Hezekiah, saying, '
