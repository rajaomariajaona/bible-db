document_id: 2KI.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaiah Encourages Hezekiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When king Hezekiah heard it, he tore his clothes and he covered himself with sackcloth and went into the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Is 37:1-13] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then he sent Eliakim who was in charge of his household, Shebna the scribe, and the elders of the priests, covered with sackcloth, to Isaiah the prophet the son of Amoz. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They said to him, “Thus says Hezekiah, ‘This is a day of distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anxiety, of punishment and humiliation; for children have come to [the time of their] birth and there is no strength to rescue them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It may be that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will hear all the words of the Rabshakeh, whom his master the king of Assyria has sent to taunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy the living God, and will rebuke the words which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has heard. So offer a prayer for the remnant [of His people] that is left [in Judah].’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the servants of King Hezekiah came to Isaiah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Isaiah said to them, “Say this to your master: ‘Thus says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Do not be afraid because of the words that you have heard, with which the servants of the king of Assyria have reviled (blasphemed) Me. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Behold, I will put a spirit in him so that he will hear a rumor and return to his own land. And I will make him fall by the sword in his own land.” ’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sennacherib Defies God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the Rabshakeh returned and found the king of Assyria fighting against Libnah [a fortified city of Judah]; for he had heard that the king had left Lachish. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the king heard them say concerning Tirhakah king of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Cush
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ethiopia, “Behold, he has come out to make war against you,” he sent messengers again to Hezekiah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Say this to Hezekiah king of Judah, ‘Do not let your God on whom you rely deceive you by saying, “Jerusalem shall not be handed over to the king of Assyria.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Listen, you have heard what the Assyrian kings have done to all the lands, destroying them completely. So will you be spared? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Did the gods of the nations whom my forefathers destroyed rescue them—Gozan and Haran [of Mesopotamia] and Rezeph and the people of Eden who were in Telassar? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Where is the king of Hamath, the king of Arpad [of northern Syria], the king of the city of Sepharvaim, and of Hena and Ivvah?’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hezekiah’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Hezekiah received the letter from the hand of the messengers and read it. Then he went up to the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and spread it out before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Is 37:14-20] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hezekiah prayed before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said, “O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who is enthroned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: above
  - type: text
    text: ' the cherubim [of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. God’s symbolic throne.
    marker-yv: yv-n
  - type: text
    text: 'ark in the temple], You are the God, You alone, of all the kingdoms of the earth. You have made the heavens and the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', bend down Your ear and hear; L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', open Your eyes and see; hear the [taunting] words of Sennacherib, which he has sent to taunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defy the living God. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It is true, L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that the Assyrian kings have devastated the nations and their lands '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and have thrown their gods into the fire, for they were not [real] gods but [only] the work of men’s hands, wood and stone. So they [could destroy them and] have destroyed them. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Now, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, please, save us from his hand so that all the kingdoms of the earth may know [without any doubt] that You alone, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', are God.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Answer through Isaiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Isaiah the son of Amoz sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Hezekiah, saying, “Thus says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel: ‘I have heard your prayer to Me regarding Sennacherib king of Assyria.’ [Is 37:21-38] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: This is the word that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken against him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The virgin daughter of Zion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has despised you and mocked you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The daughter of Jerusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has shaken her head behind you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ‘Whom have you taunted and blasphemed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against whom have you raised your voice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And haughtily lifted up your eyes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against the Holy One of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '‘Through your messengers you have taunted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defied the Lord,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have said [boastfully], “With my many chariots
- type: usfm
  marker: q1
  children:
  - type: text
    text: I came up to the heights of the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the remotest parts of Lebanon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I cut down its tall cedar trees and its choicest cypress trees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I entered its most distant lodging, its densest forest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“I dug '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wells
  - type: text
    text: ' and drank foreign waters,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with the sole of my feet I dried up
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the rivers of [the Lower Nile of] Egypt.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ¶‘Have you not heard [asks the God of Israel]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Long ago I did it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: From ancient times I planned it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I have brought it to pass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you [king of Assyria] should [be My instrument to] turn fortified cities into ruinous heaps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ‘Therefore their inhabitants were powerless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were shattered [in spirit] and put to shame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were like plants of the field, the green herb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As grass on the housetops is scorched before it is grown up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ‘But I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] know your sitting down [O Sennacherib],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your going out, your coming in,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your raging against Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ‘Because of your raging against Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And because your arrogance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complacency have come up to My ears,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put My hook in your nose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My bridle in your lips,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will turn you back [to Assyria] by the way that you came.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '‘Then this shall be the sign [of these things] to you [Hezekiah]: this year you will eat what grows of itself, in the second year what springs up voluntarily, and in the third year sow and reap, plant vineyards, and eat their fruit. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The survivors who remain of the house of Judah will again take root downward and bear fruit upward. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For a remnant will go forth from Jerusalem, and [a band of] survivors from Mount Zion. The zeal of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts shall perform this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ‘Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' concerning the king of Assyria: “He will not come to this city [Jerusalem] nor shoot an arrow there; nor will he come before it with a shield nor throw up a siege ramp against it. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: By the way that he came, by the same way he will return, and he will not come into this city,” ’ declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ‘For I will protect this city to save it, for My own sake and for My servant David’s sake.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then it came to pass that night, that the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 16:7.
    marker-yv: yv-n
  - type: text
    text: angel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' went forth and struck down 185,000 [men] in the camp of the Assyrians; when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the survivors
  - type: text
    text: ' got up early in the morning, behold, all [185,000] of them were dead. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'So Sennacherib king of Assyria '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'An account of his military campaign against Judah in 701 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . was recorded by Sennacherib on a hexagonal baked clay prism found in the ruins of his palace in Nineveh, in northern Iraq.
    marker-yv: yv-n
  - type: text
    text: 'left and returned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: home,
  - type: text
    text: ' and lived at '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the capital city of Assyria.
    marker-yv: yv-n
  - type: text
    text: 'Nineveh. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: It came about as he was worshiping in the house of Nisroch his god, that his sons Adrammelech and Sharezer killed him with a sword; and they escaped to the land of Ararat. And Esarhaddon his son became king in his place.
