segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lament for Babylon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Come down and sit in the dust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O virgin daughter of Babylon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sit on the ground [in abject humiliation]; there is no throne '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O daughter of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ruling tribe in Babylon.
    marker-yv: yv-n
  - type: text
    text: Chaldeans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you will no longer be called tender and delicate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Take millstones [as a female slave does] and grind meal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remove your veil, strip off the skirt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Uncover the leg, cross the rivers [at the command of your captors].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Your nakedness will be uncovered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your shame will also be exposed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will take vengeance and will spare no man.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Our Redeemer [will do all this], the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts is His name,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Sit in silence, and go into darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O daughter of the Chaldeans;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you will no longer be called
- type: usfm
  marker: q1
  children:
  - type: text
    text: The queen of kingdoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I was angry with My people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I profaned [Judah] My inheritance
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gave them into your hand [Babylon].
- type: usfm
  marker: q1
  children:
  - type: text
    text: You showed them no mercy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You made your yoke very heavy on the aged.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “And you said, ‘I shall be a queen forevermore.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: You did not consider these things,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor did you [seriously] remember the [ultimate] outcome of such conduct.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Now, then, hear this, you who live a luxuriant life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You who dwell safely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' securely,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who say in your heart (mind),
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I am [the queen], and there is no one besides me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall not sit as a widow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor know the loss of children.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“But these two things shall come to you abruptly, in one day:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loss of children and widowhood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will come on you in full measure
- type: usfm
  marker: q1
  children:
  - type: text
    text: In spite of your many [claims of power through your] sorceries,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In spite of the great power of your enchantments. [Rev 18:7, 8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“For you [Babylon] have trusted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' felt confident in your wickedness; you have said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘No one sees me.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your wisdom and your knowledge have led you astray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you have said in your heart (mind),
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I am, and there is no one besides me.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Therefore disaster will come on you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will not know how to make it disappear [with your magic].
- type: usfm
  marker: q1
  children:
  - type: text
    text: And disaster will fall on you
- type: usfm
  marker: q1
  children:
  - type: text
    text: For which you cannot atone [with all your offerings to your gods];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destruction about which you do not know
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will come on you suddenly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“Persist, then, [Babylon] in your enchantments
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your many sorceries
- type: usfm
  marker: q1
  children:
  - type: text
    text: With which you have labored from your youth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perhaps you will be able to profit [from them],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Perhaps you may prevail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cause trembling.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: struggle with…plans
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: are wearied by your many counsels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just let the astrologers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stargazers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who predict by the new moons [each month]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stand up and save you from the things that will come upon you [Babylon].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “In fact, they are like stubble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fire burns them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cannot save themselves from the power of the flame [much less save the nation],
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no blazing coal for warming
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor fire before which to sit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “This is how they have become to you, those [astrologers and sorcerers] with whom you have labored,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who have done business with you from your youth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each has wandered in his own way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no one to save you.
