type_code: eng
verses:
  '1':
  - type: heading
    content: Lament for Babylon
  - type: text
    content: “Come down and sit in the dust,
  - type: text
    content: O virgin daughter of Babylon;
  - type: text
    content: 'Sit on the ground [in abject humiliation]; there is no throne '
  - type: text
    content: for you,
  - type: text
    content: 'O daughter of the '
  - type: note
    content: The ruling tribe in Babylon.
  - type: text
    content: Chaldeans,
  - type: text
    content: For you will no longer be called tender and delicate.
  '10':
  - type: text
    content: '“For you [Babylon] have trusted '
  - type: text
    content: and
  - type: text
    content: ' felt confident in your wickedness; you have said,'
  - type: text
    content: ‘No one sees me.’
  - type: text
    content: Your wisdom and your knowledge have led you astray,
  - type: text
    content: And you have said in your heart (mind),
  - type: text
    content: ‘I am, and there is no one besides me.’
  '11':
  - type: text
    content: “Therefore disaster will come on you;
  - type: text
    content: You will not know how to make it disappear [with your magic].
  - type: text
    content: And disaster will fall on you
  - type: text
    content: For which you cannot atone [with all your offerings to your gods];
  - type: text
    content: And destruction about which you do not know
  - type: text
    content: Will come on you suddenly.
  '12':
  - type: text
    content: ¶“Persist, then, [Babylon] in your enchantments
  - type: text
    content: And your many sorceries
  - type: text
    content: With which you have labored from your youth;
  - type: text
    content: Perhaps you will be able to profit [from them],
  - type: text
    content: 'Perhaps you may prevail '
  - type: text
    content: and
  - type: text
    content: ' cause trembling.'
  '13':
  - type: text
    content: '“You '
  - type: note
    content: Or struggle with…plans.
  - type: text
    content: are wearied by your many counsels.
  - type: text
    content: Just let the astrologers,
  - type: text
    content: The stargazers,
  - type: text
    content: Those who predict by the new moons [each month]
  - type: text
    content: Stand up and save you from the things that will come upon you [Babylon].
  '14':
  - type: text
    content: “In fact, they are like stubble;
  - type: text
    content: Fire burns them.
  - type: text
    content: They cannot save themselves from the power of the flame [much less save the nation],
  - type: text
    content: There is no blazing coal for warming
  - type: text
    content: Nor fire before which to sit!
  '15':
  - type: text
    content: “This is how they have become to you, those [astrologers and sorcerers] with whom you have labored,
  - type: text
    content: Those who have done business with you from your youth;
  - type: text
    content: Each has wandered in his own way.
  - type: text
    content: There is no one to save you.
  '2':
  - type: text
    content: “Take millstones [as a female slave does] and grind meal;
  - type: text
    content: Remove your veil, strip off the skirt,
  - type: text
    content: Uncover the leg, cross the rivers [at the command of your captors].
  '3':
  - type: text
    content: “Your nakedness will be uncovered,
  - type: text
    content: Your shame will also be exposed;
  - type: text
    content: I will take vengeance and will spare no man.”
  '4':
  - type: text
    content: Our Redeemer [will do all this], the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is His name,'
  - type: text
    content: The Holy One of Israel.
  '5':
  - type: text
    content: “Sit in silence, and go into darkness,
  - type: text
    content: O daughter of the Chaldeans;
  - type: text
    content: For you will no longer be called
  - type: text
    content: The queen of kingdoms.
  '6':
  - type: text
    content: “I was angry with My people,
  - type: text
    content: I profaned [Judah] My inheritance
  - type: text
    content: And gave them into your hand [Babylon].
  - type: text
    content: You showed them no mercy;
  - type: text
    content: You made your yoke very heavy on the aged.
  '7':
  - type: text
    content: “And you said, ‘I shall be a queen forevermore.’
  - type: text
    content: You did not consider these things,
  - type: text
    content: Nor did you [seriously] remember the [ultimate] outcome of such conduct.
  '8':
  - type: text
    content: ¶“Now, then, hear this, you who live a luxuriant life,
  - type: text
    content: 'You who dwell safely '
  - type: text
    content: and
  - type: text
    content: ' securely,'
  - type: text
    content: Who say in your heart (mind),
  - type: text
    content: ‘I am [the queen], and there is no one besides me.
  - type: text
    content: I shall not sit as a widow,
  - type: text
    content: Nor know the loss of children.’
  '9':
  - type: text
    content: '“But these two things shall come to you abruptly, in one day:'
  - type: text
    content: Loss of children and widowhood.
  - type: text
    content: They will come on you in full measure
  - type: text
    content: In spite of your many [claims of power through your] sorceries,
  - type: text
    content: In spite of the great power of your enchantments. [Rev 18:7, 8]
