document_id: ECC.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your Attitude Toward God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Guard your steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' focus on what you are doing as you go to the house of God and draw near to listen rather than to offer the [careless or irreverent] sacrifice of fools; for they are too ignorant to know they are doing evil. [Gen 35:1-4; Ex 3:5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Do not be hasty with your mouth [speaking careless words or vows] or impulsive in thought to bring up a matter before God. For God is in heaven and you are on earth; therefore let your words be few. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the dream comes through much effort, and the voice of the fool through many words.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When you make a vow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a pledge to God, do not put off paying it; for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God takes
  - type: text
    text: ' no pleasure in fools [who thoughtlessly mock Him]. Pay what you vow. [Ps 50:14; 66:13, 14; 76:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'It is better that you should not vow than that you should vow and not pay. [Prov 20:25; Acts 5:4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Do not allow your speech to cause you to sin, and do not say before the messenger (priest) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of God
  - type: text
    text: ' that it was a mistake. Why should God be angry because of your voice (words) and destroy the work of your hands? [Mal 2:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For in a multitude of dreams and in a flood of words there is worthlessness. Rather [reverently] fear God [and worship Him with awe-filled respect, knowing who He is].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If you see the oppression of the poor and the denial of justice and righteousness in the province, do not be shocked at the sight [of corruption]; for a higher official watches over another official, and there are higher ones over them [looking out for one another]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: After all, a king who cultivates the field is an advantage to the land.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Folly of Riches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He who loves money will not be satisfied with money, nor he who loves abundance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with its
  - type: text
    text: ' gain. This too is vanity (emptiness). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When good things increase, those who consume them increase. So what advantage is there to their owners except to see them with their eyes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The sleep of a working man is sweet, whether he eats little or much; but the full stomach (greed) of the rich [who hungers for even more] will not let him sleep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'There is a grievous evil which I have seen under the sun: riches being kept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hoarded by their owner to his own misery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For when those riches are lost in bad investments and he becomes the father of a son, then there is nothing in his hand [for the support of the child]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'As he came naked from his mother’s womb, so he will return as he came; and he will take away nothing from all his labor that he can carry in his hand. [Job 1:21; 1 Tim 6:7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This also is a grievous evil—exactly as he was born, so he shall die. So what advantage has he who labors for the wind? [1 Tim 6:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All of his life he also eats in darkness [cheerlessly, without sweetness and light], with great frustration, sickness, and anger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Behold, here is what I have seen to be good and fitting: to eat and drink, and to find enjoyment in all the labor in which he labors under the sun during the few days of his life which God gives him—for this is his [allotted] reward. [1 Tim 6:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also, every man to whom God has given riches and possessions, He has also given the power '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability to enjoy them and to receive [this as] his [allotted] portion and to rejoice in his labor—this is the gift of God [to him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For he will not often consider the [troubled] days of his life, because God keeps him occupied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' focused on the joy of his heart [and the tranquility of God indwells him].'
