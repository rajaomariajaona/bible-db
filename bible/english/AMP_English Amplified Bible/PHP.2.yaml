  '23':
  - type: text
    content: 'Therefore, I hope [that it is His will] to send him immediately, just as soon as I see how '
  - type: note
    content: Lit things go with me. This letter to the Philippians was written near the end of Paul’s two-year period of imprisonment in Rome. This was the first of his two Roman imprisonments. At this time he was under house arrest and was living in his own rented home. About five years after his release he was imprisoned again. Emperor Nero was actively persecuting the Christians during this period, so Paul was held in the Mamertine dungeon (Tullianum). Shortly before his execution Paul wrote his second and final letter to Timothy from his cell in Rome.
  - type: text
    content: 'my case turns out; '
