document_id: PHP.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Be Like Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore if there is any encouragement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comfort in Christ [as there certainly is in abundance], if there is any consolation of love, if there is any fellowship [that we share] in the Spirit, if [there is] any [great depth of] affection and compassion, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'make my joy complete by being of the same mind, having the same '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape)
      - type: text
        text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
    marker-yv: yv-n
  - type: text
    text: 'love [toward one another], knit together in spirit, intent on one purpose [and living a life that reflects your faith and spreads the gospel—the good news regarding salvation through faith in Christ]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Do nothing from selfishness or empty conceit [through factional motives, or strife], but with [an attitude of] humility [being neither arrogant nor self-righteous], regard others as more important than yourselves. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Do not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: merely
  - type: text
    text: ' look out for your own personal interests, but also for the interests of others. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Have this same attitude in yourselves which was in Christ Jesus [look to Him as your example in selfless humility], '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'who, although He existed in the form '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unchanging essence of God [as One with Him, possessing the fullness of all the divine attributes—the entire nature of deity], did not regard equality with God a thing to be grasped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' asserted [as if He did not already possess it, or was afraid of losing it]; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but emptied Himself [without renouncing or diminishing His deity, but only temporarily giving up the outward expression of divine equality and His rightful dignity] by assuming the form of a bond-servant, and being made in the likeness of men [He became completely human but was without sin, being fully God and fully man]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'After He was found in [terms of His] outward appearance as a man [for a divinely-appointed time], He humbled Himself [still further] by becoming obedient [to the Father] to the point of death, even death on a cross. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For this reason also [because He obeyed and so completely humbled Himself], God has highly exalted Him and bestowed on Him the name which is above every name, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'so that at the name of Jesus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All intelligent beings in the universe, whether saved or unsaved, whether in spirit or as mortal mankind, will acknowledge Him.
    marker-yv: yv-n
  - type: usfm
    marker: sc
    children:
    - type: text
      text: every knee shall bow
  - type: text
    text: ' [in submission], of those who are in heaven and on earth and under the earth, [Is 45:23] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and that every tongue will confess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly acknowledge that Jesus Christ is Lord (sovereign God), to the glory of God the Father.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So then, my dear ones, just as you have always obeyed [my instructions with enthusiasm], not only in my presence, but now much more in my absence, continue to work out your salvation [that is, cultivate it, bring it to full effect, actively pursue spiritual maturity] with awe-inspired fear and trembling [using serious caution and critical self-evaluation to avoid anything that might offend God or discredit the name of Christ]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For it is [not your strength, but it is] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God supports the believer, but it is the believer’s responsibility to do what he has been called by God to do.
    marker-yv: yv-n
  - type: text
    text: God who is effectively at work in you, both to will and to work [that is, strengthening, energizing, and creating in you the longing and the ability to fulfill your purpose] for His good pleasure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Do everything without murmuring or questioning [the providence of God], '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'so that you may prove yourselves to be blameless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guileless, innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uncontaminated, children of God without blemish in the midst of a [morally] crooked and [spiritually] perverted generation, among whom you are seen as bright lights [beacons shining out clearly] in the world [of darkness], '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'holding out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offering to everyone the word of life, so that in the day of Christ I will have reason to rejoice greatly because I did not run [my race] in vain nor labor without result. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But even if I am being poured out as a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The drink offering (wine) was required as part of the sacrificial system of the old covenant.
    marker-yv: yv-n
  - type: text
    text: 'drink offering on the sacrifice and service of your faith [for preaching the message of salvation], still I rejoice and share my joy with you all. [Num 28:7; 2 Tim 4:6] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You too, rejoice in the same way and share your joy with me.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Timothy and Epaphroditus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I hope in the Lord Jesus to send Timothy to you soon, so that I may also be encouraged by learning news about you. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For I have no one else [like him who is] so kindred a spirit who will be genuinely concerned for your [spiritual] welfare. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the others [who deserted me after my arrest] all seek [to advance] their own interests, not those of Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But you know of Timothy’s tested worth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his proven character, that he has served with me to advance the gospel like a son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: serving
  - type: text
    text: ' with his father. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Therefore, I hope [that it is His will] to send him immediately, just as soon as I see how '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: things go with me
      - type: text
        text: . This letter to the Philippians was written near the end of Paul’s two-year period of imprisonment in Rome. This was the first of his two Roman imprisonments. At this time he was under house arrest and was living in his own rented home. About five years after his release he was imprisoned again. Emperor Nero was actively persecuting the Christians during this period, so Paul was held in the Mamertine dungeon (Tullianum). Shortly before his execution Paul wrote his second and final letter to Timothy from his cell in Rome.
    marker-yv: yv-n
  - type: text
    text: 'my case turns out; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and I trust [confidently] in the Lord that soon I also will be coming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to you
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'However, I thought it necessary to send '
  - type: usfm
    marker: it
    children:
    - type: text
      text: back
  - type: text
    text: ' to you Epaphroditus, [who has been] my brother and companion and fellow soldier, who was also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sent as
  - type: text
    text: ' your messenger to take care of my needs. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For he has been longing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One early ms reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to see you all
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'for all of you and was distressed because you had heard that he was sick. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He certainly was sick and close to death. But God had mercy on him, and not only on him but also on me, so that I would not have sorrow upon sorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So I have sent him all the more eagerly so that when you see him again you may rejoice and I may be less concerned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Welcome him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: home
  - type: text
    text: ' in the Lord with great joy, and appreciate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor men like him; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: because he came close to death for the work of Christ, risking his life to complete what was lacking in your service to me [which distance prevented you from rendering personally].
