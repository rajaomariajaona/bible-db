    - type: text
      text: Jehoram Meets Moab Rebellion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jehoram the son of Ahab became king over Israel in Samaria in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 1:17.
    marker-yv: yv-n
  - type: text
    text: 'eighteenth year of Jehoshaphat king of Judah, and reigned twelve years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', but not like his father and mother; for he put away the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillar of Baal that his father had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nevertheless, he continued in the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin; he did not depart from them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This name of the king of Moab occurs in the first line of the Moabite Stone. In that inscription the Moabite king mentions his successes against Omri and Omri’s successor (1 Kin 16:23).
    marker-yv: yv-n
  - type: text
    text: 'Mesha the king of Moab was a sheep breeder, and he used to pay [an annual tribute] to the king of Israel 100,000 lambs and the wool of 100,000 rams. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But when Ahab died, the king of Moab rebelled against the king of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So King Jehoram left Samaria at that time and assembled all [the fighting men of] Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he went and sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Jehoshaphat king of Judah, saying, “The king of Moab has rebelled against me. Will you go with me to fight against Moab?” And he replied, “I will go; I am as you are, my people as your people, my horses as your horses.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jehoram said, “Which way shall we go up?” Jehoshaphat answered, “The way through the Wilderness of Edom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So the king of Israel went with the king of Judah and the king of Edom. They made a circuit of seven days’ journey, but there was no water for the army or for the cattle that followed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then the king of Israel said, “We are doomed, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has called these three kings to be handed over to Moab.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But Jehoshaphat said, “Is there no prophet of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' here from whom we may inquire of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?” One of the servants of the king of Israel answered, “Elisha the son of Shaphat is here, who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A Hebrew idiom meaning that one person personally served another.
    marker-yv: yv-n
  - type: text
    text: 'used to pour water over Elijah’s hands.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jehoshaphat said, “The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is with him.” So the king of Israel and Jehoshaphat and the king of Edom went down to Elisha.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now Elisha said to the king of Israel, “What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: business
  - type: text
    text: ' do you have with me? Go to the prophets of your [wicked] father [Ahab] and to the prophets of your [pagan] mother [Jezebel].” But the king of Israel said to him, “No, for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has called these three kings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: together
  - type: text
    text: ' to be handed over to Moab.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elisha said, “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts (armies) lives, before whom I stand, were it not that I have regard for Jehoshaphat king of Judah, I would not look at you nor see you [king of Israel]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But now bring me a musician.” And it came about while the musician played, that the hand (power) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came upon Elisha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He said, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘Make this valley (the Arabah) full of trenches.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘You will not see wind or rain, yet that valley will be filled with water, so you and your cattle and your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' animals may drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: This is but a simple thing in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; He will also hand over the Moabites to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You shall strike every fortified city and every choice (principal) city, and cut down every good tree and stop up all sources of water, and ruin every good piece of land with stones.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: It happened in the morning, when the sacrifice was offered, that suddenly water came [miraculously] from the area of Edom, and the country was filled with water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now all the Moabites heard that the [three] kings had come up to fight against them, and all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the young and able.
    marker-yv: yv-n
  - type: text
    text: 'who were able to put on armor, as well as those who were older, were summoned and stood [together in battle formation] at the border. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When they got up early the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: next
  - type: text
    text: ' morning, the sun shone on the water, and the Moabites saw the water across from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' as red as blood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And they said, “This is blood! Clearly the kings have fought together, and have killed one another. Now then, Moab, to the spoil [and the plunder of the dead soldiers]!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But when they came to the camp of Israel, the Israelites rose up and struck the Moabites, so that they fled before them; and they went forward into the land, killing the Moabites [as they went]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They destroyed the [walls of the] cities, and each man threw a stone on every piece of good land, covering it [with stones]. And they stopped up all the springs of water and cut down all the good trees, until they left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nothing
  - type: text
    text: ' in Kir-hareseth [Moab’s capital city] but its stones. Then the [stone] slingers surrounded the city and destroyed it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When the king of Moab saw that the battle was too fierce for him, he took with him seven hundred swordsmen to break through to the king of Edom; but they could not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then the king of Moab took his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the crown prince.
    marker-yv: yv-n
  - type: text
    text: 'eldest son, who was to reign in his place, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This terrible act of human sacrifice did nothing to mitigate or reverse Israel’s victory over Mesha and the Moabites.
    marker-yv: yv-n
  - type: text
    text: offered him [publicly] as a burnt offering [to Chemosh] on the [city] wall [horrifying everyone]. And there was great wrath against Israel, and Israel’s allies [Judah and Edom] withdrew from King Jehoram and returned to their own land.
