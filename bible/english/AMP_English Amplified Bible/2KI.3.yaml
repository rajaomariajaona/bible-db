document_id: 2KI.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoram Meets Moab Rebellion
  - type: text
    content: 'Jehoram the son of Ahab became king over Israel in Samaria in the '
  - type: note
    content: See note 1:17.
  - type: text
    content: 'eighteenth year of Jehoshaphat king of Judah, and reigned twelve years. '
  '10':
  - type: text
    content: Then the king of Israel said, “We are doomed, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has called these three kings to be handed over to Moab.” '
  '11':
  - type: text
    content: But Jehoshaphat said, “Is there no prophet of the L
  - type: heading
    content: ord
  - type: text
    content: ' here from whom we may inquire of the L'
  - type: heading
    content: ord
  - type: text
    content: '?” One of the servants of the king of Israel answered, “Elisha the son of Shaphat is here, who '
  - type: note
    content: A Hebrew idiom meaning that one person personally served another.
  - type: text
    content: 'used to pour water over Elijah’s hands.” '
  '12':
  - type: text
    content: Jehoshaphat said, “The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' is with him.” So the king of Israel and Jehoshaphat and the king of Edom went down to Elisha.'
  '13':
  - type: text
    content: 'Now Elisha said to the king of Israel, “What '
  - type: text
    content: business
  - type: text
    content: ' do you have with me? Go to the prophets of your [wicked] father [Ahab] and to the prophets of your [pagan] mother [Jezebel].” But the king of Israel said to him, “No, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has called these three kings '
  - type: text
    content: together
  - type: text
    content: ' to be handed over to Moab.” '
  '14':
  - type: text
    content: Elisha said, “As the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts (armies) lives, before whom I stand, were it not that I have regard for Jehoshaphat king of Judah, I would not look at you nor see you [king of Israel]. '
  '15':
  - type: text
    content: But now bring me a musician.” And it came about while the musician played, that the hand (power) of the L
  - type: heading
    content: ord
  - type: text
    content: ' came upon Elisha. '
  '16':
  - type: text
    content: He said, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Make this valley (the Arabah) full of trenches.’ '
  '17':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘You will not see wind or rain, yet that valley will be filled with water, so you and your cattle and your '
  - type: text
    content: other
  - type: text
    content: ' animals may drink. '
  '18':
  - type: text
    content: This is but a simple thing in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '; He will also hand over the Moabites to you. '
  '19':
  - type: text
    content: 'You shall strike every fortified city and every choice (principal) city, and cut down every good tree and stop up all sources of water, and ruin every good piece of land with stones.’ ” '
  '2':
  - type: text
    content: He did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', but not like his father and mother; for he put away the '
  - type: text
    content: sacred
  - type: text
    content: ' pillar of Baal that his father had made. '
  '20':
  - type: text
    content: It happened in the morning, when the sacrifice was offered, that suddenly water came [miraculously] from the area of Edom, and the country was filled with water.
  '21':
  - type: text
    content: 'Now all the Moabites heard that the [three] kings had come up to fight against them, and all '
  - type: note
    content: I.e. the young and able.
  - type: text
    content: 'who were able to put on armor, as well as those who were older, were summoned and stood [together in battle formation] at the border. '
  '22':
  - type: text
    content: 'When they got up early the '
  - type: text
    content: next
  - type: text
    content: ' morning, the sun shone on the water, and the Moabites saw the water across from '
  - type: text
    content: them
  - type: text
    content: ' as red as blood. '
  '23':
  - type: text
    content: 'And they said, “This is blood! Clearly the kings have fought together, and have killed one another. Now then, Moab, to the spoil [and the plunder of the dead soldiers]!” '
  '24':
  - type: text
    content: 'But when they came to the camp of Israel, the Israelites rose up and struck the Moabites, so that they fled before them; and they went forward into the land, killing the Moabites [as they went]. '
  '25':
  - type: text
    content: 'They destroyed the [walls of the] cities, and each man threw a stone on every piece of good land, covering it [with stones]. And they stopped up all the springs of water and cut down all the good trees, until they left '
  - type: text
    content: nothing
  - type: text
    content: ' in Kir-hareseth [Moab’s capital city] but its stones. Then the [stone] slingers surrounded the city and destroyed it. '
  '26':
  - type: text
    content: 'When the king of Moab saw that the battle was too fierce for him, he took with him seven hundred swordsmen to break through to the king of Edom; but they could not. '
  '27':
  - type: text
    content: 'Then the king of Moab took his '
  - type: note
    content: I.e. the crown prince.
  - type: text
    content: 'eldest son, who was to reign in his place, and '
  - type: note
    content: This terrible act of human sacrifice did nothing to mitigate or reverse Israel’s victory over Mesha and the Moabites.
  - type: text
    content: offered him [publicly] as a burnt offering [to Chemosh] on the [city] wall [horrifying everyone]. And there was great wrath against Israel, and Israel’s allies [Judah and Edom] withdrew from King Jehoram and returned to their own land.
  '3':
  - type: text
    content: Nevertheless, he continued in the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin; he did not depart from them.
  '4':
  - type: text
    content: ' '
  - type: note
    content: This name of the king of Moab occurs in the first line of the Moabite Stone. In that inscription the Moabite king mentions his successes against Omri and Omri’s successor (1 Kin 16:23).
  - type: text
    content: 'Mesha the king of Moab was a sheep breeder, and he used to pay [an annual tribute] to the king of Israel 100,000 lambs and the wool of 100,000 rams. '
  '5':
  - type: text
    content: 'But when Ahab died, the king of Moab rebelled against the king of Israel. '
  '6':
  - type: text
    content: 'So King Jehoram left Samaria at that time and assembled all [the fighting men of] Israel. '
  '7':
  - type: text
    content: 'Then he went and sent '
  - type: text
    content: word
  - type: text
    content: ' to Jehoshaphat king of Judah, saying, “The king of Moab has rebelled against me. Will you go with me to fight against Moab?” And he replied, “I will go; I am as you are, my people as your people, my horses as your horses.” '
  '8':
  - type: text
    content: Jehoram said, “Which way shall we go up?” Jehoshaphat answered, “The way through the Wilderness of Edom.”
  '9':
  - type: text
    content: 'So the king of Israel went with the king of Judah and the king of Edom. They made a circuit of seven days’ journey, but there was no water for the army or for the cattle that followed them. '
