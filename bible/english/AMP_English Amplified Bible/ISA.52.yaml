document_id: ISA.52,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Cheer for Downtrodden Zion
  - type: text
    content: Awake, awake,
  - type: text
    content: Put on your strength, O Zion;
  - type: text
    content: Put on your beautiful garments,
  - type: text
    content: O Jerusalem, the holy city;
  - type: text
    content: For the uncircumcised and the unclean
  - type: text
    content: Will no longer come into you. [Rev 21:27]
  '10':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has bared His holy arm (His infinite power)'
  - type: text
    content: Before the eyes of all the nations [revealing Himself as the One by Whom Israel is redeemed from captivity],
  - type: text
    content: That all the ends of the earth may see
  - type: text
    content: The salvation of our God. [Luke 2:29-32; 3:6]
  '11':
  - type: text
    content: ¶Depart, depart, go out from there (the lands of exile),
  - type: text
    content: Touch no unclean thing;
  - type: text
    content: Go out of the midst of her (Babylon), purify yourselves,
  - type: text
    content: You who carry the articles of the L
  - type: heading
    content: ord
  - type: text
    content: ' [on your journey from there]. [2 Cor 6:16, 17]'
  '12':
  - type: text
    content: For you will not go out in a hurry [as when you left Egypt],
  - type: text
    content: Nor will you go in flight [fleeing, as you did from the Egyptians];
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will go before you,'
  - type: text
    content: And the God of Israel will be your rear guard.
  - type: heading
    content: The Exalted Servant
  '13':
  - type: text
    content: '¶Indeed, My Servant (the Messiah) will act wisely '
  - type: text
    content: and
  - type: text
    content: ' prosper;'
  - type: text
    content: He will be raised and lifted up and greatly exalted.
  '14':
  - type: text
    content: 'Just as many were astonished '
  - type: text
    content: and
  - type: text
    content: ' appalled at you, '
  - type: text
    content: My people,
  - type: text
    content: So His appearance was marred more than any man
  - type: text
    content: And His form [marred] more than the sons of men.
  '15':
  - type: text
    content: So He will sprinkle many nations [with His blood, providing salvation],
  - type: text
    content: Kings will shut their mouths because of Him;
  - type: text
    content: For what they had not been told they will see,
  - type: text
    content: And what they had not heard they will understand. [Rom 15:21]
  '2':
  - type: text
    content: Shake yourself from the dust, arise,
  - type: text
    content: O captive Jerusalem;
  - type: text
    content: Rid yourself of the chains around your neck,
  - type: text
    content: O captive Daughter of Zion.
  '3':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' says this, “You were sold for nothing and you will be redeemed, but not with money.” '
  '4':
  - type: text
    content: For the Lord G
  - type: heading
    content: od
  - type: text
    content: ' says this, “My people went down at the first into Egypt to live there; and [many years later Sennacherib] the Assyrian oppressed them without cause. '
  '5':
  - type: text
    content: But now, what do I have here,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ', “seeing that My people have been taken away without reason? Those who rule over them howl [with taunting and mockery of salvation],” declares the L'
  - type: heading
    content: ord
  - type: text
    content: ', “and My name is continually blasphemed all day long. [Rom 2:24] '
  '6':
  - type: text
    content: 'Therefore My people shall know My Name '
  - type: text
    content: and
  - type: text
    content: ' what it means. Therefore in that day I am the One who is speaking, ‘Here I am.’ ” [Ex 3:13, 14]'
  '7':
  - type: text
    content: '¶How beautiful '
  - type: text
    content: and
  - type: text
    content: ' delightful on the mountains'
  - type: text
    content: Are the feet of him who brings good news,
  - type: text
    content: Who announces peace,
  - type: text
    content: Who brings good news of good [things],
  - type: text
    content: Who announces salvation,
  - type: text
    content: Who says to Zion, “Your God reigns!” [Acts 10:36; Rom 10:15; Eph 6:14-16]
  '8':
  - type: text
    content: Listen! Your watchmen lift up their voices,
  - type: text
    content: Together they shout for joy;
  - type: text
    content: For they will see face to face
  - type: text
    content: The return of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Zion.'
  '9':
  - type: text
    content: Break forth, shout joyfully together,
  - type: text
    content: You ruins of Jerusalem;
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has comforted His people,'
  - type: text
    content: He has redeemed Jerusalem.
