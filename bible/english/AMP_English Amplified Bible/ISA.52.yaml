document_id: ISA.52,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cheer for Downtrodden Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Awake, awake,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on your strength, O Zion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on your beautiful garments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jerusalem, the holy city;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the uncircumcised and the unclean
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will no longer come into you. [Rev 21:27]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has bared His holy arm (His infinite power)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the eyes of all the nations [revealing Himself as the One by Whom Israel is redeemed from captivity],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That all the ends of the earth may see
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The salvation of our God. [Luke 2:29-32; 3:6]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶Depart, depart, go out from there (the lands of exile),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Touch no unclean thing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go out of the midst of her (Babylon), purify yourselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who carry the articles of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [on your journey from there]. [2 Cor 6:16, 17]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For you will not go out in a hurry [as when you left Egypt],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will you go in flight [fleeing, as you did from the Egyptians];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will go before you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the God of Israel will be your rear guard.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Exalted Servant
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '¶Indeed, My Servant (the Messiah) will act wisely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be raised and lifted up and greatly exalted.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Just as many were astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appalled at you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: My people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So His appearance was marred more than any man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His form [marred] more than the sons of men.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So He will sprinkle many nations [with His blood, providing salvation],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings will shut their mouths because of Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what they had not been told they will see,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what they had not heard they will understand. [Rom 15:21]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Shake yourself from the dust, arise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O captive Jerusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rid yourself of the chains around your neck,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O captive Daughter of Zion.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says this, “You were sold for nothing and you will be redeemed, but not with money.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' says this, “My people went down at the first into Egypt to live there; and [many years later Sennacherib] the Assyrian oppressed them without cause. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But now, what do I have here,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “seeing that My people have been taken away without reason? Those who rule over them howl [with taunting and mockery of salvation],” declares the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “and My name is continually blasphemed all day long. [Rom 2:24] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore My people shall know My Name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' what it means. Therefore in that day I am the One who is speaking, ‘Here I am.’ ” [Ex 3:13, 14]'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '¶How beautiful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delightful on the mountains'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are the feet of him who brings good news,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who announces peace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who brings good news of good [things],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who announces salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who says to Zion, “Your God reigns!” [Acts 10:36; Rom 10:15; Eph 6:14-16]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Listen! Your watchmen lift up their voices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Together they shout for joy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they will see face to face
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The return of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Zion.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Break forth, shout joyfully together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You ruins of Jerusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has comforted His people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has redeemed Jerusalem.
