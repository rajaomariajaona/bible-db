  '1':
  - type: heading
    content: Joshua’s Farewell Address
  - type: text
    content: A long time after that, when the L
  - type: heading
    content: ord
  - type: text
    content: ' had given Israel rest from all their enemies '
  - type: note
    content: Lit from round about.
  - type: text
    content: 'on every side, and Joshua had grown old and '
  - type: note
    content: Lit and he had entered days.
  - type: text
    content: 'advanced in years, '
  '10':
  - type: text
    content: One of your men puts to flight a thousand, for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is He who is fighting for you, just as He '
  - type: note
    content: Lit spoke to.
  - type: text
    content: 'promised you. '
  '11':
  - type: text
    content: 'So be very careful '
  - type: text
    content: and
  - type: text
    content: ' watchful of yourselves to '
  - type: note
    content: 'The word love is sometimes used to express the covenant relationship between Israel and God. Everything depended on whether or not Israel would continue to be faithful to the covenant established by God. Joshua knew the trap the pagan nations would be to Israel, so he proposed three guidelines: first, there must be obedience to God’s word (23:6); second, there must be a diligent separation from the Canaanite nations (23:7); finally, there must be a dependence on the Lord with heartfelt love (23:8-11).'
  - type: text
    content: love the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '12':
  - type: text
    content: 'For if you ever turn back and cling to the rest of these nations, these that are left among you, and intermarry with them, so that you associate with them and they with you, '
  '13':
  - type: text
    content: 'know '
  - type: text
    content: and
  - type: text
    content: ' understand with certainty that the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will not continue to drive these nations out from before you; but they will be a snare and trap to you, and a whip on your sides and thorns in your eyes, until you perish from this good land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has given you.'
  '14':
  - type: text
    content: “Now behold, today I am going the way of all the earth, and you know in all your hearts and in all your souls that not one word of all the good words which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has promised concerning you has failed; all have been fulfilled for you, not one of them has failed. '
  '15':
  - type: text
    content: It shall come about that just as every good word which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God spoke '
  - type: text
    content: and
  - type: text
    content: ' promised to you has '
  - type: note
    content: Lit come to.
  - type: text
    content: been fulfilled for you, so the L
  - type: heading
    content: ord
  - type: text
    content: ' will bring upon you every bad thing [about which He warned you], until He has destroyed '
  - type: text
    content: and
  - type: text
    content: ' eliminated you from this good land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has given you. '
  '16':
  - type: text
    content: When you transgress (violate) the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, which He commanded you [to follow], and you go and serve other gods and bow down to them, then the anger of the L'
  - type: heading
    content: ord
  - type: text
    content: ' will be kindled against you, and you shall perish quickly from the good land which He has given you.”'
  '2':
  - type: text
    content: 'that Joshua called all Israel, their elders and their heads and their judges and their officers, and said to them, “I am old and advanced in years. '
  '3':
  - type: text
    content: And you have seen all that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has done to all these nations for your sake; for the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God is He who has been fighting for you. [Ex 14:14] '
  '4':
  - type: text
    content: 'See, I have allotted to you these nations that remain as an inheritance for your tribes, with all the nations which I have cut off, from the Jordan [on the east] to the Great [Mediterranean] Sea toward the setting sun. '
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' your God will push them away from before you and drive them out of your sight and you will take possession of their land, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God '
  - type: note
    content: All through the time of Joshua’s leadership he kept giving as his statement of faith the fact that the Lord had spoken, the Lord had promised.
  - type: text
    content: 'promised you. '
  '6':
  - type: text
    content: 'Be steadfast '
  - type: text
    content: and
  - type: text
    content: ' very determined to keep and to do everything that is written in the Book of the Law of Moses, so that you do not turn aside from it to the right or the left, '
  '7':
  - type: text
    content: 'so that you do not associate with these nations which remain among you, or mention the name of their gods, or make anyone swear [an oath by them], or serve them, or bow down to them. '
  '8':
  - type: text
    content: But you are to cling to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, just as you have done to this day. '
  '9':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has driven out great and mighty nations from before you; and as for you, no man has been able to stand [in opposition] before you to this day. '
