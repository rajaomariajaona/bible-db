document_id: JOS.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua’s Farewell Address
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A long time after that, when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had given Israel rest from all their enemies '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: from round about
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on every side, and Joshua had grown old and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: and he had entered days
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'advanced in years, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One of your men puts to flight a thousand, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is He who is fighting for you, just as He '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: spoke to
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'promised you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So be very careful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watchful of yourselves to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: love
        - type: text
          text: ' is sometimes used to express the covenant relationship between Israel and God. Everything depended on whether or not Israel would continue to be faithful to the covenant established by God. Joshua knew the trap the pagan nations would be to Israel, so he proposed three guidelines: first, there must be obedience to God’s word (23:6); second, there must be a diligent separation from the Canaanite nations (23:7); finally, there must be a dependence on the L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' with heartfelt love (23:8-11).'
      marker-yv: yv-n
    - type: text
      text: love the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you ever turn back and cling to the rest of these nations, these that are left among you, and intermarry with them, so that you associate with them and they with you, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand with certainty that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God will not continue to drive these nations out from before you; but they will be a snare and trap to you, and a whip on your sides and thorns in your eyes, until you perish from this good land which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has given you.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now behold, today I am going the way of all the earth, and you know in all your hearts and in all your souls that not one word of all the good words which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has promised concerning you has failed; all have been fulfilled for you, not one of them has failed. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It shall come about that just as every good word which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God spoke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promised to you has '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: come to
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: been fulfilled for you, so the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will bring upon you every bad thing [about which He warned you], until He has destroyed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eliminated you from this good land which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has given you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you transgress (violate) the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, which He commanded you [to follow], and you go and serve other gods and bow down to them, then the anger of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be kindled against you, and you shall perish quickly from the good land which He has given you.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that Joshua called all Israel, their elders and their heads and their judges and their officers, and said to them, “I am old and advanced in years. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And you have seen all that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has done to all these nations for your sake; for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God is He who has been fighting for you. [Ex 14:14] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, I have allotted to you these nations that remain as an inheritance for your tribes, with all the nations which I have cut off, from the Jordan [on the east] to the Great [Mediterranean] Sea toward the setting sun. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God will push them away from before you and drive them out of your sight and you will take possession of their land, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All through the time of Joshua’s leadership he kept giving as his statement of faith the fact that the L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' had spoken, the L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' had promised.'
      marker-yv: yv-n
    - type: text
      text: 'promised you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be steadfast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' very determined to keep and to do everything that is written in the Book of the Law of Moses, so that you do not turn aside from it to the right or the left, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that you do not associate with these nations which remain among you, or mention the name of their gods, or make anyone swear [an oath by them], or serve them, or bow down to them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you are to cling to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, just as you have done to this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has driven out great and mighty nations from before you; and as for you, no man has been able to stand [in opposition] before you to this day. '
