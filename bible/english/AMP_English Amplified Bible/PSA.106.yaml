document_id: PSA.106
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 106
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel’s Rebelliousness and the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Deliverances.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!)'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for He is good;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness endure forever! [1 Chr 16:34]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Who can put into words the mighty deeds of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or who can proclaim all His praise [that is due Him]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Blessed are those who observe justice [by honoring God’s precepts],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who practice righteousness at all times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Remember me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', when You favor Your people.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Visit me with Your salvation [when You rescue them],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: That I may see the prosperity of Your chosen ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I may rejoice in the gladness of Your nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I may glory with Your inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶We have sinned like our fathers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have committed iniquity, we have behaved wickedly. [Lev 26:40-42]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Our fathers in Egypt did not understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' appreciate Your miracles;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They did not remember the abundance of Your mercies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' imprint Your lovingkindnesses on their hearts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But they were rebellious at the sea, at the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sea of Reeds;
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: Red Sea. [Ex 14:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nevertheless He saved them for His name’s sake,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He might make His [supreme] power known.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He rebuked the Red Sea, and it dried up;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He led them through the depths as through a pasture. [Ex 14:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So He saved them from the hand of the one that hated them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And redeemed them from the hand of the [Egyptian] enemy. [Ex 14:30]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And the waters covered their adversaries;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one of them was left. [Ex 14:27, 28; 15:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Israel believed in [the validity of] His words;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sang His praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶But they quickly forgot His works;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They did not [patiently] wait for His counsel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose [to be revealed regarding them],'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But lusted intensely in the wilderness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tempted God [with their insistent desires] in the desert. [Num 11:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So He gave them their request,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But sent a wasting disease among them. [Ps 78:29-31]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶They envied Moses in the camp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Aaron [the high priest], the holy one of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', [Num 16:1-32]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore the earth opened and swallowed Dathan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And engulfed the company of Abiram. [Num 16:31, 32]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And a fire broke out in their company;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The flame consumed the wicked. [Num 16:35, 46]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶They made a calf in Horeb (Sinai)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And worshiped a cast image. [Ex 32:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Thus they exchanged [the true God who was] their glory
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the image of an ox that eats grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They forgot God their Savior,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who had done such great things in Egypt,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Wonders in the land of Ham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awesome things at the Red Sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Therefore He said He would destroy them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[And He would have done so] had not Moses, His chosen one, stepped into the gap before Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To turn away His wrath from destroying them. [Ex 32:10, 11, 32]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then they despised the pleasant land [of Canaan];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They did not believe in His word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' rely on it,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But they sulked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complained in their tents;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They did not listen to the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Therefore He lifted up His hand [swearing] to them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He would cause them to fall in the wilderness,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And that He would cast out their descendants among the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: And scatter them in the lands [of the earth].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ¶They joined themselves also to [the idol] Baal of Peor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And ate sacrifices offered to the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Thus they provoked Him to anger with their practices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a plague broke out among them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Phinehas [the priest] stood up and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The exact meaning of the Hebrew here has been debated since ancient times. The term '
      - type: usfm
        marker: it
        children:
        - type: text
          text: interceded
      - type: text
        text: ' probably is best because it could refer to Phinehas’ intervention by executing the guilty couple (Num 25:7f), or to his interceding through prayer in behalf of Israel. No such prayer is recorded, but it is certainly possible that Phinehas prayed for relief before or after the execution. The ancient rabbis mostly understood the intercession as a prayer, but some of them took the meaning of the Hebrew to be that Phinehas interceded essentially by arguing with God as to whether it was fair to destroy so many people for the sins of two.'
    marker-yv: yv-n
  - type: text
    text: interceded,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And so the plague was halted. [Num 25:7, 8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And that was credited to him for righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To all generations forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '¶They provoked Him to anger at the waters of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: strife
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Meribah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that it went hard with Moses on their account; [Num 20:3-13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Because they were rebellious against His Spirit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moses spoke recklessly with his lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ¶They did not destroy the [pagan] peoples [in Canaan],
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded them,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: But they mingled with the [idolatrous] nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: And learned their ways,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: And served their idols,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which became a [dreadful] snare to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: They even sacrificed their sons and their daughters to demons [Deut 32:17; 2 Kin 16:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And shed innocent blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the blood of their sons and of their daughters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whom they sacrificed to the idols of Canaan;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the land was polluted with their blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: In this way they became unclean in their practices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They played the prostitute in their own deeds [by giving their worship, which belongs to God alone, to other “gods”].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ¶Therefore the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled against His people'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He detested His own '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '106:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. people.
    marker-yv: yv-n
  - type: text
    text: inheritance. [Deut 32:17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: He gave them into the hands of the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who hated them ruled over them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Their enemies also oppressed them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they were subdued under the [powerful] hand of their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
