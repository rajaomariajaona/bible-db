  '3':
  - type: text
    content: Blessed are those who observe justice [by honoring God’s precepts],
  - type: text
    content: Who practice righteousness at all times.
  '30':
  - type: text
    content: 'Then Phinehas [the priest] stood up and '
  - type: note
    content: The exact meaning of the Hebrew here has been debated since ancient times. The term interceded probably is best because it could refer to Phinehas’ intervention by executing the guilty couple (Num 25:7f), or to his interceding through prayer in behalf of Israel. No such prayer is recorded, but it is certainly possible that Phinehas prayed for relief before or after the execution. The ancient rabbis mostly understood the intercession as a prayer, but some of them took the meaning of the Hebrew to be that Phinehas interceded essentially by arguing with God as to whether it was fair to destroy so many people for the sins of two.
  - type: text
    content: interceded,
  - type: text
    content: And so the plague was halted. [Num 25:7, 8]
  '31':
  - type: text
    content: And that was credited to him for righteousness,
  - type: text
    content: To all generations forever.
  '32':
  - type: text
    content: '¶They provoked Him to anger at the waters of '
  - type: note
    content: Lit strife.
  - type: text
    content: Meribah,
  - type: text
    content: So that it went hard with Moses on their account; [Num 20:3-13]
  '33':
  - type: text
