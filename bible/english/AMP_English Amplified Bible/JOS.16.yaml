document_id: JOS.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Territory of Ephraim
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the lot (allotment) for the sons of Joseph went from the Jordan Valley at Jericho to the waters of Jericho on the east into the wilderness, going up from Jericho through the hill country to Bethel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then it went from Bethel to Luz, and continued to Ataroth, the border of the Archites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It went down westward to the territory of the Japhletites, as far as the outskirts of lower Beth-horon, then to Gezer, and it ended at the sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The sons of Joseph, Manasseh and Ephraim, received their inheritance. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now this was the territory of the sons of Ephraim according to their families: on the east side the border of their inheritance was Ataroth-addar, as far as upper Beth-horon. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the border went westward at Michmethath on the north, and turned eastward to Taanath-shiloh and continued beyond it to the east of Janoah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It went down from Janoah to Ataroth and to Naarah, touched Jericho and ended at the Jordan. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The border continued from Tappuah westward to the Brook Kanah, and it ended at the [Mediterranean] sea. This is the inheritance of the tribe of the sons of Ephraim according to their families (clans), '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'with the cities which were set apart for the sons of Ephraim within the inheritance of the sons of Manasseh, all the cities with their villages. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But they did not drive out the Canaanites who lived in Gezer, so the Canaanites live among Ephraim to this day, and they became forced laborers.
