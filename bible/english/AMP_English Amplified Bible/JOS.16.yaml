document_id: JOS.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Territory of Ephraim
  - type: text
    content: 'Then the lot (allotment) for the sons of Joseph went from the Jordan Valley at Jericho to the waters of Jericho on the east into the wilderness, going up from Jericho through the hill country to Bethel. '
  '10':
  - type: text
    content: But they did not drive out the Canaanites who lived in Gezer, so the Canaanites live among Ephraim to this day, and they became forced laborers.
  '2':
  - type: text
    content: 'Then it went from Bethel to Luz, and continued to Ataroth, the border of the Archites. '
  '3':
  - type: text
    content: It went down westward to the territory of the Japhletites, as far as the outskirts of lower Beth-horon, then to Gezer, and it ended at the sea.
  '4':
  - type: text
    content: 'The sons of Joseph, Manasseh and Ephraim, received their inheritance. '
  '5':
  - type: text
    content: 'Now this was the territory of the sons of Ephraim according to their families: on the east side the border of their inheritance was Ataroth-addar, as far as upper Beth-horon. '
  '6':
  - type: text
    content: 'Then the border went westward at Michmethath on the north, and turned eastward to Taanath-shiloh and continued beyond it to the east of Janoah. '
  '7':
  - type: text
    content: 'It went down from Janoah to Ataroth and to Naarah, touched Jericho and ended at the Jordan. '
  '8':
  - type: text
    content: 'The border continued from Tappuah westward to the Brook Kanah, and it ended at the [Mediterranean] sea. This is the inheritance of the tribe of the sons of Ephraim according to their families (clans), '
  '9':
  - type: text
    content: 'with the cities which were set apart for the sons of Ephraim within the inheritance of the sons of Manasseh, all the cities with their villages. '
