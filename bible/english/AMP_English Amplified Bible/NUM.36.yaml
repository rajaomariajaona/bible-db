document_id: NUM.36,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Inheritance by Marriage
  - type: text
    content: 'The leaders of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the family of the sons of Gilead, the son of Machir, the son of Manasseh, of the families of the sons of Joseph, approached and spoke before Moses and before the leaders, the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the Israelites, '
  '10':
  - type: text
    content: The daughters of Zelophehad did as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses. '
  '11':
  - type: text
    content: 'For Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to sons of their father’s brothers. '
  '12':
  - type: text
    content: They married into the families of the descendants of Manasseh the son of Joseph, and their inheritance remained in the tribe of the family of their father.
  '13':
  - type: text
    content: These are the commandments and the ordinances (judgments) which the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded through Moses to the sons of Israel in the plains of Moab by the Jordan [across from] Jericho.'
  '2':
  - type: text
    content: and they said, “The L
  - type: heading
    content: ord
  - type: text
    content: ' commanded my lord [Moses] to give the land by lot to the sons of Israel as an inheritance, and my lord was commanded by the L'
  - type: heading
    content: ord
  - type: text
    content: ' to give the inheritance of Zelophehad our brother to his daughters. '
  '3':
  - type: text
    content: 'But if the daughters marry any of the men from any of the '
  - type: text
    content: other
  - type: text
    content: ' tribes of Israel, then their inheritance will be taken away from that of our fathers (tribal ancestors) and will be added to the inheritance of the tribe to which they belong; so it will be taken away from our allotted inheritance. '
  '4':
  - type: text
    content: When the [year of] Jubilee of the Israelites comes, then their inheritance will be added [permanently] to that of the tribe to which they belong; so their inheritance will be taken away from that of the tribe of our fathers (tribal ancestors).”
  '5':
  - type: text
    content: Then Moses commanded the Israelites in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “The statement of the tribe of the sons of Joseph is correct. '
  '6':
  - type: text
    content: This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' commands regarding the daughters of Zelophehad: ‘Let them marry whom they wish; only they must marry within the family of the tribe of their father.’ '
  '7':
  - type: text
    content: 'So no inheritance of the Israelites shall be transferred from tribe to tribe, for every one of the Israelites shall hold to the inheritance of the tribe of his fathers (tribal ancestors). '
  '8':
  - type: text
    content: 'Every daughter who possesses an inheritance [of land] in any one of the tribes of the Israelites shall marry [only] a man whose family is of her father’s tribe, so that the Israelites may each possess the inheritance of his fathers (tribal ancestors). '
  '9':
  - type: text
    content: So no inheritance shall be transferred from one tribe to another, but each of the tribes of the Israelites shall hold to its own inheritance.”
