document_id: NUM.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Inheritance by Marriage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The leaders of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the family of the sons of Gilead, the son of Machir, the son of Manasseh, of the families of the sons of Joseph, approached and spoke before Moses and before the leaders, the heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the Israelites, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and they said, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded my lord [Moses] to give the land by lot to the sons of Israel as an inheritance, and my lord was commanded by the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to give the inheritance of Zelophehad our brother to his daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But if the daughters marry any of the men from any of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' tribes of Israel, then their inheritance will be taken away from that of our fathers (tribal ancestors) and will be added to the inheritance of the tribe to which they belong; so it will be taken away from our allotted inheritance. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When the [year of] Jubilee of the Israelites comes, then their inheritance will be added [permanently] to that of the tribe to which they belong; so their inheritance will be taken away from that of the tribe of our fathers (tribal ancestors).”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Moses commanded the Israelites in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “The statement of the tribe of the sons of Joseph is correct. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: This is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commands regarding the daughters of Zelophehad: ‘Let them marry whom they wish; only they must marry within the family of the tribe of their father.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So no inheritance of the Israelites shall be transferred from tribe to tribe, for every one of the Israelites shall hold to the inheritance of the tribe of his fathers (tribal ancestors). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Every daughter who possesses an inheritance [of land] in any one of the tribes of the Israelites shall marry [only] a man whose family is of her father’s tribe, so that the Israelites may each possess the inheritance of his fathers (tribal ancestors). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So no inheritance shall be transferred from one tribe to another, but each of the tribes of the Israelites shall hold to its own inheritance.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The daughters of Zelophehad did as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to sons of their father’s brothers. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They married into the families of the descendants of Manasseh the son of Joseph, and their inheritance remained in the tribe of the family of their father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: These are the commandments and the ordinances (judgments) which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded through Moses to the sons of Israel in the plains of Moab by the Jordan [across from] Jericho.'
