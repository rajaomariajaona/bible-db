  - type: text
    content: ' and the width shall be 20,000 '
  - type: text
    content: cubits
  - type: text
    content: '. It shall be holy (set apart for sacred use) within its every area. [Ezek 48:9, 12, 13] '
  '10':
  - type: text
    content: '“You shall have just balances '
  - type: text
    content: and
  - type: text
    content: ' weights [on your scales and just measures], a just ephah [dry volume measure] and a just bath [liquid measure]. '
  '11':
  - type: text
    content: 'The ephah and the bath [measures] shall be the same quantity, the bath containing one tenth of a homer and the ephah one tenth of a homer; their standard [measure] shall be according to the homer. '
  '12':
  - type: text
    content: The shekel shall be twenty gerahs; twenty shekels, twenty-five shekels, and fifteen shekels [added together, a total of sixty] shall be your maneh (mina).
  '13':
  - type: text
    content: '“This is the offering that you shall offer: a sixth of an ephah from a homer of wheat; a sixth of an ephah from a homer of barley; '
  '14':
  - type: text
    content: and the prescribed portion of oil, (
  - type: text
    content: namely,
  - type: text
    content: ' the bath of oil), a tenth part of a bath [of oil] from '
  - type: text
    content: each
  - type: text
    content: ' kor ('
  - type: text
    content: which is
  - type: text
    content: ' ten baths or a homer, for ten baths make a homer); '
  '15':
  - type: text
    content: and [you shall offer] one sheep out of every flock of two hundred from the watering places of Israel—for a grain offering, for a burnt offering, and for peace offerings to make atonement for [those who brought] them,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: '. '
  '16':
  - type: text
    content: '“All the people of the land shall give to this offering for the prince in Israel. '
  '17':
  - type: text
    content: 'It shall be the prince’s '
  - type: text
    content: responsibility to provide
  - type: text
    content: ' the burnt offerings, the grain offerings, and the drink offerings at the feasts, on the New Moons and on the Sabbaths, at all the appointed feasts of the house of Israel. He shall prepare '
  - type: text
    content: and
  - type: text
    content: ' provide the sin offering, the grain offering, the burnt offering and the peace offerings, to make atonement for the house of Israel.”'
  '18':
  - type: text
    content: ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “In the first '
  - type: text
    content: month,
  - type: text
    content: ' on the first of the month, you shall take a young bull without blemish and cleanse the sanctuary (from sin). '
  '19':
  - type: text
    content: 'The priest shall take some of the blood of the sin offering and put it on the door posts of the temple, on the four corners of the ledge of the altar, and on the posts of the gate of the inner courtyard. '
  '2':
  - type: text
    content: 'Of this there shall be a square plot five hundred by five hundred '
  - type: text
    content: cubits
  - type: text
    content: ' in perimeter for the holy place, and fifty cubits for the open space around it. '
  '20':
  - type: text
    content: You shall do this on the seventh [day] of the month for everyone who goes astray [and sins through error or ignorance] and for him who is naive; so shall you make atonement for the temple (house).
  '21':
  - type: text
    content: '“In the first '
  - type: text
    content: month,
  - type: text
    content: ' on the fourteenth day of the month, you shall have the Passover, a feast of seven days; unleavened bread shall be eaten. '
  '22':
  - type: text
    content: 'On that day the prince shall provide for himself and for all the people of the land a bull for a sin offering. '
  '23':
  - type: text
    content: And for the seven days of the feast he shall provide as a burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' seven bulls and seven rams without blemish on every day for the seven days, and a male goat daily for a sin offering. '
  '24':
  - type: text
    content: 'He shall provide as a grain offering [to be offered] with each bull an ephah [of grain], an ephah with each ram, and a hin of oil with each ephah [of grain]. '
  '25':
  - type: text
    content: 'In the seventh '
  - type: text
    content: month,
  - type: text
    content: ' on the fifteenth day of the month at the feast, he shall provide [offerings] like these for the seven days, as the sin offering, the burnt offering, the grain offering, and the oil.”'
  '3':
  - type: text
    content: 'And in this area you shall measure off a portion 25,000 '
  - type: text
    content: cubits
  - type: text
    content: ' in length and 10,000 '
  - type: text
    content: cubits
  - type: text
    content: ' in width. And in it shall be the sanctuary which is most holy. '
  '4':
  - type: text
    content: It shall be the holy portion of the land; it shall be for the priests, the ministers of the sanctuary, who come near to minister to the L
  - type: heading
    content: ord
  - type: text
    content: ', and it shall be a place for their houses and a holy place for the sanctuary. '
  '5':
  - type: text
    content: 'And '
  - type: text
    content: another portion of land
  - type: text
    content: ' 25,000 '
  - type: text
    content: cubits
  - type: text
    content: ' long and 10,000 cubits wide shall be for the Levites, the ministers of the temple (house), and they shall possess it as a place in which to live.'
  '6':
  - type: text
