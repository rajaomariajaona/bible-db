  '7':
  - type: text
    content: '“The prince shall have '
  - type: text
    content: land
  - type: text
    content: ' on either side of the portion set aside as a holy section and the property of the city, adjacent to the holy section and the property of the city, on the west side toward the west and on the east side toward the east, and in length comparable to one of the portions, from the west border to the east border. '
  '8':
  - type: text
    content: 'This shall be his land for a possession in Israel; so My princes shall no longer oppress My people, but they shall give '
  - type: text
    content: the rest of
  - type: text
