document_id: EZK.45,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ’
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: s
      - type: text
        text: ' Portion of the Land'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Moreover, when you divide the land by lot for inheritance, you shall [set apart and] offer an allotment (contribution) to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', a holy portion of the land [to be used for sacred purposes]. The length shall be 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits,
    - type: text
      text: ' and the width shall be 20,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: '. It shall be holy (set apart for sacred use) within its every area. [Ezek 48:9, 12, 13] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall have just balances '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weights [on your scales and just measures], a just ephah [dry volume measure] and a just bath [liquid measure]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The ephah and the bath [measures] shall be the same quantity, the bath containing one tenth of a homer and the ephah one tenth of a homer; their standard [measure] shall be according to the homer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The shekel shall be twenty gerahs; twenty shekels, twenty-five shekels, and fifteen shekels [added together, a total of sixty] shall be your maneh (mina).
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the offering that you shall offer: a sixth of an ephah from a homer of wheat; a sixth of an ephah from a homer of barley; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the prescribed portion of oil, (
    - type: usfm
      marker: it
      children:
      - type: text
        text: namely,
    - type: text
      text: ' the bath of oil), a tenth part of a bath [of oil] from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' kor ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: which is
    - type: text
      text: ' ten baths or a homer, for ten baths make a homer); '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and [you shall offer] one sheep out of every flock of two hundred from the watering places of Israel—for a grain offering, for a burnt offering, and for peace offerings to make atonement for [those who brought] them,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All the people of the land shall give to this offering for the prince in Israel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall be the prince’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: responsibility to provide
    - type: text
      text: ' the burnt offerings, the grain offerings, and the drink offerings at the feasts, on the New Moons and on the Sabbaths, at all the appointed feasts of the house of Israel. He shall prepare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provide the sin offering, the grain offering, the burnt offering and the peace offerings, to make atonement for the house of Israel.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “In the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: month,
    - type: text
      text: ' on the first of the month, you shall take a young bull without blemish and cleanse the sanctuary (from sin). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest shall take some of the blood of the sin offering and put it on the door posts of the temple, on the four corners of the ledge of the altar, and on the posts of the gate of the inner courtyard. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of this there shall be a square plot five hundred by five hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in perimeter for the holy place, and fifty cubits for the open space around it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall do this on the seventh [day] of the month for everyone who goes astray [and sins through error or ignorance] and for him who is naive; so shall you make atonement for the temple (house).
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: month,
    - type: text
      text: ' on the fourteenth day of the month, you shall have the Passover, a feast of seven days; unleavened bread shall be eaten. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day the prince shall provide for himself and for all the people of the land a bull for a sin offering. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And for the seven days of the feast he shall provide as a burnt offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' seven bulls and seven rams without blemish on every day for the seven days, and a male goat daily for a sin offering. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall provide as a grain offering [to be offered] with each bull an ephah [of grain], an ephah with each ram, and a hin of oil with each ephah [of grain]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: month,
    - type: text
      text: ' on the fifteenth day of the month at the feast, he shall provide [offerings] like these for the seven days, as the sin offering, the burnt offering, the grain offering, and the oil.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in this area you shall measure off a portion 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in length and 10,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' in width. And in it shall be the sanctuary which is most holy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It shall be the holy portion of the land; it shall be for the priests, the ministers of the sanctuary, who come near to minister to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and it shall be a place for their houses and a holy place for the sanctuary. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another portion of land
    - type: text
      text: ' 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long and 10,000 cubits wide shall be for the Levites, the ministers of the temple (house), and they shall possess it as a place in which to live.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You shall give the city possession of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an area
    - type: text
      text: ' 5,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' wide and 25,000 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long, alongside the portion set aside as a holy section. It shall belong to the whole house of Israel.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Portion for the Prince
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The prince shall have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: land
    - type: text
      text: ' on either side of the portion set aside as a holy section and the property of the city, adjacent to the holy section and the property of the city, on the west side toward the west and on the east side toward the east, and in length comparable to one of the portions, from the west border to the east border. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This shall be his land for a possession in Israel; so My princes shall no longer oppress My people, but they shall give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest of
    - type: text
      text: ' the land to the house of Israel according to their tribes.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Enough, O princes of Israel! Put away violence and destruction, and practice justice and righteousness. Stop your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: expropriations
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: forceful seizure of property from My people,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
