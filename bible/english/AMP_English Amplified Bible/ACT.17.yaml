  '22':
  - type: text
    content: 'So Paul, standing in the center of the Areopagus, said: “Men of Athens, I observe [with every turn I make throughout the city] that you are very religious '
  - type: text
    content: and
  - type: text
    content: ' devout in all respects. '
  '23':
  - type: text
    content: 'Now as I was going along and carefully looking at your objects of worship, I came to an altar with this inscription: ‘TO AN '
  - type: note
    content: While the philosophers had little or no regard for the old mythological gods of the Greeks, the temples to various deities remained and worship practices continued, at least as a formal tradition. The altar to the Unknown seems to have been constructed for the purpose of acknowledging any god who had been overlooked. Paul seized upon it as an opportunity to introduce the Greeks to Christ.
  - type: text
    content: 'UNKNOWN GOD.’ Therefore what you already worship as unknown, this I proclaim to you. '
  '24':
  - type: text
    content: 'The God who created the world and everything in it, since He is Lord of heaven and earth, does not dwell in temples made with hands; '
  '25':
  - type: text
    content: 'nor is He '
  - type: note
    content: Here Paul uses an unusual word which normally refers to healing. He was educated in classical Greek literature to some extent (see note v 28 and 22:3), and what he says here recalls earlier arguments by Plato (in his dialogues the Euthyphro and the Symposium) which should have struck a responsive chord in the listeners. In the dialogues, Plato represents Socrates as analyzing the nature of service to a god, and points out that the god can only receive actual benefit from service if he is in need or lacking something. Paul masterfully adapts himself to the thinking of the Athenians, demonstrating to them that the gods whom they serve with sacrifices and worship cannot really be gods at all, unless it is possible for a god to have faults or needs that have to be satisfied. This is also a good point for the Christian to bear in mind; believers are to serve God, but this is not a service that in any way actually benefits Him, because He is perfect and in no need of anything which man can supply. The same is true for the sacrificial system of the OT. While God is represented there as demanding sacrifices and sometimes enjoying their pleasant aromas, the sacrifices did not actually benefit Him. In reality they pointed ahead to the supreme sacrifice of Christ, which was the ultimate payment for mankind’s sins.
  - type: text
    content: 'served by human hands, as though He needed anything, because it is He who gives to all [people] life and breath and all things. [Is 42:5] '
