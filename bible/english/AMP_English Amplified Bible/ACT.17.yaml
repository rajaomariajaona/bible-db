  '4':
  - type: text
    content: 'And some of them were persuaded '
  - type: text
    content: to believe
  - type: text
    content: ' and joined Paul and Silas, along with a large number of the God-fearing Greeks and many of the leading women. '
  '5':
  - type: text
    content: 'But the [unbelieving] Jews became jealous, and taking along some thugs from [the lowlifes in] the market place, they formed a mob and set the city in an uproar; and then attacking Jason’s house tried to bring Paul and Silas out to the people. '
  '6':
  - type: text
    content: 'But when they failed to find them, they dragged Jason and some brothers before the city authorities, shouting, “These men who have turned the world upside down have come here too; '
  '7':
  - type: text
    content: 'and Jason has welcomed them [into his house and protected them]! And they all are saying things contrary to the decrees of Caesar, [actually] claiming that there is another king, Jesus.” '
  '8':
  - type: text
    content: 'They stirred up the crowd and the city authorities who heard these things. '
  '9':
  - type: text
    content: And when they had taken security (bail) from Jason and the others, they let them go.
  - type: heading
    content: Paul at Berea
