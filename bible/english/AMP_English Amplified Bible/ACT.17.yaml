document_id: ACT.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul at Thessalonica
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now after Paul and Silas had traveled through Amphipolis and Apollonia, they came to Thessalonica, where there was a synagogue of the Jews. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The brothers immediately sent Paul and Silas away by night to Berea; and when they arrived, they entered the Jewish synagogue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now these people were more noble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' open-minded than those in Thessalonica, so they received the message [of salvation through faith in the Christ] with great eagerness, examining the Scriptures daily to see if these things were so. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'As a result many of them became believers, together with a number of prominent Greek women and men. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But when the Jews of Thessalonica learned that the word of God [concerning eternal salvation through faith in Christ] had also been preached by Paul at Berea, they came there too, agitating and disturbing the crowds. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So at that time the brothers immediately sent Paul away to go as far as the sea; but Silas and Timothy remained there [at Berea]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Those who escorted Paul brought him to Athens; and [after] receiving instructions [from Paul] for Silas and Timothy to join him as soon as possible, they left.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul at Athens
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now while Paul was waiting for them at Athens, his spirit was greatly angered when he saw that the city was full of idols. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So he had discussions in the synagogue with the Jews and the God-fearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gentiles,
    - type: text
      text: ' and in the market place day after day with any who happened to be there. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And some of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These were among the leading philosophies of the day. Neither believed in a personal God; indeed, the Epicureans were confirmed atheists. Their goal was to get as much out of life as possible. The Stoics had a strong, fatalistic sense of duty, seeking to improve the inner man.
      marker-yv: yv-n
    - type: text
      text: 'Epicurean and Stoic philosophers began to engage in conversation with him. And some said, “What could this idle babbler [with his eclectic, scrap-heap learning] have in mind to say?” Others said, “He seems to be a proclaimer of strange deities”—because he was preaching the good news about Jesus and the resurrection. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They took him and brought him to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Mars Hill,
        - type: text
          text: ' named for Mars, the Roman god of war. It was the place where the ancient Greek Areopagus Council convened and had varying powers in the course of its history. In Roman times it was where the supreme government of Athens met.'
      marker-yv: yv-n
    - type: text
      text: 'Areopagus (Hill of Ares, the Greek god of war), saying, “May we know what this [strange] new teaching is which you are proclaiming? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Paul entered the synagogue, as was his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul had earlier announced that he was turning to the Gentiles (13:46), but he nevertheless kept to his practice of speaking to Jews first while focusing primarily on Gentiles.
      marker-yv: yv-n
    - type: text
      text: 'custom, and for three Sabbaths he engaged in discussion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' friendly debate with them from the Scriptures, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For you are bringing some startling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strange things to our ears; so we want to know what they mean.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: (Now all the Athenians and the foreigners visiting there used to spend their [leisure] time in nothing other than telling or hearing something new.)
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sermon on Mars Hill
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Paul, standing in the center of the Areopagus, said: “Men of Athens, I observe [with every turn I make throughout the city] that you are very religious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devout in all respects. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now as I was going along and carefully looking at your objects of worship, I came to an altar with this inscription: ‘TO AN '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: While the philosophers had little or no regard for the old mythological gods of the Greeks, the temples to various deities remained and worship practices continued, at least as a formal tradition. The altar to the Unknown seems to have been constructed for the purpose of acknowledging any god who had been overlooked. Paul seized upon it as an opportunity to introduce the Greeks to Christ.
      marker-yv: yv-n
    - type: text
      text: 'UNKNOWN GOD.’ Therefore what you already worship as unknown, this I proclaim to you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The God who created the world and everything in it, since He is Lord of heaven and earth, does not dwell in temples made with hands; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'nor is He '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Here Paul uses an unusual word which normally refers to healing. He was educated in classical Greek literature to some extent (see note v 28 and 22:3), and what he says here recalls earlier arguments by Plato (in his dialogues '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the Euthyphro
        - type: text
          text: ' and '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the Symposium)
        - type: text
          text: ' which should have struck a responsive chord in the listeners. In the dialogues, Plato represents Socrates as analyzing the nature of service to a god, and points out that the god can only receive actual benefit from service if he is in need or lacking something. Paul masterfully adapts himself to the thinking of the Athenians, demonstrating to them that the gods whom they serve with sacrifices and worship cannot really be gods at all, unless it is possible for a god to have faults or needs that have to be satisfied. This is also a good point for the Christian to bear in mind; believers are to serve God, but this is not a service that in any way actually benefits Him, because He is perfect and in no need of anything which man can supply. The same is true for the sacrificial system of the OT. While God is represented there as demanding sacrifices and sometimes enjoying their pleasant aromas, the sacrifices did not actually benefit Him. In reality they pointed ahead to the supreme sacrifice of Christ, which was the ultimate payment for mankind’s sins.'
      marker-yv: yv-n
    - type: text
      text: 'served by human hands, as though He needed anything, because it is He who gives to all [people] life and breath and all things. [Is 42:5] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And He made from one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' every nation of mankind to live on the face of the earth, having determined their appointed times and the boundaries of their lands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' territories. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'This was so that they would seek God, if perhaps they might grasp for Him and find Him, though He is not far from each one of us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For in Him we live and move and exist [that is, in Him we actually have our being], as even some of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul was probably exposed to Greek literature when he studied with Gamaliel, and quoting or paraphrasing a line from one of their poets would have surprised and kept the attention of the audience. See note 22:3.
      marker-yv: yv-n
    - type: text
      text: 'your own poets have said, ‘For we also are His children.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So then, being God’s children, we should not think that the Divine Nature (deity) is like gold or silver or stone, an image formed by the art and imagination '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' skill of man. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'explaining and pointing out [scriptural evidence] that it was necessary for the Christ to suffer and rise from the dead, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' “This Jesus, whom I am proclaiming to you, is the Christ (the Messiah, the Anointed).” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Therefore God overlooked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disregarded the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: former
    - type: text
      text: ' ages of ignorance; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' now He commands all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' everywhere to repent [that is, to change their old way of thinking, to regret their past sins, and to seek God’s purpose for their lives], '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'because He has set a day when He will judge the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: inhabited
    - type: text
      text: ' world in righteousness by a Man whom He has appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destined for that task, and He has provided credible proof to everyone by raising Him from the dead.” [Ps 9:8; 96:13; 98:9]'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Now when they heard [the term] resurrection from the dead, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 18.
      marker-yv: yv-n
    - type: text
      text: 'some mocked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sneered; but others said, “We will hear from you again about this matter.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So Paul left them. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But some men joined him and believed; among them were Dionysius, [a judge] of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Council of
    - type: text
      text: ' Areopagus, and a woman named Damaris, and others with them.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And some of them were persuaded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to believe
    - type: text
      text: ' and joined Paul and Silas, along with a large number of the God-fearing Greeks and many of the leading women. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But the [unbelieving] Jews became jealous, and taking along some thugs from [the lowlifes in] the market place, they formed a mob and set the city in an uproar; and then attacking Jason’s house tried to bring Paul and Silas out to the people. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But when they failed to find them, they dragged Jason and some brothers before the city authorities, shouting, “These men who have turned the world upside down have come here too; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and Jason has welcomed them [into his house and protected them]! And they all are saying things contrary to the decrees of Caesar, [actually] claiming that there is another king, Jesus.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'They stirred up the crowd and the city authorities who heard these things. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And when they had taken security (bail) from Jason and the others, they let them go.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul at Berea
    marker-yv: yv-h
