  - type: note
    content: Paul was probably exposed to Greek literature when he studied with Gamaliel, and quoting or paraphrasing a line from one of their poets would have surprised and kept the attention of the audience. See note 22:3.
  - type: text
    content: 'your own poets have said, ‘For we also are His children.’ '
