    content: Paul at Thessalonica
  - type: text
    content: 'Now after Paul and Silas had traveled through Amphipolis and Apollonia, they came to Thessalonica, where there was a synagogue of the Jews. '
  '10':
  - type: text
    content: 'The brothers immediately sent Paul and Silas away by night to Berea; and when they arrived, they entered the Jewish synagogue. '
  '11':
  - type: text
    content: 'Now these people were more noble '
  - type: text
    content: and
  - type: text
    content: ' open-minded than those in Thessalonica, so they received the message [of salvation through faith in the Christ] with great eagerness, examining the Scriptures daily to see if these things were so. '
  '12':
  - type: text
    content: 'As a result many of them became believers, together with a number of prominent Greek women and men. '
  '13':
  - type: text
    content: 'But when the Jews of Thessalonica learned that the word of God [concerning eternal salvation through faith in Christ] had also been preached by Paul at Berea, they came there too, agitating and disturbing the crowds. '
  '14':
  - type: text
    content: 'So at that time the brothers immediately sent Paul away to go as far as the sea; but Silas and Timothy remained there [at Berea]. '
  '15':
  - type: text
    content: Those who escorted Paul brought him to Athens; and [after] receiving instructions [from Paul] for Silas and Timothy to join him as soon as possible, they left.
  - type: heading
    content: Paul at Athens
  '16':
  - type: text
    content: 'Now while Paul was waiting for them at Athens, his spirit was greatly angered when he saw that the city was full of idols. '
  '17':
  - type: text
    content: 'So he had discussions in the synagogue with the Jews and the God-fearing '
  - type: text
    content: Gentiles,
  - type: text
    content: ' and in the market place day after day with any who happened to be there. '
  '18':
  - type: text
    content: 'And some of the '
  - type: note
    content: These were among the leading philosophies of the day. Neither believed in a personal God; indeed, the Epicureans were confirmed atheists. Their goal was to get as much out of life as possible. The Stoics had a strong, fatalistic sense of duty, seeking to improve the inner man.
  - type: text
    content: 'Epicurean and Stoic philosophers began to engage in conversation with him. And some said, “What could this idle babbler [with his eclectic, scrap-heap learning] have in mind to say?” Others said, “He seems to be a proclaimer of strange deities”—because he was preaching the good news about Jesus and the resurrection. '
  '19':
  - type: text
    content: 'They took him and brought him to the '
  - type: note
    content: Also known as Mars Hill, named for Mars, the Roman god of war. It was the place where the ancient Greek Areopagus Council convened and had varying powers in the course of its history. In Roman times it was where the supreme government of Athens met.
  - type: text
    content: 'Areopagus (Hill of Ares, the Greek god of war), saying, “May we know what this [strange] new teaching is which you are proclaiming? '
  '2':
  - type: text
    content: 'And Paul entered the synagogue, as was his '
  - type: note
    content: Paul had earlier announced that he was turning to the Gentiles (13:46), but he nevertheless kept to his practice of speaking to Jews first while focusing primarily on Gentiles.
  - type: text
    content: 'custom, and for three Sabbaths he engaged in discussion '
  - type: text
