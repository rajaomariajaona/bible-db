verses:
  '1':
  - type: heading
    content: The King’s Forgotten Dream
  - type: text
    content: 'In the second year (604 '
  - type: heading
    content: b
  - type: text
    content: .
  - type: heading
    content: c
  - type: text
    content: '.) of the reign of Nebuchadnezzar, Nebuchadnezzar had dreams which troubled '
  - type: text
    content: and
  - type: text
    content: ' disturbed his spirit and [interfered with] his ability to sleep. '
  '10':
  - type: text
    content: 'The Chaldeans answered the king and said, “There is not a man on earth who can tell the king this matter, for no king, lord or ruler has ever asked such a thing as this of any magician or enchanter or Chaldean. '
  '11':
  - type: text
    content: 'Furthermore, what the king demands is an unusual '
  - type: text
    content: and
  - type: text
    content: ' difficult thing indeed! No one except the gods can reveal it to the king, and their dwelling is not with [mortal] flesh.”'
  '12':
  - type: text
    content: 'Because of this the king was indignant and extremely furious and gave a command to destroy all the wise men of Babylon. '
  '13':
  - type: text
    content: So the decree went out that the wise men were to be killed; and they looked for Daniel and his companions to put them to death.
  '14':
  - type: text
    content: 'Then Daniel replied with discretion and wisdom to Arioch, the captain of the king’s '
  - type: note
    content: Or executioners.
  - type: text
    content: 'bodyguard, who had gone out to execute the wise men of Babylon; '
  '15':
  - type: text
    content: 'he said to Arioch, the king’s captain, “Why is the decree from the king so harsh '
  - type: text
    content: and
  - type: text
    content: ' urgent?” Then Arioch explained the matter to Daniel. '
  '16':
  - type: text
    content: 'So Daniel went in and asked the king to appoint a date '
  - type: text
    content: and
  - type: text
    content: ' give him time, so that he might reveal to the king the interpretation '
  - type: text
    content: of the dream
  - type: text
    content: .
  '17':
  - type: text
    content: 'Then Daniel returned to his house and discussed the matter with Hananiah, Mishael, and Azariah, his companions, '
  '18':
  - type: text
    content: in order that they might seek compassion from the God of heaven regarding this secret, so that Daniel and his companions would not be executed with the rest of the wise men of Babylon.
  - type: heading
    content: The Secret Is Revealed to Daniel
  '19':
  - type: text
    content: 'Then the secret was revealed to Daniel in a vision of the night, and Daniel blessed the God of heaven. '
  '2':
  - type: text
    content: 'Then the king gave a command to call the magicians, the enchanters, the sorcerers, and the '
  - type: note
    content: I.e. Babylonian sages who were master astrologers, and so below.
  - type: text
    content: 'Chaldeans to tell the king his dreams. So they came in and stood before the king. '
  '20':
  - type: text
    content: Daniel answered,
  - type: text
    content: “Blessed be the name of God forever and ever,
  - type: text
    content: For wisdom and power belong to Him.
  '21':
  - type: text
    content: “It is He who changes the times and the seasons;
  - type: text
    content: He removes kings and establishes kings.
  - type: text
    content: He gives wisdom to the wise
  - type: text
    content: And [greater] knowledge to those who have understanding! [Dan 4:35]
  '22':
  - type: text
    content: “It is He who reveals the profound and hidden things;
  - type: text
    content: He knows what is in the darkness,
  - type: text
    content: And the light dwells with Him. [Job 15:8; Ps 25:14; Matt 6:6]
  '23':
  - type: text
    content: “I thank You and praise You, O God of my fathers,
  - type: text
    content: For You have given me wisdom and power;
  - type: text
    content: Even now You have made known to me what we requested of You,
  - type: text
    content: For You have made known to us [the solution to] the king’s matter.”
  '24':
  - type: text
    content: 'So Daniel went to Arioch, whom the king had appointed to destroy the wise men of Babylon; he went and said this to him: “Do not execute the wise men of Babylon! Bring me before the king, and I will reveal to the king the interpretation [of his dream].”'
  '25':
  - type: text
    content: 'Then Arioch hurriedly brought Daniel before the king and said this to him: “I have found a man among the exiles of Judah who can explain to the king the interpretation [of the dream].” '
  '26':
  - type: text
    content: 'The king said to Daniel, whose [Babylonian] name was Belteshazzar, “Are you able to reveal to me the [content of the] dream which I have seen and its interpretation?” '
  '27':
  - type: text
    content: 'Daniel answered the king and said, “Regarding the mystery about which the king has inquired, neither the wise men, enchanters, magicians, nor astrologers are able to answer the king, '
  '28':
  - type: text
    content: 'but there is a God in heaven who reveals secrets, and He has shown King Nebuchadnezzar what will take place in the latter days (end of days). This was your dream and the vision [that appeared] in your mind while on your bed. '
  '29':
  - type: text
    content: 'As for you, O king, as you were lying on your bed thoughts came into your mind about what will take place in the future; and He who reveals secrets has shown you what will occur. '
  '3':
  - type: text
    content: 'The king said to them, “I had a dream, and my spirit is troubled '
  - type: text
    content: and
  - type: text
    content: ' anxious to know the [content and meaning of the] dream.”'
  '30':
  - type: text
    content: But as for me, this secret has not been revealed to me because my wisdom is greater than that of any other living man, but in order to make the interpretation known to the king, and so that you may understand [fully] the thoughts of your mind.
  - type: heading
    content: The King’s Dream
  '31':
  - type: text
    content: '“You, O king, were looking, and behold, [there was] a single great statue; this image, which was large and of unsurpassed splendor, stood before you, and its appearance was awesome '
  - type: text
    content: and
  - type: text
    content: ' terrifying. '
  '32':
  - type: text
    content: 'As for this '
  - type: note
    content: 'Daniel’s interpretation of Nebuchadnezzar’s dream outlines the further history of Gentile world power. The four metals of which the statue was made represented four successive empires, each with the power to rule the inhabited earth—though each stopped short of that. They were: (1) Babylon (Jer 51:7); (2) Medo-Persia; (3) Greece under Alexander; and (4) Rome. The latter power was divided first into the two legs, corresponding to the eastern and western Roman Empires, and then (after a very long time apparently) into the ten toes, a confederacy made up largely of European nations (7:24-27).'
  - type: text
    content: 'statue, its head '
  - type: text
    content: was made
  - type: text
    content: ' of fine gold, its breast and its arms of silver, its belly and its thighs of bronze, '
  '33':
  - type: text
    content: 'its legs of iron, its feet partly of iron and partly of clay [pottery]. '
  '34':
  - type: text
    content: 'As you were looking, a '
  - type: note
    content: The eternal kingdom of God, the Messianic kingdom, will extend over all the earth, and those who reject Jesus, the Messiah, the Stone, will be crushed. See also Ps 118:22, 23; Is 8:14; Matt 21:44; Luke 20:18; 1 Pet 2:4-8.
  - type: text
    content: 'stone was cut out without [human] hands, and it struck the statue on its feet of iron and clay and crushed them. [1 Pet 2:3-8] '
  '35':
  - type: text
    content: Then the iron, the clay, the bronze, the silver, and the gold were crushed together and became like the chaff from the summer threshing floors; and the wind carried them away so that not a trace of them could be found. And the stone that struck the statue became a great mountain and filled the whole earth.
  - type: heading
    content: The Interpretation—Babylon the First Kingdom
  '36':
  - type: text
    content: '“This was the dream; now we will tell the king its interpretation. '
  '37':
  - type: text
    content: 'You, O king, are the king of [earthly] kings, to whom the God of heaven has given the kingdom, the power, the strength and the glory; [Jer 25:9; 27:6; 28:14] '
  '38':
  - type: text
    content: and wherever the sons of men dwell, and the beasts of the field, and the birds of the heavens, He has given them into your hand and has made you ruler over them all. You [king of Babylon] are the head of gold.
  - type: heading
    content: Medo-Persia and Greece
  '39':
  - type: text
    content: After you will arise another kingdom (Medo-Persia) inferior to you, and then a third kingdom of bronze (Greece under Alexander the Great), which will rule over all the earth.
  - type: heading
    content: Rome
  '4':
  - type: text
    content: 'Then the Chaldeans said to the king in '
  - type: note
    content: In addition to their native language, most people involved in government or trade could speak and write in Aramaic. At this point in the book Daniel switches from writing in Hebrew to writing in Aramaic. He returns to writing in Hebrew in ch 8.
  - type: text
    content: 'Aramaic, “O king, live forever! Tell the dream to your servants, and we will declare the interpretation.” '
  '40':
  - type: text
    content: 'Then a fourth kingdom (Rome) will be strong as iron, for iron breaks to pieces and shatters all things; and like iron which crushes things in pieces, it will break and crush all these [others]. [Dan 7:7, 23] '
  '41':
  - type: text
    content: 'And as you saw the feet and toes, partly of potter’s clay and partly of iron, it will be a divided kingdom; but there will be in it some of the durability '
  - type: text
    content: and
  - type: text
    content: ' strength of iron, just as you saw the iron mixed with common clay. '
  '42':
  - type: text
    content: 'As the [ten] toes of the feet were partly of iron and partly of clay, so some of the kingdom will be strong, and '
  - type: text
    content: another
  - type: text
    content: ' part of it will be brittle. '
  '43':
  - type: text
    content: And as you saw the iron mixed with common clay, so they will combine with one another in the seed of men; but they will not merge [for such diverse things or ideologies cannot unite], even as iron does not mix with clay.
  - type: heading
    content: The Divine Kingdom
  '44':
  - type: text
    content: 'In the days of those [final ten] kings the God of heaven will set up a kingdom that will never be destroyed, nor will its sovereignty be left for another people; but it will crush and put an end to all these kingdoms, and it will stand forever. [Dan 7:14-17; Luke 1:31-33; Rev 11:15] '
  '45':
  - type: text
    content: Just as you saw that a stone was cut out of the mountain without hands and that it crushed the iron, the bronze, the clay, the silver and the gold, the great God has revealed to the king what will take place in the future; so the dream is true and its interpretation is trustworthy.”
  - type: heading
    content: Daniel Promoted
  '46':
  - type: text
    content: 'Then King Nebuchadnezzar fell face downward and paid respect to Daniel [as a great prophet of the highest God], and gave orders for an offering and fragrant incense to be presented to him [in honor of his God]. '
  '47':
  - type: text
    content: 'The king answered Daniel and said, “Most certainly your God is the God of gods and the Lord of kings and a revealer of mysteries, since you have been able to reveal this mystery!” [Prov 3:32; Rev 19:16] '
  '48':
  - type: text
    content: 'Then the king promoted Daniel [to an exalted position] and gave him many great gifts, and he made him ruler over the entire province of Babylon and chief governor over all the wise men of Babylon. '
  '49':
  - type: text
    content: And Daniel made a request of the king, and he appointed Shadrach, Meshach, and Abed-nego over the affairs of the province of Babylon, while Daniel was at the court of the king.
  '5':
  - type: text
    content: 'The king replied to the Chaldeans, “My command is firm '
  - type: text
    content: and
  - type: text
    content: ' unchangeable: if you do not reveal to me the [content of the] dream along with its interpretation, you shall be cut into pieces and your houses shall be made a heap of rubbish. '
  '6':
  - type: text
    content: 'But if you tell [me] the [content of the] dream along with its interpretation, you shall receive from me gifts and rewards and great honor. So tell me the dream and its interpretation.” '
  '7':
  - type: text
    content: 'They answered again, “Let the king tell the dream to his servants, and we will explain its interpretation [to you].” '
  '8':
  - type: text
    content: 'The king replied, “I know for certain that you are bargaining for time, because you have seen that my command [to you] is firm '
  - type: text
    content: and
  - type: text
    content: ' irrevocable. '
  '9':
  - type: text
    content: 'If you will not reveal to me the [content of the] dream, there is but one sentence for you; for you have [already] prepared lying and corrupt words [and you have agreed together] to speak [them] before me [hoping to delay your execution] until the situation is changed. Therefore, tell me the dream [first], and then I will know [with confidence] that you can give me its interpretation.” '
