document_id: DAN.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The King’s Forgotten Dream
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the second year (604 '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: b
  - type: text
    text: .
  - type: usfm
    marker: sc
    children:
    - type: text
      text: c
  - type: text
    text: '.) of the reign of Nebuchadnezzar, Nebuchadnezzar had dreams which troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disturbed his spirit and [interfered with] his ability to sleep. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the king gave a command to call the magicians, the enchanters, the sorcerers, and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Babylonian sages who were master astrologers, and so below.
    marker-yv: yv-n
  - type: text
    text: 'Chaldeans to tell the king his dreams. So they came in and stood before the king. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The king said to them, “I had a dream, and my spirit is troubled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anxious to know the [content and meaning of the] dream.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the Chaldeans said to the king in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In addition to their native language, most people involved in government or trade could speak and write in Aramaic. At this point in the book Daniel switches from writing in Hebrew to writing in Aramaic. He returns to writing in Hebrew in ch 8.
    marker-yv: yv-n
  - type: text
    text: 'Aramaic, “O king, live forever! Tell the dream to your servants, and we will declare the interpretation.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The king replied to the Chaldeans, “My command is firm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unchangeable: if you do not reveal to me the [content of the] dream along with its interpretation, you shall be cut into pieces and your houses shall be made a heap of rubbish. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But if you tell [me] the [content of the] dream along with its interpretation, you shall receive from me gifts and rewards and great honor. So tell me the dream and its interpretation.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They answered again, “Let the king tell the dream to his servants, and we will explain its interpretation [to you].” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The king replied, “I know for certain that you are bargaining for time, because you have seen that my command [to you] is firm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' irrevocable. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If you will not reveal to me the [content of the] dream, there is but one sentence for you; for you have [already] prepared lying and corrupt words [and you have agreed together] to speak [them] before me [hoping to delay your execution] until the situation is changed. Therefore, tell me the dream [first], and then I will know [with confidence] that you can give me its interpretation.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The Chaldeans answered the king and said, “There is not a man on earth who can tell the king this matter, for no king, lord or ruler has ever asked such a thing as this of any magician or enchanter or Chaldean. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Furthermore, what the king demands is an unusual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' difficult thing indeed! No one except the gods can reveal it to the king, and their dwelling is not with [mortal] flesh.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Because of this the king was indignant and extremely furious and gave a command to destroy all the wise men of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So the decree went out that the wise men were to be killed; and they looked for Daniel and his companions to put them to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Daniel replied with discretion and wisdom to Arioch, the captain of the king’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: executioners
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'bodyguard, who had gone out to execute the wise men of Babylon; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'he said to Arioch, the king’s captain, “Why is the decree from the king so harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' urgent?” Then Arioch explained the matter to Daniel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Daniel went in and asked the king to appoint a date '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give him time, so that he might reveal to the king the interpretation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the dream
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Daniel returned to his house and discussed the matter with Hananiah, Mishael, and Azariah, his companions, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: in order that they might seek compassion from the God of heaven regarding this secret, so that Daniel and his companions would not be executed with the rest of the wise men of Babylon.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Secret Is Revealed to Daniel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the secret was revealed to Daniel in a vision of the night, and Daniel blessed the God of heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Daniel answered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed be the name of God forever and ever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For wisdom and power belong to Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “It is He who changes the times and the seasons;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He removes kings and establishes kings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gives wisdom to the wise
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [greater] knowledge to those who have understanding! [Dan 4:35]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “It is He who reveals the profound and hidden things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He knows what is in the darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the light dwells with Him. [Job 15:8; Ps 25:14; Matt 6:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I thank You and praise You, O God of my fathers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You have given me wisdom and power;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even now You have made known to me what we requested of You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You have made known to us [the solution to] the king’s matter.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Daniel went to Arioch, whom the king had appointed to destroy the wise men of Babylon; he went and said this to him: “Do not execute the wise men of Babylon! Bring me before the king, and I will reveal to the king the interpretation [of his dream].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Arioch hurriedly brought Daniel before the king and said this to him: “I have found a man among the exiles of Judah who can explain to the king the interpretation [of the dream].” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The king said to Daniel, whose [Babylonian] name was Belteshazzar, “Are you able to reveal to me the [content of the] dream which I have seen and its interpretation?” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Daniel answered the king and said, “Regarding the mystery about which the king has inquired, neither the wise men, enchanters, magicians, nor astrologers are able to answer the king, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'but there is a God in heaven who reveals secrets, and He has shown King Nebuchadnezzar what will take place in the latter days (end of days). This was your dream and the vision [that appeared] in your mind while on your bed. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'As for you, O king, as you were lying on your bed thoughts came into your mind about what will take place in the future; and He who reveals secrets has shown you what will occur. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But as for me, this secret has not been revealed to me because my wisdom is greater than that of any other living man, but in order to make the interpretation known to the king, and so that you may understand [fully] the thoughts of your mind.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The King’s Dream
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“You, O king, were looking, and behold, [there was] a single great statue; this image, which was large and of unsurpassed splendor, stood before you, and its appearance was awesome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrifying. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'As for this '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Daniel’s interpretation of Nebuchadnezzar’s dream outlines the further history of Gentile world power. The four metals of which the statue was made represented four successive empires, each with the power to rule the inhabited earth—though each stopped short of that. They were: (1) Babylon (Jer 51:7); (2) Medo-Persia; (3) Greece under Alexander; and (4) Rome. The latter power was divided first into the two legs, corresponding to the eastern and western Roman Empires, and then (after a very long time apparently) into the ten toes, a confederacy made up largely of European nations (7:24-27).'
    marker-yv: yv-n
  - type: text
    text: 'statue, its head '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was made
  - type: text
    text: ' of fine gold, its breast and its arms of silver, its belly and its thighs of bronze, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'its legs of iron, its feet partly of iron and partly of clay [pottery]. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'As you were looking, a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The eternal kingdom of God, the Messianic kingdom, will extend over all the earth, and those who reject Jesus, the Messiah, the Stone, will be crushed. See also Ps 118:22, 23; Is 8:14; Matt 21:44; Luke 20:18; 1 Pet 2:4-8.
    marker-yv: yv-n
  - type: text
    text: 'stone was cut out without [human] hands, and it struck the statue on its feet of iron and clay and crushed them. [1 Pet 2:3-8] '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then the iron, the clay, the bronze, the silver, and the gold were crushed together and became like the chaff from the summer threshing floors; and the wind carried them away so that not a trace of them could be found. And the stone that struck the statue became a great mountain and filled the whole earth.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Interpretation—Babylon the First Kingdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“This was the dream; now we will tell the king its interpretation. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'You, O king, are the king of [earthly] kings, to whom the God of heaven has given the kingdom, the power, the strength and the glory; [Jer 25:9; 27:6; 28:14] '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: and wherever the sons of men dwell, and the beasts of the field, and the birds of the heavens, He has given them into your hand and has made you ruler over them all. You [king of Babylon] are the head of gold.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Medo-Persia and Greece
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: After you will arise another kingdom (Medo-Persia) inferior to you, and then a third kingdom of bronze (Greece under Alexander the Great), which will rule over all the earth.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rome
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then a fourth kingdom (Rome) will be strong as iron, for iron breaks to pieces and shatters all things; and like iron which crushes things in pieces, it will break and crush all these [others]. [Dan 7:7, 23] '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And as you saw the feet and toes, partly of potter’s clay and partly of iron, it will be a divided kingdom; but there will be in it some of the durability '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strength of iron, just as you saw the iron mixed with common clay. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'As the [ten] toes of the feet were partly of iron and partly of clay, so some of the kingdom will be strong, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' part of it will be brittle. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And as you saw the iron mixed with common clay, so they will combine with one another in the seed of men; but they will not merge [for such diverse things or ideologies cannot unite], even as iron does not mix with clay.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Divine Kingdom
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'In the days of those [final ten] kings the God of heaven will set up a kingdom that will never be destroyed, nor will its sovereignty be left for another people; but it will crush and put an end to all these kingdoms, and it will stand forever. [Dan 7:14-17; Luke 1:31-33; Rev 11:15] '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Just as you saw that a stone was cut out of the mountain without hands and that it crushed the iron, the bronze, the clay, the silver and the gold, the great God has revealed to the king what will take place in the future; so the dream is true and its interpretation is trustworthy.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Daniel Promoted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then King Nebuchadnezzar fell face downward and paid respect to Daniel [as a great prophet of the highest God], and gave orders for an offering and fragrant incense to be presented to him [in honor of his God]. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The king answered Daniel and said, “Most certainly your God is the God of gods and the Lord of kings and a revealer of mysteries, since you have been able to reveal this mystery!” [Prov 3:32; Rev 19:16] '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Then the king promoted Daniel [to an exalted position] and gave him many great gifts, and he made him ruler over the entire province of Babylon and chief governor over all the wise men of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: And Daniel made a request of the king, and he appointed Shadrach, Meshach, and Abed-nego over the affairs of the province of Babylon, while Daniel was at the court of the king.
