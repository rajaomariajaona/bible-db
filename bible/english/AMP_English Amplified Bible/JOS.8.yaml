document_id: JOS.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Conquest of Ai
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, “Do not fear or be dismayed (intimidated). Take all the men of war with you and set out, go up to Ai; see, I have given the king of Ai, his people, his city, and his land into your hand. '
  '10':
  - type: text
    content: 'Now Joshua got up early in the morning and assembled the people, and went up with the elders of Israel before the people to Ai. '
  '11':
  - type: text
    content: 'Then all the fighting men who were with him went up and advanced and arrived in front of the city, and camped on the north side of Ai. Now there was a ravine between them and Ai. '
  '12':
  - type: text
    content: 'And Joshua took about five thousand men and set them in ambush between Bethel and Ai, on the west side of the city. '
  '13':
  - type: text
    content: 'So they stationed the people, all the army—the main encampment that was north of the city, and their rear guard on the west side of the city—and Joshua spent that night in the valley. '
  '14':
  - type: text
    content: 'Now when the king [and the people] of Ai saw it, the men of the city hurried and got up early and went out to meet Israel in battle, the king and all his people at the appointed [time and] place before the desert plain (the Arabah). But he did not know that there was an ambush against him [waiting] behind the city [on the west side]. '
  '15':
  - type: text
    content: 'So Joshua and all Israel pretended to be defeated by them, and ran toward the wilderness. '
  '16':
  - type: text
    content: 'Then all the people who were in the city were called together to pursue them, and they pursued Joshua and were lured away from the city. '
  '17':
  - type: text
    content: 'Not a man was left in Ai or Bethel who had not gone out after Israel; so they left the city open '
  - type: text
    content: and
  - type: text
    content: ' unguarded and they pursued Israel.'
  '18':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, “Reach out with the spear that is in your hand [and point it] toward Ai, for I will give it into your hand.” So Joshua reached out with the spear in his hand [and pointed it] toward the city. '
  '19':
  - type: text
    content: 'The [men in] ambush emerged quickly from their [hiding] place, and when Joshua stretched out his hand they ran and entered the city and captured it, and quickly set the city on fire. '
  '2':
  - type: text
    content: You shall do [the same] to Ai and its king as you did to Jericho and its king; [except that] you shall take only its spoil and its cattle as plunder for yourselves. Set up an ambush for the city behind it [on the west side].”
  '20':
  - type: text
    content: 'When the men of Ai turned back and looked, behold, the smoke of the city was ascending toward the sky, '
  - type: note
    content: Lit it was not in their hands.
  - type: text
    content: 'and they had no opportunity to run this way or that way. Then the people who had been running to the wilderness turned back toward the pursuers. '
  '21':
  - type: text
    content: 'When Joshua and all Israel saw that the [men in] ambush had taken the city and that the smoke of the city was ascending, they turned back and struck down the men of Ai. '
  '22':
  - type: text
    content: 'Then the others came out of the city to confront the men of Ai [as they returned], so that they were '
  - type: text
    content: trapped
  - type: text
    content: ' in the midst of Israel, some on this side and some on that side; then Israel struck them until none of them survived or escaped. '
  '23':
  - type: text
    content: But they took the king of Ai alive and brought him to Joshua.
  '24':
  - type: text
    content: 'When Israel had finished killing all the inhabitants of Ai in the field in the wilderness where they pursued them, and they had all fallen by the edge of the sword until they were destroyed, then all Israel returned to Ai and struck it with the edge of the sword. '
  '25':
  - type: text
    content: 'And all who fell that day, both men and women, were twelve thousand, all the people of Ai. '
  '26':
  - type: text
    content: 'For Joshua did not withdraw his hand with which he stretched out the spear until he had utterly destroyed all the inhabitants of Ai. '
  '27':
  - type: text
    content: Israel took only the livestock and the spoil of that city as plunder for themselves, according to the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He had commanded Joshua. '
  '28':
  - type: text
    content: 'So Joshua burned Ai and made it a '
  - type: note
    content: Heb tel.
  - type: text
    content: 'rubbish heap forever, a desolation until this day. '
  '29':
  - type: text
    content: 'He '
  - type: note
    content: This was not an execution by hanging; the king was killed beforehand, probably with a sword, then his body was hung up (or impaled) to further shame him in the minds of others.
  - type: text
    content: 'hanged [the body of] the king of Ai on a tree [leaving it there] until evening; at sunset Joshua gave a command and they took the body down from the tree and dumped it at the entrance of the city gate, and piled a great heap of stones over it '
  - type: text
    content: that stands
  - type: text
    content: ' to this day.'
  '3':
  - type: text
    content: 'So Joshua set out with all the people of war to go up against Ai; then Joshua chose thirty thousand valiant men, and sent them out at night. '
  '30':
  - type: text
    content: Then Joshua built an altar to the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, on Mount Ebal, '
  '31':
  - type: text
    content: just as Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded the sons of Israel, as it is written in the Book of the Law of Moses, an altar of uncut stones on which no one has wielded an iron '
  - type: text
    content: tool;
  - type: text
    content: ' and they offered on it burnt offerings to the L'
  - type: heading
    content: ord
  - type: text
    content: ', and sacrificed peace offerings. '
  '32':
  - type: text
    content: 'And there, in the presence of the sons of Israel, Joshua wrote on the stones a copy of the Law of Moses which '
  - type: text
    content: Moses
  - type: text
    content: ' had written. '
  '33':
  - type: text
    content: All Israel, the stranger as well as the native born [among them], with their elders and officers and their judges, stood on either side of the ark before the Levitical priests who carried the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: '. Half of them '
  - type: text
    content: stood
  - type: text
    content: ' in front of Mount Gerizim and half of them in front of Mount Ebal, just as Moses the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded at first to bless the people of Israel. '
  '34':
  - type: text
    content: 'Then afterward Joshua read all the words of the law, the blessing and curse, according to all that is written in the Book of the Law. '
  '35':
  - type: text
    content: There was not a word of all that Moses had commanded which Joshua did not read before the entire assembly of Israel, including the women and the children and the foreigners who were living among them.
  '4':
  - type: text
    content: 'He commanded them, saying, “Listen closely, you are going to lie in wait '
  - type: text
    content: and
  - type: text
    content: ' ambush the city from behind it. Do not go very far away from the city, but all of you be ready. '
  '5':
  - type: text
    content: 'Then I and all the people who are with me will approach the city. And when they come out to meet us [for battle] as [they did] the first time, we will run away from them. '
  '6':
  - type: text
    content: 'They will come out after us until we have lured them away from the city, because they will say, ‘They are running from us as [they did] before.’ So we will run from them. '
  '7':
  - type: text
    content: Then you will emerge from the ambush and take possession of the city, for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will hand it over to you. '
  '8':
  - type: text
    content: When you have taken the city, you shall set it on fire; you shall do [exactly] as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded. See, I have commanded you.” '
  '9':
  - type: text
    content: So Joshua sent them off, and they went to the place for the ambush and stayed [hidden] between Bethel and Ai, on the west side of Ai; but Joshua spent that night among the people [in Gilgal].
