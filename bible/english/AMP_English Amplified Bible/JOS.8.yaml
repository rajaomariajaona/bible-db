document_id: JOS.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Conquest of Ai
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “Do not fear or be dismayed (intimidated). Take all the men of war with you and set out, go up to Ai; see, I have given the king of Ai, his people, his city, and his land into your hand. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You shall do [the same] to Ai and its king as you did to Jericho and its king; [except that] you shall take only its spoil and its cattle as plunder for yourselves. Set up an ambush for the city behind it [on the west side].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Joshua set out with all the people of war to go up against Ai; then Joshua chose thirty thousand valiant men, and sent them out at night. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He commanded them, saying, “Listen closely, you are going to lie in wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ambush the city from behind it. Do not go very far away from the city, but all of you be ready. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I and all the people who are with me will approach the city. And when they come out to meet us [for battle] as [they did] the first time, we will run away from them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They will come out after us until we have lured them away from the city, because they will say, ‘They are running from us as [they did] before.’ So we will run from them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then you will emerge from the ambush and take possession of the city, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will hand it over to you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When you have taken the city, you shall set it on fire; you shall do [exactly] as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded. See, I have commanded you.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Joshua sent them off, and they went to the place for the ambush and stayed [hidden] between Bethel and Ai, on the west side of Ai; but Joshua spent that night among the people [in Gilgal].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now Joshua got up early in the morning and assembled the people, and went up with the elders of Israel before the people to Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then all the fighting men who were with him went up and advanced and arrived in front of the city, and camped on the north side of Ai. Now there was a ravine between them and Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Joshua took about five thousand men and set them in ambush between Bethel and Ai, on the west side of the city. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they stationed the people, all the army—the main encampment that was north of the city, and their rear guard on the west side of the city—and Joshua spent that night in the valley. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now when the king [and the people] of Ai saw it, the men of the city hurried and got up early and went out to meet Israel in battle, the king and all his people at the appointed [time and] place before the desert plain (the Arabah). But he did not know that there was an ambush against him [waiting] behind the city [on the west side]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Joshua and all Israel pretended to be defeated by them, and ran toward the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then all the people who were in the city were called together to pursue them, and they pursued Joshua and were lured away from the city. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Not a man was left in Ai or Bethel who had not gone out after Israel; so they left the city open '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unguarded and they pursued Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “Reach out with the spear that is in your hand [and point it] toward Ai, for I will give it into your hand.” So Joshua reached out with the spear in his hand [and pointed it] toward the city. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The [men in] ambush emerged quickly from their [hiding] place, and when Joshua stretched out his hand they ran and entered the city and captured it, and quickly set the city on fire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When the men of Ai turned back and looked, behold, the smoke of the city was ascending toward the sky, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: it was not in their hands
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and they had no opportunity to run this way or that way. Then the people who had been running to the wilderness turned back toward the pursuers. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When Joshua and all Israel saw that the [men in] ambush had taken the city and that the smoke of the city was ascending, they turned back and struck down the men of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the others came out of the city to confront the men of Ai [as they returned], so that they were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: trapped
  - type: text
    text: ' in the midst of Israel, some on this side and some on that side; then Israel struck them until none of them survived or escaped. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But they took the king of Ai alive and brought him to Joshua.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Israel had finished killing all the inhabitants of Ai in the field in the wilderness where they pursued them, and they had all fallen by the edge of the sword until they were destroyed, then all Israel returned to Ai and struck it with the edge of the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And all who fell that day, both men and women, were twelve thousand, all the people of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For Joshua did not withdraw his hand with which he stretched out the spear until he had utterly destroyed all the inhabitants of Ai. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Israel took only the livestock and the spoil of that city as plunder for themselves, according to the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which He had commanded Joshua. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Joshua burned Ai and made it a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tel
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'rubbish heap forever, a desolation until this day. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was not an execution by hanging; the king was killed beforehand, probably with a sword, then his body was hung up (or impaled) to further shame him in the minds of others.
    marker-yv: yv-n
  - type: text
    text: 'hanged [the body of] the king of Ai on a tree [leaving it there] until evening; at sunset Joshua gave a command and they took the body down from the tree and dumped it at the entrance of the city gate, and piled a great heap of stones over it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that stands
  - type: text
    text: ' to this day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then Joshua built an altar to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, on Mount Ebal, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: just as Moses the servant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded the sons of Israel, as it is written in the Book of the Law of Moses, an altar of uncut stones on which no one has wielded an iron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tool;
  - type: text
    text: ' and they offered on it burnt offerings to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and sacrificed peace offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And there, in the presence of the sons of Israel, Joshua wrote on the stones a copy of the Law of Moses which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moses
  - type: text
    text: ' had written. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: All Israel, the stranger as well as the native born [among them], with their elders and officers and their judges, stood on either side of the ark before the Levitical priests who carried the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. Half of them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stood
  - type: text
    text: ' in front of Mount Gerizim and half of them in front of Mount Ebal, just as Moses the servant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded at first to bless the people of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then afterward Joshua read all the words of the law, the blessing and curse, according to all that is written in the Book of the Law. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: There was not a word of all that Moses had commanded which Joshua did not read before the entire assembly of Israel, including the women and the children and the foreigners who were living among them.
