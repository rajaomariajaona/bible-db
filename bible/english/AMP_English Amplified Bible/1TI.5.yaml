    content: Honor Widows
  - type: text
    content: 'Do not sharply reprimand an older man, but appeal to him as [you would to] a father, to younger men as brothers, '
  '10':
  - type: text
    content: 'and has a reputation for good deeds; [she is eligible] if she has brought up children, if she has shown hospitality to strangers, if she has washed the feet of the saints (God’s people), if she has assisted the distressed, and has devoted herself to doing good in every way. '
  '11':
  - type: text
    content: 'But refuse [to enroll the] younger widows, for when they feel their natural desires in disregard of Christ, they wish to marry '
  - type: text
    content: again,
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'and so they incur condemnation for having set aside their '
  - type: note
    content: Lit first faith. In saying this, Paul indicates that young widows were being required to pledge a life of celibacy in service to God in order to be put on the list for assistance.
  - type: text
    content: 'previous pledge. '
  '13':
  - type: text
    content: 'Now at the same time, they also learn to be idle as they go from house to house; and not only idle, but also gossips and '
  - type: note
    content: Paul levels the same criticism against the people in 2 Thess 3:10, 11.
  - type: text
    content: 'busybodies [meddlers in things that do not concern them], talking about things they should not '
  - type: text
    content: mention.
  - type: text
