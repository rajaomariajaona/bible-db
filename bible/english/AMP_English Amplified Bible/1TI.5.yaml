  - type: text
    content: ' beyond reproach. '
  '8':
  - type: text
    content: If anyone fails to provide for his own, and especially for those of his own family, he has denied the faith [by disregarding its precepts] and is worse than an unbeliever [who fulfills his obligation in these matters].
  '9':
  - type: text
    content: 'A widow is to be put on the list [to receive regular assistance] only if she is over sixty years of age, [having been] the wife of one man, '
