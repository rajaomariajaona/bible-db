  '14':
  - type: text
    content: 'So I want younger '
  - type: text
    content: widows
  - type: text
    content: ' to get married, have children, manage their households, and not give opponents of the faith any occasion for slander. '
  '15':
  - type: text
    content: 'Some [widows] have already turned away [from the faith] to follow Satan. '
  '16':
  - type: text
    content: 'If any believing woman has [dependent] widows [in her household], '
  - type: note
    content: This repeats the admonition given to the men in v 8.
  - type: text
    content: she must assist them [according to her ability]; and the church must not be burdened [with them], so that it may assist those who are truly widows [those who are all alone and are dependent].
  - type: heading
    content: Concerning Elders
  '17':
  - type: text
    content: 'The elders who perform their leadership duties well are to be considered worthy of double honor (financial support), especially those who work hard at preaching and teaching [the word of God concerning eternal salvation through Christ]. '
  '18':
  - type: text
    content: For the Scripture says, “Y
  - type: heading
    content: ou shall not muzzle the ox while it is treading out the grain
  - type: text
    content: ' [to keep it from eating],” and, “The worker is worthy of his wages [he deserves fair compensation].” [Deut 25:4; Luke 10:7] '
  '19':
  - type: text
    content: 'Do not accept an accusation against an elder unless it is based on [the testimony of at least] two or three witnesses. [Deut 19:15] '
  '2':
  - type: text
    content: to older women as mothers, to younger women as sisters, in all purity [being careful to maintain appropriate relationships].
  '20':
  - type: text
    content: 'As for those [elders] who continue in sin, reprimand them in the presence of all [the congregation], so that the rest will be warned. '
  '21':
  - type: text
    content: 'I solemnly charge you in the presence of God and of Christ Jesus and of His chosen angels that you guard '
  - type: text
    content: and
  - type: text
    content: ' keep these rules without bias, doing nothing out of favoritism. '
  '22':
  - type: text
    content: Do not hurry to lay hands on anyone [ordaining and approving someone for ministry or an office in the church, or in reinstating expelled offenders], and thereby share in the sins of others; keep yourself free from sin.
  '23':
  - type: text
    content: 'No longer '
  - type: note
    content: Timothy, whose mother was Jewish (Acts 16:1), may have voluntarily taken a lifelong vow to abstain from wine, as Nazirites (from the Hebrew “devoted” or “consecrated”) sometimes did (cf Samson, Judg 13:7). Evidently he never developed a tolerance for water, which was often contaminated and which, in the absence of wine, he would have to drink.
  - type: text
    content: continue drinking [only] water, but use a little wine for the sake of your stomach and your frequent illnesses.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Vv 24, 25 continue the advice given in v 22 regarding the selection of church leaders.
  - type: text
    content: 'The sins of some people are conspicuous, leading the way for them into judgment [so that they are clearly not qualified for ministry]; but the sins of others appear later [for they are hidden and follow behind them]. '
  '25':
  - type: text
    content: Likewise, good deeds are quite evident, and those which are otherwise cannot be hidden [indefinitely].
  '3':
  - type: text
    content: 'Honor '
  - type: text
    content: and
  - type: text
    content: ' help those widows who are truly widowed [alone, and without support]. '
  '4':
  - type: text
    content: 'But if a widow has children or grandchildren [who are adults], see to it that these first learn to show great respect to their own family [as their religious duty and natural obligation], and to compensate their parents '
  - type: text
    content: or
  - type: text
    content: ' grandparents [for their upbringing]; for this is acceptable '
  - type: text
