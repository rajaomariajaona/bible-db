  - type: text
    content: ' shields of beaten gold; '
  - type: note
    content: About three pounds.
  - type: text
    content: 'three minas of gold went into each shield. The king put them in the House of the Forest of Lebanon [the king’s armory]. '
  '18':
  - type: text
    content: 'Also the king made a great throne of ivory and overlaid it with the finest gold. '
  '19':
  - type: text
    content: 'The throne had six steps, and a round '
  - type: note
    content: Or canopy.
  - type: text
    content: 'top '
  - type: text
    content: was attached
  - type: text
    content: ' to the throne from the back. On either side of the seat were armrests, and two lions stood beside the armrests. '
  '2':
  - type: text
    content: 'So she came to Jerusalem with a very large caravan (entourage), with camels carrying spices, a great quantity of gold, and precious stones. When she came to Solomon, she spoke with him about everything that was on her mind [to discover the extent of his wisdom]. '
  '20':
  - type: text
    content: 'Twelve lions stood there, one on either end of each of the six steps; there was nothing like it made for any other kingdom. '
  '21':
  - type: text
    content: 'All King Solomon’s drinking vessels were of gold, and all vessels of the House of the Forest of Lebanon were of pure gold. None were of silver; it was not considered valuable in the days of Solomon. '
  '22':
  - type: text
    content: For the king had at sea the [large cargo] ships of Tarshish with the ships of Hiram. Once every three years the ships of Tarshish came bringing gold, silver, ivory, monkeys, and peacocks.
  '23':
  - type: text
    content: 'So King Solomon exceeded all the kings of the earth in wealth and in wisdom. '
  '24':
  - type: text
    content: 'All the earth was seeking the presence of Solomon, to hear his wisdom which God had put in his mind. '
  '25':
  - type: text
    content: 'Every man brought a gift [of tribute]: articles of silver and gold, garments, weapons, spices, horses, and mules, so much year by year.'
  '26':
  - type: text
    content: 'Now Solomon collected chariots and horsemen; he had 1,400 chariots and 12,000 horsemen, which he stationed in the chariot cities and with the king in Jerusalem. '
  '27':
  - type: text
    content: 'The king made silver '
  - type: text
    content: as common
  - type: text
    content: ' in Jerusalem as stones, and cedars as plentiful as the '
  - type: note
    content: This tree, ficus sycomorus, is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.
  - type: text
    content: 'sycamore trees that are in the lowland. '
  '28':
  - type: text
    content: 'Solomon’s horses were imported from Egypt and from '
  - type: note
    content: This was an area which, in NT times, was called Cilicia, the home province of the apostle Paul.
  - type: text
    content: 'Kue, and the king’s merchants acquired them from Kue, for a price. [Deut 17:15, 16] '
  '29':
  - type: text
    content: 'A chariot could be imported from Egypt for six hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of silver, and a horse for a hundred and fifty; and in the same way they exported them, by the king’s merchants, to all the kings of the Hittites and to the kings of Aram (Syria).'
  '3':
  - type: text
    content: 'Solomon '
  - type: note
    content: Lit told her all her words.
  - type: text
    content: 'answered all her questions; there was nothing hidden from the king which he did not explain to her. '
  '4':
  - type: text
    content: 'When the queen of Sheba had seen all the wisdom of Solomon, and the house (palace) which he had built, '
  '5':
  - type: text
    content: 'the food on his table, the seating of his servants (court officials), the attendance of his waiters and their attire, his cupbearers, his '
  - type: note
    content: Lit going up; or his burnt offering which he offered at.
  - type: text
    content: stairway by which he went up to the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ', she was breathless '
  - type: text
    content: and
  - type: text
    content: ' awed [by the wonder of it all]. '
  '6':
  - type: text
    content: 'Then she told the king, “The report which I heard in my own land about your words and wisdom is true! '
  '7':
  - type: text
    content: 'I did not believe the report until I came and saw it with my own eyes. Behold, the half of it was not told to me. You exceed in wisdom and prosperity the report which I heard. '
  '8':
  - type: text
    content: 'How blessed (fortunate, happy) are your men! How blessed are these your servants who stand continually before you, hearing your wisdom! '
  '9':
  - type: text
    content: Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ' your God who delighted in you to set you on the throne of Israel! Because the L'
  - type: heading
    content: ord
  - type: text
    content: ' loved Israel forever, He made you king to execute justice and righteousness.” '
