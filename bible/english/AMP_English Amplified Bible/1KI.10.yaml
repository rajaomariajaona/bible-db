    content: The Queen of Sheba
  - type: text
    content: 'Now when the queen of '
  - type: note
    content: The location of this ancient kingdom is uncertain, but may have included portions of modern Yemen and Ethiopia. The imperial family of Ethiopia claimed descent from a son supposedly born to Solomon and the queen of Sheba; however, there is no biblical evidence to support this claim. Ongoing archeological discoveries in Mareb, Yemen (Awam Temple) may support the area’s connection to the reign of the queen of Sheba. It has been suggested that she ruled southern Arabia and that the area being excavated was the capital of the Kingdom of Sheba.
  - type: text
    content: Sheba heard of the fame of Solomon concerning the name of the L
  - type: heading
    content: ord
  - type: text
    content: ', she came to test him with riddles. '
  '10':
  - type: text
    content: 'She gave the king a hundred and twenty talents of gold and a very great '
  - type: text
    content: quantity
  - type: text
    content: ' of spices and precious stones. Never again did such an abundance of spices come in [to Israel] as that which the queen of Sheba gave King Solomon.'
  '11':
