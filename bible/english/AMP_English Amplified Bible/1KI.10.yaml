  - type: text
    content: ' nor has it been seen to this day.'
  '13':
  - type: text
    content: 'King Solomon [in turn] gave to the queen of Sheba everything that she wanted, whatever she asked, besides what he gave to her '
  - type: note
    content: Lit according to the hand of King Solomon. Following ancient custom for nobility and royalty, the king was obligated to give a visitor (especially a visiting dignitary) a greater gift than he received from the visitor. Solomon went far beyond custom in lavishing gifts on the queen.
  - type: text
    content: from his royal bounty. So she returned to her own country, she and her servants.
  - type: heading
    content: Wealth, Splendor and Wisdom
  '14':
  - type: text
    content: 'Now the weight of the gold that came to Solomon in one [particular] year was six hundred and sixty-six '
  - type: note
    content: It is impossible to determine the exact weight of a talent, in part because the Israelites had more than one measurement of a talent. Estimates range from 58-80 lbs. or higher, and the weight may have had to do with the amount an able-bodied man could carry of a given precious metal. Six hundred and sixty-six talents would have weighed at least 38,628 lbs.
  - type: text
    content: 'talents of gold, '
