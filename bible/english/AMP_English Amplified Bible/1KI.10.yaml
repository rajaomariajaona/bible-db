    content: 'besides '
  - type: text
    content: the taxes
  - type: text
    content: ' from the traders and from the wares of the merchants, and [the tribute money] from all the kings of the Arabs (Bedouins) and the governors of the country. '
  '16':
  - type: text
    content: 'King Solomon made two hundred large shields of beaten (hammered) gold; '
  - type: note
    content: Perhaps about twelve pounds. These shields were designed to cover a man. The gold probably overlaid wood or some other lighter material.
  - type: text
