document_id: 1KI.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Queen of Sheba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now when the queen of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The location of this ancient kingdom is uncertain, but may have included portions of modern Yemen and Ethiopia. The imperial family of Ethiopia claimed descent from a son supposedly born to Solomon and the queen of Sheba; however, there is no biblical evidence to support this claim. Ongoing archeological discoveries in Mareb, Yemen (Awam Temple) may support the area’s connection to the reign of the queen of Sheba. It has been suggested that she ruled southern Arabia and that the area being excavated was the capital of the Kingdom of Sheba.
      marker-yv: yv-n
    - type: text
      text: Sheba heard of the fame of Solomon concerning the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', she came to test him with riddles. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'She gave the king a hundred and twenty talents of gold and a very great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: quantity
    - type: text
      text: ' of spices and precious stones. Never again did such an abundance of spices come in [to Israel] as that which the queen of Sheba gave King Solomon.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Also the ships of Hiram, which brought gold from Ophir, brought in from Ophir a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: quantity
    - type: text
      text: ' of almug wood (sandalwood) and precious stones. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: From the almug wood (sandalwood) the king made pillars for the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and for the king’s palace, and also lyres and harps for the singers. Such almug wood did not come in [to Israel] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again,
    - type: text
      text: ' nor has it been seen to this day.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'King Solomon [in turn] gave to the queen of Sheba everything that she wanted, whatever she asked, besides what he gave to her '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: according to the hand of King Solomon
        - type: text
          text: . Following ancient custom for nobility and royalty, the king was obligated to give a visitor (especially a visiting dignitary) a greater gift than he received from the visitor. Solomon went far beyond custom in lavishing gifts on the queen.
      marker-yv: yv-n
    - type: text
      text: from his royal bounty. So she returned to her own country, she and her servants.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Wealth, Splendor and Wisdom
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now the weight of the gold that came to Solomon in one [particular] year was six hundred and sixty-six '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is impossible to determine the exact weight of a talent, in part because the Israelites had more than one measurement of a talent. Estimates range from 58-80 lbs. or higher, and the weight may have had to do with the amount an able-bodied man could carry of a given precious metal. Six hundred and sixty-six talents would have weighed at least 38,628 lbs.
      marker-yv: yv-n
    - type: text
      text: 'talents of gold, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'besides '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the taxes
    - type: text
      text: ' from the traders and from the wares of the merchants, and [the tribute money] from all the kings of the Arabs (Bedouins) and the governors of the country. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'King Solomon made two hundred large shields of beaten (hammered) gold; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps about twelve pounds. These shields were designed to cover a man. The gold probably overlaid wood or some other lighter material.
      marker-yv: yv-n
    - type: text
      text: 'six hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels of
    - type: text
      text: ' gold went into each shield. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: it
      children:
      - type: text
        text: He made
    - type: text
      text: ' three hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: smaller
    - type: text
      text: ' shields of beaten gold; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About three pounds.
      marker-yv: yv-n
    - type: text
      text: 'three minas of gold went into each shield. The king put them in the House of the Forest of Lebanon [the king’s armory]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Also the king made a great throne of ivory and overlaid it with the finest gold. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The throne had six steps, and a round '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: canopy
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'top '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was attached
    - type: text
      text: ' to the throne from the back. On either side of the seat were armrests, and two lions stood beside the armrests. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So she came to Jerusalem with a very large caravan (entourage), with camels carrying spices, a great quantity of gold, and precious stones. When she came to Solomon, she spoke with him about everything that was on her mind [to discover the extent of his wisdom]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Twelve lions stood there, one on either end of each of the six steps; there was nothing like it made for any other kingdom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'All King Solomon’s drinking vessels were of gold, and all vessels of the House of the Forest of Lebanon were of pure gold. None were of silver; it was not considered valuable in the days of Solomon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For the king had at sea the [large cargo] ships of Tarshish with the ships of Hiram. Once every three years the ships of Tarshish came bringing gold, silver, ivory, monkeys, and peacocks.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So King Solomon exceeded all the kings of the earth in wealth and in wisdom. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'All the earth was seeking the presence of Solomon, to hear his wisdom which God had put in his mind. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Every man brought a gift [of tribute]: articles of silver and gold, garments, weapons, spices, horses, and mules, so much year by year.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Now Solomon collected chariots and horsemen; he had 1,400 chariots and 12,000 horsemen, which he stationed in the chariot cities and with the king in Jerusalem. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The king made silver '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as common
    - type: text
      text: ' in Jerusalem as stones, and cedars as plentiful as the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This tree, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: ficus sycomorus,
        - type: text
          text: ' is native to Egypt and Asia Minor and produces an edible fruit similar but inferior to the common fig.'
      marker-yv: yv-n
    - type: text
      text: 'sycamore trees that are in the lowland. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Solomon’s horses were imported from Egypt and from '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was an area which, in NT times, was called Cilicia, the home province of the apostle Paul.
      marker-yv: yv-n
    - type: text
      text: 'Kue, and the king’s merchants acquired them from Kue, for a price. [Deut 17:15, 16] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A chariot could be imported from Egypt for six hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of silver, and a horse for a hundred and fifty; and in the same way they exported them, by the king’s merchants, to all the kings of the Hittites and to the kings of Aram (Syria).'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Solomon '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: told her all her words.
      marker-yv: yv-n
    - type: text
      text: 'answered all her questions; there was nothing hidden from the king which he did not explain to her. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When the queen of Sheba had seen all the wisdom of Solomon, and the house (palace) which he had built, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'the food on his table, the seating of his servants (court officials), the attendance of his waiters and their attire, his cupbearers, his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: going up;
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: his burnt offering which he offered at
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: stairway by which he went up to the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', she was breathless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awed [by the wonder of it all]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then she told the king, “The report which I heard in my own land about your words and wisdom is true! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I did not believe the report until I came and saw it with my own eyes. Behold, the half of it was not told to me. You exceed in wisdom and prosperity the report which I heard. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'How blessed (fortunate, happy) are your men! How blessed are these your servants who stand continually before you, hearing your wisdom! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God who delighted in you to set you on the throne of Israel! Because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' loved Israel forever, He made you king to execute justice and righteousness.” '
