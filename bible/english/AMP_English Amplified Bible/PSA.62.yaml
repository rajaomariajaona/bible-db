document_id: PSA.62,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 62
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Alone a Refuge from Treachery and Oppression.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; to Jeduthun [Ethan, the noted musician, founder of an official musical family]. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For God alone my soul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: waits
    - type: text
      text: ' in silence;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Him comes my salvation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not trust in oppression,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not vainly hope in robbery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If riches increase, do not set your heart on them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶God has spoken once,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Twice I have heard this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That power belongs to God.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Also to You, O Lord, belong lovingkindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compassion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You compensate every man according to [the value of] his work. [Jer 17:10; Rev 22:12]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He alone is my rock and my salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My defense '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my strong tower; I will not be shaken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disheartened.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶How long will you attack a man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you may murder him, all of you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a leaning wall, like a tottering fence?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They consult only to throw him down from his high position [to dishonor him];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They delight in lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They bless with [the words of] their mouths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But inwardly they curse. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶For God alone my soul waits in silence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' quietly submits to Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my hope is from Him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He only is my rock and my salvation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My fortress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my defense, I will not be shaken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' discouraged.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On God my salvation and my glory rest;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is my rock of [unyielding] strength, my refuge is in God.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trust [confidently] in Him at all times, O people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour out your heart before Him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God is a refuge for us. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Men of low degree are only a breath (emptiness), and men of [high] rank are a lie (delusion).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the balances they go up [because they have no measurable weight or value];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are together lighter than a breath.
