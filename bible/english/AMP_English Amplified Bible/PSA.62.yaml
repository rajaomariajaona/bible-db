document_id: PSA.62,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 62
  - type: heading
    content: God Alone a Refuge from Treachery and Oppression.
  - type: text
    content: To the Chief Musician; to Jeduthun [Ethan, the noted musician, founder of an official musical family]. A Psalm of David.
  - type: text
    content: 'For God alone my soul '
  - type: text
    content: waits
  - type: text
    content: ' in silence;'
  - type: text
    content: From Him comes my salvation.
  '10':
  - type: text
    content: Do not trust in oppression,
  - type: text
    content: And do not vainly hope in robbery;
  - type: text
    content: If riches increase, do not set your heart on them.
  '11':
  - type: text
    content: ¶God has spoken once,
  - type: text
    content: 'Twice I have heard this:'
  - type: text
    content: That power belongs to God.
  '12':
  - type: text
    content: 'Also to You, O Lord, belong lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' compassion,'
  - type: text
    content: For You compensate every man according to [the value of] his work. [Jer 17:10; Rev 22:12]
  '2':
  - type: text
    content: He alone is my rock and my salvation,
  - type: text
    content: 'My defense '
  - type: text
    content: and
  - type: text
    content: ' my strong tower; I will not be shaken '
  - type: text
    content: or
  - type: text
    content: ' disheartened.'
  '3':
  - type: text
    content: ¶How long will you attack a man
  - type: text
    content: So that you may murder him, all of you,
  - type: text
    content: Like a leaning wall, like a tottering fence?
  '4':
  - type: text
    content: They consult only to throw him down from his high position [to dishonor him];
  - type: text
    content: They delight in lies.
  - type: text
    content: They bless with [the words of] their mouths,
  - type: text
    content: 'But inwardly they curse. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: '¶For God alone my soul waits in silence '
  - type: text
    content: and
  - type: text
    content: ' quietly submits to Him,'
  - type: text
    content: For my hope is from Him.
  '6':
  - type: text
    content: He only is my rock and my salvation;
  - type: text
    content: 'My fortress '
  - type: text
    content: and
  - type: text
    content: ' my defense, I will not be shaken '
  - type: text
    content: or
  - type: text
    content: ' discouraged.'
  '7':
  - type: text
    content: On God my salvation and my glory rest;
  - type: text
    content: He is my rock of [unyielding] strength, my refuge is in God.
  '8':
  - type: text
    content: Trust [confidently] in Him at all times, O people;
  - type: text
    content: Pour out your heart before Him.
  - type: text
    content: 'God is a refuge for us. '
  - type: text
    content: Selah.
  '9':
  - type: text
    content: ¶Men of low degree are only a breath (emptiness), and men of [high] rank are a lie (delusion).
  - type: text
    content: In the balances they go up [because they have no measurable weight or value];
  - type: text
    content: They are together lighter than a breath.
