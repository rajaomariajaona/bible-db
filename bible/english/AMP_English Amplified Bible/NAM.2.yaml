  - type: heading
    content: The Overthrow of Nineveh
  - type: text
    content: ' '
  - type: note
    content: Nahum begins his message to Nineveh with a brief sarcastic statement (v 1) referring to the Medes, the Babylonians, and the Scythians who were allied against Assyria.
  - type: text
    content: The one who scatters has come up against you [Nineveh].
  - type: text
    content: 'Man the fortress '
  - type: text
    content: and
  - type: text
    content: ' ramparts, watch the road;'
  - type: note
    content: Lit Make strong your loins.
  - type: text
    content: Strengthen your back [prepare for battle], summon all your strength.
  '10':
  - type: text
    content: She is emptied! She is desolate and waste!
  - type: text
    content: Hearts melting [in fear] and knees knocking!
  - type: text
    content: Anguish is in the whole body,
  - type: text
    content: And the faces of all grow pale! [Is 13:7, 8]
  '11':
  - type: text
    content: Where is the den of the lions (Assyria)
  - type: text
    content: And the feeding place of the young lions,
  - type: text
    content: Where the lion, lioness, and lion’s cub prowled
  - type: text
    content: With nothing to fear?
  '12':
  - type: text
    content: The lion [of Assyria] tore enough for his cubs (Assyrian citizens),
  - type: text
    content: Killed [enough prey] for his lionesses,
  - type: text
    content: And filled his lairs with prey
  - type: text
    content: And his dens with torn flesh.
  '13':
  - type: text
    content: “Behold, I am against you [Nineveh],” declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “and I will burn your chariots in the smoke, and the sword will devour your young lions. I will cut off your prey from the land, and the voice of your messengers will no longer be heard.”'
  '2':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will restore the splendor '
  - type: text
    content: and
  - type: text
    content: ' majesty of Jacob'
  - type: text
    content: Like the splendor of [ancient and united] Israel,
  - type: text
    content: Even though destroyers have destroyed them
  - type: text
    content: And ruined their vine branches. [Is 10:12]
  '3':
  - type: text
    content: '¶The shields of his soldiers [of '
  - type: note
    content: The Medes were an ancient Iranian people who lived in the area that is now the northwestern part of modern day Iran. After they joined with the Chaldeans of Babylonia to defeat the Assyrians, they established their own empire. It was the largest empire of its day until Cyrus the Great united the Medes and the Persians to form the Archaemenid Empire which stretched over several million square miles.
  - type: text
    content: Media and Babylon] are colored red;
  - type: text
    content: The warriors are dressed in scarlet.
  - type: text
    content: The chariots blaze with fire of [flashing] steel
  - type: text
    content: 'When he is prepared '
  - type: text
    content: to march,
  - type: text
    content: 'And the cypress '
  - type: text
    content: spears
  - type: text
    content: ' are brandished [for battle].'
  '4':
  - type: text
    content: The chariots race madly in the streets;
  - type: text
    content: They rush wildly in the broad plazas.
  - type: text
    content: Their appearance is like torches;
  - type: text
    content: They rush in various directions like forked lightning.
