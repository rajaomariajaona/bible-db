document_id: NAM.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Overthrow of Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nahum begins his message to Nineveh with a brief sarcastic statement (v 1) referring to the Medes, the Babylonians, and the Scythians who were allied against Assyria.
      marker-yv: yv-n
    - type: text
      text: The one who scatters has come up against you [Nineveh].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Man the fortress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ramparts, watch the road;'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Make strong your loins.
      marker-yv: yv-n
    - type: text
      text: Strengthen your back [prepare for battle], summon all your strength.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is emptied! She is desolate and waste!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hearts melting [in fear] and knees knocking!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anguish is in the whole body,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the faces of all grow pale! [Is 13:7, 8]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is the den of the lions (Assyria)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the feeding place of the young lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where the lion, lioness, and lion’s cub prowled
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With nothing to fear?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lion [of Assyria] tore enough for his cubs (Assyrian citizens),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Killed [enough prey] for his lionesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And filled his lairs with prey
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his dens with torn flesh.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Behold, I am against you [Nineveh],” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “and I will burn your chariots in the smoke, and the sword will devour your young lions. I will cut off your prey from the land, and the voice of your messengers will no longer be heard.”'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will restore the splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty of Jacob'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the splendor of [ancient and united] Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though destroyers have destroyed them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And ruined their vine branches. [Is 10:12]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶The shields of his soldiers [of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Medes were an ancient Iranian people who lived in the area that is now the northwestern part of modern day Iran. After they joined with the Chaldeans of Babylonia to defeat the Assyrians, they established their own empire. It was the largest empire of its day until Cyrus the Great united the Medes and the Persians to form the Archaemenid Empire which stretched over several million square miles.
      marker-yv: yv-n
    - type: text
      text: Media and Babylon] are colored red;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The warriors are dressed in scarlet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The chariots blaze with fire of [flashing] steel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When he is prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to march,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the cypress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spears
    - type: text
      text: ' are brandished [for battle].'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The chariots race madly in the streets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rush wildly in the broad plazas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their appearance is like torches;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rush in various directions like forked lightning.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps the Assyrian king.
      marker-yv: yv-n
    - type: text
      text: 'He remembers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' summons his nobles;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stumble in their march [terrified because of the attack].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hurry to the city wall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A large shield or portable shelter used for deflecting stones, spears and arrows.
      marker-yv: yv-n
    - type: text
      text: 'mantelet is prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' firmly set up.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gates of the rivers [surrounding Nineveh] are opened
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the palace [of sun-dried brick] is dissolved [by the torrents].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is decreed:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nineveh is stripped, and she is carried away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her handmaids are moaning like the sound of doves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beating on their breasts [in sorrow].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Though Nineveh was like a pool of water throughout her days,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now her inhabitants are fleeing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop! Stop!” [a few cry,]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But no one turns back.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plunder the silver!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plunder the gold!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there is no end to the treasure—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wealth from every precious object.
