  '6':
  - type: text
    content: The gates of the rivers [surrounding Nineveh] are opened
  - type: text
    content: And the palace [of sun-dried brick] is dissolved [by the torrents].
  '7':
  - type: text
    content: 'It is decreed:'
  - type: text
    content: Nineveh is stripped, and she is carried away,
  - type: text
    content: And her handmaids are moaning like the sound of doves,
  - type: text
    content: Beating on their breasts [in sorrow].
  '8':
  - type: text
    content: ¶Though Nineveh was like a pool of water throughout her days,
  - type: text
    content: Now her inhabitants are fleeing;
  - type: text
    content: “Stop! Stop!” [a few cry,]
  - type: text
    content: But no one turns back.
  '9':
  - type: text
    content: Plunder the silver!
  - type: text
    content: Plunder the gold!
  - type: text
    content: For there is no end to the treasure—
  - type: text
    content: Wealth from every precious object.
