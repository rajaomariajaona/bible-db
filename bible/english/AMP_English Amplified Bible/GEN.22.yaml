    content: 'Uz the firstborn and Buz his brother and Kemuel the father of Aram, '
  '22':
  - type: text
    content: 'Chesed and Hazo and Pildash and Jidlaph and Bethuel.” '
  '23':
  - type: text
    content: 'Bethuel became the father of Rebekah. These eight [children] Milcah bore to Nahor, Abraham’s brother. '
  '24':
  - type: text
    content: 'Nahor’s '
  - type: note
    content: I.e. a type of secondary or inferior “wife” (often a slave), much lower in rank than the official wife who managed the household and gave birth to the “legitimate” children. Concubines had marginal rights to financial support and recognition. Their children were usually acknowledged as offspring of the man, but were of lower status than the children born to the official wife.
  - type: text
    content: concubine, whose name was Reumah, gave birth to Tebah and Gaham and Tahash and Maacah.
  '3':
  - type: text
    content: 'So Abraham got up early in the morning, saddled his donkey, and took two of his young men with him and his son Isaac; and he split the wood for the burnt offering, and then he got up and went to the place of which God had told him. '
  '4':
  - type: text
    content: 'On the third day [of travel] Abraham looked up and saw the place in the distance. '
  '5':
  - type: text
    content: 'Abraham said to his servants, “Settle down '
  - type: text
    content: and
  - type: text
    content: ' stay here with the donkey; the '
  - type: note
    content: At this time Isaac would probably be about twenty years old.
  - type: text
    content: 'young man and I will go over there and worship [God], and we will come back to you.” [Heb 11:17-19] '
  '6':
  - type: text
    content: 'Then Abraham took the wood for the burnt offering and laid it '
  - type: note
    content: As Jesus carried the crossbar for His own crucifixion, so here Isaac carried the wood for his own execution by fire, but God had mercy on him.
  - type: text
    content: 'on [the shoulders of] Isaac his son, and he took the '
  - type: note
    content: I.e. a firepot filled with burning coals.
  - type: text
    content: 'fire (firepot) in his own hand and the [sacrificial] knife; and the two of them walked on together. '
  '7':
  - type: text
    content: 'And Isaac said to Abraham, “My father!” And he said, “Here I am, my son.” Isaac said, “Look, the fire and the wood, but where is the lamb for the burnt offering?” '
  '8':
  - type: text
    content: 'Abraham said, “My son, God will provide for Himself '
  - type: note
    content: Abraham had complete faith and trust in God. Because God’s covenant with him depended on Isaac, Abraham may have anticipated that God would reveal to him an alternative to the sacrifice of Isaac, as He in fact did (vv 11-13). But Abraham was determined to carry out what God had commanded him to do, because of his faith in God’s promise.
  - type: text
    content: a lamb for the burnt offering.” So the two walked on together.
  '9':
  - type: text
    content: 'When they came to the place of which God had told him, Abraham built an altar there and arranged the wood, and bound Isaac his son and placed him on the altar, on top of the wood. [Matt 10:37] '
