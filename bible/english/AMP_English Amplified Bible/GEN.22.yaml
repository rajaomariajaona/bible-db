        text: Abraham had complete faith and trust in God. Because God’s covenant with him depended on Isaac, Abraham may have anticipated that God would reveal to him an alternative to the sacrifice of Isaac, as He in fact did (vv 11-13). But Abraham was determined to carry out what God had commanded him to do, because of his faith in God’s promise.
    marker-yv: yv-n
  - type: text
    text: a lamb for the burnt offering.” So the two walked on together.
