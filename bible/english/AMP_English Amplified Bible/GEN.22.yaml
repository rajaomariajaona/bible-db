  '2':
  - type: text
    content: 'God said, “Take now your son, your only son [of '
  - type: note
    content: Abraham also fathered Ishmael by Sarah’s slave, Hagar, but Isaac was his only son of promise, the legal heir of Abraham.
  - type: text
    content: 'promise], whom you love, Isaac, and go to the region of '
  - type: note
