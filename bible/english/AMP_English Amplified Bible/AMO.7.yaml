  '7':
  - type: text
    content: 'Thus He showed me [a vision], and behold, the Lord was standing by a vertical wall with a plumb line in His hand [to determine if the wall was straight or if it needed to be destroyed]. [2 Kin 21:13; Is 34:11] '
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Amos, what do you see?” And I said, “A plumb line.” Then the Lord said,'
  - type: text
    content: “Behold, I am setting a plumb line [as a standard]
  - type: text
    content: Among My people Israel [showing the defectiveness of the nation, requiring judgment].
  - type: text
    content: I shall not spare them any longer. [The door of mercy is shut.]
  '9':
  - type: text
    content: '“And the [idolatrous] high places of Isaac (Israel) will be devastated '
  - type: text
    content: and
  - type: text
    content: ' deserted,'
  - type: text
    content: And the sanctuaries of Israel will be in ruins.
  - type: text
    content: Then I shall rise up against the house of Jeroboam with the sword [and destroy the monarchy].”
  - type: heading
