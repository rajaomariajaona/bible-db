  - type: text
    text: 'Jeroboam king of Israel, saying, “Amos has conspired against you in the midst of the house of Israel; the land is unable to endure all his words. [1 Kin 12:31, 32] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For in this way Amos has said, ‘Jeroboam will die by the sword and Israel will certainly go from its land into exile.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Amaziah said to Amos, “Go, you seer, run for your life [from Israel] to the land of Judah [your own country] and eat bread and live as a prophet there! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But do not prophesy any longer at Bethel, for it is the king’s sanctuary and a royal residence.” [Luke 10:10-12]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Amos replied to Amaziah, “I am not a prophet [by profession], nor am I a prophet’s son; I am a herdsman and a grower of sycamore figs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' took me as I followed the flock and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘Go, prophesy to My people Israel.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Now therefore, listen to the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': You say, ‘You shall not prophesy against Israel nor shall you speak against the house of Isaac.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
