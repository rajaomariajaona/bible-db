  - type: text
    text: 'Thus He showed me [a vision], and behold, the Lord was standing by a vertical wall with a plumb line in His hand [to determine if the wall was straight or if it needed to be destroyed]. [2 Kin 21:13; Is 34:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Amos, what do you see?” And I said, “A plumb line.” Then the Lord said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, I am setting a plumb line [as a standard]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among My people Israel [showing the defectiveness of the nation, requiring judgment].
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall not spare them any longer. [The door of mercy is shut.]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“And the [idolatrous] high places of Isaac (Israel) will be devastated '
  - type: usfm
