    content: Warning Through Visions
  - type: text
    content: Thus the Lord G
  - type: heading
    content: od
  - type: text
    content: ' showed me [a vision], and behold, He was forming a swarm of locusts when the spring crop began to sprout. And behold, the spring crop was after the king’s mowing. '
  '10':
  - type: text
    content: 'Then Amaziah, the priest of Bethel [site of the golden calf shrine], sent '
  - type: text
    content: word
  - type: text
    content: ' to '
  - type: note
    content: Jeroboam II ruled Israel from 793-753 b.c.
  - type: text
    content: 'Jeroboam king of Israel, saying, “Amos has conspired against you in the midst of the house of Israel; the land is unable to endure all his words. [1 Kin 12:31, 32] '
  '11':
  - type: text
    content: 'For in this way Amos has said, ‘Jeroboam will die by the sword and Israel will certainly go from its land into exile.’ ” '
  '12':
  - type: text
    content: 'Then Amaziah said to Amos, “Go, you seer, run for your life [from Israel] to the land of Judah [your own country] and eat bread and live as a prophet there! '
  '13':
  - type: text
    content: But do not prophesy any longer at Bethel, for it is the king’s sanctuary and a royal residence.” [Luke 10:10-12]
  '14':
  - type: text
    content: 'Then Amos replied to Amaziah, “I am not a prophet [by profession], nor am I a prophet’s son; I am a herdsman and a grower of sycamore figs. '
  '15':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' took me as I followed the flock and the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘Go, prophesy to My people Israel.’ '
  '16':
  - type: text
    content: Now therefore, listen to the word of the L
  - type: heading
    content: ord
  - type: text
    content: ': You say, ‘You shall not prophesy against Israel nor shall you speak against the house of Isaac.’ '
  '17':
  - type: text
    content: Therefore, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Your wife shall become a prostitute in the city [when the '
  - type: note
    content: Assyria invaded Israel during the reign of Hoshea (2 Kin 17:5, 6).
  - type: text
    content: 'Assyrians capture Samaria] and your sons and your daughters shall fall by the sword, and your land shall be divided by a measuring line; you yourself shall die in an unclean '
  - type: text
    content: and
  - type: text
    content: ' defiled [pagan] land, and Israel shall certainly go from its land into exile.’ ”'
  '2':
  - type: text
    content: And when the locusts had finished eating the plants of the land, then I said,
  - type: text
    content: “O Lord G
  - type: heading
    content: od
  - type: text
    content: ', please forgive!'
  - type: text
    content: How can Jacob stand,
  - type: text
    content: For he is so small [that he cannot endure this]?”
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' revoked this sentence.'
  - type: text
    content: “It shall not take place,” said the L
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: Thus the Lord G
  - type: heading
