document_id: LEV.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law of Guilt Offerings
  - type: text
    content: '‘If anyone sins after he hears a '
  - type: note
    content: Lit voice of an oath. This refers to a public announcement calling for witnesses to testify.
  - type: text
    content: 'public adjuration (solemn command to testify) when he is a witness, whether he has seen or [otherwise] known [something]—if he fails to report it, then he will bear his guilt '
  - type: text
    content: and
  - type: text
    content: ' be held responsible. '
  '10':
  - type: text
    content: The second [bird] he shall prepare as a burnt offering, according to the ordinance. So the priest shall make atonement on his behalf for the sin which he has committed, and it will be forgiven him.
  '11':
  - type: text
    content: '‘But if he cannot afford to bring two turtledoves or two young pigeons, then he shall bring as his offering for his sin the tenth part of an '
  - type: note
    content: Approximately one bushel.
  - type: text
    content: 'ephah of fine flour as a sin offering; he shall not put [olive] oil or incense on it, for it is a sin offering. '
  '12':
  - type: text
    content: He shall bring it to the priest, who shall take a handful of it as a memorial portion and offer it up in smoke on the altar, with the offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: '; it is a sin offering. '
  '13':
  - type: text
    content: 'In this way the priest shall make atonement for him for the sin which he has committed in one of these things, and it will be forgiven him; then '
  - type: text
    content: the rest
  - type: text
    content: ' shall be for the priest, like the grain offering.’ ”'
  '14':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '15':
  - type: text
    content: “If a person commits a breach of faith and sins unintentionally against the holy things of the L
  - type: heading
    content: ord
  - type: text
    content: ', then he shall bring his guilt offering to the L'
  - type: heading
    content: ord
  - type: text
    content: ', a ram without blemish from the flock, valued by you in shekels of silver, that is, the shekel of the sanctuary, as a guilt offering. '
  '16':
  - type: text
    content: He shall make restitution for the sin which he has committed against the holy thing, and shall add a fifth [of the ram’s value] to it, and give it to the priest. The priest shall then make atonement for him with the ram of the guilt offering, and he shall be forgiven.
  '17':
  - type: text
    content: “Now if anyone sins and does any of the things which the L
  - type: heading
    content: ord
  - type: text
    content: ' has forbidden, though he was not aware of it, still he is guilty and shall bear his punishment. [Luke 12:48] '
  '18':
  - type: text
    content: 'He is then to bring to the priest a ram without blemish from the flock, according to your valuation, for a guilt offering. In this way the priest shall make atonement for him regarding the error which he committed unintentionally and did not know it, and he shall be forgiven. '
  '19':
  - type: text
    content: It is a guilt offering; he was certainly guilty before the L
  - type: heading
    content: ord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'Or if someone touches any [ceremonially] unclean thing—whether the carcass of an unclean wild animal or the carcass of an unclean domestic animal or the carcass of unclean creeping things—even if he is unaware of it, he has become unclean, and he will be guilty. '
  '3':
  - type: text
    content: 'Or if he touches human uncleanness—whatever kind it may be—and he becomes unclean, but he is unaware of it, when he recognizes it, he will be guilty. '
  '4':
  - type: text
    content: 'Or if anyone swears [an oath] thoughtlessly '
  - type: text
    content: or
  - type: text
    content: ' impulsively '
  - type: note
    content: Lit with his lips.
  - type: text
    content: 'aloud that he will do either evil or good, in whatever manner a person may speak thoughtlessly '
  - type: text
    content: or
  - type: text
    content: ' impulsively with an oath, but he is unaware of it, when he recognizes it, he will be guilty in one of these. [Mark 6:23] '
  '5':
  - type: text
    content: 'So it shall be when a person is guilty in one of these, that he shall confess the sin he has committed. '
  '6':
  - type: text
    content: He shall bring his guilt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' for the sin which he has committed, a female from the flock, a lamb or a goat as a sin offering. So the priest shall make atonement on his behalf for his sin.'
  '7':
  - type: text
    content: '‘But if he '
  - type: note
    content: Lit if his hand cannot reach enough for.
  - type: text
    content: cannot afford a lamb, then he shall bring two turtledoves or two young pigeons as his guilt offering for his sin to the L
  - type: heading
    content: ord
  - type: text
    content: ', one as a sin offering and the other as a burnt offering. '
  '8':
  - type: text
    content: 'He shall bring them to the priest, who shall offer first the one for the sin offering, and shall nip its head at the front of its neck, but shall not sever it [completely]. '
  '9':
  - type: text
    content: 'He shall also sprinkle some of the blood of the sin offering on the side of the altar, and the rest of the blood shall be drained out at the base of the altar; it is a sin offering. '
