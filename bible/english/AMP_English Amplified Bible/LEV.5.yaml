document_id: LEV.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Law of Guilt Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '‘If anyone sins after he hears a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: voice of an oath
        - type: text
          text: . This refers to a public announcement calling for witnesses to testify.
      marker-yv: yv-n
    - type: text
      text: 'public adjuration (solemn command to testify) when he is a witness, whether he has seen or [otherwise] known [something]—if he fails to report it, then he will bear his guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be held responsible. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The second [bird] he shall prepare as a burnt offering, according to the ordinance. So the priest shall make atonement on his behalf for the sin which he has committed, and it will be forgiven him.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‘But if he cannot afford to bring two turtledoves or two young pigeons, then he shall bring as his offering for his sin the tenth part of an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Approximately one bushel.
      marker-yv: yv-n
    - type: text
      text: 'ephah of fine flour as a sin offering; he shall not put [olive] oil or incense on it, for it is a sin offering. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He shall bring it to the priest, who shall take a handful of it as a memorial portion and offer it up in smoke on the altar, with the offerings by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; it is a sin offering. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'In this way the priest shall make atonement for him for the sin which he has committed in one of these things, and it will be forgiven him; then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest
    - type: text
      text: ' shall be for the priest, like the grain offering.’ ”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “If a person commits a breach of faith and sins unintentionally against the holy things of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', then he shall bring his guilt offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', a ram without blemish from the flock, valued by you in shekels of silver, that is, the shekel of the sanctuary, as a guilt offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He shall make restitution for the sin which he has committed against the holy thing, and shall add a fifth [of the ram’s value] to it, and give it to the priest. The priest shall then make atonement for him with the ram of the guilt offering, and he shall be forgiven.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Now if anyone sins and does any of the things which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has forbidden, though he was not aware of it, still he is guilty and shall bear his punishment. [Luke 12:48] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He is then to bring to the priest a ram without blemish from the flock, according to your valuation, for a guilt offering. In this way the priest shall make atonement for him regarding the error which he committed unintentionally and did not know it, and he shall be forgiven. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It is a guilt offering; he was certainly guilty before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Or if someone touches any [ceremonially] unclean thing—whether the carcass of an unclean wild animal or the carcass of an unclean domestic animal or the carcass of unclean creeping things—even if he is unaware of it, he has become unclean, and he will be guilty. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Or if he touches human uncleanness—whatever kind it may be—and he becomes unclean, but he is unaware of it, when he recognizes it, he will be guilty. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Or if anyone swears [an oath] thoughtlessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' impulsively '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: with his lips
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'aloud that he will do either evil or good, in whatever manner a person may speak thoughtlessly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' impulsively with an oath, but he is unaware of it, when he recognizes it, he will be guilty in one of these. [Mark 6:23] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So it shall be when a person is guilty in one of these, that he shall confess the sin he has committed. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He shall bring his guilt offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for the sin which he has committed, a female from the flock, a lamb or a goat as a sin offering. So the priest shall make atonement on his behalf for his sin.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '‘But if he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: if his hand cannot reach enough for
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: cannot afford a lamb, then he shall bring two turtledoves or two young pigeons as his guilt offering for his sin to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', one as a sin offering and the other as a burnt offering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He shall bring them to the priest, who shall offer first the one for the sin offering, and shall nip its head at the front of its neck, but shall not sever it [completely]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He shall also sprinkle some of the blood of the sin offering on the side of the altar, and the rest of the blood shall be drained out at the base of the altar; it is a sin offering. '
