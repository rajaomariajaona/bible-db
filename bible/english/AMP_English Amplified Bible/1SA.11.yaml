    content: Saul Defeats the Ammonites
  - type: text
    content: 'Now Nahash the '
  - type: note
    content: The Ammonites were descendants of Lot (Gen 19:36-38).
  - type: text
    content: 'Ammonite [king] went up and '
  - type: note
    content: This was a common military tactic used against a fortified (walled) city or garrison, to take it with a minimal loss of troops. All supplies and communication were cut off between the city and the outside world, in the hope of starving out the citizens or destroying their morale and will to resist.
  - type: text
    content: 'besieged Jabesh-gilead; and all the men of Jabesh said to Nahash, “Make a treaty [of peace] with us and we will serve you.” '
  '10':
  - type: text
    content: 'So the men of Jabesh said [to Nahash the Ammonite], “Tomorrow we will come out to you [to surrender], and you may do to us whatever seems good to you.” '
  '11':
  - type: text
    content: The next morning Saul put the men into three companies; and they entered the [Ammonites’] camp during the [darkness of the early] morning watch and killed the Ammonites until the heat of the day; and the survivors were scattered, and no two of them were left together.
  '12':
  - type: text
    content: 'The people said to Samuel, “Who is the one who said, ‘Shall Saul reign over us?’ Bring the men, and we will put them to death.” '
  '13':
  - type: text
    content: But Saul said, “No man shall be put to death this day, for today the L
  - type: heading
    content: ord
  - type: text
    content: ' has brought '
  - type: note
    content: Lit deliverance.
  - type: text
    content: victory to Israel.”
  '14':
  - type: text
    content: 'Samuel said to the people, “Come, let us go to Gilgal and there restore the kingdom.” '
  '15':
  - type: text
    content: So all the people went to Gilgal, and there they made Saul king before the L
  - type: heading
    content: ord
  - type: text
    content: ' in Gilgal. There they also sacrificed peace offerings before the L'
  - type: heading
    content: ord
  - type: text
    content: ; and there Saul and all the men of Israel rejoiced greatly.
  '2':
  - type: text
    content: 'But Nahash the Ammonite told them, “I will make '
  - type: text
    content: a treaty
  - type: text
    content: ' with you on this condition, that I will '
  - type: note
    content: Partially blinding a man made him almost useless as an enemy combatant or archer because it hampered his depth perception and limited his peripheral vision.
  - type: text
    content: 'gouge out the right eye of every one of you, and make it a disgrace upon all Israel.” '
  '3':
  - type: text
    content: 'The elders of Jabesh said to Nahash, “Give us seven days so that we may send messengers throughout the territory of Israel. Then, if there is no one to save us, we will come out [and surrender] to you.” '
  '4':
  - type: note
    content: Nahash granted the request, even though the Israelites’ offer to submit to slavery (v 1) clearly indicated that they were in essence already defeated. Nahash undoubtedly believed that there was no formidable person to save Israel, and he wanted to see them willingly submit to the painful and debilitating mutilation that he had planned for them.
  - type: text
    content: Then the messengers came to Gibeah of Saul and told the news to the people; and all the people raised their voices and wept aloud.
  '5':
  - type: text
    content: 'Now Saul was coming out of the field behind the oxen, and he said, “What is '
  - type: text
    content: the matter
  - type: text
    content: ' with the people that they are weeping?” So they told him about the report of the men of Jabesh. '
  '6':
  - type: text
    content: 'The Spirit of God came upon Saul mightily when he heard these words, and he became extremely angry. '
  '7':
  - type: text
    content: He took a team of oxen and cut them in pieces, and sent them throughout the territory of Israel by the hand of messengers, saying, “Whoever does not come out to follow Saul and Samuel, the same shall be done to his oxen.” Then fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' fell on the people, and they came out [united] as one man [with one purpose]. '
  '8':
  - type: text
    content: 'He assembled '
  - type: text
    content: and
  - type: text
    content: ' counted them at Bezek; and the sons of Israel numbered 300,000, and the men of Judah 30,000. '
  '9':
  - type: text
    content: 'They said to the messengers who had come, “You shall say to the men of Jabesh-gilead: ‘Tomorrow, by the time the sun is hot, you will have '
  - type: note
    content: Lit deliverance.
  - type: text
    content: 'help [against the Ammonites].’ ” So the messengers came and reported this to the men of Jabesh; and they were overjoyed. '
