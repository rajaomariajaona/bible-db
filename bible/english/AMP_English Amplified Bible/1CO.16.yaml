document_id: 1CO.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Instructions and Greetings
  - type: text
    content: 'Now concerning the money collected for [the relief of] the saints [in Jerusalem], you are to do the same as I directed the churches of Galatia '
  - type: text
    content: to do
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'If Timothy comes, see to it that [you put him at ease, so that] he has nothing to fear in regard to you, for he is [devotedly] doing the Lord’s work, just as I am. '
  '11':
  - type: text
    content: 'So allow no one to treat him with disdain [as if he were inconsequential]. But send him off [cordially, and speed him on his way] in peace, so that he may come to me, for I am expecting him [to come along] with the '
  - type: text
    content: other
  - type: text
    content: ' brothers.'
  '12':
  - type: text
    content: As for our brother Apollos, I have strongly encouraged him to visit you with the other brothers. It was not at all his desire to come now, but he will come when he has the opportunity.
  '13':
  - type: text
    content: 'Be on guard; stand firm in your faith [in God, respecting His precepts and keeping your doctrine sound]. Act like [mature] men '
  - type: text
    content: and
  - type: text
    content: ' be courageous; be strong. [Ps 31:24] '
  '14':
  - type: text
    content: Let everything you do be done in love [motivated and inspired by God’s love for us].
  '15':
  - type: text
    content: 'Brothers and sisters, you know that '
  - type: text
    content: those of
  - type: text
    content: ' the household of Stephanas were the first converts in Achaia, and that they have devoted themselves for ministry to '
  - type: note
    content: Lit the saints.
  - type: text
    content: 'God’s people—now I urge you '
  '16':
  - type: text
    content: 'to be subject to such leaders [treating them with courtesy and respect], and to everyone who helps in the work and labors [for the benefit of yourselves and the church]. '
  '17':
  - type: text
    content: 'I rejoice because Stephanas and Fortunatus and Achaicus have arrived, for they have made up for your absence. '
  '18':
  - type: text
    content: 'They have refreshed my spirit as well as yours. So fully acknowledge such men '
  - type: text
    content: and
  - type: text
    content: ' deeply appreciate them.'
  '19':
  - type: text
    content: 'The churches of Asia send you their greetings. Aquila and Prisca, together with the church [that meets] in their house, send you their warm greetings in the Lord. '
  '2':
  - type: text
    content: 'On the first day of every week each one of you is to put something aside, in proportion to his prosperity, and save it so that no collections [will need to] be made when I come. '
  '20':
  - type: text
    content: All the believers greet you. Greet one another with a holy kiss.
  '21':
  - type: text
    content: 'This greeting is in my own hand—Paul. '
  '22':
  - type: text
    content: 'If anyone does not love the Lord [does not obey and respect and believe in Jesus Christ and His message], he is to be accursed. Maranatha (O our Lord, come)! '
  '23':
  - type: text
    content: 'The grace of our Lord Jesus [His unmerited favor, His spiritual blessing, His profound mercy] be with you. '
  '24':
  - type: text
    content: My love be with all of you in Christ Jesus. Amen.
  '3':
  - type: text
    content: 'When I arrive, I will send whomever you approve with letters [of authorization] to take your gift [of charity and love] to Jerusalem; '
  '4':
  - type: text
    content: and if it is fitting for me to go too, they will accompany me.
  '5':
  - type: text
    content: 'I will visit you after I go through Macedonia, for I am only passing through Macedonia; '
  '6':
  - type: text
    content: 'but it may be that I will stay with you [for a while], or even spend the winter, so that you may send me on my way to wherever I may go '
  - type: text
    content: afterward.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'For I do not wish to see you right now '
  - type: text
    content: just
  - type: text
    content: ' in passing, but I hope to remain with you for some time [later on], if the Lord permits. '
  '8':
  - type: text
    content: 'But I will stay in Ephesus until '
  - type: note
    content: Feast of the Harvest, also called Feast of Weeks.
  - type: text
    content: 'Pentecost, '
  '9':
  - type: text
    content: because a wide door for effective service has opened to me [in Ephesus, a very promising opportunity], and there are many adversaries. [Acts 19:23-41]
