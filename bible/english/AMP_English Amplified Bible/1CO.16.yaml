document_id: 1CO.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Instructions and Greetings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now concerning the money collected for [the relief of] the saints [in Jerusalem], you are to do the same as I directed the churches of Galatia '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to do
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On the first day of every week each one of you is to put something aside, in proportion to his prosperity, and save it so that no collections [will need to] be made when I come. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When I arrive, I will send whomever you approve with letters [of authorization] to take your gift [of charity and love] to Jerusalem; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and if it is fitting for me to go too, they will accompany me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will visit you after I go through Macedonia, for I am only passing through Macedonia; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but it may be that I will stay with you [for a while], or even spend the winter, so that you may send me on my way to wherever I may go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: afterward.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For I do not wish to see you right now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: just
  - type: text
    text: ' in passing, but I hope to remain with you for some time [later on], if the Lord permits. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But I will stay in Ephesus until '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Feast of the Harvest, also called Feast of Weeks.
    marker-yv: yv-n
  - type: text
    text: 'Pentecost, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: because a wide door for effective service has opened to me [in Ephesus, a very promising opportunity], and there are many adversaries. [Acts 19:23-41]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If Timothy comes, see to it that [you put him at ease, so that] he has nothing to fear in regard to you, for he is [devotedly] doing the Lord’s work, just as I am. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So allow no one to treat him with disdain [as if he were inconsequential]. But send him off [cordially, and speed him on his way] in peace, so that he may come to me, for I am expecting him [to come along] with the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' brothers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: As for our brother Apollos, I have strongly encouraged him to visit you with the other brothers. It was not at all his desire to come now, but he will come when he has the opportunity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be on guard; stand firm in your faith [in God, respecting His precepts and keeping your doctrine sound]. Act like [mature] men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be courageous; be strong. [Ps 31:24] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let everything you do be done in love [motivated and inspired by God’s love for us].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Brothers and sisters, you know that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those of
  - type: text
    text: ' the household of Stephanas were the first converts in Achaia, and that they have devoted themselves for ministry to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the saints
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'God’s people—now I urge you '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to be subject to such leaders [treating them with courtesy and respect], and to everyone who helps in the work and labors [for the benefit of yourselves and the church]. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I rejoice because Stephanas and Fortunatus and Achaicus have arrived, for they have made up for your absence. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They have refreshed my spirit as well as yours. So fully acknowledge such men '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deeply appreciate them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The churches of Asia send you their greetings. Aquila and Prisca, together with the church [that meets] in their house, send you their warm greetings in the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All the believers greet you. Greet one another with a holy kiss.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This greeting is in my own hand—Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'If anyone does not love the Lord [does not obey and respect and believe in Jesus Christ and His message], he is to be accursed. Maranatha (O our Lord, come)! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The grace of our Lord Jesus [His unmerited favor, His spiritual blessing, His profound mercy] be with you. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: My love be with all of you in Christ Jesus. Amen.
