document_id: PSA.67,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 67
  - type: heading
    content: The Nations Exhorted to Praise God.
  - type: text
    content: To the Chief Musician; on stringed instruments. A Psalm. A Song.
  - type: text
    content: 'God be gracious '
  - type: text
    content: and
  - type: text
    content: ' kind-hearted to us and bless us,'
  - type: text
    content: 'And make His face shine [with favor] on us— '
  - type: text
    content: Selah.
  '2':
  - type: text
    content: That Your way may be known on earth,
  - type: text
    content: 'Your salvation '
  - type: text
    content: and
  - type: text
    content: ' deliverance among all nations.'
  '3':
  - type: text
    content: 'Let the '
  - type: note
    content: I.e. includes pagan Gentiles.
  - type: text
    content: peoples praise You, O God;
  - type: text
    content: Let all the peoples praise You.
  '4':
  - type: text
    content: Let the nations be glad and sing for joy,
  - type: text
    content: For You will judge the people fairly
  - type: text
    content: 'And guide the nations on earth. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: Let the peoples praise You, O God;
  - type: text
    content: Let all the peoples praise You.
  '6':
  - type: text
    content: The earth has yielded its harvest [as evidence of His approval];
  - type: text
    content: God, our God, blesses us.
  '7':
  - type: text
    content: God blesses us,
  - type: text
    content: And all the ends of the earth shall fear Him [with awe-inspired reverence and submissive wonder].
