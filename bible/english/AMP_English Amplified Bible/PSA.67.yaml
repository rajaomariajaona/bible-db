document_id: PSA.67,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 67
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Nations Exhorted to Praise God.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; on stringed instruments. A Psalm. A Song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God be gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kind-hearted to us and bless us,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And make His face shine [with favor] on us— '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That Your way may be known on earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deliverance among all nations.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. includes pagan Gentiles.
      marker-yv: yv-n
    - type: text
      text: peoples praise You, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the peoples praise You.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the nations be glad and sing for joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You will judge the people fairly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And guide the nations on earth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the peoples praise You, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the peoples praise You.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth has yielded its harvest [as evidence of His approval];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, our God, blesses us.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God blesses us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the ends of the earth shall fear Him [with awe-inspired reverence and submissive wonder].
