verses:
  '1':
  - type: heading
    content: The Golden Lampstand and Olive Trees
  - type: text
    content: 'And the angel who was speaking with me came back and awakened me, like a man who is awakened out of his sleep. '
  '10':
  - type: text
    content: 'Who [with reason] despises the day of small things (beginnings)? For these '
  - type: note
    content: The seven eyes reflect God’s oversight of the world and its inhabitants, and His pleasure in the construction of the temple.
  - type: text
    content: seven [eyes] shall rejoice when they see the plumb line in the hand of Zerubbabel. They are the eyes of the L
  - type: heading
    content: ord
  - type: text
    content: ' which roam throughout the earth.” [Rev 5:6]'
  '11':
  - type: text
    content: 'Then I said to him [who was speaking with me], “What are these two olive trees on the right side of the lampstand and on its left?” '
  '12':
  - type: text
    content: 'And a second time I said to him, “What are these two olive branches which are beside the two golden pipes by which the golden oil is emptied?” '
  '13':
  - type: text
    content: 'And he answered me, “Do you not know what these are?” And I said, “No, my lord.” '
  '14':
  - type: text
    content: 'Then he said, “These are the two '
  - type: note
    content: The oil used in anointing symbolizes the Holy Spirit (v 6). The combination of priest and ruler points ultimately to the Messianic Priest-King (Ps 110; Zech 6:13; Heb 7).
  - type: text
    content: sons of fresh oil [Joshua the high priest and Zerubbabel the prince of Judah] who are standing by the Lord of the whole earth [as His anointed ones].” [Rev 11:4]
  '2':
  - type: text
    content: 'He said to me, “What do you see?” I said, “I see, and behold, a '
  - type: note
    content: The lampstand may symbolize Israel as a light to the nations.
  - type: text
    content: 'lampstand all of gold, with its bowl [for oil] on the top of it and its seven lamps on it with seven spouts belonging to each of the lamps which are on the top of it. [Matt 5:14, 16; Luke 12:35; Phil 2:15; Rev 1:20] '
  '3':
  - type: text
    content: 'And there are two olive trees by it, one on the right side of the bowl and the other on its left side [supplying it continuously with oil].” [Rev 11:4-13] '
  '4':
  - type: text
    content: 'So I asked the angel who was speaking with me, “What are these, my lord?” '
  '5':
  - type: text
    content: 'Then the angel who was speaking with me answered me, “Do you not know what these are?” And I said, “No, my lord.” '
  '6':
  - type: text
    content: Then he said to me, “This [continuous supply of oil] is the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Zerubbabel [prince of Judah], saying, ‘Not by might, nor by power, but by My Spirit [of whom the oil is a symbol],’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '7':
  - type: text
    content: '‘What are you, O great mountain [of obstacles]? Before Zerubbabel [who will rebuild the temple] '
  - type: text
    content: you will become
  - type: text
    content: ' a plain (insignificant)! And he will bring out the capstone [of the new temple] with loud shouts of “Grace, grace to it!” ’ ” [Ezra 4:1-5, 24; Is 40:4]'
  '8':
  - type: text
    content: Also the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '9':
  - type: text
    content: “The hands of Zerubbabel have laid the foundations of this house, and his hands will finish it. Then you will know (recognize, understand fully) that the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts has sent me [as His messenger] to you. '
