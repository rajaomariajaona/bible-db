      children:
      - type: text
        text: The lampstand may symbolize Israel as a light to the nations.
    marker-yv: yv-n
  - type: text
    text: 'lampstand all of gold, with its bowl [for oil] on the top of it and its seven lamps on it with seven spouts belonging to each of the lamps which are on the top of it. [Matt 5:14, 16; Luke 12:35; Phil 2:15; Rev 1:20] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And there are two olive trees by it, one on the right side of the bowl and the other on its left side [supplying it continuously with oil].” [Rev 11:4-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So I asked the angel who was speaking with me, “What are these, my lord?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the angel who was speaking with me answered me, “Do you not know what these are?” And I said, “No, my lord.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then he said to me, “This [continuous supply of oil] is the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to Zerubbabel [prince of Judah], saying, ‘Not by might, nor by power, but by My Spirit [of whom the oil is a symbol],’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '‘What are you, O great mountain [of obstacles]? Before Zerubbabel [who will rebuild the temple] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you will become
  - type: text
    text: ' a plain (insignificant)! And he will bring out the capstone [of the new temple] with loud shouts of “Grace, grace to it!” ’ ” [Ezra 4:1-5, 24; Is 40:4]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Also the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “The hands of Zerubbabel have laid the foundations of this house, and his hands will finish it. Then you will know (recognize, understand fully) that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts has sent me [as His messenger] to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Who [with reason] despises the day of small things (beginnings)? For these '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The seven eyes reflect God’s oversight of the world and its inhabitants, and His pleasure in the construction of the temple.
    marker-yv: yv-n
  - type: text
    text: seven [eyes] shall rejoice when they see the plumb line in the hand of Zerubbabel. They are the eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which roam throughout the earth.” [Rev 5:6]'
- type: usfm
