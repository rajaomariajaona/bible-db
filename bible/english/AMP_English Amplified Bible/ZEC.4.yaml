  - type: text
    text: 'And the angel who was speaking with me came back and awakened me, like a man who is awakened out of his sleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He said to me, “What do you see?” I said, “I see, and behold, a '
