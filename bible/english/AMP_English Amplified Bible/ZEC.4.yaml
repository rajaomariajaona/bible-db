  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I said to him [who was speaking with me], “What are these two olive trees on the right side of the lampstand and on its left?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And a second time I said to him, “What are these two olive branches which are beside the two golden pipes by which the golden oil is emptied?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he answered me, “Do you not know what these are?” And I said, “No, my lord.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he said, “These are the two '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The oil used in anointing symbolizes the Holy Spirit (v 6). The combination of priest and ruler points ultimately to the Messianic Priest-King (Ps 110; Zech 6:13; Heb 7).
    marker-yv: yv-n
  - type: text
    text: sons of fresh oil [Joshua the high priest and Zerubbabel the prince of Judah] who are standing by the Lord of the whole earth [as His anointed ones].” [Rev 11:4]
