document_id: DEU.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Feast of Passover
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Observe the month of Abib and celebrate the Passover to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, for in the month of Abib the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God brought you out of Egypt by night. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You shall sacrifice the Passover [lamb] to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God from the flock or the herd, in the place where the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' chooses to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: make His Name dwell
      - type: text
        text: ' and so throughout the chapter.'
    marker-yv: yv-n
  - type: text
    text: 'establish His Name (Presence). '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You shall not eat '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because yeast ferments and spreads throughout the dough, it was used symbolically to represent the spread of sin.
    marker-yv: yv-n
  - type: text
    text: 'leavened bread with it; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: instead,
  - type: text
    text: ' for seven days you shall eat the Passover with unleavened bread, the bread of affliction (for you left the land of Egypt in haste); [do this] so that all the days of your life you may remember [thoughtfully] the day when you came out of the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For seven days no leaven shall be seen with you in all your territory, and none of the meat which you sacrificed the evening of the first day shall remain overnight until morning. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You are not allowed to sacrifice the Passover [lamb] in any of your cities which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: but at the place where the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses to establish His Name (Presence), you shall sacrifice the Passover [lamb] in the evening at sunset, at the time that you came out of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You shall cook and eat it in the place which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses. In the morning you are to return to your tents. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For six days you shall eat unleavened bread, and on the seventh day there shall be a celebration to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; so you shall do no work [on that day].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Feast of Weeks
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“You shall count seven weeks for yourself; you shall begin to count seven weeks from the time you first put the sickle to the standing grain. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then you shall celebrate the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Also called the “Feast of Harvest” (Ex 23:16) or “day of first fruits” (Num 28:26). Later called “Pentecost” (Acts 2:1).
    marker-yv: yv-n
  - type: text
    text: Feast of Weeks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God with a tribute of a freewill offering from your hand, which you shall give [to Him] just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God blesses you; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and you shall rejoice before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, you and your son and your daughter and your male and female servants and the Levite who is within your [city] gates, and the stranger and the orphan and the widow who are among you, at the place where the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses to establish His Name (Presence). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You shall remember that you were a slave in Egypt, and you shall be careful to obey these statutes.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Feast of Booths
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You shall celebrate the Feast of Booths (Tabernacles) seven days, when you have gathered in [the grain] from your threshing floor and [the wine] from your wine vat. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall rejoice in your feast, you and your son and your daughter and your male and female servants and the Levite and the stranger and the orphan and the widow who are within your city. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Seven days you shall celebrate a feast to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in the place which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' chooses, because the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will bless you in all your produce and in all the work of your hands, so that you will be altogether joyful.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Three times a year all your males shall appear before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in the place which He chooses, at the Feast of Unleavened Bread (Passover) and at the Feast of Weeks (Pentecost) and at the Feast of Booths (Tabernacles), and they shall not appear before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' empty-handed. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Every man '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: according to the gift of his hand.
    marker-yv: yv-n
  - type: text
    text: shall give as he is able, in accordance with the blessing which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “You shall appoint judges and officers in all your cities (gates) which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you, according to your tribes, and they shall judge the people with righteous judgment. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You shall not distort justice; you shall not be partial, and you shall not take a bribe, for a bribe blinds the eyes of the wise and perverts the words of the righteous. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You shall pursue justice, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and only
  - type: text
    text: ' justice [that which is uncompromisingly righteous], so that you may live and take possession of the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“You shall not plant for yourself an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a wooden symbol of a female deity which seems to have been wrongfully (and sinfully) linked with God.
    marker-yv: yv-n
  - type: text
    text: 'Asherah of any kind of tree '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wood beside the altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, which you shall make. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You shall not set up for yourself a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillar which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God hates.'
