    content: 'Pilate pronounced sentence that their demand be granted. '
  '25':
  - type: text
    content: And he released the man they were asking for who had been thrown into prison for insurrection and murder, but he handed over Jesus to their will.
  - type: heading
    content: Simon Bears the Cross
