document_id: LUK.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the whole assembly got up and brought Him before Pilate. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They began to accuse Jesus, asserting, “We found this Man misleading '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perverting our nation and forbidding us to pay taxes to Caesar, and claiming that He Himself is Christ (the Messiah, the Anointed), a King.” [Matt 27:11-14; Mark 15:2-5; John 18:29-37] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Pilate asked Him, “Are You the King of the Jews?” And He answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is just as
    - type: text
      text: ' you say.”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Pilate said to the chief priests and the crowds, “I find no guilt in this Man.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But they were insistent and said, “He stirs up the people [to rebel], teaching throughout Judea, starting from Galilee even as far as here [in Jerusalem].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Pilate heard it, he asked whether the man was a Galilean. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when he learned that He belonged to the jurisdiction of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 22:17.
    marker-yv: yv-n
  - type: text
    text: Herod [Antipas, the tetrarch of Galilee], he sent Him to Herod, who was also in Jerusalem at that time.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus before Herod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Herod saw Jesus, he was exceedingly pleased. He had wanted to see Him for a long time because of what he had heard about Him, and was hoping to see some [miraculous] sign [even something spectacular] done by Him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he questioned Him at some length, but Jesus made no reply. [Is 53:7] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The chief priests and the scribes were standing there, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' accusing Him heatedly. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And Herod with his soldiers, after treating Him with contempt and mocking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ridiculing Him, dressed Him in a gorgeous robe and sent Him back to Pilate. [Is 53:8] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now that very day Herod and Pilate became friends with each other—before this they had been enemies.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pilate Seeks Jesus’ Release
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pilate summoned the chief priests and the rulers and the people, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and said to them, “You brought this man before me as one who corrupts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incites the people to rebellion. After examining Him before you, I have found no guilt in this Man regarding the charges which you make against Him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'No, nor has Herod, for he sent Him back to us; and indeed, He has done nothing to deserve death. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore I will punish Him [to teach Him a lesson] and release Him.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most early mss do not contain this verse.
    marker-yv: yv-n
  - type: text
    text: '[Now he was obligated to release to them one prisoner at the Feast.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But they [loudly] shouted out all together, saying, “Away with this Man, and release Barabbas to us!” [Matt 27:15-26; Mark 15:6-15; John 18:39-19:16] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '(He was one who had been thrown into prison for an insurrection that happened in the city, and for murder.) '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate addressed them again, wanting to release Jesus, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but they kept shouting out, “Crucify, crucify Him!” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A third time he said to them, “Why, what wrong has He done? I have found no guilt [no crime, no offense] in Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: demanding
  - type: text
    text: ' death; therefore I will punish Him [to teach Him a lesson] and release Him.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But they were insistent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unrelenting, demanding with loud voices that Jesus be crucified. And their voices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to prevail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accomplish their purpose. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pilate pronounced sentence that their demand be granted. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And he released the man they were asking for who had been thrown into prison for insurrection and murder, but he handed over Jesus to their will.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Simon Bears the Cross
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When they led Him away, they seized a man, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The father of Alexander and Rufus, disciples in Rome.
    marker-yv: yv-n
  - type: text
    text: 'Simon of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A port city in north Africa.
    marker-yv: yv-n
  - type: text
    text: 'Cyrene, who was coming in [to the city] from the country, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The crossbeam was usually placed on the nape of the neck like a yoke.
    marker-yv: yv-n
  - type: text
    text: placed on him the cross to carry behind Jesus. [Matt 27:32; Mark 15:21]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Following Him was a large crowd of the people, including women who were mourning and wailing for Him. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But Jesus, turning toward them, said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Daughters of Jerusalem, do not weep for Me, but weep for yourselves and for your children.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For behold, the days are coming when they will say, ‘Blessed are the barren, and the wombs that have not given birth, and the breasts that have never nursed.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then they will begin '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: to say to the mountains
    - type: text
      text: ', ‘F'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: all on us
    - type: text
      text: '!’ '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and to the hills
    - type: text
      text: ', ‘C'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: over us
    - type: text
      text: '!’'
  - type: text
    text: ' [Is 2:19, 20; Hos 10:8; Rev 6:16] '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A proverb meaning if the innocent has to suffer what will happen to the guilty.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For if they do these things when the tree is green, what will happen when it is dry?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Two others also, who were criminals, were being led away to be executed with Him. [Is 53:12]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When they came to the place called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Latin: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Calvarius;
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Calvary;
      - type: text
        text: ' Aram: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Golgotha;
      - type: text
        text: ' Greek: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kranion
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'The Skull, there they crucified Him and the criminals, one on the right and one on the left. [Matt 27:33-44; Mark 15:22-32; John 19:17-24] '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some early mss do not contain the words “And Jesus was saying…doing.”
    marker-yv: yv-n
  - type: text
    text: 'And Jesus was saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, forgive them; for they do not know what they are doing.”
  - type: text
    text: ' And they cast lots, dividing His clothes among themselves. [Ps 22:18] '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Now the people stood by, watching; but even the rulers ridiculed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sneered at Him, saying, “He saved others [from death]; let Him save Himself if He is the Christ (the Messiah, the Anointed) of God, His Chosen One.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The soldiers also mocked Him, coming up to Him and [cruelly] offering Him sour wine, [Ps 69:21; Matt 27:48; Mark 15:36f; John 19:29, 30] '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'and sarcastically saying, “If you are [really] the King of the Jews, save Yourself [from death]!” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Now there was also an inscription above Him: “THIS IS THE KING OF THE JEWS.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'One of the criminals who had been hanged [on a cross beside Him] kept hurling abuse at Him, saying, “Are You not the Christ? Save Yourself and us [from death]!” '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But the other one rebuked him, saying, “Do you not even fear God, since you are under the same sentence of condemnation? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'We '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are suffering
  - type: text
    text: ' justly, because we are getting what we deserve for what we have done; but this Man has done nothing wrong.” '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And he was saying, “Jesus, [please] remember me when You come into Your kingdom!” '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, today you will be with Me in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. possibly the third heaven, the special place or “garden” (Gen 2:8-10) between death and resurrection.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Paradise.”
  - type: text
    text: ' [2 Cor 12:4; Rev 2:7]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'It was now about the sixth hour (noon), and darkness came over the whole land until the ninth hour (3:00 p.m.), [Matt 27:45-56; Mark 15:33-41; John 19:14] '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'because the sun was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: failing
      - type: text
        text: . The language that Luke uses is found elsewhere in Greek literature to describe an eclipse.
    marker-yv: yv-n
  - type: text
    text: 'obscured; and the veil [of the Holy of Holies] of the temple was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The tearing of the veil established the institution of a new, direct way of communication between God and mankind. The sacrificial death of Christ nullified the need for priestly intervention between God and man, and abolished the need for animal sacrifice.
    marker-yv: yv-n
  - type: text
    text: 'torn in two [from top to bottom]. [Ex 26:31-35] '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And Jesus, crying out with a loud voice, said, '
  - type: usfm
