  '32':
  - type: text
    content: Two others also, who were criminals, were being led away to be executed with Him. [Is 53:12]
  - type: heading
    content: The Crucifixion
  '33':
  - type: text
    content: 'When they came to the place called '
  - type: note
    content: 'Latin: Calvarius; or Calvary; Aram: Golgotha; Greek: Kranion.'
  - type: text
    content: 'The Skull, there they crucified Him and the criminals, one on the right and one on the left. [Matt 27:33-44; Mark 15:22-32; John 19:17-24] '
  '34':
  - type: note
    content: Some early mss do not contain the words “And Jesus was saying…doing.”
  - type: text
    content: 'And Jesus was saying, '
  - type: text
    content: “Father, forgive them; for they do not know what they are doing.”
  - type: text
    content: ' And they cast lots, dividing His clothes among themselves. [Ps 22:18] '
  '35':
  - type: text
    content: 'Now the people stood by, watching; but even the rulers ridiculed '
  - type: text
    content: and
  - type: text
    content: ' sneered at Him, saying, “He saved others [from death]; let Him save Himself if He is the Christ (the Messiah, the Anointed) of God, His Chosen One.” '
  '36':
  - type: text
    content: 'The soldiers also mocked Him, coming up to Him and [cruelly] offering Him sour wine, [Ps 69:21; Matt 27:48; Mark 15:36f; John 19:29, 30] '
  '37':
  - type: text
    content: 'and sarcastically saying, “If you are [really] the King of the Jews, save Yourself [from death]!” '
  '38':
  - type: text
    content: 'Now there was also an inscription above Him: “THIS IS THE KING OF THE JEWS.”'
  '39':
  - type: text
    content: 'One of the criminals who had been hanged [on a cross beside Him] kept hurling abuse at Him, saying, “Are You not the Christ? Save Yourself and us [from death]!” '
  '4':
  - type: text
    content: 'Then Pilate said to the chief priests and the crowds, “I find no guilt in this Man.” '
  '40':
  - type: text
    content: 'But the other one rebuked him, saying, “Do you not even fear God, since you are under the same sentence of condemnation? '
  '41':
  - type: text
    content: 'We '
  - type: text
    content: are suffering
  - type: text
    content: ' justly, because we are getting what we deserve for what we have done; but this Man has done nothing wrong.” '
  '42':
  - type: text
    content: 'And he was saying, “Jesus, [please] remember me when You come into Your kingdom!” '
  '43':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, today you will be with Me in '
  - type: note
    content: I.e. possibly the third heaven, the special place or “garden” (Gen 2:8-10) between death and resurrection.
  - type: text
    content: Paradise.”
  - type: text
    content: ' [2 Cor 12:4; Rev 2:7]'
  '44':
  - type: text
    content: 'It was now about the sixth hour (noon), and darkness came over the whole land until the ninth hour (3:00 p.m.), [Matt 27:45-56; Mark 15:33-41; John 19:14] '
  '45':
  - type: text
    content: 'because the sun was '
  - type: note
    content: Lit failing. The language that Luke uses is found elsewhere in Greek literature to describe an eclipse.
  - type: text
