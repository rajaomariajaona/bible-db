  '27':
  - type: text
    content: 'Following Him was a large crowd of the people, including women who were mourning and wailing for Him. '
  '28':
  - type: text
    content: 'But Jesus, turning toward them, said, '
  - type: text
    content: “Daughters of Jerusalem, do not weep for Me, but weep for yourselves and for your children.
  - type: text
    content: ' '
