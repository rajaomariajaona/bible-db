  '49':
  - type: text
    content: And all His acquaintances and the women who had accompanied Him from Galilee were standing at a distance, watching these things.
  - type: heading
    content: Jesus Is Buried
  '5':
  - type: text
    content: But they were insistent and said, “He stirs up the people [to rebel], teaching throughout Judea, starting from Galilee even as far as here [in Jerusalem].”
  '50':
  - type: text
    content: 'A man named Joseph, who was a member of the Council (Sanhedrin, Jewish High Court), a good and honorable man [Matt 27:57-61; Mark 15:42-47; John 19:38-42] '
  '51':
  - type: text
    content: '(he had not consented to the Council’s plan and action) '
  - type: text
    content: a man
  - type: text
    content: ' from Arimathea, a city of the Jews, who was waiting for '
  - type: text
    content: and
  - type: text
    content: ' expecting the kingdom of God; '
  '52':
  - type: text
    content: 'this man went to Pilate and asked for the body of Jesus. '
  '53':
  - type: text
    content: 'And [after receiving permission] he took it down and wrapped it in a linen [burial] cloth and laid Him in a tomb cut into the rock, where no one had yet been laid. '
  '54':
  - type: text
    content: 'It was the day of preparation [for the Sabbath], and the Sabbath was dawning. '
  '55':
  - type: text
    content: 'Now the women who had come with Him from Galilee followed [closely], and saw the tomb and how His body was laid. '
  '56':
  - type: text
    content: 'Then they went back and prepared spices and ointments '
  - type: text
    content: and
  - type: text
    content: ' sweet-smelling herbs.'
  - type: text
    content: A
  - type: text
    content: nd on the Sabbath they rested in accordance with the commandment [forbidding work]. [Ex 12:16; 20:10]
  '6':
  - type: text
    content: 'When Pilate heard it, he asked whether the man was a Galilean. '
  '7':
  - type: text
    content: 'And when he learned that He belonged to the jurisdiction of '
  - type: note
    content: See note Matt 22:17.
  - type: text
    content: Herod [Antipas, the tetrarch of Galilee], he sent Him to Herod, who was also in Jerusalem at that time.
  - type: heading
    content: Jesus before Herod
  '8':
  - type: text
    content: 'When Herod saw Jesus, he was exceedingly pleased. He had wanted to see Him for a long time because of what he had heard about Him, and was hoping to see some [miraculous] sign [even something spectacular] done by Him. '
  '9':
  - type: text
    content: 'And he questioned Him at some length, but Jesus made no reply. [Is 53:7] '
