  '1':
  - type: heading
    content: Jesus before Pilate
  - type: text
    content: 'Then the whole assembly got up and brought Him before Pilate. '
  '10':
  - type: text
    content: 'The chief priests and the scribes were standing there, '
  - type: text
    content: continually
  - type: text
    content: ' accusing Him heatedly. '
  '11':
  - type: text
    content: 'And Herod with his soldiers, after treating Him with contempt and mocking '
  - type: text
    content: and
  - type: text
    content: ' ridiculing Him, dressed Him in a gorgeous robe and sent Him back to Pilate. [Is 53:8] '
  '12':
  - type: text
    content: Now that very day Herod and Pilate became friends with each other—before this they had been enemies.
  - type: heading
    content: Pilate Seeks Jesus’ Release
  '13':
  - type: text
    content: 'Pilate summoned the chief priests and the rulers and the people, '
  '14':
  - type: text
    content: 'and said to them, “You brought this man before me as one who corrupts '
  - type: text
    content: and
  - type: text
    content: ' incites the people to rebellion. After examining Him before you, I have found no guilt in this Man regarding the charges which you make against Him. '
  '15':
  - type: text
    content: 'No, nor has Herod, for he sent Him back to us; and indeed, He has done nothing to deserve death. '
  '16':
  - type: text
    content: 'Therefore I will punish Him [to teach Him a lesson] and release Him.” '
  '17':
  - type: note
    content: Most early mss do not contain this verse.
  - type: text
    content: '[Now he was obligated to release to them one prisoner at the Feast.]'
  '18':
  - type: text
    content: 'But they [loudly] shouted out all together, saying, “Away with this Man, and release Barabbas to us!” [Matt 27:15-26; Mark 15:6-15; John 18:39-19:16] '
  '19':
  - type: text
    content: '(He was one who had been thrown into prison for an insurrection that happened in the city, and for murder.) '
  '2':
  - type: text
    content: 'They began to accuse Jesus, asserting, “We found this Man misleading '
  - type: text
    content: and
  - type: text
    content: ' perverting our nation and forbidding us to pay taxes to Caesar, and claiming that He Himself is Christ (the Messiah, the Anointed), a King.” [Matt 27:11-14; Mark 15:2-5; John 18:29-37] '
  '20':
  - type: text
    content: 'Pilate addressed them again, wanting to release Jesus, '
  '21':
  - type: text
    content: 'but they kept shouting out, “Crucify, crucify Him!” '
  '22':
  - type: text
    content: 'A third time he said to them, “Why, what wrong has He done? I have found no guilt [no crime, no offense] in Him '
  - type: text
