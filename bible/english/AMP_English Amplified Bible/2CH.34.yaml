document_id: 2CH.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Josiah Succeeds Amon in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josiah was eight years old when he became king, and he reigned for thirty-one years in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did what was right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and walked in the ways of David his father (forefather) and did not turn aside either to the right or to the left. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For in the eighth year of his reign, while he was still young (sixteen), he began to seek after '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inquire of the God of his father David; and in the twelfth year he began to purge Judah and Jerusalem of the high places, the Asherim, and the carved and cast images. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They tore down the altars of the Baals in his presence; he cut to pieces the incense altars that were high above them; he also smashed the Asherim and the carved images and the cast images to pieces, and ground them to dust and scattered it on the graves of those who had sacrificed to them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Josiah burned the bones of the [pagan] priests on their altars and purged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cleansed Judah and Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In the cities of Manasseh, Ephraim, Simeon, and as far as Naphtali, in their surrounding ruins, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'he tore down the altars and beat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed the Asherim and the carved images into powder, and cut to pieces all the incense altars throughout the land of Israel. Then he returned to Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Josiah Repairs the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In the eighteenth year of Josiah’s reign, when he had purged the land and the [L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: '] house, he sent Shaphan the son of Azaliah, and Maaseiah the governor of the city, and Joah the son of Joahaz the recorder (secretary), to repair the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they came to Hilkiah the high priest, they delivered the money that had been brought into the house of God, which the Levites, who guarded the doors, had collected from Manasseh and Ephraim, and from all the remnant of Israel, and from all Judah and Benjamin, and the inhabitants of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then they gave it to the workmen who were appointed over the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the workmen who were working in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave it [to others] to repair and restore the house (temple). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They in turn gave it to the carpenters and builders to buy quarried stone and timber for couplings (trusses, braces) and to make beams for the houses which the kings of Judah had let go to ruin. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The men did the work faithfully with foremen over them to supervise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inspect [their work]: Jahath and Obadiah, the Levites of the sons of Merari, and Zechariah and Meshullam of the sons of the Kohathites, and the Levites, all who were skillful with musical instruments. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: it
    children:
    - type: text
      text: They were
  - type: text
    text: ' also in charge of the burden bearers [who carried heavy loads], and supervised all the workmen in any kind of service; and some of the Levites were scribes and officials and gatekeepers.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hilkiah Discovers Lost Book of the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When they were bringing out the money which had been brought into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', Hilkiah the priest found the Book of the Law of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' by Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hilkiah told Shaphan the scribe, “I have found the Book of the Law in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” And he gave the book to Shaphan. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Shaphan brought the book to the king, but [first] reported further to him, “Your servants are doing everything that was entrusted to them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They have emptied out the money that was found in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and have delivered it into the hands of the overseers and the workmen.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Shaphan the scribe told the king, “Hilkiah the priest has given me a book.” And Shaphan read from it in the presence of the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When the king heard the words of the Law, he tore his clothes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then the king commanded Hilkiah, Ahikam the son of Shaphan, Abdon the son of Micah, Shaphan the scribe, and Asaiah a servant of the king, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Go, inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for me and for those who are left in Israel and in Judah in regard to the words of the book which has been found; for great is the wrath of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which has been poured out on us because our fathers have not kept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to act in accordance with everything that is written in this book.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Huldah, the Prophetess, Speaks
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Hilkiah and those whom the king had told went to Huldah the prophetess, the wife of Shallum the son of Tokhath, the son of Hasrah, keeper of the wardrobe (now she lived in Jerusalem, in the Second Quarter); and they spoke to her about this. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And she answered them, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel: ‘Tell the man who sent you to me, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': “Behold, I am bringing evil on this place and on its inhabitants, all the curses that are written in the book which they have read in the presence of the king of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Because they have abandoned (rejected) Me and have burned incense to other gods, in order to provoke Me to anger with all the works of their hands, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God’s wrath would “not be extinguished,” but that does not mean it would go on forever. It means it will consume all of what it was meant to consume.
    marker-yv: yv-n
  - type: text
    text: 'My wrath will be poured out on this place and it will not be extinguished.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But you shall say the following to King Josiah of Judah, who sent you to inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘Thus says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: concerning
  - type: text
    text: ' the words which you have heard, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“Because your heart was gentle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' penitent and you humbled yourself before God when you heard His words against this place and its inhabitants, and humbled yourself before Me, and tore your clothes and wept before Me, I also have heard you,” declares the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Behold, I will gather you to your fathers [in death], and you shall be gathered to your grave in peace, and your eyes shall not see all the evil which I am going to bring on this place and on its inhabitants.” ’ ” So they brought back word to the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then the king sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and gathered all the elders of Judah and Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And the king went up to the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with all the men of Judah, the inhabitants of Jerusalem, the priests, the Levites, and all the people, from the greatest to the least; and he read aloud so they could hear all the words of the Book of the Covenant which was found in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Josiah’s Good Reign
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then the king stood in his place and made a covenant before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: —to walk after (obey) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and to keep His commandments, His testimonies, and His statutes with all his heart and with all his soul, to perform the words of the covenant written in this book. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Further, he made all who were present in Jerusalem and Benjamin stand [with him, in confirmation of it]. So the inhabitants of Jerusalem acted in accordance with the covenant of God, the God of their fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Josiah removed all the [pagan] repulsive things from all the lands belonging to the sons (descendants) of Israel, and made all who were present in Israel serve the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God. Throughout his lifetime they did not turn from following the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of their fathers.'
