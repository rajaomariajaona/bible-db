verses:
  '1':
  - type: heading
    content: Hezekiah Shows His Treasures
  - type: text
    content: 'At that time Merodach-baladan son of Baladan, king of Babylon, sent [messengers with] letters and a present to Hezekiah, for he had heard that he had been sick and had recovered. [2 Kin 20:12-19] '
  '2':
  - type: text
    content: 'Hezekiah was pleased and showed them his treasure house—the silver, the gold, the spices, the precious oil, his entire armory and everything that was found in his treasuries. There was nothing in his house nor in all his area of dominion that Hezekiah did not show them. '
  '3':
  - type: text
    content: 'Then Isaiah the prophet came to King Hezekiah and asked, “What did these men say? From where have they come to you?” And Hezekiah said, “They came to me from a far country, from '
  - type: note
    content: During this period Babylon was not regarded as a threat.
  - type: text
    content: 'Babylon.” '
  '4':
  - type: text
    content: Then Isaiah said, “What have they seen in your house?” And Hezekiah answered, “They have seen everything that is in my house; there is nothing among my treasures that I have not shown them.”
  '5':
  - type: text
    content: Then Isaiah said to Hezekiah, “Hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, '
  '6':
  - type: text
    content: ‘Listen carefully, the days are coming when everything that is in your house and everything that your predecessors have stored up until this day will be carried to Babylon; nothing will be left,’ says the L
  - type: heading
