  - type: text
    text: 'At that time Merodach-baladan son of Baladan, king of Babylon, sent [messengers with] letters and a present to Hezekiah, for he had heard that he had been sick and had recovered. [2 Kin 20:12-19] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hezekiah was pleased and showed them his treasure house—the silver, the gold, the spices, the precious oil, his entire armory and everything that was found in his treasuries. There was nothing in his house nor in all his area of dominion that Hezekiah did not show them. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Isaiah the prophet came to King Hezekiah and asked, “What did these men say? From where have they come to you?” And Hezekiah said, “They came to me from a far country, from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: During this period Babylon was not regarded as a threat.
    marker-yv: yv-n
  - type: text
    text: 'Babylon.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then Isaiah said, “What have they seen in your house?” And Hezekiah answered, “They have seen everything that is in my house; there is nothing among my treasures that I have not shown them.”
