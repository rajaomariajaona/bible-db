  - type: text
    content: '. '
  '7':
  - type: text
    content: '‘And '
  - type: note
    content: The fulfillment of this prophecy was initiated when Daniel and some of the other royal sons were taken to Babylon to serve in the court of the king.
  - type: text
    content: 'some of your own sons (descendants) who will come from you, whom you will father, will be taken away, and they will become officials in the palace of the king of Babylon.’ ” '
  '8':
  - type: text
    content: Then said Hezekiah to Isaiah, “The word of the L
  - type: heading
