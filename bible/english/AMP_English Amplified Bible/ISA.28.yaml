    content: Ephraim’s Captivity Predicted
  - type: text
    content: 'Woe (judgment is coming) to [Samaria] the splendid crown of the drunkards of '
  - type: note
    content: I.e. the ten northern tribes of Israel.
  - type: text
    content: Ephraim,
  - type: text
    content: And to the fading flower of its glorious beauty,
  - type: text
    content: Which is at the head of the rich valley
  - type: text
    content: Of those who are overcome with wine!
  '10':
  - type: text
    content: '“For '
  - type: text
    content: He says
  - type: text
    content: ','
  - type: text
    content: ‘Precept upon precept, precept upon precept,
  - type: text
    content: Rule upon rule, rule upon rule,
  - type: text
    content: Here a little, there a little.’ ”
  '11':
  - type: text
    content: Indeed, the L
  - type: heading
    content: ord
  - type: text
    content: ' will teach this people [in a more humiliating way]'
  - type: text
    content: By [men with] stammering lips and a foreign tongue,
  '12':
  - type: text
    content: He who said to them, “This is the place of quiet, give rest to the weary,”
  - type: text
    content: And, “This is the resting place,” yet they would not listen.
  '13':
  - type: text
    content: Therefore the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to them will be [merely monotonous repetitions]:'
  - type: text
    content: “Precept upon precept, precept upon precept,
  - type: text
    content: Rule upon rule, rule upon rule,
  - type: text
    content: Here a little, there a little.”
  - type: text
    content: That they may go and stumble backward, and be broken, ensnared, and taken captive.
  - type: heading
    content: Judah Is Warned
  '14':
  - type: text
    content: Therefore, hear the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', you arrogant men'
  - type: text
    content: Who rule this people who are in Jerusalem!
  '15':
  - type: text
    content: Because you have said, “We have made a covenant with death,
  - type: text
    content: And with Sheol (the place of the dead) we have made an agreement,
  - type: text
    content: When the overwhelming scourge passes by, it will not reach us,
  - type: text
    content: For we have made lies our refuge and we have concealed ourselves in deception.”
  '16':
  - type: text
    content: Therefore the Lord G
  - type: heading
    content: od
  - type: text
    content: ' says this,'
  - type: text
    content: “Listen carefully, I am laying in Zion a Stone, a tested Stone,
  - type: text
    content: A precious Cornerstone for the [secure] foundation, firmly placed.
  - type: text
    content: 'He who believes [who trusts in, relies on, and adheres to that Stone] will not '
  - type: note
    content: The Septuagint (Greek translation of the Old Testament) reads “be put to shame,” a phrase which occurs frequently in pleas to God.
  - type: text
    content: 'be disturbed '
  - type: text
    content: or
  - type: text
    content: ' give way [in sudden panic]. [Ps 118:22; Matt 21:42; Acts 4:11; Rom 9:33; Eph 2:20; 1 Pet 2:4-6]'
  '17':
  - type: text
    content: “I will make justice the measuring line
  - type: text
    content: And righteousness the mason’s level;
  - type: text
    content: Then hail will sweep away the refuge of lies
  - type: text
    content: And waters will flood over the secret [hiding] place.
  '18':
  - type: text
    content: “Your covenant with death will be annulled,
  - type: text
    content: And your agreement with Sheol (the place of the dead) will not stand;
  - type: text
    content: When the overwhelming scourge passes through,
  - type: text
    content: Then you will become its trampling ground.
  '19':
  - type: text
    content: “As often as it passes through, it will seize you;
  - type: text
    content: For morning after morning it will pass through, by day and by night,
  - type: text
    content: And it will be sheer terror to understand what it means.”
  '2':
  - type: text
    content: 'Listen carefully, the Lord has a strong and mighty '
  - type: text
    content: agent
  - type: text
    content: ' [the Assyrian];'
  - type: text
    content: Like a tempest of hail, a disastrous storm,
  - type: text
    content: Like a tempest of mighty overflowing waters,
  - type: text
    content: 'He has cast it down to the earth with '
  - type: text
    content: His
  - type: text
    content: ' hand.'
  '20':
  - type: text
    content: For the bed is too short to stretch out on,
  - type: text
    content: And the blanket is too narrow to wrap around oneself [and likewise all their preparations are inadequate].
  '21':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will rise up as at Mount Perazim,'
  - type: text
    content: He will be stirred up as in the Valley of Gibeon,
  - type: text
    content: 'To do His work, His unusual '
  - type: text
    content: and
  - type: text
    content: ' incredible work,'
  - type: text
    content: And to accomplish His work, His extraordinary work. [2 Sam 5:20; 1 Chr 14:16]
  '22':
  - type: text
    content: Now do not carry on as scoffers,
  - type: text
    content: Or the bands which bind you will be made stronger;
  - type: text
    content: For I have heard from the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts [a decree]'
  - type: text
    content: Of decisive destruction on all the earth.
  '23':
  - type: text
    content: ¶Listen and hear my voice;
  - type: text
    content: Listen carefully and hear my words.
  '24':
  - type: text
    content: Does the farmer plow all day to plant seed?
  - type: text
    content: 'Does he '
  - type: text
    content: continually
  - type: text
    content: ' dig furrows and harrow his ground [after it is prepared]?'
  '25':
  - type: text
    content: When he has leveled its surface,
  - type: text
    content: Does he not sow [the seed of] dill and scatter cumin,
  - type: text
    content: And plant wheat in rows,
  - type: text
    content: 'And barley in its [intended] place and '
  - type: note
    content: A subspecies of common wheat.
  - type: text
    content: rye within its border?
  '26':
  - type: text
    content: For his God instructs [him correctly] and teaches him properly.
  '27':
  - type: text
    content: For dill is not threshed with a sharp threshing sledge,
  - type: text
    content: Nor is a cartwheel rolled over cumin;
  - type: text
    content: But dill is beaten out with a staff, and cumin with a rod.
  '28':
  - type: text
    content: 'Bread '
  - type: text
    content: grain
  - type: text
    content: ' is crushed fine,'
  - type: text
    content: Indeed, the farmer does not continue to thresh it forever.
  - type: text
    content: 'Because the wheel of his cart and his horses '
  - type: text
    content: eventually
  - type: text
    content: ' damage it,'
  - type: text
    content: He does not thresh it longer.
  '29':
  - type: text
    content: This also comes from the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: Who has made His counsel wonderful and His wisdom great.
  '3':
  - type: text
    content: The splendid crown of the drunkards of Ephraim is trampled by [the foreigners’] feet.
  '4':
  - type: text
    content: And the fading flower of its glorious beauty,
  - type: text
    content: Which is at the head of the rich valley,
  - type: text
    content: Will be like the early fig before the summer,
  - type: text
    content: Which one sees,
  - type: text
    content: And as soon as it is in his hand
  - type: text
    content: He [greedily] swallows it [and so will the Assyrians rapidly devour Samaria, Israel’s capital].
  '5':
  - type: text
    content: In that day the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts will become a magnificent crown'
  - type: text
    content: And a glorious diadem to the [converted] remnant of His people,
  '6':
  - type: text
    content: A spirit of justice for him who sits in judgment [administering the law],
  - type: text
    content: A strength to those who drive back the battle at the gate.
  '7':
  - type: text
    content: 'But even these reel with wine and stagger from strong drink:'
  - type: text
    content: The priest and the prophet reel with strong drink;
  - type: text
    content: They are confused by wine, they stagger from strong drink;
  - type: text
    content: They reel while seeing visions,
  - type: text
    content: 'They stagger '
  - type: text
    content: when pronouncing
  - type: text
    content: ' judgment.'
  '8':
  - type: text
    content: For all the tables are full of filthy vomit, so that there is no place [that is clean.]
  '9':
  - type: text
    content: ¶
  - type: text
    content: They say
  - type: text
    content: ' “To whom would He teach knowledge?'
  - type: text
    content: And to whom would He explain the message?
  - type: text
    content: 'Those '
  - type: text
    content: just
  - type: text
    content: ' weaned from milk?'
  - type: text
    content: 'Those '
  - type: text
    content: just
  - type: text
    content: ' taken from the breast?'
