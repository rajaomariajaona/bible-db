document_id: ISA.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ephraim’s Captivity Predicted
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Woe (judgment is coming) to [Samaria] the splendid crown of the drunkards of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the ten northern tribes of Israel.
    marker-yv: yv-n
  - type: text
    text: Ephraim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the fading flower of its glorious beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which is at the head of the rich valley
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of those who are overcome with wine!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Listen carefully, the Lord has a strong and mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: agent
  - type: text
    text: ' [the Assyrian];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a tempest of hail, a disastrous storm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a tempest of mighty overflowing waters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He has cast it down to the earth with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The splendid crown of the drunkards of Ephraim is trampled by [the foreigners’] feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And the fading flower of its glorious beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which is at the head of the rich valley,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be like the early fig before the summer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which one sees,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as soon as it is in his hand
- type: usfm
  marker: q1
  children:
  - type: text
    text: He [greedily] swallows it [and so will the Assyrians rapidly devour Samaria, Israel’s capital].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In that day the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will become a magnificent crown'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a glorious diadem to the [converted] remnant of His people,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A spirit of justice for him who sits in judgment [administering the law],
- type: usfm
  marker: q1
  children:
  - type: text
    text: A strength to those who drive back the battle at the gate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But even these reel with wine and stagger from strong drink:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The priest and the prophet reel with strong drink;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are confused by wine, they stagger from strong drink;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They reel while seeing visions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They stagger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: when pronouncing
  - type: text
    text: ' judgment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For all the tables are full of filthy vomit, so that there is no place [that is clean.]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶
  - type: usfm
    marker: it
    children:
    - type: text
      text: They say
  - type: text
    text: ' “To whom would He teach knowledge?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to whom would He explain the message?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: just
  - type: text
    text: ' weaned from milk?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: just
  - type: text
    text: ' taken from the breast?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He says
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Precept upon precept, precept upon precept,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rule upon rule, rule upon rule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Here a little, there a little.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indeed, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will teach this people [in a more humiliating way]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: By [men with] stammering lips and a foreign tongue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He who said to them, “This is the place of quiet, give rest to the weary,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And, “This is the resting place,” yet they would not listen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Therefore the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to them will be [merely monotonous repetitions]:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Precept upon precept, precept upon precept,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rule upon rule, rule upon rule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Here a little, there a little.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they may go and stumble backward, and be broken, ensnared, and taken captive.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah Is Warned
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore, hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you arrogant men'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who rule this people who are in Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Because you have said, “We have made a covenant with death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with Sheol (the place of the dead) we have made an agreement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the overwhelming scourge passes by, it will not reach us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For we have made lies our refuge and we have concealed ourselves in deception.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' says this,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Listen carefully, I am laying in Zion a Stone, a tested Stone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A precious Cornerstone for the [secure] foundation, firmly placed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He who believes [who trusts in, relies on, and adheres to that Stone] will not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:16 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Septuagint
      - type: text
        text: ' (Greek translation of the Old Testament) reads “be put to shame,” a phrase which occurs frequently in pleas to God.'
    marker-yv: yv-n
  - type: text
    text: 'be disturbed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' give way [in sudden panic]. [Ps 118:22; Matt 21:42; Acts 4:11; Rom 9:33; Eph 2:20; 1 Pet 2:4-6]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “I will make justice the measuring line
- type: usfm
  marker: q1
  children:
  - type: text
    text: And righteousness the mason’s level;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then hail will sweep away the refuge of lies
- type: usfm
  marker: q1
  children:
  - type: text
    text: And waters will flood over the secret [hiding] place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Your covenant with death will be annulled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your agreement with Sheol (the place of the dead) will not stand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the overwhelming scourge passes through,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you will become its trampling ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “As often as it passes through, it will seize you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For morning after morning it will pass through, by day and by night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it will be sheer terror to understand what it means.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For the bed is too short to stretch out on,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the blanket is too narrow to wrap around oneself [and likewise all their preparations are inadequate].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will rise up as at Mount Perazim,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will be stirred up as in the Valley of Gibeon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To do His work, His unusual '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incredible work,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to accomplish His work, His extraordinary work. [2 Sam 5:20; 1 Chr 14:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now do not carry on as scoffers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or the bands which bind you will be made stronger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have heard from the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts [a decree]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of decisive destruction on all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶Listen and hear my voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen carefully and hear my words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Does the farmer plow all day to plant seed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' dig furrows and harrow his ground [after it is prepared]?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When he has leveled its surface,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does he not sow [the seed of] dill and scatter cumin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And plant wheat in rows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And barley in its [intended] place and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A subspecies of common wheat.
    marker-yv: yv-n
  - type: text
    text: rye within its border?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For his God instructs [him correctly] and teaches him properly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For dill is not threshed with a sharp threshing sledge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor is a cartwheel rolled over cumin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But dill is beaten out with a staff, and cumin with a rod.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Bread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grain
  - type: text
    text: ' is crushed fine,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, the farmer does not continue to thresh it forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because the wheel of his cart and his horses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: eventually
  - type: text
    text: ' damage it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He does not thresh it longer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: This also comes from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has made His counsel wonderful and His wisdom great.
