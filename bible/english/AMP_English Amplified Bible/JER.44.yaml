document_id: JER.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Conquest of Egypt Predicted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word that came to Jeremiah concerning all the Jews who were living in the land of Egypt—at Migdol, at Tahpanhes, at Memphis, and in the land of Pathros, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘You have seen all the disaster that I have brought on Jerusalem and on all the cities of Judah; and see, this day they are desolated and no one lives in them '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'because of the wickedness which they committed, provoking Me to anger by continuing to burn sacrifices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incense to serve other gods that they had not known, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: neither
  - type: text
    text: ' they, nor you, nor your fathers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yet I sent to you all My servants the prophets, again and again, saying, “Oh, do not do this shamefully vile thing which I hate.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But they did not listen or turn [obediently] from their wickedness, and stop burning sacrifices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incense to other gods. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore My wrath and My anger were poured out and burned in the cities of Judah and in the streets of Jerusalem; so they have become a ruin and a desolation, as it is this day. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore now thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts, the God of Israel, “Why did you commit this great evil against yourselves [bringing disaster] that will cut off from you man and woman, child and infant, out of Judah, leaving yourselves without a remnant? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Why do you [deliberately] provoke Me to anger with the works (idols) of your hands, burning sacrifices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' incense to [make-believe] gods in the land of Egypt, where you [of your own accord] have come to live [as temporary residents], that you might be cut off and become a curse and a disgrace [an object of taunts] among all the nations of the earth? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Have you forgotten the wickedness of your fathers, the wickedness of the kings of Judah, the wickedness of their wives [who served their foreign gods], your own wickedness, and the wickedness of your wives [who imitated the sin of the queens], which they committed in the land of Judah and in the streets of Jerusalem? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They have not become apologetic [for their guilt and sin] even to this day; they have not feared [Me with reverence] nor walked in My law or My statutes, which I have set before you and before your fathers.” ’ [Jer 6:15; 26:4-6; 44:23]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Behold, I am going to set My face against you for woe—even to cut off (destroy) all Judah [from the land]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I will take the remnant of Judah who have decided to go into the land of Egypt to live there [instead of surrendering to the Chaldeans as directed], and they will all fall and die in the land of Egypt; they will fall by the sword or perish by famine. From the least to the greatest, they will die by the sword or by famine; and they will become detestable, an object of horror, a curse, and a disgrace. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I will punish all the inhabitants of the land of Egypt, as I have punished Jerusalem, with the sword, with famine, and with virulent disease; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: so none of the survivors from the remnant of Judah who have entered the land of Egypt to live there will survive, even though they lift up their souls in longing to return to the land of Judah, [the place] to which they long to return to live; none will return except a few refugees.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then all the men who knew that their wives were burning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: incense
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'sacrifices to other gods, and all the women who were standing by, a large group, including all the people who were living in Pathros in the land of Egypt, answered Jeremiah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “As for the word (message) that you have spoken to us in the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', we are not going to listen to you. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But rather we will certainly perform every word of the vows we have made: to burn sacrifices to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 7:18.
    marker-yv: yv-n
  - type: text
    text: 'queen of heaven (Ishtar) and to pour out drink offerings to her, just as we ourselves and our forefathers, our kings and our princes did in the cities of Judah and in the streets of Jerusalem; for [then] we had plenty of food and were prosperous and saw no misfortune. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But since we stopped burning sacrifices to the queen of heaven and pouring out drink offerings to her, we have lacked everything and have been consumed by the sword and by famine.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: And said the wives,
  - type: text
    text: ' “When we were burning sacrifices to the queen of heaven and were pouring out drink offerings to her, was it without [the knowledge and approval of] our husbands that we made cakes [in the shape of a star] to represent her and pour out drink offerings to her?”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tragedy for the Jews
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Jeremiah said to all the people, to the men and to the women and to all the people who had given him that answer, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “The smoking sacrifices (incense) that you burned in the cities of Judah and in the streets of Jerusalem—you and your forefathers, your kings and your princes, and the people of the land—did not the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' remember [in detail your idolatry] and did it not all come into His mind? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' could no longer endure it, because of the evil of your acts and the repulsive acts which you have committed; because of them your land has become a ruin, an object of horror and a curse, without inhabitant, as it is this day. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Because you have burned sacrifices [to idols] and because you have sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and have not obeyed the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' or walked in His law and in His statutes and in His testimonies, therefore this tragedy has fallen on you, as it has this day.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then Jeremiah said to all the people, including all the women, “Hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all [you of] Judah who are in the land of Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, as follows: ‘You and your wives have both declared with your mouth and fulfilled it with your hand, saying, “We will certainly perform our vows that we have vowed, to burn sacrifices to the queen of heaven (Ishtar) and to pour out drink offerings to her.” Surely then confirm your vows and go ahead and perform your vows! [If you intend to defy all My warnings, proceed!]’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Therefore hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all [you people of] Judah who are living in the land of Egypt, ‘Behold, I have sworn [an oath] by My great Name,’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘that My Name shall never again be invoked by the mouth of any man of Judah in all the land of Egypt, saying, “As the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' lives.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Behold, I am watching over them for harm and not for good; and all the men of Judah who are in the land of Egypt shall be consumed by the sword and by famine until they are all destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Yet a small number [of My choosing] who escape the sword will return from the land of Egypt to the land of Judah; and all the remnant of Judah who have gone to the land of Egypt to reside there will know whose words will stand, Mine or theirs. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And this will be the sign to you,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘that I am going to punish you in this place, so that you may know that My words will surely stand against you for harm.’ '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘Behold, I will give '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hophra ruled 588-570 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . He was murdered in a coup led by his successor the Pharaoh Amasis.
    marker-yv: yv-n
  - type: text
    text: Pharaoh Hophra king of Egypt into the hand of his enemies and into the hand of those who seek his life, just as I gave Zedekiah king of Judah into the hand of Nebuchadnezzar king of Babylon, who was his enemy and was seeking his life.’ ”
