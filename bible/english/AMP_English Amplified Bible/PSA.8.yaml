  '4':
  - type: text
    content: What is man that You are mindful of him,
  - type: text
    content: And the son of [earthborn] man that You care for him?
  '5':
  - type: text
    content: 'Yet You have made him a little lower than '
  - type: note
    content: 'LXX reads angels; Heb Elohim is usually translated “God” or “god.” But it can also mean “gods” (with a lowercase “g”) when it is used with reference to the pagan gods of other nations. See, for instance, Ex 20:3: “You shall have no other gods (Elohim) before Me.” Since there are no capital letters in Hebrew as there are in English, the meaning of Ps 8:5 is ambiguous. It may be saying that humans were created a little lower than God Himself, or it may say that humans were created a little lower than the heavenly beings.'
  - type: text
    content: God,
  - type: text
    content: And You have crowned him with glory and honor.
  '6':
  - type: text
    content: You made him to have dominion over the works of Your hands;
  - type: text
    content: You have put all things under his feet, [1 Cor 15:27; Eph 1:22, 23; Heb 2:6-8]
