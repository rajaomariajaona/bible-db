document_id: ISA.55,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Free Offer of Mercy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Everyone who thirsts, come to the waters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you who have no money come, buy grain and eat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, buy wine and milk
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without money and without cost [simply accept it as a gift from God]. [Rev 21:6, 7; 22:17]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “For as the rain and snow come down from heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not return there without watering the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Making it bear and sprout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And providing seed to the sower and bread to the eater, [2 Cor 9:10]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So will My word be which goes out of My mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will not return to Me void (useless, without result),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without accomplishing what I desire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And without succeeding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the matter
    - type: text
      text: ' for which I sent it.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “For you will go out [from exile] with joy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And be led forth [by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' Himself] with peace;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains and the hills will break forth into shouts of joy before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the trees of the field will clap their hands.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Instead of the thorn bush the cypress tree will grow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And instead of the nettle the myrtle tree will grow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it will be a memorial to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For an everlasting sign [of His mercy] which will not be cut off.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Why do you spend money for that which is not bread,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your earnings for what does not satisfy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully to Me, and eat what is good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let your soul delight in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fatness
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: abundance. [Jer 31:12-14]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Incline your ear [to listen] and come to Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear, so that your soul may live;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make an everlasting covenant with you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: According to
    - type: text
      text: ' the faithful mercies [promised and] shown to David. [2 Sam 7:8-16; Acts 13:34; Heb 13:20]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Listen carefully, I have appointed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Him
        - type: text
          text: ' (the Messiah Himself).'
      marker-yv: yv-n
    - type: text
      text: him [David, representing the Messiah] to be a witness to the nations [regarding salvation],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A leader and commander to the peoples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“In fact, you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identification of the one addressed here is uncertain. A large number of authorities believe it to be Israel, as here indicated, but other interpreters think it is the Messiah [the second David], or David as His representative.
      marker-yv: yv-n
    - type: text
      text: '[Israel] will call a nation that you do not know,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a nation that does not know you will run to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, even the Holy One of Israel;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has glorified you.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ¶Seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' while He may be found;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call on Him [for salvation] while He is near.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let the wicked leave (behind) his way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the unrighteous man his thoughts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let him return to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He will have compassion (mercy) on him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to our God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He will abundantly pardon.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “For My thoughts are not your thoughts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor are your ways My ways,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “For as the heavens are higher than the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So are My ways higher than your ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And My thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: higher
    - type: text
      text: ' than your thoughts.'
