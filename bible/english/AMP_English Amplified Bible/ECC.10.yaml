document_id: ECC.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Little Foolishness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dead flies make the oil of the perfumer give off a foul odor; so a little foolishness [in one who is esteemed] outweighs wisdom and honor. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A wise man’s heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: turns him
  - type: text
    text: ' toward the right [which is the way of blessing], but a fool’s heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: turns him
  - type: text
    text: ' toward the left [which is the way of condemnation]. [Matt 25:31-41] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Even when a fool walks along the road, his [common] sense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good judgment fail him and he demonstrates to everyone that he is a fool. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If the temper of the ruler rises against you, do not leave your post [showing resistance], because composure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' calmness prevent great offenses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'There is an evil I have seen under the sun, like an error which proceeds from the ruler— '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'folly is set in many exalted places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in great dignity while the rich sit in humble places. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I have seen slaves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: riding
  - type: text
    text: ' on horses and princes walking like slaves on the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He who digs a pit [for others] may fall into it, and a serpent may bite him who breaks through a [stone] wall. [Ps 57:6] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He who quarries stones may be hurt with them, and he who splits logs may be endangered by them. [Prov 26:27] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If the axe is dull and he does not sharpen its edge, then he must exert more strength; but wisdom [to sharpen the axe] helps him succeed [with less effort]. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If the serpent bites before being charmed, then there is no profit for the charmer. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The words of a wise man’s mouth are gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' win him favor, but the lips of a fool consume him; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the beginning of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the words of his mouth
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'his talking is foolishness and the end of his talk is wicked madness. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yet the fool multiplies words, though no man knows what will happen, and who can tell him what will come after he is gone? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The labor of a fool so wearies him [because he is ignorant] that he does not even know how to go to a city. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Woe to you, O land, when your king is a child and when your [incompetent] officials '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' princes feast in the morning. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Blessed [prosperous and admired] are you, O land, when your king is a man of noble birth, and your princes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' officials feast at the proper time—for strength and not for drunkenness. [Is 32:8] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Through laziness the rafters [of state affairs] decay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the roof sags, and through idleness [the roof of] the house leaks. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: The officials
  - type: text
    text: ' make a feast for enjoyment [instead of repairing what is broken], and serve wine to make life merry, and money is the answer to everything. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moreover, do not curse the king, even in your bedroom, and in your sleeping rooms do not curse the rich, for a bird of the air will carry the sound and a winged creature will make the matter known. [Ex 22:28]
