document_id: ECC.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Little Foolishness
  - type: text
    content: 'Dead flies make the oil of the perfumer give off a foul odor; so a little foolishness [in one who is esteemed] outweighs wisdom and honor. '
  '10':
  - type: text
    content: 'If the axe is dull and he does not sharpen its edge, then he must exert more strength; but wisdom [to sharpen the axe] helps him succeed [with less effort]. '
  '11':
  - type: text
    content: 'If the serpent bites before being charmed, then there is no profit for the charmer. '
  '12':
  - type: text
    content: 'The words of a wise man’s mouth are gracious '
  - type: text
    content: and
  - type: text
    content: ' win him favor, but the lips of a fool consume him; '
  '13':
  - type: text
    content: 'the beginning of '
  - type: note
    content: Lit the words of his mouth.
  - type: text
    content: 'his talking is foolishness and the end of his talk is wicked madness. '
  '14':
  - type: text
    content: 'Yet the fool multiplies words, though no man knows what will happen, and who can tell him what will come after he is gone? '
  '15':
  - type: text
    content: 'The labor of a fool so wearies him [because he is ignorant] that he does not even know how to go to a city. '
  '16':
  - type: text
    content: 'Woe to you, O land, when your king is a child and when your [incompetent] officials '
  - type: text
    content: and
  - type: text
    content: ' princes feast in the morning. '
  '17':
  - type: text
    content: 'Blessed [prosperous and admired] are you, O land, when your king is a man of noble birth, and your princes '
  - type: text
    content: and
  - type: text
    content: ' officials feast at the proper time—for strength and not for drunkenness. [Is 32:8] '
  '18':
  - type: text
    content: 'Through laziness the rafters [of state affairs] decay '
  - type: text
    content: and
  - type: text
    content: ' the roof sags, and through idleness [the roof of] the house leaks. '
  '19':
  - type: text
    content: The officials
  - type: text
    content: ' make a feast for enjoyment [instead of repairing what is broken], and serve wine to make life merry, and money is the answer to everything. '
  '2':
  - type: text
    content: 'A wise man’s heart '
  - type: text
    content: turns him
  - type: text
    content: ' toward the right [which is the way of blessing], but a fool’s heart '
  - type: text
    content: turns him
  - type: text
    content: ' toward the left [which is the way of condemnation]. [Matt 25:31-41] '
  '20':
  - type: text
    content: Moreover, do not curse the king, even in your bedroom, and in your sleeping rooms do not curse the rich, for a bird of the air will carry the sound and a winged creature will make the matter known. [Ex 22:28]
  '3':
  - type: text
    content: 'Even when a fool walks along the road, his [common] sense '
  - type: text
    content: and
  - type: text
    content: ' good judgment fail him and he demonstrates to everyone that he is a fool. '
  '4':
  - type: text
    content: 'If the temper of the ruler rises against you, do not leave your post [showing resistance], because composure '
  - type: text
    content: and
  - type: text
    content: ' calmness prevent great offenses.'
  '5':
  - type: text
    content: 'There is an evil I have seen under the sun, like an error which proceeds from the ruler— '
  '6':
  - type: text
    content: 'folly is set in many exalted places '
  - type: text
    content: and
  - type: text
    content: ' in great dignity while the rich sit in humble places. '
  '7':
  - type: text
    content: 'I have seen slaves '
  - type: text
    content: riding
  - type: text
    content: ' on horses and princes walking like slaves on the ground.'
  '8':
  - type: text
    content: 'He who digs a pit [for others] may fall into it, and a serpent may bite him who breaks through a [stone] wall. [Ps 57:6] '
  '9':
  - type: text
    content: 'He who quarries stones may be hurt with them, and he who splits logs may be endangered by them. [Prov 26:27] '
