document_id: JOB.36,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elihu Speaks of God’s Dealings with Men
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Elihu continued and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“He opens their ears to instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And commands that they return from evil.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“If they hear and serve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will end their days in prosperity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their years in pleasantness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' joy.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“But if they do not hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey, they will die by the sword [of God’s destructive judgments]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will die [in ignorance] without [true] knowledge.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “But the godless in heart store up anger [at the divine discipline];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not cry [to Him] for help when He binds them [with cords of affliction]. [Rom 2:5]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “They die in youth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ends
    - type: text
      text: ' among the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. those practicing sodomy and prostitution in pagan religious rites.
      marker-yv: yv-n
    - type: text
      text: cult prostitutes. [Deut 23:17]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “He rescues the afflicted in their affliction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And opens their ears [so that they pay attention to His voice] in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: times of
    - type: text
      text: ' oppression.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Then indeed, He enticed you from the mouth of distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confinement,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Into a broad place where there is no constraint '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' distress;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that which was set on your table was full of fatness (rich food).
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶“But you [Job] were full of judgment on the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Judgment and justice take hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of you
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Do not let wrath entice you into scoffing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And do not let the greatness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the extent of the ransom turn you aside.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Will your wealth [be sufficient to] keep you from [the confinement of] distress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or will all the force of your strength do it?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Bear with me a little longer, and I will show you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That there is yet more to say on God’s behalf.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Do not long for the night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When people vanish from their places.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Take heed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be careful, do not turn to wickedness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have chosen this [the vice of complaining against God] rather than [learning from] affliction.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Behold, God is exalted in His power;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who is a ruler '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a teacher like Him?'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Who has appointed God His way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who can say [to Him], ‘You have done wrong’?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ¶“Remember that you should magnify God’s work,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of which men have sung.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “All men have seen God’s work;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Man looks at it from a distance.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“Behold, God is exalted, and we do not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The number of His years is unsearchable. [1 Cor 13:12]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “For He draws up the drops of water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They distill rain from the mist,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Which the clouds pour down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They drop abundantly upon mankind.”
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “Can anyone understand the spreading of the clouds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the thundering of His pavilion? [Ps 18:11; Is 40:22]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I will bring my knowledge from afar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will ascribe righteousness to my Maker.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “Behold, He spreads His lightning around Him [against the dark clouds],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He covers the depths of the sea.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “For by these [mighty acts] He judges the peoples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives food in abundance.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '“He covers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' hands with the lightning,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And commands it to strike the mark.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “His thundering voice declares [awesomely] His presence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cattle also are told of His coming storm.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “For truly my words are not false;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who is perfect in knowledge is with you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Behold, God is mighty, and yet does not despise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anyone
    - type: text
      text: ' [nor regard any as trivial];'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He is
    - type: text
      text: ' mighty in the strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power of understanding.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “He does not prolong the life of the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But gives the afflicted their justice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “He does not withdraw His eyes from the righteous [those in right standing with Him];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But with kings upon the throne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has seated them forever, and they are exalted.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “And if they are bound in bonds [of adversity],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And held by cords of affliction, [Ps 107:10, 11]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then He declares to them [the true character of] their deeds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their transgressions, that they have acted arrogantly [with presumption and notions of self-sufficiency].
