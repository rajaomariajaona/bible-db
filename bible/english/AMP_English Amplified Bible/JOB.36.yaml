  - type: text
    content: The cattle also are told of His coming storm.
  '4':
  - type: text
    content: “For truly my words are not false;
  - type: text
    content: He who is perfect in knowledge is with you.
  '5':
  - type: text
    content: '“Behold, God is mighty, and yet does not despise '
  - type: text
