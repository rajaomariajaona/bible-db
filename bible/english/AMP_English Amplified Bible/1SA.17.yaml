document_id: 1SA.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Goliath’s Challenge
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Philistines gathered their armies for battle and were assembled at Socoh, which belongs to Judah; and they camped between Socoh and Azekah, in Ephes-dammim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the Philistine said, “I defy the battle lines of Israel this day; give me a man so that we may fight together.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Saul and all Israel heard these words of the Philistine, they were dismayed and greatly afraid.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now David was the son of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: this
        - type: text
          text: . “Ephrathite” was an older name for a resident of Bethlehem.
      marker-yv: yv-n
    - type: text
      text: 'Ephrathite of Bethlehem in Judah, named Jesse, who had eight sons. Jesse was old in the days of Saul, advanced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in years
    - type: text
      text: ' among men. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His three older sons had followed Saul into battle. The names of his three sons who went to battle were Eliab, the firstborn; next, Abinadab; and third, Shammah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David was the youngest. Now the three oldest followed Saul, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but David went back and forth from Saul to tend his father’s flock at Bethlehem. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Philistine [Goliath] came out morning and evening, and took his stand for forty days.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesse said to David his son, “Take for your brothers an ephah of this roasted grain and these ten loaves of bread and run quickly to the camp to your brothers. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also take these ten cuts of cheese to the commander of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: thousand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'unit. See how your brothers are doing and bring back news of them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now they are with Saul and all the men of Israel in the Valley of Elah, fighting with the Philistines.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Accepts the Challenge
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul and the men of Israel were gathered together and they camped in the Valley of Elah, and assembled in battle formation to meet the Philistines. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David got up early in the morning, left the flock with a keeper, picked up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the provisions
    - type: text
      text: ' and went just as Jesse had directed him. And he came to the encampment as the army was going out in battle formation shouting the battle cry. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israel and the Philistines drew up in battle formation, army against army. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David left his provisions in the care of the supply keeper, and ran to the ranks and came and greeted his brothers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he was talking with them, behold, the champion, the Philistine of Gath named Goliath, was coming up from the army of the Philistines, and he spoke these same words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again;
    - type: text
      text: ' and David heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the men of Israel all saw the man, they fled from him, and were very frightened. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Israel said, “Have you seen this man who is coming up? Surely he is coming up to defy Israel. The king will reward the man who kills him with great riches, and will give him his daughter [in marriage] and make his father’s house (family) free [from taxes and service] in Israel.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David spoke to the men who were standing by him, “What will be done for the man who kills this Philistine and removes the disgrace [of his taunting] from Israel? For who is this uncircumcised Philistine that he has taunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defied the armies of the living God?” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: spoke according to this word
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: told him, “That is what will be done for the man who kills him.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Eliab his oldest brother heard what he said to the men; and Eliab’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: his nose got hot.
      marker-yv: yv-n
    - type: text
      text: 'anger burned against David and he said, “Why have you come down here? With whom did you leave those few sheep in the wilderness? I know your presumption (overconfidence) and the evil of your heart; for you have come down in order to see the battle.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David said, “What have I done now? Was it not just a [harmless] question?” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines were standing on the mountain on one side and Israel was standing on the mountain on the other side, with the valley between them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David turned away from Eliab to someone else and asked the same question; and the people gave him the same answer as the first time.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Kills Goliath
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the words that David spoke were heard, the men reported them to Saul, and he sent for him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Saul, “Let no man’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: heart
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'courage fail because of him (Goliath). Your servant will go out and fight with this Philistine.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said to David, “You are not able to go against this Philistine to fight him. For you are [only] a young man and he has been a warrior since his youth.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But David said to Saul, “Your servant was tending his father’s sheep. When a lion or a bear came and took a lamb out of the flock, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I went out after it and attacked it and rescued the lamb from its mouth; and when it rose up against me, I seized it by its whiskers and struck and killed it. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your servant has killed both the lion and the bear; and this uncircumcised Philistine will be like one of them, since he has taunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defied the armies of the living God.” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who rescued me from the paw of the lion and from the paw of the bear, He will rescue me from the hand of this Philistine.” And Saul said to David, “Go, and may the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' be with you.” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul dressed David in his garments and put a bronze helmet on his head, and put a coat of mail (armor) on him. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David fastened his sword over his armor and tried to walk, [but he could not,] because he was not used to them. And David said to Saul, “I cannot go with these, because I am not used to them.” So David took them off. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew refers to one who fights alone, single-handedly representing his nation. If warring nations agree to the contest, a great deal of bloodshed can be avoided.
      marker-yv: yv-n
    - type: text
      text: 'champion came out from the camp of the Philistines named Goliath of Gath, whose height was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. about nine feet, ten inches.
      marker-yv: yv-n
    - type: text
      text: 'six cubits and a span. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he took his [shepherd’s] staff in his hand and chose for himself five '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Smooth stones offered less resistance to the air in flight and would travel with greater speed and accuracy. The sling was a pouch attached to the ends of two long leather thongs, and was a formidable weapon (as the Philistine giant was about to discover).
      marker-yv: yv-n
    - type: text
      text: smooth stones out of the stream bed, and put them in his shepherd’s bag which he had, that is, in his shepherd’s pouch. With his sling in his hand, he approached the Philistine.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistine came and approached David, with his shield-bearer in front of him. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistine looked around and saw David, he derided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disparaged him because he was [just] a young man, with a ruddy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: complexion,
    - type: text
      text: ' and a handsome appearance. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistine said to David, “Am I a dog, that you come to me with [shepherd’s] staffs?” And the Philistine cursed David by his gods. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistine also said to David, “Come to me, and I will give your flesh to the birds of the sky and the beasts of the field.” '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said to the Philistine, “You come to me with a sword, a spear, and a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This weapon may have been similar to a scimitar (short curved sword).
      marker-yv: yv-n
    - type: text
      text: javelin, but I come to you in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of the armies of Israel, whom you have taunted. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This day the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will hand you over to me, and I will strike you down and cut off your head. And I will give the corpses of the army of the Philistines this day to the birds of the sky and the wild beasts of the earth, so that all the earth may know that there is a God in Israel, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and that this entire assembly may know that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does not save with the sword or with the spear; for the battle is the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' and He will hand you over to us.”'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistine rose and came forward to meet David, David ran quickly toward the battle line to meet the Philistine. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David put his hand into his bag and took out a stone and slung it, and it struck the Philistine on his forehead. The stone penetrated his forehead, and he fell face down on the ground.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He had
    - type: text
      text: ' a bronze helmet on his head, and wore a coat of scale-armor (overlapping metal plates) which weighed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The weight is uncertain, but may have been 100 lbs. or more.
      marker-yv: yv-n
    - type: text
      text: '5,000 shekels of bronze. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David triumphed over the Philistine with a sling and a stone, and he struck down the Philistine and killed him; but there was no sword in David’s hand. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he ran and stood over the Philistine, grasped his sword and drew it out of its sheath and killed him, and cut off his head with it. When the Philistines saw that their [mighty] champion was dead, they fled. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men of Israel and Judah stood with a shout and pursued the Philistines as far as the entrance to the valley and the gates of Ekron. And the [fatally] wounded Philistines fell along the way to Shaaraim, even as far as Gath and Ekron. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Israel returned from their pursuit of the Philistines and plundered their camp. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David took the head of the Philistine and brought it to Jerusalem, but he put his weapons in his tent.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul saw David going out against the Philistine, he said to Abner the captain of the army, “Abner, whose son is this young man?” And Abner answered, “By your life, O king, I do not know.” '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king said, “Ask whose son the young man is.” '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David returned from killing [Goliath] the Philistine, Abner took him and brought him before Saul with the head of the Philistine in his hand. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul asked him, “Whose son are you, young man?” And David answered, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: I am
    - type: text
      text: ' the son of your servant Jesse of Bethlehem.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He had
    - type: text
      text: ' bronze shin protectors on his legs and a bronze '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or perhaps '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a scimitar
        - type: text
          text: ' (short curved sword).'
      marker-yv: yv-n
    - type: text
      text: 'javelin hung between his shoulders. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The [wooden] shaft of his spear was like a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the cross beam of a loom.
      marker-yv: yv-n
    - type: text
      text: 'weaver’s beam; the blade-head of his spear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: weighed
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably 12 lbs. or more.
      marker-yv: yv-n
    - type: text
      text: 'six hundred shekels of iron. And a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The shield was the type designed to protect the whole body, so it was probably about eight and one-half feet tall.
      marker-yv: yv-n
    - type: text
      text: 'shield-bearer walked in front of him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Goliath stood and shouted to the battle lines of Israel, saying to them, “Why have you come out to draw up for battle? Am I not the Philistine and are you not servants of Saul? Choose a man for yourselves and have him come down to me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he is able to fight with me and kill me, then we will become your servants; but if I prevail against him and kill him, then you shall become our servants and serve us.” '
