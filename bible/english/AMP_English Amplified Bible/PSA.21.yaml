document_id: PSA.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 21
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Praise for Help.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' the king will delight in Your strength,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in Your salvation how greatly will he rejoice!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Their offspring You will destroy from the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their descendants from the sons of men.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For they planned evil against You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They devised a [malevolent] plot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will not succeed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For You will make them turn their backs [in defeat];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will aim Your bowstring [of divine justice] at their faces.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Be exalted, L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in Your strength;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will sing and praise Your power.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have given him his heart’s desire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And You have not withheld the request of his lips. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For You meet him with blessings of good things;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set a crown of pure gold on his head.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He asked life of You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You gave it to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long life forever and evermore.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: His glory is great because of Your victory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Splendor and majesty You bestow upon him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For You make him most blessed [and a blessing] forever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make him joyful with the joy of Your presence. [Gen 12:2]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶For the king [confidently] trusts in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And through the lovingkindness (faithfulness, goodness) of the Most High he will never be shaken.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Your hand will reach out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defeat all your enemies;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your right hand will reach those who hate you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You will make them as [if in] a blazing oven in the time of your anger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will swallow them up in His wrath,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fire will devour them.
