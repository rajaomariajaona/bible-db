verses:
  '1':
  - type: heading
    content: Psalm 21
  - type: heading
    content: Praise for Help.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ' the king will delight in Your strength,'
  - type: text
    content: And in Your salvation how greatly will he rejoice!
  '10':
  - type: text
    content: Their offspring You will destroy from the earth,
  - type: text
    content: And their descendants from the sons of men.
  '11':
  - type: text
    content: For they planned evil against You;
  - type: text
    content: They devised a [malevolent] plot
  - type: text
    content: And they will not succeed.
  '12':
  - type: text
    content: For You will make them turn their backs [in defeat];
  - type: text
    content: You will aim Your bowstring [of divine justice] at their faces.
  '13':
  - type: text
    content: Be exalted, L
  - type: heading
    content: ord
  - type: text
    content: ', in Your strength;'
  - type: text
    content: We will sing and praise Your power.
  '2':
  - type: text
    content: You have given him his heart’s desire,
  - type: text
    content: 'And You have not withheld the request of his lips. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: For You meet him with blessings of good things;
  - type: text
    content: You set a crown of pure gold on his head.
  '4':
  - type: text
    content: He asked life of You,
  - type: text
    content: And You gave it to him,
  - type: text
    content: Long life forever and evermore.
  '5':
  - type: text
    content: His glory is great because of Your victory;
  - type: text
    content: Splendor and majesty You bestow upon him.
  '6':
  - type: text
    content: For You make him most blessed [and a blessing] forever;
  - type: text
    content: You make him joyful with the joy of Your presence. [Gen 12:2]
  '7':
  - type: text
    content: ¶For the king [confidently] trusts in the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And through the lovingkindness (faithfulness, goodness) of the Most High he will never be shaken.
  '8':
  - type: text
    content: 'Your hand will reach out '
  - type: text
    content: and
  - type: text
    content: ' defeat all your enemies;'
  - type: text
    content: Your right hand will reach those who hate you.
  '9':
  - type: text
    content: You will make them as [if in] a blazing oven in the time of your anger;
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will swallow them up in His wrath,'
  - type: text
    content: And the fire will devour them.
