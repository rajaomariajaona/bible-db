    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Blessed [fortunate, prosperous, favored by God] is he whose transgression is forgiven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose sin is covered.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Many are the sorrows of the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who trusts in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relies on the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall be surrounded with compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Be glad in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and rejoice, you righteous [who actively seek right standing with Him];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout for joy, all you upright in heart.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Blessed is the man to whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does not impute wickedness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in whose spirit there is no deceit. [Rom 4:7, 8]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '¶When I kept silent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about my sin
    - type: text
      text: ', my body wasted away'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through my groaning all the day long.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For day and night Your hand [of displeasure] was heavy upon me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: life juices were turned into the drought of summer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'energy (vitality, strength) was drained away as with the burning heat of summer. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I acknowledged my sin to You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I did not hide my wickedness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “I will confess [all] my transgressions to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And You forgave the guilt of my sin. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Therefore, let everyone who is godly pray to You [for forgiveness] in a time when You [are near and] may be found;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely when the great waters [of trial and distressing times] overflow they will not reach [the spirit in] him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You are my hiding place; You, L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', protect me from trouble;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You surround me with songs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shouts of deliverance. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶I will instruct you and teach you in the way you should go;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will counsel you [who are willing to learn] with My eye upon you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Do not be like the horse or like the mule which have no understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose trappings include bridle and rein to hold them in check,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Otherwise
    - type: text
      text: ' they will not come near to you.'
