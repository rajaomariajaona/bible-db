type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy of Moab’s Devastation
  - type: text
    content: Send lambs to the ruler of the land [
  - type: note
    content: As King Mesha sent 100,000 lambs each year to King Ahab of Israel (2 Kin 3:4), so now the Moabites are advised to win the king’s favor and protection by diverting their tribute to the king in Jerusalem as an acknowledgment of subjection.
  - type: text
    content: you Moabites],
  - type: text
    content: From Sela [that is, Petra in Edom] through the wilderness to the mountain of the Daughter of Zion (Jerusalem). [2 Kin 3:4, 5]
  '10':
  - type: text
    content: Gladness and joy are taken away from the fruitful field;
  - type: text
    content: In the vineyards there will be no singing or joyful sound;
  - type: text
    content: No treader treads out wine in the presses,
  - type: text
    content: For I (God) put an end to the joyful shouting.
  '11':
  - type: text
    content: Therefore my heart sounds like a harp [in mournful compassion] for Moab,
  - type: text
    content: 'And my inner being '
  - type: text
    content: mourns
  - type: text
    content: ' for Kir-hareseth.'
  '12':
  - type: text
    content: So it will come to pass when Moab presents himself,
  - type: text
    content: When he wearies himself [worshiping] on his high place [of idolatry]
  - type: text
    content: And comes to his sanctuary [of Chemosh, god of Moab] to pray,
  - type: text
    content: That he will not prevail. [Jer 48:13]
  '13':
  - type: text
    content: This is the word which the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke earlier concerning Moab [when Moab’s pride and resistance to God were first known]. '
  '14':
  - type: text
    content: But now the L
  - type: heading
    content: ord
  - type: text
    content: ' speaks, saying, “Within '
  - type: note
    content: This prophecy was fulfilled after the death of King Ahaz of Judah (Is 14:28), about the third year of King Hezekiah’s reign. Moab was not left completely without population at this time; there was still a “remnant.” The final desolation of Moab was reserved for King Nebuchadnezzar of Babylon in 582 b.c., some five years after the taking of Jerusalem. The ruins of Elealeh, Heshbon, Medeba, Dimon, etc., still exist to confirm through modern research the accuracy of the fulfillment of this prophecy.
  - type: text
    content: 'three years, as the years of a hired man [who will not serve longer than the agreed time], the glory of Moab will be degraded along with all '
  - type: note
    content: Lit all the great number.
  - type: text
    content: the great population, and the remnant [that survives] will be very small and of no account.”
  '2':
  - type: text
    content: For like wandering birds or scattered nestlings,
  - type: text
    content: The daughters of Moab will be at the fords of the [river] Arnon.
  '3':
  - type: text
    content: '[Say to the ruler] “Give us advice, make a decision [for Moab, king of Judah];'
  - type: text
    content: Cast your shadow [over us] like night in the midst of noon;
  - type: text
    content: Hide the outcasts, do not betray the fugitive [to his pursuer].
  '4':
  - type: text
    content: “Let our outcasts of Moab live among you;
  - type: text
    content: Be a [sheltered] hiding place to them from the destroyer.”
  - type: text
    content: For the extortioner has come to an end, destruction has ceased,
  - type: text
    content: 'Oppressors [who trample men] have completely '
  - type: text
    content: disappeared
  - type: text
    content: ' from the land,'
  '5':
  - type: text
    content: A throne will be established in lovingkindness,
  - type: text
    content: And One will sit on it in faithfulness in the tent (dynasty, family) of David;
  - type: text
    content: 'Judging '
  - type: text
    content: and
  - type: text
    content: ' seeking justice'
  - type: text
    content: And being prompt to do righteousness. [Ps 96:13; Jer 48:47]
  '6':
  - type: text
    content: ¶We have heard of the pride of Moab, an excessive pride—
  - type: text
    content: Even of his arrogance, his conceit, his rage,
  - type: text
    content: His untruthful boasting.
  '7':
  - type: text
    content: Therefore Moab will wail for Moab; everyone will wail.
  - type: text
    content: You will mourn for the raisin cakes of Kir-hareseth,
  - type: text
    content: 'As those who are utterly stricken '
  - type: text
    content: and
  - type: text
    content: ' discouraged.'
  '8':
  - type: text
    content: 'For the fields of Heshbon have languished '
  - type: text
    content: and
  - type: text
    content: ' withered, and the vines of Sibmah '
  - type: text
    content: as well;
  - type: text
    content: The lords of the nations have trampled down [Moab’s] choice vine branches,
  - type: text
    content: Which reached as far as Jazer and wandered into the wilderness;
  - type: text
    content: Its tendrils stretched out, they passed over [the shores of] the [Dead] Sea.
  '9':
  - type: text
    content: Therefore I (Isaiah) will weep bitterly for Jazer, for the vines of Sibmah.
  - type: text
    content: I will drench you with my tears, O Heshbon and Elealeh;
  - type: text
    content: For the war-cry [of the enemy] has fallen on your summer fruits and your harvest.
