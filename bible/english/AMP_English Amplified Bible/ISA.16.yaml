document_id: ISA.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy of Moab’s Devastation
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Send lambs to the ruler of the land [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As King Mesha sent 100,000 lambs each year to King Ahab of Israel (2 Kin 3:4), so now the Moabites are advised to win the king’s favor and protection by diverting their tribute to the king in Jerusalem as an acknowledgment of subjection.
    marker-yv: yv-n
  - type: text
    text: you Moabites],
- type: usfm
  marker: q1
  children:
  - type: text
    text: From Sela [that is, Petra in Edom] through the wilderness to the mountain of the Daughter of Zion (Jerusalem). [2 Kin 3:4, 5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For like wandering birds or scattered nestlings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The daughters of Moab will be at the fords of the [river] Arnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '[Say to the ruler] “Give us advice, make a decision [for Moab, king of Judah];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cast your shadow [over us] like night in the midst of noon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hide the outcasts, do not betray the fugitive [to his pursuer].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Let our outcasts of Moab live among you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be a [sheltered] hiding place to them from the destroyer.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the extortioner has come to an end, destruction has ceased,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oppressors [who trample men] have completely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: disappeared
  - type: text
    text: ' from the land,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A throne will be established in lovingkindness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And One will sit on it in faithfulness in the tent (dynasty, family) of David;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Judging '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seeking justice'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And being prompt to do righteousness. [Ps 96:13; Jer 48:47]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶We have heard of the pride of Moab, an excessive pride—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even of his arrogance, his conceit, his rage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His untruthful boasting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore Moab will wail for Moab; everyone will wail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will mourn for the raisin cakes of Kir-hareseth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As those who are utterly stricken '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discouraged.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the fields of Heshbon have languished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' withered, and the vines of Sibmah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as well;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lords of the nations have trampled down [Moab’s] choice vine branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which reached as far as Jazer and wandered into the wilderness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its tendrils stretched out, they passed over [the shores of] the [Dead] Sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore I (Isaiah) will weep bitterly for Jazer, for the vines of Sibmah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will drench you with my tears, O Heshbon and Elealeh;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the war-cry [of the enemy] has fallen on your summer fruits and your harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Gladness and joy are taken away from the fruitful field;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the vineyards there will be no singing or joyful sound;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No treader treads out wine in the presses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I (God) put an end to the joyful shouting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore my heart sounds like a harp [in mournful compassion] for Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And my inner being '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mourns
  - type: text
    text: ' for Kir-hareseth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So it will come to pass when Moab presents himself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he wearies himself [worshiping] on his high place [of idolatry]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And comes to his sanctuary [of Chemosh, god of Moab] to pray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That he will not prevail. [Jer 48:13]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: This is the word which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke earlier concerning Moab [when Moab’s pride and resistance to God were first known]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' speaks, saying, “Within '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This prophecy was fulfilled after the death of King Ahaz of Judah (Is 14:28), about the third year of King Hezekiah’s reign. Moab was not left completely without population at this time; there was still a “remnant.” The final desolation of Moab was reserved for King Nebuchadnezzar of Babylon in 582 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: ., some five years after the taking of Jerusalem. The ruins of Elealeh, Heshbon, Medeba, Dimon, etc., still exist to confirm through modern research the accuracy of the fulfillment of this prophecy.
    marker-yv: yv-n
  - type: text
    text: 'three years, as the years of a hired man [who will not serve longer than the agreed time], the glory of Moab will be degraded along with all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: all the great number
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the great population, and the remnant [that survives] will be very small and of no account.”
