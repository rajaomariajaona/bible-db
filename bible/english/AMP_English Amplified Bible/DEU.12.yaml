document_id: DEU.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws of the Sanctuary
  - type: text
    content: “These are the statutes and judgments (precepts) which you shall be careful to do in the land which the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of your fathers, has given you to possess as long as you live on the earth. '
  '10':
  - type: text
    content: When you cross the Jordan and live in the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you to inherit, and He gives you rest from all your enemies around you so that you live in security, '
  '11':
  - type: text
    content: then it shall come about that the place which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will choose for His Name [and Presence] to dwell; there you shall bring everything that I am commanding you: your burnt offerings, your sacrifices, your tithes and the [voluntary] contribution of your hand [as a first gift from the fruits of the ground], and all your choice votive offerings which you vow to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '12':
  - type: text
    content: And you shall rejoice before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, you and your sons and your daughters, and your male and female servants, and the Levite who is within your [city] gates, since he has no portion or inheritance with you.'
  '13':
  - type: text
    content: '“Be careful that you do not offer your burnt offerings in every [cultic] place you see, '
  '14':
  - type: text
    content: but [only] in the place which the L
  - type: heading
    content: ord
  - type: text
    content: ' will choose in one of your tribes, there you shall offer your burnt offerings, and there you shall do everything that I am commanding you.'
  '15':
  - type: text
    content: “However, you may slaughter and eat meat within any of your [city] gates, whatever you wish, according to the blessing of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God which He has given you [as His generous provision for daily life]. The [ceremonially] unclean and the clean may eat it, such as the gazelle and the deer. '
  '16':
  - type: text
    content: 'Only you shall not eat the blood; you are to pour it out on the ground like water. '
  '17':
  - type: text
    content: 'You are forbidden to eat within your [city] gates the tithe of your grain or new wine or oil, or the firstborn of your herd or flock, or any of your votive offerings, or your freewill offerings, or the contribution of your hand. '
  '18':
  - type: text
    content: But you shall eat them before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in the place which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will choose, you and your son and your daughter, and your male and female servants, and the Levite who is within your [city] gates; and you shall rejoice before the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God in all '
  - type: note
    content: Lit the putting forth of your hand.
  - type: text
    content: 'that you undertake. '
  '19':
  - type: text
    content: 'Be careful that you do not neglect the Levite [who serves God] '
  - type: note
    content: Lit all your days on.
  - type: text
    content: as long as you live in your land.
  '2':
  - type: text
    content: 'You shall utterly destroy all the places where the nations whom you shall dispossess serve their gods, on the high mountains and the hills and under every green [leafy] tree. '
  '20':
  - type: text
    content: “When the L
  - type: heading
    content: ord
  - type: text
    content: ' your God extends your territory, as He promised you, and you say, ‘I will eat meat,’ because you want to eat meat, then you may eat meat, whatever '
  - type: note
    content: Lit your soul desires.
  - type: text
    content: 'you wish. '
  '21':
  - type: text
    content: If the place which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God chooses to put His Name (Presence) is too far away from you, then you may slaughter [animals] from your herd or flock which the L'
  - type: heading
    content: ord
  - type: text
    content: ' has given you, just as I have commanded you; and you may eat within your [city] gates whatever you wish. '
  '22':
  - type: text
    content: 'Just as the gazelle or the deer is eaten, so you may eat it [but not make it an offering]; the [ceremonially] unclean and the clean alike may eat it. '
  '23':
  - type: text
    content: 'Only be sure that you do not eat the blood, for the blood is the life (soul), and you shall not eat the life with the meat. '
  '24':
  - type: text
    content: 'You shall not eat it; you shall pour it out on the ground like water. '
  '25':
  - type: text
    content: You shall not eat it, so that all may be well with you and with your children after you, because you will be doing what is right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'However, you shall take your holy things which you have [to offer] and your votive (pledged, vowed) offerings, you shall take '
  - type: text
    content: them
  - type: text
    content: ' and go to the place which the L'
  - type: heading
    content: ord
  - type: text
    content: ' will choose. '
  '27':
  - type: text
    content: And you shall offer your burnt offerings, the meat and the blood, on the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; and the blood of your sacrifices shall be poured out on the altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, and you shall eat the meat.'
  '28':
  - type: text
    content: '“Be careful to listen to all these words which I am commanding you, so that it may be well with you and with your '
  - type: note
    content: Lit sons.
  - type: text
    content: children after you forever, because you will be doing what is good and right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '29':
  - type: text
    content: “When the L
  - type: heading
    content: ord
  - type: text
    content: ' your God cuts off '
  - type: text
    content: and
  - type: text
    content: ' destroys before you the nations which you are going in to dispossess, and you dispossess them and settle in their land, '
  '3':
  - type: text
    content: 'You shall tear down their altars and smash their [idolatrous] pillars and burn their '
  - type: note
    content: Wooden symbols of the goddess Asherah.
  - type: text
    content: 'Asherim in the fire; you shall cut down the carved '
  - type: text
    content: and
  - type: text
    content: ' sculpted images of their gods and obliterate their name from that place. '
  '30':
  - type: text
    content: 'beware that you are not lured (ensnared) into following them, after they have been destroyed before you, and that you do not inquire about their gods, saying, ‘How did these nations serve their gods, so that I too may do likewise?’ '
  '31':
  - type: text
    content: You shall not behave this way toward the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, for they have done for their gods every repulsive thing which the L'
  - type: heading
    content: ord
  - type: text
    content: ' hates; for they even burn their sons and their daughters in the fire [as sacrifices] to their gods.'
  '32':
  - type: text
    content: “Everything I command you, you shall be careful to do it; you shall not add to it nor take away from it.
  '4':
  - type: text
    content: You shall not act like this toward the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '5':
  - type: text
    content: 'But you shall seek '
  - type: text
    content: the L
  - type: heading
    content: ord
  - type: text
    content: ' at the place which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will choose out of all your tribes to establish His '
  - type: note
    content: The “Name” of God is equivalent to His gracious presence in passages such as this one. The place where God puts His Name is the place where He chooses to dwell.
  - type: text
    content: 'Name there for His dwelling [place], and there you shall come [to worship Him]. '
  '6':
  - type: text
    content: 'There you shall bring your burnt offerings, your sacrifices, your tithes, the contribution of your hand, your votive (pledged, vowed) offerings, your freewill (voluntary) offerings, and the firstborn of your herd and of your flock. '
  '7':
  - type: text
    content: And there you and your households shall eat before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and rejoice in all to which you put your hand, in which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has blessed you.'
  '8':
  - type: text
    content: '“You shall not do at all what we are doing here [in the camp] today, every man doing whatever is right in his [own] eyes. '
  '9':
  - type: text
    content: For you have not yet come to the resting place and to the inheritance which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you. '
