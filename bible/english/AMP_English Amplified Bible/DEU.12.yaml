document_id: DEU.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Laws of the Sanctuary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “These are the statutes and judgments (precepts) which you shall be careful to do in the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of your fathers, has given you to possess as long as you live on the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'You shall utterly destroy all the places where the nations whom you shall dispossess serve their gods, on the high mountains and the hills and under every green [leafy] tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You shall tear down their altars and smash their [idolatrous] pillars and burn their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Wooden symbols of the goddess Asherah.
    marker-yv: yv-n
  - type: text
    text: 'Asherim in the fire; you shall cut down the carved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sculpted images of their gods and obliterate their name from that place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You shall not act like this toward the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But you shall seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
  - type: text
    text: ' at the place which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will choose out of all your tribes to establish His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “Name” of God is equivalent to His gracious presence in passages such as this one. The place where God puts His Name is the place where He chooses to dwell.
    marker-yv: yv-n
  - type: text
    text: 'Name there for His dwelling [place], and there you shall come [to worship Him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'There you shall bring your burnt offerings, your sacrifices, your tithes, the contribution of your hand, your votive (pledged, vowed) offerings, your freewill (voluntary) offerings, and the firstborn of your herd and of your flock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And there you and your households shall eat before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and rejoice in all to which you put your hand, in which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has blessed you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“You shall not do at all what we are doing here [in the camp] today, every man doing whatever is right in his [own] eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For you have not yet come to the resting place and to the inheritance which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When you cross the Jordan and live in the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you to inherit, and He gives you rest from all your enemies around you so that you live in security, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: then it shall come about that the place which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will choose for His Name [and Presence] to dwell; there you shall bring everything that I am commanding you: your burnt offerings, your sacrifices, your tithes and the [voluntary] contribution of your hand [as a first gift from the fruits of the ground], and all your choice votive offerings which you vow to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And you shall rejoice before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, you and your sons and your daughters, and your male and female servants, and the Levite who is within your [city] gates, since he has no portion or inheritance with you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Be careful that you do not offer your burnt offerings in every [cultic] place you see, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: but [only] in the place which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will choose in one of your tribes, there you shall offer your burnt offerings, and there you shall do everything that I am commanding you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “However, you may slaughter and eat meat within any of your [city] gates, whatever you wish, according to the blessing of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God which He has given you [as His generous provision for daily life]. The [ceremonially] unclean and the clean may eat it, such as the gazelle and the deer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Only you shall not eat the blood; you are to pour it out on the ground like water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You are forbidden to eat within your [city] gates the tithe of your grain or new wine or oil, or the firstborn of your herd or flock, or any of your votive offerings, or your freewill offerings, or the contribution of your hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But you shall eat them before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in the place which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will choose, you and your son and your daughter, and your male and female servants, and the Levite who is within your [city] gates; and you shall rejoice before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the putting forth of your hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'that you undertake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Be careful that you do not neglect the Levite [who serves God] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: all your days on
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: as long as you live in your land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God extends your territory, as He promised you, and you say, ‘I will eat meat,’ because you want to eat meat, then you may eat meat, whatever '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your soul desires
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'you wish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If the place which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses to put His Name (Presence) is too far away from you, then you may slaughter [animals] from your herd or flock which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has given you, just as I have commanded you; and you may eat within your [city] gates whatever you wish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Just as the gazelle or the deer is eaten, so you may eat it [but not make it an offering]; the [ceremonially] unclean and the clean alike may eat it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Only be sure that you do not eat the blood, for the blood is the life (soul), and you shall not eat the life with the meat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You shall not eat it; you shall pour it out on the ground like water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You shall not eat it, so that all may be well with you and with your children after you, because you will be doing what is right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'However, you shall take your holy things which you have [to offer] and your votive (pledged, vowed) offerings, you shall take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' and go to the place which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will choose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And you shall offer your burnt offerings, the meat and the blood, on the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; and the blood of your sacrifices shall be poured out on the altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and you shall eat the meat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Be careful to listen to all these words which I am commanding you, so that it may be well with you and with your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: children after you forever, because you will be doing what is good and right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God cuts off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroys before you the nations which you are going in to dispossess, and you dispossess them and settle in their land, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'beware that you are not lured (ensnared) into following them, after they have been destroyed before you, and that you do not inquire about their gods, saying, ‘How did these nations serve their gods, so that I too may do likewise?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: You shall not behave this way toward the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, for they have done for their gods every repulsive thing which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' hates; for they even burn their sons and their daughters in the fire [as sacrifices] to their gods.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “Everything I command you, you shall be careful to do it; you shall not add to it nor take away from it.
