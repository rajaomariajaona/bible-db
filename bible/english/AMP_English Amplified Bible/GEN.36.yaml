document_id: GEN.36,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Esau Moves
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the descendants of Esau, (that is, Edom).'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of Esau’s sons: Eliphaz, the son of Adah, Esau’s wife, and Reuel, the son of Basemath, Esau’s wife. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Timna was a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 22:24.
      marker-yv: yv-n
    - type: text
      text: 'concubine of Eliphaz, Esau’s son; and she bore Amalek to Eliphaz. These are the sons of Adah, Esau’s wife. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These are the sons of Basemath, Esau’s wife. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these are the sons of Oholibamah, Esau’s wife, the daughter of Anah, the son of Zibeon. She bore to Esau: Jeush, Jalam, and Korah.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribal
    - type: text
      text: ' chiefs of the sons of Esau: The sons of Eliphaz, the firstborn of Esau: Chiefs Teman, Omar, Zepho, Kenaz, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Korah, Gatam, and Amalek. These are the chiefs of Eliphaz in the land of Edom; they are the sons of Adah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Reuel, Esau’s son: Chiefs Nahath, Zerah, Shammah, Mizzah. These are the chiefs of Reuel in the land of Edom; they are the sons of Basemath, Esau’s wife. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Oholibamah, Esau’s wife: Chiefs Jeush, Jalam, and Korah. These are the chiefs born of Oholibamah, daughter of Anah, Esau’s wife. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the sons of Esau, (that is, Edom), and these are their chiefs.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esau took his [three] wives from the daughters of Canaan: Adah the daughter of Elon the Hittite, and Oholibamah the daughter of Anah, the son of Zibeon the Hivite, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Seir the Horite, the inhabitants of the land: Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dishon, Ezer, and Dishan. These are the chiefs of the Horites, the sons of Seir in the land of Edom. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Lotan are Hori and Hemam; and Lotan’s sister is Timna. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Shobal are these: Alvan, Manahath, Ebal, Shepho, and Onam. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Zibeon: Aiah and Anah. This is the Anah who found the hot springs in the wilderness as he pastured the donkeys of Zibeon his father. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children of Anah are these: Dishon and Oholibamah [Esau’s wife], the daughter of Anah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the sons of Dishon: Hemdan, Eshban, Ithran, and Cheran. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezer’s sons are these: Bilhan, Zaavan, and Akan. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Dishan are these: Uz and Aran. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Horite chiefs are these: Chiefs Lotan, Shobal, Zibeon, Anah, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Basemath, Ishmael’s daughter, sister of Nebaioth. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dishon, Ezer, Dishan. These are the Horite chiefs, according to their various clans in the land of Seir.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these are the kings who reigned in the land of Edom before any king reigned over the Israelites: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bela the son of Beor reigned in Edom, and the name of his city was Dinhabah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Bela died, and Jobab the son of Zerah of Bozrah reigned as his successor. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jobab died, and Husham of the land of the Temanites reigned as his successor. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Husham died, and Hadad the son of Bedad, who defeated Midian in the country of Moab, reigned as his successor. The name of his [walled] city was Avith. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad died, and Samlah of Masrekah succeeded him. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samlah died, and Shaul of Rehoboth on the river [Euphrates] reigned as his successor. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shaul died, and Baal-hanan son of Achbor reigned as his successor. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baal-hanan the son of Achbor died, and then '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In 1 Chr 1:50, Hadad.
      marker-yv: yv-n
    - type: text
      text: 'Hadar reigned [as his successor]. His [walled] city was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In 1 Chr 1:50, Pai.
      marker-yv: yv-n
    - type: text
      text: Pau; his wife’s name was Mehetabel the daughter of Matred, the daughter of Mezahab.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adah bore Eliphaz to Esau, and Basemath bore Reuel, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these are the names of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribal
    - type: text
      text: ' chiefs of Esau, according to their families and places of residence, by their names: Chiefs Timna, Alvah, Jetheth, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oholibamah, Elah, Pinon, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kenaz, Teman, Mibzar, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Magdiel, and Iram. These are the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribal
    - type: text
      text: ' chiefs of Edom (that is, of Esau the father of the Edomites), according to their dwelling places in the land of their possession.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Oholibamah bore Jeush, Jalam, and Korah. These are the sons of Esau born to him in Canaan.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Esau took his wives and his sons and his daughters and all the members of his household, and his livestock and all his cattle and all his possessions which he had acquired in the land of Canaan, and he went to a land away from his brother Jacob. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For their [great flocks and herds and] possessions made it impossible for them to live together [in the same region]; the land in which they lived temporarily could not support them because of their livestock. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Esau lived in the hill country of Seir; Esau is Edom.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Esau
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the generations of Esau the father of the Edomites in the hill country of Seir. '
