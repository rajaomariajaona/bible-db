document_id: GEN.36,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Esau Moves
  - type: text
    content: 'Now these are '
  - type: text
    content: the records of
  - type: text
    content: ' the descendants of Esau, (that is, Edom).'
  '10':
  - type: text
    content: 'These are the names of Esau’s sons: Eliphaz, the son of Adah, Esau’s wife, and Reuel, the son of Basemath, Esau’s wife. '
  '11':
  - type: text
    content: 'And the sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz. '
  '12':
  - type: text
    content: 'And Timna was a '
  - type: note
    content: See note 22:24.
  - type: text
    content: 'concubine of Eliphaz, Esau’s son; and she bore Amalek to Eliphaz. These are the sons of Adah, Esau’s wife. '
  '13':
  - type: text
    content: 'These are the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These are the sons of Basemath, Esau’s wife. '
  '14':
  - type: text
    content: 'And these are the sons of Oholibamah, Esau’s wife, the daughter of Anah, the son of Zibeon. She bore to Esau: Jeush, Jalam, and Korah.'
  '15':
  - type: text
    content: 'These are the '
  - type: text
    content: tribal
  - type: text
    content: ' chiefs of the sons of Esau: The sons of Eliphaz, the firstborn of Esau: Chiefs Teman, Omar, Zepho, Kenaz, '
  '16':
  - type: text
    content: 'Korah, Gatam, and Amalek. These are the chiefs of Eliphaz in the land of Edom; they are the sons of Adah. '
  '17':
  - type: text
    content: 'These are the sons of Reuel, Esau’s son: Chiefs Nahath, Zerah, Shammah, Mizzah. These are the chiefs of Reuel in the land of Edom; they are the sons of Basemath, Esau’s wife. '
  '18':
  - type: text
    content: 'These are the sons of Oholibamah, Esau’s wife: Chiefs Jeush, Jalam, and Korah. These are the chiefs born of Oholibamah, daughter of Anah, Esau’s wife. '
  '19':
  - type: text
    content: These are the sons of Esau, (that is, Edom), and these are their chiefs.
  '2':
  - type: text
    content: 'Esau took his [three] wives from the daughters of Canaan: Adah the daughter of Elon the Hittite, and Oholibamah the daughter of Anah, the son of Zibeon the Hivite, '
  '20':
  - type: text
    content: 'These are the sons of Seir the Horite, the inhabitants of the land: Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: text
    content: 'Dishon, Ezer, and Dishan. These are the chiefs of the Horites, the sons of Seir in the land of Edom. '
  '22':
  - type: text
    content: 'The sons of Lotan are Hori and Hemam; and Lotan’s sister is Timna. '
  '23':
  - type: text
    content: 'The sons of Shobal are these: Alvan, Manahath, Ebal, Shepho, and Onam. '
  '24':
  - type: text
    content: 'These are the sons of Zibeon: Aiah and Anah. This is the Anah who found the hot springs in the wilderness as he pastured the donkeys of Zibeon his father. '
  '25':
  - type: text
    content: 'The children of Anah are these: Dishon and Oholibamah [Esau’s wife], the daughter of Anah. '
  '26':
  - type: text
    content: 'These are the sons of Dishon: Hemdan, Eshban, Ithran, and Cheran. '
  '27':
  - type: text
    content: 'Ezer’s sons are these: Bilhan, Zaavan, and Akan. '
  '28':
  - type: text
    content: 'The sons of Dishan are these: Uz and Aran. '
  '29':
  - type: text
    content: 'The Horite chiefs are these: Chiefs Lotan, Shobal, Zibeon, Anah, '
  '3':
  - type: text
    content: 'and Basemath, Ishmael’s daughter, sister of Nebaioth. '
  '30':
  - type: text
    content: Dishon, Ezer, Dishan. These are the Horite chiefs, according to their various clans in the land of Seir.
  '31':
  - type: text
    content: 'And these are the kings who reigned in the land of Edom before any king reigned over the Israelites: '
  '32':
  - type: text
    content: 'Bela the son of Beor reigned in Edom, and the name of his city was Dinhabah. '
  '33':
  - type: text
    content: 'Now Bela died, and Jobab the son of Zerah of Bozrah reigned as his successor. '
  '34':
  - type: text
    content: 'Then Jobab died, and Husham of the land of the Temanites reigned as his successor. '
  '35':
  - type: text
    content: 'And Husham died, and Hadad the son of Bedad, who defeated Midian in the country of Moab, reigned as his successor. The name of his [walled] city was Avith. '
  '36':
  - type: text
    content: 'Hadad died, and Samlah of Masrekah succeeded him. '
  '37':
  - type: text
    content: 'Then Samlah died, and Shaul of Rehoboth on the river [Euphrates] reigned as his successor. '
  '38':
  - type: text
    content: 'And Shaul died, and Baal-hanan son of Achbor reigned as his successor. '
  '39':
  - type: text
    content: 'Baal-hanan the son of Achbor died, and then '
  - type: note
    content: In 1 Chr 1:50, Hadad.
  - type: text
    content: 'Hadar reigned [as his successor]. His [walled] city was '
  - type: note
    content: In 1 Chr 1:50, Pai.
  - type: text
    content: Pau; his wife’s name was Mehetabel the daughter of Matred, the daughter of Mezahab.
  '4':
  - type: text
    content: 'Adah bore Eliphaz to Esau, and Basemath bore Reuel, '
  '40':
  - type: text
    content: 'And these are the names of the '
  - type: text
    content: tribal
  - type: text
    content: ' chiefs of Esau, according to their families and places of residence, by their names: Chiefs Timna, Alvah, Jetheth, '
  '41':
  - type: text
    content: 'Oholibamah, Elah, Pinon, '
  '42':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '43':
  - type: text
    content: 'Magdiel, and Iram. These are the '
  - type: text
    content: tribal
  - type: text
    content: ' chiefs of Edom (that is, of Esau the father of the Edomites), according to their dwelling places in the land of their possession.'
  '5':
  - type: text
    content: and Oholibamah bore Jeush, Jalam, and Korah. These are the sons of Esau born to him in Canaan.
  '6':
  - type: text
    content: 'Now Esau took his wives and his sons and his daughters and all the members of his household, and his livestock and all his cattle and all his possessions which he had acquired in the land of Canaan, and he went to a land away from his brother Jacob. '
  '7':
  - type: text
    content: 'For their [great flocks and herds and] possessions made it impossible for them to live together [in the same region]; the land in which they lived temporarily could not support them because of their livestock. '
  '8':
  - type: text
    content: So Esau lived in the hill country of Seir; Esau is Edom.
  - type: heading
    content: Descendants of Esau
  '9':
  - type: text
    content: 'These are '
  - type: text
    content: the records of
  - type: text
    content: ' the generations of Esau the father of the Edomites in the hill country of Seir. '
