document_id: JOB.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Speaks of the Finality of Death
  - type: text
    content: “Man, who is born of a woman,
  - type: text
    content: Is short-lived and full of turmoil.
  '10':
  - type: text
    content: “But [the brave, strong] man must die and lie face down;
  - type: text
    content: Man breathes his last, and where is he?
  '11':
  - type: text
    content: “As water evaporates from the sea,
  - type: text
    content: And a river drains and dries up,
  '12':
  - type: text
    content: So man lies down and does not rise [again].
  - type: text
    content: Until the heavens are no longer,
  - type: text
    content: The dead
  - type: text
    content: ' will not awake nor be raised from their sleep.'
  '13':
  - type: text
    content: ¶“Oh, that You would hide me in Sheol (the nether world, the place of the dead),
  - type: text
    content: That You would conceal me until Your wrath is past,
  - type: text
    content: That You would set a definite time and then remember me [and in Your lovingkindness imprint me on your heart]!
  '14':
  - type: text
    content: “If a man dies, will he live again?
  - type: text
    content: I will wait all the days of my struggle
  - type: text
    content: 'Until my change '
  - type: text
    content: and
  - type: text
    content: ' release will come. [John 5:25; 6:40; 1 Thess 4:16]'
  '15':
  - type: text
    content: “[Then] You will call, and I will answer You;
  - type: text
    content: You will long for [me] the work of Your hands.
  '16':
  - type: text
    content: “But now You number [each of] my steps;
  - type: text
    content: 'You do not observe '
  - type: text
    content: nor
  - type: text
    content: ' take note of my sin.'
  '17':
  - type: text
    content: “My transgression is sealed up in a bag,
  - type: text
    content: And You cover my wickedness [from Your view].
  '18':
  - type: text
    content: ¶“But as a mountain, if it falls, crumbles into nothing,
  - type: text
    content: And as the rock is moved from its place,
  '19':
  - type: text
    content: Water wears away the stones,
  - type: text
    content: 'Its floods '
  - type: text
    content: and
  - type: text
    content: ' torrents wash away the soil of the earth,'
  - type: text
    content: So You [O Lord] destroy the hope of man.
  '2':
  - type: text
    content: “Like a flower he comes forth and withers;
  - type: text
    content: He also flees like a shadow and does not remain.
  '20':
  - type: text
    content: '“You prevail forever against him '
  - type: text
    content: and
  - type: text
    content: ' overpower him, and he passes on;'
  - type: text
    content: You change his appearance and send him away [from the presence of the living].
  '21':
  - type: text
    content: “His sons achieve honor, and he does not know it;
  - type: text
    content: They become insignificant, and he is not aware of it.
  '22':
  - type: text
    content: “But his body [lamenting its decay] grieves in pain over it,
  - type: text
    content: And his soul mourns over [the loss of] himself.”
  '3':
  - type: text
    content: “You also open Your eyes upon him
  - type: text
    content: And bring him into judgment with Yourself.
  '4':
  - type: text
    content: “Who can make a clean thing out of the unclean?
  - type: text
    content: No one! [Is 1:18; 1 John 1:7]
  '5':
  - type: text
    content: “Since his days are determined,
  - type: text
    content: The number of his months is with You [in Your control],
  - type: text
    content: And You have made his limits so he cannot pass [his allotted time].
  '6':
  - type: text
    content: “[O God] turn your gaze from him so that he may rest,
  - type: text
    content: Until he fulfills his day [on earth] like a hired man.
  '7':
  - type: text
    content: ¶“For there is hope for a tree,
  - type: text
    content: If it is cut down, that it will sprout again,
  - type: text
    content: 'And that the shoots of it will not cease '
  - type: text
    content: nor
  - type: text
    content: ' fail, [but there is no such hope for man].'
  '8':
  - type: text
    content: “Though its roots grow old in the earth
  - type: text
    content: And its stump dies in the dry soil,
  '9':
  - type: text
    content: Yet at the scent of water [the stump of the tree] will flourish
  - type: text
    content: 'And bring forth sprigs '
  - type: text
    content: and
  - type: text
    content: ' shoots like a seedling.'
