document_id: JOB.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Speaks of the Finality of Death
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Man, who is born of a woman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is short-lived and full of turmoil.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But [the brave, strong] man must die and lie face down;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Man breathes his last, and where is he?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As water evaporates from the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a river drains and dries up,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So man lies down and does not rise [again].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the heavens are no longer,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The dead
    - type: text
      text: ' will not awake nor be raised from their sleep.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Oh, that You would hide me in Sheol (the nether world, the place of the dead),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That You would conceal me until Your wrath is past,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That You would set a definite time and then remember me [and in Your lovingkindness imprint me on your heart]!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If a man dies, will he live again?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will wait all the days of my struggle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Until my change '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' release will come. [John 5:25; 6:40; 1 Thess 4:16]'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “[Then] You will call, and I will answer You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will long for [me] the work of Your hands.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But now You number [each of] my steps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You do not observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' take note of my sin.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My transgression is sealed up in a bag,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You cover my wickedness [from Your view].
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“But as a mountain, if it falls, crumbles into nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as the rock is moved from its place,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Water wears away the stones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Its floods '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torrents wash away the soil of the earth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So You [O Lord] destroy the hope of man.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Like a flower he comes forth and withers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He also flees like a shadow and does not remain.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You prevail forever against him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overpower him, and he passes on;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You change his appearance and send him away [from the presence of the living].
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His sons achieve honor, and he does not know it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They become insignificant, and he is not aware of it.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But his body [lamenting its decay] grieves in pain over it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his soul mourns over [the loss of] himself.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You also open Your eyes upon him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And bring him into judgment with Yourself.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who can make a clean thing out of the unclean?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one! [Is 1:18; 1 John 1:7]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Since his days are determined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The number of his months is with You [in Your control],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You have made his limits so he cannot pass [his allotted time].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “[O God] turn your gaze from him so that he may rest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until he fulfills his day [on earth] like a hired man.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“For there is hope for a tree,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If it is cut down, that it will sprout again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And that the shoots of it will not cease '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' fail, [but there is no such hope for man].'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though its roots grow old in the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its stump dies in the dry soil,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet at the scent of water [the stump of the tree] will flourish
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And bring forth sprigs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shoots like a seedling.'
