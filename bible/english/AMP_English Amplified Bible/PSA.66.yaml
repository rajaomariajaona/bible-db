document_id: PSA.66
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 66
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Praise for God’s Mighty Deeds and for His Answer to Prayer.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Song. A Psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Shout joyfully to God, all the earth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sing of the honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnificence of His name;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make His praise glorious.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Say to God, “How awesome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fearfully glorious are Your works!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the greatness of Your power Your enemies will pretend to be obedient to You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “All the earth will [bow down to] worship You [in submissive wonder],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will sing praises to You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will praise Your name in song.” '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Come and see the works of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is awesome in His deeds toward the children of men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He turned the sea into dry land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They crossed through the river on foot;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There we rejoiced in Him. [Ex 14-15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who rules by His might forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His eyes keep watch on the nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not let the rebellious exalt themselves. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶Bless our God, O peoples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And make the sound of His praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be heard
  - type: text
    text: ' abroad,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who keeps us among the living,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And does not allow our feet to slip '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' stumble.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For You have tested us, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have refined us as silver is refined.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You brought us into the net;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You laid a heavy burden [of servitude] on '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: upon our loins
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You made men (charioteers) '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis understood this as times of captivity for Israel.
    marker-yv: yv-n
  - type: text
    text: ride over our heads [in defeat];
- type: usfm
  marker: q1
  children:
  - type: text
    text: We went through fire and through water,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet You brought us out into a [broad] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: place of
  - type: text
    text: ' abundance [to be refreshed].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I shall come into Your house with burnt offerings;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall pay You my vows,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Which my lips uttered
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my mouth spoke as a promise when I was in distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I shall offer to You burnt offerings of fat lambs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the [sweet] smoke of rams;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will offer bulls with male goats. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶Come and hear, all who fear God [and worship Him with awe-inspired reverence and obedience],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will tell what He has done for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I cried aloud to Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was highly praised with my tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If I regard sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' baseness in my heart [that is, if I know it is there and do nothing about it],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord will not hear [me]; [Prov 15:29; 28:9; Is 1:15; John 9:31; James 4:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But certainly God has heard [me];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has given heed to the voice of my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Blessed be God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has not turned away my prayer
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor His lovingkindness from me.
