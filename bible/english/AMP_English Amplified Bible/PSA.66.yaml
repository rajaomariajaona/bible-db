  '1':
  - type: heading
    content: Psalm 66
  - type: heading
    content: Praise for God’s Mighty Deeds and for His Answer to Prayer.
  - type: text
    content: To the Chief Musician. A Song. A Psalm.
  - type: text
    content: Shout joyfully to God, all the earth;
  '10':
  - type: text
    content: For You have tested us, O God;
  - type: text
    content: You have refined us as silver is refined.
  '11':
  - type: text
    content: You brought us into the net;
  - type: text
    content: 'You laid a heavy burden [of servitude] on '
  - type: note
    content: Lit upon our loins.
  - type: text
    content: us.
  '12':
  - type: text
    content: 'You made men (charioteers) '
  - type: note
    content: The ancient rabbis understood this as times of captivity for Israel.
  - type: text
    content: ride over our heads [in defeat];
  - type: text
    content: We went through fire and through water,
  - type: text
    content: 'Yet You brought us out into a [broad] '
  - type: text
    content: place of
  - type: text
    content: ' abundance [to be refreshed].'
  '13':
  - type: text
    content: I shall come into Your house with burnt offerings;
  - type: text
    content: I shall pay You my vows,
  '14':
  - type: text
    content: Which my lips uttered
  - type: text
    content: And my mouth spoke as a promise when I was in distress.
  '15':
  - type: text
    content: I shall offer to You burnt offerings of fat lambs,
  - type: text
    content: With the [sweet] smoke of rams;
  - type: text
    content: 'I will offer bulls with male goats. '
  - type: text
    content: Selah.
  '16':
  - type: text
    content: ¶Come and hear, all who fear God [and worship Him with awe-inspired reverence and obedience],
  - type: text
    content: And I will tell what He has done for me.
  '17':
  - type: text
    content: I cried aloud to Him;
  - type: text
    content: He was highly praised with my tongue.
  '18':
  - type: text
    content: 'If I regard sin '
  - type: text
    content: and
  - type: text
    content: ' baseness in my heart [that is, if I know it is there and do nothing about it],'
  - type: text
    content: The Lord will not hear [me]; [Prov 15:29; 28:9; Is 1:15; John 9:31; James 4:3]
  '19':
  - type: text
    content: But certainly God has heard [me];
  - type: text
    content: He has given heed to the voice of my prayer.
  '2':
  - type: text
    content: 'Sing of the honor '
  - type: text
    content: and
  - type: text
    content: ' glory '
  - type: text
    content: and
  - type: text
    content: ' magnificence of His name;'
  - type: text
    content: Make His praise glorious.
  '20':
  - type: text
    content: Blessed be God,
  - type: text
    content: Who has not turned away my prayer
  - type: text
    content: Nor His lovingkindness from me.
  '3':
  - type: text
    content: 'Say to God, “How awesome '
  - type: text
    content: and
  - type: text
    content: ' fearfully glorious are Your works!'
  - type: text
    content: Because of the greatness of Your power Your enemies will pretend to be obedient to You.
  '4':
  - type: text
    content: “All the earth will [bow down to] worship You [in submissive wonder],
  - type: text
    content: And will sing praises to You;
  - type: text
    content: 'They will praise Your name in song.” '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: ¶Come and see the works of God,
  - type: text
    content: He is awesome in His deeds toward the children of men.
  '6':
  - type: text
    content: He turned the sea into dry land;
  - type: text
    content: They crossed through the river on foot;
  - type: text
    content: There we rejoiced in Him. [Ex 14-15]
  '7':
  - type: text
    content: Who rules by His might forever,
  - type: text
    content: His eyes keep watch on the nations;
  - type: text
    content: 'Do not let the rebellious exalt themselves. '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: ¶Bless our God, O peoples,
  - type: text
    content: 'And make the sound of His praise '
  - type: text
    content: be heard
  - type: text
    content: ' abroad,'
  '9':
  - type: text
    content: Who keeps us among the living,
  - type: text
    content: 'And does not allow our feet to slip '
  - type: text
    content: or
  - type: text
    content: ' stumble.'
