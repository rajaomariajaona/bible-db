document_id: DEU.29,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant in Moab
  - type: text
    content: These are the words of the covenant which the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses to make with the sons of Israel in the land of Moab, in addition to the covenant which He made with them at Horeb (Sinai).'
  '10':
  - type: text
    content: “All of you stand today before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God—your chiefs, your tribes, your elders and your officers, '
  - type: text
    content: even
  - type: text
    content: ' all the men of Israel, '
  '11':
  - type: text
    content: 'your little ones, your wives, and the stranger (resident alien, foreigner) who is in your camps, from '
  - type: note
    content: This probably refers to a permanent slave population (Josh 9:27).
  - type: text
    content: 'the one who chops '
  - type: text
    content: and
  - type: text
    content: ' gathers your firewood to the one who draws your water— '
  '12':
  - type: text
    content: so that you may enter into the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, and into His oath '
  - type: text
    content: and
  - type: text
    content: ' agreement which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God is making with you today, '
  '13':
  - type: text
    content: so that He may establish you today as His people and that He may be your God, just as He spoke to you and as He swore to your fathers, to Abraham, Isaac, and Jacob.
  '14':
  - type: text
    content: '“It is not with you alone that I am making this covenant and this oath, '
  '15':
  - type: text
    content: but with those [future Israelites] who are not here with us today, as well as with those who stand here with us today in the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God '
  '16':
  - type: text
    content: '(for you know how we lived in the land of Egypt, and how we passed through the nations along the way; '
  '17':
  - type: text
    content: 'and you have seen their detestable acts and their [repulsive] idols of wood and stone, [lifeless images] of silver and gold, which '
  - type: text
    content: they had
  - type: text
    content: ' with them), '
  '18':
  - type: text
    content: so that there will not be among you a man or woman, or family or tribe, whose heart turns away today from the L
  - type: heading
    content: ord
  - type: text
    content: ' our God, to go and serve the [false] gods of these nations; so that there will not be among you a root [of idolatry] bearing poisonous fruit and wormwood (bitterness). '
  '19':
  - type: text
    content: 'It will happen that when he (a renegade) hears the words of this oath, and he '
  - type: note
    content: Lit blesses himself in his heart. That is, the renegade imagines that the agreement is one-sided, requiring God to bless him no matter what he does.
  - type: text
    content: 'imagines himself as blessed, saying, ‘I will have peace '
  - type: text
    content: and
  - type: text
    content: ' safety even though I walk within the stubbornness of my heart [rejecting God and His law], in order that the watered '
  - type: text
    content: land
  - type: text
    content: ' dwindles away along with the dry [destroying everything],’ '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ch 29:1 in Hebrew.
  - type: text
    content: Moses summoned all Israel and said to them, “You have seen all that the L
  - type: heading
    content: ord
  - type: text
    content: ' did before your eyes in the land of Egypt to Pharaoh, to all his servants, and to all his land; '
  '20':
  - type: text
    content: the L
  - type: heading
    content: ord
  - type: text
    content: ' will not be willing to forgive him, but then the anger of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and His '
  - type: note
    content: I.e. intolerance of unfaithfulness.
  - type: text
    content: jealousy will burn against that man, and every curse which is written in this book will rest on him; the L
  - type: heading
    content: ord
  - type: text
    content: ' will blot out his name from under heaven. '
  '21':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' will single him out for disaster from all the tribes of Israel [making an example of him], according to all the curses of the covenant that are written in this Book of the Law.'
  '22':
  - type: text
    content: Now the next generation, your children who come after you and the foreigner who comes from a distant land, when they see the plagues of this land and the diseases with which the L
  - type: heading
    content: ord
  - type: text
    content: ' has afflicted it, will say, '
  '23':
  - type: text
    content: ‘The whole land is brimstone and salt, a burning waste, unsown and unproductive, and no grass grows in it; it is like the overthrow of Sodom and Gomorrah, Admah and Zeboiim, which the L
  - type: heading
    content: ord
  - type: text
    content: ' overthrew in His anger and wrath.’ '
  '24':
  - type: text
    content: All the nations will say, ‘Why has the L
  - type: heading
    content: ord
  - type: text
    content: ' done this thing to this land? Why this great outburst of anger?’ '
  '25':
  - type: text
    content: 'Then '
  - type: text
    content: people
  - type: text
    content: ' will say, ‘It is because they abandoned (broke) the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers, which He made with them when He brought them out of the land of Egypt. '
  '26':
  - type: text
    content: 'For they went and served other gods and worshiped them, [false] gods whom they have not known and whom He had not allotted (given) to them. '
  '27':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' burned against this land, bringing on it every curse that is written in this book; '
  '28':
  - type: text
    content: and the L
  - type: heading
    content: ord
  - type: text
    content: ' uprooted them from their land in anger and in wrath and in great indignation, and cast them into another land, as it is this day.’'
  '29':
  - type: text
    content: “The secret things belong to the L
  - type: heading
    content: ord
  - type: text
    content: ' our God, but the things which are revealed '
  - type: text
    content: and
  - type: text
    content: ' disclosed belong to us and to our children forever, so that we may do all of the words of this law.'
  '3':
  - type: text
    content: 'the great trials [of Pharaoh] which your eyes have seen, the signs and those great wonders. '
  '4':
  - type: text
    content: Yet to this day the L
  - type: heading
    content: ord
  - type: text
    content: ' has not given you a heart '
  - type: text
    content: and
  - type: text
    content: ' mind to understand, nor eyes to see, nor ears to hear. '
  '5':
  - type: text
    content: 'I have led you in the wilderness forty years; your clothes have not worn out on you, and your sandals have not worn out on your feet. '
  '6':
  - type: text
    content: You have not eaten bread, nor have you drunk wine or strong drink, so that you might know that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God [on whom you must depend]. '
  '7':
  - type: text
    content: 'When you reached this place, Sihon the king of Heshbon and Og the king of Bashan came out to meet us in battle, but we defeated them; '
  '8':
  - type: text
    content: 'and we took their land and gave it as an inheritance to the tribe of Reuben, the tribe of Gad, and the half-tribe of Manasseh. '
  '9':
  - type: text
    content: 'So keep the words of this covenant and obey them, so that you may prosper '
  - type: text
    content: and
  - type: text
    content: ' be successful in everything that you do.'
