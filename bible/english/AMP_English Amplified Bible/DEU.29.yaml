document_id: DEU.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Covenant in Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: These are the words of the covenant which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses to make with the sons of Israel in the land of Moab, in addition to the covenant which He made with them at Horeb (Sinai).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 29:1 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: Moses summoned all Israel and said to them, “You have seen all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' did before your eyes in the land of Egypt to Pharaoh, to all his servants, and to all his land; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the great trials [of Pharaoh] which your eyes have seen, the signs and those great wonders. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Yet to this day the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has not given you a heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind to understand, nor eyes to see, nor ears to hear. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I have led you in the wilderness forty years; your clothes have not worn out on you, and your sandals have not worn out on your feet. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You have not eaten bread, nor have you drunk wine or strong drink, so that you might know that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God [on whom you must depend]. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When you reached this place, Sihon the king of Heshbon and Og the king of Bashan came out to meet us in battle, but we defeated them; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and we took their land and gave it as an inheritance to the tribe of Reuben, the tribe of Gad, and the half-tribe of Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So keep the words of this covenant and obey them, so that you may prosper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be successful in everything that you do.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “All of you stand today before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God—your chiefs, your tribes, your elders and your officers, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' all the men of Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'your little ones, your wives, and the stranger (resident alien, foreigner) who is in your camps, from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This probably refers to a permanent slave population (Josh 9:27).
    marker-yv: yv-n
  - type: text
    text: 'the one who chops '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gathers your firewood to the one who draws your water— '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: so that you may enter into the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and into His oath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agreement which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is making with you today, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: so that He may establish you today as His people and that He may be your God, just as He spoke to you and as He swore to your fathers, to Abraham, Isaac, and Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“It is not with you alone that I am making this covenant and this oath, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: but with those [future Israelites] who are not here with us today, as well as with those who stand here with us today in the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(for you know how we lived in the land of Egypt, and how we passed through the nations along the way; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and you have seen their detestable acts and their [repulsive] idols of wood and stone, [lifeless images] of silver and gold, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they had
  - type: text
    text: ' with them), '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: so that there will not be among you a man or woman, or family or tribe, whose heart turns away today from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, to go and serve the [false] gods of these nations; so that there will not be among you a root [of idolatry] bearing poisonous fruit and wormwood (bitterness). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'It will happen that when he (a renegade) hears the words of this oath, and he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: blesses himself in his heart
      - type: text
        text: . That is, the renegade imagines that the agreement is one-sided, requiring God to bless him no matter what he does.
    marker-yv: yv-n
  - type: text
    text: 'imagines himself as blessed, saying, ‘I will have peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' safety even though I walk within the stubbornness of my heart [rejecting God and His law], in order that the watered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: land
  - type: text
    text: ' dwindles away along with the dry [destroying everything],’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will not be willing to forgive him, but then the anger of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. intolerance of unfaithfulness.
    marker-yv: yv-n
  - type: text
    text: jealousy will burn against that man, and every curse which is written in this book will rest on him; the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will blot out his name from under heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will single him out for disaster from all the tribes of Israel [making an example of him], according to all the curses of the covenant that are written in this Book of the Law.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now the next generation, your children who come after you and the foreigner who comes from a distant land, when they see the plagues of this land and the diseases with which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has afflicted it, will say, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ‘The whole land is brimstone and salt, a burning waste, unsown and unproductive, and no grass grows in it; it is like the overthrow of Sodom and Gomorrah, Admah and Zeboiim, which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' overthrew in His anger and wrath.’ '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: All the nations will say, ‘Why has the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' done this thing to this land? Why this great outburst of anger?’ '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' will say, ‘It is because they abandoned (broke) the covenant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of their fathers, which He made with them when He brought them out of the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For they went and served other gods and worshiped them, [false] gods whom they have not known and whom He had not allotted (given) to them. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' burned against this land, bringing on it every curse that is written in this book; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' uprooted them from their land in anger and in wrath and in great indignation, and cast them into another land, as it is this day.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “The secret things belong to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, but the things which are revealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disclosed belong to us and to our children forever, so that we may do all of the words of this law.'
