document_id: 1CH.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Covenant with David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: As David sat in his house (palace), he said to Nathan the prophet, “Behold, I live in a house of cedars, while the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is under tent curtains.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'since the time that I commanded judges to be over My people Israel. And I will humble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' subdue all your enemies.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: F
    - type: text
      text: urthermore, I tell you that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will build you a house (a blessed posterity). '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And it shall come to pass that when your days are completed and you must go to be with your fathers [in death], I will raise up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one of
    - type: text
      text: ' your descendants after you, one of your own sons; and I will establish his kingdom. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He shall build Me a house, and I will establish his throne forever. [1 Chr 28:7] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I will be his father and he shall be My son; and I will not take My steadfast love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy away from him, as I took it from him (King Saul) who was before you. [Heb 1:5, 6] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But I will settle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At this point the prophecy looks ahead from Solomon to the Messiah (Christ), whose reign will be forever; yet the reference to Solomon is not lost, and the Messiah’s reign in a sense will be the fulfillment of Solomon’s as described here.
      marker-yv: yv-n
    - type: text
      text: 'him in My house and in My kingdom forever, and his throne shall be established forevermore.” ’ ” [Is 9:7] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: According to all these words and according to all this vision, so Nathan spoke to David.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Prayer in Response
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then David the king went in and sat before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and said, “Who am I, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God, and what is my house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' family that You have brought me this far? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'This was a small thing in Your eyes, O God; but You have spoken of Your servant’s house for a great while to come, and have regarded me according to the standard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' estate of a man of high degree (prominence), O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'What more can David say to You for the honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: granted to
    - type: text
      text: ' Your servant? For You know Your servant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for Your servant’s sake, and in accordance with Your own heart, You have accomplished all this greatness, to make known all these great things. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then Nathan said to David, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may have been advice expressed by Nathan rather than a prophecy; in v 4 it becomes clear that God did not tell Nathan to say this.
      marker-yv: yv-n
    - type: text
      text: Do all that is in your heart, for God is with you.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', there is no one like You, nor is there any God except You, according to all that we have heard with our ears. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And what one nation on the earth is like Your people Israel, whom God went to redeem for Himself as a people, to make a name for Yourself by great and awesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrible things, by driving out nations from before Your people, whom You redeemed out of Egypt? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: You made Your people Israel Your own people forever, and You, L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', became their God.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Therefore now, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', let the word which You have spoken concerning Your servant and his house endure forever, and do as You have said. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Let Your name [and the character that it denotes] endure and be magnified forever, saying, ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is the God of Israel, yes, a God to Israel; and the house of Your servant David is established before You.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For You, O my God, have revealed to Your servant that You will build for him a house (descendants); therefore Your servant has found '
    - type: usfm
      marker: it
      children:
      - type: text
        text: courage
    - type: text
      text: ' to pray before You. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: And now, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You are God, and you have spoken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promised this good thing to Your servant. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Therefore may it please You to bless the house (descendants) of Your servant, that it may continue before You forever; for what You bless, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', is blessed forever.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But it came about that same night that the word of God came to Nathan, saying, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Go and tell David My servant, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “You shall not build a house for Me to dwell in; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'for I have not dwelt in a house since the day that I brought Israel up [from Egypt] until this day, but I have gone from tent to tent and from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' dwelling place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to another
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Wherever I have walked with all Israel, did I say a word to any of the judges of Israel, whom I commanded to shepherd My people, saying, ‘Why have you not built for Me a house of cedar?’ ” ’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now, therefore, this is what you shall say to My servant David: ‘Thus says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “I took you from the pasture, from following the sheep, to be leader over My people Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I have been with you wherever you have gone, and I have cut off all your enemies from before you; and I will make your name like the name of the great ones of the earth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will appoint a place for My people Israel, and will plant them, so that they may live in their own place and not be moved again [nor tremble with fear]; and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of wickedness.
      marker-yv: yv-n
    - type: text
      text: 'wicked will not waste (persecute) them anymore, as formerly, '
