  - type: heading
    content: God’s Covenant with David
  - type: text
    content: As David sat in his house (palace), he said to Nathan the prophet, “Behold, I live in a house of cedars, while the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' is under tent curtains.” '
  '10':
  - type: text
    content: 'since the time that I commanded judges to be over My people Israel. And I will humble '
  - type: text
    content: and
  - type: text
    content: ' subdue all your enemies.'
  - type: text
    content: “
  - type: text
    content: F
  - type: text
    content: urthermore, I tell you that the L
  - type: heading
    content: ord
  - type: text
    content: ' will build you a house (a blessed posterity). '
  '11':
  - type: text
    content: 'And it shall come to pass that when your days are completed and you must go to be with your fathers [in death], I will raise up '
  - type: text
    content: one of
  - type: text
    content: ' your descendants after you, one of your own sons; and I will establish his kingdom. '
  '12':
  - type: text
    content: 'He shall build Me a house, and I will establish his throne forever. [1 Chr 28:7] '
  '13':
  - type: text
    content: 'I will be his father and he shall be My son; and I will not take My steadfast love '
  - type: text
    content: and
  - type: text
    content: ' mercy away from him, as I took it from him (King Saul) who was before you. [Heb 1:5, 6] '
  '14':
  - type: text
    content: 'But I will settle '
  - type: note
    content: At this point the prophecy looks ahead from Solomon to the Messiah (Christ), whose reign will be forever; yet the reference to Solomon is not lost, and the Messiah’s reign in a sense will be the fulfillment of Solomon’s as described here.
  - type: text
    content: 'him in My house and in My kingdom forever, and his throne shall be established forevermore.” ’ ” [Is 9:7] '
  '15':
  - type: text
    content: According to all these words and according to all this vision, so Nathan spoke to David.
  - type: heading
    content: David’s Prayer in Response
  '16':
  - type: text
    content: Then David the king went in and sat before the L
  - type: heading
    content: ord
  - type: text
    content: ' and said, “Who am I, O L'
  - type: heading
    content: ord
  - type: text
    content: ' God, and what is my house '
  - type: text
    content: and
  - type: text
    content: ' family that You have brought me this far? '
  '17':
  - type: text
    content: 'This was a small thing in Your eyes, O God; but You have spoken of Your servant’s house for a great while to come, and have regarded me according to the standard '
  - type: text
    content: and
  - type: text
    content: ' estate of a man of high degree (prominence), O L'
  - type: heading
    content: ord
  - type: text
    content: ' God. '
  '18':
  - type: text
    content: 'What more can David say to You for the honor '
  - type: text
    content: granted to
  - type: text
    content: ' Your servant? For You know Your servant. '
  '19':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', for Your servant’s sake, and in accordance with Your own heart, You have accomplished all this greatness, to make known all these great things. '
  '2':
  - type: text
    content: Then Nathan said to David, “
  - type: note
    content: This may have been advice expressed by Nathan rather than a prophecy; in v 4 it becomes clear that God did not tell Nathan to say this.
  - type: text
    content: Do all that is in your heart, for God is with you.”
  '20':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', there is no one like You, nor is there any God except You, according to all that we have heard with our ears. '
  '21':
  - type: text
    content: 'And what one nation on the earth is like Your people Israel, whom God went to redeem for Himself as a people, to make a name for Yourself by great and awesome '
  - type: text
    content: and
  - type: text
    content: ' terrible things, by driving out nations from before Your people, whom You redeemed out of Egypt? '
  '22':
  - type: text
    content: You made Your people Israel Your own people forever, and You, L
  - type: heading
    content: ord
  - type: text
    content: ', became their God.'
  '23':
  - type: text
    content: “Therefore now, O L
  - type: heading
    content: ord
  - type: text
    content: ', let the word which You have spoken concerning Your servant and his house endure forever, and do as You have said. '
  '24':
  - type: text
    content: Let Your name [and the character that it denotes] endure and be magnified forever, saying, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is the God of Israel, yes, a God to Israel; and the house of Your servant David is established before You.’ '
  '25':
  - type: text
    content: 'For You, O my God, have revealed to Your servant that You will build for him a house (descendants); therefore Your servant has found '
  - type: text
    content: courage
  - type: text
    content: ' to pray before You. '
  '26':
  - type: text
    content: And now, O L
  - type: heading
    content: ord
  - type: text
    content: ', You are God, and you have spoken '
  - type: text
    content: and
  - type: text
    content: ' promised this good thing to Your servant. '
  '27':
  - type: text
    content: Therefore may it please You to bless the house (descendants) of Your servant, that it may continue before You forever; for what You bless, O L
  - type: heading
    content: ord
  - type: text
    content: ', is blessed forever.”'
  '3':
  - type: text
    content: 'But it came about that same night that the word of God came to Nathan, saying, '
  '4':
  - type: text
    content: “Go and tell David My servant, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “You shall not build a house for Me to dwell in; '
  '5':
  - type: text
    content: 'for I have not dwelt in a house since the day that I brought Israel up [from Egypt] until this day, but I have gone from tent to tent and from '
  - type: text
    content: one
  - type: text
    content: ' dwelling place '
  - type: text
    content: to another
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Wherever I have walked with all Israel, did I say a word to any of the judges of Israel, whom I commanded to shepherd My people, saying, ‘Why have you not built for Me a house of cedar?’ ” ’ '
  '7':
  - type: text
    content: 'Now, therefore, this is what you shall say to My servant David: ‘Thus says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “I took you from the pasture, from following the sheep, to be leader over My people Israel. '
  '8':
  - type: text
    content: 'I have been with you wherever you have gone, and I have cut off all your enemies from before you; and I will make your name like the name of the great ones of the earth. '
  '9':
  - type: text
    content: 'I will appoint a place for My people Israel, and will plant them, so that they may live in their own place and not be moved again [nor tremble with fear]; and the '
  - type: note
    content: Lit sons of wickedness.
  - type: text
    content: 'wicked will not waste (persecute) them anymore, as formerly, '
