document_id: EXO.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Burning Bush
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Moses was keeping the flock of Jethro (Reuel) his father-in-law, the priest of Midian; and he led his flock to the west side of the wilderness and came to Horeb (Sinai), the mountain of God. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore, come now, and I will send you to Pharaoh, and then bring My people, the children of Israel, out of Egypt.” '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Moses said to God, “Who am I, that I should go to Pharaoh, and that I should bring the children of Israel out of Egypt?” '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And God said, “Certainly I will be with you, and this shall be the sign to you that it is I who have sent you: when you have brought the people out of Egypt, you shall serve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship God at this mountain.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to God, “Behold, when I come to the Israelites and say to them, ‘The God of your fathers (ancestors) has sent me to you,’ and they say to me, ‘What is His name?’ What shall I say to them?” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God said to Moses, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Related to the name of God, '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH
        - type: text
          text: ', rendered '
        - type: usfm
          marker: it
          children:
          - type: text
            text: L
          - type: usfm
            marker: sc
            children:
            - type: usfm
              marker: it
              children:
              - type: text
                text: ord
        - type: text
          text: ', which is derived from the verb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: HAYAH
        - type: text
          text: ', to be.'
      marker-yv: yv-n
    - type: text
      text: 'I AM WHO I AM”; and He said, “You shall say this to the Israelites, ‘I AM has sent me to you.’ ” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then God also said to Moses, “This is what you shall say to the Israelites, ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of your fathers, the God of Abraham, the God of Isaac, and the God of Jacob (Israel), has sent me to you.’ This is My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To know the names of God is to understand His many attributes and grasp the godly characteristic which the name denotes (Ex 6:3; 1 Kin 8:33 ff; Ps 91:14; Is 52:6; 64:2; Jer 16:21). God’s name is His self-revelation.
      marker-yv: yv-n
    - type: text
      text: 'Name forever, and this is My memorial [name] to all generations. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Go, gather the elders (tribal leaders) of Israel together, and say to them, ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of your fathers, the God of Abraham, of Isaac, and of Jacob, appeared to me, saying, “I am indeed concerned about you and what has been done to you in Egypt. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said I will bring you up out of the suffering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppression of Egypt to the land of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite, to a land '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 8.
      marker-yv: yv-n
    - type: text
      text: 'flowing with milk and honey.” ’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The elders [of the tribes] will listen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pay attention to what you say; and you, with the elders of Israel, shall go to the king of Egypt and you shall say to him, ‘The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of the Hebrews, has met with us; so now, please, [we ask and plead with you,] let us go on a three days’ journey into the wilderness, so that we may sacrifice to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I know that the king of Egypt will not let you go unless [he is forced] by a strong hand. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Angel of the Lord” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see vv 4, 6; also note Gen 16:7).
      marker-yv: yv-n
    - type: text
      text: Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' appeared to him in a blazing flame of fire from the midst of a bush; and he looked, and behold, the bush was on fire, yet it was not consumed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I will reach out My hand and strike Egypt with all My wonders which I shall do in the midst of it; and after that he will let you go. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will grant this people favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' respect in the sight of the Egyptians; therefore, it shall be that when you go, you will not go empty-handed. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But every woman shall [insistently] ask her neighbor and any woman who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This indicates that the Egyptians had occupied the Israelites’ homes and confiscated their possessions as part of Pharaoh’s policy of enslavement. Later, after suffering all the plagues, the Egyptians would be more than willing to give the Israelites whatever they asked, in order to be rid of them.
      marker-yv: yv-n
    - type: text
      text: lives in her house, for articles of silver and articles of gold, and clothing; and you shall put them on your sons and daughters. In this way you are to plunder the Egyptians [leaving bondage with great possessions that are rightfully yours].” [Gen 15:14]
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses said, “I must turn away [from the flock] and see this great sight—why the bush is not burned up.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' saw that he turned away [from the flock] to look, God called to him from the midst of the bush and said, “Moses, Moses!” And he said, “Here I am.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God said, “Do not come near; take your sandals off your feet [out of respect], because the place on which you are standing is holy ground.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then He said, “I am the God of your father, the God of Abraham, the God of Isaac, and the God of Jacob.” Then Moses hid his face, because he was afraid to look at God.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “I have in fact seen the affliction (suffering, desolation) of My people who are in Egypt, and have heard their cry because of their taskmasters (oppressors); for I know their pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I have come down to rescue them from the hand (power) of the Egyptians, and to bring them up from that land to a land [that is] good and spacious, to a land '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: 'flowing with milk and honey [a land of plenty]—to the place of the Canaanite, the Hittite, the Amorite, the Perizzite, the Hivite, and the Jebusite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, behold, the cry of the children of Israel has come to Me; and I have also seen how the Egyptians oppress them.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Mission of Moses
    marker-yv: yv-h
