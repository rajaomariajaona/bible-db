  '12':
  - type: text
    content: '“All nations shall call you happy '
  - type: text
    content: and
  - type: text
    content: ' blessed, for you shall be a land of delight,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts.'
  '13':
  - type: text
    content: “Your words have been harsh against Me,” says the L
  - type: heading
    content: ord
  - type: text
    content: '. “But you say, ‘What have we spoken against You?’ '
  '14':
  - type: text
    content: You have said, ‘It is useless to serve God. What profit is it if we keep His ordinances, and walk around like mourners before the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts? '
  '15':
  - type: text
    content: 'So now we call the arrogant happy '
  - type: text
    content: and
  - type: text
    content: ' blessed. Evildoers are exalted '
  - type: text
    content: and
  - type: text
    content: ' prosper; and when they test God, they escape [unpunished].’ ”'
  - type: heading
