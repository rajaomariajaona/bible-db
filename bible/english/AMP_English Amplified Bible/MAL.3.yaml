  - type: text
    content: ' of hosts, “if I will not open for you the windows of heaven and pour out for you [so great] a blessing until there is no more room to receive it. [Mal 2:2] '
  '11':
  - type: text
    content: 'Then I will rebuke the '
  - type: note
    content: In return for their faithfulness God promised protection for the harvest.
  - type: text
