document_id: MAL.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Purifier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Behold, I am going to send My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is fulfilled in John the Baptist (Matt 11:10; Mark 1:2; Luke 1:76).
    marker-yv: yv-n
  - type: text
    text: 'messenger, and he will prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clear the way before Me. And the Lord [the Messiah], whom you seek, will suddenly come to His temple; the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Messiah as God’s representative will confirm and establish the covenant (see Is 42:6).
    marker-yv: yv-n
  - type: text
    text: Messenger of the covenant, in whom you delight, behold, He is coming,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. [Matt 11:10; Luke 1:13-17, 76] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“But who can endure the day of His coming? And who can stand when He appears? For He is like a refiner’s fire and like launderer’s soap [which removes impurities and uncleanness]. [Rev 6:12-17] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He will sit as a refiner and purifier of silver, and He will purify the sons of Levi [the priests], and refine them like gold and silver, so that they may present to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [grain] offerings in righteousness. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the offering of Judah and Jerusalem will be pleasing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' as in the days of old and as in ancient years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Then I will come near you for judgment; I will be a swift witness against sorcerers, against adulterers, against perjurers, and against those who oppress the laborer in his wages and widows and the fatherless, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against
  - type: text
    text: ' those who turn away the alien [from his right], and those who do not fear Me [with awe-filled reverence],” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. [Deut 24:17] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “For I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I do not change [but remain faithful to My covenant with you]; that is why you, O sons of Jacob, have not come to an end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Yet from the days of your fathers you have turned away from My statutes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordinances and have not kept them. Return to Me, and I will return to you,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. “But you say, ‘How shall we return?’'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: You Have Robbed God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Will a man rob God? Yet you are robbing Me! But you say, ‘In what way have we robbed You?’ In tithes and offerings [you have withheld]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You are cursed with a curse, for you are robbing Me, this whole nation! [Lev 26:14-17] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Bring all the tithes (the tenth) into the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient times special storehouses were established in the temple to receive the tithes of the harvest. If the people were not faithful, the priests could not continue to serve and perform their duties.
    marker-yv: yv-n
  - type: text
    text: 'storehouse, so that there may be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. support for the priests and their families.
    marker-yv: yv-n
  - type: text
    text: food in My house, and test Me now in this,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “if I will not open for you the windows of heaven and pour out for you [so great] a blessing until there is no more room to receive it. [Mal 2:2] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I will rebuke the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In return for their faithfulness God promised protection for the harvest.
    marker-yv: yv-n
  - type: text
    text: 'devourer (insects, plague) for your sake and he will not destroy the fruits of the ground, nor will your vine in the field drop '
  - type: usfm
    marker: it
    children:
    - type: text
      text: its grapes
  - type: text
    text: ' [before harvest],” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“All nations shall call you happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed, for you shall be a land of delight,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Your words have been harsh against Me,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. “But you say, ‘What have we spoken against You?’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You have said, ‘It is useless to serve God. What profit is it if we keep His ordinances, and walk around like mourners before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So now we call the arrogant happy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed. Evildoers are exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosper; and when they test God, they escape [unpunished].’ ”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Book of Remembrance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then those who feared the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with awe-filled reverence] spoke to one another; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' paid attention and heard it, and a book of remembrance was written before Him of those who fear the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with an attitude of reverence and respect] and who esteem His name. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “They will be Mine,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “on that day when I publicly recognize them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' openly declare them to be My own possession [that is, My very special treasure]. And I will have compassion on them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spare them as a man spares his own son who serves him.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then you will again distinguish between the righteous and the wicked, between the one who serves God and the one who does not serve Him.
