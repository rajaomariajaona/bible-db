  '18':
  - type: text
    content: Then you will again distinguish between the righteous and the wicked, between the one who serves God and the one who does not serve Him.
  '2':
  - type: text
    content: '“But who can endure the day of His coming? And who can stand when He appears? For He is like a refiner’s fire and like launderer’s soap [which removes impurities and uncleanness]. [Rev 6:12-17] '
  '3':
  - type: text
    content: He will sit as a refiner and purifier of silver, and He will purify the sons of Levi [the priests], and refine them like gold and silver, so that they may present to the L
  - type: heading
    content: ord
  - type: text
    content: ' [grain] offerings in righteousness. '
  '4':
  - type: text
    content: Then the offering of Judah and Jerusalem will be pleasing to the L
  - type: heading
    content: ord
  - type: text
    content: ' as in the days of old and as in ancient years.'
  '5':
  - type: text
    content: '“Then I will come near you for judgment; I will be a swift witness against sorcerers, against adulterers, against perjurers, and against those who oppress the laborer in his wages and widows and the fatherless, and '
  - type: text
    content: against
  - type: text
    content: ' those who turn away the alien [from his right], and those who do not fear Me [with awe-filled reverence],” says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. [Deut 24:17] '
  '6':
  - type: text
    content: “For I am the L
  - type: heading
    content: ord
  - type: text
    content: ', I do not change [but remain faithful to My covenant with you]; that is why you, O sons of Jacob, have not come to an end.'
  '7':
  - type: text
    content: '“Yet from the days of your fathers you have turned away from My statutes '
  - type: text
    content: and
  - type: text
    content: ' ordinances and have not kept them. Return to Me, and I will return to you,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. “But you say, ‘How shall we return?’'
  - type: heading
    content: You Have Robbed God
  '8':
  - type: text
    content: '“Will a man rob God? Yet you are robbing Me! But you say, ‘In what way have we robbed You?’ In tithes and offerings [you have withheld]. '
  '9':
  - type: text
    content: 'You are cursed with a curse, for you are robbing Me, this whole nation! [Lev 26:14-17] '
