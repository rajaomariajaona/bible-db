document_id: JOS.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Kings Defeated by Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these are the kings of the land whom the sons of Israel defeated, and whose land they possessed beyond the Jordan toward the east, from the valley of the [river] Arnon to Mount Hermon, and all the Arabah [plain] to the east: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sihon king of the Amorites, who lived in Heshbon, and ruled from Aroer, which is on the edge of the valley of the [river] Arnon, both the middle of the valley and half of Gilead, and as far as the brook Jabbok, [which is] the border of the sons of Ammon; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and the Arabah [plain] as far as the Sea of Chinnereth (Galilee) eastward, and as far as the sea of the Arabah, the Salt (Dead) Sea, eastward toward Beth-jeshimoth, and southward to the foot of the slopes of [Mount] Pisgah; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and the territory of Og king of Bashan, one of the remnant of the Rephaim, who lived at Ashtaroth and at Edrei, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and ruled over Mount Hermon and Salecah and all of Bashan to the border of the Geshurites and the Maacathites, and over half of Gilead, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as far as
  - type: text
    text: ' the border of Sihon king of Heshbon. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moses the servant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the sons of Israel defeated them; and Moses the servant of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave their land as a possession to the Reubenites and the Gadites and the half-tribe of Manasseh. [Num 21; 32:33; Deut 2; 3]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'These are the kings of the land whom Joshua and the sons of Israel defeated on the west side of the Jordan, from Baal-gad in the Valley of Lebanon to Mount Halak, which rises toward Seir. Joshua gave their land to the tribes of Israel as a possession according to their divisions, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'in the hill country, in the lowland (foothills), in the Arabah [plain], on the slopes [descending to the Dead Sea], and in the wilderness, and in the Negev (South country)—the [lands of the] Hittite, the Amorite and the Canaanite, the Perizzite, the Hivite and the Jebusite: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What follows is a listing of the kings mentioned in chs 6-10.
    marker-yv: yv-n
  - type: text
    text: 'the king of Jericho, one; the king of Ai, which is beside Bethel, one; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the king of Jerusalem, one; the king of Hebron, one; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the king of Jarmuth, one; the king of Lachish, one; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the king of Eglon, one; the king of Gezer, one; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the king of Debir, one; the king of Geder, one; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'the king of Hormah, one; the king of Arad, one; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'the king of Libnah, one; the king of Adullam, one; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the king of Makkedah, one; the king of Bethel, one; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the king of Tappuah, one; the king of Hepher, one; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the king of Aphek, one; the king of Lasharon, one; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'the king of Madon, one; the king of Hazor, one; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'the king of Shimron-meron, one; the king of Achshaph, one; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'the king of Taanach, one; the king of Megiddo, one; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'the king of Kedesh, one; the king of Jokneam in Carmel, one; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the king of Dor in the heights of Dor, one; the king of Goiim in Gilgal, one; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'the king of Tirzah, one: in all, thirty-one kings.'
