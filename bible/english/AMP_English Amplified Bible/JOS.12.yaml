document_id: JOS.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Kings Defeated by Israel
  - type: text
    content: 'Now these are the kings of the land whom the sons of Israel defeated, and whose land they possessed beyond the Jordan toward the east, from the valley of the [river] Arnon to Mount Hermon, and all the Arabah [plain] to the east: '
  '10':
  - type: text
    content: 'the king of Jerusalem, one; the king of Hebron, one; '
  '11':
  - type: text
    content: 'the king of Jarmuth, one; the king of Lachish, one; '
  '12':
  - type: text
    content: 'the king of Eglon, one; the king of Gezer, one; '
  '13':
  - type: text
    content: 'the king of Debir, one; the king of Geder, one; '
  '14':
  - type: text
    content: 'the king of Hormah, one; the king of Arad, one; '
  '15':
  - type: text
    content: 'the king of Libnah, one; the king of Adullam, one; '
  '16':
  - type: text
    content: 'the king of Makkedah, one; the king of Bethel, one; '
  '17':
  - type: text
    content: 'the king of Tappuah, one; the king of Hepher, one; '
  '18':
  - type: text
    content: 'the king of Aphek, one; the king of Lasharon, one; '
  '19':
  - type: text
    content: 'the king of Madon, one; the king of Hazor, one; '
  '2':
  - type: text
    content: 'Sihon king of the Amorites, who lived in Heshbon, and ruled from Aroer, which is on the edge of the valley of the [river] Arnon, both the middle of the valley and half of Gilead, and as far as the brook Jabbok, [which is] the border of the sons of Ammon; '
  '20':
  - type: text
    content: 'the king of Shimron-meron, one; the king of Achshaph, one; '
  '21':
  - type: text
    content: 'the king of Taanach, one; the king of Megiddo, one; '
  '22':
  - type: text
    content: 'the king of Kedesh, one; the king of Jokneam in Carmel, one; '
  '23':
  - type: text
    content: 'the king of Dor in the heights of Dor, one; the king of Goiim in Gilgal, one; '
  '24':
  - type: text
    content: 'the king of Tirzah, one: in all, thirty-one kings.'
  '3':
  - type: text
    content: 'and the Arabah [plain] as far as the Sea of Chinnereth (Galilee) eastward, and as far as the sea of the Arabah, the Salt (Dead) Sea, eastward toward Beth-jeshimoth, and southward to the foot of the slopes of [Mount] Pisgah; '
  '4':
  - type: text
    content: 'and the territory of Og king of Bashan, one of the remnant of the Rephaim, who lived at Ashtaroth and at Edrei, '
  '5':
  - type: text
    content: 'and ruled over Mount Hermon and Salecah and all of Bashan to the border of the Geshurites and the Maacathites, and over half of Gilead, '
  - type: text
    content: as far as
  - type: text
    content: ' the border of Sihon king of Heshbon. '
  '6':
  - type: text
    content: Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the sons of Israel defeated them; and Moses the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' gave their land as a possession to the Reubenites and the Gadites and the half-tribe of Manasseh. [Num 21; 32:33; Deut 2; 3]'
  '7':
  - type: text
    content: 'These are the kings of the land whom Joshua and the sons of Israel defeated on the west side of the Jordan, from Baal-gad in the Valley of Lebanon to Mount Halak, which rises toward Seir. Joshua gave their land to the tribes of Israel as a possession according to their divisions, '
  '8':
  - type: text
    content: 'in the hill country, in the lowland (foothills), in the Arabah [plain], on the slopes [descending to the Dead Sea], and in the wilderness, and in the Negev (South country)—the [lands of the] Hittite, the Amorite and the Canaanite, the Perizzite, the Hivite and the Jebusite: '
  '9':
  - type: note
    content: What follows is a listing of the kings mentioned in chs 6-10.
  - type: text
    content: 'the king of Jericho, one; the king of Ai, which is beside Bethel, one; '
