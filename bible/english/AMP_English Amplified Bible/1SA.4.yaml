document_id: 1SA.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Philistines Take the Ark in Victory
  - type: text
    content: And the word of [the L
  - type: heading
    content: ord
  - type: text
    content: ' through] Samuel came to all Israel. Now Israel went out to meet the Philistines in battle and they camped beside Ebenezer while the Philistines camped at Aphek. '
  '10':
  - type: text
    content: 'So the Philistines fought; Israel was defeated and every man fled to his tent. It was a very great defeat, for thirty thousand foot soldiers of Israel fell. '
  '11':
  - type: text
    content: Also the ark of God was taken; and the two sons of Eli, Hophni and Phinehas, were killed. [1 Sam 2:34]
  '12':
  - type: text
    content: 'Now a man [from the tribe] of Benjamin ran from the battle line and came to Shiloh that same day with his clothes torn and dust on his head [as signs of mourning over the disaster]. '
  '13':
  - type: text
    content: 'When he arrived, Eli was sitting on his seat by the road, keeping watch, because his heart was anxious about the ark of God. When the man arrived to report [the news] in the city, everyone in the city cried out [to God, for help]. '
  '14':
  - type: text
    content: 'When Eli heard the noise of the outcry, he asked, “What is the noise of this uproar?” And the man came hurriedly and told Eli. '
  '15':
  - type: text
    content: 'Now Eli was ninety-eight years old; his eyes were dim so that he could not see. '
  '16':
  - type: text
    content: 'The man said to Eli, “I have come from the battle line. Indeed, I escaped from the battle line today.” Eli said, “How did things go, my son?” '
  '17':
  - type: text
    content: 'The messenger replied, “Israel has fled before the Philistines and there has also been a great slaughter among the people. Also your two sons, Hophni and Phinehas, are dead, and the ark of God has been taken.” '
  '18':
  - type: text
    content: When he mentioned the ark of God, Eli fell off the seat backwards by the side of the [city] gate. His neck was broken and he died, for he was old and heavy. He had judged Israel for forty years.
  '19':
  - type: text
    content: 'Now his daughter-in-law, Phinehas’ wife, was pregnant, and was about to give birth; so when she heard the news that the ark of God had been taken and that her father-in-law and her husband had died, she kneeled down and gave birth, because her [labor] pains began. '
  '2':
  - type: text
    content: 'The Philistines assembled in battle formation to meet Israel, and when the battle was over, Israel was defeated by the Philistines, who killed about four thousand men on the battlefield. '
  '20':
  - type: text
    content: 'And about the time of her death [following the sudden birth] the women attending her said to her, “Do not be afraid, for you have given birth to a son.” But she did not answer or pay any attention. '
  '21':
  - type: text
    content: 'And she named the boy '
  - type: note
    content: Hebrew for “Where is the glory?”
  - type: text
    content: 'Ichabod, saying, “The glory has left Israel,” because the ark of God had been taken and because of [the deaths of] her father-in-law and her husband. '
  '22':
  - type: text
    content: She said, “The glory has left Israel, for the ark of God has been taken.”
  '3':
  - type: text
    content: When the people (soldiers) came into the camp, the elders of Israel said, “Why has the L
  - type: heading
    content: ord
  - type: text
    content: ' defeated us today before the Philistines? Let us bring the ark of the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' here from Shiloh, so that He may come among us and save us from the hand of our enemies.” '
  '4':
  - type: text
    content: 'So the people sent '
  - type: text
    content: word
  - type: text
    content: ' to Shiloh, and from there they carried the ark of the covenant of the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts who sits '
  - type: text
    content: above
  - type: text
    content: ' the cherubim; and the two sons of Eli, Hophni and Phinehas, were with the ark of the covenant of God.'
  '5':
  - type: text
    content: So it happened that as the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' came into the camp, all [the people of] Israel shouted with a great shout, and the earth resounded. '
  '6':
  - type: text
    content: 'When the Philistines heard the noise of the shout, they said, “What '
  - type: text
    content: does
  - type: text
    content: ' the noise of this great shout in the camp of the Hebrews '
  - type: text
    content: mean?
  - type: text
    content: ” Then they understood that the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' had come into the camp. '
  '7':
  - type: text
    content: 'The Philistines were afraid, for they said, “God has come into the camp.” And they said, “Woe [disaster is coming] to us! For nothing like this has happened before. '
  '8':
  - type: text
    content: 'Woe to us! Who will rescue us from the hand of these mighty '
  - type: note
    content: Even though the Philistines associated the God of Israel with the ark, they still thought in terms of multiple gods.
  - type: text
    content: 'gods? These are the gods who struck the Egyptians with all kinds of plagues in the wilderness. '
  '9':
  - type: text
    content: Take courage, and be men, O Philistines, so that you do not become servants to the Hebrews, as they have been servants to you; act like men and fight!”
