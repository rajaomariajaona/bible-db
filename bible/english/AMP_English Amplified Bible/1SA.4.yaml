document_id: 1SA.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Philistines Take the Ark in Victory
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: And the word of [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' through] Samuel came to all Israel. Now Israel went out to meet the Philistines in battle and they camped beside Ebenezer while the Philistines camped at Aphek. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So the Philistines fought; Israel was defeated and every man fled to his tent. It was a very great defeat, for thirty thousand foot soldiers of Israel fell. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Also the ark of God was taken; and the two sons of Eli, Hophni and Phinehas, were killed. [1 Sam 2:34]
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now a man [from the tribe] of Benjamin ran from the battle line and came to Shiloh that same day with his clothes torn and dust on his head [as signs of mourning over the disaster]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When he arrived, Eli was sitting on his seat by the road, keeping watch, because his heart was anxious about the ark of God. When the man arrived to report [the news] in the city, everyone in the city cried out [to God, for help]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'When Eli heard the noise of the outcry, he asked, “What is the noise of this uproar?” And the man came hurriedly and told Eli. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now Eli was ninety-eight years old; his eyes were dim so that he could not see. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The man said to Eli, “I have come from the battle line. Indeed, I escaped from the battle line today.” Eli said, “How did things go, my son?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The messenger replied, “Israel has fled before the Philistines and there has also been a great slaughter among the people. Also your two sons, Hophni and Phinehas, are dead, and the ark of God has been taken.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When he mentioned the ark of God, Eli fell off the seat backwards by the side of the [city] gate. His neck was broken and he died, for he was old and heavy. He had judged Israel for forty years.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now his daughter-in-law, Phinehas’ wife, was pregnant, and was about to give birth; so when she heard the news that the ark of God had been taken and that her father-in-law and her husband had died, she kneeled down and gave birth, because her [labor] pains began. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The Philistines assembled in battle formation to meet Israel, and when the battle was over, Israel was defeated by the Philistines, who killed about four thousand men on the battlefield. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And about the time of her death [following the sudden birth] the women attending her said to her, “Do not be afraid, for you have given birth to a son.” But she did not answer or pay any attention. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And she named the boy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hebrew for “Where is the glory?”
      marker-yv: yv-n
    - type: text
      text: 'Ichabod, saying, “The glory has left Israel,” because the ark of God had been taken and because of [the deaths of] her father-in-law and her husband. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: She said, “The glory has left Israel, for the ark of God has been taken.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When the people (soldiers) came into the camp, the elders of Israel said, “Why has the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' defeated us today before the Philistines? Let us bring the ark of the covenant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' here from Shiloh, so that He may come among us and save us from the hand of our enemies.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So the people sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Shiloh, and from there they carried the ark of the covenant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts who sits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: above
    - type: text
      text: ' the cherubim; and the two sons of Eli, Hophni and Phinehas, were with the ark of the covenant of God.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So it happened that as the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came into the camp, all [the people of] Israel shouted with a great shout, and the earth resounded. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When the Philistines heard the noise of the shout, they said, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' the noise of this great shout in the camp of the Hebrews '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mean?
    - type: text
      text: ” Then they understood that the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had come into the camp. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The Philistines were afraid, for they said, “God has come into the camp.” And they said, “Woe [disaster is coming] to us! For nothing like this has happened before. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Woe to us! Who will rescue us from the hand of these mighty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Even though the Philistines associated the God of Israel with the ark, they still thought in terms of multiple gods.
      marker-yv: yv-n
    - type: text
      text: 'gods? These are the gods who struck the Egyptians with all kinds of plagues in the wilderness. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Take courage, and be men, O Philistines, so that you do not become servants to the Hebrews, as they have been servants to you; act like men and fight!”
