document_id: 1CO.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Appeal to Unity
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul, called as an apostle (special messenger, personally chosen representative) of Jesus Christ by the will of God, and our brother '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This man may have served as secretary to Paul to record his dictation, and may be the synagogue leader mentioned in Acts 18:17.
      marker-yv: yv-n
    - type: text
      text: Sosthenes,
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But I urge you, believers, by the name of our Lord Jesus Christ, that all of you be in full agreement in what you say, and that there be no divisions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' factions among you, but that you be perfectly united in your way of thinking and in your judgment [about matters of the faith]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For I have been informed about you, my brothers and sisters, by those of Chloe’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: household,
    - type: text
      text: ' that there are quarrels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' factions among you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now I mean this, that each one of you says, “I am [a disciple] of Paul,” or “I am [a disciple] of Apollos,” or “I am [a disciple] of Cephas (Peter),” or “I am [a disciple] of Christ.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Has Christ been divided [into different parts]? Was Paul crucified for you? Or were you baptized into the name of Paul? [Certainly not!] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I thank God that I did not baptize any of you except Crispus and Gaius, [Acts 18:8; Rom 16:23] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'so that no one would say that you were baptized into my name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now I also baptized the household of Stephanas; beyond that, I do not know if I baptized anyone else. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For Christ did not send me [as an apostle] to baptize, but [commissioned and empowered me] to preach the good news [of salvation]—not with clever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eloquent speech [as an orator], so that the cross of Christ would not be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul may be referring to the danger that convincing people to become Christians by the use of clever rhetoric would result in false conversions (cf 2:5).
      marker-yv: yv-n
    - type: text
      text: made ineffective [deprived of its saving power].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Wisdom of God
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For the message of the cross is foolishness [absurd and illogical] to those who are perishing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritually dead [because they reject it], but to us who are being saved [by God’s grace] it is [the manifestation of] the power of God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For it is written '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forever remains written,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will destroy the wisdom of the wise
    - type: text
      text: ' [the philosophy of the philosophers],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd the cleverness of the clever
    - type: text
      text: ' [who do not know Me] I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will nullify
    - type: text
      text: .” [Is 29:14]
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'To the church of God in Corinth, to those sanctified (set apart, made holy) in Christ Jesus, who are selected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' called as saints (God’s people), together with all those who in every place call on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor the name of our Lord Jesus Christ, their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and ours:'
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Where is the wise man (philosopher)? Where is the scribe (scholar)? Where is the debater (logician, orator) of this age? Has God not exposed the foolishness of this world’s wisdom? '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For since the world through all its [earthly] wisdom failed to recognize God, God in His wisdom was well-pleased through the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The straightforward message of salvation seemed foolish to unbelievers.
      marker-yv: yv-n
    - type: text
      text: 'foolishness of the message preached [regarding salvation] to save those who believe [in Christ and welcome Him as Savior]. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For Jews demand signs (attesting miracles), and Greeks pursue [worldly] wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' philosophy, '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'but we preach Christ crucified, [a message which is] to Jews a stumbling block [that provokes their opposition], and to Gentiles foolishness [just utter nonsense], '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'but to those who are the called, both Jews and Greeks (Gentiles), Christ is the power of God and the wisdom of God. [Rom 8:28] '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '[This is] because the foolishness of God [is not foolishness at all and] is wiser than men [far beyond human comprehension], and the weakness of God is stronger than men [far beyond the limits of human effort].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Just look at your own calling, believers; not many [of you were considered] wise according to human standards, not many powerful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' influential, not many of high '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noble birth. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'But God has selected [for His purpose] the foolish things of the world to shame the wise [revealing their ignorance], and God has selected [for His purpose] the weak things of the world to shame the things which are strong [revealing their frailty]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'God has selected [for His purpose] the insignificant (base) things of the world, and the things that are despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treated with contempt, [even] the things that are nothing, so that He might reduce to nothing the things that are, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'so that no one may [be able to] boast in the presence of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But it is from Him that you are in Christ Jesus, who became to us wisdom from God [revealing His plan of salvation], and righteousness [making us acceptable to God], and sanctification [making us holy and setting us apart for God], and redemption [providing our ransom from the penalty for sin], '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: so then, as it is written [in Scripture], “H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e who boasts
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: glories
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: let him boast
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: glory in the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” [Jer 9:24]
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I thank my God always for you because of the grace of God which was given you in Christ Jesus, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'so that in everything you were [exceedingly] enriched in Him, in all speech [empowered by the spiritual gifts] and in all knowledge [with insight into the faith]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'In this way our testimony about Christ was confirmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established in you, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'so that you are not lacking in any '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' gift [which comes from the Holy Spirit], as you eagerly wait [with confident trust] for the revelation of our Lord Jesus Christ [when He returns]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And He will also confirm you to the end [keeping you strong and free of any accusation, so that you will be] blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beyond reproach in the day [of the return] of our Lord Jesus Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: God is faithful [He is reliable, trustworthy and ever true to His promise—He can be depended on], and through Him you were called into fellowship with His Son, Jesus Christ our Lord.
