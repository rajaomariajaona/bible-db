    content: Appeal to Unity
  - type: text
    content: 'Paul, called as an apostle (special messenger, personally chosen representative) of Jesus Christ by the will of God, and our brother '
  - type: note
    content: This man may have served as secretary to Paul to record his dictation, and may be the synagogue leader mentioned in Acts 18:17.
  - type: text
    content: Sosthenes,
  '10':
  - type: text
    content: 'But I urge you, believers, by the name of our Lord Jesus Christ, that all of you be in full agreement in what you say, and that there be no divisions '
  - type: text
    content: or
  - type: text
    content: ' factions among you, but that you be perfectly united in your way of thinking and in your judgment [about matters of the faith]. '
  '11':
  - type: text
    content: 'For I have been informed about you, my brothers and sisters, by those of Chloe’s '
  - type: text
    content: household,
  - type: text
    content: ' that there are quarrels '
  - type: text
    content: and
  - type: text
    content: ' factions among you. '
  '12':
  - type: text
    content: 'Now I mean this, that each one of you says, “I am [a disciple] of Paul,” or “I am [a disciple] of Apollos,” or “I am [a disciple] of Cephas (Peter),” or “I am [a disciple] of Christ.” '
  '13':
  - type: text
    content: 'Has Christ been divided [into different parts]? Was Paul crucified for you? Or were you baptized into the name of Paul? [Certainly not!] '
  '14':
  - type: text
    content: 'I thank God that I did not baptize any of you except Crispus and Gaius, [Acts 18:8; Rom 16:23] '
  '15':
  - type: text
    content: 'so that no one would say that you were baptized into my name. '
  '16':
  - type: text
    content: 'Now I also baptized the household of Stephanas; beyond that, I do not know if I baptized anyone else. '
  '17':
  - type: text
    content: 'For Christ did not send me [as an apostle] to baptize, but [commissioned and empowered me] to preach the good news [of salvation]—not with clever '
  - type: text
    content: and
  - type: text
    content: ' eloquent speech [as an orator], so that the cross of Christ would not be '
  - type: note
    content: Paul may be referring to the danger that convincing people to become Christians by the use of clever rhetoric would result in false conversions (cf 2:5).
  - type: text
    content: made ineffective [deprived of its saving power].
  - type: heading
