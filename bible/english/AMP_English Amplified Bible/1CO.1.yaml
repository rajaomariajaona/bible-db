  '20':
  - type: text
    content: 'Where is the wise man (philosopher)? Where is the scribe (scholar)? Where is the debater (logician, orator) of this age? Has God not exposed the foolishness of this world’s wisdom? '
  '21':
  - type: text
    content: 'For since the world through all its [earthly] wisdom failed to recognize God, God in His wisdom was well-pleased through the '
  - type: note
    content: The straightforward message of salvation seemed foolish to unbelievers.
  - type: text
    content: 'foolishness of the message preached [regarding salvation] to save those who believe [in Christ and welcome Him as Savior]. '
  '22':
  - type: text
    content: 'For Jews demand signs (attesting miracles), and Greeks pursue [worldly] wisdom '
  - type: text
    content: and
  - type: text
    content: ' philosophy, '
  '23':
  - type: text
    content: 'but we preach Christ crucified, [a message which is] to Jews a stumbling block [that provokes their opposition], and to Gentiles foolishness [just utter nonsense], '
  '24':
  - type: text
    content: 'but to those who are the called, both Jews and Greeks (Gentiles), Christ is the power of God and the wisdom of God. [Rom 8:28] '
  '25':
  - type: text
    content: '[This is] because the foolishness of God [is not foolishness at all and] is wiser than men [far beyond human comprehension], and the weakness of God is stronger than men [far beyond the limits of human effort].'
  '26':
  - type: text
    content: 'Just look at your own calling, believers; not many [of you were considered] wise according to human standards, not many powerful '
  - type: text
    content: or
  - type: text
    content: ' influential, not many of high '
  - type: text
    content: and
  - type: text
    content: ' noble birth. '
  '27':
  - type: text
    content: 'But God has selected [for His purpose] the foolish things of the world to shame the wise [revealing their ignorance], and God has selected [for His purpose] the weak things of the world to shame the things which are strong [revealing their frailty]. '
  '28':
  - type: text
    content: 'God has selected [for His purpose] the insignificant (base) things of the world, and the things that are despised '
  - type: text
    content: and
  - type: text
    content: ' treated with contempt, [even] the things that are nothing, so that He might reduce to nothing the things that are, '
