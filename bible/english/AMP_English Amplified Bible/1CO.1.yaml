  '4':
  - type: text
    content: 'I thank my God always for you because of the grace of God which was given you in Christ Jesus, '
  '5':
  - type: text
    content: 'so that in everything you were [exceedingly] enriched in Him, in all speech [empowered by the spiritual gifts] and in all knowledge [with insight into the faith]. '
  '6':
  - type: text
    content: 'In this way our testimony about Christ was confirmed '
  - type: text
