document_id: 2CH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Temple Construction in Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Solomon began to build the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in Jerusalem on Mount Moriah, where the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared to his father David, in the place that David had prepared, on the threshing floor of Ornan the Jebusite. [1 Chr 21:20-22] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Solomon began to build on the second day of the second month in the fourth year of his reign.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Dimensions and Materials of the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now this is the [measurement of the] foundation which Solomon laid for the house of God: the length in cubits—by the old standard of measure—was sixty cubits (90 ft.), and the width was twenty cubits (30 ft.). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The porch in front of the house was as long as the width of the house, twenty cubits, and the height was 120 cubits. He overlaid it inside with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He overlaid the main room [the Holy Place] with cypress wood and overlaid it with fine gold, and decorated it with palm trees and chains. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And he adorned the house with precious stones; and the gold was gold from Parvaim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He also overlaid the house [the Holy Place] with gold—the beams, the thresholds, and its walls and its doors; and he carved cherubim on the walls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now he made the room of the Holy of Holies: its length equaling the width of the house was twenty cubits, and its width was twenty cubits; and he overlaid it with 600 talents of fine gold. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The weight of the nails was fifty shekels of gold. He also overlaid the upper rooms with gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And in the Holy of Holies he made two sculptured cherubim, and overlaid them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The wingspan of the cherubim was twenty cubits: one wing of one cherub was five cubits, reaching to the wall of the house, and its other wing, of five cubits, touched the other cherub’s wing. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The wing of the other cherub, of five cubits, touched the wall of the house; and its other wing of five cubits touched the wing of the first cherub. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The wings of these cherubim extended twenty cubits. The cherubim stood on their feet, their faces toward the Holy Place (the main room). '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He made the veil [between the Holy Place and the Holy of Holies] of blue, purple, and crimson colors, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. byssus, a fine white fabric.
    marker-yv: yv-n
  - type: text
    text: fine linen, and embroidered cherubim on it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He also made two pillars for the front of the house, thirty-five cubits high, and the capital on the top of each one was five cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He made chains [like a necklace] in the inner sanctuary and put them on the tops of the pillars; and he made a hundred pomegranates and put them on the chains. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He erected the pillars in front of the temple, one on the right, the other on the left, and named the one on the right Jachin (may He establish) and the one on the left Boaz (in Him is strength).
