document_id: 2CO.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Temporal and Eternal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For we know that if the earthly tent [our physical body] which is our house is torn down [through death], we have a building from God, a house not made with hands, eternal in the heavens. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For we [believers will be called to account and] must all appear before the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bema
        - type: text
          text: ' (a step). A raised area reached by steps, used as the official seat of a judge.'
      marker-yv: yv-n
    - type: text
      text: 'judgment seat of Christ, so that each one may be repaid for what has been done in the body, whether good or '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: inferior
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: bad [that is, each will be held responsible for his actions, purposes, goals, motives—the use or misuse of his time, opportunities and abilities].
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore, since we know the fear of the Lord [and understand the importance of obedience and worship], we persuade people [to be reconciled to Him]. But we are plainly known to God [He knows everything about us]; and I hope that we are plainly known also in your consciences [your God-given discernment]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'We are not commending ourselves to you again, but are giving you an occasion to be [rightfully] proud of us, so that you will have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an answer
    - type: text
      text: ' for those who take pride in [outward] appearances [the virtues they pretend to have] rather than what is [actually] in heart. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'If we are out of our mind [just unstable fanatics as some critics say], it is for God; if we are in our right mind, it is for your benefit. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For the love of Christ controls '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compels us, because we have concluded this, that One died for all, therefore all died; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: and He died for all, so that all those who live would no longer live for themselves, but for Him who died and was raised for their sake.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So from now on we regard no one from a human point of view [according to worldly standards and values]. Though we have known Christ from a human point of view, now we no longer know Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in this way
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Therefore if anyone is in Christ [that is, grafted in, joined to Him by faith in Him as Savior], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he is
    - type: text
      text: ' a new creature [reborn and renewed by the Holy Spirit]; the old things [the previous moral and spiritual condition] have passed away. Behold, new things have come [because spiritual awakening brings a new life]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' things are from God, who reconciled us to Himself through Christ [making us acceptable to Him] and gave us the ministry of reconciliation [so that by our example we might bring others to Him], '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: that is, that God was in Christ reconciling the world to Himself, not counting people’s sins against them [but canceling them]. And He has committed to us the message of reconciliation [that is, restoration to favor with God].
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For indeed in this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house
    - type: text
      text: ' we groan, longing to be clothed with our [immortal, eternal] celestial dwelling, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So we are ambassadors for Christ, as though God were making His appeal through us; we [as Christ’s representatives] plead with you on behalf of Christ to be reconciled to God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He made Christ who knew no sin to [judicially] be sin on our behalf, so that in Him we would become the righteousness of God [that is, we would be made acceptable to Him and placed in a right relationship with Him by His gracious lovingkindness].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'so that by putting it on we will not be found naked. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For while we are in this tent, we groan, being burdened [often weighed down, oppressed], not that we want to be unclothed [separated by death from the body], but to be clothed, so that what is mortal [the body] will be swallowed up by life [after the resurrection]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now He who has made us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prepared us for this very purpose is God, who gave us the [Holy] Spirit as a pledge [a guarantee, a down payment on the fulfillment of His promise].'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So then, being always filled with good courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident hope, and knowing that while we are at home in the body we are absent from the Lord— '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'for we walk by faith, not by sight [living our lives in a manner consistent with our confident belief in God’s promises]— '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'we are [as I was saying] of good courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident hope, and prefer rather to be absent from the body and to be at home with the Lord. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Therefore, whether we are at home [on earth] or away from home [and with Him], it is our [constant] ambition to be pleasing to Him. '
