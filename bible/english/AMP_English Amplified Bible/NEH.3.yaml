document_id: NEH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Builders of the Walls
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Eliashib the high priest rose up with his brothers the priests and built '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located at northeastern corner of the city.
    marker-yv: yv-n
  - type: text
    text: 'the Sheep Gate. They consecrated it and set up its doors; and they consecrated the wall [westward] to the Tower of the Hundred, as far as the Tower of Hananel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: On his hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Next to Eliashib the men of Jericho built, and next to them Zaccur the son of Imri built.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now the sons of Hassenaah built the Fish Gate; they laid its beams and set up its doors with its bolts and its bars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Next to them Meremoth the son of Uriah, the son of Hakkoz, made repairs. Next to him Meshullam the son of Berechiah, the son of Meshezabel, made repairs. And next to him Zadok the son of Baana '
  - type: usfm
    marker: it
    children:
    - type: text
      text: also
  - type: text
    text: ' made repairs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Next to him the men of Tekoa made repairs, but their nobles did not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bring their necks to
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: support the work of their overseers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Joiada the son of Paseah and Meshullam the son of Besodeiah repaired '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located at the northwestern corner of the city.
    marker-yv: yv-n
  - type: text
    text: 'the Old Gate. They laid its beams and set up its doors with its bolts and its bars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Next to them Melatiah the Gibeonite and Jadon the Meronothite, the men of Gibeon and of Mizpah, made repairs for the official seat (Jerusalem residence) of the governor [of the province] beyond the [Euphrates] River. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Next to them Uzziel the son of Harhaiah, one of the goldsmiths, made repairs. Next to him Hananiah, one of the perfumers, made repairs, and they restored Jerusalem as far as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the western wall.
    marker-yv: yv-n
  - type: text
    text: 'the Broad Wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Next to them Rephaiah the son of Hur, official of half the district of Jerusalem, made repairs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Next to them Jedaiah the son of Harumaph made repairs opposite his own house. And next to him Hattush the son of Hashabneiah made repairs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Malchijah the son of Harim and Hasshub the son of Pahath-moab repaired another section and the Tower of the Furnaces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Next to him Shallum the son of Hallohesh, the official of half the district of Jerusalem, made repairs, he and his daughters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hanun and the inhabitants of Zanoah repaired the Valley Gate. They built it and set up its doors with its bolts and its bars, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: repaired
  - type: text
    text: ' a thousand cubits (1,500 ft.) of the wall as far as the Refuse Gate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Malchijah the son of Rechab, the official of the district of Beth-haccherem repaired the Refuse Gate. He rebuilt it and set its doors with its bolts and its bars.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Shallum the son of Col-hozeh, official of the district of Mizpah repaired the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located on the lower southeast side of the city.
    marker-yv: yv-n
  - type: text
    text: 'Fountain Gate. He rebuilt it and covered it [with a roof], and set up its doors with its bolts and its bars, and [he rebuilt] the wall of the Pool of Shelah (Siloam) by the King’s Garden as far as the stairs that descend [the eastern slope] from [the section of Jerusalem known as] the City of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'After him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not the Nehemiah who wrote this book.
    marker-yv: yv-n
  - type: text
    text: 'Nehemiah the son of Azbuk, official of half the district of Beth-zur, repaired [the wall] as far as [a point] in front of the tombs of David, and as far as the artificial pool and the house of the guards. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After him the Levites carried out repairs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under
  - type: text
    text: ' Rehum the son of Bani. Next to him Hashabiah, official of half the district of Keilah, carried out repairs for his district. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'After him their brothers carried out repairs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under
  - type: text
    text: ' Bavvai the son of Henadad, official of [the other] half of the district of Keilah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Next to him Ezer the son of Jeshua, the official of Mizpah, repaired another section [northward] in front of the ascent to the armory at the Angle [in the wall]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'After him Baruch son of Zabbai zealously repaired another section [toward the hill], from the Angle [in the wall] to the door of the house of Eliashib the high priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After him Meremoth the son of Uriah, the son of Hakkoz, repaired another [eastern] section, from the door of Eliashib’s house as far as the end of his house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After him the priests, the men of the [lower Jordan] valley, carried out repairs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After them Benjamin and Hasshub made repairs in front of their house. After them Azariah the son of Maaseiah, the son of Ananiah, carried out repairs beside his own house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'After him Binnui the son of Henadad repaired another section [of the wall], from the house of Azariah to the Angle [in the wall] and to the corner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Palal the son of Uzai '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made repairs
  - type: text
    text: ' in front of the Angle [in the wall] and the tower projecting from the upper house (palace) of the king, which is by the courtyard of the guard. After him Pedaiah the son of Parosh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made repairs
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The temple servants were living in Ophel [the hill south of the temple], and they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: made repairs
  - type: text
    text: ' as far as the front of the Water Gate on the east and the projecting tower. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: After them the Tekoites repaired another section in front of the great projecting tower and as far as the wall of Ophel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Above the Horse Gate the priests made repairs, each one in front of his own house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'After them Zadok the son of Immer carried out repairs in front of his house. After him Shemaiah the son of Shecaniah, keeper of the East Gate, repaired '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the wall
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'After him Hananiah the son of Shelemiah, and Hanun the sixth son of Zalaph, repaired another section. After him Meshullam the son of Berechiah carried out repairs in front of his own quarters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'After him Malchijah, one of the goldsmiths, carried out repairs as far as the house of the temple servants and of the merchants, in front of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Muster Gate
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Inspection Gate and as far as the upper room of the corner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Between the upper room of the corner and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located at the upper northeastern corner of the city.
    marker-yv: yv-n
  - type: text
    text: the Sheep Gate the goldsmiths and merchants carried out repairs.
