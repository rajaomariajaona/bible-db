document_id: GEN.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Noah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the generations (descendants) of Shem, Ham, and Japheth, the sons of Noah; and the sons born to them after the flood:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The beginning of his kingdom was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Babylon.
      marker-yv: yv-n
    - type: text
      text: 'Babel and Erech and Accad and Calneh, in the land of Shinar [in Babylonia]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'From that land Nimrod went to Assyria, and built Nineveh, and Rehoboth-Ir, and Calah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and [Nimrod built] Resen, which is between Nineveh and Calah; all these [combined to form] the great city [Nineveh]. [Jon 1:2; 3:2] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mizraim [the ancestor of the Egyptians] became the father of Ludim, Anamim, Lehabim, Naphtuhim '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: and Pathrusim and Casluhim—from whom came the Philistines—and Caphtorim.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Canaan became the father of Sidon, his firstborn, and Heth '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and the Jebusite and the Amorite and the Girgashite '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and the Hivite and the Arkite and the Sinite '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and the Arvadite and the Zemarite and the Hamathite. Afterward the families of the Canaanite were spread abroad. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The territory of the Canaanite extended from Sidon as one goes to Gerar, as far as Gaza; and as one goes to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fact that Genesis mentions the four cities of Sodom, Gomorrah, Admah, and Zeboiim as still standing testifies to the antiquity of this account. These cities of the plain were completely destroyed in Abraham’s time (Gen 19:27-29; Deut 29:23).
      marker-yv: yv-n
    - type: text
      text: 'Sodom and Gomorrah and Admah and Zeboiim, as far as Lasha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'the sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, and Tiras; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: These are the descendants of Ham according to their constituent groups, according to their languages, by their lands, and by their nations.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Also to Shem, the father of all the children of Eber [including the Hebrews], the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the brother of Japheth the elder
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'older brother of Japheth, children were born. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The sons of Shem: Elam, Asshur, Arpachshad, Lud and Aram; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'the sons of Aram [ancestor of the Syrians]: Uz, Hul, Gether and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also known as Meshech (1 Chr 1:17).
      marker-yv: yv-n
    - type: text
      text: 'Mash. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Arpachshad became the father of Shelah; and Shelah became the father of Eber. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Two sons were born to Eber; the name of one was Peleg (division), for [the inhabitants of] the earth were divided in his days; and his brother’s name was Joktan. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Joktan became the father of Almodad, Sheleph, Hazarmaveth, Jerah, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and Hadoram, Uzal, Diklah, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also known as Ebal (1 Chr 1:22).
      marker-yv: yv-n
    - type: text
      text: 'Obal, Abimael, Sheba, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and Ophir, Havilah, and Jobab; all these were the sons of Joktan. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'the sons of Gomer: Ashkenaz, Riphath, and Togarmah; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Now their territory extended from Mesha as one goes toward Sephar, to the hill country of the east. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: These are Shem’s descendants according to their constituent groups (families), according to their languages, by their lands, according to their nations.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'These are the families of the sons of Noah, according to their descendants, by their nations; and from these [people] the nations were separated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spread abroad on the earth after the flood. [Acts 17:26]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'the sons of Javan: Elishah, Tarshish, Kittim, and Dodanim. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'From these, [the people of] the coastlands of the nations were separated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spread into their lands, every one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Here and in vv 20 and 31, references are made to the different languages, in anticipation of God’s judgment of Babel (11:7-9), which resulted in a proliferation of languages.
      marker-yv: yv-n
    - type: text
      text: 'according to his own language, according to their constituent groups (families), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' into their nations:'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'the sons of Ham: Cush, Mizraim [from whom descended the Egyptians], Put, and Canaan; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'the sons of Cush: Seba, Havilah, Sabtah, Raamah, and Sabteca; and the sons of Raamah; Sheba and Dedan. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Cush became the father of Nimrod; he became a mighty one on the earth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He was a mighty hunter before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; therefore it is said, “Like Nimrod a mighty hunter before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
