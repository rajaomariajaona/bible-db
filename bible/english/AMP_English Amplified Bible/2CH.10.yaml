  '1':
  - type: heading
    content: Rehoboam’s Reign of Folly
  - type: text
    content: 'Then Rehoboam went to Shechem, because all Israel had come to Shechem to make him king. '
  '10':
  - type: text
    content: 'The young men who grew up with him told him, “Tell the people who said to you, ‘Your father made our yoke heavy, but you make it lighter for us’: ‘My little finger is thicker than my father’s '
  - type: note
    content: The midsection of the body between the lower ribs and the hips.
  - type: text
    content: 'loins! '
  '11':
  - type: text
    content: 'Now my father loaded you with a heavy yoke, but I will add [more weight] to your yoke. My father disciplined you with whips, but I '
  - type: text
    content: will discipline you
  - type: text
    content: ' with scorpions (extremely painful scourges).’ ”'
  '12':
  - type: text
    content: 'So on the third day Jeroboam and all the people returned to Rehoboam just as the king had directed, saying, “Return to me on the third day.” '
  '13':
  - type: text
    content: 'The king answered them harshly, for King Rehoboam rejected the counsel of the elders. '
  '14':
  - type: text
    content: 'He spoke to them in accordance with the advice of the young men, saying, “My father made your yoke heavy, but I will add to it; my father disciplined you with whips, but I '
  - type: text
    content: will discipline you
  - type: text
    content: ' with scorpions.” '
  '15':
  - type: text
    content: 'So the king did not listen to the people, for the '
  - type: note
    content: God brought about the revolt of the northern tribes, intending it as a punishment of the house of David for Solomon’s apostasy.
  - type: text
    content: turn of events was from God that the L
  - type: heading
    content: ord
  - type: text
    content: ' might fulfill His word, which He had spoken through Ahijah the Shilonite to Jeroboam the son of Nebat. [1 Kin 11:29-39]'
  '16':
  - type: text
    content: 'When all Israel saw that the king did not listen '
  - type: text
    content: and
  - type: text
    content: ' pay attention to them, the people answered him,'
  - type: text
    content: “What portion do we have in David?
  - type: text
    content: We have
  - type: text
    content: ' no inheritance in the son of Jesse.'
  - type: text
    content: Every man to your tents, O Israel;
  - type: text
    content: Now, [Rehoboam, descendant of] David, see to your own house.”
  - type: text
    content: 'So all Israel went to their tents. '
  '17':
  - type: text
    content: 'But as for the Israelites who lived in Judah’s cities, Rehoboam ruled over them. '
  '18':
  - type: text
    content: 'Then King Rehoboam '
  - type: note
    content: This evidently was a last-resort effort by Rehoboam to assert control over the Israelites.
  - type: text
    content: 'sent Hadoram, who was over the forced labor, and the Israelites stoned him and he died. And King Rehoboam hurried to mount his [royal] chariot to escape to Jerusalem. '
  '19':
  - type: text
    content: And Israel has rebelled against the house of David to this day.
  '2':
  - type: text
    content: 'When Jeroboam the son of Nebat heard '
  - type: text
    content: about the new king
  - type: text
    content: ' (for he was in '
  - type: note
    content: Jeroboam had been living in Egypt under the protection of the pharaoh, Shishak.
  - type: text
    content: 'Egypt, where he had fled from the presence of King Solomon), Jeroboam returned from Egypt. [1 Kin 11:26-40] '
  '3':
  - type: text
    content: 'And the people sent '
  - type: text
    content: messengers
  - type: text
    content: ' and summoned him. So when Jeroboam and all Israel came, they spoke to Rehoboam, saying, '
  '4':
  - type: text
    content: '“Your father [King Solomon] made our yoke hard (heavy, difficult); so now lighten the hard service of your father and his heavy yoke which he put on us, and we will serve you.” '
  '5':
  - type: text
    content: Rehoboam replied, “Come back to me again in three days.” So the people departed.
  '6':
  - type: text
    content: 'Then King Rehoboam consulted with the elders who had served his father Solomon [as advisers] while he was alive, asking, “What advice do you give me in answer to these people?” '
  '7':
  - type: text
    content: 'They answered him, saying, “If you are kind to these people and please them and speak good words to them, then they will be your servants forever.” '
  '8':
  - type: text
    content: 'But the king rejected the advice which the elders gave him, and consulted with the young men who grew up with him and served him [as advisers]. '
  '9':
  - type: text
    content: 'He asked them, “What advice do you give to us regarding the answer to these people, who have spoken to me, saying, ‘Lighten the yoke which your father put on us’? ” '
