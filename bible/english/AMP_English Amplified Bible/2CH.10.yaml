document_id: 2CH.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rehoboam’s Reign of Folly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Rehoboam went to Shechem, because all Israel had come to Shechem to make him king. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Jeroboam the son of Nebat heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about the new king
  - type: text
    text: ' (for he was in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jeroboam had been living in Egypt under the protection of the pharaoh, Shishak.
    marker-yv: yv-n
  - type: text
    text: 'Egypt, where he had fled from the presence of King Solomon), Jeroboam returned from Egypt. [1 Kin 11:26-40] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And the people sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: messengers
  - type: text
    text: ' and summoned him. So when Jeroboam and all Israel came, they spoke to Rehoboam, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Your father [King Solomon] made our yoke hard (heavy, difficult); so now lighten the hard service of your father and his heavy yoke which he put on us, and we will serve you.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rehoboam replied, “Come back to me again in three days.” So the people departed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then King Rehoboam consulted with the elders who had served his father Solomon [as advisers] while he was alive, asking, “What advice do you give me in answer to these people?” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They answered him, saying, “If you are kind to these people and please them and speak good words to them, then they will be your servants forever.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the king rejected the advice which the elders gave him, and consulted with the young men who grew up with him and served him [as advisers]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He asked them, “What advice do you give to us regarding the answer to these people, who have spoken to me, saying, ‘Lighten the yoke which your father put on us’? ” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The young men who grew up with him told him, “Tell the people who said to you, ‘Your father made our yoke heavy, but you make it lighter for us’: ‘My little finger is thicker than my father’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The midsection of the body between the lower ribs and the hips.
    marker-yv: yv-n
  - type: text
    text: 'loins! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now my father loaded you with a heavy yoke, but I will add [more weight] to your yoke. My father disciplined you with whips, but I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will discipline you
  - type: text
    text: ' with scorpions (extremely painful scourges).’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So on the third day Jeroboam and all the people returned to Rehoboam just as the king had directed, saying, “Return to me on the third day.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The king answered them harshly, for King Rehoboam rejected the counsel of the elders. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He spoke to them in accordance with the advice of the young men, saying, “My father made your yoke heavy, but I will add to it; my father disciplined you with whips, but I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will discipline you
  - type: text
    text: ' with scorpions.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the king did not listen to the people, for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God brought about the revolt of the northern tribes, intending it as a punishment of the house of David for Solomon’s apostasy.
    marker-yv: yv-n
  - type: text
    text: turn of events was from God that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' might fulfill His word, which He had spoken through Ahijah the Shilonite to Jeroboam the son of Nebat. [1 Kin 11:29-39]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When all Israel saw that the king did not listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay attention to them, the people answered him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What portion do we have in David?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: We have
  - type: text
    text: ' no inheritance in the son of Jesse.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every man to your tents, O Israel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now, [Rehoboam, descendant of] David, see to your own house.”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'So all Israel went to their tents. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But as for the Israelites who lived in Judah’s cities, Rehoboam ruled over them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then King Rehoboam '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This evidently was a last-resort effort by Rehoboam to assert control over the Israelites.
    marker-yv: yv-n
  - type: text
    text: 'sent Hadoram, who was over the forced labor, and the Israelites stoned him and he died. And King Rehoboam hurried to mount his [royal] chariot to escape to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And Israel has rebelled against the house of David to this day.
