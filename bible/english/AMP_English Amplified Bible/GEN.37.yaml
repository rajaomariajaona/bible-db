verses:
  '1':
  - type: heading
    content: Joseph’s Dream
  - type: text
    content: 'So Jacob (Israel) lived in the land '
  - type: note
    content: Lit of his father’s sojournings.
  - type: text
    content: 'where his father [Isaac] had been a stranger (sojourner, resident alien), in the land of Canaan. '
  '10':
  - type: text
    content: 'He told it to his father as well as to his brothers; but his father rebuked him and said to him [in disbelief], “What is [the meaning of] this dream that you have dreamed? Shall I and your mother and your brothers actually come to bow down to the ground [in respect] before you?” '
  '11':
  - type: text
    content: 'Joseph’s brothers were envious '
  - type: text
    content: and
  - type: text
    content: ' jealous of him, but his father kept the words [of Joseph] '
  - type: text
    content: in mind
  - type: text
    content: ' [wondering about their meaning].'
  '12':
  - type: text
    content: 'Then his brothers went to pasture their father’s flock near Shechem. '
  '13':
  - type: text
    content: 'Israel (Jacob) said to Joseph, “Are not your brothers pasturing [the flock] at Shechem? Come, and I will send you to them.” And he said, “Here I am [ready to obey you].” '
  '14':
  - type: text
    content: Then Jacob said to him, “Please go and see whether everything is all right with your brothers and all right with the flock; then bring word [back] to me.” So he sent him from the Hebron Valley, and he went to Shechem.
  '15':
  - type: text
    content: 'Now a certain man found Joseph, and saw that he was wandering around '
  - type: text
    content: and
  - type: text
    content: ' had lost his way in the field; so the man asked him, “What are you looking for?” '
  '16':
  - type: text
    content: 'He said, “I am looking for my brothers. Please tell me where they are pasturing '
  - type: text
    content: our flocks
  - type: text
    content: '.” '
  '17':
  - type: text
    content: 'Then the man said, “[They were here, but] they have moved on from this place. I heard them say, ‘Let us go to '
  - type: note
    content: Located about twelve miles north of Shechem.
  - type: text
    content: Dothan.’ ” So Joseph went after his brothers and found them at Dothan.
  - type: heading
    content: The Plot against Joseph
  '18':
  - type: text
    content: 'And when they saw him from a distance, even before he came close to them, they plotted to kill him. '
  '19':
  - type: text
    content: 'They said to one another, “Look, here comes this '
  - type: note
    content: Lit master of dreams.
  - type: text
    content: 'dreamer. '
  '2':
  - type: text
    content: These are the generations of Jacob.
  - type: text
    content: J
  - type: text
    content: oseph, when he was seventeen years old, was shepherding the flock with his brothers [Dan, Naphtali, Gad, and Asher]; the boy was with the sons of Bilhah and Zilpah, his father’s [
  - type: note
    content: I.e. concubines (see note 22:24).
  - type: text
    content: 'secondary] wives; and Joseph brought back a bad report about them to their father. '
  '20':
  - type: text
    content: 'Now then, come and let us kill him and throw him into one of the '
  - type: note
    content: These were earthen tanks that were dug or carved into rocky ground (perhaps limestone), designed to collect rainwater in the desert during winters. Some were cavernous, with a staircase carved into one of the walls for access to the bottom. The cistern selected by Joseph’s brothers must have been deep enough to make escape very difficult for someone of his size, but constructed without a staircase or other means of access (other than a rope).
  - type: text
    content: 'pits (cisterns, underground water storage); then we will say [to our father], ‘A wild animal killed '
  - type: text
    content: and
  - type: text
    content: ' devoured him’; and we shall see what will become of his dreams!” '
  '21':
  - type: text
    content: 'Now Reuben [the eldest] heard this and rescued him from their hands and said, “Let us not take his life.” '
  '22':
  - type: text
    content: 'Reuben said to them, “Do not shed his blood, but [instead] throw him [alive] into the pit that is here in the wilderness, and do not lay a hand on him [to kill him]”—[he said this so] that he could rescue him from them and return him [safely] to his father. '
  '23':
  - type: text
    content: 'Now when Joseph reached his brothers, they stripped him of his tunic, the [distinctive] '
  - type: note
    content: See note v 3.
  - type: text
    content: 'multicolored tunic which he was wearing; '
  '24':
  - type: text
    content: then they took him and threw him into the pit. Now the pit was empty; there was no water in it.
  '25':
  - type: text
    content: 'Then they sat down to eat their meal. When they looked up, they saw a caravan of '
  - type: note
    content: Descendants of Abraham and Hagar (Sarah’s maid, 16:15).
  - type: text
    content: 'Ishmaelites coming from Gilead [east of the Jordan], with their camels bearing ladanum resin [for perfume] and balm and '
  - type: note
    content: A valuable tree resin.
  - type: text
    content: 'myrrh, going on their way to carry '
  - type: text
    content: the cargo
  - type: text
    content: ' down to Egypt. '
  '26':
  - type: text
    content: 'Judah said to his brothers, “What do we gain if we kill our brother and cover up his blood (murder)? '
  '27':
  - type: text
    content: 'Come, let us [instead] sell him to these Ishmaelites [and '
  - type: note
    content: Descendants of Abraham and Hagar, his concubine.
  - type: text
    content: 'Midianites] and not lay our hands on him, because he is our brother and our flesh.” So his brothers listened to him '
  - type: text
    content: and
  - type: text
    content: ' agreed. [Gen 22:24; 25:2] '
  '28':
  - type: text
    content: 'Then as the '
  - type: note
    content: The relationship between the Midianites and the Ishmaelites as they are mentioned here is unclear. It is possible, as some have suggested, that “Ishmaelites” came to be used as a general term for desert tribes, and that the same merchants are called by both names in this verse. This would also explain the reference to the “Midianites” in v 36. Another explanation, which was offered by the rabbis, is that Joseph was sold first to the Ishmaelites, who then sold him to the Midianites. Another possibility is that they were Ishmaelites from the area of Midian.
  - type: text
    content: 'Midianite [and Ishmaelite] traders were passing by, the brothers pulled Joseph up and lifted him out of the pit, and they sold him to the Ishmaelites for twenty '
  - type: text
    content: shekels
  - type: text
    content: ' of silver. And so they took Joseph [as a captive] into Egypt.'
  '29':
  - type: text
    content: 'Now Reuben [unaware of what had happened] returned to the pit, and [to his great alarm found that] Joseph was not in the pit; so he tore his clothes [in deep sorrow]. '
  '3':
  - type: text
    content: 'Now Israel (Jacob) loved Joseph more than all his children, because he was the son of his old age; and he made him a [distinctive] '
  - type: note
    content: The meaning of this word is uncertain; some sources indicate that it refers to a long-sleeved tunic that reaches the ankles, essentially a light robe. In any case, the tunic was a visible reminder to Joseph’s brothers of their father’s favoritism toward him.
  - type: text
    content: 'multicolored tunic. '
  '30':
  - type: text
    content: 'He rejoined his brothers and said, “The boy is not there; as for me, where shall I go [to hide from my father]?” '
  '31':
  - type: text
    content: 'Then they took Joseph’s tunic, slaughtered a male goat and dipped the tunic in the blood; '
  '32':
  - type: text
    content: 'and they brought the multicolored tunic to their father, saying, “We have found this; please examine it '
  - type: text
    content: and
  - type: text
    content: ' decide whether or not it is your son’s tunic.” '
  '33':
  - type: text
    content: 'He recognized it and said, “It is my son’s tunic. A wild animal has devoured him; Joseph is without doubt torn in pieces!” '
  '34':
  - type: text
    content: 'So Jacob tore his clothes [in grief], put '
  - type: note
    content: An uncomfortable material woven from goat hair and worn in mourning.
  - type: text
    content: 'on sackcloth and mourned many days for his son. '
  '35':
  - type: text
    content: 'Then all his sons and daughters attempted to console him, but he refused to be comforted and said, “I will go down to Sheol (the place of the dead) in mourning for my son.” And his father wept for him. '
  '36':
  - type: text
    content: Meanwhile, in Egypt the Midianites sold Joseph [as a slave] to Potiphar, an officer of Pharaoh and the captain of the [royal] guard.
  '4':
  - type: text
    content: His brothers saw that their father loved Joseph more than all of his brothers; so they hated him and could not [find it within themselves to] speak to him on friendly terms.
  '5':
  - type: text
    content: 'Now Joseph dreamed a dream, and he told it to his brothers, and they '
  - type: note
    content: In both vv 5 and 8 “hated him even more” is properly translated, but there is an interesting play on words. The literal Hebrew says, “they added to hate”—the Hebrew word for “added” is the same for the word for Joseph—“they ‘Josephed’ their hate for him.”
  - type: text
    content: 'hated him even more. '
  '6':
  - type: text
    content: 'He said to them, “Please listen to [the details of] this dream which I have dreamed; '
  '7':
  - type: text
    content: 'we [brothers] were binding sheaves [of grain stalks] in the field, and lo, my sheaf [suddenly] got up and stood upright '
  - type: text
    content: and
  - type: text
    content: ' remained standing; and behold, your sheaves stood all around my sheaf and bowed down [in respect].” '
  '8':
  - type: text
    content: 'His brothers said to him, “Are you actually going to reign over us? Are you really going to rule '
  - type: text
    content: and
  - type: text
    content: ' govern us as your subjects?” So they hated him even more for [telling them about] his dreams and for his [arrogant] words.'
  '9':
  - type: text
    content: 'But Joseph dreamed still another dream, and told it to his brothers [as well]. He said, “See here, I have again dreamed a dream, and lo, [this time I saw] eleven stars and the sun and the moon bowed down [in respect] to me!” '
