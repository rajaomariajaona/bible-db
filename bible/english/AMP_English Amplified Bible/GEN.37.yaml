    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Jacob (Israel) lived in the land '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: of his father’s sojournings
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'where his father [Isaac] had been a stranger (sojourner, resident alien), in the land of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: These are the generations of Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: J
  - type: text
    text: oseph, when he was seventeen years old, was shepherding the flock with his brothers [Dan, Naphtali, Gad, and Asher]; the boy was with the sons of Bilhah and Zilpah, his father’s [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. concubines (see note 22:24).
    marker-yv: yv-n
  - type: text
    text: 'secondary] wives; and Joseph brought back a bad report about them to their father. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now Israel (Jacob) loved Joseph more than all his children, because he was the son of his old age; and he made him a [distinctive] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this word is uncertain; some sources indicate that it refers to a long-sleeved tunic that reaches the ankles, essentially a light robe. In any case, the tunic was a visible reminder to Joseph’s brothers of their father’s favoritism toward him.
    marker-yv: yv-n
  - type: text
    text: 'multicolored tunic. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His brothers saw that their father loved Joseph more than all of his brothers; so they hated him and could not [find it within themselves to] speak to him on friendly terms.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now Joseph dreamed a dream, and he told it to his brothers, and they '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In both vv 5 and 8 “hated him even more” is properly translated, but there is an interesting play on words. The literal Hebrew says, “they added to hate”—the Hebrew word for “added” is the same for the word for Joseph—“they ‘Josephed’ their hate for him.”
    marker-yv: yv-n
  - type: text
    text: 'hated him even more. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He said to them, “Please listen to [the details of] this dream which I have dreamed; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'we [brothers] were binding sheaves [of grain stalks] in the field, and lo, my sheaf [suddenly] got up and stood upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remained standing; and behold, your sheaves stood all around my sheaf and bowed down [in respect].” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'His brothers said to him, “Are you actually going to reign over us? Are you really going to rule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' govern us as your subjects?” So they hated him even more for [telling them about] his dreams and for his [arrogant] words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Joseph dreamed still another dream, and told it to his brothers [as well]. He said, “See here, I have again dreamed a dream, and lo, [this time I saw] eleven stars and the sun and the moon bowed down [in respect] to me!” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He told it to his father as well as to his brothers; but his father rebuked him and said to him [in disbelief], “What is [the meaning of] this dream that you have dreamed? Shall I and your mother and your brothers actually come to bow down to the ground [in respect] before you?” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joseph’s brothers were envious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jealous of him, but his father kept the words [of Joseph] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in mind
  - type: text
    text: ' [wondering about their meaning].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then his brothers went to pasture their father’s flock near Shechem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Israel (Jacob) said to Joseph, “Are not your brothers pasturing [the flock] at Shechem? Come, and I will send you to them.” And he said, “Here I am [ready to obey you].” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Jacob said to him, “Please go and see whether everything is all right with your brothers and all right with the flock; then bring word [back] to me.” So he sent him from the Hebron Valley, and he went to Shechem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now a certain man found Joseph, and saw that he was wandering around '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had lost his way in the field; so the man asked him, “What are you looking for?” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He said, “I am looking for my brothers. Please tell me where they are pasturing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our flocks
  - type: text
    text: '.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the man said, “[They were here, but] they have moved on from this place. I heard them say, ‘Let us go to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Located about twelve miles north of Shechem.
    marker-yv: yv-n
  - type: text
    text: Dothan.’ ” So Joseph went after his brothers and found them at Dothan.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Plot against Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And when they saw him from a distance, even before he came close to them, they plotted to kill him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They said to one another, “Look, here comes this '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: master of dreams
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'dreamer. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now then, come and let us kill him and throw him into one of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were earthen tanks that were dug or carved into rocky ground (perhaps limestone), designed to collect rainwater in the desert during winters. Some were cavernous, with a staircase carved into one of the walls for access to the bottom. The cistern selected by Joseph’s brothers must have been deep enough to make escape very difficult for someone of his size, but constructed without a staircase or other means of access (other than a rope).
    marker-yv: yv-n
  - type: text
    text: 'pits (cisterns, underground water storage); then we will say [to our father], ‘A wild animal killed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoured him’; and we shall see what will become of his dreams!” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now Reuben [the eldest] heard this and rescued him from their hands and said, “Let us not take his life.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Reuben said to them, “Do not shed his blood, but [instead] throw him [alive] into the pit that is here in the wilderness, and do not lay a hand on him [to kill him]”—[he said this so] that he could rescue him from them and return him [safely] to his father. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now when Joseph reached his brothers, they stripped him of his tunic, the [distinctive] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 3.
    marker-yv: yv-n
  - type: text
    text: 'multicolored tunic which he was wearing; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: then they took him and threw him into the pit. Now the pit was empty; there was no water in it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then they sat down to eat their meal. When they looked up, they saw a caravan of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Descendants of Abraham and Hagar (Sarah’s maid, 16:15).
    marker-yv: yv-n
  - type: text
    text: 'Ishmaelites coming from Gilead [east of the Jordan], with their camels bearing ladanum resin [for perfume] and balm and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A valuable tree resin.
    marker-yv: yv-n
  - type: text
    text: 'myrrh, going on their way to carry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the cargo
  - type: text
    text: ' down to Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Judah said to his brothers, “What do we gain if we kill our brother and cover up his blood (murder)? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Come, let us [instead] sell him to these Ishmaelites [and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Descendants of Abraham and Hagar, his concubine.
    marker-yv: yv-n
  - type: text
    text: 'Midianites] and not lay our hands on him, because he is our brother and our flesh.” So his brothers listened to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agreed. [Gen 22:24; 25:2] '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The relationship between the Midianites and the Ishmaelites as they are mentioned here is unclear. It is possible, as some have suggested, that “Ishmaelites” came to be used as a general term for desert tribes, and that the same merchants are called by both names in this verse. This would also explain the reference to the “Midianites” in v 36. Another explanation, which was offered by the rabbis, is that Joseph was sold first to the Ishmaelites, who then sold him to the Midianites. Another possibility is that they were Ishmaelites from the area of Midian.
    marker-yv: yv-n
  - type: text
    text: 'Midianite [and Ishmaelite] traders were passing by, the brothers pulled Joseph up and lifted him out of the pit, and they sold him to the Ishmaelites for twenty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver. And so they took Joseph [as a captive] into Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now Reuben [unaware of what had happened] returned to the pit, and [to his great alarm found that] Joseph was not in the pit; so he tore his clothes [in deep sorrow]. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'He rejoined his brothers and said, “The boy is not there; as for me, where shall I go [to hide from my father]?” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then they took Joseph’s tunic, slaughtered a male goat and dipped the tunic in the blood; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'and they brought the multicolored tunic to their father, saying, “We have found this; please examine it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decide whether or not it is your son’s tunic.” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He recognized it and said, “It is my son’s tunic. A wild animal has devoured him; Joseph is without doubt torn in pieces!” '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So Jacob tore his clothes [in grief], put '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An uncomfortable material woven from goat hair and worn in mourning.
    marker-yv: yv-n
  - type: text
    text: 'on sackcloth and mourned many days for his son. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then all his sons and daughters attempted to console him, but he refused to be comforted and said, “I will go down to Sheol (the place of the dead) in mourning for my son.” And his father wept for him. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Meanwhile, in Egypt the Midianites sold Joseph [as a slave] to Potiphar, an officer of Pharaoh and the captain of the [royal] guard.
