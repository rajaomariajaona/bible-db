      - type: text
        text: Peter and John Arrested
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And while Peter and John were talking to the people, the priests and the captain [who was in charge of the temple area and] of the temple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: guard
    - type: text
      text: ' and the Sadducees came up to them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let it be known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clearly understood by all of you, and by all the people of Israel, that in the name of Jesus Christ the Nazarene, whom you [demanded be] crucified [by the Romans and], whom God raised from the dead—in this name [that is, by the authority and power of Jesus] this man stands here before you in good health. '
  '11':
  - type: usfm
