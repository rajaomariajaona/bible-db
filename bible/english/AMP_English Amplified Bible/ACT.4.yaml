  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there is salvation in no one else; for there is no other name under heaven that has been given among people by which we must be saved [for God has provided the world no alternative for salvation].”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Threat and Release
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the men of the Sanhedrin (Jewish High Court) saw the confidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldness of Peter and John, and grasped the fact that they were '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They had no formal religious training in the rabbinical schools.
      marker-yv: yv-n
    - type: text
      text: 'uneducated and untrained [ordinary] men, they were astounded, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to recognize that they had been with Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And seeing the man who had been healed standing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' with them, they had nothing to say in reply. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after ordering them to step out of the Council [chamber], they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to confer among themselves, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, “What are we to do with these men? For the fact that an extraordinary miracle has taken place through them is public knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clearly evident to all the residents of Jerusalem, and we cannot deny it. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But to keep it from spreading further among the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the nation, let us [sternly] warn them not to speak again to anyone in this name.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they sent for them, and commanded them not to speak [as His representatives] or teach at all in the name of Jesus [using Him as their authority]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter and John replied to them, “Whether it is right in the sight of God to listen to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey you rather than God, you must judge [for yourselves]; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'being extremely disturbed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoroughly annoyed because they were teaching the people and proclaiming in [the case of] Jesus the resurrection of the dead. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for we, on our part, cannot stop telling [people] about what we have seen and heard.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the rulers and Council members had threatened them further, they let them go, finding no way to punish them because [of their fear] of the people, for they were all praising '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorifying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honoring God for what had happened; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for the man to whom this sign (attesting miracle) of healing had happened was more than forty years old.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Peter and John were released, they returned to their own [people] and reported everything that the chief priests and elders had said to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they heard it, they raised their voices together to God and said, “O Sovereign Lord [having complete power and authority], it is You who '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: made the heaven and the earth and the sea
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and everything that is in them
    - type: text
      text: ', [Ex 20:11; Ps 146:6] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who by the Holy Spirit, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: through
    - type: text
      text: ' the mouth of our father David, Your servant, said,'
  - type: usfm
    marker: q1
