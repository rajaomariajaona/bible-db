  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For in this city there were gathered together against Your holy Servant Jesus, whom You anointed, both Herod and Pontius Pilate, along with the Gentiles and the peoples of Israel, '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'to do whatever Your hand and Your purpose predestined [before the creation of the world] to occur [and so without knowing it, they served Your own purpose]. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And now, Lord, observe their threats [take them into account] and grant that Your bond-servants may declare Your message [of salvation] with great confidence, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they arrested them and put them in jail until the next day, because it was evening. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'while You extend Your hand to heal, and signs and wonders (attesting miracles) take place through the name [and the authority and power] of Your holy Servant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Son Jesus.” '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And when they had prayed, the place where they were meeting together was shaken [a sign of God’s presence]; and they were all filled with the Holy Spirit and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to speak the word of God with boldness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courage.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sharing among Believers
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the company of believers was of one heart and soul, and not one [of them] claimed that anything belonging to him was [exclusively] his own, but everything was common property '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' for the use of all. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And with great ability '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power the apostles were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continuously
    - type: text
      text: ' testifying to the resurrection of the Lord Jesus, and great grace [God’s remarkable lovingkindness and favor and goodwill] rested richly upon them all. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was not a needy person among them, because those who were owners of land or houses were selling them, and bringing the proceeds of the sales '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and placing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the money
    - type: text
      text: ' down at the apostles’ feet. Then it was distributed to each as anyone had need.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph, a Levite and native of Cyprus, who was surnamed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Barnabas becomes a prominent figure in the book of Acts (9:27; 11:22-30; 13:1-14:28, etc.), and it may be for that reason that Luke briefly mentions him here, telling the reader how Barnabas came to be associated with the apostles.
      marker-yv: yv-n
    - type: text
      text: 'Barnabas by the apostles (which translated means Son of Encouragement), '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sold a field belonging to him and brought the money and set it at the apostles’ feet.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But many of those who heard the message [of salvation] believed [in Jesus and accepted Him as the Christ]. And the number of the men came to be about 5,000.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the next day, their magistrates and elders and scribes (Sanhedrin, Jewish High Court) were gathered together in Jerusalem; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Annas served as high priest '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 6-15. He was removed from the position by Rome, but continued to be extremely influential and was regarded by the Jews as de facto high priest even though others (his sons and son-in-law) officially held the office.
      marker-yv: yv-n
    - type: text
      text: 'Annas the high priest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was there,
    - type: text
      text: ' and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Caiaphas (Annas’ son-in-law) served as high priest '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 18-36.
      marker-yv: yv-n
    - type: text
      text: 'Caiaphas and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps this is Jonathan, one of Annas’ sons.
      marker-yv: yv-n
    - type: text
      text: 'John and Alexander, and all others who were of high-priestly descent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had put the men in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Sanhedrin sat in a semi-circle.
      marker-yv: yv-n
    - type: text
      text: 'front of them, they repeatedly asked, “By what sort of power, or in what name [that is, by what kind of authority], did you do this [healing]?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter, filled with [the power of] the Holy Spirit, said to them, “Rulers and elders of the people [members of the Sanhedrin, the Jewish High Court], '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if we are being put on trial today [to interrogate us] for a good deed done to [benefit] a disabled man, as to how this man has been restored to health, '
