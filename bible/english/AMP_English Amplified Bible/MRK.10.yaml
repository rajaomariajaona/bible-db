    children:
    - type: text
      text: began
  - type: text
    text: ' questioning Him again about this. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever divorces his wife and marries another woman commits adultery against her;
  - type: text
    text: ' '
  - type: usfm
