    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and if a woman divorces her husband and marries another man, she commits adultery.”
- type: usfm
  marker: s1
  children:
  - type: usfm
