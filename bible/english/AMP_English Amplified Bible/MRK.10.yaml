    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But from the beginning of creation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' '
    - type: usfm
