  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hearing this, the [other] ten became indignant with James and John. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Calling them to Himself, Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You know that those who are recognized as rulers of the Gentiles lord it over them; and their powerful men exercise authority over them
  - type: text
    text: ' [tyrannizing them]. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But this is not how it is among you; instead, whoever wishes to become great among you must be your servant,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and whoever wishes to be first '
    - type: usfm
      marker: it
      children:
      - type: text
