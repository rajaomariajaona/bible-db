    children:
    - type: text
      text: Jesus Blesses Little Children
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'People were bringing children to Him so that He would touch '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bless them, but the disciples reprimanded them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discouraged them [from coming]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But when Jesus saw this, He was indignant and He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Allow the children to come to Me; do not forbid them; for the kingdom of God belongs to such as these.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, whoever does not receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome the kingdom of God like a child will not enter it at all.”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And He took the children [one by one] in His arms and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The basic meaning of the Greek word found here for “blessed” is to speak kindly of someone. Jesus was probably giving the children encouragement as only He could, with His infallible knowledge of each child’s future.
    marker-yv: yv-n
  - type: text
    text: blessed them [with kind, encouraging words], placing His hands on them.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rich Young Ruler
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'As He was leaving on His journey, a man ran up and knelt before Him and asked Him, “Good Teacher [You who are essentially good and morally perfect], what shall I do to inherit eternal life [that is, eternal salvation in the Messiah’s kingdom]?” [Matt 19:16-29; Luke 18:18-30] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was affirming His deity by challenging the man to recognize Him as Messiah.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why do you call Me good? No one is
  - type: text
    text: ' [essentially] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: good
  - type: text
    text: ' [by nature] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: except God alone.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You know the commandments: ‘D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not murder
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not commit adultery
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not steal
    - type: text
      text: ', D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o not testify falsely
    - type: text
      text: ', Do not defraud, H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: onor your father and mother
    - type: text
      text: .’ ”
  - type: text
    text: ' [Ex 20:12-16; Deut 5:16-20] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And he replied to Him, “Teacher, I have [carefully] kept all these [commandments] since my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: After reaching the age of thirteen a Jewish boy was personally responsible for keeping the Law.
    marker-yv: yv-n
  - type: text
    text: 'youth.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Looking at him, Jesus felt a love (high regard, compassion) for him, and He said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“You lack one thing: go and sell all your property and give'
  - type: text
    text: ' [the money] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to the poor, and you will have
  - type: text
    text: ' [abundant] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: treasure in heaven; and come, follow Me
  - type: text
    text: ' [becoming My disciple, believing and trusting in Me and walking the same path of life that I walk].” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the man was saddened at Jesus’ words, and he left grieving, because he owned much property '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had many possessions [which he treasured more than his relationship with God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus looked around and said to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How difficult it will be for those who are wealthy
  - type: text
    text: ' [and cling to possessions and status as security] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the kingdom of God!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The disciples were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What Jesus said ran contrary to the conventional wisdom among the Jews (and other ancient peoples). It was commonly thought that wealthy people who did their duty financially to the poor and their community were assured entry into the kingdom of God.
    marker-yv: yv-n
  - type: text
    text: 'amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bewildered by His words. But Jesus said to them again, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Children, how difficult it is
  - type: text
    text: ' [for those who place their hope and confidence in riches] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the kingdom of God!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is easier for a camel to go through the eye of a needle than for a rich man
  - type: text
    text: ' [who places his faith in wealth or status] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the kingdom of God.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They were completely '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' utterly astonished, and said to Him, “Then who can be saved [from the wrath of God]?” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Looking at them, Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “With people
  - type: text
    text: ' [as far as it depends on them] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: it is impossible, but not with God; for all things are possible with God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Peter started saying to Him, “Look, we have given up everything and followed You [becoming Your disciples and accepting You as Teacher and Lord].” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, there is no one who has given up a house or brothers or sisters or mother or father or children or farms, for My sake and for the gospel’s sake,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who will not receive a hundred times as much now in the present age—houses and brothers and sisters and mothers and children and farms—along with persecutions; and in the age to come, eternal life.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are
    - type: text
      text: ' first will be last, and the last, first.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus’ Sufferings Foretold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now they were on the road going up to Jerusalem, and Jesus was walking on ahead of them; and they were perplexed [at what Jesus had said], and those who were following were alarmed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afraid. And again He took the twelve [disciples] aside and began telling them what was going to happen to Him, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying
  - type: text
    text: ', '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen very carefully: we are going up to Jerusalem, and the Son of Man will be betrayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handed over to the chief priests and the scribes; and they will condemn Him to death and hand Him over to the Gentiles (Romans).'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'They will mock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ridicule Him and spit on Him, and whip (scourge) Him and kill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
    - type: text
      text: ' and three days later He will rise'
  - type: text
    text: ' [from the dead].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'James and John, the two sons of Zebedee, came to Him, saying, “Teacher, we want You to do for us whatever we ask of You.” [Matt 20:20, 21] '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And He replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you want Me to do for you?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'They said to Him, “Grant that we may sit [with You], one on Your right and one on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' left, in Your glory [Your majesty and splendor in Your kingdom].” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'But Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You do not know what you are asking. Are you able to drink the cup that I drink, or to be baptized with the baptism
  - type: text
    text: ' [of suffering and death] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: with which I am baptized?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
