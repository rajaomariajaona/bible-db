      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What did Moses command you?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They said, “Moses allowed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a man
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: to write a certificate of divorce and to send her away
  - type: text
    text: '.” [Deut 24:1-4] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Because of your hardness of hearts
  - type: text
    text: ' [your callousness and insensitivity toward your wives and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God provided for divorce under certain circumstances, but the Pharisees expanded the reasons for divorce and abused God’s provision.
    marker-yv: yv-n
  - type: text
    text: 'provision of God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he wrote you this precept.
  - type: text
    text: ' '
