  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'And they replied to Him, “We are able.” Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The cup that I drink you will drink, and you will be baptized with the baptism with which I am baptized.
  - type: text
