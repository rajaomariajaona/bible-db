    content: 'Then they came to Jericho. And as He was leaving Jericho with His disciples and a large crowd, a blind beggar, Bartimaeus, the son of Timaeus, was sitting beside the road [as was his custom]. [Matt 20:29-34; Luke 18:35-43] '
