    - type: text
      text: Bartimaeus Receives His Sight
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then they came to Jericho. And as He was leaving Jericho with His disciples and a large crowd, a blind beggar, Bartimaeus, the son of Timaeus, was sitting beside the road [as was his custom]. [Matt 20:29-34; Luke 18:35-43] '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'When Bartimaeus heard that it was Jesus of Nazareth, he began to shout and say, “Jesus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A common Messianic title recognizing the Messiah as a descendant of David.
    marker-yv: yv-n
  - type: text
    text: 'Son of David (Messiah), have mercy on me!” '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Many sternly rebuked him, telling him to keep still '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be quiet; but he kept on shouting out all the more, “Son of David (Messiah), have mercy on me!” '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jesus stopped and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Call him.”
  - type: text
    text: ' So they called the blind man, telling him, “Take courage, get up! He is calling for you.” '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Throwing his cloak aside, he jumped up and came to Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'And Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you want Me to do for you?”
  - type: text
    text: ' The blind man said to Him, “Rabboni (my Master), let me regain my sight.” '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go; your faith
  - type: text
    text: ' [and confident trust in My power] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has made you well.”
  - type: text
    text: ' Immediately he regained his sight and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' following Jesus on the road. [Is 42:6, 7]'
