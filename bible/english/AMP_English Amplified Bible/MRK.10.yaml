    marker: wj
    children:
    - type: text
      text: F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or this reason a man shall leave his father and his mother
  - type: text
    text: ' [to establish a home with his wife], [Matt 19:5] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
