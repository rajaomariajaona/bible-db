document_id: REV.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The New Heaven and Earth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw a new heaven and a new earth; for the first heaven and the first earth had passed away (vanished), and there is no longer any '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Whereas heaven is the abode of God, the sea often represents the abode of evil (see Dan 7:3; Mark 5:13; Rev 13:1).
    marker-yv: yv-n
  - type: text
    text: 'sea. [Is 65:17; 66:22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I saw the holy city, new Jerusalem, coming down out of heaven from God, arrayed like a bride adorned for her husband; [John 14:2, 3; Gal 4:26; Heb 11:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and then I heard a loud voice from the throne, saying, “See! The tabernacle of God is among men, and He will live among them, and they will be His people, and God Himself will be with them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: So one early ms reads.
    marker-yv: yv-n
  - type: text
    text: '[as their God,] [Lev 26:11, 12; Ezek 37:27; John 1:14; 1 Cor 3:16, 17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and He will wipe away every tear from their eyes; and there will no longer be death; there will no longer be sorrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' anguish, or crying, or pain; for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: first things
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: former order of things has passed away.” [Is 25:8; 35:10]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And He who sits on the throne said, “Behold, I am making all things new.” Also He said, “Write, for these words are faithful and true [they are accurate, incorruptible, and trustworthy].” [Is 43:19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And He said to me, “It is done. I am the Alpha and the Omega, the Beginning and the End. To the one who thirsts I will give [water] from the fountain of the water of life without cost. [Is 55:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. this refers to those who overcome among the churches in Rev 2; 3 and to all people who believe in Christ Jesus as Lord and Savior.
    marker-yv: yv-n
  - type: text
    text: 'He who overcomes [the world by adhering faithfully to Christ Jesus as Lord and Savior] will inherit these things, and I will be his God and he will be My son. [2 Sam 7:14; 1 John 5:5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But as for the cowards and unbelieving and abominable [who are devoid of character and personal integrity and practice or tolerate immorality], and murderers, and sorcerers [with intoxicating drugs], and idolaters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' occultists [who practice and teach false religions], and all the liars [who knowingly deceive and twist truth], their part will be in the lake that blazes with fire and brimstone, which is the second death.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The New Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then one of the seven angels who had the seven bowls filled with the seven final plagues came and spoke with me, saying, “Come here, I will show you the bride, the wife of the Lamb.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And he carried me away in the Spirit to a vast and lofty mountain, and showed me the holy (sanctified) city of Jerusalem coming down out of heaven from God, [Ezek 40:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'having God’s glory [filled with His radiant light]. The brilliance of it resembled a rare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' very precious jewel, like '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 4:3.
    marker-yv: yv-n
  - type: text
    text: 'jasper, shining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clear as crystal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It had a massive and high wall, with twelve [large] gates, and at the gates [were stationed] twelve angels; and on the gates the names of the twelve tribes of the sons of Israel were written. [Ex 28:21; Ezek 48:30-34] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On the east side [there were] three gates, on the north three gates, on the south three gates, and on the west three gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the wall of the city had twelve foundation stones, and on them the twelve names of the twelve apostles of the Lamb (Christ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The one who was speaking with me had a gold measuring rod to measure the city, and its gates and its wall. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The city is laid out as a square, its length being the same as its width; and he measured the city with his rod—twelve thousand stadia (about 1,400 miles); its length and width and height are equal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He measured its wall also—a hundred forty-four cubits (about 200 feet), '
  - type: usfm
    marker: it
    children:
    - type: text
      text: according to
  - type: text
    text: ' man’s measurements, which are [also] angelic [measurements]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The wall was built of jasper; and the city was pure gold, transparent like clear crystal. [1 Kin 6:30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The foundation stones of the wall of the city were adorned with every kind of precious stone. The first foundation stone was jasper; the second, sapphire; the third, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The modern equivalents of this and some other gemstones are no longer known; descriptions given by ancient writers only partially correlate with the modern stones bearing the same names.
    marker-yv: yv-n
  - type: text
    text: 'chalcedony; the fourth, emerald; [Ex 28:17-20; Is 54:11, 12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'the fifth, sardonyx; the sixth, sardius; the seventh, chrysolite (yellow topaz); the eighth, beryl; the ninth, topaz; the tenth, chrysoprase; the eleventh, jacinth; the twelfth, amethyst. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And the twelve gates were twelve pearls; each separate gate was of one single pearl. And the street (broad way) of the city was pure gold, like transparent crystal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I saw no temple in it, for the Lord God Almighty [the Omnipotent, the Ruler of all] and the Lamb are its temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And the city has no need of the sun nor of the moon to give light to it, for the glory (splendor, radiance) of God has illumined it, and the Lamb is its lamp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' light. [Is 24:23; 60:19, 20] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The nations [the redeemed people from the earth] will walk by its light, and the kings of the earth will bring into it their glory. [Is 60:1-5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'By day (for there will be no night there) its gates will never be closed [in fear of evil]; [Is 60:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and they will bring the glory (splendor, majesty) and the honor of the nations into it; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'and nothing that defiles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' profanes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' is unwashed will ever enter it, nor anyone who practices abominations [detestable, morally repugnant things] and lying, but only those [will be admitted] whose names have been written in the Lamb’s Book of Life. [Dan 12:1]'
