      marker: it
      children:
      - type: text
        text: Naomi Widowed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the days when the judges governed [Israel], there was a famine in the land [of Canaan]. And a certain man of Bethlehem in Judah went to live temporarily in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moab was located on a high plateau on the eastern shore of the Salt (Dead) Sea. The Moabites were related to the Israelites through their common ancestor, Terah. Their primary god was Chemosh, but the Moabites also worshiped many other pagan gods and sometimes engaged in human sacrifice.
      marker-yv: yv-n
    - type: text
      text: 'country of Moab with his wife and his two sons. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to her, “No, we will go with you to your people [in Judah].” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Naomi said, “Go back, my daughters, why should you go with me? Do I still have sons in my womb that may become your husbands? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go back, my daughters, go, for I am too old to have a husband. If I said I have hope, and if I actually had a husband tonight and even gave birth to sons, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'would you wait until they were grown? Would you go without marrying? No, my daughters; for it is much more '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bitter
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: difficult for me than for you, because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' hand has gone against me.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ruth’s Loyalty
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then they wept aloud again; and Orpah kissed her mother-in-law [goodbye], but Ruth clung to her.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Naomi said, “Look, your sister-in-law has gone back to her people and to her gods; turn back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' follow your sister-in-law.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Ruth said, “Do not urge me to leave you or to turn back from following you; for where you go, I will go, and where you lodge, I will lodge. Your people will be my people, and your God, my God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Where you die, I will die, and there I will be buried. May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' do the same to me [as He has done to you], and more also, if anything but death separates me from you.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Naomi saw that Ruth was determined to go with her, she said nothing more.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the two of them went on until they came to Bethlehem. And when they arrived in Bethlehem, the whole city was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Bethlehem was a small city where everyone probably knew everyone else, and Naomi’s husband may have been a prominent man in the city.
      marker-yv: yv-n
    - type: text
      text: 'stirred because of them, and the women asked, “Is this Naomi?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man’s name was Elimelech and his wife’s name was Naomi and his two sons were named Mahlon and Chilion. They were Ephrathites from Bethlehem in Judah. They went to the country of Moab and stayed there. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She said to them, “Do not call me Naomi (sweetness); call me Mara (bitter), for the Almighty has caused me great grief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bitterness. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I left full [with a husband and two sons], but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has brought me back empty. Why call me Naomi, since the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has testified against me and the Almighty has afflicted me?”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Naomi returned from the country of Moab, and with her Ruth the Moabitess, her daughter-in-law. And they arrived in Bethlehem at the beginning of the barley harvest.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elimelech, Naomi’s husband, died, and she was left [a widow] with her two sons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They took wives from the Moabite women; the name of the one was Orpah, and the name of the other was Ruth. They lived there about ten years; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and then both Mahlon and Chilion also died, so the woman [Naomi] was left without her two sons and her husband.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then she set out with her daughters-in-law to return from the country of Moab, for she had heard in Moab how the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had taken care of His people [of Judah] in giving them food. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she left the place where she was living, her two daughters-in-law with her, and they started on the way back to the land of Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Naomi said to her two daughters-in-law, “Go back, each of you return to your mother’s house. May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' show kindness to you as you have shown kindness to the dead and to me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' grant that you find rest, each one in the home of her husband.” Then she kissed them [goodbye], and they wept aloud. '
