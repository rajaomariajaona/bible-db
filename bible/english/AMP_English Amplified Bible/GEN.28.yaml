document_id: GEN.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Is Sent Away
  - type: text
    content: 'So Isaac called Jacob and blessed him and charged him, and said to him, “You shall not marry one of the women of Canaan. '
  '10':
  - type: text
    content: 'Now Jacob left Beersheba [never to see his mother again] and traveled toward Haran. '
  '11':
  - type: text
    content: 'And he came to a certain place and stayed overnight there because the sun had set. Taking one of the stones of the place, he put it under his head and lay down there [to sleep]. '
  '12':
  - type: text
    content: 'He dreamed that there was a ladder (stairway) placed on the earth, and the top of it reached [out of sight] toward heaven; and [he saw] the angels of God ascending and descending on it [going to and from heaven]. [John 1:51] '
  '13':
  - type: text
    content: And behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' stood above '
  - type: text
    content: and
  - type: text
    content: ' around him and said, “I am the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Abraham your [father’s] father and the God of Isaac; I will give to you and to your descendants the land [of promise] on which you are lying. '
  '14':
  - type: text
    content: 'Your descendants shall be as [countless as] the dust of the earth, and you shall spread abroad to the west and the east and the north and the south; and all the families (nations) of the earth shall be blessed through you and your '
  - type: note
    content: I.e. Jesus Christ (the Messiah) is a descendant of Jacob.
  - type: text
    content: 'descendants. [Gen 12:2, 3; 13:16; 22:18; 26:4; Acts 3:25, 26; Gal 3:8, 16] '
  '15':
  - type: text
    content: 'Behold, I am with you and will keep [careful watch over you and guard] you wherever you may go, and I will bring you back to this [promised] land; for I will not leave you until I have done what I have promised you.” '
  '16':
  - type: text
    content: Then Jacob awoke from his sleep and he said, “Without any doubt the L
  - type: heading
    content: ord
  - type: text
    content: ' is in this place, and I did not realize it.” '
  '17':
  - type: text
    content: 'So he was afraid and said, “How fearful '
  - type: text
    content: and
  - type: text
    content: ' awesome is this place! This is none other than the house of God, and this is the gateway to heaven.”'
  '18':
  - type: text
    content: 'So Jacob got up early in the morning, and took the stone he had put under his head and he set it up as a pillar [that is, a monument to the vision in his dream], and he poured [olive] oil on the top of it [to '
  - type: note
    content: I.e. dedicate or declare something sacred for God’s purpose.
  - type: text
    content: 'consecrate it]. '
  '19':
  - type: text
    content: 'He named that place Bethel (the house of God); the previous name of that city was Luz (Almond Tree). '
  '2':
  - type: note
    content: The Hebrew verb “to stand” or “arise” is often used as an instruction to prepare to fulfill a command, somewhat similar to the military command “attention.”
  - type: text
    content: 'Arise, go to Paddan-aram, to the house of Bethuel your mother’s father; and take from there as a wife for yourself one of the daughters of Laban your mother’s brother. '
  '20':
  - type: text
    content: 'Then Jacob made a vow (promise), saying, “If God will be with me and will keep me on this journey that I take, and will give me food to eat and clothing to wear, '
  '21':
  - type: text
    content: and if [He grants that] I return to my father’s house in safety, then the L
  - type: heading
    content: ord
  - type: text
    content: ' will be my God. '
  '22':
  - type: text
    content: This stone which I have set up as a pillar (monument, memorial) will be God’s house [a sacred place to me], and of everything that You give me I will give the tenth to You [as an offering to signify my gratitude and dependence on You].” [Deut 12:8-11; 14:22-26; 26:1-11]
  '3':
  - type: text
    content: 'May '
  - type: note
    content: Heb El Shaddai.
  - type: text
    content: 'God Almighty bless you and make you fruitful and multiply you, so that you may become a [great] company of peoples. '
  '4':
  - type: text
    content: 'May He also give the blessing of Abraham to you and your descendants with you, that you may inherit the [promised] land of your sojournings, which He gave to Abraham.” '
  '5':
  - type: text
    content: Then Isaac sent Jacob away, and he went to Paddan-aram, to Laban, son of Bethuel the Aramean, the brother of Rebekah, the mother of Jacob and Esau.
  '6':
  - type: text
    content: 'Now Esau noticed that Isaac had blessed Jacob and sent him to Paddan-aram to take a wife for himself from there, and that as he blessed him he gave him a prohibition, saying, “You shall not take a wife from the daughters of Canaan,” '
  '7':
  - type: text
    content: 'and that Jacob obeyed his father and his mother and had gone to Paddan-aram. '
  '8':
  - type: text
    content: 'So Esau realized that [his two wives] the daughters of Canaan displeased Isaac his father; '
  '9':
  - type: text
    content: and [to appease his parents] Esau went to [the family of] Ishmael and took as his wife, in addition to the wives he [already] had, Mahalath the daughter of Ishmael, Abraham’s son, the sister of Nebaioth [Ishmael’s firstborn son].
  - type: heading
    content: Jacob’s Dream
