document_id: GEN.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Is Sent Away
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Isaac called Jacob and blessed him and charged him, and said to him, “You shall not marry one of the women of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew verb “to stand” or “arise” is often used as an instruction to prepare to fulfill a command, somewhat similar to the military command “attention.”
    marker-yv: yv-n
  - type: text
    text: 'Arise, go to Paddan-aram, to the house of Bethuel your mother’s father; and take from there as a wife for yourself one of the daughters of Laban your mother’s brother. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'May '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'God Almighty bless you and make you fruitful and multiply you, so that you may become a [great] company of peoples. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'May He also give the blessing of Abraham to you and your descendants with you, that you may inherit the [promised] land of your sojournings, which He gave to Abraham.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Isaac sent Jacob away, and he went to Paddan-aram, to Laban, son of Bethuel the Aramean, the brother of Rebekah, the mother of Jacob and Esau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now Esau noticed that Isaac had blessed Jacob and sent him to Paddan-aram to take a wife for himself from there, and that as he blessed him he gave him a prohibition, saying, “You shall not take a wife from the daughters of Canaan,” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and that Jacob obeyed his father and his mother and had gone to Paddan-aram. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Esau realized that [his two wives] the daughters of Canaan displeased Isaac his father; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: and [to appease his parents] Esau went to [the family of] Ishmael and took as his wife, in addition to the wives he [already] had, Mahalath the daughter of Ishmael, Abraham’s son, the sister of Nebaioth [Ishmael’s firstborn son].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob’s Dream
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now Jacob left Beersheba [never to see his mother again] and traveled toward Haran. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he came to a certain place and stayed overnight there because the sun had set. Taking one of the stones of the place, he put it under his head and lay down there [to sleep]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He dreamed that there was a ladder (stairway) placed on the earth, and the top of it reached [out of sight] toward heaven; and [he saw] the angels of God ascending and descending on it [going to and from heaven]. [John 1:51] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And behold, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' stood above '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' around him and said, “I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Abraham your [father’s] father and the God of Isaac; I will give to you and to your descendants the land [of promise] on which you are lying. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Your descendants shall be as [countless as] the dust of the earth, and you shall spread abroad to the west and the east and the north and the south; and all the families (nations) of the earth shall be blessed through you and your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Jesus Christ (the Messiah) is a descendant of Jacob.
    marker-yv: yv-n
  - type: text
    text: 'descendants. [Gen 12:2, 3; 13:16; 22:18; 26:4; Acts 3:25, 26; Gal 3:8, 16] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Behold, I am with you and will keep [careful watch over you and guard] you wherever you may go, and I will bring you back to this [promised] land; for I will not leave you until I have done what I have promised you.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Jacob awoke from his sleep and he said, “Without any doubt the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is in this place, and I did not realize it.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So he was afraid and said, “How fearful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awesome is this place! This is none other than the house of God, and this is the gateway to heaven.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So Jacob got up early in the morning, and took the stone he had put under his head and he set it up as a pillar [that is, a monument to the vision in his dream], and he poured [olive] oil on the top of it [to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. dedicate or declare something sacred for God’s purpose.
    marker-yv: yv-n
  - type: text
    text: 'consecrate it]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He named that place Bethel (the house of God); the previous name of that city was Luz (Almond Tree). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Jacob made a vow (promise), saying, “If God will be with me and will keep me on this journey that I take, and will give me food to eat and clothing to wear, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: and if [He grants that] I return to my father’s house in safety, then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be my God. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: This stone which I have set up as a pillar (monument, memorial) will be God’s house [a sacred place to me], and of everything that You give me I will give the tenth to You [as an offering to signify my gratitude and dependence on You].” [Deut 12:8-11; 14:22-26; 26:1-11]
