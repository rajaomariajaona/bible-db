document_id: HOS.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God is the Loving Father of His People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Israel was a child [a young nation], I loved him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I called My son out of Egypt. [Matt 2:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The more they [the prophets] called them [to repentance and obedience],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The more they went away from them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They kept sacrificing to the Baals
- type: usfm
  marker: q1
  children:
  - type: text
    text: And burning incense to the carved images.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Yet it is I who taught Ephraim to walk,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taking them in My arms [nurturing the young nation];
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they did not know that I healed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I led them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gently
  - type: text
    text: ' with cords of a man, with bonds of love [guiding them],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I was to them as one who lifts up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eases the yoke [of the law] over their jaws;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I bent down to them and fed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶They will not return to the land of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Assyria will be their king [bringing them into captivity]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because they refused to return '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The sword will whirl against '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall on their cities,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And will demolish the bars of their gates '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fortifications'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will consume them because of their counsels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My people are bent on turning from Me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Though the prophets call them to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the One
  - type: text
    text: ' on high,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'None at all exalts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶How can I give you up, O Ephraim?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I surrender you, O Israel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I make you like Admah?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How can I treat you like '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The cities totally destroyed with Sodom.
    marker-yv: yv-n
  - type: text
    text: Zeboiim?
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart recoils within Me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All My compassions are kindled together [for My nation of Israel]. [Deut 29:23]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will not execute the fierceness of My anger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not return to Ephraim to destroy him again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am God and not man, the Holy One in your midst [who will not revoke My covenant],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will not come in wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' enter the city [in judgment].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will walk after the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [in obedience and worship],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will roar like a lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will roar [summoning them]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' sons will come trembling from the west.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They will come trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hurriedly like birds from Egypt'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like doves from the land of Assyria;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will settle them in their houses [in the land of their inheritance], declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Ephraim surrounds Me with lies
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the house of Israel with deceit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judah is also unruly against God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even against the faithful Holy One.
