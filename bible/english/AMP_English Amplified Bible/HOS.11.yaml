document_id: HOS.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God is the Loving Father of His People
  - type: text
    content: When Israel was a child [a young nation], I loved him,
  - type: text
    content: And I called My son out of Egypt. [Matt 2:15]
  '10':
  - type: text
    content: They will walk after the L
  - type: heading
    content: ord
  - type: text
    content: ' [in obedience and worship],'
  - type: text
    content: Who will roar like a lion;
  - type: text
    content: He will roar [summoning them]
  - type: text
    content: 'And '
  - type: text
    content: His
  - type: text
    content: ' sons will come trembling from the west.'
  '11':
  - type: text
    content: 'They will come trembling '
  - type: text
    content: and
  - type: text
    content: ' hurriedly like birds from Egypt'
  - type: text
    content: And like doves from the land of Assyria;
  - type: text
    content: And I will settle them in their houses [in the land of their inheritance], declares the L
  - type: heading
    content: ord
  - type: text
    content: .
  '12':
  - type: text
    content: ¶Ephraim surrounds Me with lies
  - type: text
    content: And the house of Israel with deceit;
  - type: text
    content: Judah is also unruly against God,
  - type: text
    content: Even against the faithful Holy One.
  '2':
  - type: text
    content: The more they [the prophets] called them [to repentance and obedience],
  - type: text
    content: The more they went away from them;
  - type: text
    content: They kept sacrificing to the Baals
  - type: text
    content: And burning incense to the carved images.
  '3':
  - type: text
    content: Yet it is I who taught Ephraim to walk,
  - type: text
    content: Taking them in My arms [nurturing the young nation];
  - type: text
    content: But they did not know that I healed them.
  '4':
  - type: text
    content: 'I led them '
  - type: text
    content: gently
  - type: text
    content: ' with cords of a man, with bonds of love [guiding them],'
  - type: text
    content: 'And I was to them as one who lifts up '
  - type: text
    content: and
  - type: text
    content: ' eases the yoke [of the law] over their jaws;'
  - type: text
    content: And I bent down to them and fed them.
  '5':
  - type: text
    content: ¶They will not return to the land of Egypt,
  - type: text
    content: But Assyria will be their king [bringing them into captivity]
  - type: text
    content: 'Because they refused to return '
  - type: text
    content: to Me.
  '6':
  - type: text
    content: 'The sword will whirl against '
  - type: text
    content: and
  - type: text
    content: ' fall on their cities,'
  - type: text
    content: 'And will demolish the bars of their gates '
  - type: text
    content: and
  - type: text
    content: ' fortifications'
  - type: text
    content: And will consume them because of their counsels.
  '7':
  - type: text
    content: My people are bent on turning from Me;
  - type: text
    content: 'Though the prophets call them to '
  - type: text
    content: the One
  - type: text
    content: ' on high,'
  - type: text
    content: 'None at all exalts '
  - type: text
    content: Him
  - type: text
    content: .
  '8':
  - type: text
    content: ¶How can I give you up, O Ephraim?
  - type: text
    content: How can I surrender you, O Israel?
  - type: text
    content: How can I make you like Admah?
  - type: text
    content: 'How can I treat you like '
  - type: note
    content: The cities totally destroyed with Sodom.
  - type: text
    content: Zeboiim?
  - type: text
    content: My heart recoils within Me;
  - type: text
    content: All My compassions are kindled together [for My nation of Israel]. [Deut 29:23]
  '9':
  - type: text
    content: I will not execute the fierceness of My anger;
  - type: text
    content: I will not return to Ephraim to destroy him again.
  - type: text
    content: For I am God and not man, the Holy One in your midst [who will not revoke My covenant],
  - type: text
    content: 'And I will not come in wrath '
  - type: text
    content: or
  - type: text
    content: ' enter the city [in judgment].'
