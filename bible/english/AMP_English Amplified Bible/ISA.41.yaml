document_id: ISA.41,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Encouraged
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Listen to Me in silence, you islands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coastlands,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the nations gain their strength;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them come near, then let them speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us come together for judgment [and decide the issue between us concerning the enemy from the east].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Do not fear [anything], for I am with you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be afraid, for I am your God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will strengthen you, be assured I will help you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will certainly take hold of you with My righteous right hand [a hand of justice, of power, of victory, of salvation].’ [Acts 18:10]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Indeed, all those who are angry with you will be put to shame and humiliated;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who strive against you will be as nothing and will perish.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You shall search for those who quarrel with you, but will not find them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They who war against you will be as nothing, as nothing at all.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God keep hold of your right hand; [I am the Lord],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who says to you, ‘Do not fear, I will help you.’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not fear, you worm Jacob, you men of Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will help you,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “and your Redeemer is the Holy One of Israel.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In fact, I have made of you a new, sharp '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A heavy flat wooden sledge composed of several thick boards with sharp pieces of flint or metal embedded on one side. It was dragged over harvested stalks of grain to separate the kernels from the straw.
      marker-yv: yv-n
    - type: text
      text: threshing implement with sharp edges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will thresh the mountains and crush them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make the hills like chaff.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You will winnow them, and the wind will carry them away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a high wind will scatter them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you will rejoice in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will glory in the Holy One of Israel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“The poor and needy are seeking water, but there is none;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their tongues are parched with thirst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', will answer them Myself;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, the God of Israel, will not neglect them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will open rivers on the barren heights
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And springs in the midst of the valleys;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make the wilderness a reed-pool of water
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the dry land springs of water.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will put the cedar in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The acacia, the myrtle and the olive tree;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will place the juniper in the desert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Together with the box tree and the cypress,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Who has stirred up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put into action one from the east [the king of Persia, Cyrus the Great]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Whom He calls in righteousness to His service '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' whom victory meets at every step?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' turns nations over to him'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And subdues kings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes them like dust with his sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like wind-driven chaff with his bow. [Ezra 1:2]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that they may see and know,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And consider and understand together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has done this,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the Holy One of Israel has created it.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Present your case [for idols made by men’s hands],” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Produce your evidence [of divinity],”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the king of Jacob.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them bring forward [their evidence] and tell us what is going to happen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarding the former events, tell what they were,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we may consider them and know their outcome;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or announce to us the things that are going to come.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell us the things that are to come afterward,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we may know that you are gods;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indeed, you should do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' good or do evil, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: and let us be
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: that we may be afraid and fear [you] together [as we observe the miracle].
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear this! You [idols] are less than nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your work is worthless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The worshiper who chooses you [as a god] is repulsive. [1 Cor 8:4]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“I have stirred up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put into action '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cyrus originally came from the east (Is 41:2), but defeated a number of kingdoms north of Babylon early in his reign.
      marker-yv: yv-n
    - type: text
      text: one from the north [the king of Persia, Cyrus the Great], and he has come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the rising of the sun he will call on My Name [in prayer].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will trample on [the Babylonian] officials as on mortar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even as a potter treads clay.” [2 Chr 36:23; Ezra 1:1-3]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who [among the idols] has declared this from the beginning, so that we could know?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or from earlier times, so that we could say, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: “He is
    - type: text
      text: ' [unquestionably] right!”?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In fact, there was no one who declared it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, there was no one who proclaimed it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There was no one at all who heard you speak [for you pagan gods are speechless].
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I was first to say to Zion, ‘Listen carefully, here they are [the Jews who will be restored to their own land].’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to Jerusalem, ‘I will provide a messenger (Isaiah) to bring the good news [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was declared about a hundred and fifty years before it occurred.
      marker-yv: yv-n
    - type: text
      text: 'that Cyrus will be stirred up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put into action to save them].’ [Is 40:9; 52:7]'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But when I look [on the pagan prophets and priests], there is no one [who could predict these events],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there is no counselor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: out of those
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: among them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who, if I ask, can give an answer.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In fact, all of these [pagan prophets and priests] are false;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their works are worthless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their cast images are [merely] wind and emptiness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He (Cyrus) pursues them and passes along safely,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By a way his feet had not traveled before.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who has performed and done this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calling forth [and guiding the destinies of] the generations [of the nations] from the beginning?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: —the first, and with the last [existing before history began, the ever-present, unchanging God]—I am He.’ ”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶The islands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coastlands have seen and they fear;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ends of the earth tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have drawn near and have come.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They each help his neighbor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And say to his brother [as he fashions his idols], “Be of good courage!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the craftsman encourages the goldsmith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he who smooths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: metal
    - type: text
      text: ' with the smith’s hammer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: encourages
    - type: text
      text: ' him who beats the anvil,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saying of the soldering (welding), “That is good”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he fastens the idol with nails,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that it will not totter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' be moved.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you, Israel, My servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob whom I have chosen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The offspring of Abraham My friend, [Heb 2:16; James 2:23]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You whom I [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: seized
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: taken from the ends of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And called from its remotest parts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And said to you, ‘You are My servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have chosen you and have not rejected you [even though you are exiled].
