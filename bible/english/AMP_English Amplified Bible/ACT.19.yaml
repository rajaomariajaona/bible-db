document_id: ACT.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul at Ephesus
  - type: text
    content: 'It happened that while Apollos was in Corinth, Paul went through the upper [inland] districts and came down to Ephesus, and found some disciples. '
  '10':
  - type: text
    content: This continued for two years, so that all the inhabitants of [the west coast province of] Asia [Minor], Jews as well as Greeks, heard the word of the Lord [concerning eternal salvation through faith in Christ].
  - type: heading
    content: Miracles at Ephesus
  '11':
  - type: text
    content: 'God was doing extraordinary '
  - type: text
    content: and
  - type: text
    content: ' unusual miracles by the hands of Paul, '
  '12':
  - type: text
    content: 'so that even handkerchiefs '
  - type: text
    content: or
  - type: text
    content: ' face-towels or aprons that had touched his skin were brought to the sick, and their diseases left them and the evil spirits came out [of them]. '
  '13':
  - type: text
    content: 'Then some of the traveling Jewish exorcists also attempted to call the name of the Lord Jesus over those who had evil spirits, saying, “I implore you '
  - type: text
    content: and
  - type: text
    content: ' solemnly command you by the Jesus whom Paul preaches!” '
  '14':
  - type: text
    content: 'Seven sons of one [named] Sceva, a Jewish chief priest, were doing this. '
  '15':
  - type: text
    content: 'But the evil spirit retorted, “I know '
  - type: text
    content: and
  - type: text
    content: ' recognize '
  - type: text
    content: and
  - type: text
    content: ' acknowledge Jesus, and I know about Paul, but as for you, who are you?” '
  '16':
  - type: text
    content: 'Then the man, in whom was the evil spirit, leaped on them and subdued '
  - type: note
    content: Or both.
  - type: text
    content: 'all of them and overpowered them, so that they ran out of that house [in terror, stripped] naked and wounded. '
  '17':
  - type: text
    content: 'This became known to all who lived in Ephesus, both Jews and Greeks. And fear fell upon them all, and the name of the Lord Jesus was magnified '
  - type: text
    content: and
  - type: text
    content: ' exalted. '
  '18':
  - type: text
    content: 'Many of those who had become believers were coming, confessing and disclosing their [former sinful] practices. '
  '19':
  - type: text
    content: 'And many of those who had practiced magical arts collected their books and [throwing book after book on the pile] began burning them in front of everyone. They calculated their value and found it to be '
  - type: note
    content: Each piece, possibly a drachma, may have been about a day’s wage.
  - type: text
    content: '50,000 pieces of silver. '
  '2':
  - type: text
    content: 'He asked them, “Did you receive the Holy Spirit when you believed [in Jesus as the Christ]?” And they said, “No, we have not even heard that there is a Holy Spirit.” '
  '20':
  - type: text
    content: So the word of the Lord [concerning eternal salvation through faith in Christ] was growing greatly and prevailing.
  '21':
  - type: text
    content: 'Now after these events, Paul determined in the Spirit that he would travel through '
  - type: note
    content: This was a lengthy, circular route for one headed to Jerusalem.
  - type: text
    content: 'Macedonia and Achaia (most of the Greek mainland), and go to Jerusalem, saying, “After I have been there, I must also see Rome [and preach the good news of salvation].” '
  '22':
  - type: text
    content: 'And after sending two of his assistants, Timothy and '
  - type: note
    content: This name is also mentioned in Rom 16:23 and 2 Tim 4:20, but it is uncertain if the references are to the same man. In 1929, a mid-first century inscription was found in Corinth identifying Erastus as the one who paid for an area of pavement in the city square, in return for his appointment as an Aedile (a Roman official responsible for public works and festivals, and empowered to maintain public order).
  - type: text
    content: Erastus, to Macedonia [ahead of him], he stayed on in [the west coast province of] Asia [Minor] for a while.
  '23':
  - type: text
    content: 'About that time there occurred no small disturbance concerning the Way (Jesus, Christianity). '
  '24':
  - type: text
    content: 'Now a man named Demetrius, a silversmith, who made silver shrines of [the goddess] Artemis (Diana), was bringing no small profit to the craftsmen. '
  '25':
  - type: text
    content: 'These [craftsmen] he called together, along with the workmen of similar '
  - type: text
    content: trades,
  - type: text
    content: ' and said, “Men, you are well aware that we make a good living from this business. '
  '26':
  - type: text
    content: 'You see and hear that not only at Ephesus, but almost all over [the province of] Asia, this Paul has persuaded [people to believe his teaching] and has misled a large number of people, claiming that gods made by [human] hands are not '
  - type: text
    content: really
  - type: text
    content: ' gods '
  - type: text
    content: at all
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Not only is there danger that this trade of ours will be discredited, but also that the [magnificent] '
  - type: note
    content: The temple of Artemis at Ephesus served as the primary center of worship for her followers.
  - type: text
    content: 'temple of the great goddess '
  - type: note
    content: Lat Diana in Roman mythology.
  - type: text
    content: 'Artemis will be discredited, and that she whom all Asia and the world worship will even be dethroned '
  - type: text
    content: and
  - type: text
    content: ' lose her glorious magnificence.”'
  '28':
  - type: text
    content: 'When they heard this, they were filled with rage, and they '
  - type: text
    content: began
  - type: text
    content: ' shouting, “Great is Artemis of the Ephesians!” '
  '29':
  - type: text
    content: 'Then the city was filled with confusion; and people rushed together [as a group] into the amphitheater, dragging along with them Gaius and Aristarchus, Macedonians who were Paul’s traveling companions. '
  '3':
  - type: text
    content: 'And he asked, “Into what then were you baptized?” They said, “Into John’s baptism.” '
  '30':
  - type: text
    content: 'Paul wanted to go into the [pagan] assembly, but the disciples would not let him. '
  '31':
  - type: text
    content: 'Even some of the Asiarchs (officials) who were his friends sent '
  - type: text
    content: word
  - type: text
    content: ' to him and repeatedly warned him not to venture into the amphitheater. '
  '32':
  - type: text
    content: 'Now some shouted one thing and some another, for the gathering was in confusion and most of the people did not know '
  - type: note
    content: Or on whose account.
  - type: text
    content: 'why they had come together. '
  '33':
  - type: text
    content: 'Some of the crowd advised Alexander [to speak], since the Jews had pushed him forward; and Alexander motioned with his hand [for attention] and intended to make a defense to the people. '
  '34':
  - type: text
    content: 'But when they realized that he was a Jew, a single outcry went up from the crowd as they shouted for about two hours, “Great is Artemis of the Ephesians!” '
  '35':
  - type: text
    content: 'After the town '
  - type: note
    content: A high ranking official in the town, perhaps more like a mayor than a town clerk. He would have served as a representative between Ephesus and the governing Roman authorities.
  - type: text
    content: clerk had quieted the crowd, he said, “Men of Ephesus, what person is there who does not know that the city of the Ephesians is the guardian of the temple of the great Artemis and of that [
  - type: note
    content: Perhaps a meteorite.
  - type: text
    content: 'sacred stone image of her] which fell from the sky? '
  '36':
  - type: text
    content: 'So, since these things cannot be denied, you ought to be quiet '
  - type: text
    content: and
  - type: text
    content: ' stay calm and not do anything rash. '
  '37':
  - type: text
    content: 'For you have brought these men here who are neither temple robbers nor blasphemers of our goddess. '
  '38':
  - type: text
    content: 'So then, if Demetrius and the craftsmen who are with him have a complaint against anyone, the courts are in session and proconsuls are '
  - type: text
    content: available;
  - type: text
    content: ' let them bring charges against one another there. '
  '39':
  - type: text
    content: 'But if you want anything beyond this, it will be settled in the lawful assembly. '
  '4':
  - type: text
    content: 'Paul said, “John performed a baptism of repentance, '
  - type: text
    content: continually
  - type: text
    content: ' telling the people to believe in Him who was coming after him, that is, [to confidently accept and joyfully believe] in Jesus [the Messiah and Savior].” '
  '40':
  - type: text
    content: 'For we are running the risk of being accused of rioting in regard to today’s events, and since there is no reason for it, we will be unable to give an account '
  - type: text
    content: and
  - type: text
    content: ' justify this disorderly gathering.” '
  '41':
  - type: text
    content: And when he had said these things, he dismissed the assembly.
  '5':
  - type: text
    content: 'After hearing this, they were baptized [again, this time] in the name of the Lord Jesus. '
  '6':
  - type: text
    content: 'And when Paul laid his hands on them, the Holy Spirit came on them, and they '
  - type: text
    content: began
  - type: text
    content: ' speaking in [unknown] tongues (languages) and prophesying. '
  '7':
  - type: text
    content: There were about twelve men in all.
  '8':
  - type: text
    content: 'And he went into the synagogue and for three months spoke boldly, reasoning '
  - type: text
    content: and
  - type: text
    content: ' arguing and persuading '
  - type: text
    content: them
  - type: text
    content: ' about the kingdom of God. '
  '9':
  - type: text
    content: 'But when some were becoming hardened and disobedient [to the word of God], discrediting '
  - type: text
    content: and
  - type: text
    content: ' speaking evil of '
  - type: note
    content: See John 14:6.
  - type: text
    content: 'the Way (Jesus, Christianity) before the congregation, Paul left them, taking the disciples with him, and went on holding '
  - type: note
    content: One Greek manuscript says Paul used the lecture hall from 11:00 a.m. until 4:00 p.m.
  - type: text
    content: 'daily discussions in the lecture hall of Tyrannus [instead of in the synagogue]. '
