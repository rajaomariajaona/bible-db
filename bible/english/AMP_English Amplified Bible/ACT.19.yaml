document_id: ACT.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul at Ephesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'It happened that while Apollos was in Corinth, Paul went through the upper [inland] districts and came down to Ephesus, and found some disciples. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: This continued for two years, so that all the inhabitants of [the west coast province of] Asia [Minor], Jews as well as Greeks, heard the word of the Lord [concerning eternal salvation through faith in Christ].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Miracles at Ephesus
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'God was doing extraordinary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unusual miracles by the hands of Paul, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'so that even handkerchiefs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' face-towels or aprons that had touched his skin were brought to the sick, and their diseases left them and the evil spirits came out [of them]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then some of the traveling Jewish exorcists also attempted to call the name of the Lord Jesus over those who had evil spirits, saying, “I implore you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' solemnly command you by the Jesus whom Paul preaches!” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Seven sons of one [named] Sceva, a Jewish chief priest, were doing this. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But the evil spirit retorted, “I know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acknowledge Jesus, and I know about Paul, but as for you, who are you?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the man, in whom was the evil spirit, leaped on them and subdued '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: both
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'all of them and overpowered them, so that they ran out of that house [in terror, stripped] naked and wounded. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'This became known to all who lived in Ephesus, both Jews and Greeks. And fear fell upon them all, and the name of the Lord Jesus was magnified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalted. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Many of those who had become believers were coming, confessing and disclosing their [former sinful] practices. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And many of those who had practiced magical arts collected their books and [throwing book after book on the pile] began burning them in front of everyone. They calculated their value and found it to be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Each piece, possibly a drachma, may have been about a day’s wage.
      marker-yv: yv-n
    - type: text
      text: '50,000 pieces of silver. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He asked them, “Did you receive the Holy Spirit when you believed [in Jesus as the Christ]?” And they said, “No, we have not even heard that there is a Holy Spirit.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So the word of the Lord [concerning eternal salvation through faith in Christ] was growing greatly and prevailing.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now after these events, Paul determined in the Spirit that he would travel through '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a lengthy, circular route for one headed to Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'Macedonia and Achaia (most of the Greek mainland), and go to Jerusalem, saying, “After I have been there, I must also see Rome [and preach the good news of salvation].” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And after sending two of his assistants, Timothy and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This name is also mentioned in Rom 16:23 and 2 Tim 4:20, but it is uncertain if the references are to the same man. In 1929, a mid-first century inscription was found in Corinth identifying Erastus as the one who paid for an area of pavement in the city square, in return for his appointment as an Aedile (a Roman official responsible for public works and festivals, and empowered to maintain public order).
      marker-yv: yv-n
    - type: text
      text: Erastus, to Macedonia [ahead of him], he stayed on in [the west coast province of] Asia [Minor] for a while.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'About that time there occurred no small disturbance concerning the Way (Jesus, Christianity). '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now a man named Demetrius, a silversmith, who made silver shrines of [the goddess] Artemis (Diana), was bringing no small profit to the craftsmen. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'These [craftsmen] he called together, along with the workmen of similar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trades,
    - type: text
      text: ' and said, “Men, you are well aware that we make a good living from this business. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'You see and hear that not only at Ephesus, but almost all over [the province of] Asia, this Paul has persuaded [people to believe his teaching] and has misled a large number of people, claiming that gods made by [human] hands are not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: really
    - type: text
      text: ' gods '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at all
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Not only is there danger that this trade of ours will be discredited, but also that the [magnificent] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The temple of Artemis at Ephesus served as the primary center of worship for her followers.
      marker-yv: yv-n
    - type: text
      text: 'temple of the great goddess '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lat '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Diana
        - type: text
          text: ' in Roman mythology.'
      marker-yv: yv-n
    - type: text
      text: 'Artemis will be discredited, and that she whom all Asia and the world worship will even be dethroned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lose her glorious magnificence.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When they heard this, they were filled with rage, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' shouting, “Great is Artemis of the Ephesians!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then the city was filled with confusion; and people rushed together [as a group] into the amphitheater, dragging along with them Gaius and Aristarchus, Macedonians who were Paul’s traveling companions. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he asked, “Into what then were you baptized?” They said, “Into John’s baptism.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Paul wanted to go into the [pagan] assembly, but the disciples would not let him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Even some of the Asiarchs (officials) who were his friends sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to him and repeatedly warned him not to venture into the amphitheater. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Now some shouted one thing and some another, for the gathering was in confusion and most of the people did not know '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: on whose account
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'why they had come together. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Some of the crowd advised Alexander [to speak], since the Jews had pushed him forward; and Alexander motioned with his hand [for attention] and intended to make a defense to the people. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'But when they realized that he was a Jew, a single outcry went up from the crowd as they shouted for about two hours, “Great is Artemis of the Ephesians!” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'After the town '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A high ranking official in the town, perhaps more like a mayor than a town clerk. He would have served as a representative between Ephesus and the governing Roman authorities.
      marker-yv: yv-n
    - type: text
      text: clerk had quieted the crowd, he said, “Men of Ephesus, what person is there who does not know that the city of the Ephesians is the guardian of the temple of the great Artemis and of that [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps a meteorite.
      marker-yv: yv-n
    - type: text
      text: 'sacred stone image of her] which fell from the sky? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'So, since these things cannot be denied, you ought to be quiet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stay calm and not do anything rash. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'For you have brought these men here who are neither temple robbers nor blasphemers of our goddess. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'So then, if Demetrius and the craftsmen who are with him have a complaint against anyone, the courts are in session and proconsuls are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: available;
    - type: text
      text: ' let them bring charges against one another there. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'But if you want anything beyond this, it will be settled in the lawful assembly. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Paul said, “John performed a baptism of repentance, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' telling the people to believe in Him who was coming after him, that is, [to confidently accept and joyfully believe] in Jesus [the Messiah and Savior].” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'For we are running the risk of being accused of rioting in regard to today’s events, and since there is no reason for it, we will be unable to give an account '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justify this disorderly gathering.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: And when he had said these things, he dismissed the assembly.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After hearing this, they were baptized [again, this time] in the name of the Lord Jesus. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And when Paul laid his hands on them, the Holy Spirit came on them, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' speaking in [unknown] tongues (languages) and prophesying. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: There were about twelve men in all.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he went into the synagogue and for three months spoke boldly, reasoning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arguing and persuading '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' about the kingdom of God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But when some were becoming hardened and disobedient [to the word of God], discrediting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' speaking evil of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See John 14:6.
      marker-yv: yv-n
    - type: text
      text: 'the Way (Jesus, Christianity) before the congregation, Paul left them, taking the disciples with him, and went on holding '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One Greek manuscript says Paul used the lecture hall from 11:00 a.m. until 4:00 p.m.
      marker-yv: yv-n
    - type: text
      text: 'daily discussions in the lecture hall of Tyrannus [instead of in the synagogue]. '
