    - type: text
      text: Saul among Prophets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Samuel took the flask of oil and poured it on Saul’s head, kissed him, and said, “Has the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' not anointed you as ruler over His inheritance (Israel)? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When you leave me today, you will meet two men beside Rachel’s tomb in the territory of Benjamin at Zelzah; they will say to you, ‘The donkeys you went to look for have been found. And your father has stopped caring about them and is worried about you, saying, “What shall I do about my son?” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then you will go on further from there, and you will come to the terebinth tree of Tabor, and three men going up to [sacrifice to] God at Bethel will meet you there, one carrying three young goats, another carrying three loaves of bread, and another carrying a jug of wine. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They will greet you and give you two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loaves
  - type: text
    text: ' of bread, which you will accept from their hand. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'After that you will come to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gibeath-haelohim
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the hill of God where the garrison of the Philistines is; and when you come there to the city, you will meet a group of prophets coming down from the high place [of worship] with harp, tambourine, flute, and lyre before them, and they will be prophesying. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will come upon you mightily, and you will prophesy with them, and you will be changed into another man. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When these signs come to you, do for yourself whatever '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your hand finds
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the situation requires, for God is with you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You shall go down ahead of me to Gilgal; and behold, I will be coming down to you to offer burnt offerings and to sacrifice peace offerings. You shall wait seven days until I come to you and show you what you must do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then it happened when Saul turned his back to leave Samuel, God changed his heart; and all those signs came to pass that day. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When they came to the hill [Gibeah], behold, a group of prophets met him; and the Spirit of God came on him mightily, and he prophesied [under divine guidance] among them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now when all who knew Saul previously saw that he actually prophesied now [by inspiration] with the prophets, the people said one to another, “What has happened to [Saul, who is nobody but] the son of Kish? Is Saul also among the prophets?” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And a man from there answered, “But who is the father of the others?” So it became a proverb, “Is Saul also among the prophets?” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When Saul had finished prophesying, he went to the high place [of worship].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Saul’s uncle said to him and to his servant, “Where did you go?” And Saul said, “To look for the donkeys. And when we saw that they were nowhere to be found, we went to Samuel [for help].” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saul’s uncle said, “Please tell me, what did Samuel say to you?” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And Saul said to his uncle, “He told us plainly that the donkeys had been found.” But he did not tell him about the matter of the kingdom which Samuel had mentioned.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Saul Publicly Chosen King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then Samuel called the people together to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at Mizpah, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: and he said to Israel, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, ‘It was I who brought Israel up from Egypt, and I rescued you from the hand of the Egyptians and from all the kingdoms that were oppressing you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But today you have rejected your God, who Himself saves you from all your disasters and distresses; yet you have said, ‘No! Set a king over us.’ Now then, present yourselves before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' by your tribes and by your families (clans).”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And when Samuel brought all the tribes of Israel near, the tribe of Benjamin was chosen by lot. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he brought the tribe of Benjamin near by their families, and the family of Matri was chosen by lot. And Saul the son of Kish was chosen by lot; but when they looked for him, he could not be found. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So they inquired further of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “Has the man come here yet?” And the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered, “He is there, hiding himself by the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: baggage
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'provisions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supplies.” [Ex 28:30] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So they ran and took him from there, and when he stood among the people, he was taller than any of the people from his shoulders upward. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Samuel said to all the people, “Do you see him whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has chosen? For there is no one like him among all the people.” So all the people shouted and said, “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Long
  - type: text
    text: ' live the king!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Samuel told the people the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: legal claim,
      - type: text
        text: ' i.e. what a king would require from his subjects.'
    marker-yv: yv-n
  - type: text
    text: requirements of the kingdom, and wrote them in a book and placed it before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. And Samuel sent all the people away, each one to his home. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Saul also went home to Gibeah; and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: men of wealth and influence
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'brave men whose hearts God had touched went with him. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But some '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Belial
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'worthless men said, “How can this man save '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rescue us?” And they regarded Saul with contempt and did not bring him a gift. But he ignored the insult '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' kept silent.'
