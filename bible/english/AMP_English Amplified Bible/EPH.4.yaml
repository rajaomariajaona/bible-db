    content: Unity of the Spirit
  - type: text
    content: 'So I, the prisoner for the Lord, appeal to you to live a life worthy of the calling to which you have been called [that is, to live a life that exhibits godly character, moral courage, personal integrity, and mature behavior—a life that expresses gratitude to God for your salvation], '
