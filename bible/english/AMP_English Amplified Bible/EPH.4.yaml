  '11':
  - type: text
    content: 'And [His gifts to the church were varied and] He Himself appointed some as apostles [special messengers, representatives], some as prophets [who speak a new message from God to the people], some as evangelists [who spread the good news of salvation], and some as pastors and teachers [to shepherd and guide and instruct], '
