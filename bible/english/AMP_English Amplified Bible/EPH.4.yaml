document_id: EPH.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Unity of the Spirit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I, the prisoner for the Lord, appeal to you to live a life worthy of the calling to which you have been called [that is, to live a life that exhibits godly character, moral courage, personal integrity, and mature behavior—a life that expresses gratitude to God for your salvation], '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He who descended is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' same as He who also has ascended high above all the heavens, that He [His presence] might fill all things [that is, the whole universe]). '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And [His gifts to the church were varied and] He Himself appointed some as apostles [special messengers, representatives], some as prophets [who speak a new message from God to the people], some as evangelists [who spread the good news of salvation], and some as pastors and teachers [to shepherd and guide and instruct], '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '[and He did this] to fully equip '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfect the saints (God’s people) for works of service, to build up the body of Christ [the church]; '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'until we all reach oneness in the faith and in the knowledge of the Son of God, [growing spiritually] to become a mature believer, reaching to the measure of the fullness of Christ [manifesting His spiritual completeness and exercising our spiritual gifts in unity]. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So that we are no longer children [spiritually immature], tossed back and forth [like ships on a stormy sea] and carried about by every wind of [shifting] doctrine, by the cunning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trickery of [unscrupulous] men, by the deceitful scheming of people ready to do anything [for personal profit]. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But speaking the truth in love [in all things—both our speech and our lives expressing His truth], let us grow up in all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' into Him [following His example] who is the Head—Christ. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'From Him the whole body [the church, in all its various parts], joined and knitted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: firmly
    - type: text
      text: ' together by what every joint supplies, when each part is working properly, causes the body to grow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mature, building itself up '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 2.
      marker-yv: yv-n
    - type: text
      text: in [unselfish] love.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Christian’s Walk
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this I say, and solemnly affirm together with the Lord [as in His presence], that you must no longer live as the [unbelieving] Gentiles live, in the futility of their minds [and in the foolishness and emptiness of their souls], '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for their [moral] understanding is darkened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their reasoning is clouded; [they are] alienated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' self-banished from the life of God [with no share in it; this is] because of the [willful] ignorance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritual blindness that is [deep-seated] within them, because of the hardness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insensitivity of their heart. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they, [the ungodly in their spiritual apathy], having become callous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unfeeling, have given themselves over [as prey] to unbridled sensuality, eagerly craving the practice of every kind of impurity [that their desires may demand]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with all humility [forsaking self-righteousness], and gentleness [maintaining self-control], with patience, bearing with one another '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: agape)
        - type: text
          text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
      marker-yv: yv-n
    - type: text
      text: 'in [unselfish] love. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you did not learn Christ in this way! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If in fact you have [really] heard Him and have been taught by Him, just as truth is in Jesus [revealed in His life and personified in Him], '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that, regarding your previous way of life, you put off your old self [completely discard your former nature], which is being corrupted through deceitful desires, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' renewed in the spirit of your mind [having a fresh, untarnished mental and spiritual attitude], '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and put on the new self [the regenerated and renewed nature], created in God’s image, [godlike] in the righteousness and holiness of the truth [living in a way that expresses to God your gratitude for your salvation].
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, rejecting all falsehood [whether lying, defrauding, telling half-truths, spreading rumors, any such as these], '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: speak truth each one with his neighbor
    - type: text
      text: ', for we are all parts of one another [and we are all parts of the body of Christ]. [Zech 8:16] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e angry
    - type: text
      text: ' [at sin—at immorality, at injustice, at ungodly behavior], '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: yet do not sin
    - type: text
      text: '; do not let your anger [cause you shame, nor allow it to] last until the sun goes down. [Ps 4:4] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do not give the devil an opportunity [to lead you into sin by holding a grudge, or nurturing anger, or harboring resentment, or cultivating bitterness]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The thief [who has become a believer] must no longer steal, but instead he must work hard [making an honest living], producing that which is good with his own hands, so that he will have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' to share with those in need. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not let unwholesome [foul, profane, worthless, vulgar] words ever come out of your mouth, but only such '
    - type: usfm
      marker: it
      children:
      - type: text
        text: speech
    - type: text
      text: ' as is good for building up others, according to the need '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the occasion, so that it will be a blessing to those who hear [you speak]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make every effort to keep the oneness of the Spirit in the bond of peace [each individual working together to make the whole successful]. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do not grieve the Holy Spirit of God [but seek to please Him], by whom you were sealed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' marked [branded as God’s own] for the day of redemption [the final deliverance from the consequences of sin]. [Eph 1:13, 14; Phil 3:20, 21] '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let all bitterness and wrath and anger and clamor [perpetual animosity, resentment, strife, fault-finding] and slander be put away from you, along with every kind of malice [all spitefulness, verbal abuse, malevolence]. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be kind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' helpful to one another, tender-hearted [compassionate, understanding], forgiving one another [readily and freely], just as God in Christ also forgave '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two early mss read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: us
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: you.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There is
    - type: text
      text: ' one body [of believers] and one Spirit—just as you were called to one hope when called [to salvation]— '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'one Lord, one faith, one baptism, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: one God and Father of us all who is [sovereign] over all and [working] through all and [living] in all.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet grace [God’s undeserved favor] was given to each one of us [not indiscriminately, but in different ways] in proportion to the measure of Christ’s [rich and abundant] gift. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore it says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “W
    - type: usfm
      marker: sc
      children:
      - type: text
        text: hen
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e ascended on high
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e led captivity captive
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e bestowed gifts on men
    - type: text
      text: .” [Ps 68:18]
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '(Now this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: expression,
    - type: text
      text: ' “He ascended,” what does it mean except that He also had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: previously
    - type: text
      text: ' descended [from the heights of heaven] into the lower parts of the earth? '
