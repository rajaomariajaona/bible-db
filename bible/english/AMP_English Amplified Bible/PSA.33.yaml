document_id: PSA.33
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 33
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Praise to the Creator and Preserver.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rejoice in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you righteous ones;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise is becoming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate for those who are upright [in heart—those with moral integrity and godly character].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with the lyre;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing praises to Him with the harp of ten strings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sing to Him a new song;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Play skillfully [on the strings] with a loud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joyful sound.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is right;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all His work is done in faithfulness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He loves righteousness and justice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth is full of the lovingkindness of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶By the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' were the heavens made,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all their host by the breath of His mouth. [Gen 1:1-3; Job 38:4-11; Heb 11:3; 2 Pet 3:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He gathers the waters of the sea together as in a wineskin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He puts the deeps in storehouses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let all the earth fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all the inhabitants of the world stand in awe of Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For He spoke, and it was done;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He commanded, and it stood fast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' nullifies the counsel of the nations;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He makes the thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans of the people ineffective.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The counsel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' stands forever,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plans of His heart through all generations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Blessed [fortunate, prosperous, and favored by God] is the nation whose God is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people whom He has chosen as His own inheritance. [Deut 32:8, 9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' looks [down] from heaven;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He sees all the sons of man;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: From His dwelling place He looks closely
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon all the inhabitants of the earth—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He who fashions the hearts of them all,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who considers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understands all that they do.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The king is not saved by the great size of his army;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A warrior is not rescued by his great strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A horse is a false hope for victory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor does it deliver anyone by its great strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Behold, the eye of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is upon those who fear Him [and worship Him with awe-inspired reverence and obedience],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On those who hope [confidently] in His compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: To rescue their lives from death
- type: usfm
  marker: q1
  children:
  - type: text
    text: And keep them alive in famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: We wait [expectantly] for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is our help and our shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For in Him our heart rejoices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because we trust [lean on, rely on, and are confident] in His holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Let Your [steadfast] lovingkindness, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', be upon us,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In proportion as we have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. placed our confidence.
    marker-yv: yv-n
  - type: text
    text: hoped in You.
