document_id: HOS.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Reaps the Whirlwind
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Set the trumpet to your lips [announcing impending judgment]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Like a [great] vulture '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the enemy comes
    - type: text
      text: ' against the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have broken My covenant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And transgressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebelled against My law.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Yes, even though [with presents] they hire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allies
    - type: text
      text: ' among the nations,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I will gather them up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [in a little while] they will begin '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to be small
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to grow weak '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diminish'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the burden imposed by the king of princes [the king of Assyria].
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶For Ephraim has constructed many altars for sin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are altars intended for sinning [which multiply his guilt].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I wrote for him the ten thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: precepts
    - type: text
      text: ' of My law,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they are regarded as a strange thing [which does not concern him].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: As for My sacrificial offerings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sacrifice the meat [as a mere formality] and eat it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is not pleased with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' does not accept them.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now He will remember '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take into account their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And punish them for their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will return [in captivity] to [another] Egypt [that is, Assyria]. [Deut 28:68]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For Israel has forgotten his Maker and built palaces [and pagan temples],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Judah has built many fortified cities;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I will send a fire upon their cities so that it may consume their palaces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortresses. [Amos 1:4, 7, 10, 12, 14; 2:2, 5]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then they will cry out to Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My God, we of Israel know You!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Israel has rejected the good;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy shall pursue him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They set up kings, but not from Me [therefore without My blessing];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have appointed princes, but I did not know it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With their silver and their gold they made idols for themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they might be cut off.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He has rejected your [pagan] calf, O Samaria, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My wrath burns against them.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will they be incapable of innocence?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For even this [loathsome calf] is from Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A craftsman made it, so it is not God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely the calf of Samaria will be broken to pieces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go up in flames.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For they sow the wind [in evil]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they reap the whirlwind [in disaster].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The standing grain has no growth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It yields no grain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If it were to yield, strangers would swallow it up.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶Israel is [as if] swallowed up [by enemies];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are now among the nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a vessel [of cheap, coarse pottery] that is useless.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For they have gone up to Assyria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Like a wild donkey wandering alone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' taking her own way;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim has hired lovers (pagan allies).
