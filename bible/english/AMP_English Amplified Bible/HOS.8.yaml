document_id: HOS.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Reaps the Whirlwind
  - type: text
    content: Set the trumpet to your lips [announcing impending judgment]!
  - type: text
    content: 'Like a [great] vulture '
  - type: text
    content: the enemy comes
  - type: text
    content: ' against the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Because they have broken My covenant
  - type: text
    content: 'And transgressed '
  - type: text
    content: and
  - type: text
    content: ' rebelled against My law.'
  '10':
  - type: text
    content: 'Yes, even though [with presents] they hire '
  - type: text
    content: allies
  - type: text
    content: ' among the nations,'
  - type: text
    content: Now I will gather them up;
  - type: text
    content: 'And [in a little while] they will begin '
  - type: note
    content: Lit to be small.
  - type: text
    content: 'to grow weak '
  - type: text
    content: and
  - type: text
    content: ' diminish'
  - type: text
    content: Because of the burden imposed by the king of princes [the king of Assyria].
  '11':
  - type: text
    content: ¶For Ephraim has constructed many altars for sin;
  - type: text
    content: They are altars intended for sinning [which multiply his guilt].
  '12':
  - type: text
    content: 'I wrote for him the ten thousand '
  - type: text
    content: precepts
  - type: text
    content: ' of My law,'
  - type: text
    content: But they are regarded as a strange thing [which does not concern him].
  '13':
  - type: text
    content: As for My sacrificial offerings,
  - type: text
    content: They sacrifice the meat [as a mere formality] and eat it,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' is not pleased with them '
  - type: text
    content: and
  - type: text
    content: ' does not accept them.'
  - type: text
    content: 'Now He will remember '
  - type: text
    content: and
  - type: text
    content: ' take into account their wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt,'
  - type: text
    content: And punish them for their sins.
  - type: text
    content: They will return [in captivity] to [another] Egypt [that is, Assyria]. [Deut 28:68]
  '14':
  - type: text
    content: For Israel has forgotten his Maker and built palaces [and pagan temples],
  - type: text
    content: And Judah has built many fortified cities;
  - type: text
    content: 'But I will send a fire upon their cities so that it may consume their palaces '
  - type: text
    content: and
  - type: text
    content: ' fortresses. [Amos 1:4, 7, 10, 12, 14; 2:2, 5]'
  '2':
  - type: text
    content: Then they will cry out to Me,
  - type: text
    content: “My God, we of Israel know You!”
  '3':
  - type: text
    content: Israel has rejected the good;
  - type: text
    content: The enemy shall pursue him.
  '4':
  - type: text
    content: They set up kings, but not from Me [therefore without My blessing];
  - type: text
    content: They have appointed princes, but I did not know it.
  - type: text
    content: With their silver and their gold they made idols for themselves,
  - type: text
    content: That they might be cut off.
  '5':
  - type: text
    content: 'He has rejected your [pagan] calf, O Samaria, '
  - type: text
    content: saying,
  - type: text
    content: “My wrath burns against them.”
  - type: text
    content: How long will they be incapable of innocence?
  '6':
  - type: text
    content: For even this [loathsome calf] is from Israel.
  - type: text
    content: A craftsman made it, so it is not God;
  - type: text
    content: 'Surely the calf of Samaria will be broken to pieces '
  - type: text
    content: and
  - type: text
    content: ' go up in flames.'
  '7':
  - type: text
    content: For they sow the wind [in evil]
  - type: text
    content: And they reap the whirlwind [in disaster].
  - type: text
    content: The standing grain has no growth;
  - type: text
    content: It yields no grain.
  - type: text
    content: If it were to yield, strangers would swallow it up.
  '8':
  - type: text
    content: ¶Israel is [as if] swallowed up [by enemies];
  - type: text
    content: They are now among the nations
  - type: text
    content: Like a vessel [of cheap, coarse pottery] that is useless.
  '9':
  - type: text
    content: For they have gone up to Assyria,
  - type: text
    content: 'Like a wild donkey wandering alone '
  - type: text
    content: and
  - type: text
    content: ' taking her own way;'
  - type: text
    content: Ephraim has hired lovers (pagan allies).
