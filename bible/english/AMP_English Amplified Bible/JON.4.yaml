document_id: JON.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jonah’s Displeasure Rebuked
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But it greatly displeased Jonah and he became angry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He prayed to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said, “O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', is this not what I said when I was still in my country? That is why I ran to Tarshish, because I knew that You are a gracious and compassionate God, slow to anger and great in lovingkindness, and [when sinners turn to You] You revoke the [sentence of] disaster [against them]. [Ex 34:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore now, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', just take my life from me, for it is better for me to die than to live.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “Do you have a good reason to be angry?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Jonah went out of the city and sat east of it. There he made himself a shelter and sat under its shade so that he could see what would happen in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God prepared a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a castor oil plant.
    marker-yv: yv-n
  - type: text
    text: 'plant and it grew up over Jonah, to be a shade over his head to spare him from discomfort. And Jonah was extremely happy about [the protection of] the plant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But God prepared a worm when morning dawned the next day, and it attacked the plant and it withered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When the sun came up God prepared a scorching east wind, and the sun beat down on Jonah’s head so that he fainted and he wished to die, and said, “It is better for me to die than to live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then God said to Jonah, “Do you have a good reason to be angry about [the loss of] the plant?” And he said, “I have a [very] good reason to be angry, angry enough to die!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “You had compassion on the plant for which you did not work and which you did not cause to grow, which came up overnight and perished overnight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Should I not have compassion on Nineveh, the great city in which there are more than 120,000 [innocent] persons, who do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the difference
  - type: text
    text: ' between their right and left hand [and are not yet accountable for sin], as well as many [blameless] animals?”'
