document_id: JON.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah’s Displeasure Rebuked
  - type: text
    content: 'But it greatly displeased Jonah and he became angry. '
  '10':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “You had compassion on the plant for which you did not work and which you did not cause to grow, which came up overnight and perished overnight. '
  '11':
  - type: text
    content: 'Should I not have compassion on Nineveh, the great city in which there are more than 120,000 [innocent] persons, who do not know '
  - type: text
    content: the difference
  - type: text
    content: ' between their right and left hand [and are not yet accountable for sin], as well as many [blameless] animals?”'
  '2':
  - type: text
    content: He prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ' and said, “O L'
  - type: heading
    content: ord
  - type: text
    content: ', is this not what I said when I was still in my country? That is why I ran to Tarshish, because I knew that You are a gracious and compassionate God, slow to anger and great in lovingkindness, and [when sinners turn to You] You revoke the [sentence of] disaster [against them]. [Ex 34:6] '
  '3':
  - type: text
    content: Therefore now, O L
  - type: heading
    content: ord
  - type: text
    content: ', just take my life from me, for it is better for me to die than to live.” '
  '4':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said, “Do you have a good reason to be angry?”'
  '5':
  - type: text
    content: 'Then Jonah went out of the city and sat east of it. There he made himself a shelter and sat under its shade so that he could see what would happen in the city. '
  '6':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' God prepared a '
  - type: note
    content: Probably a castor oil plant.
  - type: text
    content: 'plant and it grew up over Jonah, to be a shade over his head to spare him from discomfort. And Jonah was extremely happy about [the protection of] the plant. '
  '7':
  - type: text
    content: 'But God prepared a worm when morning dawned the next day, and it attacked the plant and it withered. '
  '8':
  - type: text
    content: When the sun came up God prepared a scorching east wind, and the sun beat down on Jonah’s head so that he fainted and he wished to die, and said, “It is better for me to die than to live.”
  '9':
  - type: text
    content: 'Then God said to Jonah, “Do you have a good reason to be angry about [the loss of] the plant?” And he said, “I have a [very] good reason to be angry, angry enough to die!” '
