document_id: JOB.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Eliphaz Says Job Presumes Much
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Eliphaz the Temanite answered [Job] and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Should a wise man [such as you] utter such windy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vain knowledge [as we have just heard]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fill himself with the east wind [of withering, parching, and violent accusations]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Should he rebuke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' argue with useless talk?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or with words in which there is no benefit?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Indeed, you are doing away with fear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you are diminishing meditation before God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “For your guilt teaches your mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And you choose [to speak] the language of the crafty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cunning.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Your own mouth condemns you, and not I;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, your own lips testify against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Were you the first man to be born [the original wise man],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or were you created before the hills?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Do you hear the secret counsel of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do you limit [the possession of] wisdom to yourself?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “What do you know that we do not know?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: What
  - type: text
    text: ' do you understand that is not equally clear to us?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Among us are both the gray-haired and the aged,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Older than your father.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Are the consolations of God [as we have interpreted them to you] too trivial for you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Or] were we too gentle toward you [in our first speech] to be effective?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Why does your heart carry you away [allowing you to be controlled by emotion]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why do your eyes flash [in anger or contempt],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: That you should turn your spirit against God
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And let '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such
  - type: text
    text: ' words [as you have spoken] go out of your mouth?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“What is man, that he should be pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' clean,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or he who is born of a woman, that he should be righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' just?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Behold, God puts no trust in His holy ones (angels);
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, the heavens are not pure in His sight—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: How much less [pure and clean is] the one who is repulsive and corrupt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Man, who drinks unrighteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' injustice like water!'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: What Eliphaz Has Seen of Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶“I will tell you, listen to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what I have seen I will also declare;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: What wise men have [freely] told,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have not hidden [anything passed on to them] from their fathers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: To whom alone the land was given,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And no stranger passed among them [corrupting the truth].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “The wicked man writhes with pain all his days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And numbered are the years stored up for him, the ruthless one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “A [dreadful] sound of terrors is in his ears;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'While at peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in a time of prosperity the destroyer comes upon him [the tent of the robber is not at peace].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “He does not believe that he will return out of the darkness [for fear of being murdered],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he is destined for the sword [of God’s vengeance].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “He wanders about for food, saying, ‘Where is it?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He knows that the day of darkness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction is already at hand.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Distress and anxiety terrify him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They overpower him like a king ready for battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Because he has stretched out his hand against God
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And behaves arrogantly against '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shaddai
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the Almighty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Running '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' charging headlong against Him'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With his ornamented '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' massive shield;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For he has covered his face with his fat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Adding layers of fat to his thighs [giving himself up to pleasures],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And he has lived in desolate [God-forsaken] cities,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In houses which no one should inhabit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which were destined to become heaps [of ruins];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He will not become rich, nor will his wealth endure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his grain will not bend to the earth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' his possessions be extended on the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “He will not escape from darkness [fleeing disaster];
- type: usfm
  marker: q1
  children:
  - type: text
    text: The flame [of God’s wrath] will wither his branch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by the blast of His mouth he will go away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Let him not trust in vanity (emptiness, futility) and be led astray;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For emptiness will be his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: exchange
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: reward [for such living].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “It will be fulfilled while he still lives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his branch will not be green [but shall wither away].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “He will fail to bring his grapes to maturity [leaving them to wither unnourished] on the vine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will cast off blossoms [and fail to bring forth fruit] like the olive tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “For the company of the godless is barren,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fire consumes the tents of bribery (wrong and injustice).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “They conceive mischief and bring forth wickedness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And their inmost soul prepares deceit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fraud.”'
