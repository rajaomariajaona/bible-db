  - type: text
    content: And his branch will not be green [but shall wither away].
  '33':
  - type: text
    content: “He will fail to bring his grapes to maturity [leaving them to wither unnourished] on the vine,
  - type: text
    content: And will cast off blossoms [and fail to bring forth fruit] like the olive tree.
  '34':
  - type: text
    content: “For the company of the godless is barren,
  - type: text
    content: And fire consumes the tents of bribery (wrong and injustice).
  '35':
  - type: text
    content: “They conceive mischief and bring forth wickedness,
  - type: text
