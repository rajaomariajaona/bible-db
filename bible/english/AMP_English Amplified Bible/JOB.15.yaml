  - type: text
    content: and
  - type: text
    content: ' fraud.”'
  '4':
  - type: text
    content: “Indeed, you are doing away with fear,
  - type: text
    content: And you are diminishing meditation before God.
  '5':
  - type: text
    content: “For your guilt teaches your mouth,
  - type: text
    content: 'And you choose [to speak] the language of the crafty '
  - type: text
    content: and
  - type: text
    content: ' cunning.'
  '6':
  - type: text
    content: “Your own mouth condemns you, and not I;
  - type: text
    content: Yes, your own lips testify against you.
  '7':
  - type: text
    content: ¶“Were you the first man to be born [the original wise man],
  - type: text
    content: Or were you created before the hills?
  '8':
  - type: text
    content: “Do you hear the secret counsel of God,
  - type: text
    content: And do you limit [the possession of] wisdom to yourself?
  '9':
  - type: text
    content: “What do you know that we do not know?
  - type: text
