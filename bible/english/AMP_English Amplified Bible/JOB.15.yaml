  '17':
  - type: text
    content: ¶“I will tell you, listen to me;
  - type: text
    content: And what I have seen I will also declare;
  '18':
  - type: text
    content: What wise men have [freely] told,
  - type: text
    content: And have not hidden [anything passed on to them] from their fathers,
  '19':
  - type: text
    content: To whom alone the land was given,
  - type: text
    content: And no stranger passed among them [corrupting the truth].
  '2':
  - type: text
    content: '“Should a wise man [such as you] utter such windy '
  - type: text
    content: and
  - type: text
    content: ' vain knowledge [as we have just heard]'
  - type: text
    content: And fill himself with the east wind [of withering, parching, and violent accusations]?
  '20':
  - type: text
    content: “The wicked man writhes with pain all his days,
  - type: text
    content: And numbered are the years stored up for him, the ruthless one.
  '21':
  - type: text
    content: “A [dreadful] sound of terrors is in his ears;
  - type: text
    content: 'While at peace '
  - type: text
    content: and
  - type: text
    content: ' in a time of prosperity the destroyer comes upon him [the tent of the robber is not at peace].'
  '22':
  - type: text
    content: “He does not believe that he will return out of the darkness [for fear of being murdered],
  - type: text
    content: And he is destined for the sword [of God’s vengeance].
  '23':
  - type: text
    content: “He wanders about for food, saying, ‘Where is it?’
  - type: text
    content: 'He knows that the day of darkness '
  - type: text
    content: and
  - type: text
    content: ' destruction is already at hand.'
  '24':
