  '11':
  - type: text
    content: “Are the consolations of God [as we have interpreted them to you] too trivial for you,
  - type: text
    content: '[Or] were we too gentle toward you [in our first speech] to be effective?'
  '12':
  - type: text
    content: “Why does your heart carry you away [allowing you to be controlled by emotion]?
  - type: text
    content: And why do your eyes flash [in anger or contempt],
  '13':
  - type: text
    content: That you should turn your spirit against God
  - type: text
    content: 'And let '
  - type: text
