document_id: PSA.31,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 31
  - type: heading
    content: A Psalm of Complaint and of Praise.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: In You, O L
  - type: heading
    content: ord
  - type: text
    content: ', I have placed my trust '
  - type: text
    content: and
  - type: text
    content: ' taken refuge;'
  - type: text
    content: 'Let me never be '
  - type: note
    content: I.e. have my expectations in Your goodness be disappointed.
  - type: text
    content: ashamed;
  - type: text
    content: In Your righteousness rescue me.
  '10':
  - type: text
    content: For my life is spent with sorrow
  - type: text
    content: And my years with sighing;
  - type: text
    content: My strength has failed because of my iniquity,
  - type: text
    content: And even my body has wasted away.
  '11':
  - type: text
    content: 'Because of all my enemies I have become a reproach '
  - type: text
    content: and
  - type: text
    content: ' disgrace,'
  - type: text
    content: Especially to my neighbors,
  - type: text
    content: And an object of dread to my acquaintances;
  - type: text
    content: Those who see me on the street run from me.
  '12':
  - type: text
    content: I am forgotten like a dead man, out of mind;
  - type: text
    content: I am like a broken vessel.
  '13':
  - type: text
    content: 'For I have heard the slander '
  - type: text
    content: and
  - type: text
    content: ' whispering of many,'
  - type: text
    content: Terror is on every side;
  - type: text
    content: While they schemed together against me,
  - type: text
    content: They plotted to take away my life. [Jer 20:10]
  '14':
  - type: text
    content: '¶But as for me, I trust [confidently] in You '
  - type: text
    content: and
  - type: text
    content: ' Your greatness, O L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: I said, “You are my God.”
  '15':
  - type: text
    content: My times are in Your hands;
  - type: text
    content: 'Rescue me from the hand of my enemies and from those who pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute me.'
  '16':
  - type: text
    content: Make Your face shine upon Your servant;
  - type: text
    content: Save me in Your lovingkindness.
  '17':
  - type: text
    content: Let me not be put to shame, O L
  - type: heading
    content: ord
  - type: text
    content: ', for I call on You;'
  - type: text
    content: Let the wicked (godless) be put to shame, let them be silent in Sheol (the nether world, the place of the dead).
  '18':
  - type: text
    content: Let the lying lips be mute,
  - type: text
    content: 'Which speak insolently '
  - type: text
    content: and
  - type: text
    content: ' arrogantly against the [consistently] righteous'
  - type: text
    content: With pride and contempt.
  '19':
  - type: text
    content: ¶How great is Your goodness,
  - type: text
    content: Which You have stored up for those who [reverently] fear You,
  - type: text
    content: Which You have prepared for those who take refuge in You,
  - type: note
    content: I.e. human beings.
  - type: text
    content: Before the sons of man!
  '2':
  - type: text
    content: Incline Your ear to me, deliver me quickly;
  - type: text
    content: Be my rock of refuge,
  - type: text
    content: And a strong fortress to save me.
  '20':
  - type: text
    content: 'In the secret place of Your presence You hide them from the plots '
  - type: text
    content: and
  - type: text
    content: ' conspiracies of man;'
  - type: text
    content: You keep them secretly in a shelter (pavilion) from the strife of tongues.
  '21':
  - type: text
    content: Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'For He has shown His marvelous favor '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness to me [when I was assailed] in a besieged city.'
  '22':
  - type: text
    content: As for me, I said in my alarm,
  - type: text
    content: “I am cut off from Your eyes.”
  - type: text
    content: Nevertheless You heard the voice of my supplications (specific requests)
  - type: text
    content: When I cried to You [for help].
  '23':
  - type: text
    content: ¶O love the L
  - type: heading
    content: ord
  - type: text
    content: ', all you His godly ones!'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' preserves the faithful [those with moral and spiritual integrity]'
  - type: text
    content: And fully repays the [self-righteousness of the] arrogant.
  '24':
  - type: text
    content: Be strong and let your hearts take courage,
  - type: text
    content: 'All you who wait for '
  - type: text
    content: and
  - type: text
    content: ' confidently expect the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '3':
  - type: text
    content: Yes, You are my rock and my fortress;
  - type: text
    content: For Your name’s sake You will lead me and guide me.
  '4':
  - type: text
    content: You will draw me out of the net that they have secretly laid for me,
  - type: text
    content: 'For You are my strength '
  - type: text
    content: and
  - type: text
    content: ' my stronghold.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: The ancient rabbis made this statement a bedtime prayer.
  - type: text
    content: Into Your hand I commit my spirit;
  - type: text
    content: You have redeemed me, O L
  - type: heading
    content: ord
  - type: text
    content: ', the God of truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness. [Luke 23:46; Acts 7:59]'
  '6':
  - type: text
    content: ¶I hate those who pay regard to vain (empty, worthless) idols;
  - type: text
    content: But I trust in the L
  - type: heading
    content: ord
  - type: text
    content: ' [and rely on Him with unwavering confidence].'
  '7':
  - type: text
    content: I will rejoice and be glad in Your steadfast love,
  - type: text
    content: Because You have seen my affliction;
  - type: text
    content: You have taken note of my life’s distresses,
  '8':
  - type: text
    content: And You have not given me into the hand of the enemy;
  - type: text
    content: You have set my feet in a broad place.
  '9':
  - type: text
    content: '¶Be gracious '
  - type: text
    content: and
  - type: text
    content: ' compassionate to me, O L'
  - type: heading
    content: ord
  - type: text
    content: ', for I am in trouble;'
  - type: text
    content: 'My eye is clouded '
  - type: text
    content: and
  - type: text
    content: ' weakened by grief, my soul and my body also.'
