document_id: PSA.31
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 31
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm of Complaint and of Praise.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I have placed my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' taken refuge;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let me never be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. have my expectations in Your goodness be disappointed.
    marker-yv: yv-n
  - type: text
    text: ashamed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Your righteousness rescue me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Incline Your ear to me, deliver me quickly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be my rock of refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a strong fortress to save me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Yes, You are my rock and my fortress;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Your name’s sake You will lead me and guide me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You will draw me out of the net that they have secretly laid for me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For You are my strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my stronghold.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis made this statement a bedtime prayer.
    marker-yv: yv-n
  - type: text
    text: Into Your hand I commit my spirit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have redeemed me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness. [Luke 23:46; Acts 7:59]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶I hate those who pay regard to vain (empty, worthless) idols;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I trust in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [and rely on Him with unwavering confidence].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will rejoice and be glad in Your steadfast love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because You have seen my affliction;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have taken note of my life’s distresses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And You have not given me into the hand of the enemy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have set my feet in a broad place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '¶Be gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassionate to me, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for I am in trouble;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My eye is clouded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weakened by grief, my soul and my body also.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For my life is spent with sorrow
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my years with sighing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My strength has failed because of my iniquity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And even my body has wasted away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Because of all my enemies I have become a reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Especially to my neighbors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And an object of dread to my acquaintances;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who see me on the street run from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I am forgotten like a dead man, out of mind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am like a broken vessel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I have heard the slander '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' whispering of many,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terror is on every side;
- type: usfm
  marker: q1
  children:
  - type: text
    text: While they schemed together against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They plotted to take away my life. [Jer 20:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '¶But as for me, I trust [confidently] in You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your greatness, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, “You are my God.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My times are in Your hands;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Rescue me from the hand of my enemies and from those who pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Make Your face shine upon Your servant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save me in Your lovingkindness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Let me not be put to shame, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for I call on You;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the wicked (godless) be put to shame, let them be silent in Sheol (the nether world, the place of the dead).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Let the lying lips be mute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Which speak insolently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogantly against the [consistently] righteous'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With pride and contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶How great is Your goodness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which You have stored up for those who [reverently] fear You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which You have prepared for those who take refuge in You,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. human beings.
    marker-yv: yv-n
  - type: text
    text: Before the sons of man!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In the secret place of Your presence You hide them from the plots '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conspiracies of man;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You keep them secretly in a shelter (pavilion) from the strife of tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For He has shown His marvelous favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness to me [when I was assailed] in a besieged city.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: As for me, I said in my alarm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am cut off from Your eyes.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nevertheless You heard the voice of my supplications (specific requests)
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I cried to You [for help].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶O love the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all you His godly ones!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' preserves the faithful [those with moral and spiritual integrity]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fully repays the [self-righteousness of the] arrogant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Be strong and let your hearts take courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All you who wait for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidently expect the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
