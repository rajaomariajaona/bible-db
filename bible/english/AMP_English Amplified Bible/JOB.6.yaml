  - type: text
    content: and
  - type: text
    content: ' vindication is still in it.'
  '3':
  - type: text
    content: “For now it would be heavier than the sand of the sea;
  - type: text
    content: Therefore my words have been incoherent,
  '30':
  - type: text
    content: '“Is there injustice '
  - type: text
    content: or
  - type: text
    content: ' malice on my tongue?'
  - type: text
    content: Can my palate not discern what is destructive?
  '4':
  - type: text
    content: Because the arrows of the Almighty are within me,
  - type: text
    content: My spirit drinks their poison;
  - type: text
    content: The terrors of God are arrayed against me.
  '5':
  - type: text
    content: “Does the wild donkey bray when he has grass?
  - type: text
    content: Or does the ox low over his fodder?
  '6':
  - type: text
    content: “Can something that has no taste to it be eaten without salt?
  - type: text
    content: Or is there any flavor in the white of an egg?
  '7':
  - type: text
    content: “My soul refuses to touch them;
  - type: text
    content: Such things are like loathsome food to me [sickening and repugnant].
  '8':
  - type: text
    content: ¶“Oh that my request would come to pass,
  - type: text
    content: And that God would grant me the thing that I long for!
  '9':
  - type: text
    content: “I wish that it would please God to crush me,
  - type: text
    content: That He would let loose His hand and cut me off.
