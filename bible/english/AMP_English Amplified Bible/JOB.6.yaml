document_id: JOB.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job’s Friends Are No Help
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Oh, that my grief could actually be weighed
- type: usfm
  marker: q1
  children:
  - type: text
    text: And placed in the balances together with my tragedy [to see if my grief is the grief of a coward]!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “For now it would be heavier than the sand of the sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore my words have been incoherent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Because the arrows of the Almighty are within me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My spirit drinks their poison;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The terrors of God are arrayed against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Does the wild donkey bray when he has grass?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or does the ox low over his fodder?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Can something that has no taste to it be eaten without salt?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or is there any flavor in the white of an egg?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “My soul refuses to touch them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such things are like loathsome food to me [sickening and repugnant].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Oh that my request would come to pass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that God would grant me the thing that I long for!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I wish that it would please God to crush me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That He would let loose His hand and cut me off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Then I would still have consolation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I would jump for joy amid unsparing pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That I have not denied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' hidden the words of the Holy One.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “What strength do I have left, that I should wait [and hope]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And what is ahead of me, that I should be patient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Is my strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endurance that of stones,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or is my flesh made of bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Is it that I have no help within myself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And that success '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wisdom have been driven from me?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '¶“For the despairing man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there should be
  - type: text
    text: ' kindness from his friend;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that he does not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forsake
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: abandon (turn away from) the fear of the Almighty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “My brothers have acted deceitfully like a brook,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like the torrents of brooks that vanish,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Which are dull '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dirty because of ice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And into which the snow melts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hides itself;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When it is warm, they are silent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cease to flow;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When it is hot, they vanish from their place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “The paths of their course wind along,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They go up into nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perish.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Your counsel is as helpful to me as a dry streambed in the heat of summer.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“The caravans of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tema, tribal descendants of the ninth son of Ishmael.
    marker-yv: yv-n
  - type: text
    text: Tema looked [for water],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The caravans of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheba, tribal descendants of Abraham and Keturah.
    marker-yv: yv-n
  - type: text
    text: Sheba waited for them [in vain].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“They were put to shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disappointed because they had trusted [that they would find water];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They came there and were ashamed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Indeed, you have now become like a dried-up stream,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You see a terror [believing me to be a victim of the wrath of God] and are afraid [to be compassionate].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Did I ever say, ‘Give me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: something,
  - type: text
    text: ’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or, ‘Pay a bribe for me from your wealth,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Or, ‘Rescue me from the adversary’s hand,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or, ‘Redeem me from the hand of the tyrants’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ¶“Teach me, and I will be silent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And show me how I have erred.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “How painful are words of honesty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But what does your argument prove?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Do you intend to reprove my words [with a convincing argument],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the words of one in despair belong to the wind [and go ignored]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“You would cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lots
  - type: text
    text: ' (gamble) over the fatherless'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bargain away your friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Now please look at me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: see
  - type: text
    text: ' if I lie to your face [for you know that I would not].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Turn away [from your suspicion], let there be no injustice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Turn away, my righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vindication is still in it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“Is there injustice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' malice on my tongue?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can my palate not discern what is destructive?
