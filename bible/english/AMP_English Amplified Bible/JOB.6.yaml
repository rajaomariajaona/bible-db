document_id: JOB.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job’s Friends Are No Help
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then I would still have consolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I would jump for joy amid unsparing pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That I have not denied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hidden the words of the Holy One.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What strength do I have left, that I should wait [and hope]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And what is ahead of me, that I should be patient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endure?'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Is my strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' endurance that of stones,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or is my flesh made of bronze?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is it that I have no help within myself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And that success '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wisdom have been driven from me?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“For the despairing man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there should be
    - type: text
      text: ' kindness from his friend;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that he does not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsake
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: abandon (turn away from) the fear of the Almighty.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My brothers have acted deceitfully like a brook,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the torrents of brooks that vanish,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which are dull '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dirty because of ice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And into which the snow melts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hides itself;'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When it is warm, they are silent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cease to flow;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When it is hot, they vanish from their place.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The paths of their course wind along,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They go up into nothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perish.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Your counsel is as helpful to me as a dry streambed in the heat of summer.]'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The caravans of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tema, tribal descendants of the ninth son of Ishmael.
      marker-yv: yv-n
    - type: text
      text: Tema looked [for water],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The caravans of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sheba, tribal descendants of Abraham and Keturah.
      marker-yv: yv-n
    - type: text
      text: Sheba waited for them [in vain].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that my grief could actually be weighed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And placed in the balances together with my tragedy [to see if my grief is the grief of a coward]!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They were put to shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disappointed because they had trusted [that they would find water];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They came there and were ashamed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Indeed, you have now become like a dried-up stream,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You see a terror [believing me to be a victim of the wrath of God] and are afraid [to be compassionate].
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Did I ever say, ‘Give me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something,
    - type: text
      text: ’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, ‘Pay a bribe for me from your wealth,’
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, ‘Rescue me from the adversary’s hand,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or, ‘Redeem me from the hand of the tyrants’?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Teach me, and I will be silent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And show me how I have erred.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How painful are words of honesty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what does your argument prove?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do you intend to reprove my words [with a convincing argument],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the words of one in despair belong to the wind [and go ignored]?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You would cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lots
    - type: text
      text: ' (gamble) over the fatherless'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And bargain away your friend.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now please look at me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: see
    - type: text
      text: ' if I lie to your face [for you know that I would not].'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Turn away [from your suspicion], let there be no injustice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Turn away, my righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindication is still in it.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For now it would be heavier than the sand of the sea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore my words have been incoherent,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Is there injustice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' malice on my tongue?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can my palate not discern what is destructive?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the arrows of the Almighty are within me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My spirit drinks their poison;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The terrors of God are arrayed against me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Does the wild donkey bray when he has grass?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or does the ox low over his fodder?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can something that has no taste to it be eaten without salt?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or is there any flavor in the white of an egg?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My soul refuses to touch them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such things are like loathsome food to me [sickening and repugnant].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Oh that my request would come to pass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that God would grant me the thing that I long for!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I wish that it would please God to crush me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That He would let loose His hand and cut me off.
