  '21':
  - type: text
    content: “Indeed, you have now become like a dried-up stream,
  - type: text
    content: You see a terror [believing me to be a victim of the wrath of God] and are afraid [to be compassionate].
  '22':
  - type: text
    content: '“Did I ever say, ‘Give me '
