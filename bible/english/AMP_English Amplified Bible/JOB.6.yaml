  - type: text
    content: Or, ‘Pay a bribe for me from your wealth,’
  '23':
  - type: text
    content: Or, ‘Rescue me from the adversary’s hand,’
  - type: text
    content: Or, ‘Redeem me from the hand of the tyrants’?
  '24':
  - type: text
    content: ¶“Teach me, and I will be silent;
  - type: text
    content: And show me how I have erred.
  '25':
  - type: text
    content: “How painful are words of honesty.
  - type: text
    content: But what does your argument prove?
  '26':
  - type: text
    content: “Do you intend to reprove my words [with a convincing argument],
  - type: text
    content: When the words of one in despair belong to the wind [and go ignored]?
  '27':
