document_id: NUM.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Prophecies of Balaam
  - type: text
    content: 'Then Balaam said to Balak, “Build seven altars for me here, and prepare for me seven bulls and seven rams here.” '
  '10':
  - type: text
    content: “Who can count the dust (the descendants) of Jacob
  - type: text
    content: 'And the number of '
  - type: text
    content: even
  - type: text
    content: ' the fourth part of Israel?'
  - type: text
    content: Let me die the death of the righteous [those who are upright and in right standing with God],
  - type: text
    content: And let my end be like his!” [Ps 37:37; Rev 14:13]
  '11':
  - type: text
    content: 'Then Balak said to Balaam, “What have you done to me? I brought you to curse my enemies, but here you have [thoroughly] blessed them instead!” '
  '12':
  - type: text
    content: 'Balaam answered, “Must I not be obedient '
  - type: text
    content: and
  - type: text
    content: ' careful to speak what the L'
  - type: heading
    content: ord
  - type: text
    content: ' has put in my mouth?”'
  '13':
  - type: text
    content: 'Balak said to him, “Come with me, I implore you, to another place from where you can see them, although you will see only the nearest and not all of them; and curse them for me from there.” '
  '14':
  - type: text
    content: 'So he took Balaam to the field of Zophim to the top of [Mount] Pisgah, and built seven altars, and offered a bull and a ram on each altar. '
  '15':
  - type: text
    content: Balaam said to Balak, “Stand here beside your burnt offering while I go to meet the L
  - type: heading
    content: ord
  - type: text
    content: ' over there.” '
  '16':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' met Balaam and put a speech in his mouth, and said, “Go back to Balak and you shall speak thus.” '
  '17':
  - type: text
    content: When Balaam returned to Balak, he was standing beside his burnt offering, and the leaders of Moab were with him. And Balak said to him, “What has the L
  - type: heading
    content: ord
  - type: text
    content: ' spoken?” '
  '18':
  - type: text
    content: 'Balaam took up his [second] discourse (oracle) and said:'
  - type: text
    content: “Rise up, O Balak, and hear;
  - type: text
    content: Listen [closely] to me, son of Zippor.
  '19':
  - type: text
    content: “God is not a man, that He should lie,
  - type: text
    content: Nor a son of man, that He should repent.
  - type: text
    content: Has He said, and will He not do it?
  - type: text
    content: 'Or has He spoken and will He not make it good '
  - type: text
    content: and
  - type: text
    content: ' fulfill it?'
  '2':
  - type: text
    content: 'Balak did just as Balaam had said, and Balak and Balaam offered a bull and a ram on each altar. '
  '20':
  - type: text
    content: '“Behold, I have received '
  - type: text
    content: His command
  - type: text
    content: ' to bless [Israel].'
  - type: text
    content: He has blessed, and I cannot reverse it.
  '21':
  - type: text
    content: “God has not observed wickedness in Jacob [for he is forgiven],
  - type: text
    content: Nor has He seen trouble in Israel.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' their God is with Israel,'
  - type: text
    content: And the shout of their King is among the people. [Rom 4:7, 8; 1 John 3:1, 2]
  '22':
  - type: text
    content: “God brought them out of Egypt;
  - type: text
    content: They have the strength of a wild ox.
  '23':
  - type: text
    content: '“For there is no enchantment '
  - type: text
    content: or
  - type: text
    content: ' omen against Jacob,'
  - type: text
    content: Nor is there any divination against Israel.
  - type: text
    content: At the proper time it shall be said to Jacob
  - type: text
    content: And to Israel, what has God done!
  '24':
  - type: text
    content: “Behold, a people rises up like a lioness
  - type: text
    content: And lifts itself up like a lion;
  - type: text
    content: He will not lie down until he devours the prey
  - type: text
    content: And drinks the blood of the slain.”
  '25':
  - type: text
    content: 'Then Balak said to Balaam, “Neither curse them at all nor bless them at all!” '
  '26':
  - type: text
    content: But Balaam answered Balak, “Did I not say to you, ‘All that the L
  - type: heading
    content: ord
  - type: text
    content: ' speaks, that I must do?’ ”'
  '27':
  - type: text
    content: 'Then Balak said to Balaam, “Please come; I will take you to another place. Perhaps it will please God to let you curse them for me from there.” '
  '28':
  - type: text
    content: 'So Balak brought Balaam to the top of [Mount] Peor, that overlooks the wasteland. '
  '29':
  - type: text
    content: 'And Balaam said to Balak, “Build seven altars for me here, and prepare for me seven bulls and seven rams here.” '
  '3':
  - type: text
    content: Then Balaam said to Balak, “Stand beside your burnt offering and I will go. Perhaps the L
  - type: heading
    content: ord
  - type: text
    content: ' will come to meet me; and whatever He shows me I will tell you.” So he went to a desolate hill.'
  '30':
  - type: text
    content: Balak did just as Balaam had said, and offered a bull and a ram on each altar.
  '4':
  - type: text
    content: 'Now God met Balaam, who said to Him, “I have prepared seven altars, and I have offered a bull and a ram on each altar.” '
  '5':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' put a speech in Balaam’s mouth, and said, “Return to Balak, and you shall speak thus.” '
  '6':
  - type: text
    content: 'Balaam returned to Balak, and behold, he was standing by his burnt sacrifice, he and all the leaders of Moab. '
  '7':
  - type: text
    content: 'Balaam took up his [first] discourse (oracle) and said:'
  - type: text
    content: “Balak, the king of Moab, has brought me from Aram (Syria),
  - type: text
    content: from the mountains of the east, [saying,]
  - type: text
    content: ‘Come, curse [the descendants of] Jacob for me;
  - type: text
    content: And come, [violently] denounce Israel.’
  '8':
  - type: text
    content: “How shall I curse those whom God has not cursed?
  - type: text
    content: Or how can I [violently] denounce those the L
  - type: heading
    content: ord
  - type: text
    content: ' has not denounced?'
  '9':
  - type: text
    content: “For from the top of the rocks I see Israel,
  - type: text
    content: And from the hills I look at him.
  - type: text
    content: Behold, the people [of Israel] shall dwell alone
  - type: text
    content: And will not be reckoned among the nations.
