document_id: NUM.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Prophecies of Balaam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Balaam said to Balak, “Build seven altars for me here, and prepare for me seven bulls and seven rams here.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Balak did just as Balaam had said, and Balak and Balaam offered a bull and a ram on each altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Balaam said to Balak, “Stand beside your burnt offering and I will go. Perhaps the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will come to meet me; and whatever He shows me I will tell you.” So he went to a desolate hill.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now God met Balaam, who said to Him, “I have prepared seven altars, and I have offered a bull and a ram on each altar.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' put a speech in Balaam’s mouth, and said, “Return to Balak, and you shall speak thus.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Balaam returned to Balak, and behold, he was standing by his burnt sacrifice, he and all the leaders of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Balaam took up his [first] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Balak, the king of Moab, has brought me from Aram (Syria),
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the mountains of the east, [saying,]
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Come, curse [the descendants of] Jacob for me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And come, [violently] denounce Israel.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “How shall I curse those whom God has not cursed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or how can I [violently] denounce those the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has not denounced?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “For from the top of the rocks I see Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the hills I look at him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, the people [of Israel] shall dwell alone
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will not be reckoned among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Who can count the dust (the descendants) of Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the number of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' the fourth part of Israel?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me die the death of the righteous [those who are upright and in right standing with God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let my end be like his!” [Ps 37:37; Rev 14:13]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Balak said to Balaam, “What have you done to me? I brought you to curse my enemies, but here you have [thoroughly] blessed them instead!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Balaam answered, “Must I not be obedient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' careful to speak what the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has put in my mouth?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Balak said to him, “Come with me, I implore you, to another place from where you can see them, although you will see only the nearest and not all of them; and curse them for me from there.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So he took Balaam to the field of Zophim to the top of [Mount] Pisgah, and built seven altars, and offered a bull and a ram on each altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Balaam said to Balak, “Stand here beside your burnt offering while I go to meet the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' over there.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' met Balaam and put a speech in his mouth, and said, “Go back to Balak and you shall speak thus.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When Balaam returned to Balak, he was standing beside his burnt offering, and the leaders of Moab were with him. And Balak said to him, “What has the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoken?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Balaam took up his [second] discourse (oracle) and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Rise up, O Balak, and hear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen [closely] to me, son of Zippor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “God is not a man, that He should lie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor a son of man, that He should repent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has He said, and will He not do it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or has He spoken and will He not make it good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fulfill it?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Behold, I have received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His command
  - type: text
    text: ' to bless [Israel].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has blessed, and I cannot reverse it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “God has not observed wickedness in Jacob [for he is forgiven],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor has He seen trouble in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God is with Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the shout of their King is among the people. [Rom 4:7, 8; 1 John 3:1, 2]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “God brought them out of Egypt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have the strength of a wild ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“For there is no enchantment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' omen against Jacob,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor is there any divination against Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the proper time it shall be said to Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to Israel, what has God done!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Behold, a people rises up like a lioness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And lifts itself up like a lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not lie down until he devours the prey
- type: usfm
  marker: q1
  children:
  - type: text
    text: And drinks the blood of the slain.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Balak said to Balaam, “Neither curse them at all nor bless them at all!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But Balaam answered Balak, “Did I not say to you, ‘All that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' speaks, that I must do?’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Balak said to Balaam, “Please come; I will take you to another place. Perhaps it will please God to let you curse them for me from there.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Balak brought Balaam to the top of [Mount] Peor, that overlooks the wasteland. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And Balaam said to Balak, “Build seven altars for me here, and prepare for me seven bulls and seven rams here.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Balak did just as Balaam had said, and offered a bull and a ram on each altar.
