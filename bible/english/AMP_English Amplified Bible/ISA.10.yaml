document_id: ISA.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Assyria Is God’s Instrument
  - type: text
    content: Woe (judgment is coming) to those [judges] who issue evil statutes,
  - type: text
    content: 'And to those [magistrates] who constantly record unjust '
  - type: text
    content: and
  - type: text
    content: ' oppressive decisions,'
  '10':
  - type: text
    content: “As my hand has reached to the kingdoms of the idols,
  - type: text
    content: 'Whose carved images were greater '
  - type: text
    content: and
  - type: text
    content: ' more feared than those of Jerusalem and Samaria,'
  '11':
  - type: text
    content: Shall I not do to Jerusalem and her images
  - type: text
    content: Just as I have done to Samaria and her idols?” [declares Assyria].
  '12':
  - type: text
    content: 'So when the Lord has completed all His work [of judgment] on Mount Zion and on Jerusalem, '
  - type: text
    content: He will say,
  - type: text
    content: ' “I will punish the fruit [the thoughts, the declarations, and the actions] of the arrogant heart of the king of Assyria and the haughtiness of his pride.” '
  '13':
  - type: text
    content: For the Assyrian king has said,
  - type: text
    content: “I have done this by the power of my [own] hand and by my wisdom,
  - type: text
    content: 'For I have understanding '
  - type: text
    content: and
  - type: text
    content: ' skill.'
  - type: text
    content: I have removed the boundaries of the peoples
  - type: text
    content: And have plundered their treasures;
  - type: text
    content: Like a bull I have brought down those who sat on thrones.
  '14':
  - type: text
    content: “My hand has found the wealth of the people like a nest,
  - type: text
    content: And as one gathers eggs that are abandoned, so I have gathered all the earth;
  - type: text
    content: And there was not one that flapped its wing, or that opened its beak and chirped.”
  '15':
  - type: text
    content: ¶Is the axe able to lift itself over the one who chops with it?
  - type: text
    content: Is the saw able to magnify itself over the one who wields it?
  - type: text
    content: That would be
  - type: text
    content: ' like a club moving those who lift it,'
  - type: text
    content: 'Or like a staff raising '
  - type: text
    content: him who
  - type: text
    content: ' is not [made of] wood [like itself]!'
  '16':
  - type: text
    content: Therefore the Lord, the G
  - type: heading
    content: od
  - type: text
    content: ' of hosts, will send a wasting disease among the stout warriors of Assyria;'
  - type: text
    content: And under his glory a fire will be kindled like a burning flame.
  '17':
  - type: text
    content: And the Light of Israel will become a fire and His Holy One a flame,
  - type: text
    content: 'And it will '
  - type: note
    content: During a single night this prophecy was fulfilled (2 Kin 19:35).
  - type: text
    content: burn and devour Assyria’s thorns and briars in a single day. [2 Kin 19:35-37; Is 31:8, 9; 37:36]
  '18':
  - type: text
    content: The Lord will consume the glory of Assyria’s forest and of its fruitful garden, both soul and body,
  - type: text
    content: And it will be as when a sick man wastes away.
  '19':
  - type: text
    content: And the remaining trees of Assyria’s forest will be so few in number
  - type: text
    content: That a child could write them down.
  - type: heading
    content: A Remnant Will Return
  '2':
  - type: text
    content: So as to deprive the needy of justice
  - type: text
    content: And rob the poor of My people of rightful claims,
  - type: text
    content: So that widows may be their spoil
  - type: text
    content: And that they may plunder the fatherless.
  '20':
  - type: text
    content: Now in that day the remnant of Israel, and those of the house of Jacob who have escaped, will never again rely on the one who struck them, but will truly rely on the L
  - type: heading
    content: ord
  - type: text
    content: ', the Holy One of Israel.'
  '21':
  - type: text
    content: 'A '
  - type: note
    content: See note 7:3.
  - type: text
    content: remnant will return, a remnant of Jacob, to the mighty God.
  '22':
  - type: text
    content: For though your people, O Israel, may be as the sand of the sea,
  - type: text
    content: Only
  - type: text
    content: ' a remnant within them will return;'
  - type: text
    content: The destruction is determined [it is decided and destined for completion], overflowing with justice (righteous punishment). [Rom 9:27, 28]
  '23':
  - type: text
    content: For the Lord, the G
  - type: heading
    content: od
  - type: text
    content: ' of hosts, will execute a complete destruction, one that is decreed, in the midst of all the land.'
  '24':
  - type: text
    content: Therefore, the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts says this, “O My people who dwell in Zion, do not be afraid of the Assyrian who strikes you with a rod and lifts up his staff against you, as [the king of] Egypt did. [Ex 5] '
  '25':
  - type: text
    content: 'For yet a very little while and My indignation [against you] will be fulfilled and My anger '
  - type: text
    content: will be directed
  - type: text
    content: ' toward the destruction of the Assyrian.” '
  '26':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts will brandish a whip against them like the slaughter of Midian at the rock of Oreb; and His staff will be over the [Red] Sea and He will lift it up the way '
  - type: text
    content: He did
  - type: text
    content: ' in [the flight from] Egypt. [Ex 14:26-31; Judg 7:24, 25] '
  '27':
  - type: text
    content: So it will be in that day, that the burden of the Assyrian will be removed from your shoulders and his yoke from your neck. The yoke will be broken because of the fat. [Deut 32:15]
  '28':
  - type: text
    content: ¶The Assyrian has come against Aiath [in Judah],
  - type: text
    content: He has passed through Migron [with his army];
  - type: text
    content: At Michmash he stored his equipment.
  '29':
  - type: text
    content: 'They have gone through the pass, '
  - type: text
    content: saying,
  - type: text
    content: “Geba will be our lodging place for the night.”
  - type: text
    content: Ramah trembles, and Gibeah [the city] of Saul has fled.
  '3':
  - type: text
    content: Now what will you do in the day of [God’s] punishment,
  - type: text
    content: And in the storm of devastation which will come from far away?
  - type: text
    content: To whom will you flee for help?
  - type: text
    content: And where will you leave your wealth [for safekeeping]?
  '30':
  - type: text
    content: Cry aloud with your voice [in consternation], O Daughter of Gallim!
  - type: text
    content: Pay attention, Laishah! Answer her, Anathoth!
  '31':
  - type: text
    content: Madmenah has fled;
  - type: text
    content: The inhabitants of Gebim have fled [with their belongings] to safety.
  '32':
  - type: text
    content: Yet today the Assyrian will halt at Nob [the city of priests];
  - type: text
    content: He shakes his fist at the mountain of the Daughter of Zion, at the hill of Jerusalem.
  '33':
  - type: text
    content: ¶Listen carefully, the Lord, the G
  - type: heading
    content: od
  - type: text
    content: ' of hosts, will lop off the [beautiful] boughs with terrifying force;'
  - type: text
    content: The tall in stature will be cut down
  - type: text
    content: 'And the lofty will be abased '
  - type: text
    content: and
  - type: text
    content: ' humiliated.'
  '34':
  - type: text
    content: 'He will cut down the thickets of the forest with an iron '
  - type: text
    content: axe,
  - type: text
    content: And Lebanon (the Assyrian) will fall by the Mighty One. [Gen 49:24; Is 9:6]
  '4':
  - type: text
    content: 'Nothing '
  - type: text
    content: remains
  - type: text
    content: ' but to crouch among the captives'
  - type: text
    content: Or fall [dead] among the slain [on the battlefield].
  - type: text
    content: 'In '
  - type: text
    content: spite of
  - type: text
    content: ' all this, God’s anger does not turn away,'
  - type: text
    content: But His hand is still stretched out [in judgment].
  '5':
  - type: text
    content: ¶Woe to Assyria, the rod of My anger [against Israel],
  - type: text
    content: 'The staff in whose hand is My indignation '
  - type: text
    content: and
  - type: text
    content: ' fury [against Israel’s disobedience]!'
  '6':
  - type: text
    content: I send Assyria against a godless nation
  - type: text
    content: And commission it against the people of My wrath
  - type: text
    content: To take the spoil and to seize the plunder,
  - type: text
    content: And to trample them down like mud in the streets.
  '7':
  - type: text
    content: Yet it is not Assyria’s intention [to do My will],
  - type: text
    content: Nor does it plan so in its heart,
  - type: text
    content: But instead it is its purpose to destroy
  - type: text
    content: And to cut off many nations.
  '8':
  - type: text
    content: For Assyria says, “Are not my princes all kings?
  '9':
  - type: text
    content: “Is not Calno [conquered] like Carchemish [on the Euphrates]?
  - type: text
    content: Is not Hamath [subdued] like Arpad [her neighbor]?
  - type: text
    content: Is not Samaria [in Israel] like Damascus [in Aram]?
