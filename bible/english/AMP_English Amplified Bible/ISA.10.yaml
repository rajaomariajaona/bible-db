document_id: ISA.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Assyria Is God’s Instrument
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe (judgment is coming) to those [judges] who issue evil statutes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And to those [magistrates] who constantly record unjust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressive decisions,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So as to deprive the needy of justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rob the poor of My people of rightful claims,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that widows may be their spoil
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that they may plunder the fatherless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Now what will you do in the day of [God’s] punishment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the storm of devastation which will come from far away?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To whom will you flee for help?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And where will you leave your wealth [for safekeeping]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remains
  - type: text
    text: ' but to crouch among the captives'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or fall [dead] among the slain [on the battlefield].
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spite of
  - type: text
    text: ' all this, God’s anger does not turn away,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But His hand is still stretched out [in judgment].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Woe to Assyria, the rod of My anger [against Israel],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The staff in whose hand is My indignation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fury [against Israel’s disobedience]!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I send Assyria against a godless nation
- type: usfm
  marker: q1
  children:
  - type: text
    text: And commission it against the people of My wrath
- type: usfm
  marker: q1
  children:
  - type: text
    text: To take the spoil and to seize the plunder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to trample them down like mud in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yet it is not Assyria’s intention [to do My will],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor does it plan so in its heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But instead it is its purpose to destroy
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to cut off many nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For Assyria says, “Are not my princes all kings?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Is not Calno [conquered] like Carchemish [on the Euphrates]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is not Hamath [subdued] like Arpad [her neighbor]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is not Samaria [in Israel] like Damascus [in Aram]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “As my hand has reached to the kingdoms of the idols,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Whose carved images were greater '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more feared than those of Jerusalem and Samaria,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Shall I not do to Jerusalem and her images
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as I have done to Samaria and her idols?” [declares Assyria].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So when the Lord has completed all His work [of judgment] on Mount Zion and on Jerusalem, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He will say,
  - type: text
    text: ' “I will punish the fruit [the thoughts, the declarations, and the actions] of the arrogant heart of the king of Assyria and the haughtiness of his pride.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For the Assyrian king has said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I have done this by the power of my [own] hand and by my wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For I have understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skill.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have removed the boundaries of the peoples
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have plundered their treasures;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a bull I have brought down those who sat on thrones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “My hand has found the wealth of the people like a nest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as one gathers eggs that are abandoned, so I have gathered all the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there was not one that flapped its wing, or that opened its beak and chirped.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶Is the axe able to lift itself over the one who chops with it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is the saw able to magnify itself over the one who wields it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That would be
  - type: text
    text: ' like a club moving those who lift it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or like a staff raising '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him who
  - type: text
    text: ' is not [made of] wood [like itself]!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore the Lord, the G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts, will send a wasting disease among the stout warriors of Assyria;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And under his glory a fire will be kindled like a burning flame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And the Light of Israel will become a fire and His Holy One a flame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And it will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: During a single night this prophecy was fulfilled (2 Kin 19:35).
    marker-yv: yv-n
  - type: text
    text: burn and devour Assyria’s thorns and briars in a single day. [2 Kin 19:35-37; Is 31:8, 9; 37:36]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The Lord will consume the glory of Assyria’s forest and of its fruitful garden, both soul and body,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it will be as when a sick man wastes away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And the remaining trees of Assyria’s forest will be so few in number
- type: usfm
  marker: q1
  children:
  - type: text
    text: That a child could write them down.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Remnant Will Return
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Now in that day the remnant of Israel, and those of the house of Jacob who have escaped, will never again rely on the one who struck them, but will truly rely on the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the Holy One of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 7:3.
    marker-yv: yv-n
  - type: text
    text: remnant will return, a remnant of Jacob, to the mighty God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For though your people, O Israel, may be as the sand of the sea,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Only
  - type: text
    text: ' a remnant within them will return;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The destruction is determined [it is decided and destined for completion], overflowing with justice (righteous punishment). [Rom 9:27, 28]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For the Lord, the G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts, will execute a complete destruction, one that is decreed, in the midst of all the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Therefore, the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts says this, “O My people who dwell in Zion, do not be afraid of the Assyrian who strikes you with a rod and lifts up his staff against you, as [the king of] Egypt did. [Ex 5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For yet a very little while and My indignation [against you] will be fulfilled and My anger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will be directed
  - type: text
    text: ' toward the destruction of the Assyrian.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will brandish a whip against them like the slaughter of Midian at the rock of Oreb; and His staff will be over the [Red] Sea and He will lift it up the way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He did
  - type: text
    text: ' in [the flight from] Egypt. [Ex 14:26-31; Judg 7:24, 25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So it will be in that day, that the burden of the Assyrian will be removed from your shoulders and his yoke from your neck. The yoke will be broken because of the fat. [Deut 32:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ¶The Assyrian has come against Aiath [in Judah],
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has passed through Migron [with his army];
- type: usfm
  marker: q1
  children:
  - type: text
    text: At Michmash he stored his equipment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They have gone through the pass, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Geba will be our lodging place for the night.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ramah trembles, and Gibeah [the city] of Saul has fled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Cry aloud with your voice [in consternation], O Daughter of Gallim!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pay attention, Laishah! Answer her, Anathoth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Madmenah has fled;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The inhabitants of Gebim have fled [with their belongings] to safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Yet today the Assyrian will halt at Nob [the city of priests];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shakes his fist at the mountain of the Daughter of Zion, at the hill of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ¶Listen carefully, the Lord, the G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts, will lop off the [beautiful] boughs with terrifying force;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The tall in stature will be cut down
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the lofty will be abased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humiliated.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'He will cut down the thickets of the forest with an iron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: axe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Lebanon (the Assyrian) will fall by the Mighty One. [Gen 49:24; Is 9:6]
