type_code: eng
verses:
  '1':
  - type: heading
    content: Boaz Will Redeem Ruth
  - type: text
    content: 'Then Naomi her mother-in-law said to Ruth, “My daughter, shall I not look for '
  - type: note
    content: Lit rest.
  - type: text
    content: 'security '
  - type: text
    content: and
  - type: text
    content: ' a home for you, so that it may be well with you? '
  '10':
  - type: text
    content: Then he said, “May you be blessed by the L
  - type: heading
    content: ord
  - type: text
    content: ', my daughter. You have made your last kindness better than the first; for you have not gone after young men, whether poor or rich. '
  '11':
  - type: text
    content: 'Now, my daughter, do not be afraid. I will do for you whatever you ask, since all my people in the city know that you are a woman of excellence. '
  '12':
  - type: text
    content: 'It is true that I am your close relative '
  - type: text
    content: and
  - type: text
    content: ' redeemer; however, there is a relative closer [to you] than I. '
  '13':
  - type: text
    content: Spend the night [here], and in the morning if he will redeem you, fine; let him do it. But if he does not wish to redeem you, then, as the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, I will redeem you. Lie down until the morning.”'
  '14':
  - type: text
    content: So she lay at his feet until the morning, but got up before anyone could recognize another; Boaz said, “
  - type: note
    content: The wording suggests that this was a command Boaz gave to others who were near him on the threshing floor.
  - type: text
    content: 'Do not let it be known that the woman came to the threshing floor [last night].” '
  '15':
  - type: text
    content: 'He also said, “Give me the shawl you are wearing and hold it out.” So Ruth held it and he measured out six measures of barley [into it] and placed it on her. And she went into the city. '
  '16':
  - type: text
    content: 'When she came home, her mother-in-law said, “How did it go, my daughter?” And Ruth told her everything that the man had done for her. '
  '17':
  - type: text
    content: 'She said, “He gave me these six measures of barley, and he said to me, ‘Do not go back to your mother-in-law empty-handed.’ ” '
  '18':
  - type: text
    content: 'Then Naomi said, “Sit '
  - type: text
    content: and
  - type: text
    content: ' wait, my daughter, until you learn how this matter turns out; for the man will not rest until he has settled it today.”'
  '2':
  - type: text
    content: 'Now Boaz, with whose maids you were [working], is he not our relative? See now, he is winnowing barley at the threshing floor tonight. '
  '3':
  - type: text
    content: So wash and anoint yourself [with olive oil], then put on your [
  - type: note
    content: One rabbi said that these were special garments for the Sabbath.
  - type: text
    content: 'best] clothes, and go down to the threshing floor; '
  - type: note
    content: Lit do not reveal yourself to the man.
  - type: text
    content: 'but stay out of the man’s sight until he has finished eating and drinking. '
  '4':
  - type: text
    content: 'When he lies down, notice the place where he is lying, and '
  - type: note
    content: By her action Ruth was expressing her desire and willingness to marry Boaz.
  - type: text
    content: 'go and uncover his feet and lie down. Then he will tell you what to do.” '
  '5':
  - type: text
    content: Ruth answered her, “I will do everything that you say.”
  '6':
  - type: text
    content: 'So she went down to the threshing floor and did just as her mother-in-law had told her. '
  '7':
  - type: text
    content: 'When Boaz had eaten and drunk and his heart was happy, he went to lie down at the end of the stack of grain. Then Ruth came secretly, and uncovered his feet and lay down. '
  '8':
  - type: text
    content: 'In the middle of the night the man was startled and he turned over, and found a woman lying at his feet. '
  '9':
  - type: text
    content: 'So he said, “Who are you?” And she answered, “I am Ruth your maid. Spread the hem of your garment over me, for you are a close relative '
  - type: text
    content: and
  - type: text
    content: ' redeemer.” '
