document_id: RUT.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Boaz Will Redeem Ruth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Naomi her mother-in-law said to Ruth, “My daughter, shall I not look for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: rest
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'security '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a home for you, so that it may be well with you? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then he said, “May you be blessed by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', my daughter. You have made your last kindness better than the first; for you have not gone after young men, whether poor or rich. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now, my daughter, do not be afraid. I will do for you whatever you ask, since all my people in the city know that you are a woman of excellence. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'It is true that I am your close relative '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' redeemer; however, there is a relative closer [to you] than I. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Spend the night [here], and in the morning if he will redeem you, fine; let him do it. But if he does not wish to redeem you, then, as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, I will redeem you. Lie down until the morning.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So she lay at his feet until the morning, but got up before anyone could recognize another; Boaz said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The wording suggests that this was a command Boaz gave to others who were near him on the threshing floor.
      marker-yv: yv-n
    - type: text
      text: 'Do not let it be known that the woman came to the threshing floor [last night].” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'He also said, “Give me the shawl you are wearing and hold it out.” So Ruth held it and he measured out six measures of barley [into it] and placed it on her. And she went into the city. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When she came home, her mother-in-law said, “How did it go, my daughter?” And Ruth told her everything that the man had done for her. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'She said, “He gave me these six measures of barley, and he said to me, ‘Do not go back to your mother-in-law empty-handed.’ ” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Naomi said, “Sit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait, my daughter, until you learn how this matter turns out; for the man will not rest until he has settled it today.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now Boaz, with whose maids you were [working], is he not our relative? See now, he is winnowing barley at the threshing floor tonight. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So wash and anoint yourself [with olive oil], then put on your [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One rabbi said that these were special garments for the Sabbath.
      marker-yv: yv-n
    - type: text
      text: 'best] clothes, and go down to the threshing floor; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: do not reveal yourself to the man
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'but stay out of the man’s sight until he has finished eating and drinking. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When he lies down, notice the place where he is lying, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By her action Ruth was expressing her desire and willingness to marry Boaz.
      marker-yv: yv-n
    - type: text
      text: 'go and uncover his feet and lie down. Then he will tell you what to do.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ruth answered her, “I will do everything that you say.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So she went down to the threshing floor and did just as her mother-in-law had told her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When Boaz had eaten and drunk and his heart was happy, he went to lie down at the end of the stack of grain. Then Ruth came secretly, and uncovered his feet and lay down. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'In the middle of the night the man was startled and he turned over, and found a woman lying at his feet. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So he said, “Who are you?” And she answered, “I am Ruth your maid. Spread the hem of your garment over me, for you are a close relative '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' redeemer.” '
