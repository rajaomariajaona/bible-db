document_id: PSA.45,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 45
  - type: heading
    content: A Song Celebrating the King’s Marriage.
  - type: text
    content: 'To the Chief Musician; set to the [tune of] “Lilies.” A Psalm of the sons of Korah. A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem. A Song of Love.'
  - type: text
    content: ' '
  - type: note
    content: Jesus spoke of what was written of Him “in the Psalms” (see Luke 24:44). This is one such Messianic psalm; however, the capitalization indicating the deity is provided with the understanding that the chapter is written against the background of an ordinary royal wedding with anonymous participants. The New Testament reference to this psalm is in Heb 1:8, 9, where vv 6, 7 is quoted and applied to Christ. The preceding verses could also be applied to Christ, as well as most of the following verses referring to the King. However, v 16 can only apply to a mortal king (see note there).
  - type: text
    content: My heart overflows with a good theme;
  - type: text
    content: I address my psalm to the King.
  - type: text
    content: My tongue is like the pen of a skillful writer.
  '10':
  - type: text
    content: '¶Hear, O daughter, consider and incline your ear [to my instruction]:'
  - type: text
    content: Forget your people and your father’s house;
  '11':
  - type: text
    content: Then the King will desire your beauty;
  - type: text
    content: 'Because He is your Lord, bow down '
  - type: text
    content: and
  - type: text
    content: ' honor Him.'
  '12':
  - type: text
    content: The daughter of Tyre will come with a gift;
  - type: text
    content: The rich among the people will seek your favor.
  '13':
  - type: text
    content: ¶Glorious is the King’s daughter within [the palace];
  - type: text
    content: Her robe is interwoven with gold. [Rev 19:7, 8]
  '14':
  - type: text
    content: She will be brought to the King in embroidered garments;
  - type: text
    content: The virgins, her companions who follow her,
  - type: text
    content: Will be brought to You.
  '15':
  - type: text
    content: With gladness and rejoicing will they be led;
  - type: text
    content: They will enter into the King’s palace.
  '16':
  - type: text
    content: '¶In place of your fathers will be '
  - type: note
    content: Unlike the other references to the King, this verse cannot be applied prophetically to Christ because He had no children. But it is not unusual for a prophecy to have more than one fulfillment (typically in the near future of the prophecy and another in the distant future), and by analogy there is no reason why this psalm cannot refer both to an ordinary king and to the future Messianic King.
  - type: text
    content: your sons;
  - type: text
    content: You shall make princes in all the land.
  '17':
  - type: text
    content: I will make Your name to be remembered in all generations;
  - type: text
    content: 'Therefore the peoples will praise '
  - type: text
    content: and
  - type: text
    content: ' give You thanks forever and ever.'
  '2':
  - type: text
    content: You are fairer than the sons of men;
  - type: text
    content: Graciousness is poured upon Your lips;
  - type: text
    content: Therefore God has blessed You forever.
  '3':
  - type: text
    content: '¶Strap Your sword on '
  - type: text
    content: Your
  - type: text
    content: ' thigh, O mighty One,'
  - type: text
    content: In Your splendor and Your majesty!
  '4':
  - type: text
    content: And in Your majesty ride on triumphantly
  - type: text
    content: For the cause of truth and humility and righteousness;
  - type: text
    content: Let Your right hand guide You to awesome things.
  '5':
  - type: text
    content: Your arrows are sharp;
  - type: text
    content: The peoples (nations) fall under You;
  - type: text
    content: Your arrows
  - type: text
    content: ' pierce the hearts of the King’s enemies.'
  '6':
  - type: text
    content: ¶
  - type: note
    content: This verse has mystified many commentators since God is distinguished from the King in vv 2 and 7, and various translations have been proposed to make the Hebrew rendered “O God” something other than a reference to the deity of the King. But the writer of Hebrews clearly understood it this way.
  - type: text
    content: Your throne, O God, is forever and ever;
  - type: text
    content: The scepter of uprightness is the scepter of Your kingdom.
  '7':
  - type: text
    content: You have loved righteousness (virtue, morality, justice) and hated wickedness;
  - type: text
    content: Therefore God, your God, has anointed You
  - type: text
    content: Above Your companions with the oil of jubilation. [Heb 1:8, 9]
  '8':
  - type: text
    content: 'All Your garments are '
  - type: text
    content: fragrant with
  - type: text
    content: ' myrrh, aloes '
  - type: text
    content: and
  - type: text
    content: ' cassia;'
  - type: text
    content: From ivory palaces stringed instruments have made You glad.
  '9':
  - type: text
    content: Kings’ daughters are among Your noble ladies;
  - type: text
    content: At Your right hand stands the queen in gold from Ophir.
