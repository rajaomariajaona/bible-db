      - type: text
        text: Unlike the other references to the King, this verse cannot be applied prophetically to Christ because He had no children. But it is not unusual for a prophecy to have more than one fulfillment (typically in the near future of the prophecy and another in the distant future), and by analogy there is no reason why this psalm cannot refer both to an ordinary king and to the future Messianic King.
