      - type: text
        text: Jesus spoke of what was written of Him “in the Psalms” (see Luke 24:44). This is one such Messianic psalm; however, the capitalization indicating the deity is provided with the understanding that the chapter is written against the background of an ordinary royal wedding with anonymous participants. The New Testament reference to this psalm is in Heb 1:8, 9, where vv 6, 7 is quoted and applied to Christ. The preceding verses could also be applied to Christ, as well as most of the following verses referring to the King. However, v 16 can only apply to a mortal king (see note there).
