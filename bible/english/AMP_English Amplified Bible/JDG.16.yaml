document_id: JDG.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Samson’s Weakness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Samson went to Gaza and saw a prostitute there, and went in to her. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Gazites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were told,
  - type: text
    text: ' “Samson has come here.” So they surrounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the place
  - type: text
    text: ' and waited all night at the gate of the city to ambush him. They kept quiet all night, saying, “In the morning, when it is light, we will kill him.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But Samson lay [resting] until midnight, then at midnight he got up and took hold of the doors of the city gate and the two door-posts, and pulled them up, [security] bar and all, and he put them on his shoulders and carried them up to the top of the hill which is opposite Hebron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'After this he fell in love with a [Philistine] woman [living] in the Valley of Sorek, whose name was Delilah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the [five] lords (governors) of the Philistines came to her and said to her, “Persuade him, and see where his great strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lies
  - type: text
    text: ' and [find out] how we may overpower him so that we may bind him to subdue him. And each of us will give you eleven hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces
  - type: text
    text: ' of silver.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Delilah said to Samson, “Please tell me where your great strength lies and with what you may be bound and subdued.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samson said to her, “If they bind me with seven fresh cords (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Animal tendons were used as bowstrings. When they were freshly cut, they would contract as they dried, and Samson pretended that he would be incapacitated at that point.
    marker-yv: yv-n
  - type: text
    text: 'tendons) that have not been dried, then I will be weak and be like any [other] man.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the Philistine lords brought her seven fresh cords that had not been dried, and she bound him with them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now she had men lying in ambush in an inner room. And she said to him, “The Philistines are upon you, Samson!” And he broke the cords as a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. candle wick.
    marker-yv: yv-n
  - type: text
    text: string of tow breaks when it touches fire. So [the secret of] his strength was not discovered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Delilah said to Samson, “See now, you have mocked me and told me lies; now please tell me [truthfully] how you may be bound.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He said to her, “If they bind me tightly with new ropes that have not been used, then I will become weak and be like any [other] man.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Delilah took new ropes and bound him with them and said to him, “The Philistines are upon you, Samson!” And the men lying in ambush were in the inner room. But he snapped the ropes off his arms like [sewing] thread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Delilah said to Samson, “Until now you have mocked me and told me lies; tell me [truthfully] with what you may be bound.” And he said to her, “If you weave the seven braids of my hair with the web '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The passage in brackets is found in Greek, but not in any Hebrew mss.
    marker-yv: yv-n
  - type: text
    text: '[and fasten it with a pin, then I will become weak and be like any other man.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So while he slept, Delilah took the seven locks (braids) of his hair and wove them into the web]. And she fastened it with the pin [of the loom] and said to him, “The Philistines are upon you, Samson!” And he awoke from his sleep and pulled out the pin of the [weaver’s] loom and the web.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Delilah Extracts His Secret
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then she said to him, “How can you say, ‘I love you,’ when your heart is not with me? You have mocked me these three times and have not told me where your great strength lies.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When she pressured him day after day with her words and pleaded with him, he was annoyed to death. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then [finally] he told her everything that was in his heart and said to her, “A razor has never been used on my head, for I have been a Nazirite to God from my mother’s womb. If I am shaved, then my strength will leave me, and I will become weak and be like any [other] man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Delilah realized that he had told her everything in his heart, so she sent and called for the Philistine lords, saying, “Come up this once, because he has told me everything in his heart.” Then the Philistine lords came up to her and brought the money [they had promised] in their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'She made Samson sleep on her knees, and she called a man and had him shave off the seven braids of his head. Then she began to abuse Samson, and his strength left him. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: She said, “The Philistines are upon you, Samson!” And he awoke from his sleep and said, “I will go out as I have time after time and shake myself free.” For Samson did not know that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had departed from him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the Philistines seized him and gouged out his eyes; and they brought him down to Gaza and bound him with [two] bronze chains; and he was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: forced to be
  - type: text
    text: ' a grinder [of grain into flour at the mill] in the prison. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But the hair of his head began to grow again after it had been shaved off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Now the Philistine lords gathered together to offer a great sacrifice to Dagon their god, and to celebrate, for they said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our god has given Samson our enemy into our hands!”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When the people saw Samson, they praised their god, for they said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our god has handed over our enemy to us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ravager of our country,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has killed many of us.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now when they were in high spirits, they said, “Call for Samson, so that he may amuse us.” So they called Samson out of the prison, and he entertained them. They made him stand between the pillars. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Samson said to the boy who held him by the hand, “Let me feel the pillars on which the [roof of the] house rests, so that I may lean against them.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Now the house was full of men and women; all the Philistine lords were there, and on the flat roof were about three thousand men and women who looked on while Samson was entertaining them.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Samson Is Avenged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then Samson called to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said, “O Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', please remember me and please strengthen me just this one time, O God, and let me take vengeance on the Philistines for my two eyes.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Samson took hold of the two middle [support] pillars on which the house rested, and braced himself against them, one with his right hand and the other with his left. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And Samson said, “Let me die with the Philistines!” And he stretched out with all his might [collapsing the support pillars], and the house fell on the lords and on all the people who were in it. So the dead whom he killed at his death were more than those whom he had killed during his life. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then his brothers and his father’s entire [tribal] household came down, took him, and brought him up; and they buried him in the tomb of Manoah his father, [which was] between Zorah and Eshtaol. So Samson had judged Israel for twenty years. [Judg 17:6; Heb 11:32]
