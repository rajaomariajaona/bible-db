document_id: 2TI.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Timothy Charged to Guard His Trust
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Paul, an apostle (special messenger, personally chosen representative) of Christ Jesus (the Messiah, the Anointed) by the will of God, according to the promise of life that is in Christ Jesus,
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'but now [that extraordinary purpose and grace] has been fully disclosed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' realized by us through the appearing of our Savior Christ Jesus who [through His incarnation and earthly ministry] abolished death [making it null and void] and brought life and immortality to light through the gospel, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'for which I was appointed a preacher and an apostle and a teacher [of this good news regarding salvation]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'This is why I suffer as I do. Still, I am not ashamed; for I know Him [and I am personally acquainted with Him] whom I have believed [with absolute trust and confidence in Him and in the truth of His deity], and I am persuaded [beyond any doubt] that He is able to guard that which I have entrusted to Him until '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also called the Day of Christ when Christians will be called to account for their actions (2 Cor 5:10).
      marker-yv: yv-n
    - type: text
      text: 'that day [when I stand before Him]. [1 Cor 1:8, 3:13; Phil 1:6] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Keep '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' follow the pattern of sound teaching (doctrine) which you have heard from me, in the faith and love which are in Christ Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Guard [with greatest care] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep unchanged, the treasure [that precious truth] which has been entrusted to you [that is, the good news about salvation through personal faith in Christ Jesus], through [the help of] the Holy Spirit who dwells in us.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'You are aware of the fact that all who are in [the province of] Asia turned away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deserted me, Phygelus and Hermogenes among them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The Lord grant mercy to the family of Onesiphorus, because he often refreshed me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' showed me kindness [comforting and reviving me like fresh air] and he was not ashamed of my chains [for Christ’s sake]; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'but [instead] when he reached Rome, he eagerly searched for me and found me— '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'the Lord grant to him that he may find mercy from the Lord on '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note v 12.
      marker-yv: yv-n
    - type: text
      text: 'that [great] day. You know very well how many things he did for me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' what a help he was at Ephesus [you know better than I can tell you].'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'to Timothy, my beloved son: Grace, mercy, and peace [inner calm and spiritual well-being] from God the Father and Christ Jesus our Lord.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I thank God, whom I worship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serve with a clear conscience the way my forefathers did, as I constantly remember you in my prayers night and day, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and as I recall your tears, I long to see you so that I may be filled with joy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I remember your sincere '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unqualified faith [the surrendering of your entire self to God in Christ with confident trust in His power, wisdom and goodness, a faith] which first lived in [the heart of] your grandmother Lois and your mother Eunice, and I am confident that it is in you as well. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'That is why I remind you to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In ancient times embers were kept slowly burning so that they could be fanned into flames when a fire was needed.
      marker-yv: yv-n
    - type: text
      text: 'fan into flame the gracious gift of God, [that inner fire—the special endowment] which is in you through the laying on of my hands [with those of the elders at your ordination]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For God did not give us a spirit of timidity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cowardice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' fear, but [He has given us a spirit] of power and of love and of sound judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' personal discipline [abilities that result in a calm, well-balanced mind and self-control].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So do not be ashamed to testify about our Lord or about me His prisoner, but with me take your share of suffering for the gospel [continue to preach regardless of the circumstances], in accordance with the power of God [for His power is invincible], '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'for He delivered us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saved us and called us with a holy calling [a calling that leads to a consecrated life—a life set apart—a life of purpose], not because of our works [or because of any personal merit—we could do nothing to earn this], but because of His own purpose and grace [His amazing, undeserved favor] which was granted to us in Christ Jesus before the world began [eternal ages ago], '
