verses:
  '1':
  - type: heading
    content: David in Old Age
  - type: text
    content: 'Now King David was '
  - type: note
    content: I.e. about seventy years old.
  - type: text
    content: 'old, advanced in years; they covered him with clothes, but he could not get warm. '
  '10':
  - type: text
    content: But he did not invite Nathan the prophet, Benaiah, the most formidable warriors, or his brother Solomon.
  - type: heading
    content: Nathan and Bathsheba
  '11':
  - type: text
    content: 'Then Nathan spoke to Bathsheba the mother of Solomon, “Have you not heard that Adonijah the son of Haggith has become king, and David our lord does not know about it? '
  '12':
  - type: text
    content: 'Come now, please let me advise you and save your life and the life of your son Solomon. [2 Sam 12:24, 25] '
  '13':
  - type: text
    content: 'Go at once to King David and say to him, ‘Did you not, my lord, O king, swear to your maidservant, saying, “Solomon your son shall certainly be king after me, and he shall sit on my throne”? Why then has Adonijah become king?’ '
  '14':
  - type: text
    content: Behold, while you are still there speaking with the king, I will come in after you and confirm your words.”
  '15':
  - type: text
    content: 'So Bathsheba went to the king in his bedroom. Now the king was very old '
  - type: text
    content: and
  - type: text
    content: ' weak, and Abishag the Shunammite was attending the king. '
  '16':
  - type: text
    content: So Bathsheba bowed down and paid respect to the king. And the king said, “
  - type: note
    content: Lit What to you.
  - type: text
    content: 'What do you wish?” '
  '17':
  - type: text
    content: She said to him, “My lord, you swore by the L
  - type: heading
    content: ord
  - type: text
    content: ' your God to your maidservant, '
  - type: text
    content: saying,
  - type: text
    content: ' ‘Solomon your son shall certainly be king after me and he shall sit on my throne.’ '
  '18':
  - type: text
    content: 'But now, behold, Adonijah is [acting as] king; and now [as things stand], my lord the king, you do not know it. '
  '19':
  - type: text
    content: 'He has sacrificed oxen and fattened steers and sheep in abundance, and has invited all the king’s sons and Abiathar the priest and Joab the commander of the army [to a feast], but he did not invite your servant Solomon. '
  '2':
  - type: text
    content: 'So his servants said to him, “Let a young virgin be found for my lord the king and let her attend him and become his nurse; let her lie against your chest, so that my lord the king may feel warm.” '
  '20':
  - type: text
    content: 'Now as for you, my lord the king, the eyes of all '
  - type: note
    content: In general, sons of Israel or Israel or Israelites refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision sons of Israel or Israel or Israelites usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. sons of Reuben, Reuben, Reubenites and so throughout.
  - type: text
    content: 'Israel are on you [waiting for you] to tell them who shall sit on the throne of my lord the king after him. '
  '21':
  - type: text
    content: 'Otherwise it will come about when my lord the king lies down [in death] with his fathers, that I and my son Solomon will be considered '
  - type: note
    content: Lit sinners.
  - type: text
    content: political enemies.”
  '22':
  - type: text
    content: 'While she was still speaking with the king, Nathan the prophet came in. '
  '23':
  - type: text
    content: 'The king was told, “Here is Nathan the prophet.” And when he came before the king, he bowed before the king with his face to the ground. '
  '24':
  - type: text
    content: 'Then Nathan said, “My lord the king, have you said, ‘Adonijah shall be king after me, and he shall sit on my throne’? '
  '25':
  - type: text
    content: Because he has gone down today [to En-Rogel] and has sacrificed oxen and fattened steers and sheep in abundance, and has invited all the king’s sons, the commanders of the army and Abiathar the priest [to this feast]; and [right now] they are eating and drinking in his presence; and they say, ‘
  - type: text
    content: Long
  - type: text
    content: ' live King Adonijah!’ '
  '26':
  - type: text
    content: 'But he has not invited me, your servant, nor Zadok the priest, nor Benaiah the son of Jehoiada, nor your servant Solomon. '
  '27':
  - type: text
    content: If this thing has been done by my lord the king, why have you not shown your servants who shall sit on the throne of my lord the king after him?”
  '28':
  - type: text
    content: 'King David answered, “Call Bathsheba to me.” And she came into the king’s presence and stood before him. '
  '29':
  - type: text
    content: Then the king swore an oath and said, “As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, who has redeemed my soul from all distress, '
  '3':
  - type: text
    content: 'So they searched for a beautiful girl throughout the territory of Israel, and found Abishag the '
  - type: note
    content: The town of Shunam was located within the territory of Issachar.
  - type: text
    content: 'Shunammite, and brought her to the king. '
  '30':
  - type: text
    content: even as I swore to you by the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, saying, ‘Solomon your son shall certainly be king after me, and he shall sit on my throne in my place’; I will indeed do so this '
  - type: text
    content: very
  - type: text
    content: ' day.” '
  '31':
  - type: text
    content: Bathsheba bowed down with her face to the ground, and laid herself face down before the king and said, “May my lord King David live forever!”
  '32':
  - type: text
    content: 'Then King David said, “Call Zadok the priest, Nathan the prophet, and Benaiah the son of Jehoiada to me.” And they came before the king. '
  '33':
  - type: text
    content: 'The king told them, “Take the '
  - type: note
    content: This group would have included David’s personal bodyguards.
  - type: text
    content: 'servants of your lord with you and have Solomon my son '
  - type: note
    content: Placing Solomon on his royal mule announced to the people that David had chosen Solomon as his successor.
  - type: text
    content: 'ride on my own mule, and bring him down to [the spring at] '
  - type: note
    content: This was near En-rogel, the site of Adonijah’s celebration.
  - type: text
    content: 'Gihon [in the Kidron Valley]. '
  '34':
  - type: text
    content: Let Zadok the priest and Nathan the prophet anoint him there as king over Israel. Then blow the trumpet and say, ‘
  - type: text
    content: Long
  - type: text
    content: ' live King Solomon!’ '
  '35':
  - type: text
    content: 'Then you shall come up [to Jerusalem] after him, and he shall come and sit on my throne and he shall reign '
  - type: text
    content: as king
  - type: text
    content: ' in my place; for I have appointed him to be ruler over Israel and Judah.” '
  '36':
  - type: text
    content: Benaiah [the overseer of the king’s bodyguards], the son of Jehoiada answered the king and said, “Amen! (So be it!) May the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of my lord the king, say so too. '
  '37':
  - type: note
    content: This was a declaration of support for David and his choice of Solomon.
  - type: text
    content: Just as the L
  - type: heading
    content: ord
  - type: text
    content: ' has been with my lord the king, so may He be with Solomon, and make his throne greater than the throne of my lord King David!”'
  - type: heading
    content: Solomon Anointed King
  '38':
  - type: text
    content: 'So Zadok the priest, Nathan the prophet, Benaiah the son of Jehoiada, the Cherethites, and the Pelethites [the king’s bodyguards] went down [from Jerusalem] and had Solomon ride on King David’s mule, and brought him to [the spring at] Gihon. '
  '39':
  - type: text
    content: Zadok the priest took a horn of [olive] oil from the [sacred] tent and anointed Solomon. They blew the trumpet, and all the people said, “
  - type: text
    content: Long
  - type: text
    content: ' live King Solomon!” '
  '4':
  - type: text
    content: 'The girl was very beautiful; and she became the king’s nurse and served him, but the king '
  - type: note
    content: Lit did not know her.
  - type: text
    content: was not intimate with her.
  '40':
  - type: text
    content: 'All the people went up after him, and they were playing on flutes and rejoicing with great joy, so that the earth shook '
  - type: text
    content: and
  - type: text
    content: ' seemed to burst open with their [joyful] sound.'
  '41':
  - type: text
    content: Now Adonijah and all the guests who were with him heard it as they finished eating. When Joab heard the trumpet sound, he said, “
  - type: note
    content: Gihon was nearby, but because of the topography it was not visible.
  - type: text
    content: 'Why is the city in such an uproar?” '
  '42':
  - type: text
    content: 'While he was still speaking, behold, Jonathan the son of Abiathar the priest arrived. And Adonijah said, “Come in, for you are a valiant '
  - type: text
    content: and
  - type: text
    content: ' trustworthy man and you bring good news.” [2 Sam 17:17-21] '
  '43':
  - type: text
    content: 'But Jonathan replied to Adonijah, “No, '
  - type: text
    content: on the contrary
  - type: text
    content: ', our lord King David has made Solomon king! '
  '44':
  - type: text
    content: 'The king has sent him with Zadok the priest, Nathan the prophet, Benaiah the son of Jehoiada, the Cherethites, and the Pelethites; and they have had him ride on the king’s [own royal] mule. '
  '45':
  - type: text
    content: 'Also, Zadok the priest and Nathan the prophet have anointed him king in Gihon, and they have come up from there celebrating, so the city is in an uproar. This is the noise which you have heard. '
  '46':
  - type: text
    content: 'Besides, Solomon has taken his seat on the throne of the kingdom. '
  '47':
  - type: text
    content: 'Moreover, the king’s servants came to bless (congratulate) our lord King David, saying, ‘May '
  - type: note
    content: See note v 37.
  - type: text
    content: 'your God make the name of Solomon better (more famous) than your name and make his throne greater than your throne.’ And the king bowed himself [before God] upon the bed. '
  '48':
  - type: text
    content: 'The king has also said this: ‘Blessed be the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, who has granted one [of my descendants] to sit on my throne today and '
  - type: text
    content: allowed
  - type: text
    content: ' my eyes to see it.’ ”'
  '49':
  - type: text
    content: 'Then all Adonijah’s guests were terrified [of being branded as traitors] and stood up '
  - type: text
    content: and
  - type: text
    content: ' left the feast, and each one went on his way. '
  '5':
  - type: text
    content: 'Then Adonijah the son of [David’s wife] Haggith exalted himself, saying, “I [the eldest living son] will be king.” So [following Absalom’s example] he prepared for himself chariots and horsemen, and fifty men to run before him. [2 Sam 15:1] '
  '50':
  - type: text
    content: 'And Adonijah feared Solomon, and he got up and went [to the tabernacle on Mt. Zion] and took hold of the horns of the altar [seeking asylum]. '
  '51':
  - type: text
    content: 'Now Solomon was told, “Behold, Adonijah is afraid of King Solomon, and behold, he has grasped the horns of the altar [seeking God’s protection], saying, ‘King Solomon must swear to me today that he will not kill his servant with the sword.’ ” '
  '52':
  - type: text
    content: 'Solomon said, “If he [proves he] is a worthy man, not '
  - type: text
    content: even
  - type: text
    content: ' one of his hairs shall fall to the ground; but if wickedness is found in him, he shall die.” '
  '53':
  - type: text
    content: So King Solomon sent [soldiers], and they brought Adonijah down from the altar [that was in front of the tabernacle]. And he came and bowed down to King Solomon, and Solomon said to him, “Go to your house.”
  '6':
  - type: text
    content: 'His father [David] had '
  - type: note
    content: David’s failure to discipline his sons always resulted in tragedy.
  - type: text
    content: 'never rebuked him at any time by asking, “Why have you done this?” Adonijah was also a very handsome man, and he was born after Absalom. '
  '7':
  - type: text
    content: 'He had conferred with '
  - type: note
    content: The commander of Israel’s army.
  - type: text
    content: 'Joab the son of Zeruiah [David’s half-sister] and with Abiathar the priest; and they followed Adonijah and helped him. '
  '8':
  - type: text
    content: 'But Zadok the priest, Benaiah the son of Jehoiada, Nathan the prophet, Shimei, Rei, and David’s '
  - type: note
    content: Lit mighty men and so throughout the chapter.
  - type: text
    content: most formidable warriors did not side with Adonijah [in his desire to become king].
  '9':
  - type: text
    content: 'Adonijah sacrificed sheep and oxen and fattened steers by the Stone of Zoheleth, which is beside [the well] En-rogel; and he invited all his brothers, the king’s sons, and all the men of Judah, the king’s servants [to this feast]. [2 Sam 15:7-12] '
