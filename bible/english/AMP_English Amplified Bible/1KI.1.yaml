    - type: text
      text: David in Old Age
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now King David was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. about seventy years old.
    marker-yv: yv-n
  - type: text
    text: 'old, advanced in years; they covered him with clothes, but he could not get warm. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So his servants said to him, “Let a young virgin be found for my lord the king and let her attend him and become his nurse; let her lie against your chest, so that my lord the king may feel warm.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So they searched for a beautiful girl throughout the territory of Israel, and found Abishag the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The town of Shunam was located within the territory of Issachar.
    marker-yv: yv-n
  - type: text
    text: 'Shunammite, and brought her to the king. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The girl was very beautiful; and she became the king’s nurse and served him, but the king '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: did not know her
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: was not intimate with her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Adonijah the son of [David’s wife] Haggith exalted himself, saying, “I [the eldest living son] will be king.” So [following Absalom’s example] he prepared for himself chariots and horsemen, and fifty men to run before him. [2 Sam 15:1] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'His father [David] had '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David’s failure to discipline his sons always resulted in tragedy.
    marker-yv: yv-n
  - type: text
    text: 'never rebuked him at any time by asking, “Why have you done this?” Adonijah was also a very handsome man, and he was born after Absalom. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He had conferred with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The commander of Israel’s army.
    marker-yv: yv-n
  - type: text
    text: 'Joab the son of Zeruiah [David’s half-sister] and with Abiathar the priest; and they followed Adonijah and helped him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Zadok the priest, Benaiah the son of Jehoiada, Nathan the prophet, Shimei, Rei, and David’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mighty men
      - type: text
        text: ' and so throughout the chapter.'
    marker-yv: yv-n
  - type: text
    text: most formidable warriors did not side with Adonijah [in his desire to become king].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Adonijah sacrificed sheep and oxen and fattened steers by the Stone of Zoheleth, which is beside [the well] En-rogel; and he invited all his brothers, the king’s sons, and all the men of Judah, the king’s servants [to this feast]. [2 Sam 15:7-12] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But he did not invite Nathan the prophet, Benaiah, the most formidable warriors, or his brother Solomon.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nathan and Bathsheba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Nathan spoke to Bathsheba the mother of Solomon, “Have you not heard that Adonijah the son of Haggith has become king, and David our lord does not know about it? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Come now, please let me advise you and save your life and the life of your son Solomon. [2 Sam 12:24, 25] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Go at once to King David and say to him, ‘Did you not, my lord, O king, swear to your maidservant, saying, “Solomon your son shall certainly be king after me, and he shall sit on my throne”? Why then has Adonijah become king?’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Behold, while you are still there speaking with the king, I will come in after you and confirm your words.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Bathsheba went to the king in his bedroom. Now the king was very old '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' weak, and Abishag the Shunammite was attending the king. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Bathsheba bowed down and paid respect to the king. And the king said, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: What to you
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'What do you wish?” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: She said to him, “My lord, you swore by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God to your maidservant, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' ‘Solomon your son shall certainly be king after me and he shall sit on my throne.’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But now, behold, Adonijah is [acting as] king; and now [as things stand], my lord the king, you do not know it. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He has sacrificed oxen and fattened steers and sheep in abundance, and has invited all the king’s sons and Abiathar the priest and Joab the commander of the army [to a feast], but he did not invite your servant Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now as for you, my lord the king, the eyes of all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In general, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' refers to all the people (males and females) of the various tribes descended from the twelve sons (Gen 35:23-26) of Jacob (later renamed Israel by God). In verses concerning things such as warfare or circumcision '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israel
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Israelites
      - type: text
        text: ' usually refers only to the males. Tribes of ancient people were identified by the name of their founding ancestor. Therefore, this same general rule applies when referring to individual tribal groups, e.g. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons of Reuben, Reuben, Reubenites
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'Israel are on you [waiting for you] to tell them who shall sit on the throne of my lord the king after him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Otherwise it will come about when my lord the king lies down [in death] with his fathers, that I and my son Solomon will be considered '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sinners
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: political enemies.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'While she was still speaking with the king, Nathan the prophet came in. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The king was told, “Here is Nathan the prophet.” And when he came before the king, he bowed before the king with his face to the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Nathan said, “My lord the king, have you said, ‘Adonijah shall be king after me, and he shall sit on my throne’? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Because he has gone down today [to En-Rogel] and has sacrificed oxen and fattened steers and sheep in abundance, and has invited all the king’s sons, the commanders of the army and Abiathar the priest [to this feast]; and [right now] they are eating and drinking in his presence; and they say, ‘
  - type: usfm
    marker: it
    children:
    - type: text
      text: Long
  - type: text
    text: ' live King Adonijah!’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But he has not invited me, your servant, nor Zadok the priest, nor Benaiah the son of Jehoiada, nor your servant Solomon. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If this thing has been done by my lord the king, why have you not shown your servants who shall sit on the throne of my lord the king after him?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'King David answered, “Call Bathsheba to me.” And she came into the king’s presence and stood before him. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then the king swore an oath and said, “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, who has redeemed my soul from all distress, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: even as I swore to you by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, saying, ‘Solomon your son shall certainly be king after me, and he shall sit on my throne in my place’; I will indeed do so this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very
  - type: text
    text: ' day.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Bathsheba bowed down with her face to the ground, and laid herself face down before the king and said, “May my lord King David live forever!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then King David said, “Call Zadok the priest, Nathan the prophet, and Benaiah the son of Jehoiada to me.” And they came before the king. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The king told them, “Take the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This group would have included David’s personal bodyguards.
    marker-yv: yv-n
  - type: text
    text: 'servants of your lord with you and have Solomon my son '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Placing Solomon on his royal mule announced to the people that David had chosen Solomon as his successor.
    marker-yv: yv-n
  - type: text
    text: 'ride on my own mule, and bring him down to [the spring at] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was near En-rogel, the site of Adonijah’s celebration.
    marker-yv: yv-n
  - type: text
    text: 'Gihon [in the Kidron Valley]. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Let Zadok the priest and Nathan the prophet anoint him there as king over Israel. Then blow the trumpet and say, ‘
  - type: usfm
    marker: it
    children:
    - type: text
      text: Long
  - type: text
    text: ' live King Solomon!’ '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then you shall come up [to Jerusalem] after him, and he shall come and sit on my throne and he shall reign '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as king
  - type: text
    text: ' in my place; for I have appointed him to be ruler over Israel and Judah.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Benaiah [the overseer of the king’s bodyguards], the son of Jehoiada answered the king and said, “Amen! (So be it!) May the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of my lord the king, say so too. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a declaration of support for David and his choice of Solomon.
    marker-yv: yv-n
  - type: text
    text: Just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has been with my lord the king, so may He be with Solomon, and make his throne greater than the throne of my lord King David!”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Anointed King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So Zadok the priest, Nathan the prophet, Benaiah the son of Jehoiada, the Cherethites, and the Pelethites [the king’s bodyguards] went down [from Jerusalem] and had Solomon ride on King David’s mule, and brought him to [the spring at] Gihon. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Zadok the priest took a horn of [olive] oil from the [sacred] tent and anointed Solomon. They blew the trumpet, and all the people said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Long
  - type: text
    text: ' live King Solomon!” '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'All the people went up after him, and they were playing on flutes and rejoicing with great joy, so that the earth shook '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seemed to burst open with their [joyful] sound.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Now Adonijah and all the guests who were with him heard it as they finished eating. When Joab heard the trumpet sound, he said, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gihon was nearby, but because of the topography it was not visible.
    marker-yv: yv-n
  - type: text
    text: 'Why is the city in such an uproar?” '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'While he was still speaking, behold, Jonathan the son of Abiathar the priest arrived. And Adonijah said, “Come in, for you are a valiant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy man and you bring good news.” [2 Sam 17:17-21] '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But Jonathan replied to Adonijah, “No, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on the contrary
  - type: text
    text: ', our lord King David has made Solomon king! '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'The king has sent him with Zadok the priest, Nathan the prophet, Benaiah the son of Jehoiada, the Cherethites, and the Pelethites; and they have had him ride on the king’s [own royal] mule. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Also, Zadok the priest and Nathan the prophet have anointed him king in Gihon, and they have come up from there celebrating, so the city is in an uproar. This is the noise which you have heard. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Besides, Solomon has taken his seat on the throne of the kingdom. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Moreover, the king’s servants came to bless (congratulate) our lord King David, saying, ‘May '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 37.
    marker-yv: yv-n
  - type: text
    text: 'your God make the name of Solomon better (more famous) than your name and make his throne greater than your throne.’ And the king bowed himself [before God] upon the bed. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'The king has also said this: ‘Blessed be the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who has granted one [of my descendants] to sit on my throne today and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: allowed
  - type: text
    text: ' my eyes to see it.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Then all Adonijah’s guests were terrified [of being branded as traitors] and stood up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' left the feast, and each one went on his way. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'And Adonijah feared Solomon, and he got up and went [to the tabernacle on Mt. Zion] and took hold of the horns of the altar [seeking asylum]. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Now Solomon was told, “Behold, Adonijah is afraid of King Solomon, and behold, he has grasped the horns of the altar [seeking God’s protection], saying, ‘King Solomon must swear to me today that he will not kill his servant with the sword.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Solomon said, “If he [proves he] is a worthy man, not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' one of his hairs shall fall to the ground; but if wickedness is found in him, he shall die.” '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: So King Solomon sent [soldiers], and they brought Adonijah down from the altar [that was in front of the tabernacle]. And he came and bowed down to King Solomon, and Solomon said to him, “Go to your house.”
