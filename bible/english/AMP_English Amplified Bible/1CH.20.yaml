document_id: 1CH.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: War with Philistine Giants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it happened at the end of the year, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. after the spring harvest.
      marker-yv: yv-n
    - type: text
      text: 'at the time when kings go out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to battle,
    - type: text
      text: ' Joab led out the army and ravaged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devastated the land of the Ammonites, and came and besieged Rabbah. But David stayed at Jerusalem [with Bathsheba]. Joab struck Rabbah and overthrew it. [2 Sam 12:24-29] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David took the crown of their king from his head and found that it '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A crown of this weight would have been practical only for ceremonial display.
      marker-yv: yv-n
    - type: text
      text: 'weighed a talent of gold and that there was a precious stone in it; so it was set on David’s head. He also brought a very great amount of spoil (plunder) out of the city [of Rabbah]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought out the people who were in it, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'MT reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cut with saws,
        - type: text
          text: ' but the parallel passage (2 Sam 12:31) reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: put them to [work with] the saws,
        - type: text
          text: ' which can mean “put to work.” Due to the brutality implied by the reading '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cut,
        - type: text
          text: ' most expositors prefer to reject it as an early scribal error for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: put,
        - type: text
          text: ' which is possible because the two Hebrew verb forms closely resemble each other. If the MT reading is in fact an error, it may have escaped detection due to its juxtaposition with '
        - type: usfm
          marker: it
          children:
          - type: text
            text: saws
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'put them [to work] with saws, iron picks, and axes. David dealt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in this way
    - type: text
      text: ' with all the Ammonite cities. Then David and all the people returned to Jerusalem.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came about after this that war broke out at Gezer with the Philistines; then Sibbecai the Hushathite killed Sippai, one of the descendants of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Rephaim,
        - type: text
          text: ' and so in vv 6, 8.'
      marker-yv: yv-n
    - type: text
      text: 'giants, and they were subdued. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was war again with the Philistines, and Elhanan the son of Jair killed Lahmi the brother of Goliath the Gittite, the shaft of whose spear was like a weaver’s beam. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again there was war at Gath, where there was a man of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: great
    - type: text
      text: ' stature who had twenty-four fingers and toes, six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fingers on each hand
    - type: text
      text: ' and six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: toes on each foot;
    - type: text
      text: ' and he also was descended from the giants. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he taunted Israel, Jonathan the son of Shimea, David’s brother, killed him. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were descended from the giants in Gath, and they fell by the hand of David and by the hand of his servants.
