document_id: 1CH.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: War with Philistine Giants
  - type: text
    content: 'Then it happened at the end of the year, '
  - type: note
    content: I.e. after the spring harvest.
  - type: text
    content: 'at the time when kings go out '
  - type: text
    content: to battle,
  - type: text
    content: ' Joab led out the army and ravaged '
  - type: text
    content: and
  - type: text
    content: ' devastated the land of the Ammonites, and came and besieged Rabbah. But David stayed at Jerusalem [with Bathsheba]. Joab struck Rabbah and overthrew it. [2 Sam 12:24-29] '
  '2':
  - type: text
    content: 'David took the crown of their king from his head and found that it '
  - type: note
    content: A crown of this weight would have been practical only for ceremonial display.
  - type: text
    content: 'weighed a talent of gold and that there was a precious stone in it; so it was set on David’s head. He also brought a very great amount of spoil (plunder) out of the city [of Rabbah]. '
  '3':
  - type: text
    content: 'He brought out the people who were in it, and '
  - type: note
    content: MT reads cut with saws, but the parallel passage (2 Sam 12:31) reads put them to [work with] the saws, which can mean “put to work.” Due to the brutality implied by the reading cut, most expositors prefer to reject it as an early scribal error for put, which is possible because the two Hebrew verb forms closely resemble each other. If the MT reading is in fact an error, it may have escaped detection due to its juxtaposition with saws.
  - type: text
    content: 'put them [to work] with saws, iron picks, and axes. David dealt '
  - type: text
    content: in this way
  - type: text
    content: ' with all the Ammonite cities. Then David and all the people returned to Jerusalem.'
  '4':
  - type: text
    content: 'Now it came about after this that war broke out at Gezer with the Philistines; then Sibbecai the Hushathite killed Sippai, one of the descendants of the '
  - type: note
    content: Heb Rephaim, and so in vv 6, 8.
  - type: text
    content: 'giants, and they were subdued. '
  '5':
  - type: text
    content: 'There was war again with the Philistines, and Elhanan the son of Jair killed Lahmi the brother of Goliath the Gittite, the shaft of whose spear was like a weaver’s beam. '
  '6':
  - type: text
    content: 'Again there was war at Gath, where there was a man of '
  - type: text
    content: great
  - type: text
    content: ' stature who had twenty-four fingers and toes, six '
  - type: text
    content: fingers on each hand
  - type: text
    content: ' and six '
  - type: text
    content: toes on each foot;
  - type: text
    content: ' and he also was descended from the giants. '
  '7':
  - type: text
    content: 'When he taunted Israel, Jonathan the son of Shimea, David’s brother, killed him. '
  '8':
  - type: text
    content: These were descended from the giants in Gath, and they fell by the hand of David and by the hand of his servants.
