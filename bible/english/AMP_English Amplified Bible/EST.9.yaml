document_id: EST.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Jews Destroy Their Enemies
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the twelfth month (that is, the month of Adar) on the thirteenth day when the king’s command and edict were about to be executed, on the [very] day when the enemies of the Jews had hoped to gain power over them [and slaughter them], it happened the other way around so that the Jews themselves gained power over those who hated them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the ten sons of Haman the son of Hammedatha, the Jews’ enemy; but they did not lay their hands on the plunder.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day the number of those who were killed at the citadel in Susa was reported to the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king said to Queen Esther, “The Jews have killed and destroyed five hundred men and the ten sons of Haman at the citadel in Susa. What then have they done in the rest of the king’s provinces! Now what is your petition? It shall be granted to you. What is your further request? It shall also be done.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esther replied, “If it pleases the king, let it be granted to the Jews who are in Susa to act tomorrow also in accordance with the decree of today; and let [the dead bodies of] Haman’s ten sons be hanged on the gallows.” [Esth 9:10] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king commanded it to be done; the decree was given in Susa, and they hanged [the bodies of] Haman’s ten sons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jews who were in Susa also gathered together on the fourteenth day of the month of Adar and killed three hundred men in Susa, but they did not lay their hands on the plunder.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the rest of the Jews who were in the king’s provinces assembled, to defend their lives and rid themselves of their enemies, and kill 75,000 of those who hated them; but they did not lay their hands on the plunder. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: This was done
    - type: text
      text: ' on the thirteenth day of the month of Adar, and on the fourteenth day they rested and made it a day of feasting and rejoicing.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Jews who were in Susa assembled on the thirteenth and on the fourteenth of the same month, and on the fifteenth day they rested and made it a day of feasting and rejoicing. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the Jews of the villages, who live in the rural [unwalled] towns, make the fourteenth day of the month of Adar a holiday for rejoicing and feasting and sending choice portions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of food
    - type: text
      text: ' to one another.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Feast of Purim Instituted
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews assembled in their cities throughout the provinces of King Ahasuerus (Xerxes) to apprehend those who wanted to do them harm; and no one could stand before them, for the fear of them [and their God] had fallen on all the peoples. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Mordecai recorded these events, and he sent letters to all the Jews who lived in all the provinces of King Ahasuerus, both near and far, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'obliging them to celebrate the fourteenth day of the month of Adar, and the fifteenth day of the same month, annually, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because on those days the Jews rid themselves of their enemies, and as the month which was turned for them from grief to joy and from mourning into a holiday; that they should make them days of feasting and rejoicing and sending choice portions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of food
    - type: text
      text: ' to one another and gifts to the poor.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Jews undertook what they had started to do, and what Mordecai had written to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Haman the son of Hammedatha, the Agagite, the enemy of all the Jews, had plotted against the Jews to destroy them and had cast Pur, that is, the lot, [to find the right time] to disturb and destroy them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when it came before the king, he commanded in writing that Haman’s wicked scheme which he had devised against the Jews was to return on his own head, and that he and his sons should [endure what he planned for the Jews and] be hanged on the gallows. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they called these days Purim after the name Pur (lot). And because of all the instructions in this letter, and what they had faced in this regard and what had happened to them, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Jews established and made it a custom for themselves and for their descendants and for all who joined them, so that they would not fail to celebrate these two days as it was written and at the appointed time annually. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So these days were to be remembered and celebrated throughout every generation, every family, every province and every city; and these days of Purim were not to cease from among the Jews, nor their memory fade from their descendants.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Queen Esther, the daughter of Abihail, with Mordecai the Jew, wrote with full power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority to confirm this second letter about Purim. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even all the officials of the provinces and the chief rulers (satraps) and the governors and those who attended to the king’s business supported the Jews [in defeating their enemies], because the fear of Mordecai [and his God’s power] had fallen on them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He sent letters to all the Jews, to the 127 provinces of the kingdom of Ahasuerus, in words of peace and truth, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to establish these days of Purim [to be observed] at their appointed times, just as Mordecai the Jew and Queen Esther had established for them, and as they had established for themselves and for their descendants with instructions regarding their times of fasting and their lamentations (expressions of needing help). '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The command of Esther established these customs for Purim, and it was written in the book [of the royal archives].
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Mordecai was great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' respected in the king’s palace, and his fame spread throughout all the provinces; for the man Mordecai became greater and greater. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Jews struck all their enemies with the sword, killing and destroying them; and they did what they pleased to those who hated them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the citadel in Susa the Jews killed and destroyed five hundred men, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and [they killed] Parshandatha, Dalphon, Aspatha, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Poratha, Adalia, Aridatha, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmashta, Arisai, Aridai, and Vaizatha, '
