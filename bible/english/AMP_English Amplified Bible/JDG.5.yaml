document_id: JDG.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Song of Deborah and Barak
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Deborah and Barak the son of Abinoam sang on that day, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “For the leaders who took the lead in Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the people who volunteered [for battle],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Hear, O kings; listen, O rulers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sing praise to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', when You went out from Seir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When You marched from the field of Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth quaked, the heavens also dripped,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, the clouds dripped water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “The mountains quaked at the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes,
  - type: text
    text: ' this Sinai, at the presence of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶“In the days of Shamgar the son of Anath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the days of Jael, the highways were deserted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And travelers went by roundabout ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“The villagers ceased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to be;
  - type: text
    text: ' they ceased in Israel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I, Deborah, arose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until I arose, a mother in Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “They chose new gods;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then war was in the gates.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Was there a shield or spear seen
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among forty thousand in Israel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“My heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: goes out
  - type: text
    text: ' to the commanders of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The volunteers among the people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Sing of it, you who ride on white donkeys,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You who sit on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rich
  - type: text
    text: ' carpets,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you who walk by the way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“At the sound of those who divide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: flocks
  - type: text
    text: ' among the watering places,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: There they shall recount the righteous acts of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: The righteous acts toward His villagers in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the people of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' went down to the gates.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“Awake, awake, Deborah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awake, awake, sing a song!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arise, Barak, and lead away your captives, you son of Abinoam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Then down marched the survivors to the nobles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' marched down for Me against the mighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“From Ephraim those whose root is in Amalek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: After you, Benjamin, with your relatives;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From Machir came down commanders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rulers,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And from Zebulun those who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Writing developed in Mesopotamia during the 4th millennium '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . It began as a system of accounting to record financial matters and trading transactions.
    marker-yv: yv-n
  - type: text
    text: handle the scepter of the [office of] scribe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“And the heads of Issachar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came
  - type: text
    text: ' with Deborah;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As Issachar, so was Barak;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Into the valley they rushed at his heels;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among the divisions of Reuben
- type: usfm
  marker: q1
  children:
  - type: text
    text: There were great searchings of heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Why [Reuben] did you linger among the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: saddlebags
    marker-yv: yv-n
  - type: text
    text: sheepfolds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To hear the piping for the flocks?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among the divisions of Reuben
- type: usfm
  marker: q1
  children:
  - type: text
    text: There were great searchings of heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Gilead remained beyond the Jordan;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why did Dan live as an alien on ships?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Asher sat [still] on the seacoast,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And remained by its landings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[These did not come to battle for God’s people.]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “But Zebulun was a people who risked their lives to the [point of] death;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naphtali also, on the heights of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶“The kings came and fought;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the kings of Canaan fought
- type: usfm
  marker: q1
  children:
  - type: text
    text: At Taanach by the waters of Megiddo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spoils of silver they did not obtain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “From the heavens the stars fought,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From their courses they fought against Sisera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “The torrent Kishon swept the enemy away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ancient torrent, the torrent Kishon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O my soul, march on with strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Then the horses’ hoofs beat [loudly]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because of the galloping—the galloping of his valiant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' powerful steeds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '‘Curse '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A place in the territory of Naphtali.
    marker-yv: yv-n
  - type: text
    text: Meroz,’ said the messenger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Utterly curse its inhabitants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they did not come to the help of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the help of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' against the mighty.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ¶“Most blessed of women is Jael,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wife of Heber the Kenite;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Most blessed is she of women in the tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Sisera asked for water and she gave him milk;
- type: usfm
  marker: q1
  children:
  - type: text
    text: She brought him curds in a magnificent bowl.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “She reached out her [left] hand for the tent peg,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her right hand for the workmen’s hammer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then she struck Sisera, she smashed his head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And she shattered and pierced his temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “He bowed, he fell, he lay [still] at her feet;
- type: usfm
  marker: q1
  children:
  - type: text
    text: At her feet he bowed, he fell;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where he bowed, there he fell dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ¶“Out of the window she looked down and lamented (cried out in a shrill voice),
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mother of Sisera through the lattice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Why is his chariot delayed in coming?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why have the hoofbeats of his chariots delayed?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Her wise ladies answered her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, she repeated her words to herself,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ‘Are they not finding and dividing the spoil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A maiden (concubine) or two for every man;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A spoil of dyed garments for Sisera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A spoil of dyed garments embroidered,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Two pieces of dyed garments embroidered for the neck of the plunderer?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “So let all Your enemies perish, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But let those who love Him be like the rising of the sun in its might.”
- type: usfm
  marker: m
  children:
  - type: text
    text: And the land was at rest for forty years.
