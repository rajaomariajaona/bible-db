  '31':
  - type: text
    content: So then, believers, we [who are born again—reborn from above—spiritually transformed, renewed, and set apart for His purpose] are not children of a slave woman [the natural], but of the free woman [the supernatural].
  '4':
  - type: text
    content: 'But when [in God’s plan] the proper time had fully come, God sent His Son, born of a woman, born under the [regulations of the] Law, '
  '5':
  - type: text
    content: 'so that He might redeem '
  - type: text
    content: and
  - type: text
    content: ' liberate those who were under the Law, that we [who believe] might be adopted as sons [as God’s children with all rights as fully grown members of a family]. [Rom 11:17-24] '
  '6':
  - type: text
    content: 'And because you [really] are [His] sons, God has sent the Spirit of His Son into our hearts, crying out, '
  - type: note
    content: An Aramaic word used by small children when informally addressing their fathers.
  - type: text
    content: '“Abba! Father!” '
  '7':
  - type: text
    content: Therefore you are no longer a slave (bond-servant), but a son; and if a son, then also an heir through [the gracious act of] God [through Christ].
  '8':
  - type: text
    content: 'But at that time, when you did not know [the true] God '
  - type: text
    content: and
  - type: text
    content: ' were unacquainted with Him, you [Gentiles] were slaves to those [pagan] things which by [their very] nature were not '
  - type: text
    content: and
  - type: text
    content: ' could not be gods '
  - type: text
    content: at all.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Now, however, since you have come to know [the true] God [through personal experience], or rather to be known by God, how is it that you are turning back again to the weak and worthless elemental principles [of religions and philosophies], to which you want to be enslaved all over again? '
