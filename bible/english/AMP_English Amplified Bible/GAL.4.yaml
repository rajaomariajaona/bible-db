document_id: GAL.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sonship in Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now what I mean [when I talk about children and their guardians] is this: as long as the heir is a child, he does not differ at all from a slave even though he is the [future owner and] master of all [the estate]; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[For example,] you observe [particular] days and months and seasons and years. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I fear for you, that perhaps I have labored [to the point of exhaustion] over you in vain.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Believers, I beg of you, become as I am [free from the bondage of Jewish ritualism and ordinances], for I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have become
    - type: text
      text: ' as you are [a Gentile]. You did me no wrong [when I first came to you; do not do it now]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the contrary, you know that it was because of a physical illness that I [remained and] preached the gospel to you the first time; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and even though my physical condition was a trial to you, you did not regard it with contempt, or scorn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reject me; but you received me as an angel of God, even as Christ Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Himself.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then has become of that sense of blessing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the joy that you once had [from your salvation and your relationship with Christ]? For I testify of you that, if possible, you would have torn out your own eyes and given them to me ['
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul’s “thorn in the flesh” possibly afflicted his eyes in a visible way (see 2 Cor 12:7).
      marker-yv: yv-n
    - type: text
      text: 'to replace mine]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So have I become your enemy by telling you the truth? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men [the Judaizers] eagerly seek you [to entrap you with honeyed words and attention, to win you over to their philosophy], not honorably [for their purpose is not honorable or worthy of consideration]. They want to isolate you [from us who oppose them] so that you will seek them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it is always pleasant to be eagerly sought after [provided that it is] for a good purpose, and not just when I am with you [seeking you myself—but beware of the others doing it]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My little children, for whom I am again in [the pains of] labor until Christ is [completely and permanently] formed within you— '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but he is under [the authority of] guardians and household administrators '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' managers until the date set by his father [when he is of legal age]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: how I wish that I were with you now and could change my tone, because I am perplexed in regard to you.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bond and Free
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell me, you who are bent on being under the Law, do you not listen to [what] the Law [really says]? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is written that Abraham had two sons, one by the slave woman [Hagar] and one by the free woman [Sarah]. [Gen 16:15; 21:2, 9] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the child of the slave woman was born according to the flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' had an ordinary birth, while the son of the free woman was born in fulfillment of the promise. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these facts are about to be used [by me] as an allegory [that is, I will illustrate by using them]: for these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: women
    - type: text
      text: ' can represent two covenants: one [covenant originated] from Mount Sinai [where the Law was given] that bears children [destined] for slavery; she is Hagar. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Hagar is (represents) Mount Sinai in Arabia and she corresponds to the present Jerusalem, for she is in slavery with her children. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Jerusalem above [that is, the way of faith, represented by Sarah] is free; she is our mother. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For it is written [in the Scriptures],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “R
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ejoice
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: o barren woman who has not given birth
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: reak forth into a
    - type: text
      text: ' [joyful] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: shout
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: you who are not in labor
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or the desolate woman has many more children
  - type: usfm
    marker: q1
    children:
    - type: text
      text: T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: han she who has a husband
    - type: text
      text: .” [Is 54:1]
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And we, [believing] brothers and sisters, like Isaac, are children [not merely of physical descent, like Ishmael, but are children born] of promise [born miraculously]. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But as at that time the child [of ordinary birth] born according to the flesh persecuted the son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who was born
    - type: text
      text: ' according to [the promise and working of] the Spirit, so it is now also. [Gen 21:9] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So also we [whether Jews or Gentiles], when we were children (spiritually immature), were kept like slaves under the elementary [man-made religious or philosophical] teachings of the world. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But what does the Scripture say?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “C
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ast out the bondwoman
    - type: text
      text: ' [Hagar] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and her son
    - type: text
      text: ' [Ishmael],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or never shall the son of the bondwoman be heir
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: share the inheritance with the son of the free woman
    - type: text
      text: .” [Gen 21:10]
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So then, believers, we [who are born again—reborn from above—spiritually transformed, renewed, and set apart for His purpose] are not children of a slave woman [the natural], but of the free woman [the supernatural].
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when [in God’s plan] the proper time had fully come, God sent His Son, born of a woman, born under the [regulations of the] Law, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that He might redeem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' liberate those who were under the Law, that we [who believe] might be adopted as sons [as God’s children with all rights as fully grown members of a family]. [Rom 11:17-24] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And because you [really] are [His] sons, God has sent the Spirit of His Son into our hearts, crying out, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An Aramaic word used by small children when informally addressing their fathers.
      marker-yv: yv-n
    - type: text
      text: '“Abba! Father!” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore you are no longer a slave (bond-servant), but a son; and if a son, then also an heir through [the gracious act of] God [through Christ].
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at that time, when you did not know [the true] God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were unacquainted with Him, you [Gentiles] were slaves to those [pagan] things which by [their very] nature were not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' could not be gods '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at all.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, however, since you have come to know [the true] God [through personal experience], or rather to be known by God, how is it that you are turning back again to the weak and worthless elemental principles [of religions and philosophies], to which you want to be enslaved all over again? '
