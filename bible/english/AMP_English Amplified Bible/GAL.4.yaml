  '28':
  - type: text
    content: 'And we, [believing] brothers and sisters, like Isaac, are children [not merely of physical descent, like Ishmael, but are children born] of promise [born miraculously]. '
  '29':
  - type: text
    content: 'But as at that time the child [of ordinary birth] born according to the flesh persecuted the son '
  - type: text
    content: who was born
  - type: text
    content: ' according to [the promise and working of] the Spirit, so it is now also. [Gen 21:9] '
  '3':
  - type: text
    content: 'So also we [whether Jews or Gentiles], when we were children (spiritually immature), were kept like slaves under the elementary [man-made religious or philosophical] teachings of the world. '
  '30':
  - type: text
    content: But what does the Scripture say?
