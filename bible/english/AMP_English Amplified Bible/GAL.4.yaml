  '1':
  - type: heading
    content: Sonship in Christ
  - type: text
    content: 'Now what I mean [when I talk about children and their guardians] is this: as long as the heir is a child, he does not differ at all from a slave even though he is the [future owner and] master of all [the estate]; '
  '10':
  - type: text
    content: '[For example,] you observe [particular] days and months and seasons and years. '
  '11':
  - type: text
    content: I fear for you, that perhaps I have labored [to the point of exhaustion] over you in vain.
  '12':
  - type: text
    content: 'Believers, I beg of you, become as I am [free from the bondage of Jewish ritualism and ordinances], for I '
  - type: text
    content: have become
  - type: text
    content: ' as you are [a Gentile]. You did me no wrong [when I first came to you; do not do it now]. '
  '13':
  - type: text
    content: 'On the contrary, you know that it was because of a physical illness that I [remained and] preached the gospel to you the first time; '
  '14':
  - type: text
    content: 'and even though my physical condition was a trial to you, you did not regard it with contempt, or scorn '
  - type: text
    content: and
  - type: text
    content: ' reject me; but you received me as an angel of God, even as Christ Jesus '
  - type: text
    content: Himself.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'What then has become of that sense of blessing '
  - type: text
    content: and
  - type: text
    content: ' the joy that you once had [from your salvation and your relationship with Christ]? For I testify of you that, if possible, you would have torn out your own eyes and given them to me ['
  - type: note
    content: Paul’s “thorn in the flesh” possibly afflicted his eyes in a visible way (see 2 Cor 12:7).
  - type: text
    content: 'to replace mine]. '
  '16':
  - type: text
    content: 'So have I become your enemy by telling you the truth? '
  '17':
  - type: text
    content: 'These men [the Judaizers] eagerly seek you [to entrap you with honeyed words and attention, to win you over to their philosophy], not honorably [for their purpose is not honorable or worthy of consideration]. They want to isolate you [from us who oppose them] so that you will seek them. '
  '18':
  - type: text
    content: 'Now it is always pleasant to be eagerly sought after [provided that it is] for a good purpose, and not just when I am with you [seeking you myself—but beware of the others doing it]. '
  '19':
  - type: text
    content: 'My little children, for whom I am again in [the pains of] labor until Christ is [completely and permanently] formed within you— '
  '2':
  - type: text
    content: 'but he is under [the authority of] guardians and household administrators '
  - type: text
    content: or
  - type: text
    content: ' managers until the date set by his father [when he is of legal age]. '
  '20':
  - type: text
    content: how I wish that I were with you now and could change my tone, because I am perplexed in regard to you.
  - type: heading
    content: Bond and Free
  '21':
  - type: text
    content: 'Tell me, you who are bent on being under the Law, do you not listen to [what] the Law [really says]? '
  '22':
  - type: text
    content: 'For it is written that Abraham had two sons, one by the slave woman [Hagar] and one by the free woman [Sarah]. [Gen 16:15; 21:2, 9] '
  '23':
  - type: text
    content: 'But the child of the slave woman was born according to the flesh '
  - type: text
    content: and
  - type: text
    content: ' had an ordinary birth, while the son of the free woman was born in fulfillment of the promise. '
  '24':
  - type: text
    content: 'Now these facts are about to be used [by me] as an allegory [that is, I will illustrate by using them]: for these '
  - type: text
    content: women
  - type: text
    content: ' can represent two covenants: one [covenant originated] from Mount Sinai [where the Law was given] that bears children [destined] for slavery; she is Hagar. '
  '25':
  - type: text
    content: 'Now Hagar is (represents) Mount Sinai in Arabia and she corresponds to the present Jerusalem, for she is in slavery with her children. '
  '26':
  - type: text
    content: 'But the Jerusalem above [that is, the way of faith, represented by Sarah] is free; she is our mother. '
