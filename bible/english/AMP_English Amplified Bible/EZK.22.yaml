document_id: EZK.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sins of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In you men have uncovered their fathers’ nakedness [the nakedness of mother or stepmother]; in you they have violated women who are [set apart as ceremonially] unclean during their menstrual impurity [or after childbirth]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'In you one has committed a shameful act with his neighbor’s wife, another has lewdly defiled his daughter-in-law, and another has violated his sister, his father’s daughter. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In you they have accepted bribes to shed blood; you have taken [forbidden] interest and [a percentage of] profits, and you have injured your neighbors for gain by oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extortion, and you have forgotten Me,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Behold, therefore, I strike My hands [together] at your dishonest gain which you have acquired and at the bloodshed which is among you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Can your heart (courage) endure, or can your hands be strong in the days that I will deal with you? I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have spoken, and will act. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I will scatter you among the nations and disperse you through the countries, and I will destroy your filthiness. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: You will defile yourself in the sight of the [Gentile] nations, and you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” ’ ”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Son of man, the house of Israel has become dross (metallic waste) to Me. All of them are (useless) bronze, tin, iron, and lead in the furnace; they are the dross of silver. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Because you have all become dross, therefore, behold, I will gather you [O Israel] into the midst of Jerusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“And you, son of man [Ezekiel], will you judge, will you judge the city of bloodshed? Then make her recognize all her repulsive acts. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'As they gather silver and bronze and iron and lead and tin into the furnace to blow fire on it in order to melt it, so I will gather you in My anger and in My wrath, and I will put you there and melt you. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will gather you and blow on you with the fire of My wrath, and you will be melted in the midst of it. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: As silver is melted in the furnace, so will you be melted in the midst of it; and you will know [without any doubt] that I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' have poured out My wrath on you [O Israel].’ ”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“Son of man, say to her, ‘You [Israel] are a land that is not pronounced clean or rained on in the day of indignation.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'There is a conspiracy of her [false] prophets in her midst, like a roaring lion tearing the prey. They have devoured [human] life; they have taken [in their greed] treasure and precious things; they have made many widows among her. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Her priests have done violence to My law and have profaned My holy things. They have made no distinction between the holy (sacred) and the profane (secular), they have not taught [people] the difference between the unclean and the clean; and they hide their eyes from My Sabbaths, and I am profaned among them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Her princes within her are like wolves tearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devouring the prey, shedding blood and destroying lives in order to get dishonest gain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Her prophets have smeared whitewash for them, seeing false visions and divining lies for them, saying, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ’—when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not spoken. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The people of the land have practiced oppression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extortion and have committed robbery; they have wronged the poor and needy and they have oppressed the stranger without justice. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You shall say, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “A city that sheds blood in her midst, so that her time [of doom] will come, and makes idols to defile her, contrary to her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: interest!
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'I searched for a man among them who would build up the wall and stand in the gap before Me for [the sake of] the land, that I would not destroy it, but I found no one [not even one]. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Therefore I have poured out My indignation on them; I have consumed them with the fire of My wrath; I have repaid their way [by bringing it] upon their own heads,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'You have become guilty by the blood which you have shed, and you are defiled by the idols which you have made. Thus you have caused your day [of judgment and punishment] to approach and have arrived at [the completion of] your years; therefore, I have made you an object of scorn to the [pagan] nations and a thing to be mocked by all countries. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who are near and those who are far from you will mock you, you [infamous one] of ill repute, full of turmoil.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Behold, the princes of Israel, every one according to his power, have been intending to shed blood in you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In you they have treated father and mother lightly. They have oppressed the stranger among you; and in your presence they have wronged the fatherless and the widow. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'You have despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorned My sacred things and have profaned My Sabbaths. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'In you are men who slander for the purpose of shedding blood, and in your presence they have eaten [food offered to idols] at the mountain shrines; in your midst they have committed acts of lewdness. '
