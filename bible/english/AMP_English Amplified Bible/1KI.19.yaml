      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: jealous
        - type: text
          text: ', i.e. intolerant of unfaithfulness.'
      marker-yv: yv-n
    - type: text
      text: zealous (impassioned) for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts (armies) [proclaiming what is rightfully and uniquely His]; for the sons of Israel have abandoned (broken) Your covenant, torn down Your altars, and killed Your prophets with the sword. And I, only I, am left; and they seek to take away my life.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So He said, “Go out and stand on the mountain before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” And behold, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was passing by, and a great and powerful wind was tearing out the mountains and breaking the rocks in pieces before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was not in the wind. And after the wind, [there was] an earthquake, but the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was not in the earthquake. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: After the earthquake, [there was] a fire, but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was not in the fire; and after the fire, [there was] the sound of a gentle blowing. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When Elijah heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the sound
    - type: text
      text: ', he wrapped his face in his mantle (cloak) and went out and stood in the entrance of the cave. And behold, a voice came to him and said, “What are you doing here, Elijah?” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He said, “I have been very zealous for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts (armies), because the sons of Israel have abandoned (broken) Your covenant, torn down Your altars and killed Your prophets with the sword. And I, only I, am left; and they seek to take away my life.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God tells Elijah how to complete the destruction of the worship of Baal. First, Hazael was to be placed on the Aramean (Syrian) throne in order to attack Ahab. Second, when Ahab was weakened, Jehu was to seize his throne because he opposed the worship of Baal and was a powerful military man. Third, Elijah was to appoint Elisha as his successor, as the one who would, along with Jehu, strike down Baal’s remaining followers.
      marker-yv: yv-n
    - type: text
      text: 'said to him, “Go, return on your way to the Wilderness of Damascus; and when you arrive, you shall anoint Hazael as king over Aram (Syria); '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and you shall anoint Jehu the son of Nimshi as king over Israel; and anoint Elisha the son of Shaphat of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This city was located in the tribal territory of Manasseh in the Jordan River valley.
      marker-yv: yv-n
    - type: text
      text: 'Abel-meholah as prophet in your place. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'It shall come about that Jehu shall put to death whoever escapes from the sword of Hazael, and Elisha shall put to death whoever escapes the sword of Jehu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Yet I will leave 7,000 [survivors] in Israel, all the knees that have not bowed down to Baal and every mouth that has not kissed him.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Elijah departed from there and found Elisha the son of Shaphat, while he was plowing with twelve pairs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of oxen
    - type: text
      text: ' before him, and he with the twelfth. Elijah went over to him and threw his mantle (coat) on him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Jezebel sent a messenger to Elijah, saying, “So may the gods do to me, and even more, if by this time tomorrow I do not make your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'life like the life of one of them.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He left the oxen and ran after Elijah and said, “Please let me kiss my father and mother [goodbye], then I will follow you.” And he said to him, “Go on back; for what have I done to [stop] you?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So Elisha left him and went back. Then he took a pair of oxen and sacrificed them and boiled their meat with the implements of the oxen [as fuel], and gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the meat
    - type: text
      text: ' to the people, and they ate. Then he stood and followed Elijah, and served him. [2 Kin 3:11]'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Elijah was afraid and arose and ran for his life, and he came to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Beersheba was about ninety miles south of Jezreel and was not part of Ahab’s kingdom.
      marker-yv: yv-n
    - type: text
      text: 'Beersheba which belongs to Judah, and he left his servant there. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But he himself traveled a day’s journey into the wilderness, and he came and sat down under a juniper tree and asked [God] that he might die. He said, “It is enough; now, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', take my life, for I am no better than my fathers.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He lay down and slept under the juniper tree, and behold, an angel touched him and said to him, “Get up and eat.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He looked, and by his head there was a bread cake baked on hot coal, and a pitcher of water. So he ate and drank and lay down again. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then the angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came again a second time and touched him and said, “Get up, and eat, for the journey is too long for you [without adequate sustenance].” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So he got up and ate and drank, and with the strength of that food he traveled forty days and nights to Horeb (Sinai), the mountain of God.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elijah at Horeb
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: There he came to a cave and spent the night in it; and behold, the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' to him, and He said to him, “What are you doing here, Elijah?” '
