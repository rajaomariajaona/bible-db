    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Ahab told Jezebel all that Elijah had done, and how he had killed all the prophets [of Baal] with the sword. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He said, “I have been very '
    - type: usfm
