  '1':
  - type: heading
    content: Elijah Flees from Jezebel
  - type: text
    content: 'Now Ahab told Jezebel all that Elijah had done, and how he had killed all the prophets [of Baal] with the sword. '
  '10':
  - type: text
    content: 'He said, “I have been very '
  - type: note
    content: Or jealous, i.e. intolerant of unfaithfulness.
  - type: text
    content: zealous (impassioned) for the L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts (armies) [proclaiming what is rightfully and uniquely His]; for the sons of Israel have abandoned (broken) Your covenant, torn down Your altars, and killed Your prophets with the sword. And I, only I, am left; and they seek to take away my life.”'
  '11':
  - type: text
    content: So He said, “Go out and stand on the mountain before the L
  - type: heading
    content: ord
  - type: text
    content: .” And behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' was passing by, and a great and powerful wind was tearing out the mountains and breaking the rocks in pieces before the L'
  - type: heading
    content: ord
  - type: text
    content: ; but the L
  - type: heading
