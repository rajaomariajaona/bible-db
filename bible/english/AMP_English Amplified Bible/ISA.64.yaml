    content: Prayer for Mercy and Help
  - type: text
    content: Oh, that You would tear open the heavens and come down,
  - type: text
    content: That the mountains might quake at Your presence—
  '10':
  - type: text
    content: ' '
  - type: note
    content: After the destruction of Jerusalem and the temple in a.d. 70 it became a religious tradition among the rabbis to recite vv 10 and 11 and to rip a tear in their robes whenever they saw the ruins.
  - type: text
    content: Your holy cities have become a wilderness,
  - type: text
