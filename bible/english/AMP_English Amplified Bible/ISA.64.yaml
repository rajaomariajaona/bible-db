document_id: ISA.64,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Mercy and Help
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that You would tear open the heavens and come down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the mountains might quake at Your presence—
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'After the destruction of Jerusalem and the temple in '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 70 it became a religious tradition among the rabbis to recite vv 10 and 11 and to rip a tear in their robes whenever they saw the ruins.
      marker-yv: yv-n
    - type: text
      text: Your holy cities have become a wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zion has become a wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem a desolation.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our holy and beautiful house [the temple built by Solomon],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where our fathers praised You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has been burned by fire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all our precious objects are in ruins.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considering these [tragedies], will You restrain Yourself, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [and not help us]?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will You keep silent and humiliate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppress us beyond measure?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As [sure as] fire kindles the brushwood, as fire causes water to boil—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To make Your name known to Your adversaries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the nations may tremble at Your presence!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When You did awesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' amazing things which we did not expect,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You came down [at Sinai]; the mountains quaked at Your presence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For from days of old no one has heard, nor has ear perceived,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor has the eye '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: seen, O God, besides You,
        - type: text
          text: ' what '
        - type: usfm
          marker: it
          children:
          - type: text
            text: He will do….
        - type: text
          text: ' The ancient rabbis favored this translation or a variation of it, and some suggested that the unexpressed object ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: what)
        - type: text
          text: ' is wine preserved since the creation, or Eden. They all applied this verse to the future that follows the millennial kingdom, and was mostly a mystery to them. Heaven, or specifically the New Jerusalem, that follows the kingdom was partially revealed to John in Revelation. There is a story in the Talmud that when King Ahasuerus held a great banquet in Susa for seven days (Esth 1:5), he arrogantly asked the Jews if God could do better for them than that. They quoted this line to him in reply, and said that in the time to come if God provided nothing better for them than this feast, they could tell Him that they had already enjoyed such a feast at the table of Ahasuerus.'
      marker-yv: yv-n
    - type: text
      text: seen a God besides You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who works '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acts in behalf of the one who [gladly] waits for Him.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You meet him who rejoices in doing that which is morally right,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who remembers You in Your ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, You were angry, for we sinned;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: We have
    - type: text
      text: ' long '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continued
    - type: text
      text: ' in our sins [prolonging Your anger].'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shall we be saved [under such circumstances]?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For we all have become like one who is [ceremonially] unclean [like a leper],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all our deeds of righteousness are like filthy rags;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We all wither '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decay like a leaf,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And our wickedness [our sin, our injustice, our wrongdoing], like the wind, takes us away [carrying us far from God’s favor, toward destruction]. [Lev 13:45, 46]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one who calls on Your name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who awakens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' causes himself to take hold of You;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You have hidden Your face from us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have handed us over to the [consuming and destructive] power of our wickedness [our sin, our injustice, our wrongdoing]. [Rom 1:21-24]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Yet, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You are our Father;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are the clay, and You our Potter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And we all are the work of Your hand.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be angry beyond measure, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not remember our wickedness [our sin, our injustice, our wrongdoing] forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now look, consider, for we are all Your people.
