  '4':
  - type: text
    content: For from days of old no one has heard, nor has ear perceived,
  - type: text
    content: 'Nor has the eye '
  - type: note
    content: Or seen, O God, besides You, what He will do…. The ancient rabbis favored this translation or a variation of it, and some suggested that the unexpressed object (what) is wine preserved since the creation, or Eden. They all applied this verse to the future that follows the millennial kingdom, and was mostly a mystery to them. Heaven, or specifically the New Jerusalem, that follows the kingdom was partially revealed to John in Revelation. There is a story in the Talmud that when King Ahasuerus held a great banquet in Susa for seven days (Esth 1:5), he arrogantly asked the Jews if God could do better for them than that. They quoted this line to him in reply, and said that in the time to come if God provided nothing better for them than this feast, they could tell Him that they had already enjoyed such a feast at the table of Ahasuerus.
  - type: text
