document_id: JHN.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The New Birth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now there was a certain man among the Pharisees named Nicodemus, a ruler (member of the Sanhedrin) among the Jews, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'who came to Jesus at night and said to Him, “Rabbi (Teacher), we know [without any doubt] that You have come from God as a teacher; for no one can do these signs [these wonders, these attesting miracles] that You do unless God is with him.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, unless a person is born again'
  - type: text
    text: ' [reborn from above—spiritually transformed, renewed, sanctified], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he cannot
  - type: text
    text: ' [ever] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' experience the kingdom of God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nicodemus said to Him, “How can a man be born when he is old? He cannot enter his mother’s womb a second time and be born, can he?” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, unless one is born of water and the Spirit he cannot'
  - type: text
    text: ' [ever] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: enter the kingdom of God.
  - type: text
    text: ' [Ezek 36:25-27] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: That which is born of the flesh is flesh
  - type: text
    text: ' [the physical is merely physical], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and that which is born of the Spirit is spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do not be surprised that I have told you, ‘You must be born again
  - type: text
    text: ' [reborn from above—spiritually transformed, renewed, sanctified].’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The wind blows where it wishes and you hear its sound, but you do not know where it is coming from and where it is going; so it is with everyone who is born of the Spirit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nicodemus said to Him, “How can these things be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: possible?
  - type: text
    text: '” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are the
  - type: text
    text: ' [great and well-known] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'teacher of Israel, and yet you do not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' understand these things'
  - type: text
    text: ' [from Scripture]? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, we speak only of what we'
  - type: text
    text: ' [absolutely] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: know and testify about what we have
  - type: text
    text: ' [actually] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: seen
  - type: text
    text: ' [as eyewitnesses]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and
  - type: text
    text: ' [still] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you
  - type: text
    text: ' [reject our evidence and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: do not accept our testimony.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I told you earthly things
  - type: text
    text: ' [that is, things that happen right here on earth] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and you do not believe, how will you believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust Me if I tell you heavenly things?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No one has gone up into heaven, but there is One who came down from heaven, the Son of Man
  - type: text
    text: ' [Himself—whose home is in heaven]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Just as Moses lifted up the
  - type: text
    text: ' [bronze] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: serpent in the desert
  - type: text
    text: ' [on a pole], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so must the Son of Man be lifted up
  - type: text
    text: ' [on the cross], [Num 21:9] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that whoever believes will in Him have eternal life
  - type: text
    text: ' [after physical death, and will actually live forever].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For God so
  - type: text
    text: ' [greatly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'loved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dearly prized the world, that He'
  - type: text
    text: ' [even] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gave His
  - type: text
    text: ' [One and] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus, God’s only Son, the One who is truly unique, the only one of His kind.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'only begotten Son, so that whoever believes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusts in Him'
  - type: text
    text: ' [as Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: shall not perish, but have eternal life.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For God did not send the Son into the world to judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemn the world'
  - type: text
    text: ' [that is, to initiate the final judgment of the world], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but that the world might be saved through Him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Whoever believes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has decided to trust in Him'
  - type: text
    text: ' [as personal Savior and Lord] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is not judged
  - type: text
    text: ' [for this one, there is no judgment, no rejection, no condemnation]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but the one who does not believe
  - type: text
    text: ' [and has decided to reject Him as personal Savior and Lord] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is judged already
  - type: text
    text: ' [that one has been convicted and sentenced], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'because '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek refers to an unsaved person who has made the decision not to believe in the Son, Jesus Christ, that is, not to accept the salvation offered by the Son and commit to follow Him. Such a person stands condemned by God unless he changes his mind.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'he has not believed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted in the name of the'
  - type: text
    text: ' [One and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: only begotten Son of God
  - type: text
    text: ' [the One who is truly unique, the only One of His kind, the One who alone can save him]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is the judgment
  - type: text
    text: ' [that is, the cause for indictment, the test by which people are judged, the basis for the sentence]: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'the Light has come into the world, and people loved the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 1:5.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: darkness rather than the Light, for their deeds were evil.
  - type: text
    text: ' [Is 5:20] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For every wrongdoer hates the Light, and does not come to the Light
  - type: text
    text: ' [but shrinks from it] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for fear that his
  - type: text
    text: ' [sinful, worthless] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'activities will be exposed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' condemned.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But whoever practices truth
  - type: text
    text: ' [and does what is right—morally, ethically, spiritually] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: comes to the Light, so that his works may be plainly shown to be what they are—accomplished in God
  - type: text
    text: ' [divinely prompted, done with God’s help, in dependence on Him].”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: John’s Last Testimony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After these things Jesus and His disciples went into the land of Judea, and there He spent time with them and baptized. [John 4:1, 2] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now John was also baptizing at Aenon near Salim, because there was an abundance of water there; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' were coming and were being baptized— '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: for John had not yet been thrown into prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Therefore there arose a controversy between John’s disciples and a Jew in regard to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An immersion baptism was one of the requirements for a convert to Judaism, and John the Baptist had most likely taken over the ritual, giving it new meaning in his own ministry. Jewish tradition specified that there had to be enough water to completely cover a person, and that it had to be collected naturally.
    marker-yv: yv-n
  - type: text
    text: 'purification (ceremonial washing). '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So they came to John and said to him, “Rabbi (Teacher), the Man who was with you on the other side of the Jordan [at the Jordan River crossing]—and to whom you have testified—look, He is baptizing too, and everyone is going to Him!” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'John replied, “A man can receive nothing [he can claim nothing at all] unless it has been granted to him from heaven [for there is no other source than the sovereign will of God]. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You yourselves are my witnesses that I stated, ‘I am not the Christ (the Messiah, the Anointed),’ but, ‘I have [only] been sent ahead of Him [as His appointed forerunner and messenger to announce and proclaim His coming].’ [Mal 3:1] '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He who has the bride is the bridegroom; but the friend of the bridegroom, who stands by and listens to him, rejoices greatly because of the bridegroom’s voice. So this pleasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joy of mine is now complete. [Song 5:1] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: He must increase [in prominence], but I must decrease. [Is 9:7]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“He who comes from [heaven] above is above all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: others;
  - type: text
    text: ' he who is of the earth is from the earth and speaks [about things] of the earth [his viewpoint and experience are earthly]. He who comes from heaven is above all. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'What He has [actually] seen and heard, of that He testifies; and yet no one accepts His testimony [as true]. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Whoever receives His testimony has set his seal [of approval] to this: God is true [and he knows that God cannot lie]. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'For He whom God has sent speaks the words of God [proclaiming the Father’s own message]; for God gives the [gift of the] Spirit without measure [generously and boundlessly]! [Deut 18:18] '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The Father loves the Son and has given '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' entrusted all things into His hand. [Dan 7:14] '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He who believes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusts in the Son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accepts Him [as Savior] has eternal life [that is, already possesses it]; but he who does not believe the Son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chooses to reject Him, [disobeying Him and denying Him as Savior] will not see [eternal] life, but [instead] the wrath of God hangs over him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: .” [Heb 3:18]
