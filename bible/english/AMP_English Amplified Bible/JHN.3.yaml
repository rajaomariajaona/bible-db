  '25':
  - type: text
    content: 'Therefore there arose a controversy between John’s disciples and a Jew in regard to '
  - type: note
    content: An immersion baptism was one of the requirements for a convert to Judaism, and John the Baptist had most likely taken over the ritual, giving it new meaning in his own ministry. Jewish tradition specified that there had to be enough water to completely cover a person, and that it had to be collected naturally.
  - type: text
    content: 'purification (ceremonial washing). '
  '26':
  - type: text
    content: 'So they came to John and said to him, “Rabbi (Teacher), the Man who was with you on the other side of the Jordan [at the Jordan River crossing]—and to whom you have testified—look, He is baptizing too, and everyone is going to Him!” '
  '27':
  - type: text
    content: 'John replied, “A man can receive nothing [he can claim nothing at all] unless it has been granted to him from heaven [for there is no other source than the sovereign will of God]. '
  '28':
  - type: text
    content: 'You yourselves are my witnesses that I stated, ‘I am not the Christ (the Messiah, the Anointed),’ but, ‘I have [only] been sent ahead of Him [as His appointed forerunner and messenger to announce and proclaim His coming].’ [Mal 3:1] '
  '29':
