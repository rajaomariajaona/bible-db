  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They stooped over, they have bowed down together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They could not rescue the burden [of their own idols],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But have themselves gone into captivity.
