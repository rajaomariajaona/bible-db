    text: Bel has bowed down, Nebo stoops over;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their idols are on the beasts [of burden] and on the cattle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your burdens [of idols] are loaded [on them],
- type: usfm
  marker: q1
  children:
  - type: text
