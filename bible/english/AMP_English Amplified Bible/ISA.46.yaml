  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“To whom would you liken Me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make Me equal and compare Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That we may be alike? [Is 40:18-20]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Those who lavish gold from the bag
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And weigh out silver on the scales
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hire a goldsmith, and he makes it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into
    - type: text
      text: ' a god;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They bow down, indeed they worship it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They lift it on their shoulders [in religious processions or into battle] and carry it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They set it in its place and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' it remains standing.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It cannot move from its place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if one cries to it [for help], the idol cannot answer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It cannot save him from his distress.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Remember this, and take courage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Take it to heart, you rebellious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disloyal people.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Remember [carefully] the former things [which I did] from ages past;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am God, and there is no one else;
  - type: usfm
    marker: q1
    children:
