    - type: text
      text: '5'
  - type: text
    text: ¶“To whom would you liken Me
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make Me equal and compare Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That we may be alike? [Is 40:18-20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Those who lavish gold from the bag
- type: usfm
  marker: q1
  children:
  - type: text
    text: And weigh out silver on the scales
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hire a goldsmith, and he makes it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into
  - type: text
    text: ' a god;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They bow down, indeed they worship it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “They lift it on their shoulders [in religious processions or into battle] and carry it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They set it in its place and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' it remains standing.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It cannot move from its place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even if one cries to it [for help], the idol cannot answer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It cannot save him from his distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Remember this, and take courage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Take it to heart, you rebellious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disloyal people.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Remember [carefully] the former things [which I did] from ages past;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am God, and there is no one else;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I am
  - type: text
    text: ' God, and there is no one like Me,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Declaring the end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the result from the beginning,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from ancient times the things which have not [yet] been done,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘My purpose will be established,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will do all that pleases Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fulfills My purpose,’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Calling a bird of prey from the east,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From a far country, the man (Cyrus) of My purpose.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Truly I have spoken; truly I will bring it to pass.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I have planned it, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be assured
  - type: text
    text: ' I will do it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '¶“Listen to Me, you stiff-necked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who are far from righteousness (right standing with God).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “I bring near My righteousness [in the salvation of Israel], it is not far away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My salvation will not delay.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will grant salvation in Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My glory for Israel.
