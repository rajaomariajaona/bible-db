  marker: q1
  children:
  - type: text
    text: 'And even to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' advanced old age I will carry you!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I have made '
  - type: usfm
