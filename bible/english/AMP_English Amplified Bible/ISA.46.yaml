    - type: text
      text: ' fulfills My purpose,’'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calling a bird of prey from the east,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From a far country, the man (Cyrus) of My purpose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truly I have spoken; truly I will bring it to pass.
  - type: usfm
    marker: q1
    children:
    - type: text
