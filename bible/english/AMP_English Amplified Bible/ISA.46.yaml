    - type: usfm
      marker: it
      children:
      - type: text
        text: be assured
    - type: text
      text: ' I will do it.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“Listen to Me, you stiff-necked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who are far from righteousness (right standing with God).
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I bring near My righteousness [in the salvation of Israel], it is not far away;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My salvation will not delay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will grant salvation in Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My glory for Israel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stooped over, they have bowed down together;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They could not rescue the burden [of their own idols],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But have themselves gone into captivity.
