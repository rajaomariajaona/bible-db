document_id: PSA.94,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 94
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' Implored to Avenge His People.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God, You to whom vengeance belongs,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, You to whom vengeance belongs, shine forth [in judgment]!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He who instructs the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Does He not rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punish,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who teaches man knowledge?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' knows the thoughts of man,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they are a mere breath (vain, empty, futile). [1 Cor 3:20]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '¶Blessed [with wisdom and prosperity] is the man whom You discipline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instruct, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whom You teach from Your law,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: That You may grant him [power to calm himself and find] peace in the days of adversity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Until the pit is dug for the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ungodly.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not abandon His people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will He abandon His inheritance.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For judgment will again be righteous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the upright in heart will follow it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Who will stand up for me against the evildoers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will take a stand for me against those who do wickedness?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶If the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had not been my help,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would soon have dwelt in [the land of] silence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If I say, “My foot has slipped,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', will hold me up.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: When my anxious thoughts multiply within me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your comforts delight me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rise up, O Judge of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give to the proud a fitting compensation.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Can a throne of destruction be allied with You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'One which frames '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devises mischief by decree [under the sacred name of law]?'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They band themselves together against the life of the righteous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And condemn the innocent to death.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has become my high tower '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defense,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my God the rock of my refuge.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He has turned back their own wickedness upon them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will destroy them by means of their own evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God will wipe them out.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', how long will the wicked,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will the wicked rejoice in triumph?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They pour out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: words,
    - type: text
      text: ' speaking arrogant things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who do evil boast proudly. [Jude 14, 15]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They crush Your people, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And afflict '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' abuse Your heritage.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '94:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Widows, resident aliens, and the fatherless were particularly vulnerable members of ancient society, since they often had little or no economic means. The wicked could easily take advantage of them. God in several Old Testament passages commanded Israel to care especially for these helpless members of society. See, for example, Deut 24:17-22; Ps 146:9; Is 1:17; Zech 7:9, 10.
      marker-yv: yv-n
    - type: text
      text: They kill the widow and the alien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And murder the fatherless.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Yet they say, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does not see,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor does the God of Jacob (Israel) notice it.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶Consider thoughtfully, you senseless (stupid ones) among the people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you [dull-minded] fools, when will you become wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He who made the ear, does He not hear?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who formed the eye, does He not see?
