document_id: PSA.94,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 94
  - type: heading
    content: The Lord Implored to Avenge His People.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ' God, You to whom vengeance belongs,'
  - type: text
    content: O God, You to whom vengeance belongs, shine forth [in judgment]!
  '10':
  - type: text
    content: He who instructs the nations,
  - type: text
    content: 'Does He not rebuke '
  - type: text
    content: and
  - type: text
    content: ' punish,'
  - type: text
    content: He who teaches man knowledge?
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' knows the thoughts of man,'
  - type: text
    content: That they are a mere breath (vain, empty, futile). [1 Cor 3:20]
  '12':
  - type: text
    content: '¶Blessed [with wisdom and prosperity] is the man whom You discipline '
  - type: text
    content: and
  - type: text
    content: ' instruct, O L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And whom You teach from Your law,
  '13':
  - type: text
    content: That You may grant him [power to calm himself and find] peace in the days of adversity,
  - type: text
    content: 'Until the pit is dug for the wicked '
  - type: text
    content: and
  - type: text
    content: ' ungodly.'
  '14':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will not abandon His people,'
  - type: text
    content: Nor will He abandon His inheritance.
  '15':
  - type: text
    content: For judgment will again be righteous,
  - type: text
    content: And all the upright in heart will follow it.
  '16':
  - type: text
    content: Who will stand up for me against the evildoers?
  - type: text
    content: Who will take a stand for me against those who do wickedness?
  '17':
  - type: text
    content: ¶If the L
  - type: heading
    content: ord
  - type: text
    content: ' had not been my help,'
  - type: text
    content: I would soon have dwelt in [the land of] silence.
  '18':
  - type: text
    content: If I say, “My foot has slipped,”
  - type: text
    content: 'Your compassion '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness, O L'
  - type: heading
    content: ord
  - type: text
    content: ', will hold me up.'
  '19':
  - type: text
    content: When my anxious thoughts multiply within me,
  - type: text
    content: Your comforts delight me.
  '2':
  - type: text
    content: Rise up, O Judge of the earth;
  - type: text
    content: Give to the proud a fitting compensation.
  '20':
  - type: text
    content: Can a throne of destruction be allied with You,
  - type: text
    content: 'One which frames '
  - type: text
    content: and
  - type: text
    content: ' devises mischief by decree [under the sacred name of law]?'
  '21':
  - type: text
    content: They band themselves together against the life of the righteous
  - type: text
    content: And condemn the innocent to death.
  '22':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' has become my high tower '
  - type: text
    content: and
  - type: text
    content: ' defense,'
  - type: text
    content: And my God the rock of my refuge.
  '23':
  - type: text
    content: He has turned back their own wickedness upon them
  - type: text
    content: And will destroy them by means of their own evil;
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' our God will wipe them out.'
  '3':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', how long will the wicked,'
  - type: text
    content: How long will the wicked rejoice in triumph?
  '4':
  - type: text
    content: 'They pour out '
  - type: text
    content: words,
  - type: text
    content: ' speaking arrogant things;'
  - type: text
    content: All who do evil boast proudly. [Jude 14, 15]
  '5':
  - type: text
    content: They crush Your people, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And afflict '
  - type: text
    content: and
  - type: text
    content: ' abuse Your heritage.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Widows, resident aliens, and the fatherless were particularly vulnerable members of ancient society, since they often had little or no economic means. The wicked could easily take advantage of them. God in several Old Testament passages commanded Israel to care especially for these helpless members of society. See, for example, Deut 24:17-22; Ps 146:9; Is 1:17; Zech 7:9, 10.
  - type: text
    content: They kill the widow and the alien
  - type: text
    content: And murder the fatherless.
  '7':
  - type: text
    content: Yet they say, “The L
  - type: heading
    content: ord
  - type: text
    content: ' does not see,'
  - type: text
    content: Nor does the God of Jacob (Israel) notice it.”
  '8':
  - type: text
    content: ¶Consider thoughtfully, you senseless (stupid ones) among the people;
  - type: text
    content: 'And you [dull-minded] fools, when will you become wise '
  - type: text
    content: and
  - type: text
    content: ' understand?'
  '9':
  - type: text
    content: He who made the ear, does He not hear?
  - type: text
    content: He who formed the eye, does He not see?
