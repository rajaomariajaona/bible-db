document_id: 2CH.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehoram Succeeds Jehoshaphat in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jehoshaphat slept with his fathers [in death] and was buried with them in the City of David; and his son Jehoram became king in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Azariah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Azaryahu, Michael, and Shephatiah. All of these were the sons of Jehoshaphat king of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Their father gave them many gifts of silver, gold, and valuable things, in addition to fortified cities in Judah; but he gave the kingdom to Jehoram because he was the firstborn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When Jehoram had ascended over the kingdom of his father and made himself secure, he killed all his brothers with the sword [to eliminate any rivals], and some of the leaders of Israel as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehoram was thirty-two years of age when he became king, and he reigned eight years in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He walked in the way of the kings of Israel, just as the house of Ahab had done (for he married the daughter of Ahab), and he did what was evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yet the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' would not destroy the house of David because of the covenant which He had made with David, and because He had promised to give a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a descendant on the throne.
    marker-yv: yv-n
  - type: text
    text: lamp to him and to his sons forever. [2 Sam 7:12-17; 1 Kin 11:36; Ps 132:17]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Revolt against Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In the days of Jehoram Edom revolted against the rule of Judah and set up a king over themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jehoram crossed over [the Jordan River] with his commanders and all his chariots, and rose up by night and struck down the Edomites who were surrounding him and the commanders of the chariots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So Edom revolted against the rule of Judah to this day. Then Libnah revolted at the same time against Jehoram’s rule, because he had abandoned (turned away from) the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of his fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moreover, he made [idolatrous] high places in the hill country of Judah, and caused the inhabitants of Jerusalem to be unfaithful [to God], and he led Judah astray [compelling the people’s cooperation].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then a letter came to Jehoram from Elijah the prophet, saying, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of David your father (ancestor): ‘Because you have not walked in the ways of your father Jehoshaphat nor in the ways of Asa king of Judah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'but have walked in the way of the kings of Israel, and caused Judah and the inhabitants of Jerusalem to be unfaithful [to God] as the house of Ahab was unfaithful, and you have also murdered your brothers, your father’s house (your own family), who were better than you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: behold, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is going to strike your people, your sons, your wives, and all your possessions with a great disaster; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: and you will suffer a severe illness, an intestinal disease, until your intestines come out because of the sickness, day after day.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' stirred up against Jehoram the spirit (anger) of the Philistines and of the Arabs who bordered the Ethiopians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They came against Judah and invaded it, and carried away all the possessions found in the king’s house (palace), together with his sons and his wives; so there was not a son left to him except Jehoahaz, the youngest of his sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: After all this, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck Jehoram with an incurable intestinal disease. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now it came about in the course of time, at the end of two years, that his intestines came out because of his disease and he died in excruciating pain. And his people did not make a funeral fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to honor
  - type: text
    text: ' him, like the fire for his fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years; and he departed with no one’s regret (sorrow). They buried him in the City of David, but not in the tombs of the kings.
