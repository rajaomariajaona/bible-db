document_id: 2CH.21,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoram Succeeds Jehoshaphat in Judah
  - type: text
    content: 'Jehoshaphat slept with his fathers [in death] and was buried with them in the City of David; and his son Jehoram became king in his place. '
  '10':
  - type: text
    content: So Edom revolted against the rule of Judah to this day. Then Libnah revolted at the same time against Jehoram’s rule, because he had abandoned (turned away from) the L
  - type: heading
    content: ord
  - type: text
    content: ' God of his fathers. '
  '11':
  - type: text
    content: Moreover, he made [idolatrous] high places in the hill country of Judah, and caused the inhabitants of Jerusalem to be unfaithful [to God], and he led Judah astray [compelling the people’s cooperation].
  '12':
  - type: text
    content: Then a letter came to Jehoram from Elijah the prophet, saying, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' God of David your father (ancestor): ‘Because you have not walked in the ways of your father Jehoshaphat nor in the ways of Asa king of Judah, '
  '13':
  - type: text
    content: 'but have walked in the way of the kings of Israel, and caused Judah and the inhabitants of Jerusalem to be unfaithful [to God] as the house of Ahab was unfaithful, and you have also murdered your brothers, your father’s house (your own family), who were better than you, '
  '14':
  - type: text
    content: behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' is going to strike your people, your sons, your wives, and all your possessions with a great disaster; '
  '15':
  - type: text
    content: and you will suffer a severe illness, an intestinal disease, until your intestines come out because of the sickness, day after day.’ ”
  '16':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' stirred up against Jehoram the spirit (anger) of the Philistines and of the Arabs who bordered the Ethiopians. '
  '17':
  - type: text
    content: They came against Judah and invaded it, and carried away all the possessions found in the king’s house (palace), together with his sons and his wives; so there was not a son left to him except Jehoahaz, the youngest of his sons.
  '18':
  - type: text
    content: After all this, the L
  - type: heading
    content: ord
  - type: text
    content: ' struck Jehoram with an incurable intestinal disease. '
  '19':
  - type: text
    content: 'Now it came about in the course of time, at the end of two years, that his intestines came out because of his disease and he died in excruciating pain. And his people did not make a funeral fire '
  - type: text
    content: to honor
  - type: text
    content: ' him, like the fire for his fathers. '
  '2':
  - type: text
    content: 'He had brothers, the sons of Jehoshaphat: Azariah, Jehiel, Zechariah, '
  - type: note
    content: Or Azariah.
  - type: text
    content: 'Azaryahu, Michael, and Shephatiah. All of these were the sons of Jehoshaphat king of Israel. '
  '20':
  - type: text
    content: Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years; and he departed with no one’s regret (sorrow). They buried him in the City of David, but not in the tombs of the kings.
  '3':
  - type: text
    content: Their father gave them many gifts of silver, gold, and valuable things, in addition to fortified cities in Judah; but he gave the kingdom to Jehoram because he was the firstborn.
  '4':
  - type: text
    content: 'When Jehoram had ascended over the kingdom of his father and made himself secure, he killed all his brothers with the sword [to eliminate any rivals], and some of the leaders of Israel as well. '
  '5':
  - type: text
    content: 'Jehoram was thirty-two years of age when he became king, and he reigned eight years in Jerusalem. '
  '6':
  - type: text
    content: He walked in the way of the kings of Israel, just as the house of Ahab had done (for he married the daughter of Ahab), and he did what was evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '7':
  - type: text
    content: Yet the L
  - type: heading
    content: ord
  - type: text
    content: ' would not destroy the house of David because of the covenant which He had made with David, and because He had promised to give a '
  - type: note
    content: I.e. a descendant on the throne.
  - type: text
    content: lamp to him and to his sons forever. [2 Sam 7:12-17; 1 Kin 11:36; Ps 132:17]
  - type: heading
    content: Revolt against Judah
  '8':
  - type: text
    content: 'In the days of Jehoram Edom revolted against the rule of Judah and set up a king over themselves. '
  '9':
  - type: text
    content: 'Then Jehoram crossed over [the Jordan River] with his commanders and all his chariots, and rose up by night and struck down the Edomites who were surrounding him and the commanders of the chariots. '
