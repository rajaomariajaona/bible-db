verses:
  '1':
  - type: heading
    content: War of the Kings
  - type: text
    content: 'In the days of the [Eastern] kings Amraphel of Shinar, Arioch of Ellasar, Chedorlaomer of Elam, and Tidal of Goiim, '
  '10':
  - type: text
    content: 'Now the Valley of Siddim was full of tar (bitumen) pits; and as the kings of Sodom and Gomorrah fled, they fell into them. But the remainder [of the kings] who survived fled to the hill country. '
  '11':
  - type: text
    content: 'Then the victors took all the possessions of Sodom and Gomorrah and all their food supply '
  - type: text
    content: and
  - type: text
    content: ' provisions and left. '
  '12':
  - type: text
    content: And they also took [captive] Lot, Abram’s nephew, and his possessions and left, for he was living in Sodom.
  '13':
  - type: text
    content: 'Then a survivor who had escaped [from the invading forces on the other side of the Jordan] came and told Abram the '
  - type: note
    content: This ethnic designation means “descended from Eber” or, more probably, “one who crosses (a border).”
  - type: text
    content: 'Hebrew. Now he was living by the terebinths (oaks) of Mamre the Amorite, brother of Eshcol and brother of Aner—they were allies of Abram. '
  '14':
  - type: text
    content: 'When Abram heard that his nephew [Lot] had been captured, he armed '
  - type: text
    content: and
  - type: text
    content: ' led out his trained men, born in his own house, [numbering] three hundred and eighteen, and went in pursuit as far [north] as Dan. '
  '15':
  - type: text
    content: 'He divided his forces against them by night, he and his servants, and attacked '
  - type: text
    content: and
  - type: text
    content: ' defeated them, and pursued them as far as Hobah, which is north of Damascus. '
  '16':
  - type: text
    content: And he brought back all the goods, and also brought back his nephew Lot and his possessions, and also the women, and the people.
  - type: heading
    content: Abram and Melchizedek
  '17':
  - type: text
    content: 'Then after Abram’s return from the defeat (slaughter) of Chedorlaomer and the kings who were with him, the king of Sodom went out to meet him at the Valley of Shaveh (that is, the King’s Valley). '
  '18':
  - type: note
    content: Heb king of righteousness.
  - type: text
    content: 'Melchizedek king of Salem (ancient Jerusalem) brought out bread and wine [for them]; he was the priest of '
  - type: note
    content: Heb El Elyon and so throughout the chapter. The supreme Ruler of all the universe; His dominion is all encompassing and everlasting.
  - type: text
    content: 'God Most High. '
  '19':
  - type: text
    content: And Melchizedek blessed Abram and said,
  - type: text
    content: “Blessed (joyful, favored) be Abram by God Most High,
  - type: text
    content: 'Creator '
  - type: text
    content: and
  - type: text
    content: ' Possessor of heaven and earth;'
  '2':
  - type: text
    content: 'they [invaded the Jordan Valley near the Dead Sea, and] made war with Bera king of Sodom, Birsha king of Gomorrah, Shinab king of Admah, Shemeber king of Zeboiim, and the king of Bela '
  - type: note
    content: One of the many facts supporting the antiquity of Genesis is that many of the original names of places mentioned were so old that Moses had to add an explanation in order to identify these ancient names, so that the Israelites returning from Egypt could recognize them. Chapter 14 alone contains six such explanatory notes (Gen 14:2, 3, 7, 8, 15, 17).
  - type: text
    content: '(that is, Zoar). '
  '20':
  - type: text
    content: 'And blessed, praised, '
  - type: text
    content: and
  - type: text
    content: ' glorified be God Most High,'
  - type: text
    content: Who has given your enemies into your hand.”
  - type: text
    content: 'And Abram gave him a tenth of all [the treasure he had taken in battle]. [Heb 7:1-10] '
  '21':
  - type: text
    content: 'The king of Sodom said to Abram, “Give me the people and keep the goods (spoils of battle) for yourself.” '
  '22':
  - type: text
    content: 'But Abram said to the king of Sodom, “I have raised my hand '
  - type: text
    content: and
  - type: text
    content: ' sworn an oath to the L'
  - type: heading
    content: ord
  - type: text
    content: ' God Most High, the Creator '
  - type: text
    content: and
  - type: text
    content: ' Possessor of heaven and earth, '
  '23':
  - type: text
    content: 'that I would not take anything that is yours, from a thread to a sandal strap, so you could not say, ‘I [the King of Sodom] have made Abram rich.’ '
  '24':
  - type: text
    content: I will take nothing except what my young men have eaten, and the share of the spoils belonging to the men [my allies] who went with me—Aner, Eshcol, and Mamre; let them take their share of the spoils.”
  '3':
  - type: text
    content: 'All of these [kings] joined together [as allies] in the Valley of Siddim (that is, the Sea of Salt). '
  '4':
  - type: text
    content: 'Twelve years they had served Chedorlaomer [the most powerful king in the invading confederacy], but in the thirteenth year they rebelled. '
  '5':
  - type: text
    content: 'In the fourteenth year Chedorlaomer and the [three] kings who were with him attacked and subdued the Rephaim in Ashteroth-karnaim, the Zuzim in Ham, and the Emim in Shaveh-kiriathaim, '
  '6':
  - type: text
    content: 'and the Horites in their mountainous country of Seir, as far as El-paran, which is on the border of the wilderness. '
  '7':
  - type: text
    content: 'Then they turned back and came to En-mishpat (that is, Kadesh), and subdued all the country of the Amalekites, and also the Amorites who lived in Hazazon-tamar. '
  '8':
  - type: text
    content: 'Then the kings of Sodom, Gomorrah, Admah, Zeboiim, and Bela (that is, Zoar) came out; and they joined together for battle with the invading kings in the Valley of Siddim, '
  '9':
  - type: text
    content: 'against Chedorlaomer king of Elam and Tidal king of Goiim and Amraphel king of Shinar and Arioch king of Ellasar—four kings against five. '
