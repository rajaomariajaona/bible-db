document_id: GEN.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: War of the Kings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the days of the [Eastern] kings Amraphel of Shinar, Arioch of Ellasar, Chedorlaomer of Elam, and Tidal of Goiim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'they [invaded the Jordan Valley near the Dead Sea, and] made war with Bera king of Sodom, Birsha king of Gomorrah, Shinab king of Admah, Shemeber king of Zeboiim, and the king of Bela '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One of the many facts supporting the antiquity of Genesis is that many of the original names of places mentioned were so old that Moses had to add an explanation in order to identify these ancient names, so that the Israelites returning from Egypt could recognize them. Chapter 14 alone contains six such explanatory notes (Gen 14:2, 3, 7, 8, 15, 17).
    marker-yv: yv-n
  - type: text
    text: '(that is, Zoar). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All of these [kings] joined together [as allies] in the Valley of Siddim (that is, the Sea of Salt). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Twelve years they had served Chedorlaomer [the most powerful king in the invading confederacy], but in the thirteenth year they rebelled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In the fourteenth year Chedorlaomer and the [three] kings who were with him attacked and subdued the Rephaim in Ashteroth-karnaim, the Zuzim in Ham, and the Emim in Shaveh-kiriathaim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and the Horites in their mountainous country of Seir, as far as El-paran, which is on the border of the wilderness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then they turned back and came to En-mishpat (that is, Kadesh), and subdued all the country of the Amalekites, and also the Amorites who lived in Hazazon-tamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the kings of Sodom, Gomorrah, Admah, Zeboiim, and Bela (that is, Zoar) came out; and they joined together for battle with the invading kings in the Valley of Siddim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'against Chedorlaomer king of Elam and Tidal king of Goiim and Amraphel king of Shinar and Arioch king of Ellasar—four kings against five. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now the Valley of Siddim was full of tar (bitumen) pits; and as the kings of Sodom and Gomorrah fled, they fell into them. But the remainder [of the kings] who survived fled to the hill country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the victors took all the possessions of Sodom and Gomorrah and all their food supply '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provisions and left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And they also took [captive] Lot, Abram’s nephew, and his possessions and left, for he was living in Sodom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then a survivor who had escaped [from the invading forces on the other side of the Jordan] came and told Abram the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This ethnic designation means “descended from Eber” or, more probably, “one who crosses (a border).”
    marker-yv: yv-n
  - type: text
    text: 'Hebrew. Now he was living by the terebinths (oaks) of Mamre the Amorite, brother of Eshcol and brother of Aner—they were allies of Abram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Abram heard that his nephew [Lot] had been captured, he armed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' led out his trained men, born in his own house, [numbering] three hundred and eighteen, and went in pursuit as far [north] as Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He divided his forces against them by night, he and his servants, and attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defeated them, and pursued them as far as Hobah, which is north of Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And he brought back all the goods, and also brought back his nephew Lot and his possessions, and also the women, and the people.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abram and Melchizedek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then after Abram’s return from the defeat (slaughter) of Chedorlaomer and the kings who were with him, the king of Sodom went out to meet him at the Valley of Shaveh (that is, the King’s Valley). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: king of righteousness
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Melchizedek king of Salem (ancient Jerusalem) brought out bread and wine [for them]; he was the priest of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Elyon
      - type: text
        text: ' and so throughout the chapter. The supreme Ruler of all the universe; His dominion is all encompassing and everlasting.'
    marker-yv: yv-n
  - type: text
    text: 'God Most High. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And Melchizedek blessed Abram and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed (joyful, favored) be Abram by God Most High,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Creator '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Possessor of heaven and earth;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And blessed, praised, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorified be God Most High,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has given your enemies into your hand.”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And Abram gave him a tenth of all [the treasure he had taken in battle]. [Heb 7:1-10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The king of Sodom said to Abram, “Give me the people and keep the goods (spoils of battle) for yourself.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Abram said to the king of Sodom, “I have raised my hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sworn an oath to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God Most High, the Creator '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Possessor of heaven and earth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'that I would not take anything that is yours, from a thread to a sandal strap, so you could not say, ‘I [the King of Sodom] have made Abram rich.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will take nothing except what my young men have eaten, and the share of the spoils belonging to the men [my allies] who went with me—Aner, Eshcol, and Mamre; let them take their share of the spoils.”
