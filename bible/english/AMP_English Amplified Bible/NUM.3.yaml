document_id: NUM.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Levites to Be Priesthood
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now these are the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: records of the
    - type: text
      text: ' generations of Aaron and Moses in the day when the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke [by special revelation] with Moses on Mount Sinai. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So you shall appoint Aaron and his sons, and they shall observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attend to their priesthood; but the layman (non-Levite) who approaches [the holy things] shall be put to death.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Again the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Behold, I have taken the Levites from among the sons of Israel instead of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as a substitute for every firstborn, that is, the first that opens the womb among the Israelites. So the Levites shall be Mine, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: for all the firstborn are Mine. On the day that I killed all the firstborn in the land of Egypt, I consecrated for Myself all the firstborn in Israel, both man and animal. They shall be mine; I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses in the Wilderness of Sinai, saying, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Number the sons of Levi by their fathers’ households, by their families (clans). You shall number every male from a month old and upward.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So Moses numbered them just as he was commanded by the word (mouth) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'These are the [three] sons of Levi by their names: Gershon, Kohath, and Merari. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'These are the names of the [two] sons of Gershon by their families: Libni and Shimei; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and the [four] sons of Kohath by their families: Amram, Izhar, Hebron, and Uzziel; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'These are the names of the sons of Aaron: Nadab the firstborn, Abihu, Eleazar, and Ithamar. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and the [two] sons of Merari by their families: Mahli and Mushi. These are the families of the Levites by their fathers’ households.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Of Gershon were the families of the Libnites and of the Shimeites. These are the families of the Gershonites. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The males who were numbered, every male from a month old and upward totaled 7,500. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The families of the Gershonites were to camp behind the tabernacle on the west, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: and the leader of the fathers’ households of the Gershonites was Eliasaph the son of Lael.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties of the Levites
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now the responsibilities of the sons of Gershon in the Tent of Meeting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: involved
    - type: text
      text: ' the tabernacle and the tent, its covering, and the curtain for the doorway of the Tent of Meeting, '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and the hangings of the courtyard, the curtain for the doorway of the courtyard which is around the tabernacle and the altar, its tent ropes, and all the service '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: of it
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: concerning them.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Of Kohath were the families of the Amramites, the Izharites, the Hebronites, and the Uzzielites; these are the families of the Kohathites. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The males who were numbered, every male from a month old and upward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: totaled
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some suspect that this count should be 8,300 which, when added to the 7,500 of v 22 and the 6,200 of v 34 gives the total of 22,000 in v 39. Unless the figure there was rounded, the number here may have been a copyist’s error (omitting just one letter between two that are the same in Hebrew).
      marker-yv: yv-n
    - type: text
      text: '8,600, attending to the duties of the sanctuary. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The families of the sons of Kohath were to camp on the south side of the tabernacle, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'These are the names of the sons of Aaron, the priests who were anointed, whom Aaron '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: filled their hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'consecrated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordained to minister in the priest’s office. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and the leader of the fathers’ households of the families of the Kohathites was Elizaphan the son of Uzziel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Now their responsibilities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: involved
    - type: text
      text: ' the ark, the table [on which the bread of the Presence was placed], the lampstand, the altars, the utensils of the sanctuary with which the priests minister, and the curtain, and all the service concerning them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Eleazar, the son of Aaron the priest, was chief of the leaders of the Levites; he supervised those who performed the duties of the sanctuary.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Of Merari were the families of the Mahlites and the Mushites; these are the families of Merari. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The males who were numbered, every male from a month old and upward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: totaled
    - type: text
      text: ' 6,200. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The leader of the fathers’ households of the families of Merari was Zuriel the son of Abihail. The Merarites were to camp on the north side of the tabernacle. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Now the appointed responsibilities of the sons of Merari '
    - type: usfm
      marker: it
      children:
      - type: text
        text: involved
    - type: text
      text: ' the frames of the tabernacle, its bars, its pillars, its sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases, and all the equipment, and all the service concerning them, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: and the pillars around the courtyard with their bases and their pegs and their cords (tent ropes).
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Now those to camp before the tabernacle toward the east, before the Tent of Meeting, toward the sunrise, were to be Moses, and Aaron and his sons, performing the duties of the sanctuary for whatever was required of the Israelites; and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This ban against “the layman” or “the unauthorized” from coming near the sanctuary (the sacred tent, the tabernacle proper) should not be construed as discrimination against people who were not Israelites. It included everyone except the ordained descendants of Levi of the house of Aaron. The tabernacle proper was made up of two small rooms which no one except the priest or priests who had the assignment was ever to enter. The congregation entered the outside enclosure (the courtyard) only. This was true also of the later temples. Neither Jesus nor any of his disciples or Paul ever entered the sanctuary. When Jesus “taught in the temple” or “entered into the temple,” the Greek word invariably indicates that He was in the temple enclosure (
        - type: usfm
          marker: it
          children:
          - type: text
            text: hieron)
        - type: text
          text: ' and not in the sanctuary ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: naos)
        - type: text
          text: . A violation of this ban is recorded in 2 Chr 26:16-21. King Uzziah attempted to enter the sanctuary to burn incense. While he was being confronted and restrained by Azariah the priest and eighty others he broke out in leprosy. He remained a leper for the rest of his life.
      marker-yv: yv-n
    - type: text
      text: 'layman (non-Levite) who approached [the sanctuary] was to be put to death. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'All the men of the Levites whom Moses and Aaron numbered at the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', by their families, every male from a month old and upward, were 22,000.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Firstborn Redeemed
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But Nadab and Abihu died in the presence of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' when they offered strange (unholy, unacceptable, inappropriate) fire before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the Wilderness of Sinai; and they had no sons. So Eleazar and Ithamar served as priests '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: before the face.
      marker-yv: yv-n
    - type: text
      text: 'in the presence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under the supervision of Aaron their father. [Lev 10:1-4]'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Number every firstborn male of the Israelites from a month old and upward, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: take the number of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'make a list of their names. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'You shall take the Levites for Me instead of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as a substitute for all the firstborn among the Israelites. I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you shall take
    - type: text
      text: ' the cattle of the Levites instead of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' as a substitute for all the firstborn among the cattle of the Israelites.” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: So Moses numbered all the firstborn among the Israelites, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded him; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: and all the firstborn males from a month old and upward as numbered were 22,273 [273 more than the Levites].
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: “Take the Levites [for Me] instead of all the firstborn among the sons of Israel, and the cattle of the Levites instead of their cattle. And the Levites shall be Mine. I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'For the ransom (redemption price) of the 273 of the firstborn of the Israelites who outnumber the Levites, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'you shall take five shekels apiece, per head, you shall take them in terms of the sanctuary shekel (the shekel is twenty gerahs), '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'and give the money, the ransom (redemption price) of those who outnumber the Levites to Aaron and to his sons.” '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'So Moses took the ransom (redemption) money from those who were in excess, beyond those ransomed by the Levites; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'from the firstborn of the Israelites he took the money in terms of the sanctuary shekel, 1,365 shekels. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Then Moses gave the ransom money to Aaron and to his sons at the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Bring the tribe of Levi near and present them before Aaron the priest, so that they may serve him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They shall carry out the duties for him and for the whole congregation before the Tent of Meeting, doing the service of the tabernacle. '
