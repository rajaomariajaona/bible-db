document_id: JUD.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Warnings of History to the Ungodly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jude, a bond-servant of Jesus Christ, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jude and James were among the younger half-brothers of Jesus (Mark 6:3).
    marker-yv: yv-n
  - type: text
    text: 'brother of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: James was a prominent leader in the early church (Acts 15).
    marker-yv: yv-n
  - type: text
    text: James, [writes this letter],
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'o those who are the called (God’s chosen ones, the elect), dearly loved by God the Father, and kept [secure and set apart] for Jesus Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May mercy and peace and love be multiplied to you [filling your heart with the spiritual well-being and serenity experienced by those who walk closely with God].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Beloved, while I was making every effort to write you about our common salvation, I was compelled to write to you [urgently] appealing that you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: contend earnestly
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fight strenuously for [the defense of] the faith which was once for all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is no “secret knowledge” or “better way” or alternative belief system which God has revealed to some unique group or teacher. The truth is available to everyone.
    marker-yv: yv-n
  - type: text
    text: 'handed down to the saints [the faith that is the sum of Christian belief that was given verbally to believers]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For certain people have crept in unnoticed [just as if they were sneaking in by a side door]. They are ungodly persons whose condemnation was predicted long ago, for they distort the grace of our God into decadence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' immoral freedom [viewing it as an opportunity to do whatever they want], and deny '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disown our only Master and Lord, Jesus Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now I want to remind you, although you are fully informed once for all, that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two early mss read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jesus
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the Lord, after saving a people out of the land of Egypt, subsequently destroyed those who did not believe [who refused to trust and obey and rely on Him]. [Num 14:27-37] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And angels who did not keep their own designated place of power, but abandoned their proper dwelling place, [these] He has kept in eternal chains under [the thick gloom of utter] darkness for the judgment of the great day, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'just as Sodom and Gomorrah and the adjacent cities, since they in the same way as these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: angels
  - type: text
    text: ' indulged in gross immoral freedom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unnatural vice and sensual perversity. They are exhibited [in plain sight] as an example in undergoing the punishment of everlasting fire. [Gen 19:1-29]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nevertheless in the same way, these dreamers [who are dreaming that God will not punish them] also defile the body, and reject [legitimate] authority, and revile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mock angelic majesties. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But even the archangel Michael, when he was disputing with the devil (Satan), and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Jewish tradition, Michael claimed to be Moses’ teacher and was present when God put Moses to death (Midrash on Deut 11:10). Jude’s point is that if the archangel Michael had such respect for Satan’s power, then mere humans are extremely foolish to insult or show disrespect to angelic beings. This does not mean that true Christians cannot or should not engage in spiritual warfare with satanic forces; quite the contrary (Eph 6:12; James 4:7). But they should follow Michael’s example and act only as legitimate representatives of Christ who are in good standing with Him.
    marker-yv: yv-n
  - type: text
    text: 'arguing about the body of Moses, did not dare bring an abusive condemnation against him, but [simply] said, “The Lord rebuke you!” [Deut 34:5, 6; Zech 3:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But these men sneer at anything which they do not understand; and whatever they do know by [mere] instinct, like unreasoning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' irrational beasts—by these things they are destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Woe to them! For they have gone the [defiant] way of Cain, and for profit they have run headlong into the error of Balaam, and perished in the rebellion of [mutinous] Korah. [Gen 4:3-8; Num 16:22-24; 2 Pet 2:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'These men are hidden reefs [elements of great danger to others] in your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The early church frequently met together for a communal meal followed by the Lord’s Supper.
    marker-yv: yv-n
  - type: text
    text: 'love feasts when they feast together with you without fear, looking after [only] themselves; [they are like] clouds without water, swept along by the winds; autumn trees without fruit, doubly dead, uprooted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lifeless; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: wild waves of the sea, flinging up their own shame like foam; wandering stars, for whom the gloom of deep darkness has been reserved forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'It was about these people that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The descendant of Seth (Gen 5:18-24).
    marker-yv: yv-n
  - type: text
    text: 'Enoch, in the seventh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: generation
  - type: text
    text: ' from Adam, prophesied, when he said, “Look, the Lord came with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A Greek word meaning “ten thousand” in the singular. It is often used to refer to vast numbers of people or things that are virtually beyond counting.
    marker-yv: yv-n
  - type: text
    text: 'myriads of His holy ones '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'to execute judgment upon all, and to convict all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The purpose of the repetition is to emphasize the punishment determined for the false teachers.
    marker-yv: yv-n
  - type: text
    text: 'ungodly of all the ungodly deeds they have done in an ungodly way, and of all the harsh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cruel things ungodly sinners have spoken against Him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' are [habitual] murmurers, griping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complaining, following after their own desires [controlled by passion]; they speak arrogantly, [pretending admiration and] flattering people to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gain an
  - type: text
    text: ' advantage.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Keep Yourselves in the Love of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But as for you, beloved, remember the [prophetic] words spoken by the apostles of our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They used to say to you, “In the last days there will be scoffers, following after their own ungodly passions.” [2 Pet 3:3, 4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These are the ones who are [agitators] causing divisions—worldly-minded [secular, unspiritual, carnal, merely sensual—unsaved], devoid of the Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But you, beloved, build yourselves up on [the foundation of] your most holy faith [continually progress, rise like an edifice higher and higher], pray in the Holy Spirit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and keep yourselves in the love of God, waiting anxiously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' looking forward to the mercy of our Lord Jesus Christ [which will bring you] to eternal life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And have mercy on some, who are doubting; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'save others, snatching them out of the fire; and on some have mercy but with fear, loathing even the clothing spotted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' polluted by their shameless immoral freedom. [Amos 4:11; Zech 3:2-4]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now to Him who is able to keep you from stumbling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' falling into sin, and to present you unblemished [blameless and faultless] in the presence of His glory with triumphant joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unspeakable delight, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: to the only God our Savior, through Jesus Christ our Lord, be glory, majesty, dominion, and power, before all time and now and forever. Amen.
