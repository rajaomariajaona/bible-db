  '9':
  - type: text
    content: 'But even the archangel Michael, when he was disputing with the devil (Satan), and '
  - type: note
    content: In Jewish tradition, Michael claimed to be Moses’ teacher and was present when God put Moses to death (Midrash on Deut 11:10). Jude’s point is that if the archangel Michael had such respect for Satan’s power, then mere humans are extremely foolish to insult or show disrespect to angelic beings. This does not mean that true Christians cannot or should not engage in spiritual warfare with satanic forces; quite the contrary (Eph 6:12; James 4:7). But they should follow Michael’s example and act only as legitimate representatives of Christ who are in good standing with Him.
  - type: text
    content: 'arguing about the body of Moses, did not dare bring an abusive condemnation against him, but [simply] said, “The Lord rebuke you!” [Deut 34:5, 6; Zech 3:2] '
