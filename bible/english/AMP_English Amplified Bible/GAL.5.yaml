document_id: GAL.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Walk by the Spirit
  - type: text
    content: It was for this freedom that Christ set us free [completely liberating us]; therefore keep standing firm and do not be subject again to a yoke of slavery [which you once removed].
  '10':
  - type: text
    content: 'I have confidence in you in the Lord that you will adopt no other view [contrary to mine on the matter]; but the one who is disturbing you, whoever he is, will have to bear the penalty. '
  '11':
  - type: text
    content: 'But as for me, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers, if I am still preaching circumcision [as I had done before I met Christ; and as '
  - type: note
    content: Paul’s opponents in Galatia were trying to support their own arguments for circumcision by claiming that Paul was actually in favor of it. They probably knew that he had circumcised Timothy (Acts 16:3) and were taking advantage of that fact.
  - type: text
    content: 'some accuse me of doing now, as necessary for salvation], why am I still being persecuted [by Jews]? In that case the stumbling block of the cross [to unbelieving Jews] has been abolished. '
  '12':
  - type: text
    content: I wish that those who are troubling you [by teaching that circumcision is necessary for salvation] would even [go all the way and] castrate themselves!
  '13':
  - type: text
    content: 'For you, my brothers, were called to freedom; only do not let your freedom '
  - type: text
    content: become
  - type: text
    content: ' an opportunity for the '
  - type: note
    content: Lit flesh.
  - type: text
    content: 'sinful nature (worldliness, selfishness), but through '
  - type: note
    content: The key to understanding this and other statements about love is to know that this love (the Greek word agape) is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.
  - type: text
    content: 'love serve '
  - type: text
    content: and
  - type: text
    content: ' seek the best for one another. '
  '14':
  - type: text
    content: For the whole Law [concerning human relationships] is fulfilled in one precept, “Y
  - type: heading
    content: ou shall love your neighbor as yourself
  - type: text
    content: ' [that is, you shall have an unselfish concern for others and do things for their benefit].” [Lev 19:18] '
  '15':
  - type: text
    content: But if you bite and devour one another [in bickering and strife], watch out that you [along with your entire fellowship] are not consumed by one another.
  '16':
  - type: text
    content: 'But I say, walk '
  - type: text
    content: habitually
  - type: text
    content: ' in the [Holy] Spirit [seek Him and be responsive to His guidance], and then you will certainly not carry out the desire of the '
  - type: note
    content: Lit flesh.
  - type: text
    content: 'sinful nature [which responds impulsively without regard for God and His precepts]. '
  '17':
  - type: text
    content: 'For the sinful nature has its desire which is opposed to the Spirit, and the [desire of the] Spirit opposes the '
  - type: note
    content: Lit flesh.
  - type: text
    content: 'sinful nature; for these [two, the sinful nature and the Spirit] are in direct opposition to each other [continually in conflict], so that you [as believers] do not [always] do whatever [good things] you want to do. '
  '18':
  - type: text
    content: 'But if you are guided '
  - type: text
    content: and
  - type: text
    content: ' led by the Spirit, you are not subject to the Law. '
  '19':
  - type: text
    content: 'Now the practices of the '
  - type: note
    content: Lit flesh.
  - type: text
    content: 'sinful nature are '
  - type: text
    content: clearly
  - type: text
    content: ' evident: they are sexual immorality, impurity, sensuality (total irresponsibility, lack of self-control), '
  '2':
  - type: text
    content: 'Notice, it is I, Paul, who tells you that if you receive circumcision [as a supposed requirement of salvation], Christ will be of no benefit to you [for you will lack the faith in Christ that is necessary for salvation]. '
  '20':
  - type: note
    content: Including prostitution, which was often part of pagan ritual.
  - type: text
    content: 'idolatry, '
  - type: note
    content: Including such things as occult practices, witchcraft, worship of evil powers, drug-induced trances.
  - type: text
    content: 'sorcery, hostility, strife, jealousy, fits of anger, disputes, dissensions, factions [that promote heresies], '
  '21':
  - type: text
    content: 'envy, drunkenness, riotous behavior, and '
  - type: text
    content: other
  - type: text
    content: ' things like these. I warn you beforehand, just as I did previously, that those who practice such things will not inherit the kingdom of God. '
  '22':
  - type: text
    content: 'But the fruit of the Spirit [the result of His presence within us] is love [unselfish concern for others], joy, [inner] peace, patience [not the ability to wait, but how we act while waiting], kindness, goodness, faithfulness, '
  '23':
  - type: text
    content: 'gentleness, self-control. Against such things there is no law. '
  '24':
  - type: text
    content: 'And those who belong to Christ Jesus have crucified the '
  - type: note
    content: Lit flesh.
  - type: text
    content: sinful nature together with its passions and appetites.
  '25':
  - type: text
    content: 'If we [claim to] live by the [Holy] Spirit, we must also walk by the Spirit [with personal integrity, godly character, and moral courage—our conduct empowered by the Holy Spirit]. '
  '26':
  - type: text
    content: 'We must not become conceited, challenging '
  - type: text
    content: or
  - type: text
    content: ' provoking one another, envying one another.'
  '3':
  - type: text
    content: 'Once more I solemnly affirm to every man who receives circumcision [as a supposed requirement of salvation], that he is under obligation '
  - type: text
    content: and
  - type: text
    content: ' required to keep the whole Law. '
  '4':
  - type: text
    content: 'You have been severed from Christ, if you seek to be '
  - type: note
    content: See note 2:16.
  - type: text
    content: 'justified [that is, declared free of the guilt of sin and its penalty, and placed in right standing with God] through the Law; you have fallen from grace [for you have lost your grasp on God’s unmerited favor and blessing]. '
  '5':
  - type: text
    content: 'For we [not relying on the Law but] through the [strength and power of the Holy] Spirit, by faith, are waiting [confidently] for the hope of righteousness [the completion of our salvation]. '
  '6':
  - type: text
    content: 'For [if we are] in Christ Jesus neither circumcision nor uncircumcision means anything, but only faith activated '
  - type: text
    content: and
  - type: text
    content: ' expressed '
  - type: text
    content: and
  - type: text
    content: ' working through love.'
  '7':
  - type: text
    content: 'You were running [the race] well; who has interfered '
  - type: text
    content: and
  - type: text
    content: ' prevented you from obeying the truth? '
  '8':
  - type: text
    content: 'This [deceptive] persuasion is not from Him who called you [to freedom in Christ]. '
  '9':
  - type: text
    content: 'A little '
  - type: note
    content: Leaven (yeasty dough) represents the man-made tradition and false teachings that obscure the truth regarding salvation through personal belief and faith in Christ.
  - type: text
    content: 'leaven [a slight inclination to error, or a few false teachers] leavens the whole batch [it perverts the concept of faith and misleads the church]. '
