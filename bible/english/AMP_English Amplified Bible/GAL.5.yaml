document_id: GAL.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Walk by the Spirit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was for this freedom that Christ set us free [completely liberating us]; therefore keep standing firm and do not be subject again to a yoke of slavery [which you once removed].
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have confidence in you in the Lord that you will adopt no other view [contrary to mine on the matter]; but the one who is disturbing you, whoever he is, will have to bear the penalty. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for me, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers, if I am still preaching circumcision [as I had done before I met Christ; and as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul’s opponents in Galatia were trying to support their own arguments for circumcision by claiming that Paul was actually in favor of it. They probably knew that he had circumcised Timothy (Acts 16:3) and were taking advantage of that fact.
      marker-yv: yv-n
    - type: text
      text: 'some accuse me of doing now, as necessary for salvation], why am I still being persecuted [by Jews]? In that case the stumbling block of the cross [to unbelieving Jews] has been abolished. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I wish that those who are troubling you [by teaching that circumcision is necessary for salvation] would even [go all the way and] castrate themselves!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you, my brothers, were called to freedom; only do not let your freedom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: become
    - type: text
      text: ' an opportunity for the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'sinful nature (worldliness, selfishness), but through '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: agape)
        - type: text
          text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
      marker-yv: yv-n
    - type: text
      text: 'love serve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek the best for one another. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the whole Law [concerning human relationships] is fulfilled in one precept, “Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall love your neighbor as yourself
    - type: text
      text: ' [that is, you shall have an unselfish concern for others and do things for their benefit].” [Lev 19:18] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you bite and devour one another [in bickering and strife], watch out that you [along with your entire fellowship] are not consumed by one another.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I say, walk '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' in the [Holy] Spirit [seek Him and be responsive to His guidance], and then you will certainly not carry out the desire of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'sinful nature [which responds impulsively without regard for God and His precepts]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the sinful nature has its desire which is opposed to the Spirit, and the [desire of the] Spirit opposes the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'sinful nature; for these [two, the sinful nature and the Spirit] are in direct opposition to each other [continually in conflict], so that you [as believers] do not [always] do whatever [good things] you want to do. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you are guided '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' led by the Spirit, you are not subject to the Law. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the practices of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'sinful nature are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: clearly
    - type: text
      text: ' evident: they are sexual immorality, impurity, sensuality (total irresponsibility, lack of self-control), '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notice, it is I, Paul, who tells you that if you receive circumcision [as a supposed requirement of salvation], Christ will be of no benefit to you [for you will lack the faith in Christ that is necessary for salvation]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Including prostitution, which was often part of pagan ritual.
      marker-yv: yv-n
    - type: text
      text: 'idolatry, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Including such things as occult practices, witchcraft, worship of evil powers, drug-induced trances.
      marker-yv: yv-n
    - type: text
      text: 'sorcery, hostility, strife, jealousy, fits of anger, disputes, dissensions, factions [that promote heresies], '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'envy, drunkenness, riotous behavior, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' things like these. I warn you beforehand, just as I did previously, that those who practice such things will not inherit the kingdom of God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the fruit of the Spirit [the result of His presence within us] is love [unselfish concern for others], joy, [inner] peace, patience [not the ability to wait, but how we act while waiting], kindness, goodness, faithfulness, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'gentleness, self-control. Against such things there is no law. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those who belong to Christ Jesus have crucified the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: sinful nature together with its passions and appetites.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we [claim to] live by the [Holy] Spirit, we must also walk by the Spirit [with personal integrity, godly character, and moral courage—our conduct empowered by the Holy Spirit]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We must not become conceited, challenging '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' provoking one another, envying one another.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once more I solemnly affirm to every man who receives circumcision [as a supposed requirement of salvation], that he is under obligation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' required to keep the whole Law. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have been severed from Christ, if you seek to be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 2:16.
      marker-yv: yv-n
    - type: text
      text: 'justified [that is, declared free of the guilt of sin and its penalty, and placed in right standing with God] through the Law; you have fallen from grace [for you have lost your grasp on God’s unmerited favor and blessing]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we [not relying on the Law but] through the [strength and power of the Holy] Spirit, by faith, are waiting [confidently] for the hope of righteousness [the completion of our salvation]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For [if we are] in Christ Jesus neither circumcision nor uncircumcision means anything, but only faith activated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expressed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' working through love.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You were running [the race] well; who has interfered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prevented you from obeying the truth? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This [deceptive] persuasion is not from Him who called you [to freedom in Christ]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A little '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Leaven (yeasty dough) represents the man-made tradition and false teachings that obscure the truth regarding salvation through personal belief and faith in Christ.
      marker-yv: yv-n
    - type: text
      text: 'leaven [a slight inclination to error, or a few false teachers] leavens the whole batch [it perverts the concept of faith and misleads the church]. '
