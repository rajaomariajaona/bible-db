document_id: PSA.63,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 63
  - type: heading
    content: The Thirsting Soul Satisfied in God.
  - type: text
    content: A Psalm of David; when he was in the wilderness of Judah.
  - type: text
    content: O God, You are my God; with deepest longing I will seek You;
  - type: text
    content: 'My '
  - type: note
    content: See note 42:1.
  - type: text
    content: 'soul [my life, my very self] thirsts for You, my flesh longs '
  - type: text
    content: and
  - type: text
    content: ' sighs for You,'
  - type: text
    content: In a dry and weary land where there is no water.
  '10':
  - type: text
    content: They will be given over to the power of the sword;
  - type: text
    content: They will be a prey for foxes.
  '11':
  - type: text
    content: But the king will rejoice in God;
  - type: text
    content: Everyone who swears by Him [honoring the true God, acknowledging His authority and majesty] will glory,
  - type: text
    content: For the mouths of those who speak lies will be stopped.
  '2':
  - type: text
    content: So I have gazed upon You in the sanctuary,
  - type: text
    content: To see Your power and Your glory. [Ps 42:1, 2]
  '3':
  - type: text
    content: Because Your lovingkindness is better than life,
  - type: text
    content: My lips shall praise You.
  '4':
  - type: text
    content: So will I bless You as long as I live;
  - type: text
    content: I will lift up my hands in Your name.
  '5':
  - type: text
    content: 'My '
  - type: note
    content: See note 42:1.
  - type: text
    content: soul [my life, my very self] is satisfied as with marrow and fatness,
  - type: text
    content: And my mouth offers praises [to You] with joyful lips.
  '6':
  - type: text
    content: ¶When I remember You on my bed,
  - type: text
    content: 'I meditate '
  - type: text
    content: and
  - type: text
    content: ' thoughtfully focus on You in the night watches,'
  '7':
  - type: text
    content: For You have been my help,
  - type: text
    content: And in the shadow of Your wings [where I am always protected] I sing for joy.
  '8':
  - type: text
    content: 'My '
  - type: note
    content: See note 42:1.
  - type: text
    content: soul [my life, my very self] clings to You;
  - type: text
    content: Your right hand upholds me.
  '9':
  - type: text
    content: ¶But those who seek my life to destroy it
  - type: text
    content: Will [be destroyed and] go into the depths of the earth [into the underworld].
