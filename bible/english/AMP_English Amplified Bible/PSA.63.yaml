document_id: PSA.63
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 63
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Thirsting Soul Satisfied in God.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David; when he was in the wilderness of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, You are my God; with deepest longing I will seek You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 42:1.
    marker-yv: yv-n
  - type: text
    text: 'soul [my life, my very self] thirsts for You, my flesh longs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sighs for You,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In a dry and weary land where there is no water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So I have gazed upon You in the sanctuary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To see Your power and Your glory. [Ps 42:1, 2]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Because Your lovingkindness is better than life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My lips shall praise You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So will I bless You as long as I live;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will lift up my hands in Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 42:1.
    marker-yv: yv-n
  - type: text
    text: soul [my life, my very self] is satisfied as with marrow and fatness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my mouth offers praises [to You] with joyful lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶When I remember You on my bed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I meditate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoughtfully focus on You in the night watches,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For You have been my help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in the shadow of Your wings [where I am always protected] I sing for joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 42:1.
    marker-yv: yv-n
  - type: text
    text: soul [my life, my very self] clings to You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your right hand upholds me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶But those who seek my life to destroy it
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will [be destroyed and] go into the depths of the earth [into the underworld].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will be given over to the power of the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be a prey for foxes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the king will rejoice in God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who swears by Him [honoring the true God, acknowledging His authority and majesty] will glory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the mouths of those who speak lies will be stopped.
