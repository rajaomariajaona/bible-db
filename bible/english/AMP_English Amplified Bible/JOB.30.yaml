document_id: JOB.30,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Present State Is Humiliating
  - type: text
    content: '“But now those younger than I mock '
  - type: text
    content: and
  - type: text
    content: ' laugh at me,'
  - type: text
    content: Whose fathers I refused to put with the sheepdogs of my flock.
  '10':
  - type: text
    content: “They hate me, they stand aloof from me,
  - type: text
    content: And do not refrain from spitting in my face.
  '11':
  - type: text
    content: '“For God has loosed His bowstring [attacking me] and [He has] afflicted '
  - type: text
    content: and
  - type: text
    content: ' humbled me;'
  - type: text
    content: They have cast off the bridle [of restraint] before me.
  '12':
  - type: text
    content: “On my right the [rabble] brood rises;
  - type: text
    content: They push my feet away, and they build up their ways of destruction against me [like an advancing army].
  '13':
  - type: text
    content: '“They break up '
  - type: text
    content: and
  - type: text
    content: ' clutter my path [upsetting my plans],'
  - type: text
    content: They profit from my destruction;
  - type: text
    content: No one restrains them.
  '14':
  - type: text
    content: '“As '
  - type: text
    content: through
  - type: text
    content: ' a wide breach they come,'
  - type: text
    content: Amid the crash [of falling walls] they roll on [over me].
  '15':
  - type: text
    content: “Terrors are turned upon me;
  - type: text
    content: 'They chase away my honor '
  - type: text
    content: and
  - type: text
    content: ' reputation like the wind,'
  - type: text
    content: And my prosperity has passed away like a cloud.
  '16':
  - type: text
    content: ¶“And now my soul is poured out within me;
  - type: text
    content: The days of affliction have seized me.
  '17':
  - type: text
    content: “My bones are pierced [with aching] in the night season,
  - type: text
    content: 'And '
  - type: text
    content: the pains
  - type: text
    content: ' that gnaw me take no rest.'
  '18':
  - type: text
    content: '“By the great force [of my disease] my garment (skin) is disfigured '
  - type: text
    content: and
  - type: text
    content: ' blemished;'
  - type: text
    content: It binds about me [choking me] like the collar of my coat.
  '19':
  - type: text
    content: “God has cast me into the mire [a swampland of crisis],
  - type: text
    content: And I have become [worthless] like dust and ashes.
  '2':
  - type: text
    content: “Indeed, how could the strength of their hands profit me?
  - type: text
    content: Vigor had perished from them.
  '20':
  - type: text
    content: “I cry to You for help, [Lord,] but You do not answer me;
  - type: text
    content: I stand up, but You [only] gaze [indifferently] at me.
  '21':
  - type: text
    content: '“You have become harsh '
  - type: text
    content: and
  - type: text
    content: ' cruel to me;'
  - type: text
    content: With the might of Your hand You [keep me alive only to] persecute me.
  '22':
  - type: text
    content: “You lift me up on the wind and cause me to ride [upon it];
  - type: text
    content: 'And You toss me about in the tempest '
  - type: text
    content: and
  - type: text
    content: ' dissolve me in the storm.'
  '23':
  - type: text
    content: “For I know that You will bring me to death
  - type: text
    content: And to the house of meeting [appointed] for all the living.
  '24':
  - type: text
    content: ¶“However, does not one falling in a heap of ruins stretch out his hand?
  - type: text
    content: Or in his disaster [will he not] therefore cry out for help?
  '25':
  - type: text
    content: '“Did I not weep for one whose life was hard '
  - type: text
    content: and
  - type: text
    content: ' filled with trouble?'
  - type: text
    content: Was not my heart grieved for the needy?
  '26':
  - type: text
    content: “When I expected good, then came evil [to me];
  - type: text
    content: And when I waited for light, then came darkness.
  '27':
  - type: text
    content: '“I am seething within '
  - type: text
    content: and
  - type: text
    content: ' my heart is troubled and cannot rest;'
  - type: text
    content: Days of affliction come to meet me.
  '28':
  - type: text
    content: “I go about mourning without comfort [my skin blackened by disease, not by the heat of the sun];
  - type: text
    content: 'I stand up in the assembly '
  - type: text
    content: and
  - type: text
    content: ' cry out for help.'
  '29':
  - type: text
    content: “I am a brother to [howling] jackals,
  - type: text
    content: And a companion to ostriches [which scream dismally].
  '3':
  - type: text
    content: “They are gaunt with want and famine;
  - type: text
    content: 'They gnaw the dry '
  - type: text
    content: and
  - type: text
    content: ' barren ground by night in [the gloom of] waste and desolation.'
  '30':
  - type: text
    content: “My skin falls from me in blackened flakes,
  - type: text
    content: And my bones are burned with fever.
  '31':
  - type: text
    content: '“Therefore my lyre (harp) is '
  - type: text
    content: used
  - type: text
    content: ' for [the sound of] mourning,'
  - type: text
    content: And my flute for the [sound of the] voices of those who weep.
  '4':
  - type: text
    content: '“They pluck [and eat] '
  - type: note
    content: I.e. a plant of the salt marshes.
  - type: text
    content: saltwort (mallows) among the bushes,
  - type: text
    content: And their food is the root of the broom shrub.
  '5':
  - type: text
    content: “They are driven from the community;
  - type: text
    content: They shout after them as after a thief.
  '6':
  - type: text
    content: '“They must dwell on the slopes of '
  - type: note
    content: I.e. gullies or valleys made by torrents of water.
  - type: text
    content: wadis
  - type: text
    content: And in
  - type: text
    content: ' holes in the ground and in rocks.'
  '7':
  - type: text
    content: “Among the bushes they cry out [like wild animals];
  - type: text
    content: 'Beneath the prickly scrub they gather '
  - type: text
    content: and
  - type: text
    content: ' huddle together.'
  '8':
  - type: text
    content: “
  - type: text
    content: They are the
  - type: text
    content: ' sons of [worthless and nameless] fools,'
  - type: text
    content: They have been driven out of the land.
  '9':
  - type: text
    content: ¶“And now I have become [the subject of] their taunting;
  - type: text
    content: 'Yes, I am a '
  - type: note
    content: I.e. the object of cruel jokes.
  - type: text
    content: 'byword '
  - type: text
    content: and
  - type: text
    content: ' a laughingstock to them.'
