document_id: JOB.30,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job’s Present State Is Humiliating
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“But now those younger than I mock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' laugh at me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose fathers I refused to put with the sheepdogs of my flock.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “They hate me, they stand aloof from me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not refrain from spitting in my face.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“For God has loosed His bowstring [attacking me] and [He has] afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humbled me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have cast off the bridle [of restraint] before me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “On my right the [rabble] brood rises;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They push my feet away, and they build up their ways of destruction against me [like an advancing army].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“They break up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' clutter my path [upsetting my plans],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They profit from my destruction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one restrains them.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“As '
    - type: usfm
      marker: it
      children:
      - type: text
        text: through
    - type: text
      text: ' a wide breach they come,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amid the crash [of falling walls] they roll on [over me].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Terrors are turned upon me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They chase away my honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reputation like the wind,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my prosperity has passed away like a cloud.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ¶“And now my soul is poured out within me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days of affliction have seized me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “My bones are pierced [with aching] in the night season,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the pains
    - type: text
      text: ' that gnaw me take no rest.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“By the great force [of my disease] my garment (skin) is disfigured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blemished;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It binds about me [choking me] like the collar of my coat.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “God has cast me into the mire [a swampland of crisis],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have become [worthless] like dust and ashes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Indeed, how could the strength of their hands profit me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vigor had perished from them.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “I cry to You for help, [Lord,] but You do not answer me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I stand up, but You [only] gaze [indifferently] at me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“You have become harsh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cruel to me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the might of Your hand You [keep me alive only to] persecute me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “You lift me up on the wind and cause me to ride [upon it];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And You toss me about in the tempest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dissolve me in the storm.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “For I know that You will bring me to death
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the house of meeting [appointed] for all the living.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ¶“However, does not one falling in a heap of ruins stretch out his hand?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or in his disaster [will he not] therefore cry out for help?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“Did I not weep for one whose life was hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' filled with trouble?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was not my heart grieved for the needy?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “When I expected good, then came evil [to me];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when I waited for light, then came darkness.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“I am seething within '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my heart is troubled and cannot rest;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Days of affliction come to meet me.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “I go about mourning without comfort [my skin blackened by disease, not by the heat of the sun];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I stand up in the assembly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cry out for help.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “I am a brother to [howling] jackals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a companion to ostriches [which scream dismally].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “They are gaunt with want and famine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They gnaw the dry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' barren ground by night in [the gloom of] waste and desolation.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “My skin falls from me in blackened flakes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my bones are burned with fever.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“Therefore my lyre (harp) is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: used
    - type: text
      text: ' for [the sound of] mourning,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my flute for the [sound of the] voices of those who weep.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“They pluck [and eat] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a plant of the salt marshes.
      marker-yv: yv-n
    - type: text
      text: saltwort (mallows) among the bushes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their food is the root of the broom shrub.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “They are driven from the community;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shout after them as after a thief.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“They must dwell on the slopes of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. gullies or valleys made by torrents of water.
      marker-yv: yv-n
    - type: text
      text: wadis
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And in
    - type: text
      text: ' holes in the ground and in rocks.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Among the bushes they cry out [like wild animals];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Beneath the prickly scrub they gather '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' huddle together.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: They are the
    - type: text
      text: ' sons of [worthless and nameless] fools,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have been driven out of the land.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶“And now I have become [the subject of] their taunting;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, I am a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the object of cruel jokes.
      marker-yv: yv-n
    - type: text
      text: 'byword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a laughingstock to them.'
