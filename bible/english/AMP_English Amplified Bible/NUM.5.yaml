document_id: NUM.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: On Defilement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Command the Israelites to send away from the camp every leper and everyone who has a discharge, and whoever is defiled [that is, ceremonially unclean] by [coming in contact with] the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You shall send away both male and female; you shall send them outside the camp so that they will not defile their camp where I dwell in their midst.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The Israelites did so, and sent them outside the camp; just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said to Moses, so the Israelites did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Say to the Israelites, ‘When a man or woman commits any of the sins of mankind [against other people], thus breaking faith with the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and that person is guilty, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'then he shall confess the sin which he has committed, and he shall make restitution for his wrong in full, and add a fifth to it, and give it to [the person] whom he has wronged. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But if the man [who was wronged] has no redeemer (relative) to whom the restitution may be made, it is to be given to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for the priest, besides the ram of atonement with which atonement is made for the offender. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Also every contribution pertaining to all the holy gifts of the Israelites which they offer to the priest, shall be his. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And every man’s holy gifts shall be the priest’s; whatever any man gives the priest, it becomes his.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Adultery Test
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Speak to the Israelites and say to them, ‘If any man’s wife goes astray (deviates) and is unfaithful to him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and a man is intimate with her, and it is hidden from the eyes of her husband and it is kept secret, although she has defiled herself, and there is no witness against her and she has not been caught in the act, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and if a spirit (sense, attitude) of jealousy comes over him and he is jealous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' angry at his wife who has defiled herself—or if a spirit of jealousy comes over him and he is jealous of his wife when she has not defiled herself— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: then the man shall bring his wife to the priest, and he shall bring as an offering for her, a tenth of an ephah of barley meal; he shall not pour oil on it nor put frankincense on it [the symbols of favor and joy], because it is a grain offering of jealousy, a memorial grain offering, a reminder of [the consequences of] wickedness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘Then the priest shall have her approach and have her stand before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'and the priest shall take holy water [from the sacred basin] in an earthenware vessel; and he shall take some of the dust that is on the floor of the tabernacle and put it in the water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The priest shall then have the woman stand before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and let the hair of the woman’s head hang loose, and put the memorial grain offering in her hands, which is the jealousy offering, and in the hand of the priest is to be the water of bitterness that brings a curse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the priest shall have her take an oath and say to the woman, “If no man has lain with you and if you have not gone astray into uncleanness [while married], then be immune to this water of bitterness that brings a curse; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but if you have gone astray [while married] and you have defiled yourself and a man other than your husband has been intimate with you” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: (then the priest shall have the woman swear the oath of the curse, and say to the woman), “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' make you a curse and an oath among your people when the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' makes your thigh '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fall
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'waste away and your abdomen swell; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: and this water that brings a curse shall go into your stomach, and make your abdomen swell and your thigh waste away.” And the woman shall say, “Amen. Amen (so let it be).”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '‘The priest shall then write these curses on a scroll and shall wash them off into the water of bitterness; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and he shall make the woman drink the water of bitterness that brings a curse, and the water that brings the curse will go into her and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cause
  - type: text
    text: ' bitterness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then the priest shall take the grain offering of jealousy out of the woman’s hand, and he shall wave the grain offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and offer it on the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then the priest shall take a handful of the grain offering as the memorial portion of it and offer it up in smoke on the altar, and afterward he shall make the woman drink the water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When he has made her drink the water, then it shall come about, that if she has defiled herself and has been unfaithful to her husband, the curse water will go into her and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cause
  - type: text
    text: ' bitterness and cause her abdomen to swell and her thigh to waste away, and the woman will become a curse among her people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But if the woman has not defiled herself and is clean, then she will be free and conceive children.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '‘This is the law of jealousy: when a wife goes astray [while married] and defiles herself, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'or when a spirit (sense, attitude) of jealousy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suspicion comes on a man and he is jealous of his wife; then he shall have the woman stand before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the priest shall apply this law to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Further, the husband will be free from guilt, but that woman [if guilty] shall bear her guilt.’ ”
