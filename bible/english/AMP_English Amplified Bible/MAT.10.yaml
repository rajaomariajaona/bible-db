      - type: text
        text: The Twelve Disciples; Instructions for Service
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus summoned His twelve disciples and gave them authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power over unclean spirits, to cast them out, and to heal every kind of disease and every kind of sickness. [Mark 6:7; Luke 9:1]'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: or a provision bag for your journey, or even two tunics, or sandals, or a staff; for the worker deserves his support.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever city or village you enter, ask who in it is worthy
    - type: text
      text: ' [who welcomes you and your message], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and stay at his house until you leave
    - type: text
      text: ' [that city]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As you go into the house, give it your greeting
    - type: text
      text: ' [that is, ‘Peace be to this house’]. '
