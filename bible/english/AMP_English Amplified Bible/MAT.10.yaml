  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these are the names of the twelve '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In general usage the word “apostle” (Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: apostolos)
        - type: text
          text: ' means “sent one” or “messenger.” In this passage and others in reference to the “twelve,” the word “apostles” is used in a technical sense of the twelve disciples, and later Paul, whom Jesus chose. An apostle was one who witnessed Christ’s resurrection (Acts 1:21, 22; 1 Cor 9:1, 2). They validated their apostleship by performing “signs and wonders and miracles” (2 Cor 12:12), and were the foundation of the church.'
      marker-yv: yv-n
    - type: text
      text: 'apostles (special messengers, personally chosen representatives): first, Simon, who is called Peter, and Andrew, his brother; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is believed that Salome, Zebedee’s wife and the mother of James and John was a sister of Mary, the mother of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'James the son of Zebedee, and John his brother; [Mark 3:16-19; Luke 6:13-16] '
  '20':
