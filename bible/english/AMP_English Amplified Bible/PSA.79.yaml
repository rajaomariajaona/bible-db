document_id: PSA.79
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 79
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Lament over the Destruction of Jerusalem, and Prayer for Help.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, the nations have invaded [the land of Your people] Your inheritance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have defiled Your sacred temple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have laid Jerusalem in ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They have given the dead bodies of Your servants as food to the birds of the heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The flesh of Your godly ones to the beasts of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They have poured out their blood like water all around Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there was no one to bury them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We have become an object of taunting to our neighbors [because of our humiliation],
- type: usfm
  marker: q1
  children:
  - type: text
    text: A derision and mockery to those who encircle us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: How long, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '? Will You be angry forever?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will Your jealousy [which cannot endure a divided allegiance] burn like fire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pour out Your wrath on the [Gentile] nations that do not know You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the kingdoms that do not call on Your name. [2 Thess 1:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For they have devoured Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: And made his pasture desolate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '¶O do not remember against us the sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt of our forefathers.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let Your compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy come quickly to meet us,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For we have been brought very low.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Help us, O God of our salvation, for the glory of Your name;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rescue us, forgive us our sins for Your name’s sake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Why should the [Gentile] nations say, “Where is their God?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let there be known [without delay] among the nations in our sight [and to this generation],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your vengeance for the blood of Your servants which has been poured out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Let the groaning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sighing of the prisoner come before You;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to the greatness of Your power keep safe those who are doomed to die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And return into the lap of our neighbors sevenfold
- type: usfm
  marker: q1
  children:
  - type: text
    text: The taunts with which they have taunted You, O Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So we Your people, the sheep of Your pasture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will give You thanks forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We will declare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' publish Your praise from generation to generation.'
