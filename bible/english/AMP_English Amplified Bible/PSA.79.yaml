document_id: PSA.79,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 79
  - type: heading
    content: A Lament over the Destruction of Jerusalem, and Prayer for Help.
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: O God, the nations have invaded [the land of Your people] Your inheritance;
  - type: text
    content: They have defiled Your sacred temple;
  - type: text
    content: They have laid Jerusalem in ruins.
  '10':
  - type: text
    content: Why should the [Gentile] nations say, “Where is their God?”
  - type: text
    content: Let there be known [without delay] among the nations in our sight [and to this generation],
  - type: text
    content: Your vengeance for the blood of Your servants which has been poured out.
  '11':
  - type: text
    content: 'Let the groaning '
  - type: text
    content: and
  - type: text
    content: ' sighing of the prisoner come before You;'
  - type: text
    content: According to the greatness of Your power keep safe those who are doomed to die.
  '12':
  - type: text
    content: And return into the lap of our neighbors sevenfold
  - type: text
    content: The taunts with which they have taunted You, O Lord.
  '13':
  - type: text
    content: So we Your people, the sheep of Your pasture,
  - type: text
    content: Will give You thanks forever;
  - type: text
    content: 'We will declare '
  - type: text
    content: and
  - type: text
    content: ' publish Your praise from generation to generation.'
  '2':
  - type: text
    content: They have given the dead bodies of Your servants as food to the birds of the heavens,
  - type: text
    content: The flesh of Your godly ones to the beasts of the earth.
  '3':
  - type: text
    content: They have poured out their blood like water all around Jerusalem,
  - type: text
    content: And there was no one to bury them.
  '4':
  - type: text
    content: We have become an object of taunting to our neighbors [because of our humiliation],
  - type: text
    content: A derision and mockery to those who encircle us.
  '5':
  - type: text
    content: How long, O L
  - type: heading
    content: ord
  - type: text
    content: '? Will You be angry forever?'
  - type: text
    content: Will Your jealousy [which cannot endure a divided allegiance] burn like fire?
  '6':
  - type: text
    content: Pour out Your wrath on the [Gentile] nations that do not know You,
  - type: text
    content: And on the kingdoms that do not call on Your name. [2 Thess 1:8]
  '7':
  - type: text
    content: For they have devoured Jacob
  - type: text
    content: And made his pasture desolate.
  '8':
  - type: text
    content: '¶O do not remember against us the sins '
  - type: text
    content: and
  - type: text
    content: ' guilt of our forefathers.'
  - type: text
    content: 'Let Your compassion '
  - type: text
    content: and
  - type: text
    content: ' mercy come quickly to meet us,'
  - type: text
    content: For we have been brought very low.
  '9':
  - type: text
    content: Help us, O God of our salvation, for the glory of Your name;
  - type: text
    content: Rescue us, forgive us our sins for Your name’s sake.
