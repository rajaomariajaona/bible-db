document_id: PSA.79,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 79
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Lament over the Destruction of Jerusalem, and Prayer for Help.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, the nations have invaded [the land of Your people] Your inheritance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have defiled Your sacred temple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have laid Jerusalem in ruins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should the [Gentile] nations say, “Where is their God?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let there be known [without delay] among the nations in our sight [and to this generation],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your vengeance for the blood of Your servants which has been poured out.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the groaning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sighing of the prisoner come before You;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to the greatness of Your power keep safe those who are doomed to die.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And return into the lap of our neighbors sevenfold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The taunts with which they have taunted You, O Lord.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So we Your people, the sheep of Your pasture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will give You thanks forever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We will declare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' publish Your praise from generation to generation.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have given the dead bodies of Your servants as food to the birds of the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The flesh of Your godly ones to the beasts of the earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have poured out their blood like water all around Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there was no one to bury them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have become an object of taunting to our neighbors [because of our humiliation],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A derision and mockery to those who encircle us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '? Will You be angry forever?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will Your jealousy [which cannot endure a divided allegiance] burn like fire?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour out Your wrath on the [Gentile] nations that do not know You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on the kingdoms that do not call on Your name. [2 Thess 1:8]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have devoured Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And made his pasture desolate.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶O do not remember against us the sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of our forefathers.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let Your compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy come quickly to meet us,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For we have been brought very low.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help us, O God of our salvation, for the glory of Your name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue us, forgive us our sins for Your name’s sake.
