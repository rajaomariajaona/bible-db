document_id: 1KI.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon’s Officials
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Solomon was king over all [the people of] Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ben-hesed, in Arubboth (to him belonged Socoh and all the land of Hepher); '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ben-abinadab, in all the hills of Dor (Taphath, Solomon’s daughter, was his wife); '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baana the son of Ahilud, in Taanach, Megiddo, and all Beth-shean which is beside Zarethan below Jezreel, from Beth-shean to Abel-meholah as far as beyond Jokmeam; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ben-geber, in Ramoth-gilead (the villages of Jair the son of Manasseh, which are in Gilead belonged to him, also the region of Argob, which is in Bashan, sixty great cities with walls and bronze bars); '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahinadab the son of Iddo, in Mahanaim; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahimaaz, in [the tribe of] Naphtali (he also married Basemath, Solomon’s daughter); '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baana the son of Hushai, in [the tribe of] Asher and Bealoth; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat the son of Paruah, in [the tribe of] Issachar; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shimei the son of Ela, in [the tribe of] Benjamin; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Geber the son of Uri, in the land of Gilead, the country of Sihon king of the Amorites and of Og king of Bashan; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he was
    - type: text
      text: ' the only officer who was in the land.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon’s Power, Wealth and Wisdom
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were his [chief] officials: Azariah the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Here as in other passages, the Hebrew word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: son
        - type: text
          text: ' may refer to a grandson or more distant descendant, just as '
        - type: usfm
          marker: it
          children:
          - type: text
            text: father
        - type: text
          text: ' is also used of grandfathers and other ancestors.'
      marker-yv: yv-n
    - type: text
      text: 'son of Zadok was the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: high
    - type: text
      text: ' priest; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[The people of] Judah and Israel were as numerous as the sand that is in abundance by the sea; they were eating and drinking and rejoicing.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Hebrew text ch 5 begins with this verse.
      marker-yv: yv-n
    - type: text
      text: Now Solomon reigned over all the kingdoms from the [Euphrates] River to the land of the Philistines and to the border of Egypt; they brought tribute (money) and served Solomon all the days of his life.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon’s food [for the royal household] for one day was thirty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This was the largest unit of volume, but the actual amount varied because it was based on the volume of an egg, the basic Jewish standard of volume. The '
        - type: usfm
          marker: it
          children:
          - type: text
            text: kor
        - type: text
          text: ' was equivalent to the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: homer
        - type: text
          text: ' and was supposed to equal 4,320 eggs. Modern estimates of the volume range between seven and twelve bushels.'
      marker-yv: yv-n
    - type: text
      text: 'kors of finely milled flour, sixty kors of wheat flour, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ten fat oxen, twenty pasture-fed oxen, a hundred sheep not counting fallow deer, gazelles, roebucks, and fattened fowl. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he was ruling over everything west of the [Euphrates] River, from Tiphsah to Gaza, over all the kings west of the [Euphrates] River; and he had peace on all sides around him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judah and Israel lived in security, every man under his vine and fig tree [in peace and prosperity], from Dan [in the north] to Beersheba [in the south], during all the days of Solomon. [Mic 4:3, 4] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon also had '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One ms reads 4,000; cf 2 Chr 9:25.
      marker-yv: yv-n
    - type: text
      text: '40,000 stalls of horses for his chariots, and 12,000 horsemen. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those deputies provided food for King Solomon and for all [the staff] who came to King Solomon’s table, each in his month; they let nothing be lacking. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They also brought the barley and straw for the horses and swift steeds (warhorses, chargers) to the place where it was needed, each man according to his assignment.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now God gave Solomon [exceptional] wisdom and very great discernment and breadth of mind, like the sand of the seashore. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elihoreph and Ahijah the sons of Shisha, were scribes; Jehoshaphat the son of Ahilud was the recorder [of important events]; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon’s wisdom surpassed the wisdom of all the sons of the east and all the wisdom of Egypt. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he was wiser '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '“Wiser than all [other] men,” until Christ came. Jesus said, “Someone more '
        - type: usfm
          marker: it
          children:
          - type: text
            text: and
        - type: text
          text: ' greater than Solomon is here” (Matt 12:42).'
      marker-yv: yv-n
    - type: text
      text: 'than all [other] men, [wiser] than '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Together with Zimri (1 Chr 2:6), these men were reputed to be the wisest in the world.
      marker-yv: yv-n
    - type: text
      text: 'Ethan the Ezrahite, and Heman, Calcol, and Darda, the sons of Mahol. His fame was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: known
    - type: text
      text: ' in all the surrounding nations. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also spoke 3,000 proverbs, and his songs were 1,005. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spoke of trees, from the cedar which is in Lebanon to the hyssop [vine] that grows on the wall; he spoke also of animals, of birds, of creeping things, and fish. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: People came from all the peoples (nations) to hear the wisdom of Solomon, and from all the kings of the earth who had heard of his wisdom.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaiah the son of Jehoiada was in command of the army; Zadok and Abiathar were priests; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azariah the son of Nathan was in charge of the deputies; Zabud the son of Nathan was priest and was the king’s friend [and trusted advisor]; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahishar was in charge of the household (palace); and Adoniram the son of Abda was in charge of the forced labor.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon had twelve deputies over all Israel, who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: provided
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'secured provisions for the king and his household; each man had to provide for a month in the year. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were their names: Ben-hur, in the hill country of [the tribe of] Ephraim; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ben-deker in Makaz and Shaalbim and Beth-shemesh and Elon-beth-hanan; '
