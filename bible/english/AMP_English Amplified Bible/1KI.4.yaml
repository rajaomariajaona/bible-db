document_id: 1KI.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Officials
  - type: text
    content: 'King Solomon was king over all [the people of] Israel. '
  '10':
  - type: text
    content: 'Ben-hesed, in Arubboth (to him belonged Socoh and all the land of Hepher); '
  '11':
  - type: text
    content: 'Ben-abinadab, in all the hills of Dor (Taphath, Solomon’s daughter, was his wife); '
  '12':
  - type: text
    content: 'Baana the son of Ahilud, in Taanach, Megiddo, and all Beth-shean which is beside Zarethan below Jezreel, from Beth-shean to Abel-meholah as far as beyond Jokmeam; '
  '13':
  - type: text
    content: 'Ben-geber, in Ramoth-gilead (the villages of Jair the son of Manasseh, which are in Gilead belonged to him, also the region of Argob, which is in Bashan, sixty great cities with walls and bronze bars); '
  '14':
  - type: text
    content: 'Ahinadab the son of Iddo, in Mahanaim; '
  '15':
  - type: text
    content: 'Ahimaaz, in [the tribe of] Naphtali (he also married Basemath, Solomon’s daughter); '
  '16':
  - type: text
    content: 'Baana the son of Hushai, in [the tribe of] Asher and Bealoth; '
  '17':
  - type: text
    content: 'Jehoshaphat the son of Paruah, in [the tribe of] Issachar; '
  '18':
  - type: text
    content: 'Shimei the son of Ela, in [the tribe of] Benjamin; '
  '19':
  - type: text
    content: 'Geber the son of Uri, in the land of Gilead, the country of Sihon king of the Amorites and of Og king of Bashan; and '
  - type: text
    content: he was
  - type: text
    content: ' the only officer who was in the land.'
  - type: heading
    content: Solomon’s Power, Wealth and Wisdom
  '2':
  - type: text
    content: 'These were his [chief] officials: Azariah the '
  - type: note
    content: Here as in other passages, the Hebrew word son may refer to a grandson or more distant descendant, just as father is also used of grandfathers and other ancestors.
  - type: text
    content: 'son of Zadok was the '
  - type: text
    content: high
  - type: text
    content: ' priest; '
  '20':
  - type: text
    content: '[The people of] Judah and Israel were as numerous as the sand that is in abundance by the sea; they were eating and drinking and rejoicing.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: In the Hebrew text ch 5 begins with this verse.
  - type: text
    content: Now Solomon reigned over all the kingdoms from the [Euphrates] River to the land of the Philistines and to the border of Egypt; they brought tribute (money) and served Solomon all the days of his life.
  '22':
  - type: text
    content: 'Solomon’s food [for the royal household] for one day was thirty '
  - type: note
    content: This was the largest unit of volume, but the actual amount varied because it was based on the volume of an egg, the basic Jewish standard of volume. The kor was equivalent to the homer and was supposed to equal 4,320 eggs. Modern estimates of the volume range between seven and twelve bushels.
  - type: text
    content: 'kors of finely milled flour, sixty kors of wheat flour, '
  '23':
  - type: text
    content: 'ten fat oxen, twenty pasture-fed oxen, a hundred sheep not counting fallow deer, gazelles, roebucks, and fattened fowl. '
  '24':
  - type: text
    content: 'For he was ruling over everything west of the [Euphrates] River, from Tiphsah to Gaza, over all the kings west of the [Euphrates] River; and he had peace on all sides around him. '
  '25':
  - type: text
    content: 'Judah and Israel lived in security, every man under his vine and fig tree [in peace and prosperity], from Dan [in the north] to Beersheba [in the south], during all the days of Solomon. [Mic 4:3, 4] '
  '26':
  - type: text
    content: 'Solomon also had '
  - type: note
    content: One ms reads 4,000; cf 2 Chr 9:25.
  - type: text
    content: '40,000 stalls of horses for his chariots, and 12,000 horsemen. '
  '27':
  - type: text
    content: 'Those deputies provided food for King Solomon and for all [the staff] who came to King Solomon’s table, each in his month; they let nothing be lacking. '
  '28':
  - type: text
    content: They also brought the barley and straw for the horses and swift steeds (warhorses, chargers) to the place where it was needed, each man according to his assignment.
  '29':
  - type: text
    content: 'Now God gave Solomon [exceptional] wisdom and very great discernment and breadth of mind, like the sand of the seashore. '
  '3':
  - type: text
    content: 'Elihoreph and Ahijah the sons of Shisha, were scribes; Jehoshaphat the son of Ahilud was the recorder [of important events]; '
  '30':
  - type: text
    content: 'Solomon’s wisdom surpassed the wisdom of all the sons of the east and all the wisdom of Egypt. '
  '31':
  - type: text
    content: 'For he was wiser '
  - type: note
    content: “Wiser than all [other] men,” until Christ came. Jesus said, “Someone more and greater than Solomon is here” (Matt 12:42).
  - type: text
    content: 'than all [other] men, [wiser] than '
  - type: note
    content: Together with Zimri (1 Chr 2:6), these men were reputed to be the wisest in the world.
  - type: text
    content: 'Ethan the Ezrahite, and Heman, Calcol, and Darda, the sons of Mahol. His fame was '
  - type: text
    content: known
  - type: text
    content: ' in all the surrounding nations. '
  '32':
  - type: text
    content: 'He also spoke 3,000 proverbs, and his songs were 1,005. '
  '33':
  - type: text
    content: 'He spoke of trees, from the cedar which is in Lebanon to the hyssop [vine] that grows on the wall; he spoke also of animals, of birds, of creeping things, and fish. '
  '34':
  - type: text
    content: People came from all the peoples (nations) to hear the wisdom of Solomon, and from all the kings of the earth who had heard of his wisdom.
  '4':
  - type: text
    content: 'Benaiah the son of Jehoiada was in command of the army; Zadok and Abiathar were priests; '
  '5':
  - type: text
    content: 'Azariah the son of Nathan was in charge of the deputies; Zabud the son of Nathan was priest and was the king’s friend [and trusted advisor]; '
  '6':
  - type: text
    content: Ahishar was in charge of the household (palace); and Adoniram the son of Abda was in charge of the forced labor.
  '7':
  - type: text
    content: 'Solomon had twelve deputies over all Israel, who '
  - type: note
    content: Lit provided.
  - type: text
    content: 'secured provisions for the king and his household; each man had to provide for a month in the year. '
  '8':
  - type: text
    content: 'These were their names: Ben-hur, in the hill country of [the tribe of] Ephraim; '
  '9':
  - type: text
    content: 'Ben-deker in Makaz and Shaalbim and Beth-shemesh and Elon-beth-hanan; '
