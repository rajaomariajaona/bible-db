document_id: JER.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Drought and a Prayer for Mercy
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' that came to Jeremiah concerning the drought:'
  '10':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' to this people [Judah], “In the manner '
  - type: text
    content: and
  - type: text
    content: ' to the degree [already pointed out] they have loved to wander; they have not restrained their feet. Therefore the L'
  - type: heading
    content: ord
  - type: text
    content: ' does not accept them; He will now remember [in detail] their wickedness and punish them for their sins.” '
  '11':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Do not pray for good things for this people. '
  '12':
  - type: text
    content: Though they fast, I will not hear their cry; and though they offer burnt offerings and grain offerings, I will not accept them [because they are done as obligations, and not as acts of loving obedience]. Instead I will consume them by the sword, by famine, and by pestilence.”
  - type: heading
    content: False Prophets
  '13':
  - type: text
    content: But I said, “Alas, Lord G
  - type: heading
    content: od
  - type: text
    content: '! Behold, the [false] prophets are telling them, ‘You will not see the sword nor will you have famine, but I [the L'
  - type: heading
    content: ord
  - type: text
    content: '] will give you lasting peace in this place.’ ” '
  '14':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “The [counterfeit] prophets are prophesying lies in My Name. I have neither sent them nor authorized them nor spoken to them. They are prophesying to you made-up visions [pretending to call forth responses from handmade gods], a worthless divination and the deceit of their own mind. '
  '15':
  - type: text
    content: Therefore, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning the [false] prophets who are prophesying in My Name, although I did not send them—yet they keep saying, ‘Sword and famine shall not be in this land’: by sword and famine those prophets shall meet their end '
  - type: text
    content: and
  - type: text
    content: ' be consumed. '
  '16':
  - type: text
    content: And the people to whom they are prophesying will be thrown out into the streets of Jerusalem, victims of famine and sword; and they will have no one to bury them—neither them, nor their wives, nor their sons, nor their daughters. For I will pour out their [own] wickedness on them [and not only on the imposters posing as prophets, for the people could not have been deceived without their own consent].
  '17':
  - type: text
    content: “Therefore [Jeremiah] you will say this word to them,
  - type: text
    content: ‘Let my eyes flow with tears night and day,
  - type: text
    content: And let them never cease;
  - type: text
    content: For the virgin daughter of my people has been crushed with a great blow,
  - type: text
    content: 'With a very serious '
  - type: text
    content: and
  - type: text
    content: ' severely infected wound.'
  '18':
  - type: text
    content: ‘If I go out into the field,
  - type: text
    content: Then I gaze on those slaughtered with the sword!
  - type: text
    content: And if I enter the city,
  - type: text
    content: Then I gaze on [those tormented with] the diseases of famine!
  - type: text
    content: For both prophet and priest [who should have guided the people]
  - type: text
    content: 'Go about [bewildered and exiled] in a land (Babylon) that they do not know '
  - type: text
    content: or
  - type: text
    content: ' understand.’ ”'
  '19':
  - type: text
    content: ¶Have You [O L
  - type: heading
    content: ord
  - type: text
    content: '] completely rejected Judah?'
  - type: text
    content: Do You loathe Zion?
  - type: text
    content: Why have You stricken us so that there is no healing for us?
  - type: text
    content: 'We looked for peace '
  - type: text
    content: and
  - type: text
    content: ' completeness, but nothing good came;'
  - type: text
    content: And [we hoped] for a time of healing, but behold, terror!
  '2':
  - type: text
    content: “Judah mourns
  - type: text
    content: And her gates languish;
  - type: text
    content: 'Her people sit on the ground in mourning '
  - type: text
    content: clothes
  - type: text
    content: And the cry of Jerusalem has gone up.
  '20':
  - type: text
    content: 'We know '
  - type: text
    content: and
  - type: text
    content: ' acknowledge, O L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Our wickedness and the iniquity of our fathers; for we have sinned against You.
  '21':
  - type: text
    content: 'Do not treat us with contempt '
  - type: text
    content: and
  - type: text
    content: ' condemn us, for Your own name’s sake;'
  - type: text
    content: 'Do not disgrace Your '
  - type: note
    content: The temple in Jerusalem.
  - type: text
    content: glorious throne;
  - type: text
    content: Remember [with consideration] and do not break Your [solemn] covenant with us.
  '22':
  - type: text
    content: Are there any among the idols of the nations who can send rain?
  - type: text
    content: Or can the heavens [of their own will] give showers?
  - type: text
    content: Is it not You, O L
  - type: heading
    content: ord
  - type: text
    content: ' our God?'
  - type: text
    content: 'Therefore we will wait '
  - type: text
    content: and
  - type: text
    content: ' hope [confidently] in You,'
  - type: text
    content: For You are the one who has made all these things [the heavens and the rain].
  '3':
  - type: text
    content: “Their nobles have sent their servants for water;
  - type: text
    content: They have come to the cisterns and found no water.
  - type: text
    content: They have returned with empty vessels;
  - type: text
    content: They have been shamed and humiliated,
  - type: text
    content: And they cover their heads.
  '4':
  - type: text
    content: “The ground is cracked
  - type: text
    content: Because there has been no rain on the land;
  - type: text
    content: The farmers are distressed,
  - type: text
    content: And they have covered their heads [in shame].
  '5':
  - type: text
    content: '“The doe in the field has given birth only to abandon '
  - type: text
    content: her young
  - type: text
    content: Because there is no grass.
  '6':
  - type: text
    content: “And the wild donkeys stand on the barren heights;
  - type: text
    content: They pant for air like jackals,
  - type: text
    content: Their eyesight fails
  - type: text
    content: Because there is no grass.
  '7':
  - type: text
    content: “O L
  - type: heading
    content: ord
  - type: text
    content: ', though our many sins testify against us” [prays Jeremiah],'
  - type: text
    content: “Act now [for us and] for Your name’s sake [so that the faithless may witness Your faithfulness]!
  - type: text
    content: For our backslidings are countless;
  - type: text
    content: We have sinned against You.
  '8':
  - type: text
    content: “O Hope of Israel,
  - type: text
    content: 'Her Savior in time of distress '
  - type: text
    content: and
  - type: text
    content: ' trouble,'
  - type: text
    content: Why should You be like a sojourner (temporary resident) in the land
  - type: text
    content: 'Or like a traveler who turns aside '
  - type: text
    content: and
  - type: text
    content: ' spreads his tent to linger [only] for a night?'
  '9':
  - type: text
    content: '“Why should You be [hesitant and inactive] like a man astounded '
  - type: text
    content: and
  - type: text
    content: ' perplexed,'
  - type: text
    content: Like a mighty man unable to save?
  - type: text
    content: Yet You, O L
  - type: heading
    content: ord
  - type: text
    content: ', are among us,'
  - type: text
    content: And we are called by Your name;
  - type: text
    content: Do not leave us!”
