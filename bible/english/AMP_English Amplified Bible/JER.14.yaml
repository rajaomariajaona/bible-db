document_id: JER.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Drought and a Prayer for Mercy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that came to Jeremiah concerning the drought:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Judah mourns
- type: usfm
  marker: q1
  children:
  - type: text
    text: And her gates languish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Her people sit on the ground in mourning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: clothes
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the cry of Jerusalem has gone up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Their nobles have sent their servants for water;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have come to the cisterns and found no water.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have returned with empty vessels;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have been shamed and humiliated,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they cover their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “The ground is cracked
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because there has been no rain on the land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The farmers are distressed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have covered their heads [in shame].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“The doe in the field has given birth only to abandon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: her young
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because there is no grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “And the wild donkeys stand on the barren heights;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They pant for air like jackals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their eyesight fails
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because there is no grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', though our many sins testify against us” [prays Jeremiah],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Act now [for us and] for Your name’s sake [so that the faithless may witness Your faithfulness]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For our backslidings are countless;
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have sinned against You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “O Hope of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Her Savior in time of distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trouble,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why should You be like a sojourner (temporary resident) in the land
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or like a traveler who turns aside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spreads his tent to linger [only] for a night?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Why should You be [hesitant and inactive] like a man astounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perplexed,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a mighty man unable to save?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', are among us,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And we are called by Your name;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not leave us!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to this people [Judah], “In the manner '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to the degree [already pointed out] they have loved to wander; they have not restrained their feet. Therefore the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' does not accept them; He will now remember [in detail] their wickedness and punish them for their sins.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Do not pray for good things for this people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Though they fast, I will not hear their cry; and though they offer burnt offerings and grain offerings, I will not accept them [because they are done as obligations, and not as acts of loving obedience]. Instead I will consume them by the sword, by famine, and by pestilence.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: False Prophets
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But I said, “Alas, Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '! Behold, the [false] prophets are telling them, ‘You will not see the sword nor will you have famine, but I [the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] will give you lasting peace in this place.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “The [counterfeit] prophets are prophesying lies in My Name. I have neither sent them nor authorized them nor spoken to them. They are prophesying to you made-up visions [pretending to call forth responses from handmade gods], a worthless divination and the deceit of their own mind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' concerning the [false] prophets who are prophesying in My Name, although I did not send them—yet they keep saying, ‘Sword and famine shall not be in this land’: by sword and famine those prophets shall meet their end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be consumed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the people to whom they are prophesying will be thrown out into the streets of Jerusalem, victims of famine and sword; and they will have no one to bury them—neither them, nor their wives, nor their sons, nor their daughters. For I will pour out their [own] wickedness on them [and not only on the imposters posing as prophets, for the people could not have been deceived without their own consent].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Therefore [Jeremiah] you will say this word to them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Let my eyes flow with tears night and day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let them never cease;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the virgin daughter of my people has been crushed with a great blow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With a very serious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' severely infected wound.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ‘If I go out into the field,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I gaze on those slaughtered with the sword!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if I enter the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I gaze on [those tormented with] the diseases of famine!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For both prophet and priest [who should have guided the people]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Go about [bewildered and exiled] in a land (Babylon) that they do not know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' understand.’ ”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶Have You [O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] completely rejected Judah?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do You loathe Zion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why have You stricken us so that there is no healing for us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We looked for peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' completeness, but nothing good came;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [we hoped] for a time of healing, but behold, terror!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our wickedness and the iniquity of our fathers; for we have sinned against You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Do not treat us with contempt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condemn us, for Your own name’s sake;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not disgrace Your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The temple in Jerusalem.
    marker-yv: yv-n
  - type: text
    text: glorious throne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember [with consideration] and do not break Your [solemn] covenant with us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Are there any among the idols of the nations who can send rain?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or can the heavens [of their own will] give showers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is it not You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore we will wait '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope [confidently] in You,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You are the one who has made all these things [the heavens and the rain].
