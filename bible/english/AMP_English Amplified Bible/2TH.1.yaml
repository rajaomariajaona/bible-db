document_id: 2TH.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Thanksgiving for Faith and Perseverance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paul, Silvanus (Silas), and Timothy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'o the church of the Thessalonians in God our Father and the Lord Jesus Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Grace to you and peace [inner calm and spiritual well-being] from God the Father and the Lord Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'We ought always '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' indeed are morally obligated [as those in debt] to give thanks to God for you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren,
      - type: text
        text: ' includes all born-again believers.'
    marker-yv: yv-n
  - type: text
    text: 'brothers and sisters, as is fitting, because your faith is growing ever greater, and the [unselfish] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape)
      - type: text
        text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for another.'
    marker-yv: yv-n
  - type: text
    text: 'love of each one of you toward one another is continually increasing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore, we speak of you with pride among the churches of God for your steadfastness [your unflinching endurance, and patience] and your firm faith in the midst of all the persecution and [crushing] distress which you endure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This is
  - type: text
    text: ' a positive proof of the righteous judgment of God [a sign of His fair verdict], so that you will be considered worthy of His kingdom, for which indeed you are suffering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For after all it is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' just for God to repay with distress those who distress you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: give
  - type: text
    text: ' relief to you who are so distressed and to us as well when the Lord Jesus is revealed from heaven with His mighty angels in a flame of fire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dealing out [full and complete] vengeance to those who do not [seek to] know God and to those who ignore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refuse to obey the gospel of our Lord Jesus [by choosing not to respond to Him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'These people will pay the penalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure the punishment of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Not annihilation, but the loss of all meaningful things.
    marker-yv: yv-n
  - type: text
    text: 'everlasting destruction, banished from the presence of the Lord and from the glory of His power, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'when He comes to be glorified in His saints on that day [that is, glorified through the changed lives of those who have accepted Him as Savior and have been set apart for His purpose], and to be marveled at among all who have believed, because our testimony to you was believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusted [and confirmed in your lives]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'With this in view, we constantly pray for you, that our God will count you worthy of your calling [to faith] and with [His] power fulfill every desire for goodness, and complete [your] every work of faith, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: so that the name of our Lord Jesus will be glorified in you [by what you do], and you in Him, according to the [precious] grace of our God and the Lord Jesus Christ.
