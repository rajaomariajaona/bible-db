verses:
  '1':
  - type: heading
    content: Offerings of the Leaders
  - type: text
    content: 'On the day that Moses had finished setting up the tabernacle and had anointed and consecrated it and all its furniture, and the altar and all its utensils; he also anointed them and consecrated them [for holy use]. '
  '10':
  - type: text
    content: 'The leaders offered the dedication '
  - type: text
    content: sacrifices
  - type: text
    content: ' for the altar on the day that it was anointed; and they offered their sacrifice before the altar. '
  '11':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Let them present their offerings, one leader each day, for the dedication of the altar.”'
  '12':
  - type: text
    content: 'Now the one who presented his offering on the first day was Nahshon the son of Amminadab, of the tribe of Judah; '
  '13':
  - type: text
    content: 'and his offering was one silver dish, the weight of which was a hundred and thirty '
  - type: text
    content: shekels
  - type: text
    content: ', one silver basin of seventy shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil as a grain offering; '
  '14':
  - type: text
    content: 'one golden bowl of ten '
  - type: text
    content: shekels
  - type: text
    content: ', full of incense; '
  '15':
  - type: text
    content: 'one young bull, one ram, one male lamb one year old, as a burnt offering; '
  '16':
  - type: text
    content: 'one male goat as a sin offering; '
  '17':
  - type: text
    content: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs one year old. This was the offering of Nahshon the son of Amminadab [from the tribe of Judah].
  '18':
  - type: text
    content: 'On the second day Nethanel the son of Zuar, leader [of the tribe] of Issachar, presented [his offering]; '
  '19':
