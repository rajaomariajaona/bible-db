  - type: text
    content: shekels
  - type: text
    content: ', each basin seventy [shekels]; all the silver vessels '
  - type: text
    content: weighed
  - type: text
    content: ' 2,400 shekels, according to the shekel of the sanctuary; '
  '86':
  - type: text
    content: 'the twelve golden bowls, full of incense, '
  - type: text
    content: weighing
  - type: text
    content: ' ten shekels apiece, according to the shekel of the sanctuary, all the gold of the bowls being a hundred and twenty '
  - type: text
    content: shekels;
  - type: text
    content: ' '
  '87':
  - type: text
    content: 'all the oxen for the burnt offering were twelve bulls, the rams twelve, the male lambs one year old twelve, together with their grain offering; and the male goats as a sin offering twelve; '
  '88':
  - type: text
    content: and all the oxen for the sacrifice of the peace offerings were twenty-four bulls, the rams sixty, the male goats sixty, the male lambs one year old sixty. This was the dedication for the altar [of burnt offering] after it was anointed.
  '89':
  - type: text
    content: Now when Moses went into the Tent of Meeting (tabernacle) to speak with the L
  - type: heading
    content: ord
  - type: text
    content: ', he heard the voice speaking to him from above the mercy seat (the gold cover) that was on the ark of the Testimony from between the two cherubim; and He spoke [by special revelation] to him.'
  '9':
  - type: text
    content: But to the sons of Kohath he gave nothing, because they were assigned the care of the holy things which they carried on their shoulders [when the tabernacle was moved].
