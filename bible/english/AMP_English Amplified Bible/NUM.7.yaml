    content: 'he presented as his offering one silver dish, the weight of which was a hundred and thirty '
  - type: text
    content: shekels
  - type: text
    content: ', one silver basin of seventy shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil as a grain offering; '
  '2':
