segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Offerings of the Leaders
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the day that Moses had finished setting up the tabernacle and had anointed and consecrated it and all its furniture, and the altar and all its utensils; he also anointed them and consecrated them [for holy use]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the leaders of Israel, the heads of their fathers’ households, made offerings. (These were the leaders of the tribes; they were the ones who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: stood over
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'were over the men who were numbered.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They brought their offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', six covered carts and twelve oxen; a cart for each two of the leaders and an ox for each one; and they presented them before the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these things
  - type: text
    text: ' from them, so that they may be used in the service of the Tent of Meeting (tabernacle), and give them to the Levites, to each man according to his service.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Moses took the carts and the oxen and gave them to the Levites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He gave two carts and four oxen to the sons of Gershon, according to their service [in transporting the tabernacle]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and he gave four carts and eight oxen to the sons of Merari, according to their service [in transporting the tabernacle], under the supervision of Ithamar the son of Aaron, the [high] priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But to the sons of Kohath he gave nothing, because they were assigned the care of the holy things which they carried on their shoulders [when the tabernacle was moved].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The leaders offered the dedication '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' for the altar on the day that it was anointed; and they offered their sacrifice before the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Let them present their offerings, one leader each day, for the dedication of the altar.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now the one who presented his offering on the first day was Nahshon the son of Amminadab, of the tribe of Judah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and his offering was one silver dish, the weight of which was a hundred and thirty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ', one silver basin of seventy shekels, according to the shekel of the sanctuary, both of them full of fine flour mixed with oil as a grain offering; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'one golden bowl of ten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ', full of incense; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'one young bull, one ram, one male lamb one year old, as a burnt offering; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'one male goat as a sin offering; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: and for the sacrifice of peace offerings, two oxen, five rams, five male goats, five male lambs one year old. This was the offering of Nahshon the son of Amminadab [from the tribe of Judah].
