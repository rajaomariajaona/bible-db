document_id: PSA.110,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 110
  - type: heading
    content: The Lord Gives Dominion to the King.
  - type: text
    content: A Psalm of David.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' (Father) says to my Lord (the Messiah, His Son),'
  - type: text
    content: “Sit at My right hand
  - type: text
    content: Until I make Your enemies a footstool for Your feet [subjugating them into complete submission].” [Josh 10:24; Matt 26:64; Acts 2:34; 1 Cor 15:25; Col 3:1; Heb 12:2]
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will send the scepter of Your strength from Zion, '
  - type: text
    content: saying,
  - type: text
    content: “Rule in the midst of Your enemies.” [Rom 11:26, 27]
  '3':
  - type: text
    content: Your people will offer themselves willingly [to participate in Your battle] in the day of Your power;
  - type: text
    content: In the splendor of holiness, from the womb of the dawn,
  - type: text
    content: Your young men are to You as the dew.
  '4':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' has sworn [an oath] and will not change His mind:'
  - type: text
    content: “
  - type: note
    content: In rabbinic legend, Shem (the son of Noah) was Melchizedek, and God had planned to make him the first high priest. But when he blessed Abraham without first blessing God (Gen 14:18f), God gave the priesthood to Abraham instead.
  - type: text
    content: You are a priest forever
  - type: text
    content: According to the order of Melchizedek.” [Heb 5:10; 7:11, 15, 21]
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is at Your right hand,'
  - type: text
    content: 'He '
  - type: note
    content: Lit has smashed, probably a prophetic construction, and so in v 6.
  - type: text
    content: will crush kings in the day of His wrath.
  '6':
  - type: text
    content: He will execute judgment [in overwhelming punishment] among the nations;
  - type: text
    content: He will fill them with corpses,
  - type: text
    content: He will crush the chief men over a broad country. [Ezek 38:21, 22; 39:11, 12]
  '7':
  - type: text
    content: He will drink from the brook by the wayside;
  - type: text
    content: Therefore He will lift up His head [triumphantly].
