      - type: text
        text: In rabbinic legend, Shem (the son of Noah) was Melchizedek, and God had planned to make him the first high priest. But when he blessed Abraham without first blessing God (Gen 14:18f), God gave the priesthood to Abraham instead.
    marker-yv: yv-n
