document_id: PRO.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: On Life and Conduct
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When you sit down to dine with a ruler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Consider carefully what is [set] before you;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For you will put a knife to your throat
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If you are a man of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: great
  - type: text
    text: ' appetite.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do not desire his delicacies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it is deceptive food [offered to you with questionable motives].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Do not weary yourself [with the overwhelming desire] to gain wealth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cease from your own understanding of it. [Prov 28:20; 1 Tim 6:9, 10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When you set your eyes on wealth, it is [suddenly] gone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wealth
  - type: text
    text: ' certainly makes itself wings'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like an eagle that flies to the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶Do not eat the bread of a selfish man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or desire his delicacies;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For as he thinks in his heart, so is he [in behavior—one who manipulates].
- type: usfm
  marker: q1
  children:
  - type: text
    text: He says to you, “Eat and drink,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet his heart is not with you [but it is begrudging the cost].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The morsel which you have eaten you will vomit up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will waste your compliments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶Do not speak in the ears of a fool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he will despise the [godly] wisdom of your words. [Is 32:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Do not move the ancient landmark [at the boundary of the property]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not go into the fields of the fatherless [to take what is theirs], [Deut 19:14; 27:17; Prov 22:28]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For their Redeemer is strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mighty;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will plead their case against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Apply your heart to discipline
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your ears to words of knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Do not withhold discipline from the child;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: smite
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'swat him with a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reed-like
  - type: text
    text: ' rod [applied with godly wisdom], he will not die.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: smite
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'swat him with the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reed-like
  - type: text
    text: ' rod'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rescue his life from Sheol (the nether world, the place of the dead).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶My son, if your heart is wise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart will also be glad;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Yes, my heart will rejoice
- type: usfm
  marker: q1
  children:
  - type: text
    text: When your lips speak right things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Do not let your heart envy sinners [who live godless lives and have no hope of salvation],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But [continue to] live in the [reverent, worshipful] fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' day by day.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Surely there is a future [and a reward],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And your hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' expectation will not be cut off.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Listen, my son, and be wise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And direct your heart in the way [of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do not associate with heavy drinkers of wine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Or
  - type: text
    text: ' with gluttonous eaters of meat, [Is 5:22; Luke 21:34; Rom 13:13; Eph 5:18]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the heavy drinker and the glutton will come to poverty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the drowsiness [of overindulgence] will clothe one with rags.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶Listen to your father, who sired you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not despise your mother when she is old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient rabbis routinely assumed “truth” to refer to the Torah (Law), and they interpreted the first part of this command to mean that a student should pay a teacher to teach him the Torah if he can find no one to teach him for free. As for the second part, they said that if the student had to pay to learn, he should not view this as grounds to charge for teaching others, but should teach the Torah for free.
    marker-yv: yv-n
  - type: text
    text: Buy truth, and do not sell it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get wisdom and instruction and understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ¶The father of the righteous will greatly rejoice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who sires a wise child will have joy in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Let your father and your mother be glad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let her who gave birth to you rejoice [in your wise and godly choices].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶My son, give me your heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let your eyes delight in my ways,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For a prostitute is a deep pit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And an immoral woman is a narrow well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'She lurks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lies in wait like a robber [who waits for prey],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And she increases the faithless among men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ¶Who has woe? Who has sorrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has strife? Who has complaining?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has wounds without cause?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Whose eyes are red '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dim?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Those who linger long over wine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who go to taste mixed wine. [Prov 20:1; Eph 5:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Do not look at wine when it is red,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When it sparkles in the glass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When it goes down smoothly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: At the last it bites like a serpent
- type: usfm
  marker: q1
  children:
  - type: text
    text: And stings like a viper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Your [drunken] eyes will see strange things
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your mind will utter perverse things [untrue things, twisted things].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And you will be [as unsteady] as one who lies down in the middle of the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [as vulnerable to disaster] as one who lies down on the top of a ship’s mast, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “They struck me, but I was not hurt!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They beat me, but I did not feel it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When will I wake up?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will seek more wine.”
