verses:
  '1':
  - type: heading
    content: On Life and Conduct
  - type: text
    content: When you sit down to dine with a ruler,
  - type: text
    content: Consider carefully what is [set] before you;
  '10':
  - type: text
    content: ¶Do not move the ancient landmark [at the boundary of the property]
  - type: text
    content: And do not go into the fields of the fatherless [to take what is theirs], [Deut 19:14; 27:17; Prov 22:28]
  '11':
  - type: text
    content: 'For their Redeemer is strong '
  - type: text
    content: and
  - type: text
    content: ' mighty;'
  - type: text
    content: He will plead their case against you.
  '12':
  - type: text
    content: Apply your heart to discipline
  - type: text
    content: And your ears to words of knowledge.
  '13':
  - type: text
    content: ¶Do not withhold discipline from the child;
  - type: text
    content: 'If you '
  - type: note
    content: Lit smite.
  - type: text
    content: 'swat him with a '
  - type: text
    content: reed-like
  - type: text
    content: ' rod [applied with godly wisdom], he will not die.'
  '14':
  - type: text
    content: 'You shall '
  - type: note
    content: Lit smite.
  - type: text
    content: 'swat him with the '
  - type: text
    content: reed-like
  - type: text
    content: ' rod'
  - type: text
    content: And rescue his life from Sheol (the nether world, the place of the dead).
  '15':
  - type: text
    content: ¶My son, if your heart is wise,
  - type: text
    content: My heart will also be glad;
  '16':
  - type: text
    content: Yes, my heart will rejoice
  - type: text
    content: When your lips speak right things.
  '17':
  - type: text
    content: ¶Do not let your heart envy sinners [who live godless lives and have no hope of salvation],
  - type: text
    content: But [continue to] live in the [reverent, worshipful] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' day by day.'
  '18':
  - type: text
    content: Surely there is a future [and a reward],
  - type: text
    content: 'And your hope '
  - type: text
    content: and
  - type: text
    content: ' expectation will not be cut off.'
  '19':
  - type: text
    content: Listen, my son, and be wise,
  - type: text
    content: And direct your heart in the way [of the L
  - type: heading
    content: ord
  - type: text
    content: '].'
  '2':
  - type: text
    content: For you will put a knife to your throat
  - type: text
    content: 'If you are a man of '
  - type: text
    content: great
  - type: text
    content: ' appetite.'
  '20':
  - type: text
    content: Do not associate with heavy drinkers of wine,
  - type: text
    content: Or
  - type: text
    content: ' with gluttonous eaters of meat, [Is 5:22; Luke 21:34; Rom 13:13; Eph 5:18]'
  '21':
  - type: text
    content: For the heavy drinker and the glutton will come to poverty,
  - type: text
    content: And the drowsiness [of overindulgence] will clothe one with rags.
  '22':
  - type: text
    content: ¶Listen to your father, who sired you,
  - type: text
    content: And do not despise your mother when she is old.
  '23':
  - type: text
    content: ' '
  - type: note
    content: The ancient rabbis routinely assumed “truth” to refer to the Torah (Law), and they interpreted the first part of this command to mean that a student should pay a teacher to teach him the Torah if he can find no one to teach him for free. As for the second part, they said that if the student had to pay to learn, he should not view this as grounds to charge for teaching others, but should teach the Torah for free.
  - type: text
    content: Buy truth, and do not sell it;
  - type: text
    content: Get wisdom and instruction and understanding.
  '24':
  - type: text
    content: ¶The father of the righteous will greatly rejoice,
  - type: text
    content: And he who sires a wise child will have joy in him.
  '25':
  - type: text
    content: Let your father and your mother be glad,
  - type: text
    content: And let her who gave birth to you rejoice [in your wise and godly choices].
  '26':
  - type: text
    content: ¶My son, give me your heart
  - type: text
    content: And let your eyes delight in my ways,
  '27':
  - type: text
    content: For a prostitute is a deep pit,
  - type: text
    content: And an immoral woman is a narrow well.
  '28':
  - type: text
    content: 'She lurks '
  - type: text
    content: and
  - type: text
    content: ' lies in wait like a robber [who waits for prey],'
  - type: text
    content: And she increases the faithless among men.
  '29':
  - type: text
    content: ¶Who has woe? Who has sorrow?
  - type: text
    content: Who has strife? Who has complaining?
  - type: text
    content: Who has wounds without cause?
  - type: text
    content: 'Whose eyes are red '
  - type: text
    content: and
  - type: text
    content: ' dim?'
  '3':
  - type: text
    content: Do not desire his delicacies,
  - type: text
    content: For it is deceptive food [offered to you with questionable motives].
  '30':
  - type: text
    content: Those who linger long over wine,
  - type: text
    content: Those who go to taste mixed wine. [Prov 20:1; Eph 5:18]
  '31':
  - type: text
    content: Do not look at wine when it is red,
  - type: text
    content: When it sparkles in the glass,
  - type: text
    content: When it goes down smoothly.
  '32':
  - type: text
    content: At the last it bites like a serpent
  - type: text
    content: And stings like a viper.
  '33':
  - type: text
    content: Your [drunken] eyes will see strange things
  - type: text
    content: And your mind will utter perverse things [untrue things, twisted things].
  '34':
  - type: text
    content: And you will be [as unsteady] as one who lies down in the middle of the sea,
  - type: text
    content: 'And [as vulnerable to disaster] as one who lies down on the top of a ship’s mast, '
  - type: text
    content: saying,
  '35':
  - type: text
    content: “They struck me, but I was not hurt!
  - type: text
    content: They beat me, but I did not feel it!
  - type: text
    content: When will I wake up?
  - type: text
    content: I will seek more wine.”
  '4':
  - type: text
    content: ¶Do not weary yourself [with the overwhelming desire] to gain wealth;
  - type: text
    content: Cease from your own understanding of it. [Prov 28:20; 1 Tim 6:9, 10]
  '5':
  - type: text
    content: When you set your eyes on wealth, it is [suddenly] gone.
  - type: text
    content: 'For '
  - type: text
    content: wealth
  - type: text
    content: ' certainly makes itself wings'
  - type: text
    content: Like an eagle that flies to the heavens.
  '6':
  - type: text
    content: ¶Do not eat the bread of a selfish man,
  - type: text
    content: Or desire his delicacies;
  '7':
  - type: text
    content: For as he thinks in his heart, so is he [in behavior—one who manipulates].
  - type: text
    content: He says to you, “Eat and drink,”
  - type: text
    content: Yet his heart is not with you [but it is begrudging the cost].
  '8':
  - type: text
    content: The morsel which you have eaten you will vomit up,
  - type: text
    content: And you will waste your compliments.
  '9':
  - type: text
    content: ¶Do not speak in the ears of a fool,
  - type: text
    content: For he will despise the [godly] wisdom of your words. [Is 32:6]
