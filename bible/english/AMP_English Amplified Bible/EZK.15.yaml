document_id: EZK.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem like a Useless Vine
  - type: text
    content: And the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '2':
  - type: text
    content: '“Son of man, how is the wood of the grapevine (Israel) better than any wood of a branch which is among the trees of the forest? [Ps 80:8-13; Jer 2:21] '
  '3':
  - type: text
    content: 'Can wood be taken from it to make any object? Or can men take a peg from it on which to hang any vessel? '
  '4':
  - type: text
    content: 'If it has been thrown into the fire for fuel, and the fire has consumed both of its ends and the middle section has been charred, is it suitable '
  - type: text
    content: or
  - type: text
    content: ' useful for anything? '
  '5':
  - type: text
    content: 'Notice this, even when it was complete, it was not useful '
  - type: text
    content: and
  - type: text
    content: ' was not made into anything. How much less, after the fire has burned [part of] it and [the remainder of] it is charred, can it still be made into anything? '
  '6':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Like the wood of the grapevine among the trees of the forest, which I have given to the fire for fuel, so have I given up the people of Jerusalem; '
  '7':
  - type: text
    content: 'and I set My face against them. '
  - type: text
    content: Though
  - type: text
    content: ' they have come out of the fire, yet the fire will consume them. Then you will know [without any doubt] that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ', when I set My face against them. '
  '8':
  - type: text
    content: I will make the land desolate (ruined, deserted), because they have acted unfaithfully [through their idolatry],’ says the Lord G
  - type: heading
    content: od
  - type: text
    content: .”
