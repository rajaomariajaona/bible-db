document_id: EZK.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem like a Useless Vine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, how is the wood of the grapevine (Israel) better than any wood of a branch which is among the trees of the forest? [Ps 80:8-13; Jer 2:21] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Can wood be taken from it to make any object? Or can men take a peg from it on which to hang any vessel? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If it has been thrown into the fire for fuel, and the fire has consumed both of its ends and the middle section has been charred, is it suitable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' useful for anything? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notice this, even when it was complete, it was not useful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' was not made into anything. How much less, after the fire has burned [part of] it and [the remainder of] it is charred, can it still be made into anything? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘Like the wood of the grapevine among the trees of the forest, which I have given to the fire for fuel, so have I given up the people of Jerusalem; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I set My face against them. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though
    - type: text
      text: ' they have come out of the fire, yet the fire will consume them. Then you will know [without any doubt] that I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when I set My face against them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make the land desolate (ruined, deserted), because they have acted unfaithfully [through their idolatry],’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .”
