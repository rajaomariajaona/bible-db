  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther’s Plea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the king and Haman came to drink '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wine
  - type: text
    text: ' with Esther the queen. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the king said to Esther on the second day also as they drank their wine, “What is your petition, Queen Esther? It shall be granted to you. And what is your request? Even to half of the kingdom, it shall be done.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Queen Esther replied, “If I have found favor in your sight, O king, and if it pleases the king, let my life be spared as my petition, and my people [be spared] as my request; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for we have been sold, I and my people, to be destroyed, killed and wiped out of existence. Now if we had only been sold as slaves, men and women, I would have remained silent, for our hardship would not be sufficient to burden the king [by even mentioning it].” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then King Ahasuerus (Xerxes) asked Queen Esther, “Who is he, and where is he, who dares to do such a thing?” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Esther said, “An adversary and an enemy is Haman, this evil man.” Then Haman became terrified before the king and queen.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Haman Is Hanged
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then in his fury, the king stood up from drinking wine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and went
  - type: text
    text: ' into the palace garden [to decide what he should do]; but Haman stayed to plead for his life from Queen Esther, for he saw that harm had been determined against him by the king. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When the king returned from the palace garden to the place where they were drinking wine, Haman was falling on the couch where Esther was. Then the king said, “Will he even '
  - type: usfm
    marker: it
    children:
    - type: text
      text: attempt to
  - type: text
    text: ' assault the queen with me in the palace?” As the king spoke those words, the servants covered Haman’s face [in preparation for execution]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Harbonah, one of the eunuchs serving the king said, “Now look, there are gallows fifty cubits (75 ft.) high standing at Haman’s house, which Haman made for Mordecai, whose good warning saved the king.” And the king said, “Hang him on it.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So they hanged Haman on the gallows that he had prepared for Mordecai. Then the king’s anger subsided.
