      - type: text
        text: Our Times Are in His Hand
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, when you were younger you dressed yourself and walked wherever you wished; but when you grow old, you will stretch out your hands '
      - type: usfm
