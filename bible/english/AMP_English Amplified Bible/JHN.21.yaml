        children:
        - type: text
          text: and
      - type: text
        text: ' arms, and someone else will dress you, and carry you where you do not wish to go.”'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now He said this to indicate the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Peter ministered some thirty years after the resurrection of Jesus. He was martyred in Rome by Emperor Nero in about '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 67. The Roman historian, Eusebius said that Peter was crucified upside down at his own request.
      marker-yv: yv-n
    - type: text
      text: 'kind of death by which Peter would glorify God. And after saying this, He said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow Me
    - type: text
      text: ' [walk the same path of life that I have walked]!”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter, and Thomas who is called Didymus (the twin), and Nathanael from Cana of Galilee, as well as [John and James] the sons of Zebedee, and two others of His disciples were together. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter turned and saw the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John the Apostle. The mothers of Jesus and John, Mary and Salome, were related as sisters.
      marker-yv: yv-n
    - type: text
      text: 'disciple whom Jesus loved following them; the one who also had leaned back on His chest at the supper and had said, “Lord, who is it that is going to betray You?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when Peter saw him, he asked Jesus, “Lord, and what about this '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'It is believed that John was the only apostle to die of natural causes. He lived to the age of ninety-four and died in about '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 100.
      marker-yv: yv-n
    - type: text
      text: 'man [what is in his future]?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If I want him to stay alive until I come
    - type: text
      text: ' [again], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'what '
      - type: usfm
        marker: it
        children:
        - type: text
          text: is that
      - type: text
        text: ' to you? You follow Me!”'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this word went out among the brothers that this disciple (John) was not going to die; yet Jesus did not say to him that he was not going to die, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ', '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If I want him to stay alive until I come
    - type: text
      text: ' [again], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'what '
      - type: usfm
        marker: it
        children:
        - type: text
          text: is that
      - type: text
        text: ' to you?”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: same
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John the Apostle, author of this Gospel.
      marker-yv: yv-n
    - type: text
      text: disciple who is testifying to these things and has recorded them; and we know [without any doubt] that his testimony is true.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there are also many other things which Jesus did, which if they were recorded '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in detail
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: one by one, I suppose that even the world itself could not contain the books that would be written.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter said to them, “I am going fishing.” They said, “And we are coming with you.” So they went out and got into the boat; and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Fishing at night was commonplace and normally productive.
      marker-yv: yv-n
    - type: text
      text: that night they caught nothing.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As morning was breaking, Jesus [came and] stood on the beach; however, the disciples did not know that it was Jesus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Children, do you have any fish
    - type: text
      text: ' [to eat along with your bread]?” They answered, “No.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Cast the net on the right-hand side of the boat (starboard) and you will find some.”
    - type: text
      text: ' So they cast [the net], and then they were not able to haul it in because of the great catch of fish. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then that disciple (John) whom Jesus loved (esteemed) said to Peter, “It is the Lord!” So when Simon Peter heard that it was the Lord, he put on his outer tunic (for he was stripped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for work)
    - type: text
      text: ' and threw himself into the sea [and swam ashore]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the other disciples came in the small boat, for they were not far from shore, only about a hundred yards away, dragging the net full of fish.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when they got out on the beach, they saw a charcoal fire set up and fish on it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cooking,
    - type: text
      text: ' and bread. '
