  '3':
  - type: text
    content: 'Simon Peter said to them, “I am going fishing.” They said, “And we are coming with you.” So they went out and got into the boat; and '
  - type: note
    content: Fishing at night was commonplace and normally productive.
  - type: text
    content: that night they caught nothing.
  '4':
  - type: text
    content: 'As morning was breaking, Jesus [came and] stood on the beach; however, the disciples did not know that it was Jesus. '
  '5':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: “Children, do you have any fish
  - type: text
    content: ' [to eat along with your bread]?” They answered, “No.” '
  '6':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “Cast the net on the right-hand side of the boat (starboard) and you will find some.”
  - type: text
    content: ' So they cast [the net], and then they were not able to haul it in because of the great catch of fish. '
  '7':
  - type: text
    content: 'Then that disciple (John) whom Jesus loved (esteemed) said to Peter, “It is the Lord!” So when Simon Peter heard that it was the Lord, he put on his outer tunic (for he was stripped '
  - type: text
    content: for work)
  - type: text
    content: ' and threw himself into the sea [and swam ashore]. '
  '8':
  - type: text
    content: But the other disciples came in the small boat, for they were not far from shore, only about a hundred yards away, dragging the net full of fish.
  '9':
  - type: text
    content: 'So when they got out on the beach, they saw a charcoal fire set up and fish on it '
  - type: text
