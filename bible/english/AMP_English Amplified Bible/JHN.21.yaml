    - type: text
      text: Jesus Appears at the Sea of Galilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this Jesus revealed Himself again to the disciples at the Sea of Tiberias (Galilee). And He did it in this way: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Simon Peter, and Thomas who is called Didymus (the twin), and Nathanael from Cana of Galilee, as well as [John and James] the sons of Zebedee, and two others of His disciples were together. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Simon Peter said to them, “I am going fishing.” They said, “And we are coming with you.” So they went out and got into the boat; and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fishing at night was commonplace and normally productive.
    marker-yv: yv-n
  - type: text
    text: that night they caught nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As morning was breaking, Jesus [came and] stood on the beach; however, the disciples did not know that it was Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Children, do you have any fish
  - type: text
    text: ' [to eat along with your bread]?” They answered, “No.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Cast the net on the right-hand side of the boat (starboard) and you will find some.”
  - type: text
    text: ' So they cast [the net], and then they were not able to haul it in because of the great catch of fish. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then that disciple (John) whom Jesus loved (esteemed) said to Peter, “It is the Lord!” So when Simon Peter heard that it was the Lord, he put on his outer tunic (for he was stripped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for work)
  - type: text
    text: ' and threw himself into the sea [and swam ashore]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But the other disciples came in the small boat, for they were not far from shore, only about a hundred yards away, dragging the net full of fish.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So when they got out on the beach, they saw a charcoal fire set up and fish on it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cooking,
  - type: text
    text: ' and bread. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Bring some of the fish which you have just caught.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Simon Peter went aboard and hauled the net to land, full of large fish, a hundred and fifty-three [of them]; and although there were so many, the net was not torn.
- type: usfm
  marker: s1
  children:
  - type: usfm
