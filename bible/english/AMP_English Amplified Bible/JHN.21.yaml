        text: Jesus Appears at the Sea of Galilee
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this Jesus revealed Himself again to the disciples at the Sea of Tiberias (Galilee). And He did it in this way: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Bring some of the fish which you have just caught.”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Simon Peter went aboard and hauled the net to land, full of large fish, a hundred and fifty-three [of them]; and although there were so many, the net was not torn.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Provides
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Come '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' have breakfast.”'
    - type: text
      text: ' None of the disciples dared to ask Him, “Who are You?” They knew [without any doubt] that it was the Lord. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus came and took the bread and gave it to them, and likewise the fish. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This was now the third time that Jesus appeared to the disciples, after He had risen from the dead.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Love Motivation
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when they had finished breakfast, Jesus said to Simon Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Simon, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: son
      - type: text
        text: ' of John, do you love Me more than these'
    - type: text
      text: ' [others do—with total commitment and devotion]?” He said to Him, “Yes, Lord; You know that I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As indicated by the amplifications, Peter uses a different Greek word for love (
        - type: usfm
          marker: it
          children:
          - type: text
            text: phileo)
        - type: text
          text: ' than Jesus does ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: agapao)
        - type: text
          text: ' in His first two questions to Peter (see note v 17).'
      marker-yv: yv-n
    - type: text
      text: 'love You [with a deep, personal affection, as for a close friend].” Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Feed My lambs.”
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
