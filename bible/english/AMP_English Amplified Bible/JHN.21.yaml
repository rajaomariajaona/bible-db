      children:
      - type: text
        text: and
    - type: text
      text: ' have breakfast.”'
  - type: text
    text: ' None of the disciples dared to ask Him, “Who are You?” They knew [without any doubt] that it was the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus came and took the bread and gave it to them, and likewise the fish. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: This was now the third time that Jesus appeared to the disciples, after He had risen from the dead.
