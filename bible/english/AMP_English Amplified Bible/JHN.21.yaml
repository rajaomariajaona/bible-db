    content: Jesus Appears at the Sea of Galilee
  - type: text
    content: 'After this Jesus revealed Himself again to the disciples at the Sea of Tiberias (Galilee). And He did it in this way: '
  '10':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Bring some of the fish which you have just caught.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: So Simon Peter went aboard and hauled the net to land, full of large fish, a hundred and fifty-three [of them]; and although there were so many, the net was not torn.
  - type: heading
    content: Jesus Provides
