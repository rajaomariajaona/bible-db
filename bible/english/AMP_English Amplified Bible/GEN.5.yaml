document_id: GEN.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Adam
  - type: text
    content: 'This is the book (the written record, the history) of the generations of [the descendants of] Adam. When God created man, He made him in the likeness of God [not physical, but a spiritual personality and moral likeness]. '
  '10':
  - type: text
    content: 'Enosh lived eight hundred and fifteen years after the birth of Kenan and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '11':
  - type: text
    content: So Enosh lived nine hundred and five years, and he died.
  '12':
  - type: text
    content: 'When Kenan was seventy years old, he became the father of Mahalalel. '
  '13':
  - type: text
    content: 'Kenan lived eight hundred and forty years after the birth of Mahalalel and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '14':
  - type: text
    content: So Kenan lived nine hundred and ten years, and he died.
  '15':
  - type: text
    content: 'When Mahalalel was sixty-five years old, he became the father of Jared. '
  '16':
  - type: text
    content: 'Mahalalel lived eight hundred and thirty years after the birth of Jared and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '17':
  - type: text
    content: So Mahalalel lived eight hundred and ninety-five years, and he died.
  '18':
  - type: text
    content: 'When Jared was a hundred and sixty-two years old, he became the father of Enoch. '
  '19':
  - type: text
    content: 'Jared lived eight hundred years after the birth of Enoch and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '2':
  - type: text
    content: 'He created them male and female, and blessed them and named them '
  - type: note
    content: Lit Adam.
  - type: text
    content: Mankind at the time they were created.
  '20':
  - type: text
    content: So Jared lived nine hundred and sixty-two years, and he died.
  '21':
  - type: text
    content: 'When Enoch was sixty-five years old, he became the father of Methuselah. '
  '22':
  - type: text
    content: 'Enoch walked [in habitual fellowship] with God three hundred years after the birth of Methuselah and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '23':
  - type: text
    content: 'So all the days of Enoch were three hundred and sixty-five years. '
  '24':
  - type: text
    content: And [in reverent fear and obedience] Enoch walked with God; and he was not [found among men], because God took him [away to be home with Him]. [Heb 11:5]
  '25':
  - type: text
    content: 'When Methuselah was a hundred and eighty-seven years old, he became the father of Lamech. '
  '26':
  - type: text
    content: 'Methuselah lived seven hundred and eighty-two years after the birth of Lamech and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '27':
  - type: text
    content: So Methuselah lived nine hundred and sixty-nine years, and he died.
  '28':
  - type: text
    content: 'When Lamech was a hundred and eighty-two years old, he became the father of a son. '
  '29':
  - type: text
    content: 'He named him Noah, saying, “This one shall bring us rest '
  - type: text
    content: and
  - type: text
    content: ' comfort from our work and from the [dreadful] toil of our hands because of the ground which the L'
  - type: heading
    content: ord
  - type: text
    content: ' cursed.” '
  '3':
  - type: text
    content: 'When Adam had lived a hundred and thirty years, he '
  - type: note
    content: Lit begot, and so throughout chapter.
  - type: text
    content: 'became the father of '
  - type: text
    content: a son
  - type: text
    content: ' in his own likeness, according to his image, and named him Seth. '
  '30':
  - type: text
    content: 'Lamech lived five hundred and ninety-five years after the birth of Noah and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '31':
  - type: text
    content: So all the days of Lamech were seven hundred and seventy-seven years, and he died.
  '32':
  - type: text
    content: After Noah was five hundred years old, he became the father of Shem, Ham, and Japheth.
  '4':
  - type: text
    content: 'After he became the father of Seth, Adam lived eight hundred years and had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '5':
  - type: text
    content: So Adam lived nine hundred and thirty years in all, and he died.
  '6':
  - type: text
    content: 'When Seth was a hundred and five years old, he became the father of Enosh. '
  '7':
  - type: text
    content: 'Seth lived eight hundred and seven years after the birth of Enosh, and he had '
  - type: text
    content: other
  - type: text
    content: ' sons and daughters. '
  '8':
  - type: text
    content: So Seth lived nine hundred and twelve years, and he died.
  '9':
  - type: text
    content: 'When Enosh was ninety years old, he became the father of Kenan. '
