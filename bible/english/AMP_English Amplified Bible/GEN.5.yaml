document_id: GEN.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Adam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is the book (the written record, the history) of the generations of [the descendants of] Adam. When God created man, He made him in the likeness of God [not physical, but a spiritual personality and moral likeness]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Enosh lived eight hundred and fifteen years after the birth of Kenan and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So Enosh lived nine hundred and five years, and he died.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When Kenan was seventy years old, he became the father of Mahalalel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Kenan lived eight hundred and forty years after the birth of Mahalalel and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So Kenan lived nine hundred and ten years, and he died.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When Mahalalel was sixty-five years old, he became the father of Jared. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mahalalel lived eight hundred and thirty years after the birth of Jared and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: So Mahalalel lived eight hundred and ninety-five years, and he died.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When Jared was a hundred and sixty-two years old, he became the father of Enoch. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jared lived eight hundred years after the birth of Enoch and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He created them male and female, and blessed them and named them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Adam
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Mankind at the time they were created.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So Jared lived nine hundred and sixty-two years, and he died.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When Enoch was sixty-five years old, he became the father of Methuselah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Enoch walked [in habitual fellowship] with God three hundred years after the birth of Methuselah and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So all the days of Enoch were three hundred and sixty-five years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And [in reverent fear and obedience] Enoch walked with God; and he was not [found among men], because God took him [away to be home with Him]. [Heb 11:5]
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'When Methuselah was a hundred and eighty-seven years old, he became the father of Lamech. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Methuselah lived seven hundred and eighty-two years after the birth of Lamech and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: So Methuselah lived nine hundred and sixty-nine years, and he died.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When Lamech was a hundred and eighty-two years old, he became the father of a son. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'He named him Noah, saying, “This one shall bring us rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comfort from our work and from the [dreadful] toil of our hands because of the ground which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' cursed.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When Adam had lived a hundred and thirty years, he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: begot
        - type: text
          text: ', and so throughout chapter.'
      marker-yv: yv-n
    - type: text
      text: 'became the father of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a son
    - type: text
      text: ' in his own likeness, according to his image, and named him Seth. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Lamech lived five hundred and ninety-five years after the birth of Noah and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: So all the days of Lamech were seven hundred and seventy-seven years, and he died.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: After Noah was five hundred years old, he became the father of Shem, Ham, and Japheth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'After he became the father of Seth, Adam lived eight hundred years and had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So Adam lived nine hundred and thirty years in all, and he died.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When Seth was a hundred and five years old, he became the father of Enosh. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Seth lived eight hundred and seven years after the birth of Enosh, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So Seth lived nine hundred and twelve years, and he died.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'When Enosh was ninety years old, he became the father of Kenan. '
