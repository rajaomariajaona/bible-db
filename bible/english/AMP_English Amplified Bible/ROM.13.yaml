document_id: ROM.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Be Subject to Government
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let every person be subject to the governing authorities. For there is no authority except from God [granted by His permission and sanction], and those which exist have been put in place by God. [Prov 8:15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Therefore whoever '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An exception to this is recorded in Acts 5:27-29. See especially v 29.
    marker-yv: yv-n
  - type: text
    text: 'resists [governmental] authority resists the ordinance of God. And those who have resisted it will bring judgment (civil penalty) on themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For [civil] authorities are not a source of fear for [people of] good behavior, but for [those who do] evil. Do you want to be unafraid of authority? Do what is good and you will receive approval '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commendation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For he is God’s servant to you for good. But if you do wrong, [you should] be afraid; for he does not carry the [executioner’s] sword for nothing. He is God’s servant, an avenger who brings punishment on the wrongdoer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore one must be subject [to civil authorities], not only to escape the punishment [that comes with wrongdoing], but also as a matter of principle [knowing what is right before God]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For this same reason you pay taxes, for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: civil authorities
  - type: text
    text: ' are God’s servants, devoting themselves to governance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pay to all what is due: tax to whom tax '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is due,
  - type: text
    text: ' customs to whom customs, respect to whom respect, honor to whom honor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Debt is generally to be avoided, but Paul probably is addressing debt to individuals with whom one has a personal relationship.
    marker-yv: yv-n
  - type: text
    text: 'Owe nothing to anyone except to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape)
      - type: text
        text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the best for other believers.'
    marker-yv: yv-n
  - type: text
    text: 'love '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' seek the best for one another; for he who [unselfishly] loves his neighbor has fulfilled the [essence of the] law [relating to one’s fellowman]. [Matt 22:36-40] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The commandments, “Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou shall not commit adultery
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: you shall not murder
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: you shall not steal
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: you shall not covet
  - type: text
    text: ',” and any other commandment are summed up in this statement: “Y'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou shall love your neighbor as yourself
  - type: text
    text: '.” [Ex 20:13-17; Lev 19:18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Love does no wrong to a neighbor [it never hurts anyone]. Therefore [unselfish] love is the fulfillment of the Law.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Do this, knowing that this is a critical time. It is already the hour for you to awaken from your sleep [of spiritual complacency]; for our salvation is nearer to us now than when we first believed [in Christ]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The night [this present evil age] is almost gone and the day [of Christ’s return] is almost here. So let us fling away the works of darkness and put on the [full] armor of light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let us conduct ourselves properly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honorably as in the [light of] day, not in carousing and drunkenness, not in sexual promiscuity and irresponsibility, not in quarreling and jealousy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But clothe yourselves with the Lord Jesus Christ, and make no provision for [nor even think about gratifying] the flesh in regard to its improper desires.
