document_id: GEN.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Cain and Abel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the man '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The name '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Adam
      - type: text
        text: ' is the Hebrew word for “man,” so when the word is used with the article (“the”) as it is here, it can be inferred that the writer (Moses) is referring to Adam as “the man.”'
    marker-yv: yv-n
  - type: text
    text: 'Adam knew Eve as his wife, and she conceived and gave birth to Cain, and she said, “I have obtained a man (baby boy, son) with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the help of
  - type: text
    text: ' the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And [later] she gave birth to his brother Abel. Now Abel kept the flocks [of sheep and goats], but Cain cultivated the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And in the course of time Cain brought to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' an offering of the fruit of the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Abel brought [an offering of] the [finest] firstborn of his flock and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the fat that covered the entrails of the animals. Later, in the Mosaic Law, the Israelites were forbidden to eat this fat (Lev 7:23), which was reserved as an offering to God, especially for sin (Lev 4:8, 26, 35; 9:10; 16:25).
    marker-yv: yv-n
  - type: text
    text: fat portions. And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had respect (regard) for Abel and for his offering; [Heb 11:4] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but for Cain and his offering He had no respect. So Cain became extremely angry (indignant), and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his countenance fell
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'he looked annoyed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hostile. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Cain, “Why are you so angry? And why do you look annoyed? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If you do well [believing Me and doing what is acceptable and pleasing to Me], will you not be accepted? And if you do not do well [but ignore My instruction], sin crouches at your door; its desire is for you [to overpower you], but you must master it.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cain talked with Abel his brother [about what God had said]. And when they were [alone, working] in the field, Cain '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: rose up against
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: attacked Abel his brother and killed him. [1 John 3:12]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Cain, “Where is Abel your brother?” And he [lied and] said, “I do not know. Am I my brother’s keeper?” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “What have you done? The voice of your brother’s [innocent] blood is crying out to Me from the ground [for justice]. [Num 35:33; Deut 21:1-9] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And now you are cursed from the ground, which has opened its mouth to receive your brother’s [shed] blood from your hand. [Deut 28:15-20] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When you cultivate the ground, it shall no longer yield its strength [it will resist producing good crops] for you; you shall be a fugitive and a vagabond [roaming aimlessly] on the earth [in perpetual exile without a home, a degraded outcast].” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cain said to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “My punishment is greater than I can bear. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Behold, You have driven me out this day from the face of the land; and from Your face (presence) I will be hidden, and I will be a fugitive and an [aimless] vagabond on the earth, and whoever finds me will kill me.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, “'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some ancient versions read, “Not so!”
    marker-yv: yv-n
  - type: text
    text: Therefore, whoever kills Cain, a sevenfold vengeance [that is, punishment seven times worse] shall be taken on him [by Me].” And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' set a [protective] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many commentators believe this sign not to have been like a brand on the forehead, but something awesome about Cain’s appearance that made people dread and avoid him. In the Talmud, the rabbis suggested several possibilities, including leprosy, boils, or a horn that grew out of Cain. But it was also suggested that Cain was given a pet dog to serve as a protective sign.
    marker-yv: yv-n
  - type: text
    text: mark (sign) on Cain, so that no one who found (met) him would kill him. [Gen 4:24]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Cain went away from the [manifested] presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and lived in the land of Nod [wandering in exile], east of Eden.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cain knew his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The simplest explanation for the origin of Cain’s wife is that she was one of his sisters, whom Scripture does not mention specifically, but implies (5:4). It is also possible that she was a niece or more distant relative descended from the original family, but in any case it is evident that the unrecorded children of Adam and Eve married each other. This was possible because the human gene pool was at its purest with Adam and Eve, so at some point their children could begin families of their own.
    marker-yv: yv-n
  - type: text
    text: 'wife [one of Adam’s descendants] and she conceived and gave birth to Enoch; and Cain built a city and named it Enoch, after the name of his son. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now to Enoch was born Irad, and Irad became the father of Mehujael, and Mehujael became the father of Methushael, and Methushael became the father of Lamech. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Lamech took for himself two wives; the name of the one was Adah, and the name of the other, Zillah. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Adah gave birth to Jabal; he became the father of those [nomadic herdsmen] who live in tents and have cattle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' raise livestock. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'His brother’s name was Jubal; he became the father of all those [musicians] who play the lyre and flute. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Zillah gave birth to Tubal-cain, the smith (craftsman) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teacher of every artisan in instruments of bronze and iron. The sister of Tubal-cain was Naamah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lamech said to his wives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Adah and Zillah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hear my voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You wives of Lamech,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to what I say;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have killed a man [merely] for wounding me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a boy [only] for striking (bruising) me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “If Cain is avenged sevenfold [as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said he would be],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then Lamech [will be avenged] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lamech arrogantly declares to his wives that if someone kills him, he will be entitled to far greater vengeance since he merely retaliated for harm suffered, while Cain’s murder of Abel was by comparison unprovoked.
    marker-yv: yv-n
  - type: text
    text: seventy-sevenfold.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Adam knew [Eve as] his wife again; and she gave birth to a son, and named him Seth, for [she said], “God has granted another child for me in place of Abel, because Cain killed him.” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: To Seth, also, a son was born, whom he named Enosh (mortal man, mankind). At that [same] time men began to call on the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [in worship through prayer, praise, and thanksgiving]. [Joel 2:32; Luke 3:38; Acts 2:21]'
