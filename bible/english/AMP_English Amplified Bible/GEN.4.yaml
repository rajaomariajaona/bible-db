    content: Cain and Abel
  - type: text
    content: 'Now the man '
  - type: note
    content: The name Adam is the Hebrew word for “man,” so when the word is used with the article (“the”) as it is here, it can be inferred that the writer (Moses) is referring to Adam as “the man.”
  - type: text
    content: 'Adam knew Eve as his wife, and she conceived and gave birth to Cain, and she said, “I have obtained a man (baby boy, son) with '
  - type: text
    content: the help of
  - type: text
    content: ' the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '10':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said, “What have you done? The voice of your brother’s [innocent] blood is crying out to Me from the ground [for justice]. [Num 35:33; Deut 21:1-9] '
  '11':
  - type: text
    content: 'And now you are cursed from the ground, which has opened its mouth to receive your brother’s [shed] blood from your hand. [Deut 28:15-20] '
  '12':
  - type: text
    content: 'When you cultivate the ground, it shall no longer yield its strength [it will resist producing good crops] for you; you shall be a fugitive and a vagabond [roaming aimlessly] on the earth [in perpetual exile without a home, a degraded outcast].” '
  '13':
  - type: text
    content: Cain said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “My punishment is greater than I can bear. '
  '14':
  - type: text
    content: 'Behold, You have driven me out this day from the face of the land; and from Your face (presence) I will be hidden, and I will be a fugitive and an [aimless] vagabond on the earth, and whoever finds me will kill me.” '
  '15':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “'
  - type: note
    content: Some ancient versions read, “Not so!”
  - type: text
    content: Therefore, whoever kills Cain, a sevenfold vengeance [that is, punishment seven times worse] shall be taken on him [by Me].” And the L
  - type: heading
    content: ord
  - type: text
    content: ' set a [protective] '
  - type: note
    content: Many commentators believe this sign not to have been like a brand on the forehead, but something awesome about Cain’s appearance that made people dread and avoid him. In the Talmud, the rabbis suggested several possibilities, including leprosy, boils, or a horn that grew out of Cain. But it was also suggested that Cain was given a pet dog to serve as a protective sign.
  - type: text
    content: mark (sign) on Cain, so that no one who found (met) him would kill him. [Gen 4:24]
  '16':
  - type: text
    content: So Cain went away from the [manifested] presence of the L
  - type: heading
    content: ord
  - type: text
    content: ', and lived in the land of Nod [wandering in exile], east of Eden.'
  '17':
  - type: text
    content: 'Cain knew his '
  - type: note
    content: The simplest explanation for the origin of Cain’s wife is that she was one of his sisters, whom Scripture does not mention specifically, but implies (5:4). It is also possible that she was a niece or more distant relative descended from the original family, but in any case it is evident that the unrecorded children of Adam and Eve married each other. This was possible because the human gene pool was at its purest with Adam and Eve, so at some point their children could begin families of their own.
  - type: text
    content: 'wife [one of Adam’s descendants] and she conceived and gave birth to Enoch; and Cain built a city and named it Enoch, after the name of his son. '
  '18':
  - type: text
    content: 'Now to Enoch was born Irad, and Irad became the father of Mehujael, and Mehujael became the father of Methushael, and Methushael became the father of Lamech. '
  '19':
  - type: text
    content: 'And Lamech took for himself two wives; the name of the one was Adah, and the name of the other, Zillah. '
  '2':
  - type: text
    content: 'And [later] she gave birth to his brother Abel. Now Abel kept the flocks [of sheep and goats], but Cain cultivated the ground. '
  '20':
  - type: text
    content: 'Adah gave birth to Jabal; he became the father of those [nomadic herdsmen] who live in tents and have cattle '
  - type: text
    content: and
  - type: text
    content: ' raise livestock. '
  '21':
  - type: text
    content: 'His brother’s name was Jubal; he became the father of all those [musicians] who play the lyre and flute. '
  '22':
  - type: text
    content: 'Zillah gave birth to Tubal-cain, the smith (craftsman) '
  - type: text
    content: and
  - type: text
    content: ' teacher of every artisan in instruments of bronze and iron. The sister of Tubal-cain was Naamah.'
  '23':
  - type: text
    content: Lamech said to his wives,
  - type: text
    content: “Adah and Zillah,
  - type: text
    content: Hear my voice;
  - type: text
    content: You wives of Lamech,
  - type: text
    content: Listen to what I say;
  - type: text
    content: For I have killed a man [merely] for wounding me,
  - type: text
    content: And a boy [only] for striking (bruising) me.
  '24':
  - type: text
    content: “If Cain is avenged sevenfold [as the L
  - type: heading
    content: ord
  - type: text
    content: ' said he would be],'
  - type: text
    content: 'Then Lamech [will be avenged] '
  - type: note
    content: Lamech arrogantly declares to his wives that if someone kills him, he will be entitled to far greater vengeance since he merely retaliated for harm suffered, while Cain’s murder of Abel was by comparison unprovoked.
  - type: text
    content: seventy-sevenfold.”
  '25':
  - type: text
    content: 'Adam knew [Eve as] his wife again; and she gave birth to a son, and named him Seth, for [she said], “God has granted another child for me in place of Abel, because Cain killed him.” '
  '26':
  - type: text
    content: To Seth, also, a son was born, whom he named Enosh (mortal man, mankind). At that [same] time men began to call on the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' [in worship through prayer, praise, and thanksgiving]. [Joel 2:32; Luke 3:38; Acts 2:21]'
  '3':
  - type: text
    content: And in the course of time Cain brought to the L
  - type: heading
    content: ord
  - type: text
    content: ' an offering of the fruit of the ground. '
  '4':
  - type: text
    content: 'But Abel brought [an offering of] the [finest] firstborn of his flock and the '
  - type: note
    content: That is, the fat that covered the entrails of the animals. Later, in the Mosaic Law, the Israelites were forbidden to eat this fat (Lev 7:23), which was reserved as an offering to God, especially for sin (Lev 4:8, 26, 35; 9:10; 16:25).
  - type: text
    content: fat portions. And the L
  - type: heading
    content: ord
  - type: text
    content: ' had respect (regard) for Abel and for his offering; [Heb 11:4] '
  '5':
  - type: text
    content: 'but for Cain and his offering He had no respect. So Cain became extremely angry (indignant), and '
  - type: note
    content: Lit his countenance fell.
  - type: text
    content: 'he looked annoyed '
  - type: text
    content: and
  - type: text
    content: ' hostile. '
  '6':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Cain, “Why are you so angry? And why do you look annoyed? '
  '7':
  - type: text
    content: 'If you do well [believing Me and doing what is acceptable and pleasing to Me], will you not be accepted? And if you do not do well [but ignore My instruction], sin crouches at your door; its desire is for you [to overpower you], but you must master it.” '
  '8':
  - type: text
    content: 'Cain talked with Abel his brother [about what God had said]. And when they were [alone, working] in the field, Cain '
  - type: note
    content: Lit rose up against.
  - type: text
    content: attacked Abel his brother and killed him. [1 John 3:12]
  '9':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Cain, “Where is Abel your brother?” And he [lied and] said, “I do not know. Am I my brother’s keeper?” '
