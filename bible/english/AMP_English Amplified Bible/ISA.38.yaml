document_id: ISA.38,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hezekiah Healed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In those days Hezekiah [king of Judah] became sick and was at the point of death. And Isaiah the prophet, the son of Amoz, came to him and said, “For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says this, ‘Set your house in order '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prepare a will, for you shall die; you will not live.’ ” [2 Kin 20:1-11; 2 Chr 32:24-26] '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I said, “In mid-life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am to go through the gates of Sheol (the place of the dead),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am to be summoned, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deprived of
    - type: text
      text: ' the remainder of my years.”'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I said, “I will not see the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the land of the living;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will no longer see man among the inhabitants of the world.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “My dwelling (body) is pulled up and removed from me like a shepherd’s tent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have rolled up my life as a weaver [rolls up the finished web].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He cuts me free from the warp [of the loom];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From day to night You bring me to an end.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “I lay down until morning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lion, so He breaks all my bones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From day until night You bring me to an end.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Like a swallow, like a crane, so I chirp;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I coo like a dove.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes look wistfully upward;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Lord, I am oppressed, take my side '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be my security.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶“What shall I say?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has spoken to me, and He Himself has done it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will wander aimlessly all my years because of the bitterness of my soul.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“O Lord, by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' things men live,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in all these is the life of my spirit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore me to health and let me live!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Indeed, it was for my own well-being that I had such bitterness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But You have loved back my life from the pit of nothingness (destruction),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You have cast all my sins behind Your back.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“For Sheol cannot praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' thank You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Death cannot praise You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejoice in You;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who go down to the pit cannot hope for Your faithfulness.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“It is the living who give praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanks to You, as I do today;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A father tells his sons about Your faithfulness.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Then Hezekiah turned his face to the wall and prayed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is ready to save me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore we will play my songs on stringed instruments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the days of our lives at the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Now Isaiah had said, “Have them take a cake of figs and rub it [as an ointment] on the inflamed spot, that he may recover.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Hezekiah also had said, “What is the sign that I will go up to the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: and said, “Please, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', just remember how I have walked before You in faithfulness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' truth, and with a whole heart [absolutely devoted to You], and have done what is good in Your sight.” And Hezekiah wept greatly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Isaiah, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Go and say to Hezekiah, ‘For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of David your father says this, “I have heard your prayer, I have seen your tears; listen carefully, I will add fifteen years to your life. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I will rescue you and this city from the hand of the king of Assyria; and I will defend this city [Jerusalem].” ’
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “This shall be the sign to you from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will do this thing that He has spoken: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Listen carefully, I will turn the shadow on the stairway [denoting the time of day] ten steps backward, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the shadow
    - type: text
      text: ' on the stairway ('
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some suggest that this stairway was built to serve as a sundial; others think that it was just a stairway whose design happened to function as a kind of sundial. The Hebrew word simply means “ascent,” which can be a stair or a stairway. If it was fully exposed to the sun, the shadow must have been cast by some object, such as a pole. Otherwise, if it was covered, then perhaps there was an opening through which the sun shone and illuminated part of the stairway.
      marker-yv: yv-n
    - type: text
      text: sundial) of Ahaz.” And the sunlight went ten steps backward on the stairway where it had [previously] gone down.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: This is the
    - type: text
      text: ' writing of Hezekiah king of Judah after he had been sick and had recovered from his illness:'
