    content: 'Listen carefully, I will turn the shadow on the stairway [denoting the time of day] ten steps backward, '
  - type: text
    content: the shadow
  - type: text
    content: ' on the stairway ('
  - type: note
    content: Some suggest that this stairway was built to serve as a sundial; others think that it was just a stairway whose design happened to function as a kind of sundial. The Hebrew word simply means “ascent,” which can be a stair or a stairway. If it was fully exposed to the sun, the shadow must have been cast by some object, such as a pole. Otherwise, if it was covered, then perhaps there was an opening through which the sun shone and illuminated part of the stairway.
  - type: text
