document_id: EXO.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Garments of the Priests
  - type: text
    content: '“Now bring your brother Aaron near, and his sons with him from among the sons of Israel, so that he may serve as priest to Me—Aaron, Nadab and Abihu, Eleazar and Ithamar, Aaron’s sons. '
  '10':
  - type: text
    content: 'six of their names on one stone and the remaining six names on the other stone, arranged in the order of their births. '
  '11':
  - type: text
    content: 'With the work of a jeweler, like the engravings of a signet, you shall engrave the two stones according to the names of the sons of Israel. You shall have them set in '
  - type: note
    content: I.e. ornamental openwork of delicate or intricate design.
  - type: text
    content: 'filigree [settings] of gold. '
  '12':
  - type: text
    content: You shall put the two stones on the [two] shoulder pieces of the ephod [of the high priest], as memorial stones for Israel; and Aaron shall bear their names on his two shoulders as a memorial before the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'You shall make filigree [settings] of gold, '
  '14':
  - type: text
    content: 'and you are to make two chains of pure gold like twisted cords, and fasten the corded chains to the '
  - type: text
    content: settings
  - type: text
    content: .
  '15':
  - type: text
    content: '“You are to make a breastpiece of judgment, the work of a skilled '
  - type: text
    content: and
  - type: text
    content: ' talented craftsman; like the work of the ephod you shall make it: of gold, of blue, purple, and scarlet fabric and of fine twisted linen. '
  '16':
  - type: text
    content: 'The breastpiece shall be square and folded double; a span [about nine inches] in length and a span in width. '
  '17':
  - type: text
    content: 'You shall mount on it four rows of stones: the first row shall be a row of ruby, topaz, and emerald; '
  '18':
  - type: text
    content: 'the second row a turquoise, a sapphire, and a diamond; '
  '19':
  - type: text
    content: 'the third row a jacinth, an agate, and an amethyst; '
  '2':
  - type: text
    content: 'You are to make sacred garments [official clothing reserved for holy services] for Aaron your brother, for honor and for beauty (ornamentation). '
  '20':
  - type: text
    content: 'and the fourth row a beryl and an onyx and a jasper; they shall be set in gold filigree. '
  '21':
  - type: text
    content: 'The [engraved] stones shall be twelve, according to the names of [the twelve tribes of] the sons of Israel; they shall be like the engravings of a signet, each with its name for the twelve tribes. '
  '22':
  - type: text
    content: 'You shall make for the breastpiece chains of pure gold twisted like cords. '
  '23':
  - type: text
    content: 'You shall make on the breastpiece two rings of gold, and shall put the two rings on the two ends of the breastpiece. '
  '24':
  - type: text
    content: 'You shall put the two twisted cords of gold in the two rings which are on the ends of the breastpiece. '
  '25':
  - type: text
    content: 'The '
  - type: text
    content: other
  - type: text
    content: ' two ends of the two cords you shall fasten in the two filigree '
  - type: text
    content: settings
  - type: text
    content: ' in front, putting them on the shoulder pieces of the ephod. '
  '26':
  - type: text
    content: 'You shall make two gold rings and put them at the two ends of the breastpiece, on its inside edge next to the ephod. '
  '27':
  - type: text
    content: 'You are to make two gold rings and attach them to the lower part of the two shoulder pieces of the ephod in front, close to the place where it is joined, above the skillfully woven sash of the ephod. '
  '28':
  - type: text
    content: 'They shall bind the breastpiece by its rings to the rings of the ephod with a blue cord, so that it will be above the skillfully woven sash of the ephod, so that the breastpiece will not come loose from the ephod. '
  '29':
  - type: text
    content: So Aaron shall carry the names of the sons of Israel (Jacob) in the breastpiece of judgment over his heart when he enters the Holy Place, to bring them in continual remembrance before the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Tell all the skilled '
  - type: text
    content: and
  - type: text
    content: ' talented people whom I have endowed with a spirit of wisdom, that they are to make Aaron’s garments to sanctify him '
  - type: text
    content: and
  - type: text
    content: ' set him apart to serve as a priest for Me. '
  '30':
  - type: text
    content: 'In the breastpiece of judgment you shall put the '
  - type: note
    content: I.e. unspecified articles used like lots when the high priest asked God’s counsel for Israel.
  - type: text
    content: Urim (Lights) and the Thummim (Perfections) [to be used for determining God’s will in a matter]. They shall be over Aaron’s heart whenever he goes before the L
  - type: heading
    content: ord
  - type: text
    content: ', and Aaron shall always carry the judgment (verdict, judicial decisions) of the sons of Israel over his heart before the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '31':
  - type: text
    content: '“And you shall make the '
  - type: note
    content: I.e. the robe worn underneath the ephod.
  - type: text
    content: 'robe of the ephod all of blue. '
  '32':
  - type: text
    content: 'There shall be an opening at its top in the center [for the head], with a binding of woven work around the opening, like the opening in a coat of armor, so that it will not tear '
  - type: text
    content: or
  - type: text
    content: ' fray. '
  '33':
  - type: text
    content: 'You shall make pomegranates of blue, purple, and scarlet fabric all around its hem, with gold bells between them; '
  '34':
  - type: text
    content: 'a golden bell and a pomegranate, a golden bell and a pomegranate, all around the [bottom] hem of the robe. '
  '35':
  - type: text
    content: Aaron shall wear the robe when he ministers, and its sound shall be heard when he goes [alone] into the Holy Place before the L
  - type: heading
    content: ord
  - type: text
    content: ', and when he comes out, so that he will not die there.'
  '36':
  - type: text
    content: “You shall also make a plate of pure gold and engrave on it, like the engravings of a signet, ‘Holy to the L
  - type: heading
    content: ord
  - type: text
    content: '.’ [Ex 39:30] '
  '37':
  - type: text
    content: 'You shall fasten it on the front of the turban with a blue cord. '
  '38':
  - type: text
    content: It shall be on Aaron’s forehead, and Aaron shall take away the guilt from the holy things which the sons of Israel dedicate, with regard to all their holy gifts. It shall always be on his forehead, so that they may be accepted before the L
  - type: heading
    content: ord
  - type: text
    content: . [Luke 24:44; Heb 8:1, 2]
  '39':
  - type: text
    content: “You shall weave the tunic of checkered work of fine linen, and make a turban of fine linen. You shall make a sash, the work of an embroiderer.
  '4':
  - type: text
    content: 'These are the garments which they shall make: a breastpiece and an ephod [for the breastpiece] and a robe and a tunic of checkered work, a turban, and a sash. They shall make sacred garments for Aaron your brother and his sons, so that he may serve as a priest to Me. '
  '40':
  - type: text
    content: '“For Aaron’s sons you shall make tunics and sashes and [ornamental] caps, for glory '
  - type: text
    content: and
  - type: text
    content: ' honor and beauty. '
  '41':
  - type: text
    content: 'You shall put the various articles of clothing on Aaron your brother and on his sons with him, and shall anoint them and ordain and sanctify them, so that they may serve Me as priests. '
  '42':
  - type: text
    content: 'You shall make for them [white] linen undergarments to cover their bare flesh, reaching from the waist to the thighs. '
  '43':
  - type: text
    content: The various articles of clothing shall be on Aaron and on his sons when they enter the Tent of Meeting, or when they approach the altar [of incense] to minister in the Holy Place, so that they do not incur guilt and die. It shall be a statute forever to Aaron and to his descendants after him.
  '5':
  - type: text
    content: They are to use the gold and the blue and the purple and the scarlet fabric and fine twisted linen [from the people],
  '6':
  - type: text
    content: 'and they shall make the ephod of gold and blue, purple, and scarlet fabric and fine twisted linen, skillfully woven '
  - type: text
    content: and
  - type: text
    content: ' [beautifully] worked. '
  '7':
  - type: text
    content: 'It is to have two shoulder pieces joined to its two [back and front] ends, so that it may be joined together. '
  '8':
  - type: text
    content: 'And the skillfully woven sash, which is on the ephod shall be made of the same material: of gold, of blue, purple, and scarlet fabric and fine twisted linen. '
  '9':
  - type: text
    content: 'You shall take two onyx stones and engrave on them the names of the [twelve] sons of Israel, '
