document_id: EXO.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Garments of the Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Now bring your brother Aaron near, and his sons with him from among the sons of Israel, so that he may serve as priest to Me—Aaron, Nadab and Abihu, Eleazar and Ithamar, Aaron’s sons. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'six of their names on one stone and the remaining six names on the other stone, arranged in the order of their births. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'With the work of a jeweler, like the engravings of a signet, you shall engrave the two stones according to the names of the sons of Israel. You shall have them set in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. ornamental openwork of delicate or intricate design.
      marker-yv: yv-n
    - type: text
      text: 'filigree [settings] of gold. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You shall put the two stones on the [two] shoulder pieces of the ephod [of the high priest], as memorial stones for Israel; and Aaron shall bear their names on his two shoulders as a memorial before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'You shall make filigree [settings] of gold, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and you are to make two chains of pure gold like twisted cords, and fasten the corded chains to the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: settings
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“You are to make a breastpiece of judgment, the work of a skilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' talented craftsman; like the work of the ephod you shall make it: of gold, of blue, purple, and scarlet fabric and of fine twisted linen. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The breastpiece shall be square and folded double; a span [about nine inches] in length and a span in width. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'You shall mount on it four rows of stones: the first row shall be a row of ruby, topaz, and emerald; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'the second row a turquoise, a sapphire, and a diamond; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'the third row a jacinth, an agate, and an amethyst; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'You are to make sacred garments [official clothing reserved for holy services] for Aaron your brother, for honor and for beauty (ornamentation). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and the fourth row a beryl and an onyx and a jasper; they shall be set in gold filigree. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The [engraved] stones shall be twelve, according to the names of [the twelve tribes of] the sons of Israel; they shall be like the engravings of a signet, each with its name for the twelve tribes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'You shall make for the breastpiece chains of pure gold twisted like cords. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'You shall make on the breastpiece two rings of gold, and shall put the two rings on the two ends of the breastpiece. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'You shall put the two twisted cords of gold in the two rings which are on the ends of the breastpiece. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' two ends of the two cords you shall fasten in the two filigree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: settings
    - type: text
      text: ' in front, putting them on the shoulder pieces of the ephod. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'You shall make two gold rings and put them at the two ends of the breastpiece, on its inside edge next to the ephod. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'You are to make two gold rings and attach them to the lower part of the two shoulder pieces of the ephod in front, close to the place where it is joined, above the skillfully woven sash of the ephod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'They shall bind the breastpiece by its rings to the rings of the ephod with a blue cord, so that it will be above the skillfully woven sash of the ephod, so that the breastpiece will not come loose from the ephod. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So Aaron shall carry the names of the sons of Israel (Jacob) in the breastpiece of judgment over his heart when he enters the Holy Place, to bring them in continual remembrance before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tell all the skilled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' talented people whom I have endowed with a spirit of wisdom, that they are to make Aaron’s garments to sanctify him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set him apart to serve as a priest for Me. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'In the breastpiece of judgment you shall put the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. unspecified articles used like lots when the high priest asked God’s counsel for Israel.
      marker-yv: yv-n
    - type: text
      text: Urim (Lights) and the Thummim (Perfections) [to be used for determining God’s will in a matter]. They shall be over Aaron’s heart whenever he goes before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and Aaron shall always carry the judgment (verdict, judicial decisions) of the sons of Israel over his heart before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“And you shall make the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the robe worn underneath the ephod.
      marker-yv: yv-n
    - type: text
      text: 'robe of the ephod all of blue. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'There shall be an opening at its top in the center [for the head], with a binding of woven work around the opening, like the opening in a coat of armor, so that it will not tear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' fray. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'You shall make pomegranates of blue, purple, and scarlet fabric all around its hem, with gold bells between them; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'a golden bell and a pomegranate, a golden bell and a pomegranate, all around the [bottom] hem of the robe. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Aaron shall wear the robe when he ministers, and its sound shall be heard when he goes [alone] into the Holy Place before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and when he comes out, so that he will not die there.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “You shall also make a plate of pure gold and engrave on it, like the engravings of a signet, ‘Holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.’ [Ex 39:30] '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'You shall fasten it on the front of the turban with a blue cord. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: It shall be on Aaron’s forehead, and Aaron shall take away the guilt from the holy things which the sons of Israel dedicate, with regard to all their holy gifts. It shall always be on his forehead, so that they may be accepted before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Luke 24:44; Heb 8:1, 2]
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: “You shall weave the tunic of checkered work of fine linen, and make a turban of fine linen. You shall make a sash, the work of an embroiderer.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'These are the garments which they shall make: a breastpiece and an ephod [for the breastpiece] and a robe and a tunic of checkered work, a turban, and a sash. They shall make sacred garments for Aaron your brother and his sons, so that he may serve as a priest to Me. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: '“For Aaron’s sons you shall make tunics and sashes and [ornamental] caps, for glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor and beauty. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'You shall put the various articles of clothing on Aaron your brother and on his sons with him, and shall anoint them and ordain and sanctify them, so that they may serve Me as priests. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'You shall make for them [white] linen undergarments to cover their bare flesh, reaching from the waist to the thighs. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: The various articles of clothing shall be on Aaron and on his sons when they enter the Tent of Meeting, or when they approach the altar [of incense] to minister in the Holy Place, so that they do not incur guilt and die. It shall be a statute forever to Aaron and to his descendants after him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They are to use the gold and the blue and the purple and the scarlet fabric and fine twisted linen [from the people],
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and they shall make the ephod of gold and blue, purple, and scarlet fabric and fine twisted linen, skillfully woven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [beautifully] worked. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'It is to have two shoulder pieces joined to its two [back and front] ends, so that it may be joined together. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the skillfully woven sash, which is on the ephod shall be made of the same material: of gold, of blue, purple, and scarlet fabric and fine twisted linen. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'You shall take two onyx stones and engrave on them the names of the [twelve] sons of Israel, '
