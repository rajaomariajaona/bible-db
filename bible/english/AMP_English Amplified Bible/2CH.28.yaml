document_id: 2CH.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaz Succeeds Jotham in Judah
  - type: text
    content: Ahaz was twenty years old when he became king, and he reigned for sixteen years in Jerusalem. He did not do right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', as his father (forefather) David '
  - type: text
    content: had done
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'And now you intend to subjugate the people of Judah and Jerusalem as male and female slaves for yourselves. But are you yourselves not guilty '
  - type: text
    content: of transgressions
  - type: text
    content: ' against the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God? '
  '11':
  - type: text
    content: Now therefore, hear me and return the captives whom you have captured from your brothers (fellow descendants of Israel, i.e. Jacob), for the burning anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' is against you.” '
  '12':
  - type: text
    content: 'Then some of the heads of the Ephraimites (Israel)—Azariah the son of Johanan, Berechiah the son of Meshillemoth, Jehizkiah the son of Shallum, and Amasa the son of Hadlai—took a stand against those who were returning from the battle, '
  '13':
  - type: text
    content: and said to them, “You must not bring the captives in here; for we are guilty before the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: text
    content: already
  - type: text
    content: ', and '
  - type: text
    content: what
  - type: text
    content: ' you intend to '
  - type: text
    content: do will
  - type: text
    content: ' add more to our sins and our guilt. For our guilt is so great that His burning anger is against Israel.” '
  '14':
  - type: text
    content: 'So the armed men [of Israel] left the captives and the spoil [of Judah] before the officers and all the assembly. '
  '15':
  - type: text
    content: Then the men who were designated by name rose up and took the captives, and from the spoil they clothed all those who were naked; they clothed them and gave them sandals, and fed them and gave them [something to] drink, anointed them [with oil, as was a host’s duty], and led all the feeble ones on donkeys, and they brought them to Jericho, the City of Palm Trees, to their brothers (fellow descendants of Israel, i.e. Jacob). Then they returned to Samaria. [Luke 10:25-37]
  - type: heading
    content: Compromise with Assyria
  '16':
  - type: text
    content: 'At that time King Ahaz sent '
  - type: text
    content: word
  - type: text
    content: ' to the king of Assyria [to ask him] for help. '
  '17':
  - type: text
    content: 'For the Edomites had come again and attacked Judah and led away captives. '
  '18':
  - type: text
    content: 'The Philistines had also invaded the cities of the low country and of the Negev (the South country) of Judah, and had taken Beth-shemesh, Aijalon, Gederoth, and Soco with their villages, and also Timnah with its villages, and Gimzo with its villages, and they settled there. '
  '19':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' humbled Judah because of Ahaz king of Israel, for Ahaz had allowed unrestrained '
  - type: text
    content: and
  - type: text
    content: ' undisciplined behavior in Judah and had been very unfaithful to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Instead he walked in the ways of the kings of Israel, and even made cast images for the Baals. '
  '20':
  - type: text
    content: 'So Tilgath-pilneser king of Assyria came against him and harassed him instead of strengthening '
  - type: text
    content: and
  - type: text
    content: ' supporting him. '
  '21':
  - type: text
    content: Although Ahaz took a portion [of treasure] from the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and from the house (palace) of the king and from the leaders, and gave it [as tribute] to the king of Assyria, it did not help Ahaz.'
  '22':
  - type: text
    content: In the time of his distress, this same King Ahaz became yet more unfaithful to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'For he sacrificed to the gods of Damascus, which had defeated him, and he said, “Since the gods of the kings of Aram (Syria) helped them, I will sacrifice to them so that they may help me.” But they became the ruin '
  - type: text
    content: and
  - type: text
    content: ' downfall of him and all of Israel. '
  '24':
  - type: text
    content: Then Ahaz collected the utensils of the house of God and he cut them in pieces; and he shut the doors of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and made altars for himself in every corner of Jerusalem. '
  '25':
  - type: text
    content: In every city of Judah he made high places to burn incense to other gods, provoking to anger the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of his fathers. '
  '26':
  - type: text
    content: 'Now the rest of his acts and of all his ways, from the first to the last, behold, they are written in the Book of the Kings of Judah and Israel. '
  '27':
  - type: text
    content: And Ahaz slept with his fathers [in death], and they buried him in the city, in Jerusalem, but they did not bring him into the tombs of the kings of Israel. And his son Hezekiah reigned in his place.
  '3':
  - type: text
    content: And he burned incense in the Valley of Ben-hinnom and burned his sons [as an offering], in accordance with the repulsive acts of the [pagan] nations whom the L
  - type: heading
    content: ord
  - type: text
    content: ' had driven out before the sons (descendants) of Israel. '
  '4':
  - type: text
    content: He also sacrificed and burned incense on the high places [of pagan worship], on the hills and under every green tree.
  - type: heading
    content: Judah Is Invaded
  '5':
  - type: text
    content: Therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' his God handed over Ahaz to the king of Aram (Syria), who defeated him and led away a great number [of the people] as captives, and brought them to Damascus. And he was also handed over to the king of Israel, who struck Judah with a great slaughter. '
  '6':
  - type: text
    content: For Pekah son of Remaliah killed 120,000 in Judah in one day, all courageous men, because they had abandoned (turned away from) the L
  - type: heading
    content: ord
  - type: text
    content: ' God of their fathers. '
  '7':
  - type: text
    content: And Zichri, a warrior of Ephraim, killed Maaseiah the king’s son, and Azrikam the governor of the house, and Elkanah, who was second [in power] to the king.
  '8':
  - type: text
    content: 'And the sons of Israel led away captive 200,000 of their kinsmen [of Judah]—women, sons, and daughters—and they also took a great quantity of spoil from them and brought it to Samaria. '
  '9':
  - type: text
    content: But a prophet of the L
  - type: heading
    content: ord
  - type: text
    content: ' was there, whose name was Oded; and he went out to meet the army that was returning to Samaria and said to them, “Behold, because the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of your fathers, was angry with Judah, He handed them over to you; but you have killed them in a rage that has reached as far as heaven. '
