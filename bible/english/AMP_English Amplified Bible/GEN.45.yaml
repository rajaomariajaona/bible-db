type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph Shows Kindness to His Brothers
  - type: text
    content: 'Then Joseph could not control himself [any longer] in front of all those who attended him, and he called out, “Have everyone leave me.” So no man stood there when Joseph revealed himself to his brothers. '
  '10':
  - type: text
    content: 'You shall live in the land of Goshen [the best pasture land of Egypt], and you shall be close to me—you and your children and your grandchildren, your flocks and your herds and all you have. '
  '11':
  - type: text
    content: 'There I will provide for you '
  - type: text
    content: and
  - type: text
    content: ' sustain you, so that you and your household and all that are yours may not become impoverished, for there are still five years of famine '
  - type: text
    content: to come
  - type: text
    content: '.” ’ '
  '12':
  - type: text
    content: 'Look! Your eyes see, and the eyes of my brother Benjamin see, that I am speaking to you [personally in your language and not through an interpreter]. '
  '13':
  - type: text
    content: 'Now you must tell my father of all my splendor '
  - type: text
    content: and
  - type: text
    content: ' power in Egypt, and of everything that you have seen; and you must hurry and bring my father down here.” '
  '14':
  - type: text
    content: 'Then he embraced his brother Benjamin’s neck and wept, and Benjamin wept on his neck. '
  '15':
  - type: text
    content: He kissed all his brothers and wept on them, and afterward his brothers talked with him.
  '16':
  - type: text
    content: 'When the news was heard in Pharaoh’s house that Joseph’s brothers had come, it pleased Pharaoh and his servants. '
  '17':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Tell your brothers, ‘Do this: load your animals and return to the land of Canaan [without delay], '
  '18':
  - type: text
    content: 'and get your father and your households and come to me. I will give you the best of the land of Egypt and you will eat the fat (the finest produce) of the land.’ '
  '19':
  - type: text
    content: 'Now you [brothers of Joseph] are ordered [by Pharaoh], ‘Do this: take wagons from the land of Egypt for your little ones and for your wives, and bring your father and come. '
  '2':
  - type: text
    content: 'Joseph wept aloud, and the Egyptians [who had just left him] heard it, and the household of Pharaoh heard of it. '
  '20':
  - type: text
    content: Do not be concerned with your goods, for the best of all the land of Egypt is yours.’ ”
  '21':
  - type: text
    content: 'Then the sons of Israel did so; and Joseph gave them wagons according to the command of Pharaoh, and gave them provisions for the journey. '
  '22':
  - type: text
    content: 'To each of them Joseph gave changes of clothing, but to Benjamin he gave three hundred '
  - type: text
    content: pieces of
  - type: text
    content: ' silver and five changes of clothing. '
  '23':
  - type: text
    content: 'To his father he sent the following: ten '
  - type: text
    content: male
  - type: text
    content: ' donkeys loaded with the good things of Egypt, and ten female donkeys loaded with grain and bread and provision for his father [to supply all who were with him] on the journey.'
  '24':
  - type: text
    content: 'So he sent his brothers away, and as they departed, he said to them, “See that you do not quarrel on the journey [about how to explain this to our father].” '
  '25':
  - type: text
    content: 'So they went up from Egypt, and came to the land of Canaan to Jacob their father, '
  '26':
  - type: text
    content: 'and they said to him, “Joseph is still alive, and indeed he is ruler over all the land of Egypt.” But Jacob was stunned '
  - type: text
    content: and
  - type: text
    content: ' his heart almost stopped beating, because he did not believe them. '
  '27':
  - type: text
    content: 'When they told him everything that Joseph had said to them, and when he saw the wagons which Joseph had sent to carry him, the spirit of their father Jacob revived. '
  '28':
  - type: text
    content: And Israel (Jacob) said, “It is enough! Joseph my son is still alive. I will go and see him before I die.”
  '3':
  - type: text
    content: 'Then Joseph said to his brothers, “I am Joseph! Is my father still alive?” But his brothers were speechless, for they were stunned '
  - type: text
    content: and
  - type: text
    content: ' dismayed by [the fact that they were in] Joseph’s presence.'
  '4':
  - type: text
    content: 'And Joseph said to his brothers, “Please come closer to me.” And they approached him. And he said, “I am Joseph your brother, whom you sold into Egypt. '
  '5':
  - type: text
    content: 'Now do not be distressed or angry with yourselves because you sold me here, for God sent me ahead of you to save life '
  - type: text
    content: and
  - type: text
    content: ' preserve our family. '
  '6':
  - type: text
    content: 'For the famine has been in the land these two years, and there are still five more years in which there will be no plowing and harvesting. '
  '7':
  - type: text
    content: 'God sent me [to Egypt] ahead of you to preserve for you a remnant on the earth, and to keep you alive by a great escape. '
  '8':
  - type: text
    content: 'So now it was not you who sent me here, but God; and He has made me a father to Pharaoh and lord of all his household and ruler over all the land of Egypt. '
  '9':
  - type: text
    content: 'Hurry and go up to my father, and tell him, ‘Your son Joseph says this to you: “God has made me lord of all Egypt; come down to me, do not delay. '
