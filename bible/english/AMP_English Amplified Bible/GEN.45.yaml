document_id: GEN.45
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joseph Shows Kindness to His Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joseph could not control himself [any longer] in front of all those who attended him, and he called out, “Have everyone leave me.” So no man stood there when Joseph revealed himself to his brothers. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joseph wept aloud, and the Egyptians [who had just left him] heard it, and the household of Pharaoh heard of it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Joseph said to his brothers, “I am Joseph! Is my father still alive?” But his brothers were speechless, for they were stunned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dismayed by [the fact that they were in] Joseph’s presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Joseph said to his brothers, “Please come closer to me.” And they approached him. And he said, “I am Joseph your brother, whom you sold into Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now do not be distressed or angry with yourselves because you sold me here, for God sent me ahead of you to save life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' preserve our family. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the famine has been in the land these two years, and there are still five more years in which there will be no plowing and harvesting. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God sent me [to Egypt] ahead of you to preserve for you a remnant on the earth, and to keep you alive by a great escape. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So now it was not you who sent me here, but God; and He has made me a father to Pharaoh and lord of all his household and ruler over all the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hurry and go up to my father, and tell him, ‘Your son Joseph says this to you: “God has made me lord of all Egypt; come down to me, do not delay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You shall live in the land of Goshen [the best pasture land of Egypt], and you shall be close to me—you and your children and your grandchildren, your flocks and your herds and all you have. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There I will provide for you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sustain you, so that you and your household and all that are yours may not become impoverished, for there are still five years of famine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to come
  - type: text
    text: '.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Look! Your eyes see, and the eyes of my brother Benjamin see, that I am speaking to you [personally in your language and not through an interpreter]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now you must tell my father of all my splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power in Egypt, and of everything that you have seen; and you must hurry and bring my father down here.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he embraced his brother Benjamin’s neck and wept, and Benjamin wept on his neck. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He kissed all his brothers and wept on them, and afterward his brothers talked with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the news was heard in Pharaoh’s house that Joseph’s brothers had come, it pleased Pharaoh and his servants. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Pharaoh said to Joseph, “Tell your brothers, ‘Do this: load your animals and return to the land of Canaan [without delay], '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and get your father and your households and come to me. I will give you the best of the land of Egypt and you will eat the fat (the finest produce) of the land.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now you [brothers of Joseph] are ordered [by Pharaoh], ‘Do this: take wagons from the land of Egypt for your little ones and for your wives, and bring your father and come. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do not be concerned with your goods, for the best of all the land of Egypt is yours.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the sons of Israel did so; and Joseph gave them wagons according to the command of Pharaoh, and gave them provisions for the journey. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'To each of them Joseph gave changes of clothing, but to Benjamin he gave three hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pieces of
  - type: text
    text: ' silver and five changes of clothing. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'To his father he sent the following: ten '
  - type: usfm
    marker: it
    children:
    - type: text
      text: male
  - type: text
    text: ' donkeys loaded with the good things of Egypt, and ten female donkeys loaded with grain and bread and provision for his father [to supply all who were with him] on the journey.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So he sent his brothers away, and as they departed, he said to them, “See that you do not quarrel on the journey [about how to explain this to our father].” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So they went up from Egypt, and came to the land of Canaan to Jacob their father, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and they said to him, “Joseph is still alive, and indeed he is ruler over all the land of Egypt.” But Jacob was stunned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his heart almost stopped beating, because he did not believe them. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When they told him everything that Joseph had said to them, and when he saw the wagons which Joseph had sent to carry him, the spirit of their father Jacob revived. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And Israel (Jacob) said, “It is enough! Joseph my son is still alive. I will go and see him before I die.”
