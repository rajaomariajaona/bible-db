document_id: ECC.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Time for Everything
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There is a season (a time appointed) for everything and a time for every delight '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' event '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' purpose under heaven—'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A time to be born and a time to die;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time to plant and a time to uproot what is planted. [Heb 9:27]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A time to kill and a time to heal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time to tear down and a time to build up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A time to weep and a time to laugh;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time to mourn and a time to dance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A time to throw away stones and a time to gather stones;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time to embrace and a time to refrain from embracing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A time to search and a time to give up as lost;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time to keep and a time to throw away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A time to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a reference to the practice of tearing one’s clothes as a sign of mourning which began early among the Hebrews. Cf Gen 37:29. There are many references to this in the Old Testament. Solomon was no doubt familiar with this practice as his own father engaged in it with his contemporaries. Cf 2 Sam 3:31.
    marker-yv: yv-n
  - type: text
    text: tear apart and a time to sew together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time to keep silent and a time to speak. [Amos 5:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A time to love and a time to hate;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A time for war and a time for peace. [Luke 14:26]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'What profit is there for the worker from that in which he labors? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I have seen the task which God has given to the sons of men with which to occupy themselves.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Set Eternity in the Heart of Man
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He has made everything beautiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appropriate in its time. He has also planted eternity [a sense of divine purpose] in the human heart [a mysterious longing which nothing under the sun can satisfy, except God]—yet man cannot find out (comprehend, grasp) what God has done (His overall plan) from the beginning to the end.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I know that there is nothing better for them than to rejoice and to do good as long as they live; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and also that every man should eat and drink and see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enjoy the good of all his labor—it is the gift of God. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I know that whatever God does, it endures forever; nothing can be added to it nor can anything be taken from it, for God does it so that men will fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship Him [with awe-filled reverence, knowing that He is God]. [Ps 19:9; James 1:17] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: That which is has already been, and that which will be has already been, for God seeks what has passed by [so that history repeats itself].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moreover, I have seen under the sun that in the place of justice there is wickedness, and in the place of righteousness there is wickedness. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I said to myself, “God will judge both the righteous and the wicked,” for there is a time [appointed] for every matter and for every deed. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I said to myself regarding the sons of men, “God is surely testing them in order for them to see that [by themselves, without God] they are [only] animals.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For the [earthly] fate of the sons of men and the fate of animals is the same. As one dies, so dies the other; indeed, they all have the same breath and there is no preeminence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' advantage for man [in and of himself] over an animal, for all is vanity. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'All go to the same place. All came from the dust and all return to the dust. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Who knows if the spirit of man ascends upward and the spirit of the animal descends downward to the earth? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So I have seen that there is nothing better than that a man should be happy in his own works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' activities, for that is his portion (share). For who will bring him [back] to see what will happen after he is gone?'
