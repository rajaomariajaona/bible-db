document_id: ECC.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Time for Everything
  - type: text
    content: 'There is a season (a time appointed) for everything and a time for every delight '
  - type: text
    content: and
  - type: text
    content: ' event '
  - type: text
    content: or
  - type: text
    content: ' purpose under heaven—'
  '10':
  - type: text
    content: I have seen the task which God has given to the sons of men with which to occupy themselves.
  - type: heading
    content: God Set Eternity in the Heart of Man
  '11':
  - type: text
    content: 'He has made everything beautiful '
  - type: text
    content: and
  - type: text
    content: ' appropriate in its time. He has also planted eternity [a sense of divine purpose] in the human heart [a mysterious longing which nothing under the sun can satisfy, except God]—yet man cannot find out (comprehend, grasp) what God has done (His overall plan) from the beginning to the end.'
  '12':
  - type: text
    content: 'I know that there is nothing better for them than to rejoice and to do good as long as they live; '
  '13':
  - type: text
    content: 'and also that every man should eat and drink and see '
  - type: text
    content: and
  - type: text
    content: ' enjoy the good of all his labor—it is the gift of God. '
  '14':
  - type: text
    content: 'I know that whatever God does, it endures forever; nothing can be added to it nor can anything be taken from it, for God does it so that men will fear '
  - type: text
    content: and
  - type: text
    content: ' worship Him [with awe-filled reverence, knowing that He is God]. [Ps 19:9; James 1:17] '
  '15':
  - type: text
    content: That which is has already been, and that which will be has already been, for God seeks what has passed by [so that history repeats itself].
  '16':
  - type: text
    content: 'Moreover, I have seen under the sun that in the place of justice there is wickedness, and in the place of righteousness there is wickedness. '
  '17':
  - type: text
    content: 'I said to myself, “God will judge both the righteous and the wicked,” for there is a time [appointed] for every matter and for every deed. '
  '18':
  - type: text
    content: 'I said to myself regarding the sons of men, “God is surely testing them in order for them to see that [by themselves, without God] they are [only] animals.” '
  '19':
  - type: text
    content: 'For the [earthly] fate of the sons of men and the fate of animals is the same. As one dies, so dies the other; indeed, they all have the same breath and there is no preeminence '
  - type: text
    content: or
  - type: text
    content: ' advantage for man [in and of himself] over an animal, for all is vanity. '
  '2':
  - type: text
    content: A time to be born and a time to die;
  - type: text
    content: A time to plant and a time to uproot what is planted. [Heb 9:27]
  '20':
  - type: text
    content: 'All go to the same place. All came from the dust and all return to the dust. '
  '21':
  - type: text
    content: 'Who knows if the spirit of man ascends upward and the spirit of the animal descends downward to the earth? '
  '22':
  - type: text
    content: 'So I have seen that there is nothing better than that a man should be happy in his own works '
  - type: text
    content: and
  - type: text
    content: ' activities, for that is his portion (share). For who will bring him [back] to see what will happen after he is gone?'
  '3':
  - type: text
    content: A time to kill and a time to heal;
  - type: text
    content: A time to tear down and a time to build up.
  '4':
  - type: text
    content: A time to weep and a time to laugh;
  - type: text
    content: A time to mourn and a time to dance.
  '5':
  - type: text
    content: A time to throw away stones and a time to gather stones;
  - type: text
    content: A time to embrace and a time to refrain from embracing.
  '6':
  - type: text
    content: A time to search and a time to give up as lost;
  - type: text
    content: A time to keep and a time to throw away.
  '7':
  - type: text
    content: 'A time to '
  - type: note
    content: This may be a reference to the practice of tearing one’s clothes as a sign of mourning which began early among the Hebrews. Cf Gen 37:29. There are many references to this in the Old Testament. Solomon was no doubt familiar with this practice as his own father engaged in it with his contemporaries. Cf 2 Sam 3:31.
  - type: text
    content: tear apart and a time to sew together;
  - type: text
    content: A time to keep silent and a time to speak. [Amos 5:13]
  '8':
  - type: text
    content: A time to love and a time to hate;
  - type: text
    content: A time for war and a time for peace. [Luke 14:26]
  '9':
  - type: text
    content: 'What profit is there for the worker from that in which he labors? '
