  '19':
  - type: text
    content: You shall give to the priests, the Levites who are from the descendants of Zadok, who are close to Me to minister to Me,’ says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘a young bull for a sin offering [as a memorial to Christ’s sacrifice]. '
  '2':
  - type: text
    content: 'And behold, the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the God of Israel was coming from the way of the east; and His voice was like the sound of many waters, and the earth shone with His glory. [Rev 1:15; 14:2] '
  '20':
  - type: text
    content: 'And you shall take some of its blood and put it on the four horns [of the altar of burnt offering] and on the four corners of the ledge and on the border all around; thus you shall cleanse it (from sin) and make atonement for it. '
  '21':
  - type: text
    content: You shall also take the bull for the sin offering, and it shall be burned in the appointed place of the temple, outside the sanctuary. [Heb 13:11]
  '22':
  - type: text
    content: '‘On the second day you shall offer a male goat without blemish for a sin offering, and they shall cleanse the altar as they cleansed it with the bull. '
  '23':
  - type: text
    content: 'When you have finished cleansing it, you shall offer a young bull without blemish and a ram from the flock without blemish. '
  '24':
  - type: text
    content: You shall present them before the L
  - type: heading
    content: ord
  - type: text
    content: ', and the priests shall throw salt on them, and they shall offer them up as a burnt offering to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'For seven days you shall prepare daily a goat for a sin offering; also a young bull and a ram from the flock, without blemish, shall be prepared. '
  '26':
  - type: text
    content: 'For seven days they shall make atonement for the altar and purify it; so the priests shall consecrate it [to receive offerings]. [Ex 29:37] '
  '27':
  - type: text
    content: When they have completed these days, on the eighth day and from then onward, the priests shall offer your burnt offerings on the altar, and your peace offerings; and I will accept you,’ says the Lord G
  - type: heading
    content: od
  - type: text
    content: .” [Rom 12:1; 1 Pet 2:5]
  '3':
  - type: text
    content: 'And it was like the appearance of the vision which I saw, like the vision I saw when He came to destroy the city. And the visions were like the vision I saw beside the River Chebar [near Babylon]; and I fell face downward. [Ezek 1:4; 3:23; 10:15, 22] '
