  '1':
  - type: heading
    content: Vision of the Glory of God Filling the Temple
  - type: text
    content: 'Then he (the angel) led me to the gate, the gate that faces toward the east. '
  '10':
  - type: text
    content: '“As for you, son of man, '
  - type: note
    content: Lit inform about.
  - type: text
    content: 'describe the temple to the house of Israel, so that they will be ashamed of their sins; and let them measure its plan [in detail]. '
  '11':
  - type: text
    content: 'If they are ashamed of all that they have done, make known to them the design of the temple (house), its layout, its exits, its entrances, all its designs, all its statutes, and all its laws. And write it down in their sight, so that they may keep its whole design and all its statutes and do them. '
  '12':
  - type: text
    content: 'This is the law of the temple: Its entire '
  - type: note
    content: Lit boundary.
  - type: text
    content: 'area all around on the top of the mountain '
  - type: note
    content: Moriah is identified in Gen 22:2 as the region where Abraham prepared to sacrifice Isaac, and is identified in 2 Chr 3:1 as the site of the temple built by Solomon.
  - type: text
    content: '(Mount Moriah) '
  - type: text
    content: shall be
  - type: text
    content: ' most holy. Behold, this is the law of the temple.'
  - type: heading
    content: The Altar of Sacrifice
  '13':
  - type: text
    content: '“And these are the measurements of the altar [of burnt offering] in cubits (the cubit being a [long] cubit [the length of a forearm] and a hand width): the '
  - type: note
    content: 'Lit lap. The metric and architectural terminology corresponds to human physiology. While this is natural enough for an ancient culture, it also serves at least three purposes: 1) it ensures that the scale of the structures will be practical for human occupation; 2) it communicates across cultures; and 3) terms like “shoulder” and “lap” indicate something of the shape and/or purpose of the item, such as the task of load-bearing.'
  - type: text
    content: 'base '
  - type: text
    content: shall be
  - type: text
    content: ' a cubit [long] and a cubit wide, with its border on its edge all around it of a span [in width]. And this '
  - type: text
    content: shall be the height of
  - type: text
    content: ' the '
  - type: note
    content: Lit back.
  - type: text
    content: 'base of the altar. '
  '14':
  - type: text
    content: 'From the base on the ground to the lower ledge '
  - type: text
