document_id: EZK.43,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vision of the Glory of God Filling the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then he (the angel) led me to the gate, the gate that faces toward the east. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“As for you, son of man, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: inform about
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'describe the temple to the house of Israel, so that they will be ashamed of their sins; and let them measure its plan [in detail]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'If they are ashamed of all that they have done, make known to them the design of the temple (house), its layout, its exits, its entrances, all its designs, all its statutes, and all its laws. And write it down in their sight, so that they may keep its whole design and all its statutes and do them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'This is the law of the temple: Its entire '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: boundary
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'area all around on the top of the mountain '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moriah is identified in Gen 22:2 as the region where Abraham prepared to sacrifice Isaac, and is identified in 2 Chr 3:1 as the site of the temple built by Solomon.
      marker-yv: yv-n
    - type: text
      text: '(Mount Moriah) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' most holy. Behold, this is the law of the temple.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Altar of Sacrifice
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“And these are the measurements of the altar [of burnt offering] in cubits (the cubit being a [long] cubit [the length of a forearm] and a hand width): the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: lap
        - type: text
          text: '. The metric and architectural terminology corresponds to human physiology. While this is natural enough for an ancient culture, it also serves at least three purposes: 1) it ensures that the scale of the structures will be practical for human occupation; 2) it communicates across cultures; and 3) terms like “shoulder” and “lap” indicate something of the shape and/or purpose of the item, such as the task of load-bearing.'
      marker-yv: yv-n
    - type: text
      text: 'base '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a cubit [long] and a cubit wide, with its border on its edge all around it of a span [in width]. And this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be the height of
    - type: text
      text: ' the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: back
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'base of the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'From the base on the ground to the lower ledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' two cubits and the width one cubit; and from the smaller ledge to the larger ledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' four cubits and the width one cubit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The altar hearth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' four cubits high, and from the altar hearth shall extend upwards four horns [one from each corner, each one cubit high]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now the altar hearth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' twelve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long by twelve wide, square in its four sides. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The ledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' fourteen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubits
    - type: text
      text: ' long by fourteen wide on its four sides, and the border around it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' half a cubit; and its base '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' a cubit all around, and its steps shall face the east.” [Ex 20:26]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Offerings
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And He [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] said to me, “Son of man, thus says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘These are the statutes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' regulations for [the use of] the altar on the day that it is built, to offer burnt offerings on it and to sprinkle blood on it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: You shall give to the priests, the Levites who are from the descendants of Zadok, who are close to Me to minister to Me,’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘a young bull for a sin offering [as a memorial to Christ’s sacrifice]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And behold, the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the God of Israel was coming from the way of the east; and His voice was like the sound of many waters, and the earth shone with His glory. [Rev 1:15; 14:2] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And you shall take some of its blood and put it on the four horns [of the altar of burnt offering] and on the four corners of the ledge and on the border all around; thus you shall cleanse it (from sin) and make atonement for it. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: You shall also take the bull for the sin offering, and it shall be burned in the appointed place of the temple, outside the sanctuary. [Heb 13:11]
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘On the second day you shall offer a male goat without blemish for a sin offering, and they shall cleanse the altar as they cleansed it with the bull. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When you have finished cleansing it, you shall offer a young bull without blemish and a ram from the flock without blemish. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You shall present them before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the priests shall throw salt on them, and they shall offer them up as a burnt offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For seven days you shall prepare daily a goat for a sin offering; also a young bull and a ram from the flock, without blemish, shall be prepared. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For seven days they shall make atonement for the altar and purify it; so the priests shall consecrate it [to receive offerings]. [Ex 29:37] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: When they have completed these days, on the eighth day and from then onward, the priests shall offer your burnt offerings on the altar, and your peace offerings; and I will accept you,’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .” [Rom 12:1; 1 Pet 2:5]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And it was like the appearance of the vision which I saw, like the vision I saw when He came to destroy the city. And the visions were like the vision I saw beside the River Chebar [near Babylon]; and I fell face downward. [Ezek 1:4; 3:23; 10:15, 22] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' entered the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: house
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'temple by way of the gate facing toward the east. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the Spirit lifted me up and brought me into the inner courtyard; and behold, the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' filled the temple.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I heard One speaking to me from the temple, while a man was standing beside me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And He [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] said to me, “Son of man, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this is
    - type: text
      text: ' the place of My throne and the place of the soles of My feet, where I will dwell in the midst of the sons (descendants) of Israel forever. And the house of Israel will not again defile My holy name, neither they nor their kings, by their [idolatrous] prostitution and by the corpses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' monuments of their kings in their graves, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'by setting their threshold by My threshold and their doorpost beside My doorpost, with [only] the wall between Me and them. They have defiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desecrated My holy name by the vile atrocities which they have committed. So I have consumed them in My anger. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now let them put far away from Me their [idolatrous] prostitution and the corpses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' monuments of their kings, and I will dwell in their midst forever.'
