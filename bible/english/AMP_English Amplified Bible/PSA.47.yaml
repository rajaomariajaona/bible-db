    text: 'Sing praises in a skillful psalm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with understanding.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God reigns over the nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: God sits on His holy throne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The princes of the people have gathered together as the people of the God of Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the shields of the earth belong to God;
- type: usfm
  marker: q1
  children:
  - type: text
