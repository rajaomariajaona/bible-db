    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' excellence of Jacob whom He loves. [1 Pet 1:4, 5] '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
