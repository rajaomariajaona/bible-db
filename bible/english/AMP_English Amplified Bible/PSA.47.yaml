  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' Most High is to be feared [and worshiped with awe-inspired reverence and obedience];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is a great King over all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
