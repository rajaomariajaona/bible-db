document_id: PSA.47,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 47
  - type: heading
    content: God the King of the Earth.
  - type: text
    content: To the Chief Musician. A Psalm of the sons of Korah.
  - type: text
    content: O clap your hands, all you people;
  - type: text
    content: 'Shout to God with the voice of triumph '
  - type: text
    content: and
  - type: text
    content: ' songs of joy.'
  '2':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' Most High is to be feared [and worshiped with awe-inspired reverence and obedience];'
  - type: text
    content: He is a great King over all the earth.
  '3':
  - type: text
    content: He subdues peoples under us
  - type: text
    content: And nations under our feet.
  '4':
  - type: text
    content: He chooses our inheritance for us,
  - type: text
    content: 'The glory '
  - type: text
    content: and
  - type: text
    content: ' excellence of Jacob whom He loves. [1 Pet 1:4, 5] '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: ¶God has ascended amid shouting,
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' with the sound of a trumpet.'
  '6':
  - type: text
    content: Sing praises to God, sing praises;
  - type: text
    content: Sing praises to our King, sing praises.
  '7':
  - type: text
    content: For God is the King of all the earth;
  - type: text
    content: 'Sing praises in a skillful psalm '
  - type: text
    content: and
  - type: text
    content: ' with understanding.'
  '8':
  - type: text
    content: God reigns over the nations;
  - type: text
    content: God sits on His holy throne.
  '9':
  - type: text
    content: The princes of the people have gathered together as the people of the God of Abraham,
  - type: text
    content: For the shields of the earth belong to God;
  - type: text
    content: He is highly exalted.
