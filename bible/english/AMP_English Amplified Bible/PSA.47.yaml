document_id: PSA.47,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 47
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God the King of the Earth.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O clap your hands, all you people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout to God with the voice of triumph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' songs of joy.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' Most High is to be feared [and worshiped with awe-inspired reverence and obedience];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is a great King over all the earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He subdues peoples under us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And nations under our feet.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He chooses our inheritance for us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' excellence of Jacob whom He loves. [1 Pet 1:4, 5] '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶God has ascended amid shouting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with the sound of a trumpet.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Sing praises to God, sing praises;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing praises to our King, sing praises.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For God is the King of all the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing praises in a skillful psalm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with understanding.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: God reigns over the nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God sits on His holy throne.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The princes of the people have gathered together as the people of the God of Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the shields of the earth belong to God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is highly exalted.
