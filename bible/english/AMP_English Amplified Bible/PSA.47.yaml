    - type: text
      text: '5'
  - type: text
    text: ¶God has ascended amid shouting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with the sound of a trumpet.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sing praises to God, sing praises;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing praises to our King, sing praises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For God is the King of all the earth;
- type: usfm
  marker: q1
  children:
