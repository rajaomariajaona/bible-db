verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 82
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Unjust Judgments Rebuked.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God stands in the divine assembly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He judges among the gods (divine beings).
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will you judge unjustly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And show partiality to the wicked? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vindicate the weak and fatherless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do justice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' maintain the rights of the afflicted and destitute.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue the weak and needy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue them from the hand of the wicked.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The rulers do not know nor do they understand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They walk on in the darkness [of complacent satisfaction];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the foundations of the earth [the fundamental principles of the administration of justice] are shaken.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I said, “You are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '82:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most of the ancient rabbis understood the idea of “gods” referring to judges, but some applied vv 6, 7 to the Israelites at Sinai and maintained that they would have become immortal as a result of accepting the Law, if only they had not committed the sin of the golden calf.
      marker-yv: yv-n
    - type: text
      text: gods;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, all of you are sons of the Most High. [Gen 6:1-4; John 10:34-36; Rom 13:1, 2]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Nevertheless you will die like men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fall like any one of the princes.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, O God, judge the earth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For to You belong all the nations. [Matt 28:18-20; Rev 11:15]
