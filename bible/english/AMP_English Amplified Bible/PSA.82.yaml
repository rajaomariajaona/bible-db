document_id: PSA.82,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 82
  - type: heading
    content: Unjust Judgments Rebuked.
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: God stands in the divine assembly;
  - type: text
    content: He judges among the gods (divine beings).
  '2':
  - type: text
    content: How long will you judge unjustly
  - type: text
    content: 'And show partiality to the wicked? '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: Vindicate the weak and fatherless;
  - type: text
    content: 'Do justice '
  - type: text
    content: and
  - type: text
    content: ' maintain the rights of the afflicted and destitute.'
  '4':
  - type: text
    content: Rescue the weak and needy;
  - type: text
    content: Rescue them from the hand of the wicked.
  '5':
  - type: text
    content: ¶The rulers do not know nor do they understand;
  - type: text
    content: They walk on in the darkness [of complacent satisfaction];
  - type: text
    content: All the foundations of the earth [the fundamental principles of the administration of justice] are shaken.
  '6':
  - type: text
    content: 'I said, “You are '
  - type: note
    content: Most of the ancient rabbis understood the idea of “gods” referring to judges, but some applied vv 6, 7 to the Israelites at Sinai and maintained that they would have become immortal as a result of accepting the Law, if only they had not committed the sin of the golden calf.
  - type: text
    content: gods;
  - type: text
    content: Indeed, all of you are sons of the Most High. [Gen 6:1-4; John 10:34-36; Rom 13:1, 2]
  '7':
  - type: text
    content: “Nevertheless you will die like men
  - type: text
    content: And fall like any one of the princes.”
  '8':
  - type: text
    content: Arise, O God, judge the earth!
  - type: text
    content: For to You belong all the nations. [Matt 28:18-20; Rev 11:15]
