document_id: PSA.95,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 95
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Praise to the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ', and Warning against Unbelief.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O come, let us sing joyfully to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us shout joyfully to the rock of our salvation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For forty years I was grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgusted with that generation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I said, ‘They are a people who err in their heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they do not acknowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' regard My ways.’'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore I swore [an oath] in My wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘They absolutely shall not enter My rest [the land of promise].’ ” [Heb 4:3-11]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us come before His presence with a song of thanksgiving;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us shout joyfully to Him with songs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is a great God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a great King above all gods,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In whose hand are the depths of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The peaks of the mountains are His also.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sea is His, for He made it [by His command];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His hands formed the dry land. [Gen 1:9]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O come, let us worship and bow down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us kneel before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our Maker [in reverent praise and prayer].'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He is our God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And we are the people of His pasture and the sheep of His hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Today, if you will hear His voice, [Heb 3:7-11]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not harden your hearts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become spiritually dull as at Meribah [the place of strife],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as at Massah [the place of testing] in the wilderness, [Ex 17:1-7; Num 20:1-13; Deut 6:16]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When your fathers tested Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tried Me, even though they had seen My work [of miracles].
