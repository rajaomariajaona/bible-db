document_id: EST.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther Learns of Haman’s Plot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Mordecai learned of everything that had been done, he tore his clothes [in mourning], and put on sackcloth and ashes, and went out into the center of the city and cried out loudly and bitterly. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He went [only] as far as the king’s gate, because no one was to enter the king’s gate dressed in sackcloth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In each and every province that the decree and law of the king reached, there was great mourning among the Jews, with fasting, weeping and wailing; and many lay on sackcloth and ashes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When Esther’s maids and her eunuchs came and told her [what had happened], the queen was seized by great fear. She sent garments to clothe Mordecai so that he would remove his sackcloth, but he did not accept them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Esther summoned Hathach, one of the king’s eunuchs, whom the king had appointed to attend her, and ordered him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to go
  - type: text
    text: ' to Mordecai to find out what this issue was and why it had come about. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Hathach went out to Mordecai in the [open] square of the city, which was in front of the king’s gate. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mordecai told him everything that had happened to him, and the exact '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This money may have been what was expected to be received from the plunder of the Jews’ property.
    marker-yv: yv-n
  - type: text
    text: 'amount of money that Haman had promised to pay to the king’s treasuries for the destruction of the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mordecai also gave him a copy of the text of the decree which had been issued in Susa for the Jews destruction, so that he might show Esther and explain it to her, and order her to go in to the king to seek his favor and plead with him for [the lives of] her people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hathach came back and told Esther what Mordecai had said. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Esther spoke to Hathach and ordered him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to reply
  - type: text
    text: ' to Mordecai, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“All the king’s servants and the people of the king’s provinces know that for any man or woman who comes to the king to the inner court without being summoned, he has but one law, that he is to be put to death, unless the king holds out to him the golden scepter so that he may live. And as for me, I have not been summoned to come to the king for these [last] thirty days.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So they told Mordecai what Esther had said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Mordecai told them to reply to Esther, “Do not imagine that you in the king’s palace can escape any more than all the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For if you remain silent at this time, liberation and rescue will arise for the Jews from another place, and you and your father’s house will perish [since you did not help when you had the chance]. And who knows whether you have attained royalty for such a time as this [and for this very purpose]?”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther Plans to Intercede
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Esther told them to reply to Mordecai, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Go, gather all the Jews that are present in Susa, and observe a fast for me; do not eat or drink for three days, night or day. I and my maids also will fast in the same way. Then I will go in to [see] the king [without being summoned], which is against the law; and if I perish, I perish.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So Mordecai went away and did exactly as Esther had commanded him.
