  '5':
  - type: text
    content: 'He established it for a testimony in '
  - type: note
    content: Curiously, in this one verse Joseph’s name has an extra letter, an “h.” In an example of rabbinic lore, the ancient rabbis said that because Joseph sanctified the divine name in private (by resisting Potiphar’s wife) he merited having one letter of the divine name (Yahweh) added to his. Another rabbinic explanation is that when Pharaoh was about to elevate Joseph to power, the astrologers demanded that Joseph speak the 70 languages of the world. The angel Gabriel came to teach him, but Joseph was unable until Gabriel added to his name the extra letter from the divine name.
