    - type: text
      text: '5'
  - type: text
    text: 'But if our unrighteousness demonstrates the righteousness of God, what shall we say? God is not wrong to inflict His wrath [on us], is He? (I am speaking in purely human terms.) '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Certainly not! For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: otherwise,
  - type: text
    text: ' how will God judge the world? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But [as you might say] if through my lie God’s truth was magnified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abounded to His glory, why am I still being judged as a sinner? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And why not say, (as some slanderously report and claim that we teach) “Let us do evil so that good may come of it”? Their condemnation [by God] is just.
- type: usfm
  marker: p
  children:
  - type: usfm
