  '19':
  - type: text
    content: 'Now we know that whatever the Law [of Moses] says, it speaks to those who are under the Law, so that [the excuses of] every mouth may be silenced [from protesting] and that all the world may be held accountable to God [and subject to His judgment]. '
  '2':
  - type: text
    content: 'Great in every respect. To begin with, the Jews were entrusted with the oracles of God [His very '
  - type: note
    content: I.e. the Old Testament promises.
  - type: text
    content: 'words]. [Ps 147:19] '
  '20':
  - type: text
    content: 'For no '
  - type: note
    content: Lit flesh.
  - type: text
    content: person will be justified [freed of guilt and declared righteous] in His sight by [trying to do] the works of the Law. For through the Law we become conscious of sin [and the recognition of sin directs us toward repentance, but provides no remedy for sin].
  - type: heading
    content: Justification by Faith
  '21':
  - type: text
    content: 'But now the righteousness of God has been clearly revealed [independently and completely] apart from the Law, though it is [actually] confirmed by the Law and the [words and writings of the] Prophets. '
  '22':
  - type: text
    content: 'This righteousness of God comes through faith in Jesus Christ for all those [Jew or Gentile] who believe [and trust in Him and acknowledge Him as God’s Son]. There is no distinction, [1 Cor 12:13; Gal 3:28] '
  '23':
  - type: text
    content: 'since all have sinned and '
  - type: text
    content: continually
  - type: text
    content: ' fall short of the glory of God, '
  '24':
  - type: text
    content: 'and are being justified [declared free of the guilt of sin, made acceptable to God, and granted eternal life] as a gift by His [precious, undeserved] '
  - type: note
    content: I.e. His favor and mercy, extended to man who can do nothing to be worthy of it. It is God’s amazing gift.
  - type: text
    content: 'grace, through the redemption [the payment for our sin] which is [provided] in Christ Jesus, '
  '25':
  - type: text
    content: 'whom God displayed publicly [before the eyes of the world] as a [life-giving] '
  - type: note
    content: By laying his hands on the head of the sacrifice the person offering the sacrifice identified himself with it and through its death it became an atonement or covering for his sin. Because the unblemished sacrifice “covered” his sin it placed the person offering the sacrifice in a right relationship with God. Later under the new covenant the perfection and sacrifice of Christ would cover (atone for) the imperfection and sin of those who identified with Him and accepted Him as Savior.
  - type: text
    content: 'sacrifice of atonement '
  - type: text
    content: and
  - type: text
    content: ' reconciliation (propitiation) by His blood [to be received] through faith. '
  - type: text
    content: This was
  - type: text
    content: ' to demonstrate His righteousness [which demands punishment for sin], because in His forbearance [His deliberate restraint] He passed over the sins previously committed [before Jesus’ crucifixion]. '
  '26':
  - type: text
    content: It was
  - type: text
    content: ' to demonstrate His righteousness at the present time, so that He would be just and the One who justifies those who have faith in Jesus [and rely confidently on Him as Savior].'
  '27':
  - type: text
    content: 'Then what becomes of [our] boasting? It is excluded [entirely ruled out, banished]. On what principle? On [the principle of good] works? No, but on the principle of faith. '
  '28':
  - type: text
    content: 'For we maintain that an individual is justified by faith distinctly apart from works of the Law [the observance of which has nothing to do with justification, that is, being declared free of the guilt of sin and made acceptable to God]. '
  '29':
  - type: text
    content: 'Or is God '
  - type: text
    content: the God
  - type: text
    content: ' of Jews only? Is He not also '
  - type: text
    content: the God
  - type: text
    content: ' of Gentiles [who were not given the Law]? Yes, of Gentiles also, '
  '3':
  - type: text
    content: 'What then? If some did not believe '
  - type: text
    content: or
  - type: text
