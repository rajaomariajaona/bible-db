  - type: text
    content: and
  - type: text
    content: ' His word, will it? '
  '30':
  - type: text
    content: since indeed it is one [and the same] God who will justify the circumcised by faith [which began with Abraham] and the uncircumcised through [their newly acquired] faith.
  '31':
  - type: text
    content: 'Do we then nullify the Law by this faith [making the Law of no effect, overthrowing it]? Certainly not! On the contrary, we confirm '
  - type: text
    content: and
  - type: text
    content: ' establish '
  - type: text
    content: and
  - type: text
    content: ' uphold the Law [since it convicts us all of sin, pointing to the need for salvation].'
