  '5':
  - type: text
    content: 'But if our unrighteousness demonstrates the righteousness of God, what shall we say? God is not wrong to inflict His wrath [on us], is He? (I am speaking in purely human terms.) '
  '6':
  - type: text
    content: 'Certainly not! For '
  - type: text
    content: otherwise,
  - type: text
    content: ' how will God judge the world? '
  '7':
  - type: text
    content: 'But [as you might say] if through my lie God’s truth was magnified '
  - type: text
    content: and
  - type: text
    content: ' abounded to His glory, why am I still being judged as a sinner? '
  '8':
  - type: text
    content: And why not say, (as some slanderously report and claim that we teach) “Let us do evil so that good may come of it”? Their condemnation [by God] is just.
  '9':
  - type: text
    content: 'Well then, are we [Jews] better off than they? Not at all; for we have already charged that both Jews and Greeks (Gentiles) are under the control of sin '
  - type: text
