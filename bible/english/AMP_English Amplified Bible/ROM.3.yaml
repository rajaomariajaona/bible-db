  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now we know that whatever the Law [of Moses] says, it speaks to those who are under the Law, so that [the excuses of] every mouth may be silenced [from protesting] and that all the world may be held accountable to God [and subject to His judgment]. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For no '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: flesh
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: person will be justified [freed of guilt and declared righteous] in His sight by [trying to do] the works of the Law. For through the Law we become conscious of sin [and the recognition of sin directs us toward repentance, but provides no remedy for sin].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Justification by Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But now the righteousness of God has been clearly revealed [independently and completely] apart from the Law, though it is [actually] confirmed by the Law and the [words and writings of the] Prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This righteousness of God comes through faith in Jesus Christ for all those [Jew or Gentile] who believe [and trust in Him and acknowledge Him as God’s Son]. There is no distinction, [1 Cor 12:13; Gal 3:28] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'since all have sinned and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' fall short of the glory of God, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and are being justified [declared free of the guilt of sin, made acceptable to God, and granted eternal life] as a gift by His [precious, undeserved] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. His favor and mercy, extended to man who can do nothing to be worthy of it. It is God’s amazing gift.
    marker-yv: yv-n
  - type: text
    text: 'grace, through the redemption [the payment for our sin] which is [provided] in Christ Jesus, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'whom God displayed publicly [before the eyes of the world] as a [life-giving] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By laying his hands on the head of the sacrifice the person offering the sacrifice identified himself with it and through its death it became an atonement or covering for his sin. Because the unblemished sacrifice “covered” his sin it placed the person offering the sacrifice in a right relationship with God. Later under the new covenant the perfection and sacrifice of Christ would cover (atone for) the imperfection and sin of those who identified with Him and accepted Him as Savior.
    marker-yv: yv-n
  - type: text
    text: 'sacrifice of atonement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reconciliation (propitiation) by His blood [to be received] through faith. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: This was
  - type: text
    text: ' to demonstrate His righteousness [which demands punishment for sin], because in His forbearance [His deliberate restraint] He passed over the sins previously committed [before Jesus’ crucifixion]. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: it
    children:
    - type: text
      text: It was
  - type: text
    text: ' to demonstrate His righteousness at the present time, so that He would be just and the One who justifies those who have faith in Jesus [and rely confidently on Him as Savior].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then what becomes of [our] boasting? It is excluded [entirely ruled out, banished]. On what principle? On [the principle of good] works? No, but on the principle of faith. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For we maintain that an individual is justified by faith distinctly apart from works of the Law [the observance of which has nothing to do with justification, that is, being declared free of the guilt of sin and made acceptable to God]. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Or is God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the God
  - type: text
    text: ' of Jews only? Is He not also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the God
  - type: text
    text: ' of Gentiles [who were not given the Law]? Yes, of Gentiles also, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: since indeed it is one [and the same] God who will justify the circumcised by faith [which began with Abraham] and the uncircumcised through [their newly acquired] faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Do we then nullify the Law by this faith [making the Law of no effect, overthrowing it]? Certainly not! On the contrary, we confirm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uphold the Law [since it convicts us all of sin, pointing to the need for salvation].'
