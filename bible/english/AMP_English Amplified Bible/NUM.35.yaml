document_id: NUM.35,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cities for the Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses in the plains of Moab by the Jordan [across from] Jericho, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Tell the Israelites, ‘When you cross the Jordan [River] into the land of Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall select for yourselves cities to be cities of refuge, so that the one who kills any person unintentionally may escape there. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cities shall be to you as a refuge from the avenger, so that the one who has caused the death of another will not be killed until he has had a [fair] trial before the congregation. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cities which you are to provide shall be your six cities of refuge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall provide three cities on this [east] side of the Jordan [River], and three [more] cities in the land of Canaan; they are to be the cities of refuge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These six cities shall be a refuge for the Israelites and for the stranger and the resident alien among them; so that anyone who kills a person unintentionally may escape there.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘But if he struck '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: him,
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'his victim down [intentionally] with an iron object so that he died, he is a murderer; the murderer shall certainly be put to death. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he struck his victim down [intentionally] with a stone in hand, which may cause a person to die, and he died, he is a murderer; the murderer shall certainly be put to death. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or if he struck his victim down [intentionally] with a wooden object in hand, which may cause a person to die, and he died, he is a murderer; the murderer shall certainly be put to death. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The blood avenger shall himself put the murderer to death; he shall put him to death when he meets him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Command the Israelites to give to the Levites cities to live in from the inheritance of their possession; and you shall give to the Levites pasture lands around the cities. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he pushed his victim out of hatred or threw something at him with malicious intent, and he died, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: or if, in enmity, he struck the victim down with his hand, and he died, the one that struck the victim shall certainly be put to death; he is a murderer. The blood avenger shall put the murderer to death when he meets him.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘But if he pushed the victim suddenly, not in enmity, or threw anything at him without malicious intent, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or without seeing him hit him [accidentally] with a stone object that could kill him, and he died, and [the offender] was not his enemy nor intending to harm him, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then the congregation shall judge between the offender and the blood avenger according to these ordinances. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The congregation shall rescue the offender from the hand of the blood avenger and return him to his city of refuge, [the place] to which he had escaped; and he shall live there until the death of the high priest who was anointed with the sacred oil. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if at any time the one guilty of manslaughter comes outside the border of his city of refuge to which he fled, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the blood avenger finds him outside the border of his city of refuge and kills the offender, the blood avenger will not be guilty of murder, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because the offender should have remained in his city of refuge until the death of the high priest. But after the high priest’s death the offender shall return to the land of his possession.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘These things shall be a statute for you throughout your generations wherever you may be.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The cities shall be theirs to live in; and their pasture lands shall be for their cattle and for their herds and for all their livestock.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If anyone kills a person [intentionally], the murderer shall be put to death on the testimony of [two or more] witnesses; but no one shall be put to death on the testimony of [only] one witness. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, you shall not accept a ransom [in exchange] for the life of a murderer guilty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and sentenced
    - type: text
      text: ' to death; but he shall certainly be put to death. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall not accept a ransom for him who has escaped to his city of refuge, so that he may return to live in his [own] land before the death of the high priest. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So you shall not pollute '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defile the land in which you live; for [the shedding of innocent] blood pollutes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiles the land. No atonement (expiation) can be made for the land for the [innocent] blood shed in it, except by the blood (execution) of him who shed it. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall not defile the land in which you live, in the midst of which I live, for I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', live among the people of Israel.’ ”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The pasture lands around the cities which you shall give to the Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall reach
    - type: text
      text: ' from the wall of the city and outward a thousand cubits (1,500 ft.) around. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall also measure outside the city on the east, south, west, and north sides two thousand cubits (3,000 ft.), with the city in the center. This shall belong to the Levites as pasture lands for the cities.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cities of Refuge
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '[Among] the cities which you give to the Levites shall be the six cities of refuge, which you shall provide for the one who commits manslaughter to flee to; and in addition to them you shall give forty-two cities [to the Levites]. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So you shall give to the Levites forty-eight cities in all, together with their pasture lands. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As for the cities which you shall give from the possession of the Israelites, from the larger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribes
    - type: text
      text: ' you shall take many and from the smaller '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribes
    - type: text
      text: ' few; each '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribe
    - type: text
      text: ' shall give [at least some] of its cities to the Levites in proportion to [the size of] its inheritance which it possesses.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
