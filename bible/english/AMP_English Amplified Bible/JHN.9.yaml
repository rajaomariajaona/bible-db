segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Healing the Man Born Blind
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'While He was passing by, He noticed a man [who had been] blind from birth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'His disciples asked Him, “Rabbi (Teacher), who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was a commonly held belief that suffering was punishment for a specific, personal sin.
    marker-yv: yv-n
  - type: text
    text: 'sinned, this man or his parents, that he would be born blind?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Neither this man nor his parents sinned, but it was so that the works of God might be displayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' illustrated in him.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: We must work the works of Him who sent Me while it is day; night is coming when no one can work.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As long as I am in the world, I am the Light of the world
  - type: text
    text: ' [giving guidance through My word and works].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When He had said this, He spat on the ground and made mud with His saliva, and He spread the mud [like an ointment] on the man’s eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And He said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Go, wash in the pool of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient town of Siloam is now an Arab village named Silwan. It is east of Jerusalem and south of the Old City. The pool of Siloam was fed by the Gihon Spring in the Kidron Valley through a channel (Hezekiah’s tunnel) that carried water into Jerusalem.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Siloam”
  - type: text
    text: ' (which is translated, Sent). So he went away and washed, and came back seeing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the neighbors, and those who used to know him as a beggar, said, “Is not this the man who used to sit and beg?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Some said, “It is he.” Still others said, “No, but he looks like him.” But he kept saying, “I am the man.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So they said to him, “How were your eyes opened?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He replied, “The Man called Jesus made mud and smeared it on my eyes and told me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Go to Siloam and wash.’
  - type: text
    text: ' So I went and washed, and I received my sight!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They asked him, “Where is He?” He said, “I do not know.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Controversy over the Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then they brought the man who was formerly blind to the Pharisees. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now it was on a Sabbath day that Jesus made the mud and opened the man’s eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the Pharisees asked him again how he received his sight. And he said to them, “He smeared mud on my eyes, and I washed, and now I see.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then some of the Pharisees said, “This Man [Jesus] is not from God, because He does not keep the Sabbath.” But others said, “How can a man who is a sinner (a non-observant Jew) do such signs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miracles?” So there was a difference of opinion among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Accordingly they said to the blind man again, “What do you say about Him, since He opened your eyes?” And he said, “[It must be that] He is a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Prophets were able to foretell the future and perform other miracles under the power and direction of God.
    marker-yv: yv-n
  - type: text
    text: prophet!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'However, the Jews did not believe that he had been blind and had received his sight until they called the man’s parents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They asked them, “Is this your son, who you say was born blind? Then how does he now see?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'His parents answered, “We know that this is our son, and that he was born blind; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but as to how he now sees, we do not know; or who has opened his eyes, we do not know. Ask him [and stop asking us]; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Anyone 13 years and one day old was considered of age.
    marker-yv: yv-n
  - type: text
    text: 'he is of age, he will speak for himself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give his own account of it.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'His parents said this because they were afraid of [the leaders of] the Jews; for the Jews had already agreed that if anyone acknowledged Jesus to be the Christ, he would be put out of the synagogue (excommunicated). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Because of this his parents said, “He is of age; ask him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So a second time they called the man who had been [born] blind, and said to him, “Give God glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise [for your sight]! We know this Man [Jesus] is a sinner [separated from God].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then he answered, “I do not know whether He is a sinner [separated from God]; but one thing I do know, that though I was blind, now I see.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So they said to him, “What did He [actually] do to you? How did He open your eyes?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He answered, “I already told you and you did not listen. Why do you want to hear it again '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' again? Do you want to become His disciples, too?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And [at that remark] they stormed at him and jeered, “You are His disciple, but we are disciples of Moses! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'We know [for certain] that God has spoken to Moses, but as for this Man, we do not know where He is from.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The man replied, “Well, this is astonishing! You do not know where He comes from, and yet He opened my eyes! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'We know [according to your tradition] that God does not hear sinners; but if anyone fears God and does His will, He hears him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Since the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is no OT record of any blind person being healed.
    marker-yv: yv-n
  - type: text
    text: 'beginning of time it has never been heard that anyone opened the eyes of a person born blind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'If this Man were not from God, He would not be able to do anything [like this because God would not hear His prayer].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'They answered him, “You were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 2.
    marker-yv: yv-n
  - type: text
    text: born entirely in sins [from head to foot], and you [presume to] teach us?” Then they threw him out [of the synagogue].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Affirms His Deity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesus heard that they had '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. excommunicated him.
    marker-yv: yv-n
  - type: text
    text: 'put him out [of the synagogue], and finding him, He asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you believe in the Son of Man?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He answered, “Who is He, Sir? Tell me so that I may believe in Him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have both seen Him, and
  - type: text
    text: ' [in fact] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He is the one who is talking with you.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And he said, “Lord, I believe [in You and Your word]!” And he worshiped Him [with reverence and awe]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I came into this world for judgment
  - type: text
    text: ' [to separate those who believe in Me from those who reject Me—to declare judgment on those who choose to be separated from God], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that the sightless would see, and those who see would become blind.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Some Pharisees who were with Him heard these things and said to Him, “Are we also blind?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you were blind
  - type: text
    text: ' [to spiritual things], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you would have no sin
  - type: text
    text: ' [and would not be blamed for your unbelief]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but since you claim to have
  - type: text
    text: ' [spiritual] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sight,
  - type: text
    text: ' [you have no excuse so] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'your sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt remain.'
  - type: text
    text: ' [Prov 26:12]'
