verses:
  '1':
  - type: heading
    content: Healing the Man Born Blind
  - type: text
    content: 'While He was passing by, He noticed a man [who had been] blind from birth. '
  '10':
  - type: text
    content: 'So they said to him, “How were your eyes opened?” '
  '11':
  - type: text
    content: 'He replied, “The Man called Jesus made mud and smeared it on my eyes and told me, '
  - type: text
    content: ‘Go to Siloam and wash.’
  - type: text
    content: ' So I went and washed, and I received my sight!” '
  '12':
  - type: text
    content: They asked him, “Where is He?” He said, “I do not know.”
  - type: heading
    content: Controversy over the Man
  '13':
  - type: text
    content: 'Then they brought the man who was formerly blind to the Pharisees. '
  '14':
  - type: text
    content: 'Now it was on a Sabbath day that Jesus made the mud and opened the man’s eyes. '
  '15':
  - type: text
    content: 'So the Pharisees asked him again how he received his sight. And he said to them, “He smeared mud on my eyes, and I washed, and now I see.” '
  '16':
  - type: text
    content: 'Then some of the Pharisees said, “This Man [Jesus] is not from God, because He does not keep the Sabbath.” But others said, “How can a man who is a sinner (a non-observant Jew) do such signs '
  - type: text
    content: and
  - type: text
    content: ' miracles?” So there was a difference of opinion among them. '
  '17':
  - type: text
    content: 'Accordingly they said to the blind man again, “What do you say about Him, since He opened your eyes?” And he said, “[It must be that] He is a '
  - type: note
    content: Prophets were able to foretell the future and perform other miracles under the power and direction of God.
  - type: text
    content: prophet!”
  '18':
  - type: text
    content: 'However, the Jews did not believe that he had been blind and had received his sight until they called the man’s parents. '
  '19':
  - type: text
    content: 'They asked them, “Is this your son, who you say was born blind? Then how does he now see?” '
  '2':
  - type: text
    content: 'His disciples asked Him, “Rabbi (Teacher), who '
  - type: note
    content: It was a commonly held belief that suffering was punishment for a specific, personal sin.
  - type: text
    content: 'sinned, this man or his parents, that he would be born blind?” '
  '20':
  - type: text
    content: 'His parents answered, “We know that this is our son, and that he was born blind; '
  '21':
  - type: text
    content: 'but as to how he now sees, we do not know; or who has opened his eyes, we do not know. Ask him [and stop asking us]; '
  - type: note
    content: Anyone 13 years and one day old was considered of age.
  - type: text
    content: 'he is of age, he will speak for himself '
  - type: text
    content: and
  - type: text
    content: ' give his own account of it.” '
  '22':
  - type: text
    content: 'His parents said this because they were afraid of [the leaders of] the Jews; for the Jews had already agreed that if anyone acknowledged Jesus to be the Christ, he would be put out of the synagogue (excommunicated). '
  '23':
  - type: text
    content: Because of this his parents said, “He is of age; ask him.”
  '24':
  - type: text
    content: 'So a second time they called the man who had been [born] blind, and said to him, “Give God glory '
  - type: text
    content: and
  - type: text
    content: ' praise [for your sight]! We know this Man [Jesus] is a sinner [separated from God].” '
  '25':
  - type: text
    content: 'Then he answered, “I do not know whether He is a sinner [separated from God]; but one thing I do know, that though I was blind, now I see.” '
  '26':
  - type: text
    content: 'So they said to him, “What did He [actually] do to you? How did He open your eyes?” '
  '27':
  - type: text
    content: 'He answered, “I already told you and you did not listen. Why do you want to hear it again '
  - type: text
    content: and
  - type: text
    content: ' again? Do you want to become His disciples, too?” '
  '28':
  - type: text
    content: 'And [at that remark] they stormed at him and jeered, “You are His disciple, but we are disciples of Moses! '
  '29':
  - type: text
    content: 'We know [for certain] that God has spoken to Moses, but as for this Man, we do not know where He is from.” '
  '3':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Neither this man nor his parents sinned, but it was so that the works of God might be displayed '
  - type: text
    content: and
  - type: text
    content: ' illustrated in him.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'The man replied, “Well, this is astonishing! You do not know where He comes from, and yet He opened my eyes! '
  '31':
  - type: text
    content: 'We know [according to your tradition] that God does not hear sinners; but if anyone fears God and does His will, He hears him. '
  '32':
  - type: text
    content: 'Since the '
  - type: note
    content: There is no OT record of any blind person being healed.
  - type: text
    content: 'beginning of time it has never been heard that anyone opened the eyes of a person born blind. '
  '33':
  - type: text
    content: 'If this Man were not from God, He would not be able to do anything [like this because God would not hear His prayer].” '
  '34':
  - type: text
    content: 'They answered him, “You were '
  - type: note
    content: See note v 2.
  - type: text
    content: born entirely in sins [from head to foot], and you [presume to] teach us?” Then they threw him out [of the synagogue].
  - type: heading
    content: Jesus Affirms His Deity
  '35':
  - type: text
    content: 'Jesus heard that they had '
  - type: note
    content: I.e. excommunicated him.
  - type: text
    content: 'put him out [of the synagogue], and finding him, He asked, '
  - type: text
    content: “Do you believe in the Son of Man?”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'He answered, “Who is He, Sir? Tell me so that I may believe in Him.” '
  '37':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “You have both seen Him, and
  - type: text
    content: ' [in fact] '
  - type: text
    content: He is the one who is talking with you.”
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And he said, “Lord, I believe [in You and Your word]!” And he worshiped Him [with reverence and awe]. '
  '39':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “I came into this world for judgment
  - type: text
    content: ' [to separate those who believe in Me from those who reject Me—to declare judgment on those who choose to be separated from God], '
  - type: text
    content: so that the sightless would see, and those who see would become blind.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: We must work the works of Him who sent Me while it is day; night is coming when no one can work.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Some Pharisees who were with Him heard these things and said to Him, “Are we also blind?” '
  '41':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “If you were blind
  - type: text
    content: ' [to spiritual things], '
  - type: text
    content: you would have no sin
  - type: text
    content: ' [and would not be blamed for your unbelief]; '
  - type: text
    content: but since you claim to have
  - type: text
    content: ' [spiritual] '
  - type: text
    content: sight,
  - type: text
    content: ' [you have no excuse so] '
  - type: text
    content: 'your sin '
  - type: text
    content: and
  - type: text
    content: ' guilt remain.'
  - type: text
    content: ' [Prov 26:12]'
  '5':
  - type: text
    content: As long as I am in the world, I am the Light of the world
  - type: text
    content: ' [giving guidance through My word and works].” '
  '6':
  - type: text
    content: 'When He had said this, He spat on the ground and made mud with His saliva, and He spread the mud [like an ointment] on the man’s eyes. '
  '7':
  - type: text
    content: 'And He said to him, '
  - type: text
    content: '“Go, wash in the pool of '
  - type: note
    content: The ancient town of Siloam is now an Arab village named Silwan. It is east of Jerusalem and south of the Old City. The pool of Siloam was fed by the Gihon Spring in the Kidron Valley through a channel (Hezekiah’s tunnel) that carried water into Jerusalem.
  - type: text
    content: Siloam”
  - type: text
    content: ' (which is translated, Sent). So he went away and washed, and came back seeing. '
  '8':
  - type: text
    content: 'So the neighbors, and those who used to know him as a beggar, said, “Is not this the man who used to sit and beg?” '
  '9':
  - type: text
    content: 'Some said, “It is he.” Still others said, “No, but he looks like him.” But he kept saying, “I am the man.” '
