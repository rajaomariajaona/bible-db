document_id: MAT.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Concerning Divorce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Jesus had finished saying these things, He left Galilee and went into the part of Judea that is beyond the Jordan; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and large crowds followed Him, and He healed them there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Pharisees came to Jesus, testing Him and asking, “Is it lawful for a man to divorce his wife for just any reason?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Have you never read that He who created them from the beginning '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: made them male and female
    - type: text
      text: ','
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and said, ‘F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or this reason a man shall leave his father and mother and shall be joined inseparably to his wife
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and the two shall become one flesh
    - type: text
      text: ’?
  - type: text
    text: ' [Gen 1:27; 2:24; Mark 10:7] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they are no longer two, but one flesh. Therefore, what God has joined together, let no one separate.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The Pharisees said to Him, “Why then did Moses command us to '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: give her a certificate of divorce and send her away
  - type: text
    text: '?” [Deut 24:1-4] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Because your hearts were hard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stubborn Moses permitted you to divorce your wives; but from the beginning it has not been this way.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I say to you, whoever divorces his wife, except for sexual immorality, and marries another woman commits adultery
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some early mss add the phrase “…and he who marries a divorced woman commits adultery.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The disciples said to Jesus, “If the relationship of a man with his wife is like this, it is better not to marry.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Not all men can accept this statement, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' those to whom'
  - type: text
    text: ' [the capacity to receive] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: it has been given.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For there are eunuchs who have been born that way from their mother’s womb
  - type: text
    text: ' [making them incapable of consummating a marriage]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and there are eunuchs who have been made eunuchs by men
  - type: text
    text: ' [for royal service]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and there are eunuchs who have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may refer to a personal vow of celibacy.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: made themselves so for the sake of the kingdom of heaven. He who is able to accept this, let him accept it.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Blesses Little Children
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then children were brought to Jesus so that He might place His hands on them [for a blessing] and pray; but the disciples reprimanded them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Leave the children alone, and do not forbid them from coming to Me; for the kingdom of heaven belongs to such as these.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: After placing His hands on them [for a blessing], He went on from there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rich Young Ruler
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And someone came to Him and said, “Teacher, what [essentially] good thing shall I do to obtain eternal life [that is, eternal salvation in the Messiah’s kingdom]?” [Lev 18:5; Mark 10:17-30; Luke 18:18-30] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you asking Me about what is
  - type: text
    text: ' [essentially] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'good? There is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' One who is'
  - type: text
    text: ' [essentially] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'good; but if you wish to enter into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eternal
    - type: text
      text: ' life, keep the commandments.”'
  - type: text
    text: ' [Luke 10:28] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He said to Jesus, “Which commandments?” And Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall not commit murder
    - type: text
      text: ; Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall not commit adultery
    - type: text
      text: ; Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall not steal
    - type: text
      text: ; Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall not give false testimony
    - type: text
      text: ;
  - type: text
    text: ' [Ex 20:12-16; Deut 5:16-20] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: onor your father and mother
    - type: text
      text: '; and '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: love your neighbor as yourself
    - type: text
      text: ”
  - type: text
    text: ' [that is, unselfishly seek the best or higher good for others]. [Lev 19:18; Matt 22:39] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The young man said to Him, “I have kept all these things [from my youth]; what do I still lack?” [Luke 18:21] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you wish to be perfect
  - type: text
    text: ' [that is, have the spiritual maturity that accompanies godly character with no moral or ethical deficiencies], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: go and sell what you have and give
  - type: text
    text: ' [the money] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to the poor, and you will have treasure in heaven; and come, follow Me
  - type: text
    text: ' [becoming My disciple, believing and trusting in Me and walking the same path of life that I walk].” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when the young man heard this, he left grieving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distressed, for he owned much property '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had many possessions [which he treasured more than his relationship with God].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus said to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, it is difficult for a rich man'
  - type: text
    text: ' [who clings to possessions and status as security] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the kingdom of heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Again I tell you, it is easier for a camel to go through the eye of a needle, than for a rich man
  - type: text
    text: ' [who places his faith in wealth and status] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter the kingdom of God.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When the disciples heard this, they were completely '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These declarations of Jesus directly contradicted the teaching of the Pharisees that God bestows wealth on those He loves and chooses. If the rich were not automatically granted entrance to God’s kingdom, how could the common man ever be welcomed?
    marker-yv: yv-n
  - type: text
    text: 'astonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bewildered, saying, “Then who can be saved [from the wrath of God]?” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But Jesus looked at them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “With people
  - type: text
    text: ' [as far as it depends on them] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: it is impossible, but with God all things are possible.”
  - type: text
    text: ' [Gen 18:14; Job 42:2]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Disciples’ Reward
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Peter answered Him, saying, “Look, we have given up everything and followed You [becoming Your disciples and accepting You as Teacher and Lord]; what then will there be for us?” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, in the renewal'
  - type: text
    text: ' [that is, the Messianic restoration and regeneration of all things] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: when the Son of Man sits on His glorious throne, you
  - type: text
    text: ' [who have followed Me, becoming My disciples] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will also sit on twelve thrones, judging the twelve tribes of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And everyone who has left houses or brothers or sisters or father or mother '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One early mss adds '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or wife
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: or children or farms for My name’s sake will receive many times as much, and will inherit eternal life.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are
    - type: text
      text: ' first'
  - type: text
    text: ' [in this world] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be last
  - type: text
    text: ' [in the world to come]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the last, first.
