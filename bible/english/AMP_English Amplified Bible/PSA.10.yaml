document_id: PSA.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 10
  - type: heading
    content: A Prayer for the Overthrow of the Wicked.
  - type: text
    content: Why do You stand far away, O L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: Why do You hide [Yourself, veiling Your eyes] in times of trouble?
  '10':
  - type: text
    content: He crushes [his prey] and crouches;
  - type: text
    content: 'And the unfortunate fall by his mighty '
  - type: text
    content: claws
  - type: text
    content: .
  '11':
  - type: text
    content: He says to himself, “God has [quite] forgotten;
  - type: text
    content: He has hidden His face; He will never see my deed.”
  '12':
  - type: text
    content: ¶Arise, O L
  - type: heading
    content: ord
  - type: text
    content: '! O God, lift up Your hand [in judgment];'
  - type: text
    content: Do not forget the suffering.
  '13':
  - type: text
    content: 'Why has the wicked spurned '
  - type: text
    content: and
  - type: text
    content: ' shown disrespect to God?'
  - type: text
    content: He has said to himself, “You will not require me to account.”
  '14':
  - type: text
    content: You have seen it, for You have noted mischief and vexation (irritation) to take it into Your hand.
  - type: text
    content: 'The unfortunate commits '
  - type: text
    content: himself
  - type: text
    content: ' to You;'
  - type: text
    content: You are the helper of the fatherless.
  '15':
  - type: text
    content: Break the arm of the wicked and the evildoer,
  - type: text
    content: Seek out his wickedness until You find no more.
  '16':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' is King forever and ever;'
  - type: text
    content: The nations will perish from His land.
  '17':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', You have heard the desire of the humble '
  - type: text
    content: and
  - type: text
    content: ' oppressed;'
  - type: text
    content: You will strengthen their heart, You will incline Your ear to hear,
  '18':
  - type: text
    content: 'To vindicate '
  - type: text
    content: and
  - type: text
    content: ' obtain justice for the fatherless and the oppressed,'
  - type: text
    content: So that man who is of the earth will no longer terrify them.
  '2':
  - type: text
    content: 'In pride '
  - type: text
    content: and
  - type: text
    content: ' arrogance the wicked hotly pursue '
  - type: text
    content: and
  - type: text
    content: ' persecute the afflicted;'
  - type: text
    content: Let them be caught in the plots which they have devised.
  '3':
  - type: text
    content: '¶For the wicked boasts '
  - type: text
    content: and
  - type: text
    content: ' sings the praises of his heart’s desire,'
  - type: text
    content: And the greedy man curses and spurns [and even despises] the L
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: 'The wicked, in the haughtiness of his face, will not seek '
  - type: text
    content: nor
  - type: text
    content: ' inquire for '
  - type: text
    content: Him;
  - type: text
    content: All his thoughts are, “There is no God [so there is no accountability or punishment].”
  '5':
  - type: text
    content: ¶His ways prosper at all times;
  - type: text
    content: Your judgments [L
  - type: heading
    content: ord
  - type: text
    content: '] are on high, out of his sight [so he never thinks about them];'
  - type: text
    content: As for all his enemies, he sneers at them.
  '6':
  - type: text
    content: He says to himself, “I will not be moved;
  - type: text
    content: For throughout all generations I will not be in adversity [for nothing bad will happen to me].”
  '7':
  - type: text
    content: His mouth is full of curses and deceit (fraud) and oppression;
  - type: text
    content: Under his tongue is mischief and wickedness [injustice and sin].
  '8':
  - type: text
    content: He lurks in ambush in the villages;
  - type: text
    content: In hiding places he kills the innocent;
  - type: text
    content: He lies in wait for the unfortunate [the unhappy, the poor, the helpless].
  '9':
  - type: text
    content: He lurks in a hiding place like a lion in his lair;
  - type: text
    content: He lies in wait to catch the afflicted;
  - type: text
    content: He catches the afflicted when he draws him into his net.
