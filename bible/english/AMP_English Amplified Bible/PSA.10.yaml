document_id: PSA.10
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Prayer for the Overthrow of the Wicked.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Why do You stand far away, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do You hide [Yourself, veiling Your eyes] in times of trouble?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In pride '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogance the wicked hotly pursue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecute the afflicted;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be caught in the plots which they have devised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '¶For the wicked boasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sings the praises of his heart’s desire,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the greedy man curses and spurns [and even despises] the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The wicked, in the haughtiness of his face, will not seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' inquire for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All his thoughts are, “There is no God [so there is no accountability or punishment].”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶His ways prosper at all times;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your judgments [L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] are on high, out of his sight [so he never thinks about them];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for all his enemies, he sneers at them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He says to himself, “I will not be moved;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For throughout all generations I will not be in adversity [for nothing bad will happen to me].”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: His mouth is full of curses and deceit (fraud) and oppression;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Under his tongue is mischief and wickedness [injustice and sin].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He lurks in ambush in the villages;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In hiding places he kills the innocent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He lies in wait for the unfortunate [the unhappy, the poor, the helpless].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He lurks in a hiding place like a lion in his lair;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He lies in wait to catch the afflicted;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He catches the afflicted when he draws him into his net.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He crushes [his prey] and crouches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the unfortunate fall by his mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: claws
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He says to himself, “God has [quite] forgotten;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has hidden His face; He will never see my deed.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Arise, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! O God, lift up Your hand [in judgment];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not forget the suffering.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Why has the wicked spurned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shown disrespect to God?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has said to himself, “You will not require me to account.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You have seen it, for You have noted mischief and vexation (irritation) to take it into Your hand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The unfortunate commits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: himself
  - type: text
    text: ' to You;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the helper of the fatherless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Break the arm of the wicked and the evildoer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seek out his wickedness until You find no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is King forever and ever;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nations will perish from His land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You have heard the desire of the humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' oppressed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will strengthen their heart, You will incline Your ear to hear,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'To vindicate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obtain justice for the fatherless and the oppressed,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that man who is of the earth will no longer terrify them.
