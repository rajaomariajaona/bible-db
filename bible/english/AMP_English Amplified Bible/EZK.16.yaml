    children:
    - type: text
      text: '1'
  - type: text
    text: Again the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, make Jerusalem understand [the heinous and vile nature of] her repulsive (idolatrous) acts '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' to Jerusalem (all of Israel), “Your [spiritual] origin and your birth are from the land of the Canaanite; your [spiritual] father was an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jerusalem became an Israelite city only after David captured it (2 Sam 5:6-10).
    marker-yv: yv-n
  - type: text
    text: 'Amorite and your [spiritual] mother a Hittite. [Ezek 16:45; John 8:44] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And as for your birth, on the day you were born your navel cord was not cut, nor were you washed with water for cleansing, nor were you rubbed with salt or even wrapped in cloths. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: No eye looked with pity on you to do any of these things for you, to have compassion on you; but you were thrown out in the open field, for you were loathed on the day that you were born.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“When I passed by you and saw you squirming in your [newborn] blood, I said to you while you were there in your blood, ‘Live!’ Yes, I said to you while you were there in your blood, ‘Live!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I made you (Israel) multiply like plants [which grow] in the field, and you grew up and became tall and you reached the age for [wearing] fine jewelry; your breasts were formed and your hair had grown, yet you were naked and bare.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Then I passed by you [again] and looked on you; behold, you were maturing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' at the time for love, and I spread My skirt over you and covered your nakedness. Yes, I swore [an oath] to you and entered into a covenant with you,” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “and you became Mine.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Then I washed you with water; yes, I [thoroughly] washed away from you the [clinging] blood and anointed you with oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I also clothed you with embroidered cloth and put sandals of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew word is not certain; some scholars have suggested that the material is instead a fine leather of unspecified origin.
    marker-yv: yv-n
  - type: text
    text: 'porpoise skin on your feet; and I wrapped you with fine linen and covered you with silk. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I adorned you with ornaments and I put bracelets on your wrists and a necklace around your neck. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I also put a ring in your nostril and earrings in your ears and a beautiful crown on your head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thus you were adorned with gold and silver, and your dress was [made] of fine linen and silk and embroidered cloth. You ate fine flour and honey and oil; so you were extremely beautiful and you advanced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prospered into royalty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then your fame went out among the nations on account of your beauty, for it was perfect because of My majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' splendor which I bestowed on you,” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“But you trusted in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relied on your beauty and prostituted yourself [in idolatry and its debauched rituals] because of your fame, and you poured out your immoralities on every [willing] passer-by and your beauty was his [as you worshiped the idols of the Gentile nations]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'You took some of your clothes and made for yourself [decorated] high places '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shrines of various colors and prostituted yourself on them—things which should never have come about and taken place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You also took your beautiful jewels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' beautiful vessels made of My gold and My silver, which I had given you, and made for yourself images of men so that you could prostitute yourself with them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and you took your embroidered clothing and covered them, and offered My oil and My incense before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Also My bread which I gave you, [made from the] fine flour and oil and honey with which I fed you, you even offered it before idols [no better than cow dung] as a sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soothing aroma; so it happened,” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Moreover, you took your sons and your daughters whom you had borne to Me, and you destroyed them as sacrifices [to your man-made gods]. Were your gross immoralities so small a matter? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You slaughtered My children and offered them up to [worthless] idols, forcing them to pass through the [hideousness of the] fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And in all your repulsive acts and prostitutions (idolatrous immoralities) you did not [pause to] remember the days of your youth, when you were naked and bare, squirming in your [newborn] blood.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Then it came about after all your wickedness (‘Woe, woe to you!’ says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'that you built yourself an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Specifically, a rim or molding at the bottom of an altar where prostitution in honor of the pagan deity was practiced.
    marker-yv: yv-n
  - type: text
    text: 'altar for prostitution and made yourself a high place [for ritual prostitution] in every square [of Jerusalem]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'At the beginning of every street you built your high place and made your beauty repulsive; and you offered your body to every passer-by and multiplied your obscene immorality. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'You also prostituted yourself with the Egyptians, your lustful neighbors [by embracing their pagan rituals], and you multiplied your obscene immorality to provoke Me to anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Behold now [listen very carefully], I have stretched out My hand against you, reduced your portion, and handed you over to the desire of those who hate you, the daughters of the Philistines, who are ashamed of your infamous behavior. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You prostituted yourself with the Assyrians because you were not satisfied; you prostituted yourself with them and still were not satisfied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Moreover, you increased your obscene immorality with the land of tradesmen, Chaldea (Babylonia), and yet even with this you were not satisfied.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“How weakened by longing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lust is your heart (mind),” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “while you do all these things, the actions of a bold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brazen prostitute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When you built your shrine altar for prostitution at the beginning of every street and made your high place in every public square, you were not like a prostitute because you refused payment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'You adulterous wife, who welcomes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' receives strangers instead of her husband! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Men give gifts to all prostitutes, but you give your gifts to all your lovers, bribing the pagan nations to come to you [as allies] from every direction for your obscene immoralities. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And you are different from other [unfaithful] women in your promiscuity, in that no one follows you to lure you into prostitution, and because you give money and no money is given you; in this way you are different.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Therefore, O prostitute [Israel], hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Because your lewdness was poured out and your nakedness uncovered through your obscene immoralities with your lovers (pagan allies), and with all your [repulsive] idols, and because of the blood of your sons that you gave to them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'therefore, listen, I will gather all your lovers (pagan allies) with whom you took pleasure, and all those whom you loved with all those whom you hated; I will even gather them against you from every direction and will expose your nakedness to them that they may see all your nakedness [making you, Israel, an object of loathing and of mockery, a spectacle among the nations]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: And I [the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '] will judge you like women who commit adultery or shed blood are judged; and I will bring on you the blood of wrath and jealousy. [Num 5:18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'I will also hand you over to your lovers, and they will tear down your shrines, demolish your high places, strip you of your clothing, take away your jewels, and they will leave you naked and bare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'They will also incite a crowd against you and they will stone you and slaughter you with their swords. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'They will burn down your houses with fire and execute judgments on you in the sight of many women (Gentile nations). Then I will make you cease your prostitution, and you will no longer hire your lovers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So I will calm My wrath toward you and My jealousy [resulting from being denied what is rightfully and uniquely mine] will turn away from you; I will be pacified and no longer angry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Because you have not remembered the days of your youth but have enraged Me with all these things, therefore, I in turn will bring your conduct down on your own head,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “so that you will not commit this lewdness on top of all your other repulsive acts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '“Behold, everyone who uses proverbs will use this proverb against you: ‘Like mother, like daughter.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'You are the daughter of your mother, who loathed her husband and her children. You are the sister of your sisters, who loathed their husbands and their children. Your [spiritual] mother was a Hittite and your [spiritual] father an Amorite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Now your older sister is Samaria, she with her daughters (outlying cities) who live north of you; and your younger sister is Sodom, she with her daughters who live south of you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Yet you have not merely walked in their ways or behaved in accordance with their pagan practices; but, as if that were too little, you [soon] acted more corruptly in all your ways than they. [Matt 11:20-24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: As I live,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Sodom, your sister and her daughters have not done as you and your daughters have done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Behold, this was the sin of your sister Sodom: she and her daughters (outlying cities) had arrogance, abundant food, and careless ease, but she did not help the poor and needy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'They were haughty and committed repulsive acts before Me; therefore I removed them when I saw it. [Gen 13:13; 18:20; 19:5] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Furthermore, Samaria did not commit half of your sins, but you have greatly increased your repulsive acts more than they. So you have made your [wicked] sisters [Samaria and Sodom] appear righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justified by [comparison to] all the disgusting things which you have done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Also bear your disgrace [as punishment], having made judgment favorable for your sisters, for [you virtually absolved them] because of your sins in which you behaved more repulsively than they; they are more in the right than you. Yes, be ashamed and bear your disgrace, for you made your [pagan] sisters seem righteous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: “Nevertheless, I will restore them [again] from their captivity, the captivity of Sodom and her daughters (outlying cities), the captivity of Samaria and her daughters, and along with them [I will restore you from] your own captivity [in the day of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '], [Is 1:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'so that you [Judah] will bear your humiliation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disgrace, and be [thoroughly] ashamed for all [the wickedness] that you have done to console '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comfort them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Your sisters, Sodom and her daughters and Samaria and her daughters will return to their former state; and you and your daughters will return to your former state. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'For [the name of] your sister Sodom was not mentioned by you [except as a byword] in the day of your pride [when David ruled], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'before your [own] wickedness was uncovered. Now you have become an object of reproach '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a byword for the daughters of Aram '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' of Edom and all who are around her, and for the daughters of the Philistines—those surrounding you who despise you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: You have borne [the penalty of] your lewdness and your repulsive acts,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Yes, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “I will also deal with you as you have done, you who have despised the oath by breaking the covenant.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Covenant Remembered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: '“Nevertheless, I will remember [with compassion] My covenant with you in the days of your youth, and I will establish an everlasting covenant with you. [Ps 106:45] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Then you will remember your ways and be ashamed when you receive your sisters, both your older and your younger; I will give them to you as daughters, but not because of your covenant [with Me]. [John 10:16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: And I will establish My covenant with you, and you will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', [Hos 2:19, 20] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: so that you may remember [in detail] and be ashamed and never open your mouth again because of your humiliation, when I have forgiven you for all that you have done,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
