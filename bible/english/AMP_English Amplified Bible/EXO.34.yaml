document_id: EXO.34,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Two Tablets Replaced
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Cut two tablets of stone like the first, and I will write on these tablets the words that were on the first tablets which you smashed [when you learned of Israel’s idolatry]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then God said, “Behold, I am going to make a covenant. Before all your people I will do wondrous works (miracles) such as have not been created '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' produced in all the earth nor among any of the nations; and all the people among whom you live shall see the working of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for it is a fearful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awesome thing that I am going to do with you.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Be sure to observe what I am commanding you this day: behold, I am going to drive out the Amorite before you, and the Canaanite, the Hittite, the Perizzite, the Hivite, and the Jebusite. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Watch yourself so that you do not make a covenant (solemn agreement, treaty) with the inhabitants of the land into which you are going, or it will become a [dangerous] trap among you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But you shall tear down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroy their [pagan] altars, smash in pieces their [sacred] pillars (obelisks, images) and cut down their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Symbols of the mother-goddess Asherah, usually a tree or pole dedicated to her and placed near her many shrines.
      marker-yv: yv-n
    - type: text
      text: 'Asherim '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: —for you shall not worship any other god; for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', whose name is Jealous, is a jealous (impassioned) God [demanding what is rightfully and uniquely His]— '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'otherwise you might make a covenant with the inhabitants of the land and they would play the prostitute with their gods and sacrifice to their gods, and someone might invite you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: and you would eat
        - type: text
          text: . It was commonplace in ancient cultures to invite friends to a sacrifice to a pagan deity. Aside from its religious implications, at the end of the ceremony the sacrifice became a meal for all present and served as a social occasion.
      marker-yv: yv-n
    - type: text
      text: 'to eat his sacrifice (meal), '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and you might take some of his daughters for your sons, and his daughters would play the prostitute with their gods and cause your sons also to play the prostitute (commit apostasy) with their gods [that is, abandon the true God for man-made idols]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You shall make for yourselves no molten gods.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “You shall observe the Feast of Unleavened Bread (Passover). For seven days you shall eat unleavened bread, as I have commanded you, at the appointed time in the month of Abib; for in the month of Abib you came out of Egypt.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“All the firstborn males among your livestock belong to Me, whether cattle or sheep. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So be ready by morning, and come up in the morning to Mount Sinai, and present yourself there to Me on the top of the mountain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You shall redeem the firstborn of a donkey with a lamb; but if you do not redeem it, then you shall break its neck. You shall redeem all the firstborn of your sons. None of you are to appear before Me empty-handed.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“You shall work for six days, but on the seventh day you shall rest; [even] in plowing time and in harvest you shall rest [on the Sabbath]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'You shall observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' celebrate the Feast of Weeks (Harvest, First Fruits, or Pentecost), the first fruits of the wheat harvest, and the Feast of Ingathering (Booths or Tabernacles) at the year’s end. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Three times a year all your males shall appear before the Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH (Yahweh)
        - type: text
          text: ', usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', the God of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For I will drive out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dispossess nations before you and enlarge your borders; nor shall any man covet (actively seek for himself) your land when you go up to appear before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God three times a year.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “You shall not offer the blood of My sacrifice with leavened bread, nor shall the sacrifice of the Feast of the Passover (Unleavened Bread) be left over until morning.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “You shall bring the very first of the first fruits of your ground to the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Y
    - type: text
      text: 'ou shall not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may have been a pagan practice, perhaps a fertility rite.
      marker-yv: yv-n
    - type: text
      text: boil a young goat in his mother’s milk [as some pagans do].”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Write these words, for in accordance with these words I have made a covenant with you and with Israel.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Moses was there with the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forty days and forty nights; he ate no bread and drank no water. And He wrote on the tablets the words of the covenant, the Ten Commandments.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moses’ Face Shines
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'When Moses came down from Mount Sinai with the two tablets of the Testimony in his hand, he did not know that the skin of his face was shining [with a unique radiance] because he had been speaking with God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'No man is to come up with you, nor let any man be seen anywhere on the mountain; nor let flocks or herds feed in front of that mountain.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'When Aaron and all the Israelites saw Moses, behold, the skin of his face shone, and they were afraid to approach him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But Moses called to them, and Aaron and all the leaders of the congregation returned to him; and he spoke to them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Afterward all the Israelites approached him, and he commanded them to do everything that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said to him on Mount Sinai. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When Moses had finished speaking with them, he put a veil over his face. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: But whenever Moses went in before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to speak with Him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The apostle Paul refers to this incident when he says that we all may, with unveiled faces, behold the glory of the Lord, and be transformed (2 Cor 3:13-18). That ability to personally approach God was once given only to the great leader of Israel, but it is now within reach of each individual believer. The gospel has no boundary keeping people at a distance from God; all believers may reverently approach Him.
      marker-yv: yv-n
    - type: text
      text: 'he would take off the veil until he came out. When he came out and he told the Israelites what he had been commanded [by God], '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: the Israelites would see the face of Moses, how his skin shone [with a unique radiance]. So Moses put the veil on his face again until he went in to speak with God.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Moses cut two tablets of stone like the first ones, and he got up early in the morning and went up on Mount Sinai, as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded him, and took '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some expositors suggest that the two tablets of stone were small enough to be easily carried. The pictures of Moses carrying large tombstone-size tablets are the result of an artist’s rendering, and are not supported in the Bible.
      marker-yv: yv-n
    - type: text
      text: 'the two tablets of stone in his hand. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' descended in the cloud and stood there with Moses as he proclaimed the Name of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' passed by in front of him, and proclaimed, “The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God, compassionate and gracious, slow to anger, and abounding in lovingkindness and truth (faithfulness); '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'keeping mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness for thousands, forgiving iniquity and transgression and sin; but He will by no means leave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the guilty
    - type: text
      text: ' unpunished, visiting (avenging) the iniquity (sin, guilt) of the fathers upon the children and the grandchildren to the third and fourth generations [that is, calling the children to account for the sins of their fathers].” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moses bowed to the earth immediately and worshiped [the Lord]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And he said, “If now I have found favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness in Your sight, O Lord, let the Lord, please, go in our midst, though it is a stiff-necked (stubborn, rebellious) people, and pardon our iniquity and our sin, and take us as Your possession.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Covenant Renewed
    marker-yv: yv-h
