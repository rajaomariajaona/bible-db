  - type: note
    content: The prose introduction ends at v 1 and the poetic heart of the book begins with v 2. One of the features of Hebrew poetry is the prevalence of pairs of statements in which the second statement either is parallel in thought to the first or contrasts with it. There is no rhyming or metrical correspondence.
