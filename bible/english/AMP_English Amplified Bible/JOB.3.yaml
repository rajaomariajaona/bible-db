document_id: JOB.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job’s Lament
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this, Job opened his mouth and cursed the day of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: birth
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Because it did not shut the doors of my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mother’s
    - type: text
      text: ' womb,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor hide trouble from my eyes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶“Why did I not die at birth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come forth from the womb and expire?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Why did the knees receive me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And why the breasts, that I would nurse?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “For now I would have lain down and been quiet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would have slept then, I would have been at rest [in death],
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: With kings and counselors of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who built up [now desolate] ruins for themselves;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Or with princes who had gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who filled their houses with silver.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Or like a miscarriage which is hidden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put away, I would not exist,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like infants who never saw light.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “There [in death] the wicked cease from raging,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there the weary are at rest.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “There the prisoners rest together;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not hear the taskmaster’s voice.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “The small and the great are there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the servant is free from his master. [Jer 20:14-18]
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The prose introduction ends at v 1 and the poetic heart of the book begins with v 2. One of the features of Hebrew poetry is the prevalence of pairs of statements in which the second statement either is parallel in thought to the first or contrasts with it. There is no rhyming or metrical correspondence.
      marker-yv: yv-n
    - type: text
      text: And Job said,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ¶“Why is the light given to him who is in misery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And life to the bitter in soul,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Who wait for death, but it does not come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And dig (search) for death more [diligently] than for hidden treasures,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Who rejoice exceedingly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rejoice when they find the grave?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why is the light of day given
    - type: text
      text: ' to a man whose way is hidden,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whom God has hedged in?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “For my groaning comes at the sight of my food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my cries [of despair] are poured out like water.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “For the thing which I greatly fear comes upon me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that of which I am afraid has come upon me.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “I am not at ease, nor am I quiet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I am not at rest, and yet trouble still comes [upon me].”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Let the day on which I was born perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the night which announced: ‘There is a man-child conceived.’'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “May that day be darkness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let God above not care about it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor light shine on it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Let darkness and gloom claim it for their own;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let a cloud settle upon it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all that blackens the day terrify it (the day that I was born).
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “As for that night, let darkness seize it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let it not rejoice among the days of the year;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let it not be counted in the number of the months.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Behold, let that night be barren [and empty];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let no joyful voice enter it.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Let those curse it '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some ancient sorcerers claimed the ability to curse a day by calling up a terrifying, legendary creature, such as Leviathan, to devour the sun.
      marker-yv: yv-n
    - type: text
      text: who curse the day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who are skilled in rousing up Leviathan.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Let the stars of its early dawn be dark;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the morning
    - type: text
      text: ' wait in vain for the light,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let it not see the eyelids of morning (the day’s dawning),
