document_id: 1SA.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Spares Saul’s Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Saul returned from following the Philistines, he was told, “Behold, David is in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an oasis overlooking the Dead (Salt) Sea.
      marker-yv: yv-n
    - type: text
      text: 'Wilderness of Engedi.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Behold, your eyes have seen today how the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had given you into my hand in the cave. Some told me to kill you, but I spared you; I said, ‘I will not reach out my hand against my lord, for he is the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anointed.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look, my father! Indeed, see the hem of your robe in my hand! Since I cut off the hem of your robe and did not kill you, know and understand [without question] that there is no evil or treason in my hands. I have not sinned against you, though you are lying in wait to take my life. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' judge between me and you; and may the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' avenge me on you; but my hand shall not be against you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the proverb of the ancients says, ‘Out of the wicked comes wickedness’; but my hand shall not be against you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After whom has the king of Israel come out? Whom do you pursue [with three thousand men]? A dead dog, a single flea? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' be the judge and render judgment between me and you; and may He see and plead my cause and vindicate me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by saving me
    - type: text
      text: ' from your hand.” [Ps 142]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David had finished saying these words to Saul, Saul said, “Is this your voice, my son David?” Then Saul raised his voice and wept. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to David, “You are more righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' upright [in God’s eyes] than I; for you have done good to me, but I have done evil to you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have declared today the good that you have done to me, for when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' put me into your hand, you did not kill me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if a man finds his enemy, will he let him go away '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: on a good road
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: unharmed? So may the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' reward you with good in return for what you have done for me this day. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul took three thousand chosen men out of all Israel and went to search for David and his men in front of the Rocks of the Wild Goats. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, behold, I know that you will certainly be king and that the kingdom of Israel will be established in your hand. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So now swear to me by the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that you will not cut off my descendants after me and that you will not destroy my name from my father’s household (extended family).” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David gave Saul his oath; and Saul went home, but David and his men went up to the mountain stronghold.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the way he came to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a wall of stones that had been unearthed from the field and stacked on each other as an enclosure for the flocks. The wall probably was built from the mouth of the cave and back.
      marker-yv: yv-n
    - type: text
      text: 'sheepfolds where there was a cave; and Saul went in to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cover his feet,
        - type: text
          text: ' a euphemism for the squatting position that one would take, with the outer robe touching the ground and concealing one’s feet as a result.'
      marker-yv: yv-n
    - type: text
      text: 'relieve himself. Now David and his men were sitting in the cave’s innermost recesses. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David’s men said to him, “Behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this is
    - type: text
      text: ' the day of which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to you, ‘Behold, I will hand over your enemy to you, and you shall do to him as seems good to you.’ ” Then David arose [in the darkness] and stealthily cut off the hem (edge) of Saul’s robe. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward, David’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: heart struck him
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'conscience bothered him because he had cut off the hem of Saul’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: robe.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said to his men, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forbid that I should do this thing to my master, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anointed, to put out my hand against him, since he is the anointed of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David strongly rebuked his men with these words and did not let them rise up against Saul. Saul got up, left the cave and went on his way.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David also got up afterward and went out of the cave and called after Saul, saying, “My lord the king!” And when Saul looked behind him, David bowed with his face to the ground and lay himself face down. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Saul, “Why do you listen to the words of men who say, ‘David seeks to harm you?’ '
