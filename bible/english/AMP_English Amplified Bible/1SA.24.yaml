document_id: 1SA.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David Spares Saul’s Life
  - type: text
    content: 'When Saul returned from following the Philistines, he was told, “Behold, David is in the '
  - type: note
    content: I.e. an oasis overlooking the Dead (Salt) Sea.
  - type: text
    content: 'Wilderness of Engedi.” '
  '10':
  - type: text
    content: Behold, your eyes have seen today how the L
  - type: heading
    content: ord
  - type: text
    content: ' had given you into my hand in the cave. Some told me to kill you, but I spared you; I said, ‘I will not reach out my hand against my lord, for he is the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anointed.’ '
  '11':
  - type: text
    content: 'Look, my father! Indeed, see the hem of your robe in my hand! Since I cut off the hem of your robe and did not kill you, know and understand [without question] that there is no evil or treason in my hands. I have not sinned against you, though you are lying in wait to take my life. '
  '12':
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' judge between me and you; and may the L'
  - type: heading
    content: ord
  - type: text
    content: ' avenge me on you; but my hand shall not be against you. '
  '13':
  - type: text
    content: 'As the proverb of the ancients says, ‘Out of the wicked comes wickedness’; but my hand shall not be against you. '
  '14':
  - type: text
    content: 'After whom has the king of Israel come out? Whom do you pursue [with three thousand men]? A dead dog, a single flea? '
  '15':
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' be the judge and render judgment between me and you; and may He see and plead my cause and vindicate me '
  - type: text
    content: by saving me
  - type: text
    content: ' from your hand.” [Ps 142]'
  '16':
  - type: text
    content: 'When David had finished saying these words to Saul, Saul said, “Is this your voice, my son David?” Then Saul raised his voice and wept. '
  '17':
  - type: text
    content: 'He said to David, “You are more righteous '
  - type: text
    content: and
  - type: text
    content: ' upright [in God’s eyes] than I; for you have done good to me, but I have done evil to you. '
  '18':
  - type: text
    content: You have declared today the good that you have done to me, for when the L
  - type: heading
    content: ord
  - type: text
    content: ' put me into your hand, you did not kill me. '
  '19':
  - type: text
    content: 'For if a man finds his enemy, will he let him go away '
  - type: note
    content: Lit on a good road.
  - type: text
    content: unharmed? So may the L
  - type: heading
    content: ord
  - type: text
    content: ' reward you with good in return for what you have done for me this day. '
  '2':
  - type: text
    content: 'Then Saul took three thousand chosen men out of all Israel and went to search for David and his men in front of the Rocks of the Wild Goats. '
  '20':
  - type: text
    content: 'Now, behold, I know that you will certainly be king and that the kingdom of Israel will be established in your hand. '
  '21':
  - type: text
    content: So now swear to me by the L
  - type: heading
    content: ord
  - type: text
    content: ' that you will not cut off my descendants after me and that you will not destroy my name from my father’s household (extended family).” '
  '22':
  - type: text
    content: David gave Saul his oath; and Saul went home, but David and his men went up to the mountain stronghold.
  '3':
  - type: text
    content: 'On the way he came to the '
  - type: note
    content: This was a wall of stones that had been unearthed from the field and stacked on each other as an enclosure for the flocks. The wall probably was built from the mouth of the cave and back.
  - type: text
    content: 'sheepfolds where there was a cave; and Saul went in to '
  - type: note
    content: Lit cover his feet, a euphemism for the squatting position that one would take, with the outer robe touching the ground and concealing one’s feet as a result.
  - type: text
    content: 'relieve himself. Now David and his men were sitting in the cave’s innermost recesses. '
  '4':
  - type: text
    content: 'David’s men said to him, “Behold, '
  - type: text
    content: this is
  - type: text
    content: ' the day of which the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to you, ‘Behold, I will hand over your enemy to you, and you shall do to him as seems good to you.’ ” Then David arose [in the darkness] and stealthily cut off the hem (edge) of Saul’s robe. '
  '5':
  - type: text
    content: 'Afterward, David’s '
  - type: note
    content: Lit heart struck him.
  - type: text
    content: 'conscience bothered him because he had cut off the hem of Saul’s '
  - type: text
    content: robe.
  - type: text
    content: ' '
  '6':
  - type: text
    content: He said to his men, “The L
  - type: heading
    content: ord
  - type: text
    content: ' forbid that I should do this thing to my master, the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anointed, to put out my hand against him, since he is the anointed of the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '7':
  - type: text
    content: So David strongly rebuked his men with these words and did not let them rise up against Saul. Saul got up, left the cave and went on his way.
  '8':
  - type: text
    content: 'Then David also got up afterward and went out of the cave and called after Saul, saying, “My lord the king!” And when Saul looked behind him, David bowed with his face to the ground and lay himself face down. '
  '9':
  - type: text
    content: 'David said to Saul, “Why do you listen to the words of men who say, ‘David seeks to harm you?’ '
