        marker: fr
        children:
        - type: text
          text: '4:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The district of the ten Hellenistic (Greco-Roman) cities east of the Sea of Galilee.
      marker-yv: yv-n
    - type: text
      text: Decapolis and Jerusalem and Judea and the other side of the Jordan.
