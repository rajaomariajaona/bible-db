  - type: usfm
    marker: it
    children:
    - type: text
      text: Ministry in Galilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And He went throughout all Galilee, teaching in their synagogues and preaching the good news (gospel) of the kingdom, and healing every kind of disease and every kind of sickness among the people [demonstrating and revealing that He was indeed the promised Messiah].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So the news about Him spread throughout all Syria; and they brought to Him all who were sick, those suffering with various diseases and pains, those under the power of demons, and epileptics, paralytics; and He healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Large crowds followed Him from Galilee and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The district of the ten Hellenistic (Greco-Roman) cities east of the Sea of Galilee.
    marker-yv: yv-n
  - type: text
    text: Decapolis and Jerusalem and Judea and the other side of the Jordan.
