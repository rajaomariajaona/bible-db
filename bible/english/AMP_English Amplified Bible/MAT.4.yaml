    - type: text
      text: '18'
  - type: text
    text: 'As Jesus was walking by the Sea of Galilee, He noticed two brothers, Simon who was called Peter, and Andrew his brother, casting a net into the sea; for they were fishermen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The concept of “follow” can represent three separate possibilities: in the early stages of His ministry, (1) walking with Him physically (literally), that is, merely being in His presence regardless of personal belief or commitment, (2) accepting and identifying with the salvation He offered; and later on, (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Follow Me
  - type: text
    text: ' [as My disciples, accepting Me as your Master and Teacher and walking the same path of life that I walk], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I will make you fishers of men.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Immediately they left their nets and followed Him [becoming His disciples, believing and trusting in Him and following His example]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And going on [further] from there He noticed two other brothers, James the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: son
  - type: text
    text: ' of Zebedee, and his brother John, in the boat with their father '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zebedee’s wife, Salome, is believed to be the sister of Jesus’ mother Mary.
    marker-yv: yv-n
  - type: text
    text: 'Zebedee, mending their nets; and He called them [to follow Him as His disciples]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Immediately they left the boat and their father, and followed Him [becoming His disciples, believing and trusting in Him and following His example].
- type: usfm
  marker: s1
