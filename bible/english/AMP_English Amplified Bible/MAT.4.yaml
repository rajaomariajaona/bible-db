  '17':
  - type: text
    content: 'From that time Jesus began to preach and say, '
  - type: text
    content: “
  - type: note
    content: Jesus’ public ministry began at this time and He was preaching the same message John the Baptist had proclaimed.
  - type: text
    content: Repent
  - type: text
    content: ' [change your inner self—your old way of thinking, regret past sins, live your life in a way that proves repentance; seek God’s purpose for your life], '
  - type: text
    content: for the kingdom of heaven is at hand.”
  - type: heading
    content: The First Disciples
  '18':
  - type: text
    content: 'As Jesus was walking by the Sea of Galilee, He noticed two brothers, Simon who was called Peter, and Andrew his brother, casting a net into the sea; for they were fishermen. '
  '19':
  - type: text
    content: 'And He said to them, '
  - type: text
    content: “
  - type: note
    content: 'The concept of “follow” can represent three separate possibilities: in the early stages of His ministry, (1) walking with Him physically (literally), that is, merely being in His presence regardless of personal belief or commitment, (2) accepting and identifying with the salvation He offered; and later on, (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
  - type: text
    content: Follow Me
  - type: text
    content: ' [as My disciples, accepting Me as your Master and Teacher and walking the same path of life that I walk], '
  - type: text
    content: and I will make you fishers of men.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'After He had gone without food for forty days and forty nights, He became hungry. [Ex 34:28; 1 Kin 19:8] '
  '20':
  - type: text
    content: 'Immediately they left their nets and followed Him [becoming His disciples, believing and trusting in Him and following His example]. '
  '21':
  - type: text
    content: 'And going on [further] from there He noticed two other brothers, James the '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee, and his brother John, in the boat with their father '
  - type: note
    content: Zebedee’s wife, Salome, is believed to be the sister of Jesus’ mother Mary.
  - type: text
    content: 'Zebedee, mending their nets; and He called them [to follow Him as His disciples]. '
  '22':
  - type: text
    content: Immediately they left the boat and their father, and followed Him [becoming His disciples, believing and trusting in Him and following His example].
  - type: heading
    content: Ministry in Galilee
  '23':
  - type: text
    content: And He went throughout all Galilee, teaching in their synagogues and preaching the good news (gospel) of the kingdom, and healing every kind of disease and every kind of sickness among the people [demonstrating and revealing that He was indeed the promised Messiah].
  '24':
  - type: text
    content: 'So the news about Him spread throughout all Syria; and they brought to Him all who were sick, those suffering with various diseases and pains, those under the power of demons, and epileptics, paralytics; and He healed them. '
  '25':
  - type: text
    content: 'Large crowds followed Him from Galilee and the '
  - type: note
    content: The district of the ten Hellenistic (Greco-Roman) cities east of the Sea of Galilee.
  - type: text
    content: Decapolis and Jerusalem and Judea and the other side of the Jordan.
