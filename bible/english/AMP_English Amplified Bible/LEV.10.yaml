  '12':
  - type: text
    content: Then Moses said to Aaron, and to his surviving sons, Eleazar and Ithamar, “Take the grain offering that is left over from the offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ', and eat it unleavened beside the altar, for it is most holy. '
  '13':
  - type: text
    content: You shall eat it in a holy place, because it is your portion and your sons’ portion, from the offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: '; for so I have been commanded. '
  '14':
  - type: text
    content: 'But the breast of the wave offering and the thigh of the heave offering you may eat in a clean place, you and your sons and daughters with you; for the breast and the thigh are your portion and your sons’ portion, given out of the sacrifices of the peace offerings of the Israelites. '
  '15':
  - type: text
    content: They shall bring the thigh presented by lifting up and the breast presented by waving, along with the offerings by fire of the fat, to present as a wave offering before the L
  - type: heading
    content: ord
  - type: text
    content: . This shall be yours and your sons’ with you, as your perpetual portion, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded.”'
  '16':
  - type: text
    content: 'But Moses diligently tried to find the goat [that had been offered] as the sin offering, and discovered that it had been burned up [as waste, not eaten]! So he was angry with Aaron’s surviving sons Eleazar and Ithamar, saying, '
  '17':
  - type: text
    content: “Why did you not eat the sin offering in the holy place? For it is most holy; and God gave it to you to remove the guilt of the congregation, to make atonement for them before the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Behold, its blood was not brought into the Holy Place; you certainly should have eaten the goat in the sanctuary, just as I commanded.” '
  '19':
  - type: text
    content: Then Aaron said to Moses, “This very day they have [obediently] presented their sin offering and their burnt offering before the L
  - type: heading
    content: ord
  - type: text
    content: ', but [such terrible things] as these have happened to me [and to them]; if I [and my sons] had eaten a sin offering today would it have been acceptable '
  - type: text
    content: and
  - type: text
    content: ' pleasing in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: '?” [Hos 9:4] '
  '2':
  - type: text
    content: And fire came out from the presence of the L
  - type: heading
