document_id: LEV.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sin of Nadab and Abihu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Nadab and Abihu, the sons of Aaron, took their respective [ceremonial] censers, put fire in them, placed incense on it and offered '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What made the fire “strange” cannot be determined. They may have taken the fire from an unauthorized source, or used incense that did not meet the divine specifications. In any case, God’s laws and requirements are not subject to modification by man.
      marker-yv: yv-n
    - type: text
      text: strange (unauthorized, unacceptable) fire before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', [an act] which He had not commanded them to do. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to make a distinction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' recognize a difference between the holy (sacred) and the common (profane), and between the [ceremonially] unclean and the clean; [Ezek 44:23] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you are
    - type: text
      text: ' to teach the Israelites all the statutes which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken to them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by the hand of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: through Moses.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said to Aaron, and to his surviving sons, Eleazar and Ithamar, “Take the grain offering that is left over from the offerings by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and eat it unleavened beside the altar, for it is most holy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall eat it in a holy place, because it is your portion and your sons’ portion, from the offerings by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; for so I have been commanded. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the breast of the wave offering and the thigh of the heave offering you may eat in a clean place, you and your sons and daughters with you; for the breast and the thigh are your portion and your sons’ portion, given out of the sacrifices of the peace offerings of the Israelites. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shall bring the thigh presented by lifting up and the breast presented by waving, along with the offerings by fire of the fat, to present as a wave offering before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . This shall be yours and your sons’ with you, as your perpetual portion, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses diligently tried to find the goat [that had been offered] as the sin offering, and discovered that it had been burned up [as waste, not eaten]! So he was angry with Aaron’s surviving sons Eleazar and Ithamar, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why did you not eat the sin offering in the holy place? For it is most holy; and God gave it to you to remove the guilt of the congregation, to make atonement for them before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, its blood was not brought into the Holy Place; you certainly should have eaten the goat in the sanctuary, just as I commanded.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Aaron said to Moses, “This very day they have [obediently] presented their sin offering and their burnt offering before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but [such terrible things] as these have happened to me [and to them]; if I [and my sons] had eaten a sin offering today would it have been acceptable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing in the sight of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?” [Hos 9:4] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And fire came out from the presence of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and devoured them, and they died before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Moses heard that, he was satisfied.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said to Aaron, “This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I will be treated as holy by those who approach Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And before all the people I will be honored.’ ”
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Aaron, therefore, said nothing.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses called Mishael and Elzaphan, the sons of Uzziel who was Aaron’s uncle, and said to them, “Come here, carry your relatives away from the front of the sanctuary and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: take them
    - type: text
      text: ' outside the camp.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they came forward and carried them, still in their undertunics, outside the camp, as Moses had said. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to Aaron and to his [younger] sons Eleazar and Ithamar, “Do not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: unbind
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'uncover your heads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' let your hair hang loose nor tear your clothes [as expressions of mourning], so that you will not die [also] and so that He will not express His wrath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anger toward all the congregation. But your relatives, the whole house of Israel, may mourn the burning which the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has brought about. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall not even go out of the doorway of the Tent of Meeting, or you will die; for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anointing oil is upon you.” So they did [everything] according to the word of Moses.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Aaron, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prohibition may imply that intoxication precipitated the irreverent behavior that resulted in the death of Aaron’s two older sons.
      marker-yv: yv-n
    - type: text
      text: 'Do not drink wine or intoxicating drink, neither you nor your sons with you, when you come into the Tent of Meeting, so that you will not die—it is a permanent statute throughout your generations— '
