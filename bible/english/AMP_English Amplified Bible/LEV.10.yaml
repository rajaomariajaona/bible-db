  '9':
  - type: text
    content: “
  - type: note
    content: This prohibition may imply that intoxication precipitated the irreverent behavior that resulted in the death of Aaron’s two older sons.
  - type: text
    content: 'Do not drink wine or intoxicating drink, neither you nor your sons with you, when you come into the Tent of Meeting, so that you will not die—it is a permanent statute throughout your generations— '
