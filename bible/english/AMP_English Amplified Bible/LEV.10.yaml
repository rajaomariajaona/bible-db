    content: The Sin of Nadab and Abihu
  - type: text
    content: 'Now Nadab and Abihu, the sons of Aaron, took their respective [ceremonial] censers, put fire in them, placed incense on it and offered '
  - type: note
    content: What made the fire “strange” cannot be determined. They may have taken the fire from an unauthorized source, or used incense that did not meet the divine specifications. In any case, God’s laws and requirements are not subject to modification by man.
  - type: text
