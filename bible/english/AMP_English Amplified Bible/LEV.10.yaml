  - type: text
    content: So Aaron, therefore, said nothing.
  '4':
  - type: text
    content: 'Moses called Mishael and Elzaphan, the sons of Uzziel who was Aaron’s uncle, and said to them, “Come here, carry your relatives away from the front of the sanctuary and '
  - type: text
    content: take them
  - type: text
    content: ' outside the camp.” '
  '5':
  - type: text
    content: 'So they came forward and carried them, still in their undertunics, outside the camp, as Moses had said. '
  '6':
  - type: text
    content: 'Then Moses said to Aaron and to his [younger] sons Eleazar and Ithamar, “Do not '
