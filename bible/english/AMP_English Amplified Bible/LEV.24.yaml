document_id: LEV.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamp and the Bread of the Sanctuary
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'Now the son of an Israelite woman, whose father was an Egyptian, went out among the Israelites, and he and a man of Israel quarreled '
  - type: text
    content: and
  - type: text
    content: ' struggled with each other in the camp. '
  '11':
  - type: text
    content: The Israelite woman’s son blasphemed the Name [of the L
  - type: heading
    content: ord
  - type: text
    content: '] and cursed. So they brought him to Moses. (Now his mother’s name was Shelomith, the daughter of Dibri, of the tribe of Dan.) '
  '12':
  - type: text
    content: 'They put him in custody until the will '
  - type: text
    content: and
  - type: text
    content: ' command of the L'
  - type: heading
    content: ord
  - type: text
    content: ' might be made clear to them.'
  '13':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '14':
  - type: text
    content: “Bring the one who has cursed [the L
  - type: heading
    content: ord
  - type: text
    content: '] outside the camp, and let all who heard him lay their hands on his head [as witnesses to his guilt]; then let all the congregation stone him. '
  '15':
  - type: text
    content: 'You shall speak to the Israelites, saying, ‘Whoever curses his God will bear his sin [through his own death]. '
  '16':
  - type: text
    content: Further, the one who blasphemes the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' shall most certainly be put to death; all the congregation shall stone him. The stranger as well as the native-born shall be put to death when he blasphemes the Name [of the L'
  - type: heading
    content: ord
  - type: text
    content: '].'
  - type: heading
    content: “An Eye for an Eye”
  '17':
  - type: text
    content: '‘If a man takes the life of any human being [unlawfully], he shall most certainly be put to death. '
  '18':
  - type: text
    content: 'The one who kills an animal shall replace it, animal for animal. '
  '19':
  - type: text
    content: 'If a man injures his neighbor (fellow citizen), whatever he has done shall be done to him: '
  '2':
  - type: text
    content: '“Command the children of Israel to bring to you clear oil from beaten olives for the light [of the golden lampstand], to make a lamp burn continually. '
  '20':
  - type: text
    content: 'fracture for fracture, eye for eye, tooth for tooth; just as he has injured a man, so shall the same be done to him. [Matt 5:38-42; 7:2] '
  '21':
  - type: text
    content: 'The one who kills an animal shall replace it; but he who kills a human being [unlawfully] shall be put to death. '
  '22':
  - type: text
    content: 'You shall have one standard of law for the stranger '
  - type: text
    content: among you
  - type: text
    content: ' as well as for the native, for I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.’ ” '
  '23':
  - type: text
    content: Then Moses spoke to the Israelites, and they brought the one who had cursed [the L
  - type: heading
    content: ord
  - type: text
    content: '] outside the camp and stoned him with stones. Thus the Israelites did just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '3':
  - type: text
    content: 'Outside the veil of the Testimony [between the Holy Place and the Most Holy Place] in the Tent of Meeting, Aaron shall always keep the lamps '
  - type: note
    content: Lit it in order.
  - type: text
    content: burning before the L
  - type: heading
    content: ord
  - type: text
    content: ' from evening until morning; it shall be a permanent statute throughout your generations. '
  '4':
  - type: text
    content: 'He shall keep the lamps burning on the pure '
  - type: text
    content: gold
  - type: text
    content: ' lampstand before the L'
  - type: heading
    content: ord
  - type: text
    content: ' continually. [Rev 1:12-18]'
  '5':
  - type: text
    content: '“Then you shall take fine flour and bake twelve cakes (bread of the Presence, showbread) with it; two-tenths of '
  - type: text
    content: an ephah
  - type: text
    content: ' shall be in each cake (loaf). '
  '6':
  - type: text
    content: 'You shall set the bread of the Presence (showbread) in two rows, six in a row, on the pure '
  - type: text
    content: gold
  - type: text
    content: ' table before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '7':
  - type: text
    content: You shall put pure frankincense [in two censers, one] beside each row, so that it may be with the bread as a memorial portion, an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '8':
  - type: text
    content: Every Sabbath day Aaron shall arrange the showbread before the L
  - type: heading
    content: ord
  - type: text
    content: ' continually; it is an everlasting covenant for the Israelites. '
  '9':
  - type: text
    content: The bread of the Presence shall be for Aaron and his sons, and they shall eat it in a sacred place, for it is for Aaron a most holy portion of the offerings by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ', his portion forever.”'
