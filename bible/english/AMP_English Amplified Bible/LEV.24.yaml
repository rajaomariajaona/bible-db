document_id: LEV.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lamp and the Bread of the Sanctuary
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the son of an Israelite woman, whose father was an Egyptian, went out among the Israelites, and he and a man of Israel quarreled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' struggled with each other in the camp. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Israelite woman’s son blasphemed the Name [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] and cursed. So they brought him to Moses. (Now his mother’s name was Shelomith, the daughter of Dibri, of the tribe of Dan.) '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They put him in custody until the will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' command of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' might be made clear to them.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Bring the one who has cursed [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] outside the camp, and let all who heard him lay their hands on his head [as witnesses to his guilt]; then let all the congregation stone him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall speak to the Israelites, saying, ‘Whoever curses his God will bear his sin [through his own death]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Further, the one who blasphemes the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall most certainly be put to death; all the congregation shall stone him. The stranger as well as the native-born shall be put to death when he blasphemes the Name [of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '].'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: “An Eye for an Eye”
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If a man takes the life of any human being [unlawfully], he shall most certainly be put to death. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The one who kills an animal shall replace it, animal for animal. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a man injures his neighbor (fellow citizen), whatever he has done shall be done to him: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Command the children of Israel to bring to you clear oil from beaten olives for the light [of the golden lampstand], to make a lamp burn continually. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fracture for fracture, eye for eye, tooth for tooth; just as he has injured a man, so shall the same be done to him. [Matt 5:38-42; 7:2] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The one who kills an animal shall replace it; but he who kills a human being [unlawfully] shall be put to death. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall have one standard of law for the stranger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: among you
    - type: text
      text: ' as well as for the native, for I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.’ ” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses spoke to the Israelites, and they brought the one who had cursed [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] outside the camp and stoned him with stones. Thus the Israelites did just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Outside the veil of the Testimony [between the Holy Place and the Most Holy Place] in the Tent of Meeting, Aaron shall always keep the lamps '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: it in order
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: burning before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from evening until morning; it shall be a permanent statute throughout your generations. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall keep the lamps burning on the pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gold
    - type: text
      text: ' lampstand before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' continually. [Rev 1:12-18]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then you shall take fine flour and bake twelve cakes (bread of the Presence, showbread) with it; two-tenths of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: an ephah
    - type: text
      text: ' shall be in each cake (loaf). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall set the bread of the Presence (showbread) in two rows, six in a row, on the pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gold
    - type: text
      text: ' table before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You shall put pure frankincense [in two censers, one] beside each row, so that it may be with the bread as a memorial portion, an offering by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every Sabbath day Aaron shall arrange the showbread before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' continually; it is an everlasting covenant for the Israelites. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The bread of the Presence shall be for Aaron and his sons, and they shall eat it in a sacred place, for it is for Aaron a most holy portion of the offerings by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', his portion forever.”'
