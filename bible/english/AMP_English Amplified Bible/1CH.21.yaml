document_id: 1CH.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Census Brings Pestilence
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satan [the adversary] stood up against Israel and incited David to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David may have begun to think of himself as a powerful man in command of an invincible nation, rather than a man who relied on God for direction and success in warfare. Joab realized what David was thinking and pleaded with him to change his mind (v 3).
      marker-yv: yv-n
    - type: text
      text: 'count [the population of] Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go and tell David, saying, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “I offer you three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: choices;
    - type: text
      text: ' choose for yourself one of them, which I will do to you [as punishment for your sin].” ’ ” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Gad came to David and said to him, “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': ‘Choose for yourself '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: either three years of famine, or three months to be swept away before your enemies, while the sword of your enemies overtakes you, or else three days of the sword of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and plague in the land, and the angel of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' bringing destruction throughout all the territory of Israel.’ Now therefore, consider what answer I shall return to Him who sent me.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said to Gad, “I am in great distress; please let me fall into the hands of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for His mercies are very great; but do not let me fall into the hand of man.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent a plague on Israel, and 70,000 men of Israel fell. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God sent an angel to Jerusalem to destroy it; and as he was destroying it, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' looked, and relented concerning the catastrophe and said to the destroying angel, “It is enough; now remove your hand [of judgment].” And the angel of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was standing by the threshing floor of Ornan the Jebusite. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David raised his eyes and saw the angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' standing between earth and heaven, having a drawn sword in his hand stretched out over Jerusalem. Then David and the elders, covered in sackcloth, fell on their faces. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said to God, “Is it not I who commanded the people to be counted? I am the one who has sinned and done evil; but as for these sheep [the people of Israel], what have they done? O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God, please let Your hand be against me and my father’s house, but not against Your people that they should be plagued.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Altar
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded Gad to say to David, that David should go up and build an altar to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This '
        - type: usfm
          marker: it
          children:
          - type: text
            text: threshing floor
        - type: text
          text: ' was on Mt. Moriah in Jerusalem, thought also to be the area where Abraham offered Isaac as a sacrifice. Solomon later built the temple on the site of David’s altar (2 Chr 3:1).'
      marker-yv: yv-n
    - type: text
      text: 'threshing floor of Ornan the Jebusite. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David went up at Gad’s word, which he spoke in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David said to Joab and the leaders of the people, “Go, count Israel from Beersheba to Dan, and bring me their total, so that I may know it.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Ornan was threshing wheat, and he turned back and saw the angel; and his four sons who were with him hid themselves. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As David came to Ornan, Ornan looked and saw him, and went out from the threshing floor and bowed down before David with his face to the ground. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David said to Ornan, “Give me the site of this threshing floor, so that I may build an altar on it to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. You shall charge me the full price for it, so that the plague may be averted from the people.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ornan said to David, “Take it for yourself; and let my lord the king do what is good in his eyes. See, I will give you the oxen also for burnt offerings and the threshing sledges (heavy wooden platforms) for wood and the wheat for the grain offering; I give it all.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But King David said to Ornan, “No, I will certainly pay the full price; for I will not take what is yours for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', nor offer a burnt offering which costs me nothing.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David gave Ornan 600 shekels of gold by weight for the site. [2 Chr 3:1] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David built an altar to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' there and presented burnt offerings and peace offerings. And he called on the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and He answered him with fire from heaven on the altar of burnt offering. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded the [avenging] angel, and he put his sword back into its sheath.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time, when David saw that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had answered him on the threshing floor of Ornan the Jebusite, he sacrificed there. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the tabernacle of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', which Moses made in the wilderness, and the altar of burnt offering were at that time in the high place at Gibeon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joab said, “May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' add to His people a hundred times as many as they are! But, my lord the king, are they not all my lord’s servants? Why then does my lord require this? Why will he bring guilt on Israel?” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But David could not go before it to inquire of God, for he was terrified by the sword of the angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the king’s word prevailed over Joab. So Joab left and went throughout all Israel and came to Jerusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joab gave the total of the census of the people to David. And all Israel were 1,100,000 men who drew the sword; and in Judah 470,000 men who drew the sword. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he did not count Levi and Benjamin among them, because the king’s order was detestable to Joab.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now God was displeased with this act [of arrogance and pride], and He struck Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said to God, “I have sinned greatly because I have done this thing. But now, I beseech You, take away the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of Your servant, for I have acted very foolishly.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Gad, David’s seer, '
