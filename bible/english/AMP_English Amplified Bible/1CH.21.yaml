    content: Census Brings Pestilence
  - type: text
    content: 'Satan [the adversary] stood up against Israel and incited David to '
  - type: note
    content: David may have begun to think of himself as a powerful man in command of an invincible nation, rather than a man who relied on God for direction and success in warfare. Joab realized what David was thinking and pleaded with him to change his mind (v 3).
  - type: text
    content: 'count [the population of] Israel. '
  '10':
  - type: text
    content: “Go and tell David, saying, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “I offer you three '
  - type: text
    content: choices;
  - type: text
    content: ' choose for yourself one of them, which I will do to you [as punishment for your sin].” ’ ” '
  '11':
  - type: text
    content: So Gad came to David and said to him, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': ‘Choose for yourself '
  '12':
  - type: text
    content: either three years of famine, or three months to be swept away before your enemies, while the sword of your enemies overtakes you, or else three days of the sword of the L
  - type: heading
    content: ord
  - type: text
    content: ' and plague in the land, and the angel of the L'
  - type: heading
    content: ord
  - type: text
    content: ' bringing destruction throughout all the territory of Israel.’ Now therefore, consider what answer I shall return to Him who sent me.” '
  '13':
  - type: text
    content: David said to Gad, “I am in great distress; please let me fall into the hands of the L
  - type: heading
    content: ord
  - type: text
    content: ', for His mercies are very great; but do not let me fall into the hand of man.”'
  '14':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' sent a plague on Israel, and 70,000 men of Israel fell. '
  '15':
  - type: text
    content: God sent an angel to Jerusalem to destroy it; and as he was destroying it, the L
  - type: heading
    content: ord
  - type: text
    content: ' looked, and relented concerning the catastrophe and said to the destroying angel, “It is enough; now remove your hand [of judgment].” And the angel of the L'
  - type: heading
    content: ord
  - type: text
    content: ' was standing by the threshing floor of Ornan the Jebusite. '
  '16':
  - type: text
    content: Then David raised his eyes and saw the angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' standing between earth and heaven, having a drawn sword in his hand stretched out over Jerusalem. Then David and the elders, covered in sackcloth, fell on their faces. '
  '17':
  - type: text
    content: David said to God, “Is it not I who commanded the people to be counted? I am the one who has sinned and done evil; but as for these sheep [the people of Israel], what have they done? O L
  - type: heading
    content: ord
  - type: text
    content: ' my God, please let Your hand be against me and my father’s house, but not against Your people that they should be plagued.”'
  - type: heading
    content: David’s Altar
  '18':
  - type: text
    content: Then the angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Gad to say to David, that David should go up and build an altar to the L'
  - type: heading
    content: ord
  - type: text
    content: ' on the '
  - type: note
    content: This threshing floor was on Mt. Moriah in Jerusalem, thought also to be the area where Abraham offered Isaac as a sacrifice. Solomon later built the temple on the site of David’s altar (2 Chr 3:1).
  - type: text
    content: 'threshing floor of Ornan the Jebusite. '
  '19':
  - type: text
    content: So David went up at Gad’s word, which he spoke in the name of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'So David said to Joab and the leaders of the people, “Go, count Israel from Beersheba to Dan, and bring me their total, so that I may know it.” '
  '20':
  - type: text
    content: 'Now Ornan was threshing wheat, and he turned back and saw the angel; and his four sons who were with him hid themselves. '
  '21':
  - type: text
    content: 'As David came to Ornan, Ornan looked and saw him, and went out from the threshing floor and bowed down before David with his face to the ground. '
  '22':
  - type: text
    content: Then David said to Ornan, “Give me the site of this threshing floor, so that I may build an altar on it to the L
  - type: heading
    content: ord
  - type: text
    content: '. You shall charge me the full price for it, so that the plague may be averted from the people.” '
  '23':
  - type: text
    content: 'Ornan said to David, “Take it for yourself; and let my lord the king do what is good in his eyes. See, I will give you the oxen also for burnt offerings and the threshing sledges (heavy wooden platforms) for wood and the wheat for the grain offering; I give it all.” '
  '24':
  - type: text
    content: But King David said to Ornan, “No, I will certainly pay the full price; for I will not take what is yours for the L
  - type: heading
    content: ord
  - type: text
    content: ', nor offer a burnt offering which costs me nothing.” '
  '25':
  - type: text
    content: 'So David gave Ornan 600 shekels of gold by weight for the site. [2 Chr 3:1] '
  '26':
  - type: text
    content: Then David built an altar to the L
  - type: heading
    content: ord
  - type: text
    content: ' there and presented burnt offerings and peace offerings. And he called on the L'
  - type: heading
    content: ord
  - type: text
    content: ', and He answered him with fire from heaven on the altar of burnt offering. '
  '27':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded the [avenging] angel, and he put his sword back into its sheath.'
  '28':
  - type: text
    content: At that time, when David saw that the L
  - type: heading
    content: ord
  - type: text
    content: ' had answered him on the threshing floor of Ornan the Jebusite, he sacrificed there. '
  '29':
  - type: text
    content: For the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: ', which Moses made in the wilderness, and the altar of burnt offering were at that time in the high place at Gibeon. '
  '3':
  - type: text
    content: Joab said, “May the L
  - type: heading
    content: ord
  - type: text
    content: ' add to His people a hundred times as many as they are! But, my lord the king, are they not all my lord’s servants? Why then does my lord require this? Why will he bring guilt on Israel?” '
  '30':
  - type: text
    content: But David could not go before it to inquire of God, for he was terrified by the sword of the angel of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: 'But the king’s word prevailed over Joab. So Joab left and went throughout all Israel and came to Jerusalem. '
  '5':
  - type: text
    content: 'Then Joab gave the total of the census of the people to David. And all Israel were 1,100,000 men who drew the sword; and in Judah 470,000 men who drew the sword. '
  '6':
  - type: text
    content: But he did not count Levi and Benjamin among them, because the king’s order was detestable to Joab.
  '7':
  - type: text
    content: 'Now God was displeased with this act [of arrogance and pride], and He struck Israel. '
  '8':
  - type: text
    content: 'Then David said to God, “I have sinned greatly because I have done this thing. But now, I beseech You, take away the wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt of Your servant, for I have acted very foolishly.”'
  '9':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Gad, David’s seer, '
