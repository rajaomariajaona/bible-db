document_id: JER.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Destruction of Jerusalem Impending
  - type: text
    content: “Run for safety, you children of Benjamin,
  - type: text
    content: Out of the midst of Jerusalem!
  - type: text
    content: And blow a trumpet in Tekoa [in Judah]
  - type: text
    content: And raise a signal-fire in Beth-haccherem [near Jerusalem];
  - type: text
    content: For evil is looking down [with eager anticipation] from the north,
  - type: text
    content: And great destruction.
  '10':
  - type: text
    content: To whom shall I (Jeremiah) speak and give warning
  - type: text
    content: That they may hear?
  - type: text
    content: 'Behold, their ears are '
  - type: note
    content: Lit uncircumcised.
  - type: text
    content: closed [absolutely deaf to God]
  - type: text
    content: And they cannot listen.
  - type: text
    content: Behold, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' has become a reprimand '
  - type: text
    content: and
  - type: text
    content: ' an object of scorn to them;'
  - type: text
    content: They have no delight in it. [Acts 7:51]
  '11':
  - type: text
    content: But I am full of the wrath (judgment) of the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: I am tired of restraining it.
  - type: text
    content: “[I will] pour it out on the children in the street
  - type: text
    content: And on the young men gathered together;
  - type: text
    content: For both the husband and wife shall be taken,
  - type: text
    content: The aged and the very old [though full of days they are not exempt from judgment].
  '12':
  - type: text
    content: “Their houses shall be turned over to others,
  - type: text
    content: Their fields and their wives together;
  - type: text
    content: For I will stretch out My hand
  - type: text
    content: Against the inhabitants of the land,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '13':
  - type: text
    content: “For from the least of them even to the greatest of them,
  - type: text
    content: Everyone is greedy for [unfair] gain;
  - type: text
    content: And from the prophet even to the priest
  - type: text
    content: Everyone deals deceitfully.
  '14':
  - type: text
    content: “They have treated superficially the [bloody] broken wound of My people,
  - type: text
    content: Saying, ‘Peace, peace,’
  - type: text
    content: When there is no peace.
  '15':
  - type: text
    content: '“Were they ashamed because they had committed disgusting '
  - type: text
    content: and
  - type: text
    content: ' vile things?'
  - type: text
    content: No, they were not at all ashamed;
  - type: text
    content: They did not even know how to blush [at their idolatry].
  - type: text
    content: Therefore they will fall among those who fall;
  - type: text
    content: At the time that I punish them
  - type: text
    content: They will be overthrown,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '16':
  - type: text
    content: ¶Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Stand by the roads and look; ask for the ancient paths,
  - type: text
    content: Where the good way is; then walk in it,
  - type: text
    content: And you will find rest for your souls.
  - type: text
    content: But they said, ‘We will not walk in it!’ [Matt 11:29]
  '17':
  - type: text
    content: “I have set watchmen (prophets) over you,
  - type: text
    content: 'Saying, ‘Listen '
  - type: text
    content: and
  - type: text
    content: ' pay attention to the [warning] sound of the trumpet!’'
  - type: text
    content: But they said, ‘We will not listen.’
  '18':
  - type: text
    content: “Therefore hear, O [Gentile] nations,
  - type: text
    content: And see, O congregation, what [vengeful act] is to be done to them.
  '19':
  - type: text
    content: '“Hear, O earth: behold, I am bringing disaster on this people,'
  - type: text
    content: The fruit of their schemes,
  - type: text
    content: 'Because they have not listened '
  - type: text
    content: and
  - type: text
    content: ' paid attention to My words,'
  - type: text
    content: And as for My law, they have rejected it also.
  '2':
  - type: text
    content: “I will destroy the Daughter of Zion (Jerusalem), the lovely and delicate one [so like a luxurious pasture].
  '20':
  - type: text
    content: '“For what purpose does frankincense come to Me from '
  - type: note
    content: Located in southwestern Arabia, Sheba was ruled by the priest-kings of the Sabeans whose primary deity was Attar, a god of procreation. The ruins of the capital city of Mariaba attest to the splendor of the ancient kingdom. The Queen of Sheba visited Solomon the king of Israel in about 950 b.c. The purpose of her 1,200 mile journey was most likely to establish a fair trade agreement. Incense was among the most desirable and valuable exports of Sheba.
  - type: text
    content: Sheba
  - type: text
    content: And the sweet cane from a distant land?
  - type: text
    content: Your burnt offerings are not acceptable
  - type: text
    content: 'And your sacrifices are not sweet '
  - type: text
    content: and
  - type: text
    content: ' pleasing to Me.”'
  '21':
  - type: text
    content: Therefore, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Behold, I am laying stumbling blocks before this people.
  - type: text
    content: The fathers and the sons together
  - type: text
    content: Will stumble against them;
  - type: text
    content: The neighbor and his friend will perish.”
  - type: heading
    content: The Enemy from the North
  '22':
  - type: text
    content: ¶Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Behold, a people is coming from the north country,
  - type: text
    content: 'And a great nation shall be stirred up '
  - type: text
    content: and
  - type: text
    content: ' put into action from the remote parts of the earth.'
  '23':
  - type: text
    content: “They seize bow and spear;
  - type: text
    content: 'They are cruel '
  - type: text
    content: and
  - type: text
    content: ' inhuman and have no mercy.'
  - type: text
    content: Their voice sounds like the roaring sea;
  - type: text
    content: They ride [in formation] on horses,
  - type: text
    content: Arrayed as a man for battle
  - type: text
    content: Against you, O Daughter of Zion (Jerusalem)!”
  '24':
  - type: text
    content: We have heard the report of it;
  - type: text
    content: 'Our hands become limp '
  - type: text
    content: and
  - type: text
    content: ' helpless.'
  - type: text
    content: Anguish has gripped us,
  - type: text
    content: Pain like that of a woman in childbirth.
  '25':
  - type: text
    content: Do not go out into the field
  - type: text
    content: Nor walk on the road,
  - type: text
    content: For the enemy is armed with the sword;
  - type: text
    content: Terror is on every side.
  '26':
  - type: text
    content: O daughter of my people [says Jeremiah],
  - type: text
    content: Clothe yourself in sackcloth and wallow in ashes;
  - type: text
    content: Mourn [aloud] as for an only son,
  - type: text
    content: A most bitter cry [of sorrow and regret],
  - type: text
    content: For suddenly the destroyer will come upon us [on both prophet and people].
  '27':
  - type: text
    content: ¶“I [the L
  - type: heading
    content: ord
  - type: text
    content: '] have set you as an assayer [O Jeremiah] and as a tester [of the ore] of My people,'
  - type: text
    content: That you may know and analyze their acts.”
  '28':
  - type: text
    content: They are all the worst [kind] of [stiff-necked, godless] rebels,
  - type: text
    content: Going around spreading slander.
  - type: text
    content: They are [not gold and silver ore, but] bronze and iron;
  - type: text
    content: They are all corrupt.
  '29':
  - type: text
    content: The bellows blow fiercely,
  - type: text
    content: The lead is consumed by the fire;
  - type: text
    content: In vain they continue refining,
  - type: text
    content: 'But the wicked are not separated '
  - type: text
    content: and
  - type: text
    content: ' removed.'
  '3':
  - type: text
    content: “Shepherds with their flocks will come against her;
  - type: text
    content: They will pitch their tents all around her;
  - type: text
    content: They will pasture, each one in his place [eating up all her rich grasses].
  '30':
  - type: text
    content: They call them rejected silver [only dross, without value],
  - type: text
    content: Because the L
  - type: heading
    content: ord
  - type: text
    content: ' has rejected them.'
  '4':
  - type: text
    content: “[They shout], ‘Prepare for war against her;
  - type: text
    content: Arise, let us [take her by surprise and] attack her at noon.
  - type: text
    content: But alas, the daylight pales,
  - type: text
    content: The evening shadows grow long.
  '5':
  - type: text
    content: ‘Arise, let us [awaken to] attack her at night
  - type: text
    content: And destroy her [fortified] palaces!’ ”
  '6':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts has said,'
  - type: text
    content: “Cut down her trees
  - type: text
    content: And build a siege [mound] against Jerusalem.
  - type: text
    content: This is the city which must be punished;
  - type: text
    content: There is nothing but oppression inside her [walls].
  '7':
  - type: text
    content: '“As a fountain springs up '
  - type: text
    content: and
  - type: text
    content: ' pours out its fresh waters,'
  - type: text
    content: So she [continually] pours out her fresh wickedness.
  - type: text
    content: Violence and destruction are heard inside her [walls];
  - type: text
    content: Sickness and wounds are always before Me.
  '8':
  - type: text
    content: '“Be wise '
  - type: text
    content: and
  - type: text
    content: ' be warned, O Jerusalem,'
  - type: text
    content: Or I will be alienated from you,
  - type: text
    content: And make you a desolation,
  - type: text
    content: An uninhabited land.”
  '9':
  - type: text
    content: ¶Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “They will thoroughly gather like [fruit on] a vine what is left of Israel;
  - type: text
    content: 'Pass your hand [over the vine] again '
  - type: text
    content: and
  - type: text
    content: ' again [Babylon, tool of destruction] like a grape gatherer,'
  - type: text
    content: Over the branches [stripping the tendrils off the vine].”
