document_id: JER.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Destruction of Jerusalem Impending
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Run for safety, you children of Benjamin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of the midst of Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And blow a trumpet in Tekoa [in Judah]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And raise a signal-fire in Beth-haccherem [near Jerusalem];
- type: usfm
  marker: q1
  children:
  - type: text
    text: For evil is looking down [with eager anticipation] from the north,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And great destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I will destroy the Daughter of Zion (Jerusalem), the lovely and delicate one [so like a luxurious pasture].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Shepherds with their flocks will come against her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will pitch their tents all around her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will pasture, each one in his place [eating up all her rich grasses].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “[They shout], ‘Prepare for war against her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arise, let us [take her by surprise and] attack her at noon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But alas, the daylight pales,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The evening shadows grow long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘Arise, let us [awaken to] attack her at night
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destroy her [fortified] palaces!’ ”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts has said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cut down her trees
- type: usfm
  marker: q1
  children:
  - type: text
    text: And build a siege [mound] against Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the city which must be punished;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is nothing but oppression inside her [walls].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“As a fountain springs up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pours out its fresh waters,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So she [continually] pours out her fresh wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Violence and destruction are heard inside her [walls];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sickness and wounds are always before Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Be wise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be warned, O Jerusalem,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or I will be alienated from you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make you a desolation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: An uninhabited land.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “They will thoroughly gather like [fruit on] a vine what is left of Israel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pass your hand [over the vine] again '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' again [Babylon, tool of destruction] like a grape gatherer,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Over the branches [stripping the tendrils off the vine].”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: To whom shall I (Jeremiah) speak and give warning
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they may hear?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Behold, their ears are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: uncircumcised
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: closed [absolutely deaf to God]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they cannot listen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has become a reprimand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an object of scorn to them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have no delight in it. [Acts 7:51]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But I am full of the wrath (judgment) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am tired of restraining it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “[I will] pour it out on the children in the street
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the young men gathered together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For both the husband and wife shall be taken,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The aged and the very old [though full of days they are not exempt from judgment].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Their houses shall be turned over to others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their fields and their wives together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I will stretch out My hand
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against the inhabitants of the land,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “For from the least of them even to the greatest of them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone is greedy for [unfair] gain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the prophet even to the priest
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone deals deceitfully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “They have treated superficially the [bloody] broken wound of My people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘Peace, peace,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: When there is no peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Were they ashamed because they had committed disgusting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vile things?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No, they were not at all ashamed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They did not even know how to blush [at their idolatry].
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore they will fall among those who fall;
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the time that I punish them
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be overthrown,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Stand by the roads and look; ask for the ancient paths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where the good way is; then walk in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will find rest for your souls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they said, ‘We will not walk in it!’ [Matt 11:29]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “I have set watchmen (prophets) over you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Saying, ‘Listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay attention to the [warning] sound of the trumpet!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they said, ‘We will not listen.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Therefore hear, O [Gentile] nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And see, O congregation, what [vengeful act] is to be done to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Hear, O earth: behold, I am bringing disaster on this people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fruit of their schemes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because they have not listened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' paid attention to My words,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as for My law, they have rejected it also.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“For what purpose does frankincense come to Me from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Located in southwestern Arabia, Sheba was ruled by the priest-kings of the Sabeans whose primary deity was Attar, a god of procreation. The ruins of the capital city of Mariaba attest to the splendor of the ancient kingdom. The Queen of Sheba visited Solomon the king of Israel in about 950 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . The purpose of her 1,200 mile journey was most likely to establish a fair trade agreement. Incense was among the most desirable and valuable exports of Sheba.
    marker-yv: yv-n
  - type: text
    text: Sheba
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the sweet cane from a distant land?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your burnt offerings are not acceptable
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And your sacrifices are not sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing to Me.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, I am laying stumbling blocks before this people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fathers and the sons together
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will stumble against them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The neighbor and his friend will perish.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Enemy from the North
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, a people is coming from the north country,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And a great nation shall be stirred up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' put into action from the remote parts of the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “They seize bow and spear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are cruel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inhuman and have no mercy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their voice sounds like the roaring sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They ride [in formation] on horses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrayed as a man for battle
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against you, O Daughter of Zion (Jerusalem)!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: We have heard the report of it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Our hands become limp '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' helpless.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anguish has gripped us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pain like that of a woman in childbirth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Do not go out into the field
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor walk on the road,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the enemy is armed with the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terror is on every side.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: O daughter of my people [says Jeremiah],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clothe yourself in sackcloth and wallow in ashes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mourn [aloud] as for an only son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A most bitter cry [of sorrow and regret],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For suddenly the destroyer will come upon us [on both prophet and people].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ¶“I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] have set you as an assayer [O Jeremiah] and as a tester [of the ore] of My people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you may know and analyze their acts.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They are all the worst [kind] of [stiff-necked, godless] rebels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Going around spreading slander.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are [not gold and silver ore, but] bronze and iron;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are all corrupt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
