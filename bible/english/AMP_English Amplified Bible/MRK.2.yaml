    content: So the Son of Man is Lord even of the Sabbath
  - type: text
    content: ' [and He has authority over it].”'
  '3':
  - type: text
    content: 'Then they came, bringing to Him a paralyzed man, who was being carried by four men. [Matt 9:2-8; Luke 5:18-26] '
  '4':
  - type: text
    content: 'When they were unable to get to Him because of the crowd, they '
  - type: note
    content: The roof of a typical home was composed of clay tiles which were laid on a mat of branches and grass supported by wooden beams. The parallel passage in Luke explains that “they went up on the roof and lowered him through the tiles” (5:19).
  - type: text
    content: 'removed the roof above Jesus; and when they had dug out an opening, they let down the mat on which the paralyzed man was lying. '
  '5':
  - type: text
    content: 'When Jesus saw their [active] faith [springing from confidence in Him], He said to the paralyzed man, '
  - type: text
    content: “Son, your sins are forgiven.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But some of the '
  - type: note
