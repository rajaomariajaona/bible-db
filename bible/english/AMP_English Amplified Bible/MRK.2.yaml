  - type: heading
    content: Question of the Sabbath
  '23':
  - type: text
    content: 'One Sabbath He was walking along [with His disciples] through the grainfields, and as they went along, His disciples began picking the heads of grain. [Deut 23:25; Matt 12:1-8; Luke 6:1-5] '
  '24':
  - type: text
    content: 'The Pharisees said to Him, “Look, why are they doing what '
  - type: note
    content: See note Matt 12:2.
  - type: text
    content: 'is unlawful on the Sabbath?” '
  '25':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Have you never read
  - type: text
    content: ' [in the Scriptures] '
  - type: text
    content: what David did when he was in need and was hungry, he and his companions;
  - type: text
    content: ' [1 Sam 21:1-6] '
  '26':
  - type: text
