  '13':
  - type: text
    content: Jesus went out again along the [Galilean] seashore; and all the people were coming to Him, and He was teaching them.
  - type: heading
    content: Levi (Matthew) Called
  '14':
  - type: text
    content: 'As He was passing by, He saw Levi (Matthew) the son of Alphaeus sitting in the '
  - type: note
    content: I.e. customs office, toll house. Tax collection stations were usually located along the trade route or at the port.
  - type: text
    content: 'tax collector’s booth, and He said to him, '
  - type: text
    content: “Follow Me
  - type: text
    content: ' [as My disciple, accepting Me as your Master and Teacher and walking the same path of life that I walk].” And he got up and followed Him [becoming His disciple, believing and trusting in Him and following His example]. [Matt 9:9-17; Luke 5:27-39]'
  '15':
  - type: text
    content: 'And it happened that Jesus was '
  - type: note
    content: This Greek word was used to describe a festive meal with entertainment.
  - type: text
    content: 'reclining '
  - type: text
    content: at the table
  - type: text
    content: ' in Levi’s house, and many tax collectors and sinners [including non-observant Jews] were eating with Him and His disciples; for there were many of them and they were '
  - type: note
    content: See note 1:17.
  - type: text
    content: 'following Him. '
  '16':
  - type: text
    content: 'When the scribes [belonging to the sect] of the '
  - type: note
    content: These men were an influential religious body of Jews who rigidly adhered to Mosaic Law and ceremonial tradition. Jesus called them to account for their self-righteousness and hypocrisy.
  - type: text
    content: 'Pharisees saw that Jesus was eating with the sinners [including non-observant Jews] and tax collectors, they asked His disciples, “Why does He eat and drink with '
  - type: note
    content: All native Jews contracted by Rome to collect local taxes were despised, along with those who were non-observant Jews.
  - type: text
    content: 'tax collectors and sinners?” '
  '17':
  - type: text
    content: 'When Jesus heard this, He said to them, '
  - type: text
    content: “Those who are healthy have no need of a physician, but
  - type: text
    content: ' [only] '
  - type: text
    content: those who are sick; I did not come to call the righteous, but sinners
  - type: text
    content: ' [who recognize their sin and humbly seek forgiveness].”'
  '18':
  - type: text
    content: 'Now John’s disciples and the Pharisees were fasting [as a ritual]; and they came and asked Jesus, “Why are John’s disciples and the disciples of the Pharisees fasting, but Your disciples are not doing so?” '
  '19':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“The attendants of the bridegroom '
  - type: note
    content: Jewish tradition (as recorded in the Talmud) held that it was a religious duty to congratulate and entertain the bride and groom during the wedding festivities. By analogy, Jesus is saying that His disciples ought to rejoice while He is with them rather than engage in fasting, which was a sign of mourning.
  - type: text
    content: cannot fast while the bridegroom is
  - type: text
    content: ' [still] '
  - type: text
    content: with them, can they? As long as they have the bridegroom with them, they cannot fast.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So many people gathered together that there was no longer room [for them], not even near the door; and Jesus was discussing with them the word [of God]. '
  '20':
  - type: text
    content: But the days will come when the bridegroom is
  - type: text
    content: ' [forcefully] '
  - type: note
    content: The words “taken away” allude to Jesus’ violent death on the cross (cf Is 53:8).
  - type: text
    content: taken away from them, and they will fast at that time.
