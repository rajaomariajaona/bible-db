segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Paralytic Healed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus returned to Capernaum, and a few days later the news went out that He was at home. [Matt 4:13] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So many people gathered together that there was no longer room [for them], not even near the door; and Jesus was discussing with them the word [of God]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then they came, bringing to Him a paralyzed man, who was being carried by four men. [Matt 9:2-8; Luke 5:18-26] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When they were unable to get to Him because of the crowd, they '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The roof of a typical home was composed of clay tiles which were laid on a mat of branches and grass supported by wooden beams. The parallel passage in Luke explains that “they went up on the roof and lowered him through the tiles” (5:19).
    marker-yv: yv-n
  - type: text
    text: 'removed the roof above Jesus; and when they had dug out an opening, they let down the mat on which the paralyzed man was lying. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Jesus saw their [active] faith [springing from confidence in Him], He said to the paralyzed man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Son, your sins are forgiven.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But some of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were scholars of the Law and of the writings of the prophets.
    marker-yv: yv-n
  - type: text
    text: 'scribes were sitting there debating in their hearts [the implication of what He had said], '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Why does this man talk that way? He is blaspheming; who can forgive sins [remove guilt, nullify sin’s penalty, and assign righteousness] except God alone?” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Immediately Jesus, being fully aware [of their hostility] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' knowing in His spirit that they were thinking this, said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why are you debating '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arguing about these things in your hearts?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Which is easier, to say to the paralyzed man, ‘Your sins are forgiven’; or to say, ‘Get up, and pick up your mat and walk’?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But so that you may know that the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus uses this title to identify Himself as Messiah (cf Dan 7:13). It appears over eighty times in the Gospels. Especially notable is its use in 8:31.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Son of Man has the authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power on earth to forgive sins”'
  - type: text
    text: '—He said to the paralyzed man, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I say to you, get up, pick up your mat and go home.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And he got up and immediately picked up the mat and went out before them all, so that they all were astonished and they glorified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praised God, saying, “We have never seen anything like this!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jesus went out again along the [Galilean] seashore; and all the people were coming to Him, and He was teaching them.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Levi (Matthew) Called
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As He was passing by, He saw Levi (Matthew) the son of Alphaeus sitting in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. customs office, toll house. Tax collection stations were usually located along the trade route or at the port.
    marker-yv: yv-n
  - type: text
    text: 'tax collector’s booth, and He said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow Me
  - type: text
    text: ' [as My disciple, accepting Me as your Master and Teacher and walking the same path of life that I walk].” And he got up and followed Him [becoming His disciple, believing and trusting in Him and following His example]. [Matt 9:9-17; Luke 5:27-39]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And it happened that Jesus was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Greek word was used to describe a festive meal with entertainment.
    marker-yv: yv-n
  - type: text
    text: 'reclining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the table
  - type: text
    text: ' in Levi’s house, and many tax collectors and sinners [including non-observant Jews] were eating with Him and His disciples; for there were many of them and they were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 1:17.
    marker-yv: yv-n
  - type: text
    text: 'following Him. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the scribes [belonging to the sect] of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These men were an influential religious body of Jews who rigidly adhered to Mosaic Law and ceremonial tradition. Jesus called them to account for their self-righteousness and hypocrisy.
    marker-yv: yv-n
  - type: text
    text: 'Pharisees saw that Jesus was eating with the sinners [including non-observant Jews] and tax collectors, they asked His disciples, “Why does He eat and drink with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All native Jews contracted by Rome to collect local taxes were despised, along with those who were non-observant Jews.
    marker-yv: yv-n
  - type: text
    text: 'tax collectors and sinners?” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Jesus heard this, He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Those who are healthy have no need of a physician, but
  - type: text
    text: ' [only] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: those who are sick; I did not come to call the righteous, but sinners
  - type: text
    text: ' [who recognize their sin and humbly seek forgiveness].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now John’s disciples and the Pharisees were fasting [as a ritual]; and they came and asked Jesus, “Why are John’s disciples and the disciples of the Pharisees fasting, but Your disciples are not doing so?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The attendants of the bridegroom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jewish tradition (as recorded in the Talmud) held that it was a religious duty to congratulate and entertain the bride and groom during the wedding festivities. By analogy, Jesus is saying that His disciples ought to rejoice while He is with them rather than engage in fasting, which was a sign of mourning.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: cannot fast while the bridegroom is
  - type: text
    text: ' [still] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: with them, can they? As long as they have the bridegroom with them, they cannot fast.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the days will come when the bridegroom is
  - type: text
    text: ' [forcefully] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The words “taken away” allude to Jesus’ violent death on the cross (cf Is 53:8).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: taken away from them, and they will fast at that time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one sews a patch of unshrunk (new) cloth on an old garment; otherwise the patch pulls away from it, the new from the old, and the tear becomes worse.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'No one puts new wine into old '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 9:17.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: wineskins; otherwise the
  - type: text
    text: ' [fermenting] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: wine will
  - type: text
    text: ' [expand and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: burst the skins, and the wine is lost as well as the wineskins. But new wine must be put into new wineskins.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Question of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'One Sabbath He was walking along [with His disciples] through the grainfields, and as they went along, His disciples began picking the heads of grain. [Deut 23:25; Matt 12:1-8; Luke 6:1-5] '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The Pharisees said to Him, “Look, why are they doing what '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 12:2.
    marker-yv: yv-n
  - type: text
    text: 'is unlawful on the Sabbath?” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Have you never read
  - type: text
    text: ' [in the Scriptures] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: what David did when he was in need and was hungry, he and his companions;
  - type: text
    text: ' [1 Sam 21:1-6] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: how he went into the house of God in the time of Abiathar the high priest, and ate the sacred bread, which is not lawful for anyone but the priests to eat, and how he also gave it to the men who were with him?”
  - type: text
    text: ' [1 Sam 21:1-6] '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Sabbath was made for man, not man for the Sabbath.
  - type: text
    text: ' [Ex 23:12; Deut 5:14] '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the Son of Man is Lord even of the Sabbath
  - type: text
    text: ' [and He has authority over it].”'
