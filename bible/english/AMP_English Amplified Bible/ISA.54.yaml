document_id: ISA.54,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Fertility of Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Shout for joy, O barren one, she who has not given birth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break forth into joyful shouting and rejoice, she who has not gone into labor [with child]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the [spiritual] sons of the desolate one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' more numerous'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than the sons of the married woman,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Gal 4:27]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “For the mountains may be removed and the hills may shake,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But My lovingkindness will not be removed from you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will My covenant of peace be shaken,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who has compassion on you.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶“O you afflicted [city], storm-tossed, and not comforted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully, I will set your [precious] stones in mortar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lay your foundations with sapphires.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “And I will make your battlements of rubies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your gates of [shining] beryl stones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all your [barrier] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: boundary
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: walls of precious stones. [Rev 21:19-21]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “And all your [spiritual] sons will be disciples [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And great will be the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: success
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: well-being of your sons. [John 6:45]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“You will be firmly established in righteousness:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be far from [even the thought of] oppression, for you will not fear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from terror, for it will not come near you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “If anyone fiercely attacks you it will not be from Me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever attacks you will fall because of you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Listen carefully, I have created the smith who blows on the fire of coals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who produces a weapon for its purpose;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have created the destroyer to inflict ruin.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “No weapon that is formed against you will succeed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every tongue that rises against you in judgment you will condemn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This [peace, righteousness, security, and triumph over opposition] is the heritage of the servants of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this is
    - type: text
      text: ' their vindication from Me,” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Enlarge the site of your tent [to make room for more children];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stretch out the curtains of your dwellings, do not spare them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lengthen your tent ropes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make your pegs (stakes) firm [in the ground].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “For you will spread out to the right and to the left;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your descendants will take possession of nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will inhabit deserted cities.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶“Do not fear, for you will not be put to shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And do not feel humiliated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' ashamed, for you will not be disgraced.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you will forget the shame of your youth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will no longer remember the disgrace of your widowhood.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “For your husband is your Maker,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is His name;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your Redeemer is the Holy One of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is called the God of the whole earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has called you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a wife who has been abandoned, grieved in spirit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And like a wife [married] in her youth when she is [later] rejected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' scorned,”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says your God.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “For a brief moment I abandoned you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But with great compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy I will gather you [to Myself again].'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “In an outburst of wrath
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hid My face from you for a moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But with everlasting kindness I will have compassion on you,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your Redeemer.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '¶“For this is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' the waters of Noah to Me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As I swore [an oath] that the waters of Noah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Would not flood the earth again;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the same way I have sworn that I will not be angry with you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will I rebuke you.
