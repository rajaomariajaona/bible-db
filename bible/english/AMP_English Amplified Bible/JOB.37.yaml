document_id: JOB.37,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elihu Says God has Authority over the Storm
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Indeed, at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His
    - type: text
      text: ' thundering my heart trembles'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And leaps out of its place.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ice is made by the breath of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the expanse of the waters is frozen. [Ps 147:17, 18]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He loads the thick cloud with moisture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He disperses the cloud of His lightning.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Its direction is turned around by His guidance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That it may do whatever He commands it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the face of the inhabited earth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Whether [it be] for correction, or for His earth [generally]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or for [His] mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness, He causes it to happen. [Ex 9:18, 23; 1 Sam 12:18, 19]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Listen to this, Job;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stand still and consider the wonders of God.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Do you know how God establishes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' commands them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes the lightning of His [storm] cloud shine?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do you know about the layers of thick clouds [and how they are balanced and poised in the heavens],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wonderful works of Him who is perfect in knowledge,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You whose garments are hot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When He quiets the earth [in sultry summer] with the [oppressive] south wind?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can you, with Him, spread out the sky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strong as a molten mirror?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Tell us [Job] what words [of man] shall we say to such a Being;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We cannot state '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our case
    - type: text
      text: ' because of darkness [that is, our ignorance in the presence of the unsearchable God].'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen carefully to the thunder of His voice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the rumbling that goes out of His mouth!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So shall it be told Him that I wish to speak?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or should a man say that he would be swallowed up [and destroyed by God]?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Now people cannot look at the light when it is bright in the skies [without being blinded],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the wind has passed and cleared them.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Out of the north comes golden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: splendor
    - type: text
      text: ' [and people can hardly look on it];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Around God is awesome splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty [far too glorious for man’s eyes].'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The Almighty—we cannot find Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is exalted in power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He will not do violence to [nor disregard] justice and abundant righteousness. [1 Tim 6:16]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Men therefore fear Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He does not regard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' respect any who are wise in heart [in their own understanding and conceit].” [Matt 10:28]'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He lets it loose under the whole heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His lightning to the ends of the earth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “After it, His voice roars;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He thunders with the voice of His majesty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He does not restrain His lightning [against His adversaries] when His voice is heard.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God thunders marvelously with His voice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does great things which we cannot comprehend.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For He says to the snow, ‘Fall on the earth’;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [He speaks] to the showers and to the downpour [of His mighty rains], ‘Be strong.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God seals (brings to a standstill, stops) [by severe weather] the hand of every man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That all men [whom He has made] may know His work [that is, His sovereign power and their subjection to it].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then the beast goes into its lair
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And remains in its hiding place.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Out of its chamber comes the storm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cold from the north wind.
