document_id: JOB.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Elihu Says God has Authority over the Storm
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Indeed, at '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' thundering my heart trembles'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And leaps out of its place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Listen carefully to the thunder of His voice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the rumbling that goes out of His mouth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “He lets it loose under the whole heaven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His lightning to the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “After it, His voice roars;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He thunders with the voice of His majesty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He does not restrain His lightning [against His adversaries] when His voice is heard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “God thunders marvelously with His voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He does great things which we cannot comprehend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “For He says to the snow, ‘Fall on the earth’;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [He speaks] to the showers and to the downpour [of His mighty rains], ‘Be strong.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “God seals (brings to a standstill, stops) [by severe weather] the hand of every man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That all men [whom He has made] may know His work [that is, His sovereign power and their subjection to it].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Then the beast goes into its lair
- type: usfm
  marker: q1
  children:
  - type: text
    text: And remains in its hiding place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Out of its chamber comes the storm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cold from the north wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Ice is made by the breath of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the expanse of the waters is frozen. [Ps 147:17, 18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “He loads the thick cloud with moisture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He disperses the cloud of His lightning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Its direction is turned around by His guidance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That it may do whatever He commands it
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the face of the inhabited earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Whether [it be] for correction, or for His earth [generally]
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or for [His] mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness, He causes it to happen. [Ex 9:18, 23; 1 Sam 12:18, 19]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶“Listen to this, Job;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stand still and consider the wonders of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Do you know how God establishes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commands them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And makes the lightning of His [storm] cloud shine?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Do you know about the layers of thick clouds [and how they are balanced and poised in the heavens],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wonderful works of Him who is perfect in knowledge,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You whose garments are hot,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When He quiets the earth [in sultry summer] with the [oppressive] south wind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Can you, with Him, spread out the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strong as a molten mirror?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Tell us [Job] what words [of man] shall we say to such a Being;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We cannot state '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our case
  - type: text
    text: ' because of darkness [that is, our ignorance in the presence of the unsearchable God].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “So shall it be told Him that I wish to speak?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or should a man say that he would be swallowed up [and destroyed by God]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ¶“Now people cannot look at the light when it is bright in the skies [without being blinded],
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the wind has passed and cleared them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Out of the north comes golden '
  - type: usfm
    marker: it
    children:
    - type: text
      text: splendor
  - type: text
    text: ' [and people can hardly look on it];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Around God is awesome splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majesty [far too glorious for man’s eyes].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “The Almighty—we cannot find Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is exalted in power
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will not do violence to [nor disregard] justice and abundant righteousness. [1 Tim 6:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Men therefore fear Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He does not regard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' respect any who are wise in heart [in their own understanding and conceit].” [Matt 10:28]'
