    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this I saw four angels stationed at the four corners of the earth, holding back the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jews and other ancient peoples were very observant of the four winds, that is, the winds that came from each point of the compass. It was said in the Talmud that if the winds ceased to blow, the world could not continue to exist.
    marker-yv: yv-n
  - type: text
    text: 'four winds of the earth so that no wind would blow on the earth or on the sea or on any tree. [Zech 6:5] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then I saw another angel coming up from the rising of the sun, holding the seal of the living God; and with a loud voice he called out to the four angels to whom it was granted [to have authority and power] to harm the earth and the sea, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'saying, “Do not harm the earth nor the sea nor the trees until we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The seal indicates both ownership and protection by God.
    marker-yv: yv-n
  - type: text
    text: seal (mark) the bond-servants of our God on their foreheads.” [Ezek 9:4]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The 144,000
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I heard how many were sealed, a hundred and forty-four thousand; [twelve thousand] sealed from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The tribe of Dan is omitted from the following passage without explanation. The tribe of Manasseh, Joseph’s older son, replaces Dan, so the count remains at twelve.
    marker-yv: yv-n
  - type: text
    text: 'every tribe of the sons of Israel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Twelve thousand were sealed from the tribe of Judah, twelve thousand from the tribe of Reuben, twelve thousand from the tribe of Gad,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: twelve thousand from the tribe of Asher, twelve thousand from the tribe of Naphtali, twelve thousand from the tribe of Manasseh,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: twelve thousand from the tribe of Simeon, twelve thousand from the tribe of Levi, twelve thousand from the tribe of Issachar,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: twelve thousand from the tribe of Zebulun, twelve thousand from the tribe of Joseph, and twelve thousand from the tribe of Benjamin were sealed (marked, redeemed, protected).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Multitude from the Tribulation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'After these things I looked, and this is what I saw: a vast multitude which no one could count, [gathered] from every nation and from all the tribes and peoples and languages [of the earth], standing before the throne and before the Lamb (Christ), dressed in white robes, with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. symbols of victory and joy used on festive occasions.
    marker-yv: yv-n
  - type: text
    text: 'palm branches in their hands; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and in a loud voice they cried out, saying,
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: S
  - type: text
    text: 'alvation [belongs] to our God who is seated on the throne, and to the Lamb [our salvation is the Trinity’s to give, and to God the Trinity we owe our deliverance].” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And all the angels were standing around the throne and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: around
  - type: text
    text: ' the [twenty-four] elders and the four living creatures; and they fell to their faces before the throne and worshiped God, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: saying,
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: A
  - type: text
    text: 'men! Blessing and glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' majesty and wisdom and thanksgiving and honor and power and might belong to our God forever and ever. Amen.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then one of the elders responded, saying to me, “These who are dressed in the long white robes—who are they, and from where did they come?” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I said to him, “My lord, you know [the answer].” And he said to me, “These are the people who come out of the great tribulation (persecution), and they have washed their robes and made them white in the blood of the Lamb [because of His atoning sacrifice]. [Gen 49:11; Dan 12:1] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For this reason, they are [standing] before the throne of God; and they serve Him [in worship] day and night in His temple; and He who sits on the throne will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pitch His tent
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'spread His tabernacle over them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shelter '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect them [with His presence]. [Rev 21:3] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They will hunger no longer, nor thirst anymore; nor will the sun '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fall
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'beat down on them, nor any [scorching] heat; [Is 49:10; Ps 121:6] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: for the Lamb who is in the center of the throne will be their Shepherd, and He will guide them to springs of the waters of life; and God will wipe every tear from their eyes [giving them eternal comfort].” [Ps 23:2; Is 25:8; Ezek 34:23; Rev 21:4]
