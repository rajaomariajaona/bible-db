  - type: text
    content: 'After this I saw four angels stationed at the four corners of the earth, holding back the '
  - type: note
    content: The Jews and other ancient peoples were very observant of the four winds, that is, the winds that came from each point of the compass. It was said in the Talmud that if the winds ceased to blow, the world could not continue to exist.
  - type: text
    content: 'four winds of the earth so that no wind would blow on the earth or on the sea or on any tree. [Zech 6:5] '
