  '13':
  - type: text
    content: 'Then one of the elders responded, saying to me, “These who are dressed in the long white robes—who are they, and from where did they come?” '
  '14':
  - type: text
    content: 'I said to him, “My lord, you know [the answer].” And he said to me, “These are the people who come out of the great tribulation (persecution), and they have washed their robes and made them white in the blood of the Lamb [because of His atoning sacrifice]. [Gen 49:11; Dan 12:1] '
  '15':
  - type: text
    content: 'For this reason, they are [standing] before the throne of God; and they serve Him [in worship] day and night in His temple; and He who sits on the throne will '
  - type: note
    content: Lit pitch His tent.
  - type: text
    content: 'spread His tabernacle over them '
  - type: text
    content: and
  - type: text
    content: ' shelter '
  - type: text
    content: and
  - type: text
    content: ' protect them [with His presence]. [Rev 21:3] '
  '16':
  - type: text
    content: 'They will hunger no longer, nor thirst anymore; nor will the sun '
  - type: note
