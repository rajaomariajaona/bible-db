  - type: text
    content: 'beat down on them, nor any [scorching] heat; [Is 49:10; Ps 121:6] '
  '17':
  - type: text
    content: for the Lamb who is in the center of the throne will be their Shepherd, and He will guide them to springs of the waters of life; and God will wipe every tear from their eyes [giving them eternal comfort].” [Ps 23:2; Is 25:8; Ezek 34:23; Rev 21:4]
  '2':
  - type: text
    content: 'Then I saw another angel coming up from the rising of the sun, holding the seal of the living God; and with a loud voice he called out to the four angels to whom it was granted [to have authority and power] to harm the earth and the sea, '
  '3':
  - type: text
    content: 'saying, “Do not harm the earth nor the sea nor the trees until we '
  - type: note
    content: The seal indicates both ownership and protection by God.
  - type: text
    content: seal (mark) the bond-servants of our God on their foreheads.” [Ezek 9:4]
  - type: heading
    content: The 144,000
  '4':
  - type: text
    content: 'And I heard how many were sealed, a hundred and forty-four thousand; [twelve thousand] sealed from '
  - type: note
    content: The tribe of Dan is omitted from the following passage without explanation. The tribe of Manasseh, Joseph’s older son, replaces Dan, so the count remains at twelve.
  - type: text
    content: 'every tribe of the sons of Israel:'
  '5':
  - type: text
    content: Twelve thousand were sealed from the tribe of Judah, twelve thousand from the tribe of Reuben, twelve thousand from the tribe of Gad,
  '6':
  - type: text
    content: twelve thousand from the tribe of Asher, twelve thousand from the tribe of Naphtali, twelve thousand from the tribe of Manasseh,
  '7':
  - type: text
    content: twelve thousand from the tribe of Simeon, twelve thousand from the tribe of Levi, twelve thousand from the tribe of Issachar,
  '8':
  - type: text
    content: twelve thousand from the tribe of Zebulun, twelve thousand from the tribe of Joseph, and twelve thousand from the tribe of Benjamin were sealed (marked, redeemed, protected).
  - type: heading
    content: A Multitude from the Tribulation
  '9':
  - type: text
    content: 'After these things I looked, and this is what I saw: a vast multitude which no one could count, [gathered] from every nation and from all the tribes and peoples and languages [of the earth], standing before the throne and before the Lamb (Christ), dressed in white robes, with '
  - type: note
    content: I.e. symbols of victory and joy used on festive occasions.
  - type: text
    content: 'palm branches in their hands; '
