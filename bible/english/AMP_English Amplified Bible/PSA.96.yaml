document_id: PSA.96,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 96
  - type: heading
    content: A Call to Worship the Lord the Righteous Judge.
  - type: text
    content: O sing to the L
  - type: heading
    content: ord
  - type: text
    content: ' a new song;'
  - type: text
    content: Sing to the L
  - type: heading
    content: ord
  - type: text
    content: ', all the earth!'
  '10':
  - type: text
    content: Say among the nations, “The L
  - type: heading
    content: ord
  - type: text
    content: ' reigns;'
  - type: text
    content: 'Indeed, the world is firmly '
  - type: text
    content: and
  - type: text
    content: ' securely established, it shall not be moved;'
  - type: text
    content: 'He will judge '
  - type: text
    content: and
  - type: text
    content: ' rule the people with fairness.” [Rev 11:15; 19:6]'
  '11':
  - type: text
    content: ¶Let the heavens be glad, and let the earth rejoice;
  - type: text
    content: Let the sea roar, and all the things it contains;
  '12':
  - type: text
    content: Let the field be exultant, and all that is in it.
  - type: text
    content: Then all the trees of the forest will sing for joy
  '13':
  - type: text
    content: Before the L
  - type: heading
    content: ord
  - type: text
    content: ', for He is coming,'
  - type: text
    content: For He is coming to judge the earth.
  - type: text
    content: He will judge the world with righteousness
  - type: text
    content: And the peoples in His faithfulness. [1 Chr 16:23-33; Rev 19:11]
  '2':
  - type: text
    content: Sing to the L
  - type: heading
    content: ord
  - type: text
    content: ', bless His name;'
  - type: text
    content: Proclaim good news of His salvation from day to day.
  '3':
  - type: text
    content: Declare His glory among the nations,
  - type: text
    content: 'His marvelous works '
  - type: text
    content: and
  - type: text
    content: ' wonderful deeds among all the peoples.'
  '4':
  - type: text
    content: For great is the L
  - type: heading
    content: ord
  - type: text
    content: ' and greatly to be praised;'
  - type: text
    content: He is to be feared above all gods. [Deut 6:5; Rev 14:7]
  '5':
  - type: text
    content: For all the gods of the peoples are [worthless, lifeless] idols,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' made the heavens.'
  '6':
  - type: text
    content: Splendor and majesty are before Him;
  - type: text
    content: Strength and beauty are in His sanctuary.
  '7':
  - type: text
    content: ¶
  - type: note
    content: Lit Give.
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ', O families of the peoples,'
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ' glory and strength.'
  '8':
  - type: text
    content: Ascribe to the L
  - type: heading
    content: ord
  - type: text
    content: ' the glory of His name;'
  - type: text
    content: Bring an offering and come into His courts.
  '9':
  - type: text
    content: Worship the L
  - type: heading
    content: ord
  - type: text
    content: ' in the splendor of holiness;'
  - type: text
    content: Tremble [in submissive wonder] before Him, all the earth.
