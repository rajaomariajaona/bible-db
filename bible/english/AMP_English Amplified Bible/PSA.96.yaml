  children:
  - type: text
    text: Psalm 96
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Call to Worship the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ' the Righteous Judge.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' a new song;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all the earth!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', bless His name;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proclaim good news of His salvation from day to day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Declare His glory among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His marvelous works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wonderful deeds among all the peoples.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For great is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and greatly to be praised;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is to be feared above all gods. [Deut 6:5; Rev 14:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For all the gods of the peoples are [worthless, lifeless] idols,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' made the heavens.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Splendor and majesty are before Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strength and beauty are in His sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '96:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Give
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ascribe to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O families of the peoples,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ascribe to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' glory and strength.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ascribe to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' the glory of His name;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring an offering and come into His courts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Worship the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the splendor of holiness;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tremble [in submissive wonder] before Him, all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Say among the nations, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' reigns;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indeed, the world is firmly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' securely established, it shall not be moved;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rule the people with fairness.” [Rev 11:15; 19:6]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶Let the heavens be glad, and let the earth rejoice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the sea roar, and all the things it contains;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let the field be exultant, and all that is in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then all the trees of the forest will sing for joy
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for He is coming,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For He is coming to judge the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will judge the world with righteousness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the peoples in His faithfulness. [1 Chr 16:23-33; Rev 19:11]
