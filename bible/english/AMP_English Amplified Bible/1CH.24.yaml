document_id: 1CH.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Divisions of Levites
  - type: text
    content: 'The divisions of the '
  - type: note
    content: Lit sons, and so throughout the context.
  - type: text
    content: 'descendants of Aaron '
  - type: text
    content: 'were these:'
  - type: text
    content: ' the sons of Aaron were Nadab, Abihu, Eleazar, and Ithamar. '
  '10':
  - type: text
    content: 'the seventh to Hakkoz, the eighth to Abijah, '
  '11':
  - type: text
    content: 'the ninth to Jeshua, the tenth to Shecaniah, '
  '12':
  - type: text
    content: 'the eleventh to Eliashib, the twelfth to Jakim, '
  '13':
  - type: text
    content: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  '14':
  - type: text
    content: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  '15':
  - type: text
    content: 'the seventeenth to Hezir, the eighteenth to Happizzez, '
  '16':
  - type: text
    content: 'the nineteenth to Pethahiah, the twentieth to Jehezkel, '
  '17':
  - type: text
    content: 'the twenty-first to Jachin, the twenty-second to Gamul, '
  '18':
  - type: text
    content: 'the twenty-third to Delaiah, the twenty-fourth to Maaziah. '
  '19':
  - type: text
    content: 'These were their offices '
  - type: text
    content: and
  - type: text
    content: ' positions for their service in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' according to the ordinance given to them by their father (ancestor) Aaron, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel had commanded him.'
  '2':
  - type: text
    content: 'But Nadab and Abihu died before their father and had no sons; therefore Eleazar and Ithamar served as priests. '
  '20':
  - type: text
    content: 'Now as for the rest of the sons of Levi: of the sons of Amram: Shubael; of the sons of Shubael: Jehdeiah. '
  '21':
  - type: text
    content: 'Of Rehabiah: of the sons of Rehabiah: Isshiah the first. '
  '22':
  - type: text
    content: 'Of the Izharites: Shelomoth; of the sons of Shelomoth, Jahath. '
  '23':
  - type: text
    content: 'The sons '
  - type: text
    content: 'of Hebron:'
  - type: text
    content: ' Jeriah '
  - type: text
    content: the first,
  - type: text
    content: ' Amariah the second, Jahaziel the third, Jekameam the fourth. '
  '24':
  - type: text
    content: 'Of the sons of Uzziel, Micah; of the sons of Micah, Shamir. '
  '25':
  - type: text
    content: 'The brother of Micah, Isshiah; of the sons of Isshiah, Zechariah. '
  '26':
  - type: text
    content: 'The sons of Merari: Mahli and Mushi; the sons of Jaaziah, Beno. '
  '27':
  - type: text
    content: 'The sons of Merari: by Jaaziah were Beno, Shoham, Zaccur, and Ibri. '
  '28':
  - type: text
    content: 'By Mahli: Eleazar, who had no sons. '
  '29':
  - type: text
    content: 'By Kish: the sons of Kish, Jerahmeel. '
  '3':
  - type: text
    content: 'David, with Zadok of the sons of Eleazar and Ahimelech of the sons of Ithamar, divided them according to their offices for their '
  - type: text
    content: assigned
  - type: text
    content: ' duties. '
  '30':
  - type: text
    content: 'The sons of Mushi: Mahli, Eder, and Jerimoth. These were the sons of the Levites according to their fathers’ households. '
  '31':
  - type: text
    content: 'These also cast lots as did their relatives the sons of Aaron in the presence of David the king, Zadok, Ahimelech, and the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the priests and of the Levites—the head of father’s '
  - type: text
    content: households
  - type: text
    content: ' as well as those of his younger brother.'
  '4':
  - type: text
    content: 'Since there were more chief men found among the descendants of Eleazar than among the descendants of Ithamar [because of Eli’s misfortunes, and Saul’s massacre of the priests at Nob], they were divided in this way: sixteen heads of fathers’ households of the descendants of Eleazar and eight of the descendants of Ithamar, corresponding to their fathers’ households. '
  '5':
  - type: text
    content: 'So they were divided by lot, one group with the other; for they were officers of the sanctuary and officers (high priests) of God, both from the descendants of Eleazar and from the descendants of Ithamar. '
  '6':
  - type: text
    content: 'Shemaiah, the son of Nethanel the scribe, from the Levites, recorded them in the presence of the king, the officers, Zadok the priest, '
  - type: note
    content: See 1 Sam 22:14-23.
  - type: text
    content: 'Ahimelech the son of Abiathar [the priest who escaped Saul’s massacre at Nob], and the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the priests and of the Levites; one father’s household taken for Eleazar and one taken for Ithamar.'
  '7':
  - type: text
    content: 'The lots fell, the first one to Jehoiarib, the second to Jedaiah, '
  '8':
  - type: text
    content: 'the third to Harim, the fourth to Seorim, '
  '9':
  - type: text
    content: 'the fifth to Malchijah, the sixth to Mijamin, '
