document_id: 1CH.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Divisions of Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The divisions of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons,
      - type: text
        text: ' and so throughout the context.'
    marker-yv: yv-n
  - type: text
    text: 'descendants of Aaron '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'were these:'
  - type: text
    text: ' the sons of Aaron were Nadab, Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But Nadab and Abihu died before their father and had no sons; therefore Eleazar and Ithamar served as priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David, with Zadok of the sons of Eleazar and Ahimelech of the sons of Ithamar, divided them according to their offices for their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: assigned
  - type: text
    text: ' duties. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Since there were more chief men found among the descendants of Eleazar than among the descendants of Ithamar [because of Eli’s misfortunes, and Saul’s massacre of the priests at Nob], they were divided in this way: sixteen heads of fathers’ households of the descendants of Eleazar and eight of the descendants of Ithamar, corresponding to their fathers’ households. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So they were divided by lot, one group with the other; for they were officers of the sanctuary and officers (high priests) of God, both from the descendants of Eleazar and from the descendants of Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Shemaiah, the son of Nethanel the scribe, from the Levites, recorded them in the presence of the king, the officers, Zadok the priest, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See 1 Sam 22:14-23.
    marker-yv: yv-n
  - type: text
    text: 'Ahimelech the son of Abiathar [the priest who escaped Saul’s massacre at Nob], and the heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the priests and of the Levites; one father’s household taken for Eleazar and one taken for Ithamar.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The lots fell, the first one to Jehoiarib, the second to Jedaiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the third to Harim, the fourth to Seorim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'the fifth to Malchijah, the sixth to Mijamin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the seventh to Hakkoz, the eighth to Abijah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the ninth to Jeshua, the tenth to Shecaniah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the eleventh to Eliashib, the twelfth to Jakim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the thirteenth to Huppah, the fourteenth to Jeshebeab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'the fifteenth to Bilgah, the sixteenth to Immer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'the seventeenth to Hezir, the eighteenth to Happizzez, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the nineteenth to Pethahiah, the twentieth to Jehezkel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the twenty-first to Jachin, the twenty-second to Gamul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the twenty-third to Delaiah, the twenty-fourth to Maaziah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These were their offices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' positions for their service in the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' according to the ordinance given to them by their father (ancestor) Aaron, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel had commanded him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now as for the rest of the sons of Levi: of the sons of Amram: Shubael; of the sons of Shubael: Jehdeiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Of Rehabiah: of the sons of Rehabiah: Isshiah the first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Of the Izharites: Shelomoth; of the sons of Shelomoth, Jahath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'of Hebron:'
  - type: text
    text: ' Jeriah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the first,
  - type: text
    text: ' Amariah the second, Jahaziel the third, Jekameam the fourth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Of the sons of Uzziel, Micah; of the sons of Micah, Shamir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The brother of Micah, Isshiah; of the sons of Isshiah, Zechariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The sons of Merari: Mahli and Mushi; the sons of Jaaziah, Beno. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Merari: by Jaaziah were Beno, Shoham, Zaccur, and Ibri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'By Mahli: Eleazar, who had no sons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'By Kish: the sons of Kish, Jerahmeel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The sons of Mushi: Mahli, Eder, and Jerimoth. These were the sons of the Levites according to their fathers’ households. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'These also cast lots as did their relatives the sons of Aaron in the presence of David the king, Zadok, Ahimelech, and the heads of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the priests and of the Levites—the head of father’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' as well as those of his younger brother.'
