document_id: NUM.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Balak Sends for Balaam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The Israelites journeyed, and camped in the plains of Moab, on the east side of the Jordan [River] across from Jericho.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Balaam said to God, “Balak the son of Zippor, king of Moab, has sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to me: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‘Hear this, the people who came out of Egypt cover the surface of the land; come now, curse them for me. Perhaps I may be able to fight against them and drive them out.’ ” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'God said to Balaam, “Do not go with them; you shall not curse the people [of Israel], for they are blessed.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Balaam got up in the morning, and said to the leaders of Balak, “Go back to your own land [of Moab], for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has refused to let me go with you.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The leaders of Moab arose and went to Balak, and said, “Balaam refused to come with us.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Balak again sent leaders, more numerous and [men who were] more distinguished than the first ones. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They came to Balaam, and said to him, “Thus says Balak the son of Zippor, ‘I beg you, let nothing hinder you from coming to me. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For I will give you a very great honor and I will do whatever you tell me; so please come, curse these people [of Israel] for me.’ ” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Balaam answered the servants of Balak, “Even if Balak were to give me his house full of silver and gold, I could not do anything, either small or great, contrary to the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Now please, you also stay here tonight, and I will find out what else the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will say to me.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And Balak [the king of Moab] the son of Zippor saw all that Israel had done to the Amorites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'God came to Balaam at night and said to him, “If the men have come to call you, get up and go with them, but you shall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: still
    - type: text
      text: ' do only what I tell you.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So Balaam got up in the morning and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ancient rabbis saw in this action an indication that Balaam was eager to go with the messengers, because it was not considered appropriate for a man of importance to saddle his own mount.
      marker-yv: yv-n
    - type: text
      text: saddled his donkey and went with the leaders of Moab.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Angel and Balaam
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But God’s anger was kindled because '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Balaam went with God’s permission, but his motives were in opposition to God’s will.
      marker-yv: yv-n
    - type: text
      text: 'he was going, and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
      marker-yv: yv-n
    - type: text
      text: Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' took His stand in the way as an adversary against him. Now he was riding on his donkey, and his two servants were with him. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: When the donkey saw the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' standing in the way and His drawn sword in His hand, the donkey turned off the path and went into the field; but Balaam struck the donkey to turn her back toward the path. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' stood in a narrow path of the vineyards, with a [stone] wall on this side and a [stone] wall on that side. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When the donkey saw the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', she pressed herself against the wall and crushed Balaam’s foot against it, and he struck her again. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' went further, and stood in a narrow place where there was no room to turn, either to the right or to the left. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: When the donkey saw the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', she lay down under Balaam, so Balaam was angry and he struck the donkey [a third time] with his staff. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' opened the mouth of the donkey, and she said to Balaam, “What have I done to you that you have struck me these three times?” '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then Balaam said to the donkey, “Because you have made a mockery of me! If there had been a sword in my hand, I would have killed you by now!” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Moab was terrified because of the people, for they were numerous. Moab was overcome with fear because of the sons of Israel. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The donkey said to Balaam, “Am I not your donkey on which you have ridden all your life until this day? Have I ever been accustomed to do so to you?” And he said, “No.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' opened Balaam’s eyes, and he saw the Angel of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' standing in the way with His drawn sword in His hand; and he bowed his head and lay himself face down. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “Why have you struck your donkey these three times? Behold, I have come out to stand against you, because your behavior was obstinate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contrary to Me. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The donkey saw Me and turned away from Me these three times. If she had not turned away from Me, I would have certainly killed you now, and let her live.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Balaam said to the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “I have sinned, for I did not know that You were standing in the way against me. But now, if my going displeases You, I will turn back.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: The Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Balaam, “Go with the men, but you shall speak only what I tell you.” So Balaam went along with the leaders of Balak.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'When Balak heard that Balaam was coming, he went out to meet him at the city of Moab, which is on the border at the Arnon [River], at the farthest end of the border. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Balak said to Balaam, “Did I not urgently send '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to you to call you? Why did you not come to me [immediately]? Am I really unable to honor (pay) you?” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'So Balaam said to Balak, “Indeed I have come to you now, but am I able to say anything at all? The word that God puts in my mouth, that I shall speak.” '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And Balaam went with Balak, and they came to Kiriath-huzoth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moab said to the elders of Midian, “Now this horde will lick up all that is around us, just as the ox licks up the grass of the field.” And Balak the son of Zippor was the king of Moab at that time. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Balak sacrificed oxen and sheep, and sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' to Balaam and to the leaders who were with him.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Then it came about in the morning that Balak took Balaam and brought him up to the high places of Baal; from there he saw a portion of the Israelites.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So he sent messengers to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Balaam had some awareness and knowledge regarding the true God, but he abused the office of prophet.
      marker-yv: yv-n
    - type: text
      text: 'Balaam [a famous prophet-diviner] the son of Beor at Pethor, which is by the [Euphrates] River, in the land of the descendants of his people, to call for him, saying, “There is a people who have come out of Egypt; behold, they cover the surface of the land, and they are living opposite me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Now please come, curse these people for me, for they are too powerful for me; perhaps I will be able to defeat them and drive them out of the land. For I know [your reputation] that he whom you bless is blessed, and he whom you curse is cursed.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So the elders of Moab and of Midian departed with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fees for
    - type: text
      text: ' divination (foretelling) in hand; and they came to Balaam and told him the words of Balak. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Balaam said to them, “Spend the night here and I will bring word back to you as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' may speak to me.” So the leaders of Moab stayed with Balaam [that night]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'God came to Balaam, and said, “Who are these men with you?” '
