document_id: NUM.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Balak Sends for Balaam
  - type: text
    content: The Israelites journeyed, and camped in the plains of Moab, on the east side of the Jordan [River] across from Jericho.
  '10':
  - type: text
    content: 'Balaam said to God, “Balak the son of Zippor, king of Moab, has sent '
  - type: text
    content: word
  - type: text
    content: ' to me: '
  '11':
  - type: text
    content: '‘Hear this, the people who came out of Egypt cover the surface of the land; come now, curse them for me. Perhaps I may be able to fight against them and drive them out.’ ” '
  '12':
  - type: text
    content: 'God said to Balaam, “Do not go with them; you shall not curse the people [of Israel], for they are blessed.” '
  '13':
  - type: text
    content: Balaam got up in the morning, and said to the leaders of Balak, “Go back to your own land [of Moab], for the L
  - type: heading
    content: ord
  - type: text
    content: ' has refused to let me go with you.” '
  '14':
  - type: text
    content: The leaders of Moab arose and went to Balak, and said, “Balaam refused to come with us.”
  '15':
  - type: text
    content: 'Then Balak again sent leaders, more numerous and [men who were] more distinguished than the first ones. '
  '16':
  - type: text
    content: 'They came to Balaam, and said to him, “Thus says Balak the son of Zippor, ‘I beg you, let nothing hinder you from coming to me. '
  '17':
  - type: text
    content: 'For I will give you a very great honor and I will do whatever you tell me; so please come, curse these people [of Israel] for me.’ ” '
  '18':
  - type: text
    content: Balaam answered the servants of Balak, “Even if Balak were to give me his house full of silver and gold, I could not do anything, either small or great, contrary to the command of the L
  - type: heading
    content: ord
  - type: text
    content: ' my God. '
  '19':
  - type: text
    content: Now please, you also stay here tonight, and I will find out what else the L
  - type: heading
    content: ord
  - type: text
    content: ' will say to me.” '
  '2':
  - type: text
    content: 'And Balak [the king of Moab] the son of Zippor saw all that Israel had done to the Amorites. '
  '20':
  - type: text
    content: 'God came to Balaam at night and said to him, “If the men have come to call you, get up and go with them, but you shall '
  - type: text
    content: still
  - type: text
    content: ' do only what I tell you.”'
  '21':
  - type: text
    content: 'So Balaam got up in the morning and '
  - type: note
    content: The ancient rabbis saw in this action an indication that Balaam was eager to go with the messengers, because it was not considered appropriate for a man of importance to saddle his own mount.
  - type: text
    content: saddled his donkey and went with the leaders of Moab.
  - type: heading
    content: The Angel and Balaam
  '22':
  - type: text
    content: 'But God’s anger was kindled because '
  - type: note
    content: Balaam went with God’s permission, but his motives were in opposition to God’s will.
  - type: text
    content: 'he was going, and the '
  - type: note
    content: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
  - type: text
    content: Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' took His stand in the way as an adversary against him. Now he was riding on his donkey, and his two servants were with him. '
  '23':
  - type: text
    content: When the donkey saw the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' standing in the way and His drawn sword in His hand, the donkey turned off the path and went into the field; but Balaam struck the donkey to turn her back toward the path. '
  '24':
  - type: text
    content: But the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' stood in a narrow path of the vineyards, with a [stone] wall on this side and a [stone] wall on that side. '
  '25':
  - type: text
    content: When the donkey saw the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ', she pressed herself against the wall and crushed Balaam’s foot against it, and he struck her again. '
  '26':
  - type: text
    content: The Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' went further, and stood in a narrow place where there was no room to turn, either to the right or to the left. '
  '27':
  - type: text
    content: When the donkey saw the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ', she lay down under Balaam, so Balaam was angry and he struck the donkey [a third time] with his staff. '
  '28':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' opened the mouth of the donkey, and she said to Balaam, “What have I done to you that you have struck me these three times?” '
  '29':
  - type: text
    content: 'Then Balaam said to the donkey, “Because you have made a mockery of me! If there had been a sword in my hand, I would have killed you by now!” '
  '3':
  - type: text
    content: 'So Moab was terrified because of the people, for they were numerous. Moab was overcome with fear because of the sons of Israel. '
  '30':
  - type: text
    content: The donkey said to Balaam, “Am I not your donkey on which you have ridden all your life until this day? Have I ever been accustomed to do so to you?” And he said, “No.”
  '31':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' opened Balaam’s eyes, and he saw the Angel of the L'
  - type: heading
    content: ord
  - type: text
    content: ' standing in the way with His drawn sword in His hand; and he bowed his head and lay himself face down. '
  '32':
  - type: text
    content: The Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Why have you struck your donkey these three times? Behold, I have come out to stand against you, because your behavior was obstinate '
  - type: text
    content: and
  - type: text
    content: ' contrary to Me. '
  '33':
  - type: text
    content: 'The donkey saw Me and turned away from Me these three times. If she had not turned away from Me, I would have certainly killed you now, and let her live.” '
  '34':
  - type: text
    content: Balaam said to the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ', “I have sinned, for I did not know that You were standing in the way against me. But now, if my going displeases You, I will turn back.” '
  '35':
  - type: text
    content: The Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Balaam, “Go with the men, but you shall speak only what I tell you.” So Balaam went along with the leaders of Balak.'
  '36':
  - type: text
    content: 'When Balak heard that Balaam was coming, he went out to meet him at the city of Moab, which is on the border at the Arnon [River], at the farthest end of the border. '
  '37':
  - type: text
    content: 'Balak said to Balaam, “Did I not urgently send '
  - type: text
    content: word
  - type: text
    content: ' to you to call you? Why did you not come to me [immediately]? Am I really unable to honor (pay) you?” '
  '38':
  - type: text
    content: 'So Balaam said to Balak, “Indeed I have come to you now, but am I able to say anything at all? The word that God puts in my mouth, that I shall speak.” '
  '39':
  - type: text
    content: 'And Balaam went with Balak, and they came to Kiriath-huzoth. '
  '4':
  - type: text
    content: 'Moab said to the elders of Midian, “Now this horde will lick up all that is around us, just as the ox licks up the grass of the field.” And Balak the son of Zippor was the king of Moab at that time. '
  '40':
  - type: text
    content: 'Balak sacrificed oxen and sheep, and sent '
  - type: text
    content: some
  - type: text
    content: ' to Balaam and to the leaders who were with him.'
  '41':
  - type: text
    content: Then it came about in the morning that Balak took Balaam and brought him up to the high places of Baal; from there he saw a portion of the Israelites.
  '5':
  - type: text
    content: 'So he sent messengers to '
  - type: note
    content: Balaam had some awareness and knowledge regarding the true God, but he abused the office of prophet.
  - type: text
    content: 'Balaam [a famous prophet-diviner] the son of Beor at Pethor, which is by the [Euphrates] River, in the land of the descendants of his people, to call for him, saying, “There is a people who have come out of Egypt; behold, they cover the surface of the land, and they are living opposite me. '
  '6':
  - type: text
    content: Now please come, curse these people for me, for they are too powerful for me; perhaps I will be able to defeat them and drive them out of the land. For I know [your reputation] that he whom you bless is blessed, and he whom you curse is cursed.”
  '7':
  - type: text
    content: 'So the elders of Moab and of Midian departed with '
  - type: text
    content: fees for
  - type: text
    content: ' divination (foretelling) in hand; and they came to Balaam and told him the words of Balak. '
  '8':
  - type: text
    content: Balaam said to them, “Spend the night here and I will bring word back to you as the L
  - type: heading
    content: ord
  - type: text
    content: ' may speak to me.” So the leaders of Moab stayed with Balaam [that night]. '
  '9':
  - type: text
    content: 'God came to Balaam, and said, “Who are these men with you?” '
