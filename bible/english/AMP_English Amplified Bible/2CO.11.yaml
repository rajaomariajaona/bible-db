document_id: 2CO.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul Defends His Apostleship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I wish you would bear with me [while I indulge] in a little foolishness; but indeed you are bearing with me [as you read this]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I am jealous for you with a godly jealousy because I have promised you to one husband, to present you as a pure virgin to Christ. [Hos 2:19, 20] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But I am afraid that, even as the serpent beguiled Eve by his cunning, your minds may be corrupted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' led away from the simplicity of [your sincere and] pure devotion to Christ. [Gen 3:4] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For [you seem willing to allow it] if one comes and preaches another Jesus whom we have not preached, or if you receive a different spirit from the one you received, or a different gospel from the one you accepted. You tolerate all this beautifully [welcoming the deception]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yet I consider myself in no way inferior to the [so-called] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a sarcastic reference to the teachers of false doctrine (pseudo-apostles) who opposed Paul and tried to claim they had an association with the original twelve disciples.
    marker-yv: yv-n
  - type: text
    text: 'super-apostles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But even if I am unskilled in speaking, yet I am not [untrained] in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Like the original Twelve, Paul received his knowledge of the gospel from the Lord.
    marker-yv: yv-n
  - type: text
    text: knowledge [I know what I am talking about]; but we have made this evident to you in every way, in all things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or did I [perhaps] sin by humbling myself so that you might be exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honored, because I preached God’s gospel to you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Traveling philosophers and religious teachers (including the false apostles) customarily charged for their lectures. Paul’s reason for refusing support from this church is unclear.
    marker-yv: yv-n
  - type: text
    text: 'free of charge? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I robbed other churches by accepting [more than their share of] financial support for my ministry to you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And when I was with you and ran short [financially], I did not burden any of you; for what I needed was fully supplied by the brothers (Silas and Timothy) who came from Macedonia (the church at Philippi). So I kept myself from being a burden to you in any way, and will continue to do so. [Phil 4:15, 16] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As the truth of Christ is in me, my boast [of independence] will not be silenced in the regions of Achaia (southern Greece). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why? Because I do not love you [or wish you well, or have regard for your welfare]? God knows [that I do]!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But what I am doing I will keep doing, [for I am determined to keep this independence] in order to cut off the claim of those who want an opportunity to be regarded just as we are in the things they brag about. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For such men are counterfeit apostles, deceitful workers, masquerading as apostles of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And no wonder, since Satan himself masquerades as an angel of light. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So it is no great surprise if his servants also masquerade as servants of righteousness, but their end will correspond with their deeds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I repeat then, let no one think that I am foolish; but even if you do, at least accept me as foolish, so that I too may boast a little. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'What I say in this confident boasting, I say not as the Lord would [with His authority], but foolishly. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Since many boast [of worldly things and brag] about human accomplishments, I will boast too. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The sarcastic tone of vv 19-21 reflects Paul’s extreme frustration with the Corinthian church.
    marker-yv: yv-n
  - type: text
    text: 'For you, being so wise, gladly tolerate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accept the foolish [like me]! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For you tolerate it if anyone makes you his slave; or devours you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' your possessions; or takes advantage of you; or acts presumptuously; or hits you in the face. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: To my shame, I must say, we have been too weak [in comparison to those pseudo-apostles who take advantage of you].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: B
  - type: text
    text: 'ut in whatever anyone else dares to boast—I am speaking foolishly—I also dare to boast. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Are they Hebrews? So am I. Are they Israelites? So am I. Are they descendants of Abraham? So am I. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Are they [self-proclaimed] servants of Christ?—I am speaking as if I were out of my mind—I am more so [for I exceed them]; with far more labors, with far more imprisonments, beaten times without number, and often in danger of death. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Five times I received from the Jews '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: OT law limited judicial scourging (whipping) to forty lashes. The Jews established a tradition of thirty-nine lashes to minimize the risk of making a mistake in the count and giving the guilty party more than forty.
    marker-yv: yv-n
  - type: text
    text: 'thirty-nine '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lashes.
  - type: text
    text: ' [Deut 25:3] '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Three times I was beaten with rods, once I was stoned. Three times I was shipwrecked, a night and a day I have spent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: adrift
  - type: text
    text: ' on the sea; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'many times on journeys, [exposed to] danger from rivers, danger from bandits, danger from my own countrymen, danger from the Gentiles, danger in the city, danger in the wilderness, danger on the sea, danger among those posing as believers; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'in labor and hardship, often unable to sleep, in hunger and thirst, often [driven to] fasting [for lack of food], in cold and exposure [without adequate clothing]. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Besides those external things, there is the daily [inescapable] pressure of my concern for all the churches. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who is weak, and I do not feel [his] weakness? Who is made to sin, and I am not on fire [with sorrow and concern]?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'If I must boast, I will boast of the things that reveal my weakness [the things by which I am made weak in the eyes of my opponents]. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The God and Father of the Lord Jesus, He who is blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to be praised forevermore, knows that I am not lying. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'In Damascus the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps also leader of the Jewish community.
    marker-yv: yv-n
  - type: text
    text: 'governor (ethnarch) under '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'King of the Nabatean Arabs from 9 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. to '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 40.
    marker-yv: yv-n
  - type: text
    text: 'King Aretas guarded the city of Damascus in order to arrest me, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and I was [actually] let down in a basket through a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. small door.
    marker-yv: yv-n
  - type: text
    text: window in the wall, and slipped through his fingers.
