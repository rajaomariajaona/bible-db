document_id: 2CO.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Defends His Apostleship
  - type: text
    content: 'I wish you would bear with me [while I indulge] in a little foolishness; but indeed you are bearing with me [as you read this]. '
  '10':
  - type: text
    content: 'As the truth of Christ is in me, my boast [of independence] will not be silenced in the regions of Achaia (southern Greece). '
  '11':
  - type: text
    content: Why? Because I do not love you [or wish you well, or have regard for your welfare]? God knows [that I do]!
  '12':
  - type: text
    content: 'But what I am doing I will keep doing, [for I am determined to keep this independence] in order to cut off the claim of those who want an opportunity to be regarded just as we are in the things they brag about. '
  '13':
  - type: text
    content: 'For such men are counterfeit apostles, deceitful workers, masquerading as apostles of Christ. '
  '14':
  - type: text
    content: 'And no wonder, since Satan himself masquerades as an angel of light. '
  '15':
  - type: text
    content: So it is no great surprise if his servants also masquerade as servants of righteousness, but their end will correspond with their deeds.
  '16':
  - type: text
    content: 'I repeat then, let no one think that I am foolish; but even if you do, at least accept me as foolish, so that I too may boast a little. '
  '17':
  - type: text
    content: 'What I say in this confident boasting, I say not as the Lord would [with His authority], but foolishly. '
  '18':
  - type: text
    content: 'Since many boast [of worldly things and brag] about human accomplishments, I will boast too. '
  '19':
  - type: note
    content: The sarcastic tone of vv 19-21 reflects Paul’s extreme frustration with the Corinthian church.
  - type: text
    content: 'For you, being so wise, gladly tolerate '
  - type: text
    content: and
  - type: text
    content: ' accept the foolish [like me]! '
  '2':
  - type: text
    content: 'I am jealous for you with a godly jealousy because I have promised you to one husband, to present you as a pure virgin to Christ. [Hos 2:19, 20] '
  '20':
  - type: text
    content: 'For you tolerate it if anyone makes you his slave; or devours you '
  - type: text
    content: and
  - type: text
    content: ' your possessions; or takes advantage of you; or acts presumptuously; or hits you in the face. '
  '21':
  - type: text
    content: To my shame, I must say, we have been too weak [in comparison to those pseudo-apostles who take advantage of you].
  - type: text
    content: B
  - type: text
    content: 'ut in whatever anyone else dares to boast—I am speaking foolishly—I also dare to boast. '
  '22':
  - type: text
    content: 'Are they Hebrews? So am I. Are they Israelites? So am I. Are they descendants of Abraham? So am I. '
  '23':
  - type: text
    content: 'Are they [self-proclaimed] servants of Christ?—I am speaking as if I were out of my mind—I am more so [for I exceed them]; with far more labors, with far more imprisonments, beaten times without number, and often in danger of death. '
  '24':
  - type: text
    content: 'Five times I received from the Jews '
  - type: note
    content: OT law limited judicial scourging (whipping) to forty lashes. The Jews established a tradition of thirty-nine lashes to minimize the risk of making a mistake in the count and giving the guilty party more than forty.
  - type: text
    content: 'thirty-nine '
  - type: text
    content: lashes.
  - type: text
    content: ' [Deut 25:3] '
  '25':
  - type: text
    content: 'Three times I was beaten with rods, once I was stoned. Three times I was shipwrecked, a night and a day I have spent '
  - type: text
    content: adrift
  - type: text
    content: ' on the sea; '
  '26':
  - type: text
    content: 'many times on journeys, [exposed to] danger from rivers, danger from bandits, danger from my own countrymen, danger from the Gentiles, danger in the city, danger in the wilderness, danger on the sea, danger among those posing as believers; '
  '27':
  - type: text
    content: 'in labor and hardship, often unable to sleep, in hunger and thirst, often [driven to] fasting [for lack of food], in cold and exposure [without adequate clothing]. '
  '28':
  - type: text
    content: 'Besides those external things, there is the daily [inescapable] pressure of my concern for all the churches. '
  '29':
  - type: text
    content: Who is weak, and I do not feel [his] weakness? Who is made to sin, and I am not on fire [with sorrow and concern]?
  '3':
  - type: text
    content: 'But I am afraid that, even as the serpent beguiled Eve by his cunning, your minds may be corrupted '
  - type: text
    content: and
  - type: text
    content: ' led away from the simplicity of [your sincere and] pure devotion to Christ. [Gen 3:4] '
  '30':
  - type: text
    content: 'If I must boast, I will boast of the things that reveal my weakness [the things by which I am made weak in the eyes of my opponents]. '
  '31':
  - type: text
    content: 'The God and Father of the Lord Jesus, He who is blessed '
  - type: text
    content: and
  - type: text
    content: ' to be praised forevermore, knows that I am not lying. '
  '32':
  - type: text
    content: 'In Damascus the '
  - type: note
    content: Perhaps also leader of the Jewish community.
  - type: text
    content: 'governor (ethnarch) under '
  - type: note
    content: King of the Nabatean Arabs from 9 b.c. to a.d. 40.
  - type: text
    content: 'King Aretas guarded the city of Damascus in order to arrest me, '
  '33':
  - type: text
    content: 'and I was [actually] let down in a basket through a '
  - type: note
    content: I.e. small door.
  - type: text
    content: window in the wall, and slipped through his fingers.
  '4':
  - type: text
    content: 'For [you seem willing to allow it] if one comes and preaches another Jesus whom we have not preached, or if you receive a different spirit from the one you received, or a different gospel from the one you accepted. You tolerate all this beautifully [welcoming the deception]. '
  '5':
  - type: text
    content: 'Yet I consider myself in no way inferior to the [so-called] '
  - type: note
    content: This may be a sarcastic reference to the teachers of false doctrine (pseudo-apostles) who opposed Paul and tried to claim they had an association with the original twelve disciples.
  - type: text
    content: 'super-apostles. '
  '6':
  - type: text
    content: 'But even if I am unskilled in speaking, yet I am not [untrained] in '
  - type: note
    content: Like the original Twelve, Paul received his knowledge of the gospel from the Lord.
  - type: text
    content: knowledge [I know what I am talking about]; but we have made this evident to you in every way, in all things.
  '7':
  - type: text
    content: 'Or did I [perhaps] sin by humbling myself so that you might be exalted '
  - type: text
    content: and
  - type: text
    content: ' honored, because I preached God’s gospel to you '
  - type: note
    content: Traveling philosophers and religious teachers (including the false apostles) customarily charged for their lectures. Paul’s reason for refusing support from this church is unclear.
  - type: text
    content: 'free of charge? '
  '8':
  - type: text
    content: 'I robbed other churches by accepting [more than their share of] financial support for my ministry to you. '
  '9':
  - type: text
    content: 'And when I was with you and ran short [financially], I did not burden any of you; for what I needed was fully supplied by the brothers (Silas and Timothy) who came from Macedonia (the church at Philippi). So I kept myself from being a burden to you in any way, and will continue to do so. [Phil 4:15, 16] '
