  '20':
  - type: text
    content: 'Then David returned to bless his household. But [his wife] Michal the daughter of Saul came out to meet David and said, “How glorious '
  - type: text
    content: and
  - type: text
    content: ' distinguished was the king of Israel today, '
  - type: note
