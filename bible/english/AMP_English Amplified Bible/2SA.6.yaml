    content: and distributed to all the people, the entire multitude of Israel, both to men and women, to each a [ring-shaped] loaf of bread, a cake of dates, and a cake of raisins. Then all the people departed, each to his house.
  '2':
  - type: text
    content: And David arose and went with all those who were with him to Baale-judah [Kiriath-jearim], to bring up from there [to Jerusalem] the ark of God which is called by the Name—the very Name of the L
  - type: heading
    content: ord
  - type: text
