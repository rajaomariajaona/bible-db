document_id: 2SA.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peril in Moving the Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again David gathered together all the chosen men of Israel, thirty thousand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David was unwilling to move the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' into the City of David with him; instead he took it aside to the house of Obed-edom the Gittite. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' remained in the house of Obed-edom the Gittite for three months, and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' blessed Obed-edom and all his household (family).'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Ark Is Brought to Jerusalem
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now King David was told, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has blessed the house of Obed-edom and all that belongs to him, because of the ark of God.” So David went and brought up the ark of God from the house of Obed-edom into the City of David with rejoicing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gladness. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when those who were carrying the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [by its poles] had gone six paces, he sacrificed an ox and a fatling. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And David was dancing before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: all his might
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'great enthusiasm, and David was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: girded with.
      marker-yv: yv-n
    - type: text
      text: 'wearing a linen ephod [a priest’s upper garment]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David and all the house of Israel were bringing the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' up [to the City of David] with shouts [of joy] and with the sound of the trumpet.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then, as the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came into the City of David, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Michal failed to understand the significance of the event unfolding beneath her window.
      marker-yv: yv-n
    - type: text
      text: Michal, Saul’s daughter [David’s wife], looked down from the window above and saw King David leaping and dancing before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; and she felt contempt for him in her heart [because she thought him undignified].
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They brought in the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and set it in its place inside the tent which David had pitched for it; and David offered burnt offerings and peace offerings before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When David had finished offering the burnt offerings and peace offerings, he blessed the people in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts (armies), '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and distributed to all the people, the entire multitude of Israel, both to men and women, to each a [ring-shaped] loaf of bread, a cake of dates, and a cake of raisins. Then all the people departed, each to his house.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And David arose and went with all those who were with him to Baale-judah [Kiriath-jearim], to bring up from there [to Jerusalem] the ark of God which is called by the Name—the very Name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, who dwells enthroned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: above
    - type: text
      text: ' the cherubim. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David returned to bless his household. But [his wife] Michal the daughter of Saul came out to meet David and said, “How glorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distinguished was the king of Israel today, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Instead of royal apparel, David dressed himself in a priest’s linen ephod.
      marker-yv: yv-n
    - type: text
      text: 'who uncovered himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stripped [off his kingly robes] in the eyes of his servants’ maids like one of the riffraff who shamelessly uncovers himself!” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David said to Michal, “It was before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that I did this], who chose me above your father and all his house, to appoint me as ruler over Israel, the people of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . Therefore I will celebrate [in pure enjoyment] before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet I will demean myself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' more than this, and will be humbled (abased) in my own sight [and yours, as I please], but by the maids whom you mentioned, by them I shall be held in honor.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Michal the daughter of Saul had no '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At this time being childless was a social stigma and often considered an act of divine judgment. Her failure to produce a child prevented Saul’s line from being continued through David.
      marker-yv: yv-n
    - type: text
      text: child to the day of her death.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They placed the ark of God on '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a violation of the requirement that the ark be transported on poles carried by the Levites (Ex 25:12-14; cf Num 7:9).
      marker-yv: yv-n
    - type: text
      text: 'a new cart and brought it out of the house of Abinadab, which was on the hill; and Uzzah and Ahio, sons of Abinadab, were leading the new cart. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they brought it with the ark of God from the house of Abinadab, which was on the hill; and Ahio was walking in front of the ark. [1 Sam 7:2] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, David and all the house of Israel were celebrating '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dancing before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with all kinds of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: instruments made of
    - type: text
      text: ' fir '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' cypress wood, with lyres, harps, tambourines, castanets, and cymbals.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to Nacon’s threshing floor, Uzzah reached out [with his hand] to the ark of God and took hold of it, because the oxen [stumbled and] nearly overturned it. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the nose of the L
          - type: usfm
            marker: sc
            children:
            - type: usfm
              marker: it
              children:
              - type: text
                text: ord
          - type: text
            text: ' was hot.'
      marker-yv: yv-n
    - type: text
      text: the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' burned against Uzzah, and God struck him there for his irreverence; and he died there by the ark of God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David became '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: hot.
      marker-yv: yv-n
    - type: text
      text: 'angry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offended because of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' outburst against Uzzah, and that place has been called Perez-uzzah (outburst against Uzzah) to this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David was afraid of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that day; and he said, “How can the ark of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' come to me?” '
