document_id: PSA.34
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 34
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ', a Provider and the One Who Rescues Me.'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David; when he pretended to be insane before Abimelech, who drove him out, and he went away.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I will bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at all times;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His praise shall continually be in my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My soul makes its boast in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' downtrodden will hear it and rejoice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The ancient rabbis applied this verse specifically to the saying of grace after a meal and instituted the practice of '
      - type: usfm
        marker: it
        children:
        - type: text
          text: zimmum
      - type: text
        text: ' (“invitation”) as a religious duty for three or more men who had eaten together. They were to invite one another to say the blessing. One then said the blessing and the others were required to say “Amen” in voices no louder than that of the speaker of the blessing, based on the word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: together
      - type: text
        text: . It was also taught that all the participants in the blessing receive a reward from God.
    marker-yv: yv-n
  - type: text
    text: magnify the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let us lift up His name together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶I sought the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [on the authority of His word], and He answered me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And delivered me from all my fears. [Ps 73:25; Matt 7:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They looked to Him and were radiant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their faces will never blush in shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' confusion.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: This poor man cried, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard him'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And saved him from all his troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 16:7.
    marker-yv: yv-n
  - type: text
    text: angel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' encamps around those who fear Him [with awe-inspired reverence and worship Him with obedience],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He rescues [each of] them. [2 Kin 6:8-23; Ps 18:1; 145:20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶O taste and see that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [our God] is good;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: How blessed [fortunate, prosperous, and favored by God] is the man who takes refuge in Him. [1 Pet 2:2, 3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O [reverently] fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you His saints (believers, holy ones);'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For to those who fear Him there is no want.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The young lions lack [food] and grow hungry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they who seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will not lack any good thing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Come, you children, listen to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will teach you to fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with awe-inspired reverence and worship Him with obedience].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Who is the man who desires life
- type: usfm
  marker: q1
  children:
  - type: text
    text: And loves many days, that he may see good?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Keep your tongue from evil
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your lips from speaking deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Turn away from evil and do good;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seek peace and pursue it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶The eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' are toward the righteous [those with moral courage and spiritual integrity]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His ears are open to their cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The face of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is against those who do evil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To cut off the memory of them from the earth. [1 Pet 3:10-12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the righteous
  - type: text
    text: ' cry [for help], the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' hears'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And rescues them from all their distress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' troubles.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is near to the heartbroken'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He saves those who are crushed in spirit (contrite in heart, truly sorry for their sin).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '¶Many hardships '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perplexing circumstances confront the righteous,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' rescues him from them all.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He keeps all his bones;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one of them is broken. [John 19:33, 36]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Evil will cause the death of the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And those who hate the righteous will be held guilty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' will be condemned.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' redeems the soul of His servants,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And none of those who take refuge in Him will be condemned.
