document_id: PSA.34,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 34
  - type: heading
    content: The Lord, a Provider and the One Who Rescues Me.
  - type: text
    content: A Psalm
  - type: text
    content: ' of David; when he pretended to be insane before Abimelech, who drove him out, and he went away.'
  - type: text
    content: I will bless the L
  - type: heading
    content: ord
  - type: text
    content: ' at all times;'
  - type: text
    content: His praise shall continually be in my mouth.
  '10':
  - type: text
    content: The young lions lack [food] and grow hungry,
  - type: text
    content: But they who seek the L
  - type: heading
    content: ord
  - type: text
    content: ' will not lack any good thing.'
  '11':
  - type: text
    content: Come, you children, listen to me;
  - type: text
    content: I will teach you to fear the L
  - type: heading
    content: ord
  - type: text
    content: ' [with awe-inspired reverence and worship Him with obedience].'
  '12':
  - type: text
    content: Who is the man who desires life
  - type: text
    content: And loves many days, that he may see good?
  '13':
  - type: text
    content: Keep your tongue from evil
  - type: text
    content: And your lips from speaking deceit.
  '14':
  - type: text
    content: Turn away from evil and do good;
  - type: text
    content: Seek peace and pursue it.
  '15':
  - type: text
    content: ¶The eyes of the L
  - type: heading
    content: ord
  - type: text
    content: ' are toward the righteous [those with moral courage and spiritual integrity]'
  - type: text
    content: And His ears are open to their cry.
  '16':
  - type: text
    content: The face of the L
  - type: heading
    content: ord
  - type: text
    content: ' is against those who do evil,'
  - type: text
    content: To cut off the memory of them from the earth. [1 Pet 3:10-12]
  '17':
  - type: text
    content: 'When '
  - type: text
    content: the righteous
  - type: text
    content: ' cry [for help], the L'
  - type: heading
    content: ord
  - type: text
    content: ' hears'
  - type: text
    content: 'And rescues them from all their distress '
  - type: text
    content: and
  - type: text
    content: ' troubles.'
  '18':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is near to the heartbroken'
  - type: text
    content: And He saves those who are crushed in spirit (contrite in heart, truly sorry for their sin).
  '19':
  - type: text
    content: '¶Many hardships '
  - type: text
    content: and
  - type: text
    content: ' perplexing circumstances confront the righteous,'
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' rescues him from them all.'
  '2':
  - type: text
    content: My soul makes its boast in the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: 'The humble '
  - type: text
    content: and
  - type: text
    content: ' downtrodden will hear it and rejoice.'
  '20':
  - type: text
    content: He keeps all his bones;
  - type: text
    content: Not one of them is broken. [John 19:33, 36]
  '21':
  - type: text
    content: Evil will cause the death of the wicked,
  - type: text
    content: 'And those who hate the righteous will be held guilty '
  - type: text
    content: and
  - type: text
    content: ' will be condemned.'
  '22':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' redeems the soul of His servants,'
  - type: text
    content: And none of those who take refuge in Him will be condemned.
  '3':
  - type: text
    content: 'O '
  - type: note
    content: The ancient rabbis applied this verse specifically to the saying of grace after a meal and instituted the practice of zimmum (“invitation”) as a religious duty for three or more men who had eaten together. They were to invite one another to say the blessing. One then said the blessing and the others were required to say “Amen” in voices no louder than that of the speaker of the blessing, based on the word together. It was also taught that all the participants in the blessing receive a reward from God.
  - type: text
    content: magnify the L
  - type: heading
    content: ord
  - type: text
    content: ' with me,'
  - type: text
    content: And let us lift up His name together.
  '4':
  - type: text
    content: ¶I sought the L
  - type: heading
    content: ord
  - type: text
    content: ' [on the authority of His word], and He answered me,'
  - type: text
    content: And delivered me from all my fears. [Ps 73:25; Matt 7:7]
  '5':
  - type: text
    content: They looked to Him and were radiant;
  - type: text
    content: 'Their faces will never blush in shame '
  - type: text
    content: or
  - type: text
    content: ' confusion.'
  '6':
  - type: text
    content: This poor man cried, and the L
  - type: heading
    content: ord
  - type: text
    content: ' heard him'
  - type: text
    content: And saved him from all his troubles.
  '7':
  - type: text
    content: 'The '
  - type: note
    content: See note Gen 16:7.
  - type: text
    content: angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' encamps around those who fear Him [with awe-inspired reverence and worship Him with obedience],'
  - type: text
    content: And He rescues [each of] them. [2 Kin 6:8-23; Ps 18:1; 145:20]
  '8':
  - type: text
    content: ¶O taste and see that the L
  - type: heading
    content: ord
  - type: text
    content: ' [our God] is good;'
  - type: text
    content: How blessed [fortunate, prosperous, and favored by God] is the man who takes refuge in Him. [1 Pet 2:2, 3]
  '9':
  - type: text
    content: O [reverently] fear the L
  - type: heading
    content: ord
  - type: text
    content: ', you His saints (believers, holy ones);'
  - type: text
    content: For to those who fear Him there is no want.
