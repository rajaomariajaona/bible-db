document_id: JHN.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Comforts His Disciples
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not let your heart be troubled (afraid, cowardly). Believe
    - type: text
      text: ' [confidently] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'in God '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' trust in Him,'
    - type: text
      text: ' [have faith, hold on to it, rely on it, keep going and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: believe also in Me.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Do you not believe that I am in the Father, and the Father is in Me? The words I say to you I do not say on My own initiative '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' authority, but the Father, abiding '
      - type: usfm
        marker: it
        children:
        - type: text
          text: continually
      - type: text
        text: ' in Me, does His works'
    - type: text
      text: ' [His attesting miracles and acts of power]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Believe Me that I am in the Father and the Father is in Me; otherwise believe
    - type: text
      text: ' [Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because of the
    - type: text
      text: ' [very] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: works themselves
    - type: text
      text: ' [which you have witnessed]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, anyone who believes in Me'
    - type: text
      text: ' [as Savior] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will also do the things that I do; and he will do even greater things than these
    - type: text
      text: ' [in extent and outreach], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because I am going to the Father.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I will do whatever you ask in My name
    - type: text
      text: ' ['
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Acting as Jesus’ representative means that the person calling on His name is in a close relationship with Him and wants what He wants.
      marker-yv: yv-n
    - type: text
      text: 'as My representative], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'this I will do, so that the Father may be glorified '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' celebrated in the Son.'
    - type: text
      text: ' [Ex 3:14] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you ask Me anything in My name
    - type: text
      text: ' [as My representative], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will do it.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'love Me, you will keep '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' obey My commandments.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Role of the Spirit
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And I will ask the Father, and He will give you another '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Paracletos,
        - type: text
          text: ' one called alongside to help.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Helper (Comforter, Advocate, Intercessor—Counselor, Strengthener, Standby), to be with you forever—
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Spirit of Truth, whom the world cannot receive
    - type: text
      text: ' [and take to its heart] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'because it does not see Him or know Him, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: but
      - type: text
        text: ' you know Him because He (the Holy Spirit) remains with you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: continually
      - type: text
        text: ' and will be in you.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I will not leave you as orphans
    - type: text
      text: ' [comfortless, bereaved, and helpless]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will come
    - type: text
      text: ' [back] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to you.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: After a little while the world will no longer see Me, but you will see Me; because I live, you will live also.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In My Father’s house are many dwelling places. If it were not so, I would have told you, because I am going there to prepare a place for you.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On that day
    - type: text
      text: ' [when that time comes] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'you will know for yourselves that I am in My Father, and you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: are
      - type: text
        text: ' in Me, and I '
      - type: usfm
        marker: it
        children:
        - type: text
          text: am
      - type: text
        text: ' in you.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The person who has My commandments and keeps them is the one who
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: loves Me; and whoever
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: loves Me will be loved by My Father, and I will love him and reveal Myself to him
    - type: text
      text: ' [I will make Myself real to him].” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Judas (not Iscariot) asked Him, “Lord, what has happened that You are going to reveal Yourself to us and not to the world?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If anyone
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: loves Me, he will keep My word (teaching); and My Father will love him, and We will come to him and make Our dwelling place with him.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: One who does not
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: love Me does not keep My words. And the word (teaching) which you hear is not Mine, but is the Father’s who sent Me.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have told you these things while I am still with you.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Paracletos,
        - type: text
          text: ' one called alongside to help.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Helper (Comforter, Advocate, Intercessor—Counselor, Strengthener, Standby), the Holy Spirit, whom the Father will send in My name
    - type: text
      text: ' [in My place, to represent Me and act on My behalf], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will teach you all things. And He will help you remember everything that I have told you.
    - type: text
      text: ' [Matt 5:7, 13, 24, 25; Luke 24:49; John 14:16; Acts 1:4] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Peace I leave with you; My
    - type: text
      text: ' [perfect] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: peace I give to you; not as the world gives do I give to you. Do not let your heart be troubled, nor let it be afraid.
    - type: text
      text: ' [Let My perfect peace calm you in every circumstance and give you courage and strength for every challenge.] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You heard Me tell you, ‘I am going away, and I am coming '
      - type: usfm
        marker: it
        children:
        - type: text
          text: back
      - type: text
        text: ' to you.’ If you'
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: loved Me, you would have rejoiced, because I am going
    - type: text
      text: ' [back] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'to the Father, for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Father and the Son are equal—they share the same essence, but the Father was greater in His heavenly glory than the Son during the Son’s time of subordination as a man, cf 10:30; 17:5.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Father is greater than I.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'I have told you now before it happens, so that when it does take place, you may believe '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' have faith'
    - type: text
      text: ' [in Me]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if I go and prepare a place for you, I will come back again and I will take you to Myself, so that where I am you may be also.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will not speak with you much longer, for the ruler of the world (Satan) is coming. And he has no claim on Me
    - type: text
      text: ' [no power over Me nor anything that he can use against Me]; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but so that the world may know
    - type: text
      text: ' [without any doubt] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that I love the Father, I do exactly as the Father has commanded Me
    - type: text
      text: ' [and act in full agreement with Him]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Get up, let us go from here.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And
    - type: text
      text: ' [to the place] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: where I am going, you know the way.”
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Thomas said to Him, “Lord, we do not know where You are going; so how can we know the way?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The sixth of the memorable “I am” statements. See note 6:35.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Way
    - type: text
      text: ' [to God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the
    - type: text
      text: ' [real] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truth and the
    - type: text
      text: ' [real] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Life; no one comes to the Father but through Me.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus’ Oneness with the Father
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you had
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: known Me, you would also have known My Father. From now on you know Him, and have seen Him.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Philip said to Him, “Lord, show us the Father and then we will be satisfied.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Have I been with you for so long a time, and you do not know Me yet, Philip, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nor
      - type: text
        text: ' recognize clearly who I am? Anyone who has seen Me has seen the Father. How can you say, ‘Show us the Father?’'
    - type: text
      text: ' '
