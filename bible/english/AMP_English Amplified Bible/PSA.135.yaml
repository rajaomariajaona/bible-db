segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 135
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Wonderful Works. Vanity of Idols.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!)'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise Him, O servants of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' (priests, Levites),'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You who stand in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the courts of the house of our God,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is good;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sing praises to His name, for it is gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovely.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has chosen [the descendants of] Jacob for Himself,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Israel for His own special treasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' possession. [Deut 7:6]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶For I know that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is great'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And that our Lord is above all gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Whatever the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' pleases, He does,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the heavens and on the earth, in the seas and all deeps—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who causes the clouds to rise from the ends of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who makes lightning for the rain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who brings the wind from His storehouses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶Who struck the firstborn of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Both of man and animal; [Ex 12:12, 29; Ps 78:51; 136:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who sent signs and wonders into your midst, O Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon Pharaoh and all his servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who struck many nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: And killed mighty kings,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sihon, king of the Amorites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Og, king of Bashan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the kingdoms of Canaan;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And He gave their land as a heritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A heritage to Israel His people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your name, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', endures forever,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Your fame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' remembrance, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', [endures] throughout all generations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will judge His people'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will have compassion on His servants [revealing His mercy]. [Heb 10:30]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The idols of the nations are silver and gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The work of men’s hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They have mouths, but they do not speak;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have eyes, but they do not see;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They have ears, but they do not hear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor is there any breath in their mouths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Those who make idols are like them [absolutely worthless—spiritually blind, deaf, and powerless];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So is everyone who trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relies on them. [Ps 115:4-8]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '¶O house of Israel, bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with gratitude];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O house of Aaron, bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: O house of Levi, bless the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [and worship Him with obedience], bless the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [with grateful praise]! [Deut 6:5; Ps 31:23]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from Zion,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who dwells [with us] at Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!)'
