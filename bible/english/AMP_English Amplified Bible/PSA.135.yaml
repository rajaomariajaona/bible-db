type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 135
  - type: heading
    content: Praise the Lord’s Wonderful Works. Vanity of Idols.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  - type: text
    content: Praise the name of the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Praise Him, O servants of the L
  - type: heading
    content: ord
  - type: text
    content: ' (priests, Levites),'
  '10':
  - type: text
    content: Who struck many nations
  - type: text
    content: And killed mighty kings,
  '11':
  - type: text
    content: Sihon, king of the Amorites,
  - type: text
    content: Og, king of Bashan,
  - type: text
    content: And all the kingdoms of Canaan;
  '12':
  - type: text
    content: And He gave their land as a heritage,
  - type: text
    content: A heritage to Israel His people.
  '13':
  - type: text
    content: Your name, O L
  - type: heading
    content: ord
  - type: text
    content: ', endures forever,'
  - type: text
    content: 'Your fame '
  - type: text
    content: and
  - type: text
    content: ' remembrance, O L'
  - type: heading
    content: ord
  - type: text
    content: ', [endures] throughout all generations.'
  '14':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' will judge His people'
  - type: text
    content: And He will have compassion on His servants [revealing His mercy]. [Heb 10:30]
  '15':
  - type: text
    content: The idols of the nations are silver and gold,
  - type: text
    content: The work of men’s hands.
  '16':
  - type: text
    content: They have mouths, but they do not speak;
  - type: text
    content: They have eyes, but they do not see;
  '17':
  - type: text
    content: They have ears, but they do not hear,
  - type: text
    content: Nor is there any breath in their mouths.
  '18':
  - type: text
    content: Those who make idols are like them [absolutely worthless—spiritually blind, deaf, and powerless];
  - type: text
    content: 'So is everyone who trusts in '
  - type: text
    content: and
  - type: text
    content: ' relies on them. [Ps 115:4-8]'
  '19':
  - type: text
    content: '¶O house of Israel, bless '
  - type: text
    content: and
  - type: text
    content: ' praise the L'
  - type: heading
    content: ord
  - type: text
    content: ' [with gratitude];'
  - type: text
    content: O house of Aaron, bless the L
  - type: heading
    content: ord
  - type: text
    content: ;
  '2':
  - type: text
    content: You who stand in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: In the courts of the house of our God,
  '20':
  - type: text
    content: O house of Levi, bless the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: You who fear the L
  - type: heading
    content: ord
  - type: text
    content: ' [and worship Him with obedience], bless the L'
  - type: heading
    content: ord
  - type: text
    content: ' [with grateful praise]! [Deut 6:5; Ps 31:23]'
  '21':
  - type: text
    content: Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ' from Zion,'
  - type: text
    content: Who dwells [with us] at Jerusalem.
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  '3':
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: ', for the L'
  - type: heading
    content: ord
  - type: text
    content: ' is good;'
  - type: text
    content: 'Sing praises to His name, for it is gracious '
  - type: text
    content: and
  - type: text
    content: ' lovely.'
  '4':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has chosen [the descendants of] Jacob for Himself,'
  - type: text
    content: 'Israel for His own special treasure '
  - type: text
    content: and
  - type: text
    content: ' possession. [Deut 7:6]'
  '5':
  - type: text
    content: ¶For I know that the L
  - type: heading
    content: ord
  - type: text
    content: ' is great'
  - type: text
    content: And that our Lord is above all gods.
  '6':
  - type: text
    content: Whatever the L
  - type: heading
    content: ord
  - type: text
    content: ' pleases, He does,'
  - type: text
    content: In the heavens and on the earth, in the seas and all deeps—
  '7':
  - type: text
    content: Who causes the clouds to rise from the ends of the earth;
  - type: text
    content: Who makes lightning for the rain,
  - type: text
    content: Who brings the wind from His storehouses;
  '8':
  - type: text
    content: ¶Who struck the firstborn of Egypt,
  - type: text
    content: Both of man and animal; [Ex 12:12, 29; Ps 78:51; 136:10]
  '9':
  - type: text
    content: Who sent signs and wonders into your midst, O Egypt,
  - type: text
    content: Upon Pharaoh and all his servants.
