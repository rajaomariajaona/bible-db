document_id: JOS.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Memorial Stones from Jordan
  - type: text
    content: So it was when all the nation had finished crossing the Jordan, the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, '
  '10':
  - type: text
    content: For the priests who carried the ark were standing in the midst of the Jordan until everything was finished that the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Joshua to tell the people, in accordance with everything that Moses had commanded Joshua. The people hurried and crossed [the dry riverbed]; '
  '11':
  - type: text
    content: and when all the people had finished crossing, the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the priests crossed over in the presence of the people. '
  '12':
  - type: text
    content: 'The sons of Reuben and the sons of Gad and half the tribe of Manasseh crossed over armed for battle before the [other] sons of Israel, just as Moses had spoken to them; '
  '13':
  - type: text
    content: 'about 40,000 [men] armed '
  - type: text
    content: and
  - type: text
    content: ' equipped for war crossed for battle before the L'
  - type: heading
    content: ord
  - type: text
    content: ' to the desert plains of Jericho.'
  '14':
  - type: text
    content: On that day the L
  - type: heading
    content: ord
  - type: text
    content: ' magnified '
  - type: text
    content: and
  - type: text
    content: ' exalted Joshua in the sight of all Israel; so they feared him [with profound awe and reverence], just as they had feared Moses all the days of his life.'
  '15':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, '
  '16':
  - type: text
    content: '“Order the priests carrying the ark of the Testimony to come up out of the Jordan.” '
  '17':
  - type: text
    content: 'So Joshua commanded the priests, saying, “Come up out of the Jordan.” '
  '18':
  - type: text
    content: When the priests who carried the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' had come up from the midst of the Jordan, and the soles of their feet were raised up to the dry land, the waters of the Jordan returned to their place, and flowed over all its banks as before.'
  '19':
  - type: text
    content: 'Now the people came up from the Jordan on the tenth [day] of the first month and encamped at Gilgal on the eastern border of Jericho. '
  '2':
  - type: text
    content: '“Take for yourselves the twelve men [chosen] from among the people, one man from each tribe, '
  '20':
  - type: text
    content: 'And those twelve stones which they had taken from the Jordan, Joshua set up in Gilgal. '
  '21':
  - type: text
    content: 'He said to the sons of Israel, “When your children ask their fathers in time to come, ‘What do these stones mean?’ '
  '22':
  - type: text
    content: 'then you shall let your children know, ‘Israel crossed this Jordan on dry ground.’ '
  '23':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' your God dried up the waters of the Jordan for you until you crossed over, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God did to the Red Sea, which He dried up before us until we had crossed; '
  '24':
  - type: text
    content: 'so that all the peoples of the earth may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that the hand of the L'
  - type: heading
    content: ord
  - type: text
    content: ' is mighty '
  - type: text
    content: and
  - type: text
    content: ' extraordinarily powerful, so that you will fear the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God [and obey and worship Him with profound awe and reverence] forever.”'
  '3':
  - type: text
    content: 'and command them, ‘Pick up for yourselves twelve stones [one each] from here out of the midst of the Jordan, from the place where the priests’ feet are standing firm; carry them over with you and lay them down at the place where you will spend the night tonight.’ ” '
  '4':
  - type: text
    content: 'Then Joshua called the twelve men whom he had appointed from the sons of Israel, one man from each tribe; '
  '5':
  - type: text
    content: and Joshua said to them, “Cross over again to the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God into the midst of the Jordan, and each of you take up a stone on his shoulder, according to the number of the tribes of the sons of Israel, '
  '6':
  - type: text
    content: 'so that this may be a sign among you; when your children ask later, ‘What do these stones mean to you?’ '
  '7':
  - type: text
    content: then you shall say to them that the waters of the Jordan were cut off before the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ; when it crossed the Jordan, the waters of the Jordan were cut off. So these stones shall become a memorial for Israel forever.”
  '8':
  - type: text
    content: So the [twelve men chosen from the] sons of Israel did as Joshua commanded, and took up twelve stones out of the midst of the Jordan, according to the number of the tribes of the sons of Israel, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had spoken to Joshua; and they carried them over with them to the place where they were spending the night and put them down there. '
  '9':
  - type: text
    content: 'Then Joshua set up [a second monument of] twelve stones in the midst of the Jordan at the place where the feet of the priests who carried the ark of the covenant were standing, and they are there to this day. '
