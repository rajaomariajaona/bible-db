  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶May all those who seek You [as life’s first priority] rejoice and be glad in You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: May those who love Your salvation say continually,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let God be magnified!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But I am afflicted and needy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come quickly to me, O God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my help and my rescuer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
