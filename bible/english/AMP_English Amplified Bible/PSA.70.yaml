document_id: PSA.70,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 70
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Help against Persecutors.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David, to bring to remembrance.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: come quickly
    - type: text
      text: ' to save me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', come quickly to help me!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those be ashamed and humiliated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who seek my life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be turned back and humiliated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who delight in my hurt.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them be turned back because of their shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgrace'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who say, “Aha, aha!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶May all those who seek You [as life’s first priority] rejoice and be glad in You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who love Your salvation say continually,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let God be magnified!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am afflicted and needy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come quickly to me, O God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my help and my rescuer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', do not delay.'
