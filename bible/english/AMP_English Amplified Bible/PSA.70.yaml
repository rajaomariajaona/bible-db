verses:
  '1':
  - type: heading
    content: Psalm 70
  - type: heading
    content: Prayer for Help against Persecutors.
  - type: text
    content: 'To the Chief Musician. '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David, to bring to remembrance.'
  - type: text
    content: 'O God, '
  - type: text
    content: come quickly
  - type: text
    content: ' to save me;'
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', come quickly to help me!'
  '2':
  - type: text
    content: Let those be ashamed and humiliated
  - type: text
    content: Who seek my life;
  - type: text
    content: Let them be turned back and humiliated
  - type: text
    content: Who delight in my hurt.
  '3':
  - type: text
    content: 'Let them be turned back because of their shame '
  - type: text
    content: and
  - type: text
    content: ' disgrace'
  - type: text
    content: Who say, “Aha, aha!”
  '4':
  - type: text
    content: ¶May all those who seek You [as life’s first priority] rejoice and be glad in You;
  - type: text
    content: May those who love Your salvation say continually,
  - type: text
    content: “Let God be magnified!”
  '5':
  - type: text
    content: But I am afflicted and needy;
  - type: text
    content: Come quickly to me, O God!
  - type: text
    content: You are my help and my rescuer;
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', do not delay.'
