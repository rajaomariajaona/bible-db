    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Woe to me, my mother, that you have given birth to me
- type: usfm
  marker: q1
  children:
  - type: text
    text: To be a man of strife and a man of contention to all the earth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have not loaned, nor have men lent money to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet everyone curses me. [Jer 1:18, 19]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “Surely [it will go well for Judah’s obedient remnant for] I will set you free for good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: purposes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely [Jeremiah] I will [intercede for you with the enemy and I will] cause the enemy to plead with you [for help]
- type: usfm
  marker: q1
  children:
  - type: text
    text: In a time of disaster and a time of distress. [Jer 21:1, 2; 37:3; 42:2; Rom 8:28]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“Can anyone crush iron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The iron from the north, or bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Your [nation’s] riches and your treasures
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give as plunder without price [to the Babylonians],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of all your sins
- type: usfm
  marker: q1
  children:
  - type: text
    text: And within all your territories.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Then I will make your enemies bring [you along with] your possessions
- type: usfm
  marker: q1
  children:
  - type: text
    text: Into a land which you do not know [for there you will serve your conquerors];
- type: usfm
  marker: q1
  children:
  - type: text
    text: For a fire has been kindled in My anger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which will burn upon you.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jeremiah’s Prayer and God’s Answer
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember me [thoughtfully], take notice of me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: take vengeance for me on my persecutors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not, in view of Your patience, take me away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Know that for Your sake I endure [continual] rebuke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonor.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your words were found and I ate them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your words became a joy to me and the delight of my heart;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I have been called by Your name,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I did not sit with the group of those who celebrate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor did I rejoice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I sat alone because Your [powerful] hand was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: upon me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You had filled me with indignation [at their sin].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Why has my pain been perpetual
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my wound incurable, refusing to be healed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will you indeed be to me like a deceptive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: brook
- type: usfm
  marker: q1
  children:
  - type: text
    text: With water that is unreliable?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [to Jeremiah],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “If you repent [and give up this mistaken attitude of despair and self-pity], then I will restore you [to a state of inner peace]
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that you may stand before Me [as My obedient representative];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if you separate the precious from the worthless [examining yourself and cleansing your heart from unwarranted doubt concerning My faithfulness],
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will become My spokesman.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the people turn to you [and learn to value My values]—
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you, you must not turn to them [with regard for their idolatry and wickedness].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “And I will make you to this people
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fortified wall of bronze;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will fight against you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they will not prevail over you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am with you [always] to save you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
