    marker-yv: yv-n
  - type: text
    text: destroyer at noonday;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will suddenly cause anguish and terror
- type: usfm
  marker: q1
  children:
  - type: text
    text: To fall on her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “She who has borne seven [sons] languishes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: She has breathed out her soul.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her sun has set while it was still day;
- type: usfm
  marker: q1
  children:
  - type: text
    text: She has been shamed and humiliated.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I will hand over [the rest of] the survivors to the sword
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before their enemies,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
