    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Even though Moses and Samuel were to stand before Me [interceding for them], My heart would still not be [turned with favor] toward this people [Judah]. Send them away from My presence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' out of My sight and let them go! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And it shall be that when they say to you, ‘Where should we go?’ then tell them, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Those [destined] for death, to death;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those for the sword, to the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those for famine, to famine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those for captivity, to captivity.” ’
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will appoint four kinds of destroyers over them,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “the sword to slay, the dogs to tear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drag away, and the birds of the air and the beasts of the earth to devour and to destroy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will make them an object of horror to all nations of the earth because of Manasseh [the despicable] son of Hezekiah, king of Judah, for the [evil and detestable] things which he did in Jerusalem. [2 Kin 21:1-18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶“For who will have pity on you, O Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or who will mourn for you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or who will turn aside to ask about your welfare?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “You have abandoned (rejected) Me,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You keep going backward.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore I shall stretch out My hand against you and destroy you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am tired of delaying [your punishment]!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “I will winnow (sort, separate) them with a winnowing fork
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the gates of the land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will deprive them of children, I will destroy My people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They did not repent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turn from their [evil] ways.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I will make their widows more numerous before Me
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than the sand of the seas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring against them, against the mother of the young men,
