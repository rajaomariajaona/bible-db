  - type: text
    text: protect you,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “So I will rescue you out of the hand of the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will redeem you from the [grasping] palm of the terrible '
  - type: usfm
