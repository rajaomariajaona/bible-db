document_id: PSA.60,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 60
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lament over Defeat in Battle, and Prayer for Help.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] “The Lily of the Testimony.” A Mikhtam of David [intended to record memorable thoughts and] to teach; when he struggled with the Arameans of Mesopotamia and the Arameans of Zobah, and when Joab returned and struck twelve thousand Edomites in the Valley of Salt.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'O God, You have rejected us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast us off. You have broken [down our defenses and scattered] us;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have been angry; O restore us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' turn again to us.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Have You not rejected us, O God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will You not go out with our armies?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Give us help against the enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the help of man is worthless (ineffectual, without purpose).
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Through God we will have victory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He will trample down our enemies.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have made the land quake, You have split it open;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Heal its rifts, for it shakes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' totters.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You have made Your people experience hardship;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have given us wine to drink that makes us stagger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fall.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You have set up a banner for those who fear You [with awe-inspired reverence and submissive wonder—a banner to shield them from attack],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A banner that may be displayed because of the truth. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: That Your beloved ones may be rescued,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save with Your right hand and answer us.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '¶God has spoken in His holiness [in His promises]:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will rejoice, I will divide [the land of] Shechem and measure out the Valley of Succoth [west to east].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Gilead is Mine, and Manasseh is Mine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim is My helmet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judah is My scepter.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Moab is My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the household pot used for washing the feet.
      marker-yv: yv-n
    - type: text
      text: washbowl;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over Edom I shall throw My shoe [in triumph];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over Philistia I raise the shout [of victory].”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ¶Who will bring me into the besieged city [of Petra]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will lead me to Edom?
