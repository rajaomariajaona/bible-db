document_id: PSA.60,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 60
  - type: heading
    content: Lament over Defeat in Battle, and Prayer for Help.
  - type: text
    content: To the Chief Musician; set to [the tune of] “The Lily of the Testimony.” A Mikhtam of David [intended to record memorable thoughts and] to teach; when he struggled with the Arameans of Mesopotamia and the Arameans of Zobah, and when Joab returned and struck twelve thousand Edomites in the Valley of Salt.
  - type: text
    content: 'O God, You have rejected us '
  - type: text
    content: and
  - type: text
    content: ' cast us off. You have broken [down our defenses and scattered] us;'
  - type: text
    content: 'You have been angry; O restore us '
  - type: text
    content: and
  - type: text
    content: ' turn again to us.'
  '10':
  - type: text
    content: Have You not rejected us, O God?
  - type: text
    content: And will You not go out with our armies?
  '11':
  - type: text
    content: Give us help against the enemy,
  - type: text
    content: For the help of man is worthless (ineffectual, without purpose).
  '12':
  - type: text
    content: Through God we will have victory,
  - type: text
    content: For He will trample down our enemies.
  '2':
  - type: text
    content: You have made the land quake, You have split it open;
  - type: text
    content: 'Heal its rifts, for it shakes '
  - type: text
    content: and
  - type: text
    content: ' totters.'
  '3':
  - type: text
    content: You have made Your people experience hardship;
  - type: text
    content: 'You have given us wine to drink that makes us stagger '
  - type: text
    content: and
  - type: text
    content: ' fall.'
  '4':
  - type: text
    content: You have set up a banner for those who fear You [with awe-inspired reverence and submissive wonder—a banner to shield them from attack],
  - type: text
    content: 'A banner that may be displayed because of the truth. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: That Your beloved ones may be rescued,
  - type: text
    content: Save with Your right hand and answer us.
  '6':
  - type: text
    content: '¶God has spoken in His holiness [in His promises]:'
  - type: text
    content: “I will rejoice, I will divide [the land of] Shechem and measure out the Valley of Succoth [west to east].
  '7':
  - type: text
    content: “Gilead is Mine, and Manasseh is Mine;
  - type: text
    content: Ephraim is My helmet;
  - type: text
    content: Judah is My scepter.
  '8':
  - type: text
    content: '“Moab is My '
  - type: note
    content: I.e. the household pot used for washing the feet.
  - type: text
    content: washbowl;
  - type: text
    content: Over Edom I shall throw My shoe [in triumph];
  - type: text
    content: Over Philistia I raise the shout [of victory].”
  '9':
  - type: text
    content: ¶Who will bring me into the besieged city [of Petra]?
  - type: text
    content: Who will lead me to Edom?
