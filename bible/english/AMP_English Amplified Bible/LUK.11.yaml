document_id: LUK.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Instruction about Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It happened that while Jesus was praying in a certain place, after He finished, one of His disciples said to Him, “Lord, teach us to pray just as John also taught his disciples.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He said to them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“When you pray, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. as a model or pattern.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'say:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Later mss add phrases from Matt 6:9-13 to make the two passages closely similar.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Father, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. set apart, keep and treat as holy, revere.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: hallowed be Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A plea for God’s kingdom to be inaugurated on earth.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your kingdom come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘Give us each day our '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. life’s essentials.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: daily bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘And forgive us our sins,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For we ourselves also forgive everyone who is indebted to us
  - type: text
    text: ' [who has offended or wronged us].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. lead us away from situations where we are vulnerable and have the opportunity to sin. God does not tempt man (see James 1:13) but does allow man to be tested.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lead us not into temptation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Not found in early mss.
    marker-yv: yv-n
  - type: text
    text: '[but rescue us from evil].’ ”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of Persistence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Suppose one of you has a friend, and goes to him at midnight and says, ‘Friend, lend me three loaves
  - type: text
    text: ' [of bread]; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for a friend of mine who is on a journey has just come to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: visit
    - type: text
      text: ' me, and I have nothing to serve him’;'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and from inside he answers, ‘Do not bother me; the door has already been shut and my children and I are in bed; I cannot get up and give you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I tell you, even though he will not get up and give him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything just
    - type: text
      text: ' because he is his friend, yet because of his persistence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' boldness he will get up and give him whatever he needs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“So I say to you, ask '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep on asking, and it will be given to you; seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep on seeking, and you will find; knock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep on knocking, and the door will be opened to you.'
  - type: text
    text: ' [Matt 7:7-11] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For everyone who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Here the use of Greek present imperatives (asking, seeking, knocking; vv 9, 10) emphasizes persistent, constant prayer.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: keeps on asking
  - type: text
    text: ' [persistently], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: receives; and he who keeps on seeking
  - type: text
    text: ' [persistently], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: finds; and to him who keeps on knocking
  - type: text
    text: ' [persistently], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the door will be opened.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What father among you, if his son asks for a fish, will give him a snake instead of a fish?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or if he asks for an egg, will give him a scorpion?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you, then, being evil
  - type: text
    text: ' [that is, sinful by nature], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'know how to give good gifts to your children, how much more will your heavenly Father give the Holy Spirit to those who ask '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continue to ask Him!”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pharisees’ Blasphemy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And [at another time] Jesus was casting out a demon, and it was [controlling a man so as to make him] mute; when the demon had gone out, the mute man spoke. And the crowds were awed. [Matt 12:22-24] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But some of them said, “He drives out demons by [the power of] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'I.e. a deity worshiped in the Philistine city of Ekron: Baal Zebul, lord of the high places or Baal Zebub, lord of the flies.'
    marker-yv: yv-n
  - type: text
    text: 'Beelzebul (Satan), the ruler of the demons.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Others, trying to test Him, were demanding of Him a sign from heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But He, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: well
  - type: text
    text: ' aware of their thoughts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' purpose, said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Every kingdom divided against itself is doomed to destruction; and a house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: divided
    - type: text
      text: ' against itself falls.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If Satan also is divided against himself, how will his kingdom stand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continue to survive? For you are saying that I drive out demons by'
  - type: text
    text: ' [the power of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Beelzebul.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now if I drive out the demons by Beelzebul, by whom do your sons
  - type: text
    text: ' [the Jewish exorcists] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: drive them out? For this reason they will be your judges.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But if I drive out the demons by the finger of God, then '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. in the person and ministry of Jesus.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the kingdom of God has already come upon you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'When the strong man, fully armed, guards his own house, his belongings are undisturbed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secure.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But when someone stronger than he attacks and overpowers him, he robs him of all his armor on which he had relied and divides his
  - type: text
    text: ' [goods as] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: spoil.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He who is not with Me
  - type: text
    text: ' [believing in Me as Lord and Savior] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is against Me
  - type: text
    text: ' [there is no impartial position]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and he who does not gather with Me
  - type: text
    text: ' [assisting in My ministry], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: scatters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When the unclean spirit comes out of a person, it roams through waterless places in search
  - type: text
    text: ' [of a place] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of rest; and not finding any, it says, ‘I will go back to my house (person) from which I came.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when it comes, it finds the place swept and put in order.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then it goes and brings seven other spirits more evil than itself, and they go in
  - type: text
    text: ' [the person] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and live there; and the last state of that person becomes worse than the first.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now while Jesus was saying these things, one of the women in the crowd raised her voice and said to Him, “Blessed (happy, favored by God) is the womb that gave birth to You and the breasts at which You nursed!” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “On the contrary, blessed (happy, favored by God) are those who hear the word of God and continually observe it.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sign of Jonah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now as the crowds were increasing [in number], He began to say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This
  - type: text
    text: ' [present] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: generation is a wicked generation; it seeks a sign (attesting miracle), but no sign will be given to it except the sign of Jonah
  - type: text
    text: ' [the prophet]. [Matt 12:39-42] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For just as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jonah spent three days in the belly of the great fish; Christ was resurrected three days after His death.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Jonah became a sign to the people of Nineveh, so will the Son of Man also be
  - type: text
    text: ' [a sign] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to this generation.
  - type: text
    text: ' [Jon 3:4-10] '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Queen of the South (the kingdom of Sheba) will rise up in the judgment with the men of this generation and condemn them, because she came from the ends of the earth to listen to the wisdom of Solomon, and look, something greater than Solomon is here.
  - type: text
    text: ' [1 Kin 10:1-13; 2 Chr 9:1-12] '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The men of Nineveh will stand up
  - type: text
    text: ' [as witnesses] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: at the judgment with this generation and condemn it, because they repented at the preaching of Jonah, and look, something greater than Jonah is here.
  - type: text
    text: ' [Jon 3:5]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
