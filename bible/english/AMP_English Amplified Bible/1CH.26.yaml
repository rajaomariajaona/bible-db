document_id: 1CH.26,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Divisions of the Gatekeepers
  - type: text
    content: 'For the divisions of the gatekeepers: Of the Korahites: Meshelemiah the son of Kore, of the sons of Asaph. '
  '10':
  - type: text
    content: 'Also Hosah, one of the sons of Merari, had sons: Shimri the first '
  - type: text
    content: and
  - type: text
    content: ' chief (although he was not the firstborn, his father made him first), '
  '11':
  - type: text
    content: Hilkiah the second, Tebaliah the third, Zechariah the fourth; the sons and relatives of Hosah were thirteen in all.
  '12':
  - type: text
    content: 'To these divisions of the gatekeepers, the chief men, '
  - type: text
    content: were given
  - type: text
    content: ' duties, like their relatives, to minister in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'They cast lots, the small (younger) and great (older) alike, in accordance with their fathers’ households, for every gate. '
  '14':
  - type: text
    content: 'The lot for the east [gates] fell to Shelemiah. They cast lots also for his son Zechariah, a wise counselor, and his lot came out for the north [gates]. '
  '15':
  - type: text
    content: 'To Obed-edom [it came out] for the south [gates], and the storehouse '
  - type: text
    content: was allotted
  - type: text
    content: ' to his sons. '
  '16':
  - type: text
    content: 'To Shuppim and Hosah [the lot fell] for the west [gates], by the gate of Shallecheth, on the ascending highway, division by division. '
  '17':
  - type: text
    content: 'On the east were six Levites, on the north four a day, on the south four a day, and two by two at the storehouse. '
  '18':
  - type: text
    content: 'At the '
  - type: note
    content: Heb Parbar, possibly an annex or open meeting place.
  - type: text
    content: 'colonnade on the west side [of the outer court of the temple] '
  - type: text
    content: there were
  - type: text
    content: ' four at the road and two at the colonnade. '
  '19':
  - type: text
    content: These were the divisions of the gatekeepers among the Korahites and the sons of Merari.
  - type: heading
    content: Keepers of the Treasure
  '2':
  - type: text
    content: 'Meshelemiah had sons: Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  '20':
  - type: text
    content: 'Of the Levites, Ahijah was in charge of the treasuries of the house of God and the treasuries of the dedicated gifts. '
  '21':
  - type: text
    content: 'The sons of Ladan, the sons of the Gershonites belonging to Ladan, '
  - type: text
    content: namely,
  - type: text
    content: ' the Jehielites, '
  - type: text
    content: were
  - type: text
    content: ' the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ', belonging to Ladan the Gershonite.'
  '22':
  - type: text
    content: The sons of Jehieli, Zetham and his brother Joel, were in charge of the treasuries of the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Of the Amramites, Izharites, Hebronites, and Uzzielites: '
  '24':
  - type: text
    content: 'Shebuel the son of Gershom, the son of Moses, was supervisor over the treasuries. '
  '25':
  - type: text
    content: 'His relatives by Eliezer were his son Rehabiah, his son Jeshaiah, his son Joram, his son Zichri, and his son Shelomoth. '
  '26':
  - type: text
    content: 'This Shelomoth and his relatives were in charge of all the treasuries of the dedicated gifts which King David, the heads of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ', the commanders of thousands and hundreds, and the commanders of the army, had dedicated. '
  '27':
  - type: text
    content: 'From spoil won in battles they dedicated '
  - type: text
    content: gifts
  - type: text
    content: ' to maintain '
  - type: text
    content: and
  - type: text
    content: ' repair the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Also all that Samuel the seer had dedicated, and Saul the son of Kish, Abner the son of Ner and Joab the son of Zeruiah, everyone who had dedicated '
  - type: text
    content: anything,
  - type: text
    content: ' this was in the care of Shelomoth and his relatives.'
  - type: heading
    content: Outside Duties
  '29':
  - type: text
    content: 'Of the Izharites: Chenaniah and his sons were '
  - type: text
    content: appointed
  - type: text
    content: ' to outside duties for Israel, as administrators and judges. '
  '3':
  - type: text
    content: 'Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh. '
  '30':
  - type: text
    content: 'Of the Hebronites: Hashabiah and his relatives, 1,700 capable men, were in charge of the affairs of Israel west of the Jordan, for all the work of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and the service of the king. '
  '31':
  - type: text
    content: 'Of the Hebronites: Jerijah was the chief (these Hebronites were examined according to their descendants and fathers’ '
  - type: text
    content: households
  - type: text
    content: ' in the fortieth [and final] year of David’s reign, and men of courage '
  - type: text
    content: and
  - type: text
    content: ' ability were found among them at Jazer in Gilead) '
  '32':
  - type: text
    content: 'and Jerijah’s relatives, 2,700 capable men, were heads of fathers’ '
  - type: text
    content: households;
  - type: text
    content: ' and King David made them overseers of the Reubenites, the Gadites, and the half-tribe of Manasseh, for everything pertaining to God and to the king.'
  '4':
  - type: text
    content: 'Obed-edom had sons: Shemaiah the firstborn, Jehozabad the second, Joah the third, Sacar the fourth, Nethanel the fifth, '
  '5':
  - type: text
    content: 'Ammiel the sixth, Issachar the seventh, Peullethai the eighth; for God had blessed him. '
  '6':
  - type: text
    content: 'Also to his son Shemaiah sons were born who ruled over the house of their father, for they were courageous men of ability. '
  '7':
  - type: text
    content: 'The sons of Shemaiah: Othni, Rephael, Obed, and Elzabad, whose brothers were courageous '
  - type: text
    content: and
  - type: text
    content: ' able men, Elihu and Semachiah. '
  '8':
  - type: text
    content: 'All these were sons of Obed-edom [in whose house the ark was kept], they and their sons and relatives, strong '
  - type: text
    content: and
  - type: text
    content: ' able men for the service—sixty-two from Obed-edom. [1 Chr 13:13, 14] '
  '9':
  - type: text
    content: 'Meshelemiah had sons and relatives, eighteen courageous men. '
