document_id: 1CH.26,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Divisions of the Gatekeepers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'For the divisions of the gatekeepers: Of the Korahites: Meshelemiah the son of Kore, of the sons of Asaph. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Also Hosah, one of the sons of Merari, had sons: Shimri the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chief (although he was not the firstborn, his father made him first), '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hilkiah the second, Tebaliah the third, Zechariah the fourth; the sons and relatives of Hosah were thirteen in all.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'To these divisions of the gatekeepers, the chief men, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were given
    - type: text
      text: ' duties, like their relatives, to minister in the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'They cast lots, the small (younger) and great (older) alike, in accordance with their fathers’ households, for every gate. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The lot for the east [gates] fell to Shelemiah. They cast lots also for his son Zechariah, a wise counselor, and his lot came out for the north [gates]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'To Obed-edom [it came out] for the south [gates], and the storehouse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was allotted
    - type: text
      text: ' to his sons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'To Shuppim and Hosah [the lot fell] for the west [gates], by the gate of Shallecheth, on the ascending highway, division by division. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On the east were six Levites, on the north four a day, on the south four a day, and two by two at the storehouse. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'At the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Parbar,
        - type: text
          text: ' possibly an annex or open meeting place.'
      marker-yv: yv-n
    - type: text
      text: 'colonnade on the west side [of the outer court of the temple] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there were
    - type: text
      text: ' four at the road and two at the colonnade. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: These were the divisions of the gatekeepers among the Korahites and the sons of Merari.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Keepers of the Treasure
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Meshelemiah had sons: Zechariah the firstborn, Jediael the second, Zebadiah the third, Jathniel the fourth, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Of the Levites, Ahijah was in charge of the treasuries of the house of God and the treasuries of the dedicated gifts. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The sons of Ladan, the sons of the Gershonites belonging to Ladan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: namely,
    - type: text
      text: ' the Jehielites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ', belonging to Ladan the Gershonite.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The sons of Jehieli, Zetham and his brother Joel, were in charge of the treasuries of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Of the Amramites, Izharites, Hebronites, and Uzzielites: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Shebuel the son of Gershom, the son of Moses, was supervisor over the treasuries. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'His relatives by Eliezer were his son Rehabiah, his son Jeshaiah, his son Joram, his son Zichri, and his son Shelomoth. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'This Shelomoth and his relatives were in charge of all the treasuries of the dedicated gifts which King David, the heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ', the commanders of thousands and hundreds, and the commanders of the army, had dedicated. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'From spoil won in battles they dedicated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gifts
    - type: text
      text: ' to maintain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repair the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Also all that Samuel the seer had dedicated, and Saul the son of Kish, Abner the son of Ner and Joab the son of Zeruiah, everyone who had dedicated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything,
    - type: text
      text: ' this was in the care of Shelomoth and his relatives.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Outside Duties
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Of the Izharites: Chenaniah and his sons were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' to outside duties for Israel, as administrators and judges. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Elam the fifth, Jehohanan the sixth, Eliehoenai the seventh. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Of the Hebronites: Hashabiah and his relatives, 1,700 capable men, were in charge of the affairs of Israel west of the Jordan, for all the work of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and the service of the king. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Of the Hebronites: Jerijah was the chief (these Hebronites were examined according to their descendants and fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' in the fortieth [and final] year of David’s reign, and men of courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ability were found among them at Jazer in Gilead) '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'and Jerijah’s relatives, 2,700 capable men, were heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households;
    - type: text
      text: ' and King David made them overseers of the Reubenites, the Gadites, and the half-tribe of Manasseh, for everything pertaining to God and to the king.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Obed-edom had sons: Shemaiah the firstborn, Jehozabad the second, Joah the third, Sacar the fourth, Nethanel the fifth, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ammiel the sixth, Issachar the seventh, Peullethai the eighth; for God had blessed him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Also to his son Shemaiah sons were born who ruled over the house of their father, for they were courageous men of ability. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The sons of Shemaiah: Othni, Rephael, Obed, and Elzabad, whose brothers were courageous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' able men, Elihu and Semachiah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All these were sons of Obed-edom [in whose house the ark was kept], they and their sons and relatives, strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' able men for the service—sixty-two from Obed-edom. [1 Chr 13:13, 14] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Meshelemiah had sons and relatives, eighteen courageous men. '
