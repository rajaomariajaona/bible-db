document_id: NUM.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties of Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Aaron, “You and your sons and your father’s household (family) with you shall bear the guilt in connection with the sanctuary [that is, through your service as priests you will atone for the offenses which the people unknowingly commit when brought into contact with the manifestations of God’s presence]; and you and your sons with you shall bear the guilt in connection with your priesthood [that is, your own unintentional offenses]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'You shall eat it as the most holy thing; every male [of your family] shall eat it. It shall be holy to you. [Lev 22:10-16] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'This also is yours: the heave offering of their gift, including all the wave offerings of the Israelites. I have given them to you and to your sons and to your daughters with you as a continual allotment; everyone in your household who is [ceremonially] clean may eat it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: All the best of the fresh [olive] oil, and all the best of the new wine and of the grain, the first fruits of those which they give to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I give them to you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The first ripe fruits of all that is in the land, which they bring to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', shall be yours; everyone in your household who is [ceremonially] clean may eat it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Every devoted thing in Israel [everything that has been promised to the Lord with an oath] shall be yours. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Every firstborn of the womb of all flesh, whether it is man or animal, which they bring to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', shall be yours; nevertheless, the firstborn of man you shall most certainly redeem, and the firstborn of unclean animals you shall redeem. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And their redemption price, from a month old you shall redeem, according to your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Since the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: price
        - type: text
          text: ' is set at '
        - type: usfm
          marker: it
          children:
          - type: text
            text: five shekels,
        - type: text
          text: ' this term is not to be understood here as an ordinary appraisal (which could vary), but probably refers to the priest’s estimation of whether the item qualifies for redemption.'
      marker-yv: yv-n
    - type: text
      text: 'valuation, for the [fixed] price of five shekels in silver, in accordance with the shekel of the sanctuary, which is twenty gerahs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But the firstborn of a cow or of a sheep or of a goat you shall not redeem; they are holy [and belong to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ']. You shall sprinkle their blood on the altar and shall offer up their fat in smoke as an offering by fire, for a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Their meat shall be yours, like the breast of a wave offering and like the right thigh. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: All the offerings of the holy things, which the Israelites offer to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' I have given to you and to your sons and your daughters with you as a continual allotment. It is an everlasting covenant of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Salt was symbolic of preservation, and here permanence.
      marker-yv: yv-n
    - type: text
      text: salt [that cannot be dissolved or violated] before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to you and to your descendants with you.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But bring with you also your brothers, the tribe of Levi, the tribe of your father (ancestor), so that they may join with you and serve you [as assistants], while you and your sons with you are before the Tent of the Testimony [the Holy Place where only priests may go, and the Most Holy Place which only the high priest may enter]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Aaron, “You shall have no inheritance in the land [of the Israelites], nor have any portion [of land] among them. I am your portion and your inheritance among the children of Israel.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Behold, I have given the Levites all the tithe in Israel as an inheritance, in return for their service which they perform, the service of the Tent of Meeting (tabernacle). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The Israelites shall never again approach the Tent of Meeting [the covered sanctuary, the Holy Place, and the Holy of Holies], or they [who do] will incur sin and die. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Only the Levites shall perform the service of the Tent of Meeting (tabernacle), and they shall bear their iniquity; it shall be a statute forever throughout your generations, that the Levites shall have no inheritance [of land] among the children of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But the tithe of the Israelites, which they present as an offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I have given to the Levites as an inheritance; therefore I have said to them, ‘They shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They would have homes, cities, and pasture land to use, but not to possess as a personal inheritance.
      marker-yv: yv-n
    - type: text
      text: have no inheritance among the children of Israel.’ ”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “Moreover, you shall speak to the Levites and say to them, ‘When you take from the Israelites the tithe which I have given to you from them as your inheritance, then you shall present an offering from it to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', a tithe of the tithe [paid by the people]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Your offering shall be credited to you as the grain from the threshing floor or as the full produce from the wine vat. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Likewise you shall also present an offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' from all your tithes, which you receive from the Israelites; and from it you shall give the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offering to Aaron the priest. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Out of all your gifts, you shall present every offering due to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from all the best of it, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' the sacred part from them.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the Levites shall attend to your duty [as assistants] and to the duties of all the tent (tabernacle); only they shall not approach the articles of the sanctuary and the altar, or both they and you will die. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Therefore you shall say to them, ‘When you have offered the best from it, then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rest
    - type: text
      text: ' shall be credited to the Levites as the product of the threshing floor, and as the product of the wine vat. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'You may eat it anywhere, you and [the members of] your households, for it is your compensation in return for your service in the Tent of Meeting (tabernacle). '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: You will bear no sin because of it when you have offered the best of it; but you shall not profane the sacred gifts of the children of Israel, or you will die [because of it].’ ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They shall join you and attend to the duties of the Tent of Meeting—all the service of the tent—and no stranger [no layman, anyone who is not a Levite] may approach you [and your sons]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So you shall attend to the duties of the sanctuary and the duties of the altar [of burnt offering and the altar of incense], so that there will no longer be wrath on the Israelites [as with Korah, Dathan, and Abiram]. [Num 16:42-50] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Behold, I Myself have taken your fellow Levites from among the sons of Israel; they are a gift to you, given (dedicated) to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to do the service for the Tent of Meeting (tabernacle). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Therefore you and your sons with you shall attend to your priesthood for everything concerning the altar [of burnt offering and the altar of incense] and [of the Holy of Holies] within the veil, and you are to serve. I am giving you the priesthood as a bestowed service, but the stranger (outsider, layman) who approaches shall be put to death.” [Ex 40:18, 20, 26]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Priests’ Portion
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Aaron, “Now behold, I [the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] have entrusted you with My heave offerings, even all the holy gifts of the Israelites, I have given them to you as a portion, and to your sons as a continual allotment. [Lev 7:35] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'This shall be yours of the most holy things, [reserved] from the fire: every offering of the people, every grain offering and sin offering and guilt offering, which they shall render (give) to Me, shall be most holy for you and for your sons. '
