document_id: NUM.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of Levites
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Aaron, “You and your sons and your father’s household (family) with you shall bear the guilt in connection with the sanctuary [that is, through your service as priests you will atone for the offenses which the people unknowingly commit when brought into contact with the manifestations of God’s presence]; and you and your sons with you shall bear the guilt in connection with your priesthood [that is, your own unintentional offenses]. '
  '10':
  - type: text
    content: 'You shall eat it as the most holy thing; every male [of your family] shall eat it. It shall be holy to you. [Lev 22:10-16] '
  '11':
  - type: text
    content: 'This also is yours: the heave offering of their gift, including all the wave offerings of the Israelites. I have given them to you and to your sons and to your daughters with you as a continual allotment; everyone in your household who is [ceremonially] clean may eat it. '
  '12':
  - type: text
    content: All the best of the fresh [olive] oil, and all the best of the new wine and of the grain, the first fruits of those which they give to the L
  - type: heading
    content: ord
  - type: text
    content: ', I give them to you. '
  '13':
  - type: text
    content: The first ripe fruits of all that is in the land, which they bring to the L
  - type: heading
    content: ord
  - type: text
    content: ', shall be yours; everyone in your household who is [ceremonially] clean may eat it. '
  '14':
  - type: text
    content: 'Every devoted thing in Israel [everything that has been promised to the Lord with an oath] shall be yours. '
  '15':
  - type: text
    content: Every firstborn of the womb of all flesh, whether it is man or animal, which they bring to the L
  - type: heading
    content: ord
  - type: text
    content: ', shall be yours; nevertheless, the firstborn of man you shall most certainly redeem, and the firstborn of unclean animals you shall redeem. '
  '16':
  - type: text
    content: 'And their redemption price, from a month old you shall redeem, according to your '
  - type: note
    content: Since the price is set at five shekels, this term is not to be understood here as an ordinary appraisal (which could vary), but probably refers to the priest’s estimation of whether the item qualifies for redemption.
  - type: text
    content: 'valuation, for the [fixed] price of five shekels in silver, in accordance with the shekel of the sanctuary, which is twenty gerahs. '
  '17':
  - type: text
    content: But the firstborn of a cow or of a sheep or of a goat you shall not redeem; they are holy [and belong to the L
  - type: heading
    content: ord
  - type: text
    content: ']. You shall sprinkle their blood on the altar and shall offer up their fat in smoke as an offering by fire, for a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Their meat shall be yours, like the breast of a wave offering and like the right thigh. '
  '19':
  - type: text
    content: All the offerings of the holy things, which the Israelites offer to the L
  - type: heading
    content: ord
  - type: text
    content: ' I have given to you and to your sons and your daughters with you as a continual allotment. It is an everlasting covenant of '
  - type: note
    content: Salt was symbolic of preservation, and here permanence.
  - type: text
    content: salt [that cannot be dissolved or violated] before the L
  - type: heading
    content: ord
  - type: text
    content: ' to you and to your descendants with you.” '
  '2':
  - type: text
    content: 'But bring with you also your brothers, the tribe of Levi, the tribe of your father (ancestor), so that they may join with you and serve you [as assistants], while you and your sons with you are before the Tent of the Testimony [the Holy Place where only priests may go, and the Most Holy Place which only the high priest may enter]. '
  '20':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Aaron, “You shall have no inheritance in the land [of the Israelites], nor have any portion [of land] among them. I am your portion and your inheritance among the children of Israel.'
  '21':
  - type: text
    content: '“Behold, I have given the Levites all the tithe in Israel as an inheritance, in return for their service which they perform, the service of the Tent of Meeting (tabernacle). '
  '22':
  - type: text
    content: 'The Israelites shall never again approach the Tent of Meeting [the covered sanctuary, the Holy Place, and the Holy of Holies], or they [who do] will incur sin and die. '
  '23':
  - type: text
    content: 'Only the Levites shall perform the service of the Tent of Meeting (tabernacle), and they shall bear their iniquity; it shall be a statute forever throughout your generations, that the Levites shall have no inheritance [of land] among the children of Israel. '
  '24':
  - type: text
    content: But the tithe of the Israelites, which they present as an offering to the L
  - type: heading
    content: ord
  - type: text
    content: ', I have given to the Levites as an inheritance; therefore I have said to them, ‘They shall '
  - type: note
    content: They would have homes, cities, and pasture land to use, but not to possess as a personal inheritance.
  - type: text
    content: have no inheritance among the children of Israel.’ ”
  '25':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '26':
  - type: text
    content: “Moreover, you shall speak to the Levites and say to them, ‘When you take from the Israelites the tithe which I have given to you from them as your inheritance, then you shall present an offering from it to the L
  - type: heading
    content: ord
  - type: text
    content: ', a tithe of the tithe [paid by the people]. '
  '27':
  - type: text
    content: 'Your offering shall be credited to you as the grain from the threshing floor or as the full produce from the wine vat. '
  '28':
  - type: text
    content: Likewise you shall also present an offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' from all your tithes, which you receive from the Israelites; and from it you shall give the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' offering to Aaron the priest. '
  '29':
  - type: text
    content: Out of all your gifts, you shall present every offering due to the L
  - type: heading
    content: ord
  - type: text
    content: ', from all the best of it, '
  - type: text
    content: even
  - type: text
    content: ' the sacred part from them.’ '
  '3':
  - type: text
    content: 'And the Levites shall attend to your duty [as assistants] and to the duties of all the tent (tabernacle); only they shall not approach the articles of the sanctuary and the altar, or both they and you will die. '
  '30':
  - type: text
    content: 'Therefore you shall say to them, ‘When you have offered the best from it, then '
  - type: text
    content: the rest
  - type: text
    content: ' shall be credited to the Levites as the product of the threshing floor, and as the product of the wine vat. '
  '31':
  - type: text
    content: 'You may eat it anywhere, you and [the members of] your households, for it is your compensation in return for your service in the Tent of Meeting (tabernacle). '
  '32':
  - type: text
    content: You will bear no sin because of it when you have offered the best of it; but you shall not profane the sacred gifts of the children of Israel, or you will die [because of it].’ ”
  '4':
  - type: text
    content: 'They shall join you and attend to the duties of the Tent of Meeting—all the service of the tent—and no stranger [no layman, anyone who is not a Levite] may approach you [and your sons]. '
  '5':
  - type: text
    content: 'So you shall attend to the duties of the sanctuary and the duties of the altar [of burnt offering and the altar of incense], so that there will no longer be wrath on the Israelites [as with Korah, Dathan, and Abiram]. [Num 16:42-50] '
  '6':
  - type: text
    content: Behold, I Myself have taken your fellow Levites from among the sons of Israel; they are a gift to you, given (dedicated) to the L
  - type: heading
    content: ord
  - type: text
    content: ', to do the service for the Tent of Meeting (tabernacle). '
  '7':
  - type: text
    content: Therefore you and your sons with you shall attend to your priesthood for everything concerning the altar [of burnt offering and the altar of incense] and [of the Holy of Holies] within the veil, and you are to serve. I am giving you the priesthood as a bestowed service, but the stranger (outsider, layman) who approaches shall be put to death.” [Ex 40:18, 20, 26]
  - type: heading
    content: The Priests’ Portion
  '8':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Aaron, “Now behold, I [the L'
  - type: heading
    content: ord
  - type: text
    content: '] have entrusted you with My heave offerings, even all the holy gifts of the Israelites, I have given them to you as a portion, and to your sons as a continual allotment. [Lev 7:35] '
  '9':
  - type: text
    content: 'This shall be yours of the most holy things, [reserved] from the fire: every offering of the people, every grain offering and sin offering and guilt offering, which they shall render (give) to Me, shall be most holy for you and for your sons. '
