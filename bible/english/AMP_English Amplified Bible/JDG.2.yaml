document_id: JDG.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Rebuked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
      marker-yv: yv-n
    - type: text
      text: Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came up from Gilgal to Bochim. And he said, “I brought you up from Egypt and led you to the land which I swore [to give] to your fathers; and I said, ‘I will never break My covenant with you, [Ex 20:2; 23:32] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also, all [the people of] that generation were gathered to their fathers [in death]; and another generation arose after them who did not know (recognize, understand) the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', nor even the work which He had done for Israel.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Serves Baals
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the Israelites did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and worshiped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' served the Baals, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they abandoned the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of their fathers, who brought them out of the land of Egypt. They followed other gods from the gods of the peoples who were around them, and they bowed down to them, and offended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' provoked the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to anger. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they abandoned the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and served Baal [the pagan god of the Canaanites] and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Various Canaanite goddesses of fertility and warfare.
      marker-yv: yv-n
    - type: text
      text: 'Ashtaroth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' burned against Israel, and He gave them into the hands (power) of plunderers who robbed them; and He sold them into the hands of their surrounding enemies, so that they could no longer stand [in opposition] before their enemies. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherever they went, the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was against them for evil (misfortune), as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had spoken, and as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had sworn to them, so that they were severely distressed. [Lev 26:14-46]'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' raised up '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The judges were military leaders called out by God to defend and rescue Israel from the oppression of the pagan nations. They also settled legal and personal disputes.
      marker-yv: yv-n
    - type: text
      text: 'judges who rescued them from the hands of those who robbed them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet they did not listen to their judges, for they played the prostitute after other gods and they bowed down to them. They quickly turned aside from the way in which their fathers had walked in obeying the commandments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; they did not do as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their fathers.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' raised up judges for them, He was with the judge and He rescued them from the hand of their enemies all the days of the judge; for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was moved to pity by their groaning because of those who oppressed and afflicted them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the judge died, they turned back and behaved more corruptly than their fathers, in following and serving other gods, and bowing down to them. They did not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: let drop
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'abandon their practices or their stubborn ways. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and as for you, you shall not make a covenant with the inhabitants of this land; you shall tear down their altars.’ But you have not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: paid heed to My voice.
      marker-yv: yv-n
    - type: text
      text: 'obeyed Me; what is this that you have done? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' burned against Israel, and He said, “Because this '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Whenever Israel is called “nation” instead of “people,” they are usually being accused of acting like pagans.
      marker-yv: yv-n
    - type: text
      text: 'nation has transgressed (violated) My covenant (binding agreement) which I commanded their fathers, and has not listened to My voice, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also will no longer drive out before them any of the nations which Joshua left [to be conquered] when he died, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: in order to test [the loyalty of] Israel by them, whether Israel will keep the way of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to walk in it, as their fathers did, or not.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' allowed those nations to remain, not driving them out at once; and He did not give them into the hand of Joshua.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I also said, ‘I will not drive your enemies out before you; but they will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like thorns
    - type: text
      text: ' in your sides and their gods will be a snare to you.’ ” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Angel of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had spoken these words to all the Israelites, the people raised their voices and wept. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they named that place Bochim (weepers); and there they offered sacrifices to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua Dies
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Joshua had sent the people away, the [tribes of the] Israelites went each to his inheritance, to take possession of the land. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people served the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all the days of Joshua and all the days of the elders who outlived Joshua, who had seen all the great work of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He had done for Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joshua the son of Nun, the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', died at the age of a hundred and ten. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they buried him in the territory of his inheritance in Timnath-heres, in the hill country of Ephraim, north of Mount Gaash. '
