document_id: JDG.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Rebuked
  - type: text
    content: 'Now the '
  - type: note
    content: “Angel” has been capitalized here to reflect the likelihood that it is God appearing in a visible form (see note Gen 16:7).
  - type: text
    content: Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' came up from Gilgal to Bochim. And he said, “I brought you up from Egypt and led you to the land which I swore [to give] to your fathers; and I said, ‘I will never break My covenant with you, [Ex 20:2; 23:32] '
  '10':
  - type: text
    content: Also, all [the people of] that generation were gathered to their fathers [in death]; and another generation arose after them who did not know (recognize, understand) the L
  - type: heading
    content: ord
  - type: text
    content: ', nor even the work which He had done for Israel.'
  - type: heading
    content: Israel Serves Baals
  '11':
  - type: text
    content: Then the Israelites did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' and worshiped '
  - type: text
    content: and
  - type: text
    content: ' served the Baals, '
  '12':
  - type: text
    content: and they abandoned the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers, who brought them out of the land of Egypt. They followed other gods from the gods of the peoples who were around them, and they bowed down to them, and offended '
  - type: text
    content: and
  - type: text
    content: ' provoked the L'
  - type: heading
    content: ord
  - type: text
    content: ' to anger. '
  '13':
  - type: text
    content: So they abandoned the L
  - type: heading
    content: ord
  - type: text
    content: ' and served Baal [the pagan god of the Canaanites] and the '
  - type: note
    content: Various Canaanite goddesses of fertility and warfare.
  - type: text
    content: 'Ashtaroth. '
  '14':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' burned against Israel, and He gave them into the hands (power) of plunderers who robbed them; and He sold them into the hands of their surrounding enemies, so that they could no longer stand [in opposition] before their enemies. '
  '15':
  - type: text
    content: Wherever they went, the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' was against them for evil (misfortune), as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had spoken, and as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had sworn to them, so that they were severely distressed. [Lev 26:14-46]'
  '16':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' raised up '
  - type: note
    content: The judges were military leaders called out by God to defend and rescue Israel from the oppression of the pagan nations. They also settled legal and personal disputes.
  - type: text
    content: 'judges who rescued them from the hands of those who robbed them. '
  '17':
  - type: text
    content: Yet they did not listen to their judges, for they played the prostitute after other gods and they bowed down to them. They quickly turned aside from the way in which their fathers had walked in obeying the commandments of the L
  - type: heading
    content: ord
  - type: text
    content: '; they did not do as '
  - type: text
    content: their fathers.
  - type: text
    content: ' '
  '18':
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' raised up judges for them, He was with the judge and He rescued them from the hand of their enemies all the days of the judge; for the L'
  - type: heading
    content: ord
  - type: text
    content: ' was moved to pity by their groaning because of those who oppressed and afflicted them. '
  '19':
  - type: text
    content: 'But when the judge died, they turned back and behaved more corruptly than their fathers, in following and serving other gods, and bowing down to them. They did not '
  - type: note
    content: Lit let drop.
  - type: text
    content: 'abandon their practices or their stubborn ways. '
  '2':
  - type: text
    content: 'and as for you, you shall not make a covenant with the inhabitants of this land; you shall tear down their altars.’ But you have not '
  - type: note
    content: Lit paid heed to My voice.
  - type: text
    content: 'obeyed Me; what is this that you have done? '
  '20':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' burned against Israel, and He said, “Because this '
  - type: note
    content: Whenever Israel is called “nation” instead of “people,” they are usually being accused of acting like pagans.
  - type: text
    content: 'nation has transgressed (violated) My covenant (binding agreement) which I commanded their fathers, and has not listened to My voice, '
  '21':
  - type: text
    content: 'I also will no longer drive out before them any of the nations which Joshua left [to be conquered] when he died, '
  '22':
  - type: text
    content: in order to test [the loyalty of] Israel by them, whether Israel will keep the way of the L
  - type: heading
    content: ord
  - type: text
    content: ' to walk in it, as their fathers did, or not.” '
  '23':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' allowed those nations to remain, not driving them out at once; and He did not give them into the hand of Joshua.'
  '3':
  - type: text
    content: 'So I also said, ‘I will not drive your enemies out before you; but they will be '
  - type: text
    content: like thorns
  - type: text
    content: ' in your sides and their gods will be a snare to you.’ ” '
  '4':
  - type: text
    content: When the Angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' had spoken these words to all the Israelites, the people raised their voices and wept. '
  '5':
  - type: text
    content: So they named that place Bochim (weepers); and there they offered sacrifices to the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: heading
    content: Joshua Dies
  '6':
  - type: text
    content: 'And when Joshua had sent the people away, the [tribes of the] Israelites went each to his inheritance, to take possession of the land. '
  '7':
  - type: text
    content: The people served the L
  - type: heading
    content: ord
  - type: text
    content: ' all the days of Joshua and all the days of the elders who outlived Joshua, who had seen all the great work of the L'
  - type: heading
    content: ord
  - type: text
    content: ' which He had done for Israel. '
  '8':
  - type: text
    content: Then Joshua the son of Nun, the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ', died at the age of a hundred and ten. '
  '9':
  - type: text
    content: 'And they buried him in the territory of his inheritance in Timnath-heres, in the hill country of Ephraim, north of Mount Gaash. '
