    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'It is He [the preeminent One] who comes after me, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: During this era it was customary for a household servant to remove a guest’s sandals and wash the dust from his feet. John is saying that he is not worthy even to remove Christ’s sandal, let alone to touch His feet.
      marker-yv: yv-n
    - type: text
      text: 'strap of whose sandal I am not worthy to untie [even as His slave].” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
