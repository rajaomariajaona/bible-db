  - type: note
    content: The births of both John the Baptist and Jesus were foretold by the angel, Gabriel (Luke 1:5-80). This passage is about John the Baptist, the son of Zacharias the priest and his wife, Elizabeth. Elizabeth was related to Mary the mother of Jesus (Luke 1:36). John the Baptist is considered to be the last of the OT prophets, and is not to be confused with John the Apostle who wrote this Gospel, three brief letters (1 John, 2 John, 3 John) and Revelation.
  - type: text
