  '37':
  - type: text
    content: 'The two disciples heard him say this, and they '
  - type: note
    content: 'The concept of “follow” can represent three separate possibilities: in the early stages of His ministry (1) walking with Him physically (literally), that is merely being in His presence regardless of personal belief or commitment; (2) accepting and identifying with the salvation He offered; and later on (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
  - type: text
