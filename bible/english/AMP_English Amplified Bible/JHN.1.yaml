      children:
      - type: text
        text: “Come, and you will see.”
    - type: text
      text: ' So they went [with Him] and saw where He was staying; and they stayed with Him that day, for it was about the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Romans reckoned time from midnight, so in Roman time the tenth hour would be 10:00 a.m. The Jews reckoned daytime from sunrise (about 6:00 a.m.), so in their system the tenth hour would be 4:00 p.m. Here, either time is possible, though the Roman reckoning may be more likely because if it were 4:00 p.m. the disciples might have felt compelled to go home before evening set in.
      marker-yv: yv-n
    - type: text
      text: 'tenth hour. '
  '4':
