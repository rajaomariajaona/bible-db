  '16':
  - type: text
    content: 'For out of His fullness [the superabundance of His grace and truth] we have all received grace upon grace [spiritual blessing upon spiritual blessing, favor upon favor, and gift heaped upon gift]. '
  '17':
  - type: text
    content: 'For the Law was given through Moses, but grace [the unearned, undeserved favor of God] and truth came through Jesus Christ. [Ex 20:1] '
  '18':
  - type: text
    content: No one has seen God [His essence, His divine nature] at any time; the [One and] only begotten God [that is, the unique Son] who is in the intimate presence of the Father, He has explained Him [and interpreted and revealed the awesome wonder of the Father]. [Prov 8:30]
  - type: heading
    content: The Testimony of John
  '19':
  - type: text
    content: 'This is the testimony of John [the Baptist] when the Jews sent priests and Levites to him from Jerusalem to ask him, “Who are you?” '
  '2':
  - type: text
    content: 'He was [continually existing] in the beginning [co-eternally] with God. '
  '20':
  - type: text
    content: 'And he confessed [truthfully] and did not deny [that he was only a man], but acknowledged, “I am not the Christ (the Messiah, the Anointed)!” '
  '21':
  - type: text
    content: 'They asked him, “What then? Are you Elijah?” And he said, “I am not.” “Are you the [promised] Prophet?” And he answered, “No.” [Deut 18:15, 18; Mal 4:5] '
  '22':
