    content: 'He said to them, '
  - type: text
    content: “Come, and you will see.”
  - type: text
    content: ' So they went [with Him] and saw where He was staying; and they stayed with Him that day, for it was about the '
  - type: note
    content: The Romans reckoned time from midnight, so in Roman time the tenth hour would be 10:00 a.m. The Jews reckoned daytime from sunrise (about 6:00 a.m.), so in their system the tenth hour would be 4:00 p.m. Here, either time is possible, though the Roman reckoning may be more likely because if it were 4:00 p.m. the disciples might have felt compelled to go home before evening set in.
  - type: text
    content: 'tenth hour. '
