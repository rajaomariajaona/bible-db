verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Deity of Jesus Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the beginning [before all time] was the Word (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In John the Apostle’s vision (Rev 19), he sees Christ returning as Warrior-Messiah-King, and “…His name is called The Word of God…and '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' OF LORDS.” (Rev 19:13, 16).'
      marker-yv: yv-n
    - type: text
      text: 'Christ), and the Word was with God, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this phrase, “God” appears first in the Greek word order, emphasizing the fact that “the Word” (Christ) was God—so “God Himself.”
      marker-yv: yv-n
    - type: text
      text: 'the Word was God Himself. [Gen 1:1; Is 9:6] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He (Christ) was in the world, and though the world was made through Him, the world did not recognize Him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He came to that which was His own [that which belonged to Him—His world, His creation, His possession], and those who were His own [people—the Jewish nation] did not receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome Him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But to as many as did receive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcome Him, He gave the right [the authority, the privilege] to become children of God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' to those who believe in (adhere to, trust in, and rely on) His name— [Is 56:5] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: who were born, not of blood [natural conception], nor of the will of the flesh [physical impulse], nor of the will of man [that of a natural father], but of God [that is, a divine and supernatural birth—they are born of God—spiritually transformed, renewed, sanctified].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Word Made Flesh
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And the Word (Christ) became flesh, and lived among us; and we [actually] saw His glory, glory as belongs to the [One and] only begotten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Son
    - type: text
      text: ' of the Father, [the Son who is truly unique, the only One of His kind, who is] full of grace and truth (absolutely free of deception). [Is 40:5] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'John testified [repeatedly] about Him and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Here John the writer uses the Greek perfect tense (“has cried out”), emphasizing the truth and continuing importance of John the Baptist’s testimony.
      marker-yv: yv-n
    - type: text
      text: 'has cried out [testifying officially for the record, with validity and relevance], “This was He of whom I said, ‘He who comes after me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: has become before
        - type: text
          text: ' (in front of) '
        - type: usfm
          marker: it
          children:
          - type: text
            text: me, because He was first of me
        - type: text
          text: . The Greek is difficult because John the Baptist was making a word-play on the adverbs/adjective “after” (or “behind”), “before,” and “first.” The playful wording assumes the form of a riddle which, like some of Jesus’ parables, conceals the speaker’s meaning from those who are hostile toward him and have neither the patience nor the spiritual inclination to learn from him.
      marker-yv: yv-n
    - type: text
      text: 'has a higher rank than I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has priority over me, for He existed before me.’ ” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For out of His fullness [the superabundance of His grace and truth] we have all received grace upon grace [spiritual blessing upon spiritual blessing, favor upon favor, and gift heaped upon gift]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the Law was given through Moses, but grace [the unearned, undeserved favor of God] and truth came through Jesus Christ. [Ex 20:1] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: No one has seen God [His essence, His divine nature] at any time; the [One and] only begotten God [that is, the unique Son] who is in the intimate presence of the Father, He has explained Him [and interpreted and revealed the awesome wonder of the Father]. [Prov 8:30]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Testimony of John
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This is the testimony of John [the Baptist] when the Jews sent priests and Levites to him from Jerusalem to ask him, “Who are you?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He was [continually existing] in the beginning [co-eternally] with God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he confessed [truthfully] and did not deny [that he was only a man], but acknowledged, “I am not the Christ (the Messiah, the Anointed)!” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'They asked him, “What then? Are you Elijah?” And he said, “I am not.” “Are you the [promised] Prophet?” And he answered, “No.” [Deut 18:15, 18; Mal 4:5] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then they said to him, “Who are you? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tell us,
    - type: text
      text: ' so that we may give an answer to those who sent us. What do you say about yourself?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He said, “I am '
