      children:
      - type: text
        text: '36'
    - type: text
      text: 'and he looked at Jesus as He walked along, and said, “Look! The Lamb of God!” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'The two disciples heard him say this, and they '
    - type: usfm
