document_id: JDG.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Oppression of Philistines and Ammonites
  - type: text
    content: 'After Abimelech died, Tola the son of Puah, the son of Dodo, a man of Issachar, arose to save Israel; and he lived in Shamir, in the hill country of Ephraim. '
  '10':
  - type: text
    content: Then the Israelites cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [for help], saying, “We have sinned against You, because we have abandoned (rejected) our God and have served the Baals.” '
  '11':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to the Israelites, “'
  - type: text
    content: Did I
  - type: text
    content: ' not '
  - type: text
    content: rescue you
  - type: text
    content: ' from the Egyptians, the Amorites, the Ammonites, and the Philistines? '
  '12':
  - type: text
    content: 'Also when the Sidonians, the Amalekites, and the Maonites oppressed '
  - type: text
    content: and
  - type: text
    content: ' crushed you, you cried out to Me, and I rescued you from their hands. '
  '13':
  - type: text
    content: 'Yet you have abandoned (rejected) Me and served other gods; therefore I will no longer rescue you. '
  '14':
  - type: text
    content: 'Go, cry out to the gods you have chosen; let them rescue you in your time of distress.” '
  '15':
  - type: text
    content: The Israelites said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “We have sinned, do to us whatever seems good to You; only please rescue us this day.” '
  '16':
  - type: text
    content: So they removed the foreign gods from among them and served the L
  - type: heading
    content: ord
  - type: text
    content: ; and He could bear the misery of Israel no longer.
  '17':
  - type: text
    content: 'Then the Ammonites were assembled together and they camped in Gilead. And the sons of Israel assembled and camped at Mizpah. '
  '18':
  - type: text
    content: The people, the leaders of Gilead (Israel) said to one another, “Who is the man who will begin to fight against the Ammonites? He shall become head over all the inhabitants of Gilead.”
  '2':
  - type: text
    content: Tola judged Israel for twenty-three years; then he died and was buried in Shamir.
  '3':
  - type: text
    content: 'After him, Jair the Gileadite arose, and he judged Israel for twenty-two years. '
  '4':
  - type: text
    content: 'He had thirty sons who rode on thirty donkeys, and they had thirty towns in the land of Gilead that are called Havvoth-jair (towns of Jair) to this day. '
  '5':
  - type: text
    content: And Jair died and was buried in Kamon.
  '6':
  - type: text
    content: Then the Israelites again did what was evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ; they served the Baals, the Ashtaroth (female deities), the gods of Aram (Syria), the gods of Sidon, the gods of Moab, the gods of the Ammonites, and the gods of the Philistines. They abandoned the L
  - type: heading
    content: ord
  - type: text
    content: ' and did not serve Him. '
  '7':
  - type: text
    content: So the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' was kindled against Israel, and He sold them into the hands of the Philistines and the Ammonites, '
  '8':
  - type: text
    content: 'and they oppressed and crushed Israel that year. For eighteen years they '
  - type: text
    content: oppressed
  - type: text
    content: ' all the Israelites who were beyond the Jordan in the land of the Amorites, which is in Gilead. '
  '9':
  - type: text
    content: The Ammonites crossed the Jordan to fight against Judah, Benjamin, and the house of Ephraim, so that Israel was greatly distressed.
