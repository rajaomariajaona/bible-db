document_id: JDG.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Oppression of Philistines and Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After Abimelech died, Tola the son of Puah, the son of Dodo, a man of Issachar, arose to save Israel; and he lived in Shamir, in the hill country of Ephraim. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tola judged Israel for twenty-three years; then he died and was buried in Shamir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After him, Jair the Gileadite arose, and he judged Israel for twenty-two years. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He had thirty sons who rode on thirty donkeys, and they had thirty towns in the land of Gilead that are called Havvoth-jair (towns of Jair) to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And Jair died and was buried in Kamon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the Israelites again did what was evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; they served the Baals, the Ashtaroth (female deities), the gods of Aram (Syria), the gods of Sidon, the gods of Moab, the gods of the Ammonites, and the gods of the Philistines. They abandoned the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and did not serve Him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So the anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was kindled against Israel, and He sold them into the hands of the Philistines and the Ammonites, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and they oppressed and crushed Israel that year. For eighteen years they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: oppressed
  - type: text
    text: ' all the Israelites who were beyond the Jordan in the land of the Amorites, which is in Gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Ammonites crossed the Jordan to fight against Judah, Benjamin, and the house of Ephraim, so that Israel was greatly distressed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then the Israelites cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [for help], saying, “We have sinned against You, because we have abandoned (rejected) our God and have served the Baals.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to the Israelites, “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Did I
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rescue you
  - type: text
    text: ' from the Egyptians, the Amorites, the Ammonites, and the Philistines? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Also when the Sidonians, the Amalekites, and the Maonites oppressed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed you, you cried out to Me, and I rescued you from their hands. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet you have abandoned (rejected) Me and served other gods; therefore I will no longer rescue you. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Go, cry out to the gods you have chosen; let them rescue you in your time of distress.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The Israelites said to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “We have sinned, do to us whatever seems good to You; only please rescue us this day.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So they removed the foreign gods from among them and served the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and He could bear the misery of Israel no longer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the Ammonites were assembled together and they camped in Gilead. And the sons of Israel assembled and camped at Mizpah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The people, the leaders of Gilead (Israel) said to one another, “Who is the man who will begin to fight against the Ammonites? He shall become head over all the inhabitants of Gilead.”
