document_id: PRO.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Pursuit of Wisdom Brings Security
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, if you will receive my words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And treasure my commandments within you,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For [skillful and godly] wisdom will enter your heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And knowledge will be pleasant to your soul.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Discretion will watch over you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discernment will guard you,'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'To keep you from the way of evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the evil man,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the man who speaks perverse things;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: From those who leave the paths of uprightness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To walk in the ways of darkness;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Who find joy in doing evil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And delight in the perversity of evil,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Whose paths are crooked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who are devious in their ways;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: To keep you from the immoral woman;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the seductress with her flattering words, [Prov 2:11]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Who leaves the companion (husband) of her youth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And forgets the covenant of her God.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For her house leads down to death
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her paths lead to the dead;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: None who go to her return again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor do they regain the paths of life—
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So that your ear is attentive to [skillful and godly] wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And apply your heart to understanding [seeking it conscientiously and striving for it eagerly];
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So you will walk in the way of good men [that is, those of personal integrity, moral courage and honorable character],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And keep to the paths of the righteous.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For the upright [those who are in right standing with God] will live in the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those [of integrity] who are blameless [in God’s sight] will remain in it;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But the wicked will be cut off from the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the treacherous shall be [forcibly] uprooted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' removed from it.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Yes, if you cry out for insight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lift up your voice for understanding;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'If you seek skillful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' godly wisdom as you would silver'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And search for her as you would hidden treasures;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then you will understand the [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, worshiping Him and regarding Him as truly awesome]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And discover the knowledge of God. [Prov 1:7]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gives [skillful and godly] wisdom;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From His mouth come knowledge and understanding.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He stores away sound wisdom for the righteous [those who are in right standing with Him];
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: He is
    - type: text
      text: ' a shield to those who walk in integrity [those of honorable character and moral courage],'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He guards the paths of justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He preserves the way of His saints (believers). [1 Sam 2:9; Ps 66:8, 9]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then you will understand righteousness and justice [in every circumstance]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And integrity and every good path.
