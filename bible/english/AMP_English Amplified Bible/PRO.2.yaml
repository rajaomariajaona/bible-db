document_id: PRO.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Pursuit of Wisdom Brings Security
  - type: text
    content: My son, if you will receive my words
  - type: text
    content: And treasure my commandments within you,
  '10':
  - type: text
    content: For [skillful and godly] wisdom will enter your heart
  - type: text
    content: And knowledge will be pleasant to your soul.
  '11':
  - type: text
    content: Discretion will watch over you,
  - type: text
    content: 'Understanding '
  - type: text
    content: and
  - type: text
    content: ' discernment will guard you,'
  '12':
  - type: text
    content: 'To keep you from the way of evil '
  - type: text
    content: and
  - type: text
    content: ' the evil man,'
  - type: text
    content: From the man who speaks perverse things;
  '13':
  - type: text
    content: From those who leave the paths of uprightness
  - type: text
    content: To walk in the ways of darkness;
  '14':
  - type: text
    content: Who find joy in doing evil
  - type: text
    content: And delight in the perversity of evil,
  '15':
  - type: text
    content: Whose paths are crooked,
  - type: text
    content: And who are devious in their ways;
  '16':
  - type: text
    content: To keep you from the immoral woman;
  - type: text
    content: From the seductress with her flattering words, [Prov 2:11]
  '17':
  - type: text
    content: Who leaves the companion (husband) of her youth,
  - type: text
    content: And forgets the covenant of her God.
  '18':
  - type: text
    content: For her house leads down to death
  - type: text
    content: And her paths lead to the dead;
  '19':
  - type: text
    content: None who go to her return again,
  - type: text
    content: Nor do they regain the paths of life—
  '2':
  - type: text
    content: So that your ear is attentive to [skillful and godly] wisdom,
  - type: text
    content: And apply your heart to understanding [seeking it conscientiously and striving for it eagerly];
  '20':
  - type: text
    content: So you will walk in the way of good men [that is, those of personal integrity, moral courage and honorable character],
  - type: text
    content: And keep to the paths of the righteous.
  '21':
  - type: text
    content: For the upright [those who are in right standing with God] will live in the land
  - type: text
    content: And those [of integrity] who are blameless [in God’s sight] will remain in it;
  '22':
  - type: text
    content: But the wicked will be cut off from the land
  - type: text
    content: 'And the treacherous shall be [forcibly] uprooted '
  - type: text
    content: and
  - type: text
    content: ' removed from it.'
  '3':
  - type: text
    content: Yes, if you cry out for insight,
  - type: text
    content: And lift up your voice for understanding;
  '4':
  - type: text
    content: 'If you seek skillful '
  - type: text
    content: and
  - type: text
    content: ' godly wisdom as you would silver'
  - type: text
    content: And search for her as you would hidden treasures;
  '5':
  - type: text
    content: Then you will understand the [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [that is, worshiping Him and regarding Him as truly awesome]'
  - type: text
    content: And discover the knowledge of God. [Prov 1:7]
  '6':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' gives [skillful and godly] wisdom;'
  - type: text
    content: From His mouth come knowledge and understanding.
  '7':
  - type: text
    content: He stores away sound wisdom for the righteous [those who are in right standing with Him];
  - type: text
    content: He is
  - type: text
    content: ' a shield to those who walk in integrity [those of honorable character and moral courage],'
  '8':
  - type: text
    content: He guards the paths of justice;
  - type: text
    content: And He preserves the way of His saints (believers). [1 Sam 2:9; Ps 66:8, 9]
  '9':
  - type: text
    content: Then you will understand righteousness and justice [in every circumstance]
  - type: text
    content: And integrity and every good path.
