document_id: 1CO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Take Care with Your Liberty
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now about food sacrificed to idols, we know that we all have knowledge [concerning this]. Knowledge [alone] makes [people self-righteously] arrogant, but love [that unselfishly seeks the best for others] builds up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourages others to grow [in wisdom]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'If anyone imagines that he knows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understands anything [of divine matters, without love], he has not yet known as he ought to know. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But if anyone loves God [with awe-filled reverence, obedience and gratitude], he is known by Him [as His very own and is greatly loved].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In this matter, then, of eating food offered to idols, we know that an idol is nothing in the world [it has no real existence], and that there is no God but one. [Deut 6:4] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For even if there are so-called gods, whether in heaven or on earth, as indeed there are many gods and many lords, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'yet for us there is but one God, the Father, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: from whom are all things
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'who is the source of all things, and we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exist
  - type: text
    text: ' for Him; and one Lord, Jesus Christ, by whom are all things [that have been created], and we [believers exist and have life and have been redeemed] through Him. [Mal 2:10]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'However, not all [believers] have this knowledge. But some, being accustomed [throughout their lives] to [thinking of] the idol until now [as real and living], still eat food '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Paul’s viewpoint, meat sold at the market place (even if it had been used in idol worship) was permissible food because a pagan sacrifice was meaningless, and the meat itself could not be contaminated by any such ritual (cf Mark 7:19). Some who had accepted Christ worried that they were violating their new faith if they ate any meat without knowing its origin first-hand.
    marker-yv: yv-n
  - type: text
    text: 'as if it were sacrificed to an idol; and because their conscience is weak, it is defiled (guilty, ashamed). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now food will not commend us to God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' bring us close to Him; we are no worse off if we do not eat, nor are we better if we do eat. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Only be careful that this liberty of yours [this power to choose] does not somehow become a stumbling block [that is, a temptation to sin] to the weak [in conscience]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For if someone sees you, a person having '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the knowledge that no harm can come from eating the meat, since in reality the sacrifice is meaningless (see note v 7).
    marker-yv: yv-n
  - type: text
    text: 'knowledge, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: reclining,
      - type: text
        text: ' i.e. the position in which people dined.'
    marker-yv: yv-n
  - type: text
    text: 'eating in an idol’s temple, then if he is weak, will he not be encouraged to eat things sacrificed to idols [and violate his own convictions]? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For through your knowledge (spiritual maturity) this weak man is ruined [that is, he suffers in his spiritual life], the brother for whom Christ died. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when you sin against the brothers and sisters in this way and wound their weak conscience [by confusing them], you sin against Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Therefore, if [my eating a certain] food causes my brother to stumble (sin), I will not eat [such] meat ever again, so that I will not cause my brother to stumble.
