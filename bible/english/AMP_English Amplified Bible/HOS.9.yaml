verses:
  '1':
  - type: heading
    content: Ephraim Punished
  - type: text
    content: Do not rejoice, O Israel, with exultation as do the [pagan] peoples,
  - type: text
    content: 'For you have played the prostitute, '
  - type: text
    content: turning
  - type: text
    content: ' away from your God.'
  - type: text
    content: 'You have loved '
  - type: text
    content: prostitutes’
  - type: text
    content: ' earnings on every threshing floor [attributing the harvest to the Baals instead of to God].'
  '10':
  - type: text
    content: ¶I found Israel like grapes in the wilderness [an unexpected and refreshing delight];
  - type: text
    content: 'I saw your fathers (ancestors) as the first ripe fruit on the fig tree in its first '
  - type: text
    content: season,
  - type: text
    content: But they came to Baal-peor and consecrated themselves to shamefulness [the worship of Baal],
  - type: text
    content: 'And [because of their spiritual and physical adultery] they became as detestable '
  - type: text
    content: and
  - type: text
    content: ' loathsome as the thing they loved.'
  '11':
  - type: text
    content: As for Ephraim, their glory will fly away like a bird;
  - type: text
    content: No birth, no pregnancy, and [because of their impurity] no conception.
  '12':
  - type: text
    content: Even though they bring up their children,
  - type: text
    content: Yet I will bereave them until not one is left.
  - type: text
    content: 'Indeed, woe (judgment is coming) to them when I look away '
  - type: text
    content: and
  - type: text
    content: ' withdraw [My blessing] from them!'
  '13':
  - type: text
    content: Ephraim, as I have seen,
  - type: text
    content: Is planted in a pleasant [and prosperous] meadow like Tyre;
  - type: text
    content: But Ephraim will bring out his children to the executioner [for slaughter].
  '14':
  - type: text
    content: Give them [the punishment they deserve], O L
  - type: heading
    content: ord
  - type: text
    content: '! What will You give?'
  - type: text
    content: Give them a miscarrying womb and dry breasts.
  '15':
  - type: text
    content: ¶All their wickedness [says the L
  - type: heading
    content: ord
  - type: text
    content: '] is focused in Gilgal;'
  - type: text
    content: Indeed, I came to hate them there!
  - type: text
    content: Because of the wickedness of their [idolatrous] practices
  - type: text
    content: I will drive them out of My house (the land of Israel)!
  - type: text
    content: I will love them no longer;
  - type: text
    content: All their princes are rebels. [Hos 4:15; 12:11]
  '16':
  - type: text
    content: Ephraim is stricken, their root is dried up,
  - type: text
    content: They will bear no fruit.
  - type: text
    content: Even though they give birth,
  - type: text
    content: I will slay the precious children of their womb.
  '17':
  - type: text
    content: 'My God will reject them '
  - type: text
    content: and
  - type: text
    content: ' cast them away'
  - type: text
    content: Because they did not listen to Him;
  - type: text
    content: And they will be wanderers (fugitives) among the nations.
  '2':
  - type: text
    content: The threshing floor and the wine press will no longer feed them,
  - type: text
    content: And the new wine will fail them [because they failed to honor the God who provides].
  '3':
  - type: text
    content: They will not remain in the land of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But Ephraim will return to [another] Egypt [in bondage]
  - type: text
    content: 'And they will eat [ceremonially] unclean '
  - type: text
    content: food
  - type: text
    content: ' in Assyria. [2 Kin 25:26; Ezek 4:13]'
  '4':
  - type: text
    content: They will not pour out drink offerings of wine to the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Their sacrifices will not please Him.
  - type: text
    content: Their bread will be
  - type: text
    content: ' like mourners’ bread [eaten at funerals];'
  - type: text
    content: All who eat it will be [ceremonially] unclean,
  - type: text
    content: For their bread will be for themselves;
  - type: text
    content: It will not enter the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' [to be consecrated].'
  '5':
  - type: text
    content: What will you do on the day of the appointed festival
  - type: text
    content: And on the day of the feast of the L
  - type: heading
    content: ord
  - type: text
    content: ' [when you are in exile]?'
  '6':
  - type: text
    content: 'For behold, they will go away because of devastation '
  - type: text
    content: and
  - type: text
    content: ' destruction;'
  - type: text
    content: Egypt will gather them up, Memphis will bury them.
  - type: text
    content: Weeds will take over their treasures of silver;
  - type: text
    content: 'Thorns '
  - type: text
    content: will grow
  - type: text
    content: ' in their tents.'
  '7':
  - type: text
    content: ¶The days of punishment have come;
  - type: text
    content: The days of retribution are at hand;
  - type: text
    content: Let Israel know this!
  - type: text
    content: The prophet is [considered] a fool;
  - type: text
    content: The man [of God] who is inspired is [treated as if] demented,
  - type: text
    content: 'Because of the abundance of your wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt,'
  - type: text
    content: 'And '
  - type: text
    content: because
  - type: text
    content: ' your deep antagonism [toward God and the prophets] is so great. [Luke 21:22]'
  '8':
  - type: text
    content: Ephraim was a watchman with my God, a [true] prophet [to warn the nation];
  - type: text
    content: But the snare of a bird catcher was laid in all his paths.
  - type: text
    content: 'And there is '
  - type: text
    content: only
  - type: text
    content: ' deep hostility in the house of his God (the land of Israel).'
  '9':
  - type: text
    content: They have deeply corrupted (perverted) themselves
  - type: text
    content: As in the days of Gibeah.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will remember their wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt;'
  - type: text
    content: He will punish their sins. [Judg 20]
