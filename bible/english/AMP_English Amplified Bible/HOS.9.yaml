document_id: HOS.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ephraim Punished
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Do not rejoice, O Israel, with exultation as do the [pagan] peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For you have played the prostitute, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: turning
    - type: text
      text: ' away from your God.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have loved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: prostitutes’
    - type: text
      text: ' earnings on every threshing floor [attributing the harvest to the Baals instead of to God].'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶I found Israel like grapes in the wilderness [an unexpected and refreshing delight];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I saw your fathers (ancestors) as the first ripe fruit on the fig tree in its first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: season,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they came to Baal-peor and consecrated themselves to shamefulness [the worship of Baal],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [because of their spiritual and physical adultery] they became as detestable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathsome as the thing they loved.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As for Ephraim, their glory will fly away like a bird;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No birth, no pregnancy, and [because of their impurity] no conception.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Even though they bring up their children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I will bereave them until not one is left.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indeed, woe (judgment is coming) to them when I look away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withdraw [My blessing] from them!'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ephraim, as I have seen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is planted in a pleasant [and prosperous] meadow like Tyre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Ephraim will bring out his children to the executioner [for slaughter].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Give them [the punishment they deserve], O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! What will You give?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them a miscarrying womb and dry breasts.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶All their wickedness [says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] is focused in Gilgal;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, I came to hate them there!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the wickedness of their [idolatrous] practices
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will drive them out of My house (the land of Israel)!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will love them no longer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their princes are rebels. [Hos 4:15; 12:11]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ephraim is stricken, their root is dried up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will bear no fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though they give birth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will slay the precious children of their womb.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'My God will reject them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cast them away'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they did not listen to Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will be wanderers (fugitives) among the nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The threshing floor and the wine press will no longer feed them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the new wine will fail them [because they failed to honor the God who provides].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They will not remain in the land of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Ephraim will return to [another] Egypt [in bondage]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they will eat [ceremonially] unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: food
    - type: text
      text: ' in Assyria. [2 Kin 25:26; Ezek 4:13]'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will not pour out drink offerings of wine to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their sacrifices will not please Him.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Their bread will be
    - type: text
      text: ' like mourners’ bread [eaten at funerals];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who eat it will be [ceremonially] unclean,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their bread will be for themselves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will not enter the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to be consecrated].'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: What will you do on the day of the appointed festival
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on the day of the feast of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [when you are in exile]?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For behold, they will go away because of devastation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt will gather them up, Memphis will bury them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weeds will take over their treasures of silver;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Thorns '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will grow
    - type: text
      text: ' in their tents.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶The days of punishment have come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days of retribution are at hand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Israel know this!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophet is [considered] a fool;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The man [of God] who is inspired is [treated as if] demented,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the abundance of your wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because
    - type: text
      text: ' your deep antagonism [toward God and the prophets] is so great. [Luke 21:22]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ephraim was a watchman with my God, a [true] prophet [to warn the nation];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the snare of a bird catcher was laid in all his paths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' deep hostility in the house of his God (the land of Israel).'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: They have deeply corrupted (perverted) themselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As in the days of Gibeah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will remember their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will punish their sins. [Judg 20]
