      children:
      - type: text
        text: '11:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jephthah’s argument illustrates the essence of the conflict between Israel and its neighboring enemies. To a disinterested observer, occupancy of the land of Canaan might simply be a matter of conquest by the stronger warring nation, so no one could claim true ownership and the land would naturally change hands over the course of history. For Israel, however, possession of the land was the will of God, pitting the one true God against the false gods of foreign nations who were being dispossessed. These other nations understandably did not see things Israel’s way because they did not recognize the sovereignty of Israel’s God, and might have felt just as strongly about their own gods’ will for them to possess the land in question. Therefore the struggle for land was not just the result of pragmatism or greed, or even the basic desire to have a secure home and country. It was seamlessly interwoven in the fabric of faith, a non-negotiable element of one’s religion—or in Israel’s case, of faith in the true God, whom they frequently neglected or abandoned, to their own peril.
    marker-yv: yv-n
  - type: text
    text: And now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel has dispossessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' driven out the Amorites from before His people Israel, so [why] should you possess it? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Do you not possess what Chemosh your god gives you to possess? And everything that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God dispossessed before us, we will possess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now are you any better than Balak the son of Zippor, king of Moab? Did he ever strive against Israel, or did he ever go to war against them? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'While Israel lived in Heshbon and its villages, and in Aroer and its villages, and in all the cities along the banks of the Arnon for three hundred years, why did you not recover your lost lands during that time? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So I have not sinned against you, but you are doing me wrong by making war against me; may the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the [righteous] Judge, judge this day between the Israelites and the Ammonites.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But the king of the Ammonites disregarded the message of Jephthah, which he sent to him.
