      - type: text
        text: . The tragic outcome of Jephthah’s vow (vv 30, 31) reveals the folly and danger of making such a “deal” with God, as though a mere human could really offer God something of value as an incentive or bribe for His help.
    marker-yv: yv-n
  - type: text
