    - type: text
      text: '1'
  - type: text
    text: 'Now Jephthah the Gileadite was a brave warrior, but he was the son of a prostitute. Gilead was the father of Jephthah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Gilead’s wife bore him sons, and when his wife’s sons grew up, they drove Jephthah out and said to him, “You shall not have an inheritance in our father’s house, because you are the son of another woman.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Jephthah fled from his brothers and lived in the land of Tob; and worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unprincipled men gathered around Jephthah, and went out [on raids] with him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now it happened after a while that the Ammonites fought against Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the Ammonites fought against Israel, the elders of Gilead went to get Jephthah from the land of Tob; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and they said to Jephthah, “Come and be our leader, so that we may fight against the Ammonites.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But Jephthah said to the elders of Gilead, “Did you not hate me and drive me from the house of my father? Why have you come to me now when you are in trouble?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The elders of Gilead said to Jephthah, “This is why we have turned to you now: that you may go with us and fight the Ammonites and become head over all the inhabitants of Gilead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Jephthah said to the elders of Gilead, “If you take me back [home] to fight against the Ammonites and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gives them over to me, will I [really] become your head?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The elders of Gilead said to Jephthah, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is '
  - type: usfm
    marker: f
    children:
