  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now Jephthah sent messengers to the king of the Ammonites, saying, “What is [the problem] between you and me, that you have come against me to fight in my land?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The Ammonites’ king replied to the messengers of Jephthah, “It is because Israel took away '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The land under discussion was actually Amorite territory when Israel entered and took possession of it three hundred years earlier.
    marker-yv: yv-n
  - type: text
    text: 'my land when they came up from Egypt, from the [river] Arnon as far as the Jabbok and [east of] the Jordan; so now, return those lands peaceably.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Jephthah sent messengers again to the king of the Ammonites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and they said to him, “This is what Jephthah says: ‘Israel did not take the land of Moab or the land of the Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For when they came up from Egypt, Israel walked through the wilderness to the Red Sea and came to Kadesh; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'then Israel sent messengers to the king of Edom, saying, “Please let us pass through your land,” but the king of Edom would not listen. Also they sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to the king of Moab, but he would not consent. So Israel stayed at Kadesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then they went through the wilderness and went around the land of Edom and the land of Moab, and came to the east side of the land of Moab, and they camped on the other side of the [river] Arnon; but they did not enter the territory of Moab, for the Arnon was the [northern] boundary of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Israel sent messengers to Sihon king of the Amorites, king of Heshbon, and Israel said to him, “Please let us pass through your land to our place.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Sihon did not trust Israel to pass through his territory; so Sihon gathered together all his people and camped at Jahaz and fought against Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, gave Sihon and all his people into the hand of Israel, and they defeated them; so Israel took possession of all the land of the Amorites, the inhabitants of that country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They took possession of all the territory of the Amorites, from the Arnon as far as the Jabbok, and from the wilderness [westward] as far as the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
