  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when he saw her, he tore his clothes [in grief] and said, “Alas, my daughter! You have brought me great disaster, and you are the cause of ruin to me; for I have '
