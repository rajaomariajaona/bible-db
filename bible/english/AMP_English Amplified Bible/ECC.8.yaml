document_id: ECC.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Obey Rulers
  - type: text
    content: Who is like the wise man?
  - type: text
    content: And who knows the interpretation of a matter?
  - type: text
    content: A man’s wisdom illumines his face,
  - type: text
    content: And causes his stern face to beam.
  '10':
  - type: text
    content: 'So then, I have seen the wicked buried, those who used to go in and out of the holy place [but did not thereby escape their doom], and they are [praised in spite of their evil and] soon forgotten in the city where they did such things. This too is futility (vanity, emptiness). '
  '11':
  - type: text
    content: 'Because the sentence against an evil act is not executed quickly, the hearts of the sons of men are fully set to do evil. '
  '12':
  - type: text
    content: 'Though a sinner does evil a hundred '
  - type: text
    content: times
  - type: text
    content: ' and his life [seemingly] is prolonged [in spite of his wickedness], still I know that it will be well with those who [reverently] fear God, who fear '
  - type: text
    content: and
  - type: text
    content: ' worship Him openly [realizing His omnipresence and His power]. [Ps 37:11, 18, 19; Is 3:10, 11; Matt 25:34] '
  '13':
  - type: text
    content: But it will not be well for the evil man, nor will he lengthen his days like a shadow, because he does not fear God. [Matt 25:41]
  '14':
  - type: text
    content: 'There is a meaningless '
  - type: text
    content: and
  - type: text
    content: ' futile thing which is done on the earth: that is, there are righteous men whose gain is as though they were evil, and evil men whose gain is as though they were righteous. I say that this too is futility (meaningless, vain). '
  '15':
  - type: text
    content: 'Then I commended pleasure '
  - type: text
    content: and
  - type: text
    content: ' enjoyment, because a man [without God] has no better thing under the sun than to eat and to drink and to be merry, for this will stand by him in his toil through the days of his life which God has given him under the sun.'
  '16':
  - type: text
    content: 'When I applied my mind to know wisdom and to see the activities [of mankind] that take place upon the earth—how some men seem to sleep neither day nor night— '
  '17':
  - type: text
    content: 'and I saw all the work of God, I '
  - type: text
    content: concluded
  - type: text
    content: ' that man cannot discover the work that is done under the sun. Even though man may labor in seeking, he will not discover; and [more than that], though a wise man thinks '
  - type: text
    content: and
  - type: text
    content: ' claims he knows, he will not be able to find it out. [Deut 29:29; Rom 11:33]'
  '2':
  - type: text
    content: 'I counsel you to keep the command of the king because of the oath before God [by which you swore loyalty to him]. [2 Sam 21:7] '
  '3':
  - type: text
    content: Do not be in a hurry to get out of his presence. Do not join in a malevolent matter, for the king will do whatever he pleases.
  '4':
  - type: text
    content: 'For the word of a king is authoritative '
  - type: text
    content: and
  - type: text
    content: ' powerful,'
  - type: text
    content: And who will say to him, “What are you doing?”
  '5':
  - type: text
    content: 'Whoever keeps '
  - type: text
    content: and
  - type: text
    content: ' observes a '
  - type: text
    content: royal
  - type: text
    content: ' command will experience neither trouble '
  - type: text
    content: nor
  - type: text
    content: ' misery;'
  - type: text
    content: 'For a wise heart will know the '
  - type: note
    content: Lit time and judgment.
  - type: text
    content: proper time and [appropriate] procedure.
  '6':
  - type: text
    content: 'For there is a '
  - type: note
    content: Lit time and judgment.
  - type: text
    content: proper time and [appropriate] procedure for every delight,
  - type: text
    content: 'Though mankind’s misery '
  - type: text
    content: and
  - type: text
    content: ' trouble lies heavily upon him [who rebels against the king].'
  '7':
  - type: text
    content: For no one knows what will happen;
  - type: text
    content: 'So who can tell him how '
  - type: text
    content: and
  - type: text
    content: ' when it will happen?'
  '8':
  - type: text
    content: 'There is no man who has power '
  - type: text
    content: and
  - type: text
    content: ' authority over the wind to restrain the wind,'
  - type: text
    content: Nor does he have authority over the day of death;
  - type: text
    content: There is no discharge [from service] during time of war,
  - type: text
    content: And evil will not rescue those who [actively seek to] practice it.
  '9':
  - type: text
    content: All this I have seen while applying my mind to every deed that is done under the sun. There is a time in which one man has exercised power over others to their detriment.
