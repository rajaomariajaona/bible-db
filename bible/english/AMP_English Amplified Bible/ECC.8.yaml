document_id: ECC.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Obey Rulers
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Who is like the wise man?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who knows the interpretation of a matter?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man’s wisdom illumines his face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And causes his stern face to beam.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So then, I have seen the wicked buried, those who used to go in and out of the holy place [but did not thereby escape their doom], and they are [praised in spite of their evil and] soon forgotten in the city where they did such things. This too is futility (vanity, emptiness). '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Because the sentence against an evil act is not executed quickly, the hearts of the sons of men are fully set to do evil. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Though a sinner does evil a hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: times
    - type: text
      text: ' and his life [seemingly] is prolonged [in spite of his wickedness], still I know that it will be well with those who [reverently] fear God, who fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him openly [realizing His omnipresence and His power]. [Ps 37:11, 18, 19; Is 3:10, 11; Matt 25:34] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But it will not be well for the evil man, nor will he lengthen his days like a shadow, because he does not fear God. [Matt 25:41]
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'There is a meaningless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' futile thing which is done on the earth: that is, there are righteous men whose gain is as though they were evil, and evil men whose gain is as though they were righteous. I say that this too is futility (meaningless, vain). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then I commended pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoyment, because a man [without God] has no better thing under the sun than to eat and to drink and to be merry, for this will stand by him in his toil through the days of his life which God has given him under the sun.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When I applied my mind to know wisdom and to see the activities [of mankind] that take place upon the earth—how some men seem to sleep neither day nor night— '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and I saw all the work of God, I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: concluded
    - type: text
      text: ' that man cannot discover the work that is done under the sun. Even though man may labor in seeking, he will not discover; and [more than that], though a wise man thinks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' claims he knows, he will not be able to find it out. [Deut 29:29; Rom 11:33]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I counsel you to keep the command of the king because of the oath before God [by which you swore loyalty to him]. [2 Sam 21:7] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do not be in a hurry to get out of his presence. Do not join in a malevolent matter, for the king will do whatever he pleases.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For the word of a king is authoritative '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' powerful,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who will say to him, “What are you doing?”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Whoever keeps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' observes a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: royal
    - type: text
      text: ' command will experience neither trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' misery;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For a wise heart will know the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: time and judgment
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: proper time and [appropriate] procedure.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For there is a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: time and judgment
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: proper time and [appropriate] procedure for every delight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though mankind’s misery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trouble lies heavily upon him [who rebels against the king].'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For no one knows what will happen;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So who can tell him how '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' when it will happen?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'There is no man who has power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority over the wind to restrain the wind,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor does he have authority over the day of death;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no discharge [from service] during time of war,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And evil will not rescue those who [actively seek to] practice it.
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: All this I have seen while applying my mind to every deed that is done under the sun. There is a time in which one man has exercised power over others to their detriment.
