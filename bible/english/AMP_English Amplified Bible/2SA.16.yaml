document_id: 2SA.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ziba, a False Servant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When David was a little past the summit [of the Mount of Olives], behold, Ziba, the servant of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The lame son of Jonathan who was the son of King Saul.
    marker-yv: yv-n
  - type: text
    text: 'Mephibosheth, met him with a team of saddled donkeys, and on them were two hundred loaves of bread, a hundred clusters of raisins, a hundred summer fruits, and a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a bag made from almost the entire skin of an animal. New wine was always put in a new bag so that the bag would stretch as the wine continued to ferment, and then the bag would harden.
    marker-yv: yv-n
  - type: text
    text: 'jug of wine. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The king said to Ziba, “Why do you have these?” Ziba said, “The donkeys are for the king’s household (family) to ride on, the bread and summer fruit for the young men to eat, and the wine is for anyone to drink who becomes weary in the wilderness.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the king said, “And where is your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Saul’s grandson.
    marker-yv: yv-n
  - type: text
    text: 'master’s son [Mephibosheth]?” Ziba said to the king, “Behold, he remains in Jerusalem, for he said, ‘Today the house of Israel will give me back the kingdom of my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The reference is to his dead grandfather, King Saul.
    marker-yv: yv-n
  - type: text
    text: 'father.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the king said to Ziba, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because the rebellion was in progress it was easy for Ziba to trick David with the gifts and his lie.
    marker-yv: yv-n
  - type: text
    text: Behold, everything that belonged to Mephibosheth is [now] yours.” Ziba said, “I bow down [in honor and gratitude]; let me find favor in your sight, O my lord the king.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Is Cursed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When King David came to Bahurim, a man named Shimei, the son of Gera, came out from there. He was of the family of Saul’s household and he was cursing continually as he came out. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He threw stones at David and at all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 15:14.
    marker-yv: yv-n
  - type: text
    text: 'servants of King David; yet all the people and all the warriors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remained
  - type: text
    text: ' on his right and on his left. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'This is what Shimei said as he cursed: “Get out, get out, you man of bloodshed, you worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' useless man! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has returned upon you all the bloodshed of the house of Saul, in whose place you have reigned; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has given the kingdom into the hands of Absalom your son. And behold, you are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: caught
  - type: text
    text: ' in your own evil, for you are a man of bloodshed!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Abishai [David’s nephew], the son of Zeruiah, said to the king, “Why should this dead dog (despicable person) curse my lord the king? Let me go over and take off his head.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But the king said, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: What to me and to you
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: What business is this of yours, O sons of Zeruiah? If Shimei is cursing because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, ‘Curse David,’ then who should say, ‘Why have you done so?’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then David said to Abishai and to all his servants, “Look, my son [Absalom] who came from my own body, is seeking my life; how much more [reason] now [does] this Benjamite [have to curse me]? Let him alone and let him curse, for [it could be that] the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has told him [to do it]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Perhaps the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will look on the wrong done to me [by Shimei, if he is acting on his own]; and [in that case perhaps] the Lord will this day return good to me in place of his cursing.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So David and his men went on the road; and Shimei went along on the hillside close beside David and cursed as he went and threw stones and dust at him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The king and all the people who were with him arrived [at the Jordan River] weary, and he refreshed himself there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Absalom Enters Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Absalom and all the people, the men of Israel, entered Jerusalem, and Ahithophel with him. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Now it happened when Hushai the Archite, David’s friend, came to Absalom, Hushai said to him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Long
  - type: text
    text: ' live the king! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Long
  - type: text
    text: ' live the king!” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Absalom said to Hushai, “Is this your loyalty to your friend? Why did you not go with your friend?” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hushai said to Absalom, “No! For whomever the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and this people and all the men of Israel have chosen [as king], I will be his, and I will remain with him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Besides, whom should I serve? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Should I
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: serve
  - type: text
    text: ' in the presence of David’s son? As I have served in your father’s presence, so I shall serve in your presence.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Absalom said to Ahithophel, “Give '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' your advice. What should we do?” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ahithophel said to Absalom, “Go in to your father’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubines, whom he has left behind to take care of the house; then all Israel will hear that you have made yourself odious to your father. Then the hands of all who are with you will be strengthened [by your boldness and audacity].” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So they pitched a tent for Absalom on the roof [of the king’s palace], and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This outrageous act was an assumption of absolute power, and signified an irreversible break in Absalom’s relationship with his father. Nathan the prophet had prophesied that David would be publicly humiliated in this way.
    marker-yv: yv-n
  - type: text
    text: 'Absalom went in to his father’s concubines in the sight of all Israel. [2 Sam 12:11, 12] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The advice of Ahithophel, which he gave in those days, was as if a man had consulted the word of God; that is how all Ahithophel’s counsel was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: regarded
  - type: text
    text: ' by both David and Absalom.'
