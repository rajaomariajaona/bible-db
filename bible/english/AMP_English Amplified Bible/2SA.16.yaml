verses:
  '1':
  - type: heading
    content: Ziba, a False Servant
  - type: text
    content: 'When David was a little past the summit [of the Mount of Olives], behold, Ziba, the servant of '
  - type: note
    content: The lame son of Jonathan who was the son of King Saul.
  - type: text
    content: 'Mephibosheth, met him with a team of saddled donkeys, and on them were two hundred loaves of bread, a hundred clusters of raisins, a hundred summer fruits, and a '
  - type: note
    content: This was a bag made from almost the entire skin of an animal. New wine was always put in a new bag so that the bag would stretch as the wine continued to ferment, and then the bag would harden.
  - type: text
    content: 'jug of wine. '
  '10':
  - type: text
    content: But the king said, “
  - type: note
    content: Lit What to me and to you.
  - type: text
    content: What business is this of yours, O sons of Zeruiah? If Shimei is cursing because the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, ‘Curse David,’ then who should say, ‘Why have you done so?’ ” '
  '11':
  - type: text
    content: Then David said to Abishai and to all his servants, “Look, my son [Absalom] who came from my own body, is seeking my life; how much more [reason] now [does] this Benjamite [have to curse me]? Let him alone and let him curse, for [it could be that] the L
  - type: heading
    content: ord
  - type: text
    content: ' has told him [to do it]. '
  '12':
  - type: text
    content: Perhaps the L
  - type: heading
    content: ord
  - type: text
    content: ' will look on the wrong done to me [by Shimei, if he is acting on his own]; and [in that case perhaps] the Lord will this day return good to me in place of his cursing.” '
  '13':
  - type: text
    content: 'So David and his men went on the road; and Shimei went along on the hillside close beside David and cursed as he went and threw stones and dust at him. '
  '14':
  - type: text
    content: The king and all the people who were with him arrived [at the Jordan River] weary, and he refreshed himself there.
  - type: heading
    content: Absalom Enters Jerusalem
  '15':
  - type: text
    content: 'Then Absalom and all the people, the men of Israel, entered Jerusalem, and Ahithophel with him. '
  '16':
  - type: text
    content: Now it happened when Hushai the Archite, David’s friend, came to Absalom, Hushai said to him, “
  - type: text
    content: Long
  - type: text
    content: ' live the king! '
  - type: text
    content: Long
  - type: text
    content: ' live the king!” '
  '17':
  - type: text
    content: 'Absalom said to Hushai, “Is this your loyalty to your friend? Why did you not go with your friend?” '
  '18':
  - type: text
    content: Hushai said to Absalom, “No! For whomever the L
  - type: heading
    content: ord
  - type: text
    content: ' and this people and all the men of Israel have chosen [as king], I will be his, and I will remain with him. '
  '19':
  - type: text
    content: 'Besides, whom should I serve? '
  - type: text
    content: Should I
  - type: text
    content: ' not '
  - type: text
    content: serve
  - type: text
    content: ' in the presence of David’s son? As I have served in your father’s presence, so I shall serve in your presence.”'
  '2':
  - type: text
    content: 'The king said to Ziba, “Why do you have these?” Ziba said, “The donkeys are for the king’s household (family) to ride on, the bread and summer fruit for the young men to eat, and the wine is for anyone to drink who becomes weary in the wilderness.” '
  '20':
  - type: text
    content: 'Then Absalom said to Ahithophel, “Give '
  - type: text
    content: me
  - type: text
    content: ' your advice. What should we do?” '
  '21':
  - type: text
    content: 'Ahithophel said to Absalom, “Go in to your father’s '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubines, whom he has left behind to take care of the house; then all Israel will hear that you have made yourself odious to your father. Then the hands of all who are with you will be strengthened [by your boldness and audacity].” '
  '22':
  - type: text
    content: 'So they pitched a tent for Absalom on the roof [of the king’s palace], and '
  - type: note
    content: This outrageous act was an assumption of absolute power, and signified an irreversible break in Absalom’s relationship with his father. Nathan the prophet had prophesied that David would be publicly humiliated in this way.
  - type: text
    content: 'Absalom went in to his father’s concubines in the sight of all Israel. [2 Sam 12:11, 12] '
  '23':
  - type: text
    content: 'The advice of Ahithophel, which he gave in those days, was as if a man had consulted the word of God; that is how all Ahithophel’s counsel was '
  - type: text
    content: regarded
  - type: text
    content: ' by both David and Absalom.'
  '3':
  - type: text
    content: 'Then the king said, “And where is your '
  - type: note
    content: I.e. Saul’s grandson.
  - type: text
    content: 'master’s son [Mephibosheth]?” Ziba said to the king, “Behold, he remains in Jerusalem, for he said, ‘Today the house of Israel will give me back the kingdom of my '
  - type: note
    content: The reference is to his dead grandfather, King Saul.
  - type: text
    content: 'father.’ ” '
  '4':
  - type: text
    content: Then the king said to Ziba, “
  - type: note
    content: Because the rebellion was in progress it was easy for Ziba to trick David with the gifts and his lie.
  - type: text
    content: Behold, everything that belonged to Mephibosheth is [now] yours.” Ziba said, “I bow down [in honor and gratitude]; let me find favor in your sight, O my lord the king.”
  - type: heading
    content: David Is Cursed
  '5':
  - type: text
    content: 'When King David came to Bahurim, a man named Shimei, the son of Gera, came out from there. He was of the family of Saul’s household and he was cursing continually as he came out. '
  '6':
  - type: text
    content: 'He threw stones at David and at all the '
  - type: note
    content: See note 15:14.
  - type: text
    content: 'servants of King David; yet all the people and all the warriors '
  - type: text
    content: remained
  - type: text
    content: ' on his right and on his left. '
  '7':
  - type: text
    content: 'This is what Shimei said as he cursed: “Get out, get out, you man of bloodshed, you worthless '
  - type: text
    content: and
  - type: text
    content: ' useless man! '
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has returned upon you all the bloodshed of the house of Saul, in whose place you have reigned; and the L'
  - type: heading
    content: ord
  - type: text
    content: ' has given the kingdom into the hands of Absalom your son. And behold, you are '
  - type: text
    content: caught
  - type: text
    content: ' in your own evil, for you are a man of bloodshed!”'
  '9':
  - type: text
    content: 'Then Abishai [David’s nephew], the son of Zeruiah, said to the king, “Why should this dead dog (despicable person) curse my lord the king? Let me go over and take off his head.” '
