document_id: 1CH.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Kingdom Strengthened
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this it came about that David defeated and subdued the Philistines, and he took Gath and its villages out of the hand of the Philistines. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he sent Hadoram his son to King David to greet him and to bless (congratulate) him, because he had fought against Hadadezer and had defeated him; for Hadadezer had been at war with Tou. And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hadoram brought
    - type: text
      text: ' all kinds of articles of gold and silver and bronze. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King David also dedicated these to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [setting them apart for sacred use], with the silver and the gold which he brought from all the nations: from Edom, Moab, the Ammonites, the Philistines, and from Amalek.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also Abishai the son of Zeruiah [David’s half-sister] defeated 18,000 Edomites in the Valley of Salt. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He put military outposts in Edom, and all the Edomites became David’s servants. Thus the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' helped David wherever he went.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David reigned over all Israel and administered justice and righteousness for all his people. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab the son of Zeruiah was in command of the army, and Jehoshaphat the son of Ahilud was the recorder; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zadok the son of Ahitub and Abimelech the son of Abiathar were the priests, and Shavsha was secretary (state scribe); '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Benaiah the son of Jehoiada was in charge of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These men were apparently foreign, professional soldiers who were hired to protect the king.
      marker-yv: yv-n
    - type: text
      text: Cherethites and the Pelethites [David’s bodyguards], and the sons of David were chiefs at the king’s side.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He defeated Moab, and the Moabites became David’s servants and brought tribute (gifts).
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David also defeated Hadadezer king of Zobah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as far as
    - type: text
      text: ' Hamath, as he went to establish his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'dominion to the Euphrates River. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David took from him 1,000 chariots, 7,000 horsemen, and 20,000 foot soldiers (infantrymen). David also '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. cut the tendon between the hoof and fetlock.
      marker-yv: yv-n
    - type: text
      text: hamstrung [nearly] all the chariot horses [to make them lame and useless], but left enough of them for 100 chariots.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Arameans (Syrians) of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Darmeseq
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Damascus came to help Hadadezer king of Zobah, David killed 22,000 of the Arameans. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: military outposts
    - type: text
      text: ' among the Arameans in Damascus; and the Arameans became David’s servants and brought tribute. Thus the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' helped David wherever he went. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David took the shields of gold which were carried by the servants of Hadadezer and brought them to Jerusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Likewise from Tibhath and from Cun, cities of Hadadezer, David brought a very large amount of bronze, with which Solomon later made the bronze Sea (large basin), the pillars, and the utensils of bronze. [1 Kin 7:13-47; 2 Chr 4:2-18]
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Tou king of Hamath heard how David had defeated all the army of Hadadezer king of Zobah, '
