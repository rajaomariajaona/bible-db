document_id: 1CH.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Kingdom Strengthened
  - type: text
    content: 'After this it came about that David defeated and subdued the Philistines, and he took Gath and its villages out of the hand of the Philistines. '
  '10':
  - type: text
    content: 'he sent Hadoram his son to King David to greet him and to bless (congratulate) him, because he had fought against Hadadezer and had defeated him; for Hadadezer had been at war with Tou. And '
  - type: text
    content: Hadoram brought
  - type: text
    content: ' all kinds of articles of gold and silver and bronze. '
  '11':
  - type: text
    content: King David also dedicated these to the L
  - type: heading
    content: ord
  - type: text
    content: ' [setting them apart for sacred use], with the silver and the gold which he brought from all the nations: from Edom, Moab, the Ammonites, the Philistines, and from Amalek.'
  '12':
  - type: text
    content: 'Also Abishai the son of Zeruiah [David’s half-sister] defeated 18,000 Edomites in the Valley of Salt. '
  '13':
  - type: text
    content: He put military outposts in Edom, and all the Edomites became David’s servants. Thus the L
  - type: heading
    content: ord
  - type: text
    content: ' helped David wherever he went.'
  '14':
  - type: text
    content: 'So David reigned over all Israel and administered justice and righteousness for all his people. '
  '15':
  - type: text
    content: 'Joab the son of Zeruiah was in command of the army, and Jehoshaphat the son of Ahilud was the recorder; '
  '16':
  - type: text
    content: 'Zadok the son of Ahitub and Abimelech the son of Abiathar were the priests, and Shavsha was secretary (state scribe); '
  '17':
  - type: text
    content: 'and Benaiah the son of Jehoiada was in charge of the '
  - type: note
    content: These men were apparently foreign, professional soldiers who were hired to protect the king.
  - type: text
    content: Cherethites and the Pelethites [David’s bodyguards], and the sons of David were chiefs at the king’s side.
  '2':
  - type: text
    content: He defeated Moab, and the Moabites became David’s servants and brought tribute (gifts).
  '3':
  - type: text
    content: 'David also defeated Hadadezer king of Zobah '
  - type: text
    content: as far as
  - type: text
    content: ' Hamath, as he went to establish his '
  - type: note
    content: Lit hand.
  - type: text
    content: 'dominion to the Euphrates River. '
  '4':
  - type: text
    content: 'David took from him 1,000 chariots, 7,000 horsemen, and 20,000 foot soldiers (infantrymen). David also '
  - type: note
    content: I.e. cut the tendon between the hoof and fetlock.
  - type: text
    content: hamstrung [nearly] all the chariot horses [to make them lame and useless], but left enough of them for 100 chariots.
  '5':
  - type: text
    content: 'When the Arameans (Syrians) of '
  - type: note
    content: Heb Darmeseq.
  - type: text
    content: 'Damascus came to help Hadadezer king of Zobah, David killed 22,000 of the Arameans. '
  '6':
  - type: text
    content: 'Then David put '
  - type: text
    content: military outposts
  - type: text
    content: ' among the Arameans in Damascus; and the Arameans became David’s servants and brought tribute. Thus the L'
  - type: heading
    content: ord
  - type: text
    content: ' helped David wherever he went. '
  '7':
  - type: text
    content: 'David took the shields of gold which were carried by the servants of Hadadezer and brought them to Jerusalem. '
  '8':
  - type: text
    content: Likewise from Tibhath and from Cun, cities of Hadadezer, David brought a very large amount of bronze, with which Solomon later made the bronze Sea (large basin), the pillars, and the utensils of bronze. [1 Kin 7:13-47; 2 Chr 4:2-18]
  '9':
  - type: text
    content: 'When Tou king of Hamath heard how David had defeated all the army of Hadadezer king of Zobah, '
