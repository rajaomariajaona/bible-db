    - type: text
      text: Jehoshaphat Allies with Ahab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jehoshaphat had great wealth and honor, and was allied by '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jehoshaphat was married to Athaliah, Ahab’s daughter.
    marker-yv: yv-n
  - type: text
    text: 'marriage with Ahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Some years later he went down to [visit] Ahab in Samaria. And Ahab slaughtered many sheep and oxen for him and the people who were with him, and induced him to go up against Ramoth-gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ahab king of Israel said to Jehoshaphat king of Judah, “Will you go with me to [fight against] Ramoth-gilead?” He answered, “I am as you are, and my people as your people [your hopes and concerns are ours]; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we will be
  - type: text
    text: ' with you in the battle.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Further, Jehoshaphat said to the king of Israel, “Please inquire '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: as the day
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: first for the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the king of Israel assembled the prophets, four hundred men, and said to them, “Shall we go against Ramoth-gilead to battle, or shall I refrain?” And they said, “Go up, for God will hand it over to the king.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But Jehoshaphat said, “Is there no prophet of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' still here by whom we may inquire?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The king of Israel said to Jehoshaphat, “There is still one man by whom we may inquire of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', but I hate him, for he never prophesies [anything] good for me, but always evil. He is Micaiah the son of Imla” And Jehoshaphat said, “Let not the king say so [perhaps this time it will be different].”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahab’s False Prophets Assure Victory
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the king of Israel called for an officer and said, “Bring Micaiah the son of Imla quickly.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the king of Israel and Jehoshaphat the king of Judah were sitting, each on his throne, arrayed in their robes; they were sitting at the threshing floor at the entrance of the gate of Samaria; and all the prophets were prophesying before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Zedekiah the son of Chenaanah had made horns of iron for himself; and said, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘With these you shall gore the Arameans (Syrians) until they are destroyed.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All the prophets prophesied this, saying, “Go up to Ramoth-gilead and succeed; the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will hand it over to the king.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Micaiah Brings Word from God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The messenger who went to call Micaiah said to him, “Listen, the words of the prophets are of one accord, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foretelling a
  - type: text
    text: ' favorable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: outcome
  - type: text
    text: ' for the king. So just let your word be like one of them and speak favorably.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But Micaiah said, “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, I will [only] speak what my God says.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When he came to the king, the king said to him, “Micaiah, shall we go to Ramoth-gilead to battle, or shall I refrain?” And he said, “Go up and succeed, for they will be handed over to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the king said to him, “How many times must I warn you (make you swear an oath) to tell me nothing but the truth in the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Micaiah said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I saw all [the people of] Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Scattered on the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As sheep that have no shepherd;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘These have no master.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let each one return to his house in peace.’ ”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then the king of Israel said to Jehoshaphat, “Did I not tell you that he would not prophesy good in regard to me, but [only] evil?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So Micaiah said, “Therefore, hear the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': I saw the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' sitting on His throne, and all the host (army) of heaven standing on His right and on His left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, ‘Who will entice Ahab king of Israel to go up and fall [defeated] at Ramoth-gilead?’ And one said this and another said that. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then a spirit came forward and stood before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said, ‘I will entice him.’ The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, ‘By what means?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He said, ‘I will go out and be a deceptive spirit in the mouth of all his prophets.’ Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, ‘You are to entice him and also succeed. Go and do so.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Now, you see, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' put a deceptive spirit in the mouth of these prophets of yours; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has [actually] proclaimed disaster against you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Zedekiah the son of Chenaanah came up and struck Micaiah on the cheek and said, “Which way did the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' go [when he departed] from me to speak to you?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Micaiah said, “Behold, you will see on that day when you go into an inner room [desperately trying] to hide yourself.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then the king of Israel said, “Take Micaiah and return him to Amon the governor of the city and to Joash the king’s son, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and say, ‘Thus says the king: “Put this man in prison and feed him just enough bread and water to survive until I return in peace (safely).” ’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Micaiah said, “If you actually return in peace, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has not spoken by me.” And he added, “Listen [to what I have said], you people, all of you.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahab’s Defeat and Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So [Ahab] the king of Israel and Jehoshaphat king of Judah went up against Ramoth-gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The king of Israel said to Jehoshaphat, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jehoshaphat may have agreed to this because he thought it was a noble gesture on Ahab’s part; i.e. Ahab fighting incognito alongside his troops while Jehoshaphat would presumably stay aloof under the protection of his own bodyguard. More likely Ahab’s plan was simply to disguise himself and let Jehoshaphat be the target by unwittingly serving as Ahab’s double, and the plan very nearly succeeded.
    marker-yv: yv-n
  - type: text
    text: 'I will disguise myself and will go into battle, but you put on your [royal] robes.” So the king of Israel disguised himself, and they went into the battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now the king of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The people of the kingdom of Aram were descendants of Aram, the son of Shem, son of Noah (Gen 10:22, 23). The territory of the Arameans also included areas later identified as Syria and Mesopotamia.
    marker-yv: yv-n
  - type: text
    text: 'Aram (Syria) had commanded the captains of his chariots, saying, “Do not fight with the small or the great, but only with the king of Israel.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So when the captains of the chariots saw Jehoshaphat [of Judah], they said, “It is the king of Israel!” So they turned to fight against him, but Jehoshaphat called out [for God’s help], and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' helped him; and God diverted them away from him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'When the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then a certain man drew his bow at random and struck [Ahab] the king of Israel between the scales of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' armor. So Ahab said to his chariot driver, “Turn around and take me out of the battle, because I am seriously wounded.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The battle raged that day, and the king of Israel propped himself up in his chariot in front of the Arameans (Syrians) until the evening, and at sunset he died.
