      children:
      - type: text
        text: ord
    - type: text
      text: ': ‘With these you shall gore the Arameans (Syrians) until they are destroyed.’ ” '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: All the prophets prophesied this, saying, “Go up to Ramoth-gilead and succeed; the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will hand it over to the king.”'
  - type: usfm
