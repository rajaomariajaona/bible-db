  - type: heading
    content: Ahab’s Defeat and Death
  '28':
  - type: text
    content: 'So [Ahab] the king of Israel and Jehoshaphat king of Judah went up against Ramoth-gilead. '
  '29':
  - type: text
    content: The king of Israel said to Jehoshaphat, “
  - type: note
    content: Jehoshaphat may have agreed to this because he thought it was a noble gesture on Ahab’s part; i.e. Ahab fighting incognito alongside his troops while Jehoshaphat would presumably stay aloof under the protection of his own bodyguard. More likely Ahab’s plan was simply to disguise himself and let Jehoshaphat be the target by unwittingly serving as Ahab’s double, and the plan very nearly succeeded.
  - type: text
    content: 'I will disguise myself and will go into battle, but you put on your [royal] robes.” So the king of Israel disguised himself, and they went into the battle. '
  '3':
  - type: text
    content: 'Ahab king of Israel said to Jehoshaphat king of Judah, “Will you go with me to [fight against] Ramoth-gilead?” He answered, “I am as you are, and my people as your people [your hopes and concerns are ours]; '
  - type: text
    content: we will be
  - type: text
    content: ' with you in the battle.”'
  '30':
  - type: text
    content: 'Now the king of '
  - type: note
    content: The people of the kingdom of Aram were descendants of Aram, the son of Shem, son of Noah (Gen 10:22, 23). The territory of the Arameans also included areas later identified as Syria and Mesopotamia.
  - type: text
    content: 'Aram (Syria) had commanded the captains of his chariots, saying, “Do not fight with the small or the great, but only with the king of Israel.” '
  '31':
  - type: text
    content: So when the captains of the chariots saw Jehoshaphat [of Judah], they said, “It is the king of Israel!” So they turned to fight against him, but Jehoshaphat called out [for God’s help], and the L
  - type: heading
    content: ord
  - type: text
    content: ' helped him; and God diverted them away from him. '
  '32':
  - type: text
    content: 'When the captains of the chariots saw that it was not the king of Israel, they turned back from pursuing him. '
  '33':
  - type: text
    content: 'Then a certain man drew his bow at random and struck [Ahab] the king of Israel between the scales of '
  - type: text
    content: his
  - type: text
    content: ' armor. So Ahab said to his chariot driver, “Turn around and take me out of the battle, because I am seriously wounded.” '
  '34':
  - type: text
    content: The battle raged that day, and the king of Israel propped himself up in his chariot in front of the Arameans (Syrians) until the evening, and at sunset he died.
  '4':
  - type: text
    content: 'Further, Jehoshaphat said to the king of Israel, “Please inquire '
  - type: note
    content: Lit as the day.
  - type: text
    content: first for the word of the L
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '5':
  - type: text
    content: 'Then the king of Israel assembled the prophets, four hundred men, and said to them, “Shall we go against Ramoth-gilead to battle, or shall I refrain?” And they said, “Go up, for God will hand it over to the king.” '
  '6':
  - type: text
    content: But Jehoshaphat said, “Is there no prophet of the L
  - type: heading
    content: ord
  - type: text
    content: ' still here by whom we may inquire?” '
  '7':
  - type: text
    content: The king of Israel said to Jehoshaphat, “There is still one man by whom we may inquire of the L
  - type: heading
    content: ord
  - type: text
    content: ', but I hate him, for he never prophesies [anything] good for me, but always evil. He is Micaiah the son of Imla” And Jehoshaphat said, “Let not the king say so [perhaps this time it will be different].”'
  - type: heading
    content: Ahab’s False Prophets Assure Victory
  '8':
  - type: text
    content: 'Then the king of Israel called for an officer and said, “Bring Micaiah the son of Imla quickly.” '
  '9':
  - type: text
    content: 'Now the king of Israel and Jehoshaphat the king of Judah were sitting, each on his throne, arrayed in their robes; they were sitting at the threshing floor at the entrance of the gate of Samaria; and all the prophets were prophesying before them. '
