document_id: PSA.58,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 58
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for the Punishment of the Wicked.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] “Do Not Destroy.” A Mikhtam of David. [A record of memorable thoughts of David].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you indeed speak righteousness, O gods (heavenly beings)?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you judge fairly, O sons of men? [Ps 82:1, 2]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The [unyieldingly] righteous will rejoice when he sees the vengeance [of God];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will wash his feet in the blood of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Men will say, “Surely there is a reward for the righteous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely there is a God who judges on the earth.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, in your heart you devise wrongdoing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On earth you deal out the violence of your hands.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked are estranged from the womb;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These go astray from birth, speaking lies [even twisted partial truths].
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their poison is like the venom of a serpent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like the deaf horned viper that stops up its ear,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that it does not listen to the voice of charmers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or of the skillful enchanter casting [cunning] spells.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O God, break their teeth in their mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break out the fangs of the young lions, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them flow away like water that runs off;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he aims his arrows, let them be as headless shafts.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let them be
    - type: text
      text: ' as a snail which melts away (secretes slime) as it goes along,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the miscarriage of a woman which never sees the sun.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Before your cooking pots can feel the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fire of
    - type: text
      text: ' thorns [burning under them as fuel],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will sweep them away with a whirlwind, the green and the burning ones alike.
