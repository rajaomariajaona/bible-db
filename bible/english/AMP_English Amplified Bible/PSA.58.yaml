verses:
  '1':
  - type: heading
    content: Psalm 58
  - type: heading
    content: Prayer for the Punishment of the Wicked.
  - type: text
    content: To the Chief Musician; set to [the tune of] “Do Not Destroy.” A Mikhtam of David. [A record of memorable thoughts of David].
  - type: text
    content: Do you indeed speak righteousness, O gods (heavenly beings)?
  - type: text
    content: Do you judge fairly, O sons of men? [Ps 82:1, 2]
  '10':
  - type: text
    content: ¶The [unyieldingly] righteous will rejoice when he sees the vengeance [of God];
  - type: text
    content: He will wash his feet in the blood of the wicked.
  '11':
  - type: text
    content: Men will say, “Surely there is a reward for the righteous;
  - type: text
    content: Surely there is a God who judges on the earth.”
  '2':
  - type: text
    content: No, in your heart you devise wrongdoing;
  - type: text
    content: On earth you deal out the violence of your hands.
  '3':
  - type: text
    content: The wicked are estranged from the womb;
  - type: text
    content: These go astray from birth, speaking lies [even twisted partial truths].
  '4':
  - type: text
    content: Their poison is like the venom of a serpent;
  - type: text
    content: They are like the deaf horned viper that stops up its ear,
  '5':
  - type: text
    content: So that it does not listen to the voice of charmers,
  - type: text
    content: Or of the skillful enchanter casting [cunning] spells.
  '6':
  - type: text
    content: ¶O God, break their teeth in their mouth;
  - type: text
    content: Break out the fangs of the young lions, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '7':
  - type: text
    content: Let them flow away like water that runs off;
  - type: text
    content: When he aims his arrows, let them be as headless shafts.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Let them be
  - type: text
    content: ' as a snail which melts away (secretes slime) as it goes along,'
  - type: text
    content: Like the miscarriage of a woman which never sees the sun.
  '9':
  - type: text
    content: 'Before your cooking pots can feel the '
  - type: text
    content: fire of
  - type: text
    content: ' thorns [burning under them as fuel],'
  - type: text
    content: He will sweep them away with a whirlwind, the green and the burning ones alike.
