document_id: LUK.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Since [as is well known] many have undertaken to compile an orderly account of the things which have been fulfilled among us [by God], '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'exactly as they were handed down to us by those [with personal experience] who from the beginning [of Christ’s ministry] were eyewitnesses and ministers of the word [that is, of the teaching concerning salvation through faith in Christ], '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'it seemed fitting for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Luke may have been a Gentile. If so, he is the only Gentile author whose work is included in the NT. In addition to '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Gospel of Luke,
      - type: text
        text: ' he wrote '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Acts of the Apostles,
      - type: text
        text: ' and is thought by some scholars to have been the author of '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Letter to the Hebrews
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'me as well, [and so I have decided] after having carefully searched out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' investigated all the events accurately, from the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very
  - type: text
    text: ' beginning, to write an orderly account for you, most excellent Theophilus; [Acts 1:1] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'so that you may know the exact truth about the things you have been '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: orally instructed
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: taught [that is, the history and doctrine of the faith].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Birth of John the Baptist Foretold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In the days of Herod [the Great], king of Judea, there was a certain priest whose name was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Zechariah. The spelling is different because a Greek word cannot end with an “h,” and in place of “ah” the common Greek ending “-as” was substituted.
    marker-yv: yv-n
  - type: text
    text: 'Zacharias, of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: King David organized the priests into 24 groups or divisions, each headed by a president. A division served twice a year for a week at a time (1 Chr 24:1-19).
    marker-yv: yv-n
  - type: text
    text: 'the division of Abijah. His wife was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: from the daughters of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a descendant of Aaron [the first high priest of Israel], and her name was Elizabeth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They both were righteous (approved) in the sight of God, walking blamelessly in all the commandments and requirements of the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But they were childless, because Elizabeth was barren, and they were both far advanced in years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now it happened while Zacharias was serving as priest before God in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: appointed
  - type: text
    text: ' order of his priestly division, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'as was the custom of the priesthood, he was chosen by lot to enter [the sanctuary of] the temple of the Lord and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. normally a once-in-a-lifetime privilege for a priest.
    marker-yv: yv-n
  - type: text
    text: 'burn incense [on the altar of incense]. [Ex 30:7] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And all the congregation was praying outside [in the court of the temple] at the hour of the incense offering. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And an angel of the Lord appeared to him, standing to the right of the altar of incense. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Zacharias saw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the angel,
  - type: text
    text: ' he was troubled and overcome with fear. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the angel said to him, “Do not be afraid, Zacharias, because your petition [in prayer] was heard, and your wife Elizabeth will bear you a son, and you will name him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'John the Baptist is considered the last of the Old Testament prophets. His mother, Elizabeth, and Mary the mother of Jesus, were related (1:36), and Mary may have been with Elizabeth at the time John was born (1:56). John the Baptist is not to be confused with John the Apostle who, along with his brother James, was among the twelve disciples of Jesus. John and James were the sons of Zebedee and Salome. John the Apostle authored the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gospel of John,
      - type: text
        text: ' three brief letters '
      - type: usfm
        marker: it
        children:
        - type: text
          text: (1 John, 2 John, 3 John)
      - type: text
        text: ', and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Revelation
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'John. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You will have great joy and delight, and many will rejoice over his birth, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'for he will be great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distinguished in the sight of the Lord; and will never drink wine or liquor, and he will be filled with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' empowered to act by the Holy Spirit while still in his mother’s womb. [Num 6:3] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He will turn many of the sons of Israel back [from sin] to [love and serve] the Lord their God. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It is he who will go '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as a forerunner
  - type: text
    text: ' before Him in the spirit and power of Elijah, '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: to turn the hearts of the fathers back to the children
  - type: text
    text: ', and the disobedient to the attitude of the righteous [which is to seek and submit to the will of God]—in order to make ready a people [perfectly] prepared [spiritually and morally] for the Lord.” [Is 40:3; Mal 4:5, 6]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Zacharias said to the angel, “How will I be certain of this? For I am an old man and my wife is advanced in age.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The angel replied and said to him, “I am Gabriel; I stand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' minister in the [very] presence of God, and I have been sent [by Him] to speak to you and to bring you this good news. [Dan 8:16; 9:21] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: behold
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Listen carefully, you will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' silent and unable to speak until the day when these things take place, because you did not believe what I told you; but my words will be fulfilled at their proper time.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The people [outside in the court] were waiting for Zacharias, and were wondering about his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: long
  - type: text
    text: ' delay in the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when he did come out, he was unable to speak to them. They realized that he had seen a vision in the temple; and he kept making signs to them, and remained mute. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When his time of priestly service was finished, he returned to his home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now after this his wife Elizabeth became pregnant, and for five months she secluded herself completely, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“This is how the Lord has dealt with me in the days when He looked with favor on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me,
  - type: text
    text: ' to take away my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At this time childlessness was a social stigma.
    marker-yv: yv-n
  - type: text
    text: disgrace among men.” [Gen 30:23; Is 4:1]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus’ Birth Foretold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now in the sixth month [of Elizabeth’s pregnancy] the angel Gabriel was sent from God to a city in Galilee called Nazareth, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'to a virgin '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The first stage of marriage (called '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shiddukin
      - type: text
        text: ' in Hebrew) in Jewish tradition and law, usually lasting for a year before the wedding night; unlike an engagement, it was legally binding and required a divorce to nullify it. The woman remained with her parents during the betrothal year and was referred to as a “wife” even though the marriage was not consummated during this period of time.'
    marker-yv: yv-n
  - type: text
    text: 'betrothed to a man whose name was Joseph, a descendant of the house of David; and the virgin’s name was Mary. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And coming to her, the angel said, “Greetings, favored one! The Lord is with you.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But she was greatly perplexed at what he said, and kept carefully considering what kind of greeting this was. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The angel said to her, “Do not be afraid, Mary, for you have found favor with God. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Listen carefully: you will conceive in your womb and give birth to a son, and you shall name Him Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He will be great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' eminent and will be called the Son of the Most High; and the Lord God will give Him the throne of His father David; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and He will reign over the house of Jacob (Israel) forever, and of His kingdom there shall be no end.” [Is 9:6, 7; Dan 2:44] '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mary said to the angel, “How will this be, since I am a virgin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have no intimacy with any man?” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then the angel replied to her, “The Holy Spirit will come upon you, and the power of the Most High will overshadow you [like a cloud]; for that reason the holy (pure, sinless) Child shall be called the Son of God. [Ex 40:34; Is 7:14] '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And listen, even your relative Elizabeth has also conceived a son in her old age; and she who was called barren is now in her sixth month. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'For with God nothing [is or ever] shall be impossible.” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then Mary said, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mary’s response was significantly different from Zacharias’ (v 18). Zacharias would not take Gabriel’s word, and instead wanted some kind of miraculous sign as proof.
    marker-yv: yv-n
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I am
  - type: text
    text: ' the servant of the Lord; may it be done to me according to your word.” And the angel left her.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mary Visits Elizabeth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Now at this time Mary arose and hurried to the hill country, to a city of Judah (Judea), '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and she entered the house of Zacharias and greeted Elizabeth. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'When Elizabeth heard Mary’s greeting, her baby leaped in her womb; and Elizabeth was filled with the Holy Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' empowered by Him. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And she exclaimed loudly, “Blessed [worthy to be praised] are you among women, and blessed is the fruit of your womb! '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And how has it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: happened
  - type: text
    text: ' to me, that the mother of my Lord would come to me? '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'For behold, when the sound of your greeting reached my ears, the baby in my womb leaped for joy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And blessed [spiritually fortunate and favored by God] is she who believed '
  - type: usfm
    marker: it
    children:
