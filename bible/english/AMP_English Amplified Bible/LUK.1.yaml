  - type: note
    content: John the Baptist is considered the last of the Old Testament prophets. His mother, Elizabeth, and Mary the mother of Jesus, were related (1:36), and Mary may have been with Elizabeth at the time John was born (1:56). John the Baptist is not to be confused with John the Apostle who, along with his brother James, was among the twelve disciples of Jesus. John and James were the sons of Zebedee and Salome. John the Apostle authored the Gospel of John, three brief letters (1 John, 2 John, 3 John), and Revelation.
