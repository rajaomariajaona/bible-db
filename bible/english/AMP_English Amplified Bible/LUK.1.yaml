  - type: note
    content: The first stage of marriage (called shiddukin in Hebrew) in Jewish tradition and law, usually lasting for a year before the wedding night; unlike an engagement, it was legally binding and required a divorce to nullify it. The woman remained with her parents during the betrothal year and was referred to as a “wife” even though the marriage was not consummated during this period of time.
