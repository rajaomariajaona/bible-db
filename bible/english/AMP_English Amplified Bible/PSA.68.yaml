document_id: PSA.68,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 68
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The God of Sinai and of the Sanctuary.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David. A Song.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Let God arise, and His enemies be scattered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let those who hate Him flee before Him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Your flock found a dwelling place in it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, in Your goodness You provided for the poor.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶The Lord gives the command [to take Canaan];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The women who proclaim the good news are a great host (army);
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “The kings of the [enemies’] armies flee, they flee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the beautiful woman who remains at home divides the spoil [left behind].”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When you lie down [to rest] among the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cooking stones
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: saddlebags
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: sheepfolds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You [Israel] are like the wings of a dove [of victory] overlaid with silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its feathers glistening with gold [trophies taken from the enemy].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: When the Almighty scattered [the Canaanite] kings in the land of Canaan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It was snowing on '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a dark, wooded hill near Shechem.
      marker-yv: yv-n
    - type: text
      text: Zalmon.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶A mountain of God is the mountain of Bashan;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A [high] mountain of many summits is Mount Bashan [rising east of the Jordan].
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Why do you look with envy, mountains with many peaks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the mountain [of the city of Zion] which God has desired for His dwelling place?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will dwell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' forever.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The chariots of God are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: multiples of ten thousand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: myriads, thousands upon thousands;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord is among them as He was at Sinai, in holiness.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'You have ascended on high, You have led away captive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your
    - type: text
      text: ' captives;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have received gifts among men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even from the rebellious also, that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God may dwell there. [Eph 4:8]'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ¶Blessed be the Lord, who bears our burden day by day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The God who is our salvation! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'As smoke is driven away, so drive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' away;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As wax melts before the fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So let the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilty perish before [the presence of] God.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: God is to us a God of acts of salvation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH (Yahweh),
        - type: text
          text: ' usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' the Lord belong escapes from death [setting us free].'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Surely God will shatter the head of His enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hairy scalp of one who goes on in his guilty ways.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The Lord said, “I will bring your enemies back from Bashan;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring them back from the depths of the [Red] Sea,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: That your foot may crush them in blood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That the tongue of your dogs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: may have
    - type: text
      text: ' its share from your enemies.”'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '¶They have seen Your [solemn] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A reference to the procession bringing the ark of the covenant to Mt. Zion.
      marker-yv: yv-n
    - type: text
      text: procession, O God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The procession of my God, my King, into the sanctuary [in holiness].
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The singers go in front, the players of instruments last;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Between them the maidens playing on tambourines.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Bless God in the congregations, [give thanks, gratefully praise Him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you who are
    - type: text
      text: ' from [Jacob] the fountain of Israel.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The youngest is there, Benjamin, ruling them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princes of Judah and their company [the southern tribes],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princes of Zebulun and the princes of Naphtali [the northern tribes].
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ¶Your God has commanded your strength [your power in His service and your resistance to temptation];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show Yourself strong, O God, who acted on our behalf.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Because of Your temple at Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Pagan] kings will bring gifts to You [out of respect].'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But let the righteous be glad; let them be in good spirits before God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, let them rejoice with delight.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Rebuke the beasts [living] among the reeds [in Egypt],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The herd of bulls (the leaders) with the calves of the peoples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trampling underfoot the pieces of silver;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has scattered the peoples who delight in war.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' envoys shall come from Egypt;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ethiopia will quickly stretch out her hands [with the offerings of submission] to God.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ¶Sing to God, O kingdoms of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing praises to the Lord! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: To Him who rides in the highest heavens, the ancient heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Behold, He sends out His voice, a mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majestic voice.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ascribe strength to God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His majesty is over Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His strength is in the skies.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'O God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You are
    - type: text
      text: ' awesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profoundly majestic from Your sanctuary;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of Israel gives strength and power to His people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed be God!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Sing to God, sing praises to His name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lift up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a song
    - type: text
      text: ' for Him who rides through the desert—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His name is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: —be in good spirits before Him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '¶A father of the fatherless and a judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protector of the widows,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is God in His holy habitation.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: God makes a home for the lonely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leads the prisoners into prosperity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only the stubborn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebellious dwell in a parched land.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶O God, when You went out before Your people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When You marched through the wilderness, '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The earth trembled;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The heavens also poured down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rain
    - type: text
      text: ' at the presence of God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sinai itself trembled at the presence of God, the God of Israel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You, O God, sent abroad plentiful rain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You confirmed Your inheritance when it was parched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weary.'
