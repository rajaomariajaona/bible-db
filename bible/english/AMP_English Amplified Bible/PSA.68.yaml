document_id: PSA.68,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 68
  - type: heading
    content: The God of Sinai and of the Sanctuary.
  - type: text
    content: To the Chief Musician. A Psalm of David. A Song.
  - type: text
    content: Let God arise, and His enemies be scattered;
  - type: text
    content: Let those who hate Him flee before Him.
  '10':
  - type: text
    content: Your flock found a dwelling place in it;
  - type: text
    content: O God, in Your goodness You provided for the poor.
  '11':
  - type: text
    content: ¶The Lord gives the command [to take Canaan];
  - type: text
    content: The women who proclaim the good news are a great host (army);
  '12':
  - type: text
    content: “The kings of the [enemies’] armies flee, they flee,
  - type: text
    content: And the beautiful woman who remains at home divides the spoil [left behind].”
  '13':
  - type: text
    content: 'When you lie down [to rest] among the '
  - type: note
    content: Or cooking stones or saddlebags.
  - type: text
    content: sheepfolds,
  - type: text
    content: You [Israel] are like the wings of a dove [of victory] overlaid with silver,
  - type: text
    content: Its feathers glistening with gold [trophies taken from the enemy].
  '14':
  - type: text
    content: When the Almighty scattered [the Canaanite] kings in the land of Canaan,
  - type: text
    content: 'It was snowing on '
  - type: note
    content: I.e. a dark, wooded hill near Shechem.
  - type: text
    content: Zalmon.
  '15':
  - type: text
    content: ¶A mountain of God is the mountain of Bashan;
  - type: text
    content: A [high] mountain of many summits is Mount Bashan [rising east of the Jordan].
  '16':
  - type: text
    content: Why do you look with envy, mountains with many peaks,
  - type: text
    content: At the mountain [of the city of Zion] which God has desired for His dwelling place?
  - type: text
    content: Yes, the L
  - type: heading
    content: ord
  - type: text
    content: ' will dwell '
  - type: text
    content: there
  - type: text
    content: ' forever.'
  '17':
  - type: text
    content: 'The chariots of God are '
  - type: note
    content: Lit multiples of ten thousand.
  - type: text
    content: myriads, thousands upon thousands;
  - type: text
    content: The Lord is among them as He was at Sinai, in holiness.
  '18':
  - type: text
    content: 'You have ascended on high, You have led away captive '
  - type: text
    content: Your
  - type: text
    content: ' captives;'
  - type: text
    content: You have received gifts among men,
  - type: text
    content: Even from the rebellious also, that the L
  - type: heading
    content: ord
  - type: text
    content: ' God may dwell there. [Eph 4:8]'
  '19':
  - type: text
    content: ¶Blessed be the Lord, who bears our burden day by day,
  - type: text
    content: 'The God who is our salvation! '
  - type: text
    content: Selah.
  '2':
  - type: text
    content: 'As smoke is driven away, so drive '
  - type: text
    content: them
  - type: text
    content: ' away;'
  - type: text
    content: As wax melts before the fire,
  - type: text
    content: 'So let the wicked '
  - type: text
    content: and
  - type: text
    content: ' guilty perish before [the presence of] God.'
  '20':
  - type: text
    content: God is to us a God of acts of salvation;
  - type: text
    content: 'And to '
  - type: note
    content: Heb YHWH (Yahweh), usually rendered Lord.
  - type: text
    content: G
  - type: heading
    content: od
  - type: text
    content: ' the Lord belong escapes from death [setting us free].'
  '21':
  - type: text
    content: Surely God will shatter the head of His enemies,
  - type: text
    content: The hairy scalp of one who goes on in his guilty ways.
  '22':
  - type: text
    content: The Lord said, “I will bring your enemies back from Bashan;
  - type: text
    content: I will bring them back from the depths of the [Red] Sea,
  '23':
  - type: text
    content: That your foot may crush them in blood,
  - type: text
    content: 'That the tongue of your dogs '
  - type: text
    content: may have
  - type: text
    content: ' its share from your enemies.”'
  '24':
  - type: text
    content: '¶They have seen Your [solemn] '
  - type: note
    content: A reference to the procession bringing the ark of the covenant to Mt. Zion.
  - type: text
    content: procession, O God,
  - type: text
    content: The procession of my God, my King, into the sanctuary [in holiness].
  '25':
  - type: text
    content: The singers go in front, the players of instruments last;
  - type: text
    content: Between them the maidens playing on tambourines.
  '26':
  - type: text
    content: Bless God in the congregations, [give thanks, gratefully praise Him],
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ', '
  - type: text
    content: you who are
  - type: text
    content: ' from [Jacob] the fountain of Israel.'
  '27':
  - type: text
    content: The youngest is there, Benjamin, ruling them,
  - type: text
    content: The princes of Judah and their company [the southern tribes],
  - type: text
    content: The princes of Zebulun and the princes of Naphtali [the northern tribes].
  '28':
  - type: text
    content: ¶Your God has commanded your strength [your power in His service and your resistance to temptation];
  - type: text
    content: Show Yourself strong, O God, who acted on our behalf.
  '29':
  - type: text
    content: Because of Your temple at Jerusalem
  - type: text
    content: '[Pagan] kings will bring gifts to You [out of respect].'
  '3':
  - type: text
    content: But let the righteous be glad; let them be in good spirits before God,
  - type: text
    content: Yes, let them rejoice with delight.
  '30':
  - type: text
    content: Rebuke the beasts [living] among the reeds [in Egypt],
  - type: text
    content: The herd of bulls (the leaders) with the calves of the peoples;
  - type: text
    content: Trampling underfoot the pieces of silver;
  - type: text
    content: He has scattered the peoples who delight in war.
  '31':
  - type: text
    content: 'Princes '
  - type: text
    content: and
  - type: text
    content: ' envoys shall come from Egypt;'
  - type: text
    content: Ethiopia will quickly stretch out her hands [with the offerings of submission] to God.
  '32':
  - type: text
    content: ¶Sing to God, O kingdoms of the earth,
  - type: text
    content: 'Sing praises to the Lord! '
  - type: text
    content: Selah.
  '33':
  - type: text
    content: To Him who rides in the highest heavens, the ancient heavens,
  - type: text
    content: 'Behold, He sends out His voice, a mighty '
  - type: text
    content: and
  - type: text
    content: ' majestic voice.'
  '34':
  - type: text
    content: Ascribe strength to God;
  - type: text
    content: His majesty is over Israel
  - type: text
    content: And His strength is in the skies.
  '35':
  - type: text
    content: 'O God, '
  - type: text
    content: You are
  - type: text
    content: ' awesome '
  - type: text
    content: and
  - type: text
    content: ' profoundly majestic from Your sanctuary;'
  - type: text
    content: The God of Israel gives strength and power to His people.
  - type: text
    content: Blessed be God!
  '4':
  - type: text
    content: Sing to God, sing praises to His name;
  - type: text
    content: 'Lift up '
  - type: text
    content: a song
  - type: text
    content: ' for Him who rides through the desert—'
  - type: text
    content: His name is the L
  - type: heading
    content: ord
  - type: text
    content: —be in good spirits before Him.
  '5':
  - type: text
    content: '¶A father of the fatherless and a judge '
  - type: text
    content: and
  - type: text
    content: ' protector of the widows,'
  - type: text
    content: Is God in His holy habitation.
  '6':
  - type: text
    content: God makes a home for the lonely;
  - type: text
    content: He leads the prisoners into prosperity,
  - type: text
    content: 'Only the stubborn '
  - type: text
    content: and
  - type: text
    content: ' rebellious dwell in a parched land.'
  '7':
  - type: text
    content: ¶O God, when You went out before Your people,
  - type: text
    content: 'When You marched through the wilderness, '
  - type: text
    content: Selah.
  '8':
  - type: text
    content: The earth trembled;
  - type: text
    content: 'The heavens also poured down '
  - type: text
    content: rain
  - type: text
    content: ' at the presence of God;'
  - type: text
    content: Sinai itself trembled at the presence of God, the God of Israel.
  '9':
  - type: text
    content: You, O God, sent abroad plentiful rain;
  - type: text
    content: 'You confirmed Your inheritance when it was parched '
  - type: text
    content: and
  - type: text
    content: ' weary.'
