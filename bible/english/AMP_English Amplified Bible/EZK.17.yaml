  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: 'Though it is planted, will it thrive '
  - type: text
    content: and
  - type: text
    content: ' grow? Will it not completely wither when the east wind touches it? It will wither in the beds where it grew.” ’ ” [Hos 13:9-12, 15]'
  - type: heading
    content: Zedekiah’s Rebellion
  '11':
  - type: text
    content: Moreover, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '12':
  - type: text
    content: '“Say now to the rebellious house, ‘Do you not know (realize) what these things '
  - type: text
    content: mean?’
  - type: text
    content: ' Tell them, ‘Hear this, the king of Babylon came to Jerusalem and took its king [Jehoiachin] and its princes and brought them with him to Babylon. [2 Kin 24:11-16] '
  '13':
  - type: text
    content: 'And he took a member of the royal family [the king’s uncle, Zedekiah] and made a covenant with him, putting him under oath. He also took the important leaders of the land, [2 Kin 24:17] '
  '14':
  - type: text
    content: 'so that the kingdom would be in subjection, unable to restore itself '
  - type: text
    content: and
  - type: text
    content: ' rise again, but that by keeping his covenant it might continue. '
  '15':
  - type: text
    content: 'But Zedekiah rebelled against Nebuchadnezzar by sending his ambassadors to Egypt so that they might give him horses and many troops. Will he succeed? Will he who does such things escape? Can he indeed break the covenant [with Babylon] and [still] escape? '
  '16':
  - type: text
    content: As I live,’ says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘surely in the country of the king (Nebuchadnezzar) who made Zedekiah [the vassal] king, whose oath he despised and whose covenant he broke, in Babylon Zedekiah shall die. '
  '17':
  - type: text
    content: 'Pharaoh with his mighty army and great company will not help him in the war, when they (the Babylonians) put up ramps and build siege walls to destroy many lives. '
  '18':
  - type: text
    content: 'Now Zedekiah dishonored the oath by breaking the covenant, and behold, he gave his hand '
  - type: text
    content: and
  - type: text
    content: ' pledged his allegiance, yet did all these things; he shall not escape.’ ” '
  '19':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “As I live, I will bring down on his own head My oath [made on My behalf by Nebuchadnezzar] which Zedekiah dishonored and My covenant which he broke. '
  '2':
  - type: text
    content: '“Son of man, ask a riddle and tell a '
  - type: note
    content: The parable is told in vv 3-10. The explanation follows in vv 11-24.
  - type: text
    content: 'parable to the house of Israel, '
  '20':
  - type: text
    content: 'I will spread My net over him, and he will be caught in My snare; and I will bring him to Babylon and will enter into judgment with him there for his treason which he has committed against Me. '
  '21':
  - type: text
    content: All the choice men [from Judah] in all his troops will fall by the sword, and those that survive will be scattered to every wind; and you will know [without any doubt] that I the L
  - type: heading
    content: ord
  - type: text
    content: ' have spoken.”'
  '22':
  - type: text
    content: ' '
  - type: note
    content: These next three verses contain a word of prophecy regarding the coming of the Messiah, from the line of David, and His worldwide reign in the Millennium.
  - type: text
    content: Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “I Myself will take '
  - type: text
    content: a twig
  - type: text
    content: ' from the lofty top of the cedar and will set it out; I will crop off from the topmost of its young twigs a tender one and I will plant it on a high and lofty mountain. [Is 11:1, 10; 53:2; Jer 23:5; Zech 3:8] '
  '23':
  - type: text
    content: 'I will plant it on the mountain heights of Israel, that it may grow boughs and bear fruit and be a noble '
  - type: text
    content: and
  - type: text
    content: ' stately cedar. And birds of every kind will live under it; they will nest [securely] in the shade of its branches. '
  '24':
  - type: text
    content: All the trees of the field will know that I the L
  - type: heading
    content: ord
  - type: text
    content: ' bring down the tall tree, exalt the low tree, dry up the green tree, and make the dry tree flourish. I am the L'
  - type: heading
    content: ord
  - type: text
    content: ; I have spoken, and I will fulfill it.”
  '3':
  - type: text
    content: saying, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “A great eagle (Nebuchadnezzar) with great wings, long pinions and a rich plumage of many colors came to Lebanon (Jerusalem) and took away the top of the cedar (Judah). '
  '4':
  - type: text
    content: 'He broke off the topmost of its young twigs (young King Jehoiachin) and carried it to a land of traders (Babylonia); he set it in a city of merchants (Babylon). '
  '5':
  - type: text
    content: He also took some of the seed of the land (
  - type: note
    content: Nebuchadnezzar appointed Zedekiah to rule in Judah as his vassal king.
  - type: text
    content: 'Zedekiah, of the royal family) and planted it in fertile soil '
  - type: text
    content: and
  - type: text
    content: ' a fruitful field; he placed it beside abundant waters and set it like a willow tree. '
  '6':
  - type: text
    content: 'Then it sprouted '
  - type: text
    content: and
  - type: text
    content: ' grew and became a low, spreading vine whose branches turned [in submission] toward him, but its roots remained under it. So it became a vine and yielded shoots and sent out branches.'
  '7':
  - type: text
    content: '“There was [also] another great '
  - type: note
    content: Most likely a reference to Pharaoh Hophra (Apries) of Egypt (Jer 44:30). He ruled from 589-570 b.c. In the third century a.d. an obelisk attributed to him was taken to Rome by the Emperor Diocletian where it remains to this day.
  - type: text
    content: 'eagle with great wings and many feathers; and behold, this vine (Zedekiah) bent its roots toward him and sent out its branches toward him, away from the beds where it was planted, for him to water. '
  '8':
  - type: text
    content: 'It was planted in good soil where water was plentiful for it to produce leaves '
  - type: text
    content: and
  - type: text
    content: ' branches and to bear fruit, so that it might become a splendid vine.” ’ '
  '9':
  - type: text
    content: Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Ask, “Will it thrive? Will he (Nebuchadnezzar) not uproot it and strip off its fruit so that all its sprouting leaves will wither? It will not take a strong arm or many people to uproot it [ending Israel’s national existence]. [2 Kin 25:1-7] '
