    - type: text
      text: Parable of Two Eagles and a Vine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, ask a riddle and tell a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The parable is told in vv 3-10. The explanation follows in vv 11-24.
    marker-yv: yv-n
  - type: text
    text: 'parable to the house of Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: saying, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “A great eagle (Nebuchadnezzar) with great wings, long pinions and a rich plumage of many colors came to Lebanon (Jerusalem) and took away the top of the cedar (Judah). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He broke off the topmost of its young twigs (young King Jehoiachin) and carried it to a land of traders (Babylonia); he set it in a city of merchants (Babylon). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He also took some of the seed of the land (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nebuchadnezzar appointed Zedekiah to rule in Judah as his vassal king.
    marker-yv: yv-n
  - type: text
    text: 'Zedekiah, of the royal family) and planted it in fertile soil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' a fruitful field; he placed it beside abundant waters and set it like a willow tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then it sprouted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grew and became a low, spreading vine whose branches turned [in submission] toward him, but its roots remained under it. So it became a vine and yielded shoots and sent out branches.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“There was [also] another great '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Most likely a reference to Pharaoh Hophra (Apries) of Egypt (Jer 44:30). He ruled from 589-570 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. In the third century '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . an obelisk attributed to him was taken to Rome by the Emperor Diocletian where it remains to this day.
    marker-yv: yv-n
  - type: text
    text: 'eagle with great wings and many feathers; and behold, this vine (Zedekiah) bent its roots toward him and sent out its branches toward him, away from the beds where it was planted, for him to water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It was planted in good soil where water was plentiful for it to produce leaves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' branches and to bear fruit, so that it might become a splendid vine.” ’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Ask, “Will it thrive? Will he (Nebuchadnezzar) not uproot it and strip off its fruit so that all its sprouting leaves will wither? It will not take a strong arm or many people to uproot it [ending Israel’s national existence]. [2 Kin 25:1-7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Though it is planted, will it thrive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grow? Will it not completely wither when the east wind touches it? It will wither in the beds where it grew.” ’ ” [Hos 13:9-12, 15]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zedekiah’s Rebellion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moreover, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Say now to the rebellious house, ‘Do you not know (realize) what these things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mean?’
  - type: text
    text: ' Tell them, ‘Hear this, the king of Babylon came to Jerusalem and took its king [Jehoiachin] and its princes and brought them with him to Babylon. [2 Kin 24:11-16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he took a member of the royal family [the king’s uncle, Zedekiah] and made a covenant with him, putting him under oath. He also took the important leaders of the land, [2 Kin 24:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'so that the kingdom would be in subjection, unable to restore itself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rise again, but that by keeping his covenant it might continue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But Zedekiah rebelled against Nebuchadnezzar by sending his ambassadors to Egypt so that they might give him horses and many troops. Will he succeed? Will he who does such things escape? Can he indeed break the covenant [with Babylon] and [still] escape? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: As I live,’ says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘surely in the country of the king (Nebuchadnezzar) who made Zedekiah [the vassal] king, whose oath he despised and whose covenant he broke, in Babylon Zedekiah shall die. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pharaoh with his mighty army and great company will not help him in the war, when they (the Babylonians) put up ramps and build siege walls to destroy many lives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now Zedekiah dishonored the oath by breaking the covenant, and behold, he gave his hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pledged his allegiance, yet did all these things; he shall not escape.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “As I live, I will bring down on his own head My oath [made on My behalf by Nebuchadnezzar] which Zedekiah dishonored and My covenant which he broke. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'I will spread My net over him, and he will be caught in My snare; and I will bring him to Babylon and will enter into judgment with him there for his treason which he has committed against Me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: All the choice men [from Judah] in all his troops will fall by the sword, and those that survive will be scattered to every wind; and you will know [without any doubt] that I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' have spoken.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These next three verses contain a word of prophecy regarding the coming of the Messiah, from the line of David, and His worldwide reign in the Millennium.
    marker-yv: yv-n
  - type: text
    text: Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “I Myself will take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a twig
  - type: text
    text: ' from the lofty top of the cedar and will set it out; I will crop off from the topmost of its young twigs a tender one and I will plant it on a high and lofty mountain. [Is 11:1, 10; 53:2; Jer 23:5; Zech 3:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I will plant it on the mountain heights of Israel, that it may grow boughs and bear fruit and be a noble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stately cedar. And birds of every kind will live under it; they will nest [securely] in the shade of its branches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: All the trees of the field will know that I the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' bring down the tall tree, exalt the low tree, dry up the green tree, and make the dry tree flourish. I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; I have spoken, and I will fulfill it.”
