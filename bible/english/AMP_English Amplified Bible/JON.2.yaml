    children:
    - type: text
      text: '1'
  - type: text
    text: Then Jonah prayed to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God from the stomach of the fish, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I called out of my trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distress to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He answered me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of the belly of Sheol I cried for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You heard my voice. [Ps 120:1; 130:1; 142:1; Lam 3:55-58]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “For You cast me into the deep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Into the [deep] heart of the seas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the currents surrounded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' engulfed me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All Your breakers and billowing waves passed over me. [Ps 42:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Then I said, ‘I have been cast out of Your sight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nevertheless I will look again toward Your holy temple.’ [Ps 31:22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “The waters surrounded me, to the point of death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The great deep engulfed me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seaweed was wrapped around my head. [Ps 69:1; Lam 3:54]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I descended to the [very] roots of the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth with its bars closed behind me [bolting me in] forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet You have brought up my life from the pit (death), O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “When my soul was fainting within me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I remembered the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my prayer came to You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Into Your holy temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Those who regard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follow worthless idols'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Forsake
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Turn away from their [living source of] mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “But [as for me], I will sacrifice to You
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the voice of thanksgiving;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall pay that which I have vowed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Salvation is from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded the fish, and it vomited Jonah up onto the dry land.'
