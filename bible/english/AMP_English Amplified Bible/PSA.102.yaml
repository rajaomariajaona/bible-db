type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 102
  - type: heading
    content: Prayer of an Afflicted Man for Mercy on Himself and on Zion.
  - type: text
    content: A Prayer of the afflicted; when he is overwhelmed and pours out his complaint to God.
  - type: text
    content: Hear my prayer, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And let my cry for help come to You!
  '10':
  - type: text
    content: Because of Your indignation and Your wrath,
  - type: text
    content: For You have lifted me up and thrown me away.
  '11':
  - type: text
    content: 'My days are like an evening shadow that lengthens '
  - type: text
    content: and
  - type: text
    content: ' vanishes [with the sun];'
  - type: text
    content: And as for me, I wither away like grass.
  '12':
  - type: text
    content: ¶But You, O L
  - type: heading
    content: ord
  - type: text
    content: ', are enthroned forever [ruling eternally as sovereign];'
  - type: text
    content: And [the fame and glory of] Your name [endures] to all generations.
  '13':
  - type: text
    content: You will arise and have compassion on Zion,
  - type: text
    content: 'For it is time to be gracious '
  - type: text
    content: and
  - type: text
    content: ' show favor to her;'
  - type: text
    content: Yes, the appointed time [the moment designated] has come. [Ps 12:5; 119:126]
  '14':
  - type: text
    content: For Your servants find [melancholy] pleasure in the stones [of her ruins]
  - type: text
    content: And feel pity for her dust.
  '15':
  - type: text
    content: So the nations will fear the name of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And all the kings of the earth [will recognize] Your glory. [Ps 96:9]
  '16':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has built up Zion;'
  - type: text
    content: 'He has appeared in His glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance;'
  '17':
  - type: text
    content: He has regarded the prayer of the destitute,
  - type: text
    content: And has not despised their prayer.
  '18':
  - type: text
    content: ¶Let this be recorded for the generation to come,
  - type: text
    content: That a people yet to be created will praise the L
  - type: heading
    content: ord
  - type: text
    content: .
  '19':
  - type: text
    content: For He looked down from His holy height [of His sanctuary],
  - type: text
    content: From heaven the L
  - type: heading
    content: ord
  - type: text
    content: ' gazed on the earth,'
  '2':
  - type: text
    content: Do not hide Your face from me in the day of my distress!
  - type: text
    content: Incline Your ear to me;
  - type: text
    content: In the day when I call, answer me quickly.
  '20':
  - type: text
    content: To hear the sighing of the prisoner,
  - type: text
    content: To set free those who were doomed to death,
  '21':
  - type: text
    content: So that people may declare the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' in Zion'
  - type: text
    content: And His praise in Jerusalem,
  '22':
  - type: text
    content: When the peoples are gathered together,
  - type: text
    content: And the kingdoms, to serve the L
  - type: heading
    content: ord
  - type: text
    content: .
  '23':
  - type: text
    content: ¶He has exhausted my strength [humbling me with sorrow] in the way;
  - type: text
    content: He has shortened my days.
  '24':
  - type: text
    content: I said, “O my God, do not take me away in the midst of my days;
  - type: text
    content: Your years are [eternal] throughout all generations.
  '25':
  - type: text
    content: “At the beginning You founded the earth;
  - type: text
    content: The heavens are the work of Your hands.
  '26':
  - type: text
    content: “Even they will perish, but You endure;
  - type: text
    content: Yes, all of them will wear out like a garment.
  - type: text
    content: Like clothing You will change them and they shall be changed.
  '27':
  - type: text
    content: “But You remain the same,
  - type: text
    content: And Your years will never end. [Heb 1:10-12]
  '28':
  - type: text
    content: “The children of Your servants will continue,
  - type: text
    content: And their descendants will be established before You.”
  '3':
  - type: text
    content: For my days have vanished in smoke,
  - type: text
    content: And my bones have been scorched like a hearth.
  '4':
  - type: text
    content: My heart has been struck like grass and withered,
  - type: text
    content: Indeed, [absorbed by my heartache] I forget to eat my food.
  '5':
  - type: text
    content: Because of the sound of my groaning [in suffering and trouble]
  - type: text
    content: My bones cling to my flesh.
  '6':
  - type: text
    content: 'I am like a [mournful] '
  - type: note
    content: Lit pelican, or some kind of desert bird.
  - type: text
    content: vulture of the wilderness;
  - type: text
    content: I am like a [desolate] owl of the wasteland.
  '7':
  - type: text
    content: 'I am sleepless '
  - type: text
    content: and
  - type: text
    content: ' lie awake [mourning],'
  - type: text
    content: I have become like a lonely bird on a housetop.
  '8':
  - type: text
    content: ¶My enemies taunt me all day long;
  - type: text
    content: 'Those who ridicule me use my '
  - type: text
    content: name
  - type: text
    content: ' as a curse.'
  '9':
  - type: text
    content: For I have eaten ashes like bread,
  - type: text
    content: And have mingled my drink with tears [Is 44:20]
