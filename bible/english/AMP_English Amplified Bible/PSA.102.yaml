document_id: PSA.102,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 102
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer of an Afflicted Man for Mercy on Himself and on Zion.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Prayer of the afflicted; when he is overwhelmed and pours out his complaint to God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my prayer, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let my cry for help come to You!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of Your indignation and Your wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You have lifted me up and thrown me away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My days are like an evening shadow that lengthens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vanishes [with the sun];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as for me, I wither away like grass.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', are enthroned forever [ruling eternally as sovereign];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [the fame and glory of] Your name [endures] to all generations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will arise and have compassion on Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For it is time to be gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show favor to her;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the appointed time [the moment designated] has come. [Ps 12:5; 119:126]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Your servants find [melancholy] pleasure in the stones [of her ruins]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And feel pity for her dust.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the nations will fear the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the kings of the earth [will recognize] Your glory. [Ps 96:9]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has built up Zion;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has appeared in His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance;'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has regarded the prayer of the destitute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And has not despised their prayer.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Let this be recorded for the generation to come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That a people yet to be created will praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He looked down from His holy height [of His sanctuary],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From heaven the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gazed on the earth,'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hide Your face from me in the day of my distress!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incline Your ear to me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day when I call, answer me quickly.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To hear the sighing of the prisoner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To set free those who were doomed to death,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that people may declare the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in Zion'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His praise in Jerusalem,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the peoples are gathered together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the kingdoms, to serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶He has exhausted my strength [humbling me with sorrow] in the way;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has shortened my days.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “O my God, do not take me away in the midst of my days;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your years are [eternal] throughout all generations.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At the beginning You founded the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heavens are the work of Your hands.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even they will perish, but You endure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, all of them will wear out like a garment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like clothing You will change them and they shall be changed.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But You remain the same,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your years will never end. [Heb 1:10-12]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The children of Your servants will continue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their descendants will be established before You.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my days have vanished in smoke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my bones have been scorched like a hearth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart has been struck like grass and withered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, [absorbed by my heartache] I forget to eat my food.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the sound of my groaning [in suffering and trouble]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My bones cling to my flesh.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am like a [mournful] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: pelican,
        - type: text
          text: ' or some kind of desert bird.'
      marker-yv: yv-n
    - type: text
      text: vulture of the wilderness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a [desolate] owl of the wasteland.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am sleepless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lie awake [mourning],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have become like a lonely bird on a housetop.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶My enemies taunt me all day long;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who ridicule me use my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: name
    - type: text
      text: ' as a curse.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have eaten ashes like bread,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have mingled my drink with tears [Is 44:20]
