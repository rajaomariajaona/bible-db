document_id: LUK.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But on the first day of the week, at early dawn, the women went to the tomb bringing the spices which they had prepared [to finish anointing the body]. [Matt 28:1-8; Mark 16:1-8; John 20:1-8] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And they found the [large, circular] stone rolled back from the tomb, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'but when they went inside, they did not find the body of the Lord Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'While they were perplexed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wondering about this, suddenly, two men in dazzling clothing stood near them; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and as the women were terrified and were bowing their faces to the ground, the men said to them, “Why are you looking for the living One among the dead? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He is not here, but has risen. Remember how He told you, while He was still in Galilee, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'saying that the Son of Man must be handed over to sinful men, and be crucified, and on the third day rise [from death to life].” [Ps 16:10] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And they remembered His words, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and after returning from the tomb, they reported all these things to the eleven [apostles] and to all the rest. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now they were Mary Magdalene and Joanna [the wife of Chuza, Herod’s steward] and Mary the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mother
  - type: text
    text: ' of James; also the other women with them were telling these things to the apostles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But their report seemed to them like idle talk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nonsense, and they would not believe them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Peter got up and ran to the tomb. Stooping [at the small entrance] and looking in, he saw only the linen '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note John 20:5.
    marker-yv: yv-n
  - type: text
    text: wrappings; and he went away, wondering about what had happened. [John 20:3-6]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Road to Emmaus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And then, that very day two of them were going to a village called Emmaus, which was about '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sixty stadia,
      - type: text
        text: ' a Roman measurement.'
    marker-yv: yv-n
  - type: text
    text: 'seven miles from Jerusalem. [Mark 16:12] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they were talking with each other about all these things which had taken place. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'While they were talking and discussing it, Jesus Himself came up and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' walking with them. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But their eyes were [miraculously] prevented from recognizing Him. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Jesus asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What are you discussing with one another as you walk along?”
  - type: text
    text: ' And they stood still, looking brokenhearted. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'One '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of them,
  - type: text
    text: ' named Cleopas, answered Him, “Are you the only stranger visiting Jerusalem who is unaware of the things which have happened here in these [recent] days?” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What things?”
  - type: text
    text: ' And they replied, “The things about Jesus of Nazareth, who was a prophet powerful in deed and word in the sight of God and all the people, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and how the chief priests and our rulers handed Him over to be sentenced to death, and crucified Him. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But we were hoping that it was He who was going to redeem Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set our nation free. Indeed, besides all this, it is the third day since these things happened. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And also some of the women among us shocked us. They were at the tomb early in the morning, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'and they did not find His body. Then they came back, saying that they had even seen a vision of angels who said that He was alive! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Some of those who were with us went to the tomb and found it just exactly as the women had said, but they did not see Him.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“O foolish men, and slow of heart to trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' believe in everything that the prophets have spoken!'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Was it not necessary for the Christ to suffer these things and
  - type: text
    text: ' [only then to] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: enter His glory?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then beginning with Moses and [throughout] all the [writings of the] prophets, He explained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' interpreted for them the things referring to Himself [found] in all the Scriptures.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then they approached the village where they were going, and He acted as if He were going farther. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But they urged Him [not to go on], saying, “Stay with us, because it is almost evening, and the day has just about ended.” So He went inside to stay with them. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And it happened that as He reclined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the table
  - type: text
    text: ' with them, He took the bread and blessed it, and breaking it, He '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' giving it to them. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then their eyes were [suddenly] opened [by God] and they [clearly] recognized Him; and He vanished from their sight. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'They said to one another, “Were not our hearts burning within us while He was talking with us on the road and opening the Scriptures to us?” '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They got up that very hour and went back to Jerusalem, and found the eleven [apostles] gathered together and those who were with them, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'saying, “The Lord has really risen and has appeared to Simon [Peter]!” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' describing in detail what had happened on the road, and how Jesus was recognized by them when He broke the bread.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Other Appearances
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'While they were talking about this, Jesus Himself [suddenly] stood among them and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace be to you.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But they were startled and terrified and thought that they were seeing a spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'And He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you troubled, and why are doubts rising in your hearts?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Look at
  - type: text
    text: ' [the marks in] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My hands and My feet,
  - type: text
    text: ' [and see] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that it is I Myself. Touch Me and see; a spirit does not have flesh and bones, as you see that I have.”
  - type: text
    text: ' [John 20:20-27] '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'After saying this, He showed them His hands and His feet. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'While they still did not believe it because of their joy and amazement, He asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you have anything here to eat?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They gave Him a piece of broiled fish, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: and He took it and ate it in front of them. [Acts 10:40, 41]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is what I told you while I was still with you, everything which has been written about Me in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the entire Old Testament.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Law of Moses and the
  - type: text
    text: ' [writings of the] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prophets and the Psalms must be fulfilled.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then He opened their minds to [help them] understand the Scriptures, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And so it is written, that the Christ (the Messiah, the Anointed) would suffer and rise from the dead on the third day,
  - type: text
    text: ' [Hos 6:2] '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and that repentance
  - type: text
    text: ' [necessary] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for forgiveness of sins would be preached in His name to all the nations, beginning from Jerusalem.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are witnesses of these things.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Listen carefully: I am sending the Promise of My Father'
  - type: text
    text: ' [the Holy Spirit] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: upon you; but you are to remain in the city
  - type: text
    text: ' [of Jerusalem] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until you are clothed (fully equipped) with power from on high.”
  - type: text
    text: ' [John 14:26; Acts 1:4]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Ascension
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Then He led them out as far as Bethany, and lifted up His hands and blessed them. [Matt 21:17; Acts 1:9-12] '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'While He was blessing them, He left them and was taken up into heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And they worshiped Him and returned to Jerusalem with great joy [fully understanding that He lives and that He is the Son of God]; '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'and they were continually in the temple blessing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praising God.'
