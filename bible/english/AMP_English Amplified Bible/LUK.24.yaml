document_id: LUK.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection
  - type: text
    content: 'But on the first day of the week, at early dawn, the women went to the tomb bringing the spices which they had prepared [to finish anointing the body]. [Matt 28:1-8; Mark 16:1-8; John 20:1-8] '
  '10':
  - type: text
    content: 'Now they were Mary Magdalene and Joanna [the wife of Chuza, Herod’s steward] and Mary the '
  - type: text
    content: mother
  - type: text
    content: ' of James; also the other women with them were telling these things to the apostles. '
  '11':
  - type: text
    content: 'But their report seemed to them like idle talk '
  - type: text
    content: and
  - type: text
    content: ' nonsense, and they would not believe them. '
  '12':
  - type: text
    content: 'But Peter got up and ran to the tomb. Stooping [at the small entrance] and looking in, he saw only the linen '
  - type: note
    content: See note John 20:5.
  - type: text
    content: wrappings; and he went away, wondering about what had happened. [John 20:3-6]
  - type: heading
    content: The Road to Emmaus
  '13':
  - type: text
    content: 'And then, that very day two of them were going to a village called Emmaus, which was about '
  - type: note
    content: Lit sixty stadia, a Roman measurement.
  - type: text
    content: 'seven miles from Jerusalem. [Mark 16:12] '
  '14':
  - type: text
    content: 'And they were talking with each other about all these things which had taken place. '
  '15':
  - type: text
    content: 'While they were talking and discussing it, Jesus Himself came up and '
  - type: text
    content: began
  - type: text
    content: ' walking with them. '
  '16':
  - type: text
    content: 'But their eyes were [miraculously] prevented from recognizing Him. '
  '17':
  - type: text
    content: 'Then Jesus asked them, '
  - type: text
    content: “What are you discussing with one another as you walk along?”
  - type: text
    content: ' And they stood still, looking brokenhearted. '
  '18':
  - type: text
    content: 'One '
  - type: text
    content: of them,
  - type: text
    content: ' named Cleopas, answered Him, “Are you the only stranger visiting Jerusalem who is unaware of the things which have happened here in these [recent] days?” '
  '19':
  - type: text
    content: 'He asked, '
  - type: text
    content: “What things?”
  - type: text
    content: ' And they replied, “The things about Jesus of Nazareth, who was a prophet powerful in deed and word in the sight of God and all the people, '
  '2':
  - type: text
    content: 'And they found the [large, circular] stone rolled back from the tomb, '
  '20':
  - type: text
    content: 'and how the chief priests and our rulers handed Him over to be sentenced to death, and crucified Him. '
  '21':
  - type: text
    content: 'But we were hoping that it was He who was going to redeem Israel '
  - type: text
    content: and
  - type: text
    content: ' set our nation free. Indeed, besides all this, it is the third day since these things happened. '
  '22':
  - type: text
    content: 'And also some of the women among us shocked us. They were at the tomb early in the morning, '
  '23':
  - type: text
    content: 'and they did not find His body. Then they came back, saying that they had even seen a vision of angels who said that He was alive! '
  '24':
  - type: text
    content: 'Some of those who were with us went to the tomb and found it just exactly as the women had said, but they did not see Him.” '
  '25':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“O foolish men, and slow of heart to trust '
  - type: text
    content: and
  - type: text
    content: ' believe in everything that the prophets have spoken!'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Was it not necessary for the Christ to suffer these things and
  - type: text
    content: ' [only then to] '
  - type: text
    content: enter His glory?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then beginning with Moses and [throughout] all the [writings of the] prophets, He explained '
  - type: text
    content: and
  - type: text
    content: ' interpreted for them the things referring to Himself [found] in all the Scriptures.'
  '28':
  - type: text
    content: 'Then they approached the village where they were going, and He acted as if He were going farther. '
  '29':
  - type: text
    content: 'But they urged Him [not to go on], saying, “Stay with us, because it is almost evening, and the day has just about ended.” So He went inside to stay with them. '
  '3':
  - type: text
    content: 'but when they went inside, they did not find the body of the Lord Jesus. '
  '30':
  - type: text
    content: 'And it happened that as He reclined '
  - type: text
    content: at the table
  - type: text
    content: ' with them, He took the bread and blessed it, and breaking it, He '
  - type: text
    content: began
  - type: text
    content: ' giving it to them. '
  '31':
  - type: text
    content: 'Then their eyes were [suddenly] opened [by God] and they [clearly] recognized Him; and He vanished from their sight. '
  '32':
  - type: text
    content: 'They said to one another, “Were not our hearts burning within us while He was talking with us on the road and opening the Scriptures to us?” '
  '33':
  - type: text
    content: 'They got up that very hour and went back to Jerusalem, and found the eleven [apostles] gathered together and those who were with them, '
  '34':
  - type: text
    content: 'saying, “The Lord has really risen and has appeared to Simon [Peter]!” '
  '35':
  - type: text
    content: 'They '
  - type: text
    content: began
  - type: text
    content: ' describing in detail what had happened on the road, and how Jesus was recognized by them when He broke the bread.'
  - type: heading
    content: Other Appearances
  '36':
  - type: text
    content: 'While they were talking about this, Jesus Himself [suddenly] stood among them and said to them, '
  - type: text
    content: “Peace be to you.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'But they were startled and terrified and thought that they were seeing a spirit. '
  '38':
  - type: text
    content: 'And He said, '
  - type: text
    content: “Why are you troubled, and why are doubts rising in your hearts?
  - type: text
    content: ' '
  '39':
  - type: text
    content: Look at
  - type: text
    content: ' [the marks in] '
  - type: text
    content: My hands and My feet,
  - type: text
    content: ' [and see] '
  - type: text
    content: that it is I Myself. Touch Me and see; a spirit does not have flesh and bones, as you see that I have.”
  - type: text
    content: ' [John 20:20-27] '
  '4':
  - type: text
    content: 'While they were perplexed '
  - type: text
    content: and
  - type: text
    content: ' wondering about this, suddenly, two men in dazzling clothing stood near them; '
  '40':
  - type: text
    content: 'After saying this, He showed them His hands and His feet. '
  '41':
  - type: text
    content: 'While they still did not believe it because of their joy and amazement, He asked them, '
  - type: text
    content: “Do you have anything here to eat?”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'They gave Him a piece of broiled fish, '
  '43':
  - type: text
    content: and He took it and ate it in front of them. [Acts 10:40, 41]
  '44':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“This is what I told you while I was still with you, everything which has been written about Me in the '
  - type: note
    content: I.e. the entire Old Testament.
  - type: text
    content: Law of Moses and the
  - type: text
    content: ' [writings of the] '
  - type: text
    content: Prophets and the Psalms must be fulfilled.”
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Then He opened their minds to [help them] understand the Scriptures, '
  '46':
  - type: text
    content: 'and said, '
  - type: text
    content: “And so it is written, that the Christ (the Messiah, the Anointed) would suffer and rise from the dead on the third day,
  - type: text
    content: ' [Hos 6:2] '
  '47':
  - type: text
    content: and that repentance
  - type: text
    content: ' [necessary] '
  - type: text
    content: for forgiveness of sins would be preached in His name to all the nations, beginning from Jerusalem.
  - type: text
    content: ' '
  '48':
  - type: text
    content: You are witnesses of these things.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Listen carefully: I am sending the Promise of My Father'
  - type: text
    content: ' [the Holy Spirit] '
  - type: text
    content: upon you; but you are to remain in the city
  - type: text
    content: ' [of Jerusalem] '
  - type: text
    content: until you are clothed (fully equipped) with power from on high.”
  - type: text
    content: ' [John 14:26; Acts 1:4]'
  - type: heading
    content: The Ascension
  '5':
  - type: text
    content: 'and as the women were terrified and were bowing their faces to the ground, the men said to them, “Why are you looking for the living One among the dead? '
  '50':
  - type: text
    content: 'Then He led them out as far as Bethany, and lifted up His hands and blessed them. [Matt 21:17; Acts 1:9-12] '
  '51':
  - type: text
    content: 'While He was blessing them, He left them and was taken up into heaven. '
  '52':
  - type: text
    content: 'And they worshiped Him and returned to Jerusalem with great joy [fully understanding that He lives and that He is the Son of God]; '
  '53':
  - type: text
    content: 'and they were continually in the temple blessing '
  - type: text
    content: and
  - type: text
    content: ' praising God.'
  '6':
  - type: text
    content: 'He is not here, but has risen. Remember how He told you, while He was still in Galilee, '
  '7':
  - type: text
    content: 'saying that the Son of Man must be handed over to sinful men, and be crucified, and on the third day rise [from death to life].” [Ps 16:10] '
  '8':
  - type: text
    content: 'And they remembered His words, '
  '9':
  - type: text
    content: 'and after returning from the tomb, they reported all these things to the eleven [apostles] and to all the rest. '
