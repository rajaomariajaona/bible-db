document_id: DEU.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moses’ Last Counsel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Moses went and spoke these words to all Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And he said to them, “I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a son of one hundred-twenty years
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: a hundred and twenty years old today; I am no longer able to come in and go out [as your spiritual and military leader], and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said to me, ‘You shall not cross this Jordan.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God who will cross ahead of you; He will destroy these nations before you, and you shall dispossess them. Joshua is the one who will go across before you [to lead you], just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will do to them just as He did to Sihon and Og, the kings of the Amorites, and to their land, when He destroyed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will hand them over to you, and you shall do to them in accordance with all the commandments which I have commanded you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Be strong and courageous, do not be afraid or tremble in dread before them, for it is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God who goes with you. He will not fail you or abandon you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then Moses called to Joshua and said to him in the sight of all [the people of] Israel, “Be strong and courageous, for you will go with this people into the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has sworn to their fathers to give them, and you will give it to them as an inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: It is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who goes before you; He will be with you. He will not fail you or abandon you. Do not fear or be dismayed.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Moses wrote this law and gave it to the priests, the sons of Levi who carried the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and to all the elders of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Moses commanded them, saying, “At the end of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: every
  - type: text
    text: ' seven years, at the time of year when debts are forgiven, at the Feast of Booths (Tabernacles), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: when all Israel comes to appear before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in the place which He chooses, you shall read this law before all [the people of] Israel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in their hearing
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'so that they may hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Assemble the people, the men and the women and children and the stranger (resident alien, foreigner) within your cities, so that they may hear and learn and fear the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God [with awe-filled reverence and profound respect], and be careful to obey all the words of this law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Their children, who have not known [the law], will hear and learn to fear [and worship] the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, as long as you live in the land which you are crossing the Jordan to possess.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Will Fall Away
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Behold, the time for you to die is near; call Joshua, and present yourselves at the Tent of Meeting, so that I may commission him.” So Moses and Joshua went and presented themselves at the Tent of Meeting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared in the tent in a pillar of cloud, and the pillar of cloud stood beside the doorway of the tent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Behold, you are about to lie down [in death] with your fathers; and this people will arise and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. abandon the true God for worthless idols.
    marker-yv: yv-n
  - type: text
    text: 'play the prostitute (commit apostasy) with the foreign gods [of the people] of the land, where they go to be among them. They will abandon (turn away from) Me and break My covenant which I have made with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then My anger will be kindled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burn against them in that day, and I will abandon (turn away from) them and hide My face from them. They will be devoured, and many evils and troubles will come on them, so that they will say in that day, ‘Is it not because our God is not among us that these evils have come on us?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But I will certainly hide My face [from them] in that day because of all the evil which they will do, for they will turn to other gods [to worship lifeless idols, to honor handmade relics].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Now then, write this song for yourselves, and teach it to the sons of Israel; put it in their mouth, so that this song may be a witness for Me against the sons of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For when I bring them into the land which I have sworn to their fathers, a land [of plenty] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
    marker-yv: yv-n
  - type: text
    text: 'flowing with milk and honey, and they have eaten and are satisfied and become prosperous, then they will turn to other gods and serve them, and despise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reject Me and break My covenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then it shall come about, when many evils and troubles have come on them, that this [sacred] song will confront them as a witness; for it will not be forgotten from the mouth of their descendants. For I know their inclination which is developing even now, before I bring them into the land which I have sworn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to give them.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So Moses wrote this song the same day, and taught it to the children of Israel. [Deut 32:1-43]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joshua Is Commissioned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then He commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commissioned Joshua, the son of Nun, and said, “Be strong and courageous, for you will bring the sons of Israel into the land which I have sworn to give them, and I will be with you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And when Moses completely finished writing the words of this law in a book, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: he commanded the Levites who carried the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Take this Book of the Law and put it beside the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, so that it may remain there as a witness against you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For I know your rebellion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' contention and your stubbornness; behold, while I am still alive with you today, you have been rebellious against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; how much more, then, after my death? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Assemble before me all the elders of your tribes and your officers, so that I may speak these words in their hearing and call heaven and earth as witnesses against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: For I know that after my death you will behave corruptly and turn from the way which I have commanded you; and evil will come upon you in the latter days, because you will do evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', provoking Him to anger with the work of your hands.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Moses spoke in the hearing of all the congregation of Israel the words of this song, until they were ended:'
