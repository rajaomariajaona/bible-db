  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'we put no obstruction in anyone’s path, so that the ministry will not be discredited, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but we commend ourselves in every way as servants of God: in great endurance, in sufferings, in hardships, in distresses, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'in beatings, in imprisonments, in riots, in labors, in sleepless nights, in hunger, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'in purity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sincerity, in knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritual insight, in patience, in kindness, in the Holy Spirit, in genuine love, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'in [speaking] the word of truth, in the power of God; by the weapons of righteousness for the right hand [like holding the sword to attack] and for the left [like holding the shield to defend], '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'amid glory and dishonor; by evil report and good report; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: branded
  - type: text
    text: ' as deceivers and yet [vindicated as] truthful; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'as unknown [to the world], yet well-known [by God and His people]; as dying, yet we live; as punished, yet not killed; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: as sorrowful, yet always rejoicing; as poor, yet bestowing riches on many; as having nothing, yet possessing all things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We are speaking freely to you, Corinthians [we are keeping nothing back], and our heart is opened wide. [Is 60:5; Ezek 33:22] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There is no limit to our affection for you, but you are limited in your own affection [for us]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now in the same way as a fair exchange [for our love toward you]—I am speaking as [I would] to children—open wide [your hearts] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to us
  - type: text
    text: ' also.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Do not be unequally bound together with unbelievers [do not make mismatched alliances with them, inconsistent with your faith]. For what partnership can righteousness have with lawlessness? Or what fellowship can light have with darkness? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'What harmony can there be between Christ and Belial (Satan)? Or what does a believer have in common with an unbeliever? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'What agreement is there between the temple of God and idols? For we are the temple of the living God; just as God said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: will dwell among them and walk among them
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A
  - type: usfm
