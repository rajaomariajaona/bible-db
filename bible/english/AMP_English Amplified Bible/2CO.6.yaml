  - type: text
    content: 'Do not be unequally bound together with unbelievers [do not make mismatched alliances with them, inconsistent with your faith]. For what partnership can righteousness have with lawlessness? Or what fellowship can light have with darkness? '
  '15':
  - type: text
    content: 'What harmony can there be between Christ and Belial (Satan)? Or what does a believer have in common with an unbeliever? '
