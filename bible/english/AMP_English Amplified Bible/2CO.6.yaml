  '11':
  - type: text
    content: 'We are speaking freely to you, Corinthians [we are keeping nothing back], and our heart is opened wide. [Is 60:5; Ezek 33:22] '
  '12':
  - type: text
    content: 'There is no limit to our affection for you, but you are limited in your own affection [for us]. '
  '13':
  - type: text
    content: 'Now in the same way as a fair exchange [for our love toward you]—I am speaking as [I would] to children—open wide [your hearts] '
  - type: text
    content: to us
  - type: text
    content: ' also.'
