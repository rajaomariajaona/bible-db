document_id: ISA.60,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Glorified Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Arise [from spiritual depression to a new life], shine [be radiant with the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ']; for your light has come,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has risen upon you. [Zech 8:23]'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Foreigners will build up your walls,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their kings will serve you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in My [righteous] wrath I struck you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But in My favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grace I have had compassion on you.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your gates will be open continually;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall not be shut day or night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that people may bring to you the wealth of the nations—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With their kings led in procession. [Rev 21:24-27]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For the nation or the kingdom which will not serve you [Jerusalem] shall perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the nations [that refuse to serve] shall be utterly ruined.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The glory of Lebanon will come to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The specific kinds of trees are uncertain.
      marker-yv: yv-n
    - type: text
      text: cypress, the juniper, and the cedar together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To beautify the place of My sanctuary;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make the place of My feet glorious.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The sons of those who oppressed you will come bowing down to you [in submission],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all those who despised you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treated you disrespectfully will bow down at the soles of your feet,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will call you the City of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Zion of the Holy One of Israel. [Rev 3:9]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Whereas you [Jerusalem] have been abandoned and hated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With no one passing through,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make you an object of pride forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A joy from generation to generation.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You will suck the milk of the [Gentile] nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And suck the breast (abundance) of kings;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then you will recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' know that I, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', am your Savior'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your Redeemer, the Mighty One of Jacob.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Instead of bronze I will bring gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And instead of iron I will bring silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And instead of wood, bronze,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And instead of stones, iron.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [instead of the tyranny of the present] I will appoint peace as your officers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And righteousness your rulers.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Violence will not be heard again in your land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor devastation or destruction within your borders;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you will call your walls Salvation, and your gates Praise [to God].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The sun will no longer be your light by day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor shall the bright glow of the moon give light to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be an everlasting light for you;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your God will be your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor. [Jer 9:23, 24; Rev 21:23]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For in fact, darkness will cover the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And deep darkness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will cover
    - type: text
      text: ' the peoples;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will rise upon you [Jerusalem]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And His glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance will be seen on you. [Is 60:19-22; Mal 4:2; Rev 21:2, 3]'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your sun will no longer set,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will your moon wane;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be your everlasting light,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the days of your mourning will be over.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then all your people will be [uncompromisingly and consistently] righteous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will possess the land forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The branch of My planting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The work of My hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I may be glorified.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The smallest one will become a thousand (a clan),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the least one a mighty nation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', will quicken it in its [appointed] time.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Nations will come to your light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And kings to the brightness of your rising. [Is 2:2, 3; Jer 3:17]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Lift up your eyes around you and see;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They all gather together, they come to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sons will come from far away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your daughters will be looked after at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' side.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then you will see and be radiant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your heart will tremble [with joy] and rejoice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because the abundant wealth of the seas will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fall upon
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: be brought to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wealth of the nations will come to you. [Ps 119:32]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A multitude of camels [from the eastern trading tribes] will cover you [Jerusalem],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young camels of Midian and Ephah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All those from Sheba [who once came to trade] will come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bringing gold and frankincense
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And proclaiming the praises of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Matt 2:11]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All the flocks of Kedar will be gathered to you [as the eastern pastoral tribes join the trading tribes],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rams of Nebaioth will serve you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will go up with acceptance [as sacrifices] on My altar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will glorify the house of My honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who are these who fly like a cloud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like doves to their windows?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The islands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' coastlands will confidently wait for Me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the ships of Tarshish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will come
    - type: text
      text: ' first,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To bring your sons from far away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their silver and gold with them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Holy One of Israel because He has glorified you.
