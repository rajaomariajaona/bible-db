      text: '12'
  - type: text
    text: 'After the deportation to Babylon: Jeconiah became the father of Shealtiel, and Shealtiel the father of Zerubbabel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Zerubbabel was the father of Abihud, Abihud the father of Eliakim, and Eliakim the father of Azor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Azor was the father of Zadok, Zadok the father of Achim, and Achim the father of Eliud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Eliud was the father of Eleazar, Eleazar the father of Matthan, and Matthan the father of Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jacob was the father of Joseph the husband of Mary, by '
