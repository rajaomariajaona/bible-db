    - type: text
      text: '8'
  - type: text
    text: 'Asa was the father of Jehoshaphat, Jehoshaphat the father of Joram, and Joram the father of Uzziah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Uzziah was the father of Jotham, Jotham the father of Ahaz, and Ahaz the father of Hezekiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hezekiah was the father of Manasseh, Manasseh the father of Amon, and Amon the father of Josiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Josiah became the father of Jeconiah [also called Coniah and Jehoiachin] and his brothers, at the time of the deportation (exile) to Babylon. [2 Kin 24:14; 1 Chr 3:15, 16]
- type: usfm
