    content: The Genealogy of Jesus the Messiah
  - type: text
    content: 'The record of the genealogy of '
  - type: note
    content: Heb Yeshua (Joshua), meaning The Lord is salvation.
  - type: text
    content: 'Jesus the '
  - type: note
    content: Gr Christos. Greek for Messiah, which means Anointed One. Throughout his gospel, which is directed primarily to Jewish believers, Matthew uses OT Scripture to emphasize the fact that Jesus is their promised Messiah.
  - type: text
    content: 'Messiah, the son (descendant) of '
  - type: note
    content: The shepherd boy who killed the Philistine giant Goliath, and later became king of Israel.
  - type: text
    content: 'David, the son (descendant) of Abraham: [Ps 132:11; Is 11:1]'
  '10':
  - type: text
    content: 'Hezekiah was the father of Manasseh, Manasseh the father of Amon, and Amon the father of Josiah. '
  '11':
  - type: text
    content: Josiah became the father of Jeconiah [also called Coniah and Jehoiachin] and his brothers, at the time of the deportation (exile) to Babylon. [2 Kin 24:14; 1 Chr 3:15, 16]
  '12':
  - type: text
    content: 'After the deportation to Babylon: Jeconiah became the father of Shealtiel, and Shealtiel the father of Zerubbabel. '
  '13':
  - type: text
    content: 'Zerubbabel was the father of Abihud, Abihud the father of Eliakim, and Eliakim the father of Azor. '
  '14':
  - type: text
    content: 'Azor was the father of Zadok, Zadok the father of Achim, and Achim the father of Eliud. '
  '15':
  - type: text
    content: 'Eliud was the father of Eleazar, Eleazar the father of Matthan, and Matthan the father of Jacob. '
  '16':
  - type: text
    content: 'Jacob was the father of Joseph the husband of Mary, by '
  - type: note
    content: The Greek singular feminine pronoun hes, translated “whom,” shows that Jesus was born of Mary alone, without Joseph’s participation; however, Jesus was considered Joseph’s legal son and heir. Accordingly, Matthew’s genealogy confirms Jesus as a legitimate descendant of David.
  - type: text
    content: whom Jesus was born, who is called the Messiah (Christ).
  '17':
  - type: text
    content: So all the generations from Abraham to David are fourteen; from David to the Babylonian deportation (exile), fourteen generations; and from the Babylonian deportation to the Messiah, fourteen generations.
  - type: heading
    content: Conception and Birth of Jesus
  '18':
  - type: text
    content: 'Now the birth of Jesus Christ was as follows: when His mother Mary had been '
  - type: note
    content: The first stage of marriage (called shiddukin in Hebrew) in Jewish tradition and law, usually lasting for a year before the wedding night; unlike an engagement, it was legally binding and required a divorce to nullify it. The woman remained with her parents during the betrothal year and was referred to as a “wife” even though the marriage was not consummated during this period of time (cf Deut 22:23, 24).
  - type: text
    content: 'betrothed to Joseph, before they came together she was found to be with child by [the power of] the Holy Spirit. '
