  '3':
  - type: text
    content: 'Judah was the father of Perez and Zerah by Tamar, Perez was the father of Hezron, and Hezron the father of Ram. '
  '4':
  - type: text
    content: 'Ram was the father of Aminadab, Aminadab the father of Nahshon, and Nahshon the father of Salmon. '
  '5':
  - type: text
    content: 'Salmon was the father of Boaz by '
  - type: note
