      - type: text
        text: ' translated “whom,” shows that Jesus was born of Mary alone, without Joseph’s participation; however, Jesus was considered Joseph’s legal son and heir. Accordingly, Matthew’s genealogy confirms Jesus as a legitimate descendant of David.'
