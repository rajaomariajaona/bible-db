type_code: eng
verses:
  '1':
  - type: heading
    content: God Will Battle Jerusalem’s Foes
  - type: text
    content: Behold, a day is coming for the L
  - type: heading
    content: ord
  - type: text
    content: ' when the spoil taken from you (Jerusalem) will be divided in your midst. '
  '10':
  - type: text
    content: 'All the land will be changed into a plain from Geba to Rimmon, [the Rimmon that is] south of Jerusalem; but Jerusalem will rise and remain [lifted up] on its site from Benjamin’s Gate to the place of the First Gate to the Corner Gate, and from the Tower of Hananel to the king’s wine presses. '
  '11':
  - type: text
    content: It will be inhabited, for there will no longer be a curse, for Jerusalem will dwell in security. [Rev 22:3]
  '12':
  - type: text
    content: Now this will be the plague with which the L
  - type: heading
    content: ord
  - type: text
    content: ' shall strike all the peoples that have warred against Jerusalem: Their flesh will rot while they stand on their feet, and their eyes will rot in their sockets, and their tongue will rot in their mouth. '
  '13':
  - type: text
    content: 'In that day a great panic '
  - type: text
    content: and
  - type: text
    content: ' dismay from the L'
  - type: heading
    content: ord
  - type: text
    content: ' will fall on them; and they will seize one another’s hand, and the hand of the one will be raised against the hand of the other. '
  '14':
  - type: text
    content: 'Judah also will fight at Jerusalem; and the wealth of all the surrounding nations will be gathered together—gold and silver and garments in great abundance. '
  '15':
  - type: text
    content: So like this plague [on men] there will be the plague on the horses, mules, camels, donkeys, and all the livestock in those camps.
  '16':
  - type: text
    content: Then everyone who is left of all the nations that went against Jerusalem will go up from year to year to worship the King, the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, and celebrate the Feast of Booths (Tabernacles). '
  '17':
  - type: text
    content: And it will be that whichever of the families of the earth does not go up to Jerusalem to worship the King, the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, there will be no rain on them. '
  '18':
  - type: text
    content: 'If the family of Egypt does not go up [to Jerusalem] and present themselves, then no '
  - type: text
    content: rain will fall
  - type: text
    content: ' on them. It will be the plague with which the L'
  - type: heading
    content: ord
  - type: text
    content: ' will strike the nations who do not go up to celebrate the Feast of Booths (Tabernacles). '
  '19':
  - type: text
    content: This will be the [consequent] punishment [for the sin] of Egypt, and the [consequent] punishment [for the sin] of all the nations that do not go up to celebrate the Feast of Booths (Tabernacles).
  '2':
  - type: text
    content: 'For I will gather all nations against Jerusalem to battle, and the city will be captured and the houses plundered and the women ravished; and half of the city will be exiled, but the rest of the people will not be cut off from the city. '
  '20':
  - type: text
    content: 'In that day there will '
  - type: text
    content: be written
  - type: text
    content: ' on the little bells on the horses, “'
  - type: note
    content: What had previously been reserved for the most sacred occasions now will adorn common objects, thus eliminating the difference between the sacred and the secular.
  - type: text
    content: 'HOLY TO THE '
  - type: text
    content: Lord
  - type: text
    content: .” And the cooking pots in the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house will be [holy to the L'
  - type: heading
    content: ord
  - type: text
    content: '] like the bowls before the altar. '
  '21':
  - type: text
    content: Every cooking pot in [all the houses in] Jerusalem and in Judah will be holy to the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, and all who sacrifice will come and take them and boil [their sacrifices] in them. And in that day there will no longer be a Canaanite [that is, any godless or spiritually unclean person, whether Jew or Gentile] in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. [Eph 2:19-22]'
  '3':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' will go forth and fight against those nations, as when He fights on a day of battle. '
  '4':
  - type: text
    content: 'In that day His feet shall stand on the Mount of Olives, which lies before Jerusalem on the east; and the Mount of Olives will be split in half from the east to the west by a very large valley, and half of the mountain will move toward the north and half of it toward the south. [Is 64:1, 2] '
  '5':
  - type: text
    content: You will flee by the valley of My mountains, for the valley of the mountains will reach to Azel; and you will flee just as you fled from the earthquake in the days of Uzziah king of Judah. Then the L
  - type: heading
    content: ord
  - type: text
    content: ' my '
  - type: note
    content: The second coming of Christ to the earth is taught many times in Scripture. See Deut 30:3; Zech 14:3, 4; Matt 16:27; 24:3-14, 27, 36-39; 25:31, 32; 26:64; Luke 21:25-28; Acts 1:9-11; 1 Cor 1:7, 8; 4:5; 1 Tim 6:14; 2 Tim 4:1; Titus 2:13; Heb 9:28; 1 John 2:28; Rev 3:11; 16:15; 22:7, 20.
  - type: text
    content: God will come, and all the holy ones (believers, angels) with Him. [Amos 1:1; Col 3:4; 1 Thess 4:14; Jude 14, 15]
  '6':
  - type: text
    content: 'In that day there will be no light; the glorious ones (heavenly bodies) shall be darkened. '
  '7':
  - type: text
    content: But it will be a unique day which is known to the L
  - type: heading
    content: ord
  - type: text
    content: —not day and not night, but at evening time there will be light.
  '8':
  - type: text
    content: And in that day living waters will flow out from Jerusalem, half of them to the eastern sea (Dead Sea) and half of them to the western sea (the Mediterranean); it will be in summer as well as in winter.
  - type: heading
    content: God Will Be King over All
  '9':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' shall be king over all the earth; in that day the L'
  - type: heading
    content: ord
  - type: text
    content: ' shall be '
  - type: text
    content: the only
  - type: text
    content: ' one [worshiped], and His name '
  - type: text
    content: the only
  - type: text
    content: ' one.'
