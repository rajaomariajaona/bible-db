verses:
  '1':
  - type: heading
    content: Contrast the Upright and the Wicked
  - type: text
    content: 'A soft '
  - type: text
    content: and
  - type: text
    content: ' gentle '
  - type: text
    content: and
  - type: text
    content: ' thoughtful answer turns away wrath,'
  - type: text
    content: 'But harsh '
  - type: text
    content: and
  - type: text
    content: ' painful '
  - type: text
    content: and
  - type: text
    content: ' careless words stir up anger. [Prov 25:15]'
  '10':
  - type: text
    content: 'There is severe discipline for him who '
  - type: note
    content: Lit forsakes.
  - type: text
    content: turns from the way [of righteousness];
  - type: text
    content: And he who hates correction will die.
  '11':
  - type: text
    content: 'Sheol (the nether world, the place of the dead) and Abaddon (the abyss, the place of eternal punishment) '
  - type: text
    content: lie open
  - type: text
    content: ' before the L'
  - type: heading
    content: ord
  - type: text
    content: —
  - type: text
    content: 'How much more the hearts '
  - type: text
    content: and
  - type: text
    content: ' inner motives of the children of men. [Job 26:6; Ps 139:8; Rev 9:2; 20:1, 2]'
  '12':
  - type: text
    content: 'A scoffer [unlike a wise man] resents one who rebukes him '
  - type: text
    content: and
  - type: text
    content: ' tries to teach him;'
  - type: text
    content: Nor will he go to the wise [for counsel and instruction].
  '13':
  - type: text
    content: 'A heart full of joy '
  - type: text
    content: and
  - type: text
    content: ' goodness makes a cheerful face,'
  - type: text
    content: But when a heart is full of sadness the spirit is crushed. [Prov 17:22]
  '14':
  - type: text
    content: 'The mind of the intelligent '
  - type: text
    content: and
  - type: text
    content: ' discerning seeks knowledge '
  - type: text
    content: and
  - type: text
    content: ' eagerly inquires after it,'
  - type: text
    content: But the mouth of the [stubborn] fool feeds on foolishness. [Is 32:6]
  '15':
  - type: text
    content: All the days of the afflicted are bad,
  - type: text
    content: But a glad heart has a continual feast [regardless of the circumstances].
  '16':
  - type: text
    content: Better is a little with the [reverent, worshipful] fear of the L
  - type: heading
    content: ord
  - type: text
    content: Than great treasure and trouble with it. [Ps 37:16; Prov 16:8; 1 Tim 6:6]
  '17':
  - type: text
    content: 'Better is a dinner of vegetables '
  - type: text
    content: and
  - type: text
    content: ' herbs where love is present'
  - type: text
    content: Than a fattened ox served with hatred. [Prov 17:1]
  '18':
  - type: text
    content: A hot-tempered man stirs up strife,
  - type: text
    content: 'But he who is slow to anger '
  - type: text
    content: and
  - type: text
    content: ' patient calms disputes.'
  '19':
  - type: text
    content: The way of the lazy is like a hedge of thorns [it pricks, lacerates, and entangles him],
  - type: text
    content: 'But the way [of life] of the upright is smooth '
  - type: text
    content: and
  - type: text
    content: ' open like a highway.'
  '2':
  - type: text
    content: 'The tongue of the wise speaks knowledge that is pleasing '
  - type: text
    content: and
  - type: text
    content: ' acceptable,'
  - type: text
    content: But the [babbling] mouth of fools spouts folly.
  '20':
  - type: text
    content: A wise son makes a father glad,
  - type: text
    content: But a foolish man despises his mother.
  '21':
  - type: text
    content: 'Foolishness is joy to him who is without heart '
  - type: text
    content: and
  - type: text
    content: ' lacks [intelligent, common] sense,'
  - type: text
    content: But a man of understanding walks uprightly [making his course straight]. [Eph 5:15]
  '22':
  - type: text
    content: 'Without consultation '
  - type: text
    content: and
  - type: text
    content: ' wise advice, plans are frustrated,'
  - type: text
    content: But with many counselors they are established and succeed.
  '23':
  - type: text
    content: A man has joy in giving an appropriate answer,
  - type: text
    content: 'And how good '
  - type: text
    content: and
  - type: text
    content: ' delightful is a word spoken at the right moment—how good it is!'
  '24':
  - type: text
    content: The [chosen] path of life leads upward for the wise,
  - type: text
    content: That he may keep away from Sheol (the nether world, the place of the dead) below. [Phil 3:20; Col 3:1, 2]
  '25':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will tear down the house of the proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant (self-righteous),'
  - type: text
    content: 'But He will establish '
  - type: text
    content: and
  - type: text
    content: ' protect the boundaries [of the land] of the [godly] widow.'
  '26':
  - type: text
    content: 'Evil plans '
  - type: text
    content: and
  - type: text
    content: ' thoughts of the wicked are exceedingly vile '
  - type: text
    content: and
  - type: text
    content: ' offensive to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But pure words are pleasant words to Him.
  '27':
  - type: text
    content: He who profits unlawfully brings suffering to his own house,
  - type: text
    content: But he who hates bribes [and does not receive nor pay them] will live. [Is 5:8; Jer 17:11]
  '28':
  - type: text
    content: The heart of the righteous thinks carefully about how to answer [in a wise and appropriate and timely way],
  - type: text
    content: But the [babbling] mouth of the wicked pours out malevolent things. [1 Pet 3:15]
  '29':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is far from the wicked [and distances Himself from them],'
  - type: text
    content: But He hears the prayer of the [consistently] righteous [that is, those with spiritual integrity and moral courage].
  '3':
  - type: text
    content: The eyes of the L
  - type: heading
    content: ord
  - type: text
    content: ' are in every place,'
  - type: text
    content: Watching the evil and the good [in all their endeavors]. [Job 34:21; Prov 5:21; Jer 16:17; 32:19; Heb 4:13]
  '30':
  - type: text
    content: The light of the eyes rejoices the hearts of others,
  - type: text
    content: And good news puts fat on the bones.
  '31':
  - type: text
    content: 'The ear that listens to '
  - type: text
    content: and
  - type: text
    content: ' learns from the life-giving rebuke (reprimand, censure)'
  - type: text
    content: Will remain among the wise.
  '32':
  - type: text
    content: 'He who neglects '
  - type: text
    content: and
  - type: text
    content: ' ignores instruction '
  - type: text
    content: and
  - type: text
    content: ' discipline despises himself,'
  - type: text
    content: But he who learns from rebuke acquires understanding [and grows in wisdom].
  '33':
  - type: text
    content: The [reverent] fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' [that is, worshiping Him and regarding Him as truly awesome] is the instruction for wisdom [its starting point and its essence];'
  - type: text
    content: And before honor comes humility.
  '4':
  - type: text
    content: A soothing tongue [speaking words that build up and encourage] is a tree of life,
  - type: text
    content: But a perversive tongue [speaking words that overwhelm and depress] crushes the spirit.
  '5':
  - type: text
    content: 'A [flippant, arrogant] fool rejects his father’s instruction '
  - type: text
    content: and
  - type: text
    content: ' correction,'
  - type: text
    content: 'But he who [is willing to learn and] regards '
  - type: text
    content: and
  - type: text
    content: ' keeps in mind a reprimand acquires good sense.'
  '6':
  - type: text
    content: 'Great '
  - type: text
    content: and
  - type: text
    content: ' priceless treasure is in the house of the [consistently] righteous one [who seeks godly instruction and grows in wisdom],'
  - type: text
    content: But trouble is in the income of the wicked one [who rejects the laws of God].
  '7':
  - type: text
    content: The lips of the wise spread knowledge [sifting it as chaff from the grain];
  - type: text
    content: But the hearts of [shortsighted] fools are not so.
  '8':
  - type: text
    content: 'The sacrifice of the wicked is hateful '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But the prayer of the upright is His delight! [Is 1:11; Jer 6:20; Amos 5:22]
  '9':
  - type: text
    content: 'The way [of life] of the wicked is hateful '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But He loves one who pursues righteousness [personal integrity, moral courage and honorable character].
