document_id: PRO.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Contrast the Upright and the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A soft '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gentle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtful answer turns away wrath,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But harsh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' painful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' careless words stir up anger. [Prov 25:15]'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'There is severe discipline for him who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsakes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: turns from the way [of righteousness];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who hates correction will die.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Sheol (the nether world, the place of the dead) and Abaddon (the abyss, the place of eternal punishment) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lie open
    - type: text
      text: ' before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How much more the hearts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inner motives of the children of men. [Job 26:6; Ps 139:8; Rev 9:2; 20:1, 2]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A scoffer [unlike a wise man] resents one who rebukes him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tries to teach him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will he go to the wise [for counsel and instruction].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A heart full of joy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' goodness makes a cheerful face,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when a heart is full of sadness the spirit is crushed. [Prov 17:22]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The mind of the intelligent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discerning seeks knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eagerly inquires after it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the mouth of the [stubborn] fool feeds on foolishness. [Is 32:6]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: All the days of the afflicted are bad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a glad heart has a continual feast [regardless of the circumstances].
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Better is a little with the [reverent, worshipful] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than great treasure and trouble with it. [Ps 37:16; Prov 16:8; 1 Tim 6:6]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Better is a dinner of vegetables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' herbs where love is present'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than a fattened ox served with hatred. [Prov 17:1]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: A hot-tempered man stirs up strife,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who is slow to anger '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patient calms disputes.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The way of the lazy is like a hedge of thorns [it pricks, lacerates, and entangles him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the way [of life] of the upright is smooth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' open like a highway.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The tongue of the wise speaks knowledge that is pleasing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acceptable,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the [babbling] mouth of fools spouts folly.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: A wise son makes a father glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a foolish man despises his mother.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Foolishness is joy to him who is without heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lacks [intelligent, common] sense,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a man of understanding walks uprightly [making his course straight]. [Eph 5:15]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Without consultation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wise advice, plans are frustrated,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But with many counselors they are established and succeed.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: A man has joy in giving an appropriate answer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And how good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delightful is a word spoken at the right moment—how good it is!'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The [chosen] path of life leads upward for the wise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That he may keep away from Sheol (the nether world, the place of the dead) below. [Phil 3:20; Col 3:1, 2]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will tear down the house of the proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant (self-righteous),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But He will establish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protect the boundaries [of the land] of the [godly] widow.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Evil plans '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughts of the wicked are exceedingly vile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' offensive to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But pure words are pleasant words to Him.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: He who profits unlawfully brings suffering to his own house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who hates bribes [and does not receive nor pay them] will live. [Is 5:8; Jer 17:11]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The heart of the righteous thinks carefully about how to answer [in a wise and appropriate and timely way],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the [babbling] mouth of the wicked pours out malevolent things. [1 Pet 3:15]
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is far from the wicked [and distances Himself from them],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He hears the prayer of the [consistently] righteous [that is, those with spiritual integrity and moral courage].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The eyes of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are in every place,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watching the evil and the good [in all their endeavors]. [Job 34:21; Prov 5:21; Jer 16:17; 32:19; Heb 4:13]
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The light of the eyes rejoices the hearts of others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And good news puts fat on the bones.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The ear that listens to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' learns from the life-giving rebuke (reprimand, censure)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will remain among the wise.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'He who neglects '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ignores instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline despises himself,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who learns from rebuke acquires understanding [and grows in wisdom].
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, worshiping Him and regarding Him as truly awesome] is the instruction for wisdom [its starting point and its essence];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And before honor comes humility.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A soothing tongue [speaking words that build up and encourage] is a tree of life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a perversive tongue [speaking words that overwhelm and depress] crushes the spirit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A [flippant, arrogant] fool rejects his father’s instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' correction,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But he who [is willing to learn and] regards '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keeps in mind a reprimand acquires good sense.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' priceless treasure is in the house of the [consistently] righteous one [who seeks godly instruction and grows in wisdom],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But trouble is in the income of the wicked one [who rejects the laws of God].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The lips of the wise spread knowledge [sifting it as chaff from the grain];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the hearts of [shortsighted] fools are not so.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The sacrifice of the wicked is hateful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exceedingly offensive to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the prayer of the upright is His delight! [Is 1:11; Jer 6:20; Amos 5:22]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The way [of life] of the wicked is hateful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exceedingly offensive to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He loves one who pursues righteousness [personal integrity, moral courage and honorable character].
