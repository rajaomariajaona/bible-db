document_id: PSA.57,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 57
  - type: heading
    content: Prayer for Rescue from Persecutors.
  - type: text
    content: To the Chief Musician; set to [the tune of] “Do Not Destroy.” A Mikhtam of David. [A record of memorable thoughts of David] when he fled from Saul in the cave.
  - type: text
    content: 'Be gracious to me, O God, be gracious '
  - type: text
    content: and
  - type: text
    content: ' merciful to me,'
  - type: text
    content: 'For my soul finds shelter '
  - type: text
    content: and
  - type: text
    content: ' safety in You,'
  - type: text
    content: 'And in the shadow of Your wings I will take refuge '
  - type: text
    content: and
  - type: text
    content: ' be confidently secure'
  - type: text
    content: Until destruction passes by.
  '10':
  - type: text
    content: 'For Your faithfulness '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness are great, reaching to the heavens,'
  - type: text
    content: And Your truth to the clouds.
  '11':
  - type: text
    content: Be exalted above the heavens, O God;
  - type: text
    content: 'Let Your glory '
  - type: text
    content: and
  - type: text
    content: ' majesty be over all the earth.'
  '2':
  - type: text
    content: I will cry to God Most High,
  - type: text
    content: 'Who accomplishes '
  - type: text
    content: all things
  - type: text
    content: ' on my behalf [for He completes my purpose in His plan].'
  '3':
  - type: text
    content: He will send from heaven and save me;
  - type: text
    content: 'He calls to account him who tramples me down. '
  - type: text
    content: Selah.
  - type: text
    content: God will send out His lovingkindness and His truth.
  '4':
  - type: text
    content: ¶My life is among lions;
  - type: text
    content: I must lie among those who breathe out fire—
  - type: text
    content: The sons of men whose teeth are spears and arrows,
  - type: text
    content: And their tongue a sharp sword.
  '5':
  - type: text
    content: Be exalted above the heavens, O God;
  - type: text
    content: 'Let Your glory '
  - type: text
    content: and
  - type: text
    content: ' majesty be over all the earth.'
  '6':
  - type: text
    content: 'They '
  - type: note
    content: Or spread.
  - type: text
    content: set a net for my steps;
  - type: text
    content: My very life was bowed down.
  - type: text
    content: They dug a pit before me;
  - type: text
    content: 'Into the midst of it they themselves have fallen. '
  - type: text
    content: Selah.
  '7':
  - type: text
    content: '¶My heart is steadfast, O God, my heart is steadfast '
  - type: text
    content: and
  - type: text
    content: ' confident!'
  - type: text
    content: I will sing, yes, I will sing praises [to You]!
  '8':
  - type: text
    content: Awake, my glory!
  - type: text
    content: Awake, harp and lyre!
  - type: text
    content: I will awaken the dawn.
  '9':
  - type: text
    content: 'I will praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to You, O Lord, among the people;'
  - type: text
    content: I will sing praises to You among the nations.
