document_id: PSA.57,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 57
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Rescue from Persecutors.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; set to [the tune of] “Do Not Destroy.” A Mikhtam of David. [A record of memorable thoughts of David] when he fled from Saul in the cave.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Be gracious to me, O God, be gracious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merciful to me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For my soul finds shelter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' safety in You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And in the shadow of Your wings I will take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be confidently secure'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until destruction passes by.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For Your faithfulness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness are great, reaching to the heavens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your truth to the clouds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Be exalted above the heavens, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let Your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty be over all the earth.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will cry to God Most High,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who accomplishes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all things
    - type: text
      text: ' on my behalf [for He completes my purpose in His plan].'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He will send from heaven and save me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He calls to account him who tramples me down. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will send out His lovingkindness and His truth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶My life is among lions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I must lie among those who breathe out fire—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sons of men whose teeth are spears and arrows,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their tongue a sharp sword.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Be exalted above the heavens, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let Your glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty be over all the earth.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: spread
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: set a net for my steps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My very life was bowed down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dug a pit before me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Into the midst of it they themselves have fallen. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '¶My heart is steadfast, O God, my heart is steadfast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing, yes, I will sing praises [to You]!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Awake, my glory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awake, harp and lyre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will awaken the dawn.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give thanks to You, O Lord, among the people;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing praises to You among the nations.
