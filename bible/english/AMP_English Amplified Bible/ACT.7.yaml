      text: 'And he answered, “Brothers and fathers, listen to me! The God of glory [the Shekinah, the radiance of God] appeared to our father Abraham when he was in Mesopotamia, before he lived in Haran, [Gen 11:31; 15:7; Ps 29:3] '
