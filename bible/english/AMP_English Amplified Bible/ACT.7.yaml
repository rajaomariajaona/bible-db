  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was at this [critical] time that Moses was born; and he was lovely in the sight of God, and for three months he was nourished in his father’s house. [Ex 2:2] '
  '21':
  - type: usfm
    marker: p
    children:
