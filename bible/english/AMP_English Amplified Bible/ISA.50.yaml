verses:
  '1':
  - type: heading
    content: God Helps His Servant
  - type: text
    content: ' '
  - type: note
    content: An ancient rabbi suggested this as an answer that God gave to Isaiah in response to Jews who came to him, but refused to repent. They compared themselves to a wife divorced by her husband and to a slave sold by his master (referring to God as husband and master), claiming that they had no further obligations to God.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' declares this;'
  - type: text
    content: “Where is the certificate of divorce
  - type: text
    content: By which I have sent your mother away, [O Israel]?
  - type: text
    content: Or to which one of My creditors did I sell you [as slaves]?
  - type: text
    content: In fact, You were sold for your wickedness [your sin, your injustice, your wrongdoing],
  - type: text
    content: And for your transgressions your mother was sent away.
  '10':
  - type: text
    content: Who is among you who fears the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Who obeys the voice of His Servant,
  - type: text
    content: Yet who walks in darkness and has no light?
  - type: text
    content: 'Let him trust '
  - type: text
    content: and
  - type: text
    content: ' be confident in the name of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and let him rely on his God.'
  '11':
  - type: text
    content: Listen carefully, all you who kindle your own fire [devising your own man-made plan of salvation],
  - type: text
    content: Who surround yourselves with torches,
  - type: text
    content: Walk by the light of your [self-made] fire
  - type: text
    content: And among the torches that you have set ablaze.
  - type: text
    content: 'But this you will have from My hand:'
  - type: text
    content: You will lie down in [a place of] torment. [Is 66:24]
  '2':
  - type: text
    content: “Why, when I came, was there no man [to greet Me]?
  - type: text
    content: When I called, why was there no one to answer?
  - type: text
    content: Is My hand really so short that it cannot redeem [My servants]?
  - type: text
    content: Or have I no power to rescue?
  - type: text
    content: Listen carefully, with My rebuke I dry up the sea,
  - type: text
    content: I make the rivers into a desert;
  - type: text
    content: Their fish stink because there is no water
  - type: text
    content: And die of thirst.
  '3':
  - type: text
    content: “I clothe the heavens with the blackness [of storm clouds]
  - type: text
    content: And make sackcloth [of mourning] their clothing.”
  '4':
  - type: text
    content: ¶The Lord G
  - type: heading
    content: od
  - type: text
    content: ' has given Me [His '
  - type: note
    content: I.e. the Messiah.
  - type: text
    content: Servant] the tongue of disciples [as One who is taught],
  - type: text
    content: That I may know how to sustain the weary with a word.
  - type: text
    content: 'He awakens '
  - type: text
    content: Me
  - type: text
    content: ' morning by morning,'
  - type: text
    content: He awakens My ear to listen as a disciple [as One who is taught].
  '5':
  - type: text
    content: The Lord G
  - type: heading
    content: od
  - type: text
    content: ' has opened My ear,'
  - type: text
    content: And I have not been rebellious
  - type: text
    content: Nor have I turned back.
  '6':
  - type: text
    content: 'I turned My back to those who strike '
  - type: text
    content: Me,
  - type: text
    content: And My cheeks to those who pluck out the beard;
  - type: text
    content: I did not hide My face from insults and spitting. [Matt 26:67; 27:30; John 19:1]
  '7':
  - type: text
    content: For the Lord G
  - type: heading
    content: od
  - type: text
    content: ' helps Me,'
  - type: text
    content: 'Therefore, I have not been ashamed '
  - type: text
    content: or
  - type: text
    content: ' humiliated.'
  - type: text
    content: Therefore, I have made My face like flint,
  - type: text
    content: And I know that I shall not be put to shame. [Luke 9:51; Is 52:13; 53:10-12]
  '8':
  - type: text
    content: He who declares Me in the right is near;
  - type: text
    content: Who will [dare to] contend with Me?
  - type: text
    content: Let us stand up to each other;
  - type: text
    content: Who is My adversary?
  - type: text
    content: Let him approach Me. [Rom 8:33-35; 1 Tim 3:16]
  '9':
  - type: text
    content: In fact, the Lord G
  - type: heading
    content: od
  - type: text
    content: ' helps Me;'
  - type: text
    content: Who is he who condemns Me [as guilty]?
  - type: text
    content: Indeed, they will all wear out like a garment;
  - type: text
    content: The moth will eat them. [Heb 1:11, 12]
