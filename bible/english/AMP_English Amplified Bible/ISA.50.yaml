document_id: ISA.50
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Helps His Servant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ancient rabbi suggested this as an answer that God gave to Isaiah in response to Jews who came to him, but refused to repent. They compared themselves to a wife divorced by her husband and to a slave sold by his master (referring to God as husband and master), claiming that they had no further obligations to God.
    marker-yv: yv-n
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' declares this;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is the certificate of divorce
- type: usfm
  marker: q1
  children:
  - type: text
    text: By which I have sent your mother away, [O Israel]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or to which one of My creditors did I sell you [as slaves]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: In fact, You were sold for your wickedness [your sin, your injustice, your wrongdoing],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for your transgressions your mother was sent away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Why, when I came, was there no man [to greet Me]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I called, why was there no one to answer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is My hand really so short that it cannot redeem [My servants]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or have I no power to rescue?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen carefully, with My rebuke I dry up the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I make the rivers into a desert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their fish stink because there is no water
- type: usfm
  marker: q1
  children:
  - type: text
    text: And die of thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I clothe the heavens with the blackness [of storm clouds]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make sackcloth [of mourning] their clothing.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶The Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' has given Me [His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the Messiah.
    marker-yv: yv-n
  - type: text
    text: Servant] the tongue of disciples [as One who is taught],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I may know how to sustain the weary with a word.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He awakens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Me
  - type: text
    text: ' morning by morning,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He awakens My ear to listen as a disciple [as One who is taught].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' has opened My ear,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I have not been rebellious
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor have I turned back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I turned My back to those who strike '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My cheeks to those who pluck out the beard;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I did not hide My face from insults and spitting. [Matt 26:67; 27:30; John 19:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' helps Me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore, I have not been ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' humiliated.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, I have made My face like flint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I know that I shall not be put to shame. [Luke 9:51; Is 52:13; 53:10-12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He who declares Me in the right is near;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will [dare to] contend with Me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let us stand up to each other;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is My adversary?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him approach Me. [Rom 8:33-35; 1 Tim 3:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: In fact, the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' helps Me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is he who condemns Me [as guilty]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, they will all wear out like a garment;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The moth will eat them. [Heb 1:11, 12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who is among you who fears the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who obeys the voice of His Servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet who walks in darkness and has no light?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let him trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be confident in the name of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and let him rely on his God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Listen carefully, all you who kindle your own fire [devising your own man-made plan of salvation],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who surround yourselves with torches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Walk by the light of your [self-made] fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: And among the torches that you have set ablaze.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But this you will have from My hand:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will lie down in [a place of] torment. [Is 66:24]
