  '28':
  - type: text
    content: 'Haran died before his father Terah in the land of his birth, in '
  - type: note
    content: Abram’s home town was Ur of the Chaldeans. As the result of extensive archeological excavations there in 1922-34, a great deal is known about Abram’s background. The house of the average middle-class person had from ten to twenty rooms and measured forty to fifty-two feet; the lower floor was for servants, the upper floor for the family, with five rooms for their use; additionally, there was a guest chamber and a lavatory reserved for visitors, and a private chapel. A school was found and what the students studied was shown by the clay tablets discovered there. In the days of Abram the pupils had reading, writing, and arithmetic as today. They learned the multiplication and division tables and even worked at square and cube roots. A bill of lading of about 2040 b.c. (about the era in which Abram is believed to have lived) showed that the commerce of that time was far-reaching. Even the name “Abraham” has been found on the excavated clay tablets.
  - type: text
    content: 'Ur of the Chaldeans. '
  '29':
  - type: text
    content: 'Abram and Nahor took wives for themselves. The name of Abram’s wife was Sarai (later called Sarah), and the name of Nahor’s wife was Milcah, the daughter of Haran, the father of Milcah and Iscah. '
  '3':
  - type: text
    content: 'They said one to another, “Come, let us make bricks and fire them thoroughly [in a kiln, to harden and strengthen them].” So they used brick for stone [as building material], and they used tar (bitumen, asphalt) for mortar. '
  '30':
  - type: text
    content: But Sarai was barren; she did not have a child.
  '31':
  - type: text
    content: 'Terah took Abram his son, and Lot the son of Haran, his grandson, and Sarai his daughter-in-law, his son Abram’s wife; and they went out together to go from Ur of the Chaldeans into the land of Canaan; but when they came to Haran [about five hundred and fifty miles northwest of Ur], they settled there. '
  '32':
  - type: text
    content: Terah lived two hundred and five years; and Terah died in Haran.
  '4':
