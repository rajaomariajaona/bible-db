document_id: GEN.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Universal Language, Babel, Confusion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the whole earth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: was one lip
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'spoke one language and used the same words (vocabulary). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the generations of Shem [from whom Abraham descended]. Shem was a hundred years old when he became the father of Arpachshad, two years after the flood. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Shem lived five hundred years after Arpachshad was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Arpachshad had lived thirty-five years, he became the father of Shelah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arpachshad lived four hundred and three years after Shelah was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Shelah had lived thirty years, he became the father of Eber. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shelah lived four hundred and three years after Eber was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Eber had lived thirty-four years, he became the father of Peleg. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Eber lived four hundred and thirty years after Peleg was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Peleg had lived thirty years, he became the father of Reu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Peleg lived two hundred and nine years after Reu was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as people journeyed eastward, they found a plain in the land of Shinar and they settled there. [Gen 10:10] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Reu had lived thirty-two years, he became the father of Serug. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Reu lived two hundred and seven years after Serug was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Serug had lived thirty years, he became the father of Nahor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Serug lived two hundred years after Nahor was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Nahor had lived twenty-nine years, he became the father of Terah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Nahor lived a hundred and nineteen years after Terah was born, and he had '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons and daughters.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Terah had lived seventy years, he became the father of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abram (Abraham) is mentioned first because of his importance, not his birth order.
      marker-yv: yv-n
    - type: text
      text: Abram and Nahor and Haran [his firstborn].
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the records of
    - type: text
      text: ' the descendants of Terah. Terah was the father of Abram (Abraham), Nahor, and Haran; and Haran was the father of Lot. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haran died before his father Terah in the land of his birth, in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Abram’s home town was Ur of the Chaldeans. As the result of extensive archeological excavations there in 1922-34, a great deal is known about Abram’s background. The house of the average middle-class person had from ten to twenty rooms and measured forty to fifty-two feet; the lower floor was for servants, the upper floor for the family, with five rooms for their use; additionally, there was a guest chamber and a lavatory reserved for visitors, and a private chapel. A school was found and what the students studied was shown by the clay tablets discovered there. In the days of Abram the pupils had reading, writing, and arithmetic as today. They learned the multiplication and division tables and even worked at square and cube roots. A bill of lading of about 2040 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . (about the era in which Abram is believed to have lived) showed that the commerce of that time was far-reaching. Even the name “Abraham” has been found on the excavated clay tablets.
      marker-yv: yv-n
    - type: text
      text: 'Ur of the Chaldeans. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram and Nahor took wives for themselves. The name of Abram’s wife was Sarai (later called Sarah), and the name of Nahor’s wife was Milcah, the daughter of Haran, the father of Milcah and Iscah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said one to another, “Come, let us make bricks and fire them thoroughly [in a kiln, to harden and strengthen them].” So they used brick for stone [as building material], and they used tar (bitumen, asphalt) for mortar. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Sarai was barren; she did not have a child.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Terah took Abram his son, and Lot the son of Haran, his grandson, and Sarai his daughter-in-law, his son Abram’s wife; and they went out together to go from Ur of the Chaldeans into the land of Canaan; but when they came to Haran [about five hundred and fifty miles northwest of Ur], they settled there. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Terah lived two hundred and five years; and Terah died in Haran.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said, “Come, let us build a city for ourselves, and a tower whose top '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will reach
    - type: text
      text: ' into the heavens, and let us make a [famous] name for ourselves, so that we will not be scattered [into separate groups] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be dispersed over the surface of the entire earth [as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' instructed].” [Gen 9:1] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came down to see the city and the tower which the sons of men had built. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Behold, they are one [unified] people, and they all have the same language. This is only the beginning of what they will do [in rebellion against Me], and now no evil thing they imagine they can do will be impossible for them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come, let Us (Father, Son, Holy Spirit) go down and there confuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mix up their language, so that they will not understand one another’s speech.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' scattered them abroad from there over the surface of the entire earth; and they stopped building the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the name of the city was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The word “Babel” is similar to the word “confuse” (Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: balal)
        - type: text
          text: ', but not identical.'
      marker-yv: yv-n
    - type: text
      text: Babel—because there the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' confused the language of the entire earth; and from that place the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' scattered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dispersed them over the surface of all the earth.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Shem
    marker-yv: yv-h
