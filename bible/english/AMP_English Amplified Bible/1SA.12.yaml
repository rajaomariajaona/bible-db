type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel Addresses Israel
  - type: text
    content: 'Then Samuel said to all Israel, “Behold, I have listened to your voice in everything that you have said to me and have appointed a king over you. '
  '10':
  - type: text
    content: They cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, ‘We have sinned because we have abandoned (rejected) the Lord and have served the Baals and the Ashtaroth; but now rescue us from the hands of our enemies, and we will serve You.’ '
  '11':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' sent Jerubbaal (Gideon) and '
  - type: note
    content: Greek and Syriac read Barak.
  - type: text
    content: Bedan and Jephthah and Samuel, and He rescued you from the hand of your enemies on every side, and you lived in security.
  - type: heading
    content: The King Confirmed
  '12':
  - type: text
    content: But when you saw that Nahash king of the Ammonites had come against you, you said to me, ‘No, but a king shall reign over us’—although the L
  - type: heading
    content: ord
  - type: text
    content: ' your God was your King. '
  '13':
  - type: text
    content: Now therefore, here is [Saul] the king whom you have chosen, and for whom you asked; behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' has set a king over you. '
  '14':
  - type: text
    content: If you will fear the L
  - type: heading
    content: ord
  - type: text
    content: ' [with awe and profound reverence] and serve Him and listen to His voice and not rebel against His commandment, then both you and your king will follow the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God [and it will be well]. '
  '15':
  - type: text
    content: But if you do not listen to the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' voice, but rebel against His '
  - type: note
    content: Lit mouth.
  - type: text
    content: command, then the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' will be against you [to punish you], as it was against your fathers. '
  '16':
  - type: text
    content: So now, take your stand and see this great thing which the L
  - type: heading
    content: ord
  - type: text
    content: ' will do before your eyes. '
  '17':
  - type: text
    content: Is it not [the beginning of the] wheat harvest today? I will call to the L
  - type: heading
    content: ord
  - type: text
    content: ' and He will send thunder and rain; then you will know [without any doubt], and see that your evil which you have done is great in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ' by asking for yourselves a king.” '
  '18':
  - type: text
    content: So Samuel called to the L
  - type: heading
    content: ord
  - type: text
    content: ' [in prayer], and He sent thunder and rain that day; and all the people greatly feared the L'
  - type: heading
    content: ord
  - type: text
    content: ' and Samuel.'
  '19':
  - type: text
    content: Then all the people said to Samuel, “Pray to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God for your servants, '
  - type: note
    content: The fifty days between the beginning of the barley harvest (Passover) and the end of the wheat harvest (Pentecost) are called the “days of trepidation.” During these fifty days, the farmers pray that it will not rain because all the major crops of the land (the seven varieties of Deut 8:7-10) come to fruition during this time. The rain destroys crops in the field and any produce that has been harvested and covered. The resulting famine from the crop failure would result in many deaths.
  - type: text
    content: 'so that we will not die, for we have added to all our sins '
  - type: text
    content: this
  - type: text
    content: ' evil—to ask for a king for ourselves.” '
  '2':
  - type: text
    content: 'And now, here is the king walking before you. As for me, I am old and gray, and here are my sons with you. I have walked before you from my childhood to this day. '
  '20':
  - type: text
    content: Samuel said to the people, “Do not be afraid. You have [indeed] done all this evil; yet do not turn away from following the L
  - type: heading
    content: ord
  - type: text
    content: ', but serve the L'
  - type: heading
    content: ord
  - type: text
    content: ' with all your heart. '
  '21':
  - type: text
    content: 'You must not turn away, for '
  - type: text
    content: then you would go
  - type: text
    content: ' after futile things which cannot profit or rescue, because they are futile. '
  '22':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will not abandon His people for His great name’s sake, because the L'
  - type: heading
    content: ord
  - type: text
    content: ' has been pleased to make you a people for Himself. '
  '23':
  - type: text
    content: Moreover, as for me, far be it from me that I should sin against the L
  - type: heading
    content: ord
  - type: text
    content: ' by ceasing to pray for you; but I will instruct you in the good and right way. '
  '24':
  - type: text
    content: Only fear the L
  - type: heading
    content: ord
  - type: text
    content: ' [with awe and profound reverence] and serve Him faithfully with all your heart; for consider what great things He has done for you. '
  '25':
  - type: text
    content: But if you still do evil, both you and your king will be swept away [to destruction].”
  '3':
  - type: text
    content: Here I am; testify against me before the L
  - type: heading
    content: ord
  - type: text
    content: ' and [Saul] His anointed [if I have done someone wrong]. Whose ox have I taken, or whose donkey have I taken, or whom have I exploited? Whom have I oppressed or from whose hand have I taken a bribe to blind my eyes [to the truth]? [Tell me and] I will restore it to you.” '
  '4':
  - type: text
    content: 'They said, “You have not exploited us or oppressed us or taken anything at all from a man’s hand.” '
  '5':
  - type: text
    content: Samuel said to them, “The L
  - type: heading
    content: ord
  - type: text
    content: ' is a witness against you, and [Saul] His anointed is a witness this day that you have not found anything in my hand.” And they answered, “'
  - type: text
    content: He is
  - type: text
    content: ' a witness.”'
  '6':
  - type: text
    content: Then Samuel said to the people, “It is the L
  - type: heading
    content: ord
  - type: text
    content: ' who appointed Moses and Aaron and brought your fathers (ancestors) up from the land of Egypt. '
  '7':
  - type: text
    content: 'Now then, take your stand, so that I may plead '
  - type: text
    content: and
  - type: text
    content: ' contend with you before the L'
  - type: heading
    content: ord
  - type: text
    content: ' concerning all the righteous acts of the L'
  - type: heading
    content: ord
  - type: text
    content: ' which He did for you and for your fathers. '
  '8':
  - type: text
    content: 'When Jacob [and his sons] had come into Egypt [and later when the Egyptians oppressed them] and your '
  - type: note
    content: I.e. the descendants of Jacob (Israel) and his twelve sons.
  - type: text
    content: fathers cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ', then the L'
  - type: heading
    content: ord
  - type: text
    content: ' sent Moses and Aaron who brought your fathers out of Egypt and settled them in this place. '
  '9':
  - type: text
    content: But when they forgot the L
  - type: heading
    content: ord
  - type: text
    content: ' their God, He sold them into the hand of '
  - type: note
    content: 'These may be representatives of Israel’s enemies during the time of the Judges: Sisera of Hazor to the north, the Philistines to the west, and Moab to the south and west.'
  - type: text
    content: 'Sisera, commander of Hazor’s army, and into the hand of the Philistines and of the king of Moab, and they fought against them. '
