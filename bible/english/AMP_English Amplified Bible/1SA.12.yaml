document_id: 1SA.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samuel Addresses Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel said to all Israel, “Behold, I have listened to your voice in everything that you have said to me and have appointed a king over you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They cried out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, ‘We have sinned because we have abandoned (rejected) the Lord and have served the Baals and the Ashtaroth; but now rescue us from the hands of our enemies, and we will serve You.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent Jerubbaal (Gideon) and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek and Syriac read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Barak
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Bedan and Jephthah and Samuel, and He rescued you from the hand of your enemies on every side, and you lived in security.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The King Confirmed
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But when you saw that Nahash king of the Ammonites had come against you, you said to me, ‘No, but a king shall reign over us’—although the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God was your King. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now therefore, here is [Saul] the king whom you have chosen, and for whom you asked; behold, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has set a king over you. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: If you will fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [with awe and profound reverence] and serve Him and listen to His voice and not rebel against His commandment, then both you and your king will follow the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God [and it will be well]. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But if you do not listen to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' voice, but rebel against His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: mouth
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: command, then the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be against you [to punish you], as it was against your fathers. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So now, take your stand and see this great thing which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will do before your eyes. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Is it not [the beginning of the] wheat harvest today? I will call to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and He will send thunder and rain; then you will know [without any doubt], and see that your evil which you have done is great in the sight of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by asking for yourselves a king.” '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Samuel called to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [in prayer], and He sent thunder and rain that day; and all the people greatly feared the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and Samuel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all the people said to Samuel, “Pray to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God for your servants, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fifty days between the beginning of the barley harvest (Passover) and the end of the wheat harvest (Pentecost) are called the “days of trepidation.” During these fifty days, the farmers pray that it will not rain because all the major crops of the land (the seven varieties of Deut 8:7-10) come to fruition during this time. The rain destroys crops in the field and any produce that has been harvested and covered. The resulting famine from the crop failure would result in many deaths.
      marker-yv: yv-n
    - type: text
      text: 'so that we will not die, for we have added to all our sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' evil—to ask for a king for ourselves.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, here is the king walking before you. As for me, I am old and gray, and here are my sons with you. I have walked before you from my childhood to this day. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel said to the people, “Do not be afraid. You have [indeed] done all this evil; yet do not turn away from following the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but serve the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with all your heart. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must not turn away, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then you would go
    - type: text
      text: ' after futile things which cannot profit or rescue, because they are futile. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not abandon His people for His great name’s sake, because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has been pleased to make you a people for Himself. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moreover, as for me, far be it from me that I should sin against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' by ceasing to pray for you; but I will instruct you in the good and right way. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Only fear the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [with awe and profound reverence] and serve Him faithfully with all your heart; for consider what great things He has done for you. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you still do evil, both you and your king will be swept away [to destruction].”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Here I am; testify against me before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and [Saul] His anointed [if I have done someone wrong]. Whose ox have I taken, or whose donkey have I taken, or whom have I exploited? Whom have I oppressed or from whose hand have I taken a bribe to blind my eyes [to the truth]? [Tell me and] I will restore it to you.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said, “You have not exploited us or oppressed us or taken anything at all from a man’s hand.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel said to them, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is a witness against you, and [Saul] His anointed is a witness this day that you have not found anything in my hand.” And they answered, “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: He is
    - type: text
      text: ' a witness.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel said to the people, “It is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who appointed Moses and Aaron and brought your fathers (ancestors) up from the land of Egypt. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now then, take your stand, so that I may plead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with you before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' concerning all the righteous acts of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He did for you and for your fathers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jacob [and his sons] had come into Egypt [and later when the Egyptians oppressed them] and your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the descendants of Jacob (Israel) and his twelve sons.
      marker-yv: yv-n
    - type: text
      text: fathers cried out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', then the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent Moses and Aaron who brought your fathers out of Egypt and settled them in this place. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when they forgot the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God, He sold them into the hand of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'These may be representatives of Israel’s enemies during the time of the Judges: Sisera of Hazor to the north, the Philistines to the west, and Moab to the south and west.'
      marker-yv: yv-n
    - type: text
      text: 'Sisera, commander of Hazor’s army, and into the hand of the Philistines and of the king of Moab, and they fought against them. '
