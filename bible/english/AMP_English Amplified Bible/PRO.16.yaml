  '10':
  - type: text
    content: A divine decision [given by God] is on the lips of the king [as His representative];
  - type: text
    content: 'His mouth should not be unfaithful '
  - type: text
    content: or
  - type: text
    content: ' unjust in judgment. [Deut 17:18-20; 2 Sam 14:17-20; 1 Kin 3:9-12; Is 11:2]'
  '11':
  - type: text
    content: A just balance and [honest] scales are the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ;
  - type: text
    content: All the weights of the bag are His concern [established by His eternal principles].
  '12':
  - type: text
    content: It is repulsive [to God and man] for kings to behave wickedly,
  - type: text
    content: For a throne is established on righteousness (right standing with God).
  '13':
  - type: text
    content: Righteous lips are the delight of kings,
  - type: text
    content: And he who speaks right is loved.
  '14':
  - type: text
    content: The wrath of a king is like a messenger of death,
  - type: text
    content: But a wise man will appease it.
  '15':
  - type: text
    content: In the light of the king’s face is life,
  - type: text
    content: And his favor is like a cloud bringing the spring rain.
  '16':
  - type: text
    content: How much better it is to get wisdom than gold!
  - type: text
    content: And to get understanding is to be chosen above silver. [Prov 8:10, 19]
  '17':
  - type: text
    content: 'The highway of the upright turns away '
  - type: text
    content: and
  - type: text
    content: ' departs from evil;'
  - type: text
    content: He who guards his way protects his life (soul).
  '18':
  - type: text
    content: Pride goes before destruction,
  - type: text
    content: And a haughty spirit before a fall.
  '19':
  - type: text
    content: It is better to be humble in spirit with the lowly
  - type: text
    content: Than to divide the spoil with the proud (haughty, arrogant).
  '2':
  - type: text
    content: 'All the ways of a man are clean '
  - type: text
    content: and
  - type: text
    content: ' innocent in his own eyes [and he may see nothing wrong with his actions],'
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' weighs '
  - type: text
    content: and
  - type: text
    content: ' examines the motives '
  - type: text
    content: and
  - type: text
    content: ' intents [of the heart and knows the truth]. [1 Sam 16:7; Heb 4:12]'
  '20':
  - type: text
    content: He who pays attention to the word [of God] will find good,
  - type: text
    content: And blessed (happy, prosperous, to be admired) is he who trusts [confidently] in the L
  - type: heading
    content: ord
  - type: text
    content: .
  '21':
  - type: text
    content: The wise in heart will be called understanding,
  - type: text
    content: 'And sweet speech increases persuasiveness '
  - type: text
    content: and
  - type: text
    content: ' learning [in both speaker and listener].'
  '22':
  - type: text
    content: Understanding (spiritual insight) is a [refreshing and boundless] wellspring of life to those who have it,
  - type: text
    content: 'But to give instruction '
  - type: text
    content: and
  - type: text
    content: ' correction to fools is foolishness.'
  '23':
  - type: text
    content: The heart of the wise instructs his mouth [in wisdom]
  - type: text
    content: And adds persuasiveness to his lips.
  '24':
  - type: text
    content: Pleasant words are like a honeycomb,
  - type: text
    content: 'Sweet '
  - type: text
    content: and
  - type: text
    content: ' delightful to the soul and healing to the body.'
  '25':
  - type: text
    content: 'There is a way which seems right to a man '
  - type: text
    content: and
  - type: text
    content: ' appears straight before him,'
  - type: text
    content: But its end is the way of death.
  '26':
  - type: text
    content: The appetite of a worker works for him,
  - type: text
    content: For his hunger urges him on.
  '27':
  - type: text
    content: 'A worthless man devises '
  - type: text
    content: and
  - type: text
    content: ' digs up evil,'
  - type: text
    content: And the words on his lips are like a scorching fire.
  '28':
  - type: text
    content: A perverse man spreads strife,
  - type: text
    content: And one who gossips separates intimate friends. [Prov 17:9]
  '29':
  - type: text
    content: 'A violent '
  - type: text
    content: and
  - type: text
    content: ' exceedingly covetous man entices his neighbor [to sin],'
  - type: text
    content: And leads him in a way that is not good.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Lit Roll.
  - type: text
    content: Commit your works to the L
  - type: heading
    content: ord
  - type: text
    content: ' [submit and trust them to Him],'
  - type: text
    content: And your plans will succeed [if you respond to His will and guidance].
  '30':
  - type: text
    content: He who [slyly] winks his eyes does so to plot perverse things;
  - type: text
    content: And he who compresses his lips [as if in a secret signal] brings evil to pass.
  '31':
  - type: text
    content: 'The silver-haired head is a crown of splendor '
  - type: text
    content: and
  - type: text
    content: ' glory;'
  - type: text
    content: It is found in the way of righteousness. [Prov 20:29]
  '32':
  - type: text
    content: 'He who is slow to anger is better '
  - type: text
    content: and
  - type: text
    content: ' more honorable than the mighty [soldier],'
  - type: text
    content: 'And he who rules '
  - type: text
    content: and
  - type: text
    content: ' controls his own spirit, than he who captures a city.'
  '33':
  - type: text
    content: The lot is cast into the lap,
  - type: note
    content: This is the reason why the casting of lots was sanctioned in Israel for certain cases of decision-making (e.g. Lev 16:8; Josh 18:6, 8; 1 Chr 25:8, etc.). It was understood that the outcomes were controlled by God, and the seemingly random procedure eliminated human influence. The last time the ritual is mentioned in the Bible is in the choice of Matthias to replace Judas (Acts 1:26). Many believe that the filling of the Holy Spirit at Pentecost in Acts 2 officially put an end to the ritual because it was then replaced by the direct guidance of the Spirit. It was never sanctioned or recommended as a way to determine God’s will in personal decision-making.
  - type: text
    content: But its every decision is from the L
  - type: heading
    content: ord
  - type: text
    content: .
  '4':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has made everything for its own purpose,'
  - type: text
    content: Even the wicked [according to their role] for the day of evil.
  '5':
  - type: text
    content: 'Everyone who is proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant in heart is disgusting '
  - type: text
    content: and
  - type: text
    content: ' exceedingly offensive to the L'
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Be assured he will not go unpunished. [Prov 8:13; 11:20, 21]
  '6':
  - type: text
    content: 'By mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness and truth [not superficial ritual] wickedness is cleansed from the heart,'
  - type: text
    content: And by the fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' one avoids evil.'
  '7':
  - type: text
    content: When a man’s ways please the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: He makes even his enemies to be at peace with him.
  '8':
  - type: text
    content: Better is a little with righteousness
  - type: text
    content: Than great income [gained] with injustice. [Ps 37:16; Prov 15:16]
  '9':
  - type: text
    content: A man’s mind plans his way [as he journeys through life],
  - type: text
    content: But the L
  - type: heading
