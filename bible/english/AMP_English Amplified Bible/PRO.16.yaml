document_id: PRO.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast the Upright and the Wicked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The plans '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reflections of the heart belong to man,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the [wise] answer of the tongue is from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'All the ways of a man are clean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' innocent in his own eyes [and he may see nothing wrong with his actions],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' weighs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' examines the motives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intents [of the heart and knows the truth]. [1 Sam 16:7; Heb 4:12]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Roll
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Commit your works to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [submit and trust them to Him],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your plans will succeed [if you respond to His will and guidance].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has made everything for its own purpose,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the wicked [according to their role] for the day of evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Everyone who is proud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant in heart is disgusting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly offensive to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be assured he will not go unpunished. [Prov 8:13; 11:20, 21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'By mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness and truth [not superficial ritual] wickedness is cleansed from the heart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by the fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' one avoids evil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When a man’s ways please the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: He makes even his enemies to be at peace with him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Better is a little with righteousness
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than great income [gained] with injustice. [Ps 37:16; Prov 15:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A man’s mind plans his way [as he journeys through life],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' directs his steps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establishes them. [Ps 37:23; Prov 20:24; Jer 10:23]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A divine decision [given by God] is on the lips of the king [as His representative];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His mouth should not be unfaithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' unjust in judgment. [Deut 17:18-20; 2 Sam 14:17-20; 1 Kin 3:9-12; Is 11:2]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A just balance and [honest] scales are the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the weights of the bag are His concern [established by His eternal principles].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is repulsive [to God and man] for kings to behave wickedly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For a throne is established on righteousness (right standing with God).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Righteous lips are the delight of kings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who speaks right is loved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The wrath of a king is like a messenger of death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a wise man will appease it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: In the light of the king’s face is life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his favor is like a cloud bringing the spring rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: How much better it is to get wisdom than gold!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to get understanding is to be chosen above silver. [Prov 8:10, 19]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The highway of the upright turns away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' departs from evil;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who guards his way protects his life (soul).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pride goes before destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a haughty spirit before a fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It is better to be humble in spirit with the lowly
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than to divide the spoil with the proud (haughty, arrogant).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He who pays attention to the word [of God] will find good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And blessed (happy, prosperous, to be admired) is he who trusts [confidently] in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wise in heart will be called understanding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And sweet speech increases persuasiveness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' learning [in both speaker and listener].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Understanding (spiritual insight) is a [refreshing and boundless] wellspring of life to those who have it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But to give instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' correction to fools is foolishness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The heart of the wise instructs his mouth [in wisdom]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And adds persuasiveness to his lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pleasant words are like a honeycomb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delightful to the soul and healing to the body.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'There is a way which seems right to a man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appears straight before him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But its end is the way of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The appetite of a worker works for him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For his hunger urges him on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A worthless man devises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' digs up evil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the words on his lips are like a scorching fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A perverse man spreads strife,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And one who gossips separates intimate friends. [Prov 17:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'A violent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exceedingly covetous man entices his neighbor [to sin],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And leads him in a way that is not good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: He who [slyly] winks his eyes does so to plot perverse things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who compresses his lips [as if in a secret signal] brings evil to pass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The silver-haired head is a crown of splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is found in the way of righteousness. [Prov 20:29]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He who is slow to anger is better '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more honorable than the mighty [soldier],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he who rules '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' controls his own spirit, than he who captures a city.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The lot is cast into the lap,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the reason why the casting of lots was sanctioned in Israel for certain cases of decision-making (e.g. Lev 16:8; Josh 18:6, 8; 1 Chr 25:8, etc.). It was understood that the outcomes were controlled by God, and the seemingly random procedure eliminated human influence. The last time the ritual is mentioned in the Bible is in the choice of Matthias to replace Judas (Acts 1:26). Many believe that the filling of the Holy Spirit at Pentecost in Acts 2 officially put an end to the ritual because it was then replaced by the direct guidance of the Spirit. It was never sanctioned or recommended as a way to determine God’s will in personal decision-making.
    marker-yv: yv-n
  - type: text
    text: But its every decision is from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
