    content: A reference to Jacob’s (Israel’s) wife Rachel as the mother of the children of Israel. Here, her grief over the slaughter of babies by Herod parallels the grief of Israel when they were conquered and deported by the Babylonians. The image is that of Rachel weeping for the children of Israel from her grave. Matthew takes Jeremiah’s words, which originally referred to grief over Babylonian captivity, and applies them to Herod’s slaughter of the babies.
