document_id: 2CH.31,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Idols Are Destroyed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now when all of this was finished, all Israel who were present went out to the cities of Judah, and smashed the [pagan] pillars (obelisks, memorial stones) in pieces, cut down the Asherim (wooden symbols of a female deity), and tore down the high places and the altars [of idolatry] throughout all Judah and Benjamin, as well as in Ephraim and Manasseh, until they had destroyed them all. Then all the sons (descendants) of Israel returned to their own cities, each to his own property.
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Azariah the high priest of the house of Zadok answered him, “Since the people began to bring the offerings into the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', we have had enough to eat with plenty left over, for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has blessed His people, and this great quantity is left over.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then Hezekiah told them to prepare rooms [for storage] in the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and they prepared them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They faithfully brought in the contributions, the tithes, and the sacred (dedicated) things. Conaniah the Levite was in charge of them, and Shimei his brother was second [in authority]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismachiah, Mahath, and Benaiah were overseers directed by Conaniah and Shimei his brother by the appointment of King Hezekiah, and Azariah was the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chief
    - type: text
      text: ' officer of the house of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Kore the son of Imnah the Levite, keeper of the East Gate, was in charge of the voluntary offerings to God, to apportion the contributions for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and the most holy things. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Under his authority were Eden, Miniamin, Jeshua, Shemaiah, Amariah, and Shecaniah in the cities of the priests, to distribute faithfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their portions
    - type: text
      text: ' to their brothers (relatives) by divisions, whether great or small, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: without regard to their genealogical registration, to the males from thirty years old and upward—everyone who entered the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for his daily obligations—for their service in accordance with their duties by their divisions; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'as well as the priests who were registered genealogically according to their fathers’ households, and the Levites from twenty years old and upward, by their duties and by their divisions. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The genealogical registration '
    - type: usfm
      marker: it
      children:
      - type: text
        text: included
    - type: text
      text: ' all their little children, their wives, and their sons and daughters, for the whole assembly, because they consecrated themselves faithfully in holiness. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Also for the sons of Aaron, the priests, who were in the pasture lands of their cities or in each and every city, there were men who were designated by name to give portions to every male among the priests and to everyone genealogically registered among the Levites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And Hezekiah appointed the divisions of the priests, and the Levites by their divisions, each in accordance with his service, both the priests and Levites, for burnt offerings and for peace offerings, to minister and to give thanks and to praise in the gates of the camp of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reforms Continued
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: This is what Hezekiah did throughout Judah; and he did what was good, right, and true before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Every work which he began in the service of the house of God in keeping with the law and the commandment, seeking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inquiring of his God [and longing for Him], he did with all his heart and prospered.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hezekiah also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' the king’s [personal] portion of his goods: for the morning and evening burnt offerings, and the burnt offerings for the Sabbaths and for the New Moons and for the appointed feasts, as it is written in the Law of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He also told (ordered) the people living in Jerusalem to give the portion that was due to the priests and Levites, so that they might [be free to] devote themselves to the Law of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'As soon as the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: king’s
    - type: text
      text: ' order spread, the Israelites gave in abundance the first fruits of grain, new wine, [olive] oil, honey, and of all the produce of the field; and they brought in the tithe of everything abundantly. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The sons of Israel and Judah who lived in the cities of Judah also brought in the tithe of oxen and sheep, and the tithe of sacred gifts which were consecrated to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God, and placed them in heaps. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In the third month [at the end of wheat harvest] they began to make the heaps, and they finished them in the seventh month. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When Hezekiah and the rulers came and saw the heaps, they blessed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and His people Israel. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Hezekiah questioned the priests and Levites about the heaps. '
