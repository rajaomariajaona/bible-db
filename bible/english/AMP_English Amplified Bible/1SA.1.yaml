    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts at Shiloh. Hophni and Phinehas, the two sons of Eli, were priests to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' there. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When the day came that Elkanah sacrificed, he would give portions [of the sacrificial meat] to Peninnah his wife and all her sons and daughters. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But to Hannah he would give a double portion, because he loved Hannah, but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: closed her womb
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'given her no children. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hannah’s rival provoked her bitterly, to irritate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' embarrass her, because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: closed her womb
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'left her childless. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So it happened year after year, whenever she went up to the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', Peninnah provoked her; so she wept and would not eat. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Elkanah her husband said to her, “Hannah, why do you cry and why do you not eat? Why are you so sad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discontent? Am I not better to you than ten sons?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So Hannah got up after eating and drinking in Shiloh. Now Eli the priest was sitting on his seat beside the doorpost of the temple (tabernacle) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
