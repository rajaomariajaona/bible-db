    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all the days of his life; a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
