    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The family got up early the next morning, worshiped before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and returned to their home in Ramah. Elkanah knew Hannah his wife, and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' remembered her [prayer]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He had two wives, one named Hannah and the other named Peninnah. Peninnah had children, but Hannah had none.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'It came about in due time, after Hannah had conceived, that she gave birth to a son; she named him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name possibly means “The Name [i.e. Yahweh, L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: '] is God” or “His name is God,” but the etymology is uncertain.'
      marker-yv: yv-n
    - type: text
      text: 'Samuel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying
    - type: text
      text: ', “Because I have asked for him from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the man Elkanah and all his household went up to offer to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sacrifice of days.
      marker-yv: yv-n
    - type: text
      text: 'yearly sacrifice and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pay
    - type: text
      text: ' his vow. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But Hannah did not go up, for she said to her husband, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: I will not go up
    - type: text
      text: ' until the child is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At this time children were nursed until about age three. But it may be fair to say that Hannah also wanted to keep the boy as long as she reasonably could; giving up her only child—even for the best of purposes—must have been terribly difficult.
      marker-yv: yv-n
    - type: text
      text: weaned; and then I will bring him, so that he may appear before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and remain there as long as he lives.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Elkanah her husband said to her, “Do what seems best to you. Wait until you have weaned him; only may the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' establish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confirm His word.” So the woman remained [behind] and nursed her son until she weaned him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now when she had weaned him, she took him up with her, along with a three-year-old bull, an ephah of flour, and a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These containers were made from almost the entire skin of an animal and were used for holding wine.
      marker-yv: yv-n
    - type: text
      text: leather bottle of wine [to pour over the burnt offering for a sweet fragrance], and she brought Samuel to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house in Shiloh, although the child was young. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Then they slaughtered the bull, and brought the child to Eli. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Hannah said, “Oh, my lord! As [surely as] your soul lives, my lord, I am the woman who stood beside you here, praying to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For this child I prayed, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has granted me my request which I asked of Him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Therefore I have also dedicated him to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; as long as he lives he is dedicated to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” And they worshiped the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' there.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
