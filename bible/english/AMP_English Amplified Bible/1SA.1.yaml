  - type: text
    content: 'hill country of Ephraim, named Elkanah the son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, an '
  - type: note
    content: It is sometimes claimed that Samuel was from the tribe of Ephraim (rather than the tribe of Levi) and so was not eligible to serve as a priest. He was an Ephraimite only in the sense that his family lived in the tribal area of Ephraim. His genealogy is given in 1 Chr 6:22-28. At least two other men in the passage are named Elkanah. Samuel’s father, Elkanah, is the man mentioned in 1 Chr 6:27. The men mentioned in 1 Chr 6:23, 24, and 26 are several generations removed from Samuel.
  - type: text
    content: 'Ephraimite. '
