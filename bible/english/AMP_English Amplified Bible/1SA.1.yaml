          children:
          - type: text
            text: mountains of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'hill country of Ephraim, named Elkanah the son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is sometimes claimed that Samuel was from the tribe of Ephraim (rather than the tribe of Levi) and so was not eligible to serve as a priest. He was an Ephraimite only in the sense that his family lived in the tribal area of Ephraim. His genealogy is given in 1 Chr 6:22-28. At least two other men in the passage are named Elkanah. Samuel’s father, Elkanah, is the man mentioned in 1 Chr 6:27. The men mentioned in 1 Chr 6:23, 24, and 26 are several generations removed from Samuel.
      marker-yv: yv-n
    - type: text
      text: 'Ephraimite. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hannah was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bitter of soul
        - type: text
          text: .
