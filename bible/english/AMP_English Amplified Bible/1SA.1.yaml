  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Now it happened as she continued praying before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', that Eli was watching her mouth. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hannah was speaking in her heart (mind); only her lips were moving, and her voice was not heard, so Eli '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This implies that the custom at that time was to pray aloud; the outcome (vv 19, 20) shows that God hears prayer, whether it is spoken or silent.
      marker-yv: yv-n
    - type: text
      text: 'thought she was drunk. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eli said to her, “How long will you make yourself drunk? Get rid of your wine.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But Hannah answered, “No, my lord, I am a woman with a despairing spirit. I have not been drinking wine or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' intoxicating drink, but I have poured out my soul before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Gen 19:34] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Do not regard your maidservant as a wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless woman, for I have spoken until now out of my great concern and [bitter] provocation.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Eli answered and said, “Go in peace; and may the God of Israel grant your petition that you have asked of Him.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hannah said, “Let your maidservant find grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor in your sight.” So the woman went on her way and ate, and her face was no longer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sad
    - type: text
      text: .
