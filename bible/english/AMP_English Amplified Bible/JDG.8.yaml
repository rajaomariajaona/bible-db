document_id: JDG.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Zebah and Zalmunna Routed
  - type: text
    content: 'And the men of [the tribe of] Ephraim said to Gideon, “What is this thing that you have done to us, not calling us when you went to fight with Midian?” And they quarreled with him vehemently. '
  '10':
  - type: text
    content: 'Now Zebah and Zalmunna were in Karkor with their armies, about fifteen thousand [fighting] men, all who were left of the entire army of the sons of the east; for a hundred and twenty thousand swordsmen had fallen. '
  '11':
  - type: text
    content: 'Gideon went up by the route of those who lived in tents to the east of Nobah and Jogbehah, and he attacked their camp when the camp was unsuspecting. '
  '12':
  - type: text
    content: When Zebah and Zalmunna fled, he pursued them and captured the two kings of Midian, Zebah and Zalmunna, and terrified the entire army.
  '13':
  - type: text
    content: 'Then Gideon the son of Joash returned from the battle by the ascent of Heres. '
  '14':
  - type: text
    content: 'He captured a young man of Succoth and questioned him. And '
  - type: text
    content: the youth
  - type: text
    content: ' wrote down for him [the names of] the leaders of Succoth and its elders, seventy-seven men. '
  '15':
  - type: text
    content: 'He came to the men of Succoth and said, “Look here, Zebah and Zalmunna, about whom you taunted me, saying, ‘Are Zebah and Zalmunna now in your hand, that we should give bread to your men who are exhausted?’ ” '
  '16':
  - type: text
    content: 'He took the elders of the city, and thorns of the wilderness and briars, and with them he '
  - type: note
    content: Or taught them humility. The Hebrew is uncertain.
  - type: text
    content: 'punished the men of Succoth. '
  '17':
  - type: text
    content: He tore down the tower of Penuel and killed the men of the city.
  '18':
  - type: text
    content: 'Then Gideon said to Zebah and Zalmunna, “What kind of men were they whom you killed at Tabor?” And they replied, “They were like you, each one of them resembled the son of a king.” '
  '19':
  - type: text
    content: He said, “They were my brothers, the sons of my mother. As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives, if only you had let them live, I would not kill you.” '
  '2':
  - type: text
    content: 'But he said to them, “What have I done now [that is so significant] in comparison with you? Is not the gleaning (leftovers) '
  - type: text
    content: of the grapes
  - type: text
    content: ' of [your tribe of] Ephraim better than the vintage (entire harvest) of [my clan of] Abiezer? '
  '20':
  - type: text
    content: 'So [to humiliate them] Gideon said to Jether his firstborn, “Stand up, and kill them!” But the youth did not draw his sword, because he was afraid, for he was still [just] a boy. '
  '21':
  - type: text
    content: Then Zebah and Zalmunna said, “Rise up yourself and strike us; for as the man is, so is his strength.” So Gideon arose and killed Zebah and Zalmunna, and took the crescent amulets that were on their camels’ necks.
  '22':
  - type: text
    content: 'Then the men of Israel said to Gideon, “Rule [as king] over us, both you and your son, also your son’s son, for you have rescued us from the hand of Midian.” '
  '23':
  - type: text
    content: But Gideon said to them, “I will not rule over you, and my son will not rule over you; the L
  - type: heading
    content: ord
  - type: text
    content: ' shall rule over you.” '
  '24':
  - type: text
    content: 'And Gideon said to them, “I would make a request of you, that each one of you give me an earring from his spoil.” For the Midianites had gold earrings, because they were '
  - type: note
    content: A general term for the descendants of Keturah, the woman Abraham married after Sarah’s death (Gen 25:1); synonymous with Midianite.
  - type: text
    content: 'Ishmaelites [who customarily wore them]. '
  '25':
  - type: text
    content: 'They answered, “We will certainly give them '
  - type: text
    content: to you
  - type: text
    content: '.” And they spread out a garment, and every one of them threw an earring there from his spoil. '
  '26':
  - type: text
    content: 'And the weight of the golden earrings that he requested was '
  - type: note
    content: I.e. about 40 lbs. of gold.
  - type: text
    content: 'seventeen hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of gold, apart from the crescent amulets and pendants and the purple garments which were worn by the kings of Midian, and apart from the chains that were on their camels’ necks. '
  '27':
  - type: text
    content: 'Gideon made [all the golden earrings into] an ephod [a sacred, high priest’s garment], and put it in his city of Ophrah, and all Israel '
  - type: note
    content: Lit played the prostitute with.
  - type: text
    content: 'worshiped it as an idol there, and '
  - type: note
    content: The reason Gideon chose to make the golden ephod is unclear, but the fact that he did so, and that it became an object of worship for Israel, casts a shadow over his otherwise remarkable accomplishments.
  - type: text
    content: it became a trap for Gideon and his household.
  - type: heading
    content: Forty Years of Peace
  '28':
  - type: text
    content: 'So Midian was subdued '
  - type: text
    content: and
  - type: text
    content: ' humbled before the sons of Israel, and they no longer lifted up their heads [in pride]. And the land was at rest for forty years in the days of Gideon.'
  '29':
  - type: text
    content: 'Jerubbaal (Gideon) the son of Joash went and lived in his own house. '
  '3':
  - type: text
    content: God has given the leaders of Midian, Oreb and Zeeb into your hands; and what was I able to do in comparison with you?” Then their anger toward him subsided when he made this statement.
  '30':
  - type: text
    content: 'Now Gideon had seventy sons born to him, because he had many wives. '
  '31':
  - type: text
    content: 'And his '
  - type: note
    content: Perhaps originally one of Gideon’s slaves, this woman became a type of secondary wife who lived at home with her family and was visited on occasion by her husband.
  - type: text
    content: 'concubine who was in Shechem also bore him a son, whom he named Abimelech. '
  '32':
  - type: text
    content: Gideon the son of Joash died at a good advanced age and was buried in the tomb of Joash his father in Ophrah of the Abiezrites.
  '33':
  - type: text
    content: 'Then it came about, as soon as Gideon was dead, that the Israelites again played the prostitute with the Baals, and made Baal-berith their god. '
  '34':
  - type: text
    content: And the Israelites did not remember the L
  - type: heading
    content: ord
  - type: text
    content: ' their God, who had rescued them from the hand of all their enemies on every side; '
  '35':
  - type: text
    content: nor did they show kindness to the family of Jerubbaal (
  - type: text
    content: that is,
  - type: text
    content: ' Gideon) in return for all the good that he had done for Israel.'
  '4':
  - type: text
    content: 'So Gideon came to the Jordan and crossed over [the river], he and the three hundred men who were with him—exhausted, yet [still] pursuing [the enemy]. '
  '5':
  - type: text
    content: 'He said to the men of Succoth, “Please give loaves of bread to the people who are following me since they are exhausted, and I am pursuing Zebah and Zalmunna, kings of Midian.” '
  '6':
  - type: text
    content: 'But the leaders of Succoth said, “Are Zebah and Zalmunna already in your hands, that we should give bread to your army?” '
  '7':
  - type: text
    content: Gideon said, “For that [response], when the L
  - type: heading
    content: ord
  - type: text
    content: ' has handed over Zebah and Zalmunna to me, I will thrash your bodies with the thorns and briars of the wilderness.” '
  '8':
  - type: text
    content: 'He went from there up to Penuel and spoke similarly to them; and the men of Penuel answered him just as the men of Succoth had answered. '
  '9':
  - type: text
    content: So Gideon said also to the men of Penuel, “When I come again in peace, I will tear down this tower.”
