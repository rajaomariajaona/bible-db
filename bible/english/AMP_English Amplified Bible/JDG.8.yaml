document_id: JDG.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Zebah and Zalmunna Routed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the men of [the tribe of] Ephraim said to Gideon, “What is this thing that you have done to us, not calling us when you went to fight with Midian?” And they quarreled with him vehemently. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But he said to them, “What have I done now [that is so significant] in comparison with you? Is not the gleaning (leftovers) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the grapes
  - type: text
    text: ' of [your tribe of] Ephraim better than the vintage (entire harvest) of [my clan of] Abiezer? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: God has given the leaders of Midian, Oreb and Zeeb into your hands; and what was I able to do in comparison with you?” Then their anger toward him subsided when he made this statement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Gideon came to the Jordan and crossed over [the river], he and the three hundred men who were with him—exhausted, yet [still] pursuing [the enemy]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He said to the men of Succoth, “Please give loaves of bread to the people who are following me since they are exhausted, and I am pursuing Zebah and Zalmunna, kings of Midian.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But the leaders of Succoth said, “Are Zebah and Zalmunna already in your hands, that we should give bread to your army?” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Gideon said, “For that [response], when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has handed over Zebah and Zalmunna to me, I will thrash your bodies with the thorns and briars of the wilderness.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He went from there up to Penuel and spoke similarly to them; and the men of Penuel answered him just as the men of Succoth had answered. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Gideon said also to the men of Penuel, “When I come again in peace, I will tear down this tower.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now Zebah and Zalmunna were in Karkor with their armies, about fifteen thousand [fighting] men, all who were left of the entire army of the sons of the east; for a hundred and twenty thousand swordsmen had fallen. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Gideon went up by the route of those who lived in tents to the east of Nobah and Jogbehah, and he attacked their camp when the camp was unsuspecting. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When Zebah and Zalmunna fled, he pursued them and captured the two kings of Midian, Zebah and Zalmunna, and terrified the entire army.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Gideon the son of Joash returned from the battle by the ascent of Heres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He captured a young man of Succoth and questioned him. And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the youth
  - type: text
    text: ' wrote down for him [the names of] the leaders of Succoth and its elders, seventy-seven men. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He came to the men of Succoth and said, “Look here, Zebah and Zalmunna, about whom you taunted me, saying, ‘Are Zebah and Zalmunna now in your hand, that we should give bread to your men who are exhausted?’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He took the elders of the city, and thorns of the wilderness and briars, and with them he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: taught them
      - type: text
        text: ' humility. The Hebrew is uncertain.'
    marker-yv: yv-n
  - type: text
    text: 'punished the men of Succoth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He tore down the tower of Penuel and killed the men of the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Gideon said to Zebah and Zalmunna, “What kind of men were they whom you killed at Tabor?” And they replied, “They were like you, each one of them resembled the son of a king.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He said, “They were my brothers, the sons of my mother. As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lives, if only you had let them live, I would not kill you.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So [to humiliate them] Gideon said to Jether his firstborn, “Stand up, and kill them!” But the youth did not draw his sword, because he was afraid, for he was still [just] a boy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Zebah and Zalmunna said, “Rise up yourself and strike us; for as the man is, so is his strength.” So Gideon arose and killed Zebah and Zalmunna, and took the crescent amulets that were on their camels’ necks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the men of Israel said to Gideon, “Rule [as king] over us, both you and your son, also your son’s son, for you have rescued us from the hand of Midian.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But Gideon said to them, “I will not rule over you, and my son will not rule over you; the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall rule over you.” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Gideon said to them, “I would make a request of you, that each one of you give me an earring from his spoil.” For the Midianites had gold earrings, because they were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A general term for the descendants of Keturah, the woman Abraham married after Sarah’s death (Gen 25:1); synonymous with Midianite.
    marker-yv: yv-n
  - type: text
    text: 'Ishmaelites [who customarily wore them]. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They answered, “We will certainly give them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to you
  - type: text
    text: '.” And they spread out a garment, and every one of them threw an earring there from his spoil. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the weight of the golden earrings that he requested was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. about 40 lbs. of gold.
    marker-yv: yv-n
  - type: text
    text: 'seventeen hundred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of gold, apart from the crescent amulets and pendants and the purple garments which were worn by the kings of Midian, and apart from the chains that were on their camels’ necks. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Gideon made [all the golden earrings into] an ephod [a sacred, high priest’s garment], and put it in his city of Ophrah, and all Israel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: played the prostitute with
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'worshiped it as an idol there, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The reason Gideon chose to make the golden ephod is unclear, but the fact that he did so, and that it became an object of worship for Israel, casts a shadow over his otherwise remarkable accomplishments.
    marker-yv: yv-n
  - type: text
    text: it became a trap for Gideon and his household.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Forty Years of Peace
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Midian was subdued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' humbled before the sons of Israel, and they no longer lifted up their heads [in pride]. And the land was at rest for forty years in the days of Gideon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jerubbaal (Gideon) the son of Joash went and lived in his own house. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Now Gideon had seventy sons born to him, because he had many wives. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Perhaps originally one of Gideon’s slaves, this woman became a type of secondary wife who lived at home with her family and was visited on occasion by her husband.
    marker-yv: yv-n
  - type: text
    text: 'concubine who was in Shechem also bore him a son, whom he named Abimelech. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Gideon the son of Joash died at a good advanced age and was buried in the tomb of Joash his father in Ophrah of the Abiezrites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then it came about, as soon as Gideon was dead, that the Israelites again played the prostitute with the Baals, and made Baal-berith their god. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: And the Israelites did not remember the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God, who had rescued them from the hand of all their enemies on every side; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: nor did they show kindness to the family of Jerubbaal (
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is,
  - type: text
    text: ' Gideon) in return for all the good that he had done for Israel.'
