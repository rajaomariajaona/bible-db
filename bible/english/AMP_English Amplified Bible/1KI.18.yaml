    children:
    - type: text
      text: word
  - type: text
    text: ' to all the Israelites and assembled the [pagan] prophets together at Mount Carmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elijah approached all the people and said, “How long will you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:21 '
    - type: usfm
