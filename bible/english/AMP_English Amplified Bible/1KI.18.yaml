verses:
  '1':
  - type: heading
    content: Obadiah Meets Elijah
  - type: text
    content: 'Now it happened after many days that the word of the Lord came to Elijah in the third year, saying, “Go, show yourself to Ahab, and I will send rain on the face of the earth.” '
  '10':
  - type: text
    content: As the L
  - type: heading
    content: ord
  - type: text
    content: ' your God lives, there is no nation or kingdom where my master has not sent '
  - type: text
    content: messengers
  - type: text
    content: ' to seek you; and when they said, ‘He is not here,’ Ahab made the kingdom or nation swear that they had not found you. '
  '11':
  - type: text
    content: 'And now you are saying, ‘Go, tell your master, “Behold, Elijah [is here].” ’ '
  '12':
  - type: text
    content: And as soon as I leave you, the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' will carry you '
  - type: note
    content: Lit where.
  - type: text
    content: to a place I do not know; so when I come to tell Ahab and he does not find you, he will kill me. Yet your servant has [reverently] feared the L
  - type: heading
    content: ord
  - type: text
    content: ' from my youth. '
  '13':
  - type: text
    content: Has it not been told to my lord [Elijah] what I did when Jezebel killed the prophets of the L
  - type: heading
    content: ord
  - type: text
    content: ', how I hid a hundred of the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' prophets by fifties in a cave, and provided them with bread and water? '
  '14':
  - type: text
    content: 'And now you are saying, ‘Go, tell your master, “Elijah is here” ’; and he will kill me.” '
  '15':
  - type: text
    content: Elijah said, “As the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts (armies) lives, before whom I stand, I will certainly show myself to Ahab today.” '
  '16':
  - type: text
    content: So Obadiah went to meet Ahab and told him; and Ahab went to meet Elijah.
  '17':
  - type: text
    content: 'When Ahab saw Elijah, Ahab said to him, “Are you the one who is bringing disaster on Israel?” '
  '18':
  - type: text
    content: 'Elijah said, “I have not brought disaster on Israel, but you and your father’s household '
  - type: text
    content: have,
  - type: text
    content: ' by abandoning (rejecting) the commandments of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and by following the Baals. '
  '19':
  - type: text
    content: 'Now then, send '
  - type: text
    content: word
  - type: text
    content: ' and gather to me all Israel at Mount Carmel, together with the 450 prophets of Baal and the 400 prophets of [the goddess] Asherah, who eat at [Queen] Jezebel’s table.”'
  - type: heading
    content: God or Baal on Mount Carmel
  '2':
  - type: text
    content: 'So Elijah went to show himself to Ahab. Now the famine was severe in Samaria. '
  '20':
  - type: text
    content: 'So Ahab sent '
  - type: text
    content: word
  - type: text
    content: ' to all the Israelites and assembled the [pagan] prophets together at Mount Carmel. '
  '21':
  - type: text
    content: 'Elijah approached all the people and said, “How long will you '
  - type: note
    content: Lit limp on two crutches.
  - type: text
    content: hesitate between two opinions? If the L
  - type: heading
    content: ord
  - type: text
    content: ' is God, follow Him; but if Baal, follow him.” But the people [of Israel] did not answer him [so much as] a word. '
  '22':
  - type: text
    content: Then Elijah said to the people, “I alone remain a prophet of the L
  - type: heading
    content: ord
  - type: text
    content: ', while Baal’s prophets are 450 men. '
  '23':
  - type: text
    content: 'Now let them give us two oxen, and let them choose one ox for themselves and cut it in pieces, and lay it on the wood, but put no fire '
  - type: text
    content: under it
  - type: text
    content: '. I will prepare the other ox and lay it on the wood, and I will not put a fire '
  - type: text
    content: under it
  - type: text
    content: '. '
  '24':
  - type: text
    content: Then you call on the name of your god, and I will call on the name of the L
  - type: heading
    content: ord
  - type: text
    content: ; and the god who answers by fire, He is God.” And all the people answered, “It is well spoken.”
  '25':
  - type: text
    content: 'Elijah said to the prophets of Baal, “Choose one bull for yourselves and prepare it first, since there are many of you; and call on the name of your god, but put no fire '
  - type: text
    content: under it
  - type: text
    content: '.” '
  '26':
  - type: text
    content: 'So they took the bull that was given to them and prepared it, and called on the name of Baal from morning until noon, saying, “O Baal, hear '
  - type: text
    content: and
  - type: text
    content: ' answer us.” But there was no voice and no one answered. And they leaped about the altar which they had made. '
  '27':
  - type: text
    content: 'At noon Elijah mocked them, saying, “Cry out with a loud voice, for he is a god; either he is occupied, or he is out [at the moment], or he is on a journey. Perhaps he is asleep and must be awakened!” '
  '28':
  - type: text
    content: 'So they cried out with a loud voice [to get Baal’s attention] and cut themselves with swords and lances in accordance with their custom, until the blood flowed out on them. '
  '29':
  - type: text
    content: 'As midday passed, they played the part of prophets '
  - type: text
    content: and
  - type: text
    content: ' raved dramatically until the time for offering the '
  - type: text
    content: evening
  - type: text
    content: ' sacrifice; but there was no voice, no one answered, and no one paid attention.'
  '3':
  - type: text
    content: Ahab called Obadiah who was the governor of his house. (Now Obadiah feared the L
  - type: heading
    content: ord
  - type: text
    content: ' greatly; '
  '30':
  - type: text
    content: 'Then Elijah said to all the people, “Come near to me.” So all the people approached him. And he repaired '
  - type: text
    content: and
  - type: text
    content: ' rebuilt the [old] altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ' that had been torn down [by Jezebel]. [1 Kin 18:13; 19:10] '
  '31':
  - type: text
    content: Then Elijah took twelve stones in accordance with the number of the tribes of the sons of Jacob, to whom the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' had come, saying, “Israel shall be your name.” [Gen 32:28] '
  '32':
  - type: text
    content: So with the stones Elijah built an altar in the name of the L
  - type: heading
    content: ord
  - type: text
    content: '. He made a trench around the altar large enough to hold '
  - type: note
    content: I.e. about twenty-two quarts.
  - type: text
    content: 'two measures of seed. '
  '33':
  - type: text
    content: 'Then he laid out the wood and cut the ox in pieces and laid it on the wood. '
  '34':
  - type: text
    content: 'And he said, “Fill four pitchers with water and pour it on the burnt offering and the wood.” And he said, “Do it the second time.” And they did it the second time. And he said, “Do it the third time.” And they did it a third time. '
  '35':
  - type: text
    content: The water flowed around the altar, and he also filled the trench with water.
  - type: heading
    content: Elijah’s Prayer
  '36':
  - type: text
    content: 'At the time of the offering of the '
  - type: text
    content: evening
  - type: text
    content: ' sacrifice, Elijah the prophet approached [the altar] and said, “O L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Abraham, Isaac, and Israel (Jacob), let it be known today that You are God in Israel and that I am Your servant and that I have done all these things at Your word. '
  '37':
  - type: text
    content: Answer me, O L
  - type: heading
    content: ord
  - type: text
    content: ', answer me, so that this people may know that You, O L'
  - type: heading
    content: ord
  - type: text
    content: ', are God, and that You have turned their hearts back [to You].” '
  '38':
  - type: text
    content: Then the fire of the L
  - type: heading
    content: ord
  - type: text
    content: ' fell and consumed the burnt offering and the wood, and '
  - type: text
    content: even
  - type: text
    content: ' the stones and the dust; it also licked up the water in the trench. '
  '39':
  - type: text
    content: When all the people saw it, they fell face downward; and they said, “The L
  - type: heading
    content: ord
  - type: text
    content: ', He is God! The L'
  - type: heading
    content: ord
  - type: text
    content: ', He is God!” '
  '4':
  - type: text
    content: for when Jezebel destroyed the prophets of the L
  - type: heading
    content: ord
  - type: text
    content: ', Obadiah took a hundred prophets and hid them by fifties in a cave, and provided them with bread and water.) '
  '40':
  - type: text
    content: Then Elijah said to them, “Seize the prophets of Baal; do not let one of them escape.” They seized them; and Elijah brought them down to the brook Kishon, and [as God’s law required] killed them there. [Deut 13:5, 12-15; 18:20]
  '41':
  - type: text
    content: 'Now Elijah said to Ahab, “Go up, eat and drink, for there is the sound of the roar '
  - type: text
    content: of an abundance
  - type: text
    content: ' of rain.” '
  '42':
  - type: text
    content: 'So Ahab went up to eat and to drink. And Elijah went up to the top of Carmel; and he crouched down to the earth and put his face between his knees, '
  '43':
  - type: text
    content: 'and he said to his servant, “Go up, look toward the sea.” So he went up and looked and said, “There is nothing.” Elijah said, “Go back” seven times. '
  '44':
  - type: text
    content: 'And at the seventh '
  - type: text
    content: time
  - type: text
    content: ' the servant said, “A cloud as small as a man’s hand is coming up from the sea.” And Elijah said, “Go up, say to Ahab, ‘Prepare '
  - type: text
    content: your chariot
  - type: text
    content: ' and go down, so that the rain shower does not stop you.’ ” '
  '45':
  - type: text
    content: 'In a little while the sky grew dark with clouds and wind, and there were heavy showers. And Ahab mounted '
  - type: text
    content: and
  - type: text
    content: ' rode [his chariot] and went [inland] to '
  - type: note
    content: I.e. the king’s winter home.
  - type: text
    content: 'Jezreel. '
  '46':
  - type: text
    content: Then the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' came upon Elijah [giving him supernatural strength]. He '
  - type: note
    content: This phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things. The commands Gird up your mind or gird up your heart are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.
  - type: text
    content: girded up his loins and outran Ahab to the entrance of Jezreel [nearly twenty miles].
  '5':
  - type: text
    content: 'Then Ahab said to Obadiah, “Go into the land to all the sources of water and to all the streams; perhaps we may find grass and keep the horses and mules alive, and not have to kill some of the cattle.” '
  '6':
  - type: text
    content: 'So they divided the land between them to '
  - type: note
    content: Lit pass through.
  - type: text
    content: survey it. Ahab went one way by himself and Obadiah went another way by himself.
  '7':
  - type: text
    content: 'As Obadiah was on the way, behold, Elijah met him. He recognized him and fell face downward [out of respect] and said, “Is it you, my lord Elijah?” '
  '8':
  - type: text
    content: 'He answered him, “It is I. Go tell your master, ‘Elijah is here.’ ” '
  '9':
  - type: text
    content: 'But he said, “What sin have I committed, that you would hand over your servant to Ahab to put me to death? '
