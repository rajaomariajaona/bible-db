  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elijah said to the prophets of Baal, “Choose one bull for yourselves and prepare it first, since there are many of you; and call on the name of your god, but put no fire '
    - type: usfm
      marker: it
      children:
      - type: text
