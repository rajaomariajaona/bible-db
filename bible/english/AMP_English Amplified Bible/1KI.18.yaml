    children:
    - type: text
      text: '36'
  - type: text
    text: 'At the time of the offering of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: evening
  - type: text
    text: ' sacrifice, Elijah the prophet approached [the altar] and said, “O L'
  - type: usfm
