    - type: text
      text: and
  - type: text
    text: ' rebuilt the [old] altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that had been torn down [by Jezebel]. [1 Kin 18:13; 19:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then Elijah took twelve stones in accordance with the number of the tribes of the sons of Jacob, to whom the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had come, saying, “Israel shall be your name.” [Gen 32:28] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: So with the stones Elijah built an altar in the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. He made a trench around the altar large enough to hold '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. about twenty-two quarts.
    marker-yv: yv-n
  - type: text
    text: 'two measures of seed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then he laid out the wood and cut the ox in pieces and laid it on the wood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And he said, “Fill four pitchers with water and pour it on the burnt offering and the wood.” And he said, “Do it the second time.” And they did it the second time. And he said, “Do it the third time.” And they did it a third time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The water flowed around the altar, and he also filled the trench with water.
- type: usfm
