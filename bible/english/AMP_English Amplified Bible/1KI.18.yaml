  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elijah said to the prophets of Baal, “Choose one bull for yourselves and prepare it first, since there are many of you; and call on the name of your god, but put no fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under it
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So they took the bull that was given to them and prepared it, and called on the name of Baal from morning until noon, saying, “O Baal, hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer us.” But there was no voice and no one answered. And they leaped about the altar which they had made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'At noon Elijah mocked them, saying, “Cry out with a loud voice, for he is a god; either he is occupied, or he is out [at the moment], or he is on a journey. Perhaps he is asleep and must be awakened!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So they cried out with a loud voice [to get Baal’s attention] and cut themselves with swords and lances in accordance with their custom, until the blood flowed out on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'As midday passed, they played the part of prophets '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' raved dramatically until the time for offering the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: evening
  - type: text
    text: ' sacrifice; but there was no voice, no one answered, and no one paid attention.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Elijah said to all the people, “Come near to me.” So all the people approached him. And he repaired '
  - type: usfm
    marker: it
