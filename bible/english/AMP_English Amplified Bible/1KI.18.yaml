    marker-yv: yv-n
  - type: text
    text: survey it. Ahab went one way by himself and Obadiah went another way by himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As Obadiah was on the way, behold, Elijah met him. He recognized him and fell face downward [out of respect] and said, “Is it you, my lord Elijah?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He answered him, “It is I. Go tell your master, ‘Elijah is here.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But he said, “What sin have I committed, that you would hand over your servant to Ahab to put me to death? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God lives, there is no nation or kingdom where my master has not sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: messengers
  - type: text
    text: ' to seek you; and when they said, ‘He is not here,’ Ahab made the kingdom or nation swear that they had not found you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And now you are saying, ‘Go, tell your master, “Behold, Elijah [is here].” ’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
