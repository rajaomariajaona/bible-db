  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took the bull that was given to them and prepared it, and called on the name of Baal from morning until noon, saying, “O Baal, hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
