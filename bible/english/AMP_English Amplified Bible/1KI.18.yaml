  - type: text
    text: 'Now it happened after many days that the word of the Lord came to Elijah in the third year, saying, “Go, show yourself to Ahab, and I will send rain on the face of the earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Elijah went to show himself to Ahab. Now the famine was severe in Samaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ahab called Obadiah who was the governor of his house. (Now Obadiah feared the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' greatly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: for when Jezebel destroyed the prophets of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', Obadiah took a hundred prophets and hid them by fifties in a cave, and provided them with bread and water.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Ahab said to Obadiah, “Go into the land to all the sources of water and to all the streams; perhaps we may find grass and keep the horses and mules alive, and not have to kill some of the cattle.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So they divided the land between them to '
  - type: usfm
