  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At noon Elijah mocked them, saying, “Cry out with a loud voice, for he is a god; either he is occupied, or he is out [at the moment], or he is on a journey. Perhaps he is asleep and must be awakened!” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they cried out with a loud voice [to get Baal’s attention] and cut themselves with swords and lances in accordance with their custom, until the blood flowed out on them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As midday passed, they played the part of prophets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' raved dramatically until the time for offering the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evening
    - type: text
      text: ' sacrifice; but there was no voice, no one answered, and no one paid attention.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahab called Obadiah who was the governor of his house. (Now Obadiah feared the L
    - type: usfm
