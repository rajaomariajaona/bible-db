  - type: text
    text: hesitate between two opinions? If the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is God, follow Him; but if Baal, follow him.” But the people [of Israel] did not answer him [so much as] a word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then Elijah said to the people, “I alone remain a prophet of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', while Baal’s prophets are 450 men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now let them give us two oxen, and let them choose one ox for themselves and cut it in pieces, and lay it on the wood, but put no fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under it
  - type: text
    text: '. I will prepare the other ox and lay it on the wood, and I will not put a fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under it
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then you call on the name of your god, and I will call on the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and the god who answers by fire, He is God.” And all the people answered, “It is well spoken.”
- type: usfm
