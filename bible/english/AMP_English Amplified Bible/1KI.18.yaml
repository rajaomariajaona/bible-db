  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: When all the people saw it, they fell face downward; and they said, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', He is God! The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', He is God!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Then Elijah said to them, “Seize the prophets of Baal; do not let one of them escape.” They seized them; and Elijah brought them down to the brook Kishon, and [as God’s law required] killed them there. [Deut 13:5, 12-15; 18:20]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Now Elijah said to Ahab, “Go up, eat and drink, for there is the sound of the roar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of an abundance
  - type: text
    text: ' of rain.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So Ahab went up to eat and to drink. And Elijah went up to the top of Carmel; and he crouched down to the earth and put his face between his knees, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'and he said to his servant, “Go up, look toward the sea.” So he went up and looked and said, “There is nothing.” Elijah said, “Go back” seven times. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And at the seventh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: time
  - type: text
    text: ' the servant said, “A cloud as small as a man’s hand is coming up from the sea.” And Elijah said, “Go up, say to Ahab, ‘Prepare '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your chariot
  - type: text
    text: ' and go down, so that the rain shower does not stop you.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'In a little while the sky grew dark with clouds and wind, and there were heavy showers. And Ahab mounted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rode [his chariot] and went [inland] to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
