        children:
        - type: text
          text: where
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: to a place I do not know; so when I come to tell Ahab and he does not find you, he will kill me. Yet your servant has [reverently] feared the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' from my youth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Has it not been told to my lord [Elijah] what I did when Jezebel killed the prophets of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
