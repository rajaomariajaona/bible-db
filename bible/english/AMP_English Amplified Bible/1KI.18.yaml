        children:
        - type: text
          text: '18:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things. The commands '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Gird up your mind
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: gird up your heart
        - type: text
          text: ' are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.'
      marker-yv: yv-n
    - type: text
      text: girded up his loins and outran Ahab to the entrance of Jezreel [nearly twenty miles].
