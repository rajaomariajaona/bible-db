  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' prophets by fifties in a cave, and provided them with bread and water? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And now you are saying, ‘Go, tell your master, “Elijah is here” ’; and he will kill me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elijah said, “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts (armies) lives, before whom I stand, I will certainly show myself to Ahab today.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Obadiah went to meet Ahab and told him; and Ahab went to meet Elijah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Ahab saw Elijah, Ahab said to him, “Are you the one who is bringing disaster on Israel?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elijah said, “I have not brought disaster on Israel, but you and your father’s household '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have,
  - type: text
    text: ' by abandoning (rejecting) the commandments of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and by following the Baals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now then, send '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' and gather to me all Israel at Mount Carmel, together with the 450 prophets of Baal and the 400 prophets of [the goddess] Asherah, who eat at [Queen] Jezebel’s table.”'
