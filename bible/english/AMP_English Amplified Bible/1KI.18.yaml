      text: Then Elijah said to them, “Seize the prophets of Baal; do not let one of them escape.” They seized them; and Elijah brought them down to the brook Kishon, and [as God’s law required] killed them there. [Deut 13:5, 12-15; 18:20]
  '41':
  - type: usfm
