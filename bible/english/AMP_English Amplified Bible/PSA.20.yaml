verses:
  '1':
  - type: heading
    content: Psalm 20
  - type: heading
    content: Prayer for Victory over Enemies.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: ' '
  - type: note
    content: Verses 1-5, 9 is the prayer of intercession voiced by the congregation before David goes into battle.
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' answer you (David) in the day of trouble!'
  - type: text
    content: 'May the name of the God of Jacob set you '
  - type: text
    content: securely
  - type: text
    content: ' on high [and defend you in battle]!'
  '2':
  - type: text
    content: May He send you help from the sanctuary (His dwelling place)
  - type: text
    content: 'And support '
  - type: text
    content: and
  - type: text
    content: ' strengthen you from Zion!'
  '3':
  - type: text
    content: May He remember all your meal offerings
  - type: text
    content: 'And accept your burnt offering. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: ¶May He grant you your heart’s desire
  - type: text
    content: And fulfill all your plans.
  '5':
  - type: text
    content: We will sing joyously over your victory,
  - type: text
    content: And in the name of our God we will set up our banners.
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' fulfill all your petitions.'
  '6':
  - type: text
    content: ¶Now I know that the L
  - type: heading
    content: ord
  - type: text
    content: ' saves His anointed;'
  - type: text
    content: He will answer him from His holy heaven
  - type: text
    content: With the saving strength of His right hand.
  '7':
  - type: text
    content: 'Some '
  - type: text
    content: trust
  - type: text
    content: ' in chariots and some in horses,'
  - type: text
    content: 'But we will remember '
  - type: text
    content: and
  - type: text
    content: ' trust in the name of the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God.'
  '8':
  - type: text
    content: They have bowed down and fallen,
  - type: text
    content: But we have risen and stood upright.
  '9':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', save [the '
  - type: note
    content: I.e. David.
  - type: text
    content: king];
  - type: text
    content: 'May the '
  - type: note
    content: I.e. Lord.
  - type: text
    content: King answer us in the day we call.
