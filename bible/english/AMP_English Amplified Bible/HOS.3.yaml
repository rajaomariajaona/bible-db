verses:
  '1':
  - type: heading
    content: Hosea’s Second Symbolic Marriage
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Go again, love a woman ('
  - type: note
    content: The ambiguous wording might be interpreted as referring to a different woman, but this time Hosea is told only to love her, not to take, i.e. marry her. Also, the application of the symbolism to God’s relationship with Israel seems to depend upon the woman’s being Gomer. The purpose of the ambiguities probably is to reflect the emotional estrangement between Hosea and Gomer and the contempt that she deserved for her behavior. Matthew’s anonymous reference to Bathsheba literally as “wife of Uriah” (Matt 1:6).
  - type: text
    content: Gomer) who is beloved by her husband and yet is an adulteress, even as the L
  - type: heading
    content: ord
  - type: text
    content: ' loves the '
  - type: note
    content: See note 1:10.
  - type: text
    content: 'children of Israel, though they turn to other gods and love the raisin cakes [used in the feasts in pagan worship].” '
  '2':
  - type: text
    content: 'So I bought her for myself for '
  - type: note
    content: Hosea bought Gomer back after she had become a slave. The silver and barley together totaled about thirty pieces of silver. See Ex 21:7, 32; 2 Kin 7:1, 16, 18.
  - type: text
    content: 'fifteen pieces of silver and a homer and a half of barley [the price of a common slave]. '
  '3':
  - type: text
    content: 'And I said to her, “You shall stay with me for many days. You shall not play the prostitute nor shall you have a man; so I will also be toward you [until you have proved your faithfulness].” '
  '4':
  - type: text
    content: 'For the sons of Israel will remain for many days without king or prince, without sacrifice or [idolatrous] pillar, and without '
  - type: note
    content: A garment worn by priests when seeking divine counsel.
  - type: text
    content: 'ephod or teraphim (household idols). '
  '5':
  - type: text
    content: Afterward the sons of Israel will return [in deep repentance] and seek the L
  - type: heading
    content: ord
  - type: text
    content: ' their God and [seek from the line of] David their king [the King of kings—the Messiah]; and they will come trembling to the L'
  - type: heading
    content: ord
  - type: text
    content: ' and to His goodness '
  - type: text
    content: and
  - type: text
    content: ' blessing in the last days. [Jer 30:9; Ezek 34:24]'
