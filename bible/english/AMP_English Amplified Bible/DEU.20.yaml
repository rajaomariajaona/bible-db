document_id: DEU.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws of Warfare
  - type: text
    content: “When you go out to battle against your enemies and see horses and chariots and people more numerous than you, do not be afraid of them; for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, who brought you up from the land of Egypt, is with you. '
  '10':
  - type: text
    content: '“When you advance to a city to fight against it, you shall [first] offer it terms of peace. '
  '11':
  - type: text
    content: 'If that city accepts your terms of peace and opens '
  - type: text
    content: its gates
  - type: text
    content: ' to you, then all the people who are found in it shall become your forced labor and shall serve you. '
  '12':
  - type: text
    content: 'However, if it does not make peace with you, but makes war against you, then you shall lay siege to it. '
  '13':
  - type: text
    content: When the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives it into your hand, you shall strike down all the men in it with the edge of the sword. '
  '14':
  - type: text
    content: Only the women and the children and the animals and everything that is in the city, all its spoil, you shall take as plunder for yourself; and you shall use the spoil of your enemies which the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has given you. '
  '15':
  - type: text
    content: 'That is what you shall do to all the cities that are very far away from you, which are not among the cities of these nations nearby [which you are to dispossess]. '
  '16':
  - type: text
    content: Only in the cities of these peoples that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is giving you as an inheritance, you shall not leave alive anything that breathes. '
  '17':
  - type: text
    content: But you shall utterly destroy them, the Hittite, the Amorite, the Canaanite, the Perizzite, the Hivite and the Jebusite, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has commanded you, '
  '18':
  - type: text
    content: so that they will not teach you to act in accordance with all the detestable practices which they have done [in worship and service] for their gods, and in this way cause you to sin against the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: '“When you besiege a city for '
  - type: note
    content: Lit many days.
  - type: text
    content: 'a long time, making war against it in order to capture it, you shall not destroy its [fruit-bearing] trees by swinging an axe against them; for you may eat from them, and you shall not cut them down. For is the tree of the field a man, that it should be besieged (destroyed) by you? '
  '2':
  - type: text
    content: 'When you approach the battle, the priest shall come forward and speak to the people, '
  '20':
  - type: text
    content: 'Only the trees which you know are not '
  - type: note
    content: Lit trees for eating.
  - type: text
    content: 'fruit trees shall you destroy and cut down, so that you may build '
  - type: note
    content: I.e. battering rams, ladders, towers, etc.
  - type: text
    content: siegeworks against the city that is making war with you until it falls.
  '3':
  - type: text
    content: 'and shall say to them, ‘Hear, O Israel: you are advancing today to battle against your enemies. Do not lack courage. Do not be afraid, or panic, or tremble [in terror] before them, '
  '4':
  - type: text
    content: for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God is He who goes with you, to fight for you against your enemies, to save you.’ [1 Sam 17:45] '
  '5':
  - type: text
    content: 'The officers shall also speak to the '
  - type: note
    content: Lit people and so throughout.
  - type: text
    content: 'soldiers, saying, ‘What man is there who has built a new house and has not yet '
  - type: note
    content: I.e. to the temple. The rabbis said that ownership of a house was required for dedication. Here, dedication seems to have established ownership when the original owner died.
  - type: text
    content: 'dedicated it? '
  - type: note
    content: The point of the admonitions in vv 5-8 is that with the Lord’s help, Israel would have no need of a large military force, and the officers could afford to dismiss anyone who was not completely prepared for battle.
  - type: text
    content: 'Let him go and return to his house, otherwise he might die in the battle and another man would dedicate it. '
  '6':
  - type: text
    content: 'What man has planted a vineyard and has not put it to use [harvesting its fruit]? Let him go and return to his house, otherwise he might die in the battle and another man would begin to use its fruit. '
  '7':
  - type: text
    content: 'And who is the man who is engaged (legally promised) to a woman and has not married her? Let him go and return to his house, otherwise he might die in the battle and another man would marry her.’ '
  '8':
  - type: text
    content: 'Then the officers shall speak further to the soldiers and say, ‘Who is the man who is afraid and lacks courage? Let him go and return to his house, so that he does not cause his brothers’ courage to fail like his own.’ '
  '9':
  - type: text
    content: And it shall be when the officers have finished speaking to the soldiers, they shall appoint commanders of armies over them.
