document_id: DEU.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Laws of Warfare
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “When you go out to battle against your enemies and see horses and chariots and people more numerous than you, do not be afraid of them; for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who brought you up from the land of Egypt, is with you. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When you approach the battle, the priest shall come forward and speak to the people, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and shall say to them, ‘Hear, O Israel: you are advancing today to battle against your enemies. Do not lack courage. Do not be afraid, or panic, or tremble [in terror] before them, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is He who goes with you, to fight for you against your enemies, to save you.’ [1 Sam 17:45] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The officers shall also speak to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: people
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'soldiers, saying, ‘What man is there who has built a new house and has not yet '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. to the temple. The rabbis said that ownership of a house was required for dedication. Here, dedication seems to have established ownership when the original owner died.
    marker-yv: yv-n
  - type: text
    text: 'dedicated it? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The point of the admonitions in vv 5-8 is that with the Lord’s help, Israel would have no need of a large military force, and the officers could afford to dismiss anyone who was not completely prepared for battle.
    marker-yv: yv-n
  - type: text
    text: 'Let him go and return to his house, otherwise he might die in the battle and another man would dedicate it. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'What man has planted a vineyard and has not put it to use [harvesting its fruit]? Let him go and return to his house, otherwise he might die in the battle and another man would begin to use its fruit. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And who is the man who is engaged (legally promised) to a woman and has not married her? Let him go and return to his house, otherwise he might die in the battle and another man would marry her.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the officers shall speak further to the soldiers and say, ‘Who is the man who is afraid and lacks courage? Let him go and return to his house, so that he does not cause his brothers’ courage to fail like his own.’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And it shall be when the officers have finished speaking to the soldiers, they shall appoint commanders of armies over them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“When you advance to a city to fight against it, you shall [first] offer it terms of peace. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If that city accepts your terms of peace and opens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: its gates
  - type: text
    text: ' to you, then all the people who are found in it shall become your forced labor and shall serve you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'However, if it does not make peace with you, but makes war against you, then you shall lay siege to it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives it into your hand, you shall strike down all the men in it with the edge of the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Only the women and the children and the animals and everything that is in the city, all its spoil, you shall take as plunder for yourself; and you shall use the spoil of your enemies which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'That is what you shall do to all the cities that are very far away from you, which are not among the cities of these nations nearby [which you are to dispossess]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Only in the cities of these peoples that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is giving you as an inheritance, you shall not leave alive anything that breathes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But you shall utterly destroy them, the Hittite, the Amorite, the Canaanite, the Perizzite, the Hivite and the Jebusite, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has commanded you, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: so that they will not teach you to act in accordance with all the detestable practices which they have done [in worship and service] for their gods, and in this way cause you to sin against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“When you besiege a city for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: many days
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a long time, making war against it in order to capture it, you shall not destroy its [fruit-bearing] trees by swinging an axe against them; for you may eat from them, and you shall not cut them down. For is the tree of the field a man, that it should be besieged (destroyed) by you? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Only the trees which you know are not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: trees for eating
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fruit trees shall you destroy and cut down, so that you may build '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. battering rams, ladders, towers, etc.
    marker-yv: yv-n
  - type: text
    text: siegeworks against the city that is making war with you until it falls.
