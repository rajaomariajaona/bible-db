    marker-yv: yv-n
  - type: text
    text: set an octave below. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Save '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rescue, L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for godly people cease to be,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the faithful vanish from among the sons of men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They speak deceitful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless words to one another;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With flattering lips and a double heart they speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: May the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' cut off all flattering lips,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The tongue that speaks great things [in boasting];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who have said, “With our tongue we will prevail;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Our lips are our own; who is lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' master over us?”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Because of the devastation of the afflicted, because of the groaning of the needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I will arise,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; “I will place him in the safety for which he longs.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '¶The words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' promises of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' are pure words,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like silver refined in an earthen furnace, purified seven times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', will preserve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will protect him from this [evil] generation forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wicked strut about [in pompous self-importance] on every side,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As vileness is exalted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' baseness is prized among the sons of men.'
