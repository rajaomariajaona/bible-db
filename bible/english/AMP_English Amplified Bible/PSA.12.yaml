document_id: PSA.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God, a Helper against the Treacherous.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or possibly '
        - type: usfm
          marker: it
          children:
          - type: text
            text: on the eight-stringed lyre;
        - type: text
          text: ' meaning uncertain.'
      marker-yv: yv-n
    - type: text
      text: set an octave below. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' help '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rescue, L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for godly people cease to be,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the faithful vanish from among the sons of men.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They speak deceitful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless words to one another;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With flattering lips and a double heart they speak.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' cut off all flattering lips,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tongue that speaks great things [in boasting];
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who have said, “With our tongue we will prevail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Our lips are our own; who is lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' master over us?”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the devastation of the afflicted, because of the groaning of the needy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I will arise,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; “I will place him in the safety for which he longs.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶The words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promises of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' are pure words,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like silver refined in an earthen furnace, purified seven times.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', will preserve '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' keep them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will protect him from this [evil] generation forever.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked strut about [in pompous self-importance] on every side,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As vileness is exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' baseness is prized among the sons of men.'
