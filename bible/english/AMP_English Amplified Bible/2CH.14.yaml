document_id: 2CH.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa Succeeds Abijah in Judah
  - type: text
    content: ' '
  - type: note
    content: Ch 13:23 in Hebrew.
  - type: text
    content: So Abijah slept with his fathers [in death], and they buried him in the City of David; and Asa his son became king in his place. The land was at peace for ten years during his days.
  '10':
  - type: text
    content: 'Then Asa went out against him, and they drew up in battle formation in the Valley of Zephathah at Mareshah. '
  '11':
  - type: text
    content: Asa called out to the L
  - type: heading
    content: ord
  - type: text
    content: ' his God, saying, “O L'
  - type: heading
    content: ord
  - type: text
    content: ', there is no one besides You to help '
  - type: text
    content: in the battle
  - type: text
    content: ' between the powerful and the weak; so help us, O L'
  - type: heading
    content: ord
  - type: text
    content: ' our God, for we trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on You, and in Your name we have come against this multitude. O L'
  - type: heading
    content: ord
  - type: text
    content: ', You are our God; let not man prevail against You.” '
  '12':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' struck the Ethiopians [with defeat] before Asa and Judah, and the Ethiopians fled. '
  '13':
  - type: text
    content: 'Asa and the people who were with him pursued them as far as '
  - type: note
    content: An ancient Philistine town, today probably the modern Wadi-el Jerdr located in south-central Israel. Abraham and Isaac each stayed at Gerar (Gen 20:1; 26:1).
  - type: text
    content: 'Gerar; and so many Ethiopians fell that none of them '
  - type: text
    content: were found
  - type: text
    content: ' alive; for they were destroyed before the L'
  - type: heading
    content: ord
  - type: text
    content: ' and His army. And they carried away a very large amount of spoil. '
  '14':
  - type: text
    content: 'They attacked '
  - type: text
    content: and
  - type: text
    content: ' destroyed all the cities around Gerar, for the dread of the L'
  - type: heading
    content: ord
  - type: text
    content: ' had fallen on them. They plundered all the cities, for there was a large amount of spoil in them. '
  '15':
  - type: text
    content: They also struck down the people [living] in tents who had livestock, and took captive large numbers of sheep and camels. Then they returned to Jerusalem.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ch 14:1 in Hebrew.
  - type: text
    content: Asa did what was good and right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' his God. '
  '3':
  - type: text
    content: 'He removed the foreign altars and high places and tore down the [pagan] pillars (obelisks, memorial stones), and cut to pieces the Asherim [the symbols of the goddess Asherah]. '
  '4':
  - type: text
    content: And he commanded Judah to seek the L
  - type: heading
    content: ord
  - type: text
    content: ' God of their fathers [to inquire of and for Him and seek Him as a vital necessity], and to observe the law [given to Moses] and the commandment. '
  '5':
  - type: text
    content: 'Asa also removed the [idolatrous] high places and the incense altars from all the cities of Judah. The kingdom was at rest '
  - type: text
    content: and
  - type: text
    content: ' undisturbed under his reign. '
  '6':
  - type: text
    content: He built fortified cities in Judah, since the land was at rest, and there was no one at war with him in those years, because the L
  - type: heading
    content: ord
  - type: text
    content: ' had given him rest. '
  '7':
  - type: text
    content: So he said to Judah, “Let us build these cities and surround them with walls, towers, gates and bars [to secure the doors]. The land is still ours because we have sought the L
  - type: heading
    content: ord
  - type: text
    content: ' our God; we have sought Him [longing for Him with all our heart] and He has given us peace on every side.” So they built and prospered. '
  '8':
  - type: text
    content: Now Asa had an army of 300,000 men from Judah, who carried large shields and spears, and 280,000 from Benjamin, who carried shields and drew bows, all courageous men.
  '9':
  - type: text
    content: 'Now Zerah the Ethiopian (Cushite) came out against Judah with an army of a million men and three hundred chariots, and he came as far as Mareshah. '
