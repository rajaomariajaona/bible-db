document_id: 2CH.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asa Succeeds Abijah in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 13:23 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: So Abijah slept with his fathers [in death], and they buried him in the City of David; and Asa his son became king in his place. The land was at peace for ten years during his days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ch 14:1 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: Asa did what was good and right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He removed the foreign altars and high places and tore down the [pagan] pillars (obelisks, memorial stones), and cut to pieces the Asherim [the symbols of the goddess Asherah]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And he commanded Judah to seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of their fathers [to inquire of and for Him and seek Him as a vital necessity], and to observe the law [given to Moses] and the commandment. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Asa also removed the [idolatrous] high places and the incense altars from all the cities of Judah. The kingdom was at rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' undisturbed under his reign. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He built fortified cities in Judah, since the land was at rest, and there was no one at war with him in those years, because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had given him rest. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So he said to Judah, “Let us build these cities and surround them with walls, towers, gates and bars [to secure the doors]. The land is still ours because we have sought the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God; we have sought Him [longing for Him with all our heart] and He has given us peace on every side.” So they built and prospered. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now Asa had an army of 300,000 men from Judah, who carried large shields and spears, and 280,000 from Benjamin, who carried shields and drew bows, all courageous men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now Zerah the Ethiopian (Cushite) came out against Judah with an army of a million men and three hundred chariots, and he came as far as Mareshah. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Asa went out against him, and they drew up in battle formation in the Valley of Zephathah at Mareshah. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Asa called out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God, saying, “O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', there is no one besides You to help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the battle
  - type: text
    text: ' between the powerful and the weak; so help us, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, for we trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on You, and in Your name we have come against this multitude. O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You are our God; let not man prevail against You.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck the Ethiopians [with defeat] before Asa and Judah, and the Ethiopians fled. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Asa and the people who were with him pursued them as far as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ancient Philistine town, today probably the modern Wadi-el Jerdr located in south-central Israel. Abraham and Isaac each stayed at Gerar (Gen 20:1; 26:1).
    marker-yv: yv-n
  - type: text
    text: 'Gerar; and so many Ethiopians fell that none of them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were found
  - type: text
    text: ' alive; for they were destroyed before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and His army. And they carried away a very large amount of spoil. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed all the cities around Gerar, for the dread of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had fallen on them. They plundered all the cities, for there was a large amount of spoil in them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They also struck down the people [living] in tents who had livestock, and took captive large numbers of sheep and camels. Then they returned to Jerusalem.
