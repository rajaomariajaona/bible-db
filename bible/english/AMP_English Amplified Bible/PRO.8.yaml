document_id: PRO.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Commendation of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Does not wisdom call,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And understanding lift up her voice?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Take my instruction rather than [seeking] silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take knowledge rather than choicest gold,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For wisdom is better than rubies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all desirable things cannot compare with her. [Job 28:15; Ps 19:10; 119:127]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ¶“I, [godly] wisdom, reside with prudence [good judgment, moral courage and astute common sense],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I find knowledge and discretion. [James 1:5]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“The [reverent] fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshipful awe of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: includes
    - type: text
      text: ' the hatred of evil;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pride and arrogance and the evil way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the perverted mouth, I hate.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Counsel is mine and sound wisdom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am understanding, power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strength are mine.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “By me kings reign
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And rulers decide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decree justice. [Dan 2:21; Rom 13:1]'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “By me princes rule, and nobles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All who judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' govern rightly.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “I love those who love me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And those who seek me early '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' diligently will find me. [1 Sam 2:30; Ps 91:14; John 14:21; James 1:5]'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Riches and honor are with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enduring wealth and righteousness (right standing with God). [Prov 3:16; Matt 6:33]
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “My fruit is better than gold, even pure gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my yield is better than choicest silver.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: On the top of the heights beside the way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where the paths meet, wisdom takes her stand;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “I, [Wisdom, continuously] walk in the way of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the midst of the paths of justice,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'That I may cause those who love me to inherit wealth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' true riches,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that I may fill their treasuries.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ¶“The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' created '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' possessed me at the beginning of His way,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before His works of old [were accomplished].
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“From everlasting I was established '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ordained,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the beginning, before the earth existed, [I, godly wisdom, existed]. [John 1:1; 1 Cor 1:24]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “When there were no ocean depths I was born,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When there were no fountains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' springs overflowing with water.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “Before the mountains were settled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the hills, I was born; [Job 15:7, 8]
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: While He had not yet made the earth and the fields,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the first of the dust of the earth.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “When He established the heavens, I [Wisdom] was there;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When He drew a circle upon the face of the deep,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When He made firm the skies above,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the fountains and springs of the deep became fixed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strong,'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When He set for the sea its boundary
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that the waters would not transgress [the boundaries set by] His command,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When He marked out the foundations of the earth— [Job 38:10, 11; Ps 104:6-9; Jer 5:22]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Beside the gates, at the entrance to the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At the entrance of the doors, she cries out:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then I was beside Him, as a master craftsman;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I was daily His delight;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejoicing before Him always, [Matt 3:17; John 1:2, 18]
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Rejoicing in the world, His inhabited earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And having my delight in the sons of men. [Ps 16:3]
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ¶“Now therefore, O sons, listen to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For blessed [happy, prosperous, to be admired] are they who keep my ways. [Ps 119:1, 2; 128:1, 2; Luke 11:28]
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “Heed (pay attention to) instruction and be wise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And do not ignore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' neglect it.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “Blessed [happy, prosperous, to be admired] is the man who listens to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watching daily at my gates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Waiting at my doorposts.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: “For whoever finds me (Wisdom) finds life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And obtains favor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grace from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“But he who fails to find me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' sins against me injures himself;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All those who hate me love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' court death.”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “To you, O men, I call,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my voice is directed to the sons of men.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“O you naive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' inexperienced [who are easily misled], understand prudence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seek astute common sense;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, O you [closed-minded, self-confident] fools, understand wisdom [seek the insight and self-discipline that leads to godly living]. [Is 32:6]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Listen, for I will speak excellent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noble things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the opening of my lips '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will reveal
    - type: text
      text: ' right things.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “For my mouth will utter truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And wickedness is repulsive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathsome to my lips.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “All the words of my mouth are in righteousness (upright, in right standing with God);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is nothing contrary to truth or perverted (crooked) in them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “They are all straightforward to him who understands [with an open and willing mind],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And right to those who find knowledge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' live by it.'
