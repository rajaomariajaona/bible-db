document_id: JOB.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job’s Life Seems Futile
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Is not man forced to labor on earth?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And are not his days like the days of a hired man?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “He will not return again to his house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will his place know about him anymore.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ¶“Therefore I will not restrain my mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will speak in the anguish of my spirit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will complain in the bitterness of my soul [O Lord].
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Am I the sea, or the sea monster,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That You set a guard over me?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “When I say, ‘My bed will comfort me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My couch will ease my complaint,’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then You frighten me with dreams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And terrify me through visions,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So that I would choose suffocation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Death rather than my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bones
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: pain.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“I waste away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loathe my life; I will not live forever.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me alone, for my days are but a breath [futile and without substance].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “What is man that You [should] magnify him [and think him important]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that You are concerned about him? [Ps 8:4]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “And that You examine him every morning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And try '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' test him every moment?'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Will You never turn Your gaze away from me [it plagues me],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor let me alone until I swallow my spittle?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “As a slave earnestly longs for the shade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as a hired man eagerly awaits his wages,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “If I have sinned, what [harm] have I done to You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Watcher of mankind?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have You set me as a target for You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that I am a burden to myself?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Why then do You not pardon my transgression
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And take away my sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For now I will lie down in the dust;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You will seek me [diligently], but I will not be.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So am I allotted months of futility '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffering,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [long] nights of trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misery are appointed to me.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “When I lie down I say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘When shall I arise [and the night be gone]?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the night continues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I am continually tossing until the dawning of day.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “My body is clothed with worms and a crust of dust;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My skin is hardened [and broken and loathsome], and [breaks out and] runs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “My days are swifter than a weaver’s shuttle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And are spent without hope.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶“Remember that my life is but breath [a puff of wind, a sigh];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eye will not see good again.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “The eye of him who sees me [now] will see me no more;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be
    - type: text
      text: ' upon me, but I will not be.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “As a cloud vanishes and is gone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he who goes down to Sheol (the nether world, the place of the dead) does not come up.
