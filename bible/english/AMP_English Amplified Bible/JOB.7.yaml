  '1':
  - type: heading
    content: Job’s Life Seems Futile
  - type: text
    content: “Is not man forced to labor on earth?
  - type: text
    content: And are not his days like the days of a hired man?
  '10':
  - type: text
    content: “He will not return again to his house,
  - type: text
    content: Nor will his place know about him anymore.
  '11':
  - type: text
    content: ¶“Therefore I will not restrain my mouth;
  - type: text
    content: I will speak in the anguish of my spirit,
  - type: text
    content: I will complain in the bitterness of my soul [O Lord].
  '12':
  - type: text
    content: “Am I the sea, or the sea monster,
  - type: text
    content: That You set a guard over me?
  '13':
  - type: text
    content: “When I say, ‘My bed will comfort me,
  - type: text
    content: My couch will ease my complaint,’
  '14':
  - type: text
    content: Then You frighten me with dreams
  - type: text
    content: And terrify me through visions,
  '15':
  - type: text
    content: So that I would choose suffocation,
  - type: text
    content: 'Death rather than my '
  - type: note
    content: Lit bones.
  - type: text
    content: pain.
  '16':
  - type: text
    content: '“I waste away '
  - type: text
    content: and
  - type: text
    content: ' loathe my life; I will not live forever.'
  - type: text
    content: Let me alone, for my days are but a breath [futile and without substance].
  '17':
  - type: text
    content: “What is man that You [should] magnify him [and think him important]?
  - type: text
    content: And that You are concerned about him? [Ps 8:4]
  '18':
  - type: text
    content: “And that You examine him every morning
  - type: text
    content: 'And try '
  - type: text
    content: and
  - type: text
    content: ' test him every moment?'
  '19':
  - type: text
    content: “Will You never turn Your gaze away from me [it plagues me],
  - type: text
    content: Nor let me alone until I swallow my spittle?
  '2':
  - type: text
    content: “As a slave earnestly longs for the shade,
  - type: text
    content: And as a hired man eagerly awaits his wages,
  '20':
  - type: text
    content: “If I have sinned, what [harm] have I done to You,
  - type: text
    content: O Watcher of mankind?
  - type: text
    content: Why have You set me as a target for You,
  - type: text
    content: So that I am a burden to myself?
  '21':
  - type: text
    content: “Why then do You not pardon my transgression
  - type: text
    content: 'And take away my sin '
  - type: text
    content: and
  - type: text
    content: ' guilt?'
  - type: text
    content: For now I will lie down in the dust;
  - type: text
    content: And You will seek me [diligently], but I will not be.”
  '3':
  - type: text
    content: 'So am I allotted months of futility '
  - type: text
    content: and
  - type: text
    content: ' suffering,'
  - type: text
    content: 'And [long] nights of trouble '
  - type: text
    content: and
  - type: text
    content: ' misery are appointed to me.'
  '4':
  - type: text
    content: “When I lie down I say,
  - type: text
    content: ‘When shall I arise [and the night be gone]?’
  - type: text
    content: But the night continues,
  - type: text
    content: And I am continually tossing until the dawning of day.
  '5':
  - type: text
    content: “My body is clothed with worms and a crust of dust;
  - type: text
    content: My skin is hardened [and broken and loathsome], and [breaks out and] runs.
  '6':
  - type: text
    content: “My days are swifter than a weaver’s shuttle,
  - type: text
    content: And are spent without hope.
  '7':
  - type: text
    content: ¶“Remember that my life is but breath [a puff of wind, a sigh];
  - type: text
    content: My eye will not see good again.
  '8':
  - type: text
    content: “The eye of him who sees me [now] will see me no more;
  - type: text
    content: 'Your eyes '
  - type: text
    content: will be
  - type: text
    content: ' upon me, but I will not be.'
  '9':
  - type: text
    content: “As a cloud vanishes and is gone,
  - type: text
    content: So he who goes down to Sheol (the nether world, the place of the dead) does not come up.
