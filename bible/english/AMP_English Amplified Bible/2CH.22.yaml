document_id: 2CH.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaziah Succeeds Jehoram in Judah
  - type: text
    content: 'Then the inhabitants of Jerusalem made Ahaziah, his youngest son, king in his place, because the band of men (raiders) who came with the Arabs to the camp had killed all the older '
  - type: text
    content: sons
  - type: text
    content: '. So Ahaziah the son of Jehoram king of Judah began to reign. '
  '10':
  - type: text
    content: 'Now when Athaliah the mother of Ahaziah saw that her son was dead, she rose and destroyed all the royal family of the house of Judah. '
  '11':
  - type: text
    content: 'But Jehoshabeath, the king’s daughter, took Joash the [infant] son of Ahaziah and stole him away from among the king’s sons who were being put to death, and she placed him and his nurse in the bedroom. So Jehoshabeath, the daughter of King Jehoram [of Judah] and wife of Jehoiada the priest, hid Joash from [his grandmother] Athaliah so that she did not murder him (for Jehoshabeath was the sister of Ahaziah). '
  '12':
  - type: text
    content: Joash was hidden with them in the house (temple) of God for six years, and Athaliah reigned over the land.
  '2':
  - type: text
    content: 'Ahaziah was '
  - type: note
    content: According to some versions and 2 Kin 8:26; Heb forty-two years, but this is most likely a copyist’s error.
  - type: text
    content: 'twenty-two years old when he became king and he reigned one year in Jerusalem. His mother’s name was Athaliah, a granddaughter of Omri. [2 Kin 8:26] '
  '3':
  - type: text
    content: 'He also walked in the ways of the house of Ahab, for his mother was his adviser [and she encouraged him] to act wickedly. '
  '4':
  - type: text
    content: So he did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' like the house of Ahab, for they were his advisers after the death of his father, resulting in his destruction.'
  - type: heading
    content: Ahaziah Allies with Jehoram of Israel
  '5':
  - type: text
    content: 'He also walked in accordance with their advice, and he went with Jehoram the son of Ahab king of Israel to wage war against Hazael king of Aram (Syria) at Ramoth-gilead. And the Arameans wounded '
  - type: note
    content: The Hebrew sometimes uses Joram instead of Jehoram.
  - type: text
    content: 'Joram (Jehoram). [2 Kin 8:28ff] '
  '6':
  - type: text
    content: 'Then he returned to Jezreel to recover from the wounds they had inflicted on him at Ramah when he fought against Hazael king of Aram. And '
  - type: note
    content: So with 2 Kin 8:29; Heb Azariah.
  - type: text
    content: Ahaziah, the son of Jehoram king of Judah, went down to see Jehoram the son of Ahab in Jezreel, because he was sick.
  '7':
  - type: text
    content: But the downfall of Ahaziah was ordained by God, in that he went to Joram (Jehoram). For when he arrived there he went out [as an ally] with Jehoram against Jehu the son of Nimshi, whom the L
  - type: heading
    content: ord
  - type: text
    content: ' had anointed to destroy the house of Ahab.'
  - type: heading
    content: Jehu Murders Leaders of Judah
  '8':
  - type: text
    content: 'It came about that when Jehu was executing judgment on the house of Ahab, he found the leaders of Judah and the sons of Ahaziah’s [murdered] brothers ministering to Ahaziah, and he killed them. '
  '9':
  - type: text
    content: Jehu also searched for Ahaziah, who was hiding in Samaria; he was captured, brought to Jehu, and put to death. They buried him, for they said, “
  - type: text
    content: After all
  - type: text
    content: ', he is the grandson of Jehoshaphat, who sought the L'
  - type: heading
    content: ord
  - type: text
    content: ' with all his heart.” So the house of Ahaziah had no one '
  - type: text
    content: left
  - type: text
    content: ' to retain the power to rule over the kingdom.'
