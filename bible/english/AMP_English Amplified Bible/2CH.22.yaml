document_id: 2CH.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahaziah Succeeds Jehoram in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the inhabitants of Jerusalem made Ahaziah, his youngest son, king in his place, because the band of men (raiders) who came with the Arabs to the camp had killed all the older '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sons
  - type: text
    text: '. So Ahaziah the son of Jehoram king of Judah began to reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ahaziah was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'According to some versions and 2 Kin 8:26; Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forty-two years,
      - type: text
        text: ' but this is most likely a copyist’s error.'
    marker-yv: yv-n
  - type: text
    text: 'twenty-two years old when he became king and he reigned one year in Jerusalem. His mother’s name was Athaliah, a granddaughter of Omri. [2 Kin 8:26] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He also walked in the ways of the house of Ahab, for his mother was his adviser [and she encouraged him] to act wickedly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So he did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' like the house of Ahab, for they were his advisers after the death of his father, resulting in his destruction.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ahaziah Allies with Jehoram of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He also walked in accordance with their advice, and he went with Jehoram the son of Ahab king of Israel to wage war against Hazael king of Aram (Syria) at Ramoth-gilead. And the Arameans wounded '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew sometimes uses Joram instead of Jehoram.
    marker-yv: yv-n
  - type: text
    text: 'Joram (Jehoram). [2 Kin 8:28ff] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then he returned to Jezreel to recover from the wounds they had inflicted on him at Ramah when he fought against Hazael king of Aram. And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'So with 2 Kin 8:29; Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Azariah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ahaziah, the son of Jehoram king of Judah, went down to see Jehoram the son of Ahab in Jezreel, because he was sick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But the downfall of Ahaziah was ordained by God, in that he went to Joram (Jehoram). For when he arrived there he went out [as an ally] with Jehoram against Jehu the son of Nimshi, whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had anointed to destroy the house of Ahab.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehu Murders Leaders of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It came about that when Jehu was executing judgment on the house of Ahab, he found the leaders of Judah and the sons of Ahaziah’s [murdered] brothers ministering to Ahaziah, and he killed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehu also searched for Ahaziah, who was hiding in Samaria; he was captured, brought to Jehu, and put to death. They buried him, for they said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: After all
  - type: text
    text: ', he is the grandson of Jehoshaphat, who sought the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' with all his heart.” So the house of Ahaziah had no one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: left
  - type: text
    text: ' to retain the power to rule over the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now when Athaliah the mother of Ahaziah saw that her son was dead, she rose and destroyed all the royal family of the house of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Jehoshabeath, the king’s daughter, took Joash the [infant] son of Ahaziah and stole him away from among the king’s sons who were being put to death, and she placed him and his nurse in the bedroom. So Jehoshabeath, the daughter of King Jehoram [of Judah] and wife of Jehoiada the priest, hid Joash from [his grandmother] Athaliah so that she did not murder him (for Jehoshabeath was the sister of Ahaziah). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Joash was hidden with them in the house (temple) of God for six years, and Athaliah reigned over the land.
