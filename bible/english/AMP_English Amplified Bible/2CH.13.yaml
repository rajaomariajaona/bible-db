document_id: 2CH.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abijah Succeeds Rehoboam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eighteenth year of King Jeroboam, Abijah became king over Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But as for us, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is our God, and we have not abandoned (turned away from) Him. The sons of Aaron are ministering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' as priests, and the Levites attend to their service. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every morning and every evening they offer the burnt offerings and the fragrant incense to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. bread of the Presence.
      marker-yv: yv-n
    - type: text
      text: showbread is set on the clean table [of pure gold], and the golden lampstand with its lamps is ready to light every evening; for we keep the charge of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God [that is, the obligation we have to Him], but you have abandoned (turned away from) Him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Behold, God is with us at our head, and His priests [are here] with their signal trumpets to sound an alarm against you. O sons of Israel, do not fight against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of your fathers, for you cannot succeed.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jeroboam had set an ambush to come from the rear, so that Israel was in front of Judah and the ambush was behind them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When [the men of] Judah turned around, they were attacked from both front and rear; so they cried out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [for help], and the priests blew the trumpets. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the men of Judah raised a war cry; and as they shouted, God struck Jeroboam and all Israel [with defeat] before Abijah and Judah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the sons of Israel fled before Judah, and God handed over the sons of Israel to them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abijah and his people inflicted on them a great defeat, so that 500,000 chosen men of Israel fell slain. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus the sons of Israel were subdued (humbled) at that time, and the sons of Judah prevailed because they relied on the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of their fathers. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abijah pursued Jeroboam and captured [several] cities from him: Bethel, Jeshanah, and Ephraim (Ephron), with their villages.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Death of Jeroboam
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He reigned three years in Jerusalem. His mother’s name was Micaiah the daughter of Uriel of Gibeah.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: A
    - type: text
      text: 'nd there was war between Abijah and Jeroboam [of Israel]. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jeroboam did not recover strength again during the time of [the reign of] Abijah. And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' struck him and he died.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abijah became powerful. He took fourteen wives for himself and fathered twenty-two sons and sixteen daughters. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the rest of the acts of Abijah, and his ways and his sayings, are written in the writing of the prophet Iddo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abijah began the battle with an army of brave soldiers, 400,000 chosen men. Jeroboam drew up in battle formation against him with 800,000 chosen men, valiant men.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Civil War
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abijah stood on Mount Zemaraim, which is in the hill country of Ephraim, and said, “Listen to me, Jeroboam and all Israel: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do you not know that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, gave rule over Israel forever to David and to his sons by a covenant of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrews harvested sea salt through the process of evaporation. It was regarded as a symbol of loyalty and durability.
      marker-yv: yv-n
    - type: text
      text: 'salt [a permanent pact, extending to each generation of Israel]? [Num 18:19] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet Jeroboam the son of Nebat, a servant of Solomon the son of David, rose up and rebelled against his lord [the king], '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and worthless (unprincipled, unethical) men gathered around him, useless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wicked men, who proved too strong for Rehoboam the son of Solomon when Rehoboam was young and timid, and could not assert himself against them.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And now you intend to assert yourselves against the kingdom of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which is in the hands of the sons of David, since you are a great multitude and have with you the golden calves (idols) which Jeroboam made for you as gods. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Have you not driven out the priests of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the sons of Aaron and the Levites, and made priests for yourselves like the peoples of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' lands? So whoever comes to consecrate himself with a young bull and seven rams, even he may become a priest of non-existent gods (idols). '
