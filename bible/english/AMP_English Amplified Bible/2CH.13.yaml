document_id: 2CH.13,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijah Succeeds Rehoboam
  - type: text
    content: 'In the eighteenth year of King Jeroboam, Abijah became king over Judah. '
  '10':
  - type: text
    content: But as for us, the L
  - type: heading
    content: ord
  - type: text
    content: ' is our God, and we have not abandoned (turned away from) Him. The sons of Aaron are ministering to the L'
  - type: heading
    content: ord
  - type: text
    content: ' as priests, and the Levites attend to their service. '
  '11':
  - type: text
    content: Every morning and every evening they offer the burnt offerings and the fragrant incense to the L
  - type: heading
    content: ord
  - type: text
    content: '; and the '
  - type: note
    content: I.e. bread of the Presence.
  - type: text
    content: showbread is set on the clean table [of pure gold], and the golden lampstand with its lamps is ready to light every evening; for we keep the charge of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God [that is, the obligation we have to Him], but you have abandoned (turned away from) Him. '
  '12':
  - type: text
    content: Behold, God is with us at our head, and His priests [are here] with their signal trumpets to sound an alarm against you. O sons of Israel, do not fight against the L
  - type: heading
    content: ord
  - type: text
    content: ' God of your fathers, for you cannot succeed.”'
  '13':
  - type: text
    content: 'But Jeroboam had set an ambush to come from the rear, so that Israel was in front of Judah and the ambush was behind them. '
  '14':
  - type: text
    content: When [the men of] Judah turned around, they were attacked from both front and rear; so they cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [for help], and the priests blew the trumpets. '
  '15':
  - type: text
    content: 'Then the men of Judah raised a war cry; and as they shouted, God struck Jeroboam and all Israel [with defeat] before Abijah and Judah. '
  '16':
  - type: text
    content: 'And the sons of Israel fled before Judah, and God handed over the sons of Israel to them. '
  '17':
  - type: text
    content: 'Abijah and his people inflicted on them a great defeat, so that 500,000 chosen men of Israel fell slain. '
  '18':
  - type: text
    content: Thus the sons of Israel were subdued (humbled) at that time, and the sons of Judah prevailed because they relied on the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of their fathers. '
  '19':
  - type: text
    content: 'Abijah pursued Jeroboam and captured [several] cities from him: Bethel, Jeshanah, and Ephraim (Ephron), with their villages.'
  - type: heading
    content: Death of Jeroboam
  '2':
  - type: text
    content: He reigned three years in Jerusalem. His mother’s name was Micaiah the daughter of Uriel of Gibeah.
  - type: text
    content: A
  - type: text
    content: 'nd there was war between Abijah and Jeroboam [of Israel]. '
  '20':
  - type: text
    content: Jeroboam did not recover strength again during the time of [the reign of] Abijah. And the L
  - type: heading
    content: ord
  - type: text
    content: ' struck him and he died.'
  '21':
  - type: text
    content: 'But Abijah became powerful. He took fourteen wives for himself and fathered twenty-two sons and sixteen daughters. '
  '22':
  - type: text
    content: Now the rest of the acts of Abijah, and his ways and his sayings, are written in the writing of the prophet Iddo.
  '3':
  - type: text
    content: Abijah began the battle with an army of brave soldiers, 400,000 chosen men. Jeroboam drew up in battle formation against him with 800,000 chosen men, valiant men.
  - type: heading
    content: Civil War
  '4':
  - type: text
    content: 'Then Abijah stood on Mount Zemaraim, which is in the hill country of Ephraim, and said, “Listen to me, Jeroboam and all Israel: '
  '5':
  - type: text
    content: Do you not know that the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, gave rule over Israel forever to David and to his sons by a covenant of '
  - type: note
    content: The Hebrews harvested sea salt through the process of evaporation. It was regarded as a symbol of loyalty and durability.
  - type: text
    content: 'salt [a permanent pact, extending to each generation of Israel]? [Num 18:19] '
  '6':
  - type: text
    content: 'Yet Jeroboam the son of Nebat, a servant of Solomon the son of David, rose up and rebelled against his lord [the king], '
  '7':
  - type: text
    content: 'and worthless (unprincipled, unethical) men gathered around him, useless '
  - type: text
    content: and
  - type: text
    content: ' wicked men, who proved too strong for Rehoboam the son of Solomon when Rehoboam was young and timid, and could not assert himself against them.'
  '8':
  - type: text
    content: “And now you intend to assert yourselves against the kingdom of the L
  - type: heading
    content: ord
  - type: text
    content: ' which is in the hands of the sons of David, since you are a great multitude and have with you the golden calves (idols) which Jeroboam made for you as gods. '
  '9':
  - type: text
    content: Have you not driven out the priests of the L
  - type: heading
    content: ord
  - type: text
    content: ', the sons of Aaron and the Levites, and made priests for yourselves like the peoples of '
  - type: text
    content: other
  - type: text
    content: ' lands? So whoever comes to consecrate himself with a young bull and seven rams, even he may become a priest of non-existent gods (idols). '
