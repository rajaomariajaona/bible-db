document_id: PHP.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thanksgiving
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Paul and Timothy, bond-servants of Christ Jesus (the Messiah, the Anointed),
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o all the saints (God’s people) in Christ Jesus who are at Philippi, including the overseers and deacons: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'so that you may learn to recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treasure what is excellent [identifying the best, and distinguishing moral differences], and that you may be pure and blameless until the day of Christ [actually living lives that lead others away from sin]; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: filled with the fruit of righteousness which comes through Jesus Christ, to the glory and praise of God [so that His glory may be both revealed and recognized].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Gospel Is Preached
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now I want you to know, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers, that what has happened to me [this imprisonment that was meant to stop me] has actually served to advance [the spread of] the good news [regarding salvation]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'My imprisonment in [the cause of] Christ has become common knowledge throughout the whole '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This word is derived from the Latin '
        - type: usfm
          marker: it
          children:
          - type: text
            text: praetor
        - type: text
          text: ' (leader, commander). Paul’s use of the word here indicates that he is referring to the troops who served as the emperor’s bodyguard, and evidently were also entrusted with the custody of prisoners who had come to Rome on appeal.'
      marker-yv: yv-n
    - type: text
      text: 'praetorian (imperial) guard and to everyone else. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Because of my chains [seeing that I am doing well and that God is accomplishing great things], most of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers have renewed confidence in the Lord, and have far more courage to speak the word of God [concerning salvation] without fear [of the consequences, seeing that God can work His good in all circumstances]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Some, it is true, are [actually] preaching Christ out of envy and rivalry [toward me—for no better reason than a competitive spirit or misguided ambition], but others out of goodwill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a loyal spirit [toward me]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The latter [preach Christ] out of love, because they know that I have been put here [by God on purpose] for the defense of the gospel; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'but the former preach Christ [insincerely] out of selfish ambition [just self-promotion], thinking that they are causing me distress in my imprisonment. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: What then [does it matter]? So long as in every way, whether in pretense [for self-promotion] or in all honesty [to spread the truth], Christ is being preached; and in this I rejoice.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Y
    - type: text
      text: 'es, and I will rejoice [later as well], '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'for I know [with confidence] that this will turn out for my deliverance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritual well-being, through your prayers and the [superabundant] supply of the Spirit of Jesus Christ [which upholds me]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'It is my own eager expectation and hope, that [looking toward the future] I will not disgrace myself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' be ashamed in anything, but that with courage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the utmost freedom of speech, even now as always, Christ will be magnified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalted in my body, whether by life or by death.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: To Live Is Christ
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For to me, to live is Christ [He is my source of joy, my reason to live] and to die is gain [for I will be with Him in eternity]. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'If, however, it is to be life here '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I am to go on living, this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will mean
    - type: text
      text: ' useful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' productive service for me; so I do not know which to choose [if I am given that choice]. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But I am hard-pressed between the two. I have the desire to leave [this world] and be with Christ, for that is far, far better; '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'yet to remain in my body is more necessary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' essential for your sake. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Since I am convinced of this, I know that I will remain and continue with all of you for your progress and joy in the faith, '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: so that your rejoicing for me may overflow in Christ Jesus through my coming to you again.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Only [be sure to] lead your lives in a manner [that will be] worthy of the gospel of Christ, so that whether I do come and see you or remain absent, I will hear about you that you are standing firm in one spirit [and one purpose], with one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'mind striving side by side [as if in combat] for the faith of the gospel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And in no way be alarmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' intimidated [in anything] by your opponents, for such [constancy and fearlessness on your part] is a [clear] sign [a proof and a seal] for them of [their impending] destruction, but [a clear sign] for you of deliverance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' salvation, and that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: too,
    - type: text
      text: ' from God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'For you have been granted [the privilege] for Christ’s sake, not only to believe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confidently trust in Him, but also to suffer for His sake, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I thank my God in every remembrance of you, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '[and so you are] experiencing the same [kind of] conflict which '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul and Silas were beaten and imprisoned in Philippi during their first trip to the region. See Acts 16:19-40.
      marker-yv: yv-n
    - type: text
      text: you saw me endure, and which you hear to be mine now.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'always offering every prayer of mine with joy [and with specific requests] for all of you, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '[thanking God] for your participation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' partnership [both your comforting fellowship and gracious contributions] in [advancing] the good news [regarding salvation] from the first day [you heard it] until now. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I am convinced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident of this very thing, that He who has begun a good work in you will [continue to] perfect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complete it until the day of Christ Jesus [the time of His return]. [Rom 14:10] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'It is right for me to feel this way about you, because [you have me in your heart as] I have you in my heart, since both in my imprisonment and in the defense and confirmation of the good news [regarding salvation], all of you share in [His matchless] grace with me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For God is my witness, how I long for all of you with the affection of Christ Jesus [whose great love fills me]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And this I pray, that your love may abound more and more [displaying itself in greater depth] in real knowledge and in practical insight, '
