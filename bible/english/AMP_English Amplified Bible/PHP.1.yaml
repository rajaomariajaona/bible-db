document_id: PHP.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Thanksgiving
  - type: text
    content: Paul and Timothy, bond-servants of Christ Jesus (the Messiah, the Anointed),
  - type: text
    content: T
  - type: text
    content: 'o all the saints (God’s people) in Christ Jesus who are at Philippi, including the overseers and deacons: '
  '10':
  - type: text
    content: 'so that you may learn to recognize '
  - type: text
    content: and
  - type: text
    content: ' treasure what is excellent [identifying the best, and distinguishing moral differences], and that you may be pure and blameless until the day of Christ [actually living lives that lead others away from sin]; '
  '11':
  - type: text
    content: filled with the fruit of righteousness which comes through Jesus Christ, to the glory and praise of God [so that His glory may be both revealed and recognized].
  - type: heading
    content: The Gospel Is Preached
  '12':
  - type: text
    content: 'Now I want you to know, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers, that what has happened to me [this imprisonment that was meant to stop me] has actually served to advance [the spread of] the good news [regarding salvation]. '
  '13':
  - type: text
    content: 'My imprisonment in [the cause of] Christ has become common knowledge throughout the whole '
  - type: note
    content: This word is derived from the Latin praetor (leader, commander). Paul’s use of the word here indicates that he is referring to the troops who served as the emperor’s bodyguard, and evidently were also entrusted with the custody of prisoners who had come to Rome on appeal.
  - type: text
    content: 'praetorian (imperial) guard and to everyone else. '
  '14':
  - type: text
    content: 'Because of my chains [seeing that I am doing well and that God is accomplishing great things], most of the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers have renewed confidence in the Lord, and have far more courage to speak the word of God [concerning salvation] without fear [of the consequences, seeing that God can work His good in all circumstances]. '
  '15':
  - type: text
    content: 'Some, it is true, are [actually] preaching Christ out of envy and rivalry [toward me—for no better reason than a competitive spirit or misguided ambition], but others out of goodwill '
  - type: text
    content: and
  - type: text
    content: ' a loyal spirit [toward me]. '
  '16':
  - type: text
    content: 'The latter [preach Christ] out of love, because they know that I have been put here [by God on purpose] for the defense of the gospel; '
  '17':
  - type: text
    content: 'but the former preach Christ [insincerely] out of selfish ambition [just self-promotion], thinking that they are causing me distress in my imprisonment. '
  '18':
  - type: text
    content: What then [does it matter]? So long as in every way, whether in pretense [for self-promotion] or in all honesty [to spread the truth], Christ is being preached; and in this I rejoice.
  - type: text
    content: Y
  - type: text
    content: 'es, and I will rejoice [later as well], '
  '19':
  - type: text
    content: 'for I know [with confidence] that this will turn out for my deliverance '
  - type: text
    content: and
  - type: text
    content: ' spiritual well-being, through your prayers and the [superabundant] supply of the Spirit of Jesus Christ [which upholds me]. '
  '2':
  - type: text
    content: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  '20':
  - type: text
    content: 'It is my own eager expectation and hope, that [looking toward the future] I will not disgrace myself '
  - type: text
    content: nor
  - type: text
    content: ' be ashamed in anything, but that with courage '
  - type: text
    content: and
  - type: text
    content: ' the utmost freedom of speech, even now as always, Christ will be magnified '
  - type: text
    content: and
  - type: text
    content: ' exalted in my body, whether by life or by death.'
  - type: heading
    content: To Live Is Christ
  '21':
  - type: text
    content: 'For to me, to live is Christ [He is my source of joy, my reason to live] and to die is gain [for I will be with Him in eternity]. '
  '22':
  - type: text
    content: 'If, however, it is to be life here '
  - type: text
    content: and
  - type: text
    content: ' I am to go on living, this '
  - type: text
    content: will mean
  - type: text
    content: ' useful '
  - type: text
    content: and
  - type: text
    content: ' productive service for me; so I do not know which to choose [if I am given that choice]. '
  '23':
  - type: text
    content: 'But I am hard-pressed between the two. I have the desire to leave [this world] and be with Christ, for that is far, far better; '
  '24':
  - type: text
    content: 'yet to remain in my body is more necessary '
  - type: text
    content: and
  - type: text
    content: ' essential for your sake. '
  '25':
  - type: text
    content: 'Since I am convinced of this, I know that I will remain and continue with all of you for your progress and joy in the faith, '
  '26':
  - type: text
    content: so that your rejoicing for me may overflow in Christ Jesus through my coming to you again.
  '27':
  - type: text
    content: 'Only [be sure to] lead your lives in a manner [that will be] worthy of the gospel of Christ, so that whether I do come and see you or remain absent, I will hear about you that you are standing firm in one spirit [and one purpose], with one '
  - type: note
    content: Lit soul.
  - type: text
    content: 'mind striving side by side [as if in combat] for the faith of the gospel. '
  '28':
  - type: text
    content: 'And in no way be alarmed '
  - type: text
    content: or
  - type: text
    content: ' intimidated [in anything] by your opponents, for such [constancy and fearlessness on your part] is a [clear] sign [a proof and a seal] for them of [their impending] destruction, but [a clear sign] for you of deliverance '
  - type: text
    content: and
  - type: text
    content: ' salvation, and that '
  - type: text
    content: too,
  - type: text
    content: ' from God. '
  '29':
  - type: text
    content: 'For you have been granted [the privilege] for Christ’s sake, not only to believe '
  - type: text
    content: and
  - type: text
    content: ' confidently trust in Him, but also to suffer for His sake, '
  '3':
  - type: text
    content: 'I thank my God in every remembrance of you, '
  '30':
  - type: text
    content: '[and so you are] experiencing the same [kind of] conflict which '
  - type: note
    content: Paul and Silas were beaten and imprisoned in Philippi during their first trip to the region. See Acts 16:19-40.
  - type: text
    content: you saw me endure, and which you hear to be mine now.
  '4':
  - type: text
    content: 'always offering every prayer of mine with joy [and with specific requests] for all of you, '
  '5':
  - type: text
    content: '[thanking God] for your participation '
  - type: text
    content: and
  - type: text
    content: ' partnership [both your comforting fellowship and gracious contributions] in [advancing] the good news [regarding salvation] from the first day [you heard it] until now. '
  '6':
  - type: text
    content: 'I am convinced '
  - type: text
    content: and
  - type: text
    content: ' confident of this very thing, that He who has begun a good work in you will [continue to] perfect '
  - type: text
    content: and
  - type: text
    content: ' complete it until the day of Christ Jesus [the time of His return]. [Rom 14:10] '
  '7':
  - type: text
    content: 'It is right for me to feel this way about you, because [you have me in your heart as] I have you in my heart, since both in my imprisonment and in the defense and confirmation of the good news [regarding salvation], all of you share in [His matchless] grace with me. '
  '8':
  - type: text
    content: 'For God is my witness, how I long for all of you with the affection of Christ Jesus [whose great love fills me]. '
  '9':
  - type: text
    content: 'And this I pray, that your love may abound more and more [displaying itself in greater depth] in real knowledge and in practical insight, '
