document_id: PRO.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Contrast the Upright and the Wicked
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A false balance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dishonest business practices are extremely offensive to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: But an accurate scale is His delight. [Lev 19:35, 36; Prov 16:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When pride comes [boiling up with an arrogant attitude of self-importance], then come dishonor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shame,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But with the humble [the teachable who have been chiseled by trial and who have learned to walk humbly with God] there is wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' soundness of mind.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' moral courage of the upright will guide them,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the crookedness of the treacherous will destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Riches will not provide security in the day of wrath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgment,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But righteousness rescues from death. [Prov 10:2; Zeph 1:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The righteousness of the blameless will smooth their way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep it straight,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the wicked will fall by his own wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The righteousness of the upright will rescue them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the treacherous will be caught by their own greed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When the wicked man dies, his expectation will perish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the hope of [godless] strong men perishes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The famous eleventh-century rabbi known as Rashi told a fable illustrating this verse. He said that a fox once told a wolf to come with him and he would give him abundant food. It was night, and the fox led the wolf to a well with a bucket at each end of the rope. The fox got into the bucket at the top of the well and rode down to the bottom. When the wolf asked him what he was doing, the fox pointed to the reflection of the moon in the water and said, “There is plenty of cheese and meat down here. Get in the other bucket and come down right away!” The wolf did, and as he went down the fox was pulled up in the first bucket. When the fox got to the top, the wolf said, “How am I supposed to get out?” Thereupon the fox quoted this verse to him.
    marker-yv: yv-n
  - type: text
    text: The righteous is rescued from trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the wicked takes his place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: With his mouth the godless man destroys his neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But through knowledge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discernment the righteous will be rescued.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When it goes well for the righteous, the city rejoices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when the wicked perish, there are shouts of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: By the blessing [of the influence] of the upright the city is exalted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But by the mouth of the wicked it is torn down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He who despises his neighbor lacks sense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a man of understanding keeps silent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He who goes about as a gossip reveals secrets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who is trustworthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithful keeps a matter hidden.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Where there is no [wise, intelligent] guidance, the people fall [and go off course like a ship without a helm],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But in the abundance of [wise and godly] counselors there is victory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He who puts up security '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guarantees a debt for an outsider will surely suffer [for his foolishness],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he who hates (declines) being a guarantor is secure [from its penalties].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' good woman attains honor,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And ruthless men attain riches [but not respect].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The merciful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' generous man benefits his soul [for his behavior returns to bless him],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the cruel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' callous man does himself harm.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The wicked man earns deceptive wages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who sows righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lives his life with integrity will have a true reward [that is both permanent and satisfying]. [Hos 10:12; Gal 6:8, 9; James 3:18]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He who is steadfast in righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: attains
  - type: text
    text: ' life,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But he who pursues evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: attains
  - type: text
    text: ' his own death.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The perverse in heart are repulsive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shamefully vile to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But those who are blameless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' above reproach in their walk are His delight!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Assuredly, the evil man will not go unpunished,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the descendants of the righteous will be freed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: As a ring of gold in a swine’s snout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So is a beautiful woman who is without discretion [her lack of character mocks her beauty].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The desire of the righteous brings only good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the expectation of the wicked brings wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: There is the one who [generously] scatters [abroad], and yet increases all the more;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And there is the one who withholds what is justly due, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but it results
  - type: text
    text: ' only in want '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' poverty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The generous man [is a source of blessing and] shall be prosperous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enriched,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who waters will himself be watered [reaping the generosity he has sown]. [2 Cor 9:6-10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The people curse him who holds back grain [when the public needs it],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a blessing [from God and man] is upon the head of him who sells it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He who diligently seeks good seeks favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grace,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he who seeks evil, evil will come to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He who leans on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trusts in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is confident in his riches will fall,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the righteous [who trust in God’s provision] will flourish like a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: green
  - type: text
    text: ' leaf.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He who troubles (mismanages) his own house will inherit the wind (nothing),
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the foolish will be a servant to the wise-hearted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The fruit of the [consistently] righteous is a tree of life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he who is wise captures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wins souls [for God—he gathers them for eternity]. [Matt 4:19; 1 Cor 9:19; James 5:20]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If the righteous will be rewarded on the earth [with godly blessings],
- type: usfm
  marker: q1
  children:
  - type: text
    text: How much more [will] the wicked and the sinner [be repaid with punishment]!
