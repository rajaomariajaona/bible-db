document_id: PRO.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Contrast the Upright and the Wicked
  - type: text
    content: 'A false balance '
  - type: text
    content: and
  - type: text
    content: ' dishonest business practices are extremely offensive to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: But an accurate scale is His delight. [Lev 19:35, 36; Prov 16:11]
  '10':
  - type: text
    content: When it goes well for the righteous, the city rejoices,
  - type: text
    content: And when the wicked perish, there are shouts of joy.
  '11':
  - type: text
    content: By the blessing [of the influence] of the upright the city is exalted,
  - type: text
    content: But by the mouth of the wicked it is torn down.
  '12':
  - type: text
    content: He who despises his neighbor lacks sense,
  - type: text
    content: But a man of understanding keeps silent.
  '13':
  - type: text
    content: He who goes about as a gossip reveals secrets,
  - type: text
    content: 'But he who is trustworthy '
  - type: text
    content: and
  - type: text
    content: ' faithful keeps a matter hidden.'
  '14':
  - type: text
    content: Where there is no [wise, intelligent] guidance, the people fall [and go off course like a ship without a helm],
  - type: text
    content: But in the abundance of [wise and godly] counselors there is victory.
  '15':
  - type: text
    content: 'He who puts up security '
  - type: text
    content: and
  - type: text
    content: ' guarantees a debt for an outsider will surely suffer [for his foolishness],'
  - type: text
    content: But he who hates (declines) being a guarantor is secure [from its penalties].
  '16':
  - type: text
    content: 'A gracious '
  - type: text
    content: and
  - type: text
    content: ' good woman attains honor,'
  - type: text
    content: And ruthless men attain riches [but not respect].
  '17':
  - type: text
    content: 'The merciful '
  - type: text
    content: and
  - type: text
    content: ' generous man benefits his soul [for his behavior returns to bless him],'
  - type: text
    content: 'But the cruel '
  - type: text
    content: and
  - type: text
    content: ' callous man does himself harm.'
  '18':
  - type: text
    content: The wicked man earns deceptive wages,
  - type: text
    content: 'But he who sows righteousness '
  - type: text
    content: and
  - type: text
    content: ' lives his life with integrity will have a true reward [that is both permanent and satisfying]. [Hos 10:12; Gal 6:8, 9; James 3:18]'
  '19':
  - type: text
    content: 'He who is steadfast in righteousness '
  - type: text
    content: attains
  - type: text
    content: ' life,'
  - type: text
    content: 'But he who pursues evil '
  - type: text
    content: attains
  - type: text
    content: ' his own death.'
  '2':
  - type: text
    content: 'When pride comes [boiling up with an arrogant attitude of self-importance], then come dishonor '
  - type: text
    content: and
  - type: text
    content: ' shame,'
  - type: text
    content: 'But with the humble [the teachable who have been chiseled by trial and who have learned to walk humbly with God] there is wisdom '
  - type: text
    content: and
  - type: text
    content: ' soundness of mind.'
  '20':
  - type: text
    content: 'The perverse in heart are repulsive '
  - type: text
    content: and
  - type: text
    content: ' shamefully vile to the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'But those who are blameless '
  - type: text
    content: and
  - type: text
    content: ' above reproach in their walk are His delight!'
  '21':
  - type: text
    content: Assuredly, the evil man will not go unpunished,
  - type: text
    content: But the descendants of the righteous will be freed.
  '22':
  - type: text
    content: As a ring of gold in a swine’s snout,
  - type: text
    content: So is a beautiful woman who is without discretion [her lack of character mocks her beauty].
  '23':
  - type: text
    content: The desire of the righteous brings only good,
  - type: text
    content: But the expectation of the wicked brings wrath.
  '24':
  - type: text
    content: There is the one who [generously] scatters [abroad], and yet increases all the more;
  - type: text
    content: 'And there is the one who withholds what is justly due, '
  - type: text
    content: but it results
  - type: text
    content: ' only in want '
  - type: text
    content: and
  - type: text
    content: ' poverty.'
  '25':
  - type: text
    content: 'The generous man [is a source of blessing and] shall be prosperous '
  - type: text
    content: and
  - type: text
    content: ' enriched,'
  - type: text
    content: And he who waters will himself be watered [reaping the generosity he has sown]. [2 Cor 9:6-10]
  '26':
  - type: text
    content: The people curse him who holds back grain [when the public needs it],
  - type: text
    content: But a blessing [from God and man] is upon the head of him who sells it.
  '27':
  - type: text
    content: 'He who diligently seeks good seeks favor '
  - type: text
    content: and
  - type: text
    content: ' grace,'
  - type: text
    content: But he who seeks evil, evil will come to him.
  '28':
  - type: text
    content: 'He who leans on '
  - type: text
    content: and
  - type: text
    content: ' trusts in '
  - type: text
    content: and
  - type: text
    content: ' is confident in his riches will fall,'
  - type: text
    content: 'But the righteous [who trust in God’s provision] will flourish like a '
  - type: text
    content: green
  - type: text
    content: ' leaf.'
  '29':
  - type: text
    content: He who troubles (mismanages) his own house will inherit the wind (nothing),
  - type: text
    content: And the foolish will be a servant to the wise-hearted.
  '3':
  - type: text
    content: 'The integrity '
  - type: text
    content: and
  - type: text
    content: ' moral courage of the upright will guide them,'
  - type: text
    content: But the crookedness of the treacherous will destroy them.
  '30':
  - type: text
    content: The fruit of the [consistently] righteous is a tree of life,
  - type: text
    content: 'And he who is wise captures '
  - type: text
    content: and
  - type: text
    content: ' wins souls [for God—he gathers them for eternity]. [Matt 4:19; 1 Cor 9:19; James 5:20]'
  '31':
  - type: text
    content: If the righteous will be rewarded on the earth [with godly blessings],
  - type: text
    content: How much more [will] the wicked and the sinner [be repaid with punishment]!
  '4':
  - type: text
    content: 'Riches will not provide security in the day of wrath '
  - type: text
    content: and
  - type: text
    content: ' judgment,'
  - type: text
    content: But righteousness rescues from death. [Prov 10:2; Zeph 1:18]
  '5':
  - type: text
    content: 'The righteousness of the blameless will smooth their way '
  - type: text
    content: and
  - type: text
    content: ' keep it straight,'
  - type: text
    content: But the wicked will fall by his own wickedness.
  '6':
  - type: text
    content: The righteousness of the upright will rescue them,
  - type: text
    content: But the treacherous will be caught by their own greed.
  '7':
  - type: text
    content: When the wicked man dies, his expectation will perish;
  - type: text
    content: And the hope of [godless] strong men perishes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: The famous eleventh-century rabbi known as Rashi told a fable illustrating this verse. He said that a fox once told a wolf to come with him and he would give him abundant food. It was night, and the fox led the wolf to a well with a bucket at each end of the rope. The fox got into the bucket at the top of the well and rode down to the bottom. When the wolf asked him what he was doing, the fox pointed to the reflection of the moon in the water and said, “There is plenty of cheese and meat down here. Get in the other bucket and come down right away!” The wolf did, and as he went down the fox was pulled up in the first bucket. When the fox got to the top, the wolf said, “How am I supposed to get out?” Thereupon the fox quoted this verse to him.
  - type: text
    content: The righteous is rescued from trouble,
  - type: text
    content: And the wicked takes his place.
  '9':
  - type: text
    content: With his mouth the godless man destroys his neighbor,
  - type: text
    content: 'But through knowledge '
  - type: text
    content: and
  - type: text
    content: ' discernment the righteous will be rescued.'
