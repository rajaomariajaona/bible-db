  - type: heading
    content: Blessedness of the Fear of the Lord.
  - type: text
    content: 'A Song of '
  - type: note
    content: See Psalm 120 title note.
  - type: text
    content: Ascents.
  - type: text
    content: Blessed [happy and sheltered by God’s favor] is everyone who fears the L
  - type: heading
    content: ord
  - type: text
    content: ' [and worships Him with obedience],'
  - type: text
    content: 'Who walks in His ways '
  - type: text
    content: and
  - type: text
    content: ' lives according to His commandments. [Ps 1:1, 2]'
  '2':
  - type: text
    content: For you shall eat the fruit of [the labor of] your hands,
  - type: text
    content: 'You will be happy '
  - type: text
    content: and
  - type: text
    content: ' blessed and it will be well with you.'
  '3':
  - type: text
    content: Your wife shall be like a fruitful vine
  - type: text
    content: Within the innermost part of your house;
  - type: text
    content: Your children will be like olive plants
  - type: text
    content: Around your table.
  '4':
  - type: text
    content: 'Behold, for so shall the man be blessed '
  - type: text
    content: and
  - type: text
    content: ' divinely favored'
  - type: text
    content: Who fears the L
  - type: heading
    content: ord
  - type: text
    content: ' [and worships Him with obedience].'
  '5':
  - type: text
    content: ¶May the L
  - type: heading
    content: ord
  - type: text
    content: ' bless you from Zion [His holy mountain],'
  - type: text
    content: And may you see the prosperity of Jerusalem all the days of your life;
  '6':
  - type: text
    content: Indeed, may you see your [family perpetuated in your] children’s children.
  - type: text
    content: Peace be upon Israel!
