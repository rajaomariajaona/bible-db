document_id: PSA.128,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 128
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Blessedness of the Fear of the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: .
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '128:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Psalm 120 title note.
      marker-yv: yv-n
    - type: text
      text: Ascents.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Blessed [happy and sheltered by God’s favor] is everyone who fears the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [and worships Him with obedience],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who walks in His ways '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lives according to His commandments. [Ps 1:1, 2]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: For you shall eat the fruit of [the labor of] your hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will be happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessed and it will be well with you.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Your wife shall be like a fruitful vine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Within the innermost part of your house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your children will be like olive plants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Around your table.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Behold, for so shall the man be blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' divinely favored'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who fears the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [and worships Him with obedience].'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' bless you from Zion [His holy mountain],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may you see the prosperity of Jerusalem all the days of your life;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Indeed, may you see your [family perpetuated in your] children’s children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peace be upon Israel!
