document_id: PRO.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Father’s Instruction
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear, O children, the instruction of a father,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And pay attention [and be willing to learn] so that you may gain understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intelligent discernment.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For I give you good doctrine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forsake
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: turn away from my instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When I was a son with my father (David),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tender and the only son in the sight of my mother (Bathsheba),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He taught me and said to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let your heart hold fast my words;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep my commandments and live. [1 Chr 28:9; Eph 6:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Get [skillful and godly] wisdom! Acquire understanding [actively seek spiritual discernment, mature comprehension, and logical interpretation]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not forget nor turn away from the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Do not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forsake
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'turn away from her (Wisdom) and she will guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protect you;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Love her, and she will watch over you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“The beginning of wisdom is: Get [skillful and godly] wisdom [it is preeminent]!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with all your acquiring, get understanding [actively seek spiritual discernment, mature comprehension, and logical interpretation]. [James 1:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Prize wisdom [and exalt her], and she will exalt you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will honor you if you embrace her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “She will place on your head a garland of grace;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'She will present you with a crown of beauty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Hear, my son, and accept my sayings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the years of your life will be many.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I have instructed you in the way of [skillful and godly] wisdom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have led you in upright paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When you walk, your steps will not be impeded [for your path will be clear and open];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when you run, you will not stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Take hold of instruction; [actively seek it, grip it firmly and] do not let go.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Guard her, for she is your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Do not enter the path of the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not go the way of evil men.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avoid it, do not travel on it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn away from it and pass on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For the wicked cannot sleep unless they do evil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they are deprived of sleep unless they make someone stumble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fall.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For they eat the bread of wickedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And drink the wine of violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But the path of the just (righteous) is like the light of dawn,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That shines brighter and brighter until [it reaches its full strength and glory in] the perfect day. [2 Sam 23:4; Matt 5:14; Phil 2:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The way of the wicked is like [deep] darkness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They do not know over what they stumble. [John 12:35]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '¶My son, pay attention to my words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be willing to learn;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Open your ears to my sayings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Do not let them escape from your sight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep them in the center of your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For they are life to those who find them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And healing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' health to all their flesh.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Watch over your heart with all diligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For from it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: flow
  - type: text
    text: ' the springs of life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Put away from you a deceitful (lying, misleading) mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And put devious lips far from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Let your eyes look directly ahead [toward the path of moral courage]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let your gaze be fixed straight in front of you [toward the path of integrity].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Consider well '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' watch carefully the path of your feet,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And all your ways will be steadfast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Do not turn away to the right nor to the left [where evil may lurk];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn your foot from [the path of] evil.
