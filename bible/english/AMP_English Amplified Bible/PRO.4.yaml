document_id: PRO.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Father’s Instruction
  - type: text
    content: Hear, O children, the instruction of a father,
  - type: text
    content: 'And pay attention [and be willing to learn] so that you may gain understanding '
  - type: text
    content: and
  - type: text
    content: ' intelligent discernment.'
  '10':
  - type: text
    content: ¶Hear, my son, and accept my sayings,
  - type: text
    content: And the years of your life will be many.
  '11':
  - type: text
    content: I have instructed you in the way of [skillful and godly] wisdom;
  - type: text
    content: I have led you in upright paths.
  '12':
  - type: text
    content: When you walk, your steps will not be impeded [for your path will be clear and open];
  - type: text
    content: And when you run, you will not stumble.
  '13':
  - type: text
    content: Take hold of instruction; [actively seek it, grip it firmly and] do not let go.
  - type: text
    content: Guard her, for she is your life.
  '14':
  - type: text
    content: Do not enter the path of the wicked,
  - type: text
    content: And do not go the way of evil men.
  '15':
  - type: text
    content: Avoid it, do not travel on it;
  - type: text
    content: Turn away from it and pass on.
  '16':
  - type: text
    content: For the wicked cannot sleep unless they do evil;
  - type: text
    content: 'And they are deprived of sleep unless they make someone stumble '
  - type: text
    content: and
  - type: text
    content: ' fall.'
  '17':
  - type: text
    content: For they eat the bread of wickedness
  - type: text
    content: And drink the wine of violence.
  '18':
  - type: text
    content: But the path of the just (righteous) is like the light of dawn,
  - type: text
    content: That shines brighter and brighter until [it reaches its full strength and glory in] the perfect day. [2 Sam 23:4; Matt 5:14; Phil 2:15]
  '19':
  - type: text
    content: The way of the wicked is like [deep] darkness;
  - type: text
    content: They do not know over what they stumble. [John 12:35]
  '2':
  - type: text
    content: For I give you good doctrine;
  - type: text
    content: 'Do not '
  - type: note
    content: Lit forsake.
  - type: text
    content: turn away from my instruction.
  '20':
  - type: text
    content: '¶My son, pay attention to my words '
  - type: text
    content: and
  - type: text
    content: ' be willing to learn;'
  - type: text
    content: Open your ears to my sayings.
  '21':
  - type: text
    content: Do not let them escape from your sight;
  - type: text
    content: Keep them in the center of your heart.
  '22':
  - type: text
    content: For they are life to those who find them,
  - type: text
    content: 'And healing '
  - type: text
    content: and
  - type: text
    content: ' health to all their flesh.'
  '23':
  - type: text
    content: Watch over your heart with all diligence,
  - type: text
    content: 'For from it '
  - type: text
    content: flow
  - type: text
    content: ' the springs of life.'
  '24':
  - type: text
    content: Put away from you a deceitful (lying, misleading) mouth,
  - type: text
    content: And put devious lips far from you.
  '25':
  - type: text
    content: Let your eyes look directly ahead [toward the path of moral courage]
  - type: text
    content: And let your gaze be fixed straight in front of you [toward the path of integrity].
  '26':
  - type: text
    content: 'Consider well '
  - type: text
    content: and
  - type: text
    content: ' watch carefully the path of your feet,'
  - type: text
    content: 'And all your ways will be steadfast '
  - type: text
    content: and
  - type: text
    content: ' sure.'
  '27':
  - type: text
    content: Do not turn away to the right nor to the left [where evil may lurk];
  - type: text
    content: Turn your foot from [the path of] evil.
  '3':
  - type: text
    content: When I was a son with my father (David),
  - type: text
    content: Tender and the only son in the sight of my mother (Bathsheba),
  '4':
  - type: text
    content: He taught me and said to me,
  - type: text
    content: “Let your heart hold fast my words;
  - type: text
    content: Keep my commandments and live. [1 Chr 28:9; Eph 6:4]
  '5':
  - type: text
    content: “Get [skillful and godly] wisdom! Acquire understanding [actively seek spiritual discernment, mature comprehension, and logical interpretation]!
  - type: text
    content: Do not forget nor turn away from the words of my mouth.
  '6':
  - type: text
    content: '“Do not '
  - type: note
    content: Lit forsake.
  - type: text
    content: 'turn away from her (Wisdom) and she will guard '
  - type: text
    content: and
  - type: text
    content: ' protect you;'
  - type: text
    content: Love her, and she will watch over you.
  '7':
  - type: text
    content: '“The beginning of wisdom is: Get [skillful and godly] wisdom [it is preeminent]!'
  - type: text
    content: And with all your acquiring, get understanding [actively seek spiritual discernment, mature comprehension, and logical interpretation]. [James 1:5]
  '8':
  - type: text
    content: “Prize wisdom [and exalt her], and she will exalt you;
  - type: text
    content: She will honor you if you embrace her.
  '9':
  - type: text
    content: “She will place on your head a garland of grace;
  - type: text
    content: 'She will present you with a crown of beauty '
  - type: text
    content: and
  - type: text
    content: ' glory.”'
