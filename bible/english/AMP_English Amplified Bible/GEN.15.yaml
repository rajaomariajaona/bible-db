document_id: GEN.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abram Promised a Son
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After these things the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Abram in a vision, saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not be afraid, Abram,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am your shield;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your reward [for obedience] shall be very great.”
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So Abram brought all these to Him and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was preparation for an ancient ceremony that formally bound two parties to an agreement or covenant (v 18). Reference is made to the ceremony in Jer 34:18, but details are not given elsewhere in Scripture.
      marker-yv: yv-n
    - type: text
      text: 'cut them down the middle, and laid each half opposite the other; but he did not cut the birds. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The birds of prey swooped down on the carcasses, but Abram drove them away.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When the sun was setting, a deep sleep overcame Abram; and a horror (terror, shuddering fear, nightmare) of great darkness overcame him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Abram, “Know for sure that your descendants will be strangers [living temporarily] in a land (Egypt) that is not theirs, where they will be enslaved and oppressed for four hundred years. [Ex 12:40] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But on that nation whom your descendants will serve I will bring judgment, and afterward they will come out [of that land] with great possessions. [Ex 12:35, 36; Acts 7:6, 7] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'As for you, you shall [die and] go to your fathers in peace; you shall be buried at a good old age. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was fulfilled when Moses led the Israelites back to Canaan after their four hundred years in Egypt. He was “in the fourth generation” from Jacob—Levi, Kohath, Amram, Moses.
      marker-yv: yv-n
    - type: text
      text: 'fourth generation your descendants shall return here [to Canaan, the land of promise], for the wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The most important and powerful group of that region. The name “Amorite” later became virtually synonymous with that of the inhabitants of Canaan. They were known for their many superstitious practices (according to the Talmud).
      marker-yv: yv-n
    - type: text
      text: Amorites is not yet complete (finished).” [Josh 24:15]
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'When the sun had gone down and a [deep] darkness had come, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there appeared
    - type: text
      text: ' a smoking '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a large bowl or pan holding burning coals.
      marker-yv: yv-n
    - type: text
      text: 'brazier and a flaming torch which passed between the [divided] pieces [of the animals]. [Jer 34:18, 19] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On the same day the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' made a covenant (promise, pledge) with Abram, saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To your descendants I have given this land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the river of Egypt to the great river Euphrates—
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '[the land of] the Kenites and the Kenizzites and the Kadmonites '
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Abram said, “Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH
        - type: text
          text: ', usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reward
    - type: text
      text: ' will You give me, since I am [leaving this world] childless, and he who will be the owner '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heir of my house is this [servant] Eliezer from Damascus?” '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and the Hittites and the Perizzites and the Rephaim, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: the Amorites and the Canaanites and the Girgashites and the Jebusites.”
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And Abram continued, “Since You have given no child to me, one (a servant) born in my house is my heir.” '
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then behold, the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to him, saying, “This man [Eliezer] will not be your heir but he who shall come from your own body shall be your heir.” '
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' brought Abram outside [his tent into the night] and said, “Look now toward the heavens and count the stars—if you are able to count them.” Then He said to him, “So [numerous] shall your descendants be.” [Heb 11:12] '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then Abram believed in (affirmed, trusted in, relied on, remained steadfast to) the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; and He counted (credited) it to him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was crucial to God’s plan of salvation, as can be seen in Rom 4. There was simply no way that anyone except Christ could ever be sufficiently righteous to meet God’s standards and avoid condemnation. Having faith in God and placing one’s trust in Him was not in itself something that could be a substitute for perfect righteousness, but God graciously determined to accept faith as an equivalent for that righteousness nonetheless. So in a sense, Abraham—and all believers since him, who are his spiritual descendants—received righteousness on credit, and the bill for that righteousness was paid by the death of Christ on the cross.
      marker-yv: yv-n
    - type: text
      text: 'as righteousness (doing right in regard to God and man). [Rom 4:3, 18-22; Gal 3:6; James 2:23] '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And He said to him, “I am the [same] L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who brought you out of Ur of the Chaldeans, to give you this land as an inheritance.” '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Abram said, “Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH
        - type: text
          text: ', usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', by what [proof] will I know that I will inherit it?” '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So God said to him, “Bring Me a three-year-old heifer, a three-year-old female goat, a three-year-old ram, a turtledove, and a young pigeon.” '
