    content: 'But on that nation whom your descendants will serve I will bring judgment, and afterward they will come out [of that land] with great possessions. [Ex 12:35, 36; Acts 7:6, 7] '
  '15':
  - type: text
    content: 'As for you, you shall [die and] go to your fathers in peace; you shall be buried at a good old age. '
