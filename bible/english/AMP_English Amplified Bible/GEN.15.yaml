  '12':
  - type: text
    content: 'When the sun was setting, a deep sleep overcame Abram; and a horror (terror, shuddering fear, nightmare) of great darkness overcame him. '
  '13':
  - type: text
    content: God
  - type: text
    content: ' said to Abram, “Know for sure that your descendants will be strangers [living temporarily] in a land (Egypt) that is not theirs, where they will be enslaved and oppressed for four hundred years. [Ex 12:40] '
  '14':
