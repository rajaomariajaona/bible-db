    content: 'So Abram brought all these to Him and '
  - type: note
    content: This was preparation for an ancient ceremony that formally bound two parties to an agreement or covenant (v 18). Reference is made to the ceremony in Jer 34:18, but details are not given elsewhere in Scripture.
