  '3':
  - type: text
    content: 'And Abram continued, “Since You have given no child to me, one (a servant) born in my house is my heir.” '
  '4':
  - type: text
    content: Then behold, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to him, saying, “This man [Eliezer] will not be your heir but he who shall come from your own body shall be your heir.” '
  '5':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' brought Abram outside [his tent into the night] and said, “Look now toward the heavens and count the stars—if you are able to count them.” Then He said to him, “So [numerous] shall your descendants be.” [Heb 11:12] '
  '6':
  - type: text
    content: Then Abram believed in (affirmed, trusted in, relied on, remained steadfast to) the L
  - type: heading
    content: ord
  - type: text
    content: '; and He counted (credited) it to him '
  - type: note
    content: This was crucial to God’s plan of salvation, as can be seen in Rom 4. There was simply no way that anyone except Christ could ever be sufficiently righteous to meet God’s standards and avoid condemnation. Having faith in God and placing one’s trust in Him was not in itself something that could be a substitute for perfect righteousness, but God graciously determined to accept faith as an equivalent for that righteousness nonetheless. So in a sense, Abraham—and all believers since him, who are his spiritual descendants—received righteousness on credit, and the bill for that righteousness was paid by the death of Christ on the cross.
  - type: text
    content: 'as righteousness (doing right in regard to God and man). [Rom 4:3, 18-22; Gal 3:6; James 2:23] '
  '7':
