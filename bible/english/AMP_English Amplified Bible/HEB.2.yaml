  '14':
  - type: text
    content: 'Therefore, since [these His] children share in flesh and blood [the physical nature of mankind], He Himself in a similar manner also shared in the same [physical nature, but without sin], so that through [experiencing] death He might make powerless (ineffective, impotent) him who had the power of death—that is, the devil— '
  '15':
  - type: text
    content: 'and [that He] might free all those who through [the haunting] fear of death were held in slavery throughout their lives. '
  '16':
  - type: text
    content: 'For, as we all know, He (Christ) does not take hold of [the fallen] angels [to give them a helping hand], but He does take hold of [the fallen] descendants of Abraham [extending to them His hand of deliverance]. [Is 41:8, 9] '
