  - type: text
    text: 'Therefore, since [these His] children share in flesh and blood [the physical nature of mankind], He Himself in a similar manner also shared in the same [physical nature, but without sin], so that through [experiencing] death He might make powerless (ineffective, impotent) him who had the power of death—that is, the devil— '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and [that He] might free all those who through [the haunting] fear of death were held in slavery throughout their lives. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For, as we all know, He (Christ) does not take hold of [the fallen] angels [to give them a helping hand], but He does take hold of [the fallen] descendants of Abraham [extending to them His hand of deliverance]. [Is 41:8, 9] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it was essential that
  - type: text
    text: ' He had to be made like His brothers (mankind) in every respect, so that He might [by experience] become a merciful and faithful High Priest in things related to God, to make atonement (propitiation) for the people’s sins [thereby wiping away the sin, satisfying divine justice, and providing a way of reconciliation between God and mankind]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Because He Himself [in His humanity] has suffered in being tempted, He is able to help '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' provide immediate assistance to those who are being tempted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exposed to suffering.'
