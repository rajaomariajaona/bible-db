  '9':
  - type: text
    content: But we do see Jesus, who was made lower than the angels for a little while [by taking on the limitations of humanity], crowned with glory and honor because of His suffering of death, so that by the grace of God [extended to sinners] He might experience death for [the sins of] everyone.
