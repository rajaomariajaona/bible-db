document_id: ECC.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Futility of Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'There is an evil which I have seen under the sun, and it weighs heavily on men: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Whatever exists has already been named [long ago], and it is known what [a frail being] man is; for he cannot dispute with Him who is mightier than he. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For there are many other words that increase futility. What then is the advantage for a man? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For who [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The narrator is trying to prove that life is not worth living, but the Holy Spirit is using him to show that these conclusions are the tragic effect of living “under the sun”—ignoring the Lord, living apart from God the Father, oblivious to the Holy Spirit—and yet face to face with the mysteries of life and nature.
      marker-yv: yv-n
    - type: text
      text: limited by human wisdom] knows what is good for man during his lifetime, during the few days of his futile life? He spends them like a shadow [staying busy, but achieving nothing of lasting value]. For who can tell a man what will happen after him [to his work, his treasure, his plans] under the sun [after his life is over]?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'a man to whom God has given riches and wealth and honor, so that he lacks nothing of all that he desires, yet God has not given him the power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' capacity to enjoy them [all those things which are gifts from God], but a stranger [in whom he has no interest succeeds him and] enjoys them. This is vanity and it is a [cause of] great distress. [Luke 12:20] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If a man fathers a hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: children
    - type: text
      text: ' and lives many years, however many they may be, but his soul is not satisfied with good things and he is not respected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is not given a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: proper
    - type: text
      text: ' burial [he is not laid to rest in the sepulcher of his fathers], then I say, “Better the miscarriage than he, [Job 3:16] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'for the miscarriage comes in futility (in vain) and passes into obscurity; and its name is covered in obscurity. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It has not seen the sun nor had any knowledge; yet it has more rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is better off than he. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Even if the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' man lives a thousand years twice over and yet has seen no good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' experienced no enjoyment—do not both go to one place [the grave]?”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'All the labor of man is for his mouth [for self-preservation and enjoyment], and yet the desire [of his soul] is not satisfied. [Prov 16:26] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For what advantage has the wise man over the fool [for being worldly-wise is not the secret to happiness]? What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: advantage
    - type: text
      text: ' has the poor man who has learned how to walk [publicly] among the living [with men’s eyes on him; for being poor is not the secret to happiness either]? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: What the eyes see [enjoying what is available] is better than [craving] what the soul desires. This too is futility and chasing after the wind.
