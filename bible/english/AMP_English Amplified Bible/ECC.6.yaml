verses:
  '1':
  - type: heading
    content: The Futility of Life
  - type: text
    content: 'There is an evil which I have seen under the sun, and it weighs heavily on men: '
  '10':
  - type: text
    content: 'Whatever exists has already been named [long ago], and it is known what [a frail being] man is; for he cannot dispute with Him who is mightier than he. '
  '11':
  - type: text
    content: 'For there are many other words that increase futility. What then is the advantage for a man? '
  '12':
  - type: text
    content: For who [
  - type: note
    content: The narrator is trying to prove that life is not worth living, but the Holy Spirit is using him to show that these conclusions are the tragic effect of living “under the sun”—ignoring the Lord, living apart from God the Father, oblivious to the Holy Spirit—and yet face to face with the mysteries of life and nature.
  - type: text
    content: limited by human wisdom] knows what is good for man during his lifetime, during the few days of his futile life? He spends them like a shadow [staying busy, but achieving nothing of lasting value]. For who can tell a man what will happen after him [to his work, his treasure, his plans] under the sun [after his life is over]?
  '2':
  - type: text
    content: 'a man to whom God has given riches and wealth and honor, so that he lacks nothing of all that he desires, yet God has not given him the power '
  - type: text
    content: or
  - type: text
    content: ' capacity to enjoy them [all those things which are gifts from God], but a stranger [in whom he has no interest succeeds him and] enjoys them. This is vanity and it is a [cause of] great distress. [Luke 12:20] '
  '3':
  - type: text
    content: 'If a man fathers a hundred '
  - type: text
