  - type: text
    content: ' experienced no enjoyment—do not both go to one place [the grave]?”'
  '7':
  - type: text
    content: 'All the labor of man is for his mouth [for self-preservation and enjoyment], and yet the desire [of his soul] is not satisfied. [Prov 16:26] '
  '8':
  - type: text
    content: 'For what advantage has the wise man over the fool [for being worldly-wise is not the secret to happiness]? What '
  - type: text
    content: advantage
  - type: text
    content: ' has the poor man who has learned how to walk [publicly] among the living [with men’s eyes on him; for being poor is not the secret to happiness either]? '
  '9':
  - type: text
    content: What the eyes see [enjoying what is available] is better than [craving] what the soul desires. This too is futility and chasing after the wind.
