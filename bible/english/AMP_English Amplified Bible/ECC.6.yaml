  - type: text
    content: proper
  - type: text
    content: ' burial [he is not laid to rest in the sepulcher of his fathers], then I say, “Better the miscarriage than he, [Job 3:16] '
  '4':
  - type: text
    content: 'for the miscarriage comes in futility (in vain) and passes into obscurity; and its name is covered in obscurity. '
  '5':
  - type: text
    content: 'It has not seen the sun nor had any knowledge; yet it has more rest '
  - type: text
