  - type: text
    content: Therefore a strong people will honor You;
  - type: text
    content: 'Cities of terrible '
  - type: text
    content: and
  - type: text
    content: ' violent nations will fear You.'
  '4':
  - type: text
    content: For You have been a stronghold for the helpless,
  - type: text
