  - type: text
    content: ' long, long ago, [fulfilled] with perfect faithfulness.'
  '10':
  - type: text
    content: For the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' will rest on this mountain [Zion],'
  - type: text
    content: And Moab will be trampled down in his place
  - type: text
