document_id: ISA.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Song of Praise for God’s Favor
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You are my God;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will exalt You, I will praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to Your name;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You have done miraculous things,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Plans '
  - type: usfm
    marker: it
    children:
    - type: text
      text: formed
  - type: text
    text: ' long, long ago, [fulfilled] with perfect faithfulness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For You have made a city into a heap [of trash],
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fortified city into a ruin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A palace of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: strangers
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: foreigners is no longer a city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will never be rebuilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore a strong people will honor You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Cities of terrible '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' violent nations will fear You.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For You have been a stronghold for the helpless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A stronghold for the poor in his distress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A shelter from the storm, a shade from the heat;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the breath of tyrants
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Is like a rainstorm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against
  - type: text
    text: ' a wall.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Like heat in a dry land, You will subdue the noise of foreigners [rejoicing over their enemies];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like heat in the shadow of a cloud, the song of the tyrants is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: humbled
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: silenced.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶On this mountain [Zion] the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will prepare a lavish banquet for all peoples [to welcome His reign on earth],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A banquet of aged wines—choice pieces [flavored] with marrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of refined, aged wines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And on this mountain He will destroy the covering that is [cast] over all peoples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the veil [of death] that is woven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spread over all the nations.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He will swallow up death [and abolish it] for all time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' will wipe away tears from all faces,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He will take away the disgrace of His people from all the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken. [1 Cor 15:26, 54; 2 Tim 1:10]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It will be said in that day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Indeed, this is our God for whom we have waited that He would save us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for whom we have waited;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let us shout for joy and rejoice in His salvation.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will rest on this mountain [Zion],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Moab will be trampled down in his place
- type: usfm
  marker: q1
  children:
  - type: text
    text: As straw is trampled down in the [filthy] water of a manure pile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And Moab will spread out his hands in the middle of the filth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As a swimmer spreads out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his hands
  - type: text
    text: ' to swim,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Lord
  - type: text
    text: ' will humiliate his pride in spite of the [skillful] movements of his hands.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The high fortifications of your walls He will bring down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lay low, and cast to the ground, to the dust.
