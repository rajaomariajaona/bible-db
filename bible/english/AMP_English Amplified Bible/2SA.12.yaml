        text: '12:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. about 75 lbs. If the crown actually weighed 75 lbs. it must have been used primarily as a decorative symbol of power.
    marker-yv: yv-n
  - type: text
    text: 'talent of gold, and [set in it was] a precious stone; and it was '
  - type: usfm
