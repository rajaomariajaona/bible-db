    - type: text
      text: and
  - type: text
    text: ' under your protection, and I gave you the house (royal dynasty) of Israel and of Judah; and if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that had been
  - type: text
    text: ' too little, I would have given you much more! '
  - type: usfm
