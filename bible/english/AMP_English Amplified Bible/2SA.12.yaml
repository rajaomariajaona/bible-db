        text: The modern city of Amman, Jordan, is located approximately on the same site as Rabbah.
    marker-yv: yv-n
  - type: text
    text: 'Rabbah of the Ammonites and captured the royal city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Joab sent messengers to David and said, “I have fought against Rabbah; I have even taken the city of waters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So now, assemble the rest of the men, and camp against the city and capture it, or I will take the city myself, and it will be named after me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So David gathered all the men together and went to Rabbah, then fought against it and captured it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And he took the crown of their king from his head; it weighed a '
