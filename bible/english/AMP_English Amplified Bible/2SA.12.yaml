    children:
    - type: text
      text: Loss of a Child
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: A
  - type: text
    text: nd the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' struck the child that Uriah’s widow bore to David, and he was very sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'David therefore appealed to God for the child [to be healed]; and David fasted and went in and lay all night on the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The elders of his household stood by him [in the night] to lift him up from the ground, but he was unwilling [to get up] and would not eat food with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then it happened on the seventh day that the child died. David’s servants were afraid to tell him that the child was dead, for they said, “While the child was still alive, we spoke to him and he would not listen to our voices. How then can we tell him the child is dead, since he might harm himself [or us]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But when David saw that his servants were whispering to one another, he realized that the child was dead. So David said to them, “Is the child dead?” And they said, “He is dead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then David got up from the ground, washed, anointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: himself
  - type: text
    text: ' [with olive oil], changed his clothes, and went into the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and worshiped. Then he came [back] to his own house, and when he asked, they set food before him and he ate.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then his servants said to him, “What is this thing that you have done? While the child was alive you fasted and wept, but when the child died, you got up and ate food.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: David said, “While the child was still alive, I fasted and wept; for I thought, ‘Who knows, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' may be gracious to me and the child may live.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But now he is dead; why should I [continue to] fast? Can I bring him back again? I will go to him [when I die], but he will not return to me.”
- type: usfm
