  - type: text
    text: ' on David’s head. And he brought the spoil out of the city in great amounts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He also brought out the people who were there, and put them to [work with] the saws and sharp iron instruments and iron axes, and made them work at the brickkiln. And he did this to all the Ammonite cities. Then David and all the men returned to Jerusalem.
