    children:
    - type: text
      text: '9'
  - type: text
    text: Why have you despised the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' by doing evil in His sight? You have struck down Uriah the Hittite with the sword and have taken his wife to be your wife. You have killed him with the sword of the Ammonites. [Lev 20:10; 24:17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now, therefore, the sword shall never depart from your house, because you have despised Me and have taken the wife of Uriah the Hittite to be your wife.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘Behold, I will stir up evil against you from your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This prophesy was fulfilled by David’s lawless children: Amnon’s attack on his half-sister Tamar (13:14) and his subsequent murder by his half-brother Absalom (13:28, 29); Absalom’s escape to a foreign land (13:38) and his three years in exile, followed by his estrangement from David for two more years (14:28); Absalom’s deliberate, rebellious attempt to win the hearts of the people and supplant his father (15:6); David’s flight from Jerusalem, with the mass of the people against him (15:14), the terrible battle in the forest of Ephraim, won by David’s forces, with Absalom killed in flight (18:6). David’s heartbreak is echoed repeatedly in the history of these tragedies (2 Sam 13:1; 19:4) and in some of his psalms. Even when David was dying, his son Adonijah was attempting to usurp the throne, and was later executed as a traitor (1 Kin 1:5; 2:25).'
    marker-yv: yv-n
  - type: text
