  '16':
  - type: text
    content: 'David therefore appealed to God for the child [to be healed]; and David fasted and went in and lay all night on the ground. '
  '17':
  - type: text
    content: 'The elders of his household stood by him [in the night] to lift him up from the ground, but he was unwilling [to get up] and would not eat food with them. '
  '18':
  - type: text
    content: 'Then it happened on the seventh day that the child died. David’s servants were afraid to tell him that the child was dead, for they said, “While the child was still alive, we spoke to him and he would not listen to our voices. How then can we tell him the child is dead, since he might harm himself [or us]?” '
  '19':
  - type: text
    content: 'But when David saw that his servants were whispering to one another, he realized that the child was dead. So David said to them, “Is the child dead?” And they said, “He is dead.” '
