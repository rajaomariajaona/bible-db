  - type: note
    content: 'This prophesy was fulfilled by David’s lawless children: Amnon’s attack on his half-sister Tamar (13:14) and his subsequent murder by his half-brother Absalom (13:28, 29); Absalom’s escape to a foreign land (13:38) and his three years in exile, followed by his estrangement from David for two more years (14:28); Absalom’s deliberate, rebellious attempt to win the hearts of the people and supplant his father (15:6); David’s flight from Jerusalem, with the mass of the people against him (15:14), the terrible battle in the forest of Ephraim, won by David’s forces, with Absalom killed in flight (18:6). David’s heartbreak is echoed repeatedly in the history of these tragedies (2 Sam 13:1; 19:4) and in some of his psalms. Even when David was dying, his son Adonijah was attempting to usurp the throne, and was later executed as a traitor (1 Kin 1:5; 2:25).'
