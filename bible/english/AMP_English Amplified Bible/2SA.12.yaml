    children:
    - type: text
      text: '13'
  - type: text
    text: David said to Nathan, “I have sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” And Nathan said to David, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' also has allowed your sin to pass [without further punishment]; you shall not die. [Ps 51] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nevertheless, because by this deed you have given [a great] opportunity to the enemies of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to blaspheme [Him], the son that is born to you shall certainly die.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Nathan went [back] to his home.
- type: usfm
  marker: s1
  children:
  - type: usfm
