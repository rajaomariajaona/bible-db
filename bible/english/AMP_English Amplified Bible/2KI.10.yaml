document_id: 2KI.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment upon Ahab’s House
  - type: text
    content: 'Ahab had seventy sons [and grandsons] in Samaria. So Jehu wrote letters and sent them to Samaria, to the rulers of Jezreel, to the elders, and to the guardians of '
  - type: text
    content: the children of
  - type: text
    content: ' Ahab, saying, '
  '10':
  - type: text
    content: Know then [without any doubt] that there shall fall to the earth nothing of the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', which the L'
  - type: heading
    content: ord
  - type: text
    content: ' spoke concerning the house of Ahab, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' has done what He said '
  - type: note
    content: Lit by the hand.
  - type: text
    content: 'through His servant Elijah.” [1 Kin 19:17] '
  '11':
  - type: text
    content: So Jehu killed all who remained of the house of Ahab in Jezreel, and all his great men and his familiar friends and his priests, until he left him without a survivor.
  '12':
  - type: text
    content: 'And he set out and went to Samaria. On the way as he was at the '
  - type: note
    content: Or Beth-eked.
  - type: text
    content: 'place of the sand heaps [meeting place] for the shepherds, '
  '13':
  - type: text
    content: 'Jehu met the relatives of Ahaziah king of Judah and said, “Who are you?” They answered, “We are the relatives of Ahaziah; and we came down to greet the royal princes and the sons of the queen mother [Jezebel].” '
  '14':
  - type: text
    content: Then Jehu said, “Take them alive.” So they took them alive and [later] slaughtered them at the well by the place of the sand heaps, forty-two men; he left none of them [alive].
  '15':
  - type: text
    content: 'When Jehu went on from there, he met Jehonadab the son of Rechab '
  - type: text
    content: coming
  - type: text
    content: ' to meet him. He greeted him and said to him, “Is your heart right, as my heart is with yours?” Jehonadab answered, “It is.” '
  - type: text
    content: Jehu said
  - type: text
    content: ' “If it is, give me your hand.” He gave him his hand, and Jehu pulled him up into the chariot. '
  '16':
  - type: text
    content: And he said, “Come with me and see my zeal for the L
  - type: heading
    content: ord
  - type: text
    content: '.” So he had Jehonadab in his chariot. '
  '17':
  - type: text
    content: When Jehu came to Samaria, he killed everyone who remained of Ahab’s family in Samaria, until he had destroyed all of them, in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He spoke to Elijah.'
  - type: heading
    content: Jehu Destroys Baal Worshipers
  '18':
  - type: text
    content: 'Jehu assembled all the people and said [in pretense] to them, “Ahab served Baal a little; Jehu will serve him much [more]. '
  '19':
  - type: text
    content: 'Now, summon unto me all the prophets of Baal, all his worshipers and all his priests. Let no one be missing, for I have a great sacrifice for Baal; whoever is missing shall not live.” But Jehu did it with trickery, in order to destroy the worshipers of Baal. '
  '2':
  - type: text
    content: '“Now as soon as this letter comes to you, since your master’s sons (male descendants) are with you, as well as chariots and horses and a fortified city and weapons, '
  '20':
  - type: text
    content: 'Jehu said, “Consecrate a festive assembly (celebration) for Baal.” And they proclaimed it. '
  '21':
  - type: text
    content: 'Then Jehu sent throughout Israel, and all the worshipers of Baal came; there was no one left who did not come. They went to the house (temple) of Baal, and the house of Baal was filled from one end to the other. '
  '22':
  - type: text
    content: 'He said to the man in charge of the wardrobe, “Bring out garments for all the worshipers of Baal.” And he brought the garments out to them. '
  '23':
  - type: text
    content: Then Jehu with Jehonadab the son of Rechab went into the house of Baal; and he said to the worshipers of Baal, “Search carefully and see that there are no servants of the L
  - type: heading
    content: ord
  - type: text
    content: ' here with you, but only the worshipers of Baal.” '
  '24':
  - type: text
    content: Then they went in to offer sacrifices and burnt offerings.
  - type: text
    content: N
  - type: text
    content: ow Jehu had stationed eighty men outside for himself and said, “If any of the men whom I have brought into your hands escape, the one who lets him go shall forfeit his own life for that man’s life.”
  '25':
  - type: text
    content: 'Then it came about, as soon as he had finished offering the burnt offering, that Jehu said to the guards and to the royal officers, “Go in and kill them; let no one come out.” And they killed them with the edge of the sword; and the guard and the royal officers threw '
  - type: text
    content: their bodies
  - type: text
    content: ' out, and went to the inner room of the house of Baal. '
  '26':
  - type: text
    content: 'They brought out the '
  - type: text
    content: sacred
  - type: text
    content: ' pillars (obelisks) of the house of Baal and burned them. '
  '27':
  - type: text
    content: 'They also tore down the '
  - type: text
    content: sacred
  - type: text
    content: ' pillar of Baal and tore down the house of Baal, and made it into a latrine [forever unclean] '
  - type: note
    content: I.e. to the date of this writing.
  - type: text
    content: to this day.
  '28':
  - type: text
    content: 'Thus Jehu eradicated Baal from Israel. '
  '29':
  - type: text
    content: 'However, Jehu did not turn from the [idolatrous] sins of Jeroboam the son of Nebat, who made Israel sin, that is, [led them to worship] the golden calves which were at Bethel and Dan. [1 Kin 12:28ff] '
  '3':
  - type: text
    content: 'select the best and most capable of your master’s sons, and set him on his father’s throne, and fight for your master’s [royal] house.” '
  '30':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Jehu, “Because you have done well in executing what is right in My eyes, and have done to the house of Ahab in accordance with everything that was in My heart, '
  - type: note
    content: 'The descendants of Jehu: Jehoahaz, Jehoash (Joash), Jeroboam II, and Zechariah, ruled nearly a hundred years.'
  - type: text
    content: 'your sons (descendants) shall sit on Israel’s throne to the fourth generation.” [2 Kin 15:12] '
  '31':
  - type: text
    content: But Jehu did not take care to walk in the law of the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, with all his heart; he did not turn from the sins of Jeroboam, who made Israel sin.'
  '32':
  - type: text
    content: ' '
  - type: text
    content: So
  - type: text
    content: ' in those days the L'
  - type: heading
    content: ord
  - type: text
    content: ' began to cut off '
  - type: text
    content: portions
  - type: text
    content: ' of Israel; Hazael [of Aram] defeated them throughout the territory of Israel: '
  '33':
  - type: text
    content: from the Jordan eastward, all the land of Gilead, the Gadites and the Reubenites and the Manassites, from Aroer, which is by the Arnon River, even Gilead and Bashan.
  - type: heading
    content: Jehoahaz Succeeds Jehu
  '34':
  - type: text
    content: 'Now the rest of the acts of Jehu and everything that he did and all his might, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '35':
  - type: text
    content: 'Jehu slept with his fathers [in death], and they buried him in Samaria. Jehoahaz his son became king in his place. '
  '36':
  - type: text
    content: The time that Jehu reigned over Israel in Samaria was twenty-eight years.
  '4':
  - type: text
    content: 'But they were extremely afraid and said, “Look, the two kings did not stand before Jehu; so how can we stand?” '
  '5':
  - type: text
    content: 'And the one who was in charge of the household, and the one who was overseer of the city, the elders, and the guardians [of the children] sent '
  - type: text
    content: word
  - type: text
    content: ' to Jehu, saying, “We are your servants and we will do whatever you tell us, '
  - type: text
    content: but
  - type: text
    content: ' we will not make any man king; do what is good in your eyes.” '
  '6':
  - type: text
    content: 'Then Jehu wrote a second letter to them, saying, “If you are with me and will obey me, take the heads of your master’s '
  - type: note
    content: The relative of one who had been killed had the right to avenge the death by killing the guilty person (Num 35:12).
  - type: text
    content: 'sons, and come to me at Jezreel tomorrow about this time.” Now the [dead] king’s sons, seventy persons, were with the great men of the city, who were rearing them. '
  '7':
  - type: text
    content: 'When the letter came to them, they took the king’s sons and slaughtered them, seventy persons, and put their heads in baskets, and sent them to Jehu at Jezreel. '
  '8':
  - type: text
    content: 'When a messenger came and told him, “They have brought the heads of the king’s sons,” he said, “Put them in two heaps at the entrance of the city gate until morning.” '
  '9':
  - type: text
    content: 'The next morning he went out and stood and said to all the people, “You are just '
  - type: text
    content: and
  - type: text
    content: ' innocent; behold, I conspired against [Joram] my master and killed him, but who killed all these? '
