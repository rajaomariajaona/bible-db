document_id: LEV.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Law of Cleansing a Leper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This shall be the law of the leper on the day of his [ceremonial] cleansing. He shall be brought to the priest [at a meeting place outside the camp]; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the priest shall go out of the camp [to meet him]; and the priest shall examine him, and if the leper has been healed of the infection of leprosy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'then the priest shall give orders to take two live clean birds and cedar wood and scarlet string and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an aromatic plant.
    marker-yv: yv-n
  - type: text
    text: 'hyssop for the one to be cleansed. [Heb 9:19-22] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Next the priest shall order that one of the birds be killed [as a sacrifice] in an earthenware container over [fresh] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: living,
      - type: text
        text: ' an ancient concept probably based on motion as an indicator of life.'
    marker-yv: yv-n
  - type: text
    text: 'running water. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'As for the live bird, he shall take it together with the cedar wood and the scarlet string and the hyssop, and shall dip them and the live bird in the blood of the bird sacrificed over the running water. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He shall sprinkle [the blood] seven times on the one to be cleansed from the leprosy and shall pronounce him [ceremonially] clean. Then he shall let the live bird go free over the open field. [Heb 9:13-15] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The one to be cleansed shall wash his clothes, shave off all his hair, and bathe in water; and he shall be clean. After that he may come into the camp, but he shall stay outside of his tent for seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On the seventh day he shall shave off all his hair: he shall shave his head and his beard and his eyebrows, even all his hair [on his body]. Then he shall wash his clothes and bathe his body in water, and be clean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Now on the eighth day he shall take two male lambs without blemish, and a yearling ewe lamb without blemish, and three-tenths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of an ephah
  - type: text
    text: ' of fine flour mixed with [olive] oil as a grain offering, and one log (about a pint) of oil; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and the priest who cleanses him shall present the man to be cleansed and his offerings before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at the doorway of the Tent of Meeting. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the priest shall take one of the male lambs and offer it as a guilt offering, with the log of oil, and present them as a wave offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He shall kill the male lamb in the place where they kill the sin offering and the burnt offering, in the sacred place [the courtyard of the tabernacle]; for the guilt offering, like the sin offering, belongs to the priest; it is most holy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The priest shall take some of the blood of the guilt offering and put it on the lobe of the right ear of the one to be cleansed, and on the thumb of his right hand, and on the big toe of his right foot. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The priest shall also take some of the log of oil, and pour it into the palm of his own left hand; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: and the priest shall dip his right finger in the oil that is in his left palm, and with his finger sprinkle some of the oil seven times before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Of the rest of the oil which is in his palm, the priest shall put some on the lobe of the right ear of the one to be cleansed, and on the thumb of his right hand, and on the big toe of his right foot, on top of the blood of the guilt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The remaining oil that is in the priest’s palm shall be put on the head of the one to be cleansed. The priest shall make atonement for him before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Next the priest shall offer the sin offering and make atonement for the one to be cleansed from his uncleanness, and afterward kill the burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The priest shall offer the burnt offering and the grain offering on the altar; and the priest shall make atonement for him, and he shall be clean.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“But if the cleansed leper is poor and his means are insufficient, then he is to take one lamb as a guilt offering to be waved to make atonement for him, and one tenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of an ephah
  - type: text
    text: ' of fine flour mixed with oil as a grain offering, and a log of oil, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'and two turtledoves or two young pigeons, such as he can afford, one shall be a sin offering, the other a burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He shall bring them on the eighth day for his [ceremonial] cleansing to the priest at the doorway of the Tent of Meeting, before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The priest shall take the lamb of the guilt offering, and the log of oil, and shall present them as a wave offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Next he shall kill the lamb of the guilt offering; and the priest is to take some of the blood of the guilt offering and put it on the lobe of the right ear of the one to be cleansed, and on the thumb of his right hand, and on the big toe of his right foot. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The priest shall pour some of the oil into his left palm, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: and with his right finger the priest shall sprinkle some of the oil that is in his left palm seven times before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The priest shall put some of the oil in his palm on the lobe of the right ear of the one to be cleansed, and on the thumb of his right hand, and on the big toe of his right foot, on the places where he has put the blood of the guilt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The rest of the oil that is in the priest’s palm shall be put on the head of the one to be cleansed, to make atonement for him before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then he shall offer one of the turtledoves or young pigeons, which are within his means. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: it
    children:
    - type: text
      text: He shall offer
  - type: text
    text: ' what he can afford, one as a sin offering and the other as a burnt offering, together with the grain offering. The priest shall make atonement before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' on behalf of the one to be cleansed. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'This is the law for the one in whom there is an infection of leprosy, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: whose hand does not reach
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: whose means are limited for his [ceremonial] cleansing.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Cleansing an Infected House
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' further spoke to Moses and Aaron, saying,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“When you come into the land of Canaan, which I am giving you as a possession, and I put '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly mildew or mold, and so throughout the chapter. See 13:47-59 for similar instructions regarding fabric, leather, and other articles.
    marker-yv: yv-n
  - type: text
    text: 'a mark of leprosy on a house in your land, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'then the one who owns the house shall come and tell the priest, ‘I have seen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: something that looks like
  - type: text
    text: ' a mark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of leprosy
  - type: text
    text: ' in my house.’ '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The priest shall order that they empty the house before he goes in to examine the mark, so that everything in the house will not have to be declared unclean; afterward he shall go in to see the house. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He shall examine the mark, and if the mark on the walls of the house has greenish or reddish depressions and appears deeper than the surface, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'the priest shall go out of the house, to the doorway, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: isolate
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'quarantine the house for seven days. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The priest shall return on the seventh day and look; and if the mark has spread on the walls of the house, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'he shall order them to tear out the contaminated stones and throw them into an unclean place outside the city. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'He shall have the entire inside area of the house scraped, and the plaster that is scraped off shall be dumped in an unclean place outside the city. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Then they shall take new stones and replace the [contaminated] stones, and he shall take plaster and replaster the house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '“If, however, the mark breaks out again in the house after he has removed the stones and has scraped and replastered the house, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'then the priest shall come and look '
  - type: usfm
    marker: it
    children:
    - type: text
      text: again
  - type: text
    text: ', and if the mark has spread in the house, it is a malignant leprosy in the house; it is [ceremonially] unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'He shall tear down the house—its stones and its timber and all the plaster of the house—and shall take '
  - type: usfm
    marker: it
    children:
    - type: text
      text: everything
  - type: text
    text: ' outside the city to an unclean place. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Moreover, whoever goes into the house during the time that it is quarantined becomes unclean until evening. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: And whoever lies down in the house [to rest] shall wash his clothes, and whoever eats in the house shall wash his clothes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: '“But if the priest comes in and inspects it and the mark has not spread in the house after the house has been replastered, he shall pronounce the house clean because the mark has not reappeared. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'To cleanse the house then, he shall take two birds and cedar wood and scarlet string and hyssop; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'and he shall kill one of the birds in an earthenware container over running water, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'and he shall take the cedar wood and the hyssop and the scarlet string, and the living bird, and dip them in the blood of the slain bird as well as in the running water, and sprinkle the house seven times. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'So he shall cleanse the house with the blood of the bird and with the running water, along with the live bird and the cedar wood and the hyssop and the scarlet string. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: But he shall let the live bird go free outside the city into the open field. So he shall make atonement for the house, and it will be clean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'This is the law for any mark of leprosy—even for a scale, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'and for the leprous garment or house, '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'and for a swelling, and for a scab, and for a bright spot on the skin— '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: to teach when they are unclean and when they are clean. This is the law of leprosy [in regard to both persons and property].
