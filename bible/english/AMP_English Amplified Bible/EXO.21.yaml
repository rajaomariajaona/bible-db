document_id: EXO.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ordinances for the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Now these are the ordinances (laws) which you shall set before the Israelites:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“If you purchase a Hebrew servant [because of his debt or poverty], he shall serve six years, and in the seventh [year] he shall leave as a free man, paying nothing. [Lev 25:39] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'If he came [to you] alone, he shall leave alone; if he came married, then his wife shall leave with him. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If his master gives him a wife, and she gives birth to sons or daughters, the wife and her children shall belong to her master, and he shall leave [your service] alone. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if the servant plainly says, ‘I love my master, my wife and my children; I will not leave as a free man,’ '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: then his master shall bring him to God [that is, to the judges who act in God’s name], then he shall bring him to the door or doorpost. And his master shall pierce his ear with an awl (strong needle); and he shall serve him for life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“If a man sells his daughter to be a female servant, she shall not go free [after six years] as male servants do. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If she does not please her master who has chosen her for himself [as a wife], he shall let her be redeemed [by her family]. He does not have the authority to sell her to a foreign people, because he has been unfair to her. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If her master chooses her [as a wife] for his son, he shall act toward her as if she were legally his daughter. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If her master marries another wife, he may not reduce her food, her clothing, or her privilege as a wife. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If he does not do these three things for her, then shall she leave free, without '
  - type: usfm
    marker: it
    children:
    - type: text
      text: payment of
  - type: text
    text: ' money.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Personal Injuries
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Whoever strikes a man so that he dies must be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'However, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. if the act causing the death of another was unintentional.
    marker-yv: yv-n
  - type: text
    text: 'if he did not lie in wait [for him], but God allowed him to fall into his hand, then I will establish for you a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. after the children of Israel possessed the promised land, six cities of refuge were established.
    marker-yv: yv-n
  - type: text
    text: 'place to which he may escape [for protection until duly tried]. [Num 35:22-28] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But if a man acts intentionally against another and kills him by [design through] treachery, you are to take him from My altar [to which he may have fled for protection], so that he may be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Whoever strikes his father or his mother must be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Whoever kidnaps a man, whether he sells him or is found with him in his possession, must be put to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Whoever '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The one who dishonors his parents in this way also dishonors God by violating God’s created order of honor.
    marker-yv: yv-n
  - type: text
    text: 'curses his father or his mother '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' treats them contemptuously must be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“If men quarrel and one strikes another with a stone or with his fist, and he does not die but is confined to bed, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: if he gets up and walks around leaning on his cane, then the one who struck him shall be left [physically] unpunished; he must only pay for his loss of time [at work], and the costs [of treatment and recuperation] until he is thoroughly healed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“If a man strikes his male or his female servant with a staff and the servant dies at his hand, he must be punished. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If, however, the servant survives for a day or two, the offender shall not be punished, for the [injured] servant is his own property.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“If men fight with each other and injure a pregnant woman so that she gives birth prematurely [and the baby lives], yet there is no '
  - type: usfm
    marker: it
    children:
    - type: text
      text: further
  - type: text
    text: ' injury, the one who hurt her must be punished with a fine [paid] to the woman’s husband, as much as the judges decide. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But if there is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any further
  - type: text
    text: ' injury, then you shall require [as a penalty] life for life, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The concept of reciprocal punishment for a wrongful injury is applied mainly to special cases not already covered by more complex laws.
    marker-yv: yv-n
  - type: text
    text: 'eye for eye, tooth for tooth, hand for hand, foot for foot, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: burn for burn, wound for wound, bruise for bruise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“If a man hits the eye of his male servant or female servant and it is destroyed, he must let the servant go free because of [the loss of] the eye. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And if he knocks out the tooth of his male servant or female servant, he must let the servant go free because of [the loss of] the tooth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“If an ox gores a man or a woman to death, the ox must be stoned and its meat shall not be eaten; but the owner of the ox shall be cleared [of responsibility]. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But if the ox has tried to gore on a previous occasion, and its owner has been warned, but has not kept it confined and it kills a man or a woman, the ox shall be stoned and its owner shall be put to death as well. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'If a ransom is demanded of him [in return for his life], then he shall give whatever is demanded for the redemption of his life. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'If the ox has gored another’s son or daughter, he shall be dealt with according to this same rule. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: If the ox gores a male or a female servant, the owner shall give to the servant’s master thirty shekels of silver [the purchase price for a slave], and the ox shall be stoned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“If a man leaves a pit open, or digs a pit and does not cover it, and an ox or a donkey falls into it, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: the owner of the pit shall make restitution; he shall give money to the animal’s owner, but the dead [animal] shall be his.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“If one man’s ox injures another’s so that it dies, then they shall sell the live ox and divide the proceeds equally; they shall also divide the dead ox [between them]. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Or if it is known that the ox was previously in the habit of goring, and its owner has not kept it confined, he must make restitution of ox for ox, and the dead [animal] shall be his.
