  - type: text
    content: And tosses me [headlong] into the hands of the wicked.
  '12':
  - type: text
    content: '“I was [living] at ease, but He crushed me '
  - type: text
    content: and
  - type: text
    content: ' broke me apart,'
  - type: text
    content: And He has seized me by the neck and has shaken me to pieces;
  - type: text
    content: He has also set me up as His target.
  '13':
  - type: text
    content: “His arrows surround me.
  - type: text
    content: He pierces my kidneys (vital organs) without mercy;
  - type: text
    content: He pours out my gall on the ground.
  '14':
  - type: text
    content: “He attacks me, making wound after wound;
  - type: text
    content: He runs at me like a warrior.
  '15':
  - type: text
    content: “I have sewed sackcloth over my skin [as a sign of mourning]
  - type: text
    content: And have defiled my horn (symbol of strength) in the dust.
  '16':
  - type: text
    content: '“My face is red '
  - type: text
    content: and
  - type: text
    content: ' swollen with weeping,'
  - type: text
    content: And on my eyelids is the shadow of death [my eyes are dimmed],
  '17':
  - type: text
    content: 'Although there is no violence '
  - type: text
    content: or
  - type: text
    content: ' wrongdoing in my hands,'
  - type: text
    content: And my prayer is pure.
  '18':
  - type: text
    content: ¶“O earth, do not cover my blood,
  - type: text
    content: And let there be no [resting] place for my cry [where it will cease being heard].
  '19':
  - type: text
    content: “Even now, behold, my Witness is in heaven,
  - type: text
    content: And my Advocate [who vouches and testifies for me] is on high. [Rom 1:9]
  '2':
  - type: text
    content: “I have heard many such things;
  - type: text
    content: 'Wearisome '
  - type: text
    content: and
  - type: text
    content: ' miserable comforters are you all.'
  '20':
  - type: text
    content: “My friends are scoffers [who ridicule];
  - type: text
    content: My eye pours out tears to God.
  '21':
  - type: text
    content: '“Oh, that a man would mediate '
  - type: text
    content: and
  - type: text
    content: ' plead with God [for me]'
  - type: text
    content: 'Just as a man [mediates and pleads] with his neighbor '
  - type: text
    content: and
  - type: text
    content: ' friend. [1 Tim 2:5]'
  '22':
  - type: text
    content: “For when a few years are past,
  - type: text
    content: I shall go the way of no return.
  '3':
  - type: text
    content: “Is there no end to [your futile] words of wind?
  - type: text
    content: Or what plagues you [so much] that you [so boldly] answer [me like this]?
  '4':
  - type: text
    content: “I also could speak like you,
  - type: text
    content: If you were in my place;
  - type: text
    content: 'I could compose '
  - type: text
    content: and
  - type: text
    content: ' join words together against you'
  - type: text
    content: And shake my head at you.
  '5':
  - type: text
    content: '“[But instead] I could strengthen '
  - type: text
    content: and
  - type: text
    content: ' encourage you with [the words of] my mouth,'
  - type: text
    content: 'And the consolation '
  - type: text
    content: and
  - type: text
    content: ' solace of my lips would soothe your suffering '
  - type: text
    content: and
  - type: text
    content: ' lessen your anguish.'
  - type: heading
    content: Job Says God Shattered Him
  '6':
  - type: text
    content: ¶“If I speak [to you miserable comforters], my pain is not relieved;
  - type: text
    content: And if I refrain [from speaking], what [pain or anguish] leaves me?
  '7':
  - type: text
    content: “But now God has exhausted me.
  - type: text
    content: 'You [O Lord] have destroyed all my family '
  - type: text
    content: and
  - type: text
    content: ' my household.'
  '8':
  - type: text
    content: '“You have taken a firm hold on me '
  - type: text
    content: and
  - type: text
    content: ' have shriveled me up,'
  - type: text
    content: It has become a witness [against me];
  - type: text
    content: And my leanness [and infirmity] rises up [as evidence] against me,
  - type: text
    content: It testifies to my face [about my guilt].
  '9':
  - type: text
    content: “His wrath has torn me and hunted me down,
  - type: text
    content: He has gnashed at me with his teeth;
  - type: text
    content: 'My adversary sharpens His gaze '
  - type: text
    content: and
  - type: text
    content: ' glares [with piercing eyes] at me.'
