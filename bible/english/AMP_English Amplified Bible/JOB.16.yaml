  - type: text
    content: Then Job answered and said,
  '10':
  - type: text
    content: “They have gaped at me with their mouths,
  - type: text
    content: With contempt they have struck me on the cheek;
  - type: text
    content: They massed themselves together [and conspired] against me. [Ps 22:13; 35:21]
  '11':
  - type: text
    content: '“God hands me over to '
  - type: note
