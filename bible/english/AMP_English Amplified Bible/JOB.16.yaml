document_id: JOB.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Says Friends Are Sorry Comforters
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I have heard many such things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Wearisome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miserable comforters are you all.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Is there no end to [your futile] words of wind?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or what plagues you [so much] that you [so boldly] answer [me like this]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I also could speak like you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you were in my place;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I could compose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' join words together against you'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shake my head at you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“[But instead] I could strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encourage you with [the words of] my mouth,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the consolation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' solace of my lips would soothe your suffering '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lessen your anguish.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Says God Shattered Him
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶“If I speak [to you miserable comforters], my pain is not relieved;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if I refrain [from speaking], what [pain or anguish] leaves me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “But now God has exhausted me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You [O Lord] have destroyed all my family '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my household.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“You have taken a firm hold on me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have shriveled me up,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It has become a witness [against me];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my leanness [and infirmity] rises up [as evidence] against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: It testifies to my face [about my guilt].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “His wrath has torn me and hunted me down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has gnashed at me with his teeth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My adversary sharpens His gaze '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glares [with piercing eyes] at me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “They have gaped at me with their mouths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With contempt they have struck me on the cheek;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They massed themselves together [and conspired] against me. [Ps 22:13; 35:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“God hands me over to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'MT reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: boys
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: criminals
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tosses me [headlong] into the hands of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“I was [living] at ease, but He crushed me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' broke me apart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He has seized me by the neck and has shaken me to pieces;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has also set me up as His target.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “His arrows surround me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He pierces my kidneys (vital organs) without mercy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He pours out my gall on the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “He attacks me, making wound after wound;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He runs at me like a warrior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “I have sewed sackcloth over my skin [as a sign of mourning]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have defiled my horn (symbol of strength) in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“My face is red '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swollen with weeping,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on my eyelids is the shadow of death [my eyes are dimmed],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Although there is no violence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wrongdoing in my hands,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my prayer is pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶“O earth, do not cover my blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let there be no [resting] place for my cry [where it will cease being heard].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Even now, behold, my Witness is in heaven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my Advocate [who vouches and testifies for me] is on high. [Rom 1:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “My friends are scoffers [who ridicule];
- type: usfm
  marker: q1
  children:
  - type: text
    text: My eye pours out tears to God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Oh, that a man would mediate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plead with God [for me]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Just as a man [mediates and pleads] with his neighbor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' friend. [1 Tim 2:5]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “For when a few years are past,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall go the way of no return.
