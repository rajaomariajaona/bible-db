document_id: 1CO.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Teaching on Marriage
  - type: text
    content: 'Now as to the matters of which you wrote: It is good (beneficial, advantageous) for a man not to touch a woman [outside marriage]. '
  '10':
  - type: text
    content: 'But to the '
  - type: note
    content: Couples who are both believers.
  - type: text
    content: 'married [believers] I give instructions—not I, but the Lord—that the wife is not to separate from her husband, '
  '11':
  - type: text
    content: '(but even if she does leave him, let her remain single or else be '
  - type: note
    content: In reference to married Christians, Paul teaches that reconciliation is always preferable to separation or divorce and should be actively sought.
  - type: text
    content: reconciled to her husband) and that the husband should not leave his wife.
  '12':
  - type: text
    content: 'To the '
  - type: note
    content: Christians married to non-believers. It is evident that some of the married couples in Corinth had wed before either of them had become Christians, and subsequently the believing spouses probably wondered whether their marriage was legitimate in the eyes of God.
  - type: text
    content: 'rest I declare—I, not the Lord [since Jesus did not discuss this]—that if any [believing] brother has a wife who does not believe [in Christ], and she consents to live with him, he must not leave her. '
  '13':
  - type: text
    content: 'And if any [believing] woman has an unbelieving husband, and he consents to live with her, she must not leave him. '
  '14':
  - type: text
    content: 'For the unbelieving husband is '
  - type: note
    content: The unbeliever is not saved by marriage to a Christian. Each person, whether spouse or child, must make a personal decision to accept and follow Christ to receive salvation and God’s promises.
  - type: text
    content: 'sanctified [that is, he receives the blessings granted] through his [Christian] wife, and the unbelieving wife is sanctified through her believing husband. Otherwise your children would be [ceremonially] '
  - type: note
    content: The word used here seems to be borrowed from the language of OT ritual. There were many things that could render a person ceremonially unclean. All these things would disqualify a person from participating in worship, and required cleansing rituals to correct.
  - type: text
    content: 'unclean, but as it is they are holy. '
  '15':
  - type: text
    content: 'But if the unbelieving partner leaves, let him leave. In such cases the [remaining] brother or sister is not [spiritually or morally] bound. But God has called us to '
  - type: note
    content: Probably peace between the spouses, hopefully leading to restoration and salvation (v 16).
  - type: text
    content: 'peace. '
  '16':
  - type: text
    content: For how do you know, wife, whether you will save your husband [by leading him to Christ]? Or how do you know, husband, whether you will save your wife [by leading her to Christ]?
  '17':
  - type: text
    content: 'Only, let each one live the life which the Lord has assigned him, and to which God has called him [for each person is unique and is accountable for his choices and conduct, let him walk in this way]. This is the rule I make in all the churches. '
  '18':
  - type: text
    content: 'Was anyone at the time of his calling [from God already] circumcised? He is not to '
  - type: note
    content: Paul may be speaking figuratively of abandoning all of one’s Jewish heritage and culture; however, there was a procedure in ancient medicine for reversing circumcision.
  - type: text
    content: 'become uncircumcised. Has anyone been called while uncircumcised? '
  - type: note
    content: A faction of Jewish Christians (often called “Judaizers”) hounded Paul and insisted that Gentile believers must be circumcised.
  - type: text
    content: 'He is not to be circumcised. [Gal 5:1-3] '
  '19':
  - type: text
    content: 'Circumcision is nothing, and uncircumcision is nothing, but '
  - type: text
    content: what matters is
  - type: text
    content: ' keeping the commandments of God. '
  '2':
  - type: text
    content: 'But because of [the temptation to participate in] sexual immorality, let each man have his own wife, and let each woman have her own husband. '
  '20':
  - type: text
    content: Each one should remain in the condition in which he was [when he was] called.
  '21':
  - type: text
    content: 'Were you a slave when you were called? Do not worry about that [since your status as a believer is '
  - type: note
    content: In practice, even if both a slave and his master became Christians, the slave would remain so unless he were freed (cf Onesimus and Philemon); he could not claim that his freedom in Christ applied to his civil status as a slave. But it would have been wrong for others to treat a slave differently from anyone else in church services.
  - type: text
    content: 'equal to that of a freeborn believer]; but if you are able to gain your freedom, '
  - type: note
    content: This essentially is an exception to the rule of v 20.
  - type: text
    content: 'do that. '
  '22':
  - type: text
    content: 'For he who was a slave when he was called in the Lord is a freedman of the Lord, likewise he who was free when he was called is a slave of Christ. '
  '23':
  - type: text
    content: 'You were bought with a price [a precious price paid by Christ]; do not become slaves to men [but to Christ]. '
  '24':
  - type: text
    content: 'Brothers, let each one remain with God in that '
  - type: text
    content: condition
  - type: text
    content: ' in which he was [when he was] called.'
  '25':
  - type: text
    content: 'Now concerning the virgins [of marriageable age] I have no command of the Lord, but I give my opinion as one who by the Lord’s mercy is trustworthy. '
  '26':
  - type: text
    content: 'I think then that because of the impending distress [that is, the pressure of the current trouble], it is good for a man to remain as he is. '
  '27':
  - type: text
    content: 'Are you bound to a wife? Do not seek to be released. Are you '
  - type: note
    content: Lit released from a wife.
  - type: text
    content: 'unmarried? Do not seek a wife. '
  '28':
  - type: text
    content: 'But if you do marry, you have not sinned [in doing so]; and if a virgin marries, she has not sinned [in doing so]. Yet those [who marry] will have troubles (special challenges) in this life, and I am trying to spare you that. '
  '29':
  - type: text
    content: 'But I say this, believers: the '
  - type: note
    content: Paul may be referring to the appointed time of the return of Christ, or he may have been focusing on the briefness of human life, or both of these.
  - type: text
    content: 'time has been shortened, so that from now on even those who have wives should be as though they did not; '
  '3':
  - type: text
    content: 'The husband must fulfill his [marital] duty to his wife [with good will and kindness], and likewise the wife to her husband. '
  '30':
  - type: text
    content: 'and those who weep, as though they did not weep; and those who rejoice, as though they did not rejoice; and those who buy, as though they did not possess [anything]; '
  '31':
  - type: text
    content: and those who use the world [taking advantage of its opportunities], as though they did not make full use of it. For the outward form of this world [its present social and material nature] is passing away.
  '32':
  - type: text
    content: 'But I want you to be free from concern. The unmarried man is concerned about the things of the Lord, how he may please the Lord; '
  '33':
  - type: text
    content: 'but the married man is concerned about worldly things, how he may please his wife, '
  '34':
  - type: text
    content: 'and '
  - type: text
    content: his interests
  - type: text
    content: ' are divided. The unmarried woman or the virgin is concerned about the matters of the Lord, how to be holy '
  - type: text
    content: and
  - type: text
    content: ' set apart both in body and in spirit; but a married woman is concerned about worldly things, how she may please her husband. '
  '35':
  - type: text
    content: Now I say this for your own benefit; not to restrict you, but to promote what is appropriate and secure undistracted devotion to the Lord.
  '36':
  - type: text
    content: 'But if any man thinks that he is not acting properly '
  - type: text
    content: and
  - type: text
    content: ' honorably toward his virgin '
  - type: text
    content: daughter,
  - type: text
    content: ' ['
  - type: note
    content: In ancient times marriages were usually arranged by a girl’s father or the head of the family.
  - type: text
    content: 'by not permitting her to marry], if she is '
  - type: note
    content: I.e. has reached her child-bearing years.
  - type: text
    content: 'past her youth, and it must be so, let him do as he wishes, he does not sin; let her marry. '
  '37':
  - type: text
    content: 'But the man who stands firmly committed in his heart, having no compulsion [to yield to his daughter’s request], and has authority over his own will, and has decided in his own heart to keep his own virgin [daughter from being married], he will do well. '
  '38':
  - type: text
    content: 'So then both the father who gives his virgin '
  - type: text
    content: daughter
  - type: text
    content: ' in marriage does well, and he who does not give her in marriage will do better.'
  '39':
  - type: text
    content: 'A wife is bound [to her husband by law] as long as he lives. But if her husband dies, she is free to marry whomever she wishes, only [provided that he too is] in the Lord. '
  '4':
  - type: text
    content: 'The wife does not have [exclusive] authority over her own body, but the husband '
  - type: text
    content: shares with her;
  - type: text
    content: ' and likewise the husband does not have [exclusive] authority over his body, but the wife '
  - type: text
    content: shares with him
  - type: text
    content: '. '
  '40':
  - type: text
    content: But in my opinion a widow is happier if she stays as she is. And I think that I also have the Spirit of God [in this matter].
  '5':
  - type: text
    content: 'Do not deprive each other [of marital rights], except perhaps by mutual consent for a time, so that you may devote yourselves [unhindered] to prayer, but come together again so that Satan will not tempt you [to sin] because of your lack of self-control. '
  '6':
  - type: text
    content: 'But I am saying this as a concession, not as a command. '
  '7':
  - type: text
    content: I wish that all the people were as I am; but each person has his own gift from God, one of this kind and one of that.
  '8':
  - type: text
    content: 'But I say to the unmarried and to the widows, [that as a practical matter] it is good if they remain [single and entirely devoted to the Lord] '
  - type: note
    content: Some scholars believe Paul may have been a widower.
  - type: text
    content: 'as I am. '
  '9':
  - type: text
    content: 'But if they do not have [sufficient] self-control, they should marry; for it is better to marry than to burn '
  - type: text
    content: with passion
  - type: text
    content: .
