document_id: 1CO.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Teaching on Marriage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now as to the matters of which you wrote: It is good (beneficial, advantageous) for a man not to touch a woman [outside marriage]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But because of [the temptation to participate in] sexual immorality, let each man have his own wife, and let each woman have her own husband. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The husband must fulfill his [marital] duty to his wife [with good will and kindness], and likewise the wife to her husband. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The wife does not have [exclusive] authority over her own body, but the husband '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shares with her;
  - type: text
    text: ' and likewise the husband does not have [exclusive] authority over his body, but the wife '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shares with him
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Do not deprive each other [of marital rights], except perhaps by mutual consent for a time, so that you may devote yourselves [unhindered] to prayer, but come together again so that Satan will not tempt you [to sin] because of your lack of self-control. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But I am saying this as a concession, not as a command. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I wish that all the people were as I am; but each person has his own gift from God, one of this kind and one of that.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But I say to the unmarried and to the widows, [that as a practical matter] it is good if they remain [single and entirely devoted to the Lord] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars believe Paul may have been a widower.
    marker-yv: yv-n
  - type: text
    text: 'as I am. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But if they do not have [sufficient] self-control, they should marry; for it is better to marry than to burn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with passion
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Couples who are both believers.
    marker-yv: yv-n
  - type: text
    text: 'married [believers] I give instructions—not I, but the Lord—that the wife is not to separate from her husband, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(but even if she does leave him, let her remain single or else be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In reference to married Christians, Paul teaches that reconciliation is always preferable to separation or divorce and should be actively sought.
    marker-yv: yv-n
  - type: text
    text: reconciled to her husband) and that the husband should not leave his wife.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'To the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Christians married to non-believers. It is evident that some of the married couples in Corinth had wed before either of them had become Christians, and subsequently the believing spouses probably wondered whether their marriage was legitimate in the eyes of God.
    marker-yv: yv-n
  - type: text
    text: 'rest I declare—I, not the Lord [since Jesus did not discuss this]—that if any [believing] brother has a wife who does not believe [in Christ], and she consents to live with him, he must not leave her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And if any [believing] woman has an unbelieving husband, and he consents to live with her, she must not leave him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the unbelieving husband is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The unbeliever is not saved by marriage to a Christian. Each person, whether spouse or child, must make a personal decision to accept and follow Christ to receive salvation and God’s promises.
    marker-yv: yv-n
  - type: text
    text: 'sanctified [that is, he receives the blessings granted] through his [Christian] wife, and the unbelieving wife is sanctified through her believing husband. Otherwise your children would be [ceremonially] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word used here seems to be borrowed from the language of OT ritual. There were many things that could render a person ceremonially unclean. All these things would disqualify a person from participating in worship, and required cleansing rituals to correct.
    marker-yv: yv-n
  - type: text
    text: 'unclean, but as it is they are holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But if the unbelieving partner leaves, let him leave. In such cases the [remaining] brother or sister is not [spiritually or morally] bound. But God has called us to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably peace between the spouses, hopefully leading to restoration and salvation (v 16).
    marker-yv: yv-n
  - type: text
    text: 'peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For how do you know, wife, whether you will save your husband [by leading him to Christ]? Or how do you know, husband, whether you will save your wife [by leading her to Christ]?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Only, let each one live the life which the Lord has assigned him, and to which God has called him [for each person is unique and is accountable for his choices and conduct, let him walk in this way]. This is the rule I make in all the churches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Was anyone at the time of his calling [from God already] circumcised? He is not to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul may be speaking figuratively of abandoning all of one’s Jewish heritage and culture; however, there was a procedure in ancient medicine for reversing circumcision.
    marker-yv: yv-n
  - type: text
    text: 'become uncircumcised. Has anyone been called while uncircumcised? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A faction of Jewish Christians (often called “Judaizers”) hounded Paul and insisted that Gentile believers must be circumcised.
    marker-yv: yv-n
  - type: text
    text: 'He is not to be circumcised. [Gal 5:1-3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Circumcision is nothing, and uncircumcision is nothing, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: what matters is
  - type: text
    text: ' keeping the commandments of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Each one should remain in the condition in which he was [when he was] called.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Were you a slave when you were called? Do not worry about that [since your status as a believer is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In practice, even if both a slave and his master became Christians, the slave would remain so unless he were freed (cf Onesimus and Philemon); he could not claim that his freedom in Christ applied to his civil status as a slave. But it would have been wrong for others to treat a slave differently from anyone else in church services.
    marker-yv: yv-n
  - type: text
    text: 'equal to that of a freeborn believer]; but if you are able to gain your freedom, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This essentially is an exception to the rule of v 20.
    marker-yv: yv-n
  - type: text
    text: 'do that. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For he who was a slave when he was called in the Lord is a freedman of the Lord, likewise he who was free when he was called is a slave of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You were bought with a price [a precious price paid by Christ]; do not become slaves to men [but to Christ]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Brothers, let each one remain with God in that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: condition
  - type: text
    text: ' in which he was [when he was] called.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now concerning the virgins [of marriageable age] I have no command of the Lord, but I give my opinion as one who by the Lord’s mercy is trustworthy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I think then that because of the impending distress [that is, the pressure of the current trouble], it is good for a man to remain as he is. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Are you bound to a wife? Do not seek to be released. Are you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: released from a wife
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'unmarried? Do not seek a wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But if you do marry, you have not sinned [in doing so]; and if a virgin marries, she has not sinned [in doing so]. Yet those [who marry] will have troubles (special challenges) in this life, and I am trying to spare you that. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But I say this, believers: the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul may be referring to the appointed time of the return of Christ, or he may have been focusing on the briefness of human life, or both of these.
    marker-yv: yv-n
  - type: text
    text: 'time has been shortened, so that from now on even those who have wives should be as though they did not; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'and those who weep, as though they did not weep; and those who rejoice, as though they did not rejoice; and those who buy, as though they did not possess [anything]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: and those who use the world [taking advantage of its opportunities], as though they did not make full use of it. For the outward form of this world [its present social and material nature] is passing away.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But I want you to be free from concern. The unmarried man is concerned about the things of the Lord, how he may please the Lord; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'but the married man is concerned about worldly things, how he may please his wife, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his interests
  - type: text
    text: ' are divided. The unmarried woman or the virgin is concerned about the matters of the Lord, how to be holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set apart both in body and in spirit; but a married woman is concerned about worldly things, how she may please her husband. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Now I say this for your own benefit; not to restrict you, but to promote what is appropriate and secure undistracted devotion to the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'But if any man thinks that he is not acting properly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honorably toward his virgin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: daughter,
  - type: text
    text: ' ['
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient times marriages were usually arranged by a girl’s father or the head of the family.
    marker-yv: yv-n
  - type: text
    text: 'by not permitting her to marry], if she is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. has reached her child-bearing years.
    marker-yv: yv-n
  - type: text
    text: 'past her youth, and it must be so, let him do as he wishes, he does not sin; let her marry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But the man who stands firmly committed in his heart, having no compulsion [to yield to his daughter’s request], and has authority over his own will, and has decided in his own heart to keep his own virgin [daughter from being married], he will do well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So then both the father who gives his virgin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: daughter
  - type: text
    text: ' in marriage does well, and he who does not give her in marriage will do better.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'A wife is bound [to her husband by law] as long as he lives. But if her husband dies, she is free to marry whomever she wishes, only [provided that he too is] in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: But in my opinion a widow is happier if she stays as she is. And I think that I also have the Spirit of God [in this matter].
