verses:
  '1':
  - type: heading
    content: Avoid Israel’s Mistakes
  - type: text
    content: 'For I do not want you to be unaware, believers, that our fathers were all under the cloud [in which God’s presence went before them] and they all passed [miraculously and safely] through the [Red] Sea; [Ex 13:21; 14:22, 29] '
  '10':
  - type: text
    content: 'And do not murmur [in unwarranted discontent], as some of them did—and were destroyed by the '
  - type: note
    content: Perhaps a reference to the angel of destruction whom the rabbis called Mashhith.
  - type: text
    content: 'destroyer. [Num 16:41, 49] '
  '11':
  - type: text
    content: 'Now these things happened to them as an example '
  - type: text
    content: and
  - type: text
    content: ' warning [to us]; they were written for our instruction [to admonish and equip us], upon whom the ends of the ages have come. '
  '12':
  - type: text
    content: 'Therefore let the one who thinks he stands firm [immune to temptation, being overconfident and self-righteous], take care that he does not fall [into sin and condemnation]. '
  '13':
  - type: text
    content: 'No temptation [regardless of its source] has overtaken '
  - type: text
    content: or
  - type: text
    content: ' enticed you that is not common to human experience [nor is any temptation unusual or beyond human resistance]; but God is faithful [to His word—He is compassionate and trustworthy], and He will not let you be tempted beyond your ability [to resist], but along with the temptation He [has in the past and is now and] will [always] provide the way out as well, so that you will be able to endure it [without yielding, and will overcome temptation with joy].'
  '14':
  - type: text
    content: 'Therefore, my beloved, run [keep far, far away] from [any sort of] idolatry [and that includes loving anything more than God, or participating in anything that leads to sin and enslaves the soul]. '
  '15':
  - type: text
    content: 'I am speaking as to wise '
  - type: text
    content: and
  - type: text
    content: ' sensible people; judge [carefully and thoughtfully consider] for yourselves what I say. '
  '16':
  - type: text
    content: 'Is the cup of blessing which we bless [at the Lord’s Supper] not a sharing in the blood of Christ? [Indeed it is.] Is the bread which we break not a sharing in the body of Christ? [Indeed it is.] '
  '17':
  - type: text
    content: 'Since there is one bread, we [believers] who are many are [united into] one body; for we all partake of the one bread [which represents the body of Christ]. '
  '18':
  - type: text
    content: 'Consider the people of Israel; are those who eat the sacrifices not partners of the altar [united in their worship of the same God]? [Indeed they are.] [Lev 7:6] '
  '19':
  - type: text
    content: 'What do I mean then? That a thing offered to idols is anything [special or changed simply because it is offered], or that an idol is anything? '
  '2':
  - type: text
    content: 'And all [of them] were baptized into Moses [into his safekeeping as their leader] in the cloud and in the sea; '
  '20':
  - type: text
    content: 'On the contrary, the things which the Gentiles (pagans) sacrifice, they sacrifice to demons [in effect], and not to God; and I do not want you to become partners with demons [by eating at feasts in pagan temples]. [Deut 32:17] '
  '21':
  - type: text
    content: 'You cannot drink [both] the Lord’s cup and the cup of demons. You cannot share in both the Lord’s table and the table of demons [thereby becoming partners with them]. '
  '22':
  - type: text
    content: 'Do we [really] provoke the Lord to jealousy [when we eat food sacrificed to handmade “gods” at pagan feasts]? Are we [spiritually] stronger than He? [Certainly not! He knows that the idols are nothing. But we deeply '
  - type: note
    content: The offense consists of becoming “partners with demons” (v 20) merely to enjoy the pagan meal as an exercise of the believer’s liberty.
  - type: text
    content: offend Him.] [Deut 32:21; Eccl 6:10; Is 45:9]
  '23':
  - type: text
    content: 'All things are lawful [that is, morally legitimate, permissible], but not all things are beneficial '
  - type: text
    content: or
  - type: text
    content: ' advantageous. All things are lawful, but not all things are constructive [to character] '
  - type: text
    content: and
  - type: text
    content: ' edifying [to spiritual life]. '
  '24':
  - type: text
    content: 'Let no one seek [only] his own good, but [also] that of the other person. '
