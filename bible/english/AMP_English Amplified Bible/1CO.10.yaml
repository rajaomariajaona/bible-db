  '27':
  - type: text
    content: 'If one of the unbelievers invites you [to a meal at his home] and you want to go, eat whatever is served to you without asking questions [about its source] for the sake of your conscience. '
  '28':
  - type: text
    content: 'But if anyone says to you, “This meat has been offered in sacrifice to an idol,” do not eat it, out of consideration for the one who told you, and for conscience’s sake— '
  '29':
  - type: text
    content: 'and by conscience I mean for the sake of the other '
  - type: text
    content: man’s,
  - type: text
    content: ' not yours. For '
  - type: note
    content: Or to what end, i.e. what good can come of it?
  - type: text
    content: 'why is my freedom [of choice] judged by another’s conscience [another’s ethics—another’s sense of right and wrong]? '
  '3':
  - type: text
    content: 'and all [of them] ate the same '
  - type: note
    content: I.e. divinely provided manna.
  - type: text
    content: 'spiritual food; [Ex 16:4, 35] '
  '30':
  - type: text
    content: If I take my share [of food] with thankfulness, why am I accused because of something for which I give thanks?
  '31':
  - type: text
    content: 'So then, whether you eat or drink or whatever you do, do all to the glory of [our great] God. '
  '32':
  - type: text
    content: 'Do not offend Jews or Greeks or even the church of God [but live to honor Him]; '
  '33':
  - type: text
    content: just as I please everyone in all things [as much as possible adapting myself to the interests of others], not seeking my own benefit but that of the many, so that they [will be open to the message of salvation and] may be saved.
  '4':
  - type: text
    content: 'and all [of them] drank the same '
  - type: note
    content: I.e. divinely provided water from a rock.
  - type: text
    content: 'spiritual drink, for they were drinking from a spiritual rock which followed them; and the rock was Christ. [Ex 17:6; Num 20:11] '
  '5':
  - type: text
    content: 'Nevertheless, God was not well-pleased with '
  - type: note
    content: Of all those adult Israelites who had been in bondage in Egypt, only Joshua and Caleb (along with those born in the wilderness) were allowed to enter the promised land.
  - type: text
    content: most of them, for they were scattered along the ground in the wilderness [because their lack of self-control led to disobedience which led to death]. [Num 14:29, 30]
  '6':
  - type: text
    content: 'Now these things [the warnings and admonitions] took place as examples for us, so that we would not crave evil things as they did. [Num 11:4, 34] '
