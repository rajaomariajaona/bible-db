    content: 'We must not indulge in [nor tolerate] sexual immorality, as some of them did, and twenty-three thousand [suddenly] fell [dead] in a single day! [Num 25:1-18] '
  '9':
  - type: text
    content: 'We must not tempt the Lord [that is, test His patience, question His purpose or exploit His goodness], as some of them did—and they were killed by serpents. [Num 21:5, 6] '
