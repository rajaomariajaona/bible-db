document_id: 1CO.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Avoid Israel’s Mistakes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I do not want you to be unaware, believers, that our fathers were all under the cloud [in which God’s presence went before them] and they all passed [miraculously and safely] through the [Red] Sea; [Ex 13:21; 14:22, 29] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do not murmur [in unwarranted discontent], as some of them did—and were destroyed by the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps a reference to the angel of destruction whom the rabbis called Mashhith.
      marker-yv: yv-n
    - type: text
      text: 'destroyer. [Num 16:41, 49] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these things happened to them as an example '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' warning [to us]; they were written for our instruction [to admonish and equip us], upon whom the ends of the ages have come. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let the one who thinks he stands firm [immune to temptation, being overconfident and self-righteous], take care that he does not fall [into sin and condemnation]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No temptation [regardless of its source] has overtaken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' enticed you that is not common to human experience [nor is any temptation unusual or beyond human resistance]; but God is faithful [to His word—He is compassionate and trustworthy], and He will not let you be tempted beyond your ability [to resist], but along with the temptation He [has in the past and is now and] will [always] provide the way out as well, so that you will be able to endure it [without yielding, and will overcome temptation with joy].'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my beloved, run [keep far, far away] from [any sort of] idolatry [and that includes loving anything more than God, or participating in anything that leads to sin and enslaves the soul]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am speaking as to wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sensible people; judge [carefully and thoughtfully consider] for yourselves what I say. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is the cup of blessing which we bless [at the Lord’s Supper] not a sharing in the blood of Christ? [Indeed it is.] Is the bread which we break not a sharing in the body of Christ? [Indeed it is.] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since there is one bread, we [believers] who are many are [united into] one body; for we all partake of the one bread [which represents the body of Christ]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider the people of Israel; are those who eat the sacrifices not partners of the altar [united in their worship of the same God]? [Indeed they are.] [Lev 7:6] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What do I mean then? That a thing offered to idols is anything [special or changed simply because it is offered], or that an idol is anything? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all [of them] were baptized into Moses [into his safekeeping as their leader] in the cloud and in the sea; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the contrary, the things which the Gentiles (pagans) sacrifice, they sacrifice to demons [in effect], and not to God; and I do not want you to become partners with demons [by eating at feasts in pagan temples]. [Deut 32:17] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You cannot drink [both] the Lord’s cup and the cup of demons. You cannot share in both the Lord’s table and the table of demons [thereby becoming partners with them]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do we [really] provoke the Lord to jealousy [when we eat food sacrificed to handmade “gods” at pagan feasts]? Are we [spiritually] stronger than He? [Certainly not! He knows that the idols are nothing. But we deeply '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The offense consists of becoming “partners with demons” (v 20) merely to enjoy the pagan meal as an exercise of the believer’s liberty.
      marker-yv: yv-n
    - type: text
      text: offend Him.] [Deut 32:21; Eccl 6:10; Is 45:9]
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All things are lawful [that is, morally legitimate, permissible], but not all things are beneficial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' advantageous. All things are lawful, but not all things are constructive [to character] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' edifying [to spiritual life]. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let no one seek [only] his own good, but [also] that of the other person. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Regarding meat offered to idols:] Eat anything that is sold in the meat market without asking any questions for the sake of your conscience, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: F
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or the
    - type: text
      text: ' [whole] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: earth is the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord’s
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and everything that is in it
    - type: text
      text: '. [Ps 24:1; 50:12] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If one of the unbelievers invites you [to a meal at his home] and you want to go, eat whatever is served to you without asking questions [about its source] for the sake of your conscience. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if anyone says to you, “This meat has been offered in sacrifice to an idol,” do not eat it, out of consideration for the one who told you, and for conscience’s sake— '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and by conscience I mean for the sake of the other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man’s,
    - type: text
      text: ' not yours. For '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to what end,
        - type: text
          text: ' i.e. what good can come of it?'
      marker-yv: yv-n
    - type: text
      text: 'why is my freedom [of choice] judged by another’s conscience [another’s ethics—another’s sense of right and wrong]? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all [of them] ate the same '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. divinely provided manna.
      marker-yv: yv-n
    - type: text
      text: 'spiritual food; [Ex 16:4, 35] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If I take my share [of food] with thankfulness, why am I accused because of something for which I give thanks?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, whether you eat or drink or whatever you do, do all to the glory of [our great] God. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not offend Jews or Greeks or even the church of God [but live to honor Him]; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: just as I please everyone in all things [as much as possible adapting myself to the interests of others], not seeking my own benefit but that of the many, so that they [will be open to the message of salvation and] may be saved.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all [of them] drank the same '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. divinely provided water from a rock.
      marker-yv: yv-n
    - type: text
      text: 'spiritual drink, for they were drinking from a spiritual rock which followed them; and the rock was Christ. [Ex 17:6; Num 20:11] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless, God was not well-pleased with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Of all those adult Israelites who had been in bondage in Egypt, only Joshua and Caleb (along with those born in the wilderness) were allowed to enter the promised land.
      marker-yv: yv-n
    - type: text
      text: most of them, for they were scattered along the ground in the wilderness [because their lack of self-control led to disobedience which led to death]. [Num 14:29, 30]
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these things [the warnings and admonitions] took place as examples for us, so that we would not crave evil things as they did. [Num 11:4, 34] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do not be worshipers of handmade gods, as some of them were; just as it is written [in Scripture], “T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he people sat down to eat and drink
    - type: text
      text: ' [after sacrificing to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The selection of a calf-god was probably inspired by the Egyptian bull-god Apis (Hapis), believed to be a living manifestation of the Egyptian god Ptah.
      marker-yv: yv-n
    - type: text
      text: 'golden calf at Horeb], '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and stood up to play
    - type: text
      text: ' [indulging in immoral activities].” [Ex 32:6] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We must not indulge in [nor tolerate] sexual immorality, as some of them did, and twenty-three thousand [suddenly] fell [dead] in a single day! [Num 25:1-18] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We must not tempt the Lord [that is, test His patience, question His purpose or exploit His goodness], as some of them did—and they were killed by serpents. [Num 21:5, 6] '
