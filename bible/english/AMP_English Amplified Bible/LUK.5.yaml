document_id: LUK.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The First Disciples
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened that while Jesus was standing by the Lake of Gennesaret (Sea of Galilee), with the people crowding all around Him and listening to the word of God; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and so were James and John, sons of Zebedee, who were partners with Simon [Peter]. Jesus said to Simon, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have no fear; from now on you will be catching men!”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After they had brought their boats to land, they left everything and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The concept of “follow” can represent three separate possibilities: (1) walking with Him (literally), that is merely being in His presence regardless of personal belief or commitment; (2) accepting and identifying with the salvation He offered; and (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
      marker-yv: yv-n
    - type: text
      text: followed Him [becoming His disciples, believing and trusting in Him and following His example].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Leper and the Paralytic
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Jesus was in one of the cities, there came a man covered with [an advanced case of] leprosy; and when he saw Jesus, he fell on his face and begged Him, saying, “Lord, if You are willing, You can make me clean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well.” [Matt 8:2-4; Mark 1:40-44] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus reached out His hand and touched him, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am willing; be cleansed.”
    - type: text
      text: ' And immediately the leprosy left him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus ordered him to tell no one [that he might happen to meet], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But go and show yourself to the priest, and make an offering for your purification, just as Moses commanded, as a testimony (witness) to them
    - type: text
      text: ' [that this is a work of Messiah].” [Lev 13:49; 14:2-32] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the news about Him was spreading farther, and large crowds kept gathering to hear Him and to be healed of their illnesses. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus Himself would often slip away to the wilderness and pray [in seclusion].
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day as He was teaching, there were Pharisees and teachers of the Law sitting there who had come from every village of Galilee and Judea and from Jerusalem. And the power of the Lord was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: present
    - type: text
      text: ' with Him to heal. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Some
    - type: text
      text: ' men came carrying on a stretcher a man who was paralyzed, and they tried to bring him in and lay him down in front of Jesus. [Matt 9:2-8; Mark 2:3-12] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But finding no way to bring him in because of the crowd, they went up on the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The roof of a typical home was composed of clay tiles which were laid on a mat of branches and grass supported by wooden beams.
      marker-yv: yv-n
    - type: text
      text: 'roof [and removed some tiles to make an opening] and lowered him through the tiles with his stretcher, into the middle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the crowd,
    - type: text
      text: ' in front of Jesus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that He saw two boats lying at the edge of the lake, but the fishermen had gotten out of them and were washing their nets. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus saw their [active] faith [springing from confidence in Him], He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Man, your sins are forgiven.”
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The scribes and the Pharisees began to consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' question [the implications of what He had said], saying, “Who is this man who speaks blasphemies [by claiming the rights and prerogatives of God]? Who can forgive sins [that is, remove guilt, nullify sin’s penalty, and assign righteousness] except God alone?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus, knowing their [hostile] thoughts, answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you questioning
    - type: text
      text: ' [these things] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in your hearts?
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which is easier, to say, ‘Your sins are forgiven you,’ or to say, ‘Get up and walk’?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But, in order that you may know that the Son of Man (the Messiah) has authority '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' power on earth to forgive sins”'
    - type: text
      text: '—He said to the paralyzed man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I say to you, get up, pick up your stretcher and go home.”
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He immediately stood up before them, picked up his stretcher, and went home glorifying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praising God. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were all astonished, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' glorifying God; and they were filled with [reverential] fear and kept saying, “We have seen wonderful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' incredible things today!”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Call of Levi (Matthew)
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this Jesus went out and noticed a tax collector named Levi (Matthew) sitting at the tax booth; and He said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow Me
    - type: text
      text: ' [as My disciple, accepting Me as your Master and Teacher and walking the same path of life that I walk].” [Matt 9:9-17; Mark 2:14-22] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he left everything behind and got up and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to follow Jesus [as His disciple].'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Levi (Matthew) gave a great banquet for Him at his house; and there was a large crowd of tax collectors and others who were reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' with them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He got into one of the boats, which was Simon’s, and asked him to put out a little distance from the shore. And He sat down and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' teaching the crowds from the boat. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Pharisees and their scribes [seeing those with whom He was associating] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' murmuring in discontent to His disciples, asking, “Why are you eating and drinking with the tax collectors and sinners [including non-observant Jews]?” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus replied to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is not those who are healthy who need a physician, but
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: those who are sick.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I did not come to call the
    - type: text
      text: ' [self-proclaimed] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: righteous
    - type: text
      text: ' [who see no need to repent], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but sinners to repentance
    - type: text
      text: ' [to change their old way of thinking, to turn from sin and to seek God and His righteousness].”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they said to Him, “The disciples of John [the Baptist] often practice fasting and offer prayers [of special petition], and so do the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: disciples
    - type: text
      text: ' of the Pharisees; but Yours eat and drink.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Can you make the wedding guests of the bridegroom fast while he is with them?
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But days
    - type: text
      text: ' [for mourning] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will come when the bridegroom is
    - type: text
      text: ' [forcefully] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: taken away from them. They will fast in those days.”
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also told them a parable: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one tears a piece of cloth from a new garment and puts it on an old one; otherwise he will both tear the new, and the piece from the new will not match the old.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And no one puts new wine into old '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 9:17.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: wineskins; otherwise the new
    - type: text
      text: ' [fermenting] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: wine will
    - type: text
      text: ' [expand and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: burst the skins and it will be spilled out, and the skins will be ruined.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But new wine must be put into fresh wineskins.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And no one, after drinking old '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wine,
      - type: text
        text: ' wishes for new; for he says, ‘The old is fine.’ ”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He had finished speaking, He said to Simon [Peter], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Put out into the deep water and lower your nets for a catch
    - type: text
      text: ' [of fish].” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon replied, “Master, we worked hard all night [to the point of exhaustion] and caught nothing [in our nets], but at Your word I will [do as you say and] lower the nets [again].” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had done this, they caught a great number of fish, and their nets were [at the point of] breaking; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so they signaled to their partners in the other boat to come and help them. And they came and filled both of the boats [with fish], so that they began to sink. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Simon Peter saw this, he fell down at Jesus’ knees, saying, “Go away from me, for I am a sinful man, O Lord!” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he and all his companions were completely astounded at the catch of fish which they had taken; '
