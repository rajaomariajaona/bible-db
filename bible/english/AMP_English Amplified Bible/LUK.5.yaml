type_code: eng
verses:
  '1':
  - type: heading
    content: The First Disciples
  - type: text
    content: 'Now it happened that while Jesus was standing by the Lake of Gennesaret (Sea of Galilee), with the people crowding all around Him and listening to the word of God; '
  '10':
  - type: text
    content: 'and so were James and John, sons of Zebedee, who were partners with Simon [Peter]. Jesus said to Simon, '
  - type: text
    content: “Have no fear; from now on you will be catching men!”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'After they had brought their boats to land, they left everything and '
  - type: note
    content: 'The concept of “follow” can represent three separate possibilities: (1) walking with Him (literally), that is merely being in His presence regardless of personal belief or commitment; (2) accepting and identifying with the salvation He offered; and (3) being identified with Him by being subject to the scorn and rejection of unbelievers because of personal belief and commitment to Him.'
  - type: text
    content: followed Him [becoming His disciples, believing and trusting in Him and following His example].
  - type: heading
    content: The Leper and the Paralytic
  '12':
  - type: text
    content: 'While Jesus was in one of the cities, there came a man covered with [an advanced case of] leprosy; and when he saw Jesus, he fell on his face and begged Him, saying, “Lord, if You are willing, You can make me clean '
  - type: text
    content: and
  - type: text
    content: ' well.” [Matt 8:2-4; Mark 1:40-44] '
  '13':
  - type: text
    content: 'And Jesus reached out His hand and touched him, saying, '
  - type: text
    content: “I am willing; be cleansed.”
  - type: text
    content: ' And immediately the leprosy left him. '
  '14':
  - type: text
    content: 'Jesus ordered him to tell no one [that he might happen to meet], '
  - type: text
    content: “But go and show yourself to the priest, and make an offering for your purification, just as Moses commanded, as a testimony (witness) to them
  - type: text
    content: ' [that this is a work of Messiah].” [Lev 13:49; 14:2-32] '
  '15':
  - type: text
    content: 'But the news about Him was spreading farther, and large crowds kept gathering to hear Him and to be healed of their illnesses. '
  '16':
  - type: text
    content: But Jesus Himself would often slip away to the wilderness and pray [in seclusion].
  '17':
  - type: text
    content: 'One day as He was teaching, there were Pharisees and teachers of the Law sitting there who had come from every village of Galilee and Judea and from Jerusalem. And the power of the Lord was '
  - type: text
    content: present
  - type: text
    content: ' with Him to heal. '
  '18':
  - type: text
    content: Some
  - type: text
    content: ' men came carrying on a stretcher a man who was paralyzed, and they tried to bring him in and lay him down in front of Jesus. [Matt 9:2-8; Mark 2:3-12] '
  '19':
  - type: text
    content: 'But finding no way to bring him in because of the crowd, they went up on the '
  - type: note
    content: The roof of a typical home was composed of clay tiles which were laid on a mat of branches and grass supported by wooden beams.
  - type: text
    content: 'roof [and removed some tiles to make an opening] and lowered him through the tiles with his stretcher, into the middle '
  - type: text
    content: of the crowd,
  - type: text
    content: ' in front of Jesus. '
  '2':
  - type: text
    content: 'that He saw two boats lying at the edge of the lake, but the fishermen had gotten out of them and were washing their nets. '
  '20':
  - type: text
    content: 'When Jesus saw their [active] faith [springing from confidence in Him], He said, '
  - type: text
    content: “Man, your sins are forgiven.”
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'The scribes and the Pharisees began to consider '
  - type: text
    content: and
  - type: text
    content: ' question [the implications of what He had said], saying, “Who is this man who speaks blasphemies [by claiming the rights and prerogatives of God]? Who can forgive sins [that is, remove guilt, nullify sin’s penalty, and assign righteousness] except God alone?” '
  '22':
  - type: text
    content: 'But Jesus, knowing their [hostile] thoughts, answered them, '
  - type: text
    content: “Why are you questioning
  - type: text
    content: ' [these things] '
  - type: text
    content: in your hearts?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Which is easier, to say, ‘Your sins are forgiven you,’ or to say, ‘Get up and walk’?
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'But, in order that you may know that the Son of Man (the Messiah) has authority '
  - type: text
    content: and
  - type: text
    content: ' power on earth to forgive sins”'
  - type: text
    content: '—He said to the paralyzed man, '
  - type: text
    content: “I say to you, get up, pick up your stretcher and go home.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'He immediately stood up before them, picked up his stretcher, and went home glorifying '
  - type: text
    content: and
  - type: text
    content: ' praising God. '
  '26':
  - type: text
    content: 'They were all astonished, and they '
  - type: text
    content: began
  - type: text
    content: ' glorifying God; and they were filled with [reverential] fear and kept saying, “We have seen wonderful '
  - type: text
    content: and
  - type: text
    content: ' incredible things today!”'
  - type: heading
    content: Call of Levi (Matthew)
  '27':
  - type: text
    content: 'After this Jesus went out and noticed a tax collector named Levi (Matthew) sitting at the tax booth; and He said to him, '
  - type: text
    content: “Follow Me
  - type: text
    content: ' [as My disciple, accepting Me as your Master and Teacher and walking the same path of life that I walk].” [Matt 9:9-17; Mark 2:14-22] '
  '28':
  - type: text
    content: 'And he left everything behind and got up and '
  - type: text
    content: began
  - type: text
    content: ' to follow Jesus [as His disciple].'
  '29':
  - type: text
    content: 'Levi (Matthew) gave a great banquet for Him at his house; and there was a large crowd of tax collectors and others who were reclining '
  - type: text
    content: at the table
  - type: text
    content: ' with them. '
  '3':
  - type: text
    content: 'He got into one of the boats, which was Simon’s, and asked him to put out a little distance from the shore. And He sat down and '
  - type: text
    content: began
  - type: text
    content: ' teaching the crowds from the boat. '
  '30':
  - type: text
    content: 'The Pharisees and their scribes [seeing those with whom He was associating] '
  - type: text
    content: began
  - type: text
    content: ' murmuring in discontent to His disciples, asking, “Why are you eating and drinking with the tax collectors and sinners [including non-observant Jews]?” '
  '31':
  - type: text
    content: 'And Jesus replied to them, '
  - type: text
    content: “It is not those who are healthy who need a physician, but
  - type: text
    content: ' [only] '
  - type: text
    content: those who are sick.
  - type: text
    content: ' '
  '32':
  - type: text
    content: I did not come to call the
  - type: text
    content: ' [self-proclaimed] '
  - type: text
    content: righteous
  - type: text
    content: ' [who see no need to repent], '
  - type: text
    content: but sinners to repentance
  - type: text
    content: ' [to change their old way of thinking, to turn from sin and to seek God and His righteousness].”'
  '33':
  - type: text
    content: 'Then they said to Him, “The disciples of John [the Baptist] often practice fasting and offer prayers [of special petition], and so do the '
  - type: text
    content: disciples
  - type: text
    content: ' of the Pharisees; but Yours eat and drink.” '
  '34':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Can you make the wedding guests of the bridegroom fast while he is with them?
  - type: text
    content: ' '
  '35':
  - type: text
    content: But days
  - type: text
    content: ' [for mourning] '
  - type: text
    content: will come when the bridegroom is
  - type: text
    content: ' [forcefully] '
  - type: text
    content: taken away from them. They will fast in those days.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'He also told them a parable: '
  - type: text
    content: “No one tears a piece of cloth from a new garment and puts it on an old one; otherwise he will both tear the new, and the piece from the new will not match the old.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'And no one puts new wine into old '
  - type: note
    content: See note Matt 9:17.
  - type: text
    content: wineskins; otherwise the new
  - type: text
    content: ' [fermenting] '
  - type: text
    content: wine will
  - type: text
    content: ' [expand and] '
  - type: text
    content: burst the skins and it will be spilled out, and the skins will be ruined.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But new wine must be put into fresh wineskins.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And no one, after drinking old '
  - type: text
    content: wine,
  - type: text
    content: ' wishes for new; for he says, ‘The old is fine.’ ”'
  '4':
  - type: text
    content: 'When He had finished speaking, He said to Simon [Peter], '
  - type: text
    content: “Put out into the deep water and lower your nets for a catch
  - type: text
    content: ' [of fish].” '
  '5':
  - type: text
    content: 'Simon replied, “Master, we worked hard all night [to the point of exhaustion] and caught nothing [in our nets], but at Your word I will [do as you say and] lower the nets [again].” '
  '6':
  - type: text
    content: 'When they had done this, they caught a great number of fish, and their nets were [at the point of] breaking; '
  '7':
  - type: text
    content: 'so they signaled to their partners in the other boat to come and help them. And they came and filled both of the boats [with fish], so that they began to sink. '
  '8':
  - type: text
    content: 'But when Simon Peter saw this, he fell down at Jesus’ knees, saying, “Go away from me, for I am a sinful man, O Lord!” '
  '9':
  - type: text
    content: 'For he and all his companions were completely astounded at the catch of fish which they had taken; '
