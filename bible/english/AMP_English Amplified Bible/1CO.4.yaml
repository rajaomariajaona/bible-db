document_id: 1CO.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Servants of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So then, let us [who minister] be regarded as servants of Christ and stewards (trustees, administrators) of the mysteries of God [that He chooses to reveal]. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'In this case, moreover, it is required [as essential and demanded] of stewards that one be found faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But [as for me personally] it matters very little to me that I may be judged by you or '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' human court [on this point]; in fact, I do not even judge myself. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I am aware of nothing against myself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I feel blameless, but I am not by this acquitted [before God]. It is the Lord who judges me. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So do not go on passing judgment before the appointed time, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but wait
  - type: text
    text: ' until the Lord comes, for He will both bring to light the [secret] things that are hidden in darkness and disclose the motives of the hearts. Then each one’s praise will come from God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now I have applied these things [that is, the analogies about factions] to myself and Apollos for your benefit, believers, so that you may learn from us not to go beyond what is written [in Scripture], so that none of you will become arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boast in favor of one [minister or teacher] against the other. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For who regards you as superior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' what sets you apart as special? What do you have that you did not receive [from another]? And if in fact you received it [from God or someone else], why do you boast as if you had not received it [but had gained it by yourself]?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '[You behave as if] you are already filled [with spiritual wisdom and in need of nothing more]. Already you have become rich [in spiritual gifts]! You [in your conceit] have ascended your thrones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' become kings without us; and how I wish [that it were true and] that you did reign as kings, so that we might reign with you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For, I think, God has exhibited us apostles at the end of the line, like men sentenced to death [and paraded as prisoners in a procession], because we have become a spectacle to the world [a show in the world’s amphitheater], both to angels and to men. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We are [regarded as] fools for Christ, but you are so wise in Christ; we are weak, but you are strong; you are highly esteemed, but we are dishonored. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'To this present hour we are both hungry and thirsty; we are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' poorly dressed, and we are roughly treated, and wander homeless. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'We work [for our living], working '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hard
  - type: text
    text: ' with our own hands. When we are reviled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' verbally abused, we bless. When we are persecuted, we take it patiently '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' endure. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When we are slandered, we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: try to be
  - type: text
    text: ' conciliatory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' answer softly. We have become like the scum of the world, the dregs of all things, even until now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I do not write these things to shame you, but to warn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' advise you as my beloved children. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For even if you were to have ten thousand teachers [to guide you] in Christ, yet you would not have many fathers [who led you to Christ and assumed responsibility for you], for I became your father in Christ Jesus through the good news [of salvation]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So I urge you, be imitators of me [just as a child imitates his father]. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For this reason I have sent Timothy to you, who is my beloved and faithful child in the Lord, and he will remind you of my way of life in Christ [my conduct and my precepts for godly living], just as I teach everywhere in every church. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now some of you have become arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pretentious, as though I were not coming to see you. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I will come to you soon, if the Lord is willing, and I will find out not just the talk of these arrogant people, but [evaluate] their [spiritual] power [whether they live up to their own claims]. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For the kingdom of God is not based on talk but on power. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Which do you prefer? Shall I come to you with a rod [of discipline and correction], or with love and a gentle spirit?
