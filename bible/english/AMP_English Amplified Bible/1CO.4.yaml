document_id: 1CO.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Servants of Christ
  - type: text
    content: 'So then, let us [who minister] be regarded as servants of Christ and stewards (trustees, administrators) of the mysteries of God [that He chooses to reveal]. '
  '10':
  - type: text
    content: 'We are [regarded as] fools for Christ, but you are so wise in Christ; we are weak, but you are strong; you are highly esteemed, but we are dishonored. '
  '11':
  - type: text
    content: 'To this present hour we are both hungry and thirsty; we are '
  - type: text
    content: continually
  - type: text
    content: ' poorly dressed, and we are roughly treated, and wander homeless. '
  '12':
  - type: text
    content: 'We work [for our living], working '
  - type: text
    content: hard
  - type: text
    content: ' with our own hands. When we are reviled '
  - type: text
    content: and
  - type: text
    content: ' verbally abused, we bless. When we are persecuted, we take it patiently '
  - type: text
    content: and
  - type: text
    content: ' endure. '
  '13':
  - type: text
    content: 'When we are slandered, we '
  - type: text
    content: try to be
  - type: text
    content: ' conciliatory '
  - type: text
    content: and
  - type: text
    content: ' answer softly. We have become like the scum of the world, the dregs of all things, even until now.'
  '14':
  - type: text
    content: 'I do not write these things to shame you, but to warn '
  - type: text
    content: and
  - type: text
    content: ' advise you as my beloved children. '
  '15':
  - type: text
    content: 'For even if you were to have ten thousand teachers [to guide you] in Christ, yet you would not have many fathers [who led you to Christ and assumed responsibility for you], for I became your father in Christ Jesus through the good news [of salvation]. '
  '16':
  - type: text
    content: 'So I urge you, be imitators of me [just as a child imitates his father]. '
  '17':
  - type: text
    content: 'For this reason I have sent Timothy to you, who is my beloved and faithful child in the Lord, and he will remind you of my way of life in Christ [my conduct and my precepts for godly living], just as I teach everywhere in every church. '
  '18':
  - type: text
    content: 'Now some of you have become arrogant '
  - type: text
    content: and
  - type: text
    content: ' pretentious, as though I were not coming to see you. '
  '19':
  - type: text
    content: 'But I will come to you soon, if the Lord is willing, and I will find out not just the talk of these arrogant people, but [evaluate] their [spiritual] power [whether they live up to their own claims]. '
  '2':
  - type: text
    content: 'In this case, moreover, it is required [as essential and demanded] of stewards that one be found faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy. '
  '20':
  - type: text
    content: 'For the kingdom of God is not based on talk but on power. '
  '21':
  - type: text
    content: Which do you prefer? Shall I come to you with a rod [of discipline and correction], or with love and a gentle spirit?
  '3':
  - type: text
    content: 'But [as for me personally] it matters very little to me that I may be judged by you or '
  - type: text
    content: any
  - type: text
    content: ' human court [on this point]; in fact, I do not even judge myself. '
  '4':
  - type: text
    content: 'I am aware of nothing against myself '
  - type: text
    content: and
  - type: text
    content: ' I feel blameless, but I am not by this acquitted [before God]. It is the Lord who judges me. '
  '5':
  - type: text
    content: 'So do not go on passing judgment before the appointed time, '
  - type: text
    content: but wait
  - type: text
    content: ' until the Lord comes, for He will both bring to light the [secret] things that are hidden in darkness and disclose the motives of the hearts. Then each one’s praise will come from God.'
  '6':
  - type: text
    content: 'Now I have applied these things [that is, the analogies about factions] to myself and Apollos for your benefit, believers, so that you may learn from us not to go beyond what is written [in Scripture], so that none of you will become arrogant '
  - type: text
    content: and
  - type: text
    content: ' boast in favor of one [minister or teacher] against the other. '
  '7':
  - type: text
    content: 'For who regards you as superior '
  - type: text
    content: or
  - type: text
    content: ' what sets you apart as special? What do you have that you did not receive [from another]? And if in fact you received it [from God or someone else], why do you boast as if you had not received it [but had gained it by yourself]?'
  '8':
  - type: text
    content: '[You behave as if] you are already filled [with spiritual wisdom and in need of nothing more]. Already you have become rich [in spiritual gifts]! You [in your conceit] have ascended your thrones '
  - type: text
    content: and
  - type: text
    content: ' become kings without us; and how I wish [that it were true and] that you did reign as kings, so that we might reign with you. '
  '9':
  - type: text
    content: 'For, I think, God has exhibited us apostles at the end of the line, like men sentenced to death [and paraded as prisoners in a procession], because we have become a spectacle to the world [a show in the world’s amphitheater], both to angels and to men. '
