  '11':
  - type: text
    content: Set me free and rescue me from the hand of [hostile] foreigners,
  - type: text
    content: Whose mouth speaks deceit [without restraint],
  - type: text
    content: And whose right hand is a right hand of falsehood.
  '12':
  - type: text
    content: ¶Let our sons in their youth be like plants full grown,
  - type: text
