    - type: text
      text: Prayer for Rescue and Prosperity.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', my Rock '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' my great strength,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who trains my hands for war
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my fingers for battle;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My [steadfast] lovingkindness and my fortress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My high tower and my rescuer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My shield and He in whom I take refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who subdues my people under me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', what is man that You take notice of him?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or the son of man that You think of him? [Job 7:17; Ps 8:4; Heb 2:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Man is like a mere breath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His days are like a shadow that passes away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Bow Your heavens, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and come down;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Touch the mountains, and they will smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Flash lightning and scatter my enemies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Send out Your arrows and confuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' embarrass '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' frustrate them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Stretch out Your hand from above;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set me free and rescue me from great waters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of the hands of [hostile] foreigners [who surround us]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Whose mouths speak deceit [without restraint],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whose right hand is a right hand of falsehood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶I will sing a new song to You, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Upon a harp of ten strings I will sing praises to You,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who gives salvation to kings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who sets David His servant free from the evil sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Set me free and rescue me from the hand of [hostile] foreigners,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whose mouth speaks deceit [without restraint],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whose right hand is a right hand of falsehood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Let our sons in their youth be like plants full grown,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And our daughters like corner pillars fashioned for a palace;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Let our barns be full, supplying every kind of produce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And our flocks bring forth thousands and ten thousands in our fields;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Let our cattle bear
- type: usfm
  marker: q1
  children:
  - type: text
    text: Without mishap and without loss,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let there be no outcry in our streets!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'How blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored are the people in such circumstance;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: How blessed [fortunate, prosperous, and favored] are the people whose God is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '!'
