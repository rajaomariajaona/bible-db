document_id: JOL.1,1588
type_code: eng
verses:
  '1':
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' that came to '
  - type: note
    content: Joel was a prophet of Judah, the Southern Kingdom, and possibly a contemporary of Elisha. After the united kingdom divided, the Kingdom of Judah consisted primarily of the tribes of Judah and Benjamin. Judah continued to be ruled by the kings of the Davidic line. Jerusalem was the capital city of Judah. The name “Joel” means “The Lord is God.”
  - type: text
    content: Joel, the son of Pethuel.
  - type: heading
    content: The Devastation of Locusts
  '10':
  - type: text
    content: The field is ruined,
  - type: text
    content: The ground mourns;
  - type: text
    content: For the grain is ruined,
  - type: text
    content: The new wine is dried up,
  - type: text
    content: The fresh oil fails.
  '11':
  - type: text
    content: Be ashamed, O farmers;
  - type: text
    content: Wail, O vinedressers,
  - type: text
    content: For the wheat and for the barley,
  - type: text
    content: Because the harvest of the field has perished.
  '12':
  - type: text
    content: The vine dries up
  - type: text
    content: And the fig tree fails;
  - type: text
    content: The pomegranate, the palm also, and the apple tree,
  - type: text
    content: All the trees of the field dry up,
  - type: text
    content: 'Indeed, joy dries up '
  - type: text
    content: and
  - type: text
    content: ' withdraws'
  - type: text
    content: From the sons of men.
  '13':
  - type: text
    content: '¶Clothe yourselves '
  - type: text
    content: with sackcloth
  - type: text
    content: And lament (cry out in grief), O priests;
  - type: text
    content: Wail, O ministers of the altar!
  - type: text
    content: Come, spend the night in sackcloth [and pray without ceasing],
  - type: text
    content: O ministers of my God,
  - type: text
    content: For the grain offering and the drink offering
  - type: text
    content: Are withheld from the house of your God.
  - type: heading
    content: Starvation and Drought
  '14':
  - type: text
    content: Consecrate a fast,
  - type: text
    content: Proclaim a solemn assembly,
  - type: text
    content: Gather the elders
  - type: text
    content: And all the inhabitants of the land
  - type: text
    content: To the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God,'
  - type: text
    content: And cry out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [in penitent pleadings].'
  '15':
  - type: text
    content: Alas for the day!
  - type: text
    content: For the [judgment] day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is at hand,'
  - type: text
    content: 'And it will come [upon the nation] as a destruction from the '
  - type: note
    content: Heb Shaddai.
  - type: text
    content: Almighty. [Zeph 1:14-18]
  '16':
  - type: text
    content: Has not the food been cut off before our eyes,
  - type: text
    content: Joy and gladness from the house of our God?
  '17':
  - type: text
    content: The seeds [of grain] shrivel under the clods,
  - type: text
    content: 'The storehouses are desolate '
  - type: text
    content: and
  - type: text
    content: ' empty,'
  - type: text
    content: The barns are in ruins
  - type: text
    content: Because the grain is dried up.
  '18':
  - type: text
    content: How the animals groan!
  - type: text
    content: 'The herds of cattle are bewildered '
  - type: text
    content: and
  - type: text
    content: ' wander aimlessly'
  - type: text
    content: Because they have no pasture;
  - type: text
    content: Even the flocks of sheep suffer.
  '19':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', I cry out to You,'
  - type: text
    content: For fire has devoured the pastures of the wilderness,
  - type: text
    content: And the flame has burned up all the trees of the field.
  '2':
  - type: text
    content: Hear this, O elders,
  - type: text
    content: Listen closely, all inhabitants of the land!
  - type: text
    content: 'Has '
  - type: text
    content: such a thing as
  - type: text
    content: ' this occurred in your days,'
  - type: text
    content: Or even in the days of your fathers?
  '20':
  - type: text
    content: Even the wild animals pant [in longing] for You;
  - type: text
    content: For the water brooks are dried up
  - type: text
    content: And fire has consumed the pastures of the wilderness.
  '3':
  - type: text
    content: Tell your children about it,
  - type: text
    content: And let your children tell their children,
  - type: text
    content: And their children the next generation.
  '4':
  - type: text
    content: ¶What the gnawing locust has left, the swarming locust has eaten;
  - type: text
    content: And what the swarming locust has left, the creeping locust has eaten;
  - type: text
    content: And what the creeping locust has left, the stripping locust has eaten [in judgment of Judah].
  '5':
  - type: text
    content: Awake [from your intoxication], you drunkards, and weep;
  - type: text
    content: Wail, all you drinkers of wine,
  - type: text
    content: Because of the [fresh] sweet wine
  - type: text
    content: That is cut off from your mouth.
  '6':
  - type: text
    content: For a [pagan and hostile] nation has invaded My land [like locusts],
  - type: text
    content: Mighty and without number;
  - type: text
    content: Its teeth are the teeth of a lion,
  - type: text
    content: And it has the fangs of a lioness. [Rev 9:7, 8]
  '7':
  - type: text
    content: 'It has made My vine (My people) a waste '
  - type: text
    content: and
  - type: text
    content: ' object of horror,'
  - type: text
    content: 'And splintered '
  - type: text
    content: and
  - type: text
    content: ' broken My fig tree.'
  - type: text
    content: It has stripped them completely bare and thrown them away;
  - type: text
    content: Their branches have become white. [Is 5:5, 6]
  '8':
  - type: text
    content: '¶Wail like a virgin [bride] clothed with '
  - type: note
    content: A coarse cloth made from goat’s hair. It was worn as a sign of mourning or as an act of penitence.
  - type: text
    content: sackcloth
  - type: text
    content: For the bridegroom of her youth [who has died].
  '9':
  - type: text
    content: The [daily] grain offering and the drink offering are cut off
  - type: text
    content: From the house of the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: The priests mourn
  - type: text
    content: Who minister to the L
  - type: heading
    content: ord
  - type: text
    content: .
