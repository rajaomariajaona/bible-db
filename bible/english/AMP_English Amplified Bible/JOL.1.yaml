document_id: JOL.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that came to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joel was a prophet of Judah, the Southern Kingdom, and possibly a contemporary of Elisha. After the united kingdom divided, the Kingdom of Judah consisted primarily of the tribes of Judah and Benjamin. Judah continued to be ruled by the kings of the Davidic line. Jerusalem was the capital city of Judah. The name “Joel” means “The L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' is God.”'
      marker-yv: yv-n
    - type: text
      text: Joel, the son of Pethuel.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Devastation of Locusts
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The field is ruined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ground mourns;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the grain is ruined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The new wine is dried up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fresh oil fails.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Be ashamed, O farmers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, O vinedressers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wheat and for the barley,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the harvest of the field has perished.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The vine dries up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fig tree fails;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The pomegranate, the palm also, and the apple tree,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the trees of the field dry up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indeed, joy dries up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' withdraws'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the sons of men.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '¶Clothe yourselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with sackcloth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lament (cry out in grief), O priests;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, O ministers of the altar!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, spend the night in sackcloth [and pray without ceasing],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O ministers of my God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the grain offering and the drink offering
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are withheld from the house of your God.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Starvation and Drought
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Consecrate a fast,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclaim a solemn assembly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather the elders
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the inhabitants of the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cry out to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [in penitent pleadings].'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alas for the day!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the [judgment] day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is at hand,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it will come [upon the nation] as a destruction from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Almighty. [Zeph 1:14-18]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Has not the food been cut off before our eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joy and gladness from the house of our God?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The seeds [of grain] shrivel under the clods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The storehouses are desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The barns are in ruins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the grain is dried up.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: How the animals groan!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The herds of cattle are bewildered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wander aimlessly'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have no pasture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the flocks of sheep suffer.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', I cry out to You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For fire has devoured the pastures of the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the flame has burned up all the trees of the field.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hear this, O elders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen closely, all inhabitants of the land!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Has '
    - type: usfm
      marker: it
      children:
      - type: text
        text: such a thing as
    - type: text
      text: ' this occurred in your days,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or even in the days of your fathers?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Even the wild animals pant [in longing] for You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the water brooks are dried up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And fire has consumed the pastures of the wilderness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tell your children about it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let your children tell their children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their children the next generation.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶What the gnawing locust has left, the swarming locust has eaten;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what the swarming locust has left, the creeping locust has eaten;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what the creeping locust has left, the stripping locust has eaten [in judgment of Judah].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Awake [from your intoxication], you drunkards, and weep;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, all you drinkers of wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the [fresh] sweet wine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is cut off from your mouth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For a [pagan and hostile] nation has invaded My land [like locusts],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mighty and without number;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its teeth are the teeth of a lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it has the fangs of a lioness. [Rev 9:7, 8]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'It has made My vine (My people) a waste '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' object of horror,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And splintered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' broken My fig tree.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has stripped them completely bare and thrown them away;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their branches have become white. [Is 5:5, 6]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '¶Wail like a virgin [bride] clothed with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A coarse cloth made from goat’s hair. It was worn as a sign of mourning or as an act of penitence.
      marker-yv: yv-n
    - type: text
      text: sackcloth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the bridegroom of her youth [who has died].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The [daily] grain offering and the drink offering are cut off
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The priests mourn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who minister to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
