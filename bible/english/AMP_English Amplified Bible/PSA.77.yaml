document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 77
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Comfort in Trouble from Recalling God’s Mighty Deeds.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician; according to Jeduthun [one of David’s three chief musicians, founder of an official musical family]. A Psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My voice rises to God, and I will cry aloud;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My voice rises to God, and He will hear me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In the day of my trouble I [desperately] sought the Lord;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the night my hand was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '77:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and did not grow numb
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: stretched out [in prayer] without weariness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My soul refused to be comforted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I remember God; then I am disquieted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I groan;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I sigh [in prayer], and my spirit grows faint. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You have held my eyelids open;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am so troubled that I cannot speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I have considered the ancient days,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The years [of prosperity] of long, long ago.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will remember my song in the night;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will meditate with my heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And my spirit searches:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Will the Lord reject forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will He never be favorable again?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Has His lovingkindness ceased forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have His promises ended for all time?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Has God forgotten to be gracious?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or has He in anger withdrawn His compassion? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And I said, “This is my grief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That the right hand of the Most High has changed [and His lovingkindness is withheld].”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶I will [solemnly] remember the deeds of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, I will [wholeheartedly] remember Your wonders of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will meditate on all Your works
- type: usfm
  marker: q1
  children:
  - type: text
    text: And thoughtfully consider all Your [great and wondrous] deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your way, O God, is holy [far from sin and guilt].
- type: usfm
  marker: q1
  children:
  - type: text
    text: What god is great like our God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You are the [awesome] God who works [powerful] wonders;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have demonstrated Your power among the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You have with Your [great] arm redeemed Your people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The sons of Jacob and Joseph. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶The waters [of the Red Sea] saw You, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The waters saw You, they were in anguish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The deeps also trembled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The clouds poured down water;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The skies sent out a sound [of rumbling thunder];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your arrows (lightning) flashed here and there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The voice of Your thunder was in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '77:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wheel,
      - type: text
        text: ' possibly referring instead to the wheels on God’s chariot.'
    marker-yv: yv-n
  - type: text
    text: whirlwind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lightnings illumined the world;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth trembled and shook.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your way [of escape for Your people] was through the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your paths through the great waters,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your footprints were not traceable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You led Your people like a flock
- type: usfm
  marker: q1
  children:
  - type: text
    text: By the hand of Moses and Aaron [to the promised goal].
