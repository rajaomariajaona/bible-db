document_id: PSA.77,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 77
  - type: heading
    content: Comfort in Trouble from Recalling God’s Mighty Deeds.
  - type: text
    content: To the Chief Musician; according to Jeduthun [one of David’s three chief musicians, founder of an official musical family]. A Psalm of Asaph.
  - type: text
    content: My voice rises to God, and I will cry aloud;
  - type: text
    content: My voice rises to God, and He will hear me.
  '10':
  - type: text
    content: And I said, “This is my grief,
  - type: text
    content: That the right hand of the Most High has changed [and His lovingkindness is withheld].”
  '11':
  - type: text
    content: ¶I will [solemnly] remember the deeds of the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: Yes, I will [wholeheartedly] remember Your wonders of old.
  '12':
  - type: text
    content: I will meditate on all Your works
  - type: text
    content: And thoughtfully consider all Your [great and wondrous] deeds.
  '13':
  - type: text
    content: Your way, O God, is holy [far from sin and guilt].
  - type: text
    content: What god is great like our God?
  '14':
  - type: text
    content: You are the [awesome] God who works [powerful] wonders;
  - type: text
    content: You have demonstrated Your power among the people.
  '15':
  - type: text
    content: You have with Your [great] arm redeemed Your people,
  - type: text
    content: 'The sons of Jacob and Joseph. '
  - type: text
    content: Selah.
  '16':
  - type: text
    content: ¶The waters [of the Red Sea] saw You, O God;
  - type: text
    content: The waters saw You, they were in anguish;
  - type: text
    content: The deeps also trembled.
  '17':
  - type: text
    content: The clouds poured down water;
  - type: text
    content: The skies sent out a sound [of rumbling thunder];
  - type: text
    content: Your arrows (lightning) flashed here and there.
  '18':
  - type: text
    content: 'The voice of Your thunder was in the '
  - type: note
    content: Lit wheel, possibly referring instead to the wheels on God’s chariot.
  - type: text
    content: whirlwind;
  - type: text
    content: The lightnings illumined the world;
  - type: text
    content: The earth trembled and shook.
  '19':
  - type: text
    content: Your way [of escape for Your people] was through the sea,
  - type: text
    content: And Your paths through the great waters,
  - type: text
    content: And Your footprints were not traceable.
  '2':
  - type: text
    content: In the day of my trouble I [desperately] sought the Lord;
  - type: text
    content: 'In the night my hand was '
  - type: note
    content: Lit and did not grow numb.
  - type: text
    content: stretched out [in prayer] without weariness;
  - type: text
    content: My soul refused to be comforted.
  '20':
  - type: text
    content: You led Your people like a flock
  - type: text
    content: By the hand of Moses and Aaron [to the promised goal].
  '3':
  - type: text
    content: 'I remember God; then I am disquieted '
  - type: text
    content: and
  - type: text
    content: ' I groan;'
  - type: text
    content: 'I sigh [in prayer], and my spirit grows faint. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: You have held my eyelids open;
  - type: text
    content: I am so troubled that I cannot speak.
  '5':
  - type: text
    content: I have considered the ancient days,
  - type: text
    content: The years [of prosperity] of long, long ago.
  '6':
  - type: text
    content: I will remember my song in the night;
  - type: text
    content: I will meditate with my heart,
  - type: text
    content: 'And my spirit searches:'
  '7':
  - type: text
    content: ¶Will the Lord reject forever?
  - type: text
    content: And will He never be favorable again?
  '8':
  - type: text
    content: Has His lovingkindness ceased forever?
  - type: text
    content: Have His promises ended for all time?
  '9':
  - type: text
    content: Has God forgotten to be gracious?
  - type: text
    content: 'Or has He in anger withdrawn His compassion? '
  - type: text
    content: Selah.
