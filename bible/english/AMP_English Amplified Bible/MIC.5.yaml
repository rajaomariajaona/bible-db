  - type: text
    content: ¶“And in that day,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “I will cut off your horses from among you
  - type: text
    content: And destroy your chariots [on which you depend]. [Ps 20:7, 8; Zech 9:10]
  '11':
  - type: text
    content: “I will cut off the cities of your land
  - type: text
    content: And tear down all your fortifications.
  '12':
  - type: text
    content: '“I will cut off witchcrafts '
  - type: text
    content: and
  - type: text
    content: ' sorceries from your hand,'
  - type: text
    content: And you shall have no more fortune-tellers.
  '13':
  - type: text
    content: “I will also cut off your carved images
  - type: text
    content: 'And your '
  - type: text
    content: sacred
  - type: text
    content: ' pillars from among you,'
  - type: text
    content: 'So that you will no longer worship '
  - type: text
    content: and
  - type: text
    content: ' bow down'
  - type: text
    content: To the work of your hands.
  '14':
  - type: text
    content: “I will root out your Asherim (symbols of the goddess Asherah) from among you
  - type: text
    content: And destroy your cities [which are the centers of pagan worship]. [Deut 16:21]
  '15':
  - type: text
    content: “And in anger and wrath I shall execute vengeance
  - type: text
    content: On the nations which have not obeyed [such vengeance as they have not known before].”
  '2':
  - type: text
    content: “But as for you, Bethlehem Ephrathah,
  - type: text
    content: Too little to be among the clans of Judah;
  - type: text
    content: From you One shall come forth for Me [who is] to be Ruler in Israel,
  - type: text
    content: His goings forth (appearances) are from long ago,
  - type: text
    content: 'From '
  - type: note
    content: Lit the days of eternity.
  - type: text
    content: ancient days.” [Gen 49:10; Matt 2:5-12; John 7:42]
  '3':
  - type: text
    content: Therefore, He will give them up until the time
  - type: text
    content: When she who is in labor has given birth to a child.
  - type: text
    content: Then what is left of His kinsmen
  - type: text
    content: Shall return to the children of Israel.
  '4':
  - type: text
    content: 'And He shall stand and shepherd '
  - type: text
    content: and
  - type: text
    content: ' guide '
  - type: text
    content: His flock
  - type: text
    content: In the strength of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: In the majesty of the name of the L
  - type: heading
    content: ord
  - type: text
    content: ' His God;'
  - type: text
    content: And they shall dwell [secure in undisturbed peace],
  - type: text
    content: Because at that time He shall be great [extending His authority]
  - type: text
    content: '[Even] to the ends of the earth. [Ps 72:8; Is 40:11; Zech 9:10; Luke 1:32, 33]'
  '5':
  - type: text
    content: This One [the Messiah] shall be our peace.
  - type: text
    content: W
  - type: text
    content: hen the Assyrian invades our land
  - type: text
    content: 'And tramples on our citadels '
  - type: text
    content: and
  - type: text
    content: ' in our palaces,'
  - type: text
    content: Then shall we raise against him
  - type: text
    content: Seven shepherds and eight princes [an overpowering force] among men. [Is 9:6; Eph 2:14]
  '6':
  - type: text
    content: They shall devastate the land of Assyria with the sword and
  - type: text
    content: The land of Nimrod within her [own] gates.
  - type: text
    content: And He (the Messiah) shall rescue us from the Assyrian (all enemy nations)
  - type: text
    content: When he attacks our land
  - type: text
    content: And when he tramples our territory.
  '7':
  - type: text
    content: ¶Then the remnant of Jacob
  - type: text
    content: Shall be among many peoples
  - type: text
    content: Like dew from the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Like showers on the grass [a source of blessing]
  - type: text
    content: Which [come suddenly and] do not wait for man
  - type: text
    content: Nor delay for the sons of men. [Ps 72:6; 110:3]
  '8':
  - type: text
    content: The remnant of Jacob
  - type: text
    content: Shall be among the nations,
  - type: text
    content: In the midst of many peoples
  - type: text
    content: Like a lion among the beasts of the forest,
  - type: text
    content: Like a young lion [suddenly appearing] among the flocks of sheep
  - type: text
    content: Which, if he passes through,
  - type: text
    content: Tramples down and tears into pieces [the nations in judgment],
  - type: text
    content: And there is no one to rescue.
  '9':
  - type: text
    content: Your hand will be lifted up against your adversaries,
  - type: text
    content: 'And all your enemies shall be cut off '
  - type: text
