  - type: heading
    content: Birth of the King in Bethlehem
  - type: text
    content: “Now gather yourself in troops, O daughter of troops;
  - type: text
    content: A state of siege has been placed against us.
  - type: text
    content: They shall strike the ruler of Israel on the cheek with a rod (scepter).
