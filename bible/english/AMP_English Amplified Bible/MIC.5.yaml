document_id: MIC.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Birth of the King in Bethlehem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Now gather yourself in troops, O daughter of troops;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A state of siege has been placed against us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shall strike the ruler of Israel on the cheek with a rod (scepter).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “But as for you, Bethlehem Ephrathah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Too little to be among the clans of Judah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: From you One shall come forth for Me [who is] to be Ruler in Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His goings forth (appearances) are from long ago,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the days of eternity
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ancient days.” [Gen 49:10; Matt 2:5-12; John 7:42]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore, He will give them up until the time
- type: usfm
  marker: q1
  children:
  - type: text
    text: When she who is in labor has given birth to a child.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then what is left of His kinsmen
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall return to the children of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And He shall stand and shepherd '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guide '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His flock
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the strength of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the majesty of the name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' His God;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they shall dwell [secure in undisturbed peace],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because at that time He shall be great [extending His authority]
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Even] to the ends of the earth. [Ps 72:8; Is 40:11; Zech 9:10; Luke 1:32, 33]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This One [the Messiah] shall be our peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: W
  - type: text
    text: hen the Assyrian invades our land
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And tramples on our citadels '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in our palaces,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then shall we raise against him
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seven shepherds and eight princes [an overpowering force] among men. [Is 9:6; Eph 2:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They shall devastate the land of Assyria with the sword and
- type: usfm
  marker: q1
  children:
  - type: text
    text: The land of Nimrod within her [own] gates.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He (the Messiah) shall rescue us from the Assyrian (all enemy nations)
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he attacks our land
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when he tramples our territory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Then the remnant of Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall be among many peoples
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like dew from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like showers on the grass [a source of blessing]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which [come suddenly and] do not wait for man
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor delay for the sons of men. [Ps 72:6; 110:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The remnant of Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall be among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the midst of many peoples
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a lion among the beasts of the forest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a young lion [suddenly appearing] among the flocks of sheep
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which, if he passes through,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tramples down and tears into pieces [the nations in judgment],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And there is no one to rescue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Your hand will be lifted up against your adversaries,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And all your enemies shall be cut off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶“And in that day,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will cut off your horses from among you
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destroy your chariots [on which you depend]. [Ps 20:7, 8; Zech 9:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I will cut off the cities of your land
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tear down all your fortifications.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“I will cut off witchcrafts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorceries from your hand,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you shall have no more fortune-tellers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “I will also cut off your carved images
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' pillars from among you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that you will no longer worship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bow down'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the work of your hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “I will root out your Asherim (symbols of the goddess Asherah) from among you
- type: usfm
  marker: q1
  children:
  - type: text
    text: And destroy your cities [which are the centers of pagan worship]. [Deut 16:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “And in anger and wrath I shall execute vengeance
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the nations which have not obeyed [such vengeance as they have not known before].”
