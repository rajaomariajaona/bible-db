    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: over the face of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in the open expanse of the heavens.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'God created the great sea monsters and every living creature that moves, with which the waters swarmed according to their kind, and every winged bird according to its kind; and God saw that it was good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' He affirmed and sustained it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And God blessed them, saying, “Be fruitful, multiply, and fill the waters in the seas, and let birds multiply on the earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And there was evening and there was morning, a fifth day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then God said, “Let the earth bring forth living creatures according to (limited to, consistent with) their kind: livestock, crawling things, and wild animals of the earth according to their kinds”; and it was so [because He had spoken them into creation]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So God made the wild animals of the earth according to their kind, and the cattle according to their kind, and everything that creeps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crawls on the earth according to its kind; and God saw that it was good (pleasing, useful) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' He affirmed and sustained it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then God said, “Let Us (Father, Son, Holy Spirit) make man in Our image, according to Our likeness [not physical, but a spiritual personality and moral likeness]; and let them have complete authority over the fish of the sea, the birds of the air, the cattle, and over the entire earth, and over everything that creeps '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crawls on the earth.” [Ps 104:30; Heb 1:2; 11:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So God created man in His own image, in the image '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' likeness of God He created him; male and female He created them. [Col 3:9, 10; James 3:8, 9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And God blessed them [granting them certain authority] and said to them, “Be fruitful, multiply, and fill the earth, and subjugate it [putting it under your power]; and rule over (dominate) the fish of the sea, the birds of the air, and every living thing that moves upon the earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So God said, “Behold, I have given you every plant yielding seed that is on the surface of the entire earth, and every tree which has fruit yielding seed; it shall be food for you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: and to all the animals on the earth and to every bird of the air and to everything that moves on the ground—to everything in which there is the breath of life—
  - type: usfm
    marker: it
    children:
    - type: text
      text: I have given
  - type: text
    text: ' every green plant for food”; and it was so [because He commanded it]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'God saw everything that He had made, and behold, it was very good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' He validated it completely. And there was evening and there was morning, a sixth day.'
