  - type: note
    content: 'This is originally a plural form based on el (root meaning: strength), which itself is used to refer to God in compounds like El Shaddai (Almighty God). The word el is also used to refer to false gods, so the context determines whether Elohim means “God” or is better understood as “gods” (elohim).'
