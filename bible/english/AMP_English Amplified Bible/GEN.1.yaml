  - type: note
    content: Heb bara. Here and in 1:21, God created from nothing which is something only He can do. In 1:27, God used preexisting materials (man from the dust of the ground; Eve from Adam’s rib); each use of the word bara (“create”) must be considered in its specific context.
  - type: text
    content: 'created [by forming from nothing] the heavens and the earth. [Heb 11:3] '
