      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bara
      - type: text
        text: '. Here and in 1:21, God created from nothing which is something only He can do. In 1:27, God used preexisting materials (man from the dust of the ground; Eve from Adam’s rib); each use of the word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bara
      - type: text
        text: ' (“create”) must be considered in its specific context.'
    marker-yv: yv-n
  - type: text
    text: 'created [by forming from nothing] the heavens and the earth. [Heb 11:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The earth was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew text here has two rhyming words, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tohu
      - type: text
        text: ' and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bohu,
      - type: text
        text: ' which have similar meanings of “wasteness” and “emptiness.” The construction is a figure of speech called '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hendiadys,
      - type: text
        text: ' in which two words are used together to express the same idea. The meaning is that the earth had no clearly discernible features at this point in creation but essentially was a mass of raw materials. This proves to be very important from philosophical and scientific viewpoints, because it documents the fact that the raw matter of the earth—and by extension, of the universe—did not coexist eternally with God, but was created by Him '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ex nihilo
      - type: text
        text: ' (Latin “out of nothing”).'
    marker-yv: yv-n
  - type: text
    text: 'formless and void '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a waste and emptiness, and darkness was upon the face of the deep [primeval ocean that covered the unformed earth]. The Spirit of God was moving (hovering, brooding) over the face of the waters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And God said, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not in the imperative mood (the ordinary grammatical form for a command), but God willed these creative events into existence. It is the voluntative mood in Hebrew. This translates, “It is My will that this happen.” English does not have the voluntative mood, which includes the jussive and cohortative forms. When “let” is used in this way, it represents a command not in the imperative mood, but rather an expression of God’s will, the jussive form. God literally commanded (willed) the world into existence.
    marker-yv: yv-n
  - type: text
    text: '“Let there be light”; and there was light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'God saw that the light was good (pleasing, useful) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “He affirmed and sustained it” is understood (deduced) from the context. The italic “and” alerts the reader or student of Hebrew that the word or words that follow are amplifications not found in the Hebrew text itself, but implied by it or by contextual factors.
    marker-yv: yv-n
  - type: text
    text: 'He affirmed and sustained it; and God separated the light [distinguishing it] from the darkness. [2 Cor 4:6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And God called the light day, and the darkness He called night. And there was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word translated “evening” indicates dusk or sunset.
    marker-yv: yv-n
  - type: text
    text: 'evening and there was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word translated “morning” indicates the time when it is getting light (dawn).
    marker-yv: yv-n
  - type: text
    text: morning, one day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
