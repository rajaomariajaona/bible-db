  '2':
  - type: text
    content: 'The earth was '
  - type: note
    content: The Hebrew text here has two rhyming words, tohu and bohu, which have similar meanings of “wasteness” and “emptiness.” The construction is a figure of speech called hendiadys, in which two words are used together to express the same idea. The meaning is that the earth had no clearly discernible features at this point in creation but essentially was a mass of raw materials. This proves to be very important from philosophical and scientific viewpoints, because it documents the fact that the raw matter of the earth—and by extension, of the universe—did not coexist eternally with God, but was created by Him ex nihilo (Latin “out of nothing”).
  - type: text
    content: 'formless and void '
  - type: text
    content: or
  - type: text
    content: ' a waste and emptiness, and darkness was upon the face of the deep [primeval ocean that covered the unformed earth]. The Spirit of God was moving (hovering, brooding) over the face of the waters. '
