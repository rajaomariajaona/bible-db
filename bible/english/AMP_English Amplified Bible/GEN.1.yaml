    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a firmament
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'expanse [of the sky] in the midst of the waters, and let it separate the waters [below the expanse] from the waters [above the expanse].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And God made the expanse [of sky] and separated the waters which were under the expanse from the waters which were above the expanse; and it was so [just as He commanded]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God called the expanse [of sky] heaven. And there was evening and there was morning, a second day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then God said, “Let the waters below the heavens be gathered into one place [of standing, pooling together], and let the dry land appear”; and it was so. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'God called the dry land earth, and the gathering of the waters He called seas; and God saw that this was good (pleasing, useful) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' He affirmed and sustained it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So God said, “Let the earth sprout [tender] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: grass
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'vegetation, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
