        marker: it
        children:
        - type: text
          text: herbs
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'plants yielding seed, and fruit trees bearing fruit according to (limited to, consistent with) their kind, whose seed is in them upon the earth”; and it was so. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The earth sprouted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundantly produced vegetation, plants yielding seed according to their kind, and trees bearing fruit with seed in them, according to their kind; and God saw that it was good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' He affirmed and sustained it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And there was evening and there was morning, a third day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then God said, “Let there be light-bearers (sun, moon, stars) in the expanse of the heavens to separate the day from the night, and let them be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: useful
  - type: text
    text: ' for signs (tokens) [of God’s provident care], and for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: marking
  - type: text
    text: ' seasons, days, and years; [Gen 8:22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and let them be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: useful
  - type: text
    text: ' as lights in the expanse of the heavens to provide light on the earth”; and it was so, [just as He commanded]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'God made the two great lights—the greater light (the sun) to rule the day, and the lesser light (the moon) to rule the night; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He made
  - type: text
    text: ' the [galaxies of] stars also [that is, all the amazing wonders in the heavens]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'God placed them in the expanse of the heavens to provide light upon the earth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'to rule over the day and the night, and to separate the light from the darkness; and God saw that it was good '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' He affirmed and sustained it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And there was evening and there was morning, a fourth day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then God said, “Let the waters swarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abundantly produce living creatures, and let birds soar above the earth '
  - type: usfm
