  - type: text
    content: ' likeness of God He created him; male and female He created them. [Col 3:9, 10; James 3:8, 9] '
  '28':
  - type: text
    content: 'And God blessed them [granting them certain authority] and said to them, “Be fruitful, multiply, and fill the earth, and subjugate it [putting it under your power]; and rule over (dominate) the fish of the sea, the birds of the air, and every living thing that moves upon the earth.” '
  '29':
  - type: text
    content: 'So God said, “Behold, I have given you every plant yielding seed that is on the surface of the entire earth, and every tree which has fruit yielding seed; it shall be food for you; '
  '3':
  - type: text
    content: 'And God said, '
  - type: note
    content: This is not in the imperative mood (the ordinary grammatical form for a command), but God willed these creative events into existence. It is the voluntative mood in Hebrew. This translates, “It is My will that this happen.” English does not have the voluntative mood, which includes the jussive and cohortative forms. When “let” is used in this way, it represents a command not in the imperative mood, but rather an expression of God’s will, the jussive form. God literally commanded (willed) the world into existence.
  - type: text
    content: '“Let there be light”; and there was light. '
  '30':
