  '26':
  - type: text
    content: 'Then God said, “Let Us (Father, Son, Holy Spirit) make man in Our image, according to Our likeness [not physical, but a spiritual personality and moral likeness]; and let them have complete authority over the fish of the sea, the birds of the air, the cattle, and over the entire earth, and over everything that creeps '
  - type: text
