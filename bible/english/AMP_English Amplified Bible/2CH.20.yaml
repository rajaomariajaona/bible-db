document_id: 2CH.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah Invaded
  - type: text
    content: 'Now it happened after this that the Moabites and the Ammonites, together with some of the Meunites, came to make war against Jehoshaphat. '
  '10':
  - type: text
    content: 'Now behold, the sons of Ammon and Moab and Mount Seir, whom You would not allow Israel to invade when they came from the land of Egypt (for they turned away from them and did not destroy them), [Deut 2:9] '
  '11':
  - type: text
    content: 'here they are, rewarding us by coming to drive us out of Your possession which You have given us as an inheritance. '
  '12':
  - type: text
    content: O our God, will You not judge them? For we are powerless against this great multitude which is coming against us. We do not know what to do, but our eyes are on You.”
  '13':
  - type: text
    content: So all Judah stood before the L
  - type: heading
    content: ord
  - type: text
    content: ', with their infants, their wives, and their children.'
  - type: heading
    content: Jahaziel Answers the Prayer
  '14':
  - type: text
    content: Then in the midst of the assembly the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' came upon Jahaziel the son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah, a Levite of the sons of Asaph. '
  '15':
  - type: text
    content: He said, “Listen carefully, all [you people of] Judah, and you inhabitants of Jerusalem, and King Jehoshaphat. The L
  - type: heading
    content: ord
  - type: text
    content: ' says this to you: ‘Be not afraid or dismayed at this great multitude, for the battle is not yours, but God’s. '
  '16':
  - type: text
    content: 'Go down against them tomorrow. Behold, they will come up by the ascent of Ziz, and you will find them at the end of the river valley, in front of the Wilderness of Jeruel. '
  '17':
  - type: text
    content: 'You '
  - type: text
    content: need
  - type: text
    content: ' not fight in this '
  - type: text
    content: battle;
  - type: text
    content: ' take your positions, stand and witness the salvation of the L'
  - type: heading
    content: ord
  - type: text
    content: ' who is with you, O Judah and Jerusalem. Do not fear or be dismayed; tomorrow go out against them, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' is with you.’ ”'
  '18':
  - type: text
    content: Jehoshaphat bowed with his face to the ground, and all Judah and the inhabitants of Jerusalem fell down before the L
  - type: heading
    content: ord
  - type: text
    content: ', worshiping Him. '
  '19':
  - type: text
    content: The Levites, from the sons of the Kohathites and the sons of the Korahites, stood up to praise the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, with a very loud voice.'
  - type: heading
    content: Enemies Destroy Themselves
  '2':
  - type: text
    content: 'Then it was reported to Jehoshaphat, “A great multitude has come against you from beyond the [Dead] Sea, out of '
  - type: note
    content: Another reading is Edom.
  - type: text
    content: 'Aram (Syria); and behold, they are in Hazazon-tamar (that is, Engedi).” '
  '20':
  - type: text
    content: 'So they got up early in the morning and went out into the Wilderness of Tekoa; and as they went out, Jehoshaphat stood and said, “Hear me, O Judah, and you inhabitants of Jerusalem! Believe '
  - type: text
    content: and
  - type: text
    content: ' trust in the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God and you will be established (secure). Believe '
  - type: text
    content: and
  - type: text
    content: ' trust in His prophets and succeed.” '
  '21':
  - type: text
    content: When he had consulted with the people, he appointed those who sang to the L
  - type: heading
    content: ord
  - type: text
    content: ' and those who praised Him in their holy (priestly) attire, as they went out before the army and said, “Praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks to the L'
  - type: heading
    content: ord
  - type: text
    content: ', for His mercy '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness endure forever.” '
  '22':
  - type: text
    content: When they began singing and praising, the L
  - type: heading
    content: ord
  - type: text
    content: ' set ambushes against the sons of Ammon, Moab, and Mount Seir, who had come against Judah; so they were struck down [in defeat]. '
  '23':
  - type: text
    content: For the sons of Ammon and Moab [suspecting betrayal] rose up against the inhabitants of Mount Seir, completely destroying them; and when they had finished with the inhabitants of Seir, they helped to destroy one another.
  '24':
  - type: text
    content: 'When [the men of] Judah came to the lookout tower of the wilderness, they looked toward the multitude, and behold, they were dead bodies lying on the ground, and no one had escaped. '
  '25':
  - type: text
    content: 'When Jehoshaphat and his people came to take their spoil, they found much among them, '
  - type: text
    content: including
  - type: text
    content: ' equipment, garments, and valuable things which they took for themselves, more than they could carry away; so much that they spent three days gathering the spoil.'
  - type: heading
    content: Triumphant Return to Jerusalem
  '26':
  - type: text
    content: Then on the fourth day they assembled in the Valley of Beracah, for it was there that they blessed the L
  - type: heading
    content: ord
  - type: text
    content: '. For that reason they named that place “The Valley of Beracah (blessing)” until today. '
  '27':
  - type: text
    content: Then they returned to Jerusalem with joy, every man of Judah and Jerusalem, led by Jehoshaphat, for the L
  - type: heading
    content: ord
  - type: text
    content: ' had made them rejoice over their enemies. '
  '28':
  - type: text
    content: They came to Jerusalem with harps, lyres, and trumpets to the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '29':
  - type: text
    content: And the fear of God came on all the kingdoms of those countries when they heard that the L
  - type: heading
    content: ord
  - type: text
    content: ' had fought against the enemies of Israel. '
  '3':
  - type: text
    content: Then Jehoshaphat was afraid and set himself [determinedly, as his vital need] to seek the L
  - type: heading
    content: ord
  - type: text
    content: '; and he proclaimed a fast throughout all Judah. '
  '30':
  - type: text
    content: So the kingdom of Jehoshaphat was quiet, for his God gave him rest on all sides.
  '31':
  - type: text
    content: 'Now Jehoshaphat reigned over Judah. He was thirty-five years old when he became king, and he reigned in Jerusalem for twenty-five years. His mother’s name was Azubah the daughter of Shilhi. '
  '32':
  - type: text
    content: He walked in the way of his father Asa and did not depart from it, doing what was right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '33':
  - type: text
    content: Only the high places [for pagan sacrifices] were not removed, for the people had not yet set their hearts firmly on the God of their fathers.
  '34':
  - type: text
    content: Now the rest of the acts of Jehoshaphat, from the first to the last, behold, they are written in the records of Jehu the son of Hanani, which are recorded in the Book of the Kings of Israel.
  - type: heading
    content: Alliance Displeases God
  '35':
  - type: text
    content: 'After [all] this Jehoshaphat king of Judah made an alliance with Ahaziah king of Israel, and he acted wickedly in doing so. '
  '36':
  - type: text
    content: 'He joined him in building ships to go to Tarshish [for trade], and they built them in Ezion-geber. '
  '37':
  - type: text
    content: Then Eliezer the son of Dodavahu of Mareshah prophesied against Jehoshaphat, saying, “Because you have allied yourself with Ahaziah, the L
  - type: heading
    content: ord
  - type: text
    content: ' has broken down what you have built.” So the ships were wrecked and were unable to go to Tarshish.'
  '4':
  - type: text
    content: So [the people of] Judah gathered together to seek help from the L
  - type: heading
    content: ord
  - type: text
    content: ; indeed they came from all the cities of Judah to seek the L
  - type: heading
    content: ord
  - type: text
    content: ' [longing for Him with all their heart].'
  - type: heading
    content: Jehoshaphat’s Prayer
  '5':
  - type: text
    content: Then Jehoshaphat stood in the assembly of Judah and Jerusalem, in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' in front of the new courtyard, '
  '6':
  - type: text
    content: and said, “O L
  - type: heading
    content: ord
  - type: text
    content: ', God of our fathers, are You not God in heaven? And do You not rule over all the kingdoms of the nations? Power and might are in Your hand, there is no one able to take a stand against You. '
  '7':
  - type: text
    content: 'O our God, did You not drive out the inhabitants of this land before Your people Israel and give it forever to the descendants of Your friend Abraham? '
  '8':
  - type: text
    content: 'They have lived in it, and have built You a sanctuary in it for Your Name, saying, '
  '9':
  - type: text
    content: '‘If evil comes on us, or the sword of judgment, or plague, or famine, we will stand before this house and before You (for Your Name '
  - type: text
    content: and
  - type: text
    content: ' Your Presence is in this house) and we will cry out to You in our distress, and You will hear and save us.’ '
