document_id: 2CH.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah Invaded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it happened after this that the Moabites and the Ammonites, together with some of the Meunites, came to make war against Jehoshaphat. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then it was reported to Jehoshaphat, “A great multitude has come against you from beyond the [Dead] Sea, out of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Another reading is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Edom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Aram (Syria); and behold, they are in Hazazon-tamar (that is, Engedi).” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Jehoshaphat was afraid and set himself [determinedly, as his vital need] to seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; and he proclaimed a fast throughout all Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So [the people of] Judah gathered together to seek help from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; indeed they came from all the cities of Judah to seek the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [longing for Him with all their heart].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehoshaphat’s Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Jehoshaphat stood in the assembly of Judah and Jerusalem, in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in front of the new courtyard, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and said, “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', God of our fathers, are You not God in heaven? And do You not rule over all the kingdoms of the nations? Power and might are in Your hand, there is no one able to take a stand against You. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'O our God, did You not drive out the inhabitants of this land before Your people Israel and give it forever to the descendants of Your friend Abraham? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They have lived in it, and have built You a sanctuary in it for Your Name, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '‘If evil comes on us, or the sword of judgment, or plague, or famine, we will stand before this house and before You (for Your Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Your Presence is in this house) and we will cry out to You in our distress, and You will hear and save us.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now behold, the sons of Ammon and Moab and Mount Seir, whom You would not allow Israel to invade when they came from the land of Egypt (for they turned away from them and did not destroy them), [Deut 2:9] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'here they are, rewarding us by coming to drive us out of Your possession which You have given us as an inheritance. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O our God, will You not judge them? For we are powerless against this great multitude which is coming against us. We do not know what to do, but our eyes are on You.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So all Judah stood before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', with their infants, their wives, and their children.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jahaziel Answers the Prayer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then in the midst of the assembly the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came upon Jahaziel the son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah, a Levite of the sons of Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He said, “Listen carefully, all [you people of] Judah, and you inhabitants of Jerusalem, and King Jehoshaphat. The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says this to you: ‘Be not afraid or dismayed at this great multitude, for the battle is not yours, but God’s. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Go down against them tomorrow. Behold, they will come up by the ascent of Ziz, and you will find them at the end of the river valley, in front of the Wilderness of Jeruel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: need
  - type: text
    text: ' not fight in this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: battle;
  - type: text
    text: ' take your positions, stand and witness the salvation of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who is with you, O Judah and Jerusalem. Do not fear or be dismayed; tomorrow go out against them, for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is with you.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jehoshaphat bowed with his face to the ground, and all Judah and the inhabitants of Jerusalem fell down before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', worshiping Him. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The Levites, from the sons of the Kohathites and the sons of the Korahites, stood up to praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, with a very loud voice.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Enemies Destroy Themselves
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So they got up early in the morning and went out into the Wilderness of Tekoa; and as they went out, Jehoshaphat stood and said, “Hear me, O Judah, and you inhabitants of Jerusalem! Believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and you will be established (secure). Believe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trust in His prophets and succeed.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When he had consulted with the people, he appointed those who sang to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and those who praised Him in their holy (priestly) attire, as they went out before the army and said, “Praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for His mercy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness endure forever.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When they began singing and praising, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' set ambushes against the sons of Ammon, Moab, and Mount Seir, who had come against Judah; so they were struck down [in defeat]. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For the sons of Ammon and Moab [suspecting betrayal] rose up against the inhabitants of Mount Seir, completely destroying them; and when they had finished with the inhabitants of Seir, they helped to destroy one another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When [the men of] Judah came to the lookout tower of the wilderness, they looked toward the multitude, and behold, they were dead bodies lying on the ground, and no one had escaped. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When Jehoshaphat and his people came to take their spoil, they found much among them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: including
  - type: text
    text: ' equipment, garments, and valuable things which they took for themselves, more than they could carry away; so much that they spent three days gathering the spoil.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Triumphant Return to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then on the fourth day they assembled in the Valley of Beracah, for it was there that they blessed the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. For that reason they named that place “The Valley of Beracah (blessing)” until today. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then they returned to Jerusalem with joy, every man of Judah and Jerusalem, led by Jehoshaphat, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had made them rejoice over their enemies. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They came to Jerusalem with harps, lyres, and trumpets to the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And the fear of God came on all the kingdoms of those countries when they heard that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had fought against the enemies of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So the kingdom of Jehoshaphat was quiet, for his God gave him rest on all sides.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Now Jehoshaphat reigned over Judah. He was thirty-five years old when he became king, and he reigned in Jerusalem for twenty-five years. His mother’s name was Azubah the daughter of Shilhi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He walked in the way of his father Asa and did not depart from it, doing what was right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Only the high places [for pagan sacrifices] were not removed, for the people had not yet set their hearts firmly on the God of their fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Now the rest of the acts of Jehoshaphat, from the first to the last, behold, they are written in the records of Jehu the son of Hanani, which are recorded in the Book of the Kings of Israel.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Alliance Displeases God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'After [all] this Jehoshaphat king of Judah made an alliance with Ahaziah king of Israel, and he acted wickedly in doing so. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He joined him in building ships to go to Tarshish [for trade], and they built them in Ezion-geber. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Then Eliezer the son of Dodavahu of Mareshah prophesied against Jehoshaphat, saying, “Because you have allied yourself with Ahaziah, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has broken down what you have built.” So the ships were wrecked and were unable to go to Tarshish.'
