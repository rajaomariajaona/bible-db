document_id: 2SA.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Plans to Build a Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: When King David lived in his house (palace) and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had given him rest from all his surrounding enemies, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will appoint a place for My people Israel and will plant them, so that they may live in a place of their own and not be disturbed again. The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sons of wickedness
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'wicked will not afflict them again, as formerly, '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: even from the day that I appointed judges over My people Israel; and I will give you rest from all your enemies. The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also declares to you that He will make a house (royal dynasty) for you. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When your days are fulfilled and you lie down [in death] with your fathers (ancestors), I will raise up your descendant after you, who shall be born to you, and I will establish his kingdom. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He [is the one who] shall build a house for My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Name” is equivalent to “Me” in 2 Sam 7:5. See also note Deut 12:5.
      marker-yv: yv-n
    - type: text
      text: 'Name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' My Presence, and I will establish the throne of his kingdom forever. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I will be his Father, and he shall be My son. When he commits iniquity (wrongdoing), I will discipline him with the rod of men and with the strokes of the sons of man. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But My lovingkindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy will not depart from him, as I took it from Saul, whom I removed from before you. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Your house (royal dynasty) and your kingdom will endure forever before Me; your throne will be established forever.” ’ ” '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Nathan spoke to David in accordance with all these words and all of this vision.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Prayer
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then King David went in and sat [in prayer] before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and said, “Who am I, O Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH
        - type: text
          text: ', usually rendered L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ', and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', and what is my house (family), that You have brought me this far? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet this was very insignificant in Your eyes, O Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', for You have spoken also of Your servant’s house (royal dynasty) in the distant future. And this is the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' custom of man, O Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the king said to Nathan the prophet, “See now, I dwell in a house of cedar, but the ark of God dwells within tent curtains.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What more can David say to You? For You know (acknowledge, choose) Your servant, O Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of Your word (promise), and in accordance with Your own heart, You have done all these great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' astounding things to let Your servant know (understand). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore You are great, O Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '; for there is none like You, and there is no God besides You, according to all that we have heard with our ears. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What one nation on earth is like Your people Israel, whom God went to redeem for Himself as a people and to make a name for Himself, and to do great and awesome things for Yourself and for Your land, before Your people whom You have redeemed for Yourself from Egypt, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' nations and their gods? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You established for Yourself Your people Israel as Your people forever, and You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', have become their God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God, confirm forever the word [of the covenant] that You have spoken in regard to Your servant and his house (royal dynasty); and do just as You have spoken, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that Your Name may be magnified forever, saying, ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts (armies) is God over Israel;’ and may the house (royal dynasty) of Your servant David be established '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. in Your Presence.
      marker-yv: yv-n
    - type: text
      text: 'before You. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, God of Israel, have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: uncovered the ear of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'revealed this to Your servant, saying, ‘I will build you a house (royal dynasty).’ For that reason Your servant has found '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: his heart
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'courage to pray this prayer to You. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And now, O Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', You are God, and Your words are truth, and You have promised this good thing to Your servant. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore now, may it please You to bless the house (royal dynasty) of Your servant, so that it may continue forever before You; for You, O Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', have spoken it, and with Your blessing may the house of Your servant be blessed forever.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Nathan said to the king, “Go, do everything that is in your heart, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is with you.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But it happened that night that the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Nathan, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go and tell My servant David, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Should you be the one to build Me a house in which to dwell? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have not dwelt in a house since the day I brought the sons (descendants) of Israel up from Egypt, even to this day; but I have been moving about in a tent, even in a tabernacle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wherever I have gone with all the Israelites, did I speak a word to any from the tribes of Israel, whom I commanded to shepherd My people Israel, asking, ‘Why have you not built Me a house of cedar?’ ” ’
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Covenant with David
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So now, say this to My servant David, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “I took you from the pasture, from following the sheep, to be ruler over My people Israel. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I have been with you wherever you have gone, and have cut off all your enemies from before you; and I will make you a great name, like that of the great men of the earth. '
