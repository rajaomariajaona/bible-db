document_id: 2SA.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David Plans to Build a Temple
  - type: text
    content: When King David lived in his house (palace) and the L
  - type: heading
    content: ord
  - type: text
    content: ' had given him rest from all his surrounding enemies, '
  '10':
  - type: text
    content: 'I will appoint a place for My people Israel and will plant them, so that they may live in a place of their own and not be disturbed again. The '
  - type: note
    content: Lit sons of wickedness.
  - type: text
    content: 'wicked will not afflict them again, as formerly, '
  '11':
  - type: text
    content: even from the day that I appointed judges over My people Israel; and I will give you rest from all your enemies. The L
  - type: heading
    content: ord
  - type: text
    content: ' also declares to you that He will make a house (royal dynasty) for you. '
  '12':
  - type: text
    content: 'When your days are fulfilled and you lie down [in death] with your fathers (ancestors), I will raise up your descendant after you, who shall be born to you, and I will establish his kingdom. '
  '13':
  - type: text
    content: 'He [is the one who] shall build a house for My '
  - type: note
    content: “Name” is equivalent to “Me” in 2 Sam 7:5. See also note Deut 12:5.
  - type: text
    content: 'Name '
  - type: text
    content: and
  - type: text
    content: ' My Presence, and I will establish the throne of his kingdom forever. '
  '14':
  - type: text
    content: 'I will be his Father, and he shall be My son. When he commits iniquity (wrongdoing), I will discipline him with the rod of men and with the strokes of the sons of man. '
  '15':
  - type: text
    content: 'But My lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' mercy will not depart from him, as I took it from Saul, whom I removed from before you. '
  '16':
  - type: text
    content: 'Your house (royal dynasty) and your kingdom will endure forever before Me; your throne will be established forever.” ’ ” '
  '17':
  - type: text
    content: Nathan spoke to David in accordance with all these words and all of this vision.
  - type: heading
    content: David’s Prayer
  '18':
  - type: text
    content: Then King David went in and sat [in prayer] before the L
  - type: heading
    content: ord
  - type: text
    content: ', and said, “Who am I, O Lord '
  - type: note
    content: Heb YHWH, usually rendered Lord, and so throughout the chapter.
  - type: text
    content: G
  - type: heading
    content: od
  - type: text
    content: ', and what is my house (family), that You have brought me this far? '
  '19':
  - type: text
    content: Yet this was very insignificant in Your eyes, O Lord G
  - type: heading
    content: od
  - type: text
    content: ', for You have spoken also of Your servant’s house (royal dynasty) in the distant future. And this is the law '
  - type: text
    content: and
  - type: text
    content: ' custom of man, O Lord G'
  - type: heading
    content: od
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'the king said to Nathan the prophet, “See now, I dwell in a house of cedar, but the ark of God dwells within tent curtains.” '
  '20':
  - type: text
    content: What more can David say to You? For You know (acknowledge, choose) Your servant, O Lord G
  - type: heading
    content: od
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Because of Your word (promise), and in accordance with Your own heart, You have done all these great '
  - type: text
    content: and
  - type: text
    content: ' astounding things to let Your servant know (understand). '
  '22':
  - type: text
    content: Therefore You are great, O Lord G
  - type: heading
    content: od
  - type: text
    content: '; for there is none like You, and there is no God besides You, according to all that we have heard with our ears. '
  '23':
  - type: text
    content: 'What one nation on earth is like Your people Israel, whom God went to redeem for Himself as a people and to make a name for Himself, and to do great and awesome things for Yourself and for Your land, before Your people whom You have redeemed for Yourself from Egypt, '
  - type: text
    content: from
  - type: text
    content: ' nations and their gods? '
  '24':
  - type: text
    content: You established for Yourself Your people Israel as Your people forever, and You, O L
  - type: heading
    content: ord
  - type: text
    content: ', have become their God. '
  '25':
  - type: text
    content: Now, O L
  - type: heading
    content: ord
  - type: text
    content: ' God, confirm forever the word [of the covenant] that You have spoken in regard to Your servant and his house (royal dynasty); and do just as You have spoken, '
  '26':
  - type: text
    content: so that Your Name may be magnified forever, saying, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts (armies) is God over Israel;’ and may the house (royal dynasty) of Your servant David be established '
  - type: note
    content: I.e. in Your Presence.
  - type: text
    content: 'before You. '
  '27':
  - type: text
    content: For You, O L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, God of Israel, have '
  - type: note
    content: Lit uncovered the ear of.
  - type: text
    content: 'revealed this to Your servant, saying, ‘I will build you a house (royal dynasty).’ For that reason Your servant has found '
  - type: note
    content: Lit his heart.
  - type: text
    content: 'courage to pray this prayer to You. '
  '28':
  - type: text
    content: And now, O Lord G
  - type: heading
    content: od
  - type: text
    content: ', You are God, and Your words are truth, and You have promised this good thing to Your servant. '
  '29':
  - type: text
    content: Therefore now, may it please You to bless the house (royal dynasty) of Your servant, so that it may continue forever before You; for You, O Lord G
  - type: heading
    content: od
  - type: text
    content: ', have spoken it, and with Your blessing may the house of Your servant be blessed forever.”'
  '3':
  - type: text
    content: And Nathan said to the king, “Go, do everything that is in your heart, for the L
  - type: heading
    content: ord
  - type: text
    content: ' is with you.”'
  '4':
  - type: text
    content: But it happened that night that the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Nathan, saying, '
  '5':
  - type: text
    content: “Go and tell My servant David, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Should you be the one to build Me a house in which to dwell? '
  '6':
  - type: text
    content: 'For I have not dwelt in a house since the day I brought the sons (descendants) of Israel up from Egypt, even to this day; but I have been moving about in a tent, even in a tabernacle. '
  '7':
  - type: text
    content: Wherever I have gone with all the Israelites, did I speak a word to any from the tribes of Israel, whom I commanded to shepherd My people Israel, asking, ‘Why have you not built Me a house of cedar?’ ” ’
  - type: heading
    content: God’s Covenant with David
  '8':
  - type: text
    content: So now, say this to My servant David, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “I took you from the pasture, from following the sheep, to be ruler over My people Israel. '
  '9':
  - type: text
    content: 'I have been with you wherever you have gone, and have cut off all your enemies from before you; and I will make you a great name, like that of the great men of the earth. '
