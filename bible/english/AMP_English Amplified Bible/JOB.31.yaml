  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I have made a covenant (agreement) with my eyes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: How then could I gaze [lustfully] at a virgin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “For what is the portion I would have from God above,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what heritage from the Almighty on high?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Does not tragedy fall [justly] on the unjust
- type: usfm
  marker: q1
  children:
  - type: text
    text: And disaster to those who work wickedness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Does not God see my ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: And count all my steps?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶“If I have walked with falsehood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or if my foot has chased after deceit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oh, let Him weigh me with accurate scales,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let God know my integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “If my step has turned away from the way [of God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or if my heart has [covetously] followed my eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or if any spot [of guilt] has stained my hands,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then let me plant and [let] another eat [from the results of my labor],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And let my crops be uprooted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruined.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '¶“If my heart has been enticed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' I was made a fool by a woman,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or if I have [covetously] lurked at my neighbor’s door [until his departure],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let my wife grind [meal, like a bond slave] for another [man],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And let others '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. participate in sexual intimacy.
    marker-yv: yv-n
  - type: text
    text: kneel down over her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: adultery
  - type: text
    text: ' is a heinous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lustful crime;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Moreover, it would be a sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: punishable by
  - type: text
    text: ' the judges. [Deut 22:22; John 8:5]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “For it is a fire which consumes to Abaddon (destruction, ruin, final torment);
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [illicit passion] would burn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rage '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uproot all my [life’s] increase [destroying everything].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '¶“If I have despised '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected the claim of my male or female servants'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they filed a complaint against me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: What then could I do when God arises [to judge me]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When He calls me to account, what will I answer Him? [Ps 44:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Did not He who made me in the womb make my servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And did not the same One fashion us both in the womb? [Prov 14:31; 22:2; Mal 2:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '¶“If I have withheld from the poor what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they
  - type: text
    text: ' desired,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or have caused the eyes of the widow to look in vain [for relief],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Or have eaten my morsel [of food] alone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And did not share it with the orphan
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: (But from my youth the orphan grew up with me as with a father,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from my mother’s womb I have been the widow’s guide),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If I have seen anyone perish for lack of clothing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or any poor person without covering,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'If his loins have not thanked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessed me [for clothing them],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if he was not warmed with the fleece of my sheep,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If I have lifted my hand against the orphan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I saw [that the judges would be] my help at the [council] gate,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then let my shoulder fall away from its socket,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my arm be broken off at the elbow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “For tragedy from God is a terror to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And because of His majesty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exaltation I can do nothing [nor endure facing Him]. [Is 13:6; Joel 1:15]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '¶“If I have put my trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confidence in gold,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or have declared fine gold my hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' assurance,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'If I gloated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejoiced because my wealth was great,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because my [powerful] hand [alone] had obtained so much,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: If I beheld the sun [as an object of worship] when it shone
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or the moon going in its splendor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And my heart became secretly enticed [by them],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my hand threw a kiss from my mouth [in respect to them],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This also would have been [a heinous] sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: calling for
  - type: text
    text: ' judgment,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I would have denied God above. [Deut 4:19; 17:2-7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ¶“Have I rejoiced at the destruction of the enemy [who hated me],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or exulted [in malicious triumph] when evil overtook him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “No, I have not allowed my mouth to sin
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'By cursing my enemy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' asking for his life.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “I assure you, the men of my tent have said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Who can find one [in need] who has not been satisfied with his meat’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “The stranger has not lodged in the street,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I have opened my door to the traveler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“Have I concealed my transgressions like Adam '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' like other men,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: By hiding my wickedness in my bosom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Because I feared the great multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the contempt of families terrified me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that I kept silence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' did not acknowledge my sin and did not go out of the door?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “Oh, that I had one to listen to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look, here is my signature (mark);
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the Almighty answer me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let my adversary write out His indictment [and put His vague accusations in tangible form].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “Surely I would [proudly] bear it on my shoulder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bind the scroll around my head like a crown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “I would count out to Him the number of my steps [with every detail of my life],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Approaching His presence as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: if I were
  - type: text
    text: ' a prince.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ¶“For if my land has cried out against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its furrows weep together;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: If I have eaten its fruits without paying for them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or have caused its [rightful] owners to lose their lives,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Let thorns grow instead of wheat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And stinkweed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cockleburs instead of barley.”'
- type: usfm
  marker: m
  children:
  - type: text
    text: So the words of Job [with his friends] are finished.
