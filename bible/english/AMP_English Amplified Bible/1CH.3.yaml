document_id: 1CH.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Family of David
  - type: text
    content: 'These were the sons of David who were born to him in Hebron: the firstborn was Amnon, by Ahinoam the Jezreelitess; second, Daniel (Chileab), by Abigail the Carmelitess; '
  '10':
  - type: text
    content: 'Solomon’s son was Rehoboam. Abijah was his son, Asa his son, Jehoshaphat his son, '
  '11':
  - type: note
    content: Usually spelled Jehoram in the Hebrew.
  - type: text
    content: 'Joram (Jehoram) his son, Ahaziah his son, Joash his son, '
  '12':
  - type: text
    content: 'Amaziah his son, Azariah his son, Jotham his son, '
  '13':
  - type: text
    content: 'Ahaz his son, Hezekiah his son, Manasseh his son, '
  '14':
  - type: text
    content: 'Amon his son, Josiah his son. '
  '15':
  - type: text
    content: 'The sons of Josiah: firstborn, Johanan; second, Jehoiakim (Eliakim); third, Zedekiah; fourth, Shallum (Jehoahaz). '
  '16':
  - type: text
    content: 'The sons (descendants) of Jehoiakim: Jehoiachin (Jeconiah) his son, Zedekiah his son. '
  '17':
  - type: text
    content: 'The sons (descendants) of Jehoiachin (Jeconiah) the prisoner: Shealtiel his son, '
  '18':
  - type: text
    content: 'Malchiram, Pedaiah, Shenazzar, Jekamiah, Hoshama and Nedabiah. '
  '19':
  - type: text
    content: 'The sons of Pedaiah: Zerubbabel and Shimei. The sons of Zerubbabel: Meshullam and Hananiah, and Shelomith was their sister; '
  '2':
  - type: text
    content: 'third, Absalom the son of Maacah, daughter of Talmai king of Geshur; fourth, Adonijah, the son of Haggith; '
  '20':
  - type: text
    content: 'and Hashubah, Ohel, Berechiah, Hasadiah, and Jushab-hesed—five '
  - type: text
    content: in all
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'The sons of Hananiah: Pelatiah and Jeshaiah, the sons of Rephaiah, the sons of Arnan, the sons of Obadiah, the sons of Shecaniah. '
  '22':
  - type: text
    content: 'The sons (descendants) of Shecaniah: Shemaiah. The sons of Shemaiah: Hattush, Igal, Bariah, Neariah, and Shaphat—six '
  - type: text
    content: in all
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'The sons of Neariah: Elioenai, Hizkiah, and Azrikam—three '
  - type: text
    content: in all
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'The sons of Elioenai: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani—seven '
  - type: text
    content: in all
  - type: text
    content: .
  '3':
  - type: text
    content: 'fifth, Shephatiah, by Abital; sixth, Ithream, by his wife Eglah. '
  '4':
  - type: text
    content: 'These six were born to David in Hebron; he reigned there seven years and six months, and in Jerusalem he reigned thirty-three years. '
  '5':
  - type: text
    content: 'These were born to David in Jerusalem: '
  - type: note
    content: In this passage variations in the spelling of the names of David’s sons appear in parentheses. See 14:4-7.
  - type: text
    content: 'Shimea (Shammua), Shobab, Nathan, Solomon—four by Bath-shua (Bathsheba) daughter of Ammiel (Eliam); '
  '6':
  - type: text
    content: 'then Ibhar, Elishama (Elishua), Eliphelet (Elpelet), '
  '7':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '8':
  - type: text
    content: 'Elishama, Eliada (Beeliada), and Eliphelet—nine '
  - type: text
    content: in all
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'All '
  - type: text
    content: these were
  - type: text
    content: ' the sons of David, besides the sons of the '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: concubines; and Tamar was their sister.
