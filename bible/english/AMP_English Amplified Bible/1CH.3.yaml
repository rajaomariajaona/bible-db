document_id: 1CH.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Family of David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the sons of David who were born to him in Hebron: the firstborn was Amnon, by Ahinoam the Jezreelitess; second, Daniel (Chileab), by Abigail the Carmelitess; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon’s son was Rehoboam. Abijah was his son, Asa his son, Jehoshaphat his son, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Usually spelled Jehoram in the Hebrew.
      marker-yv: yv-n
    - type: text
      text: 'Joram (Jehoram) his son, Ahaziah his son, Joash his son, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaziah his son, Azariah his son, Jotham his son, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz his son, Hezekiah his son, Manasseh his son, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amon his son, Josiah his son. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Josiah: firstborn, Johanan; second, Jehoiakim (Eliakim); third, Zedekiah; fourth, Shallum (Jehoahaz). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons (descendants) of Jehoiakim: Jehoiachin (Jeconiah) his son, Zedekiah his son. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons (descendants) of Jehoiachin (Jeconiah) the prisoner: Shealtiel his son, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Malchiram, Pedaiah, Shenazzar, Jekamiah, Hoshama and Nedabiah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Pedaiah: Zerubbabel and Shimei. The sons of Zerubbabel: Meshullam and Hananiah, and Shelomith was their sister; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'third, Absalom the son of Maacah, daughter of Talmai king of Geshur; fourth, Adonijah, the son of Haggith; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Hashubah, Ohel, Berechiah, Hasadiah, and Jushab-hesed—five '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Hananiah: Pelatiah and Jeshaiah, the sons of Rephaiah, the sons of Arnan, the sons of Obadiah, the sons of Shecaniah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons (descendants) of Shecaniah: Shemaiah. The sons of Shemaiah: Hattush, Igal, Bariah, Neariah, and Shaphat—six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Neariah: Elioenai, Hizkiah, and Azrikam—three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Elioenai: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah, and Anani—seven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fifth, Shephatiah, by Abital; sixth, Ithream, by his wife Eglah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These six were born to David in Hebron; he reigned there seven years and six months, and in Jerusalem he reigned thirty-three years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were born to David in Jerusalem: '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this passage variations in the spelling of the names of David’s sons appear in parentheses. See 14:4-7.
      marker-yv: yv-n
    - type: text
      text: 'Shimea (Shammua), Shobab, Nathan, Solomon—four by Bath-shua (Bathsheba) daughter of Ammiel (Eliam); '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then Ibhar, Elishama (Elishua), Eliphelet (Elpelet), '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nogah, Nepheg, Japhia, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elishama, Eliada (Beeliada), and Eliphelet—nine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these were
    - type: text
      text: ' the sons of David, besides the sons of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Gen 22:24.
      marker-yv: yv-n
    - type: text
      text: concubines; and Tamar was their sister.
