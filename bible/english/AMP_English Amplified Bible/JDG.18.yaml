document_id: JDG.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Danites Seek Territory
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days there was no king in Israel; and in those days the tribe of the Danites was seeking an inheritance [of land] for themselves to live in, for until then an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Their original tribal allotment (Josh 19:40-48) was sufficient; the problem was that they did not subdue the Amorites (Judg 1:34) and the Philistines, who controlled the territory.
    marker-yv: yv-n
  - type: text
    text: 'inheritance had not been allotted to them as a possession among the tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the sons of Dan sent from the total number of their [extended] family five brave men from Zorah and Eshtaol, to scout the land and to explore it; and they said to them, “Go, explore the land.” They came to the hill country of Ephraim, to the house of Micah, and lodged there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When they passed near Micah’s house, they recognized the voice of the young man, the Levite, and they turned aside there and said to him, “Who brought you here? And what are you doing in this place? And what do you have here?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he said to them, “Micah has done this and that for me, and he has hired me and I have become his priest.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And they said to him, “Please ask of God, so that we may know whether our journey on which we are going will be successful.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The priest said to them, “Go in peace; the journey on which you are going is acceptable to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the five men went on and came to Laish and saw the people who were there, [how they were] living securely in the style of the Sidonians, quiet and peaceful; and there was no oppressive magistrate in the land humiliating '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' in anything, and they were far from the Sidonians and had no dealings with anyone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The five men came back [home] to their brothers at Zorah and Eshtaol, and their brothers said to them, “What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have to report?
  - type: text
    text: '” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They said, “Arise, let us go up against them; for we have seen the land, and behold, it is very good (fertile). Will you sit still '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do nothing? Do not hesitate to go, to enter, to take possession of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When you enter, you will come to people [feeling] safe and secure with a spacious land [widely extended on all sides]; for God has given it into your hands—a place where there is no lack of anything that is on the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then from the [tribal] family of the Danites, from Zorah and from Eshtaol, six hundred men armed with weapons of war set out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They went up and camped at Kiriath-jearim in Judah. Therefore they have called that place '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the camp of Dan.
    marker-yv: yv-n
  - type: text
    text: 'Mahaneh-dan to this day; it is west of Kiriath-jearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They went on from there to the hill country of Ephraim and came to Micah’s house.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Danites Take Micah’s Idols
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the five men who had gone to scout the country of Laish said to their relatives, “Do you know that there are in these houses an ephod, teraphim, an image [of silver-plated wood], and a cast image [of solid silver]? Now therefore, consider what you should do.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So they turned in that direction and came to the house of the young Levite, at the home of Micah, and asked him how he was doing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now the six hundred men armed with their weapons of war, who were of the sons of Dan, stood at the entrance of the gate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now the five men who had gone to scout the land went up and entered the house and took the image [of silver-plated wood], the ephod, the teraphim, and the cast image [of solid silver], while the priest stood by the entrance of the gate with the six hundred men armed with weapons of war. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When these [five men] went into Micah’s house and took the [plated] image, the ephod, the teraphim, and the cast image, the priest asked them, “What are you doing?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They said to him, “Keep quiet, put your hand over your mouth and come with us, and be a father and a priest to us. Is it better for you to be a priest to the house of one man, or to be a priest to a tribe and family in Israel?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The priest’s heart was glad [to hear that], and he took the ephod, the teraphim, and the image, and went among the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So they turned and left, and they put the children, the livestock, and the valuables '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' supplies in front of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When they had gone some distance from the house of Micah, the men who were [living] in the houses near Micah’s house assembled [as a militia] and overtook the sons of Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They shouted to the Danites, who turned and said to Micah, “What is your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reason
  - type: text
    text: ' for assembling [against us]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'He said, “You have taken away my gods which I have made, and the priest, and have gone away; what else do I have left? How can you say to me, ‘What is your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: reason?
  - type: text
    text: '’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The sons of Dan said to him, “Do not let your voice [of complaint] be heard among us, or else angry men will assault you and you will lose your life, along with the lives of [everyone in] your household.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the Danites went on their way; and Micah saw that they were too strong for him, so he turned and went back to his house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They took the [idolatrous] things that Micah had made, and his priest, and they came to Laish, to a people who were quiet and secure; and they struck them with the edge of the sword and burned the city with fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And there was no one to rescue them because it was far from Sidon and they had no dealings with anyone. It was in the valley which belongs to Beth-rehob. And they rebuilt the city and lived in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They named the city Dan, after Dan their forefather who was born to Israel (Jacob); however, the original name of the city was Laish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The [tribe of] the sons of Dan set up the image [of silver-plated wood] for themselves; and Jonathan the son of Gershom, the son of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Changed to '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Manasseh
      - type: text
        text: ' in the Hebrew text.'
    marker-yv: yv-n
  - type: text
    text: 'Moses, and his sons were priests to the tribe of the Danites until the day of the captivity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exile from the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So they set up for themselves Micah’s [silver-plated wooden] image which he had made, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and kept it
  - type: text
    text: ' throughout the time that the house (tabernacle) of God was at Shiloh.'
