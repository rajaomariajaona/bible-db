document_id: 2CO.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ministers of a New Covenant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Are we starting to commend ourselves again? Or do we need, like some [false teachers], letters of recommendation to you or from you? [No!] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed, what had glory [the Law], in this case no longer has glory because of the glory that surpasses it [the gospel]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if that [Law] which fades away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' with glory, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how
    - type: text
      text: ' much more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: must
    - type: text
      text: ' that [gospel] which remains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is permanent abide in glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since we have such a [glorious] hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident expectation, we speak with great courage, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and we are not like Moses, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' used to put a veil over his face so that the Israelites would not gaze at the end of the glory which was fading away. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But [in fact] their minds were hardened [for they had lost the ability to understand]; for until this very day at the reading of the old covenant the same veil remains unlifted, because it is removed [only] in Christ. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But to this day whenever Moses is read, a veil [of blindness] lies over their heart; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but whenever a person turns [in repentance and faith] to the Lord, the veil is taken away. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Lord is the Spirit, and where the Spirit of the Lord is, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' is liberty [emancipation from bondage, true freedom]. [Is 61:1, 2] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we all, with unveiled face, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' seeing as in a mirror the glory of the Lord, are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: progressively
    - type: text
      text: ' being transformed into His image from [one degree of] glory to [even more] glory, which comes from the Lord, [who is] the Spirit.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are our letter [of recommendation], written in our hearts, recognized and read by everyone. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You show that you are a letter from Christ, delivered by us, written not with ink but with the Spirit of the living God, not on tablets of stone but on tablets of human hearts. [Ex 24:12; 31:18; 32:15, 16; Jer 31:33]
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such is the confidence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast reliance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' absolute trust that we have through Christ toward God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not that we are sufficiently qualified in ourselves to claim anything as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: coming
    - type: text
      text: ' from us, but our sufficiency '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' qualifications come from God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He has qualified us [making us sufficient] as ministers of a new covenant [of salvation through Christ], not of the letter [of a written code] but of the Spirit; for the letter [of the Law] kills [by revealing sin and demanding obedience], but the Spirit gives life. [Jer 31:31]
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if the ministry of death, engraved in letters on stones [the covenant of the Law which led to death because of sin], came with such glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor that the Israelites were not able to look steadily at the face of Moses because of its glory, [a brilliance] that was fading, [Ex 34:29-35] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'how will the ministry of the Spirit [the new covenant which allows us to be Spirit-filled] fail to be even more glorious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendid? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if the ministry that brings condemnation [the old covenant, the Law] has glory, how much more does glory overflow in the ministry that brings righteousness [the new covenant which declares believers free of guilt and sets them apart for God’s special purpose]! '
