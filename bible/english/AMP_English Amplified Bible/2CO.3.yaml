document_id: 2CO.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ministers of a New Covenant
  - type: text
    content: 'Are we starting to commend ourselves again? Or do we need, like some [false teachers], letters of recommendation to you or from you? [No!] '
  '10':
  - type: text
    content: 'Indeed, what had glory [the Law], in this case no longer has glory because of the glory that surpasses it [the gospel]. '
  '11':
  - type: text
    content: 'For if that [Law] which fades away '
  - type: text
    content: came
  - type: text
    content: ' with glory, '
  - type: text
    content: how
  - type: text
    content: ' much more '
  - type: text
    content: must
  - type: text
    content: ' that [gospel] which remains '
  - type: text
    content: and
  - type: text
    content: ' is permanent abide in glory '
  - type: text
    content: and
  - type: text
    content: ' splendor!'
  '12':
  - type: text
    content: 'Since we have such a [glorious] hope '
  - type: text
    content: and
  - type: text
    content: ' confident expectation, we speak with great courage, '
  '13':
  - type: text
    content: 'and we are not like Moses, '
  - type: text
    content: who
  - type: text
    content: ' used to put a veil over his face so that the Israelites would not gaze at the end of the glory which was fading away. '
  '14':
  - type: text
    content: 'But [in fact] their minds were hardened [for they had lost the ability to understand]; for until this very day at the reading of the old covenant the same veil remains unlifted, because it is removed [only] in Christ. '
  '15':
  - type: text
    content: 'But to this day whenever Moses is read, a veil [of blindness] lies over their heart; '
  '16':
  - type: text
    content: 'but whenever a person turns [in repentance and faith] to the Lord, the veil is taken away. '
  '17':
  - type: text
    content: 'Now the Lord is the Spirit, and where the Spirit of the Lord is, '
  - type: text
    content: there
  - type: text
    content: ' is liberty [emancipation from bondage, true freedom]. [Is 61:1, 2] '
  '18':
  - type: text
    content: 'And we all, with unveiled face, '
  - type: text
    content: continually
  - type: text
    content: ' seeing as in a mirror the glory of the Lord, are '
  - type: text
    content: progressively
  - type: text
    content: ' being transformed into His image from [one degree of] glory to [even more] glory, which comes from the Lord, [who is] the Spirit.'
  '2':
  - type: text
    content: 'You are our letter [of recommendation], written in our hearts, recognized and read by everyone. '
  '3':
  - type: text
    content: You show that you are a letter from Christ, delivered by us, written not with ink but with the Spirit of the living God, not on tablets of stone but on tablets of human hearts. [Ex 24:12; 31:18; 32:15, 16; Jer 31:33]
  '4':
  - type: text
    content: 'Such is the confidence '
  - type: text
    content: and
  - type: text
    content: ' steadfast reliance '
  - type: text
    content: and
  - type: text
    content: ' absolute trust that we have through Christ toward God. '
  '5':
  - type: text
    content: 'Not that we are sufficiently qualified in ourselves to claim anything as '
  - type: text
    content: coming
  - type: text
    content: ' from us, but our sufficiency '
  - type: text
    content: and
  - type: text
    content: ' qualifications come from God. '
  '6':
  - type: text
    content: He has qualified us [making us sufficient] as ministers of a new covenant [of salvation through Christ], not of the letter [of a written code] but of the Spirit; for the letter [of the Law] kills [by revealing sin and demanding obedience], but the Spirit gives life. [Jer 31:31]
  '7':
  - type: text
    content: 'Now if the ministry of death, engraved in letters on stones [the covenant of the Law which led to death because of sin], came with such glory '
  - type: text
    content: and
  - type: text
    content: ' splendor that the Israelites were not able to look steadily at the face of Moses because of its glory, [a brilliance] that was fading, [Ex 34:29-35] '
  '8':
  - type: text
    content: 'how will the ministry of the Spirit [the new covenant which allows us to be Spirit-filled] fail to be even more glorious '
  - type: text
    content: and
  - type: text
    content: ' splendid? '
  '9':
  - type: text
    content: 'For if the ministry that brings condemnation [the old covenant, the Law] has glory, how much more does glory overflow in the ministry that brings righteousness [the new covenant which declares believers free of guilt and sets them apart for God’s special purpose]! '
