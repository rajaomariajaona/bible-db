document_id: DEU.30,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Restoration Promised
  - type: text
    content: '“So it shall be when all these things have come on you, the blessing and the curse which I have set before you, and you '
  - type: note
    content: Lit return them to your heart.
  - type: text
    content: call them to mind in all the nations where the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has driven you, '
  '10':
  - type: text
    content: 'if you listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God to keep His commandments and His statutes which are written in this Book of the Law, and if you turn to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God with all your heart and with all your soul (your entire being).'
  '11':
  - type: text
    content: '“For this commandment which I am commanding you today is not too difficult for you, nor is it '
  - type: note
    content: Lit far off.
  - type: text
    content: 'out of reach. '
  '12':
  - type: text
    content: 'It is not [a secret hidden] in heaven, that you should say, ‘Who will go up to heaven for us and bring it to us, so that we may hear it and obey it?’ '
  '13':
  - type: text
    content: 'Nor is it beyond the sea, that you should say, ‘Who will cross the sea for us and bring it to us, so that we may hear it and obey it?’ '
  '14':
  - type: text
    content: But the word is very near you, in your mouth and in your heart, so that you may obey it.
  - type: heading
    content: Choose Life
  '15':
  - type: text
    content: '“Listen closely, I have set before you today life and prosperity (good), and death and adversity (evil); '
  '16':
  - type: text
    content: in that I command you today to love the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, to walk [that is, to live each and every day] in His ways and to keep His commandments and His statutes and His judgments (precepts), so that you will live and multiply, and that the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God will bless you in the land which you are entering to possess. '
  '17':
  - type: text
    content: 'But if your heart turns away and you will not hear '
  - type: text
    content: and
  - type: text
    content: ' obey, but are drawn away and worship other gods and serve them, '
  '18':
  - type: text
    content: 'I declare to you today that you will certainly perish. You will not live long in the land which you cross the Jordan to enter and possess. '
  '19':
  - type: text
    content: 'I call heaven and earth as witnesses against you today, that I have set before you life and death, the blessing and the curse; therefore, you shall choose life in order that you may live, you and your descendants, '
  '2':
  - type: text
    content: and you have returned to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God and have listened to '
  - type: text
    content: and
  - type: text
    content: ' obeyed His voice with all your heart and with all your soul, in accordance with everything that I am commanding you today, you and your children, '
  '20':
  - type: text
    content: by loving the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, by obeying His voice, and by holding closely to Him; for He is your life [your good life, your abundant life, your fulfillment] and the length of your days, that you may live in the land which the L'
  - type: heading
    content: ord
  - type: text
    content: ' promised (swore) to give to your fathers, to Abraham, Isaac, and Jacob.”'
  '3':
  - type: text
    content: then the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will restore your fortunes [in your return from exile], and have compassion on you, and will gather you together again from all the peoples (nations) where He has scattered you. '
  '4':
  - type: text
    content: Even if any of your dispersed are at the ends of the earth, the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will gather you together from there, and from there He will bring you back. '
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' your God will bring you into the land which your fathers possessed, and you will take possession of it; and He shall make you prosper and multiply—even more than your fathers.'
  '6':
  - type: text
    content: “And the L
  - type: heading
    content: ord
  - type: text
    content: ' your God will circumcise your heart and the hearts of your descendants [that is, He will remove the desire to sin from your heart], so that you will love the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God with all your heart and all your soul, so that you may live [as a recipient of His blessing]. '
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' your God will inflict all these curses on your enemies and on those who hate you, who have persecuted you. '
  '8':
  - type: text
    content: 'And you shall again listen to '
  - type: text
    content: and
  - type: text
    content: ' obey the voice of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and do all His commandments which I command you today. '
  '9':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' your God shall make you abundantly prosperous in '
  - type: note
    content: Lit all the work of your hand.
  - type: text
    content: everything that you do, in the offspring of your body and in the offspring of your cattle and in the produce of your land; for the L
  - type: heading
    content: ord
  - type: text
    content: ' will again delight over you for good, just as He delighted over your fathers, '
