document_id: DEU.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Restoration Promised
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“So it shall be when all these things have come on you, the blessing and the curse which I have set before you, and you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: return them to your heart
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: call them to mind in all the nations where the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has driven you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and you have returned to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and have listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed His voice with all your heart and with all your soul, in accordance with everything that I am commanding you today, you and your children, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will restore your fortunes [in your return from exile], and have compassion on you, and will gather you together again from all the peoples (nations) where He has scattered you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Even if any of your dispersed are at the ends of the earth, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will gather you together from there, and from there He will bring you back. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will bring you into the land which your fathers possessed, and you will take possession of it; and He shall make you prosper and multiply—even more than your fathers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will circumcise your heart and the hearts of your descendants [that is, He will remove the desire to sin from your heart], so that you will love the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God with all your heart and all your soul, so that you may live [as a recipient of His blessing]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will inflict all these curses on your enemies and on those who hate you, who have persecuted you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And you shall again listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and do all His commandments which I command you today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God shall make you abundantly prosperous in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: all the work of your hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: everything that you do, in the offspring of your body and in the offspring of your cattle and in the produce of your land; for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will again delight over you for good, just as He delighted over your fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'if you listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God to keep His commandments and His statutes which are written in this Book of the Law, and if you turn to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God with all your heart and with all your soul (your entire being).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“For this commandment which I am commanding you today is not too difficult for you, nor is it '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: far off
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'out of reach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It is not [a secret hidden] in heaven, that you should say, ‘Who will go up to heaven for us and bring it to us, so that we may hear it and obey it?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nor is it beyond the sea, that you should say, ‘Who will cross the sea for us and bring it to us, so that we may hear it and obey it?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But the word is very near you, in your mouth and in your heart, so that you may obey it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Choose Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Listen closely, I have set before you today life and prosperity (good), and death and adversity (evil); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: in that I command you today to love the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, to walk [that is, to live each and every day] in His ways and to keep His commandments and His statutes and His judgments (precepts), so that you will live and multiply, and that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God will bless you in the land which you are entering to possess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But if your heart turns away and you will not hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey, but are drawn away and worship other gods and serve them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I declare to you today that you will certainly perish. You will not live long in the land which you cross the Jordan to enter and possess. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I call heaven and earth as witnesses against you today, that I have set before you life and death, the blessing and the curse; therefore, you shall choose life in order that you may live, you and your descendants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: by loving the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, by obeying His voice, and by holding closely to Him; for He is your life [your good life, your abundant life, your fulfillment] and the length of your days, that you may live in the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' promised (swore) to give to your fathers, to Abraham, Isaac, and Jacob.”'
