  - type: note
    content: This remembrance lasted eight days. The Passover lambs were selected on the 10th of Nisan (March/April) and sacrificed on the 14th of Nisan (the first day of the feast). The Passover meal was eaten that same night (the 15th of Nisan). Passover was immediately followed by the Feast of Unleavened Bread (15-21 Nisan). The terms “Passover” and “The Feast of Unleavened Bread” were used interchangeably.
