document_id: JER.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Rechabites’ Obedience
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word that came to Jeremiah from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the days of Jehoiakim the son of Josiah, king of Judah: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go to the house of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A nomadic tribe that maintained an austere lifestyle. During Nebuchadnezzar’s invasion they were forced to settle in or near Jerusalem. They had an amicable relationship with the children of Israel.
    marker-yv: yv-n
  - type: text
    text: Rechabites and speak to them, and bring them into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', into one of the [side] chambers; then give them [who are pledged not to drink wine] some wine to drink.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So I took Jaazaniah the son of Jeremiah, the son of Habazziniah, and his brothers and all his sons and the whole house of the Rechabites, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and I brought them into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', into the chamber of the sons of Hanan the son of Igdaliah, the man of God, which was near the chamber of the princes, above the chamber of Maaseiah the son of Shallum the doorkeeper. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then I set before the men of the house of the Rechabites pitchers full of wine, and cups, and I said to them, “Drink wine.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But they said, “We will not drink wine, for Jonadab the son of Rechab, our father, commanded us: ‘You shall not drink wine, neither you nor your sons, forever. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nor shall you build a house or sow seed or plant a vineyard or own one; but you shall live in tents all your days, that you may live many days in the land where you are sojourners (temporary residents).’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'We have obeyed the words of Jonadab the son of Rechab, our father, in all that he commanded us, in all our days we have never drunk wine, nor have our wives, our sons, or our daughters, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nor have we built ourselves houses to live in; nor do we have vineyards or fields or seed. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We have lived only in tents, and have obeyed and done [everything] according to all that Jonadab our father commanded us. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But when Nebuchadnezzar king of Babylon came up against the land, we said, ‘Come and let us go to Jerusalem for fear of the army of the Chaldeans [who rule Babylon] and for fear of the army of the Arameans.’ So we have lived in Jerusalem.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah Rebuked
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then came the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to Jeremiah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Go and say to the men of Judah and the inhabitants of Jerusalem, “Will you not receive instruction by listening to My words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honoring them?” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“The command which Jonadab the son of Rechab gave to his sons not to drink wine has been observed [as a custom for more than two hundred years]. To this day they do not drink '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wine,
  - type: text
    text: ' for they have obeyed their father’s command. But I have repeatedly spoken to you, yet you have not listened to Me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I have also sent to you all My servants the prophets, sending them repeatedly, saying, ‘Let every one of you turn now from his evil way and alter your behavior, and do not follow other gods to worship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' serve them; and then you will live in the land which I have given to you and to your forefathers. But you have not submitted or listened to Me. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Indeed, the sons of Jonadab the son of Rechab have observed the command of their father which he gave them, but this people has not listened to Me.’ ” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts, the God of Israel, ‘Behold (hear this), I am bringing on Judah and all the inhabitants of Jerusalem all the disaster that I have pronounced against them, because I have spoken to them, but they have not listened, and I have called to them, but they have not answered.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Jeremiah said to the house of the Rechabites, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Because you have obeyed the command of Jonadab your father and have kept all his commands and have done according to all that he commanded you, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, “Jonadab the son of Rechab shall never fail to have a man (descendant) to stand before Me always.” ’ ”'
