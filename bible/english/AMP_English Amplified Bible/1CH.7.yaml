document_id: 1CH.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Descendants of Issachar
  - type: text
    content: 'The sons of Issachar were: Tola, Puah, Jashub, and Shimron—four '
  - type: text
    content: in all
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'The son of Jediael: Bilhan. The sons of Bilhan: Jeush, Benjamin, Ehud, Chenaanah, Zethan, Tarshish, and Ahishahar. '
  '11':
  - type: text
    content: 'All these were the sons of Jediael, according to the heads of their fathers’ households, 17,200 courageous men of valor, fit for military service. '
  '12':
  - type: text
    content: Shuppim and Huppim were the sons of Ir, and Hushim the son of Aher.
  - type: heading
    content: Sons of Naphtali
  '13':
  - type: text
    content: 'The sons of Naphtali: Jahziel, Guni, Jezer, and Shallum, the sons of Bilhah.'
  - type: heading
    content: Descendants of Manasseh
  '14':
  - type: text
    content: 'The sons of Manasseh: Asriel, whom his Aramean '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: 'concubine bore; she gave birth to Machir the father of Gilead. '
  '15':
  - type: text
    content: Machir took as a wife the sister of Huppim and Shuppim; her name was Maacah. The name of a second [
  - type: note
    content: I.e. grandson.
  - type: text
    content: 'descendant, the first being Gilead], was Zelophehad; and Zelophehad had [only] daughters. [Num 27:1-7] '
  '16':
  - type: text
    content: 'Maacah the wife of Machir gave birth to a son; she named him Peresh. The name of his brother was Sheresh; his sons were Ulam and Rakem. '
  '17':
  - type: text
    content: 'The son of Ulam: Bedan. These were the sons of Gilead the son of Machir, the son of Manasseh. '
  '18':
  - type: text
    content: 'His sister Hammolecheth gave birth to Ishhod and Abiezer and Mahlah. '
  '19':
  - type: text
    content: 'The sons of Shemida were: Ahian, Shechem, Likhi, and Aniam.'
  - type: heading
    content: Descendants of Ephraim
  '2':
  - type: text
    content: 'The sons of Tola: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Samuel, heads of their fathers’ households. '
  - type: text
    content: The sons
  - type: text
    content: ' of Tola were courageous men in their generations; their number in the days of David was 22,600. '
  '20':
  - type: text
    content: 'The sons of Ephraim: Shuthelah and Bered his son, Tahath [I] his son, Eleadah his son, Tahath [II] his son, '
  '21':
  - type: text
    content: 'Zabad his son, Shuthelah his son, and Ezer and Elead were killed by men who were natives of Gath, because they came down to take their livestock. '
  '22':
  - type: text
    content: 'Their father Ephraim mourned for many days, and his relatives came to comfort him. '
  '23':
  - type: text
    content: 'Then he went in to his wife, and she conceived and gave birth to a son, and he named him Beriah (on misfortune), because tragedy had come on his house. '
  '24':
  - type: text
    content: 'Beriah’s daughter was Sheerah, who built both Lower and Upper Beth-horon, and also Uzzen-sheerah. '
  '25':
  - type: text
    content: 'Rephah was his son '
  - type: text
    content: along
  - type: text
    content: ' with Resheph; Resheph’s son was Telah, Tahan his son, '
  '26':
  - type: text
    content: 'Ladan his son, Ammihud his son, Elishama his son, '
  '27':
  - type: text
    content: Non (Nun) his son, and Joshua [Moses’ successor] his son.
  '28':
  - type: text
    content: 'Their possessions and settlements were Bethel and its towns, and eastward Naaran, and westward Gezer, and Shechem, and as far as '
  - type: note
    content: Many mss read Azzah (Gaza).
  - type: text
    content: 'Ayyah with all their towns, '
  '29':
  - type: text
    content: and along the borders of the sons of Manasseh, Beth-shean, Taanach, Megiddo, Dor, with all their towns. In these [places] lived the sons of Joseph the son of Israel (Jacob).
  - type: heading
    content: Descendants of Asher
  '3':
  - type: text
    content: 'The son of Uzzi: Izrahiah. The sons of Izrahiah: Michael, Obadiah, Joel, Isshiah; all five of them were chief men. '
  '30':
  - type: text
    content: 'The sons of Asher: Imnah, Ishvah, Ishvi, and Beriah; and Serah their sister. '
  '31':
  - type: text
    content: 'The sons of Beriah: Heber and Malchiel, who was the father of Birzaith. '
  '32':
  - type: text
    content: 'Heber became the father of Japhlet, Shomer, Hotham, and Shua their sister. '
  '33':
  - type: text
    content: 'The sons of Japhlet: Pasach, Bimhal, and Ashvath. These were the sons of Japhlet. '
  '34':
  - type: text
    content: 'The sons of Shemer (Shomer) [his brother]: Ahi and Rohgah, Jehubbah, and Aram. '
  '35':
  - type: text
    content: 'The sons of his brother Helem (Hotham): Zophah, Imna, Shelesh, and Amal. '
  '36':
  - type: text
    content: 'The sons of Zophah: Suah, Harnepher, Shual, Beri, Imrah, '
  '37':
  - type: text
    content: 'Bezer, Hod, Shamma, Shilshah, Ithran, and Beera. '
  '38':
  - type: text
    content: 'The sons of Jether: Jephunneh, Pispa, and Ara. '
  '39':
  - type: text
    content: 'The sons of Ulla: Arah, Hanniel, and Rizia. '
  '4':
  - type: text
    content: 'With them by their generations according to their fathers’ households were 36,000 troops of the army for war, for they had many wives and children. '
  '40':
  - type: text
    content: All these were sons (descendants) of Asher, heads of their fathers’ houses, choice men, courageous men, chiefs of the leaders. Their number, enrolled by genealogies for service in war, was 26,000 men.
  '5':
  - type: text
    content: Their relatives among all the families of Issachar, courageous men, registered by genealogies, were 87,000 in all.
  - type: heading
    content: Descendants of Benjamin
  '6':
  - type: text
    content: ' '
  - type: text
    content: The sons of
  - type: text
    content: ' Benjamin were three: Bela, Becher, and Jediael. '
  '7':
  - type: text
    content: 'The sons of Bela were five: Ezbon, Uzzi, Uzziel, Jerimoth, and Iri. They were heads of the households of their fathers, courageous men. By their genealogies they were 22,034. '
  '8':
  - type: text
    content: 'The sons of Becher: Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth, and Alemeth, all these were sons of Becher. '
  '9':
  - type: text
    content: 'They were registered by their genealogies according to their generations, as heads of their fathers’ households, courageous men, 20,200 '
  - type: text
    content: in number
  - type: text
    content: '. '
