document_id: 1CH.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Issachar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The sons of Issachar were: Tola, Puah, Jashub, and Shimron—four '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in all
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The son of Jediael: Bilhan. The sons of Bilhan: Jeush, Benjamin, Ehud, Chenaanah, Zethan, Tarshish, and Ahishahar. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'All these were the sons of Jediael, according to the heads of their fathers’ households, 17,200 courageous men of valor, fit for military service. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Shuppim and Huppim were the sons of Ir, and Hushim the son of Aher.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sons of Naphtali
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The sons of Naphtali: Jahziel, Guni, Jezer, and Shallum, the sons of Bilhah.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Manasseh
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The sons of Manasseh: Asriel, whom his Aramean '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Gen 22:24.
      marker-yv: yv-n
    - type: text
      text: 'concubine bore; she gave birth to Machir the father of Gilead. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Machir took as a wife the sister of Huppim and Shuppim; her name was Maacah. The name of a second [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. grandson.
      marker-yv: yv-n
    - type: text
      text: 'descendant, the first being Gilead], was Zelophehad; and Zelophehad had [only] daughters. [Num 27:1-7] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Maacah the wife of Machir gave birth to a son; she named him Peresh. The name of his brother was Sheresh; his sons were Ulam and Rakem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The son of Ulam: Bedan. These were the sons of Gilead the son of Machir, the son of Manasseh. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'His sister Hammolecheth gave birth to Ishhod and Abiezer and Mahlah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The sons of Shemida were: Ahian, Shechem, Likhi, and Aniam.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Ephraim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The sons of Tola: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam, and Samuel, heads of their fathers’ households. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The sons
    - type: text
      text: ' of Tola were courageous men in their generations; their number in the days of David was 22,600. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The sons of Ephraim: Shuthelah and Bered his son, Tahath [I] his son, Eleadah his son, Tahath [II] his son, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Zabad his son, Shuthelah his son, and Ezer and Elead were killed by men who were natives of Gath, because they came down to take their livestock. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Their father Ephraim mourned for many days, and his relatives came to comfort him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then he went in to his wife, and she conceived and gave birth to a son, and he named him Beriah (on misfortune), because tragedy had come on his house. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Beriah’s daughter was Sheerah, who built both Lower and Upper Beth-horon, and also Uzzen-sheerah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Rephah was his son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: along
    - type: text
      text: ' with Resheph; Resheph’s son was Telah, Tahan his son, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ladan his son, Ammihud his son, Elishama his son, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Non (Nun) his son, and Joshua [Moses’ successor] his son.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Their possessions and settlements were Bethel and its towns, and eastward Naaran, and westward Gezer, and Shechem, and as far as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many mss read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Azzah
        - type: text
          text: ' (Gaza).'
      marker-yv: yv-n
    - type: text
      text: 'Ayyah with all their towns, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: and along the borders of the sons of Manasseh, Beth-shean, Taanach, Megiddo, Dor, with all their towns. In these [places] lived the sons of Joseph the son of Israel (Jacob).
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Asher
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The son of Uzzi: Izrahiah. The sons of Izrahiah: Michael, Obadiah, Joel, Isshiah; all five of them were chief men. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The sons of Asher: Imnah, Ishvah, Ishvi, and Beriah; and Serah their sister. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The sons of Beriah: Heber and Malchiel, who was the father of Birzaith. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Heber became the father of Japhlet, Shomer, Hotham, and Shua their sister. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The sons of Japhlet: Pasach, Bimhal, and Ashvath. These were the sons of Japhlet. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The sons of Shemer (Shomer) [his brother]: Ahi and Rohgah, Jehubbah, and Aram. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The sons of his brother Helem (Hotham): Zophah, Imna, Shelesh, and Amal. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'The sons of Zophah: Suah, Harnepher, Shual, Beri, Imrah, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Bezer, Hod, Shamma, Shilshah, Ithran, and Beera. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The sons of Jether: Jephunneh, Pispa, and Ara. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'The sons of Ulla: Arah, Hanniel, and Rizia. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'With them by their generations according to their fathers’ households were 36,000 troops of the army for war, for they had many wives and children. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: All these were sons (descendants) of Asher, heads of their fathers’ houses, choice men, courageous men, chiefs of the leaders. Their number, enrolled by genealogies for service in war, was 26,000 men.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Their relatives among all the families of Issachar, courageous men, registered by genealogies, were 87,000 in all.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Descendants of Benjamin
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The sons of
    - type: text
      text: ' Benjamin were three: Bela, Becher, and Jediael. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The sons of Bela were five: Ezbon, Uzzi, Uzziel, Jerimoth, and Iri. They were heads of the households of their fathers, courageous men. By their genealogies they were 22,034. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The sons of Becher: Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth, and Alemeth, all these were sons of Becher. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They were registered by their genealogies according to their generations, as heads of their fathers’ households, courageous men, 20,200 '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in number
    - type: text
      text: '. '
