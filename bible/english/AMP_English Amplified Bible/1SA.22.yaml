    - type: usfm
      marker: it
      children:
      - type: text
        text: The Priests Slain at Nob
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David departed from there and escaped to the cave of Adullam; and when his brothers and all his father’s house heard about it, they went down there to him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahimelech inquired of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for him, and gave him provisions and the sword of Goliath the Philistine.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king sent someone to call Ahimelech the priest, the son of Ahitub, and all his father’s household, the priests who were at Nob; and all of them came to the king. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said, “Listen now, son of Ahitub.” He replied, “Here I am [at your service], my lord.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said to him, “Why have you and the son of Jesse conspired against me, in that you have given him bread and a sword and have inquired of God for him, so he would rebel against me by lying in ambush, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he does
    - type: text
      text: ' this day?”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ahimelech answered the king, “And who among all your servants is as faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy as David, who is the king’s son-in-law, and who is captain over your guard [and your confidant], and is honored in your house? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Did I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: just
    - type: text
      text: ' begin to inquire of God for him today? Far be it from me! Do not let the king impute any '
    - type: usfm
      marker: it
      children:
      - type: text
        text: guilt
    - type: text
      text: ' to his servant or to any of the household of my father, for your servant knows nothing at all about this entire matter.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Saul said, “Be assured that you shall die, Ahimelech, you and all your father’s household (extended family).” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the king said to the guards who stood around him, “Turn around and kill the priests of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', because their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: loyalty also is with David, and because they knew that he was fleeing and did not inform me.” But the servants of the king were not willing to put out their hands to attack the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' priests. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king said to Doeg, “You turn around and attack the priests.” And Doeg the Edomite turned and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This act of violence fulfilled the prophecy regarding the house of Eli (see 2:31).
      marker-yv: yv-n
    - type: text
      text: 'attacked the priests, and that day he killed eighty-five men who wore the [priest’s] linen ephod. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he struck Nob the city of the priests with the edge of the sword, both men and women, children and infants; also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he struck
    - type: text
      text: ' oxen and donkeys and sheep with the edge of the sword.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone who was suffering hardship, and everyone who was in debt, and everyone who was discontented gathered to him; and he became captain over them. There were about four hundred men with him.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one of the sons of Ahimelech the son of Ahitub, named Abiathar, escaped and fled to David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abiathar told David that Saul had murdered the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' priests. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said to Abiathar, “I knew that day, when Doeg the Edomite was there, that he would certainly tell Saul. I have brought about '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the death
    - type: text
      text: ' of everyone in your father’s household (extended family). '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Stay with me; do not be afraid, for he who seeks my life seeks your life, but you are safe with me.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David went from there to Mizpah of Moab; and he said to the king of Moab, “Please let my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David’s father Jesse was the grandson of Ruth the Moabitess (Ruth 4:13, 17).
      marker-yv: yv-n
    - type: text
      text: 'father and my mother come [out of Judah] and stay with you until I know what God will do for me.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he left them with the king of Moab; and they stayed with him all the time that David was in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This probably refers to a rugged mountain area with many secure hiding places. However, some suggest this may refer to Masada or the Cave of Abullam or another specific fortress.
      marker-yv: yv-n
    - type: text
      text: 'stronghold. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the prophet Gad said to David, “Do not stay in the stronghold; leave, and go into the land of Judah.” So David left and went into the forest of Hereth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Saul heard that David and the men who were with him had been discovered. Now Saul was in Gibeah, sitting under the tamarisk tree on the high place with his spear in his hand, and all his servants were standing around him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul said to his servants who were standing around him, “Listen now, you Benjamites! Will the son of Jesse also give every one of you fields and vineyards? Will he make you all commanders of thousands and hundreds? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all of you have conspired against me so that no one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: uncovers my ears
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'informs me when my son [Jonathan] makes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a covenant
    - type: text
      text: ' with the son of Jesse. None of you cares about me or informs me that my son has stirred up my servant against me to lie in ambush, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he does
    - type: text
      text: ' this day?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Doeg the Edomite, who was standing with Saul’s servants, replied, “I saw the son of Jesse coming to Nob, to Ahimelech [the priest] the son of Ahitub. '
