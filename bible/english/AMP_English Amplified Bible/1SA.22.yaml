  '1':
  - type: heading
    content: The Priests Slain at Nob
  - type: text
    content: 'So David departed from there and escaped to the cave of Adullam; and when his brothers and all his father’s house heard about it, they went down there to him. '
  '10':
  - type: text
    content: Ahimelech inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ' for him, and gave him provisions and the sword of Goliath the Philistine.”'
  '11':
  - type: text
    content: 'Then the king sent someone to call Ahimelech the priest, the son of Ahitub, and all his father’s household, the priests who were at Nob; and all of them came to the king. '
  '12':
  - type: text
    content: 'Then Saul said, “Listen now, son of Ahitub.” He replied, “Here I am [at your service], my lord.” '
  '13':
  - type: text
    content: 'Saul said to him, “Why have you and the son of Jesse conspired against me, in that you have given him bread and a sword and have inquired of God for him, so he would rebel against me by lying in ambush, as '
  - type: text
    content: he does
  - type: text
    content: ' this day?”'
  '14':
  - type: text
    content: 'Then Ahimelech answered the king, “And who among all your servants is as faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy as David, who is the king’s son-in-law, and who is captain over your guard [and your confidant], and is honored in your house? '
  '15':
  - type: text
    content: 'Did I '
  - type: text
    content: just
  - type: text
    content: ' begin to inquire of God for him today? Far be it from me! Do not let the king impute any '
  - type: text
    content: guilt
  - type: text
    content: ' to his servant or to any of the household of my father, for your servant knows nothing at all about this entire matter.” '
  '16':
  - type: text
    content: 'But Saul said, “Be assured that you shall die, Ahimelech, you and all your father’s household (extended family).” '
  '17':
  - type: text
    content: And the king said to the guards who stood around him, “Turn around and kill the priests of the L
  - type: heading
    content: ord
  - type: text
    content: ', because their '
  - type: note
    content: Lit hand.
  - type: text
    content: loyalty also is with David, and because they knew that he was fleeing and did not inform me.” But the servants of the king were not willing to put out their hands to attack the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' priests. '
  '18':
  - type: text
    content: 'So the king said to Doeg, “You turn around and attack the priests.” And Doeg the Edomite turned and '
  - type: note
    content: This act of violence fulfilled the prophecy regarding the house of Eli (see 2:31).
  - type: text
    content: 'attacked the priests, and that day he killed eighty-five men who wore the [priest’s] linen ephod. '
  '19':
  - type: text
    content: 'And he struck Nob the city of the priests with the edge of the sword, both men and women, children and infants; also '
  - type: text
    content: he struck
  - type: text
    content: ' oxen and donkeys and sheep with the edge of the sword.'
  '2':
  - type: text
    content: Everyone who was suffering hardship, and everyone who was in debt, and everyone who was discontented gathered to him; and he became captain over them. There were about four hundred men with him.
  '20':
  - type: text
    content: 'But one of the sons of Ahimelech the son of Ahitub, named Abiathar, escaped and fled to David. '
  '21':
  - type: text
    content: Abiathar told David that Saul had murdered the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' priests. '
  '22':
  - type: text
    content: 'Then David said to Abiathar, “I knew that day, when Doeg the Edomite was there, that he would certainly tell Saul. I have brought about '
  - type: text
    content: the death
  - type: text
    content: ' of everyone in your father’s household (extended family). '
  '23':
  - type: text
    content: Stay with me; do not be afraid, for he who seeks my life seeks your life, but you are safe with me.”
  '3':
  - type: text
    content: 'And David went from there to Mizpah of Moab; and he said to the king of Moab, “Please let my '
  - type: note
    content: David’s father Jesse was the grandson of Ruth the Moabitess (Ruth 4:13, 17).
  - type: text
    content: 'father and my mother come [out of Judah] and stay with you until I know what God will do for me.” '
  '4':
  - type: text
    content: 'Then he left them with the king of Moab; and they stayed with him all the time that David was in the '
  - type: note
    content: This probably refers to a rugged mountain area with many secure hiding places. However, some suggest this may refer to Masada or the Cave of Abullam or another specific fortress.
  - type: text
    content: 'stronghold. '
  '5':
  - type: text
    content: Then the prophet Gad said to David, “Do not stay in the stronghold; leave, and go into the land of Judah.” So David left and went into the forest of Hereth.
  '6':
  - type: text
    content: 'But Saul heard that David and the men who were with him had been discovered. Now Saul was in Gibeah, sitting under the tamarisk tree on the high place with his spear in his hand, and all his servants were standing around him. '
  '7':
  - type: text
    content: 'Saul said to his servants who were standing around him, “Listen now, you Benjamites! Will the son of Jesse also give every one of you fields and vineyards? Will he make you all commanders of thousands and hundreds? '
  '8':
  - type: text
    content: 'For all of you have conspired against me so that no one '
  - type: note
    content: Lit uncovers my ears.
  - type: text
    content: 'informs me when my son [Jonathan] makes '
  - type: text
    content: a covenant
  - type: text
    content: ' with the son of Jesse. None of you cares about me or informs me that my son has stirred up my servant against me to lie in ambush, as '
  - type: text
    content: he does
  - type: text
    content: ' this day?” '
  '9':
  - type: text
    content: 'Then Doeg the Edomite, who was standing with Saul’s servants, replied, “I saw the son of Jesse coming to Nob, to Ahimelech [the priest] the son of Ahitub. '
