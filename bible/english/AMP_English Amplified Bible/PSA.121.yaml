  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will protect you from all evil;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will keep your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
