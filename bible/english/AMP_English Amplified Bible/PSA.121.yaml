    - type: text
      text: '3'
  - type: text
    text: He will not allow your foot to slip;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who keeps you will not slumber. [1 Sam 2:9; Ps 127:1; Prov 3:23, 26; Is 27:3]
