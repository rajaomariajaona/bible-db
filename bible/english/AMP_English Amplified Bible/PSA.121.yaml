  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is your shade on your right hand. [Is 25:4]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The sun will not strike you by day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor the moon by night. [Ps 91:5; Is 49:10; Rev 7:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
