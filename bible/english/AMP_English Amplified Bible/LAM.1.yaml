document_id: LAM.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sorrows of Zion
  - type: text
    content: ' '
  - type: note
    content: The writings of the prophets are not only valuable contributions to Old Testament history, but the reader is also enriched by familiarity with the forecasts of events which have been fulfilled, thus revealing the divine inspiration of the books and the wisdom and power of the God who prompted their writings.
  - type: text
    content: 'How solitary '
  - type: text
    content: and
  - type: text
    content: ' lonely sits the city [Jerusalem]'
  - type: text
    content: That was [once] full of people!
  - type: text
    content: How like a widow she has become.
  - type: text
    content: She who was great among the nations!
  - type: text
    content: The princess among the provinces,
  - type: text
    content: Has become a forced laborer!
  '10':
  - type: text
    content: The adversary has spread out his hand
  - type: text
    content: 'Over all her precious '
  - type: text
    content: and
  - type: text
    content: ' desirable things;'
  - type: text
    content: For she has seen the [Gentile] nations enter her sanctuary (the Jerusalem temple)—
  - type: note
    content: The Ammonites and Moabites, descendants of Lot and related to Israel, were forbidden to enter the congregation of the Lord, “even to their tenth generation,” because they refused to assist the sons of Israel when they were escaping from Egypt, and because they hired Balaam to curse Israel (Deut 23:3, 4). The Israelites never assembled any closer to the sanctuary of the temple than in the court outside its door. No Jew, not even David was authorized to enter the sanctuary proper except for certain Levites to whom such service was assigned. But now, Jeremiah says, the forbidden pagan nations enter the Holy of Holies to vandalize.
  - type: text
    content: The ones whom You commanded
  - type: text
    content: That they should not enter into Your congregation [not even in the outer courts]. [Deut 23:3; Jer 51:51; Ezek 44:7, 9]
  '11':
  - type: text
    content: All her people groan, seeking bread;
  - type: text
    content: 'They have exchanged their desirable '
  - type: text
    content: and
  - type: text
    content: ' precious things for food'
  - type: text
    content: To restore their lives.
  - type: text
    content: “See, O L
  - type: heading
    content: ord
  - type: text
    content: ', and consider'
  - type: text
    content: 'How despised '
  - type: text
    content: and
  - type: text
    content: ' repulsive I have become!”'
  '12':
  - type: text
    content: “Is it nothing to you, all you who pass this way?
  - type: text
    content: Look and see if there is any pain like my pain
  - type: text
    content: Which was severely dealt out to me,
  - type: text
    content: Which the L
  - type: heading
    content: ord
  - type: text
    content: ' has inflicted [on me] on the day of His fierce anger.'
  '13':
  - type: text
    content: “From on high He sent fire into my bones,
  - type: text
    content: 'And it prevailed '
  - type: text
    content: over them
  - type: text
    content: .
  - type: text
    content: He has spread a net for my feet;
  - type: text
    content: He has turned me back.
  - type: text
    content: 'He has made me desolate '
  - type: text
    content: and
  - type: text
    content: ' hopelessly miserable,'
  - type: text
    content: Faint all the day long.
  '14':
  - type: text
    content: “The yoke of my transgressions is bound;
  - type: text
    content: 'By His hand they are knit '
  - type: text
    content: and
  - type: text
    content: ' woven together.'
  - type: text
    content: They have come upon my neck.
  - type: text
    content: He has made my strength fail;
  - type: text
    content: The Lord has put me into the hand
  - type: text
    content: 'Of '
  - type: text
    content: those against whom
  - type: text
    content: ' I cannot stand. [Deut 28:48]'
  '15':
  - type: text
    content: “The Lord has rejected all the strong men
  - type: text
    content: In my midst;
  - type: text
    content: He has proclaimed an established time against me
  - type: text
    content: To crush my young men.
  - type: text
    content: The Lord has trampled down as in a wine press
  - type: text
    content: The Virgin Daughter of Judah.
  '16':
  - type: text
    content: “I weep for these things;
  - type: text
    content: My eyes overflow with tears,
  - type: text
    content: Because a comforter,
  - type: text
    content: One who could restore my soul, is far away from me.
  - type: text
    content: 'My children are desolate '
  - type: text
    content: and
  - type: text
    content: ' perishing,'
  - type: text
    content: For the enemy has prevailed.” [Lam 1:21]
  '17':
  - type: text
    content: Zion stretches out her hands,
  - type: text
    content: But there is no comforter for her.
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded concerning Jacob'
  - type: text
    content: That his neighbors should be his enemies;
  - type: text
    content: Jerusalem has become a filthy thing [an object of contempt] among them.
  '18':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' is righteous '
  - type: text
    content: and
  - type: text
    content: ' just;'
  - type: text
    content: For I have rebelled against His commandment (His word).
  - type: text
    content: Hear now, all you peoples,
  - type: text
    content: And look at my pain;
  - type: text
    content: My virgins and my young men
  - type: text
    content: Have gone into captivity.
  '19':
  - type: text
    content: “I [Jerusalem] called to my lovers (political allies), but they deceived me.
  - type: text
    content: My priests and my elders perished in the city
  - type: text
    content: While they looked for food to restore their strength.
  '2':
  - type: text
    content: She weeps bitterly in the night
  - type: text
    content: And her tears are [constantly] on her cheeks;
  - type: text
    content: Among all her lovers (political allies)
  - type: text
    content: She has no one to comfort her.
  - type: text
    content: All her friends have dealt treacherously with her;
  - type: text
    content: They have become her enemies. [Jer 3:1; 4:30]
  '20':
  - type: text
    content: “See, O L
  - type: heading
    content: ord
  - type: text
    content: ', how distressed I am!'
  - type: text
    content: My spirit is deeply disturbed;
  - type: text
    content: 'My heart is overturned within me '
  - type: text
    content: and
  - type: text
    content: ' cannot rest,'
  - type: text
    content: For I have been very rebellious.
  - type: text
    content: 'In the street the sword kills '
  - type: text
    content: and
  - type: text
    content: ' bereaves;'
  - type: text
    content: In the house there is [famine, disease and] death!
  '21':
  - type: text
    content: “People have heard that I groan,
  - type: text
    content: That I have no comforter [in You].
  - type: text
    content: All my enemies have heard of my desperation;
  - type: text
    content: They are delighted [O L
  - type: heading
    content: ord
  - type: text
    content: '] that You have done it.'
  - type: text
    content: Oh, that You would bring the day [of judgment] which You have proclaimed
  - type: text
    content: So that they will become like me. [Is 14:5, 6; Jer 30:16]
  '22':
  - type: text
    content: “Let all their wickedness come before You;
  - type: text
    content: And deal with them as You have dealt with me
  - type: text
    content: Because of all my transgressions;
  - type: text
    content: For my groans are many and my heart is faint.”
  '3':
  - type: text
    content: Judah has gone into exile under affliction
  - type: text
    content: And under harsh servitude;
  - type: text
    content: She dwells among the [pagan] nations,
  - type: text
    content: But she has found no rest;
  - type: text
    content: All her pursuers have overtaken her
  - type: text
    content: In the midst of [her] distress.
  '4':
  - type: text
    content: The roads to Zion are in mourning
  - type: text
    content: Because no one comes to the appointed feasts.
  - type: text
    content: All her gates are desolate;
  - type: text
    content: Her priests are groaning,
  - type: text
    content: 'Her virgins are grieved '
  - type: text
    content: and
  - type: text
    content: ' suffering,'
  - type: text
    content: And she suffers bitterly.
  '5':
  - type: text
    content: Her adversaries have become her masters,
  - type: text
    content: Her enemies prosper;
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has caused her grief'
  - type: text
    content: Because of the multitude of her transgressions;
  - type: text
    content: Her young children have gone
  - type: text
    content: Into captivity before the enemy. [Jer 30:14, 15; 52:28; Dan 9:7-14]
  '6':
  - type: text
    content: 'All her beauty '
  - type: text
    content: and
  - type: text
    content: ' majesty'
  - type: text
    content: Have departed from the Daughter of Zion (Jerusalem).
  - type: text
    content: Her princes have become like deer
  - type: text
    content: That have found no pasture;
  - type: text
    content: They have fled without strength
  - type: text
    content: Before the pursuer.
  '7':
  - type: text
    content: In the days of her affliction and homelessness
  - type: text
    content: Jerusalem remembers all her precious things
  - type: text
    content: That she had from the days of old,
  - type: text
    content: When her people fell into the hand of the adversary,
  - type: text
    content: And no one helped her,
  - type: text
    content: The enemy saw her,
  - type: text
    content: They mocked at her downfall.
  '8':
  - type: text
    content: Jerusalem sinned greatly;
  - type: text
    content: Therefore she has become an unclean thing [and has been removed].
  - type: text
    content: All who honored her [now] despise her
  - type: text
    content: Because they have seen her nakedness;
  - type: text
    content: Even she herself groans and turns [her face] away.
  '9':
  - type: text
    content: Her (ceremonial) uncleanness was on her skirts;
  - type: text
    content: She did not [seriously] consider her future.
  - type: text
    content: Therefore she has come down [from throne to slavery] in an astonishing manner;
  - type: text
    content: She has no comforter.
  - type: text
    content: “O L
  - type: heading
    content: ord
  - type: text
    content: ” [cries Jerusalem], “look at my affliction,
  - type: text
    content: For the enemy has magnified himself [in triumph]!”
