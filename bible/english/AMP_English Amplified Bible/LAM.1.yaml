document_id: LAM.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sorrows of Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The writings of the prophets are not only valuable contributions to Old Testament history, but the reader is also enriched by familiarity with the forecasts of events which have been fulfilled, thus revealing the divine inspiration of the books and the wisdom and power of the God who prompted their writings.
      marker-yv: yv-n
    - type: text
      text: 'How solitary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lonely sits the city [Jerusalem]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That was [once] full of people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How like a widow she has become.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She who was great among the nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The princess among the provinces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has become a forced laborer!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The adversary has spread out his hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Over all her precious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' desirable things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For she has seen the [Gentile] nations enter her sanctuary (the Jerusalem temple)—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Ammonites and Moabites, descendants of Lot and related to Israel, were forbidden to enter the congregation of the Lord, “even to their tenth generation,” because they refused to assist the sons of Israel when they were escaping from Egypt, and because they hired Balaam to curse Israel (Deut 23:3, 4). The Israelites never assembled any closer to the sanctuary of the temple than in the court outside its door. No Jew, not even David was authorized to enter the sanctuary proper except for certain Levites to whom such service was assigned. But now, Jeremiah says, the forbidden pagan nations enter the Holy of Holies to vandalize.
      marker-yv: yv-n
    - type: text
      text: The ones whom You commanded
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they should not enter into Your congregation [not even in the outer courts]. [Deut 23:3; Jer 51:51; Ezek 44:7, 9]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: All her people groan, seeking bread;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have exchanged their desirable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' precious things for food'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To restore their lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and consider'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repulsive I have become!”'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Is it nothing to you, all you who pass this way?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look and see if there is any pain like my pain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which was severely dealt out to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has inflicted [on me] on the day of His fierce anger.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “From on high He sent fire into my bones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it prevailed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over them
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has spread a net for my feet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has turned me back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has made me desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hopelessly miserable,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faint all the day long.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “The yoke of my transgressions is bound;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By His hand they are knit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' woven together.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have come upon my neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has made my strength fail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has put me into the hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those against whom
    - type: text
      text: ' I cannot stand. [Deut 28:48]'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “The Lord has rejected all the strong men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my midst;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has proclaimed an established time against me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To crush my young men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has trampled down as in a wine press
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Virgin Daughter of Judah.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “I weep for these things;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes overflow with tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because a comforter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One who could restore my soul, is far away from me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My children are desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perishing,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the enemy has prevailed.” [Lam 1:21]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Zion stretches out her hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But there is no comforter for her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded concerning Jacob'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That his neighbors should be his enemies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem has become a filthy thing [an object of contempt] among them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is righteous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' just;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have rebelled against His commandment (His word).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear now, all you peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And look at my pain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My virgins and my young men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have gone into captivity.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “I [Jerusalem] called to my lovers (political allies), but they deceived me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My priests and my elders perished in the city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While they looked for food to restore their strength.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: She weeps bitterly in the night
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her tears are [constantly] on her cheeks;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among all her lovers (political allies)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has no one to comfort her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her friends have dealt treacherously with her;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have become her enemies. [Jer 3:1; 4:30]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “See, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', how distressed I am!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My spirit is deeply disturbed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart is overturned within me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cannot rest,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have been very rebellious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the street the sword kills '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bereaves;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the house there is [famine, disease and] death!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “People have heard that I groan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I have no comforter [in You].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my enemies have heard of my desperation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are delighted [O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] that You have done it.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that You would bring the day [of judgment] which You have proclaimed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that they will become like me. [Is 14:5, 6; Jer 30:16]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Let all their wickedness come before You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And deal with them as You have dealt with me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of all my transgressions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my groans are many and my heart is faint.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Judah has gone into exile under affliction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And under harsh servitude;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She dwells among the [pagan] nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But she has found no rest;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her pursuers have overtaken her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the midst of [her] distress.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The roads to Zion are in mourning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because no one comes to the appointed feasts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her gates are desolate;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her priests are groaning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her virgins are grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffering,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And she suffers bitterly.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her adversaries have become her masters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her enemies prosper;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has caused her grief'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the multitude of her transgressions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her young children have gone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into captivity before the enemy. [Jer 30:14, 15; 52:28; Dan 9:7-14]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'All her beauty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' majesty'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have departed from the Daughter of Zion (Jerusalem).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her princes have become like deer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That have found no pasture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have fled without strength
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the pursuer.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: In the days of her affliction and homelessness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem remembers all her precious things
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That she had from the days of old,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When her people fell into the hand of the adversary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no one helped her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy saw her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They mocked at her downfall.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jerusalem sinned greatly;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore she has become an unclean thing [and has been removed].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who honored her [now] despise her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have seen her nakedness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even she herself groans and turns [her face] away.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Her (ceremonial) uncleanness was on her skirts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She did not [seriously] consider her future.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore she has come down [from throne to slavery] in an astonishing manner;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has no comforter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ” [cries Jerusalem], “look at my affliction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the enemy has magnified himself [in triumph]!”
