document_id: EXO.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Tabernacle Erected
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“On the first day of the first month (Abib) you shall set up the tabernacle of the Tent of Meeting [of God with you]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You shall place the ark of the Testimony there, and you shall screen off the ark [from the Holy Place of God’s Presence] with the veil (partition curtain). [Heb 10:19-23] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You shall bring in the table [for the bread] and arrange its setting; you shall bring in the lampstand and mount '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' light its lamps. [Rev 21:23-25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You shall set the golden altar of incense in front of the ark of the Testimony [outside the veil], and put the [hanging] veil at the doorway of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You shall set the [bronze] altar of burnt offering in front of the doorway of the tabernacle of the Tent of Meeting. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'You shall set the basin between the Tent of Meeting and the altar [of burnt offering], and put water in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You shall set up the courtyard [curtains] all around and hang up the screen (curtain) for the gateway of the courtyard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then you shall take the anointing oil and anoint the tabernacle and all that is in it, and consecrate it and all its furniture; and it shall be holy (declared sacred, separated from secular use). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You shall anoint the altar of burnt offering and all its utensils, and consecrate the altar, and the altar shall be most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You shall anoint the basin and its base, and consecrate it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then you shall bring Aaron and his sons to the doorway of the Tent of Meeting and wash them with water. [John 17:17-19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You shall put the holy garments on Aaron and anoint him and consecrate him, that he may serve as a priest to Me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You shall bring his sons and put tunics on them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'you shall anoint them just as you anointed their father, so that they may serve as priests to Me; and their anointing shall qualify them for an everlasting priesthood throughout their generations.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Thus Moses did; in accordance with all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded him, so he did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now it happened on the first day of the first month (Abib) in the second year [after the exodus from Egypt], that the tabernacle was erected. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moses erected the tabernacle, laid its sockets, set up its boards, put in its bars and erected its support poles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He spread the tent over the tabernacle and put the covering of the tent over it, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He took the Testimony [the stones inscribed with the Ten Commandments] and put it into the ark [of the covenant], and placed the poles [through the rings] on the ark, and put the mercy seat on top of the ark. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Moses brought the ark into the tabernacle, and set up a veil (partition) for the screen (curtain), and screened off the ark of the Testimony, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then he put the table in the Tent of Meeting on the north side of the tabernacle, outside the veil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He set the bread [of the Presence] in order on it before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded him. [John 6:32-35] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then he put the lampstand in the Tent of Meeting, opposite the table, on the south side of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moses mounted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lighted the lamps [on the lampstand] before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He put the golden altar [of incense] in the Tent of Meeting in front of the veil; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: he burned fragrant incense [as a symbol of prayer] on it, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded him. [Ps 141:2; Rev 8:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then he set up the screen (curtain) at the doorway of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He set the altar of burnt offering before the doorway of the tabernacle of the Tent of Meeting, and offered on it the burnt offering and the grain offering, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'He placed the basin between the Tent of Meeting and the altar [of burnt offering], and put water in it for washing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then from it Moses and Aaron and his sons washed their hands and their feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: When they entered the Tent of Meeting, and when they approached the altar, they washed, just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: And he erected the courtyard all around the tabernacle and the altar, and hung the screen (curtain) at the gateway of the courtyard. So Moses finished the work.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Glory of the L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then the cloud [the Shekinah, God’s visible, dwelling presence] covered the Tent of Meeting, and the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' filled the tabernacle. [Rev 15:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Moses was not able to enter the Tent of Meeting because the cloud remained on it, and the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' filled the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'In all their journeys, whenever the cloud was taken up from over the tabernacle, the Israelites would set out; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'but if the cloud was not taken up, then they did not journey on until the day when it was taken up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: For throughout all their journeys, the cloud of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was on the tabernacle by day, and there was fire in it by night, in the sight of all the house of Israel.'
