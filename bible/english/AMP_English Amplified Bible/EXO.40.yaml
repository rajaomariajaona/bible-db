document_id: EXO.40,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle Erected
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'You shall anoint the altar of burnt offering and all its utensils, and consecrate the altar, and the altar shall be most holy. '
  '11':
  - type: text
    content: 'You shall anoint the basin and its base, and consecrate it. '
  '12':
  - type: text
    content: 'Then you shall bring Aaron and his sons to the doorway of the Tent of Meeting and wash them with water. [John 17:17-19] '
  '13':
  - type: text
    content: 'You shall put the holy garments on Aaron and anoint him and consecrate him, that he may serve as a priest to Me. '
  '14':
  - type: text
    content: 'You shall bring his sons and put tunics on them; '
  '15':
  - type: text
    content: 'you shall anoint them just as you anointed their father, so that they may serve as priests to Me; and their anointing shall qualify them for an everlasting priesthood throughout their generations.” '
  '16':
  - type: text
    content: Thus Moses did; in accordance with all that the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him, so he did.'
  '17':
  - type: text
    content: 'Now it happened on the first day of the first month (Abib) in the second year [after the exodus from Egypt], that the tabernacle was erected. '
  '18':
  - type: text
    content: 'Moses erected the tabernacle, laid its sockets, set up its boards, put in its bars and erected its support poles. '
  '19':
  - type: text
    content: He spread the tent over the tabernacle and put the covering of the tent over it, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded him. '
  '2':
  - type: text
    content: '“On the first day of the first month (Abib) you shall set up the tabernacle of the Tent of Meeting [of God with you]. '
  '20':
  - type: text
    content: 'He took the Testimony [the stones inscribed with the Ten Commandments] and put it into the ark [of the covenant], and placed the poles [through the rings] on the ark, and put the mercy seat on top of the ark. '
  '21':
  - type: text
    content: Moses brought the ark into the tabernacle, and set up a veil (partition) for the screen (curtain), and screened off the ark of the Testimony, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded him. '
  '22':
  - type: text
    content: 'Then he put the table in the Tent of Meeting on the north side of the tabernacle, outside the veil. '
  '23':
  - type: text
    content: He set the bread [of the Presence] in order on it before the L
  - type: heading
    content: ord
  - type: text
    content: ', just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded him. [John 6:32-35] '
  '24':
  - type: text
    content: 'Then he put the lampstand in the Tent of Meeting, opposite the table, on the south side of the tabernacle. '
  '25':
  - type: text
    content: 'Moses mounted '
  - type: text
    content: and
  - type: text
    content: ' lighted the lamps [on the lampstand] before the L'
  - type: heading
    content: ord
  - type: text
    content: ', just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' commanded him. '
  '26':
  - type: text
    content: 'He put the golden altar [of incense] in the Tent of Meeting in front of the veil; '
  '27':
  - type: text
    content: he burned fragrant incense [as a symbol of prayer] on it, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him. [Ps 141:2; Rev 8:3] '
  '28':
  - type: text
    content: 'Then he set up the screen (curtain) at the doorway of the tabernacle. '
  '29':
  - type: text
    content: He set the altar of burnt offering before the doorway of the tabernacle of the Tent of Meeting, and offered on it the burnt offering and the grain offering, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him. '
  '3':
  - type: text
    content: 'You shall place the ark of the Testimony there, and you shall screen off the ark [from the Holy Place of God’s Presence] with the veil (partition curtain). [Heb 10:19-23] '
  '30':
  - type: text
    content: 'He placed the basin between the Tent of Meeting and the altar [of burnt offering], and put water in it for washing. '
  '31':
  - type: text
    content: 'Then from it Moses and Aaron and his sons washed their hands and their feet. '
  '32':
  - type: text
    content: When they entered the Tent of Meeting, and when they approached the altar, they washed, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses. '
  '33':
  - type: text
    content: And he erected the courtyard all around the tabernacle and the altar, and hung the screen (curtain) at the gateway of the courtyard. So Moses finished the work.
  - type: heading
    content: The Glory of the Lord
  '34':
  - type: text
    content: 'Then the cloud [the Shekinah, God’s visible, dwelling presence] covered the Tent of Meeting, and the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' filled the tabernacle. [Rev 15:8] '
  '35':
  - type: text
    content: 'Moses was not able to enter the Tent of Meeting because the cloud remained on it, and the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' filled the tabernacle. '
  '36':
  - type: text
    content: 'In all their journeys, whenever the cloud was taken up from over the tabernacle, the Israelites would set out; '
  '37':
  - type: text
    content: 'but if the cloud was not taken up, then they did not journey on until the day when it was taken up. '
  '38':
  - type: text
    content: For throughout all their journeys, the cloud of the L
  - type: heading
    content: ord
  - type: text
    content: ' was on the tabernacle by day, and there was fire in it by night, in the sight of all the house of Israel.'
  '4':
  - type: text
    content: 'You shall bring in the table [for the bread] and arrange its setting; you shall bring in the lampstand and mount '
  - type: text
    content: and
  - type: text
    content: ' light its lamps. [Rev 21:23-25] '
  '5':
  - type: text
    content: 'You shall set the golden altar of incense in front of the ark of the Testimony [outside the veil], and put the [hanging] veil at the doorway of the tabernacle. '
  '6':
  - type: text
    content: 'You shall set the [bronze] altar of burnt offering in front of the doorway of the tabernacle of the Tent of Meeting. '
  '7':
  - type: text
    content: 'You shall set the basin between the Tent of Meeting and the altar [of burnt offering], and put water in it. '
  '8':
  - type: text
    content: 'You shall set up the courtyard [curtains] all around and hang up the screen (curtain) for the gateway of the courtyard. '
  '9':
  - type: text
    content: 'Then you shall take the anointing oil and anoint the tabernacle and all that is in it, and consecrate it and all its furniture; and it shall be holy (declared sacred, separated from secular use). '
