verses:
  '1':
  - type: heading
    content: Restoration Promised
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Jeremiah the second time, while he was still confined in the court of the guard, saying, '
  '10':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Yet again there will be heard in this place of which you say, “It is a [desolate] waste, without man and without animal”—even in the cities of Judah and in the streets of Jerusalem that are desolate, without man and without inhabitant and without animal— '
  '11':
  - type: text
    content: the [sound of the] voice of joy and the voice of gladness, the voice of the bridegroom and the voice of the bride, the [song-filled] voice of those who say,
  - type: text
    content: '“Give praise '
  - type: text
    content: and
  - type: text
    content: ' thanks to the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' is good;'
  - type: text
    content: For His [steadfast] lovingkindness (mercy) endures forever”;
  - type: text
    content: and of those
  - type: text
    content: ' who bring a thank offering into the house of the L'
  - type: heading
    content: ord
  - type: text
    content: . For I will restore the fortunes of the land as they were at first,’ says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '12':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘There will again be in this desolate place—[a place] without man or animal—and in all its cities, pastures for shepherds who rest their flocks. '
  '13':
  - type: text
    content: In the cities of the hill country, in the cities of the lowland, in the cities of the South (the Negev), in the land of Benjamin, in the places around Jerusalem and in the cities of Judah, the flocks will again pass under the hand of the one who counts them,’ says the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: heading
    content: The Davidic Kingdom
  '14':
  - type: text
    content: ‘Behold, the days are coming,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘when I will fulfill the good word '
  - type: text
    content: and
  - type: text
    content: ' promise which I have made regarding the house of Israel and the house of Judah. '
  '15':
  - type: text
    content: 'In those days and at that time I will cause a righteous Branch of David to spring forth; and He (the Messiah) shall execute justice and righteousness on the earth. [Is 4:2; Jer 23:5; Zech 3:8; 6:12] '
  '16':
  - type: text
    content: 'In those days Judah will be saved and [the people of] Jerusalem will live in safety; and this is '
  - type: text
    content: the name
  - type: text
    content: ' by which she will be called: the L'
  - type: heading
    content: ord
  - type: text
    content: ' Our Righteousness (Justice).’ '
  '17':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘David shall never lack a man (descendant) to sit on the throne of the house of Israel; '
  '18':
  - type: text
    content: and the Levitical priests shall never lack a man (descendant) to offer burnt offerings before Me and to burn grain offerings and to prepare sacrifices all day long.’ ”
  '19':
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Jeremiah, saying, '
  '2':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' who made '
  - type: text
    content: the earth,
  - type: text
    content: ' the L'
  - type: heading
    content: ord
  - type: text
    content: ' who formed it to establish it—the L'
  - type: heading
    content: ord
  - type: text
    content: ' is His name, '
  '20':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘If you can break My covenant for the day and My covenant for the night, so that day and night do not take place at their appointed times, '
  '21':
  - type: text
    content: 'then My covenant may also be broken with David My servant so that he will not have a son to reign on his throne, and [My covenant may also be broken] with the Levitical priests, My ministers. '
  '22':
  - type: text
    content: As the host of [the stars of] heaven cannot be counted and the sand of the sea cannot be measured, so I will multiply the descendants of David My servant and the Levites who minister to Me.’ ”
  '23':
  - type: text
    content: And the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Jeremiah, saying, '
  '24':
  - type: text
    content: “Have you not noticed what this people have spoken, saying, ‘The two families [Israel the northern kingdom, and Judah the southern kingdom] which the L
  - type: heading
    content: ord
  - type: text
    content: ' chose, He has rejected’? Thus they despise My [chosen] people, no longer are they [considered] as a nation in their sight. '
  '25':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘If My covenant with day and night does not stand, and if I have not established the fixed patterns of heaven and earth, [the whole order of nature,] '
  '26':
  - type: text
    content: then I would [also] reject the descendants of Jacob and David My servant, not taking from his descendants rulers over the descendants of Abraham, Isaac, and Jacob. But I will restore their fortunes, and will have mercy on them.’ ” [Gen 49:10]
  '3':
  - type: text
    content: '‘Call to Me and I will answer you, and tell you [and even show you] great and mighty things, [things which have been confined and hidden], which you do not know '
  - type: text
    content: and
  - type: text
    content: ' understand '
  - type: text
    content: and
  - type: text
    content: ' cannot distinguish.’ '
  '4':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, concerning the houses of this city and the houses of the kings of Judah which are torn down '
  - type: text
    content: to make a defense
  - type: text
    content: ' against the siege ramps and against the sword, [Is 22:10; Jer 6:6] '
  '5':
  - type: text
    content: '‘While they (the besieged Jews) are coming to fight against the Chaldeans and to fill the houses with the dead bodies of men whom I have slain in My anger and in My wrath, for I have hidden My face [in disgust] from this city because of all their wickedness. '
  '6':
  - type: text
    content: 'Behold, [in the restored Jerusalem] I will bring to it health and healing, and I will heal them; and I will reveal to them an abundance of peace (prosperity, security, stability) and truth. '
  '7':
  - type: text
    content: 'I will restore the fortunes of Judah and the fortunes of Israel and will rebuild them as they were at first. '
  '8':
  - type: text
    content: 'I will cleanse them from all their wickedness (guilt) by which they have sinned against Me, and I will pardon (forgive) all their sins by which they rebelled against Me. '
  '9':
  - type: text
    content: Jerusalem will be to Me a name of joy, praise and glory before all the nations of the earth which will hear of all the good that I do for it, and they shall fear and tremble because of all the good and all the peace (prosperity, security, stability) that I provide for it.’
