document_id: JER.33,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Restoration Promised
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Jeremiah the second time, while he was still confined in the court of the guard, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘Yet again there will be heard in this place of which you say, “It is a [desolate] waste, without man and without animal”—even in the cities of Judah and in the streets of Jerusalem that are desolate, without man and without inhabitant and without animal— '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the [sound of the] voice of joy and the voice of gladness, the voice of the bridegroom and the voice of the bride, the [song-filled] voice of those who say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Give praise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thanks to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is good;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His [steadfast] lovingkindness (mercy) endures forever”;
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and of those
    - type: text
      text: ' who bring a thank offering into the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . For I will restore the fortunes of the land as they were at first,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘There will again be in this desolate place—[a place] without man or animal—and in all its cities, pastures for shepherds who rest their flocks. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the cities of the hill country, in the cities of the lowland, in the cities of the South (the Negev), in the land of Benjamin, in the places around Jerusalem and in the cities of Judah, the flocks will again pass under the hand of the one who counts them,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Davidic Kingdom
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Behold, the days are coming,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘when I will fulfill the good word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' promise which I have made regarding the house of Israel and the house of Judah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days and at that time I will cause a righteous Branch of David to spring forth; and He (the Messiah) shall execute justice and righteousness on the earth. [Is 4:2; Jer 23:5; Zech 3:8; 6:12] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days Judah will be saved and [the people of] Jerusalem will live in safety; and this is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the name
    - type: text
      text: ' by which she will be called: the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' Our Righteousness (Justice).’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘David shall never lack a man (descendant) to sit on the throne of the house of Israel; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the Levitical priests shall never lack a man (descendant) to offer burnt offerings before Me and to burn grain offerings and to prepare sacrifices all day long.’ ”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Jeremiah, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the earth,
    - type: text
      text: ' the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who formed it to establish it—the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is His name, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘If you can break My covenant for the day and My covenant for the night, so that day and night do not take place at their appointed times, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then My covenant may also be broken with David My servant so that he will not have a son to reign on his throne, and [My covenant may also be broken] with the Levitical priests, My ministers. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the host of [the stars of] heaven cannot be counted and the sand of the sea cannot be measured, so I will multiply the descendants of David My servant and the Levites who minister to Me.’ ”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Jeremiah, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Have you not noticed what this people have spoken, saying, ‘The two families [Israel the northern kingdom, and Judah the southern kingdom] which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' chose, He has rejected’? Thus they despise My [chosen] people, no longer are they [considered] as a nation in their sight. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘If My covenant with day and night does not stand, and if I have not established the fixed patterns of heaven and earth, [the whole order of nature,] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then I would [also] reject the descendants of Jacob and David My servant, not taking from his descendants rulers over the descendants of Abraham, Isaac, and Jacob. But I will restore their fortunes, and will have mercy on them.’ ” [Gen 49:10]
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Call to Me and I will answer you, and tell you [and even show you] great and mighty things, [things which have been confined and hidden], which you do not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cannot distinguish.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, concerning the houses of this city and the houses of the kings of Judah which are torn down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to make a defense
    - type: text
      text: ' against the siege ramps and against the sword, [Is 22:10; Jer 6:6] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘While they (the besieged Jews) are coming to fight against the Chaldeans and to fill the houses with the dead bodies of men whom I have slain in My anger and in My wrath, for I have hidden My face [in disgust] from this city because of all their wickedness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, [in the restored Jerusalem] I will bring to it health and healing, and I will heal them; and I will reveal to them an abundance of peace (prosperity, security, stability) and truth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will restore the fortunes of Judah and the fortunes of Israel and will rebuild them as they were at first. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will cleanse them from all their wickedness (guilt) by which they have sinned against Me, and I will pardon (forgive) all their sins by which they rebelled against Me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jerusalem will be to Me a name of joy, praise and glory before all the nations of the earth which will hear of all the good that I do for it, and they shall fear and tremble because of all the good and all the peace (prosperity, security, stability) that I provide for it.’
