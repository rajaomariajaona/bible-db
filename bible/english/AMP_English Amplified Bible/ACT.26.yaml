  - type: heading
    content: Paul’s Defense before Agrippa
  - type: text
    content: 'Then Agrippa said to Paul, “You are [now] permitted to speak on your own behalf.” At that, Paul stretched out his hand [as an orator] and made his defense [as follows]:'
  '10':
  - type: text
    content: 'And this is just what I did in Jerusalem; I not only locked up many of the saints (God’s people) in prison after receiving authority from the chief priests, but also when they were being condemned to death, I '
  - type: note
    content: Lit cast down my (black) pebble. In ancient times a vote cast by throwing a white pebble meant acquittal, and a black one, condemnation.
  - type: text
    content: 'cast my vote against them. '
  '11':
  - type: text
    content: And I often punished them [making them suffer] in all the synagogues and tried to force them to blaspheme; and in my extreme rage at them, I kept hunting them even to foreign cities [harassing and persecuting them].
  '12':
  - type: text
    content: '“While so engaged, as I was traveling to Damascus with the authority and commission '
  - type: text
    content: and
  - type: text
    content: ' full power of the chief priests, '
  '13':
  - type: text
    content: 'at midday, O King, I saw on the way a light from heaven surpassing the brightness of the sun, shining all around me and those who were traveling with me. '
  '14':
  - type: text
    content: 'And when we all had fallen to the ground, I heard a voice in the Hebrew dialect (Jewish Aramaic) saying to me, '
  - type: text
    content: '‘Saul, Saul, why are you persecuting Me? '
  - type: note
    content: An ancient Greek proverb dating back to the time of Euripides.
  - type: text
