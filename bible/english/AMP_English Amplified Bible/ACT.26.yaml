  - type: text
    content: ' [repeatedly] '
  - type: text
    content: 'against the '
  - type: note
    content: These were wooden shafts (like broomsticks) with a pointed piece of metal on one end, used by the farmer to keep an ox going in the right direction as it pulled a plow. Jesus was “prodding” Paul to take the proper direction in his life, and Paul had been resisting.
  - type: text
    content: goads
  - type: text
    content: ' [offering pointless resistance].’ '
  '15':
  - type: text
    content: 'And I said, ‘Who are You, Lord?’ And the Lord said, '
  - type: text
    content: ‘I am Jesus whom you are persecuting.
  - type: text
    content: ' '
