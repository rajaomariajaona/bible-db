  '19':
  - type: text
    content: '“So, King Agrippa, I was not disobedient to the heavenly vision, '
  '2':
  - type: text
    content: '“I consider myself fortunate, King Agrippa, since it is before you that I am to make my defense today regarding all the charges brought against me by the Jews, '
  '20':
  - type: text
    content: 'but I openly proclaimed first to those at Damascus, then at Jerusalem and throughout the region of Judea, and '
  - type: text
    content: even
  - type: text
    content: ' to the Gentiles, that they should repent [change their inner self—their old way of thinking] and turn to God, doing deeds '
  - type: text
    content: and
  - type: text
    content: ' living lives which are consistent with repentance. '
  '21':
  - type: text
    content: 'Because of this '
  - type: text
    content: some
  - type: text
    content: ' Jews seized me in the temple and tried to kill me. '
  '22':
  - type: text
    content: 'But I have had help from God to this day, and I stand [before people] testifying to small and great alike, stating nothing except what the Prophets and Moses said would come to pass— '
  '23':
  - type: text
    content: 'that the Christ (the Messiah, the Anointed) was to suffer, and that He by being the first to rise from the dead [with an incorruptible body] would proclaim light (salvation) both to the '
  - type: text
    content: Jewish
  - type: text
    content: ' people and to the Gentiles.”'
  '24':
  - type: text
    content: 'While Paul was making this defense, Festus said loudly, “Paul, you are out of your mind! Your great education is turning you toward madness.” '
  '25':
  - type: text
    content: 'But Paul replied, “I am not out of my mind, most excellent '
  - type: text
    content: and
  - type: text
    content: ' noble Festus, but [with a sound mind] I am uttering rational words of truth '
  - type: text
    content: and
  - type: text
    content: ' reason. '
  '26':
  - type: text
    content: 'For [your majesty] the king understands these things, and [therefore] I am also speaking to him with confidence '
  - type: text
    content: and
  - type: text
    content: ' boldness, since I am convinced that none of these things escape his notice; for this has not been done in a corner [hidden from view, in secret]. '
  '27':
  - type: text
    content: 'King Agrippa, do you believe the [writings of the] Prophets [their messages and words]? I know that you do.” '
  '28':
  - type: text
    content: 'Then Agrippa said to Paul, “In a short time [and with so little effort] you [almost] persuade me to become a Christian.” '
  '29':
  - type: text
    content: And Paul replied, “Whether in a short time or long, I wish to God that not only you, but also all who hear me today, might become such as I am, except for these chains.”
  '3':
  - type: text
    content: especially because you are an expert [fully knowledgeable, experienced and unusually conversant] in all the Jewish customs and controversial issues; therefore, I beg you to listen to me patiently.
  '30':
  - type: text
    content: 'Then the king stood up, and [with him] the governor and Bernice, and those who were sitting with them; '
  '31':
  - type: text
    content: 'and after they had gone out, they '
  - type: text
    content: began
  - type: text
    content: ' saying to one another, “This man is not doing anything worthy of death or [even] of imprisonment.” '
  '32':
  - type: text
    content: 'And Agrippa said to Festus, “This man could have been set free if he had not appealed to '
  - type: note
    content: Nero was the fifth and last of the Roman emperors of the Julio-Claudian dynasty. He ruled after the death of Claudius and actively persecuted Christians. Both Paul and Peter were martyred during Nero’s reign (a.d. 54-68).
  - type: text
    content: Caesar (Emperor Nero).”
  '4':
  - type: text
    content: '“So then, all the Jews know my manner of life from my youth up, which from the beginning was spent among my own nation [the Jewish people], and in Jerusalem. '
  '5':
  - type: text
    content: 'They have known me for a long time, if they are willing to testify to it, that according to the '
  - type: note
    content: Paul probably is referring to the school of Shammai, which flourished from 30 b.c. to a.d. 20. Gamaliel, Paul’s teacher in the school of Hillel (22:3), discussed and interpreted the teachings of both schools, and often agreed with the teachings of Shammai, so Paul was familiar with Shammai as well as Hillel.
  - type: text
    content: 'strictest sect of our religion, I have lived as a Pharisee. '
  '6':
  - type: text
    content: 'And now I am standing trial for the hope of the promise made by God to our fathers. [Acts 13:32, 33] '
  '7':
  - type: text
    content: 'Which hope [of the Messiah and the resurrection] our twelve tribes [confidently] expect to realize as they serve '
  - type: text
    content: and
  - type: text
    content: ' worship '
  - type: text
    content: God
  - type: text
    content: ' in earnest night and day. And for this hope, O King, I am being accused by Jews! '
  '8':
  - type: text
    content: Why is it thought incredible by [any of] you that God raises the dead?
  '9':
  - type: text
    content: '“So then, I [once] thought to myself that it was my duty to do many things in opposition to the name of Jesus of Nazareth. '
