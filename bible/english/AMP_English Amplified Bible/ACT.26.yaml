document_id: ACT.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul’s Defense before Agrippa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Agrippa said to Paul, “You are [now] permitted to speak on your own behalf.” At that, Paul stretched out his hand [as an orator] and made his defense [as follows]:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“I consider myself fortunate, King Agrippa, since it is before you that I am to make my defense today regarding all the charges brought against me by the Jews, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: especially because you are an expert [fully knowledgeable, experienced and unusually conversant] in all the Jewish customs and controversial issues; therefore, I beg you to listen to me patiently.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“So then, all the Jews know my manner of life from my youth up, which from the beginning was spent among my own nation [the Jewish people], and in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They have known me for a long time, if they are willing to testify to it, that according to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul probably is referring to the school of Shammai, which flourished from 30 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. to '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 20. Gamaliel, Paul’s teacher in the school of Hillel (22:3), discussed and interpreted the teachings of both schools, and often agreed with the teachings of Shammai, so Paul was familiar with Shammai as well as Hillel.
    marker-yv: yv-n
  - type: text
    text: 'strictest sect of our religion, I have lived as a Pharisee. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And now I am standing trial for the hope of the promise made by God to our fathers. [Acts 13:32, 33] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Which hope [of the Messiah and the resurrection] our twelve tribes [confidently] expect to realize as they serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' in earnest night and day. And for this hope, O King, I am being accused by Jews! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Why is it thought incredible by [any of] you that God raises the dead?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“So then, I [once] thought to myself that it was my duty to do many things in opposition to the name of Jesus of Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And this is just what I did in Jerusalem; I not only locked up many of the saints (God’s people) in prison after receiving authority from the chief priests, but also when they were being condemned to death, I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: cast down my (black) pebble
      - type: text
        text: . In ancient times a vote cast by throwing a white pebble meant acquittal, and a black one, condemnation.
    marker-yv: yv-n
  - type: text
    text: 'cast my vote against them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And I often punished them [making them suffer] in all the synagogues and tried to force them to blaspheme; and in my extreme rage at them, I kept hunting them even to foreign cities [harassing and persecuting them].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“While so engaged, as I was traveling to Damascus with the authority and commission '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' full power of the chief priests, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'at midday, O King, I saw on the way a light from heaven surpassing the brightness of the sun, shining all around me and those who were traveling with me. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And when we all had fallen to the ground, I heard a voice in the Hebrew dialect (Jewish Aramaic) saying to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘Saul, Saul, why are you persecuting Me? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ancient Greek proverb dating back to the time of Euripides.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is hard for you to kick
  - type: text
    text: ' [repeatedly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'against the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were wooden shafts (like broomsticks) with a pointed piece of metal on one end, used by the farmer to keep an ox going in the right direction as it pulled a plow. Jesus was “prodding” Paul to take the proper direction in his life, and Paul had been resisting.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: goads
  - type: text
    text: ' [offering pointless resistance].’ '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And I said, ‘Who are You, Lord?’ And the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I am Jesus whom you are persecuting.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Get up and stand on your feet. I have appeared to you for this purpose, to appoint you
  - type: text
    text: ' [to serve] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as a minister and as a witness
  - type: text
    text: ' [to testify, with authority,] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: not only to the things which you have seen, but also to the things in which I will appear to you,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '[choosing you for Myself and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'rescuing you from the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jewish
    - type: text
      text: ' people and from the Gentiles, to whom I am sending you,'
  - type: text
    text: ' [Ezek 2:1, 3] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to open their
  - type: text
    text: ' [spiritual] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'eyes so that they may turn from darkness to light and from the power of Satan to God, that they may receive forgiveness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' release from their sins and an inheritance among those who have been sanctified (set apart, made holy) by faith in Me.’'
  - type: text
    text: ' [Is 42:7, 16]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“So, King Agrippa, I was not disobedient to the heavenly vision, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'but I openly proclaimed first to those at Damascus, then at Jerusalem and throughout the region of Judea, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: even
  - type: text
    text: ' to the Gentiles, that they should repent [change their inner self—their old way of thinking] and turn to God, doing deeds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' living lives which are consistent with repentance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Because of this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' Jews seized me in the temple and tried to kill me. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But I have had help from God to this day, and I stand [before people] testifying to small and great alike, stating nothing except what the Prophets and Moses said would come to pass— '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'that the Christ (the Messiah, the Anointed) was to suffer, and that He by being the first to rise from the dead [with an incorruptible body] would proclaim light (salvation) both to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jewish
  - type: text
    text: ' people and to the Gentiles.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'While Paul was making this defense, Festus said loudly, “Paul, you are out of your mind! Your great education is turning you toward madness.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But Paul replied, “I am not out of my mind, most excellent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' noble Festus, but [with a sound mind] I am uttering rational words of truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reason. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For [your majesty] the king understands these things, and [therefore] I am also speaking to him with confidence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' boldness, since I am convinced that none of these things escape his notice; for this has not been done in a corner [hidden from view, in secret]. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'King Agrippa, do you believe the [writings of the] Prophets [their messages and words]? I know that you do.” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Agrippa said to Paul, “In a short time [and with so little effort] you [almost] persuade me to become a Christian.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: And Paul replied, “Whether in a short time or long, I wish to God that not only you, but also all who hear me today, might become such as I am, except for these chains.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then the king stood up, and [with him] the governor and Bernice, and those who were sitting with them; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and after they had gone out, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' saying to one another, “This man is not doing anything worthy of death or [even] of imprisonment.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And Agrippa said to Festus, “This man could have been set free if he had not appealed to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nero was the fifth and last of the Roman emperors of the Julio-Claudian dynasty. He ruled after the death of Claudius and actively persecuted Christians. Both Paul and Peter were martyred during Nero’s reign (
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 54-68).
    marker-yv: yv-n
  - type: text
    text: Caesar (Emperor Nero).”
