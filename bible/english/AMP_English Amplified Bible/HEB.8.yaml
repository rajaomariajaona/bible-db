    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the main point of what we have to say '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'is this:'
  - type: text
    text: ' we have such a High Priest, [the Christ] who is seated [in the place of honor] at the right hand of the throne of the Majesty (God) in heaven, [Ps 110:1] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'a Minister (Officiating Priest) in the holy places and in the true tabernacle, which is erected not by man, but by the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For every high priest is appointed to offer both gifts and sacrifices; so it is essential for this One also to have something to offer. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now if He were [still living] on earth, He would not be a priest at all, for there are priests who offer the gifts [to God] in accordance with the Law. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They serve as a pattern and foreshadowing of [what has its true existence and reality in] the heavenly things (sanctuary). For when Moses was about to erect the tabernacle, he was warned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by God,
  - type: text
    text: ' saying, “S'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ee that you make
  - type: text
    text: ' it all [exactly] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: according to the pattern which was shown to you on the mountain
  - type: text
    text: '.” [Ex 25:40] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But as it is, Christ has acquired a [priestly] ministry which is more excellent [than the old Levitical priestly ministry], for He is the Mediator (Arbiter) of a better covenant [uniting God and man], which has been enacted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rests on better promises.'
- type: usfm
  marker: s1
  children:
  - type: usfm
