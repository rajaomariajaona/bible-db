document_id: 1PE.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Serve God Willingly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, I strongly urge the elders among you [pastors, spiritual leaders of the church], as a fellow elder and as an eyewitness [called to testify] of the sufferings of Christ, as well as one who shares in the glory that is to be revealed: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'After you have suffered for a little while, the God of all grace [who imparts His blessing and favor], who called you to His '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' eternal glory in Christ, will Himself complete, confirm, strengthen, and establish you [making you what you ought to be]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: To Him be dominion (power, authority, sovereignty) forever and ever. Amen.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'By '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Roman name of Silas, Paul’s companion during his second missionary journey (Acts 15:22; 1 Thess 1:1; 2 Thess 1:1).
      marker-yv: yv-n
    - type: text
      text: 'Silvanus, our faithful brother (as I consider him), I have written to you briefly, to counsel and testify that this is the true grace [the undeserved favor] of God. Stand firm in it! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'She [the church] who is in Babylon, chosen together with you, sends you greetings, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so does
    - type: text
      text: ' my son [in the faith], Mark. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Greet one another with a kiss of love.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: o all of you who are in Christ, may there be peace.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'shepherd '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protect the flock of God among you, exercising oversight not under compulsion, but voluntarily, according to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the will of
    - type: text
      text: ' God; and not [motivated] for shameful gain, but with wholehearted enthusiasm; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'not lording it over those assigned to your care [do not be arrogant or overbearing], but be examples [of Christian living] to the flock [set a pattern of integrity for your congregation]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And when the Chief Shepherd (Christ) appears, you will receive the [conqueror’s] unfading crown of glory. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Likewise, you younger men [of lesser rank and experience], be subject to your elders [seek their counsel]; and all of you, clothe yourselves with humility toward one another [tie on the servant’s apron], for G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od is opposed to the proud
    - type: text
      text: ' [the disdainful, the presumptuous, and He defeats them], '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: but
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e gives grace to the humble
    - type: text
      text: . [Prov 3:34]
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore humble yourselves under the mighty hand of God [set aside self-righteous pride], so that He may exalt you [to a place of honor in His service] at the appropriate time, [John 3:30] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'casting all your cares [all your anxieties, all your worries, and all your concerns, once and for all] on Him, for He cares about you [with deepest affection, and watches over you very carefully]. [Ps 55:22] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Be sober [well balanced and self-disciplined], be alert '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cautious at all times. That enemy of yours, the devil, prowls around like a roaring lion [fiercely hungry], seeking someone to devour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But resist him, be firm in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' faith [against his attack—rooted, established, immovable], knowing that the same experiences of suffering are being experienced by your brothers and sisters throughout the world. [You do not suffer alone.] '
