document_id: ACT.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Fate of Ananias and Sapphira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now a man named Ananias, with his wife Sapphira, sold a piece of property, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and with his wife’s full knowledge [and complicity] he kept back some of the proceeds, bringing only a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ananias wanted everyone to think that he had turned over all the money from the sale, so secretly holding some back was essentially embezzling. If he had been honest and told Peter that he had kept some of the money, he would have done nothing wrong.
    marker-yv: yv-n
  - type: text
    text: 'portion of it, and set it at the apostles’ feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Peter said, “Ananias, why has Satan filled your heart to lie to the Holy Spirit and [secretly] keep back for yourself some of the proceeds [from the sale] of the land? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As long as it remained [unsold], did it not remain your own [to do with as you pleased]? And after it was sold, was the money not under your control? Why is it that you have conceived this act [of hypocrisy and deceit] in your heart? You have not [simply] lied to people, but to God.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And hearing these words, Ananias fell down suddenly and died; and great fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awe gripped those who heard of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the young men [in the congregation] got up and wrapped up the body, and carried it out and buried it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now after an interval of about three hours his wife came in, not knowing what had happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Peter asked her, “Tell me whether you sold your land for so much?” And she said, “Yes, for so much.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Peter said to her, “How could you two have agreed together to put the Spirit of the Lord to the test? Look! The feet of those who have buried your husband are at the door, and they will carry you out also.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And at once she fell down at his feet and died; and the young men came in and found her dead, and they carried her out and buried her beside her husband. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And great fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' awe gripped the whole church, and all who heard about these things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At the hands of the apostles many signs and wonders (attesting miracles) were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' taking place among the people. And by common consent they all met together [at the temple] in [the covered porch called] Solomon’s portico. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But none of the rest [of the people, the non-believers] dared to associate with them; however, the people were holding them in high esteem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were speaking highly of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'More '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' more believers in the Lord, crowds of men and women, were constantly being added to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their number,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'to such an extent that they even carried their sick out into the streets and put them on cots and sleeping pads, so that when Peter came by at least his shadow might fall on one of them [with healing power]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the people from the towns in the vicinity of Jerusalem were coming together, bringing the sick and those who were tormented by unclean spirits, and they were all being healed.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Imprisonment and Release
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may refer to either Caiaphas (the official high priest) or his father-in-law, Annas (the de facto high priest). See note 4:6.
    marker-yv: yv-n
  - type: text
    text: 'high priest stood up, along with all his associates (that is, the sect of the Sadducees), and they were filled with jealousy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resentment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They arrested the apostles and put them in a public jail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But during the night an angel of the Lord opened the prison doors, and leading them out, he said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Go, stand and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continue
  - type: text
    text: ' to tell the people in the temple [courtyards] the whole message of this Life [the eternal life revealed by Christ and found through faith in Him].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When they heard this, they went into the temple [courtyards] about daybreak and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' teaching.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: N
  - type: text
    text: 'ow when the high priest and his associates arrived, they called together the Council (Sanhedrin, Jewish High Court), even all the council of elders of the sons of Israel, and sent word to the prison for the apostles to be brought [before them]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But when the officers arrived, they did not find them in the prison; and they came back and reported, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“We found the prison securely locked and the guards standing at the doors, but when we opened [the doors], we found no one inside.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now when the captain of the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: guard
  - type: text
    text: ' and the chief priests heard these things, they were greatly perplexed, wondering what would come of this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But someone came and told them, “The men whom you put in prison are standing [right here] in the temple [area], teaching the people!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the captain went with the officers and brought them back, without hurting them (because they were afraid of the people, worried that they might be stoned).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So they brought them and presented them before the Council (Sanhedrin, Jewish High Court). The high priest questioned them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'saying, “We gave you strict orders not to continue teaching in this name, and yet you have filled Jerusalem with your teaching and you intend to bring this '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The reason the Council members refused to refer to Jesus by name is unclear, but may indicate contempt, guilt, or perhaps fear.
    marker-yv: yv-n
  - type: text
    text: 'Man’s blood on us [by accusing us as His murderers].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Peter and the apostles replied, “We must obey God rather than men [we have no other choice]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The God of our fathers raised up Jesus, whom you had put to death by hanging Him on a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wood
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'cross [and you are responsible]. [Deut 21:22, 23] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'God exalted Him to His right hand as Prince and Savior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Deliverer, in order to grant repentance to Israel, and [to grant] forgiveness of sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And we are witnesses of these things; and so is the Holy Spirit, whom God has bestowed on those who obey Him.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Gamaliel’s Counsel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Now when they heard this, they were infuriated and they intended to kill the apostles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But a Pharisee named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Saul of Tarsus, later known as the apostle Paul, was among Gamaliel’s students. See 22:3.
    marker-yv: yv-n
  - type: text
    text: 'Gamaliel, a teacher of the Law [of Moses], highly esteemed by all the people, stood up in the Council (Sanhedrin, Jewish High Court) and ordered that the men be taken outside for a little while. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then he said to the Council, “Men of Israel, be careful in regard to what you propose to do to these men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'For some time ago Theudas rose up, claiming to be somebody [of importance], and a group of about four hundred men allied themselves with him. But he was killed, and all who followed him were scattered and came to nothing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'After this man, Judas the Galilean rose up, [and led an uprising] during the time of the census, and drew people after him; he was also killed, and all his followers were scattered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'So in the present case, I say to you, stay away from these men and let them alone, for if this plan or action is of men [merely human in origin], it will fail '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be destroyed; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: but if it is of God [and it appears that it is], you will not be able to stop them; or else you may even be found fighting against God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The Council (Sanhedrin, Jewish High Court) took his advice; and after summoning the apostles, they flogged them and ordered them not to speak in the name of Jesus, and released them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'So they left the Council, rejoicing that they had been considered worthy [dignified by indignity] to suffer shame for [the sake of] His name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And every single day, in the temple [area] and in homes, they did not stop teaching and telling the good news of Jesus as the Christ (the Messiah, the Anointed).
