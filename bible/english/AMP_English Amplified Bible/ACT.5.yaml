document_id: ACT.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Fate of Ananias and Sapphira
  - type: text
    content: 'Now a man named Ananias, with his wife Sapphira, sold a piece of property, '
  '10':
  - type: text
    content: 'And at once she fell down at his feet and died; and the young men came in and found her dead, and they carried her out and buried her beside her husband. '
  '11':
  - type: text
    content: 'And great fear '
  - type: text
    content: and
  - type: text
    content: ' awe gripped the whole church, and all who heard about these things.'
  '12':
  - type: text
    content: 'At the hands of the apostles many signs and wonders (attesting miracles) were '
  - type: text
    content: continually
  - type: text
    content: ' taking place among the people. And by common consent they all met together [at the temple] in [the covered porch called] Solomon’s portico. '
  '13':
  - type: text
    content: 'But none of the rest [of the people, the non-believers] dared to associate with them; however, the people were holding them in high esteem '
  - type: text
    content: and
  - type: text
    content: ' were speaking highly of them. '
  '14':
  - type: text
    content: 'More '
  - type: text
    content: and
  - type: text
    content: ' more believers in the Lord, crowds of men and women, were constantly being added to '
  - type: text
    content: their number,
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'to such an extent that they even carried their sick out into the streets and put them on cots and sleeping pads, so that when Peter came by at least his shadow might fall on one of them [with healing power]. '
  '16':
  - type: text
    content: And the people from the towns in the vicinity of Jerusalem were coming together, bringing the sick and those who were tormented by unclean spirits, and they were all being healed.
  - type: heading
    content: Imprisonment and Release
  '17':
  - type: text
    content: 'But the '
  - type: note
    content: This may refer to either Caiaphas (the official high priest) or his father-in-law, Annas (the de facto high priest). See note 4:6.
  - type: text
    content: 'high priest stood up, along with all his associates (that is, the sect of the Sadducees), and they were filled with jealousy '
  - type: text
    content: and
  - type: text
    content: ' resentment. '
  '18':
  - type: text
    content: 'They arrested the apostles and put them in a public jail. '
  '19':
  - type: text
    content: 'But during the night an angel of the Lord opened the prison doors, and leading them out, he said, '
  '2':
  - type: text
    content: 'and with his wife’s full knowledge [and complicity] he kept back some of the proceeds, bringing only a '
  - type: note
    content: Ananias wanted everyone to think that he had turned over all the money from the sale, so secretly holding some back was essentially embezzling. If he had been honest and told Peter that he had kept some of the money, he would have done nothing wrong.
  - type: text
    content: 'portion of it, and set it at the apostles’ feet. '
  '20':
  - type: text
    content: '“Go, stand and '
  - type: text
    content: continue
  - type: text
    content: ' to tell the people in the temple [courtyards] the whole message of this Life [the eternal life revealed by Christ and found through faith in Him].” '
  '21':
  - type: text
    content: 'When they heard this, they went into the temple [courtyards] about daybreak and '
  - type: text
    content: began
  - type: text
    content: ' teaching.'
  - type: text
    content: N
  - type: text
    content: 'ow when the high priest and his associates arrived, they called together the Council (Sanhedrin, Jewish High Court), even all the council of elders of the sons of Israel, and sent word to the prison for the apostles to be brought [before them]. '
  '22':
  - type: text
    content: 'But when the officers arrived, they did not find them in the prison; and they came back and reported, '
  '23':
  - type: text
    content: '“We found the prison securely locked and the guards standing at the doors, but when we opened [the doors], we found no one inside.” '
  '24':
  - type: text
    content: 'Now when the captain of the temple '
  - type: text
    content: guard
  - type: text
    content: ' and the chief priests heard these things, they were greatly perplexed, wondering what would come of this. '
  '25':
  - type: text
    content: 'But someone came and told them, “The men whom you put in prison are standing [right here] in the temple [area], teaching the people!” '
  '26':
  - type: text
    content: Then the captain went with the officers and brought them back, without hurting them (because they were afraid of the people, worried that they might be stoned).
  '27':
  - type: text
    content: 'So they brought them and presented them before the Council (Sanhedrin, Jewish High Court). The high priest questioned them, '
  '28':
  - type: text
    content: 'saying, “We gave you strict orders not to continue teaching in this name, and yet you have filled Jerusalem with your teaching and you intend to bring this '
  - type: note
    content: The reason the Council members refused to refer to Jesus by name is unclear, but may indicate contempt, guilt, or perhaps fear.
  - type: text
    content: 'Man’s blood on us [by accusing us as His murderers].” '
  '29':
  - type: text
    content: 'Then Peter and the apostles replied, “We must obey God rather than men [we have no other choice]. '
  '3':
  - type: text
    content: 'But Peter said, “Ananias, why has Satan filled your heart to lie to the Holy Spirit and [secretly] keep back for yourself some of the proceeds [from the sale] of the land? '
  '30':
  - type: text
    content: 'The God of our fathers raised up Jesus, whom you had put to death by hanging Him on a '
  - type: note
    content: Lit wood.
  - type: text
    content: 'cross [and you are responsible]. [Deut 21:22, 23] '
  '31':
  - type: text
    content: 'God exalted Him to His right hand as Prince and Savior '
  - type: text
    content: and
  - type: text
    content: ' Deliverer, in order to grant repentance to Israel, and [to grant] forgiveness of sins. '
  '32':
  - type: text
    content: And we are witnesses of these things; and so is the Holy Spirit, whom God has bestowed on those who obey Him.”
  - type: heading
    content: Gamaliel’s Counsel
  '33':
  - type: text
    content: 'Now when they heard this, they were infuriated and they intended to kill the apostles. '
  '34':
  - type: text
    content: 'But a Pharisee named '
  - type: note
    content: Saul of Tarsus, later known as the apostle Paul, was among Gamaliel’s students. See 22:3.
  - type: text
    content: 'Gamaliel, a teacher of the Law [of Moses], highly esteemed by all the people, stood up in the Council (Sanhedrin, Jewish High Court) and ordered that the men be taken outside for a little while. '
  '35':
  - type: text
    content: 'Then he said to the Council, “Men of Israel, be careful in regard to what you propose to do to these men. '
  '36':
  - type: text
    content: 'For some time ago Theudas rose up, claiming to be somebody [of importance], and a group of about four hundred men allied themselves with him. But he was killed, and all who followed him were scattered and came to nothing. '
  '37':
  - type: text
    content: 'After this man, Judas the Galilean rose up, [and led an uprising] during the time of the census, and drew people after him; he was also killed, and all his followers were scattered. '
  '38':
  - type: text
    content: 'So in the present case, I say to you, stay away from these men and let them alone, for if this plan or action is of men [merely human in origin], it will fail '
  - type: text
    content: and
  - type: text
    content: ' be destroyed; '
  '39':
  - type: text
    content: but if it is of God [and it appears that it is], you will not be able to stop them; or else you may even be found fighting against God!”
  '4':
  - type: text
    content: 'As long as it remained [unsold], did it not remain your own [to do with as you pleased]? And after it was sold, was the money not under your control? Why is it that you have conceived this act [of hypocrisy and deceit] in your heart? You have not [simply] lied to people, but to God.” '
  '40':
  - type: text
    content: 'The Council (Sanhedrin, Jewish High Court) took his advice; and after summoning the apostles, they flogged them and ordered them not to speak in the name of Jesus, and released them. '
  '41':
  - type: text
    content: 'So they left the Council, rejoicing that they had been considered worthy [dignified by indignity] to suffer shame for [the sake of] His name. '
  '42':
  - type: text
    content: And every single day, in the temple [area] and in homes, they did not stop teaching and telling the good news of Jesus as the Christ (the Messiah, the Anointed).
  '5':
  - type: text
    content: 'And hearing these words, Ananias fell down suddenly and died; and great fear '
  - type: text
    content: and
  - type: text
    content: ' awe gripped those who heard of it. '
  '6':
  - type: text
    content: And the young men [in the congregation] got up and wrapped up the body, and carried it out and buried it.
  '7':
  - type: text
    content: 'Now after an interval of about three hours his wife came in, not knowing what had happened. '
  '8':
  - type: text
    content: 'Peter asked her, “Tell me whether you sold your land for so much?” And she said, “Yes, for so much.” '
  '9':
  - type: text
    content: 'Then Peter said to her, “How could you two have agreed together to put the Spirit of the Lord to the test? Look! The feet of those who have buried your husband are at the door, and they will carry you out also.” '
