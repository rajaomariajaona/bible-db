document_id: ROM.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Believers Are Dead to Sin, Alive to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What shall we say [to all this]? Should we continue in sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' practice sin as a habit so that [God’s gift of] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Grace justifies believers, making them free of the guilt of sin, blameless, so that they may have eternal life.
      marker-yv: yv-n
    - type: text
      text: 'grace may increase '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overflow? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the death that He died, He died to sin [ending its power and paying the sinner’s debt] once and for all; and the life that He lives, He lives to [glorify] God [in unbroken fellowship with Him]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even so, consider yourselves to be dead to sin [and your relationship to it broken], but alive to God [in unbroken fellowship with Him] in Christ Jesus.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore do not let sin reign in your mortal body so that you obey its lusts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' passions. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not go on offering members of your body to sin as instruments of wickedness. But offer yourselves to God [in a decisive act] as those alive [raised] from the dead [to a new life], and your members [all of your abilities—sanctified, set apart] as instruments of righteousness [yielded] to God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For sin will no longer be a master over you, since you are not under Law [as slaves], but under [unmerited] grace [as recipients of God’s favor and mercy].
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then [are we to conclude]? Shall we sin because we are not under Law, but under [God’s] grace? Certainly not! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that when you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' offer yourselves to someone to do his will, you are the slaves of the one whom you obey, either [slaves] of sin, which leads to death, or of obedience, which leads to righteousness (right standing with God)? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But thank God that though you were slaves of sin, you became obedient with all your heart to the standard of teaching in which you were instructed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to which you were committed. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And having been set free from sin, you have become the slaves of righteousness [of conformity to God’s will and purpose]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am speaking in [familiar] human terms because of your natural limitations [your spiritual immaturity]. For just as you presented your bodily members as slaves to impurity and to [moral] lawlessness, leading to further lawlessness, so now offer your members [your abilities, your talents] as slaves to righteousness, leading to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There are three basic kinds of sanctification in the NT: (1) Positional sanctification is based on the death of Christ. Every believer is a saint and is holy before God. The believer is “set apart for God” and in some instances “set apart for God’s purpose” (Heb 10:10, 14, 29); (2) Practical sanctification is a progressive process and means “growing in righteous living” as the believer matures spiritually (Rom 6:13; 1 Thess 5:23; 1 Pet 1:16); (3) Ultimate sanctification is that which is to come when the believer stands before God (Eph 5:26, 27).'
      marker-yv: yv-n
    - type: text
      text: sanctification [that is, being set apart for God’s purpose].
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certainly not! How can we, the very ones who died to sin, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continue to
    - type: text
      text: ' live in it any longer? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you were slaves of sin, you were free in regard to righteousness [you had no desire to conform to God’s will]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So what benefit did you get at that time from the things of which you are now ashamed? [None!] For the outcome of those things is death! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now since you have been set free from sin and have become [willing] slaves to God, you have your benefit, resulting in sanctification [being made holy and set apart for God’s purpose], and the outcome [of this] is eternal life. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the wages of sin is death, but the free gift of God [that is, His remarkable, overwhelming gift of grace to believers] is eternal life in Christ Jesus our Lord.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or are you ignorant of the fact that all of us who have been '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '“Baptize” is a transliteration of the Greek word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: baptizo,
        - type: text
          text: ' which means to submerge an object into liquid. In this passage Christ becomes the liquid, metaphorically, and those who are baptized into Him remain in Him forever and benefit from His experiences, including His death. The best news is that Jesus was resurrected, so believers will also experience resurrection (those who are alive when Christ returns will experience a physical transformation). But even now believers experience a kind of resurrection in that they live new lives (as Paul says, “walk in newness of life”) in a wonderful new relationship with God and their fellow believers.'
      marker-yv: yv-n
    - type: text
      text: 'baptized into Christ Jesus were baptized into His death? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have therefore been buried with Him through baptism into death, so that just as Christ was raised from the dead through the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power of the Father, we too might walk '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habitually
    - type: text
      text: ' in newness of life [abandoning our old ways]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if we have become one with Him [permanently united] in the likeness of His death, we will also certainly be [one with Him and share fully] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the likeness
    - type: text
      text: ' of His resurrection. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that our old '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: anthropos,
        - type: text
          text: ' i.e. man, person.'
      marker-yv: yv-n
    - type: text
      text: 'self [our human nature without the Holy Spirit] was nailed to the cross with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him,
    - type: text
      text: ' in order that our body of sin might be done away with, so that we would no longer be slaves to sin. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the person who has died [with Christ] has been freed from [the power of] sin.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if we have died with Christ, we believe that we will also live [together] with Him, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because we know [the self-evident truth] that Christ, having been raised from the dead, will never die again; death no longer has power over Him. '
