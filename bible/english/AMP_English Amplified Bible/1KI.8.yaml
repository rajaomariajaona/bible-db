      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: For You singled them out from all the peoples of the earth as Your heritage, just as You declared through Moses Your servant, when You brought our fathers out of Egypt, O Lord G
