document_id: 1KI.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Ark Brought into the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Solomon assembled the elders of Israel and all the heads of the tribes, the leaders of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the sons of Israel, to King Solomon in Jerusalem, to bring up the ark of the covenant of the Lord from the City of David, which is Zion. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'All the men of Israel assembled before King Solomon at the feast in the month of Ethanim (September-October), that is, the seventh month. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the elders of Israel came, and the priests carried the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They brought up the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the Tent of Meeting and all the holy utensils that were in the tent; the priests and the Levites brought them up. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'King Solomon and all the congregation of Israel, who had assembled before him, were with him before the ark, sacrificing sheep and oxen, so many that they could not be counted or numbered. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the priests brought the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to its place, into the inner sanctuary of the house, into the Holy of Holies, under the wings of the cherubim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the cherubim spread their two wings over the place of the ark, and the cherubim covered the ark and its [carrying] poles from above. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The poles were so long that the ends of the poles were visible from the Holy Place that was in front of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: inner sanctuary
      - type: text
        text: ' and so throughout the passage.'
    marker-yv: yv-n
  - type: text
    text: 'Holy of Holies, but they were not visible from the outside; they are there to this day (the date of this writing). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There was nothing in the ark except the two tablets of stone which Moses put there at Horeb (Sinai), where the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' made a covenant with the Israelites when they came out of the land of Egypt. [Deut 10:2-5] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now it happened that when the priests had come out of the Holy Place, the cloud filled the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'so the priests could not stand [in their positions] to minister because of the cloud, for the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had filled the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house (temple).'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Solomon Addresses the People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Solomon said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said that He would dwell in the thick darkness [of the cloud].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “I have certainly built You a lofty house,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A place for You to dwell in forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the king turned around and blessed all the assembly of Israel, while all the assembly of Israel was standing. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He said, “Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, who spoke with His mouth to my father David and has fulfilled it with His hand, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '‘Since the day that I brought My people Israel out of Egypt, I did not choose a [particular] city out of all the tribes of Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in which
  - type: text
    text: ' to build a house so that My Name (Presence) would be in it, but I chose David to be over My people Israel.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now it was [determined] in the heart of my father David to build a house (temple) for the Name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to my father David, ‘Because it was in your heart to build a house for My Name, you did well, in that it was in your heart. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nevertheless, you shall not build the house, but your son, who shall be born to you, it is he who shall build it for My Name [and My Presence].’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has fulfilled His word which He spoke; I have risen in the place of my father David and have taken my seat on the throne of Israel, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' promised, and have built the house (temple) for the Name of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: There I have made a place [in the Holy of Holies] for the ark, in which is the covenant (solemn agreement) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which He made with our fathers when He brought them out of the land of Egypt.” [Ex 34:28]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Prayer of Dedication
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then Solomon stood [in the courtyard] before the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the presence of all the assembly of Israel and spread out his hands toward heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He said, “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, there is no God like You in heaven above or on earth below, who keeps the covenant and shows lovingkindness to Your servants who walk before You with all their heart; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You who have kept what You '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: spoke
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'promised to Your servant my father David. You have spoken with Your mouth and have fulfilled Your word with Your hand, as it is this day. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Now therefore, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, keep for Your servant my father David that which You promised him when You said, ‘You shall not be without a man (descendant) to sit on the throne of Israel, if only your sons take heed to their way [of life] to walk before Me [according to my laws] as you have done.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Now, O God of Israel, please let Your word which You have spoken to Your servant David my father be confirmed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But will God indeed dwell on the earth? Behold, heaven and the highest heaven cannot contain You; how much less this house which I have built! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Yet graciously consider the prayer of Your servant and his supplication, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, to listen to the [loud] cry and to the prayer which Your servant prays before You today; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'that Your eyes may be open toward this house night and day, toward the place of which You have said, ‘My Name (Presence) shall be there,’ that You may listen to the prayer which Your servant shall pray toward this place. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Listen to the prayer of Your servant and of Your people Israel which they pray toward this place. Hear in heaven, Your dwelling place; hear and forgive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“If a man sins against his neighbor and is made to take an oath [of innocence] and he comes to take the oath before Your altar in this house (temple), '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: then hear from heaven and act and judge Your servants, condemning the wicked by bringing his guilt on his own head, and justifying the righteous by rewarding him in accordance with his righteousness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“When Your people Israel are defeated before an enemy because they have sinned against You, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: then
  - type: text
    text: ' they turn to You again and praise Your Name and pray and ask for Your favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' compassion in this house (temple), '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: then hear in heaven, and forgive the sin of Your people Israel, and bring them back to the land which You gave their fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“When the heavens are shut up and there is no rain because they have sinned against You, and they pray toward this place and praise Your name and turn from their sin when You afflict them, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: then hear in heaven and forgive the sin of Your servants and of Your people Israel; indeed, teach them the good way in which they should walk (live). And send rain on Your land which You have given to Your people as an inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“If there is famine in the land, or if there is pestilence (plague), blight, mildew, migratory locusts, or grasshoppers, if their enemy besieges them in the land of their cities, whatever affliction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' plague, whatever sickness [there is], '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'whatever prayer or pleading is made by any individual, or by Your people Israel, each knowing the affliction of his own heart, and spreading his hands out toward this house; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'then hear in heaven Your dwelling place, and forgive and act and give to each according to his ways, whose heart (mind) You know, for You and You alone know the hearts of all the children of men, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: so that they may fear You [with reverence and awe] all the days that they live in the land which You have given to our fathers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '“Moreover, concerning a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Solomon’s request for the foreigner underscores the fact that Gentiles had access to God before the way of salvation was formally opened to them in the first century '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: ., when Peter preached at Cornelius’ home (Acts 10:44-11:15). But until Christ came, the path of access for Gentiles was only through Israel. Thankfully, when our Lord Jesus died on the cross, the heavy curtain concealing the Holy of Holies was torn open (Matt 27:51), signifying that mankind would forever after have direct access to God, with no need for an earthly temple or priests (cf John 4:21-24).
    marker-yv: yv-n
  - type: text
    text: 'foreigner who is not of Your people Israel, but comes from a far (distant) country for the sake of Your name [to plead with You] '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: '(for they will hear of Your great name, Your strong hand [of power], and outstretched arm); when he comes and prays toward this house (temple), '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'hear in heaven, Your dwelling place, and do according to all for which the foreigner calls upon (prays to) You, so that all peoples of the earth may know Your name and fear You [with reverence and awe], as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: do
  - type: text
    text: ' Your people Israel, and that they may know [without any doubt] that this house which I have built is called by Your name.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: “When Your people go out to battle against their enemy, by whatever way You send them, and they pray to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' toward the city which You have chosen and the house that I have built for Your Name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Presence, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'then hear in heaven their prayer and their pleading, and maintain their right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defend their cause.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '“When they sin against You (for there is no man who does not sin) and You are angry with them and hand them over to the enemy, so that they are carried away captive to the enemy’s land, [whether] far away or near; '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'if they '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: return to
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'take it to heart in the land where they have been taken captive, and they repent and pray to You in the land of their captors, saying, ‘We have sinned and done wrong and we have acted wickedly;’ '
  - type: usfm
    marker: v
