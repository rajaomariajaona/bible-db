  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' right of His servant and of His people Israel as each day requires, '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: so that all the peoples of the earth may know that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is God; there is no one else. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Therefore, your hearts are to be wholly devoted to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God, to walk in His statutes and to keep His commandments, as [you are doing] today.”'
