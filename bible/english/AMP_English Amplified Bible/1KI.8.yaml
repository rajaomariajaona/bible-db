  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', who has given rest to His people Israel, in accordance with everything that He promised. Not one word has failed of all His good promise, which He spoke through Moses His servant. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
