document_id: 1CH.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: People of Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So all Israel was enrolled by genealogies; and they are written in the Book of the Kings of Israel. And Judah was carried away into exile to Babylon because of their unfaithfulness [to God].
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Of the priests: Jedaiah, Jehoiarib, Jachin, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Azariah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the chief officer of the house of God; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and Adaiah the son of Jeroham, the son of Pashhur, the son of Malchijah; Maasai the son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: and their relatives, heads of their fathers’ households, 1,760—very able men for the work of the service of the house of God.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Of the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, of the sons of Merari; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and Bakbakkar, Heresh, Galal, and Mattaniah son of Mica, the son of Zichri, the son of Asaph; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: and Obadiah the son of Shemaiah, the son of Galal, the son of Jeduthun, and Berechiah the son of Asa, the son of Elkanah, who lived in the villages of the Netophathites [near Jerusalem].
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The gatekeepers were: Shallum, Akkub, Talmon, Ahiman, and their relatives (Shallum the chief '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'who until now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was assigned
    - type: text
      text: ' to the king’s gate on the east side) they were the gatekeepers for the camp of the Levites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Shallum the son of Kore, the son of Ebiasaph, the son of Korah, and his relatives of his father’s house, the Korahites, were in charge of the work of the service, doorkeepers of the Tent; and their fathers had been in charge of the camp of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', keepers of the entrance. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now the first [of the returned exiles] who lived [again] in their possessions in their cities were Israel, the priests, the Levites, and the Nethinim (temple servants). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Phinehas the son of Eleazar was ruler over them in times past, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Zechariah son of Meshelemiah was gatekeeper at the entrance of the Tent of Meeting. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'All those chosen to be gatekeepers at the thresholds were 212. They were enrolled by their genealogies in their villages [around Jerusalem], these men [whose grandfathers] David and Samuel the seer had appointed to their official duty. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So they and their sons were in charge of the gates of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', that is, the house of the tabernacle, as guards. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The gatekeepers were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stationed
    - type: text
      text: ' on the four sides—on the east, west, north, and south. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Their relatives in their villages were to come in every seven days from time to time to be with them; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'for these Levites, the four chief gatekeepers, had an official duty, and were in charge of the chambers and treasuries of the house of God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They spent the night around the house of God, for the [night] watch was theirs, and they were in charge of opening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the house
    - type: text
      text: ' morning after morning.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Now some of them were in charge of the serving utensils, being required to count them when they brought them in or took them out. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Some of them also were appointed over the furniture and over all the [sacred] utensils of the sanctuary, as well as over the fine flour and the wine and the [olive] oil and the frankincense and the spices. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Some of the sons (people) of Judah, Benjamin, Ephraim, and Manasseh lived in Jerusalem: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Other sons of the priests prepared the mixture of spices. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mattithiah, one of the Levites, the firstborn of Shallum the Korahite, was responsible for the things baked in pans. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Some of their Kohathite relatives were in charge of the showbread to prepare it every Sabbath.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Now these are the singers, heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of the Levites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: living
    - type: text
      text: ' in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: ' chambers, free '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from other service
    - type: text
      text: ' because they were on duty day and night. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'These were heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of the Levites according to their generations, chief men, who lived in Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ancestry and Descendants of Saul
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jeiel the father of Gibeon lived in Gibeon, and his wife’s name was Maacah, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and his firstborn son was Abdon, then Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Gedor, Ahio, Zechariah, and Mikloth. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Mikloth became the father of Shimeam. They also lived with their relatives in Jerusalem, opposite their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' relatives. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ner became the father of Kish, and Kish became the father of [King] Saul, and Saul became the father of Jonathan, Malchi-shua, Abinadab, and Esh-baal. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Uthai the son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the sons of Perez the son of Judah. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'The son of Jonathan was Merib-baal (Mephibosheth); Merib-baal became the father of Micah. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'The sons of Micah: Pithon, Melech, Tahrea [and Ahaz]. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ahaz became the father of Jarah, and Jarah became the father of Alemeth, Azmaveth, and Zimri; and Zimri became the father of Moza, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Moza became the father of Binea and Rephaiah his son, Eleasah his son, Azel his son. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Azel had six sons, and these are their names: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan. These were the sons of Azel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'From the Shilonites: Asaiah the firstborn and his sons. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'From the sons of Zerah: Jeuel and their relatives, 690 [of them]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'From the sons of Benjamin: Sallu the son of Meshullam, the son of Hodaviah, the son of Hassenuah; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ibneiah the son of Jeroham, Elah the son of Uzzi, the son of Michri, and Meshullam son of Shephatiah, the son of Reuel, the son of Ibnijah; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and their relatives according to their generations, 956. All these men were heads of fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' according to their fathers’ houses.'
