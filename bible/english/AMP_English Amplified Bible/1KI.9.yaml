verses:
  '1':
  - type: heading
    content: God’s Promise and Warning
  - type: text
    content: Now it happened when Solomon had finished building the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the king’s house (palace), and all else which he was pleased to do, '
  '10':
  - type: text
    content: Now at the end of twenty years, in which Solomon had built the two houses, the temple of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the palace of the king '
  '11':
  - type: text
    content: '(Hiram king of Tyre had supplied Solomon with as much cedar and cypress timber [from Lebanon] and gold as he desired), at that time King Solomon gave Hiram '
  - type: note
    content: These cities were either sold to Hiram in exchange for the gold or used as collateral for a loan of the gold (v 14).
  - type: text
    content: 'twenty cities in the land of Galilee (northern Israel). '
  '12':
  - type: text
    content: 'So Hiram came from Tyre to see the cities which Solomon had given him, and they '
  - type: note
    content: Lit were not right in his eyes.
  - type: text
    content: 'did not please him. '
  '13':
  - type: text
    content: 'He said, “What are these cities [good for] which you have given me, my brother?” So they have been called the land of Cabul (like nothing, unproductive) to this day. '
  '14':
  - type: text
    content: And Hiram sent to the king 120 talents of gold.
  '15':
  - type: text
    content: Now this is the account of the forced labor which King Solomon conscripted to build the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', his own house, the '
  - type: note
    content: The exact nature of the Millo is unclear, but most scholars believe it was some sort of military fortification such as a tower, a citadel, a significant part of a wall or even an earth-fill or terraced hillside. It was located on the eastern side of the City of David. It was later repaired by King Hezekiah.
  - type: text
    content: 'Millo (fortification), the wall of Jerusalem, [and the fortress cities of] Hazor, Megiddo, and Gezer. '
  '16':
  - type: text
    content: For
  - type: text
    content: ' Pharaoh king of Egypt had gone up and taken Gezer, burned it with fire and killed the Canaanites who lived in the city, and he had given it as a dowry to his daughter, Solomon’s wife. '
  '17':
  - type: text
    content: 'So Solomon rebuilt [and fortified] Gezer and Lower Beth-horon, '
  '18':
  - type: text
    content: 'Baalath and '
  - type: note
    content: In 2 Chr 8:4 Tadmor.
  - type: text
    content: 'Tamar in the wilderness, in the land '
  - type: text
    content: of Judah,
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'and all the storage cities [for surplus provisions] which Solomon had, and the cities for his chariots and cities for his horsemen, and whatever it pleased Solomon to build '
  - type: note
    content: Because of Solomon’s extensive building program and his extravagant expenditures, he resorted to forced labor and heavy taxation. These oppressive policies, combined with his son’s lack of good judgment contributed to the division of Solomon’s kingdom. Shortly after his death, his son King Rehoboam rebuffed the people’s appeal for relief and declared his intention to add to their burdens (12:11).
  - type: text
    content: 'in Jerusalem, in Lebanon, and in all the land under his rule. '
  '2':
  - type: text
    content: that the L
  - type: heading
    content: ord
  - type: text
    content: ' appeared to Solomon a second time, just as He had appeared to him '
  - type: note
    content: See 3:4-15.
  - type: text
    content: 'at Gibeon. '
  '20':
  - type: text
    content: As for
  - type: text
    content: ' all the people who were left of the Amorites, Hittites, Perizzites, Hivites, and Jebusites, who were not of the sons (descendants) of Israel, '
  '21':
  - type: text
    content: 'their children who were left after them in the land, whom the Israelites were unable to completely destroy, from them Solomon levied (conscripted) forced laborers, even to this day (the date of this writing). '
  '22':
  - type: text
    content: But Solomon did not make slaves of the sons of Israel; for they were men of war (soldiers), his servants, his officers, his captains, his chariot commanders, and his horsemen.
  '23':
  - type: text
    content: These were the chief officers who were over Solomon’s work, five hundred and fifty, who ruled over the people doing the work.
  '24':
  - type: text
    content: As soon as Pharaoh’s daughter came up from the City of David to her house which Solomon had built for her, then he built the Millo (fortification).
  '25':
  - type: text
    content: 'Three times a year [during the '
  - type: note
    content: I.e. the Feasts of Passover, Pentecost, and Booths.
  - type: text
    content: major annual festivals] Solomon offered burnt offerings and peace offerings on the altar he had built to the L
  - type: heading
    content: ord
  - type: text
    content: ', and he burned incense with them before the L'
  - type: heading
    content: ord
  - type: text
    content: . So he finished the house [of the L
  - type: heading
    content: ord
  - type: text
    content: '].'
  '26':
  - type: text
    content: 'King Solomon built a fleet of ships in Ezion-geber, which is near Eloth on the shore of the Red Sea (Sea of Reeds), in the land of Edom. '
  '27':
  - type: text
    content: 'And Hiram [king of Tyre] sent his servants with the fleet, sailors who knew the sea, along with the servants of Solomon. '
  '28':
  - type: text
    content: 'They came to '
  - type: note
    content: The location of this wealthy trading port is a subject of debate among scholars and archeologists. Possible sites considered include Pakistan, India, Zimbabwe, Yemen, and other ports in Arabia and Africa.
  - type: text
    content: Ophir and took four hundred and twenty talents of gold from there, and brought it to King Solomon.
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' told him, “I have heard your prayer and supplication which you have made before Me; I have consecrated this house which you have built by putting My Name '
  - type: text
    content: and
  - type: text
    content: ' My Presence there forever. My eyes and My heart shall be there perpetually. '
  '4':
  - type: text
    content: 'As for you, if you walk (live your life) before Me, as David your father walked, in integrity of heart and in uprightness, acting in accordance with everything that I have commanded you, and will keep My statutes and My precepts, '
  '5':
  - type: text
    content: then I will establish the throne of your kingdom over Israel forever, just as I promised your father David, saying, ‘You shall not be without a man (descendant) on the throne of Israel.’
  '6':
  - type: text
    content: '“But if you or your sons turn away from following Me, and do not keep My commandments and My statutes which I have set before you, but go and serve other gods and worship them, '
  '7':
  - type: text
    content: 'then I will cut off Israel from the land which I have given them, and I will cast out of My sight the house which I have consecrated for My Name '
  - type: text
    content: and
  - type: text
    content: ' Presence. Then Israel will become a proverb (a saying) and a byword (object of ridicule) among all the peoples. '
  '8':
  - type: text
    content: 'This house (temple) will become a heap of ruins; everyone who passes by will be appalled and '
  - type: note
    content: Or hiss.
  - type: text
    content: sneer and say, ‘Why has the L
  - type: heading
    content: ord
  - type: text
    content: ' done such a thing to this land and to this house?’ '
  '9':
  - type: text
    content: And they [who know] will say, ‘Because they abandoned the L
  - type: heading
    content: ord
  - type: text
    content: ' their God, who brought their fathers out of the land of Egypt, and they have chosen other gods and have worshiped and served them; that is the reason the L'
  - type: heading
    content: ord
  - type: text
    content: ' has brought on them all this adversity.’ ”'
  - type: heading
    content: Cities Given to Hiram
