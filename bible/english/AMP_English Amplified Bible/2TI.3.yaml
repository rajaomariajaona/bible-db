document_id: 2TI.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: “Difficult Times Will Come”
  - type: text
    content: 'But understand this, that in the last days dangerous times [of great stress and trouble] will come [difficult days that will be hard to bear]. '
  '10':
  - type: text
    content: 'Now you have diligently followed [my example, that is] my teaching, conduct, purpose, faith, patience, love, steadfastness, '
  '11':
  - type: text
    content: 'persecutions, and sufferings—such as happened to me at Antioch, at Iconium, and at Lystra; what persecutions I endured, but the Lord rescued me from them all! [2 Cor 12:10] '
  '12':
  - type: text
    content: 'Indeed, all who delight in pursuing righteousness '
  - type: text
    content: and
  - type: text
    content: ' are determined to live godly lives in Christ Jesus will be hunted '
  - type: text
    content: and
  - type: text
    content: ' persecuted [because of their faith]. '
  '13':
  - type: text
    content: 'But evil men and impostors will go on from bad to worse, deceiving and being deceived. '
  '14':
  - type: text
    content: 'But as for you, continue in the things that you have learned and of which you are convinced [holding tightly to the truths], knowing from whom you learned '
  - type: text
    content: them,
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'and how from childhood you have known the sacred writings (Hebrew Scriptures) which are able to give you the wisdom that leads to salvation through faith which is in Christ Jesus [surrendering your entire self to Him and having absolute confidence in His wisdom, power and goodness]. '
  '16':
  - type: text
    content: 'All Scripture is God-breathed [given by divine inspiration] and is profitable for instruction, for conviction [of sin], for correction [of error and restoration to obedience], for training in righteousness [learning to live in conformity to God’s will, both publicly and privately—behaving honorably with personal integrity and moral courage]; '
  '17':
  - type: text
    content: 'so that the '
  - type: note
    content: I.e. all believers whether man, woman, or child.
  - type: text
    content: 'man of God may be complete '
  - type: text
    content: and
  - type: text
    content: ' proficient, outfitted '
  - type: text
    content: and
  - type: text
    content: ' thoroughly equipped for every good work.'
  '2':
  - type: text
    content: 'For people will be lovers of self [narcissistic, self-focused], lovers of money [impelled by greed], boastful, arrogant, revilers, disobedient to parents, ungrateful, unholy '
  - type: text
    content: and
  - type: text
    content: ' profane, '
  '3':
  - type: text
    content: '[and they will be] unloving [devoid of natural human affection, calloused and inhumane], irreconcilable, malicious gossips, devoid of self-control [intemperate, immoral], brutal, haters of good, '
  '4':
  - type: text
    content: 'traitors, reckless, conceited, lovers of [sensual] pleasure rather than lovers of God, '
  '5':
  - type: text
    content: 'holding to a form of [outward] godliness (religion), although they have denied its power [for their conduct nullifies their claim of faith]. Avoid such people '
  - type: text
    content: and
  - type: text
    content: ' keep far away from them. '
  '6':
  - type: text
    content: 'For among them are those who worm their way into homes and captivate '
  - type: text
    content: morally
  - type: text
    content: ' weak '
  - type: text
    content: and
  - type: text
    content: ' spiritually-dwarfed women weighed down by [the burden of their] sins, easily swayed by various impulses, '
  '7':
  - type: text
    content: 'always learning '
  - type: text
    content: and
  - type: text
    content: ' listening to anybody who will teach them, but never able to come to the knowledge of the truth. '
  '8':
  - type: text
    content: 'Just as Jannes and Jambres [the court magicians of Egypt] opposed Moses, so these '
  - type: text
    content: men
  - type: text
    content: ' also oppose the truth, men of depraved mind, unqualified '
  - type: text
    content: and
  - type: text
    content: ' worthless [as teachers] in regard to the faith. [Ex 7:11] '
  '9':
  - type: text
    content: 'But they will not get very far, for their meaningless nonsense '
  - type: text
    content: and
  - type: text
    content: ' ignorance will become obvious to everyone, as was that of Jannes and Jambres.'
