document_id: 2TI.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: “Difficult Times Will Come”
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But understand this, that in the last days dangerous times [of great stress and trouble] will come [difficult days that will be hard to bear]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For people will be lovers of self [narcissistic, self-focused], lovers of money [impelled by greed], boastful, arrogant, revilers, disobedient to parents, ungrateful, unholy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profane, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '[and they will be] unloving [devoid of natural human affection, calloused and inhumane], irreconcilable, malicious gossips, devoid of self-control [intemperate, immoral], brutal, haters of good, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'traitors, reckless, conceited, lovers of [sensual] pleasure rather than lovers of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'holding to a form of [outward] godliness (religion), although they have denied its power [for their conduct nullifies their claim of faith]. Avoid such people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep far away from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For among them are those who worm their way into homes and captivate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: morally
  - type: text
    text: ' weak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spiritually-dwarfed women weighed down by [the burden of their] sins, easily swayed by various impulses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'always learning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' listening to anybody who will teach them, but never able to come to the knowledge of the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Just as Jannes and Jambres [the court magicians of Egypt] opposed Moses, so these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' also oppose the truth, men of depraved mind, unqualified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worthless [as teachers] in regard to the faith. [Ex 7:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But they will not get very far, for their meaningless nonsense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ignorance will become obvious to everyone, as was that of Jannes and Jambres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now you have diligently followed [my example, that is] my teaching, conduct, purpose, faith, patience, love, steadfastness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'persecutions, and sufferings—such as happened to me at Antioch, at Iconium, and at Lystra; what persecutions I endured, but the Lord rescued me from them all! [2 Cor 12:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Indeed, all who delight in pursuing righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' are determined to live godly lives in Christ Jesus will be hunted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' persecuted [because of their faith]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But evil men and impostors will go on from bad to worse, deceiving and being deceived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But as for you, continue in the things that you have learned and of which you are convinced [holding tightly to the truths], knowing from whom you learned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and how from childhood you have known the sacred writings (Hebrew Scriptures) which are able to give you the wisdom that leads to salvation through faith which is in Christ Jesus [surrendering your entire self to Him and having absolute confidence in His wisdom, power and goodness]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All Scripture is God-breathed [given by divine inspiration] and is profitable for instruction, for conviction [of sin], for correction [of error and restoration to obedience], for training in righteousness [learning to live in conformity to God’s will, both publicly and privately—behaving honorably with personal integrity and moral courage]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'so that the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. all believers whether man, woman, or child.
    marker-yv: yv-n
  - type: text
    text: 'man of God may be complete '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proficient, outfitted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thoroughly equipped for every good work.'
