document_id: REV.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Scroll with Seven Seals
  - type: text
    content: 'I saw in the right hand of Him who was seated on the throne a scroll written on the inside and on the back, closed '
  - type: text
    content: and
  - type: text
    content: ' sealed with seven seals. [Is 29:11; Ezek 2:9, 10; Dan 12:4] '
  '10':
  - type: text
    content: “You have made them to be a kingdom [of royal subjects] and priests to our God; and they will reign on the earth.” [Ex 19:6; Is 61:6; Rev 20:6]
  - type: heading
    content: Angels Exalt the Lamb
  '11':
  - type: text
    content: 'Then I looked, and I heard the voice of many angels around the throne and [the voice] of the living creatures and the elders; and they numbered myriads of myriads, and thousands of thousands (innumerable), [Dan 7:10] '
  '12':
  - type: text
    content: saying in a loud voice,
  - type: text
    content: '“Worthy '
  - type: text
    content: and
  - type: text
    content: ' deserving is the Lamb that was sacrificed to receive power and riches and wisdom and might and honor and glory and blessing.”'
  '13':
  - type: text
    content: And I heard every created thing that is in heaven or on earth or under the earth [in Hades, the realm of the dead] or on the sea, and everything that is in them, saying [together],
  - type: text
    content: “To Him who sits on the throne, and to the Lamb (Christ), be blessing and honor and glory and dominion forever and ever.” [Dan 7:13, 14]
  '14':
  - type: text
    content: And the four living creatures kept saying, “Amen.” And the elders fell down and worshiped [Him who lives forever and ever].
  '2':
  - type: text
    content: 'And I saw a strong angel announcing with a loud voice, “Who is worthy [having the authority and virtue] to open the scroll and to '
  - type: note
    content: When the seals are broken, the consummation of history, focused in the judgments, is unveiled.
  - type: text
    content: 'break its seals?” '
  '3':
  - type: text
    content: 'And no one in heaven or on earth or under the earth [in Hades, the realm of the dead] was able to open the scroll or look into it. '
  '4':
  - type: text
    content: 'And I '
  - type: text
    content: began
  - type: text
    content: ' to weep greatly because no one was found worthy to open the scroll or look into it. '
  '5':
  - type: text
    content: 'Then one of the [twenty-four] elders said to me, “Stop weeping! Look closely, the Lion of the tribe of Judah, the Root of David, has overcome '
  - type: text
    content: and
  - type: text
    content: ' conquered! He can open the scroll and [break] its seven seals.” [Gen 49:9, 10; Is 11:1, 10; Rev 22:16]'
  '6':
  - type: text
    content: 'And there '
  - type: note
    content: The Lamb is Jesus Christ, who stands “between,” in other words both as one with God upon the throne and as one with humanity around the throne.
  - type: text
    content: 'between the throne (with the four living creatures) and among the elders I saw a Lamb (Christ) standing, [bearing scars and wounds] as though it had been slain, with seven horns (complete power) and with seven eyes (complete knowledge), which are '
  - type: note
    content: See note 1:4.
  - type: text
    content: 'the seven Spirits of God who have been sent [on duty] into all the earth. [Is 53:7; Zech 3:8, 9; 4:10] '
  '7':
  - type: text
    content: 'And He came and '
  - type: note
    content: Lit has taken. This is the Greek perfect tense, which John sometimes uses to emphasize the lasting significance of an action or event.
  - type: text
    content: 'took the scroll from the right hand of Him who sat on the throne. '
  '8':
  - type: text
    content: 'And when He had taken the scroll, the four living creatures and the twenty-four elders fell down before the Lamb (Christ), each one holding a harp and golden bowls full of fragrant incense, which are the prayers of the saints (God’s people). '
  '9':
  - type: text
    content: And they sang a new song [of glorious redemption], saying,
  - type: text
    content: '“Worthy '
  - type: text
    content: and
  - type: text
    content: ' deserving are You to take the scroll and to break its seals; for You were slain (sacrificed), and with Your blood You purchased '
  - type: text
    content: people
  - type: text
    content: ' for God from every tribe and language and people and nation. [Ps 33:3]'
