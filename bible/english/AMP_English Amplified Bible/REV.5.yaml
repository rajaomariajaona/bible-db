document_id: REV.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Scroll with Seven Seals
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I saw in the right hand of Him who was seated on the throne a scroll written on the inside and on the back, closed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sealed with seven seals. [Is 29:11; Ezek 2:9, 10; Dan 12:4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I saw a strong angel announcing with a loud voice, “Who is worthy [having the authority and virtue] to open the scroll and to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When the seals are broken, the consummation of history, focused in the judgments, is unveiled.
    marker-yv: yv-n
  - type: text
    text: 'break its seals?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And no one in heaven or on earth or under the earth [in Hades, the realm of the dead] was able to open the scroll or look into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to weep greatly because no one was found worthy to open the scroll or look into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then one of the [twenty-four] elders said to me, “Stop weeping! Look closely, the Lion of the tribe of Judah, the Root of David, has overcome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' conquered! He can open the scroll and [break] its seven seals.” [Gen 49:9, 10; Is 11:1, 10; Rev 22:16]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And there '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Lamb is Jesus Christ, who stands “between,” in other words both as one with God upon the throne and as one with humanity around the throne.
    marker-yv: yv-n
  - type: text
    text: 'between the throne (with the four living creatures) and among the elders I saw a Lamb (Christ) standing, [bearing scars and wounds] as though it had been slain, with seven horns (complete power) and with seven eyes (complete knowledge), which are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 1:4.
    marker-yv: yv-n
  - type: text
    text: 'the seven Spirits of God who have been sent [on duty] into all the earth. [Is 53:7; Zech 3:8, 9; 4:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And He came and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: has taken
      - type: text
        text: . This is the Greek perfect tense, which John sometimes uses to emphasize the lasting significance of an action or event.
    marker-yv: yv-n
  - type: text
    text: 'took the scroll from the right hand of Him who sat on the throne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when He had taken the scroll, the four living creatures and the twenty-four elders fell down before the Lamb (Christ), each one holding a harp and golden bowls full of fragrant incense, which are the prayers of the saints (God’s people). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And they sang a new song [of glorious redemption], saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Worthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserving are You to take the scroll and to break its seals; for You were slain (sacrificed), and with Your blood You purchased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people
  - type: text
    text: ' for God from every tribe and language and people and nation. [Ps 33:3]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “You have made them to be a kingdom [of royal subjects] and priests to our God; and they will reign on the earth.” [Ex 19:6; Is 61:6; Rev 20:6]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Angels Exalt the Lamb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I looked, and I heard the voice of many angels around the throne and [the voice] of the living creatures and the elders; and they numbered myriads of myriads, and thousands of thousands (innumerable), [Dan 7:10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: saying in a loud voice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Worthy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deserving is the Lamb that was sacrificed to receive power and riches and wisdom and might and honor and glory and blessing.”'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And I heard every created thing that is in heaven or on earth or under the earth [in Hades, the realm of the dead] or on the sea, and everything that is in them, saying [together],
- type: usfm
  marker: q1
  children:
  - type: text
    text: “To Him who sits on the throne, and to the Lamb (Christ), be blessing and honor and glory and dominion forever and ever.” [Dan 7:13, 14]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And the four living creatures kept saying, “Amen.” And the elders fell down and worshiped [Him who lives forever and ever].
