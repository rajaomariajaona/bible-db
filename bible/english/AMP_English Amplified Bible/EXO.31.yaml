document_id: EXO.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Skilled Craftsmen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“See, I have called by name Bezalel, son of Uri, the son of Hur, of the tribe of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I have filled him with the Spirit of God in wisdom '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skill, in understanding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intelligence, in knowledge, and in all kinds of craftsmanship, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'to make artistic designs for work in gold, in silver, and in bronze, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and in the cutting of stones for settings, and in the carving of wood, to work in all kinds of craftsmanship. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And behold, I Myself have appointed with him Oholiab, son of Ahisamach, of the tribe of Dan; to all who are wise-hearted I have given the skill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ability to make everything that I have commanded you: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'the Tent of Meeting, the ark of the Testimony, the mercy seat that is upon it, all the furnishings of the tent— '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the table [for the bread] and its utensils, the pure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gold
  - type: text
    text: ' lampstand with all its utensils, the [golden] altar of incense, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'the [bronze] altar of burnt offering with all its utensils, the basin and its base— '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'the finely worked garments, the holy garments for Aaron the [high] priest and the garments for his sons to minister as priests, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and the anointing oil and the sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fragrant incense for the Holy Place. They are to make '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' according to all that I have commanded you.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sign of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“But as for you, say to the Israelites, ‘You shall most certainly observe My Sabbaths, for it is a sign between Me and you throughout your generations, so that you may know [without any doubt] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who sanctifies you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sets you apart [for Myself]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore, you shall keep the Sabbath, for it is holy to you. Everyone who profanes it must be put to death; for whoever does work on the Sabbath, that person (soul) shall be cut off from among his people [excluding him from the atonement made for them]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For six days work may be done, but the seventh is the Sabbath of complete rest, sacred to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; whoever does work on the Sabbath day must be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So the Israelites shall observe the Sabbath, to celebrate the Sabbath throughout their generations as a perpetual covenant.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It is a sign between Me and the Israelites forever; for in six days the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' made the heavens and the earth, and on the seventh day He ceased and was refreshed.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When He had finished speaking with him on Mount Sinai, He gave Moses the two tablets of the Testimony, tablets of stone, written with the finger of God.
