document_id: EXO.31,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Skilled Craftsmen
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'the finely worked garments, the holy garments for Aaron the [high] priest and the garments for his sons to minister as priests, '
  '11':
  - type: text
    content: 'and the anointing oil and the sweet '
  - type: text
    content: and
  - type: text
    content: ' fragrant incense for the Holy Place. They are to make '
  - type: text
    content: them
  - type: text
    content: ' according to all that I have commanded you.”'
  - type: heading
    content: The Sign of the Sabbath
  '12':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '13':
  - type: text
    content: '“But as for you, say to the Israelites, ‘You shall most certainly observe My Sabbaths, for it is a sign between Me and you throughout your generations, so that you may know [without any doubt] '
  - type: text
    content: and
  - type: text
    content: ' acknowledge that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' who sanctifies you '
  - type: text
    content: and
  - type: text
    content: ' sets you apart [for Myself]. '
  '14':
  - type: text
    content: 'Therefore, you shall keep the Sabbath, for it is holy to you. Everyone who profanes it must be put to death; for whoever does work on the Sabbath, that person (soul) shall be cut off from among his people [excluding him from the atonement made for them]. '
  '15':
  - type: text
    content: For six days work may be done, but the seventh is the Sabbath of complete rest, sacred to the L
  - type: heading
    content: ord
  - type: text
    content: '; whoever does work on the Sabbath day must be put to death. '
  '16':
  - type: text
    content: 'So the Israelites shall observe the Sabbath, to celebrate the Sabbath throughout their generations as a perpetual covenant.’ '
  '17':
  - type: text
    content: It is a sign between Me and the Israelites forever; for in six days the L
  - type: heading
    content: ord
  - type: text
    content: ' made the heavens and the earth, and on the seventh day He ceased and was refreshed.”'
  '18':
  - type: text
    content: When He had finished speaking with him on Mount Sinai, He gave Moses the two tablets of the Testimony, tablets of stone, written with the finger of God.
  '2':
  - type: text
    content: '“See, I have called by name Bezalel, son of Uri, the son of Hur, of the tribe of Judah. '
  '3':
  - type: text
    content: 'I have filled him with the Spirit of God in wisdom '
  - type: text
    content: and
  - type: text
    content: ' skill, in understanding '
  - type: text
    content: and
  - type: text
    content: ' intelligence, in knowledge, and in all kinds of craftsmanship, '
  '4':
  - type: text
    content: 'to make artistic designs for work in gold, in silver, and in bronze, '
  '5':
  - type: text
    content: 'and in the cutting of stones for settings, and in the carving of wood, to work in all kinds of craftsmanship. '
  '6':
  - type: text
    content: 'And behold, I Myself have appointed with him Oholiab, son of Ahisamach, of the tribe of Dan; to all who are wise-hearted I have given the skill '
  - type: text
    content: and
  - type: text
    content: ' ability to make everything that I have commanded you: '
  '7':
  - type: text
    content: 'the Tent of Meeting, the ark of the Testimony, the mercy seat that is upon it, all the furnishings of the tent— '
  '8':
  - type: text
    content: 'the table [for the bread] and its utensils, the pure '
  - type: text
    content: gold
  - type: text
    content: ' lampstand with all its utensils, the [golden] altar of incense, '
  '9':
  - type: text
    content: 'the [bronze] altar of burnt offering with all its utensils, the basin and its base— '
