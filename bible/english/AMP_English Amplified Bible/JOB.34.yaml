document_id: JOB.34,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu Vindicates God’s Justice
  - type: text
    content: 'Elihu continued '
  - type: text
    content: his discourse
  - type: text
    content: ' and said,'
  '10':
  - type: text
    content: ¶“Therefore hear me, you men of understanding.
  - type: text
    content: Far be it from God that He would do wickedness,
  - type: text
    content: And from the Almighty to do wrong.
  '11':
  - type: text
    content: “For God pays a man according to his work,
  - type: text
    content: 'And He will make every man find [appropriate] '
  - type: text
    content: compensation
  - type: text
    content: ' according to his way.'
  '12':
  - type: text
    content: “Surely God will not act wickedly,
  - type: text
    content: Nor will the Almighty pervert justice.
  '13':
  - type: text
    content: “Who put God in charge over the earth?
  - type: text
    content: 'And who has laid '
  - type: text
    content: on Him
  - type: text
    content: ' the whole world?'
  '14':
  - type: text
    content: “If God should determine to do so,
  - type: text
    content: If He should gather to Himself [that is, withdraw from man] His [life-giving] spirit and His breath,
  '15':
  - type: text
    content: All flesh would perish together,
  - type: text
    content: And man would return to dust. [Ps 104:29; Eccl 12:7]
  '16':
  - type: text
    content: '¶“If '
  - type: text
    content: you now have
  - type: text
    content: ' understanding, hear this;'
  - type: text
    content: Listen to the sound of my words.
  '17':
  - type: text
    content: “Shall one who hates justice [and is an enemy of right] govern?
  - type: text
    content: 'And will you condemn Him who is just '
  - type: text
    content: and
  - type: text
    content: ' mighty?'
  '18':
  - type: text
    content: '“God who says to a king, ‘You are worthless '
  - type: text
    content: and
  - type: text
    content: ' vile,’'
  - type: text
    content: 'Or to princes '
  - type: text
    content: and
  - type: text
    content: ' nobles, ‘You are wicked '
  - type: text
    content: and
  - type: text
    content: ' evil’?'
  '19':
  - type: text
    content: “Who is not partial to princes,
  - type: text
    content: Nor does He regard the rich above the poor,
  - type: text
    content: For they all are the work of His hands.
  '2':
  - type: text
    content: “Hear my words, you wise men,
  - type: text
    content: And listen to me, you who have [so much] knowledge.
  '20':
  - type: text
    content: “In a moment they die, even at midnight
  - type: text
    content: The people are shaken and pass away,
  - type: text
    content: And the powerful are taken away without a [human] hand.
  '21':
  - type: text
    content: ¶“For God’s eyes are on the ways of a man,
  - type: text
    content: And He sees all his steps. [Ps 34:15; Prov 5:21; Jer 16:17]
  '22':
  - type: text
    content: “There is no darkness nor deep shadow
  - type: text
    content: Where the evildoers may hide themselves.
  '23':
  - type: text
    content: “For He sets no appointed time for a man,
  - type: text
    content: That he should appear before Him in judgment.
  '24':
  - type: text
    content: “He breaks mighty men without inquiry,
  - type: text
    content: And sets others in their place. [Dan 2:21]
  '25':
  - type: text
    content: “Therefore He knows of their works,
  - type: text
    content: And He overthrows them in the night,
  - type: text
    content: 'So that they are crushed '
  - type: text
    content: and
  - type: text
    content: ' destroyed.'
  '26':
  - type: text
    content: “He strikes them like the wicked
  - type: text
    content: In a public place,
  '27':
  - type: text
    content: Because they turned aside from following Him
  - type: text
    content: 'And would not consider '
  - type: text
    content: or
  - type: text
    content: ' show regard for any of His ways, [1 Sam 15:11]'
  '28':
  - type: text
    content: So that they caused the cry of the poor to come to Him,
  - type: text
    content: And He heard the cry of the afflicted. [Ex 22:23; James 5:4]
  '29':
  - type: text
    content: “When He keeps quiet, who then can condemn?
  - type: text
    content: When He hides His face [withdrawing His favor and help], who then can behold Him [and make supplication to Him],
  - type: text
    content: Whether it be a nation or a man by himself?—
  '3':
  - type: text
    content: “For the ear puts words to the test
  - type: text
    content: As the palate tastes food.
  '30':
  - type: text
    content: “So that godless men would not rule
  - type: text
    content: Nor be snares for the people.
  '31':
  - type: text
    content: ¶“For has anyone said to God,
  - type: text
    content: '‘I have endured '
  - type: text
    content: my chastisement;
  - type: text
    content: 'I will not offend '
  - type: text
    content: anymore;
  '32':
  - type: text
    content: Teach me what I do not see [in regard to how I have sinned];
  - type: text
    content: If I have done wrong (injustice, unrighteousness),
  - type: text
    content: I will not do it again’?
  '33':
  - type: text
    content: “Shall God’s retribution [for your sins] be on your terms, because you refuse to accept it?
  - type: text
    content: For you must do the choosing, and not I;
  - type: text
    content: Therefore say what you [truthfully] know.
  '34':
  - type: text
    content: “Men of understanding will tell me,
  - type: text
    content: Indeed, every wise man who hears me [will agree],
  '35':
  - type: text
    content: ‘Job speaks without knowledge,
  - type: text
    content: 'And his words are without wisdom '
  - type: text
    content: and
  - type: text
    content: ' insight.'
  '36':
  - type: text
    content: '‘Job ought to be tried '
  - type: note
    content: Or to the end.
  - type: text
    content: to the limit
  - type: text
    content: Because he answers like wicked men!
  '37':
  - type: text
    content: ‘For he adds rebellion [in his unsubmissive, defiant attitude toward God] to his [unacknowledged] sin;
  - type: text
    content: He claps his hands among us [in open mockery and contempt of God],
  - type: text
    content: And he multiplies his words [of accusation] against God.’ ”
  '4':
  - type: text
    content: “Let us choose for ourselves that which is right;
  - type: text
    content: Let us know among ourselves what is good.
  '5':
  - type: text
    content: “For Job has said, ‘I am righteous [and innocent],
  - type: text
    content: But God has taken away my right; [Job 33:9]
  '6':
  - type: text
    content: Although I am right, I am accounted a liar.
  - type: text
    content: 'My wound is incurable, '
  - type: text
    content: though I am
  - type: text
    content: ' without transgression.’'
  '7':
  - type: text
    content: “What man is like Job,
  - type: text
    content: Who drinks up derision like water,
  '8':
  - type: text
    content: Who goes in company with those who do evil
  - type: text
    content: And walks with wicked men?
  '9':
  - type: text
    content: “For he has said, ‘It profits a man nothing
  - type: text
    content: 'When he takes delight '
  - type: text
    content: and
  - type: text
    content: ' is pleased with God '
  - type: text
    content: and
  - type: text
    content: ' obeys Him.’'
