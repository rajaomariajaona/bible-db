document_id: JOB.34,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Elihu Vindicates God’s Justice
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elihu continued '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his discourse
    - type: text
      text: ' and said,'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Therefore hear me, you men of understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Far be it from God that He would do wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from the Almighty to do wrong.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For God pays a man according to his work,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He will make every man find [appropriate] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: compensation
    - type: text
      text: ' according to his way.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Surely God will not act wickedly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will the Almighty pervert justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who put God in charge over the earth?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And who has laid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on Him
    - type: text
      text: ' the whole world?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If God should determine to do so,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If He should gather to Himself [that is, withdraw from man] His [life-giving] spirit and His breath,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All flesh would perish together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And man would return to dust. [Ps 104:29; Eccl 12:7]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you now have
    - type: text
      text: ' understanding, hear this;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the sound of my words.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shall one who hates justice [and is an enemy of right] govern?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And will you condemn Him who is just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mighty?'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“God who says to a king, ‘You are worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vile,’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or to princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nobles, ‘You are wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil’?'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who is not partial to princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor does He regard the rich above the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they all are the work of His hands.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear my words, you wise men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And listen to me, you who have [so much] knowledge.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In a moment they die, even at midnight
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people are shaken and pass away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the powerful are taken away without a [human] hand.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“For God’s eyes are on the ways of a man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He sees all his steps. [Ps 34:15; Prov 5:21; Jer 16:17]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There is no darkness nor deep shadow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where the evildoers may hide themselves.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For He sets no appointed time for a man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That he should appear before Him in judgment.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He breaks mighty men without inquiry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sets others in their place. [Dan 2:21]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore He knows of their works,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He overthrows them in the night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that they are crushed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He strikes them like the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a public place,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they turned aside from following Him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And would not consider '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' show regard for any of His ways, [1 Sam 15:11]'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that they caused the cry of the poor to come to Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He heard the cry of the afflicted. [Ex 22:23; James 5:4]
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When He keeps quiet, who then can condemn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When He hides His face [withdrawing His favor and help], who then can behold Him [and make supplication to Him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whether it be a nation or a man by himself?—
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For the ear puts words to the test
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the palate tastes food.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So that godless men would not rule
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor be snares for the people.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“For has anyone said to God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘I have endured '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my chastisement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will not offend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anymore;
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach me what I do not see [in regard to how I have sinned];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I have done wrong (injustice, unrighteousness),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not do it again’?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shall God’s retribution [for your sins] be on your terms, because you refuse to accept it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you must do the choosing, and not I;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore say what you [truthfully] know.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Men of understanding will tell me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, every wise man who hears me [will agree],
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Job speaks without knowledge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And his words are without wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insight.'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Job ought to be tried '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to the end
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: to the limit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he answers like wicked men!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘For he adds rebellion [in his unsubmissive, defiant attitude toward God] to his [unacknowledged] sin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He claps his hands among us [in open mockery and contempt of God],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he multiplies his words [of accusation] against God.’ ”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let us choose for ourselves that which is right;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us know among ourselves what is good.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For Job has said, ‘I am righteous [and innocent],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God has taken away my right; [Job 33:9]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although I am right, I am accounted a liar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My wound is incurable, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though I am
    - type: text
      text: ' without transgression.’'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What man is like Job,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who drinks up derision like water,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who goes in company with those who do evil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And walks with wicked men?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For he has said, ‘It profits a man nothing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When he takes delight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is pleased with God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obeys Him.’'
