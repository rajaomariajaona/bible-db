document_id: JHN.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Adulterous Woman
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But Jesus went to the Mount of Olives. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Straightening up, Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman, where are they? Did no one condemn you?”
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'She answered, “No one, Lord!” And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I do not condemn you either. Go. From now on sin no more.”
    - type: text
      text: ']'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Is the Light of the World
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Once more Jesus addressed the crowd. He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The second of the memorable “I am” statements. See note 6:35.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the Light of the world. He who follows Me will not walk in the darkness, but will have the Light of life.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then the Pharisees told Him, “You are testifying on Your own behalf; Your testimony is not valid.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Even if I do testify on My own behalf, My testimony is valid, because I know where I came from and where I am going; but you do not know where I come from or where I am going.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You judge according to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: human standards
    - type: text
      text: ' [just by what you see]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I do not judge anyone.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But even if I do judge, My judgment is true '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' My decision is right; for I am not alone'
    - type: text
      text: ' [in making it], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but I and the Father who sent Me
    - type: text
      text: ' [make the same judgment]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even in your own law it is written that the testimony of two persons is true
    - type: text
      text: ' [valid and admissible]. [Deut 19:15] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am One
    - type: text
      text: ' [of the Two] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who testifies about Myself, and My Father who sent Me testifies about Me.”
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the Pharisees said to Him, “Where is this Father of Yours?” Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You know neither Me nor My Father; if you knew Me, you would know My Father also.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Early in the morning He came back into the temple [court], and all the people were coming to Him. He sat down and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' teaching them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Jesus said these things in the treasury, as He taught in the temple [courtyard]; and no one seized Him, because His time had not yet come.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then He said again to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am going away, and you will look for Me, and you will die
    - type: text
      text: ' [unforgiven and condemned] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in your sin. Where I am going, you cannot come.”
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So the Jews were asking [among themselves], “Will He kill Himself? Is that why He says, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Where I am going, you cannot come’?”
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are from below, I am from above; you are of this world, I am not of this world.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: That is why I told you that you will die
    - type: text
      text: ' [unforgiven and condemned] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'in your sins; for if you do not believe that I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the One
    - type: text
      text: ' [I claim to be], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you will die in your sins.”
    - type: text
      text: ' [Ex 3:14; Matt 24:5; Mark 13:6; Luke 21:8] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So they said to Him, “Who are You [anyway]?” Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What have I been saying to you from the beginning?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have many things to say and judge concerning you, but He who sent Me is true; and I say to the world
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the things that I have heard from Him.”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They did not realize [or have the spiritual insight to understand] that He was speaking to them about the Father. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you lift up the Son of Man
    - type: text
      text: ' [on the cross], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you will know then
    - type: text
      text: ' [without any doubt] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'that I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He,
      - type: text
        text: ' and that I do nothing on My own authority, but I say these things just as My Father taught Me.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And He who sent Me is
    - type: text
      text: ' [always] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: with Me; He has not left Me alone, because I always do what pleases Him.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now the scribes and Pharisees brought a woman who had been caught in adultery. They made her stand in the center '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the court,
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'As He said these things, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The response of the people in some of the following verses casts doubt on the validity of their belief.
      marker-yv: yv-n
    - type: text
      text: many believed in Him.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Truth Will Make You Free
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'So Jesus was saying to the Jews who had believed Him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you abide in My word
    - type: text
      text: ' [continually obeying My teachings and living in accordance with them, then] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you are truly My disciples.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you will know the truth
    - type: text
      text: ' [regarding salvation], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the truth will set you free
    - type: text
      text: ' [from the penalty of sin].” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'They answered Him, “We are Abraham’s descendants and have never been enslaved to anyone. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jews did not grasp the difference between being enslaved physically and being enslaved spiritually because of sin.
      marker-yv: yv-n
    - type: text
      text: 'What do You mean by saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘You will be set free’?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, everyone who practices sin '
      - type: usfm
        marker: it
        children:
        - type: text
          text: habitually
      - type: text
        text: ' is a slave of sin.'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now the slave does not remain in a household forever; the son
    - type: text
      text: ' [of the master] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: does remain forever.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So if the Son makes you free, then you are unquestionably free.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know that you are Abraham’s descendants; yet you plan to kill Me, because My word has no place
    - type: text
      text: ' [to grow] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in you
    - type: text
      text: ' [and it makes no change in your heart]. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell the things that I have seen at My Father’s side
    - type: text
      text: ' [in His very presence]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so you also do the things that you heard from your father.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'They answered, “Abraham is our father.” Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you are
    - type: text
      text: ' [truly] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Abraham’s children, then do the works of Abraham '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' follow his example.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'and they said to Him, “Teacher, this woman has been caught in the very act of adultery. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But as it is, you want to kill Me, a Man who has told you the truth, which I heard from God. This is not the way Abraham acted.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are doing the works of your
    - type: text
      text: ' [own] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: father.”
    - type: text
      text: ' They said to Him, “We are not illegitimate children; we have one [spiritual] Father: God.” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If God were your Father
    - type: text
      text: ' [but He is not], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'you would love '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' recognize Me, for I came from God'
    - type: text
      text: ' [out of His very presence] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and have arrived '
      - type: usfm
        marker: it
        children:
        - type: text
          text: here
      - type: text
        text: . For I have not even come on My own initiative
    - type: text
      text: ' [as self-appointed], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but He
    - type: text
      text: ' [is the One who] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sent Me.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why do you misunderstand what I am saying? It is because
    - type: text
      text: ' [your spiritual ears are deaf and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you are unable to hear
    - type: text
      text: ' [the truth of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My word.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You are of '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your
      - type: text
        text: ' father the devil, and it is your will to practice the desires'
    - type: text
      text: ' [which are characteristic] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'of your father. He was a murderer from the beginning, and does not stand in the truth because there is no truth in him. When he lies, he speaks what is natural to him, for he is a liar and the father of lies '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' half-truths.'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But because I speak the truth, you do not believe Me
    - type: text
      text: ' [and continue in your unbelief]. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which one of you
    - type: text
      text: ' [has proof and] '
    - type: usfm
      marker: wj
      children:
      - type: text
