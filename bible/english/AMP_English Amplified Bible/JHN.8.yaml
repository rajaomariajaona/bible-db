verses:
  '1':
  - type: heading
    content: The Adulterous Woman
  - type: text
    content: 'But Jesus went to the Mount of Olives. '
  '10':
  - type: text
    content: 'Straightening up, Jesus said to her, '
  - type: text
    content: “Woman, where are they? Did no one condemn you?”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'She answered, “No one, Lord!” And Jesus said, '
  - type: text
    content: “I do not condemn you either. Go. From now on sin no more.”
  - type: text
    content: ']'
  - type: heading
    content: Jesus Is the Light of the World
  '12':
  - type: text
    content: 'Once more Jesus addressed the crowd. He said, '
  - type: text
    content: “
  - type: note
    content: The second of the memorable “I am” statements. See note 6:35.
  - type: text
    content: I am the Light of the world. He who follows Me will not walk in the darkness, but will have the Light of life.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then the Pharisees told Him, “You are testifying on Your own behalf; Your testimony is not valid.” '
  '14':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Even if I do testify on My own behalf, My testimony is valid, because I know where I came from and where I am going; but you do not know where I come from or where I am going.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'You judge according to '
  - type: note
    content: Lit the flesh.
  - type: text
    content: human standards
  - type: text
    content: ' [just by what you see]. '
  - type: text
    content: I do not judge anyone.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'But even if I do judge, My judgment is true '
  - type: text
    content: and
  - type: text
    content: ' My decision is right; for I am not alone'
  - type: text
    content: ' [in making it], '
  - type: text
    content: but I and the Father who sent Me
  - type: text
    content: ' [make the same judgment]. '
  '17':
  - type: text
    content: Even in your own law it is written that the testimony of two persons is true
  - type: text
    content: ' [valid and admissible]. [Deut 19:15] '
  '18':
  - type: text
    content: I am One
  - type: text
    content: ' [of the Two] '
  - type: text
    content: who testifies about Myself, and My Father who sent Me testifies about Me.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then the Pharisees said to Him, “Where is this Father of Yours?” Jesus answered, '
  - type: text
    content: “You know neither Me nor My Father; if you knew Me, you would know My Father also.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Early in the morning He came back into the temple [court], and all the people were coming to Him. He sat down and '
  - type: text
    content: began
  - type: text
    content: ' teaching them. '
  '20':
  - type: text
    content: Jesus said these things in the treasury, as He taught in the temple [courtyard]; and no one seized Him, because His time had not yet come.
  '21':
  - type: text
    content: 'Then He said again to them, '
  - type: text
    content: “I am going away, and you will look for Me, and you will die
  - type: text
    content: ' [unforgiven and condemned] '
  - type: text
    content: in your sin. Where I am going, you cannot come.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'So the Jews were asking [among themselves], “Will He kill Himself? Is that why He says, '
  - type: text
    content: ‘Where I am going, you cannot come’?”
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “You are from below, I am from above; you are of this world, I am not of this world.
  - type: text
    content: ' '
  '24':
  - type: text
    content: That is why I told you that you will die
  - type: text
    content: ' [unforgiven and condemned] '
  - type: text
    content: 'in your sins; for if you do not believe that I am '
  - type: text
    content: the One
  - type: text
    content: ' [I claim to be], '
  - type: text
    content: you will die in your sins.”
  - type: text
    content: ' [Ex 3:14; Matt 24:5; Mark 13:6; Luke 21:8] '
  '25':
  - type: text
    content: 'So they said to Him, “Who are You [anyway]?” Jesus replied, '
  - type: text
    content: “What have I been saying to you from the beginning?
  - type: text
    content: ' '
  '26':
  - type: text
    content: I have many things to say and judge concerning you, but He who sent Me is true; and I say to the world
  - type: text
    content: ' [only] '
  - type: text
    content: the things that I have heard from Him.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'They did not realize [or have the spiritual insight to understand] that He was speaking to them about the Father. '
  '28':
  - type: text
    content: 'So Jesus said, '
  - type: text
    content: “When you lift up the Son of Man
  - type: text
    content: ' [on the cross], '
  - type: text
    content: you will know then
  - type: text
    content: ' [without any doubt] '
  - type: text
    content: 'that I am '
  - type: text
    content: He,
  - type: text
    content: ' and that I do nothing on My own authority, but I say these things just as My Father taught Me.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: And He who sent Me is
  - type: text
    content: ' [always] '
  - type: text
    content: with Me; He has not left Me alone, because I always do what pleases Him.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Now the scribes and Pharisees brought a woman who had been caught in adultery. They made her stand in the center '
  - type: text
    content: of the court,
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'As He said these things, '
  - type: note
    content: The response of the people in some of the following verses casts doubt on the validity of their belief.
  - type: text
    content: many believed in Him.
  - type: heading
    content: The Truth Will Make You Free
  '31':
  - type: text
    content: 'So Jesus was saying to the Jews who had believed Him, '
  - type: text
    content: “If you abide in My word
  - type: text
    content: ' [continually obeying My teachings and living in accordance with them, then] '
  - type: text
    content: you are truly My disciples.
  - type: text
    content: ' '
  '32':
  - type: text
    content: And you will know the truth
  - type: text
    content: ' [regarding salvation], '
  - type: text
    content: and the truth will set you free
  - type: text
    content: ' [from the penalty of sin].” '
  '33':
  - type: text
    content: 'They answered Him, “We are Abraham’s descendants and have never been enslaved to anyone. '
  - type: note
    content: The Jews did not grasp the difference between being enslaved physically and being enslaved spiritually because of sin.
  - type: text
    content: 'What do You mean by saying, '
  - type: text
    content: ‘You will be set free’?”
  '34':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, everyone who practices sin '
  - type: text
    content: habitually
  - type: text
    content: ' is a slave of sin.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: Now the slave does not remain in a household forever; the son
  - type: text
    content: ' [of the master] '
  - type: text
    content: does remain forever.
  - type: text
    content: ' '
  '36':
  - type: text
    content: So if the Son makes you free, then you are unquestionably free.
  - type: text
    content: ' '
  '37':
  - type: text
    content: I know that you are Abraham’s descendants; yet you plan to kill Me, because My word has no place
  - type: text
    content: ' [to grow] '
  - type: text
    content: in you
  - type: text
    content: ' [and it makes no change in your heart]. '
  '38':
  - type: text
    content: I tell the things that I have seen at My Father’s side
  - type: text
    content: ' [in His very presence]; '
  - type: text
    content: so you also do the things that you heard from your father.”
  '39':
  - type: text
    content: 'They answered, “Abraham is our father.” Jesus said to them, '
  - type: text
    content: “If you are
  - type: text
    content: ' [truly] '
  - type: text
    content: 'Abraham’s children, then do the works of Abraham '
  - type: text
    content: and
  - type: text
    content: ' follow his example.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'and they said to Him, “Teacher, this woman has been caught in the very act of adultery. '
  '40':
  - type: text
    content: But as it is, you want to kill Me, a Man who has told you the truth, which I heard from God. This is not the way Abraham acted.
  - type: text
    content: ' '
  '41':
  - type: text
    content: You are doing the works of your
  - type: text
    content: ' [own] '
  - type: text
    content: father.”
  - type: text
    content: ' They said to Him, “We are not illegitimate children; we have one [spiritual] Father: God.” '
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “If God were your Father
  - type: text
    content: ' [but He is not], '
  - type: text
    content: 'you would love '
  - type: text
    content: and
  - type: text
    content: ' recognize Me, for I came from God'
  - type: text
    content: ' [out of His very presence] '
  - type: text
    content: 'and have arrived '
  - type: text
    content: here
  - type: text
    content: . For I have not even come on My own initiative
  - type: text
    content: ' [as self-appointed], '
  - type: text
    content: but He
  - type: text
    content: ' [is the One who] '
  - type: text
    content: sent Me.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Why do you misunderstand what I am saying? It is because
  - type: text
    content: ' [your spiritual ears are deaf and] '
  - type: text
    content: you are unable to hear
  - type: text
    content: ' [the truth of] '
  - type: text
    content: My word.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'You are of '
  - type: text
    content: your
  - type: text
    content: ' father the devil, and it is your will to practice the desires'
  - type: text
    content: ' [which are characteristic] '
  - type: text
    content: 'of your father. He was a murderer from the beginning, and does not stand in the truth because there is no truth in him. When he lies, he speaks what is natural to him, for he is a liar and the father of lies '
  - type: text
    content: and
  - type: text
    content: ' half-truths.'
  - type: text
    content: ' '
  '45':
  - type: text
    content: But because I speak the truth, you do not believe Me
  - type: text
    content: ' [and continue in your unbelief]. '
  '46':
  - type: text
    content: Which one of you
  - type: text
    content: ' [has proof and] '
  - type: text
    content: convicts Me of sin? If I speak truth, why do you not believe Me?
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Whoever is of God '
  - type: text
    content: and
  - type: text
    content: ' belongs to Him hears'
  - type: text
    content: ' [the truth of] '
  - type: text
    content: 'God’s words; for this reason you do not hear them: because you are not of God '
  - type: text
    content: and
  - type: text
    content: ' you are not in fellowship with Him.”'
  '48':
  - type: text
    content: 'The Jews answered Him, “Are we not right when we say You are a '
  - type: note
    content: This was a slur intended to incite hatred toward Jesus among Jews, who as a people were in an ancient feud with the Samaritans.
  - type: text
    content: 'Samaritan and [that You] have a demon [and are under its power]?” '
  '49':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I do not have a demon. On the contrary, I honor My Father, and you dishonor Me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Now in the Law Moses commanded us to stone such women [to death]. So what do You say [to do with her—what is Your sentence]?” [Deut 22:22-24] '
  '50':
  - type: text
    content: However, I am not seeking glory for Myself. There is One who seeks
  - type: text
    content: ' [glory for Me] '
  - type: text
    content: and judges
  - type: text
    content: ' [those who dishonor Me]. '
  '51':
  - type: text
    content: 'I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, if anyone keeps My word'
  - type: text
    content: ' [by living in accordance with My message] '
  - type: text
    content: 'he will indeed never, ever see '
  - type: text
    content: and
  - type: text
    content: ' experience '
  - type: note
