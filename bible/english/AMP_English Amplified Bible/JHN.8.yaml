  - type: text
    content: ' '
  '52':
  - type: text
    content: 'The Jews said to Him, “Now we know that You have a demon [and are under its power]. Abraham died, and also the prophets; yet You say, '
  - type: text
    content: ‘If anyone keeps My word, he will never, ever taste of death.’
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Are You greater than our father Abraham, who died? The prophets died too! Whom do You make Yourself out to be?” '
  '54':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “If I glorify Myself, My glory is
  - type: text
    content: ' [worth] '
  - type: text
    content: nothing. It is My Father who glorifies Me, of whom you say, ‘He is our God.’
  - type: text
    content: ' '
  '55':
  - type: text
    content: Yet you do not know Him, but I know Him fully. If I said I did not know Him, I would be a liar like you. But I do know Him and keep His word.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Your father Abraham
  - type: text
    content: ' [greatly] '
  - type: text
    content: 'rejoiced to see My day (My incarnation). '
  - type: note
    content: How Abraham saw the incarnation of Jesus is unclear. Some suggest it was simply by faith, others suggest it was through Isaac and the promise of the covenant, but more likely, he saw it from Paradise.
  - type: text
    content: He saw it and was delighted.”
  - type: text
    content: ' [Heb 11:13] '
  '57':
  - type: text
    content: 'Then the Jews said to Him, “You are not even fifty years old, and You [claim to] have seen Abraham?” '
  '58':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, before Abraham was born, '
  - type: note
    content: I.e. I Am the One who is—the Lord, Heb Yahweh.
  - type: text
    content: I Am.”
  - type: text
    content: ' [Ex 3:14] '
  '59':
  - type: text
    content: So they picked up stones to throw at Him, but Jesus concealed Himself and left the temple.
  '6':
  - type: text
    content: 'They said this to test Him, hoping that they would have grounds for accusing Him. But Jesus stooped down and began writing on the ground with His finger. '
  '7':
  - type: text
    content: 'However, when they persisted in questioning Him, He straightened up and said, '
  - type: text
    content: “He who is without
  - type: text
