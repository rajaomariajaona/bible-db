  - type: text
    content: And that in faithfulness You have disciplined me. [Heb 12:10]
  '76':
  - type: text
    content: 'O may Your lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' graciousness comfort me,'
  - type: text
    content: According to Your word (promise) to Your servant.
  '77':
  - type: text
    content: Let Your compassion come to me that I may live,
  - type: text
    content: For Your law is my delight.
  '78':
  - type: text
    content: 'Let the arrogant be ashamed '
  - type: text
    content: and
  - type: text
    content: ' humiliated, for they sabotage me with a lie;'
  - type: text
    content: But I will meditate on Your precepts.
  '79':
  - type: text
    content: May those who fear You [with submissive wonder] turn to me,
  - type: text
    content: Even those who have known Your testimonies.
  '8':
  - type: text
    content: I shall keep Your statutes;
  - type: text
    content: Do not utterly abandon me [when I fail].
  - type: heading
    content: Beth.
  '80':
  - type: text
    content: May my heart be blameless in Your statutes,
  - type: text
    content: So that I will not be ashamed.
  - type: heading
    content: Kaph.
  '81':
  - type: text
    content: '¶My soul languishes '
  - type: text
