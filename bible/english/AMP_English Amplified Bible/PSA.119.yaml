    content: ' promise to Your servant,'
  - type: text
    content: In which You have made me hope.
  '5':
  - type: text
    content: Oh, that my ways may be established
  - type: text
    content: 'To observe '
  - type: text
    content: and
  - type: text
    content: ' keep Your statutes [obediently accepting and honoring them]!'
  '50':
  - type: text
    content: This is my comfort in my affliction,
  - type: text
    content: 'That Your word has revived me '
  - type: text
    content: and
  - type: text
    content: ' given me life. [Rom 15:4]'
  '51':
  - type: text
    content: The arrogant utterly ridicule me,
  - type: text
    content: Yet I do not turn away from Your law.
  '52':
  - type: text
    content: I have remembered [carefully] Your ancient ordinances, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And I have taken comfort.
  '53':
  - type: text
    content: Burning indignation has seized me because of the wicked,
  - type: text
    content: 'Who '
  - type: note
    content: Lit forsake.
  - type: text
    content: reject Your law.
  '54':
  - type: text
    content: Your statutes are my songs
  - type: text
    content: In the house of my pilgrimage.
  '55':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', I remember Your name in the night,'
  - type: text
    content: And keep Your law.
  '56':
  - type: text
    content: This has become mine [as the gift of Your grace],
  - type: text
    content: That I observe Your precepts [accepting them with loving obedience].
  - type: heading
    content: Heth.
  '57':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' is my portion;'
  - type: text
    content: I have promised to keep Your words.
  '58':
  - type: text
    content: I sought Your favor with all my heart;
  - type: text
    content: 'Be merciful '
  - type: text
    content: and
  - type: text
    content: ' gracious to me according to Your promise.'
  '59':
  - type: text
    content: I considered my ways
  - type: text
    content: And turned my feet to [follow and obey] Your testimonies.
  '6':
  - type: text
    content: Then I will not be ashamed
  - type: text
    content: When I look [with respect] to all Your commandments [as my guide].
  '60':
  - type: text
    content: I hurried and did not delay
  - type: text
    content: To keep Your commandments.
  '61':
  - type: text
    content: 'The cords of the wicked have encircled '
  - type: text
    content: and
  - type: text
    content: ' ensnared me,'
  - type: text
    content: But I have not forgotten Your law.
  '62':
  - type: text
    content: At midnight I will rise to give thanks to You
  - type: text
    content: Because of Your righteous ordinances.
  '63':
  - type: text
    content: I am a companion of all who [reverently] fear You,
  - type: text
    content: 'And of those who keep '
  - type: text
    content: and
  - type: text
    content: ' honor Your precepts.'
  '64':
  - type: text
    content: The earth, O L
  - type: heading
    content: ord
  - type: text
    content: ', is full of Your lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' goodness;'
  - type: text
    content: Teach me Your statutes.
  - type: heading
    content: Teth.
  '65':
  - type: text
    content: ¶You have dealt well with Your servant,
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', according to Your promise.'
  '66':
  - type: text
    content: Teach me good judgment (discernment) and knowledge,
  - type: text
    content: 'For I have believed '
  - type: text
    content: and
  - type: text
    content: ' trusted '
  - type: text
    content: and
  - type: text
    content: ' relied on Your commandments.'
  '67':
  - type: text
    content: Before I was afflicted I went astray,
  - type: text
    content: 'But now I keep '
  - type: text
    content: and
  - type: text
    content: ' honor Your word [with loving obedience].'
  '68':
  - type: text
    content: You are good and do good;
  - type: text
    content: Teach me Your statutes.
  '69':
  - type: text
    content: The arrogant have forged a lie against me,
  - type: text
    content: But I will keep Your precepts with all my heart.
  '7':
  - type: text
    content: I will give thanks to You with an upright heart,
  - type: text
    content: When I learn [through discipline] Your righteous judgments [for my transgressions].
  '70':
  - type: text
    content: Their heart is insensitive like fat [their minds are dull and brutal],
  - type: text
    content: But I delight in Your law.
  '71':
  - type: text
    content: It is good for me that I have been afflicted,
  - type: text
    content: That I may learn Your statutes.
  '72':
  - type: text
    content: The law from Your mouth is better to me
  - type: text
    content: 'Than thousands of gold and silver '
  - type: text
    content: pieces.
  - type: heading
    content: Yodh.
  '73':
  - type: text
    content: ¶Your hands have made me and established me;
  - type: text
    content: 'Give me understanding '
  - type: text
    content: and
  - type: text
    content: ' a teachable heart, that I may learn Your commandments.'
  '74':
  - type: text
    content: May those who [reverently] fear You see me and be glad,
  - type: text
    content: Because I wait for Your word.
  '75':
  - type: text
    content: I know, O L
  - type: heading
    content: ord
  - type: text
