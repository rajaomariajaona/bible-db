segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 119
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Meditations and Prayers Relating to the Law of God.
  marker-yv: yv-h
- type: usfm
  marker: qa
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119:0 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This long Psalm (176 verses) consists of separate units, each of which has its first word beginning with a consecutive letter of the Hebrew alphabet as a memory aid. The first verse begins with the first letter of the alphabet, aleph (first letter of the word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: blessed)
      - type: text
        text: ', and the last unit of the Psalm (vv 169-176) begins with tav, the last letter of the Hebrew alphabet.'
    marker-yv: yv-n
  - type: text
    text: Aleph.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'How blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored by God are those whose way is blameless [those with personal integrity, the upright, the guileless],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who walk in the law [and who are guided by the precepts and revealed will] of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favored by God are those who keep His testimonies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And who [consistently] seek Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' long for Him with all their heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They do no unrighteousness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They walk in His ways. [1 John 3:9; 5:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You have ordained Your precepts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That we should follow them with [careful] diligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oh, that my ways may be established
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To observe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep Your statutes [obediently accepting and honoring them]!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then I will not be ashamed
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I look [with respect] to all Your commandments [as my guide].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will give thanks to You with an upright heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I learn [through discipline] Your righteous judgments [for my transgressions].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I shall keep Your statutes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not utterly abandon me [when I fail].
- type: usfm
  marker: qa
  children:
  - type: text
    text: Beth.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶How can a young man keep his way pure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: By keeping watch [on himself] according to Your word [conforming his life to Your precepts].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: With all my heart I have sought You, [inquiring of You and longing for You];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not let me wander from Your commandments [neither through ignorance nor by willful disobedience]. [2 Chr 15:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Your word I have treasured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stored in my heart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I may not sin against You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverently praised are You, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach me Your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With my lips I have told of
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the ordinances of Your mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have rejoiced in the way of Your testimonies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As much as in all riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will meditate on Your precepts
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [thoughtfully] regard Your ways [the path of life established by Your precepts]. [Ps 104:34]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will delight in Your statutes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not forget Your word.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Gimel.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Deal bountifully with Your servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I may live and keep Your word [treasuring it and being guided by it day by day]. [Ps 119:97-101]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Open my eyes [to spiritual truth] so that I may behold
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wonderful things from Your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I am a stranger on the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not hide Your commandments from me. [Gen 47:9; 1 Chr 29:15; Ps 39:12; 2 Cor 5:6; Heb 11:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My soul is crushed with longing
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Your ordinances at all times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You rebuke the presumptuous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogant, the cursed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who wander from Your commandments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Take reproach and contempt away from me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I observe Your testimonies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Even though princes sit and talk to one another against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your servant meditates on Your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Your testimonies also are my delight
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my counselors.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Daleth.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ¶My earthly life clings to the dust;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Revive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refresh me according to Your word. [Ps 143:11]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I have told of my ways, and You have answered me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach me Your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Make me understand the way of Your precepts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that I will meditate (focus my thoughts) on Your wonderful works. [Ps 145:5, 6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: My soul dissolves because of grief;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Renew '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen me according to [the promises of] Your word.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Remove from me the way of falsehood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unfaithfulness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And graciously grant me Your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I have chosen the faithful way;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I have placed Your ordinances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: before me
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I cling tightly to Your testimonies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', do not put me to shame!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: I will run the way of Your commandments [with purpose],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You will give me a heart that is willing.
- type: usfm
  marker: qa
  children:
  - type: text
    text: He.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ¶Teach me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the way of Your statutes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will [steadfastly] observe it to the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Give me understanding [a teachable heart and the ability to learn], that I may keep Your law;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And observe it with all my heart. [Prov 2:6; James 1:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Make me walk in the path of Your commandments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I delight in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Incline my heart to Your testimonies
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And not to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dishonest
  - type: text
    text: ' gain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' envy. [Ezek 33:31; Mark 7:21, 22; 1 Tim 6:10; Heb 13:5]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Turn my eyes away from vanity [all those worldly, meaningless things that distract—let Your priorities be mine],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And restore me [with renewed energy] in Your ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Establish Your word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirm Your promise to Your servant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As that which produces [awe-inspired] reverence for You. [Deut 10:12; Ps 96:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Turn away my reproach which I dread,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Your ordinances are good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: I long for Your precepts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Renew me through Your righteousness.
- type: usfm
  marker: qa
  children:
  - type: text
    text: Vav.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ¶May Your lovingkindness also come to me, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your salvation according to Your promise;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: So I will have an answer for the one who taunts me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I trust [completely] in Your word [and its reliability].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: And do not take the word of truth utterly out of my mouth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I wait for Your ordinances.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: I will keep Your law continually,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Forever and ever [writing Your precepts on my heart].
- type: usfm
  marker: q1
  children:
