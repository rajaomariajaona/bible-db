  - type: text
    content: Men who do not conform to Your law.
  '86':
  - type: text
    content: 'All Your commandments are faithful '
  - type: text
    content: and
  - type: text
    content: ' trustworthy.'
  - type: text
    content: They have persecuted me with a lie; help me [L
  - type: heading
    content: ord
  - type: text
    content: ']!'
  '87':
  - type: text
