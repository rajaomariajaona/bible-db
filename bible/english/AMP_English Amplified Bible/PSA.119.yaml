  - type: text
    content: ' grows weak for Your salvation;'
  - type: text
    content: I wait for Your word.
  '82':
  - type: text
    content: My eyes fail [with longing, watching] for [the fulfillment of] Your promise,
  - type: text
    content: Saying, “When will You comfort me?”
  '83':
  - type: text
