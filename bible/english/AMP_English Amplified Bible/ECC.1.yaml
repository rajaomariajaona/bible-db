document_id: ECC.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Futility of All Endeavors
  - type: text
    content: The words of the Preacher, the son of David, king in Jerusalem.
  '10':
  - type: text
    content: Is there anything of which it can be said,
  - type: text
    content: “See this, it is new”?
  - type: text
    content: It has already existed for [the vast] ages [of time recorded or unrecorded]
  - type: text
    content: Which were before us.
  '11':
  - type: text
    content: There is no remembrance of earlier things,
  - type: text
    content: Nor also of the later things that are to come;
  - type: text
    content: There will be for them no remembrance
  - type: text
    content: By generations who will come after them.
  - type: heading
    content: The Futility of Wisdom
  '12':
  - type: text
    content: 'I, the Preacher, have been king over Israel in Jerusalem. '
  '13':
  - type: text
    content: 'And I set my mind to seek and explore by [man’s] '
  - type: note
    content: The “wisdom” of Proverbs is not the “wisdom” of Ecclesiastes. The former is godly wisdom; the latter is usually human wisdom.
  - type: text
    content: 'wisdom all [human activity] that has been done under heaven. It is a miserable business '
  - type: text
    content: and
  - type: text
    content: ' a burdensome task which '
  - type: note
    content: 'Heb Elohim: mighty, creator, ruler of man and nature.'
  - type: text
    content: 'God has given the sons of men with which to be busy '
  - type: text
    content: and
  - type: text
    content: ' distressed. '
  '14':
  - type: text
    content: 'I have seen all the works which have been done under the sun, and behold, all is vanity, a futile grasping '
  - type: text
    content: and
  - type: text
    content: ' chasing after the wind. '
  '15':
  - type: text
    content: 'What is crooked cannot be straightened and what is defective '
  - type: text
    content: and
  - type: text
    content: ' lacking cannot be counted.'
  '16':
  - type: text
    content: 'I spoke with my heart, saying, “Behold, I have acquired great [human] wisdom '
  - type: text
    content: and
  - type: text
    content: ' experience, more than all who were over Jerusalem before me; and my mind has observed a wealth of [moral] wisdom and [scientific] knowledge.” '
  '17':
  - type: text
    content: 'And I set my mind to know [practical] wisdom and to discern [the character of] madness and folly [in which men seem to find satisfaction]; I realized that this too is a futile grasping '
  - type: text
    content: and
  - type: text
    content: ' chasing after the wind. [1 Thess 5:21] '
  '18':
  - type: text
    content: 'For in much [human] wisdom there is much displeasure '
  - type: text
    content: and
  - type: text
    content: ' exasperation; increasing knowledge increases sorrow.'
  '2':
  - type: text
    content: “Vanity of vanities,” says the Preacher.
  - type: text
    content: “Vanity of vanities! All [that is done without God’s guidance] is vanity [futile, meaningless—a wisp of smoke, a vapor that vanishes, merely chasing the wind].” [Rom 8:20]
  '3':
  - type: text
    content: ¶What advantage does man have from all his work
  - type: text
    content: 'Which he does '
  - type: note
    content: Ecclesiastes expresses the view of the natural man whose interests are focused on vanishing pleasures and empty satisfactions. The natural man is not aware that all the answers to life are found in God. The natural man grovels in the earth and seeks and finds that which is futile and temporary while the spiritual man soars on wings of eagles (Is 40:31) and seeks and finds righteousness and God’s incomparable and everlasting blessings and companionship.
  - type: text
    content: under the sun (while earthbound)?
  '4':
  - type: text
    content: One generation goes and another generation comes,
  - type: text
    content: But the earth remains forever. [Ps 119:90]
  '5':
  - type: text
    content: Also, the sun rises and the sun sets;
  - type: text
    content: And hurries to the place where it rises again.
  '6':
  - type: text
    content: The wind blows toward the south,
  - type: text
    content: Then circles toward the north;
  - type: text
    content: 'The wind circles '
  - type: text
    content: and
  - type: text
    content: ' swirls endlessly,'
  - type: text
    content: And on its circular course the wind returns. [John 3:8]
  '7':
  - type: text
    content: All the rivers flow into the sea,
  - type: text
    content: Yet the sea is not full.
  - type: text
    content: To the place where the rivers flow,
  - type: text
    content: There they flow again.
  '8':
  - type: text
    content: 'All things are wearisome '
  - type: text
    content: and
  - type: text
    content: ' all words are frail;'
  - type: text
    content: Man cannot express it.
  - type: text
    content: The eye is not satisfied with seeing,
  - type: text
    content: Nor is the ear filled with hearing. [Prov 27:20]
  '9':
  - type: text
    content: That which has been is that which will be [again],
  - type: text
    content: And that which has been done is that which will be done again.
  - type: text
    content: So there is nothing new under the sun.
