document_id: ECC.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Futility of All Endeavors
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The words of the Preacher, the son of David, king in Jerusalem.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there anything of which it can be said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See this, it is new”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has already existed for [the vast] ages [of time recorded or unrecorded]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which were before us.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no remembrance of earlier things,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor also of the later things that are to come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be for them no remembrance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By generations who will come after them.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Futility of Wisdom
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, the Preacher, have been king over Israel in Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I set my mind to seek and explore by [man’s] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “wisdom” of Proverbs is not the “wisdom” of Ecclesiastes. The former is godly wisdom; the latter is usually human wisdom.
      marker-yv: yv-n
    - type: text
      text: 'wisdom all [human activity] that has been done under heaven. It is a miserable business '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a burdensome task which '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: 'Elohim:'
        - type: text
          text: ' mighty, creator, ruler of man and nature.'
      marker-yv: yv-n
    - type: text
      text: 'God has given the sons of men with which to be busy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distressed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have seen all the works which have been done under the sun, and behold, all is vanity, a futile grasping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chasing after the wind. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What is crooked cannot be straightened and what is defective '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lacking cannot be counted.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I spoke with my heart, saying, “Behold, I have acquired great [human] wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' experience, more than all who were over Jerusalem before me; and my mind has observed a wealth of [moral] wisdom and [scientific] knowledge.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I set my mind to know [practical] wisdom and to discern [the character of] madness and folly [in which men seem to find satisfaction]; I realized that this too is a futile grasping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chasing after the wind. [1 Thess 5:21] '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in much [human] wisdom there is much displeasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exasperation; increasing knowledge increases sorrow.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Vanity of vanities,” says the Preacher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Vanity of vanities! All [that is done without God’s guidance] is vanity [futile, meaningless—a wisp of smoke, a vapor that vanishes, merely chasing the wind].” [Rom 8:20]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶What advantage does man have from all his work
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Which he does '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ecclesiastes expresses the view of the natural man whose interests are focused on vanishing pleasures and empty satisfactions. The natural man is not aware that all the answers to life are found in God. The natural man grovels in the earth and seeks and finds that which is futile and temporary while the spiritual man soars on wings of eagles (Is 40:31) and seeks and finds righteousness and God’s incomparable and everlasting blessings and companionship.
      marker-yv: yv-n
    - type: text
      text: under the sun (while earthbound)?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One generation goes and another generation comes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the earth remains forever. [Ps 119:90]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also, the sun rises and the sun sets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hurries to the place where it rises again.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wind blows toward the south,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then circles toward the north;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The wind circles '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swirls endlessly,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And on its circular course the wind returns. [John 3:8]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the rivers flow into the sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet the sea is not full.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the place where the rivers flow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There they flow again.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All things are wearisome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' all words are frail;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Man cannot express it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eye is not satisfied with seeing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor is the ear filled with hearing. [Prov 27:20]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That which has been is that which will be [again],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that which has been done is that which will be done again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So there is nothing new under the sun.
