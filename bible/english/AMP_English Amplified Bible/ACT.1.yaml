document_id: ACT.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Luke is referring to his gospel.
      marker-yv: yv-n
    - type: text
      text: 'account I made, Theophilus, was [a continuous report] about all the things that Jesus began to do and to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As the gospel tells us what Jesus began to do and teach, so Acts tells what He continued to do and teach by His Holy Spirit (F. F. Bruce).
      marker-yv: yv-n
    - type: text
      text: 'teach [Luke 1:1-4] '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'While they were looking intently into the sky as He was going, two men in white clothing suddenly stood beside them, '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: who said, “Men of Galilee, why do you stand looking into the sky? This [same] Jesus, who has been taken up from you into heaven, will return in just the same way as you have watched Him go into heaven.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Upper Room
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the disciples returned to Jerusalem from the mount called Olivet (Olive Grove), which is near Jerusalem, [only] a Sabbath day’s journey (less than one mile) away. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had entered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the city,
    - type: text
      text: ' they went upstairs to the upper room where they were staying [indefinitely]; that is, Peter, and John and [his brother] James, and Andrew, Philip and Thomas, Bartholomew (Nathanael) and Matthew, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as James the Less or James the Younger. His mother, Mary (Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Maria)
        - type: text
          text: ', may have been either a sister or sister-in-law of Mary (Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Mariam)
        - type: text
          text: ', the mother of Jesus.'
      marker-yv: yv-n
    - type: text
      text: 'James '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the son
    - type: text
      text: ' of Alphaeus, and Simon the Zealot, and Judas (Thaddaeus) the son of James. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these with one mind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' one purpose were continually devoting themselves to prayer, [waiting together] along with the women, and Mary the mother of Jesus, and with His brothers.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now on one of these days Peter stood up among the brothers and sisters (a gathering of about a hundred and twenty believers was there) and he said, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Brothers and sisters, it was necessary that the Scripture be fulfilled, which the Holy Spirit foretold by the lips of David [king of Israel] about Judas [Iscariot], who acted as guide to those who arrested Jesus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he (Judas) was counted among us and received his share [by divine allotment] in this ministry.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Now Judas Iscariot '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter means that the chief priests purchased the field in Judas’ name. He had returned to them with the money, and when they refused to accept it, he threw it into the temple sanctuary (Matt 27:3 ff). Afterwards they decided to buy the field for use as a burial ground for strangers. Peter goes on to say that Judas was disemboweled in a fall, while Matthew reports that Judas hanged himself (Matt 27:5). One explanation for the apparent discrepancy is that the rope or line that Judas was using broke, and the body fell in such a way as to be disemboweled (Matt 27:3 ff).
      marker-yv: yv-n
    - type: text
      text: 'acquired a piece of land [indirectly] with the [money paid him as a] reward for his treachery, and falling headlong, his body burst open in the middle and all his intestines poured out. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the people in Jerusalem learned about this, so in their own dialect—Aramaic—they called the piece of land Hakeldama, that is, Field of Blood.) '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until the day when He ascended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to heaven,
    - type: text
      text: ' after He had by the Holy Spirit given instruction to the apostles (special messengers) whom He had chosen. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For in the book of Psalms it is written,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: et his place of residence become desolate
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd let there be no one to live in it
    - type: text
      text: ’;
  - type: usfm
    marker: m
    children:
    - type: text
      text: and [again],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: et another take his position as overseer
    - type: text
      text: .’ [Ps 69:25; 109:8]
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So of the men who have accompanied us during all the time that the Lord Jesus spent with us, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'beginning with the baptism by John [at the outset of Jesus’ ministry] until the day when He was taken up from us—one of these men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: must
    - type: text
      text: ' become a witness with us [to testify] of His resurrection.” '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they put forward two men, Joseph, the one called Barsabbas (who was surnamed Justus), and Matthias. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'They prayed and said, “You, Lord, who know all hearts [their thoughts, motives, desires], show us which one of these two You have chosen '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'to occupy this ministry and apostleship which Judas left to go to his own place [of evil].” '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The custom of the Jews was to write the names on stones, place them in a container and shake it until one stone fell out.
      marker-yv: yv-n
    - type: text
      text: cast lots for them, and the lot fell to Matthias; and he was added to the eleven apostles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To these [men] He also showed Himself alive after His suffering [in Gethsemane and on the cross], by [a series of] many infallible proofs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unquestionable demonstrations, appearing to them over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a period of
    - type: text
      text: ' forty days and talking to them about the things concerning the kingdom of God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While being together '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' eating with them, He commanded them not to leave Jerusalem, but to wait for what the Father had promised, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Of which,”
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He said,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “you have heard Me speak.
    - type: text
      text: ' [John 14:16, 26; 15:26] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For John baptized with water, but you will be baptized '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' empowered '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' united with the Holy Spirit, not long from now.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when they had come together, they asked Him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: repeatedly,
    - type: text
      text: ' “Lord, are You at this time reestablishing the kingdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restoring it to Israel?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is not for you to know the times or epochs which the Father has fixed by His own authority.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But you will receive power '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' ability when the Holy Spirit comes upon you; and you will be My witnesses'
    - type: text
      text: ' [to tell people about Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: both in Jerusalem and in all Judea, and Samaria, and even to the ends of the earth.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Ascension
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And after He said these things, He was caught up as they looked on, and a cloud took Him up out of their sight. '
