verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'The first '
  - type: note
    content: Luke is referring to his gospel.
  - type: text
    content: 'account I made, Theophilus, was [a continuous report] about all the things that Jesus began to do and to '
  - type: note
    content: As the gospel tells us what Jesus began to do and teach, so Acts tells what He continued to do and teach by His Holy Spirit (F. F. Bruce).
  - type: text
    content: 'teach [Luke 1:1-4] '
  '10':
  - type: text
    content: 'While they were looking intently into the sky as He was going, two men in white clothing suddenly stood beside them, '
  '11':
  - type: text
    content: who said, “Men of Galilee, why do you stand looking into the sky? This [same] Jesus, who has been taken up from you into heaven, will return in just the same way as you have watched Him go into heaven.”
  - type: heading
    content: The Upper Room
  '12':
  - type: text
    content: 'Then the disciples returned to Jerusalem from the mount called Olivet (Olive Grove), which is near Jerusalem, [only] a Sabbath day’s journey (less than one mile) away. '
  '13':
  - type: text
    content: 'When they had entered '
  - type: text
    content: the city,
  - type: text
    content: ' they went upstairs to the upper room where they were staying [indefinitely]; that is, Peter, and John and [his brother] James, and Andrew, Philip and Thomas, Bartholomew (Nathanael) and Matthew, '
  - type: note
    content: Also known as James the Less or James the Younger. His mother, Mary (Gr Maria), may have been either a sister or sister-in-law of Mary (Gr Mariam), the mother of Jesus.
  - type: text
    content: 'James '
  - type: text
    content: the son
  - type: text
    content: ' of Alphaeus, and Simon the Zealot, and Judas (Thaddaeus) the son of James. '
  '14':
  - type: text
    content: 'All these with one mind '
  - type: text
    content: and
  - type: text
    content: ' one purpose were continually devoting themselves to prayer, [waiting together] along with the women, and Mary the mother of Jesus, and with His brothers.'
  '15':
  - type: text
    content: 'Now on one of these days Peter stood up among the brothers and sisters (a gathering of about a hundred and twenty believers was there) and he said, '
  '16':
  - type: text
    content: '“Brothers and sisters, it was necessary that the Scripture be fulfilled, which the Holy Spirit foretold by the lips of David [king of Israel] about Judas [Iscariot], who acted as guide to those who arrested Jesus. '
  '17':
  - type: text
    content: 'For he (Judas) was counted among us and received his share [by divine allotment] in this ministry.” '
  '18':
  - type: text
    content: '(Now Judas Iscariot '
  - type: note
    content: Peter means that the chief priests purchased the field in Judas’ name. He had returned to them with the money, and when they refused to accept it, he threw it into the temple sanctuary (Matt 27:3 ff). Afterwards they decided to buy the field for use as a burial ground for strangers. Peter goes on to say that Judas was disemboweled in a fall, while Matthew reports that Judas hanged himself (Matt 27:5). One explanation for the apparent discrepancy is that the rope or line that Judas was using broke, and the body fell in such a way as to be disemboweled (Matt 27:3 ff).
  - type: text
    content: 'acquired a piece of land [indirectly] with the [money paid him as a] reward for his treachery, and falling headlong, his body burst open in the middle and all his intestines poured out. '
  '19':
  - type: text
    content: 'All the people in Jerusalem learned about this, so in their own dialect—Aramaic—they called the piece of land Hakeldama, that is, Field of Blood.) '
  '2':
  - type: text
    content: 'until the day when He ascended '
  - type: text
    content: to heaven,
  - type: text
    content: ' after He had by the Holy Spirit given instruction to the apostles (special messengers) whom He had chosen. '
  '20':
  - type: text
    content: “For in the book of Psalms it is written,
  - type: text
    content: ‘L
  - type: heading
    content: et his place of residence become desolate
  - type: text
    content: ','
  - type: text
    content: A
  - type: heading
    content: nd let there be no one to live in it
  - type: text
    content: ’;
  - type: text
    content: and [again],
  - type: text
    content: ‘L
  - type: heading
    content: et another take his position as overseer
  - type: text
    content: .’ [Ps 69:25; 109:8]
  '21':
  - type: text
    content: 'So of the men who have accompanied us during all the time that the Lord Jesus spent with us, '
  '22':
  - type: text
    content: 'beginning with the baptism by John [at the outset of Jesus’ ministry] until the day when He was taken up from us—one of these men '
  - type: text
    content: must
  - type: text
    content: ' become a witness with us [to testify] of His resurrection.” '
  '23':
  - type: text
    content: 'And they put forward two men, Joseph, the one called Barsabbas (who was surnamed Justus), and Matthias. '
  '24':
  - type: text
    content: 'They prayed and said, “You, Lord, who know all hearts [their thoughts, motives, desires], show us which one of these two You have chosen '
  '25':
  - type: text
    content: 'to occupy this ministry and apostleship which Judas left to go to his own place [of evil].” '
  '26':
  - type: text
    content: 'And they '
  - type: note
    content: The custom of the Jews was to write the names on stones, place them in a container and shake it until one stone fell out.
  - type: text
    content: cast lots for them, and the lot fell to Matthias; and he was added to the eleven apostles.
  '3':
  - type: text
    content: 'To these [men] He also showed Himself alive after His suffering [in Gethsemane and on the cross], by [a series of] many infallible proofs '
  - type: text
    content: and
  - type: text
    content: ' unquestionable demonstrations, appearing to them over '
  - type: text
    content: a period of
  - type: text
    content: ' forty days and talking to them about the things concerning the kingdom of God. '
  '4':
  - type: text
    content: 'While being together '
  - type: text
    content: and
  - type: text
    content: ' eating with them, He commanded them not to leave Jerusalem, but to wait for what the Father had promised, '
  - type: text
    content: “Of which,”
  - type: text
    content: ' '
  - type: text
    content: He said,
  - type: text
    content: ' '
  - type: text
    content: “you have heard Me speak.
  - type: text
    content: ' [John 14:16, 26; 15:26] '
  '5':
  - type: text
    content: 'For John baptized with water, but you will be baptized '
  - type: text
    content: and
  - type: text
    content: ' empowered '
  - type: text
    content: and
  - type: text
    content: ' united with the Holy Spirit, not long from now.”'
  '6':
  - type: text
    content: 'So when they had come together, they asked Him '
  - type: text
    content: repeatedly,
  - type: text
    content: ' “Lord, are You at this time reestablishing the kingdom '
  - type: text
    content: and
  - type: text
    content: ' restoring it to Israel?” '
  '7':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “It is not for you to know the times or epochs which the Father has fixed by His own authority.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But you will receive power '
  - type: text
    content: and
  - type: text
    content: ' ability when the Holy Spirit comes upon you; and you will be My witnesses'
  - type: text
    content: ' [to tell people about Me] '
  - type: text
    content: both in Jerusalem and in all Judea, and Samaria, and even to the ends of the earth.”
  - type: heading
    content: The Ascension
  '9':
  - type: text
    content: 'And after He said these things, He was caught up as they looked on, and a cloud took Him up out of their sight. '
