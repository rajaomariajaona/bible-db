document_id: EZR.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Temple Work Resumed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when the prophets, Haggai the prophet and Zechariah, the son (grandson) of Iddo, prophesied to the Jews who were in Judah and Jerusalem in the name of the God of Israel, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: whose Spirit was
  - type: text
    text: ' over them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'then Zerubbabel the son of Shealtiel [heir to the throne of Judah] and Jeshua the son of Jozadak arose and began to rebuild the house of God in Jerusalem; and the prophets of God [Haggai and Zechariah] were with them, supporting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging them. [Hag 1:12-14; Matt 1:12, 13]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'At that time Tattenai, the governor of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the province
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: beyond
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'on the west side of the [Euphrates] River, and Shethar-bozenai and their colleagues came to them and said, “Who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seventeen or eighteen years had passed since Cyrus issued his decree.
    marker-yv: yv-n
  - type: text
    text: 'issued you a decree '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' authorized you to rebuild this temple and to restore this wall (shrine)?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then, accordingly, we told them the names of the men who were reconstructing this building. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But the eye of their God was on the elders of the Jews, so they [Tattenai and the others] did not stop them until a report could come before Darius, and then an answer was returned by letter concerning it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Adversaries Write to Darius
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: This is
  - type: text
    text: ' a copy of the letter that Tattenai, governor of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the province
  - type: text
    text: ' west of the [Euphrates] River, and Shethar-bozenai and his associates, the officials who were west of the River, sent to Darius the king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They sent a report to him in which it was written: “To Darius the king, all peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let it be known to the king that we have gone to the province of Judah, to the house of the great God. It is being built with huge stones, with beams laid in the walls; and this work goes on with diligence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' care and is succeeding in their hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then we asked those elders, ‘Who issued you a decree to rebuild this temple and to finish this structure?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We also asked them their names so that we might notify you, and so that we might record the names of the men '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: at their head
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'in charge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They replied, ‘We are servants of the God of heaven and earth, and are rebuilding the temple which was erected many years ago, which a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Solomon began the temple in 966 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . The work was completed in about seven years (1 Kin 6:1, 38).
    marker-yv: yv-n
  - type: text
    text: 'great king of Israel built and finished. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But because our fathers provoked the God of heaven to wrath, He handed them over to Nebuchadnezzar king of Babylon, the Chaldean, who destroyed this temple and exiled the people to Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But in the first year of Cyrus king of Babylon, [the same] King Cyrus issued a decree to rebuild this house of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Also the gold and silver utensils of the house of God which Nebuchadnezzar had taken from the temple in Jerusalem and had brought into the temple of Babylon, King Cyrus took from the temple of Babylon and had them given to a man whose name was Sheshbazzar, whom he had appointed governor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And Cyrus said to him, “Take these utensils, go and deposit them in the temple in Jerusalem, and let the house of God be rebuilt on its site.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then that Sheshbazzar came and laid the foundations of the house of God in Jerusalem; and from then until now it has been under construction and is not yet completed.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So now, if it pleases the king, let a search be conducted in the king’s treasure house [in the royal archives] there in Babylon to see if it is true that a decree was issued by King Cyrus to rebuild this house of God at Jerusalem; and let the king send us his decision concerning this matter.”
