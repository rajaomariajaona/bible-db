        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The natural harbor of the city of Joppa (modern Jaffa, Israel) has been in use since the Bronze Age. It was the port of entry for the cedars of Lebanon for Solomon’s temple (2 Chr 2:16), and again for the second temple of Jerusalem (Ezra 3:7). It is located just south of Tel Aviv.
    marker-yv: yv-n
  - type: text
