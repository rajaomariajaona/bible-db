    - type: text
      text: '10'
  - type: text
    text: Then the men became extremely frightened and said to him, “How could you do this?” For the men knew that he was running from the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jonah probably had informed them when he first boarded (cf v 3) but they may not have taken him seriously, or perhaps they were just indifferent to his reason for the voyage. Now that they were in mortal danger, they believed him.
    marker-yv: yv-n
  - type: text
    text: 'because he had told them. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they said to him, “What should we do to you, so that the sea will become calm for us?”—for the sea was becoming more and more violent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jonah said to them, “Pick me up and throw me into the sea. Then the sea will become calm for you, for I know that it is because of me that this great storm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has come
  - type: text
    text: ' upon you.” '
  - type: usfm
    marker: v
    metadata:
