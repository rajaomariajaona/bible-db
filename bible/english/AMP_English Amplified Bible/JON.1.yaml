    - type: text
      text: '5'
  - type: text
    text: 'Then the sailors were afraid, and each man cried out to his god; and to lighten the ship [and diminish the danger] they threw the ship’s cargo into the sea. But Jonah had gone below into the hold of the ship and had lain down and was sound asleep. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So the captain came up to him and said, “How can you stay asleep? Get up! Call on your god! Perhaps your god will give a thought to us so that we will not perish.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
