  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nevertheless, the men rowed hard [breaking through the waves] to return to land, but they could not, because the sea became even more violent [surging higher] against them. '
  - type: usfm
    marker: v
    metadata:
