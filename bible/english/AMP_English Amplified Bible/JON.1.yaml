    - type: text
      text: '14'
  - type: text
    text: Then they called on the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and said, “Please, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', do not let us perish because of taking this man’s life, and do not make us accountable for innocent blood; for You, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', have done as You pleased.”'
- type: usfm
