      - type: text
        text: The city of Nineveh was the magnificent capital of the Assyrian Empire. The great palace of Sennacherib was without rival and contained seventy or more rooms. The city was home to more than 120,000 residents (at least twice the size of Babylon) and had no less than fifteen gates in the wall surrounding the city. During this period of time it was probably the largest city in the known world. Built near the juncture of the Tigris River and its tributary the Khoser, it was served by an elaborate water system of eighteen canals. Nineveh had many suburbs, three are mentioned along with Nineveh in Gen 10:11, 12. Nineveh’s extensive ruins are located near the modern city of Mosul, Iraq.
    marker-yv: yv-n
  - type: text
    text: 'Nineveh, that great city, and proclaim [judgment] against it, for their wickedness has come up before Me.” [Gen 10:11, 12] '
  - type: usfm
