    children:
    - type: text
      text: '7'
  - type: text
    text: 'And they said to another, “Come, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To these sailors, who undoubtedly believed in their own pagan gods, the casting of lots was a way to allow the gods to express themselves since only they could control how a lot fell. In this case, it is possible that God intervened to identify Jonah as the guilty party.
    marker-yv: yv-n
  - type: text
    text: 'let us cast lots, so we may learn who is to blame for this disaster.” So they cast lots and the lot fell on Jonah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then they said to him, “Now tell us! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The questions asked indicate that the sailors were afraid of Jonah even before he confessed his worship of the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' (v 9). The lot had already confirmed that he was responsible, but instead of acting on that they gave him the option of blaming someone else. The other questions are typical of what one would ask any stranger.'
    marker-yv: yv-n
  - type: text
    text: 'Who is to blame for this disaster? What is your occupation? Where do you come from? What is your country?” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So he said to them, “I am a Hebrew, and I [reverently] fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of heaven, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was an important addition to Jonah’s description of God, because most people who believed in pagan gods had different deities for different regions of the created world, and often they also worshiped deities of their own localities. Jonah was affirming that there is only one true God.
    marker-yv: yv-n
  - type: text
    text: who made the sea and the dry land.”
