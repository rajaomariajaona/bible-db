      children:
      - type: text
        text: Possibly Tartessos in southwest Spain.
    marker-yv: yv-n
  - type: text
    text: Tarshish [the most remote of the Phoenician trading cities]. So he paid the fare and went down into the ship to go with them to Tarshish away from the presence of the L
  - type: usfm
