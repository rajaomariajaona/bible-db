      - type: text
        text: The ancient Hebrew term “fish” did not make a distinction between fish and marine mammals. There are no marine creatures known today which would be capable of swallowing a man, either because of their anatomy or because of their observed behavior. It is possible that the creature that swallowed Jonah has long since been extinct, or even that it was uniquely created by God for this one purpose.
    marker-yv: yv-n
  - type: text
    text: 'fish to swallow Jonah. And Jonah was in the stomach of the fish '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus cited Jonah’s experience as a sign of His resurrection (Matt 12:40).
    marker-yv: yv-n
  - type: text
    text: three days and three nights. [Matt 12:40]
