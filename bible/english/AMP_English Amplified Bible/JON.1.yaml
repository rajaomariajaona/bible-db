      - type: text
        text: Jonah, the only prophet known to attempt to run away from a divinely appointed mission, lived during the time when Jeroboam II ruled Israel (the ten tribes of the Northern Kingdom). He was from the town of Gath-Hepher in Galilee.
    marker-yv: yv-n
  - type: text
    text: 'Jonah the son of Amittai, saying, '
