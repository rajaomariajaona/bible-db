    - type: text
      text: Thanksgiving for Deliverance from Death.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A Psalm; a Song at the Dedication of the House (Temple). '
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will extol '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise You, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for You have lifted me up,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have not let my enemies rejoice over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I cried to You for help, and You have healed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You have brought my life up from Sheol (the nether world, the place of the dead);'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have kept me alive, so that I would not go down to the pit (grave).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', O you His godly ones,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And give thanks at the mention of His holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For His anger is but for a moment,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in His favor is life.
    marker-yv: yv-n
  - type: text
    text: His favor is for a lifetime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weeping may endure for a night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a shout of joy comes in the morning. [2 Cor 4:17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶As for me, in my prosperity I said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I shall never be moved.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'By Your favor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' grace, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you have made my mountain stand strong;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You hid Your face, and I was horrified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I called to You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the Lord I made supplication (specific request).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “What profit is there in my blood (death), if I go down to the pit (grave)?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will the dust praise You? Will it declare Your faithfulness [to man]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶“Hear, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', be gracious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' show favor to me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', be my helper.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You have turned my mourning into dancing for me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have taken off my sackcloth and clothed me with joy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: That my soul may sing praise to You and not be silent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God, I will give thanks to You forever.'
