document_id: NUM.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Law of the Nazirites
  - type: text
    content: Again the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'On the eighth day he shall bring two turtledoves or two young pigeons to the priest, to the doorway of the Tent of Meeting (tabernacle). '
  '11':
  - type: text
    content: 'The priest shall offer the one as a sin offering and the other as a burnt offering and make atonement for him concerning his sin because of the [dead] body. He shall consecrate his head the same day, '
  '12':
  - type: text
    content: and he shall dedicate himself to the L
  - type: heading
    content: ord
  - type: text
    content: ' for the time of his separation and shall bring a male lamb a year old as a guilt offering; but the previous days will be void '
  - type: text
    content: and
  - type: text
    content: ' lost, because his separation was defiled.'
  '13':
  - type: text
    content: '‘Now this is the law of the Nazirite when the days of his separation '
  - type: text
    content: and
  - type: text
    content: ' dedication are fulfilled: he shall bring the offering to the doorway of the Tent of Meeting (tabernacle). '
  '14':
  - type: text
    content: And he shall offer his gift to the L
  - type: heading
    content: ord
  - type: text
    content: ': one male lamb a year old without blemish as a burnt offering, and one female lamb a year old without blemish as a sin offering, and one ram without blemish as a peace offering, '
  '15':
  - type: text
    content: 'and a basket of unleavened bread, cakes of fine flour mixed with oil, and wafers of unleavened bread spread with oil, along with their grain offering and their drink offering. '
  '16':
  - type: text
    content: Then the priest shall present them before the L
  - type: heading
    content: ord
  - type: text
    content: ' and shall offer the person’s sin offering and his burnt offering. '
  '17':
  - type: text
    content: He shall also offer the ram as a sacrifice of peace offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ', together with the basket of unleavened bread; the priest shall offer also its grain offering and its drink offering. '
  '18':
  - type: text
    content: 'The Nazirite shall shave his dedicated head at the doorway of the Tent of Meeting (tabernacle), and take the dedicated hair of his head and put it on the fire which is under the sacrifice of the peace offerings. '
  '19':
  - type: text
    content: 'The priest shall take the boiled shoulder of the ram, and one unleavened [ring-shaped] loaf out of the basket, and one unleavened flat cake and shall put them on the hands of the Nazirite after he has shaved his dedicated '
  - type: text
    content: hair
  - type: text
    content: '. '
  '2':
  - type: text
    content: '“Say to the sons of Israel, ‘When a man or a woman makes a special vow, the vow of a Nazirite, that is, one separated '
  - type: text
    content: and
  - type: text
    content: ' dedicated to the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
  '20':
  - type: text
    content: Then the priest shall wave them as a wave offering before the L
  - type: heading
    content: ord
  - type: text
    content: ; they are a holy portion for the priest, together with the breast that is waved and the thigh that is offered by lifting up; and afterward the Nazirite may drink wine.’
  '21':
  - type: text
    content: '“This is the law for the '
  - type: note
    content: Normally, the Nazirite vow was for a limited duration (usually two weeks). Samson’s Nazirite vow was special in that it seemed to have involved a lifetime commitment (Judg 13:1-16:31).
  - type: text
    content: Nazirite who vows his offering to the L
  - type: heading
    content: ord
  - type: text
    content: ' for his separation, besides what else '
  - type: note
    content: Lit his hand can reach.
  - type: text
    content: 'he is able to afford, according to the vow which he has vowed; so shall he do according to the law for his separation '
  - type: text
    content: and
  - type: text
    content: ' abstinence [as a Nazirite].” [Acts 21:24, 26]'
  - type: heading
    content: Aaron’s Benediction
  '22':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '23':
  - type: text
    content: '“Speak to Aaron and his sons, saying, ‘This is the way you shall bless the Israelites. Say to them:'
  '24':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' bless you, and keep you [protect you, sustain you, and guard you];'
  '25':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' make His face shine upon you [with favor],'
  - type: text
    content: And be gracious to you [surrounding you with lovingkindness];
  '26':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' lift up His countenance (face) upon you [with divine approval],'
  - type: text
    content: And give you peace [a tranquil heart and life].’
  '27':
  - type: text
    content: So Aaron and his sons shall put My name upon the children of Israel, and I will bless them.”
  '3':
  - type: text
    content: 'he shall abstain from wine and strong drink; he shall drink no vinegar, whether made from wine or strong drink, nor shall he drink any grape juice nor eat fresh or dried grapes. [Luke 1:15] '
  '4':
  - type: note
    content: Lit All the days of his consecration and so throughout.
  - type: text
    content: All the time of his separation he shall not eat anything produced from the grapevine, from the seeds even to the skins.
  '5':
  - type: text
    content: ‘All the time of the vow of his separation no razor shall be used on his head. Until the time of his separation to the L
  - type: heading
    content: ord
  - type: text
    content: ' is completed, he shall be holy, and shall let the hair of his head grow long.'
  '6':
  - type: text
    content: ‘All the time that he separates himself to the L
  - type: heading
    content: ord
  - type: text
    content: ' he shall not go near a dead body. '
  '7':
  - type: text
    content: 'He shall not make himself [ceremonially] unclean for his father, mother, brother, or sister, when they die, because [the responsibility for] his separation to God is on his head. '
  '8':
  - type: text
    content: All the time of his separation he is holy to the L
  - type: heading
    content: ord
  - type: text
    content: .
  '9':
  - type: text
    content: '‘If a man dies very suddenly beside him, and he defiles his dedicated head, then he shall shave his head on the day that he becomes [ceremonially] clean; he shall shave it on the seventh day [the end of the purification period]. '
