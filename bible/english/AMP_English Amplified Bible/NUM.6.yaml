document_id: NUM.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Law of the Nazirites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Again the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Say to the sons of Israel, ‘When a man or a woman makes a special vow, the vow of a Nazirite, that is, one separated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedicated to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'he shall abstain from wine and strong drink; he shall drink no vinegar, whether made from wine or strong drink, nor shall he drink any grape juice nor eat fresh or dried grapes. [Luke 1:15] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: All the days of his consecration
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: All the time of his separation he shall not eat anything produced from the grapevine, from the seeds even to the skins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘All the time of the vow of his separation no razor shall be used on his head. Until the time of his separation to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is completed, he shall be holy, and shall let the hair of his head grow long.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ‘All the time that he separates himself to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' he shall not go near a dead body. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He shall not make himself [ceremonially] unclean for his father, mother, brother, or sister, when they die, because [the responsibility for] his separation to God is on his head. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: All the time of his separation he is holy to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '‘If a man dies very suddenly beside him, and he defiles his dedicated head, then he shall shave his head on the day that he becomes [ceremonially] clean; he shall shave it on the seventh day [the end of the purification period]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the eighth day he shall bring two turtledoves or two young pigeons to the priest, to the doorway of the Tent of Meeting (tabernacle). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The priest shall offer the one as a sin offering and the other as a burnt offering and make atonement for him concerning his sin because of the [dead] body. He shall consecrate his head the same day, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: and he shall dedicate himself to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for the time of his separation and shall bring a male lamb a year old as a guilt offering; but the previous days will be void '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lost, because his separation was defiled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '‘Now this is the law of the Nazirite when the days of his separation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' dedication are fulfilled: he shall bring the offering to the doorway of the Tent of Meeting (tabernacle). '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And he shall offer his gift to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': one male lamb a year old without blemish as a burnt offering, and one female lamb a year old without blemish as a sin offering, and one ram without blemish as a peace offering, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and a basket of unleavened bread, cakes of fine flour mixed with oil, and wafers of unleavened bread spread with oil, along with their grain offering and their drink offering. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then the priest shall present them before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and shall offer the person’s sin offering and his burnt offering. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He shall also offer the ram as a sacrifice of peace offerings to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', together with the basket of unleavened bread; the priest shall offer also its grain offering and its drink offering. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The Nazirite shall shave his dedicated head at the doorway of the Tent of Meeting (tabernacle), and take the dedicated hair of his head and put it on the fire which is under the sacrifice of the peace offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The priest shall take the boiled shoulder of the ram, and one unleavened [ring-shaped] loaf out of the basket, and one unleavened flat cake and shall put them on the hands of the Nazirite after he has shaved his dedicated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then the priest shall wave them as a wave offering before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; they are a holy portion for the priest, together with the breast that is waved and the thigh that is offered by lifting up; and afterward the Nazirite may drink wine.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“This is the law for the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Normally, the Nazirite vow was for a limited duration (usually two weeks). Samson’s Nazirite vow was special in that it seemed to have involved a lifetime commitment (Judg 13:1-16:31).
    marker-yv: yv-n
  - type: text
    text: Nazirite who vows his offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for his separation, besides what else '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his hand can reach
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'he is able to afford, according to the vow which he has vowed; so shall he do according to the law for his separation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abstinence [as a Nazirite].” [Acts 21:24, 26]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Aaron’s Benediction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“Speak to Aaron and his sons, saying, ‘This is the way you shall bless the Israelites. Say to them:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' bless you, and keep you [protect you, sustain you, and guard you];'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' make His face shine upon you [with favor],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And be gracious to you [surrounding you with lovingkindness];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ¶The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' lift up His countenance (face) upon you [with divine approval],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And give you peace [a tranquil heart and life].’
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So Aaron and his sons shall put My name upon the children of Israel, and I will bless them.”
