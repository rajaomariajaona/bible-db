document_id: PSA.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 18
  - type: heading
    content: David Praises the Lord for Rescuing Him.
  - type: text
    content: To the Chief Musician. A Psalm of David, the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ', who spoke the words of this song to the L'
  - type: heading
    content: ord
  - type: text
    content: ' on the day when the L'
  - type: heading
    content: ord
  - type: text
    content: ' rescued him from the hand of all his enemies and from the hand of Saul. And he said:'
  - type: text
    content: “I love You [fervently and devotedly], O L
  - type: heading
    content: ord
  - type: text
    content: ', my strength.”'
  '10':
  - type: text
    content: And He rode upon a cherub (storm) and flew;
  - type: text
    content: And He sped on the wings of the wind.
  '11':
  - type: text
    content: He made darkness His hiding place (covering); His pavilion (canopy) around Him,
  - type: text
    content: The darkness of the waters, the thick clouds of the skies.
  '12':
  - type: text
    content: Out of the brightness before Him passed His thick clouds,
  - type: text
    content: Hailstones and coals of fire.
  '13':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' also thundered in the heavens,'
  - type: text
    content: And the Most High uttered His voice,
  - type: text
    content: Hailstones and coals of fire.
  '14':
  - type: text
    content: He sent out His arrows and scattered them;
  - type: text
    content: 'And '
  - type: text
    content: He sent
  - type: text
    content: ' an abundance of lightning flashes and confused '
  - type: text
    content: and
  - type: text
    content: ' routed them [in defeat].'
  '15':
  - type: text
    content: Then the stream beds of the waters appeared,
  - type: text
    content: And the foundations of the world were laid bare
  - type: text
    content: At Your rebuke, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: At the blast of the breath of Your nostrils.
  '16':
  - type: text
    content: ¶He reached from on high, He took me;
  - type: text
    content: He drew me out of many waters.
  '17':
  - type: text
    content: He rescued me from my strong enemy,
  - type: text
    content: And from those who hated me, for they were too strong for me.
  '18':
  - type: text
    content: They confronted me in the day of my disaster,
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' was my support.'
  '19':
  - type: text
    content: He brought me out into a broad place;
  - type: text
    content: 'He rescued me because He was pleased with me '
  - type: text
    content: and
  - type: text
    content: ' delighted in me.'
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is my rock, my fortress, and the One who rescues me;'
  - type: text
    content: 'My God, my rock '
  - type: text
    content: and
  - type: text
    content: ' strength in whom I trust '
  - type: text
    content: and
  - type: text
    content: ' take refuge;'
  - type: text
    content: My shield, and the horn of my salvation, my high tower—my stronghold. [Heb 2:13]
  '20':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' dealt with me according to my righteousness (moral character, spiritual integrity);'
  - type: text
    content: According to the cleanness of my hands He has rewarded me.
  '21':
  - type: text
    content: For I have kept the ways of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And have not wickedly departed from my God.
  '22':
  - type: text
    content: For all His ordinances were before me,
  - type: text
    content: And I did not put away His statutes from me.
  '23':
  - type: text
    content: 'I was '
  - type: note
    content: Lit complete; or having integrity; or perfect.
  - type: text
    content: blameless before Him,
  - type: text
    content: And I kept myself free from my sin.
  '24':
  - type: text
    content: Therefore the L
  - type: heading
    content: ord
  - type: text
    content: ' has rewarded me according to my righteousness (moral character, spiritual integrity),'
  - type: text
    content: According to the cleanness of my hands in His sight.
  '25':
  - type: text
    content: ¶With the kind (merciful, faithful, loyal) You show Yourself kind,
  - type: text
    content: With the blameless You show Yourself blameless,
  '26':
  - type: text
    content: With the pure You show Yourself pure,
  - type: text
    content: And with the crooked You show Yourself astute.
  '27':
  - type: text
    content: 'For You save an afflicted '
  - type: text
    content: and
  - type: text
    content: ' humble people,'
  - type: text
    content: But bring down those [arrogant fools] with haughty eyes.
  '28':
  - type: text
    content: 'For You cause my lamp to be lighted '
  - type: text
    content: and
  - type: text
    content: ' to shine;'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' my God illumines my darkness.'
  '29':
  - type: text
    content: For by You I can crush a troop,
  - type: text
    content: And by my God I can leap over a wall.
  '3':
  - type: text
    content: I call upon the L
  - type: heading
    content: ord
  - type: text
    content: ', who is worthy to be praised;'
  - type: text
    content: And I am saved from my enemies. [Rev 5:12]
  '30':
  - type: text
    content: '¶As for God, His way is '
  - type: note
    content: See v 23.
  - type: text
    content: blameless.
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' is tested [it is perfect, it is faultless];'
  - type: text
    content: He is a shield to all who take refuge in Him.
  '31':
  - type: text
    content: For who is God, but the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: Or who is a rock, except our God,
  '32':
  - type: text
    content: The God who encircles me with strength
  - type: text
    content: And makes my way blameless?
  '33':
  - type: text
    content: 'He makes my feet like '
  - type: note
    content: I.e. the hoofs of a doe.
  - type: text
    content: hinds’ feet [able to stand firmly and tread safely on paths of testing and trouble];
  - type: text
    content: He sets me [securely] upon my high places.
  '34':
  - type: text
    content: He trains my hands for war,
  - type: text
    content: So that my arms can bend a bow of bronze.
  '35':
  - type: text
    content: You have also given me the shield of Your salvation,
  - type: text
    content: 'And Your right hand upholds '
  - type: text
    content: and
  - type: text
    content: ' sustains me;'
  - type: text
    content: Your gentleness [Your gracious response when I pray] makes me great.
  '36':
  - type: text
    content: 'You enlarge the path beneath me '
  - type: text
    content: and
  - type: text
    content: ' make my steps secure,'
  - type: text
    content: So that my feet will not slip.
  '37':
  - type: text
    content: ¶I pursued my enemies and overtook them;
  - type: text
    content: And I did not turn back until they were consumed.
  '38':
  - type: text
    content: I shattered them so that they were not able to rise;
  - type: text
    content: They fell [wounded] under my feet.
  '39':
  - type: text
    content: For You have encircled me with strength for the battle;
  - type: text
    content: You have subdued under me those who rose up against me.
  '4':
  - type: text
    content: ¶The cords of death surrounded me,
  - type: text
    content: 'And the streams of ungodliness '
  - type: text
    content: and
  - type: text
    content: ' torrents of destruction terrified me.'
  '40':
  - type: text
    content: You have also made my enemies turn their backs to me [in defeat],
  - type: text
    content: 'And I silenced '
  - type: text
    content: and
  - type: text
    content: ' destroyed those who hated me.'
  '41':
  - type: text
    content: They cried for help, but there was no one to save them—
  - type: text
    content: Even to the L
  - type: heading
    content: ord
  - type: text
    content: ' [they cried], but He did not answer them.'
  '42':
  - type: text
    content: Then I beat them fine as the dust before the wind;
  - type: text
    content: I emptied them out as the dirt of the streets.
  '43':
  - type: text
    content: ¶You have rescued me from the contentions of the people;
  - type: text
    content: You have placed me as the head of the nations;
  - type: text
    content: A people whom I have not known serve me.
  '44':
  - type: text
    content: 'As soon as they hear me, they respond '
  - type: text
    content: and
  - type: text
    content: ' obey me;'
  - type: text
    content: Foreigners feign obedience to me.
  '45':
  - type: text
    content: Foreigners lose heart,
  - type: text
    content: And come trembling out of their strongholds.
  '46':
  - type: text
    content: ¶The L
  - type: heading
    content: ord
  - type: text
    content: ' lives, blessed be my rock;'
  - type: text
    content: And may the God of my salvation be exalted,
  '47':
  - type: text
    content: The God who avenges me,
  - type: text
    content: And subdues peoples (nations) under me.
  '48':
  - type: text
    content: He rescues me from my enemies;
  - type: text
    content: Yes, You lift me up above those who rise up against me;
  - type: text
    content: You deliver me from the man of violence.
  '49':
  - type: text
    content: 'Therefore will I give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise You, O L'
  - type: heading
    content: ord
  - type: text
    content: ', among the nations,'
  - type: text
    content: And sing praises to Your name. [Rom 15:9]
  '5':
  - type: text
    content: The cords of Sheol (the nether world, the place of the dead) surrounded me;
  - type: text
    content: The snares of death confronted me.
  '50':
  - type: text
    content: He gives great triumphs to His king,
  - type: text
    content: 'And shows steadfast love '
  - type: text
    content: and
  - type: text
    content: ' mercy to His anointed,'
  - type: text
    content: To David and his descendants forever. [2 Sam 22:2-51]
  '6':
  - type: text
    content: In my distress [when I seemed surrounded] I called upon the L
  - type: heading
    content: ord
  - type: text
    content: And cried to my God for help;
  - type: text
    content: He heard my voice from His temple,
  - type: text
    content: 'And my cry for help came before Him, into His '
  - type: text
    content: very
  - type: text
    content: ' ears.'
  '7':
  - type: text
    content: ¶Then the earth shook and quaked,
  - type: text
    content: The foundations of the mountains trembled;
  - type: text
    content: 'They were shaken because He was indignant '
  - type: text
    content: and
  - type: text
    content: ' angry.'
  '8':
  - type: text
    content: Smoke went up from His nostrils,
  - type: text
    content: And fire from His mouth devoured;
  - type: text
    content: Coals were kindled by it.
  '9':
  - type: text
    content: He bowed the heavens also and came down;
  - type: text
    content: And thick darkness was under His feet.
