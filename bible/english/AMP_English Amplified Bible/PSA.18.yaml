document_id: PSA.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Praises the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' for Rescuing Him.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David, the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who spoke the words of this song to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the day when the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rescued him from the hand of all his enemies and from the hand of Saul. And he said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “I love You [fervently and devotedly], O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', my strength.”'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And He rode upon a cherub (storm) and flew;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He sped on the wings of the wind.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He made darkness His hiding place (covering); His pavilion (canopy) around Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The darkness of the waters, the thick clouds of the skies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Out of the brightness before Him passed His thick clouds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hailstones and coals of fire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also thundered in the heavens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the Most High uttered His voice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hailstones and coals of fire.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He sent out His arrows and scattered them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He sent
    - type: text
      text: ' an abundance of lightning flashes and confused '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' routed them [in defeat].'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then the stream beds of the waters appeared,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the foundations of the world were laid bare
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At Your rebuke, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the blast of the breath of Your nostrils.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ¶He reached from on high, He took me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He drew me out of many waters.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He rescued me from my strong enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from those who hated me, for they were too strong for me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They confronted me in the day of my disaster,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was my support.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He brought me out into a broad place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He rescued me because He was pleased with me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delighted in me.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is my rock, my fortress, and the One who rescues me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My God, my rock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strength in whom I trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' take refuge;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My shield, and the horn of my salvation, my high tower—my stronghold. [Heb 2:13]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' dealt with me according to my righteousness (moral character, spiritual integrity);'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to the cleanness of my hands He has rewarded me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For I have kept the ways of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have not wickedly departed from my God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For all His ordinances were before me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I did not put away His statutes from me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: complete;
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: having integrity;
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: perfect
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: blameless before Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I kept myself free from my sin.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has rewarded me according to my righteousness (moral character, spiritual integrity),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to the cleanness of my hands in His sight.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ¶With the kind (merciful, faithful, loyal) You show Yourself kind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the blameless You show Yourself blameless,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: With the pure You show Yourself pure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with the crooked You show Yourself astute.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'For You save an afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humble people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But bring down those [arrogant fools] with haughty eyes.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For You cause my lamp to be lighted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to shine;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God illumines my darkness.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: For by You I can crush a troop,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by my God I can leap over a wall.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I call upon the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who is worthy to be praised;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I am saved from my enemies. [Rev 5:12]
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '¶As for God, His way is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See v 23.
      marker-yv: yv-n
    - type: text
      text: blameless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is tested [it is perfect, it is faultless];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is a shield to all who take refuge in Him.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: For who is God, but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or who is a rock, except our God,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The God who encircles me with strength
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes my way blameless?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He makes my feet like '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the hoofs of a doe.
      marker-yv: yv-n
    - type: text
      text: hinds’ feet [able to stand firmly and tread safely on paths of testing and trouble];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets me [securely] upon my high places.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: He trains my hands for war,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that my arms can bend a bow of bronze.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: You have also given me the shield of Your salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Your right hand upholds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sustains me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your gentleness [Your gracious response when I pray] makes me great.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'You enlarge the path beneath me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' make my steps secure,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that my feet will not slip.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ¶I pursued my enemies and overtook them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I did not turn back until they were consumed.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: I shattered them so that they were not able to rise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They fell [wounded] under my feet.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: For You have encircled me with strength for the battle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have subdued under me those who rose up against me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ¶The cords of death surrounded me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the streams of ungodliness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' torrents of destruction terrified me.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: You have also made my enemies turn their backs to me [in defeat],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I silenced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed those who hated me.'
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: They cried for help, but there was no one to save them—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [they cried], but He did not answer them.'
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Then I beat them fine as the dust before the wind;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I emptied them out as the dirt of the streets.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ¶You have rescued me from the contentions of the people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have placed me as the head of the nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A people whom I have not known serve me.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'As soon as they hear me, they respond '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obey me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foreigners feign obedience to me.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Foreigners lose heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And come trembling out of their strongholds.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, blessed be my rock;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may the God of my salvation be exalted,
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: The God who avenges me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And subdues peoples (nations) under me.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: He rescues me from my enemies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, You lift me up above those who rise up against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You deliver me from the man of violence.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Therefore will I give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise You, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', among the nations,'
  - type: usfm
    marker: q1
    children:
