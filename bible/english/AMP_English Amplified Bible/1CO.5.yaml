verses:
  '1':
  - type: heading
    content: Immorality Rebuked
  - type: text
    content: 'It is actually reported [everywhere] that there is sexual immorality among you, a kind of immorality that is condemned even among the [unbelieving] Gentiles: that someone '
  - type: note
    content: Some maintain that the man had married his stepmother. The marriage, if it occurred, was illegal and invalid by both Jewish and Roman law.
  - type: text
    content: 'has [an intimate relationship with] his father’s wife. [Deut 22:30; 27:20] '
  '10':
  - type: text
    content: 'not meaning the immoral people of this world, or the greedy ones and swindlers, or idolaters, for then you would have to get out of the world '
  - type: text
    content: and
  - type: text
    content: ' human society altogether! '
  '11':
  - type: text
    content: 'But actually, I have written to you not to associate with any so-called [Christian] brother if he is sexually immoral or greedy, or is an idolater [devoted to anything that takes the place of God], or is a reviler [who insults or slanders or otherwise verbally abuses others], or is a drunkard or a swindler—you must not so much as '
  - type: note
    content: In ancient times eating together was an open display of friendship and acceptance of one another.
  - type: text
    content: 'eat with such a person. [2 Thess 3:6] '
  '12':
  - type: text
    content: 'For what business is it of mine to judge outsiders (non-believers)? Do you not judge those who are within '
  - type: text
    content: the church
  - type: text
    content: ' [to protect the church as the situation requires]? '
  '13':
  - type: text
    content: 'God '
  - type: text
    content: alone
  - type: text
    content: ' sits in judgment on those who are outside [the faith]. R'
  - type: heading
    content: emove the wicked one from among you
  - type: text
    content: ' [expel him from your church]. [Deut 17:7]'
  '2':
  - type: text
    content: 'And you are proud '
  - type: text
    content: and
  - type: text
    content: ' arrogant! You should have mourned in shame so that the man who has done this [disgraceful] thing would be removed from your fellowship!'
  '3':
  - type: text
    content: 'For I, though absent [from you] in body but present in spirit, have already passed judgment on him who has committed this [act], as if I were present. '
  '4':
  - type: text
    content: 'In the name of our Lord Jesus, when you are assembled, and I am with you in spirit, with the power of our Lord Jesus, '
  '5':
  - type: text
    content: 'you are to '
  - type: note
    content: Probably a call for the man to be excommunicated and removed from the safety and blessing of the church.
  - type: text
    content: hand over this man to Satan for the destruction of his body, so that his spirit may be saved in the day of the Lord Jesus.
  '6':
  - type: text
    content: 'Your boasting [over the supposed spirituality of your church] is not good [indeed, it is vulgar and inappropriate]. '
  - type: note
    content: See note 3:16.
  - type: text
    content: 'Do you not know that [just] a little leaven ferments the whole batch [of dough, just as a little sin corrupts a person or an entire church]? '
  '7':
  - type: note
    content: Paul is using the Passover celebration as an analogy. Leading up to the Passover meal was the Feast of Unleavened Bread (Ex 12:17-20), during which the Israelites were to remove all leaven from their homes to symbolize the removal of sin from their lives. Leaven (yeast) was often used as a symbol of spiritual corruption.
  - type: text
    content: 'Clean out the old leaven so that you may be a new batch, just as you are, still unleavened. For Christ our Passover Lamb has been sacrificed. '
  '8':
  - type: text
    content: 'Therefore, let us celebrate the feast, not with old leaven, nor with leaven of vice '
  - type: text
    content: and
  - type: text
    content: ' malice and wickedness, but with the unleavened bread of sincerity and [untainted] truth. [Ex 12:19; 13:7; Deut 16:3]'
  '9':
  - type: text
    content: 'I wrote you in my [previous] letter not to associate with [sexually] immoral people— '
