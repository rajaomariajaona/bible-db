document_id: 1CO.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Immorality Rebuked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'It is actually reported [everywhere] that there is sexual immorality among you, a kind of immorality that is condemned even among the [unbelieving] Gentiles: that someone '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some maintain that the man had married his stepmother. The marriage, if it occurred, was illegal and invalid by both Jewish and Roman law.
      marker-yv: yv-n
    - type: text
      text: 'has [an intimate relationship with] his father’s wife. [Deut 22:30; 27:20] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'not meaning the immoral people of this world, or the greedy ones and swindlers, or idolaters, for then you would have to get out of the world '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' human society altogether! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But actually, I have written to you not to associate with any so-called [Christian] brother if he is sexually immoral or greedy, or is an idolater [devoted to anything that takes the place of God], or is a reviler [who insults or slanders or otherwise verbally abuses others], or is a drunkard or a swindler—you must not so much as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In ancient times eating together was an open display of friendship and acceptance of one another.
      marker-yv: yv-n
    - type: text
      text: 'eat with such a person. [2 Thess 3:6] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For what business is it of mine to judge outsiders (non-believers)? Do you not judge those who are within '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the church
    - type: text
      text: ' [to protect the church as the situation requires]? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alone
    - type: text
      text: ' sits in judgment on those who are outside [the faith]. R'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: emove the wicked one from among you
    - type: text
      text: ' [expel him from your church]. [Deut 17:7]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And you are proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant! You should have mourned in shame so that the man who has done this [disgraceful] thing would be removed from your fellowship!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For I, though absent [from you] in body but present in spirit, have already passed judgment on him who has committed this [act], as if I were present. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In the name of our Lord Jesus, when you are assembled, and I am with you in spirit, with the power of our Lord Jesus, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'you are to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably a call for the man to be excommunicated and removed from the safety and blessing of the church.
      marker-yv: yv-n
    - type: text
      text: hand over this man to Satan for the destruction of his body, so that his spirit may be saved in the day of the Lord Jesus.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Your boasting [over the supposed spirituality of your church] is not good [indeed, it is vulgar and inappropriate]. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 3:16.
      marker-yv: yv-n
    - type: text
      text: 'Do you not know that [just] a little leaven ferments the whole batch [of dough, just as a little sin corrupts a person or an entire church]? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is using the Passover celebration as an analogy. Leading up to the Passover meal was the Feast of Unleavened Bread (Ex 12:17-20), during which the Israelites were to remove all leaven from their homes to symbolize the removal of sin from their lives. Leaven (yeast) was often used as a symbol of spiritual corruption.
      marker-yv: yv-n
    - type: text
      text: 'Clean out the old leaven so that you may be a new batch, just as you are, still unleavened. For Christ our Passover Lamb has been sacrificed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore, let us celebrate the feast, not with old leaven, nor with leaven of vice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' malice and wickedness, but with the unleavened bread of sincerity and [untainted] truth. [Ex 12:19; 13:7; Deut 16:3]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I wrote you in my [previous] letter not to associate with [sexually] immoral people— '
