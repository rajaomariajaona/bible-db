  children:
  - type: text
    text: A Psalm of David. When he fled from Absalom his son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', how my enemies have increased!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many are rising up against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Many are saying of me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“There is no help [no salvation] for him in God.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Selah
      - type: text
        text: ' may mean: '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pause, Crescendo or Musical interlude
      - type: text
        text: ' or may have some other unknown meaning; and so throughout.'
    marker-yv: yv-n
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶But You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', are a shield for me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My glory [and my honor], and the One who lifts my head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: With my voice I was crying to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He answered me from His holy mountain. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I lay down and slept [safely];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I awakened, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' sustains me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will not be intimidated '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' afraid of the ten thousands'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who have set themselves against me all around.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Arise, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; save me, O my God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You have struck all my enemies on the cheek;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have shattered the teeth of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Salvation belongs to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'May Your blessing be upon Your people. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
