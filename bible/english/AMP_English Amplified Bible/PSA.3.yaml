verses:
  '1':
  - type: heading
    content: Psalm 3
  - type: heading
    content: Morning Prayer of Trust in God.
  - type: text
    content: A Psalm of David. When he fled from Absalom his son.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', how my enemies have increased!'
  - type: text
    content: Many are rising up against me.
  '2':
  - type: text
    content: Many are saying of me,
  - type: text
    content: '“There is no help [no salvation] for him in God.” '
  - type: note
    content: 'Selah may mean: Pause, Crescendo or Musical interlude or may have some other unknown meaning; and so throughout.'
  - type: text
    content: Selah.
  '3':
  - type: text
    content: ¶But You, O L
  - type: heading
    content: ord
  - type: text
    content: ', are a shield for me,'
  - type: text
    content: My glory [and my honor], and the One who lifts my head.
  '4':
  - type: text
    content: With my voice I was crying to the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And He answered me from His holy mountain. '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: I lay down and slept [safely];
  - type: text
    content: I awakened, for the L
  - type: heading
    content: ord
  - type: text
    content: ' sustains me.'
  '6':
  - type: text
    content: 'I will not be intimidated '
  - type: text
    content: or
  - type: text
    content: ' afraid of the ten thousands'
  - type: text
    content: Who have set themselves against me all around.
  '7':
  - type: text
    content: ¶Arise, O L
  - type: heading
    content: ord
  - type: text
    content: ; save me, O my God!
  - type: text
    content: For You have struck all my enemies on the cheek;
  - type: text
    content: You have shattered the teeth of the wicked.
  '8':
  - type: text
    content: Salvation belongs to the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: 'May Your blessing be upon Your people. '
  - type: text
    content: Selah.
