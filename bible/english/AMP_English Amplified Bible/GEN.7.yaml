document_id: GEN.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Flood
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Noah, “Come into the ark, you with all your household, for you [alone] I have seen as righteous (doing what is right) before Me in this generation. [Ps 27:5; 33:18, 19; 2 Pet 2:9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Of every '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This anticipates the numerous distinctions between animals for food purposes, which would later be revealed in the Mosaic Law.
    marker-yv: yv-n
  - type: text
    text: 'clean animal you shall take with you seven pair, the male and his female, and of animals that are not clean, two each the male and his female; [Lev 11:1-13] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'also of the birds of the air, seven pair, the male and the female, to keep the offspring alive on the surface of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For in seven days I am going to cause it to rain on the earth for forty days and forty nights; and I will destroy (blot out, wipe away) every living thing that I have made from the surface of the earth.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So Noah did all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded him. [Heb 11:7]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noah was six hundred years old when the flood (deluge) of water came on the earth [covering all of the land]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Noah and his sons and his wife and his sons’ wives with him entered the ark to escape the flood waters. [Matt 24:38; Luke 17:27] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The five extra pair of clean animals were for food and for sacrifice later.
    marker-yv: yv-n
  - type: text
    text: 'clean animals and animals that are not clean and birds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fowls and everything that crawls on the ground, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'they came [motivated by God] into the ark with Noah two by two, the male and the female, just as God had commanded Noah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And after the seven days [God released the rain and] the floodwaters came on the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In the six hundredth year of Noah’s life, on the seventeenth day of the second month, on that same day all the fountains of the great deep [subterranean waters] burst open, and the windows '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' floodgates of the heavens were opened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It rained on the earth for forty days and forty nights.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On the very same day Noah and Shem and Ham and Japheth, the sons of Noah, and Noah’s wife and the three wives of his sons with them, entered the ark, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'they and every animal according to its kind, all the livestock according to their kinds, every moving thing that crawls on the earth according to its kind, and every bird according to its kind, every winged thing of every sort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So they went into the ark with Noah, two by two of all living beings in which there was the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit of life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Those which entered, male and female of all flesh (creatures), entered as God had commanded Noah; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' closed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the door
  - type: text
    text: ' behind him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The flood [the great downpour of rain] was forty days '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' nights on the earth; and the waters increased and lifted up the ark, and it floated [high] above the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The waters became mighty and increased greatly on the earth, and the ark floated on the surface of the waters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The waters prevailed so greatly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were so mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overwhelming on the earth, so that all the high mountains everywhere under the heavens were covered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '[In fact] the waters became '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: About twenty-three feet.
    marker-yv: yv-n
  - type: text
    text: 'fifteen cubits higher [than the highest ground], and the mountains were covered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'All living beings that moved on the earth perished—birds and cattle (domestic animals), [wild] animals, all things that swarm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crawl on the earth, and all mankind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Everything on the dry land, all in whose nostrils was the breath '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' spirit of life, died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'God destroyed (blotted out, wiped away) every living thing that was on the surface of the earth; man and animals and the crawling things and the birds of the heavens were destroyed from the land. Only Noah and those who were with him in the ark remained alive. [Matt 24:37-44] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The waters covered [all of] the earth for a hundred and fifty days (five months).
