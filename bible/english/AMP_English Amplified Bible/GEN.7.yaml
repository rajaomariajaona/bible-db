document_id: GEN.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flood
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Noah, “Come into the ark, you with all your household, for you [alone] I have seen as righteous (doing what is right) before Me in this generation. [Ps 27:5; 33:18, 19; 2 Pet 2:9] '
  '10':
  - type: text
    content: 'And after the seven days [God released the rain and] the floodwaters came on the earth. '
  '11':
  - type: text
    content: 'In the six hundredth year of Noah’s life, on the seventeenth day of the second month, on that same day all the fountains of the great deep [subterranean waters] burst open, and the windows '
  - type: text
    content: and
  - type: text
    content: ' floodgates of the heavens were opened. '
  '12':
  - type: text
    content: It rained on the earth for forty days and forty nights.
  '13':
  - type: text
    content: 'On the very same day Noah and Shem and Ham and Japheth, the sons of Noah, and Noah’s wife and the three wives of his sons with them, entered the ark, '
  '14':
  - type: text
    content: 'they and every animal according to its kind, all the livestock according to their kinds, every moving thing that crawls on the earth according to its kind, and every bird according to its kind, every winged thing of every sort. '
  '15':
  - type: text
    content: 'So they went into the ark with Noah, two by two of all living beings in which there was the breath '
  - type: text
    content: and
  - type: text
    content: ' spirit of life. '
  '16':
  - type: text
    content: Those which entered, male and female of all flesh (creatures), entered as God had commanded Noah; and the L
  - type: heading
    content: ord
  - type: text
    content: ' closed '
  - type: text
    content: the door
  - type: text
    content: ' behind him.'
  '17':
  - type: text
    content: 'The flood [the great downpour of rain] was forty days '
  - type: text
    content: and
  - type: text
    content: ' nights on the earth; and the waters increased and lifted up the ark, and it floated [high] above the land. '
  '18':
  - type: text
    content: 'The waters became mighty and increased greatly on the earth, and the ark floated on the surface of the waters. '
  '19':
  - type: text
    content: 'The waters prevailed so greatly '
  - type: text
    content: and
  - type: text
    content: ' were so mighty '
  - type: text
    content: and
  - type: text
    content: ' overwhelming on the earth, so that all the high mountains everywhere under the heavens were covered. '
  '2':
  - type: text
    content: 'Of every '
  - type: note
    content: This anticipates the numerous distinctions between animals for food purposes, which would later be revealed in the Mosaic Law.
  - type: text
    content: 'clean animal you shall take with you seven pair, the male and his female, and of animals that are not clean, two each the male and his female; [Lev 11:1-13] '
  '20':
  - type: text
    content: '[In fact] the waters became '
  - type: note
    content: About twenty-three feet.
  - type: text
    content: 'fifteen cubits higher [than the highest ground], and the mountains were covered. '
  '21':
  - type: text
    content: 'All living beings that moved on the earth perished—birds and cattle (domestic animals), [wild] animals, all things that swarm '
  - type: text
    content: and
  - type: text
    content: ' crawl on the earth, and all mankind. '
  '22':
  - type: text
    content: 'Everything on the dry land, all in whose nostrils was the breath '
  - type: text
    content: and
  - type: text
    content: ' spirit of life, died. '
  '23':
  - type: text
    content: 'God destroyed (blotted out, wiped away) every living thing that was on the surface of the earth; man and animals and the crawling things and the birds of the heavens were destroyed from the land. Only Noah and those who were with him in the ark remained alive. [Matt 24:37-44] '
  '24':
  - type: text
    content: The waters covered [all of] the earth for a hundred and fifty days (five months).
  '3':
  - type: text
    content: 'also of the birds of the air, seven pair, the male and the female, to keep the offspring alive on the surface of the earth. '
  '4':
  - type: text
    content: 'For in seven days I am going to cause it to rain on the earth for forty days and forty nights; and I will destroy (blot out, wipe away) every living thing that I have made from the surface of the earth.” '
  '5':
  - type: text
    content: So Noah did all that the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded him. [Heb 11:7]'
  '6':
  - type: text
    content: 'Noah was six hundred years old when the flood (deluge) of water came on the earth [covering all of the land]. '
  '7':
  - type: text
    content: 'Then Noah and his sons and his wife and his sons’ wives with him entered the ark to escape the flood waters. [Matt 24:38; Luke 17:27] '
  '8':
  - type: text
    content: 'Of '
  - type: note
    content: The five extra pair of clean animals were for food and for sacrifice later.
  - type: text
    content: 'clean animals and animals that are not clean and birds '
  - type: text
    content: and
  - type: text
    content: ' fowls and everything that crawls on the ground, '
  '9':
  - type: text
    content: 'they came [motivated by God] into the ark with Noah two by two, the male and the female, just as God had commanded Noah. '
