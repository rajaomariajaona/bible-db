    - type: text
      text: '1'
  - type: text
    text: 'When it was morning, all the chief priests and the elders of the people (Sanhedrin, Jewish High Court) conferred together against Jesus, [plotting how] to put Him to death [since under Roman rule they had no power to execute anyone]; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: so they bound Him, and led Him away and handed Him over to Pilate the governor [of Judea, who had the authority to condemn prisoners to death].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When Judas, His betrayer, saw that Jesus was condemned, he was gripped with remorse and returned the thirty pieces of silver to the chief priests and the elders, [Ex 21:32] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'saying, “I have sinned by betraying innocent blood.” They replied, “What is that to us? See to that yourself!” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And throwing the pieces of silver into the temple sanctuary, he left; and went away and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly people later threw Judas’ body over the cliff into the Valley of Hinnom where his body was mangled on the rocks below (Acts 1:18). Suicides were not given a proper burial.
    marker-yv: yv-n
  - type: text
    text: 'hanged himself. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The chief priests, picking up the pieces of silver, said, “It is not lawful to put these in the treasury [of the temple], because it is the price of blood.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So after consultation they used the money to buy the Potter’s Field as a burial place for strangers. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore that piece of ground has been called the Field of Blood to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
