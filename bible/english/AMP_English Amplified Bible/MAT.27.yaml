    content: And above His head they put the accusation against Him which read, “
  - type: note
    content: The wording of the inscription, which was written in Hebrew, Latin, and Greek, varies slightly in each Gospel account and was probably a combination of them all, “This is Jesus of Nazareth, the King of the Jews.”
  - type: text
