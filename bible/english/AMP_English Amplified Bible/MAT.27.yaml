  '50':
  - type: text
    content: 'And Jesus cried out again with a loud [agonized] voice, and gave up His spirit [voluntarily, sovereignly dismissing and releasing His spirit from His body in submission to His Father’s plan]. [John 10:18] '
  '51':
  - type: text
    content: 'And [at once] the veil [of the Holy of Holies] of the temple was '
  - type: note
    content: God tearing the veil of the Holy of Holies is significant in that it symbolizes that God’s presence was now open to all people and not just the High Priest.
  - type: text
    content: 'torn in two from top to bottom; the earth shook and the rocks were split apart. [Ex 26:31-35] '
  '52':
  - type: text
    content: 'The tombs were opened, and many bodies of the saints (God’s people) who had fallen asleep [in death] were raised [to life]; '
  '53':
  - type: text
    content: 'and coming out of the tombs after His resurrection, they entered the holy city (Jerusalem) and appeared to many people. '
  '54':
  - type: text
    content: 'Now the centurion, and those who were with him keeping guard over Jesus, when they saw the earthquake and the things that were happening, they were terribly frightened '
  - type: text
    content: and
  - type: text
    content: ' filled with awe, and said, “Truly this was the Son of God!”'
  '55':
  - type: text
    content: 'There were also many women there looking on from a distance, who had accompanied Jesus from Galilee, ministering to Him. '
  '56':
  - type: text
    content: 'Among them was '
  - type: note
    content: Jesus delivered this woman from seven demons (Luke 8:2). She was from the town of Magdala in Galilee.
  - type: text
