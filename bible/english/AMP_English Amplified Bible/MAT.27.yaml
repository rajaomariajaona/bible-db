  '12':
  - type: text
    content: 'But when the charges were brought against Him by the chief priests and elders, He did not answer. [Is 53:7] '
  '13':
  - type: text
    content: 'Then Pilate said to Him, “Do You not hear how many things they are testifying against You?” '
  '14':
  - type: text
    content: But Jesus did not reply to him, not even to a single accusation, so that the governor was greatly astonished.
  '15':
  - type: text
    content: 'Now at the feast [of the Passover] the governor was in the habit of setting free any one prisoner whom the people chose. [Mark 15:6-15; Luke 23:18-25; John 18:39-19:16] '
  '16':
  - type: text
    content: 'And at that time they were holding a notorious prisoner [guilty of insurrection and murder], called Barabbas. '
  '17':
  - type: text
    content: 'So when they had assembled [for this purpose], Pilate said to them, “Whom do you want me to set free for you? Barabbas, or Jesus who is called Christ?” '
  '18':
  - type: text
    content: For Pilate knew that it was because of jealousy that the chief priests and elders had handed Jesus over to him.
  '19':
  - type: text
    content: 'While he was seated on the judgment seat, his wife sent him '
  - type: text
    content: a message,
  - type: text
    content: ' saying, “Have nothing to do with that righteous '
  - type: text
    content: and
  - type: text
    content: ' innocent Man; for last night I suffered greatly in a dream because of Him.” '
  '2':
  - type: text
    content: so they bound Him, and led Him away and handed Him over to Pilate the governor [of Judea, who had the authority to condemn prisoners to death].
  '20':
  - type: text
    content: 'But the chief priests and the elders persuaded the crowds to ask for Barabbas and to put Jesus to death. '
  '21':
  - type: text
    content: 'The governor said to them, “Which of the two do you wish me to set free for you?” And they said, “Barabbas.” '
  '22':
  - type: text
    content: 'Pilate said to them, “Then what shall I do with Jesus who is called Christ?” They all replied, “Let Him be crucified!” '
  '23':
  - type: text
    content: And he said, “Why, what has He done that is evil?” But they continued shouting all the louder, “Let Him be crucified!” [Mark 15:14; Luke 23:4, 14, 22; John 18:39; 19:4, 6]
  '24':
  - type: text
    content: 'So when Pilate saw that he was getting nowhere, but rather that a riot was breaking out, he took water and washed his hands [to ceremonially cleanse himself of guilt] in the presence of the crowd, saying, “I am innocent of this [righteous] Man’s blood; see '
  - type: text
    content: to that
  - type: text
    content: ' yourselves.” [Deut 21:6-9; Ps 26:6] '
  '25':
  - type: text
    content: 'And all the people answered, “Let [the responsibility for] His blood be on us and on our children!” [Josh 2:19] '
  '26':
  - type: text
    content: So he set Barabbas free for them; but after having Jesus severely whipped (scourged), he handed Him over to be crucified.
  - type: heading
    content: Jesus Is Mocked
  '27':
  - type: text
    content: 'Then the governor’s soldiers took Jesus into '
  - type: note
    content: The official residence of a governor of a Roman province.
  - type: text
    content: 'the Praetorium, and they gathered the whole Roman cohort around Him. [Mark 15:16-20; John 19:1-3] '
  '28':
  - type: text
    content: 'They stripped him and put a scarlet '
  - type: note
    content: A ranking Roman officer’s outer cloak.
  - type: text
    content: 'robe on Him [as a king’s robe]. '
  '29':
  - type: text
    content: 'And after twisting together a crown of thorns, they put it on His head, and put a reed in His right hand [as a scepter]. Kneeling before Him, they ridiculed Him, saying, “Hail (rejoice), King of the Jews!” '
  '3':
  - type: text
    content: 'When Judas, His betrayer, saw that Jesus was condemned, he was gripped with remorse and returned the thirty pieces of silver to the chief priests and the elders, [Ex 21:32] '
  '30':
  - type: text
    content: 'They spat on Him, and took the reed and struck Him '
  - type: text
    content: repeatedly
  - type: text
    content: ' on the head. '
  '31':
