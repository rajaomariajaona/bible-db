      - type: text
        text: The wording of the inscription, which was written in Hebrew, Latin, and Greek, varies slightly in each Gospel account and was probably a combination of them all, “This is Jesus of Nazareth, the King of the Jews.”
    marker-yv: yv-n
  - type: text
    text: THIS IS JESUS THE KING OF THE JEWS.”
- type: usfm
