  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Jesus stood before [Pilate] the governor, and the governor asked Him, “Are you the King of the Jews?” [In affirmation] Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is as
    - type: text
      text: ' you say.”'
  - type: text
    text: ' [Mark 15:2-5; Luke 23:2, 3; John 18:29-37] '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when the charges were brought against Him by the chief priests and elders, He did not answer. [Is 53:7] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Pilate said to Him, “Do You not hear how many things they are testifying against You?” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But Jesus did not reply to him, not even to a single accusation, so that the governor was greatly astonished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now at the feast [of the Passover] the governor was in the habit of setting free any one prisoner whom the people chose. [Mark 15:6-15; Luke 23:18-25; John 18:39-19:16] '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And at that time they were holding a notorious prisoner [guilty of insurrection and murder], called Barabbas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So when they had assembled [for this purpose], Pilate said to them, “Whom do you want me to set free for you? Barabbas, or Jesus who is called Christ?” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For Pilate knew that it was because of jealousy that the chief priests and elders had handed Jesus over to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'While he was seated on the judgment seat, his wife sent him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a message,
  - type: text
    text: ' saying, “Have nothing to do with that righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' innocent Man; for last night I suffered greatly in a dream because of Him.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the chief priests and the elders persuaded the crowds to ask for Barabbas and to put Jesus to death. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The governor said to them, “Which of the two do you wish me to set free for you?” And they said, “Barabbas.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate said to them, “Then what shall I do with Jesus who is called Christ?” They all replied, “Let Him be crucified!” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And he said, “Why, what has He done that is evil?” But they continued shouting all the louder, “Let Him be crucified!” [Mark 15:14; Luke 23:4, 14, 22; John 18:39; 19:4, 6]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So when Pilate saw that he was getting nowhere, but rather that a riot was breaking out, he took water and washed his hands [to ceremonially cleanse himself of guilt] in the presence of the crowd, saying, “I am innocent of this [righteous] Man’s blood; see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to that
  - type: text
    text: ' yourselves.” [Deut 21:6-9; Ps 26:6] '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And all the people answered, “Let [the responsibility for] His blood be on us and on our children!” [Josh 2:19] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So he set Barabbas free for them; but after having Jesus severely whipped (scourged), he handed Him over to be crucified.
- type: usfm
