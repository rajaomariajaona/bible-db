    content: 'And throwing the pieces of silver into the temple sanctuary, he left; and went away and '
  - type: note
    content: Possibly people later threw Judas’ body over the cliff into the Valley of Hinnom where his body was mangled on the rocks below (Acts 1:18). Suicides were not given a proper burial.
  - type: text
