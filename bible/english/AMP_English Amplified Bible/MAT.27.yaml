    - type: text
      text: '57'
  - type: text
    text: 'When it was evening, there came a rich man from Arimathea, named Joseph, who was also a disciple of Jesus. [Mark 15:42-47; Luke 23:50-56; John 19:38-42] '
  - type: usfm
    marker: v
