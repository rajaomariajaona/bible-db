    content: 'saying, “I have sinned by betraying innocent blood.” They replied, “What is that to us? See to that yourself!” '
  '40':
  - type: text
    content: 'and they said [tauntingly], “You who would destroy the temple and rebuild it in three days, save Yourself [from death]! If You are the Son of God, come down from the cross.” '
  '41':
