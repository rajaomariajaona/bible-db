  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'At the same time two robbers were crucified with Jesus, one on the right and one on the left. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Those who passed by were hurling abuse at Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' jeering at Him, wagging their heads [in scorn and ridicule], [Ps 22:7, 8; 109:25] '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'and they said [tauntingly], “You who would destroy the temple and rebuild it in three days, save Yourself [from death]! If You are the Son of God, come down from the cross.” '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'In the same way the chief priests also, along with the scribes and elders, mocked Him, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
