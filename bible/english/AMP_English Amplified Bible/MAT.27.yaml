  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And after twisting together a crown of thorns, they put it on His head, and put a reed in His right hand [as a scepter]. Kneeling before Him, they ridiculed Him, saying, “Hail (rejoice), King of the Jews!” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They spat on Him, and took the reed and struck Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: repeatedly
  - type: text
    text: ' on the head. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'After they finished ridiculing Him, they stripped Him of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: scarlet
  - type: text
    text: ' robe and put His own clothes on Him, and led Him away to crucify Him.'
