  '63':
  - type: text
    content: 'and said, “Sir, we have remembered that when He was still alive that deceiver said, ‘After three days I will rise [from the dead].’ '
  '64':
  - type: text
    content: 'Therefore, give orders to have the tomb made secure '
  - type: text
    content: and
  - type: text
    content: ' safeguarded until the third day, otherwise His disciples may come and steal Him '
  - type: text
    content: away
  - type: text
    content: ' and tell the people, ‘He has risen from the dead,’ and the last deception [the reporting of His resurrection] will be worse than the first [the reporting that He is the Messiah].” '
  '65':
  - type: text
    content: 'Pilate said to them, “You have a guard [of soldiers]; go [with them], make the tomb as secure as you know how.” '
  '66':
  - type: text
    content: 'So they went and '
  - type: note
    content: In ancient times a tomb was secured by stretching a cord across the stone, then sealing each end of the cord to the rock wall with wax. The wax was marked with the official Roman seal.
  - type: text
    content: made the tomb secure, and along with [stationing] a guard of soldiers [to be on watch] they set a seal on the stone.
  '7':
