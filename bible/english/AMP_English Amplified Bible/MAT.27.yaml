      marker: fr
      children:
      - type: text
        text: '27:66 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient times a tomb was secured by stretching a cord across the stone, then sealing each end of the cord to the rock wall with wax. The wax was marked with the official Roman seal.
    marker-yv: yv-n
  - type: text
    text: made the tomb secure, and along with [stationing] a guard of soldiers [to be on watch] they set a seal on the stone.
