  '57':
  - type: text
    content: 'When it was evening, there came a rich man from Arimathea, named Joseph, who was also a disciple of Jesus. [Mark 15:42-47; Luke 23:50-56; John 19:38-42] '
  '58':
  - type: text
    content: 'He went to Pilate and asked for the body of Jesus [so that he might bury Him], and Pilate ordered that it be given '
  - type: text
    content: to him.
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'And Joseph took the body and wrapped it in a clean linen cloth (burial wrapping), '
  '6':
  - type: text
    content: 'The chief priests, picking up the pieces of silver, said, “It is not lawful to put these in the treasury [of the temple], because it is the price of blood.” '
  '60':
  - type: text
    content: 'and laid it in his own new tomb, which he had cut in the rock; and he rolled a large stone over the entrance of the tomb and went away. '
  '61':
