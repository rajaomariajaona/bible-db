  - type: text
    text: 'Because you [descendants of Esau] have had an everlasting hatred [for Jacob (Israel)] and you handed over the sons of Israel to the power of the sword at the time of their tragedy, at the time of their final punishment [the Babylonian conquest], [Ezek 25:12-14; 36:5] '
