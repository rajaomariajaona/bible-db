      - type: text
        text: 'The Edomites gave whatever help they could to Nebuchadnezzar when he captured Judah (Ps 137:7; Obad 11-14). Later these cousins of the Israelites were pushed out of their own country into southern Judea; Hebron became their chief city. When in '
      - type: usfm
        marker: sc
