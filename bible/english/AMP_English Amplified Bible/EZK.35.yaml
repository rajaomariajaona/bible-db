        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 70 the Romans under Titus besieged Jerusalem, Josephus says that the Edomites joined the Jews in rebellion against the attackers, and 20,000 were admitted into the city as defenders of the Holy City. But once in, they pillaged the city, raping and killing, not even sparing the priests—though these traitors themselves had been previously forced to become circumcised and recognized as Jews. The Roman conqueror destroyed them, and Edom ceased to be. The forecasts of the prophets regarding Edom are in striking contrast to those of their neighbors, Moab and Ammon. The latter two countries were to suffer great and severe judgments, as was Edom. But restoration and renewed prosperity were promised to them “in the latter days” (Jer 48:47; 49:6), while Edom was never to be rebuilt.
