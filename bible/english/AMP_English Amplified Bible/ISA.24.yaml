verses:
  '1':
  - type: heading
    content: Judgment on the Earth
  - type: text
    content: Behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: The gradual destruction of the earth, as revealed by God to Isaiah, is prophesied in this passage. He sees both the current and the future tragedies which will befall earth.
  - type: text
    content: 'lays waste to the earth, devastates it, twists '
  - type: text
    content: and
  - type: text
    content: ' distorts its face and scatters its inhabitants. '
  '10':
  - type: text
    content: The city of chaos is broken down;
  - type: text
    content: Every house is shut up so that no one may enter.
  '11':
  - type: text
    content: There is an outcry in the streets concerning the wine;
  - type: text
    content: All jubilation is darkened,
  - type: text
    content: The joy of the earth is banished.
  '12':
  - type: text
    content: Horrible desolation is left in the city,
  - type: text
    content: And the gate is battered into ruins.
  '13':
  - type: text
    content: For so it will be in the midst of the earth among the peoples,
  - type: text
    content: As the shaking of an olive tree,
  - type: text
    content: As the gleanings when the grape harvest is over [and only a little of the fruit remains].
  '14':
  - type: text
    content: They [who have escaped and remain] raise their voices, they shout for joy;
  - type: text
    content: They rejoice from the [Mediterranean] Sea in the majesty of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '15':
  - type: text
    content: 'Therefore honor '
  - type: text
    content: and
  - type: text
    content: ' glorify the L'
  - type: heading
    content: ord
  - type: text
    content: ' in the east [in the region of light],'
  - type: text
    content: The name of the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel [honor His name],'
  - type: text
    content: 'In the coastlands '
  - type: text
    content: and
  - type: text
    content: ' islands of the [Mediterranean] Sea.'
  '16':
  - type: text
    content: 'From the ends of the earth we hear songs, “Glory '
  - type: text
    content: and
  - type: text
    content: ' honor to the Righteous One,”'
  - type: text
    content: But I say, “I waste away, I waste away. Woe to me!
  - type: text
    content: The treacherous deal treacherously,
  - type: text
    content: Indeed, the treacherous deal very treacherously.”
  '17':
  - type: text
    content: Terror and pit [of destruction] and snare
  - type: text
    content: Confront you, O inhabitant of the earth.
  '18':
  - type: text
    content: Then it will be that he who flees at the sound of terror will fall into the pit,
  - type: text
    content: And he who comes up out of the pit will be caught in the snare;
  - type: text
    content: For the windows of heaven are opened, and the foundations of the earth tremble.
  '19':
  - type: text
    content: The earth is broken completely apart,
  - type: text
    content: The earth is split apart,
  - type: text
    content: The earth is shaken violently.
  '2':
  - type: text
    content: 'And the people will be like the priest, the servant like his master, the maid like her mistress, the buyer like the seller, the lender like the borrower, the creditor like the debtor [as God’s impartial judgment of sin comes on all]. '
  '20':
  - type: text
    content: The earth reels back and forth like a drunkard
  - type: text
    content: And sways like a shack;
  - type: text
    content: Its transgression lies heavily upon it,
  - type: text
    content: And it will fall and not rise again.
  '21':
  - type: text
    content: So it will happen in that day
  - type: text
    content: That the L
  - type: heading
    content: ord
  - type: text
    content: ' will visit '
  - type: text
    content: and
  - type: text
    content: ' punish the host (fallen angels) of heaven on high,'
  - type: text
    content: And the kings of the earth on the earth. [1 Cor 15:25; Eph 3:10; 6:12]
  '22':
  - type: text
    content: They will be gathered together
  - type: text
    content: As prisoners [are gathered] in a dungeon;
  - type: text
    content: They will be shut up in prison,
  - type: text
    content: 'And after many days they will be visited '
  - type: text
    content: and
  - type: text
    content: ' punished. [Zech 9:11, 12; 2 Pet 2:4; Jude 6]'
  '23':
  - type: text
    content: Then the full moon will be embarrassed and the sun ashamed,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts will reign on Mount Zion and in Jerusalem,'
  - type: text
    content: 'And '
  - type: text
    content: His
  - type: text
    content: ' glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance will shine before His elders.'
  '3':
  - type: text
    content: The earth will be completely laid waste and utterly pillaged, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken this word. '
  '4':
  - type: text
    content: 'The earth dries up and crumbles away, the world dries out and crumbles away, the exalted of the people of the earth fade away. '
  '5':
  - type: text
    content: 'The earth also is polluted '
  - type: note
    content: Lit under.
  - type: text
    content: 'by its inhabitants, because they have transgressed laws, violated statutes, and broken the everlasting covenant. [Gen 9:1-17; Deut 29:20] '
  '6':
  - type: text
    content: Therefore, a curse devours the earth, and those who live on it suffer the punishment of their guilt. Therefore, the inhabitants of the earth are burned [under the curse of God’s wrath], and few people are left. [Rom 1:20]
  '7':
  - type: text
    content: ¶The new wine mourns,
  - type: text
    content: The vine decays;
  - type: text
    content: 'All the merry-hearted sigh '
  - type: text
    content: and
  - type: text
    content: ' groan.'
  '8':
  - type: text
    content: The mirth of the timbrels (tambourines) ceases,
  - type: text
    content: The noise of those who rejoice ends,
  - type: text
    content: The joy of the harp ceases.
  '9':
  - type: text
    content: They do not drink wine with a song;
  - type: text
    content: Strong drink is bitter to those who drink it.
