document_id: ISA.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judgment on the Earth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Behold, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The gradual destruction of the earth, as revealed by God to Isaiah, is prophesied in this passage. He sees both the current and the future tragedies which will befall earth.
    marker-yv: yv-n
  - type: text
    text: 'lays waste to the earth, devastates it, twists '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distorts its face and scatters its inhabitants. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the people will be like the priest, the servant like his master, the maid like her mistress, the buyer like the seller, the lender like the borrower, the creditor like the debtor [as God’s impartial judgment of sin comes on all]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The earth will be completely laid waste and utterly pillaged, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken this word. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The earth dries up and crumbles away, the world dries out and crumbles away, the exalted of the people of the earth fade away. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The earth also is polluted '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: under
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'by its inhabitants, because they have transgressed laws, violated statutes, and broken the everlasting covenant. [Gen 9:1-17; Deut 29:20] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore, a curse devours the earth, and those who live on it suffer the punishment of their guilt. Therefore, the inhabitants of the earth are burned [under the curse of God’s wrath], and few people are left. [Rom 1:20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶The new wine mourns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The vine decays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All the merry-hearted sigh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' groan.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The mirth of the timbrels (tambourines) ceases,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The noise of those who rejoice ends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The joy of the harp ceases.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They do not drink wine with a song;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strong drink is bitter to those who drink it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The city of chaos is broken down;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every house is shut up so that no one may enter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: There is an outcry in the streets concerning the wine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All jubilation is darkened,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The joy of the earth is banished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Horrible desolation is left in the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the gate is battered into ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For so it will be in the midst of the earth among the peoples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the shaking of an olive tree,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the gleanings when the grape harvest is over [and only a little of the fruit remains].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They [who have escaped and remain] raise their voices, they shout for joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They rejoice from the [Mediterranean] Sea in the majesty of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the east [in the region of light],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The name of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel [honor His name],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the coastlands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' islands of the [Mediterranean] Sea.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'From the ends of the earth we hear songs, “Glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' honor to the Righteous One,”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I say, “I waste away, I waste away. Woe to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The treacherous deal treacherously,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indeed, the treacherous deal very treacherously.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Terror and pit [of destruction] and snare
- type: usfm
  marker: q1
  children:
  - type: text
    text: Confront you, O inhabitant of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then it will be that he who flees at the sound of terror will fall into the pit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he who comes up out of the pit will be caught in the snare;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the windows of heaven are opened, and the foundations of the earth tremble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The earth is broken completely apart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth is split apart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth is shaken violently.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The earth reels back and forth like a drunkard
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sways like a shack;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its transgression lies heavily upon it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it will fall and not rise again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So it will happen in that day
- type: usfm
  marker: q1
  children:
  - type: text
    text: That the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will visit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish the host (fallen angels) of heaven on high,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the kings of the earth on the earth. [1 Cor 15:25; Eph 3:10; 6:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They will be gathered together
- type: usfm
  marker: q1
  children:
  - type: text
    text: As prisoners [are gathered] in a dungeon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be shut up in prison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And after many days they will be visited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished. [Zech 9:11, 12; 2 Pet 2:4; Jude 6]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then the full moon will be embarrassed and the sun ashamed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts will reign on Mount Zion and in Jerusalem,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance will shine before His elders.'
