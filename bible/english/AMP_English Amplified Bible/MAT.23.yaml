      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[Woe to you, scribes and Pharisees, hypocrites, because you swallow up widows’ houses, and to cover it up you make long prayers; therefore you will receive the greater condemnation.]'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
