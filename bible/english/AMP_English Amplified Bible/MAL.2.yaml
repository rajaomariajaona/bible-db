document_id: MAL.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Priests to Be Disciplined
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Now, O priests, this commandment is for you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Do we not all have one Father? Has not one God created us? Why do we deal treacherously with one another, profaning the covenant of our fathers [with God]? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Judah has been treacherous (disloyal), and a repulsive act has been committed in Israel and in Jerusalem; for Judah has profaned the sanctuary of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He loves, and has married the daughter of a foreign god. [Ezra 9:2; Jer 2:3] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As for the man who does this, may the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' cut off from the tents of Jacob to the last man those who do this [evil thing], awake and aware, even the one who brings an offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'This is another thing you do: you cover the altar of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with tears, with [your own] weeping and sighing, because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' no longer regards your offering or accepts it with favor from your hand. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But you say, “Why [does He reject it]?” Because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has been a witness between you and the wife of your youth, against whom you have dealt treacherously. Yet she is your marriage companion and the wife of your covenant [made by your vows]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But not one has done so who has a remnant of the Spirit. And what did that one do while seeking a godly offspring? Take heed then to your spirit, and let no one deal treacherously against the wife of your youth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“For I hate '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. unwarranted divorce. Conditions for divorce are outlined. See Deut 24:1-4; Ezra 10:10-19; Matt 5:31, 32; 19:3-12; 1 Cor 7:10-16.
      marker-yv: yv-n
    - type: text
      text: divorce,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, “and him who covers his garment with wrong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violence,” says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. “Therefore keep watch on your spirit, so that you do not deal treacherously [with your wife].”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You have wearied the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with your words. But you say, “In what way have we wearied Him?” In that you say, “Everyone who does evil is good in the sight of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and He delights in them,” or [by asking], “Where is the God of justice?”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: If you do not listen, and if you do not take it to heart to honor My name,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “then I will send the curse upon you and I will curse your blessings [on the people]. Indeed, I have cursed them already, because you are not taking it to heart. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Behold, I am going to rebuke your seed, and I will spread the refuse on your faces, the refuse from the festival offerings; and you will be taken away with it [in disgrace]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then you will know [without any doubt] that I have sent this [new] commandment to you (priests), that My covenant may continue with Levi [the priestly tribe],” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“My covenant with Levi was [one of] life and peace, and I gave them to him as an object of reverence; so he [and the priests] feared Me and stood in reverent awe of My name. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'True instruction was in Levi’s mouth and injustice was not found on his lips. He walked with Me in peace and uprightness, and he turned many from wickedness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the lips of the priest should guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' preserve knowledge [of My law], and the people should seek instruction from his mouth; for he is the messenger of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But as for you [priests], you have turned from the way and you have caused many to stumble by your instruction [in the law]. You have violated the covenant of Levi,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “So I have also made you despised and abased before all the people, just as you are not keeping My ways but are showing partiality [to people] in [your administration of] the law.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sin in the Family
    marker-yv: yv-h
