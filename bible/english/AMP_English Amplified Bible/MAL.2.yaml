document_id: MAL.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Priests to Be Disciplined
  - type: text
    content: '“Now, O priests, this commandment is for you. '
  '10':
  - type: text
    content: 'Do we not all have one Father? Has not one God created us? Why do we deal treacherously with one another, profaning the covenant of our fathers [with God]? '
  '11':
  - type: text
    content: Judah has been treacherous (disloyal), and a repulsive act has been committed in Israel and in Jerusalem; for Judah has profaned the sanctuary of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He loves, and has married the daughter of a foreign god. [Ezra 9:2; Jer 2:3] '
  '12':
  - type: text
    content: As for the man who does this, may the L
  - type: heading
    content: ord
  - type: text
    content: ' cut off from the tents of Jacob to the last man those who do this [evil thing], awake and aware, even the one who brings an offering to the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts.'
  '13':
  - type: text
    content: 'This is another thing you do: you cover the altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ' with tears, with [your own] weeping and sighing, because the L'
  - type: heading
    content: ord
  - type: text
    content: ' no longer regards your offering or accepts it with favor from your hand. '
  '14':
  - type: text
    content: But you say, “Why [does He reject it]?” Because the L
  - type: heading
    content: ord
  - type: text
    content: ' has been a witness between you and the wife of your youth, against whom you have dealt treacherously. Yet she is your marriage companion and the wife of your covenant [made by your vows]. '
  '15':
  - type: text
    content: 'But not one has done so who has a remnant of the Spirit. And what did that one do while seeking a godly offspring? Take heed then to your spirit, and let no one deal treacherously against the wife of your youth. '
  '16':
  - type: text
    content: '“For I hate '
  - type: note
    content: I.e. unwarranted divorce. Conditions for divorce are outlined. See Deut 24:1-4; Ezra 10:10-19; Matt 5:31, 32; 19:3-12; 1 Cor 7:10-16.
  - type: text
    content: divorce,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, “and him who covers his garment with wrong '
  - type: text
    content: and
  - type: text
    content: ' violence,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. “Therefore keep watch on your spirit, so that you do not deal treacherously [with your wife].”'
  '17':
  - type: text
    content: You have wearied the L
  - type: heading
    content: ord
  - type: text
    content: ' with your words. But you say, “In what way have we wearied Him?” In that you say, “Everyone who does evil is good in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and He delights in them,” or [by asking], “Where is the God of justice?”'
  '2':
  - type: text
    content: If you do not listen, and if you do not take it to heart to honor My name,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “then I will send the curse upon you and I will curse your blessings [on the people]. Indeed, I have cursed them already, because you are not taking it to heart. '
  '3':
  - type: text
    content: 'Behold, I am going to rebuke your seed, and I will spread the refuse on your faces, the refuse from the festival offerings; and you will be taken away with it [in disgrace]. '
  '4':
  - type: text
    content: Then you will know [without any doubt] that I have sent this [new] commandment to you (priests), that My covenant may continue with Levi [the priestly tribe],” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '5':
  - type: text
    content: '“My covenant with Levi was [one of] life and peace, and I gave them to him as an object of reverence; so he [and the priests] feared Me and stood in reverent awe of My name. '
  '6':
  - type: text
    content: 'True instruction was in Levi’s mouth and injustice was not found on his lips. He walked with Me in peace and uprightness, and he turned many from wickedness. '
  '7':
  - type: text
    content: 'For the lips of the priest should guard '
  - type: text
    content: and
  - type: text
    content: ' preserve knowledge [of My law], and the people should seek instruction from his mouth; for he is the messenger of the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '8':
  - type: text
    content: But as for you [priests], you have turned from the way and you have caused many to stumble by your instruction [in the law]. You have violated the covenant of Levi,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '9':
  - type: text
    content: “So I have also made you despised and abased before all the people, just as you are not keeping My ways but are showing partiality [to people] in [your administration of] the law.”
  - type: heading
    content: Sin in the Family
