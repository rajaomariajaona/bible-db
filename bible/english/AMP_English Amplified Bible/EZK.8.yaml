    - type: usfm
      marker: it
      children:
      - type: text
        text: Vision of Repulsive Acts in Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It came about in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'September 592 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'sixth year [of the captivity of King Jehoiachin], on the fifth day of the sixth month, as I sat in my house [near Babylon] with the elders of Judah sitting before me, that the hand of the Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: YHWH
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' fell on me there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I entered and looked, and saw every kind of creeping things and beasts and loathsome things, and all the idols of the house of Israel, carved all around on the wall. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Standing before these [images] were seventy elders of the house of Israel, and among them stood Jaazaniah the son of Shaphan [the scribe], each man with his censer in his hand and a thick '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fragrant cloud of incense was rising [as they prayed to these gods]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then He said to me, “Son of man, do you see what the elders of the house of Israel do in the dark, each man in his [secret] room of carved images? For they say, ‘The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' does not see us; the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has abandoned the land.’ ” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also said to me, “Yet again you will see even greater repulsive acts which they are committing.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then He brought me to the entrance of the north gate of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house; and behold, women were sitting there weeping for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Babylonian god whose supposed death each summer caused the vegetation to wilt and die. In the spring he returned from the underworld bringing rain and new growth. His worship also involved fertility rituals.
      marker-yv: yv-n
    - type: text
      text: 'Tammuz. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said to me, “Do you see this, son of man? Yet you will see still greater repulsive acts than these [that they are committing].”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So He brought me to the inner court of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house. And behold, at the entrance to the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', between the porch (vestibule, portico) and the [bronze] altar, were about twenty-five men with their backs to the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and their faces toward the east; and they were bowing down toward the east '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshiping the sun. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to me, “Do you see this, son of man? Is it too slight a thing for the house of Judah to commit the repulsive acts which they have committed here, that they have filled the land with violence and repeatedly provoked Me to anger? And behold, they are putting the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The pagan object of worship is uncertain, but the act was contemptuous to God.
      marker-yv: yv-n
    - type: text
      text: 'branch to their nose. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, I indeed will deal in wrath. My eye will have no pity nor will I spare [them]; and though they cry loudly in My ears, yet I will not listen to them.” [Prov 1:28; Is 1:15; Jer 11:11; 14:12; Mic 3:4; Zech 7:13]
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I looked, and behold, a likeness [of a man] with the appearance of fire; from His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The midsection of the body from the lower ribs to the hips.
      marker-yv: yv-n
    - type: text
      text: 'loins downward He was like fire, and from His loins upward He had the appearance of brightness, like gleaming metal (bronze). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He stretched out the form of a hand and took me by a lock of hair on my head; and the Spirit lifted me up between earth and heaven and brought me in the visions of God to Jerusalem, to the entrance of the north gate of the inner '
    - type: usfm
      marker: it
      children:
      - type: text
        text: courtyard,
    - type: text
      text: ' where the seat of the idol (image) of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
      marker-yv: yv-n
    - type: text
      text: 'jealousy, which provokes to jealousy, was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: located
    - type: text
      text: '. [2 Kin 16:10-16; 21:4, 5] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the God of Israel [who had loved and chosen them] was there, like the vision which I saw in the plain. [Ezek 1:28; 3:22, 23]'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to me, “Son of man, now raise your eyes toward the north.” So I looked toward the north, and behold, to the north of the altar gate was this idol (image) of jealousy at the entrance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Furthermore, He said to me, “Son of man, do you see what they are doing, the great repulsive acts which the house of Israel is committing here, to drive Me far away from My sanctuary? But you will again see greater repulsive acts.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He brought me to the entrance of the courtyard; and when I looked, behold, [there was] a hole in the wall. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to me, “Son of man, now dig into the wall.” And when I had dug into the wall, behold, there was an entrance. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to me, “Go in and see the wicked, repulsive acts that they are committing here.” '
