verses:
  '1':
  - type: heading
    content: Vision of Repulsive Acts in Jerusalem
  - type: text
    content: 'It came about in the '
  - type: note
    content: September 592 b.c.
  - type: text
    content: 'sixth year [of the captivity of King Jehoiachin], on the fifth day of the sixth month, as I sat in my house [near Babylon] with the elders of Judah sitting before me, that the hand of the Lord '
  - type: note
    content: Heb YHWH.
  - type: text
    content: G
  - type: heading
    content: od
  - type: text
    content: ' fell on me there. '
  '10':
  - type: text
    content: 'So I entered and looked, and saw every kind of creeping things and beasts and loathsome things, and all the idols of the house of Israel, carved all around on the wall. '
  '11':
  - type: text
    content: 'Standing before these [images] were seventy elders of the house of Israel, and among them stood Jaazaniah the son of Shaphan [the scribe], each man with his censer in his hand and a thick '
  - type: text
    content: and
  - type: text
    content: ' fragrant cloud of incense was rising [as they prayed to these gods]. '
  '12':
  - type: text
    content: Then He said to me, “Son of man, do you see what the elders of the house of Israel do in the dark, each man in his [secret] room of carved images? For they say, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' does not see us; the L'
  - type: heading
    content: ord
  - type: text
    content: ' has abandoned the land.’ ” '
  '13':
  - type: text
    content: He also said to me, “Yet again you will see even greater repulsive acts which they are committing.”
  '14':
  - type: text
    content: Then He brought me to the entrance of the north gate of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house; and behold, women were sitting there weeping for '
  - type: note
    content: A Babylonian god whose supposed death each summer caused the vegetation to wilt and die. In the spring he returned from the underworld bringing rain and new growth. His worship also involved fertility rituals.
  - type: text
    content: 'Tammuz. '
  '15':
  - type: text
    content: He said to me, “Do you see this, son of man? Yet you will see still greater repulsive acts than these [that they are committing].”
  '16':
  - type: text
    content: So He brought me to the inner court of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house. And behold, at the entrance to the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ', between the porch (vestibule, portico) and the [bronze] altar, were about twenty-five men with their backs to the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and their faces toward the east; and they were bowing down toward the east '
  - type: text
    content: and
  - type: text
    content: ' worshiping the sun. '
  '17':
  - type: text
    content: 'He said to me, “Do you see this, son of man? Is it too slight a thing for the house of Judah to commit the repulsive acts which they have committed here, that they have filled the land with violence and repeatedly provoked Me to anger? And behold, they are putting the '
  - type: note
    content: The pagan object of worship is uncertain, but the act was contemptuous to God.
  - type: text
    content: 'branch to their nose. '
  '18':
  - type: text
    content: Therefore, I indeed will deal in wrath. My eye will have no pity nor will I spare [them]; and though they cry loudly in My ears, yet I will not listen to them.” [Prov 1:28; Is 1:15; Jer 11:11; 14:12; Mic 3:4; Zech 7:13]
  '2':
  - type: text
    content: 'Then I looked, and behold, a likeness [of a man] with the appearance of fire; from His '
  - type: note
    content: The midsection of the body from the lower ribs to the hips.
  - type: text
    content: 'loins downward He was like fire, and from His loins upward He had the appearance of brightness, like gleaming metal (bronze). '
  '3':
  - type: text
    content: 'He stretched out the form of a hand and took me by a lock of hair on my head; and the Spirit lifted me up between earth and heaven and brought me in the visions of God to Jerusalem, to the entrance of the north gate of the inner '
  - type: text
    content: courtyard,
  - type: text
    content: ' where the seat of the idol (image) of '
  - type: note
    content: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
  - type: text
    content: 'jealousy, which provokes to jealousy, was '
  - type: text
    content: located
  - type: text
    content: '. [2 Kin 16:10-16; 21:4, 5] '
  '4':
  - type: text
    content: 'And behold, the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the God of Israel [who had loved and chosen them] was there, like the vision which I saw in the plain. [Ezek 1:28; 3:22, 23]'
  '5':
  - type: text
    content: 'Then He said to me, “Son of man, now raise your eyes toward the north.” So I looked toward the north, and behold, to the north of the altar gate was this idol (image) of jealousy at the entrance. '
  '6':
  - type: text
    content: Furthermore, He said to me, “Son of man, do you see what they are doing, the great repulsive acts which the house of Israel is committing here, to drive Me far away from My sanctuary? But you will again see greater repulsive acts.”
  '7':
  - type: text
    content: 'Then He brought me to the entrance of the courtyard; and when I looked, behold, [there was] a hole in the wall. '
  '8':
  - type: text
    content: 'He said to me, “Son of man, now dig into the wall.” And when I had dug into the wall, behold, there was an entrance. '
  '9':
  - type: text
    content: 'And He said to me, “Go in and see the wicked, repulsive acts that they are committing here.” '
