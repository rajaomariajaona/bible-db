document_id: ACT.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Choosing of the Seven
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now about this time, when the number of disciples was increasing, a complaint was made by the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jews born outside the Holy Land who spoke the Greek language and had adopted much of the Greek culture.
      marker-yv: yv-n
    - type: text
      text: Hellenists (Greek-speaking Jews) against the [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Native-born Jews who spoke Hebrew and/or Aramaic and lived according to Jewish custom.
      marker-yv: yv-n
    - type: text
      text: 'native] Hebrews, because their widows were being overlooked in the daily serving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of food
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they were not able to successfully withstand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cope with the wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the intelligence [and the power and inspiration] of the Spirit by whom he was speaking. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then [to attack him another way] they secretly instructed men to say, “We have heard this man [Stephen] speak blasphemous (slanderous, sacrilegious, abusive) words against Moses and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: against
    - type: text
      text: ' God.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they provoked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' incited the people, as well as the elders and the scribes, and they came up to Stephen and seized him and brought him before the Council (Sanhedrin, Jewish High Court). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They presented false witnesses who said, “This man never stops speaking against this holy place and the Law [of Moses]; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for we have heard him say that this Jesus the Nazarene will tear down this place and will change the traditions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' customs which Moses handed down to us.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all those who were sitting in the Council, stared [intently] at him, and they saw that Stephen’s face was like the face of an angel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Matt 10:2.
      marker-yv: yv-n
    - type: text
      text: 'Twelve called the disciples together and said, “It is not appropriate for us to neglect [teaching] the word of God in order to serve tables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' manage the distribution of food. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, brothers, choose from among you seven men with good reputations [men of godly character and moral integrity], full of the Spirit and of wisdom, whom we may put in charge of this task. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we will [continue to] devote ourselves [steadfastly] to prayer and to the ministry of the word.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The suggestion pleased the whole congregation; and they selected '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These seven men had Greek names, so they may have been Greek in ancestry, language, or way of life; however, Stephen, in his defense before the Sanhedrin (ch 7), exhibited an extensive knowledge of Jewish history.
      marker-yv: yv-n
    - type: text
      text: 'Stephen, a man full of faith [in Christ Jesus], and [filled with and led by] the Holy Spirit, and Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolas (Nikolaos), a proselyte (Gentile convert) from Antioch. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They brought these men before the apostles; and after praying, they laid their hands on them [to dedicate and commission them for this service].
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the message of God kept on growing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spreading, and the number of disciples continued to increase greatly in Jerusalem; and a large number of the priests were becoming obedient to the faith [accepting Jesus as Messiah and acknowledging Him as the Source of eternal salvation].'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Stephen, full of grace (divine blessing, favor) and power, was doing great wonders and signs (attesting miracles) among the people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, some men from what was called the Synagogue of the Freedmen (freed Jewish slaves), both Cyrenians and Alexandrians, and some from Cilicia and [the province of] Asia, rose up and questioned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' argued with Stephen. '
