type_code: eng
verses:
  '1':
  - type: heading
    content: Choosing of the Seven
  - type: text
    content: 'Now about this time, when the number of disciples was increasing, a complaint was made by the '
  - type: note
    content: Jews born outside the Holy Land who spoke the Greek language and had adopted much of the Greek culture.
  - type: text
    content: Hellenists (Greek-speaking Jews) against the [
  - type: note
    content: Native-born Jews who spoke Hebrew and/or Aramaic and lived according to Jewish custom.
  - type: text
    content: 'native] Hebrews, because their widows were being overlooked in the daily serving '
  - type: text
    content: of food
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'But they were not able to successfully withstand '
  - type: text
    content: and
  - type: text
    content: ' cope with the wisdom '
  - type: text
    content: and
  - type: text
    content: ' the intelligence [and the power and inspiration] of the Spirit by whom he was speaking. '
  '11':
  - type: text
    content: 'Then [to attack him another way] they secretly instructed men to say, “We have heard this man [Stephen] speak blasphemous (slanderous, sacrilegious, abusive) words against Moses and '
  - type: text
    content: against
  - type: text
    content: ' God.” '
  '12':
  - type: text
    content: 'And they provoked '
  - type: text
    content: and
  - type: text
    content: ' incited the people, as well as the elders and the scribes, and they came up to Stephen and seized him and brought him before the Council (Sanhedrin, Jewish High Court). '
  '13':
  - type: text
    content: 'They presented false witnesses who said, “This man never stops speaking against this holy place and the Law [of Moses]; '
  '14':
  - type: text
    content: 'for we have heard him say that this Jesus the Nazarene will tear down this place and will change the traditions '
  - type: text
    content: and
  - type: text
    content: ' customs which Moses handed down to us.” '
  '15':
  - type: text
    content: Then all those who were sitting in the Council, stared [intently] at him, and they saw that Stephen’s face was like the face of an angel.
  '2':
  - type: text
    content: 'So the '
  - type: note
    content: See note Matt 10:2.
  - type: text
    content: 'Twelve called the disciples together and said, “It is not appropriate for us to neglect [teaching] the word of God in order to serve tables '
  - type: text
    content: and
  - type: text
    content: ' manage the distribution of food. '
  '3':
  - type: text
    content: 'Therefore, brothers, choose from among you seven men with good reputations [men of godly character and moral integrity], full of the Spirit and of wisdom, whom we may put in charge of this task. '
  '4':
  - type: text
    content: 'But we will [continue to] devote ourselves [steadfastly] to prayer and to the ministry of the word.” '
  '5':
  - type: text
    content: 'The suggestion pleased the whole congregation; and they selected '
  - type: note
    content: These seven men had Greek names, so they may have been Greek in ancestry, language, or way of life; however, Stephen, in his defense before the Sanhedrin (ch 7), exhibited an extensive knowledge of Jewish history.
  - type: text
    content: 'Stephen, a man full of faith [in Christ Jesus], and [filled with and led by] the Holy Spirit, and Philip, Prochorus, Nicanor, Timon, Parmenas, and Nicolas (Nikolaos), a proselyte (Gentile convert) from Antioch. '
  '6':
  - type: text
    content: They brought these men before the apostles; and after praying, they laid their hands on them [to dedicate and commission them for this service].
  '7':
  - type: text
    content: 'And the message of God kept on growing '
  - type: text
    content: and
  - type: text
    content: ' spreading, and the number of disciples continued to increase greatly in Jerusalem; and a large number of the priests were becoming obedient to the faith [accepting Jesus as Messiah and acknowledging Him as the Source of eternal salvation].'
  '8':
  - type: text
    content: 'Now Stephen, full of grace (divine blessing, favor) and power, was doing great wonders and signs (attesting miracles) among the people. '
  '9':
  - type: text
    content: 'However, some men from what was called the Synagogue of the Freedmen (freed Jewish slaves), both Cyrenians and Alexandrians, and some from Cilicia and [the province of] Asia, rose up and questioned '
  - type: text
    content: and
  - type: text
    content: ' argued with Stephen. '
