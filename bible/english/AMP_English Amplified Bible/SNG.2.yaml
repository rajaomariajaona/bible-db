document_id: SNG.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Bride’s Admiration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I am the rose [of the plain] of Sharon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lily of the valleys [that grows in deep places].”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Bridegroom)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ¶“Like the lily among the thorns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So are you, my darling, among the maidens.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Shulammite Bride)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ¶“Like an apple tree [rare and welcome] among the trees of the forest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So is my beloved among the young men!
- type: usfm
  marker: q1
  children:
  - type: text
    text: In his shade I took great delight and sat down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his fruit was sweet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delicious to my palate.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “He has brought me to his banqueting place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his banner over me is love [waving overhead to protect and comfort me].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Sustain me with raisin cakes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Refresh me with apples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I am sick with love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Let his left hand be under my head
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his right hand embrace me.” [Deut 33:27; Matt 28:20]
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Bridegroom)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“I command that you take an oath, O daughters of Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: By the gazelles or by the does of the field [which run free],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you do not rouse nor awaken my love
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until she pleases.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Shulammite Bride)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Listen! My beloved!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, he comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Climbing on the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leaping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' running on the hills! [John 10:27]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “My beloved is like a gazelle or a young stag.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, he is standing behind our wall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is looking through the windows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is gazing through the lattice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶“My beloved speaks and says to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Arise, my love, my fair one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And come away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘For behold, the winter is past,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rain is over and gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ‘The flowers appear on the earth once again;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time for singing has come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the voice of the turtledove is heard in our land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '‘The fig tree has budded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ripens her figs,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the vines are in blossom and give forth their fragrance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arise, my love, my fair one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And come away [to climb the rocky steps of the hillside].’ ”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Bridegroom)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶“O my dove, [here] in the clefts in the rock,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In the sheltered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' secret place of the steep pathway,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me see your face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me hear your voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your voice is sweet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your face is lovely.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Chorus)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶“Catch the foxes for us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The little foxes that spoil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruin the vineyards [of love],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: While our vineyards are in blossom.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Shulammite Bride)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶“My beloved is mine and I am his;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He pastures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his flock
  - type: text
    text: ' among the lilies. [Matt 10:32; Acts 4:12]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Until the cool of the day when the shadows flee away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return quickly, my beloved, and be like a gazelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or a young stag on the mountains of Bether [which separate us].”
