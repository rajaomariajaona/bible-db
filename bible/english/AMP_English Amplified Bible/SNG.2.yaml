document_id: SNG.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Bride’s Admiration
  - type: text
    content: “I am the rose [of the plain] of Sharon,
  - type: text
    content: The lily of the valleys [that grows in deep places].”
  - type: heading
    content: (The Bridegroom)
  '10':
  - type: text
    content: ¶“My beloved speaks and says to me,
  - type: text
    content: ‘Arise, my love, my fair one,
  - type: text
    content: And come away.
  '11':
  - type: text
    content: ‘For behold, the winter is past,
  - type: text
    content: The rain is over and gone.
  '12':
  - type: text
    content: ‘The flowers appear on the earth once again;
  - type: text
    content: The time for singing has come,
  - type: text
    content: And the voice of the turtledove is heard in our land.
  '13':
  - type: text
    content: '‘The fig tree has budded '
  - type: text
    content: and
  - type: text
    content: ' ripens her figs,'
  - type: text
    content: And the vines are in blossom and give forth their fragrance.
  - type: text
    content: Arise, my love, my fair one,
  - type: text
    content: And come away [to climb the rocky steps of the hillside].’ ”
  - type: heading
    content: (The Bridegroom)
  '14':
  - type: text
    content: ¶“O my dove, [here] in the clefts in the rock,
  - type: text
    content: 'In the sheltered '
  - type: text
    content: and
  - type: text
    content: ' secret place of the steep pathway,'
  - type: text
    content: Let me see your face,
  - type: text
    content: Let me hear your voice;
  - type: text
    content: For your voice is sweet,
  - type: text
    content: And your face is lovely.”
  - type: heading
    content: (The Chorus)
  '15':
  - type: text
    content: ¶“Catch the foxes for us,
  - type: text
    content: 'The little foxes that spoil '
  - type: text
    content: and
  - type: text
    content: ' ruin the vineyards [of love],'
  - type: text
    content: While our vineyards are in blossom.”
  - type: heading
    content: (The Shulammite Bride)
  '16':
  - type: text
    content: ¶“My beloved is mine and I am his;
  - type: text
    content: 'He pastures '
  - type: text
    content: his flock
  - type: text
    content: ' among the lilies. [Matt 10:32; Acts 4:12]'
  '17':
  - type: text
    content: “Until the cool of the day when the shadows flee away,
  - type: text
    content: Return quickly, my beloved, and be like a gazelle
  - type: text
    content: Or a young stag on the mountains of Bether [which separate us].”
  '2':
  - type: text
    content: ¶“Like the lily among the thorns,
  - type: text
    content: So are you, my darling, among the maidens.”
  - type: heading
    content: (The Shulammite Bride)
  '3':
  - type: text
    content: ¶“Like an apple tree [rare and welcome] among the trees of the forest,
  - type: text
    content: So is my beloved among the young men!
  - type: text
    content: In his shade I took great delight and sat down,
  - type: text
    content: 'And his fruit was sweet '
  - type: text
    content: and
  - type: text
    content: ' delicious to my palate.'
  '4':
  - type: text
    content: “He has brought me to his banqueting place,
  - type: text
    content: And his banner over me is love [waving overhead to protect and comfort me].
  '5':
  - type: text
    content: “Sustain me with raisin cakes,
  - type: text
    content: Refresh me with apples,
  - type: text
    content: Because I am sick with love.
  '6':
  - type: text
    content: “Let his left hand be under my head
  - type: text
    content: And his right hand embrace me.” [Deut 33:27; Matt 28:20]
  - type: heading
    content: (The Bridegroom)
  '7':
  - type: text
    content: ¶“I command that you take an oath, O daughters of Jerusalem,
  - type: text
    content: By the gazelles or by the does of the field [which run free],
  - type: text
    content: That you do not rouse nor awaken my love
  - type: text
    content: Until she pleases.”
  - type: heading
    content: (The Shulammite Bride)
  '8':
  - type: text
    content: ¶“Listen! My beloved!
  - type: text
    content: Behold, he comes,
  - type: text
    content: Climbing on the mountains,
  - type: text
    content: 'Leaping '
  - type: text
    content: and
  - type: text
    content: ' running on the hills! [John 10:27]'
  '9':
  - type: text
    content: “My beloved is like a gazelle or a young stag.
  - type: text
    content: Behold, he is standing behind our wall,
  - type: text
    content: He is looking through the windows,
  - type: text
    content: He is gazing through the lattice.
