document_id: ISA.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sennacherib Invades Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now in the fourteenth year of King Hezekiah, Sennacherib king of Assyria came up against all the fortified cities of Judah and conquered them. [2 Kin 18:13, 17-37; 2 Chr 32:9-19] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And the king of Assyria sent the Rabshakeh [his military commander] from Lachish [the Judean fortress commanding the road from Egypt] to King Hezekiah at Jerusalem with a large army. And he stood by the canal of the Upper Pool on the highway to the Fuller’s Field. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Eliakim the son of Hilkiah, who was in charge of the [royal] household, and Shebna the scribe, and Joah the son of Asaph, the recording historian, came out to [meet] him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the Rabshakeh said to them, “Say to Hezekiah, ‘This is what the great king, the king of Assyria says, “What is [the reason for] this confidence that you have? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I say, ‘Your plan and strength for the war are only '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a word of lips
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'empty words.’ Now in whom do you trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' on whom do you rely, that you have rebelled against me? [2 Kin 18:7] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Listen carefully, you rely on the staff of this broken reed, Egypt, which will pierce the hand of any man who leans on it. So is Pharaoh king of Egypt to all who rely on him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But if you say to me, ‘We trust in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rely on the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God,’ is it not He whose high places and whose altars Hezekiah has taken away, saying to Judah and to Jerusalem, ‘You shall worship before this altar’? [2 Kin 18:4, 5] '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So now, exchange pledges with my master the king of Assyria and I will give you two thousand horses, if you are able on your part to put riders on them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'How then can you repulse [the attack of] a single '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: governor
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'commander of the least of my master’s servants, and rely on Egypt for chariots and for horsemen? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moreover, is it without the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that I have now come up against this land to destroy it? The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘Go up against this land and destroy it.’ ” ’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Eliakim and Shebna and Joah said to the Rabshakeh, “Please, speak to your servants in Aramaic, because we understand it; and do not speak to us in Judean (Hebrew) in the hearing of the people who are [stationed] on the wall.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the Rabshakeh said, “Has my master sent me to speak these words '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' to your master and to you, and not to the men sitting on the wall, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: doomed
  - type: text
    text: ' to eat their own dung and drink their own urine with you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the Rabshakeh stood and called out with a loud voice in Judean (Hebrew): “Hear the words of the great king, the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'This is what the king says, ‘Do not let Hezekiah deceive you, for he will not be able to rescue you; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: nor let Hezekiah make you trust in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will most certainly rescue us; this city will not be given into the hand of the king of Assyria.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Do not listen to Hezekiah,’ for this is what the king of Assyria says, ‘Make peace with me and come out to me, and each one of you will eat from his own vine and each from his own fig tree and each [one of you] drink from the water of his own cistern, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'until I come and take you away to a land like your own land, a land of grain and new wine, a land of bread and vineyards. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Beware
  - type: text
    text: ' that Hezekiah does not mislead you by saying, “The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will rescue us.” Has any one of the gods of the nations [ever] rescued his land from the hand of the king of Assyria? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Where are the gods of Hamath and Arpad [in Aram]? Where are the gods of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An area from which the Assyrians brought colonists to inhabit Samaria, the capital city of the ten northern tribes of Israel, after it was evacuated.
    marker-yv: yv-n
  - type: text
    text: 'Sepharvaim? And when have they rescued Samaria from my hand? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Who among all the gods of these lands have rescued their land from my hand, that [you should think that] the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' would rescue Jerusalem from my hand?’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But they kept silent and did not say a word to him in reply, for King Hezekiah’s command was, “Do not answer him.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then Eliakim the son of Hilkiah, who was in charge of the household, and Shebna the scribe and Joah the son of Asaph, the recording historian, came to Hezekiah with their clothes torn [in grief], and told him the words of the Rabshakeh [the Assyrian commander].
