document_id: ISA.36,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Sennacherib Invades Judah
  - type: text
    content: 'Now in the fourteenth year of King Hezekiah, Sennacherib king of Assyria came up against all the fortified cities of Judah and conquered them. [2 Kin 18:13, 17-37; 2 Chr 32:9-19] '
  '10':
  - type: text
    content: Moreover, is it without the L
  - type: heading
    content: ord
  - type: text
    content: ' that I have now come up against this land to destroy it? The L'
  - type: heading
    content: ord
  - type: text
    content: ' said to me, ‘Go up against this land and destroy it.’ ” ’ ”'
  '11':
  - type: text
    content: 'Then Eliakim and Shebna and Joah said to the Rabshakeh, “Please, speak to your servants in Aramaic, because we understand it; and do not speak to us in Judean (Hebrew) in the hearing of the people who are [stationed] on the wall.” '
  '12':
  - type: text
    content: 'But the Rabshakeh said, “Has my master sent me to speak these words '
  - type: text
    content: only
  - type: text
    content: ' to your master and to you, and not to the men sitting on the wall, '
  - type: text
    content: doomed
  - type: text
    content: ' to eat their own dung and drink their own urine with you?”'
  '13':
  - type: text
    content: 'Then the Rabshakeh stood and called out with a loud voice in Judean (Hebrew): “Hear the words of the great king, the king of Assyria. '
  '14':
  - type: text
    content: 'This is what the king says, ‘Do not let Hezekiah deceive you, for he will not be able to rescue you; '
  '15':
  - type: text
    content: nor let Hezekiah make you trust in the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' will most certainly rescue us; this city will not be given into the hand of the king of Assyria.” '
  '16':
  - type: text
    content: 'Do not listen to Hezekiah,’ for this is what the king of Assyria says, ‘Make peace with me and come out to me, and each one of you will eat from his own vine and each from his own fig tree and each [one of you] drink from the water of his own cistern, '
  '17':
  - type: text
    content: 'until I come and take you away to a land like your own land, a land of grain and new wine, a land of bread and vineyards. '
  '18':
  - type: text
    content: Beware
  - type: text
    content: ' that Hezekiah does not mislead you by saying, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' will rescue us.” Has any one of the gods of the nations [ever] rescued his land from the hand of the king of Assyria? '
  '19':
  - type: text
    content: 'Where are the gods of Hamath and Arpad [in Aram]? Where are the gods of '
  - type: note
    content: An area from which the Assyrians brought colonists to inhabit Samaria, the capital city of the ten northern tribes of Israel, after it was evacuated.
  - type: text
    content: 'Sepharvaim? And when have they rescued Samaria from my hand? '
  '2':
  - type: text
    content: 'And the king of Assyria sent the Rabshakeh [his military commander] from Lachish [the Judean fortress commanding the road from Egypt] to King Hezekiah at Jerusalem with a large army. And he stood by the canal of the Upper Pool on the highway to the Fuller’s Field. '
  '20':
  - type: text
    content: Who among all the gods of these lands have rescued their land from my hand, that [you should think that] the L
  - type: heading
    content: ord
  - type: text
    content: ' would rescue Jerusalem from my hand?’ ”'
  '21':
  - type: text
    content: 'But they kept silent and did not say a word to him in reply, for King Hezekiah’s command was, “Do not answer him.” '
  '22':
  - type: text
    content: Then Eliakim the son of Hilkiah, who was in charge of the household, and Shebna the scribe and Joah the son of Asaph, the recording historian, came to Hezekiah with their clothes torn [in grief], and told him the words of the Rabshakeh [the Assyrian commander].
  '3':
  - type: text
    content: Then Eliakim the son of Hilkiah, who was in charge of the [royal] household, and Shebna the scribe, and Joah the son of Asaph, the recording historian, came out to [meet] him.
  '4':
  - type: text
    content: 'Then the Rabshakeh said to them, “Say to Hezekiah, ‘This is what the great king, the king of Assyria says, “What is [the reason for] this confidence that you have? '
  '5':
  - type: text
    content: 'I say, ‘Your plan and strength for the war are only '
  - type: note
    content: Lit a word of lips.
  - type: text
    content: 'empty words.’ Now in whom do you trust '
  - type: text
    content: and
  - type: text
    content: ' on whom do you rely, that you have rebelled against me? [2 Kin 18:7] '
  '6':
  - type: text
    content: 'Listen carefully, you rely on the staff of this broken reed, Egypt, which will pierce the hand of any man who leans on it. So is Pharaoh king of Egypt to all who rely on him. '
  '7':
  - type: text
    content: 'But if you say to me, ‘We trust in '
  - type: text
    content: and
  - type: text
    content: ' rely on the L'
  - type: heading
    content: ord
  - type: text
    content: ' our God,’ is it not He whose high places and whose altars Hezekiah has taken away, saying to Judah and to Jerusalem, ‘You shall worship before this altar’? [2 Kin 18:4, 5] '
  '8':
  - type: text
    content: 'So now, exchange pledges with my master the king of Assyria and I will give you two thousand horses, if you are able on your part to put riders on them. '
  '9':
  - type: text
    content: 'How then can you repulse [the attack of] a single '
  - type: note
    content: Lit governor.
  - type: text
    content: 'commander of the least of my master’s servants, and rely on Egypt for chariots and for horsemen? '
