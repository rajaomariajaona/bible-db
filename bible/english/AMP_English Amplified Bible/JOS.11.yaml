document_id: JOS.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Northern Canaan Taken
  - type: text
    content: 'Then when Jabin king of Hazor heard [of Israel’s other victories] he sent '
  - type: text
    content: word
  - type: text
    content: ' to Jobab king of Madon, and to the king of Shimron, and to the king of Achshaph, '
  '10':
  - type: text
    content: 'At that time Joshua turned back and captured Hazor and struck its king dead with the sword; for Hazor previously was the head of all these kingdoms. '
  '11':
  - type: text
    content: 'They struck all the people who were in it with the edge of the sword, utterly destroying them; there was no one left who breathed. And he set fire to Hazor. '
  '12':
  - type: text
    content: Joshua captured all the cities of these kings, and all their kings, and he struck them with the edge of the sword, utterly destroying them, just as Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded. [Deut 20:16] '
  '13':
  - type: text
    content: 'But Israel did not burn any of the cities that stood [walled and fortified] on their mounds, except Hazor alone, which Joshua burned. '
  '14':
  - type: text
    content: 'The sons of Israel took as their plunder all the spoil of these cities and the cattle; but they struck every man with the edge of the sword, until they had destroyed them. They left no one '
  - type: note
    content: Lit who breathed.
  - type: text
    content: 'alive. '
  '15':
  - type: text
    content: Just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses His servant, so Moses had commanded Joshua, and so Joshua did; he left nothing undone of all that the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '16':
  - type: text
    content: 'So Joshua took all this land: the hill country, all the Negev (South country), all the land of Goshen, the lowland, the Arabah [plain], the hill country of Israel and its lowland '
  '17':
  - type: text
    content: 'from Mount Halak, that rises toward Seir [in the south], even as far as Baal-gad in the Valley of Lebanon at the foot of Mount Hermon [in the north]. He captured all their kings and struck them and put them to death. '
  '18':
  - type: text
    content: 'Joshua waged war with all these kings '
  - type: note
    content: Lit many days.
  - type: text
    content: 'a long time [at least five years]. '
  '19':
  - type: text
    content: 'There was no city that made peace with the Israelites except the Hivites living in Gibeon; they took all '
  - type: text
    content: the others
  - type: text
    content: ' in battle. '
  '2':
  - type: text
    content: 'and to the kings who were in the north, in the hill country, and in the Arabah [the plain] south of Chinnereth (the Sea of Galilee) and in the lowland and on the hills of Dor on the west; '
  '20':
  - type: text
    content: For it was [the purpose] of the L
  - type: heading
    content: ord
  - type: text
    content: ' to harden their hearts, to meet Israel in battle so that Israel would utterly destroy them, that they would receive no mercy, but that Israel would destroy them, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '21':
  - type: text
    content: 'Then Joshua came at that time and cut off the '
  - type: note
    content: These were the people of giant stature who had frightened the spies when the Israelites first entered the land (Num 13:33).
  - type: text
    content: 'Anakim from the hill country, from Hebron, from Debir, from Anab and from all the hill country of Judah and all the hill country of Israel. Joshua utterly destroyed them with their cities. '
  '22':
  - type: text
    content: 'There were no Anakim left in the land of the children of Israel; only in Gaza, in Gath, and in Ashdod [of Philistia] some remained. '
  '23':
  - type: text
    content: So Joshua took the whole land [of Canaan], according to all that the L
  - type: heading
    content: ord
  - type: text
    content: ' had spoken to Moses, and Joshua gave it as an inheritance to Israel according to their divisions by their tribes. So the land had rest from war.'
  '3':
  - type: text
    content: 'to the Canaanite in the east and in the west, and to the Amorite, the Hittite, the Perizzite, and the Jebusite in the hill country, and the Hivite at the foot of [Mount] Hermon in the land of Mizpeh. '
  '4':
  - type: text
    content: 'They went out, they and all their armies with them, as many people as the sand on the seashore, with very many horses and chariots. '
  '5':
  - type: text
    content: So all these kings met and they came and encamped together at the waters of Merom, to fight against Israel.
  '6':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, “Do not be afraid because of them, for tomorrow by this time I am going to hand over all of them slain [by the sword] to Israel; you shall hamstring (disable) their horses and set fire to their chariots.” '
  '7':
  - type: text
    content: 'So Joshua and all the people of war with him came against them suddenly by the waters of Merom, and attacked them. '
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' handed them over to Israel, who struck them and pursued them as far as Great Sidon and Misrephoth-maim and eastward as far as the Valley of Mizpeh; they struck them down until no survivor was left. '
  '9':
  - type: text
    content: Joshua did to them as the L
  - type: heading
    content: ord
  - type: text
    content: ' had told him; he hamstrung (disabled) their horses and set fire to their chariots.'
