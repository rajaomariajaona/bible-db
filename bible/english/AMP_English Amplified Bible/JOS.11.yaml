document_id: JOS.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Northern Canaan Taken
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then when Jabin king of Hazor heard [of Israel’s other victories] he sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to Jobab king of Madon, and to the king of Shimron, and to the king of Achshaph, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and to the kings who were in the north, in the hill country, and in the Arabah [the plain] south of Chinnereth (the Sea of Galilee) and in the lowland and on the hills of Dor on the west; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'to the Canaanite in the east and in the west, and to the Amorite, the Hittite, the Perizzite, and the Jebusite in the hill country, and the Hivite at the foot of [Mount] Hermon in the land of Mizpeh. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They went out, they and all their armies with them, as many people as the sand on the seashore, with very many horses and chariots. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So all these kings met and they came and encamped together at the waters of Merom, to fight against Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “Do not be afraid because of them, for tomorrow by this time I am going to hand over all of them slain [by the sword] to Israel; you shall hamstring (disable) their horses and set fire to their chariots.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joshua and all the people of war with him came against them suddenly by the waters of Merom, and attacked them. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' handed them over to Israel, who struck them and pursued them as far as Great Sidon and Misrephoth-maim and eastward as far as the Valley of Mizpeh; they struck them down until no survivor was left. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Joshua did to them as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had told him; he hamstrung (disabled) their horses and set fire to their chariots.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'At that time Joshua turned back and captured Hazor and struck its king dead with the sword; for Hazor previously was the head of all these kingdoms. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They struck all the people who were in it with the edge of the sword, utterly destroying them; there was no one left who breathed. And he set fire to Hazor. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Joshua captured all the cities of these kings, and all their kings, and he struck them with the edge of the sword, utterly destroying them, just as Moses the servant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded. [Deut 20:16] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Israel did not burn any of the cities that stood [walled and fortified] on their mounds, except Hazor alone, which Joshua burned. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The sons of Israel took as their plunder all the spoil of these cities and the cattle; but they struck every man with the edge of the sword, until they had destroyed them. They left no one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: who breathed
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'alive. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Just as the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses His servant, so Moses had commanded Joshua, and so Joshua did; he left nothing undone of all that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Joshua took all this land: the hill country, all the Negev (South country), all the land of Goshen, the lowland, the Arabah [plain], the hill country of Israel and its lowland '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'from Mount Halak, that rises toward Seir [in the south], even as far as Baal-gad in the Valley of Lebanon at the foot of Mount Hermon [in the north]. He captured all their kings and struck them and put them to death. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Joshua waged war with all these kings '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: many days
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a long time [at least five years]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'There was no city that made peace with the Israelites except the Hivites living in Gibeon; they took all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the others
  - type: text
    text: ' in battle. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For it was [the purpose] of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to harden their hearts, to meet Israel in battle so that Israel would utterly destroy them, that they would receive no mercy, but that Israel would destroy them, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Joshua came at that time and cut off the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were the people of giant stature who had frightened the spies when the Israelites first entered the land (Num 13:33).
    marker-yv: yv-n
  - type: text
    text: 'Anakim from the hill country, from Hebron, from Debir, from Anab and from all the hill country of Judah and all the hill country of Israel. Joshua utterly destroyed them with their cities. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'There were no Anakim left in the land of the children of Israel; only in Gaza, in Gath, and in Ashdod [of Philistia] some remained. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So Joshua took the whole land [of Canaan], according to all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had spoken to Moses, and Joshua gave it as an inheritance to Israel according to their divisions by their tribes. So the land had rest from war.'
