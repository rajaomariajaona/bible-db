  '1':
  - type: heading
    content: Judah Threatened with Invasion
  - type: text
    content: “If you will return, O Israel,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “If you will return to Me,
  - type: text
    content: 'And if you will put away your detestable things '
  - type: text
    content: and
  - type: text
    content: ' remove your man-made gods from My sight,'
  - type: text
    content: 'And not stray '
  - type: text
    content: or
  - type: text
    content: ' waver,'
  '10':
  - type: text
    content: Then I said, “
  - type: note
    content: Jeremiah could not reconcile the tragedy he was now commanded to announce with his previous prophecy.
  - type: text
    content: Alas, Lord G
  - type: heading
    content: od
  - type: text
    content: '! Surely You have completely deceived '
  - type: text
    content: and
  - type: text
    content: ' misled this people and Jerusalem, [for the prophets represented You as] saying [to Your people], ‘You will have peace,’ but [in fact] a sword reaches to their throat.”'
  '11':
  - type: text
    content: 'In that time it will be said to this people and to Jerusalem, “A scorching wind from the barren heights in the wilderness [comes at My command] against the daughter of My people—not [a wind] to winnow and not to cleanse [from chaff, as when threshing, but] '
  '12':
  - type: text
    content: 'a wind too strong '
  - type: text
    content: and
  - type: text
    content: ' full for this comes at My word. Now I will also speak judgment against My people.”'
  '13':
  - type: text
    content: “Behold, the enemy comes up like clouds,
  - type: text
    content: His chariots like the whirlwind;
  - type: text
    content: His horses are swifter than eagles.
  - type: text
    content: Woe (judgment is coming) to us, for we are ruined!”
  '14':
  - type: text
    content: ¶O Jerusalem, wash your heart from wickedness,
  - type: text
    content: That you may be saved.
  - type: text
    content: 'How long will your wicked '
  - type: text
    content: and
  - type: text
    content: ' immoral thoughts'
  - type: text
    content: Lodge within you?
  '15':
  - type: text
    content: For a voice declares from Dan [far in the north],
  - type: text
    content: 'And proclaims evil from '
  - type: note
    content: The northern mountain dividing Israel from Judah.
  - type: text
    content: Mount Ephraim.
  '16':
  - type: text
    content: “Warn the [neighboring] nations now [that our enemy is coming]!
  - type: text
    content: Announce to Jerusalem,
  - type: text
    content: ‘Besiegers are coming from a far country,
  - type: text
    content: 'And they lift their voices '
  - type: text
    content: and
  - type: text
    content: ' shout against the cities of Judah.'
  '17':
  - type: text
    content: ‘Like watchmen of a field they are against her on all sides,
  - type: text
    content: Because she has rebelled against Me,’ says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '18':
  - type: text
    content: “Your ways and your deeds
  - type: text
    content: Have brought these things on you.
  - type: text
    content: 'This is your tragedy '
  - type: text
    content: and
  - type: text
    content: ' doom; how bitter,'
  - type: text
    content: How it has touched your heart!”
  - type: heading
    content: Lament over Judah’s Devastation
  '19':
  - type: text
    content: '¶My soul, my soul! I writhe in anguish '
  - type: text
    content: and
  - type: text
    content: ' pain! Oh, the walls of my heart!'
  - type: text
    content: 'My heart is pounding '
  - type: text
    content: and
  - type: text
    content: ' throbbing within me;'
  - type: text
    content: I cannot be silent,
  - type: text
    content: For you have heard, O my soul,
  - type: text
    content: The sound of the trumpet,
  - type: text
    content: The alarm of war.
  '2':
  - type: text
    content: And if you swear [your oaths], ‘As the L
  - type: heading
    content: ord
  - type: text
    content: ' lives,’'
  - type: text
    content: In truth, in justice, and in righteousness,
  - type: text
    content: Then the nations will bless themselves in Him,
  - type: text
    content: And in Him they will glory.”
  '20':
  - type: text
    content: News of one [terrible] disaster comes close after another,
  - type: text
    content: For the whole land is devastated;
  - type: text
    content: 'Suddenly my tents are spoiled '
  - type: text
    content: and
  - type: text
    content: ' destroyed,'
  - type: text
    content: My [tent] curtains [ruined] in a moment.
  '21':
  - type: text
    content: How long [O L
  - type: heading
    content: ord
  - type: text
    content: '] must I see the banner [marking the way for flight]'
  - type: text
    content: And hear the sound of the trumpet [urging the people to run for safety]?
  '22':
  - type: text
    content: '“For My people are stupid '
  - type: text
    content: and
  - type: text
    content: ' foolish,” [says the L'
  - type: heading
    content: ord
  - type: text
    content: ' to Jeremiah];'
  - type: text
    content: “They do not know Me;
  - type: text
    content: They are foolish children
  - type: text
    content: And have no understanding.
  - type: text
    content: They are shrewd [enough] to do evil,
  - type: text
    content: But they do not know [how] to do good.”
  '23':
  - type: text
    content: ¶I looked at the earth [in my vision], and behold, it was [as at the time of creation] formless and void;
  - type: text
    content: And to the heavens, and they had no light.
  '24':
  - type: text
    content: I looked at the mountains, and behold, they were trembling,
  - type: text
    content: And all the hills moved back and forth.
  '25':
  - type: text
    content: I looked, and behold, there was no man,
  - type: text
    content: And all the birds of the air had fled.
  '26':
  - type: text
    content: I looked, and behold, the fertile land was a wilderness,
  - type: text
    content: And all its cities were pulled down
  - type: text
    content: Before the [presence of the] L
  - type: heading
    content: ord
  - type: text
    content: ', before His fierce anger.'
  '27':
  - type: text
    content: ¶Therefore says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “The whole land shall be a desolation,
  - type: text
    content: Yet I will not cause total destruction. [Jer 5:10, 18; 30:11; 46:28]
  '28':
  - type: text
    content: “For this reason the earth shall mourn
  - type: text
    content: And the heavens above shall become dark,
  - type: text
    content: Because I have spoken, I have decided,
  - type: text
    content: And I will not change my mind (relent), nor will I turn back from it.”
  '29':
  - type: text
    content: Every city runs away at the sound of the horsemen and archers.
  - type: text
    content: They go into the thickets and climb among the rocks;
  - type: text
    content: Every city is deserted,
  - type: text
    content: And no man lives in them.
  '3':
  - type: text
    content: For this is what the L
  - type: heading
    content: ord
  - type: text
    content: ' says to the men of Judah and to Jerusalem,'
  - type: text
    content: “Plow your uncultivated ground [for a season],
  - type: text
    content: And do not sow among thorns.
  '30':
  - type: text
    content: And you, O desolate one, what will you do?
  - type: text
    content: Though you clothe yourself in scarlet,
  - type: text
    content: 'Though you adorn '
  - type: text
    content: yourself with
  - type: text
    content: ' ornaments of gold,'
  - type: text
    content: Though you enlarge your eyes with paint,
  - type: text
    content: You make yourself beautiful in vain.
  - type: text
    content: Your lovers (allies) despise you;
  - type: text
    content: They seek your life.
  '31':
  - type: text
    content: For I heard a cry like a woman in labor,
  - type: text
    content: The anguish as of one giving birth to her first child,
  - type: text
    content: The cry of the Daughter of Zion (Jerusalem), who gasps for breath,
  - type: text
    content: Who stretches out her hands, saying,
  - type: text
    content: “Woe is me [my judgment comes]! I faint [in fear] before the murderers.”
  '4':
  - type: text
    content: “Circumcise (dedicate, sanctify) yourselves to the L
  - type: heading
    content: ord
  - type: text
    content: And remove the foreskin [sins] of your heart,
  - type: text
    content: Men of Judah and inhabitants of Jerusalem,
  - type: text
    content: Or else My wrath will go forth like fire [consuming all that gets in its way]
  - type: text
    content: And burn and there will be no one to quench it,
  - type: text
    content: Because of the evil of your acts.”
  '5':
  - type: text
    content: ¶Declare in Judah and proclaim in Jerusalem, and say,
  - type: text
    content: “Blow the trumpet in the land;
  - type: text
    content: Cry aloud and say,
  - type: text
    content: ‘Assemble yourselves, and let us go
  - type: text
    content: Into the fortified cities.’
  '6':
  - type: text
    content: “Raise a banner toward Zion [to mark the way for those seeking safety inside Jerusalem’s walls]!
  - type: text
    content: Seek refuge, do not stand [immobile],
  - type: text
    content: For I am bringing evil from the north (the army of Babylon),
  - type: text
    content: And great destruction.
  '7':
  - type: text
    content: “A lion has left his lair,
  - type: text
    content: And a destroyer of nations is on his way.
  - type: text
    content: He has gone out from his place
  - type: text
    content: To desolate your land;
  - type: text
    content: Your cities will be in ruins
  - type: text
    content: Without an inhabitant.
  '8':
  - type: text
    content: “For this reason, put on sackcloth [for mourning],
  - type: text
    content: Lament (mourn with expressions of grief for the dead) and wail,
  - type: text
    content: For the fierce anger of the L
  - type: heading
    content: ord
  - type: text
    content: Has not turned back from us.”
  '9':
  - type: text
    content: “It shall come about in that day,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “that the heart '
  - type: text
    content: and
  - type: text
    content: ' courage of the king will fail (be paralyzed), and also the heart of the princes; the priests will be appalled and the prophets will be astounded '
  - type: text
    content: and
  - type: text
    content: ' horrified.”'
