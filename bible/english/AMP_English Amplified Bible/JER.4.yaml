document_id: JER.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judah Threatened with Invasion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “If you will return, O Israel,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you will return to Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And if you will put away your detestable things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remove your man-made gods from My sight,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And not stray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' waver,'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then I said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah could not reconcile the tragedy he was now commanded to announce with his previous prophecy.
      marker-yv: yv-n
    - type: text
      text: Alas, Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '! Surely You have completely deceived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' misled this people and Jerusalem, [for the prophets represented You as] saying [to Your people], ‘You will have peace,’ but [in fact] a sword reaches to their throat.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'In that time it will be said to this people and to Jerusalem, “A scorching wind from the barren heights in the wilderness [comes at My command] against the daughter of My people—not [a wind] to winnow and not to cleanse [from chaff, as when threshing, but] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'a wind too strong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' full for this comes at My word. Now I will also speak judgment against My people.”'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Behold, the enemy comes up like clouds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His chariots like the whirlwind;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His horses are swifter than eagles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe (judgment is coming) to us, for we are ruined!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ¶O Jerusalem, wash your heart from wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That you may be saved.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long will your wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' immoral thoughts'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lodge within you?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For a voice declares from Dan [far in the north],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And proclaims evil from '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The northern mountain dividing Israel from Judah.
      marker-yv: yv-n
    - type: text
      text: Mount Ephraim.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Warn the [neighboring] nations now [that our enemy is coming]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Announce to Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Besiegers are coming from a far country,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they lift their voices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shout against the cities of Judah.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ‘Like watchmen of a field they are against her on all sides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because she has rebelled against Me,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Your ways and your deeds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have brought these things on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is your tragedy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' doom; how bitter,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How it has touched your heart!”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lament over Judah’s Devastation
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '¶My soul, my soul! I writhe in anguish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pain! Oh, the walls of my heart!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart is pounding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' throbbing within me;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cannot be silent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have heard, O my soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sound of the trumpet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The alarm of war.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And if you swear [your oaths], ‘As the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives,’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In truth, in justice, and in righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the nations will bless themselves in Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in Him they will glory.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: News of one [terrible] disaster comes close after another,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the whole land is devastated;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Suddenly my tents are spoiled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My [tent] curtains [ruined] in a moment.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: How long [O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] must I see the banner [marking the way for flight]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And hear the sound of the trumpet [urging the people to run for safety]?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“For My people are stupid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foolish,” [says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Jeremiah];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They do not know Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are foolish children
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have no understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are shrewd [enough] to do evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they do not know [how] to do good.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ¶I looked at the earth [in my vision], and behold, it was [as at the time of creation] formless and void;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the heavens, and they had no light.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: I looked at the mountains, and behold, they were trembling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the hills moved back and forth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I looked, and behold, there was no man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the birds of the air had fled.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I looked, and behold, the fertile land was a wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all its cities were pulled down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the [presence of the] L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', before His fierce anger.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ¶Therefore says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The whole land shall be a desolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I will not cause total destruction. [Jer 5:10, 18; 30:11; 46:28]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “For this reason the earth shall mourn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the heavens above shall become dark,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I have spoken, I have decided,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will not change my mind (relent), nor will I turn back from it.”
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Every city runs away at the sound of the horsemen and archers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They go into the thickets and climb among the rocks;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every city is deserted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no man lives in them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For this is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' says to the men of Judah and to Jerusalem,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Plow your uncultivated ground [for a season],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not sow among thorns.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: And you, O desolate one, what will you do?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you clothe yourself in scarlet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though you adorn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yourself with
    - type: text
      text: ' ornaments of gold,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you enlarge your eyes with paint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make yourself beautiful in vain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lovers (allies) despise you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They seek your life.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: For I heard a cry like a woman in labor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The anguish as of one giving birth to her first child,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cry of the Daughter of Zion (Jerusalem), who gasps for breath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who stretches out her hands, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe is me [my judgment comes]! I faint [in fear] before the murderers.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Circumcise (dedicate, sanctify) yourselves to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And remove the foreskin [sins] of your heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Men of Judah and inhabitants of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or else My wrath will go forth like fire [consuming all that gets in its way]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And burn and there will be no one to quench it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the evil of your acts.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶Declare in Judah and proclaim in Jerusalem, and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Blow the trumpet in the land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cry aloud and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Assemble yourselves, and let us go
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into the fortified cities.’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Raise a banner toward Zion [to mark the way for those seeking safety inside Jerusalem’s walls]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek refuge, do not stand [immobile],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am bringing evil from the north (the army of Babylon),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And great destruction.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “A lion has left his lair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a destroyer of nations is on his way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has gone out from his place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To desolate your land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your cities will be in ruins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without an inhabitant.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “For this reason, put on sackcloth [for mourning],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lament (mourn with expressions of grief for the dead) and wail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the fierce anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has not turned back from us.”
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “It shall come about in that day,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “that the heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' courage of the king will fail (be paralyzed), and also the heart of the princes; the priests will be appalled and the prophets will be astounded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' horrified.”'
