    - type: text
      text: Tribute to Caesar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The scribes and the chief priests tried to [find a way to] arrest Him at that very hour, but they were afraid of the people; because they understood that He spoke this parable against them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So they watched [for a chance to trap] Him. They sent spies who pretended to be upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sincere, in order that they might catch Him in some statement [that they could distort and use against Him], so that they could turn Him over to the control and authority of [Pilate] the governor. [Matt 22:15-22; Mark 12:13-17] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They asked Him, “Teacher, we know that You speak and teach correctly, and that You show no partiality to anyone, but teach the way of God truthfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Is it lawful [according to Jewish law and tradition] for us to pay taxes (tribute money) to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 22:17.
    marker-yv: yv-n
  - type: text
    text: 'Caesar or not?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But He saw through their trickery and said to them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Show Me a
  - type: text
    text: ' [Roman] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: denarius. Whose image and inscription does the coin have?”
  - type: text
    text: ' They answered, “[the Emperor Tiberius] Caesar’s.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then pay to Caesar the things that are Caesar’s, and to God the things that are God’s.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They were not able to seize on anything He said in the presence of the people; and being unnerved at His reply, they were silent.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is There a Resurrection?
  marker-yv: yv-h
- type: usfm
