  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now some of the Sadducees (who say that there is no resurrection) came to Him [Matt 22:23-33; Mark 12:18-27] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and they questioned Him, saying, “Teacher, Moses wrote for us [a law that] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: if a man’s brother dies
  - type: text
    text: ', leaving a wife '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and no children
  - type: text
    text: ', '
  - type: usfm
    marker: sc
