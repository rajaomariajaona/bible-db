      text: Jesus’ Authority Questioned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On one of the days, as Jesus was instructing the people in the temple [area] and preaching the good news (gospel), '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. various members of the Sanhedrin, Jewish High Court.
    marker-yv: yv-n
  - type: text
    text: 'the chief priests and the scribes along with the elders confronted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him,
  - type: text
    text: ' [Matt 21:23-27; Mark 11:27-33] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and said to Him, “Tell us by what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: kind of
  - type: text
    text: ' authority You are doing these things? Or who is the one who gave You this authority?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I will also ask you a question. You tell Me:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The baptism of John
  - type: text
    text: ' [the Baptist]—'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: was it from heaven
  - type: text
    text: ' [that is, ordained by God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: or from men?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They discussed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' debated it among themselves, saying, “If we say, ‘From heaven,’ He will say, ‘Why did you not believe him?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But if we say, ‘From men,’ all the people will stone us to death, for they are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: firmly
  - type: text
    text: ' convinced that John was a prophet.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So they replied that they did not know from where '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it came.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Nor am I telling you by what
  - type: text
    text: ' [kind of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: authority I do these things.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Vineyard Owner
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then He began to tell the people this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A man planted a vineyard and leased it to tenant farmers, and went on a journey for a long time
  - type: text
    text: ' [to another country]. [Is 5:1-7; Matt 21:33-46; Mark 12:1-12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'At '
    - type: usfm
      marker: it
      children:
      - type: text
        text: harvest
    - type: text
      text: ' time he sent a servant'
  - type: text
    text: ' [as his representative] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to the tenants, so that they would give him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his share
    - type: text
      text: ' of the fruit of the vineyard; but the tenants beat the servant and sent him away empty-handed.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'So he again sent another servant; they also beat him and dishonored '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' treated him disgracefully and sent him away empty-handed.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he sent yet a third; and this one too they wounded and threw out
  - type: text
    text: ' [of the vineyard]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then the owner of the vineyard said, ‘What shall I do? I will send my beloved son; perhaps they will have respect for him.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But when the tenants saw him, they discussed it among themselves, saying, ‘This
  - type: text
    text: ' [man] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is the heir; let us kill him so that the inheritance will be ours.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they threw the son out of the vineyard and killed him. What, then, will the owner of the vineyard do to them?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will come and put these tenants to death and will give the vineyard to others.”
  - type: text
    text: ' When the chief priests, the scribes, and the elders heard this, they said, “May it never be!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But Jesus looked at them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What then is
  - type: text
    text: ' [the meaning of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'this that is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘T
    - type: usfm
