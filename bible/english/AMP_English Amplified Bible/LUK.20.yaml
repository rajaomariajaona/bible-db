    children:
    - type: text
      text: marry the wife and raise children for his brother
  - type: text
    text: '. [Deut 25:5, 6] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now there were seven brothers; and the first took a wife and died childless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the second, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and the third married her, and in the same way all seven died, leaving no children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Finally the woman also died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So in the [life after] resurrection, whose wife does she become? For all seven had married her.”
