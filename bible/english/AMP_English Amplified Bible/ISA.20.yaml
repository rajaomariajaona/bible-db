      - type: text
        text: ' The Hebrew can refer to someone completely naked, or only stripped to the underwear (i.e. a loincloth); see note v 4. The ancient rabbis were particularly sensitive to the issue, and some maintained (contrary to the text) that Isaiah was wearing worn-out clothes and patched shoes or sandals.'
