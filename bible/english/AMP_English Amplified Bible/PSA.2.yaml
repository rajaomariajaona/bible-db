      - type: text
        text: 'The word in the original is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bar,
      - type: text
        text: ' taken to be the Aramaic for “son.” But it is surprising that an Aramaic word would be used here. The ancient rabbis maintained that a different word with the same spelling in Hebrew was intended, whose meaning is “pure.” They claimed that it is a reference to the Torah, on the ground that all the words in the Torah are pure.'
