document_id: 2KI.25,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nebuchadnezzar Besieges Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now in the ninth year of Zedekiah’s reign, on the tenth day of the tenth month, Nebuchadnezzar king of Babylon came, he with all his army, against Jerusalem, and camped against it and built siege works surrounding it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All the army of the Chaldeans (Babylonians) who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were with
    - type: text
      text: ' the captain of the bodyguard tore down the walls around Jerusalem. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Nebuzaradan the captain of the bodyguard deported [into exile] the rest of the people who were left in the city and the deserters who had joined the king of Babylon, and the rest of the multitude. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But the captain of the bodyguard left some of the unimportant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' poorest people of the land to be vineyard workers and farmers.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Now the Chaldeans (Babylonians) smashed the bronze pillars which were in the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and their bases and the bronze sea (large basin) which were in the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and carried the bronze to Babylon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They took away the pots, the shovels, the snuffers, the spoons, and all the bronze articles which were used in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: ' service, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'the captain of the bodyguard also took away the firepans and basins, anything made of fine gold and anything made of fine silver. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The two pillars, the one sea (large basin), and the bases which Solomon had made for the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the bronze of all these articles was incalculable. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The height of the one pillar was eighteen cubits (27 ft.), and a capital of bronze was on top of it. The height of the capital was three cubits (4.5 ft.); a network (lattice work) and pomegranates around the capital were all of bronze. And the second pillar had the same as these, with a network.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The captain of the bodyguard took [captive] Seraiah the chief priest, Zephaniah the second priest, and the three doorkeepers [of the temple]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And from the city [of Jerusalem] he took an officer who was in command of the men of war, and five men from the king’s personal advisors who were found in the city, and the scribe of the captain of the army who mustered the people of the land [for military service] and sixty men from the people of the land who were found in the city. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The city came under siege [for nearly two years] until the eleventh year of King Zedekiah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nebuzaradan the captain of the bodyguard took them and brought them to the king of Babylon at Riblah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the king of Babylon struck them down and killed them at Riblah in the land of Hamath [north of Damascus]. So Judah was taken into exile from its land.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gedaliah Made Governor
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Now over the people whom Nebuchadnezzar king of Babylon had left in the land of Judah, he appointed [as governor] Gedaliah the son of Ahikam, the son of Shaphan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When all the captains of the forces, they and their men, heard that the king of Babylon had appointed Gedaliah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: governor,
    - type: text
      text: ' they came with their men to Gedaliah at Mizpah, namely, Ishmael the son of Nethaniah, and Johanan the son of Kareah, and Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of the Maacathite. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Gedaliah swore [an oath] to them and their men, and said to them, “Do not be afraid of the servants (officials) of the Chaldeans. Live in the land and serve the king of Babylon, and it will be well with you.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But in the seventh month Ishmael the son of Nethaniah, the son of Elishama, of the royal family [who had a claim to be governor], came with ten men and struck and killed Gedaliah and the Jews and the Chaldeans who were with him at Mizpah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then all the people, both small and great, and the captains of the forces set out and went to Egypt; for they were afraid of the Chaldeans (Babylonians).
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now it came about in the thirty-seventh year of the exile of Jehoiachin king of Judah, on the twenty-seventh day of the twelfth month, that Evil-merodach king of Babylon, in the year that he became king, showed favor to Jehoiachin king of Judah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' released him from prison; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and he spoke kindly to him and set his throne above the throne of the [other] kings [of captive peoples] who were with him in Babylon. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jehoiachin changed his prison clothes [for palace garments] and he dined regularly in the king’s presence for the remainder of his life; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On the ninth day of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fourth
    - type: text
      text: ' month the famine [caused by the siege] was severe in the city; there was no food for the people of the land. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: and his allowance, a continual one, was given to him by the king (Evil-meridach), a portion every day, for the rest of his life.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the city [wall] was broken into [and conquered]; all the men of war '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fled
    - type: text
      text: ' by night by way of the gate between the two walls by the king’s garden, though the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Chaldeans were the dominant people in Babylonia. Originally from a small part of southern Babylonia near the head of the Persian Gulf, they were an aggressive tribe and completely controlled the country after 625 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . Babylon was their capital city and became the scholarly and scientific center of western Asia. The words “Chaldean” and “Babylonian” are used interchangeably.
      marker-yv: yv-n
    - type: text
      text: 'Chaldeans (Babylonians) were all around the city. And they went by way of the Arabah (the plain of the Jordan). '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The army of the Chaldeans pursued the king and overtook him in the plains of Jericho. Then his entire army was dispersed from him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So they seized the king (Zedekiah) and brought him to the king of Babylon at Riblah [on the Orontes River], and sentence was passed on him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They slaughtered the sons of Zedekiah before his eyes, then put out the eyes of Zedekiah and bound him [hand and foot] with bronze fetters and brought him to Babylon. [Jer 34:3; Ezek 12:13]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem Burned and Plundered
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'On the seventh day of the fifth month in the nineteenth year of King Nebuchadnezzar of Babylon, Nebuzaradan, captain of the bodyguard, a servant of the king of Babylon, came to Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He burned the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the king’s house, and all the houses of Jerusalem; every great house he burned down. '
