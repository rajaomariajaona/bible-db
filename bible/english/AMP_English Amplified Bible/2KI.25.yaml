document_id: 2KI.25,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar Besieges Jerusalem
  - type: text
    content: 'Now in the ninth year of Zedekiah’s reign, on the tenth day of the tenth month, Nebuchadnezzar king of Babylon came, he with all his army, against Jerusalem, and camped against it and built siege works surrounding it. '
  '10':
  - type: text
    content: 'All the army of the Chaldeans (Babylonians) who '
  - type: text
    content: were with
  - type: text
    content: ' the captain of the bodyguard tore down the walls around Jerusalem. '
  '11':
  - type: text
    content: 'Then Nebuzaradan the captain of the bodyguard deported [into exile] the rest of the people who were left in the city and the deserters who had joined the king of Babylon, and the rest of the multitude. '
  '12':
  - type: text
    content: 'But the captain of the bodyguard left some of the unimportant '
  - type: text
    content: and
  - type: text
    content: ' poorest people of the land to be vineyard workers and farmers.'
  '13':
  - type: text
    content: Now the Chaldeans (Babylonians) smashed the bronze pillars which were in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and their bases and the bronze sea (large basin) which were in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and carried the bronze to Babylon. '
  '14':
  - type: text
    content: 'They took away the pots, the shovels, the snuffers, the spoons, and all the bronze articles which were used in the '
  - type: text
    content: temple
  - type: text
    content: ' service, '
  '15':
  - type: text
    content: 'the captain of the bodyguard also took away the firepans and basins, anything made of fine gold and anything made of fine silver. '
  '16':
  - type: text
    content: The two pillars, the one sea (large basin), and the bases which Solomon had made for the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', the bronze of all these articles was incalculable. '
  '17':
  - type: text
    content: The height of the one pillar was eighteen cubits (27 ft.), and a capital of bronze was on top of it. The height of the capital was three cubits (4.5 ft.); a network (lattice work) and pomegranates around the capital were all of bronze. And the second pillar had the same as these, with a network.
  '18':
  - type: text
    content: 'The captain of the bodyguard took [captive] Seraiah the chief priest, Zephaniah the second priest, and the three doorkeepers [of the temple]. '
  '19':
  - type: text
    content: 'And from the city [of Jerusalem] he took an officer who was in command of the men of war, and five men from the king’s personal advisors who were found in the city, and the scribe of the captain of the army who mustered the people of the land [for military service] and sixty men from the people of the land who were found in the city. '
  '2':
  - type: text
    content: 'The city came under siege [for nearly two years] until the eleventh year of King Zedekiah. '
  '20':
  - type: text
    content: 'Nebuzaradan the captain of the bodyguard took them and brought them to the king of Babylon at Riblah. '
  '21':
  - type: text
    content: Then the king of Babylon struck them down and killed them at Riblah in the land of Hamath [north of Damascus]. So Judah was taken into exile from its land.
  - type: heading
    content: Gedaliah Made Governor
  '22':
  - type: text
    content: 'Now over the people whom Nebuchadnezzar king of Babylon had left in the land of Judah, he appointed [as governor] Gedaliah the son of Ahikam, the son of Shaphan. '
  '23':
  - type: text
    content: 'When all the captains of the forces, they and their men, heard that the king of Babylon had appointed Gedaliah '
  - type: text
    content: governor,
  - type: text
    content: ' they came with their men to Gedaliah at Mizpah, namely, Ishmael the son of Nethaniah, and Johanan the son of Kareah, and Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of the Maacathite. '
  '24':
  - type: text
    content: Gedaliah swore [an oath] to them and their men, and said to them, “Do not be afraid of the servants (officials) of the Chaldeans. Live in the land and serve the king of Babylon, and it will be well with you.”
  '25':
  - type: text
    content: 'But in the seventh month Ishmael the son of Nethaniah, the son of Elishama, of the royal family [who had a claim to be governor], came with ten men and struck and killed Gedaliah and the Jews and the Chaldeans who were with him at Mizpah. '
  '26':
  - type: text
    content: Then all the people, both small and great, and the captains of the forces set out and went to Egypt; for they were afraid of the Chaldeans (Babylonians).
  '27':
  - type: text
    content: 'Now it came about in the thirty-seventh year of the exile of Jehoiachin king of Judah, on the twenty-seventh day of the twelfth month, that Evil-merodach king of Babylon, in the year that he became king, showed favor to Jehoiachin king of Judah '
  - type: text
    content: and
  - type: text
    content: ' released him from prison; '
  '28':
  - type: text
    content: 'and he spoke kindly to him and set his throne above the throne of the [other] kings [of captive peoples] who were with him in Babylon. '
  '29':
  - type: text
    content: 'Jehoiachin changed his prison clothes [for palace garments] and he dined regularly in the king’s presence for the remainder of his life; '
  '3':
  - type: text
    content: 'On the ninth day of the '
  - type: text
    content: fourth
  - type: text
    content: ' month the famine [caused by the siege] was severe in the city; there was no food for the people of the land. '
  '30':
  - type: text
    content: and his allowance, a continual one, was given to him by the king (Evil-meridach), a portion every day, for the rest of his life.
  '4':
  - type: text
    content: 'Then the city [wall] was broken into [and conquered]; all the men of war '
  - type: text
    content: fled
  - type: text
    content: ' by night by way of the gate between the two walls by the king’s garden, though the '
  - type: note
    content: The Chaldeans were the dominant people in Babylonia. Originally from a small part of southern Babylonia near the head of the Persian Gulf, they were an aggressive tribe and completely controlled the country after 625 b.c. Babylon was their capital city and became the scholarly and scientific center of western Asia. The words “Chaldean” and “Babylonian” are used interchangeably.
  - type: text
    content: 'Chaldeans (Babylonians) were all around the city. And they went by way of the Arabah (the plain of the Jordan). '
  '5':
  - type: text
    content: 'The army of the Chaldeans pursued the king and overtook him in the plains of Jericho. Then his entire army was dispersed from him. '
  '6':
  - type: text
    content: 'So they seized the king (Zedekiah) and brought him to the king of Babylon at Riblah [on the Orontes River], and sentence was passed on him. '
  '7':
  - type: text
    content: They slaughtered the sons of Zedekiah before his eyes, then put out the eyes of Zedekiah and bound him [hand and foot] with bronze fetters and brought him to Babylon. [Jer 34:3; Ezek 12:13]
  - type: heading
    content: Jerusalem Burned and Plundered
  '8':
  - type: text
    content: 'On the seventh day of the fifth month in the nineteenth year of King Nebuchadnezzar of Babylon, Nebuzaradan, captain of the bodyguard, a servant of the king of Babylon, came to Jerusalem. '
  '9':
  - type: text
    content: He burned the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ', the king’s house, and all the houses of Jerusalem; every great house he burned down. '
