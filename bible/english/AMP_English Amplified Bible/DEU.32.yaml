document_id: DEU.32,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Song of Moses
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Listen, O heavens, and I will speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the earth hear the words of my mouth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “He found him in a desert land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the howling wasteland of a wilderness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He kept circling him, He took care of him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He protected him as the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: pupil
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: apple of His eye.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “As an eagle that protects its nest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That flutters over its young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spread out His wings and took them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He carried them on His pinions. [Luke 13:34]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' alone led him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There was no foreign god with him.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “He made him (Israel) ride on the high places of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he ate the produce of the field;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He made him suck honey from the rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [olive] oil from the flinty rock,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Butter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' curds of cows, and milk of the flock,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With fat of lambs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rams, the breed of Bashan, and goats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the finest of the wheat;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you drank wine, the blood of grapes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶“But Jeshurun (Israel) became fat and kicked [at God].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You became fat, thick, sleek, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' obstinate!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he abandoned God who had made him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And scorned the Rock of his salvation.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“They provoked Him to jealousy with strange '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gods
    - type: text
      text: ' [by denying Him the honor and loyalty that is rightfully and uniquely His];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with repulsive acts they provoked Him to anger.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “They sacrificed to demons, not to God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To gods whom they have not known,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'New '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gods
    - type: text
      text: ' who came lately,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom your fathers never feared.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “You were unmindful of the Rock who bore you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you forgot the God who gave you birth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ¶“The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' saw it, and rejected them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of indignation with His sons and His daughters.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Let my teaching drop as the rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My speech distill as the dew,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the light rain upon the tender grass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as the spring showers upon the herb.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Then He said, ‘I will hide My face from them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will see what their end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are a perverse generation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sons in whom there is no faithfulness.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '‘They have made Me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
      marker-yv: yv-n
    - type: text
      text: jealous with what is not God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have provoked Me to anger with their idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will make them jealous with those who are not a people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will provoke them to anger with a foolish nation.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ‘For a fire is kindled by My anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it burns to the depths of Sheol (the place of the dead, the nether world),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It devours the earth with its yield,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sets on fire the foundations of the mountains.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ¶‘I will heap misfortunes on them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will use My arrows on them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ‘They will be wasted by hunger, and consumed by plague
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a bitter destruction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will send the teeth of beasts against them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the venom of crawling things of the dust.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ‘Outside the sword will bereave,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And inside [the chambers] terror—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For both young man and virgin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the nursing child and the man of gray hair.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ‘I would have said, “I will cut them to pieces [scattering them far away],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will remove the memory of them from men,”
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Had I not feared the provocation of the enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That their adversaries would misjudge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they would say, “Our [own] hand has prevailed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not done all this.” ’'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ¶“For they are a nation devoid of counsel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no understanding in them.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “O that they were wise, that they understood this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That they could discern their future '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ultimate fate!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “For I proclaim the name [and presence] of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ascribe greatness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor to our God!'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “How could one chase a thousand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And two put ten thousand to flight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unless their Rock had sold them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had given them up?'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “For their rock is not like our Rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even our enemies themselves judge this.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “For their vine is from the vine of Sodom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from the fields of Gomorrah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their grapes are grapes of poison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their clusters, bitter.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “Their wine is the venom of serpents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the deadly poison of vipers.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ¶‘Is it not laid up in store with Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sealed up in My treasuries?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ‘Vengeance is Mine, and retribution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In due time their foot will slip;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the day of their disaster is at hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their doom hurries to meet them.’
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will vindicate His people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will have compassion on His servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When He sees that their strength (hand) is gone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And none remains, whether bond or free.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: “And He will say, ‘Where are their gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rock in which they took refuge?
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ‘Who ate the fat of their sacrifices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And drank the wine of their drink offering?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them rise up and help you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be your hiding place!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ‘See now that I, I am He,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no god besides Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is I who put to death and I who give life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have wounded and it is I who heal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And there is no one who can deliver from [the power of] My hand.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “The Rock! His work is perfect,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all His ways are just;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A God of faithfulness without iniquity (injustice),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just and upright is He.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ‘Indeed, I lift up My hand to heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And say (swear an oath), as I live forever,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: If I sharpen the lightning of My sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My hand takes hold of judgment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will render vengeance on My adversaries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will repay those who hate Me.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ‘I will make My arrows drunk with blood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My sword will devour flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the blood of the slain and the captives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the heads of the leaders of the enemy.’
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: “Rejoice, O nations, with His people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He will avenge the blood of His servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will render vengeance on His adversaries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And will atone for His land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' His people.”'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Then Moses came and spoke all the words of this song in the hearing of the people, he and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Hoshea
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joshua the son of Nun. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
