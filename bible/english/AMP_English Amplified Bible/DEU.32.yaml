  '1':
  - type: heading
    content: The Song of Moses
  - type: text
    content: “Listen, O heavens, and I will speak;
  - type: text
    content: And let the earth hear the words of my mouth.
  '10':
  - type: text
    content: “He found him in a desert land,
  - type: text
    content: In the howling wasteland of a wilderness;
  - type: text
    content: He kept circling him, He took care of him,
  - type: text
    content: 'He protected him as the '
  - type: note
    content: Lit pupil.
  - type: text
    content: apple of His eye.
  '11':
  - type: text
    content: “As an eagle that protects its nest,
  - type: text
    content: That flutters over its young,
  - type: text
    content: He spread out His wings and took them,
  - type: text
    content: He carried them on His pinions. [Luke 13:34]
  '12':
  - type: text
    content: “So the L
  - type: heading
    content: ord
  - type: text
    content: ' alone led him;'
  - type: text
    content: There was no foreign god with him.
  '13':
  - type: text
    content: “He made him (Israel) ride on the high places of the earth,
  - type: text
    content: And he ate the produce of the field;
  - type: text
    content: And He made him suck honey from the rock,
  - type: text
    content: And [olive] oil from the flinty rock,
  '14':
  - type: text
    content: 'Butter '
  - type: text
    content: and
  - type: text
    content: ' curds of cows, and milk of the flock,'
  - type: text
    content: With fat of lambs,
  - type: text
    content: And rams, the breed of Bashan, and goats,
  - type: text
    content: With the finest of the wheat;
  - type: text
    content: And you drank wine, the blood of grapes.
  '15':
  - type: text
    content: ¶“But Jeshurun (Israel) became fat and kicked [at God].
  - type: text
    content: 'You became fat, thick, sleek, '
  - type: text
    content: and
  - type: text
    content: ' obstinate!'
  - type: text
    content: Then he abandoned God who had made him,
  - type: text
    content: And scorned the Rock of his salvation.
  '16':
  - type: text
    content: '“They provoked Him to jealousy with strange '
  - type: text
    content: gods
  - type: text
    content: ' [by denying Him the honor and loyalty that is rightfully and uniquely His];'
  - type: text
    content: And with repulsive acts they provoked Him to anger.
  '17':
  - type: text
    content: “They sacrificed to demons, not to God,
  - type: text
    content: To gods whom they have not known,
  - type: text
    content: 'New '
  - type: text
    content: gods
  - type: text
    content: ' who came lately,'
  - type: text
    content: Whom your fathers never feared.
  '18':
  - type: text
    content: “You were unmindful of the Rock who bore you,
  - type: text
    content: And you forgot the God who gave you birth.
  '19':
  - type: text
    content: ¶“The L
  - type: heading
    content: ord
  - type: text
    content: ' saw it, and rejected them,'
  - type: text
    content: Out of indignation with His sons and His daughters.
  '2':
  - type: text
    content: “Let my teaching drop as the rain,
  - type: text
    content: My speech distill as the dew,
  - type: text
    content: As the light rain upon the tender grass,
  - type: text
    content: And as the spring showers upon the herb.
  '20':
  - type: text
    content: “Then He said, ‘I will hide My face from them,
  - type: text
    content: 'I will see what their end '
  - type: text
    content: shall be;
  - type: text
    content: For they are a perverse generation,
  - type: text
    content: Sons in whom there is no faithfulness.
  '21':
  - type: text
    content: '‘They have made Me '
  - type: note
    content: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
  - type: text
    content: jealous with what is not God;
  - type: text
    content: They have provoked Me to anger with their idols.
  - type: text
    content: So I will make them jealous with those who are not a people;
  - type: text
    content: I will provoke them to anger with a foolish nation.
  '22':
  - type: text
    content: ‘For a fire is kindled by My anger,
  - type: text
    content: And it burns to the depths of Sheol (the place of the dead, the nether world),
  - type: text
    content: It devours the earth with its yield,
  - type: text
    content: And sets on fire the foundations of the mountains.
  '23':
  - type: text
    content: ¶‘I will heap misfortunes on them;
  - type: text
    content: I will use My arrows on them.
  '24':
  - type: text
    content: ‘They will be wasted by hunger, and consumed by plague
  - type: text
    content: And a bitter destruction;
  - type: text
    content: And I will send the teeth of beasts against them,
  - type: text
    content: With the venom of crawling things of the dust.
  '25':
  - type: text
    content: ‘Outside the sword will bereave,
  - type: text
    content: And inside [the chambers] terror—
  - type: text
    content: For both young man and virgin,
  - type: text
    content: For the nursing child and the man of gray hair.
  '26':
  - type: text
    content: ‘I would have said, “I will cut them to pieces [scattering them far away],
  - type: text
    content: I will remove the memory of them from men,”
  '27':
  - type: text
    content: Had I not feared the provocation of the enemy,
  - type: text
    content: That their adversaries would misjudge,
  - type: text
    content: That they would say, “Our [own] hand has prevailed,
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' has not done all this.” ’'
  '28':
  - type: text
    content: ¶“For they are a nation devoid of counsel,
  - type: text
    content: And there is no understanding in them.
  '29':
  - type: text
    content: “O that they were wise, that they understood this,
  - type: text
    content: 'That they could discern their future '
  - type: text
    content: and
  - type: text
    content: ' ultimate fate!'
  '3':
  - type: text
    content: “For I proclaim the name [and presence] of the L
  - type: heading
    content: ord
  - type: text
    content: ;
  - type: text
    content: 'Ascribe greatness '
  - type: text
    content: and
  - type: text
    content: ' honor to our God!'
  '30':
  - type: text
    content: “How could one chase a thousand,
  - type: text
    content: And two put ten thousand to flight,
  - type: text
    content: Unless their Rock had sold them,
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' had given them up?'
  '31':
  - type: text
    content: “For their rock is not like our Rock,
  - type: text
    content: Even our enemies themselves judge this.
  '32':
  - type: text
    content: “For their vine is from the vine of Sodom,
  - type: text
    content: And from the fields of Gomorrah;
  - type: text
    content: Their grapes are grapes of poison,
  - type: text
    content: Their clusters, bitter.
  '33':
  - type: text
    content: “Their wine is the venom of serpents,
  - type: text
    content: And the deadly poison of vipers.
  '34':
  - type: text
    content: ¶‘Is it not laid up in store with Me,
  - type: text
    content: Sealed up in My treasuries?
  '35':
  - type: text
    content: ‘Vengeance is Mine, and retribution,
  - type: text
    content: In due time their foot will slip;
  - type: text
    content: For the day of their disaster is at hand,
  - type: text
    content: And their doom hurries to meet them.’
  '36':
  - type: text
    content: “For the L
  - type: heading
    content: ord
  - type: text
    content: ' will vindicate His people,'
  - type: text
    content: And will have compassion on His servants,
  - type: text
    content: When He sees that their strength (hand) is gone,
  - type: text
    content: And none remains, whether bond or free.
  '37':
  - type: text
    content: “And He will say, ‘Where are their gods,
  - type: text
    content: The rock in which they took refuge?
  '38':
  - type: text
    content: ‘Who ate the fat of their sacrifices,
  - type: text
    content: And drank the wine of their drink offering?
  - type: text
    content: Let them rise up and help you,
  - type: text
    content: Let them be your hiding place!
  '39':
  - type: text
    content: ‘See now that I, I am He,
  - type: text
    content: And there is no god besides Me;
  - type: text
    content: It is I who put to death and I who give life.
  - type: text
    content: I have wounded and it is I who heal,
  - type: text
    content: And there is no one who can deliver from [the power of] My hand.
  '4':
  - type: text
    content: “The Rock! His work is perfect,
  - type: text
    content: For all His ways are just;
  - type: text
    content: A God of faithfulness without iniquity (injustice),
  - type: text
    content: Just and upright is He.
  '40':
  - type: text
    content: ‘Indeed, I lift up My hand to heaven,
  - type: text
    content: And say (swear an oath), as I live forever,
  '41':
  - type: text
    content: If I sharpen the lightning of My sword,
  - type: text
    content: And My hand takes hold of judgment,
  - type: text
    content: I will render vengeance on My adversaries,
  - type: text
    content: And I will repay those who hate Me.
  '42':
  - type: text
    content: ‘I will make My arrows drunk with blood,
  - type: text
    content: And My sword will devour flesh,
  - type: text
    content: With the blood of the slain and the captives,
  - type: text
    content: From the heads of the leaders of the enemy.’
  '43':
  - type: text
    content: “Rejoice, O nations, with His people;
  - type: text
    content: For He will avenge the blood of His servants,
  - type: text
    content: And will render vengeance on His adversaries,
  - type: text
    content: 'And will atone for His land '
  - type: text
    content: and
  - type: text
    content: ' His people.”'
  '44':
  - type: text
    content: 'Then Moses came and spoke all the words of this song in the hearing of the people, he and '
  - type: note
    content: Lit Hoshea.
  - type: text
    content: 'Joshua the son of Nun. '
  '45':
  - type: text
    content: 'When Moses had finished speaking all these words to all [the people of] Israel, '
  '46':
  - type: text
    content: 'he said to them, “Take to heart all the words of warning which I am speaking to you today; and you shall command your children to observe them carefully—to do all the words of this law. '
  '47':
  - type: text
    content: 'For it is not an empty '
  - type: text
    content: or
  - type: text
    content: ' trivial matter for you; indeed it is your [very] life. By [honoring and obeying] this word you will live long in the land, which you are crossing the Jordan to possess.”'
  '48':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses that very same day, '
  '49':
  - type: text
    content: '“Go up to this mountain of the Abarim, Mount Nebo, which is in the land of Moab opposite Jericho, and look at the land of Canaan, which I am giving to the sons of Israel as a possession. '
  '5':
  - type: text
    content: “They (Israel) have acted corruptly toward Him.
  - type: text
    content: They are not His children, because of their [moral] defect;
  - type: text
    content: But are
  - type: text
    content: ' a perverse and crooked generation.'
  '50':
  - type: text
    content: 'Then die on the mountain which you climb, and be gathered to your people [in death], just as Aaron your brother died on Mount Hor and was gathered to his people, '
  '51':
  - type: text
    content: 'because you broke faith with Me among of the sons of Israel at the waters of Meribah-kadesh, in the Wilderness of Zin, and because you did not treat Me as holy among of the sons of Israel. [Num 20:8-12; 27:14] '
  '52':
  - type: text
    content: For you shall see the land opposite you from a distance, but you shall not go there, into the land which I am giving to the children of Israel.”
  '6':
  - type: text
    content: “Do you thus repay the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: O foolish and unwise people?
  - type: text
    content: Is not He your Father who has acquired you [as His own]?
  - type: text
    content: He has made you and established you [as a nation].
  '7':
  - type: text
    content: “Remember the days of old,
  - type: text
    content: Consider the years of many generations.
  - type: text
    content: Ask your father, and he will inform you,
  - type: text
    content: Your elders, and they will tell you.
  '8':
  - type: text
    content: “When the Most High gave the nations their inheritance,
  - type: text
    content: When He separated the sons of man,
  - type: text
    content: He set the boundaries of the peoples
  - type: text
    content: According to the number of the sons of Israel.
  '9':
  - type: text
    content: “For the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' portion '
  - type: text
    content: and
  - type: text
    content: ' chosen share is His people;'
  - type: text
    content: Jacob (Israel) is the allotment of His inheritance.
