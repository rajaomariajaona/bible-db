    - type: text
      text: ' He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' spreads out the north over emptiness'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Job reveals a remarkable understanding of God’s power and His amazing universe.
      marker-yv: yv-n
    - type: text
      text: hangs the earth on nothing.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “He wraps the waters in His clouds [which otherwise would spill on earth all at once],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the cloud does not burst under them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“He covers the face of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
