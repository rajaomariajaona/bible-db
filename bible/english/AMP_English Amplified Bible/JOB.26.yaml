    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: But Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “He has inscribed a circular limit (the horizon) on the face of the waters
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the boundary between light and darkness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “The pillars of the heavens tremble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And are terrified at His rebuke.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “He stirred up the sea by His power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And by His understanding He smashed [proud] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a legendary and horrifying sea monster.
      marker-yv: yv-n
    - type: text
      text: Rahab.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “By His breath the heavens are cleared;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His hand has pierced the [swiftly] fleeing serpent. [Ps 33:6]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Yet these are just the fringes of His ways [mere samples of His power],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The faintest whisper of His voice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can contemplate the thunder of His [full] mighty power?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “What a help you are to the weak (powerless)!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How you have saved the arm that is without strength!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “How you have counseled the one who has no wisdom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And how abundantly you have provided sound wisdom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' helpful insight!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “To whom have you uttered [these] words?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And whose spirit [inspired what] came forth from you?
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Greatness of God
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ¶“The spirits of the dead tremble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Underneath the waters and their inhabitants.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Sheol (the nether world, the place of the dead) is naked before God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Abaddon (the place of destruction) has no covering [from His eyes].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “
    - type: usfm
      marker: it
