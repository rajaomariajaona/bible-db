  - type: text
    content: ' filled the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and I fell face downward. [Rev 15:8] '
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Son of man, pay careful attention, see with your eyes and hear with your ears all that I say to you concerning all the statutes of the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' and all its laws; and pay careful attention to the entering of the house [by people], with all the departures '
  - type: text
    content: from
  - type: text
    content: ' the sanctuary [of people, those who are allowed to enter the temple and all those who are excluded from the sanctuary]. '
  '6':
  - type: text
    content: You shall say to the rebellious ones, to the house of Israel, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Enough of all your repulsive acts, O house of Israel! '
  '7':
  - type: text
    content: 'In that you brought in foreigners, uncircumcised in heart and uncircumcised in flesh, to be in My sanctuary to pollute '
  - type: text
