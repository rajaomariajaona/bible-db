  - type: text
    content: ', the God of Israel, has entered by it; therefore it shall be shut. '
  '20':
  - type: text
    content: 'Also they shall not shave their heads, yet they shall not allow their hair to grow long; they shall only cut short '
  - type: text
    content: or
  - type: text
    content: ' trim their hair. '
  '21':
  - type: text
    content: 'Nor shall any priest drink wine when he enters the inner courtyard. '
  '22':
  - type: text
    content: 'And they shall not marry a widow or a divorced woman; but they shall marry virgins of the descendants of the house of Israel, or a widow who was previously married to a priest. '
  '23':
  - type: text
    content: 'The priests shall teach My people '
  - type: text
    content: the difference
  - type: text
    content: ' between the holy and the common, and teach them to distinguish between the (ceremonially) unclean and the clean. '
  '24':
  - type: text
    content: 'In a controversy they shall take their stand to act as judges; they shall judge it in accordance with My ordinances. They shall also keep My laws and My statutes in all My appointed feasts and sanctify My Sabbaths. '
  '25':
  - type: text
    content: 'They shall not go to a dead person to '
  - type: note
    content: I.e. become ceremonially unclean.
  - type: text
    content: 'defile '
  - type: text
    content: themselves;
  - type: text
    content: ' except for father or for mother, for son or for daughter, for brother or for sister who has had no husband; they may defile themselves. [Lev 21:1, 2] '
  '26':
  - type: text
    content: 'After he is cleansed [from the defilement of a corpse], seven days more shall elapse for him [before returning to the temple]. '
  '27':
  - type: text
    content: On the day that he goes into the sanctuary, into the inner courtyard to minister in the sanctuary, he shall offer his sin offering,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '28':
  - type: text
    content: '“It [their ministry to Me] shall be as an inheritance to them, for I am their inheritance; and you shall give them no property (land) in Israel, for I am their possession. [Josh 13:14, 33] '
  '29':
  - type: text
    content: 'They shall eat the grain offering, the sin offering and the guilt offering; and every devoted thing (offering) in Israel [dedicated by a solemn vow to God] shall be theirs. '
  '3':
  - type: text
    content: As for the prince, he shall sit in it as prince to eat bread before the L
  - type: heading
    content: ord
  - type: text
    content: ; he shall enter by way of the porch (portico) of the gate and shall go out the same way.”
  '30':
  - type: text
    content: 'The first of all the first fruits of every kind, and every contribution '
  - type: text
    content: and
  - type: text
    content: ' offering of every kind, from all your contributions '
  - type: text
    content: and
  - type: text
    content: ' offerings, shall belong to the priests. You shall also give to the priest the first of your coarse meal '
  - type: text
    content: and
  - type: text
    content: ' bread dough, so that a blessing may rest on your house. '
  '31':
  - type: text
    content: The priests shall not eat any bird or animal that has died a natural death or has been torn to pieces.
  '4':
  - type: text
    content: 'Then He brought me by way of the north gate to the front of the house; I looked, and behold, the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
