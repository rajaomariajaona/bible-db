  '1':
  - type: heading
    content: Gate for the Prince
  - type: text
    content: 'Then He brought me back by the way of the outer gate of the sanctuary, which faces the east; and it was shut. '
  '10':
  - type: text
    content: 'But the Levites who went far away from Me when Israel went astray, who went astray from Me after their idols, they shall bear '
  - type: text
    content: the punishment for
  - type: text
    content: ' their sin '
  - type: text
    content: and
  - type: text
    content: ' guilt. '
  '11':
  - type: text
    content: 'Yet they shall minister in My sanctuary, having oversight [as guards] at the gates of the temple and ministering in the temple. They shall slaughter the burnt offering and the sacrifice for the people, and they shall stand before them to minister to them. '
  '12':
  - type: text
    content: 'Because the priests ministered to them before their idols and became a stumbling block of sin to the house of Israel, therefore I have lifted up My hand '
  - type: text
    content: and
  - type: text
    content: ' have sworn [an oath] against them,” says the Lord G'
  - type: heading
    content: od
  - type: text
    content: ', “that they shall bear '
  - type: text
    content: the punishment for
  - type: text
    content: ' their sin '
  - type: text
    content: and
  - type: text
    content: ' guilt. '
  '13':
  - type: text
    content: 'And they shall not come near to Me to serve as priests to Me, nor come near to any of My holy things, to the things that are most holy; but they shall bear their shame '
  - type: text
    content: and
  - type: text
    content: ' their disgrace and [the consequences of] their repulsive acts which they have committed. '
  '14':
  - type: text
    content: Yet I will appoint them as caretakers of the temple, for all its service and for all that shall be done in it.
  - type: heading
    content: Ordinances for the Levites
  '15':
  - type: text
    content: “But the Levitical priests, the sons of Zadok, who performed the duty of My sanctuary when the children (descendants) of Israel went astray from Me, shall come near to Me to minister to Me; and they shall stand before Me to offer to Me the fat and the blood,” declares the Lord G
  - type: heading
    content: od
  - type: text
    content: '. '
  '16':
  - type: text
    content: '“They shall enter into My sanctuary; and they shall come near to My table to minister to Me and they shall perform [the priestly] duty to me. '
  '17':
  - type: text
    content: 'It shall be that when they enter the gates of the inner courtyard, they shall be clothed in linen garments; no wool shall be on them while they minister at the gates of the inner courtyard and within the temple (house). '
  '18':
  - type: text
    content: 'They shall have linen turbans on their heads and linen undergarments on their '
  - type: note
    content: The midsection of the body between the lower ribs and the hips.
  - type: text
    content: 'loins; they shall not dress themselves with '
  - type: text
    content: anything which makes them
  - type: text
    content: ' sweat. '
  '19':
  - type: text
    content: 'When they go out into the outer court, into the outer courtyard to the people, they shall take off the garments in which they have been ministering and leave them in the holy chambers; then they shall put on other clothing so that they will not transmit holiness to the people with their [ceremonial] garments. '
  '2':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “This '
  - type: note
    content: The eastern gate of the temple which was shown to Ezekiel in the vision is not the old city’s eastern gate (Golden Gate) which was sealed by Sultan Suleiman the Magnificent in 1542.
  - type: text
    content: gate shall be shut; it shall not be opened, and no one shall enter by it, for the L
  - type: heading
