document_id: EZK.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Gate for the Prince
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then He brought me back by the way of the outer gate of the sanctuary, which faces the east; and it was shut. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “This '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The eastern gate of the temple which was shown to Ezekiel in the vision is not the old city’s eastern gate (Golden Gate) which was sealed by Sultan Suleiman the Magnificent in 1542.
    marker-yv: yv-n
  - type: text
    text: gate shall be shut; it shall not be opened, and no one shall enter by it, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, has entered by it; therefore it shall be shut. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As for the prince, he shall sit in it as prince to eat bread before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; he shall enter by way of the porch (portico) of the gate and shall go out the same way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then He brought me by way of the north gate to the front of the house; I looked, and behold, the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' filled the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and I fell face downward. [Rev 15:8] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Son of man, pay careful attention, see with your eyes and hear with your ears all that I say to you concerning all the statutes of the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and all its laws; and pay careful attention to the entering of the house [by people], with all the departures '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' the sanctuary [of people, those who are allowed to enter the temple and all those who are excluded from the sanctuary]. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You shall say to the rebellious ones, to the house of Israel, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Enough of all your repulsive acts, O house of Israel! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In that you brought in foreigners, uncircumcised in heart and uncircumcised in flesh, to be in My sanctuary to pollute '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' profane it—My house—when you offered My bread, the fat, and the blood; and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'So MT; ancient versions read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: you
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: they made My covenant void—
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' in addition to all your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' repulsive acts. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And you have not kept charge of My holy things yourselves, but you have chosen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: foreigners
  - type: text
    text: ' [to please yourselves] and have set them in charge of My sanctuary.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “No foreigner uncircumcised in heart and flesh, of all the foreigners who are among the sons of Israel, shall enter My sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the Levites who went far away from Me when Israel went astray, who went astray from Me after their idols, they shall bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the punishment for
  - type: text
    text: ' their sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yet they shall minister in My sanctuary, having oversight [as guards] at the gates of the temple and ministering in the temple. They shall slaughter the burnt offering and the sacrifice for the people, and they shall stand before them to minister to them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Because the priests ministered to them before their idols and became a stumbling block of sin to the house of Israel, therefore I have lifted up My hand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have sworn [an oath] against them,” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “that they shall bear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the punishment for
  - type: text
    text: ' their sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they shall not come near to Me to serve as priests to Me, nor come near to any of My holy things, to the things that are most holy; but they shall bear their shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' their disgrace and [the consequences of] their repulsive acts which they have committed. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Yet I will appoint them as caretakers of the temple, for all its service and for all that shall be done in it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ordinances for the Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “But the Levitical priests, the sons of Zadok, who performed the duty of My sanctuary when the children (descendants) of Israel went astray from Me, shall come near to Me to minister to Me; and they shall stand before Me to offer to Me the fat and the blood,” declares the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“They shall enter into My sanctuary; and they shall come near to My table to minister to Me and they shall perform [the priestly] duty to me. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'It shall be that when they enter the gates of the inner courtyard, they shall be clothed in linen garments; no wool shall be on them while they minister at the gates of the inner courtyard and within the temple (house). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They shall have linen turbans on their heads and linen undergarments on their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The midsection of the body between the lower ribs and the hips.
    marker-yv: yv-n
  - type: text
    text: 'loins; they shall not dress themselves with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anything which makes them
  - type: text
    text: ' sweat. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When they go out into the outer court, into the outer courtyard to the people, they shall take off the garments in which they have been ministering and leave them in the holy chambers; then they shall put on other clothing so that they will not transmit holiness to the people with their [ceremonial] garments. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Also they shall not shave their heads, yet they shall not allow their hair to grow long; they shall only cut short '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' trim their hair. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nor shall any priest drink wine when he enters the inner courtyard. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And they shall not marry a widow or a divorced woman; but they shall marry virgins of the descendants of the house of Israel, or a widow who was previously married to a priest. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The priests shall teach My people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the difference
  - type: text
    text: ' between the holy and the common, and teach them to distinguish between the (ceremonially) unclean and the clean. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In a controversy they shall take their stand to act as judges; they shall judge it in accordance with My ordinances. They shall also keep My laws and My statutes in all My appointed feasts and sanctify My Sabbaths. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They shall not go to a dead person to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. become ceremonially unclean.
    marker-yv: yv-n
  - type: text
    text: 'defile '
  - type: usfm
    marker: it
    children:
    - type: text
      text: themselves;
  - type: text
    text: ' except for father or for mother, for son or for daughter, for brother or for sister who has had no husband; they may defile themselves. [Lev 21:1, 2] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'After he is cleansed [from the defilement of a corpse], seven days more shall elapse for him [before returning to the temple]. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: On the day that he goes into the sanctuary, into the inner courtyard to minister in the sanctuary, he shall offer his sin offering,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“It [their ministry to Me] shall be as an inheritance to them, for I am their inheritance; and you shall give them no property (land) in Israel, for I am their possession. [Josh 13:14, 33] '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They shall eat the grain offering, the sin offering and the guilt offering; and every devoted thing (offering) in Israel [dedicated by a solemn vow to God] shall be theirs. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The first of all the first fruits of every kind, and every contribution '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offering of every kind, from all your contributions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offerings, shall belong to the priests. You shall also give to the priest the first of your coarse meal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bread dough, so that a blessing may rest on your house. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The priests shall not eat any bird or animal that has died a natural death or has been torn to pieces.
