    content: As complete and continuous as the desolation of Moab and Ammon was for so many centuries, yet God is keeping His word for their restoration “in the latter days” (48:47) in a remarkable manner. For instance, Amman, the capital of the Hashemite Kingdom of Jordan (formerly called Transjordania, and in ancient times, Rabbath of Ammon or the City of Waters), was a mere village in 1900, but by the year 2000 it was a city of almost 2,000,000 inhabitants.
