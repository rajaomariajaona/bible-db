  - type: note
    content: This Hazor is not to be confused with three others mentioned elsewhere (Josh 11:1; 15:23; Neh 11:33). It was a region in the Arabian Desert east of Palestine. Jeremiah’s prophecy concerning it was literally fulfilled. Nebuchadnezzar conquered Arabia, according to historians, and Hazor’s exact situation is long since unknown. Hazor is also known as that part of the Arab nation which used fixed dwellings in unwalled towns, in contrast to nomadic Arabs.
