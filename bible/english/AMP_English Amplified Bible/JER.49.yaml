            text: Shushan)
        - type: text
          text: ', the ancient capital, was named for the gorgeous lilies that grew in the area. East of Babylonia, Elam was on the northern shore of the Persian Gulf in the lower Tigris Valley. After a long period of subjugation to foreign powers, it joined with Media, its northern neighbor, and ultimately captured Babylon (Is 21:2, 9). Elam became a province of the Persian Empire. Elamites settled as colonists in Samaria long before the return of the Jews from Babylon, and they joined with others in attempting to prevent the rebuilding of Jerusalem and the temple (Ezra 4:9). There were also Elamites present on the Day of Pentecost (Acts 2:9), but they became extinct in the eleventh century. Thus this prophecy of that nation’s destruction is long since fulfilled, with the restoration of Elam’s fortunes predicted in v 39.'
