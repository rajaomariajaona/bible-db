  - type: note
    content: How except by divine inspiration could the prophets have foretold that Edom’s desolation would be perpetual? After 2,500 years the statement is so literally true that in the land of Edom, where millions once lived, there are only a few people barely existing, and the land is in ruins. For there was no prophecy that Edom would recover “in the latter days” (48:47), as was predicted for Moab and Ammon, but Edom’s desolation was to be lasting. The short book of Obadiah presents an interesting further clarification of God’s reason for this exceptional treatment of Edom. It was the outcome of a deception and a family quarrel between two brothers, Jacob and Esau, which erupted into acts of violence and which continued from Genesis to the Gospels (see Gen 27).
