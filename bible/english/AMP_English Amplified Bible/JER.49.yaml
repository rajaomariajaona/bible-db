      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'When the tribes of the Northern Kingdom were taken captive in 734-732 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: ., the Ammonites, a nomadic, warlike people descended from Lot through his younger daughter, moved into the territory of the tribe of Gad east of the Jordan.
      marker-yv: yv-n
    - type: text
      text: sons (descendants) of Ammon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Does Israel have no sons [to reclaim Gad from the Ammonites]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has he no heir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why then has '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Malcam or Milcom (1 Kin 11:5, 33; Zeph 1:5) was the national god of the Ammonites. Other variant forms of this name include Milcham and Malcham.
      marker-yv: yv-n
    - type: text
      text: Malcam taken possession of Gad
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [why do] his people live in the cities [of Gad]?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “But I have stripped Esau (Edom) bare;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have uncovered his hiding places
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he cannot hide himself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His descendants have been destroyed along with his brothers (relatives) and his neighbors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he is no more.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Leave your orphans behind; I will [do what is needed to] keep them alive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let [those who are] your widows trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confide in Me.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Behold, those (Israel) who were not sentenced to drink the cup [of wrath] shall certainly drink it, and are you to remain unpunished? You will not be acquitted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go unpunished, but you will certainly drink [from the cup of wrath and judgment]. [Jer 25:28, 29] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For I have sworn [an oath] by Myself,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Located in northern Edom, between Petra and the Dead Sea, the area was famous for its dyed garments.
      marker-yv: yv-n
    - type: text
      text: 'Bozrah will become an object of horror, a reproach, a ruin, and a curse; and all its cities will become '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: How except by divine inspiration could the prophets have foretold that Edom’s desolation would be perpetual? After 2,500 years the statement is so literally true that in the land of Edom, where millions once lived, there are only a few people barely existing, and the land is in ruins. For there was no prophecy that Edom would recover “in the latter days” (48:47), as was predicted for Moab and Ammon, but Edom’s desolation was to be lasting. The short book of Obadiah presents an interesting further clarification of God’s reason for this exceptional treatment of Edom. It was the outcome of a deception and a family quarrel between two brothers, Jacob and Esau, which erupted into acts of violence and which continued from Genesis to the Gospels (see Gen 27).
      marker-yv: yv-n
    - type: text
      text: perpetual ruins.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ¶I have heard a report from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a messenger has been sent to the nations, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Gather together and come against her,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rise up for the battle.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “For behold, [Edom] I have made you small among the nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And despised among men. [Ezek 35:9]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “As for Your terror,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogance of your heart have deceived you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O you who live in the clefts of the rock (Sela also called '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Petra, once an important Roman province in Edom, was lost for many centuries but rediscovered in 1812. On the height above its ruins is the great high place. Other evidence of idolatry has been found on neighboring heights.
      marker-yv: yv-n
    - type: text
      text: Petra),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who hold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' occupy the height of the hill.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you make your nest as high as the eagle’s,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring you down from there,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Edom will become an object of horror; everyone who goes by it will be astonished and shall hiss [scornfully] at all its plagues '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disasters. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: As [it was] in the overthrow of Sodom and Gomorrah with their neighboring cities,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “no man will live there, nor will a son of man dwell in it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'See, one will come like a lion from the thicket of the Jordan against the enduring habitation [of Edom] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its watered pastures; for in an instant I will make '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In about 550 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . the Nabataeans completely overthrew the Edomites and drove them from their land. They took control of the great Middle Eastern trade routes and made Petra (Sela) their capital city.
      marker-yv: yv-n
    - type: text
      text: 'him (Edom) run from his land. I will appoint over him the one whom I choose. For who is like Me, and who will summon Me [into court] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosecute Me [for this]? Who is the [earthly] shepherd who can stand [defiantly] before Me?”'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Therefore behold, the days are coming,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I will cause an alarm of war to be heard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against Rabbah of the Ammonites;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it [along with the high ground on which it stands] will become a desolate heap,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its villages will be set on fire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then will Israel take possession of his possessors,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . [Ezek 21:28-32; 25:1-7, 11; Amos 1:13-15; Zeph 2:8-11]
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Therefore hear the plan of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He has devised against Edom, and [hear] what He has purposed against the inhabitants of Teman: surely they will be dragged away, even the little ones of the flock; surely He will make their dwelling place desolate because of them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'The earth has quaked at the noise of their downfall. There is an outcry! The sound of its noise has been heard at the Red Sea. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Behold, He will mount up and fly swiftly like an eagle and spread His wings against [the city of] Bozrah; and in that day the heart of the mighty warriors of Edom will be like the heart of a woman in childbirth. [Jer 48:41]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prophecy against Damascus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ¶Concerning Damascus [in Syria].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Hamath and Arpad are perplexed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shamed,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have heard bad news;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are disheartened;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anxious like a [storm-tossed] sea'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which cannot be calmed.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Damascus has become helpless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has turned away to flee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terror (panic) has seized her;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anguish and distress have gripped her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a woman in childbirth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “Why has the renowned city not been deserted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city of My joy!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “Therefore, her young men will fall in her streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all her men of war will be destroyed in that day,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. [Is 17:1-3; Amos 1:3-5; Zech 9:1]'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “I will set fire to the wall of Damascus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And it will consume the palaces of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ben-hadad (“son of Hadad,” a pagan god) was the title given to the early Syrian kings who ruled in Damascus.
      marker-yv: yv-n
    - type: text
      text: Ben-hadad.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prophecy against Kedar and Hazor
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Concerning '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A tribe of nomadic Arabs descended from Ishmael’s second son, Kedar (Gen 25:13).
      marker-yv: yv-n
    - type: text
      text: 'Kedar and concerning the kingdoms of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This Hazor is not to be confused with three others mentioned elsewhere (Josh 11:1; 15:23; Neh 11:33). It was a region in the Arabian Desert east of Palestine. Jeremiah’s prophecy concerning it was literally fulfilled. Nebuchadnezzar conquered Arabia, according to historians, and Hazor’s exact situation is long since unknown. Hazor is also known as that part of the Arab nation which used fixed dwellings in unwalled towns, in contrast to nomadic Arabs.
      marker-yv: yv-n
    - type: text
      text: Hazor, which Nebuchadnezzar king of Babylon defeated. Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Arise, go up against Kedar
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And destroy the men of the east.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “They (the Babylonians) will take away their tents and their flocks;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will carry off for themselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their tent curtains, all their goods and their camels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will call out to one another, ‘Terror on every side!’ [Ps 31:13; Jer 6:25; 20:3, 10; 46:5]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Wail, O '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Originally a Moabite town, Heshbon was located south of Ammon.
      marker-yv: yv-n
    - type: text
      text: Heshbon, for Ai [in Ammon] has been destroyed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cry out, O daughters of Rabbah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrap yourselves with sackcloth and lament (cry out in grief),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rush back and forth inside the enclosures;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Malcam [your powerless god] will go into exile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Together with his priests and his princes.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “Flee, run far away! Dwell in the depths [of the desert],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O inhabitants of Hazor,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For Nebuchadnezzar king of Babylon has planned a course of action against you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And devised a scheme against you.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “Arise [Nebuchadnezzar], go up against a nation which is at ease,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which lives securely,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A nation which has neither gates nor bars;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They dwell apart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' alone.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “Their camels will become plunder,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their herds of cattle a spoil;
  - type: usfm
    marker: q1
