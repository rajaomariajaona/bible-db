document_id: AMO.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Judgment Unavoidable
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I saw [in a vision] the Lord standing at the altar, and He said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Destroy the capitals (tops) of the pillars so that the thresholds will shake,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And break them on the heads of all of the people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I will kill the rest of them with the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will not have a fugitive who will get away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or a survivor who will escape.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Though they dig into '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hades, nether world, the place of the dead.
    marker-yv: yv-n
  - type: text
    text: Sheol [to hide in the deepest pit],
- type: usfm
  marker: q1
  children:
  - type: text
    text: From there My hand will take them [for judgment];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And though they climb up to heaven [to hide in the realm of light],
- type: usfm
  marker: q1
  children:
  - type: text
    text: From there will I bring them down [for judgment].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Though they hide on the summit of [Mount] Carmel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will track them down and take them from there;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And though they hide from My sight on the floor of the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From there I shall command the serpent and it will bite them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “And though they go into captivity before their enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From there I shall command the sword to kill them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will set My eyes against them for evil (judgment, punishment) and not for good [that is, not for correction leading to restoration].”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶The Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts [the Omnipotent Ruler],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is He who touches the earth [in judgment] and it melts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all who dwell on it mourn [in despair and fear],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all of it rises up like the Nile
- type: usfm
  marker: q1
  children:
  - type: text
    text: And subsides like the Nile of Egypt;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: It is He who builds His upper chambers in the heavens
- type: usfm
  marker: q1
  children:
  - type: text
    text: And has established His vaulted dome (the firmament of heaven) over the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who calls to the waters of the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: And pours them out on the face of the earth—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is His name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Are you [degenerate ones] not as the [despised] sons of Ethiopia to Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O sons of Israel?” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Have I not brought up Israel from the land of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Philistines from Caphtor and the Arameans (Syrians) from Kir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Behold, the eyes of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' are on the sinful [northern] kingdom [of Israel’s ten tribes]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I shall destroy it from the face of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I shall not totally destroy the house of Jacob [that is, the entire nation of Israel],”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “For behold, I am commanding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I shall shake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sift the house of Israel among all nations [and cause it to tremble]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grain
  - type: text
    text: ' is shaken in a sieve [removing the chaff],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But not a kernel [of the faithful remnant] shall fall to the ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be lost [from My sight]. [Lev 26:33; Deut 28:64; Hos 9:17]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “All the sinners among My people will die by the sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who say [defiantly], ‘The disaster will not overtake or confront us.’
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Restoration of Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '¶“In that day I shall raise up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restore the fallen '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly referring to the Davidic kingdom.
    marker-yv: yv-n
  - type: text
    text: tabernacle (booth) of David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And wall up its breaches [in the city walls];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will also raise up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restore its ruins'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rebuild it as it was in the days of old,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: That they may possess the remnant of Edom (ancient enemies)
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the nations that are called by My name,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who does this. [Acts 15:15-17]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“Behold, the days are coming,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When the plowman shall overtake the one who gathers the harvest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the one who treads the grapes [shall overtake] him who sows the seed [for the harvest continues until planting time];
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the mountains will drip sweet wine
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the hills shall melt [that is, everything that was once barren will overflow with streams of blessing]. [Lev 26:5; Joel 3:18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Also I shall bring back the exiles of My people Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And they will rebuild the deserted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruined cities and inhabit them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will also plant vineyards and drink their wine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make gardens and eat their fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “I will also plant them on their land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they shall never again be uprooted from their land
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which I have given them,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
