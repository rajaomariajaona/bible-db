document_id: ROM.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Greetings and Love Expressed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now I introduce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commend to you our sister '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Phoebe (“bright,” “pure”) was chosen by Paul as his emissary to deliver this letter to Rome. She may have held a recognized position within the church.
    marker-yv: yv-n
  - type: text
    text: 'Phoebe, a deaconess (servant) of the church at '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cenchrea, a few miles east of Corinth, served as Corinth’s port and was probably visited by Paul during both his second and third missionary journeys. This letter was written from Corinth near the end of the third journey.
    marker-yv: yv-n
  - type: text
    text: 'Cenchrea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that you may receive her in the Lord [with love and hospitality], as '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the saints
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: God’s people ought to receive one another. And that you may help her in whatever matter she may require assistance from you, for she has been a helper of many, including myself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Greet Prisca and Aquila, my fellow workers in Christ Jesus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who risked their own necks [endangering their very lives] for my life. To them not only do I give thanks, but also all the churches of the Gentiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: greet
  - type: text
    text: ' the church that meets in their house. Greet my beloved Epaenetus, who is the first convert to Christ from [the west coast province of] Asia [Minor]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Greet Mary, who has worked so hard for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Greet Andronicus and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Junia
      - type: text
        text: ' (feminine). There is a higher probability that the name is feminine; no masculine forms found in this or near time periods.'
    marker-yv: yv-n
  - type: text
    text: 'Junias, my kinsmen and [once] my fellow prisoners, who are held in high esteem '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek and larger context favor this understanding; Andronicus and Junia are not identified as apostles here.
    marker-yv: yv-n
  - type: text
    text: 'in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the estimation of
  - type: text
    text: ' the apostles, and who were [believers] in Christ before me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Greet Ampliatus, my beloved in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Greet Urbanus, our fellow worker in Christ, and my beloved Stachys. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Greet Apelles, the one tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' approved in Christ. Greet those who belong to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: household
  - type: text
    text: ' of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Believed by some scholars to be the brother of Herod Agrippa I and grandson of Herod the Great.
    marker-yv: yv-n
  - type: text
    text: 'Aristobulus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Greet my kinsman Herodion. Greet those of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: household
  - type: text
    text: ' of Narcissus, who are in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Greet those workers in the Lord, Tryphaena and Tryphosa. Greet my beloved Persis, who has worked hard in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Greet Rufus, an eminent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' choice man in the Lord, also his mother [who has been] a mother to me as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers who are with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Greet Philologus and Julia, Nereus and his sister, and Olympas, and all '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the saints
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'God’s people who are with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Greet one another with a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A traditional act of salutation in the early church.
    marker-yv: yv-n
  - type: text
    text: holy kiss. All the churches of Christ greet you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I urge you, brothers and sisters, to keep your eyes on those who cause dissensions and create obstacles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' introduce temptations [for others] to commit sin, [acting in ways] contrary to the doctrine which you have learned. Turn away from them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For such people do not serve our Lord Christ, but their own appetites and base desires. By smooth and flattering speech they deceive the hearts of the unsuspecting [the innocent and the naive]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the report of
  - type: text
    text: ' your obedience has reached everyone, so that I rejoice over you, but I want you to be wise in what is good and innocent in what is evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The God of peace will soon crush Satan under your feet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: he [wonderful] grace of our Lord Jesus be with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Timothy, my fellow worker, sends his greetings to you, as do Lucius, Jason and Sosipater, my kinsmen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul’s helper, who wrote this letter as Paul dictated it, inserted a personal greeting, undoubtedly with Paul’s permission.
    marker-yv: yv-n
  - type: text
    text: Tertius, the writer (scribe) of this letter, greet you in the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Gaius, who is host to me and to the whole church here, greets you. Erastus, the city treasurer, and our brother Quartus, greet you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Early mss do not contain this verse; it was taken from the Latin Vulgate.
    marker-yv: yv-n
  - type: text
    text: '[The grace of our Lord Jesus Christ be with you all. Amen.]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now to Him who is able to establish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strengthen you [in the faith] according to my gospel and the preaching of Jesus Christ, according to the revelation of the mystery [of the plan of salvation] which has been kept secret for long ages past, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'but now has been disclosed and through the prophetic Scriptures has been made known to all the nations, according to the commandment of the eternal God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: leading them
  - type: text
    text: ' to obedience to the faith, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: to the only wise God, through Jesus Christ, be the glory forevermore! Amen.
