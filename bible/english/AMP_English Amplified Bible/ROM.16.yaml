document_id: ROM.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Greetings and Love Expressed
  - type: text
    content: 'Now I introduce '
  - type: text
    content: and
  - type: text
    content: ' commend to you our sister '
  - type: note
    content: Phoebe (“bright,” “pure”) was chosen by Paul as his emissary to deliver this letter to Rome. She may have held a recognized position within the church.
  - type: text
    content: 'Phoebe, a deaconess (servant) of the church at '
  - type: note
    content: Cenchrea, a few miles east of Corinth, served as Corinth’s port and was probably visited by Paul during both his second and third missionary journeys. This letter was written from Corinth near the end of the third journey.
  - type: text
    content: 'Cenchrea, '
  '10':
  - type: text
    content: 'Greet Apelles, the one tested '
  - type: text
    content: and
  - type: text
    content: ' approved in Christ. Greet those who belong to the '
  - type: text
    content: household
  - type: text
    content: ' of '
  - type: note
    content: Believed by some scholars to be the brother of Herod Agrippa I and grandson of Herod the Great.
  - type: text
    content: 'Aristobulus. '
  '11':
  - type: text
    content: 'Greet my kinsman Herodion. Greet those of the '
  - type: text
    content: household
  - type: text
    content: ' of Narcissus, who are in the Lord. '
  '12':
  - type: text
    content: 'Greet those workers in the Lord, Tryphaena and Tryphosa. Greet my beloved Persis, who has worked hard in the Lord. '
  '13':
  - type: text
    content: 'Greet Rufus, an eminent '
  - type: text
    content: and
  - type: text
    content: ' choice man in the Lord, also his mother [who has been] a mother to me as well. '
  '14':
  - type: text
    content: 'Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and the brothers who are with them. '
  '15':
  - type: text
    content: 'Greet Philologus and Julia, Nereus and his sister, and Olympas, and all '
  - type: note
    content: Lit the saints.
  - type: text
    content: 'God’s people who are with them. '
  '16':
  - type: text
    content: 'Greet one another with a '
  - type: note
    content: A traditional act of salutation in the early church.
  - type: text
    content: holy kiss. All the churches of Christ greet you.
  '17':
  - type: text
    content: 'I urge you, brothers and sisters, to keep your eyes on those who cause dissensions and create obstacles '
  - type: text
    content: or
  - type: text
    content: ' introduce temptations [for others] to commit sin, [acting in ways] contrary to the doctrine which you have learned. Turn away from them. '
  '18':
  - type: text
    content: 'For such people do not serve our Lord Christ, but their own appetites and base desires. By smooth and flattering speech they deceive the hearts of the unsuspecting [the innocent and the naive]. '
  '19':
  - type: text
    content: 'For '
  - type: text
    content: the report of
  - type: text
    content: ' your obedience has reached everyone, so that I rejoice over you, but I want you to be wise in what is good and innocent in what is evil. '
  '2':
  - type: text
    content: 'that you may receive her in the Lord [with love and hospitality], as '
  - type: note
    content: Lit the saints.
  - type: text
    content: God’s people ought to receive one another. And that you may help her in whatever matter she may require assistance from you, for she has been a helper of many, including myself.
  '20':
  - type: text
    content: The God of peace will soon crush Satan under your feet.
  - type: text
    content: T
  - type: text
    content: he [wonderful] grace of our Lord Jesus be with you.
  '21':
  - type: text
    content: Timothy, my fellow worker, sends his greetings to you, as do Lucius, Jason and Sosipater, my kinsmen.
  '22':
  - type: text
    content: 'I, '
  - type: note
    content: Paul’s helper, who wrote this letter as Paul dictated it, inserted a personal greeting, undoubtedly with Paul’s permission.
  - type: text
    content: Tertius, the writer (scribe) of this letter, greet you in the Lord.
  '23':
  - type: text
    content: 'Gaius, who is host to me and to the whole church here, greets you. Erastus, the city treasurer, and our brother Quartus, greet you. '
  '24':
  - type: note
    content: Early mss do not contain this verse; it was taken from the Latin Vulgate.
  - type: text
    content: '[The grace of our Lord Jesus Christ be with you all. Amen.]'
  '25':
  - type: text
    content: 'Now to Him who is able to establish '
  - type: text
    content: and
  - type: text
    content: ' strengthen you [in the faith] according to my gospel and the preaching of Jesus Christ, according to the revelation of the mystery [of the plan of salvation] which has been kept secret for long ages past, '
  '26':
  - type: text
    content: 'but now has been disclosed and through the prophetic Scriptures has been made known to all the nations, according to the commandment of the eternal God, '
  - type: text
    content: leading them
  - type: text
    content: ' to obedience to the faith, '
  '27':
  - type: text
    content: to the only wise God, through Jesus Christ, be the glory forevermore! Amen.
  '3':
  - type: text
    content: 'Greet Prisca and Aquila, my fellow workers in Christ Jesus, '
  '4':
  - type: text
    content: 'who risked their own necks [endangering their very lives] for my life. To them not only do I give thanks, but also all the churches of the Gentiles. '
  '5':
  - type: text
    content: 'Also '
  - type: text
    content: greet
  - type: text
    content: ' the church that meets in their house. Greet my beloved Epaenetus, who is the first convert to Christ from [the west coast province of] Asia [Minor]. '
  '6':
  - type: text
    content: 'Greet Mary, who has worked so hard for you. '
  '7':
  - type: text
    content: 'Greet Andronicus and '
  - type: note
    content: Or Junia (feminine). There is a higher probability that the name is feminine; no masculine forms found in this or near time periods.
  - type: text
    content: 'Junias, my kinsmen and [once] my fellow prisoners, who are held in high esteem '
  - type: note
    content: The Greek and larger context favor this understanding; Andronicus and Junia are not identified as apostles here.
  - type: text
    content: 'in '
  - type: text
    content: the estimation of
  - type: text
    content: ' the apostles, and who were [believers] in Christ before me. '
  '8':
  - type: text
    content: 'Greet Ampliatus, my beloved in the Lord. '
  '9':
  - type: text
    content: 'Greet Urbanus, our fellow worker in Christ, and my beloved Stachys. '
