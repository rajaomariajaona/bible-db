        - type: text
          text: The people of Edom were descendants of Esau (Gen 25:30; 36:1). Edom was the country southeast of Judah extending from the Dead Sea to the eastern arm of the Red Sea. The capital city was Sela, also known as Petra (both names mean rock). The country of Moab formed Edom’s boundary on the north. Edom and Moab have a remarkably prominent place in prophecy as “the scene of the final destruction of Gentile world power in the day of the L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ” (Scofield Reference Bible). See the Scripture references following the first verse which outline the picture of what lies ahead for the nations of the world.
      marker-yv: yv-n
    - type: text
      text: Edom—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have heard a report from the L
