  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Who will bring me down to earth?’
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though you build [your nest] on high like the eagle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you set your nest among the stars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring you down from there,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
