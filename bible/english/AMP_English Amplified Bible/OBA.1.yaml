      children:
      - type: text
        text: ord
    - type: text
      text: ' as commander]!” [Ps 137:7; Is 34:1-15; 63:1-6; Jer 49:7-22; Ezek 25:12-14]'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Because of the violence you did against your brother Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shame shall cover you [completely],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you shall be cut off forever.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “On the day that [Jerusalem was destroyed] you stood aloof [from your brother Jacob]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On the day that strangers took his forces captive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carried off his wealth,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And foreigners entered his gates
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cast lots for Jerusalem [dividing the city for plunder]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You too were like one of them [collaborating with the enemy]. [Num 20:18-20; Amos 1:11, 12]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Do not gaze '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gloat [in triumph] over your brother’s day,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day when his misfortune came.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not rejoice over the sons of Judah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their destruction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not speak arrogantly [jeering and maliciously mocking]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their distress.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not enter the gate of My people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their disaster;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, you, do not look [with delight] on their misery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their ruin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not loot treasures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their ruin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not stand at the crossroad
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To cut down those [of Judah] who escaped;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not hand over [to the enemy] those [of Judah] who survive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of their distress.
  - type: usfm
