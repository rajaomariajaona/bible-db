  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If thieves came to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If robbers by night—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How you will be ruined!—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Would they not steal only until they had enough?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If grape gatherers came to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Would they not leave some grapes for gleaning? [Jer 49:9]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How Esau (Edom) shall be ransacked [by men who come to ravage with divine approval]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How his hidden treasures shall be searched out!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All the men allied with you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall send you on your way to the border;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The men who were at peace with you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall deceive you and overpower you;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Those who eat
    - type: text
      text: ' your bread [those you trust]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall set a hostile ambush for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (There is no understanding of it.)
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will I not on that day,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
