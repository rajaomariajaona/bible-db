  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“For the [judgment] day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' draws near on all the nations.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As you have done, it shall be done to you [in retribution];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your [evil] dealings will return on your own head. [Ps 137:7-9; Is 2:10-22; Zeph 3:8-20; Zech 12:1-14; Rev 19:11-21]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because just as you [Edom] drank on My holy mountain [desecrating it in the revelry of the destroyers],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So shall all the nations drink continually [one by one, of My wrath];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, they shall drink and swallow [the full measure of punishment]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And become as though they had never existed. [Rev 16:14-16]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But on Mount Zion [in Jerusalem] there shall be [deliverance for] those who escape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it shall be holy [no pagan will defile it];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the house of Jacob shall possess their [former] possessions. [Ezek 36; Joel 2:32]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then the house of Jacob shall be a fire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the house of Joseph a flame [in executing God’s wrath];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the house of Esau will be like stubble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They (Jacob) shall set them on fire and consume them (the Edomites),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that there shall be no survivor of the house of Esau,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken. [Ezek 25:12-14]'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then '
    - type: usfm
