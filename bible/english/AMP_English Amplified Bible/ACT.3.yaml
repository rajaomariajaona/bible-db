    content: 'And so God has fulfilled what He foretold by the mouth of all the prophets, that His Christ (Messiah, Anointed) would suffer. '
  '19':
  - type: text
    content: 'So repent [change your inner self—your old way of thinking, regret past sins] and return [to God—seek His purpose for your life], so that your sins may be wiped away [blotted out, completely erased], so that times of refreshing may come from the presence of the Lord [restoring you like a cool wind on a hot day]; '
  '2':
  - type: text
    content: 'and a man who had been unable to walk from birth was being carried along, whom they used to set down every day at that gate of the temple which is called '
