segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Healing the Lame Beggar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Peter and John were going up to the temple at the hour of prayer, the ninth hour (3:00 p.m.), '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and a man who had been unable to walk from birth was being carried along, whom they used to set down every day at that gate of the temple which is called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a reference to the bronze-covered Nicanor Gate.
    marker-yv: yv-n
  - type: text
    text: 'Beautiful, so that he could beg alms from those entering the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So when he saw Peter and John about to go into the temple, he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' asking [them] for coins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Peter, along with John, stared at him intently and said, “Look at us!” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the man '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to pay attention to them, eagerly expecting to receive something from them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Peter said, “Silver and gold I do not have; but what I do have I give to you: In the name (authority, power) of Jesus Christ the Nazarene—[begin now to] walk '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' go on walking!” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he seized the man’s right hand with a firm grip and raised him up. And at once his feet and ankles became strong '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steady, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and with a leap he stood up and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' to walk; and he went into the temple with them, walking and leaping and praising God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'All the people saw him walking and praising God; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and they recognized him as the very man who usually sat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: begging
  - type: text
    text: ' for coins at the Beautiful Gate of the temple, and they were filled with wonder and amazement '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' were mystified at what had happened to him.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Peter’s Second Sermon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now while he was still holding on to Peter and John, all the people, utterly amazed, ran together '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crowded around them at the covered porch called Solomon’s portico. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Peter, seeing this, said to the people, “You men of Israel, why are you amazed at this? Why are you staring at us, as though by our own power or godliness we had made this man walk? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The God of Abraham, Isaac, and Jacob, the God of our fathers, has glorified His Servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Son Jesus [doing Him this honor], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the One
  - type: text
    text: ' whom you handed over and disowned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rejected before Pilate, when he had decided to release Him. [Ex 3:6; Is 52:13] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But you disowned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denied the Holy and Righteous One and asked for [the pardon of] a murderer to be granted to you. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But you killed the Prince (Author, Originator, Source) of life, whom God raised [bodily] from the dead. To this [fact] we are witnesses [for we have seen the risen Christ]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And on the basis of faith in His name, it is the name of Jesus which has strengthened this man whom you see and know; and the faith which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: comes
  - type: text
    text: ' through Him has given him this perfect health '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complete wholeness in your presence.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Now, brothers, I know that you acted in ignorance [not fully aware of what you were doing], just as your rulers did also. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And so God has fulfilled what He foretold by the mouth of all the prophets, that His Christ (Messiah, Anointed) would suffer. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So repent [change your inner self—your old way of thinking, regret past sins] and return [to God—seek His purpose for your life], so that your sins may be wiped away [blotted out, completely erased], so that times of refreshing may come from the presence of the Lord [restoring you like a cool wind on a hot day]; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and that He may send [to you] Jesus, the Christ, who has been appointed for you, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'whom heaven must keep until the time for the [complete] restoration of all things about which God promised through the mouth of His holy prophets from ancient time. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moses said, ‘T
  - type: usfm
    marker: sc
    children:
    - type: text
      text: he
  - type: text
    text: ' L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od will raise up for you a
  - type: text
    text: ' P'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: rophet
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: as He raised up me
      - type: text
        text: . The Jews understood Moses as a type of Christ (Messiah).
    marker-yv: yv-n
  - type: usfm
    marker: sc
    children:
    - type: text
      text: like me from your countrymen
  - type: text
    text: '; '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: you shall listen to
  - type: text
    text: ' H'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: im
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: obey
  - type: text
    text: ' everything He tells you. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And it will be that every person that does not listen to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' heed that Prophet will be utterly destroyed from among the people.’ [Deut 18:15-19] '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indeed, all the prophets who have spoken, from Samuel and those who came after him, also announced these days. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You are the sons (descendants) of the prophets and [heirs] of the covenant which God made with your fathers, saying to Abraham, ‘A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: nd in your seed
  - type: text
    text: ' (descendant) '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: all the families of the earth shall be blessed
  - type: text
    text: '.’ [Gen 22:18; Gal 3:16] '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: it
    children:
    - type: text
      text: It was
  - type: text
    text: ' for you first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of all that
  - type: text
    text: ' God raised up His Servant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Son [Jesus], and sent Him to bless you by turning every one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of you
  - type: text
    text: ' from your wicked ways.” [Acts 2:24; 3:22]'
