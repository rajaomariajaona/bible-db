document_id: EXO.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: People Affirm Their Covenant with God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then God said to Moses, “Come up to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you and Aaron, Nadab and Abihu (Aaron’s older sons), and seventy of Israel’s elders, and you shall worship at a [safe] distance. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and they saw [a manifestation of] the God of Israel; and under His feet there appeared to be a pavement of sapphire, just as clear as the sky itself. [Ex 33:20-23; Deut 4:12; Ezek 28:14] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Yet He did not stretch out His hand against the nobles of the Israelites; and they saw [the manifestation of the presence of] God, and ate and drank. [Ex 19:21]
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Come up to Me on the mountain and stay there, and I will give you the stone tablets with the law and the commandments which I have written for their instruction.” [2 Cor 3:2, 3] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So Moses '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew verb “to stand” or “arise” is an instruction to prepare to fulfill a command, somewhat similar to the military command “attention.”
      marker-yv: yv-n
    - type: text
      text: 'arose with Joshua his attendant, and he went up to the mountain of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he said to the elders, “Wait here for us until we come back to you. Remember that Aaron and Hur are with you; whoever has a legal matter, let him go to them.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Moses went up to the mountain, and the cloud covered the mountain. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rested on Mount Sinai, and the cloud covered it for six days. On the seventh day God called to Moses from the midst of the cloud. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In the sight of the Israelites the appearance of the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was like consuming fire on the top of the mountain. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Moses entered the midst of the cloud and went up the mountain; and he was on the mountain forty days and forty nights.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Moses alone shall approach the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', but the others shall not come near, nor shall the people come up with him.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then Moses came and told the people everything that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said and all the ordinances. And all the people answered with one voice, “Everything the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has said we will do.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moses wrote down all the words of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. Then he got up early in the morning, and built an altar [for worship] at the foot of the mountain with twelve pillars (memorial stones) representing the twelve tribes of Israel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then he sent young Israelite men, and they offered burnt offerings and sacrificed young bulls as peace offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moses took half of the blood and put it in large basins, and [the other] half of the blood he sprinkled on the altar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then he took the Book of the Covenant and read it aloud to the people; and they said, “Everything that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has said we will do, and we will be obedient.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So Moses took the blood [which had been placed in the large basins] and sprinkled it on the people, and said, “Behold the blood of the covenant, which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has made with you in accordance with all these words.” [1 Cor 11:25; Heb 8:6; 10:28, 29]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then Moses, Aaron, Nadab, and Abihu, and seventy of the elders of Israel went up [the mountainside], '
