document_id: 1CO.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Excellence of Love
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'If I speak with the tongues of men and of angels, but have not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a profound thoughtfulness and unselfish concern for other believers regardless of their circumstances or station in life.
      marker-yv: yv-n
    - type: text
      text: 'love [for others growing out of God’s love for me], then I have become only a noisy gong or a clanging cymbal [just an annoying distraction]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But when that which is complete '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfect comes, that which is incomplete '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' partial will pass away. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When I was a child, I talked like a child, I thought like a child, I reasoned like a child; when I became a man, I did away with childish things. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For now [in this time of imperfection] we see in a mirror dimly [a blurred reflection, a riddle, an enigma], but then [when the time of perfection comes we will see reality] face to face. Now I know in part [just in fragments], but then I will know fully, just as I have been fully known [by God]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And now there remain: faith [abiding trust in God and His promises], hope [confident expectation of eternal salvation], love [unselfish love for others growing out of God’s love for me], these three [the choicest graces]; but the greatest of these is love.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And if I have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the gift of
    - type: text
      text: ' prophecy [and speak a new message from God to the people], and understand all mysteries, and [possess] all knowledge; and if I have all [sufficient] faith so that I can remove mountains, but do not have love [reaching out to others], I am nothing. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If I give all my possessions to feed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the poor,
    - type: text
      text: ' and if I surrender my body '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Early mss read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: so that I may boast,
        - type: text
          text: ' i.e. as a martyr.'
      marker-yv: yv-n
    - type: text
      text: to be burned, but do not have love, it does me no good at all.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Love endures with patience '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serenity, love is kind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thoughtful, and is not jealous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' envious; love does not brag and is not proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' arrogant. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It is not rude; it is not self-seeking, it is not provoked [nor overly sensitive and easily angered]; it does not take into account a wrong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: endured.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'It does not rejoice at injustice, but rejoices with the truth [when right and truth prevail]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Love bears all things [regardless of what comes], believes all things [looking for the best in each one], hopes all things [remaining steadfast during difficult times], endures all things [without weakening].
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Love never fails [it never fades nor ends]. But as for prophecies, they will pass away; as for tongues, they will cease; as for the gift of special knowledge, it will pass away. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For we know in part, and we prophesy in part [for our knowledge is fragmentary and incomplete]. '
