document_id: NUM.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws for Canaan
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: 'and you shall bring as the drink offering one-half a hin of wine as an offering by fire, as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '11':
  - type: text
    content: '‘Thus shall it be done for each bull, or for each ram, or for each of the male lambs, or of the goats. '
  '12':
  - type: text
    content: 'According to the number that you prepare, so shall you do to everyone according to their number. '
  '13':
  - type: text
    content: 'All who are native-born shall do these things in this way, in presenting an offering by fire, as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: .
  - type: heading
    content: Law of the Stranger
  '14':
  - type: text
    content: 'If a stranger lives as a resident alien with you, or whoever may be among you throughout your generations, and he '
  - type: text
    content: wishes to
  - type: text
    content: ' make an offering by fire, as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: ', just as you do, so shall he do. '
  '15':
  - type: text
    content: As for the assembly, there shall be one [and the same] statute for you [of the congregation] and for the stranger who is a resident alien with you, a permanent statute throughout your generations; as you are, so shall the stranger be before the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '16':
  - type: text
    content: There is to be one law and one ordinance for you and for the stranger who lives with you as a resident alien.’ ”
  '17':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '18':
  - type: text
    content: '“Speak to the Israelites and say to them, ‘When you enter the land to which I am bringing you, '
  '19':
  - type: text
    content: then, when you eat the food of the land, you shall lift up an offering (heave offering) to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '2':
  - type: text
    content: '“Speak to the Israelites and say to them, ‘When you come into the land where you are to live, which I am giving you, '
  '20':
  - type: text
    content: 'You shall lift up a cake '
  - type: text
    content: made
  - type: text
    content: ' of the first of your [ground grain which has been made into] dough as an offering [to the Lord]; as an offering from the threshing floor, so shall you lift it up. '
  '21':
  - type: text
    content: From the first of your dough (ground grain) you shall give to the L
  - type: heading
    content: ord
  - type: text
    content: ' an offering throughout your generations.'
  '22':
  - type: text
    content: ‘But when you unintentionally fail and do not observe all these commandments, which the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken to Moses, '
  '23':
  - type: text
    content: even
  - type: text
    content: ' all that the L'
  - type: heading
    content: ord
  - type: text
    content: ' has commanded you '
  - type: note
    content: Lit by the hand of.
  - type: text
    content: through Moses, from the day that the L
  - type: heading
    content: ord
  - type: text
    content: ' gave commandments and onward throughout your generations, '
  '24':
  - type: text
    content: 'then it shall be, if it was done unintentionally without the knowledge of the congregation, that all the congregation shall offer one young bull as a burnt offering, as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: ', with its grain offering and its drink offering, according to the ordinance, and one male goat as a sin offering. '
  '25':
  - type: text
    content: Then the priest shall make atonement for all the congregation of the sons of Israel, and they will be forgiven, for it was an error and they have brought their offering, an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ', and their sin offering before the L'
  - type: heading
    content: ord
  - type: text
    content: ', for their error. '
  '26':
  - type: text
    content: So all the congregation of the Israelites will be forgiven as well as the stranger who lives among them as a resident alien, because all the people were involved in the error.
  '27':
  - type: text
    content: '‘Also if one person sins unintentionally, then he shall offer a female goat one year old as a sin offering. '
  '28':
  - type: text
    content: The priest shall make atonement before the L
  - type: heading
    content: ord
  - type: text
    content: ' for the person who commits an error when he sins unintentionally, making atonement for him so that he may be forgiven. '
  '29':
  - type: text
    content: 'You shall have one law for him who sins unintentionally, whether he is native-born among the Israelites or a stranger who is living among them as a resident alien. '
  '3':
  - type: text
    content: then make an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ', a burnt offering or a sacrifice to fulfill a special vow, or as a freewill offering or in your appointed feasts, to make a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: ', from the herd or from the flock. '
  '30':
  - type: text
    content: 'But the person who does [anything wrong] '
  - type: note
    content: Lit with a high hand.
  - type: text
    content: 'willfully '
  - type: text
    content: and
  - type: text
    content: ' defiantly, whether he is native-born or a stranger, that one is blaspheming the L'
  - type: heading
    content: ord
  - type: text
    content: ', and that person shall be cut off from among his people [excluding him from the atonement made for them]. '
  '31':
  - type: text
    content: 'Because he has despised '
  - type: text
    content: and
  - type: text
    content: ' rejected the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ', and has broken His commandment, that person shall be utterly cut off; [the responsibility for] his wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt will be upon him.’ ”'
  - type: heading
    content: Sabbath-breaking Punished
  '32':
  - type: text
    content: 'Now while the Israelites were in the wilderness, they found a man who was gathering wood on the Sabbath day. '
  '33':
  - type: text
    content: 'Those who found him gathering wood brought him to Moses and Aaron and to all the congregation; '
  '34':
  - type: text
    content: 'and they put him in custody, because it had not been explained [by God] what should be done to him. '
  '35':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “The man shall certainly be put to death. All the congregation shall stone him with stones outside the camp.” '
  '36':
  - type: text
    content: So all the congregation brought him outside the camp and stoned him to death with stones, just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '37':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '38':
  - type: text
    content: '“Speak to the sons of Israel and tell them to make for themselves tassels on the hems of their garments throughout their generations, and put a cord of blue on the tassel of each hem. '
  '39':
  - type: text
    content: It shall be a tassel for you to look at and remember all the commandments of the L
  - type: heading
    content: ord
  - type: text
    content: ', to do them, so that you do not follow after [the desires of] your own heart and eyes, [desires] after which you used to follow '
  - type: text
    content: and
  - type: text
    content: ' play the prostitute, '
  '4':
  - type: text
    content: The one who presents his offering shall present to the L
  - type: heading
    content: ord
  - type: text
    content: ' a grain offering of a tenth '
  - type: text
    content: of an ephah
  - type: text
    content: ' of fine flour mixed with a fourth of a '
  - type: note
    content: I.e. approx one gal.
  - type: text
    content: 'hin of oil, '
  '40':
  - type: text
    content: 'so that you may remember to do all My commandments and be holy (set apart) to your God. '
  '41':
  - type: text
    content: I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, who brought you out of the land of Egypt to be your God. I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God.”'
  '5':
  - type: text
    content: 'and you shall prepare wine for the drink offering, a fourth of a hin, with the burnt offering or for the sacrifice, for each lamb. '
  '6':
  - type: text
    content: 'Or for a ram you shall prepare as a grain offering two-tenths '
  - type: text
    content: of an ephah
  - type: text
    content: ' of fine flour mixed with a third of a hin of oil. '
  '7':
  - type: text
    content: 'And for the drink offering you shall offer a third of a hin of wine, as a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '8':
  - type: text
    content: When you prepare a bull as a burnt offering or as a sacrifice, in fulfilling a special vow or peace offering to the L
  - type: heading
    content: ord
  - type: text
    content: ', '
  '9':
  - type: text
    content: 'then you shall offer with the bull a grain offering of three-tenths '
  - type: text
    content: of an ephah
  - type: text
    content: ' of fine flour mixed with half a hin of oil; '
