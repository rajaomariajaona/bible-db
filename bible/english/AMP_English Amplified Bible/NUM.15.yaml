document_id: NUM.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Laws for Canaan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you shall bring as the drink offering one-half a hin of wine as an offering by fire, as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Thus shall it be done for each bull, or for each ram, or for each of the male lambs, or of the goats. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'According to the number that you prepare, so shall you do to everyone according to their number. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All who are native-born shall do these things in this way, in presenting an offering by fire, as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Law of the Stranger
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'If a stranger lives as a resident alien with you, or whoever may be among you throughout your generations, and he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wishes to
    - type: text
      text: ' make an offering by fire, as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', just as you do, so shall he do. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As for the assembly, there shall be one [and the same] statute for you [of the congregation] and for the stranger who is a resident alien with you, a permanent statute throughout your generations; as you are, so shall the stranger be before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: There is to be one law and one ordinance for you and for the stranger who lives with you as a resident alien.’ ”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the Israelites and say to them, ‘When you enter the land to which I am bringing you, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then, when you eat the food of the land, you shall lift up an offering (heave offering) to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the Israelites and say to them, ‘When you come into the land where you are to live, which I am giving you, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall lift up a cake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' of the first of your [ground grain which has been made into] dough as an offering [to the Lord]; as an offering from the threshing floor, so shall you lift it up. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From the first of your dough (ground grain) you shall give to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' an offering throughout your generations.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘But when you unintentionally fail and do not observe all these commandments, which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken to Moses, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' all that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by the hand of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: through Moses, from the day that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave commandments and onward throughout your generations, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then it shall be, if it was done unintentionally without the knowledge of the congregation, that all the congregation shall offer one young bull as a burnt offering, as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', with its grain offering and its drink offering, according to the ordinance, and one male goat as a sin offering. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the priest shall make atonement for all the congregation of the sons of Israel, and they will be forgiven, for it was an error and they have brought their offering, an offering by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and their sin offering before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for their error. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the congregation of the Israelites will be forgiven as well as the stranger who lives among them as a resident alien, because all the people were involved in the error.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Also if one person sins unintentionally, then he shall offer a female goat one year old as a sin offering. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest shall make atonement before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for the person who commits an error when he sins unintentionally, making atonement for him so that he may be forgiven. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall have one law for him who sins unintentionally, whether he is native-born among the Israelites or a stranger who is living among them as a resident alien. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then make an offering by fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', a burnt offering or a sacrifice to fulfill a special vow, or as a freewill offering or in your appointed feasts, to make a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from the herd or from the flock. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the person who does [anything wrong] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: with a high hand
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'willfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defiantly, whether he is native-born or a stranger, that one is blaspheming the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and that person shall be cut off from among his people [excluding him from the atonement made for them]. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because he has despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejected the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and has broken His commandment, that person shall be utterly cut off; [the responsibility for] his wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt will be upon him.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sabbath-breaking Punished
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now while the Israelites were in the wilderness, they found a man who was gathering wood on the Sabbath day. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who found him gathering wood brought him to Moses and Aaron and to all the congregation; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they put him in custody, because it had not been explained [by God] what should be done to him. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “The man shall certainly be put to death. All the congregation shall stone him with stones outside the camp.” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the congregation brought him outside the camp and stoned him to death with stones, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the sons of Israel and tell them to make for themselves tassels on the hems of their garments throughout their generations, and put a cord of blue on the tassel of each hem. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It shall be a tassel for you to look at and remember all the commandments of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to do them, so that you do not follow after [the desires of] your own heart and eyes, [desires] after which you used to follow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' play the prostitute, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The one who presents his offering shall present to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' a grain offering of a tenth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of an ephah
    - type: text
      text: ' of fine flour mixed with a fourth of a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. approx one gal.
      marker-yv: yv-n
    - type: text
      text: 'hin of oil, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that you may remember to do all My commandments and be holy (set apart) to your God. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, who brought you out of the land of Egypt to be your God. I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you shall prepare wine for the drink offering, a fourth of a hin, with the burnt offering or for the sacrifice, for each lamb. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or for a ram you shall prepare as a grain offering two-tenths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of an ephah
    - type: text
      text: ' of fine flour mixed with a third of a hin of oil. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the drink offering you shall offer a third of a hin of wine, as a sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' soothing aroma to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you prepare a bull as a burnt offering or as a sacrifice, in fulfilling a special vow or peace offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall offer with the bull a grain offering of three-tenths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of an ephah
    - type: text
      text: ' of fine flour mixed with half a hin of oil; '
