document_id: PSA.65
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 65
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Abundant Favor to Earth and Man.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of David. A Song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: To You belongs silence [the submissive wonder of reverence], and [it bursts into] praise in Zion, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to You the vow shall be performed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O You who hear prayer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To You all mankind comes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Wickedness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guilt prevail against me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet as for our transgressions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You forgive them [removing them from Your sight].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Blessed is the one whom You choose and bring near
- type: usfm
  marker: q1
  children:
  - type: text
    text: To dwell in Your courts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will be filled with the goodness of Your house,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your holy temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '¶By awesome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wondrous things You answer us in righteousness, O God of our salvation,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You who are the trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hope of all the ends of the earth and of the farthest sea;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Who creates the mountains by His strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Being clothed with power,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who stills the roaring of the seas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The roaring of their waves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the tumult of the peoples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So they who dwell at the ends '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the earth
  - type: text
    text: ' stand in awe of Your signs [the evidence of Your presence]. [Mark 4:36-41]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You make the dawn and the sunset shout for joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶You visit the earth and make it overflow [with water];
- type: usfm
  marker: q1
  children:
  - type: text
    text: You greatly enrich it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The stream of God is full of water;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You provide their grain, when You have prepared the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You water its furrows abundantly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You smooth its ridges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You soften it with showers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You bless its growth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You crown the year with Your bounty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your paths overflow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The pastures of the wilderness drip [with dew],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the hills are encircled with joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The meadows are clothed with flocks
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the valleys are covered with grain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They shout for joy and they sing.
