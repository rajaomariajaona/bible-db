document_id: PSA.65,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 65
  - type: heading
    content: God’s Abundant Favor to Earth and Man.
  - type: text
    content: To the Chief Musician. A Psalm of David. A Song.
  - type: text
    content: To You belongs silence [the submissive wonder of reverence], and [it bursts into] praise in Zion, O God;
  - type: text
    content: And to You the vow shall be performed.
  '10':
  - type: text
    content: You water its furrows abundantly,
  - type: text
    content: You smooth its ridges;
  - type: text
    content: You soften it with showers,
  - type: text
    content: You bless its growth.
  '11':
  - type: text
    content: You crown the year with Your bounty,
  - type: text
    content: And Your paths overflow.
  '12':
  - type: text
    content: The pastures of the wilderness drip [with dew],
  - type: text
    content: And the hills are encircled with joy.
  '13':
  - type: text
    content: The meadows are clothed with flocks
  - type: text
    content: And the valleys are covered with grain;
  - type: text
    content: They shout for joy and they sing.
  '2':
  - type: text
    content: O You who hear prayer,
  - type: text
    content: To You all mankind comes.
  '3':
  - type: text
    content: 'Wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt prevail against me;'
  - type: text
    content: Yet as for our transgressions,
  - type: text
    content: You forgive them [removing them from Your sight].
  '4':
  - type: text
    content: Blessed is the one whom You choose and bring near
  - type: text
    content: To dwell in Your courts.
  - type: text
    content: We will be filled with the goodness of Your house,
  - type: text
    content: Your holy temple.
  '5':
  - type: text
    content: '¶By awesome '
  - type: text
    content: and
  - type: text
    content: ' wondrous things You answer us in righteousness, O God of our salvation,'
  - type: text
    content: 'You who are the trust '
  - type: text
    content: and
  - type: text
    content: ' hope of all the ends of the earth and of the farthest sea;'
  '6':
  - type: text
    content: Who creates the mountains by His strength,
  - type: text
    content: Being clothed with power,
  '7':
  - type: text
    content: Who stills the roaring of the seas,
  - type: text
    content: The roaring of their waves,
  - type: text
    content: And the tumult of the peoples,
  '8':
  - type: text
    content: 'So they who dwell at the ends '
  - type: text
    content: of the earth
  - type: text
    content: ' stand in awe of Your signs [the evidence of Your presence]. [Mark 4:36-41]'
  - type: text
    content: You make the dawn and the sunset shout for joy.
  '9':
  - type: text
    content: ¶You visit the earth and make it overflow [with water];
  - type: text
    content: You greatly enrich it;
  - type: text
    content: The stream of God is full of water;
  - type: text
    content: You provide their grain, when You have prepared the earth.
