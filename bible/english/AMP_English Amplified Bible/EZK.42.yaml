verses:
  '1':
  - type: heading
    content: Chambers of the Temple
  - type: text
    content: 'Then he (the angel) brought me out into the outer courtyard, toward the north; and he led me to the [attached] chamber which was opposite the separate area and opposite the building to the north. '
  '10':
  - type: text
    content: 'In the width of the wall of the courtyard toward the east, facing the separate area and facing the building, were chambers; '
  '11':
  - type: text
    content: 'and a passage in front of them was like the appearance of the [attached] chambers on the north, '
  - type: text
    content: and
  - type: text
    content: ' they had the same length and width, and all their exits were like both their '
  - type: note
    content: Or floor plans.
  - type: text
    content: 'arrangements and their entrances. '
  '12':
  - type: text
    content: 'And like the entrances of the chambers that were toward the south there was an entrance at the head of the walkway, the walkway in front of the '
  - type: note
    content: Or protecting.
  - type: text
    content: dividing wall toward the east, as one enters them.
  '13':
  - type: text
    content: Then he (the angel) said to me, “The north chambers and the south chambers, which are opposite the separate area, are the holy chambers where the priests who are close to the L
  - type: heading
    content: ord
  - type: text
    content: ' shall eat the most holy '
  - type: text
    content: offerings
  - type: text
    content: '. There they shall place the most holy things—the grain offering, the sin offering, and the guilt offering—for the place is holy. '
  '14':
  - type: text
    content: 'When the priests enter [the Holy Place], they shall not go out from the sanctuary into the outer court '
  - type: note
    content: Lit but they shall.
  - type: text
    content: unless they lay there their garments in which they minister, for these are holy (set apart). They shall put on other garments before they approach that which is for the people.”
  '15':
  - type: text
    content: 'Now when he had finished measuring the inner temple, he brought me out toward the gate which faced east and measured the outer area all around. '
  '16':
  - type: text
    content: 'He measured the east side with the measuring '
  - type: note
    content: Lit reed, and so throughout the chapter.
  - type: text
    content: 'rod, five hundred rods by the measuring rod. '
  '17':
  - type: text
    content: 'He measured the north side, five hundred rods by the measuring rod. '
  '18':
  - type: text
    content: 'He measured the south side, five hundred rods by the measuring rod. '
  '19':
  - type: text
    content: 'He turned about to the west side and measured five hundred rods by the measuring rod. '
  '2':
  - type: text
    content: 'Along the length, one hundred cubits, was the north door; and the width was fifty cubits. '
  '20':
  - type: text
    content: He measured it on the four sides; it had a wall all around, the length five hundred and the width five hundred, to make a separation between that which was holy [the temple proper] and that which was common [the outer area].
  '3':
  - type: text
    content: 'Opposite the twenty '
  - type: text
    content: cubits
  - type: text
    content: ' which belonged to the inner courtyard, and opposite the pavement which belonged to the outer courtyard, was gallery (balcony) corresponding to gallery in three stories. '
  '4':
  - type: text
    content: 'In front of the [attached] chambers was an inner walkway ten cubits wide '
  - type: note
    content: Lit a way of…cubits; and.
  - type: text
    content: 'and one '
  - type: text
    content: hundred
  - type: text
    content: ' cubits long; and their entrances were on the north. '
  '5':
  - type: text
    content: 'Now the upper chambers were smaller because the galleries took away more '
  - type: text
    content: space
  - type: text
    content: ' from them than from the chambers on the lower and middle stories of the building; '
  '6':
  - type: text
    content: 'for they were in three stories and did not have pillars like the pillars of the [outer] courtyards; therefore '
  - type: text
    content: the upper chambers
  - type: text
    content: ' were '
  - type: note
    content: Lit shortened.
  - type: text
    content: 'set back from the ground more than the lower and the middle ones. '
  '7':
  - type: text
    content: 'And the outer wall, by the side of the chambers, toward the outer courtyard facing the chambers, was fifty cubits long. '
  '8':
  - type: text
    content: 'For the length of the chambers which were in the outer courtyard was fifty cubits, '
  - type: note
    content: Lit and behold.
  - type: text
    content: 'while '
  - type: text
    content: the length of
  - type: text
    content: ' those facing the temple was a hundred cubits. '
  '9':
  - type: text
    content: Below these chambers was the entrance on the east side, as one enters them from the outer courtyard.
