    - type: text
      text: Chambers of the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then he (the angel) brought me out into the outer courtyard, toward the north; and he led me to the [attached] chamber which was opposite the separate area and opposite the building to the north. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Along the length, one hundred cubits, was the north door; and the width was fifty cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Opposite the twenty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cubits
  - type: text
    text: ' which belonged to the inner courtyard, and opposite the pavement which belonged to the outer courtyard, was gallery (balcony) corresponding to gallery in three stories. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In front of the [attached] chambers was an inner walkway ten cubits wide '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a way of…cubits; and
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hundred
  - type: text
    text: ' cubits long; and their entrances were on the north. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the upper chambers were smaller because the galleries took away more '
  - type: usfm
    marker: it
    children:
    - type: text
      text: space
  - type: text
    text: ' from them than from the chambers on the lower and middle stories of the building; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'for they were in three stories and did not have pillars like the pillars of the [outer] courtyards; therefore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the upper chambers
  - type: text
    text: ' were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shortened
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'set back from the ground more than the lower and the middle ones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the outer wall, by the side of the chambers, toward the outer courtyard facing the chambers, was fifty cubits long. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the length of the chambers which were in the outer courtyard was fifty cubits, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and behold
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'while '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the length of
  - type: text
    text: ' those facing the temple was a hundred cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Below these chambers was the entrance on the east side, as one enters them from the outer courtyard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In the width of the wall of the courtyard toward the east, facing the separate area and facing the building, were chambers; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and a passage in front of them was like the appearance of the [attached] chambers on the north, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' they had the same length and width, and all their exits were like both their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: floor plans
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'arrangements and their entrances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And like the entrances of the chambers that were toward the south there was an entrance at the head of the walkway, the walkway in front of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: protecting
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: dividing wall toward the east, as one enters them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then he (the angel) said to me, “The north chambers and the south chambers, which are opposite the separate area, are the holy chambers where the priests who are close to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall eat the most holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: offerings
  - type: text
    text: '. There they shall place the most holy things—the grain offering, the sin offering, and the guilt offering—for the place is holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the priests enter [the Holy Place], they shall not go out from the sanctuary into the outer court '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: but they shall
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: unless they lay there their garments in which they minister, for these are holy (set apart). They shall put on other garments before they approach that which is for the people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now when he had finished measuring the inner temple, he brought me out toward the gate which faced east and measured the outer area all around. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He measured the east side with the measuring '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: reed
      - type: text
        text: ', and so throughout the chapter.'
    marker-yv: yv-n
  - type: text
    text: 'rod, five hundred rods by the measuring rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He measured the north side, five hundred rods by the measuring rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He measured the south side, five hundred rods by the measuring rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He turned about to the west side and measured five hundred rods by the measuring rod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He measured it on the four sides; it had a wall all around, the length five hundred and the width five hundred, to make a separation between that which was holy [the temple proper] and that which was common [the outer area].
