document_id: MAT.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Six days later Jesus took with Him Peter and James and John the brother of James, and led them up on a high mountain by themselves. [Mark 9:2-8; Luke 9:28-36] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The disciples asked Him, “Then why do the scribes say that Elijah must come first?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He answered and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Elijah is coming and will restore all things;
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but I say to you that Elijah has come already, and they did not recognize him, but did to him as they wished. The Son of Man is also going to suffer at their hands.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then the disciples understood that He had spoken to them about John the Baptist. [Mal 4:5]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Demoniac
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'When they approached the crowd, a man came up to Jesus, kneeling before Him and saying, [Mark 9:14-27; Luke 9:37-42] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Lord, have mercy on my son, for he is a lunatic (moonstruck) and suffers terribly; for he often falls into the fire and often into the water. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And I brought him to Your disciples, and they were not able to heal him.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You unbelieving and perverted generation, how long shall I be with you? How long shall I put up with you? Bring him here to Me.”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Jesus rebuked the demon, and it came out of him, and the boy was healed at once.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the disciples came to Jesus privately and asked, “Why could we not drive it out?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And His appearance changed dramatically in their presence; and His face shone [with heavenly glory, clear and bright] like the sun, and His clothing became as white as light. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Because of your little faith
    - type: text
      text: ' [your lack of trust and confidence in the power of God]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'for I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus used this moment to emphasize to the disciples that a person’s confident, abiding faith combined with God’s power can produce absolutely amazing results, if the request is in harmony with God’s will. God is fully capable of doing that which man regards as impossible (Mark 14:36; James 4:3).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: if you have
    - type: text
      text: ' [living] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: faith the size of a mustard seed, you will say to this mountain, ‘Move from here to there,’ and
    - type: text
      text: ' [if it is God’s will] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: it will move; and nothing will be impossible for you.
    - type: text
      text: ' [Mark 11:23; Luke 17:6; 1 John 5:14] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Early mss do not contain this verse.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '[But this kind of demon does not go out except by prayer and fasting.]”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'When they were gathering together in Galilee, Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The Son of Man is going to be betrayed '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' handed over to men'
    - type: text
      text: ' [who are His enemies]; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they will kill Him, and He will be raised
    - type: text
      text: ' [from death to life] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: on the third day.”
    - type: text
      text: ' And they were deeply grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distressed.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Tribute Money
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When they arrived in Capernaum, the collectors of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Equivalent to two denarii or two days’ wages.
      marker-yv: yv-n
    - type: text
      text: 'half-shekel [temple tax] went up to Peter and said, “Does not your teacher pay the half-shekel?” [Ex 30:13; 38:26] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Peter answered, “Yes.” And when he came home, Jesus spoke to him first, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you think, Simon? From whom do earthly rulers collect duties or taxes, from their sons or from strangers?”
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'When Peter said, “From strangers,” Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then the sons are exempt
    - type: text
      text: ' [from taxation]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, so that we do not offend them, go to the sea and throw in a hook, and take the first fish that comes up; and when you open its mouth, you will find a shekel. Take it and give it to them
    - type: text
      text: ' [to pay the temple tax] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you and Me.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And behold, Moses and Elijah appeared to them, talking with Jesus. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Peter began to speak and said to Jesus, “Lord, it is good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delightful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' auspicious that we are here; if You wish, I will put up three [sacred] tents here—one for You, one for Moses, and one for Elijah.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'While he was still speaking, behold, a bright cloud overshadowed them, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 3:17.
      marker-yv: yv-n
    - type: text
      text: a voice from the cloud said, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Father’s words were a reminder that Jesus is unique, not to be equated with Moses and Elijah. He alone is the Son. The focus is on Him.
      marker-yv: yv-n
    - type: text
      text: 'This is My beloved Son, with whom I am well-pleased '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delighted! Listen to Him!” [Ps 2:7; Is 42:1] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When the disciples heard it, they fell on their faces and were terrified. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But Jesus came and touched them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up, and do not be afraid.”
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And when they looked up, they saw no one except Jesus Himself alone.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And as they were going down the mountain, Jesus commanded them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not tell anyone what you have seen until the Son of Man has been raised from the dead.”
    - type: text
      text: ' '
