type_code: eng
verses:
  '1':
  - type: heading
    content: The Transfiguration
  - type: text
    content: 'Six days later Jesus took with Him Peter and James and John the brother of James, and led them up on a high mountain by themselves. [Mark 9:2-8; Luke 9:28-36] '
  '10':
  - type: text
    content: 'The disciples asked Him, “Then why do the scribes say that Elijah must come first?” '
  '11':
  - type: text
    content: 'He answered and said, '
  - type: text
    content: “Elijah is coming and will restore all things;
  - type: text
    content: ' '
  '12':
  - type: text
    content: but I say to you that Elijah has come already, and they did not recognize him, but did to him as they wished. The Son of Man is also going to suffer at their hands.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then the disciples understood that He had spoken to them about John the Baptist. [Mal 4:5]
  - type: heading
    content: The Demoniac
  '14':
  - type: text
    content: 'When they approached the crowd, a man came up to Jesus, kneeling before Him and saying, [Mark 9:14-27; Luke 9:37-42] '
  '15':
  - type: text
    content: '“Lord, have mercy on my son, for he is a lunatic (moonstruck) and suffers terribly; for he often falls into the fire and often into the water. '
  '16':
  - type: text
    content: 'And I brought him to Your disciples, and they were not able to heal him.” '
  '17':
  - type: text
    content: 'And Jesus answered, '
  - type: text
    content: “You unbelieving and perverted generation, how long shall I be with you? How long shall I put up with you? Bring him here to Me.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: Jesus rebuked the demon, and it came out of him, and the boy was healed at once.
  '19':
  - type: text
    content: 'Then the disciples came to Jesus privately and asked, “Why could we not drive it out?” '
  '2':
  - type: text
    content: 'And His appearance changed dramatically in their presence; and His face shone [with heavenly glory, clear and bright] like the sun, and His clothing became as white as light. '
  '20':
  - type: text
    content: 'He answered, '
  - type: text
    content: “Because of your little faith
  - type: text
    content: ' [your lack of trust and confidence in the power of God]; '
  - type: text
    content: 'for I assure you '
  - type: text
    content: and
  - type: text
    content: ' most solemnly say to you, '
  - type: note
    content: Jesus used this moment to emphasize to the disciples that a person’s confident, abiding faith combined with God’s power can produce absolutely amazing results, if the request is in harmony with God’s will. God is fully capable of doing that which man regards as impossible (Mark 14:36; James 4:3).
  - type: text
    content: if you have
  - type: text
    content: ' [living] '
  - type: text
    content: faith the size of a mustard seed, you will say to this mountain, ‘Move from here to there,’ and
  - type: text
    content: ' [if it is God’s will] '
  - type: text
    content: it will move; and nothing will be impossible for you.
  - type: text
    content: ' [Mark 11:23; Luke 17:6; 1 John 5:14] '
  '21':
  - type: note
    content: Early mss do not contain this verse.
  - type: text
    content: '[But this kind of demon does not go out except by prayer and fasting.]”'
  '22':
  - type: text
    content: 'When they were gathering together in Galilee, Jesus said to them, '
  - type: text
    content: '“The Son of Man is going to be betrayed '
  - type: text
    content: and
  - type: text
    content: ' handed over to men'
  - type: text
    content: ' [who are His enemies]; '
  '23':
  - type: text
    content: and they will kill Him, and He will be raised
  - type: text
    content: ' [from death to life] '
  - type: text
    content: on the third day.”
  - type: text
    content: ' And they were deeply grieved '
  - type: text
    content: and
  - type: text
    content: ' distressed.'
  - type: heading
    content: The Tribute Money
  '24':
  - type: text
    content: 'When they arrived in Capernaum, the collectors of the '
  - type: note
    content: Equivalent to two denarii or two days’ wages.
  - type: text
    content: 'half-shekel [temple tax] went up to Peter and said, “Does not your teacher pay the half-shekel?” [Ex 30:13; 38:26] '
  '25':
  - type: text
    content: 'Peter answered, “Yes.” And when he came home, Jesus spoke to him first, saying, '
  - type: text
    content: “What do you think, Simon? From whom do earthly rulers collect duties or taxes, from their sons or from strangers?”
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'When Peter said, “From strangers,” Jesus said to him, '
  - type: text
    content: “Then the sons are exempt
  - type: text
    content: ' [from taxation]. '
  '27':
  - type: text
    content: However, so that we do not offend them, go to the sea and throw in a hook, and take the first fish that comes up; and when you open its mouth, you will find a shekel. Take it and give it to them
  - type: text
    content: ' [to pay the temple tax] '
  - type: text
    content: for you and Me.”
  '3':
  - type: text
    content: 'And behold, Moses and Elijah appeared to them, talking with Jesus. '
  '4':
  - type: text
    content: 'Then Peter began to speak and said to Jesus, “Lord, it is good '
  - type: text
    content: and
  - type: text
    content: ' delightful '
  - type: text
    content: and
  - type: text
    content: ' auspicious that we are here; if You wish, I will put up three [sacred] tents here—one for You, one for Moses, and one for Elijah.” '
  '5':
  - type: text
    content: 'While he was still speaking, behold, a bright cloud overshadowed them, and '
  - type: note
    content: See note 3:17.
  - type: text
    content: a voice from the cloud said, “
  - type: note
    content: The Father’s words were a reminder that Jesus is unique, not to be equated with Moses and Elijah. He alone is the Son. The focus is on Him.
  - type: text
    content: 'This is My beloved Son, with whom I am well-pleased '
  - type: text
    content: and
  - type: text
    content: ' delighted! Listen to Him!” [Ps 2:7; Is 42:1] '
  '6':
  - type: text
    content: 'When the disciples heard it, they fell on their faces and were terrified. '
  '7':
  - type: text
    content: 'But Jesus came and touched them and said, '
  - type: text
    content: “Get up, and do not be afraid.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: And when they looked up, they saw no one except Jesus Himself alone.
  '9':
  - type: text
    content: 'And as they were going down the mountain, Jesus commanded them, '
  - type: text
    content: “Do not tell anyone what you have seen until the Son of Man has been raised from the dead.”
  - type: text
    content: ' '
