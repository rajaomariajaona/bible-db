verses:
  '1':
  - type: heading
    content: Oholah and Oholibah’s Sin and Its Consequences
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me again, saying, '
  '10':
  - type: text
    content: 'They uncovered her nakedness; they took her sons and her daughters and they killed her with the sword. So she became '
  - type: note
    content: I.e. an object of scorn and ridicule.
  - type: text
    content: notorious among women, and they executed judgments on her.
  '11':
  - type: text
    content: '“Now her sister Oholibah saw this, yet she was more corrupt in her lust than she, and her acts of prostitution were more [wanton] than the immoralities of her sister. '
  '12':
  - type: text
    content: 'She lusted after the Assyrians—governors and officials, her neighbors, magnificently clothed, horsemen riding on horses, all of them desirable young men. '
  '13':
  - type: text
    content: 'I saw that she had defiled herself; they both '
  - type: text
    content: behaved
  - type: text
    content: ' the same way. '
  '14':
  - type: text
    content: 'But Oholibah carried her depravity further, for she saw men pictured on the wall, the images of the Chaldeans (Babylonians) sketched '
  - type: text
    content: and
  - type: text
    content: ' portrayed in vermilion (bright red pigment), '
  '15':
  - type: text
    content: 'girded with belts on their '
  - type: note
    content: The midsection of the body between the lower ribs and the hips.
  - type: text
    content: 'loins, with flowing turbans on their heads, all of them looking like officers, like the Babylonian men whose native land was Chaldea. '
  '16':
  - type: text
    content: 'When she saw [the sketches of] them, she lusted after them and sent messengers to them in Chaldea. '
  '17':
  - type: text
    content: 'The Babylonians came to her to the bed of love and they defiled her with their evil desire; and when she had been defiled by them, she (Jerusalem) broke the relationship '
  - type: text
    content: and
  - type: text
    content: ' pushed them away from her in disgust. '
  '18':
  - type: text
    content: 'So she flaunted her acts of prostitution and exposed her nakedness; then I became disgusted with her [and turned away], as I had become disgusted with her sister [and turned away]. '
  '19':
  - type: text
    content: 'Yet she multiplied her depravities, remembering the days of her youth, when she was actively immoral in the land of Egypt. '
  '2':
  - type: text
    content: '“Son of man, there were two women (Israel and Judah), the daughters of one mother (the united kingdom); '
  '20':
  - type: text
    content: 'For she lusted after her lovers [there], whose flesh is like the flesh of donkeys and whose issue is like the issue of horses. '
  '21':
  - type: text
    content: 'Thus you longed for the lewdness '
  - type: text
    content: and
  - type: text
    content: ' vulgarity of your youth, when the Egyptians handled your bosom on account of the breasts of your youth.'
  '22':
  - type: text
    content: “Therefore, O Oholibah, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Behold, I will stir up your lovers (allies) against you, from whom you turned away in disgust, and I will bring them against you from every side: '
  '23':
  - type: text
    content: 'the Babylonians and all the Chaldeans, Pekod and Shoa and Koa, and all the Assyrians with them, desirable young men, governors and officials all of them, princes, officers and men of renown, all of them riding on horses. '
  '24':
  - type: text
    content: 'They will come against you with weapons, chariots, and wagons, and with a company of people (infantry) who will array themselves against you on every side with large shield and small, and helmet; and I will commit the judgment '
  - type: text
    content: and
  - type: text
    content: ' the punishment to them, and they will judge '
  - type: text
    content: and
  - type: text
    content: ' punish you in accordance with their [pagan] customs. '
  '25':
  - type: text
    content: 'I will set My jealous indignation against you [demanding what is rightfully and uniquely mine], and they will deal with you in fury. They will remove your nose and your ears, and your survivors will fall by the sword. They will take your sons and your daughters; and the survivors will be devoured by the fire. '
  '26':
  - type: text
    content: 'They will also strip you (Judah) of your clothes and take away your beautiful jewels. '
  '27':
  - type: text
    content: 'Thus I will put an end to your lewdness and your prostitution '
  - type: text
    content: brought
  - type: text
    content: ' from the land of Egypt, so that you will not lift up your eyes to them or remember Egypt [with longing] anymore.’ '
  '28':
  - type: text
    content: For thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Behold, I will place you into the hands of those whom you hate, into the hands of those from whom you turned away in disgust. '
  '29':
  - type: text
    content: 'They will deal with you in hatred, take all your property, and leave you naked and bare. And the nakedness of your depravity will be uncovered, both your lewdness and your obscene practices. '
  '3':
  - type: text
    content: 'and they prostituted themselves in Egypt. From their youth they were grossly immoral; in that place their breasts were embraced and their virgin bosom was grasped. '
  '30':
  - type: text
    content: 'These things will be done to you because you have prostituted yourself with the [Gentile] nations, because you have defiled yourself with their idols. '
  '31':
  - type: text
    content: 'You have walked in the way of your sister (Samaria); therefore I will give her cup [of judgment] into your hand.’ '
  '32':
  - type: text
    content: Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: ‘You will drink your sister’s cup,
  - type: text
    content: Which is deep and wide [and filled to the brim].
  - type: text
    content: You shall be laughed at and derided;
  - type: text
    content: It contains much [too much to endure].
  '33':
  - type: text
    content: ‘You shall be filled with drunkenness and sorrow,
  - type: text
    content: With the cup of horror and desolation,
  - type: text
    content: With the cup of your sister Samaria.
  '34':
  - type: text
    content: ‘You will drink it and drain it,
  - type: text
    content: Then you will gnaw its fragments
  - type: text
    content: And tear your breasts;
  - type: text
    content: for I have spoken,’ says the Lord G
  - type: heading
    content: od
  - type: text
    content: '. '
  '35':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Because you have forgotten Me and cast Me behind your back, therefore bear now [the consequences of] your lewdness and prostitution.’ ”'
  '36':
  - type: text
    content: Moreover, the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Son of man, will you judge Oholah (Samaria, capital of Israel) and Oholibah (Jerusalem, capital of Judah)? Then inform them of their atrocities [the detestable and vile things they do]. '
  '37':
  - type: text
    content: 'For they have committed adultery, and blood is on their hands. They have committed adultery [against Me] with their idols and have even forced their sons, whom they bore to Me, to pass through the fire as [an offering of] food to them (idols). '
  '38':
  - type: text
    content: 'Moreover, they have done this to Me: they have defiled My sanctuary on the same day [of their idolatries] and have profaned My Sabbaths. '
  '39':
  - type: text
    content: For when they had killed their children [as offerings] to their idols, then they came the same day to My sanctuary to profane it [by daring to offer a sacrifice there also]. And behold, this they did within My house.
  '4':
  - type: text
    content: 'Their names were Oholah the elder and Oholibah her sister, and they became Mine and they gave birth to sons and daughters. And as for [the identity of] their names, Oholah is Samaria (capital city of '
  - type: note
    content: I.e. the Northern Kingdom.
  - type: text
    content: 'Israel) and Oholibah is Jerusalem (capital city of '
  - type: note
    content: I.e. the Southern Kingdom.
  - type: text
    content: Judah).
  '40':
  - type: text
    content: '“Furthermore, you have even sent a messenger for men to come from far away; and behold, they came—those for whom you bathed, painted your eyes, and decorated yourself with ornaments; '
  '41':
  - type: text
    content: 'and you sat on a splendid couch with a table arranged before it on which you had set My incense and My oil. '
  '42':
  - type: text
    content: The sound of a carefree crowd was with her; and drunkards were brought from the wilderness with men of a common sort, who put bracelets on the hands of the women (both sisters) and beautiful crowns on their heads.
  '43':
  - type: text
    content: '“Then I said concerning the one (Oholah) worn out by adulteries, ‘Will they now commit adultery with her when she is like this?’ '
  '44':
  - type: text
    content: 'But they committed adultery with her as they would with a prostitute. So they went in to Oholah (Israel) and to Oholibah (Judah), the lewd women. '
  '45':
  - type: text
    content: 'And they, righteous men, will judge '
  - type: text
    content: and
  - type: text
    content: ' condemn them with the judgment (punishment) of adulteresses and with the judgment of women who shed blood, because they are adulteresses and blood is on their hands.'
  '46':
  - type: text
    content: “For thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', ‘Bring up a horde (mob) against them and hand them over to terror and plunder. '
  '47':
  - type: text
    content: 'And the horde will stone them with stones and cut them down with their swords; they will kill their sons and their daughters and burn down their houses with fire. '
  '48':
  - type: text
    content: 'Thus I will make lewdness cease from the land, that all women may be admonished '
  - type: text
    content: and
  - type: text
    content: ' taught not to commit immoral acts as you have done. '
  '49':
  - type: text
    content: Thus your lewdness will be repaid to you, and you will suffer the penalty for your [sinful] idolatry; and you will know [without any doubt] that I am the Lord G
  - type: heading
    content: od
  - type: text
    content: .’ ”
  '5':
  - type: text
    content: '“Oholah played the prostitute while she was Mine; and she adored '
  - type: text
    content: and
  - type: text
    content: ' lusted after her lovers (allies), the Assyrians, her neighbors, '
  '6':
  - type: text
    content: 'who were clothed in purple, governors and officials, all of them attractive young men, horsemen riding on horses. '
  '7':
  - type: text
    content: 'She bestowed [freely] her immoralities on them, the choicest men of Assyria, all of them; and with all whom she adored '
  - type: text
    content: and
  - type: text
    content: ' lusted after, she defiled herself with their idols. '
  '8':
  - type: text
    content: 'She did not '
  - type: note
    content: Lit forsake.
  - type: text
    content: 'give up the acts of prostitution that originated '
  - type: text
    content: during her time in
  - type: text
    content: ' Egypt; for in her youth men had lain with her, and they handled her virgin bosom and poured out their depravity on her. '
  '9':
  - type: text
    content: 'Therefore, I placed her in the hand of her lovers (allies), into the hand of the Assyrians whom she adored. '
