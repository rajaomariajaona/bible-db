    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “Son of man, will you judge Oholah (Samaria, capital of Israel) and Oholibah (Jerusalem, capital of Judah)? Then inform them of their atrocities [the detestable and vile things they do]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'For they have committed adultery, and blood is on their hands. They have committed adultery [against Me] with their idols and have even forced their sons, whom they bore to Me, to pass through the fire as [an offering of] food to them (idols). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Moreover, they have done this to Me: they have defiled My sanctuary on the same day [of their idolatries] and have profaned My Sabbaths. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: For when they had killed their children [as offerings] to their idols, then they came the same day to My sanctuary to profane it [by daring to offer a sacrifice there also]. And behold, this they did within My house.
- type: usfm
  marker: p
  children:
  - type: usfm
