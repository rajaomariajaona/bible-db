  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So she flaunted her acts of prostitution and exposed her nakedness; then I became disgusted with her [and turned away], as I had become disgusted with her sister [and turned away]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet she multiplied her depravities, remembering the days of her youth, when she was actively immoral in the land of Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For she lusted after her lovers [there], whose flesh is like the flesh of donkeys and whose issue is like the issue of horses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Thus you longed for the lewdness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' vulgarity of your youth, when the Egyptians handled your bosom on account of the breasts of your youth.'
- type: usfm
