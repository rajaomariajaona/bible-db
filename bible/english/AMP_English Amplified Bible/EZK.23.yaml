  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Therefore, O Oholibah, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Behold, I will stir up your lovers (allies) against you, from whom you turned away in disgust, and I will bring them against you from every side: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'the Babylonians and all the Chaldeans, Pekod and Shoa and Koa, and all the Assyrians with them, desirable young men, governors and officials all of them, princes, officers and men of renown, all of them riding on horses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They will come against you with weapons, chariots, and wagons, and with a company of people (infantry) who will array themselves against you on every side with large shield and small, and helmet; and I will commit the judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the punishment to them, and they will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish you in accordance with their [pagan] customs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I will set My jealous indignation against you [demanding what is rightfully and uniquely mine], and they will deal with you in fury. They will remove your nose and your ears, and your survivors will fall by the sword. They will take your sons and your daughters; and the survivors will be devoured by the fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They will also strip you (Judah) of your clothes and take away your beautiful jewels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Thus I will put an end to your lewdness and your prostitution '
  - type: usfm
    marker: it
    children:
    - type: text
      text: brought
  - type: text
    text: ' from the land of Egypt, so that you will not lift up your eyes to them or remember Egypt [with longing] anymore.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: For thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Behold, I will place you into the hands of those whom you hate, into the hands of those from whom you turned away in disgust. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They will deal with you in hatred, take all your property, and leave you naked and bare. And the nakedness of your depravity will be uncovered, both your lewdness and your obscene practices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'These things will be done to you because you have prostituted yourself with the [Gentile] nations, because you have defiled yourself with their idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
