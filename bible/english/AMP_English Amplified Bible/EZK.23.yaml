  - type: text
    text: '“Now her sister Oholibah saw this, yet she was more corrupt in her lust than she, and her acts of prostitution were more [wanton] than the immoralities of her sister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
