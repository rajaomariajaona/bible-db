  - type: text
    text: The sound of a carefree crowd was with her; and drunkards were brought from the wilderness with men of a common sort, who put bracelets on the hands of the women (both sisters) and beautiful crowns on their heads.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
