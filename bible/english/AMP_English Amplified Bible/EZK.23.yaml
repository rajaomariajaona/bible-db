  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', ‘Because you have forgotten Me and cast Me behind your back, therefore bear now [the consequences of] your lewdness and prostitution.’ ”'
