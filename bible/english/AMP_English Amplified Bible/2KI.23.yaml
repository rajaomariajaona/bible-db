document_id: 2KI.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Josiah’s Covenant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'King Josiah sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and they brought to him all the elders of Judah and of Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Josiah also defiled Topheth, which is in the Valley of Ben-hinnom (son of Hinnom), so that no man could make his son or his daughter pass through the fire [as a burnt offering] for Molech. [Ezek 16:21] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And he got rid of the horses that the kings of Judah had given [in worship] to the sun at the entrance of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', by the chamber of Nathan-melech the official, which was in the annex; and he burned the chariots of the sun. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The altars [dedicated to the starry host of heaven] which were on the roof, the upper chamber of Ahaz, which the kings of Judah had made, and the altars which Manasseh had made in the two courtyards of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the king tore down; and he smashed them there and threw their dust into the Brook Kidron. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The king desecrated the high places which were opposite [east of] Jerusalem, which were on the right (south) of the mount of corruption which Solomon the king of Israel had built for Ashtoreth the repulsiveness of the Sidonians, for Chemosh the repulsiveness of Moab, and for Milcom the repulsiveness of the sons (descendants) of Ammon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He broke in pieces the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillars (cultic memorial stones, images) and cut down the Asherim and replaced them with human bones [to desecrate the places forever].'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Further, the altar that was at Bethel, the high place which Jeroboam the son of Nebat, who made Israel sin, had made, even that altar and the high place he tore down. Then he demolished its stones, ground them to dust, and burned the Asherah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And as Josiah turned, he saw the graves that were there on the mountain, and he sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' and had the bones taken from the graves, and burned them on the altar and [thereby] desecrated it, in accordance with the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which the man of God prophesied, who proclaimed these things [about this altar, naming Josiah before he was born]. [1 Kin 13:2-5] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Josiah said, “What is this monument (gravestone) that I see?” The men of the city told him, “It is the grave of the man of God who came from Judah and proclaimed these things which you have done to the altar of Bethel.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He said, “Let him alone; let no one disturb his bones.” So they left his bones undisturbed, with the bones of the prophet who came from Samaria. [1 Kin 13:31, 32] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Josiah also removed all the houses of the high places which were in the cities of Samaria, which the kings of Israel had made provoking the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [to anger]; and he did to them just as he had done [to those] in Bethel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The king went up to the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and with him all the men of Judah and all the inhabitants of Jerusalem, the priests, the prophets, and all the people, both small and great; and he read in their hearing all the words of the book of the covenant which was found in the house (temple) of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: All the priests of the high places who were there he slaughtered on the altars, and burned human bones on them [to desecrate the places forever]. Then he returned to Jerusalem.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Passover Reinstituted
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the king commanded all the people, saying, “Celebrate the Passover to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God as it is written in this book of the covenant.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Indeed, such a Passover as this had not been held since the days of the judges who judged Israel, nor in all the days of the kings of Israel and the kings of Judah. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But in the eighteenth year of King Josiah, this Passover to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was kept in Jerusalem.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Moreover, Josiah removed the mediums and the soothsayers and the teraphim (household gods) and the idols and all the repulsive things that were seen in Judah and in Jerusalem, so that he might fulfill the words of the law written in the book which Hilkiah the priest found in the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Before him there was no king like Josiah who turned to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with all his heart and all his soul and all his might, in accordance with all the Law of Moses; nor did anyone like him arise after him.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: However, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' did not turn from the fierceness of His great wrath which was kindled against Judah because of all the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: provocations
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'despicable acts with which Manasseh had provoked Him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “I will also remove Judah from My sight, just as I have removed Israel; and will reject this city which I have chosen, this Jerusalem, and the house, of which I said, ‘My Name [and the pledge of My Presence] shall be there.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoahaz Succeeds Josiah
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Now the rest of the acts of Josiah, everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'In his days Pharaoh Neco (Necho) king of Egypt went up to the king of Assyria to the river Euphrates [to help him fight Nabopolassar the king of Babylon]. King Josiah went out to meet him, but Pharaoh killed Josiah at Megiddo when he saw him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The king stood by the pillar and made a covenant before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to walk after the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and to keep His commandments, His testimonies, and His statutes with all his heart and soul, to confirm the words of this covenant that were written in this book. And all the people entered into the covenant.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reforms under Josiah
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Josiah’s servants carried his dead body in a chariot from Megiddo, brought him to Jerusalem, and buried him in his own tomb. Then the people of the land took Jehoahaz the son of Josiah and anointed him and made him king in his father’s place.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jehoahaz was twenty-three years old when he became king, and he reigned for [only] three months in Jerusalem. His mother’s name was Hamutal daughter of Jeremiah of Libnah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with everything that his forefathers had done. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Pharaoh Neco imprisoned him at Riblah in the land of Hamath, so that he would not reign in Jerusalem, and imposed a fine on the land of a hundred talents of silver and a talent of gold.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoiakim Made King by Pharaoh
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Pharaoh Neco made Eliakim the son of Josiah king in place of his father Josiah, and changed his name to Jehoiakim. But he took Jehoahaz and brought him to Egypt, where he died. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Jehoiakim gave the silver and the gold to Pharaoh, but he taxed the land to give the money as Pharaoh commanded. He collected the silver and gold from the people of the land, from everyone according to his assessment, to give it to Pharaoh Neco.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jehoiakim was twenty-five years old when he became king, and he reigned for eleven years in Jerusalem. His mother’s name was Zebidah daughter of Pedaiah of Rumah. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with everything that his forefathers had done.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then the king commanded Hilkiah the high priest and the priests of the second rank and the doorkeepers to bring out of the temple of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' all the articles made for Baal, for [the goddess] Asherah, and for all the [starry] host of heaven; and he burned them outside Jerusalem in the fields of the Kidron, and carried their ashes to Bethel [where Israel’s idolatry began]. [1 Kin 12:28, 29] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He got rid of the idolatrous priests whom the kings of Judah had ordained to burn incense [to pagan gods] in the high places in Judah’s cities and all around Jerusalem—also those who burned incense to Baal, to the sun, to the moon, to the constellations [of the zodiac], and to all the [starry] host of heaven. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Josiah brought out the Asherah from the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to the Brook Kidron outside Jerusalem, and burned it there, and ground it to dust, and threw its dust on the graves of the common people [who had sacrificed to it]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And he tore down the houses of the [male] cult prostitutes, which were at the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', where the women were weaving [tent] hangings for the Asherah [shrines]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Josiah brought all the [idolatrous] priests from the cities of Judah, and desecrated the high places where the priests had burned incense [to idols], from Geba to Beersheba, [that is, north to south]; and he tore down the high places of the gates which were at the entrance of the gate of Joshua the governor of the city, which were on one’s left at the city gate. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: However, the priests of the high places were not allowed to go up to the altar of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in Jerusalem [to serve], but they ate unleavened bread among their brothers. '
