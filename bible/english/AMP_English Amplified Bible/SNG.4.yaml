document_id: SNG.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon’s Love Expressed
    marker-yv: yv-h
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Bridegroom)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“How fair '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' beautiful you are, my darling,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How very beautiful!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your eyes behind your veil are like those of a dove;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hair is like [the shimmering black fleece of] a flock of [Arabian] goats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That have descended from Mount Gilead [beyond the Jordan].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “How beautiful is your love, my sister, my [promised] bride!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much better is your love than wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fragrance of your oils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Than all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds
    - type: text
      text: ' of balsam '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spices. [John 15:9; Rom 8:35]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Your lips, my [promised] bride, drip honey [as the honeycomb];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honey and milk are under your tongue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fragrance of your garments is like the fragrance of Lebanon.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “A garden enclosed is my sister, my [promised] bride—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A rock garden locked, a spring sealed up.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Your shoots are an orchard of pomegranates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[A paradise] with precious fruits, henna with fragrant plants, [John 15:5; Eph 5:9]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fragrant plants and saffron, calamus and cinnamon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With all trees of frankincense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Myrrh and aloes, along with all the finest spices.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: You are
    - type: text
      text: ' a fountain in a garden,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A well of fresh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' living water,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And streams '
    - type: usfm
      marker: it
      children:
      - type: text
        text: flowing
    - type: text
      text: ' from Lebanon.” [John 4:10; 7:37, 38]'
  - type: usfm
    marker: sp
    children:
    - type: text
      text: (The Shulammite Bride)
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '¶“Awake, O north '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And come, south '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wind
    - type: text
      text: ' [blow softly upon my garden];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make my garden breathe out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fragrance,
    - type: text
      text: ' [for the one in whom my soul delights],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let its spices flow forth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my beloved come into his garden
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And eat its choicest fruits.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Your teeth are like a flock of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: newly
    - type: text
      text: ' shorn ewes'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which have come up from washing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All of which bear twins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And not one among them has lost her young.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Your lips are like a ribbon of scarlet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your mouth is lovely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your temples are like a slice of the pomegranate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behind your veil.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Your neck is like the tower of David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Built with rows of [glistening] stones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whereon hang a thousand shields,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All of them shields of warriors.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Your two breasts are like two fawns,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Twins of a gazelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which feed among the lilies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Until the day breaks
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the shadows flee away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[In my thoughts] I will go my way to the mountain of myrrh'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the hill of frankincense.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '¶“O my love, you are altogether beautiful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fair.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is no flaw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' blemish in you! [John 14:18; Eph 5:27]'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Come away
    - type: text
      text: ' with me from Lebanon, my [promised] bride,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you come with me from Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Journey down from the top of Amana,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the summit of Senir and Hermon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the dens of lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the mountains of leopards. [2 Cor 11:2, 3]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“You have ravished my heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given me courage, my sister, my [promised] bride;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have ravished my heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' given me courage with a single '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glance
    - type: text
      text: ' of your eyes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With one jewel of your necklace.
