    children:
    - type: text
      text: Psalm 146
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' an Abundant Helper.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', O my soul!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall reign forever,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your God, O Zion, to all generations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!) [Ps 10:16; Rev 11:15]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: While I live I will praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing praises to my God as long as I live.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do not trust in princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In mortal man, in whom there is no salvation (help).
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: When his spirit leaves him, he returns to the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In that very day his thoughts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plans perish. [1 Cor 2:6]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'How blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' graciously favored is he whose help is the God of Jacob (Israel),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose hope is in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God, [Gen 32:30]'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Who made heaven and earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sea, and all that is in them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who keeps truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' is faithful forever, [Gen 1:3]'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Who executes justice for the oppressed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who gives food to the hungry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sets free the prisoners.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' opens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the eyes of
    - type: text
      text: ' the blind;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lifts up those who are bowed down;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' loves the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '146:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. those whose moral and spiritual integrity places them in right standing with God.
      marker-yv: yv-n
    - type: text
      text: righteous [the upright in heart]. [Luke 13:13; John 9:7, 32]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' protects the strangers;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He supports the fatherless and the widow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He makes crooked the way of the wicked.
