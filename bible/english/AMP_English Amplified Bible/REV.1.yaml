  - type: note
    content: These were actual churches in Asia Minor (now western Turkey), and in John’s time there would have been only one church body in each of the cities. They are mentioned in the order in which they would be visited by a messenger traveling northward on the imperial road from Ephesus to Laodicea.
  - type: text
    content: seven churches—to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to Philadelphia and to Laodicea.”
  '12':
  - type: text
    content: 'Then I turned to see the voice that was speaking with me. And after turning I saw seven golden lampstands; '
