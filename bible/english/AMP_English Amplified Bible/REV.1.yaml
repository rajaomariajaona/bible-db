  - type: note
    content: Or spirit. The Greek wording is not decisive, so John could be referring either to being in special communion with the Holy Spirit, or to being in a trance-like state in his own spirit like that experienced by Peter at Joppa (cf Acts 10:10, 11).
  - type: text
