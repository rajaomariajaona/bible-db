        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for “messenger” is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: aggelos.
      - type: text
        text: ' When the word is referring to a heavenly being, it is usually not translated, but rather transliterated as “angel”; that is, the Greek letters are converted to their English equivalents, based on the sound of the Greek word. When the word is referring to a human, it is instead translated as “messenger” or the equivalent. So whether “angel” or “messenger” is used depends on the context.'
    marker-yv: yv-n
  - type: usfm
