  - type: text
    content: 'and in the midst of the lampstands '
  - type: text
    content: I saw
  - type: text
    content: ' someone '
  - type: note
    content: Or like a son of man. The phrase is a translation of a Hebrew idiom which refers to a man, and John could simply be describing his first impression. But since this proves to be a vision of Christ (v 18), John probably is referring to Him by the title that Jesus so often applied to Himself, a title originating in the Messianic prophecy of Daniel.
  - type: text
    content: 'like the Son of Man, dressed in a robe reaching to His feet, and with a golden sash wrapped around His chest. [Dan 7:13; 10:5] '
  '14':
  - type: text
    content: 'His head and His hair were white like white wool, [glistening white] like snow; and His [all-seeing] eyes were [flashing] like a flame of fire [piercing into my being]. [Dan 7:9] '
  '15':
  - type: text
