  '20':
  - type: text
    content: 'As for the mystery of the seven stars which you saw in My right hand, and the seven golden lampstands: the seven stars are the angels ('
  - type: note
    content: The Greek word for “messenger” is aggelos. When the word is referring to a heavenly being, it is usually not translated, but rather transliterated as “angel”; that is, the Greek letters are converted to their English equivalents, based on the sound of the Greek word. When the word is referring to a human, it is instead translated as “messenger” or the equivalent. So whether “angel” or “messenger” is used depends on the context.
  - type: text
    content: divine messengers) of the seven churches, and the seven lampstands are the seven churches.
  '3':
  - type: note
    content: This is the first of the seven promised blessings (beatitudes) of the Revelation. See also 14:13; 16:15; 19:9; 20:6; 22:7, 14.
  - type: text
    content: Blessed (happy, prosperous, to be admired) is he who reads and those who hear the words of the prophecy, and who keep the things which are written in it [heeding them and taking them to heart]; for the time [of fulfillment] is near.
  - type: heading
    content: Message to the Seven Churches
  '4':
  - type: text
    content: ' '
  - type: note
    content: John and his brother James were among the first apostles chosen by Jesus, and were the sons of Zebedee and Salome. In addition to the Revelation, John wrote the Gospel and the three letters that bear his name.
  - type: text
    content: 'John, to the seven churches that are in [the province of] '
  - type: note
    content: The Roman province of Asia (now western Turkey) was formed in 129 b.c.
  - type: text
    content: 'Asia: '
  - type: note
    content: Like Paul, the apostle John takes the standard Jewish greeting of “Peace [Heb shalom] to you” and modifies it by adding grace, without which no one could obtain peace with God.
  - type: text
    content: 'Grace [be granted] to you and peace [inner calm and spiritual well-being], from Him Who is [existing forever] and Who was [continually existing in the past] and Who is to come, and from '
  - type: note
    content: A literal translation, perhaps referring to the perfect fullness of the ministry of the Holy Spirit.
  - type: text
    content: 'the seven Spirits that are before His throne, [Is 11:2] '
  '5':
