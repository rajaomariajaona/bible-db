      - type: text
        text: . The phrase is a translation of a Hebrew idiom which refers to a man, and John could simply be describing his first impression. But since this proves to be a vision of Christ (v 18), John probably is referring to Him by the title that Jesus so often applied to Himself, a title originating in the Messianic prophecy of Daniel.
