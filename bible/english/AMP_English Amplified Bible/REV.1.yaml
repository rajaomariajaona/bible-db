    content: 'and formed us into a kingdom [as His subjects], '
  - type: note
    content: All Christians become priests to God in order to offer spiritual sacrifices (1 Pet 2:5) and proclaim His praises (1 Pet 2:9), and they will reign with Christ in the Millennium (20:6).
