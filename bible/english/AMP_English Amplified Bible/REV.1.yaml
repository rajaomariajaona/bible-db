  - type: text
    content: ' trustworthy Witness, the '
  - type: note
    content: Jesus was not the first person to be brought back to life, since He raised others from the dead (the most notable being Lazarus, John 11), but they had to experience death again. Jesus is the first to be restored to life with a glorified (immortal, everlasting) body, never again to die. The word Firstborn may point not only to Jesus’ own resurrection but also to His divine power to resurrect others. The Firstborn (preeminent) is given power over all things.
  - type: text
    content: 'Firstborn of the dead, and the Ruler of the kings of the earth. To Him who [always] loves us and who [has once for all] '
  - type: note
    content: 'Some manuscripts use “freed” (lusanti) while others use “washed” (lousanti). Either reading conveys a similar theological conclusion: Jesus has taken away our sins by His blood.'
  - type: text
    content: 'freed us [or washed us] from our sins by His own blood (His sacrificial death)— [Ps 89:27] '
