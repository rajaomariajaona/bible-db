  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Is Lord of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One Sabbath while Jesus was passing through fields of standing grain, it happened that His disciples were picking the heads of grain, rubbing them in their hands, and eating them. [Deut 23:25; Matt 12:1-8; Mark 2:23-28] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But some of the Pharisees said, “Why are you doing what '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 12:2.
    marker-yv: yv-n
  - type: text
    text: 'is unlawful on the Sabbath?” [Ex 20:10; 23:12; Deut 5:14] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Have you not even read
  - type: text
    text: ' [in the Scriptures] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: what David did when he was hungry, he and those who were with him—
  - type: text
    text: ' [1 Sam 21:1-6] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'how he went into the house of God, and took and ate the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: showbread;
      - type: text
        text: ' lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bread of presentation
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: consecrated bread, which is not lawful
  - type: text
    text: ' [for anyone] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to eat except the priests alone, and
  - type: text
    text: ' [how he also] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: gave it to the men who were with him?”
  - type: text
    text: ' [Lev 24:9] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jesus was saying to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Son of Man (the Messiah) is Lord
  - type: text
    text: ' [even] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On another Sabbath He went into the synagogue and taught, and a man was present whose right hand was withered. [Matt 12:9-14; Mark 3:1-6] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The scribes and the Pharisees were watching Him closely [with malicious intent], to see if He would [actually] heal [someone] on the Sabbath, so that they might find '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a reason
  - type: text
    text: ' to accuse Him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But He was aware of their thoughts, and He said to the man with the withered hand, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get up and come forward.”
  - type: text
    text: ' So he got up and stood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I ask you directly: Is it lawful to do good on the Sabbath or to do evil, to save a life or to destroy it?”'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'After looking around at them all, He said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stretch out your hand!”
  - type: text
    text: ' And he did, and his hand was [fully] restored. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the scribes and Pharisees were filled with senseless rage [and lacked spiritual insight], and discussed with one another what they might do to Jesus.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Choosing the Twelve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now at this time Jesus went off to the mountain to pray, and He spent the whole night in prayer to God. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When day came, He called His disciples and selected twelve of them, whom He also named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In general usage the word “apostle” (Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apostolos)
      - type: text
        text: ' means “sent one” or “messenger.” In this passage and others in reference to the “twelve,” the word “apostles” is used in a technical sense of the twelve disciples, and later Paul, whom Jesus chose. An apostle was one who had witnessed Christ’s resurrection (Acts 1:21, 22) or (in Paul’s case) had seen the resurrected Christ (1 Cor 9:1, 2). They validated their apostleship by performing “signs and wonders and miracles” (2 Cor 12:12), and were the foundation of the church.'
    marker-yv: yv-n
  - type: text
    text: 'apostles (special messengers, personally chosen representatives): [Matt 10:2-4; Mark 3:16-19] '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Simon, whom He also named Peter, and his brother Andrew; and [the brothers] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The sons of Zebedee and Salome. Salome is believed to be a sister of Mary, the mother of Jesus.
    marker-yv: yv-n
  - type: text
    text: 'James and John; and Philip, and Bartholomew [also called Nathanael]; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and Matthew (Levi, the tax collector) and Thomas; and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Also called James the Less or James the Younger. His mother Mary (Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Maria)
      - type: text
        text: ' is believed to be a sister or sister-in-law of Mary, the mother of Jesus.'
    marker-yv: yv-n
  - type: text
    text: 'James '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the son
  - type: text
    text: ' of Alphaeus, and Simon who was called the Zealot; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Judas [also called Thaddaeus] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the son
  - type: text
    text: ' of James, and Judas Iscariot, who became a traitor [to the Lord].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Jesus came down with them and stood on a level place; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there was
  - type: text
    text: ' a large crowd of His disciples, and a vast multitude of people from all over Judea and Jerusalem and the coastal region of Tyre and Sidon, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'who had come to listen to Him and to be healed of their diseases. Even those who were troubled by unclean spirits (demons) were being healed. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: All the people were trying to touch Him, because [healing] power was coming from Him and healing them all.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Beatitudes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And looking toward His disciples, He began '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In vv 20-22 Luke lists four of the nine Beatitudes recorded by Matthew and follows them with four antithetical woes in vv 24-26.
    marker-yv: yv-n
  - type: text
    text: 'speaking: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Blessed
  - type: text
    text: ' [spiritually prosperous, happy, to be admired] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'are you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are
    - type: text
      text: ' poor'
  - type: text
    text: ' [in spirit, those devoid of spiritual arrogance, those who regard themselves as insignificant], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for the kingdom of God is yours
  - type: text
    text: ' [both now and forever]. [Matt 5:3-12] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Blessed
  - type: text
    text: ' [joyful, nourished by God’s goodness] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are you who hunger now
  - type: text
    text: ' [for righteousness, actively seeking right standing with God], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you will be
  - type: text
    text: ' [completely] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: satisfied. Blessed
  - type: text
    text: ' [forgiven, refreshed by God’s grace] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are you who weep now
  - type: text
    text: ' [over your sins and repent], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you will laugh
  - type: text
    text: ' [when the burden of sin is lifted]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Blessed
  - type: text
    text: ' [morally courageous and spiritually alive with life-joy in God’s goodness] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: are you when people hate you, and exclude you
  - type: text
    text: ' [from their fellowship], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and insult you, and scorn your name as evil because of
  - type: text
    text: ' [your association with] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the Son of Man.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rejoice on that day and leap for joy, for your reward in heaven is great
  - type: text
    text: ' [absolutely inexhaustible]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for their fathers used to treat the prophets in the same way.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The four woes (vv 24-26) are addressed to those who lack spiritual perception and are oblivious to the importance of Jesus’ message of salvation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: woe (judgment is coming) to you who are rich
  - type: text
    text: ' [and place your faith in possessions while remaining spiritually impoverished], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you are
  - type: text
    text: ' [already] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: receiving your comfort in full
  - type: text
    text: ' [and there is nothing left to be awarded to you]. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Woe to you who are well-fed (gorged, satiated) now, for you will be hungry. Woe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to you
    - type: text
      text: ' who laugh now'
  - type: text
    text: ' [enjoying a life of self-indulgence], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you will mourn and weep
  - type: text
    text: ' [and deeply long for God]. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Woe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to you
    - type: text
      text: ' when all the people speak well of you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise you, for their fathers used to treat the false prophets in the same way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But I say to you who hear
  - type: text
    text: ' [Me and pay attention to My words]: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The key to understanding this and other statements about love is to know that this love (the Greek word '
      - type: usfm
        marker: it
        children:
        - type: text
          text: agape)
      - type: text
        text: ' is not so much a matter of emotion as it is of doing things for the benefit of another person, that is, having an unselfish concern for another and a willingness to seek the higher good for another.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Love
  - type: text
    text: ' [that is, unselfishly seek the best or higher good for] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: your enemies,
  - type: text
    text: ' [make it a practice to] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: do good to those who hate you,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'bless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' show kindness to those who curse you, pray for those who mistreat you.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Whoever '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In this context the “slap” is not an act of violence, but more likely an insult or violation of one’s rights.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: strikes you on the cheek, offer him the other one also
  - type: text
    text: ' [simply ignore insignificant insults or losses and do not bother to retaliate—maintain your dignity]. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whoever takes away your coat, do not withhold your shirt from him either.
  - type: text
    text: ' [Matt 5:39-42] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Give to everyone who asks of you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a prohibition against frivolous legal action.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whoever takes away what is yours, do not demand it back.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Treat others the same way you want them to treat you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you
  - type: text
    text: ' [only] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: love those who love you, what credit is that to you? For even sinners love those who love them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
