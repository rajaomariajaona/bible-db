  '11':
  - type: text
    content: But the scribes and Pharisees were filled with senseless rage [and lacked spiritual insight], and discussed with one another what they might do to Jesus.
  - type: heading
    content: Choosing the Twelve
  '12':
  - type: text
    content: 'Now at this time Jesus went off to the mountain to pray, and He spent the whole night in prayer to God. '
  '13':
  - type: text
    content: 'When day came, He called His disciples and selected twelve of them, whom He also named '
  - type: note
    content: In general usage the word “apostle” (Gr apostolos) means “sent one” or “messenger.” In this passage and others in reference to the “twelve,” the word “apostles” is used in a technical sense of the twelve disciples, and later Paul, whom Jesus chose. An apostle was one who had witnessed Christ’s resurrection (Acts 1:21, 22) or (in Paul’s case) had seen the resurrected Christ (1 Cor 9:1, 2). They validated their apostleship by performing “signs and wonders and miracles” (2 Cor 12:12), and were the foundation of the church.
  - type: text
    content: 'apostles (special messengers, personally chosen representatives): [Matt 10:2-4; Mark 3:16-19] '
