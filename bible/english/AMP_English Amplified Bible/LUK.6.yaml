  - type: heading
    content: Jesus Is Lord of the Sabbath
  - type: text
    content: 'One Sabbath while Jesus was passing through fields of standing grain, it happened that His disciples were picking the heads of grain, rubbing them in their hands, and eating them. [Deut 23:25; Matt 12:1-8; Mark 2:23-28] '
  '10':
