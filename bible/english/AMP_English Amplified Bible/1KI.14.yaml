document_id: 1KI.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahijah Prophesies against the King
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'At that time Abijah the son [and crown prince, heir] of Jeroboam became sick. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'therefore behold, I am bringing evil on the house (royal line) of Jeroboam, and I will cut off (destroy) from Jeroboam every male, both bond and free, in Israel, and will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: utterly
    - type: text
      text: ' sweep away the house of Jeroboam as one sweeps away dung until it is all gone. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The dogs will eat [the carcass of] anyone belonging to Jeroboam who dies in the city, and the birds of the sky will eat [the carcass of] anyone who dies in the field, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken it.” ’ [Deut 28:26] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now as for you (Jeroboam’s wife), arise, go to your own house. When your feet enter the city, the child [Abijah] will die. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'All Israel shall mourn for him and bury him, for he alone of Jeroboam’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: family
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was considered disgraceful, shameful and disgusting for a corpse to be left unburied and exposed to animals.
      marker-yv: yv-n
    - type: text
      text: 'will come to [be placed in] the grave, because in him there was found something good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pleasing toward the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, in the house of Jeroboam. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Moreover, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will raise up for Himself a king over Israel who will cut off the house (royal line) of Jeroboam this day and from now on.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will strike Israel, as a reed is shaken in the water; and He will uproot Israel from this good land which He gave to their fathers, and He will scatter them beyond the [Euphrates] River, because they have made their '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Idols of the goddess Asherah.
      marker-yv: yv-n
    - type: text
      text: Asherim, provoking the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to anger. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He will give up Israel because of the sins of Jeroboam which he has committed, and with which he has made Israel sin [by leading them into idolatry].”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Jeroboam’s wife arose and left and came to Tirzah [the king’s residence]. As she was entering the threshold of the house, the child [Abijah] died. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And all Israel buried him and mourned for him, in accordance with the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He spoke through His servant Ahijah the prophet.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now as for the rest of the acts of Jeroboam, how he made war and how he reigned, behold, they are written in the Book of the Chronicles of the Kings of Israel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jeroboam said to his wife, “Please get up and disguise yourself, so that people will not know that you are Jeroboam’s wife, and go to Shiloh. Ahijah the prophet is there, the one who told me that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I would be
    - type: text
      text: ' king over this people. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The time that Jeroboam reigned was twenty-two years, and he slept with his fathers [in death]; and Nadab his son reigned in his place.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rehoboam Misleads Judah
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Now Rehoboam the son of Solomon reigned in Judah. Rehoboam was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had chosen from all the tribes of Israel in which to put His Name (Presence). His mother’s name was Naamah the Ammonitess. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: And [the people of] Judah did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. They provoked Him to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
      marker-yv: yv-n
    - type: text
      text: 'jealousy more than all that their fathers had done, with their sins which they had committed. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For they also built for themselves high places [to worship idols] and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillars and Asherim [for the goddess Asherah]. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: These were
    - type: text
      text: ' on every high hill and under every luxuriant tree. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: There were also male cult prostitutes in the land. They committed all the repulsive acts of the nations which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' dispossessed before the Israelites.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now in the fifth year of King Rehoboam, Shishak king of Egypt [Jeroboam’s brother-in-law] came up against Jerusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He took away the treasures of the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and the treasures of the king’s house; he took away everything, he even took all the shields of gold which Solomon had made. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So King Rehoboam made bronze shields to replace them and handed them over to the captains of the palace guard who guarded the doorway of the king’s house. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And as often as the king went into the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the guards would carry them and bring them back into the guardroom.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Now as for the rest of the acts of Rehoboam, and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Take with you ten loaves of bread, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' cakes, and a bottle of honey, and go to him. He will tell you what will happen to the boy.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'There was also war between Rehoboam and Jeroboam continually. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: And Rehoboam slept with his fathers [in death] and was buried with his fathers in the City of David. His mother’s name was Naamah the Ammonitess. Abijam (Abijah) his son became king in his place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jeroboam’s wife did so. She got up and went [twenty miles] to Shiloh, and came to the house of Ahijah. Now Ahijah could not see, because his eyes were dim from old age. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Ahijah, “Behold, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is an insertion in the Septuagint, found in the Vatican manuscript after 1 Kin 12:24, in which Jeroboam’s wife is identified as Ano, the older sister of Tahpenes the wife of King Shishak of Egypt. When Jeroboam fled to Egypt to escape death at the hands of King Solomon, he went to King Shishak of Egypt and remained with him until the death of Solomon. Jeroboam asked permission of King Shishak to return to his own land, and the king told him, “Ask of me a request, and I will give it to you.” In reply, Jeroboam apparently asked for Ano.
      marker-yv: yv-n
    - type: text
      text: wife of Jeroboam is coming to inquire of you about her son, because he is sick. You shall say such and such to her, for when she arrives, she will pretend to be another woman.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So when Ahijah heard the sound of her feet as she came in the doorway, he said, “Come in, wife of Jeroboam. Why do you pretend to be another woman? For I have been sent to you [by God] with a harsh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: message
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Go, tell Jeroboam, ‘This is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, says: “Because I exalted you from among the people and made you leader over My people Israel, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and tore the kingdom away from the house of David and gave it to you—but you have not been like My servant David, who kept My commandments and followed Me with all his heart, to do only what was right in My eyes, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'but have done more evil than all [the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Saul, David, and Solomon.
      marker-yv: yv-n
    - type: text
      text: 'kings] who were before you; for you have gone and made for yourself other gods and molten images to provoke Me to anger, and have cast Me behind your back— '
