  - type: text
    text: 'He also possessed 7,000 sheep, 3,000 camels, 500 yoke (pairs) of oxen, 500 female donkeys, and a very great number of servants, so that this man was the greatest [and wealthiest and most respected] of all the men of the east (northern Arabia). '
