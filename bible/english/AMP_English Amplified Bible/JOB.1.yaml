    content: 'His sons used to go [in turn] and feast in the house of each one on his '
  - type: note
    content: Lit house of each man his day. It has been inferred by some that his refers to Job, and that his day was Job’s birthday or some other special occasion for him. But the Hebrew wording indicates instead that his refers to each of the brothers in turn, and since there were seven of them, it follows that they held a banquet every day of the week, rotating from house to house, as is also indicated in v 5. This is evidence both of the brothers’ prosperity and the close relationship they maintained with one another.
