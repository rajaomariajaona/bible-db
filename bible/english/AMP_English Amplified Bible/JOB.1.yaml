    content: Job’s Character and Wealth
  - type: text
    content: ' '
  - type: note
    content: The written structure of this book is unusual because it combines prose and poetry. No other book in the Bible uses this prose-poetry-prose pattern. Chapters 1 and 2 are prose, and introduce the poetic monologues and dialogues that comprise the essence of the story of Job. The opening verse of each of the intervening chapters is also prose as is the denouement in ch 42:7-17. A slightly longer introductory prose section is in ch 32:1-6a. Job is probably the most ancient book in the Bible and in addition to its biblical message it is highly regarded as a literary masterpiece.
