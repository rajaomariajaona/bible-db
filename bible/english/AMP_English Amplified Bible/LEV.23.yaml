document_id: LEV.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Laws of Religious Festivals
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke again to Moses, saying, '
  '10':
  - type: text
    content: '“Speak to the children of Israel and say to them, ‘When you enter the land which I am giving you and reap its harvest, you shall bring the '
  - type: note
    content: I.e. a tied bundle of stalks of freshly harvested grain.
  - type: text
    content: 'sheaf of the first fruits of your harvest to the priest. '
  '11':
  - type: text
    content: He shall wave the sheaf before the L
  - type: heading
    content: ord
  - type: text
    content: ' so that you may be accepted; the priest shall wave it on the day after the Sabbath. '
  '12':
  - type: text
    content: Now on the day when you wave the sheaf you shall offer a male lamb one year old without blemish as a burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '13':
  - type: text
    content: Its grain offering shall be two-tenths of an ephah of fine flour mixed with [olive] oil, an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ' for a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma, with its drink offering [to be poured out], a fourth of a '
  - type: note
    content: I.e. approx one gal.
  - type: text
    content: 'hin of wine. '
  '14':
  - type: text
    content: You shall not eat any bread or roasted grain or new growth, until this same day when you bring in the offering to your God; it is a permanent statute throughout your generations wherever you may be.
  - type: heading
    content: The Feast of Weeks
  '15':
  - type: text
    content: '‘You shall count from the day after the Sabbath, from the day when you brought in the sheaf (tied bundle of grain) of the wave offering; there shall be seven complete Sabbaths (seven full weeks). '
  '16':
  - type: text
    content: 'You shall count '
  - type: note
    content: This is the origin of the name “Pentecost,” Greek for “fiftieth.”
  - type: text
    content: fifty days to the day after the seventh Sabbath; then you shall present a new grain offering to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'You shall bring in from your places two loaves of bread as a wave offering, made from two-tenths '
  - type: text
    content: of an ephah
  - type: text
    content: ' of fine flour; they shall be baked with leaven as first fruits to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '18':
  - type: text
    content: And you shall offer with the bread seven unblemished lambs, one year old, and one young bull and two rams. They are to be a burnt offering to the L
  - type: heading
    content: ord
  - type: text
    content: ', with their grain offering and their drink offerings. It is an offering by fire, a sweet '
  - type: text
    content: and
  - type: text
    content: ' soothing aroma to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And you shall sacrifice one male goat as a sin offering and two male lambs, one year old as a sacrifice of peace offerings. '
  '2':
  - type: text
    content: “Speak to the children of Israel and say to them, ‘The appointed times (established feasts) of the L
  - type: heading
    content: ord
  - type: text
    content: ' which you shall proclaim as holy convocations—My appointed times are these:'
  - type: heading
    content: The Sabbath
  '20':
  - type: text
    content: The priest shall wave them before the L
  - type: heading
    content: ord
  - type: text
    content: ' as a wave offering, together with the bread of the first fruits and the two lambs. They are to be holy to the L'
  - type: heading
    content: ord
  - type: text
    content: ' for the priest. '
  '21':
  - type: text
    content: On this same day you shall make a proclamation, you are to have a holy convocation (calling together); you shall not do any laborious work [on that day]. It is to be a permanent statute throughout your generations wherever you may be.
  '22':
  - type: text
    content: ‘When you reap the harvest of your land, you shall not reap to the edges of your field, nor gather the gleaning of your harvest; you are to leave them for the poor and for the stranger. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.’ ”'
  - type: heading
    content: The Feast of Trumpets
  '23':
  - type: text
    content: Again the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '24':
  - type: text
    content: '“Say to the children of Israel, ‘On the first day of the seventh month (almost October), you shall observe a day of solemn sabbatical rest, a memorial day announced by the blowing '
  - type: text
    content: of trumpets
  - type: text
    content: ', a holy convocation. '
  '25':
  - type: text
    content: You shall not do any laborious work [on that day], but you shall present an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: .’ ”
  - type: heading
    content: The Day of Atonement
  '26':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '27':
  - type: text
    content: '“Also the tenth day of this seventh month is the Day of Atonement; it shall be a holy convocation for you, and you shall '
  - type: note
    content: See note 16:29.
  - type: text
    content: humble yourselves [by fasting] and present an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '28':
  - type: text
    content: You shall not do any work on this same day, for it is the Day of Atonement, to make atonement on your behalf before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '29':
  - type: text
    content: 'If there is any person who will not humble himself on this same day, he shall be cut off from his people [excluding him from the atonement made for them]. '
  '3':
  - type: text
    content: ‘For six days work may be done, but the seventh day is the Sabbath of complete rest, a holy convocation (calling together). You shall not do any work [on that day]; it is the Sabbath of the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: Lit in all your dwellings and so throughout the chapter.
  - type: text
    content: wherever you may be.
  - type: heading
    content: The Passover and Unleavened Bread
  '30':
  - type: text
    content: 'If there is any person who does any work on this same day, I will destroy that person from among his people. '
  '31':
  - type: text
    content: 'You shall do no work at all [on that day]. It is a permanent statute throughout your generations wherever you may be. '
  '32':
  - type: text
    content: It is to be to you a Sabbath of complete rest, and you shall humble yourselves. On the ninth day of the month at evening, from evening to evening you shall keep your Sabbath.”
  - type: heading
    content: The Feast of Booths
  '33':
  - type: text
    content: Again the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '34':
  - type: text
    content: “Say to the children of Israel, ‘On the fifteenth day of this seventh month, and for seven days, is the Feast of Booths (Tabernacles) to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'The first day is a holy convocation (calling together); you shall not do any laborious work [on that day]. '
  '36':
  - type: text
    content: For seven days you shall present an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: . On the eighth day you shall have a holy convocation and present an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: . It is a festive assembly; you shall not do any laborious work [on that day].
  '37':
  - type: text
    content: ‘These are the appointed times (established feasts) of the L
  - type: heading
    content: ord
  - type: text
    content: ', which you shall proclaim to be holy convocations, to present an offering by fire to the L'
  - type: heading
    content: ord
  - type: text
    content: ', a burnt offering and a grain offering, sacrifices and drink offerings, each on its own day. '
  '38':
  - type: text
    content: This is in addition to the [weekly] Sabbaths of the L
  - type: heading
    content: ord
  - type: text
    content: ', and in addition to your gifts and all your vowed offerings and all your freewill offerings, which you give to the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '39':
  - type: text
    content: ‘On exactly the fifteenth day of the seventh month (nearly October), when you have gathered in the crops of the land, you shall celebrate the feast of the L
  - type: heading
    content: ord
  - type: text
    content: ' for seven days, with a Sabbath rest on the first day and a Sabbath rest on the eighth day. '
  '4':
  - type: text
    content: ‘These are the appointed times of the L
  - type: heading
    content: ord
  - type: text
    content: ', holy convocations which you shall proclaim at their appointed times: '
  '40':
  - type: text
    content: Now on the first day you shall take for yourselves the foliage of beautiful trees, branches of palm trees, and boughs of thick (leafy) trees, and willows of the brook [and make booths of them]; and you shall rejoice before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God for seven days. '
  '41':
  - type: text
    content: You shall celebrate it as a feast to the L
  - type: heading
    content: ord
  - type: text
    content: ' for seven days in the year. It shall be a permanent statute throughout your generations; you shall celebrate it in the seventh month. '
  '42':
  - type: text
    content: 'You shall live in booths (temporary shelters) for seven days; all native-born in Israel shall live in booths, '
  '43':
  - type: text
    content: so that your generations may know that I had the sons of Israel live in booths when I brought them out of the land of Egypt. I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.’ ” '
  '44':
  - type: text
    content: So Moses declared to the Israelites the appointed feasts of the L
  - type: heading
    content: ord
  - type: text
    content: .
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' Passover is on the fourteenth day of the first month '
  - type: note
    content: Lit between the two evenings.
  - type: text
    content: 'at twilight. '
  '6':
  - type: text
    content: The Feast of Unleavened Bread to the L
  - type: heading
    content: ord
  - type: text
    content: ' is on the fifteenth day of the same month; for seven days you shall eat unleavened bread. [1 Cor 5:7, 8] '
  '7':
  - type: text
    content: 'On the first day you shall have a holy convocation (calling together); you shall not do any laborious work [on that day]. '
  '8':
  - type: text
    content: But you shall present an offering by fire to the L
  - type: heading
    content: ord
  - type: text
    content: ' for seven days; on the seventh day there shall be a holy convocation; you shall not do any laborious work [on that day].’ ”'
  - type: heading
    content: The Feast of First Fruits
  '9':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
