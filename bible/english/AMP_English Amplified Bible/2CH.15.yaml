document_id: 2CH.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Prophet Azariah Warns Asa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Spirit of God came on Azariah the son of Oded, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they assembled at Jerusalem in the third month of the fifteenth year of Asa’s reign. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They sacrificed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on that day from the spoil they had brought—700 oxen and 7,000 sheep. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They entered into a covenant (solemn agreement) to seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of their fathers with all their heart and soul; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and that whoever would not seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, was to be put to death, whether young or old, man or woman. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They swore an oath to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with a loud voice, with [jubilant] shouting, with trumpets, and with horns. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All Judah rejoiced over the oath, for they had sworn with all their heart and had sought Him with their whole heart, and He let them find Him. So the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave them rest on every side.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also removed Maacah, King Asa’s mother, from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the position of
    - type: text
      text: ' queen mother, because she had made a repulsive image for [the goddess] Asherah. Asa cut down her idol, crushed it, and burned it at the Brook Kidron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the high places [of pagan worship] were not removed from Israel. Nevertheless Asa’s heart was blameless all his days. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought the things that his father [Abijah] had dedicated and those things that he had dedicated into the house of God—silver and gold and utensils. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there was no war until the thirty-fifth year of Asa’s reign.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he went out to meet Asa and said to him, “Hear me, Asa, and all Judah and Benjamin: the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is with you while you are with Him. If you seek Him [inquiring for and of Him, as your soul’s first necessity], He will let you find Him; but if you abandon (turn away from) Him, He will abandon (turn away from) you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now for a long time Israel was without the true God and without a teaching priest, and without [God’s] law. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they were in their trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distress they turned to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, and [in desperation earnestly] sought Him, and He let them find Him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those times there was no peace for him who went out or for him who came in, for great suffering came on all the inhabitants of the lands. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nation was crushed by nation, and city by city, for God troubled them with every kind of distress. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But as for you, be strong and do not lose courage, for there is reward for your work.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Asa’s Reforms
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when Asa heard these words, the prophecy of Azariah the son of Oded the prophet, he took courage and removed the repulsive idols from all the land of Judah and Benjamin and from the cities which he had captured in the hill country of Ephraim. Then he restored the altar [of burnt offering] of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which was in front of the porch [of the temple] of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He gathered all Judah and Benjamin and the strangers who were with them out of Ephraim, Manasseh, and Simeon, for they came over to Asa from Israel in large numbers when they saw that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God was with him. '
