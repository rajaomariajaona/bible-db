  - type: text
    content: And leans to the border of Moab.”
  '16':
  - type: text
    content: 'From there '
  - type: text
    content: the Israelites went on
  - type: text
    content: ' to Beer, that is the well where the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Gather the people together and I will give them water.” [John 7:37-39]'
  '17':
  - type: text
    content: Then Israel sang this song,
  - type: text
    content: “Spring up, O well! Sing to it, [Rom 14:17]
  '18':
