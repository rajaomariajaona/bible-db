    content: The well which the leaders dug,
  - type: text
    content: Which the nobles of the people hollowed out
  - type: text
    content: With the scepter and with their staffs.”
  - type: text
    content: 'And from the wilderness '
  - type: text
    content: Israel journeyed
  - type: text
    content: ' to Mattanah, '
  '19':
  - type: text
    content: 'and from Mattanah to Nahaliel, and from Nahaliel to Bamoth, '
  '2':
  - type: text
    content: So Israel made a vow to the L
  - type: heading
    content: ord
  - type: text
    content: ', and said, “If You will indeed hand over these people to me, then I will utterly destroy their cities.” '
  '20':
  - type: text
    content: and from Bamoth to the valley that is in the field of Moab, to the top of Pisgah which looks down on the wasteland.
  - type: heading
    content: Two Victories
  '21':
  - type: text
    content: 'Then Israel sent messengers to Sihon, king of the Amorites, saying, '
  '22':
  - type: text
    content: '“Let me pass through your land; we will not turn away [from the road] into field or vineyard; we will not drink the water of the wells. We will go by the king’s highway until we have crossed your border.” '
  '23':
  - type: text
    content: 'But Sihon would not allow Israel to pass through his border. Instead Sihon gathered all his people together and went out against Israel into the wilderness, and came to Jahaz, and he fought against Israel. '
  '24':
  - type: text
    content: 'Then Israel struck the king of the Amorites with the edge of the sword and took possession of his land from the Arnon to the Jabbok, as far as the Ammonites, for the boundary of the Ammonites was '
  - type: note
    content: LXX reads Jazer.
  - type: text
    content: 'strong. '
  '25':
  - type: text
    content: 'Israel took all these cities, and settled in all the cities of the Amorites, in Heshbon and in all its towns. '
  '26':
  - type: text
    content: 'For Heshbon was the city of Sihon, king of the Amorites, who had fought against the former king of Moab and had taken all his land out of his hand, as far as the Arnon. '
  '27':
  - type: text
    content: That is why those who use proverbs say,
  - type: text
    content: “Come to Heshbon,
  - type: text
    content: Let the city of Sihon be built and established.
  '28':
  - type: text
    content: “For fire has gone out of Heshbon,
  - type: text
    content: A flame from the city of Sihon;
  - type: text
    content: It devoured Ar of Moab
  - type: text
    content: And the lords of the heights of the Arnon.
  '29':
  - type: text
    content: “Woe (judgment is coming) to you, Moab!
  - type: text
    content: You are destroyed, O people of [the god] Chemosh!
  - type: text
    content: Moab has given his sons as fugitives [that is, survivors of battle],
  - type: text
    content: And his daughters into captivity
  - type: text
    content: To Sihon king of the Amorites.
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' heard the voice of Israel and handed over the Canaanites; then they utterly destroyed them and their cities. So the name of the place was called Hormah (dedicate to destruction).'
  '30':
  - type: text
    content: “We have shot them down [with arrows];
  - type: text
    content: Heshbon is destroyed as far as Dibon,
  - type: text
    content: And we have laid them waste as far as Nophah,
  - type: text
    content: Which reaches to Medeba.”
  '31':
  - type: text
    content: 'Thus Israel settled in the land of the Amorites. '
  '32':
  - type: text
    content: 'Now Moses sent '
  - type: text
    content: men
  - type: text
    content: ' to spy out Jazer, and they overthrew its villages and dispossessed the Amorites who were there.'
  '33':
  - type: text
    content: 'Then they turned and went up by the way of Bashan; and Og the king of Bashan went out against them, he and all his people, to battle at Edrei. '
  '34':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Do not fear him, for I have handed over him and all his people and his land to you; and you shall do to him just as you did to Sihon king of the Amorites, who lived at Heshbon.” '
  '35':
  - type: text
    content: So the sons of Israel killed Og and his sons and all his people, until there was no survivor left to him; and they took possession of his land.
  '4':
  - type: text
    content: 'Then they set out from Mount Hor by the way of the [branch of the] Red Sea [called the Gulf of Aqabah], to go around the land of Edom; and the people became impatient, because [of the challenges] of the journey. '
  '5':
  - type: text
    content: So the people spoke against God and against Moses, “Why have you brought us out of Egypt to die in the wilderness? For there is no bread, nor is there any water, and we loathe this miserable food.”
  - type: heading
    content: The Bronze Serpent
  '6':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' sent fiery (burning) serpents among the people; and they bit the people, and many Israelites died. '
  '7':
  - type: text
    content: So the people came to Moses, and said, “We have sinned, for we have spoken against the L
  - type: heading
    content: ord
  - type: text
    content: ' and against you; pray to the L'
  - type: heading
    content: ord
  - type: text
    content: ', so that He will remove the serpents from us.” So Moses prayed for the people. '
  '8':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Make a fiery '
  - type: text
    content: serpent
  - type: text
    content: ' [of bronze] and set it on a pole; and everyone who is bitten will live when he looks at it.” '
  '9':
  - type: text
    content: So Moses made a serpent of bronze and put it on the pole, and it happened that if a serpent had bitten any man, when he looked to the bronze serpent, he lived.
