document_id: NUM.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Arad Conquered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the Canaanite, the king of Arad, who lived in the Negev (the South country) heard that Israel was coming by the way of Atharim [the route traveled by the spies sent out by Moses], he fought against Israel and took some of them captive. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So Israel made a vow to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and said, “If You will indeed hand over these people to me, then I will utterly destroy their cities.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard the voice of Israel and handed over the Canaanites; then they utterly destroyed them and their cities. So the name of the place was called Hormah (dedicate to destruction).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then they set out from Mount Hor by the way of the [branch of the] Red Sea [called the Gulf of Aqabah], to go around the land of Edom; and the people became impatient, because [of the challenges] of the journey. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So the people spoke against God and against Moses, “Why have you brought us out of Egypt to die in the wilderness? For there is no bread, nor is there any water, and we loathe this miserable food.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Bronze Serpent
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' sent fiery (burning) serpents among the people; and they bit the people, and many Israelites died. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So the people came to Moses, and said, “We have sinned, for we have spoken against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and against you; pray to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', so that He will remove the serpents from us.” So Moses prayed for the people. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Make a fiery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: serpent
  - type: text
    text: ' [of bronze] and set it on a pole; and everyone who is bitten will live when he looks at it.” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Moses made a serpent of bronze and put it on the pole, and it happened that if a serpent had bitten any man, when he looked to the bronze serpent, he lived.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now the sons of Israel moved out and camped at Oboth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They journeyed on from Oboth and camped at Iye-abarim, in the wilderness facing Moab, toward the sunrise. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'From there they set out and camped in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The dry river valley carved by the seasonal Zered River.
    marker-yv: yv-n
  - type: text
    text: 'Wadi Zered. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'From there they journeyed on and camped on the other side of [the river] Arnon, which is in the wilderness that extends from the boundary of the Amorites; for [the river] Arnon is the boundary of Moab, between Moab and the Amorites. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'That is why it is said in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A non-canonical work which, unfortunately, has been lost.
    marker-yv: yv-n
  - type: text
    text: Book of the Wars of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly a well that is the source of the Arnon river.
    marker-yv: yv-n
  - type: text
    text: 'Waheb in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probably a place in Moab. However some of the rabbis took '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Suphah
      - type: text
        text: ' to be a reference to the Red Sea ('
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yam Suph
      - type: text
        text: ' in Hebrew) and maintained that these words imply God performed miracles for Israel in the valleys of Arnon such as He did at the Red Sea.'
    marker-yv: yv-n
  - type: text
    text: Suphah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dry valleys of seasonal rivers.
    marker-yv: yv-n
  - type: text
    text: wadis of the Arnon [River],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And the slope of the wadis
- type: usfm
  marker: q1
  children:
  - type: text
    text: That stretches toward the site of Ar
- type: usfm
  marker: q1
  children:
  - type: text
    text: And leans to the border of Moab.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'From there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Israelites went on
  - type: text
    text: ' to Beer, that is the well where the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Gather the people together and I will give them water.” [John 7:37-39]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then Israel sang this song,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Spring up, O well! Sing to it, [Rom 14:17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The well which the leaders dug,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which the nobles of the people hollowed out
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the scepter and with their staffs.”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And from the wilderness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel journeyed
  - type: text
    text: ' to Mattanah, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and from Mattanah to Nahaliel, and from Nahaliel to Bamoth, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: and from Bamoth to the valley that is in the field of Moab, to the top of Pisgah which looks down on the wasteland.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Two Victories
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Israel sent messengers to Sihon, king of the Amorites, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Let me pass through your land; we will not turn away [from the road] into field or vineyard; we will not drink the water of the wells. We will go by the king’s highway until we have crossed your border.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But Sihon would not allow Israel to pass through his border. Instead Sihon gathered all his people together and went out against Israel into the wilderness, and came to Jahaz, and he fought against Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Israel struck the king of the Amorites with the edge of the sword and took possession of his land from the Arnon to the Jabbok, as far as the Ammonites, for the boundary of the Ammonites was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'LXX reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jazer
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'strong. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Israel took all these cities, and settled in all the cities of the Amorites, in Heshbon and in all its towns. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For Heshbon was the city of Sihon, king of the Amorites, who had fought against the former king of Moab and had taken all his land out of his hand, as far as the Arnon. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: That is why those who use proverbs say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come to Heshbon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the city of Sihon be built and established.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “For fire has gone out of Heshbon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A flame from the city of Sihon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It devoured Ar of Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the lords of the heights of the Arnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Woe (judgment is coming) to you, Moab!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are destroyed, O people of [the god] Chemosh!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab has given his sons as fugitives [that is, survivors of battle],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his daughters into captivity
- type: usfm
  marker: q1
  children:
  - type: text
    text: To Sihon king of the Amorites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “We have shot them down [with arrows];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heshbon is destroyed as far as Dibon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And we have laid them waste as far as Nophah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which reaches to Medeba.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Thus Israel settled in the land of the Amorites. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now Moses sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' to spy out Jazer, and they overthrew its villages and dispossessed the Amorites who were there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then they turned and went up by the way of Bashan; and Og the king of Bashan went out against them, he and all his people, to battle at Edrei. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Do not fear him, for I have handed over him and all his people and his land to you; and you shall do to him just as you did to Sihon king of the Amorites, who lived at Heshbon.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: So the sons of Israel killed Og and his sons and all his people, until there was no survivor left to him; and they took possession of his land.
