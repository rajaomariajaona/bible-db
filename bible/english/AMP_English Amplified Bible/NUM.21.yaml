document_id: NUM.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Arad Conquered
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Canaanite, the king of Arad, who lived in the Negev (the South country) heard that Israel was coming by the way of Atharim [the route traveled by the spies sent out by Moses], he fought against Israel and took some of them captive. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the sons of Israel moved out and camped at Oboth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They journeyed on from Oboth and camped at Iye-abarim, in the wilderness facing Moab, toward the sunrise. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there they set out and camped in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The dry river valley carved by the seasonal Zered River.
      marker-yv: yv-n
    - type: text
      text: 'Wadi Zered. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there they journeyed on and camped on the other side of [the river] Arnon, which is in the wilderness that extends from the boundary of the Amorites; for [the river] Arnon is the boundary of Moab, between Moab and the Amorites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is why it is said in the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A non-canonical work which, unfortunately, has been lost.
      marker-yv: yv-n
    - type: text
      text: Book of the Wars of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly a well that is the source of the Arnon river.
      marker-yv: yv-n
    - type: text
      text: 'Waheb in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probably a place in Moab. However some of the rabbis took '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Suphah
        - type: text
          text: ' to be a reference to the Red Sea ('
        - type: usfm
          marker: it
          children:
          - type: text
            text: Yam Suph
        - type: text
          text: ' in Hebrew) and maintained that these words imply God performed miracles for Israel in the valleys of Arnon such as He did at the Red Sea.'
      marker-yv: yv-n
    - type: text
      text: Suphah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dry valleys of seasonal rivers.
      marker-yv: yv-n
    - type: text
      text: wadis of the Arnon [River],
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the slope of the wadis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That stretches toward the site of Ar
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And leans to the border of Moab.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Israelites went on
    - type: text
      text: ' to Beer, that is the well where the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Gather the people together and I will give them water.” [John 7:37-39]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Israel sang this song,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Spring up, O well! Sing to it, [Rom 14:17]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The well which the leaders dug,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which the nobles of the people hollowed out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the scepter and with their staffs.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And from the wilderness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel journeyed
    - type: text
      text: ' to Mattanah, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'and from Mattanah to Nahaliel, and from Nahaliel to Bamoth, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Israel made a vow to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and said, “If You will indeed hand over these people to me, then I will utterly destroy their cities.” '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and from Bamoth to the valley that is in the field of Moab, to the top of Pisgah which looks down on the wasteland.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Two Victories
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Israel sent messengers to Sihon, king of the Amorites, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Let me pass through your land; we will not turn away [from the road] into field or vineyard; we will not drink the water of the wells. We will go by the king’s highway until we have crossed your border.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Sihon would not allow Israel to pass through his border. Instead Sihon gathered all his people together and went out against Israel into the wilderness, and came to Jahaz, and he fought against Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Israel struck the king of the Amorites with the edge of the sword and took possession of his land from the Arnon to the Jabbok, as far as the Ammonites, for the boundary of the Ammonites was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'LXX reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Jazer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'strong. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israel took all these cities, and settled in all the cities of the Amorites, in Heshbon and in all its towns. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Heshbon was the city of Sihon, king of the Amorites, who had fought against the former king of Moab and had taken all his land out of his hand, as far as the Arnon. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why those who use proverbs say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come to Heshbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the city of Sihon be built and established.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For fire has gone out of Heshbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A flame from the city of Sihon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It devoured Ar of Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the lords of the heights of the Arnon.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe (judgment is coming) to you, Moab!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are destroyed, O people of [the god] Chemosh!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab has given his sons as fugitives [that is, survivors of battle],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his daughters into captivity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Sihon king of the Amorites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' heard the voice of Israel and handed over the Canaanites; then they utterly destroyed them and their cities. So the name of the place was called Hormah (dedicate to destruction).'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We have shot them down [with arrows];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heshbon is destroyed as far as Dibon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And we have laid them waste as far as Nophah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which reaches to Medeba.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Israel settled in the land of the Amorites. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Moses sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' to spy out Jazer, and they overthrew its villages and dispossessed the Amorites who were there.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they turned and went up by the way of Bashan; and Og the king of Bashan went out against them, he and all his people, to battle at Edrei. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Do not fear him, for I have handed over him and all his people and his land to you; and you shall do to him just as you did to Sihon king of the Amorites, who lived at Heshbon.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the sons of Israel killed Og and his sons and all his people, until there was no survivor left to him; and they took possession of his land.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they set out from Mount Hor by the way of the [branch of the] Red Sea [called the Gulf of Aqabah], to go around the land of Edom; and the people became impatient, because [of the challenges] of the journey. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the people spoke against God and against Moses, “Why have you brought us out of Egypt to die in the wilderness? For there is no bread, nor is there any water, and we loathe this miserable food.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Bronze Serpent
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent fiery (burning) serpents among the people; and they bit the people, and many Israelites died. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So the people came to Moses, and said, “We have sinned, for we have spoken against the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and against you; pray to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', so that He will remove the serpents from us.” So Moses prayed for the people. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Make a fiery '
    - type: usfm
      marker: it
      children:
      - type: text
        text: serpent
    - type: text
      text: ' [of bronze] and set it on a pole; and everyone who is bitten will live when he looks at it.” '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So Moses made a serpent of bronze and put it on the pole, and it happened that if a serpent had bitten any man, when he looked to the bronze serpent, he lived.
