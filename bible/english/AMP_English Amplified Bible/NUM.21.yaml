  '1':
  - type: heading
    content: Arad Conquered
  - type: text
    content: 'When the Canaanite, the king of Arad, who lived in the Negev (the South country) heard that Israel was coming by the way of Atharim [the route traveled by the spies sent out by Moses], he fought against Israel and took some of them captive. '
  '10':
  - type: text
    content: 'Now the sons of Israel moved out and camped at Oboth. '
  '11':
  - type: text
    content: 'They journeyed on from Oboth and camped at Iye-abarim, in the wilderness facing Moab, toward the sunrise. '
  '12':
  - type: text
    content: 'From there they set out and camped in the '
  - type: note
    content: The dry river valley carved by the seasonal Zered River.
  - type: text
    content: 'Wadi Zered. '
  '13':
  - type: text
    content: 'From there they journeyed on and camped on the other side of [the river] Arnon, which is in the wilderness that extends from the boundary of the Amorites; for [the river] Arnon is the boundary of Moab, between Moab and the Amorites. '
  '14':
  - type: text
    content: 'That is why it is said in the '
  - type: note
    content: A non-canonical work which, unfortunately, has been lost.
