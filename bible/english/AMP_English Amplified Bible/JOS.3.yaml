document_id: JOS.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Crosses the Jordan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joshua got up early in the morning; then he and all the children of Israel set out from Shittim and came to the Jordan, and they spent the night there before they crossed [the river]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And it happened at the end of three days that the officers went throughout the camp, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and they commanded the people, “When you see the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God being carried by the Levitical priests, then you shall set out from where you are and follow it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'However, there shall be a distance between you and it of about 2,000 cubits (3,000 ft.) by measurement. Do not come near it, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication is that coming too close to the ark would invite the divine punishment of death, and that the people can only follow the ark if they keep a safe distance.
    marker-yv: yv-n
  - type: text
    text: so that you may [be able to see the ark and] know the way you are to go, for you have not passed this way before.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then Joshua said to the people, “Sanctify yourselves [for His purpose], for tomorrow the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will do wonders (miracles) among you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Joshua said to the priests, “Take up the ark of the covenant and cross over [the river] ahead of the people.” So they took up the ark of the covenant and went on ahead of the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Joshua, “This day I will begin to magnify '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exalt you in the sight of all Israel, so that they may know that just as I was with Moses, I will [also] be with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You shall command the priests who carry the ark of the covenant, saying, ‘When you come to the edge of the waters of the Jordan, you shall stand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: still
  - type: text
    text: ' in the Jordan.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Joshua said to the Israelites, “Come here, and listen to the words of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Joshua said, “By this you shall know that the living God is among you, and that He will, without fail, drive out from before you the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The various tribal groups populating the land of Canaan were the descendants of Canaan, the youngest son of Ham, the son of Noah. Gen 10:15-19.
    marker-yv: yv-n
  - type: text
    text: 'Canaanite, the Hittite, the Hivite, the Perizzite, the Girgashite, the Amorite, and the Jebusite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Behold, the ark of the covenant of the Lord of all the earth is crossing over ahead of you [leading the way] into the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So now take for yourselves twelve men from the tribes of Israel, one man from each tribe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When the soles of the feet of the priests who carry the ark of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the Lord of all the earth, [come to] rest in the waters of the Jordan, the waters of the Jordan flowing down from above will be cut off, and they will stand in one mass [of water].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So when the people set out from their tents to cross over the Jordan with the priests who were carrying the ark of the covenant before the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and when those who were carrying the ark came up to the Jordan, and the feet of the priests carrying the ark were submerged at the edge of the water (for the Jordan overflows all of its banks throughout the time of harvest), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the waters which were flowing down from above stopped and rose up in one mass a great distance away at '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The city of Adam was located about sixteen miles up the river from Jericho.
    marker-yv: yv-n
  - type: text
    text: 'Adam, the city that is beside Zarethan. Those [waters] flowing downward toward the sea of the Arabah, the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. Dead Sea.
    marker-yv: yv-n
  - type: text
    text: 'Salt Sea, were completely cut off. So the people crossed [the river] opposite Jericho. [Ps 114] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And while all [the people of] Israel crossed over on dry ground, the priests who carried the ark of the covenant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' stood firm on dry ground in the midst of the Jordan [riverbed], until all the nation had finished crossing over the Jordan.'
