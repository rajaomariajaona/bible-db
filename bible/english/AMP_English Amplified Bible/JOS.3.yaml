document_id: JOS.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Crosses the Jordan
  - type: text
    content: 'Joshua got up early in the morning; then he and all the children of Israel set out from Shittim and came to the Jordan, and they spent the night there before they crossed [the river]. '
  '10':
  - type: text
    content: 'Joshua said, “By this you shall know that the living God is among you, and that He will, without fail, drive out from before you the '
  - type: note
    content: The various tribal groups populating the land of Canaan were the descendants of Canaan, the youngest son of Ham, the son of Noah. Gen 10:15-19.
  - type: text
    content: 'Canaanite, the Hittite, the Hivite, the Perizzite, the Girgashite, the Amorite, and the Jebusite. '
  '11':
  - type: text
    content: 'Behold, the ark of the covenant of the Lord of all the earth is crossing over ahead of you [leading the way] into the Jordan. '
  '12':
  - type: text
    content: 'So now take for yourselves twelve men from the tribes of Israel, one man from each tribe. '
  '13':
  - type: text
    content: When the soles of the feet of the priests who carry the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ', the Lord of all the earth, [come to] rest in the waters of the Jordan, the waters of the Jordan flowing down from above will be cut off, and they will stand in one mass [of water].”'
  '14':
  - type: text
    content: 'So when the people set out from their tents to cross over the Jordan with the priests who were carrying the ark of the covenant before the people, '
  '15':
  - type: text
    content: 'and when those who were carrying the ark came up to the Jordan, and the feet of the priests carrying the ark were submerged at the edge of the water (for the Jordan overflows all of its banks throughout the time of harvest), '
  '16':
  - type: text
    content: 'the waters which were flowing down from above stopped and rose up in one mass a great distance away at '
  - type: note
    content: The city of Adam was located about sixteen miles up the river from Jericho.
  - type: text
    content: 'Adam, the city that is beside Zarethan. Those [waters] flowing downward toward the sea of the Arabah, the '
  - type: note
    content: I.e. Dead Sea.
  - type: text
    content: 'Salt Sea, were completely cut off. So the people crossed [the river] opposite Jericho. [Ps 114] '
  '17':
  - type: text
    content: And while all [the people of] Israel crossed over on dry ground, the priests who carried the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' stood firm on dry ground in the midst of the Jordan [riverbed], until all the nation had finished crossing over the Jordan.'
  '2':
  - type: text
    content: 'And it happened at the end of three days that the officers went throughout the camp, '
  '3':
  - type: text
    content: and they commanded the people, “When you see the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God being carried by the Levitical priests, then you shall set out from where you are and follow it. '
  '4':
  - type: text
    content: 'However, there shall be a distance between you and it of about 2,000 cubits (3,000 ft.) by measurement. Do not come near it, '
  - type: note
    content: The implication is that coming too close to the ark would invite the divine punishment of death, and that the people can only follow the ark if they keep a safe distance.
  - type: text
    content: so that you may [be able to see the ark and] know the way you are to go, for you have not passed this way before.”
  '5':
  - type: text
    content: Then Joshua said to the people, “Sanctify yourselves [for His purpose], for tomorrow the L
  - type: heading
    content: ord
  - type: text
    content: ' will do wonders (miracles) among you.” '
  '6':
  - type: text
    content: Joshua said to the priests, “Take up the ark of the covenant and cross over [the river] ahead of the people.” So they took up the ark of the covenant and went on ahead of the people.
  '7':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, “This day I will begin to magnify '
  - type: text
    content: and
  - type: text
    content: ' exalt you in the sight of all Israel, so that they may know that just as I was with Moses, I will [also] be with you. '
  '8':
  - type: text
    content: 'You shall command the priests who carry the ark of the covenant, saying, ‘When you come to the edge of the waters of the Jordan, you shall stand '
  - type: text
    content: still
  - type: text
    content: ' in the Jordan.’ ” '
  '9':
  - type: text
    content: Joshua said to the Israelites, “Come here, and listen to the words of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.” '
