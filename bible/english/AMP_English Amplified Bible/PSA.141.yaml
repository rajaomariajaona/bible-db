verses:
  '1':
  - type: heading
    content: Psalm 141
  - type: heading
    content: An Evening Prayer for Sanctification and Protection.
  - type: text
    content: A Psalm of David.
  - type: text
    content: L
  - type: heading
    content: ord
  - type: text
    content: ', I call upon You; hurry to me.'
  - type: text
    content: Listen to my voice when I call to You.
  '10':
  - type: text
    content: Let the wicked fall into their own nets,
  - type: text
    content: 'While I pass by '
  - type: text
    content: and
  - type: text
    content: ' safely escape [from danger].'
  '2':
  - type: text
    content: Let my prayer be counted as incense before You;
  - type: text
    content: The lifting up of my hands as the evening offering. [1 Tim 2:8; Rev 8:3, 4]
  '3':
  - type: text
    content: Set a guard, O L
  - type: heading
    content: ord
  - type: text
    content: ', over my mouth;'
  - type: text
    content: Keep watch over the door of my lips [to keep me from speaking thoughtlessly].
  '4':
  - type: text
    content: Do not incline my heart to [consent to or tolerate] any evil thing,
  - type: text
    content: Or to practice deeds of wickedness
  - type: text
    content: 'With men who plan '
  - type: text
    content: and
  - type: text
    content: ' do evil;'
  - type: text
    content: And let me not eat of their delicacies (be tempted by their gain).
  '5':
  - type: text
    content: ¶Let the righteous [thoughtfully] strike (correct) me—it is a kindness [done to encourage my spiritual maturity].
  - type: text
    content: It is [the choicest anointing] oil on the head;
  - type: text
    content: Let my head not refuse [to accept and acknowledge and learn from] it;
  - type: text
    content: For still my prayer is against their wicked deeds. [Prov 9:8; 19:25; 25:12; Gal 6:1]
  '6':
  - type: text
    content: Their [wicked, godless] judges are thrown down the sides of the rocky cliff,
  - type: text
    content: And they [who followed them] will hear my words, for they are pleasant (just).
  '7':
  - type: text
    content: As when the one plows and breaks open the ground [and the soil scatters behind him],
  - type: text
    content: Our bones have been scattered at the mouth of Sheol [by the injustices of the wicked]. [2 Cor 1:9]
  '8':
  - type: text
    content: ¶For my eyes are toward You, O G
  - type: heading
    content: od
  - type: text
    content: ', the Lord;'
  - type: text
    content: 'In You I take refuge; do not pour out my life '
  - type: text
    content: nor
  - type: text
    content: ' leave me defenseless.'
  '9':
  - type: text
    content: Keep me from the jaws of the trap which they have set for me,
  - type: text
    content: And from the snares of those who do evil.
