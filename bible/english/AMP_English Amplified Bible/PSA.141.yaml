document_id: PSA.141
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 141
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: An Evening Prayer for Sanctification and Protection.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I call upon You; hurry to me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to my voice when I call to You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let my prayer be counted as incense before You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lifting up of my hands as the evening offering. [1 Tim 2:8; Rev 8:3, 4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Set a guard, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', over my mouth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep watch over the door of my lips [to keep me from speaking thoughtlessly].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Do not incline my heart to [consent to or tolerate] any evil thing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or to practice deeds of wickedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With men who plan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' do evil;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let me not eat of their delicacies (be tempted by their gain).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Let the righteous [thoughtfully] strike (correct) me—it is a kindness [done to encourage my spiritual maturity].
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is [the choicest anointing] oil on the head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let my head not refuse [to accept and acknowledge and learn from] it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For still my prayer is against their wicked deeds. [Prov 9:8; 19:25; 25:12; Gal 6:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Their [wicked, godless] judges are thrown down the sides of the rocky cliff,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they [who followed them] will hear my words, for they are pleasant (just).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As when the one plows and breaks open the ground [and the soil scatters behind him],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our bones have been scattered at the mouth of Sheol [by the injustices of the wicked]. [2 Cor 1:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶For my eyes are toward You, O G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', the Lord;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In You I take refuge; do not pour out my life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor
  - type: text
    text: ' leave me defenseless.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Keep me from the jaws of the trap which they have set for me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the snares of those who do evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let the wicked fall into their own nets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'While I pass by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' safely escape [from danger].'
