  - type: note
    content: Chemosh was the national god revered by the Moabites. Burning children as a sacrifice was part of the ritualistic worship. Solomon, in response to requests from his Moabite wives, established an altar to Chemosh on a hill east of Jerusalem (1 Kin 11:7). This repulsive idol remained in place for nearly three hundred years.
