  - type: note
    content: Nebuchadnezzar (605-562 b.c.) subjugated the Moabites, but they continued to exist as a people into the first century a.d. (though the national existence of both Moab and Ammon seems to have ended long before the time of Christ). This in itself is a remarkable fulfillment of prophecy; but the fact that Moab’s fortunes are to be restored “in the latter days” (v 47) and have proceeded toward that end is even more amazing. Yet Moab is only one of the numerous nations whose fate was accurately written down in advance by the ancient prophets of God.
