document_id: JER.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy against Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Concerning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Moabites were descendants of Lot through his elder daughter. Chemosh was the primary god of the territory of Moab. The territory of Moab was located east of the Dead Sea.
    marker-yv: yv-n
  - type: text
    text: Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Woe (judgment is coming) to [the city of] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The towns of Nebo and Kiriathaim were located in the rich pasturelands allotted to the tribe of Reuben. Their exact location, as well as that of the other towns mentioned, is uncertain.
    marker-yv: yv-n
  - type: text
    text: Nebo, for it has been destroyed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kiriathaim has been shamed, it has been captured;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Misgab [the high fortress] has been shamed, broken down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' crushed. [Is 15-16; 25:10-12; Ezek 25:8-11; Amos 2:1-3; Zeph 2:8-11]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “The glory of Moab is no more;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A border town between territories of Reuben and Gad, east of the Jordan River.
    marker-yv: yv-n
  - type: text
    text: Heshbon they planned evil against her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘Come, let us cut her off from being a nation!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: You also, O [city of] Madmen, shall be silenced;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sword will pursue you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “The sound of an outcry from Horonaim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Desolation and great destruction!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Moab is destroyed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Her little ones have called out a cry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of distress
  - type: text
    text: ' [to be heard as far as Zoar].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “For the Ascent of Luhith
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be climbed by [successive groups of] fugitives with continual weeping;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For on the descent of Horonaim
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have heard the distress of the cry of destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Run! Save your lives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you may be like a juniper in the wilderness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “For because you have trusted in your works [your hand-made idols] and in your treasures [instead of in God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even you yourself will be captured;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chemosh was the national god revered by the Moabites. Burning children as a sacrifice was part of the ritualistic worship. Solomon, in response to requests from his Moabite wives, established an altar to Chemosh on a hill east of Jerusalem (1 Kin 11:7). This repulsive idol remained in place for nearly three hundred years.
    marker-yv: yv-n
  - type: text
    text: Chemosh [your disgusting god cannot rescue you, but] will go away into exile [along with the fugitives]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Together with his priests and his princes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “And the destroyer will come upon every city;
- type: usfm
  marker: q1
  children:
  - type: text
    text: No city will escape.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The [Jordan] valley also will be ruined
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the plain will be devastated,
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Give a gravestone to Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For she will fall into ruins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her cities (pastures, farms) will be desolate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Without anyone to live in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Cursed is the one who does the work of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' negligently,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cursed is the one who restrains his sword from blood [in executing the judgment of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶“Moab has been at ease from his youth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has also been undisturbed, and settled like wine on his dregs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he has not been emptied from one vessel to another,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor has he gone into exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore his flavor remains in him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his scent has not changed.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Therefore behold, the days are coming,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “when I will send to Moab those who will tip him over and who will empty his vessels and break his [earthenware] jars in pieces. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And Moab shall be ashamed of Chemosh [his worthless, disgusting god], as the house of Israel was ashamed of Bethel, their [misplaced] confidence. [1 Kin 12:28, 29]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “How can you say, ‘We are great warriors
- type: usfm
  marker: q1
  children:
  - type: text
    text: And valiant men in war?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Moab has been made desolate and his cities have gone up [in smoke and flame];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his chosen young men have gone down to the slaughter,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the King, whose name is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “The destruction of Moab will come soon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his disaster hurries quickly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Show sympathy for him, all you [nations] who are around him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all you [distant nations] who know his name;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Say, ‘How has the mighty scepter [of national power] been broken,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the splendid staff [of glory]!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Come down from your glory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O Daughter living in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dibon, known today as Dhiban, stands on two hills. The famous Moabite Stone, a stela of black basalt, was found among the ruins of Dibon in 1868, and had been inscribed in 850 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . to commemorate certain accomplishments of King Mesha of Moab, including a victory in his revolt against Israel. Also recorded on the Moabite Stone was the fact that King Mesha built (or restored) the city of Aroer and made the road over the Arnon. The city of Aroer mentioned in this chapter (v 19) stood on the north side of the river Arnon (v 20), just south of Dibon. The inscriptions on the stone are written in a Phoenician dialect similar to an early form of the Hebrew language.
    marker-yv: yv-n
  - type: text
    text: Dibon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And sit on the parched ground [among the thirsty]!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the destroyer of Moab has advanced against you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has destroyed your strongholds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “O inhabitant of Aroer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stand by the road and keep watch!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ask [of] him who flees and [ask of] her who escapes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, ‘What has happened?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Moab is shamed, for she has been broken down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shattered.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wail and cry out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell by [the banks of] the Arnon
- type: usfm
  marker: q1
  children:
  - type: text
    text: That Moab has been destroyed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Judgment has come on [the land of] the plain—upon Holon, Jahzah, and against Mephaath, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'against Dibon, Nebo, and Beth-diblathaim, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'against Kiriathaim, Beth-gamul, and Beth-meon, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'against Kerioth, Bozrah and all the cities of the land of Moab, far and near. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The horn (strength) of Moab has been cut off and his arm [of authority] is shattered,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“Make him drunk, for he has become arrogant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnified himself against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [by denying Reuben’s occupation of the land the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had assigned him]. Moab also will wallow in his vomit, and he too shall become a laughingstock. [Num 22:1-7] '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For was not Israel a laughingstock to you? Was he caught among thieves? For whenever you speak of him you shake '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your head in scorn
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “You inhabitants of Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leave the cities and live among the rocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And be like the dove that makes her nest
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the walls of the yawning ravine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “We have heard of the [giddy] pride of Moab, the extremely proud one—
- type: usfm
  marker: q1
  children:
  - type: text
    text: His haughtiness, his arrogance, his conceit, and his self-exaltation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “I know his [insolent] wrath,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “But it is futile;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His idle boasts [in his deeds] have accomplished nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Therefore I will wail over Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will cry out for all Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will sigh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mourn over the men of Kir-heres (Kir-hareseth). [Is 15:1; 16:7, 11]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “O vines of Sibmah, I will weep for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: More than the weeping of Jazer [over its ruins and wasted vineyards].
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your tendrils [of influence] stretched across the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reaching [even] to the sea of Jazer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The destroyer has fallen
- type: usfm
  marker: q1
  children:
  - type: text
    text: On your summer fruits and your [season’s] crop of grapes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “So joy and gladness are taken away
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the fruitful field and from the land of Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I have made the wine cease from the wine presses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No one treads '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the grapes
  - type: text
    text: ' with shouting.'
- type: usfm
  marker: q1
  children:
  - type: text
