  - type: note
    content: Dibon, known today as Dhiban, stands on two hills. The famous Moabite Stone, a stela of black basalt, was found among the ruins of Dibon in 1868, and had been inscribed in 850 b.c. to commemorate certain accomplishments of King Mesha of Moab, including a victory in his revolt against Israel. Also recorded on the Moabite Stone was the fact that King Mesha built (or restored) the city of Aroer and made the road over the Arnon. The city of Aroer mentioned in this chapter (v 19) stood on the north side of the river Arnon (v 20), just south of Dibon. The inscriptions on the stone are written in a Phoenician dialect similar to an early form of the Hebrew language.
