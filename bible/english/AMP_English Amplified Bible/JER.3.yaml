  - type: heading
    content: Faithless Israel
  '6':
  - type: text
    content: Moreover, the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me in the days of Josiah the king [of Judah], “Have you seen what that faithless Israel has done—how she went up on every high hill and under every green tree, and there she was a prostitute? '
  '7':
  - type: text
    content: 'I thought, ‘After she has done all these things she will return to Me’; but she did not return, and her treacherous (faithless) sister Judah saw it. '
  '8':
  - type: text
    content: And I saw [that even though Judah knew] that for all the acts of adultery (idolatry) of faithless Israel, I [the L
  - type: heading
    content: ord
  - type: text
    content: '] had '
  - type: note
    content: Israel (the ten tribes of the Northern Kingdom) was destroyed by Assyria in 722 b.c.
  - type: text
    content: 'sent her away and given her a certificate of divorce, yet her treacherous sister '
  - type: note
    content: Judah (the Southern Kingdom, the tribes of Judah and Benjamin) was destroyed by the Babylonian Empire in 586 b.c.
  - type: text
    content: 'Judah was not afraid; but she went and was a prostitute also [following after idols]. '
  '9':
  - type: text
    content: 'Because of the thoughtlessness of Israel’s prostitution [her immorality mattered little to her], she desecrated the land and committed adultery with [idols of] stones and trees. '
