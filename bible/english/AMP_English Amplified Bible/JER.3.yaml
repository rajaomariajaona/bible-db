  - type: usfm
    marker: q1
    children:
    - type: text
      text: And not turn away from following Me.’
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Lift up your eyes to the barren heights and see;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where have you not been violated?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sat by the road waiting [eagerly] for them [those man-made gods]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an Arab [tribesman who waits to attack] in the desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you have desecrated the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your [vile] prostitution and your wickedness (disobedience to God).
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
