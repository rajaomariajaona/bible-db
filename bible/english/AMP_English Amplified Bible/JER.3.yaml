  '18':
  - type: text
    content: 'In those days the house of Judah will walk with the house of Israel, and '
  - type: note
    content: The kingdom divided when King Solomon’s son Rehoboam came to the throne. The ten northern tribes rejected him, rebelled against the Davidic line and chose Jeroboam as their king.
  - type: text
