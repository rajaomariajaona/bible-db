  - type: heading
    content: A Call to Praise the Lord for His Righteousness.
  - type: text
    content: 'A '
  - type: note
    content: The ancient rabbis called this song “orphaned” because it is anonymous and has no description with the word “Psalm” (e.g. “A Psalm of Thanksgiving”).
  - type: text
    content: Psalm.
  - type: text
    content: O sing to the L
  - type: heading
    content: ord
  - type: text
    content: ' a new song,'
  - type: text
    content: 'For He has done marvelous '
  - type: text
    content: and
  - type: text
    content: ' wonderful things;'
  - type: text
    content: 'His right hand and His holy arm have '
  - type: note
    content: Or accomplished salvation.
  - type: text
    content: gained the victory for Him.
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has made known His salvation;'
  - type: text
    content: He has [openly] revealed His righteousness in the sight of the nations. [Luke 2:30, 31]
  '3':
  - type: text
    content: He has [graciously] remembered His lovingkindness and His faithfulness to the house of Israel;
  - type: text
    content: All the ends of the earth have witnessed the salvation of our God. [Acts 13:47; 28:28]
