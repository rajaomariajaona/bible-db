document_id: PSA.98,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 98
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Call to Praise the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' for His Righteousness.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '98:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ancient rabbis called this song “orphaned” because it is anonymous and has no description with the word “Psalm” (e.g. “A Psalm of Thanksgiving”).
      marker-yv: yv-n
    - type: text
      text: Psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O sing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' a new song,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He has done marvelous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wonderful things;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His right hand and His holy arm have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '98:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: accomplished salvation
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: gained the victory for Him.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has made known His salvation;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has [openly] revealed His righteousness in the sight of the nations. [Luke 2:30, 31]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has [graciously] remembered His lovingkindness and His faithfulness to the house of Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the ends of the earth have witnessed the salvation of our God. [Acts 13:47; 28:28]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Shout joyfully to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', all the earth;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout [in jubilation] and sing for joy and sing praises.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing praises to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with the lyre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the lyre and the sound of melody.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With trumpets and the sound of the horn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout with joy before the King, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Let the sea thunder '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' roar, and all the things it contains,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The world and those who dwell in it.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the rivers clap their hands;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the mountains sing together for joy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for He is coming to judge the earth;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will judge the world with righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the peoples with fairness.
