document_id: JER.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Baskets of Figs and the Returnees
  - type: text
    content: After Nebuchadnezzar king of Babylon had taken Jeconiah [who was also called Coniah and Jehoiachin] the son of Jehoiakim, king of Judah, and the princes of Judah [along] with the craftsmen and smiths into exile from Jerusalem to Babylon, the L
  - type: heading
    content: ord
  - type: text
    content: ' showed me [in a vision] two baskets of figs set before the temple of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '10':
  - type: text
    content: I will send the sword, famine and virulent disease among them until they are consumed from the land which I gave to them and to their fathers.’ ”
  '2':
  - type: text
    content: 'One basket had very good figs, like the figs that are the first to ripen; but the other basket had very bad figs, so rotten that they could not be eaten. '
  '3':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “What do you see, Jeremiah?” And I said, “Figs, the good figs, very good; and the bad '
  - type: text
    content: figs,
  - type: text
    content: ' very bad, so rotten that they cannot be eaten.”'
  '4':
  - type: text
    content: Again the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '5':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, ‘Like these good figs, so I will regard as good the captives of Judah, whom I have sent from this place into the land of the Chaldeans. '
  '6':
  - type: text
    content: 'For I will set My eyes on them for good, and I will bring them again to this land; and I will build them up and not overwhelm them, and I will plant them and not uproot them. '
  '7':
  - type: text
    content: I will give them a heart to know Me, [understanding fully] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ; and they will be My people, and I will be their God, for they will return to Me with their whole heart.
  '8':
  - type: text
    content: ‘And as for the bad figs, which are so rotten that they cannot be eaten,’ surely thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘so I will abandon Zedekiah king of Judah and his princes, and the remnant of Jerusalem who remain in this land and those who live in the land of Egypt. '
  '9':
  - type: text
    content: 'I will make them a focus of ridicule '
  - type: text
    content: and
  - type: text
    content: ' disappointment [tossed back and forth] among all the kingdoms of the earth, a [notorious] disgrace, a byword, a taunt and a curse in all places where I will scatter them. '
