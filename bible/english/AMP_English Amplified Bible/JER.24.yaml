document_id: JER.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Baskets of Figs and the Returnees
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After Nebuchadnezzar king of Babylon had taken Jeconiah [who was also called Coniah and Jehoiachin] the son of Jehoiakim, king of Judah, and the princes of Judah [along] with the craftsmen and smiths into exile from Jerusalem to Babylon, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' showed me [in a vision] two baskets of figs set before the temple of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One basket had very good figs, like the figs that are the first to ripen; but the other basket had very bad figs, so rotten that they could not be eaten. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, “What do you see, Jeremiah?” And I said, “Figs, the good figs, very good; and the bad '
  - type: usfm
    marker: it
    children:
    - type: text
      text: figs,
  - type: text
    text: ' very bad, so rotten that they cannot be eaten.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Again the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, ‘Like these good figs, so I will regard as good the captives of Judah, whom I have sent from this place into the land of the Chaldeans. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For I will set My eyes on them for good, and I will bring them again to this land; and I will build them up and not overwhelm them, and I will plant them and not uproot them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will give them a heart to know Me, [understanding fully] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and they will be My people, and I will be their God, for they will return to Me with their whole heart.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ‘And as for the bad figs, which are so rotten that they cannot be eaten,’ surely thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘so I will abandon Zedekiah king of Judah and his princes, and the remnant of Jerusalem who remain in this land and those who live in the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will make them a focus of ridicule '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disappointment [tossed back and forth] among all the kingdoms of the earth, a [notorious] disgrace, a byword, a taunt and a curse in all places where I will scatter them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I will send the sword, famine and virulent disease among them until they are consumed from the land which I gave to them and to their fathers.’ ”
