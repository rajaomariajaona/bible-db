  - type: text
    content: from the rising of the sun, even to its setting, My name shall be great among the nations. In every place incense is going to be offered to My name, and a grain offering that is pure; for My name shall be great among the nations,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '12':
  - type: text
    content: '“But you [priests] profane it when you say, ‘The table of the Lord is defiled, and as for its fruit, its food is to be despised.’ '
  '13':
  - type: text
    content: You also say, ‘How tiresome this is!’ And you disdainfully sniff at it,” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “and you bring what was taken by robbery, and the lame or the sick [animals]; this you bring as an offering! Should I receive it with pleasure from your hand?” says the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Lev 1:3; Deut 15:21] '
  '14':
  - type: text
    content: '“But cursed is the swindler who has a male in his flock and vows [to offer] it, but sacrifices to the Lord a blemished '
  - type: text
    content: or
  - type: text
    content: ' diseased thing! For I am a great King,” says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “and My name is to be [reverently and greatly] feared among the nations.”'
  '2':
  - type: text
    content: “I have loved you,” says the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  - type: note
    content: The first in a series of sarcastic questions spread throughout this book beginning with “But you say.”
  - type: text
    content: 'But you say, “How '
  - type: text
    content: and
  - type: text
    content: ' in what way have You loved us?” “Was not Esau Jacob’s brother?” declares the L'
  - type: heading
    content: ord
  - type: text
    content: '. “Yet I loved Jacob (Israel); '
  '3':
  - type: text
