    text: blind [animals] for sacrifice, is it not evil? And when you present the lame and the sick, is it not evil? Offer such a thing [as a blind or lame or sick animal] to your governor [as a gift or as payment for your taxes]. Would he be pleased with you? Or would he receive you graciously?” says the L
  - type: usfm
