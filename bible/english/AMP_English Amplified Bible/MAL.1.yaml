  - type: heading
    content: Sin of the Priests
  '6':
  - type: text
    content: '“ ‘A son honors his father, and a servant his master. Then if I am a Father, where is My honor? And if I am a Master, where is the [reverent] fear '
  - type: text
    content: and
  - type: text
    content: ' respect due Me?’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts to you, O priests, who despise My name. But you say, ‘How '
  - type: text
    content: and
  - type: text
    content: ' in what way have we despised Your name?’ '
  '7':
  - type: text
    content: You are presenting defiled food upon My altar. But you say, ‘How have we defiled You?’ By thinking that the table of the L
  - type: heading
    content: ord
  - type: text
    content: ' is contemptible '
  - type: text
    content: and
  - type: text
    content: ' may be despised. '
  '8':
  - type: text
    content: 'When you [priests] present the '
  - type: note
    content: Only animals without defects or discernable flaws were to be offered as sacrifices.
  - type: text
    content: blind [animals] for sacrifice, is it not evil? And when you present the lame and the sick, is it not evil? Offer such a thing [as a blind or lame or sick animal] to your governor [as a gift or as payment for your taxes]. Would he be pleased with you? Or would he receive you graciously?” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
  '9':
  - type: text
    content: “But now will you not entreat God’s favor, that He may be gracious to us? With such an offering from your hand [as an imperfect animal for sacrifice], will He show favor to any of you?” says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts. '
