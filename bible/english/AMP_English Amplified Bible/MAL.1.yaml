    text: '“Oh, that there were even one among you [whose duty it is to minister to Me] who would shut the gates, so that you would not kindle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fire on
  - type: text
    text: ' My altar uselessly [with an empty, worthless pretense]! I am not pleased with you,” says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “nor will I accept an offering from your hand. '
