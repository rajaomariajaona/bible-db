    children:
    - type: text
      text: '12'
  - type: text
    text: '“But you [priests] profane it when you say, ‘The table of the Lord is defiled, and as for its fruit, its food is to be despised.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
