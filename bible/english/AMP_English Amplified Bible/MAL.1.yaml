    text: from the rising of the sun, even to its setting, My name shall be great among the nations. In every place incense is going to be offered to My name, and a grain offering that is pure; for My name shall be great among the nations,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts. '
  - type: usfm
    marker: v
