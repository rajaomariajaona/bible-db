document_id: NUM.32,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Reuben and Gad Settle in Gilead
  - type: text
    content: 'Now the sons of Reuben and the sons of Gad had very large herds of cattle, and they saw the land of Jazer and the land of Gilead [on the east side of the Jordan River], and indeed, the place was suitable for raising livestock. '
  '10':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anger was kindled on that day and He swore an oath, saying, '
  '11':
  - type: text
    content: '‘None of the men who came up from Egypt, from twenty years old and upward, shall see the land which I promised to Abraham, to Isaac, and to Jacob, because they have not followed Me completely, '
  '12':
  - type: text
    content: except Caleb the son of Jephunneh the Kenizzite and Joshua the son of Nun, for they have followed the L
  - type: heading
    content: ord
  - type: text
    content: ' completely.’ '
  '13':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anger was kindled against the sons of Israel (Jacob) and He made them wander in the wilderness forty years, until the entire generation of those who had done evil in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ' was destroyed. '
  '14':
  - type: text
    content: Now look, you [the tribes of Reuben and Gad] have risen up in your fathers’ place, a brood of sinful men, to add still more to the fierce anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' against Israel. '
  '15':
  - type: text
    content: For if you turn back from following Him [completely], He will once again leave them in the wilderness, and you will destroy all these people.”
  '16':
  - type: text
    content: 'But the people of Reuben and Gad approached Moses and said, “We will build sheepfolds here for our flocks and [walled] cities for our children, '
  '17':
  - type: text
    content: 'but we will be armed and ready to go to war before the [other tribes of the] Israelites, until we have brought them to their place, while our children live in the fortified cities because of the inhabitants of the land. '
  '18':
  - type: text
    content: 'We will not return to our homes until every one of the [other] sons of Israel has taken possession of his inheritance. '
  '19':
  - type: text
    content: For we will not inherit with them on the west side of the Jordan and beyond, because our inheritance has come to us on this side of the Jordan [River] toward the east.”
  '2':
  - type: text
    content: 'So the sons of Gad and of Reuben came and spoke to Moses, to Eleazar the priest, and to the leaders of the congregation, saying, '
  '20':
  - type: text
    content: Moses replied, “If you will do as you say, if you will arm yourselves before the L
  - type: heading
    content: ord
  - type: text
    content: ' for war, '
  '21':
  - type: text
    content: and every armed man of yours will cross the Jordan before the L
  - type: heading
    content: ord
  - type: text
    content: ' until He has driven out His enemies before Him, '
  '22':
  - type: text
    content: and the land [west of the Jordan] is subdued before the L
  - type: heading
    content: ord
  - type: text
    content: ', then afterward you shall return and be blameless [in this matter] before the L'
  - type: heading
    content: ord
  - type: text
    content: ' and before Israel, and this land [east of the Jordan] shall be yours as a possession before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '23':
  - type: text
    content: But if you do not do this, behold, you will have sinned against the L
  - type: heading
    content: ord
  - type: text
    content: '; and be sure that your sin will find you out. '
  '24':
  - type: text
    content: Build yourselves cities for your children, and folds for your sheep, and do that of which you have spoken.”
  '25':
  - type: text
    content: 'Then the descendants of Gad and of Reuben said to Moses, “Your servants will do just as my lord commands. '
  '26':
  - type: text
    content: 'Our children, our wives, our livestock, and all our cattle shall be there in the cities of Gilead. '
  '27':
  - type: text
    content: But your servants will cross over, every man armed for war, before the L
  - type: heading
    content: ord
  - type: text
    content: ' to the battle, just as my lord says.”'
  '28':
  - type: text
    content: 'So Moses gave the command concerning them to Eleazar the priest, and to Joshua the son of Nun, and to the leaders of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of the tribes of the Israelites. '
  '29':
  - type: text
    content: Moses said to them, “If the sons of Gad and the sons of Reuben will cross over the Jordan with you, every man armed for battle before the L
  - type: heading
    content: ord
  - type: text
    content: ', and the land is subdued before you, then you shall give them the land of Gilead [east of the Jordan River] as a possession; '
  '3':
  - type: text
    content: '“[The country around] Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo, and Beon, '
  '30':
  - type: text
    content: 'but if they will not cross over with you armed, they shall have possessions among you in the land of Canaan [and surrender their right to their land east of the Jordan River].” '
  '31':
  - type: text
    content: The sons of Gad and the sons of Reuben answered, “As the L
  - type: heading
    content: ord
  - type: text
    content: ' has said to your servants, so will we do. '
  '32':
  - type: text
    content: We will cross over armed before the L
  - type: heading
    content: ord
  - type: text
    content: ' into the land of Canaan, so that the possession of our inheritance on [the east] side of the Jordan may be ours.”'
  '33':
  - type: text
    content: 'So Moses gave to them, to the sons of Gad and to the sons of Reuben and to the half-tribe of Manasseh the son of Joseph, the kingdom of Sihon, the king of the Amorites and the kingdom of Og, the king of Bashan, the land with its cities and territories, the cities of the surrounding land. '
  '34':
  - type: text
    content: 'The sons of Gad built Dibon, Ataroth, Aroer, '
  '35':
  - type: text
    content: 'Atroth-shophan, Jazer, Jogbehah, '
  '36':
  - type: text
    content: 'Beth-nimrah, and Beth-haran, fortified (walled) cities, and sheepfolds for sheep. '
  '37':
  - type: text
    content: 'The sons of Reuben built Heshbon, Elealeh, Kiriathaim, '
  '38':
  - type: text
    content: 'Nebo, and Baal-meon (their names being changed) and Sibmah; and they gave other names to the cities which they built. '
  '39':
  - type: text
    content: 'The sons of Machir the son of Manasseh went to Gilead and took it, and drove out the Amorites who were in it. '
  '4':
  - type: text
    content: the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' conquered before the congregation of Israel, is a land [suitable] for livestock, and your servants have [very large herds of] livestock.” '
  '40':
  - type: text
    content: 'So Moses gave Gilead to [the tribe of] Machir the son of Manasseh, and they settled in it. '
  '41':
  - type: text
    content: '[The sons of] Jair the son of Manasseh went and took its towns (tent villages) and called them Havvoth-jair. '
  '42':
  - type: text
    content: Nobah went and took Kenath and its villages, and called it Nobah after his own name.
  '5':
  - type: text
    content: They said, “If we have found favor in your sight, let this land be given to your servants as a possession. Do not take us across the Jordan [River].”
  '6':
  - type: text
    content: 'But Moses said to the sons of Gad and the sons of Reuben, “Shall your brothers go to war while you sit here? '
  '7':
  - type: text
    content: Now why are you discouraging the hearts of the Israelites from crossing over into the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' has given them? '
  '8':
  - type: text
    content: 'This is what your fathers did when I sent them from Kadesh-barnea to see the land! '
  '9':
  - type: text
    content: For when they went up to the Valley of Eshcol and saw the land, they discouraged the hearts of the Israelites so that they did not go into the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' had given them. '
