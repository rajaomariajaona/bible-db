document_id: NUM.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Reuben and Gad Settle in Gilead
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the sons of Reuben and the sons of Gad had very large herds of cattle, and they saw the land of Jazer and the land of Gilead [on the east side of the Jordan River], and indeed, the place was suitable for raising livestock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the sons of Gad and of Reuben came and spoke to Moses, to Eleazar the priest, and to the leaders of the congregation, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“[The country around] Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo, and Beon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' conquered before the congregation of Israel, is a land [suitable] for livestock, and your servants have [very large herds of] livestock.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They said, “If we have found favor in your sight, let this land be given to your servants as a possession. Do not take us across the Jordan [River].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Moses said to the sons of Gad and the sons of Reuben, “Shall your brothers go to war while you sit here? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now why are you discouraging the hearts of the Israelites from crossing over into the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has given them? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This is what your fathers did when I sent them from Kadesh-barnea to see the land! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For when they went up to the Valley of Eshcol and saw the land, they discouraged the hearts of the Israelites so that they did not go into the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had given them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' anger was kindled on that day and He swore an oath, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '‘None of the men who came up from Egypt, from twenty years old and upward, shall see the land which I promised to Abraham, to Isaac, and to Jacob, because they have not followed Me completely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: except Caleb the son of Jephunneh the Kenizzite and Joshua the son of Nun, for they have followed the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' completely.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' anger was kindled against the sons of Israel (Jacob) and He made them wander in the wilderness forty years, until the entire generation of those who had done evil in the sight of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was destroyed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now look, you [the tribes of Reuben and Gad] have risen up in your fathers’ place, a brood of sinful men, to add still more to the fierce anger of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' against Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For if you turn back from following Him [completely], He will once again leave them in the wilderness, and you will destroy all these people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the people of Reuben and Gad approached Moses and said, “We will build sheepfolds here for our flocks and [walled] cities for our children, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but we will be armed and ready to go to war before the [other tribes of the] Israelites, until we have brought them to their place, while our children live in the fortified cities because of the inhabitants of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'We will not return to our homes until every one of the [other] sons of Israel has taken possession of his inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For we will not inherit with them on the west side of the Jordan and beyond, because our inheritance has come to us on this side of the Jordan [River] toward the east.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moses replied, “If you will do as you say, if you will arm yourselves before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' for war, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: and every armed man of yours will cross the Jordan before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' until He has driven out His enemies before Him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: and the land [west of the Jordan] is subdued before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', then afterward you shall return and be blameless [in this matter] before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and before Israel, and this land [east of the Jordan] shall be yours as a possession before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But if you do not do this, behold, you will have sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; and be sure that your sin will find you out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Build yourselves cities for your children, and folds for your sheep, and do that of which you have spoken.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then the descendants of Gad and of Reuben said to Moses, “Your servants will do just as my lord commands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Our children, our wives, our livestock, and all our cattle shall be there in the cities of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But your servants will cross over, every man armed for war, before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to the battle, just as my lord says.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Moses gave the command concerning them to Eleazar the priest, and to Joshua the son of Nun, and to the leaders of the fathers’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: households
  - type: text
    text: ' of the tribes of the Israelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Moses said to them, “If the sons of Gad and the sons of Reuben will cross over the Jordan with you, every man armed for battle before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the land is subdued before you, then you shall give them the land of Gilead [east of the Jordan River] as a possession; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'but if they will not cross over with you armed, they shall have possessions among you in the land of Canaan [and surrender their right to their land east of the Jordan River].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The sons of Gad and the sons of Reuben answered, “As the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said to your servants, so will we do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: We will cross over armed before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' into the land of Canaan, so that the possession of our inheritance on [the east] side of the Jordan may be ours.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So Moses gave to them, to the sons of Gad and to the sons of Reuben and to the half-tribe of Manasseh the son of Joseph, the kingdom of Sihon, the king of the Amorites and the kingdom of Og, the king of Bashan, the land with its cities and territories, the cities of the surrounding land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The sons of Gad built Dibon, Ataroth, Aroer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Atroth-shophan, Jazer, Jogbehah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Beth-nimrah, and Beth-haran, fortified (walled) cities, and sheepfolds for sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'The sons of Reuben built Heshbon, Elealeh, Kiriathaim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nebo, and Baal-meon (their names being changed) and Sibmah; and they gave other names to the cities which they built. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The sons of Machir the son of Manasseh went to Gilead and took it, and drove out the Amorites who were in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So Moses gave Gilead to [the tribe of] Machir the son of Manasseh, and they settled in it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '[The sons of] Jair the son of Manasseh went and took its towns (tent villages) and called them Havvoth-jair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Nobah went and took Kenath and its villages, and called it Nobah after his own name.
