document_id: PSA.140,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 140
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Protection against the Wicked.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from evil men;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect me from violent men.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let burning coals fall upon them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be thrown into the fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into deep [water] pits from which they cannot rise.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not let a slanderer be established in the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let evil quickly hunt the violent man [to overthrow him and stop his evil acts].”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I know [with confidence] that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will maintain the cause of the afflicted,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [will secure] justice for the poor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely the righteous will give thanks to Your name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The upright will dwell in Your presence.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They devise evil things in their hearts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They continually [gather together and] stir up wars.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sharpen their tongues like a serpent’s;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Poison of a viper is under their lips. [Rom 3:13] '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Keep me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', from the hands of the wicked;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect me from violent men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who intend to trip up my steps.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The proud have hidden a trap for me, and cords;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have spread a net by the wayside;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have set traps for me. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I said to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “You are my God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the voice of my supplications, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “O G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' the Lord, the strength of my salvation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have covered my head in the day of battle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not grant, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the desires of the wicked;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not further their evil device, that they not be exalted. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Those who surround me raise their heads;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the mischief of their own lips come upon them.
