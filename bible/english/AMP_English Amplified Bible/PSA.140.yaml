  - type: heading
    content: Prayer for Protection against the Wicked.
  - type: text
    content: To the Chief Musician. A Psalm of David.
  - type: text
    content: Rescue me, O L
  - type: heading
    content: ord
  - type: text
    content: ', from evil men;'
  - type: text
    content: Protect me from violent men.
  '10':
  - type: text
    content: “Let burning coals fall upon them;
  - type: text
    content: Let them be thrown into the fire,
  - type: text
    content: Into deep [water] pits from which they cannot rise.
  '11':
  - type: text
    content: “Do not let a slanderer be established in the earth;
  - type: text
    content: Let evil quickly hunt the violent man [to overthrow him and stop his evil acts].”
  '12':
  - type: text
    content: ¶I know [with confidence] that the L
  - type: heading
    content: ord
  - type: text
    content: ' will maintain the cause of the afflicted,'
  - type: text
    content: And [will secure] justice for the poor.
  '13':
  - type: text
    content: Surely the righteous will give thanks to Your name;
  - type: text
    content: The upright will dwell in Your presence.
  '2':
  - type: text
    content: They devise evil things in their hearts;
  - type: text
    content: They continually [gather together and] stir up wars.
  '3':
  - type: text
    content: They sharpen their tongues like a serpent’s;
  - type: text
    content: 'Poison of a viper is under their lips. [Rom 3:13] '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: ¶Keep me, O L
  - type: heading
    content: ord
  - type: text
    content: ', from the hands of the wicked;'
  - type: text
    content: Protect me from violent men
  - type: text
    content: Who intend to trip up my steps.
  '5':
  - type: text
    content: The proud have hidden a trap for me, and cords;
  - type: text
    content: They have spread a net by the wayside;
  - type: text
    content: 'They have set traps for me. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: ¶I said to the L
  - type: heading
    content: ord
  - type: text
    content: ', “You are my God;'
  - type: text
    content: Listen to the voice of my supplications, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '7':
  - type: text
    content: “O G
  - type: heading
    content: od
  - type: text
    content: ' the Lord, the strength of my salvation,'
  - type: text
    content: You have covered my head in the day of battle.
  '8':
  - type: text
    content: “Do not grant, O L
  - type: heading
    content: ord
  - type: text
    content: ', the desires of the wicked;'
  - type: text
