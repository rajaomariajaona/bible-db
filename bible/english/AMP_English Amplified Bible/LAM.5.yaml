document_id: LAM.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Prayer for Mercy
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', remember what has come upon us;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, and see our reproach (national disgrace)!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Our skin is as hot as [the heat of] an oven
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the burning heat of [the fever of] famine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They ravished the women in Zion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The virgins in the cities of Judah.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Princes were hung by their hands;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elders were not respected.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Young men worked at the grinding mill,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And boys fell [staggering] under loads of wood.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Elders are gone from the gate;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young men from their music.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The joy of our hearts has ended;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our dancing has been turned into mourning.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The crown has fallen from our head [our honor is covered with dust]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to us, for we have sinned!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Because of this our heart is faint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of these things our eyes are dim.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: As for Mount Zion, which lies desolate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Foxes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the jackals prowl over it.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ¶But You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', reign forever;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your throne endures from generation to [all] generations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Our inheritance has been turned over to strangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our houses to foreigners.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Why do You forget us forever?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do You forsake us so long?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Return us to You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', so that we may be restored;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renew our days as of old,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Unless You have utterly rejected us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And are exceedingly angry with us.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: We have become orphans without a father;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our mothers are like widows.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: We have to pay for our drinking water;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our wood comes to us at a price.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Our pursuers are at our necks;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are worn out, there is no rest for us.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: We have given the hand [as a pledge of fidelity and submission] to Egypt and Assyria to get enough bread.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Our fathers sinned, and are no more;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both forefathers and sons were responsible for the disaster that had come on Jerusalem. This generation was equally deserving of punishment.
      marker-yv: yv-n
    - type: text
      text: we who have carried their sin. [Is 65:7; Jer 16:11, 12; 31:29; Ezek 18:2-4]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Servants rule over us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no one to rescue us out of their hand. [Neh 5:15]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: We get our bread at the risk of our lives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the sword [of the Arabs] in the wilderness [who may attack if we go out to harvest the crop].
