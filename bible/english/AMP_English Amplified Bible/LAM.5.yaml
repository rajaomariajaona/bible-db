document_id: LAM.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer for Mercy
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', remember what has come upon us;'
  - type: text
    content: Look, and see our reproach (national disgrace)!
  '10':
  - type: text
    content: Our skin is as hot as [the heat of] an oven
  - type: text
    content: Because of the burning heat of [the fever of] famine.
  '11':
  - type: text
    content: They ravished the women in Zion,
  - type: text
    content: The virgins in the cities of Judah.
  '12':
  - type: text
    content: Princes were hung by their hands;
  - type: text
    content: Elders were not respected.
  '13':
  - type: text
    content: Young men worked at the grinding mill,
  - type: text
    content: And boys fell [staggering] under loads of wood.
  '14':
  - type: text
    content: Elders are gone from the gate;
  - type: text
    content: Young men from their music.
  '15':
  - type: text
    content: The joy of our hearts has ended;
  - type: text
    content: Our dancing has been turned into mourning.
  '16':
  - type: text
    content: The crown has fallen from our head [our honor is covered with dust]!
  - type: text
    content: Woe to us, for we have sinned!
  '17':
  - type: text
    content: Because of this our heart is faint,
  - type: text
    content: Because of these things our eyes are dim.
  '18':
  - type: text
    content: As for Mount Zion, which lies desolate,
  - type: text
    content: 'Foxes '
  - type: text
    content: and
  - type: text
    content: ' the jackals prowl over it.'
  '19':
  - type: text
    content: ¶But You, O L
  - type: heading
    content: ord
  - type: text
    content: ', reign forever;'
  - type: text
    content: Your throne endures from generation to [all] generations.
  '2':
  - type: text
    content: Our inheritance has been turned over to strangers,
  - type: text
    content: Our houses to foreigners.
  '20':
  - type: text
    content: Why do You forget us forever?
  - type: text
    content: Why do You forsake us so long?
  '21':
  - type: text
    content: Return us to You, O L
  - type: heading
    content: ord
  - type: text
    content: ', so that we may be restored;'
  - type: text
    content: Renew our days as of old,
  '22':
  - type: text
    content: Unless You have utterly rejected us
  - type: text
    content: And are exceedingly angry with us.
  '3':
  - type: text
    content: We have become orphans without a father;
  - type: text
    content: Our mothers are like widows.
  '4':
  - type: text
    content: We have to pay for our drinking water;
  - type: text
    content: Our wood comes to us at a price.
  '5':
  - type: text
    content: Our pursuers are at our necks;
  - type: text
    content: We are worn out, there is no rest for us.
  '6':
  - type: text
    content: We have given the hand [as a pledge of fidelity and submission] to Egypt and Assyria to get enough bread.
  '7':
  - type: text
    content: Our fathers sinned, and are no more;
  - type: text
    content: 'It is '
  - type: note
    content: Both forefathers and sons were responsible for the disaster that had come on Jerusalem. This generation was equally deserving of punishment.
  - type: text
    content: we who have carried their sin. [Is 65:7; Jer 16:11, 12; 31:29; Ezek 18:2-4]
  '8':
  - type: text
    content: Servants rule over us;
  - type: text
    content: There is no one to rescue us out of their hand. [Neh 5:15]
  '9':
  - type: text
    content: We get our bread at the risk of our lives
  - type: text
    content: Because of the sword [of the Arabs] in the wilderness [who may attack if we go out to harvest the crop].
