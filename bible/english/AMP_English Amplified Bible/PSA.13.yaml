    - type: text
      text: Psalm 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Help in Trouble.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '? Will You forget me forever?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will You hide Your face from me?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long must I take counsel in my soul,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Having
    - type: text
      text: ' sorrow in my heart day after day?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long will my enemy exalt himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' triumph over me?'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Consider and answer me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give light (life) to my eyes, or I will sleep the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sleep of
    - type: text
      text: ' death,'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my enemy will say, “I have overcome him,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my adversaries will rejoice when I am shaken.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶But I have trusted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' been confident in Your lovingkindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart shall rejoice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in Your salvation.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because He has dealt bountifully with me.
