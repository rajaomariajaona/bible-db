document_id: PSA.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 4
  - type: heading
    content: Evening Prayer of Trust in God.
  - type: text
    content: To the Chief Musician; on stringed instruments. A Psalm of David.
  - type: text
    content: Answer me when I call, O God of my righteousness!
  - type: text
    content: 'You have freed me when I was hemmed in '
  - type: text
    content: and
  - type: text
    content: ' relieved me when I was in distress;'
  - type: text
    content: Be gracious to me and hear [and respond to] my prayer.
  '2':
  - type: text
    content: '¶O sons of men, how long will my honor '
  - type: text
    content: and
  - type: text
    content: ' glory be [turned into] shame?'
  - type: text
    content: How long
  - type: text
    content: ' will you [my enemies] love worthless (vain, futile) things and seek deception '
  - type: text
    content: and
  - type: text
    content: ' lies? '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: But know that the L
  - type: heading
    content: ord
  - type: text
    content: ' has set apart for Himself [and dealt wonderfully with] the godly man [the one of honorable character and moral courage—the one who does right].'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' hears '
  - type: text
    content: and
  - type: text
    content: ' responds when I call to Him.'
  '4':
  - type: text
    content: ¶Tremble [with anger or fear], and do not sin;
  - type: text
    content: 'Meditate in your heart upon your bed and be still [reflect on your sin and repent of your rebellion]. [Eph 4:26] '
  - type: text
    content: Selah.
  '5':
  - type: text
    content: Offer righteous sacrifices;
  - type: text
    content: Trust [confidently] in the L
  - type: heading
    content: ord
  - type: text
    content: .
  '6':
  - type: text
    content: ¶Many are saying, “Oh, that we might see some good!”
  - type: text
    content: Lift up the light of Your face upon us, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '7':
  - type: text
    content: You have put joy in my heart,
  - type: text
    content: More than [others know] when their wheat and new wine have yielded abundantly.
  '8':
  - type: text
    content: In peace [and with a tranquil heart] I will both lie down and sleep,
  - type: text
    content: For You alone, O L
  - type: heading
    content: ord
  - type: text
    content: ', make me dwell in safety '
  - type: text
    content: and
  - type: text
    content: ' confident trust.'
