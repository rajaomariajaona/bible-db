- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Evening Prayer of Trust in God.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician; on stringed instruments. A Psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Answer me when I call, O God of my righteousness!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have freed me when I was hemmed in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' relieved me when I was in distress;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be gracious to me and hear [and respond to] my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '¶O sons of men, how long will my honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glory be [turned into] shame?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: How long
  - type: text
    text: ' will you [my enemies] love worthless (vain, futile) things and seek deception '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lies? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But know that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has set apart for Himself [and dealt wonderfully with] the godly man [the one of honorable character and moral courage—the one who does right].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' hears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' responds when I call to Him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Tremble [with anger or fear], and do not sin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Meditate in your heart upon your bed and be still [reflect on your sin and repent of your rebellion]. [Eph 4:26] '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Offer righteous sacrifices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trust [confidently] in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶Many are saying, “Oh, that we might see some good!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift up the light of Your face upon us, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You have put joy in my heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: More than [others know] when their wheat and new wine have yielded abundantly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In peace [and with a tranquil heart] I will both lie down and sleep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You alone, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', make me dwell in safety '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confident trust.'
