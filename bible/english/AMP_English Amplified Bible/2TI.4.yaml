    content: 'Only Luke is with me. Get Mark and bring him with you, for he is very helpful to me for the ministry. '
  '12':
  - type: text
    content: 'But Tychicus I have sent to Ephesus. '
  '13':
  - type: text
    content: 'When you come bring the coat that I left at Troas with Carpus, and the books, especially the parchments. '
  '14':
  - type: text
    content: 'Alexander the coppersmith did me great harm; [but that is no concern of mine, for] the Lord will repay him according to his actions. '
  '15':
  - type: text
    content: Be on guard against him yourself, because he vigorously opposed our message.
