  - type: text
    content: The Lord will rescue me from every evil assault, and He will bring me safely into His heavenly kingdom; to Him be the glory forever and ever. Amen.
  '19':
  - type: text
    content: 'Give my greetings to Prisca and Aquila, and to the household of Onesiphorus. '
