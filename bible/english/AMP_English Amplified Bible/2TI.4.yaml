  - type: note
    content: This is Paul’s last inspired letter and was written toward the end of his second Roman imprisonment. During his first imprisonment he was under house arrest, but this time (about five years later) it is believed that he was held in chains in the Tullianum, the lower chamber of the Mamertine dungeon. The Roman historian, Sallust, described the Tullianum as a horrible dungeon “…repulsive and terrible.” It was originally excavated as a cistern for a natural spring. It would have been cold, damp, and incredibly filthy. Both lower and upper chambers served as places of torture and as holding places for those awaiting execution. Paul would have known that there was no hope of release and that his execution was imminent. Nero ruled Rome during both imprisonments.
  - type: text
