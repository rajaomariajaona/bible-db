document_id: 2TI.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: “Preach the Word”
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I solemnly charge you in the presence of God and of Christ Jesus, who is to judge the living and the dead, and by His appearing and His kingdom: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for Demas, having loved [the pleasures of] this present '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: age
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'world, has deserted me and gone to Thessalonica; Crescens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has gone
    - type: text
      text: ' to Galatia, Titus to Dalmatia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Luke is with me. Get Mark and bring him with you, for he is very helpful to me for the ministry. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Tychicus I have sent to Ephesus. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you come bring the coat that I left at Troas with Carpus, and the books, especially the parchments. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alexander the coppersmith did me great harm; [but that is no concern of mine, for] the Lord will repay him according to his actions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Be on guard against him yourself, because he vigorously opposed our message.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At my first trial no one supported me [as an advocate] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' stood with me, but they all deserted me. May it not be counted against them [by God]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Lord stood by me and strengthened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empowered me, so that through me the [gospel] message might be fully proclaimed, and that all the Gentiles might hear it; and I was rescued from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Figurative language—probably a reference to the favorable outcome of his first trial (v 16).
      marker-yv: yv-n
    - type: text
      text: 'mouth of the lion. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Lord will rescue me from every evil assault, and He will bring me safely into His heavenly kingdom; to Him be the glory forever and ever. Amen.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give my greetings to Prisca and Aquila, and to the household of Onesiphorus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'preach the word [as an official messenger]; be ready when the time is right and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' when it is not [keep your sense of urgency, whether the opportunity seems favorable or unfavorable, whether convenient or inconvenient, whether welcome or unwelcome]; correct [those who err in doctrine or behavior], warn [those who sin], exhort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encourage [those who are growing toward spiritual maturity], with inexhaustible patience and [faithful] teaching. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Erastus stayed on at Corinth, but I left Trophimus sick at Miletus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Try your best to come [to me] before winter. Eubulus wishes to be remembered to you, as do Pudens and Linus and Claudia and all the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: brothers and sisters.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Lord be with your spirit. Grace be with you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the time will come when people will not tolerate sound doctrine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurate instruction [that challenges them with God’s truth]; but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wanting
    - type: text
      text: ' to have their ears tickled [with something pleasing], they will accumulate for themselves [many] teachers [one after another, chosen] to satisfy their own desires '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to support the errors they hold, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and will turn their ears away from the truth and will wander off into myths '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' man-made fictions [and will accept the unacceptable]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But as for you, be clear-headed in every situation [stay calm and cool and steady], endure every hardship [without flinching], do the work of an evangelist, fulfill [the duties of] your ministry.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I am already being '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The drink offering (wine) was required as part of the sacrificial system of the old covenant.
      marker-yv: yv-n
    - type: text
      text: 'poured out as a drink offering, and the time of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is Paul’s last inspired letter and was written toward the end of his second Roman imprisonment. During his first imprisonment he was under house arrest, but this time (about five years later) it is believed that he was held in chains in the Tullianum, the lower chamber of the Mamertine dungeon. The Roman historian, Sallust, described the Tullianum as a horrible dungeon “…repulsive and terrible.” It was originally excavated as a cistern for a natural spring. It would have been cold, damp, and incredibly filthy. Both lower and upper chambers served as places of torture and as holding places for those awaiting execution. Paul would have known that there was no hope of release and that his execution was imminent. Nero ruled Rome during both imprisonments.
      marker-yv: yv-n
    - type: text
      text: 'my departure [from this world] is at hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I will soon go free. [Num 15:1-12; 28:7; Phil 2:17] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have fought the good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' noble fight, I have finished the race, I have kept the faith [firmly guarding the gospel against error]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the future there is reserved for me the [victor’s] crown of righteousness [for being right with God and doing right], which the Lord, the righteous Judge, will award to me on that [great] day—and not to me only, but also to all those who have loved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' longed for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomed His appearing.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Personal Concerns
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make every effort to come to me soon; '
