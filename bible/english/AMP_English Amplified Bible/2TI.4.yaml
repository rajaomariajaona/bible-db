  - type: text
    content: But as for you, be clear-headed in every situation [stay calm and cool and steady], endure every hardship [without flinching], do the work of an evangelist, fulfill [the duties of] your ministry.
  '6':
  - type: text
    content: 'For I am already being '
  - type: note
