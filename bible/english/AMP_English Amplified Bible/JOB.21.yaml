document_id: JOB.21,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Dialogue Regarding the Wicked
  - type: text
    content: Then Job answered and said,
  '10':
  - type: text
    content: “His bull breeds and does not fail;
  - type: text
    content: His cow calves and does not miscarry.
  '11':
  - type: text
    content: “They send forth their little ones like a flock,
  - type: text
    content: And their children skip about.
  '12':
  - type: text
    content: '“They lift up their voices '
  - type: text
    content: and
  - type: text
    content: ' sing to the tambourine and the lyre'
  - type: text
    content: And rejoice to the sound of the flute.
  '13':
  - type: text
    content: “They fully enjoy their days in prosperity,
  - type: text
    content: And so go down to Sheol (the nether world, the place of the dead) in a [peaceful] moment.
  '14':
  - type: text
    content: “Yet they say to God, ‘Depart from us,
  - type: text
    content: For we do not desire the knowledge of Your ways.
  '15':
  - type: text
    content: '‘Who [and what] is '
  - type: note
    content: Heb Shaddai, also v 20.
  - type: text
    content: the Almighty, that we should serve Him?
  - type: text
    content: And what would we gain if we plead with Him?’ [Ex 5:2]
  '16':
  - type: text
    content: “
  - type: text
    content: But
  - type: text
    content: ' notice, the prosperity '
  - type: text
    content: of the wicked
  - type: text
    content: ' is not in their hand (in their power);'
  - type: text
    content: The counsel of the wicked [and the mystery of God’s dealings with the ungodly] is far from my comprehension.
  '17':
  - type: text
    content: ¶“How often [then] is it that the lamp of the wicked is put out,
  - type: text
    content: And that their disaster falls on them?
  - type: text
    content: 'Does God distribute pain '
  - type: text
    content: and
  - type: text
    content: ' destruction '
  - type: text
    content: and
  - type: text
    content: ' sorrow [to them] in His anger? [Luke 12:46]'
  '18':
  - type: text
    content: “Are they like straw before the wind,
  - type: text
    content: 'And like chaff that the storm steals '
  - type: text
    content: and
  - type: text
    content: ' carries away?'
  '19':
  - type: text
    content: “
  - type: text
    content: You say,
  - type: text
    content: ' ‘God stores away [the punishment of] man’s wickedness for his children.’'
  - type: text
    content: 'Let God repay him so that he may know '
  - type: text
    content: and
  - type: text
    content: ' experience it.'
  '2':
  - type: text
    content: “Listen carefully to my speech,
  - type: text
    content: And let this be the consolation.
  '20':
  - type: text
    content: “Let his own eyes see his destruction,
  - type: text
    content: And let him drink of the wrath of the Almighty.
  '21':
  - type: text
    content: '“For what pleasure does he have in his house '
  - type: text
    content: and
  - type: text
    content: ' family after he is dead,'
  - type: text
    content: When the number of his months [of life] is cut off?
  '22':
  - type: text
    content: “Can anyone teach God knowledge,
  - type: text
    content: Seeing that He judges those on high? [Rom 11:34; 1 Cor 2:16]
  '23':
  - type: text
    content: “One dies in his full strength,
  - type: text
    content: 'Being wholly at ease and quiet '
  - type: text
    content: and
  - type: text
    content: ' satisfied;'
  '24':
  - type: text
    content: His pails are full of milk [his sides are filled out with fat],
  - type: text
    content: And the marrow of his bones is moist,
  '25':
  - type: text
    content: Whereas another dies with a bitter soul,
  - type: text
    content: 'Never even tasting pleasure '
  - type: text
    content: or
  - type: text
    content: ' good fortune.'
  '26':
  - type: text
    content: “Together they lie down in the dust,
  - type: text
    content: And the worms cover them.
  '27':
  - type: text
    content: ¶“Behold, I know your thoughts,
  - type: text
    content: And the plots by which you would wrong me.
  '28':
  - type: text
    content: “For you say, ‘Where is the house of the noble man?
  - type: text
    content: And where is the tent, the dwelling place of the wicked?’
  '29':
  - type: text
    content: “Have you not asked those who travel this way,
  - type: text
    content: And do you not recognize their witness?
  '3':
  - type: text
    content: “Bear with me, and I also will speak;
  - type: text
    content: And after I have spoken, you may [continue to] mock [me].
  '30':
  - type: text
    content: '“That evil men are [now] reserved for the day of disaster '
  - type: text
    content: and
  - type: text
    content: ' destruction,'
  - type: text
    content: They will be led away on the day of [God’s] wrath?
  '31':
  - type: text
    content: “
  - type: text
    content: But
  - type: text
    content: ' who will confront him with his actions '
  - type: text
    content: and
  - type: text
    content: ' rebuke him face to face,'
  - type: text
    content: And who will repay him for what he has done?
  '32':
  - type: text
    content: “When he is carried to his grave,
  - type: text
    content: A guard
  - type: text
    content: ' will keep watch over his tomb.'
  '33':
  - type: text
    content: “The [dirt] clods of the valley are sweet to him [and gently cover him],
  - type: text
    content: Moreover, all men will follow after him [to a grave],
  - type: text
    content: While countless ones go before him.
  '34':
  - type: text
    content: “How then can you vainly comfort me with empty words,
  - type: text
    content: Since your answers remain untrue?”
  '4':
  - type: text
    content: '“As for me, is my complaint to man '
  - type: text
    content: or
  - type: text
    content: ' about him?'
  - type: text
    content: 'And why should I not be impatient '
  - type: text
    content: and
  - type: text
    content: ' my spirit troubled?'
  '5':
  - type: text
    content: '“Look at me and be astonished '
  - type: text
    content: and
  - type: text
    content: ' appalled;'
  - type: text
    content: And put your hand over your mouth.
  '6':
  - type: text
    content: '“Even when I remember, I am troubled '
  - type: text
    content: and
  - type: text
    content: ' afraid;'
  - type: text
    content: 'Horror '
  - type: text
    content: and
  - type: text
    content: ' trembling take hold of my flesh.'
  '7':
  - type: text
    content: '“Why do the wicked '
  - type: text
    content: still
  - type: text
    content: ' live,'
  - type: text
    content: Become old, and become mighty in power?
  '8':
  - type: text
    content: '“Their children '
  - type: text
    content: and
  - type: text
    content: ' descendants are established with them in their sight,'
  - type: text
    content: And their offspring before their eyes.
  '9':
  - type: text
    content: “Their houses are safe from fear;
  - type: text
    content: And the rod of God is not on them.
