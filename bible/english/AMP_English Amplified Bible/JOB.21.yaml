document_id: JOB.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job’s Dialogue Regarding the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His bull breeds and does not fail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His cow calves and does not miscarry.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They send forth their little ones like a flock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their children skip about.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They lift up their voices '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sing to the tambourine and the lyre'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rejoice to the sound of the flute.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They fully enjoy their days in prosperity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so go down to Sheol (the nether world, the place of the dead) in a [peaceful] moment.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yet they say to God, ‘Depart from us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For we do not desire the knowledge of Your ways.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Who [and what] is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai,
        - type: text
          text: ' also v 20.'
      marker-yv: yv-n
    - type: text
      text: the Almighty, that we should serve Him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what would we gain if we plead with Him?’ [Ex 5:2]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' notice, the prosperity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the wicked
    - type: text
      text: ' is not in their hand (in their power);'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The counsel of the wicked [and the mystery of God’s dealings with the ungodly] is far from my comprehension.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“How often [then] is it that the lamp of the wicked is put out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that their disaster falls on them?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Does God distribute pain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sorrow [to them] in His anger? [Luke 12:46]'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are they like straw before the wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And like chaff that the storm steals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carries away?'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: You say,
    - type: text
      text: ' ‘God stores away [the punishment of] man’s wickedness for his children.’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let God repay him so that he may know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' experience it.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen carefully to my speech,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let this be the consolation.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let his own eyes see his destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let him drink of the wrath of the Almighty.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For what pleasure does he have in his house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' family after he is dead,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the number of his months [of life] is cut off?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can anyone teach God knowledge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seeing that He judges those on high? [Rom 11:34; 1 Cor 2:16]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “One dies in his full strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Being wholly at ease and quiet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' satisfied;'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His pails are full of milk [his sides are filled out with fat],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the marrow of his bones is moist,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whereas another dies with a bitter soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Never even tasting pleasure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' good fortune.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Together they lie down in the dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the worms cover them.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Behold, I know your thoughts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the plots by which you would wrong me.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For you say, ‘Where is the house of the noble man?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And where is the tent, the dwelling place of the wicked?’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Have you not asked those who travel this way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do you not recognize their witness?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Bear with me, and I also will speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And after I have spoken, you may [continue to] mock [me].
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“That evil men are [now] reserved for the day of disaster '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destruction,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be led away on the day of [God’s] wrath?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' who will confront him with his actions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rebuke him face to face,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who will repay him for what he has done?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When he is carried to his grave,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A guard
    - type: text
      text: ' will keep watch over his tomb.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The [dirt] clods of the valley are sweet to him [and gently cover him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moreover, all men will follow after him [to a grave],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While countless ones go before him.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How then can you vainly comfort me with empty words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since your answers remain untrue?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“As for me, is my complaint to man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' about him?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And why should I not be impatient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' my spirit troubled?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look at me and be astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appalled;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And put your hand over your mouth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Even when I remember, I am troubled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' afraid;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Horror '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trembling take hold of my flesh.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Why do the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: still
    - type: text
      text: ' live,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Become old, and become mighty in power?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Their children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' descendants are established with them in their sight,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their offspring before their eyes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Their houses are safe from fear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the rod of God is not on them.
