document_id: 1KI.15,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijam Reigns over Judah
  - type: text
    content: 'In the eighteenth year of King Jeroboam the son of Nebat, Abijam became king over Judah. '
  '10':
  - type: text
    content: 'He reigned forty-one years in Jerusalem. His [great-grand]mother was Maacah the daughter of Abishalom (Absalom). [1 Kin 15:2] '
  '11':
  - type: text
    content: Asa did what was right in the eyes of the L
  - type: heading
    content: ord
  - type: text
    content: ', as did his father (forefather) David. '
  '12':
  - type: text
    content: 'He expelled the male cult prostitutes (sodomites) from the land and removed all the idols that his fathers [Solomon, Rehoboam, and Abijam] had made. [1 Kin 11:5-11; 14:22] '
  '13':
  - type: text
    content: 'He also deposed his [great-grand]mother Maacah from '
  - type: text
    content: being
  - type: text
    content: ' queen mother, because she had made a horrid (obscene, vulgar) image for [the goddess] Asherah. Asa cut down her horrid image, and burned it by the Brook Kidron. '
  '14':
  - type: text
    content: But the high places [of idol worship] were not removed. Nevertheless, Asa’s heart was entirely devoted to the L
  - type: heading
    content: ord
  - type: text
    content: ' all his days. '
  '15':
  - type: text
    content: He brought the things which his father had dedicated and the things which he had dedicated into the house of the L
  - type: heading
    content: ord
  - type: text
    content: '—silver, gold, and utensils '
  - type: text
    content: and
  - type: text
    content: ' accessories.'
  '16':
  - type: text
    content: 'Now there was war between Asa and Baasha king of Israel all their days. '
  '17':
  - type: text
    content: 'Baasha king of Israel went up against Judah and fortified Ramah [north of Jerusalem], in order to prevent '
  - type: text
    content: anyone
  - type: text
    content: ' from going out or coming in to Asa king of Judah. '
  '18':
  - type: text
    content: Then Asa took all the silver and gold left in the treasuries of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and the treasuries of the palace of the king and handed them over to his servants. And King Asa sent them to Ben-hadad the son of Tabrimmon, the son of Hezion, king of Aram (Syria), who lived in Damascus, saying, '
  '19':
  - type: text
    content: “
  - type: text
    content: Let there be
  - type: text
    content: ' a treaty between me and you, '
  - type: text
    content: as there was
  - type: text
    content: ' between my father and your father. Behold, I have sent you a gift of silver and gold; go, break your treaty with Baasha king of Israel, so that he will '
  - type: note
    content: I.e. stop the blockade of Jerusalem.
  - type: text
    content: 'withdraw from me.” '
  '2':
  - type: text
    content: He reigned three years in Jerusalem. His mother was Maacah [grand]daughter of Abishalom (
  - type: note
    content: Absalom’s mother was also named Maacah (2 Sam 3:3). She was the daughter of Talmai, king of Geshur.
  - type: text
    content: 'Absalom). '
  '20':
  - type: text
    content: 'So Ben-hadad listened to king Asa and sent the commanders of his armies against the cities of Israel, and conquered Ijon, Dan, Abel-beth-maacah, and all Chinneroth [the region of the Sea of Galilee], along with all the land of Naphtali. '
  '21':
  - type: text
    content: 'When Baasha heard about it, he stopped '
  - type: note
    content: Lit building.
  - type: text
    content: 'fortifying Ramah and stayed in Tirzah. '
  '22':
  - type: text
    content: Then King Asa made a proclamation to all Judah—none was exempt—and they carried away the stones of Ramah and its timber with which Baasha had built [the fortifications]. And King Asa built with them [border fortresses at] Geba of Benjamin and Mizpah.
  - type: heading
    content: Jehoshaphat Succeeds Asa
  '23':
  - type: text
    content: 'Now as for the rest of all the acts of Asa, all his might, everything that he did, and the cities which he built, are they not written in the Book of the Chronicles of the Kings of Judah? But during the time of his old age he had a foot disease. '
  '24':
  - type: text
    content: Asa slept with his fathers [in death] and was buried with his fathers in the city of his father David. Jehoshaphat his son reigned in his place.
  - type: heading
    content: Nadab, then Baasha, Rules over Israel
  '25':
  - type: text
    content: 'Now Nadab the son of Jeroboam began to reign over Israel in the second year of Asa king of Judah, and he reigned over Israel for two years. '
  '26':
  - type: text
    content: He did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' and walked in the way of his father [Jeroboam] and in his sin [of idolatry], with which he made Israel sin. '
  '27':
  - type: text
    content: Baasha the son of Ahijah of the house (tribe) of Issachar conspired against Nadab, and Baasha struck him down at Gibbethon, which belonged to the Philistines, while Nadab and all Israel were laying siege to Gibbethon.
  '28':
  - type: text
    content: 'So Baasha killed Nadab in the third year of Asa king of Judah, and reigned in his place. '
  '29':
  - type: text
    content: As soon as he was king, Baasha struck down all the household of Jeroboam. He did not leave for Jeroboam anyone alive, but he destroyed them in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He had spoken through His servant Ahijah the Shilonite— [1 Kin 14:9-16] '
  '3':
  - type: text
    content: He walked in all the sins [of idol worship] that his father [Rehoboam] committed before him; and his heart was not entirely devoted to the L
  - type: heading
    content: ord
  - type: text
    content: ' his God, like the heart of his father (forefather) David. '
  '30':
  - type: text
    content: because of the sins committed by Jeroboam and which he made Israel commit, and because he provoked the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel to anger.'
  '31':
  - type: text
    content: Now as for the rest of Nadab’s acts and everything that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  - type: heading
    content: War with Judah
  '32':
  - type: text
    content: There was war between Asa and Baasha king of Israel all their days.
  '33':
  - type: text
    content: 'In the third year of Asa king of Judah, Baasha the son of Ahijah became king over all Israel in Tirzah [the capital city], '
  - type: text
    content: and reigned
  - type: text
    content: ' twenty-four years. '
  '34':
  - type: text
    content: He did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' and walked in the way of Jeroboam and in his sin [of idolatry] with which he made Israel sin.'
  '4':
  - type: text
    content: Nevertheless, for David’s sake the L
  - type: heading
    content: ord
  - type: text
    content: ' his God gave him a lamp (descendant on the throne) in Jerusalem, setting up his son after him and establishing Jerusalem, '
  '5':
  - type: text
    content: because David did what was right in the eyes of the L
  - type: heading
    content: ord
  - type: text
    content: ', and had not turned aside from anything that He commanded him all the days of his life, except in the matter of [the betrayal of] Uriah the Hittite. '
  '6':
  - type: text
    content: There was war between Rehoboam [Abijam’s father] and Jeroboam all the days of Rehoboam’s life.
  '7':
  - type: text
    content: Now as for the rest of the acts of Abijam and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? And there was war between Abijam and Jeroboam.
  - type: heading
    content: Asa Succeeds Abijam
  '8':
  - type: text
    content: Abijam slept with his fathers [in death] and they buried him in the City of David. Asa his son became king in his place.
  '9':
  - type: text
    content: 'So in the twentieth year of Jeroboam king of Israel, Asa began to reign as king over Judah. '
