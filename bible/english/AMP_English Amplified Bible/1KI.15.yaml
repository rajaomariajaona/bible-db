document_id: 1KI.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abijam Reigns over Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the eighteenth year of King Jeroboam the son of Nebat, Abijam became king over Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He reigned three years in Jerusalem. His mother was Maacah [grand]daughter of Abishalom (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Absalom’s mother was also named Maacah (2 Sam 3:3). She was the daughter of Talmai, king of Geshur.
    marker-yv: yv-n
  - type: text
    text: 'Absalom). '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He walked in all the sins [of idol worship] that his father [Rehoboam] committed before him; and his heart was not entirely devoted to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God, like the heart of his father (forefather) David. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nevertheless, for David’s sake the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' his God gave him a lamp (descendant on the throne) in Jerusalem, setting up his son after him and establishing Jerusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: because David did what was right in the eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and had not turned aside from anything that He commanded him all the days of his life, except in the matter of [the betrayal of] Uriah the Hittite. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: There was war between Rehoboam [Abijam’s father] and Jeroboam all the days of Rehoboam’s life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now as for the rest of the acts of Abijam and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? And there was war between Abijam and Jeroboam.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Asa Succeeds Abijam
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Abijam slept with his fathers [in death] and they buried him in the City of David. Asa his son became king in his place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So in the twentieth year of Jeroboam king of Israel, Asa began to reign as king over Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He reigned forty-one years in Jerusalem. His [great-grand]mother was Maacah the daughter of Abishalom (Absalom). [1 Kin 15:2] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Asa did what was right in the eyes of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', as did his father (forefather) David. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He expelled the male cult prostitutes (sodomites) from the land and removed all the idols that his fathers [Solomon, Rehoboam, and Abijam] had made. [1 Kin 11:5-11; 14:22] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He also deposed his [great-grand]mother Maacah from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being
  - type: text
    text: ' queen mother, because she had made a horrid (obscene, vulgar) image for [the goddess] Asherah. Asa cut down her horrid image, and burned it by the Brook Kidron. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But the high places [of idol worship] were not removed. Nevertheless, Asa’s heart was entirely devoted to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' all his days. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He brought the things which his father had dedicated and the things which he had dedicated into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '—silver, gold, and utensils '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' accessories.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now there was war between Asa and Baasha king of Israel all their days. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Baasha king of Israel went up against Judah and fortified Ramah [north of Jerusalem], in order to prevent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anyone
  - type: text
    text: ' from going out or coming in to Asa king of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Asa took all the silver and gold left in the treasuries of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and the treasuries of the palace of the king and handed them over to his servants. And King Asa sent them to Ben-hadad the son of Tabrimmon, the son of Hezion, king of Aram (Syria), who lived in Damascus, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Let there be
  - type: text
    text: ' a treaty between me and you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as there was
  - type: text
    text: ' between my father and your father. Behold, I have sent you a gift of silver and gold; go, break your treaty with Baasha king of Israel, so that he will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. stop the blockade of Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'withdraw from me.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So Ben-hadad listened to king Asa and sent the commanders of his armies against the cities of Israel, and conquered Ijon, Dan, Abel-beth-maacah, and all Chinneroth [the region of the Sea of Galilee], along with all the land of Naphtali. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When Baasha heard about it, he stopped '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: building
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fortifying Ramah and stayed in Tirzah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then King Asa made a proclamation to all Judah—none was exempt—and they carried away the stones of Ramah and its timber with which Baasha had built [the fortifications]. And King Asa built with them [border fortresses at] Geba of Benjamin and Mizpah.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehoshaphat Succeeds Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now as for the rest of all the acts of Asa, all his might, everything that he did, and the cities which he built, are they not written in the Book of the Chronicles of the Kings of Judah? But during the time of his old age he had a foot disease. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Asa slept with his fathers [in death] and was buried with his fathers in the city of his father David. Jehoshaphat his son reigned in his place.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nadab, then Baasha, Rules over Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now Nadab the son of Jeroboam began to reign over Israel in the second year of Asa king of Judah, and he reigned over Israel for two years. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and walked in the way of his father [Jeroboam] and in his sin [of idolatry], with which he made Israel sin. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Baasha the son of Ahijah of the house (tribe) of Issachar conspired against Nadab, and Baasha struck him down at Gibbethon, which belonged to the Philistines, while Nadab and all Israel were laying siege to Gibbethon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Baasha killed Nadab in the third year of Asa king of Judah, and reigned in his place. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: As soon as he was king, Baasha struck down all the household of Jeroboam. He did not leave for Jeroboam anyone alive, but he destroyed them in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which He had spoken through His servant Ahijah the Shilonite— [1 Kin 14:9-16] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: because of the sins committed by Jeroboam and which he made Israel commit, and because he provoked the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel to anger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Now as for the rest of Nadab’s acts and everything that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: War with Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: There was war between Asa and Baasha king of Israel all their days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'In the third year of Asa king of Judah, Baasha the son of Ahijah became king over all Israel in Tirzah [the capital city], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and reigned
  - type: text
    text: ' twenty-four years. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and walked in the way of Jeroboam and in his sin [of idolatry] with which he made Israel sin.'
