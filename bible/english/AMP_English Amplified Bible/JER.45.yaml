document_id: JER.45,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Message to Baruch
  - type: text
    content: 'The word that Jeremiah the prophet spoke to '
  - type: note
    content: Baruch served as Jeremiah’s faithful friend and scribe, and he carefully recorded the prophecies given to Jeremiah by God. He was from a prominent family and his grandfather Maaseiah had been governor of Jerusalem in the days of King Josiah (2 Chr 34:8).
  - type: text
    content: 'Baruch the son of Neriah, when he had written these words in a book at the dictation of Jeremiah, in the fourth year of Jehoiakim the son of Josiah, king of Judah, saying, '
  '2':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, to you, O Baruch: '
  '3':
  - type: text
    content: ‘You said, “Woe is me! For the L
  - type: heading
    content: ord
  - type: text
    content: ' has added sorrow to my pain; I am weary with my groaning '
  - type: text
    content: and
  - type: text
    content: ' sighing and I find no rest.” ’ '
  '4':
  - type: text
    content: Say this to him, ‘The L
  - type: heading
    content: ord
  - type: text
    content: ' speaks in this way, “Behold, what I have built I will break down, and that which I have planted I will uproot, that is, the whole land.” '
  '5':
  - type: text
    content: And do you seek great things for yourself? Do not seek them; for behold, I will bring disaster on all flesh,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘but I will give your life to you [as your only reward and] as a prize of war wherever you go.’ ”'
