document_id: 1KI.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Baasha
  - type: text
    content: Now the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Jehu the son of Hanani against Baasha, saying, '
  '10':
  - type: text
    content: 'Then Zimri came in and struck and killed Elah in the twenty-seventh year of Asa king of Judah, and became king in his place. '
  '11':
  - type: text
    content: 'When he became king, as soon as he sat on his throne, he killed the entire household of Baasha; he did not leave a single male [alive], either of his '
  - type: note
    content: Lit blood avengers, referring to relatives who would have the obligation to kill Zimri to avenge Baasha’s death.
  - type: text
    content: relatives or his friends.
  '12':
  - type: text
    content: Thus Zimri destroyed the entire household of Baasha, in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He spoke against Baasha through Jehu the prophet, [1 Kin 16:3] '
  '13':
  - type: text
    content: for all the sins of Baasha and the sins of Elah his son, which they committed, and made Israel commit, provoking the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel to anger with their idols. '
  '14':
  - type: text
    content: Now as for the rest of the acts of Elah and everything that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  '15':
  - type: text
    content: 'In the twenty-seventh year of Asa king of Judah, Zimri reigned [over Israel] for seven days at Tirzah. Now the troops were camped against Gibbethon, [a city] which belonged to the Philistines, '
  '16':
  - type: text
    content: 'and the people who were camped heard it said, “Zimri has conspired and has also struck down the king.” So all Israel made Omri, the commander of the army, king over Israel that day in the camp. '
  '17':
  - type: text
    content: 'Then Omri went up from Gibbethon, and all Israel with him, and they besieged Tirzah. '
  '18':
  - type: text
    content: 'When Zimri saw that the city was taken, he went into the fortress of the king’s palace; and '
  - type: text
    content: while inside,
  - type: text
    content: ' he set fire to the king’s palace and died, '
  '19':
  - type: text
    content: because of the sins he had committed, doing evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', by walking in the way of Jeroboam, and because of his sin he caused Israel to sin. '
  '2':
  - type: text
    content: '“Because I exalted you [Baasha] from the dust and made you leader over My people Israel, and you walked in the way of Jeroboam and made My people Israel sin, provoking Me to anger with their sins [of idol worship], '
  '20':
  - type: text
    content: Now as for the rest of the acts of Zimri, and his [treasonous] conspiracy which he committed, are they not written in the Book of the Chronicles of the Kings of Israel?
  '21':
  - type: text
    content: 'Then the people of Israel were divided in half. Half of the people followed Tibni the son of Ginath, to make him king, and the '
  - type: text
    content: other
  - type: text
    content: ' half followed Omri. '
  '22':
  - type: text
    content: 'But the people who followed Omri prevailed over the people who followed Tibni the son of Ginath. So Tibni died and Omri became king. '
  '23':
  - type: text
    content: 'In the thirty-first year of Asa king of Judah, Omri became king over Israel '
  - type: text
    content: and reigned
  - type: text
    content: ' for twelve years. He reigned six years at Tirzah. '
  '24':
  - type: text
    content: 'Omri bought the hill Samaria from Shemer for two talents of silver, and he built '
  - type: text
    content: a city
  - type: text
    content: ' on the hill [and fortified it], and named the city which he built '
  - type: note
    content: Heb Shomeron.
  - type: text
    content: Samaria, after the owner of the hill, Shemer.
  '25':
  - type: text
    content: But Omri did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', and acted more wickedly than all who '
  - type: text
    content: came
  - type: text
    content: ' before him. '
  '26':
  - type: text
    content: He walked in all the ways of Jeroboam the son of Nebat and in his sin, which he made Israel commit, provoking the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, [to anger] with their idols. '
  '27':
  - type: text
    content: 'Now as for the rest of the acts of Omri which he did, and his might which he showed, are they not written in the Book of the Chronicles of the Kings of Israel? '
  '28':
  - type: text
    content: So Omri slept with his fathers [in death] and was buried in Samaria. Ahab his son became king in his place.
  '29':
  - type: text
    content: 'Ahab the son of Omri became king over Israel in the thirty-eighth year of Asa king of Judah, and Ahab the son of Omri reigned over Israel in Samaria for twenty-two years. '
  '3':
  - type: text
    content: 'behold, I am going to sweep away Baasha and his household (family), and I will make your house (royal line) like that of Jeroboam the son of Nebat. '
  '30':
  - type: text
    content: Ahab the son of Omri did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' more than all [the kings] who were before him.'
  '31':
  - type: text
    content: 'It came about, as if it had been a trivial thing for Ahab to walk in the sins of Jeroboam the son of Nebat, that he married '
  - type: note
    content: Jezebel was the chief priestess of the cult of Baal worship, which dominated the city of Tyre.
  - type: text
    content: 'Jezebel the daughter of Ethbaal king of the Sidonians, and went and served Baal and worshiped him. '
  '32':
  - type: text
    content: 'So he erected an altar for Baal in the house of Baal which he built in Samaria. '
  '33':
  - type: text
    content: Ahab also made the Asherah. Ahab did more to provoke the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel than all the kings of Israel who were before him. '
  '34':
  - type: text
    content: 'In his days, Hiel the Bethelite rebuilt Jericho. He laid its foundations with the '
  - type: text
    content: loss of
  - type: text
    content: ' Abiram his firstborn, and set up its gates with the '
  - type: text
    content: loss of
  - type: text
    content: ' his youngest son Segub, in accordance with the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ', which He spoke through Joshua the son of Nun. [Josh 6:26]'
  '4':
  - type: text
    content: The dogs will eat anyone belonging to Baasha who dies in the city, and the birds of the sky will eat anyone belonging to him who dies in the field.”
  '5':
  - type: text
    content: Now as for the rest of the acts of Baasha, what he did and his might, are they not written in the Book of the Chronicles of the Kings of Israel?
  - type: heading
    content: The Israelite Kings
  '6':
  - type: text
    content: 'Baasha slept with his fathers [in death] and was buried in Tirzah. Elah his son became king in his place. '
  '7':
  - type: text
    content: Moreover, the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came against Baasha and his household through the prophet Jehu the son of Hanani, both for all the evil that Baasha did in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ' in provoking Him to anger with the work of his hands (idolatry), in being like the house of Jeroboam, and because he [willingly] destroyed it (the family of Jeroboam).'
  '8':
  - type: text
    content: 'In the twenty-sixth year of Asa king of Judah, Elah the son of Baasha became king over Israel in Tirzah, '
  - type: text
    content: and reigned
  - type: text
    content: ' two years. '
  '9':
  - type: text
    content: 'His servant Zimri, commander of half his chariots, conspired against Elah. Now Elah was in Tirzah, getting drunk in the house of Arza, who was in charge of the [king’s] household in Tirzah. '
