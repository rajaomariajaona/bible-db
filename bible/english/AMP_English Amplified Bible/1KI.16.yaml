document_id: 1KI.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy against Baasha
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to Jehu the son of Hanani against Baasha, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Because I exalted you [Baasha] from the dust and made you leader over My people Israel, and you walked in the way of Jeroboam and made My people Israel sin, provoking Me to anger with their sins [of idol worship], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'behold, I am going to sweep away Baasha and his household (family), and I will make your house (royal line) like that of Jeroboam the son of Nebat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The dogs will eat anyone belonging to Baasha who dies in the city, and the birds of the sky will eat anyone belonging to him who dies in the field.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Now as for the rest of the acts of Baasha, what he did and his might, are they not written in the Book of the Chronicles of the Kings of Israel?
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Israelite Kings
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Baasha slept with his fathers [in death] and was buried in Tirzah. Elah his son became king in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moreover, the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came against Baasha and his household through the prophet Jehu the son of Hanani, both for all the evil that Baasha did in the sight of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in provoking Him to anger with the work of his hands (idolatry), in being like the house of Jeroboam, and because he [willingly] destroyed it (the family of Jeroboam).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In the twenty-sixth year of Asa king of Judah, Elah the son of Baasha became king over Israel in Tirzah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and reigned
  - type: text
    text: ' two years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'His servant Zimri, commander of half his chariots, conspired against Elah. Now Elah was in Tirzah, getting drunk in the house of Arza, who was in charge of the [king’s] household in Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Zimri came in and struck and killed Elah in the twenty-seventh year of Asa king of Judah, and became king in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When he became king, as soon as he sat on his throne, he killed the entire household of Baasha; he did not leave a single male [alive], either of his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: blood avengers,
      - type: text
        text: ' referring to relatives who would have the obligation to kill Zimri to avenge Baasha’s death.'
    marker-yv: yv-n
  - type: text
    text: relatives or his friends.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thus Zimri destroyed the entire household of Baasha, in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which He spoke against Baasha through Jehu the prophet, [1 Kin 16:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: for all the sins of Baasha and the sins of Elah his son, which they committed, and made Israel commit, provoking the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel to anger with their idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now as for the rest of the acts of Elah and everything that he did, are they not written in the Book of the Chronicles of the Kings of Israel?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In the twenty-seventh year of Asa king of Judah, Zimri reigned [over Israel] for seven days at Tirzah. Now the troops were camped against Gibbethon, [a city] which belonged to the Philistines, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and the people who were camped heard it said, “Zimri has conspired and has also struck down the king.” So all Israel made Omri, the commander of the army, king over Israel that day in the camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Omri went up from Gibbethon, and all Israel with him, and they besieged Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Zimri saw that the city was taken, he went into the fortress of the king’s palace; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: while inside,
  - type: text
    text: ' he set fire to the king’s palace and died, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: because of the sins he had committed, doing evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', by walking in the way of Jeroboam, and because of his sin he caused Israel to sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Now as for the rest of the acts of Zimri, and his [treasonous] conspiracy which he committed, are they not written in the Book of the Chronicles of the Kings of Israel?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the people of Israel were divided in half. Half of the people followed Tibni the son of Ginath, to make him king, and the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' half followed Omri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the people who followed Omri prevailed over the people who followed Tibni the son of Ginath. So Tibni died and Omri became king. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In the thirty-first year of Asa king of Judah, Omri became king over Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and reigned
  - type: text
    text: ' for twelve years. He reigned six years at Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Omri bought the hill Samaria from Shemer for two talents of silver, and he built '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a city
  - type: text
    text: ' on the hill [and fortified it], and named the city which he built '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shomeron
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Samaria, after the owner of the hill, Shemer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But Omri did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and acted more wickedly than all who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: came
  - type: text
    text: ' before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He walked in all the ways of Jeroboam the son of Nebat and in his sin, which he made Israel commit, provoking the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel, [to anger] with their idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now as for the rest of the acts of Omri which he did, and his might which he showed, are they not written in the Book of the Chronicles of the Kings of Israel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So Omri slept with his fathers [in death] and was buried in Samaria. Ahab his son became king in his place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ahab the son of Omri became king over Israel in the thirty-eighth year of Asa king of Judah, and Ahab the son of Omri reigned over Israel in Samaria for twenty-two years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ahab the son of Omri did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' more than all [the kings] who were before him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'It came about, as if it had been a trivial thing for Ahab to walk in the sins of Jeroboam the son of Nebat, that he married '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jezebel was the chief priestess of the cult of Baal worship, which dominated the city of Tyre.
    marker-yv: yv-n
  - type: text
    text: 'Jezebel the daughter of Ethbaal king of the Sidonians, and went and served Baal and worshiped him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So he erected an altar for Baal in the house of Baal which he built in Samaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ahab also made the Asherah. Ahab did more to provoke the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of Israel than all the kings of Israel who were before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'In his days, Hiel the Bethelite rebuilt Jericho. He laid its foundations with the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loss of
  - type: text
    text: ' Abiram his firstborn, and set up its gates with the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loss of
  - type: text
    text: ' his youngest son Segub, in accordance with the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which He spoke through Joshua the son of Nun. [Josh 6:26]'
