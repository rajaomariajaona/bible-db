document_id: LEV.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cleansing Unhealthiness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Whoever touches anything that has been under him shall be unclean until evening; and whoever carries those things shall wash his clothes and bathe in water, and be unclean until evening. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Whomever the one with the discharge touches without rinsing his hands in water shall wash his clothes and bathe in water, and be unclean until evening. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: An earthenware container that the one with the discharge touches shall be broken, and every wooden container shall be rinsed in water.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '‘When the man with the discharge becomes cleansed from his discharge, he shall count off seven days for his purification; he shall then wash his clothes and bathe his body in running water and will become clean. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: On the eighth day he shall take two turtledoves or two young pigeons and come before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to the doorway of the Tent of Meeting, and give them to the priest; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: and the priest shall offer them, one as a sin offering and the other as a burnt offering. So the priest shall make atonement for the man before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' because of his discharge.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '‘Now if any man has a seminal emission, he shall wash all his body in water, and be unclean until evening. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Every garment and every leather on which there is semen shall be washed with water, and shall be unclean until evening. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If a man lies with a woman so that there is a seminal emission, they shall both bathe in water and be unclean until evening.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '‘When a woman has a discharge, if her bodily discharge is blood, she shall continue in her menstrual impurity for seven days; and whoever touches her shall be unclean until evening. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the children of Israel, and say to them, ‘When any man has a bodily discharge, his discharge is unclean. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Everything on which she lies during her menstrual impurity shall be unclean; and everything on which she sits shall be unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Anyone who touches her bed shall wash his clothes and bathe in water, and be unclean until evening. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Whoever touches anything on which she sits shall wash his clothes and bathe in water, and be unclean until evening. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And if it is on her bed or on the thing on which she is sitting, when he touches it, he shall be unclean until evening. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: If a man actually lies with her so that her menstrual impurity is on him, he shall be unclean for seven days; and every bed on which he lies shall be unclean.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '‘Now if a woman has a flow of blood for many days, not during the time of her menstruation, or if she has a discharge beyond that period, as long as the impure discharge continues she shall be as she is in the days of her [normal] menstrual impurity; she is unclean. [Matt 9:20] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Every bed on which she lies during the time of her discharge shall be to her like the bed of her menstrual impurity, and whatever she sits on shall be unclean, like the uncleanness of her monthly period. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'And whoever touches those things shall be unclean, and shall wash his clothes and bathe in water, and be unclean until evening. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When she is cleansed from her discharge, then she shall count off for herself seven days, and after that she will be clean. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then on the eighth day she shall take for herself two turtledoves or two young pigeons and bring them to the priest at the doorway of the Tent of Meeting; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This shall be [the law concerning] his uncleanness in his discharge: whether his body allows its discharge to flow or obstructs its flow; it is uncleanness in him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: and the priest shall offer one as a sin offering and the other as a burnt offering; and he shall make atonement for her before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' for her unclean discharge.’'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“Thus you shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The meaning of the Hebrew is uncertain; another possibility is '
        - type: usfm
          marker: it
          children:
          - type: text
            text: caution…about their
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'separate the Israelites from their uncleanness, so that they do not die in their uncleanness by their defiling My tabernacle that is among them.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'This is the law for the one who has a discharge and for the one who has a seminal emission, so that he is unclean by it; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: and for the woman who is ill because of her monthly period, and for the one who has a discharge, whether man or woman, or for a man who lies with a woman who is [ceremonially] unclean.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Every bed on which the one who has the discharge lies becomes unclean, and everything on which he sits becomes unclean. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Whoever touches his bed shall wash his clothes, and bathe in water, and be unclean until evening; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and whoever sits on anything on which the man with the discharge has been sitting shall wash his clothes and bathe in water, and be unclean until evening. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Also whoever touches the man with the discharge shall wash his clothes and bathe in water, and be unclean until evening. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And if he who has the discharge spits on one who is clean, then he shall wash his clothes and bathe in water, and be unclean until evening. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Any saddle on which the man with the discharge rides becomes unclean. '
