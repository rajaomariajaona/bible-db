document_id: PSA.89,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 89
  - type: heading
    content: The Lord’s Covenant with David, and Israel’s Afflictions.
  - type: text
    content: 'A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem, of Ethan the Ezrahite.'
  - type: text
    content: 'I will sing of the goodness '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness of the L'
  - type: heading
    content: ord
  - type: text
    content: ' forever;'
  - type: text
    content: With my mouth I will make known Your faithfulness from generation to generation.
  '10':
  - type: text
    content: You have crushed Rahab (Egypt) like one who is slain;
  - type: text
    content: You have scattered Your enemies with Your mighty arm.
  '11':
  - type: text
    content: ¶The heavens are Yours, the earth also is Yours;
  - type: text
    content: 'The world and all that is in it, You have founded '
  - type: text
    content: and
  - type: text
    content: ' established them. [Gen 1:3]'
  '12':
  - type: text
    content: The north and the south, You have created them;
  - type: text
    content: Mount Tabor and Mount Hermon shout for joy at Your name.
  '13':
  - type: text
    content: You have a strong arm;
  - type: text
    content: Mighty is Your hand, Your right hand is exalted.
  '14':
  - type: text
    content: Righteousness and justice are the foundation of Your throne;
  - type: text
    content: Lovingkindness and truth go before You.
  '15':
  - type: text
    content: 'Blessed '
  - type: text
    content: and
  - type: text
    content: ' happy are the people who know the joyful sound [of the trumpet’s blast]!'
  - type: text
    content: They walk, O L
  - type: heading
    content: ord
  - type: text
    content: ', in the light '
  - type: text
    content: and
  - type: text
    content: ' favor of Your countenance!'
  '16':
  - type: text
    content: In Your name they rejoice all the day,
  - type: text
    content: And in Your righteousness they are exalted.
  '17':
  - type: text
    content: For You are the glory of their strength [their proud adornment],
  - type: text
    content: And by Your favor our horn is exalted.
  '18':
  - type: text
    content: For our shield belongs to the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And our king to the Holy One of Israel.
  '19':
  - type: text
    content: ¶Once You spoke in a vision to Your godly ones,
  - type: text
    content: And said, “I have given help to one who is mighty [giving him the power to be a champion for Israel];
  - type: text
    content: I have exalted one chosen from the people.
  '2':
  - type: text
    content: 'For I have said, “Goodness '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness will be built up forever;'
  - type: text
    content: In the heavens [unchangeable and majestic] You will establish Your faithfulness.”
  '20':
  - type: text
    content: “I have found David My servant;
  - type: text
    content: With My holy oil I have anointed him, [Acts 13:22]
  '21':
  - type: text
    content: 'With whom My hand shall be established '
  - type: text
    content: and
  - type: text
    content: ' steadfast;'
  - type: text
    content: My arm also shall strengthen him.
  '22':
  - type: text
    content: “The enemy will not outwit him,
  - type: text
    content: 'Nor will the wicked man afflict '
  - type: text
    content: or
  - type: text
    content: ' humiliate him.'
  '23':
  - type: text
    content: “I will crush his adversaries before him,
  - type: text
    content: And strike those who hate him.
  '24':
  - type: text
    content: “My faithfulness and My steadfast lovingkindness shall be with him,
  - type: text
    content: And in My name shall his horn be exalted [great power and prosperity shall be conferred upon him].
  '25':
  - type: text
    content: '“I will also '
  - type: note
    content: I.e. extend his area of influence.
  - type: text
    content: set his hand on the [Mediterranean] sea,
  - type: text
    content: And his right hand on the rivers [the tributaries of the Euphrates].
  '26':
  - type: text
    content: “He will cry to Me, ‘You are my Father,
  - type: text
    content: My God, and the rock of my salvation.’
  '27':
  - type: text
    content: “I will also make him My firstborn (preeminent),
  - type: text
    content: The highest of the kings of the earth. [Rev 1:5]
  '28':
  - type: text
    content: “My lovingkindness I will keep for him forevermore,
  - type: text
    content: And My covenant will be confirmed to him.
  '29':
  - type: text
    content: “His descendants I will establish forever,
  - type: text
    content: And his throne [will endure] as the days of heaven. [Is 9:7; Jer 33:14-26; Gal 3:16]
  '3':
  - type: text
    content: '[God has said] “I have made a covenant with My chosen one;'
  - type: text
    content: I have sworn to David My servant,
  '30':
  - type: text
    content: '¶“If his children '
  - type: note
    content: Lit forsake.
  - type: text
    content: turn away from My law
  - type: text
    content: And do not walk in My ordinances,
  '31':
  - type: text
    content: If they break My statutes
  - type: text
    content: And do not keep My commandments,
  '32':
  - type: text
    content: Then I will punish their transgression with the rod [of discipline],
  - type: text
    content: And [correct] their wickedness with stripes. [2 Sam 7:14]
  '33':
  - type: text
    content: “Nevertheless, I will not break off My lovingkindness from him,
  - type: text
    content: Nor allow My faithfulness to fail.
  '34':
  - type: text
    content: “My covenant I will not violate,
  - type: text
    content: Nor will I alter the utterance of My lips.
  '35':
  - type: text
    content: “Once [for all] I have sworn by My holiness, [My vow which cannot be violated];
  - type: text
    content: I will not lie to David.
  '36':
  - type: text
    content: '“His '
  - type: note
    content: Lit seed.
  - type: text
    content: descendants shall endure forever
  - type: text
    content: And his throne [will continue] as the sun before Me. [Is 9:7; Jer 33:14-26; Gal 3:16]
  '37':
  - type: text
    content: “It shall be established forever like the moon,
  - type: text
    content: 'And the witness in the heavens is ever faithful.” [Rev 1:5; 3:14] '
  - type: text
    content: Selah.
  '38':
  - type: text
    content: ¶But [in apparent contradiction of all this] You [the faithful L
  - type: heading
    content: ord
  - type: text
    content: '] have cast off and rejected;'
  - type: text
    content: You have been full of wrath against Your anointed.
  '39':
  - type: text
    content: 'You have spurned '
  - type: text
    content: and
  - type: text
    content: ' repudiated the covenant with Your servant;'
  - type: text
    content: You have profaned his crown [by casting it] in the dust.
  '4':
  - type: text
    content: I will establish your seed forever
  - type: text
    content: 'And I will build up your throne for all generations.” [Is 9:7; Jer 33:14-26; Luke 1:32, 33; Gal 3:16] '
  - type: text
    content: Selah.
  '40':
  - type: text
    content: You have broken down all his [city] walls;
  - type: text
    content: You have brought his strongholds to ruin.
  '41':
  - type: text
    content: All who pass along the road rob him;
  - type: text
    content: He has become the scorn of his neighbors.
  '42':
  - type: text
    content: You have exalted the right hand of his foes;
  - type: text
    content: You have made all his enemies rejoice.
  '43':
  - type: text
    content: Also, You have turned back the edge of his sword
  - type: text
    content: And have not made him [strong enough] to stand in battle.
  '44':
  - type: text
    content: You have put an end to his splendor
  - type: text
    content: And have hurled his throne to the ground.
  '45':
  - type: text
    content: You have shortened the days of his youth;
  - type: text
    content: 'You have covered him with shame. '
  - type: text
    content: Selah.
  '46':
  - type: text
    content: ¶How long, O L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: Will You hide Yourself forever?
  - type: text
    content: Will Your wrath burn like fire?
  '47':
  - type: text
    content: Remember how fleeting my lifetime is;
  - type: text
    content: For what vanity, [for what emptiness, for what futility, for what wisp of smoke] You have created all the sons of men!
  '48':
  - type: text
    content: What man can live and not see death?
  - type: text
    content: 'Can he rescue his soul from the [powerful] hand of Sheol (the nether world, the place of the dead)? '
  - type: text
    content: Selah.
  '49':
  - type: text
    content: ¶O Lord, where are Your former lovingkindnesses [so abundant in the days of David and Solomon],
  - type: text
    content: Which You swore to David in Your faithfulness?
  '5':
  - type: text
    content: ¶The heavens (angels) praise Your wonders, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Your faithfulness also in the assembly of the holy ones.
  '50':
  - type: text
    content: Remember, O Lord, the reproach of Your servants [scorned, insulted, and disgraced];
  - type: text
    content: 'How I bear in '
  - type: note
    content: Lit the fold of my garment.
  - type: text
    content: my heart the reproach of all the many peoples,
  '51':
  - type: text
    content: With which Your enemies have taunted, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: With which they have mocked the footsteps of Your anointed.
  '52':
  - type: text
    content: ¶Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ' forevermore!'
  - type: text
    content: Amen and Amen.
  '6':
  - type: text
    content: For who in the heavens can be compared to the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: Who among the divine beings is like the L
  - type: heading
    content: ord
  - type: text
    content: ','
  '7':
  - type: text
    content: 'A God greatly feared '
  - type: text
    content: and
  - type: text
    content: ' reverently worshiped in the council of the holy [angelic] ones,'
  - type: text
    content: And awesome above all those who are around Him?
  '8':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ' God of hosts, who is like You, O mighty L'
  - type: heading
    content: ord
  - type: text
    content: '?'
  - type: text
    content: Your faithfulness surrounds You [as an intrinsic, unchangeable part of Your very being].
  '9':
  - type: text
    content: You rule the swelling of the sea;
  - type: text
    content: When its waves rise, You still them. [Ps 65:7; 107:29; Mark 4:39]
