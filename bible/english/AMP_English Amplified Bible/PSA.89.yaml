  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Covenant with David, and Israel’s Afflictions.'
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem, of Ethan the Ezrahite.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will sing of the goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' forever;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With my mouth I will make known Your faithfulness from generation to generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I have said, “Goodness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness will be built up forever;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the heavens [unchangeable and majestic] You will establish Your faithfulness.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '[God has said] “I have made a covenant with My chosen one;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have sworn to David My servant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will establish your seed forever
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will build up your throne for all generations.” [Is 9:7; Jer 33:14-26; Luke 1:32, 33; Gal 3:16] '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶The heavens (angels) praise Your wonders, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness also in the assembly of the holy ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For who in the heavens can be compared to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who among the divine beings is like the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A God greatly feared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reverently worshiped in the council of the holy [angelic] ones,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And awesome above all those who are around Him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God of hosts, who is like You, O mighty L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness surrounds You [as an intrinsic, unchangeable part of Your very being].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You rule the swelling of the sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When its waves rise, You still them. [Ps 65:7; 107:29; Mark 4:39]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You have crushed Rahab (Egypt) like one who is slain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have scattered Your enemies with Your mighty arm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶The heavens are Yours, the earth also is Yours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The world and all that is in it, You have founded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established them. [Gen 1:3]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The north and the south, You have created them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mount Tabor and Mount Hermon shout for joy at Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You have a strong arm;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mighty is Your hand, Your right hand is exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Righteousness and justice are the foundation of Your throne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lovingkindness and truth go before You.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' happy are the people who know the joyful sound [of the trumpet’s blast]!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They walk, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in the light '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' favor of Your countenance!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: In Your name they rejoice all the day,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in Your righteousness they are exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For You are the glory of their strength [their proud adornment],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by Your favor our horn is exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For our shield belongs to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And our king to the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ¶Once You spoke in a vision to Your godly ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And said, “I have given help to one who is mighty [giving him the power to be a champion for Israel];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have exalted one chosen from the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “I have found David My servant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: With My holy oil I have anointed him, [Acts 13:22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'With whom My hand shall be established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' steadfast;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My arm also shall strengthen him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “The enemy will not outwit him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor will the wicked man afflict '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' humiliate him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I will crush his adversaries before him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And strike those who hate him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “My faithfulness and My steadfast lovingkindness shall be with him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in My name shall his horn be exalted [great power and prosperity shall be conferred upon him].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“I will also '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '89:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. extend his area of influence.
    marker-yv: yv-n
  - type: text
    text: set his hand on the [Mediterranean] sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his right hand on the rivers [the tributaries of the Euphrates].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “He will cry to Me, ‘You are my Father,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My God, and the rock of my salvation.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “I will also make him My firstborn (preeminent),
- type: usfm
  marker: q1
  children:
  - type: text
    text: The highest of the kings of the earth. [Rev 1:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “My lovingkindness I will keep for him forevermore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My covenant will be confirmed to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “His descendants I will establish forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his throne [will endure] as the days of heaven. [Is 9:7; Jer 33:14-26; Gal 3:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '¶“If his children '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '89:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forsake
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: turn away from My law
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not walk in My ordinances,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If they break My statutes
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do not keep My commandments,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then I will punish their transgression with the rod [of discipline],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [correct] their wickedness with stripes. [2 Sam 7:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “Nevertheless, I will not break off My lovingkindness from him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor allow My faithfulness to fail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “My covenant I will not violate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will I alter the utterance of My lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “Once [for all] I have sworn by My holiness, [My vow which cannot be violated];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not lie to David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '89:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: seed.
    marker-yv: yv-n
  - type: text
    text: descendants shall endure forever
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his throne [will continue] as the sun before Me. [Is 9:7; Jer 33:14-26; Gal 3:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “It shall be established forever like the moon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the witness in the heavens is ever faithful.” [Rev 1:5; 3:14] '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ¶But [in apparent contradiction of all this] You [the faithful L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] have cast off and rejected;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been full of wrath against Your anointed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'You have spurned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repudiated the covenant with Your servant;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have profaned his crown [by casting it] in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: You have broken down all his [city] walls;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have brought his strongholds to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: All who pass along the road rob him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has become the scorn of his neighbors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: You have exalted the right hand of his foes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have made all his enemies rejoice.
- type: usfm
  marker: q1
  children:
