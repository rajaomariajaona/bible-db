document_id: PSA.89,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 89
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ’
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: s
      - type: text
        text: ' Covenant with David, and Israel’s Afflictions.'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A skillful song, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem, of Ethan the Ezrahite.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing of the goodness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forever;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my mouth I will make known Your faithfulness from generation to generation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have crushed Rahab (Egypt) like one who is slain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have scattered Your enemies with Your mighty arm.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The heavens are Yours, the earth also is Yours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The world and all that is in it, You have founded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' established them. [Gen 1:3]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The north and the south, You have created them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mount Tabor and Mount Hermon shout for joy at Your name.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have a strong arm;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mighty is Your hand, Your right hand is exalted.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness and justice are the foundation of Your throne;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lovingkindness and truth go before You.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' happy are the people who know the joyful sound [of the trumpet’s blast]!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They walk, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in the light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favor of Your countenance!'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In Your name they rejoice all the day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in Your righteousness they are exalted.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You are the glory of their strength [their proud adornment],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by Your favor our horn is exalted.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For our shield belongs to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And our king to the Holy One of Israel.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Once You spoke in a vision to Your godly ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And said, “I have given help to one who is mighty [giving him the power to be a champion for Israel];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have exalted one chosen from the people.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I have said, “Goodness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness will be built up forever;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the heavens [unchangeable and majestic] You will establish Your faithfulness.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have found David My servant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With My holy oil I have anointed him, [Acts 13:22]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With whom My hand shall be established '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My arm also shall strengthen him.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The enemy will not outwit him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor will the wicked man afflict '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' humiliate him.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will crush his adversaries before him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And strike those who hate him.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My faithfulness and My steadfast lovingkindness shall be with him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in My name shall his horn be exalted [great power and prosperity shall be conferred upon him].
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will also '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. extend his area of influence.
      marker-yv: yv-n
    - type: text
      text: set his hand on the [Mediterranean] sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his right hand on the rivers [the tributaries of the Euphrates].
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will cry to Me, ‘You are my Father,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God, and the rock of my salvation.’
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will also make him My firstborn (preeminent),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The highest of the kings of the earth. [Rev 1:5]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My lovingkindness I will keep for him forevermore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And My covenant will be confirmed to him.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His descendants I will establish forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his throne [will endure] as the days of heaven. [Is 9:7; Jer 33:14-26; Gal 3:16]
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[God has said] “I have made a covenant with My chosen one;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have sworn to David My servant,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“If his children '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: forsake
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: turn away from My law
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not walk in My ordinances,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they break My statutes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not keep My commandments,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will punish their transgression with the rod [of discipline],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [correct] their wickedness with stripes. [2 Sam 7:14]
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Nevertheless, I will not break off My lovingkindness from him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor allow My faithfulness to fail.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My covenant I will not violate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will I alter the utterance of My lips.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Once [for all] I have sworn by My holiness, [My vow which cannot be violated];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not lie to David.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: seed.
      marker-yv: yv-n
    - type: text
      text: descendants shall endure forever
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his throne [will continue] as the sun before Me. [Is 9:7; Jer 33:14-26; Gal 3:16]
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It shall be established forever like the moon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the witness in the heavens is ever faithful.” [Rev 1:5; 3:14] '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶But [in apparent contradiction of all this] You [the faithful L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] have cast off and rejected;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been full of wrath against Your anointed.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have spurned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' repudiated the covenant with Your servant;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have profaned his crown [by casting it] in the dust.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will establish your seed forever
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will build up your throne for all generations.” [Is 9:7; Jer 33:14-26; Luke 1:32, 33; Gal 3:16] '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have broken down all his [city] walls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have brought his strongholds to ruin.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who pass along the road rob him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has become the scorn of his neighbors.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have exalted the right hand of his foes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made all his enemies rejoice.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Also, You have turned back the edge of his sword
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have not made him [strong enough] to stand in battle.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have put an end to his splendor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have hurled his throne to the ground.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have shortened the days of his youth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have covered him with shame. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶How long, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will You hide Yourself forever?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will Your wrath burn like fire?
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember how fleeting my lifetime is;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what vanity, [for what emptiness, for what futility, for what wisp of smoke] You have created all the sons of men!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What man can live and not see death?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Can he rescue his soul from the [powerful] hand of Sheol (the nether world, the place of the dead)? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O Lord, where are Your former lovingkindnesses [so abundant in the days of David and Solomon],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which You swore to David in Your faithfulness?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶The heavens (angels) praise Your wonders, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your faithfulness also in the assembly of the holy ones.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember, O Lord, the reproach of Your servants [scorned, insulted, and disgraced];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How I bear in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the fold of my garment
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: my heart the reproach of all the many peoples,
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With which Your enemies have taunted, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With which they have mocked the footsteps of Your anointed.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forevermore!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen and Amen.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For who in the heavens can be compared to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who among the divine beings is like the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A God greatly feared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverently worshiped in the council of the holy [angelic] ones,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And awesome above all those who are around Him?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of hosts, who is like You, O mighty L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your faithfulness surrounds You [as an intrinsic, unchangeable part of Your very being].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rule the swelling of the sea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When its waves rise, You still them. [Ps 65:7; 107:29; Mark 4:39]
