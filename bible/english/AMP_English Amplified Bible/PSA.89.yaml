    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will You hide Yourself forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will Your wrath burn like fire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Remember how fleeting my lifetime is;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For what vanity, [for what emptiness, for what futility, for what wisp of smoke] You have created all the sons of men!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
