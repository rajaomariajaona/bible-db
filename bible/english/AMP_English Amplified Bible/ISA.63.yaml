document_id: ISA.63,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Vengeance on the Nations
  - type: text
    content: Who is this who comes from Edom,
  - type: text
    content: With crimson-stained garments from Bozrah [in Edom],
  - type: text
    content: This One (the Messiah) who is majestic in His apparel,
  - type: text
    content: Marching in the greatness of His might?
  - type: text
    content: “It is I, [the One] who speaks in righteousness [proclaiming vindication], mighty to save.”
  '10':
  - type: text
    content: But they rebelled
  - type: text
    content: And grieved His Holy Spirit;
  - type: text
    content: Therefore He changed into their enemy,
  - type: text
    content: And He fought against them.
  '11':
  - type: text
    content: Then His people remembered the days of old, of Moses [and they said],
  - type: text
    content: Where is He who brought our fathers up out of the [Red] Sea, with the shepherds of His flock [Moses and Aaron]?
  - type: text
    content: Where is He who put His Holy Spirit in their midst,
  '12':
  - type: text
    content: 'Who caused His glorious arm '
  - type: text
    content: and
  - type: text
    content: ' infinite power to go at the right hand of Moses,'
  - type: text
    content: Dividing the waters before them to make for Himself an everlasting name,
  '13':
  - type: text
    content: Who led them through the depths [of the Red Sea],
  - type: text
    content: Like a horse in the wilderness, [so that] they did not stumble?
  '14':
  - type: text
    content: Like the cattle that go down into the valley [to find better pasture and rest],
  - type: text
    content: The Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' gave them rest.'
  - type: text
    content: So You led Your people [O L
  - type: heading
    content: ord
  - type: text
    content: ']'
  - type: text
    content: 'To make for Yourself a beautiful '
  - type: text
    content: and
  - type: text
    content: ' glorious name [preparing the way for the acknowledgment of Your name by all nations].'
  - type: heading
    content: “You Are Our Father”
  '15':
  - type: text
    content: ¶Look down from heaven and see from Your lofty dwelling place, holy and glorious.
  - type: text
    content: Where are Your zeal and Your mighty acts [Your miracles which you did for Your people]?
  - type: text
    content: 'The stirring of Your heart and Your compassion are restrained '
  - type: text
    content: and
  - type: text
    content: ' withheld from me.'
  '16':
  - type: text
    content: For [most certainly] You are our Father, even though Abraham [our ancestor] does not know us
  - type: text
    content: And Israel does not acknowledge us.
  - type: text
    content: You, O L
  - type: heading
    content: ord
  - type: text
    content: ', are [still] our Father,'
  - type: text
    content: Our Redeemer from everlasting is Your name.
  '17':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', why do You cause us to stray from Your ways'
  - type: text
    content: And harden our heart from fearing You [with reverence and awe]?
  - type: text
    content: Return for Your servants’ sake, the tribes of Your heritage.
  '18':
  - type: text
    content: Your holy people possessed Your sanctuary for [only] a little while;
  - type: text
    content: Our adversaries have trampled it down.
  '19':
  - type: text
    content: 'We have become '
  - type: text
    content: like
  - type: text
    content: ' those over whom You have never ruled,'
  - type: text
    content: Like
  - type: text
    content: ' those who were not called by Your name.'
  '2':
  - type: text
    content: Why is Your apparel red,
  - type: text
    content: And Your garments like the one who treads in the wine press?
  '3':
  - type: text
    content: “I have trodden the wine trough alone,
  - type: text
    content: And of the peoples there was no one with Me.
  - type: text
    content: I also trod them in My anger
  - type: text
    content: And trampled them in My wrath;
  - type: text
    content: And their lifeblood is sprinkled on My garments,
  - type: text
    content: And I stained all My clothes.
  '4':
  - type: text
    content: “For the day of vengeance [against ungodliness] was in My heart,
  - type: text
    content: And My year of redemption [of those who put their trust in Me—the year of My redeemed] has come.
  '5':
  - type: text
    content: “I looked, but there was no one to help,
  - type: text
    content: 'And I was amazed '
  - type: text
    content: and
  - type: text
    content: ' appalled that there was no one to uphold [truth and right].'
  - type: text
    content: So My own arm brought salvation to Me,
  - type: text
    content: And My wrath sustained Me.
  '6':
  - type: text
    content: “I trampled the peoples in My anger
  - type: text
    content: And made them drunk with [the cup of] My wrath,
  - type: text
    content: And I spilled their lifeblood on the earth.”
  - type: heading
    content: God’s Ancient Mercies Recalled
  '7':
  - type: text
    content: ¶I will tell of the lovingkindnesses of the L
  - type: heading
    content: ord
  - type: text
    content: ', and the praiseworthy deeds of the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: According to all that the L
  - type: heading
    content: ord
  - type: text
    content: ' has done for us,'
  - type: text
    content: 'And '
  - type: text
    content: His
  - type: text
    content: ' great goodness toward the house of Israel,'
  - type: text
    content: Which He has shown them according to His compassion
  - type: text
    content: And according to the abundance of His lovingkindnesses.
  '8':
  - type: text
    content: For He said, “Be assured, they are My people,
  - type: text
    content: Sons who will not be faithless.”
  - type: text
    content: So He became their Savior [in all their distresses].
  '9':
  - type: text
    content: In all their distress He was distressed,
  - type: text
    content: 'And the '
  - type: note
    content: See note Gen 16:7.
  - type: text
    content: angel of His presence saved them,
  - type: text
    content: In His love and in His compassion He redeemed them;
  - type: text
    content: And He lifted them up and carried them all the days of old. [Ex 23:20-23; 33:14, 15; Deut 1:31; 32:10-12]
