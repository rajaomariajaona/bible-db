document_id: ISA.63
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Vengeance on the Nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Who is this who comes from Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With crimson-stained garments from Bozrah [in Edom],
- type: usfm
  marker: q1
  children:
  - type: text
    text: This One (the Messiah) who is majestic in His apparel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marching in the greatness of His might?
- type: usfm
  marker: q1
  children:
  - type: text
    text: “It is I, [the One] who speaks in righteousness [proclaiming vindication], mighty to save.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Why is Your apparel red,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your garments like the one who treads in the wine press?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I have trodden the wine trough alone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And of the peoples there was no one with Me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I also trod them in My anger
- type: usfm
  marker: q1
  children:
  - type: text
    text: And trampled them in My wrath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their lifeblood is sprinkled on My garments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I stained all My clothes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “For the day of vengeance [against ungodliness] was in My heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My year of redemption [of those who put their trust in Me—the year of My redeemed] has come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I looked, but there was no one to help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I was amazed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' appalled that there was no one to uphold [truth and right].'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So My own arm brought salvation to Me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And My wrath sustained Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I trampled the peoples in My anger
- type: usfm
  marker: q1
  children:
  - type: text
    text: And made them drunk with [the cup of] My wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I spilled their lifeblood on the earth.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Ancient Mercies Recalled
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶I will tell of the lovingkindnesses of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and the praiseworthy deeds of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: According to all that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has done for us,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' great goodness toward the house of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which He has shown them according to His compassion
- type: usfm
  marker: q1
  children:
  - type: text
    text: And according to the abundance of His lovingkindnesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For He said, “Be assured, they are My people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sons who will not be faithless.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: So He became their Savior [in all their distresses].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: In all their distress He was distressed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 16:7.
    marker-yv: yv-n
  - type: text
    text: angel of His presence saved them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In His love and in His compassion He redeemed them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He lifted them up and carried them all the days of old. [Ex 23:20-23; 33:14, 15; Deut 1:31; 32:10-12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But they rebelled
- type: usfm
  marker: q1
  children:
  - type: text
    text: And grieved His Holy Spirit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore He changed into their enemy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He fought against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then His people remembered the days of old, of Moses [and they said],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is He who brought our fathers up out of the [Red] Sea, with the shepherds of His flock [Moses and Aaron]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is He who put His Holy Spirit in their midst,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Who caused His glorious arm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' infinite power to go at the right hand of Moses,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dividing the waters before them to make for Himself an everlasting name,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Who led them through the depths [of the Red Sea],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a horse in the wilderness, [so that] they did not stumble?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Like the cattle that go down into the valley [to find better pasture and rest],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gave them rest.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: So You led Your people [O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ']'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To make for Yourself a beautiful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorious name [preparing the way for the acknowledgment of Your name by all nations].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: “You Are Our Father”
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ¶Look down from heaven and see from Your lofty dwelling place, holy and glorious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where are Your zeal and Your mighty acts [Your miracles which you did for Your people]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The stirring of Your heart and Your compassion are restrained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' withheld from me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For [most certainly] You are our Father, even though Abraham [our ancestor] does not know us
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Israel does not acknowledge us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', are [still] our Father,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our Redeemer from everlasting is Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', why do You cause us to stray from Your ways'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And harden our heart from fearing You [with reverence and awe]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return for Your servants’ sake, the tribes of Your heritage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Your holy people possessed Your sanctuary for [only] a little while;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our adversaries have trampled it down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'We have become '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like
  - type: text
    text: ' those over whom You have never ruled,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Like
  - type: text
    text: ' those who were not called by Your name.'
