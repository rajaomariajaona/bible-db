document_id: 1KI.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Alliance with King Hiram
  - type: text
    content: 'Hiram king of Tyre sent his servants to Solomon when he heard that they had anointed him king in place of his father, for Hiram had always been a friend of David. '
  '10':
  - type: text
    content: 'So Hiram gave Solomon all the cedar and cypress timber he desired, '
  '11':
  - type: text
    content: 'and Solomon gave Hiram 20,000 '
  - type: note
    content: See note 4:22.
  - type: text
    content: 'kors of wheat as food for his household, and 20 kors of pure [olive] oil. Solomon gave all these to Hiram each year. '
  '12':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' gave Solomon wisdom, just as He promised him; and there was peace between Hiram and Solomon, and the two of them made a treaty.'
  - type: heading
    content: Conscription of Laborers
  '13':
  - type: text
    content: 'King Solomon levied forced laborers from all Israel; and the forced laborers numbered 30,000 men. '
  '14':
  - type: text
    content: 'He sent them to Lebanon, 10,000 a month in shifts; one month they were in Lebanon and two months at home. Adoniram was in charge of the forced laborers. '
  '15':
  - type: text
    content: 'Solomon had 70,000 burden bearers (transporters) and 80,000 stonemasons in the hill country [of Judah], '
  '16':
  - type: text
    content: 'besides Solomon’s 3,300 chief deputies who were in charge of the project and who were in charge of the people doing the work. '
  '17':
  - type: text
    content: 'The king gave orders, and they quarried great '
  - type: note
    content: These great foundation stones still exist. One of them is almost thirty-nine feet long; it is the chief cornerstone of the Dome of the Rock’s massive wall, placed in its present position 3,000 years ago. Markings on the stones represent the culture of Phoenicia, the region around Tyre from which Solomon received building materials for the temple.
  - type: text
    content: 'stones, valuable stones, to lay the foundation of the house (temple) with cut stones. '
  '18':
  - type: text
    content: 'So Solomon’s builders and Hiram’s builders and the men of '
  - type: note
    content: A city in Lebanon, ancient Byblos.
  - type: text
    content: 'Gebal cut '
  - type: text
    content: and
  - type: text
    content: ' chiseled '
  - type: text
    content: the stones,
  - type: text
    content: ' and prepared the timber and the stones to build the house (temple).'
  '2':
  - type: text
    content: 'Then Solomon sent '
  - type: text
    content: word
  - type: text
    content: ' to Hiram, saying, '
  '3':
  - type: text
    content: “You know that David my father could not build a house (temple) for the Name (Presence) of the L
  - type: heading
    content: ord
  - type: text
    content: ' his God because of the wars which surrounded him, until the L'
  - type: heading
    content: ord
  - type: text
    content: ' put his enemies under his feet. [2 Sam 7:4ff; 1 Chr 22:8] '
  '4':
  - type: text
    content: But now that the L
  - type: heading
    content: ord
  - type: text
    content: ' my God has given me rest [from war] on every side, there is neither adversary nor misfortune [confronting me]. '
  '5':
  - type: text
    content: Behold, I intend to build a house (temple) to the Name of the L
  - type: heading
    content: ord
  - type: text
    content: ' my God, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' said to my father David: ‘Your son whom I will put on your throne in your place shall build the house for My Name '
  - type: text
    content: and
  - type: text
    content: ' Presence.’ '
  '6':
  - type: text
    content: So now, command that they cut cedar trees from Lebanon for me, and my servants will join your servants, and I will give you whatever wages you set for your servants. For you know that there is no one among us who knows how to cut timber like the men of Sidon.”
  '7':
  - type: text
    content: When Hiram heard the words of Solomon, he rejoiced greatly and said, “Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ' this day, who has given David a wise son [to be king] over this great people.” '
  '8':
  - type: text
    content: 'So Hiram sent '
  - type: text
    content: word
  - type: text
    content: ' to Solomon, saying, “I have heard '
  - type: text
    content: the message
  - type: text
    content: ' which you sent to me; I will do everything you wish concerning the cedar and cypress timber. '
  '9':
  - type: text
    content: 'My servants will bring the logs down from Lebanon to the [Mediterranean] sea, and I will have them made into rafts '
  - type: text
    content: to go
  - type: text
    content: ' by sea to the place (port) that you direct me; then I will have them broken up there, and you shall carry '
  - type: text
    content: them
  - type: text
    content: ' away. Then you shall '
  - type: note
    content: Lit fulfill my desire.
  - type: text
    content: 'return the favor by providing food for my household.” '
