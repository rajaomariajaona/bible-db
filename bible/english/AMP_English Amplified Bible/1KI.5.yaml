document_id: 1KI.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alliance with King Hiram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiram king of Tyre sent his servants to Solomon when he heard that they had anointed him king in place of his father, for Hiram had always been a friend of David. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hiram gave Solomon all the cedar and cypress timber he desired, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Solomon gave Hiram 20,000 '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 4:22.
      marker-yv: yv-n
    - type: text
      text: 'kors of wheat as food for his household, and 20 kors of pure [olive] oil. Solomon gave all these to Hiram each year. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave Solomon wisdom, just as He promised him; and there was peace between Hiram and Solomon, and the two of them made a treaty.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Conscription of Laborers
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Solomon levied forced laborers from all Israel; and the forced laborers numbered 30,000 men. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He sent them to Lebanon, 10,000 a month in shifts; one month they were in Lebanon and two months at home. Adoniram was in charge of the forced laborers. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon had 70,000 burden bearers (transporters) and 80,000 stonemasons in the hill country [of Judah], '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'besides Solomon’s 3,300 chief deputies who were in charge of the project and who were in charge of the people doing the work. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king gave orders, and they quarried great '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These great foundation stones still exist. One of them is almost thirty-nine feet long; it is the chief cornerstone of the Dome of the Rock’s massive wall, placed in its present position 3,000 years ago. Markings on the stones represent the culture of Phoenicia, the region around Tyre from which Solomon received building materials for the temple.
      marker-yv: yv-n
    - type: text
      text: 'stones, valuable stones, to lay the foundation of the house (temple) with cut stones. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon’s builders and Hiram’s builders and the men of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A city in Lebanon, ancient Byblos.
      marker-yv: yv-n
    - type: text
      text: 'Gebal cut '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chiseled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the stones,
    - type: text
      text: ' and prepared the timber and the stones to build the house (temple).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Solomon sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Hiram, saying, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You know that David my father could not build a house (temple) for the Name (Presence) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' his God because of the wars which surrounded him, until the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' put his enemies under his feet. [2 Sam 7:4ff; 1 Chr 22:8] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God has given me rest [from war] on every side, there is neither adversary nor misfortune [confronting me]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Behold, I intend to build a house (temple) to the Name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to my father David: ‘Your son whom I will put on your throne in your place shall build the house for My Name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Presence.’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So now, command that they cut cedar trees from Lebanon for me, and my servants will join your servants, and I will give you whatever wages you set for your servants. For you know that there is no one among us who knows how to cut timber like the men of Sidon.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Hiram heard the words of Solomon, he rejoiced greatly and said, “Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' this day, who has given David a wise son [to be king] over this great people.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hiram sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Solomon, saying, “I have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the message
    - type: text
      text: ' which you sent to me; I will do everything you wish concerning the cedar and cypress timber. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My servants will bring the logs down from Lebanon to the [Mediterranean] sea, and I will have them made into rafts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to go
    - type: text
      text: ' by sea to the place (port) that you direct me; then I will have them broken up there, and you shall carry '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' away. Then you shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fulfill my desire.
      marker-yv: yv-n
    - type: text
      text: 'return the favor by providing food for my household.” '
