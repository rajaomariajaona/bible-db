    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word “Shekinah” does not appear in Scripture, but has been used by both Christians and Jews to describe the visible divine Presence of God, in such things as the burning bush, the cloud and the pillar of fire that led the Hebrews in the wilderness, and the Presence of God that rested between the cherubim over the mercy seat of the ark.
    marker-yv: yv-n
  - type: text
    text: 'Shekinah glory, the Light-being, the brilliant light of the divine], and the exact representation '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
