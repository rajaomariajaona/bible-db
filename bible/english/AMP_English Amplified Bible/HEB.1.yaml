    - type: text
      text: '1'
  - type: text
    text: 'God, having spoken to the fathers long ago in [the voices and writings of] the prophets in many separate revelations [each of which set forth a portion of the truth], and in many ways, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'has in these last days spoken [with finality] to us in [the person of One who is by His character and nature] His Son [namely Jesus], whom He appointed heir '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lawful owner of all things, through whom also He created the universe [that is, the universe as a space-time-matter continuum]. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The Son is the radiance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' only expression of the glory of [our awesome] God [reflecting God’s '
