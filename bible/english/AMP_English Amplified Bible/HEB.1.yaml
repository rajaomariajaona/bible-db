  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' maintaining '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' propelling all things [the entire physical and spiritual universe] by His powerful word [carrying the universe along to its predetermined goal]. When He [Himself and no other] had [by offering Himself on the cross as a sacrifice for sin] accomplished purification from sins '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established our freedom from guilt, He sat down [revealing His completed work] at the right hand of the Majesty on high [revealing His Divine authority], '
