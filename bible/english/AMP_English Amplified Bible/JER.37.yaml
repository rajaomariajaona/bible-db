document_id: JER.37,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah Warns against Trust in Pharaoh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Nebuchadnezzar king of Babylon made Zedekiah the son of Josiah king in the land of Judah so he reigned as king instead of Coniah (also called Jeconiah and Jehoiachin) the son of Jehoiakim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For even if you had defeated the whole army of the Chaldeans who fight against you, and there remained only the wounded men among them, yet they would rise up, every man confined in his tent, and burn down this city with fire.’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah Imprisoned
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now it happened when the army of the Chaldeans departed from Jerusalem for fear of Pharaoh’s [approaching] army, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'that Jeremiah left Jerusalem [during the withdrawal of the Chaldean invaders] to go to [Anathoth, his hometown, in] the land of Benjamin to take possession of [the title to] the land [which he had purchased] there among the people. [Jer 32:6-12] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When he was at the Gate of Benjamin, a captain of the guard whose name was Irijah, the son of Shelemiah the son of Hananiah was there; and he seized '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrested Jeremiah the prophet, saying, “You are deserting to join the Chaldeans [of Babylon]!” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But Jeremiah said, “That is a lie! I am not deserting to join the Chaldeans.” But the guard would not listen to him. So Irijah took Jeremiah and brought him to the princes (court officials). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The princes were enraged with Jeremiah and beat him and put him in prison in the house of Jonathan the scribe—for they had made that the prison. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When Jeremiah had come into '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the house of the cistern.
      marker-yv: yv-n
    - type: text
      text: the vaulted cell in the dungeon and had remained there many days,
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Zedekiah the king sent and brought him out; and in his palace the king secretly asked him, “Is there any word from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?” And Jeremiah said, “There is!” Then he said, “You will be handed over to the king of Babylon.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moreover, Jeremiah said to King Zedekiah, “In what way have I sinned against you, or against your servants, or against this people, that you have put me in prison? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Where then are your prophets who prophesied to you, saying, ‘The king of Babylon will not come against you or against this land?’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: But neither he nor his servants nor the people of the land listened to the words of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He spoke through the prophet Jeremiah.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Therefore now, please listen, O my lord the king; please let my petition come before you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be acceptable and do not make me return to the house of Jonathan the scribe, that I may not die there.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then King Zedekiah commanded, and they committed Jeremiah to the court of the guardhouse, and a [round] loaf of bread from the bakers’ street was given to him daily, until all the bread in the city was gone. So Jeremiah remained [imprisoned] in the court of the guardhouse.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Yet King Zedekiah sent Jehucal the son of Shelemiah [along] with Zephaniah the son of Maaseiah, the priest, to the prophet Jeremiah, saying, “Please pray [now] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God for us.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now Jeremiah was coming and going among the people, for they had not [yet] put him in prison. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Meanwhile, Pharaoh’s army had set out from Egypt; and when the Chaldeans who were besieging Jerusalem heard the news about them, they withdrew from Jerusalem.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to the prophet Jeremiah: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, ‘This is what you are to say to the king of Judah, who sent you to Me to inquire of Me: “Behold, Pharaoh’s army, which has come out to help you, will return to Egypt, to their own land. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the Chaldeans [of Babylon] will come again and fight against this city, and they will capture it and set it on fire.” ’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘Do not deceive yourselves, saying, “The Chaldeans will certainly stay away from us,” for they will not stay away. '
