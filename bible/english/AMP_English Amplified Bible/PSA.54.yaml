document_id: PSA.54
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 54
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer for Defense against Enemies.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician; with stringed instruments. A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem, of David, when the Ziphites went and told Saul, “David is hiding among us.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Save me, O God, by Your name;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And vindicate me by Your [wondrous] power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear my prayer, O God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For strangers have risen against me
- type: usfm
  marker: q1
  children:
  - type: text
    text: And violent men have sought my life;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They have not set God before them. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '¶Behold, God is my helper '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ally;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord is the sustainer of my soul [my upholder].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He will pay back the evil to my enemies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Your faithfulness destroy them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶With a freewill offering I will sacrifice to You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will give thanks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise Your name, O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for it is good.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For He has rescued me from every trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And my eye has looked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with satisfaction
  - type: text
    text: ' (triumph) on my enemies.'
