document_id: PSA.54,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 54
  - type: heading
    content: Prayer for Defense against Enemies.
  - type: text
    content: 'To the Chief Musician; with stringed instruments. A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem, of David, when the Ziphites went and told Saul, “David is hiding among us.”'
  - type: text
    content: Save me, O God, by Your name;
  - type: text
    content: And vindicate me by Your [wondrous] power.
  '2':
  - type: text
    content: Hear my prayer, O God;
  - type: text
    content: Listen to the words of my mouth.
  '3':
  - type: text
    content: For strangers have risen against me
  - type: text
    content: And violent men have sought my life;
  - type: text
    content: 'They have not set God before them. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: '¶Behold, God is my helper '
  - type: text
    content: and
  - type: text
    content: ' ally;'
  - type: text
    content: The Lord is the sustainer of my soul [my upholder].
  '5':
  - type: text
    content: He will pay back the evil to my enemies;
  - type: text
    content: In Your faithfulness destroy them.
  '6':
  - type: text
    content: ¶With a freewill offering I will sacrifice to You;
  - type: text
    content: 'I will give thanks '
  - type: text
    content: and
  - type: text
    content: ' praise Your name, O L'
  - type: heading
    content: ord
  - type: text
    content: ', for it is good.'
  '7':
  - type: text
    content: For He has rescued me from every trouble,
  - type: text
    content: 'And my eye has looked '
  - type: text
    content: with satisfaction
  - type: text
    content: ' (triumph) on my enemies.'
