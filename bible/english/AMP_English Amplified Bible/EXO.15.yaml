      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You in Your lovingkindness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodness have led the people whom You have redeemed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Your strength You have guided them with care to Your holy habitation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “The peoples have heard [about You], they tremble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Anguish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear has gripped the inhabitants of Philistia.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
