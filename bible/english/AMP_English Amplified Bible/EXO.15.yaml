- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is like You, majestic in holiness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awesome in splendor, working wonders?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “You stretched out Your right hand,
- type: usfm
