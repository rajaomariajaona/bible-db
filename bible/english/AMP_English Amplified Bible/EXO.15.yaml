  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Then the [tribal] chiefs of Edom were dismayed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' horrified;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The [mighty] leaders of Moab, trembling grips them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the inhabitants of Canaan have melted away [in despair]—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Terror and dread fall on them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the greatness of Your arm they are as still as a stone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Until Your people pass by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' [into Canaan], O L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
