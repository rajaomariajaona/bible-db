  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “You will bring them [into the land of promise] and plant them on the mountain (Mt. Moriah in Jerusalem) of Your inheritance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The place, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
