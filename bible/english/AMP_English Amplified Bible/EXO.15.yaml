- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “With the blast of Your nostrils the waters piled up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The flowing waters stood up like a mound;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The deeps were congealed in the heart of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “The enemy said, ‘I will pursue, I will overtake, I will divide the spoil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My desire shall be satisfied against them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will draw my sword, my hand shall dispossess them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' drive them out.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “You blew with Your wind, the sea covered them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Clad in armor] they sank like lead in the mighty waters.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
