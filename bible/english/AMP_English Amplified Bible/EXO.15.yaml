    children:
    - type: text
      text: '7'
  - type: text
    text: '“In the greatness of Your majesty You overthrow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' annihilate those [adversaries] who rise [in rebellion] against You;'
- type: usfm
  marker: q1
