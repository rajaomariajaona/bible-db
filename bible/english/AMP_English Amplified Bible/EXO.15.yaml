- type: usfm
  marker: q1
  children:
  - type: text
    text: The sanctuary, O Lord, which Your hands have established.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall reign to eternity and beyond.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For the horses of Pharaoh went with his war-chariots and his charioteers into the sea, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought back the waters of the sea on them, but the sons of Israel walked on dry land in the middle of the sea.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Miriam the prophetess, the sister of Aaron [and Moses], took a timbrel in her hand, and all the women followed her with timbrels and dancing. [Mic 6:4] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Miriam answered them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for He has triumphed gloriously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is highly exalted;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The horse and its rider He has hurled into the sea.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: usfm
