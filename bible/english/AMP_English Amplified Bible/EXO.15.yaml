  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Moses led Israel from the Red Sea, and they went into the Wilderness of Shur; they went [a distance of] three days (about thirty-three miles) in the wilderness and found no water. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then they came to Marah, but they could not drink its waters because they were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The water may have been like that of the Dead Sea, which has such a high salt content that it is bitter, and the natural reaction when attempting to sample it is to spit it out immediately.
    marker-yv: yv-n
  - type: text
    text: 'bitter; therefore it was named Marah (bitter). '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The people [grew discontented and] grumbled at Moses, saying, “What are we going to drink?” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then he cried to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [for help], and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' showed him a tree, [a branch of] which he threw into the waters, and the waters became sweet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: here the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' made a statute and an ordinance for them, and there '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God tests His people to see if they are learning from past experiences and growing in spiritual maturity.
    marker-yv: yv-n
  - type: text
    text: 'He tested them, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'saying, “If you will diligently listen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay attention to the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and do what is right in His sight, and listen to His commandments, and keep [foremost in your thoughts and actively obey] all His precepts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' statutes, then I will not put on you any of the diseases which I have put on the Egyptians; for I am the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH (Yahweh)-Ropheeka
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who heals you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then the children of Israel came to Elim where there were twelve springs of water and seventy date palms, and they camped there beside the waters.
