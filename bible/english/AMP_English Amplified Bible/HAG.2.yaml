      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘Ask the priests for a ruling: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If a man carries meat that is holy [because it has been offered in sacrifice to God] in the fold of his garment, and he touches bread, or cooked food, or wine, or oil, or any [kind of] food with this fold, does what he touches become holy [dedicated exclusively to God’s service]?’ ” And the priests answered, “No!” [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meat is holy of itself and renders the fold of the garment holy by contact, but the garment cannot transfer holiness. The same is not true of a person who has contracted defilement by contact (v 13), so it is easier to be defiled than to be holy.
      marker-yv: yv-n
    - type: text
      text: 'Holiness is not transferrable.] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Haggai said, “If one who is [ceremonially] unclean because of [contact with] a corpse touches any of these [articles of food], will it be unclean?” And the priests answered, “It will be unclean.” [Ceremonial uncleanness, like sin, is infectious.] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Haggai answered, “ ‘So is this people. And so is this nation before Me,’ declares the L
    - type: usfm
