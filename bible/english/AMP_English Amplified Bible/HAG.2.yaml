    content: Zerubbabel serves as the representative of the Davidic monarchy and covenant and in direct line of the ancestry of Jesus Christ.
  - type: text
    content: 'Zerubbabel governor of Judah, saying, ‘I am going to shake the heavens and the earth. [Hag 2:6; Matt 1:12, 13] '
