          text: '2:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zerubbabel serves as the representative of the Davidic monarchy and covenant and in direct line of the ancestry of Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: 'Zerubbabel governor of Judah, saying, ‘I am going to shake the heavens and the earth. [Hag 2:6; Matt 1:12, 13] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will [in the distant future] overthrow the thrones of kingdoms and destroy the power of the kingdoms of the [ungodly] nations; and I will overthrow the chariots and those who ride in them, and the horses and their riders will go down, every one by the sword of his brother [annihilating one another]. [Dan 2:34, 35, 44, 45; Rev 19:11-21] '
