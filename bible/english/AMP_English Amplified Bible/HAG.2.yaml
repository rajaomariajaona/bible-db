    content: 'I will [in the distant future] overthrow the thrones of kingdoms and destroy the power of the kingdoms of the [ungodly] nations; and I will overthrow the chariots and those who ride in them, and the horses and their riders will go down, every one by the sword of his brother [annihilating one another]. [Dan 2:34, 35, 44, 45; Rev 19:11-21] '
