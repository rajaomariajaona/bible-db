  - type: text
    content: ' of hosts, ‘Ask the priests for a ruling: '
  '12':
  - type: text
    content: If a man carries meat that is holy [because it has been offered in sacrifice to God] in the fold of his garment, and he touches bread, or cooked food, or wine, or oil, or any [kind of] food with this fold, does what he touches become holy [dedicated exclusively to God’s service]?’ ” And the priests answered, “No!” [
  - type: note
    content: The meat is holy of itself and renders the fold of the garment holy by contact, but the garment cannot transfer holiness. The same is not true of a person who has contracted defilement by contact (v 13), so it is easier to be defiled than to be holy.
  - type: text
    content: 'Holiness is not transferrable.] '
  '13':
  - type: text
    content: 'Then Haggai said, “If one who is [ceremonially] unclean because of [contact with] a corpse touches any of these [articles of food], will it be unclean?” And the priests answered, “It will be unclean.” [Ceremonial uncleanness, like sin, is infectious.] '
