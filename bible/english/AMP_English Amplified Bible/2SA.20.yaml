document_id: 2SA.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Sheba’s Revolt
  - type: text
    content: 'There happened to be there '
  - type: note
    content: Lit a son of Belial.
  - type: text
    content: 'a worthless '
  - type: text
    content: and
  - type: text
    content: ' wicked man named Sheba the son of Bichri, a Benjamite. He blew a trumpet [to call Israel to revolt] and said,'
  - type: text
    content: “We have no portion in David
  - type: text
    content: And no inheritance in the son of Jesse,
  - type: text
    content: Every man to his tents, O Israel!”
  '10':
  - type: text
    content: 'But Amasa [who had replaced Joab as David’s commander] was off guard '
  - type: text
    content: and
  - type: text
    content: ' not attentive to the sword in Joab’s hand. So Joab struck Amasa in the abdomen with the sword, spilling his intestines to the ground. Without another blow Amasa died. Then Joab and Abishai his brother pursued Sheba the son of Bichri. '
  '11':
  - type: text
    content: 'Now one of Joab’s young men stood by him and said, “Whoever favors Joab and is for David, let him follow Joab!” '
  '12':
  - type: text
    content: But Amasa was wallowing in his blood in the middle of the highway. And when the man saw that all the people who came by stopped [to look], he moved Amasa from the highway into the field and threw a garment over him when he saw that everyone who came by Amasa stopped.
  - type: heading
    content: Revolt Put Down
  '13':
  - type: text
    content: When [the body of] Amasa was removed from the highway, everyone followed after Joab to pursue Sheba the son of Bichri.
  '14':
  - type: text
    content: 'Now Joab went through all the tribes of Israel to Abel, even Beth-maacah, and all the Berites; and they assembled and also went after Sheba. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: Lit they.
  - type: text
    content: 'the army of Joab came and besieged Sheba in Abel Beth-maacah, and they built up an '
  - type: note
    content: Probably the most famous example of this was the huge ramp built against Masada by the Romans, which still stands.
  - type: text
    content: 'assault ramp against the city, and it stood against the outer rampart; and all the people who were with Joab were wreaking destruction to make the wall fall. '
  '16':
  - type: text
    content: 'Then a wise woman cried out from the city, “Hear, hear! Tell Joab, ‘Come here so that I may speak to you.’ ” '
  '17':
  - type: text
    content: 'So when he approached her, the woman asked, “Are you Joab?” He answered, “I am.” Then she said to him, “Listen to the words of your maidservant.” He answered, “I am listening.” '
  '18':
  - type: text
    content: 'Then she said, “In the past people used to say, ‘They will certainly ask '
  - type: text
    content: advice
  - type: text
    content: ' at Abel,’ and so they settled '
  - type: text
    content: the dispute
  - type: text
    content: '. '
  '19':
  - type: text
    content: I am one of the peaceable and faithful in Israel. You are seeking to destroy a city, and a mother in Israel. Why would you swallow up (devour) the inheritance of the L
  - type: heading
    content: ord
  - type: text
    content: '?” '
  '2':
  - type: text
    content: So all the men of Israel deserted David and followed Sheba the son of Bichri; but the men of Judah stayed faithfully with their king, from the Jordan to Jerusalem.
  '20':
  - type: text
    content: 'Joab answered, “Far be it, far be it from me that I would swallow up or destroy! '
  '21':
  - type: text
    content: 'That is not true. But a man of the hill country of Ephraim, Sheba the son of Bichri by name, has lifted up his hand [in rebellion] against King David. Only hand him over, and I will leave the city.” And the woman said to Joab, “Behold, his head shall be thrown to you over the wall.” '
  '22':
  - type: text
    content: Then the woman in her wisdom went to all the people [to inform them of the agreement]. And they beheaded Sheba the son of Bichri and threw his head [down] to Joab. So he blew the trumpet [signaling the end of the attack], and they dispersed from the city, every man to his own tent. And Joab returned to Jerusalem to [David] the king. [Eccl 9:13-16]
  '23':
  - type: text
    content: 'Now Joab was [commander] over the entire army of Israel; Benaiah the son of Jehoiada was [commander] over the Cherethites and Pelethites [the king’s bodyguards]; '
  '24':
  - type: text
    content: 'Adoram was over the forced labor; Jehoshaphat the son of Ahilud was recorder; '
  '25':
  - type: text
    content: 'Sheva was the scribe; and Zadok and Abiathar were priests; '
  '26':
  - type: text
    content: also Ira the Jairite was a priest to David.
  '3':
  - type: text
    content: 'Then David came to his house (palace) at Jerusalem, and the king took the ten women, his '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: concubines whom he had left to take care of the house, and placed them under guard and provided for them, but did not go in to them. So they were confined, and lived as widows until the day of their death.
  '4':
  - type: text
    content: 'Now the king said to Amasa [the commander of his army], “Summon the [fighting] men of Judah to me within three days, and be present here yourself.” '
  '5':
  - type: text
    content: 'So Amasa went to summon [the fighting men of] Judah, but he delayed longer than the time which David had set for him. '
  '6':
  - type: text
    content: 'And David said to Abishai [his nephew], “Now Sheba the son of Bichri will do us more harm than Absalom did. Take your lord’s servants and pursue him, so that he does not find fortified cities for himself and '
  - type: note
    content: Lit pull out our eyes.
  - type: text
    content: 'escape from our sight.” '
  '7':
  - type: text
    content: 'So Joab’s men went after him, along with [David’s bodyguards] the Cherethites and Pelethites and all the warriors; they went out from Jerusalem to pursue Sheba the son of Bichri. '
  '8':
  - type: text
    content: 'When they were at the great stone in Gibeon, Amasa came to meet them. Now Joab was wearing his military uniform, and over it he had a belt with a sheathed sword strapped around his hips; and as he went forward, '
  - type: note
    content: Most likely a feigned “accident” so Joab could strike Amasa before he was on guard.
  - type: text
    content: 'it fell out. '
  '9':
  - type: text
    content: 'Joab said to Amasa, “Is it going well with you, my '
  - type: note
    content: Joab and Amasa were actually related as cousins.
  - type: text
    content: brother?” And with his right hand Joab took hold of Amasa by the beard [as if] to kiss him [in greeting].
  - type: heading
    content: Amasa Murdered
