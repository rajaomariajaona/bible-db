        text: Sheba’s Revolt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There happened to be there '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a son of Belial
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'a worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wicked man named Sheba the son of Bichri, a Benjamite. He blew a trumpet [to call Israel to revolt] and said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We have no portion in David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no inheritance in the son of Jesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every man to his tents, O Israel!”
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Amasa [who had replaced Joab as David’s commander] was off guard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' not attentive to the sword in Joab’s hand. So Joab struck Amasa in the abdomen with the sword, spilling his intestines to the ground. Without another blow Amasa died. Then Joab and Abishai his brother pursued Sheba the son of Bichri. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Now one of Joab’s young men stood by him and said, “Whoever favors Joab and is for David, let him follow Joab!” '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But Amasa was wallowing in his blood in the middle of the highway. And when the man saw that all the people who came by stopped [to look], he moved Amasa from the highway into the field and threw a garment over him when he saw that everyone who came by Amasa stopped.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Revolt Put Down
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When [the body of] Amasa was removed from the highway, everyone followed after Joab to pursue Sheba the son of Bichri.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joab went through all the tribes of Israel to Abel, even Beth-maacah, and all the Berites; and they assembled and also went after Sheba. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: they
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the army of Joab came and besieged Sheba in Abel Beth-maacah, and they built up an '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably the most famous example of this was the huge ramp built against Masada by the Romans, which still stands.
      marker-yv: yv-n
    - type: text
      text: 'assault ramp against the city, and it stood against the outer rampart; and all the people who were with Joab were wreaking destruction to make the wall fall. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a wise woman cried out from the city, “Hear, hear! Tell Joab, ‘Come here so that I may speak to you.’ ” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So when he approached her, the woman asked, “Are you Joab?” He answered, “I am.” Then she said to him, “Listen to the words of your maidservant.” He answered, “I am listening.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she said, “In the past people used to say, ‘They will certainly ask '
    - type: usfm
      marker: it
      children:
      - type: text
        text: advice
    - type: text
      text: ' at Abel,’ and so they settled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the dispute
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am one of the peaceable and faithful in Israel. You are seeking to destroy a city, and a mother in Israel. Why would you swallow up (devour) the inheritance of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?” '
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So all the men of Israel deserted David and followed Sheba the son of Bichri; but the men of Judah stayed faithfully with their king, from the Jordan to Jerusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab answered, “Far be it, far be it from me that I would swallow up or destroy! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is not true. But a man of the hill country of Ephraim, Sheba the son of Bichri by name, has lifted up his hand [in rebellion] against King David. Only hand him over, and I will leave the city.” And the woman said to Joab, “Behold, his head shall be thrown to you over the wall.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the woman in her wisdom went to all the people [to inform them of the agreement]. And they beheaded Sheba the son of Bichri and threw his head [down] to Joab. So he blew the trumpet [signaling the end of the attack], and they dispersed from the city, every man to his own tent. And Joab returned to Jerusalem to [David] the king. [Eccl 9:13-16]
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joab was [commander] over the entire army of Israel; Benaiah the son of Jehoiada was [commander] over the Cherethites and Pelethites [the king’s bodyguards]; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoram was over the forced labor; Jehoshaphat the son of Ahilud was recorder; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sheva was the scribe; and Zadok and Abiathar were priests; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: also Ira the Jairite was a priest to David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David came to his house (palace) at Jerusalem, and the king took the ten women, his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Gen 22:24.
      marker-yv: yv-n
    - type: text
      text: concubines whom he had left to take care of the house, and placed them under guard and provided for them, but did not go in to them. So they were confined, and lived as widows until the day of their death.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the king said to Amasa [the commander of his army], “Summon the [fighting] men of Judah to me within three days, and be present here yourself.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Amasa went to summon [the fighting men of] Judah, but he delayed longer than the time which David had set for him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David said to Abishai [his nephew], “Now Sheba the son of Bichri will do us more harm than Absalom did. Take your lord’s servants and pursue him, so that he does not find fortified cities for himself and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: pull out our eyes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'escape from our sight.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joab’s men went after him, along with [David’s bodyguards] the Cherethites and Pelethites and all the warriors; they went out from Jerusalem to pursue Sheba the son of Bichri. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they were at the great stone in Gibeon, Amasa came to meet them. Now Joab was wearing his military uniform, and over it he had a belt with a sheathed sword strapped around his hips; and as he went forward, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most likely a feigned “accident” so Joab could strike Amasa before he was on guard.
      marker-yv: yv-n
    - type: text
      text: 'it fell out. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab said to Amasa, “Is it going well with you, my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joab and Amasa were actually related as cousins.
      marker-yv: yv-n
    - type: text
      text: brother?” And with his right hand Joab took hold of Amasa by the beard [as if] to kiss him [in greeting].
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amasa Murdered
    marker-yv: yv-h
