verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: Paul, a prisoner [for the sake] of Christ Jesus (the Messiah, the Anointed), and our brother Timothy,
  - type: text
    content: T
  - type: text
    content: 'o Philemon our dearly beloved friend and fellow worker, '
  '10':
  - type: text
    content: 'I appeal to you for my [own spiritual] child Onesimus, whom I have fathered [in the faith] while a captive in these chains. '
  '11':
  - type: text
    content: 'Once he was useless to you, but now he is indeed '
  - type: note
    content: Paul makes a play on words here because Onesimus means “useful” or “profitable.”
  - type: text
    content: 'useful to you as well as to me. '
  '12':
  - type: text
    content: 'I have sent him back to you in person, that is, '
  - type: text
    content: like sending
  - type: text
    content: ' my very heart. '
  '13':
  - type: text
    content: 'I would have chosen to keep him with me, so that he might minister to me on your behalf during my imprisonment for the gospel; '
  '14':
  - type: text
    content: 'but I did not want to do anything without first getting your consent, so that your goodness would not be, in effect, by compulsion but of your own free will. '
  '15':
  - type: text
    content: 'Perhaps it was for this reason that he was separated from you for a while, so that you would have him back forever, '
  '16':
  - type: text
    content: no longer as a slave, but [as someone] more than a slave, as a brother [in Christ], especially dear to me, but how much more to you, both in the flesh [as a servant] and in the Lord [as a fellow believer]. [Col 4:9]
  '17':
  - type: text
    content: 'So if you consider me a partner, welcome '
  - type: text
    content: and
  - type: text
    content: ' accept him as you would me. '
  '18':
  - type: text
    content: 'But if he has wronged you in any way or owes you anything, charge that to my account; '
  '19':
  - type: text
    content: 'I, Paul, write this with my '
  - type: note
    content: By writing this with his own hand, Paul accepted legal liability.
  - type: text
    content: 'own hand, I will repay it '
  - type: text
    content: in full
  - type: text
    content: ' (not to mention to you that you '
  - type: note
    content: Philemon evidently was saved through Paul’s ministry and therefore owed Paul a debt that could not be repaid.
  - type: text
    content: 'owe to me even your own self as well). '
  '2':
  - type: text
    content: 'and to [your wife] Apphia our sister, and to '
  - type: note
    content: Perhaps the son of Philemon and Apphia.
  - type: text
    content: 'Archippus our fellow soldier [in ministry], and to the '
  - type: note
    content: Philemon was responsible to see that this letter was shared with his fellow Colossian believers.
  - type: text
    content: 'church that meets in your '
  - type: note
    content: Prior to the third century a.d. churches customarily met in private homes.
  - type: text
    content: 'house: '
  '20':
  - type: text
    content: 'Yes, brother, let me have some benefit '
  - type: text
    content: and
  - type: text
    content: ' joy from you in the Lord; refresh my heart in Christ.'
  '21':
  - type: text
    content: 'I write to you [perfectly] confident of your obedient compliance, '
  - type: note
    content: This was probably a subtle suggestion by Paul to emancipate Onesimus.
  - type: text
    content: since I know that you will do even more than I ask.
  '22':
  - type: text
    content: At the same time also prepare a guest room for me [in expectation of a visit], for I hope that through your prayers I will be [granted the gracious privilege of] coming to you [at Colossae].
  '23':
  - type: text
    content: 'Greetings to you from Epaphras, my fellow prisoner here in [the cause of] Christ Jesus, '
  '24':
  - type: text
    content: and from Mark, Aristarchus, Demas, and Luke, my fellow workers.
  '25':
  - type: text
    content: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: text
    content: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Philemon’s Love and Faith
  '4':
  - type: text
    content: 'I thank my God always, making mention of you in my prayers, '
  '5':
  - type: text
    content: 'because I hear of your love and of your faith which you have toward the Lord Jesus and toward all the '
  - type: note
    content: All born-again believers (saints) have been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
  - type: text
    content: 'saints (God’s people). '
  '6':
  - type: text
    content: 'I pray that the sharing of your faith may become effective '
  - type: text
    content: and
  - type: text
    content: ' powerful because of your '
  - type: text
    content: accurate
  - type: text
    content: ' knowledge of every good thing which is ours in Christ. '
  '7':
  - type: text
    content: 'For I have had great joy and comfort '
  - type: text
    content: and
  - type: text
    content: ' encouragement from your love, because the hearts of the saints (God’s people) have been refreshed through you, my brother.'
  '8':
  - type: text
    content: 'Therefore [on the basis of these facts], though I have enough confidence in Christ to order you to do what is appropriate, '
  '9':
  - type: text
    content: 'yet for love’s sake I prefer to appeal '
  - type: text
    content: to you
  - type: text
    content: —since I am such a person as Paul, an old man, and now also a prisoner [for the sake] of Christ Jesus—
  - type: heading
    content: A Plea for Onesimus to be Freed
