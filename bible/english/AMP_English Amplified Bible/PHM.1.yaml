document_id: PHM.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, a prisoner [for the sake] of Christ Jesus (the Messiah, the Anointed), and our brother Timothy,
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o Philemon our dearly beloved friend and fellow worker, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I appeal to you for my [own spiritual] child Onesimus, whom I have fathered [in the faith] while a captive in these chains. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Once he was useless to you, but now he is indeed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul makes a play on words here because '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Onesimus
        - type: text
          text: ' means “useful” or “profitable.”'
      marker-yv: yv-n
    - type: text
      text: 'useful to you as well as to me. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I have sent him back to you in person, that is, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like sending
    - type: text
      text: ' my very heart. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I would have chosen to keep him with me, so that he might minister to me on your behalf during my imprisonment for the gospel; '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but I did not want to do anything without first getting your consent, so that your goodness would not be, in effect, by compulsion but of your own free will. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Perhaps it was for this reason that he was separated from you for a while, so that you would have him back forever, '
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: no longer as a slave, but [as someone] more than a slave, as a brother [in Christ], especially dear to me, but how much more to you, both in the flesh [as a servant] and in the Lord [as a fellow believer]. [Col 4:9]
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you consider me a partner, welcome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accept him as you would me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if he has wronged you in any way or owes you anything, charge that to my account; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, Paul, write this with my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By writing this with his own hand, Paul accepted legal liability.
      marker-yv: yv-n
    - type: text
      text: 'own hand, I will repay it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in full
    - type: text
      text: ' (not to mention to you that you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Philemon evidently was saved through Paul’s ministry and therefore owed Paul a debt that could not be repaid.
      marker-yv: yv-n
    - type: text
      text: 'owe to me even your own self as well). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to [your wife] Apphia our sister, and to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps the son of Philemon and Apphia.
      marker-yv: yv-n
    - type: text
      text: 'Archippus our fellow soldier [in ministry], and to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Philemon was responsible to see that this letter was shared with his fellow Colossian believers.
      marker-yv: yv-n
    - type: text
      text: 'church that meets in your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Prior to the third century '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . churches customarily met in private homes.
      marker-yv: yv-n
    - type: text
      text: 'house: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, brother, let me have some benefit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' joy from you in the Lord; refresh my heart in Christ.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I write to you [perfectly] confident of your obedient compliance, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was probably a subtle suggestion by Paul to emancipate Onesimus.
      marker-yv: yv-n
    - type: text
      text: since I know that you will do even more than I ask.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the same time also prepare a guest room for me [in expectation of a visit], for I hope that through your prayers I will be [granted the gracious privilege of] coming to you [at Colossae].
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greetings to you from Epaphras, my fellow prisoner here in [the cause of] Christ Jesus, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and from Mark, Aristarchus, Demas, and Luke, my fellow workers.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace to you and peace [inner calm and spiritual well-being] from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Philemon’s Love and Faith
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I thank my God always, making mention of you in my prayers, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because I hear of your love and of your faith which you have toward the Lord Jesus and toward all the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All born-again believers (saints) have been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
      marker-yv: yv-n
    - type: text
      text: 'saints (God’s people). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I pray that the sharing of your faith may become effective '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' powerful because of your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: accurate
    - type: text
      text: ' knowledge of every good thing which is ours in Christ. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have had great joy and comfort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' encouragement from your love, because the hearts of the saints (God’s people) have been refreshed through you, my brother.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore [on the basis of these facts], though I have enough confidence in Christ to order you to do what is appropriate, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet for love’s sake I prefer to appeal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to you
    - type: text
      text: —since I am such a person as Paul, an old man, and now also a prisoner [for the sake] of Christ Jesus—
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Plea for Onesimus to be Freed
    marker-yv: yv-h
