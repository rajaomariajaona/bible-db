  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He said to them, “This is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has said: ‘Tomorrow is a solemn rest, a holy Sabbath to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '’; bake and boil what you will bake and boil [today], and all that remains left over put aside for yourselves to keep until morning.” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They put it aside until morning, as Moses told them, and it did not become foul nor was it wormy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Moses said, “Eat that today, for today is a Sabbath to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; today you will not find it in the field. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Six days you shall gather it, but on the seventh day, the Sabbath, there will be none [in the field].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now on the seventh day some of the people went out to gather, but they found none. '
  - type: usfm
    marker: v
