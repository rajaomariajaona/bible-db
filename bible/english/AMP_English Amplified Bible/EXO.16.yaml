  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has brought you out of the land of Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and in the morning you will see the glory of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', for He hears your murmurings against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. What are we, that you murmur '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rebel against us?”'
