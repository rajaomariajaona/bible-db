  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So it happened that as Aaron spoke to the whole congregation of Israel, they looked toward the wilderness, and behold, the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' appeared in the cloud! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: v
    metadata:
