  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So in the evening the quails came up and covered the camp, and in the morning there was a blanket of dew around the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the layer of dew evaporated, on the surface of the wilderness there was a fine, flake-like thing, as fine as frost on the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When the Israelites saw it, they said to one another, “
  - type: usfm
