      children:
      - type: text
        text: I.e. a little over two quarts.
    marker-yv: yv-n
  - type: text
    text: 'omer for each person, according to the number of people each of you has in his tent.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The Israelites did so, and some gathered much [of it] and some [only a] little. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When they measured it with an omer, he who had gathered a large amount had no excess, and he who had gathered little had no lack; every man gathered according to his need (family size). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moses said, “Let none of it be left [overnight] until [the next] morning.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But they did not listen to Moses, and some left a supply of it until morning, and it bred worms and became foul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rotten; and Moses was angry with them. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So they gathered it every morning, each as much as he needed, because when the sun was hot it melted.
- type: usfm
