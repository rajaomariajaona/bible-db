      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: man hu,
      - type: text
        text: ' cf v 31.'
    marker-yv: yv-n
  - type: text
    text: What is it?” For they did not know what it was. And Moses said to them, “This is the bread which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has given you to eat. [John 6:31, 33] '
  - type: usfm
