  - type: text
    text: 'They set out from Elim, and all the congregation of Israel came to the Wilderness of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pronounced “seen” in Hebrew, it means “the place.” Although the words are spelled the same in English, “Sin” is not related in any way to “sin” (an offense against God).
    marker-yv: yv-n
  - type: text
    text: 'Sin, which is between Elim and Sinai, on the fifteenth day of the second month after they left the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The whole congregation of the Israelites [grew discontented and] murmured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rebelled against Moses and Aaron in the wilderness, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and the Israelites said to them, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To understand Israel’s rebellious behavior, it is important to grasp the contrast between life in Egypt and nomadic life in the wilderness. Despite the hardships of slavery survival was not an issue in Egypt, where they were guaranteed food and other necessities. But the desert wilderness was hostile and unforgiving, and survival was an art. Desert nomads needed to understand the wilderness in order to stay alive; they had to learn, among other things, how to protect themselves from the weather, where to find water and pasture, and how to find and prepare scarce food, or live primarily from what their livestock could provide them. So the Israelites viewed every new problem they faced as life-threatening. Instead of looking back and taking comfort from God’s earlier miracles, they doubted God’s ability and willingness to help them. Their fears and doubts subsequently came to be expressed as irrational anger toward Moses.
    marker-yv: yv-n
  - type: text
    text: Would that we had died by the hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in the land of Egypt, when we sat by the pots of meat and ate bread until we were full; for you have brought us out into this wilderness to kill this entire assembly with hunger.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses, “Behold, I will cause bread to rain from heaven for you; the people shall go out and gather a day’s portion every day, so that I may test them [to determine] whether or not they will walk [obediently] in My instruction (law). '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And it shall be that on the sixth day, they shall prepare to bring in twice as much as they gather daily [so that they will not need to gather on the seventh day].” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
