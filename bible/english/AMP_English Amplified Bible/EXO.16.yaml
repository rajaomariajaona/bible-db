    content: The Lord Provides Manna
  - type: text
    content: 'They set out from Elim, and all the congregation of Israel came to the Wilderness of '
  - type: note
    content: Pronounced “seen” in Hebrew, it means “the place.” Although the words are spelled the same in English, “Sin” is not related in any way to “sin” (an offense against God).
  - type: text
    content: 'Sin, which is between Elim and Sinai, on the fifteenth day of the second month after they left the land of Egypt. '
  '10':
  - type: text
    content: 'So it happened that as Aaron spoke to the whole congregation of Israel, they looked toward the wilderness, and behold, the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' appeared in the cloud! '
  '11':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '12':
  - type: text
    content: “I have heard the murmurings of the Israelites; speak to them, saying, ‘At twilight you shall eat meat, and in the morning you shall be filled with bread; and you shall know that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.’ ”'
  '13':
  - type: text
    content: 'So in the evening the quails came up and covered the camp, and in the morning there was a blanket of dew around the camp. '
  '14':
  - type: text
    content: 'When the layer of dew evaporated, on the surface of the wilderness there was a fine, flake-like thing, as fine as frost on the ground. '
  '15':
  - type: text
    content: When the Israelites saw it, they said to one another, “
  - type: note
    content: Heb man hu, cf v 31.
  - type: text
    content: What is it?” For they did not know what it was. And Moses said to them, “This is the bread which the L
  - type: heading
    content: ord
  - type: text
    content: ' has given you to eat. [John 6:31, 33] '
  '16':
  - type: text
    content: This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' has commanded: ‘Let every man gather as much of it as he needs. Take an '
  - type: note
    content: I.e. a little over two quarts.
  - type: text
    content: 'omer for each person, according to the number of people each of you has in his tent.’ ” '
  '17':
  - type: text
    content: 'The Israelites did so, and some gathered much [of it] and some [only a] little. '
  '18':
  - type: text
    content: 'When they measured it with an omer, he who had gathered a large amount had no excess, and he who had gathered little had no lack; every man gathered according to his need (family size). '
  '19':
  - type: text
    content: 'Moses said, “Let none of it be left [overnight] until [the next] morning.” '
  '2':
  - type: text
    content: 'The whole congregation of the Israelites [grew discontented and] murmured '
  - type: text
    content: and
  - type: text
    content: ' rebelled against Moses and Aaron in the wilderness, '
  '20':
  - type: text
    content: 'But they did not listen to Moses, and some left a supply of it until morning, and it bred worms and became foul '
  - type: text
    content: and
  - type: text
    content: ' rotten; and Moses was angry with them. '
  '21':
  - type: text
    content: So they gathered it every morning, each as much as he needed, because when the sun was hot it melted.
  - type: heading
    content: The Sabbath Observed
  '22':
  - type: text
    content: 'Now on the sixth day they gathered twice as much bread, two omers for each person; and all the leaders of the congregation came and told Moses. '
  '23':
  - type: text
    content: He said to them, “This is what the L
  - type: heading
    content: ord
  - type: text
    content: ' has said: ‘Tomorrow is a solemn rest, a holy Sabbath to the L'
  - type: heading
    content: ord
  - type: text
    content: '’; bake and boil what you will bake and boil [today], and all that remains left over put aside for yourselves to keep until morning.” '
  '24':
  - type: text
    content: 'They put it aside until morning, as Moses told them, and it did not become foul nor was it wormy. '
  '25':
  - type: text
    content: Then Moses said, “Eat that today, for today is a Sabbath to the L
  - type: heading
    content: ord
  - type: text
    content: '; today you will not find it in the field. '
  '26':
  - type: text
    content: Six days you shall gather it, but on the seventh day, the Sabbath, there will be none [in the field].”
  '27':
  - type: text
    content: 'Now on the seventh day some of the people went out to gather, but they found none. '
  '28':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “How long do you [people] refuse to keep My commandments and My instructions (laws)? '
  '29':
  - type: text
    content: See, the L
  - type: heading
    content: ord
  - type: text
    content: ' has given you the Sabbath; therefore He gives you the bread for two days on the sixth day. Let every man stay in his place; no man is to leave his place on the seventh day.” '
  '3':
  - type: text
    content: and the Israelites said to them, “
  - type: note
    content: To understand Israel’s rebellious behavior, it is important to grasp the contrast between life in Egypt and nomadic life in the wilderness. Despite the hardships of slavery survival was not an issue in Egypt, where they were guaranteed food and other necessities. But the desert wilderness was hostile and unforgiving, and survival was an art. Desert nomads needed to understand the wilderness in order to stay alive; they had to learn, among other things, how to protect themselves from the weather, where to find water and pasture, and how to find and prepare scarce food, or live primarily from what their livestock could provide them. So the Israelites viewed every new problem they faced as life-threatening. Instead of looking back and taking comfort from God’s earlier miracles, they doubted God’s ability and willingness to help them. Their fears and doubts subsequently came to be expressed as irrational anger toward Moses.
  - type: text
    content: Would that we had died by the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' in the land of Egypt, when we sat by the pots of meat and ate bread until we were full; for you have brought us out into this wilderness to kill this entire assembly with hunger.”'
  '30':
  - type: text
    content: So the people rested on the seventh day.
  '31':
  - type: text
    content: 'The house of Israel called the bread manna; it was like coriander seed, white, and it tasted like flat pastry (wafers) made with honey. '
  '32':
  - type: text
    content: Then Moses said, “This is the word which the L
  - type: heading
    content: ord
  - type: text
    content: ' commands, ‘Let an omer of it be kept throughout your generations, that they may see the bread with which I fed you in the wilderness, when I brought you out of the land of Egypt.’ ” '
  '33':
  - type: text
    content: So Moses said to Aaron, “Take a pot and put an omer of manna in it, and place it before the L
  - type: heading
    content: ord
  - type: text
    content: ' to be kept throughout your generations.” '
  '34':
  - type: text
    content: As the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded Moses, so Aaron [eventually] placed it in the presence of the '
  - type: note
    content: The stone tablets on which the Ten Commandments were written.
  - type: text
    content: 'Testimony, to be kept. [Heb 9:4] '
  '35':
  - type: text
    content: 'The Israelites ate manna forty years, until they reached an inhabited land; they ate the manna until they came to the border of the land of Canaan. '
  '36':
  - type: text
    content: '(Now an '
  - type: note
    content: I.e. a little over two quarts.
  - type: text
    content: 'omer is the tenth of an '
  - type: note
    content: I.e. approx one bushel.
  - type: text
    content: ephah.)
  '4':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Behold, I will cause bread to rain from heaven for you; the people shall go out and gather a day’s portion every day, so that I may test them [to determine] whether or not they will walk [obediently] in My instruction (law). '
  '5':
  - type: text
    content: 'And it shall be that on the sixth day, they shall prepare to bring in twice as much as they gather daily [so that they will not need to gather on the seventh day].” '
  '6':
  - type: text
    content: So Moses and Aaron said to all Israel, “At evening you shall know that the L
  - type: heading
    content: ord
  - type: text
    content: ' has brought you out of the land of Egypt, '
  '7':
  - type: text
    content: and in the morning you will see the glory of the L
  - type: heading
    content: ord
  - type: text
    content: ', for He hears your murmurings against the L'
  - type: heading
    content: ord
  - type: text
    content: '. What are we, that you murmur '
  - type: text
    content: and
  - type: text
    content: ' rebel against us?”'
