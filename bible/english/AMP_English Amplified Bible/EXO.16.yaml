      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So Moses said to Aaron, “Take a pot and put an omer of manna in it, and place it before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to be kept throughout your generations.” '
  - type: usfm
