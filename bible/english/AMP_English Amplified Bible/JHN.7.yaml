document_id: JHN.7,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Teaches at the Feast
  - type: text
    content: 'After this, Jesus walked [from place to place] in Galilee, for He would not walk in Judea because the Jews were seeking to kill Him. '
  '10':
  - type: text
    content: 'But [afterward], when His brothers had gone up to the feast, He went up too, not publicly [with a caravan], but quietly [because He did not want to be noticed]. '
  '11':
  - type: text
    content: 'So the Jews kept looking for Him at the feast and asking, “Where is He?” '
  '12':
  - type: text
    content: 'There was a lot of whispered discussion '
  - type: text
    content: and
  - type: text
    content: ' murmuring among the crowds about Him. Some were saying, “He is a good man”; others said, “No, on the contrary, He misleads the people [giving them false ideas].” '
  '13':
  - type: text
    content: 'Yet no one was speaking out openly '
  - type: text
    content: and
  - type: text
    content: ' freely about Him for fear of [the leaders of] the Jews.'
  '14':
  - type: text
    content: 'When the feast was already half over, Jesus went up into the temple [court] and '
  - type: text
    content: began to
  - type: text
    content: ' teach. '
  '15':
  - type: text
    content: 'Then the Jews were perplexed. They said, “How '
  - type: note
    content: Lit does this man know letters.
  - type: text
    content: 'did this man become learned [so versed in the Scriptures and theology] '
  - type: note
    content: Lit not having learned.
  - type: text
    content: 'without formal training?” '
  '16':
  - type: text
    content: 'Jesus answered them by saying, '
  - type: text
    content: “My teaching is not My own, but His who sent Me.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'If anyone is willing to do His will, he will know whether the teaching is of God or whether I speak on My own accord '
  - type: text
    content: and
  - type: text
    content: ' by My own authority.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'He who speaks on his own accord seeks glory '
  - type: text
    content: and
  - type: text
    content: ' honor for himself. But He who seeks the glory '
  - type: text
    content: and
  - type: text
    content: ' the honor of the One who sent Him, He is true, and there is no unrighteousness '
  - type: text
    content: or
  - type: text
    content: ' deception in Him.'
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Did not Moses give you the Law? And yet not one of you keeps the Law. Why do you want to kill Me
  - type: text
    content: ' [for not keeping it]?” '
  '2':
  - type: text
    content: 'Now the Jewish '
  - type: note
    content: This important seven-day feast held in October celebrated the harvest (ingathering). Devout Jews spent the week living outside in booths or tents made of tree branches. It was the most popular of the three great Jewish festivals (Passover, Pentecost, Tabernacles).
  - type: text
    content: 'Feast of Tabernacles (Booths) was approaching. '
  '20':
  - type: text
    content: 'The crowd answered, “You have a demon [You are out of Your mind]! Who wants to kill You?” '
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“I did one '
  - type: note
    content: The healing of the paralytic at Bethesda occurred during Jesus’ last visit to Jerusalem.
  - type: text
    content: work, and you are all astounded.
  - type: text
    content: ' [John 5:1-9] '
  '22':
  - type: text
    content: For this reason Moses has given you
  - type: text
    content: ' [God’s law regarding] '
  - type: text
    content: circumcision (not that it originated with Moses, but with the patriarchs) and you circumcise a man
  - type: text
    content: ' [even] '
  - type: text
    content: on the Sabbath.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'If, to avoid breaking the Law of Moses, a man undergoes '
  - type: note
    content: According to the Law of Moses, a baby boy had to be circumcised on the eighth day, even if it was a Sabbath. It was, therefore, outrageous for the Jews to accuse Jesus of violating the Sabbath by performing a miraculous act of healing.
  - type: text
    content: circumcision on the Sabbath, why are you angry with Me for making a man’s whole body well on the Sabbath?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Do not judge by appearance
  - type: text
    content: ' [superficially and arrogantly], '
  - type: text
    content: 'but judge fairly '
  - type: text
    content: and
  - type: text
    content: ' righteously.”'
  '25':
  - type: text
    content: 'Then some of the people of Jerusalem said, “Is this not the Man they want to kill? '
  '26':
  - type: text
    content: 'Look, He is speaking publicly, and they say nothing to Him! Is it possible that the rulers really know that this is the Christ? '
  '27':
  - type: text
    content: 'But we know where this Man is from; whenever the Christ comes, no one will know where He is from.” '
  '28':
  - type: text
    content: 'Then Jesus called out as He taught in the temple, '
  - type: text
    content: “You know Me and know where I am from; and I have not come on my own initiative
  - type: text
    content: ' [as self-appointed], '
  - type: text
    content: but He who sent Me is true, and Him you do not know.
  - type: text
    content: ' '
  '29':
  - type: text
    content: I know Him Myself because I am from Him
  - type: text
    content: ' [I came from His very presence] '
  - type: text
    content: and it was He
  - type: text
    content: ' [personally] '
  - type: text
    content: who sent Me.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'So His '
  - type: note
    content: The younger sons of Mary and Joseph included James and Jude, who penned the NT letters bearing their names, and Joses and Simon. See Mark 6:3.
  - type: text
    content: 'brothers said to Him, “Leave here and go to Judea, so that Your disciples [there] may also see the works that You do. '
  '30':
  - type: text
    content: 'So they were eager to arrest Him; but no one laid a hand on Him, because His time had not yet come. '
  '31':
  - type: text
    content: 'But many from the crowd believed in Him. And they kept saying, “When the Christ comes, will He do more signs '
  - type: text
    content: and
  - type: text
    content: ' exhibit more proofs than this Man?”'
  '32':
  - type: text
    content: 'The Pharisees heard the crowd muttering these things [under their breath] about Him, and the chief priests and Pharisees sent '
  - type: note
    content: The temple guards were a group of Levites who were responsible for keeping order in and around the temple.
  - type: text
    content: 'guards to arrest Him. '
  '33':
  - type: text
    content: 'Therefore Jesus said, '
  - type: text
    content: “For a little while longer I am
  - type: text
    content: ' [still] '
  - type: text
    content: with you, and then I go to Him who sent Me.
  - type: text
    content: ' '
  '34':
  - type: text
    content: You will look for Me, and will not
  - type: text
    content: ' [be able to] '
  - type: text
    content: find Me; and where I am, you cannot come.”
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Then the Jews said among themselves, “Where does this Man intend to go that we will not find Him? Does He intend to go to the Dispersion [of Jews scattered and living] among the Greeks, and teach the Greeks? '
  '36':
  - type: text
    content: 'What does this statement of His mean, '
  - type: text
    content: ‘You will look for Me, and will not
  - type: text
    content: ' [be able to] '
  - type: text
    content: find Me; and where I am, you cannot come’?”
  '37':
  - type: text
    content: 'Now on the last and most important day of the feast, Jesus stood and called out [in a loud voice], '
  - type: text
    content: “If anyone is thirsty, let him come to Me and drink!
  - type: text
    content: ' '
  '38':
  - type: text
    content: He who believes in Me
  - type: text
    content: ' [who adheres to, trusts in, and relies on Me], '
  - type: text
    content: 'as the Scripture has said, ‘From his innermost being will flow '
  - type: text
    content: continually
  - type: text
    content: ' rivers of living water.’ ”'
  - type: text
    content: ' [Is 58:11; John 4:14] '
  '39':
  - type: text
    content: 'But He was speaking of the [Holy] Spirit, whom those who believed in Him [as Savior] were to receive '
  - type: text
    content: afterward.
  - type: text
    content: ' The Spirit had not yet been given, because Jesus was not yet glorified (raised to honor).'
  - type: heading
    content: Division of People over Jesus
  '4':
  - type: text
    content: 'No one does anything in secret when he wants to be '
  - type: text
    content: known
  - type: text
    content: ' publicly. If You [must] do these things, show Yourself openly to the world '
  - type: text
    content: and
  - type: text
    content: ' make Yourself known!” '
  '40':
  - type: text
    content: 'Listening to these words, some of the people said, “This is certainly the Prophet!” [Deut 18:15, 18; John 1:21; 6:14; Acts 3:22] '
  '41':
  - type: text
    content: 'Others said, “This is the Christ (the Messiah, the Anointed)!” But others said, “Surely the Christ is not going to come out of Galilee, is He? '
  '42':
  - type: text
    content: 'Does the Scripture not say that the Christ comes from the descendants of David, and from Bethlehem, the village where David lived?” [Ps 89:3, 4; Mic 5:2] '
  '43':
  - type: text
    content: 'So the crowd was divided because of Him. '
  '44':
  - type: text
    content: Some of them wanted to arrest Him, but no one laid hands on Him.
  '45':
  - type: text
    content: 'Then the guards went [back] to the chief priests and Pharisees, who asked them, “Why did you not bring Him [here with you]?” '
  '46':
  - type: text
    content: 'The guards replied, “Never [at any time] has a man talked the way this Man talks!” '
  '47':
  - type: text
    content: 'Then the Pharisees said to them, “Have you also been deluded '
  - type: text
    content: and
  - type: text
    content: ' swept off your feet? '
  '48':
  - type: text
    content: 'Has any of the rulers or Pharisees believed in Him? '
  '49':
  - type: text
    content: 'But this [ignorant, contemptible] crowd that does not know the Law is accursed '
  - type: text
    content: and
  - type: text
    content: ' doomed!” '
  '5':
  - type: text
    content: 'For not even His brothers believed in Him. '
  '50':
  - type: text
    content: 'Nicodemus (the one who came to Jesus before and was one of them) asked, '
  '51':
  - type: text
    content: '“Does our Law convict someone without first giving him a hearing and finding out what he is [accused of] doing?” '
  '52':
  - type: text
    content: 'They responded, “Are you also from Galilee? Search [and read the Scriptures], and see [for yourself] that no prophet comes from Galilee!” '
  '53':
  - type: note
    content: Most late mss include the story of the adulterous woman, numbering it as 7:53-8:11, though some mss place it elsewhere in the text. The story is considered authentic as part of the oral tradition of the early church, and perhaps for that reason it was inserted in John’s Gospel.
  - type: text
    content: '[And everyone went to his own house.'
  '6':
  - type: text
    content: 'So Jesus said to them, '
  - type: text
    content: “My time has not yet come; but any time is right for you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: The world cannot hate you
  - type: text
    content: ' [since you are part of it], '
  - type: text
    content: 'but it does hate Me because I denounce it '
  - type: text
    content: and
  - type: text
    content: ' testify that its deeds are evil.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Go up to the feast yourselves. I am not going up to this feast because My time has not yet fully come.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: Having said these things to them, He stayed behind in Galilee.
