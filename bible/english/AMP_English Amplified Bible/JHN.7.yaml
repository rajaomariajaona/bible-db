document_id: JHN.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Teaches at the Feast
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this, Jesus walked [from place to place] in Galilee, for He would not walk in Judea because the Jews were seeking to kill Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now the Jewish '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This important seven-day feast held in October celebrated the harvest (ingathering). Devout Jews spent the week living outside in booths or tents made of tree branches. It was the most popular of the three great Jewish festivals (Passover, Pentecost, Tabernacles).
    marker-yv: yv-n
  - type: text
    text: 'Feast of Tabernacles (Booths) was approaching. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The younger sons of Mary and Joseph included James and Jude, who penned the NT letters bearing their names, and Joses and Simon. See Mark 6:3.
    marker-yv: yv-n
  - type: text
    text: 'brothers said to Him, “Leave here and go to Judea, so that Your disciples [there] may also see the works that You do. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'No one does anything in secret when he wants to be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: known
  - type: text
    text: ' publicly. If You [must] do these things, show Yourself openly to the world '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make Yourself known!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For not even His brothers believed in Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My time has not yet come; but any time is right for you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The world cannot hate you
  - type: text
    text: ' [since you are part of it], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'but it does hate Me because I denounce it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' testify that its deeds are evil.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go up to the feast yourselves. I am not going up to this feast because My time has not yet fully come.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Having said these things to them, He stayed behind in Galilee.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But [afterward], when His brothers had gone up to the feast, He went up too, not publicly [with a caravan], but quietly [because He did not want to be noticed]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So the Jews kept looking for Him at the feast and asking, “Where is He?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'There was a lot of whispered discussion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' murmuring among the crowds about Him. Some were saying, “He is a good man”; others said, “No, on the contrary, He misleads the people [giving them false ideas].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet no one was speaking out openly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' freely about Him for fear of [the leaders of] the Jews.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the feast was already half over, Jesus went up into the temple [court] and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began to
  - type: text
    text: ' teach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the Jews were perplexed. They said, “How '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: does this man know letters
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'did this man become learned [so versed in the Scriptures and theology] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: not having learned
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'without formal training?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus answered them by saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My teaching is not My own, but His who sent Me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If anyone is willing to do His will, he will know whether the teaching is of God or whether I speak on My own accord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' by My own authority.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He who speaks on his own accord seeks glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor for himself. But He who seeks the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the honor of the One who sent Him, He is true, and there is no unrighteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' deception in Him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Did not Moses give you the Law? And yet not one of you keeps the Law. Why do you want to kill Me
  - type: text
    text: ' [for not keeping it]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The crowd answered, “You have a demon [You are out of Your mind]! Who wants to kill You?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I did one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The healing of the paralytic at Bethesda occurred during Jesus’ last visit to Jerusalem.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: work, and you are all astounded.
  - type: text
    text: ' [John 5:1-9] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For this reason Moses has given you
  - type: text
    text: ' [God’s law regarding] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: circumcision (not that it originated with Moses, but with the patriarchs) and you circumcise a man
  - type: text
    text: ' [even] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on the Sabbath.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'If, to avoid breaking the Law of Moses, a man undergoes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: According to the Law of Moses, a baby boy had to be circumcised on the eighth day, even if it was a Sabbath. It was, therefore, outrageous for the Jews to accuse Jesus of violating the Sabbath by performing a miraculous act of healing.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: circumcision on the Sabbath, why are you angry with Me for making a man’s whole body well on the Sabbath?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do not judge by appearance
  - type: text
    text: ' [superficially and arrogantly], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'but judge fairly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' righteously.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then some of the people of Jerusalem said, “Is this not the Man they want to kill? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Look, He is speaking publicly, and they say nothing to Him! Is it possible that the rulers really know that this is the Christ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But we know where this Man is from; whenever the Christ comes, no one will know where He is from.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Jesus called out as He taught in the temple, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You know Me and know where I am from; and I have not come on my own initiative
  - type: text
    text: ' [as self-appointed], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but He who sent Me is true, and Him you do not know.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I know Him Myself because I am from Him
  - type: text
    text: ' [I came from His very presence] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and it was He
  - type: text
    text: ' [personally] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who sent Me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So they were eager to arrest Him; but no one laid a hand on Him, because His time had not yet come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But many from the crowd believed in Him. And they kept saying, “When the Christ comes, will He do more signs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exhibit more proofs than this Man?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The Pharisees heard the crowd muttering these things [under their breath] about Him, and the chief priests and Pharisees sent '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The temple guards were a group of Levites who were responsible for keeping order in and around the temple.
    marker-yv: yv-n
  - type: text
    text: 'guards to arrest Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Therefore Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For a little while longer I am
  - type: text
    text: ' [still] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: with you, and then I go to Him who sent Me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will look for Me, and will not
  - type: text
    text: ' [be able to] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: find Me; and where I am, you cannot come.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then the Jews said among themselves, “Where does this Man intend to go that we will not find Him? Does He intend to go to the Dispersion [of Jews scattered and living] among the Greeks, and teach the Greeks? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'What does this statement of His mean, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘You will look for Me, and will not
  - type: text
    text: ' [be able to] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: find Me; and where I am, you cannot come’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Now on the last and most important day of the feast, Jesus stood and called out [in a loud voice], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If anyone is thirsty, let him come to Me and drink!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He who believes in Me
  - type: text
    text: ' [who adheres to, trusts in, and relies on Me], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'as the Scripture has said, ‘From his innermost being will flow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' rivers of living water.’ ”'
  - type: text
    text: ' [Is 58:11; John 4:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'But He was speaking of the [Holy] Spirit, whom those who believed in Him [as Savior] were to receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: afterward.
  - type: text
    text: ' The Spirit had not yet been given, because Jesus was not yet glorified (raised to honor).'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Division of People over Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Listening to these words, some of the people said, “This is certainly the Prophet!” [Deut 18:15, 18; John 1:21; 6:14; Acts 3:22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Others said, “This is the Christ (the Messiah, the Anointed)!” But others said, “Surely the Christ is not going to come out of Galilee, is He? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Does the Scripture not say that the Christ comes from the descendants of David, and from Bethlehem, the village where David lived?” [Ps 89:3, 4; Mic 5:2] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So the crowd was divided because of Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Some of them wanted to arrest Him, but no one laid hands on Him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then the guards went [back] to the chief priests and Pharisees, who asked them, “Why did you not bring Him [here with you]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The guards replied, “Never [at any time] has a man talked the way this Man talks!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Then the Pharisees said to them, “Have you also been deluded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' swept off your feet? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Has any of the rulers or Pharisees believed in Him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'But this [ignorant, contemptible] crowd that does not know the Law is accursed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' doomed!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nicodemus (the one who came to Jesus before and was one of them) asked, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: '“Does our Law convict someone without first giving him a hearing and finding out what he is [accused of] doing?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'They responded, “Are you also from Galilee? Search [and read the Scriptures], and see [for yourself] that no prophet comes from Galilee!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:53 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most late mss include the story of the adulterous woman, numbering it as 7:53-8:11, though some mss place it elsewhere in the text. The story is considered authentic as part of the oral tradition of the early church, and perhaps for that reason it was inserted in John’s Gospel.
    marker-yv: yv-n
  - type: text
    text: '[And everyone went to his own house.'
