document_id: 2SA.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Woman of Tekoa
  - type: text
    content: 'Now Joab the son of Zeruiah knew that the king’s heart '
  - type: text
    content: longed
  - type: text
    content: ' for Absalom. '
  '10':
  - type: text
    content: 'The king said, “If anyone speaks to you [about this matter], bring him to me [for judgment], and he will not touch you again.” '
  '11':
  - type: text
    content: Then she said, “Please let the king remember the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, so that the avenger of blood will not continue to destroy, otherwise they will destroy my son.” And David said, “As the L'
  - type: heading
    content: ord
  - type: text
    content: ' lives, not a single hair [from the head] of your son shall fall to the ground.”'
  '12':
  - type: text
    content: 'Then the woman said, “Please let your maidservant speak '
  - type: text
    content: one more
  - type: text
    content: ' word to my lord the king.” He said, “Speak.” '
  '13':
  - type: text
    content: 'The woman said, “Now why have you planned such a thing against God’s people? For in speaking this word the king is like a guilty man, in that the king does not bring back his banished one. '
  '14':
  - type: text
    content: 'For we will certainly die and are like water that is spilled on the ground and cannot be gathered up again. Yet God does not [simply] take away life, but devises plans so that the one who is banished is not driven away from Him. '
  '15':
  - type: text
    content: 'Now I came to speak of this matter to my lord the king because the people have made me afraid. So your maidservant thought, ‘I will just speak to the king; perhaps the king will do what his maidservant requests. '
  '16':
  - type: text
    content: 'For the king will hear and save his maidservant from the hand of the man who would destroy me and my son together from the inheritance of God.’ '
  '17':
  - type: text
    content: Then your maidservant said, ‘Please let the word of my lord the king be comforting, for my lord the king is as the angel of God to discern good and evil. May the L
  - type: heading
    content: ord
  - type: text
    content: ' your God be with you.’ ”'
  '18':
  - type: text
    content: 'Then the king answered and said to the woman, “Do not hide from me anything that I ask you.” And the woman said, “Let my lord the king please speak.” '
  '19':
  - type: text
    content: 'The king said, “Is the hand of Joab with you in all of this?” And the woman answered, “As your soul lives, my lord the king, no one can turn to the right or to the left from anything that my lord the king has said. Indeed, it was your servant Joab who commanded me; he put all these words in the mouth of your maidservant. '
  '2':
  - type: text
    content: 'So Joab sent '
  - type: text
    content: word
  - type: text
    content: ' to Tekoa and had a wise woman brought from there and told her, “Please pretend to be a mourner, and put on mourning clothes, and do not anoint yourself with oil, but act like a woman who has for many days been in mourning for the dead. '
  '20':
  - type: text
    content: In order to change the appearance of things [between Absalom and you, his father] your servant Joab did this thing. But my lord has wisdom like the wisdom of the angel of God, to know everything that is in the earth.”
  - type: heading
    content: Absalom Is Recalled
  '21':
  - type: text
    content: 'Then the king said to Joab, “Listen, I will most certainly do this thing; now go, bring back the young man Absalom.” '
  '22':
  - type: text
    content: 'Joab bowed his face toward the ground and lay himself down and blessed the king. Then Joab said, “Today your servant knows that I have found favor in your sight, my lord, O king, in that the king has done the request of his servant.” '
  '23':
  - type: text
    content: 'So Joab got up, went to Geshur, and brought Absalom to Jerusalem. '
  '24':
  - type: text
    content: However, the king said, “Let him go to his own house, and do not let him see my face.” So Absalom went to his own house and did not see the king’s face.
  '25':
  - type: text
    content: 'Now in all Israel there was no man as handsome as Absalom, so highly praised [for that]; from the sole of his foot to the crown of his head there was no blemish in him. '
  '26':
  - type: text
    content: 'When he cut the hair of his head (for at the end of each year he cut it, because its weight was heavy on him) he weighed the hair of his head at '
  - type: note
    content: I.e. about 4 lbs.
  - type: text
    content: '200 shekels by the king’s weight. '
  '27':
  - type: text
    content: 'To Absalom were born three sons and one daughter whose name was '
  - type: note
    content: Absalom named his daughter after his sister.
  - type: text
    content: Tamar; she was a beautiful woman.
  '28':
  - type: text
    content: 'Absalom lived two full years in Jerusalem, without seeing the king’s face. '
  '29':
  - type: text
    content: 'So Absalom sent for Joab, to send him to the king, but he would not come to him; even when he sent again a second time, he [still] would not come. '
  '3':
  - type: text
    content: 'Then go to the king and speak to him in this way.” So Joab '
  - type: note
    content: Lit put the words in her mouth.
  - type: text
    content: told her what to say.
  '30':
  - type: text
    content: 'Therefore Absalom said to his servants, “See, Joab’s property is near mine, and he has barley there; go and set it on fire.” So Absalom’s servants set the field on fire. '
  '31':
  - type: text
    content: 'Then Joab '
  - type: note
    content: Lit arose.
  - type: text
    content: 'took action and went to Absalom at his house and said to him, “Why did your servants set my field on fire?” '
  '32':
  - type: text
    content: 'Absalom answered Joab, “I sent for you, saying, ‘Come here, so that I may send you to the king to ask, “Why have I come [back] from Geshur? It would be better for me to still be there.” ’ Now then, let me see the king’s face, and if there is guilt in me, let him put me to death.” '
  '33':
  - type: text
    content: So Joab came to the king and told him. Then David called for Absalom, and he came to the king and bowed his face to the ground before the king; and the king kissed Absalom.
  '4':
  - type: text
    content: 'When the woman of Tekoa spoke to the king, she bowed with her face to the ground and lay herself down, and said, “Help, O king.” '
  '5':
  - type: text
    content: The king asked her, “
  - type: note
    content: Lit What’s with you.
  - type: text
    content: 'What is the matter?” She said, “Truly I am a widow; my husband is dead. '
  '6':
  - type: text
    content: 'Your maidservant had two sons, but the two of them struggled '
  - type: text
    content: and
  - type: text
    content: ' fought in the field. There was no one to separate them, so one struck the other and killed him. '
  '7':
  - type: text
    content: 'Now behold, the entire family has risen against your maidservant, and they say, ‘Hand over the one who killed his brother, so that we may '
  - type: note
    content: The custom of the time permitted a near relative of the victim to kill the perpetrator.
  - type: text
    content: put him to death [to pay] for the life of his brother whom he killed and destroy the heir also.’ By doing this they will extinguish my coal that is left, leaving my husband without a name or a remnant (heir) on the face of the earth.”
  '8':
  - type: text
    content: 'Then David said to the woman, “Go to your home, and I will give orders concerning you.” '
  '9':
  - type: text
    content: 'The woman of Tekoa said to the king, “My lord, O king, the guilt is on me and on my father’s house, but the king and his throne are guiltless.” '
