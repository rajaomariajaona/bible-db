        - type: text
          text: The ancient rabbis said that the twenty-six verses of this Psalm correspond to the twenty-six generations from Adam to Moses. They maintained that since these generations were not given the Torah (Law), they could not earn merit and were sustained only by God’s “lovingkindness.”
      marker-yv: yv-n
