document_id: PSA.136,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 136
  - type: heading
    content: Thanks for the Lord’s Goodness to Israel.
  - type: text
    content: ' '
  - type: note
    content: The ancient rabbis said that the twenty-six verses of this Psalm correspond to the twenty-six generations from Adam to Moses. They maintained that since these generations were not given the Torah (Law), they could not earn merit and were sustained only by God’s “lovingkindness.”
  - type: text
    content: Give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ', for He is good;'
  - type: text
    content: For His lovingkindness (graciousness, mercy, compassion) endures forever.
  '10':
  - type: text
    content: ¶To Him who struck the firstborn of Egypt,
  - type: text
    content: For His lovingkindness endures forever; [Ex 12:29]
  '11':
  - type: text
    content: And brought Israel out from among them,
  - type: text
    content: For His lovingkindness endures forever; [Ex 12:51; 13:3, 17]
  '12':
  - type: text
    content: With a strong hand and with an outstretched arm,
  - type: text
    content: For His lovingkindness endures forever;
  '13':
  - type: text
    content: 'To Him who divided the '
  - type: note
    content: Lit Sea of Reeds.
  - type: text
    content: Red Sea into parts,
  - type: text
    content: For His lovingkindness endures forever; [Ex 14:21, 22]
  '14':
  - type: text
    content: And made Israel pass through the midst of it,
  - type: text
    content: For His lovingkindness endures forever;
  '15':
  - type: text
    content: But tossed Pharaoh and his army into the Red Sea,
  - type: text
    content: For His lovingkindness endures forever;
  '16':
  - type: text
    content: To Him who led His people through the wilderness,
  - type: text
    content: For His lovingkindness endures forever;
  '17':
  - type: text
    content: To Him who struck down great kings,
  - type: text
    content: For His lovingkindness endures forever;
  '18':
  - type: text
    content: And killed mighty kings,
  - type: text
    content: For His lovingkindness endures forever; [Deut 29:7]
  '19':
  - type: text
    content: Sihon, king of the Amorites,
  - type: text
    content: For His lovingkindness endures forever; [Num 21:21-24]
  '2':
  - type: text
    content: Give thanks to the God of gods,
  - type: text
    content: For His lovingkindness endures forever.
  '20':
  - type: text
    content: And Og, king of Bashan,
  - type: text
    content: For His lovingkindness endures forever; [Num 21:33-35]
  '21':
  - type: text
    content: And gave their land as a heritage,
  - type: text
    content: For His lovingkindness endures forever;
  '22':
  - type: text
    content: Even a heritage to Israel His servant,
  - type: text
    content: For His lovingkindness endures forever; [Josh 12:1]
  '23':
  - type: text
    content: ¶Who [faithfully] remembered us in our lowly condition,
  - type: text
    content: For His lovingkindness endures forever;
  '24':
  - type: text
    content: And has rescued us from our enemies,
  - type: text
    content: For His lovingkindness endures forever;
  '25':
  - type: text
    content: Who gives food to all flesh,
  - type: text
    content: For His lovingkindness endures forever;
  '26':
  - type: text
    content: Give thanks to the God of heaven,
  - type: text
    content: For His lovingkindness (graciousness, mercy, compassion) endures forever.
  '3':
  - type: text
    content: Give thanks to the Lord of lords,
  - type: text
    content: For His lovingkindness endures forever.
  '4':
  - type: text
    content: To Him who alone does great wonders,
  - type: text
    content: For His lovingkindness endures forever;
  '5':
  - type: text
    content: To Him who made the heavens with skill,
  - type: text
    content: For His lovingkindness endures forever;
  '6':
  - type: text
    content: To Him who stretched out the earth upon the waters,
  - type: text
    content: For His lovingkindness endures forever;
  '7':
  - type: text
    content: To Him who made the great lights,
  - type: text
    content: For His lovingkindness endures forever;
  '8':
  - type: text
    content: The sun to rule over the day,
  - type: text
    content: For His lovingkindness endures forever;
  '9':
  - type: text
    content: The moon and stars to rule by night,
  - type: text
    content: For His lovingkindness endures forever;
