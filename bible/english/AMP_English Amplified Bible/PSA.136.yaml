  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶To Him who struck the firstborn of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever; [Ex 12:29]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brought Israel out from among them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever; [Ex 12:51; 13:3, 17]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
