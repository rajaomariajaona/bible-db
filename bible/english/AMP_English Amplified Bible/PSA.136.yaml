  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And made Israel pass through the midst of it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But tossed Pharaoh and his army into the Red Sea,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him who led His people through the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him who struck down great kings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And killed mighty kings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever; [Deut 29:7]
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sihon, king of the Amorites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever; [Num 21:21-24]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to the God of gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Og, king of Bashan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever; [Num 21:33-35]
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gave their land as a heritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even a heritage to Israel His servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever; [Josh 12:1]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Who [faithfully] remembered us in our lowly condition,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And has rescued us from our enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who gives food to all flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to the God of heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness (graciousness, mercy, compassion) endures forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give thanks to the Lord of lords,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him who alone does great wonders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him who made the heavens with skill,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him who stretched out the earth upon the waters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To Him who made the great lights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun to rule over the day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The moon and stars to rule by night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For His lovingkindness endures forever;
