  '1':
  - type: heading
    content: Offerings for the Sanctuary
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: '“They shall make an ark of acacia wood two and a half '
  - type: note
    content: Ancient measurements like the cubit were intended to be practical in that they usually were equivalent to something that was handy and readily available. The cubit was the distance from the elbow to the outstretched fingers, and the hand width (v 25)—as its name implies—was the width of the four fingers.
  - type: text
    content: 'cubits long, one and a half cubits wide, and one and a half cubits high. '
  '11':
  - type: text
    content: 'You shall overlay the ark with pure gold, overlay it inside and out, and you shall make a gold border (frame) around its top. '
  '12':
  - type: text
    content: 'You shall cast four gold rings for it and attach them to the four feet, two rings on either side. '
  '13':
  - type: text
    content: 'You shall make [carrying] poles of acacia wood and overlay them with gold, '
  '14':
  - type: text
    content: 'and put the poles through the rings on the sides of the ark, by which to carry it. '
  '15':
  - type: text
    content: 'The poles shall remain in the rings of the ark; they shall not be removed from it [so that the ark itself need not be touched]. '
  '16':
  - type: text
    content: You shall put into the ark the Testimony (Ten Commandments) which I will give you.
  '17':
  - type: text
    content: '“You shall make a '
  - type: note
    content: This was a special cover serving as the place of atonement for sin, where the high priest would sprinkle the blood of a sacrifice to reconcile the Israelites to God.
  - type: text
    content: 'mercy seat (cover) of pure gold, two and a half cubits long and one and a half cubits wide. '
  '18':
  - type: text
    content: 'You shall make two cherubim (winged angelic figures) of [solid] hammered gold at the two ends of the mercy seat. '
  '19':
  - type: text
    content: 'Make one cherub at each end, making the cherubim '
  - type: text
    content: of one piece
  - type: text
    content: ' with the mercy seat at its two ends. '
  '2':
  - type: text
    content: '“Tell the children of Israel to take an offering for Me. From every man whose heart moves him [to give willingly] you shall take My offering. '
  '20':
  - type: text
    content: 'The cherubim shall have their wings spread upward, covering the mercy seat with their wings and facing each other. The faces of the cherubim are to be '
  - type: text
    content: looking downward
  - type: text
    content: ' toward the mercy seat. '
  '21':
  - type: text
    content: 'You shall put the mercy seat on the top of the ark, and in the ark you shall put the Testimony which I will give you. '
  '22':
  - type: text
    content: There I will meet with you; from above the mercy seat, from between the two cherubim which are on the ark of the Testimony, I will speak [intimately] with you regarding every commandment that I will give you for the Israelites.
  - type: heading
    content: The Table of Bread
  '23':
  - type: text
    content: '“You shall make a table of acacia wood, two cubits long, one cubit wide, and one and a half cubits high. '
  '24':
  - type: text
    content: 'You shall overlay it with pure gold and make a border of gold around the top of it. '
  '25':
  - type: text
    content: 'You shall make a rim of a hand width around it; you shall make a gold border for the rim around it. '
  '26':
  - type: text
    content: 'You shall make four gold rings for it and fasten them at the four corners that are on the table’s four legs. '
  '27':
  - type: text
    content: 'The rings shall be close against the rim as holders for the poles to carry the table. '
  '28':
  - type: text
    content: 'You shall make the poles of acacia wood and overlay them with gold, so that the table may be carried with them. '
  '29':
  - type: text
    content: 'You shall make its plates [for the showbread] and its cups [for incense] and its pitchers and bowls for sacrificial drink offerings; you shall make them of pure gold. '
  '3':
  - type: text
    content: 'This is the offering you are to receive from them: gold, silver, and bronze, '
  '30':
  - type: text
    content: 'You shall set the bread of the '
  - type: note
    content: Lit Face.
  - type: text
    content: Presence (showbread) on the table before Me at all times. [John 6:58]
  - type: heading
    content: The Golden Lampstand
  '31':
  - type: text
    content: '“You shall make a lampstand of pure gold. The '
  - type: note
    content: In Hebrew, menorah.
  - type: text
    content: 'lampstand and its base and its shaft shall be made of hammered work; its cups, its '
  - type: note
    content: Leaf-like outer part of the flower.
  - type: text
    content: 'calyxes and its flowers shall be '
  - type: text
    content: all of one piece
  - type: text
    content: ' with it. '
  '32':
  - type: text
    content: 'Six branches shall come out of its sides; three branches of the lampstand out of the one side and three branches of the lampstand out of its other side [the shaft being the seventh branch]. '
  '33':
  - type: text
    content: 'Three cups shall be made like almond '
  - type: text
    content: blossoms,
  - type: text
    content: ' each with a calyx and a flower on one branch, and three cups made like almond '
  - type: text
    content: blossoms
  - type: text
    content: ' on the other branch with a calyx and a flower—so for the six branches coming out of the lampstand; '
  '34':
  - type: text
    content: 'and in the [center shaft of the] lampstand [you shall make] four cups shaped like almond '
  - type: text
    content: blossoms,
  - type: text
    content: ' with their calyxes and their flowers. '
  '35':
  - type: text
    content: 'A calyx shall be under the '
  - type: text
    content: first
  - type: text
    content: ' pair of branches coming out of it, and a calyx under the '
  - type: text
    content: second
  - type: text
    content: ' pair of branches coming out of it, and a calyx under the '
  - type: text
    content: third
  - type: text
    content: ' pair of branches coming out of it, for the six branches coming out of the lampstand. '
  '36':
  - type: text
    content: 'Their calyxes and their branches '
  - type: text
    content: shall be of one piece
  - type: text
    content: ' with it; all of it shall be one piece of hammered work of pure gold. '
  '37':
  - type: text
    content: 'Then you shall make the lamps [of the lampstand] '
  - type: note
    content: The first objective evidence of the sevenfold lamp was found during an excavation of Tel Beit Mirsim, south of Jerusalem, where seven-armed lamps dated about 1200 b.c. were found. The seventh season at the Dothan excavation uncovered three sevenfold lamps from the period 1400-1200 b.c.
  - type: text
    content: 'seven '
  - type: text
    content: in number
  - type: text
    content: ' [with one lamp at the top of the shaft]. The priests shall set up its '
  - type: text
    content: seven
  - type: text
    content: ' lamps so that they will light the space in front of it. '
  '38':
  - type: text
    content: 'Its snuffers and their trays shall be of pure gold. '
  '39':
  - type: text
    content: 'It shall be made from a talent (50-80 lbs.) of pure gold, including all these utensils. '
  '4':
  - type: text
    content: 'blue, purple, and scarlet fabric, fine twisted linen, goats’ '
  - type: text
    content: hair,
  - type: text
    content: ' '
  '40':
  - type: text
    content: See that you make them [exactly] after their pattern which was shown to you on the mountain. [Heb 8:5, 6]
  '5':
  - type: text
    content: 'rams’ '
  - type: note
    content: The finished product would be similar to morocco leather.
  - type: text
    content: 'skins dyed red, '
  - type: note
    content: The meaning of the Hebrew word is not certain; some scholars have suggested that the material is instead a fine leather of unspecified origin.
  - type: text
    content: 'porpoise skins, '
  - type: note
    content: The acacia tree grows wild in the Sinai region. The organic compounds in its wood, which is harder than oak, repel insects and grazing animals.
  - type: text
    content: 'acacia wood, '
  '6':
  - type: text
    content: '[olive] oil for lighting, '
  - type: note
    content: Various pleasantly scented plant products.
  - type: text
    content: 'balsam for the anointing oil and for the fragrant incense, '
  '7':
  - type: note
    content: There is usually uncertainty about the identification of precious stones mentioned in the Bible.
  - type: text
    content: 'onyx stones and setting stones for the [priest’s] ephod and for the breastpiece. '
  '8':
  - type: text
    content: 'Have them build a sanctuary for Me, so that I may dwell among them. [Heb 8:1, 2; 10:1] '
  '9':
  - type: text
    content: You shall construct it in accordance with everything that I am going to show you, as the pattern of the tabernacle and the pattern of all its furniture.
  - type: heading
    content: Ark of the Covenant
