document_id: EXO.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Offerings for the Sanctuary
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Tell the children of Israel to take an offering for Me. From every man whose heart moves him [to give willingly] you shall take My offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is the offering you are to receive from them: gold, silver, and bronze, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'blue, purple, and scarlet fabric, fine twisted linen, goats’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hair,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'rams’ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The finished product would be similar to morocco leather.
    marker-yv: yv-n
  - type: text
    text: 'skins dyed red, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew word is not certain; some scholars have suggested that the material is instead a fine leather of unspecified origin.
    marker-yv: yv-n
  - type: text
    text: 'porpoise skins, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The acacia tree grows wild in the Sinai region. The organic compounds in its wood, which is harder than oak, repel insects and grazing animals.
    marker-yv: yv-n
  - type: text
    text: 'acacia wood, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '[olive] oil for lighting, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Various pleasantly scented plant products.
    marker-yv: yv-n
  - type: text
    text: 'balsam for the anointing oil and for the fragrant incense, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is usually uncertainty about the identification of precious stones mentioned in the Bible.
    marker-yv: yv-n
  - type: text
    text: 'onyx stones and setting stones for the [priest’s] ephod and for the breastpiece. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Have them build a sanctuary for Me, so that I may dwell among them. [Heb 8:1, 2; 10:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You shall construct it in accordance with everything that I am going to show you, as the pattern of the tabernacle and the pattern of all its furniture.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ark of the Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“They shall make an ark of acacia wood two and a half '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ancient measurements like the cubit were intended to be practical in that they usually were equivalent to something that was handy and readily available. The cubit was the distance from the elbow to the outstretched fingers, and the hand width (v 25)—as its name implies—was the width of the four fingers.
    marker-yv: yv-n
  - type: text
    text: 'cubits long, one and a half cubits wide, and one and a half cubits high. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You shall overlay the ark with pure gold, overlay it inside and out, and you shall make a gold border (frame) around its top. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You shall cast four gold rings for it and attach them to the four feet, two rings on either side. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You shall make [carrying] poles of acacia wood and overlay them with gold, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and put the poles through the rings on the sides of the ark, by which to carry it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The poles shall remain in the rings of the ark; they shall not be removed from it [so that the ark itself need not be touched]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You shall put into the ark the Testimony (Ten Commandments) which I will give you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“You shall make a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a special cover serving as the place of atonement for sin, where the high priest would sprinkle the blood of a sacrifice to reconcile the Israelites to God.
    marker-yv: yv-n
  - type: text
    text: 'mercy seat (cover) of pure gold, two and a half cubits long and one and a half cubits wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'You shall make two cherubim (winged angelic figures) of [solid] hammered gold at the two ends of the mercy seat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Make one cherub at each end, making the cherubim '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of one piece
  - type: text
    text: ' with the mercy seat at its two ends. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The cherubim shall have their wings spread upward, covering the mercy seat with their wings and facing each other. The faces of the cherubim are to be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: looking downward
  - type: text
    text: ' toward the mercy seat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You shall put the mercy seat on the top of the ark, and in the ark you shall put the Testimony which I will give you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: There I will meet with you; from above the mercy seat, from between the two cherubim which are on the ark of the Testimony, I will speak [intimately] with you regarding every commandment that I will give you for the Israelites.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Table of Bread
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“You shall make a table of acacia wood, two cubits long, one cubit wide, and one and a half cubits high. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You shall overlay it with pure gold and make a border of gold around the top of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'You shall make a rim of a hand width around it; you shall make a gold border for the rim around it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'You shall make four gold rings for it and fasten them at the four corners that are on the table’s four legs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The rings shall be close against the rim as holders for the poles to carry the table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You shall make the poles of acacia wood and overlay them with gold, so that the table may be carried with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'You shall make its plates [for the showbread] and its cups [for incense] and its pitchers and bowls for sacrificial drink offerings; you shall make them of pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'You shall set the bread of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Face
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Presence (showbread) on the table before Me at all times. [John 6:58]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Golden Lampstand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“You shall make a lampstand of pure gold. The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In Hebrew, '
      - type: usfm
        marker: it
        children:
        - type: text
          text: menorah
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'lampstand and its base and its shaft shall be made of hammered work; its cups, its '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Leaf-like outer part of the flower.
    marker-yv: yv-n
  - type: text
    text: 'calyxes and its flowers shall be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all of one piece
  - type: text
    text: ' with it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Six branches shall come out of its sides; three branches of the lampstand out of the one side and three branches of the lampstand out of its other side [the shaft being the seventh branch]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Three cups shall be made like almond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blossoms,
  - type: text
    text: ' each with a calyx and a flower on one branch, and three cups made like almond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blossoms
  - type: text
    text: ' on the other branch with a calyx and a flower—so for the six branches coming out of the lampstand; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and in the [center shaft of the] lampstand [you shall make] four cups shaped like almond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blossoms,
  - type: text
    text: ' with their calyxes and their flowers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'A calyx shall be under the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' pair of branches coming out of it, and a calyx under the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: second
  - type: text
    text: ' pair of branches coming out of it, and a calyx under the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: third
  - type: text
    text: ' pair of branches coming out of it, for the six branches coming out of the lampstand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Their calyxes and their branches '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall be of one piece
  - type: text
    text: ' with it; all of it shall be one piece of hammered work of pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then you shall make the lamps [of the lampstand] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The first objective evidence of the sevenfold lamp was found during an excavation of Tel Beit Mirsim, south of Jerusalem, where seven-armed lamps dated about 1200 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '. were found. The seventh season at the Dothan excavation uncovered three sevenfold lamps from the period 1400-1200 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'seven '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in number
  - type: text
    text: ' [with one lamp at the top of the shaft]. The priests shall set up its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: seven
  - type: text
    text: ' lamps so that they will light the space in front of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Its snuffers and their trays shall be of pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'It shall be made from a talent (50-80 lbs.) of pure gold, including all these utensils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: See that you make them [exactly] after their pattern which was shown to you on the mountain. [Heb 8:5, 6]
