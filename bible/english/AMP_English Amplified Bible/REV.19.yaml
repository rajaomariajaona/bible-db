    children:
    - type: text
      text: 'And I saw heaven opened, and behold, a white horse, and He who was riding it is called Faithful and True (trustworthy, loyal, incorruptible, steady), and in righteousness He judges and wages war [on the rebellious nations]. [2 Thess 1:7-10] '
  '12':
  - type: usfm
    marker: p
