    content: Psalm 74
  - type: heading
    content: An Appeal against the Devastation of the Land by the Enemy.
  - type: text
    content: 'A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem, of Asaph.'
  - type: text
    content: O God, why have You rejected us forever?
  - type: text
    content: Why does Your anger smoke against the sheep of Your pasture?
  '10':
  - type: text
    content: O God, how long will the adversary scoff?
  - type: text
    content: Is the enemy to revile Your name forever?
  '11':
  - type: text
    content: Why do You withdraw Your hand, even Your right hand [from judging the enemy]?
  - type: text
    content: Remove Your hand
  - type: text
    content: ' from Your chest, destroy '
  - type: text
    content: them!
  '12':
  - type: text
    content: ¶Yet God is my King of old,
  - type: text
    content: Working salvation in the midst of the earth.
  '13':
  - type: text
    content: You divided the [Red] Sea by Your strength;
  - type: text
    content: 'You broke the heads of the '
  - type: note
    content: Symbolic of Egypt’s power.
  - type: text
    content: sea monsters in the waters. [Ex 14:21]
  '14':
  - type: text
    content: 'You crushed the heads of '
  - type: note
    content: See note Job 41:1.
  - type: text
    content: Leviathan (Egypt);
  - type: text
    content: You gave him as food for the creatures of the wilderness. [Job 41:1]
  '15':
  - type: text
    content: You broke open fountains and streams;
  - type: text
    content: You dried up ever-flowing rivers. [Ex 17:6; Num 20:11; Josh 3:13]
  '16':
  - type: text
    content: The day is Yours, the night also is Yours;
  - type: text
    content: 'You have established '
  - type: text
    content: and
  - type: text
    content: ' prepared the [heavenly] light and the sun.'
  '17':
  - type: text
    content: 'You have defined '
  - type: text
    content: and
  - type: text
    content: ' established all the borders of the earth [the divisions of land and sea and of the nations];'
  - type: text
    content: You have made summer and winter. [Acts 17:26]
  '18':
  - type: text
    content: ¶Remember this, O L
  - type: heading
    content: ord
  - type: text
    content: ', the enemy has scoffed,'
  - type: text
    content: 'And a foolish '
  - type: text
    content: and
  - type: text
    content: ' impious people has spurned Your name.'
  '19':
  - type: text
    content: Oh, do not hand over the soul of your turtledove to the wild beast;
  - type: text
    content: Do not forget the life of Your afflicted forever.
  '2':
  - type: text
    content: Remember Your congregation, which You have purchased of old,
  - type: text
    content: Which You have redeemed to be the tribe of Your inheritance;
  - type: text
    content: Remember Mount Zion, where You have dwelt.
  '20':
  - type: text
    content: Consider the covenant [You made with Abraham],
  - type: text
    content: For the dark places of the land are full of the habitations of violence.
  '21':
  - type: text
    content: Let not the oppressed return dishonored;
  - type: text
    content: Let the afflicted and needy praise Your name.
  '22':
  - type: text
    content: ¶Arise, O God, plead Your own cause;
  - type: text
    content: Remember how the foolish man scoffs at You all day long.
  '23':
  - type: text
    content: Do not forget the [clamoring] voices of Your adversaries,
  - type: text
    content: The uproar of those who rise against You, which ascends continually [to Your ears].
  '3':
  - type: text
    content: Turn your footsteps [quickly] toward the perpetual ruins;
  - type: text
    content: The enemy has damaged everything within the sanctuary.
  '4':
  - type: text
    content: In the midst of Your meeting place Your enemies have roared [with their battle cry];
  - type: text
    content: They have set up their own emblems for signs [of victory].
  '5':
  - type: text
    content: It seems as if one had lifted up
  - type: text
    content: An axe in a forest of trees [to set a record of destruction].
  '6':
  - type: text
    content: And now all the carved work [of the meeting place]
  - type: text
    content: They smash with hatchets and hammers.
  '7':
  - type: text
    content: They have burned Your sanctuary to the ground;
  - type: text
    content: 'They have profaned the dwelling place of Your '
  - type: note
    content: See note Deut 12:5.
  - type: text
    content: name.
  '8':
  - type: text
    content: They said in their heart, “Let us completely subdue them.”
  - type: text
    content: They have burned all the meeting places of God in the land.
  '9':
  - type: text
    content: We do not see our symbols;
  - type: text
    content: There is no longer any prophet [to guide us],
  - type: text
    content: Nor does any among us know for how long.
