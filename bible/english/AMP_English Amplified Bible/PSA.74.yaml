document_id: PSA.74
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 74
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: An Appeal against the Devastation of the Land by the Enemy.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem, of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, why have You rejected us forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why does Your anger smoke against the sheep of Your pasture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Remember Your congregation, which You have purchased of old,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which You have redeemed to be the tribe of Your inheritance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember Mount Zion, where You have dwelt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Turn your footsteps [quickly] toward the perpetual ruins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The enemy has damaged everything within the sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In the midst of Your meeting place Your enemies have roared [with their battle cry];
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have set up their own emblems for signs [of victory].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It seems as if one had lifted up
- type: usfm
  marker: q1
  children:
  - type: text
    text: An axe in a forest of trees [to set a record of destruction].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And now all the carved work [of the meeting place]
- type: usfm
  marker: q1
  children:
  - type: text
    text: They smash with hatchets and hammers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They have burned Your sanctuary to the ground;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They have profaned the dwelling place of Your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Deut 12:5.
    marker-yv: yv-n
  - type: text
    text: name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They said in their heart, “Let us completely subdue them.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have burned all the meeting places of God in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We do not see our symbols;
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no longer any prophet [to guide us],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor does any among us know for how long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O God, how long will the adversary scoff?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is the enemy to revile Your name forever?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why do You withdraw Your hand, even Your right hand [from judging the enemy]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Remove Your hand
  - type: text
    text: ' from Your chest, destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶Yet God is my King of old,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Working salvation in the midst of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You divided the [Red] Sea by Your strength;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You broke the heads of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Symbolic of Egypt’s power.
    marker-yv: yv-n
  - type: text
    text: sea monsters in the waters. [Ex 14:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You crushed the heads of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '74:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Job 41:1.
    marker-yv: yv-n
  - type: text
    text: Leviathan (Egypt);
- type: usfm
  marker: q1
  children:
  - type: text
    text: You gave him as food for the creatures of the wilderness. [Job 41:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You broke open fountains and streams;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You dried up ever-flowing rivers. [Ex 17:6; Num 20:11; Josh 3:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The day is Yours, the night also is Yours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prepared the [heavenly] light and the sun.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You have defined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established all the borders of the earth [the divisions of land and sea and of the nations];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have made summer and winter. [Acts 17:26]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Remember this, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the enemy has scoffed,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And a foolish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' impious people has spurned Your name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oh, do not hand over the soul of your turtledove to the wild beast;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not forget the life of Your afflicted forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Consider the covenant [You made with Abraham],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the dark places of the land are full of the habitations of violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Let not the oppressed return dishonored;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the afflicted and needy praise Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶Arise, O God, plead Your own cause;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember how the foolish man scoffs at You all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Do not forget the [clamoring] voices of Your adversaries,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The uproar of those who rise against You, which ascends continually [to Your ears].
