document_id: LUK.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God Knows and Cares
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the meantime, after so many thousands of the people had gathered that they were stepping on one another, Jesus began speaking first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of all
  - type: text
    text: ' to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' on your guard against the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A substance such as yeast that consists mostly of fungi. This analogy relates the impurity of a leavening agent to the impurity of the man-made tradition and hypocrisy of the Pharisees that was preventing the nation of Israel from accepting the Messiah.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: leaven of the Pharisees
  - type: text
    text: ' [that is, their pervasive, corrupting influence and teaching], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: which is hypocrisy
  - type: text
    text: ' [producing self-righteousness]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But there is nothing
  - type: text
    text: ' [so carefully] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: concealed that it will not be revealed, nor so hidden that it will not be made known.
  - type: text
    text: ' [Matt 10:26-33; Mark 4:22] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For that reason, whatever you have said in the dark will be heard in the light, and what you have whispered behind closed doors will be proclaimed on the housetops.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I say to you, My friends, do not be afraid of those who kill the body and after that have nothing more that they can do.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But I will point out to you whom you should fear: fear the One who, after He has killed, has authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power to hurl'
  - type: text
    text: ' [you] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'into '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Matt 5:22.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: hell; yes, I say to you,
  - type: text
    text: ' [stand in great awe of God and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: fear Him!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Are not five sparrows sold for two '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: assarion,
      - type: text
        text: ' a Roman coin equal to a 16th of a denarius (the denarius was counted as a day’s wages for an unskilled worker).'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: copper coins? Yet not one of them has
  - type: text
    text: ' [ever] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: been forgotten in the presence of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Indeed the very hairs of your head are all numbered. Do not be afraid; you are far more valuable than many sparrows.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I say to you, whoever declares openly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confesses Me before men'
  - type: text
    text: ' [speaking freely of Me as his Lord], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'the Son of Man also will declare openly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confess him'
  - type: text
    text: ' [as one of His own] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: before the angels of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he who denies Me before men will be denied in the presence of the angels of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And everyone who speaks a word against the Son of Man, it will be forgiven him; but he who '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Blasphemy of the Holy Spirit involves treating the Holy Spirit irreverently by denying the power and work of the Holy Spirit. This leads ultimately to rejecting the deity of Christ.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: blasphemes against the Holy Spirit
  - type: text
    text: ' [that is, whoever intentionally discredits the Holy Spirit by attributing the authenticating miracles done by Me to Satan], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: it will not be forgiven him
  - type: text
    text: ' [for him there is no forgiveness]. [Matt 12:31; Mark 3:28-30] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When they bring you before the synagogues and the magistrates and the authorities, do not be worried about how you are to defend yourselves or what you are to say;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for the Holy Spirit will teach you in that very hour what you ought to say.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Covetousness Denounced
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Someone from the crowd said to Him, “Teacher, tell my brother to divide the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: family
  - type: text
    text: ' inheritance with me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But He said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Man, who appointed Me a judge or an arbitrator over
  - type: text
    text: ' [the two of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Watch out and guard yourselves against every form of greed; for not even when one has an overflowing abundance does his life consist of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' is it derived from his possessions.”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Wealthy Fool
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then He told them a parable, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“There was a rich man whose land was very fertile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' productive.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he began thinking to himself, ‘What shall I do, since I have no place
  - type: text
    text: ' [large enough in which] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to store my crops?’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then he said, ‘This is what I will do: I will tear down my storehouses and build larger ones, and I will store all my grain and my goods there.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I will say to my soul, “Soul, you have many good things stored up,
  - type: text
    text: ' [enough] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for many years; rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relax, eat, drink and be merry (celebrate continually).” ’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But God said to him, ‘You fool! This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: very
    - type: text
      text: ' night your soul is required of you; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: ' who will own all the things you have prepared?’'
  - type: text
    text: ' [Job 27:8; Jer 17:11] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'So it is for the one who continues to store up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hoard possessions for himself, and is not rich'
  - type: text
    text: ' [in his relationship] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: toward God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus said to His disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For this reason I tell you, do not worry about your life, as to what you will eat; or about your body, as to what you will wear.
  - type: text
    text: ' [Matt 6:25-33] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For life is more than food, and the body more than clothes.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Consider the ravens, for they neither sow
  - type: text
    text: ' [seed] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: nor reap
  - type: text
    text: ' [the crop]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: they have no storehouse or barn, and yet God feeds them. How much more valuable are you than the birds!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And which of you by worrying can add one hour to his life’s span?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if you are not even able to do a very little thing
  - type: text
    text: ' [such as that], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: why are you worried about the rest?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Consider the lilies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wildflowers, how they grow'
  - type: text
    text: ' [in the open field]. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They neither labor nor spin
  - type: text
    text: ' [wool to make clothing]; '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'yet I tell you, not even Solomon in all his glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' splendor dressed himself like one of these.'
  - type: text
    text: ' [1 Kin 10:4-7] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'But if this is how God clothes the grass which is in the field today and tomorrow is thrown into the furnace, how much more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will He clothe
    - type: text
      text: ' you? You of little faith!'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'So as for you, do not seek what you will eat and what you will drink; nor have an anxious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unsettled mind.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For all the
  - type: text
    text: ' [pagan] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: nations of the world greedily seek these things; and your
  - type: text
    text: ' [heavenly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Father
  - type: text
    text: ' [already] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: knows that you need them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But
  - type: text
    text: ' [strive for and actively] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: seek His kingdom, and these things will be given to you as well.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Do not be afraid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anxious, little flock, for it is your Father’s good pleasure to give you the kingdom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Sell your possessions (show compassion) and give
  - type: text
    text: ' [donations] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'to the poor. Provide money belts for yourselves that do not wear out, an unfailing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' inexhaustible treasure in the heavens, where no thief comes near and no moth destroys.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For where your treasure is, there your heart will be also.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Be in Readiness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be dressed and ready for active service, and keep your lamps continuously burning.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Be like men who are waiting for their master when he returns from the wedding feast, so that when he comes and knocks they may immediately open '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the door
    - type: text
      text: ' for him.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Blessed (happy, prosperous, to be admired) are those servants whom the master finds awake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' watching when he arrives. I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, he will prepare himself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to serve,
    - type: text
      text: ' and will have them recline '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table,
    - type: text
      text: ' and will come and wait on them.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whether he comes in the second watch (before midnight), or even in the third (after midnight), and finds them so
  - type: text
    text: ' [prepared and ready], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'blessed are those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: servants
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But be sure of this, that if the head of the house had known at what time the thief was coming, he
  - type: text
    text: ' [would have been awake and alert, and] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: would not have allowed his house to be broken into.
  - type: text
    text: ' [Matt 24:43, 44] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You too, be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' ready; because the Son of Man is coming at an hour that you do not expect.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
