      - type: text
        text: Joseph’s Success in Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph had been taken down to Egypt; and Potiphar, an Egyptian officer of Pharaoh, the captain of the [royal] guard, bought him from the Ishmaelites, who had taken him down there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so it was that she spoke to Joseph [persistently] day after day, but he did not listen to her [plea] to lie beside her or be with her. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then it happened one day that Joseph went into the house to attend to his duties, and none of the men of the household was there in the house. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She caught Joseph by his [outer] robe, saying, “Lie with me!” But he left his robe in her hand and ran, and got outside [the house]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she saw that he had left his robe in her hand and had run outside, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'she called to the men of her household and said to them, “Look at this, your master has brought a Hebrew [into the household] to mock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insult us; he came to me to lie with me, and I screamed. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he heard me screaming, he left his robe with me and ran outside [the house].” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she left Joseph’s [outer] robe beside her until his master came home. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she told her husband the same story, saying, “The Hebrew servant, whom you brought among us, came to me to mock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insult me; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then as soon as I raised my voice and screamed, he left his robe with me and ran outside [the house].”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joseph Imprisoned
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Joseph’s master heard the words of his wife, saying, “This is the way your servant treated me,” his anger burned. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with Joseph, and he [even though a slave] became a successful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosperous man; and he was in the house of his master, the Egyptian. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph’s master took him and put him in the prison, a place where the king’s prisoners were confined; so he was there in the prison. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with Joseph and extended lovingkindness to him, and gave him favor in the sight of the warden. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The warden committed to Joseph’s care (management) all the prisoners who were in the prison; so that whatever was done there, he was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the doer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in charge of it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The warden paid no attention to anything that was in Joseph’s care because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with him; whatever Joseph did, the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' made to prosper.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now his master saw that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was with him and that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' caused all that he did to prosper (succeed) in his hand. [Gen 21:22; 26:27, 28; 41:38, 39] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph pleased Potiphar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' found favor in his sight and he served him as his personal servant. He made Joseph overseer over his house, and he put all that he owned in Joseph’s charge. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It happened that from the time that he made Joseph overseer in his house and [put him in charge] over all that he owned, that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' blessed the Egyptian’s house because of Joseph; so the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' blessing was on everything that Potiphar owned, in the house and in the field. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Potiphar left all that he owned in Joseph’s charge; and with Joseph there he did not [need to] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
