verses:
  '1':
  - type: heading
    content: Joseph’s Success in Egypt
  - type: text
    content: 'Now Joseph had been taken down to Egypt; and Potiphar, an Egyptian officer of Pharaoh, the captain of the [royal] guard, bought him from the Ishmaelites, who had taken him down there. '
  '10':
  - type: text
    content: 'And so it was that she spoke to Joseph [persistently] day after day, but he did not listen to her [plea] to lie beside her or be with her. '
  '11':
  - type: text
    content: 'Then it happened one day that Joseph went into the house to attend to his duties, and none of the men of the household was there in the house. '
  '12':
  - type: text
    content: 'She caught Joseph by his [outer] robe, saying, “Lie with me!” But he left his robe in her hand and ran, and got outside [the house]. '
  '13':
  - type: text
    content: 'When she saw that he had left his robe in her hand and had run outside, '
  '14':
  - type: text
    content: 'she called to the men of her household and said to them, “Look at this, your master has brought a Hebrew [into the household] to mock '
  - type: text
    content: and
  - type: text
    content: ' insult us; he came to me to lie with me, and I screamed. '
  '15':
  - type: text
    content: 'When he heard me screaming, he left his robe with me and ran outside [the house].” '
  '16':
  - type: text
    content: 'So she left Joseph’s [outer] robe beside her until his master came home. '
  '17':
  - type: text
    content: 'Then she told her husband the same story, saying, “The Hebrew servant, whom you brought among us, came to me to mock '
  - type: text
    content: and
  - type: text
    content: ' insult me; '
  '18':
  - type: text
    content: then as soon as I raised my voice and screamed, he left his robe with me and ran outside [the house].”
  - type: heading
    content: Joseph Imprisoned
  '19':
  - type: text
    content: 'And when Joseph’s master heard the words of his wife, saying, “This is the way your servant treated me,” his anger burned. '
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' was with Joseph, and he [even though a slave] became a successful '
  - type: text
    content: and
  - type: text
    content: ' prosperous man; and he was in the house of his master, the Egyptian. '
  '20':
  - type: text
    content: 'So Joseph’s master took him and put him in the prison, a place where the king’s prisoners were confined; so he was there in the prison. '
  '21':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' was with Joseph and extended lovingkindness to him, and gave him favor in the sight of the warden. '
  '22':
  - type: text
    content: 'The warden committed to Joseph’s care (management) all the prisoners who were in the prison; so that whatever was done there, he was '
  - type: note
    content: Lit the doer.
  - type: text
    content: 'in charge of it. '
  '23':
  - type: text
    content: The warden paid no attention to anything that was in Joseph’s care because the L
  - type: heading
    content: ord
  - type: text
    content: ' was with him; whatever Joseph did, the L'
  - type: heading
    content: ord
  - type: text
    content: ' made to prosper.'
  '3':
  - type: text
    content: Now his master saw that the L
  - type: heading
    content: ord
  - type: text
    content: ' was with him and that the L'
  - type: heading
    content: ord
  - type: text
    content: ' caused all that he did to prosper (succeed) in his hand. [Gen 21:22; 26:27, 28; 41:38, 39] '
  '4':
  - type: text
    content: 'So Joseph pleased Potiphar '
  - type: text
    content: and
  - type: text
    content: ' found favor in his sight and he served him as his personal servant. He made Joseph overseer over his house, and he put all that he owned in Joseph’s charge. '
  '5':
  - type: text
    content: It happened that from the time that he made Joseph overseer in his house and [put him in charge] over all that he owned, that the L
  - type: heading
    content: ord
  - type: text
    content: ' blessed the Egyptian’s house because of Joseph; so the L'
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' blessing was on everything that Potiphar owned, in the house and in the field. '
  '6':
  - type: text
    content: 'So Potiphar left all that he owned in Joseph’s charge; and with Joseph there he did not [need to] '
  - type: note
    content: Lit know.
  - type: text
    content: pay attention to anything except the food he ate.
  - type: text
    content: N
  - type: text
    content: 'ow Joseph was handsome '
  - type: text
    content: and
  - type: text
    content: ' attractive in form and appearance. [Gen 43:32] '
  '7':
  - type: text
    content: 'Then after a time his master’s wife '
  - type: note
    content: Lit cast her eyes on.
  - type: text
    content: 'looked at Joseph with desire, and she said, “Lie with me.” '
  '8':
  - type: text
    content: 'But he refused and said to his master’s wife, “Look, with me in the house, my master does not concern himself with anything; he has put everything that he owns in my charge. '
  '9':
  - type: text
    content: 'He is not greater in this house than I am, nor has he kept anything from me except you, because you are his wife. How then could I do this great evil and sin against God [and your husband]?” '
