        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: pay attention to anything except the food he ate.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: N
    - type: text
      text: 'ow Joseph was handsome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attractive in form and appearance. [Gen 43:32] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then after a time his master’s wife '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: cast her eyes on
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'looked at Joseph with desire, and she said, “Lie with me.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he refused and said to his master’s wife, “Look, with me in the house, my master does not concern himself with anything; he has put everything that he owns in my charge. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is not greater in this house than I am, nor has he kept anything from me except you, because you are his wife. How then could I do this great evil and sin against God [and your husband]?” '
