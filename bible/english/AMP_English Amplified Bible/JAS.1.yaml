verses:
  '1':
  - type: heading
    content: Testing Your Faith
  - type: text
    content: ' '
  - type: note
    content: James, the leader of the Jerusalem church, was the half-brother of Jesus. He became a believer after the resurrection of Jesus and was later martyred for his faith.
  - type: text
    content: James, a bond-servant of God and of the Lord Jesus Christ,
  - type: text
    content: T
  - type: text
    content: 'o the twelve [Hebrew] tribes [scattered abroad among the Gentiles] in the dispersion: Greetings (rejoice)!'
  '10':
  - type: text
    content: 'and the rich man '
  - type: text
    content: is to glory
  - type: text
    content: ' in being humbled [by trials revealing human frailty, knowing true riches are found in the grace of God], for like the flower of the grass he will pass away. '
  '11':
  - type: text
    content: 'For the sun rises with a scorching wind and withers the grass; its flower falls off and '
  - type: note
    content: Lit the beauty of its face perishes.
  - type: text
    content: its beauty fades away; so too will the rich man, in the midst of his pursuits, fade away. [Is 40:6, 7]
  '12':
  - type: text
    content: 'Blessed [happy, spiritually prosperous, favored by God] is the man who is steadfast under trial '
  - type: text
    content: and
  - type: text
    content: ' perseveres when tempted; for when he has passed the test '
  - type: text
    content: and
  - type: text
    content: ' been approved, he will receive the [victor’s] crown of life which '
  - type: text
    content: the Lord
  - type: text
    content: ' has promised to those who love Him. '
  '13':
  - type: text
    content: 'Let no one say when he is tempted, “I am being tempted by God” [for temptation does not originate from God, but from our own flaws]; for God cannot be tempted by [what is] evil, and He Himself tempts no one. '
  '14':
  - type: text
    content: 'But each one is tempted when he is dragged away, enticed '
  - type: text
    content: and
  - type: text
    content: ' baited [to commit sin] by his own [worldly] desire (lust, passion). '
  '15':
  - type: text
    content: 'Then when the illicit desire has conceived, it gives birth to sin; and when sin has run its course, it gives birth to death. '
  '16':
  - type: text
    content: 'Do not be misled, my beloved brothers and sisters. '
  '17':
  - type: text
    content: 'Every good thing given and every perfect gift is from above; it comes down from the Father of lights [the Creator and Sustainer of the heavens], in whom there is no variation [no rising or setting] or shadow '
  - type: note
    content: Lit of turning.
  - type: text
    content: 'cast by His turning [for He is perfect and never changes]. '
  '18':
  - type: text
    content: It was of His own will that He gave us birth [as His children] by the word of truth, so that we would be a kind of first fruits of His creatures [a prime example of what He created to be set apart to Himself—sanctified, made holy for His divine purposes].
  '19':
  - type: text
    content: 'Understand this, my beloved brothers and sisters. Let everyone be quick to hear [be a careful, thoughtful listener], slow to speak [a speaker of carefully chosen words and], slow to anger [patient, reflective, forgiving]; '
  '2':
  - type: text
    content: 'Consider it nothing but joy, my '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters, whenever you fall into various trials. '
  '20':
  - type: text
    content: 'for the [resentful, deep-seated] anger of man does not produce the righteousness of God [that standard of behavior which He requires from us]. '
  '21':
  - type: text
    content: 'So get rid of all uncleanness and '
  - type: note
    content: Lit surplus of.
  - type: text
    content: 'all that remains of wickedness, and with a humble spirit receive the word [of God] which is implanted [actually rooted in your heart], which is able to save your souls. '
  '22':
  - type: text
    content: 'But prove yourselves doers of the word [actively and continually obeying God’s precepts], and not merely listeners [who hear the word but fail to internalize its meaning], deluding yourselves [by unsound reasoning contrary to the truth]. '
  '23':
  - type: text
    content: 'For if anyone only listens to the word '
  - type: note
    content: Lit and is not a doer.
  - type: text
    content: 'without obeying it, he is like a man who looks very carefully at his natural face in a mirror; '
  '24':
  - type: text
    content: 'for '
  - type: text
    content: once
  - type: text
    content: ' he has looked at himself and gone away, he immediately forgets '
  - type: note
    content: Lit what sort he was.
  - type: text
    content: 'what he looked like. '
  '25':
  - type: text
    content: 'But he who looks carefully into the perfect law, the '
  - type: text
    content: law
  - type: text
    content: ' of liberty, and faithfully abides by it, not having become a [careless] listener who forgets but '
  - type: note
    content: Lit a doer of work.
  - type: text
    content: 'an active doer [who obeys], he will be blessed '
  - type: text
    content: and
  - type: text
    content: ' favored by God in what he does [in his life of obedience].'
  '26':
  - type: text
    content: 'If anyone thinks himself to be religious [scrupulously observant of the rituals of his faith], and does not control his tongue but deludes his '
  - type: text
    content: own
  - type: text
    content: ' heart, this person’s religion is worthless (futile, barren). '
  '27':
  - type: text
    content: 'Pure and unblemished religion [as it is expressed in outward acts] in the sight of our God and Father is this: to visit '
  - type: text
    content: and
  - type: text
    content: ' look after the fatherless and the widows in their distress, and to keep oneself uncontaminated by the [secular] world.'
  '3':
  - type: text
    content: 'Be assured that the testing of your faith [through experience] produces endurance [leading to spiritual maturity, and inner peace]. '
  '4':
  - type: text
    content: 'And let endurance have its perfect result '
  - type: text
    content: and
  - type: text
    content: ' do a thorough work, so that you may be perfect and completely developed [in your faith], lacking in nothing.'
  '5':
  - type: text
    content: 'If any of you lacks wisdom [to guide him through a decision or circumstance], he is to ask of [our benevolent] God, who gives to everyone generously and without rebuke '
  - type: text
    content: or
  - type: text
    content: ' blame, and it will be given to him. '
  '6':
  - type: text
    content: 'But he must ask [for wisdom] in faith, without doubting [God’s willingness to help], for the one who doubts is like a billowing surge of the sea that is blown about and tossed by the wind. '
  '7':
  - type: text
    content: 'For such a person ought not to think '
  - type: text
    content: or
  - type: text
    content: ' expect that he will receive anything [at all] from the Lord, '
  '8':
  - type: text
    content: being
  - type: text
    content: ' a double-minded man, unstable '
  - type: text
    content: and
  - type: text
    content: ' restless in all his ways [in everything he thinks, feels, or decides].'
  '9':
  - type: text
    content: 'Let the brother in humble circumstances glory in his high position [as a born-again believer, called to the true riches and to be an heir of God]; '
