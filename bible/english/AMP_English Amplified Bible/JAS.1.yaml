document_id: JAS.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Testing Your Faith
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: James, the leader of the Jerusalem church, was the half-brother of Jesus. He became a believer after the resurrection of Jesus and was later martyred for his faith.
      marker-yv: yv-n
    - type: text
      text: James, a bond-servant of God and of the Lord Jesus Christ,
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'o the twelve [Hebrew] tribes [scattered abroad among the Gentiles] in the dispersion: Greetings (rejoice)!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and the rich man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is to glory
    - type: text
      text: ' in being humbled [by trials revealing human frailty, knowing true riches are found in the grace of God], for like the flower of the grass he will pass away. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the sun rises with a scorching wind and withers the grass; its flower falls off and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the beauty of its face perishes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: its beauty fades away; so too will the rich man, in the midst of his pursuits, fade away. [Is 40:6, 7]
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Blessed [happy, spiritually prosperous, favored by God] is the man who is steadfast under trial '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perseveres when tempted; for when he has passed the test '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' been approved, he will receive the [victor’s] crown of life which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Lord
    - type: text
      text: ' has promised to those who love Him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Let no one say when he is tempted, “I am being tempted by God” [for temptation does not originate from God, but from our own flaws]; for God cannot be tempted by [what is] evil, and He Himself tempts no one. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But each one is tempted when he is dragged away, enticed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' baited [to commit sin] by his own [worldly] desire (lust, passion). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then when the illicit desire has conceived, it gives birth to sin; and when sin has run its course, it gives birth to death. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Do not be misled, my beloved brothers and sisters. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Every good thing given and every perfect gift is from above; it comes down from the Father of lights [the Creator and Sustainer of the heavens], in whom there is no variation [no rising or setting] or shadow '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: of turning
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'cast by His turning [for He is perfect and never changes]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: It was of His own will that He gave us birth [as His children] by the word of truth, so that we would be a kind of first fruits of His creatures [a prime example of what He created to be set apart to Himself—sanctified, made holy for His divine purposes].
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Understand this, my beloved brothers and sisters. Let everyone be quick to hear [be a careful, thoughtful listener], slow to speak [a speaker of carefully chosen words and], slow to anger [patient, reflective, forgiving]; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Consider it nothing but joy, my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, whenever you fall into various trials. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'for the [resentful, deep-seated] anger of man does not produce the righteousness of God [that standard of behavior which He requires from us]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So get rid of all uncleanness and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: surplus of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'all that remains of wickedness, and with a humble spirit receive the word [of God] which is implanted [actually rooted in your heart], which is able to save your souls. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But prove yourselves doers of the word [actively and continually obeying God’s precepts], and not merely listeners [who hear the word but fail to internalize its meaning], deluding yourselves [by unsound reasoning contrary to the truth]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For if anyone only listens to the word '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: and is not a doer
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'without obeying it, he is like a man who looks very carefully at his natural face in a mirror; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: once
    - type: text
      text: ' he has looked at himself and gone away, he immediately forgets '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: what sort he was
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'what he looked like. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'But he who looks carefully into the perfect law, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: law
    - type: text
      text: ' of liberty, and faithfully abides by it, not having become a [careless] listener who forgets but '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a doer of work
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'an active doer [who obeys], he will be blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' favored by God in what he does [in his life of obedience].'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'If anyone thinks himself to be religious [scrupulously observant of the rituals of his faith], and does not control his tongue but deludes his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' heart, this person’s religion is worthless (futile, barren). '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Pure and unblemished religion [as it is expressed in outward acts] in the sight of our God and Father is this: to visit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' look after the fatherless and the widows in their distress, and to keep oneself uncontaminated by the [secular] world.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Be assured that the testing of your faith [through experience] produces endurance [leading to spiritual maturity, and inner peace]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And let endurance have its perfect result '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do a thorough work, so that you may be perfect and completely developed [in your faith], lacking in nothing.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'If any of you lacks wisdom [to guide him through a decision or circumstance], he is to ask of [our benevolent] God, who gives to everyone generously and without rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' blame, and it will be given to him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But he must ask [for wisdom] in faith, without doubting [God’s willingness to help], for the one who doubts is like a billowing surge of the sea that is blown about and tossed by the wind. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For such a person ought not to think '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' expect that he will receive anything [at all] from the Lord, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: it
      children:
      - type: text
        text: being
    - type: text
      text: ' a double-minded man, unstable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restless in all his ways [in everything he thinks, feels, or decides].'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Let the brother in humble circumstances glory in his high position [as a born-again believer, called to the true riches and to be an heir of God]; '
