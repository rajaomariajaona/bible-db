document_id: PSA.52,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 52
  - type: heading
    content: Futility of Boastful Wickedness.
  - type: text
    content: 'To the Chief Musician. A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem. '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David, when Doeg the Edomite came and told Saul, “David has come to the house of Ahimelech.”'
  - type: text
    content: Why do you boast of evil, O mighty man?
  - type: text
    content: 'The lovingkindness of God '
  - type: text
    content: endures
  - type: text
    content: ' all day long.'
  '2':
  - type: text
    content: Your tongue devises destruction,
  - type: text
    content: Like a sharp razor, working deceitfully.
  '3':
  - type: text
    content: You love evil more than good,
  - type: text
    content: 'And falsehood more than speaking what is right. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: You love all words that devour,
  - type: text
    content: O deceitful tongue.
  '5':
  - type: text
    content: ¶But God will break you down forever;
  - type: text
    content: He will take you away and tear you away from your tent,
  - type: text
    content: 'And uproot you from the land of the living. '
  - type: text
    content: Selah.
  '6':
  - type: text
    content: The righteous will see it and fear,
  - type: text
    content: 'And will [scoffingly] laugh, '
  - type: text
    content: saying,
  '7':
  - type: text
    content: “Look, [this is] the man who would not make God his strength [his stronghold and fortress],
  - type: text
    content: But trusted in the abundance of his riches,
  - type: text
    content: Taking refuge in his wealth.”
  '8':
  - type: text
    content: ¶But as for me, I am like a green olive tree in the house of God;
  - type: text
    content: I trust [confidently] in the lovingkindness of God forever and ever.
  '9':
  - type: text
    content: I will thank You forever, because You have done it, [You have rescued me and kept me safe].
  - type: text
    content: I will wait on Your name, for it is good, in the presence of Your godly ones.
