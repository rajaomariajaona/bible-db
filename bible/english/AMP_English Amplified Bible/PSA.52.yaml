type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 52
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Futility of Boastful Wickedness.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician. A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Psalm
  - type: text
    text: ' of David, when Doeg the Edomite came and told Saul, “David has come to the house of Ahimelech.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Why do you boast of evil, O mighty man?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The lovingkindness of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: endures
  - type: text
    text: ' all day long.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Your tongue devises destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a sharp razor, working deceitfully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You love evil more than good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And falsehood more than speaking what is right. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You love all words that devour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O deceitful tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶But God will break you down forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will take you away and tear you away from your tent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And uproot you from the land of the living. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The righteous will see it and fear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And will [scoffingly] laugh, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Look, [this is] the man who would not make God his strength [his stronghold and fortress],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But trusted in the abundance of his riches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taking refuge in his wealth.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶But as for me, I am like a green olive tree in the house of God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I trust [confidently] in the lovingkindness of God forever and ever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will thank You forever, because You have done it, [You have rescued me and kept me safe].
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will wait on Your name, for it is good, in the presence of Your godly ones.
