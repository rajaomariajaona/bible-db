document_id: EXO.36,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Tabernacle Underwritten
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Bezalel and Oholiab, and every skilled person in whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has put ability and understanding to know how to do all the work in the construction of the sanctuary, shall work according to all that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bezalel joined five curtains one to another, and [the other] five curtains he joined one to another. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made loops of blue on the edge of the outermost curtain in the first set; he also did this on the edge of the curtain that was outermost in the second set. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made fifty loops in the one curtain [of the first set] and fifty loops on the edge of the curtain which was in the second set; the loops were opposite one another. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made fifty gold hooks and joined the curtains together with the hooks, so that the tabernacle became a unit.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he made curtains of goats’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hair
    - type: text
      text: ' for a tent over the tabernacle; he made eleven curtains in all. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each curtain was thirty cubits long and four cubits wide; the eleven curtains were of equal size. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bezalel joined five curtains by themselves and [the other] six curtains by themselves. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made fifty loops on the edge of the outermost curtain in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: first
    - type: text
      text: ' set, and he made fifty loops on the edge of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: outermost
    - type: text
      text: ' curtain of the second set. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made fifty bronze hooks to join the tent together into a unit. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made a [third] covering for the tent of rams’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Similar to morocco leather.
      marker-yv: yv-n
    - type: text
      text: 'skins dyed red, and above it a [fourth] covering of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hebrew uncertain.
      marker-yv: yv-n
    - type: text
      text: porpoise skins.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses called Bezalel and Oholiab and every skilled person in whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had put ability, everyone whose heart stirred him, to come to do the work. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bezalel made boards of acacia wood for the upright framework of the tabernacle. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each board was ten cubits long and one and a half cubits wide. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each board had two tenons (dovetails), fitted to one another; he did this for all the boards of the tabernacle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And [this is how] he made the boards [for frames] for the tabernacle: twenty boards for the south side; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he made under the twenty boards forty silver sockets; two sockets under one board for its two tenons (dovetails), and two sockets under another board for its two tenons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the other side of the tabernacle, the north side, he made twenty boards, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their forty silver sockets; two sockets under [the end of] each board. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And for the rear of the tabernacle, to the west, he made six [frame] boards. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made two boards for each corner of the tabernacle in the rear. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were separate below, but linked together at the top with one ring; thus he made both of them in both corners. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They received from Moses all the offerings which the Israelites had brought for the construction of the sanctuary, to prepare it for service. And they continued to bring him freewill (voluntary) offerings every morning. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There were eight boards with sixteen silver sockets, and under [the end of] each board two sockets.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bezalel made bars of acacia wood, five for the [frame] boards of the one side of the tabernacle, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and five bars for the boards of the tabernacle’s other side, and five bars for the boards at the rear side to the west. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made the middle bar pass through [horizontally] halfway up the boards from one end to the other. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He overlaid the boards and the bars with gold and made their rings of gold as holders for the bars.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Further, Bezalel made the veil of blue and purple and scarlet fabric, and fine twisted linen; he made it with cherubim, the work of an embroiderer. [Matt 27:50, 51; Heb 10:19-22] '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the veil (partition curtain) he made four support poles of acacia wood and overlaid them with gold; their hooks were gold, and he cast for them four silver sockets. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made a screen (curtain) for the doorway of the tent, of blue, purple, and scarlet fabric, and fine twisted linen, the work of an embroiderer; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and [he made] the five support poles with their hooks, and overlaid their [ornamental] tops and connecting rings with gold; but their five sockets were bronze.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the skilled men who were doing all the work on the sanctuary came, each one from the work which he was doing, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they said to Moses, “The people are bringing much more than enough for the construction work which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded us to do.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses issued a command, and it was proclaimed throughout the camp, “Let neither man nor woman do any more work for the sanctuary offering.” So the people were restrained from bringing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything more;
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for the material they had was sufficient and more than enough to do all the work.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Construction Proceeds
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the skilled men among them who were doing the work on the tabernacle made ten curtains of fine twisted linen and blue, purple, and scarlet fabric, with cherubim [worked into them], the work of an embroiderer, Bezalel made them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each curtain was twenty-eight cubits long and four cubits wide; all the curtains were one size. '
