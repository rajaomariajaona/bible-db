document_id: EXO.36,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle Underwritten
  - type: text
    content: “Bezalel and Oholiab, and every skilled person in whom the L
  - type: heading
    content: ord
  - type: text
    content: ' has put ability and understanding to know how to do all the work in the construction of the sanctuary, shall work according to all that the L'
  - type: heading
    content: ord
  - type: text
    content: ' has commanded.”'
  '10':
  - type: text
    content: 'Bezalel joined five curtains one to another, and [the other] five curtains he joined one to another. '
  '11':
  - type: text
    content: 'He made loops of blue on the edge of the outermost curtain in the first set; he also did this on the edge of the curtain that was outermost in the second set. '
  '12':
  - type: text
    content: 'He made fifty loops in the one curtain [of the first set] and fifty loops on the edge of the curtain which was in the second set; the loops were opposite one another. '
  '13':
  - type: text
    content: He made fifty gold hooks and joined the curtains together with the hooks, so that the tabernacle became a unit.
  '14':
  - type: text
    content: 'Then he made curtains of goats’ '
  - type: text
    content: hair
  - type: text
    content: ' for a tent over the tabernacle; he made eleven curtains in all. '
  '15':
  - type: text
    content: 'Each curtain was thirty cubits long and four cubits wide; the eleven curtains were of equal size. '
  '16':
  - type: text
    content: 'Bezalel joined five curtains by themselves and [the other] six curtains by themselves. '
  '17':
  - type: text
    content: 'He made fifty loops on the edge of the outermost curtain in the '
  - type: text
    content: first
  - type: text
    content: ' set, and he made fifty loops on the edge of the '
  - type: text
    content: outermost
  - type: text
    content: ' curtain of the second set. '
  '18':
  - type: text
    content: 'He made fifty bronze hooks to join the tent together into a unit. '
  '19':
  - type: text
    content: 'He made a [third] covering for the tent of rams’ '
  - type: note
    content: Similar to morocco leather.
  - type: text
    content: 'skins dyed red, and above it a [fourth] covering of '
  - type: note
    content: Hebrew uncertain.
  - type: text
    content: porpoise skins.
  '2':
  - type: text
    content: So Moses called Bezalel and Oholiab and every skilled person in whom the L
  - type: heading
    content: ord
  - type: text
    content: ' had put ability, everyone whose heart stirred him, to come to do the work. '
  '20':
  - type: text
    content: 'Bezalel made boards of acacia wood for the upright framework of the tabernacle. '
  '21':
  - type: text
    content: 'Each board was ten cubits long and one and a half cubits wide. '
  '22':
  - type: text
    content: 'Each board had two tenons (dovetails), fitted to one another; he did this for all the boards of the tabernacle. '
  '23':
  - type: text
    content: 'And [this is how] he made the boards [for frames] for the tabernacle: twenty boards for the south side; '
  '24':
  - type: text
    content: 'and he made under the twenty boards forty silver sockets; two sockets under one board for its two tenons (dovetails), and two sockets under another board for its two tenons. '
  '25':
  - type: text
    content: 'For the other side of the tabernacle, the north side, he made twenty boards, '
  '26':
  - type: text
    content: 'and their forty silver sockets; two sockets under [the end of] each board. '
  '27':
  - type: text
    content: 'And for the rear of the tabernacle, to the west, he made six [frame] boards. '
  '28':
  - type: text
    content: 'And he made two boards for each corner of the tabernacle in the rear. '
  '29':
  - type: text
    content: 'They were separate below, but linked together at the top with one ring; thus he made both of them in both corners. '
  '3':
  - type: text
    content: 'They received from Moses all the offerings which the Israelites had brought for the construction of the sanctuary, to prepare it for service. And they continued to bring him freewill (voluntary) offerings every morning. '
  '30':
  - type: text
    content: There were eight boards with sixteen silver sockets, and under [the end of] each board two sockets.
  '31':
  - type: text
    content: 'Bezalel made bars of acacia wood, five for the [frame] boards of the one side of the tabernacle, '
  '32':
  - type: text
    content: 'and five bars for the boards of the tabernacle’s other side, and five bars for the boards at the rear side to the west. '
  '33':
  - type: text
    content: 'And he made the middle bar pass through [horizontally] halfway up the boards from one end to the other. '
  '34':
  - type: text
    content: He overlaid the boards and the bars with gold and made their rings of gold as holders for the bars.
  '35':
  - type: text
    content: 'Further, Bezalel made the veil of blue and purple and scarlet fabric, and fine twisted linen; he made it with cherubim, the work of an embroiderer. [Matt 27:50, 51; Heb 10:19-22] '
  '36':
  - type: text
    content: 'For the veil (partition curtain) he made four support poles of acacia wood and overlaid them with gold; their hooks were gold, and he cast for them four silver sockets. '
  '37':
  - type: text
    content: 'He made a screen (curtain) for the doorway of the tent, of blue, purple, and scarlet fabric, and fine twisted linen, the work of an embroiderer; '
  '38':
  - type: text
    content: and [he made] the five support poles with their hooks, and overlaid their [ornamental] tops and connecting rings with gold; but their five sockets were bronze.
  '4':
  - type: text
    content: 'And all the skilled men who were doing all the work on the sanctuary came, each one from the work which he was doing, '
  '5':
  - type: text
    content: and they said to Moses, “The people are bringing much more than enough for the construction work which the L
  - type: heading
    content: ord
  - type: text
    content: ' commanded us to do.” '
  '6':
  - type: text
    content: 'So Moses issued a command, and it was proclaimed throughout the camp, “Let neither man nor woman do any more work for the sanctuary offering.” So the people were restrained from bringing '
  - type: text
    content: anything more;
  - type: text
    content: ' '
  '7':
  - type: text
    content: for the material they had was sufficient and more than enough to do all the work.
  - type: heading
    content: Construction Proceeds
  '8':
  - type: text
    content: 'All the skilled men among them who were doing the work on the tabernacle made ten curtains of fine twisted linen and blue, purple, and scarlet fabric, with cherubim [worked into them], the work of an embroiderer, Bezalel made them. '
  '9':
  - type: text
    content: 'Each curtain was twenty-eight cubits long and four cubits wide; all the curtains were one size. '
