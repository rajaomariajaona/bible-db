  '5':
  - type: text
    content: 'When the messengers returned to Ahaziah, he said to them, “Why have you returned [so soon]?” '
  '6':
  - type: text
    content: They replied, “A man came up to meet us and said to us, ‘Go, return to the king who sent you and tell him, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': ‘Is it because there is no God in Israel that you send to inquire of Baal-zebub, the god of Ekron? Therefore you will not leave the bed on which you lie, but you will certainly die.’ ” ’ ” '
  '7':
  - type: text
    content: 'The king asked them, “What was the appearance of the man who came up to meet you and said these things to you?” '
  '8':
  - type: text
    content: They answered him, “
  - type: text
    content: He was
  - type: text
    content: ' a '
  - type: note
    content: Most likely a reference to Elijah’s hairy outer garment made of goat, sheep, or camel skin.
  - type: text
    content: 'hairy man with a [wide] leather '
  - type: note
    content: The band or girdle worn by men during this time was not like a modern belt that is worn around the waist. This band was about six inches wide and had clasps or fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things.
  - type: text
    content: band bound around his loins.” And Ahaziah said, “It is Elijah the Tishbite.”
  '9':
  - type: text
    content: 'Then the king sent to Elijah a captain of fifty with his fifty [fighting men to seize the prophet]. And he went up to him, and behold, he was sitting on the top of a hill. And the captain said to him, “Man of God, the king says, ‘Come down.’ ” '
