      children:
      - type: text
        text: One of the five major Philistine cities, located in the north.
    marker-yv: yv-n
  - type: text
    text: 'Ekron, if I will recover from this sickness.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But the angel of the L
  - type: usfm
