    - type: usfm
      marker: ft
      children:
      - type: text
        text: The location of the town of Tishbe is uncertain, but some believe it was located within the tribal territory of Gad.
    marker-yv: yv-n
  - type: text
    text: Tishbite, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew verb “to stand” or “arise” is often an instruction to get ready to fulfill a command, somewhat similar to the military command “attention.”
    marker-yv: yv-n
  - type: text
    text: 'Arise, go up to meet the messengers of the king of Samaria, and say to them, ‘Is it because there is no God in Israel that you are going to inquire of Baal-zebub, the god of Ekron?’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Therefore this is what the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says: ‘You [Ahaziah] will not leave the bed on which you lie, but you will certainly die.’ ” So Elijah departed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the messengers returned to Ahaziah, he said to them, “Why have you returned [so soon]?” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They replied, “A man came up to meet us and said to us, ‘Go, return to the king who sent you and tell him, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘Is it because there is no God in Israel that you send to inquire of Baal-zebub, the god of Ekron? Therefore you will not leave the bed on which you lie, but you will certainly die.’ ” ’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The king asked them, “What was the appearance of the man who came up to meet you and said these things to you?” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They answered him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: He was
  - type: text
    text: ' a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most likely a reference to Elijah’s hairy outer garment made of goat, sheep, or camel skin.
    marker-yv: yv-n
  - type: text
    text: 'hairy man with a [wide] leather '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The band or girdle worn by men during this time was not like a modern belt that is worn around the waist. This band was about six inches wide and had clasps or fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things.
    marker-yv: yv-n
  - type: text
    text: band bound around his loins.” And Ahaziah said, “It is Elijah the Tishbite.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the king sent to Elijah a captain of fifty with his fifty [fighting men to seize the prophet]. And he went up to him, and behold, he was sitting on the top of a hill. And the captain said to him, “Man of God, the king says, ‘Come down.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Elijah replied to the captain of fifty, “So if I am a man of God, then let fire come down from heaven and consume you and your fifty [fighting men].” Then fire fell from heaven and consumed him and his fifty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So King Ahaziah again sent to him another captain of fifty with his fifty [fighting men]. And he said to him, “Man of God, thus says the king, ‘Come down quickly.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elijah answered them, “If I am a man of God, let fire come down from heaven and consume you and your fifty [fighting men].” And the fire of God came down from heaven and consumed him and his fifty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Ahaziah again sent a captain of a third fifty with his fifty [fighting men]. And the third captain of fifty went up and came bowed down on his knees before Elijah, and begged him [for compassion] and said to him, “O man of God, please let my life and the lives of your servants, these fifty, be precious in your sight. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Behold, fire came down from heaven and consumed the first two captains of fifty with their fifties; but now let my life be precious in your sight.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The angel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Elijah, “Go down with him; do not be afraid of him.” So he stood and went down with him to the king. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then Elijah said to Ahaziah, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': ‘Since you have sent messengers to inquire of Baal-zebub, god of Ekron—is it because there is no God in Israel to inquire of His word?—therefore you will not leave the bed on which you lie, but will certainly die.’ ”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehoram Reigns over Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So Ahaziah [the son of King Ahab] died in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' which Elijah had spoken. And because he had no son, Jehoram [his younger brother] became king [of Israel, the northern kingdom] in his place in the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: During the last five years of Jehoshaphat’s reign in Judah, his son Jehoram was co-regent with him. This refers to the second year of the co-regency.
    marker-yv: yv-n
  - type: text
    text: 'second year of Jehoram the son of Jehoshaphat, king of Judah [the southern kingdom]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now the rest of the acts of Ahaziah which he did, are they not written in the Book of the Chronicles of the Kings of Israel?
