  '18':
  - type: text
    content: Now the rest of the acts of Ahaziah which he did, are they not written in the Book of the Chronicles of the Kings of Israel?
  '2':
  - type: text
    content: 'Ahaziah [the king of Israel] fell through the lattice (grid) in his upper chamber which was in Samaria, and became sick [from the injury]. So he sent messengers, saying to them, “Go, inquire of Baal-zebub, the god of '
  - type: note
