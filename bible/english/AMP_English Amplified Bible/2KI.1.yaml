  - type: text
    content: ': ‘Since you have sent messengers to inquire of Baal-zebub, god of Ekron—is it because there is no God in Israel to inquire of His word?—therefore you will not leave the bed on which you lie, but will certainly die.’ ”'
  - type: heading
    content: Jehoram Reigns over Israel
