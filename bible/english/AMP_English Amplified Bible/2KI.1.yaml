    content: Ahaziah’s Messengers Meet Elijah
  - type: text
    content: 'Now Moab rebelled against Israel after the death of Ahab. '
  '10':
  - type: text
    content: Elijah replied to the captain of fifty, “So if I am a man of God, then let fire come down from heaven and consume you and your fifty [fighting men].” Then fire fell from heaven and consumed him and his fifty.
  '11':
  - type: text
    content: 'So King Ahaziah again sent to him another captain of fifty with his fifty [fighting men]. And he said to him, “Man of God, thus says the king, ‘Come down quickly.’ ” '
  '12':
  - type: text
    content: Elijah answered them, “If I am a man of God, let fire come down from heaven and consume you and your fifty [fighting men].” And the fire of God came down from heaven and consumed him and his fifty.
  '13':
  - type: text
    content: 'So Ahaziah again sent a captain of a third fifty with his fifty [fighting men]. And the third captain of fifty went up and came bowed down on his knees before Elijah, and begged him [for compassion] and said to him, “O man of God, please let my life and the lives of your servants, these fifty, be precious in your sight. '
  '14':
  - type: text
    content: 'Behold, fire came down from heaven and consumed the first two captains of fifty with their fifties; but now let my life be precious in your sight.” '
  '15':
  - type: text
    content: The angel of the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Elijah, “Go down with him; do not be afraid of him.” So he stood and went down with him to the king. '
  '16':
  - type: text
    content: Then Elijah said to Ahaziah, “Thus says the L
  - type: heading
