      text: '2'
  - type: text
    text: 'Ahaziah [the king of Israel] fell through the lattice (grid) in his upper chamber which was in Samaria, and became sick [from the injury]. So he sent messengers, saying to them, “Go, inquire of Baal-zebub, the god of '
  - type: usfm
