      - type: text
        text: Job Says There Is No Arbitrator between God and Man
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Job answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who does great things, [beyond understanding,] unfathomable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, marvelous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wondrous things without number.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, He passes by me, and I do not see Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He moves past me, but I do not perceive Him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Behold, He snatches away; who can restrain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' turn Him back?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will say to Him, ‘What are You doing?’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“God will not turn back His anger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The [proud] helpers of Rahab [the arrogant monster of the sea] bow under Him.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How can I answer Him [and plead my case],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Choosing my words [to reason] with Him?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For though I were righteous, I could not answer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I must appeal for mercy to my Opponent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Judge.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If I called and He answered me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I could not believe that He was listening to my voice.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For He bruises me with a tempest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And multiplies my wounds without cause.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will not allow me to catch my breath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But fills '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' saturates me with bitterness.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“If it is a matter of strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power, behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He is
    - type: text
      text: ' mighty!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And if of justice, who can summon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' challenge Him?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, I know it is true.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But how can a mortal man be right before God?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Though I am innocent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in the right, my own mouth would pronounce me guilty;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I am blameless, He would denounce me as guilty.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “[Though] I am blameless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I do not care about myself;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I despise my life.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“It is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' one; therefore I say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘He destroys [both] the blameless and the wicked.’
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When [His] scourge kills suddenly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He mocks at the despair of the innocent.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The earth is given into the hands of the wicked;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He covers the faces of its judges [so that they are blind to justice].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If it is not He, then who is it [that is responsible for all this injustice]?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Now my days are swifter than a runner;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They vanish, they see no good.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They pass by like the [swift] boats made of reeds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an eagle that swoops down on its prey.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If I say, ‘I will forget my complaint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will leave off my sad appearance, and be cheerful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brighten up,’'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am afraid of all my pains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worries [yet to come];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I know that You will not acquit me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leave me unpunished.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am accounted wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' held guilty;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why then should I labor in vain [to appear innocent]?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“If one should want to contend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' dispute with Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He could not answer Him once in a thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: times
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If I were to wash myself with snow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cleanse my hands with lye,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You would still plunge me into the pit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my own clothes would hate me [and refuse to cover my foul body].
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For God is not a [mere] man, as I am, that I may answer Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That we may go to court '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' judgment together.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There is no arbitrator between us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who could lay his hand upon us both [would that there were]. [1 Tim 2:5]
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let Him take His rod away from me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let not the dread '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fear of Him terrify me.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' I would speak [my defense] and not fear Him;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am not like that in myself.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' is wise in heart and mighty in strength;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who has [ever] defied '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' challenged Him and remained unharmed?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is God
    - type: text
      text: ' who removes the mountains, and they do not know it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When He overturns them in His anger;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who shakes the earth out of its place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And its pillars tremble;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who commands the sun, and it does not shine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who seals up the stars [from view];
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who alone stretches out the heavens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And tramples down the '
