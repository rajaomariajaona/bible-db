segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Says There Is No Arbitrator between God and Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Yes, I know it is true.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But how can a mortal man be right before God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“If one should want to contend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' dispute with Him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He could not answer Him once in a thousand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: times
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' is wise in heart and mighty in strength;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who has [ever] defied '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' challenged Him and remained unharmed?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: It is God
  - type: text
    text: ' who removes the mountains, and they do not know it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When He overturns them in His anger;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Who shakes the earth out of its place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its pillars tremble;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who commands the sun, and it does not shine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who seals up the stars [from view];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who alone stretches out the heavens
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And tramples down the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: high places
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: waves of the sea;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who made [the constellations] the Bear, Orion, and the Pleiades,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the [vast starry] spaces of the south;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who does great things, [beyond understanding,] unfathomable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes, marvelous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wondrous things without number.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Behold, He passes by me, and I do not see Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He moves past me, but I do not perceive Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Behold, He snatches away; who can restrain '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' turn Him back?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will say to Him, ‘What are You doing?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“God will not turn back His anger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The [proud] helpers of Rahab [the arrogant monster of the sea] bow under Him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “How can I answer Him [and plead my case],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Choosing my words [to reason] with Him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “For though I were righteous, I could not answer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I must appeal for mercy to my Opponent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Judge.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “If I called and He answered me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I could not believe that He was listening to my voice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “For He bruises me with a tempest
- type: usfm
  marker: q1
  children:
  - type: text
    text: And multiplies my wounds without cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “He will not allow me to catch my breath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But fills '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' saturates me with bitterness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“If it is a matter of strength '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power, behold, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He is
  - type: text
    text: ' mighty!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And if of justice, who can summon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' challenge Him?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Though I am innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in the right, my own mouth would pronounce me guilty;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though I am blameless, He would denounce me as guilty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “[Though] I am blameless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I do not care about myself;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I despise my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“It is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' one; therefore I say,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘He destroys [both] the blameless and the wicked.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “When [His] scourge kills suddenly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He mocks at the despair of the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “The earth is given into the hands of the wicked;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He covers the faces of its judges [so that they are blind to justice].
- type: usfm
  marker: q1
  children:
  - type: text
    text: If it is not He, then who is it [that is responsible for all this injustice]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ¶“Now my days are swifter than a runner;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They vanish, they see no good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “They pass by like the [swift] boats made of reeds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like an eagle that swoops down on its prey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “If I say, ‘I will forget my complaint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will leave off my sad appearance, and be cheerful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brighten up,’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'I am afraid of all my pains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worries [yet to come];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I know that You will not acquit me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leave me unpunished.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“I am accounted wicked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' held guilty;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then should I labor in vain [to appear innocent]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “If I were to wash myself with snow
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cleanse my hands with lye,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: You would still plunge me into the pit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my own clothes would hate me [and refuse to cover my foul body].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “For God is not a [mere] man, as I am, that I may answer Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That we may go to court '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' judgment together.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: “There is no arbitrator between us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who could lay his hand upon us both [would that there were]. [1 Tim 2:5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Let Him take His rod away from me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And let not the dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear of Him terrify me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Then
  - type: text
    text: ' I would speak [my defense] and not fear Him;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I am not like that in myself.
