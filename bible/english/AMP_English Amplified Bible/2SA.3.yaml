document_id: 2SA.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The House of David Strengthened
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: There was a long war between the house of Saul and the house of David; but David grew steadily stronger, while the house of Saul grew weaker and weaker [to the point of being powerless].
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'to transfer the kingdom from the house of Saul, and establish the throne of David over Israel and Judah from Dan [in the north] to Beersheba [in the south].” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And Ish-bosheth could not say another word to Abner, because he was afraid of him.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Abner sent messengers to David [who was] in his place [at Hebron], saying, “Whose is the land? Make your covenant (treaty) with me, and behold, my hand shall be with you to bring all Israel over to you.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David said, “Good! I will make a covenant (treaty) with you, but I require one thing of you: you shall not see my face unless you first bring Michal, Saul’s daughter, when you come to see '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: see my face
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'me.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So David sent messengers to Ish-bosheth, Saul’s son, saying, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saul promised Michal to David as his wife. See 1 Sam 18:25-27.
      marker-yv: yv-n
    - type: text
      text: 'Give me my wife Michal, to whom I was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a legal and binding promise of marriage.
      marker-yv: yv-n
    - type: text
      text: 'betrothed for [the price of] a hundred foreskins of the Philistines.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So Ish-bosheth sent and took her from her husband, from Paltiel the son of Laish [to whom Saul had given her]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But her husband went with her, weeping continually behind her as far as Bahurim. Then Abner told him, “Go, return.” And he did so.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Abner talked with the elders (tribal leaders) of Israel, saying, “In times past you were seeking for David to be king over you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Now then, do it [and make him king]! For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken of David, saying, ‘By the hand of My servant David I will save My people Israel from the hand of the Philistines and the hand of all their enemies.’ ” [1 Sam 9:16] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Abner also spoke '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the ears of Benjamin.
      marker-yv: yv-n
    - type: text
      text: 'to [the men of] Benjamin. Then he also went to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: speak in the ears of David
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'tell David at Hebron everything that seemed good '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the eyes of Israel
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: to Israel and to the entire house of Benjamin.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sons were born to David in Hebron: his firstborn was Amnon, by Ahinoam of Jezreel; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So Abner came to David at Hebron, and [brought] twenty men along with him. And David prepared a feast for Abner and the men with him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Abner said to David, “Let me stand up and go, and gather all Israel to my lord the king, so that they may make a covenant (treaty) with you, and that you may reign over all that your soul desires.” So David sent Abner away, and he went in peace.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then the servants of David came with Joab from a raid and brought a great quantity of spoil with them; but Abner was not with David at Hebron, because David had sent him away, and he had gone in peace. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When Joab and all the army that was with him arrived, they told Joab, “Abner the son of Ner came to the king, and he has sent him away, and he has gone in peace.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then Joab came to the king and said, “What have you done? Behold, Abner came to you; why did you send him away, so that he is already gone? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: You know Abner the son of Ner, that he [only] came to deceive you [with flattering words] and to learn of your going out and coming in, and to find out what you are doing.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joab Murders Abner
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'When Joab left David, he sent messengers after Abner, and they brought him back from the well of Sirah; but David knew nothing [about Joab’s action]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So when Abner returned to Hebron, Joab took him aside to the middle of the gate to speak to him privately, and there he struck Abner in the abdomen so that he died, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was an act of murder, not justifiable revenge, because Abner had killed Asahel in self-defense during a battle.
      marker-yv: yv-n
    - type: text
      text: 'to avenge the blood of Asahel, Joab’s brother. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Afterward, when David heard of it, he said, “I and my kingdom are forever innocent before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of the blood of Abner the son of Ner. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Let '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: it.
      marker-yv: yv-n
    - type: text
      text: 'the guilt fall on the head of Joab and on all his father’s house (family); and may there never disappear from the house of Joab one who suffers with a discharge or one who is a leper or one who walks with a crutch [being unfit for war], or one who falls by the sword, or one who lacks food.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'his second, Chileab, by Abigail the widow of Nabal of Carmel; the third, Absalom the son of [his wife] Maacah, daughter of Talmai the king of Geshur; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So Joab and Abishai his brother murdered Abner because he had killed their brother Asahel in the battle at Gibeon.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Mourns Abner
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then David said to Joab and to all the people with him, “Tear your clothes, put on sackcloth, and mourn before Abner.” And King David walked behind the bier. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'They buried Abner in Hebron; and the king raised his voice and wept at the grave of Abner, and all the people wept. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: And the king sang a dirge (funeral song) over Abner and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Should Abner [the great warrior] die as a fool dies?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “Your hands were not bound, nor your feet put in fetters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a man falls before the wicked, so you have fallen.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And all the people wept again over him. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'All the people came to urge David to eat food while it was still day; but David took an oath, saying, “May God do so to me, and more also, if I taste bread or anything else before the sun sets.” '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And all the people took notice of it and it '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: was good in their eyes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'pleased them, just as everything that the king did pleased all the people. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'So all the people and all Israel understood that day that it had not been the will of the king to put Abner the son of Ner to death. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then the king said to his servants, “Do you not know that a prince and a great man has fallen this day in Israel? '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Today I am weak, though anointed king; these men, the sons of Zeruiah, are too difficult for me. May the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' repay the evildoer [Joab] in accordance with his wickedness!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'the fourth, Adonijah the son of [his wife] Haggith; the fifth, Shephatiah the son of [his wife] Abital; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: and the sixth, Ithream, by David’s wife Eglah. These [sons] were born to David in Hebron.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abner Joins David
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Now while war continued between the houses of Saul and David, Abner was proving himself strong in the house of Saul. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now Saul had a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Gen 22:24.
      marker-yv: yv-n
    - type: text
      text: 'concubine whose name was Rizpah the daughter of Aiah; and Ish-bosheth said to Abner, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Being intimate with the former king’s concubine was a way for Abner to assert a claim on the throne.
      marker-yv: yv-n
    - type: text
      text: '“Why have you gone in to my father’s concubine?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Abner was very angry at the words of Ish-bosheth, and he said, “Am I a dog’s head [a despicable traitor] that belongs to Judah? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abner reminds Ish-bosheth that he put Ish-bosheth on the throne of Israel.
      marker-yv: yv-n
    - type: text
      text: 'Today I show loyalty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindness to the house of Saul your father, to his brothers and his friends, by not having you handed over to David; and yet you charge me today with guilt concerning this woman. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: May God do so to Abner, and more also, if I do not do for David just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has sworn to him, '
