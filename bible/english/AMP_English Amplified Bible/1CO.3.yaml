document_id: 1CO.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Foundations for Living
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'However, brothers and sisters, I could not talk to you as to spiritual people, but [only] as to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fleshly
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'worldly people [dominated by human nature], '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mere
    - type: text
      text: ' infants [in the new life] in Christ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'According to the [remarkable] grace of God which was given to me [to prepare me for my task], like a skillful master builder I laid a foundation, and now another is building on it. But each one must be careful how he builds on it, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'for no one can lay a foundation other than the one which is [already] laid, which is Jesus Christ. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But if anyone builds on the foundation with gold, silver, precious stones, wood, hay, straw, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'each one’s work will be clearly shown [for what it is]; for the day [of judgment] will disclose it, because it is to be revealed with fire, and the fire will test the quality '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' character '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worth of each person’s work. [2 Cor 5:10] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If any person’s work which he has built [on this foundation, that is, any outcome of his effort] remains [and survives this test], he will receive a reward. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But if any person’s work is burned up [by the test], he will suffer the loss [of his reward]; yet he himself will be saved, but only as [one who has barely escaped] through fire. [Job 23:10]
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul repeats “Do you not know” nine more times, each time followed by an important truth (cf 5:6; 6:2, 3, 9, 15, 16, 19; 9:13, 24).
      marker-yv: yv-n
    - type: text
      text: 'Do you not know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand that you [the church] are the temple of God, and that the Spirit of God dwells [permanently] in you [collectively and individually]? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: If anyone destroys the temple of God [corrupting it with false doctrine], God will destroy the destroyer; for the temple of God is holy (sacred), and that is what you are.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Let no one deceive himself. If anyone among you thinks that he is wise in this age, let him become a fool [discarding his worldly pretensions and acknowledging his lack of wisdom], so that he may become [truly] wise. [Is 5:21] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For the wisdom of this world is foolishness (absurdity, stupidity) before God; for it is written [in Scripture], “[He is] T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he one who catches the wise
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: clever in their craftiness
    - type: text
      text: ';” [Job 5:13] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I fed you with milk, not solid food; for you were not yet able '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to receive it.
    - type: text
      text: ' Even now you are still not ready. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: and again, “T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord knows the thoughts
    - type: text
      text: ' of the [humanly] wise, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: that they are useless
    - type: text
      text: '.” [Ps 94:11] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So let no one boast in men [about their wisdom, or of having this or that one as a leader]. For all things are yours, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'whether Paul or Apollos or Cephas (Peter) or the world or life or death or things present or things to come; all things are yours, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: and you belong to Christ; and Christ belongs to God.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You are still '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fleshly
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'worldly [controlled by ordinary impulses, the sinful capacity]. For as long as there is jealousy and strife '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discord among you, are you not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fleshly
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'unspiritual, and are you not walking like ordinary men [unchanged by faith]? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For when one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of you
    - type: text
      text: ' says, “I am [a disciple] of Paul,” and another, “I am [a disciple] of Apollos,” are you not [proving yourselves unchanged, just] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ordinary
    - type: text
      text: ' people?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'What then is Apollos? And what is Paul? Just servants through whom you believed [in Christ], even as the Lord appointed to each his task. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I planted, Apollos watered, but God [all the while] was causing the growth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So neither is the one who plants nor the one who waters anything, but [only] God who causes the growth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He who plants and he who waters are one [in importance and esteem, working toward the same purpose]; but each will receive his own reward according to his own labor. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For we are God’s fellow workers [His servants working together]; you are God’s cultivated field [His garden, His vineyard], God’s building. [Is 61:3]
