verses:
  '1':
  - type: heading
    content: Foundations for Living
  - type: text
    content: 'However, brothers and sisters, I could not talk to you as to spiritual people, but [only] as to '
  - type: note
    content: Lit fleshly.
  - type: text
    content: 'worldly people [dominated by human nature], '
  - type: text
    content: mere
  - type: text
    content: ' infants [in the new life] in Christ! '
  '10':
  - type: text
    content: 'According to the [remarkable] grace of God which was given to me [to prepare me for my task], like a skillful master builder I laid a foundation, and now another is building on it. But each one must be careful how he builds on it, '
  '11':
  - type: text
    content: 'for no one can lay a foundation other than the one which is [already] laid, which is Jesus Christ. '
  '12':
  - type: text
    content: 'But if anyone builds on the foundation with gold, silver, precious stones, wood, hay, straw, '
  '13':
  - type: text
    content: 'each one’s work will be clearly shown [for what it is]; for the day [of judgment] will disclose it, because it is to be revealed with fire, and the fire will test the quality '
  - type: text
    content: and
  - type: text
    content: ' character '
  - type: text
    content: and
  - type: text
    content: ' worth of each person’s work. [2 Cor 5:10] '
  '14':
  - type: text
    content: 'If any person’s work which he has built [on this foundation, that is, any outcome of his effort] remains [and survives this test], he will receive a reward. '
  '15':
  - type: text
    content: But if any person’s work is burned up [by the test], he will suffer the loss [of his reward]; yet he himself will be saved, but only as [one who has barely escaped] through fire. [Job 23:10]
  '16':
  - type: text
    content: ' '
  - type: note
    content: Paul repeats “Do you not know” nine more times, each time followed by an important truth (cf 5:6; 6:2, 3, 9, 15, 16, 19; 9:13, 24).
  - type: text
    content: 'Do you not know '
  - type: text
    content: and
  - type: text
    content: ' understand that you [the church] are the temple of God, and that the Spirit of God dwells [permanently] in you [collectively and individually]? '
  '17':
  - type: text
    content: If anyone destroys the temple of God [corrupting it with false doctrine], God will destroy the destroyer; for the temple of God is holy (sacred), and that is what you are.
  '18':
  - type: text
    content: 'Let no one deceive himself. If anyone among you thinks that he is wise in this age, let him become a fool [discarding his worldly pretensions and acknowledging his lack of wisdom], so that he may become [truly] wise. [Is 5:21] '
  '19':
  - type: text
    content: For the wisdom of this world is foolishness (absurdity, stupidity) before God; for it is written [in Scripture], “[He is] T
  - type: heading
    content: he one who catches the wise
  - type: text
    content: ' '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: heading
    content: clever in their craftiness
  - type: text
    content: ';” [Job 5:13] '
  '2':
  - type: text
    content: 'I fed you with milk, not solid food; for you were not yet able '
  - type: text
    content: to receive it.
  - type: text
    content: ' Even now you are still not ready. '
  '20':
  - type: text
    content: and again, “T
  - type: heading
    content: he
  - type: text
    content: ' L'
  - type: heading
    content: ord knows the thoughts
  - type: text
    content: ' of the [humanly] wise, '
  - type: heading
    content: that they are useless
  - type: text
    content: '.” [Ps 94:11] '
  '21':
  - type: text
    content: 'So let no one boast in men [about their wisdom, or of having this or that one as a leader]. For all things are yours, '
  '22':
  - type: text
    content: 'whether Paul or Apollos or Cephas (Peter) or the world or life or death or things present or things to come; all things are yours, '
  '23':
  - type: text
    content: and you belong to Christ; and Christ belongs to God.
  '3':
  - type: text
    content: 'You are still '
  - type: note
    content: Lit fleshly.
  - type: text
    content: 'worldly [controlled by ordinary impulses, the sinful capacity]. For as long as there is jealousy and strife '
  - type: text
    content: and
  - type: text
    content: ' discord among you, are you not '
  - type: note
    content: Lit fleshly.
  - type: text
    content: 'unspiritual, and are you not walking like ordinary men [unchanged by faith]? '
  '4':
  - type: text
    content: 'For when one '
  - type: text
    content: of you
  - type: text
    content: ' says, “I am [a disciple] of Paul,” and another, “I am [a disciple] of Apollos,” are you not [proving yourselves unchanged, just] '
  - type: text
    content: ordinary
  - type: text
    content: ' people?'
  '5':
  - type: text
    content: 'What then is Apollos? And what is Paul? Just servants through whom you believed [in Christ], even as the Lord appointed to each his task. '
  '6':
  - type: text
    content: 'I planted, Apollos watered, but God [all the while] was causing the growth. '
  '7':
  - type: text
    content: 'So neither is the one who plants nor the one who waters anything, but [only] God who causes the growth. '
  '8':
  - type: text
    content: 'He who plants and he who waters are one [in importance and esteem, working toward the same purpose]; but each will receive his own reward according to his own labor. '
  '9':
  - type: text
    content: For we are God’s fellow workers [His servants working together]; you are God’s cultivated field [His garden, His vineyard], God’s building. [Is 61:3]
