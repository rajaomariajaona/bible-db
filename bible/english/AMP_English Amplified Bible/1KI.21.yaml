document_id: 1KI.21,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahab Covets Naboth’s Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now it came about after these things that Naboth the Jezreelite had a vineyard in Jezreel, close beside the [winter] palace of Ahab king of Samaria; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and seat two worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unprincipled men opposite him, and have them testify against him, saying, ‘You '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: blessed
        - type: text
          text: . This word is used here and in v 13 as a euphemism referring to cursing, to avoid actually uttering a curse against God, even when it is placed in the mouth of someone else.
      marker-yv: yv-n
    - type: text
      text: cursed God and the king.’ Then take him out and stone him to death.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jezebel’s Plot
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So the men of his city, the elders and the nobles who lived there, did as Jezebel had sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to them, just as it was written in the letters which she had sent to them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They proclaimed a fast and seated Naboth at the head of the people. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Two worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unprincipled men came in and sat down opposite him; and they testified against Naboth before the people, saying, “Naboth cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' renounced God and the king.” Then they brought him outside the city and stoned him to death. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Jezebel, saying, “Naboth has been stoned to death.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When Jezebel heard that Naboth had been stoned and was dead, she said to Ahab, “Arise, take possession of the vineyard of Naboth the Jezreelite which he refused to sell you, because Naboth is no longer alive, but dead.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When Ahab heard that Naboth was dead, he arose to go down to the vineyard of Naboth the Jezreelite, to take possession of it.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Elijah the Tishbite, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Arise, go down to meet Ahab king of Israel, who is in Samaria. Behold, he is in the vineyard of Naboth, where he has gone to take possession of it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: You shall speak to him, saying, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': “Have you murdered and also taken possession [of the victim’s property]?” ’ And you shall speak to him, saying, ‘Thus says the Lord: “In the place where dogs licked up the blood of Naboth, dogs will lick up your blood as well.” ’ ”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ahab spoke to Naboth, saying, “Give me your vineyard, so that I may have it for a garden of vegetables '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' herbs, because it is near my house. I will give you a better vineyard for it, or, if you prefer, I will give you what it is worth in money.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ahab said to Elijah, “Have you found me, O my enemy?” And he answered, “I have found you, because you have sold yourself to do evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Behold [says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '], I am bringing evil (catastrophe) on you, and will utterly sweep you away, and will cut off from Ahab every male, both bond and free in Israel; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and I will make your house (descendants) like that of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah, for provoking Me to anger and making Israel sin. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also spoke in regard to Jezebel, saying, ‘The dogs will eat [the body of] Jezebel in the district of Jezreel.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The dogs will eat anyone belonging to Ahab who dies in the city, and the birds of the air will eat anyone who dies in the field.” [1 Kin 14:11; 16:4]
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: There certainly was no one like Ahab who sold himself to do evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', because Jezebel his wife incited him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He acted very repulsively in following idols, in accordance with everything the Amorites had done, whom the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' expelled [from the land] before the sons of Israel.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Now when Ahab heard these words [of Elijah], he tore his clothes, put on sackcloth and fasted, and he lay in sackcloth and went about dejectedly (mourning). '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Elijah the Tishbite, saying, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “Do you see how Ahab has humbled himself before Me? Because he has humbled himself before Me, I will not bring the evil (catastrophe) in his lifetime, but in his son’s days I will bring evil upon his house.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But Naboth said to Ahab, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' forbid me that I should give the inheritance of my fathers to you.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Ahab [already upset by the Lord’s message] came into his house [feeling more] resentful and sullen because of what Naboth the Jezreelite had said to him; for he had said, “I will not give you the inheritance of my fathers.” And he lay down on his bed and turned away his face, and would not eat any food.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Jezebel his wife came to him and asked him, “Why is your spirit so troubled that you have not eaten?” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And he said to her, “Because I spoke to Naboth the Jezreelite and said to him, ‘Give me your vineyard for money; or if you prefer, I will give you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' vineyard for it.’ But he answered, ‘I will not give you my vineyard.’ ” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jezebel his wife said to him, “Do you now reign over Israel? Get up, eat food, and let your heart rejoice; I will give you the vineyard of Naboth the Jezreelite.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So she wrote letters in Ahab’s name and sealed them with his seal, and sent them to the elders and nobles who lived with Naboth in his city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now in the letters she wrote, “Proclaim a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The point of the '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fast
        - type: text
          text: ' was to display grief and humility toward God over a grave sin that had been committed, usually when famine or another disaster had occurred as judgment from God for the sin. So Jezebel’s plot not only included the judicial murder of an innocent man; it was a direct affront and challenge to God.'
      marker-yv: yv-n
    - type: text
      text: 'fast and seat Naboth at the head of the people; '
