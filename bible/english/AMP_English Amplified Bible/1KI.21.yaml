  - type: text
    content: 'Then they sent '
  - type: text
    content: word
  - type: text
    content: ' to Jezebel, saying, “Naboth has been stoned to death.”'
  '15':
  - type: text
    content: 'When Jezebel heard that Naboth had been stoned and was dead, she said to Ahab, “Arise, take possession of the vineyard of Naboth the Jezreelite which he refused to sell you, because Naboth is no longer alive, but dead.” '
  '16':
  - type: text
    content: When Ahab heard that Naboth was dead, he arose to go down to the vineyard of Naboth the Jezreelite, to take possession of it.
  '17':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Elijah the Tishbite, saying, '
  '18':
  - type: text
    content: '“Arise, go down to meet Ahab king of Israel, who is in Samaria. Behold, he is in the vineyard of Naboth, where he has gone to take possession of it. '
  '19':
  - type: text
    content: You shall speak to him, saying, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': “Have you murdered and also taken possession [of the victim’s property]?” ’ And you shall speak to him, saying, ‘Thus says the Lord: “In the place where dogs licked up the blood of Naboth, dogs will lick up your blood as well.” ’ ”'
  '2':
  - type: text
    content: 'Ahab spoke to Naboth, saying, “Give me your vineyard, so that I may have it for a garden of vegetables '
  - type: text
    content: and
  - type: text
    content: ' herbs, because it is near my house. I will give you a better vineyard for it, or, if you prefer, I will give you what it is worth in money.” '
  '20':
  - type: text
    content: Ahab said to Elijah, “Have you found me, O my enemy?” And he answered, “I have found you, because you have sold yourself to do evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '21':
  - type: text
    content: Behold [says the L
  - type: heading
    content: ord
  - type: text
    content: '], I am bringing evil (catastrophe) on you, and will utterly sweep you away, and will cut off from Ahab every male, both bond and free in Israel; '
  '22':
  - type: text
    content: 'and I will make your house (descendants) like that of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah, for provoking Me to anger and making Israel sin. '
  '23':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' also spoke in regard to Jezebel, saying, ‘The dogs will eat [the body of] Jezebel in the district of Jezreel.’ '
  '24':
  - type: text
    content: The dogs will eat anyone belonging to Ahab who dies in the city, and the birds of the air will eat anyone who dies in the field.” [1 Kin 14:11; 16:4]
  '25':
  - type: text
    content: There certainly was no one like Ahab who sold himself to do evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', because Jezebel his wife incited him. '
  '26':
  - type: text
    content: He acted very repulsively in following idols, in accordance with everything the Amorites had done, whom the L
  - type: heading
    content: ord
  - type: text
    content: ' expelled [from the land] before the sons of Israel.'
  '27':
  - type: text
    content: 'Now when Ahab heard these words [of Elijah], he tore his clothes, put on sackcloth and fasted, and he lay in sackcloth and went about dejectedly (mourning). '
  '28':
  - type: text
    content: Then the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Elijah the Tishbite, saying, '
  '29':
  - type: text
    content: “Do you see how Ahab has humbled himself before Me? Because he has humbled himself before Me, I will not bring the evil (catastrophe) in his lifetime, but in his son’s days I will bring evil upon his house.”
  '3':
  - type: text
    content: But Naboth said to Ahab, “The L
  - type: heading
    content: ord
  - type: text
    content: ' forbid me that I should give the inheritance of my fathers to you.” '
  '4':
  - type: text
    content: So Ahab [already upset by the Lord’s message] came into his house [feeling more] resentful and sullen because of what Naboth the Jezreelite had said to him; for he had said, “I will not give you the inheritance of my fathers.” And he lay down on his bed and turned away his face, and would not eat any food.
  '5':
  - type: text
    content: 'Then Jezebel his wife came to him and asked him, “Why is your spirit so troubled that you have not eaten?” '
  '6':
  - type: text
    content: 'And he said to her, “Because I spoke to Naboth the Jezreelite and said to him, ‘Give me your vineyard for money; or if you prefer, I will give you '
  - type: text
    content: another
  - type: text
    content: ' vineyard for it.’ But he answered, ‘I will not give you my vineyard.’ ” '
  '7':
  - type: text
    content: Jezebel his wife said to him, “Do you now reign over Israel? Get up, eat food, and let your heart rejoice; I will give you the vineyard of Naboth the Jezreelite.”
  '8':
  - type: text
    content: 'So she wrote letters in Ahab’s name and sealed them with his seal, and sent them to the elders and nobles who lived with Naboth in his city. '
  '9':
  - type: text
    content: 'Now in the letters she wrote, “Proclaim a '
  - type: note
    content: The point of the fast was to display grief and humility toward God over a grave sin that had been committed, usually when famine or another disaster had occurred as judgment from God for the sin. So Jezebel’s plot not only included the judicial murder of an innocent man; it was a direct affront and challenge to God.
  - type: text
