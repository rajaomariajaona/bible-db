document_id: EST.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Vashti’s Successor Sought
  - type: text
    content: 'After these things, when the wrath of King Ahasuerus (Xerxes) had subsided, he remembered Vashti and what she had done and what had been decreed against her. '
  '10':
  - type: text
    content: 'Esther did not reveal [the Jewish background of] her people or her family, for Mordecai had instructed her not to do so. '
  '11':
  - type: text
    content: 'Every day Mordecai [who was an '
  - type: note
    content: See note v 19.
  - type: text
    content: attendant in the king’s court] walked back and forth in front of the courtyard of the harem to learn how Esther was getting along and what was happening to her.
  '12':
  - type: text
    content: 'Now when it was each young woman’s turn to go before King Ahasuerus, after the end of her twelve months under the regulations for the women—for the days of their beautification were completed as follows: six months with oil of myrrh and six months with [sweet] spices '
  - type: text
    content: and
  - type: text
    content: ' perfumes and the beauty preparations for women— '
  '13':
  - type: text
    content: 'then the young woman would go before the king in this way: anything that she wanted was given her to take with her from the harem into the king’s palace. '
  '14':
  - type: text
    content: 'In the evening she would go in and the next morning she would return to the '
  - type: note
    content: Evidently to keep track of all the women, the first harem was comprised only of those who had not yet had personal relations with the king, while those who had were transferred to a second harem.
  - type: text
    content: 'second harem, to the custody of Shaashgaz, the king’s eunuch who was in charge of the '
  - type: note
    content: See note Gen 22:24.
  - type: text
    content: concubines. She would not return to the king unless he delighted in her and she was summoned by name.
  '15':
  - type: text
    content: 'Now '
  - type: text
    content: as for
  - type: text
    content: ' Esther, the daughter of Abihail the uncle of Mordecai who had taken her in as his [own] daughter, when her turn came to go in to the king, she requested nothing except what Hegai the king’s eunuch [and attendant] who was in charge of the women, advised. And Esther found favor in the sight of all who saw her. '
  '16':
  - type: text
    content: So Esther was taken to King Ahasuerus, to his royal palace in the tenth month, that is, the month of Tebeth (Dec-Jan), in the seventh year of his reign.
  - type: heading
    content: Esther Becomes Queen
  '17':
  - type: text
    content: 'Now the king loved Esther more than all the '
  - type: text
    content: other
  - type: text
    content: ' women, and she found favor and kindness with him more than all the [other] virgins, so that he set the royal crown on her head and made her queen in the place of Vashti. '
  '18':
  - type: text
    content: 'Then the king held a great banquet, Esther’s banquet, for all his officials and his servants; and he made a '
  - type: note
    content: Or a release from taxes. The meaning of the Hebrew word is uncertain.
  - type: text
    content: festival for the provinces and gave gifts in accordance with the resources of the king.
  '19':
  - type: text
    content: 'And when the virgins were gathered together the second time, Mordecai '
  - type: note
    content: The phrase sitting at the king’s gate implies that Mordecai was some sort of an official in the service of the king.
  - type: text
    content: 'was sitting at the king’s gate. '
  '2':
  - type: text
    content: 'Then the king’s attendants, who served him, said, “Let beautiful young virgins be sought for the king. '
  '20':
  - type: text
    content: Esther had not revealed her family or her people [that is, her Jewish background], just as Mordecai had instructed her; for Esther did what Mordecai told her just as when she was under his care.
  - type: heading
    content: Mordecai Saves the King
  '21':
  - type: text
    content: 'In those days, while Mordecai was sitting at the king’s gate, Bigthan and Teresh, two of the king’s eunuchs who guarded the door, became '
  - type: note
    content: The reasons for their anger is never explained. The ancient rabbis suggested that the king had replaced them with Mordecai, whom they considered a barbarian.
  - type: text
    content: 'angry and '
  - type: note
    content: Lit sought to lay hands on.
  - type: text
    content: 'conspired to attack King Ahasuerus. '
  '22':
  - type: text
    content: 'But the plot became known to Mordecai, who informed Queen Esther, and Esther told the king in Mordecai’s name. '
  '23':
  - type: text
    content: 'Now when the plot was investigated and found '
  - type: text
    content: to be true,
  - type: text
    content: ' both men were '
  - type: note
    content: Or impaled on a stake. It is uncertain which method was used.
  - type: text
    content: hanged on the gallows. And it was recorded in the Book of the Chronicles in the king’s presence.
  '3':
  - type: text
    content: 'Let the king appoint administrators in all the provinces of his kingdom, and have them gather all the beautiful young virgins to the citadel in Susa, into the harem, under the custody of Hegai, the king’s eunuch, who is in charge of the women; and let their beauty preparations be given '
  - type: text
    content: to them
  - type: text
    content: '. '
  '4':
  - type: text
    content: Then let the young woman who pleases the king be queen in place of Vashti.” This pleased the king, and he did accordingly.
  '5':
  - type: text
    content: 'There was a certain Jew in the citadel of Susa whose name was Mordecai the son of Jair, the son of Shimei, the son of Kish, a Benjamite, '
  '6':
  - type: text
    content: 'who had been deported from Jerusalem with the captives who had been exiled with Jeconiah king of Judah, whom Nebuchadnezzar the king of Babylon had exiled. '
  '7':
  - type: text
    content: 'He was the guardian of '
  - type: note
    content: Hebrew meaning “myrtle.”
  - type: text
    content: 'Hadassah, that is Esther, his uncle’s daughter, for she had no father or mother. The young woman was beautiful of form and '
  - type: note
    content: Lit good of appearance.
  - type: text
    content: face; and when her father and mother died, Mordecai took her in as his own daughter.
  - type: heading
    content: Esther Finds Favor
  '8':
  - type: text
    content: 'So it came about when the king’s command and his decree were proclaimed and when many young women were gathered together in the citadel of Susa into the custody of Hegai, that Esther was taken to the king’s palace [and placed] in the custody of Hegai, who was in charge of the women. '
  '9':
  - type: text
    content: 'Now the young woman pleased Hegai and found favor with him. So he quickly provided her with beauty preparations and her [portion of] food, and he gave her seven choice maids from the king’s palace; then he transferred her and her maids to the best '
  - type: text
    content: place
  - type: text
    content: ' in the harem. '
