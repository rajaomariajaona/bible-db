document_id: EST.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vashti’s Successor Sought
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things, when the wrath of King Ahasuerus (Xerxes) had subsided, he remembered Vashti and what she had done and what had been decreed against her. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the king’s attendants, who served him, said, “Let beautiful young virgins be sought for the king. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Let the king appoint administrators in all the provinces of his kingdom, and have them gather all the beautiful young virgins to the citadel in Susa, into the harem, under the custody of Hegai, the king’s eunuch, who is in charge of the women; and let their beauty preparations be given '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then let the young woman who pleases the king be queen in place of Vashti.” This pleased the king, and he did accordingly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'There was a certain Jew in the citadel of Susa whose name was Mordecai the son of Jair, the son of Shimei, the son of Kish, a Benjamite, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'who had been deported from Jerusalem with the captives who had been exiled with Jeconiah king of Judah, whom Nebuchadnezzar the king of Babylon had exiled. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He was the guardian of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hebrew meaning “myrtle.”
    marker-yv: yv-n
  - type: text
    text: 'Hadassah, that is Esther, his uncle’s daughter, for she had no father or mother. The young woman was beautiful of form and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: good of appearance
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: face; and when her father and mother died, Mordecai took her in as his own daughter.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther Finds Favor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So it came about when the king’s command and his decree were proclaimed and when many young women were gathered together in the citadel of Susa into the custody of Hegai, that Esther was taken to the king’s palace [and placed] in the custody of Hegai, who was in charge of the women. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the young woman pleased Hegai and found favor with him. So he quickly provided her with beauty preparations and her [portion of] food, and he gave her seven choice maids from the king’s palace; then he transferred her and her maids to the best '
  - type: usfm
    marker: it
    children:
    - type: text
      text: place
  - type: text
    text: ' in the harem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Esther did not reveal [the Jewish background of] her people or her family, for Mordecai had instructed her not to do so. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Every day Mordecai [who was an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 19.
    marker-yv: yv-n
  - type: text
    text: attendant in the king’s court] walked back and forth in front of the courtyard of the harem to learn how Esther was getting along and what was happening to her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now when it was each young woman’s turn to go before King Ahasuerus, after the end of her twelve months under the regulations for the women—for the days of their beautification were completed as follows: six months with oil of myrrh and six months with [sweet] spices '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' perfumes and the beauty preparations for women— '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'then the young woman would go before the king in this way: anything that she wanted was given her to take with her from the harem into the king’s palace. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In the evening she would go in and the next morning she would return to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Evidently to keep track of all the women, the first harem was comprised only of those who had not yet had personal relations with the king, while those who had were transferred to a second harem.
    marker-yv: yv-n
  - type: text
    text: 'second harem, to the custody of Shaashgaz, the king’s eunuch who was in charge of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: concubines. She would not return to the king unless he delighted in her and she was summoned by name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as for
  - type: text
    text: ' Esther, the daughter of Abihail the uncle of Mordecai who had taken her in as his [own] daughter, when her turn came to go in to the king, she requested nothing except what Hegai the king’s eunuch [and attendant] who was in charge of the women, advised. And Esther found favor in the sight of all who saw her. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Esther was taken to King Ahasuerus, to his royal palace in the tenth month, that is, the month of Tebeth (Dec-Jan), in the seventh year of his reign.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esther Becomes Queen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now the king loved Esther more than all the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' women, and she found favor and kindness with him more than all the [other] virgins, so that he set the royal crown on her head and made her queen in the place of Vashti. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the king held a great banquet, Esther’s banquet, for all his officials and his servants; and he made a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a release from taxes
      - type: text
        text: . The meaning of the Hebrew word is uncertain.
    marker-yv: yv-n
  - type: text
    text: festival for the provinces and gave gifts in accordance with the resources of the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when the virgins were gathered together the second time, Mordecai '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The phrase '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sitting at the king’s gate
      - type: text
        text: ' implies that Mordecai was some sort of an official in the service of the king.'
    marker-yv: yv-n
  - type: text
    text: 'was sitting at the king’s gate. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Esther had not revealed her family or her people [that is, her Jewish background], just as Mordecai had instructed her; for Esther did what Mordecai told her just as when she was under his care.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mordecai Saves the King
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In those days, while Mordecai was sitting at the king’s gate, Bigthan and Teresh, two of the king’s eunuchs who guarded the door, became '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The reasons for their anger is never explained. The ancient rabbis suggested that the king had replaced them with Mordecai, whom they considered a barbarian.
    marker-yv: yv-n
  - type: text
    text: 'angry and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sought to lay hands on
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'conspired to attack King Ahasuerus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the plot became known to Mordecai, who informed Queen Esther, and Esther told the king in Mordecai’s name. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now when the plot was investigated and found '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to be true,
  - type: text
    text: ' both men were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: impaled on a stake.
      - type: text
        text: ' It is uncertain which method was used.'
    marker-yv: yv-n
  - type: text
    text: hanged on the gallows. And it was recorded in the Book of the Chronicles in the king’s presence.
