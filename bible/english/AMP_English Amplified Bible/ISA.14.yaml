  '12':
  - type: text
    content: “How you have fallen from heaven,
  - type: text
    content: 'O '
  - type: note
    content: Many students of the Bible have felt that the passage which follows applies to Satan (cf Luke 10:18). It is clear from the larger context that the passage addresses the king of Babylon, but that does not rule out a secondary reference to Satan. Many commentators are of the opinion that the arrogance expressed here is satanic, and that the passage correctly represents Satan’s attitude because he was working through the Babylonian ruler. The Hebrew for this expression is translated “Lucifer” (“light-bringer”) in The Latin Vulgate, and is translated this way in the King James Version. But because of the association of that name with Satan, it is not used in this and other translations. Some students feel that the application of the name Lucifer to Satan, in spite of the long and confident teaching to that effect, is erroneous. The application of the name to Satan has existed since the third century a.d., and is based on the supposition that Luke 10:18 is an explanation of Is 14:12, which many authorities believe is not true. “Lucifer,” the light-bringer, is the Latin equivalent of the Greek word “Phosphoros,” which is used as a title of Christ in 2 Pet 1:19 and corresponds to the name “radiant and brilliant Morning Star” in Rev 22:16, a name Jesus called Himself. This passage here in Is 14:12ff clearly applies to the king of Babylon.
