document_id: ISA.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel’s Taunt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will have compassion on Jacob (the captives in Babylon) and will again choose Israel, and will settle them in their own land. Foreigners (Gentiles) will join them [as proselytes] and will attach themselves to the house of Jacob (Israel). [Esth 8:17] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The peoples will take them along and bring them to their own place (Judea), and the house of Israel will possess them as an inheritance in the land of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' as male and female servants; and they will take captive those whose captives they have been, and they will rule over their [former] oppressors. [Ezra 1]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And it will be in the day when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gives you rest from your pain and turmoil and from the harsh service in which you have been enslaved, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: that you will take up this taunt against the king of Babylon, and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “How the oppressor has ceased [his insolence],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And how
  - type: text
    text: ' the fury has ceased!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has broken the staff of the wicked,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The scepter of the [tyrant] rulers
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Which used to strike the peoples in anger with incessant blows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Which subdued '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruled the nations in wrath with unrelenting persecution.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “The whole earth is at rest and is quiet;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They break into shouts of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Even the cypress trees rejoice over you [kings of Babylon], even the cedars of Lebanon, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Since you were laid low, no woodcutter comes up against us.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the nether world, the place of the dead, Hades.
    marker-yv: yv-n
  - type: text
    text: Sheol below is excited about you to meet you when you come [you tyrant of Babylon];
- type: usfm
  marker: q1
  children:
  - type: text
    text: It stirs up the spirits of the dead [to greet you], all the leaders of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It raises all the kings of the nations from their thrones [in astonishment at your fall].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “All of them will respond [tauntingly] and say to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘You have become as weak as we are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have become like us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘Your pomp and magnificence have been brought down to Sheol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Along with the music of your harps;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The maggots [which prey on the dead] are spread out under you [as a bed]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And worms are your covering [Babylonian rulers].’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “How you have fallen from heaven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many students of the Bible have felt that the passage which follows applies to Satan (cf Luke 10:18). It is clear from the larger context that the passage addresses the king of Babylon, but that does not rule out a secondary reference to Satan. Many commentators are of the opinion that the arrogance expressed here is satanic, and that the passage correctly represents Satan’s attitude because he was working through the Babylonian ruler. The Hebrew for this expression is translated “Lucifer” (“light-bringer”) in '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Latin Vulgate
      - type: text
        text: ', and is translated this way in the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: King James Version
      - type: text
        text: '. But because of the association of that name with Satan, it is not used in this and other translations. Some students feel that the application of the name Lucifer to Satan, in spite of the long and confident teaching to that effect, is erroneous. The application of the name to Satan has existed since the third century '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: '., and is based on the supposition that Luke 10:18 is an explanation of Is 14:12, which many authorities believe is not true. “Lucifer,” the light-bringer, is the Latin equivalent of the Greek word “Phosphoros,” which is used as a title of Christ in 2 Pet 1:19 and corresponds to the name “radiant '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' brilliant Morning Star” in Rev 22:16, a name Jesus called Himself. This passage here in Is 14:12ff clearly applies to the king of Babylon.'
    marker-yv: yv-n
  - type: text
    text: star of the morning [light-bringer], son of the dawn!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been cut down to the ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who have weakened the nations [king of Babylon]!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “But you said in your heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I will ascend to heaven;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will raise my throne above the stars of God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sit on the mount of assembly
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the remote parts of the north.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ‘I will ascend above the heights of the clouds;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make myself like the Most High.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “But [in fact] you will be brought down to Sheol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the remote recesses of the pit (the region of the dead).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Those who see you will gaze at you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will consider you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Is this the man who made the earth tremble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who shook kingdoms,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Who made the world like a wilderness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And overthrew its cities,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who did not permit his prisoners to return home?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “All the kings of the nations, all of them lie [dead] in glorious array,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each one in his own sepulcher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “But you [king of Babylon] have been cast out of your tomb (denied burial)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a rejected branch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clothed with the slain who are pierced by the sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who go down to the stones of the pit [into which carcasses are thrown],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a dead body trampled [underfoot].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “You will not be united with them in burial,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you have destroyed your land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have slain your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May the descendants of evildoers never be named!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Prepare a slaughtering place for his sons
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the wickedness [the sin, the injustice, the wrongdoing] of their fathers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They must not rise and take possession of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fill the face of the world with cities.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “I will rise up against them,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, “and will cut off from Babylon name and survivors, and son and grandson,” declares the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“I will also make Babylon a possession of the hedgehog and of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The city of Babylon was in the middle of a very fertile area, and it would have seemed reasonable to suppose that, regardless of what happened to the population, the region would always furnish pasturage for flocks. But Isaiah said it would become the possession of wild animals and would be covered with “swamps of water.” This is how that prophecy was literally fulfilled: after Babylon was taken, the whole area around the city was put under water from neglect of the canals and dikes of the Euphrates River. It became stagnant “swamps of water” among ruins haunted by wild animals, proclaiming to any who might see it that it had happened just as the L'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' intended (Is 14:24).'
    marker-yv: yv-n
  - type: text
    text: swamps of water, and I will sweep it away with the broom of destruction,” declares the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judgment on Assyria
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts has sworn [an oath], saying, “Just as I have intended, so it has certainly happened, and just as I have planned, so it will stand— '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'to break the Assyrian in My land, and on My mountains I will trample him underfoot. Then the Assyrian’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The prophecy against Assyria had actually by this time already been fulfilled, but Isaiah attached it to the as yet unfulfilled prophecy against Babylon as a pledge or guarantee of the fulfillment of the latter.
    marker-yv: yv-n
  - type: text
    text: 'yoke will be removed from them (the people of Judah) and his burden removed from their shoulder. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'This is the plan [of God] decided for the whole earth [regarded as conquered and put under tribute by Assyria]; and this is the hand [of God] that is stretched out over all the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts has decided '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' planned, and who can annul it? His hand is stretched out, and who can turn it back?”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judgment on Philistia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: In the year that King Ahaz [of Judah] died this [mournful, inspired] oracle (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an urgent message the prophet is under compulsion to proclaim.
    marker-yv: yv-n
  - type: text
    text: 'a burden to be carried) came:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Do not rejoice, O Philistia, any of you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because the rod [of Judah] that struck you is broken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For out of the serpent’s root will come a viper [King Hezekiah of Judah],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its offspring will be a flying serpent. [2 Kin 18:1, 3, 8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “The firstborn of the helpless [of Judah] will feed [on My meadows],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the needy will lie down in safety;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I will kill your root with famine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your survivors will be put to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Howl, O gate; cry, O city!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Melt away, O Philistia, all of you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For smoke comes out of the north,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And there is no straggler in his ranks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' no one stands detached [in Hezekiah’s battalions].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “Then what answer will one give the messengers of the [Philistine] nation?
- type: usfm
  marker: q1
  children:
  - type: text
    text: That the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has founded Zion,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the afflicted of His people will seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' find refuge in it.”'
