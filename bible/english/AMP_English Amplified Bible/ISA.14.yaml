  '23':
  - type: text
    content: '“I will also make Babylon a possession of the hedgehog and of '
  - type: note
    content: 'The city of Babylon was in the middle of a very fertile area, and it would have seemed reasonable to suppose that, regardless of what happened to the population, the region would always furnish pasturage for flocks. But Isaiah said it would become the possession of wild animals and would be covered with “swamps of water.” This is how that prophecy was literally fulfilled: after Babylon was taken, the whole area around the city was put under water from neglect of the canals and dikes of the Euphrates River. It became stagnant “swamps of water” among ruins haunted by wild animals, proclaiming to any who might see it that it had happened just as the Lord intended (Is 14:24).'
