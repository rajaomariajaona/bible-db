document_id: EZK.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Idolatrous Elders Condemned
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then certain of the elders of Israel came to me [seeking an oracle from God] and sat down before me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They [both] will bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the punishment
    - type: text
      text: ' of their wickedness; the sin of the [counterfeit] prophet will be the same as the sin of the [hypocritical] inquirer, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: so that the house of Israel may no longer drift away from Me and no longer defile themselves with all their transgressions, but they will be My people, and I will be their God,” ’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The City Will Not Be Spared
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came [again] to me, saying, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Son of man, if a land sins against Me by committing unfaithfulness, and I stretch out My hand against it and destroy its source of bread and send famine on it and cut off from it both man and animal, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: even if these three men, Noah, Daniel, and Job were in that land, by their own righteousness (right standing with God) they could only save (deliver) themselves,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“If I were to cause predatory beasts to pass through the land and they ravaged it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' depopulated it of children, and it became desolate so that no one would pass through because of the predators, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' these three men were in the land, as I live,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “they could not save either their sons or their daughters. They alone would be saved, but the land would be desolate (ruined, deserted). '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Or if I were to bring a sword on that land and say, ‘Let a sword go through the land and cut off man and animal from it,’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'even '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though
    - type: text
      text: ' these three men were in the land, as I live,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “they could not save either their sons or their daughters, but they alone would be saved. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Or if I should send a virulent disease into that land and pour out My wrath in blood on it to cut off man and animal from it, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: even though Noah, Daniel, and Job were in the land, as I live,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “they could not save either their son or their daughter; they would save only themselves by their righteousness [that is, their right-standing with God—their moral and spiritual integrity].”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “How much more when I send My four severe judgments against Jerusalem—sword, famine, predatory beasts, and virulent disease—to cut off man and animal from it! [Lev 26:21-33] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Yet, behold, survivors will be left in it [escaping the judgments], both sons and daughters. Listen carefully, they are going to come out to you [in Babylon] and you will see their [wicked] conduct and [despicable] actions; then you will be at peace in regard to the disaster which I have brought against Jerusalem for everything which I have brought on it [has been deserved]. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then they will reassure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This word is plural and refers to all the exiles living in Babylon.
      marker-yv: yv-n
    - type: text
      text: you [in regard to the appropriateness of the judgments] when you see their [heinous] conduct and actions, for you will know that I have not done without cause whatever I did to it,” declares the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Son of man, these men have set up [and honored] their idols in their hearts and have put right before their faces the [vile] stumbling block of their wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt; should I [permit Myself to] be consulted by them at all? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Therefore speak to them and say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Any man of the house of Israel who takes his idols [of rebellion] into his heart, and puts the [vile] stumbling block of his wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt [images of silver and gold] before his face, and yet comes to the prophet [to ask of him], I the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will answer him, [but I will answer him] in accordance with the number of his idols, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: in order that I may take hold of the heart (mind) of the house of Israel who are all estranged from Me because of their idols.” ’
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Therefore say to the house of Israel, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Repent and turn away from your idols and turn your faces away from all your disgusting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vile acts. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For anyone of the house of Israel or among the strangers who immigrate to Israel who separates himself from Me, taking his idols into his heart, and puts right before his face the [vile] stumbling block of his wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt, and [then] comes to the prophet to ask of Me for himself, I the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will answer him Myself. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I will set My face against that man [that hypocrite] and will make him a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an object of scorn or ridicule.
      marker-yv: yv-n
    - type: text
      text: sign and a proverb, and I will cut him off from among My people; and you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “But if the prophet [who speaks without My authority] is enticed to speak a word [of his own], it is I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' who have caused that prophet [to speak falsely to please the inquirer, thus allowing himself to be a party to the inquirer’s sin], and I will stretch out My hand against him and destroy him from among My people Israel. '
