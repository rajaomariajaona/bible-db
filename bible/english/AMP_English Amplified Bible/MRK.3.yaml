  '14':
  - type: text
    content: 'And He appointed '
  - type: note
    content: See notes Matt 10:2-4.
  - type: text
    content: 'twelve [disciples], so that they would be with Him [for instruction] and so that He could send them out to preach [the gospel as apostles—that is, as His special messengers, personally chosen representatives], '
  '15':
  - type: text
    content: 'and to have authority '
  - type: text
    content: and
  - type: text
    content: ' power to cast out demons. '
  '16':
  - type: text
    content: 'He appointed the twelve: Simon (to whom He gave the name Peter), [Matt 10:2-4; Luke 6:13-16] '
  '17':
  - type: text
    content: 'and James, the son of '
  - type: note
    content: It is believed that Salome, Zebedee’s wife and the mother of James and John, was a sister of Mary, the mother of Jesus.
  - type: text
    content: 'Zebedee, and John the brother of James (to them He gave the name Boanerges, that is, “Sons of Thunder”); '
  '18':
  - type: text
    content: 'and [He also appointed] Andrew, and Philip, and Bartholomew (Nathanael), and Matthew (Levi the tax collector), and Thomas, and '
  - type: note
    content: Also called James the Less or James the Younger. It is believed that his mother, Mary (Gr Maria), was a sister or sister-in-law of Mary, the mother of Jesus.
  - type: text
    content: 'James the son of Alphaeus, and Thaddaeus (Judas the son of James), and Simon the Zealot; '
  '19':
  - type: text
    content: and Judas Iscariot, who betrayed Him.
  '2':
  - type: text
    content: 'The Pharisees were watching Jesus '
  - type: text
    content: closely to see
  - type: text
    content: ' if He would heal him on the Sabbath, so that they might accuse Him [in the Jewish high court]. '
  '20':
  - type: text
    content: 'Then He came to a '
  - type: note
    content: Probably Simon Peter’s house; cf 2:1, 2.
  - type: text
    content: 'house [in Capernaum], and a crowd formed again, so [many people] that Jesus and His disciples could not even eat a meal [together]. '
  '21':
  - type: text
    content: 'When His own family heard this they went to take custody of Him; for they were saying, “He is out of His mind.” '
  '22':
  - type: text
    content: 'The scribes who came down from Jerusalem were saying, “He is possessed by '
  - type: note
    content: 'I.e. an idol worshiped in the Philistine city of Ekron: Baal Zebul, lord of the high places or Baal Zebub, lord of the flies.'
  - type: text
    content: 'Beelzebul (Satan),” and “He is driving out the demons by the [power of the] ruler of the demons.” [Matt 12:22-37; Luke 11:14-28] '
  '23':
  - type: text
    content: 'So He called them to Himself and spoke to them in '
  - type: note
    content: Parables ordinarily were used for clarification, but Jesus often used them to hide sacred truths from unbelievers (see 4:11, 12).
  - type: text
