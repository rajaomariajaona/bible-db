  '3':
  - type: text
    content: 'He said to the man whose hand was withered, '
  - type: text
    content: “Get up and come forward!”
  - type: text
    content: ' '
  '30':
  - type: text
    content: '[Jesus said this] because the scribes and Pharisees were [attributing His miracles to Satan by] saying, “He has an unclean spirit.”'
  '31':
  - type: text
    content: 'Then His mother and His brothers arrived, and standing outside they sent '
  - type: text
    content: word
  - type: text
    content: ' to Him and called for Him. [Matt 12:46-50; Luke 8:19-21] '
  '32':
  - type: text
    content: 'A crowd was sitting around Him, and they said to Him, “Look! Your mother and Your brothers are outside asking for You.” '
  '33':
  - type: text
    content: 'And He replied, '
  - type: text
    content: “Who are My mother and My brothers?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Looking at those who were sitting in a circle around Him, He said, '
  - type: text
    content: “Here are My mother and My brothers!
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'For '
  - type: note
    content: A universal offer.
  - type: text
    content: whoever does the will of God
  - type: text
    content: ' [by believing in Me, and following Me], '
  - type: text
    content: he is My brother and sister and mother.”
  '4':
  - type: text
    content: 'He asked them, '
  - type: text
    content: “Is it lawful on the Sabbath to do good or to do evil, to save a life or to kill?”
  - type: text
    content: ' But they kept silent. '
  '5':
  - type: text
    content: 'After looking around at them with anger, grieved at the hardness '
  - type: text
    content: and
  - type: text
    content: ' arrogance of their hearts, He told the man, '
  - type: text
    content: “Hold out your hand.”
  - type: text
    content: ' And he held it out, and his hand was [completely] restored. '
  '6':
  - type: text
    content: 'Then the Pharisees went out and immediately '
  - type: text
    content: began
  - type: text
    content: ' conspiring with the '
  - type: note
    content: A secular political party of Jews that strongly supported Herod Antipas and Rome, and opposed the Pharisees on most issues.
  - type: text
    content: 'Herodians [to plot] against Him, as to how '
  - type: note
    content: The Pharisees and Herodians set aside their religious and political differences to form a conspiracy.
  - type: text
    content: they might [fabricate some legal grounds to] put Him to death.
  '7':
  - type: text
    content: 'Jesus withdrew to the sea with His disciples; and a large crowd from Galilee followed Him; and '
  - type: text
    content: also people
  - type: text
    content: ' from Judea, '
  '8':
  - type: text
    content: 'and from Jerusalem, and from Idumea, and [from the region] beyond the Jordan, and around Tyre and Sidon; a vast number of people came to Him because they were hearing about all [the things] that He was doing. '
  '9':
  - type: text
    content: 'And He told His disciples to have a small boat stand ready for Him because of the many people, so that they would not crowd Him; '
