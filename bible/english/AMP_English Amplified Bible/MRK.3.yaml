    content: Jesus Heals on the Sabbath
  - type: text
    content: 'Again Jesus went into a synagogue; and a man was there whose hand was '
  - type: note
    content: The Greek word also means “to dry out” and may indicate that the condition resulted from disease or an accident.
  - type: text
    content: 'withered. [Matt 12:9-14; Luke 6:6-11] '
  '10':
  - type: text
    content: 'for He had healed many, and as a result all who had diseases pressed around Him to touch Him. '
  '11':
  - type: text
    content: 'Whenever the unclean spirits saw Him, they fell down before Him and screamed out, “You are the Son of God!” '
  '12':
  - type: text
    content: Jesus sternly warned them [again and again] not to tell who He was.
  - type: heading
    content: The Twelve Are Chosen
  '13':
  - type: text
    content: 'He went up on the hillside and called those whom He Himself wanted '
  - type: text
