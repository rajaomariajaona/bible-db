document_id: MRK.3,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Heals on the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again Jesus went into a synagogue; and a man was there whose hand was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word also means “to dry out” and may indicate that the condition resulted from disease or an accident.
      marker-yv: yv-n
    - type: text
      text: 'withered. [Matt 12:9-14; Luke 6:6-11] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'for He had healed many, and as a result all who had diseases pressed around Him to touch Him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Whenever the unclean spirits saw Him, they fell down before Him and screamed out, “You are the Son of God!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Jesus sternly warned them [again and again] not to tell who He was.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Twelve Are Chosen
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He went up on the hillside and called those whom He Himself wanted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chose; and they came to Him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And He appointed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See notes Matt 10:2-4.
      marker-yv: yv-n
    - type: text
      text: 'twelve [disciples], so that they would be with Him [for instruction] and so that He could send them out to preach [the gospel as apostles—that is, as His special messengers, personally chosen representatives], '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and to have authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power to cast out demons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'He appointed the twelve: Simon (to whom He gave the name Peter), [Matt 10:2-4; Luke 6:13-16] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and James, the son of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is believed that Salome, Zebedee’s wife and the mother of James and John, was a sister of Mary, the mother of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'Zebedee, and John the brother of James (to them He gave the name Boanerges, that is, “Sons of Thunder”); '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and [He also appointed] Andrew, and Philip, and Bartholomew (Nathanael), and Matthew (Levi the tax collector), and Thomas, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also called James the Less or James the Younger. It is believed that his mother, Mary (Gr '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Maria)
        - type: text
          text: ', was a sister or sister-in-law of Mary, the mother of Jesus.'
      marker-yv: yv-n
    - type: text
      text: 'James the son of Alphaeus, and Thaddaeus (Judas the son of James), and Simon the Zealot; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: and Judas Iscariot, who betrayed Him.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The Pharisees were watching Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: closely to see
    - type: text
      text: ' if He would heal him on the Sabbath, so that they might accuse Him [in the Jewish high court]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then He came to a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably Simon Peter’s house; cf 2:1, 2.
      marker-yv: yv-n
    - type: text
      text: 'house [in Capernaum], and a crowd formed again, so [many people] that Jesus and His disciples could not even eat a meal [together]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When His own family heard this they went to take custody of Him; for they were saying, “He is out of His mind.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The scribes who came down from Jerusalem were saying, “He is possessed by '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I.e. an idol worshiped in the Philistine city of Ekron: Baal Zebul, lord of the high places or Baal Zebub, lord of the flies.'
      marker-yv: yv-n
    - type: text
      text: 'Beelzebul (Satan),” and “He is driving out the demons by the [power of the] ruler of the demons.” [Matt 12:22-37; Luke 11:14-28] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So He called them to Himself and spoke to them in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Parables ordinarily were used for clarification, but Jesus often used them to hide sacred truths from unbelievers (see 4:11, 12).
      marker-yv: yv-n
    - type: text
      text: 'parables, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How can Satan drive out Satan?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If a kingdom is divided
    - type: text
      text: ' [split into factions and rebelling] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: against itself, that kingdom cannot stand.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if a house is divided against itself, that house cannot stand.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if Satan has risen up against himself and is divided, he cannot stand, but is coming to an end.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But no one can go into a strong man’s house and steal his property unless he first overpowers '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' ties up the strong man, and then he will ransack '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' rob his house.'
    - type: text
      text: ' [Is 49:24, 25; Matt 12:29]'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, all sins will be forgiven the sons of men, and all the abusive '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' blasphemous things they say;'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but whoever '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Blasphemy of the Holy Spirit is denying all the work of the Holy Spirit. This leads ultimately to rejecting the deity of Christ.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'blasphemes against the Holy Spirit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' His power'
    - type: text
      text: ' [by attributing the miracles done by Me to Satan] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: never has forgiveness, but is guilty of an everlasting sin
    - type: text
      text: ' [a sin which is unforgivable in this present age as well as in the age to come]”— [Matt 12:32; Luke 12:10] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He said to the man whose hand was withered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up and come forward!”
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '[Jesus said this] because the scribes and Pharisees were [attributing His miracles to Satan by] saying, “He has an unclean spirit.”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then His mother and His brothers arrived, and standing outside they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Him and called for Him. [Matt 12:46-50; Luke 8:19-21] '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'A crowd was sitting around Him, and they said to Him, “Look! Your mother and Your brothers are outside asking for You.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who are My mother and My brothers?”
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Looking at those who were sitting in a circle around Him, He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Here are My mother and My brothers!
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A universal offer.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: whoever does the will of God
    - type: text
      text: ' [by believing in Me, and following Me], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he is My brother and sister and mother.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Is it lawful on the Sabbath to do good or to do evil, to save a life or to kill?”
    - type: text
      text: ' But they kept silent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After looking around at them with anger, grieved at the hardness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogance of their hearts, He told the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Hold out your hand.”
    - type: text
      text: ' And he held it out, and his hand was [completely] restored. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the Pharisees went out and immediately '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' conspiring with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A secular political party of Jews that strongly supported Herod Antipas and Rome, and opposed the Pharisees on most issues.
      marker-yv: yv-n
    - type: text
      text: 'Herodians [to plot] against Him, as to how '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Pharisees and Herodians set aside their religious and political differences to form a conspiracy.
      marker-yv: yv-n
    - type: text
      text: they might [fabricate some legal grounds to] put Him to death.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jesus withdrew to the sea with His disciples; and a large crowd from Galilee followed Him; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also people
    - type: text
      text: ' from Judea, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and from Jerusalem, and from Idumea, and [from the region] beyond the Jordan, and around Tyre and Sidon; a vast number of people came to Him because they were hearing about all [the things] that He was doing. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And He told His disciples to have a small boat stand ready for Him because of the many people, so that they would not crowd Him; '
