document_id: JOS.19,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Territory of Simeon
  - type: text
    content: 'Then the second lot fell to Simeon, to the tribe of the sons of Simeon according to their families (clans), and their inheritance was within the inheritance of the sons of Judah. '
  '10':
  - type: text
    content: 'The third lot came up for [the tribe of] the sons of Zebulun according to their families. The territory of their inheritance extended to Sarid. '
  '11':
  - type: text
    content: 'Then its border went up westward and on to Maralah, and reached to Dabbesheth and reached to the brook east of Jokneam. '
  '12':
  - type: text
    content: 'Then it turned from Sarid east toward the sunrise as far as the border of Chisloth-tabor, and it proceeded to Daberath and on up to Japhia. '
  '13':
  - type: text
    content: 'From there it continued east toward the sunrise to '
  - type: note
    content: I.e. the birthplace of Jonah.
  - type: text
    content: 'Gath-hepher and to Eth-kazin, and proceeded to Rimmon which turns toward Neah. '
  '14':
  - type: text
    content: 'The border circled it on the north to Hannathon, ending at the Valley of Iphtahel. '
  '15':
  - type: text
    content: 'Included were Kattah and Nahalal and Shimron and Idalah and Bethlehem; twelve cities with their villages. '
  '16':
  - type: text
    content: This was the inheritance of the sons of Zebulun according to their families, these cities with their villages.
  - type: heading
    content: Territory of Issachar
  '17':
  - type: text
    content: 'The fourth lot fell to [the tribe of] Issachar, to the sons of Issachar according to their families. '
  '18':
  - type: text
    content: 'Their territory included: Jezreel and Chesulloth and Shunem, '
  '19':
  - type: text
    content: 'and Hapharaim and Shion and Anaharath, '
  '2':
  - type: text
    content: 'So they had as their inheritance Beersheba or Sheba and Moladah, '
  '20':
  - type: text
    content: 'and Rabbith and Kishion and Ebez, '
  '21':
  - type: text
    content: 'and Remeth and En-gannim and En-haddah and Beth-pazzez. '
  '22':
  - type: text
    content: 'The border reached to Tabor and Shahazumah and Beth-shemesh, and their border ended at the Jordan; sixteen cities with their villages. '
  '23':
  - type: text
    content: This was the inheritance of the tribe of the sons of Issachar according to their families, the cities and their villages.
  - type: heading
    content: Territory of Asher
  '24':
  - type: text
    content: 'The fifth lot fell to the tribe of the sons of Asher according to their families. '
  '25':
  - type: text
    content: 'Their territory was Helkath and Hali and Beten and Achshaph, '
  '26':
  - type: text
    content: 'and Allammelech and Amad and Mishal; and on the west it reached to Carmel and to Shihor-libnath. '
  '27':
  - type: text
    content: 'Then it turned eastward to Beth-dagon and reached Zebulun and the Valley of Iphtahel northward to Beth-emek and Neiel, and continued in the north to Cabul, '
  '28':
  - type: text
    content: 'and Ebron and Rehob and Hammon and Kanah, as far as Great Sidon. '
  '29':
  - type: text
    content: 'Then the border turned to Ramah, [reaching] to the fortified city of Tyre; and it turned to Hosah, and it ended at the [Mediterranean] sea at the region of Achzib. '
  '3':
  - type: text
    content: 'and Hazar-shual and Balah and Ezem, '
  '30':
  - type: text
    content: 'Included were Ummah, and Aphek and Rehob; twenty-two cities with their villages. '
  '31':
  - type: text
    content: This was the inheritance of the tribe of the sons of Asher according to their families, these cities with their villages.
  - type: heading
    content: Territory of Naphtali
  '32':
  - type: text
    content: 'The sixth lot fell to [the tribe of] the sons of Naphtali according to their families. '
  '33':
  - type: text
    content: 'Their border ran from Heleph, from the oak in Zaanannim and Adami-nekeb and Jabneel, as far as Lakkum, and it ended at the Jordan. '
  '34':
  - type: text
    content: 'Then the border turned westward to Aznoth-tabor and went from there to Hukkok; and it reached Zebulun on the south and reached Asher on the west, and to Judah toward the east at the Jordan. '
  '35':
  - type: text
    content: 'The fortified cities were Ziddim, Zer, and Hammath, Rakkath and Chinnereth, '
  '36':
  - type: text
    content: 'and Adamah and Ramah and Hazor, '
  '37':
  - type: text
    content: 'and Kedesh and Edrei and En-hazor, '
  '38':
  - type: text
    content: 'and Yiron and Migdal-el, Horem and Beth-anath and Beth-shemesh; nineteen cities with their villages. '
  '39':
  - type: text
    content: This was the inheritance of the tribe of the sons of Naphtali according to their families, the cities and their villages.
  - type: heading
    content: Territory of Dan
  '4':
  - type: text
    content: 'and Eltolad and Bethul and Hormah, '
  '40':
  - type: text
    content: 'The seventh lot fell to the tribe of the sons of Dan according to their families. '
  '41':
  - type: text
    content: 'The territory of their inheritance included Zorah and Eshtaol and Ir-shemesh, '
  '42':
  - type: text
    content: 'and Shaalabbin and Aijalon and Ithlah, '
  '43':
  - type: text
    content: 'and Elon and Timnah and Ekron, '
  '44':
  - type: text
    content: 'and Eltekeh and Gibbethon and Baalath, '
  '45':
  - type: text
    content: 'and Jehud and Bene-berak and Gath-rimmon, '
  '46':
  - type: text
    content: 'and Me-jarkon and Rakkon, with the territory opposite Joppa. '
  '47':
  - type: text
    content: 'The territory of the sons of Dan '
  - type: note
    content: The tribe of the sons of Dan were unable to possess and control their original territory whose native inhabitants were the Amorites and the Philistines.
  - type: text
    content: 'went beyond these; so the sons of Dan went up to fight against Leshem (Laish) and captured it. Then they struck it with the edge of the sword and took possession of it and settled there [between the tribes of Naphtali and Manasseh]; they '
  - type: note
    content: Lit called.
  - type: text
    content: 'renamed Leshem, Dan, after the name of their father (ancestor) Dan. [Judg 1:34; 18:7-10, 27] '
  '48':
  - type: text
    content: This was the inheritance of the tribe of the sons of Dan according to their families (clans), these cities with their villages.
  '49':
  - type: text
    content: 'When they had finished dividing the land for inheritance by its borders, the Israelites gave an inheritance among them to Joshua the son of Nun. '
  '5':
  - type: text
    content: 'and Ziklag and Beth-marcaboth and Hazar-susah, '
  '50':
  - type: text
    content: According to the command of the L
  - type: heading
    content: ord
  - type: text
    content: ' they gave him the city for which he asked—Timnath-serah in the hill country of Ephraim. So he built the city and settled in it.'
  '51':
  - type: text
    content: These are the inheritances which Eleazar the priest, Joshua the son of Nun, and the heads of the households of the tribes of the sons of Israel distributed by lot in Shiloh before the L
  - type: heading
    content: ord
  - type: text
    content: ' at the doorway of the Tent of Meeting. So they finished dividing the land.'
  '6':
  - type: text
    content: 'and Beth-lebaoth and Sharuhen; thirteen cities with their villages; '
  '7':
  - type: text
    content: 'Ain, Rimmon and Ether and Ashan; four cities with their villages; '
  '8':
  - type: text
    content: 'and all the villages which were around these cities as far as Baalath-beer, Ramah of the Negev (South country). This was the inheritance of the tribe of the sons of Simeon according to their families. '
  '9':
  - type: text
    content: 'The inheritance of the sons of Simeon '
  - type: text
    content: was taken
  - type: text
    content: ' from the portion of the sons of Judah, for the share of the sons of Judah was too large for them; so the sons of Simeon received an inheritance within Judah’s inheritance.'
  - type: heading
    content: Territory of Zebulun
