document_id: NUM.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Spies View the Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Send men to spy out the land of Canaan, which I am going to give to the sons of Israel. From each of their fathers’ tribes you shall send a man, every one a leader among them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So Moses sent spies from the Wilderness of Paran at the command of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', all of them men who were heads of the Israelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These were their names: from the tribe of Reuben, Shammua the son of Zaccur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'from the tribe of Simeon, Shaphat the son of Hori; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'from the tribe of Judah, Caleb the son of Jephunneh; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'from the tribe of Issachar, Igal the son of Joseph; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'from the tribe of Ephraim, Hoshea [that is, Joshua] the son of Nun; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'from the tribe of Benjamin, Palti the son of Raphu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'from the tribe of Zebulun, Gaddiel the son of Sodi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'from the tribe of Joseph, that is, of the tribe of Manasseh, Gaddi the son of Susi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'from the tribe of Dan, Ammiel the son of Gemalli; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'from the tribe of Asher, Sethur the son of Michael; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'from the tribe of Naphtali, Nahbi the son of Vophsi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'from the tribe of Gad, Geuel the son of Machi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: These are the names of the men whom Moses sent to spy out the land; but Moses called Hoshea the son of Nun, Joshua (the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is salvation).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moses sent them to spy out the land of Canaan, and said to them, “Go up this way into the Negev (the South country); then go up into the hill country. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'See what the land is like and whether the people who live there are strong or weak, few or many, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and whether the land in which they live is good or bad, and whether the cities in which they live are [open] camps or fortifications, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: and what the land is, whether it is fat (productive) or lean, whether there is timber on it or not. Make an effort to get some of the fruit of the land.” Now the time was the time of the first ripe grapes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So they went up and spied out the land from the Wilderness of Zin to Rehob [a town in Lebanon], at Lebo-hamath [in the far north]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When they had gone up into the Negev (the South country), they came to Hebron; and Ahiman, Sheshai, and Talmai the descendants of Anak were there. (Now Hebron was built seven years before Zoan in Egypt.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then they came to the Valley of Eshcol (cluster of grapes), and from there cut down a branch with a single cluster of grapes; and they carried it on a pole between two of them, with some of pomegranates and the figs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: That place was called the Valley of Eshcol (cluster of grapes) because of the cluster of grapes which the sons of Israel cut down there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Spies’ Reports
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When they returned from spying out the land, at the end of forty days, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'they came to Moses and Aaron and to all the congregation of the sons of Israel in the Wilderness of Paran at Kadesh, and brought back word to them and to all the congregation, and showed them the land’s fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They reported to Moses and said, “We went in to the land where you sent us; and it certainly does '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
    marker-yv: yv-n
  - type: text
    text: 'flow with milk and honey, and this is its fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But the people who live in the land are strong, and the cities are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The spies probably had not seen walled cities before, having lived their childhood in Goshen in Egypt. Those who forgot God’s power to help them naturally found the situation formidable.
    marker-yv: yv-n
  - type: text
    text: 'fortified (walled) and very large; moreover, we saw there the descendants of Anak [people of great stature and courage]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '[The people descended from] Amalek live in the land of the Negev (South country); the Hittite, the Jebusite, and the Amorite live in the hill country; and the Canaanites live by the [Dead] Sea and along the side of the Jordan.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Caleb quieted the people before Moses, and said, “Let us go up at once and take possession of it; for we will certainly conquer it.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But the men who had gone up with him said, “We are not able to go up against the people [of Canaan], for they are too strong for us.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they gave the Israelites a bad report about the land which they had spied out, saying, “The land through which we went, in spying it out, is a land that devours its inhabitants. And all the people that we saw in it are men of great stature. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: There we saw the Nephilim (the sons of Anak are part of the Nephilim); and we were like grasshoppers in our own sight, and so we were in their sight.”
