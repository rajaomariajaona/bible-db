document_id: PSA.73,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK THREE
  - type: heading
    content: Psalm 73
  - type: heading
    content: The End of the Wicked Contrasted with That of the Righteous.
  - type: text
    content: A Psalm of Asaph.
  - type: text
    content: Truly God is good to Israel,
  - type: text
    content: To those who are pure in heart.
  '10':
  - type: text
    content: ¶Therefore his people return to this place,
  - type: text
    content: And waters of abundance [offered by the irreverent] are [blindly] drunk by them.
  '11':
  - type: text
    content: They say, “How does God know?
  - type: text
    content: Is there knowledge [of us] with the Most High?”
  '12':
  - type: text
    content: Behold, these are the ungodly,
  - type: text
    content: 'Who always prosper '
  - type: text
    content: and
  - type: text
    content: ' are at ease [in the world]; they have increased in wealth.'
  '13':
  - type: text
    content: Surely then in vain I have cleansed my heart
  - type: text
    content: And washed my hands in innocence. [Mal 3:14]
  '14':
  - type: text
    content: For all the day long have I been stricken,
  - type: text
    content: And punished every morning.
  '15':
  - type: text
    content: ¶If I had said, “I will say this,” [and expressed my feelings],
  - type: text
    content: I would have betrayed the generation of Your children.
  '16':
  - type: text
    content: When I considered how to understand this,
  - type: text
    content: 'It was too great an effort for me '
  - type: text
    content: and
  - type: text
    content: ' too painful'
  '17':
  - type: text
    content: Until I came into the sanctuary of God;
  - type: text
    content: Then I understood [for I considered] their end.
  '18':
  - type: text
    content: 'Surely You set the wicked-minded '
  - type: text
    content: and
  - type: text
    content: ' immoral on slippery places;'
  - type: text
    content: You cast them down to destruction.
  '19':
  - type: text
    content: How they are destroyed in a moment!
  - type: text
    content: They are completely swept away by sudden terrors!
  '2':
  - type: text
    content: But as for me, my feet came close to stumbling,
  - type: text
    content: My steps had almost slipped.
  '20':
  - type: text
    content: Like a dream [which seems real] until one awakens,
  - type: text
    content: O Lord, when stirred, [You observe the wicked], You will despise their image.
  '21':
  - type: text
    content: ¶When my heart was embittered
  - type: text
    content: And I was pierced within [as with the fang of an adder],
  '22':
  - type: text
    content: Then I was senseless and ignorant;
  - type: text
    content: I was like a beast before You.
  '23':
  - type: text
    content: Nevertheless I am continually with You;
  - type: text
    content: You have taken hold of my right hand.
  '24':
  - type: text
    content: You will guide me with Your counsel,
  - type: text
    content: 'And afterward receive me to honor '
  - type: text
    content: and
  - type: text
    content: ' glory.'
  '25':
  - type: text
    content: ¶Whom have I in heaven [but You]?
  - type: text
    content: And besides You, I desire nothing on earth.
  '26':
  - type: text
    content: My flesh and my heart may fail,
  - type: text
    content: 'But God is the rock '
  - type: text
    content: and
  - type: text
    content: ' strength of my heart and my portion forever.'
  '27':
  - type: text
    content: For behold, those who are far from You will perish;
  - type: text
    content: 'You have destroyed all those who are unfaithful '
  - type: text
    content: and
  - type: text
    content: ' have abandoned You.'
  '28':
  - type: text
    content: But as for me, it is good for me to draw near to God;
  - type: text
    content: I have made the Lord G
  - type: heading
    content: od
  - type: text
    content: ' my refuge '
  - type: text
    content: and
  - type: text
    content: ' placed my trust in Him,'
  - type: text
    content: That I may tell of all Your works.
  '3':
  - type: text
    content: For I was envious of the arrogant
  - type: text
    content: As I saw the prosperity of the wicked.
  '4':
  - type: text
    content: For there are no pains in their death,
  - type: text
    content: 'Their body is fat '
  - type: text
    content: and
  - type: text
    content: ' pampered.'
  '5':
  - type: text
    content: 'They are not in trouble '
  - type: text
    content: as other
  - type: text
    content: ' men,'
  - type: text
    content: Nor are they plagued like mankind.
  '6':
  - type: text
    content: Therefore pride is their necklace;
  - type: text
    content: Violence covers them like a garment [like a long, luxurious robe].
  '7':
  - type: text
    content: Their eye bulges from fatness [they have more than the heart desires];
  - type: text
    content: The imaginations of their mind run riot [with foolishness].
  '8':
  - type: text
    content: They mock and wickedly speak of oppression;
  - type: text
    content: They speak loftily [with malice].
  '9':
  - type: text
    content: They set their mouth against the heavens,
  - type: text
    content: And their tongue swaggers through the earth. [Rev 13:6]
