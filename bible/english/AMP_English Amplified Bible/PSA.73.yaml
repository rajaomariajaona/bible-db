document_id: PSA.73,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOOK THREE
    marker-yv: yv-h
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 73
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The End of the Wicked Contrasted with That of the Righteous.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Truly God is good to Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To those who are pure in heart.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶Therefore his people return to this place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And waters of abundance [offered by the irreverent] are [blindly] drunk by them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They say, “How does God know?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there knowledge [of us] with the Most High?”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Behold, these are the ungodly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who always prosper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' are at ease [in the world]; they have increased in wealth.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Surely then in vain I have cleansed my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And washed my hands in innocence. [Mal 3:14]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For all the day long have I been stricken,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And punished every morning.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ¶If I had said, “I will say this,” [and expressed my feelings],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would have betrayed the generation of Your children.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When I considered how to understand this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It was too great an effort for me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' too painful'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Until I came into the sanctuary of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I understood [for I considered] their end.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Surely You set the wicked-minded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' immoral on slippery places;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You cast them down to destruction.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: How they are destroyed in a moment!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are completely swept away by sudden terrors!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: But as for me, my feet came close to stumbling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My steps had almost slipped.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Like a dream [which seems real] until one awakens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, when stirred, [You observe the wicked], You will despise their image.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ¶When my heart was embittered
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I was pierced within [as with the fang of an adder],
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then I was senseless and ignorant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was like a beast before You.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Nevertheless I am continually with You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have taken hold of my right hand.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You will guide me with Your counsel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And afterward receive me to honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glory.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ¶Whom have I in heaven [but You]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And besides You, I desire nothing on earth.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: My flesh and my heart may fail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But God is the rock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strength of my heart and my portion forever.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For behold, those who are far from You will perish;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have destroyed all those who are unfaithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have abandoned You.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But as for me, it is good for me to draw near to God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have made the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' my refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' placed my trust in Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I may tell of all Your works.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For I was envious of the arrogant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As I saw the prosperity of the wicked.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For there are no pains in their death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their body is fat '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pampered.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They are not in trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as other
    - type: text
      text: ' men,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor are they plagued like mankind.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Therefore pride is their necklace;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Violence covers them like a garment [like a long, luxurious robe].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Their eye bulges from fatness [they have more than the heart desires];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The imaginations of their mind run riot [with foolishness].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They mock and wickedly speak of oppression;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They speak loftily [with malice].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: They set their mouth against the heavens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their tongue swaggers through the earth. [Rev 13:6]
