  '1':
  - type: heading
    content: Jehu Reigns over Israel
  - type: text
    content: Now Elisha the prophet called one of the sons of the prophets and said to him, “
  - type: note
    content: Gird up your loins, a phrase often found in the Bible, is an urgent call to get ready for immediate action, or it may be a call to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things. Gird up your mind or gird up your heart are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.
  - type: text
    content: 'Gird up your loins (prepare for action), take this flask of oil in your hand and go to Ramoth-gilead. '
  '10':
  - type: text
    content: And the dogs will eat Jezebel in the territory of Jezreel, and there will be no one to bury her.’ ” Then he opened the door and fled. [2 Kin 9:33-37]
  '11':
  - type: text
    content: 'When Jehu came out to the servants of his master, one said to him, “Is all well? Why did this madman come to you?” And he said to them, “You know [very well] the man and his talk.” '
  '12':
  - type: text
    content: And they said, “It is a lie; tell us now.” And he said, “Thus and thus he spoke to me, saying, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': “I have anointed you king over Israel.” ’ ” '
  '13':
  - type: text
    content: Then they hurried and each man took his garment and placed it [as a cushion] under Jehu on the top of the [outside] stairs, and blew the trumpet, saying, “Jehu is king!”
  - type: heading
    content: Jehoram (Joram) Is Assassinated
  '14':
  - type: text
    content: 'So Jehu the son of Jehoshaphat, the son of Nimshi, conspired against Joram [to dethrone and kill him]. Now Joram with all Israel was protecting Ramoth-gilead against Hazael king of Aram (Syria), '
  '15':
  - type: text
    content: 'but King '
  - type: note
    content: Heb Jehoram.
  - type: text
    content: 'Joram had returned to Jezreel to heal from the wounds which the Arameans had inflicted on him when he fought with Hazael king of Aram. So Jehu said, “If this is your intent, let no one survive and leave the city (Ramoth-gilead) to go and tell '
  - type: text
    content: of the plan
  - type: text
    content: ' in Jezreel [the capital].” '
  '16':
  - type: text
    content: So Jehu rode in a chariot and went to Jezreel, for Joram was lying there. And Ahaziah king of Judah had come down to see Joram.
  '17':
  - type: text
    content: 'Now the watchman was standing on the tower in Jezreel and he saw the crowd with Jehu as he approached, and said, “I see a company.” And '
  - type: note
    content: Heb Jehoram.
  - type: text
    content: Joram said, “Send a horseman to meet them and have him ask, ‘
  - type: note
    content: Lit Peace? and so throughout the passage.
  - type: text
    content: 'Do you come in peace?’ ” '
  '18':
  - type: text
    content: 'So the horseman went to meet him and said, “Thus says the king: ‘Do you come in peace?’ ” And Jehu said, “What have you to do with peace? Rein in behind me.” And the watchman reported, “The messenger approached them, but he has not returned.” '
  '19':
  - type: text
    content: 'Then Joram sent out a second horseman, who approached them and said, “Thus says the king: ‘Do you come in peace?’ ” Jehu replied, “What have you to do with peace? Rein in behind me.” '
  '2':
  - type: text
    content: 'When you arrive there, look for Jehu the son of Jehoshaphat the son of Nimshi, and go in and have him arise from among his brothers, and take him into an inner room. '
  '20':
  - type: text
    content: And the watchman reported, “He approached them, but he has not returned; and the driving [of the chariot] is like that of Jehu the son of Nimshi, for he drives furiously.”
  '21':
  - type: text
    content: 'Then '
  - type: note
    content: Heb Jehoram and through v 24.
  - type: text
    content: 'Joram said, “Harness [the chariot].” When they harnessed his chariot '
  - type: text
    content: horses
  - type: text
    content: ', Joram king of Israel and Ahaziah king of Judah went out, each in his chariot, and they went out to meet Jehu and met him on the property of Naboth the Jezreelite. '
  '22':
  - type: text
    content: 'When Joram saw Jehu, he said, “Do you come in peace, Jehu?” And he answered, “What peace [can exist] as long as the fornications of your mother Jezebel and her sorceries are so many?” '
  '23':
  - type: text
    content: 'So Joram reined [his chariot] around and fled, and he said to Ahaziah, “Treachery '
  - type: text
    content: and
  - type: text
    content: ' betrayal, Ahaziah!” '
  '24':
  - type: text
    content: 'But Jehu drew his bow with his full strength and shot Joram between his shoulders; and the arrow went out through his heart and he sank down in his chariot. '
  '25':
  - type: text
    content: Then Jehu said to Bidkar his officer, “Pick him up and throw him on the property of the field of Naboth the Jezreelite; for I remember when you and I were riding together after his father Ahab, that the L
  - type: heading
    content: ord
  - type: text
    content: ' uttered this prophecy against him: '
  '26':
  - type: text
    content: ‘I certainly saw the blood of Naboth and the blood of his sons yesterday,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘and I will repay you on this property,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: . Now then, pick him up and throw him into the property [of Naboth], in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: .” [1 Kin 21:15-29]
  - type: heading
    content: Jehu Assassinates Ahaziah
  '27':
  - type: text
    content: 'When Ahaziah the king of Judah saw this, he fled by the way of the garden house. Jehu pursued him and said, “Shoot him too, [while he is] in the chariot.” '
  - type: text
    content: So they shot him
  - type: text
    content: ' at the ascent to Gur, which is by Ibleam. And Ahaziah fled to Megiddo and died there. '
  '28':
  - type: text
    content: Then his servants carried him in a chariot to Jerusalem and buried him in his grave with his fathers in the City of David.
  '29':
  - type: text
    content: In the eleventh year of Joram, the son of Ahab, Ahaziah became king over Judah.
  '3':
  - type: text
    content: Then take the flask of oil and pour it on his head and say, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ': “I have anointed you king over Israel.” ’ Then open the door and flee and do not delay.”'
  '30':
  - type: text
    content: 'So when Jehu came to Jezreel, Jezebel heard about it, and she painted her eyes and adorned her head and looked down from the [upper] window. '
  '31':
  - type: text
    content: 'As Jehu entered in at the gate, she said, “Is it well, '
  - type: note
    content: A sarcastic reference to Zimri who gained his throne by assassination, but ruled only seven days.
  - type: text
    content: 'Zimri, your master’s murderer?” [1 Kin 16:9, 10] '
  '32':
  - type: text
    content: Then Jehu raised his face toward the window and said, “Who is on my side? Who?” And two or three officials looked down at him.
  - type: heading
    content: Jezebel Is Killed
  '33':
  - type: text
    content: 'And he said, “Throw her down.” So they threw her down, and some of her blood spattered on the wall and on the horses, and he trampled her underfoot. '
  '34':
  - type: text
    content: 'When he came in, he ate and drank, and said, “See now to this cursed woman and bury her, for she is a king’s daughter.” '
  '35':
  - type: text
    content: 'They went to bury her, but they found nothing left of her except the skull and the feet and the palms of her hands. '
  '36':
  - type: text
    content: So they returned and told Jehu. Then he said, “This is the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', which He spoke through His servant Elijah the Tishbite, saying, ‘In the property of Jezreel the dogs shall eat the flesh of Jezebel. [1 Kin 21:23] '
  '37':
  - type: text
    content: The corpse of Jezebel will be like dung on the surface of the field in the property of Jezreel, so they cannot say, “This is Jezebel.” ’ ”
  '4':
  - type: text
    content: 'So the young man, the servant of the prophet, went to Ramoth-gilead. '
  '5':
  - type: text
    content: 'When he arrived, the captains of the army were sitting [outside]; and he said, “I have a message for you, O captain.” Jehu said, “To which one of us?” And he said, “For you, O captain.” '
  '6':
  - type: text
    content: So Jehu got up, and they went into the house. And he poured the oil on Jehu’s head and said to him, “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel: ‘I have anointed you king over the people of the L'
  - type: heading
    content: ord
  - type: text
    content: ', over Israel. '
  '7':
  - type: text
    content: You shall strike the house of Ahab your master, so that I may avenge the blood of My servants the prophets, and the blood of all the servants of the L
  - type: heading
    content: ord
  - type: text
    content: ', [who have died] at the hands of Jezebel. '
  '8':
  - type: text
    content: 'For the entire house of Ahab shall perish, and I will cut off from Ahab every male, both bond and free, in Israel. '
  '9':
  - type: text
    content: 'I will make the house of Ahab like the house of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah. [1 Kin 21:22] '
