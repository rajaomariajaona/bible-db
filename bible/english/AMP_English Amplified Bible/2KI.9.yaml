  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now Elisha the prophet called one of the sons of the prophets and said to him, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gird up your loins,
      - type: text
        text: ' a phrase often found in the Bible, is an urgent call to get ready for immediate action, or it may be a call to prepare for a coming action or event. The phrase is related to the type of clothing worn in ancient times. To keep from impeding the wearer during any vigorous activity, e.g. battle, exercise, strenuous work, etc., the loose ends of garments (tunics, cloaks, mantles, etc.) had to be gathered up and tucked into the girdle. The girdle was a band about six inches wide that had fasteners in front. It was worn around the loins (the midsection of the body between the lower ribs and the hips) and was normally made of leather. Expensive or embroidered girdles were also worn and were made of cotton, flax or silk. The girdle also served as a kind of pocket or pouch and was used to carry personal items such as a dagger, money or other necessary things. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gird up your mind
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gird up your heart
      - type: text
        text: ' are examples of variants of this phrase and call for mental or spiritual preparation for a coming challenge.'
    marker-yv: yv-n
  - type: text
    text: 'Gird up your loins (prepare for action), take this flask of oil in your hand and go to Ramoth-gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When you arrive there, look for Jehu the son of Jehoshaphat the son of Nimshi, and go in and have him arise from among his brothers, and take him into an inner room. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then take the flask of oil and pour it on his head and say, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': “I have anointed you king over Israel.” ’ Then open the door and flee and do not delay.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So the young man, the servant of the prophet, went to Ramoth-gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When he arrived, the captains of the army were sitting [outside]; and he said, “I have a message for you, O captain.” Jehu said, “To which one of us?” And he said, “For you, O captain.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Jehu got up, and they went into the house. And he poured the oil on Jehu’s head and said to him, “Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel: ‘I have anointed you king over the people of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', over Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You shall strike the house of Ahab your master, so that I may avenge the blood of My servants the prophets, and the blood of all the servants of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', [who have died] at the hands of Jezebel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the entire house of Ahab shall perish, and I will cut off from Ahab every male, both bond and free, in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will make the house of Ahab like the house of Jeroboam the son of Nebat, and like the house of Baasha the son of Ahijah. [1 Kin 21:22] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And the dogs will eat Jezebel in the territory of Jezreel, and there will be no one to bury her.’ ” Then he opened the door and fled. [2 Kin 9:33-37]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When Jehu came out to the servants of his master, one said to him, “Is all well? Why did this madman come to you?” And he said to them, “You know [very well] the man and his talk.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And they said, “It is a lie; tell us now.” And he said, “Thus and thus he spoke to me, saying, ‘Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ': “I have anointed you king over Israel.” ’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they hurried and each man took his garment and placed it [as a cushion] under Jehu on the top of the [outside] stairs, and blew the trumpet, saying, “Jehu is king!”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehoram (Joram) Is Assassinated
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Jehu the son of Jehoshaphat, the son of Nimshi, conspired against Joram [to dethrone and kill him]. Now Joram with all Israel was protecting Ramoth-gilead against Hazael king of Aram (Syria), '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but King '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jehoram
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Joram had returned to Jezreel to heal from the wounds which the Arameans had inflicted on him when he fought with Hazael king of Aram. So Jehu said, “If this is your intent, let no one survive and leave the city (Ramoth-gilead) to go and tell '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the plan
  - type: text
    text: ' in Jezreel [the capital].” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Jehu rode in a chariot and went to Jezreel, for Joram was lying there. And Ahaziah king of Judah had come down to see Joram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now the watchman was standing on the tower in Jezreel and he saw the crowd with Jehu as he approached, and said, “I see a company.” And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jehoram
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Joram said, “Send a horseman to meet them and have him ask, ‘
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Peace?
      - type: text
        text: ' and so throughout the passage.'
    marker-yv: yv-n
  - type: text
    text: 'Do you come in peace?’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So the horseman went to meet him and said, “Thus says the king: ‘Do you come in peace?’ ” And Jehu said, “What have you to do with peace? Rein in behind me.” And the watchman reported, “The messenger approached them, but he has not returned.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then Joram sent out a second horseman, who approached them and said, “Thus says the king: ‘Do you come in peace?’ ” Jehu replied, “What have you to do with peace? Rein in behind me.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And the watchman reported, “He approached them, but he has not returned; and the driving [of the chariot] is like that of Jehu the son of Nimshi, for he drives furiously.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jehoram
      - type: text
        text: ' and through v 24.'
    marker-yv: yv-n
  - type: text
    text: 'Joram said, “Harness [the chariot].” When they harnessed his chariot '
  - type: usfm
    marker: it
    children:
    - type: text
      text: horses
  - type: text
    text: ', Joram king of Israel and Ahaziah king of Judah went out, each in his chariot, and they went out to meet Jehu and met him on the property of Naboth the Jezreelite. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When Joram saw Jehu, he said, “Do you come in peace, Jehu?” And he answered, “What peace [can exist] as long as the fornications of your mother Jezebel and her sorceries are so many?” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So Joram reined [his chariot] around and fled, and he said to Ahaziah, “Treachery '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' betrayal, Ahaziah!” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But Jehu drew his bow with his full strength and shot Joram between his shoulders; and the arrow went out through his heart and he sank down in his chariot. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Jehu said to Bidkar his officer, “Pick him up and throw him on the property of the field of Naboth the Jezreelite; for I remember when you and I were riding together after his father Ahab, that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' uttered this prophecy against him: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ‘I certainly saw the blood of Naboth and the blood of his sons yesterday,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘and I will repay you on this property,’ says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . Now then, pick him up and throw him into the property [of Naboth], in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .” [1 Kin 21:15-29]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jehu Assassinates Ahaziah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When Ahaziah the king of Judah saw this, he fled by the way of the garden house. Jehu pursued him and said, “Shoot him too, [while he is] in the chariot.” '
  - type: usfm
    marker: it
    children:
    - type: text
      text: So they shot him
  - type: text
    text: ' at the ascent to Gur, which is by Ibleam. And Ahaziah fled to Megiddo and died there. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then his servants carried him in a chariot to Jerusalem and buried him in his grave with his fathers in the City of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: In the eleventh year of Joram, the son of Ahab, Ahaziah became king over Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So when Jehu came to Jezreel, Jezebel heard about it, and she painted her eyes and adorned her head and looked down from the [upper] window. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'As Jehu entered in at the gate, she said, “Is it well, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A sarcastic reference to Zimri who gained his throne by assassination, but ruled only seven days.
    marker-yv: yv-n
  - type: text
    text: 'Zimri, your master’s murderer?” [1 Kin 16:9, 10] '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then Jehu raised his face toward the window and said, “Who is on my side? Who?” And two or three officials looked down at him.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jezebel Is Killed
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he said, “Throw her down.” So they threw her down, and some of her blood spattered on the wall and on the horses, and he trampled her underfoot. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When he came in, he ate and drank, and said, “See now to this cursed woman and bury her, for she is a king’s daughter.” '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'They went to bury her, but they found nothing left of her except the skull and the feet and the palms of her hands. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: So they returned and told Jehu. Then he said, “This is the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', which He spoke through His servant Elijah the Tishbite, saying, ‘In the property of Jezreel the dogs shall eat the flesh of Jezebel. [1 Kin 21:23] '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: The corpse of Jezebel will be like dung on the surface of the field in the property of Jezreel, so they cannot say, “This is Jezebel.” ’ ”
