document_id: ZEC.5,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flying Scroll
  - type: text
    content: 'Again I looked up, and I saw a scroll flying '
  - type: text
    content: in the air!
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'I said to the angel who was speaking with me, “Where are they taking the ephah?” '
  '11':
  - type: text
    content: 'And he said to me, “To the land of Shinar (Babylon) to build a temple for her; and when it is prepared, '
  - type: note
    content: Perhaps symbolic of the removal of the sinful customs of the Israelites.
  - type: text
    content: she shall be set there on her own pedestal.”
  '2':
  - type: text
    content: 'And the angel said to me, “What do you see?” And I answered, “I see a '
  - type: note
    content: The measurements of the scroll, as a symbol of God’s judgment, are the same as the measurements of the Holy Place in the tabernacle in the wilderness.
  - type: text
    content: 'flying scroll; its length is twenty cubits (thirty feet) and its width is ten cubits (fifteen feet).” '
  '3':
  - type: text
    content: 'Then he said to me, “This is the curse that is going out over the face of the whole land; for everyone who steals will be cut off according to the writing on one side, and everyone who swears [oaths falsely] shall be cut off according to the writing on the other side. [Is 24:6; Mal 3:8, 9] '
  '4':
  - type: text
    content: I will send the curse out,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “and it will enter the house of the thief and the house of the one who swears falsely by My name; and it will spend the night in that house and consume it, both its timber and its stones.”'
  '5':
  - type: text
    content: 'Then the angel who was speaking with me came forward and said to me, “Now look up and see what this is going forth.” '
  '6':
  - type: text
    content: 'And I said, “What is it?” And he said, “This is the '
  - type: note
    content: The ephah (a bushel basket for collecting grain) that was used by farmers was approximately 1.05 bushels, but it would be much larger in this vision.
  - type: text
    content: 'ephah (grain basket) going forth. This,” he continued, “is their appearance throughout the land [Amos 8:5] '
  '7':
  - type: text
    content: '(and behold, a [round, flat] lead '
  - type: note
    content: The Hebrew word for the cover is also used for a talent weight. Metal ingots were cast in the form of a flat disk.
  - type: text
    content: 'cover was lifted up); and there sat a woman inside the ephah.” '
  '8':
  - type: text
    content: 'Then he said, “This is Wickedness (Godlessness)!” And he threw her back down into the middle of the ephah and threw the lead cover on its opening. '
  '9':
  - type: text
    content: 'Then I looked up, and there were two women coming out with the wind in their wings; and they had wings like the wings of a stork, and they lifted up the ephah between the earth and the heavens. '
