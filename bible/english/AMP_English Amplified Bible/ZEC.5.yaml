document_id: ZEC.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Flying Scroll
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Again I looked up, and I saw a scroll flying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the air!
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I said to the angel who was speaking with me, “Where are they taking the ephah?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And he said to me, “To the land of Shinar (Babylon) to build a temple for her; and when it is prepared, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps symbolic of the removal of the sinful customs of the Israelites.
      marker-yv: yv-n
    - type: text
      text: she shall be set there on her own pedestal.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the angel said to me, “What do you see?” And I answered, “I see a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The measurements of the scroll, as a symbol of God’s judgment, are the same as the measurements of the Holy Place in the tabernacle in the wilderness.
      marker-yv: yv-n
    - type: text
      text: 'flying scroll; its length is twenty cubits (thirty feet) and its width is ten cubits (fifteen feet).” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then he said to me, “This is the curse that is going out over the face of the whole land; for everyone who steals will be cut off according to the writing on one side, and everyone who swears [oaths falsely] shall be cut off according to the writing on the other side. [Is 24:6; Mal 3:8, 9] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will send the curse out,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “and it will enter the house of the thief and the house of the one who swears falsely by My name; and it will spend the night in that house and consume it, both its timber and its stones.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the angel who was speaking with me came forward and said to me, “Now look up and see what this is going forth.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I said, “What is it?” And he said, “This is the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ephah (a bushel basket for collecting grain) that was used by farmers was approximately 1.05 bushels, but it would be much larger in this vision.
      marker-yv: yv-n
    - type: text
      text: 'ephah (grain basket) going forth. This,” he continued, “is their appearance throughout the land [Amos 8:5] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '(and behold, a [round, flat] lead '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for the cover is also used for a talent weight. Metal ingots were cast in the form of a flat disk.
      marker-yv: yv-n
    - type: text
      text: 'cover was lifted up); and there sat a woman inside the ephah.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then he said, “This is Wickedness (Godlessness)!” And he threw her back down into the middle of the ephah and threw the lead cover on its opening. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I looked up, and there were two women coming out with the wind in their wings; and they had wings like the wings of a stork, and they lifted up the ephah between the earth and the heavens. '
