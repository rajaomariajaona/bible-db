      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These practices were mourning customs associated with paganism.
    marker-yv: yv-n
  - type: text
    text: 'you shall not cut yourselves nor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: make a baldness between your eyes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'shave your forehead for the sake of the dead, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: for you are a holy people [set apart] to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has chosen you out of all the peoples who are on the earth to be a people for His own possession.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “You shall not eat anything that is detestable [to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and forbidden by Him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These are the animals that you may eat: the ox, the sheep, the goat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'the deer, the gazelle, the roebuck, the wild goat, the ibex, the antelope and the mountain sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Among the animals, you may eat any animal that has the divided hoof [that is, a hoof] split into two parts [especially at its distal extremity] and that chews the cud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'However, you are not to eat any of these [animals] among those which chew the cud, or among those that divide the hoof in two: the camel, the hare and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A small, shy, furry animal '
      - type: usfm
        marker: it
        children:
        - type: text
          text: (Hyrax syriacus)
      - type: text
        text: ' found in the peninsula of the Sinai, northern Israel, and the region around the Dead Sea; KJV '
      - type: usfm
        marker: it
        children:
        - type: text
          text: coney
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'shaphan, for though they chew the cud, they do not split the hoof; they are unclean for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The swine, because it has a divided hoof but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: does
  - type: text
    text: ' not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: chew
  - type: text
    text: ' the cud; it is unclean for you. You shall not eat their meat nor touch their carcasses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Of all [creatures] that are in the waters, you may eat these: anything that has fins and scales you may eat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: but you may not eat anything that does not have fins and scales; it is unclean for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“You may eat any clean bird. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But these are the ones which you shall not eat: the eagle, the vulture, and the black buzzard, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and the red kite, the falcon, and the birds of prey '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: according to its kind,
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'of any variety, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and every raven of any variety, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and the ostrich, the owl, the seagull, the hawk of any variety, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'the little owl, the great owl, the long-eared owl, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the pelican, the carrion vulture, the cormorant, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'the stork, and the heron of any variety, and the hoopoe, and the bat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And all flying insects are unclean for you; they shall not be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You may eat any clean bird.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“You shall not eat anything that dies '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on its own
  - type: text
    text: . You may give it to the stranger (resident alien, foreigner) who is in your [city] gates, so that he may eat it, or you may sell it to a foreigner [since they are not under God’s law], but you are a people holy (set apart) to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. You shall not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may refer to an ancient Canaanite fertility rite, though another possibility is that it is an affront to the Creator to kill an animal with the substance that was intended to nourish it. In any case, the rabbis later extended the law to prohibit the consumption of boiled meat upon which a drop of milk had fallen, if the milk imparted any flavor to the meat. Subsequent Jewish law has forbidden the serving of meat and dairy products together.
    marker-yv: yv-n
  - type: text
    text: 'boil a young goat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a lamb in its mother’s milk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Every year you shall certainly tithe [a tenth] of all the yield of your seed which is produced by your field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This seems to refer to a communal meal which was part of worship, directed by the priests. Elsewhere, the tithe is designated for the priests in compensation for their services, and for the needy (Num 18:21; Deut 26:12).
    marker-yv: yv-n
  - type: text
    text: You shall eat the tithe (tenth) of your grain, your new wine, your oil, and the firstborn of your herd and your flock before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God in the place where He chooses to establish His Name (Presence), so that you may learn to fear [and worship] the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God [with awe-filled reverence and profound respect] always. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: If the place where the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses to set His Name (Presence) is a great distance from you and you are not able to carry '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your tithe,
  - type: text
    text: ' because the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has blessed you [with such an abundance], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'then you shall exchange '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your tithe
  - type: text
    text: ' for money, and take the money in your hand and go to the place [of worship] which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'You may spend the money for '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: whatever your soul desires
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'anything your heart desires: for oxen, or sheep, or wine, or [other] strong drink, or '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: whatever your soul desires
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: anything else you want. You shall eat there in the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and rejoice, you and your household. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Also you shall not neglect the Levite who is within your [city] gates, for he does not have a share [of land] or an inheritance among you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“At the end of every third year you shall bring out all the tithe of your produce for that year, and shall store it up within your [city] gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The Levite, because he has no share [of land] or an inheritance among you, and the stranger, and the orphan and the widow who are within your [city] gates, shall come and eat and be satisfied, so that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God may bless you in all the work of your hands.'
