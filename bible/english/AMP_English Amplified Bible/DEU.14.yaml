  '11':
  - type: text
    content: '“You may eat any clean bird. '
  '12':
  - type: text
    content: 'But these are the ones which you shall not eat: the eagle, the vulture, and the black buzzard, '
  '13':
  - type: text
    content: 'and the red kite, the falcon, and the birds of prey '
  - type: note
    content: Lit according to its kind, and so throughout.
  - type: text
    content: 'of any variety, '
  '14':
  - type: text
    content: 'and every raven of any variety, '
  '15':
  - type: text
    content: 'and the ostrich, the owl, the seagull, the hawk of any variety, '
  '16':
  - type: text
    content: 'the little owl, the great owl, the long-eared owl, '
  '17':
  - type: text
    content: 'the pelican, the carrion vulture, the cormorant, '
  '18':
  - type: text
    content: 'the stork, and the heron of any variety, and the hoopoe, and the bat. '
  '19':
  - type: text
    content: 'And all flying insects are unclean for you; they shall not be eaten. '
  '2':
  - type: text
    content: for you are a holy people [set apart] to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God; and the L'
  - type: heading
    content: ord
  - type: text
    content: ' has chosen you out of all the peoples who are on the earth to be a people for His own possession.'
  '20':
  - type: text
    content: You may eat any clean bird.
  '21':
  - type: text
    content: '“You shall not eat anything that dies '
  - type: text
    content: on its own
  - type: text
    content: . You may give it to the stranger (resident alien, foreigner) who is in your [city] gates, so that he may eat it, or you may sell it to a foreigner [since they are not under God’s law], but you are a people holy (set apart) to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. You shall not '
  - type: note
    content: This may refer to an ancient Canaanite fertility rite, though another possibility is that it is an affront to the Creator to kill an animal with the substance that was intended to nourish it. In any case, the rabbis later extended the law to prohibit the consumption of boiled meat upon which a drop of milk had fallen, if the milk imparted any flavor to the meat. Subsequent Jewish law has forbidden the serving of meat and dairy products together.
  - type: text
    content: 'boil a young goat '
  - type: text
    content: or
  - type: text
    content: ' a lamb in its mother’s milk.'
  '22':
  - type: text
    content: '“Every year you shall certainly tithe [a tenth] of all the yield of your seed which is produced by your field. '
  '23':
  - type: note
    content: This seems to refer to a communal meal which was part of worship, directed by the priests. Elsewhere, the tithe is designated for the priests in compensation for their services, and for the needy (Num 18:21; Deut 26:12).
  - type: text
    content: You shall eat the tithe (tenth) of your grain, your new wine, your oil, and the firstborn of your herd and your flock before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God in the place where He chooses to establish His Name (Presence), so that you may learn to fear [and worship] the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God [with awe-filled reverence and profound respect] always. '
  '24':
  - type: text
    content: If the place where the L
  - type: heading
    content: ord
  - type: text
    content: ' your God chooses to set His Name (Presence) is a great distance from you and you are not able to carry '
  - type: text
    content: your tithe,
  - type: text
    content: ' because the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God has blessed you [with such an abundance], '
  '25':
  - type: text
    content: 'then you shall exchange '
  - type: text
    content: your tithe
  - type: text
    content: ' for money, and take the money in your hand and go to the place [of worship] which the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God chooses. '
  '26':
  - type: text
    content: 'You may spend the money for '
  - type: note
    content: Lit whatever your soul desires.
  - type: text
    content: 'anything your heart desires: for oxen, or sheep, or wine, or [other] strong drink, or '
  - type: note
    content: Lit whatever your soul desires.
  - type: text
    content: anything else you want. You shall eat there in the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God and rejoice, you and your household. '
  '27':
  - type: text
    content: Also you shall not neglect the Levite who is within your [city] gates, for he does not have a share [of land] or an inheritance among you.
  '28':
  - type: text
    content: '“At the end of every third year you shall bring out all the tithe of your produce for that year, and shall store it up within your [city] gates. '
  '29':
  - type: text
    content: The Levite, because he has no share [of land] or an inheritance among you, and the stranger, and the orphan and the widow who are within your [city] gates, shall come and eat and be satisfied, so that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God may bless you in all the work of your hands.'
  '3':
  - type: text
    content: “You shall not eat anything that is detestable [to the L
  - type: heading
    content: ord
  - type: text
    content: ' and forbidden by Him]. '
  '4':
  - type: text
    content: 'These are the animals that you may eat: the ox, the sheep, the goat, '
  '5':
  - type: text
    content: 'the deer, the gazelle, the roebuck, the wild goat, the ibex, the antelope and the mountain sheep. '
  '6':
  - type: text
    content: 'Among the animals, you may eat any animal that has the divided hoof [that is, a hoof] split into two parts [especially at its distal extremity] and that chews the cud. '
  '7':
  - type: text
    content: 'However, you are not to eat any of these [animals] among those which chew the cud, or among those that divide the hoof in two: the camel, the hare and the '
  - type: note
    content: A small, shy, furry animal (Hyrax syriacus) found in the peninsula of the Sinai, northern Israel, and the region around the Dead Sea; KJV coney.
  - type: text
    content: 'shaphan, for though they chew the cud, they do not split the hoof; they are unclean for you. '
  '8':
  - type: text
    content: 'The swine, because it has a divided hoof but '
  - type: text
    content: does
  - type: text
    content: ' not '
  - type: text
    content: chew
  - type: text
    content: ' the cud; it is unclean for you. You shall not eat their meat nor touch their carcasses.'
  '9':
  - type: text
    content: '“Of all [creatures] that are in the waters, you may eat these: anything that has fins and scales you may eat, '
