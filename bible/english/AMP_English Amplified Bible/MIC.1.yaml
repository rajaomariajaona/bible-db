document_id: MIC.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Destruction in Israel and Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' that came to Micah of Moresheth in the days of Jotham, Ahaz, and Hezekiah, kings of Judah, which he saw [through divine revelation] concerning Samaria and Jerusalem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear, O peoples, all of you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen closely, O earth and all that is in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' be witness [giving a testimony of the judgment] against you,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord from His holy temple [in the heavens]. [1 Kin 22:28]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For behold, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is coming down from His place'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shall come down and tread [in judgment] on the high places of the earth. [Zech 14:3, 4; Mal 4:2, 3; Matt 24:27-30; Rev 1:7; 19:11-16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The mountains shall melt under Him
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the valleys shall be split
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like wax before the fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like waters poured down a steep place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All this is because of the rebellion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' apostasy of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an alternate name for Israel. The capital city was Samaria.
    marker-yv: yv-n
  - type: text
    text: Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for the sins of the house of Israel (the Northern Kingdom).
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'What is the rebellion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' apostasy of Jacob?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is it not [the abandonment of God in order to worship the idols of] Samaria?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What are the high places [of idolatry] in Judah (the Southern Kingdom)?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are they not Jerusalem [the capital and center of corruption]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] shall make Samaria a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Omri king of Israel (the Northern Kingdom—the ten tribes) purchased the hill on which he built Samaria, his capital city, for two talents of silver. It served both as a center for the worship of idols and as the capital of Israel until it was captured by Sargon king of Assyria in 721 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . This victory marked the end of the kingdom of the ten tribes.
    marker-yv: yv-n
  - type: text
    text: heap of ruins [and of stones and arable land] in the open country,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A place for planting vineyards;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will pour her stones down into the ravine
- type: usfm
  marker: q1
  children:
  - type: text
    text: And lay bare her foundations. [2 Kin 19:25; Ezek 13:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All her idols shall be broken in pieces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All her earnings [from her idolatry] shall be burned with fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all her images I shall make desolate;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For from the earnings of a prostitute she collected them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to the earnings of a prostitute they shall return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶Because of this I [Micah] must lament (mourn over with expressions of grief) and wail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I must go barefoot and naked [without outer garments as if robbed];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I must wail like the jackals
- type: usfm
  marker: q1
  children:
  - type: text
    text: And lament [with a loud, mournful cry] like the ostriches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For Samaria’s wound is incurable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it has come to Judah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The enemy has reached the gate of my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even to Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Micah uses a play on words as he denounces the cities in vv 10-15.
    marker-yv: yv-n
  - type: text
    text: Announce it not in Gath [in Philistia],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep not at all [and in this way betray your grief to Gentiles];
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Beth-le-aphrah (House of Dust) roll in the dust [among your own people].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Go on your way [into exile—stripped of beauty, disarmed], inhabitants of Shaphir (Beautiful), in shameful nakedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The inhabitant of Zaanan (Go Out) does not go out [of the house];
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wailing of Beth-ezel (House of Removal) will take away from you its support.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For the inhabitant of Maroth (Bitterness)
- type: usfm
  marker: q1
  children:
  - type: text
    text: Writhes in pain [at its losses] and waits anxiously for good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because a catastrophe has come down from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the gate of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Harness the chariot to the team of horses [to escape the invasion],
- type: usfm
  marker: q1
  children:
  - type: text
    text: O inhabitant of Lachish—
- type: usfm
  marker: q1
  children:
  - type: text
    text: She was the beginning of sin
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the Daughter of Zion (Jerusalem)—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because in you were found
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rebellious acts of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore you will give parting gifts
- type: usfm
  marker: q1
  children:
  - type: text
    text: On behalf of Moresheth-gath (Micah’s home);
- type: usfm
  marker: q1
  children:
  - type: text
    text: The houses of Achzib (Place of Deceit) will become a deception
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the kings of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moreover, I will bring on you
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one who takes possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O inhabitant of Mareshah (Prominent Place).
- type: usfm
  marker: q1
  children:
  - type: text
    text: The glory (nobility) of Israel will enter Adullam [seeking refuge]. [1 Sam 22:1]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Make yourself bald [in mourning]—shave off your hair
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the children of your delight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remain as bald as the eagle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your children will be taken from you into exile.
