document_id: MIC.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Destruction in Israel and Judah
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' that came to Micah of Moresheth in the days of Jotham, Ahaz, and Hezekiah, kings of Judah, which he saw [through divine revelation] concerning Samaria and Jerusalem.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Micah uses a play on words as he denounces the cities in vv 10-15.
  - type: text
    content: Announce it not in Gath [in Philistia],
  - type: text
    content: Weep not at all [and in this way betray your grief to Gentiles];
  - type: text
    content: In Beth-le-aphrah (House of Dust) roll in the dust [among your own people].
  '11':
  - type: text
    content: Go on your way [into exile—stripped of beauty, disarmed], inhabitants of Shaphir (Beautiful), in shameful nakedness.
  - type: text
    content: The inhabitant of Zaanan (Go Out) does not go out [of the house];
  - type: text
    content: The wailing of Beth-ezel (House of Removal) will take away from you its support.
  '12':
  - type: text
    content: For the inhabitant of Maroth (Bitterness)
  - type: text
    content: Writhes in pain [at its losses] and waits anxiously for good,
  - type: text
    content: Because a catastrophe has come down from the L
  - type: heading
    content: ord
  - type: text
    content: To the gate of Jerusalem.
  '13':
  - type: text
    content: Harness the chariot to the team of horses [to escape the invasion],
  - type: text
    content: O inhabitant of Lachish—
  - type: text
    content: She was the beginning of sin
  - type: text
    content: To the Daughter of Zion (Jerusalem)—
  - type: text
    content: Because in you were found
  - type: text
    content: The rebellious acts of Israel.
  '14':
  - type: text
    content: Therefore you will give parting gifts
  - type: text
    content: On behalf of Moresheth-gath (Micah’s home);
  - type: text
    content: The houses of Achzib (Place of Deceit) will become a deception
  - type: text
    content: To the kings of Israel.
  '15':
  - type: text
    content: Moreover, I will bring on you
  - type: text
    content: The one who takes possession,
  - type: text
    content: O inhabitant of Mareshah (Prominent Place).
  - type: text
    content: The glory (nobility) of Israel will enter Adullam [seeking refuge]. [1 Sam 22:1]
  '16':
  - type: text
    content: Make yourself bald [in mourning]—shave off your hair
  - type: text
    content: For the children of your delight;
  - type: text
    content: Remain as bald as the eagle,
  - type: text
    content: For your children will be taken from you into exile.
  '2':
  - type: text
    content: Hear, O peoples, all of you;
  - type: text
    content: Listen closely, O earth and all that is in it,
  - type: text
    content: And let the Lord G
  - type: heading
    content: od
  - type: text
    content: ' be witness [giving a testimony of the judgment] against you,'
  - type: text
    content: The Lord from His holy temple [in the heavens]. [1 Kin 22:28]
  '3':
  - type: text
    content: For behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' is coming down from His place'
  - type: text
    content: He shall come down and tread [in judgment] on the high places of the earth. [Zech 14:3, 4; Mal 4:2, 3; Matt 24:27-30; Rev 1:7; 19:11-16]
  '4':
  - type: text
    content: The mountains shall melt under Him
  - type: text
    content: And the valleys shall be split
  - type: text
    content: Like wax before the fire,
  - type: text
    content: Like waters poured down a steep place.
  '5':
  - type: text
    content: 'All this is because of the rebellion '
  - type: text
    content: and
  - type: text
    content: ' apostasy of '
  - type: note
    content: I.e. an alternate name for Israel. The capital city was Samaria.
  - type: text
    content: Jacob
  - type: text
    content: And for the sins of the house of Israel (the Northern Kingdom).
  - type: text
    content: 'What is the rebellion '
  - type: text
    content: and
  - type: text
    content: ' apostasy of Jacob?'
  - type: text
    content: Is it not [the abandonment of God in order to worship the idols of] Samaria?
  - type: text
    content: What are the high places [of idolatry] in Judah (the Southern Kingdom)?
  - type: text
    content: Are they not Jerusalem [the capital and center of corruption]?
  '6':
  - type: text
    content: Therefore I [the L
  - type: heading
    content: ord
  - type: text
    content: '] shall make Samaria a '
  - type: note
    content: Omri king of Israel (the Northern Kingdom—the ten tribes) purchased the hill on which he built Samaria, his capital city, for two talents of silver. It served both as a center for the worship of idols and as the capital of Israel until it was captured by Sargon king of Assyria in 721 b.c. This victory marked the end of the kingdom of the ten tribes.
  - type: text
    content: heap of ruins [and of stones and arable land] in the open country,
  - type: text
    content: A place for planting vineyards;
  - type: text
    content: And I will pour her stones down into the ravine
  - type: text
    content: And lay bare her foundations. [2 Kin 19:25; Ezek 13:14]
  '7':
  - type: text
    content: All her idols shall be broken in pieces,
  - type: text
    content: All her earnings [from her idolatry] shall be burned with fire,
  - type: text
    content: And all her images I shall make desolate;
  - type: text
    content: For from the earnings of a prostitute she collected them,
  - type: text
    content: And to the earnings of a prostitute they shall return.
  '8':
  - type: text
    content: ¶Because of this I [Micah] must lament (mourn over with expressions of grief) and wail,
  - type: text
    content: I must go barefoot and naked [without outer garments as if robbed];
  - type: text
    content: I must wail like the jackals
  - type: text
    content: And lament [with a loud, mournful cry] like the ostriches.
  '9':
  - type: text
    content: For Samaria’s wound is incurable,
  - type: text
    content: For it has come to Judah;
  - type: text
    content: The enemy has reached the gate of my people,
  - type: text
    content: Even to Jerusalem.
