document_id: PRO.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: On Life and Conduct
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Wine is a mocker, strong drink a riotous brawler;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whoever is intoxicated by it is not wise. [Prov 23:29, 30; Is 28:7; Hos 4:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The terror of a king is like the roaring of a lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whoever provokes him to anger forfeits his own life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It is an honor for a man to keep away from strife [by handling situations with thoughtful foresight],
- type: usfm
  marker: q1
  children:
  - type: text
    text: But any fool will [start a] quarrel [without regard for the consequences].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The lazy man does not plow when the winter [planting] season arrives;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he begs at the [next] harvest and has nothing [to reap].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A plan (motive, wise counsel) in the heart of a man is like water in a deep well,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a man of understanding draws it out. [Prov 18:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Many a man proclaims his own loyalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' goodness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But who can find a faithful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' trustworthy man?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The righteous man who walks in integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lives life in accord with his [godly] beliefs—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: How blessed [happy and spiritually secure] are his children after him [who have his example to follow].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A [discerning] king who sits on the throne of judgment
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sifts all evil [like chaff] with his eyes [and cannot be easily fooled].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who can say, “I have cleansed my heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am pure from my sin?” [1 Kin 8:46; 2 Chr 6:36; Job 9:30; 14:4; Ps 51:5; 1 John 1:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Differing weights [one for buying and another for selling] and differing measures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Both of them are detestable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offensive to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Deut 25:13; Mic 6:10, 11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Even a boy is known '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' distinguished by his acts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whether his conduct is pure and right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The hearing ear and the seeing eye,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The [omnipotent] L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has made both of them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Do not love [excessive] sleep, or you will become poor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Open your eyes [so that you can do your work] and you will be satisfied with bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “It is [almost] worthless, it is [almost] worthless,” says the buyer [as he negotiates the price];
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when he goes his way, then he boasts [about his bargain].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There is gold, and an abundance of pearls,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the lips of knowledge are a vessel of preciousness [the most precious of all]. [Job 28:12, 16-19; Prov 3:15; 8:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '[The judge tells the creditor], “Take the clothes of one who is surety for a stranger;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hold him in pledge [when he guarantees a loan] for foreigners.” [Prov 27:13]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Food gained by deceit is sweet to a man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But afterward his mouth will be filled with gravel [just as sin may be sweet at first, but later its consequences bring despair].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Plans are established by counsel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So make war [only] with wise guidance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He who goes about as a gossip reveals secrets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore do not associate with a gossip [who talks freely or flatters]. [Rom 16:17, 18]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Whoever curses his father or his mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His lamp [of life] will be extinguished in time of darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: An inheritance hastily gained [by greedy, unjust means] at the beginning
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will not be blessed in the end. [Prov 28:20; Hab 2:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do not say, “I will repay evil”;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wait [expectantly] for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and He will rescue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' save you. [Deut 32:35; 2 Sam 16:12; Rom 12:17-19; 1 Thess 5:15; 1 Pet 3:9]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Differing weights are detestable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' offensive to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fraudulent scales are not good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Man’s steps are ordered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ordained by the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: How then can a man [fully] understand his way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: It is a trap for a man to [
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Such a vow would single out an item for sacrifice or for the use of the temple or the priests. The classic example of a careless vow was Jephthah’s promise to sacrifice to the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' whatever came out of his house to meet him on his return from a successful battle (Judg 11:30-35).'
    marker-yv: yv-n
  - type: text
    text: speak a vow of consecration and] say rashly, “It is holy!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [not until] afterward consider [whether he can fulfill it].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A wise king sifts out the wicked [from among the good]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And drives the [threshing] wheel over them [to separate the chaff from the grain].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: breath
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: spirit (conscience) of man is the lamp of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Searching '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' examining all the innermost parts of his being. [1 Cor 2:11]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Loyalty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mercy, truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness, protect the king,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he upholds his throne by lovingkindness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The glory of young men is their [physical] strength,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the honor of aged men is their gray head [representing wisdom and experience].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Blows that wound cleanse away evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And strokes reach to the innermost parts.
