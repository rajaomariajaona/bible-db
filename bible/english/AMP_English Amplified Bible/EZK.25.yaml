      children:
      - type: text
        text: od
    - type: text
      text: ', for thus says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Because you said, ‘Aha!’ against My sanctuary when it was profaned and against the land of Israel when it was made desolate and against the house of Judah when they went into exile, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, behold, I am going to give you to the people of the East as a possession, and they will set their encampments among you and make their dwellings among you; they will eat your fruit and drink your milk. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make Rabbah [your chief city] a pasture for camels and [the cities of] the Ammonites a resting place for flocks [of sheep]. And you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “Because you have clapped your hands and stamped your feet and rejoiced with all the contempt, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' malice, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spite of your soul against the land of Israel, '
  '7':
  - type: usfm
