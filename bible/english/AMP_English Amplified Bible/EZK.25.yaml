      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name of this coastal people was derived from Philistia, the country bordering the Mediterranean where they settled. It is believed that they were originally from the island of Crete, home of the Minoan civilization.
      marker-yv: yv-n
    - type: text
      text: 'Philistines have acted revengefully and have taken vengeance [contemptuously] with malice in their hearts to destroy with everlasting hostility '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hatred,” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: therefore thus says the Lord G
    - type: usfm
      marker: sc
      children:
