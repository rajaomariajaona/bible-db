          text: These people were descendants of Lot and his elder surviving daughter. In general, they were far more civilized and peaceful than the Ammonites.
      marker-yv: yv-n
    - type: text
      text: 'Moab and Seir (Edom) say, ‘Behold, the house of Judah is like all the [pagan] nations,’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, behold, I will deprive the flank of Moab of its cities which are on its frontiers, the glory of the land, Beth-jeshimoth, Baal-meon and Kiriathaim. '
