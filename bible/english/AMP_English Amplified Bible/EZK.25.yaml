    - type: text
      text: ' when I lay My vengeance on them.” ’ ” [Is 14:29-31; Jer 47; Amos 1:6-8; Zeph 2:4-7; Zech 9:5-7]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, set your face toward the '
    - type: usfm
