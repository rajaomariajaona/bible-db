        marker: fr
        children:
        - type: text
          text: '25:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A nomadic, hostile people descended from Lot and his younger surviving daughter. They worshiped Molech.
      marker-yv: yv-n
    - type: text
      text: 'Ammonites and prophesy against them. '
  '3':
  - type: usfm
    marker: p
    children:
