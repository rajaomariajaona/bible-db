      text: 'Edom has acted against the house of Judah by taking vengeance, and has greatly offended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has incurred grievous guilt by taking revenge on them,” '
  '13':
