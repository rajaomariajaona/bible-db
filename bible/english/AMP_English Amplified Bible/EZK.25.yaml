      - type: usfm
        marker: ft
        children:
        - type: text
          text: These people were descendants of Esau (later called Edom), the elder twin brother of Jacob (later called Israel). They settled south of the Dead Sea, southwest of Moab and east of Arabah.
      marker-yv: yv-n
