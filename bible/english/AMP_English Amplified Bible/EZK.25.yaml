          text: '25:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably another name for the Philistines, or a reference to another closely related group from Crete also living in Philistia.
      marker-yv: yv-n
    - type: text
      text: 'Cherethites and destroy the remnant of the seacoast. '
  '17':
