  - type: text
    content: kinds of
  - type: text
    content: ' visions and dreams. [Luke 21:15; James 1:5-7]'
  '18':
  - type: text
    content: 'At the end of the time set by the king to bring all the young men in [before him], the commander of the officials presented them to Nebuchadnezzar. '
  '19':
  - type: text
    content: 'The king spoke with them, and among them all not one was found like Daniel, Hananiah, Mishael, and Azariah; so they were [selected and] assigned to stand before the king '
  - type: text
    content: and
  - type: text
    content: ' enter his personal service. '
  '2':
  - type: text
    content: 'The Lord gave Jehoiakim king of Judah into his hand, along with some of the articles of the house of God; and he brought them into the land of '
  - type: note
    content: I.e. southern Babylonia.
  - type: text
    content: Shinar, to the house of his god, and brought the articles into the treasury of his god. [2 Chr 36:5-7; Jer 27:19, 20; Dan 5:1-3]
  '20':
  - type: text
    content: 'In every matter of wisdom and understanding about which the king consulted them, he found them ten times better than all the [learned] magicians and enchanters (Magi) in his whole realm. '
  '21':
  - type: text
    content: 'And Daniel remained there until the '
  - type: note
    content: Cyrus the Great, founder of the Persian Empire, ruled from 559-529 b.c. He conquered the Median (549 b.c.), the Lydian (546 b.c.), and the Neo-Babylonian (539 b.c.) kingdoms and formed the greatest empire the world had ever known. He returned a remnant of the Jewish population from Babylon to Jerusalem along with an edict to rebuild the temple.
  - type: text
    content: first year of [the reign of] King Cyrus [over Babylon; now this was at the end of the seventy-year exile of Judah (the Southern Kingdom) in Babylonia, as foretold by Jeremiah]. [Ezra 1:1-3; Jer 25:11, 12; 29:10]
  '3':
  - type: text
    content: 'And the [Babylonian] king told Ashpenaz, the chief of his '
  - type: note
