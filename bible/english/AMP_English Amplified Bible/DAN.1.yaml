  - type: heading
    content: The Choice Young Men
  - type: text
    content: 'In the third year of the reign of '
  - type: note
    content: Pharaoh Neco had killed Josiah king of Judah and installed Eliakim (Josiah’s son) as a vassal ruler. Neco changed Eliakim’s name to Jehoiakim and he ruled for eleven years (2 Chr 36:4, 5).
  - type: text
    content: 'Jehoiakim king of Judah, '
  - type: note
    content: Nebuchadnezzar II of the Chaldean Dynasty, more commonly known as Nebuchadnezzar the Great, ruled Babylon from 605-562 b.c. He conquered Jerusalem in 597 b.c.
  - type: text
    content: 'Nebuchadnezzar king of Babylon came to Jerusalem and besieged it. '
  '10':
  - type: text
    content: 'and the commander of the officials said to Daniel, “I am afraid of my lord the king, who has prearranged your food and your drink; for why should he see your faces looking more haggard than the young men who are your own age? Then you would make me forfeit my head to the king.” '
  '11':
  - type: text
    content: 'But Daniel said to the overseer whom the commander of the officials had appointed over Daniel, Hananiah, Mishael, and Azariah, '
  '12':
  - type: text
    content: '“Please, test your servants for ten days, and let us be given some vegetables to eat and water to drink. '
  '13':
  - type: text
    content: 'Then let our appearance and the appearance of the young men who eat the king’s finest food be observed '
  - type: text
    content: and
  - type: text
    content: ' compared by you, and deal with your servants in accordance with what you see.”'
  '14':
  - type: text
    content: 'So the man listened to them in this matter and tested them for ten days. '
  '15':
  - type: text
    content: 'At the end of ten days it seemed that they were looking better and '
  - type: note
    content: Lit fat of flesh.
  - type: text
    content: 'healthier than all the young men who ate the king’s finest food. '
  '16':
  - type: text
    content: So the overseer continued to withhold their fine food and the wine they were to drink, and kept giving them vegetables.
  '17':
  - type: text
    content: 'As for these four young men, God gave them knowledge and skill in all '
  - type: text
