    content: 'young men without blemish and handsome in appearance, skillful in all wisdom, endowed with intelligence '
  - type: text
    content: and
  - type: text
    content: ' discernment, and quick to understand, competent to stand [in the presence of the king] '
  - type: text
    content: and
  - type: text
    content: ' able to serve in the king’s palace. He also '
  - type: text
    content: ordered Ashpenaz
  - type: text
    content: ' to teach them the literature and language of the '
  - type: note
    content: The Chaldeans dominated and ruled Babylonia from 625 b.c. until their empire fell in 539 b.c., but they were known as early as 1000 b.c. as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian increasingly influenced by Aramaic.
  - type: text
    content: 'Chaldeans. '
  '5':
  - type: text
    content: 'The king assigned a daily ration for them from his finest food and from the wine which he drank. They were to be educated '
  - type: text
    content: and
  - type: text
    content: ' nourished this way for three years so that at the end of that time they were [prepared] to enter the king’s service. '
