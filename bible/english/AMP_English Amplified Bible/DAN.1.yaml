    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Choice Young Men
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the third year of the reign of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pharaoh Neco had killed Josiah king of Judah and installed Eliakim (Josiah’s son) as a vassal ruler. Neco changed Eliakim’s name to Jehoiakim and he ruled for eleven years (2 Chr 36:4, 5).
      marker-yv: yv-n
    - type: text
      text: 'Jehoiakim king of Judah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nebuchadnezzar II of the Chaldean Dynasty, more commonly known as Nebuchadnezzar the Great, ruled Babylon from 605-562 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. He conquered Jerusalem in 597 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar king of Babylon came to Jerusalem and besieged it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and the commander of the officials said to Daniel, “I am afraid of my lord the king, who has prearranged your food and your drink; for why should he see your faces looking more haggard than the young men who are your own age? Then you would make me forfeit my head to the king.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But Daniel said to the overseer whom the commander of the officials had appointed over Daniel, Hananiah, Mishael, and Azariah, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Please, test your servants for ten days, and let us be given some vegetables to eat and water to drink. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then let our appearance and the appearance of the young men who eat the king’s finest food be observed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compared by you, and deal with your servants in accordance with what you see.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So the man listened to them in this matter and tested them for ten days. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'At the end of ten days it seemed that they were looking better and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: fat of flesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'healthier than all the young men who ate the king’s finest food. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So the overseer continued to withhold their fine food and the wine they were to drink, and kept giving them vegetables.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As for these four young men, God gave them knowledge and skill in all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds of
    - type: text
      text: ' literature and wisdom; Daniel also understood all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kinds of
    - type: text
      text: ' visions and dreams. [Luke 21:15; James 1:5-7]'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'At the end of the time set by the king to bring all the young men in [before him], the commander of the officials presented them to Nebuchadnezzar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The king spoke with them, and among them all not one was found like Daniel, Hananiah, Mishael, and Azariah; so they were [selected and] assigned to stand before the king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enter his personal service. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The Lord gave Jehoiakim king of Judah into his hand, along with some of the articles of the house of God; and he brought them into the land of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. southern Babylonia.
      marker-yv: yv-n
    - type: text
      text: Shinar, to the house of his god, and brought the articles into the treasury of his god. [2 Chr 36:5-7; Jer 27:19, 20; Dan 5:1-3]
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In every matter of wisdom and understanding about which the king consulted them, he found them ten times better than all the [learned] magicians and enchanters (Magi) in his whole realm. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And Daniel remained there until the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cyrus the Great, founder of the Persian Empire, ruled from 559-529 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. He conquered the Median (549 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '.), the Lydian (546 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '.), and the Neo-Babylonian (539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .) kingdoms and formed the greatest empire the world had ever known. He returned a remnant of the Jewish population from Babylon to Jerusalem along with an edict to rebuild the temple.
      marker-yv: yv-n
    - type: text
      text: first year of [the reign of] King Cyrus [over Babylon; now this was at the end of the seventy-year exile of Judah (the Southern Kingdom) in Babylonia, as foretold by Jeremiah]. [Ezra 1:1-3; Jer 25:11, 12; 29:10]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And the [Babylonian] king told Ashpenaz, the chief of his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: eunuchs,
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'officials, to bring in some of the sons of Israel, including some from the royal family and from the nobles, [2 Kin 20:17, 18] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'young men without blemish and handsome in appearance, skillful in all wisdom, endowed with intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discernment, and quick to understand, competent to stand [in the presence of the king] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' able to serve in the king’s palace. He also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ordered Ashpenaz
    - type: text
      text: ' to teach them the literature and language of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Chaldeans dominated and ruled Babylonia from 625 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. until their empire fell in 539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '., but they were known as early as 1000 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian increasingly influenced by Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'Chaldeans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The king assigned a daily ration for them from his finest food and from the wine which he drank. They were to be educated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nourished this way for three years so that at the end of that time they were [prepared] to enter the king’s service. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Among them from the sons of Judah were: Daniel, Hananiah, Mishael, and Azariah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The commander of the officials gave them [Babylonian] names: Daniel he named Belteshazzar, Hananiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he named
    - type: text
      text: ' Shadrach, Mishael '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he named
    - type: text
      text: ' Meshach, and Azariah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he named
    - type: text
      text: ' Abed-nego.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel’s Resolve
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But Daniel made up his mind that he would not defile (taint, dishonor) himself with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The first portions of the food and wine would have been presented to idols before being served at the table.
      marker-yv: yv-n
    - type: text
      text: 'king’s finest food or with the wine which the king drank; so he asked the commander of the officials that he might [be excused so that he would] not defile himself. [Num 6:1-4; 1 Cor 10:21] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now God granted Daniel favor and compassion in the sight of the commander of the officials, '
