verses:
  '1':
  - type: heading
    content: Job Feels Insulted
  - type: text
    content: Then Job answered and said,
  '10':
  - type: text
    content: “He breaks me down on every side, and I am gone;
  - type: text
    content: He has uprooted my hope like a tree.
  '11':
  - type: text
    content: “He has also kindled His wrath [like a fire] against me
  - type: text
    content: 'And He considers '
  - type: text
    content: and
  - type: text
    content: ' counts me as one of His adversaries.'
  '12':
  - type: text
    content: “His troops come together
  - type: text
    content: 'And build up their way '
  - type: text
    content: and
  - type: text
    content: ' siege works against me'
  - type: text
    content: And camp around my tent.
  '13':
  - type: text
    content: ¶“He has put my brothers far from me,
  - type: text
    content: And my acquaintances are completely estranged from me.
  '14':
  - type: text
    content: “My relatives have failed [me],
  - type: text
    content: And my intimate friends have forgotten me.
  '15':
  - type: text
    content: “Those who live [temporarily] in my house and my maids consider me a stranger;
  - type: text
    content: I am a foreigner in their sight.
  '16':
  - type: text
    content: “I call to my servant, but he does not answer;
  - type: text
    content: I have to implore him with words.
  '17':
  - type: text
    content: “My breath is repulsive to my wife,
  - type: text
    content: And I am loathsome to my own brothers.
  '18':
  - type: text
    content: “Even young children despise me;
  - type: text
    content: When I get up, they speak against me.
  '19':
  - type: text
    content: “All the men of my council hate me;
  - type: text
    content: Those I love have turned against me.
  '2':
  - type: text
    content: '“How long will you torment '
  - type: text
    content: and
  - type: text
    content: ' exasperate me'
  - type: text
    content: And crush me with words?
  '20':
  - type: text
    content: “My bone clings to my skin and to my flesh,
  - type: text
    content: And I have escaped [death] by the skin of my teeth.
  '21':
  - type: text
    content: “Have pity on me! Have pity on me, O you my friends,
  - type: text
    content: For the hand of God has touched me.
  '22':
  - type: text
    content: '“Why do you persecute me as God '
  - type: text
    content: does?
  - type: text
    content: Why are you not satisfied with my flesh (anguish)?
  - type: heading
    content: Job Says, “My Redeemer Lives”
  '23':
  - type: text
    content: ¶“Oh, that the words I now speak were written!
  - type: text
    content: Oh, that they were recorded in a scroll!
  '24':
  - type: text
    content: “That with an iron stylus and [molten] lead
  - type: text
    content: They were engraved in the rock forever!
  '25':
  - type: text
    content: '“For I know that my Redeemer '
  - type: text
    content: and
  - type: text
    content: ' Vindicator lives,'
  - type: text
    content: And at the last He will take His stand upon the earth. [Is 44:6; 48:12]
  '26':
  - type: text
    content: “Even after my [mortal] skin is destroyed [by death],
  - type: text
    content: Yet from my [immortal] flesh I will see God,
  '27':
  - type: text
    content: Whom I, even I, will see for myself,
  - type: text
    content: And my eyes will see Him and not another!
  - type: text
    content: My heart faints within me.
  '28':
  - type: text
    content: “If you say, ‘How shall we [continue to] persecute him?’
  - type: text
    content: And ‘What pretext for a case against him can we find [since we claim the root of these afflictions is found in him]?’
  '29':
  - type: text
    content: “
  - type: text
    content: Then
  - type: text
    content: ' beware '
  - type: text
    content: and
  - type: text
    content: ' be afraid of the sword [of divine vengeance] for yourselves,'
  - type: text
    content: For wrathful are the punishments of that sword,
  - type: text
    content: So that you may know there is judgment.”
  '3':
  - type: text
    content: “These ten times you have insulted me;
  - type: text
    content: You are not ashamed to wrong me [and harden your hearts against me].
  '4':
  - type: text
    content: “And if it were true that I have erred,
  - type: text
    content: My error would remain with me [and I would be conscious of it].
  '5':
  - type: text
    content: '“If indeed you [braggarts] vaunt '
  - type: text
    content: and
  - type: text
    content: ' magnify yourselves over me'
  - type: text
    content: And prove my disgrace (humiliation) to me,
  '6':
  - type: text
    content: 'Know then that God has wronged me '
  - type: text
    content: and
  - type: text
    content: ' overthrown me'
  - type: text
    content: And has closed His net around me.
  - type: heading
    content: Everything Is Against Him
  '7':
  - type: text
    content: ¶“Behold, I cry out, ‘Violence!’ but I am not heard;
  - type: text
    content: I shout for help, but there is no justice.
  '8':
  - type: text
    content: “He has walled up my way so that I cannot pass,
  - type: text
    content: And He has set darkness upon my paths.
  '9':
  - type: text
    content: “He has stripped me of my honor
  - type: text
    content: And removed the crown from my head.
