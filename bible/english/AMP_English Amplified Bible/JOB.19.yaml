document_id: JOB.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Feels Insulted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Job answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“How long will you torment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exasperate me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And crush me with words?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “These ten times you have insulted me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are not ashamed to wrong me [and harden your hearts against me].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “And if it were true that I have erred,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My error would remain with me [and I would be conscious of it].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“If indeed you [braggarts] vaunt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnify yourselves over me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And prove my disgrace (humiliation) to me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Know then that God has wronged me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overthrown me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And has closed His net around me.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Everything Is Against Him
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Behold, I cry out, ‘Violence!’ but I am not heard;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shout for help, but there is no justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “He has walled up my way so that I cannot pass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He has set darkness upon my paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “He has stripped me of my honor
- type: usfm
  marker: q1
  children:
  - type: text
    text: And removed the crown from my head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “He breaks me down on every side, and I am gone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has uprooted my hope like a tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “He has also kindled His wrath [like a fire] against me
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And He considers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counts me as one of His adversaries.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “His troops come together
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And build up their way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' siege works against me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And camp around my tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“He has put my brothers far from me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my acquaintances are completely estranged from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “My relatives have failed [me],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my intimate friends have forgotten me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Those who live [temporarily] in my house and my maids consider me a stranger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am a foreigner in their sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “I call to my servant, but he does not answer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have to implore him with words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “My breath is repulsive to my wife,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I am loathsome to my own brothers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Even young children despise me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I get up, they speak against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “All the men of my council hate me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those I love have turned against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “My bone clings to my skin and to my flesh,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I have escaped [death] by the skin of my teeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Have pity on me! Have pity on me, O you my friends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the hand of God has touched me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Why do you persecute me as God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: does?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why are you not satisfied with my flesh (anguish)?
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Job Says, “My Redeemer Lives”
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶“Oh, that the words I now speak were written!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, that they were recorded in a scroll!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “That with an iron stylus and [molten] lead
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were engraved in the rock forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“For I know that my Redeemer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Vindicator lives,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And at the last He will take His stand upon the earth. [Is 44:6; 48:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Even after my [mortal] skin is destroyed [by death],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet from my [immortal] flesh I will see God,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Whom I, even I, will see for myself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my eyes will see Him and not another!
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart faints within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “If you say, ‘How shall we [continue to] persecute him?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And ‘What pretext for a case against him can we find [since we claim the root of these afflictions is found in him]?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Then
  - type: text
    text: ' beware '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be afraid of the sword [of divine vengeance] for yourselves,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For wrathful are the punishments of that sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that you may know there is judgment.”
