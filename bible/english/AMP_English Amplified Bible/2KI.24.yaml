document_id: 2KI.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylon Controls Jehoiakim
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In his days, Nebuchadnezzar king of Babylon came up, and Jehoiakim became his servant for three years; then he turned and rebelled against him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'At that time the servants of Nebuchadnezzar king of Babylon went up to Jerusalem, and the city came under siege. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nebuchadnezzar king of Babylon came to the city while his servants were besieging it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jehoiachin king of Judah surrendered to the king of Babylon, he and his mother and his servants and his captains and his [palace] officials. So the king of Babylon took him prisoner in the eighth year of his [own] reign. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He carried out of there (Jerusalem) all the treasures of the house (temple) of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the treasures of the house (palace) of the king, and cut in pieces all the articles of gold in the temple of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', which Solomon king of Israel had made, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had said. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He led away into exile all Jerusalem and all the captains and all the brave men, ten thousand captives, and all the craftsmen and the smiths. None remained except the poorest people of the land.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nebuchadnezzar led Jehoiachin away into exile to Babylon; also he took the king’s mother and the king’s wives and his officials and the leading men of the land [including Ezekiel] as exiles from Jerusalem to Babylon. [Ezek 1:1] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And the king of Babylon brought as exiles to Babylon all the brave men, seven thousand [of them], and the craftsmen and the smiths, a thousand [of them], all strong and fit for war.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zedekiah Made King
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the king of Babylon made Mattaniah, Jehoiachin’s uncle, king in his place, and changed his name to Zedekiah.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king, and he reigned for eleven years in Jerusalem. His mother’s name was Hamutal daughter of Jeremiah of Libnah. [2 Kin 23:31] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with everything that Jehoiakim had done. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent marauding bands of Chaldeans, Arameans (Syrians), Moabites, and Ammonites against Jehoiakim. And He sent them against Judah to destroy it, in accordance with the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which He spoke through His servants the prophets. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Because of the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these things
    - type: text
      text: ' happened in Jerusalem and Judah, and it [finally] came to the point that He cast them from His presence. And Zedekiah rebelled against the king of Babylon.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Surely this came on Judah at the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to remove them from His sight because of the sins of [King] Manasseh, in accordance with everything that he had done, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: and also for the innocent blood that he shed, for he filled Jerusalem with innocent blood; and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' would not pardon it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Now the rest of the acts of Jehoiakim, and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah?
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehoiachin Reigns
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Jehoiakim slept with his fathers [in death], and his son Jehoiachin became king in his place. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The king of Egypt did not come out of his land again, because the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When Nebuchadnezzar was crown prince of Babylon he led his father’s army and defeated Egypt at the battle of Carchemish (Jer 46:2).
      marker-yv: yv-n
    - type: text
      text: king of Babylon had taken everything that belonged to the king of Egypt, from the river of Egypt to the river Euphrates.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jehoiachin was eighteen years old when he became king, and he reigned [only] three months in Jerusalem. His mother’s name was Nehushta daughter of Elnathan of Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He did evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with everything that his father had done.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Deportation to Babylon
    marker-yv: yv-h
