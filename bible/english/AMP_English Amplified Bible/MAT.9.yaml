  - type: text
    content: ' '
  '31':
  - type: text
    content: But they went out and spread the news about Him throughout that whole district.
  '32':
  - type: text
    content: 'While they were going away, a mute, demon-possessed man was brought to Jesus. '
  '33':
  - type: text
    content: 'And when the demon was driven out [by Jesus], the mute man spoke; and the crowds wondered in amazement, saying, “Never before has anything like this [miracle] been seen in Israel.” '
  '34':
  - type: text
    content: But the Pharisees were saying, “He casts out the demons by [the power of] the ruler of demons.”
  '35':
  - type: text
    content: Jesus went throughout all the cities and villages [in Galilee], teaching in their synagogues and proclaiming the good news (gospel) of the kingdom, and healing every kind of disease and every kind of sickness [His words and His works reflecting His Messiahship].
  '36':
  - type: text
    content: 'When He saw the crowds, He was moved with compassion '
  - type: text
    content: and
  - type: text
    content: ' pity for them, because they were dispirited and distressed, like sheep without a shepherd. [Zech 10:2] '
  '37':
  - type: text
    content: 'Then He said to His disciples, '
  - type: text
    content: “The harvest is
  - type: text
