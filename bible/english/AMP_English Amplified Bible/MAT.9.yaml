  '19':
  - type: text
    content: 'Jesus got up and '
  - type: text
    content: began
  - type: text
    content: ' to accompany the ruler, with His disciples.'
  '2':
  - type: text
    content: 'They brought to Him a man who was paralyzed, lying on a stretcher. Seeing their [active] faith [springing from confidence in Him], Jesus said to the paralytic, '
  - type: text
    content: “Do not be afraid, son; your sins are forgiven
  - type: text
    content: ' [the penalty is paid, the guilt removed, and you are declared to be in right standing with God].” [Mark 2:3-12; Luke 5:18-26] '
  '20':
  - type: text
    content: 'Then a woman who had suffered from a hemorrhage for twelve years came up behind Him and touched the [tassel] fringe of His outer robe; [Matt 14:36] '
  '21':
  - type: text
    content: 'for she had been saying to herself, “If I only touch His outer robe, I will be healed.” '
  '22':
  - type: text
    content: 'But Jesus turning and seeing her said, '
  - type: text
    content: “Take courage, daughter; your
  - type: text
    content: ' [personal trust and confident] '
  - type: text
    content: faith
  - type: text
    content: ' [in Me] '
  - type: text
    content: has made you well.”
  - type: text
    content: ' And at once the woman was [completely] healed.'
  '23':
  - type: text
    content: 'When Jesus came to the ruler’s house, and saw the flute players [who were professional, hired mourners] and the [grieving] crowd making an uproar, '
  '24':
  - type: text
    content: 'He said, '
  - type: text
    content: “Go away; for the girl is not dead, but is sleeping.”
  - type: text
    content: ' And they laughed '
  - type: text
    content: and
  - type: text
    content: ' jeered at Him. '
  '25':
  - type: text
    content: 'But when the crowd had been sent outside, Jesus went in and took her by the hand, and the girl got up. '
  '26':
  - type: text
    content: And the news about this spread throughout all that district.
  '27':
  - type: text
    content: 'As Jesus went on from there, two blind men followed Him, screaming loudly, “Have mercy '
  - type: text
    content: and
  - type: text
    content: ' compassion on us, '
  - type: note
    content: A common reference to the Messiah as a descendant of David.
  - type: text
    content: 'Son of David (Messiah)!” '
  '28':
  - type: text
    content: 'When He went into the house, the blind men came up to Him, and Jesus said to them, '
  - type: text
    content: “Do you believe
  - type: text
    content: ' [with a deep, abiding trust] '
  - type: text
    content: that I am able to do this?”
  - type: text
    content: ' They said to Him, “Yes, Lord.” '
  '29':
  - type: text
    content: 'Then He touched their eyes, saying, '
  - type: text
    content: “According to your faith
  - type: text
    content: ' [your trust and confidence in My power and My ability to heal] '
  - type: text
    content: it will be done to you.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'And some of the scribes said to themselves, “This '
  - type: text
    content: man
  - type: text
    content: ' blasphemes [by claiming the rights and prerogatives of God]!” '
  '30':
  - type: text
    content: 'And their eyes were opened. And Jesus '
  - type: note
    content: 'In Greek this term suggests an emotional indignation or violent displeasure. It occurs five times in the NT (four times in reference to Jesus’ words or feelings): Matt 9:30; Mark 1:43; 14:5; John 11:33, 38.'
  - type: text
