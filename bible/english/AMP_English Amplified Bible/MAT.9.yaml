  - type: heading
    content: The Question about Fasting
  '14':
  - type: text
    content: 'Then the disciples of John [the Baptist] came to Jesus, asking, “Why do we and the Pharisees often fast [as a religious exercise], but Your disciples do not fast?” '
  '15':
  - type: text
    content: 'And Jesus replied to them, '
  - type: text
    content: “Can the guests of the bridegroom mourn while the bridegroom is with them? The days will come when the bridegroom is taken away from them, and then they will fast.
  - type: text
    content: ' '
  '16':
  - type: text
    content: But no one puts a piece of unshrunk (new) cloth on an old garment; for the patch pulls away from the garment, and a worse tear results.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Nor is new wine put into old '
  - type: note
    content: A skin was a bag made from the skin of an animal. New wine was always put in a new bag so that the bag would stretch as the wine continued to ferment, and then the bag would harden. An old bag would burst if new wine was put in it.
  - type: text
