    content: So pray to the Lord of the harvest to send out workers into His harvest.”
  '4':
  - type: text
    content: 'But Jesus, knowing their thoughts, said, '
  - type: text
    content: “Why do you think evil in your hearts?
  - type: text
    content: ' '
