document_id: MAT.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Paralytic Healed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus, getting into a boat, crossed over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Sea of Galilee
    - type: text
      text: ' and came to [Capernaum] His own city.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then as Jesus was reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Matthew’s
    - type: text
      text: ' house, many tax collectors and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This description would include non-observant Jews, those who rejected Pharisaic ordinances and interpretations of the Law, as well as others who flaunted the rules of morality and civil law.
      marker-yv: yv-n
    - type: text
      text: 'sinners [including non-observant Jews] came and ate with Him and His disciples. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Pharisees saw this, they asked His disciples, “Why does your Master eat with tax collectors and sinners?” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when Jesus heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: ' He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Those who are healthy have no need for a physician, but
    - type: text
      text: ' [only] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: those who are sick.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go and learn what this
    - type: text
      text: ' [Scripture] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'means: ‘I '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: desire compassion
    - type: text
      text: ' [for those in distress], '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: sc
        children:
        - type: text
          text: and not
    - type: text
      text: ' [animal] '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: sc
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ',’ for I did not come to call'
    - type: text
      text: ' [to repentance] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the
    - type: text
      text: ' [self-proclaimed] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: righteous
    - type: text
      text: ' [who see no need to change], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but sinners
    - type: text
      text: ' [those who recognize their sin and actively seek forgiveness].” [Hos 6:6; Mark 2:17; Luke 5:32]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Question about Fasting
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the disciples of John [the Baptist] came to Jesus, asking, “Why do we and the Pharisees often fast [as a religious exercise], but Your disciples do not fast?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus replied to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Can the guests of the bridegroom mourn while the bridegroom is with them? The days will come when the bridegroom is taken away from them, and then they will fast.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But no one puts a piece of unshrunk (new) cloth on an old garment; for the patch pulls away from the garment, and a worse tear results.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Nor is new wine put into old '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A '
        - type: usfm
          marker: it
          children:
          - type: text
            text: skin
        - type: text
          text: ' was a bag made from the skin of an animal. New wine was always put in a new bag so that the bag would stretch as the wine continued to ferment, and then the bag would harden. An old bag would burst if new wine was put in it.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: wineskins
    - type: text
      text: ' [that have lost their elasticity]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: otherwise the wineskins burst, and the
    - type: text
      text: ' [fermenting] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: wine spills and the wineskins are ruined. But new wine is put into fresh wineskins, so both are preserved.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Miracles of Healing
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While He was saying these things to them, a ruler (synagogue official) entered [the house] and kneeled down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshiped Him, saying, “My daughter has just now died; but come and lay Your hand on her, and she will live.” [Mark 5:22-43; Luke 8:41-56] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus got up and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to accompany the ruler, with His disciples.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They brought to Him a man who was paralyzed, lying on a stretcher. Seeing their [active] faith [springing from confidence in Him], Jesus said to the paralytic, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not be afraid, son; your sins are forgiven
    - type: text
      text: ' [the penalty is paid, the guilt removed, and you are declared to be in right standing with God].” [Mark 2:3-12; Luke 5:18-26] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a woman who had suffered from a hemorrhage for twelve years came up behind Him and touched the [tassel] fringe of His outer robe; [Matt 14:36] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for she had been saying to herself, “If I only touch His outer robe, I will be healed.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus turning and seeing her said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take courage, daughter; your
    - type: text
      text: ' [personal trust and confident] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: faith
    - type: text
      text: ' [in Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has made you well.”
    - type: text
      text: ' And at once the woman was [completely] healed.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus came to the ruler’s house, and saw the flute players [who were professional, hired mourners] and the [grieving] crowd making an uproar, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go away; for the girl is not dead, but is sleeping.”
    - type: text
      text: ' And they laughed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' jeered at Him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the crowd had been sent outside, Jesus went in and took her by the hand, and the girl got up. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the news about this spread throughout all that district.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus went on from there, two blind men followed Him, screaming loudly, “Have mercy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' compassion on us, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A common reference to the Messiah as a descendant of David.
      marker-yv: yv-n
    - type: text
      text: 'Son of David (Messiah)!” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He went into the house, the blind men came up to Him, and Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe
    - type: text
      text: ' [with a deep, abiding trust] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that I am able to do this?”
    - type: text
      text: ' They said to Him, “Yes, Lord.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He touched their eyes, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “According to your faith
    - type: text
      text: ' [your trust and confidence in My power and My ability to heal] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: it will be done to you.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And some of the scribes said to themselves, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' blasphemes [by claiming the rights and prerogatives of God]!” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their eyes were opened. And Jesus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In Greek this term suggests an emotional indignation or violent displeasure. It occurs five times in the NT (four times in reference to Jesus’ words or feelings): Matt 9:30; Mark 1:43; 14:5; John 11:33, 38.'
      marker-yv: yv-n
    - type: text
      text: 'sternly warned them: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “See that no one knows this!”
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they went out and spread the news about Him throughout that whole district.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were going away, a mute, demon-possessed man was brought to Jesus. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the demon was driven out [by Jesus], the mute man spoke; and the crowds wondered in amazement, saying, “Never before has anything like this [miracle] been seen in Israel.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the Pharisees were saying, “He casts out the demons by [the power of] the ruler of demons.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus went throughout all the cities and villages [in Galilee], teaching in their synagogues and proclaiming the good news (gospel) of the kingdom, and healing every kind of disease and every kind of sickness [His words and His works reflecting His Messiahship].
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When He saw the crowds, He was moved with compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pity for them, because they were dispirited and distressed, like sheep without a shepherd. [Zech 10:2] '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to His disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is
    - type: text
      text: ' [indeed] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: plentiful, but the workers are few.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So pray to the Lord of the harvest to send out workers into His harvest.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus, knowing their thoughts, said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you think evil in your hearts?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For which is easier, to say, ‘Your sins are forgiven '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' the penalty paid,’ or to say, ‘Get up and walk’?'
    - type: text
      text: ' [Both are possible for God; both are impossible for man.] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But so that you may know that the Son of Man has authority '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' the power on earth to forgive sins”'
    - type: text
      text: '—then He said to the paralytic, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up, pick up your stretcher and go home.”
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he got up and went home [healed and forgiven]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the crowds saw this, they were awestruck, and glorified God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praised Him, who had given such authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power to men.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Matthew Called
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus went on from there, He saw a man named Matthew (Levi) sitting in the tax collector’s booth; and He said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow Me
    - type: text
      text: ' [as My disciple, accepting Me as your Master and Teacher and walking the same path of life that I walk].” And Matthew got up and followed Him. [Mark 2:14-22; Luke 5:27-39]'
