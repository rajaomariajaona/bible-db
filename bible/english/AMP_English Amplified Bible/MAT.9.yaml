  - type: heading
    content: Matthew Called
  '9':
  - type: text
    content: 'As Jesus went on from there, He saw a man named Matthew (Levi) sitting in the tax collector’s booth; and He said to him, '
  - type: text
    content: “Follow Me
  - type: text
    content: ' [as My disciple, accepting Me as your Master and Teacher and walking the same path of life that I walk].” And Matthew got up and followed Him. [Mark 2:14-22; Luke 5:27-39]'
