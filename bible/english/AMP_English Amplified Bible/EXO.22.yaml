document_id: EXO.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Property Rights
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “If a man steals an ox or sheep and kills or sells it, he shall make restitution of five oxen for an ox or four sheep for a sheep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“If a thief is caught breaking in [after dark] and is struck [by the owner] so that he dies, there shall be no bloodguilt for him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But if the sun has risen, there will be bloodguilt for him. The thief [if he lives] must make [full] restitution; if he has nothing, then he shall be sold [as a slave to make restitution] for his theft. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If the animal that he stole is found alive in his possession, whether it is ox or donkey or sheep, he shall pay double [for it].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “If a man causes a field or vineyard to be grazed bare or lets his livestock loose so that it grazes in another man’s field, he shall make restitution from the best of his own field and the best of his own vineyard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “If fire breaks out and spreads to thorn bushes so that the stacked grain or standing grain or the field is consumed, he who started the fire shall make full restitution.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“If a man gives his neighbor money or [other] goods to keep [for him while he is away] and it is stolen from the neighbor’s house, then, if the thief is caught, he shall pay double [for it]. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If the thief is not caught, the owner of the house shall appear before the judges [who act in God’s name], to determine whether or not he had stolen his neighbor’s goods. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For every offense involving property, whether it concerns ox, donkey, sheep, clothing, or any piece of lost property, which another identifies as his, the case of both parties shall come before the judges [who act in God’s name]. Whomever the judges pronounce guilty shall pay double to his neighbor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“If a man gives his neighbor a donkey or an ox or a sheep or any [other] animal to keep [for him], and it dies or is injured or taken away while no one is looking, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: then an oath before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall be made by the two of them that he has not taken his neighbor’s property; and the owner of it shall accept his word and not require him to make restitution. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But if it is actually stolen from him [when in his care], he shall make restitution to its owner. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If it is torn to pieces [by some predator or by accident], let him bring the mangled carcass as evidence; he shall not make restitution for what was torn to pieces.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“And if a man borrows an animal from his neighbor, and it gets injured or dies while its owner is not with it, the borrower shall make full restitution. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But if the owner is with it [when the damage is done], the borrower shall not make restitution. If it was hired, the damage is included in [the price of] its fee.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Various Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“If a man seduces a virgin who is not betrothed, and lies with her, he must pay a dowry (marriage price) for her to be his wife. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: If her father absolutely refuses to give her to him, he must [still] pay money equivalent to the dowry of virgins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “You shall not allow a woman who practices sorcery to live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Whoever lies with an animal must be put to death. [Lev 18:23]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “He who sacrifices to any god, other than to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' alone, shall be put under a ban (designated) for destruction (execution).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“You shall not wrong a stranger or oppress him, for you were strangers in the land of Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You shall not harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oppress any widow or fatherless child. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'If you harm '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' oppress them in any way, and they cry at all to Me [for help], I will most certainly hear their cry; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and My wrath shall be kindled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burn; I will kill you with the sword, and your wives shall become widows and your children fatherless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“If you lend money to any one of My people with you who is poor, you shall not act as a creditor (professional moneylender) to him; you shall not charge him interest. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'If you ever take your [poor] neighbor’s robe in pledge, you must return it to him before sunset, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'for that is his only covering; it is his clothing for his body. In what shall he sleep? And when he cries to Me [for help], I will hear him, for I am compassionate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gracious.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “You shall not curse God, nor curse the ruler of your people [since he administers God’s law]. [Acts 23:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“You shall not delay '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the offering from
  - type: text
    text: ' your harvest and your vintage. You shall give (consecrate, dedicate) to Me the firstborn of your sons. [Ex 34:19, 20] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'You shall do the same with your oxen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' with your sheep. It shall be with its mother for seven days; on the eighth day you shall give it [as an offering] to Me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“You shall be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The commandments given to Israel by the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
      - type: text
        text: ' were designed in part to separate them from the world and identify them as His chosen people.'
    marker-yv: yv-n
  - type: text
    text: holy men to Me; therefore you shall not eat meat [from any animal] that has been torn to pieces [by predators] in the field; you shall throw it to the dogs.
