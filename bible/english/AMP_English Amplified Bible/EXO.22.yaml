document_id: EXO.22,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Property Rights
  - type: text
    content: “If a man steals an ox or sheep and kills or sells it, he shall make restitution of five oxen for an ox or four sheep for a sheep.
  '10':
  - type: text
    content: '“If a man gives his neighbor a donkey or an ox or a sheep or any [other] animal to keep [for him], and it dies or is injured or taken away while no one is looking, '
  '11':
  - type: text
    content: then an oath before the L
  - type: heading
    content: ord
  - type: text
    content: ' shall be made by the two of them that he has not taken his neighbor’s property; and the owner of it shall accept his word and not require him to make restitution. '
  '12':
  - type: text
    content: 'But if it is actually stolen from him [when in his care], he shall make restitution to its owner. '
  '13':
  - type: text
    content: If it is torn to pieces [by some predator or by accident], let him bring the mangled carcass as evidence; he shall not make restitution for what was torn to pieces.
  '14':
  - type: text
    content: '“And if a man borrows an animal from his neighbor, and it gets injured or dies while its owner is not with it, the borrower shall make full restitution. '
  '15':
  - type: text
    content: But if the owner is with it [when the damage is done], the borrower shall not make restitution. If it was hired, the damage is included in [the price of] its fee.
  - type: heading
    content: Various Laws
  '16':
  - type: text
    content: '“If a man seduces a virgin who is not betrothed, and lies with her, he must pay a dowry (marriage price) for her to be his wife. '
  '17':
  - type: text
    content: If her father absolutely refuses to give her to him, he must [still] pay money equivalent to the dowry of virgins.
  '18':
  - type: text
    content: “You shall not allow a woman who practices sorcery to live.
  '19':
  - type: text
    content: “Whoever lies with an animal must be put to death. [Lev 18:23]
  '2':
  - type: text
    content: '“If a thief is caught breaking in [after dark] and is struck [by the owner] so that he dies, there shall be no bloodguilt for him. '
  '20':
  - type: text
    content: “He who sacrifices to any god, other than to the L
  - type: heading
    content: ord
  - type: text
    content: ' alone, shall be put under a ban (designated) for destruction (execution).'
  '21':
  - type: text
    content: '“You shall not wrong a stranger or oppress him, for you were strangers in the land of Egypt. '
  '22':
  - type: text
    content: 'You shall not harm '
  - type: text
    content: or
  - type: text
    content: ' oppress any widow or fatherless child. '
  '23':
  - type: text
    content: 'If you harm '
  - type: text
    content: or
  - type: text
    content: ' oppress them in any way, and they cry at all to Me [for help], I will most certainly hear their cry; '
  '24':
  - type: text
    content: 'and My wrath shall be kindled '
  - type: text
    content: and
  - type: text
    content: ' burn; I will kill you with the sword, and your wives shall become widows and your children fatherless.'
  '25':
  - type: text
    content: '“If you lend money to any one of My people with you who is poor, you shall not act as a creditor (professional moneylender) to him; you shall not charge him interest. '
  '26':
  - type: text
    content: 'If you ever take your [poor] neighbor’s robe in pledge, you must return it to him before sunset, '
  '27':
  - type: text
    content: 'for that is his only covering; it is his clothing for his body. In what shall he sleep? And when he cries to Me [for help], I will hear him, for I am compassionate '
  - type: text
    content: and
  - type: text
    content: ' gracious.'
  '28':
  - type: text
    content: “You shall not curse God, nor curse the ruler of your people [since he administers God’s law]. [Acts 23:5]
  '29':
  - type: text
    content: '“You shall not delay '
  - type: text
    content: the offering from
  - type: text
    content: ' your harvest and your vintage. You shall give (consecrate, dedicate) to Me the firstborn of your sons. [Ex 34:19, 20] '
  '3':
  - type: text
    content: 'But if the sun has risen, there will be bloodguilt for him. The thief [if he lives] must make [full] restitution; if he has nothing, then he shall be sold [as a slave to make restitution] for his theft. '
  '30':
  - type: text
    content: 'You shall do the same with your oxen '
  - type: text
    content: and
  - type: text
    content: ' with your sheep. It shall be with its mother for seven days; on the eighth day you shall give it [as an offering] to Me.'
  '31':
  - type: text
    content: '“You shall be '
  - type: note
    content: The commandments given to Israel by the Lord were designed in part to separate them from the world and identify them as His chosen people.
  - type: text
    content: holy men to Me; therefore you shall not eat meat [from any animal] that has been torn to pieces [by predators] in the field; you shall throw it to the dogs.
  '4':
  - type: text
    content: If the animal that he stole is found alive in his possession, whether it is ox or donkey or sheep, he shall pay double [for it].
  '5':
  - type: text
    content: “If a man causes a field or vineyard to be grazed bare or lets his livestock loose so that it grazes in another man’s field, he shall make restitution from the best of his own field and the best of his own vineyard.
  '6':
  - type: text
    content: “If fire breaks out and spreads to thorn bushes so that the stacked grain or standing grain or the field is consumed, he who started the fire shall make full restitution.
  '7':
  - type: text
    content: '“If a man gives his neighbor money or [other] goods to keep [for him while he is away] and it is stolen from the neighbor’s house, then, if the thief is caught, he shall pay double [for it]. '
  '8':
  - type: text
    content: 'If the thief is not caught, the owner of the house shall appear before the judges [who act in God’s name], to determine whether or not he had stolen his neighbor’s goods. '
  '9':
  - type: text
    content: For every offense involving property, whether it concerns ox, donkey, sheep, clothing, or any piece of lost property, which another identifies as his, the case of both parties shall come before the judges [who act in God’s name]. Whomever the judges pronounce guilty shall pay double to his neighbor.
