document_id: LUK.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Seventy Sent Out
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now after this the Lord appointed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One ancient ms reads '
        - type: usfm
          marker: it
          children:
          - type: text
            text: seventy-two
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'seventy others, and sent them out ahead of Him, two by two, into every city and place where He was about to go. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But whatever city you enter and they do not welcome you, go out into its streets and say,
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘Even the dust of your city which clings to our feet we wipe off '
      - type: usfm
        marker: it
        children:
        - type: text
          text: in protest
      - type: text
        text: ' against you'
    - type: text
      text: ' [breaking all ties]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: yet understand this, that the kingdom of God has come near
    - type: text
      text: ' [and you rejected it].’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, it will be more bearable in that day
    - type: text
      text: ' [of judgment] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for Sodom than for that city.
    - type: text
      text: ' [Gen 19:24-28]'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Woe (judgment is coming) to you, Chorazin! Woe to you, Bethsaida! For if the miracles performed in you had been performed in Tyre and Sidon, they would have repented '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' changed their minds long ago, sitting in sackcloth and ashes'
    - type: text
      text: ' [to show deep regret for sin]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, it will be more tolerable for Tyre and Sidon in the judgment than for you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you, Capernaum, will not be exalted to heaven, will you? You will descend to Hades (the realm of the dead).
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The one who listens to you listens to Me; and the one who rejects you rejects Me; and the one who rejects Me rejects Him
    - type: text
      text: ' [My heavenly Father] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who sent Me.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Joyous Results
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The seventy returned with joy, saying, “Lord, even the demons are subject to us in Your name.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I watched Satan fall from heaven like
    - type: text
      text: ' [a flash of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: lightning.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Listen carefully: I have given you authority'
    - type: text
      text: ' [that you now possess] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'to tread on '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps a reference to demonic powers (spirits).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: serpents and scorpions, and
    - type: text
      text: ' [the ability to exercise authority] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: over all the power of the enemy (Satan); and nothing will
    - type: text
      text: ' [in any way] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: harm you.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He was saying to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is abundant
    - type: text
      text: ' [for there are many who need to hear the good news about salvation], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the workers
    - type: text
      text: ' [those available to proclaim the message of salvation] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: are few. Therefore,
    - type: text
      text: ' [prayerfully] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ask the Lord of the harvest to send out workers into His harvest.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Nevertheless do not rejoice at this, that the spirits are subject to you, but rejoice that your names are recorded in heaven.”
    - type: text
      text: ' [Ex 32:32; Ps 69:28; Dan 12:1; Rev 3:5]'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'In that very hour He was overjoyed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rejoiced greatly in the Holy Spirit, and He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I praise You, O Father, Lord of heaven and earth, that You have hidden these things
    - type: text
      text: ' [relating to salvation] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An ironic criticism of the Jewish leaders who regarded the followers of Jesus as childlike and untaught.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: wise and intelligent, and have revealed them to infants
    - type: text
      text: ' [the childlike and untaught]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, Father, for this way was
    - type: text
      text: ' [Your gracious will and choice, and was] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: well-pleasing in Your sight.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'All things have been transferred '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' turned over to Me by My Father and no one knows who the Son is except the Father, or who the Father is except the Son, and anyone to whom the Son wishes to reveal Him.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Then turning to His disciples, Jesus said privately, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Blessed
    - type: text
      text: ' [joyful, spiritually enlightened, and favored by God] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: are the eyes which see what you see,
    - type: text
      text: ' [Matt 13:16, 17] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I say to you that many prophets and kings longed to see what you see, and they did not see it; and to hear what you hear, and did not hear it.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And a certain lawyer [an expert in Mosaic Law] stood up to test Him, saying, “Teacher, what must I do to inherit eternal life?” [Matt 22:34-40; Mark 12:28-31] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is written in the Law? How do you read it?”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And he replied, “Y
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou shall love the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord your
    - type: text
      text: ' G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od with all your heart
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and with all your soul
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and with all your strength
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and with all your mind
    - type: text
      text: '; '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and your neighbor as yourself
    - type: text
      text: '.” [Lev 19:18; Deut 6:5] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“You have answered correctly; '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: do this
      - type: text
        text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: habitually
      - type: text
        text: ' '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: and you will live
      - type: text
        text: .”
    - type: text
      text: ' [Lev 18:5; Ezek 20:11; Matt 19:17] '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But he, wishing to justify '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicate himself, asked Jesus, “And who is my neighbor?”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of the Good Samaritan
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Go your way; listen carefully: I am sending you out like lambs among wolves.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A man was going down from Jerusalem to Jericho, and he encountered robbers, who stripped him of his clothes
    - type: text
      text: ' [and belongings], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: beat him, and went their way
    - type: text
      text: ' [unconcerned], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: leaving him half dead.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now by coincidence a priest was going down that road, and when he saw him, he passed by on the other side.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Likewise a Levite also came down to the place and saw him, and passed by on the other side
    - type: text
      text: ' [of the road]. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But a Samaritan (foreigner), who was traveling, came upon him; and when he saw him, he was deeply moved with compassion
    - type: text
      text: ' [for him], '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and went to him and bandaged up his wounds, pouring oil and wine on '
      - type: usfm
        marker: it
        children:
        - type: text
          text: them
    - type: text
      text: ' [to sooth and disinfect the injuries]; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he put him on his own pack-animal, and brought him to an inn and took care of him.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: On the next day he took out two denarii (two days’ wages) and gave them to the innkeeper, and said, ‘Take care of him; and whatever more you spend, I will repay you when I return.’
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Which of these three do you think proved himself a neighbor to the man who encountered the robbers?”
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'He answered, “The one who showed compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy to him.” Then Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: constantly
      - type: text
        text: ' do the same.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Martha and Mary
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Now while they were on their way, Jesus entered a village [called Bethany], and a woman named Martha welcomed Him into her home. [John 11:1] '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'She had a sister named Mary, who seated herself at the Lord’s feet and was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' listening to His teaching. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not carry a money belt, a provision bag, or
    - type: text
      text: ' [extra] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'sandals; and do not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A formal greeting was a lengthy ritual that sometimes included a meal.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: greet anyone along the way
    - type: text
      text: ' [who would delay you]. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But Martha was very busy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' distracted with all of her serving responsibilities; and she approached Him and said, “Lord, is it of no concern to You that my sister has left me to do the serving alone? Tell her to help me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' do her part.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'But the Lord replied to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Martha, Martha, you are worried and bothered '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' anxious about so many things;'
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but '
      - type: usfm
        marker: it
        children:
        - type: text
          text: only
      - type: text
        text: ' one thing is necessary, for Mary has chosen the good part'
    - type: text
      text: ' [that which is to her advantage], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: which will not be taken away from her.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever house you enter, first say, ‘
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
