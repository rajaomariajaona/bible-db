verses:
  '1':
  - type: heading
    content: Joash (Jehoash) Reigns over Judah
  - type: text
    content: 'In the seventh year of Jehu [king of Israel], '
  - type: note
    content: Judah and Israel each had a king named Joash or Jehoash, and the Hebrew uses the two forms of the name interchangeably. Since the times of their reigns overlapped, it is easy to confuse them. The same potential confusion exists with the name Joram/Jehoram.
  - type: text
    content: 'Jehoash became king [over Judah], and he reigned forty years in Jerusalem. His mother’s name was Zibiah of Beersheba. '
  '10':
  - type: text
    content: And whenever they saw that there was a large amount of money in the chest, the king’s scribe and the high priest came up and tied it in bags and counted the money that was found in the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '11':
  - type: text
    content: Then they gave the money, which was weighed out into the hands of those who were doing the work, who had the oversight of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ; and they paid it out to the carpenters and builders who worked on the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ', '
  '12':
  - type: text
    content: and to the masons and stonecutters, and to buy timber and hewn (cut) stone to repair any breach in the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', and for all that was laid out for repairing the house. '
  '13':
  - type: text
    content: However, there were not made for the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' basins of silver, snuffers, bowls, trumpets, any gold containers or [other] silver containers, from the money that was brought into the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '; '
  '14':
  - type: text
    content: but they gave that to those who did the work, and with it they repaired the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Moreover, they did not require an accounting from the men into whose hands they placed the money to be paid to those who did the work, for they acted in good faith. '
  '16':
  - type: text
    content: Money from the guilt offerings and money from the sin offerings was not brought into the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' [for repairs]; it was for the priests.'
  '17':
  - type: text
    content: 'Then Hazael king of Aram (Syria) went up, fought against Gath [in Philistia], and captured it. And Hazael '
  - type: note
    content: Lit set his face.
  - type: text
    content: 'resolved to go up to Jerusalem. '
  '18':
  - type: text
    content: So Jehoash the king of Judah took all the sacred things that Jehoshaphat and Jehoram and Ahaziah, his fathers, kings of Judah, had dedicated, and his own sacred things and all the gold that was found in the treasuries of the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ' and of the king’s house, and sent them to Hazael king of Aram; and Hazael departed from Jerusalem. [1 Kin 15:18]'
  - type: heading
    content: Joash (Jehoash) Succeeded by Amaziah in Judah
  '19':
  - type: text
    content: 'Now the rest of the acts of Joash and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '2':
  - type: text
    content: Jehoash did right in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ' all his days in which Jehoiada the priest instructed him. '
  '20':
  - type: text
    content: 'His servants arose and formed a '
  - type: note
    content: Joash was responsible for the murder of the high priest Zechariah the son of Jehoiada.
  - type: text
    content: 'conspiracy [against him] and struck down Joash [in revenge] at the house of Millo, [on the way] that goes down to Silla. [2 Chr 24:22-25] '
  '21':
  - type: text
    content: For Jozacar (Jozachar) the son of Shimeath and Jehozabad the son of Shomer, his servants, struck him and he died; and they buried Joash with his fathers in the City of David. Amaziah his son became king in his place.
  '3':
  - type: text
    content: Only the high places were not removed; the people were still sacrificing and burning incense [to the L
  - type: heading
    content: ord
  - type: text
    content: '] on the high places [rather than at the temple].'
  - type: heading
    content: The Temple to Be Repaired
  '4':
  - type: text
    content: Jehoash said to the priests, “All the money for the dedicated things which is brought into the house of the L
  - type: heading
    content: ord
  - type: text
    content: ', in current money, '
  - type: text
    content: both
  - type: text
    content: ' the money of each man’s assessment [for all those bound by vows], '
  - type: text
    content: and
  - type: text
    content: ' all the money which any man’s heart prompts him to bring into the house (temple) of the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
  '5':
  - type: text
    content: 'let the priests receive such contributions for themselves, each from his acquaintance; and they shall repair any breach in the house '
  - type: text
    content: of the L
  - type: heading
    content: ord
  - type: text
    content: ', wherever a breach is found.”'
  '6':
  - type: text
    content: 'But it came about in the twenty-third year of [the reign of] King Jehoash, that the priests '
  - type: text
    content: still
  - type: text
    content: ' had not repaired the damages of the '
  - type: text
    content: L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house. '
  '7':
  - type: text
    content: 'Then King Jehoash called for Jehoiada the priest and the [other] priests and said to them, “Why are you not repairing the damage of the house (temple)? Now then, do not take any more money from your acquaintances, but turn it all over for [the repair of] the damages of the house.” [You are no longer responsible for this work. I will take it into my own hands.] '
  '8':
  - type: text
    content: So the priests agreed that they would receive no [more] money from the people, nor [be responsible to] repair the damages of the house.
  '9':
  - type: text
    content: Then Jehoiada the priest took a chest and bored a hole in its lid and set it beside the altar, on the right side as one enters the house of the L
  - type: heading
    content: ord
  - type: text
    content: ; and the priests who guarded the door put in the chest all the money that was brought [by the people] into the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
