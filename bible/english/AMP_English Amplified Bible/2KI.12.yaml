document_id: 2KI.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joash (Jehoash) Reigns over Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the seventh year of Jehu [king of Israel], '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Judah and Israel each had a king named Joash or Jehoash, and the Hebrew uses the two forms of the name interchangeably. Since the times of their reigns overlapped, it is easy to confuse them. The same potential confusion exists with the name Joram/Jehoram.
    marker-yv: yv-n
  - type: text
    text: 'Jehoash became king [over Judah], and he reigned forty years in Jerusalem. His mother’s name was Zibiah of Beersheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehoash did right in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' all his days in which Jehoiada the priest instructed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Only the high places were not removed; the people were still sacrificing and burning incense [to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] on the high places [rather than at the temple].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Temple to Be Repaired
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jehoash said to the priests, “All the money for the dedicated things which is brought into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in current money, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: both
  - type: text
    text: ' the money of each man’s assessment [for all those bound by vows], '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' all the money which any man’s heart prompts him to bring into the house (temple) of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'let the priests receive such contributions for themselves, each from his acquaintance; and they shall repair any breach in the house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: text
    text: ', wherever a breach is found.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But it came about in the twenty-third year of [the reign of] King Jehoash, that the priests '
  - type: usfm
    marker: it
    children:
    - type: text
      text: still
  - type: text
    text: ' had not repaired the damages of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: s
  - type: text
    text: ' house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then King Jehoash called for Jehoiada the priest and the [other] priests and said to them, “Why are you not repairing the damage of the house (temple)? Now then, do not take any more money from your acquaintances, but turn it all over for [the repair of] the damages of the house.” [You are no longer responsible for this work. I will take it into my own hands.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So the priests agreed that they would receive no [more] money from the people, nor [be responsible to] repair the damages of the house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then Jehoiada the priest took a chest and bored a hole in its lid and set it beside the altar, on the right side as one enters the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and the priests who guarded the door put in the chest all the money that was brought [by the people] into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And whenever they saw that there was a large amount of money in the chest, the king’s scribe and the high priest came up and tied it in bags and counted the money that was found in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then they gave the money, which was weighed out into the hands of those who were doing the work, who had the oversight of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and they paid it out to the carpenters and builders who worked on the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: and to the masons and stonecutters, and to buy timber and hewn (cut) stone to repair any breach in the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and for all that was laid out for repairing the house. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: However, there were not made for the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' basins of silver, snuffers, bowls, trumpets, any gold containers or [other] silver containers, from the money that was brought into the house of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: but they gave that to those who did the work, and with it they repaired the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moreover, they did not require an accounting from the men into whose hands they placed the money to be paid to those who did the work, for they acted in good faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Money from the guilt offerings and money from the sin offerings was not brought into the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [for repairs]; it was for the priests.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Hazael king of Aram (Syria) went up, fought against Gath [in Philistia], and captured it. And Hazael '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: set his face
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'resolved to go up to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So Jehoash the king of Judah took all the sacred things that Jehoshaphat and Jehoram and Ahaziah, his fathers, kings of Judah, had dedicated, and his own sacred things and all the gold that was found in the treasuries of the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and of the king’s house, and sent them to Hazael king of Aram; and Hazael departed from Jerusalem. [1 Kin 15:18]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joash (Jehoash) Succeeded by Amaziah in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the rest of the acts of Joash and everything that he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'His servants arose and formed a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joash was responsible for the murder of the high priest Zechariah the son of Jehoiada.
    marker-yv: yv-n
  - type: text
    text: 'conspiracy [against him] and struck down Joash [in revenge] at the house of Millo, [on the way] that goes down to Silla. [2 Chr 24:22-25] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For Jozacar (Jozachar) the son of Shimeath and Jehozabad the son of Shomer, his servants, struck him and he died; and they buried Joash with his fathers in the City of David. Amaziah his son became king in his place.
