verses:
  '1':
  - type: heading
    content: Ezekiel’s Commission
  - type: text
    content: 'He said to me, “Son of man, eat what you find [in this book]; eat this scroll, then go, speak to the house of Israel.” '
  '10':
  - type: text
    content: 'Moreover, He said to me, “Son of man, receive into your heart all My words which I will speak to you and hear with your ears (listen closely). '
  '11':
  - type: text
    content: Go to the [Jewish] exiles [in Babylon], to the children of your people, and speak to them, whether they listen or not, and tell them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: .’ ”
  '12':
  - type: text
    content: Then the Spirit lifted me up, and I heard a great rushing sound behind me, “Blessed be the glory of the L
  - type: heading
    content: ord
  - type: text
    content: ' in His place [above the expanse].” '
  '13':
  - type: text
    content: 'And then I '
  - type: text
    content: heard
  - type: text
    content: ' the sound of the wings of the living beings as they touched one another and [I heard] the sound of the wheels beside them, a great rushing sound. '
  '14':
  - type: text
    content: So the Spirit lifted me up and took me away, and I went embittered [by the sins of Israel] in the rage of my spirit; and the hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' was strong on me. '
  '15':
  - type: text
    content: Then I came to the exiles who lived beside the River Chebar at Tel Abib. I sat there for seven days [in the place] where they were living, overwhelmed with astonishment [by my vision and the work before me].
  '16':
  - type: text
    content: At the end of seven days the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '17':
  - type: text
    content: '“Son of man, I have appointed you as a watchman to the house of Israel; whenever you hear a word from My mouth, warn them from Me. [Is 52:8; 56:10; 62:6; Jer 6:17] '
  '18':
  - type: text
    content: 'When I say to the wicked, ‘You will certainly die,’ and you do not warn him or speak out to tell him to turn from his wicked way to save his life, that same evil man will die in his sin, but you will be responsible for his blood. '
  '19':
  - type: text
    content: 'However, if you have warned the wicked and he does not turn from his wickedness or from his wicked way, he will die in his sin; but you have '
  - type: note
    content: Lit delivered.
  - type: text
    content: 'freed yourself [from responsibility]. '
  '2':
  - type: text
    content: 'So I opened my mouth, and He fed me the scroll. '
  '20':
  - type: text
    content: 'Again, when a righteous man turns from his righteousness (right standing with God) and sins, and I place an obstacle before him, he will die; since you have not warned him, he will die in his sin, and the righteous deeds which he has done will not be remembered; but you will be responsible for his blood. '
  '21':
  - type: text
    content: 'However, if you have warned the righteous man not to sin and he does not sin, he will surely live because he took warning; also you have '
  - type: note
    content: Lit delivered.
  - type: text
    content: freed yourself [from responsibility].”
  '22':
  - type: text
    content: The hand of the L
  - type: heading
    content: ord
  - type: text
    content: ' was on me there, and He said to me, “Arise, go out to the plain, and I will speak to you.” '
  '23':
  - type: text
    content: 'So I got up and went out to the plain; and behold, the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' was standing there, like the glory I had seen by the River Chebar, and I fell face downward. '
  '24':
  - type: text
    content: 'Then the Spirit entered me and made me stand on my feet; He spoke and said to me, “Go, shut yourself up in your house. '
  '25':
  - type: text
    content: 'As for you, son of man, they will put ropes on you and bind you with them so that you cannot go out among them. '
  '26':
  - type: text
    content: 'And I will make your tongue stick to the roof of your mouth so that you cannot talk and you cannot be a man who rebukes the people, for they are a rebellious house. '
  '27':
  - type: text
    content: But when I speak with you, I will open your mouth and you will say to them, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: .’ He who hears, let him hear; and he who refuses [to hear], let him refuse; for they are a rebellious house.
  '3':
  - type: text
    content: He said to me, “Son of man, eat this scroll that I am giving you and fill your stomach with it.” So I ate it, and it was as sweet as honey in my mouth.
  '4':
  - type: text
    content: 'Then He said to me, “Son of man, go to the house of Israel and speak My words to them. '
  '5':
  - type: text
    content: 'For you are not being sent to a people of unintelligible speech or difficult language, but to the house of Israel, '
  '6':
  - type: text
    content: 'not to many peoples of unintelligible speech or difficult language, whose words you cannot understand. But I have sent you to them who should listen to you '
  - type: text
    content: and
  - type: text
    content: ' pay attention to My message; '
  '7':
  - type: text
    content: 'yet the house of Israel will not be willing to listen to you '
  - type: text
    content: and
  - type: text
    content: ' obey you, since they are not willing to listen to Me '
  - type: text
    content: and
  - type: text
    content: ' obey Me, for the entire house of Israel is stubborn and obstinate. '
  '8':
  - type: text
    content: 'Behold, I have made your face as hard as their faces and your forehead as hard as their foreheads. '
  '9':
  - type: text
    content: 'I have made your forehead like emery (diamond), harder than flint. Do not be afraid of them or be dismayed before them, though they are a rebellious house.” [Is 50:7; Jer 1:18; 15:20; Mic 3:8] '
