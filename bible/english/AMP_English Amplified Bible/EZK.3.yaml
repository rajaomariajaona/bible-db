document_id: EZK.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ezekiel’s Commission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'He said to me, “Son of man, eat what you find [in this book]; eat this scroll, then go, speak to the house of Israel.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So I opened my mouth, and He fed me the scroll. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He said to me, “Son of man, eat this scroll that I am giving you and fill your stomach with it.” So I ate it, and it was as sweet as honey in my mouth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then He said to me, “Son of man, go to the house of Israel and speak My words to them. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For you are not being sent to a people of unintelligible speech or difficult language, but to the house of Israel, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'not to many peoples of unintelligible speech or difficult language, whose words you cannot understand. But I have sent you to them who should listen to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pay attention to My message; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'yet the house of Israel will not be willing to listen to you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey you, since they are not willing to listen to Me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obey Me, for the entire house of Israel is stubborn and obstinate. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Behold, I have made your face as hard as their faces and your forehead as hard as their foreheads. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I have made your forehead like emery (diamond), harder than flint. Do not be afraid of them or be dismayed before them, though they are a rebellious house.” [Is 50:7; Jer 1:18; 15:20; Mic 3:8] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moreover, He said to me, “Son of man, receive into your heart all My words which I will speak to you and hear with your ears (listen closely). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Go to the [Jewish] exiles [in Babylon], to the children of your people, and speak to them, whether they listen or not, and tell them, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the Spirit lifted me up, and I heard a great rushing sound behind me, “Blessed be the glory of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in His place [above the expanse].” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And then I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heard
  - type: text
    text: ' the sound of the wings of the living beings as they touched one another and [I heard] the sound of the wheels beside them, a great rushing sound. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the Spirit lifted me up and took me away, and I went embittered [by the sins of Israel] in the rage of my spirit; and the hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was strong on me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then I came to the exiles who lived beside the River Chebar at Tel Abib. I sat there for seven days [in the place] where they were living, overwhelmed with astonishment [by my vision and the work before me].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: At the end of seven days the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Son of man, I have appointed you as a watchman to the house of Israel; whenever you hear a word from My mouth, warn them from Me. [Is 52:8; 56:10; 62:6; Jer 6:17] '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When I say to the wicked, ‘You will certainly die,’ and you do not warn him or speak out to tell him to turn from his wicked way to save his life, that same evil man will die in his sin, but you will be responsible for his blood. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'However, if you have warned the wicked and he does not turn from his wickedness or from his wicked way, he will die in his sin; but you have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: delivered
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'freed yourself [from responsibility]. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Again, when a righteous man turns from his righteousness (right standing with God) and sins, and I place an obstacle before him, he will die; since you have not warned him, he will die in his sin, and the righteous deeds which he has done will not be remembered; but you will be responsible for his blood. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'However, if you have warned the righteous man not to sin and he does not sin, he will surely live because he took warning; also you have '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: delivered
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: freed yourself [from responsibility].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The hand of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was on me there, and He said to me, “Arise, go out to the plain, and I will speak to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So I got up and went out to the plain; and behold, the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was standing there, like the glory I had seen by the River Chebar, and I fell face downward. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the Spirit entered me and made me stand on my feet; He spoke and said to me, “Go, shut yourself up in your house. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As for you, son of man, they will put ropes on you and bind you with them so that you cannot go out among them. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And I will make your tongue stick to the roof of your mouth so that you cannot talk and you cannot be a man who rebukes the people, for they are a rebellious house. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But when I speak with you, I will open your mouth and you will say to them, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .’ He who hears, let him hear; and he who refuses [to hear], let him refuse; for they are a rebellious house.
