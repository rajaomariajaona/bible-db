    - type: usfm
      marker: wj
      children:
      - type: text
        text: the debt.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But that same slave went out and found one of his fellow slaves who owed him '
    - type: usfm
