      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: child like this in My name receives Me;
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
