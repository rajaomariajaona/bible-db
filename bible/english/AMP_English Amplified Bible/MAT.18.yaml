    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Forgiveness
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Peter came to Him and asked, “Lord, how many times will my brother sin against me and I forgive him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' let it go? Up to seven times?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I say to you, not up to seven times, but seventy times seven.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Therefore the kingdom of heaven is like a king who wished to settle accounts with his slaves.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'When he began the accounting, one who owed him 10,000 '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A talent was a measurement of weight, usually 58-80 pounds. One talent of silver was worth more than 15 years’ wages. One talent of gold was worth even more. 10,000 talents would be an inconceivable amount of debt for a slave in the king’s service to repay.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: talents was brought to him.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But because he could not repay, his master ordered him to be sold, with his wife and his children and everything that he possessed, and payment to be made.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
