        text: 'And if it turns out that he finds it, I assure you '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' most solemnly say to you, he rejoices over it more than over the ninety-nine that did not get lost.'
    - type: text
