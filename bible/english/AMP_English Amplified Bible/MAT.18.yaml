    - type: text
      text: ' [every one of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you, if each of you does not forgive his brother from your heart.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Therefore, whoever '
