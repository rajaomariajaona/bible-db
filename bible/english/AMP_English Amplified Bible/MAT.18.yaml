      text: ' [with clarity and in detail] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: everything that had taken place.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Then his master called him and said to him, ‘You wicked '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' contemptible slave, I forgave all that'
    - type: text
