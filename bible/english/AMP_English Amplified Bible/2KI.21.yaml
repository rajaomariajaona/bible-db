document_id: 2KI.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Manasseh Succeeds Hezekiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manasseh was twelve years old when he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Manasseh ruled longer than any other king of Israel or of Judah, and was the most malevolent of all of them.
    marker-yv: yv-n
  - type: text
    text: 'became king, and he reigned for fifty-five years in Jerusalem. His mother’s name was Hephzibah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He did [great] evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', in accordance with the [idolatrous] repulsive acts of the [pagan] nations whom the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' dispossessed before the sons (descendants) of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For he rebuilt the high places [for the worship of pagan gods] which his father Hezekiah had destroyed; and he set up altars for Baal and made an [image of] Asherah, just as Ahab king of Israel had done, and he worshiped all the [starry] host of heaven and served them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And he built [pagan] altars in the house (temple) of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', of which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said, “In Jerusalem I will put My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Deut 12:5.
    marker-yv: yv-n
  - type: text
    text: 'Name (Presence).” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And he built altars for all the host of heaven in the two courtyards of the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He made his son pass through the fire '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' burned him [as an offering to Molech]; he practiced witchcraft and divination, and dealt with mediums and soothsayers. He did great evil in the sight of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', provoking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him to anger
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He made a carved image of the [goddess] Asherah and set it up in the house (temple), of which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to David and to his son Solomon, “In this house and in Jerusalem [in the tribe of Judah], which I have chosen from all the tribes of Israel, I will put My Name forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I will not make the feet of Israel wander anymore from the land which I gave their fathers, if only they will be careful to act in accordance with everything that I have commanded them, and with all the law that My servant Moses commanded them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But they did not listen; and Manasseh seduced them to do more evil than the nations whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' destroyed before the sons (descendants) of Israel.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The King’s Idolatries Rebuked
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke through His servants the prophets, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Because Manasseh king of Judah has committed these repulsive acts, having done more evil than all the Amorites did who were before him, and has also made Judah sin with his idols; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel: ‘Behold, I am bringing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such
  - type: text
    text: ' catastrophe on Jerusalem and Judah, that everyone who hears of it, both of his ears will ring [from the shock]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will stretch over Jerusalem the measuring line of Samaria and the plummet of the house of Ahab; and I will wipe Jerusalem clean just as one wipes a [dirty] bowl clean, wiping it and turning it upside down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will abandon the remnant (remainder) of My inheritance and hand them over to their enemies; and they will become plunder and spoil to all their enemies, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: because they have done evil in My sight, and have been provoking Me to anger, since the day their fathers came from Egypt to this day.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moreover, Manasseh shed a very great quantity of innocent blood, until he had filled Jerusalem from one end to another; besides his sin with which he made Judah sin, by doing evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [2 Chr 33:1-10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now the rest of the acts of Manasseh, everything that he did, and the sin that he committed, are they not written in the Book of the Chronicles of the Kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Manasseh slept with his fathers [in death] and was buried in the garden of his own house, in the garden of Uzza. And his son Amon became king in his place.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amon Succeeds Manasseh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Amon was twenty-two years old when he became king, and he reigned two years in Jerusalem. His mother’s name was Meshullemeth the daughter of Haruz of Jotbah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He also did evil in the sight of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', just as his father Manasseh had done. [2 Kin 23:26, 27; 24:3, 4] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He walked in all the [evil] ways that his father had walked; and he served the idols that his father had served, and worshiped them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: he abandoned the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of his fathers, and did not walk in the way of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But the servants of Amon conspired against him and killed the king in his own house (palace). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the people of the land [of Judah] killed all those who had conspired against King Amon, and the people of the land made his son Josiah king in his place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now the rest of the acts of Amon which he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He was buried in his tomb in the garden of Uzza, and his son Josiah became king in his place.
