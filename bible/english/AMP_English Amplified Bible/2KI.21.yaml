document_id: 2KI.21,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh Succeeds Hezekiah
  - type: text
    content: 'Manasseh was twelve years old when he '
  - type: note
    content: Manasseh ruled longer than any other king of Israel or of Judah, and was the most malevolent of all of them.
  - type: text
    content: 'became king, and he reigned for fifty-five years in Jerusalem. His mother’s name was Hephzibah. '
  '10':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke through His servants the prophets, saying, '
  '11':
  - type: text
    content: '“Because Manasseh king of Judah has committed these repulsive acts, having done more evil than all the Amorites did who were before him, and has also made Judah sin with his idols; '
  '12':
  - type: text
    content: therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel: ‘Behold, I am bringing '
  - type: text
    content: such
  - type: text
    content: ' catastrophe on Jerusalem and Judah, that everyone who hears of it, both of his ears will ring [from the shock]. '
  '13':
  - type: text
    content: 'I will stretch over Jerusalem the measuring line of Samaria and the plummet of the house of Ahab; and I will wipe Jerusalem clean just as one wipes a [dirty] bowl clean, wiping it and turning it upside down. '
  '14':
  - type: text
    content: 'I will abandon the remnant (remainder) of My inheritance and hand them over to their enemies; and they will become plunder and spoil to all their enemies, '
  '15':
  - type: text
    content: because they have done evil in My sight, and have been provoking Me to anger, since the day their fathers came from Egypt to this day.’ ”
  '16':
  - type: text
    content: Moreover, Manasseh shed a very great quantity of innocent blood, until he had filled Jerusalem from one end to another; besides his sin with which he made Judah sin, by doing evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: '. [2 Chr 33:1-10] '
  '17':
  - type: text
    content: 'Now the rest of the acts of Manasseh, everything that he did, and the sin that he committed, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '18':
  - type: text
    content: Manasseh slept with his fathers [in death] and was buried in the garden of his own house, in the garden of Uzza. And his son Amon became king in his place.
  - type: heading
    content: Amon Succeeds Manasseh
  '19':
  - type: text
    content: 'Amon was twenty-two years old when he became king, and he reigned two years in Jerusalem. His mother’s name was Meshullemeth the daughter of Haruz of Jotbah. '
  '2':
  - type: text
    content: He did [great] evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with the [idolatrous] repulsive acts of the [pagan] nations whom the L'
  - type: heading
    content: ord
  - type: text
    content: ' dispossessed before the sons (descendants) of Israel. '
  '20':
  - type: text
    content: He also did evil in the sight of the L
  - type: heading
    content: ord
  - type: text
    content: ', just as his father Manasseh had done. [2 Kin 23:26, 27; 24:3, 4] '
  '21':
  - type: text
    content: 'He walked in all the [evil] ways that his father had walked; and he served the idols that his father had served, and worshiped them; '
  '22':
  - type: text
    content: he abandoned the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of his fathers, and did not walk in the way of the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'But the servants of Amon conspired against him and killed the king in his own house (palace). '
  '24':
  - type: text
    content: 'Then the people of the land [of Judah] killed all those who had conspired against King Amon, and the people of the land made his son Josiah king in his place. '
  '25':
  - type: text
    content: 'Now the rest of the acts of Amon which he did, are they not written in the Book of the Chronicles of the Kings of Judah? '
  '26':
  - type: text
    content: He was buried in his tomb in the garden of Uzza, and his son Josiah became king in his place.
  '3':
  - type: text
    content: 'For he rebuilt the high places [for the worship of pagan gods] which his father Hezekiah had destroyed; and he set up altars for Baal and made an [image of] Asherah, just as Ahab king of Israel had done, and he worshiped all the [starry] host of heaven and served them. '
  '4':
  - type: text
    content: And he built [pagan] altars in the house (temple) of the L
  - type: heading
    content: ord
  - type: text
    content: ', of which the L'
  - type: heading
    content: ord
  - type: text
    content: ' had said, “In Jerusalem I will put My '
  - type: note
    content: See note Deut 12:5.
  - type: text
    content: 'Name (Presence).” '
  '5':
  - type: text
    content: And he built altars for all the host of heaven in the two courtyards of the house of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'He made his son pass through the fire '
  - type: text
    content: and
  - type: text
    content: ' burned him [as an offering to Molech]; he practiced witchcraft and divination, and dealt with mediums and soothsayers. He did great evil in the sight of the L'
  - type: heading
    content: ord
  - type: text
    content: ', provoking '
  - type: text
    content: Him to anger
  - type: text
    content: '. '
  '7':
  - type: text
    content: He made a carved image of the [goddess] Asherah and set it up in the house (temple), of which the L
  - type: heading
    content: ord
  - type: text
    content: ' said to David and to his son Solomon, “In this house and in Jerusalem [in the tribe of Judah], which I have chosen from all the tribes of Israel, I will put My Name forever. '
  '8':
  - type: text
    content: 'And I will not make the feet of Israel wander anymore from the land which I gave their fathers, if only they will be careful to act in accordance with everything that I have commanded them, and with all the law that My servant Moses commanded them.” '
  '9':
  - type: text
    content: But they did not listen; and Manasseh seduced them to do more evil than the nations whom the L
  - type: heading
    content: ord
  - type: text
    content: ' destroyed before the sons (descendants) of Israel.'
  - type: heading
    content: The King’s Idolatries Rebuked
