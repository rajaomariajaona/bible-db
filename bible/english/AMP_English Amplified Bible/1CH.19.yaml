verses:
  '1':
  - type: heading
    content: David’s Messengers Abused
  - type: text
    content: 'Now it came about after this, that Nahash king of the Ammonites died, and his son became king in his place. '
  '10':
  - type: text
    content: 'Now when Joab saw that the battle was set against him in the front and in the rear, he chose '
  - type: text
    content: warriors
  - type: text
    content: ' from all the choice men of Israel and put them in formation against the Arameans (Syrians). '
  '11':
  - type: text
    content: 'The rest of the soldiers he placed in the hand of Abishai his brother, and they lined up against the Ammonites. '
  '12':
  - type: text
    content: 'He said, “If the Arameans are too strong for me, then you shall help me; but if the Ammonites are too strong for you, I will help you. '
  '13':
  - type: text
    content: Be strong and let us show ourselves courageous for the sake of our people and for the cities of our God; and may the L
  - type: heading
    content: ord
  - type: text
    content: ' do what is good in His sight.” '
  '14':
  - type: text
    content: 'So Joab and the people who were with him approached the Arameans for battle, and they fled before him. '
  '15':
  - type: text
    content: When the Ammonites saw that the Arameans fled, they also fled before Abishai, Joab’s brother, and entered the city [Medeba]. Then Joab came to Jerusalem.
  '16':
  - type: text
    content: 'When the Arameans (Syrians) saw that they had been defeated by Israel, they sent messengers and brought out the Arameans who were beyond the [Euphrates] River, with Shophach the commander of the army of Hadadezer leading them. '
  '17':
  - type: text
    content: 'When this was told to David, he gathered all Israel and crossed the Jordan, and came upon them and drew up in formation against them. So when David drew up in battle array against the Arameans, they fought against him. '
  '18':
  - type: text
    content: 'But the Arameans fled before Israel, and David killed of the Arameans 7,000 charioteers and 40,000 foot soldiers, and put to death Shophach the commander of the army. '
  '19':
  - type: text
    content: 'When the servants of Hadadezer saw that they had been defeated by Israel, they made peace with David and became subject to '
  - type: text
    content: and
  - type: text
    content: ' served him. And the Arameans (Syrians) were not willing to help the Ammonites anymore.'
  '2':
  - type: text
    content: 'David said, “I will be kind (gracious) to Hanun son of Nahash, because his father was kind to me.” So David sent messengers to comfort him concerning [the death of] his father. And the servants of David came to the land of the Ammonites to comfort Hanun. '
  '3':
  - type: text
    content: But the leaders of the Ammonites said to Hanun, “
  - type: note
    content: Lit In your eyes has David.
  - type: text
    content: 'Do you think that David has sent people to console '
  - type: text
    content: and
  - type: text
    content: ' comfort you because he honors your father? Have his servants not come to you to search and to overthrow and to spy out the land?” '
  '4':
  - type: text
    content: 'Therefore Hanun took David’s servants, shaved them [cutting off half their beards], and cut off their garments in the middle as far as their buttocks, and sent them away [in humiliation]. '
  '5':
  - type: text
    content: 'When David was told how the men were treated, he sent '
  - type: text
    content: messengers
  - type: text
    content: ' to meet them, for they were very humiliated '
  - type: text
    content: and
  - type: text
    content: ' ashamed [to return]. So the king said, “Stay in Jericho until your beards grow [back], and '
  - type: text
    content: then
  - type: text
    content: ' return.”'
  '6':
  - type: text
    content: 'When the Ammonites saw that they had made themselves hateful to David, Hanun and his people sent 1,000 talents of silver to hire for themselves chariots and horsemen from Mesopotamia, Aram-maacah, and Zobah. '
  '7':
  - type: text
    content: 'So they hired for themselves 32,000 chariots and the king of Maacah and his troops, who came and camped before Medeba. And the Ammonites gathered together from their cities and came to battle. '
  '8':
  - type: text
    content: 'When David heard '
  - type: text
    content: about it
  - type: text
    content: ', he sent Joab and all the army of courageous men. '
  '9':
  - type: text
    content: The Ammonites came out and lined up in battle formation at the entrance of the city [Medeba], while the kings who had come were by themselves in the open country.
  - type: heading
    content: Ammon and Aram Defeated
