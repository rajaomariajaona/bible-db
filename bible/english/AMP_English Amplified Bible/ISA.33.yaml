document_id: ISA.33,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Judgment of God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe (judgment is coming) to you, O destroyer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who were not destroyed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he who is treacherous, while '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' did not deal treacherously with him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As soon as you finish destroying, you will be destroyed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As soon as you stop dealing treacherously, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' will deal treacherously with you.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now I will arise,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now I will be exalted; now I will be lifted up.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have conceived dried grass, you will give birth to stubble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My breath is a fire that will consume you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The peoples will be burned to lime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like thorns cut down which are burned in the fire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“You who are far away, hear what I have done;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you who are near, acknowledge My might.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sinners in Zion are terrified;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trembling has seized the godless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[They cry] “Who among us can live with the consuming fire?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who among us can live with everlasting burning?”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who walks righteously and speaks with integrity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who rejects gain from fraud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' from oppression,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who shakes his hand free from the taking of bribes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who stops his ears from hearing about bloodshed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And shuts his eyes to avoid looking upon evil;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will dwell on the heights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His place of defense will be the fortress of rocks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His bread will be given him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His water will be permanent.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Your eyes will see the King in His beauty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will see a far-distant land.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your mind will meditate on the terror [asking]:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where is he who counts?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is he who weighs [the tribute]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is he who counts the towers?”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will no longer see the fierce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insolent people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A people of unintelligible speech which no one comprehends,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Of a strange '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stammering tongue which no one understands.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', be gracious to us; we have waited [expectantly] for You.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be the arm of Your servants every morning [that is, their strength and their defense],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our salvation also in the time of trouble.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look upon Zion, the city of our appointed feasts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' observances;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your eyes will see Jerusalem, an undisturbed settlement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A tent which will not be taken down;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one of its stakes will ever be pulled up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor any of its ropes be severed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But there the mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' magnificent L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be for us'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A place of broad rivers and streams,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where no oar-driven boat will go,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And on which no mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stately ship will pass.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is our Judge,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is our Ruler,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is our King;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will save us. [Is 2:3, 4; 11:4; 32:1; James 4:12]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your ship’s ropes (tackle) hang loose;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cannot hold the base of their mast firmly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor spread out the sail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then an abundance of spoil and plunder will be divided;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the lame will take the plunder.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no inhabitant [of Zion] will say, “I am sick”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people who dwell there will be forgiven their wickedness [their sin, their injustice, their wrongdoing].
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the sound of the tumult, the peoples flee;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the lifting up of Yourself nations scatter.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your spoil [of Israel’s foe] is gathered [by the people of Jerusalem] as the caterpillar gathers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As locusts swarming so people swarm on it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is exalted, for He dwells on high;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has filled Zion with justice and righteousness.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He will be the security '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' stability of your times,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A treasure of salvation, wisdom and knowledge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is your treasure.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now look, their brave men shout outside;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ambassadors [seeking a treaty] of peace weep bitterly.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The highways are deserted, the traveler has ceased [to appear].
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The enemy
    - type: text
      text: ' has broken the covenant, he has rejected the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The DSS read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: witnesses.
      marker-yv: yv-n
    - type: text
      text: cities,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has no regard for [any] man.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land mourns and dries out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lebanon is shamed and [its lush foliage] withers;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fertile pasture region south of Mt. Carmel.
      marker-yv: yv-n
    - type: text
      text: Sharon is like a desert plain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fertile plateau east of the Jordan River.
      marker-yv: yv-n
    - type: text
      text: 'Bashan and [Mount] Carmel shake off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their leaves.
