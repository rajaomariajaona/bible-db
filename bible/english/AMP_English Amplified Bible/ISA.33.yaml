document_id: ISA.33,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Judgment of God
  - type: text
    content: Woe (judgment is coming) to you, O destroyer,
  - type: text
    content: You who were not destroyed,
  - type: text
    content: 'And he who is treacherous, while '
  - type: text
    content: others
  - type: text
    content: ' did not deal treacherously with him.'
  - type: text
    content: As soon as you finish destroying, you will be destroyed;
  - type: text
    content: 'As soon as you stop dealing treacherously, '
  - type: text
    content: others
  - type: text
    content: ' will deal treacherously with you.'
  '10':
  - type: text
    content: “Now I will arise,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: “Now I will be exalted; now I will be lifted up.
  '11':
  - type: text
    content: “You have conceived dried grass, you will give birth to stubble;
  - type: text
    content: My breath is a fire that will consume you.
  '12':
  - type: text
    content: “The peoples will be burned to lime,
  - type: text
    content: Like thorns cut down which are burned in the fire.
  '13':
  - type: text
    content: ¶“You who are far away, hear what I have done;
  - type: text
    content: And you who are near, acknowledge My might.”
  '14':
  - type: text
    content: The sinners in Zion are terrified;
  - type: text
    content: Trembling has seized the godless.
  - type: text
    content: '[They cry] “Who among us can live with the consuming fire?'
  - type: text
    content: Who among us can live with everlasting burning?”
  '15':
  - type: text
    content: He who walks righteously and speaks with integrity,
  - type: text
    content: 'Who rejects gain from fraud '
  - type: text
    content: and
  - type: text
    content: ' from oppression,'
  - type: text
    content: Who shakes his hand free from the taking of bribes,
  - type: text
    content: Who stops his ears from hearing about bloodshed
  - type: text
    content: And shuts his eyes to avoid looking upon evil;
  '16':
  - type: text
    content: He will dwell on the heights,
  - type: text
    content: His place of defense will be the fortress of rocks,
  - type: text
    content: His bread will be given him;
  - type: text
    content: His water will be permanent.
  '17':
  - type: text
    content: ¶Your eyes will see the King in His beauty;
  - type: text
    content: They will see a far-distant land.
  '18':
  - type: text
    content: 'Your mind will meditate on the terror [asking]:'
  - type: text
    content: “Where is he who counts?
  - type: text
    content: Where is he who weighs [the tribute]?
  - type: text
    content: Where is he who counts the towers?”
  '19':
  - type: text
    content: 'You will no longer see the fierce '
  - type: text
    content: and
  - type: text
    content: ' insolent people,'
  - type: text
    content: A people of unintelligible speech which no one comprehends,
  - type: text
    content: 'Of a strange '
  - type: text
    content: and
  - type: text
    content: ' stammering tongue which no one understands.'
  '2':
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', be gracious to us; we have waited [expectantly] for You.'
  - type: text
    content: Be the arm of Your servants every morning [that is, their strength and their defense],
  - type: text
    content: Our salvation also in the time of trouble.
  '20':
  - type: text
    content: 'Look upon Zion, the city of our appointed feasts '
  - type: text
    content: and
  - type: text
    content: ' observances;'
  - type: text
    content: Your eyes will see Jerusalem, an undisturbed settlement,
  - type: text
    content: A tent which will not be taken down;
  - type: text
    content: Not one of its stakes will ever be pulled up,
  - type: text
    content: Nor any of its ropes be severed.
  '21':
  - type: text
    content: 'But there the mighty '
  - type: text
    content: and
  - type: text
    content: ' magnificent L'
  - type: heading
    content: ord
  - type: text
    content: ' will be for us'
  - type: text
    content: A place of broad rivers and streams,
  - type: text
    content: Where no oar-driven boat will go,
  - type: text
    content: 'And on which no mighty '
  - type: text
    content: and
  - type: text
    content: ' stately ship will pass.'
  '22':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' is our Judge,'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is our Ruler,'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is our King;'
  - type: text
    content: He will save us. [Is 2:3, 4; 11:4; 32:1; James 4:12]
  '23':
  - type: text
    content: Your ship’s ropes (tackle) hang loose;
  - type: text
    content: They cannot hold the base of their mast firmly,
  - type: text
    content: Nor spread out the sail.
  - type: text
    content: Then an abundance of spoil and plunder will be divided;
  - type: text
    content: Even the lame will take the plunder.
  '24':
  - type: text
    content: And no inhabitant [of Zion] will say, “I am sick”;
  - type: text
    content: The people who dwell there will be forgiven their wickedness [their sin, their injustice, their wrongdoing].
  '3':
  - type: text
    content: At the sound of the tumult, the peoples flee;
  - type: text
    content: At the lifting up of Yourself nations scatter.
  '4':
  - type: text
    content: Your spoil [of Israel’s foe] is gathered [by the people of Jerusalem] as the caterpillar gathers;
  - type: text
    content: As locusts swarming so people swarm on it.
  '5':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' is exalted, for He dwells on high;'
  - type: text
    content: He has filled Zion with justice and righteousness.
  '6':
  - type: text
    content: 'And He will be the security '
  - type: text
    content: and
  - type: text
    content: ' stability of your times,'
  - type: text
    content: A treasure of salvation, wisdom and knowledge;
  - type: text
    content: The fear of the L
  - type: heading
    content: ord
  - type: text
    content: ' is your treasure.'
  '7':
  - type: text
    content: Now look, their brave men shout outside;
  - type: text
    content: The ambassadors [seeking a treaty] of peace weep bitterly.
  '8':
  - type: text
    content: The highways are deserted, the traveler has ceased [to appear].
  - type: text
    content: The enemy
  - type: text
    content: ' has broken the covenant, he has rejected the '
  - type: note
    content: The DSS read witnesses.
  - type: text
    content: cities,
  - type: text
    content: He has no regard for [any] man.
  '9':
  - type: text
    content: The land mourns and dries out,
  - type: text
    content: Lebanon is shamed and [its lush foliage] withers;
  - type: note
    content: The fertile pasture region south of Mt. Carmel.
  - type: text
    content: Sharon is like a desert plain,
  - type: text
    content: 'And '
  - type: note
    content: The fertile plateau east of the Jordan River.
  - type: text
    content: 'Bashan and [Mount] Carmel shake off '
  - type: text
    content: their leaves.
