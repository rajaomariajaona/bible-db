document_id: ISA.33
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Judgment of God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe (judgment is coming) to you, O destroyer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who were not destroyed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And he who is treacherous, while '
  - type: usfm
    marker: it
    children:
    - type: text
      text: others
  - type: text
    text: ' did not deal treacherously with him.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As soon as you finish destroying, you will be destroyed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As soon as you stop dealing treacherously, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: others
  - type: text
    text: ' will deal treacherously with you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', be gracious to us; we have waited [expectantly] for You.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be the arm of Your servants every morning [that is, their strength and their defense],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our salvation also in the time of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: At the sound of the tumult, the peoples flee;
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the lifting up of Yourself nations scatter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your spoil [of Israel’s foe] is gathered [by the people of Jerusalem] as the caterpillar gathers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: As locusts swarming so people swarm on it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is exalted, for He dwells on high;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has filled Zion with justice and righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And He will be the security '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stability of your times,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A treasure of salvation, wisdom and knowledge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The fear of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is your treasure.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now look, their brave men shout outside;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ambassadors [seeking a treaty] of peace weep bitterly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The highways are deserted, the traveler has ceased [to appear].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The enemy
  - type: text
    text: ' has broken the covenant, he has rejected the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The DSS read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: witnesses.
    marker-yv: yv-n
  - type: text
    text: cities,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has no regard for [any] man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The land mourns and dries out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lebanon is shamed and [its lush foliage] withers;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The fertile pasture region south of Mt. Carmel.
    marker-yv: yv-n
  - type: text
    text: Sharon is like a desert plain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The fertile plateau east of the Jordan River.
    marker-yv: yv-n
  - type: text
    text: 'Bashan and [Mount] Carmel shake off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their leaves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Now I will arise,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now I will be exalted; now I will be lifted up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “You have conceived dried grass, you will give birth to stubble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My breath is a fire that will consume you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “The peoples will be burned to lime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like thorns cut down which are burned in the fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“You who are far away, hear what I have done;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you who are near, acknowledge My might.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The sinners in Zion are terrified;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trembling has seized the godless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[They cry] “Who among us can live with the consuming fire?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who among us can live with everlasting burning?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He who walks righteously and speaks with integrity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who rejects gain from fraud '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' from oppression,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who shakes his hand free from the taking of bribes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who stops his ears from hearing about bloodshed
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shuts his eyes to avoid looking upon evil;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He will dwell on the heights,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His place of defense will be the fortress of rocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His bread will be given him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His water will be permanent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Your eyes will see the King in His beauty;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will see a far-distant land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Your mind will meditate on the terror [asking]:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is he who counts?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is he who weighs [the tribute]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is he who counts the towers?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You will no longer see the fierce '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' insolent people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A people of unintelligible speech which no one comprehends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Of a strange '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stammering tongue which no one understands.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Look upon Zion, the city of our appointed feasts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' observances;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your eyes will see Jerusalem, an undisturbed settlement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A tent which will not be taken down;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one of its stakes will ever be pulled up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor any of its ropes be severed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But there the mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' magnificent L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will be for us'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A place of broad rivers and streams,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where no oar-driven boat will go,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And on which no mighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' stately ship will pass.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is our Judge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is our Ruler,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is our King;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will save us. [Is 2:3, 4; 11:4; 32:1; James 4:12]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Your ship’s ropes (tackle) hang loose;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cannot hold the base of their mast firmly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor spread out the sail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then an abundance of spoil and plunder will be divided;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the lame will take the plunder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And no inhabitant [of Zion] will say, “I am sick”;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people who dwell there will be forgiven their wickedness [their sin, their injustice, their wrongdoing].
