  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then Jonathan said to David, “Tomorrow is the New Moon [festival], and you will be missed because your seat will be empty. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'When you have stayed for three days, you shall go down quickly and come to the place where you hid yourself '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: on the day of the doing
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on that eventful day [when my father tried to kill you], and shall stay by the stone Ezel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jonathan said to him, “Far from it! You shall not die. My father does nothing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: great or small
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'important or insignificant without telling me. So why would he hide this thing from me? It is not so!” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I will shoot three arrows to the side of it, as though I shot at a target. '
  '21':
  - type: usfm
