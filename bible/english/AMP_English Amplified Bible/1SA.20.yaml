verses:
  '1':
  - type: heading
    content: David and Jonathan’s Covenant
  - type: text
    content: 'David fled from Naioth in Ramah and he came and said to Jonathan, “What have I done? What is my '
  - type: note
    content: Or iniquity.
  - type: text
    content: 'guilt? What is my sin before (against) your father, that he is seeking my life?” '
  '10':
  - type: text
    content: 'Then David said to Jonathan, “Who will tell me if your father answers you harshly?” '
  '11':
  - type: text
    content: Jonathan said to David, “Come, let us go out into the field [to talk].” So they went out to the field.
  '12':
  - type: text
    content: Then Jonathan said to David, “The L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, '
  - type: text
    content: is my witness!
  - type: text
    content: ' When I have sounded out my father about this time tomorrow, or the third day, behold, if he has a good '
  - type: text
    content: feeling
  - type: text
    content: ' toward '
  - type: note
    content: Lit David.
  - type: text
    content: 'you, shall I not then send '
  - type: text
    content: word
  - type: text
    content: ' to you and make it known to you? '
  '13':
  - type: text
    content: 'But if it pleases my father '
  - type: text
    content: to do
  - type: text
    content: ' you harm, may the L'
  - type: heading
    content: ord
  - type: text
    content: ' do so to Jonathan, and more if I do not let you know about it and send you away, so that you may go in '
  - type: note
    content: Lit shalom.
  - type: text
    content: 'safety. And '
  - type: note
    content: With this statement Jonathan acknowledges that David has been anointed king.
  - type: text
    content: may the L
  - type: heading
    content: ord
  - type: text
    content: ' be with you as He has been with my father. '
  '14':
  - type: text
    content: 'If I am still alive, will you not show me the lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' faithfulness of the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
  - type: note
    content: To secure his throne a new king would usually kill anyone who was a potential rival for the throne. Jonathan is asking assurance that he will not be assassinated after David becomes king.
  - type: text
    content: 'so that I will not die? '
  '15':
  - type: text
    content: 'You shall never cut off your lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' faithfulness from my house, not even when the L'
  - type: heading
    content: ord
  - type: text
    content: ' cuts off every one of the enemies of David from the face of the earth.” '
  '16':
  - type: text
    content: 'So Jonathan made a '
  - type: text
    content: covenant
  - type: text
    content: ' with the '
  - type: note
    content: This covenant was binding not only on David and Jonathan, but also on their descendants.
  - type: text
    content: house of David. [
  - type: note
    content: This may have been the additional vow mentioned in v 17.
  - type: text
    content: 'He added,] “May '
  - type: note
    content: Jonathan was aligning himself with David against all of David’s enemies, including Saul.
  - type: text
    content: the L
  - type: heading
    content: ord
  - type: text
    content: ' require it at the hands of David’s enemies. [that is, hold them accountable for any harm they inflict on David].” '
  '17':
  - type: text
    content: Jonathan made David vow again because of his love for him, for Jonathan loved him as himself.
  '18':
  - type: text
    content: 'Then Jonathan said to David, “Tomorrow is the New Moon [festival], and you will be missed because your seat will be empty. '
  '19':
  - type: text
    content: 'When you have stayed for three days, you shall go down quickly and come to the place where you hid yourself '
  - type: note
    content: Lit on the day of the doing.
  - type: text
    content: 'on that eventful day [when my father tried to kill you], and shall stay by the stone Ezel. '
  '2':
  - type: text
    content: 'Jonathan said to him, “Far from it! You shall not die. My father does nothing '
  - type: note
    content: Lit great or small.
  - type: text
    content: 'important or insignificant without telling me. So why would he hide this thing from me? It is not so!” '
  '20':
  - type: text
    content: 'I will shoot three arrows to the side of it, as though I shot at a target. '
  '21':
  - type: text
    content: 'And I will send a boy, '
  - type: text
    content: saying,
  - type: text
    content: ' ‘Go, find the arrows.’ If I specifically say to the boy, ‘Look, the arrows are on this side of you, get them,’ then come [back to my father’s table]; for it is '
  - type: note
    content: Lit shalom.
  - type: text
    content: 'safe for you and there is '
  - type: note
    content: Lit nothing.
  - type: text
    content: no danger, as the L
  - type: heading
    content: ord
  - type: text
    content: ' lives. '
  '22':
  - type: text
    content: But if I say to the boy, ‘Look, the arrows are beyond you,’ then go, for the L
  - type: heading
    content: ord
  - type: text
    content: ' has sent you away. '
  '23':
  - type: text
    content: As for the agreement of which you and I have spoken, behold, the L
  - type: heading
    content: ord
  - type: text
    content: ' is between you and me forever [making sure that we each keep our word].”'
  '24':
  - type: text
    content: 'So David hid in the field; and when the New Moon [festival] came, the king sat down to eat food. '
  '25':
  - type: text
    content: 'The king sat on his seat as on previous occasions, on his seat by the wall; then Jonathan stood up, and Abner [his commander] sat down by Saul’s side, but David’s place was empty. '
  '26':
  - type: text
    content: 'Yet Saul did not say anything that day, for he thought, “It is an incident [of some kind] and '
  - type: note
    content: Saul assumed that David had come into contact with a source of ritual pollution, such as a corpse, and was for that reason temporarily disqualified from participating in the New Moon Festival.
  - type: text
    content: 'he is not [ceremonially] clean—surely he is unclean.” '
  '27':
  - type: text
    content: 'But on the next day, the second '
  - type: text
    content: day
  - type: text
    content: ' of the new moon, David’s place was empty [again]; and Saul said to Jonathan his son, “Why has the son of Jesse not come to the meal, either yesterday or today?” '
  '28':
  - type: text
    content: 'Jonathan answered Saul, “David earnestly asked me for permission '
  - type: text
    content: to go
  - type: text
    content: ' to Bethlehem. '
  '29':
  - type: text
    content: He said, ‘Please let me go because our family is holding a sacrifice in the city, and my brother has commanded me to attend. Now, if I have found favor in your eyes, please let me slip away so that I may see my brothers.’ That is why he has not come to the king’s table.”
  - type: heading
    content: Saul Is Angry with Jonathan
  '3':
  - type: text
    content: But David vowed again, saying “Your father certainly knows that I have found favor in your sight, and he has said, ‘Do not let Jonathan know this, or he will be worried.’ But truly as the L
  - type: heading
    content: ord
  - type: text
    content: ' lives and as your soul lives, there is hardly a step between me and death.” '
  '30':
  - type: text
    content: 'Then Saul’s anger burned against Jonathan and he said to him, “You son of a '
  - type: note
    content: The vulgar language of this Hebrew idiom demeaned Jonathan, not his mother, and Saul implied that she was ashamed of giving birth to him.
  - type: text
    content: 'wayward, rebellious woman! Do I not know that you have chosen the son of Jesse [over me] to your own shame, and to the shame of your mother’s nakedness? '
  '31':
  - type: text
    content: 'For as long as the son of Jesse lives on the earth, neither you [as heir to the throne] nor your kingdom will be established. So now, send [someone] and bring him to me, for he '
  - type: note
    content: Lit is a son of death.
  - type: text
    content: 'must die.” '
  '32':
  - type: text
    content: 'Jonathan answered Saul his father, “Why must he be put to death? What has he done?” '
  '33':
  - type: text
    content: 'Then Saul hurled his spear at him to strike him down, so Jonathan knew [without any doubt] that his father had decided to put David to death. '
  '34':
  - type: text
    content: 'Then Jonathan stood up from the table in the heat of anger, and ate no food on that second day of the new moon (month), for he grieved '
  - type: text
    content: and
  - type: text
    content: ' worried about David because his father had dishonored him.'
  '35':
  - type: text
    content: 'In the morning Jonathan went out to the field for the meeting with David, and a young boy was with him. '
  '36':
  - type: text
    content: 'And he said to his boy, “Run, please find the arrows which I am about to shoot.” As the boy ran, he shot an arrow past him. '
  '37':
  - type: text
    content: 'When the boy came to the place where Jonathan had shot the arrow, Jonathan called to him, “Is the arrow not beyond you?” '
  '38':
  - type: text
    content: 'And Jonathan called out after the boy, “Hurry, be quick, do not stay!” So Jonathan’s boy picked up the arrow and came back to his master. '
  '39':
  - type: text
    content: 'But the boy was not aware of anything; only Jonathan and David knew about the matter. '
  '4':
  - type: text
    content: 'Then Jonathan said to David, “Whatever you say, I will do for you.” '
  '40':
  - type: text
    content: 'Jonathan gave his weapons to his boy and said to him, “Go, take them to the city.” '
  '41':
  - type: text
    content: 'As soon as the boy was gone, David got up from the south side [beside the mound of stones] and fell on his face to the ground [in submission and respect], and bowed three times. Then they kissed one another and wept together, but David '
  - type: text
    content: wept
  - type: text
    content: ' more. '
  '42':
  - type: text
    content: 'Jonathan told David, “Go '
  - type: note
    content: Lit in shalom.
  - type: text
    content: in safety, inasmuch as we have sworn to each other in the name of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, ‘The L'
  - type: heading
    content: ord
  - type: text
    content: ' shall be between me and you, and between my descendants and yours forever.’ ” '
  - type: note
    content: In Hebrew, this is v 1 of the next chapter making the versification different throughout ch 21.
  - type: text
    content: Then he stood and left, while Jonathan went into the city.
  '5':
  - type: text
    content: 'David said to Jonathan, “Behold, tomorrow is the New Moon [observance], and I should sit at the table to eat [the sacrificial meal] with the king; but let me go, so that I may hide myself in the field until the third evening. '
  '6':
  - type: text
    content: 'If your father misses me at all, then say, ‘David earnestly asked '
  - type: text
    content: permission
  - type: text
    content: ' from me to go to Bethlehem, his city, because it is the yearly sacrifice there for the entire family.’ '
  '7':
  - type: text
    content: 'If he says, ‘All right,’ your servant will be safe; but if he is very angry, then be certain that he has decided on evil. '
  '8':
  - type: text
    content: Therefore show kindness to your servant, because you have brought your servant into a covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' with you. But if there is iniquity (guilt) in me, kill me yourself; for why should you bring me to your father [to be killed]?” '
  '9':
  - type: text
    content: 'Jonathan said, “Far be it from [happening to] you! In fact, if I indeed learn that my father has decided to harm you, would I not tell you about it?” '
