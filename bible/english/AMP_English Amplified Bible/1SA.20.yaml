      children:
      - type: text
        text: covenant
    - type: text
      text: ' with the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This covenant was binding not only on David and Jonathan, but also on their descendants.
      marker-yv: yv-n
    - type: text
      text: house of David. [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may have been the additional vow mentioned in v 17.
      marker-yv: yv-n
    - type: text
      text: 'He added,] “May '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jonathan was aligning himself with David against all of David’s enemies, including Saul.
      marker-yv: yv-n
    - type: text
