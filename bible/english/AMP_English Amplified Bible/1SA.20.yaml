    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has sent you away. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: As for the agreement of which you and I have spoken, behold, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is between you and me forever [making sure that we each keep our word].”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So David hid in the field; and when the New Moon [festival] came, the king sat down to eat food. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The king sat on his seat as on previous occasions, on his seat by the wall; then Jonathan stood up, and Abner [his commander] sat down by Saul’s side, but David’s place was empty. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Yet Saul did not say anything that day, for he thought, “It is an incident [of some kind] and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Saul assumed that David had come into contact with a source of ritual pollution, such as a corpse, and was for that reason temporarily disqualified from participating in the New Moon Festival.
      marker-yv: yv-n
    - type: text
      text: 'he is not [ceremonially] clean—surely he is unclean.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'But on the next day, the second '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the new moon, David’s place was empty [again]; and Saul said to Jonathan his son, “Why has the son of Jesse not come to the meal, either yesterday or today?” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jonathan answered Saul, “David earnestly asked me for permission '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to go
    - type: text
      text: ' to Bethlehem. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He said, ‘Please let me go because our family is holding a sacrifice in the city, and my brother has commanded me to attend. Now, if I have found favor in your eyes, please let me slip away so that I may see my brothers.’ That is why he has not come to the king’s table.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saul Is Angry with Jonathan
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But David vowed again, saying “Your father certainly knows that I have found favor in your sight, and he has said, ‘Do not let Jonathan know this, or he will be worried.’ But truly as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives and as your soul lives, there is hardly a step between me and death.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then Saul’s anger burned against Jonathan and he said to him, “You son of a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The vulgar language of this Hebrew idiom demeaned Jonathan, not his mother, and Saul implied that she was ashamed of giving birth to him.
      marker-yv: yv-n
    - type: text
      text: 'wayward, rebellious woman! Do I not know that you have chosen the son of Jesse [over me] to your own shame, and to the shame of your mother’s nakedness? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For as long as the son of Jesse lives on the earth, neither you [as heir to the throne] nor your kingdom will be established. So now, send [someone] and bring him to me, for he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: is a son of death
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'must die.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jonathan answered Saul his father, “Why must he be put to death? What has he done?” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Then Saul hurled his spear at him to strike him down, so Jonathan knew [without any doubt] that his father had decided to put David to death. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then Jonathan stood up from the table in the heat of anger, and ate no food on that second day of the new moon (month), for he grieved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worried about David because his father had dishonored him.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'In the morning Jonathan went out to the field for the meeting with David, and a young boy was with him. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And he said to his boy, “Run, please find the arrows which I am about to shoot.” As the boy ran, he shot an arrow past him. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'When the boy came to the place where Jonathan had shot the arrow, Jonathan called to him, “Is the arrow not beyond you?” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'And Jonathan called out after the boy, “Hurry, be quick, do not stay!” So Jonathan’s boy picked up the arrow and came back to his master. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'But the boy was not aware of anything; only Jonathan and David knew about the matter. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Jonathan said to David, “Whatever you say, I will do for you.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jonathan gave his weapons to his boy and said to him, “Go, take them to the city.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'As soon as the boy was gone, David got up from the south side [beside the mound of stones] and fell on his face to the ground [in submission and respect], and bowed three times. Then they kissed one another and wept together, but David '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wept
    - type: text
      text: ' more. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jonathan told David, “Go '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in shalom.
      marker-yv: yv-n
    - type: text
      text: in safety, inasmuch as we have sworn to each other in the name of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, ‘The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall be between me and you, and between my descendants and yours forever.’ ” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew, this is v 1 of the next chapter making the versification different throughout ch 21.
      marker-yv: yv-n
    - type: text
      text: Then he stood and left, while Jonathan went into the city.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'David said to Jonathan, “Behold, tomorrow is the New Moon [observance], and I should sit at the table to eat [the sacrificial meal] with the king; but let me go, so that I may hide myself in the field until the third evening. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'If your father misses me at all, then say, ‘David earnestly asked '
    - type: usfm
      marker: it
