document_id: 2SA.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Triumphs
  - type: text
    content: Now it came about after this that David defeated the Philistines and subdued (humbled) them, and he took control of Metheg-ammah [the main city] from the hand of the Philistines.
  '10':
  - type: text
    content: 'Toi sent '
  - type: note
    content: In 1 Chr 18:10, Hadoram.
  - type: text
    content: 'Joram his son to King David to '
  - type: note
    content: Lit ask him about his shalom and bless.
  - type: text
    content: 'greet and congratulate him for his battle and defeat of Hadadezer; for Hadadezer had been at war with Toi. '
  - type: text
    content: Joram
  - type: text
    content: ' brought with him articles of silver, gold, and bronze [as gifts]. '
  '11':
  - type: text
    content: King David also dedicated these [gifts] to the L
  - type: heading
    content: ord
  - type: text
    content: ', along with the silver and gold that he had dedicated from all the nations which he subdued: '
  '12':
  - type: text
    content: from Aram (Syria), Moab, the Ammonites, the Philistines, and Amalek, and from the spoil of Hadadezer the son of Rehob, king of Zobah.
  '13':
  - type: text
    content: 'So David made a name '
  - type: text
    content: for himself
  - type: text
    content: ' when he returned from killing 18,000 '
  - type: note
    content: A few manuscripts read Edomites (the form of the Hebrew letters makes the two names nearly identical).
  - type: text
    content: 'Arameans (Syrians) in the Valley of Salt. '
  '14':
  - type: text
    content: He put garrisons in Edom; in all Edom he put garrisons, and all the Edomites became servants to David. And the L
  - type: heading
    content: ord
  - type: text
    content: ' helped him wherever he went.'
  '15':
  - type: text
    content: 'So David reigned over all Israel, and continued to administer justice and righteousness for all his people. '
  '16':
  - type: text
    content: 'Joab the son of Zeruiah was [commander] over the army; Jehoshaphat the son of Ahilud was recorder (secretary); '
  '17':
  - type: text
    content: 'Zadok the son of Ahitub and Ahimelech the son of Abiathar were the [chief] priests, and Seraiah was the scribe; '
  '18':
  - type: text
    content: 'Benaiah the son of Jehoiada was [head] over both the Cherethites and Pelethites [the king’s bodyguards]; and David’s sons were '
  - type: note
    content: Lit priests. Even though the Hebrew word for priests is used in this verse, David’s sons would not serve as priests because they were from the tribe of Judah, not Levi. The ancient rabbis interpreted the statement to mean that the sons enjoyed some priestly privileges.
  - type: text
    content: chief [confidential] advisers (officials) [to the king]. [1 Chr 18:17]
  '2':
  - type: text
    content: 'He defeated '
  - type: note
    content: I.e. descendants of Lot (Gen 19:37).
  - type: text
    content: 'Moab, and '
  - type: note
    content: In ancient times a conqueror sometimes used an arbitrary system to determine which prisoners to execute.
  - type: text
    content: measured them with a length of rope, making them lie down on the ground; he measured two lengths to [choose those to] put to death, and one full length to [choose those to] be kept alive. And the [surviving] Moabites became servants to David, bringing tribute.
  '3':
  - type: text
    content: 'Then David defeated Hadadezer the son of Rehob, king of '
  - type: note
    content: I.e. an Aramean (Syrian) kingdom.
  - type: text
    content: 'Zobah, as he went to restore his power at the River [Euphrates]. '
  '4':
  - type: text
    content: 'David captured from him 1,700 horsemen and 20,000 foot soldiers. David also hamstrung all the chariot horses (making them lame), but reserved '
  - type: text
    content: enough
  - type: text
    content: ' of them for a hundred chariots. '
  '5':
  - type: text
    content: 'When the Arameans (Syrians) of Damascus came to help Hadadezer, king of Zobah, David struck down 22,000 Arameans. '
  '6':
  - type: text
    content: Then David put garrisons among the Arameans in Damascus, and the Arameans became his servants and brought tribute. The L
  - type: heading
    content: ord
  - type: text
    content: ' helped David wherever he went. '
  '7':
  - type: text
    content: 'David took the shields of gold that were carried by the servants of Hadadezer, and brought them to Jerusalem. '
  '8':
  - type: text
    content: And from Betah and Berothai, cities of Hadadezer, King David took an immense quantity of bronze.
  '9':
  - type: text
    content: 'When Toi king of Hamath heard about David’s defeat of all the forces of Hadadezer, '
