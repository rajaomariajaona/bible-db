document_id: 2SA.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David’s Triumphs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now it came about after this that David defeated the Philistines and subdued (humbled) them, and he took control of Metheg-ammah [the main city] from the hand of the Philistines.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He defeated '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. descendants of Lot (Gen 19:37).
    marker-yv: yv-n
  - type: text
    text: 'Moab, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In ancient times a conqueror sometimes used an arbitrary system to determine which prisoners to execute.
    marker-yv: yv-n
  - type: text
    text: measured them with a length of rope, making them lie down on the ground; he measured two lengths to [choose those to] put to death, and one full length to [choose those to] be kept alive. And the [surviving] Moabites became servants to David, bringing tribute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then David defeated Hadadezer the son of Rehob, king of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. an Aramean (Syrian) kingdom.
    marker-yv: yv-n
  - type: text
    text: 'Zobah, as he went to restore his power at the River [Euphrates]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David captured from him 1,700 horsemen and 20,000 foot soldiers. David also hamstrung all the chariot horses (making them lame), but reserved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: enough
  - type: text
    text: ' of them for a hundred chariots. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the Arameans (Syrians) of Damascus came to help Hadadezer, king of Zobah, David struck down 22,000 Arameans. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then David put garrisons among the Arameans in Damascus, and the Arameans became his servants and brought tribute. The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' helped David wherever he went. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David took the shields of gold that were carried by the servants of Hadadezer, and brought them to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And from Betah and Berothai, cities of Hadadezer, King David took an immense quantity of bronze.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When Toi king of Hamath heard about David’s defeat of all the forces of Hadadezer, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toi sent '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In 1 Chr 18:10, Hadoram.
    marker-yv: yv-n
  - type: text
    text: 'Joram his son to King David to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ask him about his shalom and bless
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'greet and congratulate him for his battle and defeat of Hadadezer; for Hadadezer had been at war with Toi. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Joram
  - type: text
    text: ' brought with him articles of silver, gold, and bronze [as gifts]. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: King David also dedicated these [gifts] to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', along with the silver and gold that he had dedicated from all the nations which he subdued: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: from Aram (Syria), Moab, the Ammonites, the Philistines, and Amalek, and from the spoil of Hadadezer the son of Rehob, king of Zobah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So David made a name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for himself
  - type: text
    text: ' when he returned from killing 18,000 '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A few manuscripts read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Edomites
      - type: text
        text: ' (the form of the Hebrew letters makes the two names nearly identical).'
    marker-yv: yv-n
  - type: text
    text: 'Arameans (Syrians) in the Valley of Salt. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He put garrisons in Edom; in all Edom he put garrisons, and all the Edomites became servants to David. And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' helped him wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So David reigned over all Israel, and continued to administer justice and righteousness for all his people. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab the son of Zeruiah was [commander] over the army; Jehoshaphat the son of Ahilud was recorder (secretary); '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zadok the son of Ahitub and Ahimelech the son of Abiathar were the [chief] priests, and Seraiah was the scribe; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Benaiah the son of Jehoiada was [head] over both the Cherethites and Pelethites [the king’s bodyguards]; and David’s sons were '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: priests
      - type: text
        text: '. Even though the Hebrew word for '
      - type: usfm
        marker: it
        children:
        - type: text
          text: priests
      - type: text
        text: ' is used in this verse, David’s sons would not serve as priests because they were from the tribe of Judah, not Levi. The ancient rabbis interpreted the statement to mean that the sons enjoyed some priestly privileges.'
    marker-yv: yv-n
  - type: text
    text: chief [confidential] advisers (officials) [to the king]. [1 Chr 18:17]
