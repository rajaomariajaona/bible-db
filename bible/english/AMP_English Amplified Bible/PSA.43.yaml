document_id: PSA.43,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 43
  - type: heading
    content: Prayer for Rescue.
  - type: text
    content: 'Judge '
  - type: text
    content: and
  - type: text
    content: ' vindicate me, O God; plead my case against an ungodly nation.'
  - type: text
    content: O rescue me from the deceitful and unjust man!
  '2':
  - type: text
    content: For You are the God of my strength [my stronghold—in whom I take refuge]; why have You rejected me?
  - type: text
    content: Why do I go mourning because of the oppression of the enemy?
  '3':
  - type: text
    content: ¶O send out Your light and Your truth, let them lead me;
  - type: text
    content: Let them bring me to Your holy hill
  - type: text
    content: And to Your dwelling places.
  '4':
  - type: text
    content: Then I will go to the altar of God,
  - type: text
    content: To God, my exceeding joy;
  - type: text
    content: With the lyre I will praise You, O God, my God!
  '5':
  - type: text
    content: ¶Why are you in despair, O my soul?
  - type: text
    content: 'And why are you restless '
  - type: text
    content: and
  - type: text
    content: ' disturbed within me?'
  - type: text
    content: 'Hope in God '
  - type: text
    content: and
  - type: text
    content: ' wait expectantly for Him, for I shall again praise Him,'
  - type: text
    content: 'The '
  - type: note
    content: Or saving acts of.
  - type: text
    content: help of my [sad] countenance and my God.
