document_id: PSA.43,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 43
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Rescue.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicate me, O God; plead my case against an ungodly nation.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O rescue me from the deceitful and unjust man!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You are the God of my strength [my stronghold—in whom I take refuge]; why have You rejected me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do I go mourning because of the oppression of the enemy?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O send out Your light and Your truth, let them lead me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them bring me to Your holy hill
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to Your dwelling places.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will go to the altar of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To God, my exceeding joy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the lyre I will praise You, O God, my God!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Why are you in despair, O my soul?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And why are you restless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disturbed within me?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hope in God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wait expectantly for Him, for I shall again praise Him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: saving acts of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: help of my [sad] countenance and my God.
