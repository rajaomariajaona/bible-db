document_id: 1SA.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Capture of the Ark Provokes God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the Philistines took the ark of God, and they brought it from Ebenezer to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the five major Philistine cities.
      marker-yv: yv-n
    - type: text
      text: 'Ashdod. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So they sent the ark of God to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A major Philistine city north of Ashdod and near the territory of Israel.
      marker-yv: yv-n
    - type: text
      text: 'Ekron. And as the ark of God came to Ekron, the Ekronites cried out, “They have brought the ark of the God of Israel [from Gath] to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: me
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'us, to kill us and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: my
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'our people.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and gathered all the lords of the Philistines and said, “Send away the ark of the God of Israel; let it be returned to its own place, so that it will not kill us and our people.” For there was a deadly panic throughout the city; the hand of God was very heavy (severe) there. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The men who had not died were stricken with tumors and the cry of the city [for help] went up to heaven.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'They took the ark of God and brought it into the house of Dagon and set it beside [the image of] Dagon [their chief idol]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When the people of Ashdod got up early the next day, behold, Dagon had fallen on his face on the ground before the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. So they took Dagon and returned him to his place. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But when they got up early the next morning, behold, Dagon had [again] fallen on his face on the ground before the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and his head and both palms of his hands were [lying] cut off on the threshold; only the trunk [portion] of [the idol of] Dagon was left on him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: This is the reason neither the priests of Dagon nor any who enter Dagon’s house step on the threshold of Dagon in Ashdod to this day.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was heavy on the people of Ashdod, and He caused them to be dumbfounded and struck them with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is possible that this was a type of bubonic plague or infection spread by rats (or fleas hosted by rats), as intimated in 6:4f.
      marker-yv: yv-n
    - type: text
      text: 'tumors, both Ashdod and its territory. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When the men of Ashdod saw what had happened, they said, “The ark of the God of Israel must not remain with us, for His hand is heavy on us and on Dagon our god.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So they sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and gathered all the lords (governors) of the Philistines to them and said, “What shall we do with the ark of the God of Israel?” They answered, “Let the ark of the God of Israel be brought around to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gath was another major Philistine city and the home of their giant warrior, Goliath. Faced with the humiliation of surrendering the ark to Israel, the Philistine governors decided instead to treat it like a dangerous “hot potato” and simply get rid of it by sending it to another city.
      marker-yv: yv-n
    - type: text
      text: 'Gath.” So they took the ark of the God of Israel there. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But it happened that after they had taken it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Gath,
    - type: text
      text: ' the hand of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was against the city, causing an extremely great panic [because of the deaths from the plague], for He struck the people of the city, both young and old, and tumors broke out on them. '
