document_id: LUK.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Heals on the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It happened one Sabbath, when He went for a meal at the house of one of the ruling Pharisees, that they were watching Him closely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' carefully [hoping to entrap Him]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when you are invited, go and sit down
    - type: text
      text: ' [to eat] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: at the last place, so that when your host comes, he will say to you, ‘Friend, move up higher’; and then you will be honored in the presence of all who are at the table with you.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For everyone who exalts himself will be humbled
    - type: text
      text: ' [before others], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and he who '
      - type: usfm
        marker: it
        children:
        - type: text
          text: habitually
      - type: text
        text: ' humbles himself (keeps a realistic self-view) will be exalted.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus also went on to say to the one who had invited Him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you give a luncheon or a dinner, do not invite your friends or your brothers or your relatives or wealthy neighbors, otherwise they may also invite you in return and that will be your repayment.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But when you give a banquet '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' a reception, invite the poor, the disabled, the lame, and the blind,'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and you will be blessed because they cannot repay you; for you will be repaid at the resurrection of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The death of Christ paid the penalty for the sins of believers.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: righteous (the just, the upright).”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When one of those who were reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' with Him heard this, he said to Him, “Blessed (happy, prosperous, to be admired) is he who will eat bread in the kingdom of God!”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of the Dinner
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“A man was giving a big dinner, and he invited many '
      - type: usfm
        marker: it
        children:
        - type: text
          text: guests;
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and at the dinner hour he sent his servant to tell those who had been invited, ‘Come, because everything is ready now.’
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But they all alike began to make excuses. The first one said to him, ‘I have purchased a piece of land and I have to go out and see it; please consider me excused.’
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Another one said, ‘I have purchased five yoke of oxen, and I am going to try them out; please consider me excused.’
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there in front of Him was a man who had '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Edema
        - type: text
          text: ', an abnormal accumulation of serous fluid in the connective tissue, causing swelling.'
      marker-yv: yv-n
    - type: text
      text: 'dropsy (extreme swelling). '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And another said, ‘I have
    - type: text
      text: ' [recently] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: married a wife, and for that reason I am unable to come.’
    - type: text
      text: ' [Deut 24:5] '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the servant came back and reported this to his master. Then
    - type: text
      text: ' [his master,] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the head of the household, became angry
    - type: text
      text: ' [at the rejections of his invitation] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and said to his servant, ‘Go out quickly into the streets and the lanes of the city and bring in here the poor and the disabled and the blind and the lame.’
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the servant
    - type: text
      text: ' [after returning] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: said, ‘Sir, what you commanded has been done, and still there is room.’
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then the master told the servant, ‘Go out into the highways and along the hedges, and compel them to come in, so that my house may be filled
    - type: text
      text: ' [with guests]. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I tell you, not one of those who were invited
    - type: text
      text: ' [and declined] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will taste my dinner.’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Discipleship Tested
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now large crowds were going along with Jesus; and He turned and said to them, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“If anyone comes to Me, and does not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An exaggerated figure of speech indicating a lesser degree of love, not actual hostility or aversion toward one’s earthly family.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: hate his own father and mother and wife and children and brothers and sisters, yes, and even his own life
    - type: text
      text: ' [in the sense of indifference to or relative disregard for them in comparison with his attitude toward God]—'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he cannot be My disciple.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever does not carry his own cross
    - type: text
      text: ' [expressing a willingness to endure whatever may come] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and follow after Me
    - type: text
      text: ' [believing in Me, conforming to My example in living and, if need be, suffering or perhaps dying because of faith in Me] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: cannot be My disciple.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For which one of you, when he wants to build a watchtower
    - type: text
      text: ' [for his guards], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: does not first sit down and calculate the cost, to see if he has enough to finish it?
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Otherwise, when he has laid a foundation and is unable to finish
    - type: text
      text: ' [the building], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: all who see it will begin to ridicule him,
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus asked the lawyers and the Pharisees, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Is it lawful to heal on the Sabbath, or not?”
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: saying, ‘This man began to build and was not able to finish!’
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or what king, when he sets out to meet another king in battle, will not first sit down and consider whether he is strong enough with ten thousand men to encounter the one who is coming against him with twenty thousand?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or else
    - type: text
      text: ' [if he feels he is not powerful enough], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: while the other
    - type: text
      text: ' [king] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is still a far distance away, he sends an envoy and asks for terms of peace.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So then, none of you can be My disciple who does not
    - type: text
      text: ' [carefully consider the cost and then for My sake] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus probably is referring to a willingness and commitment to do so when necessary. Discipleship does not require poverty.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: give up all his own possessions.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Therefore, salt is good; but if salt has become tasteless, with what will it be seasoned?
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'It is fit neither for the soil nor for the manure pile; it is thrown away. He who has ears to hear, let him hear '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' heed My words.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they kept silent. Then He took hold of the man and healed him, and sent him on his way. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Which one of you, having a son or an ox that falls into a well, will not immediately pull him out on the Sabbath day?”
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they were unable to reply to this.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of the Guests
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jesus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' telling a parable to the invited guests when He noticed how they had been selecting the places of honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table,
    - type: text
      text: ' saying to them, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you are invited by someone to a wedding feast, do not sit down
    - type: text
      text: ' [to eat] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: at the place of honor, since a more distinguished person than you may have been invited by the host,
    - type: text
      text: ' [Prov 25:6, 7] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he who invited both of you will come and say to you, ‘Give this man your place,’ and then, in disgrace you proceed to take the last place.
    - type: text
      text: ' '
