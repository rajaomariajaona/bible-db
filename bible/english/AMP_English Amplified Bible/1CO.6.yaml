    content: 'Why, the very fact that you have lawsuits with one another is already a defeat. Why not rather be wronged? Why not rather be defrauded? '
  '8':
  - type: text
    content: On the contrary, it is you who wrong and defraud, and you do this even to your brothers and sisters.
