segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lawsuits Discouraged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Does any one of you, when he has a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a property or civil claim (not a criminal matter) before it goes to court.
    marker-yv: yv-n
  - type: text
    text: 'complaint (civil dispute) with another [believer], dare to go to law before unrighteous men (non-believers) instead of [placing the issue] before the saints (God’s people)? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first of six “Do you not know” statements in this chapter.
    marker-yv: yv-n
  - type: text
    text: 'Do you not know that the saints (God’s people) will [one day] judge the world? If the world is to be judged by you, are you not competent '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to form the smallest courts
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to try trivial (insignificant, petty) cases? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Do you not know that we [believers] will judge angels? How much more then [as to] matters of this life? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So if you have lawsuits dealing with matters of this life, are you appointing those as judges [to hear disputes] who are of no account in the church? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I say this to your shame. Can it be that there is not one wise man among you who [is governed by integrity and] will be able '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' competent to decide [private disputes] between his fellow believers, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: instead,
  - type: text
    text: ' brother goes to law against brother, and that before [judges who are] unbelievers?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Why, the very fact that you have lawsuits with one another is already a defeat. Why not rather be wronged? Why not rather be defrauded? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: On the contrary, it is you who wrong and defraud, and you do this even to your brothers and sisters.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do you not know that the unrighteous will not inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have any share in the kingdom of God? Do not be deceived; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This list of sinners, which continues into v 10, is used by Paul to describe various sinful lifestyles. All such lifestyles are impossible for true believers, who continue to sin but not to live lives of sin.
    marker-yv: yv-n
  - type: text
    text: 'neither the sexually immoral, nor idolaters, nor adulterers, nor (perversely) effeminate, nor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: male homosexuals
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'homosexuals, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'nor thieves, nor the greedy, nor drunkards, nor revilers [whose words are used as weapons to abuse, insult, humiliate, intimidate, or slander], nor swindlers will inherit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' have any share in the kingdom of God. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And such were some of you [before you believed]. But you were washed [by the atoning sacrifice of Christ], you were sanctified [set apart for God, and made holy], you were justified [declared free of guilt] in the name of the Lord Jesus Christ and in the [Holy] Spirit of our God [the source of the believer’s new life and changed behavior].
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Body Is the Lord’s
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Everything is permissible for me, but not all things are beneficial. Everything is permissible for me, but I will not be enslaved by anything [and brought under its power, allowing it to control me]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Food is for the stomach and the stomach for food, but God will do away with both of them. The body is not intended for sexual immorality, but for the Lord, and the Lord is for the body [to save, sanctify, and raise it again because of the sacrifice of the cross]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And God has not only raised the Lord [to life], but will also raise us up by His power. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Do you not know that your bodies are members of Christ? Am I therefore to take the members of Christ and make them part of a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Corinth was famous for its prostitutes, and many if not all probably practiced their trade in connection with the worship of Aphrodite. Having relations with temple or cult prostitutes was considered acceptable behavior, and Paul’s admonitions here indicate that some of the Corinthian converts were continuing the practice.
    marker-yv: yv-n
  - type: text
    text: 'prostitute? Certainly not! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Do you not know that the one who joins himself to a prostitute is one body '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with her?
  - type: text
    text: ' For He says, “T'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: he two shall be one flesh
  - type: text
    text: '.” [Gen 2:24] '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the one who is united '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' joined to the Lord is one spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with Him
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Run away from sexual immorality [in any form, whether thought or behavior, whether visual or written]. Every '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' sin that a man commits is outside the body, but the one who is sexually immoral sins against his own body. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Do you not know that your body is a temple of the Holy Spirit who is within you, whom you have [received as a gift] from God, and that you are not your own [property]? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You were bought with a price [you were actually purchased with the precious blood of Jesus and made His own]. So then, honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify God with your body.'
