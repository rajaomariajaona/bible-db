  '19':
  - type: text
    content: 'Do you not know that your body is a temple of the Holy Spirit who is within you, whom you have [received as a gift] from God, and that you are not your own [property]? '
  '2':
  - type: note
    content: This is the first of six “Do you not know” statements in this chapter.
  - type: text
    content: 'Do you not know that the saints (God’s people) will [one day] judge the world? If the world is to be judged by you, are you not competent '
  - type: note
    content: Or to form the smallest courts.
  - type: text
    content: 'to try trivial (insignificant, petty) cases? '
  '20':
  - type: text
    content: 'You were bought with a price [you were actually purchased with the precious blood of Jesus and made His own]. So then, honor '
  - type: text
    content: and
  - type: text
    content: ' glorify God with your body.'
  '3':
  - type: text
    content: 'Do you not know that we [believers] will judge angels? How much more then [as to] matters of this life? '
  '4':
  - type: text
    content: 'So if you have lawsuits dealing with matters of this life, are you appointing those as judges [to hear disputes] who are of no account in the church? '
  '5':
  - type: text
    content: 'I say this to your shame. Can it be that there is not one wise man among you who [is governed by integrity and] will be able '
  - type: text
    content: and
  - type: text
    content: ' competent to decide [private disputes] between his fellow believers, '
  '6':
