    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Body Is the Lord’s
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everything is permissible for me, but not all things are beneficial. Everything is permissible for me, but I will not be enslaved by anything [and brought under its power, allowing it to control me]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Food is for the stomach and the stomach for food, but God will do away with both of them. The body is not intended for sexual immorality, but for the Lord, and the Lord is for the body [to save, sanctify, and raise it again because of the sacrifice of the cross]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God has not only raised the Lord [to life], but will also raise us up by His power. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that your bodies are members of Christ? Am I therefore to take the members of Christ and make them part of a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Corinth was famous for its prostitutes, and many if not all probably practiced their trade in connection with the worship of Aphrodite. Having relations with temple or cult prostitutes was considered acceptable behavior, and Paul’s admonitions here indicate that some of the Corinthian converts were continuing the practice.
      marker-yv: yv-n
    - type: text
      text: 'prostitute? Certainly not! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that the one who joins himself to a prostitute is one body '
    - type: usfm
      marker: it
