  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And such were some of you [before you believed]. But you were washed [by the atoning sacrifice of Christ], you were sanctified [set apart for God, and made holy], you were justified [declared free of guilt] in the name of the Lord Jesus Christ and in the [Holy] Spirit of our God [the source of the believer’s new life and changed behavior].
  - type: usfm
