  '12':
  - type: text
    content: 'Everything is permissible for me, but not all things are beneficial. Everything is permissible for me, but I will not be enslaved by anything [and brought under its power, allowing it to control me]. '
  '13':
  - type: text
    content: 'Food is for the stomach and the stomach for food, but God will do away with both of them. The body is not intended for sexual immorality, but for the Lord, and the Lord is for the body [to save, sanctify, and raise it again because of the sacrifice of the cross]. '
  '14':
  - type: text
    content: 'And God has not only raised the Lord [to life], but will also raise us up by His power. '
