    - type: usfm
      marker: it
      children:
      - type: text
        text: with Him
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Run away from sexual immorality [in any form, whether thought or behavior, whether visual or written]. Every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sin that a man commits is outside the body, but the one who is sexually immoral sins against his own body. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that your body is a temple of the Holy Spirit who is within you, whom you have [received as a gift] from God, and that you are not your own [property]? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the first of six “Do you not know” statements in this chapter.
      marker-yv: yv-n
    - type: text
      text: 'Do you not know that the saints (God’s people) will [one day] judge the world? If the world is to be judged by you, are you not competent '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to form the smallest courts
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to try trivial (insignificant, petty) cases? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You were bought with a price [you were actually purchased with the precious blood of Jesus and made His own]. So then, honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' glorify God with your body.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that we [believers] will judge angels? How much more then [as to] matters of this life? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you have lawsuits dealing with matters of this life, are you appointing those as judges [to hear disputes] who are of no account in the church? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I say this to your shame. Can it be that there is not one wise man among you who [is governed by integrity and] will be able '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' competent to decide [private disputes] between his fellow believers, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: instead,
    - type: text
      text: ' brother goes to law against brother, and that before [judges who are] unbelievers?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why, the very fact that you have lawsuits with one another is already a defeat. Why not rather be wronged? Why not rather be defrauded? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the contrary, it is you who wrong and defraud, and you do this even to your brothers and sisters.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that the unrighteous will not inherit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' have any share in the kingdom of God? Do not be deceived; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This list of sinners, which continues into v 10, is used by Paul to describe various sinful lifestyles. All such lifestyles are impossible for true believers, who continue to sin but not to live lives of sin.
      marker-yv: yv-n
    - type: text
      text: 'neither the sexually immoral, nor idolaters, nor adulterers, nor (perversely) effeminate, nor '
    - type: usfm
      marker: f
