document_id: JOB.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Chides His Accusers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then Job responded,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: In whose hand is the life of every living thing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the breath of all mankind?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Does the ear not put words to the test,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as the palate tastes its food [distinguishing between the desirable and the undesirable]?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “With the aged [you say] is wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: length of days
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: long life is understanding.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Speaks of the Power of God
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ¶“But [only] with Him are [perfect] wisdom and might;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He [alone] has [true] counsel and understanding.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Behold, He tears down, and it cannot be rebuilt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He imprisons a man, and there can be no release.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Behold, He restrains the waters, and they dry up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Again, He sends the waters out, and they overwhelm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devastate the earth.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “With Him are might and sound wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The misled and the misleader are His [and in His power].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “He makes [great and scheming] counselors walk barefoot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes fools of judges.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “He loosens the bond of kings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And binds their loins with a loincloth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “He makes priests walk barefoot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And He overturns men firmly seated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secure.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “No doubt you are the [only wise] people [in the world],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And wisdom will die with you!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “He deprives the trusted ones of speech
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And takes away the discernment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discretion of the aged.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“He pours contempt on princes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' nobles'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And loosens the belt of the strong [disabling them].
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “He uncovers mysteries [that are difficult to grasp and understand] out of the darkness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And brings black gloom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the shadow of death into light.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “He makes nations great, and He destroys them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He enlarges nations, and leads them away [captive].
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“He removes intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding from the leaders of the people of the earth'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And makes them wander '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' move blindly in a pathless waste.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “They grope in darkness without light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He makes them stagger like a drunken man.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“But I have intelligence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understanding as well as you;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am not inferior to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who does not know such things as these [of God’s wisdom and might]?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I am a joke to my friends;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, one whom God answered when he called upon Him—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A just and blameless man is a joke [and laughed to scorn].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “He who is at ease has contempt for misfortune,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But misfortune is
    - type: text
      text: ' ready [and anxiously waiting] for those whose feet slip.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “The tents of the destroyers prosper;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And those who provoke God are [apparently] secure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whom God brings into their power.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶“Now ask the animals, and let them teach you [that God does not deal with His creatures according to their character];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And ask the birds of the air, and let them tell you;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Or speak to the earth [with its many forms of life], and it will teach you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the fish of the sea declare [this truth] to you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Who among all these does not recognize [in all these things that good and evil are randomly scattered throughout nature and human life]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has done this,'
