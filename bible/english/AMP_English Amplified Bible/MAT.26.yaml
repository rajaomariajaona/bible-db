  - type: note
    content: It was unlawful for a criminal court proceeding to be held at night. Further, although the Sanhedrin (Jewish High Court) was granted substantial power to act by the Roman government, the Sanhedrin could not impose the death penalty on a criminal. Court cases requesting a death penalty to be imposed by the Roman government were to be held publicly in the temple. The officials of the Sanhedrin waited until morning to announce their verdict, perhaps in a token attempt to legalize their unlawful gathering.
