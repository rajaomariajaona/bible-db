    content: 'Then the chief priests and the elders of the people gathered in the courtyard of the [elegant home of the Jewish] high priest, whose name was '
  - type: note
    content: Caiaphas served as high priest a.d. 18 to 36. His father-in-law, Annas, served as high priest a.d. 6-15. Annas was removed from the position by Rome, but continued to be extremely influential and was regarded by the Jews as de facto high priest even though others (his sons and son-in-law) officially held the office. In about 1990, in an ancient burial cave outside Jerusalem, Israeli archeologists found twelve limestone ossuaries (bone boxes). One of them was uniquely elaborate and decorated with a rare and intricate pattern of rosettes. According to its inscription, this ossuary contained the bones of Caiaphas.
