    content: By laying his hands on the head of the sacrifice the one offering the sacrifice identified himself with it and through its death it became an atonement or covering for his sin. Because the unblemished sacrifice “covered” his sin, it placed the one offering the sacrifice in a right relationship with God, just as later under the new covenant the perfection and sacrifice of Christ would cover (atone for) the imperfection and sin of those who identified with Him and accepted Him as Savior.
