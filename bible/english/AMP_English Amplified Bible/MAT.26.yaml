        text: Jesus’ request was heard (Heb 5:7), and it is unlikely that He asked to avoid the cross. The object of His request cannot be known with certainty, but some think that He was asking for resurrection following His death. In that case, the “cup” would represent His body’s remaining in the grave, which would be contrary to the plan of salvation and prophecy regarding His resurrection (Ps 16:10; cf Acts 2:24-27). Others think that the request related to the time of separation from the Father, which He would have to endure in death (see 27:46). However, the sense of Heb 5:7 could be that the Father listened to Him intently and comforted Him, while not sparing His Son the suffering which He had destined for Him.
