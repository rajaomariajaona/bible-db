document_id: JOS.10,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Five Kings Attack Gibeon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Adoni-zedek king of Jerusalem heard that Joshua had captured Ai, and had utterly destroyed it—as he had done to Jericho and its king, so he had done to Ai and its king—and that the residents of Gibeon had made peace with Israel and were [living] among them, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' caused them to panic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be confused before Israel, and He struck them dead in a great slaughter at Gibeon, and chased them along the way that goes up to Beth-horon and struck them as far as Azekah and Makkedah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As they fled before Israel, while they were at the descent of Beth-horon, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' threw down large stones [of hail] from heaven on them as far as Azekah, and they died. More [Amorites] died because of the hailstones than those whom the sons of Israel killed with the sword.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then Joshua spoke to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the day when the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' handed over the Amorites to the sons of Israel, and Joshua said in the sight of Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sun, stand still at Gibeon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And moon, in the Valley of Aijalon.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So the sun stood still, and the moon stopped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the nation [of Israel] took vengeance upon their enemies.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Is it not written in the Book of Jashar? So the sun stood still in the middle of the sky and was in no hurry to go down for about a whole day. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: There has not been a day like that before it or after it, when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' listened to (heeded) the voice of a man; for the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was fighting for Israel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may be a condensed account of what follows. Joshua encamped at Makkedah (v 21) and did not return to Gilgal until the southern campaign was over (v 43).
      marker-yv: yv-n
    - type: text
      text: Joshua and all Israel with him returned to the camp at Gilgal.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Victory at Makkedah
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now these five [Amorite] kings fled and hid themselves in the cave at Makkedah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And Joshua was told, “The five kings have been found and are hidden in the cave at Makkedah.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Joshua said, “Roll large stones against the mouth of the cave, and assign men by it to guard them, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: but do not stay there yourselves; pursue your enemies and attack them from the rear. Do not allow them to enter their cities, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God has given them into your hand.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'he [and his people] feared greatly, because Gibeon was a great city, like one of the royal cities, and because it was greater than Ai, and all its men were mighty. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now when Joshua and the sons of Israel had finished striking the Amorites dead in a very great defeat, until they were wiped out, and the surviving remnant among them had entered the fortified cities, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'all the people returned to the camp to Joshua at Makkedah in peace. No one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: pointed his tongue
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: uttered a [threatening] word against any of the sons of Israel.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then Joshua said, “Open the mouth of the cave and bring out to me those five [Amorite] kings from the cave.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'They did so, and brought these five [Amorite] kings out of the cave to him—the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When they brought these kings out to Joshua, Joshua called for all the men of Israel, and told the commanders of the men of war who had gone with him, “Come up close, put your feet on the necks of these kings.” So they came forward and put their feet on the necks [of the five kings]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Joshua said to them, “Do not fear or be dismayed (intimidated)! Be strong and courageous, for this is what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will do to all your enemies against whom you [are about to] fight.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then afterward Joshua struck them [with his sword] and put them to death, and he hung them on five trees; and they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 8:29.
      marker-yv: yv-n
    - type: text
      text: 'hung on the trees until evening. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: At sunset Joshua gave a command, and they took the bodies down from the trees and threw them into the cave where the kings had hidden themselves, and placed large stones over the mouth of the cave, [where they remain] to this very day.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Now Joshua captured Makkedah on that day, and struck it and its king with the edge of the sword; he utterly destroyed it and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: every soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: everyone who was in it. He left no survivor. So he did to the king of Makkedah just as he had done to the king of Jericho. [Josh 6:21]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua’s Conquest of Southern Canaan
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then Joshua and all Israel with him went on from Makkedah to Libnah, and fought against Libnah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Adoni-zedek king of Jerusalem sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Hoham king of Hebron, and to Piram king of Jarmuth, to Japhia king of Lachish, and to Debir king of Eglon, saying, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave it also along with its king into the hands of Israel, and Joshua struck it and every '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: person
        - type: text
          text: ' here and throughout the rest of the chapter is the Hebrew word '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soul
        - type: text
          text: ' or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: nephesh
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: person who was in it with the edge of the sword. He left no survivor in it. So he did to the king of Libnah just as he had done to the king of Jericho.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And Joshua and all Israel with him moved on from Libnah to Lachish, and they camped by it and fought against it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gave Lachish into the hands of Israel; and Joshua captured it on the second day, and struck it and every person who was in it with the edge of the sword, just as he had done to Libnah.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Then Horam king of Gezer went up to help Lachish, and Joshua struck him and his people down until he had left him no survivor.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'And Joshua and all Israel with him went on from Lachish to Eglon, and they camped by it and fought against it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: They captured it on that day and struck it with the edge of the sword; and on that day he utterly destroyed every person who was in it, just as he had done to Lachish.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then Joshua and all Israel with him went up from Eglon to Hebron, and they fought against it '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: and captured it and struck it and its king and all its cities and all the persons who were in it with the edge of the sword. He left no survivor, just as he had done to Eglon. He utterly destroyed it and every person who was in it.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then Joshua and all Israel with him returned to Debir, and fought against it. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: He captured it with its king and all its cities, and they struck them with the edge of the sword, and utterly destroyed every person who was in it. He left no survivor. Just as he had done to Hebron, so Joshua did to Debir and its king, as he had done also to Libnah and its king.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Come up to me and help me, and let us attack Gibeon [with a combined army], because it has made peace with Joshua and with the sons (people) of Israel.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: So Joshua struck all the land, the hill country, the Negev (South country) and the lowland and the slopes [that descend to the Dead Sea] and all their kings. He left no survivor, but he utterly destroyed all who breathed, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, had commanded. [Deut 20:16] '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Joshua struck them from Kadesh-barnea even as far as Gaza, and all the country of Goshen even as far as Gibeon. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Joshua captured all these kings and their land at one time, because the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, fought for Israel. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: So Joshua and all Israel with him returned to the camp at Gilgal.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then the five kings of the Amorites, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon, gathered together and went up, they with all their armies, and they camped by Gibeon and fought against it.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the men of Gibeon sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Joshua at the camp in Gilgal, saying, “Do not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: release your hand from
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'abandon your servants; come up to us quickly and save us and help us, for all [five of] the kings of the Amorites who live in the hill country have assembled against us.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So Joshua '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The verb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: went up
        - type: text
          text: ' is quite literal at this point. The distance between Gilgal and Gibeon is not great, but the distance is all steeply uphill.'
      marker-yv: yv-n
    - type: text
      text: 'went up from Gilgal, he and all the people of war with him, and all the men of valor. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Joshua, “Do not fear them, because I have given them into your hand; not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a man
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'one of them shall stand before you.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So Joshua came upon them suddenly, [surprising them] by marching [uphill] all night from Gilgal. '
