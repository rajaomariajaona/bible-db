document_id: JOS.10,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Five Kings Attack Gibeon
  - type: text
    content: 'When Adoni-zedek king of Jerusalem heard that Joshua had captured Ai, and had utterly destroyed it—as he had done to Jericho and its king, so he had done to Ai and its king—and that the residents of Gibeon had made peace with Israel and were [living] among them, '
  '10':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' caused them to panic '
  - type: text
    content: and
  - type: text
    content: ' be confused before Israel, and He struck them dead in a great slaughter at Gibeon, and chased them along the way that goes up to Beth-horon and struck them as far as Azekah and Makkedah. '
  '11':
  - type: text
    content: As they fled before Israel, while they were at the descent of Beth-horon, the L
  - type: heading
    content: ord
  - type: text
    content: ' threw down large stones [of hail] from heaven on them as far as Azekah, and they died. More [Amorites] died because of the hailstones than those whom the sons of Israel killed with the sword.'
  '12':
  - type: text
    content: Then Joshua spoke to the L
  - type: heading
    content: ord
  - type: text
    content: ' on the day when the L'
  - type: heading
    content: ord
  - type: text
    content: ' handed over the Amorites to the sons of Israel, and Joshua said in the sight of Israel,'
  - type: text
    content: “Sun, stand still at Gibeon,
  - type: text
    content: And moon, in the Valley of Aijalon.”
  '13':
  - type: text
    content: So the sun stood still, and the moon stopped,
  - type: text
    content: Until the nation [of Israel] took vengeance upon their enemies.
  - type: text
    content: 'Is it not written in the Book of Jashar? So the sun stood still in the middle of the sky and was in no hurry to go down for about a whole day. '
  '14':
  - type: text
    content: There has not been a day like that before it or after it, when the L
  - type: heading
    content: ord
  - type: text
    content: ' listened to (heeded) the voice of a man; for the L'
  - type: heading
    content: ord
  - type: text
    content: ' was fighting for Israel.'
  '15':
  - type: text
    content: 'Then '
  - type: note
    content: This may be a condensed account of what follows. Joshua encamped at Makkedah (v 21) and did not return to Gilgal until the southern campaign was over (v 43).
  - type: text
    content: Joshua and all Israel with him returned to the camp at Gilgal.
  - type: heading
    content: Victory at Makkedah
  '16':
  - type: text
    content: 'Now these five [Amorite] kings fled and hid themselves in the cave at Makkedah. '
  '17':
  - type: text
    content: 'And Joshua was told, “The five kings have been found and are hidden in the cave at Makkedah.” '
  '18':
  - type: text
    content: 'Joshua said, “Roll large stones against the mouth of the cave, and assign men by it to guard them, '
  '19':
  - type: text
    content: but do not stay there yourselves; pursue your enemies and attack them from the rear. Do not allow them to enter their cities, for the L
  - type: heading
    content: ord
  - type: text
    content: ' your God has given them into your hand.” '
  '2':
  - type: text
    content: 'he [and his people] feared greatly, because Gibeon was a great city, like one of the royal cities, and because it was greater than Ai, and all its men were mighty. '
  '20':
  - type: text
    content: 'Now when Joshua and the sons of Israel had finished striking the Amorites dead in a very great defeat, until they were wiped out, and the surviving remnant among them had entered the fortified cities, '
  '21':
  - type: text
    content: 'all the people returned to the camp to Joshua at Makkedah in peace. No one '
  - type: note
    content: Lit pointed his tongue.
  - type: text
    content: uttered a [threatening] word against any of the sons of Israel.
  '22':
  - type: text
    content: 'Then Joshua said, “Open the mouth of the cave and bring out to me those five [Amorite] kings from the cave.” '
  '23':
  - type: text
    content: 'They did so, and brought these five [Amorite] kings out of the cave to him—the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon. '
  '24':
  - type: text
    content: 'When they brought these kings out to Joshua, Joshua called for all the men of Israel, and told the commanders of the men of war who had gone with him, “Come up close, put your feet on the necks of these kings.” So they came forward and put their feet on the necks [of the five kings]. '
  '25':
  - type: text
    content: Joshua said to them, “Do not fear or be dismayed (intimidated)! Be strong and courageous, for this is what the L
  - type: heading
    content: ord
  - type: text
    content: ' will do to all your enemies against whom you [are about to] fight.” '
  '26':
  - type: text
    content: 'Then afterward Joshua struck them [with his sword] and put them to death, and he hung them on five trees; and they '
  - type: note
    content: See note 8:29.
  - type: text
    content: 'hung on the trees until evening. '
  '27':
  - type: text
    content: At sunset Joshua gave a command, and they took the bodies down from the trees and threw them into the cave where the kings had hidden themselves, and placed large stones over the mouth of the cave, [where they remain] to this very day.
  '28':
  - type: text
    content: 'Now Joshua captured Makkedah on that day, and struck it and its king with the edge of the sword; he utterly destroyed it and '
  - type: note
    content: Lit every soul.
  - type: text
    content: everyone who was in it. He left no survivor. So he did to the king of Makkedah just as he had done to the king of Jericho. [Josh 6:21]
  - type: heading
    content: Joshua’s Conquest of Southern Canaan
  '29':
  - type: text
    content: 'Then Joshua and all Israel with him went on from Makkedah to Libnah, and fought against Libnah. '
  '3':
  - type: text
    content: 'So Adoni-zedek king of Jerusalem sent '
  - type: text
    content: word
  - type: text
    content: ' to Hoham king of Hebron, and to Piram king of Jarmuth, to Japhia king of Lachish, and to Debir king of Eglon, saying, '
  '30':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' gave it also along with its king into the hands of Israel, and Joshua struck it and every '
  - type: note
    content: The word person here and throughout the rest of the chapter is the Hebrew word soul or nephesh.
  - type: text
    content: person who was in it with the edge of the sword. He left no survivor in it. So he did to the king of Libnah just as he had done to the king of Jericho.
  '31':
  - type: text
    content: 'And Joshua and all Israel with him moved on from Libnah to Lachish, and they camped by it and fought against it. '
  '32':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' gave Lachish into the hands of Israel; and Joshua captured it on the second day, and struck it and every person who was in it with the edge of the sword, just as he had done to Libnah.'
  '33':
  - type: text
    content: Then Horam king of Gezer went up to help Lachish, and Joshua struck him and his people down until he had left him no survivor.
  '34':
  - type: text
    content: 'And Joshua and all Israel with him went on from Lachish to Eglon, and they camped by it and fought against it. '
  '35':
  - type: text
    content: They captured it on that day and struck it with the edge of the sword; and on that day he utterly destroyed every person who was in it, just as he had done to Lachish.
  '36':
  - type: text
    content: 'Then Joshua and all Israel with him went up from Eglon to Hebron, and they fought against it '
  '37':
  - type: text
    content: and captured it and struck it and its king and all its cities and all the persons who were in it with the edge of the sword. He left no survivor, just as he had done to Eglon. He utterly destroyed it and every person who was in it.
  '38':
  - type: text
    content: 'Then Joshua and all Israel with him returned to Debir, and fought against it. '
  '39':
  - type: text
    content: He captured it with its king and all its cities, and they struck them with the edge of the sword, and utterly destroyed every person who was in it. He left no survivor. Just as he had done to Hebron, so Joshua did to Debir and its king, as he had done also to Libnah and its king.
  '4':
  - type: text
    content: '“Come up to me and help me, and let us attack Gibeon [with a combined army], because it has made peace with Joshua and with the sons (people) of Israel.” '
  '40':
  - type: text
    content: So Joshua struck all the land, the hill country, the Negev (South country) and the lowland and the slopes [that descend to the Dead Sea] and all their kings. He left no survivor, but he utterly destroyed all who breathed, just as the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, had commanded. [Deut 20:16] '
  '41':
  - type: text
    content: 'Joshua struck them from Kadesh-barnea even as far as Gaza, and all the country of Goshen even as far as Gibeon. '
  '42':
  - type: text
    content: Joshua captured all these kings and their land at one time, because the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, fought for Israel. '
  '43':
  - type: text
    content: So Joshua and all Israel with him returned to the camp at Gilgal.
  '5':
  - type: text
    content: Then the five kings of the Amorites, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon, gathered together and went up, they with all their armies, and they camped by Gibeon and fought against it.
  '6':
  - type: text
    content: 'So the men of Gibeon sent '
  - type: text
    content: word
  - type: text
    content: ' to Joshua at the camp in Gilgal, saying, “Do not '
  - type: note
    content: Lit release your hand from.
  - type: text
    content: 'abandon your servants; come up to us quickly and save us and help us, for all [five of] the kings of the Amorites who live in the hill country have assembled against us.” '
  '7':
  - type: text
    content: 'So Joshua '
  - type: note
    content: The verb went up is quite literal at this point. The distance between Gilgal and Gibeon is not great, but the distance is all steeply uphill.
  - type: text
    content: 'went up from Gilgal, he and all the people of war with him, and all the men of valor. '
  '8':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Joshua, “Do not fear them, because I have given them into your hand; not '
  - type: note
    content: Lit a man.
  - type: text
    content: 'one of them shall stand before you.” '
  '9':
  - type: text
    content: 'So Joshua came upon them suddenly, [surprising them] by marching [uphill] all night from Gilgal. '
