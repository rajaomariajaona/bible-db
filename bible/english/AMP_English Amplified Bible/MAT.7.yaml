verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judging Others
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not a prohibition of judgment, nor is it a command to stop using godly wisdom, common sense, and moral courage together with God’s written word to discern right from wrong, to distinguish between morality and immorality, and to judge doctrinal truth. There are many judgments that are not only legitimate, but are commanded (cf John 7:24; 1 Cor 5:5, 12; Gal 1:8, 9; 1 John 4:1-3; 2 John 10); however, you cannot judge another if you are committing the same type of sin.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Do not judge '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' criticize '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' condemn'
    - type: text
      text: ' [others unfairly with an attitude of self-righteous superiority as though assuming the office of a judge], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that you will not be judged
    - type: text
      text: ' [unfairly]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or if he asks for a fish, will
    - type: text
      text: ' [instead] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: give him a snake?
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'If you then, evil (sinful by nature) as you are, know how to give good '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' advantageous gifts to your children, how much more will your Father who is in heaven'
    - type: text
      text: ' [perfect as He is] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'give what is good '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' advantageous to those who keep on asking Him.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So then, in everything treat others the same way you want them to treat you, for this is
    - type: text
      text: ' [the essence of] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Law and the
    - type: text
      text: ' [writings of the] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prophets.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Narrow and Wide Gates
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Enter through the narrow gate. For wide is the gate and broad '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' easy to travel is the path that leads the way to destruction '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' eternal loss, and there are many who enter through it.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But small is the gate and narrow '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' difficult to travel is the path that leads the way to'
    - type: text
      text: ' [everlasting] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: life, and there are few who find it.
    - type: text
      text: ' [Deut 30:19; Jer 21:8]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Tree and Its Fruit
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Beware of the false prophets,
    - type: text
      text: ' [teachers] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who come to you dressed as sheep
    - type: text
      text: ' [appearing gentle and innocent], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but inwardly are ravenous wolves.
    - type: text
      text: ' [Ezek 22:27] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: By their fruit you will recognize them
    - type: text
      text: ' [that is, by their contrived doctrine and self-focus]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do people pick grapes from thorn bushes or figs from thistles?
    - type: text
      text: ' [Luke 6:43, 44] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even so, every healthy tree bears good fruit, but the unhealthy tree bears bad fruit.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A good tree cannot bear bad fruit, nor can a bad tree bear good fruit.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Every tree that does not bear good fruit is cut down and thrown into the fire.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For just as you
    - type: text
      text: ' [hypocritically] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: judge others
    - type: text
      text: ' [when you are sinful and unrepentant], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so will you be judged; and in accordance with your standard of measure
    - type: text
      text: ' [used to pass out judgment], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: judgment will be measured to you.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore, by their fruit you will recognize them
    - type: text
      text: ' [as false prophets].'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Not everyone who says to Me, ‘Lord, Lord,’ will enter the kingdom of heaven, but only he who does the will of My Father who is in heaven.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Many will say to Me on that day
    - type: text
      text: ' [when I judge them], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Lord, Lord, have we not prophesied in Your name, and driven out demons in Your name, and done many miracles in Your name?’
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And then I will declare to them publicly, ‘I never knew you; '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: depart from
      - type: text
        text: ' M'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: e
    - type: text
      text: ' [you are banished from My presence], '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: sc
        children:
        - type: text
          text: you who act wickedly
    - type: text
      text: ' [disregarding My commands].’ [Ps 6:8]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Two Foundations
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So everyone who hears these words of Mine and acts on them, will be like a wise man
    - type: text
      text: ' [a far-sighted, practical, and sensible man] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who built his house on the rock.
    - type: text
      text: ' [Luke 6:47-49] '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the rain fell, and the floods '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' torrents came, and the winds blew and slammed against that house; yet it did not fall, because it had been founded on the rock.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And everyone who hears these words of Mine and does not do them, will be like a foolish (stupid) man who built his house on the sand.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the rain fell, and the floods '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' torrents came, and the winds blew and slammed against that house; and it fell—and great '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' complete was its fall.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus had finished [speaking] these words [on the mountain], the crowds were astonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' overwhelmed at His teaching; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for He was teaching them as one who had authority [to teach entirely of His own volition], and not as their scribes [who relied on others to confirm their authority].
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why do you look at the
    - type: text
      text: ' [insignificant] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'speck that is in your brother’s eye, but do not notice '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' acknowledge the'
    - type: text
      text: ' [egregious] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: log that is in your own eye?
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or how can you say to your brother, ‘Let me get the speck out of your eye,’ when there is a log in your own eye?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You hypocrite (play-actor, pretender), first get the log out of your own eye, and then you will see clearly to take the speck out of your brother’s eye.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Do not give that which is holy to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this verse “dogs” and “pigs” represent those who despise sacred things.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: dogs, and do not throw your pearls before pigs, for they will trample them under their feet, and turn and tear you to pieces.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer and the Golden Rule
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Here the use of Greek present imperatives (asking, seeking, knocking; vv 7, 8) emphasizes persistent, constant prayer.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ask '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' keep on asking and it will be given to you; seek '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' keep on seeking and you will find; knock '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' keep on knocking and the door will be opened to you.'
    - type: text
      text: ' [Luke 11:9-13] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For everyone who keeps on asking receives, and he who keeps on seeking finds, and to him who keeps on knocking, it will be opened.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or what man is there among you who, if his son asks for bread, will
    - type: text
      text: ' [instead] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: give him a stone?
    - type: text
      text: ' '
