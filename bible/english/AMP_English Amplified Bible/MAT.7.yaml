  - type: note
    content: This is not a prohibition of judgment, nor is it a command to stop using godly wisdom, common sense, and moral courage together with God’s written word to discern right from wrong, to distinguish between morality and immorality, and to judge doctrinal truth. There are many judgments that are not only legitimate, but are commanded (cf John 7:24; 1 Cor 5:5, 12; Gal 1:8, 9; 1 John 4:1-3; 2 John 10); however, you cannot judge another if you are committing the same type of sin.
  - type: text
