  '17':
  - type: text
    content: ¶How precious also are Your thoughts to me, O God!
  - type: text
    content: How vast is the sum of them! [Ps 40:5]
  '18':
  - type: text
    content: If I could count them, they would outnumber the sand.
  - type: text
    content: When I awake, I am still with You.
  '19':
  - type: text
    content: ¶
  - type: note
    content: In the first eighteen verses of this psalm, the psalmist acknowledges that God knows everything that the psalmist ever does, no matter when or where he does it. Although God’s vast knowledge of an individual’s deeds can be reassuring for the righteous, it should be frightening for the wicked. In verses 19-24, the psalmist distances himself from the wicked and asks God to help him live in such a way that pleases God.
  - type: text
    content: O that You would kill the wicked, O God;
  - type: text
    content: Go away from me, therefore, men of bloodshed. [Is 11:4]
  '2':
  - type: text
    content: You know when I sit down and when I rise up [my entire life, everything I do];
  - type: text
    content: You understand my thought from afar. [Matt 9:4; John 2:24, 25]
  '20':
  - type: text
    content: For they speak against You wickedly,
  - type: text
    content: 'Your enemies take '
  - type: text
    content: Your name
  - type: text
    content: ' in vain. [Jude 15]'
