document_id: PSA.139,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 139
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Omnipresence and Omniscience.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', you have searched me [thoroughly] and have known me.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Even there Your hand will lead me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your right hand will take hold of me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If I say, “Surely the darkness will cover me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the night will be the only light around me,”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Even the darkness is not dark to You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' conceals nothing from You,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the night shines as bright as the day;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Darkness and light are alike '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to You.
    - type: text
      text: ' [Dan 2:22]'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ¶For You formed my innermost parts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You knit me [together] in my mother’s womb.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise to You, for I am fearfully and wonderfully made;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wonderful are Your works,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my soul knows it very well.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My frame was not hidden from You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I was being formed in secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And intricately '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' skillfully formed [as if embroidered with many colors] in the depths of the earth.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Your eyes have seen my unformed substance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in Your book were all written
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The days that were appointed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When as yet there was not one of them [even taking shape].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶How precious also are Your thoughts to me, O God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How vast is the sum of them! [Ps 40:5]
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If I could count them, they would outnumber the sand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I awake, I am still with You.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ¶
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '139:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the first eighteen verses of this psalm, the psalmist acknowledges that God knows everything that the psalmist ever does, no matter when or where he does it. Although God’s vast knowledge of an individual’s deeds can be reassuring for the righteous, it should be frightening for the wicked. In verses 19-24, the psalmist distances himself from the wicked and asks God to help him live in such a way that pleases God.
      marker-yv: yv-n
    - type: text
      text: O that You would kill the wicked, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go away from me, therefore, men of bloodshed. [Is 11:4]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You know when I sit down and when I rise up [my entire life, everything I do];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You understand my thought from afar. [Matt 9:4; John 2:24, 25]
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: For they speak against You wickedly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your enemies take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your name
    - type: text
      text: ' in vain. [Jude 15]'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Do I not hate those who hate You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do I not loathe those who rise up against You?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I hate them with perfect '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' utmost hatred;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have become my enemies.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ¶Search me [thoroughly], O God, and know my heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Test me and know my anxious thoughts;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And see if there is any wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' hurtful way in me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lead me in the everlasting way.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You scrutinize my path and my lying down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You are intimately acquainted with all my ways.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Even before there is a word on my tongue [still unspoken],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You know it all. [Heb 4:13]'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have enclosed me behind and before,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [You have] placed Your hand upon me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Such [infinite] knowledge is too wonderful for me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is too high [above me], I cannot reach it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶Where can I go from Your Spirit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or where can I flee from Your presence?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If I ascend to heaven, You are there;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I make my bed in Sheol (the nether world, the place of the dead), behold, You are there. [Rom 11:33]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If I take the wings of the dawn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I dwell in the remotest part of the sea,
