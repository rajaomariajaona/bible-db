document_id: PSA.85,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 85
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for God’s Mercy upon the Nation.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician. A Psalm of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You have [at last] shown favor to Your land [of Canaan];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have restored [from Babylon] the captives of Jacob (Israel).
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Steadfast love and truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' faithfulness meet together;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness and peace kiss each other.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truth springs from the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And righteousness looks down from heaven.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will give what is good,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And our land will yield its produce.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness will go before Him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will make His footsteps into a way [in which to walk].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have forgiven the wickedness of Your people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have covered all their sin. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have withdrawn all Your wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have turned away from Your burning anger.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Restore us, O God of our salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cause Your indignation toward us to cease.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will You be angry with us forever?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will You prolong Your anger to all generations?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will You not revive us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bring us to life again,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That Your people may rejoice in You?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show us Your lovingkindness, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And grant us Your salvation.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I will hear [with expectant hope] what God the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will say,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He will speak peace to His people, to His '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. believers, those in right standing with Him.
      marker-yv: yv-n
    - type: text
      text: godly ones—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But let them not turn again to folly.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely His salvation is near to those who [reverently] fear Him [and obey Him with submissive wonder],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That glory [the manifest presence of God] may dwell in our land.
