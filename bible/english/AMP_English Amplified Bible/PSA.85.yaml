document_id: PSA.85
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 85
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer for God’s Mercy upon the Nation.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician. A Psalm of the sons of Korah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', You have [at last] shown favor to Your land [of Canaan];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have restored [from Babylon] the captives of Jacob (Israel).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You have forgiven the wickedness of Your people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You have covered all their sin. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have withdrawn all Your wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have turned away from Your burning anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Restore us, O God of our salvation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cause Your indignation toward us to cease.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Will You be angry with us forever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will You prolong Your anger to all generations?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Will You not revive us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bring us to life again,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That Your people may rejoice in You?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Show us Your lovingkindness, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: And grant us Your salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶I will hear [with expectant hope] what God the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will say,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For He will speak peace to His people, to His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '85:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. believers, those in right standing with Him.
    marker-yv: yv-n
  - type: text
    text: godly ones—
- type: usfm
  marker: q1
  children:
  - type: text
    text: But let them not turn again to folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Surely His salvation is near to those who [reverently] fear Him [and obey Him with submissive wonder],
- type: usfm
  marker: q1
  children:
  - type: text
    text: That glory [the manifest presence of God] may dwell in our land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Steadfast love and truth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' faithfulness meet together;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Righteousness and peace kiss each other.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Truth springs from the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And righteousness looks down from heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indeed, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will give what is good,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And our land will yield its produce.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Righteousness will go before Him
- type: usfm
  marker: q1
  children:
  - type: text
    text: And will make His footsteps into a way [in which to walk].
