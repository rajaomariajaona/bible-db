document_id: PSA.85,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 85
  - type: heading
    content: Prayer for God’s Mercy upon the Nation.
  - type: text
    content: To the Chief Musician. A Psalm of the sons of Korah.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', You have [at last] shown favor to Your land [of Canaan];'
  - type: text
    content: You have restored [from Babylon] the captives of Jacob (Israel).
  '10':
  - type: text
    content: 'Steadfast love and truth '
  - type: text
    content: and
  - type: text
    content: ' faithfulness meet together;'
  - type: text
    content: Righteousness and peace kiss each other.
  '11':
  - type: text
    content: Truth springs from the earth,
  - type: text
    content: And righteousness looks down from heaven.
  '12':
  - type: text
    content: Indeed, the L
  - type: heading
    content: ord
  - type: text
    content: ' will give what is good,'
  - type: text
    content: And our land will yield its produce.
  '13':
  - type: text
    content: Righteousness will go before Him
  - type: text
    content: And will make His footsteps into a way [in which to walk].
  '2':
  - type: text
    content: You have forgiven the wickedness of Your people;
  - type: text
    content: 'You have covered all their sin. '
  - type: text
    content: Selah.
  '3':
  - type: text
    content: You have withdrawn all Your wrath,
  - type: text
    content: You have turned away from Your burning anger.
  '4':
  - type: text
    content: ¶Restore us, O God of our salvation,
  - type: text
    content: And cause Your indignation toward us to cease.
  '5':
  - type: text
    content: Will You be angry with us forever?
  - type: text
    content: Will You prolong Your anger to all generations?
  '6':
  - type: text
    content: 'Will You not revive us '
  - type: text
    content: and
  - type: text
    content: ' bring us to life again,'
  - type: text
    content: That Your people may rejoice in You?
  '7':
  - type: text
    content: Show us Your lovingkindness, O L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: And grant us Your salvation.
  '8':
  - type: text
    content: ¶I will hear [with expectant hope] what God the L
  - type: heading
    content: ord
  - type: text
    content: ' will say,'
  - type: text
    content: 'For He will speak peace to His people, to His '
  - type: note
    content: I.e. believers, those in right standing with Him.
  - type: text
    content: godly ones—
  - type: text
    content: But let them not turn again to folly.
  '9':
  - type: text
    content: Surely His salvation is near to those who [reverently] fear Him [and obey Him with submissive wonder],
  - type: text
    content: That glory [the manifest presence of God] may dwell in our land.
