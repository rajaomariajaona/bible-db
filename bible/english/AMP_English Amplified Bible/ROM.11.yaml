document_id: ROM.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Is Not Cast Away
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I say then, has God rejected '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disowned His people? Certainly not! For I too am an Israelite, a descendant of Abraham, of the tribe of Benjamin. [1 Sam 12:22; Jer 31:37; 33:24-26; Phil 3:5] '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: et their eyes be darkened so that they do not see
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A
    - type: usfm
      marker: sc
      children:
      - type: text
        text: nd make their backs bend
    - type: text
      text: ' [under their burden] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: forever
    - type: text
      text: .” [Ps 69:23]
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So I say, have they stumbled so as to fall [to spiritual ruin]? Certainly not! But by their transgression [their rejection of the Messiah] salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has come
    - type: text
      text: ' to the Gentiles, to make Israel jealous [when they realize what they have forfeited]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now if Israel’s transgression means riches for the world [at large] and their failure means riches for the Gentiles, how much more will their fulfillment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reinstatement be! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: ' I am speaking to you who are Gentiles. Inasmuch then as I am an apostle to the Gentiles, I magnify my ministry, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'in the hope of somehow making my fellow countrymen jealous [by stirring them up so that they will seek the truth] and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: perhaps
    - type: text
      text: ' save some of them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For if their [present] rejection [of salvation] is for the reconciliation of the world [to God], what will their acceptance [of salvation] be but [nothing less than] life from the dead? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'If the first portion [of dough offered as the first fruits] is holy, so is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whole
    - type: text
      text: ' batch; and if the root (Abraham, the patriarchs) is holy, so are the branches (the Israelites). [Num 15:19-21]'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But if some of the branches were broken off, and you [Gentiles], being like a wild olive shoot, were grafted in among them to share with them the rich root of the olive tree, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'do not boast over the [broken] branches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' exalt yourself at their expense. If you do boast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' feel superior, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: remember that
    - type: text
      text: ' it is not you who supports the root, but the root that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supports
    - type: text
      text: ' you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You will say then, “Branches were broken off so that I might be grafted in.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'God has not rejected His [chosen] people whom He foreknew. Or do you not know what the Scripture says of Elijah, how he pleads with God against Israel? [Ps 94:14; 1 Kin 19] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'That is true. They were broken off because of their unbelief, but you stand by your faith [as believers understanding the truth of Christ’s deity]. Do not be conceited, but [rather stand in great awe of God and] fear [Him]; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'for if God did not spare the natural branches [because of unbelief], He will not spare you either. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then appreciate the gracious kindness and the severity of God: to those who fell [into spiritual ruin], severity, but to you, God’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gracious
    - type: text
      text: ' kindness—if you continue in His kindness [by faith and obedience to Him]; otherwise you too will be cut off. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And even they [the unbelieving Jews], if they do not continue in their unbelief, will be grafted in; for God has the power to graft them in again. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For if you were cut off from what is by nature a wild olive tree, and against nature were grafted into a cultivated olive tree, how much easier will it be to graft these who are the natural '
    - type: usfm
      marker: it
      children:
      - type: text
        text: branches
    - type: text
      text: ' back into [the original parent stock of] their own olive tree?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I do not want you, believers, to be unaware of this mystery [God’s previously hidden plan]—so that you will not be wise in your own opinion—that a partial hardening has [temporarily] happened to Israel [to last] until the full number of the Gentiles has come in; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: and so [at that time] all Israel [that is, all Jews who have a personal faith in Jesus as Messiah] will be saved; just as it is written [in Scripture],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he
    - type: text
      text: ' D'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: eliverer
    - type: text
      text: ' (Messiah) '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will come from
    - type: text
      text: ' Z'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ion
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: H
    - type: usfm
      marker: sc
      children:
      - type: text
        text: e will remove ungodliness from
    - type: text
      text: ' J'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: acob
    - type: text
      text: .” [Is 59:20, 21]
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: his is
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: y covenant with them
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: W
    - type: usfm
      marker: sc
      children:
      - type: text
        text: hen
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: take away their sins
    - type: text
      text: .” [Is 27:9; Jer 31:33]
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'From the standpoint of the gospel, the Jews [at present] are enemies [of God] for your sake [which is for your benefit], but from the standpoint of God’s choice [of the Jews as His people], they are still loved by Him for the sake of the fathers. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'For the gifts and the calling of God are irrevocable [for He does not withdraw what He has given, nor does He change His mind about those to whom He gives His grace or to whom He sends His call]. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Lord, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: they have killed
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our prophets
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: they have torn down
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our altars
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: alone am left
    - type: text
      text: ' [of the prophets], '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and they are seeking my life
    - type: text
      text: '.” '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Just as you once were disobedient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' failed to listen to God, but have now obtained mercy because of their disobedience, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'so they too have now become disobedient so that they too may one day receive mercy because of the mercy shown to you. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: For God has imprisoned all in disobedience so that He may show mercy to all [Jew and Gentile alike].
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Oh, the depth of the riches and wisdom and knowledge of God! How unsearchable are His judgments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decisions and how unfathomable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' untraceable are His ways! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'For '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who has known the mind of the
    - type: text
      text: ' L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: or who has been
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: is counselor
    - type: text
      text: '? [Is 40:13, 14] '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Or '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: who has first given to
    - type: text
      text: ' H'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: im that it would be paid back to him
    - type: text
      text: '? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'For from Him [all things originate] and through Him [all things live and exist] and to Him are all things [directed]. To Him be glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor forever! Amen.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But what is God’s response to him? “I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: have kept
    - type: text
      text: ' for Myself '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: seven thousand men who have not bowed the knee to
    - type: text
      text: ' B'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: aal
    - type: text
      text: '.” [1 Kin 19:18] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So too then, at the present time there has come to be a remnant [a small believing minority] according to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s
    - type: text
      text: ' gracious choice. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But if it is by grace [God’s unmerited favor], it is no longer on the basis of works, otherwise grace is no longer grace [it would not be a gift but a reward for works].
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'What then? Israel failed to obtain what it was seeking [that is, God’s favor by obedience to the Law], but the elect [those chosen few] obtained it, while the rest of them became hardened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' callously indifferent; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: just as it is written [in Scripture],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od gave them a spirit of stupor
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: E
    - type: usfm
      marker: sc
      children:
      - type: text
        text: yes that do not see and ears that do not hear
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[a spiritual apathy that has continued] '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: to this very day
    - type: text
      text: .” [Deut 29:4; Is 29:10]
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And David says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: et their table
    - type: text
      text: ' (abundance) '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: become a snare and a trap
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A '
    - type: usfm
