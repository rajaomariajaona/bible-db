    content: 'And even they [the unbelieving Jews], if they do not continue in their unbelief, will be grafted in; for God has the power to graft them in again. '
  '24':
  - type: text
    content: 'For if you were cut off from what is by nature a wild olive tree, and against nature were grafted into a cultivated olive tree, how much easier will it be to graft these who are the natural '
  - type: text
