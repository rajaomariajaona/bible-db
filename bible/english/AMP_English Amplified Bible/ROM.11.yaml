  '2':
  - type: text
    content: 'God has not rejected His [chosen] people whom He foreknew. Or do you not know what the Scripture says of Elijah, how he pleads with God against Israel? [Ps 94:14; 1 Kin 19] '
  '20':
  - type: text
    content: 'That is true. They were broken off because of their unbelief, but you stand by your faith [as believers understanding the truth of Christ’s deity]. Do not be conceited, but [rather stand in great awe of God and] fear [Him]; '
  '21':
  - type: text
    content: 'for if God did not spare the natural branches [because of unbelief], He will not spare you either. '
  '22':
  - type: text
    content: 'Then appreciate the gracious kindness and the severity of God: to those who fell [into spiritual ruin], severity, but to you, God’s '
  - type: text
