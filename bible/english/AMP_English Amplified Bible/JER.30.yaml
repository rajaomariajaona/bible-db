document_id: JER.30,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Freedom from Captivity Promised
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word which came to Jeremiah from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Fear not, O Jacob My servant,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Nor be dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' downcast, O Israel;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For behold, I will save you from a distant land [of exile]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your descendants from the land of their captivity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob will return and will be quiet and at ease,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no one will make him afraid.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘For I am with you,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘to save you;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will destroy completely all the nations where I have scattered you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will not destroy you completely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I will judge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discipline you fairly'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And will by no means regard you as guiltless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' leave you unpunished.’'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Your wound is incurable
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your injury is beyond healing.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘There is no one to plead your cause;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No [device to close and allow the] healing of your wound,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No recovery for you.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘All your lovers (allies) have forgotten you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They do not seek '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' long for you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have injured you with the wound of an enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With the punishment of a cruel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' merciless foe,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because your guilt is great
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your sins are glaring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innumerable.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Why do you cry out over your injury [since it is the natural result of your sin]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your pain is incurable (deadly).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because your guilt is great
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your sins are glaring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' innumerable,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have done these things to you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Therefore all who devour you will be devoured;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all your adversaries, every one of them, will go into captivity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they who plunder you will become plunder,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all who prey upon you I will give for prey.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘For I will restore health to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will heal your wounds,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Because they have called you an outcast, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“This is Zion; no one seeks her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' no one cares for her.” ’'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Restoration of Jacob
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Behold (hear this), I will restore the fortunes of the tents of Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have mercy on his dwelling places;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city will be rebuilt on its [old, mound-like] ruin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the palace will stand on its rightful place.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘From them (city, palace) will come [songs of] thanksgiving
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the voices of those who dance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' celebrate.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will multiply them and they will not be diminished [in number];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also honor them and they will not be insignificant.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel, ‘Write in a book all the words which I have spoken to you. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Their children too will be as in former times,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their congregation will be established before Me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will punish all their oppressors.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Their prince will be one of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their ruler will come forward from among them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring him near and he shall approach Me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For who is he who would have the boldness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' would dare [on his own initiative] to risk his life to approach Me?’ says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Then you shall be My people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will be your God.’ ” [Jer 7:23]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Behold, the tempest of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrath has gone forth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A sweeping '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gathering tempest;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will burst on the head of the wicked.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fierce (righteous) anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will not turn back'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until He has fulfilled and until He has accomplished
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The intent of His heart (mind);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the latter days you will understand this.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For behold (hear this), the days are coming,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘when I will restore the fortunes of My people Israel and Judah,’ says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘and I will return them to the land that I gave to their forefathers and they will take possession of it.’ ”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now these are the words the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke concerning Israel and Judah:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘We have heard a terrified voice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Of panic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dread, and there is no peace.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ask now, and see
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whether a man can give birth [to a child].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why then do I see every man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'With his hands on his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The midsection of the body between the lower ribs and the hips.
      marker-yv: yv-n
    - type: text
      text: loins, as a woman in labor?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have all faces turned pale?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Alas! for that day is great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is none like it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the time of Jacob’s [unequaled] trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he will be saved from it. [Matt 24:29, 30; Rev 7:14]
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘It shall come about on that day,’ says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, ‘that I will break the yoke off your neck and I will tear off your bonds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' force apart your shackles; and strangers will no longer make slaves of the people [of Israel]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they shall serve the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God and [the descendant of] David their King, whom I will raise up for them. [Jer 23:5]'
