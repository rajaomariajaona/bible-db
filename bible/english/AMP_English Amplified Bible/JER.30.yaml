type_code: eng
verses:
  '1':
  - type: heading
    content: Freedom from Captivity Promised
  - type: text
    content: The word which came to Jeremiah from the L
  - type: heading
    content: ord
  - type: text
    content: ': '
  '10':
  - type: text
    content: ‘Fear not, O Jacob My servant,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: '‘Nor be dismayed '
  - type: text
    content: or
  - type: text
    content: ' downcast, O Israel;'
  - type: text
    content: For behold, I will save you from a distant land [of exile]
  - type: text
    content: And your descendants from the land of their captivity.
  - type: text
    content: Jacob will return and will be quiet and at ease,
  - type: text
    content: And no one will make him afraid.
  '11':
  - type: text
    content: ‘For I am with you,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘to save you;'
  - type: text
    content: For I will destroy completely all the nations where I have scattered you,
  - type: text
    content: But I will not destroy you completely.
  - type: text
    content: 'But I will judge '
  - type: text
    content: and
  - type: text
    content: ' discipline you fairly'
  - type: text
    content: 'And will by no means regard you as guiltless '
  - type: text
    content: and
  - type: text
    content: ' leave you unpunished.’'
  '12':
  - type: text
    content: ¶“For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: ‘Your wound is incurable
  - type: text
    content: And your injury is beyond healing.
  '13':
  - type: text
    content: ‘There is no one to plead your cause;
  - type: text
    content: No [device to close and allow the] healing of your wound,
  - type: text
    content: No recovery for you.
  '14':
  - type: text
    content: ‘All your lovers (allies) have forgotten you;
  - type: text
    content: 'They do not seek '
  - type: text
    content: and
  - type: text
    content: ' long for you.'
  - type: text
    content: For I have injured you with the wound of an enemy,
  - type: text
    content: 'With the punishment of a cruel '
  - type: text
    content: and
  - type: text
    content: ' merciless foe,'
  - type: text
    content: Because your guilt is great
  - type: text
    content: 'And your sins are glaring '
  - type: text
    content: and
  - type: text
    content: ' innumerable.'
  '15':
  - type: text
    content: ‘Why do you cry out over your injury [since it is the natural result of your sin]?
  - type: text
    content: Your pain is incurable (deadly).
  - type: text
    content: Because your guilt is great
  - type: text
    content: 'And your sins are glaring '
  - type: text
    content: and
  - type: text
    content: ' innumerable,'
  - type: text
    content: I have done these things to you.
  '16':
  - type: text
    content: ‘Therefore all who devour you will be devoured;
  - type: text
    content: And all your adversaries, every one of them, will go into captivity.
  - type: text
    content: And they who plunder you will become plunder,
  - type: text
    content: And all who prey upon you I will give for prey.
  '17':
  - type: text
    content: ‘For I will restore health to you
  - type: text
    content: And I will heal your wounds,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: '‘Because they have called you an outcast, saying:'
  - type: text
    content: '“This is Zion; no one seeks her '
  - type: text
    content: and
  - type: text
    content: ' no one cares for her.” ’'
  - type: heading
    content: Restoration of Jacob
  '18':
  - type: text
    content: ¶“Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: ‘Behold (hear this), I will restore the fortunes of the tents of Jacob
  - type: text
    content: And have mercy on his dwelling places;
  - type: text
    content: The city will be rebuilt on its [old, mound-like] ruin,
  - type: text
    content: And the palace will stand on its rightful place.
  '19':
  - type: text
    content: ‘From them (city, palace) will come [songs of] thanksgiving
  - type: text
    content: 'And the voices of those who dance '
  - type: text
    content: and
  - type: text
    content: ' celebrate.'
  - type: text
    content: And I will multiply them and they will not be diminished [in number];
  - type: text
    content: I will also honor them and they will not be insignificant.
  '2':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel, ‘Write in a book all the words which I have spoken to you. '
  '20':
  - type: text
    content: ‘Their children too will be as in former times,
  - type: text
    content: And their congregation will be established before Me;
  - type: text
    content: And I will punish all their oppressors.
  '21':
  - type: text
    content: ‘Their prince will be one of them,
  - type: text
    content: And their ruler will come forward from among them.
  - type: text
    content: I will bring him near and he shall approach Me,
  - type: text
    content: 'For who is he who would have the boldness '
  - type: text
    content: and
  - type: text
    content: ' would dare [on his own initiative] to risk his life to approach Me?’ says the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '22':
  - type: text
    content: ‘Then you shall be My people,
  - type: text
    content: And I will be your God.’ ” [Jer 7:23]
  '23':
  - type: text
    content: ¶Behold, the tempest of the L
  - type: heading
    content: ord
  - type: text
    content: '!'
  - type: text
    content: Wrath has gone forth,
  - type: text
    content: 'A sweeping '
  - type: text
    content: and
  - type: text
    content: ' gathering tempest;'
  - type: text
    content: It will burst on the head of the wicked.
  '24':
  - type: text
    content: The fierce (righteous) anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' will not turn back'
  - type: text
    content: Until He has fulfilled and until He has accomplished
  - type: text
    content: The intent of His heart (mind);
  - type: text
    content: In the latter days you will understand this.
  '3':
  - type: text
    content: For behold (hear this), the days are coming,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘when I will restore the fortunes of My people Israel and Judah,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: ', ‘and I will return them to the land that I gave to their forefathers and they will take possession of it.’ ”'
  '4':
  - type: text
    content: Now these are the words the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke concerning Israel and Judah:'
  '5':
  - type: text
    content: “Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: ‘We have heard a terrified voice
  - type: text
    content: 'Of panic '
  - type: text
    content: and
  - type: text
    content: ' dread, and there is no peace.'
  '6':
  - type: text
    content: ‘Ask now, and see
  - type: text
    content: Whether a man can give birth [to a child].
  - type: text
    content: Why then do I see every man
  - type: text
    content: 'With his hands on his '
  - type: note
    content: The midsection of the body between the lower ribs and the hips.
  - type: text
    content: loins, as a woman in labor?
  - type: text
    content: Why have all faces turned pale?
  '7':
  - type: text
    content: ‘Alas! for that day is great,
  - type: text
    content: There is none like it;
  - type: text
    content: It is the time of Jacob’s [unequaled] trouble,
  - type: text
    content: But he will be saved from it. [Matt 24:29, 30; Rev 7:14]
  '8':
  - type: text
    content: ‘It shall come about on that day,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, ‘that I will break the yoke off your neck and I will tear off your bonds '
  - type: text
    content: and
  - type: text
    content: ' force apart your shackles; and strangers will no longer make slaves of the people [of Israel]. '
  '9':
  - type: text
    content: But they shall serve the L
  - type: heading
    content: ord
  - type: text
    content: ' their God and [the descendant of] David their King, whom I will raise up for them. [Jer 23:5]'
