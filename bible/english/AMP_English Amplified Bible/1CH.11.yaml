document_id: 1CH.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David Made King over All Israel
  - type: text
    content: ' '
  - type: note
    content: Saul’s son, Ish-bosheth, ruled over the tribes of Israel for two tumultuous years after his father’s death. His assassination (2 Sam 4) triggered Israel’s appeal to David.
  - type: text
    content: 'Then all Israel gathered to David at Hebron, saying, “Behold, we are your bone and your flesh. [2 Sam 2:8-10] '
  '10':
  - type: text
    content: Now these are the chiefs of David’s mighty men, who strongly supported him in his kingdom, together with all Israel, to make him king, in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' concerning Israel. '
  '11':
  - type: text
    content: 'This is the list of David’s mighty men: Jashobeam, the son of a Hachmonite, the chief of the thirty [heroes]. He lifted up his spear against three hundred whom he killed at one time.'
  '12':
  - type: text
    content: 'Next to him [in rank] was Eleazar the son of Dodo the Ahohite, who was one of the three mighty men. '
  '13':
  - type: text
    content: 'He was with David at Pasdammim [where David had killed Goliath] and there the Philistines were gathered together for battle, and there was a plot of ground full of barley; and the people [of Israel] fled before the Philistines. '
  '14':
  - type: text
    content: But they took their stand in the midst of that plot and defended it, and killed the Philistines; and the L
  - type: heading
    content: ord
  - type: text
    content: ' rescued them by a great victory. [2 Sam 23:9, 10]'
  '15':
  - type: text
    content: 'Three of the thirty chief men went down to the rock to David, into the cave of Adullam, while the army of the Philistines was camped in the Valley of Rephaim. '
  '16':
  - type: text
    content: 'David was then in the stronghold, while the garrison of the Philistines was in Bethlehem. '
  '17':
  - type: text
    content: 'David had a craving and said, “Oh that someone would give me a drink of water from the well of Bethlehem, which is next to the gate!” '
  '18':
  - type: text
    content: Then the three [mighty men] broke through the camp of the Philistines and drew water out of the well of Bethlehem which was next to the gate, and brought it to David. But David would not drink it; he poured it out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [as an offering]; '
  '19':
  - type: text
    content: and he said, “Far be it from me before my God that I would do this thing! Shall I drink the blood of these men who have put their lives in jeopardy? For they brought it at the risk of their lives.” So he would not drink it. These things the three mighty men did.
  '2':
  - type: text
    content: In times past, even when Saul was king, it was you who led out and brought in Israel; and the L
  - type: heading
    content: ord
  - type: text
    content: ' your God said to you, ‘You shall shepherd My people Israel, and you shall be prince '
  - type: text
    content: and
  - type: text
    content: ' leader over My people Israel.’ ” '
  '20':
  - type: text
    content: 'Abishai the brother of Joab was chief of the [other] '
  - type: note
    content: So with MT, LXX; Syr thirty.
  - type: text
    content: 'three, and he lifted up his spear against three hundred and killed them, and he had a name as well as the three. '
  '21':
  - type: text
    content: 'Of the three in the second [rank] he was the most honored and became their captain; however, he did not attain to the '
  - type: text
    content: first
  - type: text
    content: ' three [Jashobeam, Eleazar, and Shammah].'
  '22':
  - type: text
    content: 'Benaiah the son of Jehoiada, the son of a courageous man of Kabzeel who had done great things, killed the two '
  - type: text
    content: sons of
  - type: text
    content: ' Ariel of Moab. Also he went down and killed a lion in a pit on a snowy day. '
  '23':
  - type: text
    content: 'He killed an Egyptian also, a man of '
  - type: text
    content: great
  - type: text
    content: ' stature, five '
  - type: note
    content: I.e. one cubit is approximately 18 in.
  - type: text
    content: 'cubits tall. In the Egyptian’s hand was a spear like a weaver’s beam, and Benaiah went down to him with [only] a staff (rod) and grabbed the spear from the Egyptian’s hand and killed him with his own spear. '
  '24':
  - type: text
    content: 'Benaiah the son of Jehoiada did these '
  - type: text
    content: things,
  - type: text
    content: ' and had a name as well as the three mighty men. '
  '25':
  - type: text
    content: He was honored among the thirty, but he did not attain to [the rank of] the [first] three. David appointed him over his bodyguard.
  '26':
  - type: text
    content: 'Now the mighty men of the armies were: Asahel the brother of Joab, Elhanan the son of Dodo of Bethlehem, '
  '27':
  - type: text
    content: 'Shammoth the Harorite, Helez the Pelonite, '
  '28':
  - type: text
    content: 'Ira the son of Ikkesh of Tekoa, Abiezer of Anathoth, '
  '29':
  - type: text
    content: 'Sibbecai the Hushathite, Ilai the Ahohite, '
  '3':
  - type: text
    content: So all the elders of Israel came to the king at Hebron, and David made a covenant (solemn agreement) with them there before the L
  - type: heading
    content: ord
  - type: text
    content: ; and they anointed him king over Israel, in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' through Samuel. [1 Sam 16:1, 12, 13]'
  - type: heading
    content: Jerusalem, Capital City
  '30':
  - type: text
    content: 'Maharai the Netophathite, Heled the son of Baanah the Netophathite, '
  '31':
  - type: text
    content: 'Ithai the son of Ribai of Gibeah of the Benjamites, Benaiah the Pirathonite, '
  '32':
  - type: text
    content: 'Hurai of the brooks of Gaash, Abiel the Arbathite, '
  '33':
  - type: text
    content: 'Azmaveth the Baharumite, Eliahba the Shaalbonite, '
  '34':
  - type: text
    content: 'the sons of Hashem the Gizonite, Jonathan the son of Shagee the Hararite, '
  '35':
  - type: text
    content: 'Ahiam the son of Sacar the Hararite, Eliphal the son of Ur, '
  '36':
  - type: text
    content: 'Hepher the Mecherathite, Ahijah the Pelonite, '
  '37':
  - type: text
    content: 'Hezro the Carmelite, Naarai the son of Ezbai, '
  '38':
  - type: text
    content: 'Joel the brother of Nathan, Mibhar the son of Hagri, '
  '39':
  - type: text
    content: 'Zelek the Ammonite, Naharai the Berothite, the armor bearer of Joab the son of Zeruiah [David’s half-sister], '
  '4':
  - type: text
    content: 'Then David and all Israel went to Jerusalem (that is Jebus); and the Jebusites, the inhabitants of the land, were there. '
  '40':
  - type: text
    content: 'Ira the Ithrite, Gareb the Ithrite, '
  '41':
  - type: text
    content: 'Uriah the Hittite [Bathsheba’s husband], Zabad the son of Ahlai, '
  '42':
  - type: text
    content: 'Adina the son of Shiza the Reubenite, a chief of the Reubenites, and thirty [heroes] with him, '
  '43':
  - type: text
    content: 'Hanan the son of Maacah, and Joshaphat the Mithnite, '
  '44':
  - type: text
    content: 'Uzzia the Ashterathite, Shama and Jeiel the sons of Hotham the Aroerite, '
  '45':
  - type: text
    content: 'Jediael the son of Shimri, and his brother Joha, the Tizite, '
  '46':
  - type: text
    content: 'Eliel the Mahavite, Jeribai and Joshaviah the sons of Elnaam, Ithmah the Moabite, '
  '47':
  - type: text
    content: Eliel and Obed and Jaasiel the Mezobaite.
  '5':
  - type: text
    content: 'Then the Jebusites said to David, “You shall not come in here.” But David captured the stronghold of Zion (that is, the City of David). '
  '6':
  - type: text
    content: 'Now David said, “Whoever strikes down a Jebusite first shall be chief and commander.” Joab the son of Zeruiah [David’s half-sister] went up first, and so he was made chief. '
  '7':
  - type: text
    content: 'Then David lived in the stronghold; so it was called the City of David. '
  '8':
  - type: text
    content: 'He built the city around it, from the Millo (fortification) to the surrounding area; and Joab repaired the rest of the [old Jebusite] city. '
  '9':
  - type: text
    content: David became greater and greater, for the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts was with him.'
  - type: heading
    content: David’s Mighty Men
