document_id: 1CH.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Made King over All Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Saul’s son, Ish-bosheth, ruled over the tribes of Israel for two tumultuous years after his father’s death. His assassination (2 Sam 4) triggered Israel’s appeal to David.
    marker-yv: yv-n
  - type: text
    text: 'Then all Israel gathered to David at Hebron, saying, “Behold, we are your bone and your flesh. [2 Sam 2:8-10] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In times past, even when Saul was king, it was you who led out and brought in Israel; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God said to you, ‘You shall shepherd My people Israel, and you shall be prince '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' leader over My people Israel.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So all the elders of Israel came to the king at Hebron, and David made a covenant (solemn agreement) with them there before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and they anointed him king over Israel, in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' through Samuel. [1 Sam 16:1, 12, 13]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jerusalem, Capital City
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then David and all Israel went to Jerusalem (that is Jebus); and the Jebusites, the inhabitants of the land, were there. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the Jebusites said to David, “You shall not come in here.” But David captured the stronghold of Zion (that is, the City of David). '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now David said, “Whoever strikes down a Jebusite first shall be chief and commander.” Joab the son of Zeruiah [David’s half-sister] went up first, and so he was made chief. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then David lived in the stronghold; so it was called the City of David. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He built the city around it, from the Millo (fortification) to the surrounding area; and Joab repaired the rest of the [old Jebusite] city. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: David became greater and greater, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts was with him.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David’s Mighty Men
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now these are the chiefs of David’s mighty men, who strongly supported him in his kingdom, together with all Israel, to make him king, in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' concerning Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is the list of David’s mighty men: Jashobeam, the son of a Hachmonite, the chief of the thirty [heroes]. He lifted up his spear against three hundred whom he killed at one time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Next to him [in rank] was Eleazar the son of Dodo the Ahohite, who was one of the three mighty men. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He was with David at Pasdammim [where David had killed Goliath] and there the Philistines were gathered together for battle, and there was a plot of ground full of barley; and the people [of Israel] fled before the Philistines. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But they took their stand in the midst of that plot and defended it, and killed the Philistines; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' rescued them by a great victory. [2 Sam 23:9, 10]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Three of the thirty chief men went down to the rock to David, into the cave of Adullam, while the army of the Philistines was camped in the Valley of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'David was then in the stronghold, while the garrison of the Philistines was in Bethlehem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David had a craving and said, “Oh that someone would give me a drink of water from the well of Bethlehem, which is next to the gate!” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then the three [mighty men] broke through the camp of the Philistines and drew water out of the well of Bethlehem which was next to the gate, and brought it to David. But David would not drink it; he poured it out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [as an offering]; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and he said, “Far be it from me before my God that I would do this thing! Shall I drink the blood of these men who have put their lives in jeopardy? For they brought it at the risk of their lives.” So he would not drink it. These things the three mighty men did.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Abishai the brother of Joab was chief of the [other] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'So with MT, LXX; Syr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: thirty
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'three, and he lifted up his spear against three hundred and killed them, and he had a name as well as the three. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Of the three in the second [rank] he was the most honored and became their captain; however, he did not attain to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' three [Jashobeam, Eleazar, and Shammah].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Benaiah the son of Jehoiada, the son of a courageous man of Kabzeel who had done great things, killed the two '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sons of
  - type: text
    text: ' Ariel of Moab. Also he went down and killed a lion in a pit on a snowy day. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He killed an Egyptian also, a man of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: great
  - type: text
    text: ' stature, five '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. one cubit is approximately 18 in.
    marker-yv: yv-n
  - type: text
    text: 'cubits tall. In the Egyptian’s hand was a spear like a weaver’s beam, and Benaiah went down to him with [only] a staff (rod) and grabbed the spear from the Egyptian’s hand and killed him with his own spear. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Benaiah the son of Jehoiada did these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: things,
  - type: text
    text: ' and had a name as well as the three mighty men. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He was honored among the thirty, but he did not attain to [the rank of] the [first] three. David appointed him over his bodyguard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Now the mighty men of the armies were: Asahel the brother of Joab, Elhanan the son of Dodo of Bethlehem, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Shammoth the Harorite, Helez the Pelonite, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ira the son of Ikkesh of Tekoa, Abiezer of Anathoth, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Sibbecai the Hushathite, Ilai the Ahohite, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Maharai the Netophathite, Heled the son of Baanah the Netophathite, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ithai the son of Ribai of Gibeah of the Benjamites, Benaiah the Pirathonite, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hurai of the brooks of Gaash, Abiel the Arbathite, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Azmaveth the Baharumite, Eliahba the Shaalbonite, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'the sons of Hashem the Gizonite, Jonathan the son of Shagee the Hararite, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ahiam the son of Sacar the Hararite, Eliphal the son of Ur, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hepher the Mecherathite, Ahijah the Pelonite, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hezro the Carmelite, Naarai the son of Ezbai, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Joel the brother of Nathan, Mibhar the son of Hagri, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Zelek the Ammonite, Naharai the Berothite, the armor bearer of Joab the son of Zeruiah [David’s half-sister], '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ira the Ithrite, Gareb the Ithrite, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Uriah the Hittite [Bathsheba’s husband], Zabad the son of Ahlai, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Adina the son of Shiza the Reubenite, a chief of the Reubenites, and thirty [heroes] with him, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hanan the son of Maacah, and Joshaphat the Mithnite, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Uzzia the Ashterathite, Shama and Jeiel the sons of Hotham the Aroerite, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jediael the son of Shimri, and his brother Joha, the Tizite, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Eliel the Mahavite, Jeribai and Joshaviah the sons of Elnaam, Ithmah the Moabite, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Eliel and Obed and Jaasiel the Mezobaite.
