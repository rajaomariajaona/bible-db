    children:
    - type: text
      text: God’s Rescue of Israel from Egypt.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Israel came out of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The house of Jacob from a people of strange language,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Judah became His sanctuary,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Israel His dominion. [Ex 29:45, 46; Deut 27:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '¶The [Red] Sea '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '114:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some of the ancient rabbis said that the sea saw God’s right hand placed on Moses. Others said that it saw God’s name (
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH)
      - type: text
        text: ' engraved on Moses’ staff.'
    marker-yv: yv-n
  - type: text
    text: looked and fled;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Jordan turned back. [Ex 14:21; Josh 3:13, 16; Ps 77:16]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The mountains leaped like rams,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The [little] hills, like lambs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: What ails you, O sea, that you flee?
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Jordan, that you turn back?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O mountains, that you leap like rams,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O [little] hills, like lambs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Tremble, O earth, at the presence of the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the presence of the God of Jacob (Israel),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who turned the rock into a pool of water,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The flint into a fountain of water. [Ex 17:6; Num 20:11]
