document_id: PSA.114,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 114
  - type: heading
    content: God’s Rescue of Israel from Egypt.
  - type: text
    content: When Israel came out of Egypt,
  - type: text
    content: The house of Jacob from a people of strange language,
  '2':
  - type: text
    content: Judah became His sanctuary,
  - type: text
    content: And Israel His dominion. [Ex 29:45, 46; Deut 27:9]
  '3':
  - type: text
    content: '¶The [Red] Sea '
  - type: note
    content: Some of the ancient rabbis said that the sea saw God’s right hand placed on Moses. Others said that it saw God’s name (YHWH) engraved on Moses’ staff.
  - type: text
    content: looked and fled;
  - type: text
    content: The Jordan turned back. [Ex 14:21; Josh 3:13, 16; Ps 77:16]
  '4':
  - type: text
    content: The mountains leaped like rams,
  - type: text
    content: The [little] hills, like lambs.
  '5':
  - type: text
    content: What ails you, O sea, that you flee?
  - type: text
    content: O Jordan, that you turn back?
  '6':
  - type: text
    content: O mountains, that you leap like rams,
  - type: text
    content: O [little] hills, like lambs?
  '7':
  - type: text
    content: ¶Tremble, O earth, at the presence of the Lord,
  - type: text
    content: At the presence of the God of Jacob (Israel),
  '8':
  - type: text
    content: Who turned the rock into a pool of water,
  - type: text
    content: The flint into a fountain of water. [Ex 17:6; Num 20:11]
