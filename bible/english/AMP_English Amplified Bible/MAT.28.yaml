document_id: MAT.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus Is Risen!
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now after the Sabbath, near dawn of the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the week, Mary Magdalene and the other '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 27:61.
    marker-yv: yv-n
  - type: text
    text: 'Mary went to look at the tomb. [Mark 16:1-8; Luke 24:1-10, John 20:1-8] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And a great earthquake had occurred, for an angel of the Lord descended from heaven and came and rolled away the stone [from the opening of the tomb], and sat on it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The angel’s appearance was like lightning, and his clothes were as white as snow. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The guards shook, paralyzed with fear [at the sight] of him and became like dead men [pale and immobile]. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the angel said to the women, “Do not be afraid; for I know that you are looking for Jesus who has been crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He is not here, for He has risen, just as He said [He would]. Come! See the place where He was lying. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then go quickly and tell His disciples that He has risen from the dead; and behold, He is going ahead of you into Galilee [as He promised]. There you will see Him; behold, I have told you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the women left the tomb quickly with fear and great joy, and ran to tell [the good news to] the disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as they went,
  - type: text
    text: ' suddenly, Jesus met them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Rejoice!”
  - type: text
    text: ' And they went to Him and took hold of His feet [in homage] and worshiped Him [as the Messiah]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not be afraid; go and tell My brothers to leave for Galilee, and there they will see Me
  - type: text
    text: ' [just as I promised].”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'While they were on their way, some of the [Roman] guards went into the city and reported to the chief priests everything that had happened. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And when the chief priests had gathered with the elders and had consulted together [to develop a plan of deception], they gave a sufficient sum of money [as a bribe] to the soldiers, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and said, “You say this, ‘His disciples came at night and stole Him while we were sleeping.’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if the governor (Pilate) hears about it, we will calm him down and keep you out of trouble.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So they took the money [they were paid for lying] and did as they were instructed; and this [fabricated] story was widely spread among the Jews, and is to the present day.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Great Commission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now the eleven disciples went to Galilee, to the mountain which Jesus had designated. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And when they saw Him, they worshiped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him;
  - type: text
    text: ' but some doubted [that it was really He]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jesus came up and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “All authority (all power of absolute rule) in heaven and on earth has been given to Me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go therefore and make disciples of all the nations
  - type: text
    text: ' [help the people to learn of Me, believe in Me, and obey My words], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: baptizing them in the name of the Father and of the Son and of the Holy Spirit,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: teaching them to observe everything that I have commanded you; and lo, I am with you always
  - type: text
    text: ' [remaining with you perpetually—regardless of circumstance, and on every occasion], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even to the end of the age.”
