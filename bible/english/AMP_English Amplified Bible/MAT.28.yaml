document_id: MAT.28,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Risen!
  - type: text
    content: 'Now after the Sabbath, near dawn of the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, Mary Magdalene and the other '
  - type: note
    content: See note 27:61.
  - type: text
    content: 'Mary went to look at the tomb. [Mark 16:1-8; Luke 24:1-10, John 20:1-8] '
  '10':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Do not be afraid; go and tell My brothers to leave for Galilee, and there they will see Me
  - type: text
    content: ' [just as I promised].”'
  '11':
  - type: text
    content: 'While they were on their way, some of the [Roman] guards went into the city and reported to the chief priests everything that had happened. '
  '12':
  - type: text
    content: 'And when the chief priests had gathered with the elders and had consulted together [to develop a plan of deception], they gave a sufficient sum of money [as a bribe] to the soldiers, '
  '13':
  - type: text
    content: 'and said, “You say this, ‘His disciples came at night and stole Him while we were sleeping.’ '
  '14':
  - type: text
    content: 'And if the governor (Pilate) hears about it, we will calm him down and keep you out of trouble.” '
  '15':
  - type: text
    content: So they took the money [they were paid for lying] and did as they were instructed; and this [fabricated] story was widely spread among the Jews, and is to the present day.
  - type: heading
    content: The Great Commission
  '16':
  - type: text
    content: 'Now the eleven disciples went to Galilee, to the mountain which Jesus had designated. '
  '17':
  - type: text
    content: 'And when they saw Him, they worshiped '
  - type: text
    content: Him;
  - type: text
    content: ' but some doubted [that it was really He]. '
  '18':
  - type: text
    content: 'Jesus came up and said to them, '
  - type: text
    content: “All authority (all power of absolute rule) in heaven and on earth has been given to Me.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Go therefore and make disciples of all the nations
  - type: text
    content: ' [help the people to learn of Me, believe in Me, and obey My words], '
  - type: text
    content: baptizing them in the name of the Father and of the Son and of the Holy Spirit,
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And a great earthquake had occurred, for an angel of the Lord descended from heaven and came and rolled away the stone [from the opening of the tomb], and sat on it. '
  '20':
  - type: text
    content: teaching them to observe everything that I have commanded you; and lo, I am with you always
  - type: text
    content: ' [remaining with you perpetually—regardless of circumstance, and on every occasion], '
  - type: text
    content: even to the end of the age.”
  '3':
  - type: text
    content: 'The angel’s appearance was like lightning, and his clothes were as white as snow. '
  '4':
  - type: text
    content: 'The guards shook, paralyzed with fear [at the sight] of him and became like dead men [pale and immobile]. '
  '5':
  - type: text
    content: 'But the angel said to the women, “Do not be afraid; for I know that you are looking for Jesus who has been crucified. '
  '6':
  - type: text
    content: 'He is not here, for He has risen, just as He said [He would]. Come! See the place where He was lying. '
  '7':
  - type: text
    content: Then go quickly and tell His disciples that He has risen from the dead; and behold, He is going ahead of you into Galilee [as He promised]. There you will see Him; behold, I have told you.”
  '8':
  - type: text
    content: 'So the women left the tomb quickly with fear and great joy, and ran to tell [the good news to] the disciples. '
  '9':
  - type: text
    content: 'And '
  - type: text
    content: as they went,
  - type: text
    content: ' suddenly, Jesus met them, saying, '
  - type: text
    content: “Rejoice!”
  - type: text
    content: ' And they went to Him and took hold of His feet [in homage] and worshiped Him [as the Messiah]. '
