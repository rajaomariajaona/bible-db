verses:
  '1':
  - type: heading
    content: The Evils of Oppression
  - type: text
    content: 'Then I looked again '
  - type: text
    content: and
  - type: text
    content: ' considered all the acts of oppression that were being practiced under the sun. And behold '
  - type: text
    content: I saw
  - type: text
    content: ' the tears of the oppressed and they had no one to comfort them; and on the side of their oppressors was power, but they had no one to comfort them. '
  '10':
  - type: text
    content: 'for if '
  - type: note
    content: Lit they fall.
  - type: text
    content: 'either of them falls, the one will lift up his companion. But woe to him who is alone when he falls and does not have another to lift him up. '
  '11':
  - type: text
    content: 'Again, if two lie down together, then they keep warm; but how can one be warm '
  - type: text
    content: alone?
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And though one can overpower him who is alone, two can resist him. A cord of three '
  - type: text
    content: strands
  - type: text
    content: ' is not quickly broken.'
  '13':
  - type: text
    content: 'A poor yet wise youth is better than an old and foolish king who '
  - type: note
    content: God’s word calls on us to make our senior years a time of spiritual maturity and intellectual growth. A time to convert a lifetime of courageous morality, personal integrity, and character-building into a legacy that encourages and inspires the next generation.
  - type: text
    content: 'no longer knows how to receive instruction '
  - type: text
    content: and
  - type: text
    content: ' counsel (friendly reproof, warning)— '
  '14':
  - type: text
    content: 'for the poor youth has [used his wisdom and] come out of prison to become king, even though he was born poor in his kingdom. '
  '15':
  - type: text
    content: 'I have seen all the living under the sun join with the second youth (the king’s acknowledged successor) who replaces him. '
  '16':
  - type: text
    content: There is no end to all the people; to all who were before them. Yet those who come later will not be happy with him. Surely this also is vanity (emptiness) and chasing after the wind.
  '2':
  - type: text
    content: 'So I congratulated '
  - type: text
    content: and
  - type: text
    content: ' thought more fortunate are those who are already dead than the living who are still living. '
  '3':
  - type: text
    content: But better off than either of them is the one who has not yet been born, who has not seen the evil deeds that are done under the sun.
  '4':
  - type: text
    content: 'I have seen that every [effort in] labor and every skill in work '
  - type: text
    content: comes from
  - type: text
    content: ' man’s rivalry with his neighbor. This too is vanity (futility, false pride) and chasing after the wind. '
  '5':
  - type: text
    content: 'The fool folds his hands [together] and consumes his own flesh [destroying himself by idleness and apathy]. '
  '6':
  - type: text
    content: 'One hand full of rest '
  - type: text
    content: and
  - type: text
    content: ' patience is better than two fists full of labor and chasing after the wind.'
  '7':
  - type: text
    content: 'Then I looked again at vanity under the sun [in one of its peculiar forms]. '
  '8':
  - type: text
    content: 'There was a certain man—without a dependent, having neither a child nor a brother, yet there was no end to all his labor. Indeed, his eyes were not satisfied with riches '
  - type: text
    content: and he never asked,
  - type: text
    content: ' “For whom do I labor and deprive myself of pleasure?” This too is vanity (a wisp of smoke, self-conceit); yes, it is a painful effort '
  - type: text
    content: and
  - type: text
    content: ' an unhappy task. [Prov 27:20; 1 John 2:16]'
  '9':
  - type: text
    content: 'Two are better than one because they have a more satisfying return for their labor; '
