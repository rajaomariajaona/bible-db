document_id: ECC.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Evils of Oppression
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I looked again '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' considered all the acts of oppression that were being practiced under the sun. And behold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I saw
    - type: text
      text: ' the tears of the oppressed and they had no one to comfort them; and on the side of their oppressors was power, but they had no one to comfort them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'for if '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: they fall
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'either of them falls, the one will lift up his companion. But woe to him who is alone when he falls and does not have another to lift him up. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Again, if two lie down together, then they keep warm; but how can one be warm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alone?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And though one can overpower him who is alone, two can resist him. A cord of three '
    - type: usfm
      marker: it
      children:
      - type: text
        text: strands
    - type: text
      text: ' is not quickly broken.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A poor yet wise youth is better than an old and foolish king who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s word calls on us to make our senior years a time of spiritual maturity and intellectual growth. A time to convert a lifetime of courageous morality, personal integrity, and character-building into a legacy that encourages and inspires the next generation.
      marker-yv: yv-n
    - type: text
      text: 'no longer knows how to receive instruction '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' counsel (friendly reproof, warning)— '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'for the poor youth has [used his wisdom and] come out of prison to become king, even though he was born poor in his kingdom. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I have seen all the living under the sun join with the second youth (the king’s acknowledged successor) who replaces him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: There is no end to all the people; to all who were before them. Yet those who come later will not be happy with him. Surely this also is vanity (emptiness) and chasing after the wind.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So I congratulated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thought more fortunate are those who are already dead than the living who are still living. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But better off than either of them is the one who has not yet been born, who has not seen the evil deeds that are done under the sun.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I have seen that every [effort in] labor and every skill in work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes from
    - type: text
      text: ' man’s rivalry with his neighbor. This too is vanity (futility, false pride) and chasing after the wind. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The fool folds his hands [together] and consumes his own flesh [destroying himself by idleness and apathy]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'One hand full of rest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' patience is better than two fists full of labor and chasing after the wind.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then I looked again at vanity under the sun [in one of its peculiar forms]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'There was a certain man—without a dependent, having neither a child nor a brother, yet there was no end to all his labor. Indeed, his eyes were not satisfied with riches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and he never asked,
    - type: text
      text: ' “For whom do I labor and deprive myself of pleasure?” This too is vanity (a wisp of smoke, self-conceit); yes, it is a painful effort '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an unhappy task. [Prov 27:20; 1 John 2:16]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Two are better than one because they have a more satisfying return for their labor; '
