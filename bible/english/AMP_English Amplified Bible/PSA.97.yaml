  - type: text
    content: 'Let the many islands '
  - type: text
    content: and
  - type: text
    content: ' coastlands be glad.'
  '10':
  - type: text
    content: ¶You who love the L
  - type: heading
    content: ord
  - type: text
    content: ', hate evil;'
  - type: text
    content: He protects the souls of His godly ones (believers),
  - type: text
    content: He rescues them from the hand of the wicked. [Rom 8:13-17]
  '11':
  - type: text
    content: 'Light is sown [like seed] for the righteous '
  - type: text
    content: and
  - type: text
    content: ' illuminates their path,'
  - type: text
    content: And [irrepressible] joy [is spread] for the upright in heart [who delight in His favor and protection].
  '12':
  - type: text
    content: Rejoice in the L
  - type: heading
    content: ord
  - type: text
    content: ', you righteous ones [those whose moral and spiritual integrity places them in right standing with God],'
  - type: text
    content: 'And praise '
  - type: text
    content: and
  - type: text
    content: ' give thanks at the remembrance of His holy name.'
  '2':
  - type: text
    content: Clouds and thick darkness surround Him [as at Sinai];
  - type: text
    content: Righteousness and justice are the foundation of His throne. [Ex 19:9]
  '3':
  - type: text
    content: Fire goes before Him
  - type: text
    content: And burns up His adversaries on all sides.
  '4':
  - type: text
    content: His lightnings have illuminated the world;
  - type: text
    content: The earth has seen and trembled.
  '5':
  - type: text
    content: The mountains melted like wax at the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: At the presence of the Lord of the whole earth.
  '6':
  - type: text
    content: The heavens declare His righteousness,
  - type: text
    content: 'And all the peoples see His glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance.'
  '7':
  - type: text
    content: ¶Let all those be [deeply] ashamed who serve carved images,
  - type: text
    content: Who boast in idols.
  - type: text
    content: Worship Him, all you gods! [Heb 1:6]
  '8':
  - type: text
    content: Zion heard this and was glad,
  - type: text
    content: And the daughters (cities) of Judah rejoiced [in relief]
  - type: text
    content: Because of Your judgments, O L
  - type: heading
    content: ord
  - type: text
    content: .
  '9':
  - type: text
    content: For You are the L
  - type: heading
    content: ord
  - type: text
    content: ' Most High over all the earth;'
  - type: text
    content: You are exalted far above all gods.
