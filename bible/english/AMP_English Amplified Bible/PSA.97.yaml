      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Power and Dominion.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' reigns, let the earth rejoice;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let the many islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands be glad.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Clouds and thick darkness surround Him [as at Sinai];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Righteousness and justice are the foundation of His throne. [Ex 19:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fire goes before Him
- type: usfm
  marker: q1
  children:
  - type: text
    text: And burns up His adversaries on all sides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His lightnings have illuminated the world;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth has seen and trembled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The mountains melted like wax at the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the presence of the Lord of the whole earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The heavens declare His righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And all the peoples see His glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶Let all those be [deeply] ashamed who serve carved images,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who boast in idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Worship Him, all you gods! [Heb 1:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Zion heard this and was glad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the daughters (cities) of Judah rejoiced [in relief]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of Your judgments, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For You are the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' Most High over all the earth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are exalted far above all gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶You who love the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', hate evil;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He protects the souls of His godly ones (believers),
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rescues them from the hand of the wicked. [Rom 8:13-17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Light is sown [like seed] for the righteous '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' illuminates their path,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [irrepressible] joy [is spread] for the upright in heart [who delight in His favor and protection].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rejoice in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', you righteous ones [those whose moral and spiritual integrity places them in right standing with God],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' give thanks at the remembrance of His holy name.'
