document_id: GEN.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Flood Abates
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God remembered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thought kindly of Noah and every living thing and all the animals that were with him in the ark; and God made a wind blow over the land, and the waters receded. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He waited another seven days and again sent the dove out from the ark. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The dove came back to him in the evening, and there, in her beak, was a fresh olive leaf. So Noah knew that the water level had subsided from the earth. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he waited another seven days and sent out the dove, but she did not return to him again.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in the six hundred and first year [of Noah’s life], on the first day of the first month, the waters were drying up from the earth. Then Noah removed the covering of the ark and looked, and the surface of the ground was drying. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the twenty-seventh day of the second month the land was [entirely] dry. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God spoke to Noah, saying, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go out of the ark, you and your wife and your sons and their wives with you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bring out with you every living thing from all flesh—birds and animals and every crawling thing that crawls on the earth—that they may breed abundantly on the earth, and be fruitful and multiply on the earth.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Noah went out, and his wife and his sons and their wives with him [after being in the ark one year and ten days]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every animal, every crawling thing, every bird—and whatever moves on the land—went out by families (types, groupings) from the ark.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also the fountains of the deep [subterranean waters] and the windows of the heavens were closed, the [pouring] rain from the sky was restrained, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Noah built an altar to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and took of every [ceremonially] clean animal and of every clean bird and offered burnt offerings on the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' smelled the pleasing aroma [a soothing, satisfying scent] and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Himself, “I will never again curse the ground because of man, for the intent (strong inclination, desire) of man’s heart is wicked from his youth; and I will never again destroy every living thing, as I have done.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “While the earth remains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seedtime and harvest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cold and heat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Winter and summer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And day and night
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall not cease.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the waters receded steadily from the earth. At the end of a hundred and fifty days the waters had diminished. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventeenth day of the seventh month [five months after the rain began], the ark came to rest on the mountains of Ararat [in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Formerly in Armenia, now in Turkey—near the present-day Turkish-Armenian border.
      marker-yv: yv-n
    - type: text
      text: 'Turkey]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The waters continued to decrease until the tenth month; on the first day of the tenth month the tops of the mountains were seen.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of [another] forty days Noah opened the window of the ark which he had made; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he sent out a raven, which flew here and there until the waters were dried up from the earth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Noah sent out a dove to see if the water level had fallen below the surface of the land. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the dove found no place on which to rest the sole of her foot, and she returned to him to the ark, for the waters were [still] on the face of the entire earth. So he reached out his hand and took the dove, and brought her into the ark. '
