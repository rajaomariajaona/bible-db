document_id: EZK.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ezekiel Prepares for Exile
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' also came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “This '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an urgent message the prophet is under compulsion to proclaim.
      marker-yv: yv-n
    - type: text
      text: 'oracle (a burden to be carried) concerns the prince (Zedekiah) in Jerusalem as well as all the house of Israel who are there.” ’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Say, ‘I am a sign to you. As I have done, so it will be done to them; they will go into exile, into captivity.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The prince who is among them will load '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his provisions and supplies
    - type: text
      text: ' on his shoulder in the dark and go out. They will dig a hole through the wall to go out. He will cover his face so that he cannot see the land with his eyes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I will also spread My net over him, and he will be caught in My snare. And I will bring him to Babylon, to the land of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Chaldeans became the dominant people in Babylonia when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
      marker-yv: yv-n
    - type: text
      text: 'Chaldeans; yet he will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was fulfilled as recorded in several Old Testament passages, especially note Jer 52:7-11. King Zedekiah’s eyes were blinded in Riblah before he was taken to Babylon, where he died. Therefore he did “not see it,” even though he died there.
      marker-yv: yv-n
    - type: text
      text: 'not see it, though he will die there. [2 Kin 25:1-7; Jer 39:5; 52:7-11] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I will scatter to every wind all who are around him, his helpers and all his troops; and I will draw out a sword after them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So they will know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand fully that I am the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' when I scatter them among the nations and disperse them among the [pagan] countries. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But I will leave a few [survivors] who will escape the sword, the famine, and the virulent disease, that they may confess all their repulsive (idolatrous) acts among the nations where they go, and may know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Moreover, the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Son of man, eat your bread with anxiety, and drink your water with trembling and with fear. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then say to the people of the land, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ' concerning the inhabitants of Jerusalem in the land of Israel, “They will eat their bread with anxiety and drink their water with horror, because their land will be stripped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' looted of its fullness because of the violence of all those who live in it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, you live among a rebellious house, who have eyes to see but do not see, who have ears to hear but do not hear; for they are a rebellious people. [Mark 8:18] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The cities that are inhabited will be in ruins and the land will be deserted; and you will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .” ’ ”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Son of man, what is this proverb that you have in the land of Israel, saying, ‘The days are long and every vision fails’? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Therefore tell them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “I will put an end to this proverb, and they will no longer use it as a proverb in Israel.” But say to them, “The days draw near as well as the fulfillment of every vision. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For there will no longer be any false '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empty vision or flattering divination within the house of Israel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: For I the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will speak, and whatever word I speak will be accomplished. It will no longer be delayed, for in your days, O rebellious house, I will speak the word and I will fulfill it,” says the Lord G'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .’ ”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Again the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Son of man, behold, the house of Israel is saying, ‘The vision that Ezekiel sees is for many years '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from now,
    - type: text
      text: ' and he prophesies of the times that are far off.’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Therefore say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “None of My words will be delayed any longer. Whatever word I speak will be fulfilled completely,” ’ ” says the Lord God.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore, son of man, prepare your belongings for exile, and move into exile during the day when they will see you; even go into exile from your place to another place as they watch. Perhaps they will understand even though they are a rebellious people. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Bring your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: baggage
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'provisions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supplies out during the day as they watch, as provisions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supplies for [going into] exile. Then you shall go out at evening as they watch, as those going into exile. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dig through the wall as they watch and go out through the hole. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'As they look on, load '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the provisions and supplies
    - type: text
      text: ' on your shoulder and carry it out in the dark. You shall cover your face so that you cannot see the land, for I have set you as a sign to the house of Israel.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I did as I had been commanded. I brought out my provisions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supplies during the day, like the provisions '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' supplies of an exile, and in the evening I dug through the wall with my hands. I brought out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my provisions and supplies
    - type: text
      text: ' in the dark, carrying it on my shoulder as they watched.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: In the morning the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Son of man, has not the house of Israel, the rebellious house, asked you, ‘What you are doing?’ '
