  - type: note
    content: This prophecy was fulfilled as recorded in several Old Testament passages, especially note Jer 52:7-11. King Zedekiah’s eyes were blinded in Riblah before he was taken to Babylon, where he died. Therefore he did “not see it,” even though he died there.
