        text: Three early mss do not contain “at Ephesus.” Some scholars suggest that this was intended as a circular letter for various churches of Asia Minor (modern Turkey), sent first to Ephesus and then to the other churches. See Paul’s instruction to the Colossians in 4:16. Others believe the letter was directed only to the Ephesians because of its many personal references. The books of Ephesians, Philippians, Colossians, and Philemon are believed to have been written by Paul while he was a prisoner under house arrest in Rome (
