document_id: ACT.24,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul before Felix
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Five days later, the high priest Ananias came down [from Jerusalem to Caesarea] with some elders and an attorney '
    - type: usfm
      marker: it
      children:
      - type: text
        text: named
    - type: text
      text: ' Tertullus [acting as spokesman and counsel]. They presented to the governor their [formal] charges against Paul. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the governor nodded for him to speak, Paul answered,
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: K
    - type: text
      text: 'nowing that for many years you have been a judge over this nation, I make my defense cheerfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' with good courage. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As you can easily verify, it has been no more than twelve days since I went up to Jerusalem to worship. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither in the temple, nor in the synagogues, nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: elsewhere
    - type: text
      text: ' in the city did they find me carrying on a discussion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' disputing with anybody or causing a crowd to gather. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nor can they present evidence to you to prove what they now bring against me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I confess this to you, that according to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 9:2. Paul was probably referring to Jesus Himself.
      marker-yv: yv-n
    - type: text
      text: 'the Way, which they call a [divisive and heretical] sect, I do worship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serve the God of our fathers, [confidently] believing everything that is in accordance with the Law [of Moses] and that is written in the Prophets; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'having [the same] hope in God which these men cherish themselves, that there shall certainly be a resurrection of [the dead], both of the righteous and of the wicked. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In view of this, I also do my best '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' strive always to have a clear conscience before God and before men. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now after several years I came [to Jerusalem] to bring to my people charitable contributions and offerings. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They found me in the temple presenting these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: offerings
    - type: text
      text: ', after I had undergone [the rites of] purification, without any crowd or uproar. But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there were
    - type: text
      text: ' some Jews from [the west coast province of] Asia [Minor], '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who ought to have been here before you to present their charges, if they have anything against me. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Paul had been summoned, Tertullus began the complaint [against him], saying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'to the governor:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: bd
      children:
      - type: text
        text: S
    - type: text
      text: 'ince through you we have attained great peace, and since by your foresight reforms are being carried out for this nation, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or else let these men tell what crime they found [me guilty of] when I stood before the Council (Sanhedrin, Jewish High Court), '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: other than for this one statement which I had shouted out as I stood among them, ‘For the resurrection of the dead I am on trial before you today.’ ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Felix, having a rather accurate understanding about the Way, put them off, saying, “When Lysias the commander comes down, I will decide your case.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he ordered the centurion to keep Paul in custody, but to let him have some freedom, and [he told the centurion] not to stop any of his friends from providing for his needs.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Several days later Felix came with his wife '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Youngest daughter of Herod Agrippa I.
      marker-yv: yv-n
    - type: text
      text: 'Drusilla, who was a Jewess. He sent for Paul and listened to him talk about faith in Christ Jesus. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as he was discussing righteousness, self-control [honorable behavior, personal integrity], and the judgment to come, Felix became frightened and said, “Go away for now, and when I find [a convenient] time I will send for you.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same time he was also hoping to get money from Paul [as a bribe]; so he continued to send for him quite often and talked with him. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after two years had passed, Felix was succeeded [in office] by '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Festus served about two years as governor (procurator). He was regarded as a fairly capable governor, superior to both his predecessor and his successor.
      marker-yv: yv-n
    - type: text
      text: Porcius Festus; and wishing to do the Jews a favor, Felix left Paul imprisoned.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in every way and in every place, most excellent Felix, we acknowledge this with all gratitude. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But so that I do not weary you further, I beg you to grant us, by your kindness, a brief hearing. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we have found this man to be a public menace and one who '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Inciting rebellion was a serious crime under Roman law.
      marker-yv: yv-n
    - type: text
      text: 'instigates dissension among all the Jews throughout the world, and a ringleader of the [heretical] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Romans had forbidden the establishment of any new religion.
      marker-yv: yv-n
    - type: text
      text: 'sect of the Nazarenes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He even tried to desecrate the temple, but we took him into custody '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Early mss do not contain the remainder of v 6, v 7, nor the first part of v 8.
      marker-yv: yv-n
    - type: text
      text: '[and we intended to judge him by our Law, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Lysias the commander came, and with great force took him out of our hands, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and ordered his accusers to come before you.] By interrogating him yourself concerning all these matters you will be able to determine [the truth about] these things with which we charge him.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews also joined in the attack, declaring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' insisting that these things were so.'
