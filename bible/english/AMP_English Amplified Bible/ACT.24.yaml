document_id: ACT.24,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul before Felix
  - type: text
    content: 'Five days later, the high priest Ananias came down [from Jerusalem to Caesarea] with some elders and an attorney '
  - type: text
    content: named
  - type: text
    content: ' Tertullus [acting as spokesman and counsel]. They presented to the governor their [formal] charges against Paul. '
  '10':
  - type: text
    content: When the governor nodded for him to speak, Paul answered,
  - type: text
    content: “
  - type: text
    content: K
  - type: text
    content: 'nowing that for many years you have been a judge over this nation, I make my defense cheerfully '
  - type: text
    content: and
  - type: text
    content: ' with good courage. '
  '11':
  - type: text
    content: 'As you can easily verify, it has been no more than twelve days since I went up to Jerusalem to worship. '
  '12':
  - type: text
    content: 'Neither in the temple, nor in the synagogues, nor '
  - type: text
    content: elsewhere
  - type: text
    content: ' in the city did they find me carrying on a discussion '
  - type: text
    content: or
  - type: text
    content: ' disputing with anybody or causing a crowd to gather. '
  '13':
  - type: text
    content: 'Nor can they present evidence to you to prove what they now bring against me. '
  '14':
  - type: text
    content: 'But I confess this to you, that according to '
  - type: note
    content: See note 9:2. Paul was probably referring to Jesus Himself.
  - type: text
    content: 'the Way, which they call a [divisive and heretical] sect, I do worship '
  - type: text
    content: and
  - type: text
    content: ' serve the God of our fathers, [confidently] believing everything that is in accordance with the Law [of Moses] and that is written in the Prophets; '
  '15':
  - type: text
    content: 'having [the same] hope in God which these men cherish themselves, that there shall certainly be a resurrection of [the dead], both of the righteous and of the wicked. '
  '16':
  - type: text
    content: 'In view of this, I also do my best '
  - type: text
    content: and
  - type: text
    content: ' strive always to have a clear conscience before God and before men. '
  '17':
  - type: text
    content: 'Now after several years I came [to Jerusalem] to bring to my people charitable contributions and offerings. '
  '18':
  - type: text
    content: 'They found me in the temple presenting these '
  - type: text
    content: offerings
  - type: text
    content: ', after I had undergone [the rites of] purification, without any crowd or uproar. But '
  - type: text
    content: there were
  - type: text
    content: ' some Jews from [the west coast province of] Asia [Minor], '
  '19':
  - type: text
    content: 'who ought to have been here before you to present their charges, if they have anything against me. '
  '2':
  - type: text
    content: 'After Paul had been summoned, Tertullus began the complaint [against him], saying '
  - type: text
    content: 'to the governor:'
  - type: text
    content: “
  - type: text
    content: S
  - type: text
    content: 'ince through you we have attained great peace, and since by your foresight reforms are being carried out for this nation, '
  '20':
  - type: text
    content: 'Or else let these men tell what crime they found [me guilty of] when I stood before the Council (Sanhedrin, Jewish High Court), '
  '21':
  - type: text
    content: other than for this one statement which I had shouted out as I stood among them, ‘For the resurrection of the dead I am on trial before you today.’ ”
  '22':
  - type: text
    content: 'But Felix, having a rather accurate understanding about the Way, put them off, saying, “When Lysias the commander comes down, I will decide your case.” '
  '23':
  - type: text
    content: Then he ordered the centurion to keep Paul in custody, but to let him have some freedom, and [he told the centurion] not to stop any of his friends from providing for his needs.
  '24':
  - type: text
    content: 'Several days later Felix came with his wife '
  - type: note
    content: Youngest daughter of Herod Agrippa I.
  - type: text
    content: 'Drusilla, who was a Jewess. He sent for Paul and listened to him talk about faith in Christ Jesus. '
  '25':
  - type: text
    content: 'But as he was discussing righteousness, self-control [honorable behavior, personal integrity], and the judgment to come, Felix became frightened and said, “Go away for now, and when I find [a convenient] time I will send for you.” '
  '26':
  - type: text
    content: 'At the same time he was also hoping to get money from Paul [as a bribe]; so he continued to send for him quite often and talked with him. '
  '27':
  - type: text
    content: 'But after two years had passed, Felix was succeeded [in office] by '
  - type: note
    content: Festus served about two years as governor (procurator). He was regarded as a fairly capable governor, superior to both his predecessor and his successor.
  - type: text
    content: Porcius Festus; and wishing to do the Jews a favor, Felix left Paul imprisoned.
  '3':
  - type: text
    content: 'in every way and in every place, most excellent Felix, we acknowledge this with all gratitude. '
  '4':
  - type: text
    content: 'But so that I do not weary you further, I beg you to grant us, by your kindness, a brief hearing. '
  '5':
  - type: text
    content: 'For we have found this man to be a public menace and one who '
  - type: note
    content: Inciting rebellion was a serious crime under Roman law.
  - type: text
    content: 'instigates dissension among all the Jews throughout the world, and a ringleader of the [heretical] '
  - type: note
    content: The Romans had forbidden the establishment of any new religion.
  - type: text
    content: 'sect of the Nazarenes. '
  '6':
  - type: text
    content: 'He even tried to desecrate the temple, but we took him into custody '
  - type: note
    content: Early mss do not contain the remainder of v 6, v 7, nor the first part of v 8.
  - type: text
    content: '[and we intended to judge him by our Law, '
  '7':
  - type: text
    content: 'but Lysias the commander came, and with great force took him out of our hands, '
  '8':
  - type: text
    content: 'and ordered his accusers to come before you.] By interrogating him yourself concerning all these matters you will be able to determine [the truth about] these things with which we charge him.” '
  '9':
  - type: text
    content: 'The Jews also joined in the attack, declaring '
  - type: text
    content: and
  - type: text
    content: ' insisting that these things were so.'
