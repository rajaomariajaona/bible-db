verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Observances of Fasts
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cry aloud, do not hold back;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your voice like a trumpet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And declare to My people their transgression
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to the house of Jacob their sins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if you offer yourself to [assist] the hungry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And satisfy the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: soul
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: need of the afflicted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then your light will rise in darkness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your gloom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will become
    - type: text
      text: ' like midday.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will continually guide you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And satisfy your soul in scorched '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dry places,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And give strength to your bones;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will be like a watered garden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And like a spring of water whose waters do not fail.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And your people will rebuild the ancient ruins;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will raise up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' restore the age-old foundations [of buildings that have been laid waste];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be called Repairer of the Breach,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Restorer of Streets '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to dwell
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: with Dwellings.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Keeping the Sabbath
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“If you turn back your foot from [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The ancient rabbis established strict limits for travel on the Sabbath, excepting unintentional violations and religious errands. This verse became a rabbinic proof text to rule on whether a person who had put one foot beyond the Sabbath limit for his city could reenter the city. But the Hebrew text may not refer to travel at all; '
        - type: usfm
          marker: it
          children:
          - type: text
            text: turn back your foot from the Sabbath
        - type: text
          text: ' can be interpreted as an idiom referring to keeping oneself from violating the Sabbath in other ways.'
      marker-yv: yv-n
    - type: text
      text: unnecessary travel on] the Sabbath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From doing your own pleasure on My holy day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And call the Sabbath a [spiritual] delight, and the holy day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' honorable,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And honor it, not going your own way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: finding
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: engaging in your own pleasure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or speaking your own [idle] words,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will take pleasure in the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will make you ride on the high places of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will feed you with the [promised] heritage of Jacob your father;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the mouth of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has spoken.” [Gen 27:28, 29; 28:13-15]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yet they seek Me day by day and delight [superficially] to know My ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As [if they were in reality] a nation that has done righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And has not abandoned (turned away from) the ordinance of their God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ask of Me righteous judgments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They delight in the nearness of God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Why have we fasted,’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they say,
    - type: text
      text: ' ‘and You do not see it?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have we humbled ourselves and You do not notice?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear this [O Israel], on the day of your fast [when you should be grieving for your sins] you find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something you
    - type: text
      text: ' desire [to do],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you force your hired servants to work [instead of stopping all work, as the law teaches]. [Lev 16:29]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The facts are that you fast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' for strife and brawling and to strike with the fist of wickedness.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You do not fast as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you do
    - type: text
      text: ' today to make your voice heard on high.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is a fast such as this what I have chosen, a day for a man to humble himself [with sorrow in his soul]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' to bow down his head like a reed'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to make sackcloth and ashes as a bed [pretending to have a repentant heart]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you call this a fast and a day pleasing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “[Rather] is this not the fast which I choose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To undo the bonds of wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To tear to pieces the ropes of the yoke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To let the oppressed go free
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And break apart every [enslaving] yoke? [Acts 8:23]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is it not to divide your bread with the hungry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And bring the homeless poor into the house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you see the naked, that you cover him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And not to hide yourself from [the needs of] your own flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blood?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then your light will break out like the dawn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And your healing (restoration, new life) will quickly spring forth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness will go before you [leading you to peace and prosperity],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The glory of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be your rear guard. [Ex 14:19, 20; Is 52:12]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then you will call, and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will answer;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will cry for help, and He will say, ‘Here I am.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you take away from your midst the yoke [of oppression],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The finger pointed in scorn [toward the oppressed or the godly], and [every form of] wicked (sinful, unjust) speech, [Ex 3:14]
