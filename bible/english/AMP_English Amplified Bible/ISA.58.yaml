  - type: note
    content: The ancient rabbis established strict limits for travel on the Sabbath, excepting unintentional violations and religious errands. This verse became a rabbinic proof text to rule on whether a person who had put one foot beyond the Sabbath limit for his city could reenter the city. But the Hebrew text may not refer to travel at all; turn back your foot from the Sabbath can be interpreted as an idiom referring to keeping oneself from violating the Sabbath in other ways.
