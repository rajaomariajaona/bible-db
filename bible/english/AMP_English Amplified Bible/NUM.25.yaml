document_id: NUM.25,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sin of Peor
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Israel settled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remained in Shittim, and the people began to play the prostitute with the women of Moab [by being unfaithful to God]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Phinehas the son of Eleazar, the son of Aaron the priest, has turned my wrath away from the Israelites because he was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. intolerant of unfaithfulness. God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
      marker-yv: yv-n
    - type: text
      text: 'jealous with My jealousy among them, so that I did not destroy the Israelites in My jealousy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore say, ‘Behold, I give to Phinehas My covenant of peace. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And it shall be for him and his descendants after him, a covenant of an everlasting priesthood, because he was jealous (impassioned) for [the unique honor and respect owed to] his God and made '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. reconciled the Israelites to God.
      marker-yv: yv-n
    - type: text
      text: atonement for the sons of Israel.’ ” [Ps 106:28-31]
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now the name of the man of Israel who was killed with the Midianite woman was Zimri the son of Salu, a leader of a father’s household among the Simeonites. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The name of the Midianite woman who was killed was Cozbi the daughter of Zur, who was the tribal head of a father’s household in Midian.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Provoke hostilities with the Midianites and attack them, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: for they harass you with their tricks, the tricks with which they have deceived you in the matter [of the Baal] of Peor, and in the matter of Cozbi, the daughter of the leader of Midian, their sister, who was killed on the day of the plague because [of the Baal] of Peor.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For they invited the Israelites to the sacrifices of their gods, and the Israelites ate [food offered to idols] and bowed down to Moab’s gods. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So Israel joined themselves to Baal of Peor [in worship]. And the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was kindled against Israel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Take all the leaders of the people [who have committed sin with the Moabites], and execute them in broad daylight before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', so that the fierce anger of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' may turn away from Israel.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So Moses said to the judges of Israel, “Each one of you must kill his men who have joined themselves to Baal of Peor [in worship].”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then one of the Israelites came and presented to his relatives a Midianite woman, in the sight of Moses and the whole congregation of the Israelites, while they were weeping [over God’s judgment] at the doorway of the Tent of Meeting (tabernacle). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'When Phinehas the son of Eleazar, the son of Aaron the priest, saw this, he left the congregation and took a spear in his hand, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and he went after the man of Israel into the tent, and pierced both of them through the body, the man of Israel and the woman. Then the plague on the Israelites stopped. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nevertheless, those [Israelites] who died in the plague numbered 24,000.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Zeal of Phinehas
    marker-yv: yv-h
