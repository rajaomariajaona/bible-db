document_id: NUM.25,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sin of Peor
  - type: text
    content: 'Israel settled '
  - type: text
    content: and
  - type: text
    content: ' remained in Shittim, and the people began to play the prostitute with the women of Moab [by being unfaithful to God]. '
  '10':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '11':
  - type: text
    content: '“Phinehas the son of Eleazar, the son of Aaron the priest, has turned my wrath away from the Israelites because he was '
  - type: note
    content: I.e. intolerant of unfaithfulness. God does not tolerate the transfer of the honor and worship that is due Him to any other being or object.
  - type: text
    content: 'jealous with My jealousy among them, so that I did not destroy the Israelites in My jealousy. '
  '12':
  - type: text
    content: 'Therefore say, ‘Behold, I give to Phinehas My covenant of peace. '
  '13':
  - type: text
    content: 'And it shall be for him and his descendants after him, a covenant of an everlasting priesthood, because he was jealous (impassioned) for [the unique honor and respect owed to] his God and made '
  - type: note
    content: I.e. reconciled the Israelites to God.
  - type: text
    content: atonement for the sons of Israel.’ ” [Ps 106:28-31]
  '14':
  - type: text
    content: 'Now the name of the man of Israel who was killed with the Midianite woman was Zimri the son of Salu, a leader of a father’s household among the Simeonites. '
  '15':
  - type: text
    content: The name of the Midianite woman who was killed was Cozbi the daughter of Zur, who was the tribal head of a father’s household in Midian.
  '16':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '17':
  - type: text
    content: '“Provoke hostilities with the Midianites and attack them, '
  '18':
  - type: text
    content: for they harass you with their tricks, the tricks with which they have deceived you in the matter [of the Baal] of Peor, and in the matter of Cozbi, the daughter of the leader of Midian, their sister, who was killed on the day of the plague because [of the Baal] of Peor.”
  '2':
  - type: text
    content: 'For they invited the Israelites to the sacrifices of their gods, and the Israelites ate [food offered to idols] and bowed down to Moab’s gods. '
  '3':
  - type: text
    content: So Israel joined themselves to Baal of Peor [in worship]. And the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' was kindled against Israel. '
  '4':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Take all the leaders of the people [who have committed sin with the Moabites], and execute them in broad daylight before the L'
  - type: heading
    content: ord
  - type: text
    content: ', so that the fierce anger of the L'
  - type: heading
    content: ord
  - type: text
    content: ' may turn away from Israel.” '
  '5':
  - type: text
    content: So Moses said to the judges of Israel, “Each one of you must kill his men who have joined themselves to Baal of Peor [in worship].”
  '6':
  - type: text
    content: 'Then one of the Israelites came and presented to his relatives a Midianite woman, in the sight of Moses and the whole congregation of the Israelites, while they were weeping [over God’s judgment] at the doorway of the Tent of Meeting (tabernacle). '
  '7':
  - type: text
    content: 'When Phinehas the son of Eleazar, the son of Aaron the priest, saw this, he left the congregation and took a spear in his hand, '
  '8':
  - type: text
    content: 'and he went after the man of Israel into the tent, and pierced both of them through the body, the man of Israel and the woman. Then the plague on the Israelites stopped. '
  '9':
  - type: text
    content: Nevertheless, those [Israelites] who died in the plague numbered 24,000.
  - type: heading
    content: The Zeal of Phinehas
