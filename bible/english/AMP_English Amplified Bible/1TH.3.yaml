document_id: 1TH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Encouragement of Timothy’s Visit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, when we could no longer endure our separation [from you], we thought it best to be left behind, alone at Athens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and so we sent Timothy, our brother and God’s servant in [spreading] the good news of Christ, to strengthen and encourage you [exhorting, comforting, and establishing you] in regard to your faith, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'so that no one would be unsettled by these difficulties [to which I have referred]. For you know that we have been destined for this [as something unavoidable in our position]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For even when we were with you, we warned you plainly in advance that we were going to experience persecution; and so, as you know, it has come to pass. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For this reason, when I could no longer endure the suspense, I sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: someone
  - type: text
    text: ' to find out about your faith [how you were holding up under pressure], for fear that somehow the tempter had tempted you and our work [among you] would prove to be ineffective.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But now that Timothy has come back to us from [his visit with] you, and has brought us good news of your [steadfast] faith and [the warmth of your] love, and [reported] that you always think kindly of us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' treasure your memories of us, longing to see us just as we long to see you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'for this reason, brothers and sisters, during all our distress and suffering we have been comforted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' greatly encouraged about you because of your faith [your unwavering trust in God—placing yourselves completely in His loving hands]; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'because now we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: really
  - type: text
    text: ' live [in spite of everything], if you stand firm in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For what [adequate] thanks can we offer to God for you in return for all the joy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' delight we have before our God on your account? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'We continue to pray night and day most earnestly that we may see you face to face, and may complete whatever may be imperfect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lacking in your faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now may our God and Father Himself, and Jesus our Lord guide our steps to you [by removing the obstacles that stand in our way]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And may the Lord cause you to increase and excel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' overflow in love for one another, and for all people, just as we also do for you; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'so that He may strengthen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' establish your hearts without blame in holiness in the sight of our God and Father at the coming of our Lord Jesus with all His '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: All born-again believers (saints) have been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
    marker-yv: yv-n
  - type: text
    text: saints (God’s people).
