  '2':
  - type: text
    content: 'and so we sent Timothy, our brother and God’s servant in [spreading] the good news of Christ, to strengthen and encourage you [exhorting, comforting, and establishing you] in regard to your faith, '
  '3':
  - type: text
    content: 'so that no one would be unsettled by these difficulties [to which I have referred]. For you know that we have been destined for this [as something unavoidable in our position]. '
  '4':
  - type: text
    content: 'For even when we were with you, we warned you plainly in advance that we were going to experience persecution; and so, as you know, it has come to pass. '
  '5':
  - type: text
    content: 'For this reason, when I could no longer endure the suspense, I sent '
  - type: text
    content: someone
  - type: text
    content: ' to find out about your faith [how you were holding up under pressure], for fear that somehow the tempter had tempted you and our work [among you] would prove to be ineffective.'
  '6':
  - type: text
    content: 'But now that Timothy has come back to us from [his visit with] you, and has brought us good news of your [steadfast] faith and [the warmth of your] love, and [reported] that you always think kindly of us '
  - type: text
    content: and
  - type: text
    content: ' treasure your memories of us, longing to see us just as we long to see you, '
  '7':
  - type: text
    content: 'for this reason, brothers and sisters, during all our distress and suffering we have been comforted '
  - type: text
    content: and
  - type: text
    content: ' greatly encouraged about you because of your faith [your unwavering trust in God—placing yourselves completely in His loving hands]; '
  '8':
  - type: text
    content: 'because now we '
  - type: text
