    content: Encouragement of Timothy’s Visit
  - type: text
    content: 'Therefore, when we could no longer endure our separation [from you], we thought it best to be left behind, alone at Athens, '
  '10':
  - type: text
    content: 'We continue to pray night and day most earnestly that we may see you face to face, and may complete whatever may be imperfect '
  - type: text
    content: and
  - type: text
    content: ' lacking in your faith.'
  '11':
  - type: text
    content: 'Now may our God and Father Himself, and Jesus our Lord guide our steps to you [by removing the obstacles that stand in our way]. '
  '12':
  - type: text
    content: 'And may the Lord cause you to increase and excel '
  - type: text
    content: and
  - type: text
    content: ' overflow in love for one another, and for all people, just as we also do for you; '
  '13':
