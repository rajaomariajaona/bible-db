document_id: LEV.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Laws of Motherhood
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Speak to the children of Israel, saying,
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘
    - type: usfm
      marker: bd
      children:
      - type: text
        text: I
    - type: text
      text: 'f a woman conceives and gives birth to a male child, she shall be [ceremonially] unclean for seven days, unclean as during her monthly period. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day the flesh of the male child’s foreskin shall be circumcised. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she shall remain [intimately separated] thirty-three days to be purified from the blood; she shall not touch any consecrated thing nor enter the [courtyard of the] sanctuary until the days of her purification are over. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if she gives birth to a female child, then she shall be unclean for two weeks, as during her monthly period, and she shall remain [intimately separated] sixty-six days to be purified from the blood.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘When the days of her purification are completed, whether for a son or for a daughter, she shall bring to the priest at the doorway of the Tent of Meeting a one year old lamb as a burnt offering and a young pigeon or a turtledove as a sin offering; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he shall offer it before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and make atonement for her, and she shall be cleansed from the flow of her blood. This is the law for her who gives birth to a child, whether a male or a female child. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If she cannot afford a lamb then she shall take two turtledoves or young pigeons, one as a burnt offering, the other as a sin offering; the priest shall make atonement for her, and she will be clean.’ ” [Luke 2:22, 24]
