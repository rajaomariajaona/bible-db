type_code: eng
verses:
  '1':
  - type: heading
    content: Laws of Motherhood
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '2':
  - type: text
    content: “Speak to the children of Israel, saying,
  - type: text
    content: ‘
  - type: text
    content: I
  - type: text
    content: 'f a woman conceives and gives birth to a male child, she shall be [ceremonially] unclean for seven days, unclean as during her monthly period. '
  '3':
  - type: text
    content: 'On the eighth day the flesh of the male child’s foreskin shall be circumcised. '
  '4':
  - type: text
    content: 'Then she shall remain [intimately separated] thirty-three days to be purified from the blood; she shall not touch any consecrated thing nor enter the [courtyard of the] sanctuary until the days of her purification are over. '
  '5':
  - type: text
    content: But if she gives birth to a female child, then she shall be unclean for two weeks, as during her monthly period, and she shall remain [intimately separated] sixty-six days to be purified from the blood.
  '6':
  - type: text
    content: '‘When the days of her purification are completed, whether for a son or for a daughter, she shall bring to the priest at the doorway of the Tent of Meeting a one year old lamb as a burnt offering and a young pigeon or a turtledove as a sin offering; '
  '7':
  - type: text
    content: and he shall offer it before the L
  - type: heading
    content: ord
  - type: text
    content: ' and make atonement for her, and she shall be cleansed from the flow of her blood. This is the law for her who gives birth to a child, whether a male or a female child. '
  '8':
  - type: text
    content: If she cannot afford a lamb then she shall take two turtledoves or young pigeons, one as a burnt offering, the other as a sin offering; the priest shall make atonement for her, and she will be clean.’ ” [Luke 2:22, 24]
