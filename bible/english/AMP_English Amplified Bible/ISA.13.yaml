verses:
  '1':
  - type: heading
    content: Prophecies about Babylon
  - type: text
    content: The [mournful, inspired] oracle (
  - type: note
    content: I.e. an urgent message the prophet is under compulsion to proclaim.
  - type: text
    content: 'a burden to be carried) concerning Babylon which Isaiah the son of Amoz saw [in a prophetic vision]:'
  '10':
  - type: text
    content: For the stars of heaven and their constellations
  - type: text
    content: Will not flash with their light;
  - type: text
    content: The sun will be dark when it rises,
  - type: text
    content: And the moon will not shed its light.
  '11':
  - type: text
    content: In this way I will punish the world for its evil
  - type: text
    content: And the wicked for their wickedness [their sin, their injustice, their wrongdoing];
  - type: text
    content: I will also put an end to the arrogance of the proud
  - type: text
    content: And will abase the arrogance of the tyrant.
  '12':
  - type: text
    content: I will make mortal man more rare than fine gold,
  - type: text
    content: And mankind [scarcer] than the pure gold of Ophir.
  '13':
  - type: text
    content: Therefore I will make the heavens tremble;
  - type: text
    content: And the earth will be shaken from its place
  - type: text
    content: At the wrath of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts'
  - type: text
    content: In the day of His burning anger.
  '14':
  - type: text
    content: And like the hunted gazelle,
  - type: text
    content: Or like sheep that no man gathers,
  - type: text
    content: Each [foreign resident] will turn [and go back] to his own people,
  - type: text
    content: And each one flee to his own land.
  '15':
  - type: text
    content: Anyone who is found will be pierced through,
  - type: text
    content: And anyone who is captured will fall by the sword.
  '16':
  - type: text
    content: Their children also will be smashed to pieces
  - type: text
    content: Before their eyes;
  - type: text
    content: Their houses will be looted
  - type: text
    content: And their wives ravished.
  - type: heading
    content: Babylon Will Fall to the Medes
  '17':
  - type: text
    content: ¶Listen carefully, I will put the Medes [in motion] against them,
  - type: text
    content: Who have no regard for silver and do not delight in gold [and therefore cannot be bribed].
  '18':
  - type: text
    content: Their bows will cut down the young men [of Babylon];
  - type: text
    content: They will take no pity on the fruit of the womb,
  - type: text
    content: Their eyes will not look with compassion on the children.
  '19':
  - type: text
    content: 'And Babylon, the glory of kingdoms, the beauty of the '
  - type: note
    content: The Chaldeans dominated and ruled Babylonia from 625 b.c., until their empire fell in 539 b.c., but they were known as early as 1000 b.c. as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian that was increasingly influenced by Aramaic.
  - type: text
    content: Chaldeans’ pride,
  - type: text
    content: Will be like Sodom and Gomorrah when God overthrew them.
  '2':
  - type: text
    content: Lift up a signal banner on the bare mountain,
  - type: text
    content: Summon them [the Medes and Persians] with a loud voice,
  - type: text
    content: Wave the [beckoning] hand so that they may enter the doorways of the [Babylonian] nobles.
  '20':
  - type: text
    content: Babylon will never be inhabited or lived in from generation to generation;
  - type: text
    content: Nor will the Arab pitch his tent there,
  - type: text
    content: 'Nor will the shepherds let '
  - type: text
    content: their sheep
  - type: text
    content: ' lie down there.'
  '21':
  - type: text
    content: But desert creatures will lie down there,
  - type: text
    content: And their houses will be full of owls;
  - type: text
    content: 'Ostriches also will live there, and '
  - type: note
    content: Another possibility is goat demons.
  - type: text
    content: wild goats will dance there.
  '22':
  - type: text
    content: ' '
  - type: note
    content: This prophecy was written well over a century before Babylon’s downfall in 539 b.c.
  - type: text
    content: Hyenas will howl in their castles,
  - type: text
    content: And jackals in their luxurious palaces.
  - type: text
    content: Babylon’s time has nearly come,
  - type: text
    content: And her days will not be prolonged.
  '3':
  - type: text
    content: I [the L
  - type: heading
    content: ord
  - type: text
    content: '] have commanded My consecrated ones,'
  - type: text
    content: I have even called My great warriors,
  - type: text
    content: My proudly exulting ones [the Medes and the Persians who triumph for My honor]—
  - type: text
    content: 'To '
  - type: text
    content: execute
  - type: text
    content: ' My anger.'
  '4':
  - type: text
    content: A sound of tumult on the mountains,
  - type: text
    content: Like that of many people!
  - type: text
    content: A sound of the uproar of the kingdoms,
  - type: text
    content: Of nations gathered together!
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is mustering an army for battle.'
  '5':
  - type: text
    content: They are coming from a distant country,
  - type: text
    content: From the end of heaven [the farthest horizon]—
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' and the weapons of His indignation—'
  - type: text
    content: To destroy the whole land. [Ps 19:4-6; Is 5:26]
  - type: heading
    content: Judgment on the Day of the Lord
  '6':
  - type: text
    content: Wail, for the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is at hand!'
  - type: text
    content: 'It will come as '
  - type: note
    content: Shod in Hebrew, forming a word play with Shaddai.
  - type: text
    content: 'destruction from the '
  - type: note
    content: Heb Shaddai.
  - type: text
    content: Almighty (All Sufficient One—Invincible God)! [Gen 17:1]
  '7':
  - type: text
    content: 'Therefore '
  - type: note
    content: Babylon was taken by surprise on the night of Belshazzar’s sacrilegious feast when Belshazzar was killed, and Darius the Mede was made king over Babylonia, the realm of the Chaldeans (Dan 5:30). The Chaldeans became the dominant people in Babylonia when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
  - type: text
    content: all hands will fall limp,
  - type: text
    content: And every man’s heart will melt.
  '8':
  - type: text
    content: 'They [of Babylon] will be shocked '
  - type: text
    content: and
  - type: text
    content: ' terrified,'
  - type: text
    content: Pains and anguish will grip them;
  - type: text
    content: They will be in pain like a woman in childbirth.
  - type: text
    content: 'They will stare aghast '
  - type: text
    content: and
  - type: text
    content: ' horrified at one another,'
  - type: text
    content: Their faces aflame [from the effects of the unprecedented warfare].
  '9':
  - type: text
    content: Listen carefully, the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is coming,'
  - type: text
    content: Cruel, with wrath and raging anger,
  - type: text
    content: To make the land a horror [of devastation];
  - type: text
    content: And He shall exterminate its sinners from it. [Is 2:10-22; Rev 19:11-21]
