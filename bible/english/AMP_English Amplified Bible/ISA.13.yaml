document_id: ISA.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prophecies about Babylon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The [mournful, inspired] oracle (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an urgent message the prophet is under compulsion to proclaim.
      marker-yv: yv-n
    - type: text
      text: 'a burden to be carried) concerning Babylon which Isaiah the son of Amoz saw [in a prophetic vision]:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For the stars of heaven and their constellations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will not flash with their light;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun will be dark when it rises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the moon will not shed its light.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: In this way I will punish the world for its evil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the wicked for their wickedness [their sin, their injustice, their wrongdoing];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also put an end to the arrogance of the proud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will abase the arrogance of the tyrant.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will make mortal man more rare than fine gold,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And mankind [scarcer] than the pure gold of Ophir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Therefore I will make the heavens tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the earth will be shaken from its place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the wrath of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of His burning anger.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And like the hunted gazelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or like sheep that no man gathers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each [foreign resident] will turn [and go back] to his own people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And each one flee to his own land.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Anyone who is found will be pierced through,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And anyone who is captured will fall by the sword.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Their children also will be smashed to pieces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before their eyes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their houses will be looted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their wives ravished.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylon Will Fall to the Medes
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ¶Listen carefully, I will put the Medes [in motion] against them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who have no regard for silver and do not delight in gold [and therefore cannot be bribed].
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Their bows will cut down the young men [of Babylon];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will take no pity on the fruit of the womb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their eyes will not look with compassion on the children.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And Babylon, the glory of kingdoms, the beauty of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Chaldeans dominated and ruled Babylonia from 625 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '., until their empire fell in 539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '., but they were known as early as 1000 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian that was increasingly influenced by Aramaic.
      marker-yv: yv-n
    - type: text
      text: Chaldeans’ pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will be like Sodom and Gomorrah when God overthrew them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lift up a signal banner on the bare mountain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Summon them [the Medes and Persians] with a loud voice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wave the [beckoning] hand so that they may enter the doorways of the [Babylonian] nobles.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Babylon will never be inhabited or lived in from generation to generation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will the Arab pitch his tent there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nor will the shepherds let '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their sheep
    - type: text
      text: ' lie down there.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But desert creatures will lie down there,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their houses will be full of owls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ostriches also will live there, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Another possibility is '
        - type: usfm
          marker: it
          children:
          - type: text
            text: goat demons
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: wild goats will dance there.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This prophecy was written well over a century before Babylon’s downfall in 539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Hyenas will howl in their castles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And jackals in their luxurious palaces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon’s time has nearly come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her days will not be prolonged.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I [the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] have commanded My consecrated ones,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have even called My great warriors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My proudly exulting ones [the Medes and the Persians who triumph for My honor]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To '
    - type: usfm
      marker: it
      children:
      - type: text
        text: execute
    - type: text
      text: ' My anger.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A sound of tumult on the mountains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like that of many people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sound of the uproar of the kingdoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of nations gathered together!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is mustering an army for battle.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They are coming from a distant country,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the end of heaven [the farthest horizon]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and the weapons of His indignation—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To destroy the whole land. [Ps 19:4-6; Is 5:26]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgment on the Day of the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Wail, for the day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is at hand!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It will come as '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shod
        - type: text
          text: ' in Hebrew, forming a word play with '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'destruction from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Almighty (All Sufficient One—Invincible God)! [Gen 17:1]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Babylon was taken by surprise on the night of Belshazzar’s sacrilegious feast when Belshazzar was killed, and Darius the Mede was made king over Babylonia, the realm of the Chaldeans (Dan 5:30). The Chaldeans became the dominant people in Babylonia when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
      marker-yv: yv-n
    - type: text
      text: all hands will fall limp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every man’s heart will melt.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'They [of Babylon] will be shocked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pains and anguish will grip them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be in pain like a woman in childbirth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will stare aghast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' horrified at one another,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their faces aflame [from the effects of the unprecedented warfare].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Listen carefully, the day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is coming,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cruel, with wrath and raging anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To make the land a horror [of devastation];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He shall exterminate its sinners from it. [Is 2:10-22; Rev 19:11-21]
