document_id: ZEC.11,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Doomed Flock
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open your doors, O Lebanon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That fire may devour your cedars.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I took my staff, Favor, and broke it in pieces, breaking the covenant which I had made with all the peoples. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the covenant was broken on that day, and thus the most wretched of the flock who were watching me realized that it was the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I said to them, “If it seems good to you, give me my wages; but if not, do not.” So they weighed out '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Since the type of coin is not stated, shekels can be assumed. The shekel was the standard wage for a day of labor, and the payment was '
        - type: usfm
          marker: it
          children:
          - type: text
            text: weighed
        - type: text
          text: ' because the shekel was actually a unit of weight.'
      marker-yv: yv-n
    - type: text
      text: 'thirty pieces of silver as my wages. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At this point the pre-incarnate Christ intervenes and prophetically refers to the payment given by the religious leaders to Judas for his betrayal (Matt 26:15).
      marker-yv: yv-n
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Throw it to the potter [as if to the dogs]—that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: magnificent
    - type: text
      text: ' sum at which I am valued by them!” So I took the thirty pieces of silver and threw them to the potter in the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Matt 26:14, 15; 27:3-10] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I broke my second staff, Union, into pieces to break the brotherhood between Judah (the Southern Kingdom) and Israel (the Northern Kingdom).
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to me, “Take again for yourself the equipment [of a shepherd, but this time] of a foolish shepherd. [Ezek 34:2-6] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For behold, I am going to raise up a [false] shepherd in the land who will not care for the perishing, seek the scattered, heal the broken, or feed the healthy; but will eat the flesh of the fat ones and tear off their hoofs [to consume everything].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Woe (judgment is coming) to the worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' foolish shepherd'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who deserts the flock!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will strike his arm
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his right eye!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His arm shall be totally withered
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his right eye completely blinded.” [Jer 23:1; John 10:12, 13]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, O cypress, for the cedar has fallen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because the magnificent trees have been destroyed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, O oaks of Bashan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the inaccessible forest [on the steep mountainside] has come down.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a sound of the shepherds’ wail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their splendor (grazing land) is ruined;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a sound of the young lions’ roar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the pride of the Jordan is ruined.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God, “Pasture the flock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: doomed
    - type: text
      text: ' for slaughter, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: whose buyers slay them and go unpunished, and those who sell them say, ‘Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for I have become rich!’ And their own shepherds have no pity on them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' protect them [from the wolves]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I will no longer have pity on the inhabitants of the land,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ; “but behold, I will cause the men to fall, each into the hand of another and into the hands of his [foreign] king. And the enemy will strike the land, and I will not rescue the people from their hand.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I [Zechariah] pastured the flock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: doomed
    - type: text
      text: ' for slaughter, truly [as the name implies] the most miserable of sheep. And I took two [shepherd’s] staffs, the one I called Favor (Grace) and the other I called Union (Bonds); so I pastured the flock. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I eliminated the three [incompetent, unfit] shepherds [the civil rulers, the priests, and the prophets] in one month, for I was impatient with them, and they also were tired of me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' despised me. [Jer 2:8, 26; 18:18] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said, “I will not pasture you. What is to die, let it die, and what is to be destroyed, let it be destroyed; and let the survivors devour one another’s flesh.” '
