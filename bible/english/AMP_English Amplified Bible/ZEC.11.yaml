document_id: ZEC.11,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Doomed Flock
  - type: text
    content: Open your doors, O Lebanon,
  - type: text
    content: That fire may devour your cedars.
  '10':
  - type: text
    content: 'I took my staff, Favor, and broke it in pieces, breaking the covenant which I had made with all the peoples. '
  '11':
  - type: text
    content: So the covenant was broken on that day, and thus the most wretched of the flock who were watching me realized that it was the word of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'I said to them, “If it seems good to you, give me my wages; but if not, do not.” So they weighed out '
  - type: note
    content: Since the type of coin is not stated, shekels can be assumed. The shekel was the standard wage for a day of labor, and the payment was weighed because the shekel was actually a unit of weight.
  - type: text
    content: 'thirty pieces of silver as my wages. '
  '13':
  - type: note
    content: At this point the pre-incarnate Christ intervenes and prophetically refers to the payment given by the religious leaders to Judas for his betrayal (Matt 26:15).
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Throw it to the potter [as if to the dogs]—that '
  - type: text
    content: magnificent
  - type: text
    content: ' sum at which I am valued by them!” So I took the thirty pieces of silver and threw them to the potter in the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '. [Matt 26:14, 15; 27:3-10] '
  '14':
  - type: text
    content: Then I broke my second staff, Union, into pieces to break the brotherhood between Judah (the Southern Kingdom) and Israel (the Northern Kingdom).
  '15':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to me, “Take again for yourself the equipment [of a shepherd, but this time] of a foolish shepherd. [Ezek 34:2-6] '
  '16':
  - type: text
    content: For behold, I am going to raise up a [false] shepherd in the land who will not care for the perishing, seek the scattered, heal the broken, or feed the healthy; but will eat the flesh of the fat ones and tear off their hoofs [to consume everything].
  '17':
  - type: text
    content: '“Woe (judgment is coming) to the worthless '
  - type: text
    content: and
  - type: text
    content: ' foolish shepherd'
  - type: text
    content: Who deserts the flock!
  - type: text
    content: The sword will strike his arm
  - type: text
    content: And his right eye!
  - type: text
    content: His arm shall be totally withered
  - type: text
    content: And his right eye completely blinded.” [Jer 23:1; John 10:12, 13]
  '2':
  - type: text
    content: Wail, O cypress, for the cedar has fallen,
  - type: text
    content: Because the magnificent trees have been destroyed;
  - type: text
    content: Wail, O oaks of Bashan,
  - type: text
    content: For the inaccessible forest [on the steep mountainside] has come down.
  '3':
  - type: text
    content: There is a sound of the shepherds’ wail,
  - type: text
    content: For their splendor (grazing land) is ruined;
  - type: text
    content: There is a sound of the young lions’ roar,
  - type: text
    content: For the pride of the Jordan is ruined.
  '4':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' my God, “Pasture the flock '
  - type: text
    content: doomed
  - type: text
    content: ' for slaughter, '
  '5':
  - type: text
    content: whose buyers slay them and go unpunished, and those who sell them say, ‘Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', for I have become rich!’ And their own shepherds have no pity on them '
  - type: text
    content: nor
  - type: text
    content: ' protect them [from the wolves]. '
  '6':
  - type: text
    content: For I will no longer have pity on the inhabitants of the land,” declares the L
  - type: heading
    content: ord
  - type: text
    content: ; “but behold, I will cause the men to fall, each into the hand of another and into the hands of his [foreign] king. And the enemy will strike the land, and I will not rescue the people from their hand.”
  '7':
  - type: text
    content: 'So I [Zechariah] pastured the flock '
  - type: text
    content: doomed
  - type: text
    content: ' for slaughter, truly [as the name implies] the most miserable of sheep. And I took two [shepherd’s] staffs, the one I called Favor (Grace) and the other I called Union (Bonds); so I pastured the flock. '
  '8':
  - type: text
    content: 'Then I eliminated the three [incompetent, unfit] shepherds [the civil rulers, the priests, and the prophets] in one month, for I was impatient with them, and they also were tired of me '
  - type: text
    content: and
  - type: text
    content: ' despised me. [Jer 2:8, 26; 18:18] '
  '9':
  - type: text
    content: 'So I said, “I will not pasture you. What is to die, let it die, and what is to be destroyed, let it be destroyed; and let the survivors devour one another’s flesh.” '
