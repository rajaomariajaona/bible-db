document_id: 2CH.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Activities and Accomplishments
  - type: text
    content: Now it came about at the end of the twenty years, in which Solomon had built the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' and his own house (palace), '
  '10':
  - type: text
    content: These were the chief officers of King Solomon, two hundred and fifty [in authority] who ruled over the people.
  '11':
  - type: text
    content: Then Solomon brought the daughter of Pharaoh up from the City of David into the house (palace) he had built for her, for he said, “My wife shall not live in the house of David king of Israel, because the places where the ark of the L
  - type: heading
    content: ord
  - type: text
    content: ' has entered are holy.”'
  '12':
  - type: text
    content: Then Solomon offered burnt offerings to the L
  - type: heading
    content: ord
  - type: text
    content: ' on the altar of the L'
  - type: heading
    content: ord
  - type: text
    content: ' which he had built in front of the porch [of the temple], '
  '13':
  - type: text
    content: a certain number every day, offering them up as Moses commanded for the Sabbaths, the New Moons, and the three annual feasts—the Feast of Unleavened Bread, the Feast of Weeks, and the Feast of Booths (Tabernacles).
  '14':
  - type: text
    content: 'Now in accordance with the ordinance of his father David, he appointed the divisions of the priests for their service, and the Levites for their duties of praise and ministering '
  - type: text
    content: and
  - type: text
    content: ' serving before the priests as every day required, and the gatekeepers by their divisions at every gate; for David the man of God had so commanded. '
  '15':
  - type: text
    content: 'And they did not deviate from the commandment of the king to the priests and Levites in any respect or in regard to the storehouses '
  - type: text
    content: or
  - type: text
    content: ' treasuries.'
  '16':
  - type: text
    content: Thus all the work of Solomon was carried out from the day the foundation of the house of the L
  - type: heading
    content: ord
  - type: text
    content: ' was laid until it was finished. So the house of the L'
  - type: heading
    content: ord
  - type: text
    content: ' was completed.'
  '17':
  - type: text
    content: 'Then Solomon went to Ezion-geber and to Eloth on the shore of the [Red] Sea in the land of Edom. '
  '18':
  - type: text
    content: And Huram (Hiram) sent him, by his servants, ships and servants familiar with the sea; and they went with Solomon’s servants to Ophir, and took from there four hundred and fifty talents of gold, and brought them to King Solomon.
  '2':
  - type: text
    content: 'that he built '
  - type: text
    content: and
  - type: text
    content: ' fortified '
  - type: note
    content: These cities were originally given to Hiram king of Tyre by Solomon (1 Kin 9:10-14).
  - type: text
    content: the cities which Huram (Hiram) had given to him, and settled the Israelites there.
  '3':
  - type: text
    content: 'Then Solomon went to Hamath-zobah and captured it. '
  '4':
  - type: text
    content: 'He built Tadmor in the wilderness, and all his storage cities in Hamath. '
  '5':
  - type: text
    content: 'He also built upper Beth-horon and lower Beth-horon, fortified cities with walls, gates, and bars [to lock the gates]; '
  '6':
  - type: text
    content: and Baalath and all the storage cities that Solomon had, and all the cities for his chariots and the cities for his horsemen, and all that Solomon desired to build in Jerusalem, in Lebanon, and in all the land under his rule.
  '7':
  - type: text
    content: 'All the people who were left of the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites, who were not of Israel, '
  '8':
  - type: text
    content: but were
  - type: text
    content: ' descendants of those who were left in the land, whom the Israelites had not destroyed—Solomon brought them up as forced laborers to this day. '
  '9':
  - type: text
    content: 'But Solomon did not make slaves of the Israelites for his work; they were men of war, his chief captains, and commanders of his chariots and his horsemen. '
