document_id: 2CH.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Solomon’s Activities and Accomplishments
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now it came about at the end of the twenty years, in which Solomon had built the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and his own house (palace), '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: These were the chief officers of King Solomon, two hundred and fifty [in authority] who ruled over the people.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then Solomon brought the daughter of Pharaoh up from the City of David into the house (palace) he had built for her, for he said, “My wife shall not live in the house of David king of Israel, because the places where the ark of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has entered are holy.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then Solomon offered burnt offerings to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' on the altar of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' which he had built in front of the porch [of the temple], '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: a certain number every day, offering them up as Moses commanded for the Sabbaths, the New Moons, and the three annual feasts—the Feast of Unleavened Bread, the Feast of Weeks, and the Feast of Booths (Tabernacles).
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now in accordance with the ordinance of his father David, he appointed the divisions of the priests for their service, and the Levites for their duties of praise and ministering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' serving before the priests as every day required, and the gatekeepers by their divisions at every gate; for David the man of God had so commanded. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And they did not deviate from the commandment of the king to the priests and Levites in any respect or in regard to the storehouses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' treasuries.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Thus all the work of Solomon was carried out from the day the foundation of the house of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was laid until it was finished. So the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was completed.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Solomon went to Ezion-geber and to Eloth on the shore of the [Red] Sea in the land of Edom. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And Huram (Hiram) sent him, by his servants, ships and servants familiar with the sea; and they went with Solomon’s servants to Ophir, and took from there four hundred and fifty talents of gold, and brought them to King Solomon.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'that he built '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fortified '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These cities were originally given to Hiram king of Tyre by Solomon (1 Kin 9:10-14).
      marker-yv: yv-n
    - type: text
      text: the cities which Huram (Hiram) had given to him, and settled the Israelites there.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Solomon went to Hamath-zobah and captured it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He built Tadmor in the wilderness, and all his storage cities in Hamath. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He also built upper Beth-horon and lower Beth-horon, fortified cities with walls, gates, and bars [to lock the gates]; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and Baalath and all the storage cities that Solomon had, and all the cities for his chariots and the cities for his horsemen, and all that Solomon desired to build in Jerusalem, in Lebanon, and in all the land under his rule.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'All the people who were left of the Hittites, the Amorites, the Perizzites, the Hivites, and the Jebusites, who were not of Israel, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: it
      children:
      - type: text
        text: but were
    - type: text
      text: ' descendants of those who were left in the land, whom the Israelites had not destroyed—Solomon brought them up as forced laborers to this day. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But Solomon did not make slaves of the Israelites for his work; they were men of war, his chief captains, and commanders of his chariots and his horsemen. '
