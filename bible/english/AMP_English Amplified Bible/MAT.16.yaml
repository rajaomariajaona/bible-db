      - type: text
        text: Pharisees Test Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Pharisees and Sadducees came up, and testing Jesus [to get something to use against Him], they asked Him to show them a sign from heaven [which would support His divine authority]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or the seven loaves for the four thousand, and how many large baskets you picked up?
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How is it that you fail to understand that I was not talking to you about bread? But beware of the leaven of the Pharisees and Sadducees.”
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they understood that He did not tell them to beware of the leaven of bread, but of the [false] teaching of the Pharisees and Sadducees.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peter’s Confession of Christ
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Jesus went into the '
    - type: usfm
