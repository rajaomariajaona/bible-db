    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Foretells His Death
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This marks a turning point in the book. 4:17 marked the beginning of Jesus’ public ministry offering the kingdom to Israel. Since Israel rejected the Messiah, the kingdom is held in abeyance and the Messiah must suffer death. But He had to die in any case to provide salvation.
      marker-yv: yv-n
    - type: text
      text: 'From that time on Jesus began to show His disciples [clearly] that He must go to Jerusalem, and endure many things at the hands of the elders and the chief priests and scribes (Sanhedrin, Jewish High Court), and be killed, and be raised [from death to life] on the third day. [Mark 8:31-9:1; Luke 9:22-27] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter took Him aside [to speak to Him privately] and began to reprimand Him, saying, “May God forbid it! This will never happen to You.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus turned and said to Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get behind Me, Satan! You are a stumbling block to Me; for you are not setting your mind on things of God, but on things of man.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Discipleship Is Costly
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to His disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If anyone wishes to follow Me
    - type: text
      text: ' [as My disciple], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he must deny himself
    - type: text
      text: ' [set aside selfish interests], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and take up his cross
    - type: text
      text: ' [expressing a willingness to endure whatever may come] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and follow Me
    - type: text
      text: ' [believing in Me, conforming to My example in living and, if need be, suffering or perhaps dying because of faith in Me]. '
