      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Jesus’ day this was Gentile territory. Today this region is known as the Golan Heights. The ancient city of Caesarea Philippi was located at the foot of Mt. Hermon, near the Banias Spring, one of the three springs which feeds into the Jordan River.
      marker-yv: yv-n
    - type: text
      text: 'region of Caesarea Philippi, He asked His disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do people say that the Son of Man is?”
    - type: text
      text: ' [Mark 8:27-29; Luke 9:18-20] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they answered, “Some say John the Baptist; others, Elijah; and still others, Jeremiah, or [just] one of the prophets.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But who do you say that I am?”
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter replied, “You are the Christ (the Messiah, the Anointed), the Son of the living God.” '
