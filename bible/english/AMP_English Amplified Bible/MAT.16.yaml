  - type: note
    content: This marks a turning point in the book. 4:17 marked the beginning of Jesus’ public ministry offering the kingdom to Israel. Since Israel rejected the Messiah, the kingdom is held in abeyance and the Messiah must suffer death. But He had to die in any case to provide salvation.
  - type: text
    content: 'From that time on Jesus began to show His disciples [clearly] that He must go to Jerusalem, and endure many things at the hands of the elders and the chief priests and scribes (Sanhedrin, Jewish High Court), and be killed, and be raised [from death to life] on the third day. [Mark 8:31-9:1; Luke 9:22-27] '
  '22':
  - type: text
    content: 'Peter took Him aside [to speak to Him privately] and began to reprimand Him, saying, “May God forbid it! This will never happen to You.” '
  '23':
  - type: text
    content: 'But Jesus turned and said to Peter, '
  - type: text
    content: “Get behind Me, Satan! You are a stumbling block to Me; for you are not setting your mind on things of God, but on things of man.”
