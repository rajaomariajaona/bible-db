document_id: NUM.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Passover
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses in the Wilderness of Sinai in the first month of the second year after they had come out of the land of Egypt, saying, '
  '10':
  - type: text
    content: “Say to the Israelites, ‘If any one of you or of your descendants becomes [ceremonially] unclean because of [touching] a dead body or is on a distant journey, he may, however, observe the Passover to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'On the fourteenth day of the second month [thirty days later] at twilight, they shall observe it; they shall eat it with unleavened bread and bitter herbs. '
  '12':
  - type: text
    content: 'They shall leave none of it until morning nor break any of its bones; in accordance with all the statutes of the Passover they shall observe it. [John 19:36] '
  '13':
  - type: text
    content: But the man who is [ceremonially] clean and is not on a journey, and yet does not observe the Passover, that person shall be cut off from among his people [excluding him from the atonement made for them] because he did not bring the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' offering at its appointed time; that man will bear [the penalty of] his sin. '
  '14':
  - type: text
    content: If a stranger lives among you as a resident alien and observes the Passover to the L
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with its statutes and its ordinances, so shall he do; you shall have one statute, both for the resident alien and for the native of the land.’ ”'
  - type: heading
    content: The Cloud on the Tabernacle
  '15':
  - type: text
    content: 'Now on the day that the tabernacle was erected, the cloud [of God’s presence] covered the tabernacle, that is, the tent of the Testimony; and in the evening it was over the tabernacle, appearing like [a pillar of] fire until the morning. [Ex 13:21] '
  '16':
  - type: text
    content: 'So it was continuously; the cloud covered it '
  - type: text
    content: by day
  - type: text
    content: ', and the appearance of fire by night. '
  '17':
  - type: text
    content: 'Whenever the cloud was lifted from over the tent (tabernacle), afterward the Israelites would set out; and in the place where the cloud stopped, there the Israelites would camp. '
  '18':
  - type: text
    content: At the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' command the Israelites would journey on, and at His command they would camp. As long as the cloud remained over the tabernacle they remained camped. '
  '19':
  - type: text
    content: Even when the cloud lingered over the tabernacle for many days, the Israelites would keep their obligation to the L
  - type: heading
    content: ord
  - type: text
    content: ' and not set out. '
  '2':
  - type: text
    content: '“The sons of Israel are to keep the Passover at its appointed time. '
  '20':
  - type: text
    content: Sometimes the cloud remained only a few days over the tabernacle, and in accordance with the command of the L
  - type: heading
    content: ord
  - type: text
    content: ' they remained camped. Then at His command they set out. '
  '21':
  - type: text
    content: 'If sometimes the cloud remained [over the tabernacle] from evening only until morning, when the cloud was lifted in the morning, they would journey on; whether in the daytime or at night, whenever the cloud was lifted, they would set out. '
  '22':
  - type: text
    content: Whether it was two days or a month or a year that the cloud [of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' presence] lingered over the tabernacle, staying above it, the Israelites remained camped and did not set out; but when it was lifted, they set out. '
  '23':
  - type: text
    content: At the command of the L
  - type: heading
    content: ord
  - type: text
    content: ' they camped, and at the command of the L'
  - type: heading
    content: ord
  - type: text
    content: ' they journeyed on; they kept their obligation to the L'
  - type: heading
    content: ord
  - type: text
    content: ', in accordance with the command of the L'
  - type: heading
    content: ord
  - type: text
    content: ' through Moses.'
  '3':
  - type: text
    content: 'On the fourteenth day of this month '
  - type: note
    content: Lit between the two evenings.
  - type: text
    content: 'at twilight, you shall keep it at its appointed time; according to all its statutes and ordinances you shall keep it.” '
  '4':
  - type: text
    content: 'So Moses told the Israelites to observe the Passover. '
  '5':
  - type: text
    content: They observed the Passover on the fourteenth day of the first month at twilight in the Wilderness of Sinai; in accordance with all that the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses, so the Israelites did. '
  '6':
  - type: text
    content: 'But there were certain men who were [ceremonially] unclean because of [touching] the dead body of a man, so they could not observe the Passover on that day; so they came before Moses and Aaron that same day. '
  '7':
  - type: text
    content: Those men said to Moses, “We are [ceremonially] unclean because of [touching] a dead body. Why are we being restrained from presenting the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' offering at its appointed time among the Israelites?” '
  '8':
  - type: text
    content: Therefore, Moses said to them, “Wait, and I will listen to what the L
  - type: heading
    content: ord
  - type: text
    content: ' will command concerning you.”'
  '9':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
