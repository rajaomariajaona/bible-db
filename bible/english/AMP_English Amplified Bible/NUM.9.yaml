document_id: NUM.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Passover
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses in the Wilderness of Sinai in the first month of the second year after they had come out of the land of Egypt, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Say to the Israelites, ‘If any one of you or of your descendants becomes [ceremonially] unclean because of [touching] a dead body or is on a distant journey, he may, however, observe the Passover to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fourteenth day of the second month [thirty days later] at twilight, they shall observe it; they shall eat it with unleavened bread and bitter herbs. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall leave none of it until morning nor break any of its bones; in accordance with all the statutes of the Passover they shall observe it. [John 19:36] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the man who is [ceremonially] clean and is not on a journey, and yet does not observe the Passover, that person shall be cut off from among his people [excluding him from the atonement made for them] because he did not bring the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offering at its appointed time; that man will bear [the penalty of] his sin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If a stranger lives among you as a resident alien and observes the Passover to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with its statutes and its ordinances, so shall he do; you shall have one statute, both for the resident alien and for the native of the land.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Cloud on the Tabernacle
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now on the day that the tabernacle was erected, the cloud [of God’s presence] covered the tabernacle, that is, the tent of the Testimony; and in the evening it was over the tabernacle, appearing like [a pillar of] fire until the morning. [Ex 13:21] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was continuously; the cloud covered it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by day
    - type: text
      text: ', and the appearance of fire by night. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the cloud was lifted from over the tent (tabernacle), afterward the Israelites would set out; and in the place where the cloud stopped, there the Israelites would camp. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' command the Israelites would journey on, and at His command they would camp. As long as the cloud remained over the tabernacle they remained camped. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even when the cloud lingered over the tabernacle for many days, the Israelites would keep their obligation to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and not set out. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The sons of Israel are to keep the Passover at its appointed time. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sometimes the cloud remained only a few days over the tabernacle, and in accordance with the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' they remained camped. Then at His command they set out. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If sometimes the cloud remained [over the tabernacle] from evening only until morning, when the cloud was lifted in the morning, they would journey on; whether in the daytime or at night, whenever the cloud was lifted, they would set out. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whether it was two days or a month or a year that the cloud [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' presence] lingered over the tabernacle, staying above it, the Israelites remained camped and did not set out; but when it was lifted, they set out. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the command of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' they camped, and at the command of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' they journeyed on; they kept their obligation to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', in accordance with the command of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' through Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fourteenth day of this month '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: between the two evenings
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'at twilight, you shall keep it at its appointed time; according to all its statutes and ordinances you shall keep it.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses told the Israelites to observe the Passover. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They observed the Passover on the fourteenth day of the first month at twilight in the Wilderness of Sinai; in accordance with all that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses, so the Israelites did. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But there were certain men who were [ceremonially] unclean because of [touching] the dead body of a man, so they could not observe the Passover on that day; so they came before Moses and Aaron that same day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those men said to Moses, “We are [ceremonially] unclean because of [touching] a dead body. Why are we being restrained from presenting the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' offering at its appointed time among the Israelites?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, Moses said to them, “Wait, and I will listen to what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will command concerning you.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
