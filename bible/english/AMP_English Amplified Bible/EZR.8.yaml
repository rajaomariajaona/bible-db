document_id: EZR.8,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: People Who Went with Ezra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These are the heads of their fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this is
    - type: text
      text: ' the genealogy of those who went up with me from Babylon in the reign of King Artaxerxes: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'of the sons of Bani, Shelomith son of Josiphiah, with 160 men; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'of the sons of Bebai, Zechariah son of Bebai, with 28 men; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'of the sons of Azgad, Johanan son of Hakkatan, with 110 men; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'of the sons of Adonikam, the last to come, their names are Eliphelet, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Jeuel
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jeiel, and Shemaiah, with 60 men; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'and of the sons of Bigvai, Uthai and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Zakkur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Zabbud, with 70 men.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ezra Sends for Levites
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now I gathered them together at the river that runs to Ahava, where we camped for three days. I observed the people and the priests, and I did not find any Levites there. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and Meshullam, [who were] leading men, and also for Joiarib and Elnathan, [who were] teachers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And I sent them to Iddo, the leading man at the place Casiphia, telling them what to say to Iddo and his brothers, the temple servants at the place Casiphia, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that is,
    - type: text
      text: ' to bring us servants (ministers) for the house of our God. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And as the good hand of our God was upon us, they brought us a man of understanding (insight) from the sons of Mahli, the son of Levi, the son of Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: named
    - type: text
      text: ' Sherebiah, with his sons and his brothers (relatives), 18 men; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and Hashabiah, and with him Jeshaiah of the sons of Merari, with his brothers (relatives) and their sons, 20 men; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'I.e. '
        - type: usfm
          marker: it
          children:
          - type: text
            text: descendants,
        - type: text
          text: ' and so throughout.'
      marker-yv: yv-n
    - type: text
      text: 'sons of Phinehas, Gershom; of the sons of Ithamar, Daniel; of the sons of David, Hattush; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: also 220 of the temple servants, whom David and the leaders had set apart [with their descendants] for the service of the Levites. They were all designated by name.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Protection of God Invoked
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then I proclaimed a fast there at the river Ahava, so that we might humble ourselves before our God to seek from Him a safe journey for us, our '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: little ones
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'children, and all our possessions. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For I was ashamed to request troops and horsemen from the king to protect us from the enemy along the way, because we had told the king, “The hand of our God is favorable toward all those who seek Him, but His power and His anger are against all those who abandon (turn away from) Him.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So we fasted and sought [help from] our God concerning this [matter], and He heard our plea.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then I set apart twelve leading priests, Sherebiah, Hashabiah, and ten of their brothers (relatives), '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'and I weighed out to them the silver, the gold, and the utensils, the offering for the house of our God which the king, his advisers, his officials, and all Israel who were present there had offered. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I weighed into their hands 650 talents of silver, and silver utensils '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worth
    - type: text
      text: ' 100 talents, and 100 talents of gold; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'also 20 bowls of gold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worth
    - type: text
      text: ' 1,000 darics, and two utensils of fine '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps copper.
      marker-yv: yv-n
    - type: text
      text: 'shiny bronze, precious as gold. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Then I said to them, “You are holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the utensils are holy, and the silver and the gold are a freewill offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of your fathers. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Guard and keep them until you weigh them before the leading priests and the Levites and the leaders of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: households
    - type: text
      text: ' of Israel in Jerusalem, in the chambers of the house of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'of the sons of Shecaniah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who was
    - type: text
      text: ' of the sons of Parosh, Zechariah, and with him were registered 150 men by genealogy; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So the priests and the Levites received the weighed out silver and gold, and the utensils, to bring them to Jerusalem to the house of our God.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'We set out from the river Ahava on the twelfth [day] of the first month to go to Jerusalem; and the hand of our God was upon us, and He rescued us from the hand of the enemy and those who lay in ambushes along the way. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So we came to Jerusalem and remained there for three days.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Treasure Placed in the Temple
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'On the fourth day the silver and the gold and the utensils were weighed out in the house of our God into the hand of Meremoth the son of Uriah the priest, and with him was Eleazar the son of Phinehas; and with them were the Levites—Jozabad the son of Jeshua and Noadiah the son of Binnui. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Every piece was counted and weighed, and all the weight was recorded at that time.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Also the [former] exiles who had come from the captivity offered burnt offerings to the God of Israel: 12 bulls for all Israel, 96 rams, 77 lambs, and 12 male goats for a sin offering. All this was a burnt offering to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And they delivered the king’s edicts to the king’s satraps (lieutenants) and to the governors '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: beyond
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: west of the [Euphrates] River, and they supported the people and God’s house.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'of the sons of Pahath-moab, Eliehoenai son of Zerahiah, with 200 men; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'of the sons of Zattu, Shecaniah son of Jahaziel, with 300 men; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'of the sons of Adin, Ebed son of Jonathan, with 50 men; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'of the sons of Elam, Jeshaiah son of Athaliah, with 70 men; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'of the sons of Shephatiah, Zebadiah son of Michael, with 80 men; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'of the sons of Joab, Obadiah son of Jehiel, with 218 men; '
