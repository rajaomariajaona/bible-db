document_id: EZR.8,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: People Who Went with Ezra
  - type: text
    content: 'These are the heads of their fathers’ '
  - type: text
    content: households
  - type: text
    content: ' and '
  - type: text
    content: this is
  - type: text
    content: ' the genealogy of those who went up with me from Babylon in the reign of King Artaxerxes: '
  '10':
  - type: text
    content: 'of the sons of Bani, Shelomith son of Josiphiah, with 160 men; '
  '11':
  - type: text
    content: 'of the sons of Bebai, Zechariah son of Bebai, with 28 men; '
  '12':
  - type: text
    content: 'of the sons of Azgad, Johanan son of Hakkatan, with 110 men; '
  '13':
  - type: text
    content: 'of the sons of Adonikam, the last to come, their names are Eliphelet, '
  - type: note
    content: Or Jeuel.
  - type: text
    content: 'Jeiel, and Shemaiah, with 60 men; '
  '14':
  - type: text
    content: 'and of the sons of Bigvai, Uthai and '
  - type: note
    content: Or Zakkur.
  - type: text
    content: Zabbud, with 70 men.
  - type: heading
    content: Ezra Sends for Levites
  '15':
  - type: text
    content: 'Now I gathered them together at the river that runs to Ahava, where we camped for three days. I observed the people and the priests, and I did not find any Levites there. '
  '16':
  - type: text
    content: 'So I sent for Eliezer, Ariel, Shemaiah, Elnathan, Jarib, Elnathan, Nathan, Zechariah, and Meshullam, [who were] leading men, and also for Joiarib and Elnathan, [who were] teachers. '
  '17':
  - type: text
    content: 'And I sent them to Iddo, the leading man at the place Casiphia, telling them what to say to Iddo and his brothers, the temple servants at the place Casiphia, '
  - type: text
    content: that is,
  - type: text
    content: ' to bring us servants (ministers) for the house of our God. '
  '18':
  - type: text
    content: 'And as the good hand of our God was upon us, they brought us a man of understanding (insight) from the sons of Mahli, the son of Levi, the son of Israel, '
  - type: text
    content: named
  - type: text
    content: ' Sherebiah, with his sons and his brothers (relatives), 18 men; '
  '19':
  - type: text
    content: 'and Hashabiah, and with him Jeshaiah of the sons of Merari, with his brothers (relatives) and their sons, 20 men; '
  '2':
  - type: text
    content: 'of the '
  - type: note
    content: I.e. descendants, and so throughout.
  - type: text
    content: 'sons of Phinehas, Gershom; of the sons of Ithamar, Daniel; of the sons of David, Hattush; '
  '20':
  - type: text
    content: also 220 of the temple servants, whom David and the leaders had set apart [with their descendants] for the service of the Levites. They were all designated by name.
  - type: heading
    content: Protection of God Invoked
  '21':
  - type: text
    content: 'Then I proclaimed a fast there at the river Ahava, so that we might humble ourselves before our God to seek from Him a safe journey for us, our '
  - type: note
    content: Lit little ones.
  - type: text
    content: 'children, and all our possessions. '
  '22':
  - type: text
    content: 'For I was ashamed to request troops and horsemen from the king to protect us from the enemy along the way, because we had told the king, “The hand of our God is favorable toward all those who seek Him, but His power and His anger are against all those who abandon (turn away from) Him.” '
  '23':
  - type: text
    content: So we fasted and sought [help from] our God concerning this [matter], and He heard our plea.
  '24':
  - type: text
    content: 'Then I set apart twelve leading priests, Sherebiah, Hashabiah, and ten of their brothers (relatives), '
  '25':
  - type: text
    content: 'and I weighed out to them the silver, the gold, and the utensils, the offering for the house of our God which the king, his advisers, his officials, and all Israel who were present there had offered. '
  '26':
  - type: text
    content: 'I weighed into their hands 650 talents of silver, and silver utensils '
  - type: text
    content: worth
  - type: text
    content: ' 100 talents, and 100 talents of gold; '
  '27':
  - type: text
    content: 'also 20 bowls of gold '
  - type: text
    content: worth
  - type: text
    content: ' 1,000 darics, and two utensils of fine '
  - type: note
    content: Perhaps copper.
  - type: text
    content: 'shiny bronze, precious as gold. '
  '28':
  - type: text
    content: Then I said to them, “You are holy to the L
  - type: heading
    content: ord
  - type: text
    content: ', the utensils are holy, and the silver and the gold are a freewill offering to the L'
  - type: heading
    content: ord
  - type: text
    content: ' God of your fathers. '
  '29':
  - type: text
    content: 'Guard and keep them until you weigh them before the leading priests and the Levites and the leaders of the fathers’ '
  - type: text
    content: households
  - type: text
    content: ' of Israel in Jerusalem, in the chambers of the house of the L'
  - type: heading
    content: ord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: 'of the sons of Shecaniah '
  - type: text
    content: who was
  - type: text
    content: ' of the sons of Parosh, Zechariah, and with him were registered 150 men by genealogy; '
  '30':
  - type: text
    content: So the priests and the Levites received the weighed out silver and gold, and the utensils, to bring them to Jerusalem to the house of our God.
  '31':
  - type: text
    content: 'We set out from the river Ahava on the twelfth [day] of the first month to go to Jerusalem; and the hand of our God was upon us, and He rescued us from the hand of the enemy and those who lay in ambushes along the way. '
  '32':
  - type: text
    content: So we came to Jerusalem and remained there for three days.
  - type: heading
    content: Treasure Placed in the Temple
  '33':
  - type: text
    content: 'On the fourth day the silver and the gold and the utensils were weighed out in the house of our God into the hand of Meremoth the son of Uriah the priest, and with him was Eleazar the son of Phinehas; and with them were the Levites—Jozabad the son of Jeshua and Noadiah the son of Binnui. '
  '34':
  - type: text
    content: Every piece was counted and weighed, and all the weight was recorded at that time.
  '35':
  - type: text
    content: 'Also the [former] exiles who had come from the captivity offered burnt offerings to the God of Israel: 12 bulls for all Israel, 96 rams, 77 lambs, and 12 male goats for a sin offering. All this was a burnt offering to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'And they delivered the king’s edicts to the king’s satraps (lieutenants) and to the governors '
  - type: note
    content: Lit beyond.
  - type: text
    content: west of the [Euphrates] River, and they supported the people and God’s house.
  '4':
  - type: text
    content: 'of the sons of Pahath-moab, Eliehoenai son of Zerahiah, with 200 men; '
  '5':
  - type: text
    content: 'of the sons of Zattu, Shecaniah son of Jahaziel, with 300 men; '
  '6':
  - type: text
    content: 'of the sons of Adin, Ebed son of Jonathan, with 50 men; '
  '7':
  - type: text
    content: 'of the sons of Elam, Jeshaiah son of Athaliah, with 70 men; '
  '8':
  - type: text
    content: 'of the sons of Shephatiah, Zebadiah son of Michael, with 80 men; '
  '9':
  - type: text
    content: 'of the sons of Joab, Obadiah son of Jehiel, with 218 men; '
