document_id: LUK.7,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus Heals a Centurion’s Slave
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After He had finished all that He had to say in the hearing of the people, He went to Capernaum. [Matt 8:5-13]
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When the messengers who had been sent returned to the house, they found the slave in good health.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Soon afterward Jesus went to a city called Nain [near Nazareth], and His disciples and a large crowd accompanied Him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now as He approached the city gate, a dead man was being carried out—the only son of his mother, and she was a widow. And a large crowd from the city was with her [in the funeral procession]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When the Lord saw her, He felt [great] compassion for her, and said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not weep.”
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And He came up and touched the bier [on which the body rested], and the pallbearers stood still. And He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Young man, I say to you, arise
    - type: text
      text: ' [from death]!” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The man who was dead sat up and began to speak. And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus
    - type: text
      text: ' gave him back to his mother. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profound awe gripped them all, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' glorifying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honoring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praising God, saying, “A great prophet has arisen among us!” and, “God has visited His people [to help and care for and provide for them]!” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: This news about Him spread through all of Judea and in all the surrounding countryside. [1 Kin 17:17-24; 2 Kin 4:32-37]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Delegation from John
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'John’s disciples brought word to him [in prison] of all these things. [Matt 11:2-19] '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'John called two of his disciples and sent them to the Lord, saying, “Are You the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Coming One
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Expected One (the Messiah), or should we look for someone else?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now a [Roman] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Roman military officer commanding a hundred men.
      marker-yv: yv-n
    - type: text
      text: 'centurion’s slave, who was highly regarded by him, was sick and on the verge of death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So the men came to Jesus and said, “John the Baptist sent us to You to ask, ‘Are You the Expected One (the Messiah), or should we look for someone else?’ ” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'At that very hour Jesus healed many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ' of sicknesses and infirmities and evil spirits; and He gave [the gracious gift of] sight to many '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who were
    - type: text
      text: ' blind. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So He replied to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go and tell John about everything you have seen and heard: the '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: blind receive sight
      - type: text
        text: ', the lame walk, the lepers are cleansed, the deaf hear, the dead are raised up, and the '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: poor have the good news
      - type: text
        text: ' (gospel) '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: preached to them
      - type: text
        text: .
    - type: text
      text: ' [Is 29:18, 19; 35:5, 6; 61:1] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed
    - type: text
      text: ' [joyful, spiritually favored] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is he who does not take offense at Me.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When John’s messengers left, Jesus began speaking to the crowds about John: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“What did you go out to the wilderness to see? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. something too ordinary to be of any interest.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A reed shaken by the wind?
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But what did you go out to see? A man dressed in soft clothing
    - type: text
      text: ' [entirely unsuited for the harsh wilderness]? '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Those who wear splendid clothing and live in luxury are in royal palaces!
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But what did you
    - type: text
      text: ' [really] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'go out to see? A prophet? Yes, I say to you, and one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John was unique among the prophets because he was sent to prepare the hearts of the people for the immediate disclosure of their Messiah.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: far more
    - type: text
      text: ' [eminent and remarkable] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: than a prophet
    - type: text
      text: ' [who foretells the future]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the one of whom it is written
    - type: text
      text: ' [by the prophet Malachi],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘
    - type: usfm
      marker: wj
      children:
      - type: text
        text: B
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ehold
      - type: text
        text: ', I '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: send
      - type: text
        text: ' M'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: y messenger ahead of
      - type: text
        text: ' Y'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ou
      - type: text
        text: ','
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: W
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ho will prepare
      - type: text
        text: ' Y'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: our way before
      - type: text
        text: ' Y'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ou
      - type: text
        text: .’
    - type: text
      text: ' [Mal 3:1]'
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, among those born of women there is no one greater than John; yet he who is least in the kingdom of God is greater
    - type: text
      text: ' [in privilege] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: than he.”
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'All the people and the tax collectors who heard Jesus, acknowledged [the validity of] God’s justice, having been baptized with the baptism of John. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When the centurion heard about Jesus, he sent some Jewish elders to Him, asking Him to come and save the life of his slave. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But the Pharisees and the lawyers [who were experts in the Mosaic Law] annulled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set aside God’s purpose for themselves, not having been baptized by John.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “To what then shall I compare the people of this generation
    - type: text
      text: ' [who set aside God’s plan], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and what are they like?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They are like children sitting in the market place and calling to one another, and saying, ‘We played the flute for you
    - type: text
      text: ' [pretending to be at a wedding], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you did not dance; we sang a dirge
    - type: text
      text: ' [pretending to be at a funeral], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you did not weep
    - type: text
      text: ' [so nothing we did appealed to you].’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For John the Baptist has come neither eating bread nor drinking wine, and you say, ‘He has a demon!’
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Son of Man has come eating and drinking, and you say, ‘Look, a man who is a glutton and a
    - type: text
      text: ' [heavy] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: wine-drinker, a friend of tax collectors and sinners
    - type: text
      text: ' [including non-observant Jews].’ '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Yet wisdom is vindicated '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' shown to be right by all her children'
    - type: text
      text: ' [by the lifestyle, moral character, and good deeds of her followers].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Anointing in Galilee
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'One of the Pharisees asked Jesus to eat with him, and He went into the Pharisee’s house [in the region of Galilee] and reclined '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Now there was a woman in the city who was [known as] a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. an immoral woman or prostitute.
      marker-yv: yv-n
    - type: text
      text: 'sinner; and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When a Rabbi (teacher) was visiting in someone’s home, it was acceptable for uninvited guests to come and listen to the conversation.
      marker-yv: yv-n
    - type: text
      text: 'when she found out that He was reclining '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at the table
    - type: text
      text: ' in the Pharisee’s house, she brought an alabaster vial of perfume; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'and standing behind Him at His feet, weeping, she began wetting His feet with her tears, and wiped them with the hair of her head, and [respectfully] kissed His feet [as an act signifying both affection and submission] and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There were apparently two anointings of Jesus. This one in the home of Simon the Pharisee (identified in v 40) in the area of Galilee by an unnamed woman, and the other in the home of Simon the Leper in Bethany, by Mary the sister of Martha and Lazarus. The anointing in Bethany preceded the triumphal entry into Jerusalem (Matt 26:6-13; Mark 14:3-9; John 12:1-8).
      marker-yv: yv-n
    - type: text
      text: 'anointed them with the perfume. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Now when [Simon] the Pharisee who had invited Him saw this, he said to himself, “If this Man were a prophet He would know who and what sort of woman this is who is touching Him, that she is a [notorious] sinner [an outcast, devoted to sin].”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of Two Debtors
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When they reached Jesus, they pleaded with Him earnestly [to come], saying, “He is worthy for You to do this for him, '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jesus, answering, said to the Pharisee, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Simon, I have something to say to you.”
    - type: text
      text: ' And he replied, “Teacher, say it.” '
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“A certain moneylender had two debtors: one owed him five hundred '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was equivalent to a day’s wages.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: denarii, and the other fifty.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When they had no means of repaying
    - type: text
      text: ' [the debts], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he freely forgave them both. So which of them will love him more?”
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Simon answered, “The one, I take it, for whom he forgave more.” Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have decided correctly.”
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Then turning toward the woman, He said to Simon, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you see this woman? I came into your house
    - type: text
      text: ' [but you failed to extend to Me the usual courtesies shown to a guest]; '
    - type: usfm
      marker: wj
      children:
      - type: text
