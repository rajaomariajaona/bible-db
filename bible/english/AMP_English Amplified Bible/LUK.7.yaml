verses:
  '1':
  - type: heading
    content: Jesus Heals a Centurion’s Slave
  - type: text
    content: After He had finished all that He had to say in the hearing of the people, He went to Capernaum. [Matt 8:5-13]
  '10':
  - type: text
    content: When the messengers who had been sent returned to the house, they found the slave in good health.
  '11':
  - type: text
    content: 'Soon afterward Jesus went to a city called Nain [near Nazareth], and His disciples and a large crowd accompanied Him. '
  '12':
  - type: text
    content: 'Now as He approached the city gate, a dead man was being carried out—the only son of his mother, and she was a widow. And a large crowd from the city was with her [in the funeral procession]. '
  '13':
  - type: text
    content: 'When the Lord saw her, He felt [great] compassion for her, and said to her, '
  - type: text
    content: “Do not weep.”
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And He came up and touched the bier [on which the body rested], and the pallbearers stood still. And He said, '
  - type: text
    content: “Young man, I say to you, arise
  - type: text
    content: ' [from death]!” '
  '15':
  - type: text
    content: 'The man who was dead sat up and began to speak. And '
  - type: text
    content: Jesus
  - type: text
    content: ' gave him back to his mother. '
  '16':
  - type: text
    content: 'Fear '
  - type: text
    content: and
  - type: text
    content: ' profound awe gripped them all, and they '
  - type: text
    content: began
  - type: text
    content: ' glorifying '
  - type: text
    content: and
  - type: text
    content: ' honoring '
  - type: text
    content: and
  - type: text
    content: ' praising God, saying, “A great prophet has arisen among us!” and, “God has visited His people [to help and care for and provide for them]!” '
  '17':
  - type: text
    content: This news about Him spread through all of Judea and in all the surrounding countryside. [1 Kin 17:17-24; 2 Kin 4:32-37]
  - type: heading
    content: A Delegation from John
  '18':
  - type: text
    content: 'John’s disciples brought word to him [in prison] of all these things. [Matt 11:2-19] '
  '19':
  - type: text
    content: 'John called two of his disciples and sent them to the Lord, saying, “Are You the '
  - type: note
    content: Lit Coming One.
  - type: text
    content: 'Expected One (the Messiah), or should we look for someone else?” '
  '2':
  - type: text
    content: 'Now a [Roman] '
  - type: note
    content: A Roman military officer commanding a hundred men.
  - type: text
    content: 'centurion’s slave, who was highly regarded by him, was sick and on the verge of death. '
  '20':
  - type: text
    content: 'So the men came to Jesus and said, “John the Baptist sent us to You to ask, ‘Are You the Expected One (the Messiah), or should we look for someone else?’ ” '
  '21':
  - type: text
    content: 'At that very hour Jesus healed many '
  - type: text
    content: people
  - type: text
    content: ' of sicknesses and infirmities and evil spirits; and He gave [the gracious gift of] sight to many '
  - type: text
    content: who were
  - type: text
    content: ' blind. '
  '22':
  - type: text
    content: 'So He replied to them, '
  - type: text
    content: '“Go and tell John about everything you have seen and heard: the '
  - type: heading
    content: blind receive sight
  - type: text
    content: ', the lame walk, the lepers are cleansed, the deaf hear, the dead are raised up, and the '
  - type: heading
    content: poor have the good news
  - type: text
    content: ' (gospel) '
  - type: heading
    content: preached to them
  - type: text
    content: .
  - type: text
    content: ' [Is 29:18, 19; 35:5, 6; 61:1] '
  '23':
  - type: text
    content: Blessed
  - type: text
    content: ' [joyful, spiritually favored] '
  - type: text
    content: is he who does not take offense at Me.”
  '24':
  - type: text
    content: 'When John’s messengers left, Jesus began speaking to the crowds about John: '
  - type: text
    content: '“What did you go out to the wilderness to see? '
  - type: note
    content: I.e. something too ordinary to be of any interest.
  - type: text
    content: A reed shaken by the wind?
  - type: text
    content: ' '
  '25':
  - type: text
    content: But what did you go out to see? A man dressed in soft clothing
  - type: text
    content: ' [entirely unsuited for the harsh wilderness]? '
  - type: text
    content: Those who wear splendid clothing and live in luxury are in royal palaces!
  - type: text
    content: ' '
  '26':
  - type: text
    content: But what did you
  - type: text
    content: ' [really] '
  - type: text
    content: 'go out to see? A prophet? Yes, I say to you, and one '
  - type: note
    content: John was unique among the prophets because he was sent to prepare the hearts of the people for the immediate disclosure of their Messiah.
  - type: text
    content: far more
  - type: text
    content: ' [eminent and remarkable] '
  - type: text
    content: than a prophet
  - type: text
    content: ' [who foretells the future]. '
  '27':
  - type: text
    content: This is the one of whom it is written
  - type: text
    content: ' [by the prophet Malachi],'
  - type: text
    content: ‘
  - type: text
    content: B
  - type: heading
    content: ehold
  - type: text
    content: ', I '
  - type: heading
    content: send
  - type: text
    content: ' M'
  - type: heading
    content: y messenger ahead of
  - type: text
    content: ' Y'
  - type: heading
    content: ou
  - type: text
    content: ','
  - type: text
    content: W
  - type: heading
    content: ho will prepare
  - type: text
    content: ' Y'
  - type: heading
    content: our way before
  - type: text
    content: ' Y'
  - type: heading
    content: ou
  - type: text
    content: .’
  - type: text
    content: ' [Mal 3:1]'
  '28':
  - type: text
    content: ' '
  - type: text
    content: I tell you, among those born of women there is no one greater than John; yet he who is least in the kingdom of God is greater
  - type: text
    content: ' [in privilege] '
  - type: text
    content: than he.”
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'All the people and the tax collectors who heard Jesus, acknowledged [the validity of] God’s justice, having been baptized with the baptism of John. '
  '3':
  - type: text
    content: 'When the centurion heard about Jesus, he sent some Jewish elders to Him, asking Him to come and save the life of his slave. '
  '30':
  - type: text
    content: 'But the Pharisees and the lawyers [who were experts in the Mosaic Law] annulled '
  - type: text
    content: and
  - type: text
    content: ' set aside God’s purpose for themselves, not having been baptized by John.'
  '31':
  - type: text
    content: ' '
  - type: text
    content: “To what then shall I compare the people of this generation
  - type: text
    content: ' [who set aside God’s plan], '
  - type: text
    content: and what are they like?
  - type: text
    content: ' '
  '32':
  - type: text
    content: They are like children sitting in the market place and calling to one another, and saying, ‘We played the flute for you
  - type: text
    content: ' [pretending to be at a wedding], '
  - type: text
    content: and you did not dance; we sang a dirge
  - type: text
    content: ' [pretending to be at a funeral], '
  - type: text
    content: and you did not weep
  - type: text
    content: ' [so nothing we did appealed to you].’ '
  '33':
  - type: text
    content: For John the Baptist has come neither eating bread nor drinking wine, and you say, ‘He has a demon!’
  - type: text
    content: ' '
  '34':
  - type: text
    content: The Son of Man has come eating and drinking, and you say, ‘Look, a man who is a glutton and a
  - type: text
    content: ' [heavy] '
  - type: text
    content: wine-drinker, a friend of tax collectors and sinners
  - type: text
    content: ' [including non-observant Jews].’ '
  '35':
  - type: text
    content: 'Yet wisdom is vindicated '
  - type: text
    content: and
  - type: text
    content: ' shown to be right by all her children'
  - type: text
    content: ' [by the lifestyle, moral character, and good deeds of her followers].”'
  - type: heading
    content: The Anointing in Galilee
  '36':
  - type: text
    content: 'One of the Pharisees asked Jesus to eat with him, and He went into the Pharisee’s house [in the region of Galilee] and reclined '
  - type: text
    content: at the table.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Now there was a woman in the city who was [known as] a '
  - type: note
    content: I.e. an immoral woman or prostitute.
  - type: text
    content: 'sinner; and '
  - type: note
    content: When a Rabbi (teacher) was visiting in someone’s home, it was acceptable for uninvited guests to come and listen to the conversation.
  - type: text
    content: 'when she found out that He was reclining '
  - type: text
    content: at the table
  - type: text
    content: ' in the Pharisee’s house, she brought an alabaster vial of perfume; '
  '38':
  - type: text
    content: 'and standing behind Him at His feet, weeping, she began wetting His feet with her tears, and wiped them with the hair of her head, and [respectfully] kissed His feet [as an act signifying both affection and submission] and '
  - type: note
    content: There were apparently two anointings of Jesus. This one in the home of Simon the Pharisee (identified in v 40) in the area of Galilee by an unnamed woman, and the other in the home of Simon the Leper in Bethany, by Mary the sister of Martha and Lazarus. The anointing in Bethany preceded the triumphal entry into Jerusalem (Matt 26:6-13; Mark 14:3-9; John 12:1-8).
  - type: text
    content: 'anointed them with the perfume. '
  '39':
  - type: text
    content: Now when [Simon] the Pharisee who had invited Him saw this, he said to himself, “If this Man were a prophet He would know who and what sort of woman this is who is touching Him, that she is a [notorious] sinner [an outcast, devoted to sin].”
  - type: heading
    content: Parable of Two Debtors
  '4':
  - type: text
    content: 'When they reached Jesus, they pleaded with Him earnestly [to come], saying, “He is worthy for You to do this for him, '
  '40':
  - type: text
    content: 'Jesus, answering, said to the Pharisee, '
  - type: text
    content: “Simon, I have something to say to you.”
  - type: text
    content: ' And he replied, “Teacher, say it.” '
  '41':
  - type: text
    content: '“A certain moneylender had two debtors: one owed him five hundred '
  - type: note
    content: A denarius was equivalent to a day’s wages.
  - type: text
    content: denarii, and the other fifty.
  - type: text
    content: ' '
  '42':
  - type: text
    content: When they had no means of repaying
  - type: text
    content: ' [the debts], '
  - type: text
    content: he freely forgave them both. So which of them will love him more?”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Simon answered, “The one, I take it, for whom he forgave more.” Jesus said to him, '
  - type: text
    content: “You have decided correctly.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Then turning toward the woman, He said to Simon, '
  - type: text
    content: “Do you see this woman? I came into your house
  - type: text
    content: ' [but you failed to extend to Me the usual courtesies shown to a guest]; '
  - type: text
    content: you gave Me no water for My feet, but she has wet My feet with her tears and wiped them with her hair
  - type: text
    content: ' [demonstrating her love]. '
  '45':
  - type: text
    content: You gave Me no
  - type: text
    content: ' [welcoming] '
  - type: text
    content: kiss, but from the moment I came in, she has not ceased to kiss My feet.
  - type: text
    content: ' '
  '46':
  - type: text
    content: You did not
  - type: text
    content: ' [even] '
  - type: text
    content: anoint My head with
  - type: text
    content: ' [ordinary] '
  - type: text
    content: oil, but she has anointed My feet with
  - type: text
    content: ' [costly and rare] '
  - type: text
    content: perfume.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Therefore I say to you, her sins, which are many, are forgiven, for she loved much; but he who is forgiven little, loves little.”
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Then He said to her, '
  - type: text
    content: “Your sins are forgiven.”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Those who were reclining '
  - type: text
    content: at the table
  - type: text
    content: ' with Him began saying among themselves, “Who is this who even forgives sins?” '
  '5':
  - type: text
    content: 'because he loves our nation and he built us our synagogue [at his own expense].” '
  '50':
  - type: text
    content: 'Jesus said to the woman, '
  - type: text
    content: “Your faith
  - type: text
    content: ' [in Me] '
  - type: text
    content: has saved you; go in peace
  - type: text
    content: ' [free from the distress experienced because of sin].”'
  '6':
  - type: text
    content: 'And Jesus went with them. But when He was near the house, the centurion sent friends to Him, saying, “Lord, do not trouble Yourself further, for I am not worthy for You to come under my roof. '
  '7':
  - type: text
    content: 'Therefore I did not even consider myself worthy to come to You. But just speak a word, and my slave will be healed. '
  '8':
  - type: text
    content: 'For I also am a man subject to authority, with soldiers under me; and I say to this one, ‘Go,’ and he goes, and to another, ‘Come,’ and he comes, and to my slave, ‘Do this,’ and he does it.” '
  '9':
  - type: text
    content: 'Now when Jesus heard this, He was amazed at him, and turned and said to the crowd that was following Him, '
  - type: text
    content: “I say to you, not even in Israel have I found such great faith
  - type: text
    content: ' [as this man’s].” '
