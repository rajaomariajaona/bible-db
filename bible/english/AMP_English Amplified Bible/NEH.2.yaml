document_id: NEH.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nehemiah’s Prayer Answered
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the month of Nisan, in the twentieth year of King Artaxerxes, when wine was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: placed
    - type: text
      text: ' before him, I took the wine and gave it to the king. Now I had not [previously] been sad in his presence. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When Sanballat the Horonite and Tobiah the Ammonite '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: servant
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'official heard this, it caused them great displeasure that someone had come to see about the welfare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosperity of the Israelites.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nehemiah Inspects Jerusalem’s Walls
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So I came to Jerusalem and was there for three days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then I got up in the night, I and a few men with me. I did not tell anyone what my God was putting in my heart to do for Jerusalem, and there was no animal with me except the one on which I was riding [so as not to attract attention]. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So I went out at night by the Valley Gate toward the Dragon’s Well and to the Refuse Gate and inspected the walls of Jerusalem which were broken down and its gates which were consumed by fire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then I passed over to the Fountain Gate and to the King’s Pool, but there was no place for the animal that I was riding to pass. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So I went up at night by the ravine [of Kidron] and inspected the wall; then I turned back and entered [the city] by the Valley Gate, and returned. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The officials did not know where I had gone or what I had done; nor had I yet told the Jews, the priests, the nobles, the officials, or the rest who did the work.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then I said to them, “You see the bad situation that we are in—how Jerusalem is desolate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lies in ruins and its gates have been burned with fire. Come, and let us rebuild the wall of Jerusalem, so that we will no longer be a disgrace.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then I told them how the hand of my God had been favorable to me and also about the words that the king had spoken to me. And they said, “Let us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew verb “to stand” or “arise” is often an instruction to get ready to fulfill a command, somewhat similar to the military command “attention.”
      marker-yv: yv-n
    - type: text
      text: 'rise up and build.” So they thoroughly supported the good '
    - type: usfm
      marker: it
      children:
      - type: text
        text: work.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But when Sanballat the Horonite and Tobiah the Ammonite official and Geshem the Arab heard about it, they mocked us and regarded us with contempt and said, “What is this thing you are doing? Are you rebelling against the king?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So the king said to me, “Why do you look sad when you are not sick? This is nothing but sadness of heart.” Then I was very frightened, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I answered them, “The God of heaven [has appointed us for His purpose and] will give us success; therefore we His servants will arise and build, but you have no portion, right, or memorial in Jerusalem.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and I said to the king, “Let the king live forever. Why should my face not be sad when the city, the place of my fathers’ tombs, lies desolate and its gates have been consumed by fire?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The king said to me, “What do you request?” So I prayed to the God of heaven. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I said to the king, “If it pleases the king, and if your servant has found favor in your presence, [I ask] that you send me to Judah, to the city of my fathers’ tombs, so that I may rebuild it.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The king, beside whom the queen was sitting, asked me, “How long will your journey take, and when will you return?” So it pleased the king to send me, and I gave him a definite time [for my return]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then I said to the king, “If it pleases the king, let letters be given to me for the governors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the provinces
    - type: text
      text: ' beyond the [Euphrates] River, so that they will allow me to pass through until I reach Judah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and a letter to Asaph, the keeper of the king’s forest, so that he will give me timber to construct beams for the gates of the fortress which is by the temple, and for the city wall and for the house which I will occupy.” And the king granted me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what I asked,
    - type: text
      text: ' for the good hand of my God was upon me.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I came to the governors '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the provinces
    - type: text
      text: ' beyond the [Euphrates] River and gave them the king’s letters. Now the king had sent officers of the army and horsemen with me. '
