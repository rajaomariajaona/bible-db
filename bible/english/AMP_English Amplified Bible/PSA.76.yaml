document_id: PSA.76
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 76
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Victorious Power of the God of Jacob.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Chief Musician; on stringed instruments. A Psalm of Asaph. A Song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God is known in Judah;
- type: usfm
  marker: q1
  children:
  - type: text
    text: His name is great in Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: His tabernacle is in Salem (Jerusalem);
- type: usfm
  marker: q1
  children:
  - type: text
    text: His dwelling place is in Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: There He broke the flaming arrows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The shield, the sword, and the weapons of war. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '¶You are glorious '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' resplendent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: More majestic than the mountains of prey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The stouthearted have been stripped of their spoil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have slept the sleep [of death];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And none of the warriors could use his hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: At Your rebuke, O God of Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Both rider and horse were cast into a dead sleep [of death]. [Ex 15:1, 21; Nah 2:13; Zech 12:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You, even You, are to be feared [with the submissive wonder of reverence];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who may stand in Your presence when once You are angry?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶You caused judgment to be heard from heaven;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth feared and was quiet
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When God arose to [establish] judgment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To save all the humble of the earth. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the wrath of man shall praise You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With a remnant of wrath You will clothe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arm Yourself.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶Make vows to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and fulfill them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all who are around Him bring gifts to Him who is to be feared [with awe-inspired reverence].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He will cut off the spirit of princes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He is awesome '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' feared by the kings of the earth.'
