document_id: PSA.76,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 76
  - type: heading
    content: The Victorious Power of the God of Jacob.
  - type: text
    content: To the Chief Musician; on stringed instruments. A Psalm of Asaph. A Song.
  - type: text
    content: God is known in Judah;
  - type: text
    content: His name is great in Israel.
  '10':
  - type: text
    content: For the wrath of man shall praise You;
  - type: text
    content: 'With a remnant of wrath You will clothe '
  - type: text
    content: and
  - type: text
    content: ' arm Yourself.'
  '11':
  - type: text
    content: ¶Make vows to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God and fulfill them;'
  - type: text
    content: Let all who are around Him bring gifts to Him who is to be feared [with awe-inspired reverence].
  '12':
  - type: text
    content: He will cut off the spirit of princes;
  - type: text
    content: 'He is awesome '
  - type: text
    content: and
  - type: text
    content: ' feared by the kings of the earth.'
  '2':
  - type: text
    content: His tabernacle is in Salem (Jerusalem);
  - type: text
    content: His dwelling place is in Zion.
  '3':
  - type: text
    content: There He broke the flaming arrows,
  - type: text
    content: 'The shield, the sword, and the weapons of war. '
  - type: text
    content: Selah.
  '4':
  - type: text
    content: '¶You are glorious '
  - type: text
    content: and
  - type: text
    content: ' resplendent,'
  - type: text
    content: More majestic than the mountains of prey.
  '5':
  - type: text
    content: The stouthearted have been stripped of their spoil,
  - type: text
    content: They have slept the sleep [of death];
  - type: text
    content: And none of the warriors could use his hands.
  '6':
  - type: text
    content: At Your rebuke, O God of Jacob,
  - type: text
    content: Both rider and horse were cast into a dead sleep [of death]. [Ex 15:1, 21; Nah 2:13; Zech 12:4]
  '7':
  - type: text
    content: You, even You, are to be feared [with the submissive wonder of reverence];
  - type: text
    content: Who may stand in Your presence when once You are angry?
  '8':
  - type: text
    content: ¶You caused judgment to be heard from heaven;
  - type: text
    content: The earth feared and was quiet
  '9':
  - type: text
    content: When God arose to [establish] judgment,
  - type: text
    content: 'To save all the humble of the earth. '
  - type: text
    content: Selah.
