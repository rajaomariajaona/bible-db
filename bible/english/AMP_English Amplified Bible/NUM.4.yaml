document_id: NUM.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties of the Kohathites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'and they shall put the lampstand and all its utensils in a covering of porpoise skin, and shall put it on the carrying bars. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Over the golden [incense] altar they shall spread a blue cloth, and cover it with a covering of porpoise skin, and shall insert its carrying poles; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and they shall take all the utensils of the service with which they minister in the sanctuary, and put them in a blue cloth, and cover them with a covering of porpoise skin, and put them on the carrying bars. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then they shall clean away the ashes from the altar [of burnt offering], and spread a purple cloth over it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They shall also put on it all its utensils with which they minister in connection with it: the pans, the meat-forks, the shovels, the basins, and all the utensils of the altar; and they shall spread a covering of porpoise skin over it, and insert its carrying poles. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When Aaron and his sons have finished covering the sanctuary and all its furniture, as the camp sets out, after all that [is done, but not before], the sons of Kohath shall come to carry them [using the poles], so that they do not touch the holy things, and die. These are the things in the Tent of Meeting (tabernacle) which the sons of Kohath are to carry.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“The responsibility of Eleazar, the son of Aaron the priest, is the oil for the light, the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: incense of spices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: fragrant incense, the continual grain offering, and the anointing oil—the responsibility of all the tabernacle and everything that is in it, with the sanctuary and its furnishings.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Do not cut off (eliminate, destroy) the tribe of the families of the Kohathites [who are only Levites and not priests], from among the Levites [by exposing them to the sin of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Kohathites would die if they touched the holy things unless some provision was made for them.
      marker-yv: yv-n
    - type: text
      text: 'touching the most holy things]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But deal with them in this way, so that they may live and not die when they approach the most holy things: Aaron and his sons shall go in and assign each of them to his [specific] work and to his load [to be carried on the march]. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Take a census of the sons of Kohath from among the sons of Levi, by their families (clans), by their fathers’ households, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But the Kohathites shall not go in to see the holy things, even for an instant, or they will die.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties of the Gershonites
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Take a census of the sons of Gershon also, by their fathers’ households, by their families. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'From thirty years and upward to fifty years old, you shall number them; all who enter for service to do the work in the Tent of Meeting. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'This is the service of the families of the Gershonites, in serving and in carrying [when on the march]: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'they shall carry the tent curtains of the tabernacle, and the Tent of Meeting, its covering and the covering of porpoise skin (fine leather) that is on top of it, and the curtain for the doorway of the Tent of Meeting (tabernacle), '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'and the hangings of the courtyard, and the curtain for the entrance of the gate of the courtyard which is around the tabernacle and the altar, and their tent ropes, and all the equipment for their service; and all that is to be done, they shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: serve
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'perform. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Aaron and his sons shall direct all the service of the sons of the Gershonites, all they have to carry and all they have to do. You shall assign to them as a duty all that they are to carry [on the march]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'This is the service of the families of the sons of Gershon in the Tent of Meeting (tabernacle); and their duties '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the hand of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: under the direction of Ithamar the son of Aaron, the [high] priest.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Duties of the Merarites
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“As for the sons of Merari, you shall number them by their families (clans), by their fathers’ households; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'from thirty years old and upward, even to fifty years old, all who enter the service to do the work in the Tent of Meeting (tabernacle). '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'from thirty years and upward to fifty years old, you shall number them, everyone who enters the service to do the work of the Tent of Meeting (tabernacle). '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'This is what they are assigned to carry [on the march], according to all their service in the Tent of Meeting: the boards [for the framework] of the tabernacle and its bars and its pillars and its sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'and the pillars around the courtyard with their sockets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' bases and their pegs and their cords (tent ropes), with all their equipment and with all their [accessories for] service; and you shall assign '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each man
    - type: text
      text: ' by name the items '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the duty of their loads
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'he is to carry [on the march]. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'This is the work of the families of the sons of Merari, according to all their tasks in the Tent of Meeting (tabernacle), '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the hand of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: under the direction of Ithamar the son of Aaron, the priest.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'So Moses and Aaron and the leaders of the congregation numbered the sons of the Kohathites by their families (clans) and by their fathers’ households, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'from thirty years and upward even to fifty years old, everyone who enters the service to do the work in the Tent of Meeting (tabernacle); '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'the men who were numbered by their families were 2,750. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: These were numbered of the families of the Kohathites, all who did service in the Tent of Meeting (tabernacle), whom Moses and Aaron numbered according to the commandment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by the hand of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: through Moses.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The men who were numbered of the sons of Gershon, by their families (clans), and by their fathers’ households, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'from thirty years and upward even to fifty years old, everyone who entered the service to do the work in the Tent of Meeting (tabernacle); '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'This is the work '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' responsibility of the sons of Kohath in the Tent of Meeting (tabernacle): the most holy things.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'the men who were numbered by their families, by their fathers’ households, were 2,630. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: These were numbered men of the families of the sons of Gershon, everyone who served in the Tent of Meeting (tabernacle), whom Moses and Aaron numbered just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'The men who were numbered of the sons of Merari, by their families (clans), by their fathers’ households, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'from thirty years and upward even to fifty years old, everyone who entered the service for work in the Tent of Meeting (tabernacle); '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'the men who were numbered by their families were 3,200. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: These are the men who were numbered of the families of the sons of Merari, whom Moses and Aaron numbered in accordance with the commandment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' through Moses.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'All the men who were numbered of the Levites, whom Moses and Aaron and the leaders of Israel counted by their families (clans) and by their fathers’ households, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'from thirty years and upward even to fifty years old, everyone who could enter to do the work of service and the work of carrying in the Tent of Meeting (tabernacle); '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'the men that were numbered were 8,580. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: According to the commandment of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' through Moses, they were numbered, each '
    - type: usfm
      marker: it
      children:
      - type: text
        text: assigned
    - type: text
      text: ' to his work of serving and carrying. Thus they were numbered by him, just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“When the camp prepares to move out, Aaron and his sons shall come into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the sanctuary
    - type: text
      text: ' and take down '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the veil of the curtain
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the veil (curtain) screening off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Holy of Holies
    - type: text
      text: ', and cover the ark of the testimony with it; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and they shall put on it a covering of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew word is not certain; some scholars have suggested that the material is instead a fine leather of unspecified origin.
      marker-yv: yv-n
    - type: text
      text: 'porpoise skin (fine leather), and shall spread over that a cloth of pure blue, and shall insert the carrying poles of the ark. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Over the table of the bread of the Presence they shall spread a cloth of blue and put on it the plates, the dishes [for incense], the sacrificial bowls, the jars for the drink offering, and the continual bread [of the Presence] shall be on it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'They shall spread over them a cloth of scarlet, and cover that with a covering of porpoise skin, and they shall insert its carrying poles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then they shall take a blue cloth and cover the lampstand for the light, along with its lamps, its wick cutters, its trays, and all the oil vessels, by which it is supplied; '
