document_id: NUM.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of the Kohathites
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: 'and they shall put the lampstand and all its utensils in a covering of porpoise skin, and shall put it on the carrying bars. '
  '11':
  - type: text
    content: 'Over the golden [incense] altar they shall spread a blue cloth, and cover it with a covering of porpoise skin, and shall insert its carrying poles; '
  '12':
  - type: text
    content: 'and they shall take all the utensils of the service with which they minister in the sanctuary, and put them in a blue cloth, and cover them with a covering of porpoise skin, and put them on the carrying bars. '
  '13':
  - type: text
    content: 'Then they shall clean away the ashes from the altar [of burnt offering], and spread a purple cloth over it. '
  '14':
  - type: text
    content: 'They shall also put on it all its utensils with which they minister in connection with it: the pans, the meat-forks, the shovels, the basins, and all the utensils of the altar; and they shall spread a covering of porpoise skin over it, and insert its carrying poles. '
  '15':
  - type: text
    content: When Aaron and his sons have finished covering the sanctuary and all its furniture, as the camp sets out, after all that [is done, but not before], the sons of Kohath shall come to carry them [using the poles], so that they do not touch the holy things, and die. These are the things in the Tent of Meeting (tabernacle) which the sons of Kohath are to carry.
  '16':
  - type: text
    content: '“The responsibility of Eleazar, the son of Aaron the priest, is the oil for the light, the '
  - type: note
    content: Or incense of spices.
  - type: text
    content: fragrant incense, the continual grain offering, and the anointing oil—the responsibility of all the tabernacle and everything that is in it, with the sanctuary and its furnishings.”
  '17':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '18':
  - type: text
    content: '“Do not cut off (eliminate, destroy) the tribe of the families of the Kohathites [who are only Levites and not priests], from among the Levites [by exposing them to the sin of '
  - type: note
    content: The Kohathites would die if they touched the holy things unless some provision was made for them.
  - type: text
    content: 'touching the most holy things]. '
  '19':
  - type: text
    content: 'But deal with them in this way, so that they may live and not die when they approach the most holy things: Aaron and his sons shall go in and assign each of them to his [specific] work and to his load [to be carried on the march]. '
  '2':
  - type: text
    content: '“Take a census of the sons of Kohath from among the sons of Levi, by their families (clans), by their fathers’ households, '
  '20':
  - type: text
    content: But the Kohathites shall not go in to see the holy things, even for an instant, or they will die.”
  - type: heading
    content: Duties of the Gershonites
  '21':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '22':
  - type: text
    content: '“Take a census of the sons of Gershon also, by their fathers’ households, by their families. '
  '23':
  - type: text
    content: 'From thirty years and upward to fifty years old, you shall number them; all who enter for service to do the work in the Tent of Meeting. '
  '24':
  - type: text
    content: 'This is the service of the families of the Gershonites, in serving and in carrying [when on the march]: '
  '25':
  - type: text
    content: 'they shall carry the tent curtains of the tabernacle, and the Tent of Meeting, its covering and the covering of porpoise skin (fine leather) that is on top of it, and the curtain for the doorway of the Tent of Meeting (tabernacle), '
  '26':
  - type: text
    content: 'and the hangings of the courtyard, and the curtain for the entrance of the gate of the courtyard which is around the tabernacle and the altar, and their tent ropes, and all the equipment for their service; and all that is to be done, they shall '
  - type: note
    content: Lit serve.
  - type: text
    content: 'perform. '
  '27':
  - type: text
    content: 'Aaron and his sons shall direct all the service of the sons of the Gershonites, all they have to carry and all they have to do. You shall assign to them as a duty all that they are to carry [on the march]. '
  '28':
  - type: text
    content: 'This is the service of the families of the sons of Gershon in the Tent of Meeting (tabernacle); and their duties '
  - type: text
    content: shall be
  - type: text
    content: ' '
  - type: note
    content: Lit in the hand of.
  - type: text
    content: under the direction of Ithamar the son of Aaron, the [high] priest.
  - type: heading
    content: Duties of the Merarites
  '29':
  - type: text
    content: '“As for the sons of Merari, you shall number them by their families (clans), by their fathers’ households; '
  '3':
  - type: text
    content: 'from thirty years old and upward, even to fifty years old, all who enter the service to do the work in the Tent of Meeting (tabernacle). '
  '30':
  - type: text
    content: 'from thirty years and upward to fifty years old, you shall number them, everyone who enters the service to do the work of the Tent of Meeting (tabernacle). '
  '31':
  - type: text
    content: 'This is what they are assigned to carry [on the march], according to all their service in the Tent of Meeting: the boards [for the framework] of the tabernacle and its bars and its pillars and its sockets '
  - type: text
    content: or
  - type: text
    content: ' bases, '
  '32':
  - type: text
    content: 'and the pillars around the courtyard with their sockets '
  - type: text
    content: or
  - type: text
    content: ' bases and their pegs and their cords (tent ropes), with all their equipment and with all their [accessories for] service; and you shall assign '
  - type: text
    content: each man
  - type: text
    content: ' by name the items '
  - type: note
    content: Lit the duty of their loads.
  - type: text
    content: 'he is to carry [on the march]. '
  '33':
  - type: text
    content: 'This is the work of the families of the sons of Merari, according to all their tasks in the Tent of Meeting (tabernacle), '
  - type: note
    content: Lit in the hand of.
  - type: text
    content: under the direction of Ithamar the son of Aaron, the priest.”
  '34':
  - type: text
    content: 'So Moses and Aaron and the leaders of the congregation numbered the sons of the Kohathites by their families (clans) and by their fathers’ households, '
  '35':
  - type: text
    content: 'from thirty years and upward even to fifty years old, everyone who enters the service to do the work in the Tent of Meeting (tabernacle); '
  '36':
  - type: text
    content: 'the men who were numbered by their families were 2,750. '
  '37':
  - type: text
    content: These were numbered of the families of the Kohathites, all who did service in the Tent of Meeting (tabernacle), whom Moses and Aaron numbered according to the commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: Lit by the hand of.
  - type: text
    content: through Moses.
  '38':
  - type: text
    content: 'The men who were numbered of the sons of Gershon, by their families (clans), and by their fathers’ households, '
  '39':
  - type: text
    content: 'from thirty years and upward even to fifty years old, everyone who entered the service to do the work in the Tent of Meeting (tabernacle); '
  '4':
  - type: text
    content: 'This is the work '
  - type: text
    content: and
  - type: text
    content: ' responsibility of the sons of Kohath in the Tent of Meeting (tabernacle): the most holy things.'
  '40':
  - type: text
    content: 'the men who were numbered by their families, by their fathers’ households, were 2,630. '
  '41':
  - type: text
    content: These were numbered men of the families of the sons of Gershon, everyone who served in the Tent of Meeting (tabernacle), whom Moses and Aaron numbered just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded.'
  '42':
  - type: text
    content: 'The men who were numbered of the sons of Merari, by their families (clans), by their fathers’ households, '
  '43':
  - type: text
    content: 'from thirty years and upward even to fifty years old, everyone who entered the service for work in the Tent of Meeting (tabernacle); '
  '44':
  - type: text
    content: 'the men who were numbered by their families were 3,200. '
  '45':
  - type: text
    content: These are the men who were numbered of the families of the sons of Merari, whom Moses and Aaron numbered in accordance with the commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ' through Moses.'
  '46':
  - type: text
    content: 'All the men who were numbered of the Levites, whom Moses and Aaron and the leaders of Israel counted by their families (clans) and by their fathers’ households, '
  '47':
  - type: text
    content: 'from thirty years and upward even to fifty years old, everyone who could enter to do the work of service and the work of carrying in the Tent of Meeting (tabernacle); '
  '48':
  - type: text
    content: 'the men that were numbered were 8,580. '
  '49':
  - type: text
    content: According to the commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ' through Moses, they were numbered, each '
  - type: text
    content: assigned
  - type: text
    content: ' to his work of serving and carrying. Thus they were numbered by him, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses.'
  '5':
  - type: text
    content: '“When the camp prepares to move out, Aaron and his sons shall come into '
  - type: text
    content: the sanctuary
  - type: text
    content: ' and take down '
  - type: note
    content: Lit the veil of the curtain.
  - type: text
    content: 'the veil (curtain) screening off '
  - type: text
    content: the Holy of Holies
  - type: text
    content: ', and cover the ark of the testimony with it; '
  '6':
  - type: text
    content: 'and they shall put on it a covering of '
  - type: note
    content: The meaning of the Hebrew word is not certain; some scholars have suggested that the material is instead a fine leather of unspecified origin.
  - type: text
    content: 'porpoise skin (fine leather), and shall spread over that a cloth of pure blue, and shall insert the carrying poles of the ark. '
  '7':
  - type: text
    content: 'Over the table of the bread of the Presence they shall spread a cloth of blue and put on it the plates, the dishes [for incense], the sacrificial bowls, the jars for the drink offering, and the continual bread [of the Presence] shall be on it. '
  '8':
  - type: text
    content: 'They shall spread over them a cloth of scarlet, and cover that with a covering of porpoise skin, and they shall insert its carrying poles. '
  '9':
  - type: text
    content: 'Then they shall take a blue cloth and cover the lampstand for the light, along with its lamps, its wick cutters, its trays, and all the oil vessels, by which it is supplied; '
