document_id: EZK.28,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tyre’s King Overthrown
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came again to me, saying, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘You will die the death of the uncircumcised [barbarian]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the hand of strangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have spoken!’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .” ’ ”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Son of man, take up a dirge (funeral poem to be sung) for the king of Tyre and say to him, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You had the full measure of perfection '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the finishing touch [of completeness],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Full of wisdom and perfect in beauty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You were in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This speech, though not addressed directly to Satan, seems to be spoken against his evil nature expressing itself in and through the human ruler who grants to himself the honors due only to God. Here may be seen also a foreshadowing of “the beast” who is to attribute to himself divine rights in the time of the end (Dan 7:8-28; 2 Thess 2:1-12; Rev 13; 19:20).
      marker-yv: yv-n
    - type: text
      text: Eden, the garden of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every precious stone was your covering:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ruby, the topaz, and the diamond;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The beryl, the onyx, and the jasper;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lapis lazuli, the turquoise, and the emerald;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the gold, the workmanship of your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: tambourines
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: settings and your sockets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were prepared
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the day that you were created. [Gen 3:14, 15; Is 14:12-15; Matt 16:23]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You were the anointed cherub who covers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' protects,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I placed you there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were on the holy mountain of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You walked in the midst of the stones of fire [sparkling jewels]. [Ex 24:10]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You were blameless in your ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the day you were created
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Until unrighteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil were found in you.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Through the abundance of your commerce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You were internally filled with lawlessness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violence,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you sinned;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore I have cast you out as a profane '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unholy thing'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the mountain of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have destroyed you, O covering cherub,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the midst of the stones of fire.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Your heart was proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant because of your beauty;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You destroyed your wisdom for the sake of your splendor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cast you to the ground;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I lay you before kings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they might look at you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You profaned your sanctuaries
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the great quantity of your sins '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the enormity of your guilt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the unrighteousness of your trade.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I have brought forth a fire from your midst;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has consumed you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I have reduced you to ashes on the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the sight of all who look at you.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All the peoples (nations) who knew you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are appalled at you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have come to a horrible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrifying end'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will forever cease to be.” ’ ” [Is 23; Joel 3:4-8; Amos 1:9, 10; Zech 9:3, 4]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgment of Sidon
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Son of man, say to the prince of Tyre, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because your heart is lifted up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And you have said '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' thought, ‘I am a god,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sit in the seat of the gods
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the heart of the seas’;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you are [only] a man [weak, feeble, made of earth] and not God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you [imagine yourself to be more than mortal and] think your mind is as [wise as] the mind of God—
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, set your face toward Sidon, and prophesy against her '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and say, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I am against you, O Sidon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And I will show My glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be glorified in your midst.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will know [by personal experience] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' when I bring judgment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment on her,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will manifest My holiness in her.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For I will send virulent disease to her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And blood into her streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the wounded will fall in her midst
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the sword upon her from every side,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they shall know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And there will no longer be a briar or a painful thorn to prick the house of Israel from all those around them who treated them with contempt; then they will know [with clarity] that I am the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Israel Regathered
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “When I gather the house of Israel from the nations among whom they are scattered, and I manifest my Holiness in them in the sight of the nations, then they will live in their own land which I gave to My servant Jacob. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shall live in it securely; and they will build houses, plant vineyards and live securely when I execute judgment on all those around them who despise them. Then they will know [with clarity and confidence] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God.” ’ ”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold, you are [imagining yourself] wiser than Daniel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no secret [you think] that is hidden from you;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your [own] wisdom and with your [own] understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have acquired your riches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have brought gold and silver into your treasuries;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By your great wisdom and by your trade
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have increased your riches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And your heart is proud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant because of your wealth;'
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Because you have imagined your mind [to be]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the mind of God [having thoughts and plans like God Himself], [Obad 3]
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, behold, I will bring strangers (Babylonians) upon you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The most ruthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' violent of the nations.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will draw their swords
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against the beauty of your wisdom [O Tyre]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And defile your splendor.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘They will bring you down to the pit [of destruction],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you will die the death of all those who die
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the heart of the seas.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Will you still say, “I am a god,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the presence of him who kills you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you are [only] a man [made of earth] and not God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the hands of those who wound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' profane you.'
