  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Again the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Son of man, set your face toward Sidon, and prophesy against her '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, I am against you, O Sidon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will show My glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' be glorified in your midst.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they will know [by personal experience] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' when I bring judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punishment on her,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will manifest My holiness in her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “For I will send virulent disease to her
- type: usfm
  marker: q1
  children:
  - type: text
    text: And blood into her streets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the wounded will fall in her midst
- type: usfm
  marker: q1
  children:
  - type: text
    text: By the sword upon her from every side,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they shall know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And there will no longer be a briar or a painful thorn to prick the house of Israel from all those around them who treated them with contempt; then they will know [with clarity] that I am the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel Regathered
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “When I gather the house of Israel from the nations among whom they are scattered, and I manifest my Holiness in them in the sight of the nations, then they will live in their own land which I gave to My servant Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They shall live in it securely; and they will build houses, plant vineyards and live securely when I execute judgment on all those around them who despise them. Then they will know [with clarity and confidence] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God.” ’ ”'
