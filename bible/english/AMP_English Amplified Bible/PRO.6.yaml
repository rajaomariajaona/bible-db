document_id: PRO.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Parental Counsel
  - type: text
    content: My son, if you have become surety (guaranteed a debt or obligation) for your neighbor,
  - type: text
    content: 'If you have given your pledge for [the debt of] a stranger '
  - type: text
    content: or
  - type: text
    content: ' another [outside your family],'
  '10':
  - type: text
    content: “Yet a little sleep, a little slumber,
  - type: text
    content: 'A little folding of the hands to lie down '
  - type: text
    content: and
  - type: text
    content: ' rest”—'
  '11':
  - type: text
    content: 'So your poverty will come like an '
  - type: text
    content: approaching
  - type: text
    content: ' prowler who walks [slowly, but surely]'
  - type: text
    content: And your need [will come] like an armed man [making you helpless]. [Prov 10:4; 13:4; 20:4]
  '12':
  - type: text
    content: ¶A worthless person, a wicked man,
  - type: text
    content: Is one who walks with a perverse (corrupt, vulgar) mouth.
  '13':
  - type: text
    content: Who winks with his eyes [in mockery], who shuffles his feet [to signal],
  - type: text
    content: Who points with his fingers [to give subversive instruction];
  '14':
  - type: text
    content: 'Who perversely in his heart plots trouble '
  - type: text
    content: and
  - type: text
    content: ' evil continually;'
  - type: text
    content: 'Who spreads discord '
  - type: text
    content: and
  - type: text
    content: ' strife.'
  '15':
  - type: text
    content: 'Therefore [the crushing weight of] his disaster will come suddenly '
  - type: text
    content: upon him;
  - type: text
    content: 'Instantly he will be broken, and there will be no healing '
  - type: text
    content: or
  - type: text
    content: ' remedy [because he has no heart for God].'
  '16':
  - type: text
    content: ¶These six things the L
  - type: heading
    content: ord
  - type: text
    content: ' hates;'
  - type: text
    content: 'Indeed, seven are repulsive to Him:'
  '17':
  - type: text
    content: A proud look [the attitude that makes one overestimate oneself and discount others], a lying tongue,
  - type: text
    content: And hands that shed innocent blood, [Ps 120:2, 3]
  '18':
  - type: text
    content: A heart that creates wicked plans,
  - type: text
    content: Feet that run swiftly to evil,
  '19':
  - type: text
    content: A false witness who breathes out lies [even half-truths],
  - type: text
    content: And one who spreads discord (rumors) among brothers.
  '2':
  - type: text
    content: If you have been snared with the words of your lips,
  - type: text
    content: If you have been trapped by the speech of your mouth,
  '20':
  - type: text
    content: ¶My son, be guided by your father’s [God-given] commandment (instruction)
  - type: text
    content: 'And do not '
  - type: note
    content: Lit forsake.
  - type: text
    content: reject the teaching of your mother; [Eph 6:1-3]
  '21':
  - type: text
    content: Bind them continually upon your heart (in your thoughts),
  - type: text
    content: And tie them around your neck. [Prov 3:3; 7:3]
  '22':
  - type: text
    content: When you walk about, they (the godly teachings of your parents) will guide you;
  - type: text
    content: When you sleep, they will keep watch over you;
  - type: text
    content: And when you awake, they will talk to you.
  '23':
  - type: text
    content: For the commandment is a lamp, and the teaching [of the law] is light,
  - type: text
    content: And reproofs (rebukes) for discipline are the way of life, [Ps 19:8; 119:105]
  '24':
  - type: text
    content: To keep you from the evil woman,
  - type: text
    content: From [the flattery of] the smooth tongue of an immoral woman.
  '25':
  - type: text
    content: Do not desire (lust after) her beauty in your heart,
  - type: text
    content: Nor let her capture you with her eyelashes.
  '26':
  - type: text
    content: For on account of a prostitute one is reduced to a piece of bread [to be eaten up],
  - type: text
    content: And the immoral woman hunts [with a hook] the precious life [of a man].
  '27':
  - type: text
    content: Can a man take fire to his chest
  - type: text
    content: And his clothes not be burned?
  '28':
  - type: text
    content: Or can a man walk on hot coals
  - type: text
    content: And his feet not be scorched?
  '29':
  - type: text
    content: So is the one who goes in to his neighbor’s wife;
  - type: text
    content: 'Whoever touches her will not be found innocent '
  - type: text
    content: or
  - type: text
    content: ' go unpunished.'
  '3':
  - type: text
    content: Do this now, my son, and release yourself [from the obligation];
  - type: note
    content: Under the ancient laws governing debt, a man obligated for another’s debt could lose his money, land, bed, and clothing; and if these were not sufficient, he and his wife and children could be sold as slaves, not to be released until the next Year of Jubilee—fifty years after the previous one.
  - type: text
    content: Since you have come into the hand of your neighbor,
  - type: text
    content: Go humble yourself, and plead with your neighbor [to pay his debt and release you].
  '30':
  - type: text
    content: People do not despise a thief if he steals
  - type: text
    content: To satisfy himself when he is hungry;
  '31':
  - type: text
    content: But when he is found, he must repay seven times [what he stole];
  - type: text
    content: He must give all the property of his house [if necessary to meet his fine].
  '32':
  - type: text
    content: 'But whoever commits adultery with a woman lacks common sense '
  - type: text
    content: and
  - type: text
    content: ' sound judgment '
  - type: text
    content: and
  - type: text
    content: ' an understanding [of moral principles];'
  - type: text
    content: He who would destroy his soul does it.
  '33':
  - type: text
    content: Wounds and disgrace he will find,
  - type: text
    content: And his reproach (blame) will not be blotted out.
  '34':
  - type: text
    content: For jealousy enrages the [wronged] husband;
  - type: text
    content: He will not spare [the guilty one] on the day of vengeance.
  '35':
  - type: text
    content: He will not accept any ransom [offered to buy him off from demanding full punishment];
  - type: text
    content: Nor will he be satisfied though you offer him many gifts (bribes).
  '4':
  - type: text
    content: Give no [unnecessary] sleep to your eyes,
  - type: text
    content: Nor slumber to your eyelids;
  '5':
  - type: text
    content: 'Tear yourself away like a gazelle from the hand of '
  - type: text
    content: the hunter
  - type: text
    content: And like a bird from the hand of the fowler.
  '6':
  - type: text
    content: ¶Go to the ant, O lazy one;
  - type: text
    content: Observe her ways and be wise, [Job 12:7]
  '7':
  - type: text
    content: Which, having no chief,
  - type: text
    content: Overseer or ruler,
  '8':
  - type: text
    content: She prepares her food in the summer
  - type: text
    content: And brings in her provisions [of food for the winter] in the harvest.
  '9':
  - type: text
    content: How long will you lie down, O lazy one?
  - type: text
    content: When will you arise from your sleep [and learn self-discipline]? [Prov 24:33, 34]
