document_id: PRO.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parental Counsel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My son, if you have become surety (guaranteed a debt or obligation) for your neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If you have given your pledge for [the debt of] a stranger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' another [outside your family],'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If you have been snared with the words of your lips,
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you have been trapped by the speech of your mouth,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do this now, my son, and release yourself [from the obligation];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Under the ancient laws governing debt, a man obligated for another’s debt could lose his money, land, bed, and clothing; and if these were not sufficient, he and his wife and children could be sold as slaves, not to be released until the next Year of Jubilee—fifty years after the previous one.
    marker-yv: yv-n
  - type: text
    text: Since you have come into the hand of your neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go humble yourself, and plead with your neighbor [to pay his debt and release you].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Give no [unnecessary] sleep to your eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor slumber to your eyelids;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tear yourself away like a gazelle from the hand of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the hunter
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like a bird from the hand of the fowler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶Go to the ant, O lazy one;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observe her ways and be wise, [Job 12:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Which, having no chief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Overseer or ruler,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: She prepares her food in the summer
- type: usfm
  marker: q1
  children:
  - type: text
    text: And brings in her provisions [of food for the winter] in the harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: How long will you lie down, O lazy one?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When will you arise from your sleep [and learn self-discipline]? [Prov 24:33, 34]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Yet a little sleep, a little slumber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A little folding of the hands to lie down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rest”—'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So your poverty will come like an '
  - type: usfm
    marker: it
    children:
    - type: text
      text: approaching
  - type: text
    text: ' prowler who walks [slowly, but surely]'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your need [will come] like an armed man [making you helpless]. [Prov 10:4; 13:4; 20:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶A worthless person, a wicked man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is one who walks with a perverse (corrupt, vulgar) mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Who winks with his eyes [in mockery], who shuffles his feet [to signal],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who points with his fingers [to give subversive instruction];
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Who perversely in his heart plots trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil continually;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who spreads discord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' strife.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore [the crushing weight of] his disaster will come suddenly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: upon him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Instantly he will be broken, and there will be no healing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' remedy [because he has no heart for God].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶These six things the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' hates;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Indeed, seven are repulsive to Him:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A proud look [the attitude that makes one overestimate oneself and discount others], a lying tongue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And hands that shed innocent blood, [Ps 120:2, 3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A heart that creates wicked plans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Feet that run swiftly to evil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A false witness who breathes out lies [even half-truths],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And one who spreads discord (rumors) among brothers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ¶My son, be guided by your father’s [God-given] commandment (instruction)
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And do not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forsake
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: reject the teaching of your mother; [Eph 6:1-3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Bind them continually upon your heart (in your thoughts),
- type: usfm
  marker: q1
  children:
  - type: text
    text: And tie them around your neck. [Prov 3:3; 7:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When you walk about, they (the godly teachings of your parents) will guide you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you sleep, they will keep watch over you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when you awake, they will talk to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For the commandment is a lamp, and the teaching [of the law] is light,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And reproofs (rebukes) for discipline are the way of life, [Ps 19:8; 119:105]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: To keep you from the evil woman,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From [the flattery of] the smooth tongue of an immoral woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Do not desire (lust after) her beauty in your heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor let her capture you with her eyelashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For on account of a prostitute one is reduced to a piece of bread [to be eaten up],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the immoral woman hunts [with a hook] the precious life [of a man].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Can a man take fire to his chest
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his clothes not be burned?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Or can a man walk on hot coals
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his feet not be scorched?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So is the one who goes in to his neighbor’s wife;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Whoever touches her will not be found innocent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' go unpunished.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: People do not despise a thief if he steals
- type: usfm
  marker: q1
  children:
  - type: text
    text: To satisfy himself when he is hungry;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But when he is found, he must repay seven times [what he stole];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He must give all the property of his house [if necessary to meet his fine].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But whoever commits adultery with a woman lacks common sense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sound judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' an understanding [of moral principles];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who would destroy his soul does it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Wounds and disgrace he will find,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his reproach (blame) will not be blotted out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For jealousy enrages the [wronged] husband;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not spare [the guilty one] on the day of vengeance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: He will not accept any ransom [offered to buy him off from demanding full punishment];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor will he be satisfied though you offer him many gifts (bribes).
