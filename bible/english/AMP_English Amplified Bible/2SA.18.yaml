  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But the men said, “You should not go out [to battle with us]. For if in fact we retreat, they will not care about us; even if half of us die, they will not care about us. But you are worth ten thousand of us. So now it is better that you be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ready
  - type: text
    text: ' to help us from the city [of Mahanaim].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the king said to them, “I will do whatever seems best to you.” So the king stood beside the gate [of Mahanaim], and all the army went out in groups of hundreds and of thousands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The king commanded Joab and Abishai and Ittai, saying, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Deal
  - type: text
    text: ' gently with the young man Absalom for my sake.” And all the men heard when the king gave orders to all the commanders about Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the men went out into the field against Israel, and the battle was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fought
  - type: text
    text: ' in the forest of Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The men of Israel [who supported Absalom] were defeated there by the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:7 '
    - type: usfm
