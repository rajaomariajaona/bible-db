  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then Ahimaaz the son of Zadok, said, “Let me run and bring the king news that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has vindicated him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by rescuing him
  - type: text
    text: ' from [the power of] his enemies.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Joab told him, “You are not the man to carry news [to King David] today, but you shall carry news another day. On this day you shall carry no news, because the king’s son is dead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Joab said to the Cushite (Ethiopian), “Go, tell the king what you have seen.” And the Cushite bowed to Joab and ran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then Ahimaaz the son of Zadok said again to Joab, “But whatever happens, please let me also run after the Cushite.” Joab said, “Why should you run, my son, seeing you will have no messenger’s reward for going [because you have only bad news]?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “But whatever happens, Let me run.” So Joab said to him, “Run.” Then Ahimaaz ran by the way of the plain [of the Jordan River] and outran the Cushite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now David was sitting between the two gates; and the lookout went up to the roof of the gate by the wall, and when he raised his eyes and looked, he saw a man running alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The lookout called '
  - type: usfm
    marker: it
    children:
    - type: text
      text: down
  - type: text
    text: ' and told the king. The king said, “If he is alone, he has good news to tell.” And he came nearer and nearer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then the lookout saw another man running, and he called to the gatekeeper and said, “Look, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another
  - type: text
    text: ' man running alone.” The king said, “He also is bringing good news.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The lookout said, “I think the man in front runs like Ahimaaz the son of Zadok.” The king said, “He is a good man and is coming with good news.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And Ahimaaz called out and said to the king, “
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Peace
      - type: text
        text: ' (Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shalom)
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: All is well.” And he bowed before the king with his face to the ground and said, “Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, who has handed over the men who lifted up their hands [to fight] against my lord the king.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The king asked, “Is the young man Absalom safe?” Ahimaaz answered, “When Joab sent the king’s servant, and your servant, I saw a great turmoil, but I do not know what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it was about
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The king told him, “Step aside; stand here.” And he stepped aside and stood still.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Behold, the Cushite (Ethiopian) arrived, and said, “Let my lord the king receive good news, for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has vindicated you today '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by rescuing you
  - type: text
    text: ' from the hand (power) of all those who stood against you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The king asked the Cushite, “Is the young man Absalom [my son] safe?” The Cushite replied, “May the enemies of my lord the king, and all those who rise against you to do evil, be [dead] like that young man is.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
