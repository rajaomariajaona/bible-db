    marker-yv: yv-n
  - type: text
    text: 'The king was deeply moved and went to the upper room over the gate and wept [in sorrow]. And this is what he said as he walked: “O my son Absalom, my son, my son Absalom! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Would that.
    marker-yv: yv-n
  - type: text
    text: How I wish that I had died instead of you, O Absalom, my son, my son!”
