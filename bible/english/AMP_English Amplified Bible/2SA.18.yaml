    marker-yv: yv-n
  - type: text
    text: 'army out, a third under the command of Joab, a third under Abishai the son of Zeruiah, Joab’s brother, and a third under the command of Ittai the Gittite. And the king said to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
