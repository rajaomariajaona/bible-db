document_id: 2SA.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Absalom’s Death
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David numbered the men who were with him and set over them commanders of thousands and commanders of hundreds. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'A certain man saw it and informed Joab, saying, “I saw Absalom hanging in a tree.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Joab said to the man who informed him, “You saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him!
    - type: text
      text: ' Why then did you not strike him there to the ground? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In defiance of David’s order, Joab must have offered a reward for the man who killed Absalom.
      marker-yv: yv-n
    - type: text
      text: 'I would have given you ten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver and a belt.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The man told Joab, “Even if I were to feel the weight of a thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pieces
    - type: text
      text: ' of silver in my hands, I would not put out my hand against the king’s son; for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in our hearing
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'we all heard the king command you, Abishai, and Ittai, saying, ‘Protect the young man Absalom, for my sake.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Otherwise, if I had acted treacherously against his life (for nothing is hidden from the king) you yourself would have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: stood aloof
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'taken sides against me.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Joab said, “I will not waste time with you.” So he took three spears in his hand and thrust them through the heart of Absalom while he was still alive [and caught] in the midst of the tree. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And ten young men, Joab’s armor bearers, surrounded and struck Absalom and killed him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Joab blew the trumpet [to signal the end of the combat], and the men returned from pursuing Israel, for Joab held them back. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'They took [down the body of] Absalom and threw him into a deep pit in the forest and set up a huge mound of stones over him. Then all Israel fled, everyone to his own tent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now Absalom in his lifetime had taken and set up for himself a memorial pillar which is in the King’s Valley, for he said, “I have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One rabbi said that Absalom considered his three unnamed sons (14:27) unfit to rule. More likely, his sons predeceased him.
      marker-yv: yv-n
    - type: text
      text: 'no son to keep my name in remembrance.” He named the memorial pillar after himself, and to this day it is called '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the hand of Absalom
        - type: text
          text: . The monument of the same name that exists today in the Kidron Valley is not the one set up by Absalom.
      marker-yv: yv-n
    - type: text
      text: Absalom’s Monument.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Is Grief-stricken
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then Ahimaaz the son of Zadok, said, “Let me run and bring the king news that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has vindicated him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by rescuing him
    - type: text
      text: ' from [the power of] his enemies.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then David sent the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: people
        - type: text
          text: ' and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: 'army out, a third under the command of Joab, a third under Abishai the son of Zeruiah, Joab’s brother, and a third under the command of Ittai the Gittite. And the king said to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: people
        - type: text
          text: ' and so throughout the chapter.'
      marker-yv: yv-n
    - type: text
      text: 'men, “I myself will certainly go out [to fight] with you.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But Joab told him, “You are not the man to carry news [to King David] today, but you shall carry news another day. On this day you shall carry no news, because the king’s son is dead.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Joab said to the Cushite (Ethiopian), “Go, tell the king what you have seen.” And the Cushite bowed to Joab and ran. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then Ahimaaz the son of Zadok said again to Joab, “But whatever happens, please let me also run after the Cushite.” Joab said, “Why should you run, my son, seeing you will have no messenger’s reward for going [because you have only bad news]?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “But whatever happens, Let me run.” So Joab said to him, “Run.” Then Ahimaaz ran by the way of the plain [of the Jordan River] and outran the Cushite.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Now David was sitting between the two gates; and the lookout went up to the roof of the gate by the wall, and when he raised his eyes and looked, he saw a man running alone. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The lookout called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: down
    - type: text
      text: ' and told the king. The king said, “If he is alone, he has good news to tell.” And he came nearer and nearer. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Then the lookout saw another man running, and he called to the gatekeeper and said, “Look, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' man running alone.” The king said, “He also is bringing good news.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The lookout said, “I think the man in front runs like Ahimaaz the son of Zadok.” The king said, “He is a good man and is coming with good news.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And Ahimaaz called out and said to the king, “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Peace
        - type: text
          text: ' (Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shalom)
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: All is well.” And he bowed before the king with his face to the ground and said, “Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, who has handed over the men who lifted up their hands [to fight] against my lord the king.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The king asked, “Is the young man Absalom safe?” Ahimaaz answered, “When Joab sent the king’s servant, and your servant, I saw a great turmoil, but I do not know what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it was about
    - type: text
      text: '.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But the men said, “You should not go out [to battle with us]. For if in fact we retreat, they will not care about us; even if half of us die, they will not care about us. But you are worth ten thousand of us. So now it is better that you be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ready
    - type: text
      text: ' to help us from the city [of Mahanaim].” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The king told him, “Step aside; stand here.” And he stepped aside and stood still.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Behold, the Cushite (Ethiopian) arrived, and said, “Let my lord the king receive good news, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has vindicated you today '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by rescuing you
    - type: text
      text: ' from the hand (power) of all those who stood against you.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The king asked the Cushite, “Is the young man Absalom [my son] safe?” The Cushite replied, “May the enemies of my lord the king, and all those who rise against you to do evil, be [dead] like that young man is.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Hebrew text, ch 19 begins with this verse.
      marker-yv: yv-n
    - type: text
      text: 'The king was deeply moved and went to the upper room over the gate and wept [in sorrow]. And this is what he said as he walked: “O my son Absalom, my son, my son Absalom! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Would that.
      marker-yv: yv-n
    - type: text
      text: How I wish that I had died instead of you, O Absalom, my son, my son!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the king said to them, “I will do whatever seems best to you.” So the king stood beside the gate [of Mahanaim], and all the army went out in groups of hundreds and of thousands. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The king commanded Joab and Abishai and Ittai, saying, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Deal
    - type: text
      text: ' gently with the young man Absalom for my sake.” And all the men heard when the king gave orders to all the commanders about Absalom.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the men went out into the field against Israel, and the battle was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fought
    - type: text
      text: ' in the forest of Ephraim. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The men of Israel [who supported Absalom] were defeated there by the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: servants
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'men of David, and a great slaughter took place there that day, 20,000 men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For the battle there was spread out over the surface of the entire countryside, and the [hazards of the] forest devoured more men that day than did the sword.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now Absalom met the servants of David. Absalom was riding on his mule, and the mule went under the thick branches of a massive tree, and his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Absalom’s remarkable head of hair is described in 14:26.
      marker-yv: yv-n
    - type: text
      text: 'head was caught in [the thick branches of] the tree; and he was left hanging [in midair] between heaven and earth, while the mule that had been under him kept going. '
