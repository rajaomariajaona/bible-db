document_id: 1CH.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Family Enlarged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Hiram king of Tyre sent messengers to David with cedar timbers, masons and carpenters, to build a house (palace) for him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David inquired of God, “Shall I go up against the Philistines? And will You hand them over to me?” Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to him, “Go up, and I will hand them over to you.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Israel came up to Baal-perazim, and David defeated the Philistines there. Then David said, “God has broken through my enemies by my hand, like the breakthrough of waters.” Therefore they named that place '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. master of breakthroughs.
      marker-yv: yv-n
    - type: text
      text: 'Baal-perazim. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Philistines abandoned their gods (idols) there; so David gave a command and they were burned in a fire [as the Law of Moses required]. [Deut 7:5]
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines again made a raid in the valley. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David inquired again of God, and God said to him, “Do not go up after them; circle around behind them and come at them in front of the balsam trees. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall be when you hear the sound of marching in the tops of the balsam trees, then you shall go out to battle, for God has gone out before you to strike the Philistine army.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David did just as God had commanded him, and they struck down the army of the Philistines from Gibeon as far as Gezer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then David’s fame spread into all the lands; and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' caused all nations to fear him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And David understood that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had established '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confirmed him as king over Israel, for his kingdom was highly exalted for the sake of His people Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David took more wives at Jerusalem, and he became the father of more sons and daughters. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these are the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 3:5 regarding variations in the spelling of the names of David’s sons.
      marker-yv: yv-n
    - type: text
      text: 'names of the children born [to him] in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elishama, Beeliada, and Eliphelet.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Philistines Defeated
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines heard that David had been anointed king over all Israel, they all went up in search of David; and he heard about it and went out against them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Philistines had come and made a raid in the Valley of Rephaim. '
