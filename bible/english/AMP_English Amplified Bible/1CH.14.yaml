document_id: 1CH.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David’s Family Enlarged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Hiram king of Tyre sent messengers to David with cedar timbers, masons and carpenters, to build a house (palace) for him. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And David understood that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had established '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' confirmed him as king over Israel, for his kingdom was highly exalted for the sake of His people Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then David took more wives at Jerusalem, and he became the father of more sons and daughters. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now these are the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 3:5 regarding variations in the spelling of the names of David’s sons.
    marker-yv: yv-n
  - type: text
    text: 'names of the children born [to him] in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ibhar, Elishua, Elpelet, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nogah, Nepheg, Japhia, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elishama, Beeliada, and Eliphelet.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Philistines Defeated
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When the Philistines heard that David had been anointed king over all Israel, they all went up in search of David; and he heard about it and went out against them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the Philistines had come and made a raid in the Valley of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So David inquired of God, “Shall I go up against the Philistines? And will You hand them over to me?” Then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to him, “Go up, and I will hand them over to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Israel came up to Baal-perazim, and David defeated the Philistines there. Then David said, “God has broken through my enemies by my hand, like the breakthrough of waters.” Therefore they named that place '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. master of breakthroughs.
    marker-yv: yv-n
  - type: text
    text: 'Baal-perazim. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Philistines abandoned their gods (idols) there; so David gave a command and they were burned in a fire [as the Law of Moses required]. [Deut 7:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The Philistines again made a raid in the valley. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So David inquired again of God, and God said to him, “Do not go up after them; circle around behind them and come at them in front of the balsam trees. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It shall be when you hear the sound of marching in the tops of the balsam trees, then you shall go out to battle, for God has gone out before you to strike the Philistine army.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So David did just as God had commanded him, and they struck down the army of the Philistines from Gibeon as far as Gezer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then David’s fame spread into all the lands; and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' caused all nations to fear him.'
