document_id: 1CH.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Family Enlarged
  - type: text
    content: 'Now Hiram king of Tyre sent messengers to David with cedar timbers, masons and carpenters, to build a house (palace) for him. '
  '10':
  - type: text
    content: So David inquired of God, “Shall I go up against the Philistines? And will You hand them over to me?” Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to him, “Go up, and I will hand them over to you.” '
  '11':
  - type: text
    content: 'So Israel came up to Baal-perazim, and David defeated the Philistines there. Then David said, “God has broken through my enemies by my hand, like the breakthrough of waters.” Therefore they named that place '
  - type: note
    content: I.e. master of breakthroughs.
  - type: text
    content: 'Baal-perazim. '
  '12':
  - type: text
    content: The Philistines abandoned their gods (idols) there; so David gave a command and they were burned in a fire [as the Law of Moses required]. [Deut 7:5]
  '13':
  - type: text
    content: 'The Philistines again made a raid in the valley. '
  '14':
  - type: text
    content: 'So David inquired again of God, and God said to him, “Do not go up after them; circle around behind them and come at them in front of the balsam trees. '
  '15':
  - type: text
    content: 'It shall be when you hear the sound of marching in the tops of the balsam trees, then you shall go out to battle, for God has gone out before you to strike the Philistine army.” '
  '16':
  - type: text
    content: 'So David did just as God had commanded him, and they struck down the army of the Philistines from Gibeon as far as Gezer. '
  '17':
  - type: text
    content: Then David’s fame spread into all the lands; and the L
  - type: heading
    content: ord
  - type: text
    content: ' caused all nations to fear him.'
  '2':
  - type: text
    content: And David understood that the L
  - type: heading
    content: ord
  - type: text
    content: ' had established '
  - type: text
    content: and
  - type: text
    content: ' confirmed him as king over Israel, for his kingdom was highly exalted for the sake of His people Israel.'
  '3':
  - type: text
    content: 'Then David took more wives at Jerusalem, and he became the father of more sons and daughters. '
  '4':
  - type: text
    content: 'Now these are the '
  - type: note
    content: See note 3:5 regarding variations in the spelling of the names of David’s sons.
  - type: text
    content: 'names of the children born [to him] in Jerusalem: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: text
    content: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: text
    content: Elishama, Beeliada, and Eliphelet.
  - type: heading
    content: Philistines Defeated
  '8':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over all Israel, they all went up in search of David; and he heard about it and went out against them. '
  '9':
  - type: text
    content: 'Now the Philistines had come and made a raid in the Valley of Rephaim. '
