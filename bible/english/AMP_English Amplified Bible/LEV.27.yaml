document_id: LEV.27,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rules concerning Valuations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Again, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He shall not replace it or exchange it, a good for a bad, or a bad for a good; but if he does exchange an animal for an animal, then both the original offering and its substitute shall be holy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If it is any unclean animal of the kind which men do not present as an offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', then he shall bring the animal before the priest, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'and the priest shall value it as either good or bad; it shall be as you, the priest, value it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But if he ever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wishes to
    - type: text
      text: ' redeem it, then he shall add one-fifth of it to your valuation.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ‘If a man consecrates his house as sacred to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the priest shall appraise it as either good or bad; as the priest appraises it, so shall it stand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'If the one who consecrates his house should '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wish to
    - type: text
      text: ' redeem it, then he shall add one-fifth of your valuation price to it, so that it may be his.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ‘And if a man consecrates to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' part of a field of his own property, then your valuation shall be proportionate to the seed needed for it; a homer of barley seed shall be valued at fifty shekels of silver. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If he consecrates his field during the Year of Jubilee, it shall stand according to your valuation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But if he consecrates his field after the Jubilee, then the priest shall calculate the price for him in proportion to the years that remain until the Year of Jubilee; and it shall be deducted from your valuation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'If the one who consecrates the field should ever wish to redeem it, then he shall add one-fifth of the appraisal price to it, so that it may return to him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the children of Israel and say to them, ‘When a man makes a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: explicit
        - type: text
          text: . A man could consecrate (dedicate) himself to the L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' or he could consecrate another family member, his house, his property, his animals, his field, or other possession. The priest set an established value on the person, animal, or property and the man paid the set amount instead of transferring ownership. Consecrating someone or something to the L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' was not the same as “devoting” or “setting apart” something to the L'
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' (see vv 21, 28).'
      marker-yv: yv-n
    - type: text
      text: 'special vow [consecrating himself or a member of his family], he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall be valued
    - type: text
      text: ' according to your [established system of] valuation of people belonging to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [that is, the priest accepts from the man making the vow a specified amount of money for the temple treasury in place of the actual person]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'If he does not redeem the field, but has sold it to another man, it may no longer be redeemed. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: When the field reverts in the Jubilee, the field shall be holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', like a field set apart (devoted); the priest shall possess it as his property. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Or if a man consecrates to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' a field which he has bought, which is not part of the field of his [ancestral] property, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: then the priest shall calculate for him the amount of your valuation up to the Year of Jubilee; and the man shall give that [amount] on that day as a holy thing to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'In the Year of Jubilee the field shall return to the one from whom it was purchased, to whom the land belonged [as his ancestral inheritance]. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Every valuation of yours shall be in accordance with the sanctuary shekel; twenty gerahs shall make a shekel.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ‘However, the firstborn among animals, which as a firstborn belongs to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', no man may consecrate, whether an ox or a sheep. It is [already] the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: If it is among the unclean animals, the owner may redeem it in accordance with your valuation, and add one-fifth to it; or if it is not redeemed, then it shall be sold in accordance with your valuation.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '‘But nothing that a man '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In OT times “devoting” or “setting apart” was a different and much more serious act than “consecrating” something or someone to God. The thing “devoted” belonged exclusively to God. It was an irrevocable command or vow. Anyone who kept for himself something that had been “devoted” or placed under a ban, placed himself under a sentence of death (Josh 7).
      marker-yv: yv-n
    - type: text
      text: sets apart [that is, devotes as an offering] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' out of all that he has, of man or of animal or of the fields of his own property, shall be sold or redeemed. Anything devoted to destruction (banned, cursed) is most holy to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: No one who may have been set apart among men shall be ransomed [from death], he shall most certainly be put to death.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If your valuation is of a male between twenty and sixty years of age, then your valuation shall be fifty shekels of silver, according to the shekel of the sanctuary. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ‘And all the tithe (tenth part) of the land, whether the seed of the land or the fruit of the tree, is the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ; it is holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [1 Cor 9:11; Gal 6:6] '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'If a man wishes to redeem any part of his tithe, he shall add one-fifth to it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'For every tithe of the herd or flock, whatever '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Each tenth animal was marked as it passed through a small door.
      marker-yv: yv-n
    - type: text
      text: passes under the [shepherd’s] staff, the tenth one shall be holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [2 Cor 9:7-9] '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The man is not to be concerned whether '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the animal is
    - type: text
      text: ' good or bad, nor shall he exchange it. But if he does exchange it, then both it and its substitute shall become holy; it shall not be redeemed.’ ”'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: These are the commandments which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' commanded Moses on Mount Sinai for the children of Israel. [Rom 10:4; Heb 4:2; 12:18-29]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Or if the person is a female, then your valuation shall be thirty shekels. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'If the person is between five years and twenty years of age, then your valuation for the male shall be twenty shekels and for the female ten shekels. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But if the child is between one month and five years of age, then your valuation shall be five shekels of silver for the male and three shekels for the female. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'If the person is sixty years old and above, your valuation shall be fifteen shekels for the male, and ten shekels for the female. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But if the person is too poor to pay your valuation, then he shall be placed before the priest, and the priest shall value him; according to the ability of the one who vowed, the priest shall value him.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ‘Now if it is an animal of the kind which men can present as an offering to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', any such that one gives to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' shall be holy. '
