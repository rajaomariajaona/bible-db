  - type: text
    content: ' would be your wisdom!'
  '6':
  - type: text
    content: “Please hear my argument
  - type: text
    content: And listen to the pleadings of my lips.
  '7':
  - type: text
    content: “Will you speak what is unjust for God,
  - type: text
    content: And speak what is deceitful for Him?
  '8':
  - type: text
    content: “Will you show partiality for Him [and be unjust to me so that you may gain favor with Him]?
  - type: text
