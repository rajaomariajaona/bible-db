document_id: JOB.13,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Says His Friends’ Proverbs Are Ashes
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[Job continued:] “Behold, my eye has seen all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My ear has heard and understood it.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will surely reprimand you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you secretly show partiality.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will not His majesty terrify you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will not the dread of Him fall upon you?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your memorable sayings are [worthless, merely] proverbs of ashes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your defenses are defenses of [crumbling] clay.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Job Is Sure He Will Be Vindicated
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Be silent before me so that I may speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let happen to me what may.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why should I take my flesh in my teeth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And put my life in my hands [incurring the wrath of God]?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even though He kills me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hope in Him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless, I will argue my ways to His face.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This also will be my salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a godless man may not come before Him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen diligently to my speech,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let my declaration fill your ears.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold now, I have prepared my case;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know that I will be vindicated.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Who will argue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contend with me?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For then I would be silent and die.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What you know I also know;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am not inferior to you.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Only [O Lord,] do not do two things to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And then I will not hide myself from Your face:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Withdraw Your hand from me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' remove this bodily suffering,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let not the dread of You terrify me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then [Lord,] call, and I will answer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or let me speak, and then reply to me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How many are my iniquities and sins [that so much sorrow should come to me]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make me recognize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' understand my transgression and my sin. [Rom 8:1]'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why do You hide Your face [as if offended]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And consider me Your enemy?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will You cause a windblown leaf to tremble?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will You pursue the chaff of the dry stubble?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For You write bitter things against me [in Your indictment]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And make me inherit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffer for the iniquities of my youth.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You also put my feet in the stocks [as punishment]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And [critically] observe all my paths;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You set a circle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' limit around the soles of my feet [which I must not overstep],'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While I waste away like a rotten thing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a garment that is moth-eaten.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“But I wish to speak to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the Almighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I desire to argue with God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you smear me with lies [you defame my character most untruthfully];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You are all worthless physicians '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have no remedy to offer.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that you would be completely silent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: silence
    - type: text
      text: ' would be your wisdom!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Please hear my argument
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And listen to the pleadings of my lips.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will you speak what is unjust for God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And speak what is deceitful for Him?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will you show partiality for Him [and be unjust to me so that you may gain favor with Him]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will you contend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' plead for God?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will it be well for you when He investigates you [and your tactics against me]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or will you deceive Him as one deceives a man?
