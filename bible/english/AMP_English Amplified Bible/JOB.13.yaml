  '22':
  - type: text
    content: “Then [Lord,] call, and I will answer;
  - type: text
    content: Or let me speak, and then reply to me.
  '23':
  - type: text
    content: “How many are my iniquities and sins [that so much sorrow should come to me]?
  - type: text
    content: 'Make me recognize '
  - type: text
    content: and
  - type: text
    content: ' understand my transgression and my sin. [Rom 8:1]'
  '24':
  - type: text
    content: “Why do You hide Your face [as if offended]
  - type: text
