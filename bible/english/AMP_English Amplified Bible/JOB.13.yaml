  '12':
  - type: text
    content: “Your memorable sayings are [worthless, merely] proverbs of ashes;
  - type: text
    content: Your defenses are defenses of [crumbling] clay.
  - type: heading
    content: Job Is Sure He Will Be Vindicated
  '13':
  - type: text
    content: ¶“Be silent before me so that I may speak;
  - type: text
    content: And let happen to me what may.
  '14':
  - type: text
    content: “Why should I take my flesh in my teeth
  - type: text
    content: And put my life in my hands [incurring the wrath of God]?
  '15':
  - type: text
    content: “Even though He kills me;
  - type: text
    content: I will hope in Him.
  - type: text
    content: Nevertheless, I will argue my ways to His face.
  '16':
  - type: text
    content: “This also will be my salvation,
  - type: text
    content: For a godless man may not come before Him.
  '17':
  - type: text
    content: “Listen diligently to my speech,
  - type: text
    content: And let my declaration fill your ears.
  '18':
  - type: text
    content: “Behold now, I have prepared my case;
  - type: text
    content: I know that I will be vindicated.
  '19':
  - type: text
    content: '“Who will argue '
  - type: text
    content: and
  - type: text
    content: ' contend with me?'
  - type: text
    content: For then I would be silent and die.
  '2':
  - type: text
    content: “What you know I also know;
  - type: text
    content: I am not inferior to you.
  '20':
  - type: text
    content: ¶“Only [O Lord,] do not do two things to me,
  - type: text
