    content: Job Says His Friends’ Proverbs Are Ashes
  - type: text
    content: '[Job continued:] “Behold, my eye has seen all '
  - type: text
    content: this,
  - type: text
    content: My ear has heard and understood it.
  '10':
  - type: text
    content: “He will surely reprimand you
  - type: text
