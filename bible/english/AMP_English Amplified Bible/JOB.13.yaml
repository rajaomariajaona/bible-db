  '25':
  - type: text
    content: “Will You cause a windblown leaf to tremble?
  - type: text
    content: Will You pursue the chaff of the dry stubble?
  '26':
  - type: text
    content: “For You write bitter things against me [in Your indictment]
  - type: text
    content: 'And make me inherit '
  - type: text
    content: and
  - type: text
    content: ' suffer for the iniquities of my youth.'
  '27':
  - type: text
    content: “You also put my feet in the stocks [as punishment]
  - type: text
