document_id: JDG.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samson’s Marriage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samson went down to Timnah and at Timnah he saw a woman, one of the daughters of the Philistines. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His father went down to the woman, and Samson prepared a feast there, for that was the customary thing for young men to do. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the people saw him, they brought thirty companions (wedding attendants) to be with him.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samson’s Riddle
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Samson said to them, “Let me now ask you a riddle; if you can tell me what it is within the seven days of the feast, and solve it, then I will give you thirty linen tunics (undergarments) and thirty changes of [outer] clothing. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But if you are unable to tell me [the answer], then you shall give me thirty linen tunics (undergarments) and thirty changes of [outer] clothing.” And they said to him, “Ask your riddle, so that we may hear it.” '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So he said to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Out of the eater came something to eat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And out of the strong came something sweet.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: And they could not solve the riddle in three days.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then on the fourth day they said to Samson’s wife, “Persuade your husband to tell us [through you] the [answer to the] riddle, or we will burn you and your father’s household with fire. Have you invited us to make us poor? Is this not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: true?
    - type: text
      text: '” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samson’s wife wept before him and said, “You only hate me, you do not love me; you have asked my countrymen a riddle, and have not told [the answer] to me.” And he said to her, “Listen, I have not told my father or my mother [either], so [why] should I tell you?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However Samson’s wife wept before him seven days while their [wedding] feast lasted, and on the seventh day he told her because she pressed him so hard. Then she told the [answer to the] riddle to her countrymen. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the men of the city said to Samson on the seventh day before sundown,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What is sweeter than honey?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What is stronger than a lion?”
  - type: usfm
    marker: m
    children:
    - type: text
      text: And he said to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“If you had not plowed with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Samson was accusing them of forcing the answer out of his wife.
      marker-yv: yv-n
    - type: text
      text: my heifer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You would not have solved my riddle.”
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came upon him mightily, and he went down to Ashkelon and killed thirty of them and took their gear, and gave changes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of clothes
    - type: text
      text: ' to those who had explained the riddle. And his anger burned, and he went up to his father’s house. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went back and told his father and his mother, “I saw a woman in Timnah, one of the daughters of the Philistines; now get her for me as a wife.” '
  '20':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Samson’s wife was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: given
    - type: text
      text: ' to his '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the chief attendant at the wedding feast.
      marker-yv: yv-n
    - type: text
      text: companion who had been his friend.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his father and mother said to him, “Is there no woman among the daughters of your relatives, or among all our people, that you must go to take a wife from the uncircumcised (pagan) Philistines?” And Samson said to his father, “Get her for me, because she '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: is right in my eyes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'looks pleasing to me.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His father and mother did not know that it was of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and that He was seeking an occasion [to take action] against the Philistines. Now at that time the Philistines were ruling over Israel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samson went down to Timnah with his father and mother [to arrange the marriage], and they came as far as the vineyards of Timnah; and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: behold
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'suddenly, a young lion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' roaring toward him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came upon him mightily, and he tore the lion apart as one tears apart a young goat, and he had nothing at all in his hand; but he did not tell his father or mother what he had done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went down and talked with the woman; and she looked pleasing to Samson. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he returned later to take her, he turned aside to see the carcass of the lion; and behold, a swarm of bees and honey were in the body of the lion. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he scraped the honey out into his hands and went on, eating as he went. When he came to his father and mother, he gave them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ', and they ate it; but he did not tell them he had taken the honey from the body of the lion.'
