type_code: eng
verses:
  '1':
  - type: heading
    content: Samson’s Marriage
  - type: text
    content: 'Samson went down to Timnah and at Timnah he saw a woman, one of the daughters of the Philistines. '
  '10':
  - type: text
    content: 'His father went down to the woman, and Samson prepared a feast there, for that was the customary thing for young men to do. '
  '11':
  - type: text
    content: When the people saw him, they brought thirty companions (wedding attendants) to be with him.
  - type: heading
    content: Samson’s Riddle
  '12':
  - type: text
    content: 'Then Samson said to them, “Let me now ask you a riddle; if you can tell me what it is within the seven days of the feast, and solve it, then I will give you thirty linen tunics (undergarments) and thirty changes of [outer] clothing. '
  '13':
  - type: text
    content: 'But if you are unable to tell me [the answer], then you shall give me thirty linen tunics (undergarments) and thirty changes of [outer] clothing.” And they said to him, “Ask your riddle, so that we may hear it.” '
  '14':
  - type: text
    content: So he said to them,
  - type: text
    content: “Out of the eater came something to eat,
  - type: text
    content: And out of the strong came something sweet.”
  - type: text
    content: And they could not solve the riddle in three days.
  '15':
  - type: text
    content: 'Then on the fourth day they said to Samson’s wife, “Persuade your husband to tell us [through you] the [answer to the] riddle, or we will burn you and your father’s household with fire. Have you invited us to make us poor? Is this not '
  - type: text
    content: true?
  - type: text
    content: '” '
  '16':
  - type: text
    content: 'So Samson’s wife wept before him and said, “You only hate me, you do not love me; you have asked my countrymen a riddle, and have not told [the answer] to me.” And he said to her, “Listen, I have not told my father or my mother [either], so [why] should I tell you?” '
  '17':
  - type: text
    content: 'However Samson’s wife wept before him seven days while their [wedding] feast lasted, and on the seventh day he told her because she pressed him so hard. Then she told the [answer to the] riddle to her countrymen. '
  '18':
  - type: text
    content: So the men of the city said to Samson on the seventh day before sundown,
  - type: text
    content: “What is sweeter than honey?
  - type: text
    content: What is stronger than a lion?”
  - type: text
    content: And he said to them,
  - type: text
    content: '“If you had not plowed with '
  - type: note
    content: Samson was accusing them of forcing the answer out of his wife.
  - type: text
    content: my heifer,
  - type: text
    content: You would not have solved my riddle.”
  '19':
  - type: text
    content: Then the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' came upon him mightily, and he went down to Ashkelon and killed thirty of them and took their gear, and gave changes '
  - type: text
    content: of clothes
  - type: text
    content: ' to those who had explained the riddle. And his anger burned, and he went up to his father’s house. '
  '2':
  - type: text
    content: 'So he went back and told his father and his mother, “I saw a woman in Timnah, one of the daughters of the Philistines; now get her for me as a wife.” '
  '20':
  - type: text
    content: 'But Samson’s wife was '
  - type: text
    content: given
  - type: text
    content: ' to his '
  - type: note
    content: I.e. the chief attendant at the wedding feast.
  - type: text
    content: companion who had been his friend.
  '3':
  - type: text
    content: 'But his father and mother said to him, “Is there no woman among the daughters of your relatives, or among all our people, that you must go to take a wife from the uncircumcised (pagan) Philistines?” And Samson said to his father, “Get her for me, because she '
  - type: note
    content: Lit is right in my eyes.
  - type: text
    content: 'looks pleasing to me.” '
  '4':
  - type: text
    content: His father and mother did not know that it was of the L
  - type: heading
    content: ord
  - type: text
    content: ', and that He was seeking an occasion [to take action] against the Philistines. Now at that time the Philistines were ruling over Israel.'
  '5':
  - type: text
    content: 'Then Samson went down to Timnah with his father and mother [to arrange the marriage], and they came as far as the vineyards of Timnah; and '
  - type: note
    content: Lit behold.
  - type: text
    content: 'suddenly, a young lion '
  - type: text
    content: came
  - type: text
    content: ' roaring toward him. '
  '6':
  - type: text
    content: The Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' came upon him mightily, and he tore the lion apart as one tears apart a young goat, and he had nothing at all in his hand; but he did not tell his father or mother what he had done. '
  '7':
  - type: text
    content: 'So he went down and talked with the woman; and she looked pleasing to Samson. '
  '8':
  - type: text
    content: 'When he returned later to take her, he turned aside to see the carcass of the lion; and behold, a swarm of bees and honey were in the body of the lion. '
  '9':
  - type: text
    content: 'So he scraped the honey out into his hands and went on, eating as he went. When he came to his father and mother, he gave them '
  - type: text
    content: some
  - type: text
    content: ', and they ate it; but he did not tell them he had taken the honey from the body of the lion.'
