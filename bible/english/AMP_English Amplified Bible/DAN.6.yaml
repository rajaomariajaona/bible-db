document_id: DAN.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel Serves Darius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It seemed good to Darius [who became king after Belshazzar] to appoint over the kingdom 120 '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 3:2.
      marker-yv: yv-n
    - type: text
      text: 'satraps who would be in charge throughout the kingdom, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Daniel knew that the document was signed, he went into his house (now in his roof chamber his windows were open toward Jerusalem); he continued to get down on his knees three times a day, praying and giving thanks before his God, as he had been doing previously. [Ps 5:7] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, by agreement, these men came [together] and found Daniel praying and making requests before his God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they approached and spoke before the king regarding his injunction, “Have you not signed an injunction that anyone who petitions (prays to) any god or man except you, O king, within the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: designated
    - type: text
      text: ' thirty days, is to be thrown into the den of lions?” The king answered, “The statement is true, in accordance with the law of the Medes and Persians, which may not be altered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' revoked.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they answered and said before the king, “Daniel, who is one of the exiles from Judah, does not pay any attention to you, O king, or to the injunction which you have signed, but keeps praying [to his God] three times a day.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, as soon as the king heard these words, he was deeply distressed [over what he had done] and set his mind on rescuing Daniel; and he struggled until the sun went down [trying to work out a way] to save him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, by agreement, these same men came to the king and said, “Know, O king, that it is a law of the Medes and Persians that no injunction or statute which the king establishes may be altered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' revoked.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel in the Den of Lions
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king gave a command, and Daniel was brought and thrown into the den of lions. The king said to Daniel, “May your God, whom you constantly serve, rescue you Himself!” [Ps 34:7, 19; 37:39, 40; 50:15] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A stone was brought and laid over the mouth of the den; and the king sealed it with his own signet ring and with the signet rings of his nobles, so that nothing would be changed concerning Daniel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king returned to his palace and spent the night fasting; and no music or entertainment was brought before him, and he remained unable to sleep.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king arose at dawn, at the break of day, and hurried to the den of lions. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and over them three chief commissioners (of whom Daniel was one), that these satraps might be accountable to them, so that the king would have no loss [from disloyalty or mismanagement]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had come near the den, he called out to Daniel with a troubled voice. The king said to Daniel, “O Daniel, servant of the living God, has your God, whom you constantly serve, been able to rescue you from the lions?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Daniel spoke to the king, “O king, live forever! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My God has sent His angel and has shut the mouths of the lions so that they have not hurt me, because I was found innocent before Him; and also before you, O king, I have committed no crime.” [2 Tim 4:17] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king was greatly pleased and ordered that Daniel be taken out of the den. So Daniel was taken out of the den, and no injury whatever was found on him, because he believed in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relied on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trusted in his God. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king then gave a command, and those men who had maliciously accused Daniel were brought and thrown into the den of lions, they, their children and their wives; and before they reached the bottom of the den, the lions overpowered them and crushed all their bones.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Darius the king wrote to all the peoples, nations, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: speakers of every
    - type: text
      text: ' language who were living in all the land: “May peace abound to you! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I issue a decree that in all the dominion of my kingdom men are to [reverently] fear and tremble before the God of Daniel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He is the living God, enduring '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' steadfast forever,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His kingdom is one which will not be destroyed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His dominion will be forever.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He rescues and saves and performs signs and wonders
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In heaven and on earth—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who has rescued Daniel from the power of the lions.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this [man] Daniel prospered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoyed success in the reign of Darius and in the reign of Cyrus the Persian.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then this Daniel, because of the extraordinary spirit within him, began distinguishing himself among the commissioners and the satraps, and the king planned to appoint him over the entire realm. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the [other two] commissioners and the satraps began trying to find a reason to bring a complaint against Daniel concerning the [administration of the] kingdom; but they could find no reason for an accusation or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: evidence of
    - type: text
      text: ' corruption, because he was faithful [a man of high moral character and personal integrity], and no negligence or corruption [of any kind] was found in him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then these men said, “We will not find any basis for an accusation against this Daniel unless we find something against him in connection with the law of his God.” [Acts 24:13-21; 1 Pet 4:12-16]
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then these commissioners and satraps agreed to approach the king and said to him, “King Darius, live forever! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the commissioners of the kingdom, the prefects and the satraps, the counselors and the governors have consulted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' agreed together that the king should establish a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: royal
    - type: text
      text: ' statute and enforce an injunction that anyone who petitions (prays to) any god or man besides you, O king, during the next thirty days, shall be thrown into the den of lions. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, O king, establish the injunction and sign the document so that it may not be changed, in accordance with the law of the Medes and Persians, which [insures that it] may not be altered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' revoked.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So King Darius signed the document, that is, the injunction.
