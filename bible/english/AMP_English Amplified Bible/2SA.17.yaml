        marker: it
        children:
        - type: text
          text: slack of hands
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'exhausted, and terrify him; and all the people with him will flee [in terror]. Then I will attack the king alone, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and I will bring all the people [who follow David] back to you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Like the return of the whole is the man whom you are seeking
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'The return of everyone depends on the [death of the] man you are seeking; then all the people will be at peace [and accept you as king].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So the plan '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: was pleasing in the eyes of
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: pleased Absalom and all the elders of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nevertheless, Absalom said, “Now call Hushai the Archite also, and let us hear what he has to say.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Hushai came to Absalom, Absalom said to him, “Ahithophel has advised this [plan of action]. Should we do what he says? If not, you speak [and explain why not].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Hushai said to Absalom, “Ahithophel has not given good advice this time.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And Hushai said, “You know your father and his men, that they are brave men, and they are '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bitter of soul
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'enraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fierce, like a bear deprived of her cubs in the field. Your father is a [shrewd] man of war, and will not spend the night with the people [knowing that you seek his life]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Behold, he has hidden himself [even] now in one of the ravines or in another place; and when some of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: them
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'your troops fall at the first attack, whoever hears '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about it
  - type: text
    text: ' will say, ‘There has been a defeat among the people who follow Absalom.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And even the one who is brave, whose heart is like the heart of a lion, will completely lose heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' melt away; for all Israel knows that your father is a mighty man, and that those who are with him are brave men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But I advise that all [the men of] Israel be summoned to you, from Dan [in the north] to Beersheba [in the south], like the sand that is by the sea in abundance, and that you personally go into battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So shall we come upon David in one of the places where he can be found, and we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will fall
  - type: text
    text: ' on him as the dew falls [unseen and unheard] on the ground; and of him and of all the men who are with him, not even one will be left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'If he retreats into a city, then all Israel shall bring ropes to that city, and we will drag it into the ravine until not even a pebble [of it] is found there.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Absalom and all the men of Israel said, “The advice of Hushai the Archite is better than that of Ahithophel.” For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had ordained to thwart the good advice of Ahithophel, so that the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' could bring disaster upon Absalom.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hushai’s Warning Saves David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Hushai said to Zadok and Abiathar the priests, “This is the advice that Ahithophel gave to Absalom and the elders of Israel, and this is the advice that I have given. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now then, send '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' quickly and tell David, ‘Do not spend the night at the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. narrow or shallow places where a river may be crossed by wading.
    marker-yv: yv-n
  - type: text
    text: 'fords [on the west side of the Jordan] in the wilderness, but by all means cross over [to the east side of the river], or else the king and all the people with him will be destroyed [if Ahithophel is allowed by Absalom to lead an attack].’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now Jonathan and Ahimaaz [the priests’ sons] were staying at '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. a spring in the Kidron Valley just outside Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'En-rogel, and a maidservant [appearing to go for water] would go and tell them [what was happening], and they would go [secretly] and inform King David; for they could not [allow themselves to] be seen coming into the city [of Jerusalem]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But a boy saw them and told Absalom; so the two of them left quickly and came to the house of a man in Bahurim, who had a well in his courtyard, and [with his permission] they went down into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And the woman [of the house] took a covering and spread it over the mouth of the well and scattered grain on it; so nothing was discovered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then Absalom’s servants came to the woman at the house and asked, “Where are Ahimaaz and Jonathan?” And the woman said to them, “They have crossed over the brook.” When they searched and could not find them, they returned to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After they left, Jonathan and Ahimaaz came up out of the well and went and informed King David, and said to David, “Arise and cross over the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: water
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jordan River quickly, for Ahithophel has advised [an attack] against you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then David and all the people who were with him departed and crossed over the Jordan. By daybreak, not even one was left who had not crossed the Jordan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Now when Ahithophel saw that his advice had not been followed, he saddled his donkey and set out and went to his home, to his city. Then he put his household in order, and hanged himself. So he died and was buried in the tomb of his father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then David came to Mahanaim. And Absalom crossed over the Jordan, he and all the men of Israel with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Absalom put Amasa in command of the army instead of Joab. Now Amasa was the son of a man named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This man was also known as Jether the Ishmaelite (1 Chr 2:17).
    marker-yv: yv-n
  - type: text
    text: 'Ithra the Israelite, who had married Abigail the daughter of Nahash, [the half-sister of David and] the sister of Zeruiah, Joab’s mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So Israel and Absalom camped in the land of Gilead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When David came to Mahanaim, Shobi the son of Nahash from Rabbah of the Ammonites, and Machir the son of Ammiel from Lo-debar, and Barzillai the Gileadite from Rogelim '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'brought beds, basins, pottery, wheat, barley, flour, roasted grain, broad beans, lentils, and [other] roasted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grain,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: honey, cream, sheep, and cheese of the herd, for David and the people who were with him, to eat; for they said, “The people are hungry and weary and thirsty in the wilderness.”
