        children:
        - type: text
          text: come upon him
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'strike while he is weary and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
      marker: ft
