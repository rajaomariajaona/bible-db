      text: '1'
  - type: text
    text: 'Then, Ahithophel said to Absalom, “Please let me choose 12,000 men, and I will set out and pursue David tonight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
