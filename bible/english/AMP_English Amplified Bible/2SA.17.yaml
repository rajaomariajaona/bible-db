document_id: 2SA.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Hushai’s Counsel
  - type: text
    content: 'Then, Ahithophel said to Absalom, “Please let me choose 12,000 men, and I will set out and pursue David tonight. '
  '10':
  - type: text
    content: 'And even the one who is brave, whose heart is like the heart of a lion, will completely lose heart '
  - type: text
    content: and
  - type: text
    content: ' melt away; for all Israel knows that your father is a mighty man, and that those who are with him are brave men. '
  '11':
  - type: text
    content: 'But I advise that all [the men of] Israel be summoned to you, from Dan [in the north] to Beersheba [in the south], like the sand that is by the sea in abundance, and that you personally go into battle. '
  '12':
  - type: text
    content: 'So shall we come upon David in one of the places where he can be found, and we '
  - type: text
    content: will fall
  - type: text
    content: ' on him as the dew falls [unseen and unheard] on the ground; and of him and of all the men who are with him, not even one will be left. '
  '13':
  - type: text
    content: 'If he retreats into a city, then all Israel shall bring ropes to that city, and we will drag it into the ravine until not even a pebble [of it] is found there.” '
  '14':
  - type: text
    content: Then Absalom and all the men of Israel said, “The advice of Hushai the Archite is better than that of Ahithophel.” For the L
  - type: heading
    content: ord
  - type: text
    content: ' had ordained to thwart the good advice of Ahithophel, so that the L'
  - type: heading
    content: ord
  - type: text
    content: ' could bring disaster upon Absalom.'
  - type: heading
    content: Hushai’s Warning Saves David
  '15':
  - type: text
    content: 'Then Hushai said to Zadok and Abiathar the priests, “This is the advice that Ahithophel gave to Absalom and the elders of Israel, and this is the advice that I have given. '
  '16':
  - type: text
    content: 'Now then, send '
  - type: text
    content: word
  - type: text
    content: ' quickly and tell David, ‘Do not spend the night at the '
  - type: note
    content: I.e. narrow or shallow places where a river may be crossed by wading.
  - type: text
    content: 'fords [on the west side of the Jordan] in the wilderness, but by all means cross over [to the east side of the river], or else the king and all the people with him will be destroyed [if Ahithophel is allowed by Absalom to lead an attack].’ ” '
  '17':
  - type: text
    content: 'Now Jonathan and Ahimaaz [the priests’ sons] were staying at '
  - type: note
    content: I.e. a spring in the Kidron Valley just outside Jerusalem.
  - type: text
    content: 'En-rogel, and a maidservant [appearing to go for water] would go and tell them [what was happening], and they would go [secretly] and inform King David; for they could not [allow themselves to] be seen coming into the city [of Jerusalem]. '
  '18':
  - type: text
    content: 'But a boy saw them and told Absalom; so the two of them left quickly and came to the house of a man in Bahurim, who had a well in his courtyard, and [with his permission] they went down into it. '
  '19':
  - type: text
    content: 'And the woman [of the house] took a covering and spread it over the mouth of the well and scattered grain on it; so nothing was discovered. '
  '2':
  - type: text
    content: 'I will '
  - type: note
    content: Lit come upon him.
  - type: text
    content: 'strike while he is weary and '
  - type: note
    content: Lit slack of hands.
  - type: text
    content: 'exhausted, and terrify him; and all the people with him will flee [in terror]. Then I will attack the king alone, '
  '20':
  - type: text
    content: Then Absalom’s servants came to the woman at the house and asked, “Where are Ahimaaz and Jonathan?” And the woman said to them, “They have crossed over the brook.” When they searched and could not find them, they returned to Jerusalem.
  '21':
  - type: text
    content: 'After they left, Jonathan and Ahimaaz came up out of the well and went and informed King David, and said to David, “Arise and cross over the '
  - type: note
    content: Lit water.
  - type: text
    content: 'Jordan River quickly, for Ahithophel has advised [an attack] against you.” '
  '22':
  - type: text
    content: Then David and all the people who were with him departed and crossed over the Jordan. By daybreak, not even one was left who had not crossed the Jordan.
  '23':
  - type: text
    content: Now when Ahithophel saw that his advice had not been followed, he saddled his donkey and set out and went to his home, to his city. Then he put his household in order, and hanged himself. So he died and was buried in the tomb of his father.
  '24':
  - type: text
    content: 'Then David came to Mahanaim. And Absalom crossed over the Jordan, he and all the men of Israel with him. '
  '25':
  - type: text
    content: 'Absalom put Amasa in command of the army instead of Joab. Now Amasa was the son of a man named '
  - type: note
    content: This man was also known as Jether the Ishmaelite (1 Chr 2:17).
  - type: text
    content: 'Ithra the Israelite, who had married Abigail the daughter of Nahash, [the half-sister of David and] the sister of Zeruiah, Joab’s mother. '
  '26':
  - type: text
    content: So Israel and Absalom camped in the land of Gilead.
  '27':
  - type: text
    content: 'When David came to Mahanaim, Shobi the son of Nahash from Rabbah of the Ammonites, and Machir the son of Ammiel from Lo-debar, and Barzillai the Gileadite from Rogelim '
  '28':
  - type: text
    content: 'brought beds, basins, pottery, wheat, barley, flour, roasted grain, broad beans, lentils, and [other] roasted '
  - type: text
    content: grain,
  - type: text
    content: ' '
  '29':
  - type: text
    content: honey, cream, sheep, and cheese of the herd, for David and the people who were with him, to eat; for they said, “The people are hungry and weary and thirsty in the wilderness.”
  '3':
  - type: text
    content: 'and I will bring all the people [who follow David] back to you. '
  - type: note
    content: Lit Like the return of the whole is the man whom you are seeking.
  - type: text
    content: 'The return of everyone depends on the [death of the] man you are seeking; then all the people will be at peace [and accept you as king].” '
  '4':
  - type: text
    content: 'So the plan '
  - type: note
    content: Lit was pleasing in the eyes of.
  - type: text
    content: pleased Absalom and all the elders of Israel.
  '5':
  - type: text
    content: 'Nevertheless, Absalom said, “Now call Hushai the Archite also, and let us hear what he has to say.” '
  '6':
  - type: text
    content: 'When Hushai came to Absalom, Absalom said to him, “Ahithophel has advised this [plan of action]. Should we do what he says? If not, you speak [and explain why not].” '
  '7':
  - type: text
    content: 'So Hushai said to Absalom, “Ahithophel has not given good advice this time.” '
  '8':
  - type: text
    content: 'And Hushai said, “You know your father and his men, that they are brave men, and they are '
  - type: note
    content: Lit bitter of soul.
  - type: text
    content: 'enraged '
  - type: text
    content: and
  - type: text
    content: ' fierce, like a bear deprived of her cubs in the field. Your father is a [shrewd] man of war, and will not spend the night with the people [knowing that you seek his life]. '
  '9':
  - type: text
    content: 'Behold, he has hidden himself [even] now in one of the ravines or in another place; and when some of '
  - type: note
    content: Lit them.
  - type: text
    content: 'your troops fall at the first attack, whoever hears '
  - type: text
    content: about it
  - type: text
    content: ' will say, ‘There has been a defeat among the people who follow Absalom.’ '
