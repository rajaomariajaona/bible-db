document_id: PSA.36,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 36
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Wickedness of Men and Lovingkindness of God.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Psalm
    - type: text
      text: ' of David the servant of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Transgression speaks [like an oracle] to the wicked (godless) [deep] within his heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no fear (dread) of God before his eyes. [Rom 3:18]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶O continue Your lovingkindness to those who know You,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Your righteousness (salvation) to the upright in heart.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let the foot of the proud [person] overtake me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do not let the hand of the wicked drive me away.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There those who [are perverse and] do evil have fallen;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have been thrust down and cannot rise.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he flatters '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceives himself in his own eyes'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thinking
    - type: text
      text: ' that his sinfulness will not be discovered and hated [by God].'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of his mouth are wicked and deceitful;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has ceased to be wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to do good.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He plans wrongdoing on his bed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets himself on a path that is not good;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He does not reject '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' despise evil.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶Your lovingkindness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' graciousness, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', extend to the skies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your faithfulness [reaches] to the clouds.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness is like the mountains of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your judgments are like the great deep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', You preserve man and beast.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How precious is Your lovingkindness, O God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The children of men take refuge in the shadow of Your wings.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They drink their fill of the abundance of Your house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And You allow them to drink from the river of Your delights.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For with You is the fountain of life [the fountain of life-giving water];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In Your light we see light. [John 4:10, 14]
