verses:
  '1':
  - type: heading
    content: Psalm 36
  - type: heading
    content: Wickedness of Men and Lovingkindness of God.
  - type: text
    content: 'To the Chief Musician. '
  - type: text
    content: A Psalm
  - type: text
    content: ' of David the servant of the L'
  - type: heading
    content: ord
  - type: text
    content: .
  - type: text
    content: Transgression speaks [like an oracle] to the wicked (godless) [deep] within his heart;
  - type: text
    content: There is no fear (dread) of God before his eyes. [Rom 3:18]
  '10':
  - type: text
    content: ¶O continue Your lovingkindness to those who know You,
  - type: text
    content: And Your righteousness (salvation) to the upright in heart.
  '11':
  - type: text
    content: Do not let the foot of the proud [person] overtake me,
  - type: text
    content: And do not let the hand of the wicked drive me away.
  '12':
  - type: text
    content: There those who [are perverse and] do evil have fallen;
  - type: text
    content: They have been thrust down and cannot rise.
  '2':
  - type: text
    content: 'For he flatters '
  - type: text
    content: and
  - type: text
    content: ' deceives himself in his own eyes'
  - type: text
    content: Thinking
  - type: text
    content: ' that his sinfulness will not be discovered and hated [by God].'
  '3':
  - type: text
    content: The words of his mouth are wicked and deceitful;
  - type: text
    content: 'He has ceased to be wise '
  - type: text
    content: and
  - type: text
    content: ' to do good.'
  '4':
  - type: text
    content: He plans wrongdoing on his bed;
  - type: text
    content: He sets himself on a path that is not good;
  - type: text
    content: 'He does not reject '
  - type: text
    content: or
  - type: text
    content: ' despise evil.'
  '5':
  - type: text
    content: '¶Your lovingkindness '
  - type: text
    content: and
  - type: text
    content: ' graciousness, O L'
  - type: heading
    content: ord
  - type: text
    content: ', extend to the skies,'
  - type: text
    content: Your faithfulness [reaches] to the clouds.
  '6':
  - type: text
    content: Your righteousness is like the mountains of God,
  - type: text
    content: Your judgments are like the great deep.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', You preserve man and beast.'
  '7':
  - type: text
    content: How precious is Your lovingkindness, O God!
  - type: text
    content: The children of men take refuge in the shadow of Your wings.
  '8':
  - type: text
    content: They drink their fill of the abundance of Your house;
  - type: text
    content: And You allow them to drink from the river of Your delights.
  '9':
  - type: text
    content: For with You is the fountain of life [the fountain of life-giving water];
  - type: text
    content: In Your light we see light. [John 4:10, 14]
