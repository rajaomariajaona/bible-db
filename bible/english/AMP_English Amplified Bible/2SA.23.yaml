    content: “The Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke by me,'
  - type: text
    content: And His word was on my tongue.
  '20':
  - type: text
    content: 'Then Benaiah the son of Jehoiada, the son of a valiant man of Kabzeel, who had done many notable acts, killed two [famous] warriors of Moab. He also went down and killed a lion in the middle of a pit on a snowy day. '
  '21':
  - type: text
    content: 'And he killed an Egyptian, an impressive '
  - type: text
    content: and
  - type: text
    content: ' handsome man. The Egyptian had a spear in his hand, but Benaiah went down to him with a club, snatched the spear out of the Egyptian’s hand and killed the man with his own spear. '
  '22':
  - type: text
    content: 'These things Benaiah the son of Jehoiada did, and gained a reputation beside the three mighty men. '
  '23':
  - type: text
    content: He was honored among the thirty, but he did not attain to the [greatness of the] three. David appointed him over his guard.
  '24':
  - type: text
    content: 'Asahel the brother of Joab was one of the thirty; '
  - type: text
