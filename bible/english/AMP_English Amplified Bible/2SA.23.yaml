  '8':
  - type: text
    content: 'These are the names of the mighty men (warriors) whom David had: Josheb-basshebeth, a Tahchemonite, chief of the '
  - type: note
    content: The exploits of these three warriors are outlined in vv 8-11.
  - type: text
    content: 'captains, '
  - type: text
    content: also called
  - type: text
    content: ' Adino the Eznite (spear) because of the '
  - type: note
    content: 1 Chr 11:11 lists the number as three hundred, and the number here is thought by some to be a textual error or exaggeration. But there is nothing in the text to suggest a scribal error, and if 800 slain by one man seems incredible, 300—though a much smaller number—still strains credibility. Perhaps divine intervention is the explanation (cf v 12), or Josheb was actually commanding other men but was credited with the victory as if he were alone, a common way to describe military victories.
  - type: text
    content: 'eight hundred men killed [by him] at one time. [1 Chr 11:11] '
  '9':
