document_id: 2SA.23,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Last Song
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now these are the last words of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: David the son of Jesse declares,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The man who was raised on high declares,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The anointed of the God of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the sweet psalmist of Israel,
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eleazar stood up and struck down the Philistines until his hand was weary and clung to the sword. The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' brought about a great victory that day; the people returned after him only to take the spoil [of the slain].'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Next to Eleazar was Shammah the son of Agee the Hararite. The Philistines were gathered into an army where there was a plot of ground full of lentils, and the people [of Israel] fled from the Philistines. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But he took his stand in the center of the plot and defended it and struck down the Philistines; and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' brought about a great victory.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then three of the thirty chief men went down and came to David at harvest time in the cave of Adullam, while an army of Philistines was encamped in the Valley of Rephaim. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'David was then in the stronghold, and the garrison of the Philistines was then in Bethlehem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And David had a craving and said, “Oh that someone would give me water to drink from the well of Bethlehem, which is by the gate!” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So the three mighty men broke through the camp of the Philistines, and drew water from the well of Bethlehem by the gate, and carried and brought it to David. But he would not drink it, but poured it out [in worship] to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: And he said, “Far be it from me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', that I should drink this. [Is it not the same as] the blood of the men who went at the risk of their lives?” So he would not drink it. These things the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. Josheb-basshebeth, Eleazar, and Shammah.
      marker-yv: yv-n
    - type: text
      text: three mighty men did.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Now Abishai the brother of Joab the son of Zeruiah was chief of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So two Hebrew mss and Syriac; MT '
        - type: usfm
          marker: it
          children:
          - type: text
            text: three
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'thirty. He wielded his spear against three hundred men and killed them, and gained a reputation beside the three. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He was the most honored of the thirty, so he became their commander; however, he did not attain to the [greatness of the] three.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “The Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke by me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His word was on my tongue.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Benaiah the son of Jehoiada, the son of a valiant man of Kabzeel, who had done many notable acts, killed two [famous] warriors of Moab. He also went down and killed a lion in the middle of a pit on a snowy day. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And he killed an Egyptian, an impressive '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' handsome man. The Egyptian had a spear in his hand, but Benaiah went down to him with a club, snatched the spear out of the Egyptian’s hand and killed the man with his own spear. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'These things Benaiah the son of Jehoiada did, and gained a reputation beside the three mighty men. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He was honored among the thirty, but he did not attain to the [greatness of the] three. David appointed him over his guard.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Asahel the brother of Joab was one of the thirty; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' Elhanan the son of Dodo of Bethlehem, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Shammah of Harod, Elika of Harod, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Helez the Paltite, Ira the son of Ikkesh of Tekoa, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Abiezer of Anathoth, Mebunnai the Hushathite, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Zalmon the Ahohite, Maharai of Netophah, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Heleb the son of Baanah of Netophah, Ittai the son of Ribai of Gibeah of the Benjamites, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “The God of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Rock of Israel spoke to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘He who rules over men righteously,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who rules in the fear of God,
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Benaiah of Pirathon, Hiddai of the brooks of Gaash, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Abi-albon the Arbathite, Azmaveth the Barhumite, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Eliahba of Shaalbon, the sons of Jashen, Jonathan, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Shammah the Hararite, Ahiam the son of Sharar the Ararite, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Eliphelet the son of Ahasbai the son of Maacah, Eliam the son of Ahithophel of Giloh, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Hezro (Hezrai) of Carmel, Paarai the Arbite, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Igal the son of Nathan of Zobah, Bani the Gadite, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Zelek the Ammonite, Naharai of Beeroth, armor bearer of Joab the son of Zeruiah, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ira the Ithrite, Gareb the Ithrite, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Uriah the Hittite—thirty-seven in all.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Is like the morning light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when
    - type: text
      text: ' the sun rises,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A morning without clouds,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' the fresh grass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: springs
    - type: text
      text: ' out of the earth'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through sunshine after rain.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Truly is not my house so [blessed] with God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has made an everlasting covenant with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ordered in all things, and secured.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For will He not cause to grow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my salvation and my every wish?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will He not make it grow '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prosper?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“But the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthless are all to be thrown away like thorns,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they cannot be taken with the hand;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But the man who touches them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must be armed with iron and the shaft of a spear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they are utterly burned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consumed by fire in their place.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: His Mighty Men
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'These are the names of the mighty men (warriors) whom David had: Josheb-basshebeth, a Tahchemonite, chief of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The exploits of these three warriors are outlined in vv 8-11.
      marker-yv: yv-n
    - type: text
      text: 'captains, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also called
    - type: text
      text: ' Adino the Eznite (spear) because of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1 Chr 11:11 lists the number as '
        - type: usfm
          marker: it
          children:
          - type: text
            text: three hundred
        - type: text
          text: ', and the number here is thought by some to be a textual error or exaggeration. But there is nothing in the text to suggest a scribal error, and if 800 slain by one man seems incredible, 300—though a much smaller number—still strains credibility. Perhaps divine intervention is the explanation (cf v 12), or Josheb was actually commanding other men but was credited with the victory as if he were alone, a common way to describe military victories.'
      marker-yv: yv-n
    - type: text
      text: 'eight hundred men killed [by him] at one time. [1 Chr 11:11] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Next to him was Eleazar the son of Dodo the son of Ahohi. He was one of the three mighty men with David when they taunted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defied the Philistines assembled there for battle, and the men of Israel had gone. '
