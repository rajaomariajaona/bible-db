    content: David’s Last Song
  - type: text
    content: Now these are the last words of David.
  - type: text
    content: David the son of Jesse declares,
  - type: text
    content: The man who was raised on high declares,
  - type: text
    content: The anointed of the God of Jacob,
  - type: text
    content: And the sweet psalmist of Israel,
  '10':
  - type: text
    content: Eleazar stood up and struck down the Philistines until his hand was weary and clung to the sword. The L
  - type: heading
    content: ord
  - type: text
    content: ' brought about a great victory that day; the people returned after him only to take the spoil [of the slain].'
  '11':
  - type: text
    content: 'Next to Eleazar was Shammah the son of Agee the Hararite. The Philistines were gathered into an army where there was a plot of ground full of lentils, and the people [of Israel] fled from the Philistines. '
  '12':
  - type: text
    content: But he took his stand in the center of the plot and defended it and struck down the Philistines; and the L
  - type: heading
    content: ord
  - type: text
    content: ' brought about a great victory.'
  '13':
  - type: text
    content: 'Then three of the thirty chief men went down and came to David at harvest time in the cave of Adullam, while an army of Philistines was encamped in the Valley of Rephaim. '
  '14':
  - type: text
    content: 'David was then in the stronghold, and the garrison of the Philistines was then in Bethlehem. '
  '15':
  - type: text
    content: 'And David had a craving and said, “Oh that someone would give me water to drink from the well of Bethlehem, which is by the gate!” '
  '16':
  - type: text
    content: So the three mighty men broke through the camp of the Philistines, and drew water from the well of Bethlehem by the gate, and carried and brought it to David. But he would not drink it, but poured it out [in worship] to the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '17':
  - type: text
    content: And he said, “Far be it from me, O L
  - type: heading
    content: ord
  - type: text
    content: ', that I should drink this. [Is it not the same as] the blood of the men who went at the risk of their lives?” So he would not drink it. These things the '
  - type: note
    content: I.e. Josheb-basshebeth, Eleazar, and Shammah.
  - type: text
    content: three mighty men did.
  '18':
  - type: text
    content: 'Now Abishai the brother of Joab the son of Zeruiah was chief of the '
  - type: note
    content: So two Hebrew mss and Syriac; MT three.
  - type: text
    content: 'thirty. He wielded his spear against three hundred men and killed them, and gained a reputation beside the three. '
  '19':
  - type: text
    content: He was the most honored of the thirty, so he became their commander; however, he did not attain to the [greatness of the] three.
  '2':
