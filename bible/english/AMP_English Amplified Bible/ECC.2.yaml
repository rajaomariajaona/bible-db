document_id: ECC.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Futility of Pleasure and Possessions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I said to myself, “Come now, I will test you with pleasure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gratification; so enjoy yourself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have a good time.” But behold, this too was vanity (futility, meaninglessness). [Luke 12:19, 20] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I said of laughter, “It is madness,” and of pleasure, “What does it accomplish?” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I explored with my mind how to gratify myself with wine while [at the same time] having my mind remain steady '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guide me wisely; and how to take control of foolishness, until I could see what was good for the sons of men to do under heaven all the days of their lives. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I made great works: I built houses for myself; I planted vineyards for myself; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I made gardens and orchards for myself and I planted in them all kinds of fruit trees; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I made pools of water for myself from which to water the forest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make the trees bud. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I bought male and female slaves and had slaves born in my house. I also possessed herds and flocks larger than any who preceded me in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also, I collected for myself silver and gold and the treasure of kings and provinces. I provided for myself male singers and female singers, and the delights '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasures of men—'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Solomon’s reign began under most promising conditions, but soon his own “wisdom” alone was guiding him. He openly affronted God by taking many wives, including pagan women. They seduced him into tolerating and later practicing idolatry (1 Kin 11:1ff).
    marker-yv: yv-n
  - type: text
    text: 'many '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: concubines. [1 Kin 9:28; 10:10, 14, 21]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So I became great and excelled more than all who preceded me in Jerusalem. My wisdom also remained with me. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Whatever my eyes looked at with desire I did not refuse them. I did not withhold from my heart any pleasure, for my heart was pleased because of all my labor; and this was my reward for all my labor. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then I considered all which my hands had done and labored to do, and behold, all was vanity and chasing after the wind and there was no profit (nothing of lasting value) under the sun. [Matt 16:26]
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Wisdom Excels Folly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So I turned to consider [secular] wisdom, madness, and folly; for what will the man do who succeeds the king? Nothing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: except
  - type: text
    text: ' what has already been done. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I saw that [even secular] wisdom [that brings sorrow] is better than [the pleasures of] folly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' self-indulgence as light excels darkness. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The wise man’s eyes are in his head, but the fool walks in darkness; and yet I know that [in the end] one fate happens to them both. [Prov 17:24] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then I said to myself, “As it happens to the fool, so death will also happen to me. What use is it then for me to be extremely wise?” Then I said in my heart, “This too is vanity (meaningless).” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For there is no [more] lasting remembrance of the wise man than of the fool, since in the days to come all will be long forgotten. And how does the wise man die? Even as the fool! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So I hated life, for the work which had been done under the sun caused me only great sorrow; because all is futility and chasing after the wind.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Futility of Labor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So I hated all the fruit (gain) of my labor for which I had labored under the sun, because I must leave it to the man who will succeed me. [Ps 49:10] '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And who knows whether he will be a wise man or a fool? Yet he will have control over all the fruit of my labor for which I have labored by acting wisely under the sun. This too is vanity (futility, self-conceit). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So I turned aside and let my heart despair over all the fruit of my labor for which I had labored under the sun. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For there is a man who has labored with wisdom and knowledge and skill, yet gives his legacy to one who has not labored for it. This too is vanity and a great evil. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For what does a man get from all his labor and from the striving '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' sorrow of his heart with which he labors under the sun? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For all his days his work is painful and sorrowful; even at night his mind does not rest. This too is vanity (worthless).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'There is nothing better for a man than to eat and drink and assure himself that there is good in his labor. Even this, I have seen, is from the hand of God. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For who can eat and who can have enjoyment without Him? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For to the person who pleases Him God gives wisdom, knowledge, and joy; but to the sinner He gives the work of gathering and collecting so that he may give to one who pleases God. This too is vanity and chasing after the wind.
