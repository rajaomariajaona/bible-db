document_id: EXO.30,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar of Incense
  - type: text
    content: '“You shall make an altar upon which to burn incense; you shall make it of acacia wood. '
  '10':
  - type: text
    content: Once a year Aaron shall make atonement [for sin] on its horns. He shall make atonement on it with the blood of the sin offering of atonement once a year throughout your generations. It is most holy to the L
  - type: heading
    content: ord
  - type: text
    content: .”
  - type: heading
    content: The Ransom Money
  '11':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: “When you take the census of the Israelites, each one shall give a ransom for himself to the L
  - type: heading
    content: ord
  - type: text
    content: ' when you count them, so that no plague will come on them when you number them. [Rom 8:1-4] '
  '13':
  - type: text
    content: 'This is what everyone who is counted shall give [as he joins those already counted]: a half shekel, according to the sanctuary shekel (the shekel is twenty gerahs); a half shekel as a contribution to the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '14':
  - type: text
    content: Everyone who is counted, from twenty years old and over, [as he joins those already counted], shall give this contribution to the L
  - type: heading
    content: ord
  - type: text
    content: '. [Matt 10:24; 1 Pet 1:18, 19] '
  '15':
  - type: text
    content: The rich shall not give more and the poor shall not give less than half a shekel, when you give this contribution to the L
  - type: heading
    content: ord
  - type: text
    content: ' to make atonement for yourselves. '
  '16':
  - type: text
    content: You shall take the atonement money from the Israelites and use it [exclusively] for the service of the Tent of Meeting, so that it may be a memorial for the Israelites before the L
  - type: heading
    content: ord
  - type: text
    content: ', to make atonement for yourselves.”'
  - type: heading
    content: The Bronze Basin
  '17':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '18':
  - type: text
    content: '“You shall also make a basin of bronze, with a base of bronze, for washing. You shall put it [outside in the court] between the Tent of Meeting and the altar [of burnt offering], and you shall put water in it. '
  '19':
  - type: text
    content: 'Aaron and his sons shall wash their hands and their feet. '
  '2':
  - type: text
    content: 'It shall be a cubit long and a cubit wide. It shall be square and it shall be two cubits high. Its horns of one piece with it. '
  '20':
  - type: text
    content: When they enter the Tent of Meeting, they shall wash with water, so that they will not die. Also, when they approach the altar to minister, to burn an offering in the fire to the L
  - type: heading
    content: ord
  - type: text
    content: ' [they shall do the same]. [John 13:6-8] '
  '21':
  - type: text
    content: They shall wash their hands and their feet, so that they will not die; it shall be a perpetual statute for them, for Aaron and his descendants throughout their generations.”
  - type: heading
    content: The Anointing Oil
  '22':
  - type: text
    content: Moreover, the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Take for yourself the best spices: five hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of liquid myrrh, half as much—two hundred and fifty—of sweet-scented cinnamon, and two hundred and fifty of fragrant cane, '
  '24':
  - type: text
    content: 'and five hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of cinnamon blossom according to the sanctuary shekel, and a hin of olive oil. '
  '25':
  - type: text
    content: 'You shall make of these a holy anointing oil, a perfume mixture, the work of a perfumer; it shall be a sacred anointing oil. '
  '26':
  - type: text
    content: 'You shall anoint the Tent of Meeting with it, and the ark of the Testimony, '
  '27':
  - type: text
    content: 'and the table [for the bread] and all its utensils, and the lampstand and its utensils, and the altar of incense, '
  '28':
  - type: text
    content: 'and the altar of burnt offering with all its utensils, and the basin [for cleansing] and its base. '
  '29':
  - type: text
    content: 'You shall consecrate them, that they may be most holy; whatever touches them must be holy (set apart for God). '
  '3':
  - type: text
    content: 'You shall overlay it with pure gold, its top and its sides all around, and its horns; and you shall make a gold molding all around it. '
  '30':
  - type: text
    content: 'You shall anoint Aaron and his sons, and consecrate them, that they may serve as priests to Me. '
  '31':
  - type: text
    content: 'You shall say to the Israelites, ‘This shall be a holy '
  - type: text
    content: and
  - type: text
    content: ' sacred anointing oil, to Me [alone] throughout your generations. [Rom 8:9; 1 Cor 12:3] '
  '32':
  - type: text
    content: 'It shall not be poured on anyone’s body, nor shall you make any like it in the same composition. It is holy, and it shall be sacred to you. '
  '33':
  - type: text
    content: Whoever prepares any like it or puts any of it on a layman shall be cut off from his people [excluding him from the atonement made for them].’ ”
  - type: heading
    content: The Incense
  '34':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Take sweet '
  - type: text
    content: and
  - type: text
    content: ' fragrant spices—stacte, onycha, and galbanum, sweet '
  - type: text
    content: and
  - type: text
    content: ' fragrant spices with pure frankincense; there shall be an equal amount of each— '
  '35':
  - type: text
    content: 'and make incense with it, a perfume, the work of a perfumer, salted, pure and sacred. '
  '36':
  - type: text
    content: 'You shall crush some of it [into a] very fine [powder], and put some of it before the Testimony in the Tent of Meeting, where I will meet with you; it shall be most holy to you. '
  '37':
  - type: text
    content: The incense which you shall make, you shall not make in the same proportions for yourselves; it shall be holy to you for the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '38':
  - type: text
    content: Whoever makes any like it, to use as perfume shall be cut off from his people [excluding him from the atonement made for them].”
  '4':
  - type: text
    content: 'You shall make two gold rings under its molding, make them on the two side walls—on opposite sides—they shall be holders for the poles with which to carry it. '
  '5':
  - type: text
    content: 'You shall make the poles of acacia wood overlaid with gold. '
  '6':
  - type: text
    content: 'You shall put the altar of incense [in the Holy Place] in front '
  - type: text
    content: and
  - type: text
    content: ' outside of the veil that screens the ark of the '
  - type: note
    content: This is a reference to the two stone tablets inscribed by God that will be given to Moses (31:18).
  - type: text
    content: 'Testimony, before the mercy seat that is over the Testimony, where I will meet with you. '
  '7':
  - type: text
    content: 'Aaron shall burn sweet '
  - type: text
    content: and
  - type: text
    content: ' fragrant incense on it; he shall burn it every morning when he trims '
  - type: text
    content: and
  - type: text
    content: ' tends the lamps. [Ps 141:2; Rev 5:8; 8:3, 4] '
  '8':
  - type: text
    content: When Aaron sets up the lamps at twilight, he shall burn incense, a perpetual incense before the L
  - type: heading
    content: ord
  - type: text
    content: ' throughout your generations. '
  '9':
  - type: text
    content: 'You shall not offer any strange incense on this altar, or burnt offering or meal offering; you shall not pour out a drink offering on it. '
