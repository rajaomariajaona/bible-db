document_id: EXO.30,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Altar of Incense
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“You shall make an altar upon which to burn incense; you shall make it of acacia wood. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Once a year Aaron shall make atonement [for sin] on its horns. He shall make atonement on it with the blood of the sin offering of atonement once a year throughout your generations. It is most holy to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Ransom Money
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “When you take the census of the Israelites, each one shall give a ransom for himself to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' when you count them, so that no plague will come on them when you number them. [Rom 8:1-4] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'This is what everyone who is counted shall give [as he joins those already counted]: a half shekel, according to the sanctuary shekel (the shekel is twenty gerahs); a half shekel as a contribution to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Everyone who is counted, from twenty years old and over, [as he joins those already counted], shall give this contribution to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Matt 10:24; 1 Pet 1:18, 19] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The rich shall not give more and the poor shall not give less than half a shekel, when you give this contribution to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to make atonement for yourselves. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: You shall take the atonement money from the Israelites and use it [exclusively] for the service of the Tent of Meeting, so that it may be a memorial for the Israelites before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', to make atonement for yourselves.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Bronze Basin
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“You shall also make a basin of bronze, with a base of bronze, for washing. You shall put it [outside in the court] between the Tent of Meeting and the altar [of burnt offering], and you shall put water in it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Aaron and his sons shall wash their hands and their feet. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'It shall be a cubit long and a cubit wide. It shall be square and it shall be two cubits high. Its horns of one piece with it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When they enter the Tent of Meeting, they shall wash with water, so that they will not die. Also, when they approach the altar to minister, to burn an offering in the fire to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [they shall do the same]. [John 13:6-8] '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They shall wash their hands and their feet, so that they will not die; it shall be a perpetual statute for them, for Aaron and his descendants throughout their generations.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Anointing Oil
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moreover, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Take for yourself the best spices: five hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of liquid myrrh, half as much—two hundred and fifty—of sweet-scented cinnamon, and two hundred and fifty of fragrant cane, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and five hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels
    - type: text
      text: ' of cinnamon blossom according to the sanctuary shekel, and a hin of olive oil. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'You shall make of these a holy anointing oil, a perfume mixture, the work of a perfumer; it shall be a sacred anointing oil. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'You shall anoint the Tent of Meeting with it, and the ark of the Testimony, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and the table [for the bread] and all its utensils, and the lampstand and its utensils, and the altar of incense, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'and the altar of burnt offering with all its utensils, and the basin [for cleansing] and its base. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'You shall consecrate them, that they may be most holy; whatever touches them must be holy (set apart for God). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You shall overlay it with pure gold, its top and its sides all around, and its horns; and you shall make a gold molding all around it. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'You shall anoint Aaron and his sons, and consecrate them, that they may serve as priests to Me. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'You shall say to the Israelites, ‘This shall be a holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sacred anointing oil, to Me [alone] throughout your generations. [Rom 8:9; 1 Cor 12:3] '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'It shall not be poured on anyone’s body, nor shall you make any like it in the same composition. It is holy, and it shall be sacred to you. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Whoever prepares any like it or puts any of it on a layman shall be cut off from his people [excluding him from the atonement made for them].’ ”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Incense
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Take sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fragrant spices—stacte, onycha, and galbanum, sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fragrant spices with pure frankincense; there shall be an equal amount of each— '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'and make incense with it, a perfume, the work of a perfumer, salted, pure and sacred. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'You shall crush some of it [into a] very fine [powder], and put some of it before the Testimony in the Tent of Meeting, where I will meet with you; it shall be most holy to you. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: The incense which you shall make, you shall not make in the same proportions for yourselves; it shall be holy to you for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Whoever makes any like it, to use as perfume shall be cut off from his people [excluding him from the atonement made for them].”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'You shall make two gold rings under its molding, make them on the two side walls—on opposite sides—they shall be holders for the poles with which to carry it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You shall make the poles of acacia wood overlaid with gold. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You shall put the altar of incense [in the Holy Place] in front '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' outside of the veil that screens the ark of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a reference to the two stone tablets inscribed by God that will be given to Moses (31:18).
      marker-yv: yv-n
    - type: text
      text: 'Testimony, before the mercy seat that is over the Testimony, where I will meet with you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aaron shall burn sweet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fragrant incense on it; he shall burn it every morning when he trims '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tends the lamps. [Ps 141:2; Rev 5:8; 8:3, 4] '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When Aaron sets up the lamps at twilight, he shall burn incense, a perpetual incense before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' throughout your generations. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'You shall not offer any strange incense on this altar, or burnt offering or meal offering; you shall not pour out a drink offering on it. '
