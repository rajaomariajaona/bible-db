document_id: EZK.33,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Watchman’s Duty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: And the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Now as for you, son of man, say to the house of Israel, ‘Thus you have said, “Truly our transgressions and our sins are on us, and we are rotting away because of them; how then can we live?” ’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Say to them, ‘As I live,’ says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', ‘I take no pleasure in the death of the wicked, but rather that the wicked turn from his way and live. Turn back (change your way of thinking), turn back [in repentance] from your evil ways! For why should you die, O house of Israel?’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And you, son of man, say to the sons of your people, ‘The righteousness of the righteous man will not save him in the day of his transgression; and as for the wickedness of the wicked, he will not stagger because of it in the day that he turns from his wickedness, whereas a righteous man will not be able to live because of his [previous acts of] righteousness on the day when he commits sin.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When I say to the righteous that he will most certainly live, and he trusts in his [previous acts of] righteousness [to save him] and commits injustice, none of his righteous deeds will be remembered; but he will die for his injustice that he committed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But when I say to the wicked, ‘You will certainly die,’ and he turns from his sin and practices that which is just (fair) and right— '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'if a wicked man returns [what he took as] a pledge, pays back what he had taken by robbery, walks in the statutes which ensure life, without committing injustice, he will certainly live; he will not die. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: None of his sins that he has committed will be remembered against him. He has practiced that which is just (fair) and right; he will most certainly live.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Yet your people [who are in exile in Babylon] say, ‘The way of the Lord is not right;’ but as for them, it is their own way that is not right. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When the righteous turns back from his righteousness and commits injustice, he will also die because of it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But when a wicked man turns back from his wickedness and practices what is just (fair) and right, he will live because of it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, speak to the sons of your people [who are exiled in Babylon] and say to them, ‘If I bring a sword on a land, and the people of the land take one man from among them and make him their watchman, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Yet you say, ‘The way of the Lord is not right.’ O house of Israel, I will judge you, every one [of you] in accordance with his own ways!”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Word of Jerusalem’s Capture
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'In the twelfth year of our exile [in Babylon], on the fifth of the tenth month, a survivor from Jerusalem came to me, saying, “The city has been captured.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Now the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had been upon me in the evening, before the survivor came. And He '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 24:27.
      marker-yv: yv-n
    - type: text
      text: opened my mouth at the time he came to me in the morning; so my mouth was opened [in readiness] and I was no longer mute.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Then the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“Son of man, those [back in Palestine] who inhabit these ruins in the land of Israel are saying, ‘Abraham was [only] one man and he took possession of the land, but we are many; the land has [most certainly] been given to us [to possess] as property.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Therefore say to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “You eat meat with the blood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in it
    - type: text
      text: ' and raise your eyes to your idols and shed blood. Should you take possession of the land? [Gen 9:4; Lev 3:17; 7:27; Acts 15:28, 29] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'You rely on your sword [as your security]; you commit outrageous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disgraceful acts and each of you defiles his neighbor’s wife. Should you then take possession of the land?” ’ '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: You shall say this to them, ‘Thus says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “As I live, those who are in the ruins certainly will fall by the sword, and I will give whoever is in the open field to the [predatory] animals to be devoured, and those who are in strongholds and in caves will die of virulent diseases. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And I will make the land [of Israel] a desolation and a ruin, and her pride in her power will be brought to an end; and the mountains of Israel will be so deserted that no one will pass through. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Then they will know [without any doubt] that I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', when I make the land a desolation and a ruin because of all the atrocities which they have committed.” ’'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and he sees the sword coming on the land, and he blows the trumpet and warns the people, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “But as for you, son of man, your people who talk about you by the walls and in the doorways of the houses say one to another, every one to his brother, ‘Come now and hear what the message is that comes from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'They come to you as people come, and they sit before you as My people, and they hear your words, but they do not practice them; for with their mouth they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: express
    - type: text
      text: ' loving devotion, but their heart goes after their (unlawful) gain. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Behold, you are to them like a love song by one who has a pleasant voice and plays well on a stringed instrument [merely to entertain them]; for they hear your words but do not practice them. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So when it comes to pass—as it most certainly will—then they will know [without any doubt] that a prophet has been among them.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'then whoever hears the sound of the trumpet and does not take warning, and a sword comes and takes him away, his blood will be on his [own] head. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He heard the sound of the trumpet but did not take warning; his blood shall be on himself. But if he had taken warning, he would have saved his life. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But if the watchman sees the sword coming and does not blow the trumpet and the people are not warned, and the sword comes and takes any one of them, he is taken away because of his corruption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sin; but I will require his blood from the watchman’s hand.’'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Now as for you, son of man, I have made you a watchman for the house of Israel; so you shall hear a message from My mouth and give them a warning from Me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'When I say to the wicked, ‘O wicked man, you will certainly die,’ and you do not speak to warn the wicked from his way, that wicked man will die because of his sin; but I will require his blood from your hand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But if you on your part warn the wicked man to turn from his [evil] way and he does not turn from his [evil] way, he will die in his sin; but you have saved your life.
