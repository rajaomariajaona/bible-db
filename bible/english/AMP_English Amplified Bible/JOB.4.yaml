document_id: JOB.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Eliphaz: Innocent Do Not Suffer'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then Eliphaz the Temanite answered and said,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “If we dare to converse with you, will you be impatient [or offended]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But who can restrain himself from speaking?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Behold, you have admonished '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' instructed many,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you have strengthened weak hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Your words have helped the one who was stumbling to stand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you have strengthened feeble knees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“But now '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: it
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'adversity comes upon you, and you are impatient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' intolerant;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It touches you, and you are horrified.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Is not your fear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of God
  - type: text
    text: ' your confidence,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [is not] the integrity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' uprightness of your ways your hope?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Remember now, who, being innocent, ever perished?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Or where [and in what circumstances] were those upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in right standing with God destroyed?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “As I have seen, those who plow wickedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And those who sow trouble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' harm harvest it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “By the breath of God they perish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by the blast of His anger they are consumed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“The roaring of the lion and the voice of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fierce
  - type: text
    text: ' lion,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the teeth of the young lions are broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “The lion perishes for lack of prey,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the cubs of the lioness are scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“Now a word was secretly brought to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my ear received a whisper of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Amid disquieting thoughts from the visions of the night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When deep sleep falls on men,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dread and trembling came upon me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which made all my bones shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Then a spirit passed before my face;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The hair on my skin stood on end!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “The spirit stood still, but I could not discern its appearance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A form was before my eyes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: There was
  - type: text
    text: ' silence, and then I heard a voice, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '‘Can [mortal] man be just before God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be more righteous than He?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Can a man be pure before his Maker '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' be more cleansed than He? [1 John 1:7; Rev 1:5]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '‘God puts no trust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' confidence, even in His [heavenly] servants,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He charges His angels with error.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ‘How much more [will He blame and charge] those who dwell in houses (bodies) of clay,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whose foundations are in the dust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who are crushed like a moth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '‘Between morning and evening they are broken in pieces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Unobserved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unnoticed, they perish forever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ‘Is not their tent-cord drawn up within them [so that the tent collapses]?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do they not die, and yet without [acquiring] wisdom?’
