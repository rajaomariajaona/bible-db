document_id: JOB.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Eliphaz: Innocent Do Not Suffer'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Eliphaz the Temanite answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The roaring of the lion and the voice of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fierce
    - type: text
      text: ' lion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the teeth of the young lions are broken.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The lion perishes for lack of prey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the cubs of the lioness are scattered.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Now a word was secretly brought to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my ear received a whisper of it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Amid disquieting thoughts from the visions of the night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When deep sleep falls on men,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dread and trembling came upon me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which made all my bones shake.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then a spirit passed before my face;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hair on my skin stood on end!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The spirit stood still, but I could not discern its appearance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A form was before my eyes;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There was
    - type: text
      text: ' silence, and then I heard a voice, saying:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Can [mortal] man be just before God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be more righteous than He?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Can a man be pure before his Maker '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' be more cleansed than He? [1 John 1:7; Rev 1:5]'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘God puts no trust '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' confidence, even in His [heavenly] servants,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He charges His angels with error.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘How much more [will He blame and charge] those who dwell in houses (bodies) of clay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose foundations are in the dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who are crushed like a moth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If we dare to converse with you, will you be impatient [or offended]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But who can restrain himself from speaking?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Between morning and evening they are broken in pieces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unobserved '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unnoticed, they perish forever.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Is not their tent-cord drawn up within them [so that the tent collapses]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do they not die, and yet without [acquiring] wisdom?’
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Behold, you have admonished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' instructed many,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you have strengthened weak hands.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your words have helped the one who was stumbling to stand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you have strengthened feeble knees.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But now '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: it
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'adversity comes upon you, and you are impatient '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' intolerant;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It touches you, and you are horrified.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Is not your fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of God
    - type: text
      text: ' your confidence,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [is not] the integrity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' uprightness of your ways your hope?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“Remember now, who, being innocent, ever perished?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Or where [and in what circumstances] were those upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in right standing with God destroyed?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As I have seen, those who plow wickedness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And those who sow trouble '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' harm harvest it.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “By the breath of God they perish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by the blast of His anger they are consumed.
