  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Exaltation of the Afflicted
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The Spirit of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' is upon me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has anointed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' commissioned me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To bring good news to the humble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' afflicted;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has sent me to bind up [the wounds of] the brokenhearted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To proclaim release [from confinement and condemnation] to the [physical and spiritual] captives
- type: usfm
  marker: q1
  children:
  - type: text
    text: And freedom to prisoners, [Rom 10:15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'To proclaim '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The same as '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a day of salvation
      - type: text
        text: ' (49:8), and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the year of my redeemed
      - type: text
        text: ' (63:4).'
    marker-yv: yv-n
  - type: text
    text: the favorable year of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Ezek 34:28.
    marker-yv: yv-n
  - type: text
    text: 'And the day of vengeance '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' retribution of our God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To comfort all who mourn, [Matt 11:2-6; Luke 4:18, 19; 7:22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'To grant to those who mourn in Zion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'the following:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To give them a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In the Hebrew there is a kind of wordplay here as “turban” (Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pe’er)
      - type: text
        text: ' and dust ('
      - type: usfm
        marker: it
        children:
        - type: text
          text: epher)
      - type: text
        text: ' have the same consonants and similar vowels.'
    marker-yv: yv-n
  - type: text
    text: turban instead of dust [on their heads, a sign of mourning],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The oil of joy instead of mourning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The garment [expressive] of praise instead of a disheartened spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they will be called the trees of righteousness [strong and magnificent, distinguished for integrity, justice, and right standing with God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The planting of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that He may be glorified.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶Then they will rebuild the ancient ruins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will raise up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' restore the former desolations;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will renew the ruined cities,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The desolations (deserted settlements) of many generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Strangers will stand and feed your flocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And foreigners will be your farmers and your vinedressers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But you shall be called the priests of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: People will speak of you as the ministers of our God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will eat the wealth of nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you will boast of their riches. [Ex 19:6; 1 Pet 2:5; Rev 1:6; 5:10; 20:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Instead of your [former] shame '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you will have
  - type: text
    text: ' a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. abundant reward.
    marker-yv: yv-n
  - type: text
    text: 'double '
  - type: usfm
    marker: it
    children:
    - type: text
      text: portion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: instead of
  - type: text
    text: ' humiliation your people will shout for joy over their portion.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore in their land they will possess double [what they had forfeited];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everlasting joy will be theirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For I, the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', love justice;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I hate robbery with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Another reading is '
      - type: usfm
        marker: it
        children:
        - type: text
          text: wrongdoing
      - type: text
        text: ' or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: malice,
      - type: text
        text: ' but by itself either would hardly be an improvement. Some prefer to read '
      - type: usfm
        marker: it
        children:
        - type: text
          text: with
      - type: text
        text: ' as “and,” which requires the assumption of a scribal error that is possible though not found in existing manuscripts. It would also raise the question of why '
      - type: usfm
        marker: it
        children:
        - type: text
          text: robbery
      - type: text
        text: ' is singled out among other kinds of wrongdoing. In the Talmud the verse is taken to refer literally to the theft of an animal which the thief intends to offer as a sacrifice. The point is that the offering is unacceptable even though everything actually belongs to God and the thief arguably is only returning to God what is His.'
    marker-yv: yv-n
  - type: text
    text: a burnt offering.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will faithfully reward them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And make an everlasting covenant with them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then their offspring will be known among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their descendants among the peoples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All who see them [in their prosperity] will recognize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' acknowledge them'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they are the people whom the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has blessed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶I will rejoice greatly in the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: My soul will exult in my God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For He has clothed me with garments of salvation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has covered me with a robe of righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As a bridegroom puts on a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '61:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: head wrap
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: turban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as a bride adorns herself with her jewels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For as the earth brings forth its sprouts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as a garden causes what is sown in it to spring up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' will [most certainly] cause righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice and praise'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To spring up before all the nations [through the power of His word].
