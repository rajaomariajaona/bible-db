  - type: note
    content: Another reading is wrongdoing or malice, but by itself either would hardly be an improvement. Some prefer to read with as “and,” which requires the assumption of a scribal error that is possible though not found in existing manuscripts. It would also raise the question of why robbery is singled out among other kinds of wrongdoing. In the Talmud the verse is taken to refer literally to the theft of an animal which the thief intends to offer as a sacrifice. The point is that the offering is unacceptable even though everything actually belongs to God and the thief arguably is only returning to God what is His.
