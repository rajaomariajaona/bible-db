document_id: PRO.31,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Words of Lemuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The words of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The identity of King Lemuel is uncertain; however, ancient Jewish tradition connects Lemuel with Solomon.
      marker-yv: yv-n
    - type: text
      text: 'King Lemuel, the oracle, which his mother taught him:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ¶
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The following verses are written as an acrostic poem (each of the twenty-two verses begins with a successive letter of the Hebrew alphabet). Aside from the artistry, the acrostic structure also aided memorization.
      marker-yv: yv-n
    - type: text
      text: An excellent woman [one who is spiritual, capable, intelligent, and virtuous], who is he who can find her?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her value is more precious than jewels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her worth is far above rubies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' pearls. [Prov 12:4; 18:22; 19:14]'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The heart of her husband trusts in her [with secure confidence],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will have no lack of gain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'She comforts, encourages, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' does him only good and not evil'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the days of her life.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: She looks for wool and flax
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And works with willing hands in delight.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: She is like the merchant ships [abounding with treasure];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She brings her [household’s] food from far away.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: She rises also while it is still night
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gives food to her household
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And assigns tasks to her maids. [Job 23:12]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'She considers a field before she buys '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' accepts it [expanding her business prudently];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With her profits she plants fruitful vines in her vineyard.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: She equips herself with strength [spiritual, mental, and physical fitness for her God-given task]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And makes her arms strong.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: She sees that her gain is good;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her lamp does not go out, but it burns continually through the night [she is prepared for whatever lies ahead].
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'She stretches out her hands to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the staff that holds the textile fibers for spinning.
      marker-yv: yv-n
    - type: text
      text: distaff,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And her hands hold the spindle [as she spins wool into thread for clothing].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '¶What, O my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This chapter consists of two poetic sections. The first (vv 2-9) details the qualities needed to be a wise ruler, and the second (vv 10-31) the qualities describing an excellent wife.
      marker-yv: yv-n
    - type: text
      text: son?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what, O son of my womb?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what [shall I advise you], O son of my vows?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'She opens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extends her hand to the poor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And she reaches out her filled hands to the needy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: She does not fear the snow for her household,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all in her household are clothed in [expensive] scarlet [wool]. [Josh 2:18, 19; Heb 9:19-22]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'She makes for herself coverlets, cushions, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rugs of tapestry.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her clothing is linen, pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fine, and purple [wool]. [Is 61:10; 1 Tim 2:9; Rev 3:5; 19:8, 14]'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Her husband is known in the [city’s] gates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he sits among the elders of the land. [Prov 12:4]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: She makes [fine] linen garments and sells them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And supplies sashes to the merchants.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Strength and dignity are her clothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' her position is strong and secure;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And she smiles at the future [knowing that she and her family are prepared].
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: She opens her mouth in [skillful and godly] wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the teaching of kindness is on her tongue [giving counsel and instruction].
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: She looks well to how things go in her household,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And does not eat the bread of idleness. [1 Tim 5:14; Titus 2:5]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Her children rise up and call her blessed (happy, prosperous, to be admired);
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her husband also, and he praises her, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“Many daughters have done nobly, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well [with the strength of character that is steadfast in goodness],'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The source of this remarkable woman’s success and competence is revealed in v 30, and it is a source available to everyone. She is wise because she understands and puts into practice the message contained in 9:10.
      marker-yv: yv-n
    - type: text
      text: But you excel them all.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Do not give your [generative] strength to women [neither foreign wives in marriages of alliances, nor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Gen 22:24.
      marker-yv: yv-n
    - type: text
      text: concubines],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor your ways to that which destroys kings.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Charm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' grace are deceptive, and [superficial] beauty is vain,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a woman who fears the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [reverently worshiping, obeying, serving, and trusting Him with awe-filled respect], she shall be praised.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Give her of the product of her hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let her own works praise her in the gates [of the city]. [Phil 4:8]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: It is not for kings, O Lemuel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is not for kings to drink wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or for rulers to desire strong drink, [Eccl 10:17; Hos 4:11]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Otherwise they drink and forget the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its decrees,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And pervert the rights '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' justice of all the afflicted.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Give strong drink [as medicine] to him who is ready to pass away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And wine to him whose life is bitter.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let him drink and forget his poverty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And no longer remember his trouble.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Open your mouth for the mute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the rights of all who are unfortunate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' defenseless; [1 Sam 19:4; Esth 4:16; Job 29:15, 16]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Open your mouth, judge righteously,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And administer justice for the afflicted and needy. [Lev 19:15; Deut 1:16; Job 29:12; Is 1:17; Jer 22:16]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Description of a Worthy Woman
    marker-yv: yv-h
