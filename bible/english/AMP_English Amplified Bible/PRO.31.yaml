  - type: text
    content: '¶What, O my '
  - type: note
    content: This chapter consists of two poetic sections. The first (vv 2-9) details the qualities needed to be a wise ruler, and the second (vv 10-31) the qualities describing an excellent wife.
  - type: text
    content: son?
  - type: text
    content: And what, O son of my womb?
  - type: text
    content: And what [shall I advise you], O son of my vows?
  '20':
  - type: text
    content: 'She opens '
  - type: text
    content: and
  - type: text
    content: ' extends her hand to the poor,'
  - type: text
    content: And she reaches out her filled hands to the needy.
  '21':
  - type: text
    content: She does not fear the snow for her household,
  - type: text
    content: For all in her household are clothed in [expensive] scarlet [wool]. [Josh 2:18, 19; Heb 9:19-22]
  '22':
  - type: text
    content: 'She makes for herself coverlets, cushions, '
  - type: text
    content: and
  - type: text
    content: ' rugs of tapestry.'
  - type: text
    content: 'Her clothing is linen, pure '
  - type: text
    content: and
  - type: text
    content: ' fine, and purple [wool]. [Is 61:10; 1 Tim 2:9; Rev 3:5; 19:8, 14]'
  '23':
  - type: text
    content: Her husband is known in the [city’s] gates,
  - type: text
    content: When he sits among the elders of the land. [Prov 12:4]
  '24':
  - type: text
    content: She makes [fine] linen garments and sells them;
  - type: text
    content: And supplies sashes to the merchants.
  '25':
  - type: text
    content: 'Strength and dignity are her clothing '
  - type: text
    content: and
  - type: text
    content: ' her position is strong and secure;'
  - type: text
    content: And she smiles at the future [knowing that she and her family are prepared].
  '26':
  - type: text
    content: She opens her mouth in [skillful and godly] wisdom,
  - type: text
    content: And the teaching of kindness is on her tongue [giving counsel and instruction].
  '27':
  - type: text
    content: She looks well to how things go in her household,
  - type: text
    content: And does not eat the bread of idleness. [1 Tim 5:14; Titus 2:5]
  '28':
  - type: text
    content: Her children rise up and call her blessed (happy, prosperous, to be admired);
  - type: text
    content: 'Her husband also, and he praises her, '
  - type: text
    content: saying,
  '29':
  - type: text
    content: '“Many daughters have done nobly, '
  - type: text
    content: and
  - type: text
    content: ' well [with the strength of character that is steadfast in goodness],'
  - type: note
    content: The source of this remarkable woman’s success and competence is revealed in v 30, and it is a source available to everyone. She is wise because she understands and puts into practice the message contained in 9:10.
  - type: text
    content: But you excel them all.”
