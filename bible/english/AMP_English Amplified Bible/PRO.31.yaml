  - type: note
    content: The identity of King Lemuel is uncertain; however, ancient Jewish tradition connects Lemuel with Solomon.
  - type: text
    content: 'King Lemuel, the oracle, which his mother taught him:'
  '10':
  - type: text
    content: ¶
  - type: note
    content: The following verses are written as an acrostic poem (each of the twenty-two verses begins with a successive letter of the Hebrew alphabet). Aside from the artistry, the acrostic structure also aided memorization.
  - type: text
    content: An excellent woman [one who is spiritual, capable, intelligent, and virtuous], who is he who can find her?
  - type: text
    content: 'Her value is more precious than jewels '
  - type: text
    content: and
  - type: text
    content: ' her worth is far above rubies '
  - type: text
    content: or
  - type: text
    content: ' pearls. [Prov 12:4; 18:22; 19:14]'
  '11':
  - type: text
    content: The heart of her husband trusts in her [with secure confidence],
  - type: text
    content: And he will have no lack of gain.
  '12':
  - type: text
    content: 'She comforts, encourages, '
  - type: text
    content: and
  - type: text
    content: ' does him only good and not evil'
  - type: text
    content: All the days of her life.
  '13':
  - type: text
    content: She looks for wool and flax
  - type: text
    content: And works with willing hands in delight.
  '14':
  - type: text
    content: She is like the merchant ships [abounding with treasure];
  - type: text
    content: She brings her [household’s] food from far away.
  '15':
  - type: text
    content: She rises also while it is still night
  - type: text
    content: And gives food to her household
  - type: text
    content: And assigns tasks to her maids. [Job 23:12]
  '16':
  - type: text
    content: 'She considers a field before she buys '
  - type: text
    content: or
  - type: text
    content: ' accepts it [expanding her business prudently];'
  - type: text
    content: With her profits she plants fruitful vines in her vineyard.
  '17':
  - type: text
    content: She equips herself with strength [spiritual, mental, and physical fitness for her God-given task]
  - type: text
    content: And makes her arms strong.
  '18':
  - type: text
    content: She sees that her gain is good;
  - type: text
    content: Her lamp does not go out, but it burns continually through the night [she is prepared for whatever lies ahead].
  '19':
  - type: text
    content: 'She stretches out her hands to the '
  - type: note
    content: I.e. the staff that holds the textile fibers for spinning.
  - type: text
    content: distaff,
  - type: text
    content: And her hands hold the spindle [as she spins wool into thread for clothing].
