document_id: 2PE.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Purpose of This Letter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Beloved, I am now writing you this second letter. In this [as in the first one], I am stirring up your untainted mind to remind you, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that you should remember the words spoken in the past [about the future] by the holy prophets and the commandment of the Lord and Savior '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given
  - type: text
    text: ' by your apostles [His personally chosen representatives].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Coming Day of the Lord
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'First of all, know [without any doubt] that mockers will come in the last days with their mocking, following after their own human desires '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and saying, “Where is the promise of His coming [what has become of it]? For ever since the fathers fell asleep [in death], all things have continued [exactly] as they did from the beginning of creation.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For they willingly forget [the fact] that the heavens existed long ago by the word of God, and the earth was formed '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peter is not referring to the creation of earth from water, but to the appearance of land masses from the water that had covered the earth in the early stages of creation. His point is that the mockers who will claim that things continue to be just as they always have been will be overlooking the fact that the status quo, as they see it, took an act of God to create in the first place, and God has already intervened in the history of the world once to wipe out mankind by a cataclysmic flood (v 6; cf Gen 6; 7).
    marker-yv: yv-n
  - type: text
    text: 'out of water and by water, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'through which the world at that time was destroyed by being flooded with water. [Gen 1:6-8; 7:11] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But by His word the present heavens and earth are being reserved for fire, being kept for the day of judgment and destruction of the ungodly people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nevertheless, do not let this one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fact
  - type: text
    text: ' escape your notice, beloved, that with the Lord one day is like a thousand years, and a thousand years is like one day. [Ps 90:4] '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The Lord does not delay [as though He were unable to act] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' is not slow about His promise, as some count slowness, but is [extraordinarily] patient toward you, not wishing for any to perish but for all to come to repentance.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A New Heaven and Earth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the day of the Lord will come like a thief, and then the heavens will vanish with a [mighty and thunderous] roar, and the [material] elements will be destroyed with intense heat, and the earth and the works that are on it will be '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Two early mss have “discovered” instead of “burned up.” It is possible that Peter means something like “discovered for what they really are—temporary creations.”
    marker-yv: yv-n
  - type: text
    text: burned up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Since all these things are to be destroyed in this way, what kind of people ought you to be [in the meantime] in holy behavior [that is, in a pattern of daily life that sets you apart as a believer] and in godliness [displaying profound reverence toward our awesome God], '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '[while you earnestly] look for and await the coming of the day of God. For on this day the heavens will be destroyed by burning, and the [material] elements will melt with intense heat! [Is 34:4] '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But in accordance with His promise we expectantly await new heavens and a new earth, in which righteousness dwells. [Is 65:17; 66:22]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So, beloved, since you are looking forward to these things, be diligent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make every effort to be found by Him [at His return] spotless and blameless, in peace [that is, inwardly calm with a sense of spiritual well-being and confidence, having lived a life of obedience to Him]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And consider the patience of our Lord [His delay in judging and avenging wrongs] as salvation [that is, allowing time for more to be saved]; just as our beloved brother Paul also wrote to you according to the wisdom given to him [by God], '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'speaking about these things as he does in all of his letters. In which there are some things that are difficult to understand, which the untaught and unstable [who have fallen into error] twist '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' misinterpret, just as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they do
  - type: text
    text: ' the rest of the Scriptures, to their own destruction. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore, [let me warn you] beloved, knowing these things beforehand, be on your guard so that you are not carried away by the error of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the people who teach a distorted doctrine.
    marker-yv: yv-n
  - type: text
    text: 'unprincipled men [who distort doctrine] and fall from your own steadfastness [of mind, knowledge, truth, and faith], '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: but grow [spiritually mature] in the grace and knowledge of our Lord and Savior Jesus Christ. To Him be glory (honor, majesty, splendor), both now and to the day of eternity. Amen.
