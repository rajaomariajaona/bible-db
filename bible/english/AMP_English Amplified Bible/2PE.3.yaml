document_id: 2PE.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Purpose of This Letter
  - type: text
    content: 'Beloved, I am now writing you this second letter. In this [as in the first one], I am stirring up your untainted mind to remind you, '
  '10':
  - type: text
    content: 'But the day of the Lord will come like a thief, and then the heavens will vanish with a [mighty and thunderous] roar, and the [material] elements will be destroyed with intense heat, and the earth and the works that are on it will be '
  - type: note
    content: Two early mss have “discovered” instead of “burned up.” It is possible that Peter means something like “discovered for what they really are—temporary creations.”
  - type: text
    content: burned up.
  '11':
  - type: text
    content: 'Since all these things are to be destroyed in this way, what kind of people ought you to be [in the meantime] in holy behavior [that is, in a pattern of daily life that sets you apart as a believer] and in godliness [displaying profound reverence toward our awesome God], '
  '12':
  - type: text
    content: '[while you earnestly] look for and await the coming of the day of God. For on this day the heavens will be destroyed by burning, and the [material] elements will melt with intense heat! [Is 34:4] '
  '13':
  - type: text
    content: But in accordance with His promise we expectantly await new heavens and a new earth, in which righteousness dwells. [Is 65:17; 66:22]
  '14':
  - type: text
    content: 'So, beloved, since you are looking forward to these things, be diligent '
  - type: text
    content: and
  - type: text
    content: ' make every effort to be found by Him [at His return] spotless and blameless, in peace [that is, inwardly calm with a sense of spiritual well-being and confidence, having lived a life of obedience to Him]. '
  '15':
  - type: text
    content: 'And consider the patience of our Lord [His delay in judging and avenging wrongs] as salvation [that is, allowing time for more to be saved]; just as our beloved brother Paul also wrote to you according to the wisdom given to him [by God], '
  '16':
  - type: text
    content: 'speaking about these things as he does in all of his letters. In which there are some things that are difficult to understand, which the untaught and unstable [who have fallen into error] twist '
  - type: text
    content: and
  - type: text
    content: ' misinterpret, just as '
  - type: text
    content: they do
  - type: text
    content: ' the rest of the Scriptures, to their own destruction. '
  '17':
  - type: text
    content: 'Therefore, [let me warn you] beloved, knowing these things beforehand, be on your guard so that you are not carried away by the error of '
  - type: note
    content: I.e. the people who teach a distorted doctrine.
  - type: text
    content: 'unprincipled men [who distort doctrine] and fall from your own steadfastness [of mind, knowledge, truth, and faith], '
  '18':
  - type: text
    content: but grow [spiritually mature] in the grace and knowledge of our Lord and Savior Jesus Christ. To Him be glory (honor, majesty, splendor), both now and to the day of eternity. Amen.
  '2':
  - type: text
    content: 'that you should remember the words spoken in the past [about the future] by the holy prophets and the commandment of the Lord and Savior '
  - type: text
    content: given
  - type: text
    content: ' by your apostles [His personally chosen representatives].'
  - type: heading
    content: The Coming Day of the Lord
  '3':
  - type: text
    content: 'First of all, know [without any doubt] that mockers will come in the last days with their mocking, following after their own human desires '
  '4':
  - type: text
    content: 'and saying, “Where is the promise of His coming [what has become of it]? For ever since the fathers fell asleep [in death], all things have continued [exactly] as they did from the beginning of creation.” '
  '5':
  - type: text
    content: 'For they willingly forget [the fact] that the heavens existed long ago by the word of God, and the earth was formed '
  - type: note
    content: Peter is not referring to the creation of earth from water, but to the appearance of land masses from the water that had covered the earth in the early stages of creation. His point is that the mockers who will claim that things continue to be just as they always have been will be overlooking the fact that the status quo, as they see it, took an act of God to create in the first place, and God has already intervened in the history of the world once to wipe out mankind by a cataclysmic flood (v 6; cf Gen 6; 7).
  - type: text
    content: 'out of water and by water, '
  '6':
  - type: text
    content: 'through which the world at that time was destroyed by being flooded with water. [Gen 1:6-8; 7:11] '
  '7':
  - type: text
    content: But by His word the present heavens and earth are being reserved for fire, being kept for the day of judgment and destruction of the ungodly people.
  '8':
  - type: text
    content: 'Nevertheless, do not let this one '
  - type: text
    content: fact
  - type: text
    content: ' escape your notice, beloved, that with the Lord one day is like a thousand years, and a thousand years is like one day. [Ps 90:4] '
  '9':
  - type: text
    content: 'The Lord does not delay [as though He were unable to act] '
  - type: text
    content: and
  - type: text
    content: ' is not slow about His promise, as some count slowness, but is [extraordinarily] patient toward you, not wishing for any to perish but for all to come to repentance.'
  - type: heading
    content: A New Heaven and Earth
