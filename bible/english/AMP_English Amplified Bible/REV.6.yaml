        text: Some interpreters note that the rabbis said that if one sees a white horse in a dream, it is a good sign (Talmud). Jewish believers who heard these words being read in their church (see 1:3) probably would think that the vision indicated Israel would soon be freed from foreign domination. In the Roman world a white horse was a symbol of victory in battle. In this case the peace is deceptive because it will not be lasting. Other interpreters argue that the horseman represents the conquering Christ, as in 19:11.
    marker-yv: yv-n
  - type: text
    text: 'white horse [of victory] whose rider carried a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Without an arrow (if arrows are not to be assumed) the bow may symbolize a bloodless victory or conquest.
    marker-yv: yv-n
  - type: text
    text: bow; and a crown [of victory] was given to him, and he rode forth conquering and to conquer. [Ps 45:4, 5; Zech 1:8; 6:1-8]
