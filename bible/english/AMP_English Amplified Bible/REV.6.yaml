  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When He (the Lamb) broke open the fifth seal, I saw underneath the altar the souls of those who had been slaughtered because of the word of God, and because of the testimony which they had maintained [out of loyalty to Christ]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They cried in a loud voice, saying, “O Lord, holy and true, how long now before You will sit in judgment and avenge our blood on those [unregenerate ones] who dwell on the earth?” [Gen 4:10; Ps 79:10; 94:3; Zech 1:12] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they were each given a white robe; and they were told to rest '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' wait quietly for a little while longer, until '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the number of
  - type: text
    text: ' their fellow servants and their brothers and sisters who were to be killed even as they had been, would be completed.'
