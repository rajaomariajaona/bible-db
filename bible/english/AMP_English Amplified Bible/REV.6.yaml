  - type: text
    text: 'So I looked, and behold, an ashen (pale greenish gray) horse [like a corpse, representing death and pestilence]; and its rider’s name was Death; and Hades (the realm of the dead) was following with him. They were given authority '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power over a fourth part of the earth, to kill with the sword and with famine and with '
