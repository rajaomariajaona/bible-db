      text: '5'
  - type: text
    text: 'When He (the Lamb) broke open the third seal, I heard the third living creature call out, “Come.” I looked, and behold, a black horse [of famine]; and the rider had in his hand a pair of scales (a balance). [Zech 6:1-8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And I heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: something
  - type: text
    text: ' like a voice in the midst of the four living creatures saying, “A quart of wheat for a denarius (a day’s wages), and three quarts of barley for a denarius; and do not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This may be a warning to be very careful handling olive oil and wine, which ordinarily are basic commodities, because famine will make them very expensive. The vision indicates that famine and inflation will take such a toll that a laborer will earn only enough to feed himself with wheat, or to provide barley for a small family. He will have almost nothing left for clothing, shelter, and incidentals.
    marker-yv: yv-n
  - type: text
    text: damage the oil and the wine.” [2 Kin 6:25]
