  '2':
  - type: text
    content: 'I looked, and behold, a '
  - type: note
    content: Some interpreters note that the rabbis said that if one sees a white horse in a dream, it is a good sign (Talmud). Jewish believers who heard these words being read in their church (see 1:3) probably would think that the vision indicated Israel would soon be freed from foreign domination. In the Roman world a white horse was a symbol of victory in battle. In this case the peace is deceptive because it will not be lasting. Other interpreters argue that the horseman represents the conquering Christ, as in 19:11.
  - type: text
    content: 'white horse [of victory] whose rider carried a '
  - type: note
    content: Without an arrow (if arrows are not to be assumed) the bow may symbolize a bloodless victory or conquest.
  - type: text
    content: bow; and a crown [of victory] was given to him, and he rode forth conquering and to conquer. [Ps 45:4, 5; Zech 1:8; 6:1-8]
  - type: heading
    content: The Second Seal—War
  '3':
  - type: text
    content: 'When He (the Lamb) broke the second seal, I heard the second living creature call out, “Come.” '
  '4':
  - type: text
    content: 'And another, a '
  - type: note
    content: In contrast to the white horse, the rabbis said that if one saw a red horse walking gently, it was a good sign, but if the horse was galloping, it was a bad sign. It was also said that the man riding the red horse in Zechariah’s vision (Zech 1:8) was a sign that God intended to turn the whole world into blood (Talmud).
  - type: text
    content: fiery red horse [of bloodshed], came out; and its rider was empowered to take peace from the earth, so that men would slaughter one another; and a great sword [of war and violent death] was given to him. [Zech 1:8; 6:1-8]
  - type: heading
    content: The Third Seal—Famine
  '5':
  - type: text
    content: 'When He (the Lamb) broke open the third seal, I heard the third living creature call out, “Come.” I looked, and behold, a black horse [of famine]; and the rider had in his hand a pair of scales (a balance). [Zech 6:1-8] '
  '6':
  - type: text
    content: 'And I heard '
  - type: text
    content: something
  - type: text
    content: ' like a voice in the midst of the four living creatures saying, “A quart of wheat for a denarius (a day’s wages), and three quarts of barley for a denarius; and do not '
  - type: note
    content: This may be a warning to be very careful handling olive oil and wine, which ordinarily are basic commodities, because famine will make them very expensive. The vision indicates that famine and inflation will take such a toll that a laborer will earn only enough to feed himself with wheat, or to provide barley for a small family. He will have almost nothing left for clothing, shelter, and incidentals.
  - type: text
    content: damage the oil and the wine.” [2 Kin 6:25]
  - type: heading
    content: The Fourth Seal—Death
  '7':
  - type: text
    content: 'When He (the Lamb) broke open the fourth seal, I heard the voice of the fourth living creature call out, “Come.” '
  '8':
  - type: text
    content: 'So I looked, and behold, an ashen (pale greenish gray) horse [like a corpse, representing death and pestilence]; and its rider’s name was Death; and Hades (the realm of the dead) was following with him. They were given authority '
  - type: text
    content: and
  - type: text
    content: ' power over a fourth part of the earth, to kill with the sword and with famine and with '
  - type: note
    content: Or death.
  - type: text
    content: plague (pestilence, disease) and by the wild beasts of the earth. [Ezek 14:21; Hos 13:14]
  - type: heading
    content: The Fifth Seal—Martyrs
  '9':
  - type: text
    content: 'When He (the Lamb) broke open the fifth seal, I saw underneath the altar the souls of those who had been slaughtered because of the word of God, and because of the testimony which they had maintained [out of loyalty to Christ]. '
