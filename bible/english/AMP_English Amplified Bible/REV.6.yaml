  - type: text
    text: 'When He (the Lamb) broke the second seal, I heard the second living creature call out, “Come.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And another, a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In contrast to the white horse, the rabbis said that if one saw a red horse walking gently, it was a good sign, but if the horse was galloping, it was a bad sign. It was also said that the man riding the red horse in Zechariah’s vision (Zech 1:8) was a sign that God intended to turn the whole world into blood (Talmud).
    marker-yv: yv-n
  - type: text
    text: fiery red horse [of bloodshed], came out; and its rider was empowered to take peace from the earth, so that men would slaughter one another; and a great sword [of war and violent death] was given to him. [Zech 1:8; 6:1-8]
- type: usfm
  marker: s1
  children:
