  '12':
  - type: text
    content: '“When you have finished '
  - type: note
    content: This is a reference to a benevolence offering given every three years (called the “tithe of the poor” by the ancient rabbis). This was in addition to the “Storehouse Tithe,” brought to the sanctuary and the “Pilgrimage Tithe” used for the expenses of going to Jerusalem three times each year. Together, the OT tithe amounted to a third of the total.
  - type: text
    content: 'paying all the tithe of your produce the third year, [which is] the year of tithing, then you shall give it to the Levite, to the stranger, to the orphan, and to the widow, so that they may eat within the gates of your cities and be satisfied. '
  '13':
  - type: text
    content: You shall say before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, ‘I have removed the sacred '
  - type: text
    content: portion
  - type: text
    content: ' (the tithe) from my house and also have given it to the Levite, to the stranger, to the orphan, and to the widow, in accordance with all that You have commanded me. I have not transgressed or forgotten any of Your commandments. '
  '14':
  - type: text
    content: I have not eaten from the tithe while mourning, nor have I removed any of it when I was [ceremonially] unclean [making the tithe ceremonially unclean], nor offered any of it to the dead. I have listened to the voice of the L
  - type: heading
    content: ord
  - type: text
    content: ' my God; I have done '
  - type: text
    content: everything
  - type: text
    content: ' in accordance with all that You have commanded me. '
  '15':
  - type: text
    content: 'Look down from Your holy dwelling above, from heaven, and bless Your people Israel, and the land which You have given us, as You have sworn to our fathers, a land [of plenty] '
  - type: note
    content: See note v 9.
  - type: text
    content: flowing with milk and honey.’
  '16':
  - type: text
    content: “This day the L
  - type: heading
    content: ord
  - type: text
    content: ' your God commands you to do these statutes and judgments (precepts). Therefore, you shall be careful to do them with all your heart and with all your soul (your entire being). '
  '17':
  - type: text
    content: Today you have [openly] declared the L
  - type: heading
    content: ord
  - type: text
    content: ' to be your God, and that you will walk [that is, live each and every day] in His ways and keep His statutes, His commandments, and His judgments (precepts), and listen to His voice. '
  '18':
  - type: text
    content: Today the L
  - type: heading
    content: ord
  - type: text
    content: ' has declared that you are His people, His treasured possession, just as He promised you, and that you are to keep all His commandments; '
  '19':
  - type: text
    content: 'and that He will set you high above all the nations which He has made, for praise, fame, and honor: and that you shall be a holy people [set apart and consecrated] to the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God, just as He has spoken.”'
  '2':
  - type: text
    content: that you shall take some of the first of all the produce of the ground which you harvest from the land that the L
  - type: heading
    content: ord
  - type: text
    content: ' your God gives you, and you shall put it in a basket and go to the '
  - type: note
    content: Some scholars believe this refers to Jerusalem, others suggest the tabernacle. This is not to be confused with the annual offering of the first fruits.
  - type: text
    content: place where the L
  - type: heading
    content: ord
  - type: text
    content: ' your God chooses to establish His Name (Presence). '
  '3':
  - type: text
    content: You shall go to the priest who is in office at that time and say to him, ‘I declare this day to the L
  - type: heading
    content: ord
  - type: text
    content: ' '
  - type: note
    content: So with Gr; Heb your.
  - type: text
    content: my God that I have entered the land which the L
  - type: heading
    content: ord
  - type: text
    content: ' swore to our fathers to give us.’ '
  '4':
  - type: text
    content: Then the priest will take the basket from you and place it before the altar of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God. '
  '5':
  - type: text
    content: And you shall say before the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, ‘My father [Jacob] was a wandering Aramean, and he [along with his family] went down to Egypt and '
  - type: note
    content: Lit sojourned.
  - type: text
    content: 'lived there [as strangers], few in number; but while there he became a great, mighty and populous nation. '
  '6':
  - type: text
    content: 'And the Egyptians treated us badly and oppressed us, and imposed hard labor on us. '
  '7':
  - type: text
    content: Then we cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of our fathers for help, and He heard our voice and saw our suffering and our labor and our [cruel] oppression; '
  '8':
  - type: text
    content: and the L
  - type: heading
    content: ord
  - type: text
    content: ' brought us out of Egypt with a mighty hand and with an outstretched arm and with great terror [suffered by the Egyptians] and with signs and with wonders; '
  '9':
  - type: text
    content: 'and He has brought us to this place and has given us this land, a land '
  - type: note
    content: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
  - type: text
    content: 'flowing with milk and honey. '
