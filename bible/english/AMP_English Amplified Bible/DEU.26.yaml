document_id: DEU.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Offering First Fruits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Then it shall be, when you enter the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you as an inheritance, and you take possession of it and live in it, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: that you shall take some of the first of all the produce of the ground which you harvest from the land that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you, and you shall put it in a basket and go to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars believe this refers to Jerusalem, others suggest the tabernacle. This is not to be confused with the annual offering of the first fruits.
    marker-yv: yv-n
  - type: text
    text: place where the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God chooses to establish His Name (Presence). '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You shall go to the priest who is in office at that time and say to him, ‘I declare this day to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'So with Gr; Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: your
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: my God that I have entered the land which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' swore to our fathers to give us.’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then the priest will take the basket from you and place it before the altar of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And you shall say before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, ‘My father [Jacob] was a wandering Aramean, and he [along with his family] went down to Egypt and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sojourned
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'lived there [as strangers], few in number; but while there he became a great, mighty and populous nation. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the Egyptians treated us badly and oppressed us, and imposed hard labor on us. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then we cried out to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of our fathers for help, and He heard our voice and saw our suffering and our labor and our [cruel] oppression; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' brought us out of Egypt with a mighty hand and with an outstretched arm and with great terror [suffered by the Egyptians] and with signs and with wonders; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and He has brought us to this place and has given us this land, a land '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
    marker-yv: yv-n
  - type: text
    text: 'flowing with milk and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And now, look, I have brought the first of the produce of the ground which You, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', have given me.’ And you shall place it before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, and shall worship before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and you and the Levite and the stranger (resident alien, foreigner) among you shall rejoice in all the good which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given you and your household.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“When you have finished '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a reference to a benevolence offering given every three years (called the “tithe of the poor” by the ancient rabbis). This was in addition to the “Storehouse Tithe,” brought to the sanctuary and the “Pilgrimage Tithe” used for the expenses of going to Jerusalem three times each year. Together, the OT tithe amounted to a third of the total.
    marker-yv: yv-n
  - type: text
    text: 'paying all the tithe of your produce the third year, [which is] the year of tithing, then you shall give it to the Levite, to the stranger, to the orphan, and to the widow, so that they may eat within the gates of your cities and be satisfied. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You shall say before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, ‘I have removed the sacred '
  - type: usfm
    marker: it
    children:
    - type: text
      text: portion
  - type: text
    text: ' (the tithe) from my house and also have given it to the Levite, to the stranger, to the orphan, and to the widow, in accordance with all that You have commanded me. I have not transgressed or forgotten any of Your commandments. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have not eaten from the tithe while mourning, nor have I removed any of it when I was [ceremonially] unclean [making the tithe ceremonially unclean], nor offered any of it to the dead. I have listened to the voice of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' my God; I have done '
  - type: usfm
    marker: it
    children:
    - type: text
      text: everything
  - type: text
    text: ' in accordance with all that You have commanded me. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Look down from Your holy dwelling above, from heaven, and bless Your people Israel, and the land which You have given us, as You have sworn to our fathers, a land [of plenty] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note v 9.
    marker-yv: yv-n
  - type: text
    text: flowing with milk and honey.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “This day the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God commands you to do these statutes and judgments (precepts). Therefore, you shall be careful to do them with all your heart and with all your soul (your entire being). '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Today you have [openly] declared the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' to be your God, and that you will walk [that is, live each and every day] in His ways and keep His statutes, His commandments, and His judgments (precepts), and listen to His voice. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Today the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has declared that you are His people, His treasured possession, just as He promised you, and that you are to keep all His commandments; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and that He will set you high above all the nations which He has made, for praise, fame, and honor: and that you shall be a holy people [set apart and consecrated] to the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, just as He has spoken.”'
