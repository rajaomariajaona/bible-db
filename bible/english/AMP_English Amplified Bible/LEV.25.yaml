document_id: LEV.25,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Sabbatic Year and Year of Jubilee
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses at Mount Sinai, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And you shall consecrate the fiftieth year and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The quote on the Liberty Bell in Philadelphia is from this verse and reads, “Proclaim liberty throughout all the land unto all the inhabitants thereof.”
      marker-yv: yv-n
    - type: text
      text: 'proclaim freedom [for the slaves] throughout the land to all its inhabitants. It shall be a Jubilee (year of remission) for you, and each of you shall return to his own [ancestral] property [that was sold to another because of poverty], and each of you shall return to his family [from whom he was separated by bondage]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'That fiftieth year shall be a Jubilee for you; you shall not sow [seed], nor reap what reseeds itself, nor gather the grapes of the uncultivated vines. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For it is the Jubilee; it shall be holy to you; you shall eat its crops out of the field.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '‘In this Year of Jubilee each of you shall return to his own [ancestral] property. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If you sell anything to your friend or buy from your friend, you shall not wrong one another. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'According to the number of years after the Jubilee, you shall '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The transfer of land in Israel was more like a lease than an outright purchase. Since all property reverted to the original owner at the Jubilee year, the purchaser would pay a price only for the years of use remaining until the next Jubilee.
      marker-yv: yv-n
    - type: text
      text: 'buy from your friend. And he is to sell to you according to the number of years of crops [which may be harvested before you must restore the property to him]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'If the years [until the next Jubilee] are many, you shall increase the price, but if the years remaining are few, you shall reduce the price, because it is the number of crops that he is selling to you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You shall not wrong one another, but you shall fear your God [with profound reverence]; for I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '‘Therefore you shall carry out My statutes and keep My ordinances and do them, so that you may live securely on the land. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the land will yield its produce, so that you can eat your fill and live securely on it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Speak to the children of Israel and say to them, ‘When you come into the land which I am giving you, then the land shall keep a Sabbath to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And if you say, “What are we going to eat in the seventh year if we do not sow [seed] or gather in our crops?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'then [this is My answer:] I will order My [special] blessing for you in the sixth year, so that it will produce [sufficient] crops for three years. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: When you are sowing the eighth year, you can still eat old things from the crops, eating the old until the ninth year when its crop comes in.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Law of Redemption
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '‘The land shall not be sold permanently, for the land is Mine; you are [only] foreigners and temporary residents with Me. [Heb 11:13; 1 Pet 2:11-17] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So in all the country that you possess, you are to provide for the redemption of the land [in the Year of Jubilee].
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '‘If a fellow countryman of yours becomes so poor he has to sell some of his property, then his nearest relative is to come and buy back (redeem) what his relative has sold. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Or in case a man has no relative [to redeem his property], but he has become more prosperous '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has enough to buy it back, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'then he shall calculate the years since its sale and refund the balance to the man to whom he sold it, and so return to his [ancestral] property. [1 Kin 21:2, 3] '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But if '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: his hand has not found enough
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: he is unable to redeem it, then what he has sold shall remain in the hands of the purchaser until the Year of Jubilee; but at the Jubilee it shall revert, and he may return to his property.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '‘If a man sells a house in a walled city, then his right of redemption remains valid for a full year after its sale; his right of redemption lasts a full year. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For six years you shall sow your field, and for six years you shall prune your vineyard and gather in its crop. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But if it is not redeemed for him within a full year, then the house that is in the walled city passes permanently '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' irrevocably to the purchaser throughout his generations. It does not revert back in the Year of Jubilee. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The houses of the villages that have no surrounding walls, however, shall be considered as open fields. They may be redeemed, and revert in the Year of Jubilee. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'As for the cities of the Levites, the Levites have a permanent right of redemption for the houses in the cities which they possess. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Therefore, what is [purchased] from the Levites may be redeemed [by a Levite], and the house that was sold in the city they possess reverts in the Year of Jubilee, for the houses in the Levite cities are their [ancestral] property among the Israelites. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: But the pasture lands of their cities may not be sold, for that is their permanent possession.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Of Poor Countrymen
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '‘Now if your fellow countryman becomes poor and his hand falters with you [that is, he has trouble repaying you for something], then you are to help '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sustain him, [with courtesy and consideration] like [you would] a stranger or a temporary resident [without property], so that he may live among you. [1 John 3:17] '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Do not charge him usurious interest, but fear your God [with profound reverence], so your countryman may [continue to] live among you. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'You shall not give him your money at interest, nor your food at a profit. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God, who brought you out of the land of Egypt to give you the land of Canaan and to be your God.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '‘And if your fellow countryman becomes so poor [in his dealings] with you that he sells himself to you [as payment for a debt], you shall not let him do the work of a slave [who is ineligible for redemption], '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But in the seventh year there shall be a Sabbath of rest for the land, a Sabbath to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; you shall not sow [seed in] your field nor prune your vineyard. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'but he is to be with you as a hired man, as if he were a temporary resident; he shall serve with you until the Year of Jubilee, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'and then he shall leave you, he and his children with him, and shall go back to his own family and return to the property of his fathers. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'For the Israelites are My servants whom I brought out of the land of Egypt; they shall not be sold in a slave sale. [1 Cor 7:23] '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'You shall not rule over him with harshness (severity, oppression), but you are to fear your God [with profound reverence]. [Eph 6:9; Col 4:1] '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'As for your male and female slaves whom you may have—you may acquire male and female slaves from the pagan nations that are around you. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Moreover, from the children of the strangers who live as aliens among you, from them you may buy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: slaves
    - type: text
      text: ' and from their families who are with you, whom they have produced in your land; they may become your possession. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: You may even bequeath them as an inheritance to your children after you, to receive as a possession; you can use them as permanent slaves. But in respect to your fellow countrymen, the children of Israel, you shall not rule over one another with harshness (severity, oppression).
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Of Redeeming a Poor Man
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: '‘Now if the financial means of a stranger or temporary resident among you become sufficient, and your fellow countryman becomes poor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in comparison
    - type: text
      text: ' to him and sells himself to the stranger who is living among you or to the descendants of the stranger’s family, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'then after he is sold he shall have the right of redemption. One of his relatives may redeem him: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'either his uncle or his uncle’s son may redeem him, or one of his blood relatives from his family may redeem him; or if he prospers, he may redeem himself. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Whatever reseeds itself (uncultivated) in your harvest you shall not reap, nor shall you gather the grapes from your uncultivated vine, it shall be a year of sabbatical rest for the land. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Then he [or his redeemer] shall calculate with his purchaser from the year when he sold himself to the purchaser to the Year of Jubilee, and the [original] price of his sale shall be adjusted according to the number of years. The time he was with his owner shall be considered as that of a hired man. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'If there are still many years [before the Year of Jubilee], in proportion to them he must refund [to the purchaser] part of the price of his sale for his redemption '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' release. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'And if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' a few years remain until the Year of Jubilee, he shall so calculate it with him. He is to refund the proportionate amount for his release. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Like a man hired year by year he shall deal with him; he shall not rule over him with harshness in your sight. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Even if he is not redeemed during these years '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' under these provisions, then he shall go free in the Year of Jubilee, he and his children with him. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: For the children of Israel are My servants; My servants, whom I brought out of the land of Egypt. I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' your God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And all of you shall have for food whatever the [untilled] land produces during its Sabbath year; yourself, and your male and female slaves, your hired servant, and the foreigners who reside among you, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: even your domestic animals and the [wild] animals that are in your land shall have all its crops to eat.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Year of Jubilee
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '‘You are also to count off seven Sabbaths of years for yourself, seven times seven years, so that you have the time of the seven Sabbaths of years, namely, forty-nine years. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then you shall sound the ram’s horn everywhere on the tenth day of the seventh month (almost October); on the Day of Atonement you shall sound the trumpet throughout your land. '
