document_id: JOL.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Nations Will Be Judged
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “For behold, in those [climactic] days and at that time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I restore the fortunes of Judah and Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will gather together all the [Gentile] nations [that were hostile to My people]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And bring them down into the Valley of Jehoshaphat (the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has judged).'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And there I will deal with them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' enter into judgment with them there'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For [their treatment of] My people, My inheritance, Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whom they have scattered among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [because] they have encroached on My land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' divided it up.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “They have also cast lots for My people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have traded a boy for a prostitute
- type: usfm
  marker: q1
  children:
  - type: text
    text: And have sold a girl for wine that they may drink.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moreover, what are you to Me, O Tyre and Sidon and all the [five small] regions of Philistia? Will you pay Me back for something [I have supposedly done to you]? Even if you do pay Me back, I will swiftly and speedily return your deed [of retaliation] on your own head. [Is 23; Ezek 26:1-18; Amos 1:6-10; Zeph 2:4-7; Zech 9:2-7] '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Because you have taken My silver and My gold and have carried My precious treasures to your temples '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' palaces, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and have sold the children of Judah and the children of Jerusalem to the Greeks, so that you may send them far away from their territory, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'behold, I am going to stir them up from the place where you have sold them [and return them to their land], and I shall return your action [of retaliation] on your own head. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Also I will sell your sons and your daughters into the hand of the children of Judah, and they will sell them to the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some archeologists believe this to be the ancient kingdom of Sheba (modern day Yemen). The Sabeans were involved primarily in the lucrative spice trade.
    marker-yv: yv-n
  - type: text
    text: Sabeans, to a distant nation,” for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken. [Is 14:2; 60:14]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '¶Proclaim this among the [pagan] nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prepare a war! Stir up the mighty men!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all the men of war come near, let them come up!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Beat your plowshares into swords
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your pruning hooks into spears;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the weak say, “I am strong!” [Is 2:4; Mic 4:3]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hurry and come, all you surrounding nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gather yourselves there;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring down, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', Your mighty ones (Your warriors).'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let the nations be stirred [to action]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And come up to the Valley of Jehoshaphat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For there I will sit to judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the surrounding nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Put in the sickle [of judgment], for the harvest is ripe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come, tread [the grapes], for the wine press is full;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The vats overflow, for the wickedness [of the people] is great. [Mark 4:29; Rev 14:15, 18-20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Multitudes, multitudes in the valley of decision (judgment)!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the day of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is near in the valley of decision [when judgment is executed]. [Zech 14:1-9]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The sun and the moon grow dark
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the stars lose their brightness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' thunders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' roars from Zion'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And utters His voice from Jerusalem [in judgment of His enemies],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the heavens and the earth tremble '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shudder;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' is a refuge for His people'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a stronghold [of protection] to the children of Israel. [Amos 9:11-15; Mic 4:1-3; 5:2; Zeph 3:13-20; Zech 6:12, 13; 12:8, 9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then you will know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' understand fully that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dwelling in Zion, My holy mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then Jerusalem will be holy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And strangers [who do not belong] will no longer pass through it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah Will Be Blessed
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶And in that day
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mountains will drip with sweet wine
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the hills will flow with milk;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And all the brooks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' riverbeds of Judah will flow with water,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a fountain will go out from the house of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: To water the [desert] Valley of Shittim. [Ezek 47:1-12; Amos 9:13; Zech 14:8]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Egypt will become a waste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Edom will become a desolate wilderness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of their violence against the children of Judah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In whose land they have shed innocent blood. [Ex 1:16; Amos 1:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But Judah shall be inhabited forever
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Jerusalem from generation to generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And I shall avenge their blood which I have not avenged,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' dwells in Zion.'
