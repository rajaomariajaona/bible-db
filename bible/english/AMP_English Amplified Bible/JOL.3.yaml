document_id: JOL.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: The Nations Will Be Judged
  - type: text
    content: “For behold, in those [climactic] days and at that time,
  - type: text
    content: When I restore the fortunes of Judah and Jerusalem,
  '10':
  - type: text
    content: Beat your plowshares into swords
  - type: text
    content: And your pruning hooks into spears;
  - type: text
    content: Let the weak say, “I am strong!” [Is 2:4; Mic 4:3]
  '11':
  - type: text
    content: Hurry and come, all you surrounding nations,
  - type: text
    content: And gather yourselves there;
  - type: text
    content: Bring down, O L
  - type: heading
    content: ord
  - type: text
    content: ', Your mighty ones (Your warriors).'
  '12':
  - type: text
    content: Let the nations be stirred [to action]
  - type: text
    content: And come up to the Valley of Jehoshaphat,
  - type: text
    content: 'For there I will sit to judge '
  - type: text
    content: and
  - type: text
    content: ' punish'
  - type: text
    content: All the surrounding nations.
  '13':
  - type: text
    content: Put in the sickle [of judgment], for the harvest is ripe;
  - type: text
    content: Come, tread [the grapes], for the wine press is full;
  - type: text
    content: The vats overflow, for the wickedness [of the people] is great. [Mark 4:29; Rev 14:15, 18-20]
  '14':
  - type: text
    content: Multitudes, multitudes in the valley of decision (judgment)!
  - type: text
    content: For the day of the L
  - type: heading
    content: ord
  - type: text
    content: ' is near in the valley of decision [when judgment is executed]. [Zech 14:1-9]'
  '15':
  - type: text
    content: The sun and the moon grow dark
  - type: text
    content: And the stars lose their brightness.
  '16':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' thunders '
  - type: text
    content: and
  - type: text
    content: ' roars from Zion'
  - type: text
    content: And utters His voice from Jerusalem [in judgment of His enemies],
  - type: text
    content: 'And the heavens and the earth tremble '
  - type: text
    content: and
  - type: text
    content: ' shudder;'
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' is a refuge for His people'
  - type: text
    content: And a stronghold [of protection] to the children of Israel. [Amos 9:11-15; Mic 4:1-3; 5:2; Zeph 3:13-20; Zech 6:12, 13; 12:8, 9]
  '17':
  - type: text
    content: 'Then you will know '
  - type: text
    content: and
  - type: text
    content: ' understand fully that I am the L'
  - type: heading
    content: ord
  - type: text
    content: ' your God,'
  - type: text
    content: Dwelling in Zion, My holy mountain.
  - type: text
    content: Then Jerusalem will be holy,
  - type: text
    content: And strangers [who do not belong] will no longer pass through it.
  - type: heading
    content: Judah Will Be Blessed
  '18':
  - type: text
    content: ¶And in that day
  - type: text
    content: The mountains will drip with sweet wine
  - type: text
    content: And the hills will flow with milk;
  - type: text
    content: 'And all the brooks '
  - type: text
    content: and
  - type: text
    content: ' riverbeds of Judah will flow with water,'
  - type: text
    content: And a fountain will go out from the house of the L
  - type: heading
    content: ord
  - type: text
    content: To water the [desert] Valley of Shittim. [Ezek 47:1-12; Amos 9:13; Zech 14:8]
  '19':
  - type: text
    content: Egypt will become a waste,
  - type: text
    content: And Edom will become a desolate wilderness,
  - type: text
    content: Because of their violence against the children of Judah,
  - type: text
    content: In whose land they have shed innocent blood. [Ex 1:16; Amos 1:11]
  '2':
  - type: text
    content: I will gather together all the [Gentile] nations [that were hostile to My people]
  - type: text
    content: And bring them down into the Valley of Jehoshaphat (the L
  - type: heading
    content: ord
  - type: text
    content: ' has judged).'
  - type: text
    content: 'And there I will deal with them '
  - type: text
    content: and
  - type: text
    content: ' enter into judgment with them there'
  - type: text
    content: For [their treatment of] My people, My inheritance, Israel,
  - type: text
    content: Whom they have scattered among the nations,
  - type: text
    content: 'And [because] they have encroached on My land '
  - type: text
    content: and
  - type: text
    content: ' divided it up.'
  '20':
  - type: text
    content: But Judah shall be inhabited forever
  - type: text
    content: And Jerusalem from generation to generation.
  '21':
  - type: text
    content: And I shall avenge their blood which I have not avenged,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' dwells in Zion.'
  '3':
  - type: text
    content: “They have also cast lots for My people,
  - type: text
    content: And have traded a boy for a prostitute
  - type: text
    content: And have sold a girl for wine that they may drink.
  '4':
  - type: text
    content: 'Moreover, what are you to Me, O Tyre and Sidon and all the [five small] regions of Philistia? Will you pay Me back for something [I have supposedly done to you]? Even if you do pay Me back, I will swiftly and speedily return your deed [of retaliation] on your own head. [Is 23; Ezek 26:1-18; Amos 1:6-10; Zeph 2:4-7; Zech 9:2-7] '
  '5':
  - type: text
    content: 'Because you have taken My silver and My gold and have carried My precious treasures to your temples '
  - type: text
    content: and
  - type: text
    content: ' palaces, '
  '6':
  - type: text
    content: 'and have sold the children of Judah and the children of Jerusalem to the Greeks, so that you may send them far away from their territory, '
  '7':
  - type: text
    content: 'behold, I am going to stir them up from the place where you have sold them [and return them to their land], and I shall return your action [of retaliation] on your own head. '
  '8':
  - type: text
    content: 'Also I will sell your sons and your daughters into the hand of the children of Judah, and they will sell them to the '
  - type: note
    content: Some archeologists believe this to be the ancient kingdom of Sheba (modern day Yemen). The Sabeans were involved primarily in the lucrative spice trade.
  - type: text
    content: Sabeans, to a distant nation,” for the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken. [Is 14:2; 60:14]'
  '9':
  - type: text
    content: '¶Proclaim this among the [pagan] nations:'
  - type: text
    content: Prepare a war! Stir up the mighty men!
  - type: text
    content: Let all the men of war come near, let them come up!
