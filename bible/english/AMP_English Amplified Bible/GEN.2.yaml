        children:
        - type: text
          text: flow of water
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'mist (fog, dew, vapor) used to rise from the land and water the entire surface of the ground— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: then the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The word is “formed” (Heb '
      - type: usfm
        marker: it
        children:
        - type: text
