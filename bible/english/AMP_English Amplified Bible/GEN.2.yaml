    marker-yv: yv-n
  - type: text
    text: 'formed [that is, created the body of] man from the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The essential chemical elements found in soil are also found in humans and animals. This scientific fact was not discovered until recent times, but God is displaying it here.
    marker-yv: yv-n
  - type: text
    text: 'dust of the ground, and breathed into his nostrils the breath of life; and the man became a living being [an individual complete in body and spirit]. [1 Cor 15:45-49] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a reference, not to the creation of plant life in general, but to the planting of specific plants in the Garden of Eden (2:8, 9).
    marker-yv: yv-n
  - type: text
    text: 'planted a garden (oasis) in the east, in Eden (delight, land of happiness); and He put the man whom He had formed (created) there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And [in that garden] the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God caused to grow from the ground every tree that is desirable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' pleasing to the sight and good (suitable, pleasant) for food; the tree of life was also in the midst of the garden, and the tree of the [experiential] knowledge (recognition) of [the difference between] good and evil. [Rev 2:7; 22:14, 19]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now a river flowed out of Eden to water the garden; and from there it divided and became four [branching] rivers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The first [river] is named Pishon; it flows around the entire land of Havilah, where there is gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The gold of that land is good; bdellium (a fragrant, valuable resin) and the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is often difficult to match the names or descriptions of ancient gems and other materials with their contemporary equivalents. Modern research indicates this may instead be carnelian, a red gemstone.
    marker-yv: yv-n
  - type: text
    text: 'onyx stone are found there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The name of the second river is Gihon; it flows around the entire land of Cush [in Mesopotamia]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The third river is named Hiddekel (Tigris); it flows east of Assyria. And the fourth river is the Euphrates.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God took the man [He had made] and settled him in the Garden of Eden to cultivate and keep it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God commanded the man, saying, “You may freely (unconditionally) eat [the fruit] from every tree of the garden; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'but [only] from the tree of the knowledge (recognition) of good and evil you shall not eat, otherwise on the day that you eat from it, you shall most certainly '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both spiritually and physically, physical death in the sense of becoming mortal; they were created immortal.
    marker-yv: yv-n
  - type: text
    text: die [because of your disobedience].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God said, “It is not good (beneficial) for the man to be alone; I will make him a helper [one who balances him—a counterpart who is] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: like his opposite
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'suitable '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' complementary for him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God formed out of the ground every animal of the field and every bird of the air, and brought them to Adam to see what he would call them; and whatever the man called a living creature, that was its name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the man gave names to all the livestock, and to the birds of the air, and to every animal of the field; but for Adam there was not found a helper [that was] suitable (a companion) for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God caused a deep sleep to fall upon Adam; and while he slept, He took one of his ribs and closed up the flesh at that place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And the rib which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God had taken from the man He made (fashioned, formed) into a woman, and He brought her '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' presented her to the man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Adam said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This is now bone of my bones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And flesh of my flesh;
- type: usfm
  marker: q1
  children:
  - type: text
    text: She shall be called Woman,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because she was taken out of Man.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For this reason a man shall leave his father and his mother, and shall be joined to his wife; and they shall become one flesh. [Matt 19:5; 1 Cor 6:16; Eph 5:31-33] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And the man and his wife were both naked and were not ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' embarrassed.'
