verses:
  '1':
  - type: heading
    content: The Creation of Man and Woman
  - type: text
    content: 'So the heavens and the earth were completed, and all their hosts (inhabitants). '
  '10':
  - type: text
    content: 'Now a river flowed out of Eden to water the garden; and from there it divided and became four [branching] rivers. '
  '11':
  - type: text
    content: 'The first [river] is named Pishon; it flows around the entire land of Havilah, where there is gold. '
  '12':
  - type: text
    content: 'The gold of that land is good; bdellium (a fragrant, valuable resin) and the '
  - type: note
    content: It is often difficult to match the names or descriptions of ancient gems and other materials with their contemporary equivalents. Modern research indicates this may instead be carnelian, a red gemstone.
  - type: text
    content: 'onyx stone are found there. '
  '13':
  - type: text
    content: 'The name of the second river is Gihon; it flows around the entire land of Cush [in Mesopotamia]. '
  '14':
  - type: text
    content: The third river is named Hiddekel (Tigris); it flows east of Assyria. And the fourth river is the Euphrates.
  '15':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' God took the man [He had made] and settled him in the Garden of Eden to cultivate and keep it. '
  '16':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' God commanded the man, saying, “You may freely (unconditionally) eat [the fruit] from every tree of the garden; '
  '17':
  - type: text
    content: 'but [only] from the tree of the knowledge (recognition) of good and evil you shall not eat, otherwise on the day that you eat from it, you shall most certainly '
  - type: note
    content: Both spiritually and physically, physical death in the sense of becoming mortal; they were created immortal.
  - type: text
    content: die [because of your disobedience].”
  '18':
  - type: text
    content: Now the L
  - type: heading
    content: ord
  - type: text
    content: ' God said, “It is not good (beneficial) for the man to be alone; I will make him a helper [one who balances him—a counterpart who is] '
  - type: note
    content: Lit like his opposite.
  - type: text
    content: 'suitable '
  - type: text
    content: and
  - type: text
    content: ' complementary for him.” '
  '19':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' God formed out of the ground every animal of the field and every bird of the air, and brought them to Adam to see what he would call them; and whatever the man called a living creature, that was its name. '
  '2':
  - type: text
    content: 'And by the seventh day God completed His work which He had done, and He rested (ceased) on the seventh day from all His work which He had done. [Heb 4:9, 10] '
  '20':
  - type: text
    content: 'And the man gave names to all the livestock, and to the birds of the air, and to every animal of the field; but for Adam there was not found a helper [that was] suitable (a companion) for him. '
  '21':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' God caused a deep sleep to fall upon Adam; and while he slept, He took one of his ribs and closed up the flesh at that place. '
  '22':
  - type: text
    content: And the rib which the L
  - type: heading
    content: ord
  - type: text
    content: ' God had taken from the man He made (fashioned, formed) into a woman, and He brought her '
  - type: text
    content: and
  - type: text
    content: ' presented her to the man. '
  '23':
  - type: text
    content: Then Adam said,
  - type: text
    content: “This is now bone of my bones,
  - type: text
    content: And flesh of my flesh;
  - type: text
    content: She shall be called Woman,
  - type: text
    content: Because she was taken out of Man.”
  '24':
  - type: text
    content: 'For this reason a man shall leave his father and his mother, and shall be joined to his wife; and they shall become one flesh. [Matt 19:5; 1 Cor 6:16; Eph 5:31-33] '
  '25':
  - type: text
    content: 'And the man and his wife were both naked and were not ashamed '
  - type: text
    content: or
  - type: text
    content: ' embarrassed.'
  '3':
  - type: text
    content: So God blessed the seventh day and sanctified it [as His own, that is, set it apart as holy from other days], because in it He rested from all His work which He had created and done. [Ex 20:11]
  '4':
  - type: text
    content: 'This is the history of [the origin of] the heavens and of the earth when they were created, in the day [that is, days of creation] that the '
  - type: note
    content: Heb YHWH (Yahweh), the Hebrew name of God which traditionally is not pronounced by the Jews, usually rendered Lord. See front material, Principles of Translation.
  - type: text
    content: L
  - type: heading
    content: ord
  - type: text
    content: ' God made the earth and the heavens— '
  '5':
  - type: text
    content: 'no shrub '
  - type: text
    content: or
  - type: text
    content: ' plant of the field was yet in the earth, and no herb of the field had yet sprouted, for the L'
  - type: heading
    content: ord
  - type: text
    content: ' God had not caused it to rain on the earth, and there was no man to '
  - type: note
    content: Lit work.
  - type: text
    content: 'cultivate the ground, '
  '6':
  - type: text
    content: 'but a '
  - type: note
    content: Or flow of water.
  - type: text
    content: 'mist (fog, dew, vapor) used to rise from the land and water the entire surface of the ground— '
  '7':
  - type: text
    content: then the L
  - type: heading
    content: ord
  - type: text
    content: ' God '
  - type: note
    content: The word is “formed” (Heb yatsar), but in 1:26, 27 the action is described with the Hebrew word “created” (Heb bara).
  - type: text
    content: 'formed [that is, created the body of] man from the '
  - type: note
    content: The essential chemical elements found in soil are also found in humans and animals. This scientific fact was not discovered until recent times, but God is displaying it here.
  - type: text
    content: 'dust of the ground, and breathed into his nostrils the breath of life; and the man became a living being [an individual complete in body and spirit]. [1 Cor 15:45-49] '
  '8':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' God '
  - type: note
    content: This is a reference, not to the creation of plant life in general, but to the planting of specific plants in the Garden of Eden (2:8, 9).
  - type: text
    content: 'planted a garden (oasis) in the east, in Eden (delight, land of happiness); and He put the man whom He had formed (created) there. '
  '9':
  - type: text
    content: And [in that garden] the L
  - type: heading
    content: ord
  - type: text
    content: ' God caused to grow from the ground every tree that is desirable '
  - type: text
    content: and
  - type: text
    content: ' pleasing to the sight and good (suitable, pleasant) for food; the tree of life was also in the midst of the garden, and the tree of the [experiential] knowledge (recognition) of [the difference between] good and evil. [Rev 2:7; 22:14, 19]'
