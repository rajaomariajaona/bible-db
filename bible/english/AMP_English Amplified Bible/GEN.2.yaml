    marker-yv: yv-n
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God made the earth and the heavens— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'no shrub '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' plant of the field was yet in the earth, and no herb of the field had yet sprouted, for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God had not caused it to rain on the earth, and there was no man to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
