    children:
    - type: text
      text: '1'
  - type: text
    text: 'So the heavens and the earth were completed, and all their hosts (inhabitants). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And by the seventh day God completed His work which He had done, and He rested (ceased) on the seventh day from all His work which He had done. [Heb 4:9, 10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So God blessed the seventh day and sanctified it [as His own, that is, set it apart as holy from other days], because in it He rested from all His work which He had created and done. [Ex 20:11]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is the history of [the origin of] the heavens and of the earth when they were created, in the day [that is, days of creation] that the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
