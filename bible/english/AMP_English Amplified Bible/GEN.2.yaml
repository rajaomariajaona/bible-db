        children:
        - type: text
          text: work
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'cultivate the ground, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
