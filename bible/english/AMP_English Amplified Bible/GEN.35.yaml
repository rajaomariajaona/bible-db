verses:
  '1':
  - type: heading
    content: Jacob Moves to Bethel
  - type: text
    content: 'Then God said to Jacob, “Go up to Bethel and live there, and make an altar there to God, who appeared to you [in a distinct manifestation] when you fled [years ago] from Esau your brother.” [Gen 28:11-22] '
  '10':
  - type: text
    content: Again God said to him,
  - type: text
    content: “Your name is Jacob;
  - type: text
    content: You shall no longer be called Jacob,
  - type: text
    content: But Israel shall be your name.”
  - type: text
    content: 'So he was called '
  - type: note
    content: “He who strives with God” or “God strives” or “Prince of God.”
  - type: text
    content: 'Israel. '
  '11':
  - type: text
    content: And God said to him,
  - type: text
    content: '“I am '
  - type: note
    content: Heb El Shaddai, the sufficient and powerful One.
  - type: text
    content: God Almighty.
  - type: text
    content: Be fruitful and multiply;
  - type: text
    content: A nation and a company of nations shall come from you,
  - type: text
    content: 'And kings shall be born of your '
  - type: note
    content: The midsection of the body between the lower ribs and the hips. Often a euphemism for the human genitals.
  - type: text
    content: loins.
  '12':
  - type: text
    content: “The land which I gave Abraham and Isaac
  - type: text
    content: I will give to you,
  - type: text
    content: and to your descendants after you I will give the land.”
  '13':
  - type: text
    content: 'Then God ascended from Jacob in the place where He had spoken with him. '
  '14':
  - type: text
    content: 'Jacob set up a pillar (memorial, monument) in the place where he had talked with God, a pillar of stone, and he poured a drink offering [of wine] on it; he also poured oil on it [to declare it sacred for God’s purpose]. '
  '15':
  - type: text
    content: So Jacob named the place where God had spoken with him, Bethel (the House of God).
  '16':
  - type: text
    content: 'Then they journeyed from Bethel; and when there was still some distance to go to Ephrath (Bethlehem), Rachel began to give birth and had difficulty '
  - type: text
    content: and
  - type: text
    content: ' suffered severely. '
  '17':
  - type: text
    content: 'When she was in hard labor the midwife said to her, “Do not be afraid; you now have another son.” '
  '18':
  - type: text
    content: And as her soul was departing, (for she died), she named him Ben-oni (son of my sorrow); but his father called him Benjamin (
  - type: note
    content: This had a positive meaning, like a “right-hand man,” a son in a position of importance and honor.
  - type: text
    content: 'son of the right hand). '
  '19':
  - type: text
    content: 'So Rachel died and was buried on the way to Ephrath (that is, Bethlehem). '
  '2':
  - type: text
    content: 'Then Jacob said to his household and to all who were with him, “Get rid of the [idols and images of] foreign gods that are among you, and ceremonially purify yourselves and change [into fresh] clothes; '
  '20':
  - type: text
    content: 'Jacob set a pillar (memorial, monument) on her grave; that is the '
  - type: note
    content: This pillar was still visible at the time when Moses lived.
  - type: text
    content: 'pillar of Rachel’s grave to this day. '
  '21':
  - type: text
    content: Then Israel (Jacob) journeyed on and pitched his tent on the other side of the tower of Eder [the lookout point used by shepherds].
  '22':
  - type: text
    content: 'While Israel was living in that land, Reuben [his eldest son] went and lay with Bilhah his father’s '
  - type: note
    content: See note 22:24.
  - type: text
    content: concubine, and Israel heard about it.
  - type: heading
    content: The Sons of Israel
  - type: text
    content: N
  - type: text
    content: 'ow Jacob had twelve sons— '
  '23':
  - type: text
    content: 'The sons of Leah: Reuben, Jacob’s firstborn, then Simeon, Levi, Judah, Issachar, and Zebulun; '
  '24':
  - type: text
    content: 'and the sons of Rachel: Joseph and Benjamin; '
  '25':
  - type: text
    content: 'and the sons of Bilhah, Rachel’s maid: Dan and Naphtali; '
  '26':
  - type: text
    content: 'and the sons of Zilpah, Leah’s maid: Gad and Asher. These are the sons of Jacob born to him in Paddan-aram.'
  '27':
  - type: text
    content: Jacob came to Isaac his father at Mamre of Kiriath-arba (that is, Hebron), where Abraham and Isaac had lived temporarily.
  '28':
  - type: text
    content: 'Now the days of Isaac were a hundred and eighty years. '
  '29':
  - type: text
    content: 'Isaac’s spirit departed and he died and was '
  - type: note
    content: See note 25:8.
  - type: text
    content: gathered to his people [who had preceded him in death], an old man full of days (satisfied, fulfilled); his sons Esau and Jacob buried him [in the cave of Machpelah with his parents Abraham and Sarah].
  '3':
  - type: text
    content: 'then let us get up and go up to Bethel, and I will make an altar there to God, who answered me in the day of my distress and has been with me wherever I have gone.” '
  '4':
  - type: text
    content: 'So they gave Jacob all the [idols and images of the] foreign gods they had and the rings which were in their ears [worn as charms against evil], and Jacob buried them under the '
  - type: note
    content: This appears to have been a special tree of uncertain type, perhaps a terebinth tree that had significance for pagan worship.
  - type: text
    content: oak tree near Shechem.
  '5':
  - type: text
    content: 'As they journeyed, there was a great [supernatural] terror [sent from God] on the cities around them, and [for that reason] the Canaanites did not pursue the sons of Jacob. '
  '6':
  - type: text
    content: 'So Jacob came to Luz (that is, Bethel), which is in the land of Canaan, he and all the people who were with him. '
  '7':
  - type: text
    content: There he built an altar [to worship the L
  - type: heading
    content: ord
  - type: text
    content: '], and called the place El-bethel (God of the House of God), because there God had revealed Himself to him when he escaped from his brother. '
  '8':
  - type: text
    content: Now Deborah, [who once was] Rebekah’s nurse, died and was buried below Bethel under the oak; and the name of it was called Allon-bacuth (Oak of Weeping).
  - type: heading
    content: Jacob Is Named Israel
  '9':
  - type: text
    content: 'Then God [in a visible manifestation] appeared to Jacob again when he came out of Paddan-aram, and declared a blessing on him. [Gen 32:28] '
