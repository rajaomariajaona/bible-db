document_id: GEN.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Moves to Bethel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then God said to Jacob, “Go up to Bethel and live there, and make an altar there to God, who appeared to you [in a distinct manifestation] when you fled [years ago] from Esau your brother.” [Gen 28:11-22] '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Jacob said to his household and to all who were with him, “Get rid of the [idols and images of] foreign gods that are among you, and ceremonially purify yourselves and change [into fresh] clothes; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'then let us get up and go up to Bethel, and I will make an altar there to God, who answered me in the day of my distress and has been with me wherever I have gone.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they gave Jacob all the [idols and images of the] foreign gods they had and the rings which were in their ears [worn as charms against evil], and Jacob buried them under the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This appears to have been a special tree of uncertain type, perhaps a terebinth tree that had significance for pagan worship.
    marker-yv: yv-n
  - type: text
    text: oak tree near Shechem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As they journeyed, there was a great [supernatural] terror [sent from God] on the cities around them, and [for that reason] the Canaanites did not pursue the sons of Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Jacob came to Luz (that is, Bethel), which is in the land of Canaan, he and all the people who were with him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There he built an altar [to worship the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '], and called the place El-bethel (God of the House of God), because there God had revealed Himself to him when he escaped from his brother. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now Deborah, [who once was] Rebekah’s nurse, died and was buried below Bethel under the oak; and the name of it was called Allon-bacuth (Oak of Weeping).
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob Is Named Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then God [in a visible manifestation] appeared to Jacob again when he came out of Paddan-aram, and declared a blessing on him. [Gen 32:28] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Again God said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your name is Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You shall no longer be called Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Israel shall be your name.”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'So he was called '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “He who strives with God” or “God strives” or “Prince of God.”
    marker-yv: yv-n
  - type: text
    text: 'Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And God said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai,
      - type: text
        text: ' the sufficient and powerful One.'
    marker-yv: yv-n
  - type: text
    text: God Almighty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be fruitful and multiply;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A nation and a company of nations shall come from you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And kings shall be born of your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The midsection of the body between the lower ribs and the hips. Often a euphemism for the human genitals.
    marker-yv: yv-n
  - type: text
    text: loins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “The land which I gave Abraham and Isaac
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to your descendants after you I will give the land.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then God ascended from Jacob in the place where He had spoken with him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob set up a pillar (memorial, monument) in the place where he had talked with God, a pillar of stone, and he poured a drink offering [of wine] on it; he also poured oil on it [to declare it sacred for God’s purpose]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So Jacob named the place where God had spoken with him, Bethel (the House of God).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then they journeyed from Bethel; and when there was still some distance to go to Ephrath (Bethlehem), Rachel began to give birth and had difficulty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' suffered severely. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When she was in hard labor the midwife said to her, “Do not be afraid; you now have another son.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And as her soul was departing, (for she died), she named him Ben-oni (son of my sorrow); but his father called him Benjamin (
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This had a positive meaning, like a “right-hand man,” a son in a position of importance and honor.
    marker-yv: yv-n
  - type: text
    text: 'son of the right hand). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Rachel died and was buried on the way to Ephrath (that is, Bethlehem). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jacob set a pillar (memorial, monument) on her grave; that is the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This pillar was still visible at the time when Moses lived.
    marker-yv: yv-n
  - type: text
    text: 'pillar of Rachel’s grave to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Israel (Jacob) journeyed on and pitched his tent on the other side of the tower of Eder [the lookout point used by shepherds].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'While Israel was living in that land, Reuben [his eldest son] went and lay with Bilhah his father’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 22:24.
    marker-yv: yv-n
  - type: text
    text: concubine, and Israel heard about it.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Sons of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: N
  - type: text
    text: 'ow Jacob had twelve sons— '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Leah: Reuben, Jacob’s firstborn, then Simeon, Levi, Judah, Issachar, and Zebulun; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and the sons of Rachel: Joseph and Benjamin; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'and the sons of Bilhah, Rachel’s maid: Dan and Naphtali; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and the sons of Zilpah, Leah’s maid: Gad and Asher. These are the sons of Jacob born to him in Paddan-aram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jacob came to Isaac his father at Mamre of Kiriath-arba (that is, Hebron), where Abraham and Isaac had lived temporarily.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now the days of Isaac were a hundred and eighty years. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Isaac’s spirit departed and he died and was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note 25:8.
    marker-yv: yv-n
  - type: text
    text: gathered to his people [who had preceded him in death], an old man full of days (satisfied, fulfilled); his sons Esau and Jacob buried him [in the cave of Machpelah with his parents Abraham and Sarah].
