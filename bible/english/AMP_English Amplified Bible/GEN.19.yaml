document_id: GEN.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Doom of Sodom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was evening when the two angels came to Sodom. Lot was sitting at Sodom’s [
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In ancient times this was the primary place of commerce and legal business.
      marker-yv: yv-n
    - type: text
      text: 'city] gate. Seeing them, Lot got up to meet them and bowed down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with his
    - type: text
      text: ' face to the ground. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men (angels) reached out with their hands and pulled Lot into the house with them, and shut the door [after him]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They struck (punished) the men who were at the doorway of the house with blindness, from the young men to the old men, so that they exhausted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: themselves trying
    - type: text
      text: ' to find the doorway.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the [two] men (angels) asked Lot, “Have you any others here [in Sodom]—a son-in-law, and your sons, and your daughters? Whomever you have in the city, take them out of here; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for we are destroying this place, because the outcry [for judgment] against them has grown so great before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has sent us to destroy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' ruin it.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Lot went out and spoke to his sons-in-law, who were [betrothed, and legally promised] to marry his daughters, and said, “Get up, get out of this place, for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is about to destroy this city!” But to his sons-in-law he appeared to be joking.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When morning dawned, the angels urged Lot [to hurry], saying, “Get up! Take your wife and two daughters who are here [and go], or you will be swept away in the punishment of the city.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Lot hesitated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lingered. The men took hold of his hand and the hand of his wife and the hands of his two daughters, because the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was merciful to him [for Abraham’s sake]; and they brought him out, and left him outside the city [with his family]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had brought them outside, one [of the angels] said, “Escape for your life! Do not look behind you, or stop anywhere in the entire valley; escape to the mountains [of Moab], or you will be consumed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' swept away.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Lot said to them, “Oh no, [not that place] my lords! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please listen, your servant has found favor in your sight, and you have magnified your lovingkindness (mercy) to me by saving my life; but I cannot escape to the mountains, because the disaster will overtake me and I will be killed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “See here, my lords, please turn aside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' come into your servant’s house, and spend the night, and wash your feet; then you may get up early and go on your way.” But they said, “No, we shall spend the night in the open plaza [of the city].” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now look, this town [in the distance] is near '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enough for us
    - type: text
      text: ' to flee to, and it is small [with only a few people]. Please, let me escape there (is it not small?) so that my life will be saved.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the angel said to him, “Behold, I grant you this request also; I will not destroy this town of which you have spoken. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hurry and take refuge there, for I cannot do anything [to punish Sodom] until you arrive there.” For this reason the town was named Zoar (few, small).
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sun had risen over the earth when Lot came to Zoar. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rained down brimstone (flaming sulfur) and fire on Sodom and on Gomorrah from the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' out of heaven, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and He overthrew (demolished, ended) those cities, and the entire valley, and all the inhabitants of the cities, and whatever grew on the ground. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Lot’s wife, from behind him, [foolishly, longingly] looked [back toward Sodom in an act of disobedience], and she '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lot’s wife not only “looked back” to where her interests were, but perhaps lingered behind and was overtaken by the fire and brimstone; her dead body likely became continually encrusted with salt since this disaster occurred in the salt-rich area around the Dead Sea.
      marker-yv: yv-n
    - type: text
      text: became a pillar of salt. [Luke 17:32]
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham started out early the next morning to the place where he [only the day before] had stood before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he looked down toward Sodom and Gomorrah, and toward all the land of the valley [of the Dead Sea]; and he saw, and behold, the smoke of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Not only were Sodom and Gomorrah blazing ruins, but also Admah and Zeboiim (Deut 29:23; Hos 11:8), as well as all the towns in the Valley of Siddim; Zoar was the lone exception.
      marker-yv: yv-n
    - type: text
      text: the land went up like the smoke of a kiln (pottery furnace).
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when God ravaged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed the cities of the plain [of Siddim], He remembered Abraham [and for that reason], and He sent [Abraham’s nephew] Lot out of the midst of the destruction, when He destroyed the cities in which Lot had lived.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lot Is Debased
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, Lot strongly urged them, so they turned aside and entered his house; and he prepared a feast for them [with wine], and baked unleavened bread, and they ate. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Lot went up from Zoar, and lived in the mountain together with his two daughters, for he was afraid to stay [any longer] in Zoar; and he lived in a cave with his two daughters. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The firstborn said to the younger, “Our father is aging, and there is not a man on earth [available] to be intimate with us in the customary way [so that we may have children]. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come, let us make our father drunk with wine, and we will lie with him so that we may preserve our family through our father.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they gave their father wine that night, and the firstborn went in and lay with her father; and he did not know when she lay down or when she got up [because he was completely intoxicated]. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the next day, the firstborn said to the younger, “Behold, I lay with my father last night; let us make him drunk with wine tonight also, and then you go in and lie with him, so that we may preserve our family through our father.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they gave their father wine that night also, and the younger got up and lay with him; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again
    - type: text
      text: ' he did not know when she lay down or when she got up. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus both the daughters of Lot conceived by their father. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The firstborn gave birth to a son, and named him Moab (from father); he is the father of the Moabites to this day. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The younger also gave birth to a son and named him Ben-ammi (son of my people); he is the father of the Ammonites to this day.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But before they lay down [to sleep], the men of the city, the men of Sodom, both young and old, surrounded the house, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The emphasis in the text that all the men of Sodom came reveals the depth of their depravity.
      marker-yv: yv-n
    - type: text
      text: 'all the men from every quarter; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they called out to Lot and said to him, “Where are the men who came to you tonight? Bring them out to us so that we may know them [intimately].” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Lot went out of the doorway to the men, and shut the door after him, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, “Please, my brothers, do not do something so wicked. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See here, I have two daughters who have not known a man [intimately]; please let me bring them out to you [instead], and you can do as you please with them; only do nothing to these men, because they have in fact come under the shelter of my roof [for protection].” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they said, “Get out of the way!” And they said, “This man (Lot) came [as an outsider] to live here temporarily, and now he is acting like a judge. Now we will treat you worse than your visitors!” So they rushed forward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' pressed violently against '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the man
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lot and came close to breaking down the door [of his house]. '
