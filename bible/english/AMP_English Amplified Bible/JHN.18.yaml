  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I told you that I am '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He;
    - type: text
      text: ' so if you want Me, let these men go on their way.”'
  - type: text
    text: ' '
