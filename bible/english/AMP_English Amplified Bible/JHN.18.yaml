    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most of the time this was a dry stream bed (wadi), but the winter rains would turn it into a torrent of water. The ravine separated Jerusalem from the Mount of Olives. In the OT King David took this same route while escaping from Jerusalem to the Mount of Olives, after he was betrayed by Absalom and Ahithophel (2 Sam 15:23).
    marker-yv: yv-n
  - type: text
    text: 'ravine of the Kidron. There was a garden there, which He and His disciples entered. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now Judas, who was betraying Him, knew the place, because Jesus had often met there with His disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Judas, having obtained the '
