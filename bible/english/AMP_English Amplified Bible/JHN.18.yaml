document_id: JHN.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judas Betrays Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Having said these things, Jesus left with His disciples and went across the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most of the time this was a dry stream bed (wadi), but the winter rains would turn it into a torrent of water. The ravine separated Jerusalem from the Mount of Olives. In the OT King David took this same route while escaping from Jerusalem to the Mount of Olives, after he was betrayed by Absalom and Ahithophel (2 Sam 15:23).
      marker-yv: yv-n
    - type: text
      text: 'ravine of the Kidron. There was a garden there, which He and His disciples entered. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Simon Peter, who had a sword, drew it and struck the high priest’s servant, cutting off his right ear. The servant’s name was Malchus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Jesus said to Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Put the sword
    - type: text
      text: ' [back] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in its sheath! Shall I not drink the cup which My Father has given Me?”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus before Annas and Caiaphas
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So the cohort and their commander and the officers of the Jews arrested Jesus and bound Him, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and led Him to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 11:49.
      marker-yv: yv-n
    - type: text
      text: 'Annas first; for he was the father-in-law of Caiaphas, who was high priest that year. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: It was Caiaphas who had advised the Jews that it was expedient for one man to die on behalf of the people. [John 11:49, 50]
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Simon Peter and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most likely John, the author of this Gospel.
      marker-yv: yv-n
    - type: text
      text: 'another disciple were following Jesus. Now that disciple was known to the high priest, so he went with Jesus into the courtyard of the [residence of the] high priest; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'but Peter was standing outside at the door. So the other disciple (John), who was known to the high priest, went out and spoke to the doorkeeper, and brought Peter inside. [Matt 26:69-75; Mark 14:66-72; Luke 22:55-62] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the servant girl who kept the door said to Peter, “You are not one of this Man’s disciples, are you?” He said, “I am not.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Now the servants and the officers had made a fire of coals, because it was cold, and they were standing and warming themselves. And Peter was with them, standing and warming himself.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the high priest questioned Jesus about His disciples and about His teaching. [Matt 26:59-68; Mark 14:55-65; Luke 22:63-71] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Now Judas, who was betraying Him, knew the place, because Jesus had often met there with His disciples. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have spoken openly to the world. I always taught in a synagogue and in the temple
    - type: text
      text: ' [area], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'where all the Jews '
      - type: usfm
        marker: it
        children:
        - type: text
          text: habitually
      - type: text
        text: ' congregate; and I said nothing in secret.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why question Me? Question those who have heard what I said to them. They know what I said.”
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But when He said this, one of the officers who was standing nearby '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was illegal to strike the accused.
      marker-yv: yv-n
    - type: text
      text: 'struck Jesus [in the face], saying, “Is that how You answer the high priest?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“If I have said '
      - type: usfm
        marker: it
        children:
        - type: text
          text: anything
      - type: text
        text: ' wrong, make a formal statement about the wrong; but if'
    - type: text
      text: ' [I spoke] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: properly, why did you strike Me?”
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So Annas sent Him bound to Caiaphas the high priest.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peter’s Denial of Jesus
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now Simon Peter was [still] standing and warming himself. So they said to him, “You are not one of His disciples, are you?” He denied it and said, “I am not.” [Matt 26:71-75; Mark 14:69-72; Luke 22:58-62] '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'One of the high priest’s servants, a relative of the one whose ear Peter cut off, said, “Did I not see you with Him in the garden?” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: So Peter denied it again, and immediately a rooster crowed.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus before Pilate
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then the Jews led Jesus from Caiaphas to the Praetorium (governor’s palace). Now it was early and the Jews did not enter the Praetorium so that they would not be [ceremonially] unclean, but might [be able to] eat [and participate in the Feast of Unleavened Bread which began after] the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus’ arrest occurred after He and His disciples had eaten the Passover supper. Passover/Feast of Unleavened Bread lasted seven days.
      marker-yv: yv-n
    - type: text
      text: 'Passover [supper]. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So Pilate came out to them and asked, “What accusation do you bring against this Man?” [Matt 27:11-14; Mark 15:2-5; Luke 23:2, 3] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Judas, having obtained the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Roman
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A “cohort” was a sub-unit of a Roman legion and normally was composed of about 600 troops, but could be fewer in number. The Jewish religious leaders probably made arrangements with Pilate for Judas to have temporary use of the troops.
      marker-yv: yv-n
    - type: text
      text: 'cohort and some officers from the high priests and the Pharisees, came there with lanterns and torches and weapons. [Matt 26:47-56; Mark 14:43-50; Luke 22:47-53] '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'They answered, “If He were not a criminal, we would not have handed Him over to you [for judgment].” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Then Pilate said to them, “Take Him yourselves and judge Him according to your own law.” The Jews said, “We are not permitted to put anyone to death.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: it
      children:
      - type: text
        text: This was
    - type: text
      text: ' to fulfill the word which Jesus had spoken to indicate by what manner of death He was going to die. [John 12:32-34]'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So Pilate went into the Praetorium again, and called Jesus and asked Him, “Are You the King of the Jews?” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are you saying this on your own initiative, or did others tell you about Me?”
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Pilate answered, “I am not a Jew, am I? Your own people and their chief priests have handed You over to me. What have You done [that is worthy of death]?” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My kingdom is not of this world
    - type: text
      text: ' [nor does it have its origin in this world]. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If My kingdom were of this world, My servants would be fighting
    - type: text
      text: ' [hard] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to keep Me from being handed over to the Jews; but as it is, My kingdom is not of this world.”
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'So Pilate said to Him, “Then You are a King?” Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You say
    - type: text
      text: ' [correctly] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that I am a King. This is why I was born, and for this I have come into the world, to testify to the truth. Everyone who is of the truth
    - type: text
      text: ' [who is a friend of the truth and belongs to the truth] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'hears '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' listens carefully to My voice.”'
    - type: text
      text: ' [Dan 7:13, 14; Luke 1:32, 33] '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Pilate said to Him [scornfully], “What is truth?”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: A
    - type: text
      text: 'nd when he had said this, he went out to the Jews again and told them, “I find no guilt in Him [no crime, no cause for an accusation]. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'But you have a custom that I release someone for you at the Passover. So shall I release for you the King of the Jews?” [Matt 27:15-26; Mark 15:6-15; Luke 23:18-25] '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then Jesus, knowing all that was about to happen to Him, went to them and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whom do you want?”
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Then they all shouted back again, “Not this Man, but Barabbas!” Now Barabbas was a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: insurrectionist
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: robber.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They answered Him, “Jesus the Nazarene.” Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He.
      - type: text
        text: ”
    - type: text
      text: ' And Judas, who was betraying Him, was also standing with them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'When Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He,
      - type: text
        text: ”
    - type: text
      text: ' they drew back and fell to the ground. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Again He asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whom do you want?”
    - type: text
      text: ' And they said, “Jesus the Nazarene.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I told you that I am '
      - type: usfm
        marker: it
        children:
        - type: text
          text: He;
      - type: text
        text: ' so if you want Me, let these men go on their way.”'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: it
      children:
      - type: text
        text: This was
    - type: text
      text: ' to fulfill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' verify the words He had spoken, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Of those whom You have given Me, I have not lost even one.”
    - type: text
      text: ' [John 6:39; 17:12] '
