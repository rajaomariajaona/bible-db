  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put the sword
  - type: text
    text: ' [back] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in its sheath! Shall I not drink the cup which My Father has given Me?”
