      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This was
  - type: text
    text: ' to fulfill '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' verify the words He had spoken, '
  - type: usfm
