    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the Jews led Jesus from Caiaphas to the Praetorium (governor’s palace). Now it was early and the Jews did not enter the Praetorium so that they would not be [ceremonially] unclean, but might [be able to] eat [and participate in the Feast of Unleavened Bread which began after] the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus’ arrest occurred after He and His disciples had eaten the Passover supper. Passover/Feast of Unleavened Bread lasted seven days.
    marker-yv: yv-n
  - type: text
    text: 'Passover [supper]. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So Pilate came out to them and asked, “What accusation do you bring against this Man?” [Matt 27:11-14; Mark 15:2-5; Luke 23:2, 3] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They answered, “If He were not a criminal, we would not have handed Him over to you [for judgment].” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Pilate said to them, “Take Him yourselves and judge Him according to your own law.” The Jews said, “We are not permitted to put anyone to death.” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This was
  - type: text
    text: ' to fulfill the word which Jesus had spoken to indicate by what manner of death He was going to die. [John 12:32-34]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So Pilate went into the Praetorium again, and called Jesus and asked Him, “Are You the King of the Jews?” '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are you saying this on your own initiative, or did others tell you about Me?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Pilate answered, “I am not a Jew, am I? Your own people and their chief priests have handed You over to me. What have You done [that is worthy of death]?” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My kingdom is not of this world
  - type: text
    text: ' [nor does it have its origin in this world]. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If My kingdom were of this world, My servants would be fighting
  - type: text
    text: ' [hard] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to keep Me from being handed over to the Jews; but as it is, My kingdom is not of this world.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'So Pilate said to Him, “Then You are a King?” Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You say
  - type: text
    text: ' [correctly] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that I am a King. This is why I was born, and for this I have come into the world, to testify to the truth. Everyone who is of the truth
  - type: text
    text: ' [who is a friend of the truth and belongs to the truth] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'hears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' listens carefully to My voice.”'
  - type: text
    text: ' [Dan 7:13, 14; Luke 1:32, 33] '
  - type: usfm
