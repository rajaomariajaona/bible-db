  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They answered Him, “Jesus the Nazarene.” Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I am '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He.
    - type: text
      text: ”
  - type: text
    text: ' And Judas, who was betraying Him, was also standing with them. '
