  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A “cohort” was a sub-unit of a Roman legion and normally was composed of about 600 troops, but could be fewer in number. The Jewish religious leaders probably made arrangements with Pilate for Judas to have temporary use of the troops.
    marker-yv: yv-n
  - type: text
    text: 'cohort and some officers from the high priests and the Pharisees, came there with lanterns and torches and weapons. [Matt 26:47-56; Mark 14:43-50; Luke 22:47-53] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
