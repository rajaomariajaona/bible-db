  '1':
  - type: heading
    content: Judas Betrays Jesus
  - type: text
    content: 'Having said these things, Jesus left with His disciples and went across the '
  - type: note
    content: Most of the time this was a dry stream bed (wadi), but the winter rains would turn it into a torrent of water. The ravine separated Jerusalem from the Mount of Olives. In the OT King David took this same route while escaping from Jerusalem to the Mount of Olives, after he was betrayed by Absalom and Ahithophel (2 Sam 15:23).
  - type: text
    content: 'ravine of the Kidron. There was a garden there, which He and His disciples entered. '
  '10':
  - type: text
    content: 'Then Simon Peter, who had a sword, drew it and struck the high priest’s servant, cutting off his right ear. The servant’s name was Malchus. '
  '11':
  - type: text
    content: 'So Jesus said to Peter, '
  - type: text
    content: “Put the sword
  - type: text
    content: ' [back] '
  - type: text
    content: in its sheath! Shall I not drink the cup which My Father has given Me?”
  - type: heading
    content: Jesus before Annas and Caiaphas
  '12':
  - type: text
    content: 'So the cohort and their commander and the officers of the Jews arrested Jesus and bound Him, '
  '13':
  - type: text
    content: 'and led Him to '
  - type: note
    content: See note 11:49.
  - type: text
    content: 'Annas first; for he was the father-in-law of Caiaphas, who was high priest that year. '
  '14':
  - type: text
    content: It was Caiaphas who had advised the Jews that it was expedient for one man to die on behalf of the people. [John 11:49, 50]
  '15':
  - type: text
    content: 'Simon Peter and '
  - type: note
    content: Most likely John, the author of this Gospel.
  - type: text
    content: 'another disciple were following Jesus. Now that disciple was known to the high priest, so he went with Jesus into the courtyard of the [residence of the] high priest; '
  '16':
  - type: text
    content: 'but Peter was standing outside at the door. So the other disciple (John), who was known to the high priest, went out and spoke to the doorkeeper, and brought Peter inside. [Matt 26:69-75; Mark 14:66-72; Luke 22:55-62] '
  '17':
  - type: text
    content: 'Then the servant girl who kept the door said to Peter, “You are not one of this Man’s disciples, are you?” He said, “I am not.” '
  '18':
  - type: text
    content: Now the servants and the officers had made a fire of coals, because it was cold, and they were standing and warming themselves. And Peter was with them, standing and warming himself.
  '19':
  - type: text
    content: 'Then the high priest questioned Jesus about His disciples and about His teaching. [Matt 26:59-68; Mark 14:55-65; Luke 22:63-71] '
  '2':
  - type: text
    content: 'Now Judas, who was betraying Him, knew the place, because Jesus had often met there with His disciples. '
  '20':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “I have spoken openly to the world. I always taught in a synagogue and in the temple
  - type: text
    content: ' [area], '
  - type: text
    content: 'where all the Jews '
  - type: text
    content: habitually
  - type: text
    content: ' congregate; and I said nothing in secret.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Why question Me? Question those who have heard what I said to them. They know what I said.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'But when He said this, one of the officers who was standing nearby '
  - type: note
    content: It was illegal to strike the accused.
  - type: text
    content: 'struck Jesus [in the face], saying, “Is that how You answer the high priest?” '
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“If I have said '
  - type: text
    content: anything
  - type: text
    content: ' wrong, make a formal statement about the wrong; but if'
  - type: text
    content: ' [I spoke] '
  - type: text
    content: properly, why did you strike Me?”
  - type: text
    content: ' '
  '24':
  - type: text
    content: So Annas sent Him bound to Caiaphas the high priest.
  - type: heading
    content: Peter’s Denial of Jesus
  '25':
  - type: text
    content: 'Now Simon Peter was [still] standing and warming himself. So they said to him, “You are not one of His disciples, are you?” He denied it and said, “I am not.” [Matt 26:71-75; Mark 14:69-72; Luke 22:58-62] '
  '26':
  - type: text
    content: 'One of the high priest’s servants, a relative of the one whose ear Peter cut off, said, “Did I not see you with Him in the garden?” '
  '27':
  - type: text
    content: So Peter denied it again, and immediately a rooster crowed.
  - type: heading
    content: Jesus before Pilate
  '28':
  - type: text
    content: 'Then the Jews led Jesus from Caiaphas to the Praetorium (governor’s palace). Now it was early and the Jews did not enter the Praetorium so that they would not be [ceremonially] unclean, but might [be able to] eat [and participate in the Feast of Unleavened Bread which began after] the '
  - type: note
    content: Jesus’ arrest occurred after He and His disciples had eaten the Passover supper. Passover/Feast of Unleavened Bread lasted seven days.
  - type: text
    content: 'Passover [supper]. '
  '29':
  - type: text
    content: 'So Pilate came out to them and asked, “What accusation do you bring against this Man?” [Matt 27:11-14; Mark 15:2-5; Luke 23:2, 3] '
  '3':
  - type: text
    content: 'So Judas, having obtained the '
  - type: text
    content: Roman
  - type: text
    content: ' '
  - type: note
    content: A “cohort” was a sub-unit of a Roman legion and normally was composed of about 600 troops, but could be fewer in number. The Jewish religious leaders probably made arrangements with Pilate for Judas to have temporary use of the troops.
  - type: text
    content: 'cohort and some officers from the high priests and the Pharisees, came there with lanterns and torches and weapons. [Matt 26:47-56; Mark 14:43-50; Luke 22:47-53] '
  '30':
  - type: text
    content: 'They answered, “If He were not a criminal, we would not have handed Him over to you [for judgment].” '
  '31':
  - type: text
    content: 'Then Pilate said to them, “Take Him yourselves and judge Him according to your own law.” The Jews said, “We are not permitted to put anyone to death.” '
  '32':
  - type: text
    content: This was
  - type: text
    content: ' to fulfill the word which Jesus had spoken to indicate by what manner of death He was going to die. [John 12:32-34]'
  '33':
  - type: text
    content: 'So Pilate went into the Praetorium again, and called Jesus and asked Him, “Are You the King of the Jews?” '
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Are you saying this on your own initiative, or did others tell you about Me?”
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Pilate answered, “I am not a Jew, am I? Your own people and their chief priests have handed You over to me. What have You done [that is worthy of death]?” '
  '36':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “My kingdom is not of this world
  - type: text
    content: ' [nor does it have its origin in this world]. '
  - type: text
    content: If My kingdom were of this world, My servants would be fighting
  - type: text
    content: ' [hard] '
  - type: text
    content: to keep Me from being handed over to the Jews; but as it is, My kingdom is not of this world.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'So Pilate said to Him, “Then You are a King?” Jesus answered, '
  - type: text
    content: “You say
  - type: text
    content: ' [correctly] '
  - type: text
    content: that I am a King. This is why I was born, and for this I have come into the world, to testify to the truth. Everyone who is of the truth
  - type: text
    content: ' [who is a friend of the truth and belongs to the truth] '
  - type: text
    content: 'hears '
  - type: text
    content: and
  - type: text
    content: ' listens carefully to My voice.”'
  - type: text
    content: ' [Dan 7:13, 14; Luke 1:32, 33] '
  '38':
  - type: text
    content: Pilate said to Him [scornfully], “What is truth?”
  - type: text
    content: A
  - type: text
    content: 'nd when he had said this, he went out to the Jews again and told them, “I find no guilt in Him [no crime, no cause for an accusation]. '
  '39':
  - type: text
    content: 'But you have a custom that I release someone for you at the Passover. So shall I release for you the King of the Jews?” [Matt 27:15-26; Mark 15:6-15; Luke 23:18-25] '
  '4':
  - type: text
    content: 'Then Jesus, knowing all that was about to happen to Him, went to them and asked, '
  - type: text
    content: “Whom do you want?”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Then they all shouted back again, “Not this Man, but Barabbas!” Now Barabbas was a '
  - type: note
    content: Or insurrectionist.
  - type: text
    content: robber.
