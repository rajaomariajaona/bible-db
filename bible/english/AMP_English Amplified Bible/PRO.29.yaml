document_id: PRO.29,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings and Instructions
  - type: text
    content: 'He who hardens his neck '
  - type: text
    content: and
  - type: text
    content: ' refuses instruction after being often reproved (corrected, criticized),'
  - type: text
    content: Will suddenly be broken beyond repair.
  '10':
  - type: text
    content: The bloodthirsty hate the blameless [because of his integrity],
  - type: text
    content: But the upright are concerned for his life. [Gen 4:5, 8; 1 John 3:12]
  '11':
  - type: text
    content: 'A [shortsighted] fool always loses his temper '
  - type: text
    content: and
  - type: text
    content: ' displays his anger,'
  - type: text
    content: But a wise man [uses self-control and] holds it back.
  '12':
  - type: text
    content: If a ruler pays attention to lies [and encourages corruption],
  - type: text
    content: 'All his officials '
  - type: text
    content: will become
  - type: text
    content: ' wicked.'
  '13':
  - type: text
    content: 'The poor man and the oppressor have this in common:'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' gives light to the eyes of both. [Prov 22:2]'
  '14':
  - type: text
    content: 'If a king faithfully '
  - type: text
    content: and
  - type: text
    content: ' truthfully judges the poor,'
  - type: text
    content: His throne shall be established forever.
  '15':
  - type: text
    content: The rod and reproof (godly instruction) give wisdom,
  - type: text
    content: But a child who gets his own way brings shame to his mother.
  '16':
  - type: text
    content: When the wicked are in authority, transgression increases,
  - type: text
    content: But the righteous will see the downfall of the wicked.
  '17':
  - type: text
    content: Correct your son, and he will give you comfort;
  - type: text
    content: Yes, he will delight your soul.
  '18':
  - type: text
    content: Where there is no vision [no revelation of God and His word], the people are unrestrained;
  - type: text
    content: 'But happy '
  - type: text
    content: and
  - type: text
    content: ' blessed is he who keeps the law [of God]. [1 Sam 3:1; Amos 8:11, 12]'
  '19':
  - type: text
    content: 'A servant will not be corrected by words '
  - type: text
    content: alone;
  - type: text
    content: For though he understands, he will not respond [nor pay attention].
  '2':
  - type: text
    content: 'When the righteous are in authority '
  - type: text
    content: and
  - type: text
    content: ' become great, the people rejoice;'
  - type: text
    content: 'But when the wicked man rules, the people groan '
  - type: text
    content: and
  - type: text
    content: ' sigh.'
  '20':
  - type: text
    content: Do you see a [conceited] man who speaks quickly [offering his opinions or answering without thinking]?
  - type: text
    content: 'There is more hope for a [thickheaded] '
  - type: note
    content: See note 1:7.
  - type: text
    content: fool than for him.
  '21':
  - type: text
    content: He who pampers his slave from childhood
  - type: text
    content: Will find him to be a son in the end.
  '22':
  - type: text
    content: An angry man stirs up strife,
  - type: text
    content: 'And a hot-tempered '
  - type: text
    content: and
  - type: text
    content: ' undisciplined man commits many transgressions.'
  '23':
  - type: text
    content: 'A man’s pride '
  - type: text
    content: and
  - type: text
    content: ' sense of self-importance will bring him down,'
  - type: text
    content: But he who has a humble spirit will obtain honor. [Prov 15:33; 18:12; Is 66:2; Dan 4:30; Matt 23:12; James 4:6, 10; 1 Pet 5:5]
  '24':
  - type: text
    content: Whoever is partner with a thief hates his own life;
  - type: text
    content: He hears the curse [when swearing an oath to testify], but discloses nothing [and commits perjury by omission].
  '25':
  - type: text
    content: The fear of man brings a snare,
  - type: text
    content: 'But whoever trusts in '
  - type: text
    content: and
  - type: text
    content: ' puts his confidence in the L'
  - type: heading
    content: ord
  - type: text
    content: ' will be exalted '
  - type: text
    content: and
  - type: text
    content: ' safe.'
  '26':
  - type: text
    content: Many seek the ruler’s favor,
  - type: text
    content: But justice for man comes from the L
  - type: heading
    content: ord
  - type: text
    content: .
  '27':
  - type: text
    content: An unjust man is repulsive to the righteous,
  - type: text
    content: And he who is upright in the way [of the L
  - type: heading
    content: ord
  - type: text
    content: '] is repulsive to the wicked.'
  '3':
  - type: text
    content: A man who loves [skillful and godly] wisdom makes his father joyful,
  - type: text
    content: But he who associates with prostitutes wastes his wealth.
  '4':
  - type: text
    content: The king establishes (stabilizes) the land by justice,
  - type: text
    content: But a man who takes bribes overthrows it.
  '5':
  - type: text
    content: A man who flatters his neighbor [with smooth words intending to do harm]
  - type: text
    content: Is spreading a net for his own feet.
  '6':
  - type: text
    content: By his wicked plan an evil man is trapped,
  - type: text
    content: But the righteous man sings and rejoices [for his plan brings good things to him].
  '7':
  - type: text
    content: The righteous man cares for the rights of the poor,
  - type: text
    content: But the wicked man has no interest in such knowledge. [Job 29:16; 31:13; Ps 41:1]
  '8':
  - type: text
    content: Scoffers set a city afire [by stirring up trouble],
  - type: text
    content: But wise men turn away anger [and restore order with their good judgment].
  '9':
  - type: text
    content: 'If a wise man has a controversy with a foolish '
  - type: text
    content: and
  - type: text
    content: ' arrogant man,'
  - type: text
    content: The foolish man [ignores logic and fairness and] only rages or laughs, and there is no peace (rest, agreement).
