document_id: PRO.29,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Warnings and Instructions
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'He who hardens his neck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' refuses instruction after being often reproved (corrected, criticized),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will suddenly be broken beyond repair.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The bloodthirsty hate the blameless [because of his integrity],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the upright are concerned for his life. [Gen 4:5, 8; 1 John 3:12]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'A [shortsighted] fool always loses his temper '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' displays his anger,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a wise man [uses self-control and] holds it back.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If a ruler pays attention to lies [and encourages corruption],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All his officials '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will become
    - type: text
      text: ' wicked.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The poor man and the oppressor have this in common:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' gives light to the eyes of both. [Prov 22:2]'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If a king faithfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' truthfully judges the poor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His throne shall be established forever.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The rod and reproof (godly instruction) give wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a child who gets his own way brings shame to his mother.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When the wicked are in authority, transgression increases,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the righteous will see the downfall of the wicked.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Correct your son, and he will give you comfort;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, he will delight your soul.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Where there is no vision [no revelation of God and His word], the people are unrestrained;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blessed is he who keeps the law [of God]. [1 Sam 3:1; Amos 8:11, 12]'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A servant will not be corrected by words '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alone;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For though he understands, he will not respond [nor pay attention].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When the righteous are in authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become great, the people rejoice;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But when the wicked man rules, the people groan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sigh.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Do you see a [conceited] man who speaks quickly [offering his opinions or answering without thinking]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There is more hope for a [thickheaded] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:7.
      marker-yv: yv-n
    - type: text
      text: fool than for him.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He who pampers his slave from childhood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will find him to be a son in the end.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: An angry man stirs up strife,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And a hot-tempered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' undisciplined man commits many transgressions.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'A man’s pride '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' sense of self-importance will bring him down,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who has a humble spirit will obtain honor. [Prov 15:33; 18:12; Is 66:2; Dan 4:30; Matt 23:12; James 4:6, 10; 1 Pet 5:5]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Whoever is partner with a thief hates his own life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hears the curse [when swearing an oath to testify], but discloses nothing [and commits perjury by omission].
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The fear of man brings a snare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But whoever trusts in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' puts his confidence in the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' safe.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Many seek the ruler’s favor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But justice for man comes from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: An unjust man is repulsive to the righteous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who is upright in the way [of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '] is repulsive to the wicked.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A man who loves [skillful and godly] wisdom makes his father joyful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he who associates with prostitutes wastes his wealth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The king establishes (stabilizes) the land by justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a man who takes bribes overthrows it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A man who flatters his neighbor [with smooth words intending to do harm]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is spreading a net for his own feet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: By his wicked plan an evil man is trapped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the righteous man sings and rejoices [for his plan brings good things to him].
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The righteous man cares for the rights of the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked man has no interest in such knowledge. [Job 29:16; 31:13; Ps 41:1]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Scoffers set a city afire [by stirring up trouble],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But wise men turn away anger [and restore order with their good judgment].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If a wise man has a controversy with a foolish '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant man,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The foolish man [ignores logic and fairness and] only rages or laughs, and there is no peace (rest, agreement).
