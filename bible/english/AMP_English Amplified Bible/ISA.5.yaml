document_id: ISA.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Parable of the Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now let me sing for my greatly Beloved [L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ']'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A song of my Beloved about His vineyard (His chosen people).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My greatly Beloved had a vineyard on a very fertile slope (the promised land, Canaan). [Song 6:3; Matt 21:33-40]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“For ten '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: teams of oxen,
        - type: text
          text: ' referring to the area of land that a team of oxen can plow in one day.'
      marker-yv: yv-n
    - type: text
      text: 'acres of vineyard will yield [only] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This is only a very rough approximation. The basic Hebrew unit of volume was an egg, which varied greatly, and the estimation was significantly larger than an ordinary chicken egg. A '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bath
        - type: text
          text: ' was set at 432 eggs—six to eight gallons.'
      marker-yv: yv-n
    - type: text
      text: 'one bath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of wine
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a homer (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The actual Hebrew measure was the volume of 4,320 eggs, and an '
        - type: usfm
          marker: it
          children:
          - type: text
            text: ephah
        - type: text
          text: ' (like a bath, only a dry measure) was 432 eggs.'
      marker-yv: yv-n
    - type: text
      text: six bushels) of seed will produce [only] one ephah of grain.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Woe (judgment is coming) to those who rise early in the morning to pursue intoxicating drink,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who stay up late in the night till wine inflames them!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They have lyre and harp, tambourine and flute, and wine at their feasts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But they do not regard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nor
    - type: text
      text: ' even pay attention to the deeds of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor do they consider the work of His hands.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ¶Therefore My people go into exile because they lack knowledge [of God];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their honorable men are famished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their common people are parched with thirst.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Therefore Sheol (the realm of the dead) has increased its appetite and opened its mouth beyond measure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: her
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jerusalem’s splendor, her multitude, her [boisterous] uproar and her [drunken] revelers descend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: common
    - type: text
      text: ' man will be bowed down and the man of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: importance
    - type: text
      text: ' degraded,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the eyes of the proud (arrogant) will be degraded.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts will be exalted in justice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And God, the Holy One, will show Himself holy in righteousness [through His righteous judgments].
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then the lambs will graze [among the ruins] as in their own pasture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And strangers will eat in the desolate places of the [exiled] wealthy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ¶Woe (judgment is coming) to those who drag along wickedness with cords of falsehood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sin as if with cart ropes [towing their own punishment];
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Who say, “Let Him move speedily, let Him expedite His work [His promised vengeance], so that we may see it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let the purpose of the Holy One of Israel approach
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And come to pass, so that we may know it!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He dug it all around and cleared away its stones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And planted it with '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: a bright red grape
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the choicest vine (the people of Judah).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He built a tower in the center of it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And also hewed out a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the lower of two hollowed-out reservoirs made in the soft rock, one above the other, connected by a channel that allowed the juice pressed out in the upper reservoir to flow to the lower.
      marker-yv: yv-n
    - type: text
      text: wine vat in it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then He expected it to produce [the choicest] grapes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But it produced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' worthless ones.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Woe (judgment is coming) to those who call evil good, and good evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who substitute darkness for light and light for darkness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who substitute bitter for sweet and sweet for bitter!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Woe (judgment is coming) to those who are wise in their own eyes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And clever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shrewd in their own sight!'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Woe (judgment is coming) to those who are heroes at drinking wine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And men of strength in mixing intoxicating drinks,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Who justify the wicked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' acquit the guilty for a bribe,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take away the rights of those who are in the right!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ¶Therefore, as the tongue of fire consumes the stubble [from straw]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the dry grass collapses into the flame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So their root will become like rot and their blossom blow away like fine dust;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they have rejected the law of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And despised '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' discarded the word of the Holy One of Israel.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Therefore the anger of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has burned against His people,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He has stretched out His hand against them and has struck them down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the mountains trembled, and their dead bodies lay like rubbish in the middle of the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spite of
    - type: text
      text: ' all this God’s anger is not turned away,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But His hand is still stretched out [in judgment].
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ¶He will lift up a flag to [call] the distant nations [to bring His judgment on Judah],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will whistle for them from the ends of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And indeed, they will come with great speed swiftly.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: No one among them is weary or stumbles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one slumbers or sleeps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor is the belt at their waist undone [as if unprepared for action],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor is the strap of their sandal broken.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Their arrows are sharp and all their bows are strung '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bent;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their horses’ hoofs seem like flint and their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chariot
    - type: text
      text: ' wheels like a whirlwind.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Their roaring is like a lioness, they roar like young lions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They growl and seize their prey
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And carry it off and there is no one to save it.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '¶“And now, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: says the L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
    - type: text
      text: ', O inhabitants of Jerusalem and men of Judah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judge between Me and My vineyard (My people).
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: And in that day they will roar against them (Judah) like the roaring of the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if one looks to the land, in fact, there is darkness and distress;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the light will be darkened by its clouds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “What more could have been done for My vineyard that I have not done in it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When I expected it to produce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: good
    - type: text
      text: ' grapes, why did it yield worthless ones?'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“So now let me tell you what I am going to do to My vineyard:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will take away its thorn-hedge, and it will be burned up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will break down its '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The wall was usually made up of loose stones that had been cleared from the field.
      marker-yv: yv-n
    - type: text
      text: stone wall and it will be trampled down [by enemies].
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “I will turn it into a wasteland;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will not be pruned or cultivated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But briars and thorns will come up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will also command the clouds not to rain on it.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶For the vineyard of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is the house (nation) of Israel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the men of Judah are His delightful planting [which He loves].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So He looked for justice, but in fact, [He saw] bloodshed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lawlessness;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[He looked] for righteousness, but in fact, [He heard] a cry of distress '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' oppression.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Woes for the Wicked
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ¶Woe (judgment is coming) to those who join house to house and join field to field [to increase their holdings by depriving others],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until there is no more room [for others],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that you have to live alone in the midst of the land!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In my ears the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: said,
    - type: text
      text: ' “Be assured that many houses will become desolate,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' great and beautiful ones will be unoccupied.'
