  '24':
  - type: text
    content: ¶Therefore, as the tongue of fire consumes the stubble [from straw]
  - type: text
    content: And the dry grass collapses into the flame,
  - type: text
    content: So their root will become like rot and their blossom blow away like fine dust;
  - type: text
    content: Because they have rejected the law of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts'
  - type: text
    content: 'And despised '
  - type: text
    content: and
  - type: text
    content: ' discarded the word of the Holy One of Israel.'
  '25':
  - type: text
    content: Therefore the anger of the L
  - type: heading
    content: ord
  - type: text
    content: ' has burned against His people,'
  - type: text
    content: And He has stretched out His hand against them and has struck them down.
  - type: text
    content: And the mountains trembled, and their dead bodies lay like rubbish in the middle of the streets.
  - type: text
    content: 'In '
  - type: text
    content: spite of
  - type: text
    content: ' all this God’s anger is not turned away,'
  - type: text
    content: But His hand is still stretched out [in judgment].
  '26':
  - type: text
    content: ¶He will lift up a flag to [call] the distant nations [to bring His judgment on Judah],
  - type: text
    content: And will whistle for them from the ends of the earth;
  - type: text
    content: And indeed, they will come with great speed swiftly.
  '27':
  - type: text
    content: No one among them is weary or stumbles,
  - type: text
    content: No one slumbers or sleeps;
  - type: text
    content: Nor is the belt at their waist undone [as if unprepared for action],
  - type: text
    content: Nor is the strap of their sandal broken.
  '28':
  - type: text
    content: 'Their arrows are sharp and all their bows are strung '
  - type: text
    content: and
  - type: text
    content: ' bent;'
  - type: text
    content: 'Their horses’ hoofs seem like flint and their '
  - type: text
    content: chariot
  - type: text
    content: ' wheels like a whirlwind.'
  '29':
  - type: text
    content: Their roaring is like a lioness, they roar like young lions;
  - type: text
    content: They growl and seize their prey
  - type: text
    content: And carry it off and there is no one to save it.
  '3':
  - type: text
    content: '¶“And now, '
  - type: text
    content: says the L
  - type: heading
    content: ord
  - type: text
    content: ', O inhabitants of Jerusalem and men of Judah,'
  - type: text
    content: Judge between Me and My vineyard (My people).
  '30':
  - type: text
    content: And in that day they will roar against them (Judah) like the roaring of the sea.
  - type: text
    content: And if one looks to the land, in fact, there is darkness and distress;
  - type: text
    content: Even the light will be darkened by its clouds.
  '4':
  - type: text
    content: “What more could have been done for My vineyard that I have not done in it?
  - type: text
    content: 'When I expected it to produce '
  - type: text
    content: good
  - type: text
    content: ' grapes, why did it yield worthless ones?'
  '5':
  - type: text
    content: '“So now let me tell you what I am going to do to My vineyard:'
  - type: text
    content: I will take away its thorn-hedge, and it will be burned up;
  - type: text
    content: 'I will break down its '
  - type: note
    content: The wall was usually made up of loose stones that had been cleared from the field.
  - type: text
    content: stone wall and it will be trampled down [by enemies].
  '6':
  - type: text
    content: “I will turn it into a wasteland;
  - type: text
    content: It will not be pruned or cultivated,
  - type: text
    content: But briars and thorns will come up.
  - type: text
    content: I will also command the clouds not to rain on it.”
  '7':
  - type: text
    content: ¶For the vineyard of the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is the house (nation) of Israel'
  - type: text
    content: And the men of Judah are His delightful planting [which He loves].
  - type: text
    content: 'So He looked for justice, but in fact, [He saw] bloodshed '
  - type: text
    content: and
  - type: text
    content: ' lawlessness;'
  - type: text
    content: '[He looked] for righteousness, but in fact, [He heard] a cry of distress '
  - type: text
    content: and
  - type: text
    content: ' oppression.'
  - type: heading
    content: Woes for the Wicked
  '8':
  - type: text
    content: ¶Woe (judgment is coming) to those who join house to house and join field to field [to increase their holdings by depriving others],
  - type: text
    content: Until there is no more room [for others],
  - type: text
    content: So that you have to live alone in the midst of the land!
  '9':
  - type: text
    content: In my ears the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts '
  - type: text
    content: said,
  - type: text
    content: ' “Be assured that many houses will become desolate,'
  - type: text
    content: Even
  - type: text
    content: ' great and beautiful ones will be unoccupied.'
