  '18':
  - type: text
    content: ¶Woe (judgment is coming) to those who drag along wickedness with cords of falsehood,
  - type: text
    content: And sin as if with cart ropes [towing their own punishment];
  '19':
  - type: text
    content: Who say, “Let Him move speedily, let Him expedite His work [His promised vengeance], so that we may see it;
  - type: text
    content: And let the purpose of the Holy One of Israel approach
  - type: text
