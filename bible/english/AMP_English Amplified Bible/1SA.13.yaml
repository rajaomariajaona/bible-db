    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: forty
  - type: text
    text: -two years over Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saul chose for himself 3,000 men of Israel; of whom 2,000 were with him in Michmash and in the hill country of Bethel, while 1,000 were with Jonathan at Gibeah of Benjamin. But he sent the rest of the people away, each one to his own tent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jonathan attacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' defeated the Philistine garrison which was at Geba, and the Philistines heard about it. Then Saul blew the trumpet throughout the land, saying, “Let the Hebrews hear.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All Israel heard that Saul had defeated the Philistine garrison, and also that Israel had become despicable to the Philistines. And the people were summoned to join Saul at Gilgal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the Philistines gathered to fight against Israel, 30,000 chariots and 6,000 horsemen, and troops in multitude, like sand on the seashore. They came up and camped at Michmash, east of Beth-aven. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the men of Israel saw that they were in a tight situation (for their troops were hard-pressed), they hid in caves, in thickets, in cellars, and in [dry] cisterns (pits). '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some of
  - type: text
    text: ' the Hebrews had crossed the [river] Jordan to the land of Gad and Gilead. As for Saul, he was still in Gilgal, and all the people followed him, trembling [in fear and anticipation].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now Saul waited seven days, according to the appointed time which Samuel had set, but Samuel had not come to Gilgal; and the people were scattering away from Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So Saul said, “Bring me the burnt offering and the peace offerings.” And '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a direct violation of the instructions Samuel had given to Saul (10:8).
    marker-yv: yv-n
  - type: text
    text: 'he offered the burnt offering [which he was forbidden to do]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As soon as he finished offering the burnt offering, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: behold, Samuel came
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Samuel finally came; Saul went out to meet and to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bless
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'welcome him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But Samuel said, “What have you done?” Saul said, “Since I saw that the people were scattering away from me, and that you did not come within the appointed time, and that the Philistines were assembling at Michmash, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: therefore, I said, ‘Now the Philistines will come down against me at Gilgal, and I have not asked for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' favor [by making supplication to Him].’ So I forced myself to offer the burnt offering.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Samuel said to Saul, “You have acted foolishly; you have not kept the commandment of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, which He commanded you, for [if you had obeyed] the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' would have established your kingdom over Israel forever. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But now your kingdom shall not endure. The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has sought out for Himself a man (David) after His own heart, and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has appointed him as leader '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' ruler over His people, because you have not kept (obeyed) what the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' commanded you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Samuel arose and went up from Gilgal to Gibeah of Benjamin. And Saul assembled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' counted the people who were still with him, [only] about six hundred [fighting] men. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Saul and his son Jonathan and the people with them were staying in Geba of Benjamin, while the Philistines camped at Michmash. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And the raiding party came from the Philistine camp in three companies: one company turned toward Ophrah, to the land of Shual, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: another company turned toward Beth-horon, and another toward the border overlooking the Valley of Zeboim toward the wilderness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now no '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Israel lacked the ability to produce iron until the time of Solomon.
    marker-yv: yv-n
  - type: text
    text: 'blacksmith (metal-worker) could be found in all the land of Israel, for the Philistines said, “Otherwise the Hebrews will make swords or spears.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So all [the men of] Israel went down to the Philistines, each to get his plowshare, pick, axe, or sickle sharpened. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The fee [for sharpening] was a pim (two-thirds of a shekel) for the plowshares, the picks, the pitchforks, and the axes, and to straighten the goads (cattle prods). '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So it came about on the day of battle that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because the Israelite did not yet know how to work iron, their weapons were limited to the bow and arrow, and the sling. The sling was a formidable projectile weapon that had a small cradle or pouch between two lengths of cord. It was used not only in combat by ancient people, but also for hunting game.
    marker-yv: yv-n
  - type: text
    text: 'neither sword nor spear was found in the hands of any of the people who were with Saul and Jonathan; but Saul and Jonathan his son had them. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And the garrison of the Philistines went out to the pass at Michmash.
