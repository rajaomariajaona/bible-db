    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: thirty
  - type: text
    text: ' years old when he began to reign, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: after he reigned two years over Israel Saul chose
      - type: text
        text: …
    marker-yv: yv-n
  - type: text
    text: 'he reigned '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Acts 13:21; Hebrew omits '
      - type: usfm
        marker: it
        children:
        - type: text
          text: forty
      - type: text
