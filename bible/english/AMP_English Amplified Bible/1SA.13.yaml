  - type: text
    content: 'welcome him. '
  '11':
  - type: text
    content: 'But Samuel said, “What have you done?” Saul said, “Since I saw that the people were scattering away from me, and that you did not come within the appointed time, and that the Philistines were assembling at Michmash, '
  '12':
  - type: text
    content: therefore, I said, ‘Now the Philistines will come down against me at Gilgal, and I have not asked for the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' favor [by making supplication to Him].’ So I forced myself to offer the burnt offering.” '
  '13':
  - type: text
    content: Samuel said to Saul, “You have acted foolishly; you have not kept the commandment of the L
  - type: heading
    content: ord
  - type: text
    content: ' your God, which He commanded you, for [if you had obeyed] the L'
  - type: heading
    content: ord
  - type: text
    content: ' would have established your kingdom over Israel forever. '
  '14':
  - type: text
    content: But now your kingdom shall not endure. The L
  - type: heading
    content: ord
  - type: text
    content: ' has sought out for Himself a man (David) after His own heart, and the L'
  - type: heading
    content: ord
  - type: text
    content: ' has appointed him as leader '
  - type: text
    content: and
  - type: text
    content: ' ruler over His people, because you have not kept (obeyed) what the L'
  - type: heading
    content: ord
  - type: text
    content: ' commanded you.”'
  '15':
  - type: text
    content: 'Then Samuel arose and went up from Gilgal to Gibeah of Benjamin. And Saul assembled '
  - type: text
    content: and
  - type: text
    content: ' counted the people who were still with him, [only] about six hundred [fighting] men. '
  '16':
  - type: text
    content: 'Saul and his son Jonathan and the people with them were staying in Geba of Benjamin, while the Philistines camped at Michmash. '
  '17':
  - type: text
    content: 'And the raiding party came from the Philistine camp in three companies: one company turned toward Ophrah, to the land of Shual, '
  '18':
  - type: text
    content: another company turned toward Beth-horon, and another toward the border overlooking the Valley of Zeboim toward the wilderness.
  '19':
  - type: text
    content: 'Now no '
  - type: note
    content: Israel lacked the ability to produce iron until the time of Solomon.
  - type: text
    content: 'blacksmith (metal-worker) could be found in all the land of Israel, for the Philistines said, “Otherwise the Hebrews will make swords or spears.” '
  '2':
  - type: text
    content: 'Saul chose for himself 3,000 men of Israel; of whom 2,000 were with him in Michmash and in the hill country of Bethel, while 1,000 were with Jonathan at Gibeah of Benjamin. But he sent the rest of the people away, each one to his own tent. '
  '20':
  - type: text
    content: 'So all [the men of] Israel went down to the Philistines, each to get his plowshare, pick, axe, or sickle sharpened. '
  '21':
  - type: text
    content: 'The fee [for sharpening] was a pim (two-thirds of a shekel) for the plowshares, the picks, the pitchforks, and the axes, and to straighten the goads (cattle prods). '
  '22':
  - type: text
    content: 'So it came about on the day of battle that '
  - type: note
    content: Because the Israelite did not yet know how to work iron, their weapons were limited to the bow and arrow, and the sling. The sling was a formidable projectile weapon that had a small cradle or pouch between two lengths of cord. It was used not only in combat by ancient people, but also for hunting game.
  - type: text
    content: 'neither sword nor spear was found in the hands of any of the people who were with Saul and Jonathan; but Saul and Jonathan his son had them. '
  '23':
  - type: text
    content: And the garrison of the Philistines went out to the pass at Michmash.
  '3':
  - type: text
    content: 'Jonathan attacked '
  - type: text
    content: and
  - type: text
    content: ' defeated the Philistine garrison which was at Geba, and the Philistines heard about it. Then Saul blew the trumpet throughout the land, saying, “Let the Hebrews hear.” '
  '4':
  - type: text
    content: All Israel heard that Saul had defeated the Philistine garrison, and also that Israel had become despicable to the Philistines. And the people were summoned to join Saul at Gilgal.
  '5':
  - type: text
    content: 'Now the Philistines gathered to fight against Israel, 30,000 chariots and 6,000 horsemen, and troops in multitude, like sand on the seashore. They came up and camped at Michmash, east of Beth-aven. '
  '6':
  - type: text
    content: 'When the men of Israel saw that they were in a tight situation (for their troops were hard-pressed), they hid in caves, in thickets, in cellars, and in [dry] cisterns (pits). '
  '7':
  - type: text
    content: 'Also '
  - type: text
    content: some of
  - type: text
    content: ' the Hebrews had crossed the [river] Jordan to the land of Gad and Gilead. As for Saul, he was still in Gilgal, and all the people followed him, trembling [in fear and anticipation].'
  '8':
  - type: text
    content: 'Now Saul waited seven days, according to the appointed time which Samuel had set, but Samuel had not come to Gilgal; and the people were scattering away from Saul. '
  '9':
  - type: text
    content: 'So Saul said, “Bring me the burnt offering and the peace offerings.” And '
  - type: note
    content: This was a direct violation of the instructions Samuel had given to Saul (10:8).
  - type: text
    content: 'he offered the burnt offering [which he was forbidden to do]. '
