document_id: JOS.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Guile of the Gibeonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when all the kings who were beyond the Jordan, in the hill country and in the lowland [at the western edge of the hills of Judea], and all along the coast of the Great [Mediterranean] Sea toward Lebanon, the Hittite and the Amorite, the Canaanite, the Perizzite, the Hivite and the Jebusite, heard of this [army and its victories over Jericho and Ai], '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'they gathered together with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: one mouth
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: one purpose to fight with Joshua and with Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But when the people of Gibeon [the Hivites] heard what Joshua had done to Jericho and Ai, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'they too acted craftily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cunningly, and set out and took along provisions, but took worn-out sacks on their donkeys, and wineskins (leather bottles) that were worn out and split open and patched together, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and worn-out and patched sandals on their feet, and worn-out clothes; and all their supply of food was dry and had turned to crumbs. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They went to Joshua in the camp at Gilgal and said to him and the men of Israel, “We have come from a far country; so now, make a covenant (treaty) with us.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the men of Israel said to the Hivites, “Perhaps you are living within our land; how then can we make a covenant (treaty) with you?” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They said to Joshua, “We are your servants.” Then Joshua said to them, “Who are you, and where do you come from?” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They said to him, “Your servants have come from a country that is very far away because of the fame of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God; for we have heard the news about Him and all [the remarkable things] that He did in Egypt, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and everything that He did to the two kings of the Amorites who were beyond the Jordan, to Sihon the king of Heshbon and to Og the king of Bashan who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lived
  - type: text
    text: ' in Ashtaroth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So our elders and all the residents of our country said to us, ‘Take provisions for the journey and go to meet the sons of Israel and say to them, “We are your servants; now make a covenant (treaty) with us.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This bread of ours was hot (fresh) when we took it along as our provision from our houses on the day we left to come to you; now look, it is dry and has turned to crumbs. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'These wineskins which we filled were new, and look, they are split; our clothes and our sandals are worn out because of the very long journey [that we had to make].” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the men [of Israel] took some of their own provisions [and offered them in friendship], and [foolishly] did not ask for the counsel of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joshua made peace with them and made a covenant (treaty) with them, to let them live; and the leaders of the congregation [of Israel] swore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an oath
  - type: text
    text: ' to them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'It happened that three days after they had made a covenant (treaty) with them, the Israelites heard that they were [actually] their neighbors and that they were living among them. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the sons of Israel set out and came to their cities on the third day. Now the cities [of the Hivites] were Gibeon and Chephirah and Beeroth and Kiriath-jearim. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But the sons of Israel did not strike them because the leaders of the congregation had sworn to them by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' the God of Israel [to spare them]. And all the congregation murmured [expressing great dissatisfaction] against the leaders. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But all the leaders said to the whole congregation, “We have sworn to them by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, so now we cannot touch them. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'This [is what] we will do to them: we will let them live, so that the wrath [of God] does not come upon us for [violating] the oath which we have sworn to them.” '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The leaders said to them, “Let them live [as our slaves].” So they became the cutters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gatherers of firewood and water carriers for the entire congregation, just as the leaders had said of them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joshua called the [Hivite] men and said, “Why did you deceive us, saying, ‘We '
  - type: usfm
    marker: it
    children:
    - type: text
      text: live
  - type: text
    text: ' very far away from you,’ when [in fact] you live among us? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now therefore, you are cursed, and you shall always be slaves, both cutters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gatherers of firewood and water carriers for the house of my God.” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They replied to Joshua and said, “Because your servants were told in no uncertain terms that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God commanded His servant Moses to give you all the land, and to destroy all the land’s inhabitants before you, we feared greatly for our lives because of you, and so we did this [deceptive] thing. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now look, we are in your hands; do to us as it seems good and right in your sight.” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So that is what he did to them; he rescued them from the hands of the Israelites and they did not kill them. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now on that day Joshua made them cutters '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' gatherers of firewood and water carriers for the congregation and for the altar of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to this day, in the place which He would choose.'
