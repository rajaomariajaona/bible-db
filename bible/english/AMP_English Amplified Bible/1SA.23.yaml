document_id: 1SA.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David Rescues Keilah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then they told David, saying, “Behold, the Philistines are fighting against Keilah and are plundering (robbing) the threshing floors [of the grain].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So David inquired of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', saying, “Shall I go and attack these Philistines?” And the Lord said to David, “Go and attack the Philistines and save Keilah.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But David’s men said to him, “Listen, we are afraid here in Judah. How much more then if we go to Keilah against the battle lines of the Philistines?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then David inquired of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' again. And the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' answered him, “Arise, go down to Keilah, for I will hand over the Philistines to you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So David and his men went to Keilah and fought the Philistines; he drove away their cattle and struck them with a great slaughter. So David rescued the inhabitants of Keilah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Abiathar the son of Ahimelech fled to David at Keilah, he came down with an ephod in his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when Saul was informed that David had come to Keilah, Saul said, “God has handed him over to me, for he shut himself in by entering a city that has double gates and bars.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Saul summoned all the people (soldiers) for war, to go down to Keilah to besiege David and his men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But David knew that Saul was plotting evil against him; and he said to Abiathar the priest, “Bring the ephod here.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then David said, “O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, Your servant has heard for certain that Saul intends to come to Keilah, to destroy the city on my account. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Will the men of Keilah hand me over to him? Will Saul come down just as Your servant has heard? O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', God of Israel, I pray, tell Your servant.” And the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “He will come down.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then David asked, “Will the men of Keilah surrender me and my men to Saul?” The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said, “They will surrender you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then David and his men, about six hundred, arose and left Keilah, and they went wherever they could go. When Saul was told that David had escaped from Keilah, he gave up the pursuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: David stayed in the wilderness in strongholds, in the hill country of the Wilderness of Ziph. Saul searched for him every day, but God did not hand David over to him.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Saul Pursues David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now David became aware that Saul had come out to seek his life. David was in the Wilderness of Ziph [in the woods] at Horesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Jonathan, Saul’s son, arose and went [into the woods] to David at Horesh, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: strengthened his hand
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'encouraged him in God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He said to him, “Do not be afraid; the hand of my father Saul will not find you. You will be king over Israel and I will be second in command to you; my father Saul knows this too.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So the two of them made a covenant before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; and David stayed [in the woods] at Horesh and Jonathan went to his house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the Ziphites came to Saul at Gibeah, saying, “Is David not hiding with us in strongholds of Horesh, on the hill of Hachilah, which is south of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the desert
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jeshimon? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now then, O king, come down [to Ziph] in accordance with all your heart’s desire to do so [and capture him]; and our part shall be to hand him over to the king.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Saul said, “May you be blessed by the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', because you have had compassion on me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Go now, be very persistent and investigate, and see where his '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: foot.
    marker-yv: yv-n
  - type: text
    text: 'haunt is and who has seen him there; for I am told he is very cunning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So look, and take note of all the places where he hides and come back to me with the established facts, then I will go with you. If he is [anywhere] in the land, I will search him out among all the thousands of Judah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So they arose and went to Ziph ahead of Saul. Now David and his men were in the Wilderness of Maon, in the Arabah south of Jeshimon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Saul and his men went to search for him. When David was told '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about it
  - type: text
    text: ', he went down to the rock and stayed [there] in the Wilderness of Maon. When Saul heard it, he pursued David in the Wilderness of Maon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Saul went on one side of the mountain, and David and his men on the other side of the mountain. And David was hurrying to get away from Saul, for Saul and his men were surrounding David and his men to capture them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But a messenger came to Saul, saying, “Hurry and come, because the Philistines have attacked the land.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Saul returned from pursuing David and went to meet the Philistines; therefore they called that place the Rock of Escape. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew this is v 1 of the next chapter.
    marker-yv: yv-n
  - type: text
    text: David went up from there and stayed in the strongholds of Engedi.
