document_id: 1SA.23,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David Rescues Keilah
  - type: text
    content: 'Then they told David, saying, “Behold, the Philistines are fighting against Keilah and are plundering (robbing) the threshing floors [of the grain].” '
  '10':
  - type: text
    content: Then David said, “O L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, Your servant has heard for certain that Saul intends to come to Keilah, to destroy the city on my account. '
  '11':
  - type: text
    content: Will the men of Keilah hand me over to him? Will Saul come down just as Your servant has heard? O L
  - type: heading
    content: ord
  - type: text
    content: ', God of Israel, I pray, tell Your servant.” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' said, “He will come down.” '
  '12':
  - type: text
    content: Then David asked, “Will the men of Keilah surrender me and my men to Saul?” The L
  - type: heading
    content: ord
  - type: text
    content: ' said, “They will surrender you.” '
  '13':
  - type: text
    content: 'Then David and his men, about six hundred, arose and left Keilah, and they went wherever they could go. When Saul was told that David had escaped from Keilah, he gave up the pursuit. '
  '14':
  - type: text
    content: David stayed in the wilderness in strongholds, in the hill country of the Wilderness of Ziph. Saul searched for him every day, but God did not hand David over to him.
  - type: heading
    content: Saul Pursues David
  '15':
  - type: text
    content: 'Now David became aware that Saul had come out to seek his life. David was in the Wilderness of Ziph [in the woods] at Horesh. '
  '16':
  - type: text
    content: 'And Jonathan, Saul’s son, arose and went [into the woods] to David at Horesh, and '
  - type: note
    content: Lit strengthened his hand.
  - type: text
    content: 'encouraged him in God. '
  '17':
  - type: text
    content: 'He said to him, “Do not be afraid; the hand of my father Saul will not find you. You will be king over Israel and I will be second in command to you; my father Saul knows this too.” '
  '18':
  - type: text
    content: So the two of them made a covenant before the L
  - type: heading
    content: ord
  - type: text
    content: ; and David stayed [in the woods] at Horesh and Jonathan went to his house.
  '19':
  - type: text
    content: 'Then the Ziphites came to Saul at Gibeah, saying, “Is David not hiding with us in strongholds of Horesh, on the hill of Hachilah, which is south of '
  - type: note
    content: Or the desert.
  - type: text
    content: 'Jeshimon? '
  '2':
  - type: text
    content: So David inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, “Shall I go and attack these Philistines?” And the Lord said to David, “Go and attack the Philistines and save Keilah.” '
  '20':
  - type: text
    content: 'Now then, O king, come down [to Ziph] in accordance with all your heart’s desire to do so [and capture him]; and our part shall be to hand him over to the king.” '
  '21':
  - type: text
    content: Saul said, “May you be blessed by the L
  - type: heading
    content: ord
  - type: text
    content: ', because you have had compassion on me. '
  '22':
  - type: text
    content: 'Go now, be very persistent and investigate, and see where his '
  - type: note
    content: Lit foot.
  - type: text
    content: 'haunt is and who has seen him there; for I am told he is very cunning. '
  '23':
  - type: text
    content: So look, and take note of all the places where he hides and come back to me with the established facts, then I will go with you. If he is [anywhere] in the land, I will search him out among all the thousands of Judah.”
  '24':
  - type: text
    content: 'So they arose and went to Ziph ahead of Saul. Now David and his men were in the Wilderness of Maon, in the Arabah south of Jeshimon. '
  '25':
  - type: text
    content: 'Then Saul and his men went to search for him. When David was told '
  - type: text
    content: about it
  - type: text
    content: ', he went down to the rock and stayed [there] in the Wilderness of Maon. When Saul heard it, he pursued David in the Wilderness of Maon. '
  '26':
  - type: text
    content: 'Saul went on one side of the mountain, and David and his men on the other side of the mountain. And David was hurrying to get away from Saul, for Saul and his men were surrounding David and his men to capture them. '
  '27':
  - type: text
    content: 'But a messenger came to Saul, saying, “Hurry and come, because the Philistines have attacked the land.” '
  '28':
  - type: text
    content: 'So Saul returned from pursuing David and went to meet the Philistines; therefore they called that place the Rock of Escape. '
  '29':
  - type: note
    content: In Hebrew this is v 1 of the next chapter.
  - type: text
    content: David went up from there and stayed in the strongholds of Engedi.
  '3':
  - type: text
    content: 'But David’s men said to him, “Listen, we are afraid here in Judah. How much more then if we go to Keilah against the battle lines of the Philistines?” '
  '4':
  - type: text
    content: Then David inquired of the L
  - type: heading
    content: ord
  - type: text
    content: ' again. And the L'
  - type: heading
    content: ord
  - type: text
    content: ' answered him, “Arise, go down to Keilah, for I will hand over the Philistines to you.” '
  '5':
  - type: text
    content: So David and his men went to Keilah and fought the Philistines; he drove away their cattle and struck them with a great slaughter. So David rescued the inhabitants of Keilah.
  '6':
  - type: text
    content: 'When Abiathar the son of Ahimelech fled to David at Keilah, he came down with an ephod in his hand. '
  '7':
  - type: text
    content: 'Now when Saul was informed that David had come to Keilah, Saul said, “God has handed him over to me, for he shut himself in by entering a city that has double gates and bars.” '
  '8':
  - type: text
    content: 'So Saul summoned all the people (soldiers) for war, to go down to Keilah to besiege David and his men. '
  '9':
  - type: text
    content: 'But David knew that Saul was plotting evil against him; and he said to Abiathar the priest, “Bring the ephod here.” '
