  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The eunuch replied to Philip, “Please '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tell me,
    - type: text
      text: ' about whom does the prophet say this? About himself or about someone else?” '
  '35':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Philip spoke and beginning with this Scripture he preached Jesus to him [explaining that He is the promised Messiah and the source of salvation]. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'As they continued along the road, they came to some water; and the eunuch exclaimed, “Look! Water! What forbids me from being baptized?” '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Early mss do not contain this v.
      marker-yv: yv-n
    - type: text
      text: '[Philip said to him, “If you believe with all your heart, you may.” And he replied, “I do believe that Jesus Christ is the Son of God.”] '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And he ordered that the chariot be stopped; and both Philip and the eunuch went down into the water, and Philip baptized him. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When they came up out of the water, the Spirit of the Lord [suddenly] took Philip [and carried him] away [to a different place]; and the eunuch no longer saw him, but he went on his way rejoicing. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now those [believers] who had been scattered went from place to place preaching the word [the good news of salvation through Christ]. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But Philip found himself at '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'OT '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Ashdod
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Azotus, and as he passed through he preached the good news [of salvation] to all the cities, until he came to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Caesarea Maritima (Caesarea-on-the-Sea) was a coastal city and artificial harbor built by Herod the Great. It was an important city, both politically and militarily, and its harbor was the largest on the eastern Mediterranean coast. It was the capital of Judea, and the official residence of the prefects and procurators appointed by Rome. Both Pontius Pilate (prefect, '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: '. 26-36) and Antonius Felix (procurator, '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: d
        - type: text
          text: . 52-60) would have been based here during their respective terms of office.
      marker-yv: yv-n
    - type: text
      text: Caesarea [Maritima].
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the Seven named in 6:5; 21:8.
      marker-yv: yv-n
    - type: text
      text: 'Philip [the evangelist] went down to the city of Samaria and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' proclaiming Christ (the Messiah, the Anointed) to them. [Acts 6:5] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The crowds gathered and were paying close attention to everything Philip said, as they heard [the message] and saw the [miraculous] signs which he was doing [validating his message]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For unclean spirits (demons), shouting loudly, were coming out of many who were possessed; and many who had been paralyzed and lame were healed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So there was great rejoicing in that city.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was a man named Simon, who previously practiced magic in the city and amazed the people of Samaria, claiming to be someone great. '
