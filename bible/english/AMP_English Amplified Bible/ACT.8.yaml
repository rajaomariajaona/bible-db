  '10':
  - type: text
    content: 'They all paid [a great deal of] attention to him, from the least to the greatest, saying, “This man is what is called the Great Power of God!” '
  '11':
  - type: text
    content: 'They were paying attention to him because for a long time he had mystified '
  - type: text
    content: and
  - type: text
    content: ' dazzled them with his magic. '
  '12':
  - type: text
    content: 'But when they believed Philip as he preached the '
  - type: note
    content: In ancient Greece the word translated as “good news” or “gospel” was used to denote any good fortune, including success in a battle.
  - type: text
    content: 'good news about the kingdom of God and the name of Jesus Christ, they were being baptized, both men and women. '
  '13':
  - type: text
    content: 'Even Simon believed [Philip’s message of salvation]; and after being baptized, he continued on with Philip, and as he watched the '
  - type: text
    content: attesting
  - type: text
    content: ' signs and great miracles taking place, he was constantly amazed.'
  '14':
  - type: text
    content: 'When the apostles in Jerusalem heard that [the people of] Samaria had accepted the word of God, they sent Peter and John to them. '
  '15':
  - type: text
    content: 'They came down and prayed for them that they might receive the Holy Spirit; '
  '16':
  - type: text
    content: 'for He had not yet fallen on any of them; they had simply been baptized in the name of the Lord Jesus [as His possession]. '
  '17':
  - type: text
    content: 'Then Peter and John laid their hands on them [one by one], and they received the Holy Spirit. '
  '18':
  - type: text
    content: 'Now when Simon saw that the Spirit was given through the laying on of the apostles’ hands, he offered them money, '
  '19':
  - type: text
    content: 'saying, “Give me this authority '
  - type: text
    content: and
  - type: text
    content: ' power too, so that anyone on whom I lay my hands may receive the Holy Spirit.” '
  '2':
  - type: text
    content: 'Some devout men buried Stephen, and '
  - type: note
    content: It was customary to hire professional mourners for most funerals to ensure that the deceased would be properly mourned, but those who mourned Stephen needed no such assistance because they expressed their own heartfelt grief.
  - type: text
    content: 'mourned greatly over him [expressing a personal sense of loss]. '
  '20':
  - type: text
    content: 'But Peter said to him, “May your money be destroyed along with you, because you thought you could buy the [free] gift of God with money! '
  '21':
  - type: text
    content: 'You have no part or share in this matter, because your heart (motive, purpose) is not right before God. [Ps 78:37] '
  '22':
  - type: text
    content: 'So repent of this wickedness of yours, and pray to the Lord that, if possible, this thought of your heart may be forgiven you. '
  '23':
  - type: text
    content: 'For I see that you are '
  - type: note
    content: Lit in the gall of.
  - type: text
    content: 'provoked by bitterness and bound by sin.” [Deut 29:18; Is 58:6] '
  '24':
  - type: text
    content: But Simon answered, “Pray to the Lord for me both of you, so that nothing of what you have said will come upon me.”
  - type: heading
    content: An Ethiopian Receives Christ
  '25':
  - type: text
    content: So, when Peter and John had given their testimony and preached the word of the Lord, they started back to Jerusalem, preaching the good news [about salvation] in many Samaritan villages [along the way].
  '26':
  - type: text
    content: 'But an angel of the Lord said to Philip, “Get up and go south to the road that runs from Jerusalem down to Gaza.” (This is a desert road). '
  '27':
  - type: text
    content: 'So he got up and went; and there was an Ethiopian eunuch [a man of great authority], a court official of Candace, queen of the Ethiopians, who was in charge of all her treasure. He had come to Jerusalem to worship, '
  '28':
  - type: text
    content: 'and he was returning, and sitting in his chariot he was reading [the scroll of] the prophet Isaiah. '
  '29':
  - type: text
    content: 'Then the [Holy] Spirit said to Philip, “Go up and join this chariot.” '
  '3':
  - type: text
    content: 'But Saul '
  - type: text
    content: began
  - type: text
    content: ' ravaging the church [and assaulting believers]; entering house after house and dragging off men and women, putting them in prison.'
  - type: heading
