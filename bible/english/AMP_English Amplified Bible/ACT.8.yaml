  '34':
  - type: text
    content: 'The eunuch replied to Philip, “Please '
  - type: text
    content: tell me,
  - type: text
    content: ' about whom does the prophet say this? About himself or about someone else?” '
  '35':
  - type: text
    content: 'Then Philip spoke and beginning with this Scripture he preached Jesus to him [explaining that He is the promised Messiah and the source of salvation]. '
  '36':
  - type: text
    content: 'As they continued along the road, they came to some water; and the eunuch exclaimed, “Look! Water! What forbids me from being baptized?” '
  '37':
  - type: note
    content: Early mss do not contain this v.
  - type: text
    content: '[Philip said to him, “If you believe with all your heart, you may.” And he replied, “I do believe that Jesus Christ is the Son of God.”] '
  '38':
  - type: text
    content: 'And he ordered that the chariot be stopped; and both Philip and the eunuch went down into the water, and Philip baptized him. '
  '39':
  - type: text
    content: 'When they came up out of the water, the Spirit of the Lord [suddenly] took Philip [and carried him] away [to a different place]; and the eunuch no longer saw him, but he went on his way rejoicing. '
  '4':
  - type: text
    content: 'Now those [believers] who had been scattered went from place to place preaching the word [the good news of salvation through Christ]. '
  '40':
  - type: text
    content: 'But Philip found himself at '
  - type: note
    content: OT Ashdod.
  - type: text
    content: 'Azotus, and as he passed through he preached the good news [of salvation] to all the cities, until he came to '
  - type: note
    content: Caesarea Maritima (Caesarea-on-the-Sea) was a coastal city and artificial harbor built by Herod the Great. It was an important city, both politically and militarily, and its harbor was the largest on the eastern Mediterranean coast. It was the capital of Judea, and the official residence of the prefects and procurators appointed by Rome. Both Pontius Pilate (prefect, a.d. 26-36) and Antonius Felix (procurator, a.d. 52-60) would have been based here during their respective terms of office.
  - type: text
    content: Caesarea [Maritima].
  '5':
  - type: note
    content: One of the Seven named in 6:5; 21:8.
  - type: text
    content: 'Philip [the evangelist] went down to the city of Samaria and '
  - type: text
    content: began
  - type: text
    content: ' proclaiming Christ (the Messiah, the Anointed) to them. [Acts 6:5] '
  '6':
  - type: text
    content: 'The crowds gathered and were paying close attention to everything Philip said, as they heard [the message] and saw the [miraculous] signs which he was doing [validating his message]. '
  '7':
  - type: text
    content: 'For unclean spirits (demons), shouting loudly, were coming out of many who were possessed; and many who had been paralyzed and lame were healed. '
  '8':
  - type: text
    content: So there was great rejoicing in that city.
  '9':
  - type: text
    content: 'Now there was a man named Simon, who previously practiced magic in the city and amazed the people of Samaria, claiming to be someone great. '
