      - type: text
        text: Saul Persecutes the Church
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul wholeheartedly approved of Stephen’s death.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: A
    - type: text
      text: 'nd on that day a great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' relentless persecution broke out against the church in Jerusalem; and the believers were all scattered throughout the regions of Judea and Samaria, except for the apostles. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all paid [a great deal of] attention to him, from the least to the greatest, saying, “This man is what is called the Great Power of God!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were paying attention to him because for a long time he had mystified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dazzled them with his magic. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they believed Philip as he preached the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In ancient Greece the word translated as “good news” or “gospel” was used to denote any good fortune, including success in a battle.
      marker-yv: yv-n
    - type: text
      text: 'good news about the kingdom of God and the name of Jesus Christ, they were being baptized, both men and women. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even Simon believed [Philip’s message of salvation]; and after being baptized, he continued on with Philip, and as he watched the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: attesting
    - type: text
      text: ' signs and great miracles taking place, he was constantly amazed.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the apostles in Jerusalem heard that [the people of] Samaria had accepted the word of God, they sent Peter and John to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came down and prayed for them that they might receive the Holy Spirit; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for He had not yet fallen on any of them; they had simply been baptized in the name of the Lord Jesus [as His possession]. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter and John laid their hands on them [one by one], and they received the Holy Spirit. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Simon saw that the Spirit was given through the laying on of the apostles’ hands, he offered them money, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, “Give me this authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power too, so that anyone on whom I lay my hands may receive the Holy Spirit.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some devout men buried Stephen, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was customary to hire professional mourners for most funerals to ensure that the deceased would be properly mourned, but those who mourned Stephen needed no such assistance because they expressed their own heartfelt grief.
      marker-yv: yv-n
    - type: text
      text: 'mourned greatly over him [expressing a personal sense of loss]. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter said to him, “May your money be destroyed along with you, because you thought you could buy the [free] gift of God with money! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have no part or share in this matter, because your heart (motive, purpose) is not right before God. [Ps 78:37] '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So repent of this wickedness of yours, and pray to the Lord that, if possible, this thought of your heart may be forgiven you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I see that you are '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: in the gall of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'provoked by bitterness and bound by sin.” [Deut 29:18; Is 58:6] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Simon answered, “Pray to the Lord for me both of you, so that nothing of what you have said will come upon me.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: An Ethiopian Receives Christ
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So, when Peter and John had given their testimony and preached the word of the Lord, they started back to Jerusalem, preaching the good news [about salvation] in many Samaritan villages [along the way].
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But an angel of the Lord said to Philip, “Get up and go south to the road that runs from Jerusalem down to Gaza.” (This is a desert road). '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he got up and went; and there was an Ethiopian eunuch [a man of great authority], a court official of Candace, queen of the Ethiopians, who was in charge of all her treasure. He had come to Jerusalem to worship, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he was returning, and sitting in his chariot he was reading [the scroll of] the prophet Isaiah. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the [Holy] Spirit said to Philip, “Go up and join this chariot.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Saul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' ravaging the church [and assaulting believers]; entering house after house and dragging off men and women, putting them in prison.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Philip in Samaria
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philip ran up and heard the man reading the prophet Isaiah, and asked, “Do you understand what you are reading?” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Well, how could I [understand] unless someone guides me [correctly]?” And he invited Philip to come up and sit with him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
