document_id: DEU.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shun Idolatry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“If a prophet arises among you, or a dreamer of dreams, and gives you a sign or a wonder, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and the sign or the wonder which he spoke (foretold) to you comes to pass, and if he says, ‘Let us follow after other gods (whom you have not known) and let us serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worship them,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: you shall not listen to the words of that prophet or that dreamer of dreams; for the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God is testing you to know whether you love the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God with all your heart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' mind and all your soul [your entire being]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You shall walk after the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God and you shall fear [and worship] Him [with awe-filled reverence and profound respect], and you shall keep His commandments and you shall listen to His voice, and you shall serve Him, and cling to Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But that prophet or that dreamer of dreams shall be put to death, because he has counseled rebellion against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God who brought you from the land of Egypt and redeemed you from the house of slavery, to draw you away from the way in which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has commanded you to walk. So you shall remove the evil from among you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“If your brother, the son of your mother, or your son or daughter, or '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the wife of your bosom
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the wife you cherish, or your friend who is as [precious to you as] your own life (soul), entices you secretly, saying, ‘Let us go and serve other gods’ (
  - type: usfm
    marker: it
    children:
    - type: text
      text: gods
  - type: text
    text: ' whom neither you nor your fathers have known, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'of the gods of the peoples who are around you, near you or far from you, from one end of the earth to the other), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'you shall not consent to him or listen to him; and your eye shall not pity him, nor shall you spare him or conceal him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Instead, you shall most certainly execute him; your hand shall be first [to be raised] against him to put him to death, and afterwards the hand of all the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So you shall stone him to death with stones, because he has tried to draw you away from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God who brought you from the land of Egypt, from the house of slavery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then all Israel will hear and be afraid, and will never again do such a wicked thing among you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “If you hear [it said] in one of your cities, which the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God gives you to live in, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'that some worthless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' evil men have gone out from among you and have tempted the inhabitants of their city [to sin], saying, ‘Let us go and serve other gods’ (whom you have not known), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'then you shall investigate and search out [witnesses] and ask thorough '
  - type: usfm
    marker: it
    children:
    - type: text
      text: questions
  - type: text
    text: '. If it is true and the matter is established that this loathsome thing has been done among you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'you shall most certainly strike the inhabitants of that city with the edge of the sword, utterly destroying it and all that is in it, even its livestock with the edge of the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then you shall collect all its spoil (plunder) into the middle of its open square and burn the city and set fire to the spoil as a whole burnt offering to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God. It shall be a ruin forever. It shall not be built again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nothing from that which is put under the ban (designated for destruction) shall cling to your hand, so that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' may turn away from His burning anger and show mercy to you, and have compassion on you and make you increase, just as He swore to your fathers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'because you have listened to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' obeyed the voice of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God, keeping all His commandments which I am commanding you today, and doing what is right in the eyes of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God.'
