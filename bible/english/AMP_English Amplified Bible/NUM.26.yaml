document_id: NUM.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Census of a New Generation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew has a different chapter and verse division at this point in the text. In Hebrew, 25:19 reads, “Then it happened after the plague.” In English, these words are added to the beginning of 26:1.
    marker-yv: yv-n
  - type: text
    text: Then it happened after the plague that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Moses and Eleazar the son of Aaron the priest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Take a census of all the [males in the] congregation of the sons of Israel from twenty years old and upward, by their fathers’ households, all in Israel who are able to go to war.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Moses and Eleazar the priest spoke with the people in the plains of Moab by the Jordan at Jericho, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: A census of the people shall be taken
  - type: text
    text: ' from twenty years old and upward, just as the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has commanded Moses.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: N
  - type: text
    text: 'ow the Israelites who came out of the land of Egypt were:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Reuben, the firstborn of Israel (Jacob), the sons of Reuben: of Hanoch, the family of the Hanochites; of Pallu, the family of the Palluites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'of Hezron, the family of the Hezronites; of Carmi, the family of the Carmites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'These are the families (clans) of the Reubenites; and those who were numbered of them were 43,730. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The son of Pallu: Eliab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Eliab: Nemuel and Dathan and Abiram. These are the Dathan and Abiram who were called by the congregation, who contended against Moses and Aaron in the company of Korah, when they contended against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the earth opened its mouth and swallowed them up along with Korah, when that company died, when the fire devoured two hundred and fifty men, so that they became a [warning] sign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But Korah’s sons did not die [because they did not participate in the rebellion].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Simeon according to their families: of Nemuel, the family of the Nemuelites; of Jamin, the family of the Jaminites; of Jachin, the family of the Jachinites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'of Zerah, the family of the Zerahites; of Shaul, the family of the Shaulites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: These are the families (clans) of the Simeonites, 22,200.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Gad according to their families: of Zephon, the family of the Zephonites; of Haggi, the family of the Haggites; of Shuni, the family of the Shunites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'of Ozni, the family of the Oznites; of Eri, the family of the Erites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'of Arod, the family of the Arodites; of Areli, the family of the Arelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: These are the families (clans) of the sons of Gad according to those who were numbered, 40,500.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Judah were Er and Onan, but Er and Onan [were judged by God and] died in the land of Canaan. [Gen 38:7-10] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The sons of Judah according to their families: of Shelah, the family of the Shelanites; of Perez, the family of the Perezites; of Zerah, the family of the Zerahites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Perez: of Hezron, the family of the Hezronites; of Hamul, the family of the Hamulites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These are the families (clans) of Judah according to those who were numbered, 76,500.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Issachar according to their families: of Tola, the family of the Tolaites; of Puvah, the family of the Punites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'of Jashub, the family of the Jashubites; of Shimron, the family of the Shimronites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: These are the families (clans) of Issachar according to those who were numbered, 64,300.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The sons of Zebulun according to their families: of Sered, the family of the Seredites; of Elon, the family of the Elonites; of Jahleel, the family of the Jahleelites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: These are the families (clans) of the Zebulunites according to those who were numbered, 60,500.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The sons of Joseph according to their families were Manasseh and Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The sons of Manasseh: of Machir, the family of the Machirites; and Machir was the father of Gilead; of Gilead, the family of the Gileadites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'These are the sons of Gilead: of Iezer, the family of the Iezerites; of Helek, the family of the Helekites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'of Asriel, the family of the Asrielites; of Shechem, the family of the Shechemites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'of Shemida, the family of the Shemidaites; and of Hepher, the family of the Hepherites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Zelophehad the son of Hepher had no sons, but only daughters, and the names of Zelophehad’s daughters were Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: These are the families (clans) of Manasseh; and those who were numbered of them were 52,700.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'These are the sons of Ephraim according to their families: of Shuthelah, the family of the Shuthelahites; of Becher, the family of the Becherites; of Tahan, the family of the Tahanites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And these are the sons of Shuthelah: of Eran, the family of the Eranites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: These are the families (clans) of the sons of Ephraim according to those who were numbered, 32,500. These are the descendants of Joseph according to their families (clans).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The sons of Benjamin according to their families: of Bela, the family of the Belaites; of Ashbel, the family of the Ashbelites; of Ahiram, the family of the Ahiramites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'of Shephupham, the family of the Shuphamites; of Hupham, the family of the Huphamites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The sons of Bela were Ard and Naaman: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of Ard,
  - type: text
    text: ' the family of the Ardites; of Naaman, the family of the Naamites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: These are the sons of Benjamin according to their families (clans); and those who were numbered, 45,600.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'These are the sons of Dan according to their families: of Shuham, the family of the Shuhamites. These are the families of Dan according to their families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: All the families (clans) of the Shuhamites according to those who were numbered, 64,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Of the sons of Asher according to their families: of Imnah, the family of the Imnites; of Ishvi, the family of the Ishvites; of Beriah, the family of the Beriites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Of the sons of Beriah: of Heber, the family of the Heberites; of Malchiel, the family of the Malchielites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And the name of the daughter of Asher was Serah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: These are the families (clans) of the sons of Asher according to those who were numbered, 53,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Of the sons of Naphtali according to their families: of Jahzeel, the family of the Jahzeelites; of Guni, the family of the Gunites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'of Jezer, the family of the Jezerites; of Shillem, the family of the Shillemites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: These are the families (clans) of Naphtali according to their families; and those who were numbered of them were 45,400.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: This was the [total] number of the [male] Israelites, 601,730 [twenty years old and upward who were able to go to war].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '“Among these the land shall be divided as an inheritance according to the number of names. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'To the larger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tribe
  - type: text
    text: ' you shall give the larger inheritance, and to the smaller '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tribe
  - type: text
    text: ' the smaller inheritance; each '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tribe
  - type: text
    text: ' shall be given its inheritance according to its numbers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'But the land shall be divided by lot. They shall receive their inheritance according to the names of the tribes of their fathers (tribal ancestors). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: According to the [location selected by] lot, their inheritance shall be divided between the larger and the smaller [groups].”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'These are those who were numbered of the Levites according to their families: of Gershon, the family of the Gershonites; of Kohath, the family of the Kohathites; of Merari, the family of the Merarites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'These are the families of Levi: the family of the Libnites, the family of the Hebronites, the family of the Mahlites, the family of the Mushites, the family of the Korahites. And Kohath was the father of Amram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'The name of Amram’s wife was Jochebed, the daughter of Levi, who was born to Levi in Egypt; and to Amram she bore Aaron, Moses, and Miriam their sister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'To Aaron were born Nadab, Abihu, Eleazar, and Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: But Nadab and Abihu died [in the presence of God] when they offered [in their ceremonial censers] strange [unholy, unacceptable, unauthorized] fire before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. [Lev 10:1-3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Those numbered of the Levites were 23,000, every male from a month old and upward; for they were not numbered among the sons of Israel, since no inheritance [of land] was given to them among the Israelites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'These are those numbered by Moses and Eleazar the priest, who numbered the sons of Israel [for the second time] in the plains of Moab by the Jordan [River] at Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'But among these there was not a man [left] of those numbered by Moses and Aaron the priest, who numbered the sons of Israel [for the first time] in the Wilderness of Sinai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: For the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had said of them, “They shall certainly die in the wilderness.” And not a man was left of them except Caleb the son of Jephunneh and Joshua the son of Nun.'
