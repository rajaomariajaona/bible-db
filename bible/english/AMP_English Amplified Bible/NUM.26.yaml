document_id: NUM.26,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Census of a New Generation
  - type: text
    content: ' '
  - type: note
    content: The Hebrew has a different chapter and verse division at this point in the text. In Hebrew, 25:19 reads, “Then it happened after the plague.” In English, these words are added to the beginning of 26:1.
  - type: text
    content: Then it happened after the plague that the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses and Eleazar the son of Aaron the priest, '
  '10':
  - type: text
    content: 'and the earth opened its mouth and swallowed them up along with Korah, when that company died, when the fire devoured two hundred and fifty men, so that they became a [warning] sign. '
  '11':
  - type: text
    content: But Korah’s sons did not die [because they did not participate in the rebellion].
  '12':
  - type: text
    content: 'The sons of Simeon according to their families: of Nemuel, the family of the Nemuelites; of Jamin, the family of the Jaminites; of Jachin, the family of the Jachinites; '
  '13':
  - type: text
    content: 'of Zerah, the family of the Zerahites; of Shaul, the family of the Shaulites. '
  '14':
  - type: text
    content: These are the families (clans) of the Simeonites, 22,200.
  '15':
  - type: text
    content: 'The sons of Gad according to their families: of Zephon, the family of the Zephonites; of Haggi, the family of the Haggites; of Shuni, the family of the Shunites; '
  '16':
  - type: text
    content: 'of Ozni, the family of the Oznites; of Eri, the family of the Erites; '
  '17':
  - type: text
    content: 'of Arod, the family of the Arodites; of Areli, the family of the Arelites. '
  '18':
  - type: text
    content: These are the families (clans) of the sons of Gad according to those who were numbered, 40,500.
  '19':
  - type: text
    content: 'The sons of Judah were Er and Onan, but Er and Onan [were judged by God and] died in the land of Canaan. [Gen 38:7-10] '
  '2':
  - type: text
    content: '“Take a census of all the [males in the] congregation of the sons of Israel from twenty years old and upward, by their fathers’ households, all in Israel who are able to go to war.” '
  '20':
  - type: text
    content: 'The sons of Judah according to their families: of Shelah, the family of the Shelanites; of Perez, the family of the Perezites; of Zerah, the family of the Zerahites. '
  '21':
  - type: text
    content: 'The sons of Perez: of Hezron, the family of the Hezronites; of Hamul, the family of the Hamulites. '
  '22':
  - type: text
    content: These are the families (clans) of Judah according to those who were numbered, 76,500.
  '23':
  - type: text
    content: 'The sons of Issachar according to their families: of Tola, the family of the Tolaites; of Puvah, the family of the Punites; '
  '24':
  - type: text
    content: 'of Jashub, the family of the Jashubites; of Shimron, the family of the Shimronites. '
  '25':
  - type: text
    content: These are the families (clans) of Issachar according to those who were numbered, 64,300.
  '26':
  - type: text
    content: 'The sons of Zebulun according to their families: of Sered, the family of the Seredites; of Elon, the family of the Elonites; of Jahleel, the family of the Jahleelites. '
  '27':
  - type: text
    content: These are the families (clans) of the Zebulunites according to those who were numbered, 60,500.
  '28':
  - type: text
    content: 'The sons of Joseph according to their families were Manasseh and Ephraim. '
  '29':
  - type: text
    content: 'The sons of Manasseh: of Machir, the family of the Machirites; and Machir was the father of Gilead; of Gilead, the family of the Gileadites. '
  '3':
  - type: text
    content: 'So Moses and Eleazar the priest spoke with the people in the plains of Moab by the Jordan at Jericho, saying, '
  '30':
  - type: text
    content: 'These are the sons of Gilead: of Iezer, the family of the Iezerites; of Helek, the family of the Helekites; '
  '31':
  - type: text
    content: 'of Asriel, the family of the Asrielites; of Shechem, the family of the Shechemites; '
  '32':
  - type: text
    content: 'of Shemida, the family of the Shemidaites; and of Hepher, the family of the Hepherites. '
  '33':
  - type: text
    content: 'Zelophehad the son of Hepher had no sons, but only daughters, and the names of Zelophehad’s daughters were Mahlah, Noah, Hoglah, Milcah, and Tirzah. '
  '34':
  - type: text
    content: These are the families (clans) of Manasseh; and those who were numbered of them were 52,700.
  '35':
  - type: text
    content: 'These are the sons of Ephraim according to their families: of Shuthelah, the family of the Shuthelahites; of Becher, the family of the Becherites; of Tahan, the family of the Tahanites. '
  '36':
  - type: text
    content: 'And these are the sons of Shuthelah: of Eran, the family of the Eranites. '
  '37':
  - type: text
    content: These are the families (clans) of the sons of Ephraim according to those who were numbered, 32,500. These are the descendants of Joseph according to their families (clans).
  '38':
  - type: text
    content: 'The sons of Benjamin according to their families: of Bela, the family of the Belaites; of Ashbel, the family of the Ashbelites; of Ahiram, the family of the Ahiramites; '
  '39':
  - type: text
    content: 'of Shephupham, the family of the Shuphamites; of Hupham, the family of the Huphamites. '
  '4':
  - type: text
    content: “
  - type: text
    content: A census of the people shall be taken
  - type: text
    content: ' from twenty years old and upward, just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' has commanded Moses.”'
  - type: text
    content: N
  - type: text
    content: 'ow the Israelites who came out of the land of Egypt were:'
  '40':
  - type: text
    content: 'The sons of Bela were Ard and Naaman: '
  - type: text
    content: of Ard,
  - type: text
    content: ' the family of the Ardites; of Naaman, the family of the Naamites. '
  '41':
  - type: text
    content: These are the sons of Benjamin according to their families (clans); and those who were numbered, 45,600.
  '42':
  - type: text
    content: 'These are the sons of Dan according to their families: of Shuham, the family of the Shuhamites. These are the families of Dan according to their families. '
  '43':
  - type: text
    content: All the families (clans) of the Shuhamites according to those who were numbered, 64,400.
  '44':
  - type: text
    content: 'Of the sons of Asher according to their families: of Imnah, the family of the Imnites; of Ishvi, the family of the Ishvites; of Beriah, the family of the Beriites. '
  '45':
  - type: text
    content: 'Of the sons of Beriah: of Heber, the family of the Heberites; of Malchiel, the family of the Malchielites. '
  '46':
  - type: text
    content: 'And the name of the daughter of Asher was Serah. '
  '47':
  - type: text
    content: These are the families (clans) of the sons of Asher according to those who were numbered, 53,400.
  '48':
  - type: text
    content: 'Of the sons of Naphtali according to their families: of Jahzeel, the family of the Jahzeelites; of Guni, the family of the Gunites; '
  '49':
  - type: text
    content: 'of Jezer, the family of the Jezerites; of Shillem, the family of the Shillemites. '
  '5':
  - type: text
    content: 'Reuben, the firstborn of Israel (Jacob), the sons of Reuben: of Hanoch, the family of the Hanochites; of Pallu, the family of the Palluites; '
  '50':
  - type: text
    content: These are the families (clans) of Naphtali according to their families; and those who were numbered of them were 45,400.
  '51':
  - type: text
    content: This was the [total] number of the [male] Israelites, 601,730 [twenty years old and upward who were able to go to war].
  '52':
  - type: text
    content: And the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '53':
  - type: text
    content: '“Among these the land shall be divided as an inheritance according to the number of names. '
  '54':
  - type: text
    content: 'To the larger '
  - type: text
    content: tribe
  - type: text
    content: ' you shall give the larger inheritance, and to the smaller '
  - type: text
    content: tribe
  - type: text
    content: ' the smaller inheritance; each '
  - type: text
    content: tribe
  - type: text
    content: ' shall be given its inheritance according to its numbers. '
  '55':
  - type: text
    content: 'But the land shall be divided by lot. They shall receive their inheritance according to the names of the tribes of their fathers (tribal ancestors). '
  '56':
  - type: text
    content: According to the [location selected by] lot, their inheritance shall be divided between the larger and the smaller [groups].”
  '57':
  - type: text
    content: 'These are those who were numbered of the Levites according to their families: of Gershon, the family of the Gershonites; of Kohath, the family of the Kohathites; of Merari, the family of the Merarites. '
  '58':
  - type: text
    content: 'These are the families of Levi: the family of the Libnites, the family of the Hebronites, the family of the Mahlites, the family of the Mushites, the family of the Korahites. And Kohath was the father of Amram. '
  '59':
  - type: text
    content: 'The name of Amram’s wife was Jochebed, the daughter of Levi, who was born to Levi in Egypt; and to Amram she bore Aaron, Moses, and Miriam their sister. '
  '6':
  - type: text
    content: 'of Hezron, the family of the Hezronites; of Carmi, the family of the Carmites. '
  '60':
  - type: text
    content: 'To Aaron were born Nadab, Abihu, Eleazar, and Ithamar. '
  '61':
  - type: text
    content: But Nadab and Abihu died [in the presence of God] when they offered [in their ceremonial censers] strange [unholy, unacceptable, unauthorized] fire before the L
  - type: heading
    content: ord
  - type: text
    content: '. [Lev 10:1-3] '
  '62':
  - type: text
    content: Those numbered of the Levites were 23,000, every male from a month old and upward; for they were not numbered among the sons of Israel, since no inheritance [of land] was given to them among the Israelites.
  '63':
  - type: text
    content: 'These are those numbered by Moses and Eleazar the priest, who numbered the sons of Israel [for the second time] in the plains of Moab by the Jordan [River] at Jericho. '
  '64':
  - type: text
    content: 'But among these there was not a man [left] of those numbered by Moses and Aaron the priest, who numbered the sons of Israel [for the first time] in the Wilderness of Sinai. '
  '65':
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' had said of them, “They shall certainly die in the wilderness.” And not a man was left of them except Caleb the son of Jephunneh and Joshua the son of Nun.'
  '7':
  - type: text
    content: 'These are the families (clans) of the Reubenites; and those who were numbered of them were 43,730. '
  '8':
  - type: text
    content: 'The son of Pallu: Eliab. '
  '9':
  - type: text
    content: 'The sons of Eliab: Nemuel and Dathan and Abiram. These are the Dathan and Abiram who were called by the congregation, who contended against Moses and Aaron in the company of Korah, when they contended against the L'
  - type: heading
    content: ord
  - type: text
    content: ', '
