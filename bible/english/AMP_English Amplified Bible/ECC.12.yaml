document_id: ECC.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Remember God in Your Youth
  - type: text
    content: 'Remember [thoughtfully] also your Creator in the days of your youth [for you are not your own, but His], before the evil days come or the years draw near when you will say [of physical pleasures], “I have no enjoyment '
  - type: text
    content: and
  - type: text
    content: ' delight in them”; [2 Sam 19:35] '
  '10':
  - type: text
    content: The Preacher sought to find delightful words, even to write correctly words of truth.
  '11':
  - type: text
    content: 'The words of the wise are like [prodding] goads, and '
  - type: text
    content: these
  - type: text
    content: ' collected sayings are [firmly fixed in the mind] like well-driven nails; '
  - type: note
    content: This verse establishes the divine inspiration of Ecclesiastes.
  - type: text
    content: 'they are given by one Shepherd. [Ezek 37:24] '
  '12':
  - type: text
    content: 'But beyond this my son, [about going further than the words given by one Shepherd], be warned: the writing of many books is endless [so do not believe everything you read], and excessive study '
  - type: text
    content: and
  - type: text
    content: ' devotion '
  - type: text
    content: to books
  - type: text
    content: ' is wearying to the body.'
  '13':
  - type: text
    content: 'When all has been heard, the end of the matter is: fear God [worship Him with awe-filled reverence, knowing that He is almighty God] and keep His commandments, for this applies to every person. '
  '14':
  - type: text
    content: 'For God will bring every act to judgment, every hidden '
  - type: text
    content: and
  - type: text
    content: ' secret thing, whether it is good or evil. [Matt 12:36; Acts 17:30, 31; Rom 2:16; 1 Cor 4:5]'
  '2':
  - type: text
    content: 'before the sun and the light, and the moon and the stars are darkened [by impaired vision], and the clouds [of depression] return after the rain [of tears]; '
  '3':
  - type: text
    content: 'in the day when the keepers of the house (hands, arms) tremble, and the strong men (feet, knees) bow themselves, and the grinders (molar teeth) cease because they are few, and those (eyes) who look through the windows grow dim; '
  '4':
  - type: text
    content: 'when the doors (lips) are shut in the streets and the sound of the grinding [of the teeth] is low, and one rises at the sound of a bird '
  - type: text
    content: and
  - type: text
    content: ' the crowing of a rooster, and all the daughters of music (voice, ears) sing softly. '
  '5':
  - type: text
    content: 'Furthermore, they are afraid of a high place and of dangers on the road; the almond tree (hair) blossoms [white], and the grasshopper (a little thing) is a burden, and the '
  - type: note
    content: This is an actual bush that grows in the region of the Mediterranean Sea. It is used in various condiments. In this verse some think it refers to loss of taste in old age, others to sexual desire (taking the fruit as an aphrodisiac), but which is not clear.
  - type: text
    content: 'caperberry (desire, appetite) fails. For man goes to his eternal home and the mourners go about the streets '
  - type: text
    content: and
  - type: text
    content: ' market places. [Job 17:13] '
  '6':
  - type: text
    content: Earnestly remember your Creator
  - type: text
    content: ' before the silver cord [of life] is broken, or the golden bowl is crushed, or the pitcher at the fountain is shattered and the wheel at the cistern is crushed; '
  '7':
  - type: text
    content: 'then the dust [out of which God made man’s body] will return to the earth as it was, and the spirit will return to God who gave it. '
  '8':
  - type: text
    content: “Vanity of vanities,” says the Preacher. “All [that is done without God’s guidance] is vanity (futility).” [Eccl 1:2; Rom 8:20]
  - type: heading
    content: Purpose of the Preacher
  '9':
  - type: text
    content: 'Furthermore, because the Preacher was wise, he still taught the people knowledge; and he pondered and searched out and arranged many proverbs. '
