document_id: ECC.12,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Remember God in Your Youth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Remember [thoughtfully] also your Creator in the days of your youth [for you are not your own, but His], before the evil days come or the years draw near when you will say [of physical pleasures], “I have no enjoyment '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in them”; [2 Sam 19:35] '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The Preacher sought to find delightful words, even to write correctly words of truth.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The words of the wise are like [prodding] goads, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' collected sayings are [firmly fixed in the mind] like well-driven nails; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse establishes the divine inspiration of Ecclesiastes.
      marker-yv: yv-n
    - type: text
      text: 'they are given by one Shepherd. [Ezek 37:24] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But beyond this my son, [about going further than the words given by one Shepherd], be warned: the writing of many books is endless [so do not believe everything you read], and excessive study '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' devotion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to books
    - type: text
      text: ' is wearying to the body.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When all has been heard, the end of the matter is: fear God [worship Him with awe-filled reverence, knowing that He is almighty God] and keep His commandments, for this applies to every person. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For God will bring every act to judgment, every hidden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' secret thing, whether it is good or evil. [Matt 12:36; Acts 17:30, 31; Rom 2:16; 1 Cor 4:5]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'before the sun and the light, and the moon and the stars are darkened [by impaired vision], and the clouds [of depression] return after the rain [of tears]; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'in the day when the keepers of the house (hands, arms) tremble, and the strong men (feet, knees) bow themselves, and the grinders (molar teeth) cease because they are few, and those (eyes) who look through the windows grow dim; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'when the doors (lips) are shut in the streets and the sound of the grinding [of the teeth] is low, and one rises at the sound of a bird '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the crowing of a rooster, and all the daughters of music (voice, ears) sing softly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Furthermore, they are afraid of a high place and of dangers on the road; the almond tree (hair) blossoms [white], and the grasshopper (a little thing) is a burden, and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an actual bush that grows in the region of the Mediterranean Sea. It is used in various condiments. In this verse some think it refers to loss of taste in old age, others to sexual desire (taking the fruit as an aphrodisiac), but which is not clear.
      marker-yv: yv-n
    - type: text
      text: 'caperberry (desire, appetite) fails. For man goes to his eternal home and the mourners go about the streets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' market places. [Job 17:13] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Earnestly remember your Creator
    - type: text
      text: ' before the silver cord [of life] is broken, or the golden bowl is crushed, or the pitcher at the fountain is shattered and the wheel at the cistern is crushed; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'then the dust [out of which God made man’s body] will return to the earth as it was, and the spirit will return to God who gave it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Vanity of vanities,” says the Preacher. “All [that is done without God’s guidance] is vanity (futility).” [Eccl 1:2; Rom 8:20]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Purpose of the Preacher
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Furthermore, because the Preacher was wise, he still taught the people knowledge; and he pondered and searched out and arranged many proverbs. '
