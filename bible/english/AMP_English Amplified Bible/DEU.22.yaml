verses:
  '1':
  - type: heading
    content: Various Laws
  - type: text
    content: '“You shall not see your countryman’s ox or his sheep straying away '
  - type: text
    content: or
  - type: text
    content: ' being stolen, and '
  - type: note
    content: Lit hide yourself from them, and so throughout the chapter.
  - type: text
    content: 'ignore [your duty to help] them; you shall certainly take them back to him. [Prov 24:12] '
  '10':
  - type: text
    content: '“You shall not plow with an ox [a clean animal] and a donkey [an unclean animal] '
  - type: note
    content: As a practical matter, the two different species would not work well together, particularly pulling a plow, wagon, etc.
  - type: text
    content: together. [2 Cor 6:14-16]
  '11':
  - type: text
    content: “You shall not wear a fabric made of wool and linen blended together [a fabric pagans believed to be magical]. [Ezek 44:18; Rev 19:8]
  '12':
  - type: text
    content: “You shall make tassels for yourself on the four corners of your outer garment with which you cover yourself. [Num 15:37-40]
  - type: heading
    content: Laws on Morality
  '13':
  - type: text
    content: '“If any man takes a wife and goes in to her and then scorns '
  - type: text
    content: and
  - type: text
    content: ' hates her, '
  '14':
  - type: text
    content: 'and charges her [without cause] with shameful behavior and '
  - type: note
    content: Lit brings upon her an evil name.
  - type: text
    content: 'publicly defames her, and says, ‘I took this woman, but when I approached her, I did not find in her evidence of virginity,’ '
  '15':
  - type: text
    content: 'then the young woman’s father and her mother shall get and bring out the evidence of her virginity to the elders of the city at the gate [where court is held]. '
  '16':
  - type: text
    content: 'The father of the young woman shall say to the elders, ‘I gave my daughter to this man as a wife, but he hates her '
  - type: text
    content: and
  - type: text
    content: ' has turned against her; '
  '17':
  - type: text
    content: 'and behold, he has made baseless charges against her, saying, “I did not find in your daughter the evidence of her virginity.” But this is the evidence of my daughter’s virginity.’ And they shall spread out the '
  - type: note
    content: I.e. a blood-stained bed sheet or item of clothing from the wedding night.
  - type: text
    content: 'garment before the elders of the city. '
  '18':
  - type: text
    content: 'Then the elders of that city shall take the man and reprimand him, '
  '19':
  - type: text
    content: 'and they shall fine him a hundred '
  - type: text
    content: shekels
  - type: text
    content: ' of silver and give it to the father of the young woman, because he '
  - type: note
    content: Lit brought an evil name upon.
  - type: text
    content: publicly defamed a virgin of Israel. And she shall remain his wife; he is not allowed to divorce her as long as he lives.
  '2':
  - type: text
    content: 'If your countryman is not nearby or you do not know him, you shall bring the animal to your house, and it shall stay with you until he searches for it; then you shall return it to him. '
  '20':
  - type: text
    content: '“But if this charge is true that the evidence of virginity was not found in the young woman, '
  '21':
  - type: text
    content: then they shall bring her out to the doorway of her father’s house, and the men of her city shall stone her to death because she has committed a deliberate sin in Israel by playing the prostitute in her father’s house. So you shall remove the evil from among you.
  '22':
  - type: text
    content: '“If a man is '
  - type: note
    content: Lit found lying, and so throughout.
  - type: text
    content: intimate with a woman who is another man’s wife, they shall both be put to death, the man who lay with the woman, and the woman. So you shall remove the evil from Israel.
  '23':
  - type: text
    content: '“If a young woman who is a virgin is engaged (legally betrothed) to a man, and '
  - type: text
    content: another
  - type: text
    content: ' man finds her in the city and is intimate with her, '
  '24':
  - type: text
    content: then you shall bring them both out to the gate of that city and stone them to death—the young woman because she did not cry out for help [though she was] in the city, and the man because he has violated his neighbor’s [promised] wife. So you shall remove the evil from among you.
  '25':
  - type: text
    content: '“However, if the man finds the girl who is engaged (legally betrothed) in the [open] field, and seizes her and is intimate with her [by force], then only the man who lies with her shall be put to death. '
  '26':
  - type: text
    content: 'But you shall do nothing to the young woman; she has committed no sin worthy of death, for this is the same as when a man attacks his neighbor and murders '
  - type: note
    content: Lit his soul.
  - type: text
    content: 'him. '
  '27':
  - type: text
    content: When he found her in the [open] field, the engaged girl [may have] cried out for help, but there was no one to [hear and] save her.
  '28':
  - type: text
    content: '“If a man finds a girl who is a virgin, who is not engaged, and seizes her and is intimate with her and they are discovered, '
  '29':
  - type: text
    content: 'then the man who was intimate with her shall give fifty '
  - type: text
    content: shekels
  - type: text
    content: ' of silver to the girl’s father, and she shall become his wife because he has violated her; he can '
  - type: note
    content: Lit all his days.
  - type: text
    content: never divorce her.
  '3':
  - type: text
    content: 'You shall do this with his donkey or with his garment or with anything that your countryman has lost and you have found. You are not allowed to ignore [your duty to help] them. '
  '30':
  - type: text
    content: “
  - type: note
    content: In Hebrew this is 23:1, changing the versification throughout the following chapter.
  - type: text
    content: 'A man shall not take his father’s [former] wife, so that he will not '
  - type: note
    content: Lit uncover his father’s skirt.
  - type: text
    content: expose his father’s wife.
  '4':
  - type: text
    content: You shall not see your countryman’s donkey or his ox fall down along the road, and ignore [your duty to help] them; you shall certainly help him lift it up.
  '5':
  - type: text
    content: “A woman shall not wear a man’s clothing, nor shall a man put on a woman’s clothing; for whoever does these things is utterly repulsive to the L
  - type: heading
    content: ord
  - type: text
    content: ' your God.'
  '6':
  - type: text
    content: '“If you happen to come upon a bird’s nest along the road, in any tree or on the ground, with young ones or eggs, and the mother [bird] is sitting on the young or on the eggs, you shall not take the mother with the young. '
  '7':
  - type: text
    content: You shall certainly let the mother go, but you may take the young for yourself, so that it may be well with you and that you may prolong your days.
  '8':
  - type: text
    content: “When you build a new house, you shall make a railing (parapet) around your [flat] roof, so that you do not bring the guilt of [innocent] blood on your house if someone falls from it.
  '9':
  - type: text
    content: “You shall not sow your vineyard with two kinds of seed, or everything produced by the seed which you have sown and the yield of the vineyard will become defiled [and banned for use].
