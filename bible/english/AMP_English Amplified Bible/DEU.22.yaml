      children:
      - type: text
        text: '6'
    - type: text
      text: '“If you happen to come upon a bird’s nest along the road, in any tree or on the ground, with young ones or eggs, and the mother [bird] is sitting on the young or on the eggs, you shall not take the mother with the young. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
