  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “When you build a new house, you shall make a railing (parapet) around your [flat] roof, so that you do not bring the guilt of [innocent] blood on your house if someone falls from it.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “You shall not sow your vineyard with two kinds of seed, or everything produced by the seed which you have sown and the yield of the vineyard will become defiled [and banned for use].
