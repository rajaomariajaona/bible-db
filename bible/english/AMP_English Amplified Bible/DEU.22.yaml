  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “A woman shall not wear a man’s clothing, nor shall a man put on a woman’s clothing; for whoever does these things is utterly repulsive to the L
    - type: usfm
