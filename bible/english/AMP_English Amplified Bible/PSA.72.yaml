document_id: PSA.72,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 72
  - type: heading
    content: The Reign of the Righteous King.
  - type: text
    content: A Psalm of Solomon.
  - type: text
    content: Give the king [knowledge of] Your judgments, O God,
  - type: text
    content: And [the spirit of] Your righteousness to the king’s son [to guide all his ways].
  '10':
  - type: text
    content: The kings of Tarshish and of the islands will bring offerings;
  - type: text
    content: The kings of Sheba and Seba will offer gifts.
  '11':
  - type: text
    content: Yes, all kings will bow down before him,
  - type: text
    content: All nations will serve him. [Ps 138:4]
  '12':
  - type: text
    content: ¶For he will rescue the needy when he cries for help,
  - type: text
    content: 'The afflicted '
  - type: text
    content: and
  - type: text
    content: ' abused also, and him who has no helper.'
  '13':
  - type: text
    content: He will have compassion on the poor and needy,
  - type: text
    content: And he will save the lives of the needy.
  '14':
  - type: text
    content: 'He will redeem their life from oppression '
  - type: text
    content: and
  - type: text
    content: ' fraud and violence,'
  - type: text
    content: And their blood will be precious in His sight.
  '15':
  - type: text
    content: So may he live, and may the gold of Sheba be given to him;
  - type: text
    content: And let them pray for him continually;
  - type: text
    content: 'Let them bless '
  - type: text
    content: and
  - type: text
    content: ' praise him all day long.'
  '16':
  - type: text
    content: '¶There will be an abundance of grain in the soil on the top of the '
  - type: note
    content: I.e. the most barren part of the land.
  - type: text
    content: mountains;
  - type: text
    content: Its fruit will wave like [the cedars of] Lebanon,
  - type: text
    content: And those of the city will flourish like grass of the earth.
  '17':
  - type: text
    content: May his name endure forever;
  - type: text
    content: May his name continue as long as the sun;
  - type: text
    content: And let men bless themselves by him;
  - type: text
    content: Let all nations call him blessed.
  '18':
  - type: text
    content: ¶Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ' God, the God of Israel,'
  - type: text
    content: Who alone does wonderful things.
  '19':
  - type: text
    content: Blessed be His glorious name forever;
  - type: text
    content: And may the whole earth be filled with His glory.
  - type: text
    content: Amen and Amen.
  '2':
  - type: text
    content: May he judge Your people with righteousness,
  - type: text
    content: And Your afflicted with justice. [1 Kin 3:1-5]
  '20':
  - type: text
    content: ¶The prayers of David son of Jesse are ended.
  '3':
  - type: text
    content: 'The mountains will bring peace '
  - type: text
    content: and
  - type: text
    content: ' prosperity to the people,'
  - type: text
    content: And the hills, in [the establishment of] righteousness.
  '4':
  - type: text
    content: May he bring justice to the poor among the people,
  - type: text
    content: Save the children of the needy
  - type: text
    content: And crush the oppressor,
  '5':
  - type: text
    content: ¶Let them fear You [with awe-inspired reverence and worship You with obedience] while the sun endures,
  - type: text
    content: And as long as the moon [reflects light], throughout all generations.
  '6':
  - type: text
    content: May he come down like rain on the mown grass,
  - type: text
    content: Like showers that water the earth.
  '7':
  - type: text
    content: In his days may the righteous flourish,
  - type: text
    content: And peace abound until the moon is no more. [Is 11:1-9]
  '8':
  - type: text
    content: ¶May he also rule from sea to sea
  - type: text
    content: And from the River [Euphrates] to the ends of the earth. [Zech 14:9]
  '9':
  - type: text
    content: The nomads of the desert will bow before him,
  - type: text
    content: 'And his enemies will '
  - type: note
    content: I.e. lay themselves face down in submission.
  - type: text
    content: lick the dust.
