document_id: PSA.72
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 72
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Reign of the Righteous King.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Psalm of Solomon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Give the king [knowledge of] Your judgments, O God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [the spirit of] Your righteousness to the king’s son [to guide all his ways].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May he judge Your people with righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Your afflicted with justice. [1 Kin 3:1-5]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The mountains will bring peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' prosperity to the people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the hills, in [the establishment of] righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: May he bring justice to the poor among the people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save the children of the needy
- type: usfm
  marker: q1
  children:
  - type: text
    text: And crush the oppressor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶Let them fear You [with awe-inspired reverence and worship You with obedience] while the sun endures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as long as the moon [reflects light], throughout all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May he come down like rain on the mown grass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like showers that water the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In his days may the righteous flourish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And peace abound until the moon is no more. [Is 11:1-9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶May he also rule from sea to sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: And from the River [Euphrates] to the ends of the earth. [Zech 14:9]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The nomads of the desert will bow before him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And his enemies will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. lay themselves face down in submission.
    marker-yv: yv-n
  - type: text
    text: lick the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The kings of Tarshish and of the islands will bring offerings;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kings of Sheba and Seba will offer gifts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Yes, all kings will bow down before him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All nations will serve him. [Ps 138:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶For he will rescue the needy when he cries for help,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The afflicted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abused also, and him who has no helper.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He will have compassion on the poor and needy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he will save the lives of the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He will redeem their life from oppression '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fraud and violence,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their blood will be precious in His sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So may he live, and may the gold of Sheba be given to him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let them pray for him continually;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let them bless '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' praise him all day long.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '¶There will be an abundance of grain in the soil on the top of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the most barren part of the land.
    marker-yv: yv-n
  - type: text
    text: mountains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its fruit will wave like [the cedars of] Lebanon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those of the city will flourish like grass of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: May his name endure forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: May his name continue as long as the sun;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let men bless themselves by him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all nations call him blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Blessed be the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' God, the God of Israel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who alone does wonderful things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Blessed be His glorious name forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And may the whole earth be filled with His glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen and Amen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ¶The prayers of David son of Jesse are ended.
