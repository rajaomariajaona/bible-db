    content: 'And he deceives those [unconverted ones] who inhabit the earth [into believing him] because of the signs which he is given [by Satan] to perform in the presence of the [first] beast, telling those who inhabit the earth to make an image to the beast who was wounded [fatally] by the sword and has come back to life. [Deut 13:1-5; Mark 13:22; 2 Thess 2:9, 10] '
  '15':
  - type: text
