  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'He was also '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: given
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'permitted to wage war against the saints (God’s people) and to overcome them, and authority '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
