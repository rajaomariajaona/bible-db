        - type: text
          text: See note v 1.
      marker-yv: yv-n
    - type: text
      text: 'another beast rising up out of the earth; he had two horns like a lamb and he spoke like a dragon. [Matt 7:15, 16] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He exercises all the authority of the first beast in his presence [when the two are together]. And he makes the earth and those who inhabit it worship the first beast, whose deadly wound was healed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He performs great signs (awe-inspiring acts), even making fire fall from the sky to the earth, right before peoples’ eyes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And he deceives those [unconverted ones] who inhabit the earth [into believing him] because of the signs which he is given [by Satan] to perform in the presence of the [first] beast, telling those who inhabit the earth to make an image to the beast who was wounded [fatally] by the sword and has come back to life. [Deut 13:1-5; Mark 13:22; 2 Thess 2:9, 10] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And he is given power to give breath to the image of the beast, so that the image of the beast will even [appear to] speak, and cause those who do not bow down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship the image of the beast to be put to death. [Dan 3:5] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Also he compels all, the small and the great, and the rich and the poor, and the free men and the slaves, to be given a mark on their right hand or on their forehead [signifying allegiance to the beast], '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'and that no one will be able to buy or sell, except the one who has the mark, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: either
    - type: text
      text: ' the name of the beast or the number of his name. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Here is wisdom. Let the person who has enough insight calculate the number of the beast, for it is the [imperfect] number of a man; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Regardless of the earthly power of the two beasts (the demonically controlled Antichrist/dictator and his false prophet) described in these verses, they and their mentor, Satan, fall far short of the power, perfection, and majesty of God the Father, God the Son, and God the Holy Spirit, whose perfection is represented biblically by the number seven.
      marker-yv: yv-n
    - type: text
      text: 'and his number is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not actually three sixes (or the equivalent in Greek or Hebrew letters), as commonly represented. Such a combination would not be used; and if it were, the sum would then be only eighteen, because in alphabet-based numbering systems like ancient Hebrew and Greek, place values are not used (10’s, 100’s etc.), but the letters are treated more like Roman numerals. What John is most likely indicating is that the letters of the name will add up to 666 (the best Greek manuscripts have the number spelled out), and there could be many different combinations of letters that would do so. Determining the values of the individual letters is another matter. John probably assumed that the name would be Hebrew or Greek, and in Hebrew vowels for the most part are not represented as letters. Further complications arise when names from other nationalities are considered, and are converted for valuation. For example, at various times it has been argued that the name “Nero Caesar” adds up to 666 when transliterated to Hebrew as NRWN QSR (according to the Greek form); but in the Talmud, the name is transliterated as NYRWN QYSR, which totals 686. Also, the original Latin form of the name (without the second “n”), if converted directly to Hebrew, adds up to 616, and a few ancient manuscripts had that number.
      marker-yv: yv-n
    - type: text
      text: six hundred and sixty-six.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the beast that I saw resembled a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These animals are mentioned in Dan 7:4-6, where the leopard represents Greece, the bear Medo-Persia, and the lion Babylon.
      marker-yv: yv-n
    - type: text
      text: 'leopard, but his feet were like those of a bear, and his mouth was like that of a lion. And the dragon gave him his power and his throne and great authority. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I saw
    - type: text
      text: ' one of his heads which seemed to have a fatal wound, but his fatal wound was healed; and the entire earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: followed
    - type: text
      text: ' after the beast in amazement. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They fell down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worshiped the dragon because he gave his authority to the beast; they also worshiped the beast, saying, “Who is like (as great as) the beast, and who is able to wage war against him?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the beast was given a mouth (the power of speech), uttering great things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' arrogant and blasphemous words, and he was given freedom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' authority to act '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to do as he pleased for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The last half of the Tribulation.
      marker-yv: yv-n
    - type: text
      text: 'forty-two months (three and a half years). [Dan 7:8] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
