    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The dragon, who is Satan, stands at the head of an unholy, idolatrous trinity, comprised also of the first beast, who is the Antichrist (vv 1-10) and has a healed wound, and the second beast, who is the false prophet and deceives unbelievers to worship Antichrist through false signs (vv 11-18).
      marker-yv: yv-n
    - type: text
      text: dragon (Satan) stood on the sandy shore of the sea. [Dan 7:7]
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: T
    - type: text
      text: 'hen I saw a [vicious] beast coming up out of the sea with ten horns and seven heads, and on his horns were ten royal '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The symbol of political, royal, or military power.
      marker-yv: yv-n
    - type: text
      text: 'crowns (diadems), and on his heads were blasphemous names. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If anyone '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is destined
    - type: text
      text: ' for captivity, he will go into captivity; if anyone kills with a sword, he must be killed with a sword. Here is [the call for] the patient endurance and the faithfulness of the saints [which is seen in the response of God’s people to difficult times]. [Jer 15:2]'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Beast from the Earth
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I saw '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:11 '
      - type: usfm
        marker: ft
