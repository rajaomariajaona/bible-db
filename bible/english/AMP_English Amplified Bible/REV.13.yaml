  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All the inhabitants of the earth will fall down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship him, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: everyone
    - type: text
