  '16':
  - type: text
    content: 'Also he compels all, the small and the great, and the rich and the poor, and the free men and the slaves, to be given a mark on their right hand or on their forehead [signifying allegiance to the beast], '
  '17':
  - type: text
    content: 'and that no one will be able to buy or sell, except the one who has the mark, '
