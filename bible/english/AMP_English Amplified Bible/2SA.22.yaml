  '40':
  - type: text
    content: “For You have surrounded me with strength for the battle;
  - type: text
    content: You have subdued under me those who stood against me.
  '41':
  - type: text
    content: “You have also made my enemies turn their backs to me [in retreat],
  - type: text
    content: And I destroyed those who hated me.
  '42':
  - type: text
    content: '“They looked, but there was no savior '
  - type: text
