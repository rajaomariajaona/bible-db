document_id: 2SA.22,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David’s Psalm of Rescue
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: David spoke the words of this song to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' when the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' rescued him from the hands of all his enemies and from the hand of Saul. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “He bowed the heavens also, and came down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With thick darkness under His feet.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “He rode on a cherub and flew;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He appeared upon the wings of the wind.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“He made darkness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some mss read '
        - type: usfm
          marker: it
          children:
          - type: text
            text: His covering
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: canopies around Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A mass of waters, thick clouds of the skies.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Out of the brightness before Him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Coals of fire were set aflame.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' thundered from heaven,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the Most High uttered His voice.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “He sent out arrows and scattered them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lightning, and confused them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “The channels of the sea appeared,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The foundations of the world were uncovered
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the rebuke of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the blast of the breath of His nostrils.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “He sent from above, He took me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He drew me out of great waters.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “He rescued me from my strong enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From those who hated me, for they were too mighty for me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “They came upon me in the day of my calamity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was my support.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is my rock and my fortress [on the mountain] and my rescuer; [1 Sam 23:14, 25, 28]'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “He also brought me out to an open place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rescued me because He delighted in me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has dealt with me according to my righteousness;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to the cleanness of my hands He has rewarded me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “For I have kept the ways of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And have not acted wickedly against my God.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “For all His judgments (legal decisions) were before me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from His statutes I did not turn aside.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “I was also blameless before Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And kept myself from wrongdoing.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “Therefore the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has rewarded me according to my righteousness,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: According to my cleanness in His sight.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“With the loving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loyal You show Yourself loving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' loyal,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the blameless You show Yourself blameless.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “With the pure You show Yourself pure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the perverted You show Yourself astute.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “And You save the afflicted people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But Your eyes are on the haughty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whom
    - type: text
      text: ' You abase (humiliate).'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “For You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', are my lamp;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' illumines '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dispels my darkness.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the God of my rock
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: My God, my rock, in whom I take refuge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My shield and the horn of my salvation, my stronghold and my refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My Savior—You save me from violence. [Gen 15:1]
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “For by You I can run upon a troop;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By my God I can leap over a wall.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“As for God, His way is blameless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfect;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is tested.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is a shield to all those who take refuge '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trust in Him.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: “For who is God, besides the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who is a rock, besides our God? [1 Sam 2:2]
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “God is my strong fortress;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets the blameless in His way.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '“He makes my feet like the doe’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feet
    - type: text
      text: ' [firm and swift];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sets me [secure and confident] on my high places.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: “He trains my hands for war,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that my arms can bend (pull back) a bow of bronze.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “You have also given me the shield of Your salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Your help '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gentleness make me great.'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: “You enlarge my steps under me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And my feet have not slipped.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: “I pursued my enemies and destroyed them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I did not turn back until they were consumed (eliminated).
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: “I consumed them and shattered them, so that they did not rise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They fell under my feet.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I call on the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who is worthy to be praised,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I am saved from my enemies.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: “For You have surrounded me with strength for the battle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have subdued under me those who stood against me.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: “You have also made my enemies turn their backs to me [in retreat],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I destroyed those who hated me.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '“They looked, but there was no savior '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for them
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' to the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [they looked], but He did not answer them.'
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: “Then I beat them as [small as] the dust of the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I crushed and stamped them as the mire (dirt, mud) of the streets.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: “You also have rescued me from strife with my [own] people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have kept me as the head of the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People whom I have not known served me.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: “Foreigners pretend obedience to me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As soon as they hear [me], they obey me.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: “Foreigners lose heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They come trembling out of their strongholds.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' lives, and blessed be my rock,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And exalted be my God, the rock of my salvation.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: “It is God who executes vengeance for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brings down [and disciplines] the peoples under me,
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Who also brings me out from my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You even lift me above those who rise up against me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You rescue me from the violent man.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “For the waves of death encompassed me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The torrents of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Belial
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'destruction overwhelmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified me.'
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: '“For this I will give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise You, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', among the nations;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing praises to Your name.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: '“He is a tower of salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' great deliverance to His king,'
  - type: usfm
    marker: q1
    children:
    - type: text
