  - type: text
    content: ' [they looked], but He did not answer them.'
  '43':
  - type: text
    content: “Then I beat them as [small as] the dust of the earth;
  - type: text
    content: I crushed and stamped them as the mire (dirt, mud) of the streets.
  '44':
  - type: text
    content: “You also have rescued me from strife with my [own] people;
  - type: text
    content: You have kept me as the head of the nations.
  - type: text
    content: People whom I have not known served me.
  '45':
  - type: text
    content: “Foreigners pretend obedience to me;
  - type: text
    content: As soon as they hear [me], they obey me.
  '46':
  - type: text
    content: “Foreigners lose heart;
  - type: text
    content: They come trembling out of their strongholds.
  '47':
  - type: text
    content: “The L
  - type: heading
    content: ord
  - type: text
    content: ' lives, and blessed be my rock,'
  - type: text
    content: And exalted be my God, the rock of my salvation.
  '48':
  - type: text
    content: “It is God who executes vengeance for me,
  - type: text
    content: And brings down [and disciplines] the peoples under me,
  '49':
  - type: text
    content: Who also brings me out from my enemies.
  - type: text
    content: You even lift me above those who rise up against me;
  - type: text
