  '38':
  - type: text
    content: “I pursued my enemies and destroyed them,
  - type: text
    content: And I did not turn back until they were consumed (eliminated).
  '39':
  - type: text
    content: “I consumed them and shattered them, so that they did not rise;
  - type: text
