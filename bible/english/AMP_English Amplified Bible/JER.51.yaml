document_id: JER.51,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylon Judged for Sins against Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Behold, I am going to stir up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' put into action [a fury] against Babylon'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And against the [rebellious] people of Leb-kamai (Chaldea)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A destroying wind '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' hostile spirit;'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has brought about our vindication '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' has revealed the righteousness of our cause;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come and let us proclaim in Zion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The work of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' our God!'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Sharpen the arrows, take up the shields [and cover yourselves]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has stirred up the spirit of the kings of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Perhaps a reference to the conquest of Babylon by the Medes and the Persians in 539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Medes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because His purpose concerning Babylon is to destroy it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that is the vengeance of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', vengeance [on Babylon] for [plundering and destroying] His temple.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set up a signal on the walls of Babylon [to spread the news];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Post a strong blockade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Station the guards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare the men for ambush!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has both purposed and done'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That which He spoke against the people of Babylon.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[O Babylon] you who live by many waters,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rich in treasures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your end has come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the line measuring your life is cut. [Rev 17:1-6]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts has sworn [an oath] by Himself, saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Surely I will fill you with men, as with [a swarm of] locusts [who strip the land clean],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And they will lift up a song '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' shout of victory over you.”'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶He made the earth by His power;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He established the world by His wisdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And stretched out the heavens by His understanding.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When He utters His voice, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there is
    - type: text
      text: ' a tumult of waters in the heavens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He causes the clouds to ascend from the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes lightnings for the rain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brings out the wind from His storehouses.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Every man has become stupid '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brutelike, without knowledge [of God];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every goldsmith is shamed by the cast images he has made;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For his molten idols are a lie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And there is no breath [of life] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' spirit in them.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They are worthless (empty, false, futile), a work of delusion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthy of derision;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the time of their inspection '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' punishment they will perish.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Portion of Jacob [the true God of Israel] is not like these [handmade gods];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He is the Maker of all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the One who formed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fashioned all things,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Israel is the tribe of His inheritance—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is His name. [Jer 10:12-16]'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will send foreigners to Babylon that they may winnow her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And may devastate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empty her land;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in the day of destruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be against her on every side.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You [Cyrus of Persia, soon to conquer Babylon] are My battle-axe and weapon of war—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For with you I shatter nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I destroy kingdoms.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “With you I shatter the horse and his rider,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I shatter the chariot and its driver,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I shatter man and woman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I shatter old man and youth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I shatter young man and virgin,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I shatter the shepherd and his flock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With you I shatter the farmer and his yoke of oxen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And with you I shatter governors and commanders.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And I will [completely] repay Babylon and all the people of Chaldea for all the evil that they have done in Zion—before your very eyes [I will do it],” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I am against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O destroying mountain [conqueror of nations],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who destroys the whole earth,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will stretch out My hand against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And roll you down from the [rugged] cliffs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will make you a burnt mountain (extinct volcano).
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They will not take from you [even] a stone for a cornerstone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor any rock for a foundation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you will be '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Is 13:22 for this prophecy’s fulfillment.
      marker-yv: yv-n
    - type: text
      text: desolate forever,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Lift up a signal in the land [to spread the news]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blow the trumpet among the nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dedicate the nations [for war] against her;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call against her the kingdoms of Ararat, Minni, and Ashkenaz.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appoint a marshal against her;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cause the horses to come up like bristly locusts [with their wings not yet released from their cases].
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Prepare '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dedicate the nations for war against her—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kings of Media,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With their governors and commanders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every land of their dominion.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land trembles and writhes [in pain and sorrow],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the purposes of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' against Babylon stand,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To make the land of Babylon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A desolation without inhabitants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not let him (the Chaldean defender) who bends his bow bend it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor let him rise up in his coat of armor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So do not spare her young men;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devote her entire army to destruction.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty warriors of Babylon have ceased to fight;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They remain in their strongholds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Their strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power have failed;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are becoming [weak and helpless] like women.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their dwelling places are set on fire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Babylon fell in 539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . on the night King Belshazzar was assassinated (Dan 5:30).
      marker-yv: yv-n
    - type: text
      text: 'bars on her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gates
    - type: text
      text: ' are broken.'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One courier runs to meet another,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And one messenger to meet another,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To tell the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In 553 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . Belshazzar was named co-ruler of Babylon by his father, King Nabonidus, and reigned in that capacity until Babylon was conquered. In spite of this co-regency, Nabonidus is regarded historically as the last of the Babylonian kings. Belshazzar’s mother, Nitrocris, was the daughter of King Nebuchadnezzar.
      marker-yv: yv-n
    - type: text
      text: king of Babylon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That his city has been captured from end to end;
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And that the fords [across the Euphrates] have been blocked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' [the ferries] seized,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they have set the [great] marshes on fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the men of war are terrified.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The Daughter of Babylon is like a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At harvest time the threshing floor had to be firmly trampled before the grain or seeds could be extracted with the flail. A flail consisted of a handle to which was attached a freely swinging stick or bar. In the Bible, the harvest is often used as metaphor for judgment.
      marker-yv: yv-n
    - type: text
      text: threshing floor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'At the time it is being trampled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' prepared;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet in a little while the time of harvest will come for her.”
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '¶“Nebuchadnezzar king of Babylon has devoured '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jewish captives.
      marker-yv: yv-n
    - type: text
      text: me, he has crushed me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has set me down like an empty vessel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a monster he has swallowed me up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has filled his belly with my delicacies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has spit me out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' washed me away.'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“May the violence done to me and to my flesh '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' blood be upon Babylon,”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The inhabitant of Zion will say;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, “May my blood be upon the inhabitants of Chaldea,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem will say.
  '36':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, I will plead your case
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take full vengeance for you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will dry up her sea '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' great reservoir'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And make her fountain dry.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Babylon will become a heap [of ruins], a haunt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dwelling place of jackals,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An object of horror (an astonishing desolation) and a hissing [of scorn and amazement], without inhabitants.
  '38':
  - type: usfm
