  '8':
  - type: text
    content: Babylon has suddenly fallen and is shattered!
  - type: text
    content: Wail for her [if you care to]!
  - type: text
    content: Get balm for her [incurable] pain;
  - type: text
    content: Perhaps she may be healed. [Jer 25:15; Rev 14:8-10; 16:19; 18:2, 3]
  '9':
  - type: text
    content: We would have healed Babylon, but she was not to be healed.
  - type: text
    content: Abandon her and let each [captive] return to his own country,
  - type: text
    content: 'For her guilt '
  - type: text
    content: and
  - type: text
    content: ' judgment have reached to heaven'
  - type: text
    content: And are lifted up to the very skies. [Gen 18:20, 21]
