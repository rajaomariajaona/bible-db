          text: Babylon was surrounded by a moat and two separate walls approximately fifty feet high. Both walls consisted of two layers. The outer layer of the outer wall was twenty-five feet thick, and the inner layer twenty-three feet thick. The outer layer of the inner defensive wall was twenty-one feet thick, and the inner layer twelve feet thick. These walls were so massive that archeologists estimate that 180 million bricks were required for their construction. Babylon’s immense ruins may still be seen—an amazing, enduring testimony to the power of God.
