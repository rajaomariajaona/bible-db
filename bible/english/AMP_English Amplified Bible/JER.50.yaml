document_id: JER.50
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prophecy against Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The word that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spoke concerning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Babylon was the name of the magnificent capital city of Babylonia, but “Babylon” was commonly used to refer to the entire area which was located at the eastern end of the Fertile Crescent. Both the plain of Shinar and Chaldea (land of the Chaldeans) were part of ancient Babylonia.
    marker-yv: yv-n
  - type: text
    text: 'Babylon and concerning the land of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Chaldeans became the dominant people in Babylonia in about 721 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: . when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
    marker-yv: yv-n
  - type: text
    text: 'Chaldeans through Jeremiah the prophet: [Is 13:1-14:23; 47; Hab 1:1, 2]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Declare among the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lift up a signal [to spread the news]—publish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' proclaim it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not conceal it; say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Babylon has been taken,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Bel [the patron god] has been shamed, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Merodach
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Marduk (Bel) has been shattered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Babylon’s images have been shamed, her [worthless] idols have been thrown down.’
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For out of the north a nation (Media) has come against her which will make her land desolate, and no one will live there. They have fled, they have gone away—both man and animal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “In those days and at that time,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “the children of Israel will come, they and the children of Judah together; they will come up weeping [in repentance] as they come and seek the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' their God [inquiring for and of Him]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They will ask the way to Zion, with their faces in that direction, saying, ‘Come, let us join ourselves to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' in an everlasting covenant that will not be forgotten.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶“My people have become lost sheep;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their shepherds have led them astray.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have made them turn aside [to the seductive places of idolatry] on the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have gone along [from one sin to another] from mountain to hill;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have forgotten their [own] resting place. [Is 53:6; 1 Pet 2:25]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “All who found them have devoured them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their adversaries have said, ‘We are not guilty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they have sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [and are no longer holy to Him], their [true] habitation of righteousness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' justice,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the [confident] hope of their fathers.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“Wander away from the midst of Babylon
- type: usfm
  marker: q1
  children:
  - type: text
    text: And go out of the land of the Chaldeans;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be like the male goats [who serve as leaders] at the head of the flocks. [Jer 51:6, 9, 45; 2 Cor 6:17; Rev 18:4]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “For behold, I will stir up and bring up against Babylon
- type: usfm
  marker: q1
  children:
  - type: text
    text: An assembly of great nations from the north country.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They will equip themselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' set up the battle lines against her;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From there she will be taken captive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their arrows will be like an expert warrior
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will not return empty-handed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Chaldea will become plunder;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who plunder her will be satisfied,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ¶“Though you are glad, though you rejoice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O you who plunder My heritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Though you are wanton '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' skip about like a heifer in the grass'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And neigh like stallions,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Your mother [Babylon] shall be greatly shamed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: She who gave you birth will be ashamed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: she will be
  - type: text
    text: ' the least of the nations,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A wilderness, a parched land and a desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Because of the wrath of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' she will not be inhabited'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But she will be completely desolate;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who goes by Babylon will be appalled
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And will hiss (mock) at all her wounds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' plagues.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Set yourselves in battle formation against Babylon on every side,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All you archers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shoot at her! Do not spare the arrows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For she has sinned against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Raise the battle cry against her on every side!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'She has given her hand [in agreement] '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' has surrendered; her pillars have fallen,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her walls have been torn down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For this is the vengeance of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take vengeance on her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: As she has done [to others], do to her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Cut off the sower from Babylon
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the one who handles the sickle at the time of harvest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For fear of the sword of the oppressor
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone will return to his own people
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everyone will flee to his own land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Israel is a hunted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' scattered flock [driven here and there as prey]; the lions have chased '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them away
  - type: text
    text: '. First the king of Assyria devoured him, and now at last Nebuchadnezzar king of Babylon has broken (gnawed) his bones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Therefore thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts, the God of Israel, ‘Behold, I will visit (inspect, examine) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish the king of Babylon and his land, just as I visited '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punished the king of Assyria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I will bring Israel [home] again to his pasture and he will graze on [the most fertile lands of] Carmel [in the west] and Bashan [in the east], and his soul will be satisfied on the hills of Ephraim and Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In those days and at that time,’ says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', ‘a search will be made for the wickedness of Israel, but there will be none and for the sins of Judah, but none will be found, for I will pardon those whom I leave as a remnant.’ [Is 1:9; 43:25; Jer 31:34; 33:8; Rom 9:27]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ¶“Go against [Babylon] the land of Merathaim (Double Rebellion),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go up against it and against the people of Pekod (Punishment).
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kill and utterly destroy them,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “And do everything that I have commanded you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “The noise of battle is in the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [the noise of] great destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “How the hammer of the whole earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is crushed and broken!
- type: usfm
  marker: q1
  children:
  - type: text
    text: How Babylon has become
- type: usfm
  marker: q1
  children:
  - type: text
    text: A horror [of desolation] among the nations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “I set a trap for you and you also were caught, O Babylon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you did not know it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been found and also seized
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because you have struggled against the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has opened His armory'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And has brought out [the nations who unknowingly are] the weapons of His indignation (wrath),
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it is a work of the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts'
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the land of the Chaldeans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Come against her from the farthest border.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Open her storehouses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pile it up like heaps of rubbish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Burn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroy her completely;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let nothing be left of her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Kill all her young bulls [her strength—her young men];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them go down to the slaughter!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Woe (judgment is coming) to the Chaldeans, for their day has come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time of their punishment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ¶Listen to the voice of the refugees who flee and escape from the land of Babylon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proclaiming in Zion the vengeance of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The vengeance [of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' against the Chaldeans] for [plundering and destroying] His temple.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ¶“Call together many [archers] against Babylon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All those who bend the bow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Encamp against her on every side;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let no one from there escape.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Repay her according to her actions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as she has done, do to her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For she has been proudly defiant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' presumptuous against the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “Therefore her young men will fall in her streets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all her soldiers will be destroyed on that day,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Behold, I am against you, [O Babylon, you] arrogant one, [you who are pride and presumption personified],”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For your day has come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time when I will punish you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “The arrogant (proud) one will stumble and fall
- type: usfm
  marker: q1
  children:
  - type: text
    text: With no one to raise him up;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will set fire to his cities
- type: usfm
  marker: q1
  children:
