- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ¶“Behold, a people is coming from the north,
- type: usfm
  marker: q1
  children:
  - type: text
