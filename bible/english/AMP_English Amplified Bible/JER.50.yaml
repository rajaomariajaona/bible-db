- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “A drought on her waters, and they will dry up!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it is a land of [worthless] idols,
- type: usfm
  marker: q1
  children:
  - type: text
