  - type: text
    text: ' of hosts,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The children of Israel are oppressed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the children of Judah as well;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all who took them captive have held them tightly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have refused to let them go.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Their Redeemer is strong; the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' of hosts is His name.'
- type: usfm
  marker: q1
  children:
