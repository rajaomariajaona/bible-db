document_id: JER.50,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Babylon
  - type: text
    content: The word that the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke concerning '
  - type: note
    content: Babylon was the name of the magnificent capital city of Babylonia, but “Babylon” was commonly used to refer to the entire area which was located at the eastern end of the Fertile Crescent. Both the plain of Shinar and Chaldea (land of the Chaldeans) were part of ancient Babylonia.
  - type: text
    content: 'Babylon and concerning the land of the '
  - type: note
    content: The Chaldeans became the dominant people in Babylonia in about 721 b.c. when Merodach-baladan declared himself king of Babylon. The words “Chaldean” and “Babylonian” are used interchangeably.
  - type: text
    content: 'Chaldeans through Jeremiah the prophet: [Is 13:1-14:23; 47; Hab 1:1, 2]'
  '10':
  - type: text
    content: “Chaldea will become plunder;
  - type: text
    content: All who plunder her will be satisfied,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '11':
  - type: text
    content: ¶“Though you are glad, though you rejoice,
  - type: text
    content: O you who plunder My heritage,
  - type: text
    content: 'Though you are wanton '
  - type: text
    content: and
  - type: text
    content: ' skip about like a heifer in the grass'
  - type: text
    content: And neigh like stallions,
  '12':
  - type: text
    content: Your mother [Babylon] shall be greatly shamed;
  - type: text
    content: She who gave you birth will be ashamed.
  - type: text
    content: 'Behold, '
  - type: text
    content: she will be
  - type: text
    content: ' the least of the nations,'
  - type: text
    content: A wilderness, a parched land and a desert.
  '13':
  - type: text
    content: “Because of the wrath of the L
  - type: heading
    content: ord
  - type: text
    content: ' she will not be inhabited'
  - type: text
    content: But she will be completely desolate;
  - type: text
    content: Everyone who goes by Babylon will be appalled
  - type: text
    content: 'And will hiss (mock) at all her wounds '
  - type: text
    content: and
  - type: text
    content: ' plagues.'
  '14':
  - type: text
    content: “Set yourselves in battle formation against Babylon on every side,
  - type: text
    content: All you archers.
  - type: text
    content: Shoot at her! Do not spare the arrows,
  - type: text
    content: For she has sinned against the L
  - type: heading
    content: ord
  - type: text
    content: .
  '15':
  - type: text
    content: “Raise the battle cry against her on every side!
  - type: text
    content: 'She has given her hand [in agreement] '
  - type: text
    content: and
  - type: text
    content: ' has surrendered; her pillars have fallen,'
  - type: text
    content: Her walls have been torn down.
  - type: text
    content: For this is the vengeance of the L
  - type: heading
    content: ord
  - type: text
    content: ':'
  - type: text
    content: Take vengeance on her;
  - type: text
    content: As she has done [to others], do to her.
  '16':
  - type: text
    content: “Cut off the sower from Babylon
  - type: text
    content: And the one who handles the sickle at the time of harvest.
  - type: text
    content: For fear of the sword of the oppressor
  - type: text
    content: Everyone will return to his own people
  - type: text
    content: And everyone will flee to his own land.
  '17':
  - type: text
    content: 'Israel is a hunted '
  - type: text
    content: and
  - type: text
    content: ' scattered flock [driven here and there as prey]; the lions have chased '
  - type: text
    content: them away
  - type: text
    content: '. First the king of Assyria devoured him, and now at last Nebuchadnezzar king of Babylon has broken (gnawed) his bones. '
  '18':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, ‘Behold, I will visit (inspect, examine) '
  - type: text
    content: and
  - type: text
    content: ' punish the king of Babylon and his land, just as I visited '
  - type: text
    content: and
  - type: text
    content: ' punished the king of Assyria. '
  '19':
  - type: text
    content: 'And I will bring Israel [home] again to his pasture and he will graze on [the most fertile lands of] Carmel [in the west] and Bashan [in the east], and his soul will be satisfied on the hills of Ephraim and Gilead. '
  '2':
  - type: text
    content: “Declare among the nations.
  - type: text
    content: 'Lift up a signal [to spread the news]—publish '
  - type: text
    content: and
  - type: text
    content: ' proclaim it,'
  - type: text
    content: Do not conceal it; say,
  - type: text
    content: ‘Babylon has been taken,
  - type: text
    content: 'Bel [the patron god] has been shamed, '
  - type: note
    content: Heb Merodach.
  - type: text
    content: Marduk (Bel) has been shattered.
  - type: text
    content: Babylon’s images have been shamed, her [worthless] idols have been thrown down.’
  '20':
  - type: text
    content: In those days and at that time,’ says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘a search will be made for the wickedness of Israel, but there will be none and for the sins of Judah, but none will be found, for I will pardon those whom I leave as a remnant.’ [Is 1:9; 43:25; Jer 31:34; 33:8; Rom 9:27]'
  '21':
  - type: text
    content: ¶“Go against [Babylon] the land of Merathaim (Double Rebellion),
  - type: text
    content: Go up against it and against the people of Pekod (Punishment).
  - type: text
    content: Kill and utterly destroy them,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “And do everything that I have commanded you.”
  '22':
  - type: text
    content: “The noise of battle is in the land,
  - type: text
    content: And [the noise of] great destruction.
  '23':
  - type: text
    content: “How the hammer of the whole earth
  - type: text
    content: Is crushed and broken!
  - type: text
    content: How Babylon has become
  - type: text
    content: A horror [of desolation] among the nations!
  '24':
  - type: text
    content: “I set a trap for you and you also were caught, O Babylon,
  - type: text
    content: And you did not know it;
  - type: text
    content: You have been found and also seized
  - type: text
    content: Because you have struggled against the L
  - type: heading
    content: ord
  - type: text
    content: .”
  '25':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has opened His armory'
  - type: text
    content: And has brought out [the nations who unknowingly are] the weapons of His indignation (wrath),
  - type: text
    content: For it is a work of the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts'
  - type: text
    content: In the land of the Chaldeans.
  '26':
  - type: text
    content: Come against her from the farthest border.
  - type: text
    content: Open her storehouses;
  - type: text
    content: Pile it up like heaps of rubbish.
  - type: text
    content: 'Burn '
  - type: text
    content: and
  - type: text
    content: ' destroy her completely;'
  - type: text
    content: Let nothing be left of her.
  '27':
  - type: text
    content: Kill all her young bulls [her strength—her young men];
  - type: text
    content: Let them go down to the slaughter!
  - type: text
    content: Woe (judgment is coming) to the Chaldeans, for their day has come,
  - type: text
    content: The time of their punishment.
  '28':
  - type: text
    content: ¶Listen to the voice of the refugees who flee and escape from the land of Babylon,
  - type: text
    content: Proclaiming in Zion the vengeance of the L
  - type: heading
    content: ord
  - type: text
    content: ' our God,'
  - type: text
    content: The vengeance [of the L
  - type: heading
    content: ord
  - type: text
    content: ' against the Chaldeans] for [plundering and destroying] His temple.'
  '29':
  - type: text
    content: ¶“Call together many [archers] against Babylon,
  - type: text
    content: All those who bend the bow.
  - type: text
    content: Encamp against her on every side;
  - type: text
    content: Let no one from there escape.
  - type: text
    content: Repay her according to her actions;
  - type: text
    content: Just as she has done, do to her.
  - type: text
    content: 'For she has been proudly defiant '
  - type: text
    content: and
  - type: text
    content: ' presumptuous against the L'
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Against the Holy One of Israel.
  '3':
  - type: text
    content: For out of the north a nation (Media) has come against her which will make her land desolate, and no one will live there. They have fled, they have gone away—both man and animal.
  '30':
  - type: text
    content: “Therefore her young men will fall in her streets,
  - type: text
    content: And all her soldiers will be destroyed on that day,” says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '31':
  - type: text
    content: “Behold, I am against you, [O Babylon, you] arrogant one, [you who are pride and presumption personified],”
  - type: text
    content: Says the Lord G
  - type: heading
    content: od
  - type: text
    content: ' of hosts,'
  - type: text
    content: “For your day has come,
  - type: text
    content: The time when I will punish you.
  '32':
  - type: text
    content: “The arrogant (proud) one will stumble and fall
  - type: text
    content: With no one to raise him up;
  - type: text
    content: And I will set fire to his cities
  - type: text
    content: And it will devour all who are around him.”
  '33':
  - type: text
    content: ¶Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts,'
  - type: text
    content: “The children of Israel are oppressed,
  - type: text
    content: And the children of Judah as well;
  - type: text
    content: And all who took them captive have held them tightly,
  - type: text
    content: They have refused to let them go.
  '34':
  - type: text
    content: “Their Redeemer is strong; the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is His name.'
  - type: text
    content: 'He will most certainly plead their case '
  - type: text
    content: and
  - type: text
    content: ' defend their cause'
  - type: text
    content: So that He may bring rest to their land,
  - type: text
    content: But turmoil to the inhabitants of Babylon.
  '35':
  - type: text
    content: “A sword against the Chaldeans,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “And against the inhabitants of Babylon
  - type: text
    content: And against her princes (officials, civic rulers) and against her wise men (astrologers, religious rulers)!
  '36':
  - type: text
    content: “A sword against the oracle priests (the babbling liars), and they will become fools!
  - type: text
    content: 'A sword against her mighty warriors, and they will be shattered '
  - type: text
    content: and
  - type: text
    content: ' destroyed!'
  '37':
  - type: text
    content: “A sword against their horses and against their chariots
  - type: text
    content: And against all the foreign troops that are in her midst,
  - type: text
    content: And they will become [as weak and defenseless as] women!
  - type: text
    content: A sword against her treasures, and they will be plundered!
  '38':
  - type: text
    content: “A drought on her waters, and they will dry up!
  - type: text
    content: For it is a land of [worthless] idols,
  - type: text
    content: And they are mad over fearsome idols [those objects of terror in which they foolishly trust].
  '39':
  - type: text
    content: '¶“Therefore '
  - type: note
    content: See note Is 13:22 for this prophecy’s fulfillment.
  - type: text
    content: wild beasts of the desert will live there [in Babylon] with the jackals;
  - type: text
    content: The ostriches also will live there,
  - type: text
    content: And it will never again be inhabited [with people]
  - type: text
    content: Or lived in from generation to generation. [Is 13:20-22]
  '4':
  - type: text
    content: “In those days and at that time,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “the children of Israel will come, they and the children of Judah together; they will come up weeping [in repentance] as they come and seek the L'
  - type: heading
    content: ord
  - type: text
    content: ' their God [inquiring for and of Him]. '
  '40':
  - type: text
    content: “As when God overthrew Sodom
  - type: text
    content: And Gomorrah and their neighboring cities,” says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “So no man will live there;
  - type: text
    content: Nor shall any son of man live there.” [Jer 49:18]
  '41':
  - type: text
    content: ¶“Behold, a people is coming from the north,
  - type: text
    content: And a great nation and many kings
  - type: text
    content: Will be stirring from the remote parts of the earth.
  '42':
  - type: text
    content: “They seize their bow and spear;
  - type: text
    content: They are cruel and have no compassion.
  - type: text
    content: They sound like the roaring of the sea;
  - type: text
    content: They ride on horses,
  - type: text
    content: Every man equipped like a man [ready] for the battle
  - type: text
    content: Against you, O Daughter of Babylon.
  '43':
  - type: text
    content: “The king of Babylon has heard the report about them,
  - type: text
    content: 'And his hands fall limp '
  - type: text
    content: and
  - type: text
    content: ' helpless;'
  - type: text
    content: Anguish has seized him,
  - type: text
    content: And agony like that of a woman in childbirth.
  '44':
  - type: text
    content: '“See, one will come up like a lion from the thicket of the Jordan against the enduring habitation [of Babylon] '
  - type: text
    content: and
  - type: text
    content: ' its watered pastures; for in an instant I will make Babylon run from his land. I will appoint over Babylon the one whom I choose. For who is like Me, and who will summon Me [into court] '
  - type: text
    content: and
  - type: text
    content: ' prosecute Me [for this]? Who is the [earthly] shepherd who can stand [defiantly] before Me?” [Jer 49:19] '
  '45':
  - type: text
    content: Therefore hear the plan of the L
  - type: heading
    content: ord
  - type: text
    content: ' which He has devised against Babylon, and hear what He has purposed against [the inhabitants of the land of] the Chaldeans: surely they will be dragged away, [even] the little ones of the flock; surely He will make their habitation desolate because of them. '
  '46':
  - type: text
    content: At the shout, “Babylon has been seized!” the earth quakes, and an outcry is heard among the nations.
  '5':
  - type: text
    content: They will ask the way to Zion, with their faces in that direction, saying, ‘Come, let us join ourselves to the L
  - type: heading
    content: ord
  - type: text
    content: ' in an everlasting covenant that will not be forgotten.’'
  '6':
  - type: text
    content: ¶“My people have become lost sheep;
  - type: text
    content: Their shepherds have led them astray.
  - type: text
    content: They have made them turn aside [to the seductive places of idolatry] on the mountains.
  - type: text
    content: They have gone along [from one sin to another] from mountain to hill;
  - type: text
    content: They have forgotten their [own] resting place. [Is 53:6; 1 Pet 2:25]
  '7':
  - type: text
    content: “All who found them have devoured them;
  - type: text
    content: And their adversaries have said, ‘We are not guilty,
  - type: text
    content: Because they have sinned against the L
  - type: heading
    content: ord
  - type: text
    content: ' [and are no longer holy to Him], their [true] habitation of righteousness '
  - type: text
    content: and
  - type: text
    content: ' justice,'
  - type: text
    content: Even the L
  - type: heading
    content: ord
  - type: text
    content: ', the [confident] hope of their fathers.’'
  '8':
  - type: text
    content: ¶“Wander away from the midst of Babylon
  - type: text
    content: And go out of the land of the Chaldeans;
  - type: text
    content: Be like the male goats [who serve as leaders] at the head of the flocks. [Jer 51:6, 9, 45; 2 Cor 6:17; Rev 18:4]
  '9':
  - type: text
    content: “For behold, I will stir up and bring up against Babylon
  - type: text
    content: An assembly of great nations from the north country.
  - type: text
    content: 'They will equip themselves '
  - type: text
    content: and
  - type: text
    content: ' set up the battle lines against her;'
  - type: text
    content: From there she will be taken captive.
  - type: text
    content: Their arrows will be like an expert warrior
  - type: text
    content: Who will not return empty-handed.
