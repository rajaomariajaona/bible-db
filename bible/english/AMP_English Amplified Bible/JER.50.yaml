- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “A sword against the Chaldeans,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “And against the inhabitants of Babylon
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against her princes (officials, civic rulers) and against her wise men (astrologers, religious rulers)!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “A sword against the oracle priests (the babbling liars), and they will become fools!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A sword against her mighty warriors, and they will be shattered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destroyed!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “A sword against their horses and against their chariots
- type: usfm
  marker: q1
  children:
  - type: text
    text: And against all the foreign troops that are in her midst,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will become [as weak and defenseless as] women!
- type: usfm
  marker: q1
  children:
  - type: text
