  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: “They seize their bow and spear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are cruel and have no compassion.
- type: usfm
  marker: q1
  children:
  - type: text
