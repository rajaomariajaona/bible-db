document_id: GEN.40,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joseph Interprets a Dream
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now some time later, the cupbearer (butler) and the baker for the king of Egypt offended their lord, Egypt’s king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and on the vine were three branches. Then as soon as it budded, its blossoms burst open, and its clusters produced ripe grapes [in rapid succession]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Pharaoh’s cup was in my hand, and I took the grapes and squeezed them into Pharaoh’s cup; then I placed the cup into Pharaoh’s hand.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joseph said to him, “This is the interpretation of it: the three branches represent three days; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'within three more days Pharaoh will lift up your head (present you in public) and restore you to your position; and you will [again] put Pharaoh’s cup into his hand just as [you did] when you were his cupbearer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only think of me when it goes well with you, and please show me kindness by mentioning me to Pharaoh and get me out of this house. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in fact I was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word here is much less personal than “kidnap.” Joseph was considered a “thing”—not a person.
      marker-yv: yv-n
    - type: text
      text: taken (stolen) from the land of the Hebrews by [unlawful] force, and even here I have done nothing for which they should put me in the dungeon.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the chief baker saw that the interpretation [of the dream] was good, he said to Joseph, “I also dreamed, and [in my dream] there were three cake baskets on my head; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the top basket there were some of all sorts of baked food for Pharaoh, but the birds [of prey] were eating [these foods] out of the basket on my head.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph answered, “This is the interpretation of it: the three baskets represent three days; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'within three more days Pharaoh will '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Notice the totally different usage of the words “lift up your head.” In v 13, it is used idiomatically as “present you in public,” but in v 19, it is used literally, “lift your head up off of your body.”
      marker-yv: yv-n
    - type: text
      text: lift up your head and will hang you on a tree (gallows, pole), and [you will not so much as be given a burial, but] the birds will eat your flesh.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh (
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also called '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Senusret II
        - type: text
          text: ', 1894-1878 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Sesostris II) was extremely angry with his two officials, the chief of the cupbearers and the chief of the bakers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now on the third day, [which was] the Pharaoh’s birthday, he [released the two men from prison and] made a feast for all his servants; and he lifted up the head of the chief cupbearer and the head of the chief baker [that is, presented them in public] among his servants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He restored the chief cupbearer to his office, and the cupbearer [once again] put the cup into Pharaoh’s hand; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Pharaoh hanged the chief baker, just as Joseph had interpreted [the meaning of the dreams] to them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet [even after all that] the chief cupbearer did not remember Joseph, but forgot [all about] him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He put them in confinement in the house of the captain of the guard, in the same prison where Joseph was confined. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The captain of the guard put Joseph in charge of them, and he served them; and they continued to be in custody for some time. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the cupbearer and the baker of the king of Egypt, who were confined in the prison, both dreamed a dream in the same night, each man with his [own significant] dream and each dream with its [personal] interpretation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joseph came to them in the morning and looked at them, [he saw that] they were sad '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' depressed. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he asked Pharaoh’s officials who were in confinement with him in his master’s house, “Why do you look so down-hearted today?” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they said to him, “We have [each] dreamed [distinct] dreams and there is no one to interpret them.” So Joseph said to them, “Do not interpretations belong to God? Please tell me [your dreams].”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the chief cupbearer told his dream to Joseph, and said to him, “In my dream there was a grapevine in front of me; '
