document_id: JOS.14,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Caleb’s Request
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now these are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the territories
    - type: text
      text: ' which the tribes of Israel inherited in the land of Canaan, which Eleazar the priest, and Joshua the son of Nun, and the heads of the households of the tribes of Israel apportioned to them as an inheritance, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And now, look, the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has let me live, just as He said, these forty-five years since the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke this word to Moses, when Israel wandered in the wilderness; and now, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: behold
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'look at me, I am eighty-five years old today. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I am still as strong today as I was the day Moses sent me; as my strength was then, so is my strength now, for war and for going out and coming in. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So now, give me this hill country about which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke that day, for you heard on that day that the [giant-like] Anakim were there, with great fortified cities; perhaps the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be with me, and I shall drive them out just as the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So Joshua blessed him and gave Hebron to Caleb the son of Jephunneh as an inheritance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Therefore, Hebron became the inheritance of Caleb the son of Jephunneh the Kenizzite to this day, because he followed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of Israel, completely. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The name of Hebron was formerly Kiriath-arba [city of Arba]; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for Arba
    - type: text
      text: ' was the greatest man among the [giant-like] Anakim. Then the land had rest from war.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: by the lot of their inheritance, as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: by the hand of
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'through Moses, for the nine tribes and the half-tribe. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For Moses had given an inheritance to the two tribes and the half-tribe beyond the Jordan; but he did not give [any territory as] an inheritance to the Levites among them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For the sons of Joseph were two tribes, Manasseh and Ephraim, and no portion was given in the land to the Levites except cities in which to live, with their pasture lands for their livestock and for their property. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The Israelites did just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses, and they divided the land.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the [tribe of the] sons of Judah approached Joshua in Gilgal, and Caleb the son of Jephunneh the Kenizzite said to him, “You know the word which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses the man of God concerning me and you in Kadesh-barnea. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I was forty years old when Moses the servant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sent me from Kadesh-barnea to scout the land [of Canaan], and I brought a report back to him as it was in my heart. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: My brothers (fellow spies) who went up with me made the heart of the people melt with fear; but I followed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God completely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So Moses swore [an oath to me] on that day, saying, ‘Be assured that the land on which your foot has walked will be an inheritance to you and to your children always, because you have followed the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' my God completely.’ [Deut 1:35, 36] '
