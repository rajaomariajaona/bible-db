document_id: JOS.14,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Caleb’s Request
  - type: text
    content: 'Now these are '
  - type: text
    content: the territories
  - type: text
    content: ' which the tribes of Israel inherited in the land of Canaan, which Eleazar the priest, and Joshua the son of Nun, and the heads of the households of the tribes of Israel apportioned to them as an inheritance, '
  '10':
  - type: text
    content: And now, look, the L
  - type: heading
    content: ord
  - type: text
    content: ' has let me live, just as He said, these forty-five years since the L'
  - type: heading
    content: ord
  - type: text
    content: ' spoke this word to Moses, when Israel wandered in the wilderness; and now, '
  - type: note
    content: Lit behold.
  - type: text
    content: 'look at me, I am eighty-five years old today. '
  '11':
  - type: text
    content: 'I am still as strong today as I was the day Moses sent me; as my strength was then, so is my strength now, for war and for going out and coming in. '
  '12':
  - type: text
    content: So now, give me this hill country about which the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke that day, for you heard on that day that the [giant-like] Anakim were there, with great fortified cities; perhaps the L'
  - type: heading
    content: ord
  - type: text
    content: ' will be with me, and I shall drive them out just as the L'
  - type: heading
    content: ord
  - type: text
    content: ' said.”'
  '13':
  - type: text
    content: 'So Joshua blessed him and gave Hebron to Caleb the son of Jephunneh as an inheritance. '
  '14':
  - type: text
    content: Therefore, Hebron became the inheritance of Caleb the son of Jephunneh the Kenizzite to this day, because he followed the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, completely. '
  '15':
  - type: text
    content: 'The name of Hebron was formerly Kiriath-arba [city of Arba]; '
  - type: text
    content: for Arba
  - type: text
    content: ' was the greatest man among the [giant-like] Anakim. Then the land had rest from war.'
  '2':
  - type: text
    content: by the lot of their inheritance, as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded '
  - type: note
    content: Lit by the hand of.
  - type: text
    content: 'through Moses, for the nine tribes and the half-tribe. '
  '3':
  - type: text
    content: 'For Moses had given an inheritance to the two tribes and the half-tribe beyond the Jordan; but he did not give [any territory as] an inheritance to the Levites among them. '
  '4':
  - type: text
    content: 'For the sons of Joseph were two tribes, Manasseh and Ephraim, and no portion was given in the land to the Levites except cities in which to live, with their pasture lands for their livestock and for their property. '
  '5':
  - type: text
    content: The Israelites did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded Moses, and they divided the land.'
  '6':
  - type: text
    content: Then the [tribe of the] sons of Judah approached Joshua in Gilgal, and Caleb the son of Jephunneh the Kenizzite said to him, “You know the word which the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses the man of God concerning me and you in Kadesh-barnea. '
  '7':
  - type: text
    content: I was forty years old when Moses the servant of the L
  - type: heading
    content: ord
  - type: text
    content: ' sent me from Kadesh-barnea to scout the land [of Canaan], and I brought a report back to him as it was in my heart. '
  '8':
  - type: text
    content: My brothers (fellow spies) who went up with me made the heart of the people melt with fear; but I followed the L
  - type: heading
    content: ord
  - type: text
    content: ' my God completely. '
  '9':
  - type: text
    content: So Moses swore [an oath to me] on that day, saying, ‘Be assured that the land on which your foot has walked will be an inheritance to you and to your children always, because you have followed the L
  - type: heading
    content: ord
  - type: text
    content: ' my God completely.’ [Deut 1:35, 36] '
