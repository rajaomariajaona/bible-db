  - type: usfm
    marker: it
    children:
    - type: text
      text: Judgment of Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the tenth year [of the captivity of King Jehoiachin by the king of Babylon], in the tenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month,
  - type: text
    text: ' on the twelfth of the month, the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, set your face toward Pharaoh king of Egypt, and prophesy against him and against all Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Speak and say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, I am against you, Pharaoh king of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The great monster that lies in the midst of his rivers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Boastfully] declaring, ‘My Nile is my own, and I have made it for myself.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I will put hooks in your jaws
- type: usfm
  marker: q1
  children:
  - type: text
    text: And [I will] make the fish of your rivers stick to your scales.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will pull you up from the midst of your rivers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the fish of your rivers will stick to your scales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “I will abandon you to the wilderness, you and all the fish of your rivers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will fall on the open field; and you will not be gathered up or buried.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have given you as food to the [wild] animals of the earth and the birds of the sky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “And all the inhabitants of Egypt will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they have been [only] a staff made of [fragile] reeds to the house of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “When they (Israel) grasped you (Egypt) by the hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You broke and tore apart their hands;
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they leaned on you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You broke and strained their backs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ‘Therefore thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Behold, I am going to bring a sword on you and cut off (destroy) both man and animal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: and the land of Egypt will be a desolation and a wasteland. And they will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: B
  - type: text
    text: 'ecause you said, ‘The Nile is mine and I have made it,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'behold (hear this), therefore, I am against you and against your rivers (the Nile, its tributaries), and I will make the land of Egypt a complete waste and a desolation, from [northern] Migdol to [southern] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Coptic '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Souan, Senon;
      - type: text
        text: ' Arab '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Aswan
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Syene, even as far as the border of Ethiopia (Cush). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'No man’s foot will pass through it, no animal’s foot will pass through it, and it will not be inhabited for forty years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So I will make the land of Egypt a desolation [plundered and ruined] among desolated lands; and her cities, among cities that are laid waste, will be desolate forty years. I will scatter the Egyptians among the nations and [I will] disperse them through the lands.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ‘For thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “At the end of forty years I will gather the Egyptians from the nations among whom they were scattered. [Jer 46:25, 26] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will reverse the fortunes of Egypt [as I will that of Israel] and cause them to return to the land of Pathros, the land of their origin, and there they will be a lowly kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It will be the lowliest of the kingdoms, and it will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are few stronger contrasts in any modern country than between the ancient glory, dignity, power, and wealth of Egypt and its later diminished significance.
    marker-yv: yv-n
  - type: text
    text: 'never again exalt itself above the nations; I will diminish the Egyptians so they will never again rule over the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And Egypt will never again have the confidence of the house of Israel; their wickedness will be remembered whenever Israel looks toward them [for help]. Then they will know [without any doubt] that I am the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'In the twenty-seventh year [after King Jehoiachin was taken to Babylon], in the first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: month,
  - type: text
    text: ' on the first of the month, the word of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Son of man, Nebuchadnezzar king of Babylon made his army '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The siege against Tyre lasted about thirteen years.
    marker-yv: yv-n
  - type: text
    text: 'work hard [at My command] against Tyre; every [soldier’s] head became '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably from constantly wearing war helmets.
    marker-yv: yv-n
  - type: text
    text: 'bald and every shoulder was worn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' peeled [from carrying loads of dirt and stones for siege works]. Yet he had no wages from Tyre [in proportion to the time and labor expended during the siege], either for himself or his army, for the work that he had done against it [for Me].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Therefore thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Behold, I will give the land of Egypt to Nebuchadnezzar king of Babylon. And he will carry off her wealth and capture her spoil and seize her plunder; and it shall be the wages for his army. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have given him the land of Egypt for the hard work which he did [against Tyre], because they did it for Me,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “In that day I will make a horn sprout for the house of Israel, and I will open your mouth among them, and they will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [when I renew their strength].”'
