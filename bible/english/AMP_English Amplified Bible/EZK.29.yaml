verses:
  '1':
  - type: heading
    content: Judgment of Egypt
  - type: text
    content: 'In the tenth year [of the captivity of King Jehoiachin by the king of Babylon], in the tenth '
  - type: text
    content: month,
  - type: text
    content: ' on the twelfth of the month, the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '10':
  - type: text
    content: 'behold (hear this), therefore, I am against you and against your rivers (the Nile, its tributaries), and I will make the land of Egypt a complete waste and a desolation, from [northern] Migdol to [southern] '
  - type: note
    content: Coptic Souan, Senon; Arab Aswan.
  - type: text
    content: 'Syene, even as far as the border of Ethiopia (Cush). '
  '11':
  - type: text
    content: 'No man’s foot will pass through it, no animal’s foot will pass through it, and it will not be inhabited for forty years. '
  '12':
  - type: text
    content: So I will make the land of Egypt a desolation [plundered and ruined] among desolated lands; and her cities, among cities that are laid waste, will be desolate forty years. I will scatter the Egyptians among the nations and [I will] disperse them through the lands.”
  '13':
  - type: text
    content: ‘For thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “At the end of forty years I will gather the Egyptians from the nations among whom they were scattered. [Jer 46:25, 26] '
  '14':
  - type: text
    content: 'I will reverse the fortunes of Egypt [as I will that of Israel] and cause them to return to the land of Pathros, the land of their origin, and there they will be a lowly kingdom. '
  '15':
  - type: text
    content: 'It will be the lowliest of the kingdoms, and it will '
  - type: note
    content: There are few stronger contrasts in any modern country than between the ancient glory, dignity, power, and wealth of Egypt and its later diminished significance.
  - type: text
    content: 'never again exalt itself above the nations; I will diminish the Egyptians so they will never again rule over the nations. '
  '16':
  - type: text
    content: And Egypt will never again have the confidence of the house of Israel; their wickedness will be remembered whenever Israel looks toward them [for help]. Then they will know [without any doubt] that I am the Lord G
  - type: heading
    content: od
  - type: text
    content: .” ’ ”
  '17':
  - type: text
    content: 'In the twenty-seventh year [after King Jehoiachin was taken to Babylon], in the first '
  - type: text
    content: month,
  - type: text
    content: ' on the first of the month, the word of the L'
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '18':
  - type: text
    content: '“Son of man, Nebuchadnezzar king of Babylon made his army '
  - type: note
    content: The siege against Tyre lasted about thirteen years.
  - type: text
    content: 'work hard [at My command] against Tyre; every [soldier’s] head became '
  - type: note
    content: Probably from constantly wearing war helmets.
  - type: text
    content: 'bald and every shoulder was worn '
  - type: text
    content: and
  - type: text
    content: ' peeled [from carrying loads of dirt and stones for siege works]. Yet he had no wages from Tyre [in proportion to the time and labor expended during the siege], either for himself or his army, for the work that he had done against it [for Me].” '
  '19':
  - type: text
    content: Therefore thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', “Behold, I will give the land of Egypt to Nebuchadnezzar king of Babylon. And he will carry off her wealth and capture her spoil and seize her plunder; and it shall be the wages for his army. '
  '2':
  - type: text
    content: '“Son of man, set your face toward Pharaoh king of Egypt, and prophesy against him and against all Egypt. '
  '20':
  - type: text
    content: I have given him the land of Egypt for the hard work which he did [against Tyre], because they did it for Me,” says the Lord G
  - type: heading
    content: od
  - type: text
    content: .
  '21':
  - type: text
    content: “In that day I will make a horn sprout for the house of Israel, and I will open your mouth among them, and they will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ' [when I renew their strength].”'
  '3':
  - type: text
    content: Speak and say, ‘Thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “Behold, I am against you, Pharaoh king of Egypt,
  - type: text
    content: The great monster that lies in the midst of his rivers,
  - type: text
    content: '[Boastfully] declaring, ‘My Nile is my own, and I have made it for myself.’'
  '4':
  - type: text
    content: “I will put hooks in your jaws
  - type: text
    content: And [I will] make the fish of your rivers stick to your scales.
  - type: text
    content: And I will pull you up from the midst of your rivers,
  - type: text
    content: And all the fish of your rivers will stick to your scales.
  '5':
  - type: text
    content: “I will abandon you to the wilderness, you and all the fish of your rivers;
  - type: text
    content: You will fall on the open field; and you will not be gathered up or buried.
  - type: text
    content: I have given you as food to the [wild] animals of the earth and the birds of the sky.
  '6':
  - type: text
    content: “And all the inhabitants of Egypt will know [without any doubt] that I am the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: Because they have been [only] a staff made of [fragile] reeds to the house of Israel.
  '7':
  - type: text
    content: “When they (Israel) grasped you (Egypt) by the hand,
  - type: text
    content: You broke and tore apart their hands;
  - type: text
    content: When they leaned on you,
  - type: text
    content: You broke and strained their backs.”
  '8':
  - type: text
    content: ‘Therefore thus says the Lord G
  - type: heading
