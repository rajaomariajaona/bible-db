    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first impression one might receive from this passage is that God elevated David from the lowliest position in Israel to the highest. But the ancient rabbis said that God tested David’s skills and wisdom as a shepherd. For example, it is said that David held back the bigger sheep from the pasture and brought out the smaller ones first to graze on the tender grass. The rabbis represented God as saying, “He who knows how to shepherd the sheep, each one in proportion to its strength, shall come and shepherd My people.”
