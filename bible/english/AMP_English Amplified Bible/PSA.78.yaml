document_id: PSA.78,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 78
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Guidance of His People in Spite of Their Unfaithfulness.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A skillful song, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem, of Asaph.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, O my people, to my teaching;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incline your ears to the words of my mouth [and be willing to learn].
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not keep the covenant of God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And refused to walk according to His law;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they forgot His [incredible] works
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His miraculous wonders that He had shown them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He did marvelous things in the sight of their fathers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the land of Egypt, in the field of Zoan [where Pharaoh resided].
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He divided the [Red] Sea and allowed them to pass through it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He made the waters stand up like [water behind] a dam. [Ex 14:22]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the daytime He led them with a cloud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the night with a light of fire. [Ex 13:21; 14:24]
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He split rocks in the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' abundant [water to] drink like the ocean depths.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought streams also from the rock [at Rephidim and Kadesh]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And caused waters to run down like rivers. [Ex 17:6; Num 20:11]
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Yet they still continued to sin against Him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By rebelling against the Most High in the desert.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in their hearts they put God to the test
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By asking for food according to their [selfish] appetite.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they spoke against God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They said, “Can God prepare [food for] a table in the wilderness?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will open my mouth in a parable [to instruct using examples];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will utter dark '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' puzzling sayings of old [that contain important truth]— [Matt 13:34, 35]'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, He struck the rock so that waters gushed out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the streams overflowed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can He give bread also?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or will He provide meat for His people?”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Therefore, when the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' heard, He was full of wrath;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fire was kindled against Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His anger mounted up against Israel,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they did not believe in God [they did not rely on Him, they did not adhere to Him],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they did not trust in His salvation (His power to save).
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet He commanded the clouds from above
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And opened the doors of heaven;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He rained down manna upon them to eat
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And gave them the grain of heaven. [Ex 16:14; John 6:31]
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Man ate the bread of angels;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God sent them provision in abundance.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He caused the east wind to blow in the heavens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And by His [unlimited] power He guided the south wind.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rained meat upon them like the dust,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And winged birds (quail) like the sand of the seas. [Num 11:31]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He let them fall in the midst of their camp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Around their tents.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they ate and were well filled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave them what they craved.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which we have heard and known,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And our fathers have told us.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before they had satisfied their desire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And while their food was in their mouths, [Num 11:33]
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wrath of God rose against them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And killed some of the strongest of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And subdued the choice young men of Israel.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In spite of all this they still sinned,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For they did not believe in His wonderful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' extraordinary works.'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore He consumed their days like a breath [in emptiness and futility]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their years in sudden terror.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶When He killed [some of] them, then those remaining sought Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they returned [to Him] and searched diligently for God [for a time].
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they remembered that God was their rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the Most High God their Redeemer.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless they flattered Him with their mouths
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And lied to Him with their tongues.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their heart was not steadfast toward Him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor were they faithful to His covenant. [Acts 8:21]
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ancient Sopherim, the Jewish scholars whose responsibility it was to do counts of all the letters, words, and verses of the OT, said that this verse marks the halfway point in Psalms.
      marker-yv: yv-n
    - type: text
      text: 'But He, the source of compassion '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' lovingkindness, forgave their wickedness and did not destroy them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many times He restrained His anger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And did not stir up all His wrath.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He [graciously] remembered that they were mere [human] flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wind that goes and does not return.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will not hide them from their children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But [we will] tell to the generation to come the praiseworthy deeds of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And [tell of] His great might '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power and the wonderful works that He has done.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶How often they rebelled against Him in the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And grieved Him in the desert!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Again and again they tempted God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And distressed the Holy One of Israel.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not remember [the miracles worked by] His [powerful] hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the day when He redeemed them from the enemy,
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How He worked His miracles in Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His wonders in the field of Zoan [where Pharaoh resided],
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And turned their rivers into blood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their streams, so that they could not drink.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent among them swarms of flies which devoured them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And frogs which destroyed them.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He also gave their crops to the grasshopper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the fruit of their labor to the locust.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He destroyed their vines with [great] hailstones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And their sycamore trees with frost.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave over their cattle also to the hailstones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And their flocks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' herds to thunderbolts. [Ex 9:18-21]'
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent upon them His burning anger, [Ex 12:23]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His fury and indignation and distress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A band of angels of destruction [among them].
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶For He established a testimony (a specific precept) in Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And appointed a law in Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which He commanded our fathers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they should teach to their children [the great facts of God’s transactions with Israel],
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He leveled a path for His anger [to give it free run];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He did not spare their souls from death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But turned over their lives to the plague.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He killed all the firstborn in Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The first and best of their strength in the tents [of the land of the sons] of Ham.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God led His own people forward like sheep
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And guided them in the wilderness like [a good shepherd with] a flock.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He led them safely, so that they did not fear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the sea engulfed their enemies. [Ex 14:27, 28]
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶So He brought them to His holy land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To this mountain [Zion] which His right hand had acquired.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He also drove out the nations before the sons of Israel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And allotted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their land
    - type: text
      text: ' as an inheritance, measured out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' partitioned;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He had the tribes of Israel dwell in their tents [the tents of those who had been dispossessed].
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet they tempted and rebelled against the Most High God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And did not keep His testimonies (laws).
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They turned back and acted unfaithfully like their fathers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were twisted like a warped bow [that will not respond to the archer’s aim].
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they provoked Him to [righteous] anger with their high places [devoted to idol worship]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And moved Him to jealousy with their carved images [by denying Him the love, worship, and obedience that is rightfully and uniquely His].
  '59':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God heard this, He was filled with [righteous] wrath;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And utterly rejected Israel, [greatly hating her ways],
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That the generation to come might know them, that the children still to be born
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May arise and recount them to their children,
  '60':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that He abandoned the tabernacle at Shiloh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tent in which He had dwelled among men,
  '61':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And gave up His strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' power (the ark of the covenant) into captivity,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His glory into the hand of the enemy (the Philistines). [1 Sam 4:21]
  '62':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He also handed His people over to the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And was infuriated with His inheritance (Israel). [1 Sam 4:10]
  '63':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fire [of war] devoured His young men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His [bereaved] virgins had no wedding songs.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His priests [Hophni and Phinehas] fell by the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His widows could not weep. [1 Sam 4:11, 19, 20]
  '65':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Then the Lord awakened as from sleep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a [mighty] warrior who awakens from the sleep of wine [fully conscious of his power].
  '66':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He drove His enemies backward;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He subjected them to lasting shame '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dishonor.'
  '67':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moreover, He rejected the tent of Joseph,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And did not choose the tribe of Ephraim [in which the tabernacle stood].
  '68':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But He chose the tribe of Judah [as Israel’s leader],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mount Zion, which He loved [to replace Shiloh as His capital].
  '69':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He built His sanctuary [exalted] like the heights [of the heavens],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the earth which He has established forever.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That they should place their confidence in God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And not forget the works of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But keep His commandments,
  '70':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He also chose David His servant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And took him from the sheepfolds; [1 Sam 16:11, 12]
  '71':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '78:71 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The first impression one might receive from this passage is that God elevated David from the lowliest position in Israel to the highest. But the ancient rabbis said that God tested David’s skills and wisdom as a shepherd. For example, it is said that David held back the bigger sheep from the pasture and brought out the smaller ones first to graze on the tender grass. The rabbis represented God as saying, “He who knows how to shepherd the sheep, each one in proportion to its strength, shall come and shepherd My people.”
