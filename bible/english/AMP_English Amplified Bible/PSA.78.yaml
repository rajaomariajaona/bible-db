- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: His priests [Hophni and Phinehas] fell by the sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His widows could not weep. [1 Sam 4:11, 19, 20]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: ¶Then the Lord awakened as from sleep,
- type: usfm
  marker: q1
  children:
  - type: text
