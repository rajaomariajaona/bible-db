verses:
  '1':
  - type: heading
    content: Psalm 78
  - type: heading
    content: God’s Guidance of His People in Spite of Their Unfaithfulness.
  - type: text
    content: 'A skillful song, '
  - type: text
    content: or
  - type: text
    content: ' a didactic '
  - type: text
    content: or
  - type: text
    content: ' reflective poem, of Asaph.'
  - type: text
    content: Listen, O my people, to my teaching;
  - type: text
    content: Incline your ears to the words of my mouth [and be willing to learn].
  '10':
  - type: text
    content: They did not keep the covenant of God
  - type: text
    content: And refused to walk according to His law;
  '11':
  - type: text
    content: And they forgot His [incredible] works
  - type: text
    content: And His miraculous wonders that He had shown them.
  '12':
  - type: text
    content: He did marvelous things in the sight of their fathers
  - type: text
    content: In the land of Egypt, in the field of Zoan [where Pharaoh resided].
  '13':
  - type: text
    content: He divided the [Red] Sea and allowed them to pass through it,
  - type: text
    content: And He made the waters stand up like [water behind] a dam. [Ex 14:22]
  '14':
  - type: text
    content: In the daytime He led them with a cloud
  - type: text
    content: And all the night with a light of fire. [Ex 13:21; 14:24]
  '15':
  - type: text
    content: He split rocks in the wilderness
  - type: text
    content: 'And gave '
  - type: text
    content: them
  - type: text
    content: ' abundant [water to] drink like the ocean depths.'
  '16':
  - type: text
    content: He brought streams also from the rock [at Rephidim and Kadesh]
  - type: text
    content: And caused waters to run down like rivers. [Ex 17:6; Num 20:11]
  '17':
  - type: text
    content: ¶Yet they still continued to sin against Him
  - type: text
    content: By rebelling against the Most High in the desert.
  '18':
  - type: text
    content: And in their hearts they put God to the test
  - type: text
    content: By asking for food according to their [selfish] appetite.
  '19':
  - type: text
    content: Then they spoke against God;
  - type: text
    content: They said, “Can God prepare [food for] a table in the wilderness?
  '2':
  - type: text
    content: I will open my mouth in a parable [to instruct using examples];
  - type: text
    content: 'I will utter dark '
  - type: text
    content: and
  - type: text
    content: ' puzzling sayings of old [that contain important truth]— [Matt 13:34, 35]'
  '20':
  - type: text
    content: “Behold, He struck the rock so that waters gushed out
  - type: text
    content: And the streams overflowed;
  - type: text
    content: Can He give bread also?
  - type: text
    content: Or will He provide meat for His people?”
  '21':
  - type: text
    content: ¶Therefore, when the L
  - type: heading
    content: ord
  - type: text
    content: ' heard, He was full of wrath;'
  - type: text
    content: A fire was kindled against Jacob,
  - type: text
    content: And His anger mounted up against Israel,
  '22':
  - type: text
    content: Because they did not believe in God [they did not rely on Him, they did not adhere to Him],
  - type: text
    content: And they did not trust in His salvation (His power to save).
  '23':
  - type: text
    content: Yet He commanded the clouds from above
  - type: text
    content: And opened the doors of heaven;
  '24':
  - type: text
    content: And He rained down manna upon them to eat
  - type: text
    content: And gave them the grain of heaven. [Ex 16:14; John 6:31]
  '25':
  - type: text
    content: Man ate the bread of angels;
  - type: text
    content: God sent them provision in abundance.
  '26':
  - type: text
    content: He caused the east wind to blow in the heavens
  - type: text
    content: And by His [unlimited] power He guided the south wind.
  '27':
  - type: text
    content: He rained meat upon them like the dust,
  - type: text
    content: And winged birds (quail) like the sand of the seas. [Num 11:31]
  '28':
  - type: text
    content: And He let them fall in the midst of their camp,
  - type: text
    content: Around their tents.
  '29':
  - type: text
    content: So they ate and were well filled,
  - type: text
    content: He gave them what they craved.
  '3':
  - type: text
    content: Which we have heard and known,
  - type: text
    content: And our fathers have told us.
  '30':
  - type: text
    content: Before they had satisfied their desire,
  - type: text
    content: And while their food was in their mouths, [Num 11:33]
  '31':
  - type: text
    content: The wrath of God rose against them
  - type: text
    content: And killed some of the strongest of them,
  - type: text
    content: And subdued the choice young men of Israel.
  '32':
  - type: text
    content: In spite of all this they still sinned,
  - type: text
    content: 'For they did not believe in His wonderful '
  - type: text
    content: and
  - type: text
    content: ' extraordinary works.'
  '33':
  - type: text
    content: Therefore He consumed their days like a breath [in emptiness and futility]
  - type: text
    content: And their years in sudden terror.
  '34':
  - type: text
    content: ¶When He killed [some of] them, then those remaining sought Him,
  - type: text
    content: And they returned [to Him] and searched diligently for God [for a time].
  '35':
  - type: text
    content: And they remembered that God was their rock,
  - type: text
    content: And the Most High God their Redeemer.
  '36':
  - type: text
    content: Nevertheless they flattered Him with their mouths
  - type: text
    content: And lied to Him with their tongues.
  '37':
  - type: text
    content: For their heart was not steadfast toward Him,
  - type: text
    content: Nor were they faithful to His covenant. [Acts 8:21]
  '38':
  - type: text
    content: ' '
  - type: note
    content: The ancient Sopherim, the Jewish scholars whose responsibility it was to do counts of all the letters, words, and verses of the OT, said that this verse marks the halfway point in Psalms.
  - type: text
    content: 'But He, the source of compassion '
  - type: text
    content: and
  - type: text
    content: ' lovingkindness, forgave their wickedness and did not destroy them;'
  - type: text
    content: Many times He restrained His anger
  - type: text
    content: And did not stir up all His wrath.
  '39':
  - type: text
    content: For He [graciously] remembered that they were mere [human] flesh,
  - type: text
    content: A wind that goes and does not return.
  '4':
  - type: text
    content: We will not hide them from their children,
  - type: text
    content: But [we will] tell to the generation to come the praiseworthy deeds of the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: 'And [tell of] His great might '
  - type: text
    content: and
  - type: text
    content: ' power and the wonderful works that He has done.'
  '40':
  - type: text
    content: ¶How often they rebelled against Him in the wilderness
  - type: text
    content: And grieved Him in the desert!
  '41':
  - type: text
    content: Again and again they tempted God,
  - type: text
    content: And distressed the Holy One of Israel.
  '42':
  - type: text
    content: They did not remember [the miracles worked by] His [powerful] hand,
  - type: text
    content: Nor the day when He redeemed them from the enemy,
  '43':
  - type: text
    content: How He worked His miracles in Egypt
  - type: text
    content: And His wonders in the field of Zoan [where Pharaoh resided],
  '44':
  - type: text
    content: And turned their rivers into blood,
  - type: text
    content: And their streams, so that they could not drink.
  '45':
  - type: text
    content: He sent among them swarms of flies which devoured them,
  - type: text
    content: And frogs which destroyed them.
  '46':
  - type: text
    content: He also gave their crops to the grasshopper,
  - type: text
    content: And the fruit of their labor to the locust.
  '47':
  - type: text
    content: He destroyed their vines with [great] hailstones
  - type: text
    content: And their sycamore trees with frost.
  '48':
  - type: text
    content: He gave over their cattle also to the hailstones,
  - type: text
    content: 'And their flocks '
  - type: text
    content: and
  - type: text
    content: ' herds to thunderbolts. [Ex 9:18-21]'
  '49':
  - type: text
    content: He sent upon them His burning anger, [Ex 12:23]
  - type: text
    content: His fury and indignation and distress,
  - type: text
    content: A band of angels of destruction [among them].
  '5':
  - type: text
    content: ¶For He established a testimony (a specific precept) in Jacob
  - type: text
    content: And appointed a law in Israel,
  - type: text
    content: Which He commanded our fathers
  - type: text
    content: That they should teach to their children [the great facts of God’s transactions with Israel],
  '50':
  - type: text
    content: He leveled a path for His anger [to give it free run];
  - type: text
    content: He did not spare their souls from death,
  - type: text
    content: But turned over their lives to the plague.
  '51':
  - type: text
    content: He killed all the firstborn in Egypt,
  - type: text
    content: The first and best of their strength in the tents [of the land of the sons] of Ham.
  '52':
  - type: text
    content: But God led His own people forward like sheep
  - type: text
    content: And guided them in the wilderness like [a good shepherd with] a flock.
  '53':
  - type: text
    content: He led them safely, so that they did not fear;
  - type: text
    content: But the sea engulfed their enemies. [Ex 14:27, 28]
  '54':
  - type: text
    content: ¶So He brought them to His holy land,
  - type: text
    content: To this mountain [Zion] which His right hand had acquired.
  '55':
  - type: text
    content: He also drove out the nations before the sons of Israel
  - type: text
    content: 'And allotted '
  - type: text
    content: their land
  - type: text
    content: ' as an inheritance, measured out '
  - type: text
    content: and
  - type: text
    content: ' partitioned;'
  - type: text
    content: And He had the tribes of Israel dwell in their tents [the tents of those who had been dispossessed].
  '56':
  - type: text
    content: Yet they tempted and rebelled against the Most High God
  - type: text
    content: And did not keep His testimonies (laws).
  '57':
  - type: text
    content: They turned back and acted unfaithfully like their fathers;
  - type: text
    content: They were twisted like a warped bow [that will not respond to the archer’s aim].
  '58':
  - type: text
    content: For they provoked Him to [righteous] anger with their high places [devoted to idol worship]
  - type: text
    content: And moved Him to jealousy with their carved images [by denying Him the love, worship, and obedience that is rightfully and uniquely His].
  '59':
  - type: text
    content: When God heard this, He was filled with [righteous] wrath;
  - type: text
    content: And utterly rejected Israel, [greatly hating her ways],
  '6':
  - type: text
    content: That the generation to come might know them, that the children still to be born
  - type: text
    content: May arise and recount them to their children,
  '60':
  - type: text
    content: So that He abandoned the tabernacle at Shiloh,
  - type: text
    content: The tent in which He had dwelled among men,
  '61':
  - type: text
    content: 'And gave up His strength '
  - type: text
    content: and
  - type: text
    content: ' power (the ark of the covenant) into captivity,'
  - type: text
    content: And His glory into the hand of the enemy (the Philistines). [1 Sam 4:21]
  '62':
  - type: text
    content: He also handed His people over to the sword,
  - type: text
    content: And was infuriated with His inheritance (Israel). [1 Sam 4:10]
  '63':
  - type: text
    content: The fire [of war] devoured His young men,
  - type: text
    content: And His [bereaved] virgins had no wedding songs.
  '64':
  - type: text
    content: His priests [Hophni and Phinehas] fell by the sword,
  - type: text
    content: And His widows could not weep. [1 Sam 4:11, 19, 20]
  '65':
  - type: text
    content: ¶Then the Lord awakened as from sleep,
  - type: text
    content: Like a [mighty] warrior who awakens from the sleep of wine [fully conscious of his power].
  '66':
  - type: text
    content: He drove His enemies backward;
  - type: text
    content: 'He subjected them to lasting shame '
  - type: text
    content: and
  - type: text
    content: ' dishonor.'
  '67':
  - type: text
    content: Moreover, He rejected the tent of Joseph,
  - type: text
    content: And did not choose the tribe of Ephraim [in which the tabernacle stood].
  '68':
  - type: text
    content: But He chose the tribe of Judah [as Israel’s leader],
  - type: text
    content: Mount Zion, which He loved [to replace Shiloh as His capital].
  '69':
  - type: text
    content: And He built His sanctuary [exalted] like the heights [of the heavens],
  - type: text
    content: Like the earth which He has established forever.
  '7':
  - type: text
    content: That they should place their confidence in God
  - type: text
    content: And not forget the works of God,
  - type: text
    content: But keep His commandments,
  '70':
  - type: text
    content: He also chose David His servant
  - type: text
    content: And took him from the sheepfolds; [1 Sam 16:11, 12]
  '71':
  - type: text
    content: ' '
  - type: note
    content: The first impression one might receive from this passage is that God elevated David from the lowliest position in Israel to the highest. But the ancient rabbis said that God tested David’s skills and wisdom as a shepherd. For example, it is said that David held back the bigger sheep from the pasture and brought out the smaller ones first to graze on the tender grass. The rabbis represented God as saying, “He who knows how to shepherd the sheep, each one in proportion to its strength, shall come and shepherd My people.”
  - type: text
    content: 'From '
  - type: note
    content: Lit following.
  - type: text
    content: tending the ewes with nursing young He brought him
  - type: text
    content: To shepherd Jacob His people,
  - type: text
    content: And Israel His inheritance. [2 Sam 7:7, 8]
  '72':
  - type: text
    content: So David shepherded them according to the integrity of his heart;
  - type: text
    content: And guided them with his skillful hands.
  '8':
  - type: text
    content: And not be like their fathers—
  - type: text
    content: A stubborn and rebellious generation,
  - type: text
    content: 'A generation that did not prepare its heart to know '
  - type: text
    content: and
  - type: text
    content: ' follow God,'
  - type: text
    content: And whose spirit was not faithful to God.
  '9':
  - type: text
    content: ¶The sons of Ephraim were armed as archers and carrying bows,
  - type: text
    content: Yet
  - type: text
    content: ' they turned back in the day of battle.'
