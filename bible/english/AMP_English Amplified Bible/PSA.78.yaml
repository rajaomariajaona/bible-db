    text: And His glory into the hand of the enemy (the Philistines). [1 Sam 4:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: He also handed His people over to the sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And was infuriated with His inheritance (Israel). [1 Sam 4:10]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: The fire [of war] devoured His young men,
- type: usfm
  marker: q1
  children:
  - type: text
