document_id: PSA.78
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 78
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Guidance of His People in Spite of Their Unfaithfulness.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A skillful song, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' a didactic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' reflective poem, of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen, O my people, to my teaching;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline your ears to the words of my mouth [and be willing to learn].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will open my mouth in a parable [to instruct using examples];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will utter dark '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' puzzling sayings of old [that contain important truth]— [Matt 13:34, 35]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Which we have heard and known,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And our fathers have told us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We will not hide them from their children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But [we will] tell to the generation to come the praiseworthy deeds of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And [tell of] His great might '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' power and the wonderful works that He has done.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶For He established a testimony (a specific precept) in Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: And appointed a law in Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which He commanded our fathers
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they should teach to their children [the great facts of God’s transactions with Israel],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: That the generation to come might know them, that the children still to be born
- type: usfm
  marker: q1
  children:
  - type: text
    text: May arise and recount them to their children,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That they should place their confidence in God
- type: usfm
  marker: q1
  children:
  - type: text
    text: And not forget the works of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But keep His commandments,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And not be like their fathers—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A stubborn and rebellious generation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A generation that did not prepare its heart to know '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follow God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whose spirit was not faithful to God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ¶The sons of Ephraim were armed as archers and carrying bows,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yet
  - type: text
    text: ' they turned back in the day of battle.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They did not keep the covenant of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: And refused to walk according to His law;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And they forgot His [incredible] works
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His miraculous wonders that He had shown them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He did marvelous things in the sight of their fathers
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the land of Egypt, in the field of Zoan [where Pharaoh resided].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He divided the [Red] Sea and allowed them to pass through it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He made the waters stand up like [water behind] a dam. [Ex 14:22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: In the daytime He led them with a cloud
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all the night with a light of fire. [Ex 13:21; 14:24]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He split rocks in the wilderness
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' abundant [water to] drink like the ocean depths.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He brought streams also from the rock [at Rephidim and Kadesh]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And caused waters to run down like rivers. [Ex 17:6; Num 20:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ¶Yet they still continued to sin against Him
- type: usfm
  marker: q1
  children:
  - type: text
    text: By rebelling against the Most High in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And in their hearts they put God to the test
- type: usfm
  marker: q1
  children:
  - type: text
    text: By asking for food according to their [selfish] appetite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then they spoke against God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They said, “Can God prepare [food for] a table in the wilderness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Behold, He struck the rock so that waters gushed out
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the streams overflowed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can He give bread also?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or will He provide meat for His people?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ¶Therefore, when the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' heard, He was full of wrath;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fire was kindled against Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His anger mounted up against Israel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Because they did not believe in God [they did not rely on Him, they did not adhere to Him],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they did not trust in His salvation (His power to save).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yet He commanded the clouds from above
- type: usfm
  marker: q1
  children:
  - type: text
    text: And opened the doors of heaven;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And He rained down manna upon them to eat
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gave them the grain of heaven. [Ex 16:14; John 6:31]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Man ate the bread of angels;
- type: usfm
  marker: q1
  children:
  - type: text
    text: God sent them provision in abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He caused the east wind to blow in the heavens
- type: usfm
  marker: q1
  children:
  - type: text
    text: And by His [unlimited] power He guided the south wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He rained meat upon them like the dust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And winged birds (quail) like the sand of the seas. [Num 11:31]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And He let them fall in the midst of their camp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Around their tents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So they ate and were well filled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gave them what they craved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Before they had satisfied their desire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And while their food was in their mouths, [Num 11:33]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The wrath of God rose against them
- type: usfm
  marker: q1
  children:
  - type: text
    text: And killed some of the strongest of them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And subdued the choice young men of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: In spite of all this they still sinned,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For they did not believe in His wonderful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' extraordinary works.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Therefore He consumed their days like a breath [in emptiness and futility]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their years in sudden terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ¶When He killed [some of] them, then those remaining sought Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they returned [to Him] and searched diligently for God [for a time].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And they remembered that God was their rock,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the Most High God their Redeemer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Nevertheless they flattered Him with their mouths
- type: usfm
  marker: q1
  children:
  - type: text
    text: And lied to Him with their tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: For their heart was not steadfast toward Him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor were they faithful to His covenant. [Acts 8:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '78:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient Sopherim, the Jewish scholars whose responsibility it was to do counts of all the letters, words, and verses of the OT, said that this verse marks the halfway point in Psalms.
    marker-yv: yv-n
  - type: text
    text: 'But He, the source of compassion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' lovingkindness, forgave their wickedness and did not destroy them;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many times He restrained His anger
- type: usfm
  marker: q1
  children:
  - type: text
    text: And did not stir up all His wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: For He [graciously] remembered that they were mere [human] flesh,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A wind that goes and does not return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ¶How often they rebelled against Him in the wilderness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And grieved Him in the desert!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Again and again they tempted God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And distressed the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: They did not remember [the miracles worked by] His [powerful] hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor the day when He redeemed them from the enemy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: How He worked His miracles in Egypt
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His wonders in the field of Zoan [where Pharaoh resided],
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And turned their rivers into blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their streams, so that they could not drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: He sent among them swarms of flies which devoured them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And frogs which destroyed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: He also gave their crops to the grasshopper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the fruit of their labor to the locust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: He destroyed their vines with [great] hailstones
- type: usfm
  marker: q1
  children:
  - type: text
    text: And their sycamore trees with frost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: He gave over their cattle also to the hailstones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And their flocks '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' herds to thunderbolts. [Ex 9:18-21]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: He sent upon them His burning anger, [Ex 12:23]
- type: usfm
  marker: q1
  children:
  - type: text
    text: His fury and indignation and distress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A band of angels of destruction [among them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: He leveled a path for His anger [to give it free run];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He did not spare their souls from death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But turned over their lives to the plague.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: He killed all the firstborn in Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The first and best of their strength in the tents [of the land of the sons] of Ham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: But God led His own people forward like sheep
- type: usfm
  marker: q1
  children:
  - type: text
    text: And guided them in the wilderness like [a good shepherd with] a flock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: He led them safely, so that they did not fear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the sea engulfed their enemies. [Ex 14:27, 28]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ¶So He brought them to His holy land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To this mountain [Zion] which His right hand had acquired.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: He also drove out the nations before the sons of Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And allotted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their land
  - type: text
    text: ' as an inheritance, measured out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' partitioned;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And He had the tribes of Israel dwell in their tents [the tents of those who had been dispossessed].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Yet they tempted and rebelled against the Most High God
- type: usfm
  marker: q1
  children:
  - type: text
    text: And did not keep His testimonies (laws).
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: They turned back and acted unfaithfully like their fathers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were twisted like a warped bow [that will not respond to the archer’s aim].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: For they provoked Him to [righteous] anger with their high places [devoted to idol worship]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And moved Him to jealousy with their carved images [by denying Him the love, worship, and obedience that is rightfully and uniquely His].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: When God heard this, He was filled with [righteous] wrath;
- type: usfm
  marker: q1
  children:
