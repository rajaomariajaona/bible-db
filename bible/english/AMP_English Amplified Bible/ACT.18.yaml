  '11':
  - type: text
    content: 'So he settled '
  - type: text
    content: there
  - type: text
    content: ' for a year and six months, teaching them the word of God [concerning eternal salvation through faith in Christ].'
  '12':
  - type: text
    content: 'But when '
  - type: note
    content: Junius Gallio’s term as proconsul was brief a.d. 51-52, but is validated by an ancient inscription found at Delphi. This is important because it establishes the date of Paul’s visit to Corinth while on his second missionary journey and sets the date of his letters to the church at Thessalonica.
  - type: text
    content: 'Gallio was proconsul of Achaia (southern Greece), the Jews made a united attack on Paul and brought him before '
  - type: note
    content: The proconsul tried cases from a large, raised stone platform situated in front of his official residence.
  - type: text
    content: 'the judgment seat, '
  '13':
  - type: text
    content: 'declaring, “This man is persuading people to worship God in violation of the law [of Moses].” '
  '14':
  - type: text
    content: 'But when Paul was about to reply, Gallio said to the Jews, “If it were a matter of some misdemeanor or serious crime, O Jews, I would have reason to put up with you; '
  '15':
  - type: text
    content: 'but since it is merely a question [of doctrine within your religion] about words and names and your own law, see to it yourselves; I am '
  - type: note
    content: Gallio, the proconsul of Achaia, in essence ruled Paul’s teachings to be a form of Judaism and therefore legal under Roman law.
  - type: text
    content: 'unwilling to judge these matters.” '
  '16':
  - type: text
    content: 'And he drove them away from the judgment seat. '
  '17':
  - type: text
    content: 'Then the Greeks all seized '
  - type: note
    content: As leader of the synagogue Sosthenes would have presented the charges against Paul. Apparently something related to this made him the target of the attack. If this Sosthenes is the same man mentioned in 1 Cor 1:1, he later became a believer and follower of Christ.
  - type: text
    content: 'Sosthenes, the leader of the synagogue, and '
  - type: text
    content: began
  - type: text
    content: ' beating him right in front of the judgment seat; but Gallio paid no attention to any of this. [1 Cor 1:1]'
  '18':
  - type: text
    content: 'Paul stayed for a while longer, and then told the '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters goodbye and sailed for Syria; and he was accompanied by Priscilla and Aquila. At Cenchrea [the southeastern port of Corinth] he had his hair cut, because he was keeping a [Nazirite] vow [of abstention]. '
  '19':
  - type: text
    content: 'Then they arrived in Ephesus, and he left the others there; but he entered the synagogue and reasoned '
  - type: text
    content: and
  - type: text
    content: ' debated with the Jews. '
  '2':
  - type: text
    content: 'There he met a Jew named Aquila, a native of Pontus, who had recently come from Italy with his wife, Priscilla, because [the Roman Emperor] Claudius had issued an edict that all the '
  - type: note
    content: This action may have been prompted by conflicts within the Jewish community caused by the spread of Christianity.
  - type: text
    content: 'Jews were to leave Rome. Paul went to see them, '
  '20':
  - type: text
    content: 'When they asked him to stay for a longer time, he refused; '
  '21':
  - type: text
    content: but after telling them goodbye and saying, “I will return again if God is willing,” he set sail from Ephesus.
  '22':
  - type: text
    content: 'When he had landed at Caesarea, he went up and '
  - type: note
    content: This marks the end of Paul’s second missionary journey.
  - type: text
    content: greeted the church [at Jerusalem], and then went down to Antioch.
  - type: heading
    content: Paul’s Third Missionary Journey
  '23':
  - type: text
    content: 'After spending some time '
  - type: text
    content: there,
  - type: text
    content: ' he left and traveled through the territory of Galatia and Phrygia, strengthening '
  - type: text
    content: and
  - type: text
    content: ' encouraging all the disciples.'
  '24':
  - type: text
    content: 'Now a Jew named Apollos, a native of Alexandria, came to Ephesus. He was an eloquent '
  - type: text
    content: and
  - type: text
    content: ' cultured man, and well versed in the [Hebrew] Scriptures. '
  '25':
  - type: text
    content: 'This man had been instructed in the way of the Lord, and being spiritually impassioned, he was speaking and teaching accurately the things about Jesus, though he knew only the baptism of John; '
  '26':
  - type: text
    content: 'and he began to speak boldly '
  - type: text
    content: and
  - type: text
    content: ' fearlessly in the synagogue. But when Priscilla and Aquila heard him, they took him aside and explained more accurately to him the way of God [and the full story of the life of Christ]. '
  '27':
  - type: text
    content: 'And when Apollos wanted to go across to Achaia (southern Greece), the brothers encouraged him and wrote to the disciples, [urging them] to welcome him gladly. When he arrived, he was a great help to those who, through grace, had believed '
  - type: text
    content: and
  - type: text
    content: ' had followed Jesus as Lord and Savior, '
  '28':
  - type: text
    content: 'for he powerfully refuted the Jews in public '
  - type: text
    content: discussions,
  - type: text
    content: ' proving by the Scriptures that Jesus is the Christ (the Messiah, the Anointed).'
  '3':
  - type: text
    content: 'and because he was of the same trade, he stayed with them; and they worked '
  - type: text
    content: together
  - type: text
    content: ' for they were tent-makers. '
  '4':
  - type: text
    content: 'And he reasoned '
  - type: text
    content: and
  - type: text
    content: ' debated in the synagogue every Sabbath, trying to persuade Jews and Greeks;'
  '5':
  - type: text
    content: 'but when Silas and Timothy came down from Macedonia (northern Greece), Paul '
  - type: text
    content: began
  - type: text
    content: ' devoting himself completely to [preaching] the word, and solemnly testifying to the Jews that Jesus is the Christ (the Messiah, the Anointed). '
  '6':
  - type: text
    content: 'But since the Jews kept resisting '
  - type: text
    content: and
  - type: text
    content: ' opposing him, and blaspheming [God], he '
  - type: note
    content: An act symbolizing rejection.
  - type: text
    content: 'shook out his robe and said to them, “Your blood (damnation) be on your own heads! I am innocent of it. From now on I will go to the Gentiles.” [Acts 13:46] '
  '7':
  - type: text
    content: 'Then he moved on from there and went to the house of a man named '
  - type: note
    content: One early ms reads Titus; two early mss omit the name.
  - type: text
    content: 'Titius Justus, who worshiped God and whose house was next door to the synagogue. '
  '8':
  - type: text
    content: 'Crispus, the leader of the synagogue, believed in the Lord together with his entire household [joyfully acknowledging Him as Messiah and Savior]; and many of the Corinthians who heard [Paul’s message] were believing and being baptized. '
  '9':
  - type: text
    content: 'One night the Lord said to Paul in a vision, '
  - type: text
    content: “Do not be afraid anymore, but go on speaking and do not be silent;
