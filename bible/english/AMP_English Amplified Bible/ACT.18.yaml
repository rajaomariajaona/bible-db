document_id: ACT.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul at Corinth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this Paul left Athens and went to Corinth. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There he met a Jew named Aquila, a native of Pontus, who had recently come from Italy with his wife, Priscilla, because [the Roman Emperor] Claudius had issued an edict that all the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This action may have been prompted by conflicts within the Jewish community caused by the spread of Christianity.
    marker-yv: yv-n
  - type: text
    text: 'Jews were to leave Rome. Paul went to see them, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and because he was of the same trade, he stayed with them; and they worked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: together
  - type: text
    text: ' for they were tent-makers. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And he reasoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' debated in the synagogue every Sabbath, trying to persuade Jews and Greeks;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'but when Silas and Timothy came down from Macedonia (northern Greece), Paul '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' devoting himself completely to [preaching] the word, and solemnly testifying to the Jews that Jesus is the Christ (the Messiah, the Anointed). '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But since the Jews kept resisting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' opposing him, and blaspheming [God], he '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An act symbolizing rejection.
    marker-yv: yv-n
  - type: text
    text: 'shook out his robe and said to them, “Your blood (damnation) be on your own heads! I am innocent of it. From now on I will go to the Gentiles.” [Acts 13:46] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he moved on from there and went to the house of a man named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One early ms reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Titus;
      - type: text
        text: ' two early mss omit the name.'
    marker-yv: yv-n
  - type: text
    text: 'Titius Justus, who worshiped God and whose house was next door to the synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Crispus, the leader of the synagogue, believed in the Lord together with his entire household [joyfully acknowledging Him as Messiah and Savior]; and many of the Corinthians who heard [Paul’s message] were believing and being baptized. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'One night the Lord said to Paul in a vision, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not be afraid anymore, but go on speaking and do not be silent;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I am with you, and no one will attack you in order to hurt you, because I have many people in this city.”
  - type: text
    text: ' [Is 43:5; Jer 1:8] '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So he settled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' for a year and six months, teaching them the word of God [concerning eternal salvation through faith in Christ].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But when '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Junius Gallio’s term as proconsul was brief '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: a
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: d
      - type: text
        text: . 51-52, but is validated by an ancient inscription found at Delphi. This is important because it establishes the date of Paul’s visit to Corinth while on his second missionary journey and sets the date of his letters to the church at Thessalonica.
    marker-yv: yv-n
  - type: text
    text: 'Gallio was proconsul of Achaia (southern Greece), the Jews made a united attack on Paul and brought him before '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The proconsul tried cases from a large, raised stone platform situated in front of his official residence.
    marker-yv: yv-n
  - type: text
    text: 'the judgment seat, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'declaring, “This man is persuading people to worship God in violation of the law [of Moses].” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But when Paul was about to reply, Gallio said to the Jews, “If it were a matter of some misdemeanor or serious crime, O Jews, I would have reason to put up with you; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but since it is merely a question [of doctrine within your religion] about words and names and your own law, see to it yourselves; I am '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gallio, the proconsul of Achaia, in essence ruled Paul’s teachings to be a form of Judaism and therefore legal under Roman law.
    marker-yv: yv-n
  - type: text
    text: 'unwilling to judge these matters.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And he drove them away from the judgment seat. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the Greeks all seized '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As leader of the synagogue Sosthenes would have presented the charges against Paul. Apparently something related to this made him the target of the attack. If this Sosthenes is the same man mentioned in 1 Cor 1:1, he later became a believer and follower of Christ.
    marker-yv: yv-n
  - type: text
    text: 'Sosthenes, the leader of the synagogue, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' beating him right in front of the judgment seat; but Gallio paid no attention to any of this. [1 Cor 1:1]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Paul stayed for a while longer, and then told the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'brothers and sisters goodbye and sailed for Syria; and he was accompanied by Priscilla and Aquila. At Cenchrea [the southeastern port of Corinth] he had his hair cut, because he was keeping a [Nazirite] vow [of abstention]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then they arrived in Ephesus, and he left the others there; but he entered the synagogue and reasoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' debated with the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When they asked him to stay for a longer time, he refused; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: but after telling them goodbye and saying, “I will return again if God is willing,” he set sail from Ephesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When he had landed at Caesarea, he went up and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This marks the end of Paul’s second missionary journey.
    marker-yv: yv-n
  - type: text
    text: greeted the church [at Jerusalem], and then went down to Antioch.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul’s Third Missionary Journey
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After spending some time '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there,
  - type: text
    text: ' he left and traveled through the territory of Galatia and Phrygia, strengthening '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' encouraging all the disciples.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now a Jew named Apollos, a native of Alexandria, came to Ephesus. He was an eloquent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cultured man, and well versed in the [Hebrew] Scriptures. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'This man had been instructed in the way of the Lord, and being spiritually impassioned, he was speaking and teaching accurately the things about Jesus, though he knew only the baptism of John; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and he began to speak boldly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fearlessly in the synagogue. But when Priscilla and Aquila heard him, they took him aside and explained more accurately to him the way of God [and the full story of the life of Christ]. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And when Apollos wanted to go across to Achaia (southern Greece), the brothers encouraged him and wrote to the disciples, [urging them] to welcome him gladly. When he arrived, he was a great help to those who, through grace, had believed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' had followed Jesus as Lord and Savior, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'for he powerfully refuted the Jews in public '
  - type: usfm
    marker: it
    children:
    - type: text
      text: discussions,
  - type: text
    text: ' proving by the Scriptures that Jesus is the Christ (the Messiah, the Anointed).'
