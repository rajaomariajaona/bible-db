    content: Or hiss. From this verse a rabbinical tradition was invented that if a vulture settles on the ground and hisses, the Messiah will come immediately. It was reported to have happened once, but instead of the Messiah coming, the story went that a stone fell on the vulture’s head and killed it because it was a liar.
