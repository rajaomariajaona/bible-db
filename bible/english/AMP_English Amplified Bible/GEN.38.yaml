document_id: GEN.38,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judah and Tamar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now at that time, Judah left his brothers and went down to [stay with] a certain Adullamite named Hirah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But what he did was displeasing in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '; therefore He killed him also [in judgment]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Judah said to Tamar, his daughter-in-law, “Remain a widow at your father’s house until Shelah my [youngest] son is grown”; [but he was deceiving her] for he thought that [if Shelah should marry her] he too might die like his brothers did. So Tamar went and lived in her father’s house.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: The days multiplied and Judah’s wife….
      marker-yv: yv-n
    - type: text
      text: 'But quite a while later, Judah’s wife, the daughter of Shua, died; and when the time of mourning was ended, he went up to his sheepshearers at Timnah with his friend Hirah the Adullamite. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamar was told, “Listen, your father-in-law is going up to Timnah to shear his sheep.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she removed her widow’s clothes and covered herself with a veil, and wrapped herself up [in disguise], and sat in the gateway of Enaim, which is on the road to Timnah; for she saw that Shelah had grown up, and she had not been given to him as a wife [as Judah had promised]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Judah saw her, he thought she was a [temple] prostitute, for she had covered her face [as such women did]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He turned to her by the road, and said, “Please come, let me lie with you”; for he did not know that she was his daughter-in-law. And she said, “What will you give me, that you may lie with me?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered, “I will send you a young goat from the flock.” And she said, “Will you give me a pledge [as a deposit] until you send it?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “What pledge shall I give you?” She said, “Your seal and your cord, and the staff that is in your hand.” So he gave them to her and was intimate with her, and she conceived by him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then she got up and left, and removed her veil and put on her widow’s clothing.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There Judah saw a daughter of Shua, a Canaanite, and he took her [as his wife] and lived with her. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Judah sent the young goat by his friend the Adullamite, to get his pledge [back] from the woman, he was unable to find her. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He asked the men of that place, “Where is the temple prostitute who was by the roadside at Enaim?” They said, “There was no prostitute here.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he returned to Judah, and said, “I cannot find her; also the local men said, ‘There was no prostitute around here.’ ” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Judah said, “Let her keep the things (pledge articles) for herself, otherwise we will be a laughingstock [searching everywhere for her]. After all, I sent this young goat, but you did not find her.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About three months later Judah was told, “Tamar your daughter-in-law has played the [role of a] prostitute, and she is with child because of her immorality.” So Judah said, “Bring her out and let her be burned [to death as punishment]!” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While she was being brought out, she [took the things Judah had given her and] sent [them along with a message] to her father-in-law, saying, “I am with child by the man to whom these articles belong.” And she added, “Please examine [them carefully] and see [clearly] to whom these things belong, the seal and the cord and staff.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judah recognized the articles, and said, “She has been more righteous [in this matter] than I, because I did not give her to my son Shelah [as I had promised].” And Judah did not have [intimate] relations with her again.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the time came for her to give birth, there were twins in her womb. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she was in labor, one [baby] put out his hand, and the midwife took his hand and tied a scarlet thread on it, saying, “This one was born first.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he pulled back his hand, and his brother was born first. And she said, “What a breach you have made for yourself [to be the firstborn]!” So he was named Perez (breach, break forth). [Matt 1:3] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she conceived and gave birth to a son and Judah named him Er. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afterward his brother who had the scarlet [thread] on his hand was born and was named Zerah (brightness).
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she conceived again and gave birth to a son and named him Onan. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again she conceived and gave birth to still another son and named him Shelah. It was at Chezib that she gave birth to him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Judah took a wife for Er his firstborn; her name was Tamar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Er, Judah’s firstborn, was evil in the sight of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' killed him [in judgment]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Judah told Onan, “Go in to your brother’s widow, and perform your duty as a brother-in-law [under the levirate marriage custom]; [be her husband and] raise children for [the name of] your brother.” [Deut 25:5-10] '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Onan knew that the child (heir) would not be his [but his dead brother’s]; so whenever he lay with his brother’s widow, he spilled his seed on the ground [to prevent conception], so that he would not give a child to his brother. '
