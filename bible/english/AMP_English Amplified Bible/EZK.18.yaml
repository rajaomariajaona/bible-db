document_id: EZK.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God Deals Justly with Individuals
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me again, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“If he is the father of a violent son who sheds blood, and who does any of these things to a brother '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(though the father did not do any of these things), that is, the son even eats [the food set before idols] at the mountain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shrines,
    - type: text
      text: ' and defiles his neighbor’s wife, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'oppresses the poor and needy, commits robbery, does not restore [to the debtor] his pledge, but raises his eyes to the idols, and commits repulsive acts, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: and charges interest and takes [a percentage of] increase on what he has loaned; will he then live? He will not live! He has done all these disgusting things, he shall surely be put to death; his blood will be on his own head.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Now behold, if this [wicked] man has a son who has observed all the sins which his father committed, and considers [thoughtfully what he has observed] and does not do like his father: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'He does not eat [food set before idols] at the mountain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shrines
    - type: text
      text: ' or raise his eyes to the idols of the house of Israel, or defile his neighbor’s wife, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'or oppress anyone, or take anything in pledge, or commit robbery, but he gives his bread to the hungry and covers the naked with clothing, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'he keeps his hand from [oppressing] the poor, does not receive interest or increase [from the needy], but executes My ordinances and walks in My statutes; he shall not die for the sin (guilt) of his father; he shall certainly live. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: As for his father, because he practiced extortion, robbed his brother, and did that which is not good among his people, behold, he shall die for his sin.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“Yet do you say, ‘Why should the son not bear the punishment for the father’s sin?’ When the son has practiced justice and righteousness and has kept all My statutes and has done them, he shall certainly live. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “What do you mean by using this proverb concerning the land of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This proverb is generally interpreted to mean that the subsequent generations suffer (“the children’s teeth are set on edge”) for the sins of their ancestors (“the fathers eat sour grapes”). The Israelites were using this well-known proverb as an excuse to blame their forefathers for their suffering and misfortune instead of acknowledging their guilt and taking personal responsibility for their sin.
      marker-yv: yv-n
    - type: text
      text: The fathers eat sour grapes [they sin],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the children’s teeth are set on edge’?
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The person who sins [is the one that] will die. The son will not bear the punishment for the sin of the father, nor will the father bear the punishment for the sin of the son; the righteousness of the righteous shall be on himself, and the wickedness of the wicked shall be on himself.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“But if the wicked man turns [away] from all his sins which he has committed and keeps all My statutes and practices justice and righteousness, he shall certainly live; he shall not die. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'All of his transgressions which he has committed will not be remembered against him; because of his righteousness which he has practiced [for his moral and spiritual integrity in every area and relationship], he will live. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Do I take any pleasure in the death of the wicked,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “rather than that he should turn [away] from his [malevolent] acts and live?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“But when the righteous man turns away from his righteousness and commits sin and acts in accordance with all the repulsive things that the wicked man does, will he live? All of his righteous deeds which he has done will not be remembered because of the treachery that he has committed and for his sin which he has committed; for them he shall die. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Yet you say, ‘The way of the Lord is not right.’ Hear now, O house of Israel! Is My way not right? Is it not your ways that are not right? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'When a righteous man turns away from his righteousness, and commits sin and dies because of it, it is for his sin which he has committed that he dies. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Again, when a wicked man turns away from his wickedness which he has committed and practices justice and righteousness, he will save his life. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Because he considered and turned away from all the transgressions which he had committed, he shall certainly live; he shall not die. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Yet the house of Israel says, ‘The way of the Lord is not right!’ O house of Israel, are My ways not right? Is it not your ways that are not right?
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: As I live,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', “you are certainly not going to use this proverb [as an excuse] in Israel anymore. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “Therefore I will judge you, O house of Israel, each one in accordance with his conduct,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '. “Repent (change your way of thinking) and turn away from all your transgressions, so that sin may not become a stumbling block to you. [Matt 3:2; Rev 2:5] '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Cast away from you all your transgressions which you have committed [against Me], and make yourselves a new heart and a new spirit! For why should you die, O house of Israel? [Eph 4:22, 23] '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: For I have no pleasure in the death of anyone who dies,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: . “Therefore, repent and live!”
  '4':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Behold (pay close attention), all souls are Mine; the soul of the father as well as the soul of the son is Mine. The soul who sins will die. [Rom 6:23]
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“But if a man is righteous (keeps the law) and practices justice and righteousness, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and does not eat [at the pagan shrines] on the mountains or raise his eyes to the idols of the house of Israel, or defile his neighbor’s wife or approach a woman during her [monthly] time of impurity— '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'if a man does not oppress anyone, but restores to the debtor his pledge, does not commit robbery, but gives his bread to the hungry and covers the naked with clothing, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'if he '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Israelites were allowed to charge interest on loans made to Gentile foreigners, but not on loans to impoverished countrymen (Deut 23:20).
      marker-yv: yv-n
    - type: text
      text: 'does not charge interest or take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a percentage of
    - type: text
      text: ' increase [on what he lends in compassion], if he keeps his hand from sin and executes true justice between man and man, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: if he walks in My statutes and [keeps] My ordinances so as to act with integrity; [then] he is [truly] righteous and shall certainly live,” says the Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: . [Ezek 20:11; Amos 5:4]
