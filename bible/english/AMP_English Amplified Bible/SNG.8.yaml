  '8':
  - type: text
    content: ¶“We have a little sister
  - type: text
    content: And she has no breasts.
  - type: text
    content: What shall we do for our sister
  - type: text
    content: On the day when she is spoken for [in marriage]?
  '9':
  - type: text
    content: “If she is a wall (discreet, womanly),
  - type: text
    content: We will build on her a turret (dowry) of silver;
  - type: text
    content: But if she is a door (bold, flirtatious),
  - type: text
