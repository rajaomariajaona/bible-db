    children:
    - type: text
      text: '1'
  - type: text
    text: “Oh, that you were like a brother to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who nursed at the breasts of my mother.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I found you out of doors, I would kiss you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No one would blame me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' despise me, either. [Ps 143:6]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I would lead you and bring you
- type: usfm
  marker: q1
  children:
  - type: text
    text: Into the house of my mother, who used to instruct me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I would give you spiced wine to drink from the juice of my pomegranates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Let his left hand be under my head
- type: usfm
  marker: q1
  children:
  - type: text
    text: And his right hand embrace me.” [Ex 19:4; Deut 33:27]
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Bridegroom)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ¶“I command you to take an oath, O daughters of Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you do not rouse nor awaken my love
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until she pleases.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Chorus)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ¶“Who is this coming up from the wilderness
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leaning upon her beloved?”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Shulammite Bride)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: “
  - type: usfm
    marker: bd
    children:
    - type: text
      text: U
  - type: text
    text: nder the apple tree I awakened you [to my love];
- type: usfm
  marker: q1
  children:
  - type: text
    text: There your mother was in labor with you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: There she was in labor and gave you birth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Put me like a seal on your heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a seal on your arm;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For love is as strong as death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jealousy is as severe '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' cruel as Sheol (the place of the dead).'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its flashes are flashes of fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[A most vehement flame] the very flame of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Heb '
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH (Yahweh)
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! [Deut 4:24; Is 49:16; 1 Cor 10:22]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Many waters cannot quench love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor can rivers drown it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If a man would offer all the riches of his house for love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It would be utterly scorned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' despised.”'
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Chorus)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶“We have a little sister
- type: usfm
  marker: q1
  children:
  - type: text
    text: And she has no breasts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What shall we do for our sister
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the day when she is spoken for [in marriage]?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “If she is a wall (discreet, womanly),
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will build on her a turret (dowry) of silver;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But if she is a door (bold, flirtatious),
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will enclose her with planks of cedar.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Shulammite Bride)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶“I was a wall, and my breasts were like the towers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I became in the king’s eyes
- type: usfm
  marker: q1
  children:
  - type: text
    text: As one [to be respected and allowed] to find peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Solomon had a vineyard at Baal-hamon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He entrusted the vineyard to caretakers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Each one was to bring him a thousand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shekels
  - type: text
    text: ' of silver for its fruit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “My very own vineyard is at my disposal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The thousand [shekels of silver] are for you, O Solomon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And two hundred are for those who tend the fruit.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Bridegroom)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶“O you who sit in the gardens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My companions are listening for your voice—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me hear it.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: (The Shulammite Bride)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '¶“Hurry, my beloved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' come quickly,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a gazelle or a young stag [taking me home]
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the mountains of spices.”
