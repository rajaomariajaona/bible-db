    - type: text
      text: '1'
  - type: text
    text: Again there was a day when the sons of God (angels) came to present themselves before the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', and Satan (adversary, accuser) also came among them to present himself before the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Satan, “From where have you come?” Then Satan answered the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “From roaming around on the earth and from walking around on it.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Satan, “Have you considered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' reflected on My servant Job? For there is none like him on the earth, a blameless and upright man, one who fears God [with reverence] and abstains from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' turns away from evil [because he honors God]. And still he maintains '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' holds tightly to his integrity, although you incited Me against him to destroy him without cause.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Satan answered the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This probably refers to a trade of one animal skin for another, but even so its application here is unclear. One possibility is that according to Satan, Job would be willing to give up his wife (his remaining loved one) to save his own life, thus surrendering his integrity (v 3). Another is that Satan is hypothetically offering to give up his own life if Job is actually willing to die for his integrity. In any case, this is a bluff on Satan’s part, probably to make what he really wants (v 5) appear less drastic.
    marker-yv: yv-n
  - type: text
    text: 'Skin for skin! Yes, a man will give all he has for his life. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But put forth Your hand now, and touch his bone and his flesh [and severely afflict him]; and he will curse You to Your face.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to Satan, “Behold, he is in your hand, only spare his life.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So Satan departed from the presence of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and struck Job with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loathsome
  - type: text
    text: ' boils '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' agonizingly painful sores from the sole of his foot to the crown of his head. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And Job took a piece of broken pottery with which to scrape himself, and he sat [down] among the ashes (rubbish heaps).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then his wife said to him, “Do you still cling to your integrity [and your faith and trust in God, without blaming Him]? Curse God and die!” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But he said to her, “You speak as one of the [spiritually] foolish women speaks [ignorant and oblivious to God’s will]. Shall we indeed accept [only] good from God and not [also] accept adversity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' disaster?” In [spite of] all this Job did not sin with [words from] his lips.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now when Job’s three friends heard of all this adversity that had come upon him, each one came from his own place, Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite; for they had made an appointment together to come to sympathize with him and to comfort him. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When they looked from a distance and did not recognize him [because of his disfigurement], they raised their voices and wept; and each one tore his robe [in grief] and they threw dust over their heads toward the sky [in sorrow]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So they sat down on the ground with Job for seven days and seven nights and no one spoke a word to him, for they saw that his pain was very great.
