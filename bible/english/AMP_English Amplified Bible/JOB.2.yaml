    content: Job Loses His Health
  - type: text
    content: Again there was a day when the sons of God (angels) came to present themselves before the L
  - type: heading
    content: ord
  - type: text
    content: ', and Satan (adversary, accuser) also came among them to present himself before the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'But he said to her, “You speak as one of the [spiritually] foolish women speaks [ignorant and oblivious to God’s will]. Shall we indeed accept [only] good from God and not [also] accept adversity '
  - type: text
    content: and
  - type: text
    content: ' disaster?” In [spite of] all this Job did not sin with [words from] his lips.'
  '11':
  - type: text
    content: 'Now when Job’s three friends heard of all this adversity that had come upon him, each one came from his own place, Eliphaz the Temanite, Bildad the Shuhite, and Zophar the Naamathite; for they had made an appointment together to come to sympathize with him and to comfort him. '
  '12':
  - type: text
    content: 'When they looked from a distance and did not recognize him [because of his disfigurement], they raised their voices and wept; and each one tore his robe [in grief] and they threw dust over their heads toward the sky [in sorrow]. '
  '13':
  - type: text
    content: So they sat down on the ground with Job for seven days and seven nights and no one spoke a word to him, for they saw that his pain was very great.
  '2':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Satan, “From where have you come?” Then Satan answered the L'
  - type: heading
    content: ord
  - type: text
    content: ', “From roaming around on the earth and from walking around on it.” '
  '3':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Satan, “Have you considered '
  - type: text
    content: and
  - type: text
    content: ' reflected on My servant Job? For there is none like him on the earth, a blameless and upright man, one who fears God [with reverence] and abstains from '
  - type: text
    content: and
  - type: text
    content: ' turns away from evil [because he honors God]. And still he maintains '
  - type: text
    content: and
  - type: text
    content: ' holds tightly to his integrity, although you incited Me against him to destroy him without cause.” '
  '4':
  - type: text
    content: Satan answered the L
  - type: heading
    content: ord
  - type: text
    content: ', “'
  - type: note
    content: This probably refers to a trade of one animal skin for another, but even so its application here is unclear. One possibility is that according to Satan, Job would be willing to give up his wife (his remaining loved one) to save his own life, thus surrendering his integrity (v 3). Another is that Satan is hypothetically offering to give up his own life if Job is actually willing to die for his integrity. In any case, this is a bluff on Satan’s part, probably to make what he really wants (v 5) appear less drastic.
  - type: text
    content: 'Skin for skin! Yes, a man will give all he has for his life. '
  '5':
  - type: text
    content: 'But put forth Your hand now, and touch his bone and his flesh [and severely afflict him]; and he will curse You to Your face.” '
  '6':
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Satan, “Behold, he is in your hand, only spare his life.”'
  '7':
  - type: text
    content: So Satan departed from the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' and struck Job with '
  - type: text
    content: loathsome
  - type: text
    content: ' boils '
  - type: text
    content: and
  - type: text
    content: ' agonizingly painful sores from the sole of his foot to the crown of his head. '
  '8':
  - type: text
    content: And Job took a piece of broken pottery with which to scrape himself, and he sat [down] among the ashes (rubbish heaps).
  '9':
  - type: text
    content: 'Then his wife said to him, “Do you still cling to your integrity [and your faith and trust in God, without blaming Him]? Curse God and die!” '
