document_id: EZK.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dirge for the Princes of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“As for you, take up a dirge (funeral poem to be sung) for the princes of Israel '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '‘Your mother [Jerusalem] was like a vine in your '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So with some ancient mss; MT '
        - type: usfm
          marker: it
          children:
          - type: text
            text: blood
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: vineyard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Planted by the waters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was fruitful and full of branches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of abundant water. [2 Kin 24:17; Ezek 17:7]
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ‘And it had strong branches for the scepters of rulers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And its height was raised above the thick branches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' into the clouds'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that it was seen [easily] in its height with the mass of its branches.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ‘But the vine was uprooted in [godly] wrath [by His representative]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it was thrown down to the ground;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The east wind dried up its fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its strong branch was broken off
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that it withered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fire [of God’s judgment] consumed it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ‘And now it is transplanted in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a dry and thirsty land [of Babylon].
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ‘And the fire [of Zedekiah’s rebellion] has gone out from its branch;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has consumed the vine’s shoots and fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that it has in it no [longer a] strong branch
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a scepter to rule.’ ”
  - type: usfm
    marker: m
    children:
    - type: text
      text: This is a dirge (funeral poem to be sung), and has become a dirge.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘What was your mother [Jerusalem and Judah]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lioness among lions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She lay down among young lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She reared her cubs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ‘When she [the royal mother-city] brought up [Jehoahaz] one of her cubs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He became a [young] lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he learned to catch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tear the prey;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He devoured men. [2 Kin 23:30, 32]
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ‘The nations heard about him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was captured in their pit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they brought him with hooks
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the land of Egypt. [2 Chr 36:1, 4]
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ‘When she saw, as she waited,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That her hope was lost,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She took '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Either a timely reference to Jehoiachin who reigned only three months, or a prediction regarding Zedekiah. Both rulers were exiled to Babylon.
      marker-yv: yv-n
    - type: text
      text: another of her cubs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And made him a young lion. [2 Kin 23:34; 24:1, 6]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ‘And he moved among the lions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He became a young lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He learned to tear the prey;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He devoured men.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ‘He destroyed their palaces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he flattened their cities;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the land and all who were in it were appalled
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the sound of his roaring.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ‘Then the nations set against him (the king)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On every side from the provinces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they spread their net over him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was captured in their pit. [2 Kin 24:8-15]
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '‘They put him in a cage with hooks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' chains'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And brought him to the king of Babylon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They brought him in hunting nets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that his voice would be heard no more
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the mountains of Israel.
