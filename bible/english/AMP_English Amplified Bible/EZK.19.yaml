    content: Dirge for the Princes of Israel
  - type: text
    content: '“As for you, take up a dirge (funeral poem to be sung) for the princes of Israel '
  '10':
  - type: text
    content: '‘Your mother [Jerusalem] was like a vine in your '
  - type: note
    content: So with some ancient mss; MT blood.
  - type: text
    content: vineyard,
  - type: text
    content: Planted by the waters;
  - type: text
    content: It was fruitful and full of branches
  - type: text
    content: Because of abundant water. [2 Kin 24:17; Ezek 17:7]
  '11':
  - type: text
    content: ‘And it had strong branches for the scepters of rulers,
  - type: text
    content: 'And its height was raised above the thick branches '
  - type: text
    content: and
  - type: text
    content: ' into the clouds'
  - type: text
    content: So that it was seen [easily] in its height with the mass of its branches.
  '12':
  - type: text
    content: ‘But the vine was uprooted in [godly] wrath [by His representative]
  - type: text
    content: And it was thrown down to the ground;
  - type: text
    content: The east wind dried up its fruit.
  - type: text
    content: Its strong branch was broken off
  - type: text
    content: So that it withered;
  - type: text
    content: The fire [of God’s judgment] consumed it.
  '13':
  - type: text
    content: ‘And now it is transplanted in the wilderness,
  - type: text
    content: In a dry and thirsty land [of Babylon].
  '14':
  - type: text
    content: ‘And the fire [of Zedekiah’s rebellion] has gone out from its branch;
  - type: text
    content: It has consumed the vine’s shoots and fruit,
  - type: text
    content: So that it has in it no [longer a] strong branch
  - type: text
    content: As a scepter to rule.’ ”
  - type: text
    content: This is a dirge (funeral poem to be sung), and has become a dirge.
