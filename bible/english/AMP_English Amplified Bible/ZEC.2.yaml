document_id: ZEC.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Favor to Zion
  - type: text
    content: 'And I looked up, and saw a man with a measuring line in his hand. '
  '10':
  - type: text
    content: Sing for joy and rejoice, O Daughter of Zion; for behold, I am coming, and I will dwell in your midst,” declares the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '11':
  - type: text
    content: “Many nations shall join themselves to the L
  - type: heading
    content: ord
  - type: text
    content: ' in that day and shall be My people. And I will dwell in your midst, and you shall know (recognize, understand fully) that the L'
  - type: heading
    content: ord
  - type: text
    content: ' of hosts has sent Me to you. [Is 2:3; Mic 4:2] '
  '12':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will take possession of Judah as His portion in the holy land and will again choose Jerusalem.'
  '13':
  - type: text
    content: “Be still before the L
  - type: heading
    content: ord
  - type: text
    content: ', all mankind; for He is roused (raised up) from His holy habitation [in response to His persecuted people].” [Hab 2:20; Zeph 1:7]'
  '2':
  - type: text
    content: 'So I said, “Where are you going?” And he said to me, “To measure Jerusalem, to see how wide it is and how long it is.” '
  '3':
  - type: text
    content: 'And behold, the angel who was speaking with me was going out, and another angel was coming out to meet him, '
  '4':
  - type: text
    content: 'and he said to the second angel, “Run, speak to that young man, saying, ‘Jerusalem will be inhabited [like villages] without walls [spreading out into the open country] because of the great number of people and livestock in it. '
  '5':
  - type: text
    content: For I,’ declares the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘will be a wall of fire around her [protecting her from enemies], and I will be the glory in her midst.’ ”'
  '6':
  - type: text
    content: “
  - type: note
    content: Lit Hoy, hoy, also v 7, an exclamation of impending disaster.
  - type: text
    content: Hear this! Flee from [Babylon] the land of the north [which shall come under judgment],” declares the L
  - type: heading
    content: ord
  - type: text
    content: ', “for I have scattered you like the four winds of the heavens,” declares the L'
  - type: heading
    content: ord
  - type: text
    content: '. '
  '7':
  - type: text
    content: '“Hear, Zion (Jerusalem)! Escape, '
  - type: note
    content: Those Jews who voluntarily remained in exile in Babylon after the decree of Cyrus in 538 b.c. were considered adulterers because of their relationship with the Gentiles.
  - type: text
    content: 'you who are living with the daughter of Babylon!” '
  '8':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, “After '
  - type: note
    content: I.e. the Messiah’s first and second advents, Matt 25:31-46.
  - type: text
    content: 'glory He has sent Me against the nations which plunder you—for he who touches you, touches the apple of His eye. '
  '9':
  - type: text
    content: Behold, I will wave my hand over them and they shall become plunder for their own slaves. Then you shall know (recognize, understand fully) that the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts has sent Me. '
