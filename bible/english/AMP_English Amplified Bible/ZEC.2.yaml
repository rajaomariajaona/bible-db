document_id: ZEC.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Favor to Zion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I looked up, and saw a man with a measuring line in his hand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sing for joy and rejoice, O Daughter of Zion; for behold, I am coming, and I will dwell in your midst,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Many nations shall join themselves to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in that day and shall be My people. And I will dwell in your midst, and you shall know (recognize, understand fully) that the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts has sent Me to you. [Is 2:3; Mic 4:2] '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will take possession of Judah as His portion in the holy land and will again choose Jerusalem.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Be still before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', all mankind; for He is roused (raised up) from His holy habitation [in response to His persecuted people].” [Hab 2:20; Zeph 1:7]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said, “Where are you going?” And he said to me, “To measure Jerusalem, to see how wide it is and how long it is.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And behold, the angel who was speaking with me was going out, and another angel was coming out to meet him, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he said to the second angel, “Run, speak to that young man, saying, ‘Jerusalem will be inhabited [like villages] without walls [spreading out into the open country] because of the great number of people and livestock in it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I,’ declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘will be a wall of fire around her [protecting her from enemies], and I will be the glory in her midst.’ ”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Hoy, hoy,
        - type: text
          text: ' also v 7, an exclamation of impending disaster.'
      marker-yv: yv-n
    - type: text
      text: Hear this! Flee from [Babylon] the land of the north [which shall come under judgment],” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “for I have scattered you like the four winds of the heavens,” declares the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Hear, Zion (Jerusalem)! Escape, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Those Jews who voluntarily remained in exile in Babylon after the decree of Cyrus in 538 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . were considered adulterers because of their relationship with the Gentiles.
      marker-yv: yv-n
    - type: text
      text: 'you who are living with the daughter of Babylon!” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “After '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the Messiah’s first and second advents, Matt 25:31-46.
      marker-yv: yv-n
    - type: text
      text: 'glory He has sent Me against the nations which plunder you—for he who touches you, touches the apple of His eye. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Behold, I will wave my hand over them and they shall become plunder for their own slaves. Then you shall know (recognize, understand fully) that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts has sent Me. '
