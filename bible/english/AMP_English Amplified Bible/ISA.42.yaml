  - type: text
    content: ' coastlands, and those who inhabit them [sing His praise]!'
  '11':
  - type: text
    content: 'Let the wilderness and its cities lift up '
  - type: text
    content: their voices,
  - type: text
    content: The villages where Kedar lives.
  - type: text
    content: 'Let the inhabitants of '
  - type: note
    content: Gr Petra (rock). Sela was probably the Edomite capital at this time. Carved into great walls of rose-colored rock it was later controlled by the Nabateans.
  - type: text
    content: Sela shout for joy,
  - type: text
