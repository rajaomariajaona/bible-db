document_id: ISA.42
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s Promise concerning His Servant
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Behold, My '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This is the first of the famous prophecies concerning the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Servant of the Lord,
      - type: text
        text: ' the Messiah (Is 42:1-7; 49:1-9a; 50:4-9; 52:13-53:12).'
    marker-yv: yv-n
  - type: text
    text: 'Servant, whom I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hold fast
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: uphold;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My Chosen One '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in whom
  - type: text
    text: ' My soul delights.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have put My Spirit upon Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will bring forth justice to the nations. [Matt 3:16, 17]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “He will not call out or shout aloud,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor make His voice heard in the street.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “A broken reed He will not break [off]
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a dimly burning wick He will not extinguish [He will not harm those who are weak and suffering];
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will faithfully bring forth justice. [Matt 12:17-21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “He will not be disheartened or crushed [in spirit];
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[He will persevere] until He has established justice on the earth;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the coastlands will wait expectantly for His law.” [Rom 8:22-25]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: This is what God the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who created the heavens and stretched them out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who spread out the earth and its produce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who gives breath to the people on it
- type: usfm
  marker: q1
  children:
  - type: text
    text: And spirit to those who walk on it,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', I have called You (the Messiah) in righteousness [for a righteous purpose],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will also take You by the hand and keep watch over You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will appoint You as a covenant to the people [Israel],
- type: usfm
  marker: q1
  children:
  - type: text
    text: As a light to the nations (Gentiles),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: To open the eyes of the blind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To bring out prisoners from the dungeon
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who sit in darkness from the prison. [Matt 12:18-21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', that is My Name;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My glory I will not give to another,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor My praise to carved idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Indeed, the former things have come to pass,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I declare new things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before they spring forth I proclaim them to you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ¶Sing to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' a new song,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sing
  - type: text
    text: ' His praise from the end of the earth!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who go down to the sea, and all that is in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands, and those who inhabit them [sing His praise]!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Let the wilderness and its cities lift up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their voices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The villages where Kedar lives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let the inhabitants of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Petra (rock).
      - type: text
        text: ' Sela was probably the Edomite capital at this time. Carved into great walls of rose-colored rock it was later controlled by the Nabateans.'
    marker-yv: yv-n
  - type: text
    text: Sela shout for joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them shout joyfully from the tops of the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let them give glory to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And declare His praise in the islands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' coastlands.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will go forth like a warrior,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He will stir up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' zeal like a man of war;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will shout out, yes, He will raise a war cry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will prevail [mightily] against His enemies.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Blindness of the People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ¶“I [the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '] have been silent for a long time,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have been still and restrained Myself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Now
  - type: text
    text: ' I will moan like a woman in labor,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will both gasp and pant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “I will lay waste the mountains and hills
- type: usfm
  marker: q1
  children:
  - type: text
    text: And wither all their vegetation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will turn the rivers into coastlands
- type: usfm
  marker: q1
  children:
  - type: text
    text: And dry up the ponds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “I will lead the blind by a way they do not know;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will guide them in paths that they do not know.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make darkness into light before them
- type: usfm
  marker: q1
  children:
  - type: text
    text: And rugged places into plains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These things I will do [for them],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And I will not leave them abandoned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' undone.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Those who trust in carved idols will be turned back,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And utterly put to shame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who say to cast images,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are our gods.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ¶Hear, you deaf!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And look, you blind, that you may see.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Who is blind but My servant [Israel],
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or deaf like My messenger whom I send?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Who is blind like the one who is at peace '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with Me
  - type: text
    text: ' [in a covenant relationship],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or so blind as the servant of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You have seen many things, but you do not observe them;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' ears are open, but no one hears.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was pleased for His righteousness’ sake'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To make the law great and prove to be glorious.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But this is a people despoiled and plundered;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of them are trapped in holes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or are hidden away in prisons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have become a prey with no one to rescue them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a spoil, with no one to say, “Give them back!” [Luke 19:41-44]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ¶Who among you will listen to this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will listen and pay attention in the time to come?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Who gave up Jacob [the kingdom of Judah] for spoil, and [the kingdom of] Israel to the plunderers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Was it not the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', He against whom we [of Judah] have sinned,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And in whose ways they [of Israel] were unwilling to walk,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And whose law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teaching they did not obey?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Therefore He poured out on Israel the heat of His anger
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the fierceness of battle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And engulfed him in fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet he did not recognize [the lesson of repentance which the Assyrian conquest was intended to teach];
- type: usfm
  marker: q1
  children:
  - type: text
    text: It burned him, but he did not take it to heart.
