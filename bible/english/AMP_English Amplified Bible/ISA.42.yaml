  '12':
  - type: text
    content: Let them give glory to the L
  - type: heading
    content: ord
  - type: text
    content: 'And declare His praise in the islands '
  - type: text
    content: and
  - type: text
    content: ' coastlands.'
  '13':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will go forth like a warrior,'
  - type: text
    content: 'He will stir up '
  - type: text
    content: His
  - type: text
    content: ' zeal like a man of war;'
  - type: text
    content: He will shout out, yes, He will raise a war cry.
  - type: text
    content: He will prevail [mightily] against His enemies.
  - type: heading
    content: The Blindness of the People
  '14':
  - type: text
    content: ¶“I [the L
  - type: heading
    content: ord
  - type: text
    content: '] have been silent for a long time,'
  - type: text
    content: I have been still and restrained Myself.
  - type: text
    content: Now
  - type: text
    content: ' I will moan like a woman in labor,'
  - type: text
    content: I will both gasp and pant.
  '15':
  - type: text
    content: “I will lay waste the mountains and hills
  - type: text
    content: And wither all their vegetation;
  - type: text
    content: I will turn the rivers into coastlands
  - type: text
    content: And dry up the ponds.
  '16':
  - type: text
    content: “I will lead the blind by a way they do not know;
  - type: text
    content: I will guide them in paths that they do not know.
  - type: text
    content: I will make darkness into light before them
  - type: text
    content: And rugged places into plains.
  - type: text
    content: These things I will do [for them],
  - type: text
    content: 'And I will not leave them abandoned '
  - type: text
    content: or
  - type: text
    content: ' undone.”'
  '17':
  - type: text
    content: Those who trust in carved idols will be turned back,
  - type: text
    content: And utterly put to shame,
  - type: text
    content: Who say to cast images,
  - type: text
    content: “You are our gods.”
  '18':
  - type: text
    content: ¶Hear, you deaf!
  - type: text
    content: And look, you blind, that you may see.
  '19':
  - type: text
    content: Who is blind but My servant [Israel],
  - type: text
    content: Or deaf like My messenger whom I send?
  - type: text
    content: 'Who is blind like the one who is at peace '
  - type: text
    content: with Me
  - type: text
    content: ' [in a covenant relationship],'
  - type: text
    content: Or so blind as the servant of the L
  - type: heading
    content: ord
  - type: text
    content: '?'
  '2':
  - type: text
    content: “He will not call out or shout aloud,
  - type: text
    content: Nor make His voice heard in the street.
  '20':
  - type: text
    content: You have seen many things, but you do not observe them;
  - type: text
    content: Your
  - type: text
    content: ' ears are open, but no one hears.'
  '21':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' was pleased for His righteousness’ sake'
  - type: text
    content: To make the law great and prove to be glorious.
  '22':
  - type: text
    content: But this is a people despoiled and plundered;
  - type: text
    content: All of them are trapped in holes,
  - type: text
    content: Or are hidden away in prisons.
  - type: text
    content: They have become a prey with no one to rescue them,
  - type: text
    content: And a spoil, with no one to say, “Give them back!” [Luke 19:41-44]
  '23':
  - type: text
    content: ¶Who among you will listen to this?
  - type: text
    content: Who will listen and pay attention in the time to come?
  '24':
  - type: text
    content: Who gave up Jacob [the kingdom of Judah] for spoil, and [the kingdom of] Israel to the plunderers?
  - type: text
    content: Was it not the L
  - type: heading
    content: ord
  - type: text
    content: ', He against whom we [of Judah] have sinned,'
  - type: text
    content: And in whose ways they [of Israel] were unwilling to walk,
  - type: text
    content: 'And whose law '
  - type: text
    content: and
  - type: text
    content: ' teaching they did not obey?'
  '25':
  - type: text
    content: Therefore He poured out on Israel the heat of His anger
  - type: text
    content: And the fierceness of battle;
  - type: text
    content: And engulfed him in fire,
  - type: text
    content: Yet he did not recognize [the lesson of repentance which the Assyrian conquest was intended to teach];
  - type: text
    content: It burned him, but he did not take it to heart.
  '3':
  - type: text
    content: “A broken reed He will not break [off]
  - type: text
    content: And a dimly burning wick He will not extinguish [He will not harm those who are weak and suffering];
  - type: text
    content: He will faithfully bring forth justice. [Matt 12:17-21]
  '4':
  - type: text
    content: “He will not be disheartened or crushed [in spirit];
  - type: text
    content: '[He will persevere] until He has established justice on the earth;'
  - type: text
    content: And the coastlands will wait expectantly for His law.” [Rom 8:22-25]
  '5':
  - type: text
    content: This is what God the L
  - type: heading
    content: ord
  - type: text
    content: ' says,'
  - type: text
    content: He who created the heavens and stretched them out,
  - type: text
    content: Who spread out the earth and its produce,
  - type: text
    content: Who gives breath to the people on it
  - type: text
    content: And spirit to those who walk on it,
  '6':
  - type: text
    content: “I am the L
  - type: heading
    content: ord
  - type: text
    content: ', I have called You (the Messiah) in righteousness [for a righteous purpose],'
  - type: text
    content: I will also take You by the hand and keep watch over You,
  - type: text
    content: And I will appoint You as a covenant to the people [Israel],
  - type: text
    content: As a light to the nations (Gentiles),
  '7':
  - type: text
    content: To open the eyes of the blind,
  - type: text
    content: To bring out prisoners from the dungeon
  - type: text
    content: And those who sit in darkness from the prison. [Matt 12:18-21]
  '8':
  - type: text
    content: “I am the L
  - type: heading
    content: ord
  - type: text
    content: ', that is My Name;'
  - type: text
    content: My glory I will not give to another,
  - type: text
    content: Nor My praise to carved idols.
  '9':
  - type: text
    content: “Indeed, the former things have come to pass,
  - type: text
    content: Now I declare new things;
  - type: text
    content: Before they spring forth I proclaim them to you.”
