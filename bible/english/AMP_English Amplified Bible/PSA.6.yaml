document_id: PSA.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 6
  - type: heading
    content: Prayer for Mercy in Time of Trouble.
  - type: text
    content: To the Chief Musician; on stringed instruments, set [possibly] an octave below. A Psalm of David.
  - type: text
    content: O L
  - type: heading
    content: ord
  - type: text
    content: ', do not rebuke '
  - type: text
    content: or
  - type: text
    content: ' punish me in Your anger,'
  - type: text
    content: Nor discipline me in Your wrath.
  '10':
  - type: text
    content: Let all my enemies be ashamed and greatly horrified;
  - type: text
    content: Let them turn back, let them suddenly be ashamed [of what they have done].
  '2':
  - type: text
    content: 'Have mercy on me '
  - type: text
    content: and
  - type: text
    content: ' be gracious to me, O L'
  - type: heading
    content: ord
  - type: text
    content: ', for I am weak (faint, frail);'
  - type: text
    content: Heal me, O L
  - type: heading
    content: ord
  - type: text
    content: ', for my bones are dismayed '
  - type: text
    content: and
  - type: text
    content: ' anguished.'
  '3':
  - type: text
    content: My soul [as well as my body] is greatly dismayed.
  - type: text
    content: But as for You, O L
  - type: heading
    content: ord
  - type: text
    content: —how long [until You act on my behalf]?
  '4':
  - type: text
    content: ¶Return, O L
  - type: heading
    content: ord
  - type: text
    content: ', rescue my soul;'
  - type: text
    content: 'Save me because of Your [unfailing] steadfast love '
  - type: text
    content: and
  - type: text
    content: ' mercy.'
  '5':
  - type: text
    content: For in death there is no mention of You;
  - type: text
    content: 'In Sheol (the nether world, the place of the dead) who will praise You '
  - type: text
    content: and
  - type: text
    content: ' give You thanks?'
  '6':
  - type: text
    content: ¶I am weary with my groaning;
  - type: text
    content: Every night I soak my bed with tears,
  - type: text
    content: I drench my couch with my weeping.
  '7':
  - type: text
    content: My eye grows dim with grief;
  - type: text
    content: It grows old because of all my enemies.
  '8':
  - type: text
    content: ¶Depart from me, all you who do evil,
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' has heard the voice of my weeping. [Matt 7:23; Luke 13:27]'
  '9':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' has heard my supplication [my plea for grace];'
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' receives my prayer.'
