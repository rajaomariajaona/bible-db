document_id: PSA.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Mercy in Time of Trouble.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Chief Musician; on stringed instruments, set [possibly] an octave below. A Psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', do not rebuke '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' punish me in Your anger,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor discipline me in Your wrath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all my enemies be ashamed and greatly horrified;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them turn back, let them suddenly be ashamed [of what they have done].
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy on me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' be gracious to me, O L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for I am weak (faint, frail);'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heal me, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', for my bones are dismayed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' anguished.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul [as well as my body] is greatly dismayed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: —how long [until You act on my behalf]?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Return, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', rescue my soul;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save me because of Your [unfailing] steadfast love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' mercy.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in death there is no mention of You;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In Sheol (the nether world, the place of the dead) who will praise You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' give You thanks?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I am weary with my groaning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every night I soak my bed with tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I drench my couch with my weeping.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eye grows dim with grief;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It grows old because of all my enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶Depart from me, all you who do evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has heard the voice of my weeping. [Matt 7:23; Luke 13:27]'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has heard my supplication [my plea for grace];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' receives my prayer.'
