document_id: GAL.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Council at Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then after a period of fourteen years I again went up to Jerusalem, [this time] with Barnabas, taking Titus along also. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They asked
    - type: text
      text: ' only [one thing], that we remember the poor, the very thing I was also eager to do.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peter (Cephas) Opposed by Paul
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when Cephas (Peter) came to Antioch, I opposed him face to face [about his conduct there], because he stood condemned [by his own actions]. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before certain men came from James, he used to eat [his meals] with the Gentiles; but when the men [from Jerusalem] arrived, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' to withdraw and separate himself [from the Gentile believers], because he was afraid of those from the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. self-righteous Jewish converts who twisted the gospel to suit their legalistic beliefs, observed Mosaic Law, and would not eat with Gentile believers.
      marker-yv: yv-n
    - type: text
      text: 'circumcision. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the Jews joined him in this hypocrisy [ignoring their knowledge that Jewish and Gentile Christians were united, under the new covenant, into one faith], with the result that even Barnabas was carried away by their hypocrisy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when I saw that they were not being straightforward about the truth of the gospel, I told Cephas (Peter) in front of everyone, “If you, being a Jew, live [as you have been living] like a Gentile and not like a Jew, how is it that you are [now virtually] forcing the Gentiles to live like Jews [if they want to eat with you]?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[I went on to say] “We are Jews by birth and not sinners from among the Gentiles; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet we know that a man is not '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Being justified is a legal or judicial declaration of righteousness. Justification has two parts: (1) Being declared free of blame, acquitted of sin—not guilty. Believers are justified because Jesus Christ personally assumed the guilt for our sin on the cross; (2) God declares the person righteous, that is, placed in a position of right-standing with Him. A person may not be made righteous by his personal behavior, no matter how good, or by the declaration of any other human being.'
      marker-yv: yv-n
    - type: text
      text: 'justified [and placed in right standing with God] by works of the Law, but [only] through faith in [God’s beloved Son,] Christ Jesus. And even we [as Jews] have believed in Christ Jesus, so that we may be justified by faith in Christ and not by works of the Law. By observing the Law no one will ever be justified [declared free of the guilt of sin and its penalty]. [Ps 143:2] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if, while we seek to be justified in Christ [by faith], we ourselves are found to be sinners, does that make Christ an advocate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' promoter of our sin? Certainly not! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if I [or anyone else should] rebuild [through word or by practice] what I once tore down [the belief that observing the Law is essential for salvation], I prove myself to be a transgressor. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For through the Law I died to the Law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' its demands on me [because salvation is provided through the death and resurrection of Christ], so that I might [from now on] live to God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I went up [to Jerusalem] because of a [divine] revelation, and I put before them the gospel which I preach among the Gentiles. But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I did so
    - type: text
      text: ' in private before those of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This group would have included the apostles Peter and John, as well as James, Jesus’ half-brother who was also the leader of the Jerusalem church.
      marker-yv: yv-n
    - type: text
      text: 'reputation, for fear that I might be running or had run [the course of my ministry] in vain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have been crucified with Christ [that is, in Him I have shared His crucifixion]; it is no longer I who live, but Christ lives in me. The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: life
    - type: text
      text: ' I now live in the body I live by faith [by adhering to, relying on, and completely trusting] in the Son of God, who loved me and gave Himself up for me. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I do not ignore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' nullify the [gracious gift of the] grace of God [His amazing, unmerited favor], for if righteousness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes
    - type: text
      text: ' through [observing] the Law, then Christ died needlessly. [His suffering and death would have had no purpose whatsoever.]”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But [all went well, for] not even Titus, who was with me, was compelled [as some had anticipated] to be circumcised, despite the fact that he was a Greek. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My concern was because of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the Judaizers (see note 1:7).
      marker-yv: yv-n
    - type: text
      text: 'false brothers [those people masquerading as Christians] who had been secretly smuggled in [to the community of believers]. They had slipped in to spy on the freedom which we have in Christ Jesus, in order to bring us back into bondage [under the Law of Moses]. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we did not yield to them even for a moment, so that the truth of the gospel would continue to remain with you [in its purity]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But from those who were of high reputation (whatever they were—in terms of individual importance—makes no difference to me; God shows no partiality—He is not impressed with the positions that people hold nor does He recognize distinctions such as fame or power)—well, those who were of reputation contributed nothing to me [that is, they had nothing to add to my gospel message nor did they impose any new requirements on me]. [Deut 10:17] '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But on the contrary, they saw that I had been entrusted with the gospel to the uncircumcised (Gentiles), just as Peter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had been
    - type: text
      text: ' [entrusted to proclaim the gospel] to the circumcised (Jews); '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(for He who worked effectively for Peter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empowered him in his ministry to the Jews also worked effectively for me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empowered me in my ministry to the Gentiles). '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And recognizing the grace [that God had] bestowed on me, James and Cephas (Peter) and John, who were reputed to be pillars [of the Jerusalem church], gave to me and Barnabas the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A solemn act of partnership signifying acceptance, agreement and trust.
      marker-yv: yv-n
    - type: text
      text: 'right hand of fellowship, so that we could go to the Gentiles [with their blessing] and they to the circumcised (Jews). '
