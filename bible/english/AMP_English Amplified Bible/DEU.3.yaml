document_id: DEU.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Conquests Recounted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Then we turned and went up the road toward Bashan, and at Edrei, Og king of Bashan, with all his people came out to meet us in battle. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘Do not fear him, for I have handed him over to you, him and all his people and his land; and you shall do to him just as you did to Sihon king of the Amorites, who lived at Heshbon.’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God also handed over Og king of Bashan, and all his people, into our hand and we struck him until no survivor was left. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We captured all his cities at that time; there was not a city which we did not take from them: sixty cities, the whole region of Argob, the kingdom of Og in Bashan. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All these cities were fortified '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' unassailable with their high walls, gates, and bars; in addition, [there were] a very great number of unwalled villages. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'We utterly destroyed them, just as we did to Sihon king of Heshbon, utterly destroying every city—the men, women, and children. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But we took all the cattle and the spoil of the cities as plunder for ourselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“So we took the land at that time from the hand of the two kings [Sihon and Og] of the Amorites who were beyond the Jordan, from the valley of the Arnon to Mount Hermon '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '(the Sidonians call Hermon Sirion, and the Amorites call it Senir): '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'all the cities of the plain and all Gilead and all Bashan, as far as Salecah and Edrei, cities of the kingdom of Og in Bashan.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(For only Og king of Bashan was left of the remnant of the [giants known as the] Rephaim. Behold, his bed frame was a bed frame of iron; is it not in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'If this refers to Og’s actual bed frame (the same Hebrew word can mean “coffin”), it may have been displayed in Rabbah as an Ammonite trophy of war. Its size is impressive, though not an accurate way to determine Og’s height since any important man might have an unusually large bed as a symbol of his power or wealth. Concerning the name of the city, Ptolemy II Philadelphus of Egypt (309-246 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: '.) changed the name of Rabbah to Philadelphia during his reign (283-246 '
      - type: usfm
        marker: sc
        children:
        - type: text
          text: b
      - type: text
        text: .
      - type: usfm
        marker: sc
        children:
        - type: text
          text: c
      - type: text
        text: .). Today Amman, capital city of the Hashemite Kingdom of Jordan, is located in the area of this ancient site.
    marker-yv: yv-n
  - type: text
    text: Rabbah of the Ammonites? It was nine cubits (12 ft.) long and four cubits (6 ft.) wide, using the cubit of a man [the forearm to the end of the middle finger].)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“So we took possession of this land at that time. I gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the territory
  - type: text
    text: ' from Aroer, which is by the valley of the Arnon, along with half of the hill country of Gilead and its cities to the Reubenites and to the Gadites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The rest of Gilead and all of Bashan, the kingdom of Og, I gave to the half-tribe of Manasseh, that is, all the region of Argob (concerning all Bashan, it is called the land of Rephaim. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jair the son (descendant) of Manasseh took all the region of Argob as far as the border of the Geshurites and the Maacathites, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that is
  - type: text
    text: ' Bashan, and called it after his own name, Havvoth (the villages of) Jair, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as it is called
  - type: text
    text: ' to this day.) '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I gave Gilead to Machir [of Manasseh]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'To the Reubenites and Gadites I gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the territory
  - type: text
    text: ' from Gilead as far as the Valley of Arnon, with the middle of the Valley as a boundary, and as far as the Jabbok River, the boundary of the sons of Ammon; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: the Arabah also, with the Jordan as its boundary, from Chinnereth (the Sea of Galilee) as far as the sea of the Arabah, the Salt Sea (Dead Sea), at the foot of the slopes of Pisgah on the east.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Then I commanded you [Reuben, Gad, and the half-tribe of Manasseh] at that time, saying, ‘The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given you this land to possess; all you who are brave men shall cross over [the Jordan] armed before your brothers, the sons of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But your wives and your children and your cattle—I know that you have much livestock—shall remain in your cities which I have given you, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: until the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' gives rest to your fellow countrymen as [He has] to you, and they also possess the land which the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has given them beyond the Jordan. Then each of you may return to the land (possession) which I have given to you.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I commanded Joshua at that time, saying, ‘Your eyes have seen everything that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God has done to these two kings [Sihon and Og]; so the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' shall do the same to all the kingdoms into which you are about to cross. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do not fear them, for it is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' your God who is fighting for you.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Then I pleaded with the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at that time [for His favor], saying, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ‘O Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', You have only begun to show Your servant Your greatness and Your mighty hand; for what god is there in heaven or on earth that can do such works and mighty acts (miracles) as Yours? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I pray, let me go over and see the good land that is beyond the Jordan, that good hill country [with Hermon] and Lebanon.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' was angry with me because of you [and your rebellion at Meribah], and would not listen to me; and the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' said to me, ‘Enough! Speak to Me no longer about this matter. [Num 20:8] '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Go up to the top of [Mount] Pisgah and raise your eyes toward the west and north and south and east, and see it with your eyes, for you shall not cross this Jordan. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But command Joshua and encourage and strengthen him, for he shall go across and lead this people, and he will give them the land which you see as an inheritance.’ '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So we stayed in the Valley opposite Beth-peor.
