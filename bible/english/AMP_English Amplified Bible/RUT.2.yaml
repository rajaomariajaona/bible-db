document_id: RUT.2,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Ruth Gleans in Boaz’ Field
  - type: text
    content: 'Now Naomi had a relative of her husband, a man of great wealth '
  - type: text
    content: and
  - type: text
    content: ' influence, from the family of Elimelech, whose name was Boaz. '
  '10':
  - type: text
    content: 'Then she kneeled face downward, bowing to the ground, and said to him, “Why have I found favor in your eyes that you should notice me, when I am a foreigner?” '
  '11':
  - type: text
    content: 'Boaz answered her, “I have been made fully aware of everything that you have done for your mother-in-law since the death of your husband, and how you have left your father and mother and the land of your birth, and have come to a people that you did not know before. '
  '12':
  - type: text
    content: May the L
  - type: heading
    content: ord
  - type: text
    content: ' repay you for your kindness, and may your reward be full from the L'
  - type: heading
    content: ord
  - type: text
    content: ', the God of Israel, under whose wings you have come to take refuge.” '
  '13':
  - type: text
    content: Then she said, “Let me find favor in your sight, my lord, for you have comforted me and have spoken kindly to your maidservant, though I am not as one of your maidservants.”
  '14':
  - type: text
    content: 'At mealtime Boaz said to her, “Come over here and eat some bread and dip your bread in the vinegar.” So she sat beside the reapers; and he served her roasted grain, and she ate until she was satisfied and she had some left [for Naomi]. '
  '15':
  - type: text
    content: 'When she got up to glean, Boaz ordered his servants, “Let her glean even among the sheaves, and do not insult her. '
  '16':
  - type: text
    content: Also you shall purposely pull out for her some stalks [of grain] from the sheaves and leave them so that she may collect them, and do not rebuke her.”
  '17':
  - type: text
    content: 'So she gleaned in the field until evening. Then she beat out what she had gleaned, and it was about an '
  - type: note
    content: This was about one bushel, enough food for several days.
  - type: text
    content: 'ephah of barley. '
  '18':
  - type: text
    content: 'She picked it up and went into the city, and her mother-in-law saw what she had gleaned. Ruth also took out and gave to Naomi what she had saved after she [had eaten and] was satisfied. '
  '19':
  - type: text
    content: 'Her mother-in-law said to her, “Where did you glean today? Where did you work? Blessed be the man who took notice of you.” So she told her mother-in-law with whom she had worked and said, “The name of the man with whom I worked today is Boaz.” '
  '2':
  - type: text
    content: 'And Ruth the Moabitess said to Naomi, “Please let me go to the field and '
  - type: note
    content: Gleaning was a right granted to the poor and to strangers by God—a kind of divinely-appointed welfare system. Farmers were instructed not to glean their fields or vineyards, that is, not to collect the excess stalks of grain or grapes left over by reapers, and not to have the extremities of their fields reaped (Lev 19:9, 10).
  - type: text
    content: 'glean among the ears of grain after one [of the reapers] in whose sight I may find favor.” Naomi said to her, “Go, my daughter.” '
  '20':
  - type: text
    content: Naomi said to her daughter-in-law, “May he be blessed of the L
  - type: heading
    content: ord
  - type: text
    content: ' who has not ceased His kindness to the living and to the dead.” Again Naomi said to her, “The man is one of our closest relatives, one who has the right to '
  - type: note
    content: According to OT law (Lev 25:25), if an Israelite became so impoverished that he sold his property, his closest relative was to buy it back, so that the land would remain within the family. Such a person was called a redeemer. Another law stated that if a married man died childless, his brother was obligated to marry his widow and raise a son in the deceased brother’s name, so that the name would be carried on in Israel (Deut 25:5-10; cf Gen 38:8-10). Being aware of these laws and their applications by the scholars of that time, Naomi conceived of a plan (see ch 3:1-4) that might bring Ruth and Boaz together by having Boaz serve as a redeemer both to purchase a field that Naomi owned, and to fulfill the obligation of Deut 25:5 ff by marrying Ruth.
  - type: text
    content: 'redeem us.” [Lev 25:25] '
  '21':
  - type: text
    content: 'Then Ruth the Moabitess said, “He also said to me, ‘Stay close to my servants until they have harvested my entire crop.’ ” '
  '22':
  - type: text
    content: 'Naomi said to Ruth, “It is good, my daughter, for you to go out [to work] with his maids, so that others do not assault you in another field.” '
  '23':
  - type: text
    content: So she stayed close to the maids of Boaz, gleaning until the end of the barley and wheat harvests. And she lived with her mother-in-law.
  '3':
  - type: text
    content: 'So Ruth went and picked up the leftover grain in a field after the reapers; and she happened to stop at the plot of land belonging to Boaz, who was of the family of Elimelech. '
  '4':
  - type: text
    content: It was then that Boaz came back from Bethlehem and said to the reapers, “The L
  - type: heading
    content: ord
  - type: text
    content: ' be with you!” And they answered him, “The L'
  - type: heading
    content: ord
  - type: text
    content: ' bless you!” '
  '5':
  - type: text
    content: 'Then Boaz said to his servant who was in charge of the reapers, “Whose young woman is this?” '
  '6':
  - type: text
    content: 'The servant in charge of the reapers answered, “She is the young Moabite woman who came back with Naomi from the country of Moab. '
  '7':
  - type: text
    content: 'And she said, ‘Please let me glean and gather after the reapers among the '
  - type: note
    content: I.e. bundles of stalks bound together for transport to the threshing floor where the grain would be separated.
  - type: text
    content: sheaves.’ So she came and has continued [gathering grain] from early morning until now, except when she sat [resting] for a little while in the [field] house.”
  '8':
  - type: text
    content: 'Then Boaz said to Ruth, “Listen carefully, my daughter. Do not go to glean in another field or leave this one, but stay here close by my maids. '
  '9':
  - type: text
    content: 'Watch which field they reap, and follow behind them. I have commanded the servants not to touch you. And when you are thirsty, go to the [water] jars and drink from what the servants draw.” '
