  - type: usfm
    marker: it
    children:
    - type: text
      text: Ruth Gleans in Boaz’ Field
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Naomi had a relative of her husband, a man of great wealth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' influence, from the family of Elimelech, whose name was Boaz. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Ruth the Moabitess said to Naomi, “Please let me go to the field and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gleaning was a right granted to the poor and to strangers by God—a kind of divinely-appointed welfare system. Farmers were instructed not to glean their fields or vineyards, that is, not to collect the excess stalks of grain or grapes left over by reapers, and not to have the extremities of their fields reaped (Lev 19:9, 10).
    marker-yv: yv-n
  - type: text
    text: 'glean among the ears of grain after one [of the reapers] in whose sight I may find favor.” Naomi said to her, “Go, my daughter.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Ruth went and picked up the leftover grain in a field after the reapers; and she happened to stop at the plot of land belonging to Boaz, who was of the family of Elimelech. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It was then that Boaz came back from Bethlehem and said to the reapers, “The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' be with you!” And they answered him, “The L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' bless you!” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Boaz said to his servant who was in charge of the reapers, “Whose young woman is this?” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The servant in charge of the reapers answered, “She is the young Moabite woman who came back with Naomi from the country of Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And she said, ‘Please let me glean and gather after the reapers among the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. bundles of stalks bound together for transport to the threshing floor where the grain would be separated.
    marker-yv: yv-n
  - type: text
    text: sheaves.’ So she came and has continued [gathering grain] from early morning until now, except when she sat [resting] for a little while in the [field] house.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then Boaz said to Ruth, “Listen carefully, my daughter. Do not go to glean in another field or leave this one, but stay here close by my maids. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Watch which field they reap, and follow behind them. I have commanded the servants not to touch you. And when you are thirsty, go to the [water] jars and drink from what the servants draw.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then she kneeled face downward, bowing to the ground, and said to him, “Why have I found favor in your eyes that you should notice me, when I am a foreigner?” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Boaz answered her, “I have been made fully aware of everything that you have done for your mother-in-law since the death of your husband, and how you have left your father and mother and the land of your birth, and have come to a people that you did not know before. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: May the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' repay you for your kindness, and may your reward be full from the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', the God of Israel, under whose wings you have come to take refuge.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then she said, “Let me find favor in your sight, my lord, for you have comforted me and have spoken kindly to your maidservant, though I am not as one of your maidservants.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'At mealtime Boaz said to her, “Come over here and eat some bread and dip your bread in the vinegar.” So she sat beside the reapers; and he served her roasted grain, and she ate until she was satisfied and she had some left [for Naomi]. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When she got up to glean, Boaz ordered his servants, “Let her glean even among the sheaves, and do not insult her. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Also you shall purposely pull out for her some stalks [of grain] from the sheaves and leave them so that she may collect them, and do not rebuke her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So she gleaned in the field until evening. Then she beat out what she had gleaned, and it was about an '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was about one bushel, enough food for several days.
    marker-yv: yv-n
  - type: text
    text: 'ephah of barley. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'She picked it up and went into the city, and her mother-in-law saw what she had gleaned. Ruth also took out and gave to Naomi what she had saved after she [had eaten and] was satisfied. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Her mother-in-law said to her, “Where did you glean today? Where did you work? Blessed be the man who took notice of you.” So she told her mother-in-law with whom she had worked and said, “The name of the man with whom I worked today is Boaz.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Naomi said to her daughter-in-law, “May he be blessed of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' who has not ceased His kindness to the living and to the dead.” Again Naomi said to her, “The man is one of our closest relatives, one who has the right to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'According to OT law (Lev 25:25), if an Israelite became so impoverished that he sold his property, his closest relative was to buy it back, so that the land would remain within the family. Such a person was called a '
      - type: usfm
        marker: it
        children:
        - type: text
          text: redeemer
      - type: text
        text: . Another law stated that if a married man died childless, his brother was obligated to marry his widow and raise a son in the deceased brother’s name, so that the name would be carried on in Israel (Deut 25:5-10; cf Gen 38:8-10). Being aware of these laws and their applications by the scholars of that time, Naomi conceived of a plan (see ch 3:1-4) that might bring Ruth and Boaz together by having Boaz serve as a redeemer both to purchase a field that Naomi owned, and to fulfill the obligation of Deut 25:5 ff by marrying Ruth.
    marker-yv: yv-n
  - type: text
    text: 'redeem us.” [Lev 25:25] '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Ruth the Moabitess said, “He also said to me, ‘Stay close to my servants until they have harvested my entire crop.’ ” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Naomi said to Ruth, “It is good, my daughter, for you to go out [to work] with his maids, so that others do not assault you in another field.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So she stayed close to the maids of Boaz, gleaning until the end of the barley and wheat harvests. And she lived with her mother-in-law.
