document_id: PSA.17
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 17
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Prayer for Protection against Oppressors.
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Prayer of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear the just (righteous) cause, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; listen to my loud [piercing] cry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to my prayer, that comes from guileless lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let my verdict of vindication come from Your presence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'May Your eyes look with equity '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' behold things that are just.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have tried my heart;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have visited me in the night;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have tested me and You find nothing [evil in me];
- type: usfm
  marker: q1
  children:
  - type: text
    text: I intend that my mouth will not transgress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Concerning the deeds of men, by the word of Your lips
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have kept away from the paths of the violent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My steps have held closely to Your paths;
- type: usfm
  marker: q1
  children:
  - type: text
    text: My feet have not staggered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶I have called upon You, for You, O God, will answer me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline Your ear to me, hear my speech.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Wondrously show Your [marvelous and amazing] lovingkindness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Savior of those who take refuge at Your right hand
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From those who rise up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Keep me [in Your affectionate care, protect me] as the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: the pupil, the daughter of the eye
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: apple of Your eye;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hide me in the [protective] shadow of Your wings
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'From the wicked who despoil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deal violently with me,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My deadly enemies who surround me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They have closed their '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: fat
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'unfeeling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heart
  - type: text
    text: ' [to kindness and compassion];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'With their mouths they speak proudly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' make presumptuous claims.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They track us down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' have now surrounded us in our steps;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They set their eyes to force us to the ground,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He is like a lion eager to tear [his prey],
- type: usfm
  marker: q1
  children:
  - type: text
    text: And like a young lion lurking in hiding places.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ¶Arise, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', confront him, cast him down;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Save my soul from the wicked with Your sword,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: From men with Your hand, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: From men of the world [these moths of the night] whose portion [of enjoyment] is in this life—idle and vain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whose belly You fill with Your treasure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are satisfied with children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they leave what they have left [of wealth] to their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: As for me, I shall see Your face in righteousness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will be [fully] satisfied when I awake [to find myself] seeing Your likeness.
