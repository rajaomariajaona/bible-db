  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you know that you were not redeemed from your useless [spiritually unproductive] way of life inherited [by tradition] from your forefathers with perishable things like silver and gold, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but [you were actually purchased] with precious blood, like that of a [sacrificial] lamb unblemished and spotless, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the priceless blood
    - type: text
      text: ' of Christ. [Lev 22:20] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'according to the foreknowledge of God the Father by the sanctifying work of the Spirit to be obedient to Jesus Christ and to be sprinkled with His blood: May grace and peace [that special sense of spiritual well-being] be yours in increasing abundance [as you walk closely with God]. [John 14:27]'
  '20':
  - type: usfm
