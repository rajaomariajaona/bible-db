      marker-yv: yv-n
    - type: text
      text: 'foreordained (foreknown) before the foundation of the world, but has appeared [publicly] in these last times for your sake '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and through Him you believe [confidently] in God [the heavenly Father], who raised Him from the dead and gave Him glory, so that your faith and hope are [centered and rest] in God.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since by your obedience to the truth you have purified yourselves for a sincere love of the believers, [see that you] love one another from the heart [always unselfishly seeking the best for one another], '
  '23':
  - type: usfm
    marker: p
