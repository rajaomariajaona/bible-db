  - type: usfm
    marker: p
    children:
    - type: text
      text: 'seeking to find out what person or what time the Spirit of Christ within them was indicating as He foretold the sufferings of Christ and the glories [destined] to follow. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was revealed to them that their services [their prophecies regarding grace] were not [meant] for themselves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' their time, but for you, in these things [the death, resurrection, and glorification of Jesus Christ] which have now been told to you by those who preached the gospel to you by the [power of the] Holy Spirit [who was] sent from heaven. Into these things even the angels long to look.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So prepare your minds for action, be completely sober [in spirit—steadfast, self-disciplined, spiritually and morally alert], fix your hope completely on the grace [of God] that is coming to you when Jesus Christ is revealed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Live] as obedient children [of God]; do not be conformed to the evil desires '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which governed you
    - type: text
      text: ' in your ignorance [before you knew the requirements and transforming power of the good news regarding salvation]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
