      - type: text
        text: 'The selection of a calf-god was probably inspired by the Egyptian bull-god Apis (Hapis), believed to be a living manifestation of the Egyptian god, Ptah. In ancient Egypt, a bull-calf with specific markings was chosen from the herd and worshiped as Apis. The Apis was the most important of the sacred animals of Egypt. At the age of twenty-eight the Apis bull was sacrificed and buried in a highly structured ritual and a new bull-calf was selected to take his place. Numerous elaborate burial sites containing the Apis bulls have been discovered in Egypt. Both the Greeks and Romans adopted the cultic worship of Apis and it continued until about '
