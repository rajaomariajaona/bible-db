    marker-yv: yv-n
  - type: text
    text: Now because of all this
- type: usfm
  marker: q1
  children:
  - type: text
    text: We are making an agreement in writing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And on the sealed document '
  - type: usfm
