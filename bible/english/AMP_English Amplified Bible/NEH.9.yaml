  - type: text
    text: “But as soon as they had rest, they again did evil before You;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore You abandoned them into the hand of their enemies, so that they ruled over them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet when they turned and cried out again to You, You heard them from heaven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And You rescued them many times in accordance with Your compassion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And You admonished them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned them to turn them back to Your law.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet they acted presumptuously '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' arrogantly and did not heed Your commandments, but sinned against Your ordinances,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which by keeping, a man will live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they turned a stubborn shoulder, stiffened their neck, and would not listen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “Yet You were patient with them for many years,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And admonished them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' warned them by Your Spirit through Your prophets;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Still they would not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: give ear
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: listen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore You gave them into the hand (power) of the peoples of the lands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Yet in Your great compassion You did not utterly destroy them or abandon them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You are a gracious and merciful God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ¶“Now therefore, our God, the great, the mighty, and the awesome God, who keeps the covenant and lovingkindness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not let all the hardship seem insignificant before You,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which has come upon us, our kings, our princes, our priests, our prophets, our fathers and on all Your people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since the time of the kings of Assyria to this day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“However, You are just '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' righteous in everything that has come upon us;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For You have dealt faithfully, but we have acted wickedly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Our kings, our princes, our priests, and our fathers have not kept Your law
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or paid attention to Your commandments and Your warnings which You have given them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “But they, in their kingdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With Your great goodness which You gave them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the broad and rich land which You set before them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Did not serve You or turn from their wicked deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “Behold, we are slaves today,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And as for the land which You gave our fathers, to eat of its fruit and its goodness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behold, we are slaves in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “Its abundant produce is for the kings
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whom You have set over us because of our sins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They also rule over our bodies
- type: usfm
  marker: q1
  children:
  - type: text
    text: And over our cattle as they please,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So we are in great distress.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: A Covenant Results
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ¶“
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
