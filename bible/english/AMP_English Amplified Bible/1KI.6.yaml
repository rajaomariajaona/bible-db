type_code: eng
verses:
  '1':
  - type: heading
    content: The Building of the Temple
  - type: text
    content: ' '
  - type: note
    content: This is a key verse in determining the date of the exodus of the Jews from Egypt. Since the fourth year of Solomon’s reign is believed to be 966 b.c., the date of the exodus was about 1446 b.c.
  - type: text
    content: 'Now it came about in the four hundred and eightieth year after the Israelites came out of the land of Egypt, in the fourth year of Solomon’s reign over Israel, in the month of Ziv (April-May) which is the second month, that he began to build the Lord’s house (temple). '
  '10':
  - type: text
    content: Then he built the extensions [of rooms] against the entire house, each [story] five cubits high; and they were attached to the house with timbers of cedar.
  '11':
  - type: text
    content: Now the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to Solomon, saying, '
  '12':
  - type: text
    content: “
  - type: text
    content: Concerning
  - type: text
    content: ' this house which you are building, if you will walk in My statutes and execute My precepts and keep all My commandments by walking in them, then I will carry out My word (promises) with you which I made to David your father. '
  '13':
  - type: text
    content: I will dwell among the sons (descendants) of Israel, and will not abandon My people Israel.”
  '14':
  - type: text
    content: 'So Solomon built the house (temple) and finished it. '
  '15':
  - type: text
    content: 'He built the walls of the interior of the house [that is, the Holy Place and the Holy of Holies] with boards of cedar, from the floor of the house to the rafters of the ceiling. He overlaid the interior with wood, and he overlaid the floor of the house with boards of cypress. '
  '16':
  - type: text
    content: 'He built twenty cubits on the rear of the house with boards of cedar from the floor to the ceiling; he built its interior as the [inner] sanctuary, the Holy of Holies. '
  '17':
  - type: text
    content: 'The [rest of the] house, that is, the temple in front of '
  - type: text
    content: the Holy of Holies,
  - type: text
    content: ' was forty cubits long. '
  '18':
  - type: text
    content: 'The cedar on the house within had wood carvings '
  - type: text
    content: in the shape
  - type: text
    content: ' of gourds and open flowers. Everything was cedar; no stone was visible. '
  '19':
  - type: text
    content: Then he prepared the Holy of Holies within the house in order to put the ark of the covenant of the L
  - type: heading
    content: ord
  - type: text
    content: ' there. '
  '2':
  - type: text
    content: The length of the house which King Solomon built for the L
  - type: heading
    content: ord
  - type: text
    content: ' was '
  - type: note
    content: A cubit is about 18 inches.
  - type: text
    content: 'sixty cubits (90 ft.), its width twenty (30 ft.), and its height thirty cubits (45 ft.). '
  '20':
  - type: text
    content: 'The Holy of Holies was twenty cubits in length, twenty cubits in width, and twenty cubits in height (a cube), and he overlaid it with pure gold. He also overlaid the cedar altar [with gold]. '
  '21':
  - type: text
    content: 'Solomon overlaid the interior of the house with pure gold, and he drew '
  - type: note
    content: The purpose of the chains may have been to hold the veil or curtain.
  - type: text
    content: 'chains of gold across the front of the Holy of Holies (inner sanctuary), and he overlaid it with gold. '
  '22':
  - type: text
    content: Then he overlaid the entire house with gold, until the whole house was finished. He also overlaid the entire [incense] altar which was by the Holy of Holies with gold.
  '23':
  - type: text
    content: 'Within the Holy of Holies he made two '
  - type: note
    content: Cherubim is the Hebrew plural of “cherub.”
  - type: text
    content: 'cherubim (sculptured figures) of olive wood, each ten cubits high. '
  '24':
  - type: note
    content: The repetitive language of the description emphasizes the size and grandeur of the cherubim.
  - type: text
    content: 'One wing of the cherub was five cubits long, and the other wing was '
  - type: text
    content: also
  - type: text
    content: ' five cubits long; it was ten cubits from the tip of one wing to the tip of the other. '
  '25':
  - type: text
    content: 'The [wingspan of the] other cherub was also ten cubits. The measurements and cut (shape) of the two cherubim were the same; '
  '26':
  - type: text
    content: 'the height of the one cherub was ten cubits, as was the other. '
  '27':
  - type: text
    content: 'He put the cherubim [above the ark] inside the innermost room of the house, and their wings were spread out so that the wing of the one touched one wall, and the wing of the other cherub was touching the other wall; and their inner wings were touching '
  - type: note
    content: Lit wing to wing.
  - type: text
    content: 'each other in the middle of the house. '
  '28':
  - type: text
    content: Solomon also overlaid the cherubim with gold.
  '29':
  - type: text
    content: 'He carved all the walls of the house all around with carved engravings of cherubim, palm-shaped decorations, and open flowers, [both] the inner and the outer '
  - type: text
    content: sanctuaries
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'The porch in front of the main room of the house (temple) was twenty cubits long, corresponding to the width of the house, and its depth in front of the house was ten cubits. '
  '30':
  - type: text
    content: 'He overlaid the floor of the house with gold, [both] the inner and outer '
  - type: text
    content: sanctuaries
  - type: text
    content: .
  '31':
  - type: text
    content: 'For the entrance of the Holy of Holies he made two [folding] doors of olive wood, the lintel (header above the door) and five-sided doorposts (frames). '
  '32':
  - type: text
    content: 'So '
  - type: text
    content: he made
  - type: text
    content: ' two doors of olive wood, and he carved on them carvings of cherubim, palm-shaped decorations, and open flowers; and overlaid them with gold; and he hammered out overlays of gold on the cherubim and palm decorations.'
  '33':
  - type: text
    content: 'Also he made for the entrance of the [outer] sanctuary (the Holy Place) four-sided doorposts (frames) of olive wood '
  '34':
  - type: text
    content: 'and two doors of cypress wood; the two leaves of the one door turned on pivots '
  - type: text
    content: and
  - type: text
    content: ' were folding, and the two leaves of the other door also turned on pivots. '
  '35':
  - type: text
    content: 'He carved cherubim, palm-shaped decorations, and open flowers '
  - type: text
    content: on the doors
  - type: text
    content: ', and overlaid them with gold evenly applied on the carved work. '
  '36':
  - type: text
    content: He built the inner courtyard with three rows of cut stone and a row of cedar beams.
  '37':
  - type: text
    content: In the fourth year [of King Solomon’s reign] the foundation of the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' house was laid, in the [second] month, Ziv (April-May). '
  '38':
  - type: text
    content: In the eleventh year [of King Solomon’s reign] in the month of Bul (October-November), that is, the eighth month, the house was finished throughout all its parts and in accordance with all its specifications. So he built it in seven years.
  '4':
  - type: text
    content: 'He also made framed (artistic) window openings for the house. '
  '5':
  - type: text
    content: 'Against the wall of the house he built '
  - type: note
    content: The meaning is uncertain, perhaps additional rooms.
  - type: text
    content: 'extensions around the walls of the house, around both the main room (Holy Place) and the '
  - type: note
    content: Lit inner sanctuary and so throughout the passage except v 16.
  - type: text
    content: 'Holy of Holies; and he made side chambers all around. '
  '6':
  - type: text
    content: 'The lowest story was five cubits wide, the middle was six cubits wide, and the third was seven cubits wide; for he made offsets (niches) '
  - type: text
    content: in the walls
  - type: text
    content: ' all around on the outside of the house so that '
  - type: text
    content: the supporting beams
  - type: text
    content: ' would not be inserted into the walls of the house.'
  '7':
  - type: text
    content: 'While it was being built, the house was built of stone prepared '
  - type: text
    content: and
  - type: text
    content: ' finished (precut) at the quarry, and no hammer, axe, or iron tool of any kind was heard in the house while it was under construction.'
  '8':
  - type: text
    content: 'The entrance to the lowest side chamber was on the right [or south] side of the house; and they would go up winding stairs to the middle [level], and from the middle to the third. '
  '9':
  - type: text
    content: 'So Solomon built the house (temple) and finished it, and roofed the house with beams and boards of cedar. '
