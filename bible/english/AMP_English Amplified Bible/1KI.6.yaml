document_id: 1KI.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Building of the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This is a key verse in determining the date of the exodus of the Jews from Egypt. Since the fourth year of Solomon’s reign is believed to be 966 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '., the date of the exodus was about 1446 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Now it came about in the four hundred and eightieth year after the Israelites came out of the land of Egypt, in the fourth year of Solomon’s reign over Israel, in the month of Ziv (April-May) which is the second month, that he began to build the Lord’s house (temple). '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he built the extensions [of rooms] against the entire house, each [story] five cubits high; and they were attached to the house with timbers of cedar.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to Solomon, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Concerning
    - type: text
      text: ' this house which you are building, if you will walk in My statutes and execute My precepts and keep all My commandments by walking in them, then I will carry out My word (promises) with you which I made to David your father. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will dwell among the sons (descendants) of Israel, and will not abandon My people Israel.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon built the house (temple) and finished it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He built the walls of the interior of the house [that is, the Holy Place and the Holy of Holies] with boards of cedar, from the floor of the house to the rafters of the ceiling. He overlaid the interior with wood, and he overlaid the floor of the house with boards of cypress. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He built twenty cubits on the rear of the house with boards of cedar from the floor to the ceiling; he built its interior as the [inner] sanctuary, the Holy of Holies. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The [rest of the] house, that is, the temple in front of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Holy of Holies,
    - type: text
      text: ' was forty cubits long. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The cedar on the house within had wood carvings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the shape
    - type: text
      text: ' of gourds and open flowers. Everything was cedar; no stone was visible. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he prepared the Holy of Holies within the house in order to put the ark of the covenant of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' there. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The length of the house which King Solomon built for the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' was '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A cubit is about 18 inches.
      marker-yv: yv-n
    - type: text
      text: 'sixty cubits (90 ft.), its width twenty (30 ft.), and its height thirty cubits (45 ft.). '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Holy of Holies was twenty cubits in length, twenty cubits in width, and twenty cubits in height (a cube), and he overlaid it with pure gold. He also overlaid the cedar altar [with gold]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon overlaid the interior of the house with pure gold, and he drew '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The purpose of the chains may have been to hold the veil or curtain.
      marker-yv: yv-n
    - type: text
      text: 'chains of gold across the front of the Holy of Holies (inner sanctuary), and he overlaid it with gold. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he overlaid the entire house with gold, until the whole house was finished. He also overlaid the entire [incense] altar which was by the Holy of Holies with gold.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Within the Holy of Holies he made two '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:23 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: Cherubim
        - type: text
          text: ' is the Hebrew plural of “cherub.”'
      marker-yv: yv-n
    - type: text
      text: 'cherubim (sculptured figures) of olive wood, each ten cubits high. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The repetitive language of the description emphasizes the size and grandeur of the cherubim.
      marker-yv: yv-n
    - type: text
      text: 'One wing of the cherub was five cubits long, and the other wing was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also
    - type: text
      text: ' five cubits long; it was ten cubits from the tip of one wing to the tip of the other. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The [wingspan of the] other cherub was also ten cubits. The measurements and cut (shape) of the two cherubim were the same; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the height of the one cherub was ten cubits, as was the other. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He put the cherubim [above the ark] inside the innermost room of the house, and their wings were spread out so that the wing of the one touched one wall, and the wing of the other cherub was touching the other wall; and their inner wings were touching '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: wing to wing
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'each other in the middle of the house. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon also overlaid the cherubim with gold.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He carved all the walls of the house all around with carved engravings of cherubim, palm-shaped decorations, and open flowers, [both] the inner and the outer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sanctuaries
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The porch in front of the main room of the house (temple) was twenty cubits long, corresponding to the width of the house, and its depth in front of the house was ten cubits. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He overlaid the floor of the house with gold, [both] the inner and outer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sanctuaries
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the entrance of the Holy of Holies he made two [folding] doors of olive wood, the lintel (header above the door) and five-sided doorposts (frames). '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he made
    - type: text
      text: ' two doors of olive wood, and he carved on them carvings of cherubim, palm-shaped decorations, and open flowers; and overlaid them with gold; and he hammered out overlays of gold on the cherubim and palm decorations.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he made for the entrance of the [outer] sanctuary (the Holy Place) four-sided doorposts (frames) of olive wood '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and two doors of cypress wood; the two leaves of the one door turned on pivots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' were folding, and the two leaves of the other door also turned on pivots. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He carved cherubim, palm-shaped decorations, and open flowers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on the doors
    - type: text
      text: ', and overlaid them with gold evenly applied on the carved work. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He built the inner courtyard with three rows of cut stone and a row of cedar beams.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the fourth year [of King Solomon’s reign] the foundation of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' house was laid, in the [second] month, Ziv (April-May). '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the eleventh year [of King Solomon’s reign] in the month of Bul (October-November), that is, the eighth month, the house was finished throughout all its parts and in accordance with all its specifications. So he built it in seven years.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also made framed (artistic) window openings for the house. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Against the wall of the house he built '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning is uncertain, perhaps additional rooms.
      marker-yv: yv-n
    - type: text
      text: 'extensions around the walls of the house, around both the main room (Holy Place) and the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: inner sanctuary
        - type: text
          text: ' and so throughout the passage except v 16.'
      marker-yv: yv-n
    - type: text
      text: 'Holy of Holies; and he made side chambers all around. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The lowest story was five cubits wide, the middle was six cubits wide, and the third was seven cubits wide; for he made offsets (niches) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the walls
    - type: text
      text: ' all around on the outside of the house so that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the supporting beams
    - type: text
      text: ' would not be inserted into the walls of the house.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While it was being built, the house was built of stone prepared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' finished (precut) at the quarry, and no hammer, axe, or iron tool of any kind was heard in the house while it was under construction.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The entrance to the lowest side chamber was on the right [or south] side of the house; and they would go up winding stairs to the middle [level], and from the middle to the third. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon built the house (temple) and finished it, and roofed the house with beams and boards of cedar. '
