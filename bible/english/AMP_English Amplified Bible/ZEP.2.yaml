  - type: text
    content: I will destroy you
  - type: text
    content: So that no inhabitant will be left.
  '6':
  - type: text
    content: So the [depopulated] seacoast shall be pastures,
  - type: text
    content: With [deserted] meadows for shepherds and folds for flocks.
  '7':
  - type: text
    content: 'The '
  - type: note
    content: This is one of the more than twenty-five details of Bible prophecy about the promised land that has been literally fulfilled. See note Ezek 26:14 for information about a similar fulfillment of Bible prophecy with regard to Tyre.
  - type: text
    content: seacoast will belong
  - type: text
    content: To the remnant of the house of Judah;
  - type: text
    content: They will pasture [their flocks] on it.
  - type: text
    content: 'In the [deserted] houses of Ashkelon [in Philistia] they [of Judah] will lie down '
  - type: text
    content: and
  - type: text
    content: ' rest in the evening,'
  - type: text
    content: For the L
  - type: heading
    content: ord
  - type: text
    content: ' their God will care for them;'
  - type: text
    content: And restore their fortune [permitting them to occupy the land]. [Is 14:29-31; Amos 1:6-8]
  '8':
  - type: text
    content: ¶“I have heard the taunting of Moab
  - type: text
    content: And the revilings of the sons of Ammon,
  - type: text
    content: With which they have taunted My people
  - type: text
    content: And become arrogant against their territory [by violating Israel’s boundary and trying to seize its land].
  '9':
