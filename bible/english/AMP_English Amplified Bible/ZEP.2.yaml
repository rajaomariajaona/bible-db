  '5':
  - type: text
    content: Woe (judgment is coming) to the inhabitants of the seacoast,
  - type: text
    content: The nation of the Cherethites [in Philistia]!
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' is against you,'
  - type: text
