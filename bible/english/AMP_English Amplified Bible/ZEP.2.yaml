document_id: ZEP.2,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judgments on Judah’s Enemies
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather yourselves together [in repentance], yes, gather [in submission],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O nation without shame,
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: This they shall have in return for their pride, because they have taunted and become arrogant against the people of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will be terrifying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awesome to them, for He will starve all the gods of the earth; and all the coastlands of the nations will bow down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worship Him, everyone from his own place. [Joel 2:11; Zeph 1:4; 3:9]'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“You also, O Ethiopians, will be slain by My sword.” [Is 18]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will stretch out His hand against the north'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And destroy Assyria,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And He will make Nineveh a desolation [a wasteland],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parched as the desert. [Is 10:12; Nah 1:1]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flocks will lie down in her midst,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the animals which range in herds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both the pelican and the short-eared owl
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will roost on the top of Nineveh’s pillars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Birds will sing in the window,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desolation will be on the threshold;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For He has uncovered the cedar paneling.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the joyous city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which dwells carelessly [feeling so secure],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who says in her heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am, and there is no one besides me.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a desolation she has become,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lair for [wild] animals!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who passes by her will hiss [in scorn]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And wave his hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in contempt
    - type: text
      text: . [Is 10:5-34; 47:8, 10]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the decree takes effect [and the time for repentance is lost]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day passes like the chaff [whirled by the wind]—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Before the burning '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' fierce anger of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' comes upon you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the day of the wrath of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' comes upon you.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [search diligently for Him and regard Him as the foremost necessity of your life],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you humble of the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who have practiced His ordinances '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have kept His commandments;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek righteousness, seek humility [regard them as vital].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Perhaps you will be hidden [and pardoned and rescued]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anger.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶For [this is the fate of the Philistines:] Gaza will be abandoned
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Ashkelon a desolation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '[The people of] Ashdod will be driven out at noon [in broad daylight]'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And Ekron will be uprooted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' destroyed.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe (judgment is coming) to the inhabitants of the seacoast,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nation of the Cherethites [in Philistia]!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is against you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Canaan, land of the Philistines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that no inhabitant will be left.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the [depopulated] seacoast shall be pastures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With [deserted] meadows for shepherds and folds for flocks.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is one of the more than twenty-five details of Bible prophecy about the promised land that has been literally fulfilled. See note Ezek 26:14 for information about a similar fulfillment of Bible prophecy with regard to Tyre.
      marker-yv: yv-n
    - type: text
      text: seacoast will belong
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To the remnant of the house of Judah;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will pasture [their flocks] on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the [deserted] houses of Ashkelon [in Philistia] they [of Judah] will lie down '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rest in the evening,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' their God will care for them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And restore their fortune [permitting them to occupy the land]. [Is 14:29-31; Amos 1:6-8]
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“I have heard the taunting of Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the revilings of the sons of Ammon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With which they have taunted My people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And become arrogant against their territory [by violating Israel’s boundary and trying to seize its land].
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore, as I live,” declares the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The descendants of Lot and his elder daughter (Gen 19:37).
      marker-yv: yv-n
    - type: text
      text: Moab will in fact become like Sodom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Descendants of Lot and his younger daughter (Gen 19:38).
      marker-yv: yv-n
    - type: text
      text: sons of Ammon like Gomorrah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A land possessed by nettles and salt pits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a perpetual desolation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The remnant of My people will plunder them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what is left of My nation will inherit them [as their own].”
