verses:
  '1':
  - type: heading
    content: Psalm 105
  - type: heading
    content: The Lord’s Wonderful Works in Behalf of Israel.
  - type: text
    content: O give thanks to the L
  - type: heading
    content: ord
  - type: text
    content: ', call upon His name;'
  - type: text
    content: Make known His deeds among the people.
  '10':
  - type: text
    content: Which He confirmed to Jacob as a statute,
  - type: text
    content: To Israel as an everlasting covenant,
  '11':
  - type: text
    content: Saying, “To you I will give the land of Canaan
  - type: text
    content: As the measured portion of your inheritance.”
  '12':
  - type: text
    content: When there were only a few men in number,
  - type: text
    content: Very few [in fact], and strangers in it;
  '13':
  - type: text
    content: And they wandered from one nation to another,
  - type: text
    content: From one kingdom to another people,
  '14':
  - type: text
    content: He allowed no man to oppress them;
  - type: text
    content: 'He rebuked kings for their sakes, '
  - type: text
    content: saying,
  - type: text
    content: ' [Gen 12:17; 20:3-7]'
  '15':
  - type: text
    content: “Do not touch My anointed ones,
  - type: text
    content: And do My prophets no harm.” [1 Chr 16:8-22]
  '16':
  - type: text
    content: ¶And He called for a famine upon the land [of Egypt];
  - type: text
    content: 'He '
  - type: note
    content: Lit broke the whole rod of, referring to the fact that bread was stored as ring-shaped loaves on a rod. If the rod was broken, the loaves fell off and were lost or ruined.
  - type: text
    content: cut off every source of bread. [Gen 41:54]
  '17':
  - type: text
    content: He sent a man before them,
  - type: text
    content: Joseph, who was sold as a slave. [Gen 45:5; 50:20, 21]
  '18':
  - type: text
    content: His feet they hurt with shackles;
  - type: note
    content: Lit his soul came into.
  - type: text
    content: He was put in chains of iron,
  '19':
  - type: text
    content: Until the time that his word [of prophecy regarding his brothers] came true,
  - type: text
    content: The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' tested '
  - type: text
    content: and
  - type: text
    content: ' refined him.'
  '2':
  - type: text
    content: Sing to Him, sing praises to Him;
  - type: text
    content: 'Speak of all His wonderful acts '
  - type: text
    content: and
  - type: text
    content: ' devoutly praise them.'
  '20':
  - type: text
    content: The king sent and released him,
  - type: text
    content: The ruler of the peoples [of Egypt], and set him free.
  '21':
  - type: text
    content: He made Joseph lord of his house
  - type: text
    content: And ruler of all his possessions, [Gen 41:40]
  '22':
  - type: text
    content: To imprison his princes at his will,
  - type: text
    content: That he might teach his elders wisdom.
  '23':
  - type: text
    content: Israel also came into Egypt;
  - type: text
    content: Thus Jacob sojourned in the land of Ham. [Gen 46:6]
  '24':
  - type: text
    content: There the L
  - type: heading
    content: ord
  - type: text
    content: ' greatly increased [the number of] His people,'
  - type: text
    content: And made them more powerful than their enemies.
  '25':
  - type: text
    content: ¶He turned the heart [of the Egyptians] to hate His people,
  - type: text
    content: To deal craftily with His servants.
  '26':
  - type: text
    content: He sent Moses His servant,
  - type: text
    content: And Aaron, whom He had chosen.
  '27':
  - type: text
    content: They exhibited His wondrous signs among them,
  - type: text
    content: Great
  - type: text
    content: ' miracles in the land of Ham (Egypt).'
  '28':
  - type: text
    content: 'He sent [thick, oppressive] darkness and made '
  - type: text
    content: the land
  - type: text
    content: ' dark;'
  - type: text
    content: And Moses and Aaron did not rebel against His words. [Ex 10:22; Ps 99:7]
  '29':
  - type: text
    content: He turned Egypt’s waters into blood
  - type: text
    content: And caused their fish to die. [Ex 7:20, 21]
  '3':
  - type: text
    content: Glory in His holy name;
  - type: text
    content: 'Let the hearts of those who seek '
  - type: text
    content: and
  - type: text
    content: ' require the L'
  - type: heading
    content: ord
  - type: text
    content: ' [as their most essential need] rejoice.'
  '30':
  - type: text
    content: Their land swarmed with frogs,
  - type: text
    content: Even in the chambers of their kings. [Ex 8:6]
  '31':
  - type: text
    content: He spoke, and there came swarms of flies
  - type: text
    content: And gnats in all their territory. [Ex 8:17, 24]
  '32':
  - type: text
    content: He gave them hail for rain,
  - type: text
    content: With flaming fire in their land. [Ex 9:23, 25]
  '33':
  - type: text
    content: He struck their vines also and their fig trees,
  - type: text
    content: And shattered the [ice-laden] trees of their territory. [Ps 78:47]
  '34':
  - type: text
    content: He spoke, and the [migratory] locusts came,
  - type: text
    content: And the young locusts, even without number, [Ex 10:4, 13, 14]
  '35':
  - type: text
    content: And ate up all the vegetation in their land,
  - type: text
    content: And devoured the fruit of their ground.
  '36':
  - type: text
    content: He also struck down all the firstborn in their land,
  - type: text
    content: 'The first fruits '
  - type: text
    content: and
  - type: text
    content: ' chief substance of all their strength. [Ex 12:29; Ps 78:51]'
  '37':
  - type: text
    content: ¶He brought the sons of Israel out [of Egypt] with silver and gold,
  - type: text
    content: And among their tribes there was not one who stumbled. [Ex 12:35]
  '38':
  - type: text
    content: Egypt was glad when they departed,
  - type: text
    content: 'For the dread '
  - type: text
    content: and
  - type: text
    content: ' fear of them had fallen on the Egyptians. [Ex 12:33]'
  '39':
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' spread a cloud as a covering [by day],'
  - type: text
    content: And a fire to illumine the night. [Ex 13:21]
  '4':
  - type: text
    content: 'Seek '
  - type: text
    content: and
  - type: text
    content: ' deeply long for the L'
  - type: heading
    content: ord
  - type: text
    content: ' and His strength [His power, His might];'
  - type: text
    content: 'Seek '
  - type: text
    content: and
  - type: text
    content: ' deeply long for His face '
  - type: text
    content: and
  - type: text
    content: ' His presence continually.'
  '40':
  - type: text
    content: The Israelites asked, and He brought quail,
  - type: text
    content: And satisfied them with the bread of heaven. [Ex 16:12-15]
  '41':
  - type: text
    content: He opened the rock and water flowed out;
  - type: text
    content: It ran in the dry places like a river. [Ex 17:6; Num 20:11]
  '42':
  - type: text
    content: For He remembered His holy word
  - type: text
    content: To Abraham His servant; [Gen 15:14]
  '43':
  - type: text
    content: He brought out His people with joy,
  - type: text
    content: And His chosen ones with a joyful shout,
  '44':
  - type: text
    content: He gave them the lands of the nations [of Canaan],
  - type: text
    content: 'So that they would possess '
  - type: text
    content: the fruits of
  - type: text
    content: ' those peoples’ labor, [Deut 6:10, 11]'
  '45':
  - type: text
    content: So that they might observe His precepts
  - type: text
    content: And keep His laws [obediently accepting and honoring and valuing them].
  - type: text
    content: Praise the L
  - type: heading
    content: ord
  - type: text
    content: '! (Hallelujah!)'
  '5':
  - type: text
    content: Remember [with awe and gratitude] the wonderful things which He has done,
  - type: text
    content: His amazing deeds and the judgments uttered by His mouth [on His enemies, as in Egypt], [Ps 78:43-51]
  '6':
  - type: text
    content: O you offspring of Abraham, His servant,
  - type: text
    content: O you sons of Jacob, His chosen ones!
  '7':
  - type: text
    content: He is the L
  - type: heading
    content: ord
  - type: text
    content: ' our God;'
  - type: text
    content: His judgments are in all the earth.
  '8':
  - type: text
    content: ¶He has remembered His covenant forever,
  - type: text
    content: 'The word which He commanded '
  - type: text
    content: and
  - type: text
    content: ' established to a '
  - type: note
    content: There were twenty-six recorded generations from Adam to Moses. The ancient rabbis took “thousand” here very literally and maintained that God originally planned to give the Law to the thousandth generation, but He foresaw that they would be wicked, so He declined to create 974 generations and gave the Law to the twenty-sixth generation (Moses) instead.
  - type: text
    content: thousand generations,
  '9':
  - type: text
    content: ' '
  - type: text
    content: The covenant
  - type: text
    content: ' which He made with Abraham,'
  - type: text
    content: And His sworn oath to Isaac, [Luke 1:72, 73]
