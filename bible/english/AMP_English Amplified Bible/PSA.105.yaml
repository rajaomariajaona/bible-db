document_id: PSA.105
type_code: eng
segments:
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Psalm 105
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: s
    - type: text
      text: ' Wonderful Works in Behalf of Israel.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O give thanks to the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', call upon His name;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make known His deeds among the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing to Him, sing praises to Him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Speak of all His wonderful acts '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' devoutly praise them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Glory in His holy name;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let the hearts of those who seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' require the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' [as their most essential need] rejoice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deeply long for the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' and His strength [His power, His might];'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Seek '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' deeply long for His face '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' His presence continually.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Remember [with awe and gratitude] the wonderful things which He has done,
- type: usfm
  marker: q1
  children:
  - type: text
    text: His amazing deeds and the judgments uttered by His mouth [on His enemies, as in Egypt], [Ps 78:43-51]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O you offspring of Abraham, His servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: O you sons of Jacob, His chosen ones!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He is the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' our God;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His judgments are in all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ¶He has remembered His covenant forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The word which He commanded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' established to a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There were twenty-six recorded generations from Adam to Moses. The ancient rabbis took “thousand” here very literally and maintained that God originally planned to give the Law to the thousandth generation, but He foresaw that they would be wicked, so He declined to create 974 generations and gave the Law to the twenty-sixth generation (Moses) instead.
    marker-yv: yv-n
  - type: text
    text: thousand generations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The covenant
  - type: text
    text: ' which He made with Abraham,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His sworn oath to Isaac, [Luke 1:72, 73]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Which He confirmed to Jacob as a statute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To Israel as an everlasting covenant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Saying, “To you I will give the land of Canaan
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the measured portion of your inheritance.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When there were only a few men in number,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Very few [in fact], and strangers in it;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And they wandered from one nation to another,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From one kingdom to another people,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He allowed no man to oppress them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He rebuked kings for their sakes, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' [Gen 12:17; 20:3-7]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Do not touch My anointed ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And do My prophets no harm.” [1 Chr 16:8-22]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ¶And He called for a famine upon the land [of Egypt];
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: broke the whole rod of,
      - type: text
        text: ' referring to the fact that bread was stored as ring-shaped loaves on a rod. If the rod was broken, the loaves fell off and were lost or ruined.'
    marker-yv: yv-n
  - type: text
    text: cut off every source of bread. [Gen 41:54]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He sent a man before them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joseph, who was sold as a slave. [Gen 45:5; 50:20, 21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: His feet they hurt with shackles;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: his soul came into
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: He was put in chains of iron,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Until the time that his word [of prophecy regarding his brothers] came true,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' tested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' refined him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The king sent and released him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ruler of the peoples [of Egypt], and set him free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He made Joseph lord of his house
- type: usfm
  marker: q1
  children:
  - type: text
    text: And ruler of all his possessions, [Gen 41:40]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: To imprison his princes at his will,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That he might teach his elders wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Israel also came into Egypt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thus Jacob sojourned in the land of Ham. [Gen 46:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: There the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' greatly increased [the number of] His people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And made them more powerful than their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ¶He turned the heart [of the Egyptians] to hate His people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: To deal craftily with His servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He sent Moses His servant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Aaron, whom He had chosen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They exhibited His wondrous signs among them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Great
  - type: text
    text: ' miracles in the land of Ham (Egypt).'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He sent [thick, oppressive] darkness and made '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the land
  - type: text
    text: ' dark;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Moses and Aaron did not rebel against His words. [Ex 10:22; Ps 99:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He turned Egypt’s waters into blood
- type: usfm
  marker: q1
  children:
  - type: text
    text: And caused their fish to die. [Ex 7:20, 21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Their land swarmed with frogs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even in the chambers of their kings. [Ex 8:6]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He spoke, and there came swarms of flies
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gnats in all their territory. [Ex 8:17, 24]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He gave them hail for rain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With flaming fire in their land. [Ex 9:23, 25]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He struck their vines also and their fig trees,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And shattered the [ice-laden] trees of their territory. [Ps 78:47]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He spoke, and the [migratory] locusts came,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the young locusts, even without number, [Ex 10:4, 13, 14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: And ate up all the vegetation in their land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And devoured the fruit of their ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: He also struck down all the firstborn in their land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The first fruits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' chief substance of all their strength. [Ex 12:29; Ps 78:51]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ¶He brought the sons of Israel out [of Egypt] with silver and gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And among their tribes there was not one who stumbled. [Ex 12:35]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Egypt was glad when they departed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the dread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' fear of them had fallen on the Egyptians. [Ex 12:33]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' spread a cloud as a covering [by day],'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a fire to illumine the night. [Ex 13:21]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The Israelites asked, and He brought quail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And satisfied them with the bread of heaven. [Ex 16:12-15]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: He opened the rock and water flowed out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It ran in the dry places like a river. [Ex 17:6; Num 20:11]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: For He remembered His holy word
- type: usfm
  marker: q1
  children:
  - type: text
    text: To Abraham His servant; [Gen 15:14]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: He brought out His people with joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And His chosen ones with a joyful shout,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: He gave them the lands of the nations [of Canaan],
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that they would possess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the fruits of
  - type: text
    text: ' those peoples’ labor, [Deut 6:10, 11]'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: So that they might observe His precepts
- type: usfm
  marker: q1
  children:
  - type: text
    text: And keep His laws [obediently accepting and honoring and valuing them].
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '! (Hallelujah!)'
