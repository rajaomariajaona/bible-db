  - type: note
    content: This prophecy of Micah, made in the days of King Hezekiah, that Mount Zion would become a plowed field was fulfilled when Nebuchadnezzar and the Chaldeans took Jerusalem and broke down the walls (2 Kin 25:10). That was in 586 b.c. In a.d. 1542 the present walls of Jerusalem were built by Suleiman the Magnificent, the greatest of the Turkish sultans. By some strange error, the part of the city known as Mount Zion was omitted from the enclosure and remained outside the walls; for centuries it was literally “plowed like a field” just as Micah foretold.
