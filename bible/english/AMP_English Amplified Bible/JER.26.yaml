  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Jehoiakim the king, with all his mighty men and all the princes, heard his words, the king sought to put Uriah to death; but when Uriah heard of it, he was afraid and fled and escaped to Egypt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehoiakim the king sent men to Egypt: Elnathan the son of Achbor and certain [other] men with him [went] to Egypt. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they brought Uriah [God’s spokesman] from Egypt and led him to King Jehoiakim, who executed him with a sword and threw his dead body among the graves of the common people.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the hand of Ahikam the son of Shaphan was with Jeremiah, so that he was not given into the hands of the people to put him to death.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
