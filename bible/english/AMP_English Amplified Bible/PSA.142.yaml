verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 142
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Prayer for Help in Trouble.
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A skillful song, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' a didactic '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reflective poem, of David; when he was in the cave. A Prayer.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cry aloud with my voice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I make supplication with my voice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I pour out my complaint before Him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I declare my trouble before Him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When my spirit was overwhelmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' weak within me [wrapped in darkness],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You knew my path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the way where I walk
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have hidden a trap for me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look to the right [the point of attack] and see;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there is no one who has regard for me [to act in my favor].
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Escape has failed me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' I have nowhere to run;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one cares about my life.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶I cried out to You, O L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “You are my refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My portion in the land of the living.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Give attention to my cry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am brought very low;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from my persecutors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are stronger than I.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Bring my soul out of prison (adversity),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So that I may give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise Your name;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous will surround me [in triumph],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For You will look after me.”
