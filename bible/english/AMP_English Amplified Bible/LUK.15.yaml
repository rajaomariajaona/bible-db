  - type: text
    content: 'Now all the tax collectors and sinners [including non-observant Jews] were coming near Jesus to listen to Him. '
  '10':
  - type: text
    content: In the same way, I tell you, there is joy in the presence of the angels of God over one sinner who repents
  - type: text
    content: ' [that is, changes his inner self—his old way of thinking, regrets past sins, lives his life in a way that proves repentance; and seeks God’s purpose for his life].”'
  - type: heading
