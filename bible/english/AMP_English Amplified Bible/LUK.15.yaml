document_id: LUK.15,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lost Sheep
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now all the tax collectors and sinners [including non-observant Jews] were coming near Jesus to listen to Him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In the same way, I tell you, there is joy in the presence of the angels of God over one sinner who repents
    - type: text
      text: ' [that is, changes his inner self—his old way of thinking, regrets past sins, lives his life in a way that proves repentance; and seeks God’s purpose for his life].”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Prodigal Son
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A certain man had two sons.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The younger of them
    - type: text
      text: ' [inappropriately] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: said to his father, ‘Father, give me the share of the property that falls to me.’ So he divided the estate between them.
    - type: text
      text: ' [Deut 21:15-17] '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A few days later, the younger son gathered together everything
    - type: text
      text: ' [that he had] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and traveled to a distant country, and there he wasted his fortune in reckless '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' immoral living.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now when he had spent everything, a severe famine occurred in that country, and he began to do without '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' be in need.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So he went and forced himself on one of the citizens of that country, who sent him into his fields to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would have seemed especially disgusting to Jesus’ Jewish listeners because pigs were ceremonially unclean animals, forbidden to them as food.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: feed pigs.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He would have gladly eaten the
    - type: text
      text: ' [carob] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pods that the pigs were eating
    - type: text
      text: ' [but they could not satisfy his hunger], '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and no one was giving '
      - type: usfm
        marker: it
        children:
        - type: text
          text: anything
      - type: text
        text: ' to him.'
    - type: text
      text: ' [Jer 30:14] '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when he
    - type: text
      text: ' [finally] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: came to his senses, he said, ‘How many of my father’s hired men have more than enough food, while I am dying here of hunger!
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will get up and go to my father, and I will say to him, “Father, I have sinned against heaven and in your sight.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am no longer worthy to be called your son;
    - type: text
      text: ' [just] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: treat me like one of your hired men.” ’
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Both the Pharisees and the scribes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: began
    - type: text
      text: ' muttering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' complaining, saying, “This man accepts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' welcomes sinners and eats with them.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So he got up and came to his father. But while he was still a long way off, his father saw him and was moved with compassion '
      - type: usfm
        marker: it
        children:
        - type: text
          text: for him,
      - type: text
        text: ' and ran and embraced him and kissed him.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the son said to him, ‘Father, I have sinned against heaven and in your sight; I am no longer worthy to be called your son.’
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the father said to his servants, ‘Quickly bring out the best robe
    - type: text
      text: ' [for the guest of honor] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and put it on him; and give him a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a symbol of his authority as a son.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ring for his hand, and sandals for his feet.
    - type: text
      text: ' [Gen 41:42; Zech 3:4] '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And bring the fattened calf and slaughter it, and let us
    - type: text
      text: ' [invite everyone and] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: feast and celebrate;
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for this son of mine was
    - type: text
      text: ' [as good as] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: dead and is alive again; he was lost and has been found.’ So they began to celebrate.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now his older son was in the field; and when he returned and approached the house, he heard music and dancing.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So he summoned one of the servants and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: began
      - type: text
        text: ' asking what this'
    - type: text
      text: ' [celebration] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: meant.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he said to him, ‘Your brother has come, and your father has killed the fattened calf because he has received him back safe and sound.’
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But the elder brother became angry '
      - type: usfm
        marker: it
        children:
        - type: text
          text: and
      - type: text
        text: ' deeply resentful and was not willing to go in; and his father came out and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: began
      - type: text
        text: ' pleading with him.'
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But he said to his father, ‘Look! These many years I have served you, and I have never neglected '
      - type: usfm
        marker: it
        children:
        - type: text
          text: or
      - type: text
        text: ' disobeyed your command. Yet you have never given me'
    - type: text
      text: ' [so much as] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: a young goat, so that I might celebrate with my friends;
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So He told them this parable: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but when this
    - type: text
      text: ' [other] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: son of yours arrived, who has devoured your estate with immoral women, you slaughtered that fattened calf for him!’
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The father said to him, ‘Son, you are always with me, and all that is mine is yours.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But it was fitting to celebrate and rejoice, for this brother of yours was
    - type: text
      text: ' [as good as] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'dead and '
      - type: usfm
        marker: it
        children:
        - type: text
          text: has begun
      - type: text
        text: ' to live. He was lost and has been found.’ ”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What man among you, if he has a hundred sheep and loses one of them, does not leave the ninety-nine in the wilderness and go after the one which is lost,
    - type: text
      text: ' [searching] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: until he finds it?
    - type: text
      text: ' [Matt 18:12-14] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when he has found it, he lays it on his shoulders, rejoicing.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when he gets home, he calls together his friends and his neighbors, saying to them, ‘Rejoice with me, because I have found my lost sheep!’
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, in the same way there will be more joy in heaven over one sinner who repents than over ninety-nine righteous people who have no need of repentance.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lost Coin
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Or what woman, if she has ten silver coins
    - type: text
      text: ' [each one equal to a day’s wages] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and loses one coin, does not light a lamp and sweep the house and search carefully until she finds it?
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when she has found it, she calls together her
    - type: text
      text: ' [women] '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: friends and neighbors, saying, ‘Rejoice with me, because I found the lost coin!’
    - type: text
      text: ' '
