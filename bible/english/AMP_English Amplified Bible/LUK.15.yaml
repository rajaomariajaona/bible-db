  '4':
  - type: text
    content: “What man among you, if he has a hundred sheep and loses one of them, does not leave the ninety-nine in the wilderness and go after the one which is lost,
  - type: text
    content: ' [searching] '
  - type: text
    content: until he finds it?
  - type: text
    content: ' [Matt 18:12-14] '
  '5':
  - type: text
    content: And when he has found it, he lays it on his shoulders, rejoicing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: And when he gets home, he calls together his friends and his neighbors, saying to them, ‘Rejoice with me, because I have found my lost sheep!’
  - type: text
    content: ' '
  '7':
  - type: text
    content: I tell you, in the same way there will be more joy in heaven over one sinner who repents than over ninety-nine righteous people who have no need of repentance.
  - type: heading
    content: The Lost Coin
