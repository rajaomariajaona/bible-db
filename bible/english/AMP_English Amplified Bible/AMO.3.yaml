verses:
  '1':
  - type: heading
    content: All the Families Are Guilty
  - type: text
    content: Hear this word that the L
  - type: heading
    content: ord
  - type: text
    content: ' has spoken against you, O children of Israel, against the whole family which I brought up from the land of Egypt:'
  '10':
  - type: text
    content: For they do not know how to do right,” says the L
  - type: heading
    content: ord
  - type: text
    content: ', “these who store up violence and devastation [like treasures] in their strongholds.”'
  '11':
  - type: text
    content: Therefore, thus says the Lord G
  - type: heading
    content: od
  - type: text
    content: ','
  - type: text
    content: “An adversary (Assyria), even one surrounding the land,
  - type: text
    content: Shall pull down your strength from you
  - type: text
    content: And your fortresses will be looted.”
  '12':
  - type: text
    content: Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Just as the shepherd snatches from the mouth of the lion a couple of legs or a piece of the [sheep’s] ear [to prove to the owner that he has not stolen the animal],
  - type: text
    content: So will the [remaining] children of Israel living in Samaria be snatched away
  - type: text
    content: With the corner of a bed and [part of] the damask covering of a couch.
  '13':
  - type: text
    content: “Hear and testify against the house of Jacob,”
  - type: text
    content: Says the Lord G
  - type: heading
    content: od
  - type: text
    content: ', the God of hosts,'
  '14':
  - type: text
    content: “On that day when I punish Israel’s transgressions,
  - type: text
    content: I shall also punish the altars of Bethel [with their golden calves];
  - type: text
    content: And the horns of the altar shall be cut off
  - type: text
    content: And fall to the ground.
  '15':
  - type: text
    content: “And I shall tear down the winter house with the summer house;
  - type: text
    content: And the houses of ivory shall also perish
  - type: text
    content: And the great houses shall come to an end,”
  - type: text
    content: Says the L
  - type: heading
    content: ord
  - type: text
    content: .
  '2':
  - type: text
    content: “I have known [chosen, cared for, and loved] only you of all the families of the earth;
  - type: text
    content: Therefore I shall punish you for all your wickedness.”
  '3':
  - type: text
    content: Do two men walk together unless they have made an appointment?
  '4':
  - type: text
    content: Does a lion roar in the forest when he has no prey?
  - type: text
    content: 'Does a young lion growl from his den if he has not captured '
  - type: text
    content: something?
  '5':
  - type: text
    content: Does a bird fall into a trap on the ground when there is no bait in it?
  - type: text
    content: Does a trap spring up from the ground when it has caught nothing at all? [Of course not! So it is that Israel has earned her impending judgment.]
  '6':
  - type: text
    content: If a trumpet is blown in a city [warning of danger] will not the people tremble?
  - type: text
    content: 'If a disaster '
  - type: text
    content: or
  - type: text
    content: ' misfortune occurs in a city has not the L'
  - type: heading
    content: ord
  - type: text
    content: ' caused it?'
  '7':
  - type: text
    content: Surely the Lord G
  - type: heading
    content: od
  - type: text
    content: ' does nothing'
  - type: note
    content: God has always warned of coming judgment in order that people may choose to change their behavior and avoid it. He warned Noah of the coming flood (Gen 6:13ff); Abraham and Lot of the future destruction of Sodom (Gen 18:17; 19:14); Joseph of the seven-year famine (Gen 41:30); Moses of the ten plagues on Egypt (Ex 7:1ff); Jonah of the destruction of Nineveh (Jon 1:2; 3:4); Amos of the downfall of Aram (Syria), Philistia, Tyre, Edom, Ammon, Moab, Judah, and Israel (Amos 1 and 2). Various prophets were told in advance about the captivities of the chosen people, and they came to pass because the warnings were disregarded. Jonah announced the destruction of Nineveh, but judgment was postponed following repentance. When later generations of Ninevites reverted to paganism and wickedness, the warning of Nahum was carried out against them.
  - type: text
    content: Without revealing His secret plan [of the judgment to come]
  - type: text
    content: To His servants the prophets. [Rev 10:7]
  '8':
  - type: text
    content: The lion has roared! Who will not fear?
  - type: text
    content: The Lord G
  - type: heading
    content: od
  - type: text
    content: ' has spoken [to the prophets]! Who can but prophesy? [Acts 4:20; 5:20, 29; 1 Cor 9:16]'
  '9':
  - type: text
    content: 'Proclaim on the fortresses in Ashdod (Philistia) and on the citadels in the land of Egypt, and say, “Assemble yourselves on the mountains of Samaria, and see the great confusion within her and the oppressions '
  - type: text
    content: and
  - type: text
    content: ' abuse of authority in her midst. '
