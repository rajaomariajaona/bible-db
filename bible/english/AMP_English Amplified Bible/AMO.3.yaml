segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: All the Families Are Guilty
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear this word that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' has spoken against you, O children of Israel, against the whole family which I brought up from the land of Egypt:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I have known [chosen, cared for, and loved] only you of all the families of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore I shall punish you for all your wickedness.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do two men walk together unless they have made an appointment?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Does a lion roar in the forest when he has no prey?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Does a young lion growl from his den if he has not captured '
  - type: usfm
    marker: it
    children:
    - type: text
      text: something?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Does a bird fall into a trap on the ground when there is no bait in it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a trap spring up from the ground when it has caught nothing at all? [Of course not! So it is that Israel has earned her impending judgment.]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If a trumpet is blown in a city [warning of danger] will not the people tremble?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'If a disaster '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' misfortune occurs in a city has not the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' caused it?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Surely the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' does nothing'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God has always warned of coming judgment in order that people may choose to change their behavior and avoid it. He warned Noah of the coming flood (Gen 6:13ff); Abraham and Lot of the future destruction of Sodom (Gen 18:17; 19:14); Joseph of the seven-year famine (Gen 41:30); Moses of the ten plagues on Egypt (Ex 7:1ff); Jonah of the destruction of Nineveh (Jon 1:2; 3:4); Amos of the downfall of Aram (Syria), Philistia, Tyre, Edom, Ammon, Moab, Judah, and Israel (Amos 1 and 2). Various prophets were told in advance about the captivities of the chosen people, and they came to pass because the warnings were disregarded. Jonah announced the destruction of Nineveh, but judgment was postponed following repentance. When later generations of Ninevites reverted to paganism and wickedness, the warning of Nahum was carried out against them.
    marker-yv: yv-n
  - type: text
    text: Without revealing His secret plan [of the judgment to come]
- type: usfm
  marker: q1
  children:
  - type: text
    text: To His servants the prophets. [Rev 10:7]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The lion has roared! Who will not fear?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ' has spoken [to the prophets]! Who can but prophesy? [Acts 4:20; 5:20, 29; 1 Cor 9:16]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Proclaim on the fortresses in Ashdod (Philistia) and on the citadels in the land of Egypt, and say, “Assemble yourselves on the mountains of Samaria, and see the great confusion within her and the oppressions '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' abuse of authority in her midst. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For they do not know how to do right,” says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “these who store up violence and devastation [like treasures] in their strongholds.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “An adversary (Assyria), even one surrounding the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall pull down your strength from you
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your fortresses will be looted.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Just as the shepherd snatches from the mouth of the lion a couple of legs or a piece of the [sheep’s] ear [to prove to the owner that he has not stolen the animal],
- type: usfm
  marker: q1
  children:
  - type: text
    text: So will the [remaining] children of Israel living in Samaria be snatched away
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the corner of a bed and [part of] the damask covering of a couch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Hear and testify against the house of Jacob,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', the God of hosts,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “On that day when I punish Israel’s transgressions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall also punish the altars of Bethel [with their golden calves];
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the horns of the altar shall be cut off
- type: usfm
  marker: q1
  children:
  - type: text
    text: And fall to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “And I shall tear down the winter house with the summer house;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the houses of ivory shall also perish
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the great houses shall come to an end,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: .
