document_id: TIT.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, a bond-servant of God and an apostle (special messenger, personally chosen representative) of Jesus Christ, for the faith of God’s chosen ones and [to lead and encourage them to recognize and pursue] the knowledge of the truth which leads to godliness, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For there are many rebellious men who are empty talkers [just windbags] and deceivers; especially those of the circumcision [those Jews who insist that Gentile believers must be circumcised and keep the Law in order to be saved]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They must be silenced, because they are upsetting whole families by teaching things they should not teach for the purpose of dishonest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: financial
    - type: text
      text: ' gain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them [Epimenides, a Cretan], a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Epimenides was a highly regarded sixth century '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . poet and philosopher from Crete. His description of his own people had by this time become a proverb.
      marker-yv: yv-n
    - type: text
      text: 'prophet of their own, said, “Cretans are always liars, evil beasts, lazy gluttons.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This description is true. So rebuke them sharply so that they will be sound in the faith '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' free from doctrinal error, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not paying attention to Jewish myths and the commandments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' rules of men who turn their backs on the truth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the pure, all things are pure; but to the corrupt and unbelieving, nothing is pure; both their mind and their conscience are corrupted. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They profess to know God [to recognize and be acquainted with Him], but by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' actions they deny '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' disown Him. They are detestable and disobedient and worthless for good work of any kind.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'based on the hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' divine guarantee of eternal life, [the life] which God, who is ever truthful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' without deceit, promised before the ages of time began, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and at the appointed time has made known His word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' revealed it as His message, through preaching, which was entrusted to me according to the command of God our Savior—'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Titus, my true child in a common faith: Grace and peace [inner calm and spiritual well-being] from God the Father and Christ Jesus our Savior.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Qualifications of Elders
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason I left you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: behind
    - type: text
      text: ' in Crete, so that you would set right what remains '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unfinished,
    - type: text
      text: ' and appoint '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The words '
        - type: usfm
          marker: it
          children:
          - type: text
            text: elder, overseer, and bishop
        - type: text
          text: ' are used interchangeably to indicate the spiritually mature men who were qualified and selected to serve as leaders and shepherds over the church of God (v 7; cf Acts 20:17,28; 1 Tim 3:1-7; 1 Pet 5:1, 2).'
      marker-yv: yv-n
    - type: text
      text: 'elders in every city as I directed you, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: namely,
    - type: text
      text: ' a man of unquestionable integrity, the husband of one wife, having children who believe, not accused of being immoral or rebellious. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: bishop
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'overseer, as God’s steward, must be blameless, not self-willed, not quick-tempered, not addicted to wine, not violent, not greedy for dishonest gain [but financially ethical]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he must be
    - type: text
      text: ' hospitable [to believers, as well as strangers], a lover of what is good, sensible (upright), fair, devout, self-disciplined [above reproach—whether in public or in private]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He must hold firmly to the trustworthy word [of God] as it was taught to him, so that he will be able both to give accurate instruction in sound [reliable, error-free] doctrine and to refute those who contradict [it by explaining their error].
