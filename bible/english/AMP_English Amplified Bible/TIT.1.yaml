document_id: TIT.1,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: 'Paul, a bond-servant of God and an apostle (special messenger, personally chosen representative) of Jesus Christ, for the faith of God’s chosen ones and [to lead and encourage them to recognize and pursue] the knowledge of the truth which leads to godliness, '
  '10':
  - type: text
    content: 'For there are many rebellious men who are empty talkers [just windbags] and deceivers; especially those of the circumcision [those Jews who insist that Gentile believers must be circumcised and keep the Law in order to be saved]. '
  '11':
  - type: text
    content: 'They must be silenced, because they are upsetting whole families by teaching things they should not teach for the purpose of dishonest '
  - type: text
    content: financial
  - type: text
    content: ' gain. '
  '12':
  - type: text
    content: 'One of them [Epimenides, a Cretan], a '
  - type: note
    content: Epimenides was a highly regarded sixth century b.c. poet and philosopher from Crete. His description of his own people had by this time become a proverb.
  - type: text
    content: 'prophet of their own, said, “Cretans are always liars, evil beasts, lazy gluttons.” '
  '13':
  - type: text
    content: 'This description is true. So rebuke them sharply so that they will be sound in the faith '
  - type: text
    content: and
  - type: text
    content: ' free from doctrinal error, '
  '14':
  - type: text
    content: 'not paying attention to Jewish myths and the commandments '
  - type: text
    content: and
  - type: text
    content: ' rules of men who turn their backs on the truth. '
  '15':
  - type: text
    content: 'To the pure, all things are pure; but to the corrupt and unbelieving, nothing is pure; both their mind and their conscience are corrupted. '
  '16':
  - type: text
    content: 'They profess to know God [to recognize and be acquainted with Him], but by '
  - type: text
    content: their
  - type: text
    content: ' actions they deny '
  - type: text
    content: and
  - type: text
    content: ' disown Him. They are detestable and disobedient and worthless for good work of any kind.'
  '2':
  - type: text
    content: 'based on the hope '
  - type: text
    content: and
  - type: text
    content: ' divine guarantee of eternal life, [the life] which God, who is ever truthful '
  - type: text
    content: and
  - type: text
    content: ' without deceit, promised before the ages of time began, '
  '3':
  - type: text
    content: 'and at the appointed time has made known His word '
  - type: text
    content: and
  - type: text
    content: ' revealed it as His message, through preaching, which was entrusted to me according to the command of God our Savior—'
  '4':
  - type: text
    content: 'To Titus, my true child in a common faith: Grace and peace [inner calm and spiritual well-being] from God the Father and Christ Jesus our Savior.'
  - type: heading
    content: Qualifications of Elders
  '5':
  - type: text
    content: 'For this reason I left you '
  - type: text
    content: behind
  - type: text
    content: ' in Crete, so that you would set right what remains '
  - type: text
    content: unfinished,
  - type: text
    content: ' and appoint '
  - type: note
    content: The words elder, overseer, and bishop are used interchangeably to indicate the spiritually mature men who were qualified and selected to serve as leaders and shepherds over the church of God (v 7; cf Acts 20:17,28; 1 Tim 3:1-7; 1 Pet 5:1, 2).
  - type: text
    content: 'elders in every city as I directed you, '
  '6':
  - type: text
    content: namely,
  - type: text
    content: ' a man of unquestionable integrity, the husband of one wife, having children who believe, not accused of being immoral or rebellious. '
  '7':
  - type: text
    content: 'For the '
  - type: note
    content: Or bishop.
  - type: text
    content: 'overseer, as God’s steward, must be blameless, not self-willed, not quick-tempered, not addicted to wine, not violent, not greedy for dishonest gain [but financially ethical]. '
  '8':
  - type: text
    content: 'And '
  - type: text
    content: he must be
  - type: text
    content: ' hospitable [to believers, as well as strangers], a lover of what is good, sensible (upright), fair, devout, self-disciplined [above reproach—whether in public or in private]. '
  '9':
  - type: text
    content: He must hold firmly to the trustworthy word [of God] as it was taught to him, so that he will be able both to give accurate instruction in sound [reliable, error-free] doctrine and to refute those who contradict [it by explaining their error].
