    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For behold, the day is coming, burning like a furnace, and all the arrogant (proud, self-righteous, haughty), and every evildoer shall be stubble; and the day that is coming shall set them on fire,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, “so that it will leave them neither root nor branch. [Is 5:21-25; Matt 3:12] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But for you who fear My name [with awe-filled reverence] the sun of righteousness will rise with healing in its wings. And you will go forward and leap [joyfully] like calves [released] from the stall. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You will trample the wicked, for they will be ashes under the soles of your feet on the day that I do this,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Remember [with thoughtful concern] the Law of Moses My servant, the statutes and the ordinances which I commanded him on [Mount] Horeb [to give] to all Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Behold, I am going to send you Elijah the prophet before the coming of the great and terrible day of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Matt 11:14; 17:10-13] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will turn the hearts of the fathers to their children, and the hearts of the children to their fathers [a reconciliation produced by repentance], so that I will not come and strike the land with a curse [of complete destruction].” [Luke 1:17]
