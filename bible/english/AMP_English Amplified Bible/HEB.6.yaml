  '4':
  - type: text
    content: 'For [it is impossible to restore to repentance] those who have once been enlightened [spiritually] and who have '
  - type: note
    content: This is the same Greek word that is used in Matt 27:34 regarding Jesus’ tasting the wine mixed with gall during His crucifixion. After tasting what was being offered to Him He refused to drink it. Perhaps the use of this word in this passage (vv 4-6) refers to those who superficially “tasted” the gospel and outwardly appeared to embrace the Christian experience, but inwardly never committed in full surrender to Christ. In this case, the act of “falling away” was simply the public expression of their true position and their rejection of Jesus as Messiah regardless of the evidence.
  - type: text
