document_id: HEB.6,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Peril of Falling Away
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore let us get past the elementary stage in the teachings about the Christ, advancing on to maturity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' perfection '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spiritual completeness, [doing this] without laying again a foundation of repentance from dead works and of faith toward God, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For God is not unjust so as to forget your work and the love which you have shown for His name in ministering to [the needs of] the saints (God’s people), as you do. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And we desire for each one of you to show the same diligence [all the way through] so as to realize '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' enjoy the full assurance of hope until the end, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: so that you will not be [spiritually] sluggish, but [will instead be] imitators of those who through faith [lean on God with absolute trust and confidence in Him and in His power] and by patient endurance [even when suffering] are [now] inheriting the promises.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For when God made the promise to Abraham, He swore [an oath] by Himself, since He had no one greater by whom to swear, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'saying, “I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will surely bless you and
    - type: text
      text: ' I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: will surely multiply you
    - type: text
      text: '.” [Gen 22:16, 17] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And so, having patiently waited, he realized the promise [in the miraculous birth of Isaac, as a pledge of what was to come from God]. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Indeed men swear [an oath] by '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Him who is greater
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'one greater '
    - type: usfm
      marker: it
      children:
      - type: text
        text: than themselves,
    - type: text
      text: ' and with them [in all disputes] the oath '
    - type: usfm
      marker: it
      children:
      - type: text
        text: serves
    - type: text
      text: ' as confirmation [of what has been said] and is an end of the dispute. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In the same way God, in His desire to show to the heirs of the promise the unchangeable nature of His purpose, intervened '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guaranteed it with an oath, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'so that by two unchangeable things [His promise and His oath] in which it is impossible for God to lie, we who have fled [to Him] for refuge would have strong encouragement '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' indwelling strength to hold tightly to the hope set before us. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This hope [this confident assurance] we have as an anchor of the soul [it cannot slip and it cannot break down under whatever pressure bears upon it]—a safe and steadfast hope that enters within the veil [of the heavenly temple, that most Holy Place in which the very presence of God dwells], [Lev 16:2] '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'of teaching about washings (ritual purifications), the laying on of hands, the resurrection of the dead, and eternal judgment. [These are all important matters in which you should have been proficient long ago.] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'where Jesus has entered [in advance] as a forerunner for us, having become a High Priest forever according to the order of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 7:3.
      marker-yv: yv-n
    - type: text
      text: Melchizedek. [Ps 110:4]
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And we will do this [that is, proceed to maturity], if God permits. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For [it is impossible to restore to repentance] those who have once been enlightened [spiritually] and who have '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the same Greek word that is used in Matt 27:34 regarding Jesus’ tasting the wine mixed with gall during His crucifixion. After tasting what was being offered to Him He refused to drink it. Perhaps the use of this word in this passage (vv 4-6) refers to those who superficially “tasted” the gospel and outwardly appeared to embrace the Christian experience, but inwardly never committed in full surrender to Christ. In this case, the act of “falling away” was simply the public expression of their true position and their rejection of Jesus as Messiah regardless of the evidence.
      marker-yv: yv-n
    - type: text
      text: 'tasted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consciously experienced the heavenly gift and have shared in the Holy Spirit, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and have tasted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' consciously experienced the good word of God and the powers of the age (world) to come, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This passage is one of the most difficult to interpret in Hebrews. Four major views have been suggested: 1) some interpret the passage to teach the possibility of loss of salvation, 2) some see the text as hypothetical, with the author using an illustration of what would occur in the case of apostasy, but which, in fact, cannot occur, 3) some suggest the passage refers to apparent believers who are in the church, but who are not truly saved. These commit apostasy, depart from the fellowship, and thus give evidence they were not genuinely converted, and 4) the loss of rewards view that suggests that the context indicated the people described in vv 4-6 are genuine believers who commit willful sin and fail to press on to maturity. These are disciplined by God in this life, and lose rewards at the Judgment Seat of Christ along the lines of 1 Cor 3:11-17.'
      marker-yv: yv-n
    - type: text
      text: 'and then have fallen away—it is impossible to bring them back again to repentance, since they again nail the Son of God on the cross [for as far as they are concerned, they are treating the death of Christ as if they were not saved by it], and are holding Him up again to public disgrace. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For soil that drinks the rain which often falls on it and produces crops useful to those for whose benefit it is cultivated, receives a blessing from God; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: but if it persistently produces thorns and thistles, it is worthless and close to being cursed, and it ends up being burned. [Gen 3:17, 18]
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Better Things for You
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But, beloved, even though we speak to you in this way, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The concerns of the writer of Hebrews as outlined in vv 1-8 have not happened to the Hebrew believers and the writer does not expect them to happen.
      marker-yv: yv-n
    - type: text
      text: 'we are convinced of better things concerning you, and of things that accompany salvation. '
