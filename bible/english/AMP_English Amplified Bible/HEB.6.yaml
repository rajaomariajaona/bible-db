  '6':
  - type: note
    content: 'This passage is one of the most difficult to interpret in Hebrews. Four major views have been suggested: 1) some interpret the passage to teach the possibility of loss of salvation, 2) some see the text as hypothetical, with the author using an illustration of what would occur in the case of apostasy, but which, in fact, cannot occur, 3) some suggest the passage refers to apparent believers who are in the church, but who are not truly saved. These commit apostasy, depart from the fellowship, and thus give evidence they were not genuinely converted, and 4) the loss of rewards view that suggests that the context indicated the people described in vv 4-6 are genuine believers who commit willful sin and fail to press on to maturity. These are disciplined by God in this life, and lose rewards at the Judgment Seat of Christ along the lines of 1 Cor 3:11-17.'
  - type: text
    content: 'and then have fallen away—it is impossible to bring them back again to repentance, since they again nail the Son of God on the cross [for as far as they are concerned, they are treating the death of Christ as if they were not saved by it], and are holding Him up again to public disgrace. '
  '7':
