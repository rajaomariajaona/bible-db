document_id: 2TH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Exhortation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Finally, brothers and sisters, pray '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' for us that the word of the Lord will spread rapidly and be honored [triumphantly celebrated and glorified], just as it was with you; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and [pray] that we will be rescued from perverse and evil men; for not everyone has the faith. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But the Lord is faithful, and He will strengthen you [setting you on a firm foundation] and will protect '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' guard you from the evil '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We have confidence in the Lord concerning you, that you are doing and will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continue
  - type: text
    text: ' to do the things [which] we command. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'May the Lord direct your hearts into the love of God and into the steadfastness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' patience of Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now we command you, believers, in the name of our Lord Jesus Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' by His authority, that you withdraw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' keep away from every brother or sister who leads an undisciplined life and does not live in accordance with the tradition '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' teaching that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One early ms reads '
      - type: usfm
        marker: it
        children:
        - type: text
          text: they
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'you have received from us. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For you yourselves know how you ought to follow our example, because we did not act in an undisciplined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' inappropriate manner when we were with you [we were never idle or lazy, nor did we avoid our duties], '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'nor did we eat anyone’s bread without paying for it, but with labor and hardship we worked night and day [to pay our own way] so that we would not be a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: financial
  - type: text
    text: ' burden on any of you [for our support]; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'not because we do not have a right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to such support,
  - type: text
    text: ' but [we provided our own financial support] to offer ourselves as a model for you, so that you would follow our example. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For even while we were with you, we used to give you this order: if anyone is not willing to work, then he is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. if one is able, but unwilling to work to provide for himself or his family, it is unjust for him to receive the necessities of life provided free by those who willingly work.
    marker-yv: yv-n
  - type: text
    text: 'not to eat, either. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indeed, we hear that some among you are leading an undisciplined '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' inappropriate life, doing no work at all, but acting like busybodies [meddling in other people’s business]. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now such people we command and exhort in the Lord Jesus Christ to settle down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' work quietly and earn their own food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' other necessities [supporting themselves instead of depending on the hospitality of others]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And as for [the rest of] you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'believers, do not grow tired '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' lose heart in doing good [but continue doing what is right without weakening].'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now if anyone [in the church] does not obey what we say in this letter, take special note of that person and do not associate with him, so that he will be ashamed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' repent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Do not regard him as an enemy, but keep admonishing him as a [believing] brother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now may the Lord of peace Himself grant you His peace at all times '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' in every way [that peace and spiritual well-being that comes to those who walk with Him, regardless of life’s circumstances]. The Lord be with you all. [John 14:27]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I, Paul, write you this final greeting with my own hand. This is the distinguishing mark in every letter [of mine, that shows it is genuine]. It is the way I write [my handwriting and signature]. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The grace of our Lord Jesus Christ be with all of you.
