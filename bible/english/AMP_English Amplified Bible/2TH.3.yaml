document_id: 2TH.3,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Exhortation
  - type: text
    content: 'Finally, brothers and sisters, pray '
  - type: text
    content: continually
  - type: text
    content: ' for us that the word of the Lord will spread rapidly and be honored [triumphantly celebrated and glorified], just as it was with you; '
  '10':
  - type: text
    content: 'For even while we were with you, we used to give you this order: if anyone is not willing to work, then he is '
  - type: note
    content: I.e. if one is able, but unwilling to work to provide for himself or his family, it is unjust for him to receive the necessities of life provided free by those who willingly work.
  - type: text
    content: 'not to eat, either. '
  '11':
  - type: text
    content: 'Indeed, we hear that some among you are leading an undisciplined '
  - type: text
    content: and
  - type: text
    content: ' inappropriate life, doing no work at all, but acting like busybodies [meddling in other people’s business]. '
  '12':
  - type: text
    content: 'Now such people we command and exhort in the Lord Jesus Christ to settle down '
  - type: text
    content: and
  - type: text
    content: ' work quietly and earn their own food '
  - type: text
    content: and
  - type: text
    content: ' other necessities [supporting themselves instead of depending on the hospitality of others]. '
  '13':
  - type: text
    content: 'And as for [the rest of] you, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers, do not grow tired '
  - type: text
    content: or
  - type: text
    content: ' lose heart in doing good [but continue doing what is right without weakening].'
  '14':
  - type: text
    content: 'Now if anyone [in the church] does not obey what we say in this letter, take special note of that person and do not associate with him, so that he will be ashamed '
  - type: text
    content: and
  - type: text
    content: ' repent. '
  '15':
  - type: text
    content: Do not regard him as an enemy, but keep admonishing him as a [believing] brother.
  '16':
  - type: text
    content: 'Now may the Lord of peace Himself grant you His peace at all times '
  - type: text
    content: and
  - type: text
    content: ' in every way [that peace and spiritual well-being that comes to those who walk with Him, regardless of life’s circumstances]. The Lord be with you all. [John 14:27]'
  '17':
  - type: text
    content: 'I, Paul, write you this final greeting with my own hand. This is the distinguishing mark in every letter [of mine, that shows it is genuine]. It is the way I write [my handwriting and signature]. '
  '18':
  - type: text
    content: The grace of our Lord Jesus Christ be with all of you.
  '2':
  - type: text
    content: 'and [pray] that we will be rescued from perverse and evil men; for not everyone has the faith. '
  '3':
  - type: text
    content: 'But the Lord is faithful, and He will strengthen you [setting you on a firm foundation] and will protect '
  - type: text
    content: and
  - type: text
    content: ' guard you from the evil '
  - type: text
    content: one.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'We have confidence in the Lord concerning you, that you are doing and will '
  - type: text
    content: continue
  - type: text
    content: ' to do the things [which] we command. '
  '5':
  - type: text
    content: 'May the Lord direct your hearts into the love of God and into the steadfastness '
  - type: text
    content: and
  - type: text
    content: ' patience of Christ.'
  '6':
  - type: text
    content: 'Now we command you, believers, in the name of our Lord Jesus Christ '
  - type: text
    content: and
  - type: text
    content: ' by His authority, that you withdraw '
  - type: text
    content: and
  - type: text
    content: ' keep away from every brother or sister who leads an undisciplined life and does not live in accordance with the tradition '
  - type: text
    content: and
  - type: text
    content: ' teaching that '
  - type: note
    content: One early ms reads they.
  - type: text
    content: 'you have received from us. '
  '7':
  - type: text
    content: 'For you yourselves know how you ought to follow our example, because we did not act in an undisciplined '
  - type: text
    content: or
  - type: text
    content: ' inappropriate manner when we were with you [we were never idle or lazy, nor did we avoid our duties], '
  '8':
  - type: text
    content: 'nor did we eat anyone’s bread without paying for it, but with labor and hardship we worked night and day [to pay our own way] so that we would not be a '
  - type: text
    content: financial
  - type: text
    content: ' burden on any of you [for our support]; '
  '9':
  - type: text
    content: 'not because we do not have a right '
  - type: text
    content: to such support,
  - type: text
    content: ' but [we provided our own financial support] to offer ourselves as a model for you, so that you would follow our example. '
