document_id: 1CO.9,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Use of Liberty
  - type: text
    content: 'Am I not free [unrestrained and exempt from any obligation]? Am I not an apostle? Have I not '
  - type: note
    content: Paul knew that to be an apostle in the same sense as the original twelve apostles (with Matthias replacing Judas Iscariot, Acts 1:26), he had to be an eyewitness of the resurrected Christ (Acts 1:22). His encounter with Christ on his journey to Damascus met this requirement (Acts 9:2-8, 27; 22:6-21; 26:12-18).
  - type: text
    content: 'seen Jesus our [risen] Lord [in person]? Are you not [the result and proof of] my work in the Lord? '
  '10':
  - type: text
    content: 'Or does He speak entirely for our sake? Yes, it was written for our sake: The plowman ought to plow '
  - type: note
    content: In the NT the word “hope” expresses a cherished desire along with the confident assurance of obtaining that which is longed for.
  - type: text
    content: 'in hope, and the thresher to thresh in hope of sharing the harvest. '
  '11':
  - type: text
    content: 'If we have sown [the good seed of] spiritual things in you, is it too much if we reap material things from you? '
  '12':
  - type: text
    content: 'If others share in this rightful claim over you, do not we even more? However, we did not exercise this right, but we put up with everything so that we will not hinder [the spread of] the good news of Christ. '
  '13':
  - type: text
    content: 'Do you not know that those who officiate in the sacred services of the temple eat from the temple [offerings of meat and bread] and those who regularly attend the altar have their share from the [offerings brought to the] altar? [Deut 18:1] '
  '14':
  - type: text
    content: So also [on the same principle] the Lord directed those who preach the gospel to get their living from the gospel.
  '15':
  - type: text
    content: 'But I have used none of these privileges, nor am I writing this [to suggest] that any such provision be made for me now. For it would be better for me to die than to have anyone deprive me of my '
  - type: note
    content: Paul was not bragging, but rejoicing because he could support himself as a tradesman while he ministered.
  - type: text
    content: 'boast [in this matter of financial support]. '
  '16':
  - type: text
    content: 'For if I [merely] preach the gospel, I have nothing to boast about, for I am compelled [that is, absolutely obligated to do it]. Woe to me if I do not preach the good news [of salvation]! '
  '17':
  - type: text
    content: 'For if I do this work '
  - type: note
    content: Paul did not seek his call to minister, he was chosen by a sovereign act of God.
  - type: text
    content: 'of my own free will, then I have a reward; but if it is not of my will [but by God’s choosing], I have been entrusted with a [sacred] stewardship. '
  '18':
  - type: text
    content: What then is my reward? [Just this:] that, when I preach the gospel, I may offer the gospel without charge [to everyone], so as not to take advantage of my rights [as a preacher and apostle] in [preaching] the gospel.
  '19':
  - type: text
    content: 'For though I am free from all men, I have made myself a slave to everyone, so that I may win more [for Christ]. '
  '2':
  - type: text
    content: 'If I am not [considered] an apostle to others, at least I am one to you; for you are the seal '
  - type: text
    content: and
  - type: text
    content: ' the certificate '
  - type: text
    content: and
  - type: text
    content: ' the living evidence of my apostleship in the Lord [confirming and authenticating it].'
  '20':
  - type: text
    content: 'To the Jews I became as a Jew, so that I might win Jews [for Christ]; to men under the Law, [I became] as one '
  - type: note
    content: Cf Acts 21:20-26.
  - type: text
    content: 'under the Law, though not being under the Law myself, so that I might win those who are under the Law. '
  '21':
  - type: text
    content: 'To those who are without (outside) the Law, [I became] as one without the Law, though [I am] not without the law of God, but under the law of Christ, so that I might win those who are without law. '
  '22':
  - type: text
    content: 'To the '
  - type: note
    content: Paul may be talking about those with spiritually immature consciences regarding questionable issues (see ch 8). If so, he means that he abstained from any practice which he knew was actually acceptable for him, but capable of posing a bad example for others who were less mature spiritually.
  - type: text
    content: 'weak I became [as the] weak, to win the weak. I have become all things to all men, so that I may by all means [in any and every way] save some [by leading them to faith in Jesus Christ]. '
  '23':
  - type: text
    content: And I do all this for the sake of the gospel, so that I may share in its blessings along with you.
  '24':
  - type: text
    content: ' '
  - type: note
    content: The Isthmian Games, held near Corinth, were among the major athletic competitions of ancient Greece. The Corinthians’ familiarity with this sporting event would have made this passage (vv 24-27) very meaningful to them.
  - type: text
    content: 'Do you not know that in a race all the runners run [their very best to win], but only one receives the prize? Run [your race] in such a way that you may seize the prize '
  - type: text
    content: and
  - type: text
    content: ' make it yours! '
  '25':
  - type: text
    content: 'Now every athlete who [goes into training and] competes in the games is disciplined '
  - type: text
    content: and
  - type: text
    content: ' exercises self-control in all things. They do it to win a '
  - type: note
    content: Lit perishable crown, usually a woven wreath of pine worn as a crown.
  - type: text
    content: 'crown that withers, but we [do it to receive] an imperishable [crown that cannot wither]. '
  '26':
  - type: text
    content: 'Therefore I do not run without a definite goal; I do not flail around like one beating the air [just shadow boxing]. '
  '27':
  - type: text
    content: But [like a boxer] I strictly discipline my body and make it my slave, so that, after I have preached [the gospel] to others, I myself will not somehow be disqualified [as unfit for service].
  '3':
  - type: text
    content: 'This is my defense to those who would put me on trial '
  - type: text
    content: and
  - type: text
    content: ' interrogate me [concerning my authority as an apostle]: '
  '4':
  - type: text
    content: 'Have we not the right to our food and drink [at the expense of the churches]? '
  '5':
  - type: text
    content: 'Have we not the right to take along with us a believing wife, as do the rest of the apostles and the Lord’s brothers and Cephas (Peter)? '
  '6':
  - type: text
    content: 'Or is it only Barnabas and I who have no right to stop doing manual labor [in order to support our ministry]? '
  '7':
  - type: text
    content: '[Consider this:] Who at any time serves as a soldier at his own expense? Who plants a vineyard and does not eat its fruit? Or who tends a flock and does not use the milk of the flock?'
  '8':
  - type: text
    content: 'Do I say these things only from a man’s perspective? Does the Law not endorse the same principles? '
  '9':
  - type: text
    content: For it is written in the Law of Moses, “Y
  - type: heading
    content: ou shall not muzzle an ox while it is treading out the grain
  - type: text
    content: ' [to keep it from eating the grain].” Is it [only] for oxen that God cares? [Deut 25:4] '
