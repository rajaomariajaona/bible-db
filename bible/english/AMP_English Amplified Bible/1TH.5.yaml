document_id: 1TH.5,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Day of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now as to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word here for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: times
        - type: text
          text: ' refers to the length of time (indicating how long one must wait for something), while the word for '
        - type: usfm
          marker: it
          children:
          - type: text
            text: dates
        - type: text
          text: ' refers to the particular time that a significant event will happen.'
      marker-yv: yv-n
    - type: text
      text: 'times and dates, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, you have no need for anything to be written to you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'who died [willingly] for us, so that whether we are awake (alive) or asleep (dead) [at Christ’s appearing], we will live together with Him [sharing eternal life]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore encourage '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' comfort one another and build up one another, just as you are doing.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christian Conduct
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now we ask you, brothers and sisters, to appreciate those who diligently work among you [recognize, acknowledge, and respect your leaders], who are in charge over you in the Lord and who give you instruction, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and [we ask that you appreciate them and] hold them in the highest esteem in love because of their work [on your behalf]. Live in peace with one another. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'We [earnestly] urge you, believers, admonish those who are out of line [the undisciplined, the unruly, the disorderly], encourage the timid [who lack spiritual courage], help the [spiritually] weak, be very patient with everyone [always controlling your temper]. [Is 35:4] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'See that no one repays another with evil for evil, but always seek that which is good for one another and for all people. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rejoice always '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' delight in your faith; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'be unceasing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' persistent in prayer; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'in every situation [no matter what the circumstances] be thankful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' continually give thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to God;
    - type: text
      text: ' for this is the will of God for you in Christ Jesus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Do not quench [subdue, or be unresponsive to the working and guidance of] the [Holy] Spirit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For you yourselves know perfectly well that the day of the [return of the] Lord is coming just as a thief [comes unexpectedly and suddenly] in the night. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Do not scorn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' reject gifts of prophecy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' prophecies [spoken revelations—words of instruction or exhortation or warning]. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But test '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: everyone,
        - type: text
          text: ' that is, anyone claiming to be a prophet.'
      marker-yv: yv-n
    - type: text
      text: 'all things carefully [so you can recognize what is good]. Hold firmly to that which is good. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Abstain from every form of evil [withdraw and keep away from it].
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Now may the God of peace Himself sanctify you through and through [that is, separate you from profane and vulgar things, make you pure and whole and undamaged—consecrated to Him—set apart for His purpose]; and may your spirit and soul and body be kept complete and [be found] blameless at the coming of our Lord Jesus Christ. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' absolutely trustworthy is He who is calling you [to Himself for your salvation], and He will do it [He will fulfill His call by making you holy, guarding you, watching over you, and protecting you as His own].'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Brothers and sisters, pray for us.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Greet all the believers with a holy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Greeting other believers with a kiss on the cheek would be the equivalent of today’s handshake, pat on the back, or casual hug.
      marker-yv: yv-n
    - type: text
      text: 'kiss [as brothers and sisters in God’s family]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'I solemnly charge you by the Lord to have this letter read before all the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: congregation.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The grace of our Lord Jesus Christ be with you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'While they are saying, “Peace and safety [all is well and secure!]” then [in a moment unforeseen] destruction will come upon them suddenly like labor pains on a woman with child, and they will absolutely not escape [for there will be no way to escape the judgment of the Lord]. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers, [all you who believe in Christ as Savior and acknowledge Him as God’s Son] are not in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' darkness [nor held by its power], that the day [of judgment] would overtake you [by surprise] like a thief; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'for you are all sons of light and sons of day. We do not belong to the night nor to darkness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So then let us not sleep [in spiritual indifference] as the rest [of the world does], but let us keep wide awake [alert and cautious] and let us be sober [self-controlled, calm, and wise]. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For those who sleep, sleep at night, and those who are drunk get drunk at night. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But since we [believers] belong to the day, let us be sober, having put on the breastplate of faith and love, and as a helmet, the hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confident assurance of salvation. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For God has not destined us to [incur His] wrath [that is, He did not select us to condemn us], but to obtain salvation through our Lord Jesus Christ, '
