  '1':
  - type: heading
    content: The Day of the Lord
  - type: text
    content: 'Now as to the '
  - type: note
    content: The Greek word here for times refers to the length of time (indicating how long one must wait for something), while the word for dates refers to the particular time that a significant event will happen.
  - type: text
    content: 'times and dates, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers and sisters, you have no need for anything to be written to you. '
  '10':
  - type: text
    content: 'who died [willingly] for us, so that whether we are awake (alive) or asleep (dead) [at Christ’s appearing], we will live together with Him [sharing eternal life]. '
  '11':
  - type: text
    content: 'Therefore encourage '
  - type: text
    content: and
  - type: text
    content: ' comfort one another and build up one another, just as you are doing.'
  - type: heading
    content: Christian Conduct
  '12':
  - type: text
    content: 'Now we ask you, brothers and sisters, to appreciate those who diligently work among you [recognize, acknowledge, and respect your leaders], who are in charge over you in the Lord and who give you instruction, '
  '13':
  - type: text
    content: 'and [we ask that you appreciate them and] hold them in the highest esteem in love because of their work [on your behalf]. Live in peace with one another. '
  '14':
  - type: text
    content: 'We [earnestly] urge you, believers, admonish those who are out of line [the undisciplined, the unruly, the disorderly], encourage the timid [who lack spiritual courage], help the [spiritually] weak, be very patient with everyone [always controlling your temper]. [Is 35:4] '
  '15':
  - type: text
    content: 'See that no one repays another with evil for evil, but always seek that which is good for one another and for all people. '
  '16':
  - type: text
    content: 'Rejoice always '
  - type: text
    content: and
  - type: text
    content: ' delight in your faith; '
  '17':
  - type: text
    content: 'be unceasing '
  - type: text
    content: and
  - type: text
    content: ' persistent in prayer; '
  '18':
  - type: text
    content: 'in every situation [no matter what the circumstances] be thankful '
  - type: text
    content: and
  - type: text
    content: ' continually give thanks '
  - type: text
    content: to God;
  - type: text
    content: ' for this is the will of God for you in Christ Jesus. '
  '19':
  - type: text
    content: 'Do not quench [subdue, or be unresponsive to the working and guidance of] the [Holy] Spirit. '
  '2':
  - type: text
    content: 'For you yourselves know perfectly well that the day of the [return of the] Lord is coming just as a thief [comes unexpectedly and suddenly] in the night. '
  '20':
  - type: text
    content: 'Do not scorn '
  - type: text
    content: or
  - type: text
    content: ' reject gifts of prophecy '
  - type: text
    content: or
  - type: text
    content: ' prophecies [spoken revelations—words of instruction or exhortation or warning]. '
  '21':
  - type: text
    content: 'But test '
  - type: note
    content: Or everyone, that is, anyone claiming to be a prophet.
  - type: text
    content: 'all things carefully [so you can recognize what is good]. Hold firmly to that which is good. '
  '22':
  - type: text
    content: Abstain from every form of evil [withdraw and keep away from it].
  '23':
  - type: text
    content: 'Now may the God of peace Himself sanctify you through and through [that is, separate you from profane and vulgar things, make you pure and whole and undamaged—consecrated to Him—set apart for His purpose]; and may your spirit and soul and body be kept complete and [be found] blameless at the coming of our Lord Jesus Christ. '
  '24':
  - type: text
    content: 'Faithful '
  - type: text
    content: and
  - type: text
    content: ' absolutely trustworthy is He who is calling you [to Himself for your salvation], and He will do it [He will fulfill His call by making you holy, guarding you, watching over you, and protecting you as His own].'
  '25':
  - type: text
    content: Brothers and sisters, pray for us.
  '26':
  - type: text
    content: 'Greet all the believers with a holy '
  - type: note
    content: Greeting other believers with a kiss on the cheek would be the equivalent of today’s handshake, pat on the back, or casual hug.
  - type: text
    content: 'kiss [as brothers and sisters in God’s family]. '
  '27':
  - type: text
    content: 'I solemnly charge you by the Lord to have this letter read before all the '
  - type: note
    content: Lit brethren.
  - type: text
    content: congregation.
  '28':
  - type: text
    content: The grace of our Lord Jesus Christ be with you.
  '3':
  - type: text
    content: 'While they are saying, “Peace and safety [all is well and secure!]” then [in a moment unforeseen] destruction will come upon them suddenly like labor pains on a woman with child, and they will absolutely not escape [for there will be no way to escape the judgment of the Lord]. '
  '4':
  - type: text
    content: 'But you, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers, [all you who believe in Christ as Savior and acknowledge Him as God’s Son] are not in '
  - type: text
    content: spiritual
  - type: text
    content: ' darkness [nor held by its power], that the day [of judgment] would overtake you [by surprise] like a thief; '
  '5':
  - type: text
    content: 'for you are all sons of light and sons of day. We do not belong to the night nor to darkness. '
  '6':
  - type: text
    content: 'So then let us not sleep [in spiritual indifference] as the rest [of the world does], but let us keep wide awake [alert and cautious] and let us be sober [self-controlled, calm, and wise]. '
  '7':
  - type: text
    content: 'For those who sleep, sleep at night, and those who are drunk get drunk at night. '
  '8':
  - type: text
    content: 'But since we [believers] belong to the day, let us be sober, having put on the breastplate of faith and love, and as a helmet, the hope '
  - type: text
    content: and
  - type: text
    content: ' confident assurance of salvation. '
  '9':
  - type: text
    content: 'For God has not destined us to [incur His] wrath [that is, He did not select us to condemn us], but to obtain salvation through our Lord Jesus Christ, '
