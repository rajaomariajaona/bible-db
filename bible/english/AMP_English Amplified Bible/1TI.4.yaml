  - type: text
    content: 'It is for this that we labor and strive [often called to account], because we have fixed our [confident] hope on the living God, who is the '
  - type: note
    content: God is the Savior of all mankind in the sense that Jesus’ sacrifice is sufficient for the entire world (1 John 2:2); however, personal faith is essential for salvation.
  - type: text
