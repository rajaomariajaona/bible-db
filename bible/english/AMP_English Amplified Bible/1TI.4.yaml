document_id: 1TI.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Apostasy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'But the [Holy] Spirit explicitly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' unmistakably declares that in later times some will turn away from the faith, paying attention instead to deceitful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' seductive spirits and doctrines of demons, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'It is for this that we labor and strive [often called to account], because we have fixed our [confident] hope on the living God, who is the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God is the Savior of all mankind in the sense that Jesus’ sacrifice is sufficient for the entire world (1 John 2:2); however, personal faith is essential for salvation.
      marker-yv: yv-n
    - type: text
      text: Savior of all people, especially of those who believe [in Him, recognize Him as the Son of God, and accept Him as Savior and Lord].
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Keep commanding and teaching these things. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let no one look down on [you because of] your youth, but be an example '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' set a pattern for the believers in speech, in conduct, in love, in faith, and in [moral] purity. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Until I come, devote yourself to public reading [of Scripture], to preaching and to teaching [the sound doctrine of God’s word]. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Do not neglect the spiritual gift within you, [that special endowment] which was intentionally bestowed on you [by the Holy Spirit] through prophetic utterance when the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: presbytery
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'elders laid their hands on you [at your ordination]. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Practice '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' work hard on these things; be absorbed in them [completely occupied in your ministry], so that your progress will be evident to all. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Pay close attention to yourself [concentrate on your personal development] and to your teaching; persevere in these things [hold to them], for as you do this you will ensure salvation both for yourself and for those who hear you.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '[misled] by the hypocrisy of liars whose consciences are seared as with a branding iron [leaving them incapable of ethical functioning], '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'who forbid marriage and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: advocate
    - type: text
      text: ' abstaining from [certain kinds of] foods which God has created to be gratefully shared by those who believe and have [a clear] knowledge of the truth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For everything God has created is good, and nothing is to be rejected if it is received with gratitude; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: for it is sanctified [set apart, dedicated to God] by means of the word of God and prayer.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Good Minister’s Discipline
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'If you point out these instructions to the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers and sisters, you will be a good servant of Christ Jesus, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: constantly
    - type: text
      text: ' nourished [through study] on the words of the faith and of the good [Christian] doctrine which you have closely followed. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But have nothing to do with irreverent folklore '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' silly myths. On the other hand, discipline yourself for the purpose of godliness [keeping yourself spiritually fit]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For physical training is of some value, but godliness (spiritual training) is of value in everything '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in every way, since it holds promise for the present life and for the life to come. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'This is a faithful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' trustworthy saying worthy of full acceptance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' approval. '
