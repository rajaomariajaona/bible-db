  '11':
  - type: text
    content: 'Keep commanding and teaching these things. '
  '12':
  - type: text
    content: 'Let no one look down on [you because of] your youth, but be an example '
  - type: text
    content: and
  - type: text
    content: ' set a pattern for the believers in speech, in conduct, in love, in faith, and in [moral] purity. '
  '13':
  - type: text
    content: 'Until I come, devote yourself to public reading [of Scripture], to preaching and to teaching [the sound doctrine of God’s word]. '
  '14':
  - type: text
    content: 'Do not neglect the spiritual gift within you, [that special endowment] which was intentionally bestowed on you [by the Holy Spirit] through prophetic utterance when the '
  - type: note
    content: Or presbytery.
  - type: text
    content: 'elders laid their hands on you [at your ordination]. '
  '15':
  - type: text
    content: 'Practice '
  - type: text
    content: and
  - type: text
    content: ' work hard on these things; be absorbed in them [completely occupied in your ministry], so that your progress will be evident to all. '
  '16':
  - type: text
    content: Pay close attention to yourself [concentrate on your personal development] and to your teaching; persevere in these things [hold to them], for as you do this you will ensure salvation both for yourself and for those who hear you.
  '2':
  - type: text
    content: '[misled] by the hypocrisy of liars whose consciences are seared as with a branding iron [leaving them incapable of ethical functioning], '
  '3':
  - type: text
    content: 'who forbid marriage and '
  - type: text
    content: advocate
  - type: text
    content: ' abstaining from [certain kinds of] foods which God has created to be gratefully shared by those who believe and have [a clear] knowledge of the truth. '
  '4':
  - type: text
    content: 'For everything God has created is good, and nothing is to be rejected if it is received with gratitude; '
  '5':
  - type: text
    content: for it is sanctified [set apart, dedicated to God] by means of the word of God and prayer.
  - type: heading
