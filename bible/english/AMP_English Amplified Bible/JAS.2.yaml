  - type: text
    content: ' [by God] '
  - type: heading
    content: as righteousness
  - type: text
    content: ' '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: heading
    content: as conformity to
  - type: text
    content: ' H'
  - type: heading
    content: is will
  - type: text
    content: ',” and he was called the friend of God. [Gen 15:6; 2 Chr 20:7; Is 41:8] '
  '24':
  - type: text
    content: 'You see that a man (believer) is justified by works and not by faith alone [that is, by acts of obedience a born-again believer reveals his faith]. '
  '25':
  - type: text
    content: 'In the same way, was Rahab the prostitute not justified by works too, when she received the [Hebrew] '
  - type: note
    content: Lit messengers.
  - type: text
    content: 'spies as guests '
  - type: text
    content: and
  - type: text
    content: ' protected them, and sent them away [to escape] by a different route? [Josh 2:1-21] '
  '26':
  - type: text
    content: For just as the [human] body without the spirit is dead, so faith without works [of obedience] is also dead.
  '3':
  - type: text
    content: 'and you pay special attention to the one who wears the '
  - type: note
    content: Lit brightly shining.
  - type: text
    content: 'fine clothes, and say to him, “You sit here in this good seat,” and you tell the poor man, “You stand over there, or sit down [on the floor] by my footstool,” '
  '4':
  - type: text
    content: 'have you not discriminated among yourselves, and become judges with wrong motives? '
  '5':
  - type: text
    content: 'Listen, my beloved brothers and sisters: has not God chosen the poor of this world to be rich in faith and [as believers to be] heirs of the kingdom which He promised to those who love Him? '
  '6':
  - type: text
    content: 'But you [in contrast] have dishonored the poor man. Is it not the rich who oppress '
  - type: text
    content: and
  - type: text
    content: ' exploit you, and personally drag you into the courts of law? '
  '7':
  - type: text
    content: 'Do they not blaspheme the '
  - type: note
    content: Lit good.
  - type: text
    content: precious name [of Christ] by which you are called?
  '8':
  - type: text
    content: If, however, you are [really] fulfilling the royal law according to the Scripture, “Y
  - type: heading
    content: ou shall love your neighbor as yourself
  - type: text
    content: ' [that is, if you have an unselfish concern for others and do things for their benefit]” you are doing well. [Lev 19:18] '
  '9':
  - type: text
    content: 'But if you show partiality [prejudice, favoritism], you are committing sin and are convicted by the Law as offenders. '
