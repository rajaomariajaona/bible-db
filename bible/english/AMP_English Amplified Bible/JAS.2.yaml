  - type: heading
    content: The Sin of Partiality
  - type: text
    content: 'My fellow believers, do not practice your faith in our glorious Lord Jesus Christ with '
  - type: text
    content: an attitude
  - type: text
    content: ' of partiality [toward people—show no favoritism, no prejudice, no snobbery]. '
  '10':
  - type: text
    content: 'For whoever keeps the whole Law but stumbles in one '
  - type: text
    content: point,
  - type: text
    content: ' he has become guilty of [breaking] all of it. '
  '11':
  - type: text
    content: For He who said, “D
  - type: heading
    content: o not commit adultery
  - type: text
    content: ',” also said, “D'
  - type: heading
    content: o not murder
  - type: text
    content: '.” Now if you do not commit adultery, but you murder, you have become '
  - type: note
    content: Lit a transgressor of Law.
  - type: text
    content: 'guilty of transgressing the [entire] Law. [Ex 20:13, 14; Deut 5:17, 18] '
  '12':
  - type: text
    content: 'Speak and act [consistently] as people who are going to be judged by the law of liberty [that moral law that frees obedient Christians from the bondage of sin]. '
  '13':
  - type: text
    content: 'For judgment '
  - type: text
    content: will be
  - type: text
    content: ' merciless to one who has shown no mercy; but [to the one who has shown mercy] mercy triumphs [victoriously] over judgment.'
  - type: heading
    content: Faith and Works
  '14':
  - type: text
    content: 'What is the benefit, my fellow believers, if someone claims to have faith but has no [good] works [as evidence]? Can that [kind of] faith save him? [No, a mere claim of faith is not sufficient—genuine faith produces good works.] '
  '15':
  - type: text
    content: 'If a brother or sister is without [adequate] clothing and lacks [enough] food for each day, '
  '16':
  - type: text
    content: 'and one of you says to them, “Go in peace [with my blessing], [keep] warm and feed yourselves,” but he does not give them the necessities for the body, what good does that do? '
  '17':
  - type: text
    content: So too, faith, if it does not have works [to back it up], is by itself dead [inoperative and ineffective].
  '18':
  - type: text
    content: 'But someone may say, “You [claim to] have faith and I have [good] works; show me your [alleged] faith without the works [if you can], and I will show you my faith by my works [that is, by what I do].” '
  '19':
  - type: text
    content: 'You believe that '
  - type: note
    content: A reference to the Shema, the Jewish confession of faith.
  - type: text
    content: 'God is one; you do well [to believe that]. The demons also believe [that], and shudder '
  - type: text
    content: and
  - type: text
    content: ' bristle [in awe-filled terror—they have seen His wrath]! [Deut 6:4; 11:13-21; Mark 12:29] '
  '2':
  - type: text
    content: 'For if a man comes into your '
  - type: note
    content: Lit synagogue. This word comes directly from the Greek for “gather together,” and in the present context might refer in particular to a synagogue where Christians were allowed to meet.
  - type: text
    content: 'meeting place '
  - type: note
    content: In the Greco-Roman world men wore simple clothing and no jewelry except for a ring. The wealthy were distinguished by the cleanliness of their clothes and a gold signet ring.
  - type: text
    content: 'wearing a gold ring and '
  - type: note
    content: Lit brightly shining.
  - type: text
    content: 'fine clothes, and a poor man in dirty clothes also comes in, '
  '20':
  - type: text
    content: 'But are you willing to recognize, you foolish [spiritually shallow] person, that faith without [good] works is useless? '
  '21':
  - type: text
    content: 'Was our father Abraham not [shown to be] justified by works [of obedience which expressed his faith] when he offered Isaac his son on the altar [as a sacrifice to God]? [Gen 22:1-14] '
  '22':
  - type: text
    content: 'You see that [his] faith was working together with his works, and as a result of the works, his faith was completed [reaching its maturity when he expressed his faith through obedience]. '
  '23':
  - type: text
    content: And the Scripture was fulfilled which says, “A
  - type: heading
    content: braham believed
  - type: text
    content: ' G'
  - type: heading
    content: od
  - type: text
    content: ', '
  - type: heading
    content: and this
  - type: text
    content: ' [faith] '
  - type: heading
