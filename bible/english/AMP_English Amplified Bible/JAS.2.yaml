    - type: text
      text: The Sin of Partiality
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My fellow believers, do not practice your faith in our glorious Lord Jesus Christ with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an attitude
  - type: text
    text: ' of partiality [toward people—show no favoritism, no prejudice, no snobbery]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if a man comes into your '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: synagogue.
      - type: text
        text: ' This word comes directly from the Greek for “gather together,” and in the present context might refer in particular to a synagogue where Christians were allowed to meet.'
    marker-yv: yv-n
  - type: text
    text: 'meeting place '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the Greco-Roman world men wore simple clothing and no jewelry except for a ring. The wealthy were distinguished by the cleanliness of their clothes and a gold signet ring.
    marker-yv: yv-n
  - type: text
    text: 'wearing a gold ring and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brightly shining
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fine clothes, and a poor man in dirty clothes also comes in, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and you pay special attention to the one who wears the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brightly shining
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'fine clothes, and say to him, “You sit here in this good seat,” and you tell the poor man, “You stand over there, or sit down [on the floor] by my footstool,” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'have you not discriminated among yourselves, and become judges with wrong motives? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Listen, my beloved brothers and sisters: has not God chosen the poor of this world to be rich in faith and [as believers to be] heirs of the kingdom which He promised to those who love Him? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But you [in contrast] have dishonored the poor man. Is it not the rich who oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' exploit you, and personally drag you into the courts of law? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do they not blaspheme the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: good
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: precious name [of Christ] by which you are called?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If, however, you are [really] fulfilling the royal law according to the Scripture, “Y
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ou shall love your neighbor as yourself
  - type: text
    text: ' [that is, if you have an unselfish concern for others and do things for their benefit]” you are doing well. [Lev 19:18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But if you show partiality [prejudice, favoritism], you are committing sin and are convicted by the Law as offenders. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For whoever keeps the whole Law but stumbles in one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: point,
  - type: text
    text: ' he has become guilty of [breaking] all of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For He who said, “D
  - type: usfm
    marker: sc
    children:
    - type: text
      text: o not commit adultery
  - type: text
    text: ',” also said, “D'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: o not murder
  - type: text
    text: '.” Now if you do not commit adultery, but you murder, you have become '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a transgressor of Law
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'guilty of transgressing the [entire] Law. [Ex 20:13, 14; Deut 5:17, 18] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Speak and act [consistently] as people who are going to be judged by the law of liberty [that moral law that frees obedient Christians from the bondage of sin]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For judgment '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will be
  - type: text
    text: ' merciless to one who has shown no mercy; but [to the one who has shown mercy] mercy triumphs [victoriously] over judgment.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Faith and Works
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'What is the benefit, my fellow believers, if someone claims to have faith but has no [good] works [as evidence]? Can that [kind of] faith save him? [No, a mere claim of faith is not sufficient—genuine faith produces good works.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If a brother or sister is without [adequate] clothing and lacks [enough] food for each day, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and one of you says to them, “Go in peace [with my blessing], [keep] warm and feed yourselves,” but he does not give them the necessities for the body, what good does that do? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So too, faith, if it does not have works [to back it up], is by itself dead [inoperative and ineffective].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But someone may say, “You [claim to] have faith and I have [good] works; show me your [alleged] faith without the works [if you can], and I will show you my faith by my works [that is, by what I do].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You believe that '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A reference to the '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shema,
      - type: text
        text: ' the Jewish confession of faith.'
    marker-yv: yv-n
  - type: text
    text: 'God is one; you do well [to believe that]. The demons also believe [that], and shudder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bristle [in awe-filled terror—they have seen His wrath]! [Deut 6:4; 11:13-21; Mark 12:29] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But are you willing to recognize, you foolish [spiritually shallow] person, that faith without [good] works is useless? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Was our father Abraham not [shown to be] justified by works [of obedience which expressed his faith] when he offered Isaac his son on the altar [as a sacrifice to God]? [Gen 22:1-14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You see that [his] faith was working together with his works, and as a result of the works, his faith was completed [reaching its maturity when he expressed his faith through obedience]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And the Scripture was fulfilled which says, “A
  - type: usfm
    marker: sc
    children:
    - type: text
      text: braham believed
  - type: text
    text: ' G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: and this
  - type: text
    text: ' [faith] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: was credited to him
  - type: text
    text: ' [by God] '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: as righteousness
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: as conformity to
  - type: text
    text: ' H'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: is will
  - type: text
    text: ',” and he was called the friend of God. [Gen 15:6; 2 Chr 20:7; Is 41:8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You see that a man (believer) is justified by works and not by faith alone [that is, by acts of obedience a born-again believer reveals his faith]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In the same way, was Rahab the prostitute not justified by works too, when she received the [Hebrew] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: messengers
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'spies as guests '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' protected them, and sent them away [to escape] by a different route? [Josh 2:1-21] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For just as the [human] body without the spirit is dead, so faith without works [of obedience] is also dead.
