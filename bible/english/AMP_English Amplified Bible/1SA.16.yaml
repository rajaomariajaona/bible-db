document_id: 1SA.16,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Samuel Goes to Bethlehem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Samuel, “How long will you grieve for Saul, when I have rejected him as king over Israel? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Samuel’s horn was a receptacle for olive oil, which he would use to anoint a new king.
      marker-yv: yv-n
    - type: text
      text: 'Fill your horn with oil and go; I will send you to Jesse the Bethlehemite, for I have chosen a king for Myself among his sons.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Jesse had seven of his sons pass before Samuel. But Samuel said to Jesse, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not chosen [any of] these.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Samuel said to Jesse, “Are all your sons here?” Jesse replied, “There is still one left, the youngest; he is tending the sheep.” Samuel said to Jesse, “Send '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and bring him; because we will not sit down [to eat the sacrificial meal] until he comes here.”'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: David Anointed
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So Jesse sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' and brought him in. Now he had a ruddy complexion, with beautiful eyes and a handsome appearance. The L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said [to Samuel], “Arise, anoint him; for this is he.” '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then Samuel took the horn of oil and anointed David in the presence of his brothers; and the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came mightily upon David from that day forward. And Samuel arose and went to Ramah.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Now the Spirit of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' departed from Saul, and an evil spirit from the Lord tormented '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terrified him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Saul’s servants said to him, “Behold, an evil spirit from God is tormenting you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Let our lord now command your servants who are here before you to find a man who plays skillfully on the harp; and when the evil spirit from God is on you, he shall play '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the harp
    - type: text
      text: ' with his hand, and you will be well.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So Saul told his servants, “Find me a man who plays well and bring him to me.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'One of the young men said, “Behold, I have seen a son of Jesse the Bethlehemite who is a skillful musician, a brave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' competent man, a warrior, discerning (prudent, eloquent) in speech, and a handsome man; and the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is with him.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Saul sent messengers to Jesse and said, “Send me David your son, who is with the flock.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But Samuel said, “How can I go? When Saul hears '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about it
    - type: text
      text: ', he will kill me.” And the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, “Take a heifer from the herd with you and say, ‘I have come to sacrifice to the Lord.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jesse took a donkey [loaded with] bread and a jug of wine and a young goat, and sent them to Saul with David his son. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then David came to Saul and attended him. Saul loved him greatly and [later] David became his armor bearer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Saul sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: word
    - type: text
      text: ' to Jesse, saying, “Please let David '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: stand before me
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'be my attendant, for he has found favor in my sight.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So it came about that whenever the [evil] spirit from God was on Saul, David took a harp and played it with his hand; so Saul would be refreshed and be well, and the evil spirit would leave him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'You shall invite Jesse to the sacrifice, and I will show you what you shall do [after that]; and you shall anoint for Me the one whom I designate.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Samuel did what the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said, and came to Bethlehem. And the elders of the city came trembling to meet him and said, “Do you come in peace?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And he said, “In peace; I have come to sacrifice to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . Consecrate yourselves and come with me to the sacrifice.” He also consecrated Jesse and his sons and invited them to the sacrifice.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So it happened, when they had come, he looked at Eliab [the eldest son] and thought, “Surely the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ’
    - type: usfm
      marker: sc
      children:
      - type: text
        text: s
    - type: text
      text: ' anointed is before Him.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Samuel, “Do not look at his appearance or at the height of his stature, because I have rejected him. For the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' sees not as man sees; for man looks '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: with the eyes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: at the outward appearance, but the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' looks at the heart.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then Jesse called Abinadab and had him pass before Samuel. But Samuel said, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not chosen this one either.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Next Jesse had Shammah pass by. And Samuel said, “The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has not chosen him either.” '
