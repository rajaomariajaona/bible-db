document_id: 1SA.16,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel Goes to Bethlehem
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' said to Samuel, “How long will you grieve for Saul, when I have rejected him as king over Israel? '
  - type: note
    content: Samuel’s horn was a receptacle for olive oil, which he would use to anoint a new king.
  - type: text
    content: 'Fill your horn with oil and go; I will send you to Jesse the Bethlehemite, for I have chosen a king for Myself among his sons.” '
  '10':
  - type: text
    content: Jesse had seven of his sons pass before Samuel. But Samuel said to Jesse, “The L
  - type: heading
    content: ord
  - type: text
    content: ' has not chosen [any of] these.” '
  '11':
  - type: text
    content: 'Then Samuel said to Jesse, “Are all your sons here?” Jesse replied, “There is still one left, the youngest; he is tending the sheep.” Samuel said to Jesse, “Send '
  - type: text
    content: word
  - type: text
    content: ' and bring him; because we will not sit down [to eat the sacrificial meal] until he comes here.”'
  - type: heading
    content: David Anointed
  '12':
  - type: text
    content: 'So Jesse sent '
  - type: text
    content: word
  - type: text
    content: ' and brought him in. Now he had a ruddy complexion, with beautiful eyes and a handsome appearance. The L'
  - type: heading
    content: ord
  - type: text
    content: ' said [to Samuel], “Arise, anoint him; for this is he.” '
  '13':
  - type: text
    content: Then Samuel took the horn of oil and anointed David in the presence of his brothers; and the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' came mightily upon David from that day forward. And Samuel arose and went to Ramah.'
  '14':
  - type: text
    content: Now the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' departed from Saul, and an evil spirit from the Lord tormented '
  - type: text
    content: and
  - type: text
    content: ' terrified him. '
  '15':
  - type: text
    content: 'Saul’s servants said to him, “Behold, an evil spirit from God is tormenting you. '
  '16':
  - type: text
    content: 'Let our lord now command your servants who are here before you to find a man who plays skillfully on the harp; and when the evil spirit from God is on you, he shall play '
  - type: text
    content: the harp
  - type: text
    content: ' with his hand, and you will be well.” '
  '17':
  - type: text
    content: 'So Saul told his servants, “Find me a man who plays well and bring him to me.” '
  '18':
  - type: text
    content: 'One of the young men said, “Behold, I have seen a son of Jesse the Bethlehemite who is a skillful musician, a brave '
  - type: text
    content: and
  - type: text
    content: ' competent man, a warrior, discerning (prudent, eloquent) in speech, and a handsome man; and the L'
  - type: heading
    content: ord
  - type: text
    content: ' is with him.” '
  '19':
  - type: text
    content: 'So Saul sent messengers to Jesse and said, “Send me David your son, who is with the flock.” '
  '2':
  - type: text
    content: 'But Samuel said, “How can I go? When Saul hears '
  - type: text
    content: about it
  - type: text
    content: ', he will kill me.” And the L'
  - type: heading
    content: ord
  - type: text
    content: ' said, “Take a heifer from the herd with you and say, ‘I have come to sacrifice to the Lord.’ '
  '20':
  - type: text
    content: 'Jesse took a donkey [loaded with] bread and a jug of wine and a young goat, and sent them to Saul with David his son. '
  '21':
  - type: text
    content: 'Then David came to Saul and attended him. Saul loved him greatly and [later] David became his armor bearer. '
  '22':
  - type: text
    content: 'Saul sent '
  - type: text
    content: word
  - type: text
    content: ' to Jesse, saying, “Please let David '
  - type: note
    content: Lit stand before me.
  - type: text
    content: 'be my attendant, for he has found favor in my sight.” '
  '23':
  - type: text
    content: So it came about that whenever the [evil] spirit from God was on Saul, David took a harp and played it with his hand; so Saul would be refreshed and be well, and the evil spirit would leave him.
  '3':
  - type: text
    content: 'You shall invite Jesse to the sacrifice, and I will show you what you shall do [after that]; and you shall anoint for Me the one whom I designate.” '
  '4':
  - type: text
    content: So Samuel did what the L
  - type: heading
    content: ord
  - type: text
    content: ' said, and came to Bethlehem. And the elders of the city came trembling to meet him and said, “Do you come in peace?” '
  '5':
  - type: text
    content: And he said, “In peace; I have come to sacrifice to the L
  - type: heading
    content: ord
  - type: text
    content: . Consecrate yourselves and come with me to the sacrifice.” He also consecrated Jesse and his sons and invited them to the sacrifice.
  '6':
  - type: text
    content: So it happened, when they had come, he looked at Eliab [the eldest son] and thought, “Surely the L
  - type: heading
    content: ord
  - type: text
    content: ’
  - type: heading
    content: s
  - type: text
    content: ' anointed is before Him.” '
  '7':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Samuel, “Do not look at his appearance or at the height of his stature, because I have rejected him. For the L'
  - type: heading
    content: ord
  - type: text
    content: ' sees not as man sees; for man looks '
  - type: note
    content: Lit with the eyes.
  - type: text
    content: at the outward appearance, but the L
  - type: heading
    content: ord
  - type: text
    content: ' looks at the heart.” '
  '8':
  - type: text
    content: Then Jesse called Abinadab and had him pass before Samuel. But Samuel said, “The L
  - type: heading
    content: ord
  - type: text
    content: ' has not chosen this one either.” '
  '9':
  - type: text
    content: Next Jesse had Shammah pass by. And Samuel said, “The L
  - type: heading
    content: ord
  - type: text
    content: ' has not chosen him either.” '
