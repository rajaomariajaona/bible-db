document_id: NUM.17,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Aaron’s Rod Buds
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses, “Put Aaron’s rod back before the Testimony [in the ark], to be kept as a [warning] sign for the rebellious '
  - type: text
    content: and
  - type: text
    content: ' contentious, so that you may put an end to their murmurings [of discontent] against Me, so that they do not die.” '
  '11':
  - type: text
    content: And Moses did so; just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded him, so he did.'
  '12':
  - type: text
    content: 'The sons of Israel said to Moses, “Look, we perish, we are doomed, all doomed! '
  '13':
  - type: text
    content: Everyone who approaches, who approaches the tabernacle of the L
  - type: heading
    content: ord
  - type: text
    content: ', must die. Are we to perish completely?”'
  '2':
  - type: text
    content: '“Speak to the sons of Israel and get rods from them, a rod for each father’s household, from all their leaders according to their fathers’ households, twelve rods. Write every man’s name on his rod, '
  '3':
  - type: text
    content: 'and write Aaron’s name on the rod of Levi [his ancestor]; for there is one rod for the head of each of their fathers’ households. '
  '4':
  - type: text
    content: 'You shall then deposit them in the Tent of Meeting (tabernacle) in front of [the ark of] the Testimony, where I meet with you. '
  '5':
  - type: text
    content: 'It shall be that the rod of the man whom I choose will bud, and I will no longer hear the constant grumblings of the Israelites, who are grumbling against you.” '
  '6':
  - type: text
    content: 'So Moses spoke to the Israelites, and each of their leaders gave him a rod, one for each leader according to their fathers’ households, twelve rods, and the rod of Aaron was among their rods. '
  '7':
  - type: text
    content: So Moses deposited the rods before the L
  - type: heading
    content: ord
  - type: text
    content: ' in the Tent of the Testimony (tabernacle).'
  '8':
  - type: text
    content: 'Now on the next day Moses went into the Tent of the Testimony, and '
  - type: note
    content: Once again God confirmed before the people His choice of Aaron as high priest and the significance of the tribe of Levi.
  - type: text
    content: 'the rod of Aaron of the tribe of Levi had sprouted and put out buds and produced blossoms and yielded [ripe] almonds. '
  '9':
  - type: text
    content: Moses brought out all the rods from the presence of the L
  - type: heading
    content: ord
  - type: text
    content: ' to all the Israelites; and they looked, and each man took his rod. '
