document_id: NUM.17,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aaron’s Rod Buds
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' said to Moses, “Put Aaron’s rod back before the Testimony [in the ark], to be kept as a [warning] sign for the rebellious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' contentious, so that you may put an end to their murmurings [of discontent] against Me, so that they do not die.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And Moses did so; just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded him, so he did.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The sons of Israel said to Moses, “Look, we perish, we are doomed, all doomed! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Everyone who approaches, who approaches the tabernacle of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', must die. Are we to perish completely?”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the sons of Israel and get rods from them, a rod for each father’s household, from all their leaders according to their fathers’ households, twelve rods. Write every man’s name on his rod, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and write Aaron’s name on the rod of Levi [his ancestor]; for there is one rod for the head of each of their fathers’ households. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'You shall then deposit them in the Tent of Meeting (tabernacle) in front of [the ark of] the Testimony, where I meet with you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It shall be that the rod of the man whom I choose will bud, and I will no longer hear the constant grumblings of the Israelites, who are grumbling against you.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So Moses spoke to the Israelites, and each of their leaders gave him a rod, one for each leader according to their fathers’ households, twelve rods, and the rod of Aaron was among their rods. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So Moses deposited the rods before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the Tent of the Testimony (tabernacle).'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now on the next day Moses went into the Tent of the Testimony, and '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Once again God confirmed before the people His choice of Aaron as high priest and the significance of the tribe of Levi.
      marker-yv: yv-n
    - type: text
      text: 'the rod of Aaron of the tribe of Levi had sprouted and put out buds and produced blossoms and yielded [ripe] almonds. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Moses brought out all the rods from the presence of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to all the Israelites; and they looked, and each man took his rod. '
