  - type: text
    content: Are like Mount Zion, which cannot be moved but remains forever.
  '2':
  - type: text
    content: As the mountains surround Jerusalem,
  - type: text
    content: So the L
  - type: heading
    content: ord
  - type: text
    content: ' surrounds His people'
  - type: text
