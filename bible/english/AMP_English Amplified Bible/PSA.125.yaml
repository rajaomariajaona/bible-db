  '3':
  - type: text
    content: For the scepter of wickedness shall not rest on the land of the righteous,
  - type: text
    content: So that the righteous will not reach out their hands to do wrong.
  '4':
  - type: text
    content: ¶Do good, O L
  - type: heading
    content: ord
  - type: text
    content: ', to those who are good'
  - type: text
    content: And to those who are upright in their hearts.
  '5':
  - type: text
    content: But as for those who turn aside to their crooked ways [in unresponsiveness to God],
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' will lead them away with those who do evil.'
  - type: text
    content: Peace be upon Israel.
