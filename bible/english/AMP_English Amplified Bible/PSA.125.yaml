    text: ¶Do good, O L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', to those who are good'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to those who are upright in their hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But as for those who turn aside to their crooked ways [in unresponsiveness to God],
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' will lead them away with those who do evil.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peace be upon Israel.
