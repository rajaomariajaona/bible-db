document_id: EZK.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Evil Rulers to Be Judged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Moreover, the Spirit lifted me up and brought me to the gate of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' house, which faced eastward. And behold, at the entrance of the gate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there were
  - type: text
    text: ' twenty-five men; and I saw among them Jaazaniah the son of Azzur and Pelatiah the son of Benaiah, princes of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the Spirit said to me, “Son of man, these are the men who devise evil and give wicked advice in this city, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'who say, ‘Is not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the time
  - type: text
    text: ' near to build houses? This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: city
  - type: text
    text: ' is [secure just like] the pot and we are the meat [in it].’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Therefore, prophesy against them; prophesy, son of man!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' fell upon me, and He said to me, “Say, ‘Thus says the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ', “This is what you think, house of Israel, for I know your thoughts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You have multiplied your slain in this city, and you have filled its streets with the corpses [of righteous men].” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore, thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Your dead whom you have laid in the midst of your city are the meat and this city is the pot; but I shall force you out of [the security of] it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have feared the sword; so I will bring a sword upon you,” says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“And I will bring you out of the midst of the city and hand you over to strangers and execute judgment against you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You will fall by the sword; I will judge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' punish you [in front of your neighbors] at the border of [the land of] Israel; and you will know [without any doubt] that I am the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: city
  - type: text
    text: ' will not be a pot for you, nor will you be meat [safe] in it, but I will judge you at the border of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And you will know [without any doubt] that I am the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ; for you have not walked in My statutes nor have you executed My ordinances, but you have acted in accordance with the ordinances of the nations around you.” ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now it came about while I was prophesying, that Pelatiah the son of Benaiah died. Then I fell face downward and cried out loudly, “Alas, Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: '! Will You bring the remnant of Israel to a complete end?”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Promise of Restoration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' came to me, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Son of man, your brothers, your relatives, your fellow exiles and the whole house of Israel, all of them, are those to whom the [present] inhabitants of Jerusalem have said, ‘Go far away from the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '; this land has been given to us as a possession.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “Though I had removed Israel far away among the nations and though I had scattered them among the countries, yet I have been a sanctuary for them for a little while in the countries to which they had gone.” ’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore say, ‘Thus says the Lord G
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: ', “I will gather you from the peoples and assemble you out of the countries where you have been scattered, and I will give [back] to you the land of Israel.” ’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When they return there, they will remove from it all [traces of] its detestable things and all its repulsive things (remnants of paganism). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And I will give them one heart [a new heart], and put a new spirit within them. I will take from them the heart of stone, and will give them a heart of flesh [that is responsive to My touch], [Ezek 18:31; 36:26; 2 Cor 3:3] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'that they may walk in My statutes and keep My ordinances and do them. Then they shall be My people, and I will be their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But as for those whose heart longs for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' follows after their detestable things and their repulsive things [associated with idolatry], on their own head I will repay [them in full for] their [vile] conduct,” says the Lord G'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: od
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the cherubim lifted up their wings with the wheels beside them, and the [Shekinah] glory of the God of Israel hovered over them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then the glory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' brilliance of the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' went up from the midst of the city and paused over the mountain, [the Mount of Olives] which is east of the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And the Spirit lifted me up and brought me in a vision by the Spirit of God to the exiles in Chaldea (Babylonia). Then the vision that I had seen left me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then I told the exiles everything that the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' had shown me.'
