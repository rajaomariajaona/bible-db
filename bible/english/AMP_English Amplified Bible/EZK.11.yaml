  '18':
  - type: text
    content: 'When they return there, they will remove from it all [traces of] its detestable things and all its repulsive things (remnants of paganism). '
  '19':
  - type: text
    content: 'And I will give them one heart [a new heart], and put a new spirit within them. I will take from them the heart of stone, and will give them a heart of flesh [that is responsive to My touch], [Ezek 18:31; 36:26; 2 Cor 3:3] '
  '2':
