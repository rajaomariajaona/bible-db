document_id: EZK.1,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Vision of Four Figures
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came about [when I was] in my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: If he had not been in exile in Babylonia Ezekiel would have formally begun his service to God as a Levitical priest at the age of thirty. Instead God anointed him to serve as a prophet.
      marker-yv: yv-n
    - type: text
      text: 'thirtieth year [of life], on the fifth day of the fourth month, while I was among the exiles beside the River Chebar [in Babylonia], the heavens were opened and I saw visions of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regarding the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Various interpretations have been ascribed to the symbolism of the four heavenly beings. The four faces may be regarded as symbolic of “the four portraits of Jesus” as given in the four Gospels (king, servant, man, and God). Another proposes that they represent the four qualities of the angels (intelligent, strong, servile, and swift). Another interpretation identifies them with the four Gospels, and another with the four corners of the earth, implying that the angels serve God throughout the earth. In ch 10 these beings are identified as cherubim.
      marker-yv: yv-n
    - type: text
      text: 'form '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appearance of their faces: they [each] had the face of a man [in front], and each had the face of a lion on the right side, and the face of an ox on the left side; all four also had the face of an eagle [at the back of their heads]. [Rev 4:7] '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such were their faces. Their wings were stretched out upward; two [wings] of each one were touching another [the wings of the beings on either side of it], and [the remaining] two [wings of each being] were covering their bodies. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And each went straight forward; wherever the spirit was about to go, they would go, without turning as they went. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Among the living beings there was something that looked like burning coals of fire, like torches moving back and forth among the living beings. The fire was bright, and lightning was flashing from the fire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the living beings moved rapidly back and forth like flashes of lightning.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as I looked at the living beings, I saw one wheel on the ground beside the living beings, for each of the four of them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regarding the appearance of the wheels and their construction: they gleamed like chrysolite (beryl, olivine); and the four were made alike. Their appearance and construction were a wheel [set at a right angle] within a wheel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever they moved, they went in any [one] of their four directions without turning as they moved. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Regarding their rims: they were so high that they were awesome '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' dreadful, and the rims of all four of them were full of eyes all around. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the living beings moved, the wheels moved with them; and when the living beings rose from the earth, the wheels rose also. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(On the fifth of the month, which was in the fifth year of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jehoiachin the king of Judah was taken captive when Nebuchadnezzar and his army invaded Jerusalem. Nebuchadnezzar II of the Chaldean Dynasty, more commonly known as Nebuchadnezzar the Great, ruled Babylon from 605-562 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '. He conquered Jerusalem in 597 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'King Jehoiachin’s captivity, [2 Kin 24:12-14] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wherever the spirit went, the beings went in that direction. And the wheels rose along with them; for the spirit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' life of the living beings was in the wheels. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whenever those went, these went; and whenever those came to a stop, these came to a stop; and whenever those rose from the earth, the wheels rose close beside them, for the spirit of the living beings was in the wheels.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vision of Divine Glory
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now stretched over the heads of the living beings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' something like an expanse, looking like the terrible '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' awesome shimmer of icy crystal. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Under the expanse their wings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were stretched out
    - type: text
      text: ' straight, one toward another. Every living being had two wings which covered its body on one side and on the other side. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they moved, I also heard the sound of their wings like the sound of great [rushing] waters, like the voice of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Heb '
        - type: usfm
          marker: it
          children:
          - type: text
            text: Shaddai
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the Almighty, the sound of tumult like the noise of an army camp. Whenever they came to a stop, they lowered their wings. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And there was a voice above the expanse that was over their heads; whenever they stopped, they lowered their wings.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now above the expanse that was over their heads there was something resembling a throne, it appeared like [it was made of] sapphire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' lapis lazuli; and [seated] on that which looked like a throne, high up, was a figure with the appearance of a man. [Phil 2:5-8] '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now upward, from that which appeared to be His waist, I saw something like glowing metal that looked like it was filled with fire all around it; and downward, from that which appeared to be His waist, I saw something like fire; and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' a brightness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a remarkable radiance [like a halo] around Him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the appearance of the rainbow in the clouds on a rainy day, so was the appearance of the surrounding radiance. This was the appearance of the likeness of the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . And when I saw it, I fell face downward and I heard a voice of One speaking. [Rev 4:3]
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came expressly to Ezekiel the priest, the son of Buzi, in the land of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Chaldeans dominated and ruled Babylonia from 625 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '., until their empire fell in 539 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: '., but they were known as early as 1000 '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b
        - type: text
          text: .
        - type: usfm
          marker: sc
          children:
          - type: text
            text: c
        - type: text
          text: . as an aggressive, tribal people in the southern region of Babylonia. They were highly skilled in both the science of astronomy and the pseudo-science of astrology. They kept meticulous records of celestial motion and correctly calculated the length of a year to within just a few minutes. Babylon, their capital city, was the center of trade and learning in the western part of Asia. The classical literature of the Chaldeans was written in cuneiform, but the common language, both written and spoken in Babylon, was Akkadian increasingly influenced by Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'Chaldeans by the River '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A canal off the Euphrates, south of Babylon.
      marker-yv: yv-n
    - type: text
      text: Chebar; and the hand of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came upon him there.) [1 Kin 18:46; 2 Kin 3:15]'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As I looked, I saw a stormy wind coming out of the north, a great cloud with fire flashing continually from it; and a brightness was around it, and in its core [there was] something like glowing [amber-colored] metal in the midst of the fire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Within it there were figures resembling '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These four angelic beings are identified as cherubim in ch 10. In Scripture, the cherubim seem to be related to the affirmation of God’s perfection and holiness standing in stark contrast to the debased character of godless mankind. They are extremely intelligent, powerful, expeditious servants of God.
      marker-yv: yv-n
    - type: text
      text: 'four living beings. And this was their appearance: they had human form. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each one had four faces and four wings. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their legs were straight and the soles of their feet were like a calf’s hoof, and they sparkled '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' gleamed like shiny bronze. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Under their wings on their four sides they had human hands. As for the faces and wings of the four of them, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'their wings touched one another; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their faces
    - type: text
      text: ' did not turn when they moved, each went straight forward. '
