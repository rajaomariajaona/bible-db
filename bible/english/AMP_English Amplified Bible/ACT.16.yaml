document_id: ACT.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Macedonian Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Paul traveled to Derbe and also to Lystra. A disciple named Timothy was there, the son of a Jewish woman who was a believer [in Christ], however, his father was a Greek. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Timothy was well spoken of by the brothers and sisters who were in Lystra and Iconium. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul wanted Timothy to go with him [as a missionary]; and he took him and circumcised him because of the Jews who were in those places, since they all knew that his father was a Greek. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As they traveled from town to town, they delivered the decrees decided on by the apostles and elders who were in Jerusalem, for the churches to observe. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the churches were strengthened in the faith, and they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: continually
  - type: text
    text: ' increased in number day after day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now they passed through the territory of Phrygia and Galatia, after being forbidden by the Holy Spirit to speak the word in [the west coast province of] Asia [Minor]; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and after they came to Mysia, they tried to go into Bithynia, but the Spirit of Jesus did not permit them; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'so passing by Mysia, they went down to Troas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then a vision appeared to Paul in the night: a man from [the Roman province of] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Northern Greece.
    marker-yv: yv-n
  - type: text
    text: 'Macedonia was standing and pleading with him, saying, “Come over to Macedonia and help us!” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And when he had seen the vision, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At this point Luke (the writer) apparently joined the journey and includes himself in the narrative, speaking in the first person.
    marker-yv: yv-n
  - type: text
    text: we (including Luke) tried to go on into Macedonia at once, concluding that God had called us to preach the gospel to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So setting sail from Troas, we ran a direct course to Samothrace, and the next day [went on] to Neapolis; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and from there [we came] to Philippi, which is a leading city of the district of Macedonia, a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Roman
  - type: text
    text: ' colony. We stayed on in this city for several days; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and on the Sabbath day we went outside the city gate to the bank of the [Gangites] river, where we thought there would be a '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently there were not enough Jews living in Philippi to establish a synagogue.
    marker-yv: yv-n
  - type: text
    text: place of prayer, and we sat down and began speaking to the women who had come there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: First Convert in Europe
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A woman named '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first recorded believer in Europe.
    marker-yv: yv-n
  - type: text
    text: 'Lydia, from the city of Thyatira, a dealer in '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was an important and valuable fabric, having great demand, being used on the official toga in Rome and its colonies.
    marker-yv: yv-n
  - type: text
    text: 'purple fabrics who was [already] a worshiper of God, listened to us; and the Lord opened her heart to pay attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' to respond to the things said by Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And when she was baptized, along with her household, she pleaded with us, saying, “If you have judged me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' decided that I am faithful to the Lord [a true believer], come to my house and stay.” And she persuaded us.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'It happened that as we were on our way to the place of prayer, we were met by a slave-girl who had '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: a python spirit
      - type: text
        text: . In Greek mythology, Python the earth-dragon (serpent goddess), was associated with the oracle at Delphi.
    marker-yv: yv-n
  - type: text
    text: 'a spirit of divination [that is, a demonic spirit claiming to foretell the future and discover hidden knowledge], and she brought her owners a good profit by fortune-telling. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'She followed after Paul and us and kept screaming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' shouting, “These men are servants of the Most High God! They are proclaiming to you the way of salvation!” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'She continued doing this for several days. Then Paul, being greatly annoyed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' worn out, turned and said to the spirit [inside her], “I command you in the name of Jesus Christ [as His representative] to come out of her!” And it came out at that very moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But when her owners saw that their hope of profit was gone, they seized Paul and Silas and dragged them before the authorities in the market place [where trials were held], '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'and when they had brought them before the chief magistrates, they said, “These men, who are Jews, are throwing our city into confusion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' causing trouble. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They are publicly teaching customs which are unlawful for us, as Romans, to accept or observe.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Paul and Silas Imprisoned
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The crowd also joined in the attack against them, and the chief magistrates tore their robes off them and ordered that Paul and Silas be beaten with rods. [2 Cor 11:25] '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After striking them many times [with the rods], they threw them into prison, commanding the jailer to guard them securely. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He, having received such a [strict] command, threw them into the inner prison (dungeon) and fastened their feet in the stocks [in an agonizing position].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But about midnight when Paul and Silas were praying and singing hymns of praise to God, and the prisoners were listening to them; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'suddenly there was a great earthquake, so [powerful] that the very foundations of the prison were shaken and at once all the doors were opened and everyone’s chains were unfastened. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When the jailer, shaken out of sleep, saw the prison doors open, he drew his sword and was about to kill himself, thinking that the prisoners had escaped. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But Paul shouted, saying, “Do not hurt yourself, we are all here!” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then the jailer called for torches and rushed in, and trembling with fear he fell down before Paul and Silas, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: and after he brought them out [of the inner prison], he said, “Sirs, what must I do to be saved?”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Jailer Converted
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'And they answered, “Believe in the Lord Jesus [as your personal Savior and entrust yourself to Him] and you will be saved, you and your household [if they also believe].” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And they spoke the word of the Lord [concerning eternal salvation through faith in Christ] to him and to all who were in his house. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And he took them that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very
  - type: text
    text: ' hour of the night and washed their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: bloody
  - type: text
    text: ' wounds, and immediately he was baptized, he and all his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: household
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Then he brought them into his house and set food before them, and rejoiced greatly, since he had believed in God with his entire family [accepting with joy what had been made known to them about the Christ].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Now when day came, the chief magistrates sent their officers, saying, “Release those men.” '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And the jailer repeated the words to Paul, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying,
  - type: text
    text: ' “The chief magistrates have sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' to release you; so come out now and go in peace.” '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But Paul said to them, “They have beaten us in public without a trial, men who are Romans, and have thrown us into prison; and now they are sending us out secretly? No! Let them come here themselves and bring us out!” '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The officers reported this message to the chief magistrates, and '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul was a Roman citizen because he was born in Tarsus (22:28), capitol of Cilicia and a city that the emperor Augustus had pronounced “free” because of its support of Rome. Nothing is known of Silas’ family background, but if his name is short for “Silvanus,” it is a Roman name (taken from the god of the forest) and it could be that Silas was also born a Roman citizen. Details on Roman citizenship at that time are sketchy at best, but it is clear from Acts that punishing a citizen without a trial and guilty verdict was illegal, probably involving severe penalties for the magistrates in charge. Also, a Roman citizen charged with a crime had the right to go to Rome and be tried in the emperor’s court (25:9-12).
    marker-yv: yv-n
  - type: text
    text: 'when they heard that the prisoners were Romans, they were frightened; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'so they came [to the prison] and appealed to them [with apologies], and when they brought them out, they kept begging them to leave the city. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So they left the prison and went to Lydia’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: house;
  - type: text
    text: ' and when they had seen the brothers and sisters, they encouraged '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' comforted them, and left.'
