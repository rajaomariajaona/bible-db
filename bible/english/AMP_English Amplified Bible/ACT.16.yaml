verses:
  '1':
  - type: heading
    content: The Macedonian Vision
  - type: text
    content: 'Now Paul traveled to Derbe and also to Lystra. A disciple named Timothy was there, the son of a Jewish woman who was a believer [in Christ], however, his father was a Greek. '
  '10':
  - type: text
    content: 'And when he had seen the vision, '
  - type: note
    content: At this point Luke (the writer) apparently joined the journey and includes himself in the narrative, speaking in the first person.
  - type: text
    content: we (including Luke) tried to go on into Macedonia at once, concluding that God had called us to preach the gospel to them.
  '11':
  - type: text
    content: 'So setting sail from Troas, we ran a direct course to Samothrace, and the next day [went on] to Neapolis; '
  '12':
  - type: text
    content: 'and from there [we came] to Philippi, which is a leading city of the district of Macedonia, a '
  - type: text
    content: Roman
  - type: text
    content: ' colony. We stayed on in this city for several days; '
  '13':
  - type: text
    content: 'and on the Sabbath day we went outside the city gate to the bank of the [Gangites] river, where we thought there would be a '
  - type: note
    content: Apparently there were not enough Jews living in Philippi to establish a synagogue.
  - type: text
    content: place of prayer, and we sat down and began speaking to the women who had come there.
  - type: heading
    content: First Convert in Europe
  '14':
  - type: text
    content: 'A woman named '
  - type: note
    content: The first recorded believer in Europe.
  - type: text
    content: 'Lydia, from the city of Thyatira, a dealer in '
  - type: note
    content: This was an important and valuable fabric, having great demand, being used on the official toga in Rome and its colonies.
  - type: text
    content: 'purple fabrics who was [already] a worshiper of God, listened to us; and the Lord opened her heart to pay attention '
  - type: text
    content: and
  - type: text
    content: ' to respond to the things said by Paul. '
  '15':
  - type: text
    content: 'And when she was baptized, along with her household, she pleaded with us, saying, “If you have judged me '
  - type: text
    content: and
  - type: text
    content: ' decided that I am faithful to the Lord [a true believer], come to my house and stay.” And she persuaded us.'
  '16':
  - type: text
    content: 'It happened that as we were on our way to the place of prayer, we were met by a slave-girl who had '
  - type: note
    content: Lit a python spirit. In Greek mythology, Python the earth-dragon (serpent goddess), was associated with the oracle at Delphi.
  - type: text
    content: 'a spirit of divination [that is, a demonic spirit claiming to foretell the future and discover hidden knowledge], and she brought her owners a good profit by fortune-telling. '
  '17':
  - type: text
    content: 'She followed after Paul and us and kept screaming '
  - type: text
    content: and
  - type: text
    content: ' shouting, “These men are servants of the Most High God! They are proclaiming to you the way of salvation!” '
  '18':
  - type: text
    content: 'She continued doing this for several days. Then Paul, being greatly annoyed '
  - type: text
    content: and
  - type: text
    content: ' worn out, turned and said to the spirit [inside her], “I command you in the name of Jesus Christ [as His representative] to come out of her!” And it came out at that very moment.'
  '19':
  - type: text
    content: 'But when her owners saw that their hope of profit was gone, they seized Paul and Silas and dragged them before the authorities in the market place [where trials were held], '
  '2':
  - type: text
    content: 'Timothy was well spoken of by the brothers and sisters who were in Lystra and Iconium. '
  '20':
  - type: text
    content: 'and when they had brought them before the chief magistrates, they said, “These men, who are Jews, are throwing our city into confusion '
  - type: text
    content: and
  - type: text
    content: ' causing trouble. '
  '21':
  - type: text
    content: They are publicly teaching customs which are unlawful for us, as Romans, to accept or observe.”
  - type: heading
    content: Paul and Silas Imprisoned
  '22':
  - type: text
    content: 'The crowd also joined in the attack against them, and the chief magistrates tore their robes off them and ordered that Paul and Silas be beaten with rods. [2 Cor 11:25] '
  '23':
  - type: text
    content: 'After striking them many times [with the rods], they threw them into prison, commanding the jailer to guard them securely. '
  '24':
  - type: text
    content: He, having received such a [strict] command, threw them into the inner prison (dungeon) and fastened their feet in the stocks [in an agonizing position].
  '25':
  - type: text
    content: 'But about midnight when Paul and Silas were praying and singing hymns of praise to God, and the prisoners were listening to them; '
  '26':
  - type: text
    content: 'suddenly there was a great earthquake, so [powerful] that the very foundations of the prison were shaken and at once all the doors were opened and everyone’s chains were unfastened. '
  '27':
  - type: text
    content: 'When the jailer, shaken out of sleep, saw the prison doors open, he drew his sword and was about to kill himself, thinking that the prisoners had escaped. '
  '28':
  - type: text
    content: 'But Paul shouted, saying, “Do not hurt yourself, we are all here!” '
  '29':
  - type: text
    content: 'Then the jailer called for torches and rushed in, and trembling with fear he fell down before Paul and Silas, '
  '3':
  - type: text
    content: 'Paul wanted Timothy to go with him [as a missionary]; and he took him and circumcised him because of the Jews who were in those places, since they all knew that his father was a Greek. '
  '30':
  - type: text
    content: and after he brought them out [of the inner prison], he said, “Sirs, what must I do to be saved?”
  - type: heading
    content: The Jailer Converted
  '31':
  - type: text
    content: 'And they answered, “Believe in the Lord Jesus [as your personal Savior and entrust yourself to Him] and you will be saved, you and your household [if they also believe].” '
  '32':
  - type: text
    content: 'And they spoke the word of the Lord [concerning eternal salvation through faith in Christ] to him and to all who were in his house. '
  '33':
  - type: text
    content: 'And he took them that '
  - type: text
    content: very
  - type: text
    content: ' hour of the night and washed their '
  - type: text
    content: bloody
  - type: text
    content: ' wounds, and immediately he was baptized, he and all his '
  - type: text
    content: household
  - type: text
    content: '. '
  '34':
  - type: text
    content: Then he brought them into his house and set food before them, and rejoiced greatly, since he had believed in God with his entire family [accepting with joy what had been made known to them about the Christ].
  '35':
  - type: text
    content: 'Now when day came, the chief magistrates sent their officers, saying, “Release those men.” '
  '36':
  - type: text
    content: 'And the jailer repeated the words to Paul, '
  - type: text
    content: saying,
  - type: text
    content: ' “The chief magistrates have sent '
  - type: text
    content: word
  - type: text
    content: ' to release you; so come out now and go in peace.” '
  '37':
  - type: text
    content: 'But Paul said to them, “They have beaten us in public without a trial, men who are Romans, and have thrown us into prison; and now they are sending us out secretly? No! Let them come here themselves and bring us out!” '
  '38':
  - type: text
    content: 'The officers reported this message to the chief magistrates, and '
  - type: note
    content: Paul was a Roman citizen because he was born in Tarsus (22:28), capitol of Cilicia and a city that the emperor Augustus had pronounced “free” because of its support of Rome. Nothing is known of Silas’ family background, but if his name is short for “Silvanus,” it is a Roman name (taken from the god of the forest) and it could be that Silas was also born a Roman citizen. Details on Roman citizenship at that time are sketchy at best, but it is clear from Acts that punishing a citizen without a trial and guilty verdict was illegal, probably involving severe penalties for the magistrates in charge. Also, a Roman citizen charged with a crime had the right to go to Rome and be tried in the emperor’s court (25:9-12).
  - type: text
    content: 'when they heard that the prisoners were Romans, they were frightened; '
  '39':
  - type: text
    content: 'so they came [to the prison] and appealed to them [with apologies], and when they brought them out, they kept begging them to leave the city. '
  '4':
  - type: text
    content: 'As they traveled from town to town, they delivered the decrees decided on by the apostles and elders who were in Jerusalem, for the churches to observe. '
  '40':
  - type: text
    content: 'So they left the prison and went to Lydia’s '
  - type: text
    content: house;
  - type: text
    content: ' and when they had seen the brothers and sisters, they encouraged '
  - type: text
    content: and
  - type: text
    content: ' comforted them, and left.'
  '5':
  - type: text
    content: 'So the churches were strengthened in the faith, and they '
  - type: text
    content: continually
  - type: text
    content: ' increased in number day after day.'
  '6':
  - type: text
    content: 'Now they passed through the territory of Phrygia and Galatia, after being forbidden by the Holy Spirit to speak the word in [the west coast province of] Asia [Minor]; '
  '7':
  - type: text
    content: 'and after they came to Mysia, they tried to go into Bithynia, but the Spirit of Jesus did not permit them; '
  '8':
  - type: text
    content: 'so passing by Mysia, they went down to Troas. '
  '9':
  - type: text
    content: 'Then a vision appeared to Paul in the night: a man from [the Roman province of] '
  - type: note
    content: Northern Greece.
  - type: text
    content: 'Macedonia was standing and pleading with him, saying, “Come over to Macedonia and help us!” '
