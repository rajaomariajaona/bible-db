document_id: JDG.19,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A Levite’s Concubine Degraded
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened in those days, when there was no king in Israel, that a certain Levite living [as an alien] in the most remote part of the hill country of Ephraim, who took a '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. a type of secondary or inferior “wife” (often a slave), much lower in rank than the official wife who managed the household and gave birth to the “legitimate” children. Concubines had marginal rights to financial support and recognition. Their children were usually acknowledged as offspring of the man, but were of lower status than the children born to the official wife.
      marker-yv: yv-n
    - type: text
      text: 'concubine for himself from Bethlehem in Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the man was not willing to stay the night; so he got up and left and came to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a place
    - type: text
      text: ' opposite Jebus (that is Jerusalem). With him were two saddled donkeys [and his servant] and his concubine. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they were near Jebus, the day was almost gone, and the servant said to his master, “Please come and let us turn aside into this Jebusite city and spend the night in it.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his master said to him, “We will not turn aside into a city of foreigners who are not of the sons (descendants) of Israel. We will go on as far as Gibeah.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to his servant, “Come and let us approach one of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' places: and we will spend the night in Gibeah or in Ramah.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they passed by and went on their way, and the sun set on them near Gibeah, which belongs to [the tribe of] Benjamin, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they turned aside there to go in and spend the night in Gibeah. And the Levite went in and sat down in the open square of the city, because no man invited them into his house to spend the night.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then behold, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there was
    - type: text
      text: ' an old man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' was coming out of the field from his work at evening. He was from the hill country of Ephraim but was staying in Gibeah, and the men of the place were sons (descendants) of Benjamin. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he looked up, he saw the traveler [and his companions] in the city square; and the old man said, “Where are you going, and where do you come from?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levite replied, “We are passing through from Bethlehem [in the territory] of Judah to the most remote part of the hill country of Ephraim; I am from there. I went to Bethlehem of Judah, but I am '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: ' going [home] to my house, and there is no man [in the city] who will take me into his house [for the night]. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet we have both straw and feed for our donkeys, and also bread and wine for me, and for '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. the concubine.
      marker-yv: yv-n
    - type: text
      text: 'your handmaid, and for the young man who is with your servant; there is no lack of anything.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But his concubine was unfaithful to him, and left him and went to her father’s house in Bethlehem of Judah, and stayed there for a period of four months. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the old man said, “Peace be to you. Only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leave
    - type: text
      text: ' all your needs to me; and do not spend the night in the open square.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he brought him into his house and fed the donkeys; and they washed their feet and ate and drank.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: treating their hearts well
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'celebrating, behold, men of the city, certain worthless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' evil men, surrounded the house, pounding on the door; and they spoke to the master of the house, the old man, saying, “Bring out the man who came to your house so that we may have relations with him.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the man, the master of the house, went out and said to them, “No, my fellow citizens, please do not act so wickedly. Since this man has come to my house [as my guest], do not commit this sacrilege. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is my virgin daughter and this man’s concubine. I will bring them out now; abuse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' humiliate them and do to them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: what is good in your eyes
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'whatever you want, but do not commit this act of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I.e. despicable sin.
      marker-yv: yv-n
    - type: text
      text: 'sacrilege against this man.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men would not listen to him. So the man took the Levite’s concubine and brought her outside to them; and they had relations with her and abused her all night until morning; and when daybreak came, they let her go. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: At the turning of the morning
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: At daybreak the woman came and collapsed at the door of the man’s house where her master was, until it was [fully] light.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When her master got up in the morning and opened the doors of the house and went out to go on his way, he saw his concubine lying at the door of the house, and her hands were on the threshold. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to her, “Get up, and let us go.” But there was no answer [for she had died]. Then he put her [body] on the donkey; and the man left and went home. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he arrived at his house, he took a knife, and taking hold of his [dead] concubine, he cut her [corpse] limb by limb into twelve pieces, and sent her [body parts] throughout all the territory of Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then her husband arose and went after her to speak kindly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' tenderly to her in order to bring her back, taking with him his servant and a pair of donkeys. So she brought him into her father’s house, and when the father of the girl saw him, he was happy to meet him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All who saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the dismembered parts
    - type: text
      text: ' said, “Nothing like this has '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ever
    - type: text
      text: ' happened or been seen from the day that the sons of Israel came up from the land of Egypt to this day. Consider it, take counsel, and speak [your minds]!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So his father-in-law, the girl’s father, detained him; and he stayed there with him for three days. So they ate and drank, and he lodged there. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fourth day they got up early in the morning, and the Levite prepared to leave; but the girl’s father said to his son-in-law, “Strengthen yourself with a piece of bread, and afterward go your way.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So both men sat down and ate and drank together; and the girl’s father said to the man, “Please be willing to spend the night and enjoy yourself.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the man got up to leave, but his father-in-law urged him [strongly to remain]; so he spent the night there again. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fifth day he got up early in the morning to leave, but the girl’s father said, “Please strengthen yourself, and wait until the end of the day.” So both of them ate. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the man and his concubine and his servant got up to leave, his father-in-law, the girl’s father, said to him, “Behold, now the day has drawn to a close; please spend the night. Look, now the day comes to an end; spend the night here and celebrate, enjoy yourself. Then tomorrow you may get up early for your journey and go '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to your tent
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: home.”
