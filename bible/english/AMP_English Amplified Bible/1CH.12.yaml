document_id: 1CH.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: David’s Supporters in Ziklag
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the ones who came to David at Ziklag, while he still concealed himself from Saul the son of Kish; they were among the courageous men who helped him in battle. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They were armed with bows, and could use the right hand or the left to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sling
  - type: text
    text: ' stones and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shoot
  - type: text
    text: ' arrows from the bow; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they were
  - type: text
    text: ' Saul’s relatives from [the tribe of] Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The chief was Ahiezer and then Joash, the sons of Shemaah of Gibeah; Jeziel and Pelet the sons of Azmaveth; Beracah, and Jehu of Anathoth, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ishmaiah of Gibeon, a mighty man among the thirty, and [a leader] over them; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew the beginning of v 5, making 41 vv in the chapter.
    marker-yv: yv-n
  - type: text
    text: 'Jeremiah, Jahaziel, Johanan, Jozabad of Gederah, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V 6 in Hebrew.
    marker-yv: yv-n
  - type: text
    text: 'Eluzai, Jerimoth, Bealiah, Shemariah, Shephatiah the Haruphite, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, the Korahites, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and Joelah and Zebadiah the sons of Jeroham of Gedor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Courageous men from the Gadites came over to David in the stronghold in the wilderness, men trained for war, who could handle shield and spear, whose faces were like the faces of lions, and who were swift as gazelles on the mountains. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ezer was the first, Obadiah the second, Eliab the third, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mishmannah the fourth, Jeremiah the fifth, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Attai the sixth, Eliel the seventh, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Johanan the eighth, Elzabad the ninth, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jeremiah the tenth, Machbannai the eleventh. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'These from the sons (descendants) of Gad were captains of the army; he who was least was '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: over
      - type: text
        text: ' and so throughout.'
    marker-yv: yv-n
  - type: text
    text: 'equal to a hundred, and the greatest was equal to a thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These are the men who crossed over the Jordan in the first month when it had overflowed all its banks and they put to flight all those in the valleys, east and west.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then some of the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sons
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'men of Benjamin and Judah came to the stronghold to David. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David went out to meet them and said to them, “If you have come peacefully to me to help me, my heart shall be united with you; but if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you have come
  - type: text
    text: ' to betray me to my adversaries, since there is no violence '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' wrong in my hands, may the God of our fathers look on [what you are doing] and punish [you].” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the [Holy] Spirit came on Amasai, who was chief of the thirty, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We are yours, O David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with you, O son of Jesse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peace, peace be to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And peace be to him who helps you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your God helps you.”
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Then David accepted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' received them and made them officers of his troops.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Some [of the men] of Manasseh also defected to David when he came with the Philistines to go to battle against Saul. But David’s men did not [actually] assist the Philistines, for the lords (governors) of the Philistines after consultation sent him away, saying, “At '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the cost of
  - type: text
    text: ' our heads he may defect to his master Saul.” [1 Sam 29:2-9] '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As David went to Ziklag, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these men
  - type: text
    text: ' defected to him from Manasseh: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai, captains of thousands who belonged to Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They helped David against the band of raiders, for they were all courageous men, and [all seven] became commanders in his army. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For day by day men kept coming to David to help him, until there was a great army, like the army of God.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Supporters Gathered at Hebron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: These are the numbers of the [armed] units equipped for war who came to David at Hebron to turn [over] the kingdom of Saul to him, in accordance with the word of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Those of the tribe of Judah who carried shield and spear were 6,800, armed for war; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'of the tribe of Simeon, brave warriors, 7,100; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'of the tribe of Levi, 4,600. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jehoiada was the leader of [the house of] Aaron, and with him were 3,700, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and Zadok, a courageous young man, and twenty-two captains from his father’s house. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Of the tribe of Benjamin, the relatives of [King] Saul, 3,000; for until now the majority of them had kept their allegiance to the house of Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Of the tribe of Ephraim, 20,800, courageous men, famous in their fathers’ houses. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Of the half-tribe of Manasseh, 18,000, who were designated by name to come and make David king. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Of the tribe of Issachar, men who understood the times, with knowledge of what Israel should do, two hundred chiefs; and all their relatives were at their command; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'of the tribe of Zebulun, there were 50,000 in military service who could draw up in battle formation with all kinds of weapons of war and helped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: David, men
  - type: text
    text: ' with '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. trustworthy men, men of honor without any sort of hidden agenda or double purpose.
    marker-yv: yv-n
  - type: text
    text: 'an undivided heart. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Of the tribe of Naphtali, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there were
  - type: text
    text: ' 1,000 captains, and with them 37,000 [of the rank and file armed] with shield and spear. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Of the tribe of Dan, 28,600 men who could draw up in battle formation. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Of the tribe of Asher, 40,000 men in military service, able to draw up in battle formation. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'From the other side [east] of the Jordan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: River
  - type: text
    text: ', of [the tribes of] Reuben and Gad and the half-tribe of Manasseh, 120,000 men, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: armed
  - type: text
    text: ' with all kinds of weapons of war for the battle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'All these, being men of war arrayed in battle formation, came to Hebron with a perfect (committed) heart to make David king over all Israel; and all the rest of Israel were also of one mind to make David king. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'They were there with David for three days, eating and drinking, for their relatives had prepared for them. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Also those who were [living] near them [from] as far as [the tribes of] Issachar, Zebulun, and Naphtali, brought food on donkeys, camels, mules, and oxen, abundant supplies of flour, cakes of figs and raisins, wine, [olive] oil, oxen, and sheep, for there was joy in Israel.
