document_id: 1CH.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Supporters in Ziklag
  - type: text
    content: 'These are the ones who came to David at Ziklag, while he still concealed himself from Saul the son of Kish; they were among the courageous men who helped him in battle. '
  '10':
  - type: text
    content: 'Mishmannah the fourth, Jeremiah the fifth, '
  '11':
  - type: text
    content: 'Attai the sixth, Eliel the seventh, '
  '12':
  - type: text
    content: 'Johanan the eighth, Elzabad the ninth, '
  '13':
  - type: text
    content: 'Jeremiah the tenth, Machbannai the eleventh. '
  '14':
  - type: text
    content: 'These from the sons (descendants) of Gad were captains of the army; he who was least was '
  - type: note
    content: Or over and so throughout.
  - type: text
    content: 'equal to a hundred, and the greatest was equal to a thousand. '
  '15':
  - type: text
    content: These are the men who crossed over the Jordan in the first month when it had overflowed all its banks and they put to flight all those in the valleys, east and west.
  '16':
  - type: text
    content: 'Then some of the '
  - type: note
    content: Lit sons.
  - type: text
    content: 'men of Benjamin and Judah came to the stronghold to David. '
  '17':
  - type: text
    content: 'David went out to meet them and said to them, “If you have come peacefully to me to help me, my heart shall be united with you; but if '
  - type: text
    content: you have come
  - type: text
    content: ' to betray me to my adversaries, since there is no violence '
  - type: text
    content: or
  - type: text
    content: ' wrong in my hands, may the God of our fathers look on [what you are doing] and punish [you].” '
  '18':
  - type: text
    content: 'Then the [Holy] Spirit came on Amasai, who was chief of the thirty, '
  - type: text
    content: and he said,
  - type: text
    content: “We are yours, O David,
  - type: text
    content: And with you, O son of Jesse!
  - type: text
    content: Peace, peace be to you,
  - type: text
    content: And peace be to him who helps you;
  - type: text
    content: For your God helps you.”
  - type: text
    content: 'Then David accepted '
  - type: text
    content: and
  - type: text
    content: ' received them and made them officers of his troops.'
  '19':
  - type: text
    content: 'Some [of the men] of Manasseh also defected to David when he came with the Philistines to go to battle against Saul. But David’s men did not [actually] assist the Philistines, for the lords (governors) of the Philistines after consultation sent him away, saying, “At '
  - type: text
    content: the cost of
  - type: text
    content: ' our heads he may defect to his master Saul.” [1 Sam 29:2-9] '
  '2':
  - type: text
    content: 'They were armed with bows, and could use the right hand or the left to '
  - type: text
    content: sling
  - type: text
    content: ' stones and '
  - type: text
    content: shoot
  - type: text
    content: ' arrows from the bow; '
  - type: text
    content: they were
  - type: text
    content: ' Saul’s relatives from [the tribe of] Benjamin. '
  '20':
  - type: text
    content: 'As David went to Ziklag, '
  - type: text
    content: these men
  - type: text
    content: ' defected to him from Manasseh: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu, and Zillethai, captains of thousands who belonged to Manasseh. '
  '21':
  - type: text
    content: 'They helped David against the band of raiders, for they were all courageous men, and [all seven] became commanders in his army. '
  '22':
  - type: text
    content: For day by day men kept coming to David to help him, until there was a great army, like the army of God.
  - type: heading
    content: Supporters Gathered at Hebron
  '23':
  - type: text
    content: These are the numbers of the [armed] units equipped for war who came to David at Hebron to turn [over] the kingdom of Saul to him, in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Those of the tribe of Judah who carried shield and spear were 6,800, armed for war; '
  '25':
  - type: text
    content: 'of the tribe of Simeon, brave warriors, 7,100; '
  '26':
  - type: text
    content: 'of the tribe of Levi, 4,600. '
  '27':
  - type: text
    content: 'Jehoiada was the leader of [the house of] Aaron, and with him were 3,700, '
  '28':
  - type: text
    content: 'and Zadok, a courageous young man, and twenty-two captains from his father’s house. '
  '29':
  - type: text
    content: 'Of the tribe of Benjamin, the relatives of [King] Saul, 3,000; for until now the majority of them had kept their allegiance to the house of Saul. '
  '3':
  - type: text
    content: 'The chief was Ahiezer and then Joash, the sons of Shemaah of Gibeah; Jeziel and Pelet the sons of Azmaveth; Beracah, and Jehu of Anathoth, '
  '30':
  - type: text
    content: 'Of the tribe of Ephraim, 20,800, courageous men, famous in their fathers’ houses. '
  '31':
  - type: text
    content: 'Of the half-tribe of Manasseh, 18,000, who were designated by name to come and make David king. '
  '32':
  - type: text
    content: 'Of the tribe of Issachar, men who understood the times, with knowledge of what Israel should do, two hundred chiefs; and all their relatives were at their command; '
  '33':
  - type: text
    content: 'of the tribe of Zebulun, there were 50,000 in military service who could draw up in battle formation with all kinds of weapons of war and helped '
  - type: text
    content: David, men
  - type: text
    content: ' with '
  - type: note
    content: I.e. trustworthy men, men of honor without any sort of hidden agenda or double purpose.
  - type: text
    content: 'an undivided heart. '
  '34':
  - type: text
    content: 'Of the tribe of Naphtali, '
  - type: text
    content: there were
  - type: text
    content: ' 1,000 captains, and with them 37,000 [of the rank and file armed] with shield and spear. '
  '35':
  - type: text
    content: 'Of the tribe of Dan, 28,600 men who could draw up in battle formation. '
  '36':
  - type: text
    content: 'Of the tribe of Asher, 40,000 men in military service, able to draw up in battle formation. '
  '37':
  - type: text
    content: 'From the other side [east] of the Jordan '
  - type: text
    content: River
  - type: text
    content: ', of [the tribes of] Reuben and Gad and the half-tribe of Manasseh, 120,000 men, '
  - type: text
    content: armed
  - type: text
    content: ' with all kinds of weapons of war for the battle.'
  '38':
  - type: text
    content: 'All these, being men of war arrayed in battle formation, came to Hebron with a perfect (committed) heart to make David king over all Israel; and all the rest of Israel were also of one mind to make David king. '
  '39':
  - type: text
    content: 'They were there with David for three days, eating and drinking, for their relatives had prepared for them. '
  '4':
  - type: text
    content: 'Ishmaiah of Gibeon, a mighty man among the thirty, and [a leader] over them; '
  - type: note
    content: In Hebrew the beginning of v 5, making 41 vv in the chapter.
  - type: text
    content: 'Jeremiah, Jahaziel, Johanan, Jozabad of Gederah, '
  '40':
  - type: text
    content: Also those who were [living] near them [from] as far as [the tribes of] Issachar, Zebulun, and Naphtali, brought food on donkeys, camels, mules, and oxen, abundant supplies of flour, cakes of figs and raisins, wine, [olive] oil, oxen, and sheep, for there was joy in Israel.
  '5':
  - type: note
    content: V 6 in Hebrew.
  - type: text
    content: 'Eluzai, Jerimoth, Bealiah, Shemariah, Shephatiah the Haruphite, '
  '6':
  - type: text
    content: 'Elkanah, Isshiah, Azarel, Joezer, and Jashobeam, the Korahites, '
  '7':
  - type: text
    content: and Joelah and Zebadiah the sons of Jeroham of Gedor.
  '8':
  - type: text
    content: 'Courageous men from the Gadites came over to David in the stronghold in the wilderness, men trained for war, who could handle shield and spear, whose faces were like the faces of lions, and who were swift as gazelles on the mountains. '
  '9':
  - type: text
    content: 'Ezer was the first, Obadiah the second, Eliab the third, '
