  - type: text
    content: ' '
  '12':
  - type: text
    content: From the days of John the Baptist until now the kingdom of heaven suffers violent assault, and violent men seize it by force
  - type: text
    content: ' [as a precious prize]. '
  '13':
  - type: text
    content: For all the prophets and the Law prophesied up until John
  - type: text
    content: '. '
  '14':
  - type: text
    content: And if you are willing to accept it, John himself is
  - type: text
    content: ' [the fulfillment of] '
  - type: text
    content: Elijah
  - type: text
    content: ' [as the messenger] '
  - type: text
    content: who was to come
  - type: text
    content: ' [before the kingdom]. [Mal 4:5] '
  '15':
  - type: text
    content: 'He who has ears to hear, let him hear '
  - type: text
    content: and
  - type: text
    content: ' heed My words.'
  '16':
  - type: text
    content: ' '
  - type: text
    content: “But to what shall I compare this generation? It is like little children sitting in the market places, who call to the others,
  - type: text
    content: ' '
  '17':
  - type: text
    content: and say ‘We piped the flute for you
  - type: text
    content: ' [playing wedding], '
  - type: text
    content: and you did not dance; we wailed sad dirges
  - type: text
    content: ' [playing funeral], '
  - type: text
    content: 'and you did not mourn '
  - type: text
    content: and
  - type: text
    content: ' cry aloud.’'
  - type: text
    content: ' '
  '18':
  - type: text
    content: For John came neither eating nor drinking
  - type: text
    content: ' [with others], '
  - type: text
    content: and they say, ‘He has a demon!’
  - type: text
    content: ' '
  '19':
  - type: text
    content: The Son of Man came eating and drinking
  - type: text
    content: ' [with others], '
  - type: text
    content: and they say, ‘Look! A glutton and a drunkard, a friend of tax collectors and sinners
  - type: text
    content: ' [including non-observant Jews]!’ '
  - type: text
    content: 'Yet wisdom is justified '
  - type: text
    content: and
  - type: text
    content: ' vindicated by her deeds'
  - type: text
    content: ' [in the lives of those who respond to Me].”'
  - type: heading
    content: The Unrepenting Cities
  '2':
  - type: text
    content: 'Now when '
  - type: note
    content: John and Jesus were about the same age and were related through their mothers, Elizabeth and Mary (Luke 1:36).
  - type: text
    content: 'John [the Baptist] in prison heard about the activities of Christ, he sent '
  - type: text
    content: word
  - type: text
    content: ' by his disciples [Luke 7:18-35] '
  '20':
  - type: text
    content: 'Then He began to denounce [the people in] the cities in which most of His miracles were done, because they did not repent [and change their hearts and lives]. '
  '21':
  - type: text
    content: '“Woe (judgment is coming) to you, '
  - type: note
    content: A city near Capernaum, where Jesus later made His home. They would have heard His teachings many times.
  - type: text
    content: Chorazin! Woe to you, Bethsaida! For if the miracles done in you had been done in Tyre and Sidon
  - type: text
    content: ' [cities of the Gentiles], '
  - type: text
    content: they would have repented long ago in sackcloth and ashes
  - type: text
    content: ' [their hearts would have been changed and they would have expressed sorrow for their sin and rebellion against God]. '
  '22':
  - type: text
    content: Nevertheless I say to you, it will be more tolerable for
  - type: text
    content: ' [the pagan cities of] '
  - type: text
    content: Tyre and Sidon on the day of judgment than for you.
  - type: text
    content: ' '
  '23':
  - type: text
    content: And you, Capernaum, are you to be exalted to heaven
  - type: text
    content: ' [for your apathy and unresponsiveness]? '
  - type: text
    content: You will descend to Hades (the realm of the dead); for if the miracles done in you had been done in Sodom, it would have remained until this day.
  - type: text
    content: ' '
  '24':
  - type: text
    content: But I say to you, it will be more tolerable for the land of Sodom on the day of judgment, than for you.”
  - type: heading
    content: Come to Me
  '25':
  - type: text
    content: 'At that time Jesus said, '
  - type: text
    content: “I praise You, Father, Lord of heaven and earth
  - type: text
    content: ' [I openly and joyfully acknowledge Your great wisdom], '
  - type: text
    content: that You have hidden these things
  - type: text
    content: ' [these spiritual truths] '
  - type: text
    content: from the wise and intelligent and revealed them to infants
  - type: text
    content: ' [to new believers, to those seeking God’s will and purpose]. '
  '26':
  - type: text
    content: Yes, Father, for this way was well-pleasing in Your sight.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'All things have been handed over to Me by My Father; and no one fully knows '
  - type: text
    content: and
  - type: text
    content: ' accurately understands the Son except the Father; and no one fully knows '
  - type: text
    content: and
  - type: text
    content: ' accurately understands the Father except the Son, and anyone to whom the Son'
  - type: text
    content: ' [deliberately] '
  - type: text
    content: 'wills to reveal '
  - type: text
    content: Him
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Come to Me, all who are weary and heavily burdened
  - type: text
    content: ' [by religious rituals that provide no peace], '
  - type: text
    content: and I will give you rest
  - type: text
    content: ' [refreshing your souls with salvation]. '
  '29':
  - type: text
    content: Take My yoke upon you and learn from Me
  - type: text
    content: ' [following Me as My disciple], '
  - type: text
    content: 'for I am gentle and humble in heart, and '
  - type: heading
    content: you will find rest
  - type: text
    content: ' (renewal, blessed quiet) '
  - type: heading
    content: for your souls
  - type: text
    content: .
  - type: text
    content: ' [Jer 6:16] '
  '3':
  - type: text
    content: 'and asked Him, “Are You the Expected One (the Messiah), or should we look for someone else [who will be the promised One]?” [Gen 49:10; Num 24:17; Ps 40:7; 118:26; Is 59:20] '
  '30':
  - type: text
    content: For My yoke is easy
  - type: text
    content: ' [to bear] '
  - type: text
    content: and My burden is light.”
  '4':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Go and report to John what you hear and see:'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'the '
  - type: heading
    content: blind receive
  - type: text
    content: ' [their] '
  - type: heading
    content: sight
  - type: text
    content: ' and the lame walk, the lepers are cleansed'
  - type: text
    content: ' [by healing] '
  - type: text
    content: 'and the deaf hear, the dead are raised, and the '
  - type: heading
    content: poor have the gospel preached to them
  - type: text
    content: .
  - type: text
    content: ' [Is 35:5, 6; 61:1] '
  '6':
  - type: text
    content: And blessed
  - type: text
    content: ' [joyful, favored by God] '
  - type: text
    content: is he who does not take offense at Me
  - type: text
    content: ' [accepting Me as the Messiah and trusting confidently in My message of salvation].” [Luke 7:23]'
  - type: heading
    content: Jesus’ Tribute to John
  '7':
  - type: text
    content: 'As these men were going away, Jesus began to speak to the crowds about John: '
  - type: text
    content: “What did you go out in the wilderness to see? A reed shaken by the wind
  - type: text
    content: ' [which is commonplace]? '
  '8':
  - type: text
    content: 'What did you go out to see? A man dressed in soft '
  - type: text
    content: clothing
  - type: text
    content: ' [entirely unsuited for the harsh desert]? '
  - type: text
    content: 'Those who wear soft '
  - type: text
    content: clothing
  - type: text
    content: ' are in the palaces of kings!'
  - type: text
    content: ' '
  '9':
  - type: text
    content: But what did you
  - type: text
    content: ' [really] '
  - type: text
    content: go out to see? A prophet? Yes, I tell you, and one
  - type: text
    content: ' [more eminent, more remarkable, and] '
  - type: note
    content: John was unique among the prophets because he was sent to prepare the hearts of the people for the immediate disclosure of their Messiah.
  - type: text
    content: far more than a prophet
  - type: text
    content: ' [who foretells the future]. '
