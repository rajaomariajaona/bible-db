document_id: MAT.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: John’s Questions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Jesus had finished giving instructions to His twelve disciples, He went on from there to teach and to preach in their [Galilean] cities.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now when '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: John and Jesus were about the same age and were related through their mothers, Elizabeth and Mary (Luke 1:36).
    marker-yv: yv-n
  - type: text
    text: 'John [the Baptist] in prison heard about the activities of Christ, he sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: word
  - type: text
    text: ' by his disciples [Luke 7:18-35] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and asked Him, “Are You the Expected One (the Messiah), or should we look for someone else [who will be the promised One]?” [Gen 49:10; Num 24:17; Ps 40:7; 118:26; Is 59:20] '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Go and report to John what you hear and see:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: blind receive
  - type: text
    text: ' [their] '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: sight
    - type: text
      text: ' and the lame walk, the lepers are cleansed'
  - type: text
    text: ' [by healing] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and the deaf hear, the dead are raised, and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: poor have the gospel preached to them
    - type: text
      text: .
  - type: text
    text: ' [Is 35:5, 6; 61:1] '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And blessed
  - type: text
    text: ' [joyful, favored by God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is he who does not take offense at Me
  - type: text
    text: ' [accepting Me as the Messiah and trusting confidently in My message of salvation].” [Luke 7:23]'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus’ Tribute to John
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As these men were going away, Jesus began to speak to the crowds about John: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What did you go out in the wilderness to see? A reed shaken by the wind
  - type: text
    text: ' [which is commonplace]? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'What did you go out to see? A man dressed in soft '
    - type: usfm
      marker: it
      children:
      - type: text
        text: clothing
  - type: text
    text: ' [entirely unsuited for the harsh desert]? '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Those who wear soft '
    - type: usfm
      marker: it
      children:
      - type: text
        text: clothing
    - type: text
      text: ' are in the palaces of kings!'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But what did you
  - type: text
    text: ' [really] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: go out to see? A prophet? Yes, I tell you, and one
  - type: text
    text: ' [more eminent, more remarkable, and] '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: John was unique among the prophets because he was sent to prepare the hearts of the people for the immediate disclosure of their Messiah.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: far more than a prophet
  - type: text
    text: ' [who foretells the future]. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is the one of whom it is written
  - type: text
    text: ' [by the prophet Malachi],'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘B
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ehold
    - type: text
      text: ', I '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: send
    - type: text
      text: ' M'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: y messenger ahead of
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: W
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ho will prepare
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: our way before
    - type: text
      text: ' Y'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ou
    - type: text
      text: .’
  - type: text
    text: ' [Mal 3:1]'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, among those born of women there has not risen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anyone
    - type: text
      text: ' greater than John the Baptist; yet the one who is least in the kingdom of heaven is greater'
  - type: text
    text: ' [in privilege] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: than he.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: From the days of John the Baptist until now the kingdom of heaven suffers violent assault, and violent men seize it by force
  - type: text
    text: ' [as a precious prize]. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For all the prophets and the Law prophesied up until John
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if you are willing to accept it, John himself is
  - type: text
    text: ' [the fulfillment of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Elijah
  - type: text
    text: ' [as the messenger] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who was to come
  - type: text
    text: ' [before the kingdom]. [Mal 4:5] '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'He who has ears to hear, let him hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' heed My words.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But to what shall I compare this generation? It is like little children sitting in the market places, who call to the others,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and say ‘We piped the flute for you
  - type: text
    text: ' [playing wedding], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and you did not dance; we wailed sad dirges
  - type: text
    text: ' [playing funeral], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and you did not mourn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' cry aloud.’'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For John came neither eating nor drinking
  - type: text
    text: ' [with others], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they say, ‘He has a demon!’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of Man came eating and drinking
  - type: text
    text: ' [with others], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they say, ‘Look! A glutton and a drunkard, a friend of tax collectors and sinners
  - type: text
    text: ' [including non-observant Jews]!’ '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Yet wisdom is justified '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' vindicated by her deeds'
  - type: text
    text: ' [in the lives of those who respond to Me].”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Unrepenting Cities
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then He began to denounce [the people in] the cities in which most of His miracles were done, because they did not repent [and change their hearts and lives]. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Woe (judgment is coming) to you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A city near Capernaum, where Jesus later made His home. They would have heard His teachings many times.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Chorazin! Woe to you, Bethsaida! For if the miracles done in you had been done in Tyre and Sidon
  - type: text
    text: ' [cities of the Gentiles], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: they would have repented long ago in sackcloth and ashes
  - type: text
    text: ' [their hearts would have been changed and they would have expressed sorrow for their sin and rebellion against God]. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Nevertheless I say to you, it will be more tolerable for
  - type: text
    text: ' [the pagan cities of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tyre and Sidon on the day of judgment than for you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And you, Capernaum, are you to be exalted to heaven
  - type: text
    text: ' [for your apathy and unresponsiveness]? '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will descend to Hades (the realm of the dead); for if the miracles done in you had been done in Sodom, it would have remained until this day.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I say to you, it will be more tolerable for the land of Sodom on the day of judgment, than for you.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Come to Me
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'At that time Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I praise You, Father, Lord of heaven and earth
  - type: text
    text: ' [I openly and joyfully acknowledge Your great wisdom], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that You have hidden these things
  - type: text
    text: ' [these spiritual truths] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: from the wise and intelligent and revealed them to infants
  - type: text
    text: ' [to new believers, to those seeking God’s will and purpose]. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yes, Father, for this way was well-pleasing in Your sight.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'All things have been handed over to Me by My Father; and no one fully knows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurately understands the Son except the Father; and no one fully knows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' accurately understands the Father except the Son, and anyone to whom the Son'
  - type: text
    text: ' [deliberately] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'wills to reveal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come to Me, all who are weary and heavily burdened
  - type: text
    text: ' [by religious rituals that provide no peace], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and I will give you rest
  - type: text
    text: ' [refreshing your souls with salvation]. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Take My yoke upon you and learn from Me
  - type: text
    text: ' [following Me as My disciple], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'for I am gentle and humble in heart, and '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: you will find rest
    - type: text
      text: ' (renewal, blessed quiet) '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: for your souls
    - type: text
      text: .
  - type: text
    text: ' [Jer 6:16] '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For My yoke is easy
  - type: text
    text: ' [to bear] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and My burden is light.”
