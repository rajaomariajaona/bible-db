      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And the heavens declare His righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For God Himself is judge. '
  - type: usfm
    marker: qs
    children:
    - type: text
