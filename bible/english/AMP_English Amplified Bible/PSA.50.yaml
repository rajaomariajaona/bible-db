  - type: text
    content: 'A Psalm of '
  - type: note
    content: Asaph was a Levite and one of the leaders of David’s choir. He was the head of one of the three families permanently in charge of the temple music. His family formed a guild that bore his name and is frequently mentioned (2 Chr 20:14; 29:13, 30). Twelve psalms (50; 73-83) are attributed in the titles to the family of Asaph. A hundred and twenty-eight of Asaph’s family members, all singers, came back from Babylon and took part when the foundations of Zerubbabel’s temple were laid (Ezra 2:41; 3:10).
