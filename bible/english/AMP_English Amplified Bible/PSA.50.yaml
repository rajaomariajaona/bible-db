  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “If I were hungry, I would not tell you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the world and all it contains are Mine. [1 Cor 10:26]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Shall I eat the flesh of bulls
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or drink the blood of male goats?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Offer to God the sacrifice of thanksgiving
- type: usfm
  marker: q1
  children:
  - type: text
    text: And pay your vows to the Most High;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Call on Me in the day of trouble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will rescue you, and you shall honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' glorify Me.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '¶But to the wicked God says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What right have you to recite My statutes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or to take My covenant on your lips?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“For you hate instruction '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' discipline'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And cast My words behind you [discarding them].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“When you see a thief, you are pleased with him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' condone his behavior,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you associate with adulterers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “You give your mouth to evil
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your tongue frames deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “You sit and speak against your brother;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You slander your own mother’s son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “These things you have done and I kept silent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You thought that I was just like you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now I will reprimand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' denounce you and state '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the case
  - type: text
    text: ' in order before your eyes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ¶“Now consider this, you who forget God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or I will tear you in pieces, and there will be no one to rescue [you].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“He who offers a sacrifice of praise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' thanksgiving honors Me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to him who orders his way rightly [who follows the way that I show him],
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall show the salvation of God.”
