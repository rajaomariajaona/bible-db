  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ¶“Hear, O My people, and I will speak;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'O Israel, I will testify against you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am God, your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I do not reprove you for your sacrifices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your burnt offerings are continually before Me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “I will accept no young bull from your house
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nor male goat from your folds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “For every beast of the forest is Mine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the cattle on a thousand hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I know every bird of the mountains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And everything that moves in the field is '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50:11 '
    - type: usfm
      marker: ft
      children:
