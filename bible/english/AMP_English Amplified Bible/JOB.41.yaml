  - type: text
    content: who are you who does not dare to disturb the beast, yet who dares resist Me, the beast’s creator? Everything under the heavens is Mine; therefore, who can have a claim against God?]”
  '4':
  - type: text
    content: '“Will he make a covenant '
  - type: text
    content: or
  - type: text
    content: ' an arrangement with you?'
  - type: text
    content: Will you take him for your servant forever?
  '5':
  - type: text
    content: “Will you play with him as with a bird?
  - type: text
    content: Or will you bind him [and put him on a leash] for your maidens?
  '6':
  - type: text
    content: “Will traders bargain over him?
  - type: text
    content: Will they divide him up among the merchants?
  '7':
  - type: text
    content: “Can you fill his skin with harpoons,
  - type: text
    content: Or his head with fishing spears?
  '8':
