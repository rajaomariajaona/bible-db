  - type: text
    content: Firm on him and immobile [when he moves].
  '24':
  - type: text
    content: “His heart is as hard as a stone,
  - type: text
    content: Indeed, as solid as a lower millstone.
  '25':
  - type: text
    content: “When he raises himself up, the mighty are afraid;
  - type: text
    content: Because of the crashing they are bewildered.
  '26':
  - type: text
    content: “The sword that reaches him cannot avail,
  - type: text
    content: Nor [does] the spear, the dart, or the javelin.
  '27':
  - type: text
    content: “He considers iron as straw,
  - type: text
    content: Bronze as rotten wood.
  '28':
  - type: text
    content: “The arrow cannot make him flee;
  - type: text
    content: Slingstones are treated as stubble by him.
  '29':
  - type: text
    content: “Clubs [also] are regarded as stubble;
  - type: text
    content: 'He laughs at the rushing '
  - type: text
    content: and
  - type: text
    content: ' the rattling of the javelin.'
  '3':
  - type: text
    content: “Will he make many supplications to you [begging to be spared]?
  - type: text
    content: Or will he speak soft words to you [to coax you to treat him kindly]?
  '30':
  - type: text
    content: “His underparts are like sharp pieces of broken pottery;
  - type: text
    content: 'He moves across '
  - type: text
    content: and
  - type: text
    content: ' spreads out [grooves] like a threshing sledge on the mire (muddy river banks).'
  '31':
  - type: text
    content: “He makes the deep water boil like a pot;
  - type: text
    content: He makes the sea like a [foaming] pot of ointment.
  '32':
  - type: text
    content: “Behind him he makes a shining wake;
  - type: text
    content: One would think the deep to be gray-haired [with foam].
  '33':
  - type: text
    content: “Upon earth there is nothing like him—no equal exists,
  - type: text
    content: A creature made without fear.
  '34':
  - type: text
    content: “He looks on everything that is high [without terror];
  - type: text
    content: 'He is monarch over all the sons of pride. [And now, Job, '
