  '16':
  - type: text
    content: “One is so near to another
  - type: text
    content: That no air can come between them.
  '17':
  - type: text
    content: “They are joined one to another;
  - type: text
    content: They stick together and cannot be separated.
  '18':
  - type: text
    content: “His sneezes flash forth light,
  - type: text
    content: And his eyes are like the [reddish] eyelids of the dawn.
  '19':
  - type: text
    content: “Out of his mouth go burning torches,
  - type: text
    content: And sparks of fire leap out.
  '2':
