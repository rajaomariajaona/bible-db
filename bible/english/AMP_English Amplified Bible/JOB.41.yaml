document_id: JOB.41,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Power Shown in Creatures
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ch 40:25 in Hebrew.
      marker-yv: yv-n
    - type: text
      text: 'Can you draw out '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the crocodile
        - type: text
          text: . In recent years archeologists have uncovered the remains of crocodiles much larger and far more terrifying than those known today.
      marker-yv: yv-n
    - type: text
      text: Leviathan with a fishhook?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or press down his tongue with a cord?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “No one is so fierce [and foolhardy] that he dares to stir up Leviathan;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who then is he who can stand before Me [or dares to contend with Me, the beast’s creator]?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who has first given to Me that I should repay him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whatever is under the whole heaven is Mine. [Who can have a claim against Me who made the unmastered beast?] [Rom 11:35]
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ¶“I will not keep silence concerning his limbs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor his mighty strength, nor his orderly frame.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Who can penetrate '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' strip off his outer armor?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can come to his jaws with a double bridle?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who can open the doors (jaws) of his face?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Around his [open jaws and] teeth there is terror.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His strong scales are his pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bound together as with a tight seal.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “One is so near to another
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That no air can come between them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They are joined one to another;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stick together and cannot be separated.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His sneezes flash forth light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his eyes are like the [reddish] eyelids of the dawn.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Out of his mouth go burning torches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And sparks of fire leap out.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can you put a rope [made] of rushes into his nose
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or pierce his jaw through with a hook?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Out of his nostrils smoke goes forth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'As from a boiling pot and [as from] '
    - type: usfm
      marker: it
      children:
      - type: text
        text: burning
    - type: text
      text: ' rushes.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His breath kindles coals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a flame goes forth from his mouth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In Leviathan’s neck resides strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And dismay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' terror dance before him.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The folds of his flesh are joined together,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Firm on him and immobile [when he moves].
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His heart is as hard as a stone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, as solid as a lower millstone.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When he raises himself up, the mighty are afraid;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the crashing they are bewildered.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The sword that reaches him cannot avail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor [does] the spear, the dart, or the javelin.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He considers iron as straw,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bronze as rotten wood.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The arrow cannot make him flee;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Slingstones are treated as stubble by him.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Clubs [also] are regarded as stubble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He laughs at the rushing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the rattling of the javelin.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will he make many supplications to you [begging to be spared]?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or will he speak soft words to you [to coax you to treat him kindly]?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His underparts are like sharp pieces of broken pottery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He moves across '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' spreads out [grooves] like a threshing sledge on the mire (muddy river banks).'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He makes the deep water boil like a pot;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the sea like a [foaming] pot of ointment.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behind him he makes a shining wake;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One would think the deep to be gray-haired [with foam].
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Upon earth there is nothing like him—no equal exists,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A creature made without fear.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He looks on everything that is high [without terror];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is monarch over all the sons of pride. [And now, Job, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This repeats the thought of vv 10, 11, which is the key to God’s argument with Job.
      marker-yv: yv-n
    - type: text
      text: who are you who does not dare to disturb the beast, yet who dares resist Me, the beast’s creator? Everything under the heavens is Mine; therefore, who can have a claim against God?]”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Will he make a covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' an arrangement with you?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you take him for your servant forever?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will you play with him as with a bird?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or will you bind him [and put him on a leash] for your maidens?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will traders bargain over him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will they divide him up among the merchants?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can you fill his skin with harpoons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or his head with fishing spears?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Lay your hand on him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember the battle [with him]; you will not do such [an ill-advised thing] again!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ch 41:4 in Hebrew.
      marker-yv: yv-n
    - type: text
      text: 'Behold, his [assailant’s] hope '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' expectation [of defeating Leviathan] is false;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will not one be overwhelmed even at the sight of him?
