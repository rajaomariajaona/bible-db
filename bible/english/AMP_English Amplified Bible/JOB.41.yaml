    content: “No one is so fierce [and foolhardy] that he dares to stir up Leviathan;
  - type: text
    content: Who then is he who can stand before Me [or dares to contend with Me, the beast’s creator]?
  '11':
  - type: text
    content: “Who has first given to Me that I should repay him?
  - type: text
    content: Whatever is under the whole heaven is Mine. [Who can have a claim against Me who made the unmastered beast?] [Rom 11:35]
  '12':
  - type: text
    content: ¶“I will not keep silence concerning his limbs,
  - type: text
    content: Nor his mighty strength, nor his orderly frame.
