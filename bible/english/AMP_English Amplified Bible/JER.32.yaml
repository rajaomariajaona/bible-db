document_id: JER.32,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah Imprisoned
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The word that came to Jeremiah from the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' in the tenth year of Zedekiah king of Judah, which was the eighteenth year of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In Hebrew there are two ways of spelling the name of the ruler of Babylon resulting in two English variations: Nebuchadnezzar and Nebuchadrezzar.'
      marker-yv: yv-n
    - type: text
      text: 'Nebuchadnezzar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I signed the deed and sealed it, and called in witnesses, and weighed out the money on the scales. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I took the deeds of the purchase, both the sealed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: copy containing
    - type: text
      text: ' the terms and conditions, and the unsealed copy; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I gave the purchase deed to Baruch the son of Neriah, the son of Mahseiah, in the sight of Hanamel my uncle’s son and in sight of the witnesses who signed the purchase deed, in the presence of all the Jews who were sitting in the court of the guard. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I commanded Baruch in their presence, saying, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Take these deeds, both this purchase deed which is sealed and this unsealed deed, and put them in an earthen jar, that they may last a long time.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts, the God of Israel, “Houses and fields and vineyards will again be purchased in this land.” ’'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah Prays and God Explains
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now when I had delivered the purchase deed to Baruch the son of Neriah, I prayed to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', saying, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘Ah Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: '! Behold, You have made the heavens and the earth by Your great power and by Your outstretched arm! There is nothing too difficult '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' too wonderful for You— '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You who show lovingkindness to thousands, but repay the wickedness (sin, guilt) of the fathers into the bosom of their children after them [that is, calling the children to account for the sins of their fathers], O great and mighty God; the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' of hosts is His name; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'great [are You] in counsel and mighty in deed, whose eyes are open to all the ways of the sons of men, to reward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' repay each one according to his ways and according to the fruit of his deeds; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now at that time the army of the king of Babylon was besieging Jerusalem, and Jeremiah the prophet was shut up in the court of the guard, which was in the house of the king of Judah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who set signs and wonders in the land of Egypt, and even to this day [continues to do so] both in Israel and among mankind; and You have made a name for Yourself, as at this day. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You brought Your people Israel out of the land of Egypt with signs and wonders, with a strong hand and with an outstretched arm and with great terror; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and gave them this land, which You swore to their forefathers to give them, a land [of plenty] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
      marker-yv: yv-n
    - type: text
      text: 'flowing with milk and honey. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They entered and took possession of it, but they did not obey Your voice or walk in Your law; they have done nothing of all that You commanded them to do. Therefore You have caused all this disaster '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' suffering to come upon them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See the siege ramps [of mounded earth that the enemy has built against the walls]; they have come up to the city to capture it. And the city is given into the hand of the Chaldeans [of Babylon] who fight against it, because of the sword, the famine and the virulent disease [that have overcome the people]. What You have spoken has come to pass, and behold, You see it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet, O Lord G
    - type: usfm
      marker: sc
      children:
      - type: text
        text: od
    - type: text
      text: ', You said to me, “Buy the field with money and get witnesses,” even though the city is given into the hands of the Chaldeans.’ ”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then came the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' to Jeremiah, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Behold, I am the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', the God of all flesh; is there anything too difficult for Me?” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Behold, I am about to give this city into the hand of the Chaldeans and into the hand of Nebuchadnezzar king of Babylon, and he will take it. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Chaldeans who are fighting against this city will come in and set this city on fire and burn it, along with the houses on whose roofs incense has been offered to Baal and drink offerings have been poured out to other gods to provoke Me to anger. [Jer 19:13] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For Zedekiah [the last] king of Judah had locked him up, saying, “Why do you prophesy [disaster] and say, ‘Thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', “Behold, I am giving this city into the hand of the king of Babylon, and he shall take it; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the children of Israel and the children of Judah have done only evil in My sight from their youth; for the children of Israel have been provoking Me to anger by the [idols that are the] work of their hands,” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“From the day that they built it [during the reign of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Solomon was the first king of Israel to participate in idolatry.
      marker-yv: yv-n
    - type: text
      text: 'Solomon], even to this day, this city has been such '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a provocation of
    - type: text
      text: ' My anger and My wrath, that I must remove it from My sight, [1 Kin 11:1-13] '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because of all the evil of the children of Israel and of the children of Judah which they have done to provoke Me to anger—they, their kings, their princes, their priests, their prophets, the men of Judah and the inhabitants of Jerusalem. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have turned their back to Me and not their face; though I taught them repeatedly, yet they would not listen and receive instruction. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they put their detestable things (idols) in the house which is called by My '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note Deut 12:5.
      marker-yv: yv-n
    - type: text
      text: 'Name, to defile it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They built the high places [for worship] of Baal in the Valley of Ben-hinnom (son of Hinnom) to make their sons and their daughters pass through '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the fire
    - type: text
      text: ' to [worship and honor] Molech—which I had not commanded them nor had it entered My mind that they should do this repulsive thing, to cause Judah to sin. [Jer 7:30, 31]'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now therefore thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' God of Israel concerning this city of which you say, ‘It is given into the hand of the king of Babylon by sword and by famine and by virulent disease.’ '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Behold, I will gather them out of all countries to which I have driven them in My anger, in My wrath and in great indignation; and I will bring them back to this place and make them live in safety. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will be My people, and I will be their God; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I will give them one heart and one way, that they may [reverently] fear Me forever, for their own good and for the good of their children after them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Zedekiah king of Judah will not escape from the hand of the '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ruling tribe in Babylonia.
      marker-yv: yv-n
    - type: text
      text: 'Chaldeans, but he will surely be given into the hand of the king of Babylon, and he will speak with him face to face and see him eye to eye; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make an everlasting covenant with them that I will do them good and not turn away from them; and I will put in their heart a fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' reverential awe of Me, so that they will not turn away from Me. [Jer 31:31-34] '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will rejoice over them to do them good, and I will faithfully plant them in this land with all My heart and with all My soul. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For thus says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', ‘Just as I have brought all this great disaster on this people, so I am going to bring on them all the good that I am promising them. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fields will be bought in this land of which you say, “It is desolate, without man or animal; it is given into the hands of the Chaldeans.” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People will buy fields for money, sign deeds, seal them, and call in witnesses in the land of Benjamin, in the places around Jerusalem, in the cities of Judah, in the cities of the hill country, in the cities of the lowland, and in the cities of the South (the Negev); for I will restore their fortunes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' release them from exile,’ says the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he will lead Zedekiah to Babylon, and he will be there until I visit him [for evaluation and judgment],” says the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: . “If you fight against the Chaldeans, you will not succeed” ’?” [Jer 21:3-7; 34:2-5; 37:17; 52:7-14]
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Jeremiah [answered King Zedekiah and] said, “The word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' came to me, saying, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Behold (listen carefully), Hanamel the son of Shallum your uncle is coming to you, saying, “Buy my field that is in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:1.
      marker-yv: yv-n
    - type: text
      text: 'Anathoth, for you have the right of redemption to buy it [in accordance with the law].” ’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Hanamel my uncle’s son came to me in the court of the guard in accordance with the word of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and he said to me, ‘Please buy my field that is at Anathoth, which is in the land of Benjamin, for you have the right of inheritance and the redemption is yours; buy it for yourself.’ Then I knew that this was the word of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I bought the field that was at Anathoth from Hanamel my uncle’s son, and weighed out the money for him, seventeen shekels of silver. '
