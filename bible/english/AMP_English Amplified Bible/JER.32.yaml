document_id: JER.32,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Imprisoned
  - type: text
    content: The word that came to Jeremiah from the L
  - type: heading
    content: ord
  - type: text
    content: ' in the tenth year of Zedekiah king of Judah, which was the eighteenth year of '
  - type: note
    content: 'In Hebrew there are two ways of spelling the name of the ruler of Babylon resulting in two English variations: Nebuchadnezzar and Nebuchadrezzar.'
  - type: text
    content: 'Nebuchadnezzar. '
  '10':
  - type: text
    content: 'I signed the deed and sealed it, and called in witnesses, and weighed out the money on the scales. '
  '11':
  - type: text
    content: 'So I took the deeds of the purchase, both the sealed '
  - type: text
    content: copy containing
  - type: text
    content: ' the terms and conditions, and the unsealed copy; '
  '12':
  - type: text
    content: 'and I gave the purchase deed to Baruch the son of Neriah, the son of Mahseiah, in the sight of Hanamel my uncle’s son and in sight of the witnesses who signed the purchase deed, in the presence of all the Jews who were sitting in the court of the guard. '
  '13':
  - type: text
    content: 'And I commanded Baruch in their presence, saying, '
  '14':
  - type: text
    content: ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Take these deeds, both this purchase deed which is sealed and this unsealed deed, and put them in an earthen jar, that they may last a long time.” '
  '15':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts, the God of Israel, “Houses and fields and vineyards will again be purchased in this land.” ’'
  - type: heading
    content: Jeremiah Prays and God Explains
  '16':
  - type: text
    content: “Now when I had delivered the purchase deed to Baruch the son of Neriah, I prayed to the L
  - type: heading
    content: ord
  - type: text
    content: ', saying, '
  '17':
  - type: text
    content: ‘Ah Lord G
  - type: heading
    content: od
  - type: text
    content: '! Behold, You have made the heavens and the earth by Your great power and by Your outstretched arm! There is nothing too difficult '
  - type: text
    content: or
  - type: text
    content: ' too wonderful for You— '
  '18':
  - type: text
    content: You who show lovingkindness to thousands, but repay the wickedness (sin, guilt) of the fathers into the bosom of their children after them [that is, calling the children to account for the sins of their fathers], O great and mighty God; the L
  - type: heading
    content: ord
  - type: text
    content: ' of hosts is His name; '
  '19':
  - type: text
    content: 'great [are You] in counsel and mighty in deed, whose eyes are open to all the ways of the sons of men, to reward '
  - type: text
    content: or
  - type: text
    content: ' repay each one according to his ways and according to the fruit of his deeds; '
  '2':
  - type: text
    content: 'Now at that time the army of the king of Babylon was besieging Jerusalem, and Jeremiah the prophet was shut up in the court of the guard, which was in the house of the king of Judah. '
  '20':
  - type: text
    content: 'who set signs and wonders in the land of Egypt, and even to this day [continues to do so] both in Israel and among mankind; and You have made a name for Yourself, as at this day. '
  '21':
  - type: text
    content: 'You brought Your people Israel out of the land of Egypt with signs and wonders, with a strong hand and with an outstretched arm and with great terror; '
  '22':
  - type: text
    content: 'and gave them this land, which You swore to their forefathers to give them, a land [of plenty] '
  - type: note
    content: This phrase referred to the abundant fertility of the land of Canaan. Milk (typically that of goats and sheep) was associated with abundance; “honey” referred mainly to syrups made from dates or grapes and was the epitome of sweetness. Bees’ honey was very rare and was considered the choicest of foods.
  - type: text
    content: 'flowing with milk and honey. '
  '23':
  - type: text
    content: 'They entered and took possession of it, but they did not obey Your voice or walk in Your law; they have done nothing of all that You commanded them to do. Therefore You have caused all this disaster '
  - type: text
    content: and
  - type: text
    content: ' suffering to come upon them. '
  '24':
  - type: text
    content: 'See the siege ramps [of mounded earth that the enemy has built against the walls]; they have come up to the city to capture it. And the city is given into the hand of the Chaldeans [of Babylon] who fight against it, because of the sword, the famine and the virulent disease [that have overcome the people]. What You have spoken has come to pass, and behold, You see it. '
  '25':
  - type: text
    content: Yet, O Lord G
  - type: heading
    content: od
  - type: text
    content: ', You said to me, “Buy the field with money and get witnesses,” even though the city is given into the hands of the Chaldeans.’ ”'
  '26':
  - type: text
    content: Then came the word of the L
  - type: heading
    content: ord
  - type: text
    content: ' to Jeremiah, saying, '
  '27':
  - type: text
    content: “Behold, I am the L
  - type: heading
    content: ord
  - type: text
    content: ', the God of all flesh; is there anything too difficult for Me?” '
  '28':
  - type: text
    content: Therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold, I am about to give this city into the hand of the Chaldeans and into the hand of Nebuchadnezzar king of Babylon, and he will take it. '
  '29':
  - type: text
    content: 'The Chaldeans who are fighting against this city will come in and set this city on fire and burn it, along with the houses on whose roofs incense has been offered to Baal and drink offerings have been poured out to other gods to provoke Me to anger. [Jer 19:13] '
  '3':
  - type: text
    content: For Zedekiah [the last] king of Judah had locked him up, saying, “Why do you prophesy [disaster] and say, ‘Thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', “Behold, I am giving this city into the hand of the king of Babylon, and he shall take it; '
  '30':
  - type: text
    content: For the children of Israel and the children of Judah have done only evil in My sight from their youth; for the children of Israel have been provoking Me to anger by the [idols that are the] work of their hands,” says the L
  - type: heading
    content: ord
  - type: text
    content: '. '
  '31':
  - type: text
    content: '“From the day that they built it [during the reign of '
  - type: note
    content: Solomon was the first king of Israel to participate in idolatry.
  - type: text
    content: 'Solomon], even to this day, this city has been such '
  - type: text
    content: a provocation of
  - type: text
    content: ' My anger and My wrath, that I must remove it from My sight, [1 Kin 11:1-13] '
  '32':
  - type: text
    content: 'because of all the evil of the children of Israel and of the children of Judah which they have done to provoke Me to anger—they, their kings, their princes, their priests, their prophets, the men of Judah and the inhabitants of Jerusalem. '
  '33':
  - type: text
    content: 'They have turned their back to Me and not their face; though I taught them repeatedly, yet they would not listen and receive instruction. '
  '34':
  - type: text
    content: 'But they put their detestable things (idols) in the house which is called by My '
  - type: note
    content: See note Deut 12:5.
  - type: text
    content: 'Name, to defile it. '
  '35':
  - type: text
    content: 'They built the high places [for worship] of Baal in the Valley of Ben-hinnom (son of Hinnom) to make their sons and their daughters pass through '
  - type: text
    content: the fire
  - type: text
    content: ' to [worship and honor] Molech—which I had not commanded them nor had it entered My mind that they should do this repulsive thing, to cause Judah to sin. [Jer 7:30, 31]'
  '36':
  - type: text
    content: “Now therefore thus says the L
  - type: heading
    content: ord
  - type: text
    content: ' God of Israel concerning this city of which you say, ‘It is given into the hand of the king of Babylon by sword and by famine and by virulent disease.’ '
  '37':
  - type: text
    content: 'Behold, I will gather them out of all countries to which I have driven them in My anger, in My wrath and in great indignation; and I will bring them back to this place and make them live in safety. '
  '38':
  - type: text
    content: 'They will be My people, and I will be their God; '
  '39':
  - type: text
    content: 'and I will give them one heart and one way, that they may [reverently] fear Me forever, for their own good and for the good of their children after them. '
  '4':
  - type: text
    content: 'and Zedekiah king of Judah will not escape from the hand of the '
  - type: note
    content: The ruling tribe in Babylonia.
  - type: text
    content: 'Chaldeans, but he will surely be given into the hand of the king of Babylon, and he will speak with him face to face and see him eye to eye; '
  '40':
  - type: text
    content: 'I will make an everlasting covenant with them that I will do them good and not turn away from them; and I will put in their heart a fear '
  - type: text
    content: and
  - type: text
    content: ' reverential awe of Me, so that they will not turn away from Me. [Jer 31:31-34] '
  '41':
  - type: text
    content: 'I will rejoice over them to do them good, and I will faithfully plant them in this land with all My heart and with all My soul. '
  '42':
  - type: text
    content: For thus says the L
  - type: heading
    content: ord
  - type: text
    content: ', ‘Just as I have brought all this great disaster on this people, so I am going to bring on them all the good that I am promising them. '
  '43':
  - type: text
    content: 'Fields will be bought in this land of which you say, “It is desolate, without man or animal; it is given into the hands of the Chaldeans.” '
  '44':
  - type: text
    content: 'People will buy fields for money, sign deeds, seal them, and call in witnesses in the land of Benjamin, in the places around Jerusalem, in the cities of Judah, in the cities of the hill country, in the cities of the lowland, and in the cities of the South (the Negev); for I will restore their fortunes '
  - type: text
    content: and
  - type: text
    content: ' release them from exile,’ says the L'
  - type: heading
    content: ord
  - type: text
    content: .”
  '5':
  - type: text
    content: and he will lead Zedekiah to Babylon, and he will be there until I visit him [for evaluation and judgment],” says the L
  - type: heading
    content: ord
  - type: text
    content: . “If you fight against the Chaldeans, you will not succeed” ’?” [Jer 21:3-7; 34:2-5; 37:17; 52:7-14]
  '6':
  - type: text
    content: And Jeremiah [answered King Zedekiah and] said, “The word of the L
  - type: heading
    content: ord
  - type: text
    content: ' came to me, saying, '
  '7':
  - type: text
    content: '‘Behold (listen carefully), Hanamel the son of Shallum your uncle is coming to you, saying, “Buy my field that is in '
  - type: note
    content: See note 1:1.
  - type: text
    content: 'Anathoth, for you have the right of redemption to buy it [in accordance with the law].” ’ '
  '8':
  - type: text
    content: Then Hanamel my uncle’s son came to me in the court of the guard in accordance with the word of the L
  - type: heading
    content: ord
  - type: text
    content: ', and he said to me, ‘Please buy my field that is at Anathoth, which is in the land of Benjamin, for you have the right of inheritance and the redemption is yours; buy it for yourself.’ Then I knew that this was the word of the L'
  - type: heading
    content: ord
  - type: text
    content: .
  '9':
  - type: text
    content: '“I bought the field that was at Anathoth from Hanamel my uncle’s son, and weighed out the money for him, seventeen shekels of silver. '
