document_id: PRO.26,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Similitudes, Instructions
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like snow in summer and like rain in harvest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So honor is not fitting for a [shortsighted] '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note 1:7.
      marker-yv: yv-n
    - type: text
      text: fool. [Is 32:6]
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a [careless] archer who [shoots arrows wildly and] wounds everyone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is he who hires a fool or those who [by chance just] pass by.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a dog that returns to his vomit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is a fool who repeats his foolishness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do you see a man [who is unteachable and] wise in his own eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' full of self-conceit?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is more hope for a fool than for him. [Prov 29:20; Luke 18:11; Rom 12:16; Rev 3:17]
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lazy person [who is self-indulgent and relies on lame excuses] says, “There is a lion in the road!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lion is in the open square [and if I go outside to work I will be killed]!” [Prov 22:13]
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the door turns on its hinges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So does the lazy person on his bed [never getting out of it].
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lazy person buries his hand in the dish [losing opportunity after opportunity];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It wearies him to bring it back to his mouth. [Prov 19:24]
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lazy person is wiser in his own eyes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Than seven [sensible] men who can give a discreet answer.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like one who grabs a dog by the ears [and is likely to be bitten]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is he who, passing by, stops to meddle with a dispute that is none of his business.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a madman who throws
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Firebrands, arrows, and death,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is the man who deceives his neighbor (acquaintance, friend)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then says, “Was I not joking?” [Eph 5:4]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the sparrow in her wandering, like the swallow in her flying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So the curse without cause does not come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' alight [on the undeserving]. [Num 23:8]'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For lack of wood the fire goes out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And where there is no whisperer [who gossips], contention quiets down.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like charcoal to hot embers and wood to fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is a contentious man to kindle strife. [Prov 15:18; 29:22]
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of a whisperer (gossip) are like dainty morsels [to be greedily eaten];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They go down into the innermost chambers of the body [to be remembered and mused upon]. [Prov 18:8]
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a [common] clay vessel covered with the silver dross [making it appear silver when it has no real value]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are burning lips [murmuring manipulative words] and a wicked heart.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who hates, disguises it with his lips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he stores up deceit in his heart.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When he speaks graciously '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' kindly [to conceal his malice], do not trust him,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For seven abominations are in his heart.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Though his
    - type: text
      text: ' hatred covers itself with guile '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' deceit,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His malevolence will be revealed openly before the assembly.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever digs a pit [for another man’s feet] will fall into it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he who rolls a stone [up a hill to do mischief], it will come back on him. [Ps 7:15, 16; 9:15; 10:2; 57:6; Prov 28:10; Eccl 10:8]
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A lying tongue hates those it wounds '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' crushes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a flattering mouth works ruin.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A whip for the horse, a bridle for the donkey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a rod for the backs of fools [who refuse to learn].
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not answer [nor pretend to agree with the frivolous comments of] a [closed-minded] fool according to his folly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise you, even you, will be like him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Answer [and correct the erroneous concepts of] a fool according to his folly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Otherwise he will be wise in his own eyes [if he thinks you agree with him]. [Matt 16:1-4; 21:24-27]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who sends a message by the hand of a fool
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cuts off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his own
    - type: text
      text: ' feet (sabotages himself) and drinks the violence [it brings on himself as a consequence]. [Prov 13:17]'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the legs which are useless to the lame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is a proverb in the mouth of a fool [who cannot learn from its wisdom].
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like one who [absurdly] binds a stone in a sling [making it impossible to throw],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is he who [absurdly] gives honor to a fool.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a thorn that goes [without being felt] into the hand of a drunken man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So is a proverb in the mouth of a fool [who remains unaffected by its wisdom].
