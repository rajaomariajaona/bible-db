document_id: 1CH.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Genealogy: Twelve Sons of Jacob (Israel)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are the sons of Israel: Reuben, Simeon, Levi, Judah, Issachar, Zebulun, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dan, Joseph, Benjamin, Naphtali, Gad, and Asher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Judah: Er, Onan, and Shelah; the three were born to him by Shua’s daughter the Canaanitess. Er, Judah’s eldest, was evil in the L'
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ’
  - type: usfm
    marker: sc
    children:
    - type: text
      text: s
  - type: text
    text: ' sight, and He put him to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamar, Judah’s daughter-in-law, bore him Perez and Zerah. Judah’s sons were five in all. [Gen 38]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The sons of Perez: Hezron and Hamul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The sons of Zerah: Zimri, Ethan, Heman, Calcol, and Dara—five in all. [1 Kin 4:31] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The son of Carmi: Achar, the troubler of Israel, who violated the ban [by taking things from Jericho that had been banned]. [Josh 7:1] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The son of Ethan: Azariah.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Genealogy of David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Hezron who were born to him: Jerahmeel, Ram, and Chelubai [that is, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This Caleb (Chelubai) son of Hezron is not to be confused with Caleb (son of Jephunneh) the companion of Joshua.
    marker-yv: yv-n
  - type: text
    text: 'Caleb]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ram became the father of Amminadab, and Amminadab became the father of Nahshon, leader of the sons of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nahshon became the father of Salma, Salma became the father of Boaz, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Boaz became the father of Obed, and Obed became the father of Jesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesse became the father of Eliab his firstborn, Abinadab the second, Shimea the third, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nethanel the fourth, Raddai the fifth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ozem the sixth, David the seventh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Their sisters were Zeruiah and Abigail. The sons of Zeruiah: Abishai, Joab, and Asahel, three. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Abigail gave birth to Amasa, and the father of Amasa was Jether the Ishmaelite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And Caleb the son of Hezron had sons by his wife Azubah and by Jerioth. Azubah’s sons were: Jesher, Shobab, and Ardon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Azubah died, and Caleb married Ephrath, who bore him Hur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hur became the father of Uri, and Uri became the father of Bezalel [the skillful craftsman who made the furnishings of the tabernacle]. [Ex 31:2-5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Later, when Hezron was sixty years old, he married the daughter of Machir the father of Gilead, and she bore him Segub. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Segub became the father of Jair, who [later] had twenty-three cities in the land of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But Geshur and Aram took from them Havvoth-jair, with Kenath and its villages, sixty towns '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in all
  - type: text
    text: '. All these were the sons (descendants) of Machir, the father of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: After Hezron died in Caleb-ephrathah, Abijah, Hezron’s wife, bore him Ashhur the father of Tekoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The sons of Jerahmeel the firstborn of Hezron: Ram the firstborn, Bunah, Oren, Ozem, and Ahijah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jerahmeel had another wife, named Atarah; she was the mother of Onam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Ram the firstborn of Jerahmeel were: Maaz, Jamin, and Eker. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The sons of Onam: Shammai and Jada. The sons of Shammai: Nadab and Abishur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The name of Abishur’s wife was Abihail; she bore him Ahban and Molid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The sons of Nadab: Seled and Appaim. Seled died childless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The son of Appaim: Ishi. The son of Ishi: Sheshan. The son of Sheshan: Ahlai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The sons of Jada the brother of Shammai: Jether and Jonathan. Jether died childless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The sons of Jonathan: Peleth and Zaza. These were the sons (descendants) of Jerahmeel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Sheshan had no sons—only daughters. But Sheshan had a servant, an Egyptian, whose name was Jarha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'So Sheshan gave his daughter to Jarha his servant as a wife; she bore him Attai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Attai became the father of Nathan, and Nathan became the father of Zabad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Zabad became the father of Ephlal, and Ephlal became the father of Obed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Obed became the father of Jehu, and Jehu became the father of Azariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Azariah became the father of Helez, and Helez became the father of Eleasah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Eleasah became the father of Sismai, and Sismai became the father of Shallum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Shallum became the father of Jekamiah, and Jekamiah became the father of Elishama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The sons of Caleb, the brother of Jerahmeel: Mesha his firstborn was the father of Ziph; and his son Mareshah was the father of Hebron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The sons of Hebron: Korah, Tappuah, Rekem, and Shema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Shema became the father of Raham, the father of Jorkeam. And Rekem became the father of Shammai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'The son of Shammai was Maon; Maon became the father of Bethzur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ephah, Caleb’s '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See note Gen 22:24.
    marker-yv: yv-n
  - type: text
    text: 'concubine, gave birth to Haran, Moza, and Gazez; Haran became the father of Gazez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The sons of Jahdai: Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Maacah, Caleb’s concubine, gave birth to Sheber and Tirhanah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'She also bore Shaaph the father of Madmannah and Sheva the father of Machbena and of Gibea; and the daughter of Caleb was Achsah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: These were the sons (descendants) of Caleb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: T
  - type: text
    text: 'he sons of Hur, the firstborn of Ephrathah: Shobal the father of Kiriath-jearim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Salma the father of Bethlehem and Hareph the father of Beth-gader. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Shobal the father of Kiriath-jearim had [other] sons (descendants): Haroeh, half of the Manahathites [in Judah], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'and the families of Kiriath-jearim: the Ithrites, Puthites, Shumathites, and Mishraites. From these came the Zorathites and the Eshtaolites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'The sons (descendants) of Salma: Bethlehem, the Netophathites, Atroth-beth-joab, and half of the Manahathites, the Zorites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'The families of scribes who lived at Jabez: the Tirathites, Shimeathites, and Sucathites. These are the Kenites who came from Hammath, the father of the house of Rechab.'
