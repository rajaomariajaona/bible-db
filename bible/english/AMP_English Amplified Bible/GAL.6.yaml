document_id: GAL.6,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Bear One Another’s Burdens
  - type: text
    content: 'Brothers, if anyone is caught in any sin, you who are spiritual [that is, you who are responsive to the guidance of the Spirit] are to restore such a person in a spirit of gentleness [not with a sense of superiority or self-righteousness], keeping a watchful eye on yourself, so that you are not tempted as well. '
  '10':
  - type: text
    content: So then, while we [as individual believers] have the opportunity, let us do good to all people [not only being helpful, but also doing that which promotes their spiritual well-being], and especially [be a blessing] to those of the household of faith (born-again believers).
  '11':
  - type: text
    content: 'See with what '
  - type: note
    content: 'Paul frequently dictated his letters to a secretary (such as Tertius, Rom 16:22). In this case, however, he applied the ink himself. His reference to “large letters” has been variously interpreted: (1) Paul may have been using large print for emphasis; or (2) Paul may have been referring to some problem with his vision (cf 4:15).'
  - type: text
    content: 'large letters I '
  - type: note
    content: Or I have written.
  - type: text
    content: 'am writing to you with my own hand. '
  '12':
  - type: text
    content: 'Those who want to make a good impression in public [before the Jews] try to compel you to be circumcised, just so they will escape being persecuted for [faithfulness to] the cross of Christ. '
  '13':
  - type: text
    content: 'For even the circumcised [Jews] themselves do not [really] keep the Law, but they want to have you circumcised so that they may boast in your flesh [that is, in the fact that they convinced you to be circumcised]. '
  '14':
  - type: text
    content: 'But far be it from me to boast [in anything or anyone], except in the cross of our Lord Jesus Christ, through whom the world has been crucified to me, and I to the world. '
  '15':
  - type: text
    content: 'For neither is circumcision anything [of any importance], nor uncircumcision, but [only] a new creation [which is the result of a new birth—a spiritual transformation—a new nature in Christ Jesus]. '
  '16':
  - type: text
    content: Peace and mercy be upon all who walk by this rule [who discipline themselves and conduct their lives by this principle], and upon the [true] Israel of God (Jewish believers). [Ps 125:5]
  '17':
  - type: text
    content: 'From now on let no one trouble me [by making it necessary for me to justify my authority as an apostle, and the absolute truth of the gospel], for I bear on my body the '
  - type: note
    content: Gr stigmata.
  - type: text
    content: branding-marks of Jesus [the wounds, scars, and other outward evidence of persecutions—these testify to His ownership of me].
  '18':
  - type: text
    content: 'The grace of our Lord Jesus Christ be with your spirit, my '
  - type: note
    content: Lit brethren.
  - type: text
    content: brothers and sisters. Amen.
  '2':
  - type: text
    content: 'Carry one another’s burdens and in this way you will fulfill the requirements of the law of Christ [that is, the law of Christian love]. [John 13:34] '
  '3':
  - type: text
    content: 'For if anyone thinks he is something [special] when [in fact] he is nothing [special except in his own eyes], he deceives himself. '
  '4':
  - type: text
    content: 'But each one must carefully scrutinize his own work [examining his actions, attitudes, and behavior], and then he can have the personal satisfaction and inner joy of doing something commendable '
  - type: note
    content: Lit to himself alone and not to.
  - type: text
    content: 'without comparing himself to another. '
  '5':
  - type: text
    content: For every person will have to bear [with patience] his own burden [of faults and shortcomings for which he alone is responsible].
  '6':
  - type: text
    content: 'The one who is taught the word [of God] is to share all good things with his teacher [contributing to his spiritual and material support]. '
  '7':
  - type: text
    content: 'Do not be deceived, God is not mocked [He will not allow Himself to be ridiculed, nor treated with contempt nor allow His precepts to be scornfully set aside]; for whatever a man sows, this '
  - type: text
    content: and
  - type: text
    content: ' this only is what he will reap. '
  '8':
  - type: text
    content: 'For the one who sows to his flesh [his sinful capacity, his worldliness, his disgraceful impulses] will reap from the flesh ruin '
  - type: text
    content: and
  - type: text
    content: ' destruction, but the one who sows to the Spirit will from the Spirit reap eternal life. '
  '9':
  - type: text
    content: 'Let us not grow weary '
  - type: text
    content: or
  - type: text
    content: ' become discouraged in doing good, for at the proper time we will reap, if we do not give in. '
