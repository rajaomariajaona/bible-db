document_id: GAL.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Bear One Another’s Burdens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Brothers, if anyone is caught in any sin, you who are spiritual [that is, you who are responsive to the guidance of the Spirit] are to restore such a person in a spirit of gentleness [not with a sense of superiority or self-righteousness], keeping a watchful eye on yourself, so that you are not tempted as well. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Carry one another’s burdens and in this way you will fulfill the requirements of the law of Christ [that is, the law of Christian love]. [John 13:34] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For if anyone thinks he is something [special] when [in fact] he is nothing [special except in his own eyes], he deceives himself. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But each one must carefully scrutinize his own work [examining his actions, attitudes, and behavior], and then he can have the personal satisfaction and inner joy of doing something commendable '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: to himself alone and not to
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'without comparing himself to another. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For every person will have to bear [with patience] his own burden [of faults and shortcomings for which he alone is responsible].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The one who is taught the word [of God] is to share all good things with his teacher [contributing to his spiritual and material support]. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do not be deceived, God is not mocked [He will not allow Himself to be ridiculed, nor treated with contempt nor allow His precepts to be scornfully set aside]; for whatever a man sows, this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' this only is what he will reap. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the one who sows to his flesh [his sinful capacity, his worldliness, his disgraceful impulses] will reap from the flesh ruin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' destruction, but the one who sows to the Spirit will from the Spirit reap eternal life. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Let us not grow weary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' become discouraged in doing good, for at the proper time we will reap, if we do not give in. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So then, while we [as individual believers] have the opportunity, let us do good to all people [not only being helpful, but also doing that which promotes their spiritual well-being], and especially [be a blessing] to those of the household of faith (born-again believers).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'See with what '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul frequently dictated his letters to a secretary (such as Tertius, Rom 16:22). In this case, however, he applied the ink himself. His reference to “large letters” has been variously interpreted: (1) Paul may have been using large print for emphasis; or (2) Paul may have been referring to some problem with his vision (cf 4:15).'
    marker-yv: yv-n
  - type: text
    text: 'large letters I '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
      - type: usfm
        marker: it
        children:
        - type: text
          text: I have written
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'am writing to you with my own hand. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Those who want to make a good impression in public [before the Jews] try to compel you to be circumcised, just so they will escape being persecuted for [faithfulness to] the cross of Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For even the circumcised [Jews] themselves do not [really] keep the Law, but they want to have you circumcised so that they may boast in your flesh [that is, in the fact that they convinced you to be circumcised]. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But far be it from me to boast [in anything or anyone], except in the cross of our Lord Jesus Christ, through whom the world has been crucified to me, and I to the world. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For neither is circumcision anything [of any importance], nor uncircumcision, but [only] a new creation [which is the result of a new birth—a spiritual transformation—a new nature in Christ Jesus]. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Peace and mercy be upon all who walk by this rule [who discipline themselves and conduct their lives by this principle], and upon the [true] Israel of God (Jewish believers). [Ps 125:5]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'From now on let no one trouble me [by making it necessary for me to justify my authority as an apostle, and the absolute truth of the gospel], for I bear on my body the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gr '
      - type: usfm
        marker: it
        children:
        - type: text
          text: stigmata
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: branding-marks of Jesus [the wounds, scars, and other outward evidence of persecutions—these testify to His ownership of me].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The grace of our Lord Jesus Christ be with your spirit, my '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brethren
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: brothers and sisters. Amen.
