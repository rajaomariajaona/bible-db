document_id: PHP.4,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Think of Excellence
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: fellow believers, whom I love and long for, my delight and crown [my wreath of victory], in this way stand firm in the Lord, my beloved.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I rejoiced greatly in the Lord, that now at last you have renewed your concern for me; indeed, you were concerned about me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before,
    - type: text
      text: ' but you had no opportunity to show it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not that I speak from [any personal] need, for I have learned to be content [and self-sufficient through Christ, satisfied to the point where I am not disturbed or uneasy] regardless of my circumstances. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know how to get along and live humbly [in difficult times], and I also know how to enjoy abundance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' live in prosperity. In any and every circumstance I have learned the secret [of facing life], whether well-fed or going hungry, whether having an abundance or being in need. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I can do all things [which He has called me to do] through Him who strengthens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' empowers me [to fulfill His purpose—I am self-sufficient in Christ’s sufficiency; I am ready for anything and equal to anything through Him who infuses me with inner strength and confident peace.] '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nevertheless, it was right of you to share [with me] in my difficulties.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you Philippians know that in the early days of preaching the gospel, after I left Macedonia, no church shared with me in the matter of '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used here was commonly used in financial transactions referring to payments or installments.
      marker-yv: yv-n
    - type: text
      text: 'giving and receiving except you alone; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for even in Thessalonica you sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a gift
    - type: text
      text: ' more than once for my needs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not that I seek the gift itself, but I do seek the profit which increases to your [heavenly] account [the blessing which is accumulating for you]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I have received everything in full and more; I am amply supplied, having received from Epaphroditus the gifts you sent me. They are the fragrant aroma of an offering, an acceptable sacrifice which God welcomes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' in which He delights. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And my God will liberally supply (fill until full) your every need according to His riches in glory in Christ Jesus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I urge Euodia and I urge Syntyche to agree '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' to work in harmony in the Lord. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To our God and Father be the glory '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: to the ages of the ages
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: forever and ever. Amen.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember me to every '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Every born-again believer (saint) has been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
      marker-yv: yv-n
    - type: text
      text: 'saint in Christ Jesus. The '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'brothers who are with me greet you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: the saints
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: God’s people wish to be remembered to you, especially those of Caesar’s household.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indeed, I ask you too, my true companion, to help these women [to keep on cooperating], for they have shared my struggle in the [cause of the] gospel, together with Clement and the rest of my fellow workers, whose names are in the Book of Life. [Dan 12:1; Mal 3:16, 17; Rev 3:5; 21:27]
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejoice in the Lord always [delight, take pleasure in Him]; again I will say, rejoice! [Ps 37:4] '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let your gentle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spirit
    - type: text
      text: ' [your graciousness, unselfishness, mercy, tolerance, and patience] be known to all people. The Lord is near. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be anxious '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' worried about anything, but in everything [every circumstance and situation] by prayer and petition with thanksgiving, continue to make your [specific] requests known to God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the peace of God [that peace which reassures the heart, that peace] which transcends all understanding, [that peace which] stands guard over your hearts and your minds in Christ Jesus [is yours]. [John 14:27]
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: brethren
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'believers, whatever is true, whatever is honorable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' worthy of respect, whatever is right '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' confirmed by God’s word, whatever is pure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wholesome, whatever is lovely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brings peace, whatever is admirable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' of good repute; if there is any excellence, if there is anything worthy of praise, think '
    - type: usfm
      marker: it
      children:
      - type: text
        text: continually
    - type: text
      text: ' on these things [center your mind on them, and implant them in your heart]. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The things which you have learned and received and heard and seen in me, practice these things [in daily life], and the God [who is the source] of peace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' well-being will be with you.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s Provisions
    marker-yv: yv-h
