document_id: PHP.4,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Think of Excellence
  - type: text
    content: 'Therefore, my '
  - type: note
    content: Lit brethren.
  - type: text
    content: fellow believers, whom I love and long for, my delight and crown [my wreath of victory], in this way stand firm in the Lord, my beloved.
  '10':
  - type: text
    content: 'I rejoiced greatly in the Lord, that now at last you have renewed your concern for me; indeed, you were concerned about me '
  - type: text
    content: before,
  - type: text
    content: ' but you had no opportunity to show it. '
  '11':
  - type: text
    content: 'Not that I speak from [any personal] need, for I have learned to be content [and self-sufficient through Christ, satisfied to the point where I am not disturbed or uneasy] regardless of my circumstances. '
  '12':
  - type: text
    content: 'I know how to get along and live humbly [in difficult times], and I also know how to enjoy abundance '
  - type: text
    content: and
  - type: text
    content: ' live in prosperity. In any and every circumstance I have learned the secret [of facing life], whether well-fed or going hungry, whether having an abundance or being in need. '
  '13':
  - type: text
    content: 'I can do all things [which He has called me to do] through Him who strengthens '
  - type: text
    content: and
  - type: text
    content: ' empowers me [to fulfill His purpose—I am self-sufficient in Christ’s sufficiency; I am ready for anything and equal to anything through Him who infuses me with inner strength and confident peace.] '
  '14':
  - type: text
    content: Nevertheless, it was right of you to share [with me] in my difficulties.
  '15':
  - type: text
    content: 'And you Philippians know that in the early days of preaching the gospel, after I left Macedonia, no church shared with me in the matter of '
  - type: note
    content: The word used here was commonly used in financial transactions referring to payments or installments.
  - type: text
    content: 'giving and receiving except you alone; '
  '16':
  - type: text
    content: 'for even in Thessalonica you sent '
  - type: text
    content: a gift
  - type: text
    content: ' more than once for my needs. '
  '17':
  - type: text
    content: 'Not that I seek the gift itself, but I do seek the profit which increases to your [heavenly] account [the blessing which is accumulating for you]. '
  '18':
  - type: text
    content: 'But I have received everything in full and more; I am amply supplied, having received from Epaphroditus the gifts you sent me. They are the fragrant aroma of an offering, an acceptable sacrifice which God welcomes '
  - type: text
    content: and
  - type: text
    content: ' in which He delights. '
  '19':
  - type: text
    content: 'And my God will liberally supply (fill until full) your every need according to His riches in glory in Christ Jesus. '
  '2':
  - type: text
    content: 'I urge Euodia and I urge Syntyche to agree '
  - type: text
    content: and
  - type: text
    content: ' to work in harmony in the Lord. '
  '20':
  - type: text
    content: 'To our God and Father be the glory '
  - type: note
    content: Lit to the ages of the ages.
  - type: text
    content: forever and ever. Amen.
  '21':
  - type: text
    content: 'Remember me to every '
  - type: note
    content: Every born-again believer (saint) has been reborn from above—spiritually transformed, renewed, made holy and set apart for God’s purpose.
  - type: text
    content: 'saint in Christ Jesus. The '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'brothers who are with me greet you. '
  '22':
  - type: text
    content: 'All '
  - type: note
    content: Lit the saints.
  - type: text
    content: God’s people wish to be remembered to you, especially those of Caesar’s household.
  '23':
  - type: text
    content: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: text
    content: Indeed, I ask you too, my true companion, to help these women [to keep on cooperating], for they have shared my struggle in the [cause of the] gospel, together with Clement and the rest of my fellow workers, whose names are in the Book of Life. [Dan 12:1; Mal 3:16, 17; Rev 3:5; 21:27]
  '4':
  - type: text
    content: 'Rejoice in the Lord always [delight, take pleasure in Him]; again I will say, rejoice! [Ps 37:4] '
  '5':
  - type: text
    content: 'Let your gentle '
  - type: text
    content: spirit
  - type: text
    content: ' [your graciousness, unselfishness, mercy, tolerance, and patience] be known to all people. The Lord is near. '
  '6':
  - type: text
    content: 'Do not be anxious '
  - type: text
    content: or
  - type: text
    content: ' worried about anything, but in everything [every circumstance and situation] by prayer and petition with thanksgiving, continue to make your [specific] requests known to God. '
  '7':
  - type: text
    content: And the peace of God [that peace which reassures the heart, that peace] which transcends all understanding, [that peace which] stands guard over your hearts and your minds in Christ Jesus [is yours]. [John 14:27]
  '8':
  - type: text
    content: 'Finally, '
  - type: note
    content: Lit brethren.
  - type: text
    content: 'believers, whatever is true, whatever is honorable '
  - type: text
    content: and
  - type: text
    content: ' worthy of respect, whatever is right '
  - type: text
    content: and
  - type: text
    content: ' confirmed by God’s word, whatever is pure '
  - type: text
    content: and
  - type: text
    content: ' wholesome, whatever is lovely '
  - type: text
    content: and
  - type: text
    content: ' brings peace, whatever is admirable '
  - type: text
    content: and
  - type: text
    content: ' of good repute; if there is any excellence, if there is anything worthy of praise, think '
  - type: text
    content: continually
  - type: text
    content: ' on these things [center your mind on them, and implant them in your heart]. '
  '9':
  - type: text
    content: 'The things which you have learned and received and heard and seen in me, practice these things [in daily life], and the God [who is the source] of peace '
  - type: text
    content: and
  - type: text
    content: ' well-being will be with you.'
  - type: heading
    content: God’s Provisions
