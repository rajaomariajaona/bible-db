document_id: LEV.9,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aaron Offers Sacrifices
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it happened on the eighth day that Moses called Aaron and his sons and the elders of Israel; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but the fat, the kidneys, and the lobe of the liver from the sin offering he offered up in smoke on the altar, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had commanded Moses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Aaron burned the meat and the hide in the fire outside the camp.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he killed the burnt offering; and Aaron’s sons handed the blood to him and he sprinkled it around on the altar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They brought the burnt offering to him piece by piece, with the head, and Aaron offered them up in smoke on the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also washed the entrails and the legs, and offered them up in smoke with the burnt offering on the altar.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Aaron presented the people’s offering. He took the goat for the sin offering of the people, and killed it and offered it for sin, as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he did
    - type: text
      text: ' the first. [Heb 2:16, 17] '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also presented the burnt offering and offered it according to the ordinance. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next Aaron presented the grain offering and took a handful of it and offered it up in smoke on the altar in addition to the burnt offering of the morning.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also killed the bull and the ram, the sacrifice of peace offerings which was for the people; and Aaron’s sons handed the blood to him and he sprinkled it around on the altar, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the portions of fat from the bull and from the ram—the fat tail, and the fat covering the internal organs, and the kidneys, and the lobe of the liver— '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he said to Aaron, “Take a bull calf as a sin offering and a ram as a burnt offering, [each] without blemish, and offer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both
    - type: text
      text: ' before the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. [Heb 10:10-12] '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they now put the portions of fat on the breasts; and Aaron offered the fat up in smoke on the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the breasts and the right thigh Aaron presented as a wave offering before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', just as Moses had commanded.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Aaron lifted his hands toward the people and blessed them, and came down [from the altar of burnt offering] after presenting the sin offering, the burnt offering, and the peace offerings. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Aaron went into the Tent of Meeting, and when they came out they blessed the people, and the glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brilliance of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' [the Shekinah cloud] appeared to all the people [as promised]. [Lev 9:6] '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then fire came out from before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' and consumed the burnt offering and the portions of fat on the altar; and when all the people saw it, they shouted and fell face downward [in awe and worship].'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then say to the Israelites, ‘Take a male goat as a sin offering, and a calf and a lamb, both one year old, without blemish, as a burnt offering, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and a bull and a ram as peace offerings to sacrifice before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', and a grain offering mixed with [olive] oil, for today the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' will appear to you.’ ” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they took what Moses had commanded to the front of the Tent of Meeting, and all the congregation approached and stood before the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said, “This is the thing which the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded you to do, so that the glory of the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' may appear to you.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said to Aaron, “Approach the altar and present your sin offering and your burnt offering and make atonement for yourself and for the people; and present the offering of the people and make atonement for them, just as the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' has commanded.” [Heb 5:1-5; 7:27]'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Aaron approached the altar and killed the calf as the sin offering, which was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: designated
    - type: text
      text: ' for himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Aaron presented the blood to him; he dipped his finger in the blood and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some of it
    - type: text
      text: ' on the horns of the altar, and poured out the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rest of the
    - type: text
      text: ' blood at the altar’s base; '
