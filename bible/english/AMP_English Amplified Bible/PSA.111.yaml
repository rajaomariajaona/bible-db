document_id: PSA.111,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: Psalm 111
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The L
      - type: usfm
        marker: sc
        children:
        - type: usfm
          marker: it
          children:
          - type: text
            text: ord
      - type: text
        text: ' Praised for His Goodness.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Praise the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: '! (Hallelujah!)'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give thanks to the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' with all my heart,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the company of the upright and in the congregation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The [reverent] fear of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is the beginning (the prerequisite, the absolute essential, the alphabet) of wisdom;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A good understanding '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' a teachable heart are possessed by all those who do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the will of the L
      - type: usfm
        marker: sc
        children:
        - type: text
          text: ord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His praise endures forever. [Job 28:28; Prov 1:7; Matt 22:37, 38; Rev 14:7]
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Great are the works of the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Studied by all those who delight in them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Splendid and majestic is His work,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And His righteousness endures forever.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He has made His wonderful acts to be remembered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is gracious and merciful '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' full of loving compassion.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He has given food to those who fear Him [with awe-inspired reverence];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will remember His covenant forever. [Deut 10:12; Ps 96:9]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He has declared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made known to His people the power of His works,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In giving them the heritage of the nations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ¶The works of His hands are truth and [absolute] justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All His precepts are sure (established, reliable, trustworthy).
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They are upheld forever and ever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are done in [absolute] truth and uprightness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He has sent redemption to His people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has ordained His covenant forever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holy and awesome is His name—[inspiring reverence and godly fear].
