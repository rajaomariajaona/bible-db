document_id: JOB.20,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zophar Says, “The Triumph of the Wicked Is Short”
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then Zophar the Naamathite answered and said,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “His sons favor the poor [and pay his obligations],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his hands give back his [ill-gotten] wealth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “His bones are full of youthful strength
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it lies down with him in the dust.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '¶“Though evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' wickedness are sweet in his mouth'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he hides it under his tongue,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Though he desires it and will not let it go
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But holds it in his mouth,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' his food turns [to poison] in his stomach;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is the venom of vipers within him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “He swallows [his ill-gotten] riches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But will vomit them up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will drive them out of his belly.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “He sucks the poison of vipers [which ill-gotten wealth contains];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The viper’s tongue slays him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “He does not look at the rivers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The flowing streams of honey and butter [to enjoy his wealth].
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“He gives back what he has labored for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' attained'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And cannot swallow it [down to enjoy it];
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As to the riches of his labor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He cannot even enjoy them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “For he has oppressed and neglected the poor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has violently taken away houses which he did not build.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Therefore my disquieting thoughts make me answer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the uneasiness that is within me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '¶“Because he knew no quietness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' calm within him [because of his greed],'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not retain anything he desires.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “There is nothing left of what he devoured;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore his prosperity does not endure.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “In the fullness of his excess (great abundance) he will be in trouble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hand of everyone who suffers will come against him [he is miserable on every side].
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “When he fills his belly,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' will send His fierce anger on him'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And will rain it upon him while he is eating. [Num 11:33; Ps 78:26-31]
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “He may flee from the iron weapon,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But
    - type: text
      text: ' the bow of bronze will pierce him through.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: The arrow
    - type: text
      text: ' is drawn forth and it comes out of his back [after passing through his body];'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, the glittering point comes out of his gall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terrors march in upon him;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Complete darkness (misfortune) is held in reserve for his treasures.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An unfanned fire will devour him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will consume the survivor in his tent.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“The heavens will reveal his wickedness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' guilt,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the earth will rise up against him.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“The produce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' increase of his house will depart [with the victors];'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: His possessions
    - type: text
      text: ' will be dragged away in the day of God’s wrath.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “This is the wicked man’s portion from God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And the heritage decreed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' appointed to him by God.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I have heard the reproof which insults me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the spirit of my understanding makes me answer.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Do you not know this from the old days,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since the time that man was placed on the earth,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: That the triumphing of the wicked is short,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the joy of the godless is only for a moment? [Ps 37:35, 36]
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Though his pride reaches the heavens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his head touches the clouds,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet
    - type: text
      text: ' he perishes forever like his own refuse;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who have seen him will say, ‘Where is he?’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “He flies away like a dream and cannot be found;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, he is chased away like a vision of the night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “The eye which saw him sees him no longer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither does his [accustomed] place behold him any longer.
