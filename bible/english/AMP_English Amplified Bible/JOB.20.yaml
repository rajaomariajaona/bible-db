  '1':
  - type: heading
    content: Zophar Says, “The Triumph of the Wicked Is Short”
  - type: text
    content: Then Zophar the Naamathite answered and said,
  '10':
  - type: text
    content: “His sons favor the poor [and pay his obligations],
  - type: text
    content: And his hands give back his [ill-gotten] wealth.
  '11':
  - type: text
    content: “His bones are full of youthful strength
  - type: text
    content: But it lies down with him in the dust.
  '12':
  - type: text
    content: '¶“Though evil '
  - type: text
    content: and
  - type: text
    content: ' wickedness are sweet in his mouth'
  - type: text
    content: And he hides it under his tongue,
  '13':
  - type: text
    content: Though he desires it and will not let it go
  - type: text
    content: But holds it in his mouth,
  '14':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' his food turns [to poison] in his stomach;'
  - type: text
    content: It is the venom of vipers within him.
  '15':
  - type: text
    content: “He swallows [his ill-gotten] riches,
  - type: text
    content: But will vomit them up;
  - type: text
    content: God will drive them out of his belly.
  '16':
  - type: text
    content: “He sucks the poison of vipers [which ill-gotten wealth contains];
  - type: text
    content: The viper’s tongue slays him.
  '17':
  - type: text
    content: “He does not look at the rivers,
  - type: text
    content: The flowing streams of honey and butter [to enjoy his wealth].
  '18':
  - type: text
    content: '“He gives back what he has labored for '
  - type: text
    content: and
  - type: text
    content: ' attained'
  - type: text
    content: And cannot swallow it [down to enjoy it];
  - type: text
    content: As to the riches of his labor,
  - type: text
    content: He cannot even enjoy them.
  '19':
  - type: text
    content: “For he has oppressed and neglected the poor;
  - type: text
    content: He has violently taken away houses which he did not build.
  '2':
  - type: text
    content: “Therefore my disquieting thoughts make me answer,
  - type: text
    content: Because of the uneasiness that is within me.
  '20':
  - type: text
    content: '¶“Because he knew no quietness '
  - type: text
    content: or
  - type: text
    content: ' calm within him [because of his greed],'
  - type: text
    content: He does not retain anything he desires.
  '21':
  - type: text
    content: “There is nothing left of what he devoured;
  - type: text
    content: Therefore his prosperity does not endure.
  '22':
  - type: text
    content: “In the fullness of his excess (great abundance) he will be in trouble;
  - type: text
    content: The hand of everyone who suffers will come against him [he is miserable on every side].
  '23':
  - type: text
    content: “When he fills his belly,
  - type: text
    content: God
  - type: text
    content: ' will send His fierce anger on him'
  - type: text
    content: And will rain it upon him while he is eating. [Num 11:33; Ps 78:26-31]
  '24':
  - type: text
    content: “He may flee from the iron weapon,
  - type: text
    content: But
  - type: text
    content: ' the bow of bronze will pierce him through.'
  '25':
  - type: text
    content: “
  - type: text
    content: The arrow
  - type: text
    content: ' is drawn forth and it comes out of his back [after passing through his body];'
  - type: text
    content: Yes, the glittering point comes out of his gall.
  - type: text
    content: Terrors march in upon him;
  '26':
  - type: text
    content: Complete darkness (misfortune) is held in reserve for his treasures.
  - type: text
    content: An unfanned fire will devour him;
  - type: text
    content: It will consume the survivor in his tent.
  '27':
  - type: text
    content: '“The heavens will reveal his wickedness '
  - type: text
    content: and
  - type: text
    content: ' guilt,'
  - type: text
    content: And the earth will rise up against him.
  '28':
  - type: text
    content: '“The produce '
  - type: text
    content: and
  - type: text
    content: ' increase of his house will depart [with the victors];'
  - type: text
    content: His possessions
  - type: text
    content: ' will be dragged away in the day of God’s wrath.'
  '29':
  - type: text
    content: “This is the wicked man’s portion from God,
  - type: text
    content: 'And the heritage decreed '
  - type: text
    content: and
  - type: text
    content: ' appointed to him by God.”'
  '3':
  - type: text
    content: “I have heard the reproof which insults me,
  - type: text
    content: But the spirit of my understanding makes me answer.
  '4':
  - type: text
    content: “Do you not know this from the old days,
  - type: text
    content: Since the time that man was placed on the earth,
  '5':
  - type: text
    content: That the triumphing of the wicked is short,
  - type: text
    content: And the joy of the godless is only for a moment? [Ps 37:35, 36]
  '6':
  - type: text
    content: “Though his pride reaches the heavens
  - type: text
    content: And his head touches the clouds,
  '7':
  - type: text
    content: ' '
  - type: text
    content: Yet
  - type: text
    content: ' he perishes forever like his own refuse;'
  - type: text
    content: Those who have seen him will say, ‘Where is he?’
  '8':
  - type: text
    content: “He flies away like a dream and cannot be found;
  - type: text
    content: Yes, he is chased away like a vision of the night.
  '9':
  - type: text
    content: “The eye which saw him sees him no longer,
  - type: text
    content: Neither does his [accustomed] place behold him any longer.
