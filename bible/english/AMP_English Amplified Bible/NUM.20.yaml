document_id: NUM.20,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Death of Miriam
  - type: text
    content: Then the Israelites, the whole congregation, came into the Wilderness of Zin in the first month [in the fortieth year after leaving Egypt]. And the people lived in Kadesh. Miriam died there and was buried there.
  '10':
  - type: text
    content: 'and Moses and Aaron gathered the assembly before the rock. Moses said to them, “Listen now, you rebels; must we bring you water out of this rock?” '
  '11':
  - type: text
    content: Then Moses raised his hand [in anger] and with his rod he struck the rock twice [instead of speaking to the rock as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded]. And the water poured out abundantly, and the congregation and their livestock drank [fresh water]. '
  '12':
  - type: text
    content: But the L
  - type: heading
    content: ord
  - type: text
    content: ' said to Moses and Aaron, “Because you have not believed (trusted) Me, to treat Me as holy in the sight of the sons of Israel, you therefore '
  - type: note
    content: Moses apparently allowed his anger and frustration with the Israelites to blind him to the significance of what God had instructed. Although thoroughly exasperated by the Israelites, Moses was still held accountable for his behavior.
  - type: text
    content: 'shall not bring this assembly into the land which I have given them.” [Ps 106:32, 33] '
  '13':
  - type: text
    content: These are the waters of Meribah (contention, strife), where the sons of Israel contended with the L
  - type: heading
    content: ord
  - type: text
    content: ', and He showed Himself holy among them.'
  '14':
  - type: text
    content: 'Moses sent messengers from Kadesh to the king of '
  - type: note
    content: The Edomites were descendants of Esau, Jacob’s (Israel’s) twin brother.
  - type: text
    content: 'Edom: “Thus says your brother Israel, ‘You know all the hardship that has come upon us [as a nation]; '
  '15':
  - type: text
    content: 'that our fathers (ancestors) went down to Egypt, and we lived there for a long time, and the Egyptians treated [both] us and our fathers badly. '
  '16':
  - type: text
    content: But when we cried out to the L
  - type: heading
    content: ord
  - type: text
    content: ' [for help], He heard us and sent an angel and brought us out of Egypt. Now look, we are in Kadesh, a city on the edge of your territory. '
  '17':
  - type: text
    content: 'Please let us pass through your land. We will not pass through a field or through a vineyard; we will not even drink water from a well. We will go along the '
  - type: note
    content: This major trade route extended from the Gulf of Aqabah (south) to Damascus (north).
  - type: text
    content: king’s highway, not turning [off-course] to the right or to the left until we have passed through your territory.’ ”
  '18':
  - type: text
    content: 'But [the king of] Edom said to him, “You shall not pass through my territory, or I will come out against you with the sword.” '
  '19':
  - type: text
    content: 'Again, the Israelites said to him, “We will go by the highway [trade route], and if I and my livestock drink any of your water, then I will pay for it. Only let me pass through on foot, nothing else.” '
  '2':
  - type: text
    content: 'Now there was no water for the congregation, and they gathered together against Moses and Aaron. '
  '20':
  - type: text
    content: 'But the king of Edom said, “You shall not pass through [my territory].” And Edom came out against Israel with many people and a strong hand. '
  '21':
  - type: text
    content: Thus [the king of] Edom refused to give Israel passage through his territory, so Israel turned away from him.
  '22':
  - type: text
    content: Now when they set out from Kadesh, the Israelites, the whole congregation, came to Mount Hor.
  - type: heading
    content: Death of Aaron
  '23':
  - type: text
    content: Then the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses and Aaron at Mount Hor, by the border of the land of Edom, saying, '
  '24':
  - type: text
    content: '“Aaron will be gathered to his people [in death]; for he shall not enter the land which I have given to the children of Israel, because you [both] rebelled against My command at the waters of Meribah. [Num 20:7-12] '
  '25':
  - type: text
    content: 'Take Aaron and Eleazar his son and bring them up to Mount Hor; '
  '26':
  - type: text
    content: 'and strip Aaron of his garments and put them on Eleazar his son. So Aaron will be gathered '
  - type: text
    content: to his fathers
  - type: text
    content: ', and will die there.” '
  '27':
  - type: text
    content: So Moses did just as the L
  - type: heading
    content: ord
  - type: text
    content: ' had commanded; and they went up Mount Hor in the sight of all the congregation. '
  '28':
  - type: text
    content: 'After Moses stripped Aaron of his [priestly] garments and put them on Eleazar his son, Aaron died there on the mountain top. Then Moses and Eleazar came down from the mountain. '
  '29':
  - type: text
    content: When all the congregation saw that Aaron had died, all the house of Israel wept (mourned) for him thirty days.
  '3':
  - type: text
    content: The people contended with Moses, and said, “If only we had perished when our brothers perished [in the plague] before the L
  - type: heading
    content: ord
  - type: text
    content: '! [Num 16:49] '
  '4':
  - type: text
    content: Why have you brought up the assembly of the L
  - type: heading
    content: ord
  - type: text
    content: ' into this wilderness to die here, we and our livestock? '
  '5':
  - type: text
    content: 'Why have you made us come up from Egypt, to bring us to this wretched place? It is not a place of grain or of figs or of vines or of pomegranates, and there is no water to drink.” '
  '6':
  - type: text
    content: Then Moses and Aaron went from the presence of the assembly to the doorway of the Tent of Meeting (tabernacle) and fell on their faces [before the L
  - type: heading
    content: ord
  - type: text
    content: ' in prayer]. Then the glory '
  - type: text
    content: and
  - type: text
    content: ' brilliance of the L'
  - type: heading
    content: ord
  - type: text
    content: ' appeared to them; '
  '7':
  - type: text
    content: and the L
  - type: heading
    content: ord
  - type: text
    content: ' spoke to Moses, saying,'
  - type: heading
    content: The Water of Meribah
  '8':
  - type: text
    content: '“Take the rod; and you and your brother Aaron assemble the congregation and speak to the rock '
  - type: note
    content: Lit before their eyes.
  - type: text
    content: in front of them, so that it will pour out its water. In this way you shall bring water for them out of the rock and let the congregation and their livestock drink [fresh water].”
  '9':
  - type: text
    content: So Moses took the rod from before the L
  - type: heading
    content: ord
  - type: text
    content: ', just as He had commanded him; '
