document_id: EXO.18,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jethro, Moses’ Father-in-law
  - type: text
    content: Now Jethro (Reuel), the priest of Midian, Moses’ father-in-law, heard of all that God had done for Moses and for Israel His people, and that the L
  - type: heading
    content: ord
  - type: text
    content: ' had brought Israel out of Egypt. '
  '10':
  - type: text
    content: Jethro said, “Blessed be the L
  - type: heading
    content: ord
  - type: text
    content: ', who has rescued you from the hand of the Egyptians and from the hand of Pharaoh, and who has rescued the people from under the hand of the Egyptians. '
  '11':
  - type: text
    content: Now I know that the L
  - type: heading
    content: ord
  - type: text
    content: ' is '
  - type: note
    content: Jethro is affirming that the Lord (Yahweh) proved Himself superior over the Egyptian deities in the plagues and the exodus.
  - type: text
    content: greater than all gods; indeed, it was proven when they acted insolently toward Israel [and the L
  - type: heading
    content: ord
  - type: text
    content: ' showed Himself infinitely superior to all their gods].” '
  '12':
  - type: text
    content: Then Jethro, Moses’ father-in-law, took a burnt offering and [other] sacrifices [to offer] to God, and Aaron came with all the elders of Israel to eat a meal with Moses’ father-in-law before God.
  '13':
  - type: text
    content: 'Now the next day Moses sat to judge [the disputes] the people [had with one another], and the people stood around Moses from dawn to dusk. '
  '14':
  - type: text
    content: 'When Moses’ father-in-law saw everything that he was doing for the people, he said, “What is this that you are doing for the people? Why are you sitting alone [as a judge] with all the people standing around you from dawn to dusk?” '
  '15':
  - type: text
    content: 'Moses said to his father-in-law, “Because the people come to me to ask [about the will] of God. '
  '16':
  - type: text
    content: When they have a dispute they come to me, and I judge between a man and his neighbor and I make known the statutes of God and His laws.”
  - type: heading
    content: Jethro Counsels Moses
  '17':
  - type: text
    content: 'Moses’ father-in-law said to him, “The thing that you are doing is not good. '
  '18':
  - type: text
    content: 'You will certainly wear out both yourself and these people who are with you, because the task is too heavy for you [to bear]; you cannot do it alone. '
  '19':
  - type: text
    content: 'Now listen to '
  - type: note
    content: Lit my voice.
  - type: text
    content: 'me; '
  - type: note
    content: Instead of speaking directly to Moses, God used Jethro. Jethro’s willingness to speak and Moses’ willingness to listen reflects beautifully on the spiritual and emotional maturity of both men and the value of such a relationship.
  - type: text
    content: 'I will advise you, and may God be with you [to confirm my advice]. You shall represent the people before God. You shall bring their disputes '
  - type: text
    content: and
  - type: text
    content: ' causes to Him. '
  '2':
  - type: text
    content: 'Then Jethro, Moses’ father-in-law, took Moses’ wife Zipporah, after he had sent her away [from Egypt], '
  '20':
  - type: text
    content: 'You shall teach them the decrees and laws. You shall show them the way they are to live and the work they are to do. '
  '21':
  - type: text
    content: 'Furthermore, you shall select from all the people competent men who [reverently] fear God, men of truth, those who hate dishonest gain; you shall place these over the people as leaders of thousands, of hundreds, of fifties and of tens. '
  '22':
  - type: text
    content: 'They shall judge the people at all times; have them bring every major dispute to you, but let them judge every minor dispute themselves. So it will be easier for you, and they will bear '
  - type: text
    content: the burden
  - type: text
    content: ' with you. '
  '23':
  - type: text
    content: If you will do this thing and God so commands you, then you will be able to endure [the responsibility], and all these people will also go [back] to their tents in peace.”
  '24':
  - type: text
    content: 'So Moses listened to his father-in-law and did everything that he had said. '
  '25':
  - type: text
    content: 'Moses chose able men from all Israel and made them heads over the people, leaders of thousands, of hundreds, of fifties and of tens [from the highest to the lowest judicial levels]. '
  '26':
  - type: text
    content: 'And they judged the people at all times; they would bring the difficult cases to Moses, but every minor dispute they judged '
  - type: text
    content: and
  - type: text
    content: ' decided themselves. '
  '27':
  - type: text
    content: 'Then Moses '
  - type: note
    content: Lit sent off his father-in-law.
  - type: text
    content: said goodbye to his father-in-law, and Jethro went back to his own land (Midian).
  '3':
  - type: text
    content: 'along with her two sons, of whom one was named Gershom (stranger), for Moses said, “I have been a stranger in a foreign land.” '
  '4':
  - type: text
    content: 'The other [son] was named Eliezer (my God is help), for '
  - type: text
    content: Moses said,
  - type: text
    content: ' “The God of my father was my help, and He rescued me from the sword of Pharaoh.”'
  '5':
  - type: text
    content: 'Then Jethro, his father-in-law, came with Moses’ sons and his wife to [join] Moses in the wilderness where he was camped, at the mountain of God [that is, Mt. Sinai in Horeb]. '
  '6':
  - type: text
    content: 'He sent a message to Moses, “I, your father-in-law Jethro, am coming to you with your wife and her two sons [who are] with her.” '
  '7':
  - type: text
    content: 'So Moses went out to meet his father-in-law, and he bowed down [in respect] and kissed him. They asked each other about their well-being and went into the tent. '
  '8':
  - type: text
    content: Moses told his father-in-law about all that the L
  - type: heading
    content: ord
  - type: text
    content: ' had done to Pharaoh and the Egyptians for Israel’s sake, and about all the hardship that had happened during the journey, and how the L'
  - type: heading
    content: ord
  - type: text
    content: ' had rescued them. '
  '9':
  - type: text
    content: Jethro rejoiced over all the good things the L
  - type: heading
    content: ord
  - type: text
    content: ' had done to Israel, in that He had rescued them from the hand of the Egyptians. '
