document_id: EXO.18,1588
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jethro, Moses’ Father-in-law
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now Jethro (Reuel), the priest of Midian, Moses’ father-in-law, heard of all that God had done for Moses and for Israel His people, and that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had brought Israel out of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Jethro said, “Blessed be the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ', who has rescued you from the hand of the Egyptians and from the hand of Pharaoh, and who has rescued the people from under the hand of the Egyptians. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Now I know that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jethro is affirming that the L
        - type: usfm
          marker: sc
          children:
          - type: text
            text: ord
        - type: text
          text: ' (Yahweh) proved Himself superior over the Egyptian deities in the plagues and the exodus.'
      marker-yv: yv-n
    - type: text
      text: greater than all gods; indeed, it was proven when they acted insolently toward Israel [and the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' showed Himself infinitely superior to all their gods].” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then Jethro, Moses’ father-in-law, took a burnt offering and [other] sacrifices [to offer] to God, and Aaron came with all the elders of Israel to eat a meal with Moses’ father-in-law before God.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now the next day Moses sat to judge [the disputes] the people [had with one another], and the people stood around Moses from dawn to dusk. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'When Moses’ father-in-law saw everything that he was doing for the people, he said, “What is this that you are doing for the people? Why are you sitting alone [as a judge] with all the people standing around you from dawn to dusk?” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moses said to his father-in-law, “Because the people come to me to ask [about the will] of God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When they have a dispute they come to me, and I judge between a man and his neighbor and I make known the statutes of God and His laws.”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jethro Counsels Moses
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moses’ father-in-law said to him, “The thing that you are doing is not good. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'You will certainly wear out both yourself and these people who are with you, because the task is too heavy for you [to bear]; you cannot do it alone. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now listen to '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: my voice
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'me; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Instead of speaking directly to Moses, God used Jethro. Jethro’s willingness to speak and Moses’ willingness to listen reflects beautifully on the spiritual and emotional maturity of both men and the value of such a relationship.
      marker-yv: yv-n
    - type: text
      text: 'I will advise you, and may God be with you [to confirm my advice]. You shall represent the people before God. You shall bring their disputes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' causes to Him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Jethro, Moses’ father-in-law, took Moses’ wife Zipporah, after he had sent her away [from Egypt], '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You shall teach them the decrees and laws. You shall show them the way they are to live and the work they are to do. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Furthermore, you shall select from all the people competent men who [reverently] fear God, men of truth, those who hate dishonest gain; you shall place these over the people as leaders of thousands, of hundreds, of fifties and of tens. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They shall judge the people at all times; have them bring every major dispute to you, but let them judge every minor dispute themselves. So it will be easier for you, and they will bear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the burden
    - type: text
      text: ' with you. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: If you will do this thing and God so commands you, then you will be able to endure [the responsibility], and all these people will also go [back] to their tents in peace.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So Moses listened to his father-in-law and did everything that he had said. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moses chose able men from all Israel and made them heads over the people, leaders of thousands, of hundreds, of fifties and of tens [from the highest to the lowest judicial levels]. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And they judged the people at all times; they would bring the difficult cases to Moses, but every minor dispute they judged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' decided themselves. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then Moses '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lit '
        - type: usfm
          marker: it
          children:
          - type: text
            text: sent off his father-in-law
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: said goodbye to his father-in-law, and Jethro went back to his own land (Midian).
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'along with her two sons, of whom one was named Gershom (stranger), for Moses said, “I have been a stranger in a foreign land.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The other [son] was named Eliezer (my God is help), for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moses said,
    - type: text
      text: ' “The God of my father was my help, and He rescued me from the sword of Pharaoh.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Jethro, his father-in-law, came with Moses’ sons and his wife to [join] Moses in the wilderness where he was camped, at the mountain of God [that is, Mt. Sinai in Horeb]. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He sent a message to Moses, “I, your father-in-law Jethro, am coming to you with your wife and her two sons [who are] with her.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So Moses went out to meet his father-in-law, and he bowed down [in respect] and kissed him. They asked each other about their well-being and went into the tent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moses told his father-in-law about all that the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had done to Pharaoh and the Egyptians for Israel’s sake, and about all the hardship that had happened during the journey, and how the L'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had rescued them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Jethro rejoiced over all the good things the L
    - type: usfm
      marker: sc
      children:
      - type: text
        text: ord
    - type: text
      text: ' had done to Israel, in that He had rescued them from the hand of the Egyptians. '
