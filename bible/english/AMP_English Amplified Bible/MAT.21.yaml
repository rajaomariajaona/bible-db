  - type: text
    text: 'When they approached Jerusalem and had reached Bethphage, at the Mount of Olives, Jesus sent two disciples [ahead], [Mark 11:1-10; Luke 19:29-38; John 12:12-15] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'saying to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go into the village opposite you, and at once you will find a donkey tied, and a colt with her; untie them and bring them to Me.
  - type: text
