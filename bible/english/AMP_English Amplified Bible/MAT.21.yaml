  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then He left them and went out of the city to Bethany, and spent the night there.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Barren Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Now early in the morning, as Jesus was coming back to the city, He was hungry. [Mark 11:12-14, 20-24] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Seeing a lone fig tree at the roadside, He went to it and found nothing but leaves on it; and He said to it, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Never again will fruit come from you.”
  - type: text
    text: ' And at once the fig tree withered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When the disciples saw it, they were astonished and asked, “How is it that the fig tree has withered away all at once?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you, if you have faith'
  - type: text
    text: ' [personal trust and confidence in Me] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and do not doubt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' allow yourself to be drawn in two directions, you will not only do what was done to the fig tree, but even if you say to this mountain, ‘Be taken up and thrown into the sea,’ it will happen'
  - type: text
    text: ' [if God wills it]. [1 John 5:14] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whatever you ask for in prayer, believing, you will receive.”
- type: usfm
  marker: s1
  children:
  - type: usfm
