      text: Cleansing the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Jesus entered the temple [grounds] and drove out [with force] all who were buying and selling [birds and animals for sacrifice] in the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area
  - type: text
    text: ', and He turned over the tables of the moneychangers [who made a profit exchanging foreign money for temple coinage] and the chairs of those who were selling doves [for sacrifice]. [Mark 11:15-18; Luke 19:45-47; John 2:14-16] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is written
  - type: text
    text: ' [in Scripture], '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘M
    - type: usfm
      marker: sc
      children:
      - type: text
        text: y house shall be called a house of prayer
    - type: text
      text: '’; but you are making it a '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: robbers’ den
    - type: text
      text: .”
  - type: text
    text: ' [Is 56:7; Jer 7:11]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And the blind and the lame came to Him in [the porticoes and courts of] the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area,
  - type: text
    text: ' and He healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when the chief priests and the scribes saw the wonderful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' miraculous things that Jesus had done, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heard
  - type: text
    text: ' the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There would have been a large number of twelve year old boys in the temple preparing to celebrate their first Passover and their ceremonial entry into manhood.
    marker-yv: yv-n
  - type: text
    text: 'boys who were shouting in [the porticoes and courts of] the temple [in praise and adoration], “Hosanna to the Son of David (the Messiah),” they became indignant '
  - type: usfm
