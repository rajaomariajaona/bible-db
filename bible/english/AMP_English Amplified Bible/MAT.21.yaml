    - type: text
      text: Authority Challenged
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When He entered the temple '
  - type: usfm
    marker: it
    children:
    - type: text
      text: area,
  - type: text
    text: ' the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. the official delegation from the Sanhedrin, Jewish High Court.
    marker-yv: yv-n
  - type: text
    text: 'chief priests and elders of the people came to Him as He was teaching and said, “By what [kind of] authority are You doing these things, and who gave You this authority [to exercise this power]?” [Mark 11:27-33; Luke 20:1-8] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jesus replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I will also ask you a question, and if you tell Me the answer, then I will tell you by what authority I do these things.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The baptism of John—from where did it come? From heaven
  - type: text
    text: ' [that is, ordained by God] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: or from men?”
  - type: text
    text: ' And they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: began
  - type: text
    text: ' debating among themselves [considering the implications of their answer], saying, “If we say, ‘From heaven,’ He will say to us, ‘Then why did you not believe John?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But if we say, ‘From men,’ we are afraid of the [response of the] crowd; for they all regard John as a prophet.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So they answered Jesus, “We do not know.” And He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Neither will I tell you by what
  - type: text
    text: ' [kind of] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: authority I do these things.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of Two Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you think? There was a man who had two sons, and he came to the first and said, ‘Son, go and work in the vineyard today.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And he answered, ‘I will not’; but afterward he regretted it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' changed his mind and went.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Then the man came to the second son and said the same thing; and he replied, ‘I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will,
    - type: text
      text: ' sir’; but he did not go.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Which of the two did the will of the father?”
  - type: text
    text: ' The chief priests and elders replied, “The first one.” Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I assure you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' most solemnly say to you that the tax collectors and the prostitutes will get into the kingdom of God before you.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For John came to you
  - type: text
    text: ' [walking] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the way of righteousness and you did not believe him; but the tax collectors and the prostitutes did believe him; and you, seeing this, did not even change your mind afterward and believe him
  - type: text
    text: ' [accepting what he proclaimed to you].'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Parable of the Landowner
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen to another parable. There was a landowner who '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: planted a vineyard and put a wall around it and dug a wine press in it
    - type: text
      text: ', '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: and built a tower
    - type: text
      text: ', and rented it out to tenant farmers and went on a journey'
  - type: text
    text: ' [to another country]. [Is 5:1-7; Mark 12:1-12; Luke 20:9-19] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the harvest time approached, he sent his servants to the tenants to get his
  - type: text
    text: ' [share of the] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the tenants took his servants and beat one, and killed another, and stoned a third.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Again he sent other servants, more than the first time; and they treated them the same way.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Finally he sent his own son to them, saying, ‘They will respect my son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have regard for him.’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But when the tenants saw the son, they said to themselves, ‘This
  - type: text
    text: ' [man] '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is the heir; come on, let us kill him and seize his inheritance.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they took the son and threw him out of the vineyard, and killed him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now when the owner of the vineyard comes back, what will he do to those tenants?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'They said to Him, “He will put those despicable men to a miserable end, and rent out the vineyard to other tenants [of good character] who will pay him the proceeds at the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: proper
  - type: text
    text: ' seasons.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jesus asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Have you never read in the Scriptures:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘T
    - type: usfm
      marker: sc
      children:
      - type: text
        text: he
  - type: text
    text: ' [very] '
  - type: usfm
    marker: f
