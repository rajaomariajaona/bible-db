  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For who were they who heard and yet provoked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' [with rebellious acts]? Was it not all those who came out of Egypt led by Moses? '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And with whom was He angry for forty years? Was it not with those who sinned, whose dead bodies were scattered in the desert? '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And to whom did He swear [an oath] that they would not enter His rest, but to those who disobeyed [those who would not listen to His word]? '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So we see that they were not able to enter [into His rest—the promised land] because of unbelief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' an unwillingness to trust in God. [Num 14:1-35]'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was faithful to Him who appointed Him [Apostle and High Priest], as Moses also was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faithful
    - type: text
      text: ' in all God’s house. [Num 12:7] '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet Jesus has been considered worthy of much greater glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' honor than Moses, just as the builder of a house has more honor than the house. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For every house is built by someone, but the builder of all things is God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Moses was faithful in [the administration of] all God’s house, [but only] as a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ministering
    - type: text
      text: ' servant, [his ministry serving] as a testimony of the things which were to be spoken afterward [the revelation to come in Christ]; [Num 12:7] '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but Christ is faithful as a Son over His [Father’s] house. And we are His house if we hold fast our confidence and sense of triumph in our hope [in Christ].
