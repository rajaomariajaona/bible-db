          text: “Heart” includes the entire human personality—mind, will, and emotions. The core of one’s being where there is no pretense.
      marker-yv: yv-n
    - type: text
      text: 'heart [which refuses to trust and rely on the Lord, a heart] that turns away from the living God. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'But continually encourage one another every day, as long as it is called “Today” [and there is an opportunity], so that none of you will be hardened [into settled rebellion] by the deceitfulness of sin [its cleverness, delusive glamour, and sophistication]. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For we [believers] have become partakers of Christ [sharing in all that the Messiah has for us], if only we hold firm our newborn confidence [which originally led us to Him] until the end, '
