document_id: MIC.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Woe to Oppressors
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe (judgment is coming) to those who devise wickedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: And plot evil on their beds!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When morning comes, they practice evil
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because it is in the power of their hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They covet fields and seize them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And houses, and take them away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They oppress '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' rob a man and his house,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A man and his inheritance. [Is 5:8; Ex 20:17; Lev 25:23ff.]
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Therefore, thus says the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Behold, I am planning against this family a disaster (exile)
- type: usfm
  marker: q1
  children:
  - type: text
    text: '[Like a noose] from which you cannot remove your necks;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor will you be able to walk haughtily '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' erect,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it will be an evil time [of subjugation to the invaders].
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “On that day they shall take up a [taunting, deriding] parable against you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And wail with a doleful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' bitter song of mourning and say,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘We are completely destroyed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God exchanges the inheritance of my people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: How He removes it from me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He divides our fields to the rebellious [our captors].’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Therefore, you will have no one stretching a measuring line [dividing the common land]
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you by lot in the assembly of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: . [Rev 21:27]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ¶‘Do not speak out,’ so they speak out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: But if
  - type: text
    text: ' they do not speak out concerning these things,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reproaches will not be turned back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Is it being said, O house of Jacob:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Is the Spirit of the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' impatient?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or are these [prophesied judgments] His doings?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not My words do good
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the one walking uprightly?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But lately My people have stood up as an enemy [and have made Me their antagonist].
- type: usfm
  marker: q1
  children:
  - type: text
    text: You strip the ornaments off the garment
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of those unsuspecting passers-by,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like those returned from war.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “You evict the women (widows) of My people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each one from her pleasant house;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From her [young, fatherless] children you take away My splendor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' blessing forever [by putting them among the pagans, away from Me].'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Arise and depart [because the captivity is inevitable],
- type: usfm
  marker: q1
  children:
  - type: text
    text: For this [land] is not the place of rest
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the defilement that brings destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A painful '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' terrible destruction.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “If a man walking in a false spirit [spouting deception]
- type: usfm
  marker: q1
  children:
  - type: text
    text: Should lie and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I will prophesy to you [O Israel] of wine and liquor (greed, sensual pleasure),’
- type: usfm
  marker: q1
  children:
  - type: text
    text: He would be the acceptable spokesman of this people. [Jer 5:31]
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ¶“I shall most certainly assemble all of you, O Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall surely gather the remnant of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I shall bring them together like sheep in the fold [multiplying the nation];
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a flock in the midst of its pasture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The place will swarm with many people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' hum loudly with noise.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“The '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The prophets repeatedly revealed the full extent of God’s coming judgment and salvation. God would punish His rebellious people but would afterward redeem them. Israel would be sent into exile, but a remnant of the people would return. The Messiah, the One who breaks open the way, shall lead them back and shall restore the kingdom of David.
    marker-yv: yv-n
  - type: text
    text: breaker [the Messiah, who opens the way] shall go up before them [liberating them].
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will break out, pass through the gate and go out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: So their King goes on before them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' at their head.” [Ex 23:20, 21; 33:14; Is 63:8, 9; Hos 3:5; Amos 9:11]'
