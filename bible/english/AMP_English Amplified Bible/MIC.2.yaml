verses:
  '1':
  - type: heading
    content: Woe to Oppressors
  - type: text
    content: Woe (judgment is coming) to those who devise wickedness
  - type: text
    content: And plot evil on their beds!
  - type: text
    content: When morning comes, they practice evil
  - type: text
    content: Because it is in the power of their hands.
  '10':
  - type: text
    content: “Arise and depart [because the captivity is inevitable],
  - type: text
    content: For this [land] is not the place of rest
  - type: text
    content: Because of the defilement that brings destruction,
  - type: text
    content: 'A painful '
  - type: text
    content: and
  - type: text
    content: ' terrible destruction.'
  '11':
  - type: text
    content: “If a man walking in a false spirit [spouting deception]
  - type: text
    content: Should lie and say,
  - type: text
    content: ‘I will prophesy to you [O Israel] of wine and liquor (greed, sensual pleasure),’
  - type: text
    content: He would be the acceptable spokesman of this people. [Jer 5:31]
  '12':
  - type: text
    content: ¶“I shall most certainly assemble all of you, O Jacob;
  - type: text
    content: I shall surely gather the remnant of Israel.
  - type: text
    content: I shall bring them together like sheep in the fold [multiplying the nation];
  - type: text
    content: Like a flock in the midst of its pasture.
  - type: text
    content: 'The place will swarm with many people '
  - type: text
    content: and
  - type: text
    content: ' hum loudly with noise.'
  '13':
  - type: text
    content: '“The '
  - type: note
    content: The prophets repeatedly revealed the full extent of God’s coming judgment and salvation. God would punish His rebellious people but would afterward redeem them. Israel would be sent into exile, but a remnant of the people would return. The Messiah, the One who breaks open the way, shall lead them back and shall restore the kingdom of David.
  - type: text
    content: breaker [the Messiah, who opens the way] shall go up before them [liberating them].
  - type: text
    content: They will break out, pass through the gate and go out;
  - type: text
    content: So their King goes on before them,
  - type: text
    content: The L
  - type: heading
    content: ord
  - type: text
    content: ' at their head.” [Ex 23:20, 21; 33:14; Is 63:8, 9; Hos 3:5; Amos 9:11]'
  '2':
  - type: text
    content: They covet fields and seize them,
  - type: text
    content: And houses, and take them away.
  - type: text
    content: 'They oppress '
  - type: text
    content: and
  - type: text
    content: ' rob a man and his house,'
  - type: text
    content: A man and his inheritance. [Is 5:8; Ex 20:17; Lev 25:23ff.]
  '3':
  - type: text
    content: Therefore, thus says the L
  - type: heading
    content: ord
  - type: text
    content: ','
  - type: text
    content: “Behold, I am planning against this family a disaster (exile)
  - type: text
    content: '[Like a noose] from which you cannot remove your necks;'
  - type: text
    content: 'Nor will you be able to walk haughtily '
  - type: text
    content: and
  - type: text
    content: ' erect,'
  - type: text
    content: For it will be an evil time [of subjugation to the invaders].
  '4':
  - type: text
    content: “On that day they shall take up a [taunting, deriding] parable against you
  - type: text
    content: 'And wail with a doleful '
  - type: text
    content: and
  - type: text
    content: ' bitter song of mourning and say,'
  - type: text
    content: ‘We are completely destroyed!
  - type: text
    content: God exchanges the inheritance of my people;
  - type: text
    content: How He removes it from me!
  - type: text
    content: He divides our fields to the rebellious [our captors].’
  '5':
  - type: text
    content: “Therefore, you will have no one stretching a measuring line [dividing the common land]
  - type: text
    content: For you by lot in the assembly of the L
  - type: heading
    content: ord
  - type: text
    content: . [Rev 21:27]
  '6':
  - type: text
    content: ¶‘Do not speak out,’ so they speak out.
  - type: text
    content: But if
  - type: text
    content: ' they do not speak out concerning these things,'
  - type: text
    content: Reproaches will not be turned back.
  '7':
  - type: text
    content: '“Is it being said, O house of Jacob:'
  - type: text
    content: ‘Is the Spirit of the L
  - type: heading
    content: ord
  - type: text
    content: ' impatient?'
  - type: text
    content: Or are these [prophesied judgments] His doings?’
  - type: text
    content: Do not My words do good
  - type: text
    content: To the one walking uprightly?
  '8':
  - type: text
    content: “But lately My people have stood up as an enemy [and have made Me their antagonist].
  - type: text
    content: You strip the ornaments off the garment
  - type: text
    content: Of those unsuspecting passers-by,
  - type: text
    content: Like those returned from war.
  '9':
  - type: text
    content: “You evict the women (widows) of My people,
  - type: text
    content: Each one from her pleasant house;
  - type: text
    content: 'From her [young, fatherless] children you take away My splendor '
  - type: text
    content: and
  - type: text
    content: ' blessing forever [by putting them among the pagans, away from Me].'
