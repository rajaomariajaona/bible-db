document_id: JDG.12,1588
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah and His Successors
  - type: text
    content: 'The men of [the tribe of] Ephraim were summoned [to action], and they crossed over to Zaphon and said to Jephthah, “Why did you cross over to fight with the Ammonites without calling us to go with you? [For that] we will burn your house down upon you.” '
  '10':
  - type: text
    content: Then Ibzan died and was buried at Bethlehem.
  '11':
  - type: text
    content: 'After him Elon the Zebulunite judged Israel; and he judged Israel for ten years. '
  '12':
  - type: text
    content: Then Elon the Zebulunite died and was buried at Aijalon in the land of Zebulun.
  '13':
  - type: text
    content: 'Now after him Abdon the son of Hillel the Pirathonite judged Israel. '
  '14':
  - type: text
    content: 'He had forty sons and thirty grandsons who rode on seventy donkeys; and he judged Israel for eight years. '
  '15':
  - type: text
    content: Then Abdon the son of Hillel the Pirathonite died and was buried at Pirathon in the land of Ephraim, in the hill country of the Amalekites.
  '2':
  - type: text
    content: 'And Jephthah said to them, “My people and I were in a major conflict with the Ammonites, and when I called you [for help], you did not rescue me from their hand. '
  '3':
  - type: text
    content: So when I saw that you were not coming to help me, I took my life in my hands and crossed over against the Ammonites, and the L
  - type: heading
    content: ord
  - type: text
    content: ' handed them over to me. So why have you come up to me this day to fight against me?” '
  '4':
  - type: text
    content: 'Then Jephthah assembled all the men of Gilead and fought with [the tribe of] Ephraim; and the men of Gilead defeated Ephraim, because they had said, “You Gileadites are fugitives of Ephraim, in the midst of [the tribes of] Ephraim and Manasseh.” '
  '5':
  - type: text
    content: 'And the Gileadites took the '
  - type: note
    content: I.e. narrow or shallow places where a river may be crossed by wading.
  - type: text
    content: 'fords of the Jordan opposite the Ephraimites; and when '
  - type: text
    content: any of
  - type: text
    content: ' the fugitives of Ephraim said, “Let me cross over,” the men of Gilead would say to him, “Are you an Ephraimite?” If he said, “No,” '
  '6':
  - type: text
    content: 'they said to him, “Then say ‘Shibboleth.’ ” And he said, “Sibboleth,” for he could not '
  - type: note
    content: Lit speak thus. The difference in pronunciation was between a Hebrew consonant with an “sh” sound, which the Ephraimites evidently did not have in their dialect, and another consonant with a sharp “s” sound. This difference was similar to that between the Hebrew greeting “Shalom,” and the greeting “Salaam” used in Islamic circles. Shibboleth has even been accepted into English as a word meaning “a peculiarity of pronunciation.” In Hebrew it refers to an ear or head of grain.
  - type: text
    content: pronounce it correctly. Then they seized him and killed him at the fords of the Jordan. At that time forty-two thousand of the Ephraimites fell.
  '7':
  - type: text
    content: 'Jephthah judged Israel for six years. Then Jephthah the Gileadite died and was buried in '
  - type: text
    content: one of
  - type: text
    content: ' the cities of Gilead.'
  '8':
  - type: text
    content: 'And after him Ibzan of Bethlehem judged Israel. '
  '9':
  - type: text
    content: 'He had thirty sons, and thirty daughters whom he gave in marriage outside '
  - type: text
    content: the family,
  - type: text
    content: ' and he brought in thirty daughters [-in-law] from outside for his sons. He judged Israel for seven years. '
