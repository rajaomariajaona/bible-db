  marker: s1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jephthah and His Successors
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The men of [the tribe of] Ephraim were summoned [to action], and they crossed over to Zaphon and said to Jephthah, “Why did you cross over to fight with the Ammonites without calling us to go with you? [For that] we will burn your house down upon you.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jephthah said to them, “My people and I were in a major conflict with the Ammonites, and when I called you [for help], you did not rescue me from their hand. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So when I saw that you were not coming to help me, I took my life in my hands and crossed over against the Ammonites, and the L
  - type: usfm
    marker: sc
    children:
    - type: text
      text: ord
  - type: text
    text: ' handed them over to me. So why have you come up to me this day to fight against me?” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Jephthah assembled all the men of Gilead and fought with [the tribe of] Ephraim; and the men of Gilead defeated Ephraim, because they had said, “You Gileadites are fugitives of Ephraim, in the midst of [the tribes of] Ephraim and Manasseh.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the Gileadites took the '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: I.e. narrow or shallow places where a river may be crossed by wading.
    marker-yv: yv-n
  - type: text
    text: 'fords of the Jordan opposite the Ephraimites; and when '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any of
  - type: text
    text: ' the fugitives of Ephraim said, “Let me cross over,” the men of Gilead would say to him, “Are you an Ephraimite?” If he said, “No,” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'they said to him, “Then say ‘Shibboleth.’ ” And he said, “Sibboleth,” for he could not '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lit '
      - type: usfm
        marker: it
        children:
        - type: text
          text: speak thus
      - type: text
        text: '. The difference in pronunciation was between a Hebrew consonant with an “sh” sound, which the Ephraimites evidently did not have in their dialect, and another consonant with a sharp “s” sound. This difference was similar to that between the Hebrew greeting “Shalom,” and the greeting “Salaam” used in Islamic circles. '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shibboleth
      - type: text
        text: ' has even been accepted into English as a word meaning “a peculiarity of pronunciation.” In Hebrew it refers to an ear or head of grain.'
    marker-yv: yv-n
  - type: text
    text: pronounce it correctly. Then they seized him and killed him at the fords of the Jordan. At that time forty-two thousand of the Ephraimites fell.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jephthah judged Israel for six years. Then Jephthah the Gileadite died and was buried in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one of
  - type: text
    text: ' the cities of Gilead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And after him Ibzan of Bethlehem judged Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He had thirty sons, and thirty daughters whom he gave in marriage outside '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the family,
  - type: text
    text: ' and he brought in thirty daughters [-in-law] from outside for his sons. He judged Israel for seven years. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then Ibzan died and was buried at Bethlehem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'After him Elon the Zebulunite judged Israel; and he judged Israel for ten years. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Elon the Zebulunite died and was buried at Aijalon in the land of Zebulun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now after him Abdon the son of Hillel the Pirathonite judged Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He had forty sons and thirty grandsons who rode on seventy donkeys; and he judged Israel for eight years. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Abdon the son of Hillel the Pirathonite died and was buried at Pirathon in the land of Ephraim, in the hill country of the Amalekites.
